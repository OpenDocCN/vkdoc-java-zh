  \n前两层的配置由两个类提供。`BasicDataSourceCfg` 类（在**第** **8** **章**中介绍）提供了与 MariaDB 数据库交互的方式。`TransactionCfg`\
  \ 类（在**第** **9** **章**中介绍）提供了在事务环境中进行数据库操作的细节。如果这两个属于 `chapter-14` 项目的配置类看起来陌生，请随时回顾这两章。\n\
  \n现在底层已经设置完毕，我们准备开始介绍 Spring MVC。\n\n## 介绍 Spring MVC\n\n在继续实现表示层之前，让我们先了解 MVC 作为\
  \ Web 应用模式的一些主要概念，以及 Spring MVC 如何在这方面提供全面支持。\n\n在接下来的章节中，我们将逐一介绍这些高层概念。首先，简要介绍\
  \ MVC。其次，介绍 Spring MVC 及其 WebApplicationContext 层次结构的高层视图。最后，讨论 Spring MVC 中的请求生命周期。\n\
  \n\n\n### 介绍 MVC\n\nMVC 是在实现应用程序表示层时常用的一种模式。MVC 模式的主要原则是定义一个架构，让不同组件拥有清晰的职责。顾名思义，MVC\
  \ 模式包含三个参与者：\n\n*   *模型*：模型代表业务数据，以及在用户上下文中的应用程序“状态”。例如，在电子商务网站中，模型通常包含用户个人信息、购物车数据，以及用户购买商品时的订单数据。\n\
  \n*   *视图*：视图以所需格式向用户展示数据，支持与用户的交互，并支持客户端验证、国际化、样式等功能。\n\n*   *控制器*：控制器处理用户在前端执行的操作请求，与服务层交互，更新模型，并根据执行结果将用户引导至适当的视图。\n\
  \n图 14-1 展示了一个常用的 Web 应用程序模式，由于引入了 Spring 作为主要组件，该模式可被视为对传统 MVC 模式的增强。\n\n![](img/524962_1_En_14_Fig1_HTML.jpg)\n\
  \n一个流程图。Web 容器的六个阶段如下：1. 请求。2. 调用。3. 服务调用。4. 填充。5. 创建。6. 响应。流程从浏览器、调度器、控制器到 JSP、Velocity\
  \ 和 Thymeleaf 的视图。控制器和视图连接到模型 Bean。服务层、数据访问层和数据库。\n\n图 14-1\n\n典型 Web 应用程序中的 MVC\
  \ 模式\n\n一个普通的视图请求按如下方式处理：\n\n1.  *请求*：请求被提交到服务器。在服务器端，大多数框架（例如 Spring MVC 或 Struts）都有一个调度器（以\
  \ Servlet 的形式）来处理请求。\n\n2.  *调用*：调度器根据 HTTP 请求信息和 Web 应用程序配置，将请求分派给适当的控制器。\n\n3.\
  \  *服务调用*：控制器与服务层交互。\n\n4.  *填充模型*：控制器使用从服务层获取的信息来填充模型。\n\n5.  *创建视图*：基于模型创建视图。\n\
  \n6.  *响应*：控制器将相应的视图返回给用户。\n\n### Spring MVC 的增强功能\n\n在 Spring 框架中，Spring MVC 模块为\
  \ MVC 模式提供了全面支持，并支持其他功能（例如主题、国际化、验证、类型转换和格式化），从而简化了表示层的实现。\n\n在接下来的章节中，我们将讨论 Spring\
  \ MVC 的主要概念。主题包括 Spring MVC 的 `WebApplicationContext` 层次结构、典型的请求处理生命周期以及配置。\n\n\
  #### Spring MVC `WebApplicationContext` 层次结构\n\n在 Spring MVC 中，`DispatcherServlet`\
  \ 是接收请求并将其分派给适当控制器的核心 Servlet。在一个 Spring MVC 应用程序中，可以有任意数量的 `DispatcherServlet`\
  \ 实例用于不同目的（例如，处理用户界面请求和 RESTful Web 服务请求），每个 `DispatcherServlet` 实例都有自己的 `WebApplicationContext`\
  \ 配置，该配置定义了 Servlet 级别的特性，例如支持该 Servlet 的控制器、处理器映射、视图解析、国际化、主题、验证、类型转换和格式化。\n\n\
  在 Servlet 级别的 `WebApplicationContext` 配置之下，Spring MVC 维护着一个根 `WebApplicationContext`，其中包含应用程序级别的配置，例如后端数据源、安全性、以及服务和持久层配置。根\
  \ `WebApplicationContext` 将对所有 Servlet 级别的 `WebApplicationContext` 可用。\n\n让我们看一个例子。假设一个应用程序中有两个\
  \ `DispatcherServlet` 实例。一个 Servlet 支持用户界面（称为*应用程序 Servlet*），另一个以 RESTful Web 服务的形式为其他应用程序提供服务（称为*RESTful\
  \ Servlet*）。在 Spring MVC 中，我们将为根 `WebApplicationContext` 实例以及两个 DispatcherServlet\
  \ 实例的 `WebApplicationContext` 实例定义配置。图 14-2 显示了 Spring MVC 为此场景维护的 `WebApplicationContext`\
  \ 层次结构。\n\n![](img/524962_1_En_14_Fig2_HTML.jpg)\n\n一个包含三个相互关联的 Web 应用程序上下文数据的流程图。1.\
  \ Web 应用程序上下文，根。2. Web 应用程序上下文，应用程序服务器。3. Web 应用程序上下文，RESTful 服务。\n\n图 14-2\n\n\
  Spring MVC `WebApplicationContext` 层次结构\n\n\n\n#### Spring MVC 请求生命周期\n\n让我们看看 Spring\
  \ MVC 如何处理一个请求。图 14-3 展示了 Spring MVC 中处理请求所涉及的主要组件。\n\n![](img/524962_1_En_14_Fig3_HTML.jpg)\n\
  \n流程图从请求经过过滤器开始，随后到达调度器 Servlet。调度器 Servlet 指向公共服务、控制器、视图处理，并通过过滤器返回响应。\n\n图 14-3\n\
  \nSpring MVC 请求\n\n主要组件及其用途如下：\n\n*   **过滤器**：过滤器应用于每个请求。下一节将介绍几种常用的过滤器及其用途。\n\n\
  *   **调度器 Servlet**：该 Servlet 分析请求并将其分派给相应的控制器进行处理¹。\n\n*   **公共服务**：公共服务将应用于每个请求以提供支持，包括国际化（i18n）、主题和文件上传。它们的配置在\
  \ `DispatcherServlet` 的 `WebApplicationContext` 中定义。\n\n*   **处理器映射**：它将传入的请求映射到处理器（Spring\
  \ MVC 控制器类中的一个方法）。自 Spring 2.5 起，在大多数情况下无需配置，因为 Spring MVC 会自动注册一个开箱即用的 `HandlerMapping`\
  \ 实现，该实现基于控制器类中通过 `@RequestMapping` 注解（及其扩展）在类型或方法级别表达的 HTTP 路径来映射处理器。\n\n    ![](img/524962_1_En_14_Figb_HTML.jpg)\
  \ 一个信息符号。由一个带阴影圆圈内的小写字母 i 表示。 在 Spring 2.5 中，`DefaultAnnotationHandlerMapping` 是默认实现。从\
  \ Spring 3.1 开始，`RequestMappingHandlerMapping` 成为默认实现，只要遵循 Spring 的控制器和方法命名约定，它也支持将请求映射到未使用注解定义的处理器。\n\
  \n*   **处理器拦截器**：在 Spring MVC 中，你可以为处理器注册拦截器以实现通用检查或逻辑。例如，处理器拦截器可以检查以确保处理器仅在工作时间内被调用。\n\
  \n*   **处理器异常解析器**：在 Spring MVC 中，`HandlerExceptionResolver` 接口（定义在 `org.springframework.web.servlet`\
  \ 包中）旨在处理处理器在请求处理过程中抛出的意外异常。默认情况下，`DispatcherServlet` 会注册 `DefaultHandlerExceptionResolver`\
  \ 类（来自 `org.springframework.web.servlet.mvc.support` 包）。该解析器通过设置特定的响应状态码来处理某些标准的\
  \ Spring MVC 异常。你也可以通过使用 `@ExceptionHandler` 注解标注控制器方法并将异常类型作为属性传入，来实现自己的异常处理器。\n\
  \n*   **视图解析器**：Spring MVC 的 `ViewResolver` 接口（来自 `org.springframework.web.servlet`\
  \ 包）支持基于控制器返回的逻辑名称进行视图解析。有许多实现类支持各种视图解析机制。例如，`UrlBasedViewResolver` 类支持将逻辑名称直接解析为\
  \ URL。`ContentNegotiatingViewResolver` 类支持根据客户端支持的媒体类型（如 XML、PDF 和 JSON）动态解析视图。还存在许多与不同视图技术集成的实现，例如\
  \ Thymeleaf^(¹²⁷)（`ThymeleafViewResolver`）、FreeMarker^(¹²⁸)（`FreeMarkerViewResolver`）、Velocity^(¹²⁹)（`VelocityViewResolver`）和\
  \ JasperReports^(¹³⁰)（`JasperReportsViewResolver`）。\n\n这些描述仅涵盖了一些常用的处理器和解析器。如需完整描述，请参考\
  \ Spring 框架参考文档及其 Javadoc。\n\n#### Spring MVC 配置\n\n要在 Web 应用程序中启用 Spring MVC，需要进行一些初始配置，特别是\
  \ Web 部署描述符 `web.xml`。自 Spring 3.1 起，在 Servlet 3.0 Web 容器中支持基于代码的配置。这为 Web 部署描述符文件（`web.xml`）中所需的\
  \ XML 配置提供了一种替代方案。\n\n![](img/524962_1_En_14_Figc_HTML.jpg) 一个表示想法的符号。由一个电灯泡表示。 如果你对使用\
  \ XML 配置感兴趣，请查阅 *Pro Spring 4*，本书 Java 版本的第四版。\n\n要为 Web 应用程序配置 Spring MVC 支持，我们需要对\
  \ Web 部署描述符执行以下配置：\n\n*   配置根 `WebApplicationContext`\n\n*   配置 Spring MVC 所需的 Servlet\
  \ 过滤器\n\n*   配置应用程序中的调度器 Servlet\n\n在 Spring 中有多种方法可以做到这一点，但最简单的方法是扩展 `AbstractAnnotationConfigDispatcherServletInitializer`，这是来自\
  \ `org.springframework.web.servlet.support` 包的 Spring 工具类，如清单 14-5 所示。\n\n```\n\
  package com.apress.prospring6.fourteen\nimport org.springframework.web.filter.CharacterEncodingFilter\n\
  import org.springframework.web.filter.HiddenHttpMethodFilter\nimport org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer\n\
  import jakarta.servlet.Filter\nimport java.nio.charset.StandardCharsets\nclass WebInitializer\
  \ : AbstractAnnotationConfigDispatcherServletInitializer() {\noverride fun getRootConfigClasses():\
  \ Array> {\nreturn arrayOf(BasicDataSourceCfg::class.java, TransactionCfg::class.java)\n\
  }\noverride fun getServletConfigClasses(): Array> {\nreturn arrayOf(WebConfig::class.java)\n\
  }\noverride fun getServletMappings(): Array {\nreturn arrayOf(\"/\")\n}\noverride\
  \ fun getServletFilters(): Array {\nval cef = CharacterEncodingFilter().apply {\n\
  encoding = StandardCharsets.UTF_8.name()\nsetForceEncoding(true)\n}\nreturn arrayOf(HiddenHttpMethodFilter(),\
  \ cef)\n}\n}\n清单 14-5\nSpring Web 应用程序上下文的配置类\n```\n\n`AbstractAnnotationConfigDispatcherServletInitializer`\
  \ 类实现了 `org.springframework.web.WebApplicationInitializer` 类。在 Servlet 环境中需要实现此接口，以便以编程方式配置\
  \ `ServletContext`。Spring 提供了多个实现，如图 14-4 所示，具体取决于用户自定义需求的复杂程度。\n\n![](img/524962_1_En_14_Fig4_HTML.jpg)\n\
  \n流程图从 Web 初始化器开始，随后是抽象注解配置调度器 Servlet 初始化器和 Web 应用程序初始化器。抽象调度器 Servlet 初始化器和抽象上下文加载器初始化器指向\
  \ Web 应用程序初始化器。\n\n图 14-4\n\nSpring `WebApplicationInitializer` 实现\n\n在前面的示例中，使用了\
  \ Spring 类 `AbstractAnnotationConfigDispatcherServletInitializer`，因为它包含了配置使用基于 Kotlin\
  \ 的 Spring 配置的 Spring Web 应用程序所需方法的具体实现。\n\n所有实现 `WebApplicationInitializer` 接口的类都会被\
  \ `org.springframework.web.SpringServletContainerInitializer` 类自动检测到。从 Spring 6\
  \ 开始，此类实现了 Servlet 3.0 的 `jakarta.servlet.ServletContainerInitializer` 接口，该接口在任何\
  \ Servlet 3.0 容器中自动引导。如清单 14-5 所示，以下方法被重写以插入自定义配置：\n\n*   `getRootConfigClasses()`：将使用此方法返回的配置类创建一个类型为\
  \ `AnnotationConfigWebApplicationContext` 的根应用程序上下文。\n\n\n\n*   `getServletConfigClasses()`：将使用此方法返回的配置类创建一个类型为\
  \ `AnnotationConfigWebApplicationContext` 的 Web 应用上下文。\n\n*   `getServletMappings()`：`DispatcherServlet`\
  \ 的映射（上下文）由此方法返回的字符串数组指定。\n\n*   `getServletFilters()`：此方法返回一个 `jakarta.servlet.Filter`\
  \ 实现数组，这些过滤器将应用于每个请求。\n\n回到过滤器，表 14-1 描述了 `getServletFilters()` 返回的数组中的每个过滤器。\n\n\
  表 14-1\n\n常用的 Spring MVC Servlet 过滤器\n\n| 过滤器类全名 | 描述 |\n| --- | --- |\n| `org.springframework.web.filter.CharacterEncodingFilter`\
  \ | 此过滤器用于指定请求的字符编码。 |\n| `org.springframework.web.filter.HiddenHttpMethodFilter`\
  \ | 此过滤器提供对 GET 和 POST 之外的 HTTP 方法（例如 PUT）的支持。 |\n\n![](img/524962_1_En_14_Figd_HTML.jpg)\
  \ 一个警告符号。它由带阴影三角形内的感叹号表示。 虽然此处不需要（因此也未在配置中使用），但有一个过滤器实现值得一提：`org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter`。此实现将\
  \ JPA `EntityManager` 绑定到线程，以处理整个请求。它旨在用于 Open `EntityManager` in View 模式，允许在 Web\
  \ 视图中进行延迟加载，即使原始事务已经完成。虽然实用，但它相当危险，因为多个请求最终可能会消耗掉所有数据库允许的开放连接。此外，如果要加载的数据集很大，应用程序可能会冻结。这就是开发人员倾向于不使用它的原因，而是通过\
  \ Ajax 请求调用特定的处理器，在 Web 特定的视图对象（而非实体）中加载数据。\n\n#### 在 Spring MVC 中创建第一个视图\n\n有了服务层和\
  \ Spring MVC 配置，我们就可以开始实现第一个视图了。在本节中，我们将实现一个简单的视图，用于显示保存在 `SINGER` 表中的所有歌手。\n\n\
  正如本章开头所述，Thymeleaf 用于设计 HTML 页面。Thymeleaf 是一个现代的服务器端 Java 模板引擎，适用于 Web 和独立环境，并且由于它是专门为\
  \ Spring 应用程序创建的，因此可以与 Spring 应用程序平滑集成。要将 Thymeleaf 与 Spring Web 应用程序集成，需要将 Thymeleaf\
  \ 库放在类路径上。现在是时候列出 `chapter-14` 项目的依赖项了，该项目代表一个 Spring MVC 应用程序，打包为 Web 应用程序归档 (WAR)\
  \ 文件，并部署在 Apache Tomcat 10^(¹³¹) 服务器上。\n\n图 14-5 在 Gradle 视图中显示了 `chapter-14` 项目的依赖项。\n\
  \n![](img/524962_1_En_14_Fig5_HTML.jpg)\n\n第 14 章项目的截图。它列出了任务和依赖项。依赖项列表包括 Jakarta\
  \ service jakarta servlet、org spring framework spring web m v c、thyme leaf extras\
  \ thyme af extra java 8 times、thyme leaf spring 6.3.1.1 release。\n\n图 14-5\n\n显示\
  \ `chapter-14` 项目依赖项的 Gradle 视图\n\n标记为 (1) 的库 `jakarta.servlet-api` 库^(¹³²) 是 Jakarta\
  \ 项目的一部分，包含开发 Web 应用程序所需的所有接口、类和方法。要开发 Spring Web 应用程序，我们需要在此基础上构建。此库的 6.0.0 版本适用于与\
  \ Apache Tomcat 10 兼容的 Web 应用程序。\n\n标记为 (2) 的库 `spring-webmvc` 包含用于开发 Spring Web\
  \ 应用程序的所有接口和类。Spring Web MVC 构建在 Servlet API 之上，是 Spring 框架的一部分。6.x 版本与 Jakarta\
  \ EE 9 兼容。\n\n标记为 (3) 的库 `thymeleaf-spring6` 提供了所有用于将 Thymeleaf 与 Spring 集成的接口和类。\n\
  \n\n\n#### 配置 `DispatcherServlet`\n\n下一步是配置 `DispatcherServlet`。这通过创建一个配置类来实现，该类定义了\
  \ Spring Web 应用程序所需的所有基础设施 Bean。`chapter-14` 项目基于 Kotlin 配置的类如清单 14-6 所示。\n\n```\n\
  package com.apress.prospring6.fourteen\nimport org.springframework.context.annotation.Description\n\
  import org.springframework.web.servlet.DispatcherServlet\nimport org.springframework.web.servlet.ViewResolver\n\
  import org.springframework.web.servlet.config.annotation.*\nimport org.thymeleaf.extras.java8time.dialect.Java8TimeDialect\n\
  import org.thymeleaf.spring6.SpringTemplateEngine\nimport org.thymeleaf.spring6.templateresolver.SpringResourceTemplateResolver\n\
  import org.thymeleaf.spring6.view.ThymeleafViewResolver\nimport org.thymeleaf.templatemode.TemplateMode\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = [\"com.apress.prospring6.fourteen\"\
  ])\nopen class WebConfig : WebMvcConfigurer, ApplicationContextAware {\nprivate\
  \ var applicationContext: ApplicationContext? = null\n@Throws(BeansException::class)\n\
  override fun setApplicationContext(applicationContext: ApplicationContext) {\nthis.applicationContext\
  \ = applicationContext\n}\n@Bean\nopen fun templateResolver() =\nSpringResourceTemplateResolver().apply\
  \ {\nsetApplicationContext(applicationContext!!)\nprefix = \"/WEB-INF/views/\"\n\
  suffix = \".html\"\ntemplateMode = TemplateMode.HTML\nisCacheable = false\n}\n@Bean\n\
  @Description(\"Thymeleaf 模板引擎\")\nopen fun templateEngine() = SpringTemplateEngine().apply\
  \ {\naddDialect(Java8TimeDialect())\nsetTemplateResolver(templateResolver())\nsetTemplateEngineMessageSource(messageSource())\n\
  enableSpringELCompiler = true\n}\n@Bean\n@Description(\"Thymeleaf 视图解析器\")\nopen\
  \ fun viewResolver() = ThymeleafViewResolver().apply {\ntemplateEngine = templateEngine()\n\
  order = 1\n}\n// 声明我们的静态资源。我们在 Java 配置中添加了缓存，但这不是必需的。\noverride fun addResourceHandlers(registry:\
  \ ResourceHandlerRegistry) {\nsuper.addResourceHandlers(registry)\nregistry.addResourceHandler(\"\
  /images/**\", \"/styles/**\")\n.addResourceLocations(\"/images/\", \"/styles/\"\
  )\n}\noverride fun configureDefaultServletHandling(configurer:\nDefaultServletHandlerConfigurer)\
  \ {\nconfigurer.enable();\n}\noverride fun addViewControllers(registry: ViewControllerRegistry)\
  \ {\nregistry.addRedirectViewController(\"/\", \"/home\")\n}\n}\n清单 14-6\nSpring\
  \ 的 DispatcherServlet 的配置类\n```\n\n接口 `WebMvcConfigurer` 定义了用于自定义基于 Kotlin 配置的回调方法，并且通过使用\
  \ `@EnableWebMvc` 来启用 Spring MVC。尽管一个 Spring 应用程序中可以有多个基于 Kotlin 的配置类，但只允许其中一个使用\
  \ `@EnableWebMvc` 注解。在清单 14-6 中，你可以看到重写了几个方法来自定义配置：\n\n*   `addResourceHandlers(..)`：添加用于从\
  \ Web 应用程序根目录、类路径等特定位置提供静态资源（如图片、JavaScript 和 CSS 文件）的处理器。在此自定义实现中，任何包含资源的 URL 请求都将由一个绕过所有过滤器的特殊处理器处理。该方法定义了静态资源文件的位置，使\
  \ Spring MVC 能够高效地处理这些文件夹内的文件。在标签内，`location` 属性定义了静态资源的文件夹。调用 `WebMvcConfigurer.super.addResourceHandlers(registry)`\
  \ 表示 Web 应用程序的根文件夹，默认为 `/src/main/webapp`。资源处理器路径 `/styles/**` 定义了映射到 CSS 资源的 URL；例如，对于\
  \ URL `http://localhost:8080/ch14/styles/standard.css`，Spring MVC 将从文件夹 `/src/main/webapp/styles`\
  \ 中检索文件 `standard.css`。\n\n*   `configureDefaultServletHandling(..)`：允许将 `DispatcherServlet`\
  \ 映射到 Web 应用程序的根上下文 URL，同时仍然允许静态资源请求由容器的默认 Servlet 处理。\n\n*   `addViewControllers(..)`：定义简单的自动控制器，这些控制器预先配置了响应状态码和/或用于渲染响应体的视图。这些视图没有控制器逻辑，用于渲染欢迎页面、执行简单的站点\
  \ URL 重定向、返回 404 状态等。在清单 14-6 中，我们使用此方法在访问站点根路径（`/`）时执行重定向到 `home` 视图，这基本上将主页变成了首页。\n\
  \n*   `viewResolver(..)`：声明一个类型为 `ThymeleafViewResolver` 的视图解析器，它将符号视图名称匹配到 `/WEB-INF/views`\
  \ 下的 *.html 模板。Thymeleaf 是一个模板工具，通过组合多个片段根据逻辑名称生成视图；此工作由本配置中声明的 `SpringResourceTemplateResolver`\
  \ Bean 执行。最终的视图是一个 HTML 页面，通过将 Thymeleaf 特殊构造替换为与 Spring 视图数据一起编译的 HTML 元素来构建，这由\
  \ `SpringTemplateEngine` 负责处理。\n\n#### 实现 Spring 控制器\n\n`home` 视图很简单，是介绍 Spring\
  \ 控制器的最佳示例。*Spring 控制器* 是使用特殊原型注解 `@Controller` 及其扩展（如 `@RestController`，将在**第**\
  \ **15** 章中介绍）进行注解的特殊 Bean。\n\n`HomeController` 类如清单 14-7 所示。\n\n```\npackage com.apress.prospring6.fourteen.controllers\n\
  import org.springframework.stereotype.Controller\nimport org.springframework.ui.Model\n\
  import org.springframework.web.bind.annotation.RequestMapping\nimport org.springframework.web.bind.annotation.RequestMethod\n\
  @Controller\nclass HomeController {\n@GetMapping(path = [\"home\"])\nfun home(model:\
  \ Model): String {\nmodel.addAttribute(\"message\", \"Spring MVC Thymeleaf 示例！！\"\
  )\nreturn \"home\"\n}\n}\n清单 14-7\nHomeController 类与 Bean 声明\n```\n\n注解 `@Controller`\
  \ 应用于该类，表明它是一个 Spring MVC 控制器。`@RequestMapping` 注解指明了将由该注解所在方法处理的 URL。控制器类有时被称为*处理器*，因为它处理请求，而方法被称为*处理器方法*，因为它们也处理请求。通常，处理器方法处理那些在类级别使用\
  \ `@RequestMapping` 注解声明了公共根路径的请求；控制器类只是将它们分组的一种方式。\n\n放置在 `home(..)` 方法上的 `@RequestMapping`\
  \ 注解通过 `method` 属性映射到 HTTP GET 方法。这意味着任何对 URL `/home` 的 GET 请求都将由此方法处理。在此方法体内，`\"\
  Spring MVC Thymeleaf 示例！！\"` 被设置为 `Model` 对象上 `message` 属性的值。在 `DispatcherServlet`\
  \ 配置中，`ThymeleafViewResolver` 被配置为视图解析器，其文件前缀为 `/WEB-INF/views/`，后缀为 `.html`。因此，Spring\
  \ MVC 将选取文件 `/WEB-INF/views/singers/home.html` 作为视图，并使用 `Model` 对象中的数据渲染它。\n\n\n\
  \n#### 实现视图\n\n`home.html` Thymeleaf 模板相当简单，如清单 14-8 所示。\n\n```\n\n清单 14-8\n/WEB-INF/views/singers/home.html\
  \ Thymeleaf 视图文件的内容\n```\n\n任何见过 HTML 代码的人都会觉得这个模板非常眼熟。唯一额外的部分是所有以 `th:` 为前缀的元素。这个模板之所以看起来如此简单，是因为其主要部分位于另一个名为*布局*的模板中。该模板包含了网站的整体布局，对于每个视图，Thymeleaf\
  \ 会将其部分内容替换为特定作用域的内容。网站的整体模板位于 `chapter14/src/main/webapp/WEB-INF/views/templates/`\
  \ 目录下，名为 `layout.html`。由于本书的重点是 Spring 而非 Thymeleaf，且 `layout.html` 文件较大，此处不再展示（欢迎读者自行在项目仓库中查阅）；仅对少量\
  \ Thymeleaf 结构进行说明。清单 14-8 中的 Thymeleaf 结构解释如下：\n\n*   `th:replace`：将 `home.html`\
  \ 模板中的 `<head>` 标签替换为 `templates/layout.html` 中的片段，但将标题替换为作为自定义函数 `pageTitle(..)`\
  \ 参数提供的值。\n*   `th:fragment`：将 `templates/layout.html` 中的片段替换为 `home.html` 中声明的片段。在此示例中，`templates/layout.html`\
  \ 中声明的 `pageContent` 部分是一个非常简单的通用片段，因此在每个继承的视图中，都需要将其替换为适当的内容。\n\n##### 测试主页视图\n\
  \n视图文件位于 `webapp` 目录下的 `WEB-INF` 目录中，该目录汇集了所有 Web 资源。项目的内部结构是 Web 项目典型的 Maven 结构，并为\
  \ Gradle 配置了各种插件，以便将项目构建成可部署在 Apache Tomcat 服务器上的 WAR 文件。项目结构如图 14-6 所示（Maven 的\
  \ `.pom` 构建文件不属于 Kotlin 项目源码，因为我们专注于 Gradle）。\n\n![](img/524962_1_En_14_Fig6_HTML.jpg)\n\
  \n第 14 章下拉菜单的截图。在 s r 选项下，web app 被高亮显示。从第 14 章文件夹构建菜单中选择了 web app、views 和 layout\
  \ 选项。\n\n图 14-6\n\n`chapter-14` 项目的内部结构\n\n测试 `home.html` 视图有两种方式：\n\n*   编写一个 Spring\
  \ MVC 测试来测试视图的映射和模型的填充。\n*   构建项目，将生成的 WAR 文件部署到本地 Apache Tomcat，然后检查主页。\n\n为非常简单的视图和控制器编写测试相当简单。当应用程序上下文变得更加复杂且需要注入更多依赖时，测试可能会更复杂，但并非不可能。清单\
  \ 14-9 展示了测试类和方法，用于检查 `/home` 路径到 `HomeController#home(..)` 方法的正确映射，以及为 `home.html`\
  \ 视图填充模型的情况。\n\n```\npackage com.apress.prospring6.fourteen.controllers\nimport\
  \ com.apress.prospring6.fourteen.WebConfig\nimport org.junit.jupiter.api.Test\n\
  import org.springframework.test.context.junit.jupiter.web.SpringJUnitWebConfig\n\
  import org.springframework.test.web.servlet.MockMvc\nimport org.springframework.test.web.servlet.request.MockMvcRequestBuilders\n\
  import org.springframework.test.web.servlet.setup.MockMvcBuilders\nimport org.springframework.web.context.WebApplicationContext\n\
  import org.hamcrest.Matchers.containsString\nimport org.springframework.test.web.servlet.result.MockMvcResultHandlers.print\n\
  import org.springframework.test.web.servlet.result.MockMvcResultMatchers.*\n@SpringJUnitWebConfig(classes\
  \ = [WebConfig::class])\nclass HomeControllerTest(wac: WebApplicationContext) {\n\
  var mockMvc: MockMvc\ninit {\nmockMvc = MockMvcBuilders.webAppContextSetup(wac).build()\n\
  }\n@Test\n@Throws(Exception::class)\nfun testHome() {\nmockMvc.perform(MockMvcRequestBuilders.get(\"\
  /home\"))\n.andDo(MockMvcResultHandlers.print())\n.andExpect(MockMvcResultMatchers.status().isOk())\n\
  .andExpect(MockMvcResultMatchers.view().name(\"home\"))\n.andExpect(\nMockMvcResultMatchers.content()\n\
  .string(Matchers.containsString(\"Spring MVC ThymeleafExample!!\"))\n)\n}\n}\n清单\
  \ 14-9\n测试 HomeController 和 home.html 视图\n```\n\n`MockMvc` 基于 `spring-test` 模块中的\
  \ Servlet API 模拟实现构建，不依赖于正在运行的容器，但仍需要 `servlet-api` 依赖。这不是端到端测试，它能工作是因为 `HomeController`\
  \ 没有调用服务层和/或数据仓库层。\n\n`MockMvcRequestBuilders.get(..)` 方法创建一个 `MockHttpServletRequest`\
  \ 实例，该实例配置了为其设置的参数以创建有效请求。`MockMvc` 在通过 `@SpringJUnitWebConfig` 注解配置的上下文中执行请求。此注解是一个特殊的\
  \ Spring 测试注解，用于为 Spring Web 应用程序配置测试上下文。它使用 `@ExtendWith(SpringExtension.class)`\
  \ 进行元注解，用于注册 `SpringExtension`，该扩展将 Spring TestContext 框架集成到 JUnit 5 的 Jupiter 编程模型中。\n\
  \n\n\n它还通过 `@ContextConfiguration` 进行了元注解，用于确定如何加载和配置集成测试所需的 `ApplicationContext`。同时，它还通过\
  \ `@WebAppConfiguration` 进行了元注解，用于配置测试时应加载一个 `WebApplicationContext`，并使用 Web 应用根路径的默认值。\n\
  \n该测试检查了响应的所有重要部分：\n\n*   通过 `.andExpect(status().isOk())` 匹配器，验证 HTTP 响应码是否符合预期。\n\
  *   通过 `.andExpect(view().name(\"home\"))` 匹配器，验证逻辑视图名称是否符合预期。\n*   通过 `.andExpect(content().string(containsString(\"\
  Spring MVC ThymeleafExample!!\")))` 匹配器，验证添加到 Spring `Model` 实例中的属性是否已呈现在渲染后的视图中。\n\
  \n另一种检查主页是否正确渲染的方法是将应用实际部署。为此，你需要执行以下操作：\n\n*   构建项目，生成 `build/libs/chapter14-6.0-SNAPSHOT.war`\
  \ 文件。\n*   下载并安装 Apache Tomcat 10。\n\n![](img/524962_1_En_14_Fige_HTML.jpg) 警告符号。由一个带阴影三角形内的感叹号表示。 在基于\
  \ Unix 的系统上，你可能需要使 `$TOMCAT_HOME/bin` 下的所有脚本具有可执行权限。\n\n*   使用 IntelliJ IDEA 的 Tomcat\
  \ 启动器部署 `chapter14-6.0-SNAPSHOT.war` 文件。\n\n要创建 Apache Tomcat 启动器，请按照 IntelliJ 官方页面^(¹³³)上的说明操作。\n\
