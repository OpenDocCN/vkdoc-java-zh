  proxy.foo()

  LOGGER.info("\t 尝试在 ControlFlowDemo.test() 下调用")

  test(proxy)

  }

  private fun test(bean: TestBean) {

  bean.foo()

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(ControlFlowDemo::class.java)

  @JvmStatic

  fun main(args: Array) {

  val ex = ControlFlowDemo()

  ex.run()

  }

  }

