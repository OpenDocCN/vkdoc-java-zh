  在清单 11-18 的测试方法中，构造了一个 `Blogger` 对象，其 `firstName` 被设置为空 `String` 值。然后，从 `ApplicationContext`
  中获取 `validator` bean。为了存储验证结果，使用待验证的对象及其名称（即第二个参数的作用）构造了一个 `BeanPropertyBindingResult`
  类的实例。这对于将错误报告给链中的下一个服务或进行日志记录可能很有用。为了执行验证，调用了 `ValidationUtils.invokeValidator()`
  方法，然后使用一个普通的断言语句检查返回的错误对象数量。由于创建的 `Blogger` 实例没有 `firstName`，验证失败，并创建了一个带有 `field.required`
  错误代码的错误对象。


  这个示例展示了一个非常简单的验证，仅检查对象的某个属性是否为空，但 `validate(..)` 方法可以更加复杂，根据不同的规则测试对象的更多属性。


  ![](img/524962_1_En_11_Figf_HTML.jpg) 一个带有圆角的三角形中的感叹号。 `null` 值与空 `String` 值不同，因此
  `firstName` 为 `null` 的 `Blogger` 对象不会违反 `SimpleBloggerValidator` 类所描述的验证规则。


  例如，清单 11-19 中的 `BloggerValidator` 版本会检查 `firstName` 或 `lastName` 中至少有一个存在且不为 `null`（`StringUtils.isEmpty(..)`
  方法确保了这一点），并且 `birthDate` 在 1983 年 1 月 1 日之后。


  ```

  package com.apress.prospring6.eleven.validator

  import org.apache.commons.lang3.StringUtils

  // 导入语句已省略

  @Component("complexBloggerValidator")

  class ComplexBloggerValidator : Validator {

  override fun supports(clazz: Class): Boolean {

  return Blogger::class.java == clazz

  }

  override fun validate(target: Any, errors: Errors) {

  val b = target as Blogger

  if (StringUtils.isEmpty(b.firstName) && StringUtils.isEmpty(b.lastName)) {

  errors.rejectValue("firstName", "firstNameOrLastName.required")

  errors.rejectValue("lastName", "firstNameOrLastName.required")

  }

  if (b.birthDate.isBefore(LocalDate.of(1983, 1, 1))) {

  errors.rejectValue("birthDate", "birthDate.greaterThan1983")

  }

  }

  }

