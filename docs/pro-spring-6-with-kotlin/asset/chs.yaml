- '# 15. Spring REST 支持


  第 13 章介绍了两个暴露 REST API 的 Spring Web 应用之间通过 HTTP 协议进行的通信。本章将扩展这一主题，向你介绍 RESTful Web
  服务（也称为 RESTful-WS）。


  如今，RESTful-WS 或许是远程访问中使用最广泛的技术。从通过 HTTP 进行远程服务调用，到支持 Ajax 风格的交互式 Web 前端，RESTful-WS
  正被大量采用，这尤其得益于微服务的兴起。RESTful Web 服务之所以流行，有以下几个原因。


  *   **易于理解**：RESTful Web 服务围绕 HTTP 设计。URL 与 HTTP 方法共同指定了请求的意图。例如，URL [`http://somedomain.com/restful/customer/1`](http://somedomain.com/restful/customer/1)
  配合 HTTP 方法 `GET` 表示客户端想要检索客户信息，其中客户 ID 等于 1。


  *   **轻量级**：与基于 SOAP 的 Web 服务相比，RESTful 要轻量得多。SOAP 服务包含大量元数据来描述客户端想要调用哪个服务。而对于 RESTful
  的请求和响应，它就像任何其他 Web 应用一样，仅仅是一个 HTTP 请求和响应。


  *   **防火墙友好**：由于 RESTful Web 服务设计为可通过 HTTP（或 HTTPS）访问，因此应用对防火墙更加友好，远程客户端也更容易访问。


  在本章中，我们将介绍 RESTful-WS 的基本概念，以及 Spring 通过其 Spring MVC 模块对 RESTful-WS 的支持。


  ## 介绍 RESTful Web 服务


  RESTful-WS 中的 REST 是 **RE**presentational **S**tate **T**ransfer（表述性状态转移）的缩写，它是一种架构风格。REST
  定义了一组架构约束，这些约束共同描述了一个用于访问资源的统一接口。该统一接口的主要概念包括资源的标识以及通过表述对资源进行操作。


  对于资源的标识，一条信息应能通过统一资源标识符（URI）访问。例如，URL [`http://somedomain.com/api/singer/1`](http://somedomain.com/api/singer/1)
  是一个 URI，它通常代表一个资源，即一条标识符为 1 的歌手信息。如果标识符为 1 的歌手不存在，客户端可能会收到一个 404 HTTP 状态码，就像网站上的“页面未找到”错误。另一个例子，[`http://somedomain.com/api/singers`](http://somedomain.com/api/singers)
  是一个 URI，它可能代表一个资源，即歌手信息列表。这些可识别的资源可以通过各种表述进行管理，如表 15-1 所示。


  表 15-1


  用于操作资源的表述


  | HTTP 方法 | 描述 |

  | --- | --- |

  | `GET` | GET 检索资源的表述。 |

  | `HEAD` | 与 GET 相同，但没有响应体。通常用于获取头部信息。 |

  | `POST` | POST 创建新资源。 |

  | `PUT` | PUT 更新资源。 |

  | `DELETE` | DELETE 删除资源。 |

  | `OPTIONS` | OPTIONS 检索允许的 HTTP 方法。 |


  关于 RESTful Web 服务的详细描述，我们推荐 *Ajax and REST Recipes: A Problem-Solution Approach
  by Christian Gross*（Apress, 2006）。


  ### 使用 Spring MVC 暴露 RESTful Web 服务


  在本节中，我们将向你展示如何使用 Spring MVC 将歌手服务作为 RESTful Web 服务暴露出来，正如上一节所设计的那样。本示例基于已介绍的 `Singer`
  类和 `SingerRepo` 仓库接口构建。


  信息 在本书的上一版中，使用了 Castor^(¹⁴²) XML 进行序列化。在本版中，由于 Castor 库已有一段时间未维护，因此改用 Jackson^(¹⁴³)。


  Jackson 库功能非常强大，提供了将对象序列化为 JSON 和 XML 的组件。通过注解可以轻松地将 Java 属性映射到 XML 元素或 JSON 属性。尽管
  Jackson 注解命名为 `@Json*`，但它们同样可以作为 XML 序列化的配置。清单 15-1 展示了使用 Jackson 注解修饰的 `Singer`
  类。


  ```

  package com.apress.prospring6.fifteen.entities

  import com.fasterxml.jackson.annotation.JsonFormat

  import com.fasterxml.jackson.annotation.JsonIgnore

  // 其他导入语句已省略

  @Entity

  @Table(name = "SINGER")

  class Singer {

  @JsonIgnore // 不进行序列化

  @Id

  @GeneratedValue(strategy = GenerationType.IDENTITY)

  @Column(name = "ID")

  var id: Long? = null

  @JsonIgnore // 不进行序列化

  @Version

  @Column(name = "VERSION")

  var version = 0

  @Column(name = "FIRST_NAME")

  var firstName: @NotEmpty @Size(min = 2, max = 30) String? = null

  @Column(name = "LAST_NAME")

  var lastName: @NotEmpty @Size(min = 2, max = 30) String? = null

  @JsonFormat(pattern = "yyyy-MM-dd")

  @DateTimeFormat(pattern = "yyyy-MM-dd")

  @Column(name = "BIRTH_DATE")

  var birthDate: LocalDate? = null

  companion object {

  @Serial

  private val serialVersionUID = 2L

  }

  override fun equals(other: Any?): Boolean {

  if (this === other) return true

  if (javaClass != other?.javaClass) return false

  other as Singer

  if (id != other.id) return false

  if (firstName != other.firstName) return false

  if (lastName != other.lastName) return false

  return birthDate == other.birthDate

  }

  override fun hashCode(): Int {

  var result = id?.hashCode() ?: 0

  result = 31 * result + (firstName?.hashCode() ?: 0)

  result = 31 * result + (lastName?.hashCode() ?: 0)

  result = 31 * result + (birthDate?.hashCode() ?: 0)

  return result

  }

  override fun toString(): String {

  return "Singer(id=$id, version=$version, firstName=$firstName, lastName=$lastName,
  birthDate=$birthDate)"

  }

  }

  清单 15-1

  使用 Jackson 注解修饰的更新后的 Singer 类

  ```


  默认情况下，Jackson 知道如何序列化为文本值的所有 `Singer` 字段都会被序列化。如果并非所有字段都需要序列化，例如 `version` 字段，则使用
  `@JsonIgnore` 注解告诉 Jackson 跳过这些字段。


  对于复杂类型（如日历日期），有两种选择：使用配置了我们希望日期值转换成的模式的 `@JsonFormat` 注解，或者扩展 `com.fasterxml.jackson.databind.ser.std.StdSerializer`。




  ### 实现 `SingerController`


  为简单起见，我们将跳过声明 `SingerService`，直接编写一个使用 `SingerRepo` 的 `SingerController`。`SingerController`
  如代码清单 15-2 所示。


  ```

  package com.apress.prospring6.fifteen.controllers

  import org.springframework.stereotype.Controller

  import org.springframework.web.bind.annotation.*

  // 其他 import 语句已省略

  @Controller

  @ResponseBody

  @RequestMapping(path = ["singer"])

  class SingerController(private val singerRepo: SingerRepo) {

  @ResponseStatus(HttpStatus.OK) // @GetMapping(path={"/", ""})

  @RequestMapping(path = ["/", ""], method = [RequestMethod.GET])

  fun all(): List {

  return singerRepo.findAll()

  }

  @ResponseStatus(HttpStatus.OK) //@GetMapping(path = "/{id}")

  @RequestMapping(path = ["/{id}"], method = [RequestMethod.GET])

  fun findSingerById(@PathVariable id: Long): Singer? {

  return singerRepo.findById(id).orElse(null)

  }

  @ResponseStatus(HttpStatus.CREATED) //@PostMapping(path="/")

  @RequestMapping(path = ["/"], method = [RequestMethod.POST])

  fun create(@RequestBody singer: Singer): Singer {

  LOGGER.info("Creating singer: {}", singer)

  val saved = singerRepo.save(singer)

  LOGGER.info("Singer created successfully with info: $saved")

  return singer

  }

  @ResponseStatus(HttpStatus.OK) //@PutMapping(value="/{id}")

  @RequestMapping(path = ["/{id}"], method = [RequestMethod.PUT])

  fun update(

  @RequestBody singer: Singer,

  @PathVariable id: Long

  ) { // 如果启用验证，则无法提供缺少字段的 Singer

  LOGGER.info("Updating singer: {}", singer)

  val fromDb = singerRepo.findById(id).orElseThrow { IllegalArgumentException("Singer
  does not exist!") }

  fromDb.firstName = singer.firstName

  fromDb.lastName= singer.lastName

  fromDb.birthDate = singer.birthDate

  singerRepo.save(fromDb)

  LOGGER.info("Singer updated successfully with info: $fromDb")

  }

  @ResponseStatus(HttpStatus.NO_CONTENT) //@DeleteMapping(value="/{id}")

  @RequestMapping(path = ["/{id}"], method = [RequestMethod.DELETE])

  fun delete(@PathVariable id: Long) {

  LOGGER.info("Deleting singer with id: {}", id)

  singerRepo.deleteById(id)

  LOGGER.info("Singer deleted successfully")

  }

  companion object {

  val LOGGER = LoggerFactory.getLogger(SingerController::class.java)

  }

  }

  代码清单 15-2

  SingerController 实现

  ```


  上述类的主要要点如下：


  *   该类使用 `@Controller` 注解，表明它是一个 Spring MVC 控制器。


  *   类级别的 `@RequestMapping(value="/singer")` 注解表明该控制器将映射到主 Web 上下文下的所有 URL。在此示例中，`http://localhost:8080/singer`
  下的所有 URL 都将由此控制器处理。


  *   此控制器需要 `SingerRepo` 才能工作。


  *   每个方法上的 `@RequestMapping` 注解指明了其将映射到的 URL 模式和对应的 HTTP 方法。例如，`all()` 方法将映射到 `http://localhost:8080/singer`
  URL，并使用 HTTP `GET` 方法。对于 `update(..)` 方法，它将映射到 URL `http://localhost:8080/singer/1`，并使用
  HTTP PUT 方法。


  *   此控制器与**第** **14** 章介绍的控制器有何不同？是什么让一个控制器被用于 REST 请求？有两方面：一是每个处理方法上都放置了 `@ResponseBody`
  注解，二是处理方法不返回逻辑视图名称。`@ResponseBody` 注解表示方法返回值应绑定到 Web 响应体，用更专业的技术术语来说，就是方法返回的值实际上就是
  Web 响应。如果觉得在每个方法上都标注 `@ResponseBody` 显得冗长，你可以轻松地通过在类上只使用一次来跳过，但这意味着控制器中的任何方法都不应返回视图或视图名称。


  *   对于接受路径变量的方法（例如 `findSingerById(..)` 方法），路径变量使用 `@PathVariable` 注解。这指示 Spring
  MVC 将 URL 中的路径变量（例如 `http://localhost:8080/singer/1`）绑定到 `findSingerById(..)` 方法的
  `id` 参数。请注意，对于 `id` 参数，其类型是 `Long`，Spring 的类型转换系统会自动为我们处理从 `String` 到 `Long` 的转换。


  *   对于 `create(..)` 和 `update(..)` 方法，`Singer` 参数使用 `@RequestBody` 注解。这指示 Spring
  自动将 HTTP 请求体中的内容绑定到 `Singer` 领域对象。转换将由已声明的 `HttpMessageConverter<Object>` 接口（位于
  `org.springframework.http.converter` 包下）的实例完成，以支持各种格式，这将在本章后面讨论。


  Spring 4.3 版本引入了 `@RequestMapping` 注解的一些定制化，以匹配基本的 HTTP 方法。表 15-2 列出了新注解与旧式 `@RequestMapping`
  之间的等价关系。


  表 15-2

  Spring 4.3 引入的用于将 HTTP 方法请求映射到特定处理方法的注解


  | 注解 | 旧式等价写法 |

  | --- | --- |

  | `@GetMapping` | `@RequestMapping(method = RequestMethod.GET)` |

  | `@PostMapping` | `@RequestMapping(method = RequestMethod.POST)` |

  | `@PutMapping` | `@RequestMapping(method = RequestMethod.PUT)` |

  | `@DeleteMapping` | `@RequestMapping(method = RequestMethod.DELETE)` |


  Spring 4.0 还为 REST 控制器类引入了另一个原型注解，称为 `@RestController`。该注解同样声明在 `org.springframework.web.bind.annotation`
  包中，并且是元注解了 `@Controller` 和 `@ResponseBody`，这基本上赋予了它两者的能力。使用此注解以及表 15-2 中的注解，`SingerController`
  类变得更加简洁，如代码清单 15-3 所示。


