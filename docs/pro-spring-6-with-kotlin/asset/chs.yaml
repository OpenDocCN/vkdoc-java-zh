  ## Spring 中的验证


  验证是任何应用程序的关键组成部分。应用于领域对象的验证规则确保所有业务数据结构良好，并满足所有业务定义。理想情况是所有验证规则都维护在集中位置，并且对同一类型的数据应用相同的规则集，无论数据来自何种来源（例如，通过
  Web 应用来自用户输入、通过 Web 服务来自远程应用、来自 JMS 消息或来自文件）。


  谈到验证时，转换和格式化也很重要，因为在数据被验证之前，应根据为每种类型定义的格式化规则将其转换为所需的 POJO。例如，用户通过浏览器中的 Web 应用输入一些信息，然后将该数据提交到服务器。在服务器端，如果
  Web 应用是使用 Spring MVC 开发的，Spring 将从 HTTP 请求中提取数据，并根据格式化规则（例如，表示日期的 `String` 将根据格式化规则
  `yyyy-MM-dd` 转换为 `LocalDate` 字段）执行从 `String` 到所需类型的转换。这个过程称为*数据绑定*。当数据绑定完成且领域对象构建完成后，将对该对象应用验证，任何错误都将返回并显示给用户。如果验证成功，该对象将被持久化到数据库。


  Spring 支持两种主要的验证类型。第一种由 Spring 提供。验证器通过实现 `org.springframework.validation.Validator`
  接口来创建，如清单 11-16 所示。


  ```

  package org.springframework.validation;

  public interface Validator {

  boolean supports(Class clazz);

  void validate(Object target, Errors errors);

  }

  清单 11-16

  Spring 的 Validator 接口 103

  ```


  另一种验证类型是通过 Spring 对 JSR-349（Bean 验证）^(¹⁰⁴) 的支持。我们将在以下章节中介绍这两种验证类型。


  ### 使用 Spring Validator 接口


  使用 Spring 的 `Validator` 接口，我们可以通过创建一个实现该接口的类来开发一些验证逻辑。让我们看看它是如何工作的。对于到目前为止我们一直在使用的
  `Blogger` 类，假设名字不能为空。要针对此规则验证 `Blogger` 对象，需要一个自定义验证器。清单 11-17 展示了 `BloggerValidator`
  验证器类。


  ```

  package com.apress.prospring6.eleven.validator

  import org.springframework.validation.Errors

  import org.springframework.validation.ValidationUtils

  import org.springframework.validation.Validator

  // 其他导入语句已省略

  @Component("simpleBloggerValidator")

  class SimpleBloggerValidator : Validator {

  override fun supports(clazz: Class): Boolean {

  return Blogger::class.java == clazz

  }

  override fun validate(target: Any, errors: Errors) {

  ValidationUtils.rejectIfEmpty(errors, "firstName", "field.required")

  }

  }

  清单 11-17

  Blogger 类的自定义验证器

  ```


  验证器类实现了 `Validator` 接口并实现了两个方法。`supports(..)` 方法指示验证器是否支持对传入类类型的验证。`validate(..)`
  方法对传入的对象执行验证。结果将存储在 `org.springframework.validation.Errors` 接口的实例中。在 `validate(..)`
  方法中，我们仅对 firstName 属性进行检查，并使用便捷的 `ValidationUtils.rejectIfEmpty(..)` 方法来确保博主的名字不为空。最后一个参数是错误代码，可用于从资源包中查找验证消息以显示本地化的错误消息。


  ![](img/524962_1_En_11_Figd_HTML.jpg) 一个创意的符号，由电灯泡表示。 要将此 Bean 添加到 Spring 应用上下文中，需要在现有配置类上添加注解
  `@ComponentScan(basePackages = ["com.apress.prospring6.eleven.validator"])`，当应用程序启动时，它将被自动拾取。然而，在我们的测试方法中，我们避免使用该注解以防止测试上下文污染，而是从应用配置类
  `AppConfig` 以及测试所针对的任何其他验证器 Bean 类中显式构建它。


  ![](img/524962_1_En_11_Fige_HTML.jpg) 带阴影圆圈的感叹号。 任何进入系统的外部数据都需要被验证、转换并格式化为已知的类型。转换器、格式化器和验证器是处理用户提供数据的应用程序（例如带有表单的
  Web 应用，或从任何第三方来源导入数据的应用）所必需的组件。


  使用 Spring MVC 编写 Spring 应用的内容将在**第** **14** 章中介绍。在这类应用中，转换器、格式化器和验证器的强大功能才真正得以展现。由于我们尚未涉及该部分，本章中的应用上下文通过直接实例化创建，并且验证器被显式调用。`SimpleBloggerValidator`
  在清单 11-18 中进行了测试。




  ```

  package com.apress.prospring6.eleven

  import com.apress.prospring6.eleven.formatter.FormattingServiceCfg

  import com.apress.prospring6.eleven.validator.BloggerValidator

  import org.springframework.validation.BeanPropertyBindingResult

  import org.springframework.validation.ValidationUtils

  // 其他导入语句已省略

  class SpringValidatorTest {

  @Test

  @Throws(MalformedURLException::class)

  fun testSimpleBloggerValidator() {

  AnnotationConfigApplicationContext(

  AppConfig::class.java,

  FormattingServiceCfg::class.java,

  SimpleBloggerValidator::class.java

  ).use { ctx ->

  val blogger = Blogger("", "Pedala", LocalDate.of(2000, 1, 1),

  URL("https://none.co.uk"))

  val blogger2 =

  Blogger(null, "Pedala", LocalDate.of(2000, 1, 1), URL("https://none.co.uk"))

  val bloggerValidator =

  ctx.getBean(SimpleBloggerValidator::class.java)

  val result =

  BeanPropertyBindingResult(blogger, "blogger")

  ValidationUtils.invokeValidator(bloggerValidator, blogger, result)

  val errors = result.allErrors

  Assertions.assertEquals(1, errors.size)

  errors.forEach(Consumer { e: ObjectError ->

  LOGGER.info(

  "对象 ''{}'' 验证失败。错误代码: {}",

  e.objectName,

  e.code

  )

  })

  // ----------------''null'' 通过验证---------------------

  val result2 =

  BeanPropertyBindingResult(blogger2, "blogger2")

  ValidationUtils.invokeValidator(bloggerValidator, blogger2, result)

  val errors2 = result2.allErrors

  Assertions.assertEquals(0, errors2.size)

  }

