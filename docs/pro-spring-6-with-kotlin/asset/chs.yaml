  ## Spring JDBC 基础设施


  我们在本章第一部分讨论的代码并不复杂，但相当繁琐，而且由于需要编写大量代码，出现编码错误的可能性很高。现在，是时候看看 Spring 如何让事情变得更简单、更优雅了。


  ### 概述与使用的包


  Spring 中的 JDBC 支持分为五个包，详见表 6-1；每个包处理 JDBC 访问的不同方面。


  表 6-1


  Spring JDBC 包


  | 包 | 描述 |

  | --- | --- |

  | `org.springframework.jdbc.core` | 该包包含 Spring 中 JDBC 类的基础。它包括核心 JDBC 类 `JdbcTemplate`，它简化了使用
  JDBC 进行数据库操作的编程。几个子包提供了更具特定目的（例如，支持命名参数的 `JdbcTemplate` 类）的 JDBC 数据访问支持以及相关的支持类。
  |

  | `org.springframework.jdbc.datasource` | 该包包含辅助类和 `DataSource` 实现，可用于在 JEE 容器之外运行
  JDBC 代码。几个子包为嵌入式数据库、数据库初始化以及各种数据源查找机制提供支持。 |

  | `org.springframework.jdbc.object` | 该包包含帮助将数据库返回的数据转换为对象或对象列表的类。这些对象和列表是普通的 Java/Kotlin
  对象，因此与数据库断开连接。 |

  | `org.springframework.jdbc.support` | 该包中最重要的类是 `SQLException` 转换支持。这允许 Spring
  识别数据库使用的错误代码，并将其映射到更高级别的异常。 |

  | `org.springframework.jdbc.config` | 该包包含支持在 Spring 的 `ApplicationContext` 中进行
  JDBC 配置的类。例如，它包含用于处理嵌入式数据库的类。 |


  让我们从查看最低级别的功能开始讨论 Spring JDBC 支持。在运行 SQL 查询之前，你需要做的第一件事是建立与数据库的连接。


  ### 数据库连接与数据源


  你可以使用 Spring 通过提供一个实现 `javax.sql.DataSource` 的 Bean 来为你管理数据库连接。`DataSource` 和 `Connection`
  之间的区别在于，`DataSource` 提供并管理连接。


  `org.springframework.jdbc.datasource` 包中的 `DriverManagerDataSource` 是最简单的 `DataSource`
  实现。通过查看类名，你可以猜到它只是调用 `DriverManager` 来获取连接。`DriverManagerDataSource` 不支持数据库连接池，这使得该类仅适用于测试。`DriverManagerDataSource`
  的配置非常简单，如清单 6-9 所示；你只需提供驱动程序类名、连接 URL、用户名和密码。


  ```

  driverClassName=org.mariadb.jdbc.Driver

  url=jdbc:mariadb://localhost:3306/musicdb?useSSL=false

  username=prospring6

  password=prospring6

  清单 6-9

  jdbc.Properties 的内容

  ```


  你很可能认识清单中的这些属性。它们代表通常传递给 JDBC 以获取 `Connection` 接口的值。数据库连接信息通常存储在属性文件中，以便在不同部署环境中易于维护和替换。`jdbc.properties`
  中的属性由 Spring 注入到 Kotlin 配置类的属性中。这样的配置类看起来与清单 6-10 中显示的非常相似。


  ```

  package com.apress.prospring6.six.config

  import org.springframework.beans.factory.annotation.Value

  import org.springframework.context.annotation.Bean

  // 更多导入语句已省略

  @Configuration

  @PropertySource("classpath:db/jdbc.properties")

  open class SimpleDataSourceCfg {

  @Value("\${jdbc.driverClassName}")

  private val driverClassName: String? = null

  @Value("\${jdbc.url}")

  private val url: String? = null

  @Value("\${jdbc.username}")

  private val username: String? = null

  @Value("\${jdbc.password}")

  private val password: String? = null

  @Bean

  open fun dataSource(): DataSource? {

  return try {

  val dataSource = SimpleDriverDataSource()

  val driver = Class.forName(driverClassName) as Class

  dataSource.setDriverClass(driver)

  dataSource.url = url

  dataSource.username = username

  dataSource.password = password

  dataSource

  } catch (e: Exception) {

  LOGGER.error("无法创建 Simple DataSource Bean！", e)

  null

  }

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(SimpleDataSourceCfg::class.java)

  }

  }

