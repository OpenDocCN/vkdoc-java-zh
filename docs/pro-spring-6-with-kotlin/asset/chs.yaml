  应用通知的对象类型

  ```


  ![](img/524962_1_En_5_Figc_HTML.jpg) 关键字工具 dot i o 软件徽标。 如果你希望使用 Spring + AOP +
  Kotlin，那么为所有需要通过 AOP 进行操作或观察的类和方法（除了带有 `override` 修饰符的方法）添加 `open` 关键字是极其关键的。如果你忘记添加
  `open`，AOP 可能会静默失败。


  将通知实例和目标对象组合在一起很容易；我们只需要实例化 `ProxyFactory` 类，并设置目标对象和通知实例，如清单 5-3 所示。


  ```

  package com.apress.prospring6.five.manual

  import org.springframework.aop.framework.ProxyFactory

  // 其他导入语句已省略

  object ManualAdviceDemo {

  @JvmStatic

  fun main(args: Array) {

  val concert = Concert()

  val pf = ProxyFactory()

  with(pf){

  addAdvice(SimpleBeforeAdvice())

  addAdvice(SimpleAfterAdvice())

  addAdvice(SimpleAroundAdvice())

  setTarget(concert)

  }

  val proxy = pf.proxy as Performance

  proxy.execute()

  }

