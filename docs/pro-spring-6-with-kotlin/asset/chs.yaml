  在本章的后续部分，您将看到通过 JDBC 从数据库检索数据，并将结果集直接映射到 Kotlin 对象（即 POJO）的示例。这些映射到表中记录的类也称为 **pojos**。对于
  `SINGER` 表，`Singer` 类就是一个 pojo，该类的实例映射到 `SINGER` 表中的行。


  在《我爱露西》的“终于到巴黎”一集中，露西通过她丈夫里基、两名巴黎警察和另一名帮忙的男子^(⁴⁸) 精心安排的翻译工作，才得以免于被捕。这一集主要讲述了露西惹上麻烦并被法国警察逮捕的故事。两名警察不会说英语，但一人会说法语和德语；里基和露西不会说法语，但里基会说西班牙语；而第三名男子只会说德语和西班牙语。这就导致在只会说英语的露西和只会说法语的警长之间，形成了一条由三名翻译组成的链条。


  类似地，Kotlin 应用程序和数据库无法直接通信，因此它们需要一个翻译器，在软件中这被称为**驱动程序**。在《我爱露西》那一集中，他们需要三名翻译才能完成任务。对于
  Kotlin 和大多数数据库而言，我们有以下几种选择：


  *   我们通常只需要一个翻译器，即驱动程序。


  *   如果我们想引入像 Hibernate 这样的持久化层，可能会用到两个。


  *   如果我们添加 Spring Data 以轻松地将记录映射到 POJO 并方便地处理事务，可能会用到三个。


  在本书中，我们将向您展示如何实现这三种方式。让我们从最基本的方式开始，定义我们的 POJO。清单 6-1 展示了分别映射到 `SINGER` 和 `ALBUM`
  表中记录的 `Singer` 和 `Album` 类。




  ```

  package com.apress.prospring6.six.plain.pojos

  import java.io.Serializable

  import java.time.LocalDate

  import java.util.HashSet

  import java.util.Set

  // maps to table SINGER

  class Singer() : Serializable {

  var id: Long? = null

  var firstName: String? = null

  var lastName: String? = null

  var birthDate: LocalDate? = null

  var albums: MutableSet? = null

  constructor(id: Long?, firstName: String?, lastName: String?, birthDate: LocalDate?,

  albums: MutableSet?) : this() {

  this.id = id

  this.firstName = firstName

  this.lastName = lastName

  this.birthDate = birthDate

  this.albums = albums

  }

  fun addAlbum(album: Album): Boolean {

  if (albums == null) {

  albums = mutableSetOf(album)

  return true

  } else {

  if (albums!!.contains(album)) {

  return false

  }

  }

  albums!!.add(album)

  return true

  }

  override fun toString(): String {

  return "Singer[id=" + id +

  ",firstName=" + firstName +

  ",lastName=" + lastName +

  ",birthDate=" + birthDate +

  "]"

  }

  companion object {

  private const val serialVersionUID = 1L

  }

  }

