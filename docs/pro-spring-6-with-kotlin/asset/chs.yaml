  import java.util.List\n\n@RepositoryRestResource(\ncollectionResourceRel = \"mailbox\"\
  ,\npath = \"letters\",\ncollectionResourceDescription = Description(\"信件与信件 API\"\
  )\n)\ninterface LetterRepository : JpaRepository {\n@RestResource(path = \"byCategory\"\
  , rel = \"customFindMethod\")\nfun findByCategory(@Param(\"category\") category:\
  \ Category): List\nfun findBySentOn(@Param(\"date\") sentOn: LocalDate): List\n\
  @RestResource(exported = false)\noverride fun deleteById(id: Long)\n}\n清单 13-3\n\
  LetterRepository Spring Data REST 仓库\n```\n\n`@RepositoryRestResource` 注解告诉 Spring\
  \ MVC 在 `/letters` 路径下创建 RESTful 端点。当项目类路径中包含 `spring-boot-starter-data-rest` 时，此注解并非必需，但它对于自定义所有管理端点所基于的路径非常有用。管理\
  \ `Letter` 实例的默认根路径是 `letters`，与示例中使用的路径相同。当访问 `http://localhost:8090/letters` 时，会显示一个类似于清单\
  \ 13-4 所示的 JSON 结构。\n\n```\n{\n\"_embedded\" : {\n\"mailbox\" : [ {\n\"title\" :\
  \ \"来自英格兰的问候\",\n\"sender\" : \"Evelyn\",\n\"sentOn\" : \"2022-12-05\",\n\"category\"\
  \ : \"Personal\",\n\"content\" : \"我很想去拜访。让我们讨论一下日期。\",\n\"_links\" : {\n\"self\"\
  \ : {\n\"href\" : \"http://localhost:8090/letters/1\"\n},\n\"letter\" : {\n\"href\"\
  \ : \"http://localhost:8090/letters/1\"\n}\n}\n} ]\n},\n\"_links\" : {\n\"self\"\
  \ : {\n\"href\" : \"http://localhost:8090/letters\"\n},\n\"profile\" : {\n\"href\"\
  \ : \"http://localhost:8090/profile/letters\"\n},\n\"search\" : {\n\"href\" : \"\
  http://localhost:8090/letters/search\"\n}\n},\n\"page\" : {\n\"size\" : 20,\n\"\
  totalElements\" : 2,\n\"totalPages\" : 1,\n\"number\" : 0\n}\n}\n清单 13-4\n访问 http://localhost:8090/letters\
  \ 端点时返回的 JSON 表示\n```\n\n`collectionResourceRel` 声明了在生成指向集合资源的链接时要使用的相对值。这意味着所有\
  \ `Letter` 实例都将作为名为 `mailbox` 的集合的一部分返回，该集合是可通过 URL `http://localhost:8090/letters`\
  \ 端点访问的 JSON 表示的一个成员。\n\n`@RestResource` 注解告诉 Spring MVC 资源的路径值是什么，并且 `rel` 属性的值将出现在链接中。通过执行\
  \ `curl` 命令访问 `http://localhost:8090/letters/search`（或在浏览器中打开该 URL），我们可以看到新方法与其他资源（包括参数名称）一起列出，如清单\
  \ 13-5 所示。\n\n```\n##  curl http://localhost:8090/letters/search\n{\n\"_links\"\
  \ : {\n\"findBySentOn\" : {\n\"href\" : \"http://localhost:8090/letters/search/findBySentOn{?date}\"\
  ,\n\"templated\" : true\n},\n\"customFindMethod\" : {\n\"href\" : \"http://localhost:8090/letters/search/byCategory{?category}\"\
  ,\n\"templated\" : true\n},\n\"self\" : {\n\"href\" : \"http://localhost:8090/letters/search\"\
  \n}\n}\n}\n清单 13-5\n访问 http://localhost:8090/letters/search 端点时返回的 JSON 表示\n```\n\
  \n在清单 13-3 中，`deleteById(..)` 方法使用了 `@RestResource(exported = false)` 注解。`exported`\
  \ 属性的值决定了该资源是否被导出。在此示例中，此配置的效果是不会为 `deleteById(..)` 方法创建 REST 端点。但是，有两个链接与清单 13-3\
  \ 中 `LetterRepository` 声明的两个自定义搜索方法相匹配。`{?category}` 结构表示请求参数名称，因此按类别搜索的请求实际上类似于：\n\
  \n```\nGET http://localhost:8090/letters/search/byCategory?category=PERSONAL\n```\n\
  \n`LetterRepository` 接口的目的是暴露 REST API 端点，供 `RestTemplate` 实例调用。\n\n接下来要分析的类是 `LetterSenderController`。这个类是一个\
  \ REST 控制器，它暴露了一个单一的 POST 处理器，用于在当前应用程序上触发发送信件的操作。该处理器方法使用 `RestTemplate` bean 向代表信件目的地的另一个应用程序实例发送\
  \ POST 请求。`LetterSenderController` 类如清单 13-6 所示。\n\n```\npackage com.apress.prospring6.thirteen\n\
  import org.springframework.beans.factory.annotation.Value\nimport org.springframework.http.HttpEntity\n\
  import org.springframework.http.HttpMethod\nimport org.springframework.http.MediaType\n\
  import org.springframework.web.bind.annotation.PostMapping\nimport org.springframework.web.bind.annotation.RequestBody\n\
  import org.springframework.web.bind.annotation.RestController\nimport org.springframework.web.client.RestTemplate\n\
  import java.time.LocalDate\n\n@RestController\nclass LetterSenderController(\nprivate\
  \ val webClient: RestTemplate,\n@param:Value(\"#{senderApplication.correspondentAddress}\"\
  )\nprivate val correspondentAddress: String,\n@param:Value(\"#{senderApplication.sender}\"\
  ) private val sender: String\n) {\n@PostMapping(path = [\"send\"], consumes = [MediaType.APPLICATION_JSON_VALUE])\n\
  fun sendLetter(@RequestBody letter: Letter) {\nletter.sender = sender\nletter.sentOn\
  \ = LocalDate.now()\nval request = HttpEntity(letter)\nwebClient.exchange(\n\"$correspondentAddress/letters\"\
  , HttpMethod.POST, request,\nLetter::class.java\n)\n}\ncompanion object {\nval log\
  \ = LoggerFactory.getLogger(LetterSenderController::class.java)\n}\n}\n清单 13-6\n\
  LetterSenderController 类\n```\n\n\n\n**第 3 章**介绍了原型注解。`@RestController` 是一个便捷注解，它本身被\
  \ `@Controller` 和 `@ResponseBody` 注解。如果 `@Controller` 用于标记用于 Web 用途的 Bean，包含映射到\
  \ URL 的方法，那么 `@RestController` 用于标记用于 REST 用途的 Bean，包含映射到 REST 端点的方法。由于本书目前尚未介绍\
  \ Spring MVC 支持（**第 14 章**）和 Spring REST 支持（**第 15 章**），目前这个解释就足够了。\n\n`RestTemplate`\
  \ 是一个有用的 Spring 类，用于创建执行 HTTP 请求的同步客户端。它公开了一组非常简单的用于设置请求内容和请求头的方法，并且还在底层 HTTP 客户端库（如\
  \ JDK HttpURLConnection、Apache HttpComponents 等）之上公开了一个简单的模板方法 API。`RestTemplate`\
  \ 通常用作共享组件；在应用程序中声明一个 Bean，并在需要的地方注入。从 Spring 5.0 版本开始，此类处于维护模式，未来只接受小的变更请求和错误修复。建议使用\
  \ `org.springframework.web.reactive.client.WebClient`，它具有更现代的 API 并支持同步、异步和流式场景，但对于非响应式应用程序，响应式的\
  \ `WebClient` 并不适用。\n\n`LetterSenderController` 类配置了一个 `sender`（即发信人的姓名及其值），该值从\
  \ Spring Boot 主应用程序类中注入，此处使用 SpEL 表达式引用：`#{senderApplication.sender}`。收信人也是如此，由\
  \ `correspondentAddress` 表示，它也是从 Spring Boot 属性中填充的。这些属性的值从 Spring Boot 配置文件（本例中为\
  \ `application.yaml` 文件）中读取。其内容如代码清单 13-7 所示。\n\n```\n# Spring Boot application\
  \ name\nspring:\napplication:\nname: chapter13-sender-app\n# datasource config\n\
  datasource:\nurl: \"jdbc:h2:mem:testdb\"\ndriverClassName: \"org.h2.Driver\"\nusername:\
  \ sa\npassword: password\n# jpa config\njpa:\ndatabase-platform: \"org.hibernate.dialect.H2Dialect\"\
  \nhibernate:\nddl-auto: create-drop\n# Uppercase Table Names\nnaming:\nphysical-strategy:\
  \ org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl\n# enabling\
  \ the H2 web console\nh2:\nconsole:\nenabled: true\n# application config\napp:\n\
  sender:\nname: \"default\"\ncorrespondent:\naddress: \"http://localhost:8090\"\n\
  # server config\nserver:\nport: 8090\ncompression:\nenabled: true\naddress: 0.0.0.0\n\
  # logging config\nlogging:\npattern:\nconsole: \"%-5level: %class{0} - %msg%n\"\n\
  level:\nroot: INFO\norg.springframework: DEBUG\ncom.apress.prospring6.thirteen:\
  \ INFO\n代码清单 13-7\nchapter13-sender-boot 项目的 application.yaml 文件\n```\n\n此配置分为以下几个部分，如果您已阅读过前面的章节，其中一些部分您应该已经熟悉：\n\
  \n![](img/524962_1_En_13_Fig3_HTML.jpg)\n\n标题为“H 2 console”窗口的两个截图。它包括一个登录对话框。数据条目是已保存的设置、设置名称、驱动类、J\
  \ D B C U R L、用户名和密码。一个箭头标记指向登录仪表板的连接选项。\n\n图 13-3\nH2 控制台登录和仪表板\n\n*   `# Spring\
  \ Boot application name`：此部分为 Spring `ApplicationContext` ID 配置一个值。\n\n*   `# datasource\
  \ config`：此部分配置数据源连接详细信息；在本例中，底层数据库是一个内存中的 H2 数据库。\n\n*   `# jpa config`：此部分配置 JPA\
  \ 详细信息，例如：用于与数据库通信的方言、是否应创建数据库以及表应如何命名；在本例中，所有表名都使用大写字母生成。\n\n*   `# enabling the\
  \ H2 web console`：正如该部分名称所示，为了检查应用程序是否正常运行，有时我们可能想要检查数据库和生成的表。此属性启用 `/h2-console`\
  \ 端点，该端点指向用于管理 H2 数据库的 Web 控制台（类似于 phpMyAdmin^(¹¹²)，但更简单）。登录窗口和控制台仪表板如图 13-3 所示。\n\
  \n*   `# application config`：此部分配置发送信件的用户和接收信件的地址。默认配置是配置一个应用程序，其中发信人和通信地址代表同一个应用程序。\n\
  \n*   `# server config`：此部分配置应用程序可用的 URL。将地址设置为 `0.0.0.0` 允许应用程序在运行该应用程序的计算机关联的所有网络地址上访问（例如，`http://localhost:8090/letters`、`http://127.0.0.1:8090/letters`\
  \ 等）。\n\n*   `# logging config`：此部分配置应用程序中包和类的日志记录级别。\n\n基于此配置和一个 Spring Boot 主类，可以启动一个能够通过\
  \ HTTP 与另一个应用程序通信的应用程序。Spring Boot 主类如代码清单 13-8 所示。\n\n```\npackage com.apress.prospring6.thirteen\n\
  import org.springframework.boot.CommandLineRunner\n// other import statements omitted\n\
  @SpringBootApplication\nopen class SenderApplication {\n@Value(\"\\${app.sender.name}\"\
  )\nvar sender: String? = null\n@Value(\"\\${app.correspondent.address}\")\nvar correspondentAddress:\
  \ String? = null\n@Bean\nopen fun restTemplate(): RestTemplate {\nreturn RestTemplate()\n\
  }\n@Bean\nopen fun initCmd(): CommandLineRunner {\nreturn CommandLineRunner { args:\
  \ Array ->\nlog.info(\n\" >>> Sender {}  ready to send letters to {} \",\nsender,\n\
  correspondentAddress\n)\n}\n}\ncompanion object {\nval log = LoggerFactory.getLogger(SenderApplication::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = SpringApplication.run(\nSenderApplication::class.java,\
  \ *args\n)\n}\n}\n}\n代码清单 13-8\nchapter13-sender-boot 项目的 Spring Boot 主类\n```\n\n\
  [`app.sender.name`](http://app.sender.name) 从 `application.yaml` 文件中读取并注入到 `sender`\
  \ 属性中。`app.correspondent.address` 从 `application.yaml` 文件中读取并注入到 `correspondentAddress`\
  \ 属性中。`SenderApplication` 配置声明了一个名为 `senderApplication` 的 Bean，该 Bean 的属性使用 SpEL\
  \ 表达式注入到 `LetterSenderController` 类中，如前文代码清单 13-6 所示。\n\n现在所有 Bean 和配置都已解释完毕，让我们启动\
  \ Tom 和 Evelyn 这两个应用程序实例，并开始发送信件。要启动应用程序的两个实例，您可以使用 IntelliJ IDEA 启动器，但最简单的方法是构建应用程序并使用生成的\
  \ JAR 启动它们。\n\n要构建项目，请转到 `pro-spring-6/chapter13-sender-boot` 并运行 `gradle clean\
  \ build`。项目构建完成，可执行文件生成在 `chapter13-sender-boot/build/libs/chapter13-sender-boot-1.0-SNAPSHOT.jar`。\n\
  \n要启动 Tom 应用程序，请打开一个终端并运行代码清单 13-9 中所示的命令。\n\n```\njava -jar \\\nbuild/libs/chapter13-sender-boot-1.0-SNAPSHOT.jar\
  \ \\\n--server.port=8090 \\\n--app.sender.name=Tom \\\n--app.correspondent.address=http://localhost:8080\
  \ # Evelyn's address\n代码清单 13-9\n启动 Tom 应用程序\n```\n\n\n\n应用程序启动后，最后打印的两条日志条目应如下所示：\n\
  \n```\nINFO: SenderApplication -  >>> Sender Tom  ready to send letters to http://localhost:8080\n\
  DEBUG: ApplicationAvailabilityBean - Application availability state ReadinessState\
  \ changed to ACCEPTING_TRAFFIC\n```\n\n`INFO` 日志由 `CommandLineRunner` bean 打印。\n\
  \n要启动 Evelyn 应用程序，请打开终端并运行清单 13-10 中所示的命令。\n\n```\njava -jar \\\nbuild/libs/chapter13-sender-boot-1.0-SNAPSHOT.jar\
  \ \\\n--server.port=8080 \\\n--app.sender.name=Evelyn \\\n--app.correspondent.address=http://localhost:8090\
  \ # Tom's address\n清单 13-10\n启动 Evelyn 应用程序\n```\n\n应用程序启动后，最后打印的两条日志条目应如下所示：\n\n\
  ```\nINFO : SenderApplication -  >>> Sender Evelyn  ready to send letters to http://localhost:8090\n\
  DEBUG: ApplicationAvailabilityBean - Application availability state ReadinessState\
  \ changed to ACCEPTING_TRAFFIC\n```\n\n要让 Tom 向 Evelyn 发送一封信，必须向 `http://localhost:8090/send`\
  \ 发送一个 POST 请求。最简单的方法是使用 IntelliJ IDEA 中嵌入的 HTTPie^(¹¹³) 客户端，执行 `chapter13-sender-boot/src/test/resources/Sender.http`\
  \ 文件中的请求。\n\n![](img/524962_1_En_13_Figb_HTML.jpg) 一个带阴影圆圈内的小写 i 符号。 IntelliJ IDEA\
  \ 社区版不包含 HTTPie。但是，你可以使用其他 HTTP 客户端（如 `curl`）实现相同的结果。\n\n例如，从 Tom 向 Evelyn 发送信件的请求（`Sender.http`\
  \ 文件中的请求之一）如清单 13-11 所示。\n\n```\n### Tom sending letter to Evelyn\nPOST http://localhost:8090/send\n\
  Content-Type: application/json\n{\n\"title\": \"Salutations from Scotland\",\n\"\
  category\": \"Personal\",\n\"content\" : \"Scotland is rather lovely this time of\
  \ year. Would you like to visit?\"\n}\n# Or, using curl\ncurl -X POST http://localhost:8090/send\
  \ -H \"Content-Type: application/json\" -d '{\"title\":\"Salutations from Scotland\"\
  ,\"category\":\"Personal\",\"content\":\"Scotland is rather lovely this time of\
  \ year. Would you like to visit?\"}'\n清单 13-11\n使 Tom 向 Evelyn 发送信件的 POST 请求\n```\n\
  \n我们如何知道这起作用了？我们查看 Tom 的日志，寻找报告 `restTemplate` bean 已执行请求的日志条目。这些日志条目应与清单 13-12\
