  ## Spring 中的任务执行


  Spring 的 `TaskExecutor` 接口是在 2.0 版本中添加的。与 JDK 类似，Spring 开箱即用地提供了许多适用于不同需求的 `TaskExecutor`
  实现^(¹⁰⁷)。其中最值得关注的有以下几种：


  *   `org.springframework.core.task.SyncTaskExecutor`：不异步执行任务；调用发生在调用线程中。

  *   `org.springframework.core.task.SimpleAsyncTaskExecutor`：每次调用都创建新线程；不重用现有线程。

  *   `org.springframework.scheduling.concurrent.ConcurrentTaskExecutor`：`java.util.concurrent.Executor`
  实例的适配器。由于存在 `ThreadPoolTaskExecutor` 类，通常不常使用，但当 `ThreadPoolTaskExecutor` 不够灵活时，它很有用。

  *   `org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor`：`TaskExecutor`
  实现，提供通过 Bean 属性配置 `ThreadPoolExecutor` 并将其暴露为 Spring `TaskExecutor` 的能力。

  *   `org.springframework.scheduling.quartz.SimpleThreadPoolTaskExecutor`：Quartz
  的 `SimpleThreadPool` 的子类；当需要 Quartz 和非 Quartz 组件共享线程池时使用。


  每个 `TaskExecutor` 实现都有其特定用途，并且它们显然都具有相同的 API。唯一的区别在于配置，即在定义要使用哪个 `TaskExecutor`
  实现及其属性（如果有）时。让我们看一个简单的示例，该示例打印一些随机文本。所使用的 `TaskExecutor` 实现是 `SimpleAsyncTaskExecutor`。首先，让我们创建一个包含任务执行逻辑的
  Bean 类，如清单 12-5 所示。


  ```

  package com.apress.prospring6.twelve

  // 部分导入语句已省略

  import org.springframework.core.task.TaskExecutor

  import java.util.UUID

  @Component

  class RandomStringPrinter(private val taskExecutor: TaskExecutor) {

  fun executeTask() {

  for (i in 0..9) {

  taskExecutor.execute {

  LOGGER.info(

  "{}: {}",

  i,

  UUID.randomUUID().toString().substring(0, 8)

  )

  }

  }

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(RandomStringPrinter::class.java)

  }

  }

  清单 12-5

  RandomStringPrinter 类

  ```


  这个类只是一个普通的 Bean，需要注入 `TaskExecutor` 作为依赖，并定义了一个 `executeTask()` 方法。`executeTask()`
  方法通过创建一个新的 `Runnable` 实例（包含我们想要为此任务执行的逻辑）来调用所提供的 `TaskExecutor` 的 execute 方法。这里可能不太明显，因为使用了
  lambda 表达式来创建 `Runnable` 实例。配置非常简单；它与上一节中描述的配置类似。这里我们唯一需要考虑的是，需要提供一个 `TaskExecutor`
  Bean 的声明，该 Bean 需要被注入到 `RandomStringPrinter` Bean 中。


  清单 12-6 显示了配置类和名为 `SimpleAsyncTaskExecutorDemo` 的演示类。


