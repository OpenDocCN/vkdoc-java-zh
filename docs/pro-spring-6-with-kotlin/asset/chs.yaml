  不过，异常信息非常清楚地说明了问题所在。\n\n如果您需要从应用程序中获取某种类型的所有 Bean，有一个方法可以实现，如清单 3-43 所示。\n\n```\n\
  val beans = ctx.getBeansOfType(SimpleBean::class.java)\nbeans.forEach{ (k, v) ->\n\
  println(k)\n}\n清单 3-43\n列出上下文中所有 SimpleBean Bean 名称的代码\n```\n\n`ctx.getBeansOfType(String.class)`\
  \ 用于获取一个映射，其中包含 `ApplicationContext` 中所有类型为 `SimpleBean` 的 Bean 及其 ID。映射的键是 Bean\
  \ ID，通过前面代码中的 lambda 表达式打印出来。使用本节到目前为止的配置，输出如下：\n\n```\nsimpleBean\nanotherSimpleBean\n\
  ```\n\n\n\n### 显式 Bean 命名\n\n显式配置 Bean 非常简单。当使用 `@Component` 或任何其他构造型注解（`@Service`、`@Repository`\
  \ 等）声明 Bean 时，存在一个名为 `value` 的默认属性，可以为其初始化一个值，用作 Bean 的名称。清单 3-44 展示了一个名为 `simpleBeanOne`\
  \ 的 `SimpleBean` Bean 的配置。\n\n```\n@Component(value = \"simpleBeanOne\")\nclass\
  \ SimpleBean { }\n清单 3-44\n使用 @Component 声明具有自定义名称的 Bean\n```\n\n当一个注解属性被声明为默认属性时，这意味着在使用该注解时，可以省略该属性的名称，因此\
  \ `@Component(value = \"simpleBeanOne\")` 等同于 `@Component(\"simpleBeanOne\")`。\n\
  \n`@Bean` 注解也有一个名为 `value` 的默认属性，用于类似的目的。它可以被初始化一个值，用作 Bean 的名称，但当使用一个值数组时，数组中的第一个值成为名称，其余的值成为别名。清单\
  \ 3-45 展示了如何使用 `@Bean` 配置带有别名的 Bean，以及如何打印 Bean 的名称和别名。\n\n```\npackage com.apress.prospring6.three.explicit\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  import org.springframework.context.annotation.Bean\nimport org.springframework.context.annotation.ComponentScan\n\
  import org.springframework.context.annotation.Configuration\nimport org.springframework.stereotype.Component\n\
  import java.util.*\n/**\n* Created by iuliana.cosmina on 09/03/2022\n*/\nobject\
  \ ExplicitBeanNamingDemo {\nprivate val logger: org.slf4j.Logger =\norg.slf4j.LoggerFactory.getLogger(ExplicitBeanNamingDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(BeanNamingCfg::class.java)\n\
  Arrays.stream(ctx.beanDefinitionNames).forEach { beanName: String? ->\nlogger.debug(beanName)\n\
  }\nval simpleBeans = ctx.getBeansOfType(SimpleBean::class.java)\nsimpleBeans.forEach\
  \ { (k: String?, v: SimpleBean?) ->\nval aliases = ctx.getAliases(k)\nif (aliases.isNotEmpty())\
  \ {\nlogger.debug(\"Aliases for {} \", k)\nArrays.stream(aliases).forEach { a: String?\
  \ ->\nlogger.debug(\"\\t {}\", a)\n}\n}\n}\n}\n}\n@Configuration\n@ComponentScan\n\
  internal open class BeanNamingCfg {\n// @Bean(name=\"simpleBeanTwo\")\n// @Bean(value=\
  \ \"simpleBeanTwo\")\n@Bean(\"simpleBeanTwo\")\nopen fun simpleBean2(): SimpleBean\
  \ {\nreturn SimpleBean()\n}\n// @Bean(name= {\"simpleBeanThree\", \"three\", \"\
  numero_tres\"})\n// @Bean(value= {\"simpleBeanThree\", \"three\", \"numero_tres\"\
  })\n@Bean(\"simpleBeanThree\", \"three\", \"numero_tres\")\nopen fun simpleBean3():\
  \ SimpleBean {\nreturn SimpleBean()\n}\n}\n@Component(\"simpleBeanOne\")\ninternal\
  \ class SimpleBean\n清单 3-45\n使用 @Bean 声明具有自定义名称的 Bean\n```\n\n在清单 3-45 的代码片段中，涵盖了命名\
  \ Bean 和指定别名的所有可能性；注释中的注解等同于未注释的注解。`simpleBeanTwo` 没有任何别名。`simpleBeanThree` 有两个别名。运行该代码片段时，将产生清单\
  \ 3-46 中的输出。\n\n```\nDEBUG: ExplicitBeanNamingDemo - simpleBeanTwo\nDEBUG: ExplicitBeanNamingDemo\
  \ - simpleBeanThree\nDEBUG: ExplicitBeanNamingDemo - Aliases for simpleBeanThree\n\
  DEBUG: ExplicitBeanNamingDemo -      three\nDEBUG: ExplicitBeanNamingDemo -    \
  \  numero_tres\n清单 3-46\n显示 Bean 别名的输出\n```\n\n### `@AliasFor` 注解\n\n关于别名，Spring\
  \ 4.2 引入了 `@AliasFor` 注解。此注解用于声明注解属性的别名，大多数 Spring 注解都使用了它。例如，`@Bean` 注解有两个属性 `name`\
  \ 和 `value`，它们被声明为彼此的别名。清单 3-47 中的代码片段是 `@Bean` 注解 Java 代码的一个快照，取自官方 Spring GitHub\
  \ 仓库。当前不相关的代码和文档已被省略。\n\n```\npackage org.springframework.context.annotation;\n\
  import java.lang.annotation.Documented;\nimport java.lang.annotation.ElementType;\n\
  import java.lang.annotation.Retention;\nimport java.lang.annotation.RetentionPolicy;\n\
  import java.lang.annotation.Target;\nimport org.springframework.core.annotation.AliasFor;\n\
  // 其他 import 语句已省略\n@Target({ElementType.METHOD, ElementType.ANNOTATION_TYPE})\n\
  @Retention(RetentionPolicy.RUNTIME)\n@Documented\npublic @interface Bean {\n@AliasFor(\"\
  name\")\nString value() default {};\n@AliasFor(\"value\")\nString name() default\
  \ {};\n// 代码已省略\n}\n清单 3-47\n来自 @Bean 注解的代码片段\n```\n\n这种使用 `@AliasFor` 的配置使得 `@Bean(name=\
  \ {\"simpleBeanThree\", \"three\", \"numero_tres\"})` 等同于 `@Bean(value= {\"simpleBeanThree\"\
  , \"three\", \"numero_tres\"})`。\n\n使用 `@AliasFor` 注解还可以做一些更有趣的事情：可以为元注解属性声明别名。在清单\
  \ 3-48 中，你可以看到一个名为 `@Award` 的注解，它声明了一个名为 `prize` 的属性，以及一个名为 `@Trophy` 的注解，该注解使用\
  \ `@Award` 进行元注解。这个注解声明了一个属性，该属性是 `@Award` 接口中 `prize` 属性的别名。\n\n```\npackage com.apress.prospring6.three.alias\n\
  // Award.kt\npackage com.apress.prospring6.three.alias\nimport java.lang.annotation.Documented\n\
  import java.lang.annotation.Retention\nimport java.lang.annotation.RetentionPolicy\n\
  @Target(AnnotationTarget.ANNOTATION_CLASS, AnnotationTarget.CLASS)\n@Retention(RetentionPolicy.RUNTIME)\n\
  @Documented\nannotation class Award(val prize: Array = [])\n// Trophy.kt\npackage\
  \ com.apress.prospring6.three.alias\nimport org.springframework.core.annotation.AliasFor\n\
  @Award\nannotation class Trophy(\n@get:AliasFor(annotation = Award::class, attribute\
  \ = \"value\")\nval name: Array = []\n)\n清单 3-48\n@AliasFor 的使用\n```\n\n有了这两个注解，可以声明一个\
  \ `Singer` 类，并使用 `@Award` 或 `@Trophy` 进行注解，如清单 3-49 所示。\n\n```\npackage com.apress.prospring6.three.alias\n\
  import org.springframework.stereotype.Component\n@Component(\"johnMayer\") //@Award(prize\
  \ = {\"grammy\", \"platinum disk\"})\n@Trophy(name = [\"grammy\", \"platinum disk\"\
  ])\nclass Singer {\nprivate val lyric = \"I used to crave the sight of you\"\nfun\
  \ sing() {\nprintln(lyric)\n}\n}\n清单 3-49\n使用别名注解进行注解的 Singer 类\n```\n\n![](img/524962_1_En_3_Figq_HTML.jpg)\
  \ 一个带有警告标志的图标。它是一个圆形，中心有一个感叹号。 使用另一个注解 `@AliasFor` 为注解属性创建别名确实存在局限性。`@AliasFor`\
  \ 不能用于任何构造型注解（`@Component` 及其特化注解）。原因是在 `@AliasFor` 发明之前，这些 value 属性的特殊处理就已经存在了。因此，由于向后兼容性问题，根本不可能将\
  \ `@AliasFor` 与这些 value 属性一起使用。当编写代码尝试这样做时（在构造型注解中为 value 属性创建别名），不会显示编译错误，代码甚至可能运行，但为别名提供的任何参数都将被忽略。`@Qualifier`\
  \ 注解也是如此。\n\n\n\n### 理解 Bean 的实例化模式\n\n本章前面部分使用了术语**单例（singleton）**来描述那些在上下文中只创建一次的\
  \ Bean，并使用**非单例（non-singleton）**来描述那些每次从上下文请求时都会创建的 Bean。默认情况下，Spring 中的所有 Bean\
  \ 都是单例的。这意味着 Spring 会维护 Bean 的单个实例，所有依赖对象都使用同一个实例，并且所有对 `ApplicationContext.getBean(..)`\
  \ 的调用都会返回同一个实例。我们在上一节中演示了这一点，当时我们能够使用身份比较 `(==)` 而不是 `equals()` 比较来检查 Bean 是否相同。\n\
  \n在 Java/Kotlin 中，术语 *singleton* 可互换地用于指代两个不同的概念：在应用程序中具有单个实例的对象，以及单例设计模式。我们将第一个概念称为单例（singleton），将单例模式称为\
  \ Singleton。Singleton 设计模式由 Erich Gamma 等人在开创性的著作 *Design Patterns: Elements of\
  \ Reusable Object-Oriented Software*（Addison-Wesley, 1994）中推广开来。当人们将单例实例的需求与应用 *Singleton*\
  \ 模式的需求混淆时，问题就出现了。清单 3-50 展示了在 Kotlin 中通过 *对象（objects）* 实现 Singleton 模式的典型方式。\n\n\
  ```\nobject Singleton {\n}\n清单 3-50\nKotlin 中的 Singleton 模式\n```\n\n这与 Java 的实现有本质区别，Java\
  \ 的实现需要使用静态字段和私有构造函数的略显笨拙的结构。该模式实现了其目标，即允许你在整个应用程序中维护和访问类的单个实例，但代价是增加了耦合性。你的应用程序代码必须始终显式地知道\
  \ `Singleton` 类才能获取该实例——这完全消除了面向接口编程的可能性。\n\n实际上，*Singleton* 模式实际上是两个模式的结合。第一个也是期望的模式涉及维护对象的单个实例。第二个不太理想的模式是一种对象查找模式，它完全消除了使用接口的可能性。使用\
  \ Singleton 模式也使得任意替换实现变得困难，因为需要 Singleton 实例的对象会直接访问 Singleton 对象。当你尝试对应用程序进行单元测试时，这可能会引起各种麻烦，因为你无法用模拟对象（mock）替换\
  \ Singleton 以进行测试。\n\n幸运的是，使用 Spring，你可以利用单例实例化模型，而无需绕开 Singleton 设计模式。默认情况下，Spring\
  \ 中的所有 Bean 都作为单例实例创建，并且 Spring 使用相同的实例来满足对该 Bean 的所有请求。当然，Spring 并不仅限于使用单例实例；它仍然可以为每个依赖项和每次对\
  \ `getBean()` 的调用创建 Bean 的新实例。它完成所有这些操作都不会对你的应用程序代码产生任何影响，因此，我们喜欢将 Spring 称为**实例化模式无关的**。这是一个强大的概念。如果你从一个单例对象开始，但后来发现它并不真正适合多线程访问，你可以将其更改为非单例（*原型*），而不会影响你的任何应用程序代码。\n\
  \n![](img/524962_1_En_3_Figr_HTML.jpg) 一个警报警告标志图标。它是一个中心带有感叹号的圆形。 虽然更改 Bean 的实例化模式不会影响你的应用程序代码，但如果你依赖\
  \ Spring 的生命周期接口，它确实会引起一些问题。我们将在**第** **4** **章**中更详细地讨论这一点。\n\n将实例化模式从单例更改为非单例很简单。清单\
  \ 3-51 中的配置展示了使用 `@Scope` 并将 `scopeName` 属性设置为 `prototype` 来将 Bean 配置为非单例。\n\n```\n\
  @Component(\"nonSingleton\")\n@Scope(scopeName = \"prototype\")\nclass Singer(@Value(\"\
  John Mayer\") val name:String  = \"unknown\") {\n}\n清单 3-51\n将 Bean 配置为非单例\n```\n\
  \n如你所见，此 Bean 声明与你迄今为止看到的任何声明之间的唯一区别是我们添加了 `scope` 属性并将其值设置为 `prototype`。Spring\
  \ 默认将作用域设置为 `singleton`。原型作用域指示 Spring 在应用程序每次请求 Bean 实例时都实例化一个新的 Bean 实例。清单 3-52\
  \ 展示了此设置对你的应用程序的影响。\n\n```\npackage com.apress.prospring6.three.scope\nimport com.apress.prospring6.three.generator.BeanNameGerneratorDemo\n\
  import org.springframework.beans.factory.annotation.Value\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  import org.springframework.context.annotation.Scope\nimport org.springframework.stereotype.Component\n\
  @Component(\"nonSingleton\")\n@Scope(scopeName = \"prototype\")\ninternal class\
  \ Singer(@Value(\"John Mayer\") val name: String = \"unknown\") {\noverride fun\
  \ toString(): String {\nreturn \"${super.toString()}, name=$name\"\n}\n}\nobject\
  \ NonSingletonDemo {\nprivate val logger: org.slf4j.Logger =\norg.slf4j.LoggerFactory.getLogger(BeanNameGerneratorDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext()\n\
  ctx.register(Singer::class.java)\nctx.refresh()\nval singer1 = ctx.getBean(\"nonSingleton\"\
  , Singer::class.java)\nval singer2 = ctx.getBean(\"nonSingleton\", Singer::class.java)\n\
  logger.info(\"Identity Equal?: \" + (singer1 === singer2))\nlogger.info(\"Value\
  \ Equal:? \" + (singer1 == singer2))\nlogger.info(singer1.toString())\nlogger.info(singer2.toString())\n\
  }\n}\n清单 3-52\n从上下文中访问非单例 Bean\n```\n\n运行此示例将得到清单 3-53 中的输出，这毫无疑问地证明了 `ctx.getBean(\"\
  nonSingleton\", Singer.class)` 返回了两个不同的实例。\n\n```\nINFO : NonSingletonDemo - Identity\
  \ Equal?: false\nINFO : NonSingletonDemo - Value Equal:? false\nINFO : NonSingletonDemo\
  \ - com.apress.prospring6.three.scope.Singer@6631f5ca[name=John Mayer]\nINFO : NonSingletonDemo\
  \ - com.apress.prospring6.three.scope.Singer@5ace1ed4[name=John Mayer]\n清单 3-53\n\
  清单 3-52 中代码的输出\n```\n\n从该输出中可以看出，尽管两个 `String` 对象的值明显相等，但它们的身份并不相同，即使两个实例都是使用相同的\
  \ Bean 名称检索的。\n\n\n\n## 选择实例化模式\n\n在大多数场景下，很容易判断哪种实例化模式是合适的。通常，你会发现单例是 Bean 的默认模式。一般来说，单例模式适用于以下场景：\n\
  \n*   **无状态共享对象**：你有一个不维护状态且拥有许多依赖对象的对象。由于没有状态就不需要同步，因此当依赖对象需要用它进行某些处理时，无需每次都创建新的\
  \ Bean 实例。\n\n*   **只读状态共享对象**：这与上一点类似，但包含一些只读状态。在这种情况下，你仍然不需要同步，因此为每次 Bean 请求创建实例只会增加开销。\n\
  \n*   **共享状态共享对象**：如果你有一个 Bean 的状态需要被共享，单例是理想的选择。在这种情况下，请确保对状态写入的同步尽可能细粒度。\n\n*\
  \   **具有可写状态的高吞吐量对象**：如果你的应用程序中大量使用某个 Bean，你可能会发现，保持单例并同步所有对 Bean 状态的写访问，比不断创建数百个\
  \ Bean 实例能带来更好的性能。使用此方法时，请尽量在不牺牲一致性的前提下保持同步的细粒度。你会发现，当你的应用程序在长时间内创建大量实例、共享对象只有少量可写状态，或者新实例的创建成本很高时，这种方法特别有用。\n\
  \n你应该考虑在以下场景中使用非单例模式：\n\n*   **具有可写状态的对象**：如果你有一个 Bean 包含大量可写状态，你可能会发现同步的成本高于为处理依赖对象的每次请求而创建新实例的成本。\n\
  \n*   **具有私有状态的对象**：某些依赖对象需要一个具有私有状态的 Bean，以便它们能够与依赖该 Bean 的其他对象分开进行处理。在这种情况下，单例显然不合适，你应该使用非单例。\n\
  \n从 Spring 的实例化管理中获得的主要好处是，你的应用程序可以立即受益于单例模式带来的更低内存使用率，而几乎不需要你付出什么努力。然后，如果你发现单例模式不能满足应用程序的需求，修改配置以使用非单例模式也是一项微不足道的任务。\n\
  \n## 其他 Bean 作用域\n\n除了单例和原型作用域之外，在定义 Spring Bean 时，针对更特定的目的还存在其他作用域。你也可以实现自己的自定义作用域，并将其注册到\
  \ Spring 的 `ApplicationContext` 中。从版本 6 开始，支持以下 Bean 作用域：\n\n*   `singleton`：默认的单例作用域。每个\
  \ Spring IoC 容器只会创建一个对象。\n\n*   `prototype`：当应用程序请求时，Spring 会创建一个新的实例。\n\n*   `request`：用于\
  \ Web 应用程序。当使用 Spring MVC 开发 Web 应用程序时，每个 HTTP 请求都会实例化具有请求作用域的 Bean，并在请求完成后销毁。\n\
  \n*   `session`：用于 Web 应用程序。当使用 Spring MVC 开发 Web 应用程序时，每个 HTTP 会话都会实例化具有会话作用域的\
  \ Bean，并在会话结束后销毁。\n\n*   `application`：将单个 Bean 定义的作用域限定为 `ServletContext` 的生命周期。应用程序作用域仅在\
  \ Spring Web 应用程序中有效。\n\n*   `thread`：当新线程请求时，Spring 会创建一个新的 Bean 实例，而对于同一个线程，则会返回相同的\
  \ Bean 实例。请注意，此作用域默认情况下未注册。\n\n*   `custom`：自定义 Bean 作用域，可以通过实现接口 `org.springframework.beans.factory.config.Scope`\
  \ 并在 Spring 配置中注册自定义作用域来创建（对于 XML，请使用类 `org.springframework.beans.factory.config.CustomScopeConfigurer`）。\n\
  \n*   `websocket`：将单个 Bean 定义的作用域限定为 `WebSocket` 的生命周期。WebSocket 作用域仅在 Spring Web\
  \ 应用程序中有效。\n\n\n\n## 解决依赖关系\n\nSpring 能够通过简单地查看配置文件或类中的注解来解决依赖关系。但遗憾的是，Spring 无法感知代码中那些未在配置中指定的\
  \ Bean 之间的任何依赖关系。例如，有一个名为 `johnMayer`、类型为 `Singer` 的 Bean，它通过 `ctx.getBean()` 获取另一个名为\
  \ `gopher`、类型为 `Guitar` 的 Bean 实例，并在调用 `johnMayer.sing()` 方法时使用它。在此方法中，你通过调用 `ctx.getBean(\"\
  gopher\")` 获取 `Guitar` 类型的实例，而没有要求 Spring 为你注入依赖。在这种情况下，Spring 并不知道 `johnMayer`\
  \ 依赖于 `gopher`，因此它可能会在 `gopher` Bean 之前实例化 `johnMayer` Bean。\n\n你可以通过使用 `@DependsOn`\
  \ 注解，向 Spring 提供关于 Bean 依赖关系的额外信息。清单 3-54 展示了如何配置 `johnMayer` 和 `gopher` Bean 的场景。\n\
  \n```\npackage com.apress.prospring6.three.dependson\nimport org.springframework.beans.BeansException\n\
  import org.springframework.context.ApplicationContext\nimport org.springframework.context.ApplicationContextAware\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  import org.springframework.context.annotation.DependsOn\nimport org.springframework.stereotype.Component\n\
  object DependsOnDemo {\n@JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext()\n\
  ctx.register(Singer::class.java, Guitar::class.java)\nctx.refresh()\nval johnMayer\
  \ = ctx.getBean(\"johnMayer\", Singer::class.java)\njohnMayer.sing()\n}\n}\n@Component(\"\
  gopher\")\ninternal class Guitar {\nfun sing() {\nprintln(\"Cm Eb Fm Ab Bb\")\n\
  }\n}\n@DependsOn(\"gopher\")\n@Component(\"johnMayer\")\ninternal class Singer :\
  \ ApplicationContextAware {\nprivate var ctx: ApplicationContext? = null\n@Throws(BeansException::class)\n\
  override fun setApplicationContext(applicationContext: ApplicationContext) {\nctx\
  \ = applicationContext\n}\nprivate var guitar: Guitar? = null\nfun sing() {\nguitar\
  \ = ctx!!.getBean(\"gopher\", Guitar::class.java)\nguitar!!.sing()\n}\n}\n清单 3-54\n\
  使用 @DependsOn 配置依赖关系\n```\n\n在此配置中，我们声明了 `johnMayer` Bean 依赖于 `gopher` Bean。Spring\
  \ 在实例化 Bean 时应考虑这一点，并确保 `gopher` 在 `johnMayer` 之前创建。对于 `johnMayer` Bean，要自行获取依赖，它需要访问\
  \ `ApplicationContext`。因此，我们还必须告诉 Spring 注入此引用，这样当调用 `johnMayer.sing()` 方法时，就可以用它来获取\
  \ `gopher` Bean。这是通过让 `Singer` 类实现 `ApplicationContextAware` 接口来完成的。这是一个 Spring\
  \ 特有的接口，它强制要求为 `ApplicationContext` 对象实现一个 setter 方法。Spring IoC 容器会自动检测到它，并将创建该\
  \ Bean 的 `ApplicationContext` 注入其中。这发生在 Bean 的构造函数被调用之后，因此，在构造函数中使用 `ApplicationContext`\
  \ 显然会导致 `NullPointerException`。\n\n运行清单 3-54 时，输出结果如下：`Cm Eb Fm Ab Bb.`\n\n在开发应用程序时，应避免设计使用此功能；相反，应通过\
  \ setter 和构造函数注入契约来定义依赖关系。但是，如果你正在将 Spring 与遗留代码集成，你可能会发现代码中定义的依赖关系需要你向 Spring 框架提供额外信息。\n\
  \n## 自动装配你的 Bean\n\n*自动装配* 是将 Bean 隐式注入到依赖于它们的 Bean 中的过程。Spring 支持五种自动装配模式：\n\n\
  *   `byName`：使用 `byName` 自动装配时，Spring 会尝试将每个属性装配到同名的 Bean。因此，如果目标 Bean 有一个名为 `foo`\
  \ 的属性，并且在 `ApplicationContext` 中定义了一个 `foo` Bean，那么 `foo` Bean 就会被赋值给目标的 `foo` 属性。\n\
  \n*   `byType`：使用 `byType` 自动装配时，Spring 会尝试通过自动使用 `ApplicationContext` 中相同类型的 Bean\
  \ 来装配目标 Bean 上的每个属性。\n\n*   `constructor`：此功能与 `byType` 自动装配类似，区别在于它使用构造函数而非 setter\
  \ 方法进行注入。Spring 会尝试匹配构造函数中尽可能多的参数。因此，如果你的 Bean 有两个构造函数，一个接受 `String`，另一个接受 `String`\
  \ 和 `Integer`，并且你的 `ApplicationContext` 中同时存在 `String` 和 `Integer` 类型的 Bean，那么 Spring\
  \ 会使用双参数构造函数。\n\n*   `default`：Spring 会自动在 `constructor` 和 `byType` 模式之间选择。如果你的\
  \ Bean 有一个默认（无参数）构造函数，Spring 会使用 `byType`；否则，它会使用 `constructor`。\n\n*   `no`：不进行自动装配；这是默认模式。\n\
  \n在使用 XML 配置时，可以通过元数据显式配置自动装配模式，方法是在 `<bean/>` 元素上指定 `autowire` 属性的值。由于本书不涉及 XML，我们将重点放在注解配置上。\n\
  \n\n\n### 构造函数自动装配\n\n当通过构造函数注入提供依赖时，自动装配显然是通过构造函数完成的。如果类有多个构造函数，则会根据一些条件选择要使用的构造函数。\n\
  \n如果没有构造函数使用 `@Autowired` 注解，则会选择最合适的那个。如果有多个合适的构造函数，Spring 会优先使用无参构造函数（如果存在）。如果不存在无参构造函数，则会抛出\
  \ `BeanInstantiationException` 异常。请查看清单 3-55 中的示例。\n\n```\npackage com.apress.prospring6.three.autowiring\n\
  import org.springframework.context.annotation.Lazy\n// 其他导入语句已省略\nobject AutowiringDemo\
  \ {\nprivate val logger: Logger = LoggerFactory.getLogger(AutowiringDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(AutowiringCfg::class.java)\n\
  val target = ctx.getBean(Target::class.java)\nlogger.info(\"创建 target? {}\", target\
  \ != null)\nlogger.info(\"注入 bar? {}\", target.bar != null)\nlogger.info(\"注入 fooOne?\
  \ {}\", if (target.fooOne != null) target.fooOne!!.id else \"\")\nlogger.info(\"\
  注入 fooTwo? {}\", if (target.fooTwo != null) target.fooTwo!!.id else \"\")\n}\n}\n\
  @Configuration\n@ComponentScan\ninternal class AutowiringCfg\n@Component\n@Lazy\n\
  internal class Target {\nvar fooOne: Foo? = null\nvar fooTwo: Foo? = null\nvar bar:\
  \ Bar? = null\nconstructor() {\nlogger.info(\" --> Target() 被调用\")\n}\nconstructor(foo:\
  \ Foo?) {\nfooOne = foo\nlogger.info(\" --> Target(Foo) 被调用\")\n}\nconstructor(foo:\
  \ Foo?, bar: Bar?) {\nfooOne = foo\nthis.bar = bar\nlogger.info(\" --> Target(Foo,\
  \ Bar) 被调用\")\n}\ncompanion object {\nprivate val logger: Logger = LoggerFactory.getLogger(Target::class.java)\n\
  }\n}\n@Component\ninternal class Foo {\nvar id = UUID.randomUUID().toString().replace(\"\
  -\", \"\").substring(0, 8)\n}\n@Component\ninternal class Bar\n清单 3-55\n按类型自动装配的示例\n\
  ```\n\n在这段代码中，你可以看到 `Target` 类有三个构造函数：\n\n*   一个无参构造函数，\n*   一个接受 `Foo` 实例的构造函数，\n\
  *   一个接受 `Foo` 实例和 `Bar` 实例的构造函数。\n\n每个构造函数在被调用时都会向控制台输出一条消息。`main()` 方法简单地检索在 `ApplicationContext`\
  \ 中声明的 `Target` bean，从而触发自动装配过程。几条日志语句会打印关于 `Target` bean 的详细信息。\n\n除了这些构造函数，`Target`\
  \ bean 还有三个属性：\n\n*   两个 `Foo` 类型的属性，\n*   一个 `Bar` 类型的属性。\n\n`Foo` 和 `Bar` 是简单的类。每个\
  \ `Foo` 对象在实例化时都会获得一个唯一的 ID。`@Lazy` 注解用于告知 Spring 仅在首次请求时才实例化该 bean，而不是在启动时，这样我们就可以在测试程序的正确位置输出结果。\n\
  \n运行这段代码时，会输出清单 3-56 中的内容，这毫无疑问地证明了当 Spring 没有被告知该做什么时，它会直接使用无参构造函数，这意味着没有任何属性会被注入。\n\
  \n```\nINFO : Target -  --> Target() 被调用\nINFO : AutowiringDemo - 创建 target? true\n\
  INFO : AutowiringDemo - 注入 bar? false\nINFO : AutowiringDemo - 注入 fooOne?\nINFO\
  \ : AutowiringDemo - 注入 fooTwo?\n清单 3-56\n当没有构造函数使用 @Autowired 注解时，按构造函数自动装配的示例\n\
  ```\n\n要改变这种行为，只需用 `@Autowired` 注解任意一个构造函数即可。由于应用程序中声明了 `Foo` 和 `Bar` bean，因此可以使用另外两个构造函数中的任意一个来初始化\
  \ `Target`。\n\n如果删除了无参构造函数，则会抛出以下异常。\n\n```\nCaused by: org.springframework.beans.BeanInstantiationException:\n\
  Failed to instantiate [com.apress.prospring6.three.autowiring.Target]:\nNo default\
  \ constructor found;\nnested exception is java.lang.NoSuchMethodException:\ncom.apress.prospring6.three.autowiring.Target.()\n\
  ```\n\n编译器允许你用 `@Autowired` 注解剩余的两个构造函数，因为 Kotlin 编译器并不关心 Spring 允许什么，但运行代码时会导致混乱，并且无法创建\
  \ `Target` bean。它会抛出 `BeanCreationException` 异常，当 `Target` 类有两个被注解的构造函数时，以下片段显示了部分堆栈跟踪。\n\
  \n```\nException in thread \"main\" org.springframework.beans.factory.BeanCreationException:\
  \ Error creating bean with name 'target':\nInvalid autowire-marked constructor:\
  \ public com.apress.prospring6.three.autowiring.Target(com.apress.prospring6.three.autowiring.\n\
  Foo,com.apress.prospring6.three.autowiring.Bar).\nFound constructor with 'required'\
  \ Autowired annotation already: public com.apress.prospring6.three.autowiring.Target(com.apress.prospring6.three.autowiring.Foo)\n\
  ...\nat com.apress.prospring6.three.autowiring.AutowiringDemo.main(AutowiringDemo.java:51)\n\
  ```\n\n\n\n### `byType` 自动装配\n\n当没有声明构造函数，但存在使用 `@Autowired` 注解的 setter 方法时，Spring\
  \ 将使用这些 setter 方法，并根据其类型识别要注入的 Bean。清单 3-57 展示了一个名为 `AnotherTarget` 的类，它与 `Target`\
  \ 类非常相似，但其属性是通过 setter 方法注入的。\n\n```\nobject AutowiringDemo {\nprivate val logger\
  \ = LoggerFactory.getLogger(AutowiringDemo::class.java)\n@JvmStatic\nfun main(args:\
  \ Array) {\nval ctx = AnnotationConfigApplicationContext(AutowiringCfg::class.java)\n\
  val anotherTarget: AnotherTarget = ctx.getBean(AnotherTarget::class.java)\nlogger.info(\"\
  anotherTarget: Created anotherTarget? {}\", anotherTarget != null)\nlogger.info(\"\
  anotherTarget: Injected bar? {}\", anotherTarget.bar != null)\nlogger.info(\n\"\
  anotherTarget: Injected fooOne? {}\",\nif (anotherTarget.fooOne != null) anotherTarget.fooOne.id\
  \ else \"\"\n)\nlogger.info(\n\"anotherTarget: Injected fooTwo? {}\",\nif (anotherTarget.fooTwo\
  \ != null) anotherTarget.fooTwo.id else \"\"\n)\n}\n}\n// 省略了之前示例中的部分代码\n@Component\n\
  @Lazy\ninternal class AnotherTarget {\nvar fooOne: Foo? = null\n@Autowired set(@Qualifier(\"\
  foo\") value) {\nlogger.info(\" --> AnotherTarget#setFooOne(Foo) called\")\nfield\
  \ = value\n}\nvar fooTwo: Foo? = null\n@Autowired set(@Qualifier(\"anotherFoo\"\
  ) value) {\nlogger.info(\" --> AnotherTarget#setFooTwo(Foo) called\")\nfield = value\n\
  }\nvar bar: Bar? = null\n@Autowired set(value) {\nlogger.info(\" --> AnotherTarget#setBar(Bar)\
  \ called\")\nfield = value\n}\ncompanion object {\nprivate val logger: org.slf4j.Logger\
  \ =\norg.slf4j.LoggerFactory.getLogger(AnotherTarget::class.java)\n}\n}\n清单 3-57\n\
  使用 Setter 方法按类型自动装配的示例\n```\n\n运行此代码时，将输出清单 3-58 中的内容。\n\n```\nINFO : AnotherTarget\
  \ -  --> AnotherTarget#setFooOne(Foo) called\nINFO : AnotherTarget -  --> AnotherTarget#setFooTwo(Foo)\
  \ called\nINFO : AnotherTarget -  --> AnotherTarget#setBar(Bar) called\nINFO : AutowiringDemo\
  \ - anotherTarget: Created anotherTarget? true\nINFO : AutowiringDemo - anotherTarget:\
  \ Injected bar? true\nINFO : AutowiringDemo - anotherTarget: Injected fooOne? a4eb2b71\n\
  INFO : AutowiringDemo - anotherTarget: Injected fooTwo? a4eb2b71\n清单 3-58\n当 Setter\
  \ 方法使用 @Autowired 注解时按类型自动装配的示例\n```\n\n当字段直接使用 `@Autowired` 注解时，Spring 也会按类型注入依赖。由于不推荐使用字段注入，本书将不展示相关代码，但可以查看项目中的\
  \ `com.apress.prospring6.three.autowiring.FieldTarget` 类。\n\n到目前为止，您已经看到，只声明了一个\
  \ `Foo` Bean，并且该 Bean 被注入到了 `fooOne` 和 `fooTwo` 两个属性中。如果我们再声明另一个 `Foo` Bean，这将破坏\
  \ `Target`、`AnotherTarget` 和 `FieldTarget` 的 Bean 定义，Spring 将无法再创建它们。因为依赖项是按类型自动装配的，并且需要两个\
  \ `Foo` 类型的依赖，而 Spring 无法确定这两个 `Foo` Bean 分别需要注入到哪里。清单 3-59 展示了更新后的 `AutowiringCfg`\
  \ 类，它声明了一个 `Foo` 类型的 Bean。\n\n```\n@Configuration\n@ComponentScan\nclass AutowiringCfg\
  \ {\n@Bean\nfun anotherFoo():Foo {\nreturn Foo()\n}\n}\n清单 3-59\n声明了一个 Foo 类型 Bean\
  \ 的 AutowiringCfg 类\n```\n\n如果您运行 `AutowiringDemo` 类，将会抛出以下 `org.springframework.beans.factory.NoUniqueBeanDefinitionException`\
  \ 异常：\n\n```\nCaused by: org.springframework.beans.factory.NoUniqueBeanDefinitionException:\n\
  No qualifying bean of type 'com.apress.prospring6.three.autowiring.Foo'\navailable:\
  \ expected single matching bean but found 2: foo,anotherFoo\n```\n\n要解决 Spring 的这个困境，解决方案是指定我们希望将哪个\
  \ Bean 注入到哪里，这意味着从按类型自动装配切换到按名称自动装配。\n\n### `byName` 自动装配\n\n清单 3-60 展示了修改后的 `Target`\
  \ 类，其构造函数被修改为接收特定的 Bean 作为参数。之前用于注入集合的 `@Qualifier` 注解，在这里同样起到了关键作用。\n\n```\npackage\
  \ com.apress.prospring6.three.autowiring\nimport org.springframework.beans.factory.annotation.Qualifier\n\
  // 省略了其他 import 语句\n@Component\n@Lazy\ninternal class Target {\nvar fooOne: Foo?\
  \ = null\nvar fooTwo: Foo? = null\nvar bar: Bar? = null\n@Autowired\nconstructor(@Qualifier(\"\
  foo\") foo: Foo?) {\nfooOne = foo\nlogger.info(\" --> Target(Foo) called\")\n}\n\
  @Autowired\nconstructor(@Qualifier(\"foo\") foo: Foo?, bar: Bar?) {\nfooOne = foo\n\
  this.bar = bar\nlogger.info(\" --> Target(Foo, Bar) called\")\n}\ncompanion object\
  \ {\nprivate val logger: Logger = LoggerFactory.getLogger(Target::class.java)\n\
  }\n}\n清单 3-60\n使用构造函数按名称自动装配配置的 Target Bean 类\n```\n\n请注意，`@Qualifier` 是放在参数上，而不是构造函数上。如果您使用\
  \ `@Inject` 而不是 `@Autowired` 来注入依赖，请使用 `@Named` 而不是 `@Qualifier`。要修复 `AnotherTarget`\
  \ 类，需要将 `@Qualifier` 放在 setter 参数上，如清单 3-61 所示。\n\n```\npackage com.apress.prospring6.three.autowiring;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\n// 省略了其他 import\
  \ 语句\n@Component\n@Lazy\ninternal class AnotherTarget {\nvar fooOne: Foo? = null\n\
  @Autowired set(@Qualifier(\"foo\") value) {\nlogger.info(\" --> AnotherTarget#setFooOne(Foo)\
  \ called\")\nfield = value\n}\nvar fooTwo: Foo? = null\n@Autowired set(@Qualifier(\"\
  anotherFoo\") value) {\nlogger.info(\" --> AnotherTarget#setFooTwo(Foo) called\"\
  )\nfield = value\n}\nvar bar: Bar? = null\n@Autowired set(value) {\nlogger.info(\"\
  \ --> AnotherTarget#setBar(Bar) called\")\nfield = value\n}\ncompanion object {\n\
  private val logger: org.slf4j.Logger =\norg.slf4j.LoggerFactory.getLogger(AnotherTarget::class.java)\n\
  }\n}\n清单 3-61\n使用 Setter 方法按名称自动装配配置的 AnotherTarget Bean 类\n```\n\n运行 `AutowiringDemo`，访问\
  \ `AnotherTarget` 并检查其依赖项，将打印出清单 3-62 中的详细信息，这清楚地表明有两个不同的 `Foo` Bean 被注入。\n\n```\n\
  INFO : AnotherTarget -  --> AnotherTarget#setFooOne(Foo) called\nINFO : AnotherTarget\
  \ -  --> AnotherTarget#setFooTwo(Foo) called\nINFO : AnotherTarget -  --> AnotherTarget#setBar(Bar)\
  \ called\nINFO : AutowiringDemo - anotherTarget: Created anotherTarget? true\nINFO\
  \ : AutowiringDemo - anotherTarget: Injected bar? true\nINFO : AutowiringDemo -\
  \ anotherTarget: Injected fooOne? baa24632\nINFO : AutowiringDemo - anotherTarget:\
  \ Injected fooTwo? 0d74b352\n清单 3-62\n当 Setter 方法使用 @Autowired 注解时按类型自动装配的示例\n```\n\
  \n至于 `FieldTarget`，事情就更简单了；`@Qualifier` 注解直接放在被自动装配的字段上，如清单 3-63 所示。\n\n```\npackage\
  \ com.apress.prospring6.three.autowiring\nimport org.springframework.beans.factory.annotation.Qualifier\n\
  // 省略了其他 import 语句\n@Component\n@Lazy\nclass FieldTarget {\ncompanion object {\n\
  private val logger: org.slf4j.Logger =\norg.slf4j.LoggerFactory.getLogger(FieldTarget::class.java)\n\
  }\n@Autowired @Qualifier(\"foo\") var fooOne:Foo? = null\n@Autowired @Qualifier(\"\
  anotherFoo\") var fooTwo:Foo? = null\n@Autowired var bar:Bar? = null\n}\n清单 3-63\n\
  使用字段按名称自动装配配置的 FieldTarget Bean 类\n```\n\n\n\n### 又一个难题\n\n当按类型自动装配时，如果 bean 类型之间存在关联，事情就会变得复杂。当有多个类实现了同一个接口，并且需要自动装配的属性将该接口指定为类型时，就会抛出异常，因为\
  \ Spring 不知道该注入哪个 bean。为了创建这样一个场景，我们将把 `Foo` 转换成一个接口，并声明两个实现它的 bean 类型，每个类型都有自己的\
  \ bean 声明。配置是默认的，bean 名称由 Spring 生成，如清单 3-64 所示。\n\n```\npackage com.apress.prospring6.three.pickle\n\
  // 其他导入语句已省略\ninternal interface Foo { // 空接口，用作标记接口\n}\ninternal class FooImplOne\
  \ : Foo {\nvar id = \"one:\" + UUID.randomUUID().toString().replace(\"-\", \"\"\
  ).substring(0, 8)\noverride fun toString(): String {\nreturn super.toString() +\
  \ \", id=\" + id.toString()\n}\n}\ninternal class FooImplTwo : Foo {\nvar id = \"\
  two:\" + UUID.randomUUID().toString().replace(\"-\", \"\").substring(0, 8)\noverride\
  \ fun toString(): String {\nreturn super.toString() + \", id=\" + id.toString()\n\
  }\n}\ninternal class Bar\n@Configuration\n@ComponentScan\ninternal class AutowiringCfg\
  \ {\n@Bean\nfun fooImplOne(): Foo {\nreturn FooImplOne()\n}\n@Bean\nfun fooImplTwo():\
  \ Foo {\nreturn FooImplTwo()\n}\n@Bean\nfun bar(): Bar {\nreturn Bar()\n}\n@Bean\n\
  fun trickyTarget(): TrickyTarget {\nreturn TrickyTarget()\n}\n}\ninternal class\
  \ TrickyTarget {\nvar fooOne: Foo? = null\nvar fooTwo: Foo? = null\nvar bar: Bar?\
  \ = null\n}\n清单 3-64\nFoo 实现类及配置\n```\n\n`TrickyTarget` 代码与 `Target` 类非常相似，当按类型注入依赖项时（如清单\
  \ 3-64 所示），Spring 无法创建此 bean，并会抛出 `NoUniqueBeanDefinitionException`：\n\n```\nCaused\
  \ by: org.springframework.beans.factory.NoUniqueBeanDefinitionException:\nNo qualifying\
  \ bean of type 'com.apress.prospring6.three.pickle.Foo'\navailable: expected single\
  \ matching bean but found 2: fooImplOne,fooImplTwo\n```\n\n控制台输出要长得多，但上述输出的前几行以相当易读的方式揭示了问题。当\
  \ Spring 不知道要自动装配哪个 bean 时，它会抛出一个 `NoUniqueBeanDefinitionException`，并附带一条明确的消息。它会告诉你找到了哪些\
  \ bean，但无法选择在何处使用哪一个。有两种方法可以解决这个问题。\n\n第一种方法是在你希望 Spring 优先考虑自动装配的 bean 定义中使用 `@Primary`\
  \ 注解。这以一种相当奇特的方式解决了问题，因为在 `fooOne` 和 `fooTwo` 中，都会注入带有 `@Primary` 注解的 bean。配置及结果输出如清单\
  \ 3-65 所示。\n\n```\npackage com.apress.prospring6.three.pickle\n// 导入语句已省略\nimport\
  \ org.springframework.context.annotation.Primary\n@Configuration\n@ComponentScan\n\
  class AutowiringCfg {\n@Bean @Primary\nfun fooImplOne(): Foo = FooImplOne()\n@Bean\n\
  fun fooImplTwo(): Foo = FooImplTwo()\n@Bean\nfun bar(): Bar = Bar()\n@Bean\nfun\
  \ trickyTarget(): TrickyTarget = TrickyTarget()\n}\n// 使用 @Primary 配置的日志\nINFO :\
  \ TrickyTarget -  --> Property fooOne set\nINFO : TrickyTarget -  --> Property fooTwo\
  \ set\nINFO : TrickyTarget -  --> Property bar set\nINFO : PickleAutowiringDemo\
  \ - target: Created target? true\nINFO : PickleAutowiringDemo - target: Injected\
  \ bar? true\nINFO : PickleAutowiringDemo - target: Injected fooOne? com.apress.prospring6.three.pickle.FooImplOne@2eea88a1[id=one:7ab78d36]\n\
  INFO : PickleAutowiringDemo - target: Injected fooTwo? com.apress.prospring6.three.pickle.FooImplOne@2eea88a1[id=one:7ab78d36]\n\
  清单 3-65\n使用 @Primary 的配置\n```\n\n所以，一切恢复正常，但即便如此，使用 `@Primary` 仅在只有两个相关 bean 类型时才是解决方案。如果有更多类型，使用它并不能消除\
  \ `NoUniqueBeanDefinitionException`。\n\n真正能解决问题的是第二种方法，它能让你完全控制哪个 bean 注入到何处，即命名你的\
  \ bean，并使用 `@Qualifier` 配置它们注入的位置，如上一节所示。清单 3-66 展示了使用 `@Qualifier` 配置 setter 的\
  \ `TrickyTarget` 类，以及运行 `PickleAutowiringDemo` 类后的结果输出。\n\n```\npackage com.apress.prospring6.three.pickle\n\
  // 导入语句已省略\nimport org.springframework.beans.factory.annotation.Qualifier\nclass\
  \ TrickyTarget {\ncompanion object {\nprivate val logger: org.slf4j.Logger =\norg.slf4j.LoggerFactory.getLogger(FieldTarget::class.java)\n\
  }\nvar fooOne:Foo? = null\n@Autowired\n@Qualifier(\"fooImplOne\")\nset(value) {\n\
  field = value\nlogger.info(\" --> Property fooOne set\")\n}\nvar fooTwo:Foo? = null\n\
  @Autowired\n@Qualifier(\"fooImplTwo\")\nset(value) {\nfield = value\nlogger.info(\"\
  \ --> Property fooTwo set\")\n}\nvar bar:Bar? = null\n@Autowired\nset(value) {\n\
  field = value\nlogger.info(\" --> Property bar set\")\n}\nconstructor() {\nlogger.info(\"\
  \ --> TrickyTarget() called\");\n}\n}\n// 使用 @Qualifier 配置的日志\nINFO : TrickyTarget\
  \ -  --> TrickyTarget() called\nINFO : TrickyTarget -  --> Property fooOne set\n\
  INFO : TrickyTarget -  --> Property fooTwo set\nINFO : TrickyTarget -  --> Property\
  \ bar set\nINFO : PickleAutowiringDemo - target: Created target? true\nINFO : PickleAutowiringDemo\
  \ - target: Injected bar? true\nINFO : PickleAutowiringDemo - target: Injected fooOne?\
  \ com.apress.prospring6.three.pickle.FooImplOne@7fd7a283[id=one:8efc8d31]\nINFO\
  \ : PickleAutowiringDemo - target: Injected fooTwo? com.apress.prospring6.three.pickle.FooImplTwo@22f59fa[id=two:a5d9ed75]\n\
  清单 3-66\n使用 @Qualifier 的配置及结果输出\n```\n\n### 何时使用自动装配\n\n在编写 Spring 应用程序时，自动装配是无法避免的；Spring\
  \ 的核心理念就是你可以随心所欲地创建类，然后让 Spring 为你工作。问题不在于何时应该使用自动装配，而在于哪种类型的自动装配适合你应用程序的特定部分。你可能会倾向于使用\
  \ `byType`，直到你意识到在 `ApplicationContext` 中，每个类型只能有一个 bean——当你需要维护同一类型但配置不同的 bean\
  \ 时，这一限制就会带来问题。同样的论点也适用于构造函数自动装配。在某些情况下，自动装配可以节省时间，但显式定义装配关系并不会花费太多额外精力，而且你能受益于显式语义、属性命名的完全灵活性以及对同一类型实例数量的完全控制。\n\
  \n\n\n## 总结\n\n在本章中，我们广泛探讨了 Spring Core 和 IoC 的总体概念。我们通过示例展示了 IoC 的类型，并介绍了在应用程序中使用每种机制的优缺点。我们研究了\
  \ Spring 提供了哪些 IoC 机制，以及在应用程序中何时（以及何时不）使用它们。在探索 IoC 的过程中，我们介绍了 Spring 的 `BeanFactory`（它是\
  \ Spring IoC 能力的核心组件），以及 `ApplicationContext`（它扩展了 `BeanFactory` 并提供了额外的功能）。\n\n\
  对于 `ApplicationContext`，我们重点介绍了 `AnnotationConfigApplicationContext`，它允许通过注解对 Spring\
  \ 进行外部配置。我们还讨论了另一种为 `ApplicationContext` 声明 DI 需求的方法，即使用 Kotlin 注解。\n\n本章还向您介绍了\
  \ Spring IoC 功能集的基础知识，包括 Setter 注入、构造器注入、方法注入、自动装配和 Bean 继承。在配置的讨论中，我们演示了如何使用各种值（包括其他\
  \ Bean）来配置 Bean 属性。\n\n本章只是浅尝辄止地介绍了 Spring 及其 IoC 容器。在下一章中，您将了解一些特定于 Spring 的 IoC\
  \ 相关特性，并更详细地了解 Spring Core 中可用的其他功能。\n\n脚注 1\n\n"
- "# 4. 高级 Spring 配置与 Spring Boot\n\n在上一章中，我们详细介绍了控制反转（IoC）的概念以及它如何融入 Spring 框架。然而，我们实际上只是触及了\
  \ Spring Core 能力的皮毛。Spring 提供了广泛的服务来补充和扩展其基本的 IoC 能力。在本章中，您将深入探讨这些内容。具体来说，您将了解以下内容：\n\
  \n*   *管理 Bean 生命周期*：到目前为止，您看到的所有 Bean 都相当简单，并且与 Spring 容器完全解耦。在本章中，我们介绍一些策略，您可以使用这些策略使您的\
  \ Bean 在其生命周期的各个阶段接收来自 Spring 容器的通知。您可以通过实现 Spring 规定的特定接口、指定 Spring 可以通过反射调用的方法，或者使用\
  \ JavaBeans^(³⁰) 生命周期注解来实现这一点。\n\n*   *让您的 Bean “感知 Spring”*：在某些情况下，您希望 Bean 能够与配置它的\
  \ `ApplicationContext` 实例进行交互。因此，Spring 提供了两个接口：`BeanNameAware` 和 `ApplicationContextAware`（在**第**\
  \ **3** **章**末尾介绍），它们分别允许 Bean 获取其分配的名称和引用其 `ApplicationContext`。与此主题对应的部分涵盖了实现这些接口，并给出了在应用程序中使用它们的一些实际考虑。\n\
  \n*   *使用* *FactoryBeans*：顾名思义，`FactoryBean` 接口旨在由任何充当其他 Bean 工厂的 Bean 来实现。`FactoryBean`\
  \ 接口提供了一种机制，通过该机制您可以轻松地将自己的工厂与 Spring 的 *BeanFactory* 接口集成。\n\n*   *使用 JavaBeans*\
  \ `PropertyEditors`：`PropertyEditor` 接口是 `java.beans` 包中提供的标准接口。`PropertyEditors`\
  \ 用于在属性值和字符串表示之间进行转换。Spring 广泛使用 `PropertyEditors`，主要是为了读取在 `BeanFactory` 配置中指定的值，并将其转换为正确的类型。在本章中，我们讨论\
  \ Spring 提供的一组 `PropertyEditors`，以及如何在应用程序中使用它们。我们还将了解如何实现自定义的 `PropertyEditors`。\n\
  \n*   *了解更多关于 Spring* *ApplicationContext* 的信息：如您所知，`ApplicationContext` 是 `BeanFactory`\
  \ 的扩展，旨在用于完整的应用程序。`ApplicationContext` 接口提供了一组有用的附加功能，包括国际化消息支持、资源加载和事件发布。在本章中，我们将详细探讨\
  \ `ApplicationContext` 除了 IoC 之外提供的功能。我们还会稍微超前一点，向您展示在构建 Web 应用程序时，`ApplicationContext`\
  \ 如何简化 Spring 的使用。\n\n*   *测试 Spring 应用程序*：**第** **3** **章**解释了如何构建 Spring `ApplicationContext`，并通过运行\
  \ `main(..)` 方法演示了它构建良好——Bean 按预期创建。然而，这并不是最佳方式，因为包含这些方法的类在构建过程中仅被编译，而不会运行，因此 Bean\
  \ 声明中的任何更改或导致问题的库升级，可能要到开发后期才会变得明显。因此，在本章中，我们将展示如何创建 Spring 测试上下文来测试 Spring 应用程序。\n\
  \n*   *使用 Spring Boot*：通过使用 Spring Boot，Spring 应用程序的配置变得更加实用。这个 Spring 项目使得创建可以“直接运行”的独立、生产级别的基于\
  \ Spring 的应用程序变得容易。\n\n*   *使用配置增强功能*：我们介绍了一些使应用程序配置更简单的特性，例如 Profile 管理、环境和属性源抽象等。介绍这些特性的部分将展示如何使用它们来满足特定的配置需求。\n\
  \n*   *使用 Groovy 进行配置*：Spring 4.0 引入了使用 Groovy 语言配置 Bean 定义的能力，正如您将看到的，它可以作为旧的 XML\
  \ 和 Java/Kotlin 配置风格的替代/补充。\n\n\n\n## Spring 对应用可移植性的影响\n\n本章讨论的大多数功能都是 Spring 特有的，并且在许多情况下，其他\
  \ IoC 容器并不提供这些功能。尽管许多 IoC 容器都提供生命周期管理功能，但它们可能通过一套与 Spring 不同的接口来实现。如果你的应用在不同 IoC\
  \ 容器之间的可移植性确实很重要，你可能需要避免使用某些将应用与 Spring 耦合在一起的功能。\n\n但请记住，通过设定一个约束——即你的应用可在不同 IoC\
  \ 容器之间移植——你将失去 Spring 所提供的丰富功能。既然你很可能已经战略性地选择使用 Spring，那么充分利用其能力是合情合理的。\n\n注意不要凭空制造可移植性的需求。在许多情况下，你应用的最终用户并不关心应用是否能在三个不同的\
  \ IoC 容器上运行；他们只希望它能正常运行。根据我们的经验，试图基于所选技术中可用的最低公共特性来构建应用，往往是一个错误。这样做通常会让你的应用从一开始就处于劣势。然而，如果你的应用确实需要\
  \ IoC 容器的可移植性，请不要将其视为一个缺点——这是一个真实的需求，因此也是你的应用应该满足的需求。在 *Expert One-on-One: J2EE\
  \ Development without EJB* (Wrox, 2004) 一书中，Rod Johnson 和 Jürgen Höller 将这类需求描述为“幻影需求”，并对其以及它们如何影响你的项目进行了更详细的讨论。\n\
  \n虽然使用这些功能可能会使你的应用与 Spring 框架耦合，但实际上，你在更广泛的范围内提高了应用的可移植性。试想一下，你正在使用一个免费、开源且没有特定供应商关联的框架。一个使用\
  \ Spring 的 IoC 容器构建的应用可以在任何运行 Java 或 Kotlin 的地方运行。对于 Java/Kotlin 企业级应用，Spring 为可移植性开辟了新的可能性。Spring\
  \ 提供了许多与 JEE 相同的能力，还提供了类来抽象和简化 JEE 的许多其他方面。在许多情况下，可以使用 Spring 构建一个在简单 Servlet 容器中运行的\
  \ Web 应用，但其复杂程度与针对完整 JEE 应用服务器的应用相当。通过与 Spring 耦合，你可以用 Spring 中的等效功能替换许多供应商特定或依赖于供应商配置的功能，从而提高应用的可移植性。\n\
  \n## Bean 生命周期管理\n\n任何 IoC 容器（包括 Spring）的一个重要部分是，Bean 可以被构造为在其生命周期的特定点接收通知。这使你的\
  \ Bean 能够在生命周期的特定时刻执行相关的处理。通常，有两个生命周期事件与 Bean 特别相关：*初始化后* 和 *销毁前*。\n\n![](img/524962_1_En_4_Figa_HTML.jpg)\
  \ 一个感叹号标记。 在 Spring 的上下文中，一旦 Spring 完成设置 Bean 的所有属性值并完成你配置它执行的任何依赖检查，就会触发 *初始化后*\
  \ 事件。\n\n![](img/524962_1_En_4_Figb_HTML.jpg) 一个感叹号标记。 *销毁前* 事件在 Spring 销毁 Bean\
  \ 实例之前触发。\n\n但是，对于原型作用域的 Bean，Spring 不会触发 *销毁前* 事件。Spring 的设计是，无论 Bean 的作用域如何，都会在对象上调用初始化生命周期回调方法；而对于原型作用域的\
  \ Bean，则不会调用销毁生命周期回调方法。\n\nSpring 提供了三种机制，Bean 可以使用它们来挂钩这些事件并执行一些额外的处理：\n\n*   基于接口的机制\n\
  *   基于方法的机制\n*   基于注解的机制\n\n使用基于接口的机制，你的 Bean 实现一个特定于它想要接收的通知类型的接口，然后 Spring 通过接口中定义的回调方法通知\
  \ Bean。对于基于方法的机制，Spring 允许你在 `ApplicationContext` 配置中指定在 Bean 初始化时调用的方法名称，以及在 Bean\
  \ 销毁时调用的方法名称。对于基于注解的机制，你可以使用 JSR-250 注解来指定 Spring 应在构造后或销毁前调用的方法。\n\n对于这两个事件，这些机制都实现了完全相同的目的。基于接口的机制在\
  \ Spring 中被广泛使用，这样你就不必在每次使用 Spring 的某个组件时都记得指定初始化或销毁方法。然而，在你自己的 Bean 中，使用基于方法或基于注解的机制可能更好，因为你的\
  \ Bean 不需要实现任何 Spring 特定的接口。虽然我们说过可移植性通常不像许多书籍让你相信的那么重要，但这并不意味着当存在一个完全可行的替代方案时，你应该牺牲可移植性。话虽如此，如果你正在以其他方式将应用与\
  \ Spring 耦合，那么使用基于接口的方法可以让你指定一次回调，然后就不用再管它了。如果你正在定义大量需要利用生命周期通知的相同类型的 Bean，那么使用基于接口的机制可以避免在\
  \ Bean 配置中为每个 Bean 指定生命周期回调方法。使用 JSR-250 注解是 JCP 定义的标准，你也不会与 Spring 特定的注解耦合。只需确保运行你应用的\
  \ IoC 容器支持 JSR-250 标准即可。\n\n总的来说，选择哪种机制来接收生命周期通知取决于你的应用需求。当使用注解类型配置时，只需确保你使用的 IoC\
  \ 容器支持 JSR-250。如果你不太关心可移植性，或者你正在定义许多需要生命周期通知的相同类型的 Bean，那么使用基于接口的机制是确保你的 Bean 始终能接收到它们期望的通知的最佳方式。如果你计划在不同的\
  \ Spring 项目中使用某个 Bean，你几乎肯定希望该 Bean 的功能尽可能自包含，因此你应该坚决使用基于接口的机制。\n\n图 4-1 展示了 Spring\
  \ 如何管理其容器内 Bean 的生命周期的高级概述。\n\n![](img/524962_1_En_4_Fig1_HTML.jpg)\n\n一个流程图说明了\
  \ Spring Bean 的生命周期。从扫描 Java 配置 Bean 定义开始，接着是注入 Bean 依赖、检查 Spring 感知能力、Bean 创建生命周期回调和\
  \ Bean 销毁生命周期回调。\n\n图 4-1\nSpring Bean 生命周期\n\n\n\n## 钩入 Bean 的创建过程\n\n通过感知自身的初始化时机，Bean\
  \ 可以检查其所有必需的依赖项是否已满足。虽然 Spring 可以为你检查依赖项，但这基本上是一种“全有或全无”的方式，并且它不提供任何机会来为依赖项解析过程应用额外的逻辑。考虑一个\
  \ Bean，它声明了四个 Setter 依赖项，其中两个是必需的，另一个在没有提供依赖项的情况下有一个合适的默认值。使用初始化回调，你的 Bean 可以检查它所需的依赖项，并根据需要抛出异常或提供默认值。\n\
  \nBean 无法在其构造函数中执行这些检查，因为此时 Spring 还没有机会为它能满足的依赖项提供值。Spring 中的初始化回调是在 Spring 完成提供它所能提供的依赖项并执行你要求的任何依赖项检查之后调用的。\n\
  \n你不仅限于使用初始化回调来检查依赖项；你可以在回调中做任何你想做的事情，但它对于我们描述的目的最为有用。在许多情况下，初始化回调也是触发你的 Bean 必须根据其配置自动执行的任何操作的地方。例如，如果你构建一个\
  \ Bean 来运行定时任务，初始化回调提供了启动调度器的理想位置——毕竟，配置数据是在 Bean 上设置的。\n\n![](img/524962_1_En_4_Figc_HTML.jpg)\
  \ 一个感叹号。 你不需要编写一个 Bean 来运行定时任务，因为 Spring 可以通过其内置的调度功能或通过与 Quartz 调度器的集成来自动完成此操作。我们将在**第**\
  \ **12** **章**中更详细地介绍这一点。\n\n### 在 Bean 创建时执行方法\n\n正如我们之前提到的，接收初始化回调的一种方法是将 Bean\
  \ 上的一个方法指定为初始化方法，并告诉 Spring 使用此方法作为初始化方法。如前所述，当你只有几个相同类型的 Bean，或者希望保持应用程序与 Spring\
  \ 解耦时，这种基于回调的机制非常有用。使用这种机制的另一个原因是使你的 Spring 应用程序能够与之前构建的或由第三方供应商提供的 Bean 一起工作。指定回调方法只需将方法名称指定为\
  \ `@Bean` 注解中 `initMethod` 属性的值即可。此注解用于在 Java/Kotlin 配置类中声明 Bean。虽然 Java/Kotlin\
  \ 配置将在本章稍后介绍，但 Bean 初始化部分属于这里。\n\n代码清单 4-1 展示了一个具有两个依赖项的基本 Bean。\n\n```\npackage\
  \ com.apress.prospring6.four.initmethod\nimport org.slf4j.LoggerFactory\nimport\
  \ org.springframework.beans.factory.BeanCreationException\n// 其他导入语句已省略\nclass Singer\
  \ {\nvar name: String? = null\nset(value) {\nlogger.info(\"Calling setName for bean\
  \ of type {}.\", Singer::class.java)\nfield = value\n}\nvar age = Int.MIN_VALUE\n\
  set(value) {\nlogger.info(\"Calling setAge for bean of type {}.\", Singer::class.java)\n\
  field = value\n}\nprivate fun init() {\nlogger.info(\"Initializing bean\")\nif (name\
  \ == null) {\nlogger.info(\"Using default name\")\nname = DEFAULT_NAME\n}\nrequire(age\
  \ != Int.MIN_VALUE) {\n\"You must set the age property of any beans of type \" +\
  \ Singer::class.java }\n}\noverride fun toString(): String {\nreturn \"name=${name},\
  \ age=${name}\"\n}\ncompanion object {\nprivate val logger = LoggerFactory.getLogger(Singer::class.java)\n\
  private const val DEFAULT_NAME = \"No Name\"\n}\n}\n@Configuration\nopen class SingerConfiguration\
  \ {\n@Bean(initMethod = \"init\")\nopen fun singerOne(): Singer {\nval singer =\
  \ Singer()\nsinger.name = \"John Mayer\"\nsinger.age = 43\nreturn singer\n}\n@Bean(initMethod\
  \ = \"init\")\nopen fun singerTwo(): Singer {\nval singer = Singer()\nsinger.age\
  \ = 42\nreturn singer\n}\n@Bean(initMethod = \"init\")\nopen fun singerThree():\
  \ Singer {\nval singer = Singer()\nsinger.name = \"John Butler\"\nreturn singer\n\
  }\n}\nobject InitMethodDemo {\nprivate val logger = LoggerFactory.getLogger(InitMethodDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(SingerConfiguration::class.java)\n\
  getBean(\"singerOne\", ctx)\ngetBean(\"singerTwo\", ctx)\ngetBean(\"singerThree\"\
  , ctx)\n}\nfun getBean(beanName: String?, ctx: ApplicationContext): Singer? {\n\
  return try {\nval bean = ctx.getBean(beanName) as Singer\nlogger.info(\"Found: {}\"\
  , bean)\nbean\n} catch (ex: BeanCreationException) {\nlogger.error(\"An error occurred\
  \ in bean configuration: \" + ex.message)\nnull\n}\n}\n}\n代码清单 4-1\n具有两个依赖项的 Bean\
  \ 类型\n```\n\n请注意，我们定义了一个方法 `init()` 来充当初始化回调。`init()` 方法检查 `name` 属性是否已设置，如果未设置，则使用存储在\
  \ `DEFAULT_NAME` 常量中的默认值。`init()` 方法还检查 `age` 属性是否已设置，如果未设置，则抛出 `IllegalArgumentException`。\n\
  \n`InitMethodDemo` 类的 `main()` 方法尝试使用其自己的 `getBean()` 方法从 `AnnotationConfigApplicationContext`\
  \ 获取三个 Bean，它们都是 `Singer` 类型。请注意，在 `getBean()` 方法中，如果成功获取 Bean，其详细信息将写入控制台输出。如果在\
  \ `init()` 方法中抛出异常（在本例中，如果未设置 `age` 属性，就会发生这种情况），那么 Spring 会将该异常包装在 `BeanCreationException`\
  \ 中。`getBean()` 方法捕获这些异常，将一条告知我们错误的消息写入控制台输出，并返回一个 `null` 值。\n\n\n\n清单 4-2 所示的代码提取了`ApplicationContext`配置，该配置定义了清单\
  \ 4-1 中使用的 bean。\n\n```\n@Configuration\nopen class SingerConfiguration {\n@Bean(initMethod\
  \ = \"init\")\nopen fun singerOne(): Singer {\nval singer = Singer()\nsinger.name\
  \ = \"John Mayer\"\nsinger.age = 43\nreturn singer\n}\n@Bean(initMethod = \"init\"\
  )\nopen fun singerTwo(): Singer {\nval singer = Singer()\nsinger.age = 42\nreturn\
  \ singer\n}\n@Bean(initMethod = \"init\")\nopen fun singerThree(): Singer {\nval\
  \ singer = Singer()\nsinger.name = \"John Butler\"\nreturn singer\n}\n}\n清单 4-2\n\
  SingerConfiguration 配置一个包含三个 Singer Bean 的 Spring ApplicationContext\n```\n\n如你所见，三个\
  \ bean 的`@Bean`注解都有一个`initMethod`属性，它告诉 Spring 在完成 bean 配置后应立即调用`init()`方法。`singerOne`\
  \ bean 的`name`和`age`属性都有值，因此它通过`init()`方法时完全没有任何变化。`singerTwo` bean 的`name`属性没有值，这意味着在`init()`方法中，`name`属性会被赋予默认值。最后，`singerThree`\
  \ bean 的`age`属性没有值。`init()`方法中定义的逻辑将此视为错误，因此会抛出`IllegalArgumentException`。\n\n运行`InitMethodDemo`类会产生清单\
  \ 4-3 中的输出。\n\n```\nINFO : Singer - Calling setName for bean of type class com.apress.prospring6.four.initmethod.Singer.\n\
  INFO : Singer - Calling setAge for bean of type class com.apress.prospring6.four.initmethod.Singer.\n\
  INFO : Singer - Initializing bean\nDEBUG: DefaultSingletonBeanRegistry - Creating\
  \ shared instance of singleton bean 'singerTwo'\nINFO : Singer - Calling setAge\
  \ for bean of type class com.apress.prospring6.four.initmethod.Singer.\nINFO : Singer\
  \ - Initializing bean\nINFO : Singer - Using default name\nDEBUG: DefaultSingletonBeanRegistry\
  \ - Creating shared instance of singleton bean 'singerThree'\nINFO : Singer - Calling\
  \ setName for bean of type class com.apress.prospring6.four.initmethod.Singer.\n\
  INFO : Singer - Initializing bean\nWARN : AbstractApplicationContext - Exception\
  \ encountered during context initialization - cancelling refresh attempt: org.springframework.beans.factory.BeanCreationException:\
  \ Error creating bean with name 'singerThree' defined in com.apress.prospring6.four.initmethod.SingerConfiguration:\
  \ Invocation of init method failed; nested exception is java.lang.IllegalArgumentException:\
  \ You must set the age property of any beans of type class com.apress.prospring6.four.initmethod.Singer\n\
  Exception in thread \"main\" org.springframework.beans.factory.BeanCreationException:\
  \ Error creating bean with name 'singerThree' defined in com.apress.prospring6.four.initmethod.SingerConfiguration:\
  \ Invocation of init method failed; nested exception is java.lang.IllegalArgumentException:\
  \ You must set the age property of any beans of type class com.apress.prospring6.four.initmethod.Singer\n\
  清单 4-3\n运行 InitMethodDemo 产生的输出\n```\n\n从这个输出中，你可以看到`singerOne`按照我们在配置文件中指定的值被正确配置。对于`singerTwo`，由于配置中没有指定值，因此使用了`name`属性的默认值。最后，对于`singerThree`，由于`init()`方法因缺少`age`属性的值而引发错误，因此没有创建任何\
  \ bean 实例。\n\n如你所见，使用初始化方法是确保你的 bean 被正确配置的理想方式。通过使用这种机制，你可以充分利用 IoC 的优势，同时不会失去手动定义依赖关系所带来的任何控制权。\n\
  \n![](img/524962_1_En_4_Figd_HTML.jpg) 一个感叹号。 对你的初始化方法唯一的限制是它不能接受任何参数。你可以定义任何返回类型（尽管\
  \ Spring 会忽略它），甚至可以使用静态方法，但该方法必须不接受任何参数。\n\n当使用静态初始化方法时，这种机制的优势就会被抵消，因为你无法访问 bean\
  \ 的任何状态来对其进行验证。如果你的 bean 使用静态状态作为节省内存的机制，并且你正在使用静态初始化方法来验证此状态，那么你应该考虑将静态状态迁移为实例状态，并使用非静态的初始化方法。如果你使用\
  \ Spring 的单例管理功能，最终效果是一样的，但你的 bean 会更容易测试，并且你还能在需要时创建具有自身状态的多个 bean 实例。当然，在某些情况下，你需要使用跨多个\
  \ bean 实例共享的静态状态，这时你仍然可以使用静态初始化方法。\n\n\n\n### 实现 `InitializingBean` 接口\n\nSpring\
  \ 中定义的 `InitializingBean` 接口允许你在 Bean 的代码内部定义 Spring 在完成 Bean 配置后需要执行的操作。这与使用初始化方法的方式相同，它让你有机会检查\
  \ Bean 的配置以确保其有效性，并在此过程中提供任何默认值。`InitializingBean` 接口定义了一个单一方法 `afterPropertiesSet()`，其作用与上一节介绍的\
  \ `init()` 方法相同。清单 4-4 展示了使用 `InitializingBean` 接口替代初始化方法对先前示例的重新实现。\n\n```\npackage\
  \ com.apress.prospring6.four.intf\nimport org.springframework.beans.factory.InitializingBean\n\
  // 其他导入语句已省略\nclass Singer : InitializingBean {\nvar name: String? = null\nset(value)\
  \ {\nlogger.info(\"正在为类型为 {} 的 Bean 调用 setName。\", Singer::class.java)\nfield =\
  \ value\n}\nvar age = Int.MIN_VALUE\nset(value) {\nlogger.info(\"正在为类型为 {} 的 Bean\
  \ 调用 setAge。\", Singer::class.java)\nfield = value\n}\n@Throws(Exception::class)\n\
  override fun afterPropertiesSet() {\nlogger.info(\"使用 'afterPropertiesSet()' 初始化\
  \ Bean\")\nif (name == null) {\nlogger.info(\"使用默认名称\")\nname = DEFAULT_NAME\n}\n\
  require(age != Int.MIN_VALUE) {\n\"你必须为任何类型为 \" + Singer::class.java + \" 的 Bean\
  \ 设置 age 属性\"}\n}\noverride fun toString(): String {\nreturn \"name=${name}, age=${name}\"\
  \n}\ncompanion object {\nprivate val logger = LoggerFactory.getLogger(Singer::class.java)\n\
  private const val DEFAULT_NAME = \"No Name\"\n}\n}\n@Configuration\nopen class SingerConfiguration\
  \ {\n@Bean\nopen fun singerOne(): Singer {\nval singer = Singer()\nsinger.name =\
  \ \"John Mayer\"\nsinger.age = 43\nreturn singer\n}\n@Bean\nopen fun singerTwo():\
  \ Singer {\nval singer = Singer()\nsinger.age = 42\nreturn singer\n}\n@Bean\nopen\
  \ fun singerThree(): Singer {\nval singer = Singer()\nsinger.name = \"John Butler\"\
  \nreturn singer\n}\n}\nobject InitializingBeanDemo {\nprivate val logger = LoggerFactory.getLogger(InitializingBeanDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(SingerConfiguration::class.java)\n\
  getBean(\"singerOne\", ctx)\ngetBean(\"singerTwo\", ctx)\ngetBean(\"singerThree\"\
  , ctx)\n}\nfun getBean(beanName: String?, ctx: ApplicationContext): Singer? {\n\
  return try {\nval bean = ctx.getBean(beanName) as Singer\nlogger.info(\"找到: {}\"\
  , bean)\nbean\n} catch (ex: BeanCreationException) {\nlogger.error(\"Bean 配置中发生错误:\
  \ \" + ex.message)\nnull\n}\n}\n}\n清单 4-4\n实现 InitializingBean 的 Singer 类\n```\n\
  \n如你所见，此示例中的变化不大。唯一的区别在于，这个类实现了 `InitializingBean`，并且初始化逻辑已移至 `afterPropertiesSet()`\
  \ 方法中。配置不再需要 `initMethod` 属性，如果你运行 `InitializingBeanDemo`，将会看到相同的输出。\n\n### 使用 JSR-250\
  \ @PostConstruct 注解\n\nJSR-250 注解在**第** **3** 章中已结合使用 `@Resource` 进行依赖自动装配进行了描述。本节将向你展示如何使用\
  \ JSR-250 生命周期注解 `@PostConstruct`。从 Spring 2.5 开始，也支持 JSR-250 注解，用于指定当类中存在与 Bean\
  \ 生命周期相关的相应注解时，Spring 应调用的方法。清单 4-5 展示了使用 `@PostConstruct` 注解编写的先前示例。\n\n```\npackage\
  \ com.apress.prospring6.four.jsr250;\nimport jakarta.annotation.PostConstruct;\n\
  class Singer {\nvar name: String? = null\nset(value) {\nlogger.info(\"正在为类型为 {}\
  \ 的 Bean 调用 setName。\",\ncom.apress.prospring6.four.intf.Singer::class.java)\nfield\
  \ = value\n}\nvar age = Int.MIN_VALUE\nset(value) {\nlogger.info(\"正在为类型为 {} 的 Bean\
  \ 调用 setAge。\",\ncom.apress.prospring6.four.intf.Singer::class.java)\nfield = value\n\
  }\n@PostConstruct\n@Throws(Exception::class)\nprivate fun postConstruct() {\nlogger.info(\"\
  使用 'postConstruct()' 初始化 Bean\")\nif (name == null) {\nlogger.info(\"使用默认名称\")\n\
  name = DEFAULT_NAME\n}\nrequire(age != Int.MIN_VALUE) {\n\"你必须为任何类型为 \" + Singer::class.java\
  \ + \" 的 Bean 设置 age 属性\"}\n}\noverride fun toString(): String {\nreturn \"name=${name},\
  \ age=${name}\"\n}\ncompanion object {\nprivate val logger = LoggerFactory.getLogger(Singer::class.java)\n\
  private const val DEFAULT_NAME = \"No Name\"\n}\n}\n清单 4-5\n使用 @PostConstruct 实现的\
  \ Singer 类\n```\n\n该程序与使用 `@Bean(initMethod=..)` 和 `InitializingBean` 方法相同；只是将 `@PostConstruct`\
  \ 注解应用到了初始化方法上。在此场景中，该方法被重命名为 `postConstruct`，以更明确地表明此方法的目的。请注意，你可以随意命名该方法。\n\n\
  ![](img/524962_1_En_4_Fige_HTML.jpg) 信息符号。 用于测试这个新 `Singer` Bean 类型的配置和类与清单 4-4\
  \ 中 `InitializingBean` 示例中的完全相同，产生的输出也是如此，因此此处不再重复，但欢迎你自行执行本书项目中的 `com.apress.prospring6.four.jsr250.PostConstructDemo`\
  \ 类来验证这一论断。\n\n这三种方法各有优缺点：\n\n*   使用初始化方法，你可以保持应用程序与 Spring 解耦，但必须记住为每个需要它的 Bean\
  \ 配置初始化方法。\n\n*   使用 `InitializingBean` 接口，你可以为 Bean 类的所有实例指定一次初始化回调，但这样做会使你的应用程序与\
  \ Spring 耦合。\n\n*   使用注解，你需要将注解应用于方法，并确保 IoC 容器支持 JSR-250。\n\n最终，你应该根据应用程序的需求来决定使用哪种方法。如果可移植性是一个问题，请使用初始化方法或注解方法；否则，使用\
  \ `InitializingBean` 接口可以减少应用程序所需的配置量，并降低因配置错误而导致错误潜入应用程序的可能性。\n\n![](img/524962_1_En_4_Figf_HTML.jpg)\
  \ 信息符号。 当使用 `@Bean(initMethod=..)` 或 `@PostConstruct` 配置初始化时，其优势在于可以用不同的访问权限声明初始化方法。初始化方法应在\
  \ Bean 创建时由 Spring IoC 容器仅调用一次。后续调用将导致意外结果甚至失败。通过将初始化方法声明为 `private`，可以禁止外部的额外调用。Spring\
  \ IoC 容器能够通过反射调用它，但代码中的任何额外调用都将不被允许。\n\n\n\n### 理解解析顺序\n\n所有初始化机制都可以应用于同一个 Bean\
  \ 实例。在这种情况下，Spring 会先调用带有 `@PostConstruct` 注解的方法，然后调用 `afterPropertiesSet()`，最后执行\
  \ `@Bean` 注解中指定的初始化方法。这种顺序有其技术原因，按照图 4-1 的路径，你会注意到 Bean 创建过程中的以下步骤：\n\n1.  首先调用构造函数来创建\
  \ Bean。\n\n2.  注入依赖项（调用 setter 方法）。如果存在依赖项，则会咨询 `BeanPostProcessor` 基础设施 Bean 来调用\
  \ setter 方法。这是一个 Spring 特有的基础设施 Bean，用于在 Bean 创建后对其进行修改。`@Autowired` 注解由 `AutowiredAnnotationBeanPostProcessor`\
  \ 注册，因此该 Bean 会调用带有 `@Autowired` 注解的 setter 方法。\n\n3.  现在 Bean 已存在且依赖项已提供，会咨询预初始化阶段的\
  \ `BeanPostProcessor` 基础设施 Bean，看它们是否想要调用此 Bean 中的任何方法。这些是 Spring 特有的基础设施 Bean，用于在\
  \ Bean 创建后对其进行修改。`@PostConstruct` 注解由 `CommonAnnotationBeanPostProcessor` Bean 注册，因此该\
  \ Bean 会调用带有 `@PostConstruct` 注解的方法。此方法在 Bean 构造完成后、类投入使用之前^(³¹)，以及 Bean 实际初始化之前（在\
  \ `afterPropertiesSet` 和 `initMethod` 之前）立即执行。\n\n4.  `InitializingBean` 的 `afterPropertiesSet`\
  \ 在依赖项注入后立即执行。`afterPropertiesSet()` 方法由 `BeanFactory` 在设置完所有提供的 Bean 属性并满足 `BeanFactoryAware`\
  \ 和 `ApplicationContextAware` 后调用。\n\n5.  最后执行 `initMethod` 属性中按名称指定的方法，因为这是 Bean\
  \ 的实际初始化方法。\n\n代码清单 4-6 中展示的 `AllInitMethodsDemo` 类集可用于演示上述所有断言。\n\n```\npackage\
  \ com.apress.prospring6.four.all;\n// 导入语句已省略\ninternal class Dependency\ninternal\
  \ class MultiInit : InitializingBean {\n@set:Autowired\nvar dependency: Dependency?\
  \ = null\nset(dependency) {\nlogger.info(\"2\\. 为类型为 {} 的 Bean 调用 setDependency。\"\
  , MultiInit::class.java)\nfield = dependency\n}\ninit {\nlogger.info(\"1\\. 为类型为\
  \ {} 的 Bean 调用构造函数。\", MultiInit::class.java)\n}\n@PostConstruct\n@Throws(Exception::class)\n\
  private fun postConstruct() {\nlogger.info(\"3\\. 为类型为 {} 的 Bean 调用 postConstruct()。\"\
  , MultiInit::class.java)\n}\n@Throws(Exception::class)\noverride fun afterPropertiesSet()\
  \ {\nlogger.info(\"4\\. 为类型为 {} 的 Bean 调用 afterPropertiesSet()。\", MultiInit::class.java)\n\
  }\n@Throws(Exception::class)\nprivate fun initMe() {\nlogger.info(\"5\\. 为类型为 {}\
  \ 的 Bean 调用 initMethod()。\", Bean::class)\n}\ncompanion object {\nprivate val logger\
  \ = LoggerFactory.getLogger(MultiInit::class.java)\n}\n}\n@Configuration\ninternal\
  \ open class MultiInitConfiguration {\n@Bean\nopen fun dependency() = Dependency()\n\
  @Bean(initMethod = \"initMe\")\nopen fun multiInitBean() = MultiInit()\n}\nobject\
  \ AllInitMethodsDemo {\n@JvmStatic\nfun main(args: Array) {\nAnnotationConfigApplicationContext(MultiInitConfiguration::class.java)\n\
  }\n}\n代码清单 4-6\n展示初始化方法顺序的 AllInitMethodsDemo 示例\n```\n\n当在 `AllInitMethodsDemo`\
  \ 类中运行 `main(..)` 方法，并为 `org.springframework` 包启用 `DEBUG` 日志时，将产生代码清单 4-7 中的输出。\n\
  \n```\n...\nDEBUG: DefaultSingletonBeanRegistry - 正在创建单例 Bean 'org.springframework.context.annotation.internalConfigurationAnnotationProcessor'\
  \ 的共享实例\nDEBUG: DefaultSingletonBeanRegistry - 正在创建单例 Bean 'org.springframework.context.event.internalEventListenerProcessor'\
  \ 的共享实例\nDEBUG: DefaultSingletonBeanRegistry - 正在创建单例 Bean 'org.springframework.context.event.internalEventListenerFactory'\
  \ 的共享实例\nDEBUG: DefaultSingletonBeanRegistry - 正在创建单例 Bean 'org.springframework.context.annotation.internalAutowiredAnnotationProcessor'\
  \ 的共享实例\nDEBUG: DefaultSingletonBeanRegistry - 正在创建单例 Bean 'org.springframework.context.annotation.internalCommonAnnotationProcessor'\
  \ 的共享实例\nDEBUG: DefaultSingletonBeanRegistry - 正在创建单例 Bean 'multiInitConfiguration'\
  \ 的共享实例\nDEBUG: DefaultSingletonBeanRegistry - 正在创建单例 Bean 'dependency' 的共享实例\n\
  DEBUG: DefaultSingletonBeanRegistry - 正在创建单例 Bean 'multiInitBean' 的共享实例\nINFO :\
  \ MultiInit - 1\\. 为类型为 class com.apress.prospring6.four.all.MultiInit 的 Bean 调用构造函数。\n\
  INFO : MultiInit - 2\\. 为类型为 class com.apress.prospring6.four.all.MultiInit 的 Bean\
  \ 调用 setDependency。\nINFO : MultiInit - 3\\. 为类型为 class com.apress.prospring6.four.all.MultiInit\
  \ 的 Bean 调用 postConstruct()。\nINFO : MultiInit - 4\\. 为类型为 class com.apress.prospring6.four.all.MultiInit\
  \ 的 Bean 调用 afterPropertiesSet()。\nINFO : MultiInit - 5\\. 为类型为 class com.apress.prospring6.four.all.MultiInit\
  \ 的 Bean 调用 initMethod()。\n代码清单 4-7\nAllInitMethodsDemo 控制台输出\n```\n\n如果你查看 Spring\
  \ 应用程序的详细日志，可能会注意到一些 Spring 特有的基础设施 Bean。它们的名称暗示了其类型和职责。例如，`org.springframework.context.annotation.internalCommonAnnotationProcessor`\
  \ Bean 是 `CommonAnnotationBeanPostProcessor` Bean，它为 `@PostConstruct` 注解提供支持；而 `org.springframework.context.annotation.internalAutowiredAnnotationProcessor`\
  \ Bean 是 `AutowiredAnnotationBeanPostProcessor` Bean，它为 `@Autowired` 注解提供支持。如果你想通过名称识别其他类型的\
  \ Spring 特有基础设施 Bean，请查看 `AnnotationConfigUtils`^(³²) 的源代码。\n\n## 接入 Bean 销毁\n\n\
  当使用包装了 `DefaultListableBeanFactory` 接口的 `ApplicationContext` 实现（例如通过 `getDefaultListableBeanFactory()`\
  \ 方法的 `AnnotationConfigApplicationContext`）时，你可以通过调用 `ConfigurableBeanFactory.destroySingletons()`\
  \ 向 `BeanFactory` 发出信号，表明你想要销毁所有单例实例。通常，你会在应用程序关闭时执行此操作，这允许你清理 Bean 可能持有的任何资源，从而使应用程序能够优雅地关闭。此回调还提供了将存储在内存中的任何数据刷新到持久存储，并允许\
  \ Bean 结束它们可能已启动的任何长时间运行进程的绝佳时机。\n\n为了让你的 Bean 能够接收到 `destroySingletons()` 已被调用的通知，你有三个选项，所有这些选项都与可用于接收初始化回调的机制类似。销毁回调通常与初始化回调结合使用。在许多情况下，你在初始化回调中创建和配置资源，然后在销毁回调中释放该资源。\n\
  \n![](img/524962_1_En_4_Figg_HTML.jpg) 一个感叹号。 方法名 `destroySingletons()` 暗示了一个重要的细节。Spring\
  \ 仅对单例 Bean 执行 Bean 销毁。作用域不是单例的 Bean，其生命周期不由 Spring 完全管理。例如，对于原型 Bean，Spring 容器会实例化、配置并组装一个原型对象，然后将其交给客户端，之后不再记录该原型实例。\n\
  \n\n\n## 在 Bean 销毁时执行方法\n\n要指定一个在 Bean 销毁时调用的方法，你只需在 Bean 定义的 `@Bean` 注解的 `destroyMethod`\
  \ 属性中指定该方法名称即可。Spring 会在销毁该 Bean 的单例实例之前调用它（对于 `prototype` 作用域的 Bean，Spring 不会调用此方法）。代码清单\
  \ 4-8 提供了一个使用销毁方法回调的示例。\n\n```\npackage com.apress.prospring6.four.destroymethod;\n\
  // import statements omitted\ninternal class FileManager {\nprivate lateinit var\
  \ file: Path\ninit {\nlogger.info(\"Creating bean of type {}\", FileManager::class.java)\n\
  try {\nfile = Files.createFile(Path.of(\"sample\"))\n} catch (e: IOException) {\n\
  logger.error(\"Could not create file\")\n}\n}\n@Throws(IOException::class)\nprivate\
  \ fun destroyMethod() {\nlogger.info(\n\"Calling destroyMethod() on bean of type\
  \ {}\",\nFileManager::class.java\n)\nFiles.deleteIfExists(file)\n}\ncompanion object\
  \ {\nprivate val logger = LoggerFactory.getLogger(FileManager::class.java)\n}\n\
  }\n@Configuration\ninternal open class DemoConfig {\n@Bean(destroyMethod = \"destroyMethod\"\
  )\nopen fun fileManager(): FileManager {\nreturn FileManager()\n}\n}\nobject DestroyMethodDemo\
  \ {\n@JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(DemoConfig::class.java)\n\
  ctx.close()\n}\n}\n代码清单 4-8\n展示如何使用 @Bean 注解配置销毁方法的示例\n```\n\n`FileManager` 类定义了一个\
  \ `destroyMethod()` 方法，该方法会删除其构造函数创建的文件。`main()` 方法从上下文中获取一个 `FileManager` 类型的 Bean，然后调用其\
  \ `destroyMethod()` 方法（该方法会进而调用由 `ApplicationContext` 包装的 `ConfigurableBeanFactory.destroySingletons()`\
  \ 方法），指示 Spring 销毁其管理的所有单例。构造函数和销毁方法都会向控制台输出一条消息，告知我们它们已被调用。\n\n### 实现 `DisposableBean`\
  \ 接口\n\n与初始化回调类似，Spring 提供了一个接口，此处为 `DisposableBean`，你的 Bean 可以实现该接口，作为接收销毁回调的一种机制。`DisposableBean`\
  \ 接口定义了一个单一方法 `destroy()`，该方法在 Bean 被销毁之前调用。使用此机制与使用 `InitializingBean` 接口接收初始化回调是正交的。代码清单\
  \ 4-9 展示了 `FileManager` 类的一个修改版实现，它实现了 `DisposableBean` 接口。\n\n```\npackage com.apress.prospring6.four.intf;\n\
  import org.springframework.beans.factory.DisposableBean;\n// other import statements\
  \ omitted\ninternal class FileManager : DisposableBean {\nprivate lateinit var file:\
  \ Path\ninit {\nLOGGER.info(\"Creating bean of type {}\", FileManager::class.java)\n\
  try {\nfile = Files.createFile(Path.of(\"sample\"))\n} catch (e: IOException) {\n\
  LOGGER.error(\"Could not create file\")\n}\n}\n@Throws(Exception::class)\noverride\
  \ fun destroy() {\nLOGGER.info(\"Calling destroy() on bean of type {}\", FileManager::class.java)\n\
  Files.deleteIfExists(file)\n}\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(FileManager::class.java)\n\
  }\n}\n@Configuration\ninternal open class DemoConfig {\n@Bean\nopen fun fileManager()\
  \ = FileManager()\n}\nobject DisposableBeanDemo {\n@JvmStatic\nfun main(args: Array)\
  \ {\nval ctx = AnnotationConfigApplicationContext(DemoConfig::class.java)\nctx.close()\n\
  }\n}\n代码清单 4-9\n展示如何使用 DisposableBean 接口配置销毁方法的示例\n```\n\n使用通过 `@Bean(destroyMethod=\"\
  ..\")` 配置的回调方法机制的代码与使用回调接口机制的代码之间没有太大区别。配置与上一节中的配置相同，只是缺少了 `(destroyMethod=\"..\"\
  )`，因为它已不再需要。运行示例的代码也相同。因此，我们可以跳过展示这两个实现，直接进入配置销毁方法的下一种方式。\n\n### 使用 JSR-250 `@PreDestroy`\
  \ 注解\n\n定义在 Bean 销毁前调用的方法的第三种方式是使用 JSR-250 生命周期 `@PreDestroy` 注解，它是 `@PostConstruct`\
  \ 注解的逆操作。代码清单 4-10 展示了使用 `@PreDestroy` 执行销毁操作的 `FileManager` 版本。\n\n```\npackage\
  \ com.apress.prospring6.four.jsr250;\nimport jakarta.annotation.PreDestroy;\n//\
  \ import statements omitted\nclass FileManager {\nprivate lateinit var file: Path\n\
  init {\nLOGGER.info(\"Creating bean of type {}\", FileManager::class.java)\ntry\
  \ {\nfile = Files.createFile(Path.of(\"sample\"))\n} catch (e: IOException) {\n\
  LOGGER.error(\"Could not create file\")\n}\n}\n@PreDestroy\n@Throws(IOException::class)\n\
  private fun preDestroy() {\nLOGGER.info(\n\"Calling preDestroy() on bean of type\
  \ {}\",\nFileManager::class.java\n)\nFiles.deleteIfExists(file)\n}\ncompanion object\
  \ {\nprivate val LOGGER = LoggerFactory.getLogger(FileManager::class.java)\n}\n\
  }\n@Configuration\nopen class DemoConfig {\n@Bean\nopen fun fileManager() = FileManager()\n\
  }\nobject PreDestroyDemo {\n@JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(DemoConfig::class.java)\n\
  ctx.close()\n}\n}\n代码清单 4-10\n展示如何使用 @PreDestroy 注解配置销毁方法的示例\n```\n\n运行任何声明了销毁回调的示例，都会在控制台输出与代码清单\
  \ 4-11 所示非常相似的日志。\n\n```\n...\nINFO : FileManager - Creating bean of type class\
  \ com.apress.prospring6.four.*.FileManager\nDEBUG: AbstractApplicationContext -\
  \ Closing org.springframework.context.annotation.AnnotationConfigApplicationContext@79be0360,\
  \ started on Fri Mar 25 12:05:49 GMT 2022\nINFO : FileManager - Calling destroy()/destroyMethod()/preDestroy()\
  \ on bean of type class com.apress.prospring6.four.*.FileManager\n代码清单 4-11\n展示\
  \ Bean 销毁的日志示例\n```\n\n销毁回调是一种理想的机制，可确保你的应用程序优雅地关闭，并且不会留下未关闭的资源或处于不一致状态。但是，你仍然需要决定如何使用销毁方法回调：使用\
  \ `@Bean(destroyMethod=\"..\")`、`DisposableBean` 接口还是 `@PreDestroy` 注解。同样，让应用程序的需求来驱动你的决策；在可移植性成为问题时使用方法回调，并使用\
  \ `DisposableBean` 接口或 JSR-250 注解来减少所需的配置量。\n\n### 理解解析顺序\n\n与 Bean 创建的情况一样，你可以在同一个\
  \ Bean 实例上为 Bean 销毁使用所有机制。在这种情况下，Spring 首先调用带有 `@PreDestroy` 注解的方法，然后调用 `DisposableBean.destroy()`，最后调用你在\
  \ `@Bean` 定义中配置的销毁方法。\n\n\n\n### 使用关闭钩子\n\nSpring 中销毁回调的唯一缺点是它们不会自动触发；你需要记得在应用程序关闭前调用\
  \ `ctx.close()`。当你的应用程序作为 Servlet 运行时，你可以简单地在 Servlet 的 `destroy()` 方法中调用 `destroy()`。\n\
  \n然而，在独立应用程序中，事情就没那么简单了，尤其是当你的应用程序有多个退出点时。幸运的是，有一个解决方案。Java 允许你创建一个*关闭钩子*，这是一个在应用程序即将关闭前执行的线程。这是调用上下文\
  \ `destroy()` 方法的完美方式（所有具体的 `ApplicationContext` 实现都扩展了该方法）。利用此机制最简单的方法是使用 `AbstractApplicationContext`\
  \ 的 `registerShutdownHook()` 方法。该方法会自动指示 Spring 注册底层 JVM 运行时的关闭钩子。Bean 的声明和配置与之前保持一致；唯一改变的是主方法：添加了对\
  \ `ctx.registerShutdownHook` 的调用，并移除了对 `ctx.destroy()` 或 `close()` 的调用。\n\n运行代码清单\
  \ 4-12 中的代码会产生与代码清单 4-11 中显示的输出相同的输出。\n\n```\npackage com.apress.prospring6.four.jsr250;\n\
  // 导入和部分代码已省略\nobject PreDestroyDemo {\n@JvmStatic\nfun main(args: Array) {\nval\
  \ ctx = AnnotationConfigApplicationContext(DemoConfig::class.java)\nctx.registerShutdownHook()\n\
  }\n}\n代码清单 4-12\n注册关闭钩子\n```\n\n## 让你的 Bean “感知 Spring”\n\n依赖注入作为实现控制反转的机制，其最大的卖点之一是你的\
  \ Bean 不需要感知管理它们的容器实现。对于使用构造器或 Setter 注入的 Bean 来说，Spring 容器与 Google Guice 或 PicoContainer\
  \ 提供的容器是一样的。然而，在某些情况下，你可能需要一个使用依赖注入来获取其依赖项的 Bean，以便它能出于其他原因与容器交互。例如，一个为你自动配置关闭钩子的\
  \ Bean，它需要访问 `ApplicationContext`。在其他情况下，一个 Bean 可能想知道它的名称（即在当前 `ApplicationContext`\
  \ 中分配的名称），以便根据此名称执行一些额外的处理。\n\n话虽如此，此功能实际上是为 Spring 内部使用而设计的。赋予 Bean 名称某种业务含义通常是一个坏主意，并且可能导致配置问题，因为必须人为地操纵\
  \ Bean 名称以支持其业务含义。然而，我们发现，让 Bean 在运行时能够找到自己的名称对于日志记录非常有用。假设你有许多相同类型的 Bean 在不同配置下运行。当出现问题时，可以将\
  \ Bean 名称包含在日志消息中，以帮助你区分是哪个 Bean 产生了错误，哪些 Bean 工作正常。\n\n### 使用 `BeanNameAware` 接口\n\
  \n`BeanNameAware` 接口可以被想要获取自身名称的 Bean 实现，它只有一个方法：`setBeanName(String)`。Spring 在完成\
  \ Bean 的配置之后、但在任何生命周期回调（初始化或销毁）被调用之前，会调用 `setBeanName()` 方法（请参考图 4-1）。在大多数情况下，`setBeanName()`\
  \ 接口的实现只有一行代码，即将容器传入的值存储在一个字段中供以后使用。代码清单 4-13 展示了一个简单的 Bean，它通过使用 `BeanNameAware`\
  \ 获取其名称，然后使用此 Bean 名称打印到控制台。\n\n```\npackage com.apress.prospring6.four.aware\n\
  import org.springframework.beans.factory.BeanNameAware\n// 其他导入已省略\ninternal class\
  \ NamedSinger : BeanNameAware {\nprivate var name: String? = null\n/** @实现 [BeanNameAware.setBeanName]\n\
  */\noverride fun setBeanName(beanName: String) {\nname = beanName\n}\nfun sing()\
  \ {\nlogger.info(\"Singer $name - sing()\")\n}\ncompanion object {\nprivate val\
  \ logger = LoggerFactory.getLogger(NamedSinger::class.java)\n}\n}\ninternal class\
  \ FileManager {\nprivate var file: Path? = null\ninit {\nlogger.info(\"Creating\
  \ bean of type {}\", FileManager::class.java)\ntry {\nfile = Files.createFile(Path.of(\"\
  sample\"))\n} catch (e: IOException) {\nlogger.error(\"Could not create file\")\n\
  }\n}\n@PreDestroy\n@Throws(IOException::class)\nprivate fun preDestroy() {\nlogger.info(\n\
  \"Calling preDestroy() on bean of type {}\",\nFileManager::class.java\n)\nfile?.run{\
  \ Files.deleteIfExists(this) }\n}\ncompanion object {\nprivate val logger = LoggerFactory.getLogger(FileManager::class.java)\n\
  }\n}\ninternal class ShutdownHookBean : ApplicationContextAware {\nprivate val ctx:\
  \ ApplicationContext? = null\n/** @实现 [ApplicationContextAware.setApplicationContext]\
  \ }\n*/\n@Throws(BeansException::class)\noverride fun setApplicationContext(ctx:\
  \ ApplicationContext) {\nif (ctx is GenericApplicationContext) {\nctx.registerShutdownHook()\n\
  }\n}\n}\n代码清单 4-13\nBeanNameAware 示例实现\n```\n\n这个实现相当简单。请记住，`BeanNameAware.setBeanName()`\
  \ 是在通过调用 `ApplicationContext.getBean()` 将 Bean 的第一个实例返回给你的应用程序之前调用的，因此无需在 `sing()`\
  \ 方法中检查 Bean 名称是否可用。如你所见，利用 `BeanNameAware` 接口不需要特殊的配置。在代码清单 4-14 中，你可以看到一个简单的配置示例和应用程序，它从\
  \ `ApplicationContext` 中检索 `NamedSinger` 实例，然后调用 `sing()` 方法。\n\n```\npackage com.apress.prospring6.four.aware\n\
  // 其他导入语句已省略\n@ComponentScan\ninternal class AwareConfig {\n@Bean\nfun johnMayer():\
  \ NamedSinger {\nreturn NamedSinger()\n}\n@Bean\nfun fileManager(): FileManager\
  \ {\nreturn FileManager()\n}\n@Bean\nfun shutdownHookBean(): ShutdownHookBean {\n\
  return ShutdownHookBean()\n}\n}\nobject AwareDemo {\n@JvmStatic\nfun main(args:\
  \ Array) {\nval ctx = AnnotationConfigApplicationContext(AwareConfig::class.java)\n\
  val singer = ctx.getBean(NamedSinger::class.java)\nsinger.sing()\n// ctx.registerShutdownHook();\
  \ // 由于 ShutdownHookBean 的存在，不再需要\n}\n}\n代码清单 4-14\nBeanNameAware 使用示例\n```\n\n\
  运行时，此示例生成一个非常简单的输出：\n\n```\nINFO : NamedSinger - Singer johnMayer - sing() ;\n```\n\
  \n请注意，在调用 `sing()` 方法的日志消息中包含了 Bean 名称。\n\n使用 `BeanNameAware` 接口确实非常简单，并且在提高日志消息质量时非常有用。避免仅仅因为可以访问\
  \ Bean 名称就赋予其业务含义；这样做会使你的类为了一个收益甚微的特性而与 Spring 耦合。如果你的 Bean 内部需要某种名称，可以让它们实现一个类似\
  \ `Nameable` 的接口（特定于你的应用程序），其中包含 `setName()` 方法或 `.name` 访问器，然后通过依赖注入为每个 Bean 赋予一个名称。这样，你可以保持用于配置的名称简洁，并且无需为了给\
  \ Bean 赋予具有业务含义的名称而不必要地操纵配置。\n\n\n\n### 使用 `ApplicationContextAware` 接口\n\n`ApplicationContextAware`\
  \ 在**第** **3****章**末尾被引入，用以展示 Spring 如何用于处理那些需要其他 Bean 才能运行，但未在配置中通过构造器或 Setter\
  \ 方法注入这些依赖的 Bean。\n\n通过使用 `ApplicationContextAware` 接口，你的 Bean 能够获取到配置了它们的 `ApplicationContext`\
  \ 实例的引用。创建此接口的主要目的是允许 Bean 在你的应用程序中访问 Spring 的 `ApplicationContext`，例如，通过使用 `getBean()`\
  \ 以编程方式获取其他 Spring Bean。然而，你应该避免这种做法，而应使用依赖注入来为你的 Bean 提供其协作者。如果在可以使用依赖注入的情况下，你却采用基于查找的\
  \ `getBean()` 方法来获取依赖，那么你就是在为你的 Bean 增加不必要的复杂性，并且在没有充分理由的情况下将它们与 Spring 框架耦合在一起。\n\
  \n当然，`ApplicationContext` 不仅仅用于查找 Bean；它还执行许多其他任务。正如你之前所见，其中一项任务就是销毁所有单例，并在销毁之前依次通知它们。在上一节中，你了解了如何创建一个关闭钩子，以确保在应用程序关闭之前指示\
  \ `ApplicationContext` 销毁所有单例。通过使用 `ApplicationContextAware` 接口，你可以构建一个 Bean，该 Bean\
  \ 可以在 `ApplicationContext` 中配置，以自动创建和配置一个关闭钩子 Bean。清单 4-15 展示了此 Bean 的代码。\n\n```\n\
  package com.apress.prospring6.four.aware\nimport org.springframework.context.ApplicationContextAware\n\
  // 其他导入语句已省略\ninternal class ShutdownHookBean : ApplicationContextAware {\nprivate\
  \ val ctx: ApplicationContext? = null\n/** @实现 [ApplicationContextAware.setApplicationContext]\
  \ }\n*/\n@Throws(BeansException::class)\noverride fun setApplicationContext(ctx:\
  \ ApplicationContext) {\nif (ctx is GenericApplicationContext) {\nctx.registerShutdownHook()\n\
  }\n}\n}\n清单 4-15\nApplicationContextAware 实现示例\n```\n\n现在，这段代码的大部分内容对你来说应该很熟悉了。`ApplicationContextAware`\
  \ 接口定义了一个单一方法 `setApplicationContext(ApplicationContext)`，Spring 会调用该方法，将 `ApplicationContext`\
  \ 的引用传递给 Bean。在上面的代码片段中，`ShutdownHookBean` 类检查 `ApplicationContext` 是否为 `GenericApplicationContext`\
  \ 类型，这意味着它支持 `registerShutdownHook()` 方法；如果是，它将向 `ApplicationContext` 注册一个关闭钩子。清单\
  \ 4-16 展示了如何配置此 Bean 以使其与上一节中介绍的 `FileManager` Bean 协同工作。\n\n```\npackage com.apress.prospring6.four.aware\n\
  // 导入语句已省略\n@ComponentScan\ninternal class AwareConfig {\n@Bean\nfun johnMayer():\
  \ NamedSinger {\nreturn NamedSinger()\n}\n@Bean\nfun fileManager(): FileManager\
  \ {\nreturn FileManager()\n}\n@Bean\nfun shutdownHookBean(): ShutdownHookBean {\n\
  return ShutdownHookBean()\n}\n}\nobject AwareDemo {\n@JvmStatic\nfun main(args:\
  \ Array) {\nval ctx = AnnotationConfigApplicationContext(AwareConfig::class.java)\n\
  val singer = ctx.getBean(NamedSinger::class.java)\nsinger.sing()\n//ctx.registerShutdownHook();\
  \ // 由于 ShutdownHookBean 的存在，不再需要此行\n}\n}\n清单 4-16\nApplicationContextAware Bean\
  \ 配置以及基于此配置启动 Spring 应用程序的代码\n```\n\n请注意，不需要任何特殊配置。构建 Spring 应用程序的代码也很简单，正如新的 `AwareDemo`\
  \ 类所示。不再需要调用 `ctx.registerShutdownHook()`，因为 `ShutdownHookBean` 会完成这项工作。运行上述示例将在控制台输出末尾生成如下内容：\n\
  \n```\nINFO : FileManager - Calling preDestroy() on bean of type class com.apress.prospring6.four.aware.FileManager\n\
  ```\n\n即使没有调用 `ctx.registerShutdownHook()` 或 `ctx.close()`（后者会关闭应用程序上下文并移除钩子），`preDestroy()`\
  \ 方法也会在应用程序关闭前被调用，因为 `ShutdownHookBean.setApplicationContext(ApplicationContext\
  \ ctx)` 方法执行了关闭钩子的注册。\n\n## 使用 **FactoryBeans**\n\n在使用 Spring 时，你将面临的一个问题是如何创建并注入那些无法简单地通过使用构造器来创建的依赖。为了解决这个问题，Spring\
  \ 提供了 `FactoryBean` 接口，它充当了那些无法使用标准 Spring 语义创建和管理的对象的适配器。通常，你使用 `FactoryBeans`\
  \ 来创建那些无法通过构造器创建的 Bean，例如那些需要通过静态工厂方法访问的 Bean，尽管情况并非总是如此。简单来说，`FactoryBean` 是一个充当其他\
  \ Bean 工厂的 Bean。`FactoryBeans` 像任何普通 Bean 一样在你的 `ApplicationContext` 中进行配置，但是当 Spring\
  \ 使用 `FactoryBean` 接口来满足依赖或查找请求时，它不会返回 `FactoryBean` 本身；相反，它会调用 `FactoryBean.getObject()`\
  \ 方法并返回该调用的结果。\n\n![](img/524962_1_En_4_Figh_HTML.jpg) 一个火焰符号。 Spring 会自动调用 getObject()\
  \ 方法——手动调用该方法是一种不好的实践。\n\n![](img/524962_1_En_4_Figi_HTML.jpg) 一个灯泡插图。 `FactoryBean`\
  \ 类型是一个泛型，声明为 `FactoryBean<T>`，但由于此类型在本章中被多次提及，我们决定在非必要上下文中省略 `<T>`。\n\n`FactoryBeans`\
  \ 在 Spring 中被广泛使用；最显著的应用包括创建事务代理（我们将在**第** **9****章**中介绍）以及从 JNDI 上下文中自动检索资源。然而，`FactoryBeans`\
  \ 不仅对构建 Spring 内部机制有用；当你构建自己的应用程序时，你会发现它们非常有用，因为它们允许你通过 IoC 管理比原本可能更多的资源。\n\n\n\n\
  ### FactoryBean 示例：`MessageDigestFactoryBean`\n\n我们参与的项目通常需要某种加密处理；这通常涉及生成用户密码的消息摘要或哈希值，以便存储在数据库中。在\
  \ Kotlin 中，`MessageDigest` 类提供了为任意数据创建摘要的功能。`MessageDigest` 本身是抽象的，你可以通过调用 `MessageDigest.getInstance()`\
  \ 并传入你想要使用的摘要算法名称来获取具体的实现。例如，如果我们想使用 MD5 算法创建摘要，可以使用以下代码创建 `MessageDigest` 实例：\n\
  \n```\nval md5 = MessageDigest.getInstance(\"MD5\")\n```\n\n如果我们想使用 Spring 来管理 `MessageDigest`\
  \ 对象的创建，在没有 `FactoryBean` 的情况下，我们能做的最好的办法是在 bean 上设置一个名为 `algorithmName` 的属性，然后使用初始化回调来调用\
  \ `MessageDigest.getInstance()`。使用 `FactoryBean`，我们可以将此逻辑封装在 bean 内部。这样，任何需要 `MessageDigest`\
  \ 实例的 bean 都可以简单地声明一个 `messageDigest` 属性，并使用 `FactoryBean` 来获取该实例。清单 4-17 展示了实现此功能的\
  \ `FactoryBean`。\n\n```\npackage com.apress.prospring6.four.factory\nimport org.springframework.beans.factory.FactoryBean\n\
  import java.security.MessageDigest\n// 其他导入语句已省略\npackage com.apress.prospring6.four.factory\n\
  import org.springframework.beans.factory.FactoryBean\nimport org.springframework.beans.factory.InitializingBean\n\
  import java.security.MessageDigest\nclass MessageDigestFactoryBean : FactoryBean,\
  \ InitializingBean {\nvar algorithmName = \"MD5\"\nprivate var messageDigest: MessageDigest?\
  \ = null\n@Throws(Exception::class)\n/** @实现 [FactoryBean.getObject]\n*/\noverride\
  \ fun getObject(): MessageDigest? {\nreturn messageDigest\n}\n/** @实现 [FactoryBean.getObjectType]\n\
  */\noverride fun getObjectType(): Class {\nreturn MessageDigest::class.java\n}\n\
  /** @实现 [FactoryBean.isSingleton]\n*/\noverride fun isSingleton() = true\n@Throws(Exception::class)\n\
  /** @实现 [InitializingBean.afterPropertiesSet]\n*/\noverride fun afterPropertiesSet()\
  \ {\nmessageDigest = MessageDigest.getInstance(algorithmName)\n}\n}\n清单 4-17\nMessageDigestFactoryBean\
  \ 实现\n```\n\nSpring 调用 `getObject()` 方法来检索由 `FactoryBean` 创建的对象。这是实际传递给其他将 `FactoryBean`\
  \ 作为协作者使用的 bean 的对象。`MessageDigestFactoryBean` 传递的是在 `InitializingBean.afterPropertiesSet()`\
  \ 回调中创建的已存储 `MessageDigest` 实例的一个克隆。\n\n`getObjectType()` 方法允许你告诉 Spring 你的 `FactoryBean`\
  \ 将返回什么类型的对象。如果返回类型事先未知（例如，`FactoryBean` 根据配置创建不同类型的对象，这只有在 `FactoryBean` 初始化后才能确定），则可以返回\
  \ `null`；但如果你指定了类型，Spring 可以将其用于自动装配。我们返回 `MessageDigest` 作为我们的类型（在本例中是一个类，但尽量返回接口类型，并让\
  \ `FactoryBean` 实例化具体的实现类，除非必要）。原因是我们不知道会返回什么具体类型（这并不重要，因为所有 bean 无论如何都会通过使用 `MessageDigest`\
  \ 来定义它们的依赖关系）。\n\n`isSingleton` 属性允许你告知 Spring `FactoryBean` 是否管理一个单例实例。请记住，通过使用\
  \ `@Scope(scopeName = \"singleton\")` 注解 `FactoryBean` 的定义，你告诉 Spring 的是 `FactoryBean`\
  \ 本身的单例状态，而不是它返回的对象。现在让我们看看 `FactoryBean` 是如何在应用程序中使用的。在清单 4-18 中，你可以看到一个简单的 bean，它维护了两个\
  \ `MessageDigest` 实例，然后显示传递给其 `digest()` 方法的消息的摘要。\n\n```\npackage com.apress.prospring6.four.factory\n\
  import org.slf4j.LoggerFactory\nimport java.security.MessageDigest\nclass MessageDigester\
  \ {\nvar digest1: MessageDigest? = null\nvar digest2: MessageDigest? = null\nfun\
  \ digest(msg: String) {\nLOGGER.info(\"使用 digest1\")\ndigest(msg, digest1)\nLOGGER.info(\"\
  使用 digest2\")\ndigest(msg, digest2)\n}\nprivate fun digest(msg: String, digest:\
  \ MessageDigest?) {\nLOGGER.info(\"使用算法: \" + digest!!.algorithm)\ndigest.reset()\n\
  val bytes = msg.toByteArray()\nval out = digest.digest(bytes)\n// 我们正在打印实际的字节值\n\
  LOGGER.info(\"原始消息: {} \", bytes)\nLOGGER.info(\"加密消息: {} \", out)\n}\ncompanion\
  \ object {\nprivate val LOGGER = LoggerFactory.getLogger(MessageDigester::class.java)\n\
  }\n}\n清单 4-18\n维护两个 MessageDigest 实例的简单 Bean\n```\n\n清单 4-19 展示了两个 `MessageDigestFactoryBean`\
  \ 类的示例配置，一个用于 SHA1 算法，另一个使用默认（MD5）算法。同一清单还展示了 `FactoryBeanDemo` 类，该类从 `BeanFactory`\
  \ 检索 `MessageDigester` bean 并创建简单消息的摘要。\n\n```\npackage com.apress.prospring6.four.factory\n\
  // 导入语句已省略\n@Configuration\n@ComponentScan\ninternal open class MessageDigestConfig\
  \ {\n@Bean\nopen fun shaDigest() =\nMessageDigestFactoryBean().apply {\nalgorithmName\
  \ = \"SHA1\"\n}\n@Bean\nopen fun defaultDigest() = MessageDigestFactoryBean()\n\
  @Bean\n@Throws(Exception::class)\nopen fun digester() =\nMessageDigester().apply\
  \ {\ndigest1 = shaDigest().getObject()\ndigest2 = defaultDigest().getObject()\n\
  }\n}\nobject FactoryBeanDemo {\nprivate val LOGGER = LoggerFactory.getLogger(FactoryBeanDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(MessageDigestConfig::class.java)\n\
  val digester = ctx.getBean(\n\"digester\",\nMessageDigester::class.java\n)\ndigester.digest(\"\
  Hello World!\")\nctx.close()\n}\n}\n清单 4-19\nMessageDigestFactoryBean 的简单配置及启动 Spring\
  \ 应用程序进行测试的代码\n```\n\n如你所见，我们不仅配置了两个 `MessageDigestFactoryBean` 类，还使用这两个 `MessageDigestFactoryBean`\
  \ 类配置了一个 `MessageDigester`，以便为 `digest1` 和 `digest2` 属性提供值。对于 `defaultDigest` bean，由于未指定\
  \ `algorithmName` 属性，因此不会发生注入，将使用类中编码的默认算法（`MD5`）。在清单 4-20 中，你可以看到运行清单 4-19 中的代码所产生的控制台日志。\n\
  \n\n\n```\nINFO : MessageDigester - 使用摘要 1\nINFO : MessageDigester - 使用算法：SHA1\n\
  INFO : MessageDigester - 原始消息：[72, 101, 108, 108, 111, 32, 87, 111, 114, 108, 100,\
  \ 33]\nINFO : MessageDigester - 加密消息：[46, -9, -67, -26, 8, -50, 84, 4, -23, 125,\
  \ 95, 4, 47, -107, -8, -97, 28, 35, 40, 113]\nINFO : MessageDigester - 使用摘要 2\n\
  INFO : MessageDigester - 使用算法：MD5\nINFO : MessageDigester - 原始消息：[72, 101, 108,\
  \ 108, 111, 32, 87, 111, 114, 108, 100, 33]\nINFO : MessageDigester - 加密消息：[-19,\
  \ 7, 98, -121, 83, 46, -122, 54, 94, -124, 30, -110, -65, -59, 13, -116]\n清单 4-20\n\
  由 MessageDigestConfig 类配置的应用程序生成的简单消息摘要\n```\n\n我们选择打印数字字节值而非文本消息，以展示加密在字节层面所做的更改。如您所见，`MessageDigest`\
  \ bean 被提供了两个 `MessageDigest 实现`，即 SHA1 和 MD5，尽管在 `BeanFactory` 中并未配置任何 `MessageDigest`\
  \ bean。这正是 `FactoryBean` 在发挥作用。\n\n当您处理无法通过构造函数创建的类时，`FactoryBean` 是完美的解决方案。如果您处理的是通过工厂方法创建的对象，并且希望在\
  \ Spring 应用程序中使用这些类，可以创建一个 `FactoryBean` 作为适配器，使您的类能够充分利用 Spring 的 IoC 功能。\n\n![](img/524962_1_En_4_Figj_HTML.jpg)\
  \ 信息符号。 使用 `FactoryBean` 的强大之处在使用 XML 配置时尤为明显，因为 Spring 会自动将由 `FactoryBean` 生成的对象满足对该\
  \ `FactoryBean` 的所有引用。这使得 `MessageDigester` bean 可以像这样进行配置：\n\n### 直接访问 `FactoryBean`\n\
  \n鉴于 Spring 会自动将由 `FactoryBean<T>` 生成的对象满足对该 `FactoryBean` 的所有引用，您可能会想是否可以直接访问 `FactoryBean`。答案是*可以*。访问\
  \ `FactoryBean` 很简单：在调用 `getBean()` 时，在 bean 名称前加上 & 符号，如清单 4-21 所示。\n\n```\npackage\
  \ com.apress.prospring6.four.factory\n// 省略 import 语句\nobject FactoryBeanDemo {\n\
  private val LOGGER = LoggerFactory.getLogger(FactoryBeanDemo::class.java)\n@JvmStatic\n\
  fun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(MessageDigestConfig::class.java)\n\
  LOGGER.debug(\"-------------------------------------\")\nval factoryBean = ctx.getBean(\"\
  &shaDigest\") as MessageDigestFactoryBean\ntry {\nval shaDigest: MessageDigest =\
  \ factoryBean.getObject()!!\nLOGGER.info(\"显式使用摘要 bean: {}\",\nshaDigest.digest(\"\
  Hello world\".toByteArray()))\n} catch (ex: Exception) {\nLOGGER.error(\"找不到 MessageDigestFactoryBean\
  \ \", ex)\n}\nctx.close()\n}\n}\n清单 4-21\n直接访问 FactoryBean\n```\n\n此功能在 Spring 代码的少数地方被使用，但您的应用程序实际上没有理由使用它。`FactoryBean`\
  \ 旨在作为支持性基础设施的一部分，使您能够在 IoC 环境中使用更多应用程序类。避免直接访问 `FactoryBean` 并手动调用其 `getObject()`\
  \ 方法，让 Spring 为您完成这些工作；如果您手动操作，不仅会增加额外的工作量，还会不必要地将应用程序耦合到未来可能轻易更改的特定实现细节上。\n\n##\
  \ JavaBeans **PropertyEditors**\n\n如果您对 JavaBeans 概念不完全熟悉，那么 `PropertyEditor` 是一个接口，用于将属性的值在其原生类型表示和\
  \ `String` 之间进行转换。最初，这被设想为一种允许属性值以 `String` 值的形式输入到编辑器中，并将其转换为正确类型的方法。然而，由于 `PropertyEditor`\
  \ 实现本质上是轻量级类，它们已在许多场景中得到应用，包括 Spring。\n\n由于基于 Spring 的应用程序中很大一部分属性值最初存在于 `BeanFactory`\
  \ 配置文件中，它们本质上是 `String`。然而，这些值所设置的属性可能并非 `String` 类型。因此，为了避免您人为地创建大量 `String` 类型的属性，Spring\
  \ 允许您定义 `PropertyEditor` bean 来管理将基于 `String` 的属性值转换为正确类型的过程。图 4-2 显示了作为 Spring\
  \ 框架一部分的 `PropertyEditor` 实现的完整列表，其中大部分位于 `spring-beans` 包中；您可以通过任何智能 Java 编辑器查看此列表，但在\
  \ IntelliJ 中，您可以通过打开特定接口的源代码、选择其名称并按 Ctrl+H（macOS）或 Ctrl+E（Windows）来查看该接口的所有实现。\n\
  \n![](img/524962_1_En_4_Fig2_HTML.jpg)\n\njava dot beans dot property editor 接口的截图。列出了属性编辑器实现的完整列表。\n\
  \n图 4-2\n\nSpring 属性编辑器\n\n图 4-2 中的列表显示，层次结构的根是 `java.beans.PropertyEditor` 接口，但所有\
  \ Spring 实现实际上都扩展了 `java.beans.PropertyEditorSupport` 类，该类为构建属性编辑器提供支持。或者它们委托给现有的实现，例如\
  \ `java.beans.StringEditor`，它处理将 `String` 字面量隐式转换为要注入到 bean 中的属性值，该实现已预先在 `BeanFactory`\
  \ 中注册。\n\n### 使用内置的 `PropertyEditors`\n\n清单 4-22 展示了一个简单的 bean，它声明了 14 个属性，每个属性对应内置\
  \ `PropertyEditor` 实现所支持的一种类型。\n\n\n\n```\npackage com.apress.prospring6.four\n\
  import org.slf4j.LoggerFactory\nimport org.springframework.beans.PropertyEditorRegistrar\n\
  // 其他导入已省略\n@Component\ninternal class ValuesHolder(stringList: List?) {\nvar stringList:\
  \ List\nvar inputStream: InputStream? = null\ninit {\nthis.stringList = java.util.List.of(\"\
  Mayer\", \"Psihoza\", \"Mazikeen\")\ntry {\ninputStream = FileInputStream(\nSystem.getProperty(\"\
  java.io.tmpdir\")\n+ System.getProperty(\"file.separator\")\n+ \"test.txt\"\n)\n\
  } catch (e: FileNotFoundException) {\ne.printStackTrace() // 我们对此异常不太感兴趣\n}\n}\n\
  }\n@Component(\"builtInSample\")\nclass DiverseValuesContainer {\nprivate var bytes\
  \ // ByteArrayPropertyEditor\n: ByteArray? = null\nprivate var character //CharacterEditor\n\
  : Char? = null\nprivate var cls // ClassEditor\n: Class? = null\nprivate var trueOrFalse\
  \ // CustomBooleanEditor\n: Boolean? = null\nprivate var stringList // CustomCollectionEditor\n\
  : List? = null\nprivate var date // CustomDateEditor\n: Date? = null\nprivate var\
  \ floatValue // CustomNumberEditor\n: Float? = null\nprivate var file // FileEditor\n\
  : File? = null\nprivate var stream // InputStreamEditor\n: InputStream? = null\n\
  private var locale // LocaleEditor\n: Locale? = null\nprivate var pattern // PatternEditor\n\
  : Pattern? = null\nprivate var properties // PropertiesEditor\n: Properties? = null\n\
  private var trimString // StringTrimmerEditor\n: String? = null\nprivate var url\
  \ // URLEditor\n: URL? = null\n@Value(\"A\")\nfun setCharacter(character: Char?)\
  \ {\nLOGGER.info(\"设置字符: {}\", character)\nthis.character = character\n}\n@Value(\"\
  java.lang.String\")\nfun setCls(cls: Class) {\nLOGGER.info(\"设置类: {}\", cls.name)\n\
  this.cls = cls\n}\n@Value(\"#{systemProperties['java.io.tmpdir']}\n#{systemProperties['file.separator']}test.txt\"\
  )\nfun setFile(file: File) {\nLOGGER.info(\"设置文件: {}\", file.absolutePath)\nthis.file\
  \ = file\n}\n@Value(\"en_US\")\nfun setLocale(locale: Locale) {\nLOGGER.info(\"\
  设置区域: {}\", locale.displayName)\nthis.locale = locale\n}\n@Value(\"name=Ben age=41\"\
  )\nfun setProperties(properties: Properties) {\nLOGGER.info(\"已加载 {} 个属性\", properties.size.toString())\n\
  this.properties = properties\n}\n@Value(\"https://iuliana-cosmina.com\")\nfun setUrl(url:\
  \ URL) {\nLOGGER.info(\"设置 URL: {}\", url.toExternalForm())\nthis.url = url\n}\n\
  @Value(\"John Mayer\")\nfun setBytes(vararg bytes: Byte) {\nLOGGER.info(\"设置字节:\
  \ {}\", Arrays.toString(bytes))\nthis.bytes = bytes\n}\n@Value(\"true\")\nfun setTrueOrFalse(trueOrFalse:\
  \ Boolean?) {\nLOGGER.info(\"设置布尔值: {}\", trueOrFalse)\nthis.trueOrFalse = trueOrFalse\n\
  }\n@Value(\"#{valuesHolder.stringList}\")\nfun setStringList(stringList: List?)\
  \ {\nLOGGER.info(\"使用 {} 设置字符串列表\", stringList)\nthis.stringList = stringList\n\
  }\n@Value(\"20/08/1981\")\nfun setDate(date: Date?) {\nLOGGER.info(\"设置日期: {}\"\
  , date)\nthis.date = date\n}\n@Value(\"123.45678\")\nfun setFloatValue(floatValue:\
  \ Float?) {\nLOGGER.info(\"设置浮点值: {}\", floatValue)\nthis.floatValue = floatValue\n\
  }\n@Value(\"#{valuesHolder.inputStream}\")\nfun setStream(stream: InputStream?)\
  \ {\nthis.stream = stream\nLOGGER.info(\n\"设置流并从中读取: {}\",\nBufferedReader(InputStreamReader(stream))\n\
  .lines().parallel().collect(Collectors.joining(\"\\n\"))\n)\n}\n@Value(\"a*b\")\n\
  fun setPattern(pattern: Pattern?) {\nLOGGER.info(\"设置模式: {}\", pattern)\nthis.pattern\
  \ = pattern\n}\n@Value(\"   需要修剪的字符串   \")\nfun setTrimString(trimString: String?)\
  \ {\nLOGGER.info(\"设置修剪字符串: {}\", trimString)\nthis.trimString = trimString\n}\n\
  class CustomPropertyEditorRegistrar : PropertyEditorRegistrar {\noverride fun registerCustomEditors(registry:\
  \ PropertyEditorRegistry) {\nval dateFormatter = SimpleDateFormat(\"MM/dd/yyyy\"\
  )\nregistry.registerCustomEditor(\nDate::class.java,\nCustomDateEditor(dateFormatter,\
  \ true)\n)\nregistry.registerCustomEditor(String::class.java, StringTrimmerEditor(true))\n\
  }\n}\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(DiverseValuesContainer::class.java)\n\
  @Throws(Exception::class)\n@JvmStatic\nfun main(args: Array) {\nval baseDir = File(System.getProperty(\"\
  java.io.tmpdir\"))\nval path = Files.createFile(Path.of(baseDir.absolutePath, \"\
  test.txt\"))\nFiles.writeString(path, \"Hello World!\")\npath.toFile().deleteOnExit()\n\
  val ctx = AnnotationConfigApplicationContext()\nctx.register(ValuesHolder::class.java,\
  \ DiverseValuesContainer::class.java)\nctx.refresh()\nctx.close()\n}\n}\n}\n清单 4-22\n\
  Spring 应用程序中默认支持的所有属性类型的 Bean\n```\n\n\n\n（移除 `setFile()` 附近 `@Value` 注解参数中的换行及空格）如你所见，尽管\
  \ `DiverseValuesContainer` 中的所有属性都不是 `Strings` 类型，但属性的值仍被指定为简单的 `Strings`。另外请注意，我们通过为\
  \ `org.springframework.beans.PropertyEditorRegistrar` 提供实现，注册了带有所需格式化器的 `CustomDateEditor`\
  \ 和 `StringTrimmerEditor`，因为这两个编辑器默认并未在 Spring 中注册。运行此示例将输出如代码清单 4-23 所示的结果。\n\n\
  ```\nINFO : DiverseValuesContainer - Loaded 1 properties\nINFO : DiverseValuesContainer\
  \ - Setting locale: English (United States)\nINFO : DiverseValuesContainer - Setting\
  \ date: Sun Aug 08 00:00:00 BST 1982\nINFO : DiverseValuesContainer - Setting class:\
  \ java.lang.String\nINFO : DiverseValuesContainer - Setting file: /var/folders/gg/nm_cb2lx72q1lz7xwwdh7tnc0000gn/T/test.txt\n\
  INFO : DiverseValuesContainer - Setting URL: https://iuliana-cosmina.com\nINFO :\
  \ DiverseValuesContainer - Setting bytes: [74, 111, 104, 110, 32, 77, 97, 121, 101,\
  \ 114]\nINFO : DiverseValuesContainer - Setting stream & reading from it: Hello\
  \ World!\nINFO : DiverseValuesContainer - Setting pattern: a*b\nINFO : DiverseValuesContainer\
  \ - Setting character: A\nINFO : DiverseValuesContainer - Setting Boolean: true\n\
  INFO : DiverseValuesContainer - Setting stringList with: [Mayer, Psihoza, Mazikeen]\n\
  INFO : DiverseValuesContainer - Setting float value: 123.45678\nINFO : DiverseValuesContainer\
  \ - Setting trim string:    String need trimming\n代码清单 4-23\n显示属性被注入转换后值的输出\n```\n\
  \n如你所见，Spring 使用内置的 `PropertyEditors` 将各种属性的 `String` 表示形式转换为正确的类型。表 4-1 列出了 Spring\
  \ 中最重要的内置 `PropertyEditors`。\n\n表 4-1\n\nSpring 的 `PropertyEditors`\n\n| `PropertyEditor`\
  \ | 描述 |\n| --- | --- |\n| `ByteArrayPropertyEditor` | 将 `String` 值转换为其对应的字节表示形式。\
  \ |\n| `CharacterEditor` | 从 `String` 值填充 `Character` 类型的属性。 |\n| `ClassEditor`\
  \ | 将完全限定的类名转换为 `Class` 实例。使用此 `PropertyEditor` 时，若使用 `GenericApplicationContext`，请注意不要在类名的两侧包含任何多余空格，否则会导致\
  \ `ClassNotFoundException`。 |\n| `CustomBooleanEditor` | 将字符串转换为 Kotlin 的 `Boolean`\
  \ 类型。 |\n| `CustomCollectionEditor` | 将源集合（例如，由 `valueHolder.stringList` 属性的 SpEL\
  \ 表达式表示）转换为目标 `Collection` 类型。 |\n| `CustomDateEditor` | 将日期的字符串表示形式转换为 `java.util.Date`\
  \ 值。你需要在 Spring 的 `ApplicationContext` 中注册 `CustomDateEditor` 实现，并指定所需的日期格式。 |\n\
  | `FileEditor` | 将 `String` 文件路径转换为 `File` 实例。Spring 不会检查文件是否存在。 |\n| `InputStreamEditor`\
  \ | 将资源的字符串表示形式（例如，使用 `file:///D:/temp/test.txt` 或 `classpath:test.txt` 的文件资源）转换为输入流属性。\
  \ |\n| `LocaleEditor` | 将区域设置的 `String` 表示形式（例如 en-GB）转换为 `java.util.Locale` 实例。\
  \ |\n| `PatternEditor` | 将 `String` 转换为 JDK 的 `Pattern` 对象，或反向转换。 |\n| `PropertiesEditor`\
  \ | 将格式为 `key1=value1 key2=value2 keyn=valuen` 的 `String` 转换为 `java.util.Properties`\
  \ 实例，并配置相应的属性。 |\n| `StringTrimmerEditor` | 在注入前对 `String` 值执行修剪操作。你需要显式注册此编辑器。\
  \ |\n| `URLEditor` | 将 URL 的 `String` 表示形式转换为 `java.net.URL` 实例。 |\n\n这组 `PropertyEditors`\
  \ 为使用 Spring 提供了良好的基础，并使你能够更轻松地使用文件和 URL 等常见组件来配置应用程序。\n\n\n\n### 创建自定义 `PropertyEditor`\n\
  \n虽然内置的 `PropertyEditor` 实现涵盖了大多数属性类型转换的标准场景，但有时你可能需要创建自己的 `PropertyEditor`，以支持应用程序中使用的某个类或一组类。Spring\
  \ 完全支持注册自定义的 `PropertyEditor` 实现；唯一的缺点是 `java.beans.PropertyEditor` 接口包含大量方法，其中许多方法与手头的属性类型转换任务无关。幸运的是，从\
  \ JDK 5 或更高版本开始，可以使用 `PropertyEditorSupport` 类，你自己的 `PropertyEditors` 可以继承该类，这样你只需实现一个方法：`setAsText()`。\n\
  \n让我们通过一个简单的示例来了解自定义属性编辑器的实际实现。假设我们有一个 `FullName` 类，它只有两个属性：`firstName` 和 `lastName`，定义如代码清单\
  \ 4-24 所示。\n\n```\npackage com.apress.prospring6.four.custom\nclass FullName(val\
  \ firstName: String, val lastName: String) {\noverride fun toString(): String {\n\
  return \"firstName=§{firstName}, lastName=${lastName}\"\n}\n}\n代码清单 4-24\nNamePropertyEditor\
  \ 类，用于演示如何构建自定义 PropertyEditor\n```\n\n为了简化应用程序配置，我们开发一个自定义编辑器，它将一个以空格分隔的 `String`\
  \ 分别转换为 `FullName` 类的名字和姓氏。代码清单 4-25 展示了自定义属性编辑器的实现。\n\n```\npackage com.apress.prospring6.four.custom\n\
  import java.beans.PropertyEditorSupport\nclass NamePropertyEditor : PropertyEditorSupport()\
  \ {\n@Throws(IllegalArgumentException::class)\noverride fun setAsText(text: String)\
  \ {\nval name = text.split(\"\\\\s\".toRegex()).dropLastWhile { it.isEmpty() }.toTypedArray()\n\
  value = FullName(name[0], name[1])\n}\n}\n代码清单 4-25\nFullName 类，用于演示如何构建自定义 PropertyEditor\n\
  ```\n\n实现很简单。它继承了 JDK 的 `PropertyEditorSupport` 类并实现了 `setAsText()` 方法。在该方法中，我们简单地将\
  \ `String` 以空格为分隔符拆分成一个字符串数组。然后，实例化一个 `FullName` 对象，将空格字符前的 `String` 作为名字传入，将空格字符后的\
  \ `String` 作为姓氏传入。最后，通过调用 `setValue()` 方法并传入结果来返回转换后的值。要在应用程序中使用 `NamePropertyEditor`，你需要在\
  \ Spring 的 `ApplicationContext` 中注册该编辑器。代码清单 4-26 展示了 `CustomEditorConfigurer` 和\
  \ `NamePropertyEditor` 的 `ApplicationContext` 配置，以及启动一个由这些 Bean 组成的 Spring 应用程序的代码。\n\
  \n```\npackage com.apress.prospring6.four.custom\nimport org.slf4j.LoggerFactory\n\
  import org.springframework.beans.factory.annotation.Value\n// 其他导入已省略\n@Component\n\
  internal class Person {\n@set:Value(\"John Mayer\")\nvar name: FullName? = null\n\
  }\n@Configuration\n@ComponentScan\ninternal open class CustomPropertyEditorCfg {\n\
  @Bean\nopen fun customEditorConfigurer(): CustomEditorConfigurer {\nval cust = CustomEditorConfigurer()\n\
  cust.setCustomEditors(mapOf(FullName::class.java to NamePropertyEditor::class.java))\n\
  return cust\n}\n}\nobject CustomPropertyEditorDemo {\nprivate val LOGGER = LoggerFactory.getLogger(CustomPropertyEditorDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nAnnotationConfigApplicationContext(CustomPropertyEditorCfg::class.java).use\
  \ { ctx ->\nval person = ctx.getBean(Person::class.java, \"person\")\nLOGGER.info(\"\
  Person full name = {}\", person.name)\n}\n}\n}\n代码清单 4-26\n演示 PropertyEditor 的 Spring\
  \ 应用程序的配置和启动代码\n```\n\n在此配置中，你应该注意两点：\n\n*   自定义 `PropertyEditors` 通过使用 `Map` 类型的\
  \ `customEditors` 属性注入到 `CustomEditorConfigurer` Bean 中。\n\n*   `Map` 中的每个条目代表一个\
  \ `PropertyEditor`，条目的键是使用该 `PropertyEditor` 的类。如你所见，`NamePropertyEditor` 的键是 `com.apress.prospring6.four.custom.FullName`，这表明这是应使用此实现的类。\n\
  \n请随意运行代码清单 4-26 中的代码，输出应该很简单：\n\n```\nINFO : CustomPropertyEditorDemo - Person\
  \ full name = com.apress.prospring6.four.custom.FullName@5b38c1ec[firstName=John,lastName=Mayer]\n\
  ```\n\n这是 `FullName` 类中实现的 `toString()` 方法的输出，你可以看到，Spring 通过使用配置的 `NamePropertyEditor`\
  \ 正确填充了 `FullName` 对象的名字和姓氏。从版本 3 开始，Spring 引入了类型转换 API 和字段格式化服务提供者接口 (SPI)，它们提供了一种更简单、结构更清晰的\
  \ API 来执行类型转换和字段格式化。这对于 Web 应用程序开发尤其有用。类型转换 API 和字段格式化 SPI 都将在**第** **11** **章**中详细讨论。\n\
  \n## 更多 Spring **ApplicationContext** 配置\n\n到目前为止，虽然我们一直在讨论 Spring 的 `ApplicationContext`，但我们介绍的大多数功能主要围绕\
  \ `ApplicationContext` 包装的 `BeanFactory` 接口。在 Spring 中，`BeanFactory` 接口的各种实现负责 Bean\
  \ 的实例化、提供依赖注入以及为 Spring 管理的 Bean 提供生命周期支持。然而，如前所述，作为 `BeanFactory` 接口的扩展，`ApplicationContext`\
  \ 还提供了其他有用的功能。`ApplicationContext` 的主要功能是提供一个更丰富的框架，用于构建你的应用程序。\n\n与 `BeanFactory`\
  \ 相比，`ApplicationContext` 对其内部配置的 Bean 有更深入的了解，并且在许多 Spring 基础设施类和接口（例如 `BeanFactoryPostProcessor`）的情况下，它会代表你与它们交互，从而减少使用\
  \ Spring 时需要编写的代码量。\n\n使用 `ApplicationContext` 的最大好处是，它允许你以完全声明式的方式配置和管理 Spring\
  \ 以及 Spring 管理的资源。这意味着，只要可能，Spring 会提供支持类，自动将 `ApplicationContext` 加载到你的应用程序中，从而无需你编写任何代码来访问\
  \ `ApplicationContext`。实际上，此功能目前仅在你使用 Spring 构建 Web 应用程序时可用，它允许你在 Web 应用程序部署描述符中初始化\
  \ Spring 的 `ApplicationContext`。当使用独立应用程序时，你也可以通过简单的编码来初始化 Spring 的 `ApplicationContext`，正如你到目前为止所看到的那样。\n\
  \n除了提供更侧重于声明式配置的模型外，`ApplicationContext` 还支持以下功能：\n\n*   国际化\n\n*   事件发布\n\n*  \
  \ 资源管理和访问\n\n*   额外的生命周期接口\n\n*   改进了基础设施组件的自动配置\n\n在接下来的章节中，我们将讨论 `ApplicationContext`\
  \ 中除依赖注入之外的一些最重要的功能。\n\n\n\n## 国际化\n\nSpring 真正擅长的领域之一是对国际化（i18n）的支持。通过使用 `MessageSource`\
  \ 接口，你的应用程序可以访问以多种语言存储的字符串资源，这些资源被称为*消息*。对于你希望在应用程序中支持的每种语言，你都需要维护一个消息列表，这些消息通过键值与其他语言的消息相对应。例如，如果你想用英语和乌克兰语显示“*The\
  \ quick brown fox jumped over the lazy dog*”，你需要创建两条消息，它们的键值都是 `msg`；英语消息的内容是“*The\
  \ quick brown fox jumped over the lazy dog*”，而乌克兰语消息的内容是“Те що Росія робить з Україною,\
  \ є злочином。”\n\n虽然你不需要使用 `ApplicationContext` 来使用 `MessageSource`，但 `ApplicationContext`\
  \ 接口扩展了 `MessageSource`，并为加载消息以及使其在你的环境中可用提供了特殊支持。消息的自动加载在任何环境中都可用，但自动访问仅在特定的 Spring\
  \ 管理场景中提供，例如当你使用 Spring 的 MVC 框架构建 Web 应用程序时。虽然任何类都可以实现 `ApplicationContextAware`\
  \ 从而访问自动加载的消息，但我们建议在本章后面的“在独立应用程序中使用 `MessageSource`”一节中提供一个更好的解决方案。\n\n### 使用 `MessageSource`\
  \ 实现国际化\n\n除了 `ApplicationContext` 之外，Spring 还提供了三种 `MessageSource` 实现：\n\n*   `ResourceBundleMessageSource`\n\
  *   `ReloadableResourceBundleMessageSource`\n*   `StaticMessageSource`\n\n`StaticMessageSource`\
  \ 实现不应在生产应用程序中使用，因为你无法在外部对其进行配置，而这通常是在为应用程序添加 `i18n` 功能时的主要需求之一。`ResourceBundleMessageSource`\
  \ 通过使用 Kotlin 的 `ResourceBundle` 来加载消息。`ReloadableResourceBundleMessageSource` 本质上与之相同，只是它支持对底层源文件进行定时重新加载。\n\
  \n所有这三种 `MessageSource` 实现还实现了另一个名为 `HierarchicalMessageSource` 的接口，该接口允许嵌套多个 `MessageSource`\
  \ 实例。这是 `ApplicationContext` 与 `MessageSource` 实例协同工作的关键所在。\n\n为了利用 `ApplicationContext`\
  \ 对 `MessageSource` 的支持，你必须在配置中定义一个类型为 `MessageSource` 且名称为 `messageSource` 的 bean。`ApplicationContext`\
  \ 会获取这个 `MessageSource` 并将其嵌套在自身内部，从而允许你通过 `ApplicationContext` 访问这些消息。这可能有点难以想象，所以让我们看一下清单\
  \ 4-27 中的示例，该示例展示了一个简单的应用程序，它访问了英语和乌克兰语区域设置的一组消息。\n\n```\npackage com.apress.prospring6.four\n\
  import org.slf4j.LoggerFactory\nimport org.springframework.context.MessageSource\n\
  // 其他导入已省略\n@Configuration\ninternal open class MessageSourceConfig {\n@Bean\nopen\
  \ fun messageSource(): MessageSource =\nResourceBundleMessageSource().apply {\n\
  setBasenames(\"labels\")\n}\n}\nobject MessageSourceDemo {\nprivate val LOGGER =\
  \ LoggerFactory.getLogger(MessageSourceDemo::class.java)\n@JvmStatic\nfun main(args:\
  \ Array) {\nval ctx = AnnotationConfigApplicationContext(MessageSourceConfig::class.java)\n\
  val english = Locale.ENGLISH\nval ukrainian = Locale.Builder().setLanguage(\"uk\"\
  ).setRegion(\"UA\").build()\nLOGGER.info(ctx.getMessage(\"msg\", null, english))\n\
  LOGGER.info(ctx.getMessage(\"msg\", null, ukrainian))\nLOGGER.info(ctx.getMessage(\"\
  nameMsg\",\narrayOf(\"Iuliana\", \"Cosmina\"), english))\nLOGGER.info(ctx.getMessage(\"\
  nameMsg\",\narrayOf(\"Iuliana\", \"Cosmina\"), ukrainian))\nctx.close()\n}\n}\n\
  清单 4-27\n使用 Spring ApplicationContext 的 MessageSource 配置\n```\n\n暂时不必担心对 `getMessage()`\
  \ 的调用；我们稍后会回到这些调用上。现在，你只需要知道它们会为指定的区域设置检索一条键控消息。\n\n在 `MessageSourceConfig` 类中，我们按照\
  \ Spring 的要求定义了一个名为 `messageSource` 的 `ResourceBundleMessageSource` bean。我们为其配置了一组名称，以形成其文件集的基础。`ResourceBundleMessageSource`\
  \ 使用的 Java `ResourceBundle` 基于一组由基本名称标识的属性文件。当查找特定 `Locale` 的消息时，`ResourceBundle`\
  \ 会查找一个由基本名称和区域设置名称组合命名的文件。例如，如果基本名称是 `foo`，并且我们正在查找 en-GB（英式英语）区域设置的消息，`ResourceBundle`\
  \ 会查找名为 `foo_en_GB.properties` 的文件。\n\n对于前面的示例，英语（labels_en.properties）和乌克兰语（labels_uk_UA.properties）的属性文件内容如清单\
  \ 4-28 所示。\n\n```\n#labels_en.properties\nmsg=Witnessing and not stopping evil is\
  \ condoning it\nnameMsg=My name is {0} {1}\n#labels_de_DE.properties\nmsg=Бути свідком\
  \ зла і не зупиняти його – це брати участь у цьому\nnameMsg=Мене звати {0} {1}\n\
  清单 4-28\nMessageSource 资源文件内容\n```\n\n这些文件位于 `resources` 目录中，并被添加到应用程序的类路径中。\n\n\
  现在，这个示例只会引发更多问题。那些对 `getMessage()` 的调用是什么意思？为什么我们使用 `ApplicationContext.getMessage()`\
  \ 而不是直接访问 `ResourceBundleMessageSource` bean？我们将依次回答这些问题。\n\n### 使用 `getMessage()`\
  \ 方法\n\n`MessageSource` 接口为 `getMessage()` 方法定义了三个重载。这些重载在表 4-2 中进行了描述。\n\n表 4-2\n\
  `MessageSource` 中 `getMessage()` 的重载\n\n| 方法签名 | 描述 |\n| --- | --- |\n| `getMessage(String,Object[],\
  \ Locale)` | 这是标准的 `getMessage()` 方法。`String` 参数是与属性文件中的键相对应的消息键。在前面的清单 4-27 中，第一次调用\
  \ `getMessage()` 使用了 `msg` 作为键，这对应于 en 区域设置属性文件中的以下条目：`msg=The quick brown fox jumped\
  \ over the lazy dog`。`Object[] array` 参数用于消息中的替换。在第三次调用 `getMessage()` 时，我们传入了一个包含两个\
  \ `String` 的数组。键为 `nameMsg` 的消息是 `My name is {0} {1}`。大括号中的数字是占位符，每个占位符都会被参数数组中对应的条目替换。最后一个参数\
  \ `Locale` 告诉 `ResourceBundleMessageSource` 要查找哪个属性文件。尽管示例中第一次和第二次调用 `getMessage()`\
  \ 使用了相同的键，但它们返回了不同的消息，这些消息对应于传递给 `getMessage()` 的 `Locale` 设置。 |\n| `getMessage(String,\
  \ Object[], String,Locale)` | 此重载的工作方式与 `getMessage(String,Object[], Locale)` 相同，只是多了一个\
  \ `String` 参数，该参数允许我们在提供的键在提供的 `Locale` 中没有可用消息时传入一个默认值。 |\n| `getMessage(MessageSourceResolvable,Locale)`\
  \ | 此重载是一个特殊情况。我们将在接下来的“`MessageSourceResolvable` 接口”一节中进一步详细讨论它。 |\n\n\n\n### 为什么使用\
  \ `ApplicationContext` 作为 `MessageSource`？\n\n要回答这个问题，我们需要稍微超前一点，看看 Spring 中的 Web\
  \ 应用支持。总的来说，答案是你*不应该*使用 `ApplicationContext` 作为 `MessageSource`，因为这样做会不必要地将你的 Bean\
  \ 与 `ApplicationContext` 耦合（下一节将更详细地讨论这一点）。当你使用 Spring 的 MVC 框架构建 Web 应用时，才应该使用\
  \ `ApplicationContext`。\n\nSpring MVC 中的核心接口是 `Controller`。与 Struts 等要求你通过继承具体类来实现控制器的框架不同，Spring\
  \ 只要求你实现 `Controller` 接口（或者用 `@Controller` 注解标注你的控制器类）。话虽如此，Spring 还是提供了一系列有用的基类，你可以用它们来实现自己的控制器。这些基类中的每一个都是\
  \ `ApplicationObjectSupport` 类的子类（直接或间接），而 `ApplicationObjectSupport` 是所有希望感知 `ApplicationContext`\
  \ 的应用对象的便捷超类。请记住，在 Web 应用环境中，`ApplicationContext` 是自动加载的。\n\n`ApplicationObjectSupport`\
  \ 访问这个 `ApplicationContext`，将其包装在一个 `MessageSourceAccessor` 对象中，并通过受保护的 `getMessageSourceAccessor()`\
  \ 方法将其提供给控制器。`MessageSourceAccessor` 提供了大量便捷的方法来处理 `MessageSource` 实例。这种自动注入的形式非常有益；它消除了所有控制器暴露\
  \ `MessageSource` 属性的需要。\n\n然而，这并不是在 Web 应用中使用 `ApplicationContext` 作为 `MessageSource`\
  \ 的最佳理由。使用 `ApplicationContext` 而不是手动定义的 `MessageSource` Bean 的主要原因是，Spring 会尽可能地将\
  \ `ApplicationContext` 作为 `MessageSource` 暴露给视图层。这意味着当你使用 Spring 的 JSP 标签库时，`<spring:message>`\
  \ 标签会自动从 `ApplicationContext` 读取消息；而当你使用 JSTL 时，`<fmt:message>` 标签也会执行相同的操作。\n\n\
  所有这些好处意味着，在构建 Web 应用时，最好使用 `ApplicationContext` 中的 `MessageSource` 支持，而不是单独管理一个\
  \ `MessageSource` 实例。考虑到要利用此功能，你只需配置一个名为 `messageSource` 的 `MessageSource` Bean，这一点尤其正确。\n\
  \n### 在独立应用中使用 `MessageSource`\n\n当你在独立应用中使用 `MessageSource` 时，Spring 除了自动将 `MessageSource`\
  \ Bean 嵌套在 `ApplicationContext` 中之外，不提供任何额外支持。此时，最好通过依赖注入来使 `MessageSource` 可用。你可以选择让你的\
  \ Bean 实现 `ApplicationContextAware`，但这会阻止它在 `BeanFactory` 上下文中使用。再加上这样做会使测试复杂化而没有任何明显的好处，很明显，在独立环境中，你应该坚持使用依赖注入来访问\
  \ `MessageSource` 对象。\n\n#### `MessageSourceResolvable` 接口\n\n当你从 `MessageSource`\
  \ 查找消息时，可以使用实现了 `MessageSourceResolvable` 的对象来代替键和一组参数。该接口在 Spring 验证库中使用最广泛，用于将\
  \ `Error` 对象与其国际化错误消息关联起来。\n\n### 应用事件\n\n`ApplicationContext` 中另一个 `BeanFactory`\
  \ 不具备的特性是，能够通过使用 `ApplicationContext` 作为代理来发布和接收事件。在本节中，你将了解其用法。\n\n### 使用应用事件\n\
  \n事件是一个派生自 `ApplicationEvent` 的类，而 `ApplicationEvent` 本身派生自 `java.util.EventObject`。任何\
  \ Bean 都可以通过实现 `ApplicationListener<T>` 接口来监听事件；`ApplicationContext` 在配置时会自动将任何实现此接口的\
  \ Bean 注册为监听器。事件通过 `ApplicationEventPublisher.publishEvent()` 方法发布，因此发布类必须了解 `ApplicationContext`（它扩展了\
  \ `ApplicationEventPublisher` 接口）。在 Web 应用中，这很简单，因为你的许多类都派生自 Spring 框架的类，这些类允许通过受保护的方法访问\
  \ `ApplicationContext`。在独立应用中，你可以让你的发布 Bean 实现 `ApplicationContextAware`，使其能够发布事件。清单\
  \ 4-29 展示了一个基本事件类的示例。\n\n```\npackage com.apress.prospring6.four.events\nimport\
  \ org.springframework.context.ApplicationEvent\nclass MessageEvent(source: Any,\
  \ val message: String) : ApplicationEvent(source) {\ncompanion object {\n@JvmStatic\n\
  private const val serialVersionUID = 1L\n}\n}\n清单 4-29\n基本的 Spring ApplicationEvent\
  \ 类\n```\n\n这段代码非常基础；唯一需要注意的是 `ApplicationEvent` 有一个接受事件源引用的单一构造函数。这在 `MessageEvent`\
  \ 的构造函数中得到了体现。在清单 4-30 中，你可以看到监听器的代码。\n\n```\npackage com.apress.prospring6.four.events\n\
  import org.slf4j.LoggerFactory\nimport org.springframework.context.ApplicationListener\n\
  import org.springframework.stereotype.Component\n@Component\nclass MessageEventListener\
  \ : ApplicationListener {\noverride fun onApplicationEvent(event: MessageEvent)\
  \ {\nLOGGER.info(\"Received: {}\", event.message)\n}\ncompanion object {\nprivate\
  \ val LOGGER = LoggerFactory.getLogger(MessageEventListener::class.java)\n}\n}\n\
  清单 4-30\n基本的 Spring ApplicationListener 类\n```\n\n`ApplicationListener` 接口定义了一个单一方法\
  \ `onApplicationEvent(..)`，当事件被触发时，Spring 会调用该方法。`MessageEventListener` 通过实现强类型的\
  \ `ApplicationListener` 接口，表明它只对 `MessageEvent` 类型（或其子类）的事件感兴趣。如果接收到 `MessageEvent`，它会将消息写入标准输出。发布事件很简单；只需创建事件类的实例并将其传递给\
  \ `ApplicationEventPublisher.publishEvent()` 方法，如清单 4-31 所示。\n\n```\npackage com.apress.prospring6.four.events\n\
  import org.springframework.beans.BeansException\nimport org.springframework.context.annotation.*\n\
  // 其他导入已省略\n@Configuration\n@ComponentScan\ninternal open class EventsConfig\n@Component\n\
  class Publisher : ApplicationContextAware {\nprivate var ctx: ApplicationContext?\
  \ = null\n@Throws(BeansException::class)\n/** @Implements [ApplicationContextAware.setApplicationContext]\
  \ }\n*/\noverride fun setApplicationContext(applicationContext: ApplicationContext)\
  \ {\nctx = applicationContext\n}\nfun publish(message: String?) {\nctx!!.publishEvent(MessageEvent(this,\
  \ message!!))\n}\ncompanion object {\n@JvmStatic\nfun main(args: Array) {\nval ctx\
  \ = AnnotationConfigApplicationContext(EventsConfig::class.java)\nval pub = ctx.getBean(\"\
  publisher\") as Publisher\npub.publish(\"I send an SOS to the world... \")\npub.publish(\"\
  ... I hope that someone gets my...\")\npub.publish(\"... Message in a bottle\")\n\
  }\n}\n}\n清单 4-31\n基本的 Spring ApplicationContextAware 类及测试代码\n```\n\n\n\n这里使用了一个代码快捷技巧来保持简单：`Publisher`\
  \ Bean 类型也包含了 `main(..)` 方法，该方法从 `ApplicationContext` 中检索自身的实例，然后使用 `publish()`\
  \ 方法，向 `ApplicationContext` 发布两个 `MessageEvent` 实例。`Publisher` Bean 实例通过实现 `ApplicationContextAware`\
  \ 来访问 `ApplicationContext` 实例。`EventsConfig` 配置类为空，仅声明用于启用包内的组件扫描，因此 `Publisher`\
  \ 和 `MessageEventListener` 的 Bean 定义会被拾取。\n\n运行此示例将产生如清单 4-32 所示的输出，证明了 `MessageEventListener`\
  \ 对 `Publisher` Bean 使用注入的 `ApplicationContext` 发布的事件做出了响应。\n\n```\nINFO : MessageEventListener\
  \ - Received: I send an SOS to the world...\nINFO : MessageEventListener - Received:\
  \ ... I hope that someone gets my...\nINFO : MessageEventListener - Received: ...\
  \ Message in a bottle\nListing 4-32\n运行清单 4-31 中代码产生的输出\n```\n\n### 事件使用的注意事项\n\n\
  在应用程序的许多情况下，某些组件需要被通知某些事件。通常，您通过编写代码显式通知每个组件，或使用诸如 JMS 之类的消息传递技术来实现这一点。逐个编写代码通知每个组件的缺点在于，您将这些组件与发布者耦合在一起，这在很多情况下是不必要的。\n\
  \n考虑这样一种情况：您在应用程序中缓存产品详细信息以避免访问数据库。另一个组件允许修改产品详细信息并将其持久化到数据库。为了避免使缓存失效，更新组件显式通知缓存用户详细信息已更改。在这个例子中，更新组件与一个实际上与其业务职责无关的组件耦合在一起。更好的解决方案是让更新组件在每次产品详细信息被修改时发布一个事件，然后让感兴趣的组件（例如缓存）监听该事件。这样做的好处是保持组件解耦，这使得在需要时移除缓存或添加另一个对产品详细信息更改感兴趣的监听器变得简单。\n\
  \n在这种情况下使用 JMS 会显得大材小用，因为使缓存中的产品条目失效的过程很快，并且不是业务关键性的。使用 Spring 事件基础设施为您的应用程序增加的开销非常小。\n\
  \n通常，我们将事件用于执行速度快且不属于主应用程序逻辑的反应性逻辑。在前面的例子中，缓存中产品的失效是对产品详细信息更新的反应，它执行得很快（或者应该很快），并且不是应用程序的主要功能的一部分。对于长时间运行且构成主要业务逻辑一部分的流程，建议使用\
  \ JMS 或类似的消息传递系统，如 RabbitMQ。使用 JMS 的主要好处是它更适合长时间运行的流程，并且随着系统的发展，您可以在必要时将包含业务信息的消息的\
  \ JMS 驱动处理分解到单独的机器上。\n\n## 访问资源\n\n通常，应用程序需要以不同形式访问各种资源。您可能需要访问存储在文件系统文件中的某些配置数据、存储在类路径上\
  \ JAR 文件中的某些图像数据，或者可能访问其他服务器上的某些数据。Spring 提供了一种统一的机制，以独立于协议的方式访问资源。这意味着您的应用程序可以以相同的方式访问文件资源，无论它是存储在文件系统、类路径还是远程服务器上。\n\
  \nSpring 资源支持的核心是 `org.springframework.core.io.Resource` 接口。`Resource` 接口定义了十个不言自明的方法：\n\
  \n*   `contentLength()`\n\n*   `exists()`\n\n*   `getDescription()`\n\n*   `getFile()`\n\
  \n*   `getFileName()`\n\n*   `getURI()`\n\n*   `getURL()`\n\n*   `isOpen()`\n\n\
  *   `isReadable()`\n\n*   `lastModified()`\n\n除了这十个方法之外，还有一个方法不那么不言自明：`createRelative()`。`createRelative()`\
  \ 方法通过使用相对于调用它的实例的路径来创建一个新的 `Resource` 实例。您可以提供自己的 `Resource` 实现，尽管这超出了本章的范围，但在大多数情况下，您会使用内置实现之一来访问文件（`FileSystemResource`\
  \ 类）、类路径（`ClassPathResource` 类）或 URL 资源（`UrlResource` 类）。在内部，Spring 使用另一个接口 `ResourceLoader`\
  \ 及其默认实现 `DefaultResourceLoader` 来定位和创建 `Resource` 实例。但是，您通常不会与 `DefaultResourceLoader`\
  \ 交互，而是使用另一个名为 `ApplicationContext` 的 `ResourceLoader` 实现。清单 4-33 展示了一个使用 `ApplicationContext`\
  \ 访问三个资源的应用程序。\n\n```\npackage com.apress.prospring6.four\nimport org.springframework.core.io.Resource\n\
  // other import statements omitted\nobject ResourceDemo {\nprivate val LOGGER =\
  \ LoggerFactory.getLogger(ResourceDemo::class.java)\n@Throws(Exception::class)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext()\n\
  val baseDir = File(System.getProperty(\"java.io.tmpdir\"))\nval filePath = Files.createFile(Path.of(baseDir.absolutePath,\
  \ \"test.txt\"))\nFiles.writeString(filePath, \"Hello World!\")\nfilePath.toFile().deleteOnExit()\n\
  val res1 = ctx.getResource(\"file://$filePath\")\ndisplayInfo(res1)\nval res2 =\
  \ ctx.getResource(\"classpath:test.txt\")\ndisplayInfo(res2)\nval res3 = ctx.getResource(\"\
  http://iuliana-cosmina.com\")\ndisplayInfo(res3)\n}\n@Throws(Exception::class)\n\
  private fun displayInfo(res: Resource) {\nLOGGER.info(\"Resource class: {}\", res.javaClass)\n\
  LOGGER.info(\"Resource URL content: {}\",\nBufferedReader(InputStreamReader(res.url.content\
  \ as InputStream)).lines().parallel()\n.collect(Collectors.joining(\"\\n\"))\n)\n\
  LOGGER.info(\" -------------\")\n}\n}\nListing 4-33\n访问各种 Spring 资源的应用程序示例\n```\n\
  \n请注意，在每次调用 `getResource()` 时，我们都为每个资源传入一个 URI。您会认出我们为 `res1` 和 `res3` 传入的常见 `file:`\
  \ 和 `http:` 协议。我们为 `res2` 使用的 `classpath:` 协议是 Spring 特有的，它指示 `ResourceLoader` 应在类路径中查找资源。\n\
  \n运行此示例将产生如清单 4-34 所示的输出。\n\n```\nINFO : ResourceDemo - Resource class: class org.springframework.core.io.FileUrlResource\n\
  INFO : ResourceDemo - Resource URL content: Hello World!\nINFO : ResourceDemo -\
  \  -------------\nINFO : ResourceDemo - Resource class: class org.springframework.core.io.ClassPathResource\n\
  INFO : ResourceDemo - Resource URL content: Hello World from the classpath!\nINFO\
  \ : ResourceDemo -  -------------\nINFO : ResourceDemo - Resource class: class org.springframework.core.io.UrlResource\n\
  INFO : ResourceDemo - Resource URL content: \n301 Moved Permanently\n\n\n\nINFO\
  \ : ResourceDemo -  -------------\n**清单 4-34**\n**清单 4-33 代码的输出**\n```\n\n![](img/524962_1_En_4_Figk_HTML.jpg)\
  \ 信息符号。 你尝试访问 [`http://iuliana-cosmina.com`](http://iuliana-cosmina.com) 站点时收到 `301\
  \ Moved Permanently` 响应的原因是该站点实际使用了安全 HTTP。要提取主页的实际内容，请使用 `ctx.getResource(\"`[`https://iuliana-cosmina.com`](https://iuliana-cosmina.com)`\"\
  )`。\n\n请注意，对于 `file:` 和 `http:` 协议，Spring 都会返回一个 `UrlResource` 实例。Spring 确实包含一个\
  \ `FileSystemResource` 类，但 `DefaultResourceLoader` 完全不使用这个类。这是因为 Spring 的默认资源加载策略将\
  \ URL 和文件视为具有不同协议（`file:` 和 `http:`）的同一类型资源。如果需要 `FileSystemResource` 的实例，请使用 `FileSystemResourceLoader`。一旦获得\
  \ `Resource` 实例，你就可以根据需要使用 `getFile()`、`getInputStream()` 或 `getURL()` 自由访问其内容。在某些情况下，例如使用\
  \ `http:` 协议时，调用 `getFile()` 会导致 `FileNotFoundException`。因此，我们建议你使用 `getInputStream()`\
  \ 来访问资源内容，因为它很可能适用于所有可能的资源类型。\n\n## 高级 Java/Kotlin 配置类\n\n到目前为止，本书中的 Java/Kotlin\
  \ 配置类都非常基础。让我们继续探讨更多的配置选项。考虑到**第 3 章**中介绍的 `MessageRender` 和 `ConfigurableMessageProvider`，假设我们想将消息外部化到一个名为\
  \ `message.properties` 的属性文件中。`ConfigurableMessageProvider.message` 属性将通过构造器注入，注入从该文件读取的值。`message.properties`\
  \ 的内容如下：\n\n```\nmessage=Only hope can keep me together\n```\n\n让我们看看修改后的测试程序，它使用\
  \ `@PropertySource` 注解加载属性文件，然后将它们注入消息提供者实现中。**清单 4-35** 显示了测试程序，包括在 Bean 声明上添加了注解的配置类以及简化的\
  \ Bean 类型。\n\n```\npackage com.apress.prospring6.four\nimport com.apress.prospring6.two.decoupled.MessageProvider\n\
  import com.apress.prospring6.two.decoupled.MessageRenderer\nimport org.springframework.core.env.Environment\n\
  // 其他导入语句已省略\nobject PropertySourcesDemo {\n@JvmStatic\nfun main(args: Array) {\n\
  val ctx: ApplicationContext =\nAnnotationConfigApplicationContext(PropertySourcesCfg::class.java)\n\
  val mr = ctx.getBean(\n\"messageRenderer\",\nMessageRenderer::class.java\n)\nmr.render()\n\
  }\n}\n@Configuration\n@PropertySource(value = [\"classpath:message.properties\"\
  ])\ninternal open class PropertySourcesCfg {\n@Autowired\nvar env: Environment?\
  \ = null\n@Bean\n@Lazy\nopen fun messageProvider(): MessageProvider =\nConfigurableMessageProvider(env!!.getProperty(\"\
  message\"))\n@Bean(name = [\"messageRenderer\"])\n@Scope(value = \"prototype\")\n\
  @DependsOn(value = [\"messageProvider\"])\nopen fun messageRenderer(): MessageRenderer\
  \ =\nStandardOutMessageRenderer().apply {\nmessageProvider = messageProvider()\n\
  }\n}\ninternal class ConfigurableMessageProvider(\n@param:Value(\"Configurable message\"\
  )\noverride val message: String\n) :\nMessageProvider\ninternal class StandardOutMessageRenderer\
  \ : MessageRenderer {\noverride var messageProvider: MessageProvider? = null\noverride\
  \ fun render() {\nLOGGER.info(messageProvider!!.message)\n}\ncompanion object {\n\
  private val LOGGER =\nLoggerFactory.getLogger(StandardOutMessageRenderer::class.java)\n\
  }\n}\n**清单 4-35**\n**@PropertySource 使用示例**\n```\n\n**清单 4-35** 引入了一些注解，这些注解在**表\
  \ 4-3** 中进行了说明。其中一些注解已在**第 3 章**中使用过，但当时并未解释。使用诸如 `@Component`、`@Service` 等构造型注解定义的\
  \ Bean，可以通过启用组件扫描并在需要时进行自动装配，在 Java 配置类中使用。在下面的**清单 4-36** 中，我们将 `ConfigurableMessageProvider`\
  \ 声明为一个服务 Bean。\n\n**表 4-3**\n\n**Java 配置注解表**\n\n| 注解 | 描述 |\n| --- | --- |\n|\
  \ `@PropertySource` | 此注解用于将属性文件加载到 Spring 的 `ApplicationContext` 中，它接受位置作为参数（可以提供多个位置）。\
  \ |\n| `@Lazy` | 此注解指示 Spring 仅在请求时才实例化 Bean。此注解有一个默认的 `value` 属性，默认值为 `true`；因此，使用\
  \ `@Lazy(value=true)` 等同于使用 `@Lazy`。 |\n| `@Scope` | 此注解用于定义 Bean 的作用域，当所需作用域不是单例时使用。\
  \ |\n| `@DependsOn` | 此注解告诉 Spring 某个 Bean 依赖于其他一些 Bean，因此 Spring 将确保这些 Bean 首先被实例化。\
  \ |\n| `@Autowired` | 此注解在此处用于 `env` 变量，其类型为 `Environment`。这是 Spring 提供的 `Environment`\
  \ 抽象特性。我们将在本章后面讨论它。 |\n\n一个应用程序也可以有多个配置类，这些类可用于解耦配置并按用途组织 Bean（例如，一个类可以专门用于 DAO\
  \ Bean 声明，另一个类可以专门用于 Service Bean 声明，等等）。为了演示这一点，我们可以修改前面的示例，将 `ConfigurableMessageProvider`\
  \ 定义为一个服务，并声明一个名为 `ServiceConfig` 的配置类来声明此 Bean 类型。声明 `MessageRenderer` Bean 的配置类将使用\
  \ `@Import` 注解来访问由 `ServiceConfig` 类声明的 `MessageProvider` Bean。**清单 4-36** 显示了这些配置类。\n\
  \n```\npackage com.apress.prospring6.four.multiple\nimport com.apress.prospring6.two.decoupled.MessageProvider\n\
  import com.apress.prospring6.two.decoupled.MessageRenderer\n// 其他导入语句已省略\n@Service(\"\
  provider\")\ninternal class ConfigurableMessageProvider(\n// 与之前清单中的代码相同\n}\ninternal\
  \ class StandardOutMessageRenderer : MessageRenderer {\n// 与之前清单中的代码相同\n}\n@Configuration\n\
  @ComponentScan\ninternal open class ServiceConfig\n@Configuration\n@Import(ServiceConfig::class)\n\
  internal open class TheOtherConfig {\n@Autowired\nvar provider: MessageProvider?\
  \ = null\n@Bean(name = [\"messageRenderer\"])\nopen fun messageRenderer(): MessageRenderer\
  \ =\nStandardOutMessageRenderer().apply {\nmessageProvider = provider\n}\n}\nobject\
  \ ImportDemo {\n@JvmStatic\nfun main(args: Array) {\nval ctx: ApplicationContext\
  \ =\nAnnotationConfigApplicationContext(TheOtherConfig::class.java)\nval mr = ctx.getBean(\n\
  \"messageRenderer\",\nMessageRenderer::class.java\n)\nmr.render()\n}\n}\n**清单 4-36**\n\
  **@Import 使用示例**\n```\n\n在 `ImportDemo` 类的 main 方法中，创建应用上下文时只需要 `TheOtherConfig`\
  \ 类，因为该类导入了 `ServiceConfig` 导入类中声明的或通过其扫描发现的所有 Bean 定义。\n\n## 配置文件\n\nSpring 提供的另一个有趣特性是配置文件的理念。基本上，配置文件指示\
  \ Spring 仅配置在指定配置文件处于激活状态时定义的 `ApplicationContext` 实例。在本节中，我们将演示如何在一个简单程序中使用配置文件。\n\
  \n\n\n### Spring Profiles 功能使用示例\n\n假设有一个名为 `FoodProviderService` 的服务，负责为学校（包括幼儿园和高中）提供餐食。`FoodProviderService`\
  \ 接口只有一个名为 `provideLunchSet()` 的方法，该方法为调用学校的学生生成午餐套餐。午餐套餐是一个 `Food` 对象列表，`Food`\
  \ 是一个简单的类，只有一个 `name` 属性。清单 4-37 展示了 `Food` 类。\n\n```\npackage com.apress.prospring6.four.profile\n\
  class Food {\nvar name: String? = null\n//constructor() {}\nconstructor(name: String?)\
  \ {\nthis.name = name\n}\n}\nListing 4-37\nFood Bean 类型\n```\n\n`FoodProviderService`\
  \ 接口如清单 4-38 所示。\n\n```\npackage com.apress.prospring6.four.profile\ninterface FoodProviderService\
  \ {\nfun provideLunchSet(): List?\n}\nListing 4-38\nFoodProviderService 接口\n```\n\
  \n现在假设有两个午餐套餐供应商，一个面向幼儿园，一个面向高中。虽然它们提供的服务相同（即为学生提供午餐），但生产的午餐套餐内容不同。因此，我们创建两个 `FoodProviderService`\
  \ 的实现，使用相同的名称但放在不同的包中，以标识它们的目标学校。这两个类如清单 4-39 所示。\n\n```\n// chapter04/src/main/java/com/apress/prospring6/four/profile/\n\
  kindergarten/FoodProviderServiceImpl.kt\npackage com.apress.prospring6.four.profile.kindergarten\n\
  import com.apress.prospring6.four.profile.Food\nimport com.apress.prospring6.four.profile.FoodProviderService\n\
  class FoodProviderServiceImpl : FoodProviderService {\noverride fun provideLunchSet():\
  \ List {\nreturn listOf(Food(\"Milk\"), Food(\"Biscuits\"))\n}\n}\n// chapter04/src/main/java/com/apress/prospring6/four/profile/\n\
  highschool/FoodProviderServiceImpl.java\npackage com.apress.prospring6.four.profile.highschool\n\
  // 导入同上\nclass FoodProviderServiceImpl : FoodProviderService {\noverride fun provideLunchSet():\
  \ List {\nreturn listOf(Food(\"Coke\"), Food(\"Hamburger\"), Food(\"Fries\"))\n\
  }\n}\nListing 4-39\nFoodProviderService 实现\n```\n\n从上述清单可以看出，两个实现提供了相同的 `FoodProviderService`\
  \ 接口，但生成的午餐套餐食物组合不同。现在假设一所幼儿园希望供应商为其学生配送午餐套餐；我们来看看如何使用 Spring 的 profile 配置来实现这一需求。我们将首先介绍\
  \ Java/Kotlin 配置方式。我们将创建两个配置类，一个用于幼儿园 profile，另一个用于高中 profile。清单 4-40 展示了这两个 profile\
  \ 配置。\n\n```\npackage com.apress.prospring6.four.profile.highschool\nimport com.apress.prospring6.four.profile.FoodProviderService\n\
  import org.springframework.context.annotation.*\n@Configuration\n@Profile(\"highschool\"\
  )\nopen class HighSchoolConfig {\n@Bean\nopen fun foodProviderService(): FoodProviderService\
  \ = FoodProviderServiceImpl()\n}\npackage com.apress.prospring6.four.profile.kindergarten\n\
  import com.apress.prospring6.four.profile.FoodProviderService\nimport com.apress.prospring6.four.profile.highschool.FoodProviderServiceImpl\n\
  import org.springframework.context.annotation.*\n@Configuration\n@Profile(\"kindergarten\"\
  )\nopen class KindergartenConfig {\n@Bean\nopen fun foodProviderService(): FoodProviderService\
  \ = FoodProviderServiceImpl()\n}\nListing 4-40\n配置类\n```\n\n在两个配置类中，请注意分别声明了 `@Profile(\"\
  highschool\")` 和 `@Profile(\"kindergarten\")` 注解。该注解告诉 Spring，仅当指定的 profile 处于激活状态时，才会实例化文件中的那些\
  \ bean。在独立应用程序中使用 Spring 的 `ApplicationContext` 时，要激活正确的 profile，我们需要将 profile 作为\
  \ `spring.profiles.active` JVM 参数的值提供，在创建的上下文中设置它，添加配置类，然后刷新上下文。这将确保只有与配置的 profile\
  \ 匹配的 bean 才会被添加到上下文中。清单 4-41 展示了实现此功能的代码，并通过打印 `FoodProviderService.provideLunchSet()`\
  \ 调用返回的项目来测试结果。\n\n```\npackage com.apress.prospring6.four.profile\n// 导入语句已省略\n\
  object ProfileDemo {\nprivate val LOGGER = LoggerFactory.getLogger(ProfileDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval profile = System.getProperty(\"spring.profiles.active\"\
  )\nval ctx = AnnotationConfigApplicationContext()\nctx.environment.setActiveProfiles(profile)\n\
  //ctx.getEnvironment().setDefaultProfiles(\"kindergarten);\nctx.register(HighSchoolConfig::class.java,\
  \ KindergartenConfig::class.java)\nctx.refresh()\nval foodProviderService = ctx.getBean(\n\
  \"foodProviderService\",\nFoodProviderService::class.java\n)\nval lunchSet = foodProviderService.provideLunchSet()\n\
  lunchSet!!.forEach(Consumer { food: Food? ->\nLOGGER.info(\n\"Food: {}\",\nfood!!.name\n\
  )\n})\nctx.close()\n}\n}\nListing 4-41\nFoodProviderService 测试\n```\n\n要在 IntelliJ\
  \ IDEA 中运行 `ProfileDemo` 类时提供 `-Dspring.profiles.active=\"kindergarten\"` JVM 参数，您需要自定义启动器，如图\
  \ 4-3 所示。\n\n![](img/524962_1_En_4_Fig3_HTML.jpg)\n\n运行/调试配置窗口的截图。左侧面板选中了 Profile\
  \ demo。右侧是 Profile demo 的部分。构建并运行部分高亮显示了以下文本：-D spring.profiles.active = kindergarten。\n\
  \n图 4-3\n\n已激活 profile 的 Spring 应用程序启动器\n\n在命令行中运行主类或可执行 JAR 时，您也可以使用相同的方式提供 profile\
  \ 值。\n\n使用 JVM 参数 `-Dspring.profiles.active=\"kindergarten\"` 运行 `ProfileDemo` 类会产生以下输出：\n\
  \n```\nDEBUG: AbstractEnvironment - Activating profiles [kindergarten]\nINFO : ProfileDemo\
  \ - Food: Coke\nINFO : ProfileDemo - Food: Hamburger\nINFO : ProfileDemo - Food:\
  \ Fries\n```\n\n这正是幼儿园供应商实现将为午餐套餐生成的内容。现在将上述清单中的 profile 参数改为高中（`-Dspring.profiles.active=\"\
  highschool\"`），输出将变为：\n\n```\nDEBUG: AbstractEnvironment - Activating profiles [highschool]\n\
  INFO : ProfileDemo - Food: Coke\nINFO : ProfileDemo - Food: Hamburger\nINFO : ProfileDemo\
  \ - Food: Fries\n```\n\n在此示例中，活动 profile 是通过调用 `ctx.getEnvironment().setActiveProfiles(\"\
  ..\")` 以编程方式设置的，但由于上下文的创建方式，这是必需的。上下文是空创建的，配置是在设置 profile 之后添加的。但上下文也可以直接从配置类创建，如果提供了\
  \ JVM 参数，profile 会自动激活。如果未指定 profile，应用程序仍然可以通过调用 `ctx.getEnvironment().setDefaulltProfiles(\"\
  ..\")` 并提供一个默认激活的 profile 名称列表作为参数来保持功能。\n\n清单 4-42 展示了使用 profile 配置应用程序上下文的另一种方式。\n\
  \n\n\n```\npackage com.apress.prospring6.four.profile\nimport com.apress.prospring6.four.profile.highschool.HighSchoolConfig\n\
  import com.apress.prospring6.four.profile.kindergarten.KindergartenConfig\nimport\
  \ org.slf4j.LoggerFactory\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  object AnotherProfileDemo {\nprivate val LOGGER = LoggerFactory.getLogger(AnotherProfileDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(\n\
  HighSchoolConfig::class.java,\nKindergartenConfig::class.java\n)\nval foodProviderService\
  \ = ctx.getBean(\n\"foodProviderService\",\nFoodProviderService::class.java\n)\n\
  val lunchSet = foodProviderService.provideLunchSet()!!\nlunchSet.forEach { food\
  \ -> LOGGER.info(\"Food: {}\", food!!.name) }\nctx.close()\n}\n}\n代码清单 4-42  FoodProviderService\
  \ 测试（第二版）\n```\n\n此外，你还可以使用 `@ActiveProfiles` 注解来启用 profile。\n\n### 使用 Profile 的注意事项\n\
  \nSpring 中的 profile 特性为开发者提供了另一种管理应用程序运行配置的方式，而此前这通常是在构建工具（例如 Maven 的 profile 支持）中完成的。构建工具依赖传入的参数，将正确的配置/属性文件打包到\
  \ Java 归档文件（JAR 或 WAR，取决于应用程序类型）中，然后部署到目标环境。Spring 的 profile 特性允许你作为应用程序开发者自行定义\
  \ profile，并通过编程方式或传入 JVM 参数来激活它们。通过使用 Spring 的 profile 支持，你现在可以使用同一个应用程序归档文件，只需在\
  \ JVM 启动时传入正确的 profile 作为参数，即可部署到所有环境。例如，你可以拥有不同 profile 组合的应用程序，如 (`dev`, `hibernate`)、(`prd`,\
  \ `jdbc`) 等，每种组合代表运行环境（开发或生产）以及要使用的数据访问库（Hibernate 或 JDBC）。这便将应用程序 profile 管理引入了编程层面。\n\
  \n但这种方法也有其缺点。例如，有些人可能会认为，将不同环境的所有配置都放入应用程序配置文件或 Java/Kotlin 类中并打包在一起，如果处理不当（例如，管理员可能忘记在应用服务器环境中设置正确的\
  \ JVM 参数），就容易出错。将所有 profile 的文件打包在一起也会使包体比平时稍大一些。同样，请根据应用程序和配置需求，选择最适合你项目的方法。\n\n\
  ## **Environment** 与 **PropertySource** 抽象\n\n要设置活动 profile，需要调用 `ctx.getEnvironment()`\
  \ 或 `ctx.environment` 来访问 Spring 的 `Environment` 对象。这是一个抽象层，用于封装运行中 Spring 应用程序的环境。\n\
  \n除了 profile 之外，`Environment` 对象封装的另一个关键信息是属性（Properties）。属性用于存储应用程序的底层环境配置，例如应用程序文件夹的位置、数据库连接信息等。\n\
  \n`Environment` 的实现会在一组 `PropertySource` 对象中搜索属性值。Spring 中的 `PropertySource` 抽象特性帮助开发者从运行平台访问各种配置信息。在此抽象之下，所有系统属性、环境变量和应用程序属性都由\
  \ `Environment` 接口提供，Spring 在引导 `ApplicationContext` 时会填充这些信息。代码清单 4-43 展示了一个简单示例。\n\
  \n```\npackage com.apress.prospring6.four\nimport org.springframework.context.support.GenericApplicationContext\n\
  import org.springframework.core.env.ConfigurableEnvironment\nimport org.springframework.core.env.MapPropertySource\n\
  import org.springframework.core.env.MutablePropertySources\n// 其他导入语句已省略\nclass\
  \ EnvironmentTest {\n@Test\nfun testPropertySourceOne() {\nval ctx = GenericApplicationContext()\n\
  val env = ctx.environment\nval propertySources = env.propertySources\nval appMap:\
  \ MutableMap = HashMap()\nappMap[\"user.home\"] = \"CUSTOM_USER_HOME\"\npropertySources.addLast(MapPropertySource(\n\
  \"prospring6_MAP\", appMap)) // 注意是 addLast\nLOGGER.info(\"-- 来自 java.lang.System\
  \ 的环境变量 --\")\nLOGGER.info(\"user.home: \" + System.getProperty(\"user.home\"))\n\
  LOGGER.info(\"JAVA_HOME: \" + System.getenv(\"JAVA_HOME\"))\nLOGGER.info(\"-- 来自\
  \ ConfigurableEnvironment 的环境变量 --\")\nLOGGER.info(\"user.home: \" + env.getProperty(\"\
  user.home\"))\nLOGGER.info(\"JAVA_HOME: \" + env.getProperty(\"JAVA_HOME\"))\nctx.close()\n\
  }\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(EnvironmentTest::class.java)\n\
  }\n}\n代码清单 4-43  使用 Environment 接口\n```\n\n在代码清单 4-43 中，`ApplicationContext` 初始化后，我们获取了\
  \ `ConfigurableEnvironment` 接口的引用，该接口扩展了 `Environment`。通过此实例，我们获得了 `MutablePropertySources`（`PropertySources`\
  \ 接口的默认实现，允许操作其中包含的属性源）的句柄。随后，我们构建了一个映射，将应用程序属性放入该映射，然后使用该映射构建了一个 `MapPropertySource`\
  \ 类（一个 `PropertySource` 子类，用于从 `Map` 实例中读取键和值）。最后，通过 `addLast()` 方法将 `MapPropertySource`\
  \ 类添加到 `MutablePropertySources` 中。运行程序会在控制台输出如代码清单 4-44 所示的结果。\n\n```\nINFO : EnvironmentDemo\
  \ - -- 来自 java.lang.System 的环境变量 --\nINFO : EnvironmentDemo - user.home: /Users/iulianacosmina\n\
  INFO : EnvironmentDemo - JAVA_HOME: /Users/iulianacosmina/.sdkman/candidates/java/current\n\
  INFO : EnvironmentDemo - -- 来自 ConfigurableEnvironment 的环境变量 --\nINFO : EnvironmentDemo\
  \ - user.home: /Users/iulianacosmina\nINFO : EnvironmentDemo - JAVA_HOME: /Users/iulianacosmina/.sdkman/candidates/java/current\n\
  代码清单 4-44  使用 Environment 接口提取的值\n```\n\n\n\n前两行代码中，JVM 系统属性 `user.home` 和环境变量 `JAVA_HOME`\
  \ 被获取（与之前使用 JVM 的 System 类的方式相同）。然而，对于最后两行，你可以看到所有系统属性、环境变量和应用程序属性都可以通过 `Environment`\
  \ 接口访问。你可以看到 `Environment` 抽象如何帮助你管理和访问应用程序运行环境中的所有各种属性。\n\n`Environment` 实例会在一组\
  \ `PropertySource` 对象中进行搜索。Spring 按以下默认顺序访问属性：\n\n*   运行中 JVM 的系统属性\n*   环境变量\n\
  *   应用程序定义的属性\n\n输出显示，当定义一个名为 `user.home` 的相同应用程序属性，并通过 `MutablePropertySources`\
  \ 类将其添加到 `Environment` 接口时，`user.home` 的值仍然从 JVM 属性中获取，而 `CUSTOM_USER_HOME` 则无处可寻。然而，Spring\
  \ 允许你控制 `Environment` 检索属性的顺序。清单 4-45 展示了清单 4-43 中代码的修订版本。\n\n```\npackage com.apress.prospring6.four\n\
  // 导入语句已省略\nclass EnvironmentTest {\n@Test\nfun testPropertySourceTwo() {\nval ctx\
  \ = GenericApplicationContext()\nval env = ctx.environment\nval propertySources\
  \ = env.propertySources\nval appMap: MutableMap = HashMap()\nappMap[\"user.home\"\
  ] = \"CUSTOM_USER_HOME\"\npropertySources.addFirst(MapPropertySource(\n\"prospring6_MAP\"\
  , appMap)) // 注意 addFirst\nLOGGER.info(\"-- 来自 java.lang.System 的环境变量 --\")\nLOGGER.info(\"\
  user.home: \" + System.getProperty(\"user.home\"))\nLOGGER.info(\"JAVA_HOME: \"\
  \ + System.getenv(\"JAVA_HOME\"))\nLOGGER.info(\"-- 来自 ConfigurableEnvironment 的环境变量\
  \ --\")\nLOGGER.info(\"user.home: \" + env.getProperty(\"user.home\"))\nLOGGER.info(\"\
  JAVA_HOME: \" + env.getProperty(\"JAVA_HOME\"))\nctx.close()\n}\n...\n}\n清单 4-45\n\
  使用 Environment 接口（第 2 部分）\n```\n\n在清单 4-45 中，请注意高亮显示的那一行。它声明了一个同样名为 `user.home`\
  \ 的应用程序属性，但这次通过 `MutablePropertySources` 类的 `addFirst()` 方法将其添加为第一个要搜索的属性。当你运行程序时，你将看到清单\
  \ 4-46 所示的输出。\n\n```\nINFO : EnvironmentTest - -- 来自 java.lang.System 的环境变量 --\n\
  INFO : EnvironmentTest - user.home: /Users/iulianacosmina\nINFO : EnvironmentTest\
  \ - JAVA_HOME: /Users/iulianacosmina/.sdkman/candidates/java/current\nINFO : EnvironmentDemo\
  \ - -- 来自 ConfigurableEnvironment 的环境变量 --\nINFO : EnvironmentTest - user.home:\
  \ CUSTOM_USER_HOME\nINFO : EnvironmentTest - JAVA_HOME: /Users/iulianacosmina/.sdkman/candidates/java/current\n\
  清单 4-46\n使用 Environment 接口提取的值\n```\n\n前两行保持不变，因为我们仍然使用 JVM `System` 类的 `getProperty()`\
  \ 和 `getenv()` 方法来检索它们。然而，当使用 `Environment` 接口时，你会看到我们定义的 `user.home` 属性优先，因为我们将其定义为搜索属性值的第一个位置。\n\
  \n在实际应用中，你很少需要直接与 `Environment` 接口交互，而是会使用 `${}` 形式的属性占位符（例如 `${application.home}`），并将解析后的值注入到\
  \ Spring Bean 中。让我们看看实际效果。假设我们有一个类来存储从属性文件加载的所有应用程序属性。清单 4-47 展示了 `AppProperty`\
  \ 类和 `application.properties` 文件的内容。\n\n```\npackage com.apress.prospring6.four\n\
  // 导入语句已省略\ninternal class AppProperty {\n@set:Autowired\nvar applicationHome: String?\
  \ = null\n@Value(\"${application.home}\") set(value) {\nfield = value\n}\n@set:Autowired\n\
  var userHome: String? = null\n@Value(\"${user.home}\") set(value) {\nfield = value\n\
  }\noverride fun toString(): String {\nreturn \"applicationHome=${applicationHome},\
  \ userHome=${userHome}\"\n}\n}\n// application.properties 文件的内容\napplication.home=application_home\n\
  user.home=/home/CUSTOM-USER-HOME\n清单 4-47\nAppProperty Bean 类型\n```\n\n要将 `application.properties`\
  \ 文件的内容添加到 Spring 的应用上下文中，需要在配置类上使用 `@PropertySource` 注解。这会将此文件作为属性源添加到 `Environment`\
  \ 查找属性的位置列表中。\n\n清单 4-48 展示了配置类、测试类以及运行 `main(..)` 方法产生的输出。\n\n```\npackage com.apress.prospring6.four\n\
  import org.springframework.context.annotation.PropertySource\n// 其他导入语句已省略\n@Configuration\n\
  @PropertySource(\"classpath:application.properties\")\n@Configuration\n@PropertySource(\"\
  classpath:application.properties\")\ninternal open class PropDemoConfig {\n@Autowired\n\
  var environment: StandardEnvironment? = null\n@Bean\nopen fun appProperty(): AppProperty\
  \ {\nreturn AppProperty()\n}\n}\nobject PropertySourceDemo {\nprivate val logger\
  \ = LoggerFactory.getLogger(PropertySourceDemo::class.java)\n@JvmStatic\nfun main(args:\
  \ Array) {\nval ctx = AnnotationConfigApplicationContext(PropDemoConfig::class.java)\n\
  val appProperty = ctx.getBean(\"appProperty\", AppProperty::class.java)\nlogger.info(\"\
  结果: {}\", appProperty)\n}\n}\n// 输出\nINFO : PropertySourceDemo - 结果: com.apress.prospring6.four.AppProperty@624ea235[\n\
  applicationHome=application_home,\nuserHome=/Users/iulianacosmina\n]\n清单 4-48\n\
  AppProperty Bean 的配置类、测试类和控制台输出\n```\n\n那么，这个输出是怎么回事呢？嗯，`application.home` 占位符被正确解析了，而\
  \ `user.home` 属性仍然从 JVM 属性中获取，这符合预期，因为系统属性的优先级高于自定义属性源。那么，我们如何指示 Spring 我们希望将我们的属性源（`application.properties`）视为优先级最高的呢？\n\
  \n除非你使用 XML 配置（请查看本书 Java 版本的前一版）或如清单 4-45 所示的手动显式配置，否则你无法做到，因为顺序是如前所述定义的：系统属性、环境属性，然后是应用程序定义的属性。如果你真的想为你的应用程序使用\
  \ Java/Kotlin 配置并覆盖属性源的顺序，有一种方法可以做到——它并不简洁，但是可行的。\n\n首先，让我们从 `Environment` 的层次结构开始，如图\
  \ 4-4 所示。\n\n![](img/524962_1_En_4_Fig4_HTML.jpg)\n\n环境类的层次结构。标准环境实现了可配置环境接口。\n\n\
  图 4-4\nIntelliJ IDEA 环境层次结构\n\n图 4-4 描绘了 `Environment` 类的家族。在其中心，请注意 `StandardEnvironment`\
  \ 类，它是 Spring 上下文中创建的对象的类型。`StandardEnvironment` 实现了 `ConfigurableEnvironment` 接口，这意味着我们可以操作这个对象并修改读取属性位置的优先级。\n\
  \n清单 4-49 展示了 `PropDemoConfig` 类的修改版本，其中自动装配了 `StandardEnvironment`，并声明了一个初始化方法来修改属性资源的优先级。\n\
  \n\n\n```\npackage com.apress.prospring6.four\nimport org.springframework.context.annotation.PropertySource\n\
  import org.springframework.core.env.StandardEnvironment\nimport org.springframework.core.io.support.ResourcePropertySource\n\
  // 其他导入语句已省略\n@Configuration\n@PropertySource(\"classpath:application.properties\"\
  )\ninternal open class PropDemoConfig {\n@Autowired\nvar environment: StandardEnvironment?\
  \ = null\n@PostConstruct\nopen fun configPriority() {\nval rps = environment!!.propertySources.stream()\n\
  .filter { ps: PropertySource? -> ps is ResourcePropertySource }\n.findAny().orElse(null)\
  \ as ResourcePropertySource\nenvironment!!.propertySources.addFirst(rps)\n}\n@Bean\n\
  open fun appProperty(): AppProperty {\nreturn AppProperty()\n}\n}\n清单 4-49\nAppProperty\
  \ Bean 的配置类，带有自定义属性源位置\n```\n\n`ResourcePropertySource` 类从给定的 `Resource` 或资源（例如本例中使用的\
  \ `classpath:application.properties`）加载一个 `Properties` 对象。由于我们知道 `ConfigurableEnvironment`\
  \ 接口会在 `MutablePropertySources` 类中保存对其所有属性源的引用，我们只需访问该对象，识别出 `ResourcePropertySource`，然后通过调用\
  \ `addFirst(..)` 将其重新添加回该对象即可。这与我们在清单 4-45 中所做的操作相同，区别仅在于我们没有创建新的 `MapPropertySource`，而是使用了现有的\
  \ `ResourcePropertySource`。\n\n在实践中，你可能永远不需要这样做，但万一你需要像这样进行一些 Spring 代码的“高难度动作”，现在你有了一个可用的示例。如果你使用这个奇特的配置执行\
  \ `PropertySourceDemo` 类，你会注意到清单 4-50 中的输出证实了 `application.properties` 文件中的属性优先级高于其他所有属性。\n\
  \n```\nINFO : PropertySourceDemo - Outcome: com.apress.prospring6.four.AppProperty@5340477f[\n\
  applicationHome=application_home,\nuserHome=/home/CUSTOM-USER-HOME\n]\n清单 4-50\n\
  使用重新调整优先级的属性源位置配置运行 PropertySourceDemo 所产生的输出\n```\n\n## 测试 Spring 应用程序\n\n在开发企业级应用程序时，测试是确保完成的应用程序按预期运行并满足各种需求（架构、安全、用户需求等）的重要方式。每次进行更改时，都应确保该更改不会影响现有逻辑。维护一个持续构建和测试的环境对于确保高质量的应用程序至关重要。对所有代码进行高覆盖率的可重复测试，使您能够满怀信心地部署新应用程序以及对应用程序进行更改。在企业开发环境中，有许多种测试针对企业应用程序中的每一层，每种测试都有其自身的特点和要求。在本节中，我们将讨论涉及测试各种应用程序层的基本概念，尤其是在测试基于\
  \ Spring 的应用程序时。我们还将介绍 Spring 如何使开发人员更容易地实现各层的测试用例。\n\n本节将介绍各种类型的测试及其目的。它涵盖了测试 Spring\
  \ 应用程序的基本方法，并且在未来的章节中，每个代码示例都将配有一种测试方法。\n\n*企业测试框架* 指的是应用程序整个生命周期中的测试活动。在不同的阶段，会执行不同的测试活动，以验证应用程序的功能是否按照定义的业务和技术要求正常运行。\n\
  \n在每个阶段，都会执行不同的测试用例。有些是自动化的，而另一些则是手动执行的。在每种情况下，结果都由相应的人员（例如，业务分析师、应用程序用户等）进行验证。表\
  \ 4-4 描述了每种测试类型的特征和目标，以及用于实现测试用例的常用工具和库。\n\n表 4-4\n\n实践中使用的不同测试类别\n\n| 测试类别 | 描述\
  \ | 常用工具 |\n| --- | --- | --- |\n| 逻辑单元测试 | 逻辑单元测试针对单个对象，并单独对其进行测试，无需担心它在周围系统中所扮演的角色。\
  \ | 单元测试：JUnit, TestNG；模拟对象：Mockito, EasyMock |\n| 集成单元测试 | 集成单元测试侧重于在“接近真实”的环境中测试组件之间的交互。这些测试会测试与容器（嵌入式数据库、Web\
  \ 容器等）的交互。 | 嵌入式数据库：H2；数据库测试：DbUnit；内存 Web 容器：Jetty |\n| 前端单元测试 | 前端单元测试侧重于测试用户界面。其目标是确保每个用户界面都能对用户的操作做出反应，并按预期向用户产生输出。\
  \ | Selenium, Cypress |\n| 持续构建与代码质量测试 | 应用程序代码库应定期构建，以确保代码质量符合标准（例如，注释全部到位，没有空的异常捕获块等）。此外，测试覆盖率应尽可能高，以确保所有已开发的代码行都经过测试。\
  \ | 代码质量：PMD, Check-style, FindBugs, Sonar；测试覆盖率：Cobertura, EclEmma；构建工具：Gradle,\
  \ Maven；持续构建：Hudson, Jenkins |\n| 系统集成测试 | 系统集成测试验证新系统中所有程序之间以及新系统与所有外部接口之间通信的准确性。集成测试还必须证明新系统按照功能规范执行，并在操作环境中有效运行，而不会对其他系统产生不利影响。\
  \ | IBM Rational Functional Tester, HP Unified Functional Testing |\n| 系统质量测试 |\
  \ 系统质量测试确保开发的应用程序满足非功能性需求。大多数情况下，这是测试应用程序的性能，以确保满足系统的并发用户和工作负载的目标要求。其他非功能性需求包括安全性、高可用性特性等。\
  \ | Apache JMeter, HP LoadRunner, Locust, K6 |\n| 用户验收测试 | 用户验收测试模拟新系统的实际工作条件，包括用户手册和流程。用户在此测试阶段的广泛参与为用户提供了操作新系统的宝贵培训。它也有利于程序员或设计者了解用户对新程序的体验。这种共同参与鼓励用户和操作人员批准系统转换。\
  \ | IBM Rational TestManager, HP Quality Center |\n\n现在，我们已经介绍了通用的测试学术细节，让我们进入实践环节。我们不会介绍\
  \ Spring 框架在测试领域提供的所有类的完整细节和列表，而是介绍最常用的模式以及 Spring TestContext 框架中支持的接口和类，同时展示如何实现本章中的示例测试用例。\n\
  \n### 使用 Spring 测试注解\n\n在进入逻辑测试和集成测试之前，值得注意的是，除了标准注解（如 `@Autowired` 和 `@Resource`）之外，Spring\
  \ 还提供了特定于测试的注解。这些注解可以在你的逻辑单元测试中使用，提供各种功能，例如简化的上下文文件加载、配置文件、测试执行计时等等。表 4-5 概述了这些注解及其用途。\n\
  \n表 4-5\n\nSpring 测试注解\n\n\n\n| 注解 | 描述 |\n| --- | --- |\n| `@BootstrapWith` | 类级别注解，用于确定如何引导\
  \ Spring 测试上下文框架。 |\n| `@ContextConfiguration` | 类级别注解，用于确定如何加载和配置集成测试的 `ApplicationContext`。使用\
  \ Junit 4 时，注解测试类需要使用 `@RunWith(SpringRunner.class)` 注解。使用 Junit Jupiter 时，测试类需要使用\
  \ `@ExtendWith(SpringExtension.class)` 注解。 |\n| `@WebAppConfiguration` | 类级别注解，用于指示加载的\
  \ `ApplicationContext` 应为 `WebApplicationContext`。 |\n| `@ContextHierarchy` | 类级别注解，用于定义集成测试的\
  \ `ApplicationContexts` 层次结构。 |\n| `@DirtiesContext` | 类级别和方法级别注解，用于指示上下文在测试执行过程中以某种方式被修改或损坏，应在后续测试中关闭并重建。\
  \ |\n| `@ActiveProfiles` | 类级别注解，用于指示应激活哪个 Bean 配置文件。 |\n| `@TestPropertySource`\
  \ | 类级别注解，用于配置属性文件的位置以及内联属性，这些属性将被添加到集成测试的 `ApplicationContext` 的 `Environment`\
  \ 的 `PropertySources` 集合中。 |\n| `@DynamicPropertySource` | 方法级别注解，用于需要向 `Environment`\
  \ 的 `PropertySources` 集合添加具有动态值的属性的集成测试。 |\n| `@TestExecutionListeners` | 类级别注解，用于配置应注册到\
  \ `TestContextManager` 的 `TestExecutionListeners`。 |\n| `@RecordApplicationEvents`\
  \ | 类级别注解，用于让 Spring 测试上下文框架记录单个测试执行期间在 `ApplicationContext` 中发布的所有应用程序事件。 |\n|\
  \ `@Commit` | 测试级别注解，用于指示在测试方法完成后应提交测试管理的事务。 |\n| `@Rollback` | 测试级别注解，用于指示在测试方法完成后是否应回滚测试管理的事务。如预期，`@Rollback(false)`\
  \ 等同于 `@Commit`。 |\n| `@BeforeTransaction` | 方法级别注解，用于指示对于标记了 `@Transactional` 注解的测试方法，应在事务开始之前调用被注解的方法。\
  \ |\n| `@AfterTransaction` | 方法级别注解，用于指示对于标记了 `@Transactional` 注解的测试方法，应在事务结束后调用被注解的方法。\
  \ |\n| `@Sql` | 类级别和方法级别注解，用于配置在集成测试期间针对给定数据库执行的 SQL 脚本和语句。 |\n| `@SqlConfig` |\
  \ 类级别和方法级别注解，用于指示如何解析和执行通过 `@Sql` 注解配置的 SQL 脚本。 |\n| `@SqlMergeMode` | 类级别和方法级别注解，用于指示方法级别的\
  \ `@Sql` 声明是否与类级别的 `@Sql` 声明合并。 |\n| `@SqlGroup` | 容器级别注解，用于聚合多个 `@Sql` 注解。 |\n\
  | `@IfProfileValue` | 类级别和方法级别注解，用于指示测试方法应在特定环境条件下启用。 |\n| `@ProfileValueSourceConfiguration`\
  \ | 类级别注解，用于指定 `@IfProfileValue` 使用的 `ProfileValueSource`。如果测试中未声明此注解，则默认使用 `SystemProfileValueSource`。\
  \ |\n| `@Timed` | 方法级别注解，用于指示测试必须在指定的时间段内完成。 |\n| `@Repeat` | 方法级别注解，用于指示被注解的测试方法应重复执行指定的次数。\
  \ |\n\n### 实现逻辑单元测试\n\n如前所述，逻辑单元测试是最细粒度的测试级别。其目标是验证单个类的行为，该类的所有依赖项都通过预期行为进行“模拟”。以\
  \ `MessageRender` 和 `MessageProvider` Bean 为例，通过注入模拟的 `MessageProvider` Bean 来隔离测试\
  \ `MessageRender` Bean，是一个合适的单元测试示例。为了帮助模拟 `MessageProvider` Bean 的行为，我们将展示如何使用\
  \ Mockito^(³³)，这是一个流行的模拟框架。\n\nSpring 框架在 `spring-test` 模块中为集成测试提供了一流支持。为了为本节将要创建的集成测试提供测试上下文，您将使用\
  \ `spring-test.jar` 库。该库包含用于与 Spring 容器进行集成测试的有价值类。对于本节中的测试，`spring-test`、`mockito-all`\
  \ 和 `junit-jupiter-engine` 被添加到项目的配置中。\n\n让我们从小处着手。以 `MessageRender` 和 `MessageProvider`\
  \ Bean 为例，让我们声明一个测试类，检查 `StandardOutMessageRenderer` Bean 类型是否按预期工作，即当调用 `render()`\
  \ 时，它会调用 `messageProvider.getMessage()`。要执行此测试，我们不需要 Spring `ApplicationContext`\
  \ 或 `MessageProvider`；我们只需要一个模拟对象，一个简单的替代品。清单 4-51 描述了需要运行以执行测试的测试类和测试方法。\n\n```\n\
  package com.apress.prospring6.four\nimport com.apress.prospring6.two.decoupled.MessageProvider\n\
  import com.apress.prospring6.two.decoupled.MessageRenderer\nimport org.junit.jupiter.api.Test\n\
  import org.mockito.Mockito.mock\nimport org.mockito.Mockito.times\nimport org.mockito.Mockito.verify\n\
  import org.mockito.Mockito.`when` // when 是 Kotlin 中的关键字！\nclass MessageRenderTest\
  \ {\n@Test\nfun testStandardOutMessageRenderer() {\nval mockProvider: MessageProvider\
  \ = mock(MessageProvider::class.java)\n`when`(mockProvider.message).thenReturn(\"\
  test message\")\nval messageRenderer: MessageRenderer = StandardOutMessageRenderer()\n\
  messageRenderer.messageProvider = mockProvider\nmessageRenderer.render()\nverify(mockProvider,\
  \ times(1)).message\n}\n}\n清单 4-51\n使用 Mockito 对 StandardOutMessageRenderer 进行单元测试\n\
  ```\n\n测试方法使用 Junit Jupiter 的 `@Test` 注解进行注解，将其标记为测试方法。\n\n测试方法创建上下文并检查 Bean 的存在以及调用\
  \ `render()` 方法的结果。测试也可以在调试模式下运行，并且可以使用断点暂停执行以检查对象以进行调试。\n\nIntelliJ IDEA 可以运行测试类、包或模块内的所有测试方法，或单个方法。只需右键单击组件，菜单中应出现“运行”选项。当您右键单击测试类的内容时，如果在任何测试方法外部单击，选项将是运行所有方法；当您右键单击方法名称或方法体内部时，菜单中的“运行”选项特定于运行该方法。图\
  \ 4-5 显示了右键单击测试方法名称时出现的 IntelliJ IDEA 菜单（显示的是 Java 代码，但对于 Kotlin 同样适用）。\n\n![](img/524962_1_En_4_Fig5_HTML.jpg)\n\
  \nIntelliJ IDEA 菜单的屏幕截图。左侧面板上的两个选定按钮已高亮显示。右侧选中了测试方法。\n\n图 4-5\nIntelliJ IDEA 运行测试的选项\n\
  \n\n\n图 4-5 还显示了文件左侧的两个按钮。点击类级别的按钮会展开一个菜单，其中包含运行测试类的分组选项。点击方法级别的按钮则会展开一个菜单，其中包含运行测试方法的分组选项。请随意尝试这些按钮和选项以熟悉它们，然后继续阅读本书。\n\
  \n`testStandardOutMessageRenderer()` 方法独立验证了 `StandardOutMessageRenderer` 实现的行为。其行为不受应用程序中任何其他因素的影响；甚至它对\
  \ `MessageProvider` 实例的依赖也被替换为由 Mockito 构建的模拟实现，并通过以下代码行配置了理想行为：`when(mockProvider.getMessage()).thenReturn(\"\
  test message\")`。\n\nMockito 的实用方法非常实用，因为它们也使测试代码非常易读。`when(..)` 这行代码配置了当在此模拟对象上调用\
  \ `getMessage()` 方法时要返回的 `String` 值。这是如何工作的呢？实际上，Mockito 实现了 `MessageProvider` 接口来创建一个模拟对象，然后创建一个代理来拦截对该对象的调用。当我们调用\
  \ `when(..)` 方法时，实际上是在重新调用该上下文中最后注册的方法调用，而 `thenReturn()` 则保存了该调用的返回值。总之，Mockito\
  \ 对于隔离组件进行单元测试，或者减少集成测试中的层级数量以仅关注感兴趣的片段非常有用。\n\n![](img/524962_1_En_4_Figl_HTML.jpg)\
  \ 一个信息符号。 在我过去三年工作的公司里，我们很少编写单元测试，因为集成测试已经覆盖了单元测试所涵盖的行为。最近，我发现自己越来越认同这一点，因为搭建测试上下文需要付出努力，而为多个测试使用相同的上下文则让这种努力变得值得。\n\
  \n在本书中，我们将主要使用集成测试，但也会穿插介绍一些单元测试，足以让你熟悉它们并在将来能够识别它们。模拟依赖关系的方法不止一种。JMock^(³⁴) 是另一个你可以使用的库，还有\
  \ EasyMock^(³⁵)，至于编写检查，可以看看 Hamcrest^(³⁶)。\n\n话虽如此，让我们切换到集成测试。\n\n### 实现集成测试\n\n\
  在本节中，我们将为前面的示例实现集成测试。首先创建一个配置，用于创建这些 Bean 并将它们连接在一起。此配置用于创建测试应用程序上下文，测试将检查这两个 Bean\
  \ 是否被正确创建。为了展示如何为集成测试聚合配置，`MessageProvider` 和 `MessageRenderer` Bean 类型已在它们自己的包中声明，并带有它们自己的配置类，如图\
  \ 4-6 所示。\n\n![](img/524962_1_En_4_Fig6_HTML.jpg)\n\n第 04 章文件夹的截图。从 impl 文件夹中选择了\
  \ renderer 和 provider 选项。\n\n图 4-6\n\n使用各自的配置组织 Bean\n\n在引入测试来创建 `ApplicationContext`\
  \ 之前，我们会创建一个带有 `main(..)` 方法的类，但现在我们知道了如何编写测试，让我们尝试一下。清单 4-52 展示了一个测试方法，用于测试包含两个\
  \ Bean 的 `ApplicationContext` 是否正确创建。\n\n```\npackage com.apress.prospring6.four\n\
  import com.apress.prospring6.four.impl.provider.ProviderConfig\n// 其他导入已省略\nclass\
  \ MessageRenderOneIT {\n@Test\nfun testConfig() {\nval ctx = AnnotationConfigApplicationContext(\n\
  RendererConfig::class.java,\nProviderConfig::class.java\n)\nval messageProvider\
  \ = ctx.getBean(\nMessageProvider::class.java\n)\nval messageRenderer = ctx.getBean(\n\
  MessageRenderer::class.java\n)\nAssertions.assertAll(\"messageTest\",\nExecutable\
  \ { Assertions.assertNotNull(messageRenderer) },\nExecutable { Assertions.assertNotNull(messageProvider)\
  \ },\nExecutable {\nAssertions.assertEquals(\nmessageProvider,\nmessageRenderer.messageProvider\n\
  )\n}\n)\nmessageRenderer.render()\n}\n}\n清单 4-52\nStandardOutMessageRenderer 的集成测试\n\
  ```\n\n与最初在 main 方法中创建 `ApplicationContext` 的方法相比，有以下三点观察：\n\n*   在测试方法中，可以使用测试实用方法，本例中使用了\
  \ `assertAll(..)` 方法和其他 JUnit Jupiter 实用方法来测试我们对作为上下文一部分创建的 Bean 的假设。\n\n*   `render()`\
  \ 方法无法测试，因为它返回 `void`；我们只能检查控制台并查找打印出的 *Text Sample* 文本，就像我们使用 `main(..)` 方法所做的那样。\n\
  \n*   测试在项目构建时运行，这意味着配置问题将被快速识别。\n\n前面的测试方法是一种将逻辑从主模块转移到测试模块的非常简单的方法。此外，这不是高效的做法，因为如果我们在同一个类中编写更多的测试方法，则必须为每个方法构建上下文。有多种方法可以重用测试上下文。清单\
  \ 4-53 展示了 JUnit 的方式。\n\n```\npackage com.apress.prospring6.four\nimport com.apress.prospring6.four.impl.provider.ProviderConfig\n\
  // 其他导入语句已省略\nclass MessageRenderTwoIT {\n@Test\nfun testProvider() {\nval messageProvider\
  \ = ctx!!.getBean(\nMessageProvider::class.java\n)\nAssertions.assertNotNull(messageProvider)\n\
  }\n@Test\nfun testRenderer() {\nval messageRenderer = ctx!!.getBean(\nMessageRenderer::class.java\n\
  )\nAssertions.assertAll(\"messageTest\",\nExecutable { Assertions.assertNotNull(messageRenderer)\
  \ },\nExecutable { Assertions.assertNotNull(messageRenderer.messageProvider) }\n\
  )\nmessageRenderer.render()\n}\ncompanion object {\nvar ctx: ApplicationContext?\
  \ = null\n@BeforeAll @JvmStatic\nfun setUp() {\nctx = AnnotationConfigApplicationContext(RendererConfig::class.java,\n\
  ProviderConfig::class.java)\n}\n}\n}\n清单 4-53\n使用共享测试上下文的 StandardOutMessageRenderer\
  \ 集成测试（JUnit 方式）\n```\n\n\n\n在 JUnit 方式下，测试方法之间共享测试上下文的方法是声明一个 `ApplicationContext`\
  \ 静态引用，并通过 `@BeforeAll` 注解告知 JUnit 仅调用一次 `setUp(..)` 方法来初始化它。这对于任何需要在测试方法之间共享的其他组件也同样适用。\n\
  \n![](img/524962_1_En_4_Figm_HTML.jpg) 一个信息符号。 清单 4-53 中的示例展示了使用 Junit Jupiter（也称为\
  \ Junit 5）注解编写的测试类。也可以使用 JUnit 4 编写等效的测试。如果你对使用 JUnit 4 感兴趣，请查阅本书 Java 版本的上一版。\n\
  \n然而，最佳方式是 Spring 方式。表 4-5 中介绍的 `@ContextConfiguration` 注解用于配置构建 `ApplicationContext`\
  \ 的配置类，但为了将 Spring 测试上下文与 Jupiter 5 编程模型集成，还需要 `@ExtendWith` 注解以及 `SpringExtension.class`\
  \ 参数，因为这是我们为 Spring 配置扩展的方式。清单 4-54 展示了该类的代码。\n\n```\npackage com.apress.prospring6.four\n\
  import com.apress.prospring6.four.impl.provider.ProviderConfig\nimport com.apress.prospring6.four.impl.renderer.RendererConfig\n\
  // 其他导入已省略\n//@ExtendWith(SpringExtension.class)\n//@ContextConfiguration(classes\
  \ = {RendererConfig.class, ProviderConfig.class})\n@SpringJUnitConfig(classes =\
  \ [RendererConfig::class, ProviderConfig::class])\nclass MessageRenderThreeIT {\n\
  @Autowired\nvar messageRenderer: MessageRenderer? = null\n@Autowired\nvar messageProvider:\
  \ MessageProvider? = null\n@Test\nfun testProvider() {\nAssertions.assertNotNull(messageProvider)\n\
  }\n@Test\nfun testRenderer() {\nAssertions.assertAll(\"messageTest\",\nExecutable\
  \ { Assertions.assertNotNull(messageRenderer) },\nExecutable { Assertions.assertNotNull(messageRenderer!!.messageProvider)\
  \ }\n)\nmessageRenderer!!.render()\n}\n}\n清单 4-54\n使用共享测试上下文的 StandardOutMessageRenderer\
  \ 集成测试（Spring 方式）\n```\n\n由于 Spring `ApplicationContext` 已与 Jupiter 编程模型集成，我们无需从上下文中提取\
  \ bean——只需在测试类中自动装配它们即可。\n\n如果你想保持简单，Junit Jupiter 在 `org.springframework.test.context.junit.jupiter`\
  \ 包中还提供了 `@SpringJUnitConfig` 注解，它可以替代 `@ExtendWith` + `@ContextConfiguration` 的组合。因此，\n\
  \n```\n@ExtendWith(SpringExtension.class)\n@ContextConfiguration(classes = {RendererConfig.class,\
  \ ProviderConfig.class})\n```\n\n可以替换为\n\n```\n@SpringJUnitConfig(classes = {RendererConfig.class,\
  \ ProviderConfig.class})\n```\n\n## 为集成测试配置 Profile\n\nSpring 3.1 引入的 Bean 定义 Profile\
  \ 功能对于使用适当的测试组件配置来实现测试用例非常有用。Profile 在其他方面也很有用。例如，如果你正在开发一个与 Amazon DynamoDB 实例集成的应用程序，你可能不想在开发期间或持续集成构建期间使用该实例，以避免产生费用。因此，你可以配置一个开发\
  \ Profile，其中包含一个连接到本地 DynamoDB 容器（而非远程 Amazon DynamoDB 实例）的连接 Bean。\n\n你是否还在疑惑，既然我们可以将特定用途的\
  \ Bean 隔离到各自的配置文件中并仅导入它们，为什么还需要 Profile？当你由于某些原因无法这样做时，Profile 就很有用了，因为你可以使用 `@Profile(..)`\
  \ 注解标记某些 Bean 定义，而保持其余 Bean 定义不变。\n\n例如，看一下清单 4-55 中的配置类；它声明了一个未关联任何 Profile 的 `MessageRenderer`\
  \ Bean，以及一个关联到名为 `dev` 的 Profile 的 `MessageProvider` Bean。\n\n```\npackage com.apress.prospring6.four.impl\n\
  import org.springframework.context.annotation.Profile\n// 其他导入语句已省略\n@Configuration\n\
  open class AllConfig {\n@Profile(\"dev\")\n@Bean\nopen fun messageProvider():MessageProvider\
  \ =\nConfigurableMessageProvider(\"Text Sample\")\n@Bean\nopen fun messageRenderer():MessageRenderer\
  \ =\nStandardOutMessageRenderer().apply {\nmessageProvider = messageProvider()\n\
  }\n}\n清单 4-55\n包含关联到 Profile 的 Bean 的配置类\n```\n\n未关联 Profile 意味着无论激活哪个 Profile，`MessageRenderer`\
  \ 都将成为上下文的一部分，这正是我们感兴趣的，因为这是我们想要测试的 Bean。\n\n为了测试这个 Bean，我们需要在测试上下文中提供一个不同的 `MessageProvider`\
  \ 依赖。我们通过声明一个名为 `TestMessageProvider` 的新 Bean 类型来实现，该类型实现了 `MessageProvider` 但返回不同的消息。其实现很简单，因此此处不再展示。清单\
  \ 4-56 展示了测试配置类（声明了一个关联到 `test` Profile 的 Bean 定义）、使用 `@ActiveProfiles(\"test\"\
  )` 注解激活测试 Profile 的测试类，以及检查 `MessageRenderer` 是否按预期创建且注入的依赖是否为 `TestMessageProvider`\
  \ 类型的测试方法。\n\n```\npackage com.apress.prospring6.four\nimport org.springframework.context.annotation.Profile\n\
  import org.springframework.test.context.ActiveProfiles\nimport org.springframework.test.context.junit.jupiter.SpringJUnitConfig\n\
  // 其他导入语句已省略\n@Configuration\ninternal open class TestConfig {\n@Profile(\"test\"\
  )\n@Bean\nopen fun messageProvider(): MessageProvider {\nreturn TestMessageProvider(\"\
  Test Message\")\n}\n}\n@ActiveProfiles(\"test\")\n@SpringJUnitConfig(classes = [AllConfig::class,\
  \ TestConfig::class])\nclass MessageRenderFourIT {\n@Autowired\nvar messageRenderer:\
  \ MessageRenderer? = null\n@Autowired\nvar messageProvider: MessageProvider? = null\n\
  @Test\nfun testConfig() {\nAssertions.assertAll(\"messageTest\",\nExecutable { Assertions.assertNotNull(messageRenderer)\
  \ },\nExecutable { Assertions.assertNotNull(messageProvider) },\nExecutable { Assertions.assertTrue(messageProvider\
  \ is TestMessageProvider) },\nExecutable {\nAssertions.assertEquals(\nmessageProvider,\n\
  messageRenderer!!.messageProvider\n)\n}\n)\nmessageRenderer!!.render()\n}\n}\n清单\
  \ 4-56\n测试配置类和带 Profile 的测试类\n```\n\n目前关于集成测试的内容就这些。随着本书的深入和更复杂应用程序的构建，测试的复杂性也会增加，因此表\
  \ 4-5 中几乎所有的注解都将在需要时进行介绍和解释。\n\n### 实现前端单元测试\n\n另一个特别值得关注的测试领域是，在将 Web 应用程序部署到像\
  \ Apache Tomcat 这样的 Web 容器后，对前端行为进行整体测试。主要原因是，即使我们测试了应用程序中的每一层，我们仍然需要确保视图能够正确响应用户的不同操作。自动化前端测试对于节省开发人员和用户在重复执行前端操作以进行测试用例时的时间非常重要。\n\
  \n然而，为前端开发测试用例是一项具有挑战性的任务，尤其是对于那些包含大量交互式、富媒体和基于 Ajax 组件的 Web 应用程序。\n\n\n\n### 介绍\
  \ Selenium\n\nSelenium 是一个功能强大且全面的工具和框架，旨在自动化基于 Web 的前端测试。其主要特点是，通过使用 Selenium，我们可以“驱动”浏览器，模拟用户与应用程序的交互，并对视图状态进行验证。\n\
  \nSelenium 支持常见的浏览器，包括 Firefox、Edge 和 Chrome。在语言方面，Selenium 支持 Java、C#、PHP、Perl、Ruby\
  \ 和 Python。Selenium 在设计时也考虑到了 Ajax 和富互联网应用程序（RIA），使得现代 Web 应用程序的自动化测试成为可能。\n\n如果你的应用程序有大量前端用户界面，并且需要运行大量的前端测试，`selenium-server`\
  \ 模块提供了内置的网格功能，支持在一组计算机之间执行前端测试。\n\nSelenium IDE 是一个 Firefox 插件，可以帮助“录制”用户与 Web\
  \ 应用程序的交互。它还支持回放，并将脚本导出为多种格式，这有助于简化测试用例的开发。\n\n从 2.0 版本开始，Selenium 集成了 WebDriver\
  \ API，该 API 解决了许多限制，并提供了一个替代的、更简单的编程接口。其结果是一个全面的面向对象 API，为更多的浏览器提供了额外支持，并改进了对现代高级\
  \ Web 应用程序测试问题的支持。\n\n前端 Web 测试是一个复杂的主题，超出了本书的范围。通过这个简要概述，你可以看到 Selenium 如何帮助自动化用户与\
  \ Web 应用程序前端的交互，并实现跨浏览器兼容性。更多详情，请参考 Selenium 的在线文档^(³⁷)。\n\n现在你已经对如何测试 Spring 应用程序有了基本了解，让我们换个话题，聊聊最受喜爱（也有人最讨厌）的\
  \ Spring 项目之一：Groovy。\n\n## 使用 Groovy 进行配置\n\nSpring Framework 4.0 引入了使用 Groovy\
  \ 语言配置 Bean 定义和 `ApplicationContext` 的能力。这为开发者提供了另一种配置选择，可以替代或补充基于 XML 和/或注解的 Bean\
  \ 配置。Spring 的 `ApplicationContext` 可以直接在 Groovy 脚本中创建，也可以通过 `GenericGroovyApplicationContext`\
  \ 类从 Java/Kotlin 加载。\n\n首先，让我们通过展示如何从外部 Groovy 脚本创建 Bean 定义并从 Kotlin 加载它们来深入了解细节。在前面的章节中，我们介绍了各种\
  \ Bean 类，为了促进代码复用，我们将在本例中使用清单 4-57 中所示的 `Singer` 类。\n\n```\npackage com.apress.prospring6.four.groovy\n\
  class Singer {\nvar name: String? = null\nvar age = 0\noverride fun toString():\
  \ String {\nreturn \"name=${name}, age=${name}\"\n}\n}\n清单 4-57\n用于 Groovy 示例的 Singer\
  \ 类\n```\n\n如你所见，这只是一个 Kotlin 类，包含几个描述歌手的属性。我们在这里使用这个简单的 Kotlin 类是为了说明，仅仅因为你用 Groovy\
  \ 配置 Bean，并不意味着你的整个代码库都需要用 Groovy 重写。不仅如此，Kotlin 类还可以从依赖项中导入并在 Groovy 脚本中使用。现在，让我们创建用于定义\
  \ Bean 的 Groovy 脚本（`beans.groovy`），如清单 4-58 所示。\n\n```\nimport com.apress.prospring6.four.groovy.Singer\n\
  beans {\nsinger(Singer, name: 'John Mayer', age: 42)\n}\n清单 4-58\nSinger Bean 的\
  \ Groovy 定义\n```\n\n这个 Groovy 脚本以一个名为 `beans` 的顶级闭包开始，它为 Spring 提供了 Bean 定义。首先，我们指定\
  \ Bean 名称（`singer`），然后作为参数提供类类型（`Singer`），接着是我们想要设置的属性名称和值。接下来，让我们在 Kotlin 中创建一个简单的测试驱动程序，从\
  \ Groovy 脚本加载 Bean 定义，如清单 4-59 所示。\n\n```\npackage com.apress.prospring6.four.groovy\n\
  import org.slf4j.LoggerFactory\nimport org.springframework.context.ApplicationContext\n\
  import org.springframework.context.support.GenericGroovyApplicationContext\nobject\
  \ GroovyBeansFromJavaDemo {\nprivate val logger = LoggerFactory.getLogger(GroovyBeansFromJavaDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval context: ApplicationContext =\nGenericGroovyApplicationContext(\"\
  classpath:spring/beans.groovy\")\nval singer = context.getBean(\n\"singer\",\nSinger::class.java\n\
  )\nlogger.info(\"Singer bean: {}\", singer)\n}\n}\n清单 4-59\n测试 Groovy Bean 的测试类\n\
  ```\n\n如你所见，`ApplicationContext` 的创建是以典型方式进行的，但它是通过使用 `GenericGroovyApplicationContext`\
  \ 类并提供构建 Bean 定义的 Groovy 脚本来完成的。运行 `GroovyBeansFromJavaDemo` 应该会打印：\n\n```\nINFO\
  \ : GroovyBeansFromJavaDemo - Singer bean: com.apress.prospring6.four.groovy.Singer@272a179c[name=John\
  \ Mayer,age=42]\n```\n\n![](img/524962_1_En_4_Fign_HTML.jpg) 一个信息符号。 使用 Groovy Bean\
  \ 定义时，你必须牢记的唯一一件事是，`groovy-all` 库必须位于项目类路径中。因此，无论你使用什么构建工具，无论是 Maven 还是 Gradle，请确保在你的配置文件中提及它。\n\
  \n现在你已经了解了如何通过外部 Groovy 脚本从 Kotlin 加载 Bean 定义，那么如何仅从 Groovy 脚本创建 `ApplicationContext`\
  \ 和 Bean 定义呢？实际上这并不复杂，而且 Groovy 语法比 Java 或 Kotlin 更简单，如清单 4-60 所示。\n\n```\npackage\
  \ com.apress.prospring6.four.groovy\nimport org.springframework.beans.factory.groovy.GroovyBeanDefinitionReader\n\
  import org.springframework.context.support.GenericApplicationContext\ndef ctx =\
  \ new GenericApplicationContext()\ndef reader = new GroovyBeanDefinitionReader(ctx)\n\
  reader.beans {\nsinger(Singer, name: 'John Mayer', age: 42)\n}\nctx.refresh()\n\
  println ctx.getBean(\"singer\")\n清单 4-60\n声明 Bean 并使用它们的 Groovy 脚本\n```\n\n当我们运行这个示例时，会得到与之前相同的输出，只是没有日志语句，因为这里没有使用日志记录器，而是简单的控制台输出。这次我们创建了一个典型的\
  \ `GenericApplicationContext` 实例，但使用了 `GroovyBeanDefinitionReader`，它将用于传递 Bean 定义。然后，与之前的清单\
  \ 4-59 一样，我们从简单的 POJO 创建一个 Bean，刷新 `ApplicationContext`，并打印 `Singer` Bean 的字符串表示。没有比这更简单的了！\n\
  \n你可能已经意识到，我们只是触及了 Spring 中 Groovy 支持所能实现功能的皮毛。由于你拥有 Groovy 语言的完整能力，在创建 Bean 定义时可以执行各种有趣的操作。由于你可以完全访问\
  \ `ApplicationContext`，因此不仅可以配置 Bean，还可以处理配置文件支持、属性文件等。只需记住，能力越大，责任越大。\n\n\n\n##\
  \ 使用 Spring Boot\n\n到目前为止，跟随本书你已经学会了不止一种声明构成 Spring 应用程序的 Bean 的方法。但如果我们告诉你，还有比这些更酷的东西呢？\n\
  \nSpring Boot 项目旨在简化使用 Spring 构建应用程序的入门体验。Spring Boot 消除了手动收集依赖项的猜测工作，并提供了大多数应用程序所需的一些最常见功能，例如指标和健康检查。\n\
  \nSpring Boot 采用“约定优于配置”的方法，通过为各种类型的应用程序提供已经包含适当依赖项和版本的起步项目，来实现简化开发者的目标，这意味着花在入门上的时间更少。对于那些希望完全摆脱\
  \ XML 的人来说，Spring Boot 不需要在 XML 中编写任何配置。\n\n在本例中，我们将创建一个带有新意的传统 Hello World Web\
  \ 应用程序。与典型的 Java 或 Kotlin Web 应用程序设置相比，你可能会惊讶于所需的代码量之少。通常，我们通过定义需要添加到项目中的依赖项来开始示例。Spring\
  \ Boot 简化模型的一部分就是为你准备好所有依赖项，例如，当使用 Maven 时，作为开发者，你利用一个父 POM 来获得此功能。当使用 Gradle 时，事情变得更加简单。除了一个\
  \ Gradle 插件和一个起步依赖项之外，不需要父 POM。如果你的项目足够简单，你可以使用 Spring Initializr（可通过 [`https://start.spring.io`](https://start.spring.io)\
  \ 访问）生成完整的配置，从那里下载基本结构和配置表单，然后根据你的需求开始自定义它。**第** **2** **章**提到了 Spring Boot 有多么强大。然而，如果没有对\
  \ Spring 的正确理解，它可能会变成一个难以管理的庞然大物。幸运的是，你正在阅读这本书，所以你会没事的。\n\n闲话少说，让我们开始使用 Spring Boot\
  \ 吧！\n\n在编写本章时，Spring Boot 3.0.0 版本尚未发布。这就是项目当前配置为使用 3.0.0-M2 版本的原因。到本书发布时，该项目将更新为官方发布版本。\n\
  \nSpring Boot 的每个版本都提供了一个它支持的精选依赖项列表。必要的库的版本被选中，以便 API 完美匹配，这由 Spring Boot 处理。因此，不需要手动配置依赖项版本。升级\
  \ Spring Boot 将确保这些依赖项也得到升级。使用之前的配置，一组依赖项将被添加到项目中，每个依赖项都具有适当的版本，以便它们的 API 兼容。在像\
  \ IntelliJ IDEA 这样的智能编辑器中，有一个 Gradle（或 Maven）项目视图，你可以在其中展开每个模块并检查可用的任务和依赖项，如图 4-7\
  \ 所示。\n\n![](img/524962_1_En_4_Fig7_HTML.jpg)\n\nPro Spring 6 第 4 章启动部分的截图。它列出了可用的任务和依赖项。\n\
  \n图 4-7\n\nSpring Boot 起步库和依赖项\n\n![](img/524962_1_En_4_Figo_HTML.jpg) 灯泡插图。 图 4-7\
  \ 中的 Spring Boot 版本可能与本书附带的项目中的版本不同，具体取决于本书发布的时间。这背后的原因是代码是在 Spring Boot 3 仍在开发中时编写的。Spring\
  \ 6 也是如此。我们的意图是在出版前编辑本书并用官方版本更新此图片，但如果我们错过了这张图片，只要代码能运行，就知道这是没问题的。\n\n`chapter04-boot`\
  \ 项目非常简单，声明了一个简单的 Spring Boot 起步依赖项，即 `spring-boot-starter` 库。这个依赖项带来了一组 Spring\
  \ 依赖项及其依赖项，为构建 Spring 应用程序奠定了坚实的基础。Spring Boot 项目的入口点是应用程序类，即带有 `@SpringBootApplication`\
  \ 注解的类，在我们的例子中是 `Chapter4application` 类。使用 Spring Initializr 时，此类会为 `main(..)` 方法生成一个空的方法体，但我们喜欢用几行代码来填充该方法体，这些代码列出应用程序上下文中的所有\
  \ Bean，如清单 4-61 所示。\n\n```\npackage com.apress.prospring6.four.boot\nimport org.springframework.boot.SpringApplication\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication\n// 其他导入已省略\n\
  @SpringBootApplication(scanBasePackages = [\"com.apress.prospring6.four.boot.runners\"\
  ])\nopen class Chapter4Application {\ncompanion object {\nprivate val LOGGER =\n\
  LoggerFactory.getLogger(Chapter4Application::class.java)\n@JvmStatic\nfun main(args:\
  \ Array) {\nval ctx = SpringApplication.run(arrayOf(Chapter4Application::class.java),\
  \ args)\nassert(ctx != null)\n// 列出所有 Bean 定义名称\n// ctx.beanDefinitionNames.forEach(LOGGER::info)\n\
  ctx.beanDefinitionNames.forEach(::println)\n}\n}\n}\n清单 4-61\n修改为显示应用程序上下文中所有 Bean\
  \ 的 Spring Boot 应用程序类\n```\n\n仅此而已。真的。我们添加的额外几行代码用于检查上下文是否已创建并列出上下文中的所有 Bean 名称。引导\
  \ Spring 应用程序所需的唯一语句是 `SpringApplication.run(Chapter4Application.class, args)`。\n\
  \n这里的新颖之处在于 `@SpringBootApplication` 注解。这个注解是一个顶级注解，旨在仅在类级别使用。它是一个便利注解，相当于声明以下三个注解：\n\
  \n*   `@SpringBootConfiguration`：此注解指示此类为 Spring Boot 应用程序提供配置。它被 `@Configuration`\
  \ 元注解，这意味着此类可以使用 `@Bean` 声明 Bean。\n\n*   `@EnableAutoConfiguration`：这是一个来自 `org.springframework.boot.autoconfigure`\
  \ 包的特定 Spring Boot 注解，它允许根据项目依赖项创建一个包含所有所需基础设施 Bean 的默认 Spring `ApplicationContext`。`@EnableAutoConfiguration`\
  \ 与 Spring 提供的起步依赖项配合良好，但并不直接绑定到它们，因此也可以使用起步依赖项之外的其他依赖项。例如，如果类路径上存在特定的嵌入式服务器，它将被使用，除非项目中存在另一个\
  \ `EmbeddedServletContainerFactory` 配置。这是 Spring Boot 实用性的核心要素：它配置了稳定的默认基础设施 Bean，但也易于自定义。\n\
  \n*   `@ComponentScan`：此注解允许发现带有构造型注解的类。与 `@SpringBootApplication` 一起使用的用于列出要扫描的包的属性是\
  \ `basePackages`。在 1.3.0 版本中，此注解添加了另一个属性：`basePackageClasses`。此属性为指定要扫描带注解组件的包提供了\
  \ `basePackages` 的类型安全替代方案。将扫描指定的每个类的包。默认情况下，`@SpringBootApplication` 会扫描声明应用程序类的包及其下的所有包。\n\
  \n\n\n如果你运行了 `Chapter4Application` 调用，可能会注意到 Spring Boot 上下文中的基础设施 Bean 数量远高于简单\
  \ Spring Classic 应用上下文中的 Bean 数量。能够直接声明 Bean 并运行 Spring 应用是有代价的：你避免了设置上下文的工作，让 Spring\
  \ Boot 替你完成。最基本的 Spring Boot 应用上下文是基于经验丰富的开发者的决策设计的，他们在长期使用 Spring 后，识别出各种 Spring\
  \ 应用中常用的典型组件，并将其打包到 Spring Boot 起步依赖的默认设置中。有多个 Spring Boot 起步依赖，每个都针对正在构建的应用：`spring-boot-starter`\
  \ 用于包含可互操作 Bean 和写入日志的最简单 Spring 应用；`spring-boot-starter-jpa` 用于管理数据库中存储数据的简单 Spring\
  \ 应用；`spring-boot-starter-web` 用于创建基本的 Spring Web 应用；等等。所有这些起步依赖将在本书相关章节中详细解释。\n\
  \n现在，让我们修改这个 Spring Boot 应用，添加我们之前使用的 `MessageProvider` 和 `MessageRenderer` Bean。我们只需执行以下操作：\n\
  \n*   修改配置文件，添加对声明了这两个接口的 `chapter02` 项目的 Maven/Gradle 依赖。\n\n*   将 `ConfigurableMessageProvider`\
  \ 和 `StandardOutMessageRenderer` 类复制到 `chapter04-boot` 项目中，并确保它们在必要时使用 `@Component`\
  \ 和 `@Autowired` 注解。\n\n*   修改 `Chapter4Application` 类以访问 `MessageRenderer` 并调用\
  \ `render()`。\n\n清单 4-62 展示了所有这些更改，并且 Bean 定义已添加到 `WithBeansApplication` 文件中，以便将所有内容放在同一个上下文中，彼此靠近。*（在浏览项目时，你会感谢我们的！）*\n\
  \n```\npackage com.apress.prospring6.four.beans\nimport com.apress.prospring6.two.decoupled.MessageProvider\n\
  import com.apress.prospring6.two.decoupled.MessageRenderer\nimport org.springframework.boot.SpringApplication\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication\n// 其他导入语句已省略\n\
  @Component(\"messageRenderer\")\nclass StandardOutMessageRenderer : MessageRenderer\
  \ {\noverride var messageProvider: MessageProvider? = null\n@Autowired set(value)\
  \ {\nfield = value\n}\noverride fun render() {\nlogger.info(messageProvider!!.message)\n\
  }\ncompanion object {\nprivate val logger: Logger =\nLoggerFactory.getLogger(StandardOutMessageRenderer::class.java)\n\
  }\n}\n@Component\ninternal class ConfigurableMessageProvider(\n@Value(\n\"Configurable\
  \ message\"\n) override val message: String\n) : MessageProvider\n@SpringBootApplication\n\
  open class WithBeansApplication {\ncompanion object {\nprivate val logger: Logger\
  \ =\nLoggerFactory.getLogger(WithBeansApplication::class.java)\n@JvmStatic\nfun\
  \ main(args: Array) {\nval ctx = SpringApplication.run(arrayOf(WithBeansApplication::class.java),\
  \ args)\nval mr: MessageRenderer =\nctx.getBean(\"messageRenderer\", MessageRenderer::class.java)\n\
  mr.render()\n}\n}\n}\n清单 4-62\n包含开发者 Bean 的 Spring Boot 应用类\n```\n\n如果你运行 `WithBeansApplication`\
  \ 类并查看控制台，你还会注意到输出了 `Configurable message`。\n\n在这个例子中，我们显式调用了 `MessageRenderer`\
  \ Bean 的 `render()` 方法，但如果我们不必这样做呢？Spring Boot 是一个不断给予的礼物，正如你在阅读本书时会发现的那样，但我们想现在就向你介绍\
  \ `org.springframework.boot.CommandLineRunner` 接口。这个函数式接口声明了一个名为 `run()` 的单一方法，用于指示一个\
  \ Bean 应该运行——这意味着当它包含在 Spring 应用中时，`run()` 方法会被执行。这意味着我们可以修改 `StandardOutMessageRenderer`\
  \ 类，让 `run()` 方法调用 `render()`。\n\n我们甚至可以更进一步。由于可以在同一个应用上下文中定义多个 `CommandLineRunner`\
  \ Bean，并且可以使用 `Ordered` 接口或 `@Order` 注解对它们进行排序，我们也可以修改 `ConfigurableMessageProvider`，使其成为一个\
  \ `CommandLineRunner`，但在其 `run()` 方法中，我们确保 `message` 字段通过命令行参数设置，从而使这个实现真正可配置。\n\
  \n此外，为了确保这两个 Bean 按预期运行，我们在两者上都使用了 `@Order` 注解，将 `ConfigurableMessageProvider` 注解为\
  \ `@Order(1)`，将 `MessageRenderer` 注解为 `@Order(2)`，以确保它们被正确初始化和运行。新的 Runner Bean\
  \ 和配置类如清单 4-63 所示。\n\n```\npackage com.apress.prospring6.four.boot.runners\nimport\
  \ org.springframework.beans.factory.annotation.Autowired\n// 其他导入语句已省略\n@Order(2)\n\
  @Component(\"messageRenderer\")\ninternal class StandardOutMessageRenderer : MessageRenderer,\
  \ CommandLineRunner {\noverride var messageProvider: MessageProvider? = null\n@Autowired\
  \ set(value) {\nfield = value\n}\noverride fun render() {\nlogger.info(messageProvider!!.message)\n\
  }\n@Throws(java.lang.Exception::class)\noverride fun run(vararg args: String?) {\n\
  render()\n}\ncompanion object {\nprivate val logger: Logger =\nLoggerFactory.getLogger(StandardOutMessageRenderer::class.java)\n\
  }\n}\n@Order(1)\n@Component\ninternal class ConfigurableMessageProvider(\n@param:Value(\"\
  Configurable message\")\noverride var message: String\n) : MessageProvider, CommandLineRunner\
  \ {\n@Throws(java.lang.Exception::class)\noverride fun run(vararg args: String)\
  \ {\nif (args.size >= 1) {\nmessage = args[0]\n}\n}\n}\n@SpringBootApplication\n\
  open class WithRunnersApplication {\ncompanion object {\n@JvmStatic\nfun main(args:\
  \ Array) {\nSpringApplication.run(arrayOf(WithRunnersApplication::class.java), args)\n\
  }\n}\n}\n清单 4-63\n包含 Runner Bean 的 Spring Boot 应用类\n```\n\n运行 `WithRunnersApplication`\
  \ 时，你也会注意到输出了 `Configurable message`。这是因为你很可能在没有提供任何程序参数的情况下运行了它。要提供参数，请打开 IntelliJ\
