  您没有选择 1 到 13 之间的版本。默认版本为：0\");\n}\n}\n}\n```\n\n输出：\n\n\n\n```\n***在 Java 13 中测试\
  \ Switch 表达式。***\n考虑版本 1 到 13。\n目前，13 是最新版本。你选择了它。\n```\n\n运行代码\n在命令行环境中，如果路径未设置，为避免大量输入（提及\
