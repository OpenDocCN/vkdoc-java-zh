  ## 有界类型参数\n\n你很快就会了解到，通配符并不能高效地解决所有问题。还有另一种选择，称为**有界类型参数**。它可以帮助你限制在参数化类型中可用作类型实参的类型。\n\
  \n让我们从一个非常简单的用例开始。假设你正在处理一些整数和双精度浮点数，并且希望创建一个泛型类，该类应包含一个计算这些数值总和的方法。你需要理解以下几点：\n\
  \n*   你可以创建一个返回类型为 `double` 的方法来实现你的目的。\n*   你正在使用泛型，因此需要考虑 `int` 和 `double` 的包装类。`Integer`\
  \ 是 `int` 的包装类，`Double` 是 `double` 的包装类。\n*   `Integer` 和 `Double` 是 `Number` 类的子类，该类拥有\
  \ `intValue()`、`longValue()`、`floatValue()`、`doubleValue()` 和 `byteValue()` 等方法。让我们从\
  \ Eclipse IDE 中查看 `doubleValue()` 方法的功能。图 12-5 是 Eclipse 的截图。\n\n    ![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig5_HTML.jpg](img/433474_2_En_12_Fig5_HTML.jpg)\n\
  \n    图 12-5\n\n    来自 Eclipse IDE 的 doubleValue() 方法详情截图\n\n*   由于 `doubleValue()`\
  \ 是一个抽象方法，它的具体子类必须实现此方法。现在，让我们检查 `Integer` 类是如何实现 `doubleValue()` 方法的。如下所示：\n\n\
  *   现在，让我们也检查一下 `Double` 类是如何在 `Number` 类中实现 `doubleValue()` 的：\n\n```\n/**\n* 在拓宽原始转换后，将此\
  \ {@code Integer} 的值作为 {@code double} 返回。\n* @jls 5.1.2 拓宽原始转换\n*/\npublic double\
  \ doubleValue() {\nreturn (double)value;\n}\n```\n\n```\n/**\n* 返回此 {@code Double}\
  \ 对象的 {@code double} 值。\n* @return 此对象表示的 {@code double} 值\n*/\npublic double doubleValue()\
  \ {\nreturn value;\n}\n```\n\n从这些定义中可以明显看出，在你的场景中，你可以使用 `doubleValue()` 方法。现在你可以编写以下程序了。\n\
  \n### 演示 7\n\n让我们编译并运行该程序，然后分析输出结果。\n\n```\npackage java2e.chapter12;\n//一个泛型类\n\
  //T 是一个类型参数。当你初始化实际对象时，它将被替换为实际类型。\nclass GenericDemo7Class {\nT firstNumber, secondNumber;\n\
  GenericDemo7Class(T firstNumber, T secondNumber) {\nthis.firstNumber = firstNumber;\n\
  this.secondNumber = secondNumber;\n}\n// 始终返回一个 double 值\npublic double displaySum()\
  \ {\n//使用库方法 doubleValue()\nreturn firstNumber.doubleValue() + secondNumber.doubleValue();\n\
  }\n}\nclass Demonstration7 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示-7：有界类型参数的典型用法。***\\n\");\nGenericDemo7Class doubleOb = new GenericDemo7Class(2.5,\
  \ 5.7);\nSystem.out.println(\"2.5+5.7=\" + doubleOb.displaySum());\nGenericDemo7Class\
  \ intOb = new GenericDemo7Class(2, 7);\nSystem.out.println(\"2+7=\" + intOb.displaySum());\n\
  //GenericDemo7Class stringOb=new GenericDemo7Class(\"hello\",\"world!\");\n// 如果使用\
  \ class GenericDemo7Class 会导致边界不匹配错误\n//System.out.println( \"2+7=\" +stringOb.displaySum());\n\
  }\n}\n```\n\n输出结果：\n\n```\n***演示-7：有界类型参数的典型用法。***\n2.5+5.7=8.2\n2+7=9.0\n```\n\n\
  你可以看到程序已成功编译并运行。现在，请考虑以下几点：\n\n*   让我们看看如果在之前的演示中使用 `<T>` 而不是 `<T extends Number>`\
  \ 会发生什么，如下所示：\n\n```\n//class GenericDemo7Class {\nclass GenericDemo7Class {\n```\n\
  \n这次，你将遇到如下编译时错误（如图 12-6 所示）：`方法 doubleValue() 对于类型 T 未定义。`\n\n![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig6_HTML.jpg](img/433474_2_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6\n\n编译时错误提示 doubleValue() 对于类型 T 未定义\n\n编译器提出此警告是因为在这种情况下，它无法确定你是否会使用真正的数字类型。但是，当你使用\
  \ `<T extends Number>` 时，你是在告诉编译器你将始终传递一个 `Number` 类型，而不是其他任何类型。\n\n*   你可以在演示 7\
  \ 中看到一些被注释掉的行。如果你取消注释以下行：\n\n```\nGenericDemo7Class stringOb = new GenericDemo7Class(\"\
  hello\",\"world!\");\n```\n\n你将收到边界不匹配的编译时错误。图 12-7 是 Eclipse IDE 对此的截图。\n\n![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig7_HTML.jpg](img/433474_2_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7\n\n边界不匹配错误\n\n因此，你可以看到，当你使用 `<T extends Number>` 而不是 `<T>` 时，你不能传递除 `Number`\
  \ 类型之外的任何内容。\n\n\n\n### 要点提示\n\n在泛型编程中，`<T extends YourSuperClass>` 表示 `T` 可以被替换为\
  \ `YourSuperClass` 或 `YourSuperClass` 的*任何子类*。这种方法有助于你提供一个包含性的上界。使用这种方法，你可以在程序中提升类型安全性。\n\
  \n需要注意的是，与通配符类似，此处的 `extends` 是广义上的使用，意味着它既可以表示继承类，也可以表示实现接口。\n\n你可以同时使用类类型和接口类型作为边界。但有一个重要的限制。你可能记得，在\
  \ Java 编程中，你的类可以继承自另一个类，并且可以实现多个接口。同样的规则也适用于此。同时，你还需要在接口类型之前提及类类型。当你使用类类型和接口类型创建边界时，需要使用\
  \ `&` 运算符，如下所示：\n\n假设你有以下代码片段：\n\n```\nclass Demo8AClass {\n//一些代码\n}\nclass Demo8BClass\
  \ {\n//一些代码\n}\ninterface Interface8ADemo {\n//一些代码\n}\ninterface Interface8BDemo\
  \ {\n//一些代码\n}\nclass ImplementorInterface8ADemo implements Interface8ADemo{\n//一些代码\n\
  }\n```\n\n演示 8\n\n对于前面的代码片段，演示 8 提供了一些有效和无效语句的示例供你参考。*此处无效语句用注释* `//Error` *标记，有效语句用*\
  \ `//Ok` *标记。*\n\n```\n//class GenericDemo8Class {//Error\n//class GenericDemo8Class\
  \ {//Error\n//class GenericDemo8Class {//Ok\nclass GenericDemo8Class {//Ok\n}\n\
  ```\n\n问答环节\n**12.6 通配符与有界类型参数有何不同？**\n\n这取决于你的实现。在某些情况下，有界类型参数可以提升更好的可读性和安全性。记住它们的语法会很有帮助。任何通配符只能有一个边界。\n\
  \n*   对于上界，你使用：`? extends SuperType`\n\n*   对于下界，你使用：`? super SubType`\n\n*另一方面，你可以为类型参数关联多个边界。*\
  \ 因此，你之前已经见过以下语句。\n\n当你使用类类型和接口类型创建边界时，需要使用 `&` 运算符，如下所示：\n\n```\n演示 8 展示了其部分用法。\n\
  ```\n\n类型擦除\n在演示 3 之前，我曾提到可能看起来存在不同版本的 `MyGenericClass`。\n但实际上，Java 编译器会移除所有这些泛型类型信息，并执行必要的类型转换，以使代码行为如此。这个移除过程被称为类型擦除。因此，实际上，对于演示\
  \ 2，只存在一个版本的 `MyGenericClass`。你现在将详细讨论这个主题。\n简而言之，对于一个参数化类，只有一个编译后的类文件。例如，假设你在程序中使用\
  \ `ArrayList<Double>`、`ArrayList<Integer>` 或 `ArrayList<String>`。在这种情况下，如果你尝试在容器中存储任何不需要类型的对象，类型参数会帮助你引发编译时错误。因此，你在编译时提升了类型安全性。但是，尽管你在泛型数据结构中使用了不同的类型参数，所有这些参数化类型都使用相同的编译后类。这是因为所有类型信息在运行时都会被擦除。这个过程有点复杂，但大多数时候你不需要直接处理它们。\n\
  \n根据 Oracle Java 文档，类型擦除可以通过以下方式工作：\n\n*   泛型类型中的所有类型参数都将被替换为它们的边界。对于无界类型，它将被替换为\
  \ `Object`。因此，生成的字节码将包含普通的类、接口和方法。\n\n*   为了保持类型安全，将插入类型转换。\n\n*   它可以生成桥接方法，以保持扩展泛型类型中的多态性。\n\
  \n所以，底线是：***类型擦除确保你不会为不同的参数化类型在编译后的代码中创建不同的类***。\n\n演示 9\n\n让我们从一个简单的案例研究开始。在这里，我将编译代码，然后反编译它。为了简单直接，我分别使用了\
  \ `javac` 和 `javap` 命令。我在机器上的不同位置反编译了这段代码，这就是为什么我有意移除了以下演示中的 `package` 语句。\n\n```\n\
  import java.util.List;\nimport java.util.ArrayList;\nclass Demonstration9 {\npublic\
  \ static void main(String[] args) {\nSystem.out.println(\"***演示-9.检查类型擦除。***\");\n\
  List myIntList = new ArrayList();\nmyIntList.add(10);\nmyIntList.add(20);\n//myIntList.add(\"\
  无效\");//错误\nint firstNumber=myIntList.get(0);\nSystem.out.println(\"第一个数字是 :\"+\
  \ firstNumber);\nint secondNumber=myIntList.get(1);\nSystem.out.println(\"第二个数字是\
  \ :\"+ secondNumber);\nList myStrList = new ArrayList();\nmyStrList.add(\"Hello\"\
  );\nmyStrList.add(\" world !\");\n//myStrList.add(30);//错误\nString firstString=myStrList.get(0);\n\
  System.out.println(\"第一个字符串是 :\"+ firstString);\nString secondString=myStrList.get(1);\n\
  System.out.println(\"第二个字符串是 :\"+ secondString);\n}\n}\n```\n\n输出：\n\n```\n***演示-9.检查类型擦除。***\n\
