  \ Thread4C();\nthread4A.start();\nthread4B.start();\nthread4C.start();\nSystem.out.println(\"\
  Is Thread4A interrupted now?\"+thread4A.interrupted());\nThread.sleep(1000);\nSystem.out.println(\"\
  Exit-main()\");\n}\n}\n```\n\n以下是可能的输出：\n\n```\n***Demonstration-4.Exploring multi-threading\
  \ with yield(), sleep(), and interrupt() methods of the Thread class.***\nIs Thread4A\
  \ interrupted now?false\nThread4C prints ->0\nThread4B prints ->0\nThread4B prints\
  \ ->1\nThread4A prints ->0\nThread4B prints ->2\nThread4B prints ->3\nThread4C prints\
  \ ->1\nThread4A prints ->1\nThread4C prints ->2\nThread4A prints ->2\nGoing to interrupt\
  \ the thread.\nThread4C prints ->3\nIs Thread4A interrupted?true\nThread4C prints\
  \ ->4\nThread4A prints ->3\nExit-Thread4C\nThread4A prints ->4\nExit-Thread4A\n\
  Exit-main()\nThread4B prints ->4\nExit-Thread4B\n```\n\n### 问答环节\n\n**11.5 在之前的演示中，我看到主线程在子线程之前完成。但在许多情况下，我想避免这种情况。在这种情况下，我应该怎么做？**\n\
  \n`sleep()` 方法可以帮助你，但它不是一个理想的解决方案。更好的解决方案是使用 `join()` 方法（它有多个重载版本）。这里，我提供了演示 4 中\
  \ `main()` 方法的更新版本（注意粗体行）。一旦你执行此代码，你会注意到主线程总是在最后完成。\n\n```\nclass Demonstration4\
  \ {\npublic static void main(String[] args) throws InterruptedException {\nSystem.out.println(\"\
  ***Demonstration-4.Exploring multi-threading with yield(),sleep(), and interrupt()\
  \ methods of the Thread class.***\");\nThread4A thread4A = new Thread4A();\nThread4B\
  \ thread4B = new Thread4B();\nThread4C thread4C = new Thread4C();\nthread4A.start();\n\
  thread4B.start();\nthread4C.start();\nSystem.out.println(\"Is Thread4A interrupted\
  \ now?\" + thread4A.interrupted());\nThread.currentThread().sleep(1000);\n//Modified\
  \ program to show the use of join()\n//Waiting for the threads to complete before\
  \ main //thread.\nthread4A.join();\nthread4B.join();\nthread4C.join();\nSystem.out.println(\"\
  Exit-main()\");\n}\n}\n```\n\n以下是修改后的输出。请注意，`Exit-main()` 出现在最后。\n\n```\n***Demonstration-4.Exploring\
