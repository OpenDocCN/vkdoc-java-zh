  }\n```\n\n输出：\n\n```\n***演示-1.探索包。***\n***公司 A 的喀拉拉邦旅游价格***\n两人喀拉拉邦旅游套餐价格为 Rs.14000\n\
  四人喀拉拉邦旅游套餐价格为 Rs.28000\n**************\n***公司 B 的安达曼旅游价格***\n公司 B：两人安达曼旅游套餐价格为 Rs.24000\n\
  公司 B：四人安达曼旅游套餐价格为 Rs.48000\n**************\n***公司 A 的果阿旅游价格***\n两人果阿旅游套餐价格为 Rs.20000\n\
  四人果阿旅游套餐价格为 Rs.40000\n**************\n***公司 B 的果阿旅游价格***\n公司 B：两人果阿旅游套餐价格为 Rs.32000\n\
  公司 B：四人果阿旅游套餐价格为 Rs.62000\n****************\n```\n\n你是否注意到一个有趣的事实？由于 `GoaPackage`\
  \ 类在两个 Java 包中都存在，你需要在 `main()` 方法中使用完全限定名来引用特定包中的目标类。但对于其他类，如 `KeralaPackage` 或\
  \ `AndamanPackage`，则无需使用完全限定名，因为这些类具有唯一的名称。\n\n这个例子也说明了一个事实：如果你使用星号形式导入整个包，即使这些包中包含同名的类，也不会出现编译时错误。但在访问该类时，你需要使用该类的完全限定名。例如，你必须写成\
  \ `java2e.chapter7.companya.GoaPackage`，因为 `GoaPackage` 类在两个公司中都存在。\n\n### 注意\n\n\
  我保留了已注释的代码，以展示如何从包中导入特定类，而不是导入整个包。\n\n\n\n### 关于 Java 包的关键要点\n\n以下是关于包的一些重要知识点：\n\
  \n*   `java.lang` 包中的所有类都是默认导入的。（问答 7.3 会详细讨论 import 语句。）\n\n*   如果你想重命名包，首先要重命名存放类的目录。\n\
  \n*   应严格遵守包命名约定；例如，如果我们使用 `package a.b.c` 这样的语句，意味着目录 `c` 位于目录 `b` 内部，而目录 `b` 又位于目录\
  \ `a` 内部。\n\n*   你可以参考表 7.1 来记忆可见性控制机制。\n\n### 问答环节\n\n**7.1 如果每个类都位于某个包中，那么到目前为止，我怎么能不导入任何包就使用\
  \ System.out.print() 呢？**\n\n在 Java 中，`java.lang` 包中的所有类都是默认导入的。这就是为什么你能够使用 `System.out.println()`——`System`\
  \ 类也位于默认的 `java.lang` 包中。\n\n如果你导入一个包，子包不会被默认导入。例如，假设包 `companya` 中有一个子包 `subpacka`，并且你有以下代码：\n\
  \n```\npackage java2e.chapter7.companya.subpacka;\npublic class SubGoaPackage {\n\
  int basePrice = 500;\npublic void showPrice() {\nSystem.out.println(\"**I am in\
  \ SubGoaPackage.I need to update myself**\");\n}\n}\n```\n\n现在，如果你在演示 1 中没有导入这个子包，以下代码段中的粗体行将导致编译时错误：\n\
  \n```\n//子包不会被默认导入。\n//需要显式导入该包。\n//import java2e.chapter7.companya.subpacka.*;\n\
  SubGoaPackage companyASubGoaPackage=new SubGoaPackage();\ncompanyASubGoaPackage.showPrice();\n\
  ```\n\n### 注意\n\n如果你导入一个包，子包不会被默认导入。\n\n**7.2 你能解释一下默认访问说明符吗？**\n\n你随时可以参考表 7-1。从表中可以明显看出，如果你没有为某个成员指定任何特定的访问修饰符（如\
  \ public、private 等），它将被视为具有默认修饰符，那么你的特定成员将仅在同一包内可见；换句话说，包内的所有其他类都可以看到并使用它。\n\n表\
  \ 7-1\n\n使用包的访问保护表\n\n|   | public | protected | private | 默认/无修饰符 |\n| --- | ---\
  \ | --- | --- | --- |\n| 同一个类 | 是 | 是 | 是 | 是 |\n| 同一包中的子类 | 是 | 是 | 否 | 是 |\n|\
  \ 同一包中的非子类 | 是 | 是 | 否 | 是 |\n| 不同包中的子类 | 是 | 是 | 否 | 否 |\n| 不同包中的非子类（外部世界） | 是\
  \ | 否 | 否 | 否 |\n\n同理，你可以对外部类赋予可见性，但限制只有处于同一继承层次结构（即子类）中的外部类才能看到目标成员，在这种情况下，你可以使用修饰符\
  \ `protected`。如果你根本不想设置任何限制，只需使用 `public` 修饰符；而要提供最大限制，则使用 `private` 修饰符。\n\n###\
  \ 注意\n\n默认修饰符或无修饰符也称为**包私有**修饰符，因为它仅提供在包含它的包内的可见性。\n\n**7.3 import 语句的目的是什么？**\n\
  \nJLS11 指出，“导入声明允许通过由单个标识符组成的简单名称来引用命名类型或静态成员。” 你可以通过使用 `import` 语句将指定位置的所有类（或包）引入到目标位置。否则，你需要使用完全限定名。例如，假设你有一个名为\
  \ `MyClass` 的类，其中包含一些方法（为简单起见，假设你只使用了 public 修饰符）。这个类位于包（或目录）`packageb` 中，而 `packageb`\
  \ 又位于另一个目录 `packagea` 中。现在，你想从另一个位置重用这些方法/类。那么，根据目录结构，你需要将类引用为 `packagea.packageb.Myclass`。所以，你可以看到，对于需要使用的类，每次都要先输入长长的、用点分隔的包名，这既繁琐又难看。简而言之，通过使用\
  \ import 语句，你可以节省大量输入，并提高程序的可读性。一旦导入，你就可以仅通过类名来引用一个类。\n\n**7.4 那么从技术上讲，我可以避免使用 import\
  \ 语句。这个理解正确吗？**\n\n是的，但在实际的编程场景中，你需要在输入量和可读性方面付出很大代价。因此，我不推荐这种做法。\n\n**7.5 假设我在两个包中使用了相同的类名。然后在另一个程序中，我导入了这两个包。我会遇到编译器问题吗？另外，我如何访问特定的类？**\n\
  \n首先，没有编译器问题。如果你在两个或多个包中有同名的类，只需使用它们的完全限定名来避免冲突。请参考演示 1 中的程序。你可以看到，这两个包都有类 `GoaPackage.java`，并且在\
  \ `main()` 方法中我使用了它们的完全限定名。\n\n**7.6 在一些示例中，我看到 import 语句是第一行。但你告诉我 package 语句应该是第一行。我两者都有，哪个应该放在前面？**\n\
  \n你必须记住，`package` 语句应该是第一行。然后放置 `import` 语句。请参见演示 2。\n\n### 演示 2\n\n考虑以下程序，它演示了\
  \ `package` 和 `import` 语句的错误顺序。\n\n```\nimport java.util.Date;\npackage java2e.chapter7;//错误\n\
  class Demonstration2 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Demonstration-2.探索 package 和 import 语句的顺序。***\");\nDate currentTime = new Date();\n\
  System.out.println(currentTime.toString());\n}\n}\n```\n\n结果是编译错误（图 7-5）。\n\n![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig5_HTML.jpg](img/433474_2_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\n\nEclipse 编辑器中显示错误消息的输出快照\n\n让我们改变 `package` 和 `import` 语句的顺序，如下所示：\n\n\
  ```\npackage java2e.chapter7;//package 语句应该是第一行\nimport java.util.Date;// 正确\n```\n\
  \n现在你将得到预期的输出：\n\n```\n***Demonstration-2.探索 package 和 import 语句的顺序。***\nSat Mar\
  \ 16 20:53:58 IST 2019\n```\n\n\n\n### 问答环节\n\n**7.7 为什么 Java 采用这种设计，要求包语句必须放在**\
  \ **import** **语句之前？**\n\n我个人认为，你应该在开始编写代码之前先确定一个位置。例如，你可能会决定为你的应用程序创建类。如果这些类已经存在于同一个包中（即同一位置），你可以立即引用它们，而无需使用\
  \ `import` 语句。但如果不是这种情况，你需要将这些类引入到目标位置（此时 `import` 语句就派上用场了）。所以，这就像建造房屋前先确定位置一样。你绝不会先建好房子再改变位置。同样，如果你仔细观察，会发现包命名规范遵循相应字节码的目录结构；也就是说，你的意图是先确定位置，然后再进行后续操作。\n\
  \n**7.8 如何处理源文件中的多个** **package** **语句？**\n\n一个源文件中只能有一个 `package` 语句。\n\n**7.9\
  \ 有时我在源文件中根本看不到任何** **package** **语句。这会导致编译器问题吗？**\n\n不会。这意味着你正在使用当前的默认包。\n\n**7.10\
  \ 我对包的用法有了一些了解。如果你能总结一下包的总体用途，会很有帮助。**\n\n如果你仔细观察，会发现包涵盖了以下场景：\n\n*   它们提供了一种有组织的结构，这对于理解和调试程序非常有用。\n\
  \n*   当不同包中包含同名类时，你可以通过使用包语句来避免命名冲突。\n\n*   通过包内不同的访问修饰符，你可以提供在实际软件开发过程中非常必要的安全级别。\n\
  \n*   你可以复用其他程序包中已经编写和使用的类。\n\n**7.11 列举一些 Java 内置的包。**\n\n`java.lang`、`java.util`、`java.io`\
  \ 和 `java.net` 是常用的 Java 包。\n\n## 命令行环境常见错误排查\n\n在本书中，Java 程序是在 Eclipse 中执行的。它是一个非常用户友好的\
  \ IDE。但有时你可能只想使用记事本和命令行环境来编译和运行 Java 程序，这时可能会遇到一些错误。实际上，使用包进行编程，然后通过命令行编译和运行这些程序可能颇具挑战性。例如，假设你将类\
  \ `MyClass` 放在包 `mypack.pkg` 中。那么，你需要将源代码文件放置在 Java 主工作目录下的 `mypack` 目录内的 `pkg`\
  \ 子目录中。除此之外，要编译或运行程序，你应该在主目录中，而不是在子目录中。我将在本节末尾详细展示这个用例。\n\n首先，让我们分析命令行环境中的一些基本错误。假设你编写了以下程序并将其保存在\
  \ `C:\\TestClass\\Hello.java` 中：\n\n```\npublic class Hello {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"***Hello Vaskaran***\");\n}\n}\n```\n\
  \n当你编译它时，可能会遇到以下错误：\n\n```\nC:\\TestClass>javac Hello.java\n'javac' 不是内部或外部命令，也不是可运行的程序或批处理文件。\n\
  ```\n\n这种问题通常发生在你没有正确设置环境变量时。你可以设置 `PATH` 环境变量来消除此错误，如下所示：\n\n```\nC:\\TestClass>set\
  \ path=\"C:\\Program Files\\Java\\jdk1.8.0_172\\bin\";\nC:\\TestClass>javac Hello.java\n\
  C:\\TestClass>\n```\n\n但是，建议你不要在命令提示符下设置此环境变量，而是编辑环境变量并添加它。这将是一次性的操作。\n\n有时你可以编译程序，但无法运行它。例如，在执行过程中，你可能会遇到如下问题：`Error:\
  \ Could not find or load main class XXX`，其中 `XXX` 是类名。以下是此类事件的截图：\n\n![../images/433474_2_En_7_Chapter/433474_2_En_7_Figa_HTML.jpg](img/433474_2_En_7_Figa_HTML.jpg)\n\
  \n就我而言，解决此问题的快速方法是正确设置以下变量（因为我在系统中安装了 jdk1.8.0_172）：\n\n```\nC:\\TestClass>set class=\"\
  C:\\Program Files\\Java\\jdk1.8.0_172\\bin\";\nC:\\TestClass>set classpath=\"C:\\\
  Program Files\\Java\\jre1.8.0_172\\lib\\rt.jar\";\n```\n\n现在我可以重新编译并再次运行程序。这次，程序正确执行了。\n\
  \n```\nC:\\TestClass>javac Hello.java\nC:\\TestClass>java Hello\n***Hello Vaskaran***\n\
  ```\n\n但在某些情况下，对于类似的错误消息，你可能需要查找其他可能的失败原因。例如，让我们在程序开头使用包语句修改程序，如下所示：\n\n```\npackage\
  \ mypack;\npublic class Hello2 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Hello Vaskaran***\");\n}\n}\n```\n\n假设你将此 `Hello2.java` 放在 `C:\\TestClass\\mypack`\
  \ 中。现在，尝试按如下方式编译和运行程序：\n\n```\nC:\\TestClass\\mypack>javac Hello2.java\nC:\\TestClass\\\
  mypack>java Hello2\nError: Could not find or load main class Hello2\n```\n\n你可以看到这次程序没有正常运行。请注意，你当前在\
  \ `mypack` 目录中。如前所述，在这种情况下，你应该在*主目录*中，而不是在*子目录*中。因此，在这种情况下，你需要向上移动一级目录，然后尝试以下命令：\n\
  \n```\nC:\\TestClass\\mypack>cd ..\nC:\\TestClass>java mypack.Hello2\n***Hello Vaskaran***\n\
  ```\n\n简而言之，如果你想使用简单的命令提示符和记事本来运行 Java 程序，你需要正确设置 `PATH` 和 `CLASSPATH` 环境变量。除此之外，如果你使用了\
  \ `package` 语句，你应该正确维护目录结构，并遵循正确的目录结构来运行程序。\n\n## 总结\n\n本章讨论了以下主题：\n\n*   什么是包？\n\
  \n*   如何在 Eclipse IDE 中创建包？\n\n*   应如何使用 import 语句？\n\n*   包有哪些限制？\n\n*   如何编写简单的程序来演示\
  \ Java 中的包？\n\n*   如何避免一些命令行环境错误？\n\n\n\n"
- "# 8. 理解类变量和类方法\n\n有时开发者不希望通过对类型的实例进行操作，而是更倾向于直接对类型本身进行操作。类变量或类方法的概念就出现在这些场景中。它们通常被称为**静态变量**或**静态方法**。\n\
  \n让我们考虑一种情况：你希望一个变量能被某个类的所有对象共享，无论从该类创建了多少个对象。其他时候，你可能也希望维护一个单一的副本来处理某些特定场景；例如，当你维护一个日志文件时。在这种情况下，你会使用类变量和类方法的概念。\n\
  \n在 Java 中，嵌套类本身可以是静态的。当你将关键字 `static` 放在嵌套类前面时，它是一个嵌套静态类；当它被标记在方法上时，它被称为静态方法；当它与变量关联时，它被称为静态变量。\n\
  \n在继续之前，你需要记住以下几点：\n\n*   Java 不允许我们创建顶层的静态类。包含静态类的类被称为外部类。非静态的嵌套类被称为内部类。为了方便你参考，你应该记住以下内容：\n\
  \n    ```\n    class OuterClass//不能是静态的\n    {\n    //可能包含一些代码\n    class NestedClass\
  \ // 可以是静态的或非静态的\n    {\n    //可能包含一些代码\n    }\n    }\n    ```\n\n*   Java 语言规范（第\
  \ 11 版）指出，你不能将枚举类型放在内部类的主体中。这是因为嵌套的枚举类型隐式是静态的，而内部类除了常量变量外，不能拥有静态成员。\n\n## 类变量和类方法\n\
  \n在第 3 章中，你已经对静态类和静态方法有了一个非常简单的概述。在本章中，你将更详细地探讨它。为了理清思路，让我们从一个包含静态和非静态成员的简单示例开始。在这个演示中，请注意那些支持的注释，它们只是告诉你静态字段应该以静态方式访问。\n\
  \n### 演示 1\n\n在下面的程序中，你有一个 `Rectangle` 类，它有一个 `area()` 方法。该方法被标记了 `static` 关键字，因此你可以像\
  \ `Rectangle.area()` 那样调用该方法。在这种情况下，你不需要创建 `Rectangle` 类的对象来调用该方法。\n\n```\npackage\
  \ java2e.chapter8;\nclass Rectangle {\n//静态成员\nstatic double length=25.5, breadth=10.0;\n\
  static String myStaticString=\"我是一个静态字符串\";\n//非静态成员\nint myNonStaticInt=25;\npublic\
  \ static double area() {\nreturn length * breadth;\n}\n}\nclass Demonstration1 {\n\
  public static void main(String[] args) {\nSystem.out.println(\"***演示-1. 探索类变量和类方法。***\\\
  n\");\nSystem.out.println(\"矩形的面积是 \" + Rectangle.area() + \" 平方单位\");\nSystem.out.println(\"\
  myStaticString 是 : \" + Rectangle.myStaticString);\nRectangle rectOb=new Rectangle();\n\
  System.out.println(\"myNonStaticInt 是 : \" + rectOb.myNonStaticInt);\n//警告：静态字段\
  \ Rectangle.myStaticString 应该以静态方式访问\n//System.out.println(\"myStaticString 是 :\
  \ \" + rectOb.myStaticString);\n}\n}\n```\n\n输出：\n\n```\n***演示-1. 探索类变量和类方法。***\n\
  矩形的面积是 255.0 平方单位\nmyStaticString 是 : 我是一个静态字符串\nmyNonStaticInt 是 : 25\n```\n\n\
  ## 使用嵌套类\n\n现在，请仔细阅读演示 2，然后分析嵌套静态类的重要特性。\n\n### 演示 2\n\n这个演示还将帮助你注意到嵌套静态类和非静态嵌套（或内部）类之间的区别。\n\
  \n以下是本演示中需要注意的重要点。\n\n![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig1_HTML.jpg](img/433474_2_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\n你不能使用静态引用来引用非静态字段\n\n*   在这个程序中，顶层类 `Rectangle2` 包含两个嵌套类——`StaticRectangle2`\
  \ 和 `InnerClass2`。顾名思义，`StaticRectangle2` 是一个静态嵌套类，而 `InnerClass2` 是一个非静态嵌套类（或内部类）。\n\
  \n*   注意内部类是如何实例化的。内部类位于外部类内部，因此你需要先实例化外部类。我在一行代码中实例化了它，但它可以分成以下两行，这在演示代码的注释中已显示。\n\
  \n    ```\n    Rectangle2 rect2=new Rectangle2();\n    Rectangle2.InnerClass2 innerOb2=rect2.new\
  \ InnerClass2();\n    ```\n\n*   在 `staticDisplay()` 内部，如果你取消注释下面这行：\n\n    ```\n\
  \    //System.out.println(\"nonStaticOuterInt 是 : \" + nonStaticOuterInt);\n   \
  \ ```\n\n    你会遇到一个编译时错误，如图 8-1 所示：`无法对非静态字段 nonStaticOuterInt 进行静态引用`\n\n因此，重要的是要注意，在静态类内部只能访问外部类的静态成员。但是内部类可以访问外部类的静态和非静态成员（注意\
  \ `nonStaticDisplay()` 方法在访问外部类的变量时没有任何问题）。\n\n```\npackage java2e.chapter8;\nclass\
  \ Rectangle2 {\nstatic int staticOuterInt = 25;\nint nonStaticOuterInt = 125;\n\
  //静态类\nstatic class StaticRectangle2 {\nvoid staticDisplay(){\nSystem.out.println(\"\
  在静态类内部。\");\nSystem.out.println(\"staticOuterInt 是 : \" + staticOuterInt);\n//System.out.println(\"\
  nonStaticOuterInt 是 : \" + nonStaticOuterInt);//错误\n}\n}\n//内部类\nclass InnerClass2\
  \ {\nvoid nonStaticDisplay(){\nSystem.out.println(\"\\n 在内部类内部。\");\nSystem.out.println(\"\
  staticOuterInt 是 : \" + staticOuterInt);\nSystem.out.println(\"nonStaticOuterInt\
  \ 是 : \" + nonStaticOuterInt);//正确\n}\n}\n}\nclass Demonstration2 {\npublic static\
  \ void main(String[] args) {\nSystem.out.println(\"***演示-2. 探索类变量和类方法。***\\n\");\n\
  Rectangle2.StaticRectangle2  nestedStaticOb=new Rectangle2.StaticRectangle2();\n\
  nestedStaticOb.staticDisplay();\n//实例化一个内部类\n//内部类包含在外部类中，因此你需要先实例化外部类。\nRectangle2.InnerClass2\
  \ innerOb=new Rectangle2().new InnerClass2();\n//或者，使用以下多行代码来实例化内部类，如下所示：\n/*Rectangle2\
  \ rect2=new Rectangle2();\nRectangle2.InnerClass2 innerOb2=rect2.new InnerClass2();*/\n\
  innerOb.nonStaticDisplay();\n}\n}\n```\n\n输出：\n\n```\n***演示-2. 探索类变量和类方法。***\n在静态类内部。\n\
  staticOuterInt 是 : 25\n在内部类内部。\nstaticOuterInt 是 : 25\nnonStaticOuterInt 是 : 125\n\
  ```\n\n### 需要记住的要点\n\n*   在 Java 中，不允许有顶层的静态类。Java 中的静态类是嵌套的。\n\n*   非静态的嵌套类通常被称为**内部**类。\n\
  \n*   在嵌套静态类内部只能访问外部类的静态成员。\n\n*   要实例化一个内部类，你需要先实例化外部类。\n\n*   关键字 `static` 用于表示“可以像全局变量一样使用的单一事物”。一些开发者还认为静态方法比非静态方法更快。但是，需要记住的关键点是它们不属于任何实例。\n\
  \n*   你可能会注意到 `main(String[] args)` 方法是静态的。因此，你可以在不创建任何类实例的情况下调用此方法。\n\n\n\n###\
  \ 问答环节\n\n**8.1 在演示 1 中，我可以创建** **Rectangle** **类的实例，然后调用** **area()** **方法吗？**\n\
  \n这不是推荐的做法。在 Eclipse 编辑器中，尝试这样做会收到一条警告消息。例如，如果你取消注释该演示中的以下代码行：\n\n```\n//System.out.println(\"\
  The myStaticString is : \" + rectOb.myStaticString);\n```\n\n你将收到以下警告消息（如图 8-2 所示）：`The\
  \ static field Rectangle.myStaticString should be accessed in a static way`。\n\n\
  ![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig2_HTML.jpg](img/433474_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\n警告消息：静态字段应以静态方式访问。\n\n**8.2 我能在 Java 中模拟顶级静态类的行为吗？**\n\n如前所述，Java 不允许顶级静态类。但你可以按照\
  \ Java 中已有的示例来模拟类似的行为。例如，请注意，通过使用内置的 `Math` 类，你可以找出 12 和 15 中的较小值，如下所示：\n\n```\n\
  System.out.println(\" Minimum of (12,15) is \"+ java.lang.Math.min(12, 15));\n```\n\
  \n在这种情况下，`Math` 类的行为就像一个顶级静态类。如果你在 Eclipse 编辑器中打开 `java.lang.Math` 类的声明，你将看到图 8-3。\n\
  \n![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig3_HTML.jpg](img/433474_2_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\nEclipse 编辑器中 `java.lang.Math` 类详细信息的局部截图\n\n因此，你可以将类声明为 final，将构造函数设为私有，并将类的其他成员设为静态，从而模拟出非常接近顶级静态类的行为。\n\
  \n## 初始化块与构造函数\n\n在 Java 中，构造函数不能是静态的。相反，你可以使用初始化块，它可以是静态的，也可以是非静态的。非静态初始化块也称为实例块。在接下来的演示中，你将体验静态和非静态初始化块。\n\
  \n静态块具有以下一些重要特性：\n\n*   静态块只执行一次，并且在类首次加载时生效。\n*   静态块可以在执行流程开始时执行一些通用操作。通常，它们经常用于初始化静态变量。\n\
  *   在静态块内部，你只能引用静态变量。\n*   以下代码片段展示了类中静态块的示例。此代码片段将在接下来的演示中使用。\n\n    ```\n    class\
  \ Parent\n    {\n    int intInstanceParent;\n    static int intStaticParent, count;\n\
  \    static void testMethod() {\n    count++;\n    System.out.println(\"Inside static\
  \ testMethod(), count =\"+ count);\n    }\n    //静态块\n    static {\n    System.out.println(\"\
  Inside static block of Parent\");\n    //intInstanceParent=10;//错误\n    intStaticParent=10;//正确\n\
  \    testMethod();//正确\n    //System.out.println(\"intInstanceParent=\"+ intInstanceParent);//错误\n\
  \    System.out.println(\"intStaticParent=\"+ intStaticParent);\n    }\n    }\n\
  \    ```\n\n*   实例块可以执行多次。每次实例化对象时，它都会在构造函数之前执行。以下是类中实例块的示例。此代码片段也将在接下来的演示中使用。\n\
  \n    ```\n    class Parent\n    {\n    int intInstanceParent;\n    static int intStaticParent,\
  \ count;\n    static void testMethod() {\n    count++;\n    System.out.println(\"\
  Inside static testMethod(), count =\"+ count);\n    }\n    //实例块\n    {\n    System.out.println(\"\
  \\nInside instance block of parent\");\n    intInstanceParent++;\n    intStaticParent++;\n\
  \    System.out.println(\"intStaticParent changed to :\"+ intStaticParent);\n  \
  \  System.out.println(\"intInstanceParent changed to :\"+ intInstanceParent);\n\
  \    testMethod();//无编译错误\n    }\n    }\n    ```\n\n*   当你同时拥有静态块、实例块和构造函数时，执行顺序是：先执行静态块，然后执行实例块，最后执行构造函数。\n\
  *   在演示 3 的输出中，你可以确认当程序包含所有这些元素（两种初始化块和构造函数）时的执行流程。\n\n### 注意\n\n要理解演示 3，你可能需要反复回顾前面的要点。\n\
  \n\n\n### 演示 3\n\n在演示 3 中，同时存在一个父类和一个子类。因此，正如预期的那样，当你实例化一个对象时，父类构造函数将在子类构造函数之前被调用。\n\
  \n```\npackage java2e.chapter8;\nclass Parent\n{\nint intInstanceParent;\nstatic\
  \ int intStaticParent, count;\nstatic void testMethod() {\ncount++;\nSystem.out.println(\"\
  Inside static testMethod(), count =\"+ count);\n}\n//静态块\nstatic {\nSystem.out.println(\"\
  Inside static block of Parent\");\n//intInstanceParent=10;//error\nintStaticParent=10;//ok\n\
  testMethod();//ok\n//System.out.println(\"intInstanceParent=\"+ intInstanceParent);//error\n\
  System.out.println(\"intStaticParent=\"+ intStaticParent);\n}\n//实例块\n{\nSystem.out.println(\"\
  \\nInside instance block of parent\");\nintInstanceParent++;\nintStaticParent++;\n\
  System.out.println(\"intStaticParent changed to :\"+ intStaticParent);\nSystem.out.println(\"\
  intInstanceParent changed to :\"+ intInstanceParent);\ntestMethod();//No compilation\
  \ error\n}\n//构造函数\npublic Parent()\n{\nSystem.out.println(\"\\n Inside Parent()\
  \ constructor\");\nintInstanceParent++;\nintStaticParent++;\nSystem.out.println(\"\
  intStaticParent changed to =\"+ intStaticParent);\nSystem.out.println(\"intInstanceParent\
  \ changed to=\"+ intInstanceParent);\n}\n//静态构造函数是不可能的，只允许 public、private 和 protected\n\
  //static Parent(){}//error\n}\nclass Child extends Parent\n{\n//静态块\nstatic {\n\
  System.out.println(\"\\nInside static block of Child\");\n//intInstanceParent=10;//error\n\
  intStaticParent++;\nSystem.out.println(\"intStaticParent=\"+ intStaticParent);\n\
  }\n//实例块\n{\nSystem.out.println(\"\\nInside instance block of child\");\nintInstanceParent++;\n\
  intStaticParent++;\nSystem.out.println(\"intStaticParent changed to :\"+ intStaticParent);\n\
  System.out.println(\"intInstanceParent changed to :\"+ intInstanceParent);\n}\n\
  //构造函数\npublic Child()\n{\nSystem.out.println(\"\\nInside Child() constructor\"\
  );\nintInstanceParent++;\nintStaticParent++;\nSystem.out.println(\"intStaticParent\
  \ changed to =\"+ intStaticParent);\nSystem.out.println(\"intInstanceParent changed\
  \ to=\"+ intInstanceParent);\n}\n}\npublic class Demonstration3 {\npublic static\
  \ void main(String[] args) {\nSystem.out.println(\"***Demonstration-3.Exploring\
  \ initialization blocks***\\n\");\nParent parentOb=new Child();\nSystem.out.println(\"\
  --------------------\");\n//再次实例化一个对象。\nParent parentOb2=new Child();\n}\n}\n```\n\
  \n输出：\n\n```\n***Demonstration-3.Exploring initialization blocks***\nInside static\
  \ block of Parent\nInside static testMethod(), count =1\nintStaticParent =10\nInside\
  \ static block of Child\nintStaticParent =11\nInside instance block of parent\n\
  intStaticParent changed to :12\nintInstanceParent changed to :1\nInside static testMethod(),\
  \ count =2\nInside Parent() constructor\nintStaticParent changed to =13\nintInstanceParent\
  \ changed to =2\nInside instance block of child\nintStaticParent changed to :14\n\
  intInstanceParent changed to :3\nInside Child() constructor\nintStaticParent changed\
  \ to =15\nintInstanceParent changed to =4\n\nInside instance block of parent\nintStaticParent\
  \ changed to :16\nintInstanceParent changed to :1\nInside static testMethod(), count\
  \ =3\nInside Parent() constructor\nintStaticParent changed to =17\nintInstanceParent\
  \ changed to =2\nInside instance block of child\nintStaticParent changed to :18\n\
  intInstanceParent changed to :3\nInside Child() constructor\nintStaticParent changed\
  \ to =19\nintInstanceParent changed to =4\n```\n\n从演示中，你可以看到以下几点：\n\n*   静态块将首先被执行。\n\
  \n*   在构造函数调用之前，初始化块将被执行。每次实例化对象时都会发生这种情况。\n\n*   你已经知道，父类构造函数将在子类构造函数之前执行。\n\n\
  *   请注意，当你第二次实例化对象时，`intStaticParent` 保持了它的值并持续增加。但 `intInstanceParent` 并非如此。当你实例化另一个对象时，它没有保留其最后的值。\n\
  \n## 方法隐藏与方法重写\n\n在第 5 章，问答 5.24 中，你看到了一个区分隐藏与重写的演示。当时，你还没有详细了解 `static` 关键字。因此，让我们重新审视这个概念。\n\
  \n方法隐藏是 Java 中的一个重要概念。JLS11 是这样说的：\n\n> *“如果一个类* *C* *声明或继承了一个* *static* *方法* *m*，那么*\
  \ *m* *被认为隐藏了任何方法* *m'*，其中* *m* *的签名是* *m'* *签名的子签名（§8.4.2），这些方法存在于* *C* *的超类和超接口中，并且对于*\
  \ *C* *中的代码来说原本是可访问的（§6.6）。如果一个* *static* *方法隐藏了一个实例方法，则会发生编译时错误。”*\n\n为了更好地解释这个概念，我将演示另一个程序来比较方法隐藏与方法重写。要理解这个程序，你需要记住以下几点：*当父类和派生类包含具有相同签名的*\
  \ `static` *方法时，父类的静态方法会被派生类的静态方法隐藏。*\n\n对于非静态方法，方法调用在运行时决定（取决于你当时指向哪个对象），重写在此发挥作用。但在静态方法的情况下，方法调用仅在编译时决定，因此它不依赖于你在运行时指向哪个对象。所以，在第\
  \ 5 章中，你注意到了这样一句话：“方法隐藏与运行时多态性毫无关系。”\n\n### 演示 4\n\n现在让我们分析以下演示和输出，以便更好地理解：\n\n\
  ```\npackage java2e.chapter8;\nclass Parent4 {\nstatic void staticMethod() {\nSystem.out.println(\"\
  I am a static method in Parent4.\");\n}\nvoid nonStaticMethod() {\nSystem.out.println(\"\
  A non-static method in Parent4.\");\n}\n}\nclass Child4 extends Parent4 {\nstatic\
  \ void staticMethod() {\nSystem.out.println(\"Inside Child4 class, I am hiding the\
  \ parent class static method.\");\n}\nvoid nonStaticMethod() {\nSystem.out.println(\"\
  Overriding a non-static method in Parent4.\");\n}\n}\nclass Demonstration4 {\npublic\
  \ static void main(String[] args) {\nSystem.out.println(\"***Demonstration-4.Derived\
  \ class method hides the static method of the parent class***\\n\");\nChild4.staticMethod();//\
  \ 隐藏了父类方法\n// 检查动态方法分派\nParent4 parent = new Child4();\nParent4.staticMethod();//调用父类方法\n\
  System.out.println(\"xxx-Doing a bad practice.Invoking a static method on instance.-xxx\"\
  );\nparent.staticMethod();//不良实践：调用父类方法\nparent.nonStaticMethod();// 调用子类方法\n/*\
  \ 不良实践：\n以下代码也可以调用子类的静态方法。但你会收到警告消息：\n\"staticMethod() from the type Child4 should\
  \ be accessed in a static way\"*/\n//new Child4().staticMethod();\n}\n}\n```\n\n\
  输出：\n\n```\n***Demonstration-4.Derived class method hides the static method of the\
  \ parent class***\nInside Child4 class,I am hiding the parent class static method.\n\
  I am a static method in Parent4.\nxxx-Doing a bad practice.Invoking a static method\
  \ on instance.-xxx\nI am a static method in Parent4.\nOverriding a non-static method\
  \ in Parent4.\n```\n\n在这里，`Child4.staticMethod()` 隐藏了父类方法。此外，你可以看到 `parent.nonStaticMethod()`\
  \ 调用了子类方法，但 `parent.staticMethod()` 调用了父类方法，因为在方法隐藏的情况下，引用变量（这里是 `Parent` 类型）起决定作用，而不依赖于实际调用的对象。\n\
  \n\n\n### 要点提示\n\n*   当父类与派生类包含签名相同的静态方法时，子类的静态方法会隐藏父类的静态方法。\n\n*   在方法隐藏的情况下，被调用的方法版本不依赖于调用对象，而是依赖于引用类型。\n\
  \n*   通过实例调用静态方法完全不是推荐的做法。此处展示仅是为了演示方法隐藏与方法重写的区别。\n\n### 问答环节\n\n**8.3 我理解在 Java\
  \ 中按设计无法重写静态方法。但这一设计背后可能的原因是什么？**\n\n对于静态方法，方法调用仅在编译时决定；也就是说，它不依赖于运行时你指向的是哪个对象。但对于非静态方法，方法调用可以在运行时决定（即取决于那一刻你指向的实际对象）。\n\
  \n## 方法重载\n\n以下演示表明你可以重载静态方法。\n\n### 演示 5\n\n在此程序中，`StaticDemo5` 类包含 `showMe()`\
  \ 方法的不同重载版本。\n\n```\npackage java2e.chapter8;\nclass StaticDemo5 {\nstatic void\
  \ showMe() {\nSystem.out.println(\"Inside showMe().\");\n}\nstatic void showMe(String\
  \ s) {\nSystem.out.println(\"Hi,\" + s +\".You are inside showMe(String s) now.\"\
  );\n}\nstatic void showMe(int i) {\nSystem.out.println(\"Inside showMe(int i),you\
  \ have supplied the argument \" + i +\".\");\n}\n}\nclass Demonstration5 {\npublic\
  \ static void main(String[] args) {\nSystem.out.println(\"***Demonstration-5.Static\
  \ methods can be overloaded***\\n\");\nStaticDemo5.showMe();\nStaticDemo5.showMe(\"\
  John\");\nStaticDemo5.showMe(25);\n}\n}\n```\n\n输出：\n\n```\n***Demonstration-5.Static\
  \ methods can be overloaded***\nInside showMe().\nHi, John.You are inside showMe(String\
  \ s) now.\nInside showMe(int i),you have supplied the argument 25.\n```\n\n**8.4\
  \ 你能编译以下代码吗？**\n\n```\nclass Quiz1 {\nstatic void showMe() {\nSystem.out.println(\"\
  Static method\");\n}\nvoid showMe() {\nSystem.out.println(\"Non-static method\"\
  );\n}\n}\n```\n\n不能。在这种情况下，编译器会在 Eclipse IDE 中引发以下错误：`Duplicate method showMe()\
  \ in type Quiz1`（图 8-4）。\n\n![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig4_HTML.jpg](img/433474_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n`static` 关键字的存在不能确保方法重载\n\n如果方法签名不同，方法重载的概念可以正常工作。在此例中，方法名前包含 `static`\
  \ 关键字不被视为不同的签名。你也可以从另一个角度解释这种行为。例如，你知道 Java 允许通过对象调用静态方法。现在，在这种情况下，如果你有另一个具有相同签名的非静态方法，Java\
  \ 编译器将混淆该调用哪一个。\n\n**8.5 你能编译以下代码吗？**\n\n```\nclass Quiz2 {\nint i;\nstatic void\
  \ showMe() {\nthis.i = 7;\nSystem.out.println(\"Static method\");\n}\n}\n```\n\n\
  不能。在这种情况下，编译器会在 Eclipse IDE 中引发如图 8-5 所示的错误：\n\n![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig5_HTML.jpg](img/433474_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n\n关键字 `this` 不能在静态上下文中使用\n\n在此上下文中，你可以记住 `this` 关键字用于当前对象的上下文。但静态方法可以通过类名调用（而这正是\
  \ `static` 关键字的真正意图）。调用类方法（或静态方法）无需创建对象。\n\n### 问答环节\n\n**8.6 在 C# 中允许静态构造函数，但在\
  \ Java 中不允许。开发者使用静态构造函数能获得什么关键优势？**\n\n每种编程语言都有其优缺点。设计者对于特定功能显然可以有不同想法。在 C# 中，顶级静态类也允许使用静态构造函数。他们认为此功能对于编写日志条目很有用。此功能也可用于为非托管代码（C#\
  \ 支持）创建包装类。\n\n## 接口中的静态方法\n\n从 Java 8 开始，你可以向接口添加静态方法。以下是一个示例：\n\n```\ninterface\
  \ MyInterface {\n// 静态接口方法（Java 8 起）\nstatic void staticMethod() {\nSystem.out.println(\"\
  \\nStatic interface method in MyInterface is called.\");\n}\n}\n```\n\n与类中的静态方法类似，你可以通过在点号后添加接口名称来调用接口中的静态方法，如下所示：\n\
  \n```\nMyInterface.staticMethod();\n```\n\n需要注意的是，如果一个类实现了 `MyInterface`，该实现类可以有自己的\
  \ `staticMethod()` 版本，但在这种情况下，你不能使用 `@Override` 注解。考虑以下代码片段：\n\n```\nclass ClassDemo8\
  \ implements MyInterface{\n//@Override  <- 会导致错误\npublic static void staticMethod()\
  \ {\nSystem.out.println(\"This is the static method of the implementing class(ClassDemo8).\"\
  );\nSystem.out.println(\"You cannot override the static method in MyInterface\"\
  );\n}\n```\n\n\n\n### 演示 6\n\n本章将以演示 6 收尾，在该演示中，你将看到传统接口方法、默认接口方法和静态接口方法的对比研究。\n\
  \n```\npackage java2e.chapter8;\ninterface MyInterface {\n// 传统接口方法\nvoid traditionalInterfaceMethod();\n\
  // 默认接口方法\ndefault void defaultInterfaceMethod() {\nSystem.out.println(\"MyInterface\
  \ 中的默认接口方法被调用。\");\n}\n// 静态接口方法（自 Java 8 起）\nstatic void staticMethod() {\nSystem.out.println(\"\
  MyInterface 中的静态接口方法被调用。\");\n}\n}\nclass ClassDemo8 implements MyInterface {\n\
  @Override\npublic void traditionalInterfaceMethod() {\nSystem.out.println(\"在 ClassDemo8\
  \ 中重写 traditionalInterfaceMethod()\");\n}\n@Override\npublic void defaultInterfaceMethod()\
  \ {\nSystem.out.println(\"在 ClassDemo8 中重写 defaultInterfaceMethod()\");\n}\n// @Override\
  \ // 会导致错误\npublic static void staticMethod() {\nSystem.out.println(\"这是实现类 (ClassDemo8)\
  \ 的静态方法。\");\nSystem.out.println(\"你不能重写 MyInterface 中的静态方法。\");\n}\n}\nclass Demonstration6\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***演示-6. 探索接口中的静态方法。***\\\
  n\");\nSystem.out.println(\"调用静态接口方法。\");\nMyInterface.staticMethod();\nMyInterface\
  \ inter = new ClassDemo8();\nSystem.out.println(\"\\n 从实现类调用默认接口方法。\");\ninter.defaultInterfaceMethod();\n\
  System.out.println(\"\\n 从实现类调用传统接口方法。\");\ninter.traditionalInterfaceMethod();\n\
  System.out.println(\"\\n 从实现类调用静态方法。\");\nClassDemo8.staticMethod();\n// 编译时错误：接口\
  \ MyInterface 的静态方法只能通过 MyInterface.staticMethod() 访问；\n// inter.staticMethod();//错误\n\
  }\n}\n```\n\n输出：\n\n```\n***演示-6. 探索接口中的静态方法。***\n调用静态接口方法。\nMyInterface 中的静态接口方法被调用。\n\
  从实现类调用默认接口方法。\n在 ClassDemo8 中重写 defaultInterfaceMethod()\n从实现类调用传统接口方法。\n在 ClassDemo8\
  \ 中重写 traditionalInterfaceMethod()\n从实现类调用静态方法。\n这是实现类 (ClassDemo8) 的静态方法。\n你不能重写\
  \ MyInterface 中的静态方法。\n```\n\n输出结果不言自明。不过，我还是想提请你注意以下几点：\n\n*   你可以在实现类中对默认方法应用\
  \ `@Override` 注解，但如果将其应用于静态方法，则会收到编译时错误。\n\n*   请注意，下面这行代码\n\n```\n// inter.staticMethod();//错误\n\
  ```\n\n会导致编译时错误。（在此上下文中，你能想起 Java 中的静态方法不能被重写吗？）因此，你需要像下面这样使用接口名来调用接口的静态方法：\n\n\
  ```\nMyInterface.staticMethod();//正确\n```\n\n## 总结\n\n本章涵盖了以下内容：\n\n*   静态类、静态方法和静态变量的概念\n\
  *   不同类型的初始化块及其用法\n*   重温 Java 中的方法隐藏与方法重写\n*   接口中的静态方法，以及它们与传统接口方法或默认方法的区别\n*\
  \   如何在 Java 中实现这些概念以及与之相关的限制\n\n"
- '# 9. 面向对象原则快速回顾


  欢迎来到第一部分的最后一章。到目前为止，你已经使用 Java 中的基本构建块学习了面向对象编程的基础知识。在进入第二部分之前，让我们回顾一下本书中已经涵盖的核心原则。


  *   **类和对象**。在本书中，几乎每个示例都使用了不同类型的类和对象。`static` 关键字的使用略有不同，你通过类名访问了静态字段。


  *   **多态性**。涵盖了两种类型的多态性。编译时多态性通过方法重载来涵盖，运行时多态性通过方法重写技术来涵盖。你已经看到动态方法分派是 Java 中的一个重要概念。


  *   **抽象性**。此特性通过抽象类和接口进行了测试。


  *   **封装性**。每个具有不同访问修饰符的类都可以归入此类别。但更好的例子是包含私有成员和 getter-setter 方法的类。根据专家的建议，你应该将实例变量设为私有，并通过公共的
  getter-setter 方法访问它们。


  *   **继承性**。你在多个章节中探索了不同类型的继承。


  *   **消息传递**。通常，给对象的消息是请求调用接收对象中的方法。简单来说，消息传递就是不同对象之间的通信。此特性在多线程环境中非常常见。但你在运行时多态性中进行了实验，其中超类引用指向子类对象，这也可以归入此类别。多线程将在本书的第
  11 章中讨论。


  *   **动态绑定**。通过方法重写示例实现的运行时多态性可以归入此类别。


  ## 问答环节


  **9.1 你能总结一下抽象性和封装性的区别吗？**


  将数据和方法包装成一个单一实体的过程称为**封装性**。使用此技术，你可以防止对数据的任意和不安全访问。你可以使用不同的访问修饰符来限制对数据的直接访问。但使用
  getter 和 setter 方法是此类别中更好的例子。在封装的情况下，你的整个代码像一个胶囊一样工作，因此被称为封装。


  在抽象性中，你展示基本特征，但向用户隐藏详细的实现（或背景细节）；例如，当你使用遥控器打开电视时，设备的内部电路不是你所关心的。只要按下按钮后你喜欢的频道能正常显示在电视上，你就对设备满意。



  ### 注意


  封装关注的是真正的实现，即*如何*进行实现，而抽象关注的是实现*能*为你做什么。但这两个概念是相互关联的。因此，为了获得良好的抽象，你的实现应该被恰当地封装。


  Grady Booch 在其著名著作《面向对象分析与设计（原书第 3 版）》（Addison-Wesley）中写道：“抽象关注的是对象的可观察行为，而封装关注的是产生该行为的实现。封装通常通过信息隐藏（不仅仅是数据隐藏）来实现，这是一个隐藏对象中所有与其基本特征无关的秘密的过程。”


  你可以重新查阅第 1 章来了解这些定义。


  **9.2 编译时多态和运行时多态，哪个更快？**


  一般来说，如果你能提前解析一个调用（例如，方法的调用），它会更快。这就是为什么你可以得出结论：编译时绑定比运行时绑定或多态更快——因为预先知道要调用哪个方法。


  **9.3 你之前告诉我们继承并不总是能提供最佳解决方案。能详细说明一下吗？**


  在某些情况下，组合可以提供更好的解决方案。但要理解组合，你可能需要了解这些概念：


  *   关联

  *   聚合


  **关联**可以是单向的或双向的。当你看到这种 UML 图时，它意味着 ClassA 知道 ClassB，但反过来则不成立。


  ![../images/433474_2_En_9_Chapter/433474_2_En_9_Figa_HTML.jpg](img/433474_2_En_9_Figa_HTML.jpg)


  下图表示一个双向关联，因为两个类彼此都知道对方。


  ![../images/433474_2_En_9_Chapter/433474_2_En_9_Figb_HTML.jpg](img/433474_2_En_9_Figb_HTML.jpg)


  考虑一个例子。在一所大学里，一个学生可以向多位老师学习，一位老师也可以教多位学生。在这种关系中不存在*所有权*。因此，当你在编程中用类和对象来表示它们时，可以说这两种对象都可以独立地创建和删除。


  **聚合**是一种更强的关联类型。教授和系之间的聚合关系可以表示如下。


  ![../images/433474_2_En_9_Chapter/433474_2_En_9_Figc_HTML.jpg](img/433474_2_En_9_Figc_HTML.jpg)


  让我们深入探讨一下。假设 X 教授向他的现任职机构提交了辞职信，准备加入一个新机构。尽管 X 教授和他的原机构彼此之间都可以独立存在，但 X 教授需要与某个机构中的一个系关联起来。在这种情况下，你可以说系是这种关系的所有者，并且系拥有教授。


  类似地，你可以说人体拥有手，汽车拥有座椅，自行车拥有轮胎，等等。


  ### 注意


  通常，我们说一个系拥有一个教授。这就是为什么关联关系也被称为 **“has-a”**（拥有）关系。（你可以在这里记下与继承的关键区别。继承与 **“is-a”**（是一个）关系相关联。）


  **组合**是聚合的一种更强形式，此时你使用实心菱形来表示。


  ![../images/433474_2_En_9_Chapter/433474_2_En_9_Figd_HTML.jpg](img/433474_2_En_9_Figd_HTML.jpg)


  大学里的一个系不能脱离大学而存在。大学只能创建或关闭其下属的系。（你可能会争辩说，如果根本没有系，大学也无法存在，但你不必考虑这种极端情况来把事情复杂化。）换句话说，一个系的生命周期完全依赖于其所属的大学。这也被称为**死亡关系**，因为如果你摧毁了大学，它所有的系也会自动被摧毁。类似地，你可以说人体的手（或腿等）不能脱离身体而存在。


  ## 重新审视菱形问题


  为了展示聚合/组合的能力，让我们重新审视第 4 章中讨论过的菱形问题，然后分析下面的程序。我们从以下代码开始。


  ```

  class Parent {

  public void show() {

  System.out.println("I am in Parent");

  }

  }

  class Child1 extends Parent {

  public void show() {

  System.out.println("I am in Child1");

  }

  }

  class Child2 extends Parent {

  public void show() {

  System.out.println("I am in Child2");

  }

  }

  ```


  Java 不允许你编写类似下面的代码：


  ```

  class GrandChild extends Child1,Child2// Error: Not supported in Java

  {

  public void show() {

  System.out.println("I am in Grandchild");

  }

  }

  ```


  ### 演示 1


  现在，让我们看看如何使用聚合（组合的一种较弱形式）来处理这种情况。考虑以下代码：


  ```

  package java2e.chapter9;

  class Parent {

  public void show() {

  System.out.println("I am in Parent");

  }

  }

  class Child1 extends Parent {

  @Override

  public void show() {

  System.out.println("I am in Child1");

  }

  }

  class Child2 extends Parent {

  @Override

  public void show() {

  System.out.println("I am in Child2");

  }

  }

  //Not supported in Java

  /*

  * class GrandChild extends Child1,Child2// Error: Not supported in Java {

  * public void show() { System.out.println("I am in Grandchild"); } }

  */

  class GrandChild {

  Child1 ch1 ;

  Child2 ch2 ;

  GrandChild() {

  ch1 = new Child1();

  ch2 = new Child2();

  }

  public void showFromChild1() {

  ch1.show();

  }

  public void showFromChild2() {

  ch2.show();

  }

  }

  ```


  以下是包含 `main()` 方法的 `Demonstration1.java` 代码：


  ```

  class Demonstration1 {

  public static void main(String[] args) {

  System.out.println("***Demonstration-1.The concept of aggregation/composition to
  handle the diamond Problem***\n");

  GrandChild gChild = new GrandChild();

  gChild.showFromChild1();

  gChild.showFromChild2();

  }

  }

  ```


  输出：


  ```

  ***Demonstration-1.The concept of aggregation/composition to handle the diamond
  Problem***

  I am in Child1

  I am in Child2

  ```


  你可以看到，`Class1` 和 `Class2` 都重写了它们父类的 `show()` 方法。而 `Grandchild` 类没有自己的 `show()` 方法。尽管如此，你仍然可以通过
  `Grandchild` 对象调用那些特定于类的方法。


  `Grandchild` 类允许你在其构造函数体内创建来自 `Class1` 和 `Class2` 的对象。在前面的例子中，尽管 `Child1` 和 `Child2`
  对象可以在没有 `Grandchild` 对象的情况下存活，但这里并没有来自 `Class1` 或 `Class2` 的独立对象。因此，在这种实现中，如果你的应用程序中不存在
  `Grandchild` 对象（假设已被垃圾回收），那么系统中就不会存在任何 `Class1` 或 `Class2` 对象。你也可以对用户施加一些限制，使他们无法在应用程序中直接创建
  `Class1` 和 `Class2` 的对象；为简单起见，我忽略了这部分。


  ### 注意


  你已经了解了泛化、特化和实现。你在应用程序中已经使用过这些概念。当你的类继承另一个类（即继承）时，你使用了**泛化**和**特化**的概念；例如，足球运动员是运动员的一种特殊类型（特化）。或者，你可以说足球运动员和篮球运动员都是运动员（泛化）。而当你的类实现一个接口时，你使用了**实现**的概念。




