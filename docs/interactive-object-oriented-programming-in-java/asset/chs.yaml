  \n## 创建自定义异常\n\n你已经看到了一些 Java 内置异常的常见用法。这些异常非常方便，并且在大多数情况下可以满足你的需求。但有时你可能希望定义自己的异常类，以获取对你更有意义的信息。因此，你可能希望创建自己的异常来处理应用程序中的某些特定情况。\n\
  \n创建自定义异常很容易。但在继续之前，你应该记住以下几点：\n\n*   创建用户自定义异常类的常见做法是继承 `Exception` 类。你已经了解到 `Exception`\
  \ 是 `Throwable` 类的子类。因此，你可以重写或使用 `Throwable` 类中定义的方法。\n\n*   `Exception` 类本身没有特定的方法。但在这里你会看到不同的重载构造函数版本；例如，你会注意到存在以下构造函数。在关于链式异常的讨论中，你已经了解了其中两个。在接下来的演示中，你将看到另外两个的用法：\n\
  \n*   按照惯例，建议在创建自己的异常时，类名应以单词 `Exception` 结尾。\n\n```\npublic Exception() {}\npublic\
  \ Exception(String message) {}\npublic Exception(String message, Throwable cause)\
  \ {}\npublic Exception(Throwable cause) {}\nprotected Exception(String message,\
  \ Throwable cause, boolean enableSuppression, boolean writableStackTrace) {}\n```\n\
  \n\n\n### 演示 10\n\n让我们开始。为简单起见，假设你只需要考虑两个整数输入。当且仅当总和小于或等于 100 时，你才会显示这两个整数的和。如果它不小于\
  \ 100，你将抛出自定义异常。\n\n```\npackage java2e.chapter10;\nclass SumGreaterThan100Exception\
  \ extends Exception {\nSumGreaterThan100Exception() {\nSystem.out.println(\"大于 100。\"\
  );\n}\nSumGreaterThan100Exception(String msg) {\nsuper(msg);\n}\n}\ninterface DemoInterface\
  \ {\nint sum(int x, int y) throws SumGreaterThan100Exception;\n}\nclass Demo10Class\
  \ implements DemoInterface {\npublic int sum(int x, int y) throws SumGreaterThan100Exception\
  \ {\nint sumofIntegers = x + y;\nif (sumofIntegers <= 100) {\nSystem.out.println(\"\
  \ 这里第一个数=\"+ x + \" 第二个数=\"+y);\nreturn sumofIntegers;\n} else {\nSystem.out.println(\"\
  \ 现在第一个数=\"+ x + \" 第二个数=\"+y);\nthrow new SumGreaterThan100Exception(\"总和大于 100。\"\
  );\n//throw new SumGreaterThan100Exception();\n}\n}\n}\nclass Demonstration10 {\n\
  public static void main(String args[]) {\nSystem.out.println(\"***演示-10.创建自定义异常***\\\
  n\");\nDemo10Class demo = new Demo10Class();\ntry {\nint result = demo.sum(10, 50);//\
  \ 正常\nSystem.out.println(\"10 和 50 的和是：\" + result);\n// 现在总和大于 100，因此会引发自定义异常。\n\
  result = demo.sum(50, 70);\nSystem.out.println(\"50 和 70 的和是：\" + result);\n} catch\
  \ (SumGreaterThan100Exception e) {\nSystem.out.println(\"捕获到自定义异常：\" + e);\ne.printStackTrace();\n\
  }\n}\n}\n```\n\n输出：\n\n```\n***演示-10.创建自定义异常***\n这里第一个数=10 第二个数=50\n10 和 50 的和是：60\n\
  现在第一个数=50 第二个数=70\n捕获到自定义异常：java2e.chapter10.SumGreaterThan100Exception: 总和大于 100。\n\
  java2e.chapter10.SumGreaterThan100Exception: 总和大于 100。\nat java2e.chapter10.Demo10Class.sum(Demonstration10.java:25)\n\
  at java2e.chapter10.Demonstration10.main(Demonstration10.java:39)\n```\n\n你使用了带参数的构造函数。如果你想使用默认构造函数（此处已注释），则会显示略有不同的消息。\n\
  \n```\n***演示-10.创建自定义异常***\n这里第一个数=10 第二个数=50\n10 和 50 的和是：60\n现在第一个数=50 第二个数=70\n\
  大于 100。\n捕获到自定义异常：java2e.chapter10.SumGreaterThan100Exception\njava2e.chapter10.SumGreaterThan100Exception\n\
  at java2e.chapter10.Demo10Class.sum(Demonstration10.java:26)\nat java2e.chapter10.Demonstration10.main(Demonstration10.java:39)\n\
  ```\n\n### 问答环节\n\n**10.10 我知道 Java 不支持指针。但我看到它支持 NullPointerException。这让我很困惑。**\n\
  \n你需要理解这个场景。当你通过一个空对象执行某些非法操作时（例如，错误地调用方法或尝试访问某些字段），就会遇到这个异常。这个异常通常表明你正在将一个空对象当作实际对象来处理，因此你的预期操作是非法的。是的，一些开发者认为像\
  \ `NullReferenceException` 这样的名称可能更适合这种类型的异常。\n\n同时，你也要记住，Java 的设计者认为指针的使用是向应用程序引入错误的主要来源之一。因此，他们不支持任何指针数据类型。\n\
  \n**10.11 在我看来，我可以用异常来抑制错误。我说得对吗？**\n\n是的。但这绝不是设计初衷。请考虑以下演示。\n\n### 演示 11\n\n在这个例子中，当你得到\
  \ `b` 的值为 0（随机生成）时，你没有报告真正的问题，而是通过打印 `c=7` 来抑制错误，这是对该功能的完全滥用。\n\n```\npackage java2e.chapter10;\n\
  import java.util.Random;\npublic class Demonstration11 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***演示-11.try-catch 块的不正确使用***\\n\");\nint a = 10;\n\
  Random randomGenerator = new Random();\n// 将生成 0 到 2。\nint b = randomGenerator.nextInt(3);\n\
  System.out.println(\"b=\" + b);\nint c = 0;\ntry {\nc = a / b;\nSystem.out.println(\"\
  c=\" + c);\n} catch (ArithmeticException ex) {\n// 捕获异常后打印 c=7\nSystem.out.println(\"\
  c=\" + 7);\n}\n}\n}\n```\n\n这是一个**可能的**输出。当你遇到 `ArithmeticException` 并使用 `try-catch`\
  \ 块来抑制真实消息时，你会得到这个输出，这是不正确的。\n\n```\n***演示-11.try-catch 块的不正确使用***\nb=0\nc=7\n```\n\
  \n### 问答环节\n\n**10.12 我应该让我的自定义异常是受检异常（还是非受检异常）？**\n\n如果你能做一些事情来从异常中恢复，就将其设为受检异常；否则，就设为非受检异常。根据你的需求，你可以遵循演示\
  \ 7 或演示 8 的方法，将你的自定义异常设为受检或非受检。\n\n**10.13 你之前说过，“你可以将原始异常与自定义异常消息结合起来，然后重新抛出它，以获得更好的可读性。”你能给我演示一下吗？**\n\
  \n在 Java 编程世界中，捕获内置异常并通过自定义异常重新抛出同一个异常以获得更好的可读性和理解性是非常常见的。我在讨论演示 6 时提到过这一点。\n\n\
  ### 演示 12\n\n让我们修改演示 6，以便你能体验同样的效果：\n\n```\npackage java2e.chapter10;\n//一个自定义异常\n\
  class InvalidIntegerInputException extends Exception {\nInvalidIntegerInputException(String\
  \ msg,Throwable causeEx) {\nsuper(msg, causeEx);\n}\n}\nclass Demonstration12 {\n\
  static int c;\nstatic void divide(int a, int b) throws  InvalidIntegerInputException{\n\
  try {\nb--;\nc = a / b;\n// 一些代码\n} catch (ArithmeticException ex) {\n// 现在记录它\n\
  System.out.println(\"a= \" + a + \" b= \" + b);//a=100,b=0\nSystem.out.println(\"\
  消息：\" + ex.getMessage());\n// 现在重新抛出它\nthrow new InvalidIntegerInputException(\"\
  \ 除数变为零\", ex);\n}\n}\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示-12.重新抛出包装在自定义异常中的异常。***\");\nSystem.out.println(\"实际上，我们正在修改演示-6。\");\nint\
  \ a = 100, b = 1;\ntry {\ndivide(a,b);\n}\ncatch (Exception ex) {\nSystem.out.println(\"\
  在 main() 方法中重新捕获了异常。\");\nSystem.out.println(\"a= \" + a + \" b= \" + b);//a=100,b=1\n\
  System.out.println(\"这是堆栈跟踪：\");\nex.printStackTrace();\n}\n}\n}\n```\n\n输出：\n\n\
  ```\n***演示-12.重新抛出包装在自定义异常中的异常。***\n实际上，我们正在修改演示-6。\na= 100 b= 0\n消息：/ by zero\n\
  在 main() 方法中重新捕获了异常。\na= 100 b= 1\n这是堆栈跟踪：\njava2e.chapter10.InvalidIntegerInputException:\
  \  除数变为零\nat java2e.chapter10.Demonstration12.divide(Demonstration12.java:23)\n\
  at java2e.chapter10.Demonstration12.main(Demonstration12.java:32)\nCaused by: java.lang.ArithmeticException:\
  \ / by zero\nat java2e.chapter10.Demonstration12.divide(Demonstration12.java:16)\n\
  ... 1 more\n```\n\n注意输出中出现的消息“除数变为零”，这是此程序中 `ArithmeticException` 的实际原因。\n\n\n\n\
  ## 本章小结\n\n本章回答了以下问题：\n\n*   什么是异常？\n*   如何在程序中处理错误？\n*   Java 中处理异常时常用的关键字有哪些？\n\
  *   应如何在程序中放置 `try`、`catch` 和 `finally` 块，它们的作用是什么？\n*   `catch` 子句有哪些不同的变体？\n*\
  \   如何抛出异常？\n*   如何重新抛出异常？\n*   `throw` 和 `throws` 有何不同？\n*   如何对异常进行分类？受检异常与非受检异常有何区别？\n\
  *   如何创建链式异常？\n*   如何创建自定义异常？\n*   如何捕获内置异常并将其与自定义异常结合使用？\n\n"
- "# 11. 线程编程\n\n到目前为止，你所看到的 Java 程序都只有一个顺序执行的控制流；换句话说，一旦程序开始执行，它会按顺序执行所有语句直到结束。因此，在某一特定时刻，只有一条语句正在执行。\n\
  \n线程类似于程序。它有一个单一的控制流。它也有一个介于起点和终点之间的主体，并按顺序执行命令。每个程序至少有一个线程。\n\nJava 支持多线程的概念；也就是说，在\
  \ Java 中，一个程序可以有多个控制流。在这些情况下，每个控制流被称为一个线程，并且这些线程可以并行运行。在多线程环境中，每个线程都有独特的执行流程。\n\n\
  这是一种编程范式，它将程序划分为多个可以并行执行的子程序（或部分）。但如果计算机只有一个处理器，它如何能并行执行多个任务呢？实际上，处理器在这些子程序/部分之间切换得非常快，因此在人眼看来，它们似乎是在同时执行。\n\
  \n多线程可以被视为多任务处理的一种特殊情况。注意基于进程的多线程和基于线程的多线程之间的区别非常重要。让我们探究一下理论操作系统书籍中的论述。表 11-1 展示了进程与线程之间的关键区别。\n\
  \n**表 11-1**\n\n**进程与线程的对比**\n\n| **进程** | **线程** |\n| --- | --- |\n| 1. 分配单元 |\
  \ 1. 执行单元 |\n| 2. 架构构造 | 2. 编码构造——不影响架构 |\n| 3. 每个进程有一个或多个线程。 | 3. 每个线程属于一个进程。 |\n\
  | 4. 进程间通信（常称为 IPC）——由于上下文切换而代价高昂 | 4. 线程间通信——代价低廉，可以使用进程内存，且可能不需要上下文切换 |\n| 5.\
  \ 安全——一个进程不能破坏另一个进程 | 5. 不安全——一个线程可以写入另一个线程使用的内存 |\n\n因此，线程只是一个轻量级进程*，*并且线程之间的上下文切换代价低廉。基于进程的多*任务*处理*不*在\
  \ Java 的控制之下*，*但 Java 可以管理基于线程的多*任务*处理。因此，在本章中，我们将重点讨论基于线程的多*任务*处理*，*并且*从*这里*开始*，我将简称为多*线程*。\n\
  \n管理多线程环境可能具有挑战性，但这对你来说是一个福音，因为你可以更快地完成任务，并显著减少总体空闲时间。考虑一些典型场景：通常，在自动化环境中，计算机的输入速度远快于用户的键盘输入速度。或者，考虑通过网络传输数据的情况——网络传输速率可能慢于接收计算机的消费速率。如果你必须等待每个任务完成才能开始下一个任务，那么总体空闲时间将会更高。因此，在这种情况下，多线程环境始终是更好的选择。Java\
  \ 帮助你高效地建模多线程环境。\n\n图 11-1 展示了一个多线程程序，其中主线程创建了两个并发运行的线程——线程 A 和线程 B。\n\n![../images/433474_2_En_11_Chapter/433474_2_En_11_Fig1_HTML.jpg](img/433474_2_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1**\n\n在多线程程序中，主线程创建另外两个线程，它们全部并行运行\n\n## 创建线程\n\n可以通过以下方式创建线程：\n\n*  \
  \ **继承 Thread 类**并重写 `run()` 方法。\n*   **实现 Runnable 接口**。`Runnable` 接口只有一个名为 `run()`\
  \ 的方法。因此，当一个具体类实现此 `Runnable` 接口时，它必须重写 `run()` 方法。\n\n所以，你可以猜到每个线程都必须有一个 `run()`\
  \ 方法。此方法是线程的核心，你可以在 `run()` 方法的主体中实现线程的行为。\n\n### 作者注\n\n如果你查看 `java.lang.Thread`\
  \ 类的实现，你会注意到以下代码行：\n\n```\npublic class Thread implements Runnable {//some code}\n\
  ```\n\n这意味着 `Thread` 类本身实现了 `Runnable` 接口。\n\n## 继承 Thread 类\n\n在演示 1 中，有两个类——`ThreadOne`\
  \ 和 `ThreadTwo`。每个类都继承 `Thread` 类并重写 `run()` 方法。但你的工作还没有结束。你需要准备好线程，使其处于 Java 运行时调度程序可以运行它们的状态。因此，你需要为每个线程创建一个对象并调用\
  \ `start()` 方法。\n\n在演示 1 中，你会注意到 `ThreadOne` **类**及其**对象** `threadOne` 的以下代码行（注意相关注释，以便你更好地理解）：\n\
  \n```\n//ThreadOne extends from a Thread class here\nclass ThreadOne extends Thread{\n\
  //An instance of ThreadOne\nThreadOne threadOne=new ThreadOne();\n```\n\n你会注意到 `ThreadTwo`\
  \ **类**及其**对象** `threadTwo` 的类似代码行。最后，以下代码行将调用相应线程的 `run()` 方法：\n\n```\nthreadOne.start();\n\
  threadTwo.start();\n```\n\n\n\n### 演示 1\n\n现在，让我们来看演示 1。\n\n```\npackage java2e.chapter11;\n\
  //ThreadOne 继承自 Thread 类\nclass ThreadOne extends Thread {\n@Override\npublic void\
  \ run() {\nfor (int i = 0; i \" + i);\n}\nSystem.out.println(\"退出-ThreadOne\");\n\
  }\n}\n//ThreadTwo 继承自 Thread 类\nclass ThreadTwo extends Thread {\n@Override\npublic\
  \ void run() {\nfor (int i = 0; i \" + i);\n}\nSystem.out.println(\"退出-ThreadTwo\"\
  );\n}\n}\nclass Demonstration1 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示-1.通过继承 Thread 类探索多线程。***\");\n//ThreadOne 的实例\nThreadOne threadOne=new ThreadOne();\n\
  //ThreadTwo 的实例\nThreadTwo threadTwo=new ThreadTwo();\n//以下代码将调用对应线程的 run() 方法。\n\
  threadOne.start();\nthreadTwo.start();\n}\n}\n```\n\n这是第一次运行的输出：\n\n```\n***演示-1.通过继承\
  \ Thread 类探索多线程。***\nThreadOne 打印 ->0\nThreadTwo 打印 ->0\nThreadOne 打印 ->1\nThreadTwo\
  \ 打印 ->1\nThreadOne 打印 ->2\nThreadTwo 打印 ->2\nThreadOne 打印 ->3\nThreadTwo 打印 ->3\n\
  ThreadOne 打印 ->4\nThreadTwo 打印 ->4\nThreadOne 打印 ->5\nThreadTwo 打印 ->5\nThreadTwo\
  \ 打印 ->6\nThreadTwo 打印 ->7\nThreadTwo 打印 ->8\nThreadTwo 打印 ->9\n退出-ThreadTwo\nThreadOne\
  \ 打印 ->6\nThreadOne 打印 ->7\nThreadOne 打印 ->8\nThreadOne 打印 ->9\n退出-ThreadOne\n```\n\
  \n这是第二次运行的输出：\n\n```\n***演示-1.通过继承 Thread 类探索多线程。***\nThreadOne 打印 ->0\nThreadTwo\
  \ 打印 ->0\nThreadOne 打印 ->1\nThreadOne 打印 ->2\nThreadOne 打印 ->3\nThreadOne 打印 ->4\n\
  ThreadOne 打印 ->5\nThreadOne 打印 ->6\nThreadOne 打印 ->7\nThreadOne 打印 ->8\nThreadTwo\
  \ 打印 ->1\nThreadTwo 打印 ->2\nThreadTwo 打印 ->3\nThreadOne 打印 ->9\nThreadTwo 打印 ->4\n\
  退出-ThreadOne\nThreadTwo 打印 ->5\nThreadTwo 打印 ->6\nThreadTwo 打印 ->7\nThreadTwo 打印\
  \ ->8\nThreadTwo 打印 ->9\n退出-ThreadTwo\n```\n\n请注意，第一次运行的输出与第二次运行不同。一旦这些线程开始并发运行，你就无法预测它们的执行顺序。每个线程在获得处理器时都可以运行。在本例中，它们都具有相同的优先级，因此\
  \ Java 调度器允许它们基于先到先服务（FCFS）原则共享处理器。稍后你将看到，如果你愿意，可以通过设置优先级来选择执行顺序。\n\n### 注意\n\n\
  当你执行一个 Java 程序时，一个线程会自动启动。这个线程被称为**主线程**。因此，演示 1 中的 `main()` 方法创建了主线程，该线程在 `main()`\
  \ 方法结束时终止。\n\n## 实现 Runnable 接口\n\n让我们探讨另一种创建线程的方式。这次，我将实现 `Runnable` 接口来创建线程。在这种情况下，你需要执行以下步骤：\n\
  \n1.  声明一个实现 `Runnable` 接口的类。例如：\n\n1.  实现 `run()` 方法。请参见演示 2 中的以下代码行：\n\n```\n\
  class Thread2A implements Runnable{//其他代码\n```\n\n1.  使用以下 `Thread` 类构造函数创建一个 `Thread`\
  \ 类对象：\n\n```\nclass Thread2A implements Runnable {\n@Override\npublic void run()\
  \ {//其他代码}\n}\n```\n\n```\npublic Thread(Runnable target) {}.\n```\n\n因此，在演示 2 中，你可以在\
  \ `main` 方法内看到以下代码行：\n\n1.  调用线程的 `start` 方法，如下所示：\n\n```\n//Thread2A 实现了 Runnable\
  \ 接口\nThread thread2A=new Thread(new Thread2A());\n```\n\n```\nthread2A.start();\n\
  ```\n\n### 演示 2\n\n以下是示例：\n\n```\npackage java2e.chapter11;\nclass Thread2A implements\
  \ Runnable {\n@Override\npublic void run() {\nfor (int i = 0; i \" + i);\n}\nSystem.out.println(\"\
  退出-Thread2A\");\n}\n}\nclass Demonstration2 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***演示-2.通过实现 Runnable 接口探索多线程。***\");\n//Thread2A\
  \ 实现了 Runnable 接口\nThread thread2A = new Thread(new Thread2A());\nthread2A.start();\n\
  System.out.println(\"从主线程退出\");\n}\n}\n```\n\n以下是其中一种可能的输出：\n\n```\n***演示-2.通过实现\
  \ Runnable 接口探索多线程。***\n从主线程退出\nThread2A 打印 ->0\nThread2A 打印 ->1\nThread2A 打印 ->2\n\
  Thread2A 打印 ->3\nThread2A 打印 ->4\nThread2A 打印 ->5\nThread2A 打印 ->6\nThread2A 打印\
  \ ->7\nThread2A 打印 ->8\nThread2A 打印 ->9\n退出-Thread2A\n```\n\n在演示 2 中，`Thread2A`\
  \ 类实现了 `Runnable` 接口，因此 `Thread2A` 的对象变成了 `Runnable` 类型。但 `Thread2A` 的对象**不是**线程。\n\
  \n因此，请按如下方式修改你的 `main()` 方法（请注意加粗的行/词，供你参考）：\n\n```\nclass Demonstration2Modified\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***演示-2.通过实现\
  \ Runnable 接口探索多线程。***\");\nThread thread2A = new Thread(new Thread2A());// //Thread2A\
  \ 实现了 Runnable 接口\nthread2A.start();\n/* Thread2A 类实现了 Runnable 接口，因此\n* Thread2A\
  \ 的对象变成了 Runnable 类型。\n* 但 Thread2A 的对象不是线程。\n*/\nSystem.out.println(\"创建另一个 Thread2A\
  \ 对象\");\nThread2A anotherObject=new Thread2A();\nanotherObject.run();\nSystem.out.println(\"\
  从主线程退出\");\n}\n}\n```\n\n你可能会注意到一个令人惊讶的输出，如下所示：\n\n```\n***演示-2.通过实现 Runnable 接口探索多线程。***\n\
  创建另一个 Thread2A 对象\nThread2A 打印 ->0\nThread2A 打印 ->0\nThread2A 打印 ->1\nThread2A 打印\
  \ ->1\nThread2A 打印 ->2\nThread2A 打印 ->3\nThread2A 打印 ->4\nThread2A 打印 ->5\nThread2A\
  \ 打印 ->6\nThread2A 打印 ->7\nThread2A 打印 ->8\nThread2A 打印 ->2\nThread2A 打印 ->3\nThread2A\
  \ 打印 ->4\nThread2A 打印 ->5\nThread2A 打印 ->6\nThread2A 打印 ->7\nThread2A 打印 ->8\nThread2A\
  \ 打印 ->9\n退出-Thread2A\n从主线程退出\nThread2A 打印 ->9\n退出-Thread2A\n```\n\n在这种情况下，尽管你调用了\
  \ `run()` 方法，但它是在同一个线程中被调用的。要在一个新线程中运行它，你需要实例化并启动一个新的 `Thread` 对象。\n\n### 注意\n\n\
  当一个类实现 `Runnable` 接口时，它涉及两个对象——一个是 `Runnable` 对象，另一个是 `Thread` 对象。`Runnable` 对象包含线程开始运行时执行的代码。因此，在\
  \ `Thread` 对象的执行过程中，你可以看到 `Runnable` 对象的 `run()` 方法的执行。\n\n\n\n### 问答环节\n\n**11.1\
  \ 使用多线程环境相比单线程环境的关键优势是什么？**\n\n在单线程环境中，如果线程被阻塞，整个程序就会停止执行，而在多线程环境中则不会出现这种情况。除此之外，你还可以通过高效利用\
  \ CPU 来减少总体空闲时间。稍后你将了解到，在多线程环境中可以避免轮询。\n\n**11.2 我有一台双核（或多核）系统。多线程还能帮到我吗？**\n\n\
  早期，大多数计算机只有一个核心，在这些系统中，并发线程实际上共享 CPU 时间片；也就是说，它们无法并行运行。但是，通过使用多线程的概念，你可以通过高效利用 CPU\
  \ 来减少总体空闲时间。如果你有多个处理器，则可以并发运行多个线程。因此，你可以进一步提高程序的速度。\n\n**11.3 什么是上下文切换？**\n\n它使你能够保存当前线程（或进程）的状态，以便稍后可以从该点恢复执行。\n\
  \n**11.4 创建线程时应该使用哪种方法？我应该继承** **Thread** **类，还是应该实现** **Runnable** **接口？**\n\n\
  这取决于你的选择以及许多其他约束条件。如果你的类继承了 `Thread` 类，则无法再继承任何其他类，因为 Java 不允许通过类进行多重继承。当你实现 `Runnable`\
  \ 接口时，你可以继承另一个父类。\n\n另一方面，`Runnable` 接口只有一个方法 `run()`，它也是一个抽象方法（根据接口定义）。因此，没有完全内置的方法可供你直接使用。但是\
  \ `Thread` 类有许多内置方法，例如 `yield()`、`sleep()`、`getName()`、`setName()` 等。如果你的类继承了 `Thread`\
  \ 类，则可以使用这些方法。此外，在实例化 `Thread` 类时，你可以使用不同类型的构造函数。\n\n### 演示 3\n\n现在考虑演示 3。在继续之前，这里有一些重要的点需要考虑：\n\
  \n*   这次我使用了 `Thread` 类构造函数的重载版本来创建线程。在这个版本中，我可以在线程实例化期间提供线程的名称。\n\n*   我还使用了 `Thread`\
  \ 类中的一些可用方法；例如，`currentThread()`、`getName()`、`setName()`、`getPriority()` 和 `setPriority()`。如前所述，如果你选择通过实现\
  \ `Runnable` 接口来创建线程，这些方法将不可用。\n\n*   方法 `setPriority(int newPriority)` 用于设置线程的优先级。Java\
  \ 定义了以下优先级：\n\n```\n    //线程的最小优先级\n    public final static int MIN_PRIORITY = 1;\n\
  \    //线程的默认优先级\n    public final static int NORM_PRIORITY = 5;\n    ```\n\n```\n\
  //线程的最大优先级\npublic final static int MAX_PRIORITY = 10;\n```\n\n以下是完整的实现：\n\n```\n\
  package java2e.chapter11;\nclass Thread3A extends Thread {\npublic Thread3A(String\
  \ name) {\nsuper(name);\n}\npublic void run() {\nfor (int i = 0; i < 10; i++) {\n\
  System.out.println(this.getName() + \" is executing and prints : \"+ i);\n}\nSystem.out.println(\"\
  Exit-\"+ this.getName());\n}\n}\nclass Thread3B extends Thread {\npublic Thread3B(String\
  \ name) {\nsuper(name);\n}\npublic void run() {\nfor (int i = 0; i < 10; i++) {\n\
  System.out.println(this.getName() + \" is executing.It is printing : \"+i);\n}\n\
  System.out.println(\"Exit-\"+ this.getName());\n}\n}\nclass Demonstration3 {\npublic\
  \ static void main(String[] args) throws InterruptedException {\nSystem.out.println(\"\
  ***Demonstration-3.Exploring multithreading by extending Thread class.***\");\n\
  // 获取主线程的引用\nThread mainThread = Thread.currentThread();\n// 获取主线程的详细信息\nSystem.out.println(\"\
  Current thread: \" + mainThread.getName() + \" and priority: \" +mainThread.getPriority());\n\
  Thread3A thread3A = new Thread3A(\"Thread3A\");\nthread3A.setPriority(Thread.MIN_PRIORITY);//1\n\
  Thread3B thread3B = new Thread3B(\"Thread3B\");\n// 更新线程的名称-ThreadDemo4\nthread3B.setName(\"\
  ThreadDemonstration3B\");\nthread3B.setPriority(Thread.MAX_PRIORITY);//10\nSystem.out.println(\"\
  Thread3A priority is \" + thread3A.getPriority());\nSystem.out.println(\"ThreadDemonstration3B\
  \ priority is \" + thread3B.getPriority());\nthread3A.start();\nthread3B.start();\n\
  for (int i = 0; i <10; i++) {\nSystem.out.println( mainThread.getName() + \" is\
  \ executing and prints : \"+ i);\n}\nSystem.out.println(\"Exit main()\");\n}\n}\n\
  ```\n\n以下是其中一种可能的输出。\n\n```\n***Demonstration-3.Exploring multi-threading by extending\
  \ Thread class.***\nCurrent thread: main and priority: 5\nThread3A priority is 1\n\
  ThreadDemonstration3B priority is 10\nmain is executing and prints : 0\nThreadDemonstration3B\
  \ is executing.It is printing : 0\nmain is executing and prints : 1\nThreadDemonstration3B\
  \ is executing.It is printing : 1\nmain is executing and prints : 2\nThreadDemonstration3B\
  \ is executing.It is printing : 2\nThread3A is executing and prints : 0\nThreadDemonstration3B\
  \ is executing.It is printing : 3\nmain is executing and prints : 3\nmain is executing\
  \ and prints : 4\nmain is executing and prints : 5\nThread3A is executing and prints\
  \ : 1\nThreadDemonstration3B is executing.It is printing : 4\nThread3A is executing\
  \ and prints : 2\nmain is executing and prints : 6\nmain is executing and prints\
  \ : 7\nmain is executing and prints : 8\nmain is executing and prints : 9\nThread3A\
  \ is executing and prints : 3\nThreadDemonstration3B is executing.It is printing\
  \ : 5\nThread3A is executing and prints : 4\nExit main()\nThread3A is executing\
  \ and prints : 5\nThreadDemonstration3B is executing.It is printing : 6\nThreadDemonstration3B\
  \ is executing.It is printing : 7\nThreadDemonstration3B is executing.It is printing\
  \ : 8\nThreadDemonstration3B is executing.It is printing : 9\nThread3A is executing\
  \ and prints : 6\nExit-ThreadDemonstration3B\nThread3A is executing and prints :\
  \ 7\nThread3A is executing and prints : 8\nThread3A is executing and prints : 9\n\
  Exit-Thread3A\n```\n\n以下是另一种可能的输出（在具有不同配置的另一台机器上执行）。\n\n```\n***Demonstration-3.Exploring\
  \ multi-threading by extending Thread class.***\nCurrent thread: main and priority:\
  \ 5\nThread3A priority is 1\nThreadDemonstration3B priority is 10\nmain is executing\
  \ and prints : 0\nThreadDemonstration3B is executing.It is printing : 0\nThreadDemonstration3B\
