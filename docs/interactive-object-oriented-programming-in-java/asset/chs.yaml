- "# 3. 深入理解类与对象\n\n在本章中，我将讨论一些与类和对象密切相关的重要主题。如果你完全是面向对象编程的新手，为了理解每个主题，你可能需要在完成第 10\
  \ 章后再回到本章。\n\n## 静态变量和方法\n\n到目前为止，你已经看到类可以包含变量、方法或两者兼有。这些统称为类成员。这些变量和方法被称为实例变量和实例方法，因为每次实例化一个类时，都会创建每个变量和方法的新副本。一旦创建了对象，你就可以使用点运算符\
  \ (.) 来访问这些实例变量或方法（你在第 2 章的不同演示中已经体验过这一点）。\n\n但有时你可能希望一个类成员对该类的所有对象都是通用的。在这种情况下，能够使用类（而不是使用该类的对象）来访问它们是有意义的。当你创建这样的成员时，它们被称为类变量或类方法。类成员也称为静态成员，因为在\
  \ Java 中，要创建类变量或类方法，你需要像下面这样用 `static` 关键字标记它们：\n\n```\n//静态变量\nstatic double length=25.5,\
  \ breadth=10.0;\n//静态方法\npublic static double area() {\nreturn length * breadth;\n\
  }\n```\n\n### 演示 1\n\n现在，来看演示 1。请注意，这次访问类成员时没有创建 `Rectangle` 类的任何对象。\n\n```\npackage\
  \ java2e.chapter3;\nclass Rectangle {\n//静态变量\nstatic double length=25.5, breadth=10.0;\n\
  //静态方法\npublic static double area() {\nreturn length * breadth;\n}\n}\nclass Demonstration1\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***演示-1\\. 探索类变量和类方法。***\\\
  n\");\nSystem.out.println(\"矩形的长度是：\" + Rectangle.length + \" 单位\");\nSystem.out.println(\"\
  矩形的宽度是：\" + Rectangle.breadth + \" 单位\");\nSystem.out.println(\"矩形的面积是 \" + Rectangle.area()\
  \ + \" 平方单位\");\n}\n}\n```\n\n输出：\n\n```\n***演示-1\\. 探索类变量和类方法。***\n矩形的长度是：25.5\
  \ 单位\n矩形的宽度是：10.0 单位\n矩形的面积是 255.0 平方单位\n```\n\n你将在第 8 章中看到关于静态成员及其不同案例研究的详细讨论。\n\
  \n### 问答环节\n\n**3.1 我可以有一个静态类吗？**\n\nJava 不允许你创建顶层的静态类。包含静态类的类被称为外部类。非静态的嵌套类被称为内部类。你将在第\
  \ 8 章中学习它们。\n\n\n\n## 访问控制\n\n你可以为类、字段和方法提供受控的访问权限。在学习接口时，也可以将同样的理念应用于它们。实际上，通过使用访问控制，你还能实现封装。\n\
  \n在 Java 中，你可以使用访问修饰符来实现访问控制。在第 7 章中，你将看到一个表格，总结了使用这些访问修饰符在包中的访问控制。Java 定义了以下访问修饰符：\n\
  \n*   `public`\n*   `private`\n*   `protected`\n*   `default`（这仅表示你没有使用任何修饰符）\n\n\
  当你学习了继承和包之后，就能更好地理解这些修饰符的作用。你将在下一章学习继承，并在第 7 章学习包。要理解接下来的讨论，理解 `private` 和 `public`\
  \ 就足够了。\n\n当你用 `public` 修饰符修饰一个类成员时，你可以从代码外部访问该成员。相反，当你使用 `private` 修饰符时，该成员只能被类中的其他成员访问。\n\
  \n### 注意\n\n这就是为什么 `main()` 方法总是 `public` 的原因。它是由代码外部的 Java 运行时系统调用的。\n\n如果你没有为某个成员使用任何访问修饰符，那么它只能在包内被访问（简单来说，包是一种将多个类分组管理的机制。你将在第\
  \ 7 章学习它们）。\n\n为了理解这个概念，让我们来看演示 2。在这里，你将看到在字段和方法上使用 `public` 和 `private` 修饰符的效果。\n\
  \n### 演示 2\n\n在这个演示中，有一个名为 `Sample` 的类，它有两个实例字段——`pubInt` 和 `priInt`。`Sample` 类还有两个实例方法——`showPublicMethod()`\
  \ 和 `showPrivateMethod()`。你可以参考以下演示中的注释，其中 `pubInt` 和 `showPublicMethod()` 是公有成员，另外两个是私有成员。\n\
  \n在 `main()` 方法内部，你将实例化一个 `Sample` 类对象。现在请注意 `main()` 方法中被注释掉的行：\n\n```\n// 编译时错误\n\
  // System.out.println(\" The priInt=\"+ sampleOb.priInt);\n// 编译时错误\n// sampleOb.showPrivateMethod()\
  \ ;\n```\n\n这表明，当使用点运算符操作 `sampleOb` 时，你不能在 `main()` 方法内部访问 `Sample` 类的私有成员。但同样的方法对\
  \ `Sample` 类的公有成员是有效的：\n\n```\npackage java2e.chapter3;\nclass Sample {\n// 公有字段\n\
  public int pubInt = 1;\n// 公有方法\npublic void showPublicMethod() {\nSystem.out.println(\"\
  showPublicMethod() 是一个公有方法。\");\n}\n// 私有字段\nprivate int priInt = 2;\n// 私有方法\n\
  private void showPrivateMethod() {\nSystem.out.println(\"showPrivateMethod() 是一个私有方法。\"\
