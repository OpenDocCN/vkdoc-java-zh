  一个基本结构已形成。\n一个基本结构已形成。\n公交车已完成。现在可以在道路上行驶。公交车数量=1\n公交车已完成。现在可以在道路上行驶。公交车数量=2\n这是为您准备的车辆列表：\n\
  火箭已构建。现在可以进入太空。火箭数量=1\n火箭已构建。现在可以进入太空。火箭数量=2\n```\n\n注意输出的粗体行。你可以看到，现在 `Rocket`\
  \ 对象也可以调用 `constructAllVehicles(List<?> vehicleList)` 方法。\n\n### 要点记忆\n\n你可以使用泛型类型，这些类型可以包含通配符作为参数类型、字段或局部变量，但不能作为泛型方法调用的类型参数。它们不应用于泛型类实例创建或超类型。你可以参考演示\
  \ 6A 以获得更好的理解。\n\n### 问答环节\n\n**12.1** **List<?>** **和** **List<? extends Object>**\
  \ **是一样的吗？**\n\n不一样。让我们检查一个案例。考虑以下代码片段：\n\n```\nclass Vehicle1Test {\n@Override\n\
  public String toString() {\nreturn \"Vehicle1Test 类型。\";\n}\n}\nclass Sub1VehicleTest\
  \ extends Vehicle1Test {\n@Override\npublic String toString() {\nreturn \"Sub1VehicleTest\
  \ 类型。\";\n}\n}\n```\n\n现在，你可以编写一个类似如下的方法：\n\n```\npublic static void addElementsVersion2(List\
  \ mylist) {\nmylist.add(new Vehicle1Test());// ok\nmylist.add(new Sub1VehicleTest());//\
  \ ok\nmylist.add(null);// ok\n}\n```\n\n但请注意以下方法中被注释掉的代码：\n\n```\npublic static\
  \ void addElementsVersion1(List mylist) {\n// mylist.add(new Vehicle1Test());//\
  \ 错误\n// mylist.add(new Sub1VehicleTest());// 错误\nmylist.add(null);// ok\n}\n```\n\
  \n在这个例子中，你可以将任何对象类型或子类型添加到 `List<Object>` 中，但对于 `List<?>`，你只能添加 null。Java 语言规范（Jls\
  \ 11 @ 第 4.7 节）进一步告诉我们，`List<?>` 是一个可具体化类型，但 `List<? extends Object>` 不是。\n\n**12.2\
  \ 可具体化类型是什么意思？**\n\n在运行时其信息完全可用的类型称为可具体化类型。（稍后你将了解到，某些类型信息在编译时会被擦除，因此运行时可能无法获得完整的类型信息。）\n\
  \n根据语言规范，当且仅当满足以下条件之一时，类型才是可具体化的：\n\n*   它引用一个非泛型的类或接口类型声明。\n\n*   它是一个参数化类型，其中所有类型参数都是无界通配符。\n\
  \n*   它是一个原始类型。\n\n*   它是一个基本类型。\n\n*   它是一个数组类型，其元素类型是可具体化的。\n\n*   它是一个嵌套类型，其中对于每个由“`.`”分隔的类型\
  \ `T`，`T` 本身是可具体化的。\n\n**12.3 那么** **List** **<?> 有什么用？**\n\n有时你可能只想遍历你的集合。例如，考虑以下程序和输出：\n\
  \n```\npackage chapter12.testcodes;\nimport java.util.ArrayList;\nimport java.util.List;\n\
  class Vehicle1Test {\n@Override\npublic String toString() {\nreturn \"Vehicle1Test\
  \ 类型。\";\n}\n}\nclass Sub1VehicleTest extends Vehicle1Test {\n@Override\npublic\
  \ String toString() {\nreturn \"Sub1VehicleTest 类型。\";\n}\n}\nclass Test1 {\npublic\
  \ static void main(String[] args) {\nSystem.out.println(\"***一个示例测试。List<?> 的使用***\"\
  );\nVehicle1Test vehicle1 = new Vehicle1Test();\nVehicle1Test vehicle2 = new Sub1VehicleTest();\n\
  List vehicles = new ArrayList();\nvehicles.add(vehicle1);// ok\nvehicles.add(vehicle2);//\
  \ ok\nprintElements(vehicles);// ok。在方法参数中使用 //List<?> 的示例\n}\npublic static void\
  \ addElementsVersion1(List mylist) {\n// mylist.add(new Vehicle1Test());// 错误\n\
  // mylist.add(new Sub1VehicleTest());// 错误\nmylist.add(null);// ok\n}\npublic static\
  \ void addElementsVersion2(List mylist) {\nmylist.add(new Vehicle1Test());// ok\n\
  mylist.add(new Sub1VehicleTest());// ok\nmylist.add(null);// ok\n}\npublic static\
  \ void printElements(List mylist) {\nmylist.forEach(element -> System.out.println(element));\n\
  }\n}\n```\n\n输出：\n\n```\n***一个示例测试。List<?> 的使用***\nVehicle1Test 类型。\nSub1VehicleTest\
  \ 类型。\n```\n\n**12.4 什么是原始类型？**\n\n你将在演示 10 中看到关于原始类型的讨论。\n\n**12.5 你能展示一些** **有效和无效的语句**\
