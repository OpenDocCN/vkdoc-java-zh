  \ CPU 时间，并且它们可以抢占低优先级线程。但在实际中，这可能取决于许多其他因素；例如，系统的配置、操作系统实现多任务概念的方式等。除了这些因素之外，输出还可能因线程正在执行的任务、任务的大小（例如，一个小任务可能在被高优先级线程抢占之前完成）等而变化。因此，你不应明确依赖优先级。如果\
  \ CPU 可用，低优先级线程也有机会运行，并且如果它执行的任务非常小，它可能会提前完成。通常，线程是异步运行的；因此，你会看到随机输出。\n\n图 11-2\
  \ 中的输出是在前一个程序于具有如下所示配置的系统中运行时生成的（请注意，这是一个双核系统；它配备了第六代 Intel® Core™ i5-6300 处理器）。\n\
