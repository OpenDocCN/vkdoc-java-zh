  *   由于你使用了泛型的概念，你可以以更好的方式打印 `ArrayList` 的元素。通常，在遍历并打印 `ArrayList`（或其他集合对象）中的元素时，你会看到这些代码版本。\n\
  \n```\n/*\nfor (int myInt : myList) { System.out.println(myInt); }\nSystem.out.print(\"\
  使用 lambda 表达式打印元素：\\n\");\n// 或者，使用增强型 for 循环配合 lambda 表达式\nmyList.forEach((myInt)\
  \ -> System.out.println(myInt));\n*/\n```\n\n因此，你可以肯定地得出结论：`ArrayList` 的泛型版本比非泛型版本更灵活、更实用。同样的概念也适用于其他集合对象和类似类型的编程。\n\
  \n## 泛型编程中的通配符类型\n\n在接下来的讨论中，你会注意到有时你可能需要在泛型编程中对特定类型施加限制。实现此类约束有两种常见方法——一种是使用通配符，另一种是使用有界类型参数。这里，我将从通配符开始介绍。\n\
  \n在泛型编程中，通配符用问号 `(?)` 表示。它表示一个未知类型。当你对 `type` 参数有部分了解时，可以使用它。\n\n通配符可以是有界的，也可以是无界的。有界通配符可用于为\
  \ `type` 参数设置上界或下界。让我们从上限通配符开始讨论。\n\n\n\n### 上界通配符\n\n首先，考虑以下代码片段。在这段代码中，`Vehicle`\
  \ 是超类，它有两个子类：`Bus` 和 `Rocket`。每个类都有一个 `constructBody()` 方法来构造特定的实例。所有这些类还维护一个计数器，用于跟踪已创建的这些类型的实例数量。以下是代码片段：\n\
  \n```\nclass Vehicle {\nstatic int basicVehicleCount;\n// 构造单个车辆的基本结构\npublic void\
  \ constructBody() {\nbasicVehicleCount++;\nSystem.out.println(\"一个基本结构已形成。基本结构数量\
  \ =\"+ basicVehicleCount);\n}\n}\nclass Bus extends Vehicle {\nstatic int busCount;\n\
  @Override\npublic void constructBody() {\nbusCount++;\nSystem.out.println(\"公交车已完成。它现在可以在道路上行驶。公交车数量=\"\
  \ + busCount);\n}\n}\nclass Rocket extends Vehicle {\nstatic int rocketCount;\n\
  @Override\npublic void constructBody() {\nrocketCount++;\nSystem.out.println(\"\
  火箭已构建。它现在可以进入太空。火箭数量=\" + rocketCount);\n}\n}\n```\n\n假设你已经将这些车辆（`Vehicle`、`Bus`\
  \ 或 `Rocket`）存储在一个集合中——比如，存储在一个 `ArrayList` 中。现在你想为 `ArrayList` 中的每个实例调用 `constructBody()`\
  \ 方法。因此，你可能会从如下代码开始：\n\n```\n// 在这种情况下可能无法工作\npublic static void constructBody(List\
  \ vehicleList) {\nSystem.out.println(\"\\n 这是为你准备的车辆列表：\");\nvehicleList.forEach((vehicle)\
  \ -> vehicle.constructBody());\n}\n```\n\n当你拥有 `ArrayList<Vehicle>` 类型时，这段代码可以工作。但有趣的是，当你将其应用于\
  \ `ArrayList<Bus>` 或 `ArrayList<Rocket>` 类型时，它将无法工作。从编译器的角度来看，`ArrayList<Bus>` 或\
  \ `ArrayList<Rocket>` 与 `ArrayList<Vehicle>` 是不同的，尽管 `Vehicle` 是 `Bus` 和 `Rocket`\
  \ 的超类型（你可以参考本章末尾的“最后一条建议”部分）。在这种情况下，编译器会建议你引入如下方法：\n\n```\nstatic void constructAllVehicles(ArrayList\
  \ rockets){// 一些代码}\n```\n\n或\n\n```\nstatic void constructAllVehicles(ArrayList\
  \ buses) {// 一些代码}.\n```\n\n如果你遵循这些建议，编译器会进一步报出不同的错误，如图 12-4 所示。\n\n![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig4_HTML.jpg](img/433474_2_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4\n\n泛型程序中一些编译时错误的 Eclipse IDE 截图\n\n简而言之，你需要采取一些特殊措施来处理这种情况。一种可能的解决方案是使用通配符类型，如下所示（以粗体显示）。\n\
  \n```\n// 构造列表中的所有车辆\n//public static void constructBody(List vehicleList) {\npublic\
  \ static void constructAllVehicles(List vehicleList) {\nSystem.out.println(\"\\\
  n 这是为你准备的车辆列表：\");\nvehicleList.forEach((vehicle) -> vehicle.constructBody());\n\
  }\n```\n\n以下是完整的演示。\n\n### 演示 5\n\n在此演示中，部分内容以粗体显示，以突出程序中的重要代码行。\n\n```\npackage\
  \ java2e.chapter12;\nimport java.util.ArrayList;\nimport java.util.List;\nclass\
  \ Vehicle {\nstatic int basicVehicleCount;\n// 构造单个车辆的基本结构\npublic void constructBody()\
  \ {\nbasicVehicleCount++;\nSystem.out.println(\"一个基本结构已形成。基本结构数量 =\"+ basicVehicleCount);\n\
  }\n}\nclass Bus extends Vehicle {\nstatic int busCount;\n@Override\npublic void\
  \ constructBody() {\nbusCount++;\nSystem.out.println(\"公交车已完成。它现在可以在道路上行驶。公交车数量=\"\
  \ + busCount);\n}\n}\nclass Rocket extends Vehicle {\nstatic int rocketCount;\n\
  @Override\npublic void constructBody() {\nrocketCount++;\nSystem.out.println(\"\
  火箭已构建。它现在可以进入太空。火箭数量=\" + rocketCount);\n}\n}\nclass Demonstration5 {\npublic static\
  \ void main(String[] args) {\nSystem.out.println(\"***演示-5. 泛型编程中通配符类型的使用。***\"\
  );\n// 一个 Vehicle 对象\nVehicle vehicle1=new Vehicle();\n// 三个 Bus 对象\nBus bus1 =\
  \ new Bus();\nBus bus2 = new Bus();\nBus bus3 = new Bus();\n// 两个 Rocket 对象\nRocket\
  \ rocket1 = new Rocket();\nRocket rocket2 = new Rocket();\n// 任意类型车辆的列表。可以添加 Vehicle\
  \ 类型或其子类型。\nArrayList vehicles = new ArrayList();\n// 在列表中添加一辆车、一辆公交车和一辆火箭\nvehicles.add(vehicle1);\n\
  vehicles.add(bus1);// 可以\nvehicles.add(rocket1);// 可以\nconstructAllVehicles(vehicles);//\
  \ 可以\n// 仅特定车辆（公交车）的列表\nArrayList buses = new ArrayList();\n// 在列表中添加三辆公交车\nbuses.add(bus1);\n\
  // 错误：无法将火箭添加到公交车列表\n// buses.add(rocket1);\nbuses.add(bus2);\nbuses.add(bus3);\n\
  // 如果不在方法中使用通配符，则会出错\nconstructAllVehicles(buses);\n// 仅特定车辆（火箭）的列表\nArrayList rockets\
  \ = new ArrayList();\n// 在列表中添加两枚火箭\nrockets.add(rocket1);\nrockets.add(rocket2);\n\
  // 如果不在方法中使用通配符，则会出错\nconstructAllVehicles(rockets);\n}\n// 构造列表中的所有车辆\n// public\
  \ static void constructBody(List vehicleList) {\npublic static void constructAllVehicles(List\
  \ vehicleList) {\nSystem.out.println(\"\\n 这是为你准备的车辆列表：\");\nvehicleList.forEach((vehicle)\
  \ -> vehicle.constructBody());\n}\n}\n```\n\n输出：\n\n```\n***演示-5. 泛型编程中通配符类型的使用。***\n\
  这是为你准备的车辆列表：\n一个基本结构已形成。基本结构数量 =1\n公交车已完成。它现在可以在道路上行驶。公交车数量=1\n火箭已构建。它现在可以进入太空。火箭数量=1\n\
  这是为你准备的车辆列表：\n公交车已完成。它现在可以在道路上行驶。公交车数量=2\n公交车已完成。它现在可以在道路上行驶。公交车数量=3\n公交车已完成。它现在可以在道路上行驶。公交车数量=4\n\
  这是为你准备的车辆列表：\n火箭已构建。它现在可以进入太空。火箭数量=2\n火箭已构建。它现在可以进入太空。火箭数量=3\n```\n\n你可以看到 `List<Vehicle>`\
  \ 比 `List<? extends Vehicle>` 更具限制性。在这里，你通过使用通配符放宽了限制。因此，`constructAllVehicles(`**List<?\
  \ extends Vehicle>** `vehicleList)` 可以同时应用于 `ArrayList<Vehicle>` 和 `ArrayList<any\
  \ subtype of Vehicle>`（即本例中的 `ArrayList<Bus>` 和 `ArrayList<Rocket>`）。所以，`? extends\
  \ Vehicle` 语法只是帮助编译器匹配类型 `Vehicle` 或 `Vehicle` 的任何子类型。这就是为什么我们说，当你在通配符中使用 `extends`\
  \ 子句时，它设置了一个上界。\n\n### 要点记忆\n\n需要注意的是，此处的 `extends` 是广义上的使用，既可以表示类中的 extends，也可以表示接口中的\
  \ implements。\n\n### 下界通配符\n\n你刚刚了解到，当你在方法参数中使用表达式 `<? extends Vehicle>` 时，你可以为\
  \ `Vehicle` 类或其任何子类调用该方法。因此，这里的 `Vehicle` 类充当了上界。类似地，当你使用表达式 `<? super Vehicle>`\
  \ 时，你可以设置通配符的下界。在这种情况下，可接受的参数是 `Vehicle` 及其超类。因此，你可以将表达式 `<? super T>` 大致解释为“类 `T`\
  \ 或 `T` 的任何超类”。\n\n\n\n### 演示 6\n\n让我们考虑以下示例：\n\n```\npackage chapter12.testcodes;\n\
  import java.util.ArrayList;\nimport java.util.List;\nclass Vehicle {\n// 构建单个车辆的基本结构\n\
  public void constructBody() {\nSystem.out.println(\"一个基本结构已形成。\");\n}\n}\nclass\
  \ Bus extends Vehicle {\nstatic int busCount;\n@Override\npublic void constructBody()\
  \ {\nbusCount++;\nSystem.out.println(\"公交车已完成。现在可以在道路上行驶。公交车数量=\" + busCount);\n\
  }\n}\nclass Rocket extends Vehicle {\nstatic int rocketCount;\n@Override\npublic\
  \ void constructBody() {\nrocketCount++;\nSystem.out.println(\"火箭已构建。现在可以进入太空。火箭数量=\"\
  \ + rocketCount);\n}\n}\npublic class TestCodeDemonstration6 {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"***演示-6. 泛型编程中下界通配符类型的使用。***\");\n\
  //两个 Vehicle 对象\nVehicle vehicle1=new Vehicle();\nVehicle vehicle2=new Vehicle();\n\
  // 两个 Bus 对象\nBus bus1 = new Bus();\nBus bus2 = new Bus();\n// 两个 Rocket 对象\nRocket\
  \ rocket1 = new Rocket();\nRocket rocket2 = new Rocket();\n// 车辆列表\nArrayList vehicles\
  \ = new ArrayList();\n// 在列表中添加两辆车\nvehicles.add(vehicle1);\nvehicles.add(vehicle2);\n\
  // 在列表中添加两辆公交车\nvehicles.add(bus1);\nvehicles.add(bus2);\nconstructAllVehicles(vehicles);//ok\n\
  // 火箭列表\nArrayList rockets = new ArrayList();\n// 在列表中添加两枚火箭\nrockets.add(rocket1);\n\
  rockets.add(rocket2);\n//constructAllVehicles(rockets);// 错误：当使用下界通配符时，不适用于 //ArrayList\n\
  }\n// 构造列表中的所有车辆\npublic static void constructAllVehicles(List vehicleList) {\n\
  System.out.println(\"\\n 这是为您准备的车辆列表：\");\n//编译时错误：添加强制转换为 vehicle\n//vehicleList.forEach((vehicle)\
  \ ->  vehicle.constructBody());\n/*\n//运行时错误：Vehicle 无法转换为 Bus\n//vehicleList.forEach((vehicle)\
