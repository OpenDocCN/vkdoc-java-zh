  ***演示-2：使用 private 和 public 修饰符介绍访问控制。***\\n\");\nSample sampleOb = new Sample();\n\
  System.out.println(\"pubInt=\" + sampleOb.pubInt);// 1\nsampleOb.showPublicMethod();\n\
  // 编译时错误\n// System.out.println(\" The priInt=\"+ sampleOb.priInt);\n// 编译时错误\n\
  // sampleOb.showPrivateMethod() ;\n}\n}\n```\n\n输出：\n\n```\n***演示-2：使用 private 和\
  \ public 修饰符介绍访问控制。***\npubInt=1\nshowPublicMethod() 是一个公有方法。\n```\n\n如果你取消注释被注释掉的行，你将收到如图\
  \ 3-1 所示的编译时错误——一个针对私有字段，一个针对私有方法。\n\n![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig1_HTML.jpg](img/433474_2_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n\n来自 Eclipse IDE 的错误截图\n\n## Getter-Setter 方法\n\n专家总是建议你将实例变量设为私有，除非有特定理由使用其他访问修饰符。（尽管在本书中仅出于简单演示目的，许多示例中你只会看到公有字段和方法的使用。）那么一个显而易见的问题是——如何访问一个类的私有成员？\n\
  \n答案是，你可以通过公有的 getter-setter 方法来访问它们。\n\n### 演示 3\n\n在这个演示中，`Sample3` 类有一个名为 `priInt`\
  \ 的私有字段。请注意 `Sample3` 中的另外两个公有方法。你可以看到 `getPriInt()` 方法返回了 `priInt` 的值，而 `setPriInt()`\
  \ 方法可以帮助你设置 `priInt` 的值。由于这两个方法定义在包含该私有变量的同一个类中，因此它们可以访问 `Sample3` 中的私有字段 `priInt`。\n\
  \n```\npackage java2e.chapter3;\nclass Sample3 {\n// 私有字段\nprivate int priInt;\n\
  // Getter\npublic int getPriInt() {\nreturn priInt;     }\n// Setter\npublic void\
  \ setPriInt(int priInt) {\nthis.priInt = priInt;\n}\n}\nclass Demonstration3 {\n\
  public static void main(String[] args) {\nSystem.out.println(\"***演示-3：介绍 Getter-Setter\
  \ 方法。***\\n\");\nSample3 sampleOb=new Sample3();\n// 为私有字段设置值\nsampleOb.setPriInt(2);\n\
  // 从私有字段获取值\nSystem.out.println(\"priInt=\"+ sampleOb.getPriInt());\n}\n}\n```\n\
  \n输出\n\n```\n***演示-3：介绍 Getter-Setter 方法。***\npriInt=2\n```\n\n使用 Eclipse，你可以轻松生成\
  \ getter-setter 方法。例如，在这种情况下，你可以右键点击私有变量 `priInt` ➤ 源 ➤ 生成 Getters 和 Setters… 来为私有字段生成\
  \ getter-setter 方法。\n\n### 问答环节\n\n**3.2 使用 getter-setter 方法有什么好处？**\n\n以下是使用 getter-setter\
  \ 方法的一些好处：\n\n*   你可以为数据提供受控的访问。请注意，现在客户端代码无法直接访问私有字段 `priInt`。\n*   你可以将类变量设置为只读或只写。当你只提供\
  \ getter 方法时，你只能获取私有变量的值，因此它变为只读。类似地，当你只提供 setter 方法时，你就使该变量变为只写。\n*   前两点提升了数据的安全性。\n\
  \n## 初始化块\n\n你已经了解了构造函数的用途。当你使用初始化块时，可以获得构造函数的替代方案。初始化块可以是静态的，也可以是非静态的。在接下来的部分中，你将熟悉非静态初始化块，也称为实例初始化块（IIB）。静态初始化块将在第\
  \ 8 章讨论。\n\n### 注意\n\n除了初始化块和构造函数，你还可以在 final 方法中初始化实例变量。final 方法是一种不能在子类中被重写的方法。当你学习了继承的概念后，就会熟悉它们。\n\
  \n\n\n### 演示 4\n\n顾名思义，实例初始化块用于初始化实例变量。当你同时拥有构造器和初始化块时，你会看到初始化块在构造器之前被调用，如下所示：\n\
  \n```\npackage java2e.chapter3;\nclass Sample4 {\nint a, b, c;\n// 初始化块-1\n{\nSystem.out.println(\"\
  初始化块-1 已执行。设置 a=1。\");\na = 1;\n}\n// 初始化块-2\n{\nSystem.out.println(\"初始化块-2 已执行。设置\
  \ b=2；\");\nb = 2;\n}\n// 构造器\nSample4() {\nSystem.out.println(\"用户定义的无参构造器已执行。设置\
  \ c=3。\");\nc = 3;\n}\n}\nclass Demonstration4 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***演示-4。实例初始化块的使用。***\\n\");\nSample4 sample4Object\
  \ = new Sample4();\nSystem.out.println(\"sample4Object.a=\" + sample4Object.a);//\
  \ 1\nSystem.out.println(\"sample4Object.b=\" + sample4Object.b);// 2\nSystem.out.println(\"\
  sample4Object.c=\" + sample4Object.c);// 3\n}\n}\n```\n\n输出：\n\n```\n***演示-4。实例初始化块的使用。***\n\
  初始化块-1 已执行。设置 a=1。\n初始化块-2 已执行。设置 b=2；\n用户定义的无参构造器已执行。设置 c=3。\nsample4Object.a=1\n\
  sample4Object.b=2\nsample4Object.c=3\n```\n\n请注意，初始化块按照它们在类中出现的顺序执行。\n\n### 问答环节\n\
  \n**3.3 我已经有构造器了，为什么还要使用初始化块？**\n\n如果你的类中有多个构造器，你可以在构造器之间共享公共代码。\n\n**3.4 我可以在同一个类中有多个初始化块吗？**\n\
  \n可以。演示 4 表明你可以在类中放置多个实例初始化块，它们会按照你在类中放置它们的顺序执行。\n\n**3.5 可以有静态初始化块吗？**\n\n可以。你将在第\
  \ 8 章中看到关于它们的详细讨论。\n\n**3.6 你能预测以下程序的输出吗？**\n\n```\npackage java2e.chapter3;\nclass\
  \ Test1 {\nint a;\n// 初始化块-1\n{\nSystem.out.println(\"初始化块-1 已执行。\");\na = 1;\n\
  }\n// 构造器\nTest1() {\nSystem.out.println(\"构造器已执行。\");\na = 2;\n}\n// 初始化块-2\n{\n\
  System.out.println(\"初始化块-2 已执行。\");\na = 3;\n}\n}\nclass Quiz1 {\npublic static\
  \ void main(String[] args) {\nSystem.out.println(\"***测验 1。初始化块和构造器的执行顺序***\");\n\
  System.out.println(\"new Test1().a=\" + new Test1().a);\n}\n}\n```\n\n**答案：**\n\n\
  ```\n***测验 1。初始化块和构造器的执行顺序***\n初始化块-1 已执行。\n初始化块-2 已执行。\n构造器已执行。\nnew Test1().a=2\n\
  ```\n\n无论初始化块在类中出现的位置如何，它们都会在构造器之前执行。\n\n## 嵌套类\n\n当你将一个类放在另一个类内部时，这样的类称为嵌套类。Java\
  \ 支持静态嵌套类和非静态嵌套类。非静态嵌套类通常被称为***内部类***。在本章中，我们将只关注内部类。在此上下文中，你需要记住以下几点：\n\n*   外部类是包含嵌套类的类。\n\
  \n*   内部类可以访问外部类的静态和非静态成员。\n\n    注意 最初，Java 1.0 不支持嵌套类，但在 Java 1.1 中它们被添加了。\n\n\
  ### 演示 5\n\n以下演示展示了嵌套类的简单用法。这里，我展示了两种调用内部类方法的不同方式。在第一种情况下，我通过外部类方法调用内部类方法。在第二种情况下，它通过内部类对象直接从\
  \ `main()` 调用。\n\n```\npackage java2e.chapter3;\nclass OuterClass {\nstatic int\
  \ staticInt=1;\nint nonStaticInt=2;\n// 内部类\nclass InnerClass {\nvoid showInnerMethod()\
  \ {\nSystem.out.println(\"在 InnerClass 内部。\");\nSystem.out.println(\"staticInt =\"\
  \ + staticInt );\nSystem.out.println(\"nonStaticInt =\" + nonStaticInt + \"\\n\"\
  );\n}\n}\n// 一个可以调用内部类方法的外部类方法\nvoid invokeInner() {\nInnerClass innerOb = new InnerClass();\n\
  System.out.println(\"**从外部类方法调用内部类方法。**\");\n//调用内部类方法\ninnerOb.showInnerMethod();\n\
  }\n}\nclass Demonstration5 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示-5。内部类演示。***\\n\");\nOuterClass outer = new OuterClass();// 正确\n//通过外部类方法调用内部类方法\n\
  System.out.println(\"**通过外部类对象调用内部类方法。**\");\nouter.invokeInner();\n// InnerClass\
  \ inner=new InnerClass();// 错误\nOuterClass.InnerClass inner = outer.new InnerClass();//\
  \ 正确\n//通过内部类对象调用内部类方法。\nSystem.out.println(\"通过内部类对象调用内部类方法。\");\ninner.showInnerMethod();\n\
  }\n}\n```\n\n输出：\n\n```\n***演示-5。内部类演示。***\n**通过外部类对象调用内部类方法。**\n**从外部类方法调用内部类方法。**\n\
  在 InnerClass 内部。\nstaticInt =1\nnonStaticInt =2\n通过内部类对象调用内部类方法。\n在 InnerClass 内部。\n\
  staticInt =1\nnonStaticInt =2\n```\n\n### 问答环节\n\n**3.7 为什么嵌套类有用？**\n\n它们可以促进封装，提供更好的安全性。类的逻辑分组也易于维护。\n\
  \n## 复制对象\n\n有时你可能需要复制一个对象。在实际应用中，从头开始创建一个新实例是一项成本高昂、耗时且乏味的操作。有时整个过程也很复杂。\n\n你可以通过多种方式完成复制任务。在此上下文中，会用到序列化方法、对象克隆、拷贝构造器等。但要实现这些概念，你需要熟悉高级特性。\n\
  \n幸运的是，Java 支持克隆机制，你将在第 15 章讨论原型设计模式时学习到。\n\n在接下来的讨论中，我将只讨论拷贝构造器。\n\n### 使用拷贝构造器\n\
  \n以下演示展示了如何编写你自己的拷贝构造器。\n\n### 演示 6\n\n请看下面的程序，它演示了这种用法：\n\n```\npackage java2e.chapter3;\n\
  class Student\n{\nint rollNo;\nString name;\n//实例构造器\npublic Student(int rollNo,\
  \ String name)\n{\nthis.rollNo = rollNo;\nthis.name = name;\n}\n//拷贝构造器\npublic\
  \ Student( Student student)\n{\nthis.name = student.name;\nthis.rollNo = student.rollNo;\n\
  }\npublic void displayDetails()\n{\nSystem.out.println(\" 学生姓名: \" + name + \",\
  \ 学号: \"+rollNo);\n}\n}\nclass Demonstration6 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***演示-6。Java 中用户定义的拷贝构造器示例***\\n\");\nStudent student1\
  \ = new Student(1, \"Bob\");\nSystem.out.println(\" Student1 的详细信息如下：\");\nstudent1.displayDetails();\n\
  System.out.println(\"\\n 现在将 student1 复制到 student2\");\n//调用用户定义的拷贝构造器\nStudent\
  \ student2 = new Student (student1);\nSystem.out.println(\" Student2 的详细信息如下：\"\
  );\nstudent2.displayDetails();\n}\n}\n```\n\n输出\n\n```\n***演示-6。Java 中用户定义的拷贝构造器示例***\n\
  Student1 的详细信息如下：\n学生姓名: Bob, 学号: 1\n现在将 student1 复制到 student2\nStudent2 的详细信息如下：\n\
  学生姓名: Bob, 学号: 1\n```\n\n### 问答环节\n\n**3.8 Java 支持默认的拷贝构造器吗？**\n\n不支持，你必须自己编写拷贝构造器。\n\
  \n\n\n## 包装类\n\n在第 12 章中，你将熟悉泛型编程，这是 Java 中的一个高级概念。在那里，你会看到包装类的使用。在本节中，你将快速了解包装类的概览。\n\
  \n在某些特殊情况下，你可能需要将基本类型转换为对象。例如，当你只需要在方法参数中传递一个对象时，这种转换就很有用。泛型编程也是如此。在这种情况下，你可能会记得一些集合类（如\
  \ `Vector`）只能存储对象，而不能存储基本类型。包装类就是用于这些场景的（因为这些类将基本类型“包装”到相应的对象类型中）。在 Java 中，包装类包含在\
  \ `java.lang` 包中。Java 为每种基本类型都提供了包装类。表 3-1 展示了与基本类型对应的包装类。\n\n表 3-1\n\n基本类型的包装类\n\
  \n| 基本类型 | 包装类 |\n| --- | --- |\n| boolean | Boolean |\n| int | Integer |\n| double\
  \ | Double |\n| float | Float |\n| long | Long |\n| char | Char |\n| byte | Byte\
  \ |\n| short | Short |\n\n以下代码片段展示了包装类的一个简单用例。这里，一个基本类型 `int myInt` 被转换为一个 `Integer`\
  \ 对象 `intOb`，随后你又从 `Integer` 对象中取回了 `int`：\n\n```\nint myInt1=1;\n//将基本类型 int 转换为\
  \ Integer 对象\nInteger intOb=new Integer(i);\n//从 Integer 对象转换回基本类型 int\nint myInt2=intOb.intValue();\n\
  ```\n\n类似的转换也可以从 `double` 到 `Double`、`long` 到 `Long` 等（反之亦然）。但你必须使用适当的方法。例如，对于 `int`，你使用了\
  \ `intOb.intValue()`。类似地，对于 `double`，你可以使用 `doubleOb.doubleValue()`；对于 `long`，可以使用\
  \ `longOb.longValue()`，其中 `doubleOb` 是一个 `Double` 对象，`longOb` 是一个 `Long` 对象。\n\n\
  ### 演示 7\n\n本演示展示了包装类的一些常见用例。程序非常简单，但你可以参考相关的注释以获得更好的理解。\n\n```\npackage java2e.chapter3;\n\
  class Demonstration7 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Demonstration7.探索包装类.***\\n\");\nint myInt1 = 1;\n// 将基本类型 int 转换为 Integer 对象\n\
  Integer intOb = new Integer(myInt1);\n// 从 Integer 对象转换回基本类型 int\nint myInt2 = intOb.intValue();\n\
  System.out.println(\"myInt2=\" + myInt2);\nlong myLong1 = 1234567890123L;\n// 将基本类型\
  \ long 转换为 Long 对象\nLong longOb = new Long(myLong1);\n// 从 Long 对象转换回基本类型 long\n\
  long myLong2 = longOb.longValue();\nSystem.out.println(\"long2=\" + myLong2);\n\
  // 将基本类型 int 转换为 String 对象\nString myString1 = Integer.toString(myInt1);\nSystem.out.println(\"\
  myString=\" + myString1);\nString myString2 = \"5.7\";\n// 将 String 对象转换为基本类型\n\
  Double doubleOb = Double.valueOf(myString2);\ndouble myDouble = doubleOb.doubleValue();\n\
  System.out.println(\"myDouble=\" + myDouble);\n//将数字字符串转换为基本类型 int\nint myInt3=Integer.parseInt(\"\
  125\");\nSystem.out.println(\"myInt3=\" + myInt3);\n//以下代码行将导致运行时错误 //(NumberFormatException)，因为你无法将\
  \ \"Hello\" 转换为 int\n//int myInt4=Integer.parseInt(\"Hello\");\n//System.out.println(\"\
  myInt4=\" + myInt4);\n}\n}\n```\n\n输出：\n\n```\n***Demonstration7.探索包装类.***\nmyInt2=1\n\
  long2=1234567890123\nmyString=1\nmyDouble=5.7\nmyInt3=125\n```\n\n### 注意\n\n将基本类型转换为相应[包装类](https://www.geeksforgeeks.org/wrapper-classes-java/)对象的过程称为自动装箱。例如，`int`\
  \ 到 `Integer`、`double` 到 `Double`、`float` 到 `Float` 等。反向过程称为拆箱。同样重要的是要注意，构造函数 `Interger(int)`\
  \ 和 `Long(long)` 自 Java 9 起已被弃用。但为了理解一些遗留代码，它们仍然很重要。\n\n## 垃圾回收\n\n到目前为止，你一直在实例化对象。但我还没有讨论通过删除对象来释放内存。如果你熟悉\
  \ **C++**，你可能知道在 C++ 中，程序员需要使用 `delete` 关键字来释放对象占用的内存。如果你没有正确释放内存，就会看到内存泄漏的影响，这可能导致应用程序崩溃。\n\
  \nJava 中没有这样的关键字。JVM 使用一个后台线程（通常称为垃圾回收器）来检测未使用的对象并释放它们占用的内存。这种技术称为垃圾回收（GC）。\n\n\
  ### 注意\n\n不同的 Java 运行时系统可能采用不同的垃圾回收方法，但如前所述，在编写应用程序时你无需担心这一点。\n\nGC 最大的优点是通常你不需要担心内存泄漏，因为你可以依赖自动垃圾回收技术。但在某些特殊情况下，你可能需要显式地释放内存以避免内存泄漏，因为垃圾回收器由于某些原因无法检测到这些特殊场景。\n\
  \n需要记住的基本点是，当一个对象无法从根对象（根对象是对象树中的根）到达时，该对象就有资格进行垃圾回收。一个对象可以有多个引用指向它。理解这一点也很重要：当引用计数为零时，该对象才会被垃圾回收；这是一个常见的误解。此外，如果两个对象之间存在连接，它们也可以被垃圾回收。但如果这种连接进一步连接到根对象，那么这两个对象就不会被垃圾回收。问答\
  \ 3.11 将展示根对象的一些要点。\n\n\n\n### 问答环节\n\n**3.9 什么是内存泄漏？**\n\n通常，当计算机程序长时间运行却未能释放不再需要的内存资源时，你就能感受到内存泄漏的影响（例如，机器会逐渐变慢，或者在最坏的情况下，它们可能会崩溃）。由此可知，“问题多久会被我们注意到”取决于应用程序的泄漏速率。\n\
  \n考虑一个非常简单的例子。假设你有一个在线应用程序，用户需要填写一些数据，然后点击“提交”按钮。现在，假设该应用程序的开发人员错误地忘记在用户按下提交按钮后释放一些不再需要的内存，由于这个疏忽，应用程序每次点击会泄漏\
  \ 512 字节。在最初几次点击时，你可能不会注意到任何性能下降。但如果成千上万的在线用户同时使用该应用程序呢？如果 10 万用户按下提交按钮，你最终将丢失 48.8\
  \ MB 内存；1000 万次点击会导致丢失 4.76 GB；以此类推。\n\n简而言之，即使你的应用程序或程序每次执行只泄漏非常少量的数据，一段时间后你也会看到某种故障；例如，设备上的操作可能会变得非常缓慢，以至于你需要经常重启应用程序。\n\
  \n在像 C++ 这样的非托管语言中，你需要在预期任务完成后释放内存；否则，随着时间的推移，内存泄漏的影响将非常巨大。Java 的垃圾回收机制在大多数情况下将我们解救出来。尽管如此，仍有一些情况需要你小心处理；否则，你可能会注意到内存泄漏的影响。\n\
  \n市面上有许多工具可用于检测内存泄漏。尽管如此，许多组织仍倾向于使用自己的内存泄漏工具来检测和分析泄漏。\n\n**3.10 自动垃圾回收是什么意思？**\n\
  \n这是一个检查堆内存并识别哪些对象正在使用、哪些未被使用的过程。然后，它会删除未使用的对象。在此上下文中，你可能会注意到以下术语：\n\n*已引用对象*：表示该对象当前正在使用中。换句话说，在你的程序中，仍然有一个指向该对象的指针。\n\
  \n*未引用对象*：该对象不再被程序的任何部分引用，因此垃圾回收器可以回收未使用对象占用的内存。\n\n在这些删除操作之后，为了提高性能，可以使用压缩技术。（简单来说，压缩技术将所有空闲内存块移动到一个连续的位置，将所有已占用的块移动到另一个位置。这样，如果需要，你就可以分配一大块内存，而当可用内存分散或内存池碎片化时，这可能无法实现。压缩之后，对象通常停留在同一区域，因此访问它们也变得更快速、更容易。）\n\
  \n**3.11 你在讨论垃圾回收时使用了术语“根对象”。它是什么意思？**\n\n在现阶段，这看起来可能有点复杂。简单来说，你只需要知道对象分配在由 JVM\
  \ 管理的堆区域上。你可以绘制/想象一棵连接所有这些对象的树。通常，如果你有一个指向对象的引用，我们就说该对象是存活的。现在的问题是——树中的第一个引用是什么？\n\
  \n要回答这个问题，你需要知道对象树可以有一个或多个根。当你的应用程序可以到达这些根时，整棵树都是可达的。请参考下图（图 3-2）以便更好地理解。从该图可以看出，可达对象是那些只能通过根对象到达的对象。否则，即使对象之间存在链接，这些对象也会被视为不可达，并可以被垃圾回收。\n\
  \n![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig2_HTML.jpg](img/433474_2_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\n对象树中的根对象、可达代码和不可达代码\n\n**3.12 如何将对象标记为不可达？**\n\n你需要确保（你想要标记为可被垃圾回收的）对象在\
  \ Java 应用程序的作用域内不再有任何引用。通常，你会将这样的引用设置为 `null`。你也可以将这些引用赋值指向其他对象，或者让它们超出作用域。\n\n\
  ### 演示 8\n\n考虑一个包含以下程序的简单案例：\n\n```\npackage java2e.chapter3;\nclass Student{\n\
  // 一些代码\n}\nclass GarbageCollectionDemo {\npublic static void main(String args[])\
  \ {\nStudent student1, student2, student3;\nstudent1 = new Student();// Student#1\n\
  student2 = new Student();// Student#2\nstudent3 = new Student();// Student #3\n\
  student1 = null;//情况-1\nstudent3 = student2;//情况-2\nstudent2 = null;//情况-2 续\n}//\
  \ main() 结束\n}\n```\n\n注意，这里你在 `main()` 方法中创建了三个 `Student` 类对象。现在考虑以下情况：\n\n####\
  \ 阶段 1\n\n创建了三个对象和三个引用变量。\n\n```\nstudent1 = new Student();// Student#1\nstudent2\
  \ = new Student();// Student#2\nstudent3 = new Student();// Student #3\n```\n\n\
  见图 3-3。\n\n![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig3_HTML.jpg](img/433474_2_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n阶段 1 后的内存分配\n\n#### 阶段 2\n\n当你将 `student1=null` 赋值后，`Student#1` 对象现在符合垃圾回收条件。见图\
  \ 3-4。\n\n![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig4_HTML.jpg](img/433474_2_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4\n\n阶段 2 后的内存分配\n\n#### 阶段 3\n\n当你写下\n\n```\nstudent3=student2;\n```\n\n\
  时，`student2` 和 `student3` 都指向 `Student#2`。而 `Student#3` 对象现在符合垃圾回收条件。见图 3-5。\n\n\
  ![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig5_HTML.jpg](img/433474_2_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5\n\n阶段 3 后的内存分配\n\n#### 阶段 4\n\n在此阶段，即使你写下\n\n```\nstudent2=null;\n```\n\n\
  `Student#2` 仍然有一个引用（`student3`）指向它。因此，它目前还不符合垃圾回收条件。\n\n在这种情况下，引用 `student3` 只能在\
  \ `main()` 方法结束时超出作用域。但你可以在 `main()` 结束前将其设为 `null`，以便更早地使其符合垃圾回收条件。\n\n\n\n## 终结化\n\
  \n在销毁对象并回收内存之前，GC 会调用 `finalize()` 方法。它是定义在 `Object` 类中的一个受保护方法。以下是 `finalize()`\
  \ 方法的一般形式：\n\n```\nprotected void finalize() {\n//Some code\n}\n```\n\n建议你将清理代码（例如，关闭文件、关闭数据库连接、释放任何占用的非\
  \ Java 资源等）放在此方法内。这样，对象可以在被销毁前执行一些期望的操作。这个过程被称为**终结化**。\n\n但问题在于，你永远不知道 `finalize()`\
  \ 何时会被调用。你只知道 `finalize()` 方法会在垃圾回收之前被调用。语言规范（JLS11）告诉我们：\n\n> *“终结器提供了一种释放无法由自动存储管理器自动释放的资源的机会。在这种情况下，仅仅回收对象使用的内存并不能保证其持有的资源也会被回收。Java\
  \ 编程语言没有指定终结器将在何时被调用，只是说明它会在对象存储被重用之前发生。”*\n\n因此，你不能总是依赖 `finalize()`，你可能需要实现其他方式来释放资源。不过，还有一种变通方法。当你调用\
  \ `System.gc()` 时，可以向垃圾回收器发出请求。它只是告诉 GC 你希望它开始工作。\n\n### 注意\n\n`System.gc()` 等同于调用\
  \ `Runtime.getRuntime().gc()`，因为其定义如下：\n\n`public static void gc() {`\n\n`Runtime.`*getRuntime*`().gc();`\n\
  \n`}`\n\n现在，请查看演示 9 的修改版本，了解如何使用终结化的概念。\n\n### 演示 9\n\n你将在本书后面学习 `protected` 关键字、`throws`\
  \ 关键字以及异常。为了让你了解垃圾回收技术，这里提供了完整的实现供你参考。此演示的输出应是你关注的重点区域。\n\n```\npackage java2e.chapter3;\n\
  class StudentDemo9 {\n//Some code\nprotected void finalize() {\nSystem.out.println(\"\
  Freeing memory. The object with hashcode \" + hashCode() + \" is collected.\");\n\
  }\n}\nclass GarbageCollectionDemo {\npublic static void main(String args[]) throws\
  \ InterruptedException {\nSystem.out.println(\"***Demonstration 9.Exploring Garbage\
  \ Collection.***\\n\");\n//Stage-1\nStudentDemo9 student1, student2, student3;\n\
  student1 = new StudentDemo9();// Student#1\nSystem.out.println(\"The student1.hashCode()=\"\
  \ + student1.hashCode());\nstudent2 = new StudentDemo9();// Student#2\nSystem.out.println(\"\
  The student2.hashCode()=\" + student2.hashCode());\nstudent3 = new StudentDemo9();//\
  \ Student #3\nSystem.out.println(\"The student3.hashCode()=\" + student3.hashCode());\n\
  //Stage-2\nstudent1 = null;\n// Requesting JVM to run Garbage Collector\nSystem.out.println(\"\
  Requesting GC-1\");\nSystem.gc();\nThread.sleep(3000);\n//Stage-3\nstudent3 = student2;\n\
  // Requesting JVM to run Garbage Collector\nSystem.out.println(\"Requesting GC-2\"\
  );\nSystem.gc();\nThread.sleep(3000);\n//Stage-4\nstudent2 = null;\n// Requesting\
  \ JVM to run Garbage Collector\nSystem.out.println(\"Requesting GC-3\");\nSystem.gc();\n\
  Thread.sleep(3000);\nstudent3 = null;\n// Requesting JVM to run Garbage Collector\n\
  System.out.println(\"Requesting GC-4\");\nSystem.gc();\nThread.sleep(3000);\n}//\
  \ End of main()\n}\n```\n\n以下是修改后演示的一个可能输出。此输出可能会有所不同，因为你永远不知道 GC 是否会响应你的请求。\n\n\
  ```\n***Demonstration 9.Exploring Garbage Collection.***\nThe student1.hashCode()=366712642\n\
  The student2.hashCode()=1829164700\nThe student3.hashCode()=2018699554\nRequesting\
  \ GC-1\nFreeing memory. The object with hashcode 366712642 is collected.\nRequesting\
  \ GC-2\nFreeing memory. The object with hashcode 2018699554 is collected.\nRequesting\
  \ GC-3\nRequesting GC-4\nFreeing memory. The object with hashcode 1829164700 is\
  \ collected.\n```\n\n你可以查看演示 9 的分析部分以获得更好的理解。此演示中 `sleep()` 方法并非必需，但添加它们是为了给垃圾回收器一些时间来完成其工作。\n\
  \n## 总结\n\n本章涵盖了以下主题：\n\n*   静态变量和方法的简要概述\n*   使用不同修饰符和 getter-setter 方法进行访问控制的入门讨论\n\
  *   初始化块的使用\n*   嵌套类（含内部类）的讨论\n*   拷贝构造函数的使用\n*   浅拷贝与深拷贝\n*   包装类的使用\n*   垃圾回收\n\
  *   内存泄漏\n*   对象树中的根对象\n*   终结化技术\n\n"
- "# 4. 继承的概念\n\n继承的主要目标是促进代码复用并消除冗余。它还演示了子类如何获取其父类的特性（或特征）。由于父类位于类层次结构的较高层级，子类可以从中派生。子类通常被称为**派生类**或**子类**。父类也被称为**超类**。\n\
  \n## 继承的类型\n\n通常，你会遇到四种类型的继承。在 Java 中，一个类可以使用 `extends` 关键字从另一个类继承。为了方便你参考，我对每种继承类型进行了总结性描述。\n\
  \n### 单继承\n\n一个子类从一个父类派生。以下是此类继承的示例图（图 4-1）和代码。\n\n![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig1_HTML.jpg](img/433474_2_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\n单继承\n\n示例代码：\n\n```\nclass Parent\n{\n//Your code...\n}\nclass Child\
  \ extends Parent\n{\n//Your code...\n}\n```\n\n### 层次继承\n\n多个子类可以从一个父类派生。以下是此类继承的示例图（图\
  \ 4-2）和代码。\n\n![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig2_HTML.jpg](img/433474_2_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n层次继承\n\n示例代码：\n\n```\nclass Parent\n{\n//Your code...\n}\nclass Child1\
  \ extends Parent\n{\n//Your code...\n}\nclass Child2 extends Parent\n{\n//Your code...\n\
  }\n```\n\n### 多级继承\n\n父类可以有孙类。以下是此类继承的示例图（图 4-3）和代码。\n\n![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig3_HTML.jpg](img/433474_2_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\n多级继承\n\n示例代码：\n\n```\nclass Parent\n{\n//Your code...\n}\nclass Child\
  \ extends Parent\n{\n// Your code..\n}\nclass Grandchild extends Child\n{\n// Your\
  \ code...\n}\n```\n\n### 多重继承\n\n一个子类可以从多个父类派生。但 Java 不支持通过类实现这种类型的继承。你需要学习接口。以下是此类继承的示例图（图\
  \ 4-4）和代码。\n\n![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig4_HTML.jpg](img/433474_2_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4\n\n多重继承\n\n示例代码：\n\n```\ninterface MyInterface1\n{\n// Your code\n}\ninterface\
  \ MyInterface2\n{\n//Your code\n}\nclass MyClass implements MyInterface1,MyInterface2\n\
  {\n//Some code\n}\n```\n\n### 注意\n\n1. Java 不支持多重继承（通过类实现）；也就是说，一个子类不能从多个父类派生。要处理这种情况，你需要理解接口。\n\
  2. 还有另一种类型的继承，称为**混合继承**。它是两种或多种继承类型的组合。\n\n\n\n### 演示 1\n\n让我们从一个简单的继承程序开始。在下面的演示中，你有两个类——`ParentClass`\
  \ 和 `ChildClass`。顾名思义，`ChildClass` 通过 `extends` 关键字继承自 `ParentClass`。\n\n```\npackage\
  \ java2e.chapter4;\nclass ParentClass {\npublic void showParentMethod() {\nSystem.out.println(\"\
  I am a Parent Class method.\");\n}\n}\nclass ChildClass extends ParentClass {\n\
  }\nclass Demonstration1 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Demonstration-1.Testing Inheritance.***\");\n// 创建一个 ChildClass 对象\nChildClass\
  \ child1 = new ChildClass();\n// 通过 ChildClass 对象调用 showParentMethod()\nchild1.showParentMethod();\n\
  }\n}\n```\n\n输出：\n\n```\n***Demonstration-1.Testing Inheritance.***\nI am a Parent\
  \ Class method.\n```\n\n注意，你是通过子类对象调用了 `showParentMethod()`。\n\n### 要点记忆\n\n*  \
  \ 在 Java 中，`Object`（位于 `java.lang` 包中）是所有类的超类。所有其他类都直接或间接地继承自该类。\n\n*   除了构造方法（实例构造方法和静态构造方法）之外，所有成员都会被继承。但由于访问权限的限制，并非所有继承的成员都能在子类/派生类中访问。\n\
  \n*   子类可以添加新成员，但不能移除父类成员的定义。（就像你可以为自己选择一个新名字，但不能改变你父母的姓氏一样）。\n\n*   继承层次结构具有传递性；也就是说，如果类\
  \ `C` 继承自类 `B`，而类 `B` 又派生自类 `A`，那么类 `C` 包含类 `B` 和类 `A` 的所有成员。\n\n### 问答环节\n\n**4.1\
  \ 这意味着私有成员也会被继承。这个理解正确吗？**\n\n是的。\n\n**4.2 我如何验证私有成员确实被继承了呢？**\n\n你可以参考演示 2 中的程序和输出。\n\
  \n### 演示 2\n\n考虑以下代码：\n\n```\npackage java2e.chapter4;\nclass A {\nprivate int a;\n\
  }\nclass B extends A {\n}\nclass Demonstration2 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***Demonstration-2.Private members are also inherited***\"\
  );\nB obB = new B();\nA obA = new A();\n// 这证明了 a 也被继承了。请查看错误信息。\nSystem.out.println(obB.a);//\
  \ 错误：字段 A.a 不可见\nSystem.out.println(obB.b);// 错误：b 无法解析或不是字段\nSystem.out.println(obA.a);//\
  \ 错误：字段 A.a 不可见\nSystem.out.println(obA.b);// 错误：b 无法解析或不是字段\n}\n}\n```\n\n图 4-5\
  \ 是来自 Eclipse 编辑器的输出截图。\n\n![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig5_HTML.jpg](img/433474_2_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\n来自 Eclipse 编辑器的输出截图\n\n我们遇到了两种不同类型的错误：\n\n*   ***字段 A.a 不可见***。这表明来自类\
  \ `A` 的私有成员 `a` 被继承到了子类 `B` 中。\n\n*   你用一个字段 `b` 做了一个实验，该字段在此类层次结构中不存在（即该字段不存在——既不在\
  \ `A` 中，也不在 `B` 中）。当你尝试用类 `A` 或类 `B` 的对象访问该字段时，你会遇到一个不同的错误——***b 无法解析或不是字段***。因此，如果\
  \ `a` 在类 `B` 中不存在，你也会得到类似的错误。\n\n### 问答环节\n\n**4.3 为什么 Java 不支持通过类实现的多重继承？**\n\n\
  主要原因是为了避免歧义。它在典型场景中可能会引起混乱；例如，假设你的父类中有一个名为 `show()` 的方法。该父类有多个子类，`Child1` 和 `Child2`，它们为了各自的目的*重写*了\
  \ `show()` 方法。代码可能看起来像演示 3 所示。\n\n### 演示 3\n\n试试这个：\n\n```\nclass Parent {\npublic\
  \ void show() {\nSystem.out.println(\"I am in Parent\");\n}\n}\nclass Child1 extends\
  \ Parent {\npublic void show() {\nSystem.out.println(\"I am in Child1\");\n}\n}\n\
  class Child2 extends Parent {\npublic void show() {\nSystem.out.println(\"I am in\
  \ Child2\");\n}\n}\n```\n\n现在假设你的 `Grandchild` 类同时继承自 `Child1` 和 `Child2`，但没有重写\
  \ `show()` 方法。图 4-6 描述了这一场景。\n\n![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig6_HTML.jpg](img/433474_2_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\nJava 中通过类实现多重继承导致的菱形问题\n\n所以，现在你遇到了一个歧义：`GrandChild` 将从哪个类继承/调用 `show()`——`Child1`\
  \ 还是 `Child2`？为了避免这种类型的歧义，Java 不支持通过类实现的多重继承。这个问题有一个著名的名称——**菱形问题**（这个名称源于类继承图的形状）。\n\
  \n因此，Java 编译器总是会对以下代码报错：\n\n```\nclass GrandChild extends Child1,Child2// 错误：Java\
  \ 不支持\n{\npublic void show() {\nSystem.out.println(\"I am in Grandchild\");\n}\n\
  }\n```\n\n### 注意\n\n1.  上述讨论不仅限于方法。当你通过实例化一个类来创建对象时，该对象会从父类（超类）继承字段。现在，假设你的类有多个超类。如果来自不同父类的构造方法试图实例化同一个字段，你就会遇到同样的问题，因为你需要决定它们的优先级顺序。当你学习接口时，你会了解到它们不包含字段。因此，你无需担心这种由状态的多重继承导致的问题。\n\
  \n2.  在类似上下文中，你可能需要特别注意默认方法（Java 8 中引入）。稍后你将看到相关讨论。\n\n### 问答环节\n\n**4.4 在我看来，编程语言不支持通过类实现的多重继承。这个理解正确吗？**\n\
  \n不正确。这个决定是由编程语言的设计者做出的；例如，C++ 支持通过类实现多重继承的概念。\n\n**4.5 为什么 C++ 设计者支持通过类实现多重继承的概念？看起来菱形问题也会影响他们。**\n\
  \n这是我的观点：C++ 设计者可能希望包含这个特性以使语言更丰富。他们为你提供了这些特性，但将正确的用法留给你自己决定。\n\n另一方面，Java 设计者希望避免由此类特性导致的任何意外后果。你将了解到，多重继承会在各种情况下让你的生活变得困难；例如，当你需要维护构造方法链时，或者当你需要进行类型转换时（向下转型总是有风险的；你将在第\
  \ 5 章，问答 5.14 中详细看到这个讨论），等等。所以，在我看来，Java 设计者只是想让语言更简单、更不容易出错。\n\n**4.6 Java 中有混合继承吗？**\n\
  \n仔细想想。混合继承是两种或多种继承类型的组合。所以，如果你不试图组合任何通过类实现的多重继承类型，这个问题的答案是“是”。但如果你试图用任何类型的多重继承（通过类）来构成混合继承，Java\
  \ 编译器会立即提出异议。\n\n**4.7 假设你有一个父类和一个子类。你能猜出这些类的构造方法会按什么顺序被调用吗？**\n\n你必须记住，构造方法的调用遵循从父类到子类的路径。让我们用下面的演示来测试一下。\n\
  \n\n\n### 演示 4\n\n假设你有一个父类、一个子类和一个孙类。我们分别称它们为 `Parent4`、`Child4` 和 `Grandchild4`。顾名思义，`Child4`\
  \ 类继承自 `Parent4`，而 `Grandchild4` 继承自 `Child4` 类。现在，创建一个 `Grandchild4` 类的对象。从以下演示的输出中，你可以看到构造函数的调用顺序与其派生顺序一致。\n\
  \n```\npackage java2e.chapter4;\nclass Parent4 {\nParent4() {\nSystem.out.println(\"\
  Inside Parent Constructor.\");\n}\n}\nclass Child4 extends Parent4 {\nChild4() {\n\
  System.out.println(\"Inside Child Constructor.\");\n}\n}\nclass Grandchild4 extends\
  \ Child4 {\nGrandchild4() {\nSystem.out.println(\"Inside GrandChild Constructor.\"\
  );\n}\n}\nclass Demonstration4 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Demonstration-4\\. Testing constructor calling sequence***\");\nGrandchild4 grandChild\
  \ = new Grandchild4();\n}\n}\n```\n\n输出：\n\n```\n***Demonstration-4\\. Testing constructor\
  \ calling sequence***\nInside Parent Constructor.\nInside Child Constructor.\nInside\
  \ GrandChild Constructor.\n```\n\n### 问答环节\n\n**4.8 有时我不确定在继承层次结构中，哪个应该是父类，哪个应该是子类。我该如何处理这种情况？**\n\
  \n你可以尝试记住一些简单的陈述，例如：足球运动员是运动员，但反过来不一定成立。或者，公交车是交通工具，但反过来不一定成立。这种“is-a”测试可以帮助你决定哪个应该是父类；例如，根据前面的陈述，你可以得出结论：`Vehicle`\
  \ 是父类，`Bus` 是子类。\n\n你也可以使用这种“is-a”测试来预先判断一个类是否可以放在同一个继承层次结构中。因此，当你发现公交车不是鸟时，你就不会试图将它们放在同一个继承层次结构中。\n\
  \n## 特殊关键字：super\n\n在 Java 中，有一个特殊的关键字叫做 `super`。它用于以高效的方式访问父类的成员。每当子类想要引用其直接父类时，都可以使用\
  \ `super` 关键字。\n\n让我们在以下示例中探讨 `super` 关键字的不同用法。\n\n### 演示 5\n\n你可以使用以下代码行创建一个子类实例：\n\
  \n```\nChild5 obB2 = new Child5(1, 2, 3);\n```\n\n子类构造函数可以反过来使用 `super` 关键字调用父类构造函数。请注意以下代码块中的粗体行：\n\
  \n```\nChild5(int a, int b, int c) {\n//System.out.println(\"Before setting,c=\"\
  + this.c);//Error:Constructor call must be the first statement in a //constructor\n\
  super(a, b);\nSystem.out.println(\"I am in child constructor.\");\nSystem.out.println(\"\
  Before setting,c=\"+ this.c);\nthis.c = c;\nSystem.out.println(\"Now c=\"+ this.c);\n\
  }\n```\n\n程序的其他部分不言自明。现在，执行该程序，然后阅读分析部分以获得更好的理解。\n\n```\npackage java2e.chapter4;\n\
  class Parent5 {\nprivate int a;\nprivate int b;\nParent5(int a, int b) {\nSystem.out.println(\"\
  I am in parent constructor.\");\nSystem.out.println(\"Before setting,a=\"+ this.a);\n\
  System.out.println(\"Before setting, b=\"+ this.b);\nSystem.out.println(\"Setting\
  \ the values for instance variables a and b.\");\nthis.a = a;\nthis.b = b;\nSystem.out.println(\"\
  Now a=\"+ this.a);\nSystem.out.println(\"Now b=\"+ this.b);\n}\nvoid parent5Method()\
  \ {\nSystem.out.println(\"I am a parent method.\");\n}\n}\nclass Child5 extends\
  \ Parent5 {\nprivate int c;\nChild5(int a, int b, int c) {\n//System.out.println(\"\
  Before setting,c=\"+ this.c);//Error:Constructor call must be the first statement\
  \ in a //constructor\nsuper(a, b);\nSystem.out.println(\"I am in child constructor.\"\
  );\nSystem.out.println(\"Before setting,c=\"+ this.c);\nthis.c = c;\nSystem.out.println(\"\
  Now c=\"+ this.c);\n}\nvoid child5Method() {\nSystem.out.println(\"I am a child\
  \ method.\");\nSystem.out.println(\"I am calling the parent method.\");\nsuper.parent5Method();\n\
  }\n}\npublic class Demonstration5 {\npublic static void main(String[] args) {\n\
  System.out.println(\"***Demonstration-5\\. The uses of the 'super' keyword Demo***\"\
  );\nChild5 obB2 = new Child5(1, 2, 3);\n//System.out.println(\"a in ObB2=\" + obB2.a);//Error:a\
  \ is private\n//System.out.println(\"b in ObB2=\" + obB2.b);//Error:b is private\n\
  //System.out.println(\"c in ObB2=\" + obB2.c);//Error:c is private\nobB2.child5Method();\n\
  }\n}\n```\n\n输出：\n\n```\n*** Demonstration-5\\. The uses of the 'super' keyword\
  \ Demo***\nI am in parent constructor.\nBefore setting,a=0\nBefore setting, b=0\n\
  Setting the values for instance variables a and b.\nNow a=1\nNow b=2\nI am in child\
  \ constructor.\nBefore setting,c=0\nNow c=3\nI am a child method.\nI am calling\
  \ the parent method.\nI am a parent method.\n```\n\n你需要理解为什么必须使用关键字 `super`。如果你在前面的示例中没有使用它，你可能需要编写类似这样的代码：\n\
  \n```\npublic Child(int a, int b, int c)\n{\nthis.a = a;\nthis.b = b;\nthis.c =\
  \ c;\n}\n```\n\n这种方法有两个主要问题。你试图编写重复的代码来初始化实例变量 `a` 和 `b`。此外，在这种情况下，你会收到一个编译时错误，因为\
  \ `a` 和 `b` 由于其保护级别（注意它们是私有的）而无法访问。通过使用 `super` 关键字，你可以有效地处理这两种情况。你可能还会注意到，父类构造函数在子类构造函数之前被调用。理想情况下，你的目标应该是始终保持正确的***构造函数链***。\n\
  \n### 要点记忆\n\n*   注意被注释掉的行：`//System.out.println(\"Before setting,c=\"+ this.c);//`*Error:Constructor\
  \ call must be the first statement in a constructor.* 它用于提醒你，Java 设计指南规定，对超类构造函数的调用应该是子类（或派生类）构造函数中的第一条语句。你可以使用\
  \ `super()` 或 `super(parameter list)` 来调用超类构造函数的正确版本。\n\n*   该指南还指出：“*如果一个构造函数没有显式调用超类构造函数，Java\
  \ 编译器会自动插入对超类无参构造函数的调用。如果超类没有无参构造函数，你将收到一个编译时错误。Object 确实有这样的构造函数，因此如果 Object 是唯一的超类，则没有问题。*”\n\
  \n    [`https://docs.oracle.com/javase/tutorial/java/IandI/super.html`](https://docs.oracle.com/javase/tutorial/java/IandI/super.html)\n\
  \n*   注意输出的最后两行。它演示了你可以使用 `super` 关键字从派生类方法中调用超类方法。\n\n让我们在以下示例中探讨 `super` 的另一种用法。关键字\
  \ `super` 可以在方法、构造函数或实例变量的上下文中使用。当你只考虑方法和实例变量时，你可以将用法概括为以下形式：\n\n```\nsuper.member;\n\
  ```\n\n其中 `member` 可以是实例变量或方法。\n\n有时，派生类可以隐藏最初在超类中定义的实例变量。在这种情况下，`super` 允许你使用派生类的对象访问超类中的实例变量。因此，在以下演示中，你可以看到以下代码行：\n\
  \n```\nsuper.myInt = 12;\n```\n\n其中 `myInt` 是父类的一个实例变量。\n\n\n\n### 演示 6\n\n在演示 5\
  \ 中，你看到了可以用相同的方式调用父类方法。在演示 6 中，你有一个派生类（`Child6`），它继承自类 `Parent6`。同时，`Parent6` 类有一个名为\
  \ `parentClassMethod()` 的方法。因此，在子类中，你可以使用以下代码引用父类方法：\n\n```\nsuper.parentClassMethod();\n\
  ```\n\n以下示例演示了这两种情况：\n\n```\npackage java2e.chapter4;\nclass Parent6 {\nint myInt;\n\
  Parent6() {\nmyInt = 25;// 一些默认值\n}\npublic void parentClassMethod(){\nSystem.out.println(\"\
  我在 parentClassMethod() 方法内部。\");\n}\n}\nclass Child6 extends Parent6 {\nint myInt;//\
  \ 这将隐藏 Parent6 中的 myInt\nChild6() {\nSystem.out.println(\"初始时，父类中 myInt 的值为=\" +\
  \ super.myInt);\nSystem.out.println(\"现在设置父类中 myInt 的新值 (12)。\");\nsuper.myInt =\
  \ 12;// 设置父类中的 myInt\nSystem.out.println(\"现在设置子类中 myInt 的值 (50)。\");\nmyInt = 50;//\
  \ 设置子类中的 myInt\n}\nvoid display() {\nSystem.out.println(\"父类中 myInt 的值为=\" + super.myInt);\n\
  System.out.println(\"子类中 myInt 的值为=\" + myInt);\n}\nvoid invokeParentMethod()\n\
  {\nSystem.out.println(\"从子类调用父类方法。\");\nsuper.parentClassMethod();\n}\n}\nclass\
  \ Demonstration6 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示-6：'super' 关键字的另一种用法***\\n\");\nChild6 childObject = new Child6();\nchildObject.display();\n\
  childObject.invokeParentMethod();\n}\n}\n```\n\n输出：\n\n```\n***演示-6：'super' 关键字的另一种用法***\n\
  初始时，父类中 myInt 的值为=25\n现在设置父类中 myInt 的新值 (12)。\n现在设置子类中 myInt 的值 (50)。\n父类中 myInt\
  \ 的值为=12\n子类中 myInt 的值为=50\n从子类调用父类方法。\n我在 parentClassMethod() 方法内部。\n```\n\n###\
  \ 要点记忆\n\n*   根据语言规范 (JLS 11)：使用关键字 `super` 的形式仅在类的实例方法、实例初始化器或构造函数中，或者类的实例变量初始化器中有效。否则，你将看到编译时错误。\n\
  \n*   `java.lang.Object` 类位于类层次结构的顶层。所有其他类都是它的直接或间接子类。`Object` 类中一些有用的方法包括 `protected\
  \ native Object clone(){}`*、*`String toString()`*、*`public final native void notify(){}`*、*`public\
  \ final native void notifyAll(){}`* 和 *`public native int hashCode(){}`*。*\n\n*\
  \   你使用 `super` 关键字来引用*直接父类的对象。但 `Object` 类没有父类，*因此你不能在 `Object` 类的声明中使用 `super`\
  \ 关键字。\n\n*   `super` 关键字类似于 C++ 或 C# 中的 `base` 关键字。但你需要记住一个限制：对父类构造函数的调用必须是子类构造函数中的第一行代码。\n\
  \n### 问答环节\n\n**4.9 你能总结一下 super 关键字的不同用法吗？**\n\n在演示 5 和 6 中，你已经看到 `super` 关键字可以用于以下任何一种情况：\n\
  \n*   调用父类构造函数\n\n*   访问父类成员（方法或数据成员）。\n\n**4.10 假设父类和子类中存在同名的方法。如果你创建一个子类对象并尝试调用这个同名方法，会调用哪一个？**\n\
  \n你在这里试图引入方法重写的概念。你将在本书稍后（第 5 章）看到相关讨论。但你已经学会了可以使用关键字 `super` 来引用父类方法。因此，为了回答你的问题，请考虑以下程序。\n\
  \n### 演示 7\n\n在这里，父类（`Parent7`）和子类（`Child7`）都有一个名为 `showMe()` 的方法。我建议你通读程序及其对应的输出。然后，阅读分析部分以获得更好的理解。\n\
  \n```\npackage java2e.chapter4;\nclass Parent7 {\npublic void showMe() {\nSystem.out.println(\"\
  目前，我在父类方法内部。\");\n}\n}\nclass Child7 extends Parent7 {\npublic void showMe() {\n\
  System.out.println(\"我在子类方法内部。\");\n//System.out.println(\"现在调用父类方法。\");\n//super.showMe();\n\
  }\n}\npublic class Demonstration7 {\npublic static void main(String[] args) {\n\
  System.out.println(\"***演示-7.测试 super 关键字的用法。****\");\nChild7 obChild = new Child7();\n\
  obChild.showMe();\n}\n}\n```\n\n输出：\n\n```\n***演示-7.测试 super 关键字的用法。***\n我在子类方法内部。\n\
  ```\n\n在这里，你的派生类（`Child7`）方法隐藏了其父类（`Parent7`）的方法。\n\n如果你想调用父类方法，你可以创建对象并像下面这样调用该方法：\n\
  \n```\nParent7 obParent = new Parent7();\nobParent.showMe();//现在将调用父类方法。\n```\n\n\
  或者，你可以*取消注释*子类方法中的以下行（以粗体显示），以便从子类方法中调用父类方法：\n\n```\n//System.out.println(\"现在调用父类方法。\"\
  );\n//super.showMe();\n```\n\n现在，如果你编译并运行该程序，你将获得以下输出：\n\n```\n***演示-7.测试 super\
  \ 关键字的用法。***\n我在子类方法内部。\n现在调用父类方法。\n目前，我在父类方法内部。\n```\n\n\n\n### 问答环节\n\n**4.11\
  \ 我知道子类方法可以调用父类方法。但父类方法如何调用子类方法呢？**\n\n你无法做到这一点。必须记住，父类在其子类之前就已经完成，因此它对子类方法一无所知。它只是声明了一些东西（可以理解为某种契约/方法），供其子类使用。它只负责给予，并不期望从子类那里得到任何回报。\n\
  \n如果你仔细观察，会发现“is-a”测试是单向的（例如，公交车总是交通工具，但反过来不一定成立；因此，不存在反向继承的概念）。\n\n**4.12 我意识到，在子类方法内部，如果想调用父类方法并在其中添加代码，可以使用关键字**\
  \ **super。这样对吗？**\n\n是的。\n\n**4.13 在面向对象编程中，继承机制帮助我们复用行为。还有其他方式可以实现这一点吗？**\n\n是的。虽然继承的概念在很多地方都有使用，但它并不总是最佳解决方案。为了更好地理解这一点，你需要了解设计模式的概念。继承的一个非常常见的替代方案是使用组合，本书第\
  \ 9 章会介绍组合。\n\n**4.14 在我看来，如果某个用户已经为应用程序开发了一个方法，那么系统中的其他用户应该始终通过继承的概念来复用同一个方法，以避免重复劳动。这种理解正确吗？**\n\
  \n不正确。你不应该以这种方式泛化继承。这取决于具体的应用程序和用途。假设有人已经创建了一个 `show()` 方法来描述 `Car` 类的详细信息。现在，假设你也创建了一个名为\
  \ `Animal` 的类，并且需要用某个方法描述动物的特征。假设你认为 `show()` 这个名字最适合你的方法。在这种情况下，既然你已经在 `Car` 类中有了一个\
  \ `show()` 方法，并且你认为应该为你的 `Animal` 类复用这个方法，那么你会写出类似这样的代码：\n\n```\nclass Animal extends\
  \ Car{...} .\n```\n\n现在，思考一下。“这是好的设计吗？” 你必须同意，汽车和动物之间没有任何关系。因此，你不应该将它们放在同一个继承层次结构中。\n\
  \n**4.15 在 Java 中，如何继承构造函数或析构函数？**\n\n在 Java 中，构造函数不会被继承。你还应该记住，Java 中没有析构函数（尽管你可以将\
  \ `finalize()` 方法视为其近似替代）。\n\n### 演示 8\n\n考虑以下代码片段。它可以正常运行。但请仔细观察被注释掉的行。你会发现需要注意一个常见错误。例如，你不能用第\
  \ 12 行和第 13 行替换第 15 行来编译代码。但是，这两种方法看起来似乎在做同样的事情。\n\n```\npackage java2e.chapter4;\n\
  class Demo8A {\npublic Demo8A(int x) {\nSystem.out.print(x);\n}\n}\nclass Demo8B\
  \ extends Demo8A {\npublic Demo8B(int a, int b) {\n// 错误编码\n// int c = a + b;//第\
  \ 12 行\n// super(c); //错误//第 13 行\n// 正确编码\nsuper(a + b); // 第 15 行\n}\n}\n```\n\
  \n从 Java 文档来看，Java 开发者似乎不想破坏构造函数链。看起来他们认为，如果允许在 `super` 调用之前放置这样的语句，有人可能会滥用它；例如，他们可能在父类对象本身创建之前执行一些无效操作。\n\
  \n### 问答环节\n\n**4.16 一些文档说** **this()** **应该是第一条语句。现在，你又告诉我们** **super()** **应该是第一条语句。如果同一个构造函数中同时有这两者，会发生什么？**\n\
  \n好问题。你必须注意，两者都是构造函数调用。如果有一个构造函数调用，它必须是第一条语句。因此，你不能在同一个构造函数中同时拥有两者。\n\n**4.17 如果是这样，那这是一个非常严格的设计。不是吗？**\n\
  \n下面的程序和输出分析可以消除你的疑虑。\n\n### 演示 9\n\n那么，让我们来看一下下面的程序和输出。\n\n```\npackage java2e.chapter4;\n\
  class Parent9 {\nint i;\nParent9() {\nSystem.out.println(\"调用父类的无参构造函数。\");\n}\n\
  }\nclass Child9 extends Parent9 {\nint b;\nChild9() {\n// this() 和 super() 不能同时使用\n\
  // super();\nthis(2);\nSystem.out.println(\"调用 Child9 的无参构造函数。\");\n}\nChild9(int\
  \ b) {\nthis.b = b;\nSystem.out.println(\"进入 Child9 带一个参数的构造函数，b= \" + b);\n}\n\
  }\nclass Demonstration9 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示-9.关于 this 和 super 关键字的案例研究。***\");\nChild9 obChild9 = new Child9();\n}\n}\n\
  ```\n\n输出：\n\n```\n***演示-9.关于 this 和 super 关键字的案例研究。***\n调用父类的无参构造函数。\n进入 Child9\
  \ 带一个参数的构造函数，b= 2\n调用 Child9 的无参构造函数。\n```\n\n现在，启用 `super` 语句并注释掉 `this()` 构造函数，如下所示：\n\
  \n```\nChild9() {\n// this() 和 super() 不能同时使用\nsuper();\n//this(2);\nSystem.out.println(\"\
  调用 Child9 的无参构造函数。\");\n}\n```\n\n然后再次运行程序。你将看到以下输出：\n\n```\n***演示-9.关于 this 和 super\
  \ 关键字的案例研究。***\n调用父类的无参构造函数。\n调用 Child9 的无参构造函数。\n```\n\n你注意到有趣的事情了吗？在这种情况下，无论你是否通过\
  \ `super()` 显式调用父类构造函数，父类构造函数都会被调用。因此，你可以假设，如果 Java 设计者允许我们在同一个构造函数中放置 `super()`\
  \ 和 `this()`，你很可能会在构造函数链的调用中导致多次 super 调用，这显然不是一个好的设计。\n\n### 问答环节\n\n**4.18 要实现继承的概念，我需要扩展类。这种理解正确吗？**\n\
  \n是的。但你需要记住，你也可以通过实现接口来使用这个概念。本书第 6 章会讨论接口。\n\n## 总结\n\n本章涵盖了以下主题：\n\n*   继承的概念\n\
  *   不同类型的继承\n*   为什么 Java 不支持通过类实现的多重继承\n*   Java 允许的混合继承类型\n*   `super` 关键字的不同用法\n\
  *   继承层次结构中的构造函数调用顺序\n*   如果子类也包含同名方法，如何调用父类方法\n*   如何将类放入继承层次结构中\n*   继承概念的正确使用方式\n\
  \n"
- "# 5. 熟悉多态\n\n让我们回顾一下你已经学过的关于多态的知识。多态通常与*一个名称，多种形式*相关联；例如，如果你有两个整数操作数进行*加法*运算，你期望得到整数的和，但如果操作数是两个字符串，你期望得到拼接后的字符串。我还提到过多态可以分为两种类型：编译时多态和运行时多态。\n\
  \n在这里，我将从编译时多态开始我们的讨论。\n\n在编译时多态中，编译器可以在编译时将适当的方法绑定到相应的对象，因为它拥有所有必要的信息（例如，方法参数），并且在程序编译后很早就知道要调用哪个方法。这就是为什么它也被称为*静态绑定*或*早期绑定*。在\
  \ Java 中，可以通过方法重载来实现编译时多态。\n\n## 方法重载\n\n让我们从下面的程序开始，并分析相应的输出。\n\n\n\n### 演示 1\n\
  \n在本程序中，你有一个`Addition`类，其中包含三个方法。每个方法都有相同的名称`sum()`，但它们可以接受不同的参数。在 Java 中，这种编码方式是允许的。\n\
  \n现在，编译并运行该程序，然后分析输出结果。\n\n```\npackage java2e.chapter5;\nclass Addition {\nint\
  \ sum(int x, int y) {\nreturn x + y;\n}\ndouble sum(double x, double y) {\nreturn\
  \ x + y;\n}\nString sum(String s1, String s2) {\nreturn s1.concat(s2);\n}\n}\nclass\
  \ Demonstration1 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Demonstration-1.Method overloading example***\");\nAddition additionOb = new\
  \ Addition();\nint sumOfIntergers = additionOb.sum(10, 20);\nSystem.out.println(\"\
  10 + 20 is :\" + sumOfIntergers);\ndouble sumOfDoubles = additionOb.sum(10.5, 20.7);\n\
  System.out.println(\"10.5 + 20.7 is :\" + sumOfDoubles);\nString sumOfStrings =\
  \ additionOb.sum(\"Smith\", \"Turner\");\nSystem.out.println(\"'Smith'+ 'Turner'\
  \ is :\" + sumOfStrings);\n}\n}\n```\n\n输出结果：\n\n```\n***Demonstration-1.Method\
  \ overloading example***\n10 + 20 is :30\n10.5 + 20.7 is :31.2\n'Smith'+ 'Turner'\
  \ is :SmithTurner\n```\n\n你可以看到，这些方法名称相同，都是“sum”，但一旦执行，它们能够完成不同的工作。\n\n当你进行这种编码时，称之为方法重载。在方法重载中，方法名相同，但方法签名不同。在此上下文中，Java\
  \ 语言规范（第 11 版）指出：“一个类不能有多个具有相同签名但**基本**返回类型不同的方法。”\n\n### 要点记忆\n\n*   在 Java 中，方法重载可以帮助你实现编译时多态。\n\
  \n*   在方法重载中，方法参数可以在数量、顺序或参数类型上有所不同。\n\n*   这种编码方式也称为静态绑定、早期绑定、静态方法分派或静态多态。\n\n\
  *   在方法重载中，对重载方法的调用是在编译时而非执行时解析的。\n\n### 问答环节\n\n**5.1 什么是方法签名？**\n\n通常，方法名及其参数的数量、类型和顺序构成了它的签名。Oracle\
  \ Java 文档也证实了这一点，指出方法声明的两个组成部分构成了方法签名——方法名和参数类型。请参见以下内容：\n\n[`https://docs.oracle.com/javase/tutorial/java/javaOO/methods.html`](https://docs.oracle.com/javase/tutorial/java/javaOO/methods.html)\n\
  \n因此，Java 编译器可以区分名称相同但参数列表不同的方法；例如，对于 Java 编译器来说，方法`double add(int x, double y){}`与方法`double\
  \ add(double x, int y){}`或`double add( int x, int y, int z)`是不同的。\n\n**5.2 以下代码片段是方法重载的例子吗？**\n\
  \n```\nclass Addition\n{\npublic int sum(int x, int y)\n{\nreturn x + y;\n}\npublic\
  \ double sum(int x, int y, int z)\n{\nreturn x + y+ z;\n}\n}\n```\n\n是的。\n\n**5.3\
  \ 以下代码片段是方法重载的例子吗？**\n\n```\nclass Addition\n{\nint sum(int x, int y)\n{\nreturn\
  \ x + y;\n}\ndouble sum(int x, int y)\n{\nreturn x + y;\n}\n}\n```\n\n不是。编译器不会考虑基本返回类型来区分这些方法。换句话说，Java\
  \ 不支持基于基本返回类型的重载。Eclipse IDE 会通过图 5-1 所示的错误来提示问题。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig1_HTML.jpg](img/433474_2_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\nEclipse 编辑器中显示错误消息的输出快照\n\n当你学习 Java 中的协变返回类型时，你会看到 JVM（1.5 及更高版本）允许基于返回类型的重载，即一个类可以有两个或多个仅返回类型不同的方法，但在这种情况下，重写方法的返回类型应该是被重写方法返回类型的子类型。你很快就会学到这些术语。\n\
  \n**5.4 我们可以有构造函数重载吗？**\n\n当然可以。你可以将构造函数视为一种没有返回类型的特殊方法。\n\n### 演示 2\n\n你可以编写以下程序来演示构造函数重载。\n\
  \n```\npackage java2e.chapter5;\nclass ConstructorOverloadEx {\nConstructorOverloadEx()\
  \ {\nSystem.out.println(\"Constructor cannot accept any argument.\");\n}\nConstructorOverloadEx(int\
  \ a) {\nSystem.out.println(\"Constructor can accept one integer argument: \" + a);\n\
  }\nConstructorOverloadEx(int a, double b) {\nSystem.out.println(\"Constructor can\
  \ accept one integer argument: \" + a + \" and one double argument: \" + b);\n}\n\
  }\npublic class Demonstration2 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Demonstration-2.Constructor Overloading.***\");\nConstructorOverloadEx ob1 =\
  \ new ConstructorOverloadEx();\nConstructorOverloadEx ob2 = new ConstructorOverloadEx(2);\n\
  ConstructorOverloadEx ob3 = new ConstructorOverloadEx(2, 3.7);\n}\n}\n```\n\n输出结果：\n\
  \n```\n***Demonstration-2.Constructor Overloading.***\nConstructor cannot accept\
  \ any argument.\nConstructor can accept one integer argument: 2\nConstructor can\
  \ accept one integer argument: 2 and one double argument: 3.7\n```\n\n### 问答环节\n\
  \n**5.5 在我看来，演示 2 也描述了方法重载。构造函数和方法有什么区别？**\n\n我已在关于类的讨论中（参见第 2 章）谈到了构造函数。供你参考，你可以将构造函数视为一种特殊的方法，它与类同名且没有返回类型。但还有许多其他区别。你需要记住构造函数的关键工作是初始化对象。你不能直接调用它们*。\n\
  \n**5.6 你能编译演示 3 中的代码吗？**\n\n### 演示 3\n\n代码如下：\n\n```\nclass Test {\npublic Test()\
  \ {\nSystem.out.println(\"A Constructor with no argument\");\n}\npublic void Test()\
  \ {\nSystem.out.println(\"This is a method.\");\n}\n}\n```\n\nJava 允许这样做，但在 Eclipse\
  \ 编辑器中，你会注意到警告消息`\"This method has a constructor name.\"` 此特性在不同计算机语言中可能有所不同。例如，C#编译器在类似情况下会引发错误，如图\
  \ 5-2 所示。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig2_HTML.jpg](img/433474_2_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n\n来自 Visual Studio 2017 IDE 的输出快照\n\n### 问答环节\n\n**5.7 可以重载 main()方法吗？**\n\
  \n可以。请查看以下程序、输出结果以及分析。\n\n\n\n### 演示 4\n\n在下面的演示中，你会注意到存在三个不同重载版本的 `main()` 方法。\n\
  \n```\npackage java2e.chapter5;\nclass Demonstration4 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***演示-4.测试重载的 main()方法。***\");\nSystem.out.println(\"\
  在标准 main-main(String[] args) 内部。\");\n// main(\"hello\");\n// main(5,\"hello\");\n\
  }\npublic static void main(String arg1) {\nSystem.out.println(\"调用了带一个字符串参数的重载 main()\
  \ 方法。\");\n}\npublic static void main(int arg1, String arg2) {\nSystem.out.println(\"\
  调用了带一个整数和一个字符串参数的重载 main() 方法。\");\n}\n}\n```\n\n输出：\n\n```\n***演示-4.测试重载的 main()方法。***\n\
  在标准 main-main(String[] args) 内部。\n```\n\n如你所见，上述程序编译成功。当你运行程序时，它会调用标准的 `main()`\
  \ 方法。此外，你可以从这个标准的 `main()` 方法中调用其他重载的方法。例如，如果你取消上述程序中以下两行的注释：\n\n```\n// main(\"\
  hello\");\n// main(5,\"hello\");\n```\n\n你将得到以下输出：\n\n```\n***演示-4.测试重载的 main()方法。***\n\
  在标准 main-main(String[] args) 内部。\n调用了带一个字符串参数的重载 main() 方法。\n调用了带一个整数和一个字符串参数的重载\
  \ main() 方法。\n```\n\n### 问答环节\n\n**5.8 我很困惑。为什么以下程序会出现编译错误？**\n\n```\npackage chapter5.testcodes;\n\
  public class Test2 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示-4.测试重载的 main()方法。***\");\nSystem.out.println(\"在标准 main-main(String[] args)\
  \ 内部。\");\n// main(\"hello\");\n// main(5,\"hello\");\n}\npublic static void main(String...\
  \ args) {\nSystem.out.println(\"在 String... args 内部。\");\n}\n}\n```\n\n在这种情况下，存在歧义，因为调用可以通过这两种方法中的任何一种进行转换。Eclipse\
  \ 编辑器也会通过错误消息指出这一点，提示你使用了重复的方法（见图 5-3）。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig3_HTML.jpg](img/433474_2_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n在 Eclipse 编辑器中，当你使用重复方法时，错误消息的输出快照\n\n**5.9 Java 是否支持用户自定义运算符重载的概念？**\n\
  \n不支持。\n\n**5.10 以下演示中的代码能编译吗？**\n\n### 演示 5\n\n代码如下：\n\n```\npackage java2e.chapter5;\n\
  class Class5\n{\npublic void myMethod(int... a){\nSystem.out.println(\"在 myMethod(int...\
  \ a) 内部\");\n}\npublic void myMethod(int a, int b){\nSystem.out.println(\"在 myMethod(int\
  \ a, int b) 内部\");\n}\npublic void myMethod(boolean... b){\nSystem.out.println(\"\
  在 myMethod(boolean... a) 内部\");\n}\n}\nclass Demonstration5 {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"***演示-5.测试方法重载。***\");\nClass5 ob5=new\
  \ Class5();\nob5.myMethod(1);\nob5.myMethod(1,2);\nob5.myMethod();\n}\n}\n```\n\n\
  不能。编译器能够解析 `ob5.myMethod(1)` 和 `ob5.myMethod(1,2)` 这两个调用，但 `ob5.myMethod()` 让它感到困惑。这个调用可以通过\
  \ `myMethod(int... a)` 或 `myMethod(boolean... a)` 进行转换。\n\n由于这种歧义，它会引发编译时错误（见图 5-4）。\n\
  \n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig4_HTML.jpg](img/433474_2_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\n\nEclipse 编辑器中因歧义调用导致错误消息的代码快照\n\n如果你从上述代码中移除 `myMethod(boolean... a){}`，你将得到以下输出：\n\
  \n```\n***演示-5.测试方法重载。***\n在 myMethod(int... a) 内部\n在 myMethod(int a, int b) 内部\n\
  在 myMethod(int... a) 内部\n```\n\n### 注意\n\n你可能会注意到问答 5.8 和 5.10 中代码片段的语法差异。在 5.8\
  \ 中，你处理的是 `String[]` 和 `String...`，但在 5.10 中，你处理的是 `int...` 和 `boolean...`。\n\n\
  ### 良好编程实践技巧\n\n尽量保持重载方法的参数名称及其对应顺序的一致性。\n\n以下是一个良好设计的示例：\n\n```\npublic void showMe(int\
  \ a) {..}\npublic void showMe(int a, int b){...}\n```\n\n注意在第二行中，`int a` 的位置与第一行相同。\n\
  \n以下是不推荐的设计：\n\n```\npublic void showMe(int a) {..}\npublic void showMe(int x, int\
  \ b){...}\n```\n\n注意在第二行中，代码以 `int x` 开头，而不是 `int a`。\n\n## 方法重写\n\n在某些情况下，你的派生类可能想要重新定义或修改父类的行为。方法重写就是在这种场景下出现的。请考虑以下程序及其输出。然后仔细阅读分析部分中的每一点。\n\
  \n以下是关于以下程序的重要说明：\n\n*   你有两个类——`ParentClass` 和 `ChildClass`。顾名思义，`ChildClass` 是一个派生类，派生自其父类\
  \ `ParentClass`。\n\n*   在 `ParentClass` 和 `ChildClass` 中都定义了一个名为 `showMe()` 的方法，具有相同的签名和返回类型。这仅仅意味着\
  \ `ChildClass` 想要重新定义 `ParentClass` 中已经存在的 `showMe()` 方法，但它对另一个方法 `doNotChangeMe()`\
  \ 没有意见。\n\n*   在 `main()` 方法中，创建了一个子类对象 `childOb`。当你通过这个对象调用 `doNotChangeMe()` 方法时，它会调用在\
  \ `ParentClass` 中定义的方法（遵循继承特性）。这没什么神奇的。\n\n*   当你通过这个对象调用 `showMe()` 方法时，它会调用在 `ChildClass`\
  \ 中定义的 `showMe()` 版本；也就是说，父类的方法版本被重写了。因此，这种场景被称为**方法重写。**\n\n*   `ParentClass` 中的\
  \ `showMe()` 被称为**被重写的方法**，而 `ChildClass` 中的 `showMe()` 被称为**重写的方法。**\n\n### 演示\
  \ 6\n\n现在，请仔细阅读演示 6。\n\n```\npackage java2e.chapter5;\nclass ParentClass {\n// 被重写的方法\n\
  public void showMe() {\nSystem.out.println(\"在 ParentClass.showMe() 内部\");\n}\n\
  public void doNotChangeMe() {\nSystem.out.println(\"在 ParentClass.doNotChangeMe()\
  \ 内部。\");\n}\n}\nclass ChildClass extends ParentClass {\n// 重写的方法\npublic void showMe()\
  \ {\nSystem.out.println(\"在 ChildClass.showMe() 内部。\");\n}\n}\nclass Demonstration6\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"*** 方法重写演示。***\"\
  );\nChildClass childOb = new ChildClass();\nchildOb.doNotChangeMe();\nchildOb.showMe();//\
  \ 将显示被重写的方法\n}\n}\n```\n\n输出：\n\n```\n*** 方法重写演示。***\n在 ParentClass.doNotChangeMe()\
  \ 内部。\n在 ChildClass.showMe() 内部。\n```\n\n你会注意到，在这种情况下，父类和子类方法的返回类型、签名和访问修饰符是相同的。在上述示例中，如果你将子类\
  \ `showMe()` 的访问权限从 public 改为 protected，如下所示：\n\n```\n//错误\nprotected void showMe()\
  \ {\nSystem.out.println(\"在 ChildClass.showMe() 内部。\");\n}\n```\n\n你将收到一个编译错误，提示\
  \ `无法降低继承自 ParentClass 的方法的可见性`（图 5-5）。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig5_HTML.jpg](img/433474_2_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n\n在 Eclipse 编辑器中，当你降低继承方法的可见性时出现的错误消息快照\n\n### 注意\n\nJava 中有一个称为协变返回类型的概念。我稍后会讨论这个主题。由于这是一个相对高级的概念，建议你先理解原始概念。\n\
  \n\n\n### 问答环节\n\n**5.11 方法重写的主要优势是什么？**\n\n方法重写可以帮助你实现运行时多态。此外，如果父类有多个子类，每个子类都可以自行决定是使用父类的方法，还是拥有自己的特定实现。\n\
  \n**5.12 在方法重载中，返回类型无关紧要。但在这里却很重要。这种说法正确吗？**\n\n正确。在这里，子类方法的返回类型必须与父类方法的返回类型相同（或者是子类型，这一点稍后会讨论），或者简单来说，两种类型必须兼容。\n\
  \n**5.13 以下代码片段能编译通过吗？**\n\n```\nclass ParentClassQ2 {\npublic void showMe() {\n\
  System.out.println(\"I am in Parent class\");\n}\n}\nclass ChildClassQ2 extends\
  \ ParentClassQ2 {\npublic int showMe() {\nSystem.out.println(\"I am in Child class\"\
  );\nreturn 5;\n}\n}\n```\n\n不能。在这种情况下，你实际上试图实现基于返回类型的重载，而不是重写。现在 `ChildClassQ2`\
  \ 有两个同名且签名相同的方法，只有返回类型不同。因此，你会收到一个编译错误，提示 `The return type is incompatible with\
  \ ParentClassQ2.showMe()`，如图 5-6 所示。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig6_HTML.jpg](img/433474_2_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n\nEclipse 编辑器中因返回类型不兼容而显示的错误消息截图\n\n要解决这个问题，你可以对子类的方法做一些简单的修改，如下所示。（这里，你传递了一个虚拟参数，它实际上没有任何作用。）\n\
  \n```\n// 这样可以工作\npublic int showMe(int i)\n{\nSystem.out.println(\"I am in Child\
  \ class.\");\nreturn i;\n}\n```\n\n现在，你可以同时使用父类和子类中的方法。你可以参考以下程序及其输出来理解：\n\n```\n\
  package java2e.chapter5;\nclass ParentClassQ2 {\npublic void showMe() {\nSystem.out.println(\"\
  I am in Parent class.\");\n}\n}\nclass ChildClassQ2 extends ParentClassQ2 {\n//\
  \ 错误\n/*\npublic int showMe() {\nSystem.out.println(\"I am in Child class.\");\n\
  return 5;\n}\n*/\n// 这样可以工作\npublic int showMe(int i) {\nSystem.out.println(\"I\
  \ am in Child class.\");\nreturn i;\n}\n}\npublic class Quiz2 {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"*** Method overriding demonstration.Quiz2.***\"\
  );\nChildClassQ2 childOb = new ChildClassQ2();\nchildOb.showMe();// I am in Parent\
  \ class.\nchildOb.showMe(5);// I am in Child class.\n}\n}\n```\n\n输出：\n\n```\n***\
  \ Method overriding demonstration.Quiz2.***\nI am in Parent class.\nI am in Child\
  \ class.\n```\n\n### 演示 7\n\n现在，让我们在同一个程序中测试重载和重写的概念。考虑以下代码：\n\n```\npackage java2e.chapter5;\n\
  class ParentClass7 {\npublic int showMe(int i) {\nSystem.out.println(\"I am in Parent\
  \ class\");\nreturn i;\n}\n}\nclass ChildClass7 extends ParentClass {\npublic int\
  \ showMe(int i) {\nSystem.out.println(\"In Child.showMe(int i)\");\nSystem.out.println(\"\
  I am overriding the parent method and adding 5 to the argument.\");\nreturn i +\
  \ 5;// Must return an int\n}\npublic void showMe() {\nSystem.out.println(\"In Child.showMe().I\
  \ am overloaded here.\");\n}\n}\nclass Demonstration7 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"*** Demonstration-7.Overloading with Overriding\
  \ Demo***\\n\");\nChildClass7 childOb = new ChildClass7();\nint value = childOb.showMe(5);\n\
  System.out.println(\"The value returned is : \" + value);// 5+5=10\nchildOb.showMe();\n\
  }\n}\n```\n\n输出：\n\n```\n*** Demonstration-7.Overloading with Overriding Demo***\n\
  In Child.showMe(int i)\nI am overriding the parent method and adding 5 to the argument.\n\
  The value returned is : 10\nIn Child.showMe().I am overloaded here.\n```\n\n上述输出不言自明。从输出信息中，你可以轻松识别哪个方法是重载的，哪个方法是重写的。\n\
  \n据说面向对象程序员会经历三个重要阶段。在第一阶段，他们熟悉非面向对象的构造/结构。在这个阶段，他们使用决策语句、循环结构等。在第二阶段，他们开始创建类和对象，并使用继承机制。最后，在第三阶段，他们利用多态来实现后期绑定，并使程序更加灵活。到目前为止，你已经经历了前两个阶段。现在，让我们进入专业技能的第三阶段，学习如何在\
  \ Java 程序中实现多态。\n\n## 运行时多态\n\n你已经知道，多态通常与一个具有多种形式（或构造）的方法名相关联。方法重载以编译时多态而闻名。但 Java\
  \ 的一个重要特性是它支持运行时多态的概念。这也被称为**动态方法调度**。在这里，对重写方法的调用是在运行时动态解析的。换句话说，你可以根据所引用的对象来调用适当的方法。\n\
  \n在动态方法调度中，你有一个父类，它至少有一个子类。子类包含一个重写的方法，并且你使用父类引用来指向子类对象。在这种情况下，对重写方法的调用是在运行时确定的。\n\
  \n在下面的演示中，有两行代码如下：\n\n```\nVehicle obVehicle = new Bus();\nobVehicle.showMe();\n\
  ```\n\n其中 `Vehicle` 是父类，`Bus` 是子类，并且 `Bus` 类包含一个重写的方法 `showMe()`。因此，在这个演示中，遵循动态方法调度的规则，你可以在运行时调用\
  \ `Bus` 类的这个重写方法。\n\n\n\n### 演示 8\n\n请完成以下演示并分析输出结果。\n\n```\npackage java2e.chapter5;\n\
  class Vehicle {\npublic void showMe() {\nSystem.out.println(\"Inside Vehicle.showMe()\"\
  );\n}\n}\nclass Bus extends Vehicle {\npublic void showMe() {\nSystem.out.println(\"\
  Inside Bus.showMe()\");\n}\npublic void busSpecificMethod() {\nSystem.out.println(\"\
  Inside Bus.busSpecificMethod()\");\n}\n}\nclass Demonstration8 {\npublic static\
  \ void main(String[] args) {\nSystem.out.println(\"***Demonstration 8.Experimenting\
  \ runtime polymorphism.***\\n\");\n//父类引用指向子类对象\nVehicle obVehicle = new Bus();//\
  \ ok\n// Bus obBus = new Vehicle();//编译错误\nobVehicle.showMe();//Inside Bus.showMe()\n\
  // obVehicle.busSpecificMethod();//错误\n//((Bus) obVehicle).busSpecificMethod();//\
  \ Ok\n}\n}\n```\n\n输出：\n\n```\n***Demonstration 8.Experimenting runtime polymorphism.***\n\
  Inside Bus.showMe()\n```\n\n在讨论方法重写或运行时多态时，你可能会经常遇到类型转换的概念。类型转换可以进一步分为以下两种类型：\n\n\
  *   向上转型\n\n*   向下转型\n\n向上转型是指转换为超类型（或父类型），而向下转型则是相反的过程。假设，如上一个演示所示，`Vehicle` 是父类，`Bus`\
  \ 是从 `Vehicle` 派生的类。在 Java 中，你可以将派生类对象视为父类对象。因此，在这种情况下，如果你编写以下代码：\n\n```\nVehicle\
  \ obVehicle ;\nobVehicle= new Bus();// 向上转型\n```\n\n你就是在使用向上转型。但如果你使用类似下面的代码：\n\n\
  ```\nBus obBus=(Bus)obVehicle;\n```\n\n你就是在使用向下转型。向下转型需要进行类型检查，并且存在风险。\n\n再次注意前面程序中的两行重要代码：\n\
  \n```\nVehicle obVehicle = new Bus();\nobVehicle.showMe();\n```\n\n这里，你通过父类引用（`Vehicle`\
  \ 引用）指向一个派生类对象（一个 `Bus` 对象），然后调用 `showMe()` 方法。这种调用方式是允许的，不会出现任何编译问题；也就是说，父类引用可以指向派生类对象。\n\
  \n但是，你不能使用以下任何一行代码：\n\n*   `obVehicle.busSpecificMethod();//错误`\n\n（因为代码中的显式类型是\
  \ `Vehicle`，而不是 `Bus`）。要消除此错误，你需要进行向下转型，如下所示：\n\n*   `Bus obBus = new Vehicle();//错误`\n\
  \n```\n((Bus) obVehicle).busSpecificMethod();// Ok\n```\n\n如前所述，要消除此错误，你可能需要进行向下转型，如下所示：\n\
  \n```\nBus obBus=new Bus();\n//可能会遇到运行时错误：ClassCastException\nobBus=(Bus)obVehicle;\n\
  ```\n\n但向下转型是有风险的，因为你可能会遇到运行时异常（注释中已提及）。例如，在这种情况下，你会遇到如下运行时异常：\n\n```\nException\
  \ in thread \"main\" Inside Bus.showMe()\njava.lang.ClassCastException: java2e.chapter5.Vehicle\
  \ cannot be cast to java2e.chapter5.Bus at java2e.chapter5.Demonstration8.main(Demonstration8.java:33)\n\
  ```\n\n### 问答环节\n\n**5.14 “向下转型是有风险的。” 能详细解释一下吗？**\n\n如果实现不当，向下转型可能会导致 `ClassCastException`。为了更清楚地理解这一点，我们来看演示\
  \ 9。\n\n### 演示 9\n\n添加另一个类 `Train`，类似于上一个演示中的 `Bus`，然后在 `main()` 方法中放入一些测试代码，如下所示：\n\
  \n```\npackage chapter5.testcodes;\nclass Vehicle {\npublic void showMe() {\nSystem.out.println(\"\
  Inside Vehicle.showMe()\");\n}\n}\nclass Bus extends Vehicle {\npublic void showMe()\
  \ {\nSystem.out.println(\"Inside Bus.showMe()\");\n}\npublic void specificMethod()\
  \ {\nSystem.out.println(\"Inside Bus.showMe()\");\n}\n}\nclass Train extends Vehicle\
  \ {\npublic void showMe() {\nSystem.out.println(\"Inside Train.showMe()\");\n}\n\
  public void specificMethod() {\nSystem.out.println(\"Inside Train.specificMethod()\"\
  );\n}\n}\nclass Test3 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Test Demonstration.Demonstration-9.Downcasting involves risk.***\\n\");\n//向上转型\n\
  Vehicle obVehicle=new Train();//ok\nobVehicle.showMe();//输出: Inside Vehicle.showMe()\n\
  //obVehicle.specificMethod();//error\n//创建两个子类型（一个 Bus 和一个 Train）对象\nBus obBus=new\
  \ Bus();\nTrain obTrain=new Train();\n//向下转型示例：转换为子类型\n//obBus=(Bus)obVehicle;//运行时错误：Train\
  \ cannot be cast to Bus\nobTrain=(Train)obVehicle;//Ok，这次没问题。\nobTrain.specificMethod();//also\
  \ ok\n}\n}\n```\n\n输出：\n\n```\n***Test Demonstration.Demonstration-9.Downcasting\
  \ involves risk.***\nInside Train.showMe()\nInside Train.specificMethod()\n```\n\
  \n注意下面这段被注释掉的代码：\n\n```\n//obBus=(Bus)obVehicle;//运行时错误：Train cannot be cast to\
  \ Bus\n```\n\n如果你取消注释这一行，你不会收到任何编译错误，但会遇到运行时异常，如下所示：\n\n```\n***Test Demonstration.Demonstration-9.Downcasting\
  \ involves risk.***\nInside Train.showMe()\nException in thread \"main\" java.lang.ClassCastException:\
  \ chapter5.testcodes.Train cannot be cast to chapter5.testcodes.Bus\nat chapter5.testcodes.Test3.main(Test3.java:41)\n\
  ```\n\n所以，你可能会注意到 `obVehicle` 原本是为 `Train` 对象使用的，但在向下转型时你试图将其转换为 `Bus` 对象，因此收到了这个错误。但如果你将\
  \ `obVehicle` 向下转型为 `Train` 对象，则不会出错，代码将正常运行。\n\n### 要点总结\n\n*   通过父类引用，你可以引用子类对象，但反之则不行。\n\
  \n*   对象引用可以隐式向上转型为超类引用，并显式向下转型为派生类引用。所以，简单来说，向上转型意味着转换为超类型，而向下转型则相反；也就是说，在向下转型中，你试图转换为派生类型。\n\
  \n*   现在，让我们快速检查一下类似编程语言中是如何实现该概念的；例如，C#。如果你熟悉 C# 语言，你可能会注意到在方法重写的示例中使用了 `virtual`\
  \ 和 `override` 关键字。例如，这里有一个 C# 代码片段：\n\n    ```\n    class Vehicle\n    {\n    public\
  \ virtual void ShowMe()\n    {\n    Console.WriteLine(\"Inside Vehicle.ShowMe\"\
  );\n    }\n    }\n    class Bus : Vehicle\n    {\n    public override void ShowMe()\n\
  \    {\n    Console.WriteLine(\"Inside Bus.ShowMe\");\n    }\n    public void BusSpecificMethod()\n\
  \    {\n    Console.WriteLine(\"Inside Bus.ShowMe\");\n    }\n    }\n    ```\n\n\
  *   在 C# 中，如果你想在派生类中重写父类方法，请使用 `virtual` 关键字标记父类方法。但在 C# 中，所有方法默认都是非虚拟的*。* 在派生类中，通过使用\
  \ `override` 关键字标记方法，你可以有意识地重新定义相应的虚拟方法。因此，在 C# 中，你需要标记 `override` 关键字以避免无意识的重写。C#\
  \ 还使用另一个关键字 `new` 来标记一个方法为非重写方法。但在 Java 中，事情更直接，因为所有方法默认都是虚拟的。\n\n\n\n### 问答环节\n\
  \n**5.15 我知道父类引用可以指向子类对象，但反过来不行。为什么我们要支持这种设计？**\n\n你可以将其与一些基本的现实生活事实进行比较。例如，你可以说所有公交车都是交通工具，但反过来不一定成立，因为还有其他交通工具，比如火车和轮船，它们肯定不是公交车*。*\n\
  \n同样，在编程术语中，所有派生类都属于基类类型，但反过来不成立。例如，假设你有一个名为 `Rectangle` 的类，它派生自另一个名为 `Shape` 的类。你可以说所有矩形都是形状，但反过来不成立。\n\
  \n在继承层次结构中，你总是可以进行“is-a”测试来确定继承的方向，因为“is-a”测试总是简单直接的。\n\n**5.16 你是说对于以下代码，调用将在运行时解析：**\n\
  \n```\nVehicle obVehicle = new Bus();\nobVehicle.showMe();\n```\n\n**但我可以清楚地看到，一个**\
  \ `Bus` **对象被父类引用指向，编译器本可以在早期绑定（或编译时绑定）时将** `showMe()` **方法绑定到** `Bus` **对象。为什么它要无谓地延迟这个过程？**\n\
  \n如果你只考虑前面的代码，你可能会产生这个疑问。但假设你还有一个子类 `Taxi`，它也继承自父类 `Vehicle`。并且在运行时，根据某些情况，你需要从\
  \ `Bus` 或 `Taxi` 中调用 `showMe()` 方法。考虑如下情况：你生成一个 0 到 9 之间的随机数。然后，你检查这个数是偶数还是奇数。如果是偶数，你需要使用\
  \ `Bus` 对象；否则，你使用 `Taxi` 对象来调用相应的 `showMe()` 方法。\n\n### 演示 10\n\n现在，请查看以下演示。由于这是演示\
  \ 10，我将 `Vehicle` 类标记为 `Vehicle10`，`Bus` 类标记为 `Bus10`，`Taxi` 类标记为 `Taxi10`。\n\n\
  ```\npackage java2e.chapter5;\nimport java.util.Random;\nclass Vehicle10 {\npublic\
  \ void showMe() {\nSystem.out.println(\"Inside Vehicle.showMe()\");\n}\n}\nclass\
  \ Bus10 extends Vehicle10 {\npublic void showMe() {\nSystem.out.println(\"Inside\
  \ Bus.showMe()\");\n}\n}\nclass Taxi10 extends Vehicle10 {\npublic void showMe()\
  \ {\nSystem.out.println(\"Inside Taxi.showMe()\");\n}\n}\nclass Demonstration10\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***Demonstration\
  \ 10.A case study with runtime polymorphism ***\\n\");\nVehicle10 obVehicle;\nint\
  \ count = 0;\nRandom random = new Random();\n// Considering 5 choices\nwhile (count\
  \ < 5) {\nint tick = random.nextInt(10);//0 to 9\nif (tick % 2 == 0) {\nobVehicle\
  \ = new Bus10();\n} else {\nobVehicle = new Taxi10();\n}\nobVehicle.showMe();//\
  \ Output will be determined at runtime\ncount++;\n}\n}\n}\n```\n\n请注意，输出可能会有所不同。\n\
  \n**这是第一次运行：**\n\n```\n***Demonstration 10.A case study with runtime polymorphism\
  \ ***\nInside Bus.showMe()\nInside Taxi.showMe()\nInside Taxi.showMe()\nInside Bus.showMe()\n\
  Inside Taxi.showMe()\n```\n\n**这是第二次运行：**\n\n```\n***Demonstration 10.A case study\
  \ with runtime polymorphism ***\nInside Taxi.showMe()\nInside Bus.showMe()\nInside\
  \ Bus.showMe()\nInside Taxi.showMe()\nInside Bus.showMe()\n```\n\n以此类推。\n\n现在你可以明白，对于这类编码，为什么编译器可能需要将决策延迟到运行时，以及你是如何实现运行时多态的。\n\
  \n## 使用 final 关键字\n\n在某些情况下，你可能希望阻止继承过程。例如，你可能想要施加一个限制，使得父类中的方法不能被其子类的方法重写。因此，你将父类方法设为\
  \ final，以保持对象状态的一致性。（类似地，如果你想创建一个像 Java 中的 `String` 类那样的不可变类，你也可以创建一个“final”类。）你必须记住，你可以通过多种方式防止重写。在以下部分中，你只会看到\
  \ `final` 关键字的用法。它非常有用，因为编译器本身会阻止重写过程。\n\n考虑以下代码：\n\n```\nfinal class ParentClassTest4\n\
  {\npublic void showMe(){\nSystem.out.println(\"Inside Parent.showMe()\");\n}\n}\n\
  class ChildClassTest4 extends ParentClassTest4 //Error\n{\n//Some code\n}\n```\n\
  \n你将收到一个编译错误：`The type ChildClassTest4 cannot subclass the final class ParentClassTest4`（参见图\
  \ 5-7）。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig7_HTML.jpg](img/433474_2_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n\n用于阻止继承的 `final` 关键字\n\n你也可以将其用于方法。例如，考虑以下代码片段：\n\n```\nclass ParentClassTest4\
  \ {\nfinal public void showMe() {\nSystem.out.println(\"Inside Parent.showMe()\"\
  );\n}\n}\nclass ChildClassTest4 extends ParentClassTest4 {\npublic void showMe()\
  \ { // error\nSystem.out.println(\"Inside Parent.showMe()\");\n}\n}\n```\n\n你将再次收到一个编译错误：`Cannot\
  \ override the final method from ParentClassTest4`（参见图 5-8）。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig8_HTML.jpg](img/433474_2_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8\n\n用于阻止方法重写的 `final` 关键字\n\n### 空白 final 变量\n\n你可以像下面这样将 `final` 关键字应用于变量：\n\
  \n```\nfinal double PI=3.14;\n```\n\n如果你没有初始化 `final` 变量，你可能会收到一个编译错误。例如，考虑以下代码片段：\n\
  \n```\nclass ParentClassTest4 {\nfinal int a=10;\n// final double PI=3.14;//ok\n\
  final double PI;//error\n}\n```\n\n对于前面的代码片段，你将收到一个编译错误：`The blank final field PI\
  \ may not have been initialized`（参见图 5-9）。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig9_HTML.jpg](img/433474_2_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9\n\nEclipse IDE 中因未初始化的空白 `final` 字段导致的编译错误快照\n\n但是你可以选择在构造函数内部初始化 `final`\
  \ 变量。当你进行这种初始化（针对那些未初始化的 `final` 变量）时，你使用术语“空白 final 变量”。考虑以下代码片段：\n\n```\nclass\
  \ FinalDemo\n{\n//Must be initialized inside a constructor\nfinal double PI;\ndouble\
  \ area;\n//final double PI=3.14;\nFinalDemo(){\nPI=3.14;\n}\n}\n```\n\n在这种情况下，编译器不会引发任何问题。\n\
  \n需要注意的是，没有像 `const` 这样的关键字，它只是一个尚未使用的保留关键字。但你可能会注意到在其他语言（如 C++ 或 C#）中使用了 'const'。相反，在\
  \ Java 中，为了实现类似的概念，你可以使用 `final` 关键字。在此上下文中，JLS11 指出：\n\n> *“常量变量是使用常量表达式（§15.28）初始化的基本类型或\
  \ String 类型的 final 变量。一个变量是否是常量变量可能会对类初始化（§12.4.1）、二进制兼容性（§13.1）、可达性（§14.21）和确定性赋值（§16.1.1）产生影响。”*\n\
  \n### 问答环节\n\n**5.17 如果我有多个构造函数，我是否需要在每个构造函数中都初始化 final 变量？**\n\n是的。否则，你可以调用另一个可以为你进行初始化的构造函数。以下演示可以帮助你更好地理解这个概念。在此演示中，有两个构造函数——`FinalDemo(int\
  \ radius)` 和 `FinalDemo()`。如果带参数的构造函数在计算面积之前没有调用无参构造函数，那么它需要自己为 `PI` 初始化值。\n\n\n\
  \n### 演示 11\n\n在以下演示中，带参数的构造函数 `FinalDemo(int radius)` 首先调用无参构造函数 `FinalDemo()`\
  \ 来初始化空白的 final 变量 `PI`。\n\n```\npackage java2e.chapter5;\nclass FinalDemo {\n//\
  \ 必须在构造函数内初始化\nfinal double PI;\ndouble area;\nFinalDemo() {\nPI = 3.14;\n}\nFinalDemo(int\
  \ radius) {\n// 调用无参构造函数来初始化 final 变量\nthis();\nthis.area = this.PI * radius * radius;\n\
  }\n}\nclass Demonstration11 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示-11\\. 测试 final 关键字的行为。***\\n\");\nFinalDemo fdemo = new FinalDemo(10);\nSystem.out.println(\"\
  半径为 10 个单位的圆的面积为 \" + fdemo.area + \" 平方单位。\");\n}\n}\n```\n\n输出：\n\n```\n***演示-11\\\
  . 测试 final 关键字的行为。***\n半径为 10 个单位的圆的面积为 314.0 平方单位。\n```\n\n如果你在前面的示例中注释掉以下代码行：\n\
  \n```\nFinalDemo(int radius) {\n// 调用无参构造函数来初始化 final 变量\n//this();\nthis.area =\
  \ this.PI * radius * radius;\n}\n```\n\n你将再次遇到相同的编译错误：`空白 final 字段 PI 可能尚未初始化`（参见图\
  \ 5-10）。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig10_HTML.jpg](img/433474_2_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10\n\n在演示 11 中注释掉 `this();` 语句时出现的编译错误\n\n### 注意\n\n你可以同时拥有*静态空白 final 变量*和*实例空白变量*。Java\
  \ 语言规范（第 11 版）指出：“空白 final **类**变量必须由声明该变量的类的静态初始化器明确赋值，否则会发生编译时错误。”它还指出：“*空白 final*\
  \ **实例**变量必须在声明该变量的类的每个构造函数结束时明确赋值，并且不能明确未赋值，否则会发生编译时错误。”\n\n### 问答环节\n\n**5.18\
  \ Java 中允许重写构造函数吗？**\n\n不允许。不要忘记，重写允许我们在运行时更改对象的行为，但构造函数用于初始化对象，并且它们不能被继承。\n\n**5.19\
  \ 为什么我需要初始化 final 变量？**\n\n这些变量在整个程序中充当常量。如果你在开始时没有初始化它们，其他人将来可能会修改它们。通过声明 `final`，你可以防止在后续阶段进行更改。\n\
  \n**5.20 假设我想要一个变量（例如 `PI`）可以从代码的所有部分访问，但同时我想防止任何意外的修改。我该如何实现？**\n\n基本上，你是在尝试使用全局变量的概念，但\
  \ Java 不支持全局变量。但在这种情况下，你可以像下面这样声明一个变量：\n\n```\npublic static final double PI=3.14;\n\
  ```\n\n你将在本书的第 8 章中了解更多关于 `static` 的内容。\n\n**5.21 以下代码片段会导致编译错误吗？**\n\n```\nclass\
  \ MyClassEx{\nfinal MyClassEx()//错误\n{\nSystem.out.println(\"我是一个无参构造函数\");\n}\n\
  }\n```\n\n是的。构造函数不能是 final 的。因此，在这种情况下，你将收到一个编译错误，如图 5-11 所示。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig11_HTML.jpg](img/433474_2_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11\n\n编译时错误：构造函数不能是 final 的\n\n**5.22 为什么当我尝试将 final 关键字与构造函数一起使用时，会遇到编译时错误？**\n\
  \n让我们从一般角度思考：关键字 `final` 用于防止重写，但根据语言规范，构造函数根本不能被重写。JLS11 明确指出：“构造函数声明不是成员。它们永远不会被继承，因此不受隐藏或重写的影响。”\n\
  \n**5.23 我可以重写 main() 方法吗？**\n\n不可以。静态方法不能被重写，并且对静态方法的调用仅在编译时解析。另外，需要注意的是，你可以隐藏静态方法，但不能重写它。\n\
  \n**5.24 “你可以隐藏静态方法，但不能重写它”——这句话是什么意思？**\n\n这两个术语——方法隐藏和方法重写——是不同的。它们之间的区别可以总结如下：\n\
  \n> *被调用的重写实例方法的版本是子类中的版本。被调用的隐藏静态方法的版本取决于它是从超类还是子类调用的。*\n\n### 演示 12\n\n考虑以下程序，并查看输出和分析：\n\
  \n```\npackage java2e.chapter5;\nclass Vehicle12 {\npublic static void showMe()\
  \ {\nSystem.out.println(\"Vehicle.showMe()-在父类内部。\");\n}\npublic void showInstanceMethod()\
  \ {\nSystem.out.println(\"Vehicle.showInstanceMethod()\");\n}\n}\nclass Bus12 extends\
  \ Vehicle12 {\npublic static void showMe() { // 隐藏 Vehicle.showMe()\nSystem.out.println(\"\
  Bus.showMe()-在子类内部。\");\n}\npublic void showInstanceMethod() {// 重写\nSystem.out.println(\"\
  Bus.showInstanceMethod()\");\n}\n}\npublic class Demonstration12 {\npublic static\
  \ void main(String[] args) {\nSystem.out.println(\"***演示-12\\. 方法隐藏 vs 方法重写***\\\
  n\");\nVehicle12.showMe();// Vehicle.showMe()-在父类内部。\nVehicle12 vehicle = new Bus12();\n\
  // 警告：以下方法应以静态方式访问。\nvehicle.showMe();// Vehicle.showMe()-在父类内部。\nvehicle.showInstanceMethod();//\
  \ Bus.showInstanceMethod()\nSystem.out.println(\"----------\");\nBus12.showMe();//\
  \ Bus.showMe()-在子类内部。\n// 警告：以下方法应以静态方式访问。\nBus12 bus = new Bus12();\nbus.showMe();//\
  \ Bus.showMe()-在子类内部。\nbus.showInstanceMethod();// Bus.showInstanceMethod()\n}\n\
  }\n```\n\n输出：\n\n```\n***演示-12\\. 方法隐藏 vs 方法重写***\nVehicle.showMe()-在父类内部。\nVehicle.showMe()-在父类内部。\n\
  Bus.showInstanceMethod()\n\nBus.showMe()-在子类内部。\nBus.showMe()-在子类内部。\nBus.showInstanceMethod()\n\
  ```\n\n输出的第一行和最后三行是显而易见的。这些是为了方便你直接参考而给出的。但请注意以下代码的输出：\n\n```\nvehicle.showMe();//\
  \ Vehicle.showMe()-在父类内部。\nvehicle.showInstanceMethod();// Bus.showInstanceMethod()\n\
  ```\n\n你注意到编译器的有趣行为了吗？在第一种情况下，它选择了父类方法（这是一个静态方法），但在实例方法的情况下，它选择了派生类的方法。这是因为在方法重写的情况下，JVM\
  \ 使用实例的实际类来选择方法，并且该决定是在运行时做出的。\n\n但对于静态方法，编译器只考虑声明的引用类型（你可以看到 `vehicle` 是一个父类引用），并且调用特定方法的决定仅在编译时做出。因此，可以说方法隐藏与运行时多态性毫无关系。\n\
  \n\n\n### 要点备忘\n\n*   方法隐藏与静态方法和编译时多态相关。方法重写与非静态方法和运行时多态相关。\n\n*   方法隐藏和字段隐藏可能存在一些相似或不同之处，具体取决于特定的应用或用法。你可以参考语言规范进行详细的逐案研究。例如，Java\
  \ 语言规范指出，如果类声明了一个具有特定名称的字段，则该字段的声明被称为隐藏了该类超类和超接口中具有相同名称的可访问字段声明。在这方面，字段隐藏与方法隐藏不同，因为字段隐藏不区分静态字段和非静态字段，而方法隐藏则区分静态方法和非静态方法。如果隐藏字段是静态的，可以通过使用限定名称来访问它，或者通过使用包含关键字`super`或强制转换为超类类型的字段访问表达式来访问。在这方面，字段隐藏类似于方法隐藏。\n\
  \n### 问答环节\n\n**5.25 我可以将** `main()` **方法声明为 final 吗？**\n\n在 Eclipse 2019-03、Photon（或其早期版本，例如\
  \ Neon）中，如果你尝试运行以下程序，你不会发现任何编译时或运行时错误。但我认为对我们的传统 `main()` 方法进行这种更改并没有任何显著的好处：\n\n\
  ```\npackage chapter5.testcodes;\n//案例-1\nclass Test5 {\npublic static final void\
  \ main(String[] args) {\nSystem.out.println(\" 将 main() 方法声明为 final。\");\n}\n}\n\
  ```\n\n输出：\n\n```\n将 main() 方法声明为 final。\n```\n\n但你需要记住 `final` 的正常行为。例如，以下程序将引发编译时错误：\n\
  \n```\n//案例-2\nclass Test5A {\npublic static final void main(String[] args) {\n\
  System.out.println(\"在父类-Test5A 中。将 main() 方法声明为 final...\");\n}\n}\nclass Test5\
  \ extends Test5A {\npublic static final void main(String[] args) {\nSystem.out.println(\"\
  \ 在子类-Test5 中。将 main() 方法声明为 final...\");\n}\n}\n```\n\n输出如图 5-12 所示。\n\n![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig12_HTML.jpg](img/433474_2_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12\n\n由于程序中 `final` 关键字使用不当导致的编译时错误\n\n**5.26 我可以重写一个重载的方法吗？**\n\n是的，可以。请参考以下演示及相应的输出。\n\
  \n### 演示 13\n\n代码如下：\n\n```\npackage java2e.chapter5;\nclass ParentOverloadedClass\
  \ {\npublic void showMe() {\nSystem.out.println(\"我在父类中\");\n}\npublic void showMe(int\
  \ x) {\nSystem.out.println(\"父类中的重载方法。这里 x= \" + x);\n}\n}\nclass ChildOverridingClass\
  \ extends ParentOverloadedClass {\npublic void showMe() {\nSystem.out.println(\"\
  子类中的重写方法。\");\n}\n}\nclass Demonstration13 {\npublic static void main(String[] args)\
  \ {\nSystem.out.println(\"***演示-13. 带重载的方法重写演示***\\n\");\nChildOverridingClass childObject\
  \ = new ChildOverridingClass();\nchildObject.showMe();//将调用派生类中的重写方法。\nchildObject.showMe(25);//将调用父类中的重载方法。\n\
  }\n}\n```\n\n输出：\n\n```\n***演示-13. 带重载的方法重写演示***\n子类中的重写方法。\n父类中的重载方法。这里 x= 25\n\
  ```\n\n### 问答环节\n\n**5.27 给我一些提示，以便我能轻松区分方法重载和方法重写。**\n\n以下几点可以帮助你巩固知识：\n\n*   在方法重载中，*所有方法可能位于同一个类中*（你必须注意这里的“可能”一词，因为你已经见过一个示例\
  \ [演示 13]，其中同时实现了方法重载和方法重写，并且方法重载的概念跨越了两个类——父类/超类及其子类/派生类）。在方法重写中，涉及父类和子类的继承层次结构，这意味着至少涉及一个父类及其子类（即至少两个类）。\n\
