  \   EmployeeName   Age   Salary\n\n1             Amit           25    1200.5\n2\
  \             Sam            23    1000.25\n3             Bob            30    1500.0\n\
  ```\n\n\n\n问答环节\n**13.3 为什么使用**\n**PreparedStatement** **对象** **被认为比使用**\n**Statement**\
  \ **对象**\n**更快？**\n`PreparedStatement`\n对象可以包含预编译的 SQL 语句。因此，如果你多次传递相同的查询（使用相同或不同的数据），数据库管理系统可以更快地运行该查询。但是，对于\
  \ `Statement` 对象，每次使用时 SQL 都需要验证该查询。\n**13.4 对于**\n**PreparedStatement** **对象**\
  \ **，是否必须传递参数？**\n\n不是。在演示 3 中，你可以简单地使用以下代码行来获得相同的结果：\n\n```\n//Parameters are not\
  \ mandatory for PreparedStatement .\npreparedStatementOb = connectionOb.preparedStatement(\"\
  insert into Employee values(4,'IvanS',27,975.6)\");\n```\n\n通常，当你的 SQL 查询需要参数时，你会使用\
  \ `PreparedStatement`。接受参数的 SQL 语句可以帮助你使用不同的值执行该语句，这在现实场景中非常常见。为了简单并使程序更简短，我没有使用命令行参数或用户定义的输入。但在实践中，你始终可以通过命令行传递参数，这些参数将在你的查询被处理之前替换掉问号。\n\
  **13.5** **executeQuery()** **方法**\n**与**\n**executeUpdate()** **有何不同？**\n`executeUpdate()`\n\
  方法用于插入、更新或删除操作，或返回空值的 SQL 语句，例如 DDL 语句。此方法不返回任何 `ResultSet` 对象。\n另一方面，`executeQuery()`\n\
  执行一个返回单个 `ResultSet` 对象的 SQL 语句。此方法不能在 `PreparedStatement` 或 `CallableStatement`\
  \ 上调用（这将在下一个演示中讨论）。\n**13.6 使用**\n**PreparedStatement** **的主要优势是什么？**\n\n以下是使用 `PreparedStatement`\
  \ 的主要优势：\n\n*   你可以传递参数化的 SQL 语句。\n\n*   你可以使用不同的值重用该语句。\n\n*   你可以提供批处理功能。\n\n\
  *   由于它支持预编译的 SQL 语句，你可以缩短执行时间。\n\n**13.7 什么是** **批处理** **？你能举个例子吗？**\n“批处理”是指你可以执行一批（或一组、一套）查询。`Statement`\
  \ 接口中的 `addBatch()` 和 `executeBatch()` 方法可以在这方面帮助你。\n\n让我们将以下行添加到演示 1 中：\n\n```\n\
  statementOb.addBatch(\"insert into Employee values(4,'Ivan',27,975.6)\");\nstatementOb.addBatch(\"\
  insert into Employee values(5,'Jacklin',29,575.5)\");\n//Batch execution\nstatementOb.executeBatch();\n\
  ```\n\n现在，你可以看到记录被正确插入。类似地，你可以按如下方式删除记录：\n\n```\n//Now deleting the records  from\
  \ the Employee table\n//and resetting the original state of Employee table.\nSystem.out.println(\"\
  \\nDeleting the record of Ivan and Jacklin from the Employee table.\");\nstatementOb.addBatch(\"\
  delete from employee where name=\"Ivan\" \");\nstatementOb.addBatch(\"delete from\
  \ employee where name=\"Jacklin\" \");\n//Batch execution\nstatementOb.executeBatch();\n\
  ```\n\n演示 4\n此演示展示了 `CallableStatement` 对象的使用。`CallableStatement` 是一个扩展了 `PreparedStatement`\
  \ 的接口，而 `PreparedStatement` 又扩展了 `Statement` 接口。`CallableInterface` 用于执行 SQL 中的存储过程和函数。\n\
  \n注意\n存储过程和函数之间存在一些显著差异。例如，在 MySQL 中，存储过程可用于返回一个或多个值，或不返回值，而函数总是返回单个值。此外，你可以直接使用\
  \ SQL 语句调用函数，但对于过程则不能这样做。存储过程可以有 IN、OUT、INOUT 参数，但存储函数默认只能有 IN 参数。为了使示例简短且简单，在演示\
  \ 4 中，你将只看到一个小函数的使用。\n\n\n\n开始之前，请在你的测试数据库中创建一个名为 `numbertable` 的表，如表 13-1 所示。\n\
  \n表 13-1\n在数据库中创建的 numbertable 表\n\nFirstNumber |\n SecondNumber |\n\n| --- | ---\
  \ | --- | --- | --- |\n\n12.3 |\n 15.7 |\n\n32.5 |\n 25.3 |\n\n25.0 |\n 75.0 |\n\
  \n可以看到，该表有两个属性：`FirstNumber` 和 `SecondNumber`，表中的每一行都包含各种双精度类型的值。假设你想要计算表中每一行两个双精度值的总和；你可以使用名为\
  \ `total()` 的函数来完成此任务。\n\n因此，在执行演示 4 之前，你可能希望完成以下步骤：\n\n1.  创建 `NumberTable` 并用必要的数据填充该表。\n\
  \n2.  创建一个函数 `total()`，该函数接受两个 `double` 类型的值作为参数，并返回它们的总和。\n\n你可以通过多种方式并按自己偏好的顺序完成步骤\
  \ 1 和步骤 2。在下一节中，我将给出我连接数据库后用于完成这些步骤的命令（以及相应的输出）。为了便于阅读，SQL 语句以粗体显示。我还会在方括号 `[ ]`\
  \ 内添加辅助性注释。\n\n步骤 1\n\n[创建 `NumberTable`]\n\n```\nmysql> create table NumberTable(FirstNo\
  \ Double, SecondNo Double);\nQuery OK, 0 rows affected (2.77 sec)\n```\n\n[检查测试数据库中的表。此步骤可选。]\n\
  \n```\nmysql> show tables;\n+----------------+\n| Tables_in_test |\n+----------------+\n\
  | employee       |\n| numbertable    |\n+----------------+\n2 rows in set (0.08\
  \ sec)\n```\n\n[向表中插入第一行数据。]\n\n```\nmysql> insert into numbertable values(12.3,15.7);\n\
  Query OK, 1 row affected (2.12 sec)\n```\n\n[向表中插入第二行数据。]\n\n```\nmysql> insert\
  \ into numbertable values(32.3,25.3);\nQuery OK, 1 row affected (0.13 sec)\n```\n\
  \n[向表中插入第三行数据。]\n\n```\nmysql> insert into numbertable values(25,75);\nQuery OK,\
  \ 1 row affected (0.08 sec)\n```\n\n[检查表的当前状态。]\n\n```\nmysql> select * from numbertable;\n\
  +---------+----------+\n| FirstNo | SecondNo |\n+---------+----------+\n|    12.3\
  \ |     15.7 |\n|    32.3 |     25.3 |\n|      25 |       75 |\n+---------+----------+\n\
  3 rows in set (0.08 sec)\n```\n\n步骤 2\n\n创建名为 `total` 的函数：[函数是一种存储程序，你可以在其中传递参数，并且它会返回一个值。]\n\
  \n```\nmysql> create function total(firstNumber double, secondNumber double) returns\
  \ double deterministic return firstNumber + secondNumber;\nQuery OK, 0 rows affected\
  \ (1.03 sec)\n```\n\n注意\n根据 MySQL 8.0 参考手册：“如果例程对于相同的输入参数总是产生相同的结果，则被视为‘确定性’的，否则为‘非确定性’。如果在例程定义中既未指定\
  \ DETERMINISTIC 也未指定 NOT DETERMINISTIC，则默认为 NOT DETERMINISTIC。”\n\n因此，如果你在上一个查询中遗漏了\
  \ `deterministic` 这个词，可能会遇到以下错误：\n\n```\nERROR 1064 (42000): You have an error in\
  \ your SQL syntax; check the manual that corresponds to your MySQL server version\
  \ for the right syntax to use near 'sum(firstNumber double,secondNumber double)\n\
  returns double\nreturn firstNumber+se' at line 1\n```\n\n[现在显示函数详情。此步骤可选。]\n\n```\n\
  mysql> Select Routine_name as \"Function Name\", routine_Definition as \"Definition\"\
  , Routine_Schema \"Schema\", Data_Type as \"Types\", Created From  Information_Schema.Routines\
  \ Where Routine_Name=\"total\" and Routine_Type= 'FUNCTION';\n```\n\n以下是 MySQL 8.0\
  \ 命令行客户端的截图，以便于阅读：\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Figa_HTML.jpg](img/433474_2_En_13_Figa_HTML.jpg)\n\
  \n现在，让我们分析接下来的程序。在下面的示例中，你会注意到以下代码行：\n\n```\nCallableStatement callableStmt=connectionOb.prepareCall(\"\
  {?= call total(?,?)}\");\n```\n\n\n\n可以看到，`CallableStatement` 对象是通过调用 `prepareCall()`\
  \ 方法创建的，而 `prepareCall()` 方法接受一个 `String` 参数。\n\n**注意**\n与许多其他方法一样，`prepareCall()`\
  \ 方法也有多种重载版本。在本例中，我使用了最简单的一个。\n\n请注意这三个问号。你知道它们用于表示方法参数。这些参数本质上是顺序的，第一个参数从 1 开始。\n\
  \n以下几行将展示这些参数的用法：\n\n```\ncallableStmt.setDouble(2,queryResult.getDouble(\"FirstNo\"\
  ));\ncallableStmt.setDouble(3,queryResult.getDouble(\"SecondNo\"));\n/*\n这里，我们使用了\
  \ CallableStatement 接口的 registerOutParameter() 方法，该方法将参数索引 parameterIndex（第一个参数）指定序数位置上的\
  \ OUT 参数注册为 JDBC 类型 sqlType（第二个参数）。所有 OUT 参数必须在执行存储过程之前注册。\n*/\ncallableStmt.registerOutParameter\
  \ (1,Types.DOUBLE);\ncallableStmt.execute();\n```\n\n这表明在位置 2 和 3 有两个 `double` 类型的值。位置\
  \ 1 的问号将被函数（本例中函数名为 `total()`）调用所替换，该函数接受这些 `double` 类型的值作为参数，并返回聚合结果（也是一个 `double`\
  \ 类型的值）。\n现在，让我们看一下完整的实现和相应的输出。\n\n```\npackage java2e.chapter13;\nimport java.sql.*;\n\
  class Demonstration4 {\npublic static void main(String[] args) throws SQLException\
  \ {\nSystem.out.println(\"***Demonstration-4.Using a Callable Statement.***\");\n\
  Connection connectionOb = null;\ntry {\n// for MySQL database\nClass.forName(\"\
  com.mysql.cj.jdbc.Driver\").newInstance();\nconnectionOb = DriverManager.getConnection(\"\
  jdbc:mysql://localhost:3306/test\", \"root\", \"admin\");\nStatement statementOb\
  \ = connectionOb.createStatement();\nSystem.out.println(\"This is the original table.\"\
  );\nResultSet queryResult = statementOb.executeQuery(\"select * from NumberTable\"\
  );\nSystem.out.println(\"FirstNumber \\t\" + \"SecondNumber\");\nSystem.out.println(\"\
  --------------------------\");\nwhile (queryResult.next()) {\nSystem.out.print(queryResult.getDouble(\"\
  FirstNo\") + \"\\t\\t\" + queryResult.getString(\"SecondNo\"));\nSystem.out.println();\n\
  }\nSystem.out.println(\"\\nCalling the total() function on each record of the NumberTable.\"\
  );\n//Using the Callable statement\nCallableStatement callableStmt=connectionOb.prepareCall(\"\
  {?= call total(?,?)}\");\nqueryResult = statementOb.executeQuery(\"select * from\
  \ NumberTable\");\nSystem.out.println(\"FirstNumber \\t\" + \"SecondNumber\\t\"\
  +\"Total\");\nSystem.out.println(\"--------------------------------------\");\n\
  while (queryResult.next()) {\nSystem.out.print(queryResult.getDouble(\"FirstNo\"\
  ) + \"\\t\\t\" + queryResult.getDouble(\"SecondNo\")+ \"\\t\\t\");\ncallableStmt.setDouble(2,queryResult.getDouble(\"\
  FirstNo\"));\ncallableStmt.setDouble(3,queryResult.getDouble(\"SecondNo\"));\n/*Here,\
  \ we have used the registerOutParameter method of the CallableStatement interface,\
  \ which registers the OUT parameter in the ordinal position in parameterIndex(first\
  \ argument) to the JDBC type sqlType(second argument). All OUT parameters must be\
  \ registered before a stored procedure is executed.*/\ncallableStmt.registerOutParameter\
  \ (1,Types.DOUBLE);\ncallableStmt.execute();\nSystem.out.print(callableStmt.getDouble(1));\n\
  System.out.println();\n}\n} catch (SQLException ex) {\nSystem.out.println(ex.getMessage());\n\
  }\n// To catch any other exception\ncatch (Exception ex) {\nSystem.out.println(ex.getMessage());\n\
  ex.printStackTrace();\n} finally {\n// Close the connection\nif (connectionOb !=\
  \ null) {\nconnectionOb.close();\n}\n}\n}\n}\n```\n\n输出：\n\n```\n***Demonstration-4.Using\
  \ a Callable Statement.***\nThis is the original table.\nFirstNumber      SecondNumber\n\
  \n12.3             15.7\n32.5             25.3\n25.0             75.0\n```\n\n对\
  \ `NumberTable` 中的每条记录调用 `total()` 函数：\n\n```\nFirstNumber      SecondNumber   \
  \  Total\n\n12.3             15.7              28.0\n32.5             25.3     \
  \         57.8\n25.0             75.0             100.0\n```\n\n问答环节\n**13.8 什么时候应该优先使用\
  \ `Statement` 对象，而不是 `PreparedStatement` 或 `CallableStatement`？**\n\n你可以记住以下几点：\n\
  \n*   如果要执行简单的 SQL 语句（例如，`select * from Table_name;`），请使用 `Statement` 对象。\n*   如果要使用预编译语句，请使用\
  \ `PreparedStatement`。\n*   如果要使用存储过程（或函数），请使用 `CallableStatement`。\n\n**13.9 什么是存储过程？**\n\
  简单来说，如果你想重复执行一系列任务，可以创建一个存储过程。存储过程很像在 Java 中编写一个方法。创建存储过程的步骤可能因数据库而异。\n在本章中，我在演示\
  \ 4 中使用了一个简单的函数 `total()` 来满足我们的需求。\n**13.10 你在某些地方提到了 SQL 上下文中的 DDL 这个术语。它是什么意思？**\n\
  \nSQL 命令通常分为以下几类：\n\n*   ***DDL（数据定义语言）*** 语句用于创建或修改数据库对象的结构。在此上下文中，你使用 `create`、`alter`、`drop`\
  \ 和 `truncate` 语句。\n*   ***DML（数据操作语言）*** 语句用于检索、插入、更新和删除数据库中的记录。例如，在此上下文中，你使用 `insert`、`update`、`delete`\
  \ 和 `select` 语句。一些工程师倾向于将 `select` 语句归入一个单独的类别，称为 DQL（数据查询语言）。\n*   ***DCL（数据控制语言）***\
  \ 语句可用于创建各种角色和权限，以控制对数据库的访问。例如，在此上下文中，你可能会使用 `grant` 和 `revoke` 语句。\n*   ***TCL（事务控制语言）***\
  \ 语句用于管理数据库中发生的不同事务。例如，在此上下文中，你可能会使用 `commit`、`rollback` 等语句。\n\n**注意** 如前所述，要详细了解这些术语，你可能需要自己练习\
  \ SQL 语句。在本章中，我们的重点不是详细覆盖 SQL；重点是 Java 应用程序能够简单地与数据库通信并执行一些基本操作。\n\n演示 5\n此演示展示了如何使用\
  \ `javax.sql.DataSource` 接口对象连接到数据源。这是 JDBC 2.0 API 的新增功能，也是连接数据源的首选方式。使用 `DataSource`\
  \ 对象可以提供连接池和分布式事务。但由于你刚刚开始学习，我们将只关注连接部分。\n在演示 5 中，使用了 `getMySqlDataSource()` 方法。\n\
  在此方法中，你创建一个 `MySqlDataSource` 对象，设置数据库 URL，并传递用户 ID 和密码以连接到数据库。设置完这些信息后，你就可以使用此\
  \ `MySqlDataSource` 对象连接到数据库。\n如果将演示 5 与演示 1 进行比较，你会更好地理解这些变化。为简单起见，仅更改了演示 1 中的一小部分代码，输出没有显著变化。但你必须注意这种连接数据库的新方式。\n\
  在继续之前，我建议你阅读以下几点。\n\n要点提示\n\n*   `DataSource` 对象用于特定的 DBMS（或其他数据源，例如文件）。如果需要使用多个数据源，则需要为每个数据源部署一个单独的\
  \ `DataSource` 对象。\n*   `MysqlDataSource` 的名称最近已从 `com.mysql.jdbc.jdbc2.optional.MysqlDataSource`\
  \ 更改为 `com.mysql.cj.jdbc.MysqlDataSource`。\n\n\n\n*   `DataSource` 接口位于 `javax.sql`\
  \ 包中。它有两个重载方法：`Connection getConnection() throws SQLException` 和 `Connection getConnection(String\
  \ username, String password) throws SQLException`。你可以使用其中任何一个。\n\n*   `DataSource`\
  \ 接口的实现可能因供应商而异。因此，为了连接到 MySQL 数据库，我导入了 `com.mysql.cj.jdbc.MysqlDataSource` 类，以获取\
  \ `DataSource` 接口的基本实现。如果你想连接到不同的数据库，比如 Oracle，你可能需要导入 `oracle.jdbc.pool.OracleDataSource`\
  \ 类。\n\n因此，与演示 1 相比，你会发现这次你**没有**使用 `DriverManager` 类的静态 `getConnection()` 方法来连接到名为\
  \ `test` 的数据库。相反，你使用的是 `MysqlDataSource` 对象的 `getConnection()` 方法。我将旧代码保留在注释行中，以便你可以轻松注意到关键变化。\n\
  \n```\npackage java2e.chapter13;\nimport java.sql.*;\nimport javax.sql.DataSource;\n\
  /*\nThe name of the class that implements java.sql.Driver in MySQL Connector/J has\
  \ changed from com.mysql.jdbc.Driver to com.mysql.cj.jdbc.Driver. The old class\
  \ name has been deprecated. The names of these commonly used classes and interfaces\
  \ have also been changed. For example, com.mysql.jdbc.jdbc2.optional is changed\
  \ to com.mysql.cj.jdbc.MysqlDataSource\n*/\nimport com.mysql.cj.jdbc.MysqlDataSource;\n\
  class Demonstration5 {\nstatic DataSource getMysqlDataSource() throws SQLException\
  \ {\nMysqlDataSource mysqlDataSourceOb = null;\nmysqlDataSourceOb = new MysqlDataSource();\n\
  mysqlDataSourceOb.setUrl(\"jdbc:mysql://localhost:3306/test\");\nmysqlDataSourceOb.setUser(\"\
  root\");// Set user id.\nmysqlDataSourceOb.setPassword(\"admin\");// Set //password\n\
  return mysqlDataSourceOb;\n}\npublic static void main(String[] args) throws SQLException\
  \ {\nSystem.out.println(\"***Demonstration-5.Connecting to the MySql server using\
  \ a DataSource object.***\");\nConnection connectionOb = null;\ntry {\n// for MySql\
  \ database\n//Class.forName(\"com.mysql.cj.jdbc.Driver\").newInstance();\n// connectionOb\
  \ =\n// DriverManager.getConnection(\"jdbc:mysql://localhost:3306/test\", \"root\"\
  , \"admin\");\nconnectionOb = getMysqlDataSource().getConnection();\n/*\nThe following\
  \ will also work if you do not supply username, password in getMysqlDataSource()\n\
  //connectionOb=getMysqlDataSource().getConnection( \"root\", \"admin\");\n*/\nStatement\
  \ statementOb = connectionOb.createStatement();\nResultSet queryResult = statementOb.executeQuery(\"\
  select * from Employee\");\nSystem.out.println(\" EmployeeId\\t\" + \"EmployeeName\\\
  t\" + \"Age\\t\" + \"Salary\");\nSystem.out.println(\"--------------------------------\"\
  );\nwhile (queryResult.next()) {\nSystem.out.print(queryResult.getString(\"EmpId\"\
  ) + \"\\t\\t\" + queryResult.getString(\"Name\") + \"\\t\\t\"\n+ queryResult.getInt(\"\
  Age\") + \"\\t\" + queryResult.getDouble(\"Salary\"));\nSystem.out.println();\n\
  }\n} catch (SQLException ex) {\nSystem.out.println(ex.getMessage());\n}\n// To catch\
  \ any other exception\ncatch (Exception ex) {\nSystem.out.println(ex.getMessage());\n\
  ex.printStackTrace();\n} finally {\n// Close the connection\nif (connectionOb !=\
  \ null) {\nconnectionOb.close();\n}\n}\n}\n}\n```\n\n以下是输出结果：\n\n```\n***Demonstration-5.Connecting\
  \ to the MySql server using a DataSource object.***\nEmployeeId   EmployeeName \
  \  Age   Salary\n\n1             Amit           25    1200.5\n2             Sam\
  \            23    1000.25\n3             Bob            30    1500.0\n```\n\n总结\n\
  \n本章讨论了以下主题：\n\n*   什么是 JDBC？\n\n*   什么是数据库？\n\n*   什么是 DBMS？DBMS 有哪些不同类型？\n\n*\
  \   什么是 RDBMS？\n\n*   什么是 SQL？\n\n*   Java 应用程序如何与数据库通信？\n\n*   如何连接到 MySQL？\n\n\
  *   如何在程序中使用 `Statement`、`PreparedStatement` 和 `CallableStatement`？\n\n*   如何使用\
  \ `Connection` 对象调用小函数？\n\n*   根据新的建议，如何使用 `javax.sql.DataSource` 接口对象连接到数据源？\n\n\
  14. Java 增强路径中的重要特性\n\n欢迎来到第 14 章。在本书中，我的重点仅放在 Java 面向对象编程的基本概念上。所有程序均在 Java 8 上编译，这是本书的基线。与其他流行语言一样，Java\
  \ 也在不断发展，并定期添加新特性。虽然详细涵盖这些特性超出了本书的范围，但在本章中，你将了解 Java 各个版本中的一些特性或增强功能。如果你熟悉现有特性，就能从新增强功能中获得最大价值。因此，在本章中，我只挑选了你已经熟悉的话题。\n\
  \n很久以前，当我还是学生时，我第一次看到一本基于 Java 2 的 Java 书，那是在我教授的手中。但在撰写本文时，Java 13 已经发布，并且在未来，Java\
  \ 的发布节奏将非常快。目前，Java 每六个月发布一个新版本。因此，你可以预期在不久的将来会看到更多的变化。但是，如前所述，如果你熟悉基本特性和架构，就能轻松适应变化。你从本书中学到的一切都能帮助你。\n\
  \n最后一点说明：对于最新特性，我是在命令行环境中编译和执行程序的。这是因为我的 Eclipse 环境尚未准备好接受最新特性。因此，如果你首选的 IDE 尚未准备好适应最新特性，你可以像我一样做。现在，让我们开始吧。\n\
  \nJava 7 中的 Try-with-resource\n`try`-with-resource 语句是一种 `try` 语句，你可以在其中声明一个或多个资源。资源是一个对象，当你的程序完成执行时，它应该被关闭。但要使用此特性，你必须选择一个实现了\
  \ `java.lang` 包中 `AutoCloseable` 接口的对象。\n\n这是因为一旦控制权退出 `try`-with-resource 块，`AutoCloseable`\
  \ 对象的 `close()` 方法就会被自动调用。\n\n这里，我为你提供一个简单的演示。在此演示中，`Resource1` 是一个实现了 `AutoCloseable`\
  \ 接口的类。\n\n因此，如果你使用以下代码块来应用此概念：\n\n```\ntry(Resource1 resource1 = new Resource1())\
  \  {\nresource1.useResource();\n}\n```\n\n在输出中，你会注意到 `Resource1` 的 `close()` 方法被自动调用。\n\
  \n演示 1\n\n考虑以下代码：\n\n```\npackage java2e.chapter14;\n//Resource-1\nclass Resource1\
  \ implements AutoCloseable {\npublic void useResource() {\nSystem.out.println(\"\
  Using a Resource1 type.\");\n}\n@Override\npublic void close() throws Exception\
  \ {\nSystem.out.println(\"Close Resource1 type now.\");\n}\n}\nclass TryWithResourceDemo\
  \ {\npublic static void main(String[] args) throws Exception {\nSystem.out.println(\"\
  ***Demonstration 1.Try with Resource demo.***\\n\");\ntry(Resource1 resource1 =\
  \ new Resource1())  {\nresource1.useResource();\n}\ncatch(Exception e) {\nSystem.out.println(e);\n\
  }\n}\n}\n```\n\n输出\n\n```\n***Demonstration-1.Try with Resource demo.***\nUsing\
  \ a Resource1 type.\nClose Resource1 type now.\n```\n\n问答环节\n**14.1 什么是资源？**\n资源是一个对象。一旦你的程序使用了某个资源，你应该在程序完成执行之前关闭它。\n\
  **14.2 我可以使用此特性关闭多个资源吗？**\n\n可以。以下是一个示例语法，其中使用了两个资源：\n\n```\ntry(Resource1 resource1\
  \ = new Resource1();Resource2 resource2 = new Resource2())  {\n//Some code\n}\n\
  ```\n\n使用 Java 8 中的 Lambda 表达式实现函数式接口方法\n在 Java 中，函数式接口是只有一个方法的接口。你可以使用 lambda 表达式为该接口方法提供实现。\n\
  \n\n\n注意\n在第 12 章的演示 4 之前，你已快速了解了 lambda 表达式及其用法。如有需要，可前往该章节回顾。\n\n但显著的变化在于，在这种情况下，你无需在提供实现之前再次定义该方法。因此，可以节省大量输入。\n\
  \n演示 2\n\n为了帮助你理解这一概念，我在使用 lambda 表达式之前提供了一个常规实现。接下来，你将看到如何使用带有返回语句的 lambda 表达式。请参考辅助注释行以便更好地理解。\n\
  \n```\npackage java2e.chapter14;\n@FunctionalInterface\ninterface MyFunctionalInterface\
  \ {\nint addNumbers(int firstNumber, int secondNumber);\n//错误：不能在函数式接口中声明多个方法。\n\
  //int addNumbers2(int firstNumber, int secondNumber);\n}\n//接口方法的常规实现\nclass Implementor\
  \ implements MyFunctionalInterface{\npublic int addNumbers(int firstNumber, int\
  \ secondNumber) {\nSystem.out.println(\"在 Implementor 类中实现接口方法 'addNumbers'。\");\n\
  System.out.println(firstNumber + \" 与 \" + secondNumber + \" 的和为：\");\nreturn firstNumber+\
  \ secondNumber;\n}\n}\nclass LambdaExpressionDemo {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***演示 2\\. Lambda 表达式。***\\n\");\n//使用接口方法的常见方式。\n\
  MyFunctionalInterface impl1= new Implementor();\nSystem.out.println(impl1.addNumbers(1,\
  \ 2));\n// 使用带有返回语句的 lambda 表达式。\nSystem.out.println(\"现在使用带有返回语句的 Lambda 表达式。\"\
  );\nMyFunctionalInterface impl3 = (int a, int b) -> {\nreturn (a + b);\n};\nSystem.out.println(\"\
  50 与 100 的和为：\");\nSystem.out.print(impl3.addNumbers(50,100));\n}\n}\n```\n\n输出：\n\
  \n```\n***演示 2\\. Lambda 表达式。***\n在 Implementor 类中实现接口方法 'addNumbers'。\n1 与 2 的和为：\n\
  \n现在使用带有返回语句的 Lambda 表达式。\n50 与 100 的和为：\n\n```\n\n问答环节\n**14.3 在此程序中，**@FunctionalInterface**\
  \ 是否是表明其为函数式接口的强制要求？**\n不是。但在这种情况下使用该注解是一种良好实践，能增强可读性。此外，如果使用了此注解，将来若有人误向接口中添加另一个抽象方法，编译器能立即报错。\n\
  \nJava 语言规范（第 11 版）说明如下：\n\n*   *函数式接口*是仅有一个抽象方法（除了 `Object` 的方法之外）的接口，因此代表单一功能契约。这个“单一”方法可能表现为多个抽象方法的形式，这些方法具有从超接口继承的、可覆盖的等效签名；在这种情况下，继承的方法在逻辑上代表一个单一方法。\n\
  \n*   它有助于及早检测出旨在成为函数式的接口中出现或继承的不恰当方法声明。\n\n*   “函数式接口的实例可以通过方法引用表达式和 lambda 表达式创建。”\n\
  \nJava 9 中的私有接口方法\n私有接口方法是 Java 9 中的新增特性。在 Java 7 之前，接口方法很简单——都是公共抽象方法。Java 8 允许添加公共静态方法和公共默认方法。从\
  \ Java 9 开始，你可以在接口中使用私有静态方法和私有默认方法。\n\n演示 3\n\n让我们考虑以下演示。这里有一个名为 `MyInterface` 的接口，包含四个方法：\n\
  \n*   第一个是常见的接口方法；它没有方法体，默认是公共且抽象的。\n\n*   接着是两个默认方法。\n\n*   最后是私有非静态接口方法，名为 `privateInterfaceMethod()`。请注意，由于该方法是私有的，你不能直接从\
  \ `main()` 中调用它。\n\n\n\n在这个示例中，我通过默认方法调用了私有方法：\n\n```\ninterface MyInterface{\n\
  void commonInterfaceMethod();\ndefault void defaultInterfaceMethod1() {\nSystem.out.println(\"\
  **Default non-static method1()**\");\n//使用私有接口方法执行公共任务\nprivateInterfaceMethod();\n\
  }\ndefault void defaultInterfaceMethod2() {\nSystem.out.println(\"**Default non-static\
  \ method2()**\");\n//使用私有接口方法执行公共任务\nprivateInterfaceMethod();\n}\nprivate void\
  \ privateInterfaceMethod() {\nSystem.out.println(\"**Private non-static method in\
  \ MyInterface**\");\nSystem.out.println(\"**I can do the common tasks of multiple\
  \ default methods.**\");\n}\n}\nclass MyInterfaceImplementor implements MyInterface{\n\
  @Override\npublic void commonInterfaceMethod() {\nSystem.out.println(\"**Implementing\
  \ the commonInterfaceMethod().**\");\n}\n}\nclass PrivateInterfaceMethodFromJava9\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***Demonstration\
  \ 3.Private Interface Method From Java 9.***\\n\");\nMyInterface interOb=new MyInterfaceImplementor();\n\
  interOb.commonInterfaceMethod();\ninterOb.defaultInterfaceMethod1();\ninterOb.defaultInterfaceMethod2();\n\
  }\n}\n```\n\n输出：\n\n```\n***Demonstration 3.Private Interface Method From Java 9.***\n\
  **Implementing the commonInterfaceMethod().**\n**Default non-static method1()**\n\
  **Private non-static method in MyInterface**\n**I can do the common tasks of multiple\
  \ default methods.**\n**Default non-static method2()**\n**Private non-static method\
  \ in MyInterface**\n**I can do the common tasks of multiple default methods.**\n\
  ```\n\n问答环节\n**14.4 私有接口方法有什么用途？**\n如果接口中有多个默认方法，并且这些接口都在执行公共任务，你可以将公共代码放在私有辅助方法中。再次回顾演示\
  \ 4，它展示了两个默认方法——`defaultInterfaceMethod1()`和`defaultInterfaceMethod2()`——如何通过私有接口方法完成公共任务。\n\
  **14.5 如果只是代码共享的问题，我可以创建另一个默认方法并在其中共享公共代码。这种理解正确吗？**\n你可以这样做，但这种方法不能被视为比私有辅助方法更好的设计。使用私有辅助方法比使用公共辅助方法更优。这种方法可以促进更好的封装和安全性。\n\
  **14.6 默认方法可以是私有的吗？**\n不可以。如果你使用以下代码行，将会收到编译时错误：\n\n```\ndefault private void defaultPrivateInterfaceMethod()\
  \ {\n//some code\n}\n```\n\n错误信息如下：\n\n```\nPrivateInterfaceMethodFromJava9.java:14:\
  \ error: illegal combination of modifiers: private and default\ndefault private\
  \ void defaultPrivateInterfaceMethod() {//some code\n^\n1 error\n```\n\n**14.7 我可以将私有接口方法设为静态吗？**\n\
  可以。例如，如果你在接口`MyInterface`中添加以下两个方法：\n\n```\npublic static void publicStaticInterfaceMethod()\
  \ {\nSystem.out.println(\"**Public static method in MyInterface**\");\nSystem.out.println(\"\
  **Invoking the private static method in MyInterface now.**\");\n}\nprivate static\
  \ void privateStaticInterfaceMethod() {\nSystem.out.println(\"**Private static method\
  \ in MyInterface**\");\n}\n```\n\n然后从`main()`方法中调用`publicStaticInterfaceMethod()`方法，如下所示：\n\
  \n```\nMyInterface.publicStaticInterfaceMethod();\n```\n\n你将在输出中看到以下内容：\n\n```\n\
  **Public static method in MyInterface**\n**Invoking the private static method in\
  \ MyInterface now.**\n```\n\n要点记忆\n\n*   私有方法不能是抽象的。\n\n*   你不能从私有静态方法中调用私有非静态方法。如果这样做，对于以下代码段，你将收到编译时错误：\n\
  \n```\nprivate static void privateStaticInterfaceMethod2() {\nSystem.out.println(\"\
  **Private static method2 in MyInterface**\");\n//编译时错误\n//privateInterfaceMethod();\n\
  }\n```\n\n\n\n但反向操作是允许的；也就是说，你可以在接口中的非私有静态方法里调用私有静态方法。因此，以下代码段*不会*产生编译时错误：\n\n```\n\
  private void privateInterfaceMethod2() {\nSystem.out.println(\"**MyInterface 中的私有非静态方法\
  \ 2**\");\n//无编译时错误\npublicStaticInterfaceMethod();\n}\n```\n\nJava 10 中的局部变量类型推断\n\
  从 Java 10 开始，你可以在声明局部变量时无需指定其类型。\n\n即使你不声明变量类型，它也能根据所赋的值推断出类型。例如，从 Java 10 开始，你可以编写如下代码：\n\
  \n```\nvar myInt=10;\n```\n\n演示 4\n\n接下来的演示将展示 `var` 的简单用法：\n\n```\nclass LocalVariableTypeInterpretation\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***演示 4. 局部变量类型推断。***\\\
  n\");\nint myInt1=1;//ok\nvar myInt2=2;//Java10 起 ok\nSystem.out.println(\"myInt1\
  \ 中的值为：\"+ myInt2);\nSystem.out.println(\"myInt1 的类型为：\");\n//将打印 java.lang.Integer\n\
  System.out.println(((Object)myInt1).getClass().getName());\nSystem.out.println(\"\
  myInt2 的类型为：\");\n//也将打印 java.lang.Integer\nSystem.out.println(((Object)myInt2).getClass().getName());\
  \ }\n}\n```\n\n输出：\n\n```\n***演示 4. 局部变量类型推断。***\nmyInt2 中的值为：1\nmyInt1 的类型为：\n\
  java.lang.Integer\nmyInt2 的类型为：\njava.lang.Integer\n```\n\n限制条件\n\n以下是使用 `var` 时的一些重要限制：\n\
  \n*   你需要将声明和初始化放在一起。例如：\n\n```\nvar myInt=1;//ok\n```\n\n但下面这行代码会引发编译时错误：\n\n*\
  \   你可以使用 `var` 作为变量名。编译器不会对以下声明报错；也就是说，它不像 Java 中的保留关键字那样被对待：\n\n```\nvar myInt;//错误\n\
  myInt=1;\n```\n\n*   你可以在初始化局部变量和 for 循环的上下文中使用 `var`，但不能在方法参数或返回类型中使用。例如，在以下代码段中，`MyClass`\
  \ 中的两个方法都会引发编译时错误：\n\n```\nvar var=12.5;//到目前为止，编译器允许这样做\n```\n\n```\n//你可以在初始化局部变量和\
  \ for 循环的上下文中使用 'var'，但不能在方法参数或返回类型中使用。\nclass MyClass {\nvoid myMethod1(var i)\
  \ { // 编译时错误\n// 一些代码\n}\nvar myMethod2(int i) { //编译时错误\n}\n}\n```\n\nJava 11 中的新字符串方法\n\
  \n从 Java 11 开始，你将获得一些新的 `String` 类方法。在以下示例中，你将看到其中三个方法——`isBlank()`、`repeat()` 和\
  \ `strip()`。让我们看看它们的定义：\n\n*   `isBlank()`：如果字符串为空或仅包含空白代码点，此方法将返回布尔值 `true`；否则返回\
  \ `false`。\n\n*   `repeat(int n)`：返回一个字符串，其值为将此字符串重复 *n* 次后的拼接结果。\n\n*   `strip()`：此方法返回一个去除了所有前导和尾随空格的字符串。\n\
  \n演示 5\n\n考虑以下代码：\n\n```\nclass StringMethodsFromJava11 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***演示 5. Java 11 中的一些新字符串方法。***\\n\");\nString str1\
  \ = \"一个非空字符串。\";\nSystem.out.println(\"str1 为：\"+ str1);\nSystem.out.println(\"\
  \ 'str1 是空白字符串' - 此语句为 \"+ str1.isBlank());\nString str2 = \"\";\nSystem.out.println(\"\
  str2 为：\"+ str2);\nSystem.out.println(\" 'str2 是空白字符串' - 此语句为 \"+  str2.isBlank());\n\
  //重复字符串\nSystem.out.println(\"\\n 现在将 'str1' 重复 3 次。\");\nSystem.out.println(str1.repeat(3));\n\
  //使用 strip() 去除开头和结尾的空格\nString str3 = \" 嗨，读者们！你们好吗？ \";\nSystem.out.println(\"\
  \\nstr3 为：\"+ str3);\nSystem.out.println(\"执行 strip() 操作后，str3 为：\" + str3.strip());\n\
  }\n}\n```\n\n输出：\n\n```\n***演示 5. Java 11 中的一些新字符串方法。***\nstr1 为：一个非空字符串。\n'str1\
  \ 是空白字符串' - 此语句为 false\nstr2 为：\n'str2 是空白字符串' - 此语句为 true\n现在将 'str1' 重复 3 次。\n\
  一个非空字符串。一个非空字符串。一个非空字符串。\nstr3 为： 嗨，读者们！你们好吗？\n执行 strip() 操作后，str3 为：嗨，读者们！你们好吗？\n\
  ```\n\n问答环节\n**14.8 isEmpty() 与 isBlank() 有何不同？**\n\n`isEmpty()` 的定义是：当且仅当字符串长度为零时，它才返回\
  \ `true`。以下代码块可以说明这两个方法之间的区别：\n\n```\n//isBlank 与 isEmpty 对比\nString nonEmpty=\"\
  \ \";//一个制表符空格\nSystem.out.println(\"nonEmpty.length()=\"+ nonEmpty.length());\n\
  System.out.println(nonEmpty.isBlank());//true\nSystem.out.println(nonEmpty.isEmpty());//false\n\
  ```\n\n当你执行这段代码时，将得到以下输出：\n\n```\nThe nonEmpty.length()=1\ntrue\nfalse\n```\n\n\
  由于 `nonEmpty` 的长度不为零，`isBlank()` 返回 `true`，但 `isEmpty()` 返回 `false`。\n**14.9 strip()\
  \ 与 trim() 有何不同？**\n\n`strip()` 可以检测 Unicode 空白字符。但 `trim()` 只能去除小于或等于 `\\u0020`\
  \ 的空格。要查看区别，你可以检查如下字符串：\n\n```\n//中等数学空格 U+205F\nString str1 = \"\\u205F \\u205F\
  \ 这是一个测试字符串，末尾有尾随空格-结束。\\u205F \\u205F\";\n```\n\n现在，如果你在此字符串对象上调用 `trim()` 方法和\
  \ `strip()` 方法，你会注意到区别。例如，如果你用以下代码行进行测试：\n\n```\nString trimmedString = str1.trim();\n\
  String strippedString = str1.strip();\nSystem.out.printf(\"'%s'%n\", trimmedString);\n\
  System.out.printf(\"'%s'%n\", strippedString);\n```\n\n你会看到 `strip()` 能够识别字符串开头和结尾的空格并正确完成其工作。\n\
  \nJava 12/13 中的新 switch 表达式\n`switch` 表达式出现在 Java 12 中，并在 Java 13 中进一步完善。但它是一个预览语言特性。使用此表达式，整个\
