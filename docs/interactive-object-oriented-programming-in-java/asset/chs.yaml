- "# 1. 面向对象编程概念\n\n欢迎来到面向对象编程（OOP）的世界。在开始之前，我们先讨论一些基本问题与解答。例如，为什么需要这种编程方式？这些概念如何让你的工作更轻松？如果你知道这些问题的答案，学习之路将会变得顺畅，你也能从多个角度理解这些概念。但在开始之前，有两点警告需要告知你。\n\
  \n*   如果第一次阅读后未能完全理解所有内容，请不要失去动力。很多情况下，内容看似复杂，但你会逐渐掌握。\n\n*   许多开发者批评 OOP 的概念。但请记住，人类思维往往倾向于批评新事物。因此，即使你想批评这些概念，我建议你先正确理解它们，在各种应用中使用这些概念，然后再自行决定是赞赏还是批评。\n\
  \n现在，让我们开始这段旅程……\n\n计算机编程始于二进制代码，当时使用机械开关加载程序。不难想象，那时的程序员生活极具挑战性。为了让程序员的工作更轻松，一些高级编程语言被开发出来，这些语言使用类似英语的简单指令。但你不应忘记一个事实：计算机只能理解二进制语言的指令。因此，编译器的主要任务是将这些类似英语的指令翻译成二进制代码，最终这些高级语言逐渐流行起来。\n\
  \n随着时间的推移，计算机的容量和能力大幅提升。随后，开发者开始开发复杂的应用程序。不幸的是，当时可用的编程语言没有一种足够成熟，能够有效处理所有应用程序。一些主要关注点如下：\n\
  \n*   如何避免重复劳动？或者说，如何重用现有代码？\n\n*   如何在共享环境中控制全局变量的使用？\n\n*   当代码中存在过多跳转时（例如，在应用程序的多个地方使用\
  \ `goto` 关键字），如何进行调试？\n\n*   如何让新工程师的工作更轻松？\n\n*   如何更好地维护大型代码库？\n\n为了解决这些问题，专家级程序员开始将大问题分解为小问题。这一理念背后的思想非常简单：*如果你能解决这些小问题，最终你就能解决大问题*。因此，他们开始将大问题划分成小块，函数（或过程、子程序）的概念由此发展而来。每个函数专门解决一个小问题。因此，管理这些函数及其之间的交互成为关键焦点，**结构化编程**的概念应运而生。结构化编程大获成功，因为管理小函数很容易，调试起来也很方便。同时，开发者也开始限制全局变量的使用，在大多数情况下，它们被函数中的局部变量所取代。\n\
  \n结构化编程流行了近二十年。在此期间，硬件容量显著提升。因此，开发者希望解决更复杂的任务，结构化编程的局限性也逐渐凸显；例如，考虑以下情况：\n\n*   假设在你的应用程序中，你在多个函数中使用了某种特定数据类型。后来你发现需要更改该数据类型。结果，你需要在应用程序的所有函数中实施更改。\n\
  \n*   用结构化编程的关键组件（即数据和函数）来建模所有现实场景是很困难的。在现实世界中，每当你创建一个产品时，有两个方面需要关注：\n    *   *目的*。为什么需要这个产品？\n\
  \n*   *行为*。这个产品如何让你的生活更轻松？\n\n随后，对象的概念应运而生。艾伦·凯伊被广泛认为是面向对象编程之父之一，他与一些同事在帕洛阿尔托研究中心（PARC，前身为施乐帕克研究中心）命名了这一概念。\n\
  \n### 要点回顾\n\n结构化编程与面向对象编程的根本区别可以总结如下：*在面向对象编程中，重点不是对数据的操作，而是数据本身。*\n\nOOP 侧重于一些关键原则。我将在本书中详细讲解它们。在本章中，你将初步了解每个原则。第一次阅读时你可能无法理解所有术语，因此建议你再次回顾这些主题。\n\
  \n## 类与对象\n\n这些是 OOP 的核心。**类**是其对象的蓝图或模板。**对象**是类的实例。每个对象都有自己的状态、行为和标识。简单来说，你可以认为在结构化编程中，你将问题分解为小函数；而在\
  \ OOP 中，你将问题分解为对象。你熟悉诸如 `int`、`double`、`float` 等数据类型。你知道这些是*内置数据类型*或*原始数据类型*，因为它们已在计算机语言中定义。但当你创建自己的数据类型时，比如\
  \ `Student`，你需要创建一个 `Student` 类。就像当你需要创建一个整型变量时，你首先提到 `int`；同样，当你需要创建一个 `Student`\
  \ 对象（例如 `john`）时，你需要首先提到你的 `Student` 类。因此，当你熟悉 OOP 后，你可能会这样说：狗是 `Mammal` 类的一个对象，你的汽车是\
  \ `Vehicle` 类的一个对象，等等。\n\n\n\n## 封装\n\n在面向对象编程中，你不允许数据在系统内自由流动。相反，你将数据和函数封装到一个单一单元中（即一个类中）。封装的目的至少包含以下之一：\n\
  \n*   设置限制，使得对象的组件无法被直接访问\n*   将数据与作用于该数据的方法绑定在一起（即形成一个胶囊）\n\n在某些面向对象编程语言中，信息隐藏并非默认实现。因此，它们引入了一个额外的术语，称为*信息隐藏*。\n\
  \n稍后你会看到，数据封装是类中的关键特性之一。如果你想提升安全性，你的数据就不应该对外部世界可见。只有通过类内部定义的方法，你才能访问这些数据。因此，你可以将这些方法视为对象数据与外部世界（即你的程序）之间的接口。\n\
  \n在 Java 中，你可以通过多种方式实现封装。例如，你可以在此上下文中使用访问说明符（或修饰符）以及 getter-setter 方法。\n\n### 注意\n\
  \n你将在第 3 章中学习访问说明符和 getter-setter 方法。\n\n## 抽象\n\n抽象的关键目的是只展示必要的特征，并隐藏实现的背景细节。抽象也与封装密切相关，但两者的区别可以通过一个简单的日常场景轻松理解。\n\
  \n当你按下遥控器上的按钮打开电视时，你并不关心电视的内部电路，也不关心遥控器如何控制电视的操作。你只知道遥控器上不同的按钮有不同的功能，只要它们正常工作，你就满意了。因此，用户与复杂的实现细节隔离开来，这些细节被*封装*在遥控器（和电视）内部。同时，可以通过遥控器执行的常见操作可以被视为一种*抽象*。当同一个遥控器也能在不同型号或产品上使用时，制造商可以增强这一特性。例如，DVD\
  \ 播放器的遥控器也可以用来控制电视的音量。\n\n## 继承\n\n每当我们谈论可重用性时，通常指的是继承，这是一个对象获取另一个对象属性的过程。考虑这个例子。`Bus`\
  \ 是 `Vehicle` 的一种类型，因为它满足了用于运输目的的 `Vehicle` 的基本标准。类似地，`Train` 是 `Vehicle` 的另一种类型。即使\
  \ `GoodsTrain` 和 `PassengerTrain` 不同，我们也可以说两者都继承自 `Train` 类别（或类），因为最终它们都满足了 `Train`\
  \ 的基本标准，而 `Train` 本身又是一种 `Vehicle`。因此，你可以简单地说，层次化分类是通过继承的概念来支持的。\n\n在编程世界中，继承从一个现有的父类创建一个新的子类。这个父类有时有不同的名称。例如，在\
  \ C# 中，你将这个父类称为基类，而在 Java 中，你可能将其称为超类。所以，简单来说，父类位于该层次链中高一级的位置。然后，你可以向子类中添加新的功能（方法）或修改超类的功能（稍后你会称之为重写功能）。你必须记住，由于这些修改，核心架构不应受到影响。换句话说，如果你从\
  \ `Vehicle` 类派生出 `Bus` 类，并在 `Bus` 类中添加/修改功能，这些修改不会影响为 `Vehicle` 类描述的原始功能。\n\n因此，关键优势在于，通过这种机制，你可以避免大量重复的代码。\n\
  \n## 多态\n\n多态通常与*一个名称，多种形态*相关联。想想你家宠物的行为。当它看到一个陌生人时，它会生气并开始狂吠。但当它看到你时，它会发出不同的声音并表现出不同的行为。在编程世界中，你也可以想到一个常见的方法：加法。对于两个整数的加法，你期望得到整数的和。但对于字符串操作数，你期望得到一个拼接后的字符串。\n\
  \n多态可以分为两种类型：\n\n*   ***编译时多态**：* 一旦程序被编译，编译器可以很早就决定在哪种情况下调用哪个方法。这也被称为静态绑定或早期绑定。\n\
  \n*   ***运行时多态**：* 实际的方法调用在运行时才被解析。在编译时，你无法预测程序运行时将调用哪个方法（例如，程序可能因不同的输入而表现不同）。考虑以下情况：假设你想在程序执行的第一行生成一个随机数。如果生成的数字是偶数，你将调用一个方法\
  \ `Method1()`，它会打印“Hello”；否则，你将调用一个同名的方法，但它会打印“Hi”。现在，你会同意，在程序执行后，你才能看到哪个方法被调用了（即编译器无法在编译时解析该调用）。在这种情况下，在程序执行之前，你完全无法得知会看到“Hello”还是“Hi”。因此，它有时也被称为动态绑定或晚期绑定。在第\
  \ 5 章中，你将看到关于多态的详细讨论，并深入体会运行时多态的必要性。\n\n## 问答环节\n\n**1.1 面向对象编程的关键特性是什么？**\n\n以下是面向对象编程的关键特性：\n\
  \n*   封装\n*   抽象\n*   继承\n*   多态\n\n**1.2 对象与类有何不同？**\n\n对象由类创建。对象是类的一个实例，而类只是对象的模板或蓝图。对象是物理实体，可以在系统中分配内存，但类是逻辑实体，不在系统中分配内存。\n\
  \n**1.3 抽象与封装有何不同？**\n\n抽象关注对象的可见行为，而封装关注该行为的实现部分。封装帮助你捆绑数据，同时可以隐藏一些你不想向外部世界披露的信息。\n\
  \n**1.4 继承机制的关键优势是什么？**\n\n重用现有代码，你可以节省时间和精力。同时，这种机制有助于避免应用程序中的重复代码。\n\n**1.5 面向对象编程的特点是什么？**\n\
  \n以下是一些重要特点：\n\n*   你的关注点在数据，而不是函数。因此，你将程序划分为对象，而不是函数。\n*   你不允许数据自由流动。你使用方法访问它们。\n\
  *   你的对象通过方法进行通信。\n*   外部世界不应访问你的数据。\n*   你的应用程序可以轻松适应新的变化。同时，它也易于维护。\n\n## 总结\n\
  \n本章讨论了以下主题：\n\n*   什么是面向对象编程？\n*   它为何会演变？\n*   它与结构化编程有何不同？\n*   面向对象编程的关键特性是什么？\n\
  \n"
- '# 2. 构建模块：类与对象


  面向对象编程（OOP）技术主要依赖于两个概念——类和对象。在本章中，我们将详细讨论这些主题。


  ## 类


  类是蓝图、模板或原型。它可以描述其对象的行为，并且是对象如何被构建或实例化的基础。




  ## 对象


  对象是类的一个实例。


  如果你熟悉足球运动（或者在美国被称为*英式足球*），你就会知道，参加比赛的球员是根据他们在不同位置上的技能被选拔出来的。除了这些技能，他们还需要具备最低水平的比赛体能和一些重要的运动能力。所以，当我说罗纳尔多是一名足球运动员时，你可以假设罗纳尔多拥有这些基本能力以及一些足球特有的技能（即使你并不认识罗纳尔多）。这就是为什么你可以简单地说，`Ronaldo`
  是 `Footballer` 类的一个对象。


  ### 注意


  你可能会觉得这有点像“先有鸡还是先有蛋”的困境。你可能会争辩说，如果我说“X 踢球像罗纳尔多”，那么在这种情况下，罗纳尔多就扮演了类的角色。然而，在面向对象设计中，通过决定谁先出现，并确定那个家伙就是应用程序中的类，你可以让事情变得简单。


  再考虑另一位足球运动员，贝克汉姆。你可以再次假设，如果贝克汉姆是一名足球运动员，那么贝克汉姆在足球的许多方面一定都很出色。同时，他必须拥有最低的体能水平才能参加比赛。


  现在，假设罗纳尔多和贝克汉姆都参加同一场比赛。不难预测，尽管罗纳尔多和贝克汉姆都是足球运动员，但他们在比赛中的踢球风格和表现会各不相同。同样，在面向对象编程的世界里，即使对象属于同一个类，它们的行为表现也可能各不相同。


  你可以考虑任何领域。例如，你可以说你的宠物狗或宠物猫是 `Animal` 类的对象。类似地，你最喜欢的汽车可以被视为 `Vehicle` 类的对象，你最喜欢的小说可以被视为
  `Book` 类的对象，等等。


  在现实场景中，每个对象都必须具备两个基本特征：状态和行为。如果你考虑 `Footballer` 类中的对象——罗纳尔多或贝克汉姆——你可能会注意到它们有“比赛状态”或“非比赛状态”这样的状态。在比赛状态下，它们可以展示不同的技能（或行为）——它们可以奔跑、踢球、传球等等。


  在非比赛状态下，行为也会改变。在这种状态下，它们可以小睡片刻，或者吃饭，或者通过读书、看电影等活动来放松。


  类似地，你家里的电视机，在任何时刻，要么处于“开机”状态，要么处于“关机”状态。只有当它处于“开机”模式时，才能显示不同的频道。如果处于“关机”模式，它什么也不显示。


  所以，要开始学习面向对象编程，你可以问以下问题：


  *   我的对象可能有哪些状态？

  *   在这些状态下，它们可以执行哪些不同的功能（行为）？


  一旦你得到了这些问题的答案，就可以继续了。在任何面向对象程序中，软件对象都遵循相同的模式：它们的状态存储在字段（变量）中，它们的能力（行为）通过不同的方法（函数）来描述。


  现在让我们做一些编程练习。你即将开始一段激动人心的旅程。我会尽量让事情变得非常简单。同时，我会忽略一些典型的边界情况，让你的旅程顺畅而轻松。


  你现在明白了，要创建对象，首先需要确定它们属于哪个类；也就是说，通常，如果你想创建对象，你需要先创建一个类。


  ### 记住要点


  *   从类开始，它是架构蓝图。一个类定义了对象的结构和行为。从一张蓝图，你可以建造多栋建筑。同样，从一个类，你可以构造多个对象（或实例）。（如前所述，我在做此陈述时忽略了典型的边界情况。例如，一个真正的单例类不能有多个实例）。

  *   通过类，你创建了一个新的数据类型，而对象则用于保存数据（字段）和方法。对象的行为可以通过这些方法来暴露。


  在 Java 中，你按如下方式创建一个类：


  ```

  class A

  {

  //这是一个单行注释。

  //这里是一些数据，例如，

  int a;

  //这里是一个方法，例如，

  void someMethod()

  {

  //一些代码

  }

  }

  ```


  你可以看到，要创建一个类，你需要使用 `class` 关键字。（单行注释 `//` 用于提高可读性。）类体用花括号——`{` 和 `}`——括起来。类内部的数据或变量被称为***实例***变量。你可以在类中拥有一些方法。这些数据和方法统称为***类成员***。


  现在，你已经创建了一个名为 `A` 的类。因此，你可以从中创建一个对象。假设你的对象是 `obA`，它可以通过以下语句创建：


  ```

  A obA=new A();

  ```


  你可以将上述语句拆分为以下两行：


  ```

  A obA;//第 1 行

  obA=new A();//第 2 行

  ```


  需要注意的是，在第 1 行结束时，`obA` 是一个***引用***。到目前为止，还没有分配内存，`obA` 包含 `null`。但是一旦 `new` 运算符出现，就会为其分配内存。因此，在第
  2 行结束时，`new` 运算符为物理对象分配了内存，并将一个引用赋值给了 `obA`。


  ### 记住要点


  类是一个逻辑实体。一旦你实例化一个类，你就创建了对象。这些对象会占用你系统中的内存。因此，对象是物理实体。在前面的代码片段中，`new` 运算符用于创建类 `A`
  的一个对象。它为其分配内存，并返回一个类 `A` 的对象，该对象的引用存储在变量 `obA` 中。


  ## 构造器


  如果你仔细观察，会发现 `new` 关键字后面跟着类名和一对括号。你使用这种方式来构造对象。这些就是***构造器***，用于运行初始化代码。构造器既可以带参数，也可以不带参数。因此，你可以向它们传递不同的参数。简单来说，构造器可以不同，体现在参数***数量***不同或参数***类型***不同。在下面的例子中，类
  `A` 有四个不同的构造器。


  ```

  class A

  {

  public A()

  {

  System.out.println("无参构造器");

  }

  public A(int a)

  {

  System.out.println("一个整型参数的构造器");

  }

  public A(int a,int b)

  {

  System.out.println("两个整型参数的构造器");

  }

  public A(double a)

  {

  System.out.println("一个双精度浮点型参数的构造器");

  }

  }

  ```


  如果你没有为你的类提供任何构造器，Java 会为你提供一个默认的构造器。




  ### 要点回顾


  如果你没有为类包含任何构造函数，编译器会提供一个无参默认构造函数。这个默认构造函数实际上会调用超类（如果有的话）的无参构造函数。在这种情况下，如果超类没有这样的构造函数，编译器可能会报错。如果你的类没有显式指定超类，那么它有一个隐式超类
  `Object`，该超类包含一个无参构造函数。你可能对这些术语还不熟悉，但很快你就会了解它们。


  因此，当你看到类似下面的代码时，可以确定将使用一个无参构造函数：


  ```

  A obA=new A();

  ```


  但要判断它是用户自定义的构造函数还是由 Java 提供的（即默认构造函数），你需要检查类体；例如，在类定义中，如果有如下代码：


  ```

  class A

  {

  A()

  {

  // 一些代码

  }

  }

  ```


  你可以得出结论：你使用了用户自定义的无参构造函数。因此，在这种情况下，Java 不会为你提供任何默认构造函数。


  到目前为止，你已经明白类只是程序的构建块。你将变量（也称为***字段***）和方法***封装***在类中，形成一个独立的单元。这些变量被称为实例变量，因为该类的每个实例都包含这些变量自身的副本。（稍后你会了解到，字段可以是任何隐式数据类型、不同的类对象等）。另一方面，方法包含一个代码块。这不过是一系列执行特定操作的语句。实例变量通常通过方法来访问。如前所述，这些变量和方法统称为类成员。


  ### 注意


  实例是类的一个唯一副本，用于表示一个对象。我在文中交替使用了这些术语。


  静态变量将在第 8 章中讨论。


  通常，你可以在类声明中放置不同的内容。例如，你可以在类体中放置变量、方法、构造函数、内部类、初始化块、枚举（它们在内部也作为类实现）等。但为了简单起见，我从最常见的方法和字段开始讨论。你将在本书的相应章节中看到其他主题。


  字段和方法可以与不同类型的修饰符关联；例如，`public`、`private`、`protected`、`default` 等。你很快就会熟悉这些修饰符。


  ### 演示 1


  考虑一个简单的例子。这里，我有一个名为 `ClassEx1` 的类，并且只将一个整数字段 `myInt` 封装到其中。我还将该字段初始化为值 25。因此，你可以预测，每当我创建这个类的对象时，该对象都会包含一个名为
  `myInt` 的整数，并且对应的值将是 25。


  为了方便你参考，我从 `ClassEx1` 类创建了两个对象——`obA` 和 `obB`。我测试了对象中变量 `myInt` 的值。在输出中，你可以看到在两种情况下，我都得到了值
  25。


