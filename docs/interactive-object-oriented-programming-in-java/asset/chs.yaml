  \ / by zero\n我在 finally 块中。你无法跳过我！\nat java2e.chapter10.Demonstration2.main(Demonstration2.java:10)\n\
  ```\n\n从程序的输出中，你可以确认以下几点：\n\n![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig3_HTML.jpg](img/433474_2_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3\n\n来自 Eclipse IDE 的示例源代码快照\n\n*   当 `try` 块内引发异常时，控制权跳转到相应的 `catch` 块。`try`\
  \ 块的剩余部分未执行。（注意，在输出中你看不到 `\"因此，a/b 的结果是：\"` 这一行。）\n\n*   即使程序遇到异常，`finally` 块中的代码也会执行。（注意输出中的\
  \ `\"我在 finally 块中。你无法跳过我！\"` 这一行）。\n\n*   为了获取异常的详细信息，`java.lang.Throwable` 类中已经定义了一些内置方法。`getMessage()`、`printStackTrace()`、`getCause()`\
  \ 等是该类别中的一些常见示例。在本演示中，我使用了其中两个——`getMessage()` 和 `printStackTrace()`。为了便于你参考，我仅从\
  \ Eclipse IDE 中截取了一个示例源代码快照，以获取 `getMessage()` 方法的详细信息，如图 10-3 所示。\n\n### 问答环节\n\
  \n**10.1 我可以在除法操作之前轻松地放置一个** **if** **块，例如** **if(b==0)** **，以避免除数为 0，在这种情况下，我可以轻松地避免使用**\
  \ **try-catch** **块。这种理解正确吗？**\n\n你只考虑了这个简单的例子，所以才会这么认为。是的，在这种情况下，你可以使用你提出的方法来保护你的代码。但是，考虑一下\
  \ `b` 的值也是在运行时计算的情况（例如，你可能从指定范围内随机选取一个值，并且无法提前预测该值）。此外，如果你需要在所有可能的情况下都放置这样的保护，你的代码可能会显得笨拙且难以阅读。但如果你喜欢防御性编程风格，你可以持续要求输入有效值。所以，最终，如何设计你的软件取决于你的选择。\n\
  \n### 演示 3\n\n现在，考虑以下示例，该示例演示了如何使用多个 `catch` 块处理多种类型的异常。在下面的程序中，整数 `b` 的值可以是 0、1\
  \ 或 2。该值是随机生成的。因此，你无法预测该值。根据生成的值，你可能会遇到不同类型的异常。为了更好地理解，你可能需要多次查看输出和分析部分。\n\n```\n\
  package java2e.chapter10;\nimport java.util.Random;\npublic class Demonstration3\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***Demonstration-3.处理多个异常***\"\
  );\nint a = 5;\nRandom randomGenerator = new Random();\n// 将生成 0 到 2 之间的数。\nint\
  \ b = randomGenerator.nextInt(3);\nSystem.out.println(\"b 的当前值是：\" + b);\nint c\
  \ = 0;\ntry {\n/ 情况-1：如果 b=0，将引发 ArithmeticException*/\nc = a / b;\nSystem.out.println(\"\
  c=\" + c);\nint[] arr = new int[2];\narr[0] = 0;\narr[1] = c + 1;\nif (b % 2 ==\
  \ 0) {\n/* 情况-2：（此处 b 不为零）将引发 ArrayIndexOutOfBoundsException*/\narr[2] = c + 2;\n\
  } else {\nObject myObject = null;\n// 情况-3：引发 NullPointerException\nint hashcode\
  \ = myObject.hashCode();\n}\n} catch (ArithmeticException ex) {\nSystem.out.println(\"\
  捕获到 ArithmeticException：\" + ex.getMessage());\nex.printStackTrace();\n} catch (ArrayIndexOutOfBoundsException\
  \ ex) {\nSystem.out.println(\"捕获到 ArrayIndexOutOfBoundsException：\" + ex.getMessage());\n\
  ex.printStackTrace();\n} catch (Exception ex) {\nSystem.out.println(\"捕获到 Exception：\"\
  \ + ex.getMessage());\nex.printStackTrace();\n} finally {\nSystem.out.println(\"\
  我在这里，finally\");\n}\n}\n}\n```\n\n输出：\n\n当你编译并运行程序时，你可能会看到以下任何一种输出。我展示了不同运行中的所有可能输出。由于\
  \ `b` 的值是随机生成的，你可能会得到不同的顺序。\n\n情况 1：\n\n```\n***Demonstration-3.处理多个异常***\nb 的当前值是：1\n\
  c=5\n捕获到 Exception：null\n我在这里，finally\njava.lang.NullPointerException       at java2e.chapter10.Demonstration3.main(Demonstration3.java:27)\n\
  ```\n\n情况 2：\n\n```\n***Demonstration-3.处理多个异常***\nb 的当前值是：2\nc=2\n捕获到 ArrayIndexOutOfBoundsException：2\n\
  我在这里，finallyjava.lang.ArrayIndexOutOfBoundsException: 2\nat java2e.chapter10.Demonstration3.main(Demonstration3.java:23)\n\
  ```\n\n情况 3：\n\n```\n***Demonstration-3.处理多个异常***\nb 的当前值是：0\n捕获到 ArithmeticException：/\
  \ by zero\n我在这里，finally\njava.lang.ArithmeticException: / by zero at java2e.chapter10.Demonstration3.main(Demonstration3.java:16)\n\
  ```\n\n从程序的输出中，你可以观察到以下几点：\n\n*   当引发异常时，只有一个 `catch` 块被执行。例如，如果 `catch (ArithmeticException\
  \ ex){..}` 块可以处理该异常，则 `catch (Exception ex){..}` 块无需再次处理该异常。\n\n*   在前面的程序中，所有类型的异常都可以在\
  \ `catch (Exception ex)` 块中被捕获，因此该块必须作为最后一个 `catch` 块放置。例如，在这种情况下：\n    *   `ArithmeticException`\
  \ 类派生自 `RuntimeException` 类，而 `RuntimeException` 类又派生自 `Exception` 类。\n\n    * \
  \  `ArrayIndexOutOfBoundsException` 类派生自 `IndexOutOfBoundsException` 类，而 `IndexOutOfBoundsException`\
  \ 类又派生自 `RuntimeException` 类，`RuntimeException` 类再派生自 `Exception` 类。\n\n### 注意\n\
  \n在 Eclipse 中，你可以将鼠标指针悬停在异常名称上，然后选择“打开声明”选项来显示继承层次结构。\n\n\n\n## 多重 catch 子句\n\n\
  从 Java 7 开始，你可以使用 `catch` 子句的另一种变体。现在，单个 `catch` 块可用于捕获多种异常类型。以下代码片段展示了如何在公共块中使用多个\
  \ `catch` 子句：\n\n```\n//从 Java 7 开始，你可以像下面这样编写多个 catch 子句\ncatch (ArithmeticException\
  \ | ArrayIndexOutOfBoundsException ex){  System.out.println(\"捕获到 ArithmeticException\
  \ 或 ArrayIndexOutOfBoundsException :\" + ex.getMessage());\nex.printStackTrace();\n\
  }\n```\n\n**10.2 你能预测以下代码的输出吗？**\n\n```\npackage java2e.chapter10;\nimport java.util.Random;\n\
  public class Quiz1 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***Quiz1.关于如何在程序中放置 catch 子句。***\");\nint a = 5;\nRandom randomGenerator = new Random();\n\
  // 将生成 0 到 2 之间的随机数。\nint b = randomGenerator.nextInt(3);\nSystem.out.println(\"\
  b 的当前值为：\" + b);\nint c = 0;\ntry {\n//这里 b=0，会引发 ArithmeticException\nc = a / b;\n\
  System.out.println(\"c=\" + c);\n}\n//以下 catch 子句放置不正确\ncatch (Exception ex) {\n\
  System.out.println(\"捕获到异常：\" + ex.getMessage());\nex.printStackTrace();\n}\n//从\
  \ Java 7 开始，你可以像下面这样编写多个 catch 子句\ncatch (ArithmeticException | ArrayIndexOutOfBoundsException\
  \  ex) {\nSystem.out.println(\"捕获到 ArithmeticException 或 ArrayIndexOutOfBoundsException：\"\
  \ + ex.getMessage());\nex.printStackTrace();\n}\n//catch 子句的正确放置位置\n/*catch (Exception\
  \ ex) {\nSystem.out.println(\"捕获到异常：\" + ex.getMessage());\nex.printStackTrace();\n\
  }*/finally {\nSystem.out.println(\"我在这里执行 finally\");\n}\n}\n}\n```\n\n你会遇到编译时错误：`Unreachable\
  \ catch block for ArithmeticException. It is already handled in the catch block\
  \ for Exception`，如图 10-4 所示。\n\n![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig4_HTML.jpg](img/433474_2_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4\n\n不可达的 *catch* 块\n\n异常遵循继承层次结构。因此，你需要正确放置 `catch` 块。前面已经提到，`ArithmeticException`\
  \ 类派生自 `RuntimeException` 类，而 `RuntimeException` 类又派生自 `Exception` 类。为了便于理解，请参考程序中的相关注释。\n\
  \n### 要点记忆\n\n在处理多个 `catch` 块时，你需要将更具体的异常子句放在前面。换句话说，你应该按照从最具体到最通用的顺序放置 `catch`\
  \ 块。\n\n值得注意的是，如果你熟悉 C#，可能会注意到它支持一些额外的 `catch` 子句变体。例如，在 C# 中，你可能会看到以下 `catch` 块变体：\n\
  \n```\ncatch ()\n{\nConsole.WriteLine(\"遇到异常\");\n}\n```\n\n或者：\n\n```\ncatch (WebException\
  \ ex) when (ex.Status == WebExceptionStatus.Timeout)\n{\n//一些代码\n}\n```\n\n### 问答环节\n\
  \n**10.3 我可以像下面这样只使用** **try** **和** **finally** **吗？**\n\n```\ntry{\n//一些代码\n}\n\
  finally{\n//一些代码\n}\n```\n\n可以。\n\n**10.4 那么为什么还需要** **catch** **块呢？**\n\n`catch`\
  \ 块用于以某种指定的方式处理异常。同时，你必须注意 `finally` 的实际用途是不同的。前面已经提到，在 `finally` 内部你应该进行清理工作，以便应用程序能够优雅地关闭。例如，如果文件已经打开，你应该关闭它；或者，如果你已经分配了一些资源，这些资源应该在此块内释放（以防止内存泄漏）。在第\
  \ 14 章中，你将学习使用 try-with-resource 语句，其中术语“资源”指的是程序执行完毕后必须关闭的对象。\n\n**10.5 如果在** **finally**\
  \ **块中遇到异常会发生什么？**\n\n你不应该忘记 `finally` 的目的，它基本上是用来关闭文件、释放占用的资源等。但是，如果你在 `finally`\
  \ 块中放置了错误的逻辑，你可能会再次遇到异常。（解决方案是一样的——你可以使用 `try-catch`、`try-finally` 或 `try-catch-finally`\
  \ 块来防范 `finally` 块中可能出现的异常。事实上，在 Java 6 之前，你可能会看到这种用于关闭资源的用法。）\n\n### 演示 4\n\n这里有一个示例供你参考。你可以看到，一旦你收到异常（当\
  \ b 在 finally 块中变为 0 时），`finally` 块中的后续行将不会执行。例如，在以下情况中，输出中没有出现“我位于 finally 块的末尾”这一行。\n\
  \n```\npackage java2e.chapter10;\nimport java.util.Random;\npublic class Demonstration4\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***演示-4.在 finally\
  \ 块中编写代码的错误方式***\");\ntry {\nSystem.out.println(\"我在 try 块内部。\");\n}\nfinally {\n\
  System.out.println(\"我位于 finally 块的开始处。\");\nint a = 5;\nRandom randomGenerator\
  \ = new Random();\n// 将生成 0 到 2 之间的随机数。\nint b = randomGenerator.nextInt(3);//可能产生\
  \ 0\nSystem.out.println(\"b 的当前值为：\" + b);\nint c = a / b;\nSystem.out.println(\"\
  c=\" + c);\nSystem.out.println(\"我位于 finally 块的末尾。\");\n}\n}\n}\n```\n\n当 `b` 的值为\
  \ 0 时的输出如下：\n\n```\n***演示-4.在 finally 块中编写代码的错误方式***\n我在 try 块内部。\n我位于 finally 块的开始处。\n\
  b 的当前值为：0\nException in thread \"main\" java.lang.ArithmeticException: / by zero\n\
  at java2e.chapter10.Demonstration4.main(Demonstration4.java:19)\n```\n\n同样值得注意的是，如果你杀死或中断一个线程，`finally`\
  \ 块可能不会执行，即使其他线程可以运行并使整个应用程序保持活动状态。你将在第 11 章中学习线程。\n\n### 问答环节\n\n**10.6 到目前为止，你给出的例子都是像**\
  \ **ArrayIndexOutOfBoundsException、** **ArithmeticException** **等。我该如何记住这些名称？**\n\
  \n这些是 Java 中的内置异常。所有这些都已经在 `java.lang` 包中定义。由于这个包是默认包，因此默认情况下你会导入所有这些异常。通过练习，你可以记住它们的名称。我个人会借助\
  \ Eclipse。类似的 IDE 也可以在这方面帮助你。\n\n在这种情况下，你可以注意默认处理程序抛出的异常是什么。从该报告中，你可以获取异常的名称。例如，注意我们演示\
  \ 1 的输出，如下所示：\n\n```\n***演示-1.探索异常。***\nException in thread \"main\" java.lang.ArithmeticException:\
  \ / by zero\nat java2e.chapter10.Demonstration1.main(Demonstration1.java:9)\n```\n\
  \n从这个输出中，你知道引发了 `ArithmeticException`。\n\n## 抛出异常\n\n到目前为止，你已经看到了处理 Java 运行时系统抛出的异常的示例。当你处理\
  \ Java 语句时，可能会由于错误的逻辑、漏洞等原因遇到此类异常。但是还有一种引发异常的方法——你也可以自由地使用 `throw` 关键字显式抛出异常。当你创建自己的应用程序并希望控制异常情况时，这种方法很有用。\n\
  \n当你使用 `throw` 关键字时，需要遵循基本格式，如下所示：\n\n```\nthrow anObjectOfThrowable;\n```\n\n其中\
  \ `anObjectOfThrowable` 必须是 `Throwable` 类或其子类的实例。\n\n\n\n### 演示 5\n\n考虑以下程序及其对应的输出：\n\
  \n```\npackage java2e.chapter10;\nclass DemoClass {\nvoid thowingException() {\n\
  System.out.println(\"我总是抛出一个 NullPointerException\");\nthrow new NullPointerException(\"\
  强制抛出一个 NullPointerException\");\n// System.out.println(\"我永远不会打印这一行\");\n}\n}\n\
  class Demonstration5 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  ***演示 5. 'throw' 关键字的使用***\\n\");\nDemoClass demo = new DemoClass();\ntry {\ndemo.thowingException();\n\
  } catch (Exception e) {\nSystem.out.println(e.getMessage());\ne.printStackTrace();\n\
  }\n}\n}\n```\n\n输出：\n\n```\n***演示 5. 'throw' 关键字的使用***\n我总是抛出一个 NullPointerException\n\
  强制抛出一个 NullPointerException\njava.lang.NullPointerException: 强制抛出一个 NullPointerException\
  \       at java2e.chapter10.DemoClass.thowingException(Demonstration5.java:6)\n\
  at java2e.chapter10.Demonstration5.main(Demonstration5.java:17)\n```\n\n## 重新抛出异常\n\
  \n有时你需要重新抛出一个异常；例如，当你想要写入日志条目，或者当你想要发送一个新的更高级别的异常时。当你从 `catch` 块中重新抛出异常时，它会被重新抛给下一个外层的\
  \ `try` 块。演示 6 展示了这样一个例子。\n\n以下是你可用于重新抛出异常的示例格式：\n\n```\ntry{\n// 一些代码\n}\ncatch(Exception\
  \ ex){\n// 一些代码，例如，记录异常\n// 现在重新抛出它\nthrow ex;\n}\n```\n\n### 演示 6\n\n考虑以下内容：\n\n\
  ```\npackage java2e.chapter10;\nclass Demonstration6 {\nstatic int c;\nstatic void\
  \ divide(int a, int b) {\ntry {\nb--;\nc = a / b;\n// 一些代码\n} catch (ArithmeticException\
  \ ex) {\n// 现在记录它\nSystem.out.println(\"a= \" + a + \" b= \" + b);//a=100,b=0\n\
  System.out.println(\"捕获到一个异常: \" + ex.getMessage());\n// 现在重新抛出它\nthrow ex;// 重新抛出异常\n\
  }\n}\npublic static void main(String[] args) {\nSystem.out.println(\"***演示-6. 重新抛出异常.***\"\
  );\nint a = 100, b = 1;\ntry {\ndivide(a,b);\n}\ncatch (Exception ex) {\nSystem.out.println(\"\
  在 main() 方法中重新捕获到异常。\");\nSystem.out.println(\"a= \" + a + \" b= \" + b);//a=100,b=1\n\
  System.out.println(\"以下是堆栈跟踪 :\");\nex.printStackTrace();\n}\n}\n}\n```\n\n输出：\n\
  \n```\n***演示-6. 重新抛出异常.***\na= 100 b= 0\n消息: / by zero\n在 main() 方法中重新捕获到异常。\na=\
  \ 100 b= 1\n以下是堆栈跟踪 :\njava.lang.ArithmeticException: / by zero\nat java2e.chapter10.Demonstration6.divide(Demonstration6.java:10)\n\
  at java2e.chapter10.Demonstration6.main(Demonstration6.java:25)\n```\n\n你可以看到为什么在重新抛出异常之前记录一些额外的细节很重要。一旦你遇到异常，你就记录了它，并且从该日志中你发现除数\
  \ (`b`) 在 `divide()` 方法中变成了 0。如果你没有在 `divide()` 方法内部使用 `try`-`catch` 块，并且没有立即记录\
  \ `a` 和 `b` 的值，那么你就只能依赖 `main()` 方法内部的 `catch` 块。在这种情况下，当你看到最终的日志语句时，你可能会疑惑为什么即使\
  \ `b` 的值是 1，你仍然看到了这个异常。\n\n### 注意\n\n你很快就会学习创建和使用你自己的异常，并且你可以将原始异常与你自定义的异常消息结合起来，然后重新抛出它，以提高可读性。\n\
  \n**10.7 你能编译以下代码片段吗？**\n\n```\npackage java2e.chapter10;\nclass TestClass {\n//\
  \ 一些代码\n}\nclass Quiz2 {\nvoid raiseException() {\nSystem.out.println(\"我喜欢抛出一个异常\"\
  );\ntry {\nthrow new TestClass();\n} catch (TestClass e) {\n//一些代码\n}\n}\n}\n```\n\
  \n你会得到一个编译器错误——`无法抛出类型为 TestClass 的异常；异常类型必须是 Throwable 的子类`——如图 10-5 所示。\n\n![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig5_HTML.jpg](img/433474_2_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n\n异常类型必须是 *Throwable* 的子类\n\n要消除前面程序中的错误，你可以遵循编译器的建议。例如，在这种情况下，如果你对前面的代码进行如下更改，编译器就不会报错：\n\
  \n```\nclass TestClass extends Throwable{\n// 其余代码保持不变\n```\n\n## throws 关键字的使用\n\
  \nJava 同时支持 `throw` 和 `throws` 关键字。你已经在演示 5 和 6 中看到了 `throw` 关键字的使用。在使用 `throws`\
  \ 关键字之前，你需要记住以下几点：\n\n*   需要使用 `throws` 关键字来指明一个方法可能抛出的所有异常。否则，你会遇到编译时错误（下一点除外）。\n\
  \n*   上一条规则不适用于 `Error` 或 `RuntimeException` 或它们的任何子类。\n\n*   你必须记住，受检异常必须包含在方法的\
  \ `throws` 列表中。\n\n接下来的演示将详细说明这些要点。\n\n### 注意\n\n问答 10.8 可以帮助你区分受检异常和非受检异常。我建议你在进入那个讨论之前先看一下演示\
  \ 7 和演示 8。\n\n### 演示 7\n\n考虑以下内容：\n\n```\npackage java2e.chapter10;\nclass TestClassException\
  \ extends Throwable {\nString str;\nTestClassException(String str) {\nthis.str =\
  \ str;\n}\npublic String getMessage() {\nreturn str;\n}\n}\nclass DemoClass7 {\n\
  void raiseException() throws TestClassException {\nthrow new TestClassException(\"\
  抛出了一个 TestClassException\");\n}\n}\nclass Demonstration7 {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***演示-7. throws 关键字的使用***\\n\");\nDemoClass7 demo\
  \ = new DemoClass7();\ntry {\ndemo.raiseException();\n} catch (TestClassException\
  \ e) {\nSystem.out.println(e.getMessage());// 抛出了一个 TestClassException\nSystem.out.println(\"\
  以下是堆栈跟踪:\");\ne.printStackTrace();\n}\n}\n}\n```\n\n输出：\n\n```\n***演示-7. throws\
  \ 关键字的使用***\n抛出了一个 TestClassException\n以下是堆栈跟踪:\njava2e.chapter10.TestClassException:\
  \ 抛出了一个 TestClassException at java2e.chapter10.DemoClass7.raiseException(Demonstration7.java:17)at\
  \ java2e.chapter10.Demonstration7.main(Demonstration7.java:27)\n```\n\n现在，请仔细阅读以下几点：\n\
  \n*   你可以看到，在 `DemoClass7` 内部，方法 `raiseException()` 正在抛出一个异常，但我没有在这段代码周围使用 `try-catch`\
