  \n图 11-3\n\n来自另一个配备第八代 Intel® Core™ i3 处理器的双核系统的配置详细信息快照\n\n### 注意\n\n在多线程 Java\
  \ 程序中，你可能会注意到使用了抢占式调度，其中高优先级线程会抢占低优先级线程。但你已经看到，这种行为并不总是确定的。该行为还取决于底层平台。理论上，两个相同优先级的线程不能互相抢占，这在非抢占式环境中可能会产生问题。因此，对于相同优先级的线程，最好基于某些条件（例如，等待\
  \ I/O 操作等）释放控制权，以便每个线程都能运行并完成其任务。\n\n## 不同线程类方法的案例研究\n\n到目前为止，你已经看到了以下方法的使用：\n\n\
  *   `run()`\n\n*   `start()`\n\n*   `setPriority(int number)`\n\n*   `getPriority()`\n\
  \n*   `currentThread()`\n\n*   `getName()`\n\n*   `setName()`\n\n让我们对 `Thread` 类中的更多方法进行案例研究。在下面的演示中，你将看到以下方法的使用：\n\
  \n*   `sleep(long millis)`：这会导致指定的线程休眠。当你想要暂时停止线程的执行时，可以使用它。参数以毫秒为单位传递。此方法可能抛出 `InterruptedException`\
  \ 或 `IllegalArgumentException`（如果你传递负的毫秒值或该值不在 0–999999 范围内）。因此，你需要用 try/catch 块包围此方法。\n\
  \n*   `yield()`：当你希望一个线程（当前正在使用处理器）将其控制权让给另一个线程时，可以使用此方法（尽管调度程序可以忽略此请求）。此方法可用于调试目的或设计并发控制结构。它也有助于重现竞态条件中的错误。\n\
  \n*   `interrupt()`：此方法可用于向线程发送中断信号。\n\n### 演示 4\n\n考虑以下演示和输出，如果你理解了前面的理论，这些内容是不言自明的：\n\
  \n```\npackage java2e.chapter11;\nclass Thread4A extends Thread {\npublic void run()\
  \ {\nfor (int i = 0; i < 5; i++) {\nSystem.out.println(\"Thread4A prints ->\" +\
  \ i);\nif (i == 2) {\nSystem.out.println(\"Going to interrupt the thread.\");\n\
  interrupt();// Interrupts this thread\nSystem.out.println(\"Is Thread4A interrupted?\"\
  +this.interrupted());\n}\n}\nSystem.out.println(\"Exit-Thread4A\");\n}\n}\nclass\
  \ Thread4B extends Thread {\npublic void run(){\nfor (int j = 0; j < 5; j++) {\n\
  System.out.println(\"Thread4B prints ->\" + j);\nif (j == 3) {\ntry {\nsleep(5000);//sleeps\
  \ for 5000 milliseconds\n} catch (InterruptedException e) {\ne.printStackTrace();\n\
  }\n}\n}\nSystem.out.println(\"Exit-Thread4B\");\n}\n}\nclass Thread4C extends Thread\
  \ {\npublic void run() {\nfor (int k = 0; k < 5; k++) {\nSystem.out.println(\"Thread4C\
  \ prints ->\" + k);\nif(k==4) {\nyield();\n}\n}\nSystem.out.println(\"Exit-Thread4C\"\
  );\n}\n}\nclass Demonstration4 {\npublic static void main(String[] args) throws\
  \ InterruptedException {\nSystem.out.println(\"***Demonstration-4.Exploring multi-threading\
