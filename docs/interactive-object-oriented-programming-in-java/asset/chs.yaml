  4 rows in set (0.00 sec)\nmysql>\n```\n\n演示 1\n\n我已经说过，演示 1 展示了如何连接到 MySQL 数据库以及如何从数据库的表中检索记录。如前所述，我创建了一个名为\
  \ `test` 的数据库，然后在该数据库中创建了一个名为 `employee` 的表。目前，`employee` 表包含三条记录，这些记录也在本演示之前展示过。要理解这个示例，你可能需要重新回顾前面介绍的重要类、接口和方法的描述。\n\
  \n\n\n```\npackage java2e.chapter13;\nimport java.sql.*;\nclass Demonstration1 {\n\
  public static void main(String[] args) throws SQLException {\nSystem.out.println(\"\
  ***演示-1. 连接到 MySql 服务器。***\");\nConnection connectionOb = null;\ntry {\n// 针对 MySql\
  \ 数据库\nClass.forName(\"com.mysql.cj.jdbc.Driver\").newInstance();\nconnectionOb\
  \ = DriverManager.getConnection(\"jdbc:mysql://localhost:3306/test\", \"root\",\
  \ \"admin\");\nStatement statementOb = connectionOb.createStatement();\nResultSet\
  \ queryResult = statementOb.executeQuery(\"select * from Employee\");\nSystem.out.println(\"\
