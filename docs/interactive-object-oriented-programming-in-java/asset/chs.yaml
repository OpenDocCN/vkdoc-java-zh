  \ java.lang.ClassCastException: java.lang.String cannot be cast to java.lang.Integer\n\
  at java2e.chapter12.Demonstration3.main(Demonstration3.java:21)\n```\n\n这是因为第三个元素（即\
  \ `ArrayList` 中的 `myList [2]`）不是整数（而是一个字符串）。在编译期间，你没有遇到任何问题，因为它被存储为对象。因此，你可以看到类型安全是非泛型程序的一个主要问题。\n\
  \n\n\n### 演示 4\n\n本示例的一个显著特点是你可以看到 Java 8 引入的 lambda 表达式的使用。由于它们并非本程序的必需部分，我将其放在了注释块中。我之所以包含它，是因为在类似的示例中，你可能会注意到\
  \ lambda 表达式在不同地方的使用。\n\n让我们快速回顾一下什么是 lambda 表达式以及它为何重要。使用 lambda 表达式的主要目标之一是，你可以将其视为一个不必属于某个类的函数。以下是\
  \ lambda 表达式的示例代码：\n\n```\n(int a, int b) -> {return (a + b);}\n```\n\n这是一个带有两个参数和一个返回语句的\
  \ lambda 表达式。也可以使用不带参数的 lambda 表达式。lambda 表达式也可以没有返回语句。例如，下面是一个不接受任何参数且没有任何返回语句的\
  \ lambda 表达式：\n\n```\n() -> System.out.println(\"不带返回语句的 Lambda 表达式\");\n```\n\n\
  使用 lambda 表达式，你可以使代码紧凑且易于阅读。Java lambda 表达式被视为一个函数，因此编译器不会为其创建 `.class` 文件。\n\n\
  现在，考虑演示 4 中更新后的程序，该程序使用了泛型编程。关键更改以粗体显示。\n\n```\npackage java2e.chapter12;\nimport\
