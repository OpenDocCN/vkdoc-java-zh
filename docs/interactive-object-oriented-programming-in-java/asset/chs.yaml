  \ `setInt()` 调用分别指定了第一个和第三个占位符；`setString()` 指定了第二个占位符；`setDouble()` 指定了第四个占位符。\n\
  \n最后，你将在 `PreparedStatement` 对象上调用 `executeUpdate()` 方法，如下所示：\n\n```\npreparedStatementOb.executeUpdate();\n\
  ```\n\n现在，请仔细阅读以下演示及其对应的输出：\n\n```\npackage java2e.chapter13;\nimport java.sql.*;\n\
