  \n\n\n*   具体实现者是`OnState`类和`OffState`类。它们根据各自的需求实现了接口方法`moveState()`和`hardPressed()`。\n\
  \n*   抽象类`ElectronicGoods`持有一个对实现者`State`的引用。\n\n*   抽象方法将实现委托给实现者对象。例如，请注意`hardButtonPressed()`实际上是`state.hardPressed()`的简写形式，其中`state`是实现者对象。\n\
