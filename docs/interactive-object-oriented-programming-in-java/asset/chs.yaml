  **2.7 我可以说一个类是一种自定义类型吗？**


  通常，答案是肯定的。但同时，你需要记住 Java 也有许多内置类（例如，`Array`、`String` 等）。在我们之前的演示中，你已经看到了我们自己类的使用，这些类就是自定义类。


  **2.8 你能详细解释一下引用的概念吗？**


  假设你有一个像下面这样的简单类：


  ```

  class ClassA

  {

  //一个实例变量

  int a;

  //一个实例方法，例如：

  void someMethod()

  {

  //一些代码

  }

  }

  ```


  当你编写 `ClassA obA=new ClassA();` 时，会在内存中创建一个 `ClassA` 的实例，它会创建一个指向该实例的引用，并将结果存储在
  `obA` 变量中。因此，你可以说内存中的对象由一个称为引用的标识符来引用。


  在 Java 中，更广泛地说，你将使用两种不同类型的变量——一种是基本类型，另一种是对象引用。它类似于指针或地址，但你不知道（也不关心）你的引用变量内部是什么。


  简单来说，引用提供了一种访问对象的方式。当你编写


  ```

  ClassA obA;

  ```


  `obA` 指向 `null`。但是当你编写


  ```

  ClassA obA=new ClassA();

  ```


  `obA` 被初始化为一个 `ClassA` 的对象，并且你说 `obA` 是一个指向 `ClassA` 对象的引用。




  然后，你使用点运算符在引用变量上调用目标类中的内容（例如，方法或变量），如下所示：


  ```

  obA.someMethod();

  ```


  需要注意的是，你*可以*在没有引用的情况下调用方法。当你编写如下代码时，就可以这样做：


  ```

  new classA(). someMethod(); //不推荐的做法

  ```


  但正如单行注释中所提到的，目前这对你来说并不是一种推荐的做法。


  当你学习内存管理时，你会了解到所有对象都驻留在一个称为堆的地方，并且有一个垃圾回收器在该堆上工作。对此进行详细讨论目前来说会很复杂。在这个阶段，你可以简单地假设下图所示的情况，以便更好地理解对象引用变量。请注意每一步中的粗体部分。


  **步骤 1：**


  ```

  ClassA obA= new ClassA();

  ```


  JVM 为类型为 `ClassA` 的引用变量 `obA` 分配空间。


  ![../images/433474_2_En_2_Chapter/433474_2_En_2_Figa_HTML.jpg](img/433474_2_En_2_Figa_HTML.jpg)


  **步骤 2：**


  ```

  ClassA obA= new ClassA();

  ```


  JVM 为类型为 `ClassA` 的对象分配空间。假设它类似于下图所示。


  ![../images/433474_2_En_2_Chapter/433474_2_En_2_Figb_HTML.jpg](img/433474_2_En_2_Figb_HTML.jpg)


  **步骤 3：**


  ```

  ClassA obA = new ClassA();

  ```


  JVM 将两者连接起来（注意粗体显示的 `=` 运算符）。


  ![../images/433474_2_En_2_Chapter/433474_2_En_2_Figc_HTML.jpg](img/433474_2_En_2_Figc_HTML.jpg)


  **2.9 这些引用类似于 C/C++ 的指针。这种说法正确吗？**


  不正确。Java 与 C/C++ 不同。引用看起来可能是一种特殊的指针。但你必须注意两者之间的关键区别。使用指针，你可以指向任意地址（基本上，它是内存中的一个数字槽位）。因此，使用指针时，你很可能指向一个无效地址，然后在运行时可能会遇到意外结果。引用变量只能指向有效地址或
  null。此外，你不能对引用变量进行算术运算。如何解释“指向”这个词也很重要。例如，一些开发者更喜欢在类似语境中使用“引用”而不是“指向”。


  **2.10 我可以有多个引用变量指向内存中的同一个对象吗？**


  可以。以下类型的声明是完全合法的：


  ```

  ConsEx2 ob1 = new ConsEx2(25);

  ConsEx2 ob2=ob1;

  ```


  ### 演示 3


  在下面的示例中，我创建了同一个类的两个对象，但实例变量（`i`）被初始化为不同的值。为了完成这项工作，我使用了一个可以接受一个整数参数的参数化构造函数。


  ```

  package java2e.chapter2;

  class ClassEx3

  {

  public int i;

  public ClassEx3(int i)

  {

  this.i = i;

  }

  }

  class Demonstration3 {

  public static void main(String[] args) {

  System.out.println("***演示-3.一个包含 2 个对象的类演示***");

  ClassEx3 obA = new ClassEx3(10);

  ClassEx3 obB = new ClassEx3(20);

  System.out.println("obA.i =" + obA.i);

  System.out.println("obB.i =" + obB.i);

  }

  }

  ```


  输出：


  ```

  ***演示-3.一个包含 2 个对象的类演示***

  obA.i =10

  obB.i =20

  ```


  **2.11 this 关键字的用途是什么？**


  有时你需要引用当前对象，为此，你可以使用 `this` 关键字。在前面的示例中，除了使用 `this` 关键字，你也可以编写如下代码来实现相同的结果：


  ```

  class ClassEx3 {

  int i;// 实例变量

  ClassEx3(int myInteger)// myInteger 是一个局部变量

  {

  i = myInteger;

  }

  }

  ```


  根据 Java 的运算符优先级表，赋值运算符（`=`）具有从右到左的结合性。（结合性指明了运算符的执行方向。）因此，你熟悉像 **a=25;** 这样的代码，其中你将
  25 赋值给 `a`。但你熟悉像 **25=a;** 这样的代码吗？不熟悉。编译器会报错。


  在前面的示例中，**myInteger** 是你的*局部变量*（出现在方法、块或构造函数内部），而 **i** 是你的*实例变量*（在类内部但在方法、块或构造函数外部声明）。


  因此，如果你使用 `i` 而不是 `myInteger`，你需要告诉编译器你的赋值方向。不能混淆“哪个值赋给了哪里？”这里，你是将局部变量的值赋给实例变量，编译器应该清楚地理解你的意图。通过语句
  **this.i=i**`;`，编译器清楚地理解实例变量 `i` 应该用局部变量 `i` 的值来初始化*。*


  另外，考虑一下。假设在前面的场景中，你错误地编写了类似 **i=i;** 的代码。从编译器的角度来看，这会造成混淆，因为它会认为你在处理两个相同的局部变量。（尽管你的意图不同，你本意是左边的
  `i` 是字段，另一个是方法参数。）现在，如果你为 `ClassA` 创建一个对象 `obA`，尝试通过以下代码查看 `obA.i` 的值：


  ```

  ClassEx3 obA = new ClassEx3(20);

  System.out.println("obA.i =" + obA.i);

  ```


  你将在输出中得到 `obA.i=0`（整数的默认值）。因此，你的实例变量无法获得你预期的值 20。Eclipse IDE 在这种情况下也会发出警告。参见图 2-1*。*


  ![../images/433474_2_En_2_Chapter/433474_2_En_2_Fig1_HTML.jpg](img/433474_2_En_2_Fig1_HTML.jpg)


  图 2-1


  ClassEx3 构造函数体中语句 i=i; 的警告信息


  ### 要点牢记


  如果你的局部变量与实例变量同名，局部变量将隐藏实例变量。在这种场景下，关键字 `this` 有助于解决命名空间冲突，因为它有助于识别哪个是局部变量（方法参数），哪个是实例变量（字段）。供你参考，在问答
  2.11 的代码段中，局部变量和实例变量已用注释行标记。




  ### 演示 4


  在下面的演示中，你将看到两个不同构造器的使用。用户定义的无参构造器始终将实例变量 `i` 初始化为值 5，而带参构造器则可以将实例变量初始化为你提供的任意整数值。


  ```

  package java2e.chapter2;

  //构造器重载示例

  class ClassEx4 {

  int i;

  ClassEx4() {

  this.i = 5;

  }

  public ClassEx4(int i) {

  this.i = i;

  }

  }

  class Demonstration4 {

  public static void main(String[] args) {

  System.out.println("***演示-4\. 一个包含两个不同构造器的简单类 ***");

  System.out.println("*** 这也是构造器重载的一个示例 ***");

  ClassEx4 obA = new ClassEx4();

  ClassEx4 obB = new ClassEx4(75);

  System.out.println("obA.i =" + obA.i);

  System.out.println("obB.i =" + obB.i);

  }

  }

  ```


  输出：


  ```

  ***演示-4\. 一个包含两个不同构造器的简单类 ***

  *** 这也是构造器重载的一个示例 ***

  obA.i =5

  obB.i =75

  ```


  补充说明：


  *   之前，你看到同一个构造器被用来创建不同的对象，这些对象被初始化为不同的值。在这个例子中，使用了不同的构造器来创建不同的对象，这些对象也被初始化为不同的值。


  *   构造器的名称与其类名相同。注意，类 `classEx4` 有多个构造器。因此，这是一个**构造器重载**的例子。稍后，你将详细了解方法重载的概念，并熟悉这样一个事实：在一个类中，你可以有多个同名但参数列表不同的方法。（换句话说，你可以简单地说方法签名不同。）例如，`aMethod(int,double)`
  不同于 `aMethod(int)` 或 `aMethod(int,int)` 或 `aMethod(double,int)`。也就是说，方法可能因参数数量、参数类型或参数顺序的不同而有所变化。


  *   在 Java 中，我们可以使用 `this (5);` 来代替 `this.i=5;`，但其他语言可能不支持这种结构。


  ### 演示 5


  一个类可以包含变量、方法，或者两者都包含。那么，让我们考虑另一个简单的程序，其中你有一个只包含一个方法的类。这个方法用于接收两个整数输入，并返回这两个整数的和。


  ```

  package java2e.chapter2;

  class ClassEx5 {

  public int sum(int x, int y) {

  return x + y;

  }

  }

  class Demonstration5 {

