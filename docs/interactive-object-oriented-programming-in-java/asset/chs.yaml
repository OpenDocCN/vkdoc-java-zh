  Ivan\" \");\nSystem.out.println(\"删除 Ivan 的记录后，以下是更新后的表格。**\");\nqueryResult = statementOb.executeQuery(\"\
  select * from Employee\");\nSystem.out.println(\" EmployeeId\\t\" + \"EmployeeName\\\
  t\" + \"Age\\t\" + \"Salary\");\nSystem.out.println(\"------------------------------------------\"\
