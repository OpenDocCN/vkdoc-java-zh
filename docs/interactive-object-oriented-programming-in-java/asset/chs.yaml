  Thread4B prints ->0\nThread4C prints ->0\nThread4C prints ->1\nThread4C prints ->2\n\
  Thread4A prints ->0\nThread4A prints ->1\nIs Thread4A interrupted now?false\nThread4A\
  \ prints ->2\nGoing to interrupt the thread\nThread4C prints ->3\nThread4B prints\
  \ ->1\nThread4B prints ->2\nThread4B prints ->3\nThread4C prints ->4\nIs Thread4A\
  \ interrupted?true\nThread4A prints ->3\nThread4A prints ->4\nExit-Thread4A\nExit-Thread4C\n\
  Thread4B prints ->4\nExit-Thread4B\nExit-main()\n```\n\n\n\n### 要点提示\n\n还有另一种名为\
  \ `isAlive()` 的方法，可用于检查线程是处于活动状态还是已终止。例如，可以在 `main()` 中使用以下代码来验证 `Thread4B` 对象是否处于活动状态：\n\
  \n```\n//Testing whether Thread4B object is alive or not.\nSystem.out.println(\"\
  \ Thread 4B is alive? \"+ thread4B.isAlive());\n```\n\n## 同步\n\n有时多个线程需要访问某些共享资源。控制此类情况颇具技巧性；例如，考虑这样一种情况：一个线程正试图从文件中读取数据，而另一个线程仍在同一文件中写入或更新数据。如果无法有效控制这种情况，可能会得到令人意外的结果。同步的概念在此类情况下非常有用。Java\
  \ 可以通过同步方法和语句帮助你控制这种情况。\n\n### 同步方法的使用\n\n让我们从同步方法开始。为了理解同步方法的强大之处，我们先从一个未实现该概念的程序开始。在下面的演示中，`MyClass5A`\
  \ 是一个简单的类，其中包含一个 `display()` 方法。你可以像下面这样在方法前加上关键字 `synchronized`，使其成为同步方法：\n\n```\n\
  synchronized void display(){\n//some code\n}\n```\n\n因为我们是从非同步版本开始的，所以在接下来的演示中，我已将代码的同步部分注释掉了。\n\
  \n假设在 `display()` 内部有一些共享资源。为简单起见，我放入了一些简单的语句来指示线程的进入和退出。为了精确观察效果，我还在方法体内放入了一个简单的\
  \ `sleep` 语句。它可以帮助你将执行切换到另一个线程。\n\n有一个线程类 `Thread5B`，其构造函数如下：\n\n```\npublic Thread5B(MyClass5A\
  \ myObject, String name) {\nsuper(name);\nthis.myClass5AObject = myObject;\n}\n\
  ```\n\n因此，要实例化 `Thread5B` 类，你可以传入一个 `MyClass5A` 对象和一个字符串作为参数。在下面的程序中，我创建了该类的两个实例，为了清晰区分它们，我将字符串参数分别设为\
  \ `Thread5B-1` 和 `Thread-5B-2`。\n\n一旦运行该程序的非同步版本，你可能会注意到以下输出：\n\n```\nThread5B-1\
  \ has entered and working in the shared location.\nThread5B-2 has entered and working\
  \ in the shared location.\nThread5B-1 exits.\nThread5B-2 exits.\n```\n\n输出表明 `Thread5B-1`\
  \ 首先进入了共享位置。但在它完成执行之前，`Thread5B-2` 也进入了共享位置。\n\n但是，如果一个线程正在共享位置中工作，你可能希望限制任何其他线程进入该位置。因此，这次你取消注释\
  \ `display()` 的同步版本，并注释掉其非同步版本。现在，如果你运行该程序，你会看到通过同步方法实现了目标。\n\n### 演示 5\n\n以下是完整代码：\n\
  \n```\npackage java2e.chapter11;\nclass MyClass5A {\n//Synchronized version\n//synchronized\
  \ void display() {\n//Non-synchronized version\nvoid display() {\nSystem.out.print(Thread.currentThread().getName()\
  \ + \" has entered and working in the shared location. \\n\");\ntry {\nThread.sleep(1000);\n\
  } catch (InterruptedException e) {\ne.printStackTrace();\n}\nSystem.out.print(Thread.currentThread().getName()\
  \ + \" exits.\\n\");\n}\n}\nclass Thread5B extends Thread {\nMyClass5A myClass5AObject;\n\
  public Thread5B(MyClass5A myObject, String name) {\nsuper(name);\nthis.myClass5AObject\
  \ = myObject;\n}\n@Override\npublic void run() {\nmyClass5AObject.display();\n}\n\
  }\nclass Demonstration5 {\npublic static void main(String[] args) throws InterruptedException\
  \ {\nSystem.out.println(\"***Demonstration-5.Exploring multi-threading with synchronized\
  \ method.***\");\nMyClass5A myObject = new MyClass5A();\nThread5B ob1 = new Thread5B(myObject,\
  \ \"Thread5B-1\");\nThread5B ob2 = new Thread5B(myObject, \"Thread5B-2\");\nob1.start();\n\
  ob2.start();\n}\n}\n```\n\n不使用同步方法时的输出：\n\n```\n***Demonstration-5.Exploring multi-threading\
  \ with( and without) synchronized method.***\nThread5B-1 has entered and working\
  \ in the shared location.\nThread5B-2 has entered and working in the shared location.\n\
  Thread5B-1 exits.\nThread5B-2 exits.\n```\n\n使用同步方法时的输出：\n\n```\n***Demonstration-5.Exploring\
  \ multi-threading with( and without) synchronized method.***\nThread5B-1 has entered\
  \ and working in the shared location.\nThread5B-1 exits.\nThread5B-2 has entered\
  \ and working in the shared location.\nThread5B-2 exits.\n```\n\n### 同步块的使用\n\n\
  在某些情况下，同步方法可能无法满足你的需求；例如，假设有一个类使用了第三方代码，而你无法直接访问其代码库。你注意到在多线程环境中，该类中有一个方法（非同步方法）可能被多个线程同时使用。\n\
  \n为了处理此类场景，Java 提供了同步块。如果你希望对某个类的对象进行同步访问，可以使用它。\n\n以下是同步块的一般格式：\n\n```\nsynchronized\
  \ (theObjectReference) {\n//Some code\n}\n```\n\n### 演示 6\n\n以下是一个同步块的示例：\n\n```\n\
  package java2e.chapter11;\nclass MyClass6A {\n//synchronized void display() {\n\
  void display() {\nSystem.out.print(Thread.currentThread().getName() + \" has entered\
  \ and working in the shared location. \\n\");\ntry {\nThread.sleep(1000);\n} catch\
  \ (InterruptedException e) {\ne.printStackTrace();\n}\nSystem.out.print(Thread.currentThread().getName()\
  \ + \" exits.\\n\");\n}\n}\nclass Thread6B extends Thread {\nMyClass6A myClass6AObject;\n\
  public Thread6B(MyClass6A myObject, String name) {\nsuper(name);\nthis.myClass6AObject\
  \ = myObject;\n}\n@Override\npublic void run() {\nsynchronized (myClass6AObject)\
  \ {\nmyClass6AObject.display();\n}\n}\n}\nclass Demonstration6 {\npublic static\
  \ void main(String[] args) throws InterruptedException {\nSystem.out.println(\"\
  ***Demonstration-6.Exploring multi-threading with synchronized statements.***\"\
  );\nMyClass6A myObject = new MyClass6A();\nThread6B thread1 = new Thread6B(myObject,\
  \ \"Thread6B-1\");\nThread6B thread2 = new Thread6B(myObject, \"Thread6B-2\");\n\
  thread1.start();\nthread2.start();\n}\n}\n```\n\n输出：\n\n```\n***Demonstration-6.Exploring\
  \ multi-threading with synchronized statements.***\nThread6B-1 has entered and working\
  \ in the shared location.\nThread6B-1 exits.\nThread6B-2 has entered and working\
  \ in the shared location.\nThread6B-2 exits.\n```\n\n这一次，`display()` 方法不是同步的，但我在\
  \ `Thread6B` 的 `run()` 方法中使用了同步块，并且该线程调用了 `MyClass6A` 的 `display()` 方法。你会注意到，多个线程无法同时进入共享位置。相反，每个线程都会等待前一个线程完成其在共享位置中的工作。\n\
  \n## 死锁\n\n死锁是一种情况或状态，其中至少有两个进程（或线程）在相互等待对方完成（或释放控制），以便各自能够完成其任务。这可能导致两者都无法启动（并都进入挂起状态）。你可能经常听到这些现实生活中的例子：\n\
  \n*   *没有经验就找不到工作；没有工作就得不到经验。*\n\n或者，\n\n*   *两个亲密朋友吵架后，都期望对方先道歉。*\n\n### 注意\n\n\
  没有同步，你可能会注意到意外结果（例如，数据损坏），但同步使用不当，则可能遇到死锁。\n\n\n\n### 死锁的类型\n\n让我们快速回顾一下操作系统理论。死锁有不同的类型，例如：\n\
  \n*   **资源死锁**：假设有两个进程 P1 和 P2，分别持有资源 R1 和 R2。P1 正在请求资源 R2，而 P2 正在请求资源 R1，以完成它们的工作。操作系统通常关注这种类型的死锁。\n\
  \n*   **同步死锁**：假设进程 P1 正在等待执行动作 a1，但必须等到 P2 完成特定动作 a2 之后；而 P2 正在等待完成动作 a2，但必须等到\
  \ P1 完成 a1 之后。\n\n*   **通信死锁**：与前面的场景类似。你可以将动作/资源的概念替换为消息；即，两个进程正在等待接收彼此的消息才能继续执行。\n\
  \n### 演示 7\n\n在本章中，你将重点关注多线程环境。因此，我将讨论在你的 Java 应用程序中因拥有多个线程而可能导致的死锁。\n\n```\npackage\
  \ java2e.chapter11;\nclass SharedResource1 {\nstatic synchronized void startingPart()\
  \ throws InterruptedException {\nSystem.out.println(Thread.currentThread().getName()\
  \ + \": enters starting part-SharedResource1.\");\nThread.sleep(100);\nSystem.out.println(Thread.currentThread().getName()\
  \ + \": Waiting to get endPart of SharedResource2.\");\nSharedResource2.endPart();\n\
  System.out.println(Thread.currentThread().getName() + \": Exits starting part-SharedResource1\"\
  );\n}\nstatic synchronized void endPart() throws InterruptedException {\nSystem.out.println(Thread.currentThread().getName()\
  \ + \": Exits SharedResource1.endingPart .\");\n}\n}\nclass SharedResource2 {\n\
  static synchronized void startingPart() throws InterruptedException {\nSystem.out.println(Thread.currentThread().getName()\
  \ + \": enters starting part of SharedResource2.\");\nThread.sleep(100);\nSystem.out.println(Thread.currentThread().getName()\
  \ + \": Waiting to get endPart-SharedResource1.\");\nSharedResource1.endPart();\n\
  System.out.println(Thread.currentThread().getName() + \": Exits starting part of\
  \ SharedResource2.\");\n}\nstatic synchronized void endPart() throws InterruptedException\
  \ {\nSystem.out.println(Thread.currentThread().getName() + \": Exits end part of\
  \ SharedResource2.\");\n}\n}\nclass First extends Thread {\npublic First(String\
  \ name) {\nsuper(name);\n}\npublic void run() {\ntry {\nSharedResource1.startingPart();\n\
  } catch (InterruptedException e) {\ne.printStackTrace();\n}\n}\n}\nclass Second\
  \ extends Thread {\npublic Second(String name) {\nsuper(name);\n}\npublic void run()\
  \ {\ntry {\nSharedResource2.startingPart();\n} catch (InterruptedException e) {\n\
  e.printStackTrace();\n}\n}\n}\nclass Deadlock {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"***Demonstration- Incorrect design leads to deadlock.***\\\
  n\");\n// An instance of ThreadOne\nFirst first = new First(\"FirstThread\");\n\
  // An instance of Threadtwo\nSecond second = new Second(\"SecondThread\");\nfirst.start();\n\
  second.start();\n}\n}\n```\n\n输出：\n\n```\n***Demonstration- Incorrect design leads\
  \ to deadlock.***\nFirstThread: enters starting part-SharedResource1.\nSecondThread:\
  \ enters starting part of SharedResource2.\nSecondThread: Waiting to get endPart-SharedResource1.\n\
  FirstThread: Waiting to get endPart of SharedResource2.\n```\n\n### 检测系统中的死锁\n\n\
  本书中的示例均在 Windows 10 系统上测试。在这里，你可以找到应用程序的进程 ID，并使用 `jstack` 命令来调查长时间运行的进程或死锁。例如，当你发现程序没有按预期终止时，可以找到应用程序的进程\
