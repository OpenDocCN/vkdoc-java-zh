- "# 10. 异常管理\n\n当您为应用程序编写代码时，您期望它能毫无问题地执行。因此，管理和检测程序中所有可能的错误非常重要。即便如此，有时在程序执行过程中也可能会遇到意外情况。这些意外可能由各种原因引起，例如程序中的一些粗心错误、逻辑实现不正确、程序代码路径中的漏洞等。然而，许多故障也超出了程序员的控制范围。程序员通常将这些不期望的情况称为*异常*。在编写任何应用程序时，处理这些异常至关重要。\n\
  \n## 错误类型\n\n通常，您可以将程序中的错误（或失误）大致分为两类，如下所示：\n\n*   编译时错误\n\n*   运行时错误\n\n编译时错误由\
  \ Java 编译器检测，并且易于发现。Java 编译器就像您的朋友一样，帮助找出错误的详细信息。例如，它可能会指出行号（遇到错误的位置）并显示错误的简要描述。一旦您纠正了错误，就需要重新编译以检查更新后的程序是否准备好执行。有时，您可能需要修复多个错误，因此可能需要多次重新编译。如果\
  \ Java 编译器在程序中发现了此类错误，它将不会生成类文件。\n\n让我们考虑以下程序中的一些拼写错误：\n\n```\npackage java2e.chapter10;\n\
  class IncorrectClass //{\nvoid SampleMethod() {\nSystem.out.println(\"Semicolon\
  \ missing\") //error\n}\n}\n```\n\n在这里，Java 编译器将显示错误消息。在 Eclipse 中，您可以看到错误描述和相应的行号，如图\
  \ 10-1 所示。\n\n![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig1_HTML.jpg](img/433474_2_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n\nEclipse IDE 中的两个拼写错误\n\n因此，您可以看到在类定义后遗漏了括号 `{`，并且忘记在第 5 行末尾添加分号。\n\n\
  这种类型的错误很常见，但有时在最初阶段很难用肉眼发现。因此，在这些情况下，Java 编译器会为您提供帮助。\n\n另一方面，运行时错误则具有挑战性。在这种情况下，您会从编译器那里得到绿色信号，成功编译后您会得到\
  \ `.class` 文件，但您的程序仍然会产生错误结果，并可能提前终止。以下是一些可能导致运行时错误的操作示例：\n\n*   整数除以 0\n\n*   尝试访问数组边界之外的数组元素\n\
  \n*   使用空对象调用方法\n\n*   尝试进行无效转换，例如尝试将无效字符串转换为整数\n\n在某些地方，我特意使用了术语*失误*而不是*错误*。原因稍后揭晓。\n\
  \n\n\n## 异常的定义\n\n你可以将异常定义为一种中断程序正常执行或指令流的事件。\n\n当异常情况出现时，会创建一个异常对象，并将其抛出到创建该异常的方法中。该方法可能会处理异常，也可能不会处理。如果它无法处理该异常，就会将责任传递给另一个方法。（类似于我们的日常生活，当情况超出我们的控制时，我们会向他人寻求建议。）如果没有方法负责处理某个特定异常，就会出现一个错误对话框（表示未处理的异常），并且程序的执行会停止。\n\
  \n### 要点\n\n异常处理机制处理的是运行时错误，如果这些错误没有得到妥善处理，应用程序将产生不期望的输出，并且可能会提前终止。因此，你应该尽量编写能够以优雅方式检测并处理意外情况，从而防止应用程序提前终止的应用程序。\n\
  \n### 演示 1\n\n让我们从一个简单的例子开始。以下程序编译成功，但在运行时会引发异常，因为在该程序中，除数（`b`）在除法运算之前变成了 0。该应用程序产生了一个运行时错误，因为在这种情况下，你试图用\
  \ 100 除以 0。\n\n```\npackage java2e.chapter10;\nclass Demonstration1 {\npublic static\
  \ void main(String[] args) {\nSystem.out.println(\"***演示-1.探索异常.***\");\nint a =\
  \ 100, b = 2, result;\nb -= 2;//b 变为 0\nresult = a / b;\nSystem.out.println(\"a/b\
  \ 的结果是：\" + result);\n}\n}\n```\n\n输出：\n\n```\n***演示-1.探索异常.***\nException in thread\
  \ \"main\" java.lang.ArithmeticException: / by zero\nat java2e.chapter10.Demonstration1.main(Demonstration1.java:9)\n\
  ```\n\n### 异常处理机制的关键点\n\n在进一步深入之前，我将强调异常处理机制的一些关键点。你可能需要反复回顾这些要点*。建议你在完成本章后，再回到这里复习你对\
  \ Java 异常处理的理解。\n\n*   当运行时错误发生时，会创建一个异常对象。因此，Java 异常本质上是一个描述错误情况的对象。\n\n*   应用程序中的任何方法都可能在应用程序运行时引发意外情况。如果发生这种情况，用编程术语来说，就是该方法抛出了一个异常。\n\
  \n*   你使用以下关键字来处理 Java 异常：`try`、`catch`、`throw`、`throws` 和 `finally`。\n\n*   你尝试使用\
  \ `try`-`catch` 块来防范异常。可能抛出异常的代码被放置在 `try` 块内，而异常情况则在 `catch` 块内处理。但是，如果 `try` 块中没有引发异常，则\
  \ `catch` 块会被完全跳过。\n\n*   你可以将多个 `catch` 块与一个 `try` 块关联。当某个特定的 `catch` 块处理了突发意外（异常）时，我们就说该\
  \ `catch` 块捕获了异常。\n\n*   `finally` 块中的代码必须执行。`finally` 块通常放在 `try` 块或 `try`-`catch`\
  \ 块之后。该块用于执行一些清理工作，以便应用程序能够优雅地关闭。例如，如果文件已经打开，你应该在此处关闭它；或者如果你已经分配了一些资源，这些资源应该在此块内释放。\n\
  \n*   当 `try` 块内引发异常时，控制权会跳转到相应的 `catch` 或 `finally` 块。`try` 块的剩余部分将不会执行。\n\n* \
  \  异常遵循继承层次结构。因此，记住图 10-2 所示的层次结构非常重要。\n\n![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig2_HTML.jpg](img/433474_2_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2\n\n异常层次结构\n\n*   你可以看到，`Exception` 类和 `Error` 类都是 `Throwable` 类的子类，而 `Throwable`\
  \ 类又派生自 `Object`（位于 `java.lang` 包中）。至于其他异常，我指的是像 `IOException`（Java 中已定义）、我们自己的自定义异常类（Java\
  \ 中未定义）等类。所以，你可以简单地说，在 Java 中，`Throwable` 类是所有错误和异常的最终超类。\n\n*   异常大致分为两种类型：**已检查异常**\
  \ 和 **未检查异常**。运行时异常类（`RuntimeException` 类及其子类）和错误类（`Error` 类及其子类）属于未检查异常的范畴，其余剩下的则称为已检查异常。稍后你将看到对每个类别的详细讨论，问答\
  \ 10.8 将总结这些细节。\n\n*   本章主要关注运行时异常。错误通常是由一些灾难性故障引起的，例如 JVM 内存不足、栈溢出等。你对此几乎无能为力。Java\
  \ 运行时环境本身需要处理这些严重情况。\n\n*   当你创建自定义异常类时，通常你会继承 `Exception` 类。但这并非硬性规定。因此，在演示 7 中，你会看到一个自定义异常类继承自\
  \ `Throwable` 类，而在演示 8 中，你会注意到一个自定义异常类继承自 `RuntimeException` 类。\n\n*   你应该按照从最具体到最通用的顺序排列\
  \ `catch` 块。否则，你将遇到编译时错误。例如，假设你将一个可以处理父类异常的 `catch` 块（比如 `catch block1`）放在了一个只能处理派生类异常的\
  \ `catch` 块（比如 `catch block2`）之前。从编译器的角度来看，这是不可达代码的一个例子，因为在这种情况下，`catch block1`\
  \ 始终能够处理 `catch block2` 可以处理的异常。因此，控制权根本不需要到达 `catch block2`。你将在接下来的一个示例中研究这种情况。\n\
  \n*   你可以使用以下任意组合：`try`-`catch`、`try`-`catch`-`finally` 或 `try`-`finally`。\n\n*\
  \   Java 运行时系统可以生成异常。同时，你也可以创建自己的异常类并抛出自己的异常。\n\n*   如果你不处理异常，Java 运行时系统的默认处理程序将代你处理，程序可能会提前终止。\n\
  \n### 要点\n\n*   在 Java 中，`Throwable` 类是所有错误和异常的最终超类。\n\n*   在异常处理机制中，Java 和 C# 之间存在一个关键区别。C#\
  \ 中没有 `throws` 关键字的概念。这是一个热议的话题。\n\n\n\n### 演示 2\n\n现在，让我们看看如何处理上一个示例中遇到的异常。\n\n\
  ```\npackage java2e.chapter10;\npublic class Demonstration2 {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"***Demonstration-2.探索异常-修改了 Demonstration1.***\"\
  );\nint a = 100, b = 2, result;\nb -= 2;// b 变为 0\ntry {\nresult = a / b;\nSystem.out.println(\"\
  \ 因此，a/b 的结果是：\" + result);\n} catch (Exception ex) {\nSystem.out.println(\"遇到异常\
  \ \" + ex.getMessage());\nSystem.out.print(\"以下是堆栈跟踪：\");\nex.printStackTrace();\n\
  } finally {\nSystem.out.println(\"我在 finally 块中。你无法跳过我！\");\n}\n}\n}\n```\n\n输出：\n\
