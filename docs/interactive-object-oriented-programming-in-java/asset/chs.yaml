  \ 不是 `Bus` 的超类型。\n\n### 无界通配符\n\n通配符可以是无界的。当你只使用通配符字符（`?`）时，你可以使用无界通配符的概念。让我们将演示\
  \ 6 中的 `constructAllVehicles()` 方法修改如下：\n\n```\n//使用无界通配符\npublic static void constructAllVehicles(List\
  \ vehicleList) {\nSystem.out.println(\"\\n 这是为您准备的车辆列表：\");\nvehicleList.forEach((anyVehicle)\
  \ -> ((Vehicle) anyVehicle).constructBody());//Ok\n}\n```\n\n这里，`List<?>` 用于表示未知类型的列表。你也可以取消注释演示\
