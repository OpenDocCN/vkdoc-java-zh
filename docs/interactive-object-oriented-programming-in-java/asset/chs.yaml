  方法 show 返回 double 值：100.5\nd2 中的值是：200.5\n线程 \"main\" 中出现异常 java.lang.ClassCastException:\
  \ java.lang.Double 无法转换为 java.lang.Integer\nat java2e.chapter12.Demonstration10.main(Demonstration10.java:23)\n\
  ```\n\n注意\nJLS 11 指出：“允许使用原始类型仅作为对遗留代码兼容性的让步。强烈不鼓励在 Java 编程语言引入泛型之后编写的代码中使用原始类型。未来版本的\
  \ Java 编程语言可能会禁止使用原始类型。”\n\n使用菱形运算符进行类型推断\n\n你可以使用一对尖括号（称为菱形运算符）来替换调用泛型类构造函数所需的类型参数，只要编译器能够正确推断即可。例如，如果你将以下代码行附加到之前的演示中，就不会出现警告信息：\n\
  \n```\n//从 JDK7 开始，你可以使用菱形运算符的简短语法\nMyGenericClass doubleOb2 = new MyGenericClass();\n\
  doubleOb=doubleOb2;//无警告信息\n```\n\n但你可以回想一下，在演示 10 中，当你使用以下代码行时：\n\n```\ndoubleOb\
  \ = rawOb;\n```\n\n会收到一条警告信息。因此，你可以使用菱形运算符来减少输入（即缩短冗长的声明语句），并且还可以确保你没有创建原始类型。自 JDK7\
  \ 起，Java 中就已提供此功能。最后，虽然你可以在方法调用中使用此概念，但 Oracle 建议你主要在变量声明中使用菱形运算符。就我个人而言，为了更好的可读性和理解，我更喜欢完整的语法声明，并且它允许我在\
  \ JDK7 之前正确执行代码。\n\n应用继承\n\n你可以在泛型程序中应用继承的概念；即，你可以通过扩展来创建泛型类的子类型，或者通过实现来创建接口的子类型。唯一的限制是你不能改变参数。\n\
  \n演示 11\n\n例如，考虑带有输出的演示 11。\n\n```\npackage java2e.chapter12;\n//类 MyGenericClass\
  \ 在 Demonstration2 中定义\n//编译时错误\n//class SubClass extends MyGenericClass {\n//以下声明是正确的\n\
  class SubClass extends MyGenericClass {\n//一些代码\n}\nclass Demonstration11 {\npublic\
  \ static void main(String[] args) {\nSystem.out.println(\"***演示-11. 泛型编程中的继承.***\"\
  );\nSubClass  subInt = new SubClass();\nSystem.out.println(\"方法 show 返回整数值：\" +\
  \ subInt.show(200));\n}\n}\n```\n\n输出：\n\n```\n***演示-11. 泛型编程中的继承.***\n方法 show 返回整数值：200\n\
  ```\n\n之前的输出是显而易见的。但请注意被注释掉的那行代码：\n\n```\n//class SubClass extends MyGenericClass\
  \ {\n```\n\n如果你使用这行代码，将会收到编译时错误。这是因为，根据语言构造，你不能改变参数。你的子类必须传递其超类所需的类型参数。\n\n当你创建子类型时，还可以添加子类特有的方法。例如，在这个修改后的示例中，`SubClass`\
  \ 引入了一个新的类型参数和一个子类特有的方法。让我们看一下下面的程序及其修改后的输出。\n\n```\npackage java2e.chapter12;\n\
  //类 MyGenericClass 在 Demonstration2 中定义\n//修改后的程序\nclass SubClass extends MyGenericClass\
  \ {\n//子类特有的方法\npublic V subMethod(V value) {\nreturn value;\n}\n}\nclass Demonstration11\
  \ {\npublic static void main(String[] args) {\n//System.out.println(\"***演示-11.\
  \ 泛型编程中的继承.***\");\nSystem.out.println(\"***演示-11 修改版. 泛型编程中的继承.***\");\n//修改后的程序\n\
  SubClass  subInt = new SubClass();\nSystem.out.println(\"方法 show 返回整数值：\" + subInt.show(200));\n\
  System.out.println(\"子方法返回：\" + subInt.subMethod(\"没问题！\"));\n}\n}\n```\n\n修改后的输出：\n\
  \n```\n***演示-11 修改版. 泛型编程中的继承.***\n方法 show 返回整数值：200\n子方法返回：没问题！\n```\n\n桥接方法\n\n\
  可能会出现一种有趣的情况，编译器需要向类中添加一个方法。这种方法被称为桥接方法。通常，你不需要直接处理这种情况。\n\n为了理解这个场景，让我们看一下以下代码段：\n\
  \n\n\n```\nclass GenericClass12 {\npublic void show(T value) {\nSystem.out.println(\"\
  Inside parent class.The value is:\"+value);\n}\n}\nclass SubClass12 extends GenericClass12\
  \ {\n@Override\npublic void show(Integer value) {\nSystem.out.println(\"Inside Child\
  \ Class.The value is:\"+value);\n}\n}\n```\n\n你是否注意到了其中的重要特性？让我们来分析一下。\n\n*   派生类\
  \ `Subclass12` 继承自 `GenericClass12` 的 `Integer` 特定版本，即 `GenericClass12<Integer>`。\n\
  \n*   派生类 `SubClass12` 还重写了父类方法 `show()`。\n\n尽管这种编码方式是允许的，但当类型擦除介入时，可能会出现问题。一旦类型擦除执行其工作，`GenericClass12`\
  \ 中 `show()` 方法的预期形式如下：\n\n```\npublic void show(Object value){//other code..}\n\
  ```\n\n而 `SubClass12` 中 `show()` 方法的预期形式是：\n\n```\npublic void show()(Integer value){//other\
  \ code}\n```\n\n因此，在类型擦除操作之后，方法签名不匹配。为了处理这种情况并保持多态性，编译器会在 `Subclass12` 中生成一个桥接方法，该方法具有前述签名，可以调用\
  \ `Integer` 特定版本。因此，新的 `show()` 方法将出现在派生类（即 `SubClass12`）中，如下所示：\n\n```\npublic\
  \ void show(Object value) {\nshow((Integer) value);\n}\n```\n\n演示 12\n\n现在，请考虑演示\
  \ 12 及其对应的输出。然后阅读分析（在输出部分之后），以体验生成的桥接方法的存在。\n\n```\npackage java2e.chapter12;\n\
  class GenericClass12 {\npublic void show(T value) {\nSystem.out.println(\"Inside\
  \ parent class.The value is:\"+value);\n}\n}\nclass SubClass12 extends GenericClass12\
  \ {\n@Override\npublic void show(Integer value) {\nSystem.out.println(\"Inside Child\
  \ Class.The value is:\"+value);\n}\n}\nclass Demonstration12 {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"***Demonstration-12.Bridge Method\
  \ in Generic Programming.***\");\n// 创建一个 MyGenericClass 类型的对象。\nGenericClass12\
  \ parentOb = new GenericClass12();\nparentOb.show(100);\n// 一个 SubClass12 对象\nSubClass12\
  \ childOb = new SubClass12();\nchildOb.show(300);\n//Object ob=(int)400;\n//childOb.show(ob);//Error\n\
  // 使用多态\nSystem.out.println(\"Using Ploymorphism :\" );\nparentOb=childOb;\nparentOb.show(500);\n\
  }\n}\n```\n\n输出：\n\n```\n***Demonstration-12.Bridge Method in Generic Programming.***\n\
  Inside parent class.The value is:100\nInside Child Class.The value is:300\nUsing\
  \ Ploymorphism :\nInside Child Class.The value is:500\n```\n\n当我使用 `javap` 命令时，我可以看到这两个方法都存在于\
  \ `SubClass12` 中，如图 12-11 所示。（具体输出可能因你的 Java 版本而异。）\n\n![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig11_HTML.jpg](img/433474_2_En_12_Fig11_HTML.jpg)\n\
  \n图 12-11\n反编译后的 SubClass12.class 快照\n\n**12.9 为什么需要** **桥接方法** **？**\n你已经看到，在类型擦除操作之后，父类及其子类中的方法签名不匹配，从而影响了多态性的概念。为了解决这些问题，桥接方法就派上了用场。\n\
  在此背景下，请注意演示 12 中的最后几行代码。这部分代码演示了多态性概念是如何得以保留的。\n\n泛型编程中的重要限制\n泛型编程有许多相关的限制。只有通过实践才能熟悉它们。让我们通过讨论一些常见的限制来结束本章。\n\
  \n不要使用基本类型实例化泛型类型\n\n在演示 2 中，你看到以下声明在 Java 的泛型编程中是**不合法**的。因此，以下代码段\n\n```\n//错误的代码段-1\n\
  //此处不允许使用基本类型。必须是引用类型。\nMyGenericClass myGenericClassIntOb2 = new MyGenericClass();\n\
  将引发编译时错误：Syntax error, insert \"Dimensions\" to complete ReferenceType.\n```\n\n\
  你的泛型类不能直接或间接地继承自 Throwable\n\nJLS11 确认 JVM 的 catch 机制仅与非泛型类兼容。因此，以下代码段\n\n```\n\
  //错误的代码段-2\nclass CustomException extends Throwable{  }\n```\n\n将引发编译时错误：`The generic\
  \ class CustomException<T> may not subclass java.lang.Throwable`。\n\n你不能重载一个方法，使得每个重载的形式参数类型在擦除后都变为相同的原始类型\n\
  \n以下代码段\n\n```\n//错误的代码段-3\nclass OverloadRestriction {\npublic void printMe(List\
  \ intList) {//Some code }\npublic void printMe(List strList) {//Some code }\n}\n\
  ```\n\n将引发两个编译时错误：\n\n```\nErasure of method printMe(List) is the same as another\
  \ method in type OverloadRestriction\n```\n\n和\n\n```\nErasure of method printMe(List)\
  \ is the same as another method in type OverloadRestriction\n```\n\n你的泛型类中不允许使用静态字段类型参数\n\
  \n以下代码段\n\n```\n//错误的代码段-4\nclass MyDevice {\nprivate static T operatingSystem;//\
  \ 4.1 编译时错误\n// 4.2 编译时错误\n/* public static T getOperatingSystem() {\n// some code\n\
  }*/\n}\n```\n\n将引发编译时错误：`Cannot make a static reference to the non-static type T`。\n\
  如果你尝试使用静态方法*，*也会得到相同的错误，如注释行所示。\n\n你不能在你的泛型类中实例化类型参数\n\n以下代码段\n\n```\n//错误的代码段-5\n\
  class GenericClass {\nT genericObject;\nGenericClass() {\n//5.编译时错误\ngenericObject\
  \ = new T();\n}\n}\n```\n\n将引发编译时错误：`Cannot instantiate the type T`。\n\n最后一点建议\n\
  *在本章中，你已经学习了泛型编程的基础知识。但最终的掌握需要反复练习。在结束本章之前，我建议你注意，在编写代码时，应特别关注泛型编程中的子类型。*\n考虑一个例子。假设有两个具体类型——`TypeA`\
  \ 和 `TypeB`*。* `GenericClass<TypeA>` 与 `GenericClass<TypeB>` 没有任何关系，无论 `TypeA` 和\
  \ `TypeB` 是否相关。`Object` 是 `GenericClass<TypeA>` 和 `GenericClass<TypeB>` 的共同父类。\n\
  \n例如，你在多个示例中多次使用了 `Integer` 类。但如果你查看其原始定义，你会看到：\n\n```\npublic final class Integer\
  \ extends Number implements Comparable {\n//some code\n}\n```\n\n这基本上说明 `Integer`\
  \ 类继承自 `Number` 类。\n但根据之前的建议，你可以得出结论：`GenericClass<Number>` 和 `GenericClass<Integer>`\
  \ 之间没有关系。\n\n总结\n\n本章讨论了以下内容：\n\n*   什么是泛型程序？\n\n*   为什么泛型在 Java 中很重要？\n\n*   泛型编程相对于非泛型编程有哪些优势？\n\
  \n*   如何在泛型编程中使用通配符？\n\n*   通配符有哪些不同类型，如何使用它们？\n\n*   什么是受限类型参数？它与通配符有何不同？\n\n*\
  \   如何在泛型程序中使用受限类型参数？\n\n*   什么是类型擦除，它是如何工作的？\n\n*   什么是桥接方法？它是如何工作的？\n\n*   为什么桥接方法有用？\n\
  \n*   什么是原始类型？\n\n*   如何使用菱形运算符来简化语法？\n\n13. 数据库编程\n\n\n\n您的 Java 应用程序可以使用 JDBC（Java\
  \ 标准 API）与数据库通信。它为您提供了连接关系型数据库所需的接口。在将数据库与 Java 应用程序连接的场景中，专业程序员可能更倾向于使用 JPA、Hibernate\
  \ 等替代方案。但本章专门介绍 JDBC，因为它有其自身的重要性和实用性。要进行 JDBC 编程练习，您需要熟悉以下概念：\n\n*   什么是数据库，它如何帮助您存储或组织数据？\n\
  *   如何连接数据库？\n*   您的 Java 应用程序如何与数据库通信？（或者，您如何建立与数据库的连接，然后如何在数据库中插入、更新或删除记录？）\n\n\
  您很快就会了解到，您的 Java 程序将使用支持某些 JDBC 驱动程序的 JDBC API 来连接数据库。图 13-1 展示了应用程序（您的 Java 程序）和数据库通过\
  \ JDBC 驱动程序连接的整个过程的简化视图。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig1_HTML.jpg](img/433474_2_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1\nJDBC 可以连接 Java 应用程序和数据库（例如 MySQL）\n\n那么，让我们在本章中逐一审视这些部分。\n\n注意\n如果您是数据库编程的绝对新手，可能需要了解本章中简要提及的一些关键术语。因此，建议您反复查阅这些术语和定义，以便更好地理解。渐渐地，这些术语会变得清晰，您将能够执行复杂的数据库编程。\n\
  \n数据库与 DBMS\n**数据库** 是相关文件的集合，通常称为表。**表** 是相关记录的集合。**记录** 是相关字段的集合，文件中最小且有意义的的信息单元称为**字段**（或数据项）。\n\
  **数据库管理系统**（DBMS）是有效管理这些数据的软件包。Oracle Database、SQL Server、MySQL、MS-Access 等是一些常用的\
  \ DBMS 软件包。\n\nDBMS 的类型\n\nDBMS 有多种类型，例如：\n\n*   层次型 DBMS（HDBMS）\n*   网状型 DBMS（NDBMS）\n\
  *   关系型 DBMS（RDBMS）\n*   面向对象数据库（OODB）\n*   分布式 DBMS（DDBMS）\n\n每种类型都有其优缺点。选择哪种数据库取决于您的需求。根据您的需求，您可能更倾向于选择\
  \ NoSQL（它是一种非关系型结构，可能适用于 DDBMS），而不是选择 SQL 数据结构（适用于 RDBMS）。在本章中，您将只看到 RDBMS 和简单 SQL\
  \ 语句的使用。\n\nRDBMS\n在 RDBMS 中，数据以行和列的形式存储，类似于表格。这些表被称为**关系**。表中的行被称为**元组**，列被称为**属性**。\n\
  表中的每一行包含一条记录。每一列包含字段。请参考图 13-2 中的表格。\n\n为了方便您参考，我在图 13-2 中标记了所有记录和属性。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig2_HTML.jpg](img/433474_2_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\nRDBMS 中的示例表。\n\n您可以根据某种数学公式处理关系中的不同记录，这被称为**关系代数**。由于整个数据库都可以使用这些数学公式进行处理，因此关系代数是关系数据库和\
  \ SQL 的理论基础。\nOracle Database、MySQL、Microsoft SQL Server、IBM DB2 等是 RDBMS 的常见示例。在本章中，我使用\
  \ MySQL 来演示示例。\n\n注意\n在附录 C 中，我展示了在 Win10 机器上安装 MySQL 的步骤。\n\nSQL\n\nSQL 的全称是结构化查询语言。它是一种非常流行且广泛使用的\
  \ RDBMS 语言。它是一种类似英语的语言，被认为是第四代语言。创建数据、更新数据、读取数据和删除数据是 SQL 最常见的操作。在 Java 中，您将看到使用\
  \ `java.sql` 包，该包包含支持数据库编程（通常使用关系型数据库）的 API。该 API 支持许多操作，其中一些如下：\n\n*   通过 `DriverManager`\
  \ 工具建立与数据库的连接。`DriverManager` 类和 `Driver` 接口常用于编程的这一部分。\n*   通过 SQL 语句与数据库通信。您通常会使用\
  \ `Connection` 接口、`Statement`、`PreparedStatement` 和 `CallableStatement` 来完成编程的这一部分。您将在演示\
  \ 1 和演示 2 中看到 `Statement` 的使用。演示 3 将展示 `PreparedStatement` 的使用，演示 4 将展示 `CallableStatement`\
  \ 的使用。\n*   通过 `ResultSet` 接口处理通过不同查询获得的结果。\n\n在本章中，您将看到 Java 程序与 MySQL 数据库交互时这些基本操作的使用。\n\
  \n要点记忆\n\n*   Java、C++、C 等是第三代语言（3GL）。在 3GL 中，重点是“如何解决问题？”，而在 4GL 中，重点是“你想要什么？”。但一些高级的\
  \ 3GL 可以结合 4GL 的一些重要方面。\n*   需要注意的是，SQL 不区分大小写字符集。\n*   JDBC 是一个 SQL 级别的 API。它允许您在\
  \ Java API 调用中构造和组合 SQL 语句。\n\n注意\n本章使用简单的 SQL 语句来演示各种程序。如果您是 SQL 的绝对新手，建议您先在您偏好的数据库中使用简单的\
  \ SQL 语句进行练习，以便在继续学习之前有更好的理解。\n\n连接数据库\n\n您可以通过不同的驱动程序连接到数据库。JDBC API 支持这些驱动程序。JDBC\
  \ 驱动程序是一种软件组件，驻留在客户端机器上，帮助 Java 程序与 DBMS 通信；即，它充当适配器。有四种不同类型的 JDBC 驱动程序，如下所示：\n\n\
  *   **类型 1（或 JDBC-ODBC 桥接）驱动程序**：它将 JDBC 方法调用转换为 ODBC 函数调用。ODBC 桥接驱动程序必须安装在客户端机器上。在这里，JDBC\
  \ 驱动程序可以与可能不是用 Java 编写的第三方 API 通信。此外，类型 1 驱动程序不是用 Java 编写的，因此它们不可移植。这些驱动程序仅适用于本地连接。Oracle\
  \ 从 Java 8 开始停止支持这些驱动程序。他们现在建议您使用特定数据库供应商提供的 JDBC 驱动程序。\n\n*   **类型 2（或本地 API）驱动程序**：这些驱动程序使用数据库的客户端库，以便它们可以将\
  \ JDBC 方法调用转换为数据库 API 的本地调用。它是一种部分 Java 驱动程序。由于本地驱动程序和客户端库都驻留在本地机器上，因此这些驱动程序不用于远程网络连接。但它们可以提供比类型\
  \ 1 驱动程序更好的性能。\n\n\n\n*   **类型 3（即网络协议）驱动程序**：这些驱动程序完全用 Java 编写。在此模式下，客户端首先与中间件应用服务器通信，该服务器将\
  \ JDBC 调用转换为特定于供应商的 DBMS 调用，然后将这些调用转发到数据库服务器。对于这些驱动程序，无需在本地机器上安装任何客户端库，因为应用服务器能够完成所需的工作。单个类型\
  \ 3 驱动程序也可用于连接多个数据库。但是，客户端机器必须支持网络，并且总体维护成本较高，因为您可能需要在中间层提供特定于数据库的编码。\n\n*   **类型\
  \ 4（即纯 Java）驱动程序**：这些驱动程序也完全用 Java 编写，但它们能提供最高的性能，因为它们由供应商自己提供。在此模式下，客户端机器或服务器机器上都不需要安装特殊软件。唯一的主要缺点是，由于它由特定供应商提供，因此它依赖于特定的数据库，供应商可以在该数据库中使用不同的协议。\n\
  \n注意 在演示 5 中，您还将看到使用 `javax.sql.DataSource` 对象在 Java 应用程序和数据库之间建立连接。从 JDBC 2.0 开始，这是连接数据源的推荐方法。尽管如此，我仍在讨论所有这些内容，以帮助您理解遗留代码。此外，我认为没有这些讨论，“Java\
  \ 数据库编程”的学习是不完整的。\n\n图 13-3 演示了如何通过 JDBC 驱动程序连接三种不同类型的数据库。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig3_HTML.jpg](img/433474_2_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\n不同类型的数据库可以通过 JDBC 驱动程序连接\n\n您可能有不同的 JDBC 驱动程序来连接不同的数据库。但作为最终用户，您无需担心它们的实现。目前，您只需知道需要\
  \ JDBC 驱动程序来连接数据库即可。\n\n问答环节\n**13.1 如何判断哪种驱动程序适合我的应用程序？**\n如果您知道只需要一个特定的数据库，请选择类型\
  \ 4。如果您需要访问多个数据库，请选择类型 3。当您既没有类型 3 也没有类型 4 时，可以考虑类型 2 驱动程序。通常不建议使用类型 1，但您可以将其限制在测试目的中使用。\n\
  **13.2 当任何客户端使用类型 3 驱动程序时，应用服务器的典型操作有哪些？**\n一些典型操作包括日志记录、负载均衡、审计等。\n\n在 Java 应用程序中与数据库通信\n\
  现在，您将看到一些演示，其中 Java 应用程序将与 MySQL 数据库交互。对于其他数据库，您可以遵循类似的方法。在接下来的演示中，您将看到类型 4 驱动程序的使用。\n\
  \n当您通过 Java 程序连接到数据库时，通常需要考虑以下步骤：\n\n1.  加载您的 JDBC 驱动程序。\n\n2.  创建一个连接对象并连接到数据库。\n\
  \n3.  使用您的 Java 程序执行 SQL 语句。\n\n4.  映射检索到的结果并根据您的需求进行处理。\n\n这里，我假设您已经在本地计算机上安装了\
  \ MySQL。如果尚未安装，您可以访问链接 [`https://dev.mysql.com/downloads/installer/`](https://dev.mysql.com/downloads/installer/)\
  \ 获取安装程序和相关信息。在撰写本文时，`mysql-installer-community-8.0.16.0` 是最新版本。您也可以参考附录 C，其中我展示了在\
  \ Win10 机器上安装 MySQL 的步骤。\n\n但安装数据库只是第一步。要使用 Java 应用程序连接到数据库，您需要一个特定于供应商的连接器。我使用的是\
  \ MySQL 和 JDBC。因此，我搜索了用于 MySQL 中 JDBC 驱动程序的连接器。在撰写本文时，`mysql-connector-java-8.0.16.zip`\
  \ 可在以下链接 [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)\
  \ 获取。我选择了平台无关版本（图 13-4）并将其下载到本地系统。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig4_HTML.jpg](img/433474_2_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n从 [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)\
  \ 下载 MySql Connector/J 8.0.16 平台无关版本\n\n下载并解压 zip 文件后，您将获得 `mysql-connector-java-8.0.16.jar`\
  \ 文件（撰写本文时的最新版本），您需要将其添加到 Eclipse 中的 Java 构建路径中（**项目** ➤ **属性** ➤ **Java 构建路径**\
  \ ➤ **添加外部 JAR...**）。在 Eclipse 中添加此外部 jar 后，您可能会看到类似于图 13-5 所示的屏幕。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig5_HTML.jpg](img/433474_2_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5\n在 Eclipse 中添加了 `mysql-connector-java-8.0.16.jar`\n\n重要术语\n现在，让我们来看一些演示。要理解接下来的演示，您需要熟悉以下类、接口和方法：\n\
  **DriverManager**：这个*类*管理一组 JDBC 驱动程序。它将来自 Java 应用程序的连接请求与正确的数据库驱动程序进行匹配。（需要注意的是，JDBC\
  \ 2.0 提供了另一种连接数据源的方式。使用 `DataSource` 对象是连接数据源的推荐方式。）\n\n**Driver**\n：这是一个*接口*，用于处理与数据库服务器的通信。每个驱动程序必须提供一个实现此接口的类。每个\
  \ `Driver` 类应该小巧且独立，以便可以在没有大量支持代码的情况下加载。当加载一个 `Driver` 类时，您应该创建它的一个实例并将其注册到 `DriverManager`。因此，在演示\
  \ 1 中，您可能会注意到以下代码行：\n\n```\n// 用于 MySQL 数据库\nClass.forName(\"com.mysql.cj.jdbc.Driver\"\
  ).newInstance();\n```\n\n要点记忆\n\n*   类似于连接 Oracle 数据库，您可能会注意到以下代码的使用：\n\n*   要连接\
  \ MS SQL Server，您可能会注意到*以下代码*的使用：\n\n```\n    Class.forName(\"com.microsoft.jdbc.sqlserver.SQLServerDriver\"\
  ).newInstance();\n    ```\n\n```\nClass.forName(\"oracle.jdbc.driver.OracleDriver\"\
  ).newInstance();\n```\n\n**Connection**：这个*接口*提供了连接数据库的方法。您的 SQL 语句执行，结果在连接的上下文中返回。您可以简单地说，所有与数据库的通信都通过连接对象进行。\n\
  \n**getConnection()**：此方法尝试连接到给定的数据库 URL。此方法有多个重载版本。在演示 1 中，您会注意到以下代码行：\n\n```\n\
  DriverManager.getConnection(\"jdbc:mysql://localhost:3306/test\", \"root\", \"admin\"\
  );\n```\n\n也就是说，我使用了以下重载版本：\n\n```\npublic static Connection getConnection(String\
  \ url, String user, String password) throws SQLException\n```\n\n其中 `user` 字符串表示数据库用户名，`password`\
  \ 字符串是该用户的密码。\n\n注意\n使用字符串 `localhost` 是因为我将 MySQL 数据库安装在了本地系统中，而 `test` 是我的本地数据库名称。\n\
  \n\n\n**声明**：这是一个*接口*。`Statement` 对象用于执行静态 SQL 语句并返回其结果。默认情况下，在特定时刻，每个 `Statement`\
  \ 对象只能打开一个 `ResultSet` 对象。\n**createStatement()**：此方法创建一个 `Statement` 对象，用于向数据库发送\
  \ SQL 语句。\n**executeQuery()**：此方法用于执行返回单个 `ResultSet` 对象的 SQL 语句。\n**executeUpdate()**：此方法用于执行可以是\
  \ `insert`、`update` 或 `delete` 语句中任意一种的 SQL 语句。你也可以使用不返回任何内容的 DDL 语句。（可参考本上下文中的问答\
  \ 13.10。）\n\n注意\n不能在 `PreparedStatement` 或 `CallableStatement` 上调用 `executeQuery()`\
  \ 或 `executeUpdate()` 方法。\n\n**ResultSet**：这是一个*接口*，表示数据库查询的结果集。读取数据（使用数据库查询）的 SQL\
  \ 语句将数据返回到结果集中。`select` 语句是选择行并在结果集中查看它们的标准方式。\n在演示 1 中，你会注意到，一旦使用 `Statement` 对象执行了\
  \ SQL 语句，就会检索到查询结果。它就像一个迭代器，让你可以轻松地遍历其数据。在此上下文中，了解 `ResultSet` 对象维护一个指向结果集中当前行的游标是很有用的。\n\
  **SQLException**：此*类*用于描述各种数据库访问错误（或数据库应用程序中可能发生的任何其他错误）。\n\n创建数据库并插入记录\n演示 1 展示了如何连接到\
  \ MySQL 数据库以及如何从数据库的表中检索记录。\n\n在此之前，你可以熟悉一下 MySQL Workbench，这是一个图形化工具，可在使用 MySQL\
  \ 服务器和数据库时使用。安装后，你可以在启动菜单中找到它，如图 13-6 所示。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig6_HTML.jpg](img/433474_2_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6\n安装后，MySQL Workbench 8.0 可在启动菜单中找到\n\n在开始之前，我创建了一个名为 `test` 的数据库，然后在该数据库中创建了一个名为\
  \ `employee` 的表。在 `employee` 表中，我只插入了三条记录。创建数据库和在数据库中创建表非常简单。如果你知道这些命令，可以跳过下面方括号\
  \ [ ] 中的部分。\n\n[例如，登录到你的数据库服务器后：\n\n*   要创建名为 `test` 的数据库，可以使用以下命令：\n\n*   要创建名为\
  \ `employee` 的表，可以使用以下命令：\n\n```\ncreate database test;\n```\n\n```\ncreate table\
  \ employee(EmpId int(10),Name varchar(10),Age int(10), Salary double);\n```\n\n\
  这简单地说明 employee 表有四列：`EmpId`、`Name`、`Age` 和 `Salary`。这里也描述了带有大小的数据类型。`varchar` 数据类型对你来说可能比较陌生。现在，只需知道它用于可以同时包含字母和数字的数据。\n\
  \n*   要在 `employee` 表中插入一条记录，可以使用以下命令：\n\n```\ninsert into employee values (1,'Amit',25,1200.5);\n\
  ```\n\n类似地，你可以插入其他记录。\n\n另一个需要注意的重要点是，如果你想让某一列唯一且非空，可以将其用作主键。例如，如果我不想在 `EmpId` 列中出现重复值，并且希望每条记录都包含\
  \ `EmpId` 的信息，我会在创建表时使用主键的概念，如下所示：\n\n```\ncreate table employee(EmpId int(10) primary\
  \ key,Name varchar(10),Age int(10), Salary double);\n```\n\n现在，当你向 `employee` 表插入记录时，需要提供\
  \ `EmpId` 的信息。简而言之，通过使用主键，你可以唯一地标识一条记录。]\n\n图 13-7 展示了 MySQL Workbench 的视图。从图中可以看出，test\
  \ 数据库当前包含一个表 `employee`，其中有三条记录。该图还展示了 `employee` 表的表模式。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig7_HTML.jpg](img/433474_2_En_13_Fig7_HTML.jpg)\n\
