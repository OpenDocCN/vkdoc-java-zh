  \ preparedStatementOb=null;\npreparedStatementOb=connectionOb.prepareStatement(\"\
  insert into Employee values(?,?,?,?)\");\n```\n\n你可以看到，创建了一个带有四个输入参数的 `PreparedStatement`\
  \ 对象。注意四个问号（`?`）。这些是你输入的占位符。在执行 `PreparedStatement` 对象之前，你需要提供值来替换这些问号。你可以使用 `PreparedStatement`\
