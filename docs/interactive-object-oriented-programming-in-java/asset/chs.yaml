  \n## 受检异常与非受检异常\n\n现在你理解了受检异常和非受检异常之间的区别。我之前已经提到过，有几种异常要么需要使用 `throws` 子句列出方法可能抛出的所有异常，要么需要使用\
  \ `try`-`catch` 块来处理该场景。否则，你将遇到编译时错误。这就是为什么它们被称为**受检异常**或编译时异常。其余的异常被称为**非受检异常**。\n\
  \n### 注意\n\n正如我之前提到的，要理解受检异常和非受检异常之间的区别，你可能需要再次查看演示 7 和演示 8。\n\n以下列表包含一些受检异常：\n\n\
  *   `ClassNotFoundException`\n\n*   `NoSuchMethodException`\n\n*   `NoSuchFieldException`\n\
  \n*   `InstantiationException`\n\n*   `CloneNotSupportedException`\n\n*   `IllegalAccessException`\n\
  \n*   `InterruptedException`\n\n以下是一些非受检异常：\n\n*   `ArithmeticException`\n\n*  \
  \ `ArrayIndexOutOfBoundsException`\n\n*   `IndexOutOfBoundsException`\n\n*   `SecurityException`\n\
  \n*   `NullPointerException`\n\n### 记住要点\n\n如果一个方法可能抛出受检异常，那么该方法要么应该使用 `throws`\
  \ 关键字指定该异常，要么需要使用 `try`-`catch` 块自行处理该异常。否则，你将遇到编译时错误。\n\n### 问答环节\n\n**10.8 我理解受检异常是**\
  \ **Exception** **的子类。你也说非受检异常是** **RuntimeException** **的子类。但从层次结构来看，我看到** **RuntimeException**\
  \ **也是** **Exception** **的直接子类。那么它们是如何成为非受检异常的呢？**\n\n让我们看看 JLS11 对此是如何说明的。在第 11.1.1\
  \ 节中，它指出：\n\n> *“受检异常类是指除非受检异常类之外的所有异常类。也就是说，受检异常类是* *Throwable* *及其所有子类，但* *RuntimeException*\
  \ *及其子类以及* *Error* *及其子类除外。”*\n\n同时，它还指出：“*非受检异常类*是运行时异常类和错误类。”\n\n遵循这些规则，Java 编译器可以清晰地识别出\
  \ `RuntimeException`。因此，根据语言规范，你可以安全地说，任何作为 `RuntimeException` 或 `Error` 类子类的异常都不是受检异常。\n\
  \n## 关于链式异常的讨论\n\n有时你可能会收到一个由其他异常引起的异常。因此，你可能想知道最初的原因。在这种情况下，链式异常的概念就应运而生了。\n\n\
  考虑一个非常简单的 `ArithmeticException` 场景，当你用整数除以 0 时可能会收到这个异常。有时你的应用程序可能会使用各种逻辑来计算或更新除数。因此，当你收到此异常时，最初的原因可能是某个\
  \ I/O 操作的结果，该操作最终导致除数为零。\n\n链式异常可以帮助我们了解此类异常场景，同时它们可以指向实际错误所在的层。\n\n为了实现链式异常，你拥有以下方法：\n\
  \n```\nThrowable getCause() 和\nThrowable initCause(Throwable cause)\n```\n\n以及以下构造函数：\n\
  \n```\nThrowable(Throwable cause)\nThrowable(String msg, Throwable cause)\n```\n\
  \n\n\n### 演示 9\n\n请观察以下演示及其输出。无需担心某些被注释掉的部分。为了使程序简短明了，这些部分被忽略了。你很快就会学到，一旦取消这些代码段的注释，就可以扩展异常链。\n\
