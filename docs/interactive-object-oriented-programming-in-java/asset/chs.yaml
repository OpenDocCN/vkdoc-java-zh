  如果你不了解预览特性，可以参考问答 14.1。并且你在本章的演示 2 中已经看到了 lambda 表达式的使用。\n\n演示 6\n\n以下演示展示了此特性的简单用法。对于\
  \ case 1 到 case 5，它将打印一条通用消息（`您的版本在 1 到 5 之间`），对于 case 6 到 12，它将打印另一条通用消息（`您的版本在\
  \ 6 到 12 之间`）。如果版本是 13，示例将显示一条不同的消息（如输出所示）。该示例还包含一个 default case 来打印关于默认版本的信息。为简单起见，`myVersion`\
