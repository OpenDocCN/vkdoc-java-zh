  trans: "\n*   **类型 3（即网络协议）驱动程序**：这些驱动程序完全用 Java 编写。在此模式下，客户端首先与中间件应用服务器通信，该服务器将\
    \ JDBC 调用转换为特定于供应商的 DBMS 调用，然后将这些调用转发到数据库服务器。对于这些驱动程序，无需在本地机器上安装任何客户端库，因为应用服务器能够完成所需的工作。单个类型\
    \ 3 驱动程序也可用于连接多个数据库。但是，客户端机器必须支持网络，并且总体维护成本较高，因为您可能需要在中间层提供特定于数据库的编码。\n\n*   **类型\
    \ 4（即纯 Java）驱动程序**：这些驱动程序也完全用 Java 编写，但它们能提供最高的性能，因为它们由供应商自己提供。在此模式下，客户端机器或服务器机器上都不需要安装特殊软件。唯一的主要缺点是，由于它由特定供应商提供，因此它依赖于特定的数据库，供应商可以在该数据库中使用不同的协议。\n\
    \n注意 在演示 5 中，您还将看到使用 `javax.sql.DataSource` 对象在 Java 应用程序和数据库之间建立连接。从 JDBC 2.0\
    \ 开始，这是连接数据源的推荐方法。尽管如此，我仍在讨论所有这些内容，以帮助您理解遗留代码。此外，我认为没有这些讨论，“Java 数据库编程”的学习是不完整的。\n\
    \n图 13-3 演示了如何通过 JDBC 驱动程序连接三种不同类型的数据库。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig3_HTML.jpg](img/433474_2_En_13_Fig3_HTML.jpg)\n\
    \n图 13-3\n不同类型的数据库可以通过 JDBC 驱动程序连接\n\n您可能有不同的 JDBC 驱动程序来连接不同的数据库。但作为最终用户，您无需担心它们的实现。目前，您只需知道需要\
    \ JDBC 驱动程序来连接数据库即可。\n\n问答环节\n**13.1 如何判断哪种驱动程序适合我的应用程序？**\n如果您知道只需要一个特定的数据库，请选择类型\
    \ 4。如果您需要访问多个数据库，请选择类型 3。当您既没有类型 3 也没有类型 4 时，可以考虑类型 2 驱动程序。通常不建议使用类型 1，但您可以将其限制在测试目的中使用。\n\
    **13.2 当任何客户端使用类型 3 驱动程序时，应用服务器的典型操作有哪些？**\n一些典型操作包括日志记录、负载均衡、审计等。\n\n在 Java 应用程序中与数据库通信\n\
    现在，您将看到一些演示，其中 Java 应用程序将与 MySQL 数据库交互。对于其他数据库，您可以遵循类似的方法。在接下来的演示中，您将看到类型 4 驱动程序的使用。\n\
    \n当您通过 Java 程序连接到数据库时，通常需要考虑以下步骤：\n\n1.  加载您的 JDBC 驱动程序。\n\n2.  创建一个连接对象并连接到数据库。\n\
    \n3.  使用您的 Java 程序执行 SQL 语句。\n\n4.  映射检索到的结果并根据您的需求进行处理。\n\n这里，我假设您已经在本地计算机上安装了\
    \ MySQL。如果尚未安装，您可以访问链接 [`https://dev.mysql.com/downloads/installer/`](https://dev.mysql.com/downloads/installer/)\
    \ 获取安装程序和相关信息。在撰写本文时，`mysql-installer-community-8.0.16.0` 是最新版本。您也可以参考附录 C，其中我展示了在\
    \ Win10 机器上安装 MySQL 的步骤。\n\n但安装数据库只是第一步。要使用 Java 应用程序连接到数据库，您需要一个特定于供应商的连接器。我使用的是\
    \ MySQL 和 JDBC。因此，我搜索了用于 MySQL 中 JDBC 驱动程序的连接器。在撰写本文时，`mysql-connector-java-8.0.16.zip`\
    \ 可在以下链接 [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)\
    \ 获取。我选择了平台无关版本（图 13-4）并将其下载到本地系统。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig4_HTML.jpg](img/433474_2_En_13_Fig4_HTML.jpg)\n\
    \n图 13-4\n从 [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)\
    \ 下载 MySql Connector/J 8.0.16 平台无关版本\n\n下载并解压 zip 文件后，您将获得 `mysql-connector-java-8.0.16.jar`\
    \ 文件（撰写本文时的最新版本），您需要将其添加到 Eclipse 中的 Java 构建路径中（**项目** ➤ **属性** ➤ **Java 构建路径**\
    \ ➤ **添加外部 JAR...**）。在 Eclipse 中添加此外部 jar 后，您可能会看到类似于图 13-5 所示的屏幕。\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig5_HTML.jpg](img/433474_2_En_13_Fig5_HTML.jpg)\n\
    \n图 13-5\n在 Eclipse 中添加了 `mysql-connector-java-8.0.16.jar`\n\n重要术语\n现在，让我们来看一些演示。要理解接下来的演示，您需要熟悉以下类、接口和方法：\n\
    **DriverManager**：这个*类*管理一组 JDBC 驱动程序。它将来自 Java 应用程序的连接请求与正确的数据库驱动程序进行匹配。（需要注意的是，JDBC\
    \ 2.0 提供了另一种连接数据源的方式。使用 `DataSource` 对象是连接数据源的推荐方式。）\n\n**Driver**\n：这是一个*接口*，用于处理与数据库服务器的通信。每个驱动程序必须提供一个实现此接口的类。每个\
    \ `Driver` 类应该小巧且独立，以便可以在没有大量支持代码的情况下加载。当加载一个 `Driver` 类时，您应该创建它的一个实例并将其注册到 `DriverManager`。因此，在演示\
    \ 1 中，您可能会注意到以下代码行：\n\n```\n// 用于 MySQL 数据库\nClass.forName(\"com.mysql.cj.jdbc.Driver\"\
    ).newInstance();\n```\n\n要点记忆\n\n*   类似于连接 Oracle 数据库，您可能会注意到以下代码的使用：\n\n*   要连接\
    \ MS SQL Server，您可能会注意到*以下代码*的使用：\n\n```\n    Class.forName(\"com.microsoft.jdbc.sqlserver.SQLServerDriver\"\
    ).newInstance();\n    ```\n\n```\nClass.forName(\"oracle.jdbc.driver.OracleDriver\"\
    ).newInstance();\n```\n\n**Connection**：这个*接口*提供了连接数据库的方法。您的 SQL 语句执行，结果在连接的上下文中返回。您可以简单地说，所有与数据库的通信都通过连接对象进行。\n\
    \n**getConnection()**：此方法尝试连接到给定的数据库 URL。此方法有多个重载版本。在演示 1 中，您会注意到以下代码行：\n\n```\n\
    DriverManager.getConnection(\"jdbc:mysql://localhost:3306/test\", \"root\", \"\
    admin\");\n```\n\n也就是说，我使用了以下重载版本：\n\n```\npublic static Connection getConnection(String\
    \ url, String user, String password) throws SQLException\n```\n\n其中 `user` 字符串表示数据库用户名，`password`\
    \ 字符串是该用户的密码。\n\n注意\n使用字符串 `localhost` 是因为我将 MySQL 数据库安装在了本地系统中，而 `test` 是我的本地数据库名称。\n"
- fmt: '**Statement**: It is an *interface*. A `Statement` object is used to execute
    the static SQL statement and returns the results for that. By default, only one
    `ResultSet` object per `Statement` object can be opened in a particular moment.


    **createStatement()**: This method creates a `Statement` object to send SQL statements
    to the database.


    **executeQuery()**: This method is used to execute an SQL statement that returns
    a single `ResultSet` object.


    **executeUpdate()**: This method is used to execute an SQL statement that can
    be any of the `insert`, `update`, or `delete` statements. You can also use DDL
    statements, which return nothing. (You can refer to Q&A 13.10 in this context.)


    **Note**: The `executeQuery()` or the `executeUpdate()` methods cannot be called
    on a `PreparedStatement` or on a `CallableStatement`.


    **ResultSet**: This is an *interface* that represents the result set of a database
    query. The SQL statements that read data (using a database query) return the data
    in a result set. The `select` statement is a standard way to select rows and view
    them in the result set. In Demonstration 1, you will notice that you retrieve
    the query result once an SQL statement is executed using a `Statement` object.
    It acts like an iterator so that you can easily move through its data. In this
    context, it is useful to know that a `ResultSet` object maintains a cursor to
    point at the current row in the result set.


    **SQLException**: This *class* is used to describe various database access errors
    (or any other errors that may occur in a database application).


    ## Creating a Database and Inserting Records


    Demonstration 1 shows how you can connect to a MySQL database and how you can
    retrieve the records from a table in the database.


    Before that, you can familiarize yourself with MySQL Workbench which is a graphical
    tool and can be used when you work with MySQL servers and databases. Once installed,
    you can get it in your startup menu, like in Figure [13-6](#433474_2_En_13_Chapter.xhtml#Fig6).


    ![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig6_HTML.jpg](images/433474_2_En_13_Chapter/433474_2_En_13_Fig6_HTML.jpg)


    **Figure 13-6** Once installed, MySQL Workbench 8.0 is available in the startup
    menu


    Before I start, I create a database `test`, and then I create a table `employee`
    in that database. In the `employee` table, I insert three records only. Creating
    a database and creating a table inside the database is very easy. You can skip
    the following section contained in square brackets [ ] if you know these commands.


    [For example, once you log in to your database server:


    - To create the database called `test`, you can use the following command:


    ```

    create database test;

    ```


    - To create the table called `employee`, you can use the following command:


    ```

    create table employee(EmpId int(10),Name varchar(10),Age int(10), Salary double);

    ```


    It simply says the employee table has four columns: `EmpId`, `Name`, `Age`, and
    `Salary`. The datatypes with sizes are also described here. The `varchar` datatype
    may seem new to you. For now, simply know that it is used for those who can hold
    both letters and numbers.


    - To insert a record in your `employee` table, you can use the following command:


    ```

    insert into employee values (1,''Amit'',25,1200.5);

    ```


    Similarly, you can insert other records.


    Another important point to note is that if you want to make a column unique and
    not null, you can use it as a primary key. For example, if I want no duplicates
    in the `EmpId` column and I want each record to include the information for `EmpId`,
    I’ll use the concept of a primary key while creating the table, which is as follows:


    ```

    create table employee(EmpId int(10) primary key,Name varchar(10),Age int(10),
    Salary double);

    ```


    Now, when you insert a record into the `employee` table, you need to supply the
    information for `EmpId`. In short, by using a primary key, you can uniquely identify
    a record.]


    Figure [13-7](#433474_2_En_13_Chapter.xhtml#Fig7) represents the MySQL Workbench
    view for that. From the figure, you can see that the test database currently contains
    one table, `employee`, with three records. The figure also presents the table
    schema for the `employee` table.


    ![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig7_HTML.jpg](images/433474_2_En_13_Chapter/433474_2_En_13_Fig7_HTML.jpg)


    **Figure 13-7** The MySQL Workbench view for the employee table in the test database


    But to understand the upcoming demonstrations, you need not be familiar with MySQL
    Workbench in detail. Here, I have used this graphical tool to show you the current
    database and the tables in it before you start programming with JDBC.


