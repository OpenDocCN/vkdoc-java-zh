    \ is of type:\njava.lang.Integer\n```\n\n## 限制\n\n以下是使用`var`时的一些重要限制：\n\n*   你需要将声明和初始化放在一起。例如：\n\
    \n```\nvar myInt=1;//ok\n```\n\n但下面这行代码会引发编译时错误：\n\n*   你可以使用`var`作为变量名。编译器不会对以下声明报错；也就是说，它不像\
    \ Java 中的保留关键字那样被对待：\n\n```\nvar myInt;//Error\nmyInt=1;\n```\n\n*   你可以在初始化局部变量和`for`循环的上下文中使用`var`，但不能在方法参数或返回类型中使用它们。例如，在以下代码段中，`MyClass`中的两个方法都会引发编译时错误：\n\
