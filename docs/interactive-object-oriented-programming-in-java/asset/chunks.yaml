    # 10. Managing Exceptions


    When you write code for your application, you expect that it will execute without
    any problems. So, it is important to manage and detect all possible errors in
    your program. Even so, sometimes you may encounter surprises during program execution.
    These surprises may occur for various reasons, such as some careless mistake in
    the program, implementation of incorrect logic, loopholes in the code paths of
    the program, and so on. However, it is also true that many of the failures are
    beyond the control of a programmer. Programmers often term these unwanted situations
    as *exceptions* . Handling these exceptions is essential when you write any application.


    ## Types of Mistakes


    Normally, you can broadly classify the mistakes (or errors) in a program into
    two categories, as follows:


    *   Compile-time error


    *   Runtime error


    Compile-time errors are detected by the Java compiler and are easy to detect.
    The Java compiler acts as your friend to figure out the error details. For example,
    it may point out a line number (where the error is encountered) and display a
    brief description of the error. Once you correct it, you need to recompile it
    to check whether the updated program is ready for execution. Sometimes, you may
    need to fix multiple errors, and, as a result, multiple recompilations may be
    needed. The Java compiler will not generate the class file if it finds these kinds
    of errors in your program.


    Let’s consider some typographical errors in the following program:


    ```

    package java2e.chapter10;

    class IncorrectClass //{

    void SampleMethod() {

    System.out.println("Semicolon missing") //error

    }

    }

    ```


    Here, the Java compiler will display error messages. In Eclipse, you can see the
    error description and the corresponding line numbers, as shown in Figure [10-1](#433474_2_En_10_Chapter.xhtml#Fig1).


    ![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig1_HTML.jpg](images/433474_2_En_10_Chapter/433474_2_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Two typographical errors in Eclipse IDE


    So, you can see that you missed the bracket `{` after the class definition and
    you forgot to put a semicolon at the end of line number 5.


    This type of error is common but sometimes hard to find with human eyes at the
    very beginning. So, the Java compiler will rescue you in these situations.


    On the other hand, runtime errors are challenging. In this case, you get a green
    signal from the compiler, and on successful compilation you get the `.class` file,
    but your program still produces wrong results and may terminate prematurely. Here
    are some examples of runtime errors that can be caused by the following operations:


    *   Dividing an integer by 0


    *   Trying to access an array element that is out of bounds of an array


    *   Using a null object to invoke a method


    *   Trying to do invalid conversions, such as trying to convert an invalid string
    to an integer


    Intentionally in some places, I am using the term *mistake* instead of *error*.
    The reason will be revealed to you shortly.'
