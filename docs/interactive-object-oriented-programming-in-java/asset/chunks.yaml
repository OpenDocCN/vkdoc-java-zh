    \ Science + Business Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is\
    \ a Delaware corporation.\n\n*Dear Reader,*\n\n*You motivate me with your nice\
    \ and loving comments, you hurt me with your extremely critical comments, but\
    \ in the end you help me to become a better person and a better author. So, this\
    \ book is dedicated to you.*\n\n## Foreword\n\nIt is an absolute honor and privilege\
    \ to write this foreword for Vaskaran’s latest book, *Interactive Object-Oriented\
    \ Programming in Java: Learn and Test Your Programming Skills*.\n\nI have known\
    \ Vaskaran for many years now. From studying in the same institutions, such as\
    \ Presidency University (formerly Presidency College) and Vidyasagar University,\
    \ to working in the IT industry, we tread our own paths in our academic and professional\
    \ careers, but he always found a way to give back to the community. This is a\
    \ unique trait, and I admire him for that.\n\nHis passion for writing and his\
    \ desire to share the knowledge he has acquired through his years of experience\
    \ in the industry are reflected in this book, where the approach to learning is\
    \ through clarifying theoretical concepts while testing one’s programming skills.\
    \ This practical approach will be invaluable to readers and will help them in\
    \ real-life programming situations in their exams, interviews, or jobs.\n\nThis\
    \ book discusses the fundamental concepts of object-oriented programming in depth,\
    \ with examples in Java. It also covers some advance concepts, including design\
    \ patterns in Java. It is an easy read, and each concept has been handled with\
    \ precision: fundamentals have been clarified for in-depth knowledge building\
    \ while demonstrations and examples have kept it interesting. Each chapter is\
    \ augmented with a Q & A Session, which will be helpful in putting things in perspective\
    \ or clearing one’s doubts by understanding the pros and cons of each of these\
    \ patterns. The “Test Your Skill in Language Basics” section will help readers\
    \ review their understanding of the fundamentals of Java before advancing their\
    \ expertise in the field.\n\nThe FAQ chapter at the end of the book is particularly\
    \ helpful in refreshing one’s knowledge and getting one in the mindset to crack\
    \ those technical interviews with confidence.\n\nThis book is a must-read for\
    \ Java developers or aspiring Java developers, as it will most certainly enhance\
    \ one’s object-oriented programming skills in Java to a great extent. For that\
    \ matter, even developers from a non-Java background can benefit from the book.\n\
    \nI wish Vaskaran and this book all the success it deserves.\n\n> Avirup Mullick\n\
    > \n> Manager, Global Operations Center, Adobe Systems\n\n## Preface\n\nIt is\
    \ my privilege to present you with *Interactive Object-Oriented Programming in\
    \ Java: Learn and Test Your Programming Skills* (Second Edition).\n\nIf you are\
    \ curious about what the most important and unique characteristics of this book\
    \ are, I would say that it is interactive and very simple. The goal was not to\
    \ demonstrate typical and tough programs using all the latest features of Java.\
    \ On the contrary, the true goal is to fuel your creativity by using the core\
    \ constructs in Java. The word *core* is more important than *the latest* when\
    \ you learn a new technology. Whatever is the latest today will be outdated tomorrow.\
    \ But core concepts are evergreen.\n\nThis book focuses on the implementation\
    \ of object-oriented programming concepts using the most basic features of Java\
    \ so that you don’t need to be familiar with advanced Java topics. The examples\
    \ are simple and straightforward. I believe that these examples are written in\
    \ such a way that even if you are familiar with another popular language, such\
    \ as C#, C++, and so on, you can still easily grasp the concepts in this book.\n\
    \nYou’ll probably agree that when you travel an unknown path to a destination,\
    \ it can help if you get a loving and caring guide. Learning a new programming\
    \ language through a book is also a journey, a fact that was always on my mind\
    \ as I wrote. So, in this book, I did not explain a topic in only an informative\
    \ way. Instead, I made this book interactive, with one or more “Q&A Sessions”\
    \ in each chapter. These sessions will not only assist you in your learning process,\
    \ but can also act as a “doubt-clearing session” because they will feel like you\
    \ are asking your guide some questions (or expressing your doubts) and that you\
    \ are receiving the answers from him in a simple one-to-one communication. In\
    \ addition to this, in most of the cases, you’ll get a full demonstration of a\
    \ program with output analysis so that you can get the maximum benefit.\n\nIn\
    \ short, the aim of this book is to help you to get a feel of a Java classroom\
    \ environment. I have been involved in teaching since 2005. I have taken classes\
    \ in both engineering and non-engineering colleges. And, fortunately, most of\
    \ my teaching involvement was based on Java and its advanced topics. That is the\
    \ true motivation for why I wanted to introduce a book like this. Before you jump\
    \ into the topics, let me highlight a few points about the book, its chapters’\
    \ organization, and the intended readers.\n\nThe book has three major parts. The\
    \ first nine chapters make up Part 1, in which you will see the discussion and\
    \ implementation of object-oriented concepts in Java. Part 2 consists of five\
    \ more chapters (from Chapter [10](#433474_2_En_10_Chapter.xhtml) to Chapter [14](#433474_2_En_14_Chapter.xhtml)).\
    \ In Part 2, you will explore something from “Advanced Java,” where you will learn\
    \ about exception handling, multi-thread programming, generic programming, and\
    \ JDBC programming. In Chapter [14](#433474_2_En_14_Chapter.xhtml), you will get\
    \ to know about the feature evolution path, where you will experiment with important\
    \ features that come in different versions of Java. But I have picked only those\
    \ features that enhance what you will learn in Part 1 of the book, so that you\
    \ can understand how these upgraded features can make your programming life easier.\
    \ Finally, in Part 3 of the book, you will learn about some real-world implementation\
    \ using three important design patterns. Part 3 also consists of a chapter of\
    \ FAQs, which is basically a subset of all the Q&A Sessions in this book. It can\
    \ provide a quick review of all the topics that you learn in this book.\n\nThe\
    \ target readers for this book are those who know the basic language constructs\
    \ in Java and how to compile or run a simple Java application. This book does\
    \ not invest time in topics that are easily available online, such as how to install\
    \ Eclipse on your system, or how to write a “Hello World” program in Java, or\
    \ how can you use an `if-else` statement or a `while` loop in your Java program\
    \ and so forth. Instead, the book starts with a discussion in object-oriented\
    \ programming. So, I expect that before you enter into Chapter [1](#433474_2_En_1_Chapter.xhtml),\
    \ you will be familiar with simple Java programs and your coding environment is\
    \ ready. My discussion with you starts with the object-oriented concepts you can\
    \ use in Java. Here, I focus on the fundamental features of Java, and I also explain\
    \ how these concepts can be learned and used effectively.\n\nBut do not worry!\
    \ To assist you with asking/thinking better questions in doubt-clearing sessions,\
    \ an entire section is added at the end of the book (Appendix A). This appendix\
    \ discusses some key concepts in Java and helps you evaluate your skills in the\
    \ language basics. You may need to come back to this section many times because\
    \ it acts as a reference. Even if you do not know all of these topics, gradually,\
    \ upon repeated practice, you will become familiar with them. So, if you are new\
    \ to programming or if you have some idea about other programming languages, this\
    \ section can assist you a lot. It can also help you prepare for a job interview\
    \ or an examination by answering some tricky questions that may seem very easy\
    \ at the beginning.\n\nI said earlier that in this book each chapter contains\
    \ one or more Q&A Sessions, which will give you a feel of learning in a classroom\
    \ environment—where your teacher will discuss some problems or topics, ask you\
    \ questions, and allow you to ask counter questions. If you are dedicated to this\
    \ subject and think deeply about the questions and the corresponding answers,\
    \ you will surely develop confidence in this language.\n\nIn a semester, you need\
    \ to attend a certain number of lectures to complete the fundamental topics, and\
    \ you know that learning is a continuous process. So, this book is not for those\
    \ who want to learn Java in 24 hours or in 7 days. It is up to you only. I can\
    \ only say that the book is designed for you in such a way that upon its completion,\
    \ you will have developed an adequate knowledge of the topic, you will have learned\
    \ the key features of this powerful language and object-oriented programming,\
    \ and you will have learned how you should write programs in Java and, most important,\
    \ how to go further.\n\nI have taken care to provide codes that are compatible\
    \ with all the latest versions of Java. Also, it is not mandatory for you to learn\
    \ Eclipse. You can simply run these programs in your preferred IDE (integrated\
    \ development environment). I have chosen Eclipse because it is widely used to\
    \ develop Java applications.\n\nPlease remember that as you learn about these\
    \ concepts, try writing your own code; only then will you master this area. You\
    \ can always share your comments to truly complete this book and enhance your\
    \ future work.\n\nYou will be able to download all the source code of the book\
    \ from the publisher’s website. I have a plan to maintain the “Errata” and, if\
    \ required, I can also make some updates/announcements there. So, it is suggested\
    \ that you visit those pages to receive the corrections or updates, if any.\n\n\
    Lastly, I hope that this enhanced edition can provide more help to you and that\
    \ you will like the book.\n\n### Who Is This Book For?\n\nIn short, **you can\
    \ pick** this book if the answer is “yes” to the following questions:\n\n* Are\
    \ you familiar with basic constructs in Java?\n* Do you know how to set up your\
    \ coding environment?\n* Do you want to explore object-oriented programming step-by-step?\n\
    * Do you want to review your understanding of basic programming skills in Java?\n\
    * Do you want to explore something from advanced Java (for example, generic programming,\
    \ JDBC Programming, multi-thread programming, etc.)?\n* Are you interested to\
    \ know about some real-world implementation techniques?\n\nProbably you **shouldn’t\
    \ pick** this book if the answer is “yes” to any of the following questions:\n\
    \n* Are you totally new to Java?\n* Are you looking for all the advanced concepts\
    \ in Java in depth?\n* Are you interested in exploring only the latest features\
    \ of Java?\n* Do you dislike a book that has an emphasis on Q&A sessions?\n* “I\
    \ do not like Windows and Eclipse. I want to learn Java without them.” Is this\
    \ statement true for you?\n\n### Guidelines for Using This Book\n\nHere are some\
    \ suggestions so you can use this book more effectively:\n\n* If you are confident\
    \ with the topics covered in Appendix A, you can start with Chapter [1](#433474_2_En_1_Chapter.xhtml)\
    \ of the book. I suggest you go through the chapters sequentially. Some fundamental\
    \ questions may be discussed in the Q&A Session of a previous chapter, and I have\
    \ not repeated those in the later chapters.\n* These programs are tested with\
    \ Java 8 (update 172), and I have used Eclipse IDE in a Windows 10 environment.\
    \ When I started the second edition of the book, Photon was the latest edition\
    \ of Eclipse (released June 27, 2018), Java 8 was the long-term support (LTS)\
    \ version, and Java 10 was the rapid-release version. Java 11 is the next LTS\
    \ version after Java 8 and was planned for September 2018. But as it turned out,\
    \ by the time I finished my work, Java 13 and Eclipse Java 2019-09 had been released.\
    \ But all these versions’ details should not matter to you, because I have used\
    \ the most basic constructs of Java. So, I believe that these codes should execute\
    \ smoothly in the upcoming versions of Java/Eclipse as well. To experiment with\
    \ this, I tested some portions of these codes in different systems and different\
    \ environments (including online editors), and I always received the expected\
    \ output. With these experiments, I believe that the results should not vary in\
    \ other environments as well, but you know the nature of software—they can misbehave\
    \ and surprise you. So, I recommend that if you want to see the exact same outputs\
    \ that are shown in the book, it will be better if you can mimic the same environment.\n\
    * There is an exception for Chapter [14](#433474_2_En_14_Chapter.xhtml) codes.\
    \ Some of them use the latest Java features, and my Eclipse environment was not\
    \ ready to accommodate the changes. So, I executed some programs with the latest\
    \ features in a command-line environment. You can do the same.\n* In some examples,\
    \ to draw class diagrams, ObjectAid Uml Explorer is used in the Eclipse editor.\
    \ It is a lightweight tool for Eclipse. At the time of this writing, it is free\
    \ if you want to draw the class diagrams, but to draw the sequence diagrams, you\
    \ will need to purchase a license. The online link [`http://www.objectaid.com/home`](http://www.objectaid.com/home)\
    \ can give you the details of these licenses and terms and conditions.\n\n###\
    \ Conventions Used in This Book\n\nAll programs in this book are organized under\
    \ package statements like the following:\n\n```\npackage java2e.chapter2;\nclass\
    \ ClassEx1 {\n// Field initialization is optional.\n// Here myInt is initialized\
    \ with the value 25.\npublic int myInt = 25;\n// In the following case, it will\
    \ be initialized with default //value 0.\n}\npublic class Demonstration1 {\npublic\
    \ static void main(String[] args) {\nSystem.out.println(\"***Demonstration-1\\\
    . A class demo with 2 objects ***\");\nClassEx1 obA = new ClassEx1();\nClassEx1\
    \ obB = new ClassEx1();\nSystem.out.println(\"obA.myInt = \" + obA.myInt);\nSystem.out.println(\"\
    obB.myInt = \" + obB.myInt);\n}\n}\n```\n\nIt simply says that there is folder\
    \ classed `java2e`, inside which is another folder `chapter2`, and you are storing\
    \ `Demonstration1.java` inside it. So, the `Demonstration1.class` and `ClassEx1.class`\
    \ files should be available there. You’ll learn about Java packages in Chapter\
    \ [7](#433474_2_En_7_Chapter.xhtml). Once you’re familiar with them, you’ll acknowledge\
    \ that it is always a better practice to organize your codes with packages.\n\n\
    But when you start learning the concepts, to compile and run the programs, **the\
    \ package statements are NOT mandatory for you.** So, initially you can play with\
    \ all these programs without the package statements. And, you may store your programs\
    \ in your preferred location, so, at your end, you may need to modify the package\
    \ statements when you use them.\n\nAll the outputs and codes of the book follow\
    \ the same font and structure. To draw your attention, in some places, I have\
    \ made them bold like the following:\n\n```\n***Demonstration-17.A comparison\
    \ study:Using a final class vs using a private constructor***\nCalled the private\
    \ constructor.\nSetting the default the value x=10.\nExit-private non-parameterized\
    \ constructor.\nUpdating the default value of x.\nExit-parameterised constructor.\n\
    The parent.x=15\nCalled the private constructor.\nSetting the default the value\
    \ x=10.\nExit-private non-parameterized constructor.\nUpdating the default value\
    \ of x.\nExit-parameterised constructor.\nThe child.x=2\nThe child.y=3\n```\n\n\
    ### Acknowledgments\n\nAt first, I thank the Almighty. I sincerely believe that\
    \ with *his* blessings only, I completed this book. I also extend my deepest gratitude\
    \ and thanks to the following:\n\n**Ratanlal Sarkar** and **Manikuntala Sarkar**:\
    \ My dear parents, with your blessings only, could I complete this work.\n\n**Indrani**,\
    \ my wife, and **Ambika**, my daughter: Sweethearts, once again, without your\
    \ love I could not proceed at all. I know that we needed to limit many social\
    \ gatherings and invitations so I could complete this work on time, and each time\
    \ I promised you that I would take a long break and spend more time with you.\n\
    \n**Sambaran**, my brother: Thank you for your constant encouragement toward me.\n\
    \n**Yogesh**: You are technical advisor for this second edition. I know that whenever\
    \ I was in need, your support was there. Thank you one more time.\n\n**Shekhar**\
    \ and **Anupam**: My friends and technical advisors in the previous edition of\
    \ this book. Though this time you were not involved, I still acknowledge your\
    \ support and help in the development of *Interactive Object-Oriented Programming\
    \ in Java*, First Edition.\n\n**Avirup Mullick**: I first met you in 1998. You\
    \ were my college senior. A special thanks to you for taking time to write a foreword\
    \ for my book. From the moment experts like you agreed to write for me, I got\
    \ additional motivation to enhance the quality of my work.\n\n**Celestin**: Thanks\
    \ for giving me another opportunity to work with you and Apress.\n\n**April**,\
    \ **Nirmal**, **Arockia Rajan**, **Ramraj**, **Chinnaparaj**, and **Vinoth**:\
    \ Thank you for your exceptional support to beautify my work.\n\nLastly, I extend\
    \ my deepest gratitude to my publisher, the editorial board members, and everyone\
    \ who directly or indirectly supported this book."
