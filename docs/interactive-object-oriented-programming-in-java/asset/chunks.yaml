    图 15-17


    步骤 4


    5.  从此刻起，只有 Observer1 和 Observer3 会收到来自主题的通知。见图 15-18。


    现实生活示例

    我们可以想象一位拥有众多粉丝的名人。这些粉丝中的每一位都想获得这位名人的所有最新动态。当他们失去兴趣时，他们就不再关注那位名人。在这里，你可以将每个粉丝视为一个观察者，而名人则是一个主题。


    编码示例

    考虑一个简单的基于 UI 的示例，其中 UI 连接到一个数据库。用户可以通过该 UI 执行搜索查询，在搜索数据库后，结果会反映在 UI 中。在这里，你将 UI
    与数据库分离，这样如果数据库发生更改，UI 会收到通知，并可以根据更改更新其显示。

    你甚至可以简化上述场景。你可以简单地假设自己是负责维护组织中某个特定数据库的人。因此，每当数据库内部发生更改时，你很可能希望收到通知，以便在需要时及早采取行动。


    注意

    你可以在事件驱动的软件中使用此模式。像 Java 和 C# 这样的现代计算机语言为处理事件提供了内置支持，让你的工作更轻松。Java 事件监听器就是观察者。这些观察者可以实现
    `Observer` 接口，该接口有一个 `update()` 方法：

    `void update(Observable o,Object arg)`。每当被观察对象发生更改时，就会调用此方法。你可以调用 `Observable`
    对象的 `notifyObservers()` 方法来通知观察者这些更改。`addObserver(Observer o)` 方法可以添加一个观察者，而 `deleteObserver(Observer
    o)` 方法可以删除一个观察者。你可以使用 `deleteObservers()` 方法删除所有观察者。这些类似于前面讨论的 `register` 和 `unregister`
    方法。


    图示

    现在，让我们直接进入我们的示例。在这里，我创建了三个观察者和一个主题。主题为其所有注册用户维护一个列表。当主题中的标志值发生变化时，我们的观察者希望收到通知。通过输出，你会发现当标志值分别更改为
    5、50 和 100 时，这些观察者会收到通知。但是，当标志值更改为 50 时，其中一个观察者没有收到任何通知，因为当时它不是一个注册用户。但后来它注册了自己，以便从主题接收进一步的通知。最后，所有观察者都取消了注册，因此当主题中的标志值更改为
    500 时，没有一个观察者收到通知。

    在此实现中，方法 `register()`、`unregister()` 和 `notifyRegisteredUsers()` 具有其通常的含义。`register()`
    方法用于在主题的通知列表中注册一个观察者；`unregister()` 方法用于从主题的通知列表中移除一个观察者；而 `notifyRegisteredUsers()`
    方法用于在主题中发生典型事件时通知所有已注册的用户。


