    //some code

    }

    ```


    因为我们是从非同步版本开始的，所以在接下来的演示中，我已将代码的同步部分注释掉了。


    假设在 `display()` 内部有一些共享资源。为简单起见，我放入了一些简单的语句来指示线程的进入和退出。为了精确观察效果，我还在方法体内放入了一个简单的
    `sleep` 语句。它可以帮助你将执行切换到另一个线程。


