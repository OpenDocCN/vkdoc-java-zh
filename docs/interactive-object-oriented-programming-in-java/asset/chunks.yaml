- fmt: '### Q&A Session


    **2.12 Why do I need vararg methods?**


    They give you the flexibility to pass some default arguments to a method. As a
    result, you are not bound to supply a certain number of arguments to invoke a
    particular method.


    **2.13 Can you give examples of some vararg methods in the Java library?**


    The methods `printf()` and `format()` are very common in this context. So, in
    the prior demonstration, you could use the following code snippet:


    ```

    //System.out.println("You have passed " + vararg.length + " arguments now.");

    System.out.print(String.format("%s, you have passed %d arguments now.","Dear reader",vararg.length));

    ```


    to get an output like the following:


    ```

    *** Methods with variable-length argument demo ***

    Dear reader, you have passed 2 arguments now.

    Sum of 57 and 63 is : 120

    Dear reader, you have passed 3 arguments now.

    Sum of 57, 63 and 70 is : 170

    Dear reader, you have passed 4 arguments now.

    Sum of 57, 63, 50 and 70 is : 240

    ```


    **2.14 What are the alternatives to vararg methods?**


    In earlier days (prior to Java 5), developers had the two choices. Either they
    could put the arguments inside an array and then pass the array to the methods,
    or they could use the concept of overloading. The first approach was preferred
    if the argument list was big or unknown prior to execution. You will learn the
    concept of overloading in more detail shortly.


    **2.15 In OOP, I see that code is always bundled inside objects. What are the
    benefits of this type of design in real-world scenarios?**


    There are many advantages. Think of a real-world scenario; for example, consider
    your laptop or your printer. You can reuse the parts of these devices in a similar
    model of laptop or printer.


    If any of the parts in your laptop malfunction, or, let’s say, if your print cartridge
    runs out of ink, you can simply replace those parts. You do not need to replace
    the entire laptop or the entire printer.


    You likely also agree that you may not be interested in knowing the inner details
    of how those parts actually function. If those parts are working fine and able
    to serve your needs, you are simply happy.


    In object-oriented programming, objects play the same role: they can be reused,
    and they can be plugged in. At the same time, they can hide the implementation
    details. For example, in Demonstration *5*, when a client invokes the `sum()`
    method with two integer arguments (57 and 63), he gets the sum of those integers.
    As an outside user, he is unaware of the inner mechanisms of the `sum()` method.
    So, you can provide a level of security by hiding information from the outside
    world.


    Lastly, consider another point from the coding perspective. Let’s assume the following
    scenario: you need to store employee information in your program. If you start
    coding like this:


    ```

    string empName= "emp1Name";

    string deptName= "Comp.Sc.";

    int empSalary= "10000";

    ```


    Then for a second employee, you would write something like this:


    ```

    string empName2= "emp2Name";

    string deptName2= "Electrical";

    int empSalary2= "20000";

    ```


    And so on.


    Can you really continue like this? The answer is no. To make it simple, it is
    always a better idea to make an `Employee` class and process the information like
    this:


    ```

    Employee emp1, emp2;

    ```


    It is much cleaner and more readable, and, obviously, a better approach.


    **2.16 Does Java support destructors?**


    No. Java uses a garbage-collection mechanism to free memory. You’ll learn about
    this shortly.


