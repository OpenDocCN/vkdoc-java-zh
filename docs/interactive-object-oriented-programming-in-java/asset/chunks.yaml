    a child class constructor.

    *   Notice that `intStaticParent` kept its value and kept increasing when you
    instantiated an object a second time. But the same thing did not happen to `intInstanceParent`.
    It did not retain its last value when you instantiated another object.


    ## Method Hiding Versus Method Overriding


    In Chapter [5](#433474_2_En_5_Chapter.xhtml), Q&A 5.24, you saw a demonstration
    that differentiated hiding from overriding. At that time, you were not familiar
    with the `static` keyword in detail. So, let’s revisit the concept.


    Method hiding is an important concept in Java. The JLS11 says this:


    > *“If a class* *C* *declares or inherits a* *static* *method* *m, then* *m* *is
    said to hide any method* *m'', where the signature of* *m* *is a subsignature
    (§8.4.2) of the signature of* *m'', in the superclasses and superinterfaces of*
    *C* *that would otherwise be accessible (§6.6) to code in* *C. It is a compile-time
    error if a* *static* *method hides an instance method.”*


    To explain the concept better, I’ll demonstrate another program to compare method
    hiding with method overriding. To understand this program, you need to remember
    the following: *When a parent class and the derived class contain* `static` *methods
    with the same signature, the parent class’s static method is hidden by the derived
    class’s static method.*


    For non-static methods, method calls are decided at runtime (which object you
    are pointing to at that moment), and overriding plays its role. But in the case
    of static methods, method calls are decided at compile time only, so it is not
    dependent on which object you are pointing to at runtime. So, in Chapter [5](#433474_2_En_5_Chapter.xhtml),
    you noticed the line: “method hiding is in no way related to runtime polymorphism.”


    ### Demonstration 4


    Now let’s analyze the following demonstration and output for better understanding:


    ```

    package java2e.chapter8;

    class Parent4 {

    static void staticMethod() {

    System.out.println("I am a static method in Parent4.");

    }

    void nonStaticMethod() {

    System.out.println("A non-static method in Parent4.");

    }

    }

    class Child4 extends Parent4 {

    static void staticMethod() {

    System.out.println("Inside Child4 class, I am hiding the parent class static method.");

    }

    void nonStaticMethod() {

    System.out.println("Overriding a non-static method in Parent4.");

    }

    }

    class Demonstration4 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-4.Derived class method hides the static method
    of the parent class***\n");

    Child4.staticMethod();// Hides the parent class method

    // Checking dynamic method dispatch

    Parent4 parent = new Child4();

    Parent4.staticMethod();//Invokes parent class method

    System.out.println("xxx-Doing a bad practice.Invoking a static method on instance.-xxx");

    parent.staticMethod();//Bad practice:Invokes parent class method

    parent.nonStaticMethod();// Invokes child class method

    /* Bad practice:

    Following code can also invoke the child class static method. But you''ll receive
    the  warning message saying:

    "staticMethod() from the type Child4 should be accessed in a static way"*/

    //new Child4().staticMethod();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-4.Derived class method hides the static method of the parent
    class***

    Inside Child4 class,I am hiding the parent class static method.

    I am a static method in Parent4.

    xxx-Doing a bad practice.Invoking a static method on instance.-xxx

    I am a static method in Parent4.

    Overriding a non-static method in Parent4.

    ```


    Here, `Child4.staticMethod()` hides the parent class method. Also, you can see
    that `parent.nonStaticMethod()` invokes the child class method, but `parent.staticMethod()`
    invokes the parent class method, because, in case of method hiding, the reference
    variable (which is of `Parent` type) matters and does not depend on the actual
    calling object.'
