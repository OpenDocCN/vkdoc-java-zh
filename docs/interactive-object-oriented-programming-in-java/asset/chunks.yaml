    \ How are you?\nAfter strip() operation, str3 is :Hi, Readers! How are you?\n\
    ```\n\n# 问答环节\n\n**14.8 `isEmpty()`与`isBlank()`有何不同？**\n\n`isEmpty()`的定义是：当且仅当字符串长度为零时，它返回`true`。以下代码块可以说明这两个方法之间的区别：\n\
    \n```\n//isBlank vs isEmpty\nString nonEmpty=\" \";//a tab space\nSystem.out.println(\"\
    The nonEmpty.length()=\"+ nonEmpty.length());\nSystem.out.println(nonEmpty.isBlank());//true\n\
    System.out.println(nonEmpty.isEmpty());//false\n```\n\n当你执行这段代码时，你将得到以下输出：\n\n\
