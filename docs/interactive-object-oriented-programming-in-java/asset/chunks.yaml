    \ your understanding.\n\n```\npackage chapter12.testcodes;\nimport java.util.Arrays;\n\
    import java.util.Collections;\nimport java.util.List;\nclass Sample {\n//Case\
    \ Study-1:Wildcards in fields\nList  myList;  //valid\n//?  aField;  //Invalid\n\
    //Case Study-2:Wildcards in method parameter\n//Syntax error for ?\n//Invalid\n\
    //public void invalidMethodWithWildCardParameter(? methodParameter) {\n//Some\
    \ code\n// }\n//The following method is valid.\npublic void validMethodWithWildCardParameter(List\
    \ myParameter) {\nSystem.out.println(\"The validMethodWithWildCardParameter(List\
    \ myParameter) is a valid method.\");\n}\n//Case Study-3:Wildcards in return type\n\
    //Error: Return type for the method is missing\n// private ? methodWithWildCardReturnType()\
    \ {//Invalid\n//return null;\n//    }\n}\n//Case Study-4:Wildcards in supertype\n\
