- fmt: '# Object


    An object is an instance of a class.


    If you are familiar with the game of football (or *soccer*, as it’s known in the
    United States), you know the players who are participating in a game are selected
    for their skills in various positions. In addition to these skills, they need
    to have a minimum level of match fitness and some important athletic capabilities.
    So, when I say that Ronaldo is a footballer (a.k.a. soccer player), you can assume
    that Ronaldo has these basic abilities as well as some skills specific to football
    (even though Ronaldo is unknown to you). This is why you can simply say that `Ronaldo`
    is an object of a `Footballer` class.


    ## Note


    It may appear to you that it is a chicken-or-the-egg type of dilemma. You could
    argue that if I say, “X is playing like Ronaldo,” then in that case, Ronaldo is
    acting like a class. However, in object-oriented design, you make things simple
    by deciding who comes first, and you decide that guy is the class in your application.


    Consider another footballer, Beckham. You can assume again that if Beckham is
    a footballer, then Beckham must be excellent in many aspects of football. Also,
    he must possess a minimum fitness level to participate in a game.


    Now, let’s assume that Ronaldo and Beckham both are participating in the same
    match. It’s not difficult to predict that although both Ronaldo and Beckham are
    footballers, their playing styles and performances will be different from each
    other in that match. In the same way, in the world of object-oriented programming,
    the performance of objects can be different from each other, even though they
    belong to the same class.


    You can consider any domain. For example, you could say that your pet dogs or
    cats are objects of the `Animal` class. Similarly, your favorite car could be
    considered an object of the `Vehicle` class, your favorite novel could be considered
    an object of the `Book` class, and so on.


    In a real-world scenario, each of the objects must have two basic characteristics:
    state and behavior. If you consider the objects—Ronaldo or Beckham from the `Footballer`
    class—you may notice that they have states like “playing” or “non-playing.” In
    the playing state, they can show different skills (or behaviors)—they can run,
    they can kick, they can pass the ball, and so forth.


    In a non-playing state, the behavior will also change. In this state, they can
    take a much-needed nap, or they can eat their meals, or they can simply relax
    by doing activities like reading a book, watching a movie, and so forth.


    Similarly, a television in your home, at any moment, can be in either an “on”
    state or an “off” state. It can display different channels if, and only if, it
    is in “switched on” mode. It does not show anything if it is in “switched off”
    mode.


    So, to begin with object-oriented programming, you can ask the following questions:


    - What are the possible states of my objects?

    - What are the different functions (behaviors) that they can perform in those
    states?


    Once you get the answers to these questions, you are ready to proceed. Software
    objects follow the same pattern in any object-oriented program: their states are
    stored in fields (variables), and their capabilities (behaviors) are described
    through different methods (functions).


    Let’s do some programming exercises now. You are about to start an exciting journey.
    I will try to make things very simple. At the same time, I’ll ignore some typical
    corner cases to make your journey smooth and easy.


    You now understand that to create objects, you need to first decide in which class
    they will belong; that is, in general, if you want to create objects, you need
    to create a class first.


    ### Points To Remember


    - You start with the class, which is the architectural blueprint. A class defines
    the structure and behavior of the objects. From a single blueprint, you can construct
    multiple buildings. Similarly, from a single class, you can construct multiple
    objects (or instances). (As said before, typical corner cases are ignored when
    I make this statement. For example, a true singleton class cannot have multiple
    instances).


    - With a class, you create a new data type, and objects are used to hold the data
    (fields) and methods. Object behavior can be exposed through these methods.


    In Java, you create a class as follows:


    ```

    class A

    {

    //This is a single-line comment.

    //Here is some data, for example,

    int a;

    //Here is a method, for example,

    void someMethod()

    {

    //Some code

    }

    }

    ```


    You can see that to create a class, you need to use the `class` keyword. (The
    single-line comments `//` are used for better readability.) The class body is
    enclosed with curly braces—`{` and `}`. The data or variables inside a class are
    termed **instance** variables. You can have some methods in your class. Collectively,
    these data and methods are referred to as **class members**.


    Now, you have created a class called `A`. So, you can create an object from it.
    Let’s say your object is `obA`, which can be created with the following statement:


    ```

    A obA=new A();

    ```


    You can split the preceding statement into the following two lines:


    ```

    A obA;//Line-1

    obA=new A();//Line-2

    ```


    It is important to note that at the end of Line 1, `obA` is a **reference**. Up
    to this point, no memory has been allocated, and `obA` contains `null`. But once
    the `new` operator comes into the picture, the memory is allocated for it. So,
    at the end of Line 2, the `new` operator allocates the memory for the physical
    object and assigns a reference to it to `obA`.


    ### Points To Remember


    A class is a logical entity. Once you instantiate a class, you create objects.
    These objects occupy memory in your system. So, objects are physical entities.
    In the preceding code snippet, the `new` operator is used to create an object
    of class `A`. It allocates memory to it and returns an object of the class `A`,
    whose reference is stored in the variable `obA`.


    ## Constructor


    If you look carefully, you will observe that after the `new` keyword, the class
    name is followed by a parenthesis. You use this approach to construct an object.
    These are **constructors** that are used to run initialization codes. Constructors
    can be both parameterized and non-parameterized. So, you can pass different arguments
    to them. In simple words, constructors can vary, with a different **number** of
    parameters or different **types** of parameters. In the following example, class
    `A` has four different constructors.


    ```

    class A

    {

    public A()

    {

    System.out.println("Constructor with no parameter");

    }

    public A(int a)

    {

    System.out.println("Constructor with one integer parameter");

    }

    public A(int a,int b)

    {

    System.out.println("Constructor with two integer parameter");

    }

    public A(double a)

    {

    System.out.println("Constructor with one double parameter");

    }

    }

    ```


    If you do not supply any constructor for your class, Java will supply a default
    one for you.'
