    **5.26 Can I override an overloaded method?**


    Yes, you can. Consider the following demonstration and corresponding output.


    ### Demonstration 13


    Here is the code:


    ```

    package java2e.chapter5;

    class ParentOverloadedClass {

    public void showMe() {

    System.out.println("I am in Parent class");

    }

    public void showMe(int x) {

    System.out.println("Overloaded method in Parent.Here x= " + x);

    }

    }

    class ChildOverridingClass extends ParentOverloadedClass {

    public void showMe() {

    System.out.println("Overriding method in Child class.");

    }

    }

    class Demonstration13 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-13.Method Overriding with overloading Demo***\n");

    ChildOverridingClass childObject = new ChildOverridingClass();

    childObject.showMe();//Will call the overriding method from //derived class.

    childObject.showMe(25);//Will call the overloaded method from //parent class.

    }

    }

    ```


    Output:


    ```

    ***Demonstration-13.Method Overriding with overloading Demo***

    Overriding method in Child class.

    Overloaded method in Parent.Here x= 25

    ```


    ### Q&A Session


    **5.27 Give me some pointers so that I can easily distinguish between method overloading
    and method overriding.**


    The following points can help you to brush up on your knowledge:


    *   In method overloading, *all methods may reside inside the same class* (you
    must notice the word *may* here, because you have already seen an example [Demonstration13]
    where both method overloading and method overriding were implemented and the concept
    of method overloading spanned two classes—both the parent/super class and its
    child/derived class). In method overriding, the inheritance hierarchy of a parent
    class and a child class is involved, which means that at least a parent class
    and its child class (i.e., minimum of two classes) are involved.


    *   In method overloading, method signatures are different. In method overriding,
    method signatures are the same (no need to consider covariant return type at this
    point).


    *   You can achieve compile-time (static) polymorphism through method overloading,
    and you can achieve runtime (dynamic) polymorphism through method overriding.


    **5.28 Can you predict the output in Demonstration 14? Is there a compilation
    error?**


    ### Demonstration 14


    Here is the code:


    ```

    package java2e.chapter5;

    class QuizOnFinal {

    public void testMe() {

    System.out.println("I am in parent class");

    }

    }

    class Q4Child1 extends QuizOnFinal {

    @Override

    final public void testMe() {

    System.out.println("I am in child-1");

    }

    }

    class Q4Child2 extends QuizOnFinal {

    @Override

    public void testMe() {

    System.out.println("I am in child-2");

    }

    }

    class Quiz4 {

    public static void main(String[] args) {

    System.out.println("***Quiz on final keyword usage***\n");

    Q4Child2 obClass2 = new Q4Child2();

    obClass2.testMe();

    }

    }

    ```


    The program will compile and run successfully. You will receive the following
    output:


    ```

    ***Quiz on final keyword usage***

    I am in child-2

    ```


    You did not encounter any issues here because `Q4Child2` is not a child class
    of `Q4Child1`. It is also derived from the same parent class, `QuizOnFinal`, and
    so it has the freedom to override the non-final method `testMe()` of the parent
    class.


