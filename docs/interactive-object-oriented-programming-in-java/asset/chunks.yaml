    **6.20 Can we extend from a class and implement an interface at the same time?**


    Yes. You can always extend from one class (provided it is not final or there are
    no other similar constraints). In that case, you need to follow *positional notations*
    like the following:


    ```

    class ChildClass extends ParentClass implements Interface1,Interface2{...}

    ```


    **6.21 Is there any specific reason why the keyword** `extends` **comes before
    the keyword** `implements` **in the previous scenario?**


    Here, you are just following the recommended Java coding rules. It is always a
    better idea to point out errors (if any) as early as possible. Following this
    design, the compiler knows about the parent class first and can point out any
    compilation errors in the parent class. (Do you remember that parent class constructors
    are called before the derived class constructors?) But if you are allowed to place
    the keyword `extends` in between the `implements`, the compilation time may go
    up.


    Also, in a case like this, you can extend only one parent class, but you can implement
    any number of interfaces, so from the compiler’s point of view, it may want to
    be sure about your class’s existing methods (or fields) before you implement new
    ones.


    ## Marker Interface


    An empty interface is known as a marker interface or a tagging interface. Here
    is a sample for you (note there is no method):


    ```

    //Marker interface example

    interface MyMarkerInterface{

    }

    ```


    Some key utilities of a marker interface are as follows:


    - You can create a common parent. (When you have a common parent, you can use
    a super type reference to point to subtype objects, and it can help you to achieve
    runtime polymorphism).

    - A class can claim membership in the set; for example, if your class implements
    the `Serializable` interface, it becomes serializable. So, your class actually
    becomes an interface type through polymorphism. Even a class that implements a
    tagging interface need not define any new method, because the interface itself
    does not have any methods.


    **Note** The `java.lang.Cloneable` and `java.io.Serializable` interfaces are examples
    of marker interfaces in Java.


    ## A Quick Tour with Annotations


    In the context of marker interfaces, you should also know about annotations. A
    detailed discussion of annotations is out of the scope of this book, but in the
    following section, you’ll get a quick overview that basically covers what an annotation
    is and how you can use it effectively in your programs.


    JDK5 introduced the concept of annotations. JLS 11 says that “an annotation is
    a marker which associates information with a program construct but has no effect
    at run time.” Annotations are more popular than marker interfaces. They do not
    have any direct impact on the compiled program. An annotation simply provides
    some additional information that can be used as an alternative to a marker interface.
    These annotations can be useful to a compiler or your software tools to detect
    errors, suppress warning messages, generate XML files, and so on. Some of this
    information can be used during the program’s execution time. Initially, annotations
    were used for declaration purposes, but JDK8 added more flexibility to annotation
    type use.


    You’ll notice that an annotation starts with `@`. The simplest form of an annotation
    is `@MyAnnotation`. For example, you have used the built-in annotation `@Override`
    in some of the programs already. Here, the annotation name is `Override`. In its
    simplest form, an annotation does not contain any elements, and in such cases
    it is called a **marker annotation**. So, `@Override` is an example of a marker
    annotation. `@Deprecated`, `@SuppressWarning`, and `@Override` are pre-built annotations
    in `java.lang`.


    ### Demonstration 8


    To mark a deprecated method, you can use `@Deprecated` like in the following.
    To show you the visual behavior in Eclipse, notice the struck-though interface
    method—`oldMethod()`—in Figure [6-7](#433474_2_En_6_Chapter.xhtml#Fig7).


    ![../images/433474_2_En_6_Chapter/433474_2_En_6_Fig7_HTML.jpg](images/433474_2_En_6_Chapter/433474_2_En_6_Fig7_HTML.jpg)


    Figure 6-7


    A snapshot for a deprecated method in the Eclipse IDE


    Now, go through a sample demonstration that uses different annotations.


    ```

    package java2e.chapter6;

    interface AnnotationDemo {

    /**

    * @deprecated Please use the newMethod() instead of the oldMethod.

    */

    @Deprecated

    void oldMethod();

    void newMethod();

    }

    class MyClass8 implements AnnotationDemo {

    @Override

    public void oldMethod() {

    System.out.println("The oldMethod() is in action.");

    }

    @Override

    public void newMethod() {

    System.out.println(" The recommendation is to use this updated method-newMethod().");

    }

    }

    ```


    You can see the warning messages that result from the use of a deprecated method.
    You can always change your IDE settings. For example, if you wish to get an error
    message, choose the option “Error” instead of “Warning,” as shown in Figure [6-8](#433474_2_En_6_Chapter.xhtml#Fig8).
    I have made some additional changes to the default settings. All these changes
    are shown for your reference.


    ![../images/433474_2_En_6_Chapter/433474_2_En_6_Fig8_HTML.jpg](images/433474_2_En_6_Chapter/433474_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    A snapshot from Eclipse IDE to demonstrate the usage of a deprecated method


    ### Note


    You can also use `@Deprecated` to mark a deprecated element in Javadoc. As per
    the suggested guideline, this tag should be followed by a newline or a space.
    You should also explain why you marked it as a deprecated element and what the
    recommended alternative is.


    Annotations can be applied to other annotations, and in that case they are called
    **meta-annotations**. `@Retention`, `@Documented`, `@Target`, and `@Inherited`
    are examples of meta-annotations that are defined in `java.lang.Annotation`.


    In short, by using annotations you can add some metadata information to your source
    code. To understand the use of an annotation clearly, let’s look at an example.
    Let’s say you are a software developer who puts the following comments in every
    time you write a method or a class:


    ```

    //Author Sarcar V

    //Current version: Revision number, say 1

    ```


    But if you are familiar with annotations, you may start with something like the
    following. In this case, I am supplying some default values, which is optional
    for you.


    ```

    @interface SoftwareDetails{

    String author() default "Sarcar V";

    int currentVersion() default 1;

    }

    ```


    Notice that by default, the `author` is *Sarcar V* and `currentVersion` is 1.
    Once defined, you can use this annotation in a method like the following:


    ```

    @SoftwareDetails(author="Vaskaran", currentVersion=2)

    public void myMethod2() {

    System.out.println("Method-2");

    }

    ```


    In this case, the author is *Vaskaran* and `currentVersion` is 2. Similarly, you
    can apply the annotation to a class.


    ### Note


    The application of annotations is not limited to declarations of classes or methods.
    You can use them in fields or other program elements also. By convention, each
    annotation appears on its own line.


    There is a special case to consider. It is called **single-member annotation**.
    It has the following characteristics:


    - It has only one element.

    - Since there is only one member, instead of specifying the name of the member,
    you can simply name it as `value()`, like the following:


    ```

    //A single-member annotation

    @Documented

    @interface MyReviewerDetails{

    //It is single-member annotation. By convention, you use

    //the name value().

    String value();//You need to supply a reviewer name.

    }

    ```


    Now you can use it in a method, like the following:


    ```

    @MyReviewerDetails("Joe")

    public void myMethod3() {

    System.out.println("A single-member annotation is applied to myMethod3()");

    }

    ```'
