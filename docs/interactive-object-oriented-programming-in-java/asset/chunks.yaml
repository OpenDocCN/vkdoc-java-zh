    ## 2.9 These references are similar to C/C++ pointers. Is this correct?


    Nope. Java is different from C/C++. It may appear that references are a special
    kind of pointer. But you must note the key difference between these two. With
    a pointer, you can point to any address (basically, it is a number slot in the
    memory). So, it is quite possible that with a pointer, you will point to an invalid
    address, and then you may encounter unwanted outcomes during runtime. A reference
    variable can point either to valid addresses or to `null`. Also, you cannot do
    arithmetic on reference variables. It is also important how you interpret the
    word “point.” For example, some developers prefer to use the word “refer” instead
    of “point” in a similar context.


    ## 2.10 Can I have multiple reference variables that refer to the same object
    in memory?


    Yes. The following type of declaration is perfectly fine:


    ```

    ConsEx2 ob1 = new ConsEx2(25);

    ConsEx2 ob2 = ob1;

    ```


    ### Demonstration 3


    In the following example, I have created two objects of the same class, but the
    instance variable (`i`) is initialized with different values. To do this job,
    I have used a parameterized constructor that can accept one-integer argument.


    ```

    package java2e.chapter2;

    class ClassEx3

    {

    public int i;

    public ClassEx3(int i)

    {

    this.i = i;

    }

    }

    class Demonstration3 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-3.A class demo with 2 objects ***");

    ClassEx3 obA = new ClassEx3(10);

    ClassEx3 obB = new ClassEx3(20);

    System.out.println("obA.i =" + obA.i);

    System.out.println("obB.i =" + obB.i);

    }

    }

    ```


    Output:


    ```

    ***Demonstration-3.A class demo with 2 objects ***

    obA.i =10

    obB.i =20

    ```


    ## 2.11 What is the purpose of the `this` keyword?


    Sometimes you need to refer to the current object, and to do that, you use the
    `this` keyword. In the preceding example, instead of using the `this` keyword,
    you could also write something like the following to achieve the same result:


    ```

    class ClassEx3 {

    int i;// instance variable

    ClassEx3(int myInteger)// myInteger is a local variable

    {

    i = myInteger;

    }

    }

    ```


    As per Java’s operator precedence table, the assignment operator (`=`) has associativity
    that runs right to left. (Associativity tells the direction of an operator’s execution.)
    So, you are familiar with code like `a = 25;` where you are assigning 25 to `a`.
    But are you familiar with code like `25 = a;`? No. The compiler will raise an
    issue.


    In the preceding example, `myInteger` was your *local variable* (seen inside methods,
    blocks, or constructors), and `i` was your *instance variable* (declared inside
    a class but outside a method, block, or constructor).


    So, instead of `myInteger`, if you use `i`, you need to tell the compiler about
    your direction of assignment. It should not be confused with “which value is assigned
    where?” Here, you are assigning the value of the local variable to the instance
    variable, and the compiler should clearly understand your intention. With the
    statement `this.i = i;`, the compiler clearly understands that the instance variable
    `i` should be initialized with the value of the local variable `i`.


    Also, consider this. Suppose, by mistake, you have written something like `i =
    i;` in the preceding scenario. There will be confusion from the compiler’s point
    of view because it will see that you are dealing with two local variables that
    are the same. (Although your intention was different, and you meant that the `i`
    on the left side is the field and the other one is the method parameter.) Now,
    if you create an object, `obA` for `ClassA`, try to see the value of `obA.i`,
    with following code:


    ```

    ClassEx3 obA = new ClassEx3(20);

    System.out.println("obA.i =" + obA.i);

    ```


    You will get `obA.i = 0` (the default value of an integer) in the output. So,
    your instance variable cannot get your intended value of 20. The Eclipse IDE also
    raises a warning in this case. See Figure [2-1](#433474_2_En_2_Chapter.xhtml#Fig1).


    ![../images/433474_2_En_2_Chapter/433474_2_En_2_Fig1_HTML.jpg](images/433474_2_En_2_Chapter/433474_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    The warning message for the statement `i = i;` in the constructor body of `ClassEx3`


    ### Point To Remember


    If your local variable has the same name as the instance variable, the local variable
    will hide the instance variable. In this type of scenario, the keyword `this`
    helps to resolve the namespace collision because it helps to identify which one
    is a local variable (method parameter) and which one is the instance variable
    (field). For your reference, the local variable and instance variable are marked
    with commented lines in the Q&A 2.11 code segment.'
