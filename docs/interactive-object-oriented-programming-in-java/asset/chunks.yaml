    # 11. Thread Programming


    The Java programs that you have seen so far have had a single sequential flow
    of control; in other words, once the program starts executing, it goes through
    all statements sequentially until the end. So, in a particular moment, there is
    only one statement under execution.


    A thread is similar to a program. It has a single flow of control. It also has
    a body between the starting point and end point, and it executes the commands
    sequentially. Each program has at least one thread.


    Java supports the concept of multi-threading; that is, in Java you can have multiple
    flows of control in a program. In those cases, each flow of control is called
    a thread, and these threads can run in parallel. In a multi-threaded environment,
    each thread has a unique flow of execution.


    It’s a programming paradigm where a program is divided into multiple subprograms
    (or parts) that can be implemented in parallel. But if the computer has only one
    processor, how can it perform multiple things in parallel? In actuality, the processor
    switches among these subprograms/parts very fast, so it appears to human eyes
    that all of them are executing simultaneously.


    Multi-threading can be considered a special case of multi-tasking. It is important
    to note the difference between process-based multi-threading and thread-based
    multi-threading. Let’s investigate what is stated in a theoretical operating system
    book. Table 11-1 shows the key distinctions between a process and a thread.


    **Table 11-1** Comparison Between a Process and a Thread


    | Process | Thread |

    | --- | --- |

    | 1. Unit of allocation | 1. Unit of execution |

    | 2. Architectural construct | 2. Coding construct—does not affect architecture
    |

    | 3. Each process has one or more threads. | 3. Each thread belongs to one process.
    |

    | 4. Inter-Process Communication (commonly stated as IPC)—expensive due to context
    switching | 4. Inter-Thread Communication—cheap, can use process memory, and may
    not need context switch |

    | 5. Secure—one process cannot corrupt another process | 5. Not secure—a thread
    can write in the memory used by another thread |


    So, a thread is simply a lightweight process, and context switching between threads
    is inexpensive. Process-based multi-tasking is not under Java’s control, but Java
    can manage thread-based multi-tasking. So, in this chapter, we’ll focus on thread-based
    multi-tasking, and from this point onward, I’ll simply refer to it as multi-threading.


    Managing a multi-thread environment can be challenging, but it’s a boon for you
    because you can complete the task much faster and reduce the overall idle time
    significantly. Consider some typical scenarios: in general, in an automated environment,
    a computer’s inputs are much faster than a user’s keyboard inputs. Or, consider
    the case when you transfer data over a network—the network transmission rate can
    be slower than the receiving computer’s consumption rate. If you need to wait
    for each task to finish before you start the next one, the overall idle time will
    be higher. So, a multi-threading environment is always a better choice in cases
    like these. Java helps you to model a multi-threaded environment efficiently.


    Figure 11-1 demonstrates a multi-threaded program, where the main thread creates
    two more threads—Thread A and Thread B—that run concurrently.


    ![../images/433474_2_En_11_Chapter/433474_2_En_11_Fig1_HTML.jpg](images/433474_2_En_11_Chapter/433474_2_En_11_Fig1_HTML.jpg)


    **Figure 11-1** In a multi-threaded program, a main thread creates two more threads,
    and all of them run in parallel


    ## Creating Threads


    Threads can be created in the following ways:


    - **Extend the `Thread` class** and override the `run()` method.

    - **Implement the `Runnable` interface**. The `Runnable` interface has only one
    method, called `run()`. So, when a concrete class implements this `Runnable` interface,
    it must override the `run()` method.


    So, you can guess that every thread must have a `run()` method. This method is
    the heart of a thread, and you can implement the behavior of the thread in the
    `run()` method’s body.


    ### Author’s Note


    If you see the implementation of the `java.lang.Thread` class, you will notice
    the following line:


    ```

    public class Thread implements Runnable {//some code}

    ```


    which means that the `Thread` class itself implements the `Runnable` interface.


    ## Extending the Thread Class


    In Demonstration 1, there are two classes—`ThreadOne` and `ThreadTwo`. Each extends
    the `Thread` class and overrides the `run()` method. But your job is not over
    yet. You need to prepare the threads to be in a state such that the Java runtime
    scheduler can run them. So, you create an object from each of these threads and
    invoke the `start()` method.


    In Demonstration 1, you will notice the following lines of code for the `ThreadOne`
    class and its object `threadOne` (notice the associated comments for your better
    understanding):


    ```

