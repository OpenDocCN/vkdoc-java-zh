  raw: '## Finalization


    Just before destroying an object and reclaiming the memory, the GC calls the `finalize()`
    method. It is a protected method defined in the `Object` class. You’ll see this
    general form of `finalize()` method :


    ```

    protected void finalize() {

    //Some code

    }

    ```


    It is suggested that you put your cleanup code (for example, closing a file, closing
    a database connection, releasing any occupied non-Java resources, etc.) inside
    this method. As a result, an object can perform some desired action just before
    it is destroyed. This process is called **finalization.**


    But the problem is that you never know when `finalize()` will be called. You only
    know that the `finalize()` method will be called just before garbage collection.
    The language specification (JLS11) tells us the following:


    > *“Finalizers provide a chance to free up resources that cannot be freed automatically
    by an automatic storage manager. In such situations, simply reclaiming the memory
    used by an object would not guarantee that the resources it held would be reclaimed.
    The Java programming language does not specify how soon a finalizer will be invoked,
    except to say that it will happen before the storage for the object is reused.”*


    So, you cannot always rely on `finalize()`, and you may implement other ways to
    release the resources. Still, there is a workaround. You can make a request to
    the garbage collector when you invoke `System.gc()` . It simply tells the GC that
    you want it to start its job.


    ### Note


    `System.gc()` is equivalent to the call `Runtime.getRuntime().gc()` because its
    definition is as follows:


    `public static void gc() {`


    `Runtime.`*getRuntime*`().gc();`


    `}`


    Now, go through the modified version of Demonstration 9 to get an idea of how
    can you use the concept of finalization.


    ### Demonstration 9


    You will learn about the `protected` keyword, the `throws` keyword, and exceptions
    later in the book. To give you an idea about the garbage collection technique,
    the complete implementation is presented here for your reference. The output of
    this demonstration should be your key area of focus.


    ```

    package java2e.chapter3;

    class StudentDemo9 {

    //Some code

    protected void finalize() {

    System.out.println("Freeing memory. The object with hashcode " + hashCode() +
    " is collected.");

    }

    }

    class GarbageCollectionDemo {

    public static void main(String args[]) throws InterruptedException {

    System.out.println("***Demonstration 9.Exploring Garbage Collection.***\n");

    //Stage-1

    StudentDemo9 student1, student2, student3;

    student1 = new StudentDemo9();// Student#1

    System.out.println("The student1.hashCode()=" + student1.hashCode());

    student2 = new StudentDemo9();// Student#2

    System.out.println("The student2.hashCode()=" + student2.hashCode());

    student3 = new StudentDemo9();// Student #3

    System.out.println("The student3.hashCode()=" + student3.hashCode());

    //Stage-2

    student1 = null;

    // Requesting JVM to run Garbage Collector

    System.out.println("Requesting GC-1");

    System.gc();

    Thread.sleep(3000);

    //Stage-3

    student3 = student2;

    // Requesting JVM to run Garbage Collector

    System.out.println("Requesting GC-2");

    System.gc();

    Thread.sleep(3000);

    //Stage-4

    student2 = null;

    // Requesting JVM to run Garbage Collector

    System.out.println("Requesting GC-3");

    System.gc();

    Thread.sleep(3000);

    student3 = null;

    // Requesting JVM to run Garbage Collector

    System.out.println("Requesting GC-4");

    System.gc();

    Thread.sleep(3000);

    }// End of main()

    }

    ```


    Here is a possible output from the modified demonstration. This output may vary
    because you never know whether GC will respond to your request or not.


    ```

    ***Demonstration 9.Exploring Garbage Collection.***

    The student1.hashCode()=366712642

    The student2.hashCode()=1829164700

    The student3.hashCode()=2018699554

    Requesting GC-1

    Freeing memory. The object with hashcode 366712642 is collected.

    Requesting GC-2

    Freeing memory. The object with hashcode 2018699554 is collected.

    Requesting GC-3

    Requesting GC-4

    Freeing memory. The object with hashcode 1829164700 is collected.

    ```


    You can review the analysis section of Demonstration 9 for a better understanding.
    The `sleep()` methods were not necessary in this demonstration but they are added
    to allow garbage collector some time to finish its job.


