    ### Q&A Session


    **5.29 Why did Java start supporting this concept?**


    The Java Oracle documentation says the following:


    > “Note that there may be more than one matching method in a class because while
    the Java language forbids a class to declare multiple methods with the same signature
    but different return types, the Java virtual machine does not. This increased
    flexibility in the virtual machine can be used to implement various language features.
    For example, covariant returns can be implemented with bridge methods; the bridge
    method and the method being overridden would have the same signature but different
    return types.”


    See [`https://docs.oracle.com/javase/8/docs/api/java/lang/Class.html#getMethod-java.lang.String-java.lang.Class...-`](https://docs.oracle.com/javase/8/docs/api/java/lang/Class.html%2523getMethod-java.lang.String-java.lang.Class...-)


    ## Use of Private Constructors


    Now, consider a case study with private constructors. If a class has only private
    constructors, it cannot be subclassed. This concept can be used to implement a
    singleton design pattern where you prevent unnecessary objects’ creation in the
    system with the use of the `new` keyword; for example, the following code snippet
    will give you a compilation error:


    ```

    class ParentClass {

    private ParentClass() {       }

    public void showMe() {

    System.out.println("Inside Parent.showMe()");

    }

    }

    class ChildClass extends ParentClass // Error

    {

    // Some code

    }

    ```


    The output is shown in Figure [5-14](#433474_2_En_5_Chapter.xhtml#Fig14).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig14_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig14_HTML.jpg)


