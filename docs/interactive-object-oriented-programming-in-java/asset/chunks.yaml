    - 当父类和派生类包含具有相同签名的静态方法时，子类的静态方法会隐藏父类的静态方法。

    - 在方法隐藏的情况下，被调用的方法版本不依赖于调用对象，而是依赖于引用类型。

    - 通过实例调用静态方法并不是推荐的做法。此处仅用于演示方法隐藏与方法重写之间的区别。


    ### Q&A Session


    **8.3 我理解在 Java 中设计上无法重写静态方法。但这一设计背后可能的原因是什么？**


    对于静态方法，方法调用仅在编译时决定；也就是说，它不依赖于运行时指向的对象。但对于非静态方法，方法调用可以在运行时决定（即取决于当时实际指向的对象）。


    ## Method Overloading


    以下演示表明你可以重载静态方法。


    ### Demonstration 5


    在此程序中，`StaticDemo5` 类包含一个不同的、重载版本的 `showMe()` 方法。


    ```java

    package java2e.chapter8;

