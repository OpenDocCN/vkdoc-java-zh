    ## Demonstration 3


    This demonstration shows the use of the `PreparedStatement` object. `PreparedStatement`
    is an interface that extends the `Statement` interface. The use of `PreparedStatement`
    can provide you the following facilities:


    *   You can use parameterized SQL statements.

    *   You can reuse the statement with new values.

    *   You can provide batch processing and faster execution.


    In the following example, you will notice the use of the following lines:


    ```

    PreparedStatement preparedStatementOb=null;

    preparedStatementOb=connectionOb.prepareStatement("insert into Employee values(?,?,?,?)");

    ```


    You can see that a `PreparedStatement` object is created with four input parameters.
    Notice the four question marks (`?`). These are the placeholders for your inputs.
    You provide values to replace these question marks before you execute a `PreparedStatement`
    object. You can supply values using the setter methods defined in the `PreparedStatement`
    class. In the upcoming demonstration, you will supply a new record (where employee
    name is “Ivan”) using the following statements:


    ```

    preparedStatementOb.setInt(1,4);

    preparedStatementOb.setString(2,"Ivan");

    preparedStatementOb.setInt(3,27);

    preparedStatementOb.setDouble(4,975.6);

    ```


    It is important to note that the first argument of these setter methods specifies
    the question mark placeholder. For example, the two `setInt()` calls specify the
    first and third placeholders, respectively; `setString()` specifies the second
    placeholder; and `setDouble()` specifies the fourth placeholder.


    Finally, you will invoke the `executeUpdate()` method on the `PreparedStatement`
    object as follows:


    ```

    preparedStatementOb.executeUpdate();

    ```


    Now, go through the following demonstration and its corresponding output:


    ```

