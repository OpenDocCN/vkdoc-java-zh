    from multiple interfaces, where each interface has its own default implementation
    with the same method name, the class needs to implement its own implementation
    for the same-named method, otherwise you’ll receive a compilation error.


    ### Demonstration 11


    In this demonstration, each of the interfaces has a default method named `myDefaultMethod()`.
    Now, `Class11` implements both the interfaces—`DefaultInterface11A` and `DefaultInterface11B`.
    So, to avoid the conflict, it must provide its own implementation for `myDefaultMethod()`,
    otherwise you’ll receive the following compile-time error:


    *   `"Duplicate default methods named myDefaultMethod with the parameters () and
    () are inherited from the types DefaultInterface11B and DefaultInterface11A"`


    ```

    package java2e.chapter6;

    interface DefaultInterface11A {

    void show();

    default void myDefaultMethod() {

    System.out.println("Default implementation for interface3 is called.");

    }

    }

    interface DefaultInterface11B {

    void show();

    default void myDefaultMethod() {

    System.out.println("Default implementation for interface4 is called.");

    }

    }

    class Class11 implements DefaultInterface11A, DefaultInterface11B {

    public void show() {

    System.out.println("Class11 is implementing the Interface method-show().");

    }

    @Override

    public void myDefaultMethod() {

    System.out.println("Class11 needs to implement this method.");

    }

    }

    class Demonstration11 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-11.Avoiding diamond problem when default
    methods are involved***\n");

    System.out.println("Using DefaultInterface11A reference:");

    DefaultInterface11A interfaceOb11A = new Class11();

    interfaceOb11A.show();

    interfaceOb11A.myDefaultMethod();

    System.out.println("----------------------");

    System.out.println("Using DefaultInterface11B reference:");

    DefaultInterface11B interfaceOb11B = new Class11();

    interfaceOb11B.show();

    interfaceOb11B.myDefaultMethod();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-11.Avoiding diamond problem when default methods are involved***

    Using DefaultInterface11A reference:

    Class11 is implementing the Interface method-show().

    Class11 needs to implement this method.


    Using DefaultInterface11B reference:

    Class11 is implementing the Interface method-show().

    Class11 needs to implement this method.

    ```


    ### Q&A Session


    **6.26 It appears to me that the default methods in the interfaces are not used
    at all in the prior program. Is there any way to call the default interface methods?**


    Definitely. You can modify the `myDefaultMethod()` for `Class11` as follows:


    ```

    @Override

    public void myDefaultMethod() {

    System.out.println("Class11 needs to implement this method.");

    // Modified for Q&A 6.26

    // Calling default method of DefaultInterface11A

    DefaultInterface11A.super.myDefaultMethod();

    // Calling default method of DefaultInterface11B

    DefaultInterface11B.super.myDefaultMethod();

    }

    ```


    If you compile and run the program again, you’ll receive this modified output.
    Notice the bold lines in the following output.


    ```

    ***Demonstration-11.Avoiding diamond problem when default methods are involved***

    Using DefaultInterface11A reference:

    Class11 is implementing the Interface method-show().

    Class11 needs to implement this method.

    Default implementation for interface3 is called.

    Default implementation for interface4 is called.


    Using DefaultInterface11B reference:

    Class11 is implementing the Interface method-show().

    Class11 needs to implement this method.

    Default implementation for interface3 is called.

    Default implementation for interface4 is called.

    ```


    **6.27 Can we make the interface final?**


    If you make the interface final, then who will implement the incomplete methods
    of that interface? You must remember that before Java 8, static methods (we’ll
    discuss them later) were not supported in interfaces. So, basically, there was
    no point to making an interface final.'
