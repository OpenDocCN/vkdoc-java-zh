  trans: "\n### 关于作者与技术审校\n\n### 关于作者\n\n### 关于技术审校\n\n# 第一部分 面向对象编程基础\n\n面向对象编程基础\n\
    \n第 1 章：面向对象编程概念\n\n第 2 章：构建基石：类与对象\n\n第 3 章：深入理解类与对象\n\n第 4 章：继承的概念\n\n第 5 章：熟悉多态\n\
    \n第 6 章：抽象类与接口：OOP 中的真正艺术\n\n第 7 章：包\n\n第 8 章：理解类变量与类方法\n\n第 9 章：OOP 原则快速回顾\n\n\
    # 1. 面向对象编程概念\n\n欢迎来到面向对象编程（OOP）的世界。在开始之前，我们先讨论一些基本问题与解答。例如，为什么需要这种编程方式？这些概念如何让你的工作更轻松？如果你知道这些问题的答案，学习之路将会变得顺畅，你也能从多个角度理解这些概念。但在开始之前，有两点警告需要告知你。\n\
    \n*   如果第一次阅读后未能完全理解所有内容，请不要失去动力。很多情况下，内容看似复杂，但你会逐渐掌握。\n\n*   许多开发者批评 OOP 的概念。但请记住，人类思维往往倾向于批评新事物。因此，即使你想批评这些概念，我建议你先正确理解它们，在各种应用中使用这些概念，然后再自行决定是赞赏还是批评。\n\
    \n现在，让我们开始这段旅程……\n\n计算机编程始于二进制代码，当时使用机械开关加载程序。不难想象，那时的程序员生活极具挑战性。为了让程序员的工作更轻松，一些高级编程语言被开发出来，这些语言使用类似英语的简单指令。但你不应忘记一个事实：计算机只能理解二进制语言的指令。因此，编译器的主要任务是将这些类似英语的指令翻译成二进制代码，最终这些高级语言逐渐流行起来。\n\
    \n随着时间的推移，计算机的容量和能力大幅提升。随后，开发者开始开发复杂的应用程序。不幸的是，当时可用的编程语言没有一种足够成熟，能够有效处理所有应用程序。一些主要关注点如下：\n\
    \n*   如何避免重复劳动？或者说，如何重用现有代码？\n\n*   如何在共享环境中控制全局变量的使用？\n\n*   当代码中存在过多跳转时（例如，在应用程序的多个地方使用\
    \ `goto` 关键字），如何进行调试？\n\n*   如何让新工程师的工作更轻松？\n\n*   如何更好地维护大型代码库？\n\n为了解决这些问题，专家级程序员开始将大问题分解为小问题。这一理念背后的思想非常简单：*如果你能解决这些小问题，最终你就能解决大问题*。因此，他们开始将大问题划分成小块，函数（或过程、子程序）的概念由此发展而来。每个函数专门解决一个小问题。因此，管理这些函数及其之间的交互成为关键焦点，**结构化编程**的概念应运而生。结构化编程大获成功，因为管理小函数很容易，调试起来也很方便。同时，开发者也开始限制全局变量的使用，在大多数情况下，它们被函数中的局部变量所取代。\n\
    \n结构化编程流行了近二十年。在此期间，硬件容量显著提升。因此，开发者希望解决更复杂的任务，结构化编程的局限性也逐渐凸显；例如，考虑以下情况：\n\n* \
    \  假设在你的应用程序中，你在多个函数中使用了某种特定数据类型。后来你发现需要更改该数据类型。结果，你需要在应用程序的所有函数中实施更改。\n\n*  \
    \ 用结构化编程的关键组件（即数据和函数）来建模所有现实场景是很困难的。在现实世界中，每当你创建一个产品时，有两个方面需要关注：\n    *   *目的*。为什么需要这个产品？\n\
    \n*   *行为*。这个产品如何让你的生活更轻松？\n\n随后，对象的概念应运而生。艾伦·凯伊被广泛认为是面向对象编程之父之一，他与一些同事在帕洛阿尔托研究中心（PARC，前身为施乐帕克研究中心）命名了这一概念。\n\
    \n### 要点回顾\n\n结构化编程与面向对象编程的根本区别可以总结如下：*在面向对象编程中，重点不是对数据的操作，而是数据本身。*\n\nOOP 侧重于一些关键原则。我将在本书中详细讲解它们。在本章中，你将初步了解每个原则。第一次阅读时你可能无法理解所有术语，因此建议你再次回顾这些主题。\n\
    \n## 类与对象\n\n这些是 OOP 的核心。**类**是其对象的蓝图或模板。**对象**是类的实例。每个对象都有自己的状态、行为和标识。简单来说，你可以认为在结构化编程中，你将问题分解为小函数；而在\
    \ OOP 中，你将问题分解为对象。你熟悉诸如 `int`、`double`、`float` 等数据类型。你知道这些是*内置数据类型*或*原始数据类型*，因为它们已在计算机语言中定义。但当你创建自己的数据类型时，比如\
    \ `Student`，你需要创建一个 `Student` 类。就像当你需要创建一个整型变量时，你首先提到 `int`；同样，当你需要创建一个 `Student`\
    \ 对象（例如 `john`）时，你需要首先提到你的 `Student` 类。因此，当你熟悉 OOP 后，你可能会这样说：狗是 `Mammal` 类的一个对象，你的汽车是\
    \ `Vehicle` 类的一个对象，等等。\n"
- fmt: '# Encapsulation


    In object-oriented programming, you do not allow your data to flow freely inside
    the system. Instead, you wrap the data and functions into a single unit (i.e.,
    in a class). The purpose of encapsulation is at least one of the following:


    - Putting restrictions in place so that the components of an object cannot be
    accessed directly

    - Binding the data with methods that will act on that data (i.e., forming a capsule)


    In some OOP languages, the hiding of the information is not implemented by default.
    So, they come up with an additional term called *information hiding*.


    Later, you will see that data encapsulation is one of the key features in a class.
    If you want to promote security, your data should not be visible to the outside
    world. Only through the methods defined inside the class can you access these
    data. Therefore, you can think of these methods as the interface between the objects’
    data and the outside world (i.e., your program).


    In Java, you can implement encapsulation in various ways. For example, you can
    use the access specifiers (or modifiers) and getter-setter methods in this context.


    ### Note


    You will learn about access specifiers and getter-setter methods in Chapter [3](#433474_2_En_3_Chapter.xhtml).


    ## Abstraction


    The key purpose of abstraction is to show only the essential features and to hide
    the background details of implementation. Abstraction is also very much related
    to encapsulation, but the difference may be easily understood with a simple day-to-day
    scenario.


    When you press a button on your remote control to switch on the TV, you do not
    care about the internal circuits of the TV or how the remote control controls
    the operation of the TV. You simply know that different buttons on the remote
    control have different functionalities, and as long as they work properly, you
    are happy. So, the user is isolated from the complex implementation details, which
    are *encapsulated* within the remote control (and TV). At the same time, the common
    operations that can be performed through the remote control can be thought of
    as an *abstraction*. A manufacturer can enhance this feature when the same remote
    can also perform on a different model or product. For example, a DVD player’s
    remote control can also be used to control the volume of a TV.


    ## Inheritance


    Whenever we talk about reusability, we’ll generally refer to inheritance, which
    is a process in which one object acquires the properties of another object. Consider
    this example. `Bus` is one type of `Vehicle` because it fulfills the basic criteria
    of a `Vehicle` that is used for transportation purposes. Similarly, `Train` is
    another type of `Vehicle`. And even though a `GoodsTrain` and a `PassengerTrain`
    are different, we can say that both inherit from the `Train` category (or class)
    because ultimately both of them fulfill the basic criteria of a `Train`, which
    in turn is a `Vehicle`. So, you can simply say that hierarchical classifications
    are supported with the concept of inheritance.


    In the programming world, inheritance creates a new child class from an existing
    parent class. This parent class is sometimes known by different names. For example,
    in C#, you call this parent class the base class and in Java, you may refer to
    it as the super class. So, in simple words, a parent class is placed one level
    up in that hierarchical chain. Then you can add new functionalities (methods)
    or modify the super class functionalities (later you will call it overriding the
    functionalities) into the child class. You must remember that due to these modifications,
    the core architecture should not be affected. In other words, if you derive `Bus`
    class from `Vehicle` class, and add/modify the functionalities in `Bus` class,
    those modifications will not impact the original functionalities that were described
    for the `Vehicle` class.


    So, the key advantage is that you can avoid lots of duplicate code with this mechanism.


    ## Polymorphism


    Polymorphism is generally associated with *one name with many forms*. Consider
    the behavior of your pet dog. When it sees an unknown person, it is angry and
    starts barking a lot. But when it sees you, it makes different noises and behaves
    differently. In the coding world, you can also think of a common method, addition.
    With addition in the context of two integers, you expect to get a sum of the integers.
    But for string operands, you expect to get a concatenated string.


    Polymorphism can be of two types:


    - ***Compile-time polymorphism**:* The compiler can decide very early which method
    to invoke in which situation once the program is compiled. This is also known
    as static binding or early binding.


    - ***Runtime polymorphism**:* The actual method calls are resolved at runtime.
    At compile time, you cannot predict which method will be invoked when the program
    runs (for example, the program may behave differently with different inputs).
    Consider the following case: suppose you want to generate a random number at the
    very first line when you execute a program. If the generated number is an even
    number, you will call a method, `Method1()`, which prints “Hello”; otherwise,
    you’ll call a method whose name is the same but prints “Hi.” Now, you’ll agree
    that after you execute the program, you can only see which method is invoked (i.e.,
    the compiler cannot resolve the call at compile time). In a situation like this,
    you do not have any clue as to whether you will see “Hello” or “Hi” prior to the
    program’s execution. Therefore, sometimes it is also termed dynamic binding or
    late binding. In Chapter [5](#433474_2_En_5_Chapter.xhtml), you’ll see a detailed
    discussion on polymorphism, and you will experience the necessity of runtime polymorphism
    in detail.


    ## Q&A Session


    **1.1 What are the key features of object-oriented programming?**


    The following are the key features of object-oriented programming:


    - Encapsulation

    - Abstraction

    - Inheritance

    - Polymorphism


    **1.2 How is an object different from a class?**


    Objects are made from a class. An object is an instance of a class, which is just
    a template or a blueprint for your object. An object is a physical entity and
    can allocate memory in the system, but class is a logical entity and does not
    allocate memory in the system.


    **1.3 How is abstraction different from encapsulation?**


    Abstraction focuses on the noticeable behavior of an object, and encapsulation
    focuses on the implementation part of that behavior. Encapsulation helps you to
    bundle your data, and at the same time it can hide some information that you do
    not want to disclose to the outside world.


    **1.4 What is the key advantage associated with the inheritance mechanism?**


    Reusing the existing code, you can save time and effort. At the same time, this
    mechanism helps you to avoid duplicate codes in your application.


    **1.5 What are the characteristics of object-oriented programming?**


    Here are some important characteristics:


    - Your focus is on data, not on functions. So, you divide your program into objects,
    not functions.

    - You do not allow data to flow freely. You use methods to access them.

    - Your objects communicate through methods.

    - The outside world should not access your data.

    - Your application can adapt to new changes easily. At the same time, it is easy
    to maintain.


    ## Summary


    This chapter discussed the following topics:


    - What is object-oriented programming?

    - Why did it evolve?

    - How is it different from structured programming?

    - What are the key features of object-oriented programming?


    # 2. The Building Blocks: Class and Objects


    Object-oriented programming (OOP) techniques primarily depend on two concepts—class
    and objects. In this chapter, we’ll discuss these topics in detail.


    ## Class


    A class is a blueprint, template, or prototype. It can describe the behaviors
    of its objects and is the foundation for how the objects are built or instantiated.'
