    ## Checked Versus Unchecked Exceptions


    Now you understand the difference between checked and unchecked exceptions. I
    have already mentioned that there are some kinds of exceptions where either a
    `throws` clause needs to list all of the exceptions that a method can throw or
    you need to handle the scenario with a `try`-`catch` block. Otherwise, you’ll
    encounter compile-time errors. This is why these are called **checked exceptions**
    or compile-time exceptions. The remaining exceptions are termed **unchecked exceptions**.


    ### Note


    As I mentioned before, to understand the difference between checked exceptions
    and unchecked exceptions, you may need to visit Demonstration 7 and Demonstration
    8 again.


    The following list includes some of the checked exceptions:


    *   `ClassNotFoundException`


    *   `NoSuchMethodException`


    *   `NoSuchFieldException`


    *   `InstantiationException`


    *   `CloneNotSupportedException`


    *   `IllegalAccessException`


    *   `InterruptedException`


    Here are some unchecked exceptions:


    *   `ArithmeticException`


    *   `ArrayIndexOutOfBoundsException`


    *   `IndexOutOfBoundsException`


    *   `SecurityException`


    *   `NullPointerException`


    ### Point To Remember


    If a method can throw a checked exception, then either the method should specify
    the exception using the `throws` keyword or it needs to handle the exception itself
    using `try`-`catch` block. Otherwise, you’ll encounter compile-time errors.


    ### Q&A Session


    **10.8 I understand that checked exceptions are subclasses of** **Exception. You
    are also saying that unchecked exceptions are subclasses of** **RuntimeException.
    But from the hierarchy, I am seeing that** **RuntimeException** **is also a direct
    subclass of** **Exception. Then how they become unchecked exceptions?**


    Let’s see what JLS11 says about this. Under section 11.1.1, it says the following:


    > *“The checked exception classes are all exception classes other than the unchecked
    exception classes. That is, the checked exception classes are* *Throwable* *and
    all its subclasses other than* *RuntimeException* *and its subclasses and* *Error*
    *and its subclasses.”*


    At the same time, it also says that “the *unchecked exception classes* are the
    run-time exception classes and the error classes.”


    Following these rules, the Java compiler can detect the `RuntimeException` clearly.
    So, following the language specification, you can safely say that any exception
    that is a subclass of the `RuntimeException` or `Error` class is not a checked
    exception.


    ## Discussion on Chained Exceptions


    Sometimes you can receive an exception that may be caused by some other exception.
    So, you may be interested to know the original cause. The concept of chained exceptions
    comes into the picture in such a scenario.


    Consider a very simple scenario of `ArithmeticException`, which you may receive
    when you divide an integer by 0\. Sometimes your application can compute or update
    the divisor using various logic. So, when you receive this exception, the original
    cause may be the result of an I/O that can ultimately make the divisor zero.


    Chained exceptions can help us to know about such exceptional scenarios, and at
    the same time they can point to the layer in which the actual error exists.


    To allow chained exceptions, you have the following methods:


    ```

    Throwable getCause() and

    Throwable initCause(Throwable cause)

    ```


    And the following constructors:


    ```

    Throwable(Throwable cause)

    Throwable(String msg, Throwable cause)

    ```'
