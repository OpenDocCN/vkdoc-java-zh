  trans: "\n## 创建包\n\n在本书中，我使用的是 Eclipse IDE。在 Eclipse 中创建包非常简单。以下是在 Eclipse IDE 中创建包的步骤。\n\
    \n1.  点击文件菜单 ➤ 新建 ➤ 包（参见图 7-1）。\n\n    ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig1_HTML.jpg](img/433474_2_En_7_Fig1_HTML.jpg)\n\
    \n    图 7-1\n\n    步骤 1：如何在 Eclipse 编辑器中创建 Java 包\n\n2.  提供所需信息并点击完成（参见图 7-2）。\n\
    \n    ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig2_HTML.jpg](img/433474_2_En_7_Fig2_HTML.jpg)\n\
    \n    图 7-2\n\n    步骤 2：如何在 Eclipse 编辑器中创建 Java 包\n\n3.  现在你可以在包资源管理器视图中看到该包。例如，它可能看起来像图\
    \ 7-3。\n\n    ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig3_HTML.jpg](img/433474_2_En_7_Fig3_HTML.jpg)\n\
    \n    图 7-3\n\n    已创建一个空的 Java 包\n\n    **注意** 新创建的包是空的。但快照中的其他包已经包含了一些类。这些包是之前创建的。\n\
    \n4.  现在右键点击包名 ➤ 新建 ➤ 类/包，将类/子包等放入已创建的包中。一旦你在包中放入一个或多个类，它可能看起来类似于下图。例如，在下图中，一个名为\
    \ `Demonstration1.java` 的类被放置在 `java2e.chapter7` 包中。而 `java2e.chapter7.companya`\
    \ 包则包含两个类——`GoaPackage.java` 和 `KeralaPackage.java`。\n\n    ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig4_HTML.jpg](img/433474_2_En_7_Fig4_HTML.jpg)\n\
    \n    图 7-4\n\n    Eclipse 编辑器中非空 Java 包的示例包资源管理器视图\n\n### 演示 1\n\n现在，让我们看一个例子。假设有两家旅游公司，**A**\
    \ 和 **B**。公司 A 提供果阿和喀拉拉邦的旅游服务。公司 B 提供果阿和安达曼的旅游服务。任何游客都可以向他们咨询特定旅游套餐的信息。根据命名规则，在以下示例中，公司\
    \ A 使用包 `java2e.chapter7.companya`，公司 B 使用包 `java2e.chapter7.companyb`。你可以参考图\
    \ 7-4 来理解整体结构。\n\n这里，我涵盖了以下场景：\n\n*   **较简单的情况**：只有公司 A 提供喀拉拉邦的旅游，只有公司 B 提供安达曼的旅游。\n\
    \n*   **较复杂的情况**：注意两家公司都提供果阿旅游，你需要通过各自的 `GoaPackage.java` 类获取价格信息。注意两个包使用了相同的类名。\n\
    \n```\n// GoaPackage.java [属于公司 A，位于 java2e.chapter7.companya 包中]\npackage java2e.chapter7.companya;\n\
    public class GoaPackage\n{\nint basePrice=10000;\npublic void showPrice()\n{\n\
    System.out.println(\"***公司 A 的果阿旅游价格***\" );\nSystem.out.println(\"两人果阿旅游套餐价格为\
    \ Rs.\"+ basePrice*2 );\nSystem.out.println(\"四人果阿旅游套餐价格为 Rs.\"+ basePrice*4 );\n\
    System.out.println(\"**************\" );\n}\n}\n// KeralaPackage.java [属于公司 A，位于\
    \ java2e.chapter7.companya 包中]\npackage java2e.chapter7.companya;\npublic class\
    \ KeralaPackage\n{\nint basePrice=7000;\npublic void showPrice()\n{\nSystem.out.println(\"\
    ***公司 A 的喀拉拉邦旅游价格***\" );\nSystem.out.println(\"两人喀拉拉邦旅游套餐价格为 Rs.\"+ basePrice*2\
    \ );\nSystem.out.println(\"四人喀拉拉邦旅游套餐价格为 Rs.\"+ basePrice*4 );\nSystem.out.println(\"\
    **************\" );\n}\n}\n// AndamanPackage.java [属于公司 B，位于 java2e.chapter7.companyb\
    \ 包中]\npackage java2e.chapter7.companyb;\npublic class AndamanPackage\n{\nint\
    \ basePrice=12000;\npublic void showTariff()\n{\nSystem.out.println(\"***公司 B\
    \ 的安达曼旅游价格***\" );\nSystem.out.println(\"公司 B：两人安达曼旅游套餐价格为 Rs.\"+ basePrice*2\
    \ );\nSystem.out.println(\"公司 B：四人安达曼旅游套餐价格为 Rs.\"+ basePrice*4 );\nSystem.out.println(\"\
    **************\" );\n}\n}\n// GoaPackage.java [属于公司 B，位于 java2e.chapter7.companyb\
    \ 包中]\npackage java2e.chapter7.companyb;\npublic class GoaPackage {\nint basic_price\
    \ = 15000;\nint serviceTax = 2000;\npublic void showTariff() {\nint forTwoPerson\
    \ = basic_price * 2 + serviceTax;\nint forFourPerson = basic_price * 4 + serviceTax;\n\
    System.out.println(\"***公司 B 的果阿旅游价格***\");\nSystem.out.println(\"公司 B：两人果阿旅游套餐价格为\
    \ Rs.\" + forTwoPerson);\nSystem.out.println(\"公司 B：四人果阿旅游套餐价格为 Rs.\" + forFourPerson);\n\
    System.out.println(\"****************\");\n}\n}\n//演示-1\npackage java2e.chapter7;\n\
    import java2e.chapter7.companya.*;\nimport java2e.chapter7.companyb.*;\n/*import\
    \ java2e.chapter7.companya.GoaPackage;\nimport java2e.chapter7.companya.KeralaPackage;\n\
    import java2e.chapter7.companyb.AndamanPackage;*/\npublic class Demonstration1\
    \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***演示-1.探索包。***\"\
    );\n//只有公司 A 有 KeralaPackage\nKeralaPackage companyAKeralaPackage=new KeralaPackage();\n\
    companyAKeralaPackage.showPrice();\n//只有公司 B 有 AndamanPackage\nAndamanPackage\
    \ companyBAndamanPackage=new AndamanPackage();\ncompanyBAndamanPackage.showTariff();\n\
    //公司 A 和公司 B 都有果阿旅游套餐。\njava2e.chapter7.companya.GoaPackage companyAGoaPackage=new\
    \ java2e.chapter7.companya.GoaPackage();\ncompanyAGoaPackage.showPrice();\njava2e.chapter7.companyb.GoaPackage\
    \ companyBGoaPackage=new java2e.chapter7.companyb.GoaPackage();\ncompanyBGoaPackage.showTariff();\n\
    }\n}\n```\n\n输出：\n\n```\n***演示-1.探索包。***\n***公司 A 的喀拉拉邦旅游价格***\n两人喀拉拉邦旅游套餐价格为\
    \ Rs.14000\n四人喀拉拉邦旅游套餐价格为 Rs.28000\n**************\n***公司 B 的安达曼旅游价格***\n公司 B：两人安达曼旅游套餐价格为\
    \ Rs.24000\n公司 B：四人安达曼旅游套餐价格为 Rs.48000\n**************\n***公司 A 的果阿旅游价格***\n两人果阿旅游套餐价格为\
    \ Rs.20000\n四人果阿旅游套餐价格为 Rs.40000\n**************\n***公司 B 的果阿旅游价格***\n公司 B：两人果阿旅游套餐价格为\
    \ Rs.32000\n公司 B：四人果阿旅游套餐价格为 Rs.62000\n****************\n```\n\n你是否注意到一个有趣的事实？由于\
    \ `GoaPackage` 类在两个 Java 包中都存在，你需要在 `main()` 方法中使用完全限定名来引用特定包中的目标类。但对于其他类，如 `KeralaPackage`\
    \ 或 `AndamanPackage`，则无需使用完全限定名，因为这些类具有唯一的名称。\n\n这个例子也说明了一个事实：如果你使用星号形式导入整个包，即使这些包中包含同名的类，也不会出现编译时错误。但在访问该类时，你需要使用该类的完全限定名。例如，你必须写成\
    \ `java2e.chapter7.companya.GoaPackage`，因为 `GoaPackage` 类在两个公司中都存在。\n\n### 注意\n\
    \n我保留了已注释的代码，以展示如何从包中导入特定类，而不是导入整个包。\n"
- fmt: '### Key Notes About Packages in Java


    Here are some important points about packages:


    - All classes in the `java.lang` package are imported by default. (Q&A 7.3 talks
    about `import` statements in detail.)

    - If you want to rename your package, first rename the directory in which your
    classes are stored.

    - Package naming conventions should be followed carefully; for example, if we
    use a statement like `package a.b.c`, we mean to say that directory `c` is placed
    inside directory `b`, which is again placed inside directory `a`.

    - You can remember the visibility control mechanism by referring to Table [7.1](#433474_2_En_7_Chapter.xhtml#Tab1).


    ### Q&A Session


    **7.1 If every class stays in a package, then how could I use `System.out.print()`
    up to now without importing any packages?**


    In Java, all classes in the `java.lang` package are imported by default. This
    is why you were able to use `System.out.println()`—the `System` class also resides
    inside the default `java.lang` package.


    If you import a package, subpackages will not be imported by default. For example,
    let’s say there is a subpackage, namely `subpacka`, in the package `companya`,
    and you have following code:


    ```

    package java2e.chapter7.companya.subpacka;

    public class SubGoaPackage {

    int basePrice = 500;

    public void showPrice() {

    System.out.println("**I am in SubGoaPackage.I need to update myself**");

    }

    }

    ```


    Now, if you do not import this subpackage in Demonstration 1, the bold lines in
    the following code segment will cause compile-time errors:


    ```

    //Subpackages will not be imported by default.

    //Need to import the package explicitly.

    //import java2e.chapter7.companya.subpacka.*;

    SubGoaPackage companyASubGoaPackage=new SubGoaPackage();

    companyASubGoaPackage.showPrice();

    ```


    **Note:** If you import a package, subpackages will not be imported by default.


    **7.2 Can you explain about the default access specifier?**


    You can always refer to Table [7-1](#433474_2_En_7_Chapter.xhtml#Tab1) for your
    reference. From the table, it is obvious that if you do not mention any specific
    access modifier, like `public`, `private`, etc., with regards to a member, it
    will be considered to have a default modifier, and then your particular member
    will be visible inside the same package only; in other words, all other classes
    inside the package can see and use it.


    **Table 7-1** Access Protection Chart Using Packages


    | | `public` | `protected` | `private` | Default/No modifier |

    | --- | --- | --- | --- | --- |

    | Same class | Yes | Yes | Yes | Yes |

    | Subclass in same package | Yes | Yes | No | Yes |

    | Non-subclass in same package | Yes | Yes | No | Yes |

    | Subclass in different package | Yes | Yes | No | No |

    | Non-subclass in different package (outside world) | Yes | No | No | No |


    By the same token, you can give visibility to outside classes with a restriction
    that only those outside classes that are in the same inheritance hierarchy (i.e.,
    subclass) can see the intended member, in which case you can use the modifier
    `protected`. And if you do not want to put any restrictions in place at all, simply
    use the `public` modifier, and to provide maximum restriction, use the `private`
    modifier.


    **Note:** A default or no modifier is also known as a `package-private` modifier
    because it provides visibility within the containing package only.


    **7.3 What is the purpose of `import` statements?**


    JLS11 says that “an `import` declaration allows a named type or a static member
    to be referred to by a simple name that consists of a single identifier.” You
    bring all classes (or packages) from a specified location to your intended location
    with the use of `import` statements. Otherwise, you need to use the fully qualified
    name. For example, suppose you have a class named `MyClass` with some methods
    (for simplicity, let’s say you have used `public` modifiers only). This class
    is placed inside a package (or directory), `packageb`, which, in turn, is placed
    inside another directory, `packagea`. Now, you want to reuse those methods/class
    from a different location. So, as per the directory structure, you need to refer
    to the class as `packagea.packageb.Myclass`. So, you can see that it becomes tedious
    and looks ugly to type the long dot-separated package name first for the classes
    you need to use. So, in short, you can save a lot of typing and increase the readability
    of our program by using `import` statements. Once imported, you can refer to a
    class by its name only.


    **7.4 Then technically I can avoid `import` statements. Is this understanding
    correct?**


    Yes, but you have to pay a lot in terms of typing and readability in a real-life
    programming situation. So, I do not recommend that practice.


    **7.5 Suppose I have used the same class name inside two packages. And then in
    some other program, I have imported both packages. Will I face any compiler issues?
    Also, how can I access a particular class?**


    First of all, there is no compiler issue. If you have same-named classes in two
    or more packages, just use their fully qualified names to avoid the conflict.
    Refer to the program in Demonstration 1. You can see that both of the packages
    have the class `GoaPackage.java`, and I have used their fully qualified names
    inside the `main()` method.


    **7.6 In some examples, I see the `import` statement is the first statement. But
    you told me that the `package` statement should be the first statement. I have
    both, which one should come first?**


    You must remember that `package` statements should be the first statements. Then
    `import` statements should be placed. See Demonstration 2.


    ### Demonstration 2


    Consider the following program, which demonstrates the incorrect order of `package`
    and `import` statements.


    ```

    import java.util.Date;

    package java2e.chapter7;//error

    class Demonstration2 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-2.Exploring the order of package and import
    statements.***");

    Date currentTime = new Date();

    System.out.println(currentTime.toString());

    }

    }

    ```


    The result is a compilation error (Figure [7-5](#433474_2_En_7_Chapter.xhtml#Fig5)).


    ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig5_HTML.jpg](images/433474_2_En_7_Chapter/433474_2_En_7_Fig5_HTML.jpg)


    **Figure 7-5** An output snapshot with error message in the Eclipse editor


    Let’s change the order of the `package` and `import` statements, like the following:


    ```

    package java2e.chapter7;//package statement should be the first statement

    import java.util.Date;// ok

    ```


    Now you will get the expected output:


    ```

    ***Demonstration-2.Exploring the order of package and import statements.***

    Sat Mar 16 20:53:58 IST 2019

    ```'
