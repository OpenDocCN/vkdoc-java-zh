    Configuration details snapshot from a different dual-core system with eighth-generation
    Intel® Core™ i3 processor


    ### Note


    In a multi-threaded Java program, you may notice the use of preemptive scheduling
    where a higher-priority thread preempts a lower-priority thread. But you have
    seen that the behavior is not always certain. The behavior also depends on the
    underlying platform. In theory, two same-priority threads cannot preempt each
    other, which can create issues in a non-preemptive environment. So, for equal
    priority threads, it’s a good idea to release control based on some conditions
    (for example, waiting for I/O operations, etc.) so that each thread can run and
    complete its job.


    ## Case Study with Different Thread Class Methods


    So far, you have seen the use of the following methods:


    *   `run()`

    *   `start()`

    *   `setPriority(int number)`

    *   `getPriority()`

    *   `currentThread()`

    *   `getName()`

    *   `setName()`


    Let’s do a case study with a few more methods in the `Thread` class. In the following
    demonstration, you will see the use of the following methods:


    *   `sleep(long millis)`: This causes a specified thread to sleep. You can use
    it when you want to cease a thread’s execution temporarily. The argument is passed
    in milliseconds. This method can throw `InterruptedException` or `IllegalArgumentException`
    (if you pass negative milliseconds values or if the value is not in the range
    of 0–999999). So, you need to surround this method with a try/catch block.

    *   `yield()`: This can be used when you want a thread (which is currently using
    the processor) to give up its control to a different thread (though the scheduler
    can ignore this request). This method can be used for debugging purposes or for
    designing concurrency control constructs. It is also helpful to reproduce a bug
    in the race conditions.

    *   `interrupt()`: This method can be used to send an interrupt signal to a thread.


    ### Demonstration 4


    Consider the following demonstration and output, which is self-explanatory if
    you follow the prior theories:


    ```

    package java2e.chapter11;

    class Thread4A extends Thread {

    public void run() {

    for (int i = 0; i " + i);

    if (i == 2) {

    System.out.println("Going to interrupt the thread.");

    interrupt();// Interrupts this thread

    System.out.println("Is Thread4A interrupted?"+this.interrupted());

    }

    }

    System.out.println("Exit-Thread4A");

    }

    }

    class Thread4B extends Thread {

    public void run(){

    for (int j = 0; j " + j);

    if (j == 3) {

    try {

    sleep(5000);//sleeps for 5000 milliseconds

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    }

    System.out.println("Exit-Thread4B");

    }

    }

    class Thread4C extends Thread {

    public void run() {

    for (int k = 0; k " + k);

    if(k==4) {

    yield();

    }

    }

    System.out.println("Exit-Thread4C");

    }

    }

    class Demonstration4 {

    public static void main(String[] args) throws InterruptedException {

    System.out.println("***Demonstration-4.Exploring multi-threading with yield(),sleep(),
    and interrupt() methods of the Thread class.***");

    Thread4A thread4A=new Thread4A();

    Thread4B thread4B=new Thread4B();

    Thread4C thread4C=new Thread4C();

    thread4A.start();

    thread4B.start();

    thread4C.start();

    System.out.println("Is Thread4A interrupted now?"+thread4A.interrupted());

    Thread.sleep(1000);

    System.out.println("Exit-main()");

    }

    }

    ```


    Here is a possible output:


    ```

    ***Demonstration-4.Exploring multi-threading with yield(), sleep(), and interrupt()
    methods of the Thread class.***

    Is Thread4A interrupted now?false

    Thread4C prints ->0

    Thread4B prints ->0

    Thread4B prints ->1

    Thread4A prints ->0

    Thread4B prints ->2

    Thread4B prints ->3

    Thread4C prints ->1

    Thread4A prints ->1

    Thread4C prints ->2

    Thread4A prints ->2

    Going to interrupt the thread.

    Thread4C prints ->3

    Is Thread4A interrupted?true

    Thread4C prints ->4

    Thread4A prints ->3

    Exit-Thread4C

    Thread4A prints ->4

    Exit-Thread4A

    Exit-main()

    Thread4B prints ->4

    Exit-Thread4B

    ```


    ### Q&A Session


    **11.5 In previous demonstrations, I saw that the main thread finishes before
    the child threads. But in many cases, I want to avoid this. In such a case, how
    should I proceed?**


    The `sleep()` method can help you, but it is not an ideal solution. The much better
    solution is to use the `join()` method (which has different overloaded versions).
    Here, I present an updated version of the `main()` method for Demonstration 4
    (notice the bold lines). Once you execute this, you will notice that main always
    finishes at the end.


    ```

    class Demonstration4 {

    public static void main(String[] args) throws InterruptedException {

    System.out.println("***Demonstration-4.Exploring multi-threading with yield(),sleep(),
    and interrupt() methods of the Thread class.***");

    Thread4A thread4A = new Thread4A();

    Thread4B thread4B = new Thread4B();

    Thread4C thread4C = new Thread4C();

    thread4A.start();

    thread4B.start();

    thread4C.start();

    System.out.println("Is Thread4A interrupted now?" + thread4A.interrupted());

    Thread.currentThread().sleep(1000);

    //Modified program to show the use of join()

    //Waiting for the threads to complete before main //thread.

    thread4A.join();

    thread4B.join();

    thread4C.join();

    System.out.println("Exit-main()");

    }

    }

    ```


    Here is the modified output. Notice that `Exit-main()` comes at the end.


    ```

    ***Demonstration-4.Exploring multi-threading with yield(),sleep(), and interrupt()
    methods of the Thread class.***

    Thread4B prints ->0

    Thread4C prints ->0

    Thread4C prints ->1

    Thread4C prints ->2

    Thread4A prints ->0

    Thread4A prints ->1

    Is Thread4A interrupted now?false

    Thread4A prints ->2

    Going to interrupt the thread

    Thread4C prints ->3

    Thread4B prints ->1

    Thread4B prints ->2

    Thread4B prints ->3

    Thread4C prints ->4

    Is Thread4A interrupted?true

    Thread4A prints ->3

    Thread4A prints ->4

    Exit-Thread4A

    Exit-Thread4C

    Thread4B prints ->4

    Exit-Thread4B

    Exit-main()

    ```'
