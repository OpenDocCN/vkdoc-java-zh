    以下代码段


    ```

    //错误的代码段-5

    class GenericClass {

    T genericObject;

    GenericClass() {

    //5.编译时错误

    genericObject = new T();

    }

    }

    ```


    将引发编译时错误：`Cannot instantiate the type T`。


    最后一点建议

    *在本章中，你已经学习了泛型编程的基础知识。但最终的掌握需要反复练习。在结束本章之前，我建议你注意，在编写代码时，应特别关注泛型编程中的子类型。*

    考虑一个例子。假设有两个具体类型——`TypeA` 和 `TypeB`*。* `GenericClass<TypeA>` 与 `GenericClass<TypeB>`
    没有任何关系，无论 `TypeA` 和 `TypeB` 是否相关。`Object` 是 `GenericClass<TypeA>` 和 `GenericClass<TypeB>`
    的共同父类。


    例如，你在多个示例中多次使用了 `Integer` 类。但如果你查看其原始定义，你会看到：


    ```

    public final class Integer extends Number implements Comparable {

    //some code

    }

    ```


    这基本上说明 `Integer` 类继承自 `Number` 类。

    但根据之前的建议，你可以得出结论：`GenericClass<Number>` 和 `GenericClass<Integer>` 之间没有关系。


    总结


    本章讨论了以下内容：


    *   什么是泛型程序？


    *   为什么泛型在 Java 中很重要？


    *   泛型编程相对于非泛型编程有哪些优势？


    *   如何在泛型编程中使用通配符？


    *   通配符有哪些不同类型，如何使用它们？


    *   什么是受限类型参数？它与通配符有何不同？


    *   如何在泛型程序中使用受限类型参数？


    *   什么是类型擦除，它是如何工作的？


    *   什么是桥接方法？它是如何工作的？


    *   为什么桥接方法有用？


    *   什么是原始类型？


    *   如何使用菱形运算符来简化语法？


    13. 数据库编程

