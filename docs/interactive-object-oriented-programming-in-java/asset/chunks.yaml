    ### 12.9 Why is the bridge method needed?


    You have already seen that after type erasure’s action, the method signatures
    in the parent class and its child class did not match, and so it affects the concept
    of polymorphism. To address these issues, the bridge method is useful. In this
    context, notice the last few lines of code in Demonstration 12. This portion of
    code demonstrates how the concept of polymorphism is preserved.


    ### Important Restrictions in Generic Programming


    There are many restrictions associated with generic programming. You’ll become
    familiar with them only upon practice. Let’s finish the chapter with a discussion
    of some common restrictions.


    #### Don’t Instantiate Generic Types with Primitive Types


    In Demonstration 2, you saw that the following declaration is NOT legal in generic
    programming in Java. So, the following code segment


    ```java

    //Erroneous code segment-1

    //Primitive types are NOT allowed here.It must be a reference type.

    MyGenericClass myGenericClassIntOb2 = new MyGenericClass();

    ```


    will raise a compile-time error: `Syntax error, insert "Dimensions" to complete
    ReferenceType`.


    #### Your Generic Class Cannot Subclass Directly or Indirectly from Throwable


    JLS11 confirms that JVM’s catch mechanism is compatible with the non-generic classes
    only. So, the following code segment


    ```java

    //Erroneous code segment-2

    class CustomException extends Throwable{  }

    ```


    will raise a compile-time error: `The generic class CustomException<T> may not
    subclass java.lang.Throwable`.


    #### You Cannot Overload a Method Where the Formal Parameter Types of Each Overload
    Are Erased to the Same Raw Type


    The following code segments


    ```java

    //Erroneous code segment-3

    class OverloadRestriction {

    public void printMe(List intList) {//Some code }

    public void printMe(List strList) {//Some code }

    }

    ```


    will raise two compile-time errors:


    ```

    Erasure of method printMe(List) is the same as another method in type OverloadRestriction

    ```


    and


    ```

    Erasure of method printMe(List) is the same as another method in type OverloadRestriction

    ```


    #### Static Field Type Parameter Is Not Allowed in Your Generic Class


    The following code segments


    ```java

    //Erroneous code segment-4

    class MyDevice {

    private static T operatingSystem;// 4.1 Compile-time error

    // 4.2 Compile-time error

    /* public static T getOperatingSystem() {

    // some code

    }*/

    }

    ```


    will raise a compile-time error: `Cannot make a static reference to the non-static
    type T`. You get the same error if you try to use a static method, which is shown
    in commented lines.


    #### You Cannot Instantiate the Type Parameters In Your Generic Class


    The following code segments


    ```java

    //Erroneous code segment-5

    class GenericClass {

    T genericObject;

    GenericClass() {

    //5.Compile-time error

    genericObject = new T();

    }

    }

    ```


    will raise a compile-time error: `Cannot instantiate the type T`.


    ### One Final Suggestion


    In this chapter, you have gone through the fundamentals of generic programming.
    But ultimate mastery will come upon repeated practice. Before I finish this chapter,
    I suggest you take note that when you write your code you should pay special attention
    to the subtype in generic programming. Consider an example. Suppose there are
    two concrete types—`TypeA` and `TypeB`. `GenericClass<TypeA>` is in no way related
    to `GenericClass<TypeB>` regardless of whether `TypeA` and `TypeB` are related.
    `Object` is the common parent for both `GenericClass<TypeA>` and `GenericClass<TypeB>`.


    For example, you have used the `Integer` class several times in various examples.
    But if you go through its original definition, you’ll see this:


    ```java

    public final class Integer extends Number implements Comparable {

    //some code

    }

    ```


    This basically says that the `Integer` class extends from the `Number` class.
    But following the prior suggestion, you can conclude that there is no relationship
    between `GenericClass<Number>` and `GenericClass<Integer>`.


