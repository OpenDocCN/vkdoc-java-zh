    ### Q&A Session


    **12.6 How do wildcards differ from bounded type parameters?**


    It depends on your implementation. In certain situations, bounded type parameters
    can promote better readability and safety. It’ll be helpful to remember the syntax
    for them. Any wildcard can have only one bound.


    - For upper bound, you use: `? extends SuperType`

    - For lower bound, you use: `? super SubType`


    On the other hand, you can associate multiple bounds with a type parameter. So,
    you have seen the following statements before.


    When you create a bound with a class type and the interface type(s), you use the
    `&` operator, as follows:


    ```

    Demonstration 8 shows some of the usage of this.

    ```


    ### Erasures


    Prior to Demonstration 3, I stated that it may appear that different versions
    of `MyGenericClass` exist. But the Java compiler actually removes all this generic
    type information and performs the necessary cast to make the code behave like
    this. This removal process is termed erasure. So, in actuality, only one version
    of `MyGenericClass` exists for Demonstration 2. You’ll go through a detailed discussion
    of this topic now.


    In short, for a parameterized class, there is only one compiled class file. For
    example, suppose you use `ArrayList<Double>`, `ArrayList<Integer>`, or `ArrayList<String>`
    in your program. In this case, the type parameters help you to raise compile-time
    errors if you try to store any unwanted type of object in your container. So,
    you promote type safety at compile time. But though you use different type parameters
    in your generic data structures, all these parameterized types use the same compiled
    class. It is because all the type information is erased at runtime. The process
    is a little bit complex, but most of the time you do not need to deal with them
    directly.


    As per the Oracle Java documentation, type erasures can work in the following
    ways:


    - All type parameters in generic types will be replaced with their bounds. For
    an unbounded type, it will be replaced by `Object`. As a result, the generated
    bytecode will contain the ordinary classes, interfaces, and methods.

    - To preserve type safety, type casts will be inserted.

    - It can generate bridge methods to preserve polymorphism in extended generic
    types.


    So, here is the bottom line: **Type erasure ensures that you will not create different
    classes for different parameterized types in the compiled code**.


    ### Demonstration 9


    Let’s start with a simple case study. Here, I’ll compile the code and then decompile
    it. To make it simple and straightforward, I am using the `javac` and `javap`
    commands, respectively. I have decompiled this code in a different place in my
    machine, and this is why I have intentionally removed the `package` statement
    in the following demonstration.


    ```

    import java.util.List;

    import java.util.ArrayList;

    class Demonstration9 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-9.Examine the type erasures.***");

    List myIntList = new ArrayList();

    myIntList.add(10);

    myIntList.add(20);

    //myIntList.add("Invalid");//error

    int firstNumber=myIntList.get(0);

    System.out.println("First number is :"+ firstNumber);

    int secondNumber=myIntList.get(1);

    System.out.println("Second number is :"+ secondNumber);

    List myStrList = new ArrayList();

    myStrList.add("Hello");

    myStrList.add(" world !");

    //myStrList.add(30);//error

    String firstString=myStrList.get(0);

    System.out.println("First String is :"+ firstString);

    String secondString=myStrList.get(1);

    System.out.println("Second String is :"+ secondString);

    }

    }

    ```


    Output:


