    \ as different design patterns?**\nThe GoF clearly excludes those, saying that\
    \ “they are not complex,\ndomain-specific designs for an entire application or\
    \ subsystem.” They\ncan be encoded in classes and reused as is. So, they are not\
    \ your\nconcern in this chapter.\n**15.5 If no particular pattern is 100% suitable\
    \ for my\nproblem, how should I proceed?**\nIt is obvious that you cannot solve\
    \ an infinite number of problems\nwith a finite number of patterns. But there\
    \ is the probability that\nsomeone else before you faced a similar problem and\
    \ found a solution.\nYou can always use those recorded experiences. So, if you\
    \ know these\ncommon patterns and their trade-offs, you can pick a close match.\n\
    Lastly, no one prevents you from using your own pattern for your own\nproblem.\
    \ But you have to tackle the risk from all possible\ndimensions.\n**15.6 Do you\
    \ have any general advice before I jump into the\ntopics?**\n\nI always follow\
    \ the footsteps my seniors and teachers who are experts in\nthis field. Here are\
    \ some general suggestions from them:\n\n*   You should program to a supertype\
    \ (abstract class/interface), not\n    an implementation.\n\n*   You should prefer\
    \ composition over inheritance.\n\n*   You should try to make a loosely coupled\
    \ system.\n\n*   You should segregate the code that is likely to vary from the\n\
    \    rest of your code.\n\n*   You should encapsulate the code that varies.\n\n\
    Let’s jump into design patterns now.\n\nPrototype Pattern\n\nGoF Definition\n\
    Specify the kinds of objects to create using a prototypical instance,\nand create\
    \ new objects by copying this prototype.\n\nConcept\nIn general, creating a new\
    \ instance from scratch is a costly\noperation. Using the concept of the\nprototype\
    \ pattern, you can create a new instance by copying or cloning\nan existing instance.\
    \ This approach can save both time and money."
