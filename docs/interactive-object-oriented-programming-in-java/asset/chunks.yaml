    ## 泛型编程中的通配符类型


    在接下来的讨论中，你会注意到有时你可能需要在泛型编程中对特定类型施加限制。实现此类约束有两种常见方法——一种是使用通配符，另一种是使用有界类型参数。这里，我将从通配符开始介绍。


    在泛型编程中，通配符用问号 `(?)` 表示。它表示一个未知类型。当你对 `type` 参数有部分了解时，可以使用它。


    通配符可以是有界的，也可以是无界的。有界通配符可用于为 `type` 参数设置上界或下界。让我们从上限通配符开始讨论。

