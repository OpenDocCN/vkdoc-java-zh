    ## 同步


    有时多个线程需要访问某些共享资源。控制此类情况颇具技巧性；例如，考虑这样一种情况：一个线程正试图从文件中读取数据，而另一个线程仍在同一文件中写入或更新数据。如果无法有效控制这种情况，可能会得到令人意外的结果。同步的概念在此类情况下非常有用。Java
    可以通过同步方法和语句帮助你控制这种情况。


    ### 同步方法的使用


    让我们从同步方法开始。为了理解同步方法的强大之处，我们先从一个未实现该概念的程序开始。在下面的演示中，`MyClass5A` 是一个简单的类，其中包含一个
    `display()` 方法。你可以像下面这样在方法前加上关键字 `synchronized`，使其成为同步方法：


    ```

