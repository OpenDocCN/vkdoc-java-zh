    System.out.println(\"And empClone details is as follows:\");\nSystem.out.println(empClone);\n\
    }\n}\n```\n\nHere is the output:\n\n```\n***Shallow vs Deep Copy Demonstration.***\n\
    The emp details is as follows:\nEmpId=1 EmpName=John EmpAddressName=21, abc Road,\
    \ USA\nThe empClone details is as follows:\nEmpId=1 EmpName=John EmpAddressName=21,\
    \ abc Road, USA\nNow changing the name, id and address of the emp object\nNow\
    \ emp details is as follows:\nEmpId=10 EmpName=Sam EmpAddressName=221, xyz Road,\
    \ Canada\nAnd empClone details is as follows:\nEmpId=1 EmpName=John EmpAddressName=221,\
    \ xyz Road, Canada\n```\n\nAnalysis:\n\nNotice the last line of output. You can\
    \ see an unwanted side-effect,\nbecause you notice the address of the cloned object\
    \ is modified due to\nthe modification to the `emp` object. This is\nbecause the\
    \ original object and the cloned object both point to the same\naddress, and they\
    \ are not totally disjointed. Figure [15-7](#433474_2_En_15_Chapter.xhtml#Fig7)\
    \ can depict the\nscenario better.\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig7_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig7_HTML.jpg)\n\
    \nFigure 15-7\nShallow copy scenario in prior example"
  trans: '

    *   在我们的示例中，我使用了 `clone()` 方法，该方法在 Java 中执行**浅拷贝**。按照惯例，你通过调用 `super.clone()`
    来获取返回的对象。如果你需要获取深拷贝，这可能会比较昂贵。


    **15.9\. 你能举例说明不同类型的拷贝技术吗？**


    你知道 `Object` 类（位于 `java.lang` 包中）是所有类的超类。这个 `Object` 类有一个名为 `clone()` 的方法，它支持克隆操作。如果你在
    Eclipse 编辑器中将鼠标悬停在 `Clone()` 方法上，你将看到以下语法：


    ```

    protected native Object clone() throws CloneNotSupportedException;

    ```


    该方法的描述还说明，此方法“创建并返回此对象的一个副本。‘*副本*’的确切含义可能取决于对象的类。”


    当你使用克隆时，你会了解到两种不同的克隆技术，即浅拷贝和深拷贝。以下是这两者之间的关键区别：


    *   **浅拷贝**速度更快，成本更低。如果你的目标对象只包含基本类型字段，它总是更好的选择。


    *   **深拷贝**成本高且速度慢。但如果你的目标对象包含许多引用其他对象的字段，它则很有用。


    那么，让我们理解它们背后的理论。浅拷贝创建一个新对象，然后将各种字段值从原始对象复制到新对象。因此，它也被称为逐字段拷贝。如果原始对象包含任何对其他对象的引用作为字段，那么这些对象的引用会被复制到新对象中（即，你不会创建这些对象的副本）。


    让我们尝试用一个简单的图表来理解这个机制。假设你有一个对象 X1，它有一个对另一个对象 Y1 的引用。进一步假设对象 Y1 有一个对对象 Z1 的引用。图
    15-4 展示了这一点。


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig4_HTML.jpg](img/433474_2_En_15_Fig4_HTML.jpg)


    图 15-4

    之前：引用的浅拷贝


    现在，通过 X1 的浅拷贝，将创建一个新对象，比如 X2，它也将有一个对 Y1 的引用。图 15-5 展示了这一点。


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig5_HTML.jpg](img/433474_2_En_15_Fig5_HTML.jpg)


    图 15-5

    之后：引用的浅拷贝


    但对于 X1 的深拷贝，将创建一个新对象，比如 X3。X3 将有一个对新对象 Y3 的引用，而 Y3 实际上是 Y1 的一个副本。此外，Y3 又会有一个对另一个新对象
    Z3 的引用，Z3 是 Z1 的一个副本。图 15-6 展示了这一点。


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig6_HTML.jpg](img/433474_2_En_15_Fig6_HTML.jpg)


    图 15-6

    之后：引用的深拷贝


    在深拷贝的情况下，新对象与原始对象完全分离，对一个对象所做的任何更改都不应反映在另一个对象中。在 Java 中，要创建深拷贝，你可能需要重写 `clone()`
    方法，然后继续。此外，深拷贝成本很高，因为你可能需要创建额外的对象。


    **Java 中的浅拷贝与深拷贝**

    你可以使用 Java 中的 `clone()` 方法制作一个克隆（或副本），但你需要实现 `Cloneable` 接口，因为只有实现了此 `Cloneable`
    接口的 Java 对象才符合克隆条件。`clone()` 的默认版本会创建一个浅拷贝。要创建深拷贝，你需要重写 `clone()` 方法。


    以下是以下程序的关键特性：


    *   在以下示例中，你有两个类：`Employee` 和 `EmpAddress`。


    *   `Employee` 类有三个字段：`id`、`name` 和 `EmpAddress`。因此，你可能会注意到，要形成一个 `Employee` 对象，你需要传递一个
    `EmpAddress` 对象。所以，你会看到如下代码行：`Employee emp=new Employee(1,"John",initialAddress);`


    *   `EmpAddress` 只有一个名为 `address` 的字段，其数据类型为 `String`。


    *   在客户端代码中（在 `main()` 方法内部），你使用 Java 内置的 `clone()` 方法创建了一个克隆对象 `empClone`。所以，你会看到如下代码行：`Employee
    empClone=(Employee)emp.clone();`


    *   然后你更改了 `emp` 对象的字段值。


    *   但现在你看到了这个更改的副作用，因为你注意到 `empClone` 对象的地址也发生了变化，这是不希望的。


    ```

    class EmpAddress implements Cloneable {

    String address;

    public EmpAddress(String address) {

    this.address = address;

    }

    public String getAddress() {

    return address;

    }

    public void setAddress(String address) {

    this.address = address;

    }

    @Override

    public String toString() {

    return this.address;

    }

    @Override

    public Object clone() throws CloneNotSupportedException {

    // 浅拷贝

    return super.clone();

    }

    }

    class Employee implements Cloneable {

    int id;

    String name;

    EmpAddress empAddress;

    public Employee(int id, String name, EmpAddress empAddress) {

    this.id = id;

    this.name = name;

    this.empAddress = empAddress;

    }

    public int getId() {

    return id;

    }

    public void setId(int id) {

    this.id = id;

    }

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public EmpAddress getAddress() {

    return this.empAddress;

    }

    public void setAddress(EmpAddress newAddress) {

    this.empAddress = newAddress;

    }

    @Override

    public String toString() {

    return "EmpId=" + this.id + " EmpName=" + this.name + " EmpAddressName=" + this.empAddress;

    }

    @Override

    public Object clone() throws CloneNotSupportedException {

    // 浅拷贝

    return super.clone();

    }

    }

    class CloningTechniques{

    public static void main(String[] args) throws CloneNotSupportedException {

    System.out.println("***浅拷贝与深拷贝演示。***\n");

    EmpAddress initialAddress = new EmpAddress("21, abc Road, USA");

    Employee emp = new Employee(1, "John", initialAddress);

    System.out.println("emp 对象的详细信息如下：");

    System.out.println(emp);

    Employee empClone = (Employee) emp.clone();

    System.out.println("empClone 对象的详细信息如下：");

    System.out.println(empClone);

    System.out.println("\n 现在更改 emp 对象的名称、ID 和地址 ");

    emp.setId(10);

    emp.setName("Sam");

    emp.empAddress.setAddress("221, xyz Road, Canada");

    System.out.println("现在 emp 对象的详细信息如下：");

    System.out.println(emp);

    System.out.println("而 empClone 对象的详细信息如下：");

    System.out.println(empClone);

    }

    }

    ```


    以下是输出结果：


    ```

    ***浅拷贝与深拷贝演示。***

    emp 对象的详细信息如下：

    EmpId=1 EmpName=John EmpAddressName=21, abc Road, USA

    empClone 对象的详细信息如下：

    EmpId=1 EmpName=John EmpAddressName=21, abc Road, USA

    现在更改 emp 对象的名称、ID 和地址

    现在 emp 对象的详细信息如下：

    EmpId=10 EmpName=Sam EmpAddressName=221, xyz Road, Canada

    而 empClone 对象的详细信息如下：

    EmpId=1 EmpName=John EmpAddressName=221, xyz Road, Canada

    ```


    分析：


    注意输出的最后一行。你可以看到一个不希望的副作用，因为你注意到克隆对象的地址因对 `emp` 对象的修改而被修改了。这是因为原始对象和克隆对象都指向同一个地址，它们并非完全独立。图
    15-7 可以更好地描述这种情况。


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig7_HTML.jpg](img/433474_2_En_15_Fig7_HTML.jpg)


    图 15-7

    先前示例中的浅拷贝场景

