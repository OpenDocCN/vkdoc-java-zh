  trans: "\n### 要点提示\n\n你必须在同步上下文中使用 `wait()`、`notify()` 和 `notifyAll()`。否则，可能会遇到\
    \ `java.lang.IllegalMonitorStateException` 异常。如果允许在非同步上下文中使用这些方法，等待线程*可能*会错过通知线程的通知，从而永远等待下去。\n\
    \n## 线程的生命周期\n\n你已经看到线程可以处于多种状态，但在任何特定时刻，它只能处于一种特定状态：\n\n*   在**新建**状态下，线程刚被创建，但尚未调用\
    \ `start()` 方法。\n\n*   一旦你调用了 `start()` 方法，线程就处于**可运行**状态，但调度器尚未允许它运行。\n\n*  \
    \ 在**运行**状态下，调度器允许线程执行。\n\n*   当调用 `suspend()`、`wait()`、`sleep()` 等方法时，线程可以进入**不可运行**或**阻塞**状态。但一旦调用了\
    \ `resume()`，或者 `sleep()` 结束，或者调用了 `notify()` 和 `notifyAll()` 等方法，线程就可以再次回到可运行状态。\n\
    \n*   最后，一旦线程执行完 `run()` 方法，它就处于**死亡**状态。\n\n    **注意** 在 Java 11 中，Oracle 从 `java.lang.Thread`\
    \ 类中移除了已废弃的 `stop()` 和 `destroy()` 方法。移除 `stop()` 方法的一个关键原因是，如果你从外部调用 `stop()`，该线程持有的所有监视器将立即释放，这可能会引发不安全的情况。\n\
    \n让我们通过图 11-5 来回顾各种状态。\n\n![../images/433474_2_En_11_Chapter/433474_2_En_11_Fig5_HTML.jpg](img/433474_2_En_11_Fig5_HTML.jpg)\n\
    \n图 11-5\n\n线程的生命周期\n\n### 问答环节\n\n**11.6 什么是线程池？**\n\n线程池是另一个本章未讨论的大话题。但了解它是有用的：线程池是集合中预先初始化的线程。你可以决定线程池的大小。当你想要限制应用程序中线程的创建数量时，可以使用这个概念。它很有用，因为通常线程创建是一项开销很大的操作，如果频繁创建线程，应用程序的整体性能可能会下降。\n\
    \n**11.7 在本章中，我多次看到“监视器”这个术语。它是什么意思？**\n\n简单来说，你可以假设存在一个共享区域，但一次只能有一个线程进入该区域。其他线程需要等待当前线程（当前在该区域中活跃的线程）退出，才能获得访问该位置的机会。\n\
    \n在多线程环境中，这种机制可以帮助你以正确的方式访问共享资源。Java 没有 `Monitor` 类，但支持你已经探索过的同步概念。\n\n**11.8\
    \ `sleep()` 与 `wait()` 有何不同？**\n\n`wait()` 方法等待一个线程完成并进入死亡状态。在同步上下文中，此方法可以帮助你释放锁。该方法定义在\
    \ `Object` 类中。\n\n另一方面，`sleep()` 方法只是让线程休眠（暂停执行）一段指定的时间。它与锁无关。该方法定义在 `Thread`\
    \ 类中。\n\n**11.9 为什么 `wait()` - `notify()` 对应该在同步上下文中使用？**\n\n首先，你可能会遇到名为 `java.lang.IllegalMonitorStateException`\
    \ 的异常。如果允许在非同步上下文中使用这些方法，等待线程可能会错过通知线程的通知，从而永远等待下去。\n\n在 Java 中，每个对象都有一个锁和两个队列——一个入口队列和一个等待队列。如果一个线程调用某个对象的方法，但该对象的锁被另一个线程持有，那么调用线程将进入入口队列。\n\
    \n当你调用 `wait()` 方法时，你会强制线程释放控制权并进入阻塞状态。它现在被放置在等待队列中。\n\n现在，考虑这样一种情况：通知线程发出通知的同时，阻塞线程正在移入等待队列。在这种情况下，等待线程可能会错过通知并永远等待下去。\n\
    \n**11.10 如果线程在等待队列中没有线程时调用 `notify()`（或 `notifyAll()`）会发生什么？**\n\n在这种情况下，调用没有任何影响。\n\
    \n## 本章小结\n\n本章讨论了以下内容：\n\n*   什么是线程，它与进程有何不同？\n\n*   如何创建线程？\n\n*   线程的生命周期是什么？\n\
    \n*   在 Java 中创建线程有哪些不同的方法？\n\n*   `Thread` 类有哪些不同的方法及其用法？\n\n*   `Object` 类中的\
    \ `wait()`、`notify()` 和 `notifyAll()` 的用法是什么？\n\n*   什么是同步，如何在 Java 中实现同步概念？\n\
    \n*   什么是死锁，如何在系统中检测死锁？\n\n*   如何尝试简单的线程间通信技术？\n\n# 12. 泛型编程\n\n泛型编程是 Java 中的一个重要概念。它是在\
    \ JDK 5 中引入的，从那时起，它已成为 Java 编程中不可或缺的一部分。泛型编程的功能非常强大。它会使你的程序类型安全且灵活。泛型通常与集合框架一起使用。因此，一旦你熟悉了\
    \ Java 集合，就能更好地使用泛型。本章简要概述了泛型。\n\n为了帮助你理解泛型的强大之处，我将从一个非泛型程序开始，然后编写一个泛型程序。之后，我们将进行比较分析，以发现泛型编程的优势。\n\
    \n## 比较泛型程序与非泛型程序\n\n让我们从一个非泛型程序开始分析。\n"
