    ## 使用 final 关键字


    在某些情况下，你可能希望阻止继承过程。例如，你可能想要施加一个限制，使得父类中的方法不能被其子类的方法重写。因此，你将父类方法设为 final，以保持对象状态的一致性。（类似地，如果你想创建一个像
    Java 中的 `String` 类那样的不可变类，你也可以创建一个“final”类。）你必须记住，你可以通过多种方式防止重写。在以下部分中，你只会看到 `final`
    关键字的用法。它非常有用，因为编译器本身会阻止重写过程。


    考虑以下代码：


    ```

    final class ParentClassTest4

    {

    public void showMe(){

    System.out.println("Inside Parent.showMe()");

    }

    }

    class ChildClassTest4 extends ParentClassTest4 //Error

    {

    //Some code

    }

    ```


    你将收到一个编译错误：`The type ChildClassTest4 cannot subclass the final class ParentClassTest4`（参见图
    5-7）。


