- fmt: '### Q&A Session


    **4.11 I know that a subclass method can invoke a super class method. But how
    can a super class method invoke a subclass method?**


    You cannot do that. You must remember that a super class is completed before its
    subclass, so it has no idea about its subclass methods. It only announces something
    (think about some contract/methods) that can be used by its children. It is only
    giving, without any expectation of getting anything in return from its children.


    If you look carefully, you will find that the “is-a” test is one-way (e.g., a
    bus is always a vehicle, but the reverse is not necessarily true; so, there is
    no concept of backward inheritance).


    **4.12 I realize that inside a subclass method, if I want to invoke a parent class
    method and put code inside it, I can use the keyword** `super`. **Is this correct?**


    Yes.


    **4.13 In OOP, the inheritance mechanism helps us to reuse behavior. Is there
    any other way to achieve this?**


    Yes. Although the concept of inheritance is used in many places, it is not always
    the best solution. To understand it better, you need to understand the concept
    of design patterns. A very common alternative to inheritance is to use composition,
    which is covered in Chapter [9](#433474_2_En_9_Chapter.xhtml) in the book.


    **4.14 It appears to me that if a user already developed a method for an application,
    other users in the system should always reuse the same method through the concept
    of inheritance to avoid duplicate efforts. Is this understanding correct?**


    No. You should not generalize inheritance in this manner. It depends on the particular
    application and use. Let’s assume that someone has already made a `show()` method
    to describe the details of a `Car` class. Now, let’s say that you have also created
    a class called `Animal` and need to describe the characteristics of an animal
    with a method. Suppose that you believe that the name `show()` best suits your
    method. In this case, since you already have a `show()` method in a class called
    `Car`, and if you think that you should reuse the method for your `Animal` class,
    you would write something like this:


    ```

    class Animal extends Car{...} .

    ```


    Now, think for a moment. “Is this good design?” You must agree that there is no
    relationship between a car and an animal. So, you should not relate them in the
    same inheritance hierarchy.


    **4.15 How can I inherit a constructor or a destructor in Java?**


    In Java, constructors are not inherited. You should also remember that destructors
    are absent in Java (though you can think of the `finalize()` method as a close
    approximation to it).


    ### Demonstration 8


    Consider the following code segment. It works fine. But look at the commented
    lines closely. You can see that you need to be careful about a common mistake.
    For example, you cannot replace Line-15 with Line-12 and Line-13 to compile the
    code. But, it may appear that both approaches are doing the same thing.


    ```

    package java2e.chapter4;

    class Demo8A {

    public Demo8A(int x) {

    System.out.print(x);

    }

    }

    class Demo8B extends Demo8A {

    public Demo8B(int a, int b) {

    //Incorrect coding

    // int c = a + b;//Line-12

    // super(c); //error//Line-13

    // Correct coding

    super(a + b); // Line-15

    }

    }

    ```


    From the Java documentation, it appears to me that Java developers did not want
    to break the constructor chaining. It looks like they felt that if you were allowed
    to put statements like this before a `super` call, someone might misuse it; for
    example, they could perform some invalid operations before the creation of the
    parent object itself.


    ### Q&A Session


    **4.16 Some documents say that** `this()` **should be the first statement. Now,
    you are telling us** `super()` **should be the first statement. What will happen
    if you have both in the same constructor?**


    Good question. You must notice that both are constructor calls. If you have a
    constructor call, it must be the first statement. So, you cannot have both in
    the same constructor.


    **4.17 If that is the case, then it is a very restrictive design. Isn’t it?**


    The following program and output analysis can remove your doubt.


    ### Demonstration 9


    So, let’s go through the following program and output.


    ```

    package java2e.chapter4;

    class Parent9 {

    int i;

    Parent9() {

    System.out.println("Invoking parameterless constructor of Parent class.");

    }

    }

    class Child9 extends Parent9 {

    int b;

    Child9() {

    // both this() and super() cannot be used together

    // super();

    this(2);

    System.out.println("Invoking parameterless constructor of Child9.");

