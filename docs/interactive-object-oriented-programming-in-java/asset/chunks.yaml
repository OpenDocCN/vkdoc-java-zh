- fmt: '### Types of Deadlock


    Let us quickly revisit the theoretical operating system. There are different types
    of deadlock, for example:


    - **Resource deadlock**: Suppose two processes, `P1` and `P2`, are holding resources
    `R1` and `R2`, respectively. `P1` is asking for the resource `R2`, and `P2` is
    asking for the resource `R1`, to complete their jobs. OS generally has concerns
    about this type of deadlock.


    - **Synchronization deadlock**: Suppose process `P1` is waiting to perform an
    action `a1`, but only after `P2` completes the specific action `a2`, and `P2`
    is waiting to complete action `a2` until after `P1` completes `a1`.


    - **Communication deadlock**: Similar to preceding scenarios. You can replace
    the concept of actions/resources with messages; i.e., two processes are waiting
    to receive messages from each other to proceed further.


    ### Demonstration 7


    In this chapter, you are focusing on the multi-threaded environment. So, I’ll
    discuss the deadlock that can be caused by having multiple threads in your Java
    application.


    ```

    package java2e.chapter11;

    class SharedResource1 {

    static synchronized void startingPart() throws InterruptedException {

    System.out.println(Thread.currentThread().getName() + ": enters starting part-SharedResource1.");

    Thread.sleep(100);

    System.out.println(Thread.currentThread().getName() + ": Waiting to get endPart
    of SharedResource2.");

    SharedResource2.endPart();

    System.out.println(Thread.currentThread().getName() + ": Exits starting part-SharedResource1");

    }

    static synchronized void endPart() throws InterruptedException {

    System.out.println(Thread.currentThread().getName() + ": Exits SharedResource1.endingPart
    .");

    }

    }

