    *   最后，你可以看到一个注释掉的代码块，仅供参考。在不同的程序中，你可能会注意到 `for` 循环的以下变体之一：


    ```

    int lastElement=myList.get( myList.size()-1);

    ```


    *   由于你使用了泛型的概念，你可以以更好的方式打印 `ArrayList` 的元素。通常，在遍历并打印 `ArrayList`（或其他集合对象）中的元素时，你会看到这些代码版本。


    ```

