    **6.29 我可以在接口内部使用常量吗？**


    可以。它们默认是 public、static 和 final 的。要测试这一点，你可以尝试以下代码片段。将其保存为 `MyInter.java`。


    ```

    interface MyInter{

    int myConstant = 10;

    void myMethod();

    }

    ```


    首先，使用 `javac` 编译此代码。编译完成后，我们使用 `javap` 再次反编译它。以下是供你直接参考的输出：


    ```

