    桥接方法


    可能会出现一种有趣的情况，编译器需要向类中添加一个方法。这种方法被称为桥接方法。通常，你不需要直接处理这种情况。


    为了理解这个场景，让我们看一下以下代码段：

    '
- fmt: '```java

    class GenericClass12 {

    public void show(T value) {

    System.out.println("Inside parent class.The value is:"+value);

    }

    }

    class SubClass12 extends GenericClass12 {

    @Override

    public void show(Integer value) {

    System.out.println("Inside Child Class.The value is:"+value);

    }

    }

    ```


    Have you noticed the important characteristics? Let’s analyze.


    - The derived class `Subclass12` extends from the `Integer` specific version of
    `GenericClass12`; i.e., `GenericClass12<Integer>`.

    - The derived class `SubClass12` also overrides the parent method `show()`.


    Though this type of coding is allowed, a problem may arise when type erasure comes
    into play. Once type erasure performs its job, the expected form of the `show()`
    method in `GenericClass12` is as follows:


    ```java

    public void show(Object value){//other code..}

    ```


    And the expected form of the `show()` method in `SubClass12` is:


    ```java

    public void show()(Integer value){//other code}

    ```


    So, after the type erasure’s action, the method signatures do not match. To handle
    the situation and preserve polymorphism, the compiler generates a bridge method
    in `Subclass12`, with the preceding signature that can call the `Integer`-specific
    version. So, the new method `show()` will appear in the derived class (i.e., in
    `SubClass12`) as follows:


    ```java

    public void show(Object value) {

    show((Integer) value);

    }

    ```


