    So, you can omit these modifiers. It is important to note that there is a hot
    debate on whether one should use constants in an interface or not. Each side has
    its own pros and cons. Consider a simple case: if you allow a constant in an interface,
    all implementing classes can have the value to use. But let’s consider a case
    where an implementing class needs a totally different value than others, or perhaps
    it does not need the value at all. In this case, this constant value in the interface
    is unnecessary (or misleading) for the implementing class.


    **6.30 Can I inherit an interface from a class?**


    No. A class can have some implementations. So, if you allow an interface to inherit
    from them, the interface may contain the implementations, which is against the
    core aim of an interface.


