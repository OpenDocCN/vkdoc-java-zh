    # 5. 熟悉多态


    让我们回顾一下你已经学过的关于多态的知识。多态通常与*一个名称，多种形式*相关联；例如，如果你有两个整数操作数进行*加法*运算，你期望得到整数的和，但如果操作数是两个字符串，你期望得到拼接后的字符串。我还提到过多态可以分为两种类型：编译时多态和运行时多态。


    在这里，我将从编译时多态开始我们的讨论。


    在编译时多态中，编译器可以在编译时将适当的方法绑定到相应的对象，因为它拥有所有必要的信息（例如，方法参数），并且在程序编译后很早就知道要调用哪个方法。这就是为什么它也被称为*静态绑定*或*早期绑定*。在
    Java 中，可以通过方法重载来实现编译时多态。


    ## 方法重载


