    \ in Java 1.0, but in Java 1.1 they were added.\n\n### Demonstration 5\n\nThe\
    \ following demonstration shows a simple use of a nested class. Here, I show two\
    \ different ways to invoke an inner class method. In the first case, I call the\
    \ inner class method through an outer class method. In the second case, it is\
    \ called directly from `main() though an inner class object`**.**\n\n```\npackage\
    \ java2e.chapter3;\nclass OuterClass {\nstatic int staticInt=1;\nint nonStaticInt=2;\n\
    // Inner class\nclass InnerClass {\nvoid showInnerMethod() {\nSystem.out.println(\"\
    Inside InnerClass.\");\nSystem.out.println(\"The staticInt =\"+staticInt );\n\
    System.out.println(\"The nonStaticInt =\"+nonStaticInt +\"\\n\");\n}\n}\n// An\
    \ outer class method that can invoke an inner class method\nvoid invokeInner()\
    \ {\nInnerClass innerOb = new InnerClass();\nSystem.out.println(\"**Invoking an\
    \ inner class method from an outer class method.**\");\n//Calling the inner class\
    \ method\ninnerOb.showInnerMethod();\n}\n}\nclass Demonstration5 {\npublic static\
    \ void main(String[] args) {\nSystem.out.println(\"***Demonstration-5.Inner class\
    \ demonstration.***\\n\");\nOuterClass outer = new OuterClass();// Ok\n//Calling\
    \ the inner class method through an outer class method\nSystem.out.println(\"\
    **Calling the inner class method through an outer class object.**\");\nouter.invokeInner();\n\
    // InnerClass inner=new InnerClass();//Error\nOuterClass.InnerClass inner = outer.new\
    \ InnerClass();// Ok\n//Invoking the inner class method through an inner class\
    \ object.\nSystem.out.println(\"Invoking the inner class method through an inner\
    \ class object.\");\ninner.showInnerMethod();\n}\n}\n```\n\nOutput:\n\n```\n***Demonstration-5.Inner\
    \ class demonstration.***\n**Calling the inner class method through an outer class\
    \ object.**\n**Invoking an inner class method from an outer class method.**\n\
    Inside InnerClass.\nThe staticInt =1\nThe nonStaticInt =2\nInvoking the inner\
    \ class method through an inner class object.\nInside InnerClass.\nThe staticInt\
    \ =1\nThe nonStaticInt =2\n```\n\n### Q&A Session\n\n**3.7 Why are nested classes\
    \ useful?**\n\nThey can promote encapsulation with better security. The logical\
    \ grouping of the classes is easily maintainable too.\n\n## Copying an Object\n\
    \nSometimes you’ll be interested in copying an object. In a real-world application,\
    \ creating a new instance from scratch is a costly, time-consuming, and boring\
    \ operation. Sometimes the overall process is also complicated.\n\nYou can accomplish\
    \ the task of copying in various ways. Serialization methods, object cloning,\
    \ copy constructors, and so forth are used in this context. But to implement these\
    \ concepts, you need to be familiar with advanced features.\n\nFortunately, Java\
    \ supports cloning mechanisms, which you will learn in Chapter [15](#433474_2_En_15_Chapter.xhtml)\
    \ when I discuss prototype design patterns.\n\nIn the upcoming discussion, I’ll\
    \ discuss copy constructors only.\n\n### Using Copy Constructors\n\nThe following\
    \ demonstration shows how you can write your own copy constructor.\n\n### Demonstration\
    \ 6\n\nLook at the following program, which demonstrates such a usage:\n\n```\n\
    package java2e.chapter3;\nclass Student\n{\nint rollNo;\nString name;\n//Instance\
    \ Constructor\npublic Student(int rollNo, String name)\n{\nthis.rollNo = rollNo;\n\
    this.name = name;\n}\n//Copy Constructor\npublic Student( Student student)\n{\n\
    this.name = student.name;\nthis.rollNo = student.rollNo;\n}\npublic void displayDetails()\n\
    {\nSystem.out.println(\" Student name: \" + name + \",Roll no: \"+rollNo);\n}\n\
    }\nclass Demonstration6 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    ***Demonstration-6.User-defined copy constructor example in Java***\\n\");\nStudent\
    \ student1 = new Student(1, \"Bob\");\nSystem.out.println(\" The Student1 details\
    \ is as follows:\");\nstudent1.displayDetails();\nSystem.out.println(\"\\n Copying\
    \ student1 to student2 now\");\n//Invoking the user-defined copy constructor\n\
    Student student2 = new Student (student1);\nSystem.out.println(\" The details\
    \ of Student2 is as follows:\");\nstudent2.displayDetails();\n}\n}\n```\n\nOutput\n\
    \n```\n***Demonstration-6.User-defined copy constructor example in Java***\nThe\
    \ Student1 details is as follows:\nStudent name: Bob,Roll no: 1\nCopying student1\
    \ to student2 now\nThe details of Student2 is as follows:\nStudent name: Bob,Roll\
    \ no: 1\n```\n\n### Q&A Session\n\n**3.8 Does Java support a default copy constructor?**\n\
    \nNo, you have to write your own copy constructor."
  trans: "\n### 演示 4\n\n顾名思义，实例初始化块用于初始化实例变量。当你同时拥有构造器和初始化块时，你会看到初始化块在构造器之前被调用，如下所示：\n\
    \n```\npackage java2e.chapter3;\nclass Sample4 {\nint a, b, c;\n// 初始化块-1\n{\n\
    System.out.println(\"初始化块-1 已执行。设置 a=1。\");\na = 1;\n}\n// 初始化块-2\n{\nSystem.out.println(\"\
    初始化块-2 已执行。设置 b=2；\");\nb = 2;\n}\n// 构造器\nSample4() {\nSystem.out.println(\"\
    用户定义的无参构造器已执行。设置 c=3。\");\nc = 3;\n}\n}\nclass Demonstration4 {\npublic static\
    \ void main(String[] args) {\nSystem.out.println(\"***演示-4。实例初始化块的使用。***\\n\"\
    );\nSample4 sample4Object = new Sample4();\nSystem.out.println(\"sample4Object.a=\"\
    \ + sample4Object.a);// 1\nSystem.out.println(\"sample4Object.b=\" + sample4Object.b);//\
    \ 2\nSystem.out.println(\"sample4Object.c=\" + sample4Object.c);// 3\n}\n}\n```\n\
    \n输出：\n\n```\n***演示-4。实例初始化块的使用。***\n初始化块-1 已执行。设置 a=1。\n初始化块-2 已执行。设置 b=2；\n\
    用户定义的无参构造器已执行。设置 c=3。\nsample4Object.a=1\nsample4Object.b=2\nsample4Object.c=3\n\
    ```\n\n请注意，初始化块按照它们在类中出现的顺序执行。\n\n### 问答环节\n\n**3.3 我已经有构造器了，为什么还要使用初始化块？**\n\n\
    如果你的类中有多个构造器，你可以在构造器之间共享公共代码。\n\n**3.4 我可以在同一个类中有多个初始化块吗？**\n\n可以。演示 4 表明你可以在类中放置多个实例初始化块，它们会按照你在类中放置它们的顺序执行。\n\
    \n**3.5 可以有静态初始化块吗？**\n\n可以。你将在第 8 章中看到关于它们的详细讨论。\n\n**3.6 你能预测以下程序的输出吗？**\n\n\
    ```\npackage java2e.chapter3;\nclass Test1 {\nint a;\n// 初始化块-1\n{\nSystem.out.println(\"\
    初始化块-1 已执行。\");\na = 1;\n}\n// 构造器\nTest1() {\nSystem.out.println(\"构造器已执行。\"\
    );\na = 2;\n}\n// 初始化块-2\n{\nSystem.out.println(\"初始化块-2 已执行。\");\na = 3;\n}\n\
    }\nclass Quiz1 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    ***测验 1。初始化块和构造器的执行顺序***\");\nSystem.out.println(\"new Test1().a=\" + new Test1().a);\n\
    }\n}\n```\n\n**答案：**\n\n```\n***测验 1。初始化块和构造器的执行顺序***\n初始化块-1 已执行。\n初始化块-2 已执行。\n\
    构造器已执行。\nnew Test1().a=2\n```\n\n无论初始化块在类中出现的位置如何，它们都会在构造器之前执行。\n\n## 嵌套类\n\n\
    当你将一个类放在另一个类内部时，这样的类称为嵌套类。Java 支持静态嵌套类和非静态嵌套类。非静态嵌套类通常被称为***内部类***。在本章中，我们将只关注内部类。在此上下文中，你需要记住以下几点：\n\
    \n*   外部类是包含嵌套类的类。\n\n*   内部类可以访问外部类的静态和非静态成员。\n\n    注意 最初，Java 1.0 不支持嵌套类，但在\
    \ Java 1.1 中它们被添加了。\n\n### 演示 5\n\n以下演示展示了嵌套类的简单用法。这里，我展示了两种调用内部类方法的不同方式。在第一种情况下，我通过外部类方法调用内部类方法。在第二种情况下，它通过内部类对象直接从\
    \ `main()` 调用。\n\n```\npackage java2e.chapter3;\nclass OuterClass {\nstatic int\
    \ staticInt=1;\nint nonStaticInt=2;\n// 内部类\nclass InnerClass {\nvoid showInnerMethod()\
    \ {\nSystem.out.println(\"在 InnerClass 内部。\");\nSystem.out.println(\"staticInt\
    \ =\" + staticInt );\nSystem.out.println(\"nonStaticInt =\" + nonStaticInt + \"\
    \\n\");\n}\n}\n// 一个可以调用内部类方法的外部类方法\nvoid invokeInner() {\nInnerClass innerOb\
    \ = new InnerClass();\nSystem.out.println(\"**从外部类方法调用内部类方法。**\");\n//调用内部类方法\n\
    innerOb.showInnerMethod();\n}\n}\nclass Demonstration5 {\npublic static void main(String[]\
    \ args) {\nSystem.out.println(\"***演示-5。内部类演示。***\\n\");\nOuterClass outer = new\
    \ OuterClass();// 正确\n//通过外部类方法调用内部类方法\nSystem.out.println(\"**通过外部类对象调用内部类方法。**\"\
    );\nouter.invokeInner();\n// InnerClass inner=new InnerClass();// 错误\nOuterClass.InnerClass\
    \ inner = outer.new InnerClass();// 正确\n//通过内部类对象调用内部类方法。\nSystem.out.println(\"\
    通过内部类对象调用内部类方法。\");\ninner.showInnerMethod();\n}\n}\n```\n\n输出：\n\n```\n***演示-5。内部类演示。***\n\
    **通过外部类对象调用内部类方法。**\n**从外部类方法调用内部类方法。**\n在 InnerClass 内部。\nstaticInt =1\nnonStaticInt\
    \ =2\n通过内部类对象调用内部类方法。\n在 InnerClass 内部。\nstaticInt =1\nnonStaticInt =2\n```\n\n\
    ### 问答环节\n\n**3.7 为什么嵌套类有用？**\n\n它们可以促进封装，提供更好的安全性。类的逻辑分组也易于维护。\n\n## 复制对象\n\n\
    有时你可能需要复制一个对象。在实际应用中，从头开始创建一个新实例是一项成本高昂、耗时且乏味的操作。有时整个过程也很复杂。\n\n你可以通过多种方式完成复制任务。在此上下文中，会用到序列化方法、对象克隆、拷贝构造器等。但要实现这些概念，你需要熟悉高级特性。\n\
    \n幸运的是，Java 支持克隆机制，你将在第 15 章讨论原型设计模式时学习到。\n\n在接下来的讨论中，我将只讨论拷贝构造器。\n\n### 使用拷贝构造器\n\
    \n以下演示展示了如何编写你自己的拷贝构造器。\n\n### 演示 6\n\n请看下面的程序，它演示了这种用法：\n\n```\npackage java2e.chapter3;\n\
    class Student\n{\nint rollNo;\nString name;\n//实例构造器\npublic Student(int rollNo,\
    \ String name)\n{\nthis.rollNo = rollNo;\nthis.name = name;\n}\n//拷贝构造器\npublic\
    \ Student( Student student)\n{\nthis.name = student.name;\nthis.rollNo = student.rollNo;\n\
    }\npublic void displayDetails()\n{\nSystem.out.println(\" 学生姓名: \" + name + \"\
    , 学号: \"+rollNo);\n}\n}\nclass Demonstration6 {\npublic static void main(String[]\
    \ args) {\nSystem.out.println(\"***演示-6。Java 中用户定义的拷贝构造器示例***\\n\");\nStudent\
    \ student1 = new Student(1, \"Bob\");\nSystem.out.println(\" Student1 的详细信息如下：\"\
    );\nstudent1.displayDetails();\nSystem.out.println(\"\\n 现在将 student1 复制到 student2\"\
    );\n//调用用户定义的拷贝构造器\nStudent student2 = new Student (student1);\nSystem.out.println(\"\
    \ Student2 的详细信息如下：\");\nstudent2.displayDetails();\n}\n}\n```\n\n输出\n\n```\n\
    ***演示-6。Java 中用户定义的拷贝构造器示例***\nStudent1 的详细信息如下：\n学生姓名: Bob, 学号: 1\n现在将 student1\
    \ 复制到 student2\nStudent2 的详细信息如下：\n学生姓名: Bob, 学号: 1\n```\n\n### 问答环节\n\n**3.8\
    \ Java 支持默认的拷贝构造器吗？**\n\n不支持，你必须自己编写拷贝构造器。\n"
- fmt: '# Wrapper Class


    In Chapter [12](#433474_2_En_12_Chapter.xhtml), you’ll become familiar with generic
    programming, which is an advanced concept in Java. There, you’ll see the use of
    wrapper classes. In this section, you will get a quick overview of wrapper classes.


    In some special situations, you may need to convert a primitive type into an object.
    For example, when you simply need to pass an object in a method parameter, this
    conversion is useful. The same thing applies for generic programming. In this
    context, you may remember that some collection classes like `Vector` can store
    only objects, but not primitive types. Wrapper classes are used in those contexts
    (because these classes “wrap” the primitives in the corresponding object types).
    In Java, the wrapper classes are included in the `java.lang` package. Java provides
    wrapper classes for each of the primitive types. Table [3-1](#433474_2_En_3_Chapter.xhtml#Tab1)
    shows the wrapper classes corresponding to the primitive types.


    **Table 3-1** Wrapper Classes for Primitive Types


    | Primitive Type | Wrapper class |

    | --- | --- |

    | `boolean` | `Boolean` |

    | `int` | `Integer` |

    | `double` | `Double` |

    | `float` | `Float` |

    | `long` | `Long` |

    | `char` | `Char` |

    | `byte` | `Byte` |

    | `short` | `Short` |


    The following code segment shows a simple use case of the wrapper class. Here,
    a primitive `int myInt` is converted to an `Integer` object `intOb`, and later
    on you bring back the `int` from the `Integer` object:


    ```

    int myInt1=1;

    //Coverting primitive int to Integer object

    Integer intOb=new Integer(i);

    //Converting back from Integer Object to primitive int

    int myInt2=intOb.intValue();

    ```


    A similar conversion can be done from `double` to `Double`, `long` to `Long`,
    and so on (and vice versa). But you have to use the appropriate method. For example,
    you used `intOb.intValue()` for an `int`. Similarly, you can use `doubleOb.doubleValue()`
    for a `double` and `longOb.longValue()` for a `long`, where `doubleOb` is a `Double`
    object and `longOb` is a `Long` object, respectively.


    ## Demonstration 7


    This demonstration shows some common use cases of wrapper classes. The program
    is very simple, but you can refer to the associated comments for a better understanding.


    ```

    package java2e.chapter3;

    class Demonstration7 {

    public static void main(String[] args) {

    System.out.println("***Demonstration7.Exploring Wrapper classes.***\n");

    int myInt1 = 1;

    // Coverting primitive int to Integer object

    Integer intOb = new Integer(myInt1);

    // Converting back from Integer Object to primitive int

    int myInt2 = intOb.intValue();

    System.out.println("The myInt2=" + myInt2);

    long myLong1 = 1234567890123L;

    // Coverting primitive long to Long object

    Long longOb = new Long(myLong1);

    // Converting back from Long Object to primitive long

    long myLong2 = longOb.longValue();

    System.out.println("The long2=" + myLong2);

    // Coverting primitive int to String object

    String myString1 = Integer.toString(myInt1);

    System.out.println("The myString=" + myString1);

    String myString2 = "5.7";

    // Converting a String object to primitive type

    Double doubleOb = Double.valueOf(myString2);

    double myDouble = doubleOb.doubleValue();

    System.out.println("The myDouble=" + myDouble);

    //Converting numeric String to primitive int

    int myInt3=Integer.parseInt("125");

    System.out.println("The myInt3=" + myInt3);

    //Following line of code will cause runtime error  //(NumberFormatException)because
    you cannot convert "Hello" to //an int

    //int myInt4=Integer.parseInt("Hello");

    //System.out.println("The myInt4=" + myInt4);

    }

    }

    ```


    Output:


    ```

    ***Demonstration7.Exploring Wrapper classes.***

    The myInt2=1

    The long2=1234567890123

    The myString=1

    The myDouble=5.7

    The myInt3=125

    ```


    ### Note


    The process of converting a primitive type into an object of the corresponding
    wrapper class is termed autoboxing. For example, `int` to `Integer`, `double`
    to `Double`, `float` to `Float`, etc. The reverse procedure is called unboxing.
    It is also important to note that the constructors `Interger(int)` and `Long(long)`
    are deprecated since Java 9. But to understand some legacy code these are important.


    ## Garbage Collection


    Up until now, you have just been instantiating objects. But I have not discussed
    freeing up memory by deleting those objects. If you are familiar with C++, you
    may know that in C++ programmers need to use the `delete` keyword to free the
    memory occupied by an object. If you do not free the memory properly, you’ll see
    the impact of a memory leak, which can crash your application.


    There is no such keyword in Java. JVM uses a background thread, commonly known
    as the garbage collector, to detect unused objects and free up the memory occupied
    by them. This technique is called garbage collection (GC).


    ### Note


    Different Java runtime systems can employ different approaches to garbage collection,
    but, as mentioned before, you do not need to worry about it while writing your
    application.


    The biggest advantage of GC is that normally you do not need to worry about memory
    leaks, because you can rely on the automatic garbage-collection technique. But
    in some special cases, you may explicitly need to free up memory to avoid memory
    leaks, because the garbage collector is for some reason unable to detect those
    special scenarios.


    The basic thing to remember is that when an object is unreachable from a root
    object (a root object is a root in an object tree), the object is eligible for
    garbage collection. An object can have multiple references to it. It is also important
    to understand that when the reference count is zero, only the object will be garbage
    collected; this is a common misunderstanding. Also, two objects can be garbage
    collected if there is a connection between them. But if such a connection is further
    connected to a root object, those two objects will not be garbage collected. Q&A
    3.11 will show some highlights of root objects.'
