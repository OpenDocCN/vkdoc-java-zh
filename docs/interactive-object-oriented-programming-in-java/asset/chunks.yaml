    ob5.myMethod(1,2);

    ob5.myMethod();

    }

    }

    ```


    No. The compiler is able to resolve both the calls `ob5.myMethod(1)` and `ob5.myMethod(1,2)`,
    but it is confused by `ob5.myMethod()`. This call can be translated by either
    `myMethod(int... a)` or `myMethod(boolean... a)`.


    Because of this ambiguity, it raises a compile-time error (see Figure [5-4](#433474_2_En_5_Chapter.xhtml#Fig4)).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig4_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig4_HTML.jpg)


