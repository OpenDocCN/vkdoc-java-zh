- fmt: "# Your Java Application and JDBC\n\nYour Java application can talk to a database\
    \ using `JDBC`, which is a Java standard API. It provides you with the necessary\
    \ interface to connect a relational database. In the context of connecting a database\
    \ with a Java application, expert programmers might prefer alternatives like `JPA`,\
    \ `Hibernate`, and so on. But this chapter is dedicated to `JDBC` because it maintains\
    \ its own significance and usefulness. To do exercises in `JDBC` programming,\
    \ you need to be familiar with the following concepts:\n\n- What is a database,\
    \ and how can it help you to store or organize the data?\n- How can a database\
    \ be connected?\n- How can your Java application talk to the database? (Or, how\
    \ can you establish a connection to the database and then how can you insert,\
    \ update, or delete a record in the database?)\n\nYou will shortly learn that\
    \ your Java program will use the `JDBC API`, which supports some `JDBC` drivers,\
    \ to connect to a database. Figure [13-1](#433474_2_En_13_Chapter.xhtml#Fig1)\
    \ presents a simplified view of the overall process whereby the application (your\
    \ Java program) and the database are connected through a `JDBC` driver.\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig1_HTML.jpg](images/433474_2_En_13_Chapter/433474_2_En_13_Fig1_HTML.jpg)\n\
    \n**Figure 13-1**  \n`JDBC` can connect a Java application and a database (for\
    \ example, MySQL)\n\nSo, let’s examine each of these parts in this chapter.\n\n\
    > **Note**  \n> If you are absolutely new to database programming, you may need\
    \ to know some key terms that are mentioned briefly in this chapter. So, it is\
    \ recommended that you visit these terms and definitions repeatedly for a better\
    \ understanding. Gradually, these terms will be clear to you, and you will be\
    \ able to perform complex database programming.\n\n## Database and DBMS\n\nA **database**\
    \ is a collection of related files, usually called tables. A **table** is a collection\
    \ of related records. A **record** is a collection of related fields, and the\
    \ smallest piece of meaningful information in a file is called a **field** (or\
    \ data item).  \nA **database management system** (DBMS) is a software package\
    \ to manage these data effectively. Oracle Database, SQL Server, MySQL, MS-Access,\
    \ and so forth are some commonly used DBMS packages.\n\n### Types of DBMS\n\n\
    There are various types of DBMS; for example:\n\n- Hierarchical DBMS (HDBMS)\n\
    - Network DBMS (NDBMS)\n- Relational DBMS (RDBMS)\n- Object-oriented database\
    \ (OODB)\n- Distributed DBMS (DDBMS)\n\nEach of these has its own pros and cons.\
    \ Selecting a database depends on your own needs. Based upon your needs, instead\
    \ of choosing an SQL data structure (which is suitable for an RDBMS), you may\
    \ prefer NoSQL (it is a non-relational structure and can be suitable for a DDBMS).\
    \ In this chapter, you’ll see the usage of an RDBMS and simple SQL statements\
    \ only.\n\n### RDBMS\n\nIn RDBMS, data are stored in rows and columns, which is\
    \ similar to tables. These tables are termed **relations**. Rows of a table are\
    \ referred to as **tuples**, and columns are referred to as **attributes**. Each\
    \ row of a table contains a record. Each column contains fields. Consider the\
    \ table in Figure [13-2](#433474_2_En_13_Chapter.xhtml#Fig2).\n\nFor your reference,\
    \ I have marked all the records and attributes in Figure [13-2](#433474_2_En_13_Chapter.xhtml#Fig2).\n\
    \n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig2_HTML.jpg](images/433474_2_En_13_Chapter/433474_2_En_13_Fig2_HTML.jpg)\n\
    \n**Figure 13-2**  \nA sample table in an RDBMS.\n\nYou can process different\
    \ records of a relation based on some mathematical formulation, which is termed\
    \ **relational algebra**. Since the entire database can be processed using these\
    \ mathematical formulae, relational algebra is the theoretical foundation for\
    \ relational databases and SQL.  \nOracle Database, MySQL, Microsoft SQL Server,\
    \ IBM DB2, and so on are common examples of RDBMS. In this chapter, I have used\
    \ MySQL to demonstrate the examples.\n\n> **Note**  \n> In Appendix C, I have\
    \ shown the installation steps of MySQL on a Win10 machine.\n\n## SQL\n\nThe full\
    \ name of SQL is Structured Query Language. It is a very popular and widely used\
    \ RDBMS language. It is an English-like language and is considered a fourth-generation\
    \ language. Create data, update data, read data, and delete data are the most\
    \ common operations with SQL. In Java, you will see the use of the `java.sql`\
    \ package, which contains the API to support database programming (usually with\
    \ a relational database). This API supports many operations, some of which are\
    \ as follows:\n\n- Establish a connection with the database via `DriverManager`\
    \ facility. `DriverManager` class and `Driver` interface are often used in this\
    \ part of programming.\n- Talk to your database through SQL statements. You will\
    \ often use `Connection` interface, `Statement`, `PreparedStatement`, and `CallableStatement`\
    \ for this part of programming. You’ll see the use of `Statement` in Demonstration\
    \ 1 and Demonstration 2. Demonstration 3 will show the use of `PreparedStatement`,\
    \ and Demonstration 4 will show the use of `CallableStatement`.\n- Process the\
    \ results obtained through different queries through the `ResultSet` interface.\n\
    \nIn this chapter, you will see the use of these basic operations when the Java\
    \ program interacts with the MySQL database.\n\n## Points To Remember\n\n- Java,\
    \ C++, C, etc. are third-generation languages (3GL). In 3GLs, the focus is on\
    \ “How to solve a problem?”, but in 4GLs, the focus is on “What do you want?”\
    \ But some advanced 3GLs can combine some of the important aspects of 4GLs.\n\
    - It is important to note that SQL does not differentiate between uppercase and\
    \ lowercase character sets.\n- JDBC is an SQL-level API. It allows you to construct\
    \ and combine SQL statements inside Java API calls.\n\n> **Note**  \n> The simple\
    \ SQL statements are used to demonstrate various programs in this chapter. If\
    \ you are absolutely new to SQL, it is recommended that you do exercises with\
    \ simple SQL statements in your preferred database to get a better idea before\
    \ you proceed further.\n\n## Connecting to a Database\n\nYou can connect to a\
    \ database through different drivers. These drivers are supported in the JDBC\
    \ API. A JDBC driver is a software component that stays on client machines to\
    \ help Java programs talk to the DBMS; i.e., it acts like an adapter. There are\
    \ four different types of JDBC drivers, as follows:\n\n- **Type-1 (or JDBC-ODBC\
    \ bridge) driver**: It converts JDBC method calls into ODBC function calls. The\
    \ ODBC bridge driver must be installed on the client machine. Here, the JDBC driver\
    \ can talk to a third-party API that may not be written in Java. Also, Type-1\
    \ drivers are not written in Java, so these are not portable. These drivers are\
    \ suitable only for local connections. Oracle stopped supporting these drivers\
    \ from Java 8 onward. They now recommend you use the JDBC drivers that are available\
    \ from specific vendors of the database.\n\n- **Type-2 (or Native-API) driver**:\
    \ These drivers use client-side libraries of the database so that they can convert\
    \ JDBC method calls into native calls of database API. It is a partially Java\
    \ driver. Since both the native driver and the client libraries stay on the local\
    \ machine, these drivers are not used for remote network connections. But they\
    \ can provide a better performance than type-1 drivers."
