    ### Use of Synchronized Block


    In some situations, you won’t have synchronized methods that serve your purpose;
    for example, suppose there is a class that uses third-party code, and you do not
    have direct access to the codebase. You notice that in your multi-thread environment,
    there is a method (which is not synchronized) in the class that can be used by
    multiple threads simultaneously.


    To deal with such scenarios, Java provides synchronized blocks. If you want synchronized
    access to objects of a class you can use it.


    Here is the general format of a synchronized block :


    ```

    synchronized (theObjectReference) {

    //Some code

    }

    ```


    ### Demonstration 6


    The following is an example of a synchronized block:


    ```

    package java2e.chapter11;

    class MyClass6A {

    //synchronized void display() {

    void display() {

    System.out.print(Thread.currentThread().getName() + " has entered and working
    in the shared location. \n");

    try {

    Thread.sleep(1000);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    System.out.print(Thread.currentThread().getName() + " exits.\n");

    }

    }

    class Thread6B extends Thread {

    MyClass6A myClass6AObject;

    public Thread6B(MyClass6A myObject, String name) {

    super(name);

    this.myClass6AObject = myObject;

    }

    @Override

    public void run() {

    synchronized (myClass6AObject) {

    myClass6AObject.display();

    }

    }

    }

    class Demonstration6 {

    public static void main(String[] args) throws InterruptedException {

    System.out.println("***Demonstration-6.Exploring multi-threading with synchronized
    statements.***");

    MyClass6A myObject = new MyClass6A();

    Thread6B thread1 = new Thread6B(myObject, "Thread6B-1");

    Thread6B thread2 = new Thread6B(myObject, "Thread6B-2");

    thread1.start();

    thread2.start();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-6.Exploring multi-threading with synchronized statements.***

    Thread6B-1 has entered and working in the shared location.

    Thread6B-1 exits.

    Thread6B-2 has entered and working in the shared location.

    Thread6B-2 exits.

    ```


    This time, the `display()` method is not synchronized, but I have used the synchronized
    block in `Thread6B`’s `run()` method, and this thread invokes the `display()`
    method of `MyClass6A`. You will notice that multiple threads cannot enter the
    shared location simultaneously. Instead, each thread waits for the prior thread
    to finish its job in the shared location.


    ## Deadlock


    Deadlock is a situation or condition where at least two processes (or threads)
    are waiting for each other to complete (or release control) so that each one can
    finish its job. This may result in neither of them starting (and both going into
    a hanging state). You may often hear about these real-life examples:


    *   *You can’t get a job without experience; you can’t get experience without
    a job.*


    Or,


    *   *After a fight between two close friends, each of them expects the other to
    apologize first.*


    ### Note


    Without synchronization, you may notice unexpected outcomes (for example, corrupted
    data), but with improper use of synchronization, you can encounter a deadlock.'
