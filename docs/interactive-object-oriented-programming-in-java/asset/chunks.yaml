    ### Demonstration 7


    Now, let’s test the concept of overloading and overriding in the same program.
    Consider the following:


    ```

    package java2e.chapter5;

    class ParentClass7 {

    public int showMe(int i) {

    System.out.println("I am in Parent class");

    return i;

    }

    }

    class ChildClass7 extends ParentClass {

    public int showMe(int i) {

    System.out.println("In Child.showMe(int i)");

    System.out.println("I am overriding the parent method and adding 5 to the argument.");

    return i + 5;// Must return an int

    }

    public void showMe() {

    System.out.println("In Child.showMe().I am overloaded here.");

    }

    }

    class Demonstration7 {

    public static void main(String[] args) {

    System.out.println("*** Demonstration-7.Overloading with Overriding Demo***\n");

    ChildClass7 childOb = new ChildClass7();

    int value = childOb.showMe(5);

    System.out.println("The value returned is : " + value);// 5+5=10

    childOb.showMe();

    }

    }

    ```


    Output:


    ```

    *** Demonstration-7.Overloading with Overriding Demo***

    In Child.showMe(int i)

    I am overriding the parent method and adding 5 to the argument.

    The value returned is : 10

    In Child.showMe().I am overloaded here.

    ```


    The previous output is self-explanatory. From the output messages, you can easily
    identify which method is overloaded and which one is overridden.


    It is said that object-oriented programmers pass through three important stages.
    In the first stage, they become familiar with non-object-oriented constructs/structures.
    In this stage, they use decision statements, looping constructs, and so forth.
    In the second stage, they start creating classes and objects, and use the inheritance
    mechanism. And finally, in the third stage, they use polymorphism to achieve late
    binding and to make their programs flexible. Till now, you have gone through the
    first two stages. Now, let’s enter the third stage of expertise and learn how
    to implement polymorphism in Java programs.


    ## Runtime Polymorphism


    You already know that polymorphism is generally associated with one method name
    that has multiple forms (or constructs). Method overloading is known for compile-time
    polymorphism. But an important feature of Java is its ability to support the concept
    of runtime polymorphism. It is also referred to as **dynamic method dispatch**.
    Here, the call to an overridden method is resolved dynamically at runtime. In
    other words, you can invoke the appropriate method based on the object to which
    you are referring.


    In dynamic method dispatch, you have a parent class, which has at least one child
    class. The child class contains an overridden method, and you use a parent class
    reference to point to a child class object. In such a situation, the call to an
    overridden method is determined at runtime.


    In the following demonstration, there are two lines of code like the following:


    ```

    Vehicle obVehicle = new Bus();

    obVehicle.showMe();

    ```


    where `Vehicle` is the parent class and `Bus` is the child class, and the `Bus`
    class contains an overridden method, `showMe()`. So, in this demonstration, following
    the rule of dynamic method dispatch, you can invoke this overridden method of
    the `Bus` class at runtime.'
