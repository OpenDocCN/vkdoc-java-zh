    ## 多重 catch 子句


    从 Java 7 开始，你可以使用 `catch` 子句的另一种变体。现在，单个 `catch` 块可用于捕获多种异常类型。以下代码片段展示了如何在公共块中使用多个
    `catch` 子句：


    ```

    //从 Java 7 开始，你可以像下面这样编写多个 catch 子句

    catch (ArithmeticException | ArrayIndexOutOfBoundsException ex){  System.out.println("捕获到
    ArithmeticException 或 ArrayIndexOutOfBoundsException :" + ex.getMessage());

    ex.printStackTrace();

    }

    ```


    **10.2 你能预测以下代码的输出吗？**


    ```

    package java2e.chapter10;

    import java.util.Random;

    public class Quiz1 {

    public static void main(String[] args) {

    System.out.println("***Quiz1.关于如何在程序中放置 catch 子句。***");

    int a = 5;

    Random randomGenerator = new Random();

    // 将生成 0 到 2 之间的随机数。

    int b = randomGenerator.nextInt(3);

    System.out.println("b 的当前值为：" + b);

    int c = 0;

    try {

    //这里 b=0，会引发 ArithmeticException

    c = a / b;

    System.out.println("c=" + c);

    }

    //以下 catch 子句放置不正确

    catch (Exception ex) {

    System.out.println("捕获到异常：" + ex.getMessage());

    ex.printStackTrace();

    }

    //从 Java 7 开始，你可以像下面这样编写多个 catch 子句

    catch (ArithmeticException | ArrayIndexOutOfBoundsException  ex) {

    System.out.println("捕获到 ArithmeticException 或 ArrayIndexOutOfBoundsException："
    + ex.getMessage());

    ex.printStackTrace();

    }

    //catch 子句的正确放置位置

    /*catch (Exception ex) {

    System.out.println("捕获到异常：" + ex.getMessage());

    ex.printStackTrace();

    }*/finally {

    System.out.println("我在这里执行 finally");

    }

    }

    }

    ```


    你会遇到编译时错误：`Unreachable catch block for ArithmeticException. It is already handled
    in the catch block for Exception`，如图 10-4 所示。


    ![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig4_HTML.jpg](img/433474_2_En_10_Fig4_HTML.jpg)


    图 10-4


    不可达的 *catch* 块


    异常遵循继承层次结构。因此，你需要正确放置 `catch` 块。前面已经提到，`ArithmeticException` 类派生自 `RuntimeException`
    类，而 `RuntimeException` 类又派生自 `Exception` 类。为了便于理解，请参考程序中的相关注释。


    ### 要点记忆


    在处理多个 `catch` 块时，你需要将更具体的异常子句放在前面。换句话说，你应该按照从最具体到最通用的顺序放置 `catch` 块。


    值得注意的是，如果你熟悉 C#，可能会注意到它支持一些额外的 `catch` 子句变体。例如，在 C# 中，你可能会看到以下 `catch` 块变体：


    ```

    catch ()

    {

    Console.WriteLine("遇到异常");

    }

    ```


    或者：


    ```

    catch (WebException ex) when (ex.Status == WebExceptionStatus.Timeout)

    {

    //一些代码

    }

    ```


    ### 问答环节


    **10.3 我可以像下面这样只使用** **try** **和** **finally** **吗？**


    ```

    try{

    //一些代码

    }

    finally{

    //一些代码

    }

    ```


    可以。


    **10.4 那么为什么还需要** **catch** **块呢？**


    `catch` 块用于以某种指定的方式处理异常。同时，你必须注意 `finally` 的实际用途是不同的。前面已经提到，在 `finally` 内部你应该进行清理工作，以便应用程序能够优雅地关闭。例如，如果文件已经打开，你应该关闭它；或者，如果你已经分配了一些资源，这些资源应该在此块内释放（以防止内存泄漏）。在第
    14 章中，你将学习使用 try-with-resource 语句，其中术语“资源”指的是程序执行完毕后必须关闭的对象。


    **10.5 如果在** **finally** **块中遇到异常会发生什么？**


    你不应该忘记 `finally` 的目的，它基本上是用来关闭文件、释放占用的资源等。但是，如果你在 `finally` 块中放置了错误的逻辑，你可能会再次遇到异常。（解决方案是一样的——你可以使用
    `try-catch`、`try-finally` 或 `try-catch-finally` 块来防范 `finally` 块中可能出现的异常。事实上，在
    Java 6 之前，你可能会看到这种用于关闭资源的用法。）


    ### 演示 4


    这里有一个示例供你参考。你可以看到，一旦你收到异常（当 b 在 finally 块中变为 0 时），`finally` 块中的后续行将不会执行。例如，在以下情况中，输出中没有出现“我位于
    finally 块的末尾”这一行。


    ```

    package java2e.chapter10;

    import java.util.Random;

    public class Demonstration4 {

    public static void main(String[] args) {

    System.out.println("***演示-4.在 finally 块中编写代码的错误方式***");

    try {

    System.out.println("我在 try 块内部。");

    }

    finally {

    System.out.println("我位于 finally 块的开始处。");

    int a = 5;

    Random randomGenerator = new Random();

    // 将生成 0 到 2 之间的随机数。

    int b = randomGenerator.nextInt(3);//可能产生 0

    System.out.println("b 的当前值为：" + b);

    int c = a / b;

    System.out.println("c=" + c);

    System.out.println("我位于 finally 块的末尾。");

    }

    }

    }

    ```


    当 `b` 的值为 0 时的输出如下：


    ```

    ***演示-4.在 finally 块中编写代码的错误方式***

    我在 try 块内部。

    我位于 finally 块的开始处。

    b 的当前值为：0

    Exception in thread "main" java.lang.ArithmeticException: / by zero

    at java2e.chapter10.Demonstration4.main(Demonstration4.java:19)

    ```


    同样值得注意的是，如果你杀死或中断一个线程，`finally` 块可能不会执行，即使其他线程可以运行并使整个应用程序保持活动状态。你将在第 11 章中学习线程。


    ### 问答环节


    **10.6 到目前为止，你给出的例子都是像** **ArrayIndexOutOfBoundsException、** **ArithmeticException**
    **等。我该如何记住这些名称？**


    这些是 Java 中的内置异常。所有这些都已经在 `java.lang` 包中定义。由于这个包是默认包，因此默认情况下你会导入所有这些异常。通过练习，你可以记住它们的名称。我个人会借助
    Eclipse。类似的 IDE 也可以在这方面帮助你。


    在这种情况下，你可以注意默认处理程序抛出的异常是什么。从该报告中，你可以获取异常的名称。例如，注意我们演示 1 的输出，如下所示：


    ```

    ***演示-1.探索异常。***

    Exception in thread "main" java.lang.ArithmeticException: / by zero

    at java2e.chapter10.Demonstration1.main(Demonstration1.java:9)

    ```


    从这个输出中，你知道引发了 `ArithmeticException`。


    ## 抛出异常


    到目前为止，你已经看到了处理 Java 运行时系统抛出的异常的示例。当你处理 Java 语句时，可能会由于错误的逻辑、漏洞等原因遇到此类异常。但是还有一种引发异常的方法——你也可以自由地使用
    `throw` 关键字显式抛出异常。当你创建自己的应用程序并希望控制异常情况时，这种方法很有用。


    当你使用 `throw` 关键字时，需要遵循基本格式，如下所示：


    ```

    throw anObjectOfThrowable;

    ```


    其中 `anObjectOfThrowable` 必须是 `Throwable` 类或其子类的实例。

