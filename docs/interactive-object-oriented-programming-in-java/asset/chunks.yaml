    \ class.\n  - The `ArrayIndexOutOfBoundsException` class derives from the `IndexOutOfBoundsException`\
    \ class, which in turn derives from the `RuntimeException` class, which in turn\
    \ derives from the `Exception` class.\n\n### Note\n\nIn Eclipse, you can hover\
    \ your mouse pointer on the exception name and then choose the option “Open Declaration”\
    \ to reveal the inheritance hierarchy."
