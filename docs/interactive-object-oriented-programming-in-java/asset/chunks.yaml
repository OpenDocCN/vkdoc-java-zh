- fmt: "# Java 克隆技术详解\n\n在我们的示例中，使用了`clone()`方法，它在 Java 中执行浅拷贝。按照惯例，通过调用`super.clone()`获取返回的对象。如果需要深拷贝，可能会比较昂贵。\n\
    \n## 15.9. 请解释不同类型的拷贝技术并举例说明\n\n我们知道`Object`类（位于`java.lang`包中）是所有类的超类。这个`Object`类有一个名为`clone()`的方法，支持克隆操作。如果在\
    \ Eclipse 编辑器中将鼠标悬停在`clone()`方法上，将看到以下语法：\n\n```\nprotected native Object clone()\
    \ throws CloneNotSupportedException;\n```\n\n方法描述还说明，该方法“创建并返回此对象的副本。‘副本’的确切含义可能取决于对象的类。”\n\
    \n使用克隆时，会了解到两种不同的克隆技术，即浅拷贝和深拷贝。以下是它们的关键区别：\n\n- **浅拷贝**：速度更快，成本更低。如果目标对象只包含原始类型字段，浅拷贝总是更好的选择。\n\
    - **深拷贝**：成本高且速度慢。但如果目标对象包含许多引用其他对象的字段，深拷贝则很有用。\n\n那么，让我们理解它们背后的理论。浅拷贝创建一个新对象，然后将原始对象中的各个字段值复制到新对象中。因此，它也被称为逐字段拷贝。如果原始对象包含任何引用其他对象的字段，则这些对象的引用会被复制到新对象中（即不会创建这些对象的副本）。\n\
    \n让我们通过一个简单的图表来理解这个机制。假设有一个对象`X1`，它引用了另一个对象`Y1`。进一步假设对象`Y1`引用了对象`Z1`。图 15-4 展示了这一点。\n\
    \n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig4_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig4_HTML.jpg)\n\
    \n**图 15-4** 浅拷贝前：引用的状态\n\n现在，对`X1`进行浅拷贝后，会创建一个新对象`X2`，它也将引用`Y1`。图 15-5 展示了这一点。\n\
    \n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig5_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig5_HTML.jpg)\n\
    \n**图 15-5** 浅拷贝后：引用的状态\n\n但对于`X1`的深拷贝，会创建一个新对象`X3`。`X3`将引用新对象`Y3`，而`Y3`实际上是`Y1`的副本。同时，`Y3`又会引用另一个新对象`Z3`，它是`Z1`的副本。图\
    \ 15-6 展示了这一点。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig6_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig6_HTML.jpg)\n\
    \n**图 15-6** 深拷贝后：引用的状态\n\n在深拷贝的情况下，新对象与原始对象完全分离，对一个对象所做的任何更改不应反映在另一个对象中。在 Java\
    \ 中，要创建深拷贝，可能需要重写`clone()`方法。此外，深拷贝成本较高，因为可能需要创建额外的对象。\n\n## Java 中的浅拷贝与深拷贝\n\n\
    可以使用 Java 中的`clone()`方法创建克隆（或副本），但需要实现`Cloneable`接口，因为只有实现了`Cloneable`接口的 Java\
    \ 对象才具备克隆资格。`clone()`的默认版本创建的是浅拷贝。要创建深拷贝，需要重写`clone()`方法。\n\n以下是以下程序的关键特征：\n\n\
    - 在以下示例中，有两个类：`Employee`和`EmpAddress`。\n- `Employee`类有三个字段：`id`、`name`和`EmpAddress`。因此，您可能会注意到，要形成一个`Employee`对象，需要传递一个`EmpAddress`对象。所以，您会看到如下代码行：`Employee\
    \ emp=new Employee(1,\"John\",initialAddress);`\n- `EmpAddress`只有一个名为`address`的字段，其数据类型为`String`。\n\
    - 在客户端代码（`main()`方法内部）中，使用 Java 内置的`clone()`方法创建了一个克隆对象`empClone`。因此，您会看到如下代码行：`Employee\
    \ empClone=(Employee)emp.clone();`\n- 然后更改`emp`对象的字段值。\n- 但现在您会看到此更改的副作用，因为您注意到`empClone`对象的地址也发生了变化，这是不希望的。\n\
    \n```\nclass EmpAddress implements Cloneable {\n    String address;\n    public\
    \ EmpAddress(String address) {\n        this.address = address;\n    }\n    public\
    \ String getAddress() {\n        return address;\n    }\n    public void setAddress(String\
    \ address) {\n        this.address = address;\n    }\n    @Override\n    public\
    \ String toString() {\n        return this.address;\n    }\n    @Override\n  \
    \  public Object clone() throws CloneNotSupportedException {\n        // 浅拷贝\n\
    \        return super.clone();\n    }\n}\n\nclass Employee implements Cloneable\
    \ {\n    int id;\n    String name;\n    EmpAddress empAddress;\n    public Employee(int\
    \ id, String name, EmpAddress empAddress) {\n        this.id = id;\n        this.name\
    \ = name;\n        this.empAddress = empAddress;\n    }\n    public int getId()\
    \ {\n        return id;\n    }\n    public void setId(int id) {\n        this.id\
    \ = id;\n    }\n    public String getName() {\n        return name;\n    }\n \
    \   public void setName(String name) {\n        this.name = name;\n    }\n   \
    \ public EmpAddress getAddress() {\n        return this.empAddress;\n    }\n \
    \   public void setAddress(EmpAddress newAddress) {\n        this.empAddress =\
    \ newAddress;\n    }\n    @Override\n    public String toString() {\n        return\
    \ \"EmpId=\" + this.id + \" EmpName=\" + this.name + \" EmpAddressName=\" + this.empAddress;\n\
    \    }\n    @Override\n    public Object clone() throws CloneNotSupportedException\
    \ {\n        // 浅拷贝\n        return super.clone();\n    }\n}\n\nclass CloningTechniques\
    \ {\n    public static void main(String[] args) throws CloneNotSupportedException\
    \ {\n        System.out.println(\"***Shallow vs Deep Copy Demonstration.***\\\
    n\");\n        EmpAddress initialAddress = new EmpAddress(\"21, abc Road, USA\"\
    );\n        Employee emp = new Employee(1, \"John\", initialAddress);\n      \
    \  System.out.println(\"The emp details is as follows:\");\n        System.out.println(emp);\n\
    \        Employee empClone = (Employee) emp.clone();\n        System.out.println(\"\
    The empClone details is as follows:\");\n        System.out.println(empClone);\n\
    \        System.out.println(\"\\n Now changing the name, id and address of the\
    \ emp object \");\n        emp.setId(10);\n        emp.setName(\"Sam\");\n   \
    \     emp.empAddress.setAddress(\"221, xyz Road, Canada\");\n        System.out.println(\"\
    Now emp details is as follows:\");\n        System.out.println(emp);\n       \
    \ System.out.println(\"And empClone details is as follows:\");\n        System.out.println(empClone);\n\
    \    }\n}\n```\n\n输出如下：\n\n```\n***Shallow vs Deep Copy Demonstration.***\nThe\
    \ emp details is as follows:\nEmpId=1 EmpName=John EmpAddressName=21, abc Road,\
    \ USA\nThe empClone details is as follows:\nEmpId=1 EmpName=John EmpAddressName=21,\
    \ abc Road, USA\nNow changing the name, id and address of the emp object\nNow\
    \ emp details is as follows:\nEmpId=10 EmpName=Sam EmpAddressName=221, xyz Road,\
    \ Canada\nAnd empClone details is as follows:\nEmpId=1 EmpName=John EmpAddressName=221,\
    \ xyz Road, Canada\n```\n\n**分析：**\n\n注意输出的最后一行。您可以看到一个不希望的副作用，因为您注意到由于对`emp`对象的修改，克隆对象的地址也被修改了。这是因为原始对象和克隆对象都指向同一个地址，它们并非完全独立。图\
    \ 15-7 可以更好地描述这一场景。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig7_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig7_HTML.jpg)\n\
    \n**图 15-7** 前述示例中的浅拷贝场景"
  raw: "*   In our example, I have used the `clone()` method that\n    performs a\
    \ shallow copy in Java. Following the convention, you obtained\n    the returned\
    \ object by calling `super.clone()`. If you\n    need to get a deep copy that\
    \ can be expensive.\n\n**15.9\\. Can you please explain different types of copying\n\
    technique with examples?**\n\nYou know that the `Object` (in the `java.lang` package)\n\
    class is the super class for all classes. This `Object` class has a\nmethod called\
    \ `clone()`, which\nsupports the cloning operations. If you hover your mouse on\
    \ the `Clone()` method in the\nEclipse editor, you will see the following syntax:\n\
    \n```\nprotected native Object clone() throws CloneNotSupportedException;\n```\n\
    \nThe method description also says that this method “creates and\nreturns a copy\
    \ of this object. The precise meaning of\n*‘*copy*’* may depend on the class of\
    \ the object.”\n\nWhen you use cloning, you will come to know about two different\n\
    techniques of cloning, namely shallow copy and deep copy. Here is the\nkey distinction\
    \ between these two:\n\n*   Shallow\n    copy is faster and less expensive. It\
    \ is always better if your\n    target object has primitive fields only.\n\n*\
    \   Deep copy\n    is expensive and slow. But it is useful if your target object\
    \ contains\n    many fields that have references to other objects.\n\nSo, let’s\
    \ understand the theories behind them. Shallow copy creates a\nnew object and\
    \ then copies various field values from the original object\nto the new object.\
    \ So, it is also known as field-by-field copy. If the\noriginal object contains\
    \ any references to other objects as fields, then\nthe references to those objects\
    \ are copied into the new object (i.e.,\nyou do not create copies of those objects).\n\
    \nLet us try to understand the mechanism with a simple diagram. Suppose\nyou have\
    \ an object, X1, and it has a reference to another object, Y1.\nFurther, assume\
    \ that object Y1 has a reference to object Z1\\. Figure\n[15-4](#433474_2_En_15_Chapter.xhtml#Fig4)\
    \ demonstrates\nthe same.\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig4_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig4_HTML.jpg)\n\
    \nFigure 15-4\nBefore: shallow copy of the reference(s)\n\nNow, with a shallow\
    \ copy of X1, a new object, say, X2, will be created\nthat will also have a reference\
    \ to Y1\\. Figure [15-5](#433474_2_En_15_Chapter.xhtml#Fig5) demonstrates\nthe\
    \ same.\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig5_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig5_HTML.jpg)\n\
    \nFigure 15-5\nAfter: shallow\ncopy of the reference(s)\n\nBut for a deep copy\
    \ of X1, a new object, say, X3, will be created. X3\nwill have a reference to\
    \ new object Y3, which is actually a copy of Y1.\nAlso, Y3, in turn, will have\
    \ a reference to another new object, Z3,\nwhich is a copy of Z1\\. Figure [15-6](#433474_2_En_15_Chapter.xhtml#Fig6)\
    \ demonstrates\nthis.\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig6_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig6_HTML.jpg)\n\
    \nFigure 15-6\nAfter: deep\ncopy of the reference\n\nIn the case of a deep copy,\
    \ the new object is totally separated from\nthe original one, and any changes\
    \ made in one object should not be\nreflected in the other one. In Java, to create\
    \ a deep copy, you may need\nto override the `clone()` method and\nthen proceed.\
    \ Also, deep copy is expensive because you may need to\ncreate additional objects.\n\
    \nShallow Copy Versus Deep Copy in Java\nYou can make a clone (or copy) using\
    \ the `clone()` method in\nJava, but you need to implement the `Cloneable` interface\n\
    because only the Java objects that implement this `Cloneable` interface\nare eligible\
    \ for cloning. The default version of `clone()` creates a\nshallow copy. To create\
    \ the deep copy, you need to override the `clone()` method.\n\nHere are the key\
    \ characteristics of the following program:\n\n*   In the following example, you\
    \ have two classes: `Employee` and `EmpAddress`.\n\n*   The `Employee` class has\n\
    \    three fields: `id`, `name`, and `EmpAddress`. So, you\n    may notice that\
    \ to form an `Employee` object, you\n    need to pass an `EmpAddress` object.\n\
    \    So, you will notice the line of code as follows: `Employee emp=new Employee(1,\"\
    John\",initialAddress);`\n\n*   `EmpAddress` has only a\n    field called `address`,\
    \ which is a\n    `String`\n    datatype.\n\n*   In the client code (inside the\
    \ `main()` method), you\n    create a cloned object `empClone` using the\n   \
    \ built-in `clone()` method in\n    Java. So, you will notice the line of code\
    \ as follows: `Employee empClone=(Employee)emp.clone();`\n\n*   Then you change\
    \ the field values of the `emp` object.\n\n*   But now you see a side effect of\
    \ this change because you notice\n    that the address of the `empClone` object\
    \ also\n    changed, which was unwanted.\n\n```\nclass EmpAddress implements Cloneable\
    \ {\nString address;\npublic EmpAddress(String address) {\nthis.address = address;\n\
    }\npublic String getAddress() {\nreturn address;\n}\npublic void setAddress(String\
    \ address) {\nthis.address = address;\n}\n@Override\npublic String toString()\
