    ***Demonstration-13.Method Overriding with overloading Demo***

    Overriding method in Child class.

    Overloaded method in Parent.Here x= 25

    ```


    ### Q&A Session


    **5.27 给我一些提示，以便我能够轻松区分方法重载和方法覆盖。**


    以下要点可以帮助你巩固知识：


    - 在方法重载中，*所有方法可能位于同一个类中*（你必须注意这里的“可能”一词，因为你已经看到了一个示例[Demonstration13]，其中同时实现了方法重载和方法覆盖，并且方法重载的概念跨越了两个类——父类/超类及其子类/派生类）。在方法覆盖中，涉及父类和子类的继承层次结构，这意味着至少涉及一个父类及其子类（即至少两个类）。

    - 在方法重载中，方法签名不同。在方法覆盖中，方法签名相同（此时无需考虑协变返回类型）。

    - 你可以通过方法重载实现编译时（静态）多态，通过方法覆盖实现运行时（动态）多态。


    **5.28 你能预测演示14的输出吗？是否存在编译错误？**


    ### 演示14


    代码如下：


    ```

