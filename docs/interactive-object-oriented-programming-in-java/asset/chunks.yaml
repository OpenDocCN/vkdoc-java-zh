- fmt: '# Understanding Class Variables and Class Methods


    Sometimes developers do not want to operate through instances of a type. Instead,
    they prefer to work on the type itself. The concept of class variables or class
    methods appears in these scenarios. They are commonly known as **static variables**
    or **static methods**.


    Let’s consider a case where you want a variable to be shared among all objects
    of a class regardless of how many objects are created from the class. Other times,
    you may also want to maintain a single copy to handle some specific scenarios;
    for example, when you maintain a log file. In situations like these, you use the
    concept of class variables and class methods.


    In Java, a nested class itself can be static. When you prefix the keyword `static`
    to a nested class, it is a nested static class; when it is tagged on a method,
    it is called a static method; and when you associate it with a variable, it is
    known as a static variable.


    Before you proceed further, you need to remember the following points:


    - Java does not allow us to create a top-level static class. The class that contains
    the static class is termed the outer class. A non-static nested class is termed
    an inner class. For your easy reference, you should remember the following:


    ```

    class OuterClass//Cannot be static

    {

    //some code may present

    class NestedClass // Can be either static or non-static

    {

    //some code may present

    }

    }

    ```


    - Java language specification (11) says that you cannot place an enum type inside
    the body of an inner class. This is because a nested enum type is implicitly static,
    and an inner class cannot have static members except for constant variables.


    ## Class Variables and Class Methods


    In Chapter [3](#433474_2_En_3_Chapter.xhtml), you got a very simple overview of
    static classes and methods. In this chapter, you’ll explore it in more detail.
    To get the flow, let us begin with a simple example that contains both static
    and non-static members. In this demonstration, notice the supported comments,
    which simply inform you that static fields should be accessed in a static way.


    ### Demonstration 1


    In the following program, you have a class `Rectangle`, which has an `area()`
    method. The method is tagged with the `static` keyword, so you can invoke the
    method as `Rectangle.area()`. In this case, you do not need to create an object
    from the `Rectangle` class to invoke the method.


    ```

    package java2e.chapter8;

    class Rectangle {

    //static members

    static double length=25.5, breadth=10.0;

    static String myStaticString="I am a static string";

    //Non-static members

    int myNonStaticInt=25;

    public static double area() {

    return length * breadth;

    }

    }

    class Demonstration1 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-1.Exploring class variables and class methods.***\n");

    System.out.println("Area of Rectangle is " + Rectangle.area() + "sq. unit");

    System.out.println("The myStaticString is : " + Rectangle.myStaticString);

    Rectangle rectOb=new Rectangle();

    System.out.println("The myNonStaticInt is : " + rectOb.myNonStaticInt);

    //Warning: The static field Rectangle.myStaticString should //be accessed in a
    static way

    //System.out.println("The myStaticString is : " + rectOb.myStaticString);

    }

    }

    ```


    Output:


    ```

    ***Demonstration-1.Exploring class variables and class methods.***

    Area of Rectangle is 255.0sq. unit

    The myStaticString is : I am a static string

    The myNonStaticInt is : 25

    ```


    ## Working with Nested Classes


    Now, go through Demonstration 2 and then analyze the important characteristics
    of a nested static class.


    ### Demonstration 2


    This demonstration will also help you to notice the difference between a nested
    static class and a non-static nested (or inner) class.


    Here are the important points to note in this demonstration.


    ![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig1_HTML.jpg](images/433474_2_En_8_Chapter/433474_2_En_8_Fig1_HTML.jpg)


    Figure 8-1


    You cannot use a static reference to refer to a non-static field


    - In this program, the top-level class `Rectangle2` contains two nested classes—`StaticRectangle2`
    and `InnerClass2`. As per their names, `StaticRectangle2` is a static nested class
    and `InnerClass2` is a non-static nested class (or inner class).


    - Notice how an inner class is instantiated. The inner class resides inside the
    outer class, so you need to instantiate the outer class first. I have instantiated
    it in a single line of code, but it can be divided into the following two lines,
    which are shown in comments in the demonstration code.


    ```

    Rectangle2 rect2=new Rectangle2();

    Rectangle2.InnerClass2 innerOb2=rect2.new InnerClass2();

    ```


    - Inside `staticDisplay()`, if you uncomment the following line:


    ```

    //System.out.println("The nonStaticOuterInt is : " + nonStaticOuterInt);

    ```


    you’ll encounter a compile-time error, as shown in Figure [8-1](#433474_2_En_8_Chapter.xhtml#Fig1):
    `Cannot make a static reference to the non-static field nonStaticOuterInt`


    So, it is important to note that only the static members of the outer class can
    be accessed inside the static class. But an inner class can have access to both
    the static and non-static members of the outer class (notice that the `nonStaticDisplay()`
    method does not have any issue accessing the variables of the outer class).


    ```

    package java2e.chapter8;

    class Rectangle2 {

    static int staticOuterInt = 25;

    int nonStaticOuterInt = 125;

    //Static class

    static class StaticRectangle2 {

    void staticDisplay(){

    System.out.println("Inside the static class.");

    System.out.println("The staticOuterInt is : " + staticOuterInt);

    //System.out.println("The nonStaticOuterInt is : " + nonStaticOuterInt);//error

    }

    }

    //Inner class

    class InnerClass2 {

    void nonStaticDisplay(){

    System.out.println("\nInside the inner class.");

    System.out.println("The staticOuterInt is : " + staticOuterInt);

    System.out.println("The nonStaticOuterInt is : " + nonStaticOuterInt);//ok

    }

    }

    }

    class Demonstration2 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-2.Exploring class variables and class methods.***\n");

    Rectangle2.StaticRectangle2  nestedStaticOb=new Rectangle2.StaticRectangle2();

    nestedStaticOb.staticDisplay();

    //Instantiating an inner class

    //Inner class is contained in an outer class, so you need to //instantiate the
    outer class first.

    Rectangle2.InnerClass2 innerOb=new Rectangle2().new InnerClass2();

    //Or, use these multiple lines of codes to instantiate an //inner class as follows:

    /*Rectangle2 rect2=new Rectangle2();

    Rectangle2.InnerClass2 innerOb2=rect2.new InnerClass2();*/

    innerOb.nonStaticDisplay();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-2.Exploring class variables and class methods.***

    Inside the static class.

    The staticOuterInt is : 25

    Inside the inner class.

    The staticOuterInt is : 25

    The nonStaticOuterInt is : 125

    ```


    ### Points To Remember


    - In Java, a top-level static class is not allowed. A static class in Java is
    nested.


    - A non-static nested class is often termed an **inner** class.


    - Only the static members of the outer class can be accessed inside the nested
    static class.


    - To instantiate an inner class, you need to instantiate the outer class first.


    - The keyword `static` is used to denote “singular thing that can be used something
    like a global variable.” Some developers also believe that static methods are
    faster than non-static methods. But, the key thing to remember is that they are
    not part of any instance.


    - You may notice that the `main(String[] args)` method is static. So, you call
    this method without creating any instance of the class.'
