    **6.22 How is an abstract class different from an interface?**


    *   An abstract class can have concrete methods in it, but an interface cannot.
    I’ll come to this point shortly. From Java 8 onward, you can have a keyword called
    `default`. You can use this keyword in an interface to provide some default implementation.


    *   An abstract class can have only one parent class (can extend from another
    abstract class or concrete class), while an interface can have multiple parent
    interfaces. An interface can extend from another interface only.


    *   Members of an interface are by default public. An abstract class can have
    other flavors; e.g., private, protected, etc.


    *   Variables in an interface are by default `static final`. An abstract class
    can have non-final variables as well as final variables.


    **6.23 How can I decide whether I should use an abstract class or an interface?**


    I believe that if you want to have some sort of centralized or default behavior,
    an abstract class is a better choice because you can provide some default implementation.
    On the other hand, interface implementation starts from scratch. It indicates
    some rules about *what* is to be done instead of *how* it is to be done. Also,
    interfaces are preferred when you are trying to implement the concept of multiple
    inheritance.


    But at the same time, you know that if you need to add a new method in an interface,
    then you need to track down all the implementations of that interface and put
    the concrete implementation for that method in all those places. An abstract class
    is ahead here—you can add a new method in an abstract class with a default implementation
    and our existing code can run smoothly.


    So, now Java has taken special care of the last point: Java 8 introduced the use
    of the `default` keyword. So, now you can add the word `default` before your intended
    method signature and it can provide a default implementation. Interface methods
    are public by default, so you do not need to mark it by the keyword `public`.
    The Oracle Java online documentation ([`https://docs.oracle.com/javase/tutorial/java/IandI/abstract.html`](https://docs.oracle.com/javase/tutorial/java/IandI/abstract.html))
    briefly summarizes the following points:


    We should give preference to abstract classes for these scenarios:


    *   We want our code sharing done among multiple closely related classes.


    *   We expect that classes that extend our abstract class may have many common
    methods or fields, or they may require non-public access modifiers inside them.


    *   We want to use non-static or/and non-final fields, which enables us to define
    methods that can access and modify the state of the object to which they belong.


    On the other hand, we should give preference to interfaces for these scenarios:


    *   You expect that several unrelated classes are going to implement your interface;
    e.g., comparable interfaces can be implemented by many unrelated classes.


    *   We want to specify the behavior of a particular data type, but are not concerned
    about the implementer.


    *   We want to use the concept of multiple inheritance of type in the application.


    ## Default Methods in Interfaces


    In versions prior to Java 8, an interface can contain only abstract methods; in
    other words, the interface methods can have only declarations, not any body or
    implementation. But from Java 8 onward, you can have a method with a body in an
    interface, but the method must be preceded by the word `default`.'
