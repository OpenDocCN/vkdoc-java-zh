    第 15 章：设计模式简介

    第 16 章：常见问题解答


    15. 设计模式简介


    设计模式用于在设计软件时寻找通用的解决方案。在软件开发的初期，没有标准来指导软件开发人员如何设计他们的应用程序。在一个组织中，每个团队都有不同的格言，并遵循自己的风格。当一名新工程师加入现有团队时，学习当前系统的架构是一项艰巨的任务。团队中的资深或有经验的成员需要精确地解释当前的架构。他们还需要回答一些常见问题，比如使用当前设计的优势是什么，以及为什么不考虑替代设计。有经验的开发者还会培训新开发者如何通过简单地重用已有的概念来减少未来的工作量。设计模式解决了这类问题，并为所有开发者提供了一个通用平台。因此，你可以将它们视为该领域专家经验的记录。这些模式旨在应用于面向对象的设计中，以实现重用。

    1994 年，Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides 出版了《设计模式：可复用面向对象软件的基础》（Addison-Wesley,
    1994）一书。在这本书中，他们介绍了软件开发中设计模式的概念。这些作者因此成名，现在被称为“四人组”。在本章中，我将他们称为 **GoF**。GoF 描述了
    23 种模式，这些模式是通过软件开发者在一段时间内的共同经验记录下来的。每种模式都有其自身的复杂性、优缺点，但它们的意图各不相同。如今，当一名开发者加入一个新团队时，他们被期望了解这些模式。


    现实世界中设计模式的概念源于建筑设计师 Christopher Alexander。在他的一生中，他发现他的许多问题在本质上都是相似的。因此，他对这些常见问题实施了类似的解决方案。他说：


    *每种模式都描述了一个在我们环境中反复出现的问题，然后描述了该问题解决方案的核心，这样你就可以无数次地使用这个解决方案，而无需以相同的方式重复做两次。*


    软件工程界开始相信，尽管这些模式是为建筑和城镇描述的，但相同的概念可以应用于面向对象设计中的模式，因为从核心上讲，模式是常见问题的解决方案。因此，建筑行业中墙壁和门的最初概念被软件行业中类和接口的实例所取代。

    最后，重要的是要注意，GoF 是在 C++ 的背景下讨论设计模式的原始概念的。但 Sun Microsystems 在 1995 年发布了 Java 1.0
    的第一个公开实现，随后它经历了各种变化。（你可能知道 Oracle 公司在 2010 年收购了 Sun Microsystems。）因此，在 1995 年，Java
    对编程世界来说完全是新事物。但它迅速成长，并在短时间内跻身世界顶级编程语言之列，至今仍很受欢迎。请记住，设计模式的概念是通用的。因此，如果你能用 Java
    实践这些设计模式的基本概念，你的知识和专业技能将得到提升，你可以宣称自己是一名更优秀的程序员。

    这是一本 Java 书籍。本章重点介绍设计模式，而不是 Java 的最新特性。事实上，我特意选择了独立于版本的简单示例，以便你能够轻松理解这些概念。


    关键点


    在开始之前，让我们回顾一下关于设计模式的一些重要点：'
- fmt: "# Design Patterns Overview\n\nA design pattern describes a general reusable\
    \ solution to a software design problem. While developing a software, you may\
    \ encounter some common problems repeatedly. But you can always solve similar\
    \ kinds of problems with similar kinds of solutions. Keeping this principle in\
    \ mind, you can attack a problem with an already tested solution. At the same\
    \ time, you should ensure the effectiveness of the solution. Ideally, a solution\
    \ should be tested over a long period of time.\n\nIn general, a pattern provides\
    \ you with a template that helps you to solve a problem in many different situations.\
    \ It should also help you to get the best possible design much faster.\n\nIn simple\
    \ words, these patterns are descriptions of how to create objects and classes\
    \ and customize them to solve a general design problem in a particular context.\n\
    \nThe GoF discussed 23 design patterns. Each of these patterns focuses on a particular\
    \ object-oriented design. Each pattern can also describe the consequences and\
    \ tradeoffs of use. The GoF categorized these 23 patterns based on their purposes,\
    \ as shown next.\n\n## Creational Patterns\n\nThese patterns abstract the instantiation\
    \ process. You make the systems independent from how their objects are composed,\
    \ created, and represented. In these patterns, you will have concerns like “Where\
    \ should I place the `new` keyword in my application?” This decision can determine\
    \ the degree of coupling of your classes. The following five patterns belong to\
    \ this category:\n\n- Singleton Pattern\n- Prototype Pattern\n- Factory Method\
    \ Pattern\n- Builder Pattern\n- Abstract Factory Pattern\n\n## Structural Patterns\n\
    \nThese patterns focus on how classes and objects can be composed to form a relatively\
    \ large structure. At core, you generally use inheritance or composition to group\
    \ different interfaces or implementations. You know that the choice of composition\
    \ over inheritance (and vice versa) can affect the flexibility of your software.\
    \ The following seven patterns fall into this category:\n\n- Proxy Pattern\n-\
    \ Flyweight Pattern\n- Composite Pattern\n- Bridge Pattern\n- Facade Pattern\n\
    - Decorator Pattern\n- Adapter Pattern\n\n## Behavioral Patterns\n\nHere, you\
    \ will concentrate on algorithms and the assignment of responsibilities among\
    \ objects. You also need to focus on the communication between them and how the\
    \ objects are interconnected. The following eleven patterns fall in this category:\n\
    \n- Observer Pattern\n- Strategy Pattern\n- Template Method Pattern\n- Command\
    \ Pattern\n- Iterator Pattern\n- Memento Pattern\n- State Pattern\n- Mediator\
    \ Pattern\n- Chain of Responsibility Pattern\n- Visitor Pattern\n- Interpreter\
    \ Pattern\n\n## Class and Object Patterns\n\nThe GoF made another classification\
    \ based on scope, namely whether the pattern primarily focuses on the class or\
    \ its objects. You can guess that `class patterns` deal with classes and subclasses.\
    \ These patterns use inheritance mechanisms, so these are static in nature and\
    \ fixed at compile time. On the other hand, `object patterns` deal with objects\
    \ that can change at runtime. So, object patterns are dynamic.\n\nIn this chapter,\
    \ I’ll pick one pattern from each category for this introductory discussion on\
    \ design patterns. Each pattern is divided into six parts: a definition (which\
    \ is basically termed as intent in the GoF’s book), a core concept, a real-world\
    \ example, a coding example, a sample program with output, and the Q&A Session\
    \ section. As mentioned before, I have chosen simple examples so that you can\
    \ pick up the basic ideas quickly. But you must think on it, keep reading and\
    \ practicing, try to link with other problems, and then keep coding. This process\
    \ will help you to learn the subject quickly.\n\n> **Note**  \n> You can refer\
    \ to my other book, *Java Design Patterns: A Hands-On Experience with Real-World\
    \ Examples* (Second Edition), which is published by the same publisher, to learn\
    \ other design patterns in depth.\n\n## Q&A Session\n\n**15.1 What are the differences\
    \ between class patterns and object patterns?**  \nClass patterns focus on static\
    \ relationships, but object patterns focus on dynamic relationships. As their\
    \ name suggests, class patterns focus on classes and their subclasses. Object\
    \ patterns focus on the object’s relationships.\n\nThe GoF further differentiated\
    \ them as shown in Table 15-1.\n\n**Table 15-1** Class Patterns vs Object Patterns\n\
    \n| | **Class Patterns** | **Object patterns** |\n|---|---|---|\n| **Creational**\
    \ | Can defer object creation to its subclasses | Can defer object creation to\
    \ another object |\n| **Structural** | Focuses on the composition of classes (primarily\
    \ uses the concept of inheritance) | Focuses on the different ways of composition\
    \ of objects |\n| **Behavioral** | Describes the algorithms and execution flows\
    \ | Describes how different objects can work together and complete a task |\n\n\
    **15.2 Can I use multiple patterns in an application?**  \nYes. In real-world\
    \ programming, this is common.\n\n**15.3 Are these patterns dependent on a particular\
    \ programming language?**  \nProgramming languages can play an important role.\
    \ But the basic ideas are the same. Patterns are just like templates, and they\
    \ will give you some idea in advance of how you can solve a particular problem.\
    \ In this book, I primarily focus on object-oriented programming with Java. But\
    \ let’s suppose, instead of any object-oriented programming language, you have\
    \ chosen some other language (for example, `C`) that is not object oriented. In\
    \ that case, you may need to think about the core object-oriented principles,\
    \ such as inheritance, polymorphism, encapsulation, abstraction, and so on, and\
    \ how to implement them. The choice of a particular language is always important\
    \ because it may have some specialized features that can make your life easier.\n\
    \n**15.4 Should I consider common data structures like arrays and linked lists\
    \ as different design patterns?**  \nThe GoF clearly excludes those, saying that\
    \ “they are not complex, domain-specific designs for an entire application or\
    \ subsystem.” They can be encoded in classes and reused as is. So, they are not\
    \ your concern in this chapter.\n\n**15.5 If no particular pattern is 100% suitable\
    \ for my problem, how should I proceed?**  \nIt is obvious that you cannot solve\
    \ an infinite number of problems with a finite number of patterns. But there is\
    \ the probability that someone else before you faced a similar problem and found\
    \ a solution. You can always use those recorded experiences. So, if you know these\
    \ common patterns and their trade-offs, you can pick a close match. Lastly, no\
    \ one prevents you from using your own pattern for your own problem. But you have\
    \ to tackle the risk from all possible dimensions.\n\n**15.6 Do you have any general\
    \ advice before I jump into the topics?**  \nI always follow the footsteps my\
    \ seniors and teachers who are experts in this field. Here are some general suggestions\
    \ from them:\n\n- You should program to a supertype (abstract class/interface),\
    \ not an implementation.\n- You should prefer composition over inheritance.\n\
    - You should try to make a loosely coupled system.\n- You should segregate the\
    \ code that is likely to vary from the rest of your code.\n- You should encapsulate\
    \ the code that varies.\n\nLet’s jump into design patterns now.\n\n## Prototype\
    \ Pattern\n\n**GoF Definition**  \nSpecify the kinds of objects to create using\
    \ a prototypical instance, and create new objects by copying this prototype.\n\
    \n**Concept**  \nIn general, creating a new instance from scratch is a costly\
    \ operation. Using the concept of the prototype pattern, you can create a new\
    \ instance by copying or cloning an existing instance. This approach can save\
    \ both time and money."
