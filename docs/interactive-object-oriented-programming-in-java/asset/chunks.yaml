    \ 5.Some new String methods from Java 11.***\nThe str1 is :A non-empty string.\n\
    'The str1 is a blank string'-This statement is false\nThe str2 is :\n'The str2\
    \ is a blank string'-This statement is true\nRepeating 'str1' 3 times now.\nA\
