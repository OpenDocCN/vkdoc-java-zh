    **9.5 What are the challenges and drawbacks of OOP?**


    Many experts believe that, in general, the size of object-oriented programs is
    larger. Due to the larger size, you may need more storage (but nowadays, these
    issues hardly matter).


    Some developers find difficulties in the object-oriented programming style. They
    may still prefer other approaches, such as structured programming, logic programming,
    and so forth, so if they are forced to work in an OOP environment, life becomes
    tough for them.


    It is also true that you cannot efficiently solve every real-world problem in
    the object-oriented style. There are always some problems that can be solved better
    with a different approach; for example, a particular sudoku puzzle can be solved
    much more easily with Prolog (a logic programming language) than with Java (an
    object-oriented programming language).


    Also, a common problem with the object-oriented style may arise when you need
    to find bugs in an execution flow, particularly if, in your codebase, there are
    many small methods (or functions) that call each other for a simple event. However,
    I personally like object-oriented programming because I believe that its merits
    are greater than its demerits.


    ## Summary


    This chapter included the following:


    * A quick review of the core OOP principles in this book

    * How to differentiate abstraction from encapsulation

    * How to implement the concept of composition/aggregation in your application

    * The challenges and drawbacks associated with OOP


