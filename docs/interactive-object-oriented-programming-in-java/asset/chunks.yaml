    Let’s start with a simple program on inheritance. In the following demonstration,
    you have two classes—`ParentClass` and `ChildClass`. So, as their names suggest,
    `ChildClass` is derived from the `ParentClass` using the `extends` keyword.


    ```

    package java2e.chapter4;

    class ParentClass {

    public void showParentMethod() {

    System.out.println("I am a Parent Class method.");

    }

    }

    class ChildClass extends ParentClass {

    }

    class Demonstration1 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-1.Testing Inheritance.***");

    // Creating a ChildClass object

    ChildClass child1 = new ChildClass();

    // Invoking showParentMethod() through ChildClass object

    child1.showParentMethod();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-1.Testing Inheritance.***

    I am a Parent Class method.

    ```


    Notice that you have invoked `showParentMethod()` through a child class object.


    ### Points To Remember


    *   In Java, `Object` (in `java.lang` package) is the superclass for all classes.
    All other classes directly or indirectly are an inheritor of that class.

    *   Apart from constructors (instance and static), all members are inherited.
    But due to their accessibility restrictions, all the inherited members may not
    be accessible in the child/derived class.

    *   The child class can add new members, but it cannot remove the definition of
    the parent member. (Just as you can choose a new name for yourself but cannot
    change the surname of your parents).

    *   The inheritance hierarchy is transitive; that is, if class `C` inherits from
    class `B`, which in turn is derived from class `A`, then class `C` contains all
    the members from class `B` and class `A`.


    ### Q&A Session


    **4.1 This means that private members are also inherited. Is this understanding
    correct?**


    Yes.


    **4.2 How can I examine the fact that private members are also inherited?**


    You can refer to the program and output shown in Demonstration 2.


    ### Demonstration 2


    Consider the following:


    ```

    package java2e.chapter4;

    class A {

    private int a;

    }

    class B extends A {

    }

    class Demonstration2 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-2.Private members are also inherited***");

    B obB = new B();

    A obA = new A();

    // This is a proof that a is also inherited. See the error //message.

    System.out.println(obB.a);// Error:The field A.a is not visible

    System.out.println(obB.b);// Error: b cannot be resolved or //is not a field

    System.out.println(obA.a);// Error:The field A.a is not visible

    System.out.println(obA.b);// Error: b cannot be resolved or //is not a field

    }

    }

    ```


    Figure [4-5](#433474_2_En_4_Chapter.xhtml#Fig5) is the output snapshot from the
    Eclipse editor.


    ![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig5_HTML.jpg](images/433474_2_En_4_Chapter/433474_2_En_4_Fig5_HTML.jpg)


    Figure 4-5


    An output snapshot from the Eclipse editor


    We have encountered two different types of errors:


    *   `The field A.a is not visible`. It indicates that the private member `a` from
    class `A` is inherited in the child class `B`.

    *   You have done an experiment with a field `b`, which is not present in this
    class hierarchy (i.e., the field is not present—neither in `A` nor in `B`). When
    you try to access the field with a class `A` or class `B` object, you encounter
    a different error—`b cannot be resolved or is not a field`. Therefore, if `a`
    were absent in class `B`, you would get a similar error.


    ### Q&A Session


    **4.3 Why doesn’t Java support multiple inheritance through class?**


    The main reason is to avoid ambiguity. It can cause confusion in typical scenarios;
    for example, let’s suppose that you have a method named `show()` in your parent
    class. The parent class has multiple children, `Child1` and `Child2`, which *override*
    the `show()` method for their own purposes. The code may look like what’s shown
    in Demonstration 3.


    ### Demonstration 3


    Try this out:


    ```

    class Parent {

    public void show() {

    System.out.println("I am in Parent");

    }

    }

    class Child1 extends Parent {

    public void show() {

    System.out.println("I am in Child1");

    }

    }

    class Child2 extends Parent {

    public void show() {

    System.out.println("I am in Child2");

    }

    }

    ```


    Now let’s assume that your `Grandchild` class derives from both `Child1` and `Child2`
    but has not overridden the `show()` method. Figure [4-6](#433474_2_En_4_Chapter.xhtml#Fig6)
    depicts the scenario.


    ![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig6_HTML.jpg](images/433474_2_En_4_Chapter/433474_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Diamond problem due to multiple inheritance through class in Java


    So, now you have an ambiguity: from which class will `GrandChild` inherit/call
    `show()`—`Child1` or `Child2`? To avoid this type of ambiguity, Java does not
    support multiple inheritance through classes. This problem has a famous name—the
    **diamond problem** (the name is given due to the shape of the class inheritance
    diagram).


    So, the Java compiler will always complain about the following code:


    ```

    class GrandChild extends Child1,Child2// Error: Not supported in Java

    {

    public void show() {

    System.out.println("I am in Grandchild");

    }

    }

    ```


    ### Note


    1.  The prior discussion is not limited to methods. When you create an object
    by instantiating a class, that object inherits fields from the parent class (the
    super class). Now, suppose your class has multiple super classes. You would encounter
    the same problem if constructors from different parent classes made an attempt
    to instantiate the same field, because you would need to decide their order of
    precedence. When you learn about interfaces, you’ll learn that they do not contain
    fields. So, you do not need to worry about this kind of problem that results from
    multiple inheritance of state.

    2.  You may need to take special care with default methods (introduced in Java
    8) in a similar context. You’ll see the discussion shortly.


    ### Q&A Session


    **4.4 It appears to me that programming languages do not support multiple inheritance
    through classes. Is this understanding correct?**


    No. The decision is made by the designers of the programming language; for example,
    C++ supports the concept of multiple inheritance through classes.


    **4.5 Why do C++ designers support the concept of multiple inheritance through
    classes? It seems that the diamond problem can impact them too.**


    Here is my point of view: C++ designers probably wanted the feature to be included
    to make the language rich. They supply you with the features but leave the proper
    usage to you.


    On the other hand, Java designers wanted to avoid any unwanted outcomes resulting
    from this kind of feature. You will learn that multiple inheritance can make your
    life difficult in various situations; for example, when you need to maintain constructor
    chaining, or when you need to involve casting (downcasting is always risky; you
    will see this discussion in detail in Chapter [5](#433474_2_En_5_Chapter.xhtml),
    Q&A 5.14), etc. So, it appears to me that the Java designers simply wanted to
    make the language simple and less error-prone.


    **4.6 Is there hybrid inheritance in Java?**


    Think carefully. Hybrid inheritance is a combination of two or more types of inheritance.
    So, the answer to this question is “yes” if you are not trying to combine any
    type of multiple inheritance through classes. But if you try to make a hybrid
    inheritance with any type of multiple inheritance (through classes), the Java
    compiler will raise its concern immediately.


    **4.7 Suppose you have a parent class and a child class. Can you guess in which
    order constructors of the classes will be called?**


    You must remember that the constructor’s calls follow the path from the parent
    class to the child class. Let’s test this with the following demonstration.'
