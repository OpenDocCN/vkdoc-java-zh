    # 9. Quick Recap of OOP Principles


    Welcome to the final chapter of Part I. So far, you have learned the fundamentals
    of object-oriented programming with the basic building blocks in Java. Before
    you proceed to Part II, let’s review the core principles that you have already
    covered in this book.


    - **Class and objects**. Throughout the book, in almost every example, I have
    used different types of classes and objects. The use of the `static` keyword was
    little bit different, and you accessed the static fields through the class names.

    - **Polymorphism**. Both types of polymorphism were covered. Compile-time polymorphism
    was covered through method overloading, and runtime polymorphism was covered through
    method overriding techniques. You have seen that dynamic method dispatch is an
    important concept in Java.

    - **Abstraction**. This feature was tested through abstract classes and interfaces.

    - **Encapsulation**. Each class with different access modifiers can be considered
    in this category. But a better example can be a class with a private member and
    a getter-setter. As per experts’ suggestions, you should make your instance variables
    private and access them through public getter-setter methods.

    - **Inheritance**. You explored different types of inheritance in multiple chapters.

    - **Message passing**. Normally, a message for an object is to request to invoke
    a method in the receiving object. In simple words, message passing is just communication
    among different objects. This feature is very common in a multi-threaded environment.
    But you experimented with runtime polymorphisms, in which a super class reference
    pointed to a subclass object, and this can also be considered in this category.
    Multi-threading is discussed in Chapter [11](#433474_2_En_11_Chapter.xhtml) in
    the book.

    - **Dynamic binding**. Runtime polymorphism through method overriding examples
    can fall into this category.


    ## Q&A Session


    **9.1 Can you summarize the difference between abstraction and encapsulation?**


    The process of wrapping up the data and methods into a single entity is known
    as **encapsulation**. Using this technique, you can prevent arbitrary and unsecured
    access to your data. You can use different access modifiers to restrict direct
    access to your data. But the use of getter and setter methods is a better example
    in this category. In case of encapsulation, your entire code works like a capsule,
    so it is termed as an encapsulation.


    In abstraction, you show the essential features but hide the detailed implementation
    (or background details) from the user; for example, when you use a remote control
    to switch on a television, the internal circuits of the device are not your concern.
    You are OK with the device as long as your preferred channel appears properly
    on your television once the button is pressed.'
