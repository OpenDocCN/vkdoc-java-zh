    **5.31 Why should I prefer writing polymorphic code?**


    Your code will be flexible, and it can adopt upcoming changes easily. You must
    agree that if you implement only static binding, you are actually restricting
    runtime polymorphism.


    **5.32 How is inheritance related to polymorphism?**


    To implement polymorphism, you need to use inheritance, because in Java polymorphism
    is type based, but to create type hierarchy, you need inheritance.


    **5.33 What is the key difference between inheritance and polymorphism?**


    Inheritance is used to reuse code, and it supports the parent–child relationship.
    But if the child wants to redefine the existing parent class behavior, it can
    do so using the concept of polymorphism.


    **5.34 Can I override a private method?**


    To override a method, it should be accessible or visible first. In Chapter [2](#433474_2_En_2_Chapter.xhtml),
    you saw that private members are not accessible in the subclass. So, how could
    you override them?


    **5.35 Based on the answer to the previous question, can I conclude that private
    methods can be overridden inside an inner class?**


    Yes. In this case, since you can access them, overriding is possible. Here is
    a sample code snippet for you:


    ```

    class OuterClass2 {

    private void showOuter2() {

    System.out.println("Inside OuterClass");

    // showInner2();//Error

    }

    class InnerClass2 {

    void showInner2() {

    System.out.println("Inside InnerClass");

    System.out.println("Calling an outer class method from inner class");

    showOuter2();// Ok

    }

    // Overriding

    private void showOuter2() {

    System.out.println("Overiding showOuter2()");

    }

    }

    }

    ```'
