  trans: "\n```\npackage java2e.chapter6;\nabstract class IncompleteClass {\npublic\
    \ abstract void showMe();\n}\nclass CompleteClass extends IncompleteClass {\n\
    private void showMe() {\nSystem.out.println(\"I am complete.\");\nSystem.out.println(\"\
    I supplied the method body for showMe().\");\n}\n}\nclass Quiz2 {\npublic static\
    \ void main(String[] args) {\nSystem.out.println(\"***Quiz2: Experiment with access\
    \ specifiers***\\n\");\nIncompleteClass myRef = new CompleteClass();\nmyRef.showMe();\n\
    }\n}\n```\n\n输出结果是一个编译时错误，如图 6-5 所示。\n\n![../images/433474_2_En_6_Chapter/433474_2_En_6_Fig5_HTML.jpg](img/433474_2_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5\n\n不能降低继承方法的可见性\n\n出现此错误是因为你不能在派生类方法中降低可见性。因此，在这种情况下，你需要在 `CompleteClass`\
    \ 中使用 `public` 访问修饰符，而不是 `private` 访问修饰符。然后，你将得到以下输出：\n\n```\n***Quiz2 : Experiment\
    \ with access specifiers***\nI am complete.\nI supplied the method body for showMe().\n\
    ```\n\nJava 语言规范（Java SE 11）说明如下：\n\n*   覆盖或隐藏方法的访问修饰符必须提供至少与被覆盖或隐藏方法本身相同的访问权限，具体如下：\n\
    \    *   *如果被覆盖或隐藏的方法是 public，那么覆盖或隐藏的方法必须是 public；否则，会发生编译时错误。*\n\n*   *如果被覆盖或隐藏的方法是\
    \ protected，那么覆盖或隐藏的方法必须是 protected 或 public；否则，会发生编译时错误。*\n\n*   *如果被覆盖或隐藏的方法具有包访问权限，那么覆盖或隐藏的方法不能是\
    \ private；否则，会发生编译时错误。*\n\n另外，从另一个角度思考。如果允许编译前面的代码片段，你可能会尝试编写如下代码：\n\n```\nIncompleteClass\
    \ myRef = new CompleteClass();\nmyRef.showMe();\n```\n\n在这种情况下，你试图从派生类调用一个 private\
    \ 方法，这将破坏 `private` 修饰符的实际目的。\n\n## 接口\n\n接口是 Java 中的一种特殊类型。接口包含方法签名，用于定义一些规范。子类型需要遵循这些规范。使用接口时，你可能会发现它与抽象类有许多相似之处。\n\
    \n通过接口，你声明了*要*实现的内容，但并未指定*如何*实现。接口与类类似，但有一些主要区别。例如，接口中的所有方法都声明为没有方法体（即方法实际上是抽象的）。此外，接口只能包含\
    \ final 字段。关键字 `interface` 用于声明接口类型；其后跟接口名称，如下所示：\n\n```\ninterface MyInterface{\n\
    // 一些代码\n}\n```\n\n### 要点\n\n*   简单来说，接口帮助我们分离“做什么”和“怎么做”。\n\n*   要声明它们，你需要使用\
    \ `interface` 关键字。\n\n*   它是一种引用类型，其成员可以是类、接口、常量和方法。\n\n*   通常，接口方法没有方法体（换句话说，它们是抽象方法）。你只需用分号替换方法体，如下所示：\n\
    \n*   从 Java 8 开始，你可以在预期的方法签名前加上 `default` 关键字，并提供默认实现。我将在后面讨论这一点。\n\n*   一个 Java\
    \ 类不能有多个父类（或超类），但可以实现多个接口。这样，它就在 Java 中支持了多重继承的概念。\n\n*   通常，在定义接口时，你遵循与类类似的语法；例如：\n\
    \n```\nvoid someMethod();\n```\n\n```\ninterface MyInterface{..}\n```\n\n### 注意\n\
    \n基本上，你可能需要处理以下任何一种情况：简单接口、嵌套接口和注解类型。在本章中，讨论将仅从简单接口开始。\n\n借助接口，你可以在运行时支持动态方法解析。一旦定义，一个类可以实现任意数量的接口。\n\
    \n### 演示 3\n\n让我们来看一个接口的实际应用：\n\n```\npackage java2e.chapter6;\ninterface MyInterface\
    \ {\nvoid implementMe();\n}\nclass MyClass implements MyInterface {\npublic void\
    \ implementMe() {\nSystem.out.println(\"MyClass is implementing the interface\
    \ method implementMe().\");\n}\n}\nclass Demonstration3 {\npublic static void\
    \ main(String[] args) {\nSystem.out.println(\"***Demonstration-3.Exploring Interfaces.***\\\
    n\");\nMyClass myClassOb = new MyClass();\nmyClassOb.implementMe();\n}\n}\n```\n\
    \n输出：\n\n```\n***Demonstration-3.Exploring Interfaces.***\nMyClass is implementing\
    \ the interface method implementMe().\n```\n\n### 问答环节\n\n**6.15 如果这些方法是不完整的，那么使用该接口的类需要实现接口中的所有方法。这样理解对吗？**\n\
    \n完全正确。如果该类无法实现所有方法，它将通过将自身标记为 abstract 来声明其不完整性。下面的示例将帮助你更好地理解这一点。\n\n这里，接口 `MyInterface`\
    \ 有两个方法：`show1()` 和 `show2()`。但类 `MyClass` 只实现了一个。结果，`MyClass` 本身变成了一个抽象类。\n\n\
    ```\ninterface MyInterface{\nvoid show1();\nvoid show2();\n}\n//MyClass 变成抽象类。它没有实现\
    \ MyInterface 的 show2()\nabstract class MyClass implements MyInterface\n{\n@Override\n\
    public void show1() {\nSystem.out.println(\"MyClass is implementing the interface\
    \ method show1 ().\");\n}\n// public abstract void show2();\n}\n```\n\n一个类需要实现接口中定义的所有方法；否则，它将是一个抽象类。\n\
    \n如果你忘记实现 `show2()`，并且没有用 `abstract` 关键字标记你的类，如下所示：\n\n```\nclass MyClass implements\
    \ MyInterface\n{\n@Override\npublic void show1() {\nSystem.out.println(\"MyClass\
    \ is implementing the interface method show1().\");\n}\n// public abstract void\
    \ show2();\n}\n```\n\n你将在 Eclipse 中看到以下编译错误（图 6-6）。\n\n![../images/433474_2_En_6_Chapter/433474_2_En_6_Fig6_HTML.jpg](img/433474_2_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6\n\n一个类需要实现接口中定义的所有方法；否则，它是一个抽象类\n\n**6.16 在前面的场景中，**`MyClass` **的一个子类可以通过仅实现**\
    \ `show2()` **来完成任务。这样理解对吗？**\n\n正确。演示 4 为你展示了一个完整的实现。\n"
- fmt: '### Demonstration 4


    In the following demonstration, the class `MyClass` implements only the `show1()`
    method of `MyInterface`. Since it does not implement the other method, `show2()`,
    it becomes an abstract class.


    The class `MySubClass` is a derived class of `MyClass`. This class implements
    the `show2()` method. As a result, following the inheritance hierarchy, an object
    of `MySubclass` can invoke both methods—`show1()` and `show2()`.


    ```

