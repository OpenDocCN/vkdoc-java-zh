    Consider the following program and corresponding output:


    ```

    package java2e.chapter10;

    class DemoClass {

    void thowingException() {

    System.out.println("I always throw a NullPointerException");

    throw new NullPointerException("Forcefully throwing a NullPointerException");

    // System.out.println("I''ll never print this line");

    }

    }

    class Demonstration5 {

    public static void main(String[] args) {

    System.out.println("***Demonstration5.The use of ''throw'' keyword***\n");

    DemoClass demo = new DemoClass();

    try {

    demo.thowingException();

    } catch (Exception e) {

    System.out.println(e.getMessage());

    e.printStackTrace();

    }

    }

    }

    ```


    Output:


    ```

    ***Demonstration5.The use of ''throw'' keyword***

    I always throw a NullPointerException

    Forcefully throwing a NullPointerException

    java.lang.NullPointerException: Forcefully throwing a NullPointerException       at
    java2e.chapter10.DemoClass.thowingException(Demonstration5.java:6)

    at java2e.chapter10.Demonstration5.main(Demonstration5.java:17)

    ```


    ## Rethrowing an Exception


    Sometimes you need to rethrow an exception; for example, when you want to write
    a log entry or when you want to send a new higher-level exception. When you rethrow
    an exception from a `catch` block, it is rethrown to the next enclosing `try`
    block. Demonstration 6 shows such an example.


    Here is a sample format that you can use to rethrow an exception:


    ```

    try{

    //some code

    }

    catch(Exception ex){

    //some code, for example, you log the exception

    //Now rethrow it

    throw ex;

    }

    ```


    ### Demonstration 6


    Consider the following:


    ```

    package java2e.chapter10;

    class Demonstration6 {

    static int c;

    static void divide(int a, int b) {

    try {

    b--;

    c = a / b;

    // some code

    } catch (ArithmeticException ex) {

    //Log it now

    System.out.println("a= " + a + " b= " + b);//a=100,b=0

    System.out.println("Caught an exception: " + ex.getMessage());

    // Now rethrow it

    throw ex;// rethrowing the exception

    }

    }

    public static void main(String[] args) {

    System.out.println("***Demonstration-6.Rethrowing an exception.***");

    int a = 100, b = 1;

    try {

    divide(a,b);

    }

    catch (Exception ex) {

    System.out.println("Recaught the exception inside main() method.");

    System.out.println("a= " + a + " b= " + b);//a=100,b=1

    System.out.println("Here is the stackTrace :");

    ex.printStackTrace();

    }

    }

    }

    ```


    Output:


    ```

    ***Demonstration-6.Rethrowing an exception.***

    a= 100 b= 0

    Message: / by zero

    Recaught the exception inside main() method.

    a= 100 b= 1

    Here is the stackTrace :

    java.lang.ArithmeticException: / by zero

    at java2e.chapter10.Demonstration6.divide(Demonstration6.java:10)

    at java2e.chapter10.Demonstration6.main(Demonstration6.java:25)

    ```


    You can see why logging some additional details before you rethrow an exception
    is important. As soon as you encountered the exception, you logged it, and from
    that log you discovered that the divisor (`b`) became 0 in the `divide()` method.
    If you do not use the `try`-`catch` block inside the `divide()` method and you
    do not log the values of `a` and `b` immediately, then you are dependent on the
    `catch` block inside the `main()` method only. In a case like this, when you see
    the final log statements, you may wonder why you see this exception even if the
    value of `b` is 1.


    ### Note


    You’ll learn to create and use your own exception shortly, and you may combine
    the original exception with your custom exception message and then rethrow it
    for better readability.


    **10.7 Can you compile the following code fragment?**


    ```

    package java2e.chapter10;

    class TestClass {

    // some code

    }

    class Quiz2 {

    void raiseException() {

    System.out.println("I love to throw an exception");

    try {

    throw new TestClass();

    } catch (TestClass e) {

    //some code

    }

    }

    }

    ```


    You will get a compiler error—`No exception of type TestClass can be thrown; an
    exception type must be a subclass of Throwable`—as shown in Figure [10-5](#433474_2_En_10_Chapter.xhtml#Fig5).


    ![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig5_HTML.jpg](images/433474_2_En_10_Chapter/433474_2_En_10_Fig5_HTML.jpg)


    Figure 10-5


    An exception type must be a subclass of `Throwable`


    To remove the errors in the previous program, you can follow the compiler’s suggestion.
    For example, in this case, if you just make the following change in the previous
    code, the compiler will not complain:


    ```

    class TestClass extends Throwable{

    //remaining code as it is

    ```


    ## Use of `throws` Keyword


    Java supports both the keywords `throw` and `throws`. You have already seen the
    use of the `throw` keyword in Demonstrations 5 and 6. Before you use the `throws`
    keyword, you need to remember the following points:


    *   A `throws` keyword will be needed to indicate all the exceptions that a method
    can throw. Otherwise, you’ll encounter compile-time errors (except for the next
    point).


    *   The previous rule is not applicable for `Error` or `RuntimeException` or any
    of their subclasses.


    *   You must remember that checked exceptions must be included in a method’s `throws`
    list.


    The upcoming demonstrations will illustrate these points in detail.


    ### Note


    Q&A 10.8 can help you to differentiate the checked exceptions from the unchecked
    exceptions. I suggest you go through Demonstration 7 and Demonstration 8 before
    you enter into that discussion.


    ### Demonstration 7


    Consider the following:


    ```

    package java2e.chapter10;

    class TestClassException extends Throwable {

    String str;

    TestClassException(String str) {

    this.str = str;

    }

    public String getMessage() {

    return str;

    }

    }

    class DemoClass7 {

    void raiseException() throws TestClassException {

    throw new TestClassException("A TestClassException is raised");

    }

    }

    class Demonstration7 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-7.The use of throws keyword***\n");

    DemoClass7 demo = new DemoClass7();

    try {

    demo.raiseException();

    } catch (TestClassException e) {

    System.out.println(e.getMessage());// A TestClassException is //raised

    System.out.println("Here is the stacktrace:");

    e.printStackTrace();

    }

    }

    }

    ```


    Output:


    ```

    ***Demonstration-7.The use of throws keyword***

    A TestClassException is raised

    Here is the stacktrace:

    java2e.chapter10.TestClassException: A TestClassException is raised at java2e.chapter10.DemoClass7.raiseException(Demonstration7.java:17)at
    java2e.chapter10.Demonstration7.main(Demonstration7.java:27)

    ```


    Now, go through the following points:


    *   You can see that inside `DemoClass7`, the method `raiseException()` is throwing
    an exception, but I have not used a `try-catch` block around this code. Instead,
    I have added `throws` statements after the method names, as follows:


    *   It is used to confirm that this method has the capability of throwing the
    exception of type `TestClassException`. The class has a constructor to accept
    a `String` message, so you can provide a meaningful message when you intend to
    throw such exceptions.


    *   If you ignore the `throws` clause and just use the following code in Demonstration
    7:


    ```

    void raiseException() throws TestClassException {

    ```


    ```

    void raiseException(){

    ```


    your program will not compile. It will raise the errors shown in Figure [10-6](#433474_2_En_10_Chapter.xhtml#Fig6).


    ![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig6_HTML.jpg](images/433474_2_En_10_Chapter/433474_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Compile-time error because `TestClassException` is not included in `raiseException()`’s
    `throws` list


    You may have to do the same for the `main()` method if you do not surround the
    line of code `demo.raiseException();` with a `try`-`catch` block. So, in that
    case, your `main()` method also could be like the following:


    ```

    public static void main(String[] args) throws TestClassException {

    //rest of the code

    ```'
