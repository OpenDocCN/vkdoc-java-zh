    ## Synchronization


    Sometimes multiple threads need to access some shared resources. Controlling such
    situations is tricky; for example, consider a situation where one thread is trying
    to read the data from a file and another thread is still writing or updating in
    the same file. If you cannot control the situation efficiently, you may get surprising
    results. The concept of synchronization is useful in similar situations. Java
    can help you to control the situation with synchronization methods and statements.


    ### Use of Synchronized Methods


    Let’s begin with synchronized methods. To understand the power of a synchronized
    method, let’s start with a program where the concept is not implemented. In the
    following demonstration, `MyClass5A` is a simple class with a method, `display()`.
    You can prefix the keyword `synchronized` to a method as follows to make it a
    synchronized method:


    ```

    synchronized void display(){

    //some code

    }

    ```


    Because we’re starting with the non-synchronized version, I have commented the
    synchronized portion of the code in the upcoming demonstration.


    Let’s assume that inside `display()` there are some shared resources. For simplicity,
    I have put in some simple statements to indicate the entry and exit of a thread.
    To see the effect precisely, I have also put a simple `sleep` statement inside
    the method body. It can help you switch the execution to another thread.


    There is a thread class `Thread5B` that has following constructor:


    ```

    public Thread5B(MyClass5A myObject, String name) {

    super(name);

    this.myClass5AObject = myObject;

    }

    ```


    So, to instantiate from the `Thread5B` class, you can pass a `MyClass5A` object
    and a string as arguments. In the following program, I have created two instances
    from this class, and to identify them clearly, I have passed the string arguments
    as `Thread5B-1` and `Thread-5B-2`.


    Once you run the non-synchronized version of the program, you may notice the following
    lines:


    ```

    Thread5B-1 has entered and working in the shared location.

    Thread5B-2 has entered and working in the shared location.

    Thread5B-1 exits.

    Thread5B-2 exits.

    ```


    The output indicates that `Thread5B-1` has entered the shared location first.
    But before it finishes its execution, `Thread5B-2` also enters into the shared
    location.


    But if a thread is working in the shared location, you may want to restrict any
    other thread from entering that location. So, this time, you uncomment the synchronized
    version of `display()` and comment out the non-synchronized version of it. Now,
    if you run the program, you will see that you have achieved your goal through
    the synchronized method.


    ### Demonstration 5


    Here is the code in full:


    ```

    package java2e.chapter11;

    class MyClass5A {

    //Synchronized version

    //synchronized void display() {

    //Non-synchronized version

    void display() {

    System.out.print(Thread.currentThread().getName() + " has entered and working
    in the shared location. \n");

    try {

    Thread.sleep(1000);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    System.out.print(Thread.currentThread().getName() + " exits.\n");

    }

    }

    class Thread5B extends Thread {

    MyClass5A myClass5AObject;

    public Thread5B(MyClass5A myObject, String name) {

    super(name);

    this.myClass5AObject = myObject;

    }

    @Override

    public void run() {

    myClass5AObject.display();

    }

    }

    class Demonstration5 {

    public static void main(String[] args) throws InterruptedException {

    System.out.println("***Demonstration-5.Exploring multi-threading with synchronized
    method.***");

    MyClass5A myObject = new MyClass5A();

    Thread5B ob1 = new Thread5B(myObject, "Thread5B-1");

    Thread5B ob2 = new Thread5B(myObject, "Thread5B-2");

