    \ exception types. The following code snippet shows how to use multiple `catch`\
    \ clauses in a common block:\n\n```java\n//Java 7 onward, you can write multiple\
    \ catch clauses like the following\ncatch (ArithmeticException | ArrayIndexOutOfBoundsException\
    \ ex) {\n    System.out.println(\"Caught either ArithmeticException or ArrayIndexOutOfBoundsException\
    \ :\" + ex.getMessage());\n    ex.printStackTrace();\n}\n```\n\n**10.2 Can you\
    \ predict the output of the following?**\n\n```java\npackage java2e.chapter10;\n\
    import java.util.Random;\npublic class Quiz1 {\n    public static void main(String[]\
    \ args) {\n        System.out.println(\"***Quiz1.It is about how to place the\
    \ catch clauses in the program.***\");\n        int a = 5;\n        Random randomGenerator\
    \ = new Random();\n        // Will generate 0 to 2.\n        int b = randomGenerator.nextInt(3);\n\
    \        System.out.println(\"Current value of b is : \" + b);\n        int c\
    \ = 0;\n        try {\n            //Here b=0,it will raise an ArithmeticException\n\
    \            c = a / b;\n            System.out.println(\"c=\" + c);\n       \
    \ }\n        //Incorrect placement of following catch clause\n        catch (Exception\
    \ ex) {\n            System.out.println(\"Caught the Exception :\" + ex.getMessage());\n\
    \            ex.printStackTrace();\n        }\n        //Java 7 onward, you can\
    \ write multiple catch clauses like the following\n        catch (ArithmeticException\
    \ | ArrayIndexOutOfBoundsException ex) {\n            System.out.println(\"Caught\
    \ either ArithmeticException or ArrayIndexOutOfBoundsException :\" + ex.getMessage());\n\
    \            ex.printStackTrace();\n        }\n        //Correct placement of\
    \ the catch clause\n        /*catch (Exception ex) {\n            System.out.println(\"\
    Caught the Exception :\" + ex.getMessage());\n            ex.printStackTrace();\n\
    \        }*/finally {\n            System.out.println(\"I am finally here\");\n\
    \        }\n    }\n}\n```\n\nYou’ll encounter a compile-time error: `Unreachable\
