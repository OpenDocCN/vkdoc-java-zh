- fmt: "### Demonstration 4\n\nSuppose you have a parent class, a child class, and\
    \ a grandchild class. Let’s call them `Parent4`, `Child4`, and `Grandchild4`,\
    \ respectively. As the names suggest, the `Child4` class derives from `Parent4`,\
    \ and `Grandchild4` derives from the `Child4` class. Now, create an object of\
    \ the `Grandchild4` class. From the output of the following demonstration, you\
    \ can see that constructors are called in the order of their derivation.\n\n```\n\
    package java2e.chapter4;\nclass Parent4 {\nParent4() {\nSystem.out.println(\"\
    Inside Parent Constructor.\");\n}\n}\nclass Child4 extends Parent4 {\nChild4()\
    \ {\nSystem.out.println(\"Inside Child Constructor.\");\n}\n}\nclass Grandchild4\
    \ extends Child4 {\nGrandchild4() {\nSystem.out.println(\"Inside GrandChild Constructor.\"\
    );\n}\n}\nclass Demonstration4 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    ***Demonstration-4\\. Testing constructor calling sequence***\");\nGrandchild4\
    \ grandChild = new Grandchild4();\n}\n}\n```\n\nOutput:\n\n```\n***Demonstration-4\\\
    . Testing constructor calling sequence***\nInside Parent Constructor.\nInside\
    \ Child Constructor.\nInside GrandChild Constructor.\n```\n\n### Q&A Session\n\
    \n**4.8 Sometimes I am uncertain about which should be the parent class and which\
    \ should be the child class in an inheritance hierarchy. How can I tackle this\
    \ kind of situation?**\n\nYou can try to remember some simple statements like\
    \ the following: a football player is an athlete, but the reverse is not necessarily\
    \ true. Or a bus is a vehicle, but the reverse is not necessarily true. This type\
    \ of “is-a” test can help you to decide which should be the parent; for example,\
    \ from the prior statement, you can conclude that `Vehicle` is the parent class\
    \ and `Bus` is the child class.\n\nYou can also use this “is-a” test to determine\
    \ in advance whether you can place a class in the same inheritance hierarchy or\
    \ not. So, when you see that a bus is not a bird, you do not try to place them\
    \ in the same inheritance hierarchy.\n\n## A Special Keyword: super\n\nIn Java,\
    \ there is a special keyword called `super`. It is used to access the members\
    \ of a parent class in an efficient way. Whenever a child class wants to refer\
    \ to its immediate parent, it can use the `super` keyword.\n\nLet’s examine the\
    \ different uses of the `super` keyword in the following examples.\n\n### Demonstration\
    \ 5\n\nYou can create a child class instance with the following line of code:\n\
    \n```\nChild5 obB2 = new Child5(1, 2, 3);\n```\n\nThe child class constructor\
    \ can, in turn, call the parent class constructor using the `super` keyword. Notice\
    \ the bold line in the following block of code:\n\n```\nChild5(int a, int b, int\
    \ c) {\n//System.out.println(\"Before setting,c=\"+ this.c);//Error:Constructor\
    \ call must be the first statement in a //constructor\nsuper(a, b);\nSystem.out.println(\"\
    I am in child constructor.\");\nSystem.out.println(\"Before setting,c=\"+ this.c);\n\
    this.c = c;\nSystem.out.println(\"Now c=\"+ this.c);\n}\n```\n\nOther parts of\
    \ the program are self-explanatory. Now, execute the program and then go through\
    \ the analysis section for a better understanding.\n\n```\npackage java2e.chapter4;\n\
    class Parent5 {\nprivate int a;\nprivate int b;\nParent5(int a, int b) {\nSystem.out.println(\"\
    I am in parent constructor.\");\nSystem.out.println(\"Before setting,a=\"+ this.a);\n\
    System.out.println(\"Before setting, b=\"+ this.b);\nSystem.out.println(\"Setting\
    \ the values for instance variables a and b.\");\nthis.a = a;\nthis.b = b;\nSystem.out.println(\"\
    Now a=\"+ this.a);\nSystem.out.println(\"Now b=\"+ this.b);\n}\nvoid parent5Method()\
    \ {\nSystem.out.println(\"I am a parent method.\");\n}\n}\nclass Child5 extends\
    \ Parent5 {\nprivate int c;\nChild5(int a, int b, int c) {\n//System.out.println(\"\
    Before setting,c=\"+ this.c);//Error:Constructor call must be the first statement\
    \ in a //constructor\nsuper(a, b);\nSystem.out.println(\"I am in child constructor.\"\
    );\nSystem.out.println(\"Before setting,c=\"+ this.c);\nthis.c = c;\nSystem.out.println(\"\
    Now c=\"+ this.c);\n}\nvoid child5Method() {\nSystem.out.println(\"I am a child\
    \ method.\");\nSystem.out.println(\"I am calling the parent method.\");\nsuper.parent5Method();\n\
    }\n}\npublic class Demonstration5 {\npublic static void main(String[] args) {\n\
    System.out.println(\"***Demonstration-5\\. The uses of the 'super' keyword Demo***\"\
    );\nChild5 obB2 = new Child5(1, 2, 3);\n//System.out.println(\"a in ObB2=\" +\
    \ obB2.a);//Error:a is private\n//System.out.println(\"b in ObB2=\" + obB2.b);//Error:b\
    \ is private\n//System.out.println(\"c in ObB2=\" + obB2.c);//Error:c is private\n\
    obB2.child5Method();\n}\n}\n```\n\nOutput:\n\n```\n*** Demonstration-5\\. The\
    \ uses of the 'super' keyword Demo***\nI am in parent constructor.\nBefore setting,a=0\n\
    Before setting, b=0\nSetting the values for instance variables a and b.\nNow a=1\n\
    Now b=2\nI am in child constructor.\nBefore setting,c=0\nNow c=3\nI am a child\
    \ method.\nI am calling the parent method.\nI am a parent method.\n```\n\nYou\
    \ need to understand why it is necessary to use the keyword `super`. If you did\
    \ not use it in the preceding example, you may have to write code similar to this:\n\
    \n```\npublic Child(int a, int b, int c)\n{\nthis.a = a;\nthis.b = b;\nthis.c\
    \ = c;\n}\n```\n\nThere are two major issues with this kind of approach. You are\
    \ trying to write repeated code to initialize the instance variables `a` and `b`.\
    \ Also, in this case, you will receive a compile-time error because both `a` and\
    \ `b` are inaccessible due to their protection level (note that they are private).\
    \ With the use of the `super` keyword, you can handle both scenarios efficiently.\
    \ You may also notice that the parent class constructor is invoked before the\
    \ child class constructor. Ideally, your goal should be to always maintain the\
    \ proper **constructor chaining**.\n\n### Points To Remember\n\n*   Notice the\
    \ commented line: `//System.out.println(\"Before setting,c=\"+ this.c);//`*Error:Constructor\
    \ call must be the first statement in a constructor.* It is used to remind you\
    \ that Java design guidelines say that invocation of the super class constructor\
    \ should be the first statement in the child (or derived) class constructor. You\
    \ can use either `super()` or `super(parameter list)` to invoke the correct version\
    \ of your super class constructor.\n\n*   The guideline also says: “*If a constructor\
    \ does not explicitly invoke a super class constructor, the Java compiler automatically\
    \ inserts a call to the no-argument constructor of the super class. If the super\
    \ class does not have a no-argument constructor, you will get a compile-time error.\
    \ Object does have such a constructor, so if Object is the only super class, there\
    \ is no problem*.”\n\n    [`https://docs.oracle.com/javase/tutorial/java/IandI/super.html`](https://docs.oracle.com/javase/tutorial/java/IandI/super.html)\n\
    \n*   Notice the last two lines of the output. It demonstrates that you can invoke\
    \ a super class method from a derived class method using the `super` keyword.\n\
    \nLet’s examine another use of `super` in the following example. The keyword `super`\
    \ can be used in the context of a method, a constructor, or an instance variable.\
    \ When you consider only methods and instance variables, you can generalize the\
    \ usage with the following form:\n\n```\nsuper.member;\n```\n\nwhere `member`\
    \ can be an instance variable or a method.\n\nSometimes a derived class can hide\
    \ an instance variable that is originally defined in a super class. In such a\
    \ situation, `super` can allow you to access the instance variable in the super\
    \ class using an object of the derived class. So, in the following demonstration,\
    \ you can see the following line of code:\n\n```\nsuper.myInt = 12;\n```\n\nwhere\
    \ `myInt` is an instance variable of the parent class."
