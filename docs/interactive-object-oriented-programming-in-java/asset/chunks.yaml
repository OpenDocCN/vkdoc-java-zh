    \n## 15. Introduction to Design Patterns  \n\nDesign patterns are used to find\
    \ common solutions when you design your software. In the initial period of software\
    \ development, there was no standard to instruct software developers on how to\
    \ design their applications. In an organization, each team had different mottos\
    \ and followed their own style. When a new engineer joined an existing team, learning\
    \ the architecture of the current system was a gigantic task. Senior or experienced\
    \ members of the team would need to explain the current architecture precisely.\
    \ They also needed to answer some common questions, like what the advantages of\
    \ using the current design were, and why an alternative design was not considered.\
    \ The experienced developer also trained the new developer on how to reduce future\
    \ effort by simply reusing concepts already in place. Design patterns address\
    \ this kind of issue and provide a common platform for all developers. So, you\
    \ can think of them as the recorded experience of experts in the field. These\
    \ patterns were meant to be applied in object-oriented designs, with the intention\
    \ of reuse.  \n\nIn 1994, Erich Gamma, Richard Helm, Ralph Johnson, and John Vlissides\
    \ published the book *Design Patterns: Elements of Reusable Object-Oriented Software*\
    \ (Addison-Wesley, 1994). In this book, they introduced the concept of design\
    \ patterns in software development. These authors became famous and are currently\
    \ known as the Gang of Four. I refer to them as the **GoF** throughout this chapter.\
    \ The GoF described 23 patterns that were recorded through the common experiences\
    \ of software developers over a period of time. Each pattern can have its own\
    \ complexity, pros, and cons, but their intents are different. Nowadays, when\
    \ a developer joins a new team, they are expected to know about these patterns.\
    \  \n\nThe concept of a real-life design pattern originated from the building\
    \ architect Christopher Alexander. During his lifetime, he discovered that many\
    \ of his problems were similar in nature. So, he implemented similar solutions\
    \ to those common problems. He said:  \n\n*Each pattern describes a problem, which\
    \ occurs over and over again in our environment, and then describes the core of\
    \ the solution to that problem, in such a way that you can use this solution a\
    \ million times over, without ever doing it the same way twice.*  \n\nThe software\
    \ engineering community started believing that though these patterns were described\
    \ for buildings and towns, the same concepts could be applied to patterns in object-oriented\
    \ design because, at their cores, patterns are solutions to common problems. As\
    \ a result, the original concepts of walls and doors in the construction industry\
    \ were substituted with instances of classes and interfaces in the software industry.\
    \  \n\nLastly, it is important to note that the GoF discussed the original concepts\
    \ of design patterns in the context of C++. But Sun Microsystems released its\
    \ first public implementation of Java 1.0 in 1995, and then it went through various\
    \ changes. (You may know that Oracle corporation acquired Sun Microsystems in\
    \ 2010.) So, in 1995, Java was totally new to the programming world. But it grew\
    \ rapidly and secured its place among the world’s top programming languages within\
    \ a short period of time and remains popular today. Remember, the concepts of\
    \ design patterns are universal. So, if you can exercise these fundamental concepts\
    \ of design patterns with Java, your knowledge and expertise will be enhanced,\
    \ and you can announce yourself as a better programmer.  \n\nThis is a Java book.\
    \ This chapter focuses on the design patterns, but not on the latest features\
    \ of Java. In fact, I have deliberately chosen simple examples that can be version\
    \ independent so you can understand these concepts easily.  \n\n## Key Points\
    \  \n\nBefore you start, let’s review some important points regarding design patterns:"
