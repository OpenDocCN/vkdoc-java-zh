- fmt: "### Type-3 (or Network Protocol) Driver\n\nThese are fully written in Java.\
    \ Here, the clients first communicate with a middleware application server, which\
    \ converts the JDBC calls into vendor-specific DBMS calls, and then those calls\
    \ are forwarded to the database server. For these drivers, no client-side library\
    \ needs to be installed on the local machine, because the application server is\
    \ capable of doing the required jobs. A single type-3 driver can also be used\
    \ to connect multiple databases. But network support is essential for the client\
    \ machine, and the overall maintenance is costly because you may need to provide\
    \ database-specific coding in the middle tier.\n\n### Type-4 (or Thin) Driver\n\
    \nThese are also fully written in Java, but they can provide the highest performance\
    \ because they are provided by the vendor itself. Here, no special software needs\
    \ to be installed either on the client machine or on the server machine. The only\
    \ major drawback is that, since it is provided by a specific vendor, it is dependent\
    \ on the particular database where the vendor can use different protocols.\n\n\
    **Note:** In Demonstration 5, you will also see the use of a `javax.sql.DataSource`\
    \ object to establish a connection between your Java application and the database.\
    \ From JDBC 2.0 onward, this is the recommended approach to connect a datasource.\
    \ Still I am discussing all of these to help you understand the legacy codes.\
    \ Also, I believe the learning of “Database Programming in Java” is incomplete\
    \ without these discussions.\n\nFigure [13-3](#433474_2_En_13_Chapter.xhtml#Fig3)\
    \ demonstrates how three different types of databases can be connected through\
    \ the JDBC driver.\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig3_HTML.jpg](images/433474_2_En_13_Chapter/433474_2_En_13_Fig3_HTML.jpg)\n\
    \n**Figure 13-3** Different types of databases can be connected through the JDBC\
    \ driver\n\nYou may have different JDBC drivers to connect to different databases.\
    \ But as an end user, you don’t need to worry about their implementation. At this\
    \ moment, it is sufficient for you to know that you need a JDBC driver to connect\
    \ to a database.\n\n## Q&A Session\n\n**13.1 How can I decide which driver is\
    \ suitable for my application?**  \nIf you know that you need only one specific\
    \ database, pick Type-4. If you need to access multiple databases, choose Type-3.\
    \ When you do not have either Type-3 or Type-4, you can consider Type-2 drivers.\
    \ Type-1 is in general not recommended to use, but you can limit its use to testing\
    \ purposes.\n\n**13.2 What are typical operations of the application server when\
    \ any client uses type-3 drivers?**  \nSome typical operations include logging,\
    \ load balancing, auditing, and so on.\n\n## Talking to a Database in a Java Application\n\
    \nNow, you’ll see some demonstrations where Java applications will interact with\
    \ a MySQL database. You can follow a similar approach for other databases. You’ll\
    \ see the use of the Type-4 driver in the upcoming demonstrations.\n\nWhen you\
    \ connect to a database through a Java program, typically you may need to consider\
    \ the following steps:\n\n1.  Load your JDBC driver.\n2.  Create a connection\
    \ object and connect to the database.\n3.  Exercise the SQL statements with your\
    \ Java program.\n4.  Map the retrieved result and process it as per your needs.\n\
    \nHere, I assume that you have installed MySQL on your local computer. If it is\
    \ not installed yet, you can follow the link [`https://dev.mysql.com/downloads/installer/`](https://dev.mysql.com/downloads/installer/)\
    \ to get the installer and relevant details. At the time of this writing, `mysql-installer-community-8.0.16.0`\
    \ is the latest version. You can also refer to Appendix C, where I have shown\
    \ the installation steps of MySQL on a Win10 machine.\n\nBut installing the database\
    \ is only the first step. To connect to the database using a Java application\
    \ you need a vendor-specific connector. I am using MySQL and JDBC. So, I searched\
    \ for the connector that is used for the JDBC driver in MySQL. At the time of\
    \ this writing, `mysql-connector-java-8.0.16.zip` is available at the following\
    \ link [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/).\
    \ I have chosen the platform-independent version (Figure [13-4](#433474_2_En_13_Chapter.xhtml#Fig4))\
    \ and downloaded it in the local system.\n\n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig4_HTML.jpg](images/433474_2_En_13_Chapter/433474_2_En_13_Fig4_HTML.jpg)\n\
    \n**Figure 13-4** Download MySql Connector/J 8.0.16 Platform Independent version\
    \ from [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)\n\
    \nOnce you download and extract the zip file, you will get the `mysql-connector-java-8.0.16.jar`\
    \ file (the latest version at the time of this writing), which you need to add\
    \ in your Java build path in Eclipse (**Project** ➤ **Properties** ➤ **Java Build\
    \ Path** ➤ **Add External JARs…**). Once you add this external jar in Eclipse,\
    \ you may get a screen similar to that shown in Figure [13-5](#433474_2_En_13_Chapter.xhtml#Fig5).\n\
    \n![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig5_HTML.jpg](images/433474_2_En_13_Chapter/433474_2_En_13_Fig5_HTML.jpg)\n\
    \n**Figure 13-5** The `mysql-connector-java-8.0.16.jar` is added in Eclipse\n\n\
    ## Important Terms\n\nNow, let’s go through some demonstrations. To understand\
    \ the upcoming demonstrations, you need to be familiar with the following classes,\
    \ interfaces, and methods:\n\n**`DriverManager`** : This class manages a set of\
    \ JDBC drivers. It matches the connection request from a Java application with\
    \ the proper database driver. (It is important to note that JDBC 2.0 provides\
    \ an alternate way to connect to a datasource. The use of a `DataSource` object\
    \ is a recommended way to connect to a datasource.)\n\n**`Driver`** : This is\
    \ an interface to handle the communication with the database server. Each driver\
    \ must provide a class that will implement this interface. Each `Driver` class\
    \ should be small and standalone so that it can be loaded without vast supporting\
    \ codes. When a `Driver` class is loaded, you should create an instance of it\
    \ and register it with `DriverManager`. So, in Demonstration 1, you may notice\
    \ the following line of code:\n\n```java\n// for MySql database\nClass.forName(\"\
    com.mysql.cj.jdbc.Driver\").newInstance();\n```\n\n**Points To Remember**\n\n\
    *   Similar to connecting with an Oracle database, you may notice the use of the\
    \ following code:\n*   To connect with a MS SQL Server, you may notice the use\
    \ of the following code:\n\n```java\nClass.forName(\"com.microsoft.jdbc.sqlserver.SQLServerDriver\"\
    ).newInstance();\n```\n\n```java\nClass.forName(\"oracle.jdbc.driver.OracleDriver\"\
    ).newInstance();\n```\n\n**`Connection`** : This interface provides the methods\
    \ with which to connect a database. Your SQL statements execute, and results are\
    \ returned within the context of a connection. You can simply say that all the\
    \ communication with the database passes through the connection object.\n\n**`getConnection()`**\
    \ : This method attempts to make a connection to the given database URL. Multiple\
    \ overloaded versions are available for this method. In Demonstration 1, you will\
    \ notice the following line of code:\n\n```java\nDriverManager.getConnection(\"\
    jdbc:mysql://localhost:3306/test\", \"root\", \"admin\");\n```\n\nThat is, I’m\
    \ using the following overloaded version:\n\n```java\npublic static Connection\
    \ getConnection(String url, String user, String password) throws SQLException\n\
    ```\n\nwhere the `user` string indicates the database user name and the `password`\
    \ string is that user’s password.\n\n**Note:** The string `localhost` is used\
    \ because I have installed the MySQL database in my local system and `test` is\
    \ my local database name."
