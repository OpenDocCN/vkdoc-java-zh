    return 5;

    }

    */

    // It will work

    public int showMe(int i) {

    System.out.println("I am in Child class.");

    return i;

    }

    }

    public class Quiz2 {

    public static void main(String[] args) {

    System.out.println("*** Method overriding demonstration.Quiz2.***");

