    ### Q&A Session


    **5.18 Is constructor overriding allowed in Java?**


    No. Do not forget that overriding allows us to change the object’s behavior at
    runtime, but constructors are used to initialize objects, and they cannot be inherited.


    **5.19 Why do I need to initialize final variables?**


    These act like constants throughout your program. If you do not initialize them
    at the beginning, others can modify them in the future. By declaring `final`,
    you are preventing the change at some later stage.


    **5.20 Suppose I want to have a variable (say,** `PI`**) that is accessible from
    all parts of my code, but at the same time I want to prevent any accidental modification
    of it. How can I achieve that?**


    Basically, you are trying to use the concept of global variable, which is not
    supported in Java. But in such a case, you can declare a variable like the following:


    ```

    public static final double PI=3.14;

    ```


    You’ll find out more about `static` in Chapter [8](#433474_2_En_8_Chapter.xhtml)
    of this book.


    **5.21 Will I receive any compilation errors as a result of the following code
    snippet?**


    ```

    class MyClassEx{

    final MyClassEx()//Error

    {

    System.out.println("I am a no argument constructor");

    }

    }

    ```


    Yes. Constructors cannot be final. So, in this case, you will receive a compilation
    error, as in Figure [5-11](#433474_2_En_5_Chapter.xhtml#Fig11).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig11_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Compile-time error: constructors cannot be final


    **5.22 Why am I encountering compile-time errors when I try to use** **finalkeywords
    with constructors?**


    Let’s think from a general point of view: the keyword `final` is used to prevent
    overriding, but constructors cannot be overridden at all as per the language specification.
    JLS11 clearly says that “constructor declarations are not members. They are never
    inherited and therefore are not subject to hiding or overriding.”


    **5.23 Can I override the main() method?**


    No. Static methods cannot be overridden, and a call to a static method is resolved
    at compile time only. Also, it is important to note that you can hide a static
    method, but you cannot override it.


    **5.24 “You can hide a static method, but you cannot override it”—what is meant
    by this statement?**


    The two terms—method hiding and method overriding—are different. The distinction
    between these two can be summarized as follows:


    > *The version of the overridden instance method that gets invoked is the one
    in the subclass. The version of the hidden static method that gets invoked depends
    on whether it is invoked from the super class or the subclass.*


    ### Demonstration 12


    Consider the following program and go through the output and analysis:


    ```

    package java2e.chapter5;

    class Vehicle12 {

    public static void showMe() {

    System.out.println("Vehicle.showMe()-inside the parent class.");

    }

    public void showInstanceMethod() {

    System.out.println("Vehicle.showInstanceMethod()");

    }

    }

    class Bus12 extends Vehicle12 {

    public static void showMe() { // hides Vehicle.showMe()

    System.out.println("Bus.showMe()-inside the child class.");

    }

    public void showInstanceMethod() {// overrides

    System.out.println("Bus.showInstanceMethod()");

    }

    }

    public class Demonstration12 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-12\. Method hiding vs method overriding***\n");

    Vehicle12.showMe();// Vehicle.showMe()-inside the parent class.

    Vehicle12 vehicle = new Bus12();

    // Warning:The following method should be accessed in a static way.

    vehicle.showMe();// Vehicle.showMe()-inside the parent class.

    vehicle.showInstanceMethod();// Bus.showInstanceMethod()

    System.out.println("----------");

    Bus12.showMe();// Bus.showMe()-inside the child class.

    // Warning:The following method should be accessed in a static way.

    Bus12 bus = new Bus12();

    bus.showMe();// Bus.showMe()-inside the child class.

    bus.showInstanceMethod();// Bus.showInstanceMethod()

    }

    }

    ```


    Output:


    ```

    ***Demonstration-12\. Method hiding vs method overriding***

    Vehicle.showMe()-inside the parent class.

    Vehicle.showMe()-inside the parent class.

    Bus.showInstanceMethod()


    Bus.showMe()-inside the child class.

    Bus.showMe()-inside the child class.

    Bus.showInstanceMethod()

    ```


    The first line and last three lines of the output are obvious. Those were given
    for your immediate reference. But notice the output for the following code:


    ```

    vehicle.showMe();// Vehicle.showMe()-inside the parent class.

    vehicle.showInstanceMethod();// Bus.showInstanceMethod()

    ```


    Have you noticed the interesting behavior of the compiler? In the first case,
    it picked the parent class method (which is a static method), but in the case
    of an instance method, it picked the derived class method. This is because in
    the case of method overriding, the JVM uses the actual class of the instance to
    pick the method, and the decision is made at runtime.


    But for the static method, the compiler considers only the declared type of reference
    (and you can see `vehicle` is a parent class reference), and the decision of invoking
    the particular method is decided at compile time only. So, you can say that method
    hiding is in no way related to runtime polymorphism.'
