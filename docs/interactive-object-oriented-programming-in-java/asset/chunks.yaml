    \ == WebExceptionStatus.Timeout) {\n    //some code\n}\n```\n\n### Q&A Session\n\
    \n**10.3 Can I use `try` and `finally` only as follows?**\n\n```java\ntry {\n\
    \    //Some code\n}\nfinally {\n    //Some code\n}\n```\n\nYes.\n\n**10.4 Then\
