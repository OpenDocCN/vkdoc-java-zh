    Preventing inheritance using a private constructor


    ### Q&A Session


    **5.30 To prevent inheritance, which process needs to be preferred: case 1 or
    case 2?**


    *   Case 1:


    ```

    class Demo17

    {

    private Demo17() { }

    }

    ```


    *   Case 2:


    ```

    final class Demo17Final

    {

    //some code..

    }

    ```


    First of all, you need to be aware of your requirements. You should not generalize
    any decision in advance. In Case 1, you can add some additional code, and then
    you can easily derive a new class from that. But in Case 2, you cannot derive
    a child class from it.


    ### Demonstration 17


    To better understand it, let’s add some code to Case 1 and follow the case study.


    ```

    package java2e.chapter5;

    class Demo17 {

    int x;

    private Demo17() {

    System.out.println("Called the private constructor.");

    System.out.println("Setting the default the value x=10.");

    this.x=10;//A default value

    System.out.println("\tExit-private non-parameterized constructor.");

    }

    public Demo17(int x) {

    this();

    System.out.println("Updating the default value of x.");

    this.x=x;

    System.out.println("\tExit-parameterized constructor.");

    }

    }

    final class Demo17Final {

    // some code..

    }

    class Child17 extends Demo17 {

    int y;

    public Child17(int x, int y) {

    super(x);

    this.y = y;

    }

    }

    //class Child2 extends Demo17Final { }//Cannot derive from the final class //''Demo17Final''

    class Demonstration17 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-17.A comparison study:Using a final class
    vs using a private constructor***");

    Demo17 parent = new Demo17(15);

    System.out.println("\tThe parent.x=" + parent.x);

    Child17 child = new Child17(2, 3);

    System.out.println("\tThe child.x=" + child.x);

    System.out.println("\tThe child.y=" + child.y);

    }

    }

    ```


    Here is the output. Notice the lines in bold.


    ```

    ***Demonstration-17.A comparison study:Using a final class vs using a private
    constructor***

    Called the private constructor.

    Setting the default the value x=10.

    Exit-private non-parameterized constructor.

    Updating the default value of x.

    Exit-parameterized constructor.

    The parent.x=15

    Called the private constructor.

    Setting the default the value x=10.

    Exit-private non-parameterized constructor.

    Updating the default value of x.

    Exit-parameterized constructor.

    The child.x=2

    The child.y=3

    ```


    You can see that you can extend the class in Case 1. Now notice the commented
    line:


    ```

    //class Child2 extends Demo17Final { }

    ```


    If you uncomment this, you’ll get the compilation error: `The type Child2 cannot
    subclass the final class Demo17Final.`


    The key thing to remember is that if you use a private constructor only to prevent
    inheritance, then you may not be following the right path, because the concept
    can be used in a different context more effectively. The private constructors
    are commonly used in classes that contain only static members. When you learn
    about design patterns, you will know that you can use private constructors for
    a singleton design pattern to stop additional instantiation. And in those cases
    the intent is different.


    ### Q&A Session


    **5.31 Why should I prefer writing polymorphic code?**


    Your code will be flexible, and it can adopt upcoming changes easily. You must
    agree that if you implement only static binding, you are actually restricting
    runtime polymorphism.


    **5.32 How is inheritance related to polymorphism?**


    To implement polymorphism, you need to use inheritance, because in Java polymorphism
    is type based, but to create type hierarchy, you need inheritance.


    **5.33 What is the key difference between inheritance and polymorphism?**


    Inheritance is used to reuse code, and it supports the parent–child relationship.
    But if the child wants to redefine the existing parent class behavior, it can
    do so using the concept of polymorphism.


    **5.34 Can I override a private method?**


    To override a method, it should be accessible or visible first. In Chapter [2](#433474_2_En_2_Chapter.xhtml),
    you saw that private members are not accessible in the subclass. So, how could
    you override them?


    **5.35 Based on the answer to the previous question, can I conclude that private
    methods can be overridden inside an inner class?**


    Yes. In this case, since you can access them, overriding is possible. Here is
    a sample code snippet for you:


    ```

    class OuterClass2 {

    private void showOuter2() {

    System.out.println("Inside OuterClass");

    // showInner2();//Error

    }

    class InnerClass2 {

    void showInner2() {

    System.out.println("Inside InnerClass");

    System.out.println("Calling an outer class method from inner class");

    showOuter2();// Ok

    }

    // Overriding

    private void showOuter2() {

    System.out.println("Overiding showOuter2()");

    }

    }

    }

    ```'
