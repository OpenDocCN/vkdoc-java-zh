    \nFigure 10-4\n\nUnreachable `catch` block\n\nExceptions follow the inheritance\
    \ hierarchy. Therefore, you need to place `catch` blocks properly. It has already\
    \ been mentioned that the `ArithmeticException` class derives from the `RuntimeException`\
    \ class, which in turn derives from the `Exception` class. For your easy understanding,\
    \ follow the associated comments in the program.\n\n### Point To Remember\n\n\
    When you deal with multiple `catch` blocks, you need to place the more-specific\
    \ exception clause first. In other words, you should place the `catch` blocks\
    \ from most specific to most general.\n\nIt will be good to note that if you are\
    \ familiar with C#, you may notice that it supports some additional variations\
    \ of `catch` clauses. For example, in C#, you may notice the following variations\
    \ of `catch` blocks:\n\n```csharp\ncatch () {\n    Console.WriteLine(\"Encountered\
