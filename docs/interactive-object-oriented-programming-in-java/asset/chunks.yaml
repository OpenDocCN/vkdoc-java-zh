    }\n```\n\n# Java 10 的局部变量类型推断\n\n从 Java 10 开始，你可以声明局部变量而无需指定其类型。\n\n即使你不声明变量类型，它也能根据所赋的值推断出类型。例如，从\
    \ Java 10 开始，你可以编写如下代码：\n\n```\nvar myInt=10;\n```\n\n## 演示 4\n\n接下来的演示可以展示`var`的简单用法：\n\
    \n```\nclass LocalVariableTypeInterpretation {\n    public static void main(String[]\
