- fmt: "## Creating a Package\n\nIn this book, I am using Eclipse IDE. Creating a\
    \ package in Eclipse is easy. Here are the steps on how to create a package in\
    \ Eclipse IDE.\n\n1. Click File menu ➤ New ➤ Package (consider Figure [7-1](#433474_2_En_7_Chapter.xhtml#Fig1)).\n\
    \n   ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig1_HTML.jpg](images/433474_2_En_7_Chapter/433474_2_En_7_Fig1_HTML.jpg)\n\
    \n   Figure 7-1\n\n   Step 1: How to create a Java package in Eclipse editor\n\
    \n2. Supply the required information and click Finish (consider Figure [7-2](#433474_2_En_7_Chapter.xhtml#Fig2)).\n\
    \n   ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig2_HTML.jpg](images/433474_2_En_7_Chapter/433474_2_En_7_Fig2_HTML.jpg)\n\
    \n   Figure 7-2\n\n   Step 2: How to create a Java package in Eclipse editor\n\
    \n3. Now you can see the package in the Package Explorer view. For example, it\
    \ may look like Figure [7-3](#433474_2_En_7_Chapter.xhtml#Fig3).\n\n   ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig3_HTML.jpg](images/433474_2_En_7_Chapter/433474_2_En_7_Fig3_HTML.jpg)\n\
    \n   Figure 7-3\n\n   An empty Java package is created\n\n   **Note** The newly\
    \ created package is empty. But other packages in the snapshot already have some\
    \ classes inside them. Those packages were created earlier.\n\n4. Now right-click\
    \ on the package name ➤ New ➤ Class/Package to put classes/subpackages/etc. inside\
    \ the created package. Once you put one or more classes inside the package, it\
    \ may look similar to the following. For example, in the following diagram, one\
    \ class, `Demonstration1.java`, is placed inside the package `java2e.chapter7`.\
    \ But the package `java2e.chapter7.companya` contains two classes—`GoaPackage.java`\
    \ and `KeralaPackage.java`.\n\n   ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig4_HTML.jpg](images/433474_2_En_7_Chapter/433474_2_En_7_Fig4_HTML.jpg)\n\
    \n   Figure 7-4\n\n   Sample Package Explorer view of non-empty Java packages\
    \ in Eclipse editor\n\n### Demonstration 1\n\nNow, let us go through an example.\
    \ Consider two travel companies, A and B. Company A conducts tours for Goa and\
    \ Kerala. Company B conducts tours for Goa and Andaman. Any tourist can seek information\
    \ from them for a particular tour package. As per the naming, in the following\
    \ example, company A is using the package `java2e.chapter7.companya` and company\
    \ B is using `java2e.chapter7.companyb` package. You can consider Figure [7-4](#433474_2_En_7_Chapter.xhtml#Fig4)\
    \ to understand the overall structure.\n\nHere, I have covered the following scenarios:\n\
    \n* **Less-challenging situation**: Only Company A conducts tours for Kerala,\
    \ and only Company B conducts tours for Andaman.\n\n* **More-challenging situation**:\
    \ Notice that both companies conduct a Goa tour, and you need to get tariff information\
    \ through the respective `GoaPackage.java` class. Notice that both packages use\
    \ the same class name.\n\n```\n// GoaPackage.java [For Company A, in java2e.chapter7.companya\
    \ package]\npackage java2e.chapter7.companya;\npublic class GoaPackage\n{\nint\
    \ basePrice=10000;\npublic void showPrice()\n{\nSystem.out.println(\"***Tariff\
    \ for Goa tour in Company A***\" );\nSystem.out.println(\"For two person , Goa\
    \ tour package is Rs.\"+ basePrice*2 );\nSystem.out.println(\"For four person\
    \ , Goa tour package is Rs.\"+ basePrice*4 );\nSystem.out.println(\"**************\"\
    \ );\n}\n}\n// KeralaPackage.java [For Company A, in java2e.chapter7.companya\
    \ package]\npackage java2e.chapter7.companya;\npublic class KeralaPackage\n{\n\
    int basePrice=7000;\npublic void showPrice()\n{\nSystem.out.println(\"***Tariff\
    \ for Kerala tour in Company A***\" );\nSystem.out.println(\"For two person ,\
    \ Kerala tour package is Rs.\"+ basePrice*2 );\nSystem.out.println(\"For four\
    \ person, Kerala tour package is Rs.\"+ basePrice*4 );\nSystem.out.println(\"\
    **************\" );\n}\n}\n// AndamanPackage.java [For Company B, in java2e.chapter7.companyb\
    \ package]\npackage java2e.chapter7.companyb;\npublic class AndamanPackage\n{\n\
    int basePrice=12000;\npublic void showTariff()\n{\nSystem.out.println(\"***Tariff\
    \ for Andaman tour in Company B***\" );\nSystem.out.println(\"In Company B:For\
    \ two persons, Andaman tour package is Rs.\"+ basePrice*2 );\nSystem.out.println(\"\
    In Company B:For four persons, Andaman tour package is Rs.\"+ basePrice*4 );\n\
    System.out.println(\"**************\" );\n}\n}\n// GoaPackage.java [For Company\
    \ B, in java2e.chapter7.companyb package]\npackage java2e.chapter7.companyb;\n\
    public class GoaPackage {\nint basic_price = 15000;\nint serviceTax = 2000;\n\
    public void showTariff() {\nint forTwoPerson = basic_price * 2 + serviceTax;\n\
    int forFourPerson = basic_price * 4 + serviceTax;\nSystem.out.println(\"***Tariff\
    \ for Goa tour in Company B***\");\nSystem.out.println(\"In Company B:For two\
    \ persons , Goa tour package is Rs.\" + forTwoPerson);\nSystem.out.println(\"\
    In Company B:For four persosn , Goa tour package is Rs.\" + forFourPerson);\n\
    System.out.println(\"****************\");\n}\n}\n//Demonstration-1\npackage java2e.chapter7;\n\
    import java2e.chapter7.companya.*;\nimport java2e.chapter7.companyb.*;\n/*import\
    \ java2e.chapter7.companya.GoaPackage;\nimport java2e.chapter7.companya.KeralaPackage;\n\
    import java2e.chapter7.companyb.AndamanPackage;*/\npublic class Demonstration1\
    \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***Demonstration-1.Exploring\
    \ packages.***\");\n//Only Company-a has KeralaPackage\nKeralaPackage companyAKeralaPackage=new\
    \ KeralaPackage();\ncompanyAKeralaPackage.showPrice();\n//Only Company-b has AndamanPackage\n\
    AndamanPackage companyBAndamanPackage=new AndamanPackage();\ncompanyBAndamanPackage.showTariff();\n\
    //Company-a and company-b both have package tours for Goa.\njava2e.chapter7.companya.GoaPackage\
    \ companyAGoaPackage=new java2e.chapter7.companya.GoaPackage();\ncompanyAGoaPackage.showPrice();\n\
    java2e.chapter7.companyb.GoaPackage companyBGoaPackage=new java2e.chapter7.companyb.GoaPackage();\n\
    companyBGoaPackage.showTariff();\n}\n}\n```\n\nOutput:\n\n```\n***Demonstration-1.Exploring\
    \ packages.***\n***Tariff for Kerala tour in Company A***\nFor two person , Kerala\
    \ tour package is Rs.14000\nFor four person, Kerala tour package is Rs.28000\n\
    **************\n***Tariff for Andaman tour in Company B***\nIn Company B:For two\
    \ persons, Andaman tour package is Rs.24000\nIn Company B:For four persons, Andaman\
    \ tour package is Rs.48000\n**************\n***Tariff for Goa tour in Company\
    \ A***\nFor two person , Goa tour package is Rs.20000\nFor four person , Goa tour\
    \ package is Rs.40000\n**************\n***Tariff for Goa tour in Company B***\n\
    In Company B:For two persons , Goa tour package is Rs.32000\nIn Company B:For\
    \ four persosn , Goa tour package is Rs.62000\n****************\n```\n\nHave you\
    \ noticed an interesting fact? Since the `GoaPackage` class is available in both\
    \ Java packages, you needed to use the fully qualified name inside the `main()`\
    \ method to refer to the intended class from the particular package. But you did\
    \ not need to refer to the fully qualified name for the other classes, `KeralaPackage`\
    \ or `AndamanPackage`, since those are classes with unique names.\n\nThis example\
    \ also demonstrates the fact that you will not receive any compile-time errors\
    \ if you import full packages with star form, where the packages may contain a\
    \ class with the same name. But while accessing the class, you need to use the\
    \ fully qualified name of the class. For instance, you must write `java2e.chapter7.companya.GoaPackage`\
    \ because the `GoaPackage` class is available for both companies.\n\n### Note\n\
    \nI have kept the dead (commented) code to show you how to import a particular\
    \ class from a package instead of importing the whole package."
