    ```\n\nIt is also useful to note that if you kill or interrupt a thread, the `finally`\
    \ block may not execute, even though other threads can run and make the application\
    \ as a whole alive. You will learn about threads in Chapter [11](#433474_2_En_11_Chapter.xhtml).\n\
    \n### Q&A Session\n\n**10.6 Up until now, you have given examples like `ArrayIndexOutOfBoundsException`,\
    \ `ArithmeticException`, etc. How can I remember these names?**\n\nThese are built-in\
    \ exceptions in Java. All of these are already defined in the `java.lang` package.\
    \ Since this package is the default package, you’ll get all these exceptions imported\
    \ by default. Upon practice, you can remember their names. I personally take help\
    \ from Eclipse. Similar IDEs can help you with this as well.\n\nIn this context,\
    \ you can notice what the exception is that your default handler is throwing.\
    \ From that report, you can get the name of the exception. For example, notice\
    \ the output of our Demonstration 1, which is as follows:\n\n```\n***Demonstration-1.Exploring\
    \ Exceptions.***\nException in thread \"main\" java.lang.ArithmeticException:\
    \ / by zero\n    at java2e.chapter10.Demonstration1.main(Demonstration1.java:9)\n\
    ```\n\nFrom this output, you know that an `ArithmeticException` is raised.\n\n\
    ## Throwing an Exception\n\nUp until now, you have seen examples of handling exceptions\
    \ thrown by the Java runtime system. When you process Java statements, you may\
    \ encounter such exceptions due to the wrong logic, loopholes, and so forth. But\
    \ there is an alternative way to raise an exception—you also have the freedom\
    \ to throw an exception explicitly by using the `throw` keyword. This method is\
    \ useful when you make your own application and want to control the exceptional\
    \ situation.\n\nWhen you use the `throw` keyword, you need to follow the basic\
    \ format, which is as follows:\n\n```java\nthrow anObjectOfThrowable;\n```\n\n\
    where `anObjectOfThrowable` must be an instance of the `Throwable` class or its\
    \ subclass."
  raw: '## Multiple catch Clauses


    From Java 7 onward, you can use a different variation of the `catch` clause. Now
    a single `catch` block can be used to catch multiple exception types. The following
    code snippet shows how to use multiple `catch` clauses in a common block:


    ```

    //Java 7 onward, you can write multiple catch clauses like the following

    catch (ArithmeticException | ArrayIndexOutOfBoundsException ex){  System.out.println("Caught
    either ArithmeticException or ArrayIndexOutOfBoundsException :" + ex.getMessage());

    ex.printStackTrace();

    }

    ```


    **10.2 Can you predict the output of the following?**


    ```

    package java2e.chapter10;

    import java.util.Random;

    public class Quiz1 {

    public static void main(String[] args) {

    System.out.println("***Quiz1.It is about how to place the catch clauses in the
    program.***");

    int a = 5;

    Random randomGenerator = new Random();

    // Will generate 0 to 2.

    int b = randomGenerator.nextInt(3);

    System.out.println("Current value of b is : " + b);

    int c = 0;

    try {

    //Here b=0,it will raise an ArithmeticException

    c = a / b;

    System.out.println("c=" + c);

    }

    //Incorrect placement of following catch clause

    catch (Exception ex) {

    System.out.println("Caught the Exception :" + ex.getMessage());

    ex.printStackTrace();

    }

    //Java 7 onward, you can write multiple catch clauses like the //following

    catch (ArithmeticException | ArrayIndexOutOfBoundsException  ex) {

    System.out.println("Caught either ArithmeticException or ArrayIndexOutOfBoundsException  :"
    + ex.getMessage());

    ex.printStackTrace();

    }

    //Correct placement of the catch clause

    /*catch (Exception ex) {

    System.out.println("Caught the Exception :" + ex.getMessage());

    ex.printStackTrace();

    }*/finally {

    System.out.println("I am finally here");

    }

    }

    }

    ```


    You’ll encounter a compile-time error: `Unreachable catch block for ArithmeticException.
    It is already handled in the catch block for Exception`, as shown in Figure [10-4](#433474_2_En_10_Chapter.xhtml#Fig4).


    ![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig4_HTML.jpg](images/433474_2_En_10_Chapter/433474_2_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Unreachable *catch* block


    Exceptions follow the inheritance hierarchy. Therefore, you need to place `catch`
    blocks properly. It has already been mentioned that the `ArithmeticException`
    class derives from the `RuntimeException` class, which in turn derives from the
    `Exception` class. For your easy understanding, follow the associated comments
    in the program.


    ### Point To Remember


    When you deal with multiple `catch` blocks, you need to place the more-specific
    exception clause first. In other words, you should place the `catch` blocks from
    most specific to most general.


    It will be good to note that if you are familiar with C#, you may notice that
    it supports some additional variations of `catch` clauses. For example, in C#,
    you may notice the following variations of `catch` blocks:


    ```

    catch ()

    {

    Console.WriteLine("Encountered an Exception");

    }

    ```


    Or:


    ```

    catch (WebException ex) when (ex.Status == WebExceptionStatus.Timeout)

    {

    //some code

    }

    ```


    ### Q&A Session


    **10.3 Can I use** **try** **and** **finally** **only as follows?**


    ```

    try{

    //Some code

    }

    finally{

    //Some code

    }

    ```


    Yes.


    **10.4 Then why do you need a** **catch** **block at all?**


    The `catch` block is used to handle the exception in some specified manner. At
    the same time, you must note that the actual use of `finally` is different. It
    has been previously mentioned that inside `finally` you should do housekeeping
    so that the application can be gracefully closed. For example, if a file is already
    opened, you should close it, or, if you already allocated some resources, those
    should be released inside this block (to prevent memory leaks). In Chapter [14](#433474_2_En_14_Chapter.xhtml),
    you will learn to use a `try`-with-resource statement, where by using the term
    “resource” we mean an object that must be closed after the program finishes execution.


    **10.5 What will happen if I encounter an exception inside a** **finally** **block?**


    You should not forget the purpose of `finally`, which basically is to close files,
    release occupied resources, etc. But if you put your erroneous logic in the `finally`
    block, you may encounter an exception again. (The solution is the same—you can
    guard against a probable exception in the `finally` block with a `try-catch`,
    `try-finally`, or `try-catch-finally` block. In fact, prior to Java 6, you may
    notice such usage to close a resource.)


    ### Demonstration 4


    Here is such an example for your ready reference. You can see that once you receive
    the exception (when b becomes 0 in finally block), as usual, the subsequent lines
    inside the `finally` block will not execute. For example, in the following case
    the line “I am at the end of finally block” is not appearing in the output.


    ```

    package java2e.chapter10;

    import java.util.Random;

    public class Demonstration4 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-4.Incorrect way of writing code inside the
    finally block***");

    try {

    System.out.println("I am inside the try block.");

    }

    finally {

    System.out.println("I am at the beginning of finally block.");

    int a = 5;

    Random randomGenerator = new Random();

    // Will generate 0 to 2.

    int b = randomGenerator.nextInt(3);//Can produce 0

    System.out.println("Current value of b is : " + b);

    int c = a / b;

    System.out.println("c=" + c);

    System.out.println("I am at the end of finally block.");

    }

    }

    }

    ```


    Here is the output when the value of `b` is 0:


    ```

    ***Demonstration-4.Incorrect way of writing code inside the finally block***

    I am inside the try block.

    I am at the beginning of finally block.

    Current value of b is : 0

    Exception in thread "main" java.lang.ArithmeticException: / by zero

    at java2e.chapter10.Demonstration4.main(Demonstration4.java:19)

    ```


    It is also useful to note that if you kill or interrupt a thread, the `finally`
    block may not execute, even though other threads can run and make the application
    as a whole alive. You will learn about threads in Chapter [11](#433474_2_En_11_Chapter.xhtml).


    ### Q&A Session


    **10.6 Up until now, you have given examples like** **ArrayIndexOutOfBoundsException,**
    **ArithmeticException**, **etc. How can I remember these names?**


    These are built-in exceptions in Java. All of these are already defined in the
    `java.lang` package. Since this package is the default package, you’ll get all
    these exceptions imported by default. Upon practice, you can remember their names.
    I personally take help from Eclipse. Similar IDEs can help you with this as well.


    In this context, you can notice what the exception is that your default handler
    is throwing. From that report, you can get the name of the exception. For example,
    notice the output of our Demonstration 1, which is as follows:


    ```

    ***Demonstration-1.Exploring Exceptions.***

    Exception in thread "main" java.lang.ArithmeticException: / by zero

    at java2e.chapter10.Demonstration1.main(Demonstration1.java:9)

    ```


    From this output, you know that an `ArithmeticException` is raised.


    ## Throwing an Exception


    Up until now, you have seen examples of handling exceptions thrown by the Java
    runtime system. When you process Java statements, you may encounter such exceptions
    due to the wrong logic, loopholes, and so forth. But there is an alternative way
    to raise an exception—you also have the freedom to throw an exception explicitly
    by using the `throw` keyword. This method is useful when you make your own application
    and want to control the exceptional situation.


    When you use the `throw` keyword, you need to follow the basic format, which is
    as follows:


    ```

    throw anObjectOfThrowable;

    ```


    where `anObjectOfThrowable` must be an instance of the `Throwable` class or its
    subclass.'
