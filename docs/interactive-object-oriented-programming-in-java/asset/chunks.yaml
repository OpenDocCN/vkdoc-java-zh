- fmt: '### Note


    Remember, the process of converting a primitive type into an object of the corresponding
    [wrapper class](https://www.geeksforgeeks.org/wrapper-classes-java/) is termed
    autoboxing. For example, `int` to `Integer`, `double` to `Double`, `float` to
    `Float` etc. You learned about wrapper classes in Chapter [3](#433474_2_En_3_Chapter.xhtml).


    For a quick review, once again notice the following line of code in Demonstration
    2:


    ```

    MyGenericClass<Integer> myGenericClassIntOb = new MyGenericClass<Integer>();

    ```


    You need to use similar syntax when you write generic programs in corresponding
    places. You can observe that the type `Integer` is specified within the angle
    brackets after `MyGenericClass`, and `Integer` is the type argument that you are
    passing to the type `MyGenericClass`. In a similar way, you use `MyGenericClass`
    with different types. In this context, you must go through the upcoming statements
    carefully.


    It is also important to note that you are passing the class type; i.e., an `Integer`
    argument. But if you pass any primitive datatype, for example, an `int`, you’ll
    receive a compile-time error. The following declaration is NOT legal in generic
    programming in Java:


    ```

    // Primitive types are NOT allowed here.

    // It must be a reference type.

    MyGenericClass<int> myGenericClassIntOb2 = new MyGenericClass<int>();

    ```


    In Eclipse, you will notice an error for this code (as shown in Figure [12-2](#433474_2_En_12_Chapter.xhtml#Fig2)):
    `Syntax error, insert "Dimensions" to complete ReferenceType.` Here is a snapshot
    from Eclipse IDE.


    ![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig2_HTML.jpg](images/433474_2_En_12_Chapter/433474_2_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Syntax errors when you pass a primitive datatype instead of a reference type


    A wrapper class can hold primitive datatypes as objects. So, when you need to
    pass a primitive datatype in a case like this, you first wrap it in the equivalent
    wrapper type and proceed (as shown in Demonstration 2).


    ### Points To Remember


    It may appear that different versions of `MyGenericClass` truly exist. But the
    Java compiler actually removes all this generic type information and performs
    the necessary cast to make the code behave like this. This removal process is
    termed *erasure*. In actuality, there is only one version of `MyGenericClass`
    that exists for Demonstration 2. You’ll learn about erasures shortly.


    ### Demonstration 3


    Consider the following program. This demonstration is presented to show how a
    generic program can perform better than a non-generic program. It should be noted
    that in this demonstration, I have used the legacy `ArrayList` (or you can say
    the non-generic version of `ArrayList`), which is bad practice and is not recommended.
    It is presented only for the purpose of comparison with a generic program.


    ```

    package java2e.chapter12;

    import java.util.ArrayList;

    import java.util.List;

    public class Demonstration3 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-3.A bad practice.Using a lagacy ArrayList
    and encountering a runtime error.***");

    // BAD practice.Following line of code is using a legacy //ArrayList

    List myList = new ArrayList();

    myList.add(10);

    myList.add(20);

    myList.add("Invalid");// No compile-time error when you use //legacy ArrayList

    // Printing the contents of the ArrayList

    System.out.println("Here is the contents of the ArrayList:");

    for (int i = 0; i < myList.size(); i++) {

    System.out.println(myList.get(i));

    }

    // Picking last element in the ArrayList

    int lastElement = (int) myList.get(myList.size() - 1);

    System.out.println("Adding 1 to last element and printing");

    System.out.println(++lastElement);// Run-time error

    }

    }

    ```


    The program will not raise any compile-time errors, but you will receive a runtime
    error that says the following:


    ```

    ***Demonstration-3.A bad practice.Using a lagacy ArrayList and encountering a
    runtime error.***

    Here is the contents of the ArrayList:


    Invalid

    Exception in thread "main" java.lang.ClassCastException: java.lang.String cannot
    be cast to java.lang.Integer

    at java2e.chapter12.Demonstration3.main(Demonstration3.java:21)

    ```


    This is because the third element (i.e., `myList [2]` in the `ArrayList`) is not
    an integer (it is a string). During compile time, you did not encounter any issues,
    because it was stored as an object. So, you can see that type-safety is a major
    concern with a non-generic program.'
