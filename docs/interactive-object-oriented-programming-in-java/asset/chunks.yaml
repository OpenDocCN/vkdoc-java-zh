    Nano XT 的最终价格高于 200,000 卢比，Ford Figo 的最终价格高于 500,000 卢比，并且 Ford Figo 的价格将高于 Nano
    XT。


    问答环节

    **15.7. 使用原型设计模式有哪些优点？**


    以下是主要优点：


    *   从头开始创建新实例是一项成本高昂的操作。原型模式帮助你从现有实例创建新实例。因此，成本更低。

    *   如果从头开始，你可能需要面对一些复杂或繁琐的过程。相反，通过使用原型模式，你可以只关注即将到来的新功能。

    *   你可以在运行时添加或移除产品。


    **15.8. 使用原型设计模式会面临哪些挑战？**


    以下是使用此模式时可能面临的主要挑战：


    *   你需要关注克隆或复制机制。

    *   有时，从现有实例创建副本并不简单。例如，如果所考虑的对象根本不支持复制/克隆，或者存在循环引用，那么实现克隆机制可能具有挑战性。例如，在 Java
    中，拥有 `clone()` 方法的类需要实现 `Cloneable` 标记接口；否则，它将抛出 `CloneNotSupportedException`。

