    \ ok\n// Bus obBus = new Vehicle();//编译错误\nobVehicle.showMe();//Inside Bus.showMe()\n\
    // obVehicle.busSpecificMethod();//错误\n//((Bus) obVehicle).busSpecificMethod();//\
    \ Ok\n}\n}\n```\n\n输出：\n\n```\n***Demonstration 8.Experimenting runtime polymorphism.***\n\
    Inside Bus.showMe()\n```\n\n在讨论方法重写或运行时多态时，你可能会经常遇到类型转换的概念。类型转换可以进一步分为以下两种类型：\n\
    \n*   向上转型\n\n*   向下转型\n\n向上转型是指转换为超类型（或父类型），而向下转型则是相反的过程。假设，如上一个演示所示，`Vehicle`\
    \ 是父类，`Bus` 是从 `Vehicle` 派生的类。在 Java 中，你可以将派生类对象视为父类对象。因此，在这种情况下，如果你编写以下代码：\n\n\
    ```\nVehicle obVehicle ;\nobVehicle= new Bus();// 向上转型\n```\n\n你就是在使用向上转型。但如果你使用类似下面的代码：\n\
    \n```\nBus obBus=(Bus)obVehicle;\n```\n\n你就是在使用向下转型。向下转型需要进行类型检查，并且存在风险。\n\n再次注意前面程序中的两行重要代码：\n\
    \n```\nVehicle obVehicle = new Bus();\nobVehicle.showMe();\n```\n\n这里，你通过父类引用（`Vehicle`\
    \ 引用）指向一个派生类对象（一个 `Bus` 对象），然后调用 `showMe()` 方法。这种调用方式是允许的，不会出现任何编译问题；也就是说，父类引用可以指向派生类对象。\n\
    \n但是，你不能使用以下任何一行代码：\n\n*   `obVehicle.busSpecificMethod();//错误`\n\n（因为代码中的显式类型是\
    \ `Vehicle`，而不是 `Bus`）。要消除此错误，你需要进行向下转型，如下所示：\n\n*   `Bus obBus = new Vehicle();//错误`\n\
    \n```\n((Bus) obVehicle).busSpecificMethod();// Ok\n```\n\n如前所述，要消除此错误，你可能需要进行向下转型，如下所示：\n\
    \n```\nBus obBus=new Bus();\n//可能会遇到运行时错误：ClassCastException\nobBus=(Bus)obVehicle;\n\
    ```\n\n但向下转型是有风险的，因为你可能会遇到运行时异常（注释中已提及）。例如，在这种情况下，你会遇到如下运行时异常：\n\n```\nException\
    \ in thread \"main\" Inside Bus.showMe()\njava.lang.ClassCastException: java2e.chapter5.Vehicle\
    \ cannot be cast to java2e.chapter5.Bus at java2e.chapter5.Demonstration8.main(Demonstration8.java:33)\n\
    ```\n\n### 问答环节\n\n**5.14 “向下转型是有风险的。” 能详细解释一下吗？**\n\n如果实现不当，向下转型可能会导致 `ClassCastException`。为了更清楚地理解这一点，我们来看演示\
    \ 9。\n\n### 演示 9\n\n添加另一个类 `Train`，类似于上一个演示中的 `Bus`，然后在 `main()` 方法中放入一些测试代码，如下所示：\n\
    \n```\npackage chapter5.testcodes;\nclass Vehicle {\npublic void showMe() {\n\
    System.out.println(\"Inside Vehicle.showMe()\");\n}\n}\nclass Bus extends Vehicle\
    \ {\npublic void showMe() {\nSystem.out.println(\"Inside Bus.showMe()\");\n}\n\
    public void specificMethod() {\nSystem.out.println(\"Inside Bus.showMe()\");\n\
    }\n}\nclass Train extends Vehicle {\npublic void showMe() {\nSystem.out.println(\"\
    Inside Train.showMe()\");\n}\npublic void specificMethod() {\nSystem.out.println(\"\
    Inside Train.specificMethod()\");\n}\n}\nclass Test3 {\npublic static void main(String[]\
    \ args) {\nSystem.out.println(\"***Test Demonstration.Demonstration-9.Downcasting\
    \ involves risk.***\\n\");\n//向上转型\nVehicle obVehicle=new Train();//ok\nobVehicle.showMe();//输出:\
    \ Inside Vehicle.showMe()\n//obVehicle.specificMethod();//error\n//创建两个子类型（一个\
    \ Bus 和一个 Train）对象\nBus obBus=new Bus();\nTrain obTrain=new Train();\n//向下转型示例：转换为子类型\n\
    //obBus=(Bus)obVehicle;//运行时错误：Train cannot be cast to Bus\nobTrain=(Train)obVehicle;//Ok，这次没问题。\n\
    obTrain.specificMethod();//also ok\n}\n}\n```\n\n输出：\n\n```\n***Test Demonstration.Demonstration-9.Downcasting\
    \ involves risk.***\nInside Train.showMe()\nInside Train.specificMethod()\n```\n\
    \n注意下面这段被注释掉的代码：\n\n```\n//obBus=(Bus)obVehicle;//运行时错误：Train cannot be cast to\
    \ Bus\n```\n\n如果你取消注释这一行，你不会收到任何编译错误，但会遇到运行时异常，如下所示：\n\n```\n***Test Demonstration.Demonstration-9.Downcasting\
    \ involves risk.***\nInside Train.showMe()\nException in thread \"main\" java.lang.ClassCastException:\
    \ chapter5.testcodes.Train cannot be cast to chapter5.testcodes.Bus\nat chapter5.testcodes.Test3.main(Test3.java:41)\n\
    ```\n\n所以，你可能会注意到 `obVehicle` 原本是为 `Train` 对象使用的，但在向下转型时你试图将其转换为 `Bus` 对象，因此收到了这个错误。但如果你将\
    \ `obVehicle` 向下转型为 `Train` 对象，则不会出错，代码将正常运行。\n\n### 要点总结\n\n*   通过父类引用，你可以引用子类对象，但反之则不行。\n\
    \n*   对象引用可以隐式向上转型为超类引用，并显式向下转型为派生类引用。所以，简单来说，向上转型意味着转换为超类型，而向下转型则相反；也就是说，在向下转型中，你试图转换为派生类型。\n\
    \n*   现在，让我们快速检查一下类似编程语言中是如何实现该概念的；例如，C#。如果你熟悉 C# 语言，你可能会注意到在方法重写的示例中使用了 `virtual`\
    \ 和 `override` 关键字。例如，这里有一个 C# 代码片段：\n\n    ```\n    class Vehicle\n    {\n  \
    \  public virtual void ShowMe()\n    {\n    Console.WriteLine(\"Inside Vehicle.ShowMe\"\
    );\n    }\n    }\n    class Bus : Vehicle\n    {\n    public override void ShowMe()\n\
    \    {\n    Console.WriteLine(\"Inside Bus.ShowMe\");\n    }\n    public void\
    \ BusSpecificMethod()\n    {\n    Console.WriteLine(\"Inside Bus.ShowMe\");\n\
    \    }\n    }\n    ```\n\n*   在 C# 中，如果你想在派生类中重写父类方法，请使用 `virtual` 关键字标记父类方法。但在\
    \ C# 中，所有方法默认都是非虚拟的*。* 在派生类中，通过使用 `override` 关键字标记方法，你可以有意识地重新定义相应的虚拟方法。因此，在 C#\
    \ 中，你需要标记 `override` 关键字以避免无意识的重写。C# 还使用另一个关键字 `new` 来标记一个方法为非重写方法。但在 Java 中，事情更直接，因为所有方法默认都是虚拟的。\n"
- fmt: '### Q&A Session


    **5.15 I understand that a parent class reference can point to a child object,
    but the reverse is not true. Why do we support this kind of design?**


    You can compare with some basic real-life facts. For example, you can say that
    all buses are vehicles, but the reverse is not necessarily true, because there
    are other vehicles like trains and ships that are definitely not buses.


    In the same manner, in programming terminology, all derived classes are of type
    base classes, but the reverse is not true. For example, suppose you have a class
    called `Rectangle` that is derived from another class called `Shape`. You can
    say that all rectangles are shapes, but the reverse is not true.


    You can always do an "is-a" test in an inheritance hierarchy to identify the direction
    of inheritance, because the "is-a" test is always simple and straightforward.


    **5.16 You are saying that the call will be resolved at runtime for the following
    code:**


    ```

    Vehicle obVehicle = new Bus();

    obVehicle.showMe();

    ```


    **But I can clearly see that a `Bus` object is pointed at by the parent class
    reference, and the compiler could bind the method `showMe()` to the `Bus` object
    during early binding (or compile-time binding). Why did it delay the process unnecessarily?**


    If you only consider the preceding code, this question may come to your mind.
    But let''s assume that you have one more child class, `Taxi`, which is also inherited
    from the parent class `Vehicle`. And at runtime, based on some situation, you
    need to invoke the `showMe()` method either from `Bus` or from `Taxi`. Consider
    a case like the following: you are generating a random number between 0 and 9.
    Then, you are checking whether the number is an even number or an odd number.
    If it is an even number, you need to use a `Bus` object; otherwise, you use a
    `Taxi` object to invoke the corresponding `showMe()` method.


    ### Demonstration 10


    Now, go through the following demonstration. Since it is Demonstration 10, I have
    marked the `Vehicle` class as `Vehicle10`, `Bus` class as `Bus10`, and `Taxi`
    class as `Taxi10`.


    ```

    package java2e.chapter5;

    import java.util.Random;

    class Vehicle10 {

    public void showMe() {

    System.out.println("Inside Vehicle.showMe()");

    }

    }

    class Bus10 extends Vehicle10 {

    public void showMe() {

    System.out.println("Inside Bus.showMe()");

    }

    }

    class Taxi10 extends Vehicle10 {

    public void showMe() {

    System.out.println("Inside Taxi.showMe()");

    }

    }

    class Demonstration10 {

    public static void main(String[] args) {

    System.out.println("***Demonstration 10.A case study with runtime polymorphism
    ***\n");

    Vehicle10 obVehicle;

    int count = 0;

    Random random = new Random();

    // Considering 5 choices

    while (count < 5) {

    int tick = random.nextInt(10);//0 to 9

    if (tick % 2 == 0) {

    obVehicle = new Bus10();

    } else {

    obVehicle = new Taxi10();

    }

    obVehicle.showMe();// Output will be determined at runtime

    count++;

    }

    }

    }

    ```


    Notice that the output may vary.


    **This is the first run:**


    ```

    ***Demonstration 10.A case study with runtime polymorphism ***

    Inside Bus.showMe()

    Inside Taxi.showMe()

    Inside Taxi.showMe()

    Inside Bus.showMe()

    Inside Taxi.showMe()

    ```


    **This is the second run:**


    ```

    ***Demonstration 10.A case study with runtime polymorphism ***

    Inside Taxi.showMe()

    Inside Bus.showMe()

    Inside Bus.showMe()

    Inside Taxi.showMe()

    Inside Bus.showMe()

    ```


    And so on.


    Now you can see why the compiler may need to delay the decision until runtime
    for this kind of coding, and how you are achieving runtime polymorphism.


    ## Using the `final` Keyword


    In some cases, you may want to prevent the inheritance process. For example, you
    may want to put in a restriction such that a method in the parent class cannot
    be overridden by a method of its child class. So, you make the parent class method
    `final` to preserve the consistent state of the object. (Similarly, you can also
    make a "final" class if you want to create an immutable class like the `String`
    class in Java.) You must remember that you can prevent overriding in various ways.
    In the following section, you will see the use of the `final` keyword only. It
    is very useful because the compiler itself will prevent the process of overriding.


    Consider the following code:


    ```

    final class ParentClassTest4

    {

    public void showMe(){

    System.out.println("Inside Parent.showMe()");

    }

    }

    class ChildClassTest4 extends ParentClassTest4 //Error

    {

    //Some code

    }

    ```


    You will receive a compilation error: `The type ChildClassTest4 cannot subclass
    the final class ParentClassTest4` (see Figure 5-7).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig7_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig7_HTML.jpg)


    Figure 5-7 — The `final` keyword used to prevent inheritance


    You can use it for methods also. For example, consider the following code snippet:


    ```

    class ParentClassTest4 {

    final public void showMe() {

    System.out.println("Inside Parent.showMe()");

    }

    }

    class ChildClassTest4 extends ParentClassTest4 {

    public void showMe() { // error

    System.out.println("Inside Parent.showMe()");

    }

    }

    ```


    You will again receive a compilation error: `Cannot override the final method
    from ParentClassTest4` (see Figure 5-8).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig8_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig8_HTML.jpg)


    Figure 5-8 — `Final` keyword used to prevent method overriding


    ### Blank `final` Variables


    You can apply `final` keyword to variables like the following:


    ```

    final double PI=3.14;

    ```


    If you do not initialize the `final` variable, you may receive a compilation error.
    For example, consider the following code snippet:


    ```

    class ParentClassTest4 {

    final int a=10;

    // final double PI=3.14;//ok

    final double PI;//error

    }

    ```


    For the preceding code snippet, you will receive a compilation error: `The blank
    final field PI may not have been initialized` (see Figure 5-9).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig9_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig9_HTML.jpg)


    Figure 5-9 — A compilation error snapshot in Eclipse IDE resulting from an uninitialized
    blank `final` field


    But you can opt to initialize `final` variables inside a constructor. And when
    you do that kind of initialization (for those uninitialized `final` variables),
    you use the term "blank final variables." Consider the following code snippet:


    ```

    class FinalDemo

    {

    //Must be initialized inside a constructor

    final double PI;

    double area;

    //final double PI=3.14;

    FinalDemo(){

    PI=3.14;

    }

    }

    ```


    In this case, the compiler will not raise any issues.


    It is important to note that there is no keyword like `const` that is a reserved
    keyword that simply has not been used yet. But you may notice the use of `const`
    in other languages like C++ or C#. Instead, in Java, to implement a similar concept,
    you can use the `final` keyword. In this context, JLS11 says the following:


    > *"A constant variable is a final variable of primitive type or type String that
    is initialized with a constant expression (§15.28). Whether a variable is a constant
    variable or not may have implications with respect to class initialization (§12.4.1),
    binary compatibility (§13.1), reachability (§14.21), and definite assignment (§16.1.1)."*


    ### Q&A Session


    **5.17 If I have multiple constructors, do I need to initialize the `final` variables
    in each of them?**


    Yes. Otherwise, you can call another constructor that can do that initialization
    for you. The following demonstration can help you to understand the concept better.
    In this demonstration, there are two constructors—`FinalDemo(int radius)` and
    `FinalDemo()`. If the parameterized constructor does not call a non-parameterized
    constructor prior to area calculation, it needs to initialize the value for `PI`
    itself.'
