    **or** **Child2** **object. For example, I can use the following line of code:**


    ```

    Child1 child1=new Child1();

    ```


    **And in such a case, a** **Child1** **object can persist in my system without
    a** **GrandChild** **object. Is this understanding correct?**


    Yes. You can say that this is an example of aggregation, or a lighter form of
    composition. But you can always restrict the user to directly instantiating objects
    from the `Parent`, `Child1`, or `Child2` classes. For example, you can place these
    classes inside a package and let your `Grandchild` class be the only public class
    inside that. Inside the client code, one can create `GrandChild` objects only.


    Consider the structure in Figure [9-1](#433474_2_En_9_Chapter.xhtml#Fig1), which
    is the Package Explorer view for the upcoming demonstration.


    ![../images/433474_2_En_9_Chapter/433474_2_En_9_Fig1_HTML.jpg](images/433474_2_En_9_Chapter/433474_2_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Using composition to solve the diamond problem


    And the classes inside the package (`java2e.chapter9.mypackage`) are as follows
    (key changes are shown in bold):


    ```

    //Parent.java

    package java2e.chapter9.mypackage;

    class Parent {

    public void show() {

    System.out.println("I am in Parent");

    }

    }

    //Child1.java

    package java2e.chapter9.mypackage;

    class Child1 extends Parent {

    @Override

    public void show() {

    System.out.println("I am in Child1");

    }

    }

    //Child2.java

    package java2e.chapter9.mypackage;

    class Child2 extends Parent {

    @Override

    public void show() {

    System.out.println("I am in Child2");

    }

    }

    //GrandChild.java

    package java2e.chapter9.mypackage;

    public class GrandChild { //This class is public here

    Child1 ch1 ;

    Child2 ch2 ;

    public GrandChild() {

    ch1 = new Child1();

    ch2 = new Child2();

    }

    public void showFromChild1() {

    ch1.show();

    }

    public void showFromChild2() {

    ch2.show();

    }

    }

    ```


    The client code may look like the following:


    ```

    //Demonstration1.java

    package java2e.chapter9;

    import java2e.chapter9.mypackage.GrandChild;

    class Demonstration1 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-1.The concept of aggregation/composition
    to handle the diamond Problem***\n");

    //Child1 child1=new Child1();//Error: not visible to client

    //Child2 child1=new Child2();//Error: not visible to client

    GrandChild gChild = new GrandChild();

    gChild.showFromChild1();

    gChild.showFromChild2();

    }

    }

    ```


    Now, if you execute the program, you’ll receive the same output, but in this structure
    you allow an outsider to create only a `Grandchild` object. So, in such a case,
    you provide more restriction, and your application will not hold any object from
    `Child1` or `Child2` if there is no `GrandChild` object.


    **9.5 What are the challenges and drawbacks of OOP?**


    Many experts believe that, in general, the size of object-oriented programs is
    larger. Due to the larger size, you may need more storage (but nowadays, these
    issues hardly matter).


    Some developers find difficulties in the object-oriented programming style. They
    may still prefer other approaches, such as structured programming, logic programming,
    and so forth, so if they are forced to work in an OOP environment, life becomes
    tough for them.


    It is also true that you cannot efficiently solve every real-world problem in
    the object-oriented style. There are always some problems that can be solved better
    with a different approach; for example, a particular sudoku puzzle can be solved
    much more easily with Prolog (a logic programming language) than with Java (an
    object-oriented programming language).


    Also, a common problem with the object-oriented style may arise when you need
    to find bugs in an execution flow, particularly if, in your codebase, there are
    many small methods (or functions) that call each other for a simple event. However,
    I personally like object-oriented programming because I believe that its merits
    are greater than its demerits.


    ## Summary


    This chapter included the following:


    *   A quick review of the core OOP principles in this book


    *   How to differentiate abstraction from encapsulation


    *   How to implement the concept of composition/aggregation in your application


    *   The challenges and drawbacks associated with OOP


