    ### Detecting Deadlocks in the System


    The examples of the book were tested in a Windows 10 system. Here, you can find
    the process ID of the application and use the `jstack` command to investigate
    long-running processes or deadlocks. For example, when you see that the program
    is NOT terminating (as expected), you can find the process ID of the application
    and use the `jstack` command to investigate. The steps are summarized here.


    ![../images/433474_2_En_11_Chapter/433474_2_En_11_Fig4_HTML.jpg](images/433474_2_En_11_Chapter/433474_2_En_11_Fig4_HTML.jpg)


