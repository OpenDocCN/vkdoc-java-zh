  trans: '

    ### 关于 Java 包的关键要点


    以下是关于包的一些重要知识点：


    *   `java.lang` 包中的所有类都是默认导入的。（问答 7.3 会详细讨论 import 语句。）


    *   如果你想重命名包，首先要重命名存放类的目录。


    *   应严格遵守包命名约定；例如，如果我们使用 `package a.b.c` 这样的语句，意味着目录 `c` 位于目录 `b` 内部，而目录 `b` 又位于目录
    `a` 内部。


    *   你可以参考表 7.1 来记忆可见性控制机制。


    ### 问答环节


    **7.1 如果每个类都位于某个包中，那么到目前为止，我怎么能不导入任何包就使用 System.out.print() 呢？**


    在 Java 中，`java.lang` 包中的所有类都是默认导入的。这就是为什么你能够使用 `System.out.println()`——`System`
    类也位于默认的 `java.lang` 包中。


    如果你导入一个包，子包不会被默认导入。例如，假设包 `companya` 中有一个子包 `subpacka`，并且你有以下代码：


    ```

    package java2e.chapter7.companya.subpacka;

    public class SubGoaPackage {

    int basePrice = 500;

    public void showPrice() {

    System.out.println("**I am in SubGoaPackage.I need to update myself**");

    }

    }

    ```


    现在，如果你在演示 1 中没有导入这个子包，以下代码段中的粗体行将导致编译时错误：


    ```

    //子包不会被默认导入。

    //需要显式导入该包。

    //import java2e.chapter7.companya.subpacka.*;

    SubGoaPackage companyASubGoaPackage=new SubGoaPackage();

    companyASubGoaPackage.showPrice();

    ```


    ### 注意


    如果你导入一个包，子包不会被默认导入。


    **7.2 你能解释一下默认访问说明符吗？**


    你随时可以参考表 7-1。从表中可以明显看出，如果你没有为某个成员指定任何特定的访问修饰符（如 public、private 等），它将被视为具有默认修饰符，那么你的特定成员将仅在同一包内可见；换句话说，包内的所有其他类都可以看到并使用它。


    表 7-1


    使用包的访问保护表


    |   | public | protected | private | 默认/无修饰符 |

    | --- | --- | --- | --- | --- |

    | 同一个类 | 是 | 是 | 是 | 是 |

    | 同一包中的子类 | 是 | 是 | 否 | 是 |

    | 同一包中的非子类 | 是 | 是 | 否 | 是 |

    | 不同包中的子类 | 是 | 是 | 否 | 否 |

    | 不同包中的非子类（外部世界） | 是 | 否 | 否 | 否 |


    同理，你可以对外部类赋予可见性，但限制只有处于同一继承层次结构（即子类）中的外部类才能看到目标成员，在这种情况下，你可以使用修饰符 `protected`。如果你根本不想设置任何限制，只需使用
    `public` 修饰符；而要提供最大限制，则使用 `private` 修饰符。


    ### 注意


    默认修饰符或无修饰符也称为**包私有**修饰符，因为它仅提供在包含它的包内的可见性。


    **7.3 import 语句的目的是什么？**


    JLS11 指出，“导入声明允许通过由单个标识符组成的简单名称来引用命名类型或静态成员。” 你可以通过使用 `import` 语句将指定位置的所有类（或包）引入到目标位置。否则，你需要使用完全限定名。例如，假设你有一个名为
    `MyClass` 的类，其中包含一些方法（为简单起见，假设你只使用了 public 修饰符）。这个类位于包（或目录）`packageb` 中，而 `packageb`
    又位于另一个目录 `packagea` 中。现在，你想从另一个位置重用这些方法/类。那么，根据目录结构，你需要将类引用为 `packagea.packageb.Myclass`。所以，你可以看到，对于需要使用的类，每次都要先输入长长的、用点分隔的包名，这既繁琐又难看。简而言之，通过使用
    import 语句，你可以节省大量输入，并提高程序的可读性。一旦导入，你就可以仅通过类名来引用一个类。


    **7.4 那么从技术上讲，我可以避免使用 import 语句。这个理解正确吗？**


    是的，但在实际的编程场景中，你需要在输入量和可读性方面付出很大代价。因此，我不推荐这种做法。


    **7.5 假设我在两个包中使用了相同的类名。然后在另一个程序中，我导入了这两个包。我会遇到编译器问题吗？另外，我如何访问特定的类？**


    首先，没有编译器问题。如果你在两个或多个包中有同名的类，只需使用它们的完全限定名来避免冲突。请参考演示 1 中的程序。你可以看到，这两个包都有类 `GoaPackage.java`，并且在
    `main()` 方法中我使用了它们的完全限定名。


    **7.6 在一些示例中，我看到 import 语句是第一行。但你告诉我 package 语句应该是第一行。我两者都有，哪个应该放在前面？**


    你必须记住，`package` 语句应该是第一行。然后放置 `import` 语句。请参见演示 2。


    ### 演示 2


    考虑以下程序，它演示了 `package` 和 `import` 语句的错误顺序。


    ```

    import java.util.Date;

    package java2e.chapter7;//错误

    class Demonstration2 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-2.探索 package 和 import 语句的顺序。***");

    Date currentTime = new Date();

    System.out.println(currentTime.toString());

    }

    }

    ```


    结果是编译错误（图 7-5）。


    ![../images/433474_2_En_7_Chapter/433474_2_En_7_Fig5_HTML.jpg](img/433474_2_En_7_Fig5_HTML.jpg)


    图 7-5


    Eclipse 编辑器中显示错误消息的输出快照


    让我们改变 `package` 和 `import` 语句的顺序，如下所示：


    ```

    package java2e.chapter7;//package 语句应该是第一行

    import java.util.Date;// 正确

    ```


    现在你将得到预期的输出：


    ```

    ***Demonstration-2.探索 package 和 import 语句的顺序。***

    Sat Mar 16 20:53:58 IST 2019

    ```

    '
- fmt: '### Q&A Session


    **7.7 Why does Java use this kind of design, where package statements must be
    placed before import statements?**


    My personal opinion is that you should always fix a location before you start
    writing the code. For example, you may decide to create classes for your application.
    If the classes already exist inside the same package (i.e., in same location),
    you can refer to it immediately and you do not need an `import` statement. But
    if this is not the case, you need to bring those classes into the intended location
    (and `import` takes its place). So, it’s like first fixing a location in order
    to build a house. You never build a house and then change the location. Likewise,
    if you look carefully, you will find that package naming conventions follow the
    directory structure of the corresponding bytecode; i.e., your intention is to
    fix a location first, and then you proceed.


    **7.8 How can I deal with multiple package statements in a source file?**


    You can have only one `package` statement in a source file.


    **7.9 Sometimes I do not see any package statement at all in a source file. Will
    I face any compiler issues for that?**


    No. It means that you are using the current default package.


    **7.10 I have some idea about the usage of packages. It’ll be helpful if you can
    summarize the overall usefulness of the packages.**


    If you look carefully, you can see that packages cover following scenarios:


    * They provide an organized structure, which is very useful for understanding
    and debugging the program.

    * You can avoid naming collisions by using package statements when different packages
    contain classes with the same name.

    * With different access modifiers inside packages, you can provide a level of
    security that is very much required in the real-life software development process.

    * You can reuse the classes that are already written and used in a package of
    other programs.


    **7.11 Name some built-in Java packages.**


    `java.lang`, `java.util`, `java.io`, and `java.net` are commonly used Java packages.


    ## Troubleshooting Common Errors in Command-line Environment


    In this book, Java programs are executed in Eclipse. It is a very user-friendly
    IDE. But sometimes you may want to compile and run a Java program using only Notepad
    and the command-line environment, but you may encounter some errors. Actually,
    programming with packages and then compiling and running those programs using
    the command line can be challenging. For example, suppose you put your class `MyClass`
    inside a package, `mypack.pkg`. Then, you would need to place the source code
    file in the subdirectory named `pkg` inside the directory `mypack`, which is in
    turn within the main Java working directory. In addition to this, to compile or
    run the program, you should be in the main directory, not in the subdirectory.
    I’ll show you this use case in detail at the end of this section.


    To begin with, let’s analyze some fundamental errors in the command-line environment.
    Suppose you have written the following program and saved it in `C:\TestClass\Hello.java`:


    ```

    public class Hello {

    public static void main(String[] args) {

    System.out.println("***Hello Vaskaran***");

    }

    }

    ```


    When you compile it, you may encounter the following error:


    ```

    C:\TestClass>javac Hello.java

    ''javac'' is not recognized as an internal or external command,

    operable program or batch file.

    ```


    This kind of problem occurs when you do not set the environment variables properly.
    You can set your `PATH` environment variable to remove this error, as follows:


    ```

    C:\TestClass>set path="C:\Program Files\Java\jdk1.8.0_172\bin";

    C:\TestClass>javac Hello.java

    C:\TestClass>

    ```


    But instead of setting this environment variable at the command prompt, it is
    suggested that you edit your environment variables and add this. It will be a
    one-time activity for you.


    Sometimes you can compile the program but cannot run it. For example, during execution,
    you may encounter a problem saying: `Error: Could not find or load main class
    XXX`, where `XXX` is the class name. Here is a screenshot of such an event:


    ![../images/433474_2_En_7_Chapter/433474_2_En_7_Figa_HTML.jpg](images/433474_2_En_7_Chapter/433474_2_En_7_Figa_HTML.jpg)


    In my case, a quick fix for this problem was to set the following variables properly
    (since I installed `jdk1.8.0_172` in my system):


    ```

    C:\TestClass>set class="C:\Program Files\Java\jdk1.8.0_172\bin";

    C:\TestClass>set classpath="C:\Program Files\Java\jre1.8.0_172\lib\rt.jar";

    ```


    Now I can recompile and run the program again. This time, the program is executed
    properly.


    ```

    C:\TestClass>javac Hello.java

    C:\TestClass>java Hello

    ***Hello Vaskaran***

    ```


    But in some cases, for a similar error message, you may need to search for other
    probable causes of failure. For example, let’s modify the program using a package
    statement at the beginning, as follows:


    ```

    package mypack;

    public class Hello2 {

    public static void main(String[] args) {

    System.out.println("***Hello Vaskaran***");

    }

    }

    ```


    Let’s suppose you put this `Hello2.java` in `C:\TestClass\mypack`. Now, try to
    compile and run the program as follows:


    ```

    C:\TestClass\mypack>javac Hello2.java

    C:\TestClass\mypack>java Hello2

    Error: Could not find or load main class Hello2

    ```


    You can see that this time the program is not running properly. Notice that you
    are currently in `mypack`. As said before, in a case like this, you should be
    in the *main directory*, not in the *subdirectory*. So, in this case, you need
    to go one level up and try the following commands:


    ```

    C:\TestClass\mypack>cd ..

    C:\TestClass>java mypack.Hello2

    ***Hello Vaskaran***

    ```


    In short, if you want to use simple command prompts and Notepad to run your Java
    program, you need to set your `PATH` and `CLASSPATH` environment variables properly.
    In addition to this, if you use a `package` statement, you should maintain the
    directory structure properly, and you should run your program by following the
    correct directory structure.


    ## Summary


    This chapter discussed the following topics:


    * What is a package?

    * How can you create packages in Eclipse IDE?

    * How should import statements be used?

    * What restrictions are associated with packages?

    * How can you write simple programs to demonstrate packages in Java?

    * How can you avoid some command-line environment errors?'
