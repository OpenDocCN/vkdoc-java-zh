- fmt: '### Demonstration 1


    In this program, you have an `Addition` class, which contains three methods. Each
    of these methods has the same name, `sum()`, but they can accept different arguments.
    In Java, this kind of coding is allowed.


    Now, compile and run the program and then analyze the output.


    ```

    package java2e.chapter5;

    class Addition {

    int sum(int x, int y) {

    return x + y;

    }

    double sum(double x, double y) {

    return x + y;

    }

    String sum(String s1, String s2) {

    return s1.concat(s2);

    }

    }

    class Demonstration1 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-1.Method overloading example***");

    Addition additionOb = new Addition();

    int sumOfIntergers = additionOb.sum(10, 20);

    System.out.println("10 + 20 is :" + sumOfIntergers);

    double sumOfDoubles = additionOb.sum(10.5, 20.7);

    System.out.println("10.5 + 20.7 is :" + sumOfDoubles);

    String sumOfStrings = additionOb.sum("Smith", "Turner");

    System.out.println("''Smith''+ ''Turner'' is :" + sumOfStrings);

    }

    }

    ```


    Output:


    ```

    ***Demonstration-1.Method overloading example***

    10 + 20 is :30

    10.5 + 20.7 is :31.2

    ''Smith''+ ''Turner'' is :SmithTurner

    ```


    You can see that the methods have the same name, `sum`, but once executed they
    are capable of doing different things.


    When you do this kind of coding, you call it method overloading. In method overloading,
    the method names are the same, but the method signatures are different. In this
    context, Java language specification (11) says that “a class cannot have multiple
    methods with the same signature and different primitive return types.”


    ### Points To Remember


    *   In Java, method overloading can help you to achieve compile-time polymorphism.

    *   In method overloading, the method parameters can vary with number, order,
    or the types of parameter.

    *   This kind of coding is also known as static binding, early binding, static
    method dispatch, or static polymorphism.

    *   In method overloading, a call to an overloading method is resolved at compile
    time, rather than at execution time.


    ### Q&A Session


    **5.1 What is a method signature?**


    In general, a method name with the number, types, and order of the parameters
    makes up its signature. Oracle Java documentation confirms the same, saying that
    two of the components of a method declaration make up the method signature—the
    method''s name and the parameter types. See the following:


    [`https://docs.oracle.com/javase/tutorial/java/javaOO/methods.html`](https://docs.oracle.com/javase/tutorial/java/javaOO/methods.html)


    So, the Java compiler can distinguish among methods with the same name but different
    parameter lists; for example, for the Java compiler, the method `double add(int
    x, double y){}` is different from the method `double add(double x, int y){}` or
    `double add( int x, int y, int z)`.


    **5.2 Is the following code segment an example of method overloading?**


    ```

    class Addition

    {

    public int sum(int x, int y)

    {

    return x + y;

    }

    public double sum(int x, int y, int z)

    {

    return x + y+ z;

    }

    }

    ```


    Yes.


    **5.3 Is the following code segment an example of method overloading?**


    ```

    class Addition

    {

    int sum(int x, int y)

    {

    return x + y;

    }

    double sum(int x, int y)

    {

    return x + y;

    }

    }

    ```


    No. The compiler will not consider the primitive return type to differentiate
    these methods. In other words, Java will not support primitive return type–based
    overloading. Eclipse IDE will raise its concern with the error shown in Figure
    [5-1](#433474_2_En_5_Chapter.xhtml#Fig1).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig1_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    An output snapshot with error message in the Eclipse editor


    When you learn about the covariant return type in Java, you’ll see that JVM (1.5
    onward) allows return type–based overloading, where a class can have two or more
    methods that differ only by return type, but in that case the return type of an
    overriding method should be a subtype of the overridden method’s return type.
    You’ll learn these terms shortly.


    **5.4 Can we have constructor overloading?**


    Definitely. You can think of constructors as a special kind of method with no
    return type.


    ### Demonstration 2


    You can write the following program to demonstrate constructor overloading.


    ```

    package java2e.chapter5;

    class ConstructorOverloadEx {

    ConstructorOverloadEx() {

    System.out.println("Constructor cannot accept any argument.");

    }

    ConstructorOverloadEx(int a) {

    System.out.println("Constructor can accept one integer argument: " + a);

    }

    ConstructorOverloadEx(int a, double b) {

    System.out.println("Constructor can accept one integer argument: " + a + " and
    one double argument: " + b);

    }

    }

    public class Demonstration2 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-2.Constructor Overloading.***");

    ConstructorOverloadEx ob1 = new ConstructorOverloadEx();

    ConstructorOverloadEx ob2 = new ConstructorOverloadEx(2);

    ConstructorOverloadEx ob3 = new ConstructorOverloadEx(2, 3.7);

    }

    }

    ```


    Output:


    ```

