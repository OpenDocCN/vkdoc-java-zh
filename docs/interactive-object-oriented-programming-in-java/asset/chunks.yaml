    public abstract void myMethod();

    }

    ```


    因此，你可以省略这些修饰符。需要注意的是，关于是否应该在接口中使用常量存在激烈争论。双方各有利弊。考虑一个简单的情况：如果你在接口中允许使用常量，那么所有实现类都可以使用该值。但让我们考虑另一种情况：某个实现类需要与其他类完全不同的值，或者根本不需要该值。在这种情况下，接口中的这个常量对于实现类来说是不必要的（或具有误导性的）。


    **6.30 我可以让接口继承自一个类吗？**


    不可以。类可以包含一些实现。因此，如果你允许接口继承自类，那么接口可能包含实现，这与接口的核心目标相悖。


    **6.31 你能总结一下使用接口的好处吗？**


    以下是接口的一些重要用例：


    *   你可以实现多态

    *   你可以实现多重继承的概念

    *   你可以开发松散耦合的系统

    *   你可以支持并行开发


    ## 总结


    本章回答了以下问题：


    *   什么是抽象类？

    *   如何使用抽象类实现运行时多态？

    *   为什么构造方法不能是抽象的？

    *   什么是接口？

    *   如何设计接口？

    *   接口的基本特征是什么？

    *   如何实现多个接口？

    *   如何处理具有同名方法的接口？

    *   接口有哪些不同类型？

    *   什么是标记接口？

    *   从注解的快速浏览中你能学到什么？

    *   如何在 Java 中使用默认方法，以及在多重继承的上下文中使用默认方法时如何避免菱形问题？

    *   抽象类和接口有什么区别？

    *   如何决定应该使用抽象类还是接口？

    *   使用接口的好处是什么？


    # 7. 包


    让我们考虑一个简单的场景。你能在 Java 文件中为不同的类使用相同的名称吗？不能。编译器会引发问题，并指出这种命名冲突。当你定义一个类时，需要遵循唯一的命名约定。在实际编程中，类名应该具有一定意义，并且有可能不同的程序员会选择不唯一的类名。那么显而易见的问题是：你如何处理这种情况？包可以在这些情况下拯救我们。


    你可以将你的类或接口捆绑到自己的包中。这种方法有助于避免命名冲突。简单来说，来自两个不同包的两个类可以具有相同的名称。包还可以控制包元素的可见性。因此，是否希望你的类对外部世界公开，由你自己决定。


    ### 注意


    你可以在两个不同的包中拥有两个同名的类，但在同一个包中不能有两个同名的类。JLS11 给出了一个很好的例子：如果有一个名为 `mouse` 的包，并且该包中有一个成员类型
    `Button`（那么它可能被称为 `mouse.Button`），则不能有任何完全限定名称为 `mouse.Button` 或 `mouse.Button.Click`
    的包。


    在 Java 中，目录是包的物理表示。在 Eclipse 中创建包非常容易。你甚至不必担心 Java 运行时将如何找到正确的包或其中的类。但是，你可能需要特别注意
    `PATH` 和 `CLASSPATH` 环境变量。在命令行环境中编写第一个 Java 程序之前，这些变量起着重要作用。


    在继续之前，请记住以下几点：


    *   `package` 语句应位于源文件的顶部。如果你没有显式定义此语句，那么所有类/接口等都将位于当前的默认包中。

    *   按照惯例，包名以小写字母开头；例如，一些内置的 Java 包是 `java.lang`、`java.awt`、`java.util`、`java.io`
    等。

    *   一个包可以包含子包；例如，如果你有一个包 `p`，并且 `q` 是 `p` 的子包并包含一个类，即 `MyClass`，那么你可以使用完全限定名 `p.q.MyClass`
    来引用 `MyClass`。因此，包名必须遵循目录结构。

    *   当一个类引用同一包内的另一个类时，不需要包含 `package` 语句。否则，你可能需要使用完全限定的类名，例如 `packagename.MyClass`，或者你可能需要使用
    `import` 语句。

    *   可以按如下方式导入整个包：


    *   或者，如果你只想导入一个特定的类——例如，从名为 `mypack` 的包中导入 `MyClass`——请使用类似以下的内容：


    ```

    import packagename.*;

    ```


    *   Java 中的每个类都位于一个包内。有时你可能会看到没有包声明的 Java 源文件。这意味着这些类位于默认包或未命名包中。JLS 11 对未命名包有如下说明：“没有包声明的普通编译单元是未命名包的一部分。Java
    SE 平台提供未命名包主要是为了方便开发小型或临时应用程序，或刚开始开发时使用。”


    ```

    import mypack.MyClass;

    ```

