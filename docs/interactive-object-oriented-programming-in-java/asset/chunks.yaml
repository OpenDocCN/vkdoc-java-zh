- fmt: '### Q&A Session


    **6.1 How can you implement the concept of runtime polymorphism here?**


    You saw it in the previous example. Note the following portion of code:


    ```

    System.out.println("\n*** Invoking methods through parent class reference now.***");

    AbstractClass abstractRef = new ConcreteClass();

    abstractRef.showMe();

    abstractRef.completeMethod1();

    abstractRef.completeMethod2();

    ```


    **6.2 Can an abstract class contain fields?**


    Yes. In the previous example, you saw such a field; that is, `myInt`.


    **6.3 In the preceding example, the access modifier is `protected`. Is this mandatory?**


    No. You can use other types of modifiers also; for example, you can replace the
    `protected` modifier with the `public` modifier. Later, you will learn that the
    presence of different access modifiers in abstract classes can give you a better
    flexibility. It can also make an abstract class different from an interface.


    **6.4 Suppose, in a class, I have more than ten methods, and out of those only
    one is an abstract method. Do I need to mark the class with the keyword `abstract`?**


    Yes. If a class contains at least one abstract method, the class itself is abstract.
    You can simply recognize the fact that an `abstract` keyword is used in a sense
    to represent the incompleteness. So, if your class contains one incomplete method,
    the class is incomplete, and hence it needs to be marked with the keyword `abstract`.


    So, the simple formula is: whenever your class has at least one abstract method,
    the class is an abstract class.


    **6.5 Now consider a reverse scenario. Suppose you have marked your class with
    the `abstract` keyword but there is no abstract method in it, like the following:**


    ```

    abstract class AbstractClassQuiz1 {

    public void completeMethod1() {

    System.out.println("completeMethod-1");

    }

    public void completeMethod2() {

    System.out.println("completeMethod-2.");

    }

    }

    ```


    **Can you compile this program segment?**


    Yes. It will compile, but you must remember that you cannot create an object for
    this class. So, if you code like this:


    ```

    AbstractClassQuiz1 absRef = new AbstractClassQuiz1 ();//Error

    ```


    the compiler will raise its concern (see Figure [6-1](#433474_2_En_6_Chapter.xhtml#Fig1)).


    ![../images/433474_2_En_6_Chapter/433474_2_En_6_Fig1_HTML.jpg](images/433474_2_En_6_Chapter/433474_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    You cannot create an instance of an abstract class


    ### Note


    It is not necessary for an abstract class to have abstract methods only.


    **6.6 How can you create an object from an abstract class?**


    You cannot create objects from an abstract class.


    **6.7 It appears to me that an abstract class has virtually no use if it is not
    extended. Is this correct?**


    Yes.


    **6.8 If a class extends an abstract class, it has to implement all the abstract
    methods. Is this correct?**


    The simple formula is that if you want to create objects in a class, the class
    needs to be completed; that is, it should not contain any abstract methods. So,
    if the child class cannot provide implementation (i.e., complete method body)
    of all the abstract methods, it should mark itself again with the keyword `abstract`,
    like in the following example:


    ```

    abstract class AbstractClass

    {

    public abstract void inCompleteMethod1();

    public abstract void inCompleteMethod2();

    }

    abstract class child1 extends AbstractClass

    {

    //Here our child class is implementing only one of the abstract methods. //But
    it does not complete the other one.

    //So, the class is abstract again.

    @Override

    public void inCompleteMethod1()

    {

    System.out.println("Implementing the inCompleteMethod1()");

    }

    }

    ```


    In this case, if you forget to use the keyword `abstract`, the compiler will raise
    an error saying that `ChildClass` has not implemented `InCompleteMethod2()`, as
    shown in Figure [6-2](#433474_2_En_6_Chapter.xhtml#Fig2).


    ![../images/433474_2_En_6_Chapter/433474_2_En_6_Fig2_HTML.jpg](images/433474_2_En_6_Chapter/433474_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    A concrete class cannot contain abstract methods


    **6.9 I can say that a concrete class is a class that is not abstract. Is this
    correct?**


    Yes.


    **6.10 Sometimes I am confused about the order of keywords; for example, in the
    preceding case you are using:**


    ```

    public abstract void inCompleteMethod1();

    ```


    **Is it following any specific order?**


    The method must have a return type, and it should be preceded by your method name.
    So, if you can remember this concept, you will never write something like `public
    void abstract inCompleteMethod1();`, which is incorrect in Java. In Eclipse, you
    will get the error messages shown in Figure [6-3](#433474_2_En_6_Chapter.xhtml#Fig3):


    ![../images/433474_2_En_6_Chapter/433474_2_En_6_Fig3_HTML.jpg](images/433474_2_En_6_Chapter/433474_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    An output snapshot with error message in the Eclipse editor


    **6.11 Can you mark a method with both the keywords `abstract` and `final`?**


    No. It is like if you say that you want to explore Java but will not go through
    any reference material. Similarly, by declaring `abstract`, you want to share
    some common information across the derived classes, and you agree that overriding
    is necessary for them; that is, the inheritance chain needs to grow but at the
    same time, by declaring `final`, you want to put an end marker to the derivational
    process, so that the inheritance chain cannot grow. You are trying to implement
    two opposite concepts simultaneously.


    **6.12 Can you compile the following code?**


    ```

    class Test2 {

    // Constructors cannot be final/abstract/static

    abstract Test2() { //Error

    System.out.println("abstract constructor?Is it possible?");

    }

    }

    ```


    Answer:


    No. You’ll encounter a compile-time error (Figure [6-4](#433474_2_En_6_Chapter.xhtml#Fig4)).


    ![../images/433474_2_En_6_Chapter/433474_2_En_6_Fig4_HTML.jpg](images/433474_2_En_6_Chapter/433474_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Constructors cannot be abstract


    **6.13 Why can’t constructors be abstract?**


    You usually use the keyword `abstract` with a class to indicate that it is incomplete,
    and the subclass will take responsibility for making it complete. However, you
    also know that constructors cannot be overridden. Also, if you analyze the actual
    purpose of constructors (i.e., to initialize objects), you must agree that since
    you cannot create objects from abstract classes, this design suits here perfectly.


    **6.14 Can you predict the output of the following code segment?**'
