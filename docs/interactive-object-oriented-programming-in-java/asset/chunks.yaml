    ## Creating a Custom Exception


    You have already seen some common uses of Java’s built-in exceptions. These are
    very handy, and, in most cases, they can serve your needs. But sometimes you may
    want to define your own exception class to get messages that are more meaningful
    to you. So, you may want to create your own exceptions to handle some specific
    situations in your application.


    Creating a custom exception is easy. But before you proceed further, you should
    remember the following points:


    *   A common practice to create a user-defined exception class is to extend from
    the `Exception` class. You have learned that `Exception` is a subclass of the
    `Throwable` class. So, you can override or use the methods defined in the `Throwable`
    classes.


    *   The `Exception` class does not have any method specific to it. But here you’ll
    see different overloaded version of constructors; for example, you will notice
    the presence of the following constructors. In the discussion of chained exceptions,
    you got to know about two of them. In the upcoming demonstration, you will see
    the use of another two:


    *   Following convention, it is suggested that when you create your own exception,
    the class name should end with the word `Exception`.


    ```

    public Exception() {}

    public Exception(String message) {}

    public Exception(String message, Throwable cause) {}

    public Exception(Throwable cause) {}

    protected Exception(String message, Throwable cause, boolean enableSuppression,
    boolean writableStackTrace) {}

    ```'
