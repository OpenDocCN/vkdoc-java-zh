    \n```\nString trimmedString = str1.trim();\nString strippedString = str1.strip();\n\
    System.out.printf(\"'%s'%n\", trimmedString);\nSystem.out.printf(\"'%s'%n\", strippedString);\n\
    ```\n\n你会看到`strip()`能够识别字符串的开头和结尾空白并正确完成其工作。\n\n# Java 12/13 的新 switch 表达式\n\n\
    `switch`表达式出现在 Java 12 中，并在 Java 13 中进一步完善。但它是一个预览语言特性。使用此表达式，整个`switch`块可以接收一个输入值。你可以使用\
