  trans: "\n### 演示 6A\n\n请审阅程序及其附带的注释以加深理解。\n\n```\npackage chapter12.testcodes;\n\
    import java.util.Arrays;\nimport java.util.Collections;\nimport java.util.List;\n\
    class Sample {\n//案例研究-1：字段中的通配符\nList  myList;  // 有效\n//?  aField;  // 无效\n\
    //案例研究-2：方法参数中的通配符\n//? 的语法错误\n//无效\n//public void invalidMethodWithWildCardParameter(?\
    \ methodParameter) {\n//  一些代码\n//}\n//以下方法是有效的。\npublic void validMethodWithWildCardParameter(List\
    \ myParameter) {\nSystem.out.println(\"validMethodWithWildCardParameter(List myParameter)\
    \ 是一个有效的方法。\");\n}\n//案例研究-3：返回类型中的通配符\n//错误：方法缺少返回类型\n// private ? methodWithWildCardReturnType()\
    \ {//无效\n//return null;\n//    }\n}\n//案例研究-4：超类型中的通配符\n//错误：超类型不能指定任何通配符\n//public\
    \ class SubList implements List{ //无效\n//  一些代码\n//}\nclass Test2 {\npublic static\
    \ void main(String[] args) {\nSystem.out.println(\"***演示 6A：通配符的一些案例研究***\");\n\
    Sample sample=new Sample();\n//案例研究-5：局部变量中的通配符\nList myList = Arrays.asList(12,27,39);//有效\n\
    System.out.println(\"原始列表：\" + myList);\nCollections.reverse(myList);\nSystem.out.println(\"\
    反转后的列表：\"+myList);\nsample.validMethodWithWildCardParameter(myList);\n}\n}\n```\n\
    \n以下是演示 6A 的输出结果。\n\n```\n***演示 6A：通配符的一些案例研究***\n原始列表：[12, 27, 39]\n反转后的列表：[39,\
    \ 27, 12]\nvalidMethodWithWildCardParameter(List myParameter) 是一个有效的方法。\n```\n\
    \n## 有界类型参数\n\n你很快就会了解到，通配符并不能高效地解决所有问题。还有另一种选择，称为**有界类型参数**。它可以帮助你限制在参数化类型中可用作类型实参的类型。\n\
    \n让我们从一个非常简单的用例开始。假设你正在处理一些整数和双精度浮点数，并且希望创建一个泛型类，该类应包含一个计算这些数值总和的方法。你需要理解以下几点：\n\
    \n*   你可以创建一个返回类型为 `double` 的方法来实现你的目的。\n*   你正在使用泛型，因此需要考虑 `int` 和 `double` 的包装类。`Integer`\
    \ 是 `int` 的包装类，`Double` 是 `double` 的包装类。\n*   `Integer` 和 `Double` 是 `Number`\
    \ 类的子类，该类拥有 `intValue()`、`longValue()`、`floatValue()`、`doubleValue()` 和 `byteValue()`\
    \ 等方法。让我们从 Eclipse IDE 中查看 `doubleValue()` 方法的功能。图 12-5 是 Eclipse 的截图。\n\n   \
    \ ![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig5_HTML.jpg](img/433474_2_En_12_Fig5_HTML.jpg)\n\
    \n    图 12-5\n\n    来自 Eclipse IDE 的 doubleValue() 方法详情截图\n\n*   由于 `doubleValue()`\
    \ 是一个抽象方法，它的具体子类必须实现此方法。现在，让我们检查 `Integer` 类是如何实现 `doubleValue()` 方法的。如下所示：\n\n\
    *   现在，让我们也检查一下 `Double` 类是如何在 `Number` 类中实现 `doubleValue()` 的：\n\n```\n/**\n\
    * 在拓宽原始转换后，将此 {@code Integer} 的值作为 {@code double} 返回。\n* @jls 5.1.2 拓宽原始转换\n*/\n\
    public double doubleValue() {\nreturn (double)value;\n}\n```\n\n```\n/**\n* 返回此\
    \ {@code Double} 对象的 {@code double} 值。\n* @return 此对象表示的 {@code double} 值\n*/\n\
    public double doubleValue() {\nreturn value;\n}\n```\n\n从这些定义中可以明显看出，在你的场景中，你可以使用\
    \ `doubleValue()` 方法。现在你可以编写以下程序了。\n\n### 演示 7\n\n让我们编译并运行该程序，然后分析输出结果。\n\n```\n\
    package java2e.chapter12;\n//一个泛型类\n//T 是一个类型参数。当你初始化实际对象时，它将被替换为实际类型。\nclass\
    \ GenericDemo7Class {\nT firstNumber, secondNumber;\nGenericDemo7Class(T firstNumber,\
    \ T secondNumber) {\nthis.firstNumber = firstNumber;\nthis.secondNumber = secondNumber;\n\
    }\n// 始终返回一个 double 值\npublic double displaySum() {\n//使用库方法 doubleValue()\nreturn\
    \ firstNumber.doubleValue() + secondNumber.doubleValue();\n}\n}\nclass Demonstration7\
    \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***演示-7：有界类型参数的典型用法。***\\\
    n\");\nGenericDemo7Class doubleOb = new GenericDemo7Class(2.5, 5.7);\nSystem.out.println(\"\
    2.5+5.7=\" + doubleOb.displaySum());\nGenericDemo7Class intOb = new GenericDemo7Class(2,\
    \ 7);\nSystem.out.println(\"2+7=\" + intOb.displaySum());\n//GenericDemo7Class\
    \ stringOb=new GenericDemo7Class(\"hello\",\"world!\");\n// 如果使用 class GenericDemo7Class\
    \ 会导致边界不匹配错误\n//System.out.println( \"2+7=\" +stringOb.displaySum());\n}\n}\n\
    ```\n\n输出结果：\n\n```\n***演示-7：有界类型参数的典型用法。***\n2.5+5.7=8.2\n2+7=9.0\n```\n\n你可以看到程序已成功编译并运行。现在，请考虑以下几点：\n\
    \n*   让我们看看如果在之前的演示中使用 `<T>` 而不是 `<T extends Number>` 会发生什么，如下所示：\n\n```\n//class\
