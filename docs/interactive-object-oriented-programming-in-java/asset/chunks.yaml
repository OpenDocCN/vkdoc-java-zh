  trans: '

    ## 封装


    在面向对象编程中，你不允许数据在系统内自由流动。相反，你将数据和函数封装到一个单一单元中（即一个类中）。封装的目的至少包含以下之一：


    *   设置限制，使得对象的组件无法被直接访问

    *   将数据与作用于该数据的方法绑定在一起（即形成一个胶囊）


    在某些面向对象编程语言中，信息隐藏并非默认实现。因此，它们引入了一个额外的术语，称为*信息隐藏*。


    稍后你会看到，数据封装是类中的关键特性之一。如果你想提升安全性，你的数据就不应该对外部世界可见。只有通过类内部定义的方法，你才能访问这些数据。因此，你可以将这些方法视为对象数据与外部世界（即你的程序）之间的接口。


    在 Java 中，你可以通过多种方式实现封装。例如，你可以在此上下文中使用访问说明符（或修饰符）以及 getter-setter 方法。


    ### 注意


    你将在第 3 章中学习访问说明符和 getter-setter 方法。


    ## 抽象


    抽象的关键目的是只展示必要的特征，并隐藏实现的背景细节。抽象也与封装密切相关，但两者的区别可以通过一个简单的日常场景轻松理解。


    当你按下遥控器上的按钮打开电视时，你并不关心电视的内部电路，也不关心遥控器如何控制电视的操作。你只知道遥控器上不同的按钮有不同的功能，只要它们正常工作，你就满意了。因此，用户与复杂的实现细节隔离开来，这些细节被*封装*在遥控器（和电视）内部。同时，可以通过遥控器执行的常见操作可以被视为一种*抽象*。当同一个遥控器也能在不同型号或产品上使用时，制造商可以增强这一特性。例如，DVD
    播放器的遥控器也可以用来控制电视的音量。


    ## 继承


    每当我们谈论可重用性时，通常指的是继承，这是一个对象获取另一个对象属性的过程。考虑这个例子。`Bus` 是 `Vehicle` 的一种类型，因为它满足了用于运输目的的
    `Vehicle` 的基本标准。类似地，`Train` 是 `Vehicle` 的另一种类型。即使 `GoodsTrain` 和 `PassengerTrain`
    不同，我们也可以说两者都继承自 `Train` 类别（或类），因为最终它们都满足了 `Train` 的基本标准，而 `Train` 本身又是一种 `Vehicle`。因此，你可以简单地说，层次化分类是通过继承的概念来支持的。


    在编程世界中，继承从一个现有的父类创建一个新的子类。这个父类有时有不同的名称。例如，在 C# 中，你将这个父类称为基类，而在 Java 中，你可能将其称为超类。所以，简单来说，父类位于该层次链中高一级的位置。然后，你可以向子类中添加新的功能（方法）或修改超类的功能（稍后你会称之为重写功能）。你必须记住，由于这些修改，核心架构不应受到影响。换句话说，如果你从
    `Vehicle` 类派生出 `Bus` 类，并在 `Bus` 类中添加/修改功能，这些修改不会影响为 `Vehicle` 类描述的原始功能。


    因此，关键优势在于，通过这种机制，你可以避免大量重复的代码。


    ## 多态


    多态通常与*一个名称，多种形态*相关联。想想你家宠物的行为。当它看到一个陌生人时，它会生气并开始狂吠。但当它看到你时，它会发出不同的声音并表现出不同的行为。在编程世界中，你也可以想到一个常见的方法：加法。对于两个整数的加法，你期望得到整数的和。但对于字符串操作数，你期望得到一个拼接后的字符串。


    多态可以分为两种类型：


    *   ***编译时多态**：* 一旦程序被编译，编译器可以很早就决定在哪种情况下调用哪个方法。这也被称为静态绑定或早期绑定。


    *   ***运行时多态**：* 实际的方法调用在运行时才被解析。在编译时，你无法预测程序运行时将调用哪个方法（例如，程序可能因不同的输入而表现不同）。考虑以下情况：假设你想在程序执行的第一行生成一个随机数。如果生成的数字是偶数，你将调用一个方法
    `Method1()`，它会打印“Hello”；否则，你将调用一个同名的方法，但它会打印“Hi”。现在，你会同意，在程序执行后，你才能看到哪个方法被调用了（即编译器无法在编译时解析该调用）。在这种情况下，在程序执行之前，你完全无法得知会看到“Hello”还是“Hi”。因此，它有时也被称为动态绑定或晚期绑定。在第
    5 章中，你将看到关于多态的详细讨论，并深入体会运行时多态的必要性。


    ## 问答环节


    **1.1 面向对象编程的关键特性是什么？**


    以下是面向对象编程的关键特性：


    *   封装

    *   抽象

    *   继承

    *   多态


    **1.2 对象与类有何不同？**


    对象由类创建。对象是类的一个实例，而类只是对象的模板或蓝图。对象是物理实体，可以在系统中分配内存，但类是逻辑实体，不在系统中分配内存。


    **1.3 抽象与封装有何不同？**


    抽象关注对象的可见行为，而封装关注该行为的实现部分。封装帮助你捆绑数据，同时可以隐藏一些你不想向外部世界披露的信息。


    **1.4 继承机制的关键优势是什么？**


    重用现有代码，你可以节省时间和精力。同时，这种机制有助于避免应用程序中的重复代码。


    **1.5 面向对象编程的特点是什么？**


    以下是一些重要特点：


    *   你的关注点在数据，而不是函数。因此，你将程序划分为对象，而不是函数。

    *   你不允许数据自由流动。你使用方法访问它们。

    *   你的对象通过方法进行通信。

    *   外部世界不应访问你的数据。

    *   你的应用程序可以轻松适应新的变化。同时，它也易于维护。


    ## 总结


    本章讨论了以下主题：


    *   什么是面向对象编程？

    *   它为何会演变？

    *   它与结构化编程有何不同？

    *   面向对象编程的关键特性是什么？


    # 2. 构建模块：类与对象


    面向对象编程（OOP）技术主要依赖于两个概念——类和对象。在本章中，我们将详细讨论这些主题。


    ## 类


    类是蓝图、模板或原型。它可以描述其对象的行为，并且是对象如何被构建或实例化的基础。

