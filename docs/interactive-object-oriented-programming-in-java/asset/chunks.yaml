    Output:


    ```

    ***Demonstration-4.Testing overloaded main() methods.***

    Inside standard main-main(String[] args).

    ```


    As you can see, the preceding program is compiled successfully. When you run the
    program, it will invoke the standard `main()` method. In addition, you can invoke
    other overloaded methods from this standard `main()` method. For example, if you
    uncomment the following two lines in the preceding program,


    ```

    // main("hello");

    // main(5,"hello");

    ```


    you’ll receive the following output:


    ```

    ***Demonstration-4.Testing overloaded main() methods.***

    Inside standard main-main(String[] args).

    Overloaded main() with one string parameter is called.

    Overloaded main() with one integer and one string parameter is called.

    ```


    ### Q&A Session


    **5.8 I am confused. Why am I getting a compilation error for the following program?**


    ```

    package chapter5.testcodes;

    public class Test2 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-4.Testing overloaded main() methods.***");

    System.out.println("Inside standard main-main(String[] args).");

    // main("hello");

    // main(5,"hello");

    }

    public static void main(String... args) {

    System.out.println("Inside String... args");

    }

    }

    ```


    In this case, there is an ambiguity because the call can be translated by either
    of these two methods. The Eclipse editor also points this out with error messages
    that say you are using duplicate methods (see Figure [5-3](#433474_2_En_5_Chapter.xhtml#Fig3)).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig3_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    The output snapshot of the error messages in the Eclipse editor when you use duplicate
    methods


    **5.9 Does Java support the concept of user-defined operator overloading?**


    No.


    **5.10 Will the code in the following demonstration compile?**


    ### Demonstration 5


    Here is the code:


    ```

    package java2e.chapter5;

    class Class5

    {

    public void myMethod(int... a){

    System.out.println("Inside myMethod(int... a)");

    }

    public void myMethod(int a, int b){

    System.out.println("Inside myMethod(int a, int b)");

    }

    public void myMethod(boolean... b){

    System.out.println("Inside myMethod(boolean... a)");

    }

    }

    class Demonstration5 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-5.Testing Method overloading.***");

    Class5 ob5=new Class5();

    ob5.myMethod(1);

    ob5.myMethod(1,2);

    ob5.myMethod();

    }

    }

    ```


    No. The compiler is able to resolve both the calls `ob5.myMethod(1)` and `ob5.myMethod(1,2)`,
    but it is confused by `ob5.myMethod()`. This call can be translated by either
    `myMethod(int... a)` or `myMethod(boolean... a)`.


    Because of this ambiguity, it raises a compile-time error (see Figure [5-4](#433474_2_En_5_Chapter.xhtml#Fig4)).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig4_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig4_HTML.jpg)


    Figure 5-4


    A code snapshot with error message in the Eclipse editor resulting from an ambiguous
    call


    If you remove `myMethod(boolean... a){}` from the preceding code, you’ll receive
    the following output:


    ```

    ***Demonstration-5.Testing Method overloading.***

    Inside myMethod(int... a)

    Inside myMethod(int a, int b)

    Inside myMethod(int... a)

    ```


    ### Note


    You may notice the syntactical difference in code segments between Q&A 5.8 and
    5.10. In 5.8, you were dealing with `String[]` and `String...`, but in 5.10, you
    were dealing with `int...` and `boolean...`.


    ### Tips For Good Programming Practice


    Try to be consistent with parameter names and their corresponding orders for overloaded
    methods.


    The following is an example of good design:


    ```

    public void showMe(int a) {..}

    public void showMe(int a, int b){...}

    ```


    Notice that in the second line, the position of `int a` is the same as in the
    first line.


    The following is not a recommended design:


    ```

    public void showMe(int a) {..}

    public void showMe(int x, int b){...}

    ```


    Notice that in the second line, the code is started with `int x` instead of `int
    a`.


    ## Method Overriding


    In some situations, your derived class may want to redefine or modify the behavior
    of the parent class. Method overriding comes into the picture in such a scenario.
    Consider the following program and the output. Then, go through each of the points
    carefully in the analysis section.


    Here are the important points about the following program:


    *   You have two classes—`ParentClass` and `ChildClass`. As the name suggests,
    `ChildClass` is a derived class that is derived from its parent, `ParentClass`.


    *   A method named `showMe()` with the same signature and return type is defined
    in both the `ParentClass` and the `ChildClass`. It simply means the `ChildClass`
    wants to redefine the `showMe()` method that is already present in the `ParentClass`,
    but it is ok with the other method, `doNotChangeMe()`.


    *   In the `main()` method, a child class object `childOb` is created. When you
    invoke the method `doNotChangeMe()` through this object, it calls the method that
    is defined in the `ParentClass` (following the inheritance property). There is
    no magic.


    *   When you invoke the method `showMe()` through this object, it calls the `showMe()`
    version defined in `ChildClass`; that is, the parent method version is overridden.
    Hence, the scenario is known as **method overriding**.


    *   The `showMe()` in the `ParentClass` is called the **overridden method**, and
    the `showMe()` in the `ChildClass` is called the **overriding method**.


    ### Demonstration 6


    Now, go through Demonstration 6.


    ```

    package java2e.chapter5;

    class ParentClass {

    // Overridden method

    public void showMe() {

    System.out.println("Inside ParentClass.showMe()");

    }

    public void doNotChangeMe() {

    System.out.println("Inside ParentClass.doNotChangeMe().");

    }

    }

    class ChildClass extends ParentClass {

    // Overriding method

    public void showMe() {

    System.out.println("Inside ChildClass.showMe().");

    }

    }

    class Demonstration6 {

    public static void main(String[] args) {

    System.out.println("*** Method overriding demonstration.***");

    ChildClass childOb = new ChildClass();

    childOb.doNotChangeMe();

    childOb.showMe();//Will display the overridden method

    }

    }

    ```


    Output:


    ```

    *** Method overriding demonstration.***

    Inside ParentClass.doNotChangeMe().

    Inside ChildClass.showMe().

    ```


    You will notice that in this case the return types, signatures, and access-specifiers
    of the parent class and child class methods are the same. In the preceding example,
    if you change the accessibility from public to protected in the child class’s
    `showMe()`, as follows,


    ```

    //Error

    protected void showMe() {

    System.out.println("Inside ChildClass.showMe().");

    }

    ```


    you will receive a compilation error that says `Cannot reduce the visibility of
    the inherited method from ParentClass` (Figure [5-5](#433474_2_En_5_Chapter.xhtml#Fig5)).


    ![../images/433474_2_En_5_Chapter/433474_2_En_5_Fig5_HTML.jpg](images/433474_2_En_5_Chapter/433474_2_En_5_Fig5_HTML.jpg)


    Figure 5-5


    An error message snapshot in the Eclipse editor when you reduce the visibility
    of the inherited method


    ### Note


    There is a concept called covariant return type in Java. I’ll discuss this topic
    later. Since it is a relatively advanced concept, it is suggested that you understand
    the original concept first.'
