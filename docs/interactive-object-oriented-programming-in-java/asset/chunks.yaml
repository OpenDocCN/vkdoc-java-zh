  raw: '### Points To Remember


    *   Method hiding is associated with static methods and compile-time polymorphism.
    Method overriding is associated with non-static methods and runtime polymorphism.


    *   The hiding of methods and the hiding of fields may have some similarities
    or dissimilarities, depending on the particular application or usage. You may
    refer to the language specification for a detailed case-by-case study. For example,
    the Java language specification says that if the class declares a field with a
    certain name, then the declaration of that field is said to hide the accessible
    declarations of fields with the same name in super classes and superinterfaces
    of the class. In this respect, the hiding of fields differs from the hiding of
    methods, for there is no distinction drawn between static and non-static fields
    in field hiding, whereas a distinction is drawn between static and non-static
    methods in method hiding. A hidden field can be accessed by using a qualified
    name if it is static, or by using a field-access expression that contains the
    keyword `super` or a cast to a super class type. In this respect, the hiding of
    fields is like the hiding of methods.


