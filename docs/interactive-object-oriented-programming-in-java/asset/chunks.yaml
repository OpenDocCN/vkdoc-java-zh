- fmt: '# Q&A Session


    ## 13.3 Why is the use of `PreparedStatement` objects considered faster than using
    `Statement` objects?


    `PreparedStatement` objects can contain precompiled SQL statements. So, if you
    pass the same query (with the same or different data) multiple times, DBMS can
    run the query much faster. But, in the case of a `Statement` object, SQL needs
    to validate the query each time you use it.


    ## 13.4 Is passing the parameters mandatory for `PreparedStatement` objects?


    No. In Demonstration 3, you could simply use the following lines of code to get
    the same result:


    ```

    //Parameters are not mandatory for PreparedStatement .

    preparedStatementOb = connectionOb.preparedStatement("insert into Employee values(4,''IvanS'',27,975.6)");

    ```


    Normally, you use `PreparedStatement` when your SQL query takes parameters. The
    SQL statement that takes parameters can help you to execute the statement with
    different values, which is very common in real-world scenarios. For simplicity
    and to make the program shorter, I have not used command-line arguments or user-defined
    inputs. But in practice, you can always pass the arguments using the command line,
    which in turn will replace the question marks before your query is processed.


    ## 13.5 How is the `executeQuery()` method different from `executeUpdate()`?


    The `executeUpdate()` method is associated with insert, update, or delete operations
    or SQL statements that return nothing, such as DDL statements. This method does
    not return any `ResultSet` object. On the other hand, `executeQuery()` executes
    an SQL statement that returns a single `ResultSet` object. This method cannot
    be called on `PreparedStatement` or `CallableStatement` (this will be discussed
    in the next demonstration).


    ## 13.6 What are the key advantages of using `PreparedStatement`?


    Here are the key advantages of using `PreparedStatement`:


    *   You can pass parameterized SQL statements.

    *   You can reuse the statement with different values.

    *   You can provide batch processing.

    *   Since it supports precompiled SQL statements, you may enhance the execution
    time.


    ## 13.7 What is batch processing? Can you give an example?


    By “batch processing,” I mean that you can execute a bunch (or group or set) of
    queries. The `addBatch()` and `executeBatch()` methods in the `Statement` interface
    can help you in this area.


    Let’s add the following lines to Demonstration 1:


    ```

    statementOb.addBatch("insert into Employee values(4,''Ivan'',27,975.6)");

    statementOb.addBatch("insert into Employee values(5,''Jacklin'',29,575.5)");

    //Batch execution

    statementOb.executeBatch();

    ```


    Now, you can see that the records are inserted properly. Similarly, you can delete
    the records as follows:


    ```

    //Now deleting the records  from the Employee table

    //and resetting the original state of Employee table.

    System.out.println("\nDeleting the record of Ivan and Jacklin from the Employee
    table.");

    statementOb.addBatch("delete from employee where name="Ivan" ");

    statementOb.addBatch("delete from employee where name="Jacklin" ");

    //Batch execution

    statementOb.executeBatch();

    ```


    ## Demonstration 4


    This demonstration shows the use of the `CallableStatement` object. `CallableStatement`
    is an interface that extends `PreparedStatement`, which in turn extends the `Statement`
    interface. `CallableInterface` is used to execute stored procedures and functions
    in SQL.


    **Note:** There are some significant differences between stored procedures and
    functions. For example, in MySQL, a stored procedure can be used to return one
    or multiple values or no value, whereas a function always returns single value.
    Also, you can call a function directly with a SQL statement while you cannot do
    the same for a procedure. A stored procedure can have IN, OUT, INOUT parameters
    but a stored function can have only IN parameters by default. To make the example
    short and simple, in Demonstration 4 you’ll see the use of a small function only.'
