    ## 包装类


    在第 12 章中，你将熟悉泛型编程，这是 Java 中的一个高级概念。在那里，你会看到包装类的使用。在本节中，你将快速了解包装类的概览。


    在某些特殊情况下，你可能需要将基本类型转换为对象。例如，当你只需要在方法参数中传递一个对象时，这种转换就很有用。泛型编程也是如此。在这种情况下，你可能会记得一些集合类（如
    `Vector`）只能存储对象，而不能存储基本类型。包装类就是用于这些场景的（因为这些类将基本类型“包装”到相应的对象类型中）。在 Java 中，包装类包含在
    `java.lang` 包中。Java 为每种基本类型都提供了包装类。表 3-1 展示了与基本类型对应的包装类。


    表 3-1


    基本类型的包装类


    | 基本类型 | 包装类 |

    | --- | --- |

    | boolean | Boolean |

    | int | Integer |

    | double | Double |

    | float | Float |

    | long | Long |

    | char | Char |

    | byte | Byte |

    | short | Short |


    以下代码片段展示了包装类的一个简单用例。这里，一个基本类型 `int myInt` 被转换为一个 `Integer` 对象 `intOb`，随后你又从 `Integer`
    对象中取回了 `int`：


    ```

    int myInt1=1;

    //将基本类型 int 转换为 Integer 对象

    Integer intOb=new Integer(i);

    //从 Integer 对象转换回基本类型 int

    int myInt2=intOb.intValue();

    ```


    类似的转换也可以从 `double` 到 `Double`、`long` 到 `Long` 等（反之亦然）。但你必须使用适当的方法。例如，对于 `int`，你使用了
    `intOb.intValue()`。类似地，对于 `double`，你可以使用 `doubleOb.doubleValue()`；对于 `long`，可以使用
    `longOb.longValue()`，其中 `doubleOb` 是一个 `Double` 对象，`longOb` 是一个 `Long` 对象。


    ### 演示 7


    本演示展示了包装类的一些常见用例。程序非常简单，但你可以参考相关的注释以获得更好的理解。


    ```

    package java2e.chapter3;

    class Demonstration7 {

    public static void main(String[] args) {

    System.out.println("***Demonstration7.探索包装类.***\n");

    int myInt1 = 1;

    // 将基本类型 int 转换为 Integer 对象

    Integer intOb = new Integer(myInt1);

    // 从 Integer 对象转换回基本类型 int

    int myInt2 = intOb.intValue();

    System.out.println("myInt2=" + myInt2);

    long myLong1 = 1234567890123L;

    // 将基本类型 long 转换为 Long 对象

    Long longOb = new Long(myLong1);

    // 从 Long 对象转换回基本类型 long

    long myLong2 = longOb.longValue();

    System.out.println("long2=" + myLong2);

    // 将基本类型 int 转换为 String 对象

    String myString1 = Integer.toString(myInt1);

    System.out.println("myString=" + myString1);

    String myString2 = "5.7";

    // 将 String 对象转换为基本类型

    Double doubleOb = Double.valueOf(myString2);

    double myDouble = doubleOb.doubleValue();

    System.out.println("myDouble=" + myDouble);

    //将数字字符串转换为基本类型 int

    int myInt3=Integer.parseInt("125");

    System.out.println("myInt3=" + myInt3);

    //以下代码行将导致运行时错误 //(NumberFormatException)，因为你无法将 "Hello" 转换为 int

    //int myInt4=Integer.parseInt("Hello");

    //System.out.println("myInt4=" + myInt4);

    }

    }

    ```


    输出：


    ```

    ***Demonstration7.探索包装类.***

    myInt2=1

    long2=1234567890123

    myString=1

    myDouble=5.7

    myInt3=125

    ```


    ### 注意


    将基本类型转换为相应[包装类](https://www.geeksforgeeks.org/wrapper-classes-java/)对象的过程称为自动装箱。例如，`int`
    到 `Integer`、`double` 到 `Double`、`float` 到 `Float` 等。反向过程称为拆箱。同样重要的是要注意，构造函数 `Interger(int)`
    和 `Long(long)` 自 Java 9 起已被弃用。但为了理解一些遗留代码，它们仍然很重要。


    ## 垃圾回收


    到目前为止，你一直在实例化对象。但我还没有讨论通过删除对象来释放内存。如果你熟悉 **C++**，你可能知道在 C++ 中，程序员需要使用 `delete`
    关键字来释放对象占用的内存。如果你没有正确释放内存，就会看到内存泄漏的影响，这可能导致应用程序崩溃。


    Java 中没有这样的关键字。JVM 使用一个后台线程（通常称为垃圾回收器）来检测未使用的对象并释放它们占用的内存。这种技术称为垃圾回收（GC）。


    ### 注意


    不同的 Java 运行时系统可能采用不同的垃圾回收方法，但如前所述，在编写应用程序时你无需担心这一点。


    GC 最大的优点是通常你不需要担心内存泄漏，因为你可以依赖自动垃圾回收技术。但在某些特殊情况下，你可能需要显式地释放内存以避免内存泄漏，因为垃圾回收器由于某些原因无法检测到这些特殊场景。


    需要记住的基本点是，当一个对象无法从根对象（根对象是对象树中的根）到达时，该对象就有资格进行垃圾回收。一个对象可以有多个引用指向它。理解这一点也很重要：当引用计数为零时，该对象才会被垃圾回收；这是一个常见的误解。此外，如果两个对象之间存在连接，它们也可以被垃圾回收。但如果这种连接进一步连接到根对象，那么这两个对象就不会被垃圾回收。问答
    3.11 将展示根对象的一些要点。

