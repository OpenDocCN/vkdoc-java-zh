    # 6. Abstract Classes and Interfaces: The True Art in OOP


    In the previous chapter, you learned that method overriding can help you to achieve
    runtime polymorphism. In this chapter, you will further explore the concept with
    two powerful techniques—abstract classes and interfaces. In addition to this,
    you will also learn how interfaces can help you to implement the concept of multiple
    inheritance in Java. Once you master these concepts, you can make your program
    super flexible. Let’s start with abstract classes.


    ## Abstract Classes


    Sometimes you start a work, but you may not complete it, and then you expect that
    someone else will carry out the incomplete work. A real-life example can be seen
    in the case of property purchases and remodeling a house. For example, you may
    notice that a grandparent bought a property, and then parents constructed a house
    on that property, and later a grandchild made the house bigger or redecorated
    the old house. The basic idea is the same: you may want someone to continue and
    complete the incomplete work. You give them freedom so that upon completion they
    can remodel the existing architecture per their needs. The concept of an abstract
    class best suits in similar scenarios in the programming world.


    These are incomplete classes, and you cannot instantiate objects from them. The
    derived class of an abstract class needs to complete the “incomplete portion”
    first. It can also redefine the parent class method (by overriding).


    In general, if a class contains at least one incomplete method (in programming
    terms, one abstract method), the class itself is an abstract class. The term *abstract
    method* tells you that the method has a declaration (or signature) but no implementation.
    In other words, you can think of abstract members as virtual members without a
    default implementation.


    ### Point To Remember


    A class that contains at least one abstract method must be marked as an abstract
    class.


    The subclass must finish the incomplete task; that is, a subclass needs to provide
    the complete method body for the abstract method, but if it fails to provide that,
    the subclass itself will be marked as another abstract class.


    This kind of coding is very useful when a super class wants to define a generalized
    form that will be shared by its subclasses. It simply passes the responsibility
    of filling in the details to its subclasses.


    Let’s start with a simple demonstration.


    ### Demonstration 1


    In the following program, the class `MyAbstractClass` is an abstract class because
    it has an abstract method, `showMe()`.


    `MyConcreteClass` is a derived class of `MyAbstractClass` and gives the complete
    implementation of the method `showMe()`. So, `MyConcreteClass` is not abstract.


    ```

    package java2e.chapter6;

    abstract class MyAbstractClass {

    public abstract void showMe();

    }

    class MyConcreteClass extends MyAbstractClass {

    @Override

    public void showMe() {

    System.out.println("MyConcreteClass.showMe()");

    System.out.println("I am supplying the method body for showMe()");

    }

    }

    class Demonstration1 {

    public static void main(String Args[]) {

    System.out.println("***Demonstration-1.Abstract class example.***\n");

    // Error:Cannot instantiate from MyAbstractClass

    //MyAbstractClass abstractOb=new MyAbstractClass();

    MyConcreteClass concreteOb = new MyConcreteClass();

    concreteOb.showMe();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-1.Abstract class example.***

    MyConcreteClass.showMe()

    I am supplying the method body for showMe()

    ```


    It is important to note that an abstract class can also contain concrete methods.
    The derived class may or may not override those methods. Let’s examine this in
    Demonstration 2.


    ### Demonstration 2


    In this program, the class `AbstractClass` is an abstract class because it has
    an abstract method, `showMe()`. But this class also contains two concrete methods:
    `completeMethod1()` and `completeMethod2()`.


    `ConcreteClass` is a derived class of `AbstractClass` and gives the complete implementation
    of the method `showMe()`. So, `ConcreteClass` is not abstract. Following the inheritance
    hierarchy, it has access to other parent methods—`completeMethod1()` and `completeMethod2()`.
    But it modified the parent method `completeMethod1()` and provides its own implementation.


    Lastly, you may notice the presence of the integer variable `myInt` in `AbstractClass`.
    This field is accessed from the method `showMe()` in `ConcreteClass`.


    ```

    package java2e.chapter6;

    abstract class AbstractClass {

    protected int myInt = 25;

    public abstract void showMe();

    public void completeMethod1() {

    System.out.println("I am from completeMethod1 in MyAbstractClass and I am complete.");

    }

    public void completeMethod2() {

    System.out.println("I''m the initial version of completeMethod2() in MyAbstractClass.I
    am complete.");

    }

    }

    class ConcreteClass extends AbstractClass {

    @Override

    public void showMe() {

    System.out.println("ConcreteClass-showMe().I''m complete.");

    System.out.println("The value of myInt is:" + myInt);

    }

    @Override

    // It wants to override completeMethod1() in MyAbstractClass

    public void completeMethod1() {

    System.out.println("ConcreteClass-completeMethod1().");

    }

    }

    class Demonstration2 {

    public static void main(String Args[]) {

    System.out.println("***Demonstration-2.Abstract classes can have concrete methods
    and fields.***\n");

    ConcreteClass concreteOb = new ConcreteClass();

    concreteOb.showMe();

    // It will show that completeMethod1 is redefined in ConcreteClass.

    concreteOb.completeMethod1();

    // It will show the details of completeMethod2 defined in AbstractClass.

    concreteOb.completeMethod2();

    System.out.println("\n**Invoking methods through parent class reference now.**");

    AbstractClass abstractRef = new ConcreteClass();

    abstractRef.showMe();

    abstractRef.completeMethod1();

    abstractRef.completeMethod2();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-2.Abstract classes can have concrete methods and fields.***

    ConcreteClass-showMe().I''m complete.

    The value of myInt is:25

    ConcreteClass-completeMethod1().

    I''m the initial version of completeMethod2() in MyAbstractClass.I am complete.

    **Invoking methods through parent class reference now.**

    ConcreteClass-showMe().I''m complete.

    The value of myInt is:25

    ConcreteClass-completeMethod1().

    I''m the initial version of completeMethod2() in MyAbstractClass.I am complete.

    ```


    In Chapter [5](#433474_2_En_5_Chapter.xhtml), you learned that a parent class
    reference can point to a child class object. Following the same rule, you can
    use the abstract class reference to point to the complete child class objects,
    and then you can invoke the associated methods. Remember that you can get a significant
    benefit from this kind of coding.'
