    The presence of `static` keyword cannot ensure method overloading


    The concept of method overloading works fine if the method signatures are different.
    In this case, the inclusion of a `static` keyword before a method name is not
    considered a different signature. You can also explain this behavior from a different
    perspective. For example, you know that Java allows you to call a static method
    through objects. Now, in a case like this, if you have another non-static method
    with the same signature, the Java compiler will be confused as to which one to
