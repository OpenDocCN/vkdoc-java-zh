    ## Passing Variable-Length Arguments to Methods


    You can pass a variable number of arguments in your method. This concept was introduced
    in Java 5. It is often referred to as varargs (short name for variable-length
    arguments). A method that can accept variable-length arguments is also termed
    a vararg method (or, variable-arity method).


    In Java, you need to put three dots/periods (`...`) (as shown in `sum()` method
    in Demonstration 6) to be able to use a vararg method. `Demonstration6` shows
    such an usage.


    ### Demonstration 6


    Consider the following example.


    ```

    package java2e.chapter2;

    class ClassEx6 {

    // The following method supports variable-length arguments

    public int sum(int... vararg) {

    System.out.println("You have passed " + vararg.length + " arguments now.");

    int total = 0;

    for (int i : vararg) {

    total = total + i;

    }

    return total;

    }

    }

    class Demonstration6 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-6\. Methods with variable-length argument
    demo ***\n");

    ClassEx6 ob = new ClassEx6();

    int resultOfSummation = ob.sum(57, 63);

    System.out.println("Sum of 57 and 63 is : " + resultOfSummation);

    resultOfSummation = ob.sum(57, 63, 50);

    System.out.println("Sum of 57, 63 and 70 is : " + resultOfSummation);

    resultOfSummation = ob.sum(57, 63, 50, 70);

    System.out.println("Sum of 57, 63, 50 and 70 is : " + resultOfSummation);

    }

    }

    ```


    Output:


    ```

    ***Demonstration-6\. Methods with variable-length argument demo ***

