    \ was encountered in the previous example.\n\n```\npackage java2e.chapter10;\n\
    public class Demonstration2 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    ***Demonstration-2.Exploring Exceptions-Demonstration1 is modified.***\");\nint\
    \ a = 100, b = 2, result;\nb -= 2;// b beomes 0\ntry {\nresult = a / b;\nSystem.out.println(\"\
    \ So, the result of a/b is : \" + result);\n} catch (Exception ex) {\nSystem.out.println(\"\
    Encountered an exception \" + ex.getMessage());\nSystem.out.print(\"Here is the\
    \ stack trace:\");\nex.printStackTrace();\n} finally {\nSystem.out.println(\"\
    I am in finally. You cannot skip me!\");\n}\n}\n}\n```\n\nOutput:\n\n```\n***Demonstration-2.Exploring\
    \ Exceptions-Demonstration1 is modified.***\nEncountered an exception / by zero\n\
    Here is the stack trace:java.lang.ArithmeticException: / by zero\nI am in finally.\
    \ You cannot skip me!\nat java2e.chapter10.Demonstration2.main(Demonstration2.java:10)\n\
    ```\n\nYou can confirm the following points from the output of the program:\n\n\
