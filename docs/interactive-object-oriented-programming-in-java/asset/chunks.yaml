    The biggest advantage of GC is that normally you do not need to worry about memory
    leaks, because you can rely on the automatic garbage-collection technique. But
    in some special cases, you may explicitly need to free up memory to avoid memory
    leaks, because the garbage collector is for some reason unable to detect those
    special scenarios.


    The basic thing to remember is that when an object is unreachable from a root
    object (a root object is a root in an object tree), the object is eligible for
    garbage collection. An object can have multiple references to it. It is also important
    to understand that when the reference count is zero, only the object will be garbage
    collected; this is a common misunderstanding. Also, two objects can be garbage
    collected if there is a connection between them. But if such a connection is further
    connected to a root object, those two objects will not be garbage collected. Q&A
    3.11 will show some highlights of root objects.'
