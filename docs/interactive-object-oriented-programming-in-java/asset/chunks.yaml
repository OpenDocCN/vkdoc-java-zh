    Vehicle` 语法只是帮助编译器匹配类型 `Vehicle` 或 `Vehicle` 的任何子类型。这就是为什么我们说，当你在通配符中使用 `extends`
    子句时，它设置了一个上界。


    ### 要点记忆


    需要注意的是，此处的 `extends` 是广义上的使用，既可以表示类中的 extends，也可以表示接口中的 implements。


    ### 下界通配符


    你刚刚了解到，当你在方法参数中使用表达式 `<? extends Vehicle>` 时，你可以为 `Vehicle` 类或其任何子类调用该方法。因此，这里的
    `Vehicle` 类充当了上界。类似地，当你使用表达式 `<? super Vehicle>` 时，你可以设置通配符的下界。在这种情况下，可接受的参数是
    `Vehicle` 及其超类。因此，你可以将表达式 `<? super T>` 大致解释为“类 `T` 或 `T` 的任何超类”。

