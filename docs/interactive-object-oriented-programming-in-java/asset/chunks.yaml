    respective `catch` or `finally` block. The remaining part of the `try` block will
    not execute.


    *   Exceptions follow the inheritance hierarchy. So, it is important to remember
    the hierarchy, shown in Figure [10-2](#433474_2_En_10_Chapter.xhtml#Fig2).


    ![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig2_HTML.jpg](images/433474_2_En_10_Chapter/433474_2_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Exception hierarchy


    *   You can see that both the `Exception` class and the `Error` class are subclasses
    of the `Throwable` class, which in turn derives from `Object` (in the `java.lang`
    package). By other exceptions, I mean classes like `IOException` (already defined
    in Java), our own custom exception classes (not defined in Java), and so on. So,
    you can simply say that in Java, the `Throwable` class is the ultimate super class
    of all errors and exceptions.


    *   Exceptions are broadly categorized into two types: **checked** and **unchecked**
    . The runtime exception classes (`RuntimeException` class and its subclasses)
    and error classes (`Error` class and its subclasses) fall into the category of
    unchecked exceptions, and the others remaining are called checked exceptions.
    You’ll see a detailed discussion of each category shortly, and Q&A 10.8 will summarize
    the details.


    *   This chapter primarily focuses on runtime exceptions. Errors, in general,
    are caused by some catastrophic failures, like JVM being out of memory, stack
    overflow, and so on. You can hardly do anything with them. The Java runtime environment
    itself needs to take care of these severe situations.


    *   When you create your custom exception classes, in general, you’ll subclass
    from the `Exception` class. But it is not a rule. So, in Demonstration 7, you’ll
    see that a custom exception class extends from the `Throwable` class, and in Demonstration
    8, you will notice that a custom exception class inherits from the `RuntimeException`
    class.


    *   You should order the `catch` blocks from most specific to most general. Otherwise,
    you will encounter compile-time errors. For example, suppose you have placed a
    `catch` block (say, `catch block1`) that can handle a parent-class exception before
    a `catch` block (say `catch block2`) that can handle only the derived-class exception.
    From the compiler’s point of view, it is an example of unreachable code, because
    in this case catch `block1` is always capable of handling the exceptions that
    catch `block2` can handle. Therefore, control does not need to reach `catch block2`
    at all. You will examine this scenario in an upcoming example.


    *   You can use any of these combinations: `try`-`catch`, `try`-`catch`-`finally`,
    or `try`-`finally`.


    *   The Java runtime system can generate exceptions. At the same time, you can
    also create your own exception class and throw your own exception.


    *   If you do not handle exceptions, a default handler of the Java runtime system
    will handle it on your behalf, and the program may die prematurely.


    ### Points To Remember


    *   In Java, the `Throwable` class is the ultimate super class of all errors and
    exceptions.


    *   In an exception-handling mechanism, there is a key difference between Java
    and C#. There is no concept of the `throws` keyword in C#. This is a hot topic
    of debate.'
