  trans: '

    您的 Java 应用程序可以使用 JDBC（Java 标准 API）与数据库通信。它为您提供了连接关系型数据库所需的接口。在将数据库与 Java 应用程序连接的场景中，专业程序员可能更倾向于使用
    JPA、Hibernate 等替代方案。但本章专门介绍 JDBC，因为它有其自身的重要性和实用性。要进行 JDBC 编程练习，您需要熟悉以下概念：


    *   什么是数据库，它如何帮助您存储或组织数据？

    *   如何连接数据库？

    *   您的 Java 应用程序如何与数据库通信？（或者，您如何建立与数据库的连接，然后如何在数据库中插入、更新或删除记录？）


    您很快就会了解到，您的 Java 程序将使用支持某些 JDBC 驱动程序的 JDBC API 来连接数据库。图 13-1 展示了应用程序（您的 Java 程序）和数据库通过
    JDBC 驱动程序连接的整个过程的简化视图。


    ![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig1_HTML.jpg](img/433474_2_En_13_Fig1_HTML.jpg)


    图 13-1

    JDBC 可以连接 Java 应用程序和数据库（例如 MySQL）


    那么，让我们在本章中逐一审视这些部分。


    注意

    如果您是数据库编程的绝对新手，可能需要了解本章中简要提及的一些关键术语。因此，建议您反复查阅这些术语和定义，以便更好地理解。渐渐地，这些术语会变得清晰，您将能够执行复杂的数据库编程。


    数据库与 DBMS

    **数据库** 是相关文件的集合，通常称为表。**表** 是相关记录的集合。**记录** 是相关字段的集合，文件中最小且有意义的的信息单元称为**字段**（或数据项）。

    **数据库管理系统**（DBMS）是有效管理这些数据的软件包。Oracle Database、SQL Server、MySQL、MS-Access 等是一些常用的
    DBMS 软件包。


    DBMS 的类型


    DBMS 有多种类型，例如：


    *   层次型 DBMS（HDBMS）

    *   网状型 DBMS（NDBMS）

    *   关系型 DBMS（RDBMS）

    *   面向对象数据库（OODB）

    *   分布式 DBMS（DDBMS）


    每种类型都有其优缺点。选择哪种数据库取决于您的需求。根据您的需求，您可能更倾向于选择 NoSQL（它是一种非关系型结构，可能适用于 DDBMS），而不是选择
    SQL 数据结构（适用于 RDBMS）。在本章中，您将只看到 RDBMS 和简单 SQL 语句的使用。


    RDBMS

    在 RDBMS 中，数据以行和列的形式存储，类似于表格。这些表被称为**关系**。表中的行被称为**元组**，列被称为**属性**。

    表中的每一行包含一条记录。每一列包含字段。请参考图 13-2 中的表格。


    为了方便您参考，我在图 13-2 中标记了所有记录和属性。


    ![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig2_HTML.jpg](img/433474_2_En_13_Fig2_HTML.jpg)


    图 13-2

    RDBMS 中的示例表。


    您可以根据某种数学公式处理关系中的不同记录，这被称为**关系代数**。由于整个数据库都可以使用这些数学公式进行处理，因此关系代数是关系数据库和 SQL 的理论基础。

    Oracle Database、MySQL、Microsoft SQL Server、IBM DB2 等是 RDBMS 的常见示例。在本章中，我使用 MySQL
    来演示示例。


    注意

    在附录 C 中，我展示了在 Win10 机器上安装 MySQL 的步骤。


    SQL


    SQL 的全称是结构化查询语言。它是一种非常流行且广泛使用的 RDBMS 语言。它是一种类似英语的语言，被认为是第四代语言。创建数据、更新数据、读取数据和删除数据是
    SQL 最常见的操作。在 Java 中，您将看到使用 `java.sql` 包，该包包含支持数据库编程（通常使用关系型数据库）的 API。该 API 支持许多操作，其中一些如下：


    *   通过 `DriverManager` 工具建立与数据库的连接。`DriverManager` 类和 `Driver` 接口常用于编程的这一部分。

    *   通过 SQL 语句与数据库通信。您通常会使用 `Connection` 接口、`Statement`、`PreparedStatement` 和 `CallableStatement`
    来完成编程的这一部分。您将在演示 1 和演示 2 中看到 `Statement` 的使用。演示 3 将展示 `PreparedStatement` 的使用，演示
    4 将展示 `CallableStatement` 的使用。

    *   通过 `ResultSet` 接口处理通过不同查询获得的结果。


    在本章中，您将看到 Java 程序与 MySQL 数据库交互时这些基本操作的使用。


    要点记忆


    *   Java、C++、C 等是第三代语言（3GL）。在 3GL 中，重点是“如何解决问题？”，而在 4GL 中，重点是“你想要什么？”。但一些高级的 3GL
    可以结合 4GL 的一些重要方面。

    *   需要注意的是，SQL 不区分大小写字符集。

    *   JDBC 是一个 SQL 级别的 API。它允许您在 Java API 调用中构造和组合 SQL 语句。


    注意

    本章使用简单的 SQL 语句来演示各种程序。如果您是 SQL 的绝对新手，建议您先在您偏好的数据库中使用简单的 SQL 语句进行练习，以便在继续学习之前有更好的理解。


    连接数据库


    您可以通过不同的驱动程序连接到数据库。JDBC API 支持这些驱动程序。JDBC 驱动程序是一种软件组件，驻留在客户端机器上，帮助 Java 程序与 DBMS
    通信；即，它充当适配器。有四种不同类型的 JDBC 驱动程序，如下所示：


    *   **类型 1（或 JDBC-ODBC 桥接）驱动程序**：它将 JDBC 方法调用转换为 ODBC 函数调用。ODBC 桥接驱动程序必须安装在客户端机器上。在这里，JDBC
    驱动程序可以与可能不是用 Java 编写的第三方 API 通信。此外，类型 1 驱动程序不是用 Java 编写的，因此它们不可移植。这些驱动程序仅适用于本地连接。Oracle
    从 Java 8 开始停止支持这些驱动程序。他们现在建议您使用特定数据库供应商提供的 JDBC 驱动程序。


    *   **类型 2（或本地 API）驱动程序**：这些驱动程序使用数据库的客户端库，以便它们可以将 JDBC 方法调用转换为数据库 API 的本地调用。它是一种部分
    Java 驱动程序。由于本地驱动程序和客户端库都驻留在本地机器上，因此这些驱动程序不用于远程网络连接。但它们可以提供比类型 1 驱动程序更好的性能。

