    Consider the following non-generic program and the output.


    ```

    package java2e.chapter12;

    class MyNonGenericClass {

    public int showInteger(int i) {

    return i;

    }

    public String showString(String s1) {

    return s1;

    }

    }

    class Demonstration1 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-1.A non-generic program example***");

    MyNonGenericClass nonGenericOb = new MyNonGenericClass();

    System.out.println("showInteger returns : " + nonGenericOb.showInteger(25));

    System.out.println("showString returns : " + nonGenericOb.showString("A non-generic
    method is called."));

    }

    }

    ```


    Output:


    ```

    ***Demonstration-1.A non-generic program example***

    showInteger returns : 25

    showString returns : A non-generic method is called.

    ```


    Now, consider a generic program. Before you start, go through the following points
    about generic programming in Java:


    - In generic programming, you are actually dealing with parameterized types. You
    will often notice the use of generic classes, generic interfaces, or generic methods
    in a generic program.

    - Angle brackets `<>` are used to create generic types.

    - In your generic program, you can define a class with placeholders for the type
    of its methods, fields, parameters, etc. At a later stage, these placeholders
    are replaced with the particular type.

    - Prior to JDK5, there was no concept of generic programming in Java. So, in earlier
    days, to make a generalized class, interface, or method, programmers needed to
    consider the `Object` class. Since the `Object` class is the ultimate super class,
    an object reference can refer to any subtype object. So, casting was often required
    to get back the actual type. As a result, type-safety was a big concern prior
    to the generics era.

    - JLS11 says that “it is a compile-time error if a generic class is a direct or
    indirect subclass of `Throwable`.” This restriction is important because JVM’s
    catch mechanism is compatible only with non-generic classes.

    - Experts often suggest the use of generic programming instead of its non-generic
    counterpart.


    Let’s start with the following program.


    ### Demonstration 2


    Go through the associated comments for a better understanding of the code.


    ```

    package java2e.chapter12;

    //A generic class

    //T is a type parameter.It will be replaced by the real type when you //initialize
    the actual object.

    class MyGenericClass {

    // A generic method

    // The following method''s return type is T. It also accepts

    // a T type argument.

    public T show(T value) {

    return value;

    }

    }

    public class Demonstration2 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-2.A generic program example***");

    // Creating a MyGenericClass type object.

    MyGenericClass myGenericClassIntOb = new MyGenericClass();

    System.out.println("The method show returns the integer value : " + myGenericClassIntOb.show(100));

    // Creating a MyGenericClass type object.

    MyGenericClass myGenericClassStringOb = new MyGenericClass();

    System.out.println("The method show returns the string value :

    "+ myGenericClassStringOb.show("A generic method is called."));

    // Creating a MyGenericClass type object.

    MyGenericClass myGenericClassDoubleOb = new MyGenericClass();

    System.out.println("The method show returns the double value : " + myGenericClassDoubleOb.show(100.5));

    }

    }

    ```


    Output:


    ```

    ***Demonstration-2.A generic program example***

    The method show returns the integer value : 100

    The method show returns the string value : A generic method is called.

    The method show returns the double value : 100.5

    ```


    Let’s now do a comparative analysis of Demonstration 1 and Demonstration 2. You
    have seen the following characteristics:


    - For non-generic methods, you need to specify methods like `showInteger()` and
    `showString()` to handle the particular data type. But in the generic version,
    the method `show()` is sufficient. In general, there are fewer lines of code in
    generic versions (i.e., code size is smaller).

    - Inside `main()` in Demonstration 1, you encounter a compile-time error if you
    add the following line of code (also shown in Figure [12-1](#433474_2_En_12_Chapter.xhtml#Fig1)):


    ```

    System.out.println("showDouble returns : " + nonGenericOb.showDouble(15.9));

    ```


    ![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig1_HTML.jpg](images/433474_2_En_12_Chapter/433474_2_En_12_Fig1_HTML.jpg)


    Figure 12-1


    A compile-time error in a non-generic program


    The error message is self-explanatory. You know that you did not define something
    like the `showDouble(double d)` method for the type `MyNonGenericClass`. To avoid
    this error, you may need to include an additional method in the class `MyNonGenericClass`,
    as follows (notice the method `showDouble()` in bold):


    ```

    class MyNonGenericClass {

    public int showInteger(int i) {

    return i;

    }

    public String showString(String s1) {

    return s1;

    }

    public double showDouble(double d) {

    return d;

    }

    }

    ```


    The code size of `MyNonGenericClass` is increased with this addition. You needed
    to increase the code size because you needed to process a different data type,
    `double`.


    Now, turn your attention to Demonstration 2, where you get the `double` data type
    without modifying `MyGenericClass`. As a result, you can conclude that the generic
    version is more flexible and may require fewer lines of code.


    Apart from this, consider another useful scenario. Suppose, in Demonstration 2,
    in the side `main()` method, you add one more line of code, like the following:


    ```

    myGenericClassIntOb.show(125.7);//Error

    ```


    You will receive a compile-time error now. This is because `myGenericIntOb` is
    of type `MyGenericClass<Integer>`, so the compiler can check whether you are properly
    passing an `Integer` argument in the `show()` method. In this way, you can promote
    type-safety in your code through generic programming.


    You may also wonder why I am not writing something like the following:


    ```

    System.out.println(myGenericClassIntOb.show(new Integer(100))); // Also ok but
    no additional benefit

    ```


    instead of


    ```

    System.out.println(myGenericClassIntOb.show(100));

    ```


    It is because Java can perform the autoboxing to encapsulate from an `int` to
    the corresponding wrapper class `Integer`.'
