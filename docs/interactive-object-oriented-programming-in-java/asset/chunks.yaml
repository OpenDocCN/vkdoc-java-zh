    你也可以将其用于方法。例如，考虑以下代码片段：


    ```

    class ParentClassTest4 {

    final public void showMe() {

    System.out.println("Inside Parent.showMe()");

    }

    }

    class ChildClassTest4 extends ParentClassTest4 {

    public void showMe() { // error

    System.out.println("Inside Parent.showMe()");

    }

    }

    ```


