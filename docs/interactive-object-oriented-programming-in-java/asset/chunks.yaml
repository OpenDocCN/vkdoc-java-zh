    **14.2 我可以使用此特性关闭多个资源吗？**


    可以。以下是一个示例语法，其中使用了两个资源：


    ```

    try(Resource1 resource1 = new Resource1();Resource2 resource2 = new Resource2())  {

    //Some code

    }

    ```


