    *   `run()`


    *   `start()`


    *   `setPriority(int number)`


    *   `getPriority()`


    *   `currentThread()`


    *   `getName()`


    *   `setName()`


    Let’s do a case study with a few more methods in the `Thread` class. In the following
    demonstration, you will see the use of the following methods:


    *   `sleep(long millis)`: This causes a specified thread to sleep. You can use
    it when you want to cease a thread’s execution temporarily. The argument is passed
    in milliseconds. This method can throw `InterruptedException` or `IllegalArgumentException`
    (if you pass negative milliseconds values or if the value is not in the range
    of 0–999999). So, you need to surround this method with a try/catch block .


    *   `yield()`: This can be used when you want a thread (which is currently using
    the processor) to give up its control to a different thread (though the scheduler
    can ignore this request). This method can be used for debugging purposes or for
    designing concurrency control constructs. It is also helpful to reproduce a bug
    in the race conditions.


    *   `interrupt()`: This method can be used to send an interrupt signal to a thread.


    ### Demonstration 4


    Consider the following demonstration and output, which is self-explanatory if
    you follow the prior theories:


    ```

    package java2e.chapter11;

    class Thread4A extends Thread {

    public void run() {

    for (int i = 0; i " + i);

    if (i == 2) {

    System.out.println("Going to interrupt the thread.");

    interrupt();// Interrupts this thread

    System.out.println("Is Thread4A interrupted?"+this.interrupted());

    }

    }

    System.out.println("Exit-Thread4A");

    }

    }

    class Thread4B extends Thread {

    public void run(){

    for (int j = 0; j " + j);

    if (j == 3) {

    try {

    sleep(5000);//sleeps for 5000 milliseconds

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    }

    System.out.println("Exit-Thread4B");

    }

    }

    class Thread4C extends Thread {

    public void run() {

    for (int k = 0; k " + k);

    if(k==4) {

    yield();

    }

    }

    System.out.println("Exit-Thread4C");

    }

    }

    class Demonstration4 {

    public static void main(String[] args) throws InterruptedException {

    System.out.println("***Demonstration-4.Exploring multi-threading with yield(),sleep(),
    and interrupt() methods of the Thread class.***");

    Thread4A thread4A=new Thread4A();

    Thread4B thread4B=new Thread4B();

    Thread4C thread4C=new Thread4C();

    thread4A.start();

    thread4B.start();

    thread4C.start();

    System.out.println("Is Thread4A interrupted now?"+thread4A.interrupted());

    Thread.sleep(1000);

    System.out.println("Exit-main()");

    }

    }

    ```


