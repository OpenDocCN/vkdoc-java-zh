    ### Q&A Session


    **11.5 In previous demonstrations, I saw that the main thread finishes before
    the child threads. But in many cases, I want to avoid this. In such a case, how
    should I proceed?**


    The `sleep()` method can help you, but it is not an ideal solution. The much better
    solution is to use the `join()` method (which has different overloaded versions).
    Here, I present an updated version of the `main()` method for Demonstration 4
    (notice the bold lines). Once you execute this, you will notice that main always
    finishes at the end.


    ```

    class Demonstration4 {

    public static void main(String[] args) throws InterruptedException {

    System.out.println("***Demonstration-4.Exploring multi-threading with yield(),sleep(),
    and interrupt() methods of the Thread class.***");

    Thread4A thread4A = new Thread4A();

    Thread4B thread4B = new Thread4B();

    Thread4C thread4C = new Thread4C();

    thread4A.start();

    thread4B.start();

    thread4C.start();

    System.out.println("Is Thread4A interrupted now?" + thread4A.interrupted());

    Thread.currentThread().sleep(1000);

    //Modified program to show the use of join()

    //Waiting for the threads to complete before main //thread.

    thread4A.join();

    thread4B.join();

    thread4C.join();

    System.out.println("Exit-main()");

    }

    }

    ```


    Here is the modified output. Notice that `Exit-main()` comes at the end.


    ```

    ***Demonstration-4.Exploring multi-threading with yield(),sleep(), and interrupt()
    methods of the Thread class.***

    Thread4B prints ->0

    Thread4C prints ->0

    Thread4C prints ->1

    Thread4C prints ->2

    Thread4A prints ->0

    Thread4A prints ->1

    Is Thread4A interrupted now?false

    Thread4A prints ->2

    Going to interrupt the thread

    Thread4C prints ->3

    Thread4B prints ->1

    Thread4B prints ->2

    Thread4B prints ->3

    Thread4C prints ->4

    Is Thread4A interrupted?true

    Thread4A prints ->3

    Thread4A prints ->4

    Exit-Thread4A

    Exit-Thread4C

    Thread4B prints ->4

    Exit-Thread4B

    Exit-main()

    ```'
