- fmt: '### Points To Remember


    In generic programming, `<T extends YourSuperClass>` says that `T` can be replaced
    by either `YourSuperClass` or *any subclass of* `YourSuperClass`. This approach
    helps you to provide an inclusive upper bound. Using this approach, you are promoting
    type safety in your program.


    It should be noted that, like wildcards, `extends` in this context is used in
    a general sense, which means it either extends the class or implements the interface.


    You can use both the class type and the interface type as bounds. But there is
    an important restriction. You may remember that in Java programming, your class
    can extend from another class, and it can implement multiple interfaces. The same
    rule applies here. At the same time, you also need to mention class type before
    the interface type(s). When you create a bound with a class type and the interface
    type(s), you use the `&` operator, as follows:


    ```

