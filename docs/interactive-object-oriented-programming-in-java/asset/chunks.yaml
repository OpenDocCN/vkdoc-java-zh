  trans: "\n### 问答环节\n\n**11.1 使用多线程环境相比单线程环境的关键优势是什么？**\n\n在单线程环境中，如果线程被阻塞，整个程序就会停止执行，而在多线程环境中则不会出现这种情况。除此之外，你还可以通过高效利用\
    \ CPU 来减少总体空闲时间。稍后你将了解到，在多线程环境中可以避免轮询。\n\n**11.2 我有一台双核（或多核）系统。多线程还能帮到我吗？**\n\n\
    早期，大多数计算机只有一个核心，在这些系统中，并发线程实际上共享 CPU 时间片；也就是说，它们无法并行运行。但是，通过使用多线程的概念，你可以通过高效利用\
    \ CPU 来减少总体空闲时间。如果你有多个处理器，则可以并发运行多个线程。因此，你可以进一步提高程序的速度。\n\n**11.3 什么是上下文切换？**\n\
    \n它使你能够保存当前线程（或进程）的状态，以便稍后可以从该点恢复执行。\n\n**11.4 创建线程时应该使用哪种方法？我应该继承** **Thread**\
    \ **类，还是应该实现** **Runnable** **接口？**\n\n这取决于你的选择以及许多其他约束条件。如果你的类继承了 `Thread` 类，则无法再继承任何其他类，因为\
    \ Java 不允许通过类进行多重继承。当你实现 `Runnable` 接口时，你可以继承另一个父类。\n\n另一方面，`Runnable` 接口只有一个方法\
    \ `run()`，它也是一个抽象方法（根据接口定义）。因此，没有完全内置的方法可供你直接使用。但是 `Thread` 类有许多内置方法，例如 `yield()`、`sleep()`、`getName()`、`setName()`\
    \ 等。如果你的类继承了 `Thread` 类，则可以使用这些方法。此外，在实例化 `Thread` 类时，你可以使用不同类型的构造函数。\n\n### 演示\
    \ 3\n\n现在考虑演示 3。在继续之前，这里有一些重要的点需要考虑：\n\n*   这次我使用了 `Thread` 类构造函数的重载版本来创建线程。在这个版本中，我可以在线程实例化期间提供线程的名称。\n\
    \n*   我还使用了 `Thread` 类中的一些可用方法；例如，`currentThread()`、`getName()`、`setName()`、`getPriority()`\
    \ 和 `setPriority()`。如前所述，如果你选择通过实现 `Runnable` 接口来创建线程，这些方法将不可用。\n\n*   方法 `setPriority(int\
    \ newPriority)` 用于设置线程的优先级。Java 定义了以下优先级：\n\n```\n    //线程的最小优先级\n    public final\
    \ static int MIN_PRIORITY = 1;\n    //线程的默认优先级\n    public final static int NORM_PRIORITY\
    \ = 5;\n    ```\n\n```\n//线程的最大优先级\npublic final static int MAX_PRIORITY = 10;\n\
    ```\n\n以下是完整的实现：\n\n```\npackage java2e.chapter11;\nclass Thread3A extends Thread\
    \ {\npublic Thread3A(String name) {\nsuper(name);\n}\npublic void run() {\nfor\
    \ (int i = 0; i < 10; i++) {\nSystem.out.println(this.getName() + \" is executing\
    \ and prints : \"+ i);\n}\nSystem.out.println(\"Exit-\"+ this.getName());\n}\n\
    }\nclass Thread3B extends Thread {\npublic Thread3B(String name) {\nsuper(name);\n\
    }\npublic void run() {\nfor (int i = 0; i < 10; i++) {\nSystem.out.println(this.getName()\
    \ + \" is executing.It is printing : \"+i);\n}\nSystem.out.println(\"Exit-\"+\
    \ this.getName());\n}\n}\nclass Demonstration3 {\npublic static void main(String[]\
    \ args) throws InterruptedException {\nSystem.out.println(\"***Demonstration-3.Exploring\
    \ multithreading by extending Thread class.***\");\n// 获取主线程的引用\nThread mainThread\
    \ = Thread.currentThread();\n// 获取主线程的详细信息\nSystem.out.println(\"Current thread:\
    \ \" + mainThread.getName() + \" and priority: \" +mainThread.getPriority());\n\
    Thread3A thread3A = new Thread3A(\"Thread3A\");\nthread3A.setPriority(Thread.MIN_PRIORITY);//1\n\
    Thread3B thread3B = new Thread3B(\"Thread3B\");\n// 更新线程的名称-ThreadDemo4\nthread3B.setName(\"\
    ThreadDemonstration3B\");\nthread3B.setPriority(Thread.MAX_PRIORITY);//10\nSystem.out.println(\"\
    Thread3A priority is \" + thread3A.getPriority());\nSystem.out.println(\"ThreadDemonstration3B\
    \ priority is \" + thread3B.getPriority());\nthread3A.start();\nthread3B.start();\n\
    for (int i = 0; i <10; i++) {\nSystem.out.println( mainThread.getName() + \" is\
    \ executing and prints : \"+ i);\n}\nSystem.out.println(\"Exit main()\");\n}\n\
    }\n```\n\n以下是其中一种可能的输出。\n\n```\n***Demonstration-3.Exploring multi-threading by\
    \ extending Thread class.***\nCurrent thread: main and priority: 5\nThread3A priority\
    \ is 1\nThreadDemonstration3B priority is 10\nmain is executing and prints : 0\n\
    ThreadDemonstration3B is executing.It is printing : 0\nmain is executing and prints\
    \ : 1\nThreadDemonstration3B is executing.It is printing : 1\nmain is executing\
    \ and prints : 2\nThreadDemonstration3B is executing.It is printing : 2\nThread3A\
    \ is executing and prints : 0\nThreadDemonstration3B is executing.It is printing\
    \ : 3\nmain is executing and prints : 3\nmain is executing and prints : 4\nmain\
    \ is executing and prints : 5\nThread3A is executing and prints : 1\nThreadDemonstration3B\
    \ is executing.It is printing : 4\nThread3A is executing and prints : 2\nmain\
    \ is executing and prints : 6\nmain is executing and prints : 7\nmain is executing\
    \ and prints : 8\nmain is executing and prints : 9\nThread3A is executing and\
    \ prints : 3\nThreadDemonstration3B is executing.It is printing : 5\nThread3A\
    \ is executing and prints : 4\nExit main()\nThread3A is executing and prints :\
    \ 5\nThreadDemonstration3B is executing.It is printing : 6\nThreadDemonstration3B\
    \ is executing.It is printing : 7\nThreadDemonstration3B is executing.It is printing\
    \ : 8\nThreadDemonstration3B is executing.It is printing : 9\nThread3A is executing\
    \ and prints : 6\nExit-ThreadDemonstration3B\nThread3A is executing and prints\
    \ : 7\nThread3A is executing and prints : 8\nThread3A is executing and prints\
    \ : 9\nExit-Thread3A\n```\n\n以下是另一种可能的输出（在具有不同配置的另一台机器上执行）。\n\n```\n***Demonstration-3.Exploring\
    \ multi-threading by extending Thread class.***\nCurrent thread: main and priority:\
    \ 5\nThread3A priority is 1\nThreadDemonstration3B priority is 10\nmain is executing\
    \ and prints : 0\nThreadDemonstration3B is executing.It is printing : 0\nThreadDemonstration3B\
    \ is executing.It is printing : 1\nThreadDemonstration3B is executing.It is printing\
    \ : 2\nThreadDemonstration3B is executing.It is printing : 3\nThreadDemonstration3B\
    \ is executing.It is printing : 4\nThreadDemonstration3B is executing.It is printing\
    \ : 5\nThreadDemonstration3B is executing.It is printing : 6\nThreadDemonstration3B\
    \ is executing.It is printing : 7\nThreadDemonstration3B is executing.It is printing\
    \ : 8\nThreadDemonstration3B is executing.It is printing : 9\nExit-ThreadDemonstration3B\n\
    main is executing and prints : 1\nmain is executing and prints : 2\nmain is executing\
    \ and prints : 3\nmain is executing and prints : 4\nmain is executing and prints\
    \ : 5\nmain is executing and prints : 6\nmain is executing and prints : 7\nmain\
    \ is executing and prints : 8\nmain is executing and prints : 9\nExit main()\n\
    Thread3A is executing and prints : 0\nThread3A is executing and prints : 1\nThread3A\
    \ is executing and prints : 2\nThread3A is executing and prints : 3\nThread3A\
