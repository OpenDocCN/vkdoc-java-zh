    Thread4C prints ->0

    Thread4B prints ->0

    Thread4B prints ->1

    Thread4A prints ->0

    Thread4B prints ->2

    Thread4B prints ->3

    Thread4C prints ->1

    Thread4A prints ->1

    Thread4C prints ->2

    Thread4A prints ->2

    Going to interrupt the thread.

    Thread4C prints ->3

    Is Thread4A interrupted?true

    Thread4C prints ->4

    Thread4A prints ->3

    Exit-Thread4C

    Thread4A prints ->4

    Exit-Thread4A

    Exit-main()

    Thread4B prints ->4

    Exit-Thread4B

