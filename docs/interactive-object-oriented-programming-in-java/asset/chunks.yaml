- fmt: 'No, it is not mandatory for you. The GoF classified the case of not using
    a `State` interface as a degenerate case of the Bridge pattern.


    **15.19 In this example, an abstract class is used to represent an abstraction,
    and an interface is used for an implementation. Is this mandatory?**


    No. You can also use an interface also for the abstraction layer. Basically, you
    use either an abstract class or an interface for any of the abstractions or implementations.
    I have just used this format for better readability.


    ## Observer Pattern


    ### GoF Definition


    Defines a one-to-many dependency between objects so that when one object changes
    state, all its dependents are notified and updated automatically.


    ### Concept


    In this pattern, there are many observers (objects), which are observing a particular
    subject (also an object). Observers register themselves to a subject to get the
    change notification from the subject. If any observer loses interest in the subject
    it can unregister from the subject. Sometimes this model is also referred to as
    the Publish-Subscribe model. The whole idea can be summarized as follows: *Using
    this pattern, an object (subject) can send notifications to multiple observers
    (a set of objects) at the same time.*


    You can visualize the scenarios with the following diagrams. Let’s assume there
    are three different types of observers (let’s say `observer1`, `observer2`, and
    `observer3`) that show interest in a subject.


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig18_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig18_HTML.jpg)


    **Figure 15-18** Step 5


    1. Observers are requesting to a subject to get notifications (see Figure [15-14](#433474_2_En_15_Chapter.xhtml#Fig14)).


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig14_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig14_HTML.jpg)


    **Figure 15-14** Step 1


    2. Subject grants all the requests (i.e., connection established; see Figure [15-15](#433474_2_En_15_Chapter.xhtml#Fig15)).


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig15_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig15_HTML.jpg)


    **Figure 15-15** Step 2


    3. Subject sends notifications to the registered observers (for example, a typical
    event occurs in the subject and it wants to notify its observers; see Figure [15-16](#433474_2_En_15_Chapter.xhtml#Fig16)).


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig16_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig16_HTML.jpg)


    **Figure 15-16** Step 3


    4. **(Optional)**: `Observer2` does not want to get further notifications. So,
    it unregisters itself. See Figure [15-17](#433474_2_En_15_Chapter.xhtml#Fig17).


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig17_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig17_HTML.jpg)


    **Figure 15-17** Step 4


    5. From this point onward, only `Observer1` and `Observer3` will receive notifications
    from the subject. See Figure [15-18](#433474_2_En_15_Chapter.xhtml#Fig18).


    ### Real-life Example


    We can think about a celebrity who has many followers. Each of these followers
    wants to get all the latest updates from the celebrity. When they lose interest,
    they simply do not follow that celebrity. Here, you can treat each of these followers
    as an observer and the celebrity as a subject.


    ### Coding Example


    Consider a simple UI-based example where the UI is connected to a database. A
    user can execute search queries through that UI, and, after searching the database,
    the result is reflected in the UI. Here, you segregate the UI from the database
    in such a way that if a change occurs in the database, the UI should be notified,
    and it can update its display according to the change. You can even simplify the
    preceding scenario. You can simply assume that you are the person responsible
    for maintaining a particular database in your organization. So, whenever there
    is a change made inside the database, most likely you want to get a notification
    so that you can take an early action if it is required.


    **Note**: You may use this pattern in an event-driven software. Modern computer
    languages like Java and C# provide built-in support for handling events and make
    your life easy. Java event listeners are observers only. These observers can implement
    the `Observer` interface, which has an `update()` method: `void update(Observable
    o,Object arg)`. This method is invoked whenever a change occurs in the observed
    object. You can call the `Observable` object’s `notifyObservers()` method to notify
    the observers of the changes. The `addObserver(Observer o)` can add an observer,
    and the `deleteObserver(Observer o)` method can delete an observer. You can delete
    all the observers using the `deleteObservers()` method. These are similar to the
    `register` and `unregister` methods discussed earlier.


    ### Illustration


    Now, let us directly enter into our example. Here, I have created three observers
    and one subject. The subject maintains a list for all of its registered users.
    Our observers want to receive notifications when a flag value changes in the subject.
    With the output, you will discover that these observers are getting the notifications
    when flag values are changed to 5, 50, and 100, respectively. But one of them
    did not receive any notification when the flag value changed to 50 because at
    that moment it was not a registered user. But later he registered himself to get
    further notifications from the subject. At the end, all observers were unregistered,
    so, none of them got notification when flag value changed to 500 in the subject.


    In this implementation, the methods `register()`, `unregister()`, and `notifyRegisteredUsers()`
    have their usual meanings. The `register()` method is used to register an observer
    in the subject’s notification list; the `unregister()` method is used to remove
    an observer from the subject’s notification list; and `notifyRegisteredUsers()`
    is used to notify all the registered users when a typical event occurs in the
    subject.


    ### Class Diagram


    Figure [15-19](#433474_2_En_15_Chapter.xhtml#Fig19) shows the class diagram.


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig19_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig19_HTML.jpg)


