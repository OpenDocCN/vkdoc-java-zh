  trans: '

    **声明**：这是一个*接口*。`Statement` 对象用于执行静态 SQL 语句并返回其结果。默认情况下，在特定时刻，每个 `Statement` 对象只能打开一个
    `ResultSet` 对象。

    **createStatement()**：此方法创建一个 `Statement` 对象，用于向数据库发送 SQL 语句。

    **executeQuery()**：此方法用于执行返回单个 `ResultSet` 对象的 SQL 语句。

    **executeUpdate()**：此方法用于执行可以是 `insert`、`update` 或 `delete` 语句中任意一种的 SQL 语句。你也可以使用不返回任何内容的
    DDL 语句。（可参考本上下文中的问答 13.10。）


    注意

    不能在 `PreparedStatement` 或 `CallableStatement` 上调用 `executeQuery()` 或 `executeUpdate()`
    方法。


    **ResultSet**：这是一个*接口*，表示数据库查询的结果集。读取数据（使用数据库查询）的 SQL 语句将数据返回到结果集中。`select` 语句是选择行并在结果集中查看它们的标准方式。

    在演示 1 中，你会注意到，一旦使用 `Statement` 对象执行了 SQL 语句，就会检索到查询结果。它就像一个迭代器，让你可以轻松地遍历其数据。在此上下文中，了解
    `ResultSet` 对象维护一个指向结果集中当前行的游标是很有用的。

    **SQLException**：此*类*用于描述各种数据库访问错误（或数据库应用程序中可能发生的任何其他错误）。


    创建数据库并插入记录

    演示 1 展示了如何连接到 MySQL 数据库以及如何从数据库的表中检索记录。


    在此之前，你可以熟悉一下 MySQL Workbench，这是一个图形化工具，可在使用 MySQL 服务器和数据库时使用。安装后，你可以在启动菜单中找到它，如图
    13-6 所示。


    ![../images/433474_2_En_13_Chapter/433474_2_En_13_Fig6_HTML.jpg](img/433474_2_En_13_Fig6_HTML.jpg)


    图 13-6

    安装后，MySQL Workbench 8.0 可在启动菜单中找到


    在开始之前，我创建了一个名为 `test` 的数据库，然后在该数据库中创建了一个名为 `employee` 的表。在 `employee` 表中，我只插入了三条记录。创建数据库和在数据库中创建表非常简单。如果你知道这些命令，可以跳过下面方括号
    [ ] 中的部分。


    [例如，登录到你的数据库服务器后：


    *   要创建名为 `test` 的数据库，可以使用以下命令：


    *   要创建名为 `employee` 的表，可以使用以下命令：


    ```

    create database test;

    ```


    ```

    create table employee(EmpId int(10),Name varchar(10),Age int(10), Salary double);

    ```


    这简单地说明 employee 表有四列：`EmpId`、`Name`、`Age` 和 `Salary`。这里也描述了带有大小的数据类型。`varchar`
    数据类型对你来说可能比较陌生。现在，只需知道它用于可以同时包含字母和数字的数据。


    *   要在 `employee` 表中插入一条记录，可以使用以下命令：


    ```

    insert into employee values (1,''Amit'',25,1200.5);

    ```


    类似地，你可以插入其他记录。


    另一个需要注意的重要点是，如果你想让某一列唯一且非空，可以将其用作主键。例如，如果我不想在 `EmpId` 列中出现重复值，并且希望每条记录都包含 `EmpId`
    的信息，我会在创建表时使用主键的概念，如下所示：


    ```

    create table employee(EmpId int(10) primary key,Name varchar(10),Age int(10),
    Salary double);

    ```


    现在，当你向 `employee` 表插入记录时，需要提供 `EmpId` 的信息。简而言之，通过使用主键，你可以唯一地标识一条记录。]


