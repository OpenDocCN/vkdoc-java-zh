- fmt: '# Definition of Exception


    You can define an exception as an event that breaks the normal execution or the
    instruction flow of the program.


    When exceptional situations arise, an exception object is created and thrown into
    the method that created the exception. That method may or may not handle the exception.
    If it cannot handle the exception, it will pass the responsibility to another
    method. (Similar to our daily life, when a situation goes beyond our control,
    we seek advice from others.) If there is no method to take responsibility for
    handling a particular exception, an error dialog box appears (indicating an unhandled
    exception), and the execution of the program stops.


    ## Points To Remember


    An exception-handling mechanism deals with runtime errors, and if they are not
    handled properly, an application will produce unwanted output, and it may die
    prematurely. Therefore, you should try to write applications that can detect and
    handle surprises in a graceful manner and prevent the premature death of the application.


    ## Demonstration 1


    Let’s begin with a simple example. The following program compiles successfully,
    but it will raise an exception during runtime because in this program, the divisor
    (`b`) becomes 0 prior to the division operation. The application produces a runtime
    error because, in this case, you are trying to divide 100 by 0.


    ```

    package java2e.chapter10;

    class Demonstration1 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-1.Exploring Exceptions.***");

    int a = 100, b = 2, result;

    b -= 2;//b beomes 0

    result = a / b;

    System.out.println("The result of a/b is :" + result);

    }

    }

    ```


    Output:


    ```

    ***Demonstration-1.Exploring Exceptions.***

    Exception in thread "main" java.lang.ArithmeticException: / by zero

    at java2e.chapter10.Demonstration1.main(Demonstration1.java:9)

    ```


    ## Key Points of the Exception-handling Mechanism


    Before you proceed further, I’ll highlight some key points of the exception-handling
    mechanism. You may need to come back to these points repeatedly. It is suggested
    that once you finish this chapter, you come back here to review your understanding
    of exception handling in Java.


    *   An exceptional object is created when a runtime error occurs. So, a Java exception
    is basically an object to describe an erroneous situation.


    *   Any method in an application can raise surprises during the application’s
    runtime. If such a situation occurs, in programming terminology, you say that
    the method has thrown an exception.


    *   You use the following keywords to deal with Java exceptions: `try`, `catch`,
    `throw`, `throws`, and `finally`.


    *   You try to guard against an exception with a `try`-`catch` block. The code
    that may throw an exception is placed inside a `try` block, and this exceptional
    situation is handled inside a `catch` block. But if there is no exception raised
    in the `try` block, the `catch` blocks are bypassed completely.


    *   You can associate multiple `catch` blocks with a `try` block. When a particular
    `catch` block handles the sudden surprise (the exception), you say that the `catch`
    block has caught the exception.


    *   The code in the `finally` block must execute. A `finally` block is generally
    placed after a `try` block or a `try`-`catch` block. This block is used to perform
    some housekeeping so that the application can be gracefully closed. For example,
    if a file is already opened, you should close it here, or if you already allocated
    some resources, those should be released inside this block.


    *   When an exception is raised inside a `try` block, the control jumps to the
    respective `catch` or `finally` block. The remaining part of the `try` block will
    not execute.


    *   Exceptions follow the inheritance hierarchy. So, it is important to remember
    the hierarchy, shown in Figure 10-2.


    ![../images/433474_2_En_10_Chapter/433474_2_En_10_Fig2_HTML.jpg](images/433474_2_En_10_Chapter/433474_2_En_10_Fig2_HTML.jpg)


    Figure 10-2 Exception hierarchy


    *   You can see that both the `Exception` class and the `Error` class are subclasses
    of the `Throwable` class, which in turn derives from `Object` (in the `java.lang`
    package). By other exceptions, I mean classes like `IOException` (already defined
    in Java), our own custom exception classes (not defined in Java), and so on. So,
    you can simply say that in Java, the `Throwable` class is the ultimate super class
    of all errors and exceptions.


    *   Exceptions are broadly categorized into two types: checked and unchecked.
    The runtime exception classes (`RuntimeException` class and its subclasses) and
    error classes (`Error` class and its subclasses) fall into the category of unchecked
    exceptions, and the others remaining are called checked exceptions. You’ll see
    a detailed discussion of each category shortly, and Q&A 10.8 will summarize the
    details.


    *   This chapter primarily focuses on runtime exceptions. Errors, in general,
    are caused by some catastrophic failures, like JVM being out of memory, stack
    overflow, and so on. You can hardly do anything with them. The Java runtime environment
    itself needs to take care of these severe situations.


    *   When you create your custom exception classes, in general, you’ll subclass
    from the `Exception` class. But it is not a rule. So, in Demonstration 7, you’ll
    see that a custom exception class extends from the `Throwable` class, and in Demonstration
    8, you will notice that a custom exception class inherits from the `RuntimeException`
    class.


    *   You should order the `catch` blocks from most specific to most general. Otherwise,
    you will encounter compile-time errors. For example, suppose you have placed a
    `catch` block (say, `catch block1`) that can handle a parent-class exception before
    a `catch` block (say `catch block2`) that can handle only the derived-class exception.
    From the compiler’s point of view, it is an example of unreachable code, because
    in this case `catch block1` is always capable of handling the exceptions that
    `catch block2` can handle. Therefore, control does not need to reach `catch block2`
    at all. You will examine this scenario in an upcoming example.


    *   You can use any of these combinations: `try`-`catch`, `try`-`catch`-`finally`,
    or `try`-`finally`.


    *   The Java runtime system can generate exceptions. At the same time, you can
    also create your own exception class and throw your own exception.


    *   If you do not handle exceptions, a default handler of the Java runtime system
    will handle it on your behalf, and the program may die prematurely.


    ## Points To Remember


    *   In Java, the `Throwable` class is the ultimate super class of all errors and
    exceptions.


    *   In an exception-handling mechanism, there is a key difference between Java
    and C#. There is no concept of the `throws` keyword in C#. This is a hot topic
    of debate.'
