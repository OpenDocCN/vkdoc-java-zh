    # 7. Packages


    Let’s consider a simple scenario. Can you use the same name for different classes
    in a Java file? No. The compiler would raise an issue and would point toward this
    naming collision. When you define a class, you need to follow unique naming conventions.
    In real-world programming, class names should be somewhat meaningful, and there
    is the possibility that different programmers will opt for class names that are
    not unique. Then the obvious question is: how can you deal with such situations?
    Packages can rescue us in these instances.


    You can bundle your classes or interfaces inside your own packages. This approach
    helps you to avoid naming conflicts. To simplify, two classes from two different
    packages can have the same name. A package can also control the visibility of
    the package elements. So, it is your choice as to whether you want your classes
    to be exposed to the outside world.


    ### Note


    You can have two different classes with the same name in two different packages,
    but in the same package you cannot have two classes with the same name. `JLS11`
    gives a nice example, saying that if there is a package named `mouse` and a member
    type `Button` in that package (which then might be referred to as `mouse.Button`),
    then there cannot be any package with the fully qualified name `mouse.Button`
    or `mouse.Button.Click`.


    In Java, directories are the physical representation of packages. Creating a package
    in Eclipse is quite easy. You do not even have to worry about how the Java runtime
    will find the proper packages or classes inside it. However, you may need to pay
    special attention to the `PATH` and `CLASSPATH` environment variables. These variables
    play important role before you write your first Java program in a command-line
    environment.


    Before you proceed further, remember the following points:


    *   The `package` statement should be at the top of your source file. If you do
    not explicitly define this statement, then all the classes/interfaces etc. will
    be located in the current default package.

    *   By convention, the name of a package starts with lowercase letters; for example,
    some of the built-in Java packages are `java.lang`, `java.awt`, `java.util`, `java.io`,
    etc.

    *   A package can contain subpackages; for example, if you have a package `p`,
    and `q` is a subpackage of `p` and contains a class, namely, `MyClass`, then you
    can refer to `MyClass` with the fully qualified name `p.q.MyClass`. So, the name
    of the package must follow the directory structure.

    *   When one class refers to another class inside the same package, the `package`
    statement need not be included. Otherwise, you may need to use the fully qualified
    class name, like `packagename.MyClass`, or you may need to use `import` statements.

    *   A complete package can be imported as follows:


    ```

    import packagename.*;

    ```


    *   Or, if you want to import only a particular class—say, `MyClass` from a package
    called `mypack`—use something like the following:


    ```

    import mypack.MyClass;

    ```


    *   Every class in Java resides inside a package. Sometimes you may see Java source
    files without any package declaration. It means that those classes are inside
    a default or unnamed package. `JLS 11` says the following about unnamed packages:
    “An ordinary compilation unit that has no package declaration is part of an unnamed
    package. Unnamed packages are provided by the Java SE Platform principally for
    convenience when developing small or temporary applications or when just beginning
    development.”'
