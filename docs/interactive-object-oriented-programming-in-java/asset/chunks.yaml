    class ThreadOne extends Thread{

    //An instance of ThreadOne

    ThreadOne threadOne=new ThreadOne();

    ```


    You’ll notice the similar lines of code for the `ThreadTwo` class and its object
    `threadTwo`. Lastly, the following lines will invoke the `run()` method of the
    corresponding threads:


    ```

    threadOne.start();

    threadTwo.start();

    ```'
