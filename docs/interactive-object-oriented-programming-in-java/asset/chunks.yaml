  raw: '### Points To Remember


    The compiler supplies a no-argument default constructor if you do not include
    any constructor for your class. This default constructor actually calls the no-argument
    constructor of the superclass (if any). In this context, the compiler may complain
    if the superclass doesn’t have any such constructor. If your class does not have
    any explicit superclass, then it has an implicit superclass `Object` that has
    a no-argument constructor. You may not be familiar with all these terms yet, but
    you will know about them shortly.


    So, when you see something like the following, you can be sure that a parameterless
    constructor will be used:


    ```

    A obA=new A();

    ```


    But to know whether it is a user-defined constructor or was provided by Java (in
    other words, a default constructor), you need to examine the class body; for example,
    in a class definition, if you have code like


    ```

    class A

    {

    A()

    {

    //some code

    }

    }

    ```


    you can conclude that you have used the user-defined parameterless constructor.
    So, in this scenario, Java will not supply any default constructor on your behalf.


    So far you understand that classes are simply the building blocks of your programs.
    You ***encapsulate*** the variables (also known as ***fields***) and methods inside
    a class to make a single unit. These variables are called as instance variables
    because each instance of this class contains its own copies of these variables.
    (Later, you’ll learn that fields can be any implicit data type, different class
    objects, and so forth). Methods, on the other hand, contain a block of code. This
    is nothing but a series of statements that perform specific actions. Instance
    variables are generally accessed through methods. As said before, collectively,
    these variables and methods are called class members.


    ### Note


    An instance is a unique copy of a class and is used to represent an object. I
    have used these terms interchangeably.


    Static variables will be discussed in Chapter [8](#433474_2_En_8_Chapter.xhtml).


    In general, you can place different things inside your class declaration. For
    example, you can put variables, methods, constructors, inner classes, initialization
    blocks, enums (these are also internally implemented as classes), and so on inside
    your class body. But, for simplicity, I have started the discussion with methods
    and fields, which are the most common. You’ll see the other topics in their respective
    chapters in this book.


    Fields and methods can be associated with different kinds of modifiers; for example,
    `public`, `private`, `protected`, `default`, etc. You will be familiar with modifiers
    shortly.


    ### Demonstration 1


    Consider a simple example. Here, I have a class called `ClassEx1` and have encapsulated
    only one integer field, `myInt`, into it. I have also initialized the value 25
    into that field. So, you can predict that whenever I create an object of this
    class, that object will have an integer named `myInt` in it, and the corresponding
    value will be 25.


    For your ready reference, I have created two objects—`obA` and `obB—`from the
    class `ClassEx1`. I have tested the values of the variable `myInt` inside the
    objects. In the output, you can see that in both cases, I am getting the value
    25\.


    ### Note


    All programs in this book are organized under package statements. You’ll learn
    about Java packages in Chapter [7](#433474_2_En_7_Chapter.xhtml). To compile and
    run these programs, the package statements are NOT mandatory for you. So, initially
    you can play with all these programs without the package statement.


    ```

    package java2e.chapter2;

    class ClassEx1 {

    // Field initialization is optional.

    // Here myInt is initialized with the value 25.

    public int myInt = 25;

    // In the following case, it will be initialized with default value 0.

    // public int myInt;

    }

    class Demonstration1 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-1\. A class demo with 2 objects ***");

    ClassEx1 obA = new ClassEx1();

    ClassEx1 obB = new ClassEx1();

    System.out.println("obA.myInt = " + obA.myInt);

    System.out.println("obB.myInt = " + obB.myInt);

    }

    }

    ```


    Output:


    ```

    ***Demonstration-1.A class demo with 2 objects ***

    obA.myInt = 25

    obB.myInt = 25

    ```


    Additional comments:


    *   As mentioned in the comment, it is not necessary to initialize the `myInt`
    in this way. You are just starting up with a very simple example. *Field initialization
    is optional.*


    *   If you do not supply any initialization for your field, it will take a default
    value. I’ll cover those default values shortly.


    *   Suppose that in the preceding example, you did not initialize the field. Then
    your class would look like this:


    ```

    class ClassEx1 {

    public int myInt;

    }

    ```


    Still, you can instantiate your object and then supply your intended value, like
    in the following:


    ```

    ClassEx1 obA = new ClassEx1();

    obA.myInt=25;//setting 25 into myInt of obA

    ```


    You must remember these key points about constructors:


    *   Constructors are used to initialize objects.


    *   The class name and the corresponding constructor’s name(s) must be the same.


    *   Constructors do not have any return types.


    *   There are two types of constructors: parameterless constructors (sometimes
    referred to as constructors with no argument or default constructor) and constructors
    with parameter(s) (known as parameterized constructors).


    *   In general, the common tasks, like initialization of all the variables inside
    a class, are achieved through constructors.


    ### Q&A Session


    **2.1 The constructors do not have any return type. With this statement, did you
    mean that their return type is void?**


    No. You should not forget that even void is considered a return type.


    **2.2 I am little bit confused about the use of a user-defined parameterless constructor
    versus a default constructor that is supplied by Java. Is there any key difference
    between them?**


    Sometimes both may appear to be the same. But it can be helpful to remember that
    with a user-defined constructor, you can have more control and flexibility. You
    can put in your own logic prior to object creation.


    ### Demonstration 2


    Consider the following example and analyze the output:


    ```

    package java2e.chapter2;

    class DefConsDemo

    {

    public int myInt;

    public float myFloat;

    public double myDouble;

    public DefConsDemo()

    {

    System.out.println("I am initializing with my own choice.");

    myInt = 10;

    myFloat = 0.123456f;

    myDouble = 9.8765432;

    }

    }

    class DefaultConstructorCaseStudy {

    public static void main(String[] args) {

    System.out.println("***Demonstration-2.Comparison between user-defined and  Java-provided
    default constructors***\n");

    DefConsDemo ObDef = new DefConsDemo();

    System.out.println("myInt="+ ObDef.myInt);

    System.out.println("myFloat="+ ObDef.myFloat);

    System.out.println("myDouble="+ ObDef.myDouble);

    }

    }

    ```


    Output:


    ```

    ***Demonstration-2.Comparison between user-defined and  Java-provided default
    constructors***

    I am initializing with my own choice.

    myInt=10

    myFloat=0.123456

    myDouble=9.8765432

    ```'
