- fmt: "为了实现深拷贝，让我们修改`Employee`类的`clone()`方法，如下所示：\n\n```java\n@Override\npublic Object\
    \ clone() throws CloneNotSupportedException {\n    // 浅拷贝\n    // return super.clone();\n\
    \    // 深拷贝\n    Employee employee = (Employee) super.clone();\n    employee.empAddress\
    \ = (EmpAddress) empAddress.clone();\n    return employee;\n}\n```\n\n以下是修改后的输出：\n\
    \n```\n***浅拷贝与深拷贝演示***\n员工详情如下：\nEmpId=1 EmpName=John EmpAddressName=21, abc Road,\
    \ USA\n克隆对象详情如下：\nEmpId=1 EmpName=John EmpAddressName=21, abc Road, USA\n现在修改原始对象的名称、ID和地址\n\
    原始对象详情如下：\nEmpId=10 EmpName=Sam EmpAddressName=221, xyz Road, Canada\n克隆对象详情如下：\n\
    EmpId=1 EmpName=John EmpAddressName=21, abc Road, USA\n```\n\n分析：\n\n注意本例中输出的最后一行。这里没有出现不期望的副作用。这是因为原始对象和克隆对象是完全不同且相互独立的。图[15-8](#433474_2_En_15_Chapter.xhtml#Fig8)可以更好地描述这一场景。\n\
    \n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig8_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig8_HTML.jpg)\n\
    \n**图15-8** 修改后演示中的深拷贝场景\n\n**15.10 何时应选择浅拷贝而非深拷贝（反之亦然）？**\n\n浅拷贝更快且开销更小。如果目标对象只包含基本类型字段，浅拷贝总是更好的选择。\n\
    \n深拷贝开销大且速度慢。但如果目标对象包含许多引用其他对象的字段，深拷贝则非常有用。\n\n**15.11 在Java中，如果需要拷贝对象，是否必须使用`clone()`方法？**\n\
    \n不，有很多替代方案。例如，你可以使用自己的拷贝构造函数。除此之外，还可以使用序列化的概念。\n\n**15.12 Java是否支持默认的拷贝构造函数？**\n\
    \n不支持，但你可以定义自己的拷贝构造函数。第[3](#433474_2_En_3_Chapter.xhtml)章演示了这样一个示例。\n\n## 桥接模式\n\
    \n**GoF定义**\n\n将抽象与其实现解耦，使两者可以独立变化。\n\n**概念**\n\n这种模式也称为**句柄/主体模式**。在这种模式中，你会看到两个不同的继承层次结构——一个用于抽象层，一个用于实现层。你使用桥接来连接这两个层次结构。桥接的作用很重要，它以一种使这两个层次结构可以互不影响地变化的方式连接它们。从编码角度来看，你可以为抽象和/或实现使用抽象类或接口，但在实现概念时，抽象将包含对实现者的引用，并且你使用组合来桥接这两个层次结构。\n\
    \n**现实生活中的例子**\n\n在软件产品开发公司中，开发团队和营销团队各自扮演着关键角色。营销团队可能进行市场调研并收集客户需求，这些需求可能因客户性质而异。开发团队在其产品中实现这些需求以满足客户需求。一个团队（例如运营策略）的变化不应直接影响另一个团队。此外，未来当客户提出新需求时，该需求不应改变开发人员在组织中的工作方式。在这种情况下，你可以将营销团队视为产品客户与软件开发团队之间的桥梁。\n\
    \n**编码示例**\n\nGUI框架可以使用桥接模式将抽象与平台特定的实现分离。例如，它可以使用此模式将窗口抽象与Linux或macOS的窗口实现分离。\n\
    \n**注意**\n\n在第[13](#433474_2_En_13_Chapter.xhtml)章中，你学习了JDBC。它充当应用程序和数据库之间的桥梁。例如，`java.sql.DriverManager`类和`java.sql.Driver`接口可以形成桥接模式，其中前者扮演抽象的角色，后者扮演实现者的角色。具体的实现者可以是`com.mysql.cj.jdbc.Driver`或`oracle.jdbc.driver.OracleDriver`。（需要注意的是，`com.mysql.jdbc.Driver`类已弃用。你需要使用新类`com.mysql.cj.jdbc.Driver`。）\n\
    \n**图示**\n\n假设你是一个遥控器制造商，需要为不同的电子设备制造遥控器。为简单起见，假设目前你接到为电视和DVD制造遥控器的订单。还假设你的遥控器有两个主要功能——开和关。\n\
    \n假设你想从图[15-9](#433474_2_En_15_Chapter.xhtml#Fig9)或图[15-10](#433474_2_En_15_Chapter.xhtml#Fig10)所示的设计开始。\n\
    \n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig10_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig10_HTML.jpg)\n\
    \n**图15-10** 方法2\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig9_HTML.png](images/433474_2_En_15_Chapter/433474_2_En_15_Fig9_HTML.png)\n\
    \n**图15-9** 方法1\n\n进一步分析后，你发现方法1非常混乱且难以维护。\n\n起初，方法2看起来更清晰，但如果你想包含新的状态（如睡眠、静音等），或者想包含新的电子设备（如空调），你将面临新的挑战，因为在这种设计方法中元素是紧密耦合的。但在现实场景中，这种增强通常是必需的。\n\
    \n因此，你现在明白需要从一个松散耦合的系统开始，以便未来进行增强，使得这两个层次结构（电子设备及其状态）可以独立发展。桥接模式正好适用于这种场景。\n\n\
    让我们从桥接模式最常见的类图开始（见图[15-11](#433474_2_En_15_Chapter.xhtml#Fig11)）。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig11_HTML.png](images/433474_2_En_15_Chapter/433474_2_En_15_Fig11_HTML.png)\n\
    \n**图15-11** 经典的桥接模式示例\n\n术语描述如下：\n\n*   **抽象**：它定义抽象接口并维护`Implementor`引用。在我们的示例中，它是一个抽象类。\n\
    *   **精化抽象**：它扩展了抽象定义的接口。在我们的示例中，它是一个具体类。\n*   **实现者**：它为实现类定义接口。在我们的示例中，它是一个接口。\n\
    *   **具体实现者**：在我们的示例中，它是一个具体类。它实现了`Implementor`接口。\n\n我在以下实现中采用了类似的架构。为方便参考，我在以下实现中用注释指出了所有参与者。\n\
    \n**类图**\n\n图[15-12](#433474_2_En_15_Chapter.xhtml#Fig12)显示了类图。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig12_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig12_HTML.jpg)\n\
    \n**图15-12** 类图\n\n**包资源管理器视图**\n\n图[15-13](#433474_2_En_15_Chapter.xhtml#Fig13)显示了程序的高级结构。\n\
    \n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig13_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig13_HTML.jpg)\n\
    \n**图15-13** 包资源管理器视图\n\n**实现**\n\n以下是以下实现的关键特征：\n\n*   抽象类`ElectronicGoods`扮演抽象的角色，接口`State`扮演实现者的角色。"
  raw: "To implement a deep copy implementation, let’s modify the `clone()` method\
    \ of the\n`Employee` class\nas follows:\n\n```\n@Override\npublic Object clone()\
    \ throws CloneNotSupportedException {\n// Shallow Copy\n// return super.clone();\n\
    // For deep copy\nEmployee employee = (Employee) super.clone();\nemployee.empAddress\
    \ = (EmpAddress) empAddress.clone();\nreturn employee;\n}\n```\n\nHere is the\
    \ modified output:\n\n```\n***Shallow vs Deep Copy Demonstration.***\nThe emp\
    \ details is as follows:\nEmpId=1 EmpName=John EmpAddressName=21, abc Road, USA\n\
    The empClone details is as follows:\nEmpId=1 EmpName=John EmpAddressName=21, abc\
    \ Road, USA\nNow changing the name, id and address of the emp object\nNow emp\
    \ details is as follows:\nEmpId=10 EmpName=Sam EmpAddressName=221, xyz Road, Canada\n\
    And empClone details is as follows:\nEmpId=1 EmpName=John EmpAddressName=21, abc\
    \ Road, USA\n```\n\nAnalysis:\n\nNotice the last line of output in this case.\
    \ Here, you are not seeing\nthe unwanted side-effect. This is because the original\
    \ object and the\ncloned object are totally different and independent of each\
    \ other.\nFigure [15-8](#433474_2_En_15_Chapter.xhtml#Fig8) can depict the\nscenario\
    \ better.\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig8_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig8_HTML.jpg)\n\
    \nFigure 15-8\nDeep copy scenario in modified Demonstration\n\n**15.10 When should\
    \ you choose shallow copy over deep copy (and\nvice versa)?**\nShallow copy is\
    \ faster and less expensive. It is always better if\nyour target object has primitive\
    \ fields only.\nDeep copy is expensive and slow. But it is useful if your target\n\
    object contains many fields that have references to other objects.\n**15.11 In\
    \ Java, if I need to copy an object, I need to use\nthe** **clone()** **method**\
    \ **. Is this\nunderstanding correct?**\nNo, there are many alternatives. For\
    \ example, you can use your own\ncopy constructor. Apart from this, you can use\
    \ the concept of\nserialization.\n\n**15.12 Does Java support a default** **copy\n\
    constructor** **?**  \nNo, but you can define your own copy constructor. Chapter\
    \ [3](#433474_2_En_3_Chapter.xhtml) demonstrates such an example.\n\nBridge Pattern\n\
    \nGoF Definition\nDecouple an abstraction from its implementation so that the\
    \ two can\nvary independently.\n\nConcept\nThis pattern is also known as the **Handle/Body\n\
    pattern** . In this pattern, you will see two different\ninheritance hierarchies—one\
    \ for the abstraction layer and one for the\nimplementation layer. You connect\
    \ these two hierarchies using a bridge.\nBut the role of the bridge is important.\
    \ It connects them in such a way\nthat these two hierarchies can change without\
    \ affecting each other.\nFrom a coding perspective, you can use either an abstract\
    \ class or an\ninterface for your abstraction and/or implementation, but when\
    \ you\nimplement the concept, the abstraction will contain a reference to the\n\
    implementor, and you use composition to bridge the two hierarchies.\n\nReal-life\
    \ Example\nIn a software product development company, the development team and\n\
    the marketing team each play a crucial role. The marketing team might do\na market\
    \ survey and gather the customer requirements, which may vary\ndepending on the\
    \ nature of the customers. The development team\nimplements those requirements\
    \ in their products to fulfill the\ncustomers’ needs. Any change (say, in the\
    \ operational strategy) in one\nteam should not have a direct impact on the other\
    \ team. Also, in the\nfuture, when new requirements come from a customer, that\
    \ demand should\nnot change how developers work in their organization. In a case\
    \ like\nthis, you can think of the marketing team as playing the role of the\n\
    bridge between the clients of the product and the development team of\nthe software\
    \ organization.\n\nCoding Example\nA GUI framework can use the Bridge pattern\
    \ to separate abstractions\nfrom platform-specific implementation. For example,\
    \ it can separate a\nwindow abstraction from a window implementation for Linux\
    \ or macOS using\nthis pattern.\n\nNote\nIn Chapter [13](#433474_2_En_13_Chapter.xhtml),\
    \ you learned about JDBC. It acts\nas a bridge between your application and the\
    \ database. For example, the\n`java.sql.DriverManager`\nclass and the `java.sql.Driver`\n\
    interface can form a Bridge pattern, where the first one plays the role\nof abstraction\
    \ and the second one plays the role of implementor. The\nconcrete implementors\
    \ can be `com.mysql.cj.jdbc.Driver`\nor `oracle.jdbc.driver.OracleDriver`.\n(It\
    \ is important to note that the class `com.mysql.jdbc.Driver`\nis deprecated.\
    \ You need to use the new class, `com.mysql.cj.jdbc.Driver`.)\n\nIllustration\n\
    Suppose you are a remote-control maker and you need to make remote\ncontrols for\
    \ different electronic items. For simplicity, let us assume\nthat you are presently\
    \ getting orders to make remote controls for\ntelevisions and DVDs. Let us also\
    \ assume that your remote control has\ntwo major functionalities—on and off.\n\
    \nSuppose you want to start with the design shown in Figure [15-9](#433474_2_En_15_Chapter.xhtml#Fig9)\
    \ or the one in\nFigure [15-10](#433474_2_En_15_Chapter.xhtml#Fig10).\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig10_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig10_HTML.jpg)\n\
    \nFigure 15-10\nApproach 2\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig9_HTML.png](images/433474_2_En_15_Chapter/433474_2_En_15_Fig9_HTML.png)\n\
    \nFigure 15-9\nApproach 1\n\nOn further analysis, you discover that Approach 1\
    \ is truly messy and\nis difficult to maintain.\nAt the beginning, Approach 2\
    \ looks cleaner, but if you want to\ninclude new states like Sleep, Mute, and\
    \ so forth, or if you want to\ninclude new electronic items like AC, you will\
    \ face new challenges\nbecause the elements are tightly coupled in this design\
    \ approach. But in\na real-world scenario, this kind of enhancement is often required.\n\
    So, now you understand that you need to start with a loosely coupled\nsystem for\
    \ future enhancements so that either of these two hierarchies\n(electronics items\
    \ and their states) can grow independently. The Bridge\npattern fits exactly in\
    \ such a scenario.\n\nLet us start from the most common class diagram of a Bridge\
    \ pattern (see\nFigure [15-11](#433474_2_En_15_Chapter.xhtml#Fig11)).\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig11_HTML.png](images/433474_2_En_15_Chapter/433474_2_En_15_Fig11_HTML.png)\n\
    \nFigure 15-11\nA classical Bridge pattern example\n\nThe description of the terms\
    \ are as follows:\n\n*   **Abstraction**\n    : It defines the abstract interface\
    \ and maintains the `Implementor`\n    reference. It is an abstract class in our\
    \ example.\n\n*   **RefinedAbstraction**\n    : It extends the interface defined\
    \ by Abstraction. It is a\n    concrete class in our example.\n\n*   **Implementor**\n\
    \    : It defines the interface for implementation classes. It is an\n    interface\
    \ in our example.\n\n*   **ConcreteImplementor**\n    : It is a concrete class\
    \ in our example. It implements the `Implementor`\n    interface.\n\nI have followed\
    \ a similar architecture in the following\nimplementation. For your ready reference,\
    \ I have pointed out all the\nparticipants in the following implementation with\
    \ comments.\n\nClass Diagram\n\nFigure [15-12](#433474_2_En_15_Chapter.xhtml#Fig12)\
    \ shows the\nclass\ndiagram.\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig12_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig12_HTML.jpg)\n\
    \nFigure 15-12\nClass diagram\n\nPackage Explorer\nView\n\nFigure [15-13](#433474_2_En_15_Chapter.xhtml#Fig13)\
    \ shows the\nhigh-level structure of the program.\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig13_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig13_HTML.jpg)\n\
    \nFigure 15-13\nPackage Explorer view\n\nImplementation\n\nThese are the key characteristics\
    \ of the following implementation:\n\n*   The abstract class `ElectronicGoods`\
    \ plays\n    the role of abstraction, and the interface `State` plays the role\n\
    \    of the implementor."
  trans: "\n要实现深拷贝，让我们按如下方式修改`Employee`类的`clone()`方法：\n\n```\n@Override\npublic Object\
    \ clone() throws CloneNotSupportedException {\n// 浅拷贝\n// return super.clone();\n\
    // 深拷贝\nEmployee employee = (Employee) super.clone();\nemployee.empAddress = (EmpAddress)\
    \ empAddress.clone();\nreturn employee;\n}\n```\n\n以下是修改后的输出：\n\n```\n***浅拷贝与深拷贝演示。***\n\
    员工详情如下：\nEmpId=1 EmpName=John EmpAddressName=21, abc Road, USA\n克隆员工详情如下：\nEmpId=1\
    \ EmpName=John EmpAddressName=21, abc Road, USA\n现在修改 emp 对象的姓名、ID 和地址\n现在员工详情如下：\n\
    EmpId=10 EmpName=Sam EmpAddressName=221, xyz Road, Canada\n而克隆员工详情如下：\nEmpId=1\
    \ EmpName=John EmpAddressName=21, abc Road, USA\n```\n\n分析：\n\n请注意本例中输出的最后一行。这里，你不会看到不期望的副作用。这是因为原始对象和克隆对象是完全不同且相互独立的。图\
    \ 15-8 可以更好地描述这一场景。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig8_HTML.jpg](img/433474_2_En_15_Fig8_HTML.jpg)\n\
    \n图 15-8 修改后演示中的深拷贝场景\n\n**15.10 何时应选择浅拷贝而非深拷贝（反之亦然）？**\n浅拷贝速度更快且开销更小。如果你的目标对象只包含基本类型字段，浅拷贝总是更好的选择。\n\
    深拷贝开销大且速度慢。但如果你的目标对象包含许多引用其他对象的字段，深拷贝则很有用。\n**15.11 在 Java 中，如果需要拷贝一个对象，我必须使用`clone()`方法。这个理解正确吗？**\n\
    不，有很多替代方案。例如，你可以使用自己的拷贝构造函数。除此之外，你还可以使用序列化的概念。\n\n**15.12 Java 是否支持默认的拷贝构造函数？**\n\
    不支持，但你可以定义自己的拷贝构造函数。第 3 章演示了这样一个示例。\n\n桥接模式\n\nGoF 定义\n将抽象部分与它的实现部分解耦，使两者都可以独立地变化。\n\
    \n概念\n这种模式也被称为**句柄/主体模式**。在这种模式中，你会看到两个不同的继承层次结构——一个用于抽象层，一个用于实现层。你使用一座桥来连接这两个层次结构。但桥的角色很重要。它以一种方式连接它们，使得这两个层次结构可以互不影响地变化。从编码角度来看，你可以为抽象和/或实现使用抽象类或接口，但当你实现这个概念时，抽象将包含一个对实现者的引用，并且你使用组合来桥接这两个层次结构。\n\
    \n现实生活中的例子\n在软件产品开发公司中，开发团队和营销团队各自扮演着至关重要的角色。营销团队可能进行市场调研并收集客户需求，这些需求可能因客户的性质而异。开发团队将这些需求实现到他们的产品中，以满足客户的需求。一个团队（例如，运营策略）的任何变化都不应对另一个团队产生直接影响。此外，将来当客户提出新需求时，该需求不应改变开发人员在其组织中的工作方式。在这种情况下，你可以将营销团队视为产品客户与软件组织开发团队之间的桥梁。\n\
    \n编码示例\nGUI 框架可以使用桥接模式将抽象与特定于平台的实现分离。例如，它可以使用此模式将窗口抽象与 Linux 或 macOS 的窗口实现分离开来。\n\
    \n注意\n在第 13 章中，你了解了 JDBC。它充当你的应用程序和数据库之间的桥梁。例如，`java.sql.DriverManager`类和`java.sql.Driver`接口可以形成桥接模式，其中前者扮演抽象的角色，后者扮演实现者的角色。具体的实现者可以是`com.mysql.cj.jdbc.Driver`或`oracle.jdbc.driver.OracleDriver`。（需要注意的是，类`com.mysql.jdbc.Driver`已弃用。你需要使用新类`com.mysql.cj.jdbc.Driver`。）\n\
    \n图解\n假设你是一个遥控器制造商，你需要为不同的电子产品制造遥控器。为简单起见，我们假设你目前接到为电视和 DVD 制造遥控器的订单。我们还假设你的遥控器有两个主要功能——开和关。\n\
    \n假设你想从图 15-9 或图 15-10 所示的设计开始。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig10_HTML.jpg](img/433474_2_En_15_Fig10_HTML.jpg)\n\
    \n图 15-10 方法 2\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig9_HTML.png](img/433474_2_En_15_Fig9_HTML.png)\n\
    \n图 15-9 方法 1\n\n经过进一步分析，你发现方法 1 确实很混乱且难以维护。\n起初，方法 2 看起来更清晰，但如果你想包含新的状态，如睡眠、静音等，或者如果你想包含新的电子产品，如空调，你将面临新的挑战，因为在这种设计方法中元素是紧密耦合的。但在现实场景中，这种增强通常是必需的。\n\
    所以，现在你明白你需要从一个松散耦合的系统开始，以便于未来的增强，这样这两个层次结构（电子产品及其状态）都可以独立发展。桥接模式正好适用于这种场景。\n\n\
    让我们从桥接模式最常见的类图开始（见图 15-11）。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig11_HTML.png](img/433474_2_En_15_Fig11_HTML.png)\n\
    \n图 15-11 一个经典的桥接模式示例\n\n术语描述如下：\n\n*   **抽象**\n    ：它定义了抽象接口并维护对`Implementor`的引用。在我们的示例中，它是一个抽象类。\n\
    \n*   **细化抽象**\n    ：它扩展了由抽象定义的接口。在我们的示例中，它是一个具体类。\n\n*   **实现者**\n    ：它为实现类定义了接口。在我们的示例中，它是一个接口。\n\
    \n*   **具体实现者**\n    ：在我们的示例中，它是一个具体类。它实现了`Implementor`接口。\n\n我在以下实现中遵循了类似的架构。为了方便你参考，我在以下实现中用注释指出了所有参与者。\n\
    \n类图\n\n图 15-12 显示了类图。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig12_HTML.jpg](img/433474_2_En_15_Fig12_HTML.jpg)\n\
    \n图 15-12 类图\n\n包资源管理器视图\n\n图 15-13 显示了程序的高级结构。\n\n![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig13_HTML.jpg](img/433474_2_En_15_Fig13_HTML.jpg)\n\
    \n图 15-13 包资源管理器视图\n\n实现\n\n以下是以下实现的关键特征：\n\n*   抽象类`ElectronicGoods`扮演抽象的角色，接口`State`扮演实现者的角色。\n"
- fmt: "- 具体的实现类是`OnState`类和`OffState`类。它们根据各自的需求实现了接口方法`moveState()`和`hardPressed()`。\n\
    - 抽象类`ElectronicGoods`持有一个实现者`State`的引用。\n- 抽象方法将实现委托给实现者对象。例如，注意`hardButtonPressed()`实际上是`state.hardPressed()`的简写，其中`state`是实现者对象。\n\
    - 有两个精炼的抽象：`Television`和`DVD`。`Television`类对其从父类继承的方法感到满意。但`DVD`类希望提供一个额外的功能。因此，它实现了一个DVD特有的方法`doublePress()`。方法`doublePress()`仅使用超类抽象进行编码。\n\
    \n```java\npackage java2e.chapter15;\n//Abstraction\nabstract class ElectronicGoods\n\
    {\n//Composition - implementor\nprotected State state;\n/*Alternative approach:\n\
    You can also pass an implementor (as input argument) inside a constructor.\n*/\n\
    /*public ElectronicGoods(State state)\n{\nthis.state = state;\n}*/\npublic State\
    \ getState()\n{\nreturn state;\n}\npublic void setState(State state)\n{\nthis.state\
    \ = state;\n}\n/*Implementation specific:\nWe are delegating the implementation\
    \ to the Implementor object.\n*/\npublic void moveToCurrentState()\n{\nSystem.out.print(\"\
    The electronic item is functioning at : \");\nstate.moveState();\n}\npublic void\
    \ hardButtonPressed()\n{\nstate.hardPressed();\n}\n}\n//Refined Abstraction\n\
    //Television does not want to modify any super class method.\nclass Television\
    \ extends ElectronicGoods\n{\n/*public Television(State state)\n{\nsuper(state);\n\
    }*/\n}\n/*DVD class also ok with the super class method.\nIn addition to this,\
    \ it uses one additional method*/\nclass DVD extends ElectronicGoods\n{\n/*public\
    \ DVD(State state)\n{\nsuper(state);\n}*/\n/* Notice that following DVD-specific\
    \ method is coded with super class methods but not with the implementor (State)\
    \ method. So, this approach will allow to vary the abstraction and implementation\
    \ independently.\n*/\npublic void doublePress() {\nhardButtonPressed();\nhardButtonPressed();\n\
    }\n}\n//Implementor\ninterface State\n{\nvoid moveState();\nvoid hardPressed();\n\
    }\n//A Concrete Implementor.\nclass OnState implements State\n{\n@Override\npublic\
    \ void moveState()\n{\nSystem.out.print(\"On State\\n\");\n}\n@Override\npublic\
    \ void hardPressed()\n{\nSystem.out.print(\"\\tThe device is already On.Do not\
    \ press the button so hard.\\n\");\n}\n}\n//Another Concrete Implementor.\nclass\
    \ OffState implements State\n{\n@Override\npublic void moveState()\n{\nSystem.out.print(\"\
    Off State\\n\");\n}\n@Override\npublic void hardPressed()\n{\nSystem.out.print(\"\
    \\tThe device is Offline now.Do not press the off button again.\\n\");\n}\n}\n\
    class BridgePatternDemo {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    ***Bridge Pattern Demo***\\n\");\nSystem.out.println(\"Dealing with a Television\
    \ at present.\");\nState presentState = new OnState();\n//ElectronicGoods eItem\
    \ = new Television(presentState);\nElectronicGoods eItem = new Television();\n\
    eItem.setState(presentState);\neItem.moveToCurrentState();\n//hard press\neItem.hardButtonPressed();\n\
    //Verifying Off state of the Television now\npresentState = new OffState();\n\
    //eItem = new Television(presentState);\neItem.setState(presentState);\neItem.moveToCurrentState();\n\
    System.out.println(\"\");\nSystem.out.println(\"Dealing with a DVD now.\");\n\
    presentState = new OnState();\n//eItem = new DVD(presentState);\neItem = new DVD();\n\
    eItem.setState(presentState);\neItem.moveToCurrentState();\npresentState = new\
    \ OffState();\n//eItem = new DVD(presentState);\neItem = new DVD();\neItem.setState(presentState);\n\
    eItem.moveToCurrentState();\n//hard press-A DVD specific method\n//(new DVD(presentState)).doublePress();\n\
    ((DVD)eItem).doublePress();\n/*If you uncomment the following line of code, it\
    \ will cause error because a television object does not have this method.*/\n\
    //(new Television(presentState)).doublePress();\n}\n}\n```\n\n输出：\n\n```\n***Bridge\
    \ Pattern Demo***\nDealing with a Television at present.\nThe electronic item\
    \ is functioning at : On State\nThe device is already On. Do not press the button\
    \ so hard.\nThe electronic item is functioning at : Off State\nDealing with a\
    \ DVD now.\nThe electronic item is functioning at : On State\nThe electronic item\
    \ is functioning at : Off State\nThe device is Offline now. Do not press the off\
    \ button again.\nThe device is Offline now. Do not press the off button again.\n\
    ```\n\n## Q&A Session\n\n**15.13 在这个例子中，我看到很多死代码。你为什么保留它们？**  \n许多工程师更喜欢构造函数而不是\
    \ getter/setter 方法。你可以在不同的实现中看到这些变体。我保留它们是为了方便你参考，你可以自由使用其中任何一种。\n\n**15.14 你可以使用简单的子类化而不是这种设计。这个理解正确吗？**\
    \  \n不正确。使用简单的子类化，你的实现无法动态变化。虽然看起来通过子类化技术实现可能表现不同，但实际上，这种变化在编译时就已经绑定到抽象上了。\n\n\
    **15.15 我最近学习了状态模式，看到了很多相似之处。这个理解正确吗？**  \n不正确。本书中没有描述状态模式。它们在我的另一本书《Java 设计模式（第二版）》（Apress，2019）中有详细描述。如果你需要，可以参考那本书。但如果你熟悉它，你会发现状态模式属于行为模式类别，其意图不同。在本章中，我展示了一个电子物品可以处于不同状态的例子，但关键意图是展示以下几点：\n\
    \n- 如何避免物品与其状态之间的紧密耦合？\n- 如何维护两个不同的层次结构，使它们可以独立扩展而不相互影响？\n- 如何处理多个对象之间共享实现的情况？\n\
    \n带着这些理解，仔细阅读附在此实现上的注释，以便更好地理解。我还想提请你注意 DVD 特有的方法`doublePress()`。请注意，它是用超类方法构建的，而这些方法又将实现委托给`implementor`对象（在本例中是一个状态对象）。这种方法将允许你独立地变化抽象和实现，这是桥接模式的关键目标。\n\
    \n**15.16 使用桥接设计模式的主要优点是什么？**  \n以下是使用此模式的主要优点：\n\n- 实现不与抽象绑定。\n- 抽象和实现都可以独立增长。\n\
    - 具体类独立于接口实现者类——即，一个层次结构中的变化不会影响另一个层次结构。因此，你还可以以不同的方式变化接口和具体实现。\n\n**15.17 与此模式相关的挑战是什么？**\
    \  \n以下是使用此模式时的主要挑战：\n\n- 整体结构可能变得复杂。\n- 有时会与适配器模式混淆。（你可以记住，适配器模式的关键目的是仅处理不兼容的接口。）\n\
    \n**15.18 假设我只有一个状态——要么是`OnState`要么是`OffState`。在这种情况下，我需要使用接口`State`吗？**"
