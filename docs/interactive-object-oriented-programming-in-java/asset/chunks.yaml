    public class TestCodeDemonstration6 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-6.Use of lower-bound wildcard types in generic
    programming.***");

    //Two Vehicle objects

    Vehicle vehicle1=new Vehicle();

    Vehicle vehicle2=new Vehicle();

    // Two Bus objects

    Bus bus1 = new Bus();

    Bus bus2 = new Bus();

    // Two Rocket objects

    Rocket rocket1 = new Rocket();

    Rocket rocket2 = new Rocket();

    // List of vehicles

    ArrayList vehicles = new ArrayList();

    // Adding two vehicles in the list

    vehicles.add(vehicle1);

    vehicles.add(vehicle2);

    // Adding two buses in the list

    vehicles.add(bus1);

    vehicles.add(bus2);

    constructAllVehicles(vehicles);//ok

    // List of rockets

    ArrayList rockets = new ArrayList();

    // Adding two rockets in the list

    rockets.add(rocket1);

    rockets.add(rocket2);

    //constructAllVehicles(rockets);// Error: Not applicable for //ArrayList when
    you use the lower bound wildcard

    }

    // Construct all vehicles in the list

    public static void constructAllVehicles(List vehicleList) {

    System.out.println("\nHere is the vehicle list for you : ");

    //Compile-time error:Add cast to vehicle

    //vehicleList.forEach((vehicle) ->  vehicle.constructBody());

    /*

    //Runtime error:Vehicle cannot be cast to Bus

    //vehicleList.forEach((vehicle) -> ((Bus) vehicle).constructBody());

    */

    vehicleList.forEach((bus) -> ((Vehicle) bus).constructBody());//Ok

    }

    }

    ```


    Output:


    ```

    ***Demonstration-6.Use of lower-bound wildcard types in generic programming.***

    Here is the vehicle list for you :

    One basic structure is formed.

    One basic structure is formed.

    Bus completed.It can move on road now. The bus count=1

    Bus completed.It can move on road now. The bus count=2

    ```


    You can see that `<? super Bus>` in the method argument helps you to call the
    method with `ArrayList<Bus>` and `ArrayList<Vehicle>` because `Vehicle` is the
    supertype of `Bus`. But you cannot use the method when you use `ArrayList<Rocket>`,
    because `Rocket` is not a supertype of `Bus`.


    ### Unbounded Wildcard


    Wildcards can be unbounded. You can use the concept of unbounded wildcards when
    you use just the wildcard character (`?`). Let’s modify the method `constructAllVehicles()`
    in Demonstration 6 as follows:


    ```

    //The use of an unbounded wildcard

    public static void constructAllVehicles(List vehicleList) {

    System.out.println("\nHere is the vehicle list for you : ");

    vehicleList.forEach((anyVehicle) -> ((Vehicle) anyVehicle).constructBody());//Ok

    }

    ```


    Here, `List<?>` is used to denote a list of unknown types. You can also uncomment
    the following code in Demonstration 6, as follows:


    ```

    constructAllVehicles(rockets);// Error: Not applicable for //ArrayList when you
    use the lower-bound wildcard

    ```


    This time there is no compile-time error, and you will receive the following output:


    ```

    ***Demonstration-6.Use of lower-bound wildcard types in generic programming.***

    Here is the vehicle list for you :

    One basic structure is formed.

    One basic structure is formed.

    Bus completed.It can move on road now. The bus count=1

    Bus completed.It can move on road now. The bus count=2

    Here is the vehicle list for you :

    Rocket constructed.It can move into space now. The rocket count=1

    Rocket constructed.It can move into space now. The rocket count=2

    ```


    Notice the bold lines of the output. You can see that now `Rocket` objects can
    also invoke the `constructAllVehicles(List<?> vehicleList)` method.


    ### Points To Remember


    You can use generic types, which can contain wildcards as parameter types, fields,
    or local variables, but not as a type argument for generic methods’ invocation.
    They should not be used for generic class instance creation or supertypes. You
    can refer to Demonstration 6A for a better understanding.


    ### Q&A Session


    **12.1 Are `List<?>` and `List<? extends Object>` the same?**


    No. Let’s examine a case. Consider the following code segment:


    ```

    class Vehicle1Test {

    @Override

    public String toString() {

    return "Vehicle1Test type.";

    }

    }

    class Sub1VehicleTest extends Vehicle1Test {

    @Override

    public String toString() {

    return "Sub1VehicleTest type.";

    }

    }

    ```


    Now, you can write a method that is something like the following:


    ```

    public static void addElementsVersion2(List mylist) {

    mylist.add(new Vehicle1Test());// ok

    mylist.add(new Sub1VehicleTest());// ok

    mylist.add(null);// ok

    }

    ```


    But notice the commented code in the following method:


    ```

    public static void addElementsVersion1(List mylist) {

    // mylist.add(new Vehicle1Test());// error

    // mylist.add(new Sub1VehicleTest());// error

    mylist.add(null);// ok

    }

    ```


    In this example, you can add any object type or a subtype into `List<Object>`,
    but in case of `List<?>`, you can only add `null`. Java language specification
    (Jls 11 @ section 4.7) further tells us that `List<?>` is a reifiable type but
    `List<? extends Object>` is not.


    **12.2 What do you mean by reifiable types?**


    The type whose information is completely available during runtime is called a
    reifiable type. (You will later learn that some type information is erased during
    compile time, so it is possible that the complete type information is not available
    during runtime.)


    According to the language specification, a type is reifiable if and only if one
    of the following holds:


    *   It refers to a non-generic class or interface type declaration.

    *   It is a parameterized type in which all type arguments are unbounded wildcards.

    *   It is a raw type.

    *   It is a primitive type.

    *   It is an array type whose element type is reifiable.

    *   It is a nested type where, for each type `T` separated by a "`.`", `T` itself
    is reifiable.


    **12.3 Then what is the use of `List<?>`?**


    Sometimes you may just want to iterate through your collection. For example, consider
    the following program and output:


    ```

    package chapter12.testcodes;

    import java.util.ArrayList;

    import java.util.List;

    class Vehicle1Test {

    @Override

    public String toString() {

    return "Vehicle1Test type.";

    }

    }

    class Sub1VehicleTest extends Vehicle1Test {

    @Override

    public String toString() {

    return "Sub1VehicleTest type.";

    }

    }

    class Test1 {

    public static void main(String[] args) {

    System.out.println("***A sample test.An use of List***");

    Vehicle1Test vehicle1 = new Vehicle1Test();

    Vehicle1Test vehicle2 = new Sub1VehicleTest();

    List vehicles = new ArrayList();

    vehicles.add(vehicle1);// ok

    vehicles.add(vehicle2);// ok

    printElements(vehicles);// ok.An example of use //List in a //method argument

    }

    public static void addElementsVersion1(List mylist) {

    // mylist.add(new Vehicle1Test());// error

    // mylist.add(new Sub1VehicleTest());// error

    mylist.add(null);// ok

    }

    public static void addElementsVersion2(List mylist) {

    mylist.add(new Vehicle1Test());// ok

    mylist.add(new Sub1VehicleTest());// ok

    mylist.add(null);// ok

    }

    public static void printElements(List mylist) {

    mylist.forEach(element -> System.out.println(element));

    }

    }

    ```


    Output:


    ```

    ***A sample test.An use of List***

    Vehicle1Test type.

    Sub1VehicleTest type.

    ```


    **12.4 What is a raw type?**


    You will see a discussion of raw types in Demonstration 10.


    **12.5 Can you present some valid and invalid statements showing when you use
    wildcards in your program?**


    Demonstration 6A can help you. Here, you can analyze different case studies.'
