    }

    }

    ```


    这一次，你会更早地捕获到错误，因为它是在编译时被捕获的（图 12-3）。你可以看到编译时错误消息，它清楚地表明你使用了 `String` 而不是 `Integer`。


    ![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig3_HTML.jpg](img/433474_2_En_12_Fig3_HTML.jpg)


    图 12-3


    你可以在泛型程序中尽早捕获错误


