    ### Q&A Session


    **10.10 I understand that Java does not support pointers. But I am seeing that
    it supports `NullPointerException`. I am confused.**


    You need to understand the scenario. When you perform some illegal operations
    (for example, when you invoke a method incorrectly or try to access some fields
    incorrectly) through a null object, you encounter this exception. This exception
    generally indicates that you are treating a null object as an actual object, so
    your intended operation is illegal. Yes, some developers believe that something
    like `NullReferenceException` could be a better name for this type of exception.


    At the same time, you also remember that Java designers believe that the use of
    pointers is one of the primary sources of injecting bugs into the application.
    So, they do not support any pointer datatypes.


    **10.11 It appears to me that I can suppress errors with exceptions. Am I right?**


    Yes. But it is never intended. Consider the following demonstration.


    ### Demonstration 11


    In this example, when you get the value of `b` as 0 (which is randomly generated),
    instead of reporting the true issue, you suppress the error by printing `c=7`,
    which is a total misuse of this feature.


    ```

    package java2e.chapter10;

    import java.util.Random;

    public class Demonstration11 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-11.Incorrect use of try-catch block***\n");

    int a = 10;

    Random randomGenerator = new Random();

    // Will generate 0 to 2.

    int b = randomGenerator.nextInt(3);

    System.out.println("b=" + b);

    int c = 0;

    try {

    c = a / b;

    System.out.println("c=" + c);

    } catch (ArithmeticException ex) {

    // printing c=7, after catching the exception

    System.out.println("c=" + 7);

    }

    }

    }

    ```


    Here is one **possible** output. You will get this output when you encounter an
    `ArithmeticException` and are using a `try-catch` block to suppress the true message,
    which is incorrect.


    ```

    ***Demonstration-11.Incorrect use of try-catch block***

    b=0

    c=7

    ```


    ### Q&A Session


    **10.12 Should I make my custom exceptions checked (or unchecked)?**


    If you can do something to recover from an exception, make it a checked exception;
    otherwise, make it unchecked. Based on your requirements, you can follow the approach
    of Demonstration 7 or Demonstration 8 to make your custom exception checked or
    unchecked.


    **10.13 You said earlier, “You may combine the original exception with your custom
    exception message and then rethrow it for better readability.” Can you show me
    a demonstration?**


    In the Java programming world, it’s very common to catch a built-in exception
    and rethrow the same exception via a custom exception for better readability and
    understanding. I discussed this regarding Demonstration 6.


    ### Demonstration 12


    Let’s modify Demonstration 6 so that you can experience the same:


    ```

    package java2e.chapter10;

    //A custom exception

    class InvalidIntegerInputException extends Exception {

    InvalidIntegerInputException(String msg,Throwable causeEx) {

    super(msg, causeEx);

    }

    }

    class Demonstration12 {

    static int c;

    static void divide(int a, int b) throws  InvalidIntegerInputException{

    try {

    b--;

    c = a / b;

    // some code

    } catch (ArithmeticException ex) {

    //Log it now

    System.out.println("a= " + a + " b= " + b);//a=100,b=0

    System.out.println("Message: " + ex.getMessage());

    // Now rethrow it

    throw new InvalidIntegerInputException(" The divisor becomes zero", ex);

    }

    }

    public static void main(String[] args) {

    System.out.println("***Demonstration-12.Rethrowing an exception which is wrapped
    in a custom exception.***");

    System.out.println("Actually, we are modifying the demonstration-6.");

    int a = 100, b = 1;

    try {

    divide(a,b);

    }

    catch (Exception ex) {

    System.out.println("Recaught the exception inside main() method.");

    System.out.println("a= " + a + " b= " + b);//a=100,b=1

    System.out.println("Here is the stackTrace :");

    ex.printStackTrace();

    }

    }

    }

    ```


    Output:


    ```

    ***Demonstration-12.Rethrowing an exception which is wrapped in a custom exception.***

    Actually, we are modifying the demonstration-6.

    a= 100 b= 0

    Message: / by zero

    Recaught the exception inside main() method.

    a= 100 b= 1

    Here is the stackTrace :

    java2e.chapter10.InvalidIntegerInputException:  The divisor becomes zero

    at java2e.chapter10.Demonstration12.divide(Demonstration12.java:23)

    at java2e.chapter10.Demonstration12.main(Demonstration12.java:32)

    Caused by: java.lang.ArithmeticException: / by zero

    at java2e.chapter10.Demonstration12.divide(Demonstration12.java:16)

    ... 1 more

    ```


    Notice the message “The divisor becomes zero” appeared in your output, which is
    the actual cause of the `ArithmeticException` in this program.'
