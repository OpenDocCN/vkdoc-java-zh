- fmt: 'It may appear to you that the output from the second run is expected, but
    the output from the first run is unexpected (because the main thread exited before
    the higher-priority thread). But, again, this output may vary in this demonstration.
    In theory, the higher-priority threads get more CPU time than the lower-priority
    threads, and they can preempt the lower-priority threads. But in real life, it
    may depend on many other factors; for example, the configuration of your system,
    how the operating system implements the concept of multi-tasking, etc. Apart from
    these factors, the output can vary based on what the thread is doing, how big
    the job is (for example, a small task can finish before it is preempted by a higher-priority
    thread), and so on. So, you should not explicitly rely on priorities. If a CPU
    is available, the lower-priority thread can also get a chance to run and can finish
    early if it does a very little job. In general, threads run asynchronously; hence,
    you see the random outputs.


    The output in Figure [11-2](#433474_2_En_11_Chapter.xhtml#Fig2) was generated
    when the previous program ran in a system with a configuration as shown (notice
    that it’s a dual-core system; it has a sixth-generation Intel® Core™ i5-6300 processor).


