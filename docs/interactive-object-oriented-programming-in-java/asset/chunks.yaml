    ### Raw Types


    When you refer to a generic type without specifying the type parameter, you create
    a raw type. For example, in Demonstration 2, we used the following line of code:


    ```

    MyGenericClass myGenericClassDoubleOb = new MyGenericClass();

    ```


    But instead of this, if we write something like the following, we create a raw
    type of `MyGenericClass<T>`:


    ```

    // Creating a raw type of MyGenericClass

    MyGenericClass rawOb = new MyGenericClass();

    ```


    So, `MyGenericClass` is a raw type of `MyGenericClass<T>`.


    The raw types were used to support the legacy code in the pre-generic era. To
    support backward compatibility, you can assign a parameterized type to a raw type,
    but when you do the reverse, you will get a warning message like the following:


    ```

    Type safety: The expression of type MyGenericClass needs unchecked conversion
    to conform to MyGenericClass

    ```


    This is because the compiler does not have sufficient information to ensure the
    type-safety. Here are some code segments with supporting comments for your reference:'
