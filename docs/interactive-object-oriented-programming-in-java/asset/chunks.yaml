    **5.11 What are the key benefits of method overriding?**


    Method overriding can help you to implement runtime polymorphism. Also, if a parent
    class has multiple child classes, each of the child classes can decide whether
    it wants to use the method from the parent class or wants its own specific implementation.


    **5.12 In method overloading, return types did not matter. But here it matters.
    Is this correct?**


    Yes. Here the child class method’s return type must be the same (or subclass type,
    which will be discussed later) as the parent class method’s return type (or, simply,
    both types must be compatible).


