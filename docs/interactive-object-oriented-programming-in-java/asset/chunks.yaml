    call


    If you remove `myMethod(boolean... a){}` from the preceding code, you’ll receive
    the following output:


    ```

    ***Demonstration-5.Testing Method overloading.***

    Inside myMethod(int... a)

    Inside myMethod(int a, int b)

    Inside myMethod(int... a)

    ```


