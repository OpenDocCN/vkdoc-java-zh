    **11.1 What is the key advantage of using a multi-threaded environment over a
    single-threaded environment?**


    In single-threaded environment, if the thread gets blocked, the entire program
    stops executing, which is not the case in a multi-threaded environment. In addition
    to this, you can reduce overall idle time via the efficient use of CPU. And later
    you’ll learn that you can avoid polling in multi-threaded environments.


    **11.2 I have a dual-core (or multi-core) system. Can multi-threading still help
    me?**


    In earlier days, most computers had a single core, and in those systems concurrent
    threads actually shared the CPU cycle; i.e., they could not run in parallel. But,
    by using the concept of multi-threading, you could reduce the overall idle time
    by the efficient use of CPU. And if you have multiple processors, you can run
    multiple threads concurrently. As a result, you can further enhance the speed
    of your program.


    **11.3 What is context switching?**


    It enables you to store the state of the current thread (or process) so that you
    can resume the execution from this point later.


    **11.4 Which approach should I use when I create threads? Should I extend the
    `Thread` class, or should I implement the `Runnable` interface?**


    It depends on your choice and many other constraints. If your class extends the
    `Thread` class, you cannot extend from any other class, because Java does not
    allow multiple inheritance through class. When you implement the `Runnable` interface,
    you can extend from another parent class.


    On the other hand, the `Runnable` interface has only one method, `run()`, which
    is also an abstract method (by interface definition). So, there is no fully built-in
    method available for your immediate use. But the `Thread` class has many built-in
    methods, like `yield()`, `sleep()`, `getName()`, `setName()`, etc. These methods
    can be used if your class extends from the `Thread` class. Also, you can have
    different types of constructors when you instantiate a `Thread` class.


    ### Demonstration 3


    Now consider Demonstration 3. Before you proceed, here are some important points
    to consider:


    *   This time I have created the thread using one of the overloaded versions of
    the `Thread` class constructor. In this version, I can supply the name of the
    thread during thread instantiation.

    *   I have also used some of the available methods from the `Thread` class; for
    example, `currentThread()`, `getName()`, `setName()`, `getPriority()`, and `setPriority()`.
    As said before, if you choose to create the thread by implementing the `Runnable`
    interface, these methods will not be available to you.

    *   The method `setPriority(int newPriority)` is used to set a priority of the
    thread. Java defines following priorities:


    ```

    //The minimum priority of a thread

    public final static int MIN_PRIORITY = 1;

    //The default priority of a thread

    public final static int NORM_PRIORITY = 5;

    ```


    ```

    //The maximum priority of a thread

    public final static int MAX_PRIORITY = 10;

    ```


    Here is the full implementation:


    ```

    package java2e.chapter11;

    class Thread3A extends Thread {

    public Thread3A(String name) {

    super(name);

    }

    public void run() {

    for (int i = 0; i < 10; i++) {

    System.out.println(this.getName() + " is executing and prints : "+ i);

    }

    System.out.println("Exit-"+ this.getName());

    }

    }

    class Thread3B extends Thread {

    public Thread3B(String name) {

    super(name);

    }

    public void run() {

    for (int i = 0; i < 10; i++) {

    System.out.println(this.getName() + " is executing.It is printing : "+i);

    }

    System.out.println("Exit-"+ this.getName());

    }

    }

    class Demonstration3 {

    public static void main(String[] args) throws InterruptedException {

    System.out.println("***Demonstration-3.Exploring multithreading by extending Thread
    class.***");

    // Get reference to Main thread

    Thread mainThread = Thread.currentThread();

    // Get the details of the Main thread

    System.out.println("Current thread: " + mainThread.getName() + " and priority:
    " +mainThread.getPriority());

    Thread3A thread3A = new Thread3A("Thread3A");

    thread3A.setPriority(Thread.MIN_PRIORITY);//1

    Thread3B thread3B = new Thread3B("Thread3B");

    // Updating the name of the thread-ThreadDemo4

    thread3B.setName("ThreadDemonstration3B");

    thread3B.setPriority(Thread.MAX_PRIORITY);//10

    System.out.println("Thread3A priority is " + thread3A.getPriority());

    System.out.println("ThreadDemonstration3B priority is " + thread3B.getPriority());

    thread3A.start();

    thread3B.start();

    for (int i = 0; i <10; i++) {

    System.out.println( mainThread.getName() + " is executing and prints : "+ i);

    }

    System.out.println("Exit main()");

    }

    }

    ```


