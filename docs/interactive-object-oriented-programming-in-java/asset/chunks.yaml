    if, and only if, you do not provide any constructor. But, in this example, you
    already have a parameterized constructor. So, in this case, the compiler will
    not provide the default parameterless constructor for you.


    If you want to remove this compilation error, you have the following choices:


    *   You can define one more custom constructor, like this:


    *   You can remove the custom constructor declaration (that you already defined
    but have not used) from this program.


    *   You can supply the necessary integer argument inside your `main()` method,
    like this:


    ```

    public ConsEx2() { }

    ```


    ```

    ConsEx2 ob = new ConsEx2(25);

    ```


    **2.7 Can I say that a class is a custom type?**


    In general, the answer is yes. But at the same time, you need to remember that
    Java also has many built-in classes (for example, `Array`, `String`, etc.). In
    our prior demonstrations, you have seen the use of our own classes, which are
    nothing but custom classes.


    **2.8 Can you elaborate on the concept of reference?**


    Suppose you have a simple class like the following:


    ```

    class ClassA

    {

    //An instance variable

    int a;

    //An instance method, for example:

    void someMethod()

    {

    //Some code

    }

    }

    ```


    When you write `ClassA obA=new ClassA();` an instance of `ClassA` will be created
    in memory, and it creates a reference to that instance and stores the result inside
    the `obA` variable. So, you can say objects in memory are referenced by an identifier
    called a reference.


    In Java, more broadly, you will use two different kinds of variables—one is primitive
    and the other is an object reference. It is similar to a pointer or an address,
    but you do not know (or care) about what resides inside your reference variable.


    Simply, a reference provides a way to access an object. When you write


    ```

    ClassA obA;

    ```


    `obA` refers to `null`. But when you write


    ```

    ClassA obA=new ClassA();

    ```


    `obA` is initialized with an object of `ClassA`, and you say that `obA` is a reference
    to an object of `ClassA`.'
