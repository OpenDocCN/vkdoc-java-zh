    You can see that `List<Vehicle>` is more restrictive than `List<? extends Vehicle>`.
    Here, you are relaxing the restriction by using wildcards. As a result, the `constructAllVehicles(`**`List<?
    extends Vehicle>`** `vehicleList)` can be applied with both the `ArrayList<Vehicle>`
    and `ArrayList<any subtype of Vehicle>` (i.e., with `ArrayList<Bus>` and `ArrayList<Rocket>`
    in this example). So, the `? extends Vehicle` syntax simply helps the compiler
    to match the type `Vehicle` or any subtype of `Vehicle`. This is why we say that
    the `extends` clause sets an upper bound when you use it with a wildcard.


    ### Points To Remember


    It should be noted that `extends` in this context is used in a general sense,
    which can mean either extends in classes or implements in interfaces.


    ### Lower-bound Wildcard


    You have just learned that when you use the expression `<? extends Vehicle>` in
    the argument of a method, you can invoke the method for the `Vehicle` class or
    any of its subclasses. So, the `Vehicle` class here acts as the upper bound. Similarly,
    you can set the lower bound of a wildcard when you use the expression `<? super
    Vehicle>`. In this case, the acceptable arguments are `Vehicle` and its super
    class. So, you can roughly interpret the expression `<? super T>` as “either the
    class `T` or any super class of `T`.”'
