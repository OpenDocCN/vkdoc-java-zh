    **3.9 What is a memory leak?**


    In general, when a computer program runs over a long period of time but fails
    to release memory resources that are no longer needed, you can feel the impact
    of memory leaks (for example, machines become slow over time, or, in the worst
    case, they can crash). With this information, it is apparent that “how fast it
    comes to our attention” depends on the leaking rate of our application.


    Consider a very simple example. Suppose that you have an online application where
    users need to fill in some data and then click a ‘Submit’ button. Now, assume
    that the developers of the application mistakenly forgot to deallocate some memory
    that is no longer needed once a user presses the Submit button, and due to this
    misjudgment, the application is leaking 512 bytes per click. You probably won’t
    notice any performance degradation in some initial clicks. But what happens if
    thousands of online users are using the application simultaneously? If 100,000
    users press the Submit button, you will eventually lose 48.8 MB of memory; 10,000,000
    clicks leads to the loss of 4.76 GB; and so on.


    In short, even if your application or program is leaking a very small amount of
    data per execution, you will see some kind of malfunctioning over a period of
    time; for example, operations in the device might become so slow that you need
    to restart the application often.


    In an unmanaged language like C++, you need to deallocate the memory when the
    intended job is done; otherwise, over a period of time, the impact of memory leaks
    will be huge. Java’s garbage-collection mechanism rescues us from most of these
    cases. Still, there are instances that you may need to handle with care; otherwise,
    you may notice the impact of memory leaks.


    There are many tools available on the market to detect memory leaks. Still, many
    organizations prefer to use their own memory-leak tool to detect and analyze leaks.


    **3.10 What do you mean by automatic garbage collection?**


    It is a process that investigates the heap memory and identifies which objects
    are in use and which are not. Then, it deletes the unused object. In this context,
    you may notice the following terms:


    A *referenced object*: It means that the object is currently in use. In other
    words, in your program, there is still a pointer to this object.


    An *unreferenced object*: This object is no longer referenced by any part of the
    program, so GC can reclaim the memory occupied by the unused object.


    After these deletion operations, to improve performance, the compaction technique
    can be used. (In very simple words, a compaction technique moves all free blocks
    of memory to one contiguous location and all occupied block in a different location.
    As a result, if needed, you can allocate a large block of memory which may not
    possible when available memories are scattered or the memory pool is fragmented.
    After the compaction, objects generally stay in the same area, so, accessing them
    also becomes faster and easier.)


    **3.11 You used the term “root object” when discussing garbage collection. What
    does it mean?**


    This may seem a little bit complicated at this stage. In simple words, you should
    just know that objects are allocated on a heap area, which is managed by JVM.
    You can draw/imagine a tree that connects all these objects. In general, you say
    an object is live if you have a reference to it. Now, the question is—what is
    the first reference in the tree?


    To answer this question, you need to know that an object tree can have one or
    more roots. When your application can reach these roots, the entire tree is reachable.
    Consider the following figure (Figure [3-2](#433474_2_En_3_Chapter.xhtml#Fig2))
    to understand it better. From this figure, you can see that reachable objects
    are those that can be reached only through a root object. Otherwise, even if there
    is a link between the objects, those objects are treated as unreachable and can
    be garbage collected.


    ![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig2_HTML.jpg](images/433474_2_En_3_Chapter/433474_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Root objects, reachable code, and unreachable code in an object tree


    **3.12 How can I mark an object as unreachable?**


    You make sure the object (which you want to mark eligible for garbage collection)
    does not have any references that are still in the scope of your Java application.
    Commonly, you set such a reference to `null`. You can also assign these references
    to point to some other object, or you can allow them to go out of scope.


    ### Demonstration 8


    Consider a simple case with the following program:


    ```

    package java2e.chapter3;

    class Student{

    //Some code

    }

    class GarbageCollectionDemo {

    public static void main(String args[]) {

    Student student1, student2, student3;

    student1 = new Student();// Student#1

    student2 = new Student();// Student#2

    student3 = new Student();// Student #3

    student1 = null;//Case-1.

    student3 = student2;//Case-2

    student2 = null;//Case-2 Contd.

    }// End of main()

    }

    ```


    Notice that here you have created three `Student` class objects inside your `main()`
    method. Now consider the following cases:


    #### Stage 1


    Three objects and three reference variables are created.


    ```

    student1 = new Student();// Student#1

    student2 = new Student();// Student#2

    student3 = new Student();// Student #3

    ```


    See Figure [3-3](#433474_2_En_3_Chapter.xhtml#Fig3).


    ![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig3_HTML.jpg](images/433474_2_En_3_Chapter/433474_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Memory allocation after Stage 1


    #### Stage 2


    When you assign `student1=null`, the `Student#1` object is now eligible for garbage
    collection. See Figure [3-4](#433474_2_En_3_Chapter.xhtml#Fig4).


    ![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig4_HTML.jpg](images/433474_2_En_3_Chapter/433474_2_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Memory allocation after Stage 2


    #### Stage 3


    When you write


    ```

    student3=student2;

    ```


    both `student2` and `student3` refer to `Student#2`. And the `Student#3` object
    is now eligible for garbage collection. See Figure [3-5](#433474_2_En_3_Chapter.xhtml#Fig5).


    ![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig5_HTML.jpg](images/433474_2_En_3_Chapter/433474_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Memory allocation after Stage 3


    #### Stage 4


    In this stage, even if you write


    ```

    student2=null;

    ```


    `Student#2` still has a reference (`student3`) to it. So, it is not eligible for
    garbage collection yet.


    In this case, the reference `student3` can go out of scope at the end of `main()`
    only. But you can make it `null` before the end of `main()` to make it eligible
    for garbage collection much earlier.'
