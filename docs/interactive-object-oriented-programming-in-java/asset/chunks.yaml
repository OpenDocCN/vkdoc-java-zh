    \ try to cast to a derived type.\n\n*   Now, let’s do a quick check of how the\
    \ concept is implemented in a similar programming language; for example, C#. If\
    \ you are familiar with the C# language, you may notice the use of the keywords\
    \ `virtual` and `override` in the examples of method overriding. For example,\
    \ here is a C# code snippet:\n\n    ```\n    class Vehicle\n    {\n    public\
    \ virtual void ShowMe()\n    {\n    Console.WriteLine(\"Inside Vehicle.ShowMe\"\
    );\n    }\n    }\n    class Bus : Vehicle\n    {\n    public override void ShowMe()\n\
    \    {\n    Console.WriteLine(\"Inside Bus.ShowMe\");\n    }\n    public void\
    \ BusSpecificMethod()\n    {\n    Console.WriteLine(\"Inside Bus.ShowMe\");\n\
    \    }\n    }\n    ```\n\n*   In C#, if you want to override a parent class method\
    \ in the derived class, mark the parent class method with ‘virtual’ keyword. But\
    \ in C#, all methods are by default non-virtual*.* In the derived class, by tagging\
    \ a method with the keyword `override`, you deliberately redefine the corresponding\
    \ virtual method. So, in C#, you need to tag the keyword `override` to avoid any\
    \ unconscious overriding. C# also uses another keyword, `new`, to mark a method\
    \ as non-overriding. But, in Java, things are straightforward because all methods\
    \ are virtual by default."
