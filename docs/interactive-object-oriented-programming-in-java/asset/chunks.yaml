    ### 注意


    在多线程 Java 程序中，你可能会注意到使用了抢占式调度，其中高优先级线程会抢占低优先级线程。但你已经看到，这种行为并不总是确定的。该行为还取决于底层平台。理论上，两个相同优先级的线程不能互相抢占，这在非抢占式环境中可能会产生问题。因此，对于相同优先级的线程，最好基于某些条件（例如，等待
    I/O 操作等）释放控制权，以便每个线程都能运行并完成其任务。


    ## 不同线程类方法的案例研究


