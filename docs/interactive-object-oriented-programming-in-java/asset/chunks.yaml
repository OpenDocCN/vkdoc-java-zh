    # 4. The Concept of Inheritance


    The main objective of inheritance is to promote reusability and eliminate redundancy
    in code. It also demonstrates how a child class can obtain the features (or characteristics)
    of its parent class. Since a parent class is placed at a higher level in the class
    hierarchy, and a child class can derive from it. A child class is often referred
    to as a **derived class** or **subclass**. A parent class is also referred to
    as a **super class**.


    ## Types of Inheritance


    In general, you will deal with four types of inheritance. In Java, a class can
    inherit from another class using the `extends` keyword. For your easy reference,
    I present you with a summarized description for each type of inheritance.


    ### Single Inheritance


    A child class is derived from one parent class. Here is a sample diagram (Figure
    [4-1](#433474_2_En_4_Chapter.xhtml#Fig1)) and code for this type of inheritance.


    ![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig1_HTML.jpg](images/433474_2_En_4_Chapter/433474_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Single inheritance


    Sample code:


    ```

    class Parent

    {

    //Your code...

    }

    class Child extends Parent

    {

    //Your code...

    }

    ```


    ### Hierarchical Inheritance


    Multiple child classes can be derived from one parent class. Here is a sample
    diagram (Figure [4-2](#433474_2_En_4_Chapter.xhtml#Fig2)) and code for this type
    of inheritance.


    ![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig2_HTML.jpg](images/433474_2_En_4_Chapter/433474_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Hierarchical inheritance


    Sample code:


    ```

    class Parent

    {

    //Your code...

    }

    class Child1 extends Parent

    {

    //Your code...

    }

    class Child2 extends Parent

    {

    //Your code...

    }

    ```


    ### Multi-level Inheritance


    The parent class can have a grandchild. Here is a sample diagram (Figure [4-3](#433474_2_En_4_Chapter.xhtml#Fig3))
    and code for this type of inheritance.


    ![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig3_HTML.jpg](images/433474_2_En_4_Chapter/433474_2_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Multi-level inheritance


    Sample code:


    ```

    class Parent

    {

    //Your code...

    }

    class Child extends Parent

    {

    // Your code..

    }

    class Grandchild extends Child

    {

    // Your code...

    }

    ```


    ### Multiple Inheritance


    A child can derive from multiple parents. But this type of inheritance is not
    supported in Java through classes. You would need to learn about interfaces. Here
    is a sample diagram (Figure [4-4](#433474_2_En_4_Chapter.xhtml#Fig4)) and code
    for this type of inheritance.


    ![../images/433474_2_En_4_Chapter/433474_2_En_4_Fig4_HTML.jpg](images/433474_2_En_4_Chapter/433474_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Multiple inheritance


    Sample code:


    ```

    interface MyInterface1

    {

    // Your code

    }

    interface MyInterface2

    {

    //Your code

    }

    class MyClass implements MyInterface1,MyInterface2

    {

    //Some code

    }

    ```


    ### Note


    1\. Java does not support multiple inheritance (through classes); that is, a child
    class cannot derive from more than one parent class. To deal with this type of
    situation, you need to understand interfaces.


    2.There is another type of inheritance known as **hybrid inheritance.** It is
    a combination of two or more types of inheritances.'
