  trans: "\n# 8. 理解类变量和类方法\n\n有时开发者不希望通过对类型的实例进行操作，而是更倾向于直接对类型本身进行操作。类变量或类方法的概念就出现在这些场景中。它们通常被称为**静态变量**或**静态方法**。\n\
    \n让我们考虑一种情况：你希望一个变量能被某个类的所有对象共享，无论从该类创建了多少个对象。其他时候，你可能也希望维护一个单一的副本来处理某些特定场景；例如，当你维护一个日志文件时。在这种情况下，你会使用类变量和类方法的概念。\n\
    \n在 Java 中，嵌套类本身可以是静态的。当你将关键字 `static` 放在嵌套类前面时，它是一个嵌套静态类；当它被标记在方法上时，它被称为静态方法；当它与变量关联时，它被称为静态变量。\n\
    \n在继续之前，你需要记住以下几点：\n\n*   Java 不允许我们创建顶层的静态类。包含静态类的类被称为外部类。非静态的嵌套类被称为内部类。为了方便你参考，你应该记住以下内容：\n\
    \n    ```\n    class OuterClass//不能是静态的\n    {\n    //可能包含一些代码\n    class NestedClass\
    \ // 可以是静态的或非静态的\n    {\n    //可能包含一些代码\n    }\n    }\n    ```\n\n*   Java 语言规范（第\
    \ 11 版）指出，你不能将枚举类型放在内部类的主体中。这是因为嵌套的枚举类型隐式是静态的，而内部类除了常量变量外，不能拥有静态成员。\n\n## 类变量和类方法\n\
    \n在第 3 章中，你已经对静态类和静态方法有了一个非常简单的概述。在本章中，你将更详细地探讨它。为了理清思路，让我们从一个包含静态和非静态成员的简单示例开始。在这个演示中，请注意那些支持的注释，它们只是告诉你静态字段应该以静态方式访问。\n\
    \n### 演示 1\n\n在下面的程序中，你有一个 `Rectangle` 类，它有一个 `area()` 方法。该方法被标记了 `static` 关键字，因此你可以像\
    \ `Rectangle.area()` 那样调用该方法。在这种情况下，你不需要创建 `Rectangle` 类的对象来调用该方法。\n\n```\npackage\
    \ java2e.chapter8;\nclass Rectangle {\n//静态成员\nstatic double length=25.5, breadth=10.0;\n\
    static String myStaticString=\"我是一个静态字符串\";\n//非静态成员\nint myNonStaticInt=25;\n\
    public static double area() {\nreturn length * breadth;\n}\n}\nclass Demonstration1\
    \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***演示-1. 探索类变量和类方法。***\\\
    n\");\nSystem.out.println(\"矩形的面积是 \" + Rectangle.area() + \" 平方单位\");\nSystem.out.println(\"\
    myStaticString 是 : \" + Rectangle.myStaticString);\nRectangle rectOb=new Rectangle();\n\
    System.out.println(\"myNonStaticInt 是 : \" + rectOb.myNonStaticInt);\n//警告：静态字段\
    \ Rectangle.myStaticString 应该以静态方式访问\n//System.out.println(\"myStaticString 是\
    \ : \" + rectOb.myStaticString);\n}\n}\n```\n\n输出：\n\n```\n***演示-1. 探索类变量和类方法。***\n\
    矩形的面积是 255.0 平方单位\nmyStaticString 是 : 我是一个静态字符串\nmyNonStaticInt 是 : 25\n```\n\n\
    ## 使用嵌套类\n\n现在，请仔细阅读演示 2，然后分析嵌套静态类的重要特性。\n\n### 演示 2\n\n这个演示还将帮助你注意到嵌套静态类和非静态嵌套（或内部）类之间的区别。\n\
    \n以下是本演示中需要注意的重要点。\n\n![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig1_HTML.jpg](img/433474_2_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1\n\n你不能使用静态引用来引用非静态字段\n\n*   在这个程序中，顶层类 `Rectangle2` 包含两个嵌套类——`StaticRectangle2`\
    \ 和 `InnerClass2`。顾名思义，`StaticRectangle2` 是一个静态嵌套类，而 `InnerClass2` 是一个非静态嵌套类（或内部类）。\n\
    \n*   注意内部类是如何实例化的。内部类位于外部类内部，因此你需要先实例化外部类。我在一行代码中实例化了它，但它可以分成以下两行，这在演示代码的注释中已显示。\n\
    \n    ```\n    Rectangle2 rect2=new Rectangle2();\n    Rectangle2.InnerClass2\
    \ innerOb2=rect2.new InnerClass2();\n    ```\n\n*   在 `staticDisplay()` 内部，如果你取消注释下面这行：\n\
    \n    ```\n    //System.out.println(\"nonStaticOuterInt 是 : \" + nonStaticOuterInt);\n\
    \    ```\n\n    你会遇到一个编译时错误，如图 8-1 所示：`无法对非静态字段 nonStaticOuterInt 进行静态引用`\n\n\
    因此，重要的是要注意，在静态类内部只能访问外部类的静态成员。但是内部类可以访问外部类的静态和非静态成员（注意 `nonStaticDisplay()` 方法在访问外部类的变量时没有任何问题）。\n\
    \n```\npackage java2e.chapter8;\nclass Rectangle2 {\nstatic int staticOuterInt\
    \ = 25;\nint nonStaticOuterInt = 125;\n//静态类\nstatic class StaticRectangle2 {\n\
    void staticDisplay(){\nSystem.out.println(\"在静态类内部。\");\nSystem.out.println(\"\
    staticOuterInt 是 : \" + staticOuterInt);\n//System.out.println(\"nonStaticOuterInt\
    \ 是 : \" + nonStaticOuterInt);//错误\n}\n}\n//内部类\nclass InnerClass2 {\nvoid nonStaticDisplay(){\n\
    System.out.println(\"\\n 在内部类内部。\");\nSystem.out.println(\"staticOuterInt 是 :\
    \ \" + staticOuterInt);\nSystem.out.println(\"nonStaticOuterInt 是 : \" + nonStaticOuterInt);//正确\n\
    }\n}\n}\nclass Demonstration2 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    ***演示-2. 探索类变量和类方法。***\\n\");\nRectangle2.StaticRectangle2  nestedStaticOb=new\
    \ Rectangle2.StaticRectangle2();\nnestedStaticOb.staticDisplay();\n//实例化一个内部类\n\
    //内部类包含在外部类中，因此你需要先实例化外部类。\nRectangle2.InnerClass2 innerOb=new Rectangle2().new\
    \ InnerClass2();\n//或者，使用以下多行代码来实例化内部类，如下所示：\n/*Rectangle2 rect2=new Rectangle2();\n\
    Rectangle2.InnerClass2 innerOb2=rect2.new InnerClass2();*/\ninnerOb.nonStaticDisplay();\n\
    }\n}\n```\n\n输出：\n\n```\n***演示-2. 探索类变量和类方法。***\n在静态类内部。\nstaticOuterInt 是 : 25\n\
    在内部类内部。\nstaticOuterInt 是 : 25\nnonStaticOuterInt 是 : 125\n```\n\n### 需要记住的要点\n\
    \n*   在 Java 中，不允许有顶层的静态类。Java 中的静态类是嵌套的。\n\n*   非静态的嵌套类通常被称为**内部**类。\n\n*   在嵌套静态类内部只能访问外部类的静态成员。\n\
    \n*   要实例化一个内部类，你需要先实例化外部类。\n\n*   关键字 `static` 用于表示“可以像全局变量一样使用的单一事物”。一些开发者还认为静态方法比非静态方法更快。但是，需要记住的关键点是它们不属于任何实例。\n\
    \n*   你可能会注意到 `main(String[] args)` 方法是静态的。因此，你可以在不创建任何类实例的情况下调用此方法。\n"
- fmt: '### Q&A Session


    **8.1 In Demonstration 1, can I create an instance of the `Rectangle` class and
    then invoke the `area()` method?**


    That is not a recommended practice. In Eclipse editor, you will encounter a warning
    message for such an attempt. For example, if you uncomment the following line
    in that demonstration:


    ```

    //System.out.println("The myStaticString is : " + rectOb.myStaticString);

    ```


    you will get the following warning message (also shown in Figure 8-2): `The static
    field Rectangle.myStaticString should be accessed in a static way`.


    ![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig2_HTML.jpg](images/433474_2_En_8_Chapter/433474_2_En_8_Fig2_HTML.jpg)


    Figure 8-2: Warning message: The static field should be accessed in a static way.


    **8.2 Can I simulate the top-level static class behavior in Java?**


    As already said, in Java a top-level static class is not allowed. But you can
    simulate something close if you follow the example that is already present in
    Java. For example, notice that by using built-in `Math` class you can find the
    smaller of 12 and 15, as follows:


    ```

    System.out.println(" Minimum of (12,15) is "+ java.lang.Math.min(12, 15));

    ```


    In this case, the `Math` class is behaving like a top-level static class. If you
    open the `java.lang.Math` class declaration in Eclipse editor, you will see Figure
    8-3.


    ![../images/433474_2_En_8_Chapter/433474_2_En_8_Fig3_HTML.jpg](images/433474_2_En_8_Chapter/433474_2_En_8_Fig3_HTML.jpg)


    Figure 8-3: A partial snapshot of the `java.lang.Math` class details in Eclipse
    editor


    So, you can make your class final, make the constructor private, and make other
    members of the class static to simulate a behavior that is very close to a top-level
    static class.


    ## Initialization Blocks Versus Constructors


    In Java, constructors cannot be static. Instead, you can use initialization blocks,
    which can be either static or non-static. Non-static initialization blocks are
    also called instance blocks. In the upcoming demonstrations, you will experience
    both static and non-static initialization blocks.


    Static blocks have some important characteristics, as follows:


    - A static block will be executed exactly once, and it comes into the picture
    when the class is first loaded.

    - A static block can perform some common operations at the beginning of the execution
    flow. In general, they often initialize the static variables.

    - Inside a static block, you can refer only to static variables.

    - The following code segment presents a sample illustration of a static block
    inside a class. This code segment will be used in the upcoming demonstration.


    ```

    class Parent

    {

    int intInstanceParent;

    static int intStaticParent, count;

    static void testMethod() {

    count++;

    System.out.println("Inside static testMethod(), count ="+ count);

    }

    //The static block

    static {

    System.out.println("Inside static block of Parent");

    //intInstanceParent=10;//error

    intStaticParent=10;//ok

    testMethod();//ok

