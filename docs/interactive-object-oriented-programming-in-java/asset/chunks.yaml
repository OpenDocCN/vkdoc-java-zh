    To begin with, consider the following code segment. In this segment, `Vehicle`
    is the super class, and it has two subclasses: `Bus` and `Rocket`. Each of these
    classes has a `constructBody()` method to construct the particular instances.
    All of these classes also maintain a counter to track how many instances of these
    types are created. Here is the code segment:


    ```

    class Vehicle {

    static int basicVehicleCount;

    // Construct some basic structure of an individual vehicle

    public void constructBody() {

    basicVehicleCount++;

    System.out.println("One basic structure is formed.No of basic structure ="+ basicVehicleCount);

    }

    }

    class Bus extends Vehicle {

    static int busCount;

    @Override

    public void constructBody() {

    busCount++;

    System.out.println("Bus completed.It can move on road now. The bus count=" + busCount);

    }

    }

    class Rocket extends Vehicle {

    static int rocketCount;

    @Override

    public void constructBody() {

    rocketCount++;

    System.out.println("Rocket constructed.It can move into space now. The rocket
    count=" + rocketCount);

    }

    }

    ```


    Suppose you have stored these vehicles (`Vehicle`, `Bus`, or `Rocket`) in a collection—say,
    in an `ArrayList`. Now you want to invoke the `constructBody()` method for each
    instance in the `ArrayList`. So, you may start with code like the following:


    ```

    //May NOT work in this case

    public static void constructBody(List vehicleList) {

    System.out.println("\nHere is the vehicle list for you : ");

    vehicleList.forEach((vehicle) -> vehicle.constructBody());

    }

    ```


    This segment of code can work when you have an `ArrayList<Vehicle>` type. But
    interestingly, it will not work when you apply it to either the `ArrayList<Bus>`
    or `ArrayList<Rocket>` types. From the compiler’s point of view, `ArrayList<Bus>`
    or `ArrayList<Rocket>` are different from `ArrayList<Vehicle>`, though `Vehicle`
    is the supertype of `Bus` and `Rocket` (you can refer to the “One Final Suggestion”
    section at the end of the chapter). In this case, the compiler will suggest you
    introduce methods like


    ```

    static void constructAllVehicles(ArrayList rockets){//some code}

    ```


    or


    ```

    static void constructAllVehicles(ArrayList buses) {//some code}.

    ```


    If you follow those suggestions, the compiler will further complain with different
    errors, like those in Figure [12-4](#433474_2_En_12_Chapter.xhtml#Fig4).


