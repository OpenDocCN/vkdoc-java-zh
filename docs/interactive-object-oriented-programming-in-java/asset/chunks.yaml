    \n从 Java 11 开始，你将获得一些新的`String`类方法。在以下示例中，你将看到其中三个方法——`isBlank()`、`repeat()`和`strip()`。让我们看看它们的定义：\n\
    \n*   `isBlank()`：如果字符串为空或仅包含空白代码点，则此方法返回布尔值`true`；否则返回`false`。\n\n*   `repeat(int\
    \ n)`：返回一个字符串，其值为该字符串重复*n*次的连接结果。\n\n*   `strip()`：此方法返回一个字符串，其中所有前导和尾随空白已被移除。\n\
    \n## 演示 5\n\n考虑以下代码：\n\n```\nclass StringMethodsFromJava11 {\n    public static\
