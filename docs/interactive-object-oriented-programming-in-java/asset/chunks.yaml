    \ List{ //Invalid\n//Some code\n//}\nclass Test2 {\npublic static void main(String[]\
    \ args) {\nSystem.out.println(\"***Demonstration 6A.Some case study with wildcards***\"\
    );\nSample sample=new Sample();\n//Case Study-5:Wildcards in local variable\n\
    List myList = Arrays.asList(12,27,39);//Valid\nSystem.out.println(\"Original list\
    \ :\" + myList);\nCollections.reverse(myList);\nSystem.out.println(\"Reversed\
    \ List:\"+myList);\nsample.validMethodWithWildCardParameter(myList);\n}\n}\n```\n\
    \nHere is the output from Demonstration 6A.\n\n```\n***Demonstration 6A.Some case\
    \ study with wildcards***\nOriginal list :[12, 27, 39]\nReversed List:[39, 27,\
    \ 12]\nThe validMethodWithWildCardParameter(List myParameter) is a valid method.\n\
    ```\n\n## Bounded Type Parameter\n\nYou’ll learn shortly that wildcards cannot\
    \ solve all your problems efficiently. There is another option, called bounded\
    \ type parameters. They help you to restrict the types that you can use as the\
    \ type arguments in parameterized types.\n\nLet’s begin with a very simple use\
    \ case. Assume that you are dealing with some integers and doubles, and you want\
    \ to make a generic class that should have a method to calculate the sum of these\
    \ values. You understand the following:\n\n*   You can create a method with the\
    \ return type `double` to serve your purpose.\n*   You are using generics, so\
    \ you need to consider a wrapper class for `int` and `double`. `Integer` is the\
    \ wrapper for `int`, and `Double` is the wrapper for `double`.\n*   `Integer`\
    \ and `Double` are subclasses of the `Number` class, which has methods like `intValue()`,\
    \ `longValue()`, `floatValue()`, `doubleValue()`, and `byteValue()`. Let’s see\
    \ from Eclipse IDE what the method `doubleValue()` does. Figure [12-5](#433474_2_En_12_Chapter.xhtml#Fig5)\
    \ is a snapshot from Eclipse.\n\n    ![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig5_HTML.jpg](images/433474_2_En_12_Chapter/433474_2_En_12_Fig5_HTML.jpg)\n\
    \n    Figure 12-5\n\n    A snapshot of the `doubleValue()` method details from\
    \ Eclipse IDE\n\n*   Since `doubleValue()` is an abstract method, its concrete\
    \ subclasses must implement this method. Now, let’s check how the `Integer` class\
    \ implements the `doubleValue()` method. Here it is:\n*   Now, let’s also check\
    \ how the `Double` class implements the `doubleValue()` in the `Number` class:\n\
    \n```\n/**\n* Returns the value of this {@code Integer} as a {@code double}\n\
    * after a widening primitive conversion.\n* @jls 5.1.2 Widening Primitive Conversions\n\
    */\npublic double doubleValue() {\nreturn (double)value;\n}\n```\n\n```\n/**\n\
    * Returns the {@code double} value of this {@code Double} object.\n* @return the\
    \ {@code double} value represented by this object\n*/\npublic double doubleValue()\
    \ {\nreturn value;\n}\n```\n\nFrom these definitions, it is obvious that in your\
    \ case, you can use the `doubleValue()` method. Now you can write the following\
    \ program.\n\n### Demonstration 7\n\nLet’s compile and run the program and then\
    \ analyze the output.\n\n```\npackage java2e.chapter12;\n//A generic class\n//T\
    \ is a type parameter.It will be replaced by the real type when you //initialize\
    \ the actual object.\nclass GenericDemo7Class<T extends Number> {\nT firstNumber,\
    \ secondNumber;\nGenericDemo7Class(T firstNumber, T secondNumber) {\nthis.firstNumber\
    \ = firstNumber;\nthis.secondNumber = secondNumber;\n}\n// Always returning a\
    \ double value\npublic double displaySum() {\n//using the library method doubleValue()\n\
    return firstNumber.doubleValue() + secondNumber.doubleValue();\n}\n}\nclass Demonstration7\
    \ {\npublic static void main(String[] args) {\nSystem.out.println(\"***Demonstration-7.A\
    \ typical use of bounded type parameter.***\\n\");\nGenericDemo7Class<Double>\
    \ doubleOb = new GenericDemo7Class<Double>(2.5, 5.7);\nSystem.out.println(\"2.5+5.7=\"\
    \ + doubleOb.displaySum());\nGenericDemo7Class<Integer> intOb = new GenericDemo7Class<Integer>(2,\
    \ 7);\nSystem.out.println(\"2+7=\" + intOb.displaySum());\n//GenericDemo7Class<String>\
    \ stringOb=new GenericDemo7Class<String>(\"hello\",\"world!\");\n// Bound mismatch\
    \ error if you use class GenericDemo7Class<T extends Number>\n//System.out.println(\
    \ \"2+7=\" +stringOb.displaySum());\n}\n}\n```\n\nOutput:\n\n```\n***Demonstration-7.A\
    \ typical use of bounded type parameter.***\n2.5+5.7=8.2\n2+7=9.0\n```\n\nYou\
    \ can see that the program is compiled and run successfully. Now, consider the\
    \ following points:\n\n*   Let’s see what happens when you use `<T>` instead of\
    \ `<T extends Number>` in the prior demonstration, as follows:\n\n```\n//class\
    \ GenericDemo7Class<T extends Number> {\nclass GenericDemo7Class<T> {\n```\n\n\
    This time, you’ll encounter the compile-time error as follows (shown in Figure\
    \ [12-6](#433474_2_En_12_Chapter.xhtml#Fig6)): `The method doubleValue() is undefined\
    \ for the type T.`\n\n![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig6_HTML.jpg](images/433474_2_En_12_Chapter/433474_2_En_12_Fig6_HTML.jpg)\n\
    \nFigure 12-6\n\nThe compile-time error says `doubleValue()` is undefined for\
    \ the type `T`\n\nThe compiler is raising this concern because in this case, it\
    \ is not sure whether you will use a true number or not. But when you use `<T\
    \ extends Number>`, you are telling the compiler that you will always pass a `Number`\
    \ type, not any other types.\n\n*   You can see some commented lines in Demonstration\
    \ 7. If you uncomment the following line\n\n```\nGenericDemo7Class<String> stringOb\
    \ = new GenericDemo7Class<String>(\"hello\",\"world!\");\n```\n\nyou’ll receive\
    \ compile-time errors for bound mismatches. Figure [12-7](#433474_2_En_12_Chapter.xhtml#Fig7)\
    \ is the Eclipse IDE snapshot for that.\n\n![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig7_HTML.jpg](images/433474_2_En_12_Chapter/433474_2_En_12_Fig7_HTML.jpg)\n\
    \nFigure 12-7\n\nBound mismatch errors\n\nSo, you can see that when you use `<T\
    \ extends Number>` instead of `<T>`, you cannot pass anything other than the `Number`\
    \ type."
