- fmt: '### Analysis


    You can see that before I set the values to the variables, I printed one additional
    line saying, “I am initializing with my own choice.”


    But if you simply do not supply this parameterless constructor and want to use
    the Java-provided default constructor, you need to comment out or remove the constructor
    body in the preceding example. This time, you will get the following output:


    ```

    ***Demonstration-2.Comparison between user-defined and  Java provided default
    constructors***

    myInt=0

    myFloat=0.0

    myDouble=0.0

    ```


    You can see that each of these values is initialized with the corresponding default
    values of that type.


    Though you would not notice the default constructor in your source code, you can
    decompile the `.class` file, in which case you will notice the presence of Java
    compiler–provided default constructor. Suppose you have compiled the following
    class:


    ```

    class DefConsDemo

    {

    public int myInt;

    public float myFloat;

    public double myDouble;

    }

    ```


    Now you can decompile the class file again to examine the working mechanism of
    the Java-provided default constructor. You can decompile the class file in various
    ways (also, there are various online tools available to serve this purpose). In
    this case, I have used the `javap` command, which is available at `C:\Program
    Files\Java\jdk1.8.0_172\bin` in my system. I set my `CLASSPATH` environment variable
    with this path and decompiled the class file again using the `javap` command,
    like the following, to get the following output:


    ```

    C:\TestClass>javap DefConsDemo.class

    Compiled from "DefaultConstructorCaseStudy.java"

    class java2e.chapter2.DefConsDemo {

    public int myInt;

    public float myFloat;

    public double myDouble;

    java2e.chapter2.DefConsDemo();

    }

    ```


    You can notice the Java-provided default constructor present in the decompiled
    file.


    ### Note


    You may take note of another important point. You can use your own access modifiers
    for user-defined constructors. So, if you provide your own parameterless constructor,
    you can make it non-public. For a Java-provided default constructor, it will have
    default visibility (package private).


    **2.3 I am seeing that the Java-provided default constructor is initializing the
    instance variables with some default values. What are the default values for other
    types?**


    In general, the default values are zero or null. You can refer to Table [2-1](#433474_2_En_2_Chapter.xhtml#Tab1).


    **Table 2-1** Datatypes with Default Values in Java


    | Data Type | Default Values |

    | --- | --- |

    | `byte`, `short`, `int` | 0 |

    | `char` | `''\u0000''` |

    | `float` | `0.0f` |

    | `double` | `0.0d` |

    | `long` | `0L` |

    | `String` | `null` |

    | Any object | `null` |

    | `boolean` | `false` |


    **2.4 It appears to me that you can also invoke some methods to initialize those
    variables. Why do you need constructors?**


    If you think like this, then you must agree that to do that job, you need to call
    the method explicitly; that is, in simple language, that your call will not be
    automatic. But with constructors, you can perform automatic initialization each
    time you create objects.


    **2.5 Can you predict the output of the following?**


    ```

    package java2e.chapter2;

    class ConEx2 {

    int i;

    public ConsEx2(int i) {

    this.i = i;

    }

    // public ConsEx2() { }

    }

    public class Quiz1 {

    public static void main(String[] args) {

    System.out.println("***Experiment with constructor***");

    ConEx2 ob = new ConEx2 ();

    //ConsEx2 ob = new ConsEx2(25);//Choice-3

    }

    }

    ```


    Output:


    ```

    Compilation error: The constructor ConsEx2() is undefined

    ```


    See the following Q&A for explanation. I’ll discuss the keyword `this` shortly.


    **2.6 You should get a default constructor from Java in this case. Why is the
    compiler complaining about this code snippet?**


    You have learned that in Java, you can get a default parameterless constructor
    if, and only if, you do not provide any constructor. But, in this example, you
    already have a parameterized constructor. So, in this case, the compiler will
    not provide the default parameterless constructor for you.


    If you want to remove this compilation error, you have the following choices:


    *   You can define one more custom constructor, like this:


    ```

    public ConsEx2() { }

    ```


    *   You can remove the custom constructor declaration (that you already defined
    but have not used) from this program.


    *   You can supply the necessary integer argument inside your `main()` method,
    like this:


    ```

    ConsEx2 ob = new ConsEx2(25);

    ```


    **2.7 Can I say that a class is a custom type?**


    In general, the answer is yes. But at the same time, you need to remember that
    Java also has many built-in classes (for example, `Array`, `String`, etc.). In
    our prior demonstrations, you have seen the use of our own classes, which are
    nothing but custom classes.


    **2.8 Can you elaborate on the concept of reference?**


    Suppose you have a simple class like the following:


    ```

    class ClassA

    {

    //An instance variable

    int a;

    //An instance method, for example:

    void someMethod()

    {

    //Some code

    }

    }

    ```


    When you write `ClassA obA=new ClassA();` an instance of `ClassA` will be created
    in memory, and it creates a reference to that instance and stores the result inside
    the `obA` variable. So, you can say objects in memory are referenced by an identifier
    called a reference.


    In Java, more broadly, you will use two different kinds of variables—one is primitive
    and the other is an object reference. It is similar to a pointer or an address,
    but you do not know (or care) about what resides inside your reference variable.


    Simply, a reference provides a way to access an object. When you write


    ```

    ClassA obA;

    ```


    `obA` refers to `null`. But when you write


    ```

    ClassA obA=new ClassA();

    ```


    `obA` is initialized with an object of `ClassA`, and you say that `obA` is a reference
    to an object of `ClassA`.'
