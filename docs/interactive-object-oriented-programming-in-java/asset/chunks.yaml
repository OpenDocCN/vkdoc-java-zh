    ### Q&A Session


    **8.6 在 C# 中允许静态构造函数，但在 Java 中不允许。开发者通过静态构造函数能获得什么关键优势？**


    每种编程语言都有其优缺点。设计者对于特定功能显然可以有不同想法。在 C# 中，顶级静态类也允许拥有静态构造函数。他们认为这一功能对于编写日志条目很有用。该功能还可用于为非托管代码（C#
    支持）创建包装类。


    ## Static Methods in Interfaces


    从 Java 8 开始，你可以在接口中添加静态方法。以下是一个示例：


    ```java

    interface MyInterface {

    // The static interface method (Java 8 onward)

    static void staticMethod() {

    System.out.println("\nStatic interface method in MyInterface is called.");

    }

    }

    ```


    与类中的静态方法类似，你可以通过接口名加点号来调用接口中的静态方法，如下所示：


    ```java

    MyInterface.staticMethod();

    ```


    需要注意的是，如果一个类实现了 `MyInterface`，该实现类可以拥有自己的 `staticMethod()` 版本，但在这种情况下，你不能使用 `@Override`
    注解。考虑以下代码片段：


    ```java

    class ClassDemo8 implements MyInterface{

    //@Override  <-Will cause Error

    public static void staticMethod() {

    System.out.println("This is the static method of the implementing class(ClassDemo8).");

    System.out.println("You cannot override the static method in MyInterface");

    }

    ```'
  raw: '### Points To Remember


    *   When a parent class and the derived class contain static methods with the
    same signature, the subclass static method hides the parent class static method.


    *   In the case of method hiding, the invoked method version does not depend on
    the invoking object; instead, it depends on the reference type.


    *   Invoking static methods with instances is not a recommended practice at all.
    It is presented here only to demonstrate to you how method hiding differs from
    method overriding.


    ### Q&A Session


    **8.3 I understand that I cannot override static methods in Java by design. But
    what may be the probable causes behind this design?**


    For static methods, method calls are decided at compile time only; that is, it
    is not dependent on which object you are pointing to at runtime. But for non-static
    methods, method calls can be decided at runtime (i.e., the actual object to which
    you are pointing at that moment).


    ## Method Overloading


