- fmt: '您可以看到，通过调用`prepareCall()`方法创建了一个`CallableStatement`对象，并且`prepareCall()`方法接受一个`String`参数。


    **注意**：与许多其他方法一样，`prepareCall()`方法有多个重载版本。本示例中使用了最简单的一个。


    请注意三个问号。您知道这些问号用于方法参数。这些参数在本质上是顺序的，第一个参数从1开始。


    以下几行将展示这些参数的用法：


    ```

    callableStmt.setDouble(2,queryResult.getDouble("FirstNo"));

    callableStmt.setDouble(3,queryResult.getDouble("SecondNo"));

    /*

    Here, we have used the registerOutParameter() method of the CallableStatement
    interface, which registers the OUT parameter in the ordinal position in parameterIndex(first
    argument) to the JDBC type sqlType(second argument). All OUT parameters must be
    registered before a stored procedure is executed.

    */

    callableStmt.registerOutParameter (1,Types.DOUBLE);

    callableStmt.execute();

    ```


    这表明在位置2和3有两个`double`类型的值。位置1的问号将被函数调用（本例中函数名为`total()`）替换，该函数接受这些`double`类型的值作为参数，并返回聚合结果（也是一个`double`类型的值）。现在，请查看完整的实现代码及相应的输出。


    ```

    package java2e.chapter13;

    import java.sql.*;

    class Demonstration4 {

    public static void main(String[] args) throws SQLException {

    System.out.println("***Demonstration-4.Using a Callable Statement.***");

    Connection connectionOb = null;

    try {

    // for MySQL database

    Class.forName("com.mysql.cj.jdbc.Driver").newInstance();

    connectionOb = DriverManager.getConnection("jdbc:mysql://localhost:3306/test",
    "root", "admin");

    Statement statementOb = connectionOb.createStatement();

    System.out.println("This is the original table.");

    ResultSet queryResult = statementOb.executeQuery("select * from NumberTable");

    System.out.println("FirstNumber \t" + "SecondNumber");

    System.out.println("--------------------------");

    while (queryResult.next()) {

    System.out.print(queryResult.getDouble("FirstNo") + "\t\t" + queryResult.getString("SecondNo"));

    System.out.println();

    }

    System.out.println("\nCalling the total() function on each record of the NumberTable.");

    //Using the Callable statement

    CallableStatement callableStmt=connectionOb.prepareCall("{?= call total(?,?)}");

    queryResult = statementOb.executeQuery("select * from NumberTable");

    System.out.println("FirstNumber \t" + "SecondNumber\t"+"Total");

    System.out.println("--------------------------------------");

    while (queryResult.next()) {

    System.out.print(queryResult.getDouble("FirstNo") + "\t\t" + queryResult.getDouble("SecondNo")+
    "\t\t");

    callableStmt.setDouble(2,queryResult.getDouble("FirstNo"));

    callableStmt.setDouble(3,queryResult.getDouble("SecondNo"));

    /*Here, we have used the registerOutParameter method of the CallableStatement
    interface, which registers the OUT parameter in the ordinal position in parameterIndex(first
    argument) to the JDBC type sqlType(second argument). All OUT parameters must be
    registered before a stored procedure is executed.*/

    callableStmt.registerOutParameter (1,Types.DOUBLE);

    callableStmt.execute();

    System.out.print(callableStmt.getDouble(1));

    System.out.println();

    }

    } catch (SQLException ex) {

    System.out.println(ex.getMessage());

    }

    // To catch any other exception

    catch (Exception ex) {

    System.out.println(ex.getMessage());

    ex.printStackTrace();

    } finally {

    // Close the connection

    if (connectionOb != null) {

    connectionOb.close();

    }

    }

    }

    }

    ```


    输出：


    ```

    ***Demonstration-4.Using a Callable Statement.***

    This is the original table.

    FirstNumber      SecondNumber


    12.3             15.7

    32.5             25.3

    25.0             75.0

    ```


    在`NumberTable`的每条记录上调用`total()`函数：


    ```

    FirstNumber      SecondNumber     Total


    12.3             15.7              28.0

    32.5             25.3              57.8

    25.0             75.0             100.0

    ```


    ## Q&A 问答


    **13.8 何时应该优先使用`Statement`对象，而不是`PreparedStatement`或`CallableStatement`？**


    您可以记住以下几点：


    - 如果要执行简单的SQL语句（例如`select * from Table_name;`），请使用`Statement`对象。

    - 如果要使用预编译语句，请使用`PreparedStatement`。

    - 如果要使用存储过程（或函数），请使用`CallableStatement`。


    **13.9 什么是存储过程？**


    简单来说，如果您想重复执行一系列任务，可以创建一个存储过程。存储过程很像在Java中编写一个方法。创建存储过程的步骤可能因数据库而异。在本章中，我在演示4中使用了一个简单的函数`total()`来满足我们的需求。


    **13.10 您在某些地方提到了SQL上下文中的DDL术语。它是什么意思？**


    SQL命令通常分为以下几类：


    - **DDL（数据定义语言）** 语句用于创建或修改数据库对象的结构。在此上下文中，您会使用`create`、`alter`、`drop`和`truncate`语句。

    - **DML（数据操作语言）** 语句用于检索、插入、更新和删除数据库中的记录。例如，在此上下文中，您会使用`insert`、`update`、`delete`和`select`语句。一些工程师倾向于将`select`语句归入一个单独的类别，称为DQL（数据查询语言）。

    - **DCL（数据控制语言）** 语句可用于创建各种角色和权限，以控制对数据库的访问。例如，在此上下文中，您可能会使用`grant`和`revoke`语句。

    - **TCL（事务控制语言）** 语句用于管理数据库中发生的不同事务。例如，在此上下文中，您可能会使用`commit`、`rollback`等语句。


    **注意**：如前所述，要详细了解这些术语，您可能需要自己练习SQL语句。在本章中，我们的重点不是详细覆盖SQL；重点是Java应用程序能够简单地与数据库通信并执行一些基本操作。


    ## 演示5


    本演示展示了如何使用`javax.sql.DataSource`接口对象连接到数据源。这是JDBC 2.0 API的新增功能，也是连接数据源的首选方式。使用`DataSource`对象可以提供连接池和分布式事务。但由于您刚刚开始学习，我们将只关注连接部分。


    在演示5中，使用了`getMySqlDataSource()`方法。在此方法中，您创建一个`MySqlDataSource`对象，设置数据库URL，并传递用户ID和密码以连接到数据库。设置完这些信息后，您就可以使用此`MySqlDataSource`对象连接到数据库。


    如果将演示5与演示1进行比较，您会更好地理解这些变化。为简单起见，演示1中只有一小部分代码被更改，输出没有显著变化。但您必须注意这种连接数据库的新方式。


    在继续之前，我建议您阅读以下几点。


    ## 要点总结


    - `DataSource`对象用于特定的DBMS（或其他数据源，如文件）。如果需要使用多个数据源，则需要为每个数据源部署一个单独的`DataSource`对象。

    - `MysqlDataSource`的名称最近已从`com.mysql.jdbc.jdbc2.optional.MysqlDataSource`更改为`com.mysql.cj.jdbc.MysqlDataSource`。'
