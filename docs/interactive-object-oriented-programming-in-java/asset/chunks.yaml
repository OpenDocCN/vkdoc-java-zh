- fmt: '### Demonstration 4


    One of the notable characteristics of this example is that you can see the use
    of lambda expressions, which were introduced in Java 8. Since they are not mandatory
    for this program, I have placed one in the commented block. I have included this
    because in similar examples, you may notice the use of lambda expressions in different
    places.


    Let’s quickly review what a lambda expression is and why it is important. One
    of the main goals of using a lambda expression is that you can treat it as a function
    that need not be a part of a class. Here is a sample code for a lambda expression:


    ```

    (int a, int b) -> {return (a + b);}

    ```


    It is a lambda expression that has two parameters and a return statement. It is
    possible to use lambda expressions without a parameter. A lambda expression can
    exist without a return statement too. For example, here is a lambda expression
    that does not accept any parameters and doesn’t have any return statements:


    ```

    () -> System.out.println("Lambda expression without a  return statement");

    ```


    Using a lambda expression, you can make your code compact and easily readable.
    Java lambda expression is treated as a function, so the compiler does not create
    a `.class` file for it.


    Now, consider the updated program in Demonstration 4, where you use generic programming.
    The key changes are shown in bold.


    ```

    package java2e.chapter12;

    import java.util.ArrayList;

    import java.util.List;

    public class Demonstration4 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-4.Use Generics to promote type-safety and
    avoid runtime error***");

    ArrayList myList = new ArrayList();

    myList.add(10);

    myList.add(20);

    // Compile time error when you use ArrayList//myList.add("Invalid");

    //Printing the contents of the ArrayList

    System.out.println("Here is the contents of the ArrayList:");

    for (int i = 0; i  System.out.println(myInt));

    */

    //Picking last element in the ArrayList.

    //No casting is required now.

    int lastElement=myList.get( myList.size()-1);

    System.out.println("Adding 1 to last element and printing");

    System.out.println(++lastElement);//No runtime error

    }

    }

    ```


    This time, you’ll catch the bug much earlier because it is caught at compile time
    (Figure [12-3](#433474_2_En_12_Chapter.xhtml#Fig3)). You can see the compile-time
    error message, which clearly says that you are using a `String` instead of an
    `Integer`.


    ![../images/433474_2_En_12_Chapter/433474_2_En_12_Fig3_HTML.jpg](images/433474_2_En_12_Chapter/433474_2_En_12_Fig3_HTML.jpg)


    Figure 12-3


    You can catch an error early in a generic program


    In this case, since the error is caught during compile time, you do not need to
    wait until runtime to get this error, which is always better. Once you comment
    out the following line:


    ```

    myList.add("Invalid");

    ```


    you can receive the intended output, as follows:


    ```

    ***Demonstration-4.Use Generics to promote type-safety and avoid runtime error***

    Here is the contents of the ArrayList:


    Adding 1 to last element and printing


    ```


    By comparing Demonstration 3 and Demonstration 4, you can say the following:


    *   To avoid runtime errors, you should prefer the generic version of code to
    the non-generic version.


    *   No casting is required now. Notice the following line of code:


    *   Lastly, you can see a commented block of code, which is presented for reference
    purposes only. In different programs, you may notice one of these variations of
    a `for` loop:


    ```

    int lastElement=myList.get( myList.size()-1);

    ```


    *   Since you are using the concept of generics, you can print the elements of
    the `ArrayList` in a better way. In general, you’ll see these versions of code
    when you traverse and print elements in an `ArrayList` (or other collection objects).


    ```

    /*

    for (int myInt : myList) { System.out.println(myInt); }

    System.out.print("Printing the elements using lambda expression:\n");

    // Or, use the enhanced for loop with lambda expression

    myList.forEach((myInt) -> System.out.println(myInt));

    */

    ```


    So, you can surely conclude that the generic version of `ArrayList` is more flexible
    and usable than the non-generic version of `ArrayList`. The same concept is applicable
    for other collection objects and similar kinds of programming.


    ## Wildcard Types in Generic Programming


    In upcoming discussions you’ll notice that sometimes you may need to put restrictions
    on a particular type in generic programming. There are two common ways to implement
    such constraints—one approach is to use wildcards, and another approach is to
    use bounded type parameters. Here, I’ll start with wildcards.


    In generic programming, a wildcard is represented with the question mark (`?`).
    It denotes an unknown type. It can be used when you have partial knowledge about
    the `type` parameter.


    Wildcards can be bounded or unbounded. Bounded wildcards can be used to set either
    an upper bound or a lower bound for a `type` argument. Let’s start the discussion
    with an upper-bound wildcard.'
