    It says that when using the dot operator with `sampleOb` you cannot access the
    private members of the `Sample` class inside the `main()` method. But the same
    approach works for the public members of the `Sample` class:


    ```

    package java2e.chapter3;

    class Sample {

    // Public field

    public int pubInt = 1;

    // Public method

    public void showPublicMethod() {

    System.out.println("The showPublicMethod() is a public method.");

    }

    // Private field

    private int priInt = 2;

    // Private method

    private void showPrivateMethod() {

    System.out.println("The showPrivateMethod() is a private method.");

    }

    }

    class Demonstration2 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-2\. Introducing access control using private
    and public modifiers.***\n");

    Sample sampleOb = new Sample();

    System.out.println("The pubInt=" + sampleOb.pubInt);// 1

    sampleOb.showPublicMethod();

    // Compile-time error

    // System.out.println(" The priInt="+ sampleOb.priInt);

    // Compile-time error

    // sampleOb.showPrivateMethod() ;

    }

    }

    ```


    Output:


    ```

    ***Demonstration-2\. Introducing access control using private and public modifiers.***

    The pubInt=1

    The showPublicMethod() is a public method.

    ```


    If you uncomment the commented line, you will receive the compile-time errors
    shown in Figure [3-1](#433474_2_En_3_Chapter.xhtml#Fig1)—one for the private field
    and one for the private method.


    ![../images/433474_2_En_3_Chapter/433474_2_En_3_Fig1_HTML.jpg](images/433474_2_En_3_Chapter/433474_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    An error snapshot from Eclipse IDE


    ## Getter-Setter Methods


    Experts always suggest you make your instance variables private unless there is
    a specific reason to use other access modifiers. (Though only for simple demonstration
    purposes in this book, in many examples you will see the use of public fields
    and methods only.) Then the obvious question is—how does one access the private
    members of a class?


    The answer is that you can access them using public getter-setter methods.


    ### Demonstration 3


    In this demonstration, the `Sample3` class has a private field called `priInt`.
    Notice the other two public methods in `Sample3`. You can see that the `getPriInt()`
    method is returning the value of `priInt` and the `setPriInt()` method can help
    you to set the value for `priInt`. Since these two methods are defined in the
    same class that contains the private variable, they can access the private field
    `priInt` in `Sample3`.


    ```

    package java2e.chapter3;

    class Sample3 {

    // Private field

    private int priInt;

    //Getter

    public int getPriInt() {

    return priInt;     }

    //Setter

    public void setPriInt(int priInt) {

    this.priInt = priInt;

    }

    }

    class Demonstration3 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-3\. Introducing Getter-Setter method.***\n");

    Sample3 sampleOb=new Sample3();

    //Setting the value for the private field

    sampleOb.setPriInt(2);

    //Getting the value from the private field.

    System.out.println("The priInt="+ sampleOb.getPriInt());

    }

    }

    ```


    Output


    ```

    ***Demonstration-3\. Introducing Getter-Setter method.***

    The priInt=2

    ```


    Using Eclipse, you can easily generate getter-setter methods. For example, in
    this case, you can right click on the private variable priInt ➤ Source ➤ Generate
    Getters and Setters… to generate getter-setter methods for the private field.


    ### Q&A Session


    **3.2 What are the benefits of using a getter-setter method?**


    Here are some benefits of using getter-setter methods:


    *   You can provide controlled access to your data. Notice that now the client
    code cannot access the private field `priInt` directly.


    *   You can make your class variable either read-only or write-only. When you
    provide the getter method only, you can only get the value of the private variable,
    so it becomes read-only. Similarly, when you provide only the setter method, you
    make the variable write-only.


    *   The prior two points promote the security of the data.


    ## Initialization Block


    You have already seen the use of constructors. You can get an alternative to constructors
    when you use initialization blocks. An initialization block can be either static
    or non-static. In the upcoming section, you’ll become familiar with non-static
    initialization blocks, which are also known as instance initialization blocks
    (IIBs). Static initialization blocks will be discussed in Chapter [8](#433474_2_En_8_Chapter.xhtml).


    ### Note


    Apart from initialization blocks and constructors, you can also initialize instance
    variables in final methods. A final method is a method that cannot be overridden
    in the subclass. You will be familiar with them once you cover the concepts of
    inheritance.'
