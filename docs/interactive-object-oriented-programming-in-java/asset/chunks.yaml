    ## 问答环节


    **14.3 在这个程序中，`@FunctionalInterface`是否是强制性的，以表明它是一个函数式接口？**


    不是。但在这种情况下使用该注解是一种良好的实践，可以增强可读性。此外，如果你使用了该注解，将来如果有人错误地尝试在接口中添加另一个抽象方法，编译器可以立即报错。


    Java语言规范（11）指出：


    *   一个*函数式接口*是一个只有一个抽象方法的接口（除了`Object`的方法之外），因此它代表了一个单一的函数契约。这个“单一”方法可能以多个抽象方法的形式出现，这些方法具有从超接口继承的覆盖等效签名；在这种情况下，继承的方法在逻辑上代表一个单一方法。


    *   它有助于早期检测出现在或继承自旨在成为函数式接口的接口中的不当方法声明。


    *   “函数式接口的实例可以通过方法引用表达式和`lambda`表达式创建。”


    ## 来自Java 9的私有接口方法


    私有接口方法是Java 9中的新增特性。在Java 7之前，接口方法很简单——它们是公共抽象方法。Java 8允许你添加公共静态方法和公共默认方法。从Java
    9开始，你可以在接口中使用私有静态方法和私有默认方法。


