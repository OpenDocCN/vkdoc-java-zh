- fmt: '# Real-life Example


    Suppose you have a master copy of a valuable document. One day you find that you
    need to incorporate some change into it. In this case, you can make a photocopy
    of the original document and make the changes to see the impact.


    Consider another example. Suppose a group of people suddenly decides to celebrate
    the birthday of one of their friends, say, Ron. What will they do? They can go
    to a cake shop and order a ready-made cake. To make it special, they may request
    the seller to write something like "Happy Birthday to Ron." From a seller point
    of view, he is not making any new model. He already defined the model, and every
    day he produces many cakes (which all look the same) by following the same process,
    and finally he makes it special with some small changes.


    # Coding Example


    Let us assume that you have an application that is very stable. In the future,
    you may want to update the application with some small modifications. You must
    start with a copy of your original application, make the changes, and analyze
    further. Surely, you don''t want to start from scratch, so as to save you time
    and money. In real-world programming, when you add a new feature to your existing
    application, you may follow the same strategy.


    The following note gives you a clue about how you can use this pattern in your
    application.


    ## Note


    In Java, you can consider the `clone()` method of the `Object` class as an example
    of a Prototype pattern. This method can create and return a copy of an existing
    object. (In this context, your class needs to be `Cloneable`.)


    # Illustration


    Figure [15-1](#433474_2_En_15_Chapter.xhtml#Fig1) illustrates a simple prototype
    structure, which I am going to follow in the following implementation.


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig1_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig1_HTML.jpg)


    **Figure 15-1** A sample prototype structure


    Here, `BasicCar` is the basic prototype. `Nano` and `Ford` are the concrete prototypes,
    and they have implemented the `clone()` method defined in `BasicCar`. In this
    example, I have created these cars with some base price (in Indian currency).
    Later, I have updated the final price as per the model. `PrototypePatternExample.java`
    is the client in this implementation.


    # Class Diagram


    Figure [15-2](#433474_2_En_15_Chapter.xhtml#Fig2) shows the class diagram for
    the illustration of the Prototype pattern.


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig2_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig2_HTML.jpg)


    **Figure 15-2** Class diagram


    # Package Explorer View


    Figure [15-3](#433474_2_En_15_Chapter.xhtml#Fig3) shows the high-level structure
    of the program.


    ![../images/433474_2_En_15_Chapter/433474_2_En_15_Fig3_HTML.jpg](images/433474_2_En_15_Chapter/433474_2_En_15_Fig3_HTML.jpg)


    **Figure 15-3** Package Explorer view


    # Implementation


    ```

    package java2e.chapter15;

    import java.util.Random;

    //BasicCar class

    abstract class BasicCar implements Cloneable {

    public String modelName;

    public int basePrice, onRoadPrice;

    public String getModelname() {

    return modelName;

    }

    public void setModelname(String modelname) {

    this.modelName = modelname;

    }

    public static int setAdditionalPrice() {

    int price = 0;

    Random r = new Random();

    /* We will get an integer value in the range 0(inclusive) to 100000(exclusive)
    */

    int p = r.nextInt(100000);

    price = p;

    return price;

    }

    public BasicCar clone() throws CloneNotSupportedException {

    return (BasicCar) super.clone();

    }

    }

    //Nano class

    class Nano extends BasicCar {

    public Nano(String m) {

    modelName = m;

    // Basic price for Nano

    basePrice = 200000;

    }

    @Override

    public BasicCar clone() throws CloneNotSupportedException {

    return (Nano) super.clone();

    }

    }

    //Ford class

    class Ford extends BasicCar {

    public Ford(String m) {

    modelName = m;

    // Basic price for Ford.

    basePrice = 500000;

    }

    @Override

    public BasicCar clone() throws CloneNotSupportedException {

    return (Ford) super.clone();

    }

    }

    class PrototypePatternDemo {

    public static void main(String[] args) throws CloneNotSupportedException {

    System.out.println("***Prototype Pattern Demo***\n");

    BasicCar nano = new Nano("Nano XT");

    BasicCar ford = new Ford("Ford Figo");

    BasicCar nanoClone,fordClone;

    // Making a copy of a Nano object

    nanoClone= nano.clone();

    System.out.println("Nano''s base price is: Rs."+nanoClone.basePrice);

    //Making the change on the copied object.

    // Price will be more than 200000

    nanoClone.onRoadPrice = nanoClone.basePrice + BasicCar.setAdditionalPrice();

    System.out.println("In India, the final price of a " + nanoClone.modelName + "
    is Rs." + nanoClone.onRoadPrice);

    // Making a copy of a Ford object

    fordClone = ford.clone();

    System.out.println("Ford''s base price is: Rs."+fordClone.basePrice);

    //Making the change on the copied object.

    // Price will be more than 500000

    fordClone.onRoadPrice = fordClone.basePrice + BasicCar.setAdditionalPrice();

    System.out.println("In India, the final price of a " + fordClone.modelName + "
    is Rs." + fordClone.onRoadPrice);

    }

    }

    ```


    ## Output


    ```

    ***Prototype Pattern Demo***

    Nano''s base price is: Rs.200000

    In India, the final price of a Nano XT is Rs.294803

    Ford''s base price is: Rs.500000

    In India, the final price of a Ford Figo is Rs.595733

    ```


    ## Note


    You may notice a different price in your system, because I am generating a random
    price in the `setAdditionalPrice()` method inside the `BasicCar` class. But I
    have ensured that the Nano XT''s final price is more than Rs 200,000, the Ford
    Figo''s final price is more than Rs 500,000, and the price of a Ford Figo will
    be greater than that of a Nano XT.


    # Q&A Session


    ## 15.7. What are the advantages of using Prototype design patterns?


    Here are the key advantages:


    - Creating a new instance from scratch is a costly operation. Prototype patterns
    help you to create a new instance from an existing one. So, it is less expensive.

    - You may need to face some complicated or boring process if you start from scratch.
    Instead, by using a Prototype pattern, you can focus on upcoming features only.

    - You can include or discard products at runtime.


    ## 15.8. What are the challenges associated with using Prototype design patterns?


    Here are the key challenges you may face when you use this pattern:


    - You need to focus on the cloning or copying mechanism.

    - Sometimes, creating a copy from an existing instance is not simple. For example,
    implementing a cloning mechanism can be challenging if the objects under consideration
    do not support copying/cloning at all or if there are circular references. For
    example, in Java, a class with the `clone()` method needs to implement the `Cloneable`
    marker interface; otherwise, it will throw a `CloneNotSupportedException`.'
