  trans: "\n### 演示 4\n\n假设你有一个父类、一个子类和一个孙类。我们分别称它们为 `Parent4`、`Child4` 和 `Grandchild4`。顾名思义，`Child4`\
    \ 类继承自 `Parent4`，而 `Grandchild4` 继承自 `Child4` 类。现在，创建一个 `Grandchild4` 类的对象。从以下演示的输出中，你可以看到构造函数的调用顺序与其派生顺序一致。\n\
    \n```\npackage java2e.chapter4;\nclass Parent4 {\nParent4() {\nSystem.out.println(\"\
    Inside Parent Constructor.\");\n}\n}\nclass Child4 extends Parent4 {\nChild4()\
    \ {\nSystem.out.println(\"Inside Child Constructor.\");\n}\n}\nclass Grandchild4\
    \ extends Child4 {\nGrandchild4() {\nSystem.out.println(\"Inside GrandChild Constructor.\"\
    );\n}\n}\nclass Demonstration4 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    ***Demonstration-4\\. Testing constructor calling sequence***\");\nGrandchild4\
    \ grandChild = new Grandchild4();\n}\n}\n```\n\n输出：\n\n```\n***Demonstration-4\\\
    . Testing constructor calling sequence***\nInside Parent Constructor.\nInside\
    \ Child Constructor.\nInside GrandChild Constructor.\n```\n\n### 问答环节\n\n**4.8\
    \ 有时我不确定在继承层次结构中，哪个应该是父类，哪个应该是子类。我该如何处理这种情况？**\n\n你可以尝试记住一些简单的陈述，例如：足球运动员是运动员，但反过来不一定成立。或者，公交车是交通工具，但反过来不一定成立。这种“is-a”测试可以帮助你决定哪个应该是父类；例如，根据前面的陈述，你可以得出结论：`Vehicle`\
    \ 是父类，`Bus` 是子类。\n\n你也可以使用这种“is-a”测试来预先判断一个类是否可以放在同一个继承层次结构中。因此，当你发现公交车不是鸟时，你就不会试图将它们放在同一个继承层次结构中。\n\
    \n## 特殊关键字：super\n\n在 Java 中，有一个特殊的关键字叫做 `super`。它用于以高效的方式访问父类的成员。每当子类想要引用其直接父类时，都可以使用\
    \ `super` 关键字。\n\n让我们在以下示例中探讨 `super` 关键字的不同用法。\n\n### 演示 5\n\n你可以使用以下代码行创建一个子类实例：\n\
    \n```\nChild5 obB2 = new Child5(1, 2, 3);\n```\n\n子类构造函数可以反过来使用 `super` 关键字调用父类构造函数。请注意以下代码块中的粗体行：\n\
    \n```\nChild5(int a, int b, int c) {\n//System.out.println(\"Before setting,c=\"\
    + this.c);//Error:Constructor call must be the first statement in a //constructor\n\
    super(a, b);\nSystem.out.println(\"I am in child constructor.\");\nSystem.out.println(\"\
    Before setting,c=\"+ this.c);\nthis.c = c;\nSystem.out.println(\"Now c=\"+ this.c);\n\
    }\n```\n\n程序的其他部分不言自明。现在，执行该程序，然后阅读分析部分以获得更好的理解。\n\n```\npackage java2e.chapter4;\n\
    class Parent5 {\nprivate int a;\nprivate int b;\nParent5(int a, int b) {\nSystem.out.println(\"\
    I am in parent constructor.\");\nSystem.out.println(\"Before setting,a=\"+ this.a);\n\
    System.out.println(\"Before setting, b=\"+ this.b);\nSystem.out.println(\"Setting\
    \ the values for instance variables a and b.\");\nthis.a = a;\nthis.b = b;\nSystem.out.println(\"\
    Now a=\"+ this.a);\nSystem.out.println(\"Now b=\"+ this.b);\n}\nvoid parent5Method()\
    \ {\nSystem.out.println(\"I am a parent method.\");\n}\n}\nclass Child5 extends\
    \ Parent5 {\nprivate int c;\nChild5(int a, int b, int c) {\n//System.out.println(\"\
    Before setting,c=\"+ this.c);//Error:Constructor call must be the first statement\
    \ in a //constructor\nsuper(a, b);\nSystem.out.println(\"I am in child constructor.\"\
    );\nSystem.out.println(\"Before setting,c=\"+ this.c);\nthis.c = c;\nSystem.out.println(\"\
    Now c=\"+ this.c);\n}\nvoid child5Method() {\nSystem.out.println(\"I am a child\
    \ method.\");\nSystem.out.println(\"I am calling the parent method.\");\nsuper.parent5Method();\n\
    }\n}\npublic class Demonstration5 {\npublic static void main(String[] args) {\n\
    System.out.println(\"***Demonstration-5\\. The uses of the 'super' keyword Demo***\"\
    );\nChild5 obB2 = new Child5(1, 2, 3);\n//System.out.println(\"a in ObB2=\" +\
    \ obB2.a);//Error:a is private\n//System.out.println(\"b in ObB2=\" + obB2.b);//Error:b\
    \ is private\n//System.out.println(\"c in ObB2=\" + obB2.c);//Error:c is private\n\
    obB2.child5Method();\n}\n}\n```\n\n输出：\n\n```\n*** Demonstration-5\\. The uses\
    \ of the 'super' keyword Demo***\nI am in parent constructor.\nBefore setting,a=0\n\
    Before setting, b=0\nSetting the values for instance variables a and b.\nNow a=1\n\
    Now b=2\nI am in child constructor.\nBefore setting,c=0\nNow c=3\nI am a child\
    \ method.\nI am calling the parent method.\nI am a parent method.\n```\n\n你需要理解为什么必须使用关键字\
    \ `super`。如果你在前面的示例中没有使用它，你可能需要编写类似这样的代码：\n\n```\npublic Child(int a, int b, int\
    \ c)\n{\nthis.a = a;\nthis.b = b;\nthis.c = c;\n}\n```\n\n这种方法有两个主要问题。你试图编写重复的代码来初始化实例变量\
    \ `a` 和 `b`。此外，在这种情况下，你会收到一个编译时错误，因为 `a` 和 `b` 由于其保护级别（注意它们是私有的）而无法访问。通过使用 `super`\
    \ 关键字，你可以有效地处理这两种情况。你可能还会注意到，父类构造函数在子类构造函数之前被调用。理想情况下，你的目标应该是始终保持正确的***构造函数链***。\n\
    \n### 要点记忆\n\n*   注意被注释掉的行：`//System.out.println(\"Before setting,c=\"+ this.c);//`*Error:Constructor\
    \ call must be the first statement in a constructor.* 它用于提醒你，Java 设计指南规定，对超类构造函数的调用应该是子类（或派生类）构造函数中的第一条语句。你可以使用\
    \ `super()` 或 `super(parameter list)` 来调用超类构造函数的正确版本。\n\n*   该指南还指出：“*如果一个构造函数没有显式调用超类构造函数，Java\
    \ 编译器会自动插入对超类无参构造函数的调用。如果超类没有无参构造函数，你将收到一个编译时错误。Object 确实有这样的构造函数，因此如果 Object\
    \ 是唯一的超类，则没有问题。*”\n\n    [`https://docs.oracle.com/javase/tutorial/java/IandI/super.html`](https://docs.oracle.com/javase/tutorial/java/IandI/super.html)\n\
    \n*   注意输出的最后两行。它演示了你可以使用 `super` 关键字从派生类方法中调用超类方法。\n\n让我们在以下示例中探讨 `super` 的另一种用法。关键字\
    \ `super` 可以在方法、构造函数或实例变量的上下文中使用。当你只考虑方法和实例变量时，你可以将用法概括为以下形式：\n\n```\nsuper.member;\n\
    ```\n\n其中 `member` 可以是实例变量或方法。\n\n有时，派生类可以隐藏最初在超类中定义的实例变量。在这种情况下，`super` 允许你使用派生类的对象访问超类中的实例变量。因此，在以下演示中，你可以看到以下代码行：\n\
    \n```\nsuper.myInt = 12;\n```\n\n其中 `myInt` 是父类的一个实例变量。\n"
- fmt: '### Demonstration 6


    In Demonstration 5, you saw that you can invoke a parent class method in the same
    way. In Demonstration 6, you have a derived class (`Child6`) that is derived from
    the class `Parent6`. Also, the `Parent6` class has a method called `parentClassMethod()`.
    So, from the child class, you can refer to the parent class method using the following
    code:


    ```

    super.parentClassMethod();

    ```


    Both cases are demonstrated in the following example:


    ```

    package java2e.chapter4;

    class Parent6 {

    int myInt;

    Parent6() {

    myInt = 25;// some default value

    }

    public void parentClassMethod(){

    System.out.println("I am inside the parentClassMethod().");

    }

    }

    class Child6 extends Parent6 {

    int myInt;// this will hide myInt in Parent6

    Child6() {

    System.out.println("Initially, the value of myInt in parent class=" + super.myInt);

    System.out.println("Setting  the new value( 12) of myInt in parent class now.");

    super.myInt = 12;// Setting myInt in parent class

    System.out.println("Setting the value (50) of myInt in child class now.");

    myInt = 50;// Setting myInt in child class

    }

    void display() {

    System.out.println("The value of myInt in parent class=" + super.myInt);

    System.out.println("The value of myInt in child class=" + myInt);

    }

    void invokeParentMethod()

    {

    System.out.println("Invoking the parent class method from the child class.");

    super.parentClassMethod();

    }

    }

    class Demonstration6 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-6:The alternative use of ''super'' keyword***\n");

    Child6 childObject = new Child6();

    childObject.display();

    childObject.invokeParentMethod();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-6:The alternative use of ''super'' keyword***

    Initially, the value of myInt in parent class=25

    Setting  the new value( 12) of myInt in parent class now.

    Setting the value (50) of myInt in child class now.

    The value of myInt in parent class=12

    The value of myInt in child class=50

    Invoking the parent class method from the child class.

    I am inside the parentClassMethod().

    ```


    ### Points To Remember


    *   As per the language specification (JLS 11): The forms using the keyword `super`
    are valid only in an instance method, instance initializer, or constructor of
    a class, or in the initializer of an instance variable of a class. Otherwise,
    you’ll see compile-time errors.


    *   The `java.lang.Object` class is placed at the top of the class hierarchy.
    All other classes are either direct or indirect descendants of it. Some useful
    methods in the `Object` class include `protected native Object clone(){}`, `String
    toString()`, `public final native void notify(){}`, `public final native void
    notifyAll(){}`, and `public native int hashCode(){}`.


    *   You use the `super` keyword to refer to the objects of the immediate parent
    class. But the `Object` class does not have any super class, so you cannot use
    the `super` keyword in the declaration of an `Object` class.


    *   The `super` keyword is similar to the `base` keyword in C++ or C#. But you
    need to remember the restriction that says that the invocation of a super class
    constructor must be the first line in the subclass constructor.


    ### Q&A Session


    **4.9 Can you summarize the different uses of the `super` keyword?**


    In Demonstrations 5 and 6, you have seen that the `super` keyword can be used
    in any of the following situations:


    *   To invoke parent class constructors

    *   To access a parent class member that is a method or a data member.


    **4.10 Suppose there are methods that have a common name in both the parent class
    and its child class. If you create a child class object and try to invoke the
    same-named method, which one will be called?**


    You are trying to introduce the concept of method overriding here. You will see
    the discussion shortly in this book (Chapter [5](#433474_2_En_5_Chapter.xhtml)).
    But you have already learned that you can refer to a parent class method using
    the keyword `super`. So, to answer your question, consider the following program.


    ### Demonstration 7


    Here, both the parent class (`Parent7`) and child class (`Child7`) have a method
    called `showMe()`. I suggest you go through the program and its corresponding
    output. Then, go through the analysis section for a better understanding.


    ```

    package java2e.chapter4;

    class Parent7 {

    public void showMe() {

    System.out.println("At present, I am inside the parent method.");

    }

    }

    class Child7 extends Parent7 {

    public void showMe() {

    System.out.println("I am inside the child method.");

    //System.out.println("Invoking the parent method now.");

    //super.showMe();

    }

    }

    public class Demonstration7 {

    public static void main(String[] args) {

    System.out.println("***Demonstration-7.Testing the use of super keyword.****");

    Child7 obChild = new Child7();

    obChild.showMe();

    }

    }

    ```


    Output:


    ```

    ***Demonstration-7.Testing the use of super keyword.***

    I am inside the child method.

    ```


    Here, your derived class (`Child7`) method hides its parent class (`Parent7`)
    method.


    If you want to invoke the parent class method, you can create objects and invoke
    the method like the following:


    ```

    Parent7 obParent = new Parent7();

    obParent.showMe();//Now Parent class method will be invoked.

    ```


    Alternatively, you can uncomment the following lines (shown in bold) inside the
    child class method to invoke the parent class method from a child class method:


    ```

    //System.out.println("Invoking the parent method now.");

    //super.showMe();

    ```


    Now, if you compile and run the program, you will obtain the following output:


    ```

    ***Demonstration-7:Testing the use of super keyword.***

    I am inside the child method.

    Invoking the parent method now.

    At present, I am inside the parent method.

    ```'
