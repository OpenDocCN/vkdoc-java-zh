  \ 12 章讨论。\n\n最后，请注意 Spring 框架被设计为向后兼容，因此将你的 Spring 1.x 应用迁移到 Spring 2.0，以及从 2.0\
  \ 迁移到 2.5 都非常容易。\n\n介绍 Spring 项目\n\nSpring 不仅仅是一个应用框架。它还是一个基于核心*Spring Framework*项目的多个开源项目的平台。在撰写本书时，有以下\
  \ Spring Portfolio 项目：\n\n*Spring IDE*：该项目提供 Eclipse 插件，以提高你开发 Spring Bean 配置文件的生产力。自\
  \ 2.0 版本起，Spring IDE 也支持 Spring AOP 和 Spring Web Flow。你将在此章学习如何安装 Spring IDE。\n\n\
  *Spring Security*：该项目，以前称为 Acegi Security，为企业应用（尤其是使用 Spring 开发的应用）定义了一个安全框架。它提供了身份验证、授权和访问控制的安全选项，供你在应用中应用。该框架将在第\
  \ 13 章讨论。\n\n*Spring Web Flow*：该项目允许你将 Web 应用中的复杂用户操作建模为流程。你可以使用 Spring Web Flow\
  \ 轻松开发和重用这些 Web 流程。这将在第 15 章介绍。\n\n*Spring Web Services*：该项目专注于开发契约优先和文档驱动的 Web\
  \ 服务。它集成了多种操作 XML 的方法。Spring Web Services 将在第 16 章介绍。\n\n*Spring Rich Client*：该项目建立了一个构建在\
  \ Spring 框架之上的框架，用于使用 Swing 开发的富 GUI 应用。\n\n*Spring Batch*：该项目为企业应用中的批处理提供了一个框架，专注于处理大量信息。\n\
  \n*Spring Modules*：该项目将其他工具和项目作为模块集成到 Spring 框架中，以扩展 Spring 框架，而不扩展核心 Spring 模块。\n\
  \n*Spring Dynamic Modules*：该项目支持创建在 OSGi（开放服务网关倡议）服务平台上运行的 Spring 应用，该平台允许动态安装、更新和移除应用模块。\n\
  \n*Spring Integration*：该项目为 Spring 框架提供了一个扩展，支持通过高级适配器与外部系统进行企业集成。\n\n*Spring LDAP*：该项目提供了一个库，通过基于模板的方法简化\
  \ LDAP 操作并处理 LDAP 异常。\n\n*Spring JavaConfig*：该项目提供了一种基于 Java 的替代方案，用于在 Spring IoC\
  \ 容器中配置组件。\n\n9799ch02.qxd 5/5/08 4:42 PM 第 26 页\n\n**26**\n\n第 2 章 **■** Spring\
  \ 简介\n\n*Spring BeanDoc*：该项目帮助你基于 Spring 的 Bean 配置文件生成文档和图表。\n\n*Spring .NET*：顾名思义，该项目是\
  \ Spring 框架的.NET 版本，使.NET 应用开发更加容易。\n\n**2-2. 安装 Spring 框架**\n\n问题\n\n你想使用 Spring\
  \ 框架开发一个 Java/Java EE 应用。首先，你需要在本地机器上安装它。\n\n解决方案\n\nSpring 框架的安装非常简单。你只需下载 ZIP\
  \ 格式的 Spring 框架 2.5 版本，并将其解压到你选择的目录即可完成安装。\n\n工作原理\n\n**安装 JDK**\n\n在安装 Spring 框架之前，你的机器上应该已经安装了\
  \ JDK。Spring 2.5 需要 JDK 1.4 或更高版本。对于本书，我强烈建议你安装 JDK 1.5 或更高版本，以便使用注解、自动装箱/拆箱、可变参数、类型安全集合和\
  \ for-each 循环等特性。\n\n**安装 Java IDE**\n\n\n\n虽然开发 Java 应用程序并非绝对需要 IDE，但为了简化开发流程，建议安装一个。由于\
  \ Spring 的配置主要基于 XML，因此应选择支持 XML 编辑功能的 IDE，例如 XML 验证和 XML 自动补全。如果你没有偏好的 Java IDE\
  \ 或想尝试其他选择，我推荐安装 Eclipse Web Tools Platform (WTP)，可从 [`www.eclipse.org/webtools/`](http://www.eclipse.org/webtools)\
  \ 下载。Eclipse WTP 非常易于使用，并包含许多强大的 Java、Web 和 XML 支持功能。此外，Spring 还为 Eclipse 提供了一个名为\
  \ Spring IDE 的插件。\n\n**下载并安装 Spring**\n\n从 Spring 官网，你可以选择下载 Spring 框架 2.5 版本。随后，你将被引导至\
  \ [`sourceforge.net/`](http://sourceforge.net) 下载 Spring 发行版，如图 2-2 所示。\n\n![Image\
  \ 12](img/index-53_1.jpg)\n\n9799ch02.qxd 5/5/08 4:42 PM 第 27 页\n\n第 2 章 **■** Spring\
  \ 简介\n\n**27**\n\n**图 2-2.** *下载 Spring 发行版*\n\n从图 2-2 可以看出，Spring 框架 2.5 版本有三个发行版可供下载。第一个包含整个\
  \ Spring 框架，包括 Spring 的 JAR 文件、依赖库、文档、完整源代码和示例应用程序。第二个仅包含 Spring 的 JAR 文件和文档。最后一个仅包含\
  \ Spring 的 JAR 文件。其中，我强烈建议你下载包含所有依赖项的发行版，即 spring-framework-2.5-with-dependencies.zip。尽管该发行版体积较大，但它包含了开发\
  \ Spring 应用程序所需的大部分库。\n\n下载 Spring 发行版后，将其解压到你选择的目录中。在本书中，我假设你使用 Windows 平台进行开发，并将\
