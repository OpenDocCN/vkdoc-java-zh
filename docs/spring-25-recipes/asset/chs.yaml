  \ 配置文件。\n\n工作原理\n\n假设你将使用 DWR 来实现一个支持 Ajax 的城市距离查询 Web 应用。首先，为你的 Web 应用创建以下目录结构。\n\
  \n**■注意** 要使用 DWR 开发 Web 应用，你需要从 [`getahead.org/dwr`](http://getahead.org/dwr) 下载\
  \ `dwr.jar`，并将其复制到你的 `WEB-INF/lib` 目录下。\n\ncity/\n\nWEB-INF/\n\nclasses/\n\nlib/\n\
  \ncommons-logging.jar\n\ndwr.jar\n\nspring.jar\n\napplicationContext.xml\n\ndwr.xml\n\
  \nweb.xml\n\ndistance.html\n\n9799ch11.qxd 5/14/08 4:13 PM 第 413 页\n\n第 11 章 **■**\
  \ 将 Spring 与其他 Web 框架集成\n\n**413**\n\n在 DWR 应用的 Web 部署描述符（即 `web.xml`）中，你必须注册 DWR\
  \ Servlet `DwrServlet` 来处理 Ajax Web 请求。你可以将此 Servlet 映射到 URL 模式 `/dwr/*`。为了在启动时加载\
  \ Spring 的应用上下文，你还必须注册 Servlet 监听器 `ContextLoaderListener`。\n\n< [web-app version=\"\
  2.4\"](http://java.sun.com/xml/ns/j2ee)\n\n[xsi:schemaLocation=\"http://java.sun.com/xml/ns/j2ee](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<listener>\n\n<listener-class>\n\n**org.springframework.web.context.ContextLoaderListener**\n\
  \n</listener-class>\n\n</listener>\n\n<servlet>\n\n<servlet-name>dwr</servlet-name>\n\
  \n<servlet-class>\n\n**org.directwebremoting.servlet.DwrServlet**\n\n</servlet-class>\n\
  \n</servlet>\n\n<servlet-mapping>\n\n<servlet-name>dwr</servlet-name>\n\n<url-pattern>\
  \ **/dwr/***</url-pattern>\n\n\n\n</servlet-mapping>\n\n</web-app>\n\n一个 DWR 应用程序需要一个配置文件来定义哪些对象可以被\
  \ JavaScript 远程调用。默认情况下，`DwrServlet` 会从 `WEB-INF` 的根目录加载 `dwr.xml` 作为其配置文件。\n\n\
  <!DOCTYPE dwr PUBLIC\n\n\"-//GetAhead Limited//DTD Direct Web Remoting 2.0//EN\"\
  \n\n[\"http://getahead.org/dwr/dwr20.dtd\">](http://getahead.org/dwr/dwr20.dtd)\n\
  \n<dwr>\n\n<allow>\n\n<create creator=\" **new**\" javascript=\"CityService\">\n\
  \n<param name=\" **class**\"\n\nvalue=\" **com.apress.springrecipes.city.CityServiceImpl**\"\
  \ />\n\n<include method=\"findDistance\" />\n\n</create>\n\n</allow>\n\n</dwr>\n\
  \n这个 DWR 配置文件暴露了 `CityServiceImpl` 类，供 JavaScript 远程调用。该类的源代码将动态生成在 `CityService.js`\
  \ 中。`new` 创建器是最常见的 DWR 创建器，它会在每次被调用时创建该类的一个新实例。你只允许该类的 `findDistance()` 方法被远程调用。\n\
  \n**暴露 Spring Bean 以供远程调用**\n\nDWR 的 `new` 创建器会在每次被调用时创建一个新的对象实例。如果你想暴露 Spring 应用上下文中的一个\
  \ Bean 以供远程调用，你可以使用 `spring` 创建器，并指定要暴露的 Bean 的名称。\n\n<dwr>\n\n<allow>\n\n<create\
  \ creator=\" **spring**\" javascript=\"CityService\">\n\n<param name=\" **beanName**\"\
  \ value=\" **cityService**\" />\n\n<include method=\"findDistance\" />\n\n</create>\n\
  \n</allow>\n\n</dwr>\n\n现在，你可以编写一个网页，让用户查找城市之间的距离。使用 Ajax 时，你的网页不需要像传统网页那样刷新。因此，你可以简单地将其创建为一个静态\
  \ HTML 页面（例如，`distance.html`，位于你的 Web 应用上下文的根目录）。\n\n<html>\n\n<head>\n\n<title>城市距离</title>\n\
  \n**<script src='dwr/interface/CityService.js'></script>**\n\n**<script src='dwr/engine.js'></script>**\n\
  \n**<script src='dwr/util.js'></script>**\n\n<script type=\"text/javascript\">\n\
  \n**function find() {**\n\n**var srcCity = dwr.util.getValue(\"srcCity\");**\n\n\
  **var destCity = dwr.util.getValue(\"destCity\");**\n\n**CityService.findDistance(srcCity,\
  \ destCity, function(data) {**\n\n**dwr.util.setValue(\"distance\", data);**\n\n\
  **});**\n\n**}**\n\n</script>\n\n</head>\n\n<body>\n\n<form>\n\n<table>\n\n<tr>\n\
  \n<td>源城市</td>\n\n<td><input type=\"text\" id=\"srcCity\" /></td>\n\n</tr>\n\n<tr>\n\
  \n<td>目标城市</td>\n\n<td><input type=\"text\" id=\"destCity\" /></td>\n\n</tr>\n\n\
  <tr>\n\n<td>距离</td>\n\n<td><span id=\"distance\" /></td>\n\n</tr>\n\n<tr>\n\n<td\
  \ colspan=\"2\"><input type=\"button\" value=\"查找\" onclick=\" **find()**\" /></td>\n\
  \n</tr>\n\n</table>\n\n</form>\n\n</body>\n\n</html>\n\n当用户点击“查找”按钮时，JavaScript\
  \ 函数 `find()` 将被调用。它通过传递源城市和目标城市字段中的值，向 `CityService.findDistance()` 方法发起一个 Ajax\
  \ 请求。当 Ajax 响应到达时，它会在 `distance` 这个 span 元素中显示距离结果。要使此功能生效，你必须包含由 DWR 动态生成的 JavaScript\
  \ 库。\n\n现在，你可以将此应用程序部署到你的 Web 容器中，并通过 URL [`localhost:8080/city/distance.html`](http://localhost:8080/city/distance.html)\
  \ 访问它。\n\n**在 Spring 的 Bean 配置文件中配置 DWR**\n\nDWR 2.0 支持直接在 Spring 的 Bean 配置文件中进行自我配置。然而，在此之前，你必须在\
  \ Web 部署描述符中将之前注册的 `DwrServlet` 替换为 `DwrSpringServlet`。\n\n<web-app ...>\n\n...\n\
  \n<servlet>\n\n<servlet-name>dwr</servlet-name>\n\n<servlet-class>\n\n**org.directwebremoting.spring.DwrSpringServlet**\n\
  \n</servlet-class>\n\n</servlet>\n\n</web-app>\n\n在 Spring 的 Bean 配置文件 `applicationContext.xml`\
  \ 中，你可以使用 DWR 模式中定义的 XML 元素来配置 DWR。首先，你必须声明\n\n\n\n在 Spring 中启用 DWR 需要使用 `<dwr:configuration>`\
  \ 元素。然后，对于每个要暴露给远程调用的 bean，你需要嵌入一个 `<dwr:remote>` 元素，其配置信息与 dwr.xml 中的配置等效。\n\n\
  <beans\n\n[](http://www.directwebremoting.org/schema/spring-dwr)\n\n**9799ch11.qxd\
  \ 5/14/08 4:13 PM 第 416 页**\n\n**416**\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n\
  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\nhttp://www.springframework.org/schema/beans/spring-beans-2.5.xsd\n\
  \n**http://www.directwebremoting.org/schema/spring-dwr**\n\n**http://www.directwebremoting.org/schema/spring-dwr-2.0.xsd\"\
  >**\n\n**<dwr:configuration />**\n\n<bean id=\"cityService\"\n\nclass=\"com.apress.springrecipes.city.CityServiceImpl\"\
  >\n\n**<dwr:remote javascript=\"CityService\">**\n\n**<dwr:include method=\"findDistance\"\
  \ />**\n\n**</dwr:remote>**\n\n...\n\n</bean>\n\n</beans>\n\n现在你可以删除 dwr.xml 了，因为其所有配置信息都已移植到\
  \ Spring 的 bean 配置文件中。\n\n**11-5. 本章小结**\n\n在本章中，你学习了如何将 Spring 集成到使用 Servlet/JSP\
  \ 以及诸如 Struts、JSF 和 DWR 等流行 Web 应用框架开发的 Web 应用中。集成主要集中在这类框架中访问 Spring IoC 容器中声明的\
  \ bean。\n\n在通用的 Web 应用中，无论使用哪种框架，你都可以注册 Spring 提供的 Servlet 监听器 `ContextLoaderListener`，将\
  \ Spring 的应用上下文加载到该 Web 应用的 Servlet 上下文中。随后，Servlet 或任何能够访问 Servlet 上下文的对象，也都能通过一个工具方法访问\
  \ Spring 的应用上下文。\n\n在使用 Struts 开发的 Web 应用中，除了 Servlet 监听器之外，你还可以通过注册一个 Struts 插件来加载\
  \ Spring 的应用上下文。该应用上下文会自动将 Servlet 监听器加载的应用上下文作为其父上下文。\n\nSpring 提供了 `ActionSupport`\
  \ 类，其中包含一个便捷方法供你访问 Spring 的应用上下文。你也可以在 Spring 的应用上下文中声明 Struts 动作，以便注入 Spring bean。\n\
  \n对于 JSF，你可以注册变量解析器 `DelegatingVariableResolver`，将 JSF 变量解析为 Spring bean。此外，你甚至可以在\
  \ Spring 的 bean 配置文件中声明 JSF 受管 bean，从而将它们与 Spring bean 集中管理。\n\nDWR 允许你通过其 Spring\
  \ 创建器将 Spring bean 暴露给远程调用。\n\nDWR 2.0 为 Spring 提供了一个 XML 模式，使你能够在 Spring 的 bean\
  \ 配置文件内部配置 DWR。\n\n在下一章中，你将学习 Spring 提供的测试支持特性，以及如何测试基于 Spring 的应用。\n\n9799ch12.qxd\
  \ 5/14/08 4:08 PM 第 417 页\n\n第 12 章\n\nSpring 测试支持\n\n**本**章中，你将学习可用于测试 Java 应用的基本测试技术，以及\
  \ Spring 框架提供的测试支持特性。这些特性能让你的测试任务更轻松，并引导你实现更好的应用设计。通常，使用 Spring 框架和依赖注入模式开发的应用易于测试。\n\
  \n测试是软件开发中确保质量的关键活动。测试有多种类型，包括单元测试、集成测试、功能测试、系统测试、性能测试和验收测试。Spring 的测试支持侧重于单元测试和集成测试，但也能对其他类型的测试有所帮助。测试可以手动执行，也可以自动执行。然而，由于自动化测试可以在开发过程的不同阶段重复且持续地运行，因此强烈推荐使用，尤其是在敏捷开发过程中。Spring\
  \ 框架是一个适合此类过程的敏捷框架。\n\n\n\nJava 平台上有许多可用的测试框架。目前，**JUnit** 和 **TestNG** 是最流行的两个。JUnit\
  \ 在 Java 社区中历史悠久，拥有庞大的用户群体。JUnit 从 3.8 版本到 4.0 版本经历了重大改进，包括对注解的支持。TestNG 是另一个流行的\
  \ Java 测试框架，它广泛使用了注解。与 JUnit 相比，TestNG 提供了更强大的功能，例如测试分组、依赖测试方法和数据驱动测试。\n\n在 2.5\
  \ 版本之前，Spring 提供了专门针对 JUnit 3.8 的测试支持，这被称为 *JUnit 3.8 遗留支持*。你可以通过扩展它提供的基础测试类来利用这一支持。Spring\
  \ 2.5 通过提供 *Spring TestContext 框架* 升级了其测试支持功能，该框架需要 Java 1.5 或更高版本。该框架通过以下概念抽象了底层测试框架：\n\
  \n*测试上下文*：它封装了测试执行的环境，包括应用上下文、测试类、当前测试实例、当前测试方法和当前测试异常。\n\n*测试上下文管理器*：它为测试管理测试上下文，并在预定义的测试执行点触发测试执行监听器，这些点包括：准备测试实例时、执行测试方法之前（在任何框架特定的初始化方法之前）以及执行测试方法之后（在任何框架特定的清理方法之后）。\n\
  \n*测试执行监听器*：它定义了一个监听器接口，通过实现该接口，你可以监听测试执行事件。TestContext 框架为常见的测试功能提供了几个测试执行监听器，但你也可以自由创建自己的监听器。\n\
  \n**417**\n\n9799ch12.qxd 5/14/08 4:08 PM Page 418\n\n**418**\n\n第 12 章 **■** Spring\
  \ 测试支持\n\nSpring 2.5 为 JUnit 3.8、JUnit 4.4 和 TestNG 5.5 提供了便捷的 TestContext 支持类，并预注册了特定的测试执行监听器。你可以简单地扩展这些支持类来使用\
  \ TestContext 框架，而无需了解太多框架细节。\n\n学完本章后，你将理解测试的基本概念和技术，以及流行的 Java 测试框架 JUnit 和 TestNG。你还将能够使用\
  \ JUnit 3.8 遗留支持和 Spring TestContext 框架来创建单元测试和集成测试。\n\n**12-1. 使用 JUnit 和 TestNG\
  \ 创建测试**\n\n问题\n\n你希望为你的 Java 应用程序创建自动化测试，以便可以重复运行它们来确保应用程序的正确性。\n\n解决方案\n\nJava\
  \ 平台上最流行的测试框架是 JUnit 和 TestNG。JUnit 4 相比 JUnit 3.8 进行了几项重大改进，JUnit 3.8 依赖于基类（即 TestCase）和方法签名（即名称以\
  \ test 开头的方法）来识别测试用例——这种方法缺乏灵活性。JUnit 4 允许你使用 JUnit 的 @Test 注解来标注测试方法，因此任意公共方法都可以作为测试用例运行。TestNG\
  \ 是另一个强大的测试框架，它利用了注解。它也提供了一种 @Test 注解类型供你识别测试用例。\n\n工作原理\n\n假设你要为一家银行开发一个系统。为了确保系统的质量，你必须测试它的每个部分。首先，让我们考虑一个利率计算器，其接口定义如下：\n\
  \npackage com.apress.springrecipes.bank;\n\npublic interface InterestCalculator\
  \ {\n\npublic void setRate(double rate);\n\npublic double calculate(double amount,\
  \ double year);\n\n}\n\n每个利率计算器都需要设置一个固定的利率。现在，你可以使用一个简单的利息公式来实现这个计算器：\n\npackage\
  \ com.apress.springrecipes.bank;\n\npublic class SimpleInterestCalculator implements\
  \ InterestCalculator {\n\nprivate double rate;\n\n9799ch12.qxd 5/14/08 4:08 PM Page\
  \ 419\n\n第 12 章 **■** Spring 测试支持\n\n**419**\n\n\n\npublic void setRate(double rate)\
  \ {\n\nthis.rate = rate;\n\n}\n\npublic double calculate(double amount, double year)\
  \ {\n\nif (amount < 0 || year < 0) {\n\nthrow new IllegalArgumentException(\"Amount\
  \ or year must be positive\");\n\n}\n\nreturn amount * year * rate;\n\n}\n\n}\n\n\
  接下来，你将使用流行的测试框架 JUnit（3.8 和 4 两个版本）以及 TestNG（版本 5）来测试这个单利计算器。\n\n**■提示** 通常，测试类及其目标类位于同一个包中，但测试的源文件会存储在与其它类源文件（例如\
  \ `src`）不同的独立目录（例如 `test`）中。\n\n**使用 JUnit 3.8 进行测试**\n\n在 JUnit 3.8 中，包含测试用例的类必须继承框架类\
  \ `TestCase`。每个测试用例必须是一个公有方法，且其名称必须以 `test` 开头。每个测试用例应在固定的环境中运行，该环境由一组特定的对象组成，这些对象被称为*测试夹具*。\n\
  \n在 JUnit 3.8 中，你可以通过重写 `TestCase` 中定义的 `setUp()` 方法来初始化测试夹具。JUnit 会在每个测试用例执行前调用此方法。相应地，你可以重写\
  \ `tearDown()` 方法来执行清理任务，例如释放持久资源。JUnit 会在每个测试用例执行后调用此方法。你可以创建以下 JUnit 3.8 测试用例来测试你的单利计算器。\n\
  \n**■注意** 要编译和运行为 JUnit 3.8 创建的测试用例，你必须在类路径中包含 `junit-3.8.2.jar` 或 `junit-4.4.jar`（位于\
  \ Spring 安装目录的 `lib/junit` 目录下）。\n\npackage com.apress.springrecipes.bank;\n\nimport\
  \ junit.framework.TestCase;\n\npublic class SimpleInterestCalculatorJUnit38Tests\
