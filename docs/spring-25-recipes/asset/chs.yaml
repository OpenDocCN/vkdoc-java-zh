  \n9799ch05.qxd 4/14/08 10:59 AM Page 142\n\n**142**\n\n第 5 章 **■** 动态代理与经典 Spring\
  \ AOP\n\n...\n\n}\n\nprivate void validate(double a) {\n\nif (a < 0) {\n\nthrow\
  \ new IllegalArgumentException(\"Positive numbers only\");\n\n}\n\n}\n\n}\n\n识别问题\n\
  \n如您所见，随着您添加越来越多的非业务需求（例如日志记录和验证），原始的计算器方法不断膨胀。这些系统级需求通常需要横切多个模块，因此它们被称为*横切关注点*，以区别于系统的核心业务需求（称为*核心关注点*）。\n\
  \n企业应用程序中典型的横切关注点包括日志记录、验证、池化、缓存、身份验证和事务。图 5-1 展示了您的计算器应用程序中的横切关注点。\n\n**图 5-1.**\
  \ *计算器应用程序中的横切关注点* 然而，仅使用类和接口作为编程元素，传统的面向对象方法无法很好地模块化横切关注点。开发人员常常不得不将它们与核心关注点混合在同一个模块中。结果，这些横切关注点分散在应用程序的不同模块中，因此未能实现模块化。\n\
  \n非模块化的横切关注点会导致两个主要问题。第一个是*代码纠缠*。就像前面的计算器方法一样，每个方法都必须同时处理多个关注点以及核心计算逻辑。这将导致代码的可维护性和可重用性变差。例如，前面的计算器实现很难重用于另一个没有日志记录要求且可以接受负数作为操作数的应用程序。\n\
  \n9799ch05.qxd 4/14/08 10:59 AM Page 143\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\n**143**\n\
  \n非模块化横切关注点导致的另一个问题是*代码分散*。\n\n对于日志记录需求，您必须在多个模块中多次重复日志记录语句才能满足单个需求。稍后，如果日志记录标准发生变化，您将不得不修改所有模块。此外，也很难确保日志记录需求得到一致地实现。如果您在某处遗漏了一条日志记录语句，整个系统的日志记录将变得不一致。\n\
  \n基于所有这些原因，计算器应该只专注于核心计算逻辑。让我们将日志记录和验证关注点从它们中分离出来。\n\npackage com.apress.springrecipes.calculator;\n\
  \npublic class ArithmeticCalculatorImpl implements ArithmeticCalculator {\n\npublic\
  \ double add(double a, double b) {\n\ndouble result = a + b;\n\nSystem.out.println(a\
  \ + \" + \" + b + \" = \" + result);\n\nreturn result;\n\n}\n\npublic double sub(double\
  \ a, double b) {\n\ndouble result = a - b;\n\nSystem.out.println(a + \" - \" + b\
  \ + \" = \" + result);\n\nreturn result;\n\n}\n\npublic double mul(double a, double\
  \ b) {\n\ndouble result = a * b;\n\nSystem.out.println(a + \" * \" + b + \" = \"\
  \ + result);\n\nreturn result;\n\n}\n\npublic double div(double a, double b) {\n\
  \ndouble result = a / b;\n\nSystem.out.println(a + \" / \" + b + \" = \" + result);\n\
  \nreturn result;\n\n}\n\n}\n\npackage com.apress.springrecipes.calculator;\n\npublic\
  \ class UnitCalculatorImpl implements UnitCalculator {\n\npublic double kilogramToPound(double\
  \ kilogram) {\n\ndouble pound = kilogram * 2.2;\n\nSystem.out.println(kilogram +\
  \ \" kilogram = \" + pound + \" pound\"); return pound;\n\n}\n\n9799ch05.qxd 4/14/08\
  \ 10:59 AM Page 144\n\n**144**\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\npublic double\
  \ kilometerToMile(double kilometer) {\n\ndouble mile = kilometer * 0.62;\n\nSystem.out.println(kilometer\
  \ + \" kilometer = \" + mile + \" mile\"); return mile;\n\n}\n\n}\n\n**5-2. 使用动态代理模块化横切关注点**\n\
  \n问题\n\n由于非模块化的横切关注点会导致代码纠缠和代码分散问题，您希望寻求一种方法来模块化它们。然而，由于它们横跨应用程序的多个模块，通常很难用传统的面向对象方法进行模块化。\n\
  \n解决方案\n\n您可以应用一种称为*代理*的设计模式，将横切关注点与核心关注点分离开来。代理是 23 种 GoF（四人组）面向对象设计模式之一，属于“结构型模式”类别。\n\
  \n代理设计模式的原则是用一个代理对象包装原始对象，并使用此代理来替代原始对象。任何对原始对象的调用都将首先经过代理。图 5-2 展示了代理设计模式的一般概念。\n\
  \n**图 5-2.** *代理设计模式的一般概念*\n\n代理对象负责决定何时以及是否将方法调用转发给原始对象。同时，代理还可以在每个方法调用周围执行额外的任务。因此，代理是实施横切关注点的好地方。\n\
  \n\n\n在 Java 中，有两种方式可以实现代理设计模式。传统的方式是以纯面向对象风格编写静态代理。静态代理通过使用专用代理包装一个对象，在每个方法调用前后执行额外任务。这种专用性意味着你必须为每个接口编写一个代理类，才能替代原始实现，这在包含成百上千个组件的大型应用中效率非常低下。\n\
  \n另一种方法是通过 JDK 1.3 或更高版本提供的动态代理支持。它支持为任何对象动态创建代理。唯一的限制是对象必须至少实现一个接口，并且只有接口中声明的方法调用才会经过代理。然而，还有另一种代理——CGLIB\
  \ 代理，它没有这个限制。即使一个类没有实现任何接口，它也能处理该类中声明的所有方法。\n\n动态代理是通过 Java 反射 API 实现的，因此它们比静态代理具有更通用的使用方式。正因如此，动态代理是\
  \ Spring 实现 AOP 的核心技术之一。\n\n工作原理\n\nJDK 动态代理需要一个调用处理器来处理方法调用。调用处理器就是一个实现了以下 `InvocationHandler`\
  \ 接口的类：\n\n```java\npackage java.lang.reflect;\n\npublic interface InvocationHandler\
  \ {\n\n    public Object invoke(Object proxy, Method method, Object[] args)\n  \
  \      throws Throwable;\n\n}\n```\n\n该接口中声明的唯一方法是 `invoke()`。它允许你自行控制整个调用过程。`invoke()`\
  \ 方法的第一个参数是正在调用方法的代理实例。第二个参数是类型为 `java.lang.reflect.Method` 的方法对象，它代表当前正在被调用的方法。最后一个参数是用于调用目标方法的参数数组。最后，你必须返回一个值作为当前方法调用的结果。\n\
  \n**创建日志代理**\n\n通过实现 `InvocationHandler` 接口，你可以编写一个记录方法开始和结束的调用处理器。你需要一个目标计算器对象来执行实际计算，该对象通过构造函数参数传入。\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n\nimport java.lang.reflect.InvocationHandler;\n\
  import java.lang.reflect.Method;\nimport java.util.Arrays;\nimport org.apache.commons.logging.Log;\n\
  import org.apache.commons.logging.LogFactory;\n\npublic class CalculatorLoggingHandler\
  \ implements InvocationHandler {\n\n    private Log log = LogFactory.getLog(this.getClass());\n\
  \    private Object target;\n\n    public CalculatorLoggingHandler(Object target)\
  \ {\n        this.target = target;\n    }\n\n    public Object invoke(Object proxy,\
  \ Method method, Object[] args)\n        throws Throwable {\n        // 记录方法开始，包含方法名和参数。\n\
  \        **log.info(\"方法 \" + method.getName() + \"() 开始，参数为 \"**\n            **+\
  \ Arrays.toString(args));**\n\n        // 通过调用 Method.invoke() 并传入目标对象和方法参数，在目标计算器对象上执行实际计算。\n\
  \        Object result = method.invoke(target, args);\n\n        // 记录方法结束，包含返回结果。\n\
  \        **log.info(\"方法 \" + method.getName() + \"() 结束，结果为 \" + result);**\n \
  \       return result;\n    }\n\n}\n```\n\n通过使用反射，`invoke()` 方法足够通用，可以处理两个计算器的所有方法调用。你可以通过调用\
  \ `Method.getName()` 访问方法名，并通过对象数组访问参数。要执行实际计算，你需要在方法对象上调用 `invoke()`，并传入目标计算器对象和方法参数。\n\
  \n\n\n要创建一个带有调用处理器的 JDK 动态代理实例，只需调用静态方法 `Proxy.newProxyInstance()`。\n\npackage com.apress.springrecipes.calculator;\n\
  \nimport java.lang.reflect.Proxy;\n\npublic class Main {\n\npublic static void main(String[]\
  \ args) {\n\nArithmeticCalculator **arithmeticCalculatorImpl** =\n\nnew ArithmeticCalculatorImpl();\n\
  \n**ArithmeticCalculator arithmeticCalculator =**\n\n**(ArithmeticCalculator) Proxy.newProxyInstance(**\n\
  \n**arithmeticCalculatorImpl.getClass().getClassLoader(),**\n\n**arithmeticCalculatorImpl.getClass().getInterfaces(),**\n\
  \n**new CalculatorLoggingHandler(arithmeticCalculatorImpl));**\n\n9799ch05.qxd 4/14/08\
  \ 10:59 AM Page 147\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\n**147**\n\n...\n\n}\n\n\
  }\n\n该方法的第一个参数是用于注册此代理的类加载器。在大多数情况下，你应该在与原始类相同的类加载器中定义代理。第二个参数是此代理需要实现的接口。只有这些接口中声明的方法调用才会经过代理。通常，你会为目标类的所有接口创建代理。最后一个参数是你的调用处理器，用于处理方法调用。通过调用此方法，你将获得一个由\
