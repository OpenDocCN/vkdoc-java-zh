  \        pointcut = \" **loggingOperation()**\",\n        returning = \"result\"\
  )\n    public void logAfterReturning(JoinPoint joinPoint, Object result) {\n   \
  \     ...\n    }\n\n    @AfterThrowing(\n        pointcut = \" **loggingOperation()**\"\
  ,\n        throwing = \"e\")\n```\n\n\n\n9799ch06.qxd 4/15/08 11:45 AM 第 181 页\n\
