  \n虽然你可以将搜索动作包含在 bookCriteria 视图状态中，但该动作无法被其他需要图书搜索的状态复用。最佳实践是将可复用的动作提取到独立的动作状态中。动作状态仅定义流程中要执行的一个或多个动作，这些动作将按声明的顺序执行。如果某个动作返回一个包含与某个转移匹配的\
  \ ID 的 Event 对象，则该转移将立即发生，而不会执行后续动作。但如果所有动作都已执行完毕且没有匹配的转移，则会执行成功转移。\n\n为了复用，你可以将图书搜索动作提取到一个\
  \ searchBook 状态中。\n\n然后修改 bookCriteria 状态的转移，使其经过该状态。\n\n<flow ...>\n\n<view-state\
  \ id=\" **bookCriteria**\">\n\n<on-render>\n\n<evaluate expression=\"bookCriteriaAction.setupForm\"\
  \ />\n\n</on-render>\n\n<transition on=\"search\" to=\" **searchBook**\">\n\n<evaluate\
  \ expression=\"bookCriteriaAction.bindAndValidate\" />\n\n</transition>\n\n</view-state>\n\
  \n9799ch15.qxd 5/22/08 4:38 PM Page 561\n\n第 15 章 **■** Spring Web Flow\n\n**561**\n\
  \n<action-state id=\" **searchBook**\">\n\n<evaluate expression=\"bookService.search(bookCriteria)\"\
  \n\nresult=\"flowScope.books\" />\n\n<transition on=\"success\" to=\" **bookList**\"\
  \ />\n\n</action-state>\n\n...\n\n</flow>\n\n当前该图书搜索流程的流程图如图 15-5 所示。\n\n**图 15-5.**\
  \ *包含动作状态的图书搜索流程图* **定义决策状态**\n\n现在你需要满足图书搜索流程的需求：如果搜索结果多于一个，则在列表页面显示它们；否则，直接在详情页面显示其详细信息，而无需经过列表页面。为此，你需要一个能够评估布尔表达式以确定转移的决策状态：\n\
  \n<flow ...>\n\n...\n\n<action-state id=\" **searchBook**\">\n\n<evaluate expression=\"\
  bookService.search(bookCriteria)\"\n\nresult=\"flowScope.books\" />\n\n<transition\
  \ on=\"success\" to=\" **checkResultSize**\" />\n\n</action-state>\n\n<decision-state\
  \ id=\" **checkResultSize**\">\n\n<if test=\"books.size() == 1\" then=\" **extractResult**\"\
  \ else=\" **bookList**\" />\n\n</decision-state>\n\n9799ch15.qxd 5/22/08 4:38 PM\
  \ Page 562\n\n**562**\n\n第 15 章 **■** Spring Web Flow\n\n<action-state id=\" **extractResult**\"\
  >\n\n<set name=\"flowScope.book\" value=\"books.get(0)\" />\n\n<transition on=\"\
  success\" to=\" **bookDetails**\" />\n\n</action-state>\n\n...\n\n</flow>\n\nsearchBook\
  \ 状态的成功转移已更改为 checkResultSize，这是一个决策状态，用于检查是否恰好有一个搜索结果。如果为真，它将转移到 extractResult\
  \ 动作状态，将第一个且唯一的结果提取到流程作用域变量 book 中。\n\n否则，它将转移到 bookList 状态，在列表页面中显示所有搜索结果。\n\n\
  当前流程图如图 15-6 所示。\n\n**图 15-6.** *包含决策状态的图书搜索流程图* **定义结束状态**\n\n\n\n图书搜索流程的基本要求已经完成。不过，你可能会被要求在图书列表页面和图书详情页面都提供一个“新搜索”链接，以便开始新的搜索。你可以简单地将以下链接添加到这两个页面：\n\
  \n<a href=\"${flowExecutionUrl}&_eventId=newSearch\">新搜索</a>\n\n9799ch15.qxd 5/22/08\
  \ 4:38 PM 第 563 页\n\n第 15 章 **■** S P R I N G W E B F L O W\n\n**563**\n\n如你所见，此链接将触发一个\
  \ newSearch 事件。与其转换到第一个视图状态 bookCriteria，不如定义一个结束状态来重新启动此流程。结束状态将使所有流程作用域变量失效，以释放其资源。\n\
  \n<flow ...>\n\n...\n\n<view-state id=\" **bookList**\">\n\n<transition on=\"select\"\
  \ to=\"bookDetails\">\n\n<evaluate expression=\"bookService.findByIsbn(requestParameters.isbn)\"\
  \n\nresult=\"flowScope.book\" />\n\n</transition>\n\n<transition on=\"newSearch\"\
  \ to=\" **newSearch**\" />\n\n</view-state>\n\n<view-state id=\" **bookDetails**\"\
  >\n\n<transition on=\"newSearch\" to=\" **newSearch**\" />\n\n</view-state>\n\n\
  <end-state id=\" **newSearch**\" />\n\n</flow>\n\n默认情况下，结束状态会将当前流程重新启动到起始状态，但你也可以通过指定结束状态的\
  \ view 属性中的流程名称，并使用 `flowRedirect` 作为前缀，来重定向到另一个流程。当前流程的示意图如图 15-7 所示。\n\n**图 15-7.**\
  \ *带有结束状态的图书搜索流程示意图*\n\n9799ch15.qxd 5/22/08 4:38 PM 第 564 页\n\n**564**\n\n第 15\
  \ 章 **■** S P R I N G W E B F L O W\n\n**定义子流程状态**\n\n假设你有另一个 Web 流程也需要显示图书详情。为了重用，你可以将\
  \ bookDetails 状态提取到一个新的 Web 流程中，该流程可以被其他流程作为子流程调用。首先，你必须在 library-webflow.xml 中将该流程定义的位置添加到流程注册表中，并创建流程定义\
  \ XML 文件：\n\n<webflow:flow-registry id=\"flowRegistry\">\n\n...\n\n**<webflow:flow-location\
  \ path=\"/WEB-INF/flows/bookDetails/bookDetails.xml\" />**\n\n</webflow:flow-registry>\n\
  \n然后，你将 bookDetails 视图状态移动到此流程，并将 bookDetails.jsp 移动到此目录。由于 bookDetails 状态有一个到 newSearch\
  \ 状态的转换，你也需要在此流程中将其定义为一个结束状态。\n\n<flow\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/webflow](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<input name=\"book\" value=\"flowScope.book\" />\n\n<view-state id=\"bookDetails\"\
  >\n\n<transition on=\"newSearch\" to=\"newSearch\" />\n\n</view-state>\n\n<end-state\
  \ id=\"newSearch\" />\n\n</flow>\n\n要显示的图书实例作为名为 book 的输入参数传递给此流程，并存储在流程作用域变量 book\
  \ 中。请注意，流程作用域仅对当前流程可见。\n\n然后，你在 bookSearch 流程中定义一个子流程状态，该状态启动 bookDetails 流程以显示图书详情：\n\
  \n<subflow-state id=\"bookDetails\" subflow=\"bookDetails\">\n\n<input name=\"book\"\
  \ value=\"flowScope.book\" />\n\n<transition on=\"newSearch\" to=\"newSearch\" />\n\
  \n</subflow-state>\n\n在此子流程状态定义中，你将 bookSearch 流程作用域中的 book 变量作为输入参数传递给 bookDetails\
  \ 子流程。当 bookDetails 子流程在其 newSearch 状态结束时，它将转换到父流程的 newSearch 状态，在此例中恰好是 bookSearch\
  \ 流程的 newSearch 结束状态。当前流程的示意图如图 15-8 所示。\n\n9799ch15.qxd 5/22/08 4:38 PM 第 565 页\n\
  \n第 15 章 **■** S P R I N G W E B F L O W\n\n**565**\n\n**图 15-8.** *带有子流程的图书搜索流程示意图*\
  \ **15-3. 保护 Web 流程**\n\n问题\n\n你希望通过仅允许授权用户访问来保护应用程序中的某些 Web 流程。\n\n解决方案\n\nSpring\
  \ Web Flow 提供了与 Spring Security 的集成，因此你可以轻松地使用 Spring Security 保护你的 Web 流程。在正确配置\
  \ Spring Security 后，你可以通过嵌入带有指定访问属性的 `<secured>` 元素来简单地保护一个流程、一个状态或一个转换。\n\n9799ch15.qxd\
  \ 5/22/08 4:38 PM 第 566 页\n\n**566**\n\n第 15 章 **■** S P R I N G W E B F L O W\n\
  \n工作原理\n\n要使用 Spring Security 保护 Web 流程，首先必须在 Web 部署描述符（即 web.xml）中配置一个 DelegatingFilterProxy\
  \ 过滤器。此过滤器会将 HTTP 请求过滤委托给 Spring Security 中定义的过滤器。\n\n**■注意** 要在你的 Web 流程应用程序中使用\
  \ Spring Security，你必须将 spring-security-core-2.0.1.jar（位于 Spring Security 安装目录的 dist\
  \ 目录下）复制到 WEB-INF/lib 目录。\n\n<web-app ...>\n\n<context-param>\n\n<param-name>contextConfigLocation</param-name>\n\
  \n<param-value>\n\n/WEB-INF/library-service.xml\n\n**/WEB-INF/library-security.xml**\n\
  \n</param-value>\n\n</context-param>\n\n...\n\n<filter>\n\n<filter-name> **springSecurityFilterChain**</filter-name>\n\
  \n<filter-class>\n\n**org.springframework.web.filter.DelegatingFilterProxy**\n\n\
  </filter-class>\n\n</filter>\n\n<filter-mapping>\n\n<filter-name>springSecurityFilterChain</filter-name>\n\
  \n<url-pattern>/*</url-pattern>\n\n</filter-mapping>\n\n...\n\n</web-app>\n\n由于安全配置应应用于整个应用程序，你将其集中在\
  \ /WEB-INF/library-security.xml 中，并将此文件加载到根应用程序上下文中。\n\n然后，你创建此文件，内容如下：\n\n[<beans:beans](http://www.springframework.org/schema/security)\n\
  \n[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/security`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/security/spring-security-2.0.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<http auto-config=\"true\" />\n\n9799ch15.qxd 5/22/08 4:38 PM 第 567 页\n\n第 15\
  \ 章 **■** S P R I N G W E B F L O W\n\n**567**\n\n<authentication-provider>\n\n\
  <user-service>\n\n<user name=\"user1\" password=\"1111\" authorities=\"ROLE_USER\"\
  \ />\n\n<user name=\"user2\" password=\"2222\" authorities=\"ROLE_USER\" />\n\n\
  </user-service>\n\n</authentication-provider>\n\n</beans:beans>\n\n在上述安全配置中，你启用了\
  \ Spring Security 的 HTTP 自动配置，它提供了默认的基于表单的登录服务、匿名登录服务等。\n\n你还定义了两个用于测试的用户账户。\n\n\
  在 Web 流程配置文件（即 library-webflow.xml）中，你必须在流程执行器中注册流程执行监听器 SecurityFlowExecutionListener，以便为\
  \ Web 流程启用 Spring Security：\n\n<beans ...>\n\n...\n\n<webflow:flow-executor id=\"\
  flowExecutor\">\n\n**<webflow:flow-execution-listeners>**\n\n**<webflow:listener\
  \ ref=\"securityFlowExecutionListener\" />**\n\n**</webflow:flow-execution-listeners>**\n\
  \n</webflow:flow-executor>\n\n<bean id=\"securityFlowExecutionListener\" class=\"\
  org.springframework. **➥**\n\nwebflow.security.SecurityFlowExecutionListener\" />\n\
  \n</beans>\n\n现在，Spring Security 已为你的 Web 流程应用程序配置完毕。你可以通过在流程定义中嵌入一个 `<secured>`\
  \ 元素来简单地保护一个 Web 流程。例如，让我们保护定义在 /WEB-INF/flows/bookSearch/bookSearch.xml 中的 bookSearch\
  \ 流程。\n\n<flow\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/webflow](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n**<secured attributes=\"ROLE_USER\" />**\n\n...\n\n</flow>\n\n\n\n你可以在 `attributes`\
  \ 属性中指定访问此 Web 流程所需的多个访问属性，用逗号分隔。默认情况下，拥有任一属性的用户即可访问此 Web 流程，但你可以通过将 `<secured>`\
  \ 的 `match` 属性设置为 `all`，仅允许拥有所有属性的用户访问。\n\n现在，如果你部署此应用程序并测试图书搜索流程，则必须先登录应用程序才能访问该流程。同样，你可以通过嵌入\
  \ `<secured>` 元素来精细地保护特定状态或事务。\n\n9799ch15.qxd 5/22/08 4:38 PM 第 568 页\n\n**568**\n\
  \n第 15 章 **■** S P R I N G W E B F L O W\n\n**15-4\\. 在 Web 流程中持久化对象**\n\n问题\n\n\
  在许多情况下，你可能需要在 Web 流程的不同状态中创建和更新持久化对象。根据 Web 流程的特性，对这些持久化对象所做的更改不应刷新到数据库，直到该 Web\
  \ 流程的最终状态，该最终状态要么在一个事务中提交所有这些更改，要么在流程失败或取消时忽略这些更改。你可以在不同的 Web 流程状态之间维护一个持久化上下文，但这并非高效的方式。\n\
  \n解决方案\n\nSpring Web Flow 能够在你无需干预的情况下，跨 Web 流程的不同状态管理持久化上下文。你可以简单地通过 Spring Web\
  \ Flow 暴露的流程作用域变量来访问受管理的持久化上下文。Spring Web Flow 2.0 支持 JPA 和 Hibernate。\n\n要让 Spring\
  \ Web Flow 为你的 Web 流程管理持久化上下文，你必须在流程执行器中注册一个流程执行监听器（例如，用于 JPA 的 `JpaFlowExecutionListener`\
  \ 和用于 Hibernate 的 `HibernateFlowExecutionListener`）。当新流程启动时，此监听器会创建一个新的持久化上下文（例如，一个\
  \ JPA 实体管理器或一个 Hibernate 会话），并将其绑定到流程作用域。然后，你可以在不同的 Web 流程状态中使用此持久化上下文来持久化你的对象。最后，你可以定义一个结束状态，该状态要么提交更改，要么忽略更改。\n\
  \n工作原理\n\n假设你将构建一个供读者从图书馆借书的 Web 流程。你希望将借阅记录存储在由 Apache Derby 等数据库引擎管理的数据库中。你考虑使用\
  \ JPA 来持久化记录，并以 Hibernate 作为底层的 PA 引擎。首先，你使用 JPA 注解定义 `BorrowingRecord` 实体类。\n\n\
  **■注意** 要使用 Hibernate 作为 JPA 引擎，你必须将 `persistence.jar`（位于 Spring 安装目录的 `lib/j2ee`\
  \ 目录中）、`hibernate3.jar`、`hibernate-annotations.jar`、`hibernate-commons-annotations.jar`、`hibernate-entitymanager.jar`（位于\
  \ `lib/hibernate` 目录中）、`antlr-2.7.6.jar`（位于 `lib/antlr` 目录中）、`asm-2.2.3.jar`（位于\
  \ `lib/asm` 目录中）、`cglib-nodep-2.1_3.jar`（位于 `lib/cglib` 目录中）、`dom4j-1.6.1.jar`（位于\
  \ `lib/dom4j` 目录中）、`ehcache-1.2.4.jar`（位于 `lib/ehcache` 目录中）、`jta.jar`（位于 `lib/j2ee`\
  \ 目录中）、`commons-collections.jar`、`commons-logging.jar`（位于 `lib/jakarta-commons`\
  \ 目录中）和 `log4j-1.2.14.jar`（位于 `lib/log4j` 目录中）复制到 `WEB-INF/lib` 目录。由于 Hibernate\
  \ EntityManager 依赖于 Javassist，你必须在类路径中包含 `javassist.jar`。要使用 Apache Derby 作为数据库引擎，你还必须复制\
  \ `derbyclient.jar`（位于 Derby 安装目录的 `lib` 目录中）。\n\n9799ch15.qxd 5/22/08 4:38 PM 第\
  \ 569 页\n\n第 15 章 **■** S P R I N G W E B F L O W\n\n**569**\n\npackage com.apress.springrecipes.library.domain;\n\
