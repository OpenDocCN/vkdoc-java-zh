  \n</bean>\n\n</entry>\n\n</map>\n\n</property>\n\n</bean>\n\n<bean id=\"aaa\" **factory-bean=\"\
  productCreator\"**\n\n**factory-method=\"createProduct\"** >\n\n<constructor-arg\
