  构造函数注入可以避免 setter 注入带来的一些问题。您必须提供构造函数参数列表中声明的所有依赖项，因此用户不可能遗漏任何依赖项。而且，一旦依赖项被注入，就不能再被修改，因此不会出现粗心修改的问题。


