  \n**8-11. 设置超时和只读事务属性**\n\n问题\n\n由于事务可能会获取行和表上的锁，长时间运行的事务会占用资源并影响整体性能。此外，如果事务只读取数据而不更新数据，数据库引擎可以优化该事务。你可以指定这些属性来提高应用程序的性能。\n\
  \n9799ch08.qxd 5/6/08 10:00 AM Page 281\n\n第 8 章 **■** SPRING 中的事务管理\n\n**281**\n\
  \n解决方案\n\n*超时*事务属性指示事务在被强制回滚之前可以存活多长时间。这可以防止长时间运行的事务占用资源。*只读*属性指示该事务仅读取数据而不更新数据。这有助于数据库引擎优化事务。\n\
  \n工作原理\n\n超时和只读事务属性可以在 `@Transactional` 注解中定义。请注意，超时以秒为单位。\n\npackage com.apress.springrecipes.bookshop;\n\
  \n...\n\nimport org.springframework.transaction.annotation.Isolation;\n\nimport\
  \ org.springframework.transaction.annotation.Transactional;\n\npublic class JdbcBookShop\
  \ extends JdbcDaoSupport implements BookShop {\n\n...\n\n@Transactional(\n\nisolation\
  \ = Isolation.REPEATABLE_READ,\n\n**timeout = 30,**\n\n**readOnly = true)**\n\n\
  public int checkStock(String isbn) {\n\n...\n\n}\n\n}\n\n在 Spring 2.x 的事务通知中，可以在\
  \ `<tx:method>` 元素中指定超时和只读事务属性。\n\n<tx:advice ...>\n\n<tx:attributes>\n\n<tx:method\
  \ name=\"...\"\n\n**timeout=\"30\"**\n\n**read-only=\"true\"** />\n\n</tx:attributes>\n\
  \n</tx:advice>\n\n在经典 Spring AOP 中，可以在 `TransactionInterceptor` 和 `TransactionProxyFactoryBean`\
  \ 的事务属性中指定超时和只读事务属性。\n\n<property name=\"transactionAttributes\">\n\n<props>\n\n\
  <prop key=\"...\">\n\nPROPAGATION_REQUIRED, **timeout_30, readOnly**\n\n</prop>\n\
  \n</props>\n\n</property>\n\n9799ch08.qxd 5/6/08 10:00 AM Page 282\n\n**282**\n\n\
  第 8 章 **■** SPRING 中的事务管理\n\n\n\n在 Spring 的事务管理 API 中，超时和只读事务属性可以在 `DefaultTransactionDefinition`\
  \ 对象中指定，然后传递给事务管理器的 `getTransaction()` 方法或事务模板的构造函数。\n\nDefaultTransactionDefinition\
  \ def = new DefaultTransactionDefinition();\n\ndef.setTimeout(**30**);\n\ndef.setReadOnly(**true**);\n\
  \n**8-12. 使用加载时织入管理事务**\n\n问题\n\n默认情况下，Spring 的声明式事务管理通过其 AOP 框架启用。\n\n然而，由于 Spring\
  \ AOP 只能增强 IoC 容器中声明的 Bean 的公有方法，因此你只能在此范围内使用 Spring AOP 管理事务。\n\n有时你可能希望管理非公有方法的事务，或者管理在\
  \ Spring IoC 容器外部创建的对象（例如领域对象）的方法的事务。\n\n解决方案\n\nSpring 2.5 还提供了一个名为 `AnnotationTransactionAspect`\
  \ 的 AspectJ 切面，它可以管理任何对象的任何方法的事务，即使这些方法是非公有的，或者对象是在 Spring IoC 容器外部创建的。该切面将管理所有带有\
  \ `@Transactional` 注解的方法的事务。你可以选择使用 AspectJ 的编译时织入或加载时织入来启用此切面。\n\n工作原理\n\n首先，让我们创建一个领域类\
  \ `Book`，其实例（即领域对象）可能在 Spring IoC 容器外部创建。\n\npackage com.apress.springrecipes.bookshop;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\n\nimport org.springframework.beans.factory.annotation.Configurable;\n\
  \nimport org.springframework.jdbc.core.JdbcTemplate;\n\n**@Configurable**\n\npublic\
  \ class Book {\n\nprivate String isbn;\n\nprivate String name;\n\nprivate int price;\n\
  \n// 构造方法、Getter 和 Setter\n\n...\n\nprivate JdbcTemplate jdbcTemplate;\n\n9799ch08.qxd\
  \ 5/6/08 10:00 AM Page 283\n\n第 8 章 **■** Spring 中的事务管理\n\n**283**\n\n**@Autowired**\n\
  \npublic void setJdbcTemplate(JdbcTemplate jdbcTemplate) {\n\nthis.jdbcTemplate\
  \ = jdbcTemplate;\n\n}\n\npublic void purchase(String username) {\n\njdbcTemplate.update(\n\
  \n\"UPDATE BOOK_STOCK SET STOCK = STOCK - 1 \" +\n\n\"WHERE ISBN = ?\",\n\nnew Object[]\
  \ { isbn });\n\njdbcTemplate.update(\n\n\"UPDATE ACCOUNT SET BALANCE = BALANCE -\
  \ ? \" +\n\n\"WHERE USERNAME = ?\",\n\nnew Object[] { price, username });\n\n}\n\
  \n}\n\n这个领域类有一个 `purchase()` 方法，该方法将从数据库中扣除当前图书实例的库存和用户账户的余额。为了利用 Spring 强大的 JDBC\
  \ 支持特性，你可以通过 Setter 注入来注入 JDBC 模板。\n\n你可以使用 Spring 的加载时织入支持来将 JDBC 模板注入到图书领域对象中。你必须使用\
  \ `@Configurable` 注解该类，以声明此类对象可在 Spring IoC 容器中进行配置。此外，你可以使用 `@Autowired` 注解 JDBC\
  \ 模板的 Setter 方法，使其自动装配。\n\nSpring 在其切面库中包含了一个 AspectJ 切面 `AnnotationBeanConfigurerAspect`，用于配置对象依赖关系，即使这些对象是在\
  \ IoC 容器外部创建的。要启用此切面，你只需在 Bean 配置文件中定义 `<context:spring-configured>` 元素。为了在加载时将此切面织入你的领域类，你还需要定义\
  \ `<context:load-time-weaver>`。最后，为了通过 `@Autowired` 将 JDBC 模板自动装配到图书领域对象中，你还需要 `<context:annotation-config>`。\n\
  \n**■注意** 要使用 Spring 的 AspectJ 切面库，你必须将 `spring-aspects.jar`（位于 Spring 安装目录的 `dist/weaving`\
  \ 目录下）包含在你的类路径中。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
