  第 10 章 **■** S P R I N G M V C 框 架\n\n**325**\n\n**设置 Spring MVC 应用程序**\n\n在开始使用\
  \ Spring MVC 开发基于 Web 的应用程序之前，你需要正确地进行设置。通常，使用 Spring MVC 开发的 Web 应用程序的设置方式与标准 Java\
  \ Web 应用程序相同，不同之处在于你需要添加一些 Spring MVC 特有的配置文件和必需的库。\n\nJava EE 规范定义了 Java Web 应用程序的有效目录结构。例如，你必须在\
  \ WEB-INF 根目录下提供 Web 部署描述符（即 web.xml）。此 Web 应用程序的类文件和 JAR 文件应分别放在 WEB-INF/classes\
  \ 和 WEB-INF/lib 目录中。\n\n对于你的球场预约系统，你需要创建以下目录结构。请注意，高亮显示的文件是 Spring 特有的配置文件。\n\n\
  **■注意** 要使用 Spring MVC 开发 Web 应用程序，你必须将 spring-webmvc.jar（位于 Spring 安装目录的 dist/modules\
  \ 目录下）复制到 WEB-INF/lib 目录。如果你打算在 JSP 文件中使用 JSTL，还需要将 standard.jar（位于 lib/jakarta-taglibs\
  \ 目录下）和 jstl.jar（位于 lib/j2ee 目录下）复制过来。\n\ncourt/\n\ncss/\n\nimages/\n\nWEB-INF/\n\
  \nclasses/\n\nlib/\n\ncommons-logging.jar\n\njstl.jar\n\nspring-webmvc.jar\n\nspring.jar\n\
  \nstandard.jar\n\njsp/\n\nwelcome.jsp\n\nreservationQuery.jsp\n\n**court-service.xml**\n\
  \n**court-servlet.xml**\n\nweb.xml\n\nWEB-INF 目录之外的文件可以通过 URL 直接供用户访问，因此 CSS 文件和图像文件应放在那里。使用\
  \ Spring MVC 时，JSP 文件仅作为模板使用。它们由框架读取以生成动态内容，而不是由用户直接读取，因此 JSP 文件应放在 WEB-INF 目录内，以防止直接访问它们。\n\
  \n然而，某些应用服务器不允许 Web 应用内部读取 WEB-INF 内的文件。在这种情况下，你只能将它们放在 WEB-INF 目录之外。\n\n9799ch10.qxd\
  \ 5/14/08 3:30 PM Page 326\n\n**326**\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n\
  **创建配置文件**\n\nWeb 部署描述符 web.xml 是 Java Web 应用程序的基本配置文件。在此文件中，你定义了应用程序的 Servlet 以及\
  \ Web 请求如何映射到它们。对于 Spring MVC 应用程序，你只需定义一个 DispatcherServlet 实例，它充当 Spring MVC 的前端控制器，尽管你也可以定义多个。\n\
  \n[<web-app version=\"2.4\"](http://java.sun.com/xml/ns/j2ee)\n\n[xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/j2ee](http://www.w3.org/2001/XMLSchema-instance)\n\n\
  [`java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<display-name>球场预约系统</display-name>\n\n<servlet>\n\n<servlet-name> **court**</servlet-name>\n\
  \n\n\n<servlet-class>\norg.springframework.web.servlet.DispatcherServlet\n</servlet-class>\n\
  \n<load-on-startup>1</load-on-startup>\n\n</servlet>\n\n<servlet-mapping>\n<servlet-name>**court**</servlet-name>\n\
  <url-pattern>*.htm</url-pattern>\n</servlet-mapping>\n\n</web-app>\n\n在这个 Web 部署描述符中，你定义了一个类型为`DispatcherServlet`的\
  \ Servlet。这是 Spring MVC 中的核心 Servlet 类，它接收 Web 请求并将其分派给相应的处理器。你将此 Servlet 的名称设置为`court`，并将\
  \ URL 映射到以`.htm`为扩展名的路径。请注意，URL 扩展名是任意的，但为了避免向 Web 应用程序的用户暴露实现技术，通常更倾向于选择`.htm`、`.html`或类似的扩展名。\n\
  \nServlet 名称的另一个作用是让`DispatcherServlet`决定加载哪个文件用于 Spring MVC 配置。默认情况下，它会将 Servlet\
  \ 名称与`-servlet.xml`拼接作为文件名来查找文件。你也可以在`contextConfigLocation` Servlet 参数中显式指定配置文件。根据上述设置，`court`\
  \ Servlet 将默认加载 Spring MVC 配置文件`court-servlet.xml`。该文件应是一个标准的 Spring Bean 配置文件，如下所示：\n\
  \n<beans\nxsi:schemaLocation=\"http://www.springframework.org/schema/beans\nhttp://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  >\n...\n</beans>\n\n9799ch10.qxd 5/14/08 3:30 PM 第 327 页\n\n第 10 章 **■** Spring\
  \ MVC 框架\n\n**327**\n\n稍后，你将通过在此配置文件中声明一系列 Spring Bean 来配置 Spring MVC。你也可以在此文件中声明其他应用程序组件，例如数据访问对象和服务对象。然而，将不同层的\
  \ Bean 混合在单个配置文件中并不是一个好做法。相反，你应该为每一层分别声明一个 Bean 配置文件（例如，持久层使用`court-persistence.xml`，服务层使用`court-service.xml`）。例如，`court-service.xml`应包含以下服务对象：\n\
  \n<beans\nxsi:schemaLocation=\"http://www.springframework.org/schema/beans\nhttp://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  >\n<bean id=\"reservationService\"\nclass=\"com.apress.springrecipes.court.service.ReservationServiceImpl\"\
  \ />\n</beans>\n\n为了让 Spring 加载除`court-servlet.xml`之外的配置文件，你需要在`web.xml`中定义 Servlet\
  \ 监听器`ContextLoaderListener`。默认情况下，它会加载 Bean 配置文件`/WEB-INF/applicationContext.xml`，但你可以在`contextConfigLocation`上下文参数中指定自己的配置文件。你可以通过逗号或空格分隔多个配置文件的位置。\n\
  \n<web-app ...>\n<context-param>\n<param-name>contextConfigLocation</param-name>\n\
  <param-value>**/WEB-INF/court-service.xml**</param-value>\n</context-param>\n<listener>\n\
  <listener-class>\n**org.springframework.web.context.ContextLoaderListener**\n</listener-class>\n\
  </listener>\n...\n</web-app>\n\n请注意，`ContextLoaderListener`将指定的 Bean 配置文件加载到根应用程序上下文中，而每个`DispatcherServlet`实例则将其配置文件加载到自己的应用程序上下文中，并将根应用程序上下文作为其父上下文。因此，每个`DispatcherServlet`实例加载的上下文可以访问甚至覆盖根应用程序上下文中声明的\
  \ Bean（但反之则不行）。然而，由不同`DispatcherServlet`实例加载的上下文之间无法相互访问。\n\n**创建 Spring MVC 控制器**\n\
  \nSpring MVC 为不同的使用场景提供了多种类型的控制器。图 10-2 展示了 Spring MVC 中常见的控制器类型。\n\n![图片 31](img/index-354_1.png)\n\
  \n9799ch10.qxd 5/14/08 3:30 PM 第 328 页\n\n**328**\n\n第 10 章 **■** Spring MVC 框架\n\
  \n\n\n**图 10-2.** *Spring MVC 中的常见控制器类型*\n\n`Controller`接口是 Spring MVC 中所有控制器类的基接口。\n\
  \n你可以通过实现此接口来创建自己的控制器。在`handleRequest()`方法中，你可以像在 Servlet 中一样自由处理 Web 请求。最后，你必须返回一个`ModelAndView`对象，其中包含视图名称或视图对象，以及一些模型属性。例如，你可以为球场预约系统创建一个欢迎控制器，如下所示。\n\
  \n**■注意** 要开发涉及 Servlet API 的 Web 应用程序，你必须在类路径中包含`servlet-api.jar`（位于 Spring 安装目录的`lib/j2ee`目录下）。\n\
  \n```java\npackage com.apress.springrecipes.court.web;\n\n...\n\nimport javax.servlet.http.HttpServletRequest;\n\
  \nimport javax.servlet.http.HttpServletResponse;\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \nimport org.springframework.web.servlet.mvc.Controller;\n\npublic class WelcomeController\
  \ **implements Controller** {\n\n    public ModelAndView **handleRequest**(HttpServletRequest\
  \ request,\n\n                                        HttpServletResponse response)\
  \ throws Exception {\n\n        Date today = new Date();\n\n        return new ModelAndView(\"\
  welcome\", \"today\", today);\n\n    }\n\n}\n```\n\n9799ch10.qxd 5/14/08 3:30 PM\
  \ 第 329 页\n\n第 10 章 **■** SPRING MVC 框架\n\n**329**\n\n该控制器简单地创建一个`java.util.Date`对象来获取当前日期，然后返回一个`ModelAndView`对象，其中包含视图名称`welcome`和当前日期作为模型属性，供目标视图显示。\n\
  \n创建控制器类后，你必须在 Web 应用程序上下文中声明其实例。由于这是一个表示层组件，你应在`court-servlet.xml`中声明它。\n\n默认情况下，如果你没有显式配置，`DispatcherServlet`会使用`BeanNameUrlHandlerMapping`作为其默认的处理映射。此处理映射根据处理器的\
  \ Bean 名称中指定的 URL 模式将请求映射到处理器。由于`<bean>`元素的`id`属性不能包含`/`字符，你应改用`name`属性。\n\n```xml\n\
  <bean name=\"/welcome.htm\"\n      class=\"com.apress.springrecipes.court.web.WelcomeController\"\
  \ />\n```\n\n如果你希望控制器具备一些基本控制器功能，例如过滤支持的 HTTP 方法（GET、POST 和 HEAD）以及在 HTTP 响应中生成缓存控制头，你可以让它继承`AbstractController`类，该类实现了`Controller`接口。请注意，在此控制器类中你需要重写的方法是`handleRequestInternal()`。\n\
  \n```java\npackage com.apress.springrecipes.court.web;\n\n...\n\nimport org.springframework.web.servlet.mvc.AbstractController;\n\
  \npublic class WelcomeController **extends AbstractController** {\n\n    public\
  \ ModelAndView **handleRequestInternal**(HttpServletRequest request,\n         \
  \                                       HttpServletResponse response) throws Exception\
  \ {\n\n        Date today = new Date();\n\n        return new ModelAndView(\"welcome\"\
  , \"today\", today);\n\n    }\n\n}\n```\n\n你可以设置从`AbstractController`类继承的几个属性来实现上述功能：\n\
  \n```xml\n<bean name=\"/welcome.htm\"\n      class=\"com.apress.springrecipes.court.web.WelcomeController\"\
  >\n    <property name=\"supportedMethods\" value=\"GET\" />\n    <property name=\"\
  cacheSeconds\" value=\"60\" />\n</bean>\n```\n\n例如，你可以在`supportedMethods`属性中设置控制器支持的\
  \ HTTP 方法，用逗号分隔。如果 HTTP 请求的方法不在此列表中，将抛出`ServletException`。你还可以为控制器定义缓存秒数，该值将设置在\
  \ HTTP 响应的头中。\n\n一个典型的控制器可能会接受 HTTP 请求参数并调用后端服务进行业务处理。例如，你可以创建一个用于查询特定球场预约信息的控制器，如下所示：\n\
  \n9799ch10.qxd 5/14/08 3:30 PM 第 330 页\n\n**330**\n\n第 10 章 **■** SPRING MVC 框架\n\
  \n```java\npackage com.apress.springrecipes.court.web;\n\n...\n\nimport javax.servlet.http.HttpServletRequest;\n\
  \nimport javax.servlet.http.HttpServletResponse;\n```\n\n\n\nimport org.springframework.web.bind.ServletRequestUtils;\n\
  \nimport org.springframework.web.servlet.ModelAndView;\n\nimport org.springframework.web.servlet.mvc.AbstractController;\n\
  \npublic class ReservationQueryController extends AbstractController {\n\nprivate\
  \ ReservationService reservationService;\n\npublic void setReservationService(ReservationService\
  \ reservationService) {\n\nthis.reservationService = reservationService;\n\n}\n\n\
  public ModelAndView handleRequestInternal(HttpServletRequest request,\n\nHttpServletResponse\
  \ response) throws Exception {\n\nString courtName =\n\nServletRequestUtils.getStringParameter(request,\
  \ \"courtName\");\n\nMap<String, Object> model = new HashMap<String, Object>();\n\
  \nif (courtName != null) {\n\nmodel.put(\"courtName\", courtName);\n\nmodel.put(\"\
  reservations\", reservationService.query(courtName));\n\n}\n\nreturn new ModelAndView(\"\
  reservationQuery\", model);\n\n}\n\n}\n\n在这个控制器中，你首先从请求中获取请求参数 `courtName`。你可以使用标准的\
  \ Servlet API `HttpServletRequest.getParameter()` 来实现此目的，但 Spring 在 `ServletRequestUtils`\
  \ 类中提供了更方便的静态方法，用于获取转换类型后的请求参数以及必需的参数。这可以省去你执行类型转换和检查的麻烦。当你有多个模型属性需要传递给视图时，可以将它们存储在一个\
  \ Map 中，并将该 Map 传递给 `ModelAndView` 的构造函数。\n\n现在，你需要在 `court-servlet.xml` 中声明这个控制器，并引用在服务层配置文件（即\
  \ `court-service.xml`）中声明的预约服务 bean。\n\n<bean name=\"/reservationQuery.htm\"\n\n\
  class=\"com.apress.springrecipes.court.web.ReservationQueryController\">\n\n<property\
  \ name=\"reservationService\" ref=\"reservationService\" />\n\n</bean>\n\n![Image\
  \ 32](img/index-357_1.jpg)\n\n9799ch10.qxd 5/14/08 3:30 PM 第 331 页\n\n第 10 章 **■**\
  \ S P R I N G M V C 框 架\n\n**331**\n\n**创建 JSP 视图**\n\nSpring MVC 支持多种视图类型，适用于不同的表现层技术。图\
  \ 10-3 展示了 Spring MVC 中常见的视图类型。\n\n**图 10-3.** *Spring MVC 中的常见视图类型*\n\n在 Spring\
  \ MVC 应用程序中，视图通常是用 JSTL 编写的 JSP 模板。当 `DispatcherServlet` 从处理器接收到视图名称时，它会将逻辑视图名称解析为用于渲染的视图对象。例如，你可以在\
  \ Web 应用程序上下文中配置一个 `InternalResourceViewResolver` bean，将视图名称解析为 `/WEB-INF/jsp/`\
  \ 目录下的 JSP 文件：\n\n<bean class=\"org.springframework.web.servlet.view. **InternalResourceViewResolver**\"\
  >\n\n<property name=\"prefix\" value=\"/WEB-INF/jsp/\" />\n\n<property name=\"suffix\"\
  \ value=\".jsp\" />\n\n</bean>\n\n然后，你可以为欢迎控制器创建以下 JSP 模板。将其命名为 `welcome.jsp` 并放入\
  \ `/WEB-INF/jsp/` 目录：\n\n<%@ [taglib prefix=\"fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\"\
  \ %>](http://java.sun.com/jsp/jstl/fmt)\n\n<html>\n\n<head>\n\n<title>欢迎</title>\n\
  \n</head>\n\n<body>\n\n<h2>欢迎使用球场预约系统</h2>\n\n今天是 <fmt:formatDate value=\"${today}\"\
  \ pattern=\"yyyy-MM-dd\" />。\n\n</body>\n\n</html>\n\n9799ch10.qxd 5/14/08 3:30\
  \ PM 第 332 页\n\n**332**\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n在这个 JSP 模板中，你使用了\
  \ JSTL 中的 `fmt` 标签库，将 `today` 模型属性格式化为 `yyyy-MM-dd` 模式。别忘了在这个 JSP 模板的顶部包含 `fmt`\
  \ 标签库的定义。\n\n接下来，你可以为预约查询控制器创建另一个 JSP 模板，并将其命名为 `reservationQuery.jsp` 以匹配视图名称：\n\
  \n<%@ [taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\" %>](http://java.sun.com/jsp/jstl/core)\n\
  \n<%@ [taglib prefix=\"fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\" %>](http://java.sun.com/jsp/jstl/fmt)\n\
  \n<html>\n\n<head>\n\n<title>预约查询</title>\n\n</head>\n\n<body>\n\n<form method=\"\
  POST\">\n\n球场名称\n\n<input type=\"text\" name=\"courtName\" value=\"${courtName}\"\
  \ />\n\n<input type=\"submit\" value=\"查询\" />\n\n</form>\n\n<table border=\"1\"\
  >\n\n<tr>\n\n<th>球场名称</th>\n\n<th>日期</th>\n\n\n\n<th>小时</th>\n\n<th>玩家</th>\n\n\
  </tr>\n\n<c:forEach items=\"${reservations}\" var=\"reservation\">\n\n<tr>\n\n<td>${reservation.courtName}</td>\n\
  \n<td><fmt:formatDate value=\"${reservation.date}\" pattern=\"yyyy-MM-dd\" /></td>\n\
  \n<td>${reservation.hour}</td>\n\n<td>${reservation.player.name}</td>\n\n</tr>\n\
  \n</c:forEach>\n\n</table>\n\n</body>\n\n</html>\n\n在这个 JSP 模板中，你包含了一个供用户输入要查询的球场名称的表单，然后使用\
  \ `<c:forEach>` 标签循环遍历 `reservations` 模型属性来生成结果表格。\n\n**部署 Web 应用程序**\n\n在 Web 应用程序的开发过程中，我强烈建议安装一个带有\
  \ Web 容器的本地 Java EE 应用服务器，用于测试和调试。为了方便配置和部署，我选择了 Apache Tomcat 6.0 作为我的 Web 容器，并在其\
  \ `conf/Catalina/localhost` 目录下创建了上下文描述符 `court.xml`，指向我的 Web 应用程序的根目录：\n\n<Context\
  \ docBase=\"c:/eclipse/workspace/Court/court\" />\n\n默认情况下，Tomcat 监听 8080 端口，并使用上下文描述符的名称（本例中为\
  \ `court`）作为上下文路径。因此，可以通过以下 URL 访问欢迎控制器和预约查询控制器：\n\n[`localhost:8080/court/welcome.htm`](http://localhost:8080/court/welcome.htm)\n\
  \n[`localhost:8080/court/reservationQuery.htm`](http://localhost:8080/court/reservationQuery.htm)\n\
  \n**10-2. 将请求映射到处理器**\n\n问题\n\n当 `DispatcherServlet` 接收到一个 Web 请求时，它会简单地将该请求分派给一个合适的处理器来处理。你希望为\
  \ `DispatcherServlet` 定义一个策略，用于将请求映射到处理器。\n\n解决方案\n\n在 Spring MVC 应用程序中，Web 请求通过一个或多个在\
  \ Web 应用程序上下文中声明的处理器映射 bean 来映射到处理器。这些 bean 必须实现 `HandlerMapping` 接口，以便 `DispatcherServlet`\
  \ 能够自动检测到它们。Spring MVC 提供了多个 `HandlerMapping` 实现，供你使用不同的策略来映射请求。默认情况下，如果你没有显式配置处理器映射，`DispatcherServlet`\
  \ 将使用 `BeanNameUrlHandlerMapping` 作为其默认的处理器映射，它会根据 bean 名称中指定的 URL 模式将请求映射到处理器。因此，如果你对这个策略满意，就无需定义自己的处理器映射。\n\
  \n处理器映射根据 URL 相对于上下文路径（即 Web 应用程序上下文的部署路径）和 Servlet 路径（即映射到 `DispatcherServlet`\
  \ 的路径）的路径来匹配 URL。因此，对于 URL [`localhost:8080/court/welcome.htm`](http://localhost:8080/court/welcome.htm)，要匹配的路径是\
  \ `/welcome.htm`，因为上下文路径是 `/court`，并且没有 Servlet 路径。\n\n工作原理\n\n**按 Bean 名称映射请求**\n\
  \n将请求映射到处理器的最简单且默认的策略是通过处理器的 bean 名称。要使此策略生效，你必须将每个处理器的 bean 名称声明为 URL 模式的形式，该模式可以接受通配符，以便一个处理器处理多个\
  \ URL。如果处理器的 bean 名称与请求的 URL 匹配，`DispatcherServlet` 就会将请求分派给该处理器来处理。\n\n<beans ...>\n\
  \n...\n<bean **name=\"/welcome.htm\"**\n\nclass=\"com.apress.springrecipes.court.web.WelcomeController\"\
  >\n\n...\n</bean>\n\n<bean **name=\"/reservationQuery.htm\"**\n\nclass=\"com.apress.springrecipes.court.web.ReservationQueryController\"\
  >\n\n...\n</bean>\n\n</beans>\n\n使用此映射策略时，你必须通过 `name` 属性来设置处理器的名称，因为 `id` 属性不能包含\
  \ `/` 字符。\n\n**按控制器类名映射请求**\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\nSpring 提供的另一个处理器映射是 `ControllerClassNameHandlerMapping`，它为实现了 `Controller` 接口的处理器生成处理器映射。它会根据\
  \ Web 应用上下文中声明的控制器类名自动生成映射。\n\n<beans ...>\n\n...\n\n<bean class=\"org.springframework.web.servlet.mvc.support.\
  \ **➥**\n\n**ControllerClassNameHandlerMapping**\" />\n\n<bean class=\"com.apress.springrecipes.court.web.\
  \ **WelcomeController**\">\n\n...\n\n</bean>\n\n<bean class=\"com.apress.springrecipes.court.web.\
  \ **ReservationQueryController**\">\n\n...\n\n</bean>\n\n</beans>\n\n对于这些 Bean 声明，`ControllerClassNameHandlerMapping`\
  \ 会通过移除类名中的 `Controller` 后缀，并将剩余部分转换为小写，来自动生成处理器映射。\n\n**Welcome**Controller **➔**\
  \ /welcome*\n\n**ReservationQuery**Controller **➔** /reservationquery*\n\n然而，如果你希望\
  \ URL 模式遵循 Java 的变量命名约定（例如，生成 `/reservationQuery*` 而不是 `/reservationquery*`），则必须将\
  \ `caseSensitive` 属性设置为 `true`。此外，你可以在 `pathPrefix` 属性中为生成的 URL 模式指定一个前缀。你还可以在 `basePackage`\
  \ 属性中指定基础包，那么相对于该包的子包也会被包含在映射中。\n\n<bean class=\"org.springframework.web.servlet.mvc.support.\
  \ **➥**\n\nControllerClassNameHandlerMapping\">\n\n<property name=\"caseSensitive\"\
  \ value=\"true\" />\n\n<property name=\"pathPrefix\" value=\"/reservation\" />\n\
  \n9799ch10.qxd 5/14/08 3:30 PM Page 335\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n\
  **335**\n\n<property name=\"basePackage\" value=\"com.apress.springrecipes.court\"\
  \ />\n\n</bean>\n\n这个 `ControllerClassNameHandlerMapping` 定义将生成以下处理器映射：\n\n**Welcome**Controller\
  \ **➔ /reservation/web**/welcome*\n\n**ReservationQuery**Controller **➔ /reservation/web**/reservationQuery*\n\
  \n**使用自定义映射定义映射请求**\n\n将请求映射到处理器最直接、最灵活的策略是显式指定 URL 模式和处理器之间的映射定义。你可以通过 `SimpleUrlHandlerMapping`\
  \ 来实现这一点：\n\n<beans ...>\n\n...\n\n<bean class=\"org.springframework.web.servlet.handler.\
  \ **➥**\n\n**SimpleUrlHandlerMapping**\">\n\n<property name=\"mappings\">\n\n<props>\n\
  \n**<prop key=\"/welcome.htm\">welcomeController</prop>**\n\n**<prop key=\"/reservationQuery.htm\"\
  >**\n\n**reservationQueryController**\n\n**</prop>**\n\n</props>\n\n</property>\n\
  \n</bean>\n\n<bean **id=\"welcomeController\"**\n\nclass=\"com.apress.springrecipes.court.web.WelcomeController\"\
  >\n\n...\n\n</bean>\n\n<bean **id=\"reservationQueryController\"**\n\nclass=\"com.apress.springrecipes.court.web.ReservationQueryController\"\
  >\n\n...\n\n</bean>\n\n</beans>\n\n`SimpleUrlHandlerMapping` 接受一个 `Properties` 对象作为映射定义。属性键是\
  \ URL 模式，而属性值是处理器的 ID 或名称。\n\nURL 模式也可以接受通配符，以便一个处理器处理多个 URL。\n\n**通过多种策略映射请求**\n\
  \n在拥有大量处理器的 Web 应用中，仅选择一种处理器映射策略通常是不够的。通常，`ControllerClassNameHandlerMapping` 可以满足大部分映射需求。然而，通常有些映射必须使用\
  \ `SimpleUrlHandlerMapping` 显式映射。\n\n9799ch10.qxd 5/14/08 3:30 PM Page 336\n\n**336**\n\
  \n第 10 章 **■** S P R I N G M V C 框 架\n\n在这种情况下，你必须结合两种处理器映射策略：\n\n<beans ...>\n\n\
  ...\n\n<bean class=\"org.springframework.web.servlet.handler.SimpleUrlHandlerMapping\"\
  >\n\n<property name=\"mappings\">\n\n<props>\n\n<prop key=\"/index.htm\">welcomeController</prop>\n\
  \n<prop key=\"/main.htm\">welcomeController</prop>\n\n</props>\n\n</property>\n\n\
  **<property name=\"order\" value=\"0\" />**\n\n</bean>\n\n<bean class=\"org.springframework.web.servlet.mvc.support.\
  \ **➥**\n\nControllerClassNameHandlerMapping\">\n\n<property name=\"caseSensitive\"\
  \ value=\"true\" />\n\n**<property name=\"order\" value=\"1\" />**\n\n</bean>\n\n\
  </beans>\n\n当同时选择多个策略时，指定映射优先级非常重要。为此，你可以设置处理器映射 Bean 的 `order` 属性。`order` 值越低，优先级越高。对于这两个处理器映射，Web\
  \ 请求将按如下方式映射到处理器：\n\n/index.htm **➔** WelcomeController\n\n/main.htm **➔** WelcomeController\n\
  \n/welcome* **➔** WelcomeController\n\n/reservationQuery* **➔** ReservationQueryController\n\
  \n**10-3. 使用处理器拦截器拦截请求**\n\n**问题**\n\nServlet API 定义的 Servlet 过滤器可以在每个 Web 请求被 Servlet\
  \ 处理之前和之后进行预处理和后处理。你希望在 Spring 的 Web 应用上下文中配置具有类似过滤器功能的东西，以便利用容器的特性。\n\n此外，有时你可能只想对将由某些\
  \ Spring MVC 处理器处理的 Web 请求进行预处理和后处理，并在这些处理器返回的模型属性传递给视图之前对其进行操作。\n\n**解决方案**\n\n\
  Spring MVC 允许你通过*处理器拦截器*来拦截 Web 请求以进行预处理和后处理。处理器拦截器在 Spring 的 Web 应用上下文中配置，\n\n\
  9799ch10.qxd 5/14/08 3:30 PM Page 337\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n\
  **337**\n\n因此它们可以利用任何容器特性并引用容器中声明的任何 Bean。处理器拦截器是为特定的处理器映射注册的，因此它只会拦截由这些处理器映射映射的请求。\n\
  \n每个处理器拦截器必须实现 `HandlerInterceptor` 接口，该接口包含三个需要你实现的回调方法：`preHandle()`、`postHandle()`\
  \ 和 `afterCompletion()`。第一个和第二个方法将在请求被处理器处理之前和之后调用。第二个方法还允许你访问返回的 `ModelAndView`\
  \ 对象，因此你可以操作其中的模型属性。最后一个方法将在所有请求处理完成之后（即视图渲染之后）调用。\n\n**工作原理**\n\n假设你要测量每个请求处理器处理每个\
  \ Web 请求的时间，并允许视图向用户显示此时间。你可以为此创建一个自定义的处理器拦截器：\n\npackage com.apress.springrecipes.court.web;\n\
  \n...\n\nimport org.springframework.web.servlet.HandlerInterceptor;\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \npublic class MeasurementInterceptor **implements HandlerInterceptor** {\n\npublic\
  \ boolean preHandle(HttpServletRequest request,\n\nHttpServletResponse response,\
  \ Object handler) throws Exception {\n\nlong startTime = System.currentTimeMillis();\n\
  \nrequest.setAttribute(\"startTime\", startTime);\n\nreturn true;\n\n}\n\npublic\
  \ void postHandle(HttpServletRequest request,\n\nHttpServletResponse response, Object\
  \ handler,\n\nModelAndView modelAndView) throws Exception {\n\nlong startTime =\
  \ (Long) request.getAttribute(\"startTime\");\n\nrequest.removeAttribute(\"startTime\"\
  );\n\nlong endTime = System.currentTimeMillis();\n\nmodelAndView.addObject(\"handlingTime\"\
  , endTime - startTime);\n\n}\n\npublic void afterCompletion(HttpServletRequest request,\n\
  \nHttpServletResponse response, Object handler, Exception ex)\n\nthrows Exception\
  \ {\n\n}\n\n}\n\n在这个拦截器的 `preHandle()` 方法中，你记录了开始时间并将其保存到请求属性中。此方法应返回 `true`，以允许\
  \ `DispatcherServlet` 继续处理。\n\n9799ch10.qxd 5/14/08 3:30 PM Page 338\n\n**338**\n\
  \n第 10 章 **■** S P R I N G M V C 框 架\n\n\n\n处理请求。否则，`DispatcherServlet` 会认为该方法已处理完请求，因此\
  \ `DispatcherServlet` 将直接把响应返回给用户。接着，在 `postHandle()` 方法中，你从请求属性中加载开始时间，并与当前时间进行比较。你可以计算出总耗时，然后将该时间添加到模型中，以便传递给视图。最后，由于\
  \ `afterCompletion()` 方法无需执行任何操作，你可以将其方法体留空。\n\n实现接口时，即使你可能不需要所有方法，也必须实现全部方法。更好的做法是改为继承拦截器适配器类。该类默认实现了所有拦截器方法。你只需重写需要的方法即可。\n\
  \n```java\npackage com.apress.springrecipes.court.web;\n\n...\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \nimport org.springframework.web.servlet.handler.HandlerInterceptorAdapter;\n\n\
  public class MeasurementInterceptor **extends HandlerInterceptorAdapter** {\n\n\
  \    public boolean preHandle(HttpServletRequest request,\n\n                  \
  \           HttpServletResponse response, Object handler) throws Exception {\n\n\
  \        ...\n\n    }\n\n    public void postHandle(HttpServletRequest request,\n\
  \n                           HttpServletResponse response, Object handler,\n\n \
  \                          ModelAndView modelAndView) throws Exception {\n\n   \
  \     ...\n\n    }\n\n}\n```\n\n处理器拦截器注册到处理器映射 Bean 上，用于拦截该 Bean 映射的 Web 请求。你可以在\
  \ `interceptors` 属性中为处理器映射指定多个拦截器，该属性的类型是一个数组。如果你的 Web 应用上下文中配置了多个处理器映射，并且希望拦截它们映射的所有请求，则必须将拦截器注册到每个处理器映射中。\n\
  \n```xml\n<beans ...>\n\n    ...\n\n    <bean id=\"measurementInterceptor\"\n\n\
  \          class=\"com.apress.springrecipes.court.web.MeasurementInterceptor\" />\n\
  \n    <bean\n\n        class=\"org.springframework.web.servlet.handler.SimpleUrlHandlerMapping\"\
  >\n\n        **<property name=\"interceptors\">**\n\n            **<list>**\n\n\
  \                **<ref bean=\"measurementInterceptor\" />**\n\n            **</list>**\n\
  \n        **</property>**\n\n        ...\n\n    </bean>\n\n    <bean class=\"org.springframework.web.servlet.mvc.support.\
  \ **➥**\n\n        ControllerClassNameHandlerMapping\">\n\n        **<property name=\"\
  interceptors\">**\n\n            **<list>**\n\n                **<ref bean=\"measurementInterceptor\"\
  \ />**\n\n            **</list>**\n\n        **</property>**\n\n        ...\n\n\
  \    </bean>\n\n</beans>\n```\n\n然后，你可以在 `welcome.jsp` 中显示该时间，以验证此拦截器的功能。\n\n由于\
  \ `WelcomeController` 没有太多操作，你可能会看到处理时间为 0 毫秒。如果是这种情况，你可以在此类中添加一条 `sleep` 语句，以便看到更长的处理时间。\n\
  \n```jsp\n<%@ taglib prefix=\"fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\" %>\n\
  \n<html>\n\n<head>\n\n    <title>欢迎</title>\n\n</head>\n\n<body>\n\n    ...\n\n\
  \    **<hr />**\n\n    **处理时间 : ${handlingTime} ms**\n\n</body>\n\n</html>\n```\n\
  \n**10-4. 解析用户区域设置**\n\n问题\n\n为了使你的 Web 应用程序支持国际化，你必须识别每个用户偏好的区域设置，并根据该区域设置显示内容。\n\
  \n解决方案\n\n在 Spring MVC 应用程序中，用户的区域设置由区域设置解析器识别，该解析器必须实现 `LocaleResolver` 接口。Spring\
  \ MVC 提供了多个 `LocaleResolver` 实现，供你根据不同的标准解析区域设置。或者，你也可以通过实现此接口来创建自定义的区域设置解析器。\n\n\
  你可以通过在 Web 应用上下文中注册一个类型为 `LocaleResolver` 的 Bean 来简单地定义一个区域设置解析器。你必须将区域设置解析器的 Bean\
  \ 名称设置为 `localeResolver`，以便 `DispatcherServlet` 自动检测。请注意，每个 `DispatcherServlet`\
  \ 只能注册一个区域设置解析器。\n\n工作原理\n\n**通过 HTTP 请求头解析区域设置**\n\n\n\nSpring 默认使用的区域设置解析器是 `AcceptHeaderLocaleResolver`。它通过检查\
  \ HTTP 请求的 `accept-language` 头来解析区域设置。该头部由用户的网页浏览器根据底层操作系统的区域设置自动设定。请注意，此区域设置解析器无法更改用户的区域设置，因为它无法修改用户操作系统的区域设置。\n\
  \n**通过会话属性解析区域设置**\n\n另一种解析区域设置的方式是使用 `SessionLocaleResolver`。它通过检查用户会话中的预定义属性来解析区域设置。如果会话属性不存在，此区域设置解析器将从\
  \ `accept-language` HTTP 头中确定默认区域设置。\n\n<bean id=\"localeResolver\"\n\nclass=\"\
  org.springframework.web.servlet.i18n. **SessionLocaleResolver**\">\n\n<property\
  \ name=\"defaultLocale\" value=\"en\" />\n\n</bean>\n\n你可以为此解析器设置 `defaultLocale`\
  \ 属性，以防会话属性不存在。请注意，此区域设置解析器能够通过修改存储区域设置的会话属性来更改用户的区域设置。\n\n**通过 Cookie 解析区域设置**\n\
  \n你也可以使用 `CookieLocaleResolver` 通过检查用户浏览器中的 Cookie 来解析区域设置。如果 Cookie 不存在，此区域设置解析器将从\
  \ `accept-language` HTTP 头中确定默认区域设置。\n\n<bean id=\"localeResolver\"\n\nclass=\"\
  org.springframework.web.servlet.i18n. **CookieLocaleResolver**\" /> 此区域设置解析器使用的\
  \ Cookie 可以通过设置 `cookieName` 和 `cookieMaxAge` 属性进行自定义。`cookieMaxAge` 属性表示此 Cookie\
  \ 应持久保存的秒数。值为 `-1` 表示该 Cookie 将在浏览器关闭后失效。\n\n<bean id=\"localeResolver\"\n\nclass=\"\
  org.springframework.web.servlet.i18n.CookieLocaleResolver\">\n\n<property name=\"\
  cookieName\" value=\"language\" />\n\n<property name=\"cookieMaxAge\" value=\"3600\"\
  \ />\n\n<property name=\"defaultLocale\" value=\"en\" />\n\n</bean>\n\n9799ch10.qxd\
  \ 5/14/08 3:31 PM Page 341\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n**341**\n\n\
  你也可以为此解析器设置 `defaultLocale` 属性，以防用户浏览器中不存在该 Cookie。此区域设置解析器能够通过修改存储区域设置的 Cookie\
  \ 来更改用户的区域设置。\n\n**更改用户的区域设置**\n\n除了通过显式调用 `LocaleResolver.setLocale()` 来更改用户区域设置外，你还可以将\
  \ `LocaleChangeInterceptor` 应用于你的处理器映射。此拦截器会检测当前 HTTP 请求中是否存在一个特殊参数。该参数名称可以通过此拦截器的\
  \ `paramName` 属性进行自定义。如果当前请求中存在此参数，拦截器将根据参数值更改用户的区域设置。\n\n<beans ...>\n\n...\n\n\
  <bean id=\"localeChangeInterceptor\"\n\nclass=\"org.springframework.web.servlet.i18n.LocaleChangeInterceptor\"\
  >\n\n**<property name=\"paramName\" value=\"language\" />**\n\n</bean>\n\n<bean\
  \ class=\"org.springframework.web.servlet.handler.SimpleUrlHandlerMapping\">\n\n\
  <property name=\"interceptors\">\n\n<list>\n\n...\n\n**<ref bean=\"localeChangeInterceptor\"\
  \ />**\n\n</list>\n\n</property>\n\n...\n\n</bean>\n\n<bean class=\"org.springframework.web.servlet.mvc.support.\
  \ **➥**\n\nControllerClassNameHandlerMapping\">\n\n<property name=\"interceptors\"\
  >\n\n<list>\n\n...\n\n**<ref bean=\"localeChangeInterceptor\" />**\n\n</list>\n\n\
  </property>\n\n...\n\n</bean>\n\n</beans>\n\n`LocaleChangeInterceptor` 只能检测启用了它的处理器映射中的参数。因此，如果你在\
  \ Web 应用程序上下文中配置了多个处理器映射，则必须将此拦截器注册到所有映射中，以允许用户在任何 URL 中更改其区域设置。\n\n现在，用户可以通过任何包含\
  \ `language` 参数的 URL 来更改其区域设置。例如，以下两个 URL 分别将用户的区域设置更改为美国英语和德语：\n\n9799ch10.qxd\
  \ 5/14/08 3:31 PM Page 342\n\n**342**\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n\n\
  \n[`localhost:8080/court/welcome.htm?language=en_US`](http://localhost:8080/court/welcome.htm?language=en_US)\n\
  \n[`localhost:8080/court/welcome.htm?language=de`](http://localhost:8080/court/welcome.htm?language=de)\n\
  \n然后，你可以在 `welcome.jsp` 中显示 HTTP 响应对象的区域设置，以验证区域设置拦截器的配置：\n\n<%@ [taglib prefix=\"\
  fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\" %>](http://java.sun.com/jsp/jstl/fmt)\n\
  \n<html>\n\n<head>\n\n<title>欢迎</title>\n\n</head>\n\n<body>\n\n...\n\n**<br />**\n\
  \n**区域设置：${pageContext.response.locale}**\n\n</body>\n\n</html>\n\n**10-5\\. 外部化区域敏感文本消息**\n\
  \n问题\n\n在开发国际化 Web 应用程序时，你需要以用户偏好的区域设置显示网页。你不希望为不同区域设置创建同一页面的不同版本。\n\n解决方案\n\n为避免为不同区域设置创建页面的不同版本，你应该通过外部化区域敏感的文本消息，使网页独立于区域设置。Spring\
  \ 能够通过使用消息源（必须实现 `MessageSource` 接口）为你解析文本消息。然后，你的 JSP 文件可以使用 Spring 标签库中定义的 `<spring:message>`\
  \ 标签，根据代码解析消息。\n\n工作原理\n\n你可以通过在 Web 应用程序上下文中注册一个 `MessageSource` 类型的 Bean 来定义消息源。你必须将消息源的\
  \ Bean 名称设置为 `messageSource`，以便 `DispatcherServlet` 自动检测。请注意，每个 `DispatcherServlet`\
  \ 只能注册一个消息源。\n\n`ResourceBundleMessageSource` 实现会根据不同区域设置，从不同的资源包中解析消息。例如，你可以在 `court-servlet.xml`\
  \ 中注册它，以加载基础名称为 `messages` 的资源包：\n\n<bean id=\"messageSource\"\n\nclass=\"org.springframework.context.support.ResourceBundleMessageSource\"\
  >\n\n<property name=\"basename\" value=\"messages\" />\n\n</bean>\n\n9799ch10.qxd\
  \ 5/14/08 3:31 PM 第 343 页\n\n第 10 章 **■** Spring MVC 框架\n\n**343**\n\n然后，你创建两个资源包：`messages.properties`\
  \ 和 `messages_de.properties`，分别存储默认区域设置和德语区域设置的消息。这些资源包应放在类路径的根目录下。\n\nwelcome.title=欢迎\n\
  \nwelcome.message=欢迎使用球场预订系统\n\nwelcome.title=Willkommen\n\nwelcome.message=Willkommen\
  \ zum Spielplatz-Reservierungssystem\n\n现在，在 JSP 文件（如 `welcome.jsp`）中，你可以使用 `<spring:message>`\
  \ 标签根据代码解析消息。该标签会根据用户当前的区域设置自动解析消息。请注意，此标签定义在 Spring 的标签库中，因此你必须在 JSP 文件顶部声明它。\n\
  \n**<%@ [taglib prefix=\"spring\" uri=\"http://www.springframework.org/tags\" %>](http://www.springframework.org/tags)**\n\
  \n<html>\n\n<head>\n\n<title> **<spring:message code=\"welcome.title\" text=\"欢迎\"\
  \ />** </title>\n\n</head>\n\n<body>\n\n<h2> **<spring:message code=\"welcome.message\"\
  **\n\n**text=\"欢迎使用球场预订系统\" />** </h2>\n\n...\n\n</body>\n\n</html>\n\n在 `<spring:message>`\
  \ 中，你可以指定当无法解析给定代码的消息时，要输出的默认文本。\n\n**10-6\\. 按名称解析视图**\n\n问题\n\n处理器处理完请求后，可能会返回一个视图对象或该视图对象的逻辑名称。如果返回的是视图名称，`DispatcherServlet`\
  \ 必须使用该名称创建视图对象并呈现给用户。你希望为 `DispatcherServlet` 定义一个策略，使其能够按名称解析视图。\n\n解决方案\n\n在\
  \ Spring MVC 应用程序中，视图由在 Web 应用程序上下文中声明的一个或多个视图解析器 Bean 解析。这些 Bean 必须实现 `ViewResolver`\
  \ 接口，以便 `DispatcherServlet` 自动检测它们。Spring MVC 提供了多种 `ViewResolver` 实现，供你使用不同的策略解析视图。\n\
  \n9799ch10.qxd 5/14/08 3:31 PM 第 344 页\n\n**344**\n\n第 10 章 **■** Spring MVC 框架\n\
  \n工作原理\n\n\n\n**基于 URL 解析视图**\n\n解析视图的基本策略是将其直接映射到 URL。视图解析器 `InternalResourceViewResolver`\
  \ 通过为每个视图名称添加前缀和后缀，将其映射到 URL。要注册 `InternalResourceViewResolver`，你可以在 Web 应用程序上下文中声明一个此类型的\
  \ bean。\n\n<bean class=\"org.springframework.web.servlet.view. **InternalResourceViewResolver**\"\
  >\n\n<property name=\"viewClass\"\n\nvalue=\"org.springframework.web.servlet.view.JstlView\"\
  \ />\n\n<property name=\"prefix\" value=\"/WEB-INF/jsp/\" />\n\n<property name=\"\
  suffix\" value=\".jsp\" />\n\n</bean>\n\n例如，`InternalResourceViewResolver` 会按以下方式解析视图名称\
  \ `welcome` 和 `reservationQuery`：\n\nwelcome **➔** /WEB-INF/jsp/**welcome**.jsp\n\
  \nreservationQuery **➔** /WEB-INF/jsp/**reservationQuery**.jsp\n\n解析后的视图类型可以通过 `viewClass`\
  \ 属性指定。默认情况下，如果类路径中存在 JSTL 库（即 `jstl.jar`），`InternalResourceViewResolver` 会将视图名称解析为\
  \ `JstlView` 类型的视图对象。因此，如果你的视图是包含 JSTL 标签的 JSP 模板，你可以直接省略 `viewClass` 属性。\n\n`InternalResourceViewResolver`\
  \ 很简单，但它只能解析可以通过 Servlet API 的 `RequestDispatcher` 转发的内部资源视图（例如，一个内部的 JSP 文件或一个\
  \ Servlet）。对于 Spring MVC 支持的其他视图类型，你必须使用其他策略来解析它们。\n\n**从 XML 配置文件解析视图**\n\n另一种解析视图的策略是将它们声明为\
  \ Spring bean，并通过其 bean 名称进行解析。你可以在与 Web 应用程序上下文相同的配置文件中声明视图 bean，但最好将它们隔离在一个单独的配置文件中。默认情况下，`XmlViewResolver`\
  \ 从 `/WEB-INF/views.xml` 加载视图 bean，但可以通过 `location` 属性覆盖此位置。\n\n<bean class=\"org.springframework.web.servlet.view.\
  \ **XmlViewResolver**\">\n\n<property name=\"location\">\n\n<value>/WEB-INF/court-views.xml</value>\n\
  \n</property>\n\n</bean>\n\n在 `court-views.xml` 配置文件中，你可以通过设置类名和属性，将每个视图声明为一个普通的\
  \ Spring bean。通过这种方式，你可以声明任何类型的视图（例如，`RedirectView` 甚至自定义视图类型）。\n\n9799ch10.qxd\
  \ 5/14/08 3:31 PM Page 345\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n**345**\n\n\
  <beans\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<bean id=\"welcome\"\n\nclass=\"org.springframework.web.servlet.view.JstlView\"\
  >\n\n<property name=\"url\" value=\"/WEB-INF/jsp/welcome.jsp\" />\n\n</bean>\n\n\
  <bean id=\"reservationQuery\"\n\nclass=\"org.springframework.web.servlet.view.JstlView\"\
  >\n\n<property name=\"url\" value=\"/WEB-INF/jsp/reservationQuery.jsp\" />\n\n</bean>\n\
  \n<bean id=\"welcomeRedirect\"\n\nclass=\"org.springframework.web.servlet.view.RedirectView\"\
  >\n\n<property name=\"url\" value=\"welcome.htm\" />\n\n</bean>\n\n</beans>\n\n\
  **从资源包解析视图**\n\n除了 XML 配置文件，你还可以在资源包中声明视图 bean。`ResourceBundleViewResolver` 从类路径根目录下的资源包加载视图\
  \ bean。请注意，`ResourceBundleViewResolver` 还可以利用资源包的能力，为不同的区域设置从不同的资源包加载视图 bean。\n\n\
  <bean class=\"org.springframework.web.servlet.view. **ResourceBundleViewResolver**\"\
  >\n\n<property name=\"basename\" value=\"views\" />\n\n</bean>\n\n当你将 `views` 指定为\
  \ `ResourceBundleViewResolver` 的基础名称时，默认的资源包将是 `views.properties`。在此资源包中，你可以以属性的格式声明视图\
  \ bean。这种声明方式等同于 XML bean 声明，但功能较弱。\n\nwelcome.(class)=org.springframework.web.servlet.view.JstlView\n\
  \nwelcome.url=/WEB-INF/jsp/welcome.jsp\n\n\n\nreservationQuery.(class)=org.springframework.web.servlet.view.JstlView\n\
  \nreservationQuery.url=/WEB-INF/jsp/reservationQuery.jsp\n\nwelcomeRedirect.(class)=org.springframework.web.servlet.view.RedirectView\n\
  \nwelcomeRedirect.url=welcome.htm\n\n9799ch10.qxd 5/14/08 3:31 PM Page 346\n\n**346**\n\
  \n第 10 章 **■** S P R I N G M V C 框 架\n\n**使用多个解析器解析视图**\n\n如果你的 Web 应用程序中有大量视图，通常仅选择一种视图解析策略是不够的。通常，`InternalResourceViewResolver`\
  \ 可以解析大部分内部 JSP 视图，但通常还有其他类型的视图需要通过 `ResourceBundleViewResolver` 来解析。在这种情况下，你必须结合两种策略来进行视图解析。\n\
  \n<beans ...>\n\n...\n\n<bean class=\"org.springframework.web.servlet.view.ResourceBundleViewResolver\"\
  >\n\n<property name=\"basename\" value=\"views\" />\n\n**<property name=\"order\"\
  \ value=\"0\" />**\n\n</bean>\n\n<bean\n\nclass=\"org.springframework.web.servlet.view.InternalResourceViewResolver\"\
  >\n\n<property name=\"prefix\" value=\"/WEB-INF/jsp/\" />\n\n<property name=\"suffix\"\
  \ value=\".jsp\" />\n\n**<property name=\"order\" value=\"1\" />**\n\n</bean>\n\n\
  </beans>\n\n当同时选择多个策略时，指定解析优先级非常重要。为此，你可以设置视图解析器 Bean 的 `order` 属性。\n\n`order` 值越小，优先级越高。请注意，你应该将最低优先级分配给\
  \ `InternalResourceViewResolver`，因为它无论视图是否存在都会尝试解析。因此，如果其他解析器的优先级较低，它们将没有机会解析视图。\n\
  \n现在，资源包 `views.properties` 应该只包含那些无法由 `InternalResourceViewResolver` 解析的视图（例如，重定向视图）：\n\
  \nwelcomeRedirect.(class)=org.springframework.web.servlet.view.RedirectView\n\n\
  welcomeRedirect.url=welcome.htm\n\n**重定向前缀**\n\n如果你在 Web 应用程序上下文中配置了 `InternalResourceViewResolver`，它可以通过在视图名称中使用\
  \ `redirect:` 前缀来解析重定向视图。视图名称的其余部分将被视为重定向 URL。例如，视图名称 `redirect:welcome.htm` 将触发对相对\
  \ URL `welcome.htm` 的重定向。你也可以在视图名称中指定一个绝对 URL。\n\n**10-7\\. 将异常映射到视图**\n\n问题\n\n\
  当发生未知异常时，你的应用服务器通常会向用户显示令人不快的异常堆栈跟踪。你的用户对此堆栈跟踪毫无办法，并会抱怨你的应用程序不够友好。此外，这也是一种潜在的安全风险，因为你可能会向用户暴露内部方法调用层次结构。\n\
  \n解决方案\n\n在 Spring MVC 应用程序中，你可以在 Web 应用程序上下文中注册一个或多个异常解析器 Bean 来解析未捕获的异常。这些 Bean\
  \ 必须实现 `HandlerExceptionResolver` 接口，以便 `DispatcherServlet` 能够自动检测到它们。Spring MVC\
  \ 提供了一个简单的异常解析器，用于将每个异常类别映射到一个视图。\n\n工作原理\n\n假设由于预订不可用，你的预订服务将抛出以下异常：\n\npackage\
  \ com.apress.springrecipes.court.service;\n\n...\n\npublic class ReservationNotAvailableException\
  \ extends RuntimeException {\n\nprivate String courtName;\n\nprivate Date date;\n\
  \nprivate int hour;\n\n// 构造函数和 Getter 方法\n\n...\n\n}\n\n要解析未捕获的异常，你可以通过实现 `HandlerExceptionResolver`\
  \ 接口来编写自定义的异常解析器。通常，你会希望将不同类别的异常映射到不同的错误页面。Spring MVC 提供了 `SimpleMappingExceptionResolver`\
  \ 异常解析器，让你可以在 Web 应用程序上下文中配置异常映射。例如，你可以在 `court-servlet.xml` 中注册以下异常解析器：\n\n\n\n\
  <bean class=\"org.springframework.web.servlet.handler. **➥**\n\nSimpleMappingExceptionResolver\"\
  >\n\n<property name=\"exceptionMappings\">\n\n<props>\n\n**<prop key=\"com.apress.springrecipes.court.service.➥**\n\
  \n**ReservationNotAvailableException\">**\n\n**reservationNotAvailable**\n\n**</prop>**\n\
  \n**<prop key=\"java.lang.Exception\">error</prop>**\n\n</props>\n\n</property>\n\
  \n</bean>\n\n在这个异常解析器中，你为 `ReservationNotAvailableException` 定义了逻辑视图名称 `reservationNotAvailable`。如果在你的\
  \ Web 应用上下文中配置了 `InternalResourceViewResolver`，那么当预约不可用时，将显示以下 `reservationNotAvailable.jsp`\
  \ 页面：\n\n<%@ [taglib prefix=\"fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\" %>](http://java.sun.com/jsp/jstl/fmt)\n\
  \n<html>\n\n<head>\n\n<title>预约不可用</title>\n\n</head>\n\n<body>\n\n您在 ${exception.courtName}\
  \ 的预约在 <fmt:formatDate value=\"${exception.date}\" pattern=\"yyyy-MM-dd\" /> 的 ${exception.hour}:00\
  \ 不可用。\n\n</body>\n\n</html>\n\n在错误页面中，可以通过变量 `${exception}` 访问异常实例，因此你可以向用户展示关于此异常的更多详细信息。\n\
  \n为任何未知异常定义一个默认错误页面是一个好习惯。你应该将此页面映射到键 `java.lang.Exception`，并将其作为映射的最后一个条目，这样如果之前没有匹配到其他条目，就会显示此页面。然后按如下方式创建\
  \ `error.jsp`：\n\n<html>\n\n<head>\n\n<title>错误</title>\n\n</head>\n\n<body>\n\n\
  发生了一个错误。请联系我们的管理员以获取详细信息。\n\n</body>\n\n</html>\n\n**10-8. 构造 ModelAndView 对象**\n\
  \n问题\n\n当控制器完成请求处理时，它通常会向 `DispatcherServlet` 返回一个包含视图名称或视图对象以及一些模型属性的 `ModelAndView`\
  \ 对象。\n\n因此，你经常需要在控制器中构造 `ModelAndView` 对象。\n\n解决方案\n\n`ModelAndView` 类提供了多个重载的构造函数和便捷方法，供你按需构造\
  \ `ModelAndView` 对象。这些构造函数和方法以类似的方式支持视图名称和视图对象。\n\n工作原理\n\n当你只有一个模型属性需要返回时，你可以简单地在构造函数中指定该属性来构造一个\
  \ `ModelAndView` 对象：\n\npackage com.apress.springrecipes.court.web;\n\n...\n\nimport\
  \ org.springframework.web.servlet.ModelAndView;\n\nimport org.springframework.web.servlet.mvc.AbstractController;\n\
  \npublic class WelcomeController extends AbstractController {\n\npublic ModelAndView\
  \ handleRequestInternal(HttpServletRequest request,\n\nHttpServletResponse response)\
  \ throws Exception {\n\nDate today = new Date();\n\n**return new ModelAndView(\"\
  welcome\", \"today\", today);**\n\n}\n\n}\n\n如果有多个属性需要返回，你可以通过传入一个 Map 来构造 `ModelAndView`\
  \ 对象：\n\npackage com.apress.springrecipes.court.web;\n\n...\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \nimport org.springframework.web.servlet.mvc.AbstractController;\n\npublic class\
  \ ReservationQueryController extends AbstractController {\n\n...\n\npublic ModelAndView\
  \ handleRequestInternal(HttpServletRequest request,\n\nHttpServletResponse response)\
  \ throws Exception {\n\n...\n\n**Map<String, Object> model = new HashMap<String,\
  \ Object>();**\n\n**if (courtName != null) {**\n\n**model.put(\"courtName\", courtName);**\n\
  \n**model.put(\"reservations\", reservationService.query(courtName));**\n\n**}**\n\
  \n**return new ModelAndView(\"reservationQuery\", model);**\n\n}\n\n}\n\nSpring\
  \ 还提供了 `ModelMap`，这是一个 `java.util.Map` 的实现，它可以根据模型属性的具体类型自动生成其名称：\n\npackage com.apress.springrecipes.court.web;\n\
  \n...\n\nimport org.springframework.ui.ModelMap;\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \nimport org.springframework.web.servlet.mvc.AbstractController;\n\n\n\n\n第 10 章\
  \ **■** SPRING MVC 框架\n\npublic class ReservationQueryController extends AbstractController\
  \ {\n\n...\n\npublic ModelAndView handleRequestInternal(HttpServletRequest request,\n\
  \nHttpServletResponse response) throws Exception {\n\n...\n\n**ModelMap model =\
  \ new ModelMap();**\n\nif (courtName != null) {\n\n**model.addAttribute(\"courtName\"\
  , courtName);**\n\n**model.addAttribute(\"reservations\",**\n\n**reservationService.query(courtName));**\n\
  \n}\n\nreturn new ModelAndView(\"reservationQuery\", model);\n\n}\n\n}\n\n由于这两个模型属性的类型分别是\
  \ String 和 List<Reservation>，ModelMap 会为它们生成默认名称 string 和 reservationList。如果你对这些名称不满意，可以显式指定它们。\n\
  \n在构造 ModelAndView 对象之后，你仍然可以使用 addObject() 方法向其中添加模型属性。该方法返回 ModelAndView 对象本身，因此你可以通过一条语句构造\
  \ ModelAndView 对象。请注意，你也可以省略 addObject() 方法的属性名称。在这种情况下，该方法将生成与 ModelMap 相同的属性名称。\n\
  \npackage com.apress.springrecipes.court.web;\n\n...\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \nimport org.springframework.web.servlet.mvc.AbstractController;\n\npublic class\
  \ ReservationQueryController extends AbstractController {\n\n...\n\npublic ModelAndView\
  \ handleRequestInternal(HttpServletRequest request,\n\nHttpServletResponse response)\
  \ throws Exception {\n\n...\n\nList<Reservation> reservations = null;\n\nif (courtName\
  \ != null) {\n\nreservations = reservationService.query(courtName);\n\n}\n\n**return\
  \ new ModelAndView(\"reservationQuery\", \"courtName\", courtName)**\n\n**.addObject(\"\
  reservations\", reservations);**\n\n}\n\n}\n\n事实上，同时返回模型和视图是可选的。在某些情况下，你可能只返回视图而不在模型中包含任何属性。或者，你可能只返回模型而不返回视图，让\
  \ Spring MVC 根据请求 URL 来确定视图。有时，如果你的控制器直接处理 HttpServletResponse 对象（例如，将二进制文件流式传输回用户），你甚至可以返回\
  \ null。\n\n9799ch10.qxd 5/14/08 3:31 PM 第 351 页\n\n第 10 章 **■** SPRING MVC 框架\n\n\
  **351**\n\n**10-9. 创建具有参数化视图的控制器**\n\n问题\n\n在创建控制器时，你不想在控制器类中硬编码视图名称。相反，你希望视图名称是参数化的，以便可以在\
  \ Bean 配置文件中指定它。\n\n解决方案\n\nParameterizableViewController 是 AbstractController 的一个子类，它定义了一个带有\
  \ getter 和 setter 方法的 viewName 属性。你可以直接使用这个控制器类来创建一个仅向用户渲染视图而不包含任何处理逻辑的控制器，或者你可以扩展这个控制器类以继承\
  \ viewName 属性。\n\n工作原理\n\n例如，假设你有一个非常简单的控制器，其目的仅仅是渲染 about 视图。你可以声明一个类型为 ParameterizableViewController\
  \ 的控制器，并将 viewName 属性指定为 about：\n\n<bean id=\"aboutController\"\n\nclass=\"org.springframework.web.servlet.mvc.ParameterizableViewController\"\
  >\n\n<property name=\"viewName\" value=\"about\" />\n\n</bean>\n\n然后，在 /WEB-INF/jsp/\
  \ 中创建 about.jsp，如下所示：\n\n<html>\n\n<head>\n\n<title>关于</title>\n\n</head>\n\n<body>\n\
  \n<h2>球场预订系统</h2>\n\n<table>\n\n<tr>\n\n<td>版本：</td>\n\n<td>1.0</td>\n\n</tr>\n\n\
  </table>\n\n</body>\n\n</html>\n\n如果你想在保留参数化视图的同时为控制器添加一些处理逻辑，你的控制器类可以扩展 ParameterizableViewController。以下\
  \ AboutController 接受一个 email 属性并将其包含在模型中：\n\n9799ch10.qxd 5/14/08 3:31 PM 第 352\
  \ 页\n\n**352**\n\n第 10 章 **■** SPRING MVC 框架\n\npackage com.apress.springrecipes.court.web;\n\
  \n...\n\nimport org.springframework.web.servlet.ModelAndView;\n\nimport org.springframework.web.servlet.mvc.ParameterizableViewController;\n\
  \npublic class AboutController **extends ParameterizableViewController** {\n\nprivate\
  \ String email;\n\npublic void setEmail(String email) {\n\nthis.email = email;\n\
  \n}\n\nprotected ModelAndView handleRequestInternal(HttpServletRequest request,\n\
  \nHttpServletResponse response) throws Exception {\n\nreturn new ModelAndView(getViewName(),\
  \ \"email\", email);\n\n}\n\n}\n\n由于 AboutController 扩展了 ParameterizableViewController，它也具有一个可以注入的\
  \ viewName 属性：\n\n<bean id=\"aboutController\"\n\nclass=\"com.apress.springrecipes.court.web.AboutController\"\
  >\n\n<property name=\"viewName\" value=\"about\" />\n\n<property name=\"email\"\
  \ value=\"reservation@court.com\" />\n\n</bean>\n\n在 about.jsp 中，你可以显示从模型中获取的 email\
  \ 属性：\n\n<html>\n\n<head>\n\n<title>关于</title>\n\n</head>\n\n<body>\n\n<h2>球场预订系统</h2>\n\
  \n<table>\n\n...\n\n<tr>\n\n<td>电子邮件：</td>\n\n<td><a href=\"mailto:${email}\">${email}</a></td>\n\
  \n</tr>\n\n</table>\n\n</body>\n\n</html>\n\n9799ch10.qxd 5/14/08 3:31 PM 第 353\
  \ 页\n\n第 10 章 **■** SPRING MVC 框架\n\n**353**\n\n由于你在 Web 应用程序上下文中配置了 ControllerClassNameHandlerMapping，你可以通过以下\
  \ URL 访问此控制器：\n\n[`localhost:8080/court/about.htm`](http://localhost:8080/court/about.htm)\n\
  \n**10-10. 使用表单控制器处理表单**\n\n问题\n\n在 Web 应用程序中，你经常需要处理表单。表单控制器必须向用户显示表单，并处理表单提交。表单处理可能是一项非常复杂且多变的任务。如果你从头开始构建表单控制器，将会涉及太多表单处理的细节。\n\
  \n解决方案\n\nSpring MVC 提供的 SimpleFormController 类定义了基本的表单处理流程。它支持命令对象的概念，并可以将表单字段值绑定到同名的命令对象属性上。通过扩展\
  \ SimpleFormController 类，你的控制器将继承处理表单的能力。\n\n当 SimpleFormController 收到 HTTP GET\
  \ 请求要求显示表单时，它会向用户渲染表单视图。然后，当表单通过 HTTP POST 请求提交时，SimpleFormController 将通过将表单字段值绑定到命令对象并调用\
  \ onSubmit() 方法来处理表单提交。如果表单处理成功，它将向用户渲染成功视图。否则，它将再次渲染表单视图并显示错误。\n\n为了适应不同的表单需求，SimpleFormController\
  \ 允许你通过重写几个生命周期方法来定制表单处理流程。\n\n工作原理\n\n假设你希望允许用户通过填写表单来预订球场。你首先在 ReservationService\
  \ 接口中定义一个 make() 方法：\n\npackage com.apress.springrecipes.court.service;\n\n...\n\
  \npublic interface ReservationService {\n\n...\n\npublic void make(Reservation reservation)\n\
  \nthrows ReservationNotAvailableException;\n\n}\n\n然后，你通过向存储预订的列表中添加一个 Reservation\
  \ 项来实现这个 make() 方法。如果存在重复预订，则抛出 ReservationNotAvailableException。\n\npackage com.apress.springrecipes.court.service;\n\
  \n...\n\npublic class ReservationServiceImpl implements ReservationService {\n\n\
  ...\n\n9799ch10.qxd 5/14/08 3:31 PM 第 354 页\n\n**354**\n\n第 10 章 **■** SPRING MVC\
  \ 框架\n\npublic void make(Reservation reservation)\n\nthrows ReservationNotAvailableException\
  \ {\n\nfor (Reservation made : reservations) {\n\nif (made.getCourtName().equals(reservation.getCourtName())\n\
  \n&& made.getDate().equals(reservation.getDate())\n\n&& made.getHour() == reservation.getHour())\
  \ {\n\nthrow new ReservationNotAvailableException(\n\nreservation.getCourtName(),\
  \ reservation.getDate(),\n\nreservation.getHour());\n\n}\n\n}\n\nreservations.add(reservation);\n\
  \n}\n\n}\n\n**创建表单控制器**\n\n\n\n现在我们来创建一个表单控制器，用于处理球场预约表单。通过继承 `SimpleFormController`\
  \ 类，你可以为该控制器指定命令类（此处为 `Reservation`），这样表单字段的值就会绑定到同名命令对象的属性上。你还可以为视图指定命令对象的名称（此处为\
  \ `reservation`），但这是可选的，默认名称为 `command`。\n\n```java\npackage com.apress.springrecipes.court.web;\n\
  \n...\n\nimport org.springframework.beans.propertyeditors.CustomDateEditor;\n\n\
  import org.springframework.web.bind.ServletRequestDataBinder;\n\nimport org.springframework.web.servlet.mvc.SimpleFormController;\n\
  \npublic class ReservationFormController extends SimpleFormController {\n\n    private\
  \ ReservationService reservationService;\n\n    public ReservationFormController()\
  \ {\n        **setCommandClass(Reservation.class);**\n        **setCommandName(\"\
  reservation\");**\n    }\n\n    public void setReservationService(ReservationService\
  \ reservationService) {\n        this.reservationService = reservationService;\n\
  \    }\n\n    protected void initBinder(HttpServletRequest request,\n          \
  \                    ServletRequestDataBinder binder) throws Exception {\n     \
  \   **SimpleDateFormat dateFormat = new SimpleDateFormat(\"yyyy-MM-dd\");**\n  \
  \      **dateFormat.setLenient(false);**\n        **binder.registerCustomEditor(Date.class,\
  \ new CustomDateEditor(**\n                **dateFormat, true));**\n    }\n\n  \
  \  protected void doSubmitAction(Object command) throws Exception {\n        **Reservation\
  \ reservation = (Reservation) command;**\n        reservationService.make(reservation);\n\
  \    }\n}\n```\n\n为了将表单字段值绑定到命令对象，表单控制器可能需要对字段值进行类型转换，因为它们都是以字符串形式提交的。类型转换实际上是由该控制器中注册的属性编辑器执行的。Spring\
  \ 预注册了几个属性编辑器，用于转换常见的数据类型，例如数字和布尔值。对于其他数据类型（如 `java.util.Date`），你必须注册自定义编辑器。自定义属性编辑器在\
  \ `initBinder()` 方法中注册到 `ServletRequestDataBinder` 参数。\n\n如果在绑定表单字段值时出现任何错误，`SimpleFormController`\
  \ 将自动重新渲染表单视图并附带错误信息。否则，它将调用 `onSubmit()` 方法来处理表单提交。在 `onSubmit()` 方法中，你可以通过参数获取已创建并绑定的命令对象。对于此控制器，它将是一个\
  \ `Reservation` 对象，因为你已将命令类设置为 `Reservation`。`onSubmit()` 方法有三种变体可供重写。你应该重写其中最简单的一种，以便访问满足你需求的方法参数。\n\
  \n```java\nprotected ModelAndView onSubmit(Object command) throws Exception;\nprotected\
  \ ModelAndView onSubmit(Object command, BindException errors) throws Exception;\n\
  protected ModelAndView onSubmit(HttpServletRequest request, HttpServletResponse\
  \ response, Object command, BindException errors) throws Exception;\n```\n\n当重写\
  \ `onSubmit()` 方法时，你必须返回一个 `ModelAndView` 对象。如果你只需要对命令对象执行一个操作，并在操作完成后返回成功视图，你可以重写\
  \ `doSubmitAction()` 方法，其返回类型为 `void`，并且默认会渲染成功视图。在上述 `doSubmitAction()` 方法中，你将命令对象传递给\
  \ `ReservationService` 以进行预约。\n\n当你声明此控制器时，它需要引用服务层的 `reservationService` bean 来进行预约。此外，你必须相应地为此表单控制器设置表单视图和成功视图。\n\
  \n```xml\n<bean id=\"reservationFormController\"\n      class=\"com.apress.springrecipes.court.web.ReservationFormController\"\
  >\n    <property name=\"reservationService\" ref=\"reservationService\" />\n   \
  \ <property name=\"formView\" value=\"reservationForm\" />\n    <property name=\"\
  successView\" value=\"reservationSuccess\" />\n</bean>\n```\n\n首先，我们来创建表单视图 `reservationForm.jsp`。它包含一个带有多个表单字段的\
  \ HTML 表单。如果出现任何绑定或验证错误，`SimpleFormController` 会向用户重新显示表单视图，并将错误信息包含在模型中供视图访问。你必须在表单视图中显示错误消息和用户输入的原始值。\n\
  \n在 Spring 1.x 版本中，你必须使用 `<spring:bind>` 标签将每个表单字段绑定到命令对象的属性，然后使用表达式 `${status.errorMessage}`\
  \ 和 `${status.value}` 访问错误消息和原始值。在 Spring 2.x 中，你可以使用 Spring 表单标签库中强大的表单标签。\n\n\
  ```jsp\n[**<%@ taglib prefix=\"form\" uri=\"http://www.springframework.org/tags/form\"\
  %>**](http://www.springframework.org/tags/form)\n<html>\n<head>\n    <title>预约表单</title>\n\
  \    <style>\n        .error {\n            color: #ff0000;\n            font-weight:\
  \ bold;\n        }\n    </style>\n</head>\n<body>\n    **<form:form method=\"POST\"\
  \ commandName=\"reservation\">**\n        **<form:errors path=\"*\" cssClass=\"\
  error\" />**\n        <table>\n            <tr>\n                <td>球场名称</td>\n\
  \                <td> **<form:input path=\"courtName\" />** </td>\n            \
  \    <td> **<form:errors path=\"courtName\" cssClass=\"error\" />** </td>\n    \
  \        </tr>\n            <tr>\n                <td>日期</td>\n                <td>\
  \ **<form:input path=\"date\" />** </td>\n                <td> **<form:errors path=\"\
  date\" cssClass=\"error\" />** </td>\n            </tr>\n            <tr>\n    \
  \            <td>小时</td>\n                <td> **<form:input path=\"hour\" />**\
  \ </td>\n                <td> **<form:errors path=\"hour\" cssClass=\"error\" />**\
  \ </td>\n            </tr>\n            <tr>\n                <td colspan=\"3\"\
  ><input type=\"submit\" /></td>\n            </tr>\n        </table>\n    </form:form>\n\
  </body>\n</html>\n```\n\n`<form:input>` 和 `<form:select>` 标签可以通过指定 `path` 属性绑定到命令对象的属性路径。它们会向用户显示字段的原始值，该值要么是绑定的属性值，要么是由于绑定错误而被拒绝的值。这些标签必须用在\
  \ `<form:form>` 标签内部，该标签通过名称定义表单并绑定到命令对象。如果你不指定命令对象的名称，则将使用默认名称 `command`。`<form:error>`\
  \ 标签可以显示指定属性路径的所有错误消息。在 `path` 中放置星号表示将显示所有错误。\n\n然后，你创建成功视图 `reservationSuccess.jsp`\
  \ 来通知用户预约成功：\n\n```jsp\n<html>\n<head>\n    <title>预约成功</title>\n</head>\n<body>\n\
  \    您的预约已成功提交。\n</body>\n</html>\n```\n\n在表单字段绑定过程中，可能会因无效值而出现错误。例如，如果日期格式不符合 `CustomDateEditor`\
  \ 中指定的有效格式，或者小时字段包含字母字符，则上述表单控制器将无法转换这些字段。\n\n此控制器会为每个错误生成一系列选择性错误代码。对于日期字段输入的无效值，将生成以下错误代码：\n\
  \n```\ntypeMismatch.command.date\ntypeMismatch.date\ntypeMismatch.java.util.Date\n\
  typeMismatch\n```\n\n如果你定义了 `ResourceBundleMessageSource`，则可以在资源包中包含以下错误消息，以适用于相应的区域设置（例如，默认区域设置的\
  \ `messages.properties`）：\n\n```properties\ntypeMismatch.date=无效的日期格式\ntypeMismatch.hour=无效的小时格式\n\
  ```\n\n由于你在 Web 应用程序上下文中配置了 `ControllerClassNameHandlerMapping`，因此可以通过以下 URL 访问此控制器：\n\
  \n[`localhost:8080/court/reservationForm.htm`](http://localhost:8080/court/reservationForm.htm)\n\
  \n\n\n当您在浏览器中输入此 URL 时，它会向您的 Web 应用程序发送一个 HTTP GET 请求。此表单控制器将为此请求渲染表单视图。填写表单字段后，您通过\
  \ HTTP POST 请求提交表单。然后，此表单控制器将处理您的表单提交。如果表单处理成功，它将渲染成功视图。否则，它将再次渲染带有错误的表单视图。\n\n\
  9799ch10.qxd 5/14/08 3:31 PM 第 358 页\n\n**358**\n\n第 10 章 **■** S P R I N G M V\
  \ C 框 架\n\n**应用 Post/Redirect/Get 设计模式**\n\n然而，当您在表单成功视图页面刷新网页时，刚刚提交的表单将被再次提交。此问题被称为*重复表单提交*。为避免此问题，您可以应用*post/redirect/get*设计模式，该模式建议在表单提交成功处理后重定向到另一个\
  \ URL，而不是直接返回一个 HTML 页面。\n\n首先，您使用`ParameterizableViewController`定义一个仅渲染`reservationSuccess`视图的控制器，该视图映射到`reservationSuccess.jsp`。\n\
  \n<bean id=\"reservationSuccessController\"\n\nclass=\"org.springframework.web.servlet.mvc.ParameterizableViewController\"\
  >\n\n<property name=\"viewName\" value=\"reservationSuccess\" />\n\n</bean>\n\n\
  然后，您在`SimpleUrlHandlerMapping`中为此控制器定义一个显式映射，因为`ControllerClassNameHandlerMapping`不会为内置的\
  \ Spring MVC 控制器生成映射：\n\n<bean class=\"org.springframework.web.servlet.handler.SimpleUrlHandlerMapping\"\
  >\n\n...\n\n<property name=\"mappings\">\n\n<props>\n\n...\n\n<prop key=\"/reservationSuccess.htm\"\
  >reservationSuccessController</prop>\n\n</props>\n\n</property>\n\n</bean>\n\n由于您在\
  \ Web 应用程序上下文中配置了`ResourceBundleViewResolver`，您可以在类路径根目录的`views.properties`中定义以下重定向视图：`reservationSuccessRedirect.(class)=`**➥**\n\
  `org.springframework.web.servlet.view.RedirectView`\n`reservationSuccessRedirect.url=reservationSuccess.htm`\n\
