  Web MVC 不同的 Portlet 特定特性。


  • *第 15 章：Spring Web Flow*：本章介绍如何使用 Spring Web Flow 建模和管理 Web 应用程序的 UI 流程。本章重点介绍在
  Spring MVC 和 JSF 中使用 Spring Web Flow 2.0。


  • *第 16 章：Spring 远程调用与 Web 服务*：本章涵盖 Spring 对各种远程调用技术的支持，包括 RMI、Hessian、Burlap、HTTP
  Invoker 和 Web 服务。它还介绍了使用 Spring Web Services 开发契约优先的 Web 服务。


  • *第 17 章：Spring 对 EJB 和 JMS 的支持*：本章讨论如何使用 Spring 的 EJB 支持开发 EJB 2.x 和 3.0 组件，以及如何使用
  Spring 的 JMS 支持简化发送、接收和监听 JMS 消息。


