  \ 5/14/08 4:08 PM Page 449\n\n第 12 章 **■** Spring 测试支持\n\n**449**\n\n**12-6\\. 在集成测试中管理事务**\n\
  \n问题\n\n\n\n在为访问数据库的应用程序编写集成测试时，通常会在初始化方法中准备测试数据。每个测试方法运行后，可能会修改数据库中的数据。因此，你必须清理数据库，以确保下一个测试方法能从一致的状态开始运行。结果，你不得不开发许多数据库清理任务。\n\
  \n解决方案\n\nSpring 的测试支持设施可以为每个测试方法创建并回滚一个事务，这样你在一个测试方法中所做的更改就不会影响下一个测试方法。这也能省去你开发清理任务来清理数据库的麻烦。\n\
  \n在 2.5 版本之前的版本中使用 Spring 的 JUnit 3.8 遗留支持时，你的测试类可以继承 `AbstractTransactionalSpringContextTests`\
  \ 基类（它是 `AbstractDependencyInjectionSpringContextTests` 的子类），以便为每个测试方法创建并回滚一个事务。这个类要求在\
  \ Bean 配置文件中正确配置一个事务管理器。\n\n在 Spring 2.5 中，TestContext 框架提供了一个与事务管理相关的测试执行监听器。如果你没有显式指定自己的监听器，默认情况下它会注册到测试上下文管理器中。\n\
  \n`TransactionalTestExecutionListener`：它处理类级别或方法级别的 `@Transactional` 注解，并让方法自动在事务中运行。\n\
  \n你的测试类可以继承对应测试框架的 TestContext 支持类（如表 12-2 所示），以便让测试方法在事务中运行。这些类与测试上下文管理器集成，并在类级别启用了\
  \ `@Transactional`。请注意，Bean 配置文件中也需要一个事务管理器。\n\n**表 12-2.** *用于事务管理的 TestContext\
  \ 支持类* **测试框架**\n\n**TestContext 支持类***\n\nJUnit 3.8\n\n`AbstractTransactionalJUnit38SpringContextTests`\n\
  \nJUnit 4.4\n\n`AbstractTransactionalJUnit4SpringContextTests`\n\nTestNG\n\n`AbstractTransactionalTestNGSpringContextTests`\n\
  \n**这三个 TestContext 支持类除了启用* `DependencyInjectionTestExecutionListener` *和* `DirtiesContextTestExecutionListener`\
  \ *之外，还启用了* `TransactionalTestExecutionListener` *。*\n\n在 JUnit 4.4 和 TestNG 中，你可以简单地在类级别或方法级别标注\
  \ `@Transactional` 注解，让测试方法在事务中运行，而无需继承 TestContext 支持类。然而，为了与测试上下文管理器集成，你必须使用测试运行器\
  \ `SpringJUnit4ClassRunner` 来运行 JUnit 4.4 测试，而对于 TestNG 测试，则需要手动操作。\n\n9799ch12.qxd\
  \ 5/14/08 4:08 PM 第 450 页\n\n**450**\n\n第 12 章 **■** Spring 测试支持\n\n工作原理\n\n让我们考虑将银行系统的账户存储在关系数据库中。你可以选择任何支持事务且符合\
  \ JDBC 规范的数据库引擎，然后在其上执行以下 SQL 语句来创建 ACCOUNT 表。这里，我选择了 Apache Derby 作为数据库引擎，并在 bank\
  \ 实例中创建了该表。\n\nCREATE TABLE ACCOUNT (\n\nACCOUNT_NO VARCHAR(10) NOT NULL,\n\nBALANCE\
  \ DOUBLE NOT NULL,\n\nPRIMARY KEY (ACCOUNT_NO)\n\n);\n\n接下来，你创建一个新的 DAO 实现，使用 JDBC\
  \ 访问数据库。你可以利用 `SimpleJdbcTemplate` 来简化操作。\n\npackage com.apress.springrecipes.bank;\n\
  \nimport org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\npublic class\
  \ JdbcAccountDao extends SimpleJdbcDaoSupport implements AccountDao {\n\npublic\
  \ void createAccount(Account account) {\n\nString sql = \"INSERT INTO ACCOUNT (ACCOUNT_NO,\
  \ BALANCE) VALUES (?, ?)\"; getSimpleJdbcTemplate().update(\n\nsql, account.getAccountNo(),\
  \ account.getBalance());\n\n}\n\npublic void updateAccount(Account account) {\n\n\
  String sql = \"UPDATE ACCOUNT SET BALANCE = ? WHERE ACCOUNT_NO = ?\"; getSimpleJdbcTemplate().update(\n\
  \nsql, account.getBalance(), account.getAccountNo());\n\n}\n\npublic void removeAccount(Account\
  \ account) {\n\n\n\nString sql = \"DELETE FROM ACCOUNT WHERE ACCOUNT_NO = ?\";\n\
  \ngetSimpleJdbcTemplate().update(sql, account.getAccountNo());\n\n}\n\npublic Account\
  \ findAccount(String accountNo) {\n\nString sql = \"SELECT BALANCE FROM ACCOUNT\
  \ WHERE ACCOUNT_NO = ?\"; double balance = getSimpleJdbcTemplate().queryForObject(\n\
  \nsql, Double.class, accountNo);\n\nreturn new Account(accountNo, balance);\n\n\
  }\n\n}\n\n9799ch12.qxd 5/14/08 4:08 PM 第 451 页\n\n第 12 章 **■** S P R I N G 测 试 支\
