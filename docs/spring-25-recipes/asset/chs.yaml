  \ EJB 注解标注的简单 Java 类。此外，为了简化 EJB 查找过程，已取消了 Home 接口的概念。在 EJB 3.0 中，你可以直接从 JNDI 查找\
  \ EJB 引用。然而，JNDI 查找代码仍然复杂，并且你还必须处理 `NamingException`。\n\n解决方案\n\n通过使用 Spring 的 `JndiObjectFactoryBean`，你可以轻松地在\
  \ Spring IoC 容器中声明一个 JNDI 对象引用。你可以使用此工厂 Bean 来声明对 EJB 3.0 组件的引用。\n\n工作原理\n\n让我们使用\
  \ EJB 3.0 创建一个用于计算邮资的无状态会话 Bean。此 EJB 组件的接口可以简单地是一个业务接口。\n\npackage com.apress.springrecipes.post;\n\
