  \ 3).setCellValue(\n\nreservation.getPlayer().getName());\n\nrow.createCell((short)\
  \ 4).setCellValue(\n\n9799ch10.qxd 5/14/08 3:31 PM Page 384\n\n**384**\n\n第 10 章\
