  \ Bean。但是，如果应用上下文中存在多个目标类型的 Bean，此自动装配将无法工作。在这种情况下，你必须从 `getApplicationContext()`\
  \ 获取的应用上下文中显式查找 Bean，并移除导致歧义的 setter 方法。\n\n使用 JUnit 3.8 遗留支持注入测试夹具的另一种方法是通过受保护字段。要使其生效，你必须在构造函数中启用\
  \ `populateProtectedVariables` 属性。在这种情况下，你无需为每个想要注入的字段提供 setter 方法。\n\n```java\n\
