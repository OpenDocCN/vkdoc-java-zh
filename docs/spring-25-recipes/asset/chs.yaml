  \n**19-3. 从脚本刷新 Bean**\n\n问题\n\n由于使用脚本语言实现的模块可能需要频繁且动态地更改，你希望 Spring IoC 容器能够自动检测并从脚本源刷新更改。\n\
  \n解决方案\n\n\n\n一旦你在 `refresh-check-delay` 属性中指定了检查间隔，Spring 就能够从其源文件刷新脚本化的 Bean 定义。当该\
  \ Bean 上的某个方法被调用时，如果指定的检查间隔已过，Spring 将检查脚本源文件。如果脚本源文件已更改，Spring 便会从该源文件刷新 Bean 定义。\n\
  \n工作原理\n\n默认情况下，`refresh-check-delay` 属性为负值，因此刷新检查功能是禁用的。你可以在此属性中指定用于刷新检查的毫秒数来启用此功能。例如，你可以为你的\
  \ JRuby Bean 指定 5 秒的刷新检查间隔。\n\n<lang:jruby id=\"interestCalculator\"\n\nscript-source=\"\
  classpath:com/apress/springrecipes/interest/**➥**\n\nSimpleInterestCalculator.rb\"\
  \n\nscript-interfaces=\"com.apress.springrecipes.interest.InterestCalculator\"\n\
  \n**refresh-check-delay=\"5000\"** >\n\n...\n\n</lang:jruby>\n\n当然，`refresh-check-delay`\
  \ 属性同样适用于使用 Groovy 或 BeanShell 实现的 Bean。\n\n<lang:groovy id=\"interestCalculator\"\
  \n\nscript-source=\"classpath:com/apress/springrecipes/interest/**➥**\n\nSimpleInterestCalculator.groovy\"\
  \n\n**refresh-check-delay=\"5000\"** >\n\n...\n\n</lang:groovy>\n\n<lang:bsh id=\"\
  interestCalculator\"\n\nscript-source=\"classpath:com/apress/springrecipes/interest/**➥**\n\
  \nSimpleInterestCalculator.bsh\"\n\nscript-interfaces=\"com.apress.springrecipes.interest.InterestCalculator\"\
  \n\n9799ch19.qxd 5/15/08 5:09 PM Page 706\n\n**706**\n\n第 19 章 **■** 在 Spring 中使用脚本\n\
  \n**refresh-check-delay=\"5000\"** >\n\n...\n\n</lang:bsh>\n\n**19-4. 内联定义脚本源**\n\
  \n问题\n\n你希望直接在 Bean 配置文件中定义那些不太可能更改的脚本源，而不是使用外部的脚本源文件。\n\n解决方案\n\n你可以在脚本化 Bean 的\
  \ `<lang:inline-script>` 元素中定义内联脚本源，以替代通过 `script-source` 属性引用外部脚本源文件。请注意，刷新检查功能不适用于内联脚本源，因为\
  \ Spring IoC 容器仅在启动时加载一次 Bean 配置。\n\n工作原理\n\n例如，你可以使用 `<lang:inline-script>` 元素内联定义\
  \ JRuby 脚本。\n\n为了防止脚本中的字符与 XML 保留字符冲突，你应该使用 `<![CDATA[...]]>` 标签将脚本源包围起来。你不再需要在\
  \ `script-source` 属性中指定对外部脚本源文件的引用。\n\n<lang:jruby id=\"interestCalculator\"\n\n\
  script-interfaces=\"com.apress.springrecipes.interest.InterestCalculator\">\n\n\
  **<lang:inline-script>**\n\n<![CDATA\n\nclass SimpleInterestCalculator\n\ndef setRateCalculator(rateCalculator)\n\
  \n@rateCalculator = rateCalculator\n\nend\n\ndef calculate(amount, year)\n\namount\
  \ * year * [@rateCalculator.getAnnualRate\n\nend\n\nend\n\nSimpleInterestCalculator.new\n\
  \n]]>\n\n**</lang:inline-script>**\n\n<lang:property name=\"rateCalculator\" ref=\"\
  rateCalculator\" />\n\n</lang:jruby>\n\n当然，你也可以使用 `<lang:inline-script>` 元素内联定义\
  \ Groovy 和 BeanShell 脚本源。\n\n9799ch19.qxd 5/15/08 5:09 PM Page 707\n\n第 19 章 **■**\
  \ 在 Spring 中使用脚本\n\n**707**\n\n<lang:groovy id=\"interestCalculator\">\n\n**<lang:inline-script>**\n\
