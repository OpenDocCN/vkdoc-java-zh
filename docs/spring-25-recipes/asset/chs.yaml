  **1-1\. 使用容器管理组件**


  问题


  面向对象设计的基本思想是将系统分解为一组可重用的对象。如果没有一个中心模块来管理这些对象，它们就必须创建和管理自己的依赖关系。结果，对象之间紧密耦合。


  解决方案


  您需要一个 *容器* 来管理构成系统的对象。容器集中管理对象的创建，并充当提供查找服务的注册表。容器还负责管理对象的生命周期，并为对象提供运行平台。


  在容器内运行的对象称为 *组件*。它们必须符合容器定义的规范。


  工作原理


  **将接口与实现分离**


