  \n当默认构造函数被调用时，这些属性尚未设置。因此，你可以添加一个接受这两个属性作为参数的构造函数，并在该构造函数的末尾调用 `openFile()` 方法。然而，有时你可能不被允许这样做，或者你更倾向于通过\
  \ setter 注入来设置属性。实际上，调用 `openFile()` 方法的最佳时机是在 Spring IoC 容器设置完所有属性之后。\n\n**实现 InitializingBean\
