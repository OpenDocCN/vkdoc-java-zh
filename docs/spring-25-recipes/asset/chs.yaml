  Spring Web Flow 支持在流程定义中使用表达式语言来访问其数据模型并调用后端服务。Spring Web Flow 2.0 支持使用 Unified\
  \ EL\n\n（用于 JSF 1.2 和 JSP 2.1）和 OGNL（对象图导航语言）作为其表达式语言。这两种语言的语法非常相似。对于属性访问和方法调用等基本表达式，其语法是相同的。本章中使用的\n\
  \n9799ch15.qxd 5/22/08 4:38 PM 第 548 页\n\n**548**\n\n第 15 章 **■** S P R I N G W\
  \ E B F L O W\n\n表达式对 Unified EL 和 OGNL 均有效，因此您可以自由选择其中任何一种作为您的表达式语言。在 JSF 环境中推荐使用\
  \ Unified EL，因为它允许您在流程定义和 JSF 视图中使用相同的表达式语言。然而，使用 Spring Web Flow 1.0 的开发者可能更倾向于\
  \ OGNL，因为它是 1.0 版本唯一支持的表达式语言。\n\nSpring Web Flow 能够从类路径中检测 JBoss EL（作为默认的 Unified\
  \ EL 实现）和 OGNL 的库。您可以通过在类路径中包含相应的 JAR 文件来启用其中一种（但不能同时启用两种）。\n\n**■注意** 如果您打算使用 Unified\
  \ EL 作为 Web Flow 的表达式语言，可以从 http://repository.jboss.org/maven2/org/jboss/seam/jboss-el/\
  \ 下载 JBoss EL（例如，[v2.0.0 GA](http://repository.jboss.org/maven2/org/jboss/seam/jboss-el/)），并将下载的\
  \ jboss-el-2.0.0.GA.jar 文件复制到 WEB-INF/lib 目录。如果您选择 OGNL，可以从 [`www.ognl.org/`](http://www.ognl.org)\
  \ 下载 ognl-2.6.9.jar，并将其复制到 WEB-INF/lib 目录。\n\n**创建配置文件**\n\n在 Web 部署描述符（即 web.xml）中，您注册了\
  \ ContextLoaderListener 以在启动时加载根应用上下文，以及 Spring MVC 的 DispatcherServlet 用于分发请求。您可以将\
  \ URL 模式 /flow/* 映射到此 Servlet，以便请求路径 flow 下的所有请求都由它处理。\n\n[<web-app version=\"2.4\"\
  ](http://java.sun.com/xml/ns/j2ee)\n\n[xsi:schemaLocation=\"http://java.sun.com/xml/ns/j2ee](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<context-param>\n\n<param-name>contextConfigLocation</param-name>\n\n<param-value>/WEB-INF/library-service.xml</param-value>\n\
  \n</context-param>\n\n<listener>\n\n<listener-class>\n\norg.springframework.web.context.ContextLoaderListener\n\
  \n</listener-class>\n\n</listener>\n\n<servlet>\n\n<servlet-name>library</servlet-name>\n\
  \n<servlet-class>\n\norg.springframework.web.servlet.DispatcherServlet\n\n</servlet-class>\n\
  \n</servlet>\n\n9799ch15.qxd 5/22/08 4:38 PM 第 549 页\n\n第 15 章 **■** S P R I N G\
  \ W E B F L O W\n\n**549**\n\n<servlet-mapping>\n\n<servlet-name>library</servlet-name>\n\
  \n<url-pattern> **/flow/***</url-pattern>\n\n</servlet-mapping>\n\n</web-app>\n\n\
  ContextLoaderListener 将从您在 contextConfigLocation 上下文参数中指定的配置文件（本例中为 library-service.xml）加载根应用上下文。此配置文件声明了服务层的\
  \ Bean。对于欢迎流程，您可以在此文件中声明图书馆服务，以便在查询时返回公共假期。\n\n<beans\n\n[xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<bean name=\"libraryService\"\n\nclass=\"com.apress.springrecipes.library.service.LibraryServiceImpl\"\
  \ />\n\n</beans>\n\n由于 Web 部署描述符中的 DispatcherServlet 实例名称为 library，您在 WEB-INF 根目录下创建了\
  \ library-servlet.xml，内容如下：\n\n<beans\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n\n\n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<import resource=\"library-webflow.xml\" />\n\n</beans>\n\n为了分离 Spring MVC 和 Spring\
  \ Web Flow 的配置，你可以将 Spring Web Flow 的配置集中到另一个文件（例如 library-webflow.xml）中，并将其导入到\
  \ library-servlet.xml。然后创建该文件，内容如下：\n\n<beans\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.springframework.org/schema/webflow-config)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/webflow-config)\n\
  \n[`www.springframework.org/schema/webflow-config`](http://www.springframework.org/schema/webflow-config)\n\
  \n[`www.springframework.org/schema/webflow-config/`](http://www.springframework.org/schema/webflow-config)[**➥**](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsdwww.springframework.org/schema/webflow-conf)\n\
  \n[spring-webflow-config-2.0.xsd\">](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsdwww.springframework.org/schema/webflow-conf)\n\
  \n<bean name=\" **/***\" class=\"org.springframework.webflow.mvc.servlet.FlowController\"\
  >\n\n<property name=\"flowExecutor\" ref=\"flowExecutor\" />\n\n</bean>\n\n<webflow:flow-executor\
  \ id=\"flowExecutor\" />\n\n9799ch15.qxd 5/22/08 4:38 PM Page 550\n\n**550**\n\n\
  第 15 章 **■** Spring Web Flow\n\n<webflow:flow-registry id=\"flowRegistry\">\n\n\
  **<webflow:flow-location path=\"/WEB-INF/flows/welcome/welcome.xml\" />**\n\n</webflow:flow-registry>\n\
  \n</beans>\n\n由于每个 Spring MVC 应用都预配置了 `BeanNameUrlHandlerMapping`，你可以通过将 URL 模式\
  \ `/*` 指定为 bean 名称，将所有 URL 映射到 `FlowController`。如果除了 `FlowController` 之外还有其他控制器，则需要细化\
  \ URL 映射。\n\n`FlowController` 是 Spring Web Flow 提供的一个 Spring MVC 控制器，它将请求处理委托给流执行器（flow\
  \ executor）。流执行器是 Spring Web Flow 的核心入口点，它驱动着流注册表中注册的 Web 流的执行。默认情况下，它会查找 ID 为 `flowRegistry`\
  \ 的流注册表。\n\n然后，你需要通过指定流定义的位置，在流注册表中注册流定义。流定义的文件名（例如 `welcome.xml`）默认会被用作流 ID（例如\
  \ `welcome`），但你也可以使用 `id` 属性指定自定义 ID。\n\n**创建 Web 流定义**\n\nSpring Web Flow 提供了一种基于\
  \ XML 的流定义语言，该语言可以通过 Spring Web Flow 的 XSD 进行验证，并得到 Spring IDE 的支持。关于 Spring IDE\
  \ 对 Spring Web Flow 的支持，请参考 Spring IDE 的在线文档（位于 [`springide.org/`](http://springide.org)）。现在，你可以在定义文件\
  \ `/WEB-INF/flows/welcome/welcome.xml` 中定义欢迎流：\n\n<flow\n\n[xsi:schemaLocation=\"\
  http://www.springframework.org/schema/webflow](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<view-state id=\"welcome\">\n\n<transition on=\"next\" to=\"introduction\" />\n\
  \n<transition on=\"skip\" to=\"menu\" />\n\n</view-state>\n\n<view-state id=\"introduction\"\
  >\n\n<on-render>\n\n<evaluate expression=\"libraryService.getHolidays()\"\n\nresult=\"\
  requestScope.holidays\" />\n\n</on-render>\n\n<transition on=\"next\" to=\"menu\"\
  \ />\n\n</view-state>\n\n<view-state id=\"menu\" />\n\n</flow>\n\n在这个欢迎流中，你定义了三个视图状态：`welcome`、`introduction`\
  \ 和 `menu`。\n\n顾名思义，视图状态会向用户渲染一个视图。在 Spring MVC 中，视图通常是一个 JSP 文件。默认情况下，视图状态会渲染一个\
  \ JSP 文件，该文件以状态 ID 作为文件名，以 `.jsp` 作为文件扩展名，并位于与此流定义相同的路径下。如果你想要渲染\n\n9799ch15.qxd\
  \ 5/22/08 4:38 PM Page 551\n\n第 15 章 **■** Spring Web Flow\n\n**551**\n\n\n\n另一种方式是，你可以在\
  \ `view` 属性中指定其逻辑视图名称，并定义一个相应的 Spring MVC 视图解析器来解析它。\n\n你可以使用 `<on-render>` 元素在视图状态渲染之前为其触发一个动作。Spring\
  \ Web Flow 支持使用 Unified EL 或 OGNL 的表达式来调用方法。关于 Unified EL 和 OGNL 的更多信息，请参考文章“统一表达式语言”，网址为\
  \ http://java.sun.com/products/jsp/reference/techart/unifiedEL.html，以及 OGNL 语言指南，网址为\
  \ http://www.ognl.org/。前面的表达式对于 Unified EL 和 OGNL 都有效。它调用 `libraryService` bean\
  \ 上的 `getHolidays()` 方法，并将结果存储在请求作用域的 `holidays` 变量中。\n\n此欢迎流程的流程图如图 15-2 所示。\n\n\
  **图 15-2.** *欢迎流程图*\n\n**创建页面视图**\n\n现在，您需要为前面的三个视图状态创建 JSP 文件。您可以将它们创建在与流程定义相同的位置，并使用与视图状态相同的名称，以便它们能被默认加载。首先，创建\
  \ `welcome.jsp`：\n\n```html\n<html>\n<head>\n<title>欢迎</title>\n</head>\n<body>\n\
  <h2>欢迎！</h2>\n<a href=\"${flowExecutionUrl}&_eventId=next\">下一步</a>\n<a href=\"\
  ${flowExecutionUrl}&_eventId=skip\">跳过</a>\n</body>\n</html>\n```\n\n在这个 JSP 文件中，有两个用于触发事件的链接，事件\
  \ ID 分别为 `next` 和 `skip`。在 Spring Web Flow 中，事件 ID 可以指定为 `_eventId` 请求参数的值（例如 `_eventId=next`），也可以指定在请求参数的名称中，并以\
  \ `_eventId_` 作为前缀（例如 `_eventId_next`），无论参数值是什么。此外，您必须以变量 `${flowExecutionUrl}`\
  \ 开头来触发流程执行。该变量将在运行时由 Spring Web Flow 评估。\n\n接下来，创建 `introduction.jsp` 来显示图书馆的节假日信息，这些信息由\
  \ `<on-render>` 中指定的操作在此视图渲染之前加载：\n\n```jsp\n<%@ taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
  \ %>\n<%@ taglib prefix=\"fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\" %>\n<html>\n\
  <head>\n<title>介绍</title>\n</head>\n<body>\n<h2>图书馆节假日</h2>\n<c:forEach items=\"\
  ${holidays}\" var=\"holiday\">\n    <fmt:formatDate value=\"${holiday}\" pattern=\"\
  yyyy-MM-dd\" /><br />\n</c:forEach>\n<a href=\"${flowExecutionUrl}&_eventId=next\"\
  >下一步</a>\n</body>\n</html>\n```\n\n最后，创建 `menu.jsp`。这个视图非常简单，因为没有从此状态到其他状态的转换。\n\
  \n```html\n<html>\n<head>\n<title>菜单</title>\n</head>\n<body>\n<h2>菜单</h2>\n</body>\n\
  </html>\n```\n\n现在，您可以将此 Web 流程应用程序部署到 Web 容器（例如 Apache Tomcat 6.0）中。\n\n默认情况下，Tomcat\
  \ 监听 8080 端口，因此如果您将应用程序部署到 `library` 上下文路径，则可以使用以下 URL 访问此欢迎 Web 流程，因为流程请求路径下的 URL\
  \ 将被映射到 `DispatcherServlet`：\n\n[`localhost:8080/library/flow/welcome`](http://localhost:8080/library/flow/welcome)\n\
  \n**15-2. 使用不同状态类型建模 Web 流程**\n\n问题\n\n您希望将各种类型的 UI 活动建模为 Web 流程，以便在 Spring Web\
  \ Flow 中执行。\n\n解决方案\n\n在 Spring Web Flow 中，流程的每一步都由一个状态表示。一个状态可以包含零个或多个到下一个状态的转换，这些转换根据事件\
  \ ID 触发。Spring Web Flow 提供了几种内置状态类型供您建模 Web 流程。它还允许您定义自定义状态类型。\n\n表 15-1 显示了 Spring\
  \ Web Flow 中的内置状态类型。\n\n**表 15-1.** *Spring Web Flow 中的内置状态类型*\n\n| **状态类型** | **描述**\
  \ |\n| :--- | :--- |\n| 视图 | 渲染一个视图，供用户参与流程（例如，通过显示信息和收集用户输入）。流程的执行会暂停，直到触发一个事件来恢复流程（例如，通过超链接点击或表单提交）。\
  \ |\n| 动作 | 为流程执行动作，例如更新数据库和收集用于显示的信息。 |\n| 决策 | 评估一个布尔表达式，以决定下一步转换到哪个状态。 |\n| 子流程\
  \ | 启动另一个流程作为当前流程的子流程。当子流程结束时，它将返回到启动它的流程。 |\n| 结束 | 终止流程，之后所有流程作用域的变量都将失效。 |\n\n\
  工作原理\n\n假设您要为图书馆用户构建一个搜索图书的 Web 流程。首先，用户必须在条件页面中输入图书搜索条件。如果有不止一本书符合条件，它们将显示在列表页面中。在此页面中，用户可以选择一本书以在详情页面中浏览其详细信息。但是，如果恰好有一本书符合条件，其详细信息将直接在详情页面中显示，而无需经过列表页面。此图书搜索\
  \ UI 流程如图 15-3 所示。\n\n**图 15-3.** *图书搜索 UI 流程*\n\n首先，让我们创建领域类 `Book`。它应该实现 `Serializable`\
  \ 接口，因为其实例可能需要持久化到会话中。\n\n```java\npackage com.apress.springrecipes.library.domain;\n\
  \n// ... 导入语句\n\npublic class Book implements Serializable {\n\n    private String\
  \ isbn;\n    private String name;\n    private String author;\n    private Date\
  \ publishDate;\n\n    // 构造函数、Getter 和 Setter 方法\n    // ...\n}\n```\n\n接下来，创建 `BookCriteria`\
  \ 类，其实例将作为表单命令对象用于绑定表单字段。出于同样的原因，它也应该实现 `Serializable` 接口。\n\n```java\npackage com.apress.springrecipes.library.domain;\n\
  \n// ... 导入语句\n\npublic class BookCriteria implements Serializable {\n\n    private\
  \ String keyword;\n    private String author;\n\n    // Getter 和 Setter 方法\n   \
  \ // ...\n}\n```\n\n在服务层，您设计一个服务接口，用于向表示层提供图书搜索服务：\n\n```java\npackage com.apress.springrecipes.library.service;\n\
  \n// ... 导入语句\n\npublic interface BookService {\n    public List<Book> search(BookCriteria\
  \ criteria);\n    public Book findByIsbn(String isbn);\n}\n```\n\n为了测试目的，让我们硬编码一些图书，并通过逐一匹配图书来实现\
  \ `search()` 方法：\n\n```java\npackage com.apress.springrecipes.library.service;\n\
  \n// ... 导入语句\n\npublic class BookServiceImpl implements BookService {\n\n    private\
  \ Map<String, Book> books;\n\n    public BookServiceImpl() {\n        books = new\
  \ HashMap<String, Book>();\n        books.put(\"0001\", new Book(\"0001\", \"Spring\
  \ Framework\", \"Ray\", new GregorianCalendar(2007, 0, 1).getTime()));\n       \
  \ books.put(\"0002\", new Book(\"0002\", \"Spring Web MVC\", \"Paul\", new GregorianCalendar(2007,\
  \ 3, 1).getTime()));\n        books.put(\"0003\", new Book(\"0003\", \"Spring Web\
  \ Flow\", \"Ray\", new GregorianCalendar(2007, 6, 1).getTime()));\n    }\n\n   \
  \ public List<Book> search(BookCriteria criteria) {\n        List<Book> results\
  \ = new ArrayList<Book>();\n        for (Book book : books.values()) {\n       \
  \     String keyword = criteria.getKeyword().trim();\n            String author\
  \ = criteria.getAuthor().trim();\n            boolean keywordMatches = keyword.length()\
  \ > 0\n                    && book.getName().contains(keyword);\n            boolean\
  \ authorMatches = book.getAuthor().equals(author);\n            if (keywordMatches\
  \ || authorMatches) {\n                results.add(book);\n            }\n     \
  \   }\n        return results;\n    }\n\n    public Book findByIsbn(String isbn)\
  \ {\n        return books.get(isbn);\n    }\n}\n```\n\n为了使此图书服务对所有图书馆 Web 流程可访问，您在服务层配置文件（即\
  \ `library-service.xml`）中声明它，该文件将为根应用程序上下文加载：\n\n```xml\n<bean name=\"bookService\"\
  \n```\n\n\n\nclass=\"com.apress.springrecipes.library.service.BookServiceImpl\"\
  \ /> 现在你可以开始开发图书搜索流程了。首先，在 `library-webflow.xml` 中将流程定义的位置添加到流程注册表中，并创建流程定义 XML\
  \ 文件：\n\n<webflow:flow-registry id=\"flowRegistry\">\n\n...\n\n**<webflow:flow-location\
  \ path=\"/WEB-INF/flows/bookSearch/bookSearch.xml\" />**\n\n</webflow:flow-registry>\n\
  \n接下来，让我们使用 Spring Web Flow 提供的不同类型状态，逐步构建这个 Web 流程。\n\n9799ch15.qxd 5/22/08 4:38\
  \ PM 第 556 页\n\n**556**\n\n第 15 章 **■** S P R I N G W E B F L O W\n\n**定义视图状态**\n\
  \n根据图书搜索流程的需求，你首先需要一个视图状态来显示一个表单，以便用户输入图书搜索条件。在 Spring Web Flow 中，你可以创建一个对应于 Spring\
  \ MVC 中控制器的动作来处理流程请求。Spring Web Flow 提供了一个 `FormAction` 类来帮助你处理表单。对于复杂的表单处理，你可以扩展这个类并添加自己的处理逻辑。但对于简单的表单需求，你可以通过填充其属性（例如，表单对象类、属性编辑器和验证器）来直接使用这个类。现在，你可以使用这个类定义一个表单动作，在\
  \ `library-webflow.xml` 中处理图书条件表单：\n\n<bean id=\"bookCriteriaAction\"\n\nclass=\"\
  org.springframework.webflow.action.FormAction\">\n\n<property name=\"formObjectClass\"\
  \n\nvalue=\"com.apress.springrecipes.library.domain.BookCriteria\" />\n\n<property\
  \ name=\"propertyEditorRegistrar\">\n\n<bean class=\"com.apress.springrecipes.library.web.PropertyEditors\"\
  \ />\n\n</property>\n\n</bean>\n\n表单动作可以将表单字段绑定到同名表单对象的属性上。但你首先必须在 `formObjectClass`\
  \ 属性中指定表单对象类，以便此动作实例化表单对象。为了将表单字段值转换为适当的数据类型，你必须向此表单动作注册自定义属性编辑器。你可以创建一个属性编辑器注册器来注册你自己的编辑器，并在\
  \ `propertyEditorRegistrar` 属性中指定它：\n\npackage com.apress.springrecipes.library.web;\n\
  \n...\n\nimport org.springframework.beans.PropertyEditorRegistrar;\n\nimport org.springframework.beans.PropertyEditorRegistry;\n\
  \nimport org.springframework.beans.propertyeditors.CustomDateEditor;\n\npublic class\
  \ PropertyEditors implements PropertyEditorRegistrar {\n\npublic void registerCustomEditors(PropertyEditorRegistry\
  \ registry) {\n\nSimpleDateFormat dateFormat = new SimpleDateFormat(\"yyyy-MM-dd\"\
  ); dateFormat.setLenient(false);\n\nregistry.registerCustomEditor(Date.class, new\
  \ CustomDateEditor(\n\ndateFormat, true));\n\n}\n\n}\n\n表单动作准备就绪后，你可以定义第一个视图状态来处理图书条件表单。为了尽快测试你的流程，你可以直接在列表页面中显示搜索结果，而不考虑结果的大小。你在定义文件\
  \ `/WEB-INF/flows/bookSearch/bookSearch.xml` 中定义图书搜索流程。\n\n9799ch15.qxd 5/22/08\
  \ 4:38 PM 第 557 页\n\n第 15 章 **■** S P R I N G W E B F L O W\n\n**557**\n\n<flow\n\
  \n[xsi:schemaLocation=\"http://www.springframework.org/schema/webflow](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<view-state id=\" **bookCriteria**\">\n\n<on-render>\n\n<evaluate expression=\"\
  bookCriteriaAction.setupForm\" />\n\n</on-render>\n\n<transition on=\"search\" to=\"\
  \ **bookList**\">\n\n<evaluate expression=\"bookCriteriaAction.bindAndValidate\"\
  \ />\n\n<evaluate expression=\"bookService.search(bookCriteria)\"\n\nresult=\"flowScope.books\"\
  \ />\n\n</transition>\n\n</view-state>\n\n</flow>\n\n在此视图状态渲染其视图之前，它会调用之前定义的表单动作\
  \ `bookCriteriaAction` 的 `setupForm()` 方法。此方法通过实例化你指定的表单对象类来为此表单准备表单对象。用户提交带有事件\
  \ ID `search` 的表单后，此状态将转换到 `bookList` 状态，显示所有搜索结果。\n\n在转换发生之前，你必须调用表单动作的 `bindAndValidate()`\
  \ 方法，将表单字段值绑定到表单对象的属性，然后使用验证器（如果已注册）验证此对象。接着，你调用后端服务来搜索与绑定条件对象匹配的图书，并将结果存储在流程作用域变量\
  \ `books` 中，以便其他状态可以访问它。流程作用域变量存储在会话中，因此它们必须实现 `Serializable`。\n\n然后，你在与视图状态同名的\
  \ JSP 文件中创建此视图状态的视图，并放在相同位置（即 `/WEB-INF/flows/bookSearch/bookCriteria.jsp`），以便默认加载。\n\
  \n[<%@ taglib prefix=\"form\" uri=\"http://www.springframework.org/tags/form\" %>](http://www.springframework.org/tags/form)\n\
  \n<html>\n\n<head>\n\n<title>图书搜索条件</title>\n\n</head>\n\n<body>\n\n<form:form commandName=\"\
  \ **bookCriteria**\">\n\n<table>\n\n<tr>\n\n<td>关键词</td>\n\n<td><form:input path=\"\
  keyword\" /></td>\n\n</tr>\n\n<tr>\n\n<td>作者</td>\n\n9799ch15.qxd 5/22/08 4:38 PM\
  \ 第 558 页\n\n**558**\n\n第 15 章 **■** S P R I N G W E B F L O W\n\n<td><form:input\
  \ path=\"author\" /></td>\n\n</tr>\n\n<tr>\n\n<td colspan=\"2\">\n\n<input type=\"\
  submit\" name=\" **_eventId_search**\" value=\"搜索\" />\n\n</td>\n\n</tr>\n\n</table>\n\
  \n</form:form>\n\n</body>\n\n</html>\n\n此 JSP 文件包含一个使用 Spring 表单标签定义的表单。它绑定到名为 `bookCriteria`\
  \ 的表单对象，该名称根据表单对象的类名 `BookCriteria` 自动生成。此表单中有一个提交按钮，点击该按钮将触发一个 ID 为 `search` 的事件。\n\
  \n图书搜索流程中的第二个视图状态用于显示搜索结果。它将渲染一个视图，以表格形式列出所有结果，并带有显示图书详细信息的链接。当用户点击其中一个链接时，将触发一个\
  \ `select` 事件，该事件将导致转换到 `bookDetails` 状态，显示图书的详细信息。\n\n<view-state id=\" **bookList**\"\
  >\n\n<transition on=\"select\" to=\" **bookDetails**\">\n\n<evaluate expression=\"\
  bookService.findByIsbn(requestParameters.isbn)\"\n\nresult=\"flowScope.book\" />\n\
  \n</transition>\n\n</view-state>\n\n链接应将图书 ISBN 作为请求参数传递，以便你可以从后端服务找到该图书并将其存储在流程作用域变量\
  \ `book` 中。\n\n此状态的视图应创建在 `/WEB-INF/flows/bookSearch/bookList.jsp` 中，以便默认加载。\n\n\
  <%@ [taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\" %>](http://java.sun.com/jsp/jstl/core)\n\
  \n<%@ [taglib prefix=\"fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\" %>](http://java.sun.com/jsp/jstl/fmt)\n\
  \n<html>\n\n<head>\n\n<title>图书列表</title>\n\n</head>\n\n<body>\n\n<table border=\"\
  1\">\n\n<tr>\n\n<th>ISBN</th>\n\n<th>书名</th>\n\n<th>作者</th>\n\n<th>出版日期</th>\n\n\
  </tr>\n\n9799ch15.qxd 5/22/08 4:38 PM 第 559 页\n\n第 15 章 **■** S P R I N G W E B\
  \ F L O W\n\n**559**\n\n<c:forEach items=\"${books}\" var=\"book\">\n\n<tr>\n\n\
  <td>\n\n<a href=\"${flowExecutionUrl}&_eventId=select&isbn=${book.isbn}\"> ${book.isbn}\n\
  \n</a>\n\n</td>\n\n<td>${book.name}</td>\n\n<td>${book.author}</td>\n\n<td><fmt:formatDate\
  \ value=\"${book.publishDate}\" pattern=\"yyyy-MM-dd\" /></td>\n\n</tr>\n\n</c:forEach>\n\
  \n</table>\n\n</body>\n\n</html>\n\n表格每一行的 ISBN 列都是一个链接，该链接将触发一个 `select` 事件，并将图书\
  \ ISBN 作为请求参数传递。\n\n图书搜索流程中的最后一个视图状态显示所选图书的详细信息。目前它没有到其他状态的转换。\n\n<view-state id=\"\
  \ **bookDetails**\" />\n\n你在此状态的视图创建在 `/WEB-INF/flows/bookSearch/bookDetails.jsp`\
  \ 中，以便默认加载。\n\n<%@ [taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
  \ %>](http://java.sun.com/jsp/jstl/core)\n\n\n\n<%@ [taglib prefix=\"fmt\" uri=\"\
  http://java.sun.com/jsp/jstl/fmt\" %>](http://java.sun.com/jsp/jstl/fmt)\n\n<html>\n\
