  >\n\n<property name=\"tourService\" ref=\"tourService\" />\n\n<property name=\"\
  formView\" value=\"bookingForm\" />\n\n<property name=\"successView\" value=\"bookingSuccess\"\
  \ />\n\n</bean>\n\n</beans>\n\n9799ch14.qxd 5/14/08 4:26 PM Page 535\n\n第 14 章 **■**\
  \ S P R I N G P O RT L E T M V C 框 架\n\n**535**\n\n在此配置文件中，你只需配置一个 `InternalResourceViewResolver`\
  \ bean，将视图名称映射到 `/WEB-INF/jsp/tour/` 目录下的 JSP 文件。同时，你还声明了一个表单控制器实例。由于目前这是该 Portlet\
  \ 中唯一的控制器，你可以使用 `PortletModeHandlerMapping` 将其映射到视图模式。后续若有更多控制器，可考虑通过请求参数来区分它们。\n\
  \n要在 Pluto 中部署此 Portlet，你需要在 `web.xml` 中为该 Portlet 添加一个 `PortletServlet` 实例，并将其映射到对应的\
  \ URL 模式。\n\n<web-app ...>\n\n...\n\n<servlet>\n\n<servlet-name>tour</servlet-name>\n\
  \n<servlet-class>\n\n**org.apache.pluto.core.PortletServlet**\n\n</servlet-class>\n\
  \n<init-param>\n\n<param-name>portlet-name</param-name>\n\n<param-value> **tour**</param-value>\n\
  \n</init-param>\n\n</servlet>\n\n...\n\n<servlet-mapping>\n\n<servlet-name>tour</servlet-name>\n\
  \n<url-pattern> **/PlutoInvoker/tour**</url-pattern>\n\n</servlet-mapping>\n\n</web-app>\n\
  \n启动并登录 Pluto 后，你可以从 Pluto 管理页面将你的 tour Portlet 添加到一个门户页面中。\n\n**验证表单数据**\n\nPortlet\
  \ MVC 中的验证方式与 Web MVC 相同。通过注册一个实现了 `Validator` 接口的验证器，`SimpleFormController` 可以在绑定表单字段值后帮助你验证命令对象。例如，你可以创建以下验证器来验证预订表单：\n\
  \npackage com.apress.springrecipes.travel.tour;\n\nimport org.springframework.validation.Errors;\n\
  \nimport org.springframework.validation.ValidationUtils;\n\nimport org.springframework.validation.Validator;\n\
  \npublic class BookingFormValidator implements Validator {\n\npublic boolean supports(Class\
  \ clazz) {\n\nreturn BookingForm.class.isAssignableFrom(clazz);\n\n}\n\n9799ch14.qxd\
  \ 5/14/08 4:26 PM Page 536\n\n**536**\n\n第 14 章 **■** S P R I N G P O RT L E T M\
  \ V C 框 架\n\npublic void validate(Object target, Errors errors) {\n\nValidationUtils.rejectIfEmptyOrWhitespace(errors,\
  \ \"tourist\",\n\n\"required.tourist\");\n\nValidationUtils.rejectIfEmptyOrWhitespace(errors,\
  \ \"phone\",\n\n\"required.phone\");\n\nValidationUtils.rejectIfEmpty(errors, \"\
  origin\",\n\n\"required.origin\");\n\nValidationUtils.rejectIfEmpty(errors, \"destination\"\
  ,\n\n\"required.destination\");\n\nValidationUtils.rejectIfEmpty(errors, \"departureDate\"\
  ,\n\n\"required.departureDate\");\n\nValidationUtils.rejectIfEmpty(errors, \"returnDate\"\
  ,\n\n\"required.returnDate\");\n\nBookingForm form = (BookingForm) target;\n\nif\
  \ (form.getOrigin().equals(form.getDestination())) {\n\nerrors.rejectValue(\"destination\"\
  , \"invalid.destination\");\n\n}\n\nif (form.getDepartureDate() != null && form.getReturnDate()\
  \ != null\n\n&& !form.getDepartureDate().before(form.getReturnDate())) {\n\nerrors.rejectValue(\"\
  returnDate\", \"invalid.returnDate\");\n\n}\n\n}\n\n}\n\n要将此验证器应用于你的表单控制器，你只需为 `validator`\
  \ 属性创建一个实例，可以将其作为内部 bean 或通过 bean 引用来实现。如果你有多个验证器需要应用于一个表单控制器，可以在 `validators` 属性（数组类型）中配置它们。\n\
  \n<bean id=\"bookingFormController\"\n\nclass=\"com.apress.springrecipes.travel.tour.BookingFormController\"\
  >\n\n...\n\n**<property name=\"validator\">**\n\n**<bean class=\"com.apress.springrecipes.travel.tour.➥**\n\
  \n**BookingFormValidator\" />**\n\n**</property>**\n\n</bean>\n\n\n\n为了在绑定或验证错误时显示用户友好的消息，你需要在类路径根目录下相应语言环境的资源包中定义错误消息（例如，默认语言环境的\
  \ `messages.properties`）。\n\ntypeMismatch.java.util.Date=日期格式无效。\n\nrequired.tourist=游客为必填项。\n\
  \nrequired.phone=电话为必填项。\n\nrequired.origin=出发地为必填项。\n\nrequired.destination=目的地为必填项。\n\
  \nrequired.departureDate=出发日期为必填项。\n\n9799ch14.qxd 5/14/08 4:26 PM 第 537 页\n\n第\
  \ 14 章 **■** S P R I N G P O RT L E T M V C 框 架\n\n**537**\n\nrequired.returnDate=返回日期为必填项。\n\
  \ninvalid.destination=目的地不能与出发地相同。\n\ninvalid.returnDate=返回日期必须晚于出发日期。\n\n最后，你需要在\
  \ Spring 配置文件中为该 Portlet 声明一个 `ResourceBundleMessageSource` Bean，其 Bean 名称必须为 `messageSource`。\n\
  \n<bean id=\"messageSource\"\n\nclass=\"org.springframework.context.support.ResourceBundleMessageSource\"\
  >\n\n<property name=\"basename\" value=\"messages\" />\n\n</bean>\n\n**14-4\\. 使用注解开发\
  \ Portlet 控制器**\n\n问题\n\n在传统的 Portlet MVC 方法中，你必须为每个控制器类配置一个实例和请求映射，而这些控制器类必须实现或继承框架特定的接口或基类。你希望\
  \ Spring 能够自动检测你的控制器类和请求映射，而无需显式配置。\n\n解决方案\n\nSpring 2.5 支持一种新的基于注解的控制器开发方法，既适用于\
  \ Web 控制器，也适用于 Portlet 控制器。Spring 可以通过 `@Controller` 注解自动检测你的控制器类，并且这些类无需实现或继承框架特定的接口或类。此外，Spring\
  \ 可以自动检测 `@RequestMapping` 注解中的请求映射，省去你在 Portlet 配置文件中配置它们的麻烦。而且，使用注解的控制器类和处理器方法在访问上下文资源（如请求参数、模型属性和会话属性）时更加灵活。\n\
  \n工作原理\n\n**开发多动作控制器**\n\n在基于注解的 Portlet MVC 方法中，控制器类可以是任意带有 `@Controller` 注解的类，或者是本身被\
  \ `@Controller` 注解的自定义注解类型。可以在一个控制器中定义一个或多个处理器方法来处理单个或多个动作。\n\n`@RequestMapping`\
  \ 注解可以应用于类级别或方法级别。Portlet 的常见映射策略是将 Portlet 模式映射到控制器类，并将请求参数映射到每个处理器方法。例如，你可以将用于列出航班和显示航班详情的控制器组合到一个多动作控制器中。\n\
  \npackage com.apress.springrecipes.travel.flight;\n\nimport javax.portlet.PortletPreferences;\n\
  \n9799ch14.qxd 5/14/08 4:26 PM 第 538 页\n\n**538**\n\n第 14 章 **■** S P R I N G P\
  \ O RT L E T M V C 框 架\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.stereotype.Controller;\n\nimport org.springframework.ui.ModelMap;\n\
  \nimport org.springframework.web.bind.annotation.ModelAttribute;\n\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  \nimport org.springframework.web.bind.annotation.RequestParam;\n\n**@Controller**\n\
  \n**@RequestMapping(\"VIEW\")**\n\npublic class FlightViewController {\n\nprivate\
  \ FlightService flightService;\n\n**@Autowired**\n\npublic FlightViewController(FlightService\
  \ flightService) {\n\nthis.flightService = flightService;\n\n}\n\n**@ModelAttribute(\"\
  timeZone\")**\n\npublic String getTimeZone(PortletPreferences preferences) {\n\n\
  return preferences.getValue(\"timeZone\", null);\n\n}\n\n**@RequestMapping**\n\n\
  public String flightList(ModelMap model) {\n\nmodel.addAttribute(\"flights\", flightService.findTodayFlights());\
  \ return \"flightList\";\n\n}\n\n**@RequestMapping(params = \"action=flightDetail\"\
  )**\n\npublic String flightDetail(\n\n**@RequestParam(\"flightNo\")** String flightNo,\
  \ ModelMap model) {\n\n\n\nmodel.addAttribute(\"flight\", flightService.findFlight(flightNo));\
  \ return \"flightDetail\";\n\n}\n\n}\n\n该控制器在类级别映射到视图模式，因此其处理方法仅处理视图模式请求。flightList()\
  \ 方法使用了\n\n@RequestMapping 注解，该注解没有指定值或属性，因此它将处理默认的视图模式请求。\n\nflightDetail() 方法将处理带有\
  \ action 参数且参数值为 flightDetail 的视图模式请求。\n\n控制器也可以配置为同时处理渲染请求和动作请求。\n\n例如，你可以重新实现用于更改航班\
  \ Portlet 中 Portlet 首选项的控制器。\n\n9799ch14.qxd 5/14/08 4:26 PM 第 539 页\n\n第 14 章 **■**\
  \ S P R I N G P O RT L E T M V C 框 架\n\n**539**\n\npackage com.apress.springrecipes.travel.flight;\n\
  \nimport javax.portlet.PortletPreferences;\n\nimport org.springframework.stereotype.Controller;\n\
  \nimport org.springframework.ui.ModelMap;\n\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  \nimport org.springframework.web.bind.annotation.RequestParam;\n\n**@Controller**\n\
  \n**@RequestMapping(\"EDIT\")**\n\npublic class FlightPreferencesController {\n\n\
  **@RequestMapping**\n\npublic String showPreferences(PortletPreferences preferences,\
  \ ModelMap model) {\n\nmodel.addAttribute(\"timeZone\", preferences.getValue(\"\
  timeZone\", null)); return \"flightPreferences\";\n\n}\n\n**@RequestMapping**\n\n\
  public void changePreference(PortletPreferences preferences,\n\n**@RequestParam(\"\
  timeZone\")** String timeZone) throws Exception {\n\npreferences.setValue(\"timeZone\"\
  , timeZone);\n\npreferences.store();\n\n}\n\n}\n\n该控制器映射到编辑模式，因此其方法仅处理编辑模式请求。showPreferences()\
  \ 和 changePreference() 方法都使用了\n\n@RequestMapping 注解，该注解没有指定值或属性。在这种情况下，返回类型为 void\
  \ 的方法将处理动作请求。否则，它将处理渲染请求。\n\n最后，你还可以重新实现用于在航班 Portlet 中显示帮助信息的控制器。\n\npackage com.apress.springrecipes.travel.flight;\n\
