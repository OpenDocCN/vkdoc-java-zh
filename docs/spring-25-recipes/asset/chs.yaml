  \njava.naming.provider.url=ejbd://localhost:4201\n\n</jee:environment>\n\n</jee:jndi-lookup>\n\
  \n...\n\n</beans>\n\n**17-4. 使用 Spring 发送和接收 JMS 消息**\n\n问题\n\n在 Java EE 平台中，应用程序通常需要使用\
  \ JMS 进行通信。然而，要发送或接收一条 JMS 消息，你必须执行以下任务：\n\n• 在消息代理上创建一个 JMS 连接工厂。\n\n• 创建一个 JMS\
  \ 目的地，可以是队列或主题。\n\n• 从连接工厂打开一个 JMS 连接。\n\n• 从连接中获取一个 JMS 会话。\n\n• 使用消息生产者/消费者发送/接收\
  \ JMS 消息。\n\n• 处理 `JMSException`，这是一个必须处理的受检异常。\n\n• 关闭 JMS 会话和连接。\n\n如你所见，发送或接收一条简单的\
  \ JMS 消息需要大量的编码。实际上，这些任务大部分都是样板代码，每次处理 JMS 时都需要重复执行。\n\n解决方案\n\nSpring 提供了一种基于模板的解决方案来简化你的\
  \ JMS 代码。使用 JMS 模板，你可以用更少的代码发送和接收 JMS 消息。该模板为你处理\n\n9799ch17.qxd 5/15/08 5:06 PM\
  \ 第 641 页\n\n第 17 章 **■** SPRING 对 EJB 和 JMS 的支持\n\n**641**\n\n样板任务，并将 JMS API 的\
  \ `JMSException` 层次结构转换为 Spring 的运行时异常 `org.springframework.jms.JmsException` 层次结构。\n\
  \n在 JMS 1.0.2 中，主题和队列被称为域，并使用完全不同的 API 进行处理。然而，JMS 1.1 提供了一个独立于域的 API，将主题和队列视为备选的消息目的地。为了处理不同的\
  \ JMS API，Spring 为这两个 JMS 版本提供了两个 JMS 模板类：`JmsTemplate` 和 `JmsTemplate102`。在本章中，我将重点介绍\
  \ JMS 1.1，它适用于 Java EE 1.4 及更高版本。\n\n工作原理\n\n假设你正在开发一个邮局系统，该系统包含两个子系统：前台子系统和后台子系统。当前台收到市民的邮件时，它会将邮件传递给后台进行分类和投递。同时，前台子系统会向后台子系统发送一条\
  \ JMS 消息，通知它有新邮件。\n\n邮件信息由以下类表示：\n\npackage com.apress.springrecipes.post;\n\npublic\
  \ class Mail {\n\nprivate String mailId;\n\nprivate String country;\n\nprivate double\
  \ weight;\n\n// 构造方法、Getter 和 Setter\n\n...\n\n}\n\n发送和接收邮件信息的方法定义在 `FrontDesk`\
  \ 和 `BackOffice` 接口中，如下所示：\n\npackage com.apress.springrecipes.post;\n\npublic interface\
  \ FrontDesk {\n\npublic void sendMail(Mail mail);\n\n}\n\npackage com.apress.springrecipes.post;\n\
  \npublic interface BackOffice {\n\npublic Mail receiveMail();\n\n}\n\n在发送和接收 JMS\
  \ 消息之前，你需要安装一个 JMS 消息代理。为简单起见，我选择了 Apache ActiveMQ ([`activemq.apache.org`](http://activemq.apache.org)/)\
  \ 作为我的消息代理，它非常易于安装和配置。ActiveMQ 是一个开源消息代理，完全支持 JMS 1.1。\n\n9799ch17.qxd 5/15/08 5:06\
  \ PM 第 642 页\n\n**642**\n\n第 17 章 **■** SPRING 对 EJB 和 JMS 的支持\n\n**■注意** 你可以从 ActiveMQ\
  \ 网站下载 ActiveMQ（例如 v5.0.0），并将其解压到你选择的目录中以完成安装。\n\n**在没有 Spring 支持的情况下发送和接收消息**\n\
  \n首先，让我们看看如何在没有 Spring 支持的情况下发送和接收 JMS 消息。下面的 `FrontDeskImpl` 类直接使用 JMS API 发送 JMS\
  \ 消息。\n\n**■注意** 要向/从 JMS 消息代理发送/接收 JMS 消息，你必须将消息代理的库包含在你的类路径中。对于 ActiveMQ 5.0.0，它是\
  \ `activemq-all-5.0.0.jar`（位于 ActiveMQ 安装目录的根目录下）。\n\npackage com.apress.springrecipes.post;\n\
  \nimport javax.jms.Connection;\n\nimport javax.jms.ConnectionFactory;\n\nimport\
  \ javax.jms.Destination;\n\nimport javax.jms.JMSException;\n\nimport javax.jms.MapMessage;\n\
  \nimport javax.jms.MessageProducer;\n\nimport javax.jms.Session;\n\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
  \nimport org.apache.activemq.command.ActiveMQQueue;\n\npublic class FrontDeskImpl\
  \ implements FrontDesk {\n\npublic void sendMail(Mail mail) {\n\nConnectionFactory\
  \ cf =\n\nnew ActiveMQConnectionFactory(\" tcp://localhost:61616\"); Destination\
  \ destination = new ActiveMQQueue(\"mail.queue\");\n\nConnection conn = null;\n\n\
  try {\n\nconn = cf.createConnection();\n\nSession session =\n\nconn.createSession(false,\
  \ Session.AUTO_ACKNOWLEDGE);\n\nMessageProducer producer = session.createProducer(destination);\n\
  \nMapMessage message = session.createMapMessage();\n\nmessage.setString(\"mailId\"\
  , mail.getMailId());\n\nmessage.setString(\"country\", mail.getCountry());\n\n9799ch17.qxd\
  \ 5/15/08 5:06 PM 第 643 页\n\n第 17 章 **■** SPRING 对 EJB 和 JMS 的支持\n\n**643**\n\n\
  message.setDouble(\"weight\", mail.getWeight());\n\nproducer.send(message);\n\n\
  session.close();\n\n} catch (JMSException e) {\n\nthrow new RuntimeException(e);\n\
  \n} finally {\n\nif (conn != null) {\n\ntry {\n\nconn.close();\n\n} catch (JMSException\
  \ e) {\n\n}\n\n}\n\n}\n\n}\n\n}\n\n在上述 `sendMail()` 方法中，你首先使用 ActiveMQ 提供的类创建了 JMS\
  \ 特定的 `ConnectionFactory` 和 `Destination` 对象。如果你在本地主机上运行 ActiveMQ，消息代理 URL 是其默认值。在\
  \ JMS 中，有两种类型的目的地：队列和主题。*队列* 用于点对点通信模型，而 *主题* 用于发布-订阅通信模型。由于你正在从前台到后台进行点对点的 JMS\
  \ 消息发送，你应该使用消息队列。你可以使用 `ActiveMQTopic` 类轻松创建一个主题作为目的地。\n\n\n\n接下来，你需要创建连接、会话和消息生产者，然后才能发送消息。JMS\
  \ API 中定义了多种消息类型，包括 TextMessage、MapMessage、BytesMessage、ObjectMessage 和 StreamMessage。MapMessage\
  \ 以键/值对的形式包含消息内容，类似于映射。同时，你必须处理 JMS API 可能抛出的 JMSException。最后，务必记得关闭会话和连接以释放系统资源。每次关闭\
  \ JMS 连接时，其所有已打开的会话都会自动关闭。因此，你只需确保在 finally 块中正确关闭 JMS 连接即可。\n\n另一方面，以下 BackOfficeImpl\
  \ 类直接使用 JMS API 接收 JMS 消息：\n\npackage com.apress.springrecipes.post;\n\nimport javax.jms.Connection;\n\
  \nimport javax.jms.ConnectionFactory;\n\nimport javax.jms.Destination;\n\nimport\
  \ javax.jms.JMSException;\n\nimport javax.jms.MapMessage;\n\nimport javax.jms.MessageConsumer;\n\
  \nimport javax.jms.Session;\n\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
  \nimport org.apache.activemq.command.ActiveMQQueue;\n\n9799ch17.qxd 5/15/08 5:06\
  \ PM Page 644\n\n**644**\n\n第 17 章 **■** SPRING 对 EJB 和 JMS 的支持\n\npublic class\
  \ BackOfficeImpl implements BackOffice {\n\npublic Mail receiveMail() {\n\nConnectionFactory\
  \ cf =\n\nnew ActiveMQConnectionFactory(\" tcp://localhost:61616\"); Destination\
  \ destination = new ActiveMQQueue(\"mail.queue\");\n\nConnection conn = null;\n\n\
  try {\n\nconn = cf.createConnection();\n\nSession session =\n\nconn.createSession(false,\
  \ Session.AUTO_ACKNOWLEDGE);\n\nMessageConsumer consumer = session.createConsumer(destination);\n\
  \nconn.start();\n\nMapMessage message = (MapMessage) consumer.receive();\n\nMail\
  \ mail = new Mail();\n\nmail.setMailId(message.getString(\"mailId\"));\n\nmail.setCountry(message.getString(\"\
  country\"));\n\nmail.setWeight(message.getDouble(\"weight\"));\n\nsession.close();\n\
  \nreturn mail;\n\n} catch (JMSException e) {\n\nthrow new RuntimeException(e);\n\
  \n} finally {\n\nif (conn != null) {\n\ntry {\n\nconn.close();\n\n} catch (JMSException\
  \ e) {\n\n}\n\n}\n\n}\n\n}\n\n}\n\n此方法中的大部分代码与发送 JMS 消息的代码类似，区别在于你创建了一个消息消费者，并从中接收\
  \ JMS 消息。\n\n最后，你在类路径的根目录下创建两个 bean 配置文件——一个用于前台子系统（例如 beans-front.xml），另一个用于后台子系统（例如\
  \ beans-back.xml）。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n9799ch17.qxd 5/15/08 5:06 PM Page 645\n\n第 17 章 **■** SPRING 对 EJB 和 JMS\
  \ 的支持\n\n**645**\n\n<bean id=\"frontDesk\"\n\nclass=\"com.apress.springrecipes.post.FrontDeskImpl\"\
  \ />\n\n</beans>\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n<bean id=\"backOffice\"\n\nclass=\"com.apress.springrecipes.post.BackOfficeImpl\"\
  \ />\n\n</beans>\n\n现在，你的前台和后台子系统已准备好发送和接收 JMS 消息。在发送和接收消息之前，你必须使用以下主类启动消息代理。\n\n\
  \n\n**■注意** 要启动 ActiveMQ，你只需根据操作系统执行 ActiveMQ 的启动脚本之一（位于 bin 目录下）。\n\npackage com.apress.springrecipes.post;\n\
  \nimport org.springframework.context.ApplicationContext;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class FrontDeskMain {\n\npublic static void main(String[] args) {\n\nApplicationContext\
  \ context =\n\nnew ClassPathXmlApplicationContext(\"beans-front.xml\");\n\nFrontDesk\
  \ frontDesk = (FrontDesk) context.getBean(\"frontDesk\");\n\nfrontDesk.sendMail(new\
  \ Mail(\"1234\", \"US\", 1.5));\n\n}\n\n}\n\npackage com.apress.springrecipes.post;\n\
  \nimport org.springframework.context.ApplicationContext;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class BackOfficeMain {\n\n9799ch17.qxd 5/15/08 5:06 PM Page 646\n\n**646**\n\
  \n第 17 章 **■** SPRING 对 EJB 和 JMS 的支持\n\npublic static void main(String[] args)\
  \ {\n\nApplicationContext context =\n\nnew ClassPathXmlApplicationContext(\"beans-back.xml\"\
  );\n\nBackOffice backOffice = (BackOffice) context.getBean(\"backOffice\"); Mail\
  \ mail = backOffice.receiveMail();\n\nSystem.out.println(\"邮件 #\" + mail.getMailId()\
  \ + \" 已接收\");\n\n}\n\n}\n\n**使用 Spring 的 JMS 模板发送和接收消息**\n\nSpring 提供了一个 JMS 模板，可以显著简化你的\
  \ JMS 代码。要使用此模板发送 JMS 消息，你只需调用 `send()` 方法，并提供消息目的地以及一个 `MessageCreator` 对象，该对象用于创建你要发送的\
  \ JMS 消息。`MessageCreator` 对象通常实现为匿名内部类。\n\npackage com.apress.springrecipes.post;\n\
  \nimport javax.jms.Destination;\n\nimport javax.jms.JMSException;\n\nimport javax.jms.MapMessage;\n\
  \nimport javax.jms.Message;\n\nimport javax.jms.Session;\n\nimport org.springframework.jms.core.JmsTemplate;\n\
  \nimport org.springframework.jms.core.MessageCreator;\n\npublic class FrontDeskImpl\
  \ implements FrontDesk {\n\nprivate JmsTemplate jmsTemplate;\n\nprivate Destination\
  \ destination;\n\npublic void setJmsTemplate(JmsTemplate jmsTemplate) {\n\nthis.jmsTemplate\
  \ = jmsTemplate;\n\n}\n\npublic void setDestination(Destination destination) {\n\
  \nthis.destination = destination;\n\n}\n\npublic void sendMail(**final** Mail mail)\
  \ {\n\njmsTemplate.send(destination, new MessageCreator() {\n\npublic Message createMessage(Session\
  \ session) throws JMSException {\n\nMapMessage message = session.createMapMessage();\n\
  \nmessage.setString(\"mailId\", mail.getMailId());\n\n9799ch17.qxd 5/15/08 5:06\
  \ PM Page 647\n\n第 17 章 **■** SPRING 对 EJB 和 JMS 的支持\n\n**647**\n\nmessage.setString(\"\
  country\", mail.getCountry());\n\nmessage.setDouble(\"weight\", mail.getWeight());\n\
  \nreturn message;\n\n}\n\n});\n\n}\n\n}\n\n请注意，内部类只能访问声明为 `final` 的外部方法参数或变量。`MessageCreator`\
  \ 接口只声明了一个 `createMessage()` 方法供你实现。在此方法中，你使用提供的 JMS 会话创建并返回你的 JMS 消息。\n\nJMS 模板帮助你获取和释放\
  \ JMS 连接和会话，并发送由你的 `MessageCreator` 对象创建的 JMS 消息。此外，它还将 JMS API 的 `JMSException`\
  \ 层次结构转换为 Spring 的 JMS 运行时异常层次结构，其基类异常为 `org.springframework.jms.JmsException`。\n\
  \n在前台子系统的 Bean 配置文件中，你声明了一个 JMS 模板，该模板引用了用于打开连接的 JMS 连接工厂。然后，你将此模板以及消息目的地注入到你的前台\
  \ Bean 中。\n\n<beans ...>\n\n<bean id=\"connectionFactory\"\n\nclass=\"org.apache.activemq.ActiveMQConnectionFactory\"\
  >\n\n<property name=\"brokerURL\" value=\" tcp://localhost:61616\" />\n\n</bean>\n\
  \n<bean id=\"mailDestination\"\n\nclass=\"org.apache.activemq.command.ActiveMQQueue\"\
  >\n\n<constructor-arg value=\"mail.queue\" />\n\n</bean>\n\n<bean id=\"jmsTemplate\"\
  \n\nclass=\"org.springframework.jms.core.JmsTemplate\">\n\n<property name=\"connectionFactory\"\
  \ ref=\"connectionFactory\" />\n\n</bean>\n\n<bean id=\"frontDesk\"\n\nclass=\"\
  com.apress.springrecipes.post.FrontDeskImpl\">\n\n\n\n<property name=\"destination\"\
  \ ref=\"mailDestination\" />\n\n<property name=\"jmsTemplate\" ref=\"jmsTemplate\"\
  \ />\n\n</bean>\n\n</beans>\n\n要使用 JMS 模板接收 JMS 消息，你需要调用 `receive()` 方法并提供消息目的地。该方法返回一个\
  \ JMS 消息，其类型为基础 JMS 消息类型 `java.jms.Message`，因此在进一步处理之前，你必须将其转换为适当的类型。\n\n9799ch17.qxd\
  \ 5/15/08 5:06 PM 第 648 页\n\n**648**\n\n第 17 章 **■** S P R I N G 对 E J B 和 J M S\
  \ 的 支 持\n\npackage com.apress.springrecipes.post;\n\nimport javax.jms.Destination;\n\
  \nimport javax.jms.JMSException;\n\nimport javax.jms.MapMessage;\n\nimport org.springframework.jms.core.JmsTemplate;\n\
  \nimport org.springframework.jms.support.JmsUtils;\n\npublic class BackOfficeImpl\
  \ implements BackOffice {\n\nprivate JmsTemplate jmsTemplate;\n\nprivate Destination\
  \ destination;\n\npublic void setJmsTemplate(JmsTemplate jmsTemplate) {\n\nthis.jmsTemplate\
  \ = jmsTemplate;\n\n}\n\npublic void setDestination(Destination destination) {\n\
  \nthis.destination = destination;\n\n}\n\npublic Mail receiveMail() {\n\nMapMessage\
  \ message = (MapMessage) jmsTemplate.receive(destination);\n\ntry {\n\nif (message\
  \ == null) {\n\nreturn null;\n\n}\n\nMail mail = new Mail();\n\nmail.setMailId(message.getString(\"\
  mailId\"));\n\nmail.setCountry(message.getString(\"country\"));\n\nmail.setWeight(message.getDouble(\"\
  weight\"));\n\nreturn mail;\n\n} catch (JMSException e) {\n\nthrow JmsUtils.convertJmsAccessException(e);\n\
  \n}\n\n}\n\n}\n\n然而，在从接收到的 `MapMessage` 对象中提取信息时，你仍然需要处理 JMS API 的 `JMSException`。为了使该方法抛出的异常类型保持一致，你必须调用\
  \ `JmsUtils.convertJmsAccessException()` 将 JMS API 的 `JMSException` 转换为 Spring 的\
  \ `JmsException`。\n\n在后端子系统的 Bean 配置文件中，你声明了一个 JMS 模板，并将其与消息目的地一起注入到你的后台办公室 Bean\
  \ 中。\n\n9799ch17.qxd 5/15/08 5:06 PM 第 649 页\n\n第 17 章 **■** S P R I N G 对 E J B\
  \ 和 J M S 的 支 持\n\n**649**\n\n<beans ...>\n\n<bean id=\"connectionFactory\"\n\n\
  class=\"org.apache.activemq.ActiveMQConnectionFactory\">\n\n<property name=\"brokerURL\"\
  \ value=\" tcp://localhost:61616\" />\n\n</bean>\n\n<bean id=\"mailDestination\"\
  \n\nclass=\"org.apache.activemq.command.ActiveMQQueue\">\n\n<constructor-arg value=\"\
