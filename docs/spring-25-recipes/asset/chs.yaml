  **14-3\\. 使用简单表单控制器处理 Portlet 表单**\n\n问题\n\n在 Portlet 应用程序中，你有时需要处理表单。为了使控制器能够处理表单，它必须向用户呈现表单视图，并处理表单提交。\n\
  \n如果你从头开始构建表单控制器，将会涉及过多的表单处理细节。\n\n解决方案\n\nSpring Portlet MVC 提供了一个 `SimpleFormController`\
  \ 类，它与 Spring Web MVC 中的非常相似。它也支持命令对象，并能够将表单字段值绑定到同名的命令对象属性上。通过扩展 `SimpleFormController`，你的控制器将继承处理表单的能力。\n\
  \n当 `SimpleFormController` 被 Portlet 渲染请求要求显示表单时，它会向用户呈现表单视图。随后，当表单通过 Portlet 动作请求提交时，`SimpleFormController`\
  \ 会将表单字段值绑定到命令对象，然后使用其验证器验证该对象。如果没有发生错误，它将调用 `onSubmitAction()` 方法。\n\n动作请求完成后，`SimpleFormController`\
  \ 将被要求处理一个渲染请求。如果表单已成功处理，它将向用户呈现成功视图。否则，它将再次呈现带有错误的表单视图。\n\n工作原理\n\n假设你将创建一个 Portlet，供用户通过你的旅游门户预订行程。\n\
  \n首先，定义以下 `BookingForm` 领域类，其实例将用作表单命令对象。由于命令对象可能会在会话中持久化，因此该类应实现 `Serializable`\
  \ 接口。\n\n9799ch14.qxd 5/14/08 4:26 PM 第 530 页\n\n**530**\n\n第 14 章 **■** S P R I\
  \ N G P O RT L E T M V C 框架\n\npackage com.apress.springrecipes.travel.tour;\n\n\
