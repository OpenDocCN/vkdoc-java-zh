  \ {\n\nreturn sequences.get(sequenceId);\n\n}\n\npublic synchronized int getNextValue(String\
  \ sequenceId) {\n\nint value = values.get(sequenceId);\n\nvalues.put(sequenceId,\
  \ value + 1);\n\nreturn value;\n\n}\n\n}\n\n你还需要一个作为外观的服务对象，来提供序列生成服务。在内部，该服务对象将与\
  \ DAO 交互以处理序列生成请求。因此，它需要一个对 DAO 的引用。\n\npackage com.apress.springrecipes.sequence;\n\
  \npublic class SequenceService {\n\nprivate SequenceDao sequenceDao;\n\npublic void\
  \ setSequenceDao(SequenceDao sequenceDao) {\n\nthis.sequenceDao = sequenceDao;\n\
  \n}\n\npublic String generate(String sequenceId) {\n\nSequence sequence = sequenceDao.getSequence(sequenceId);\n\
  \n\n\nint value = sequenceDao.getNextValue(sequenceId);\n\nreturn sequence.getPrefix()\
  \ + value + sequence.getSuffix();\n\n}\n\n}\n\n最后，你需要在 Bean 配置文件中配置这些组件，以使序列生成器应用程序能够运行。你可以通过自动装配组件来减少配置量。\n\
