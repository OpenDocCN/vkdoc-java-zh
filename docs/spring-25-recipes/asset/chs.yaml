  \n问题\n\n许多实际组件在准备使用之前，必须执行某些类型的初始化任务。这些任务包括打开文件、建立网络/数据库连接、分配内存等。此外，它们还需要在生命周期结束时执行相应的销毁任务。因此，你需要在\
  \ Spring IoC 容器中自定义 Bean 的初始化和销毁。\n\n9799ch04.qxd 4/10/08 10:53 AM 第 109 页\n\n第\
  \ 4 章 **■** 高级 Spring IoC 容器\n\n**109**\n\n解决方案\n\n除了 Bean 注册之外，Spring IoC 容器还负责管理\
  \ Bean 的生命周期，并允许你在其生命周期的特定时间点执行自定义任务。你的任务应封装在回调方法中，供 Spring IoC 容器在适当的时候调用。\n\n\
  以下列表展示了 Spring IoC 容器管理 Bean 生命周期的步骤。随着 IoC 容器更多特性的引入，此列表将逐步扩展。\n\n**1.** 通过构造函数或工厂方法创建\
  \ Bean 实例。  \n**2.** 为 Bean 属性设置值和 Bean 引用。  \n**3. 调用初始化回调方法。**  \n**4.** Bean\
  \ 已准备好可供使用。  \n**5. 当容器关闭时，调用销毁回调方法。**\n\nSpring 有三种方式可以识别你的初始化和销毁回调方法。首先，你的 Bean\
  \ 可以实现 `InitializingBean` 和 `DisposableBean` 生命周期接口，并实现 `afterPropertiesSet()` 和\
  \ `destroy()` 方法用于初始化和销毁。其次，你可以在 Bean 声明中设置 `init-method` 和 `destroy-method` 属性，并指定回调方法名称。在\
  \ Spring 2.5 中，你还可以使用生命周期注解 `@PostConstruct` 和 `@PreDestroy` 来标注初始化和销毁回调方法，这些注解定义在\
  \ JSR-250：Java 平台通用注解中。然后，你可以在 IoC 容器中注册一个 `CommonAnnotationBeanPostProcessor` 实例来调用这些回调方法。\n\
  \n工作原理\n\n为了理解 Spring IoC 容器如何管理 Bean 的生命周期，我们来看一个涉及结账功能的示例。以下 `Cashier` 类可用于结账购物车中的商品。它将每次结账的时间和金额记录在一个文本文件中。\n\
  \n```java\npackage com.apress.springrecipes.shop;\n\n...\n\npublic class Cashier\
  \ {\n\n    private String name;\n    private String path;\n    private BufferedWriter\
  \ writer;\n\n    public void setName(String name) {\n        this.name = name;\n\
  \    }\n\n9799ch04.qxd 4/10/08 10:53 AM 第 110 页\n\n**110**\n\n第 4 章 **■** 高级 Spring\
  \ IoC 容器\n\n    public void setPath(String path) {\n        this.path = path;\n\
  \    }\n\n    public void openFile() throws IOException {\n        File logFile\
  \ = new File(path, name + \".txt\");\n        writer = new BufferedWriter(new OutputStreamWriter(\n\
  \            new FileOutputStream(logFile, true)));\n    }\n\n    public void checkout(ShoppingCart\
  \ cart) throws IOException {\n        double total = 0;\n        for (Product product\
  \ : cart.getItems()) {\n            total += product.getPrice();\n        }\n  \
  \      writer.write(new Date() + \"\\t\" + total + \"\\r\\n\");\n        writer.flush();\n\
  \    }\n\n    public void closeFile() throws IOException {\n        writer.close();\n\
  \    }\n}\n```\n\n在 `Cashier` 类中，`openFile()` 方法以收银员名称作为文件名，在指定的系统路径中打开文本文件。每次调用\
  \ `checkout()` 方法时，都会在文本文件中追加一条结账记录。最后，`closeFile()` 方法关闭文件以释放系统资源。\n\n然后，你在 IoC\
  \ 容器中声明一个名为 `cashier1` 的收银员 Bean。该收银员的结账记录将记录在文件 `c:/cashier/cashier1.txt` 中。你需要提前创建此目录，或指定另一个已存在的目录。\n\
  \n```xml\n<beans ...>\n    ...\n    <bean id=\"cashier1\" class=\"com.apress.springrecipes.shop.Cashier\"\
  >\n        <property name=\"name\" value=\"cashier1\" />\n        <property name=\"\
  path\" value=\"c:/cashier\" />\n    </bean>\n</beans>\n```\n\n\n\n</bean>\n\n</beans>\n\
  \n然而，在 Main 类中，如果你尝试使用此收银员结账购物车，将会导致 `NullPointerException`。出现此异常的原因是，没有人事先调用 `openFile()`\
  \ 方法进行初始化。\n\n```java\npackage com.apress.springrecipes.shop;\n\nimport org.springframework.context.ApplicationContext;\n\
  \nimport org.springframework.context.support.FileSystemXmlApplicationContext;\n\n\
  9799ch04.qxd 4/10/08 10:53 AM Page 111\n\nC H A P T E R 4 **■** A D VA N C E D S\
