  \n**图 5-4.** *使用代理实现验证和日志记录关注点* **5-3. 使用经典 Spring 通知模块化横切关注点**\n\n问题\n\n由于横切关注点通常难以通过传统的面向对象方法进行模块化，你希望寻求另一种方法来实现模块化。动态代理有助于模块化横切关注点，但要求应用程序开发者编写如此底层的代理代码过于苛刻。\n\
  \n9799ch05.qxd 4/14/08 10:59 AM 第 151 页\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\n**151**\n\
  \n解决方案\n\nAOP 为应用程序开发者定义了一组高级概念，用于表达其横切关注点。首先，在特定执行点执行的横切操作被封装在*通知*中。例如，你可以将日志记录和验证操作封装在一个或多个通知中。\n\
  \n经典 Spring AOP 支持四种类型的通知，每种通知在执行点的不同时机生效。在正式的 AOP 定义中，执行点有多种类型，包括方法执行、构造函数执行和字段访问。然而，Spring\
  \ AOP 仅支持方法执行。因此，四种经典通知类型的定义可以缩小为以下内容：\n\n• *前置通知*：在方法执行之前\n\n• *返回后通知*：在方法返回结果之后\n\
  \n• *异常后通知*：在方法抛出异常之后\n\n• *环绕通知*：在方法执行前后\n\n使用经典 Spring AOP 方法时，通过实现专有的通知接口来编写通知。\n\
  \n工作原理\n\nSpring AOP 的目标仅在于处理其 IoC 容器中声明的 Bean 的横切关注点。因此，在使用 Spring AOP 模块化横切关注点之前，你必须将计算器应用程序迁移到\
  \ Spring IoC 容器中运行。你只需在 Spring 的 Bean 配置文件中声明两个计算器。\n\n<beans\n\n[xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<bean id=\"arithmeticCalculator\"\n\nclass=\"com.apress.springrecipes.calculator.ArithmeticCalculatorImpl\"\
  \ />\n\n<bean id=\"unitCalculator\"\n\nclass=\"com.apress.springrecipes.calculator.UnitCalculatorImpl\"\
  \ />\n\n</beans>\n\n然后修改 `Main` 类，改为从 IoC 容器中获取计算器实例。\n\npackage com.apress.springrecipes.calculator;\n\
  \nimport org.springframework.context.ApplicationContext;\n\n\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class Main {\n\n9799ch05.qxd 4/14/08 10:59 AM Page 152\n\n**152**\n\n第\
  \ 5 章 **■** 动态代理与经典 Spring AOP\n\npublic static void main(String[] args) {\n\nApplicationContext\
  \ context =\n\nnew ClassPathXmlApplicationContext(\"beans.xml\");\n\nArithmeticCalculator\
  \ arithmeticCalculator =\n\n(ArithmeticCalculator) context.getBean(\"arithmeticCalculator\"\
  );\n\n...\n\nUnitCalculator unitCalculator =\n\n(UnitCalculator) context.getBean(\"\
  unitCalculator\");\n\n...\n\n}\n\n}\n\n**前置通知**\n\n*前置*通知在方法执行之前生效。它通过实现 `MethodBeforeAdvice`\
  \ 接口来创建。在 `before()` 方法中，你可以访问方法的详细信息以及参数。\n\npackage com.apress.springrecipes.calculator;\n\
  \nimport java.lang.reflect.Method;\n\nimport java.util.Arrays;\n\nimport org.apache.commons.logging.Log;\n\
  \nimport org.apache.commons.logging.LogFactory;\n\nimport org.springframework.aop.MethodBeforeAdvice;\n\
  \npublic class LoggingBeforeAdvice implements MethodBeforeAdvice {\n\nprivate Log\
  \ log = LogFactory.getLog(this.getClass());\n\npublic void before(Method method,\
  \ Object[] args, Object target)\n\nthrows Throwable {\n\nlog.info(\"方法 \" + method.getName()\
  \ + \"() 以参数 \"\n\n+ Arrays.toString(args) + \" 开始执行\");\n\n}\n\n}\n\n**■提示** 通知的概念类似于使用动态代理时的调用处理器。\n\
  \n准备好这个通知后，下一步就是将其应用到你的计算器 Bean 上。首先，你需要在 IoC 容器中声明该通知的一个实例。然后，最关键的一步是为每个计算器 Bean\
  \ 创建一个代理来应用此通知。在 Spring AOP 中，代理的创建是通过一个名为 `ProxyFactoryBean` 的工厂 Bean 来完成的。\n\n\
  <beans ...>\n\n...\n\n**<bean id=\"loggingBeforeAdvice\"**\n\n**class=\"com.apress.springrecipes.calculator.LoggingBeforeAdvice\"\
  \ />**\n\n<bean id=\"arithmeticCalculatorProxy\"\n\nclass=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n\n<property name=\"proxyInterfaces\">\n\n<list>\n\n<value>\n\ncom.apress.springrecipes.calculator.ArithmeticCalculator\n\
  \n</value>\n\n</list>\n\n</property>\n\n<property name=\"target\" ref=\"arithmeticCalculator\"\
  \ />\n\n<property name=\"interceptorNames\">\n\n<list>\n\n<value> **loggingBeforeAdvice**</value>\n\
  \n</list>\n\n</property>\n\n</bean>\n\n<bean id=\"unitCalculatorProxy\"\n\nclass=\"\
  org.springframework.aop.framework.ProxyFactoryBean\">\n\n<property name=\"proxyInterfaces\"\
  >\n\n<list>\n\n<value>\n\ncom.apress.springrecipes.calculator.UnitCalculator\n\n\
  </value>\n\n</list>\n\n</property>\n\n<property name=\"target\" ref=\"unitCalculator\"\
  \ />\n\n<property name=\"interceptorNames\">\n\n<list>\n\n<value> **loggingBeforeAdvice**</value>\n\
  \n</list>\n\n</property>\n\n</bean>\n\n</beans>\n\n**■提示** 使用 `ProxyFactoryBean`\
  \ 创建代理类似于使用动态代理时编写代理创建代码。\n\n9799ch05.qxd 4/14/08 10:59 AM Page 154\n\n**154**\n\
  \n第 5 章 **■** 动态代理与经典 Spring AOP\n\n在上述 Bean 配置中，你为代理提供了需要实现的接口。只有对这些接口中声明的方法的调用才会经过代理。目标对象是实际处理方法调用的对象。在\
  \ `interceptorNames` 属性中，你可以为此代理指定一个通知名称列表。这些通知将按照其定义的顺序分配优先级。有了所有这些信息，`ProxyFactoryBean`\
  \ 就能为目标对象创建代理，并将其注册到 IoC 容器中。\n\n默认情况下，`ProxyFactoryBean` 可以自动检测目标 Bean 实现的接口，并为所有这些接口创建代理。因此，如果你想代理一个\
  \ Bean 的所有接口，则无需显式指定它们。\n\n<beans ...>\n\n...\n\n<bean id=\"arithmeticCalculatorProxy\"\
  \n\nclass=\"org.springframework.aop.framework.ProxyFactoryBean\">\n\n<property name=\"\
  target\" ref=\"arithmeticCalculator\" />\n\n<property name=\"interceptorNames\"\
  >\n\n<list>\n\n<value>loggingBeforeAdvice</value>\n\n</list>\n\n</property>\n\n\
  </bean>\n\n\n\n<bean id=\"unitCalculatorProxy\"\n      class=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n    <property name=\"target\" ref=\"unitCalculator\" />\n    <property name=\"\
  interceptorNames\">\n        <list>\n            <value>loggingBeforeAdvice</value>\n\
  \        </list>\n    </property>\n</bean>\n</beans>\n\n如果目标 Bean 实现了任何接口，`ProxyFactoryBean`\
  \ 将创建一个 JDK 代理。如果没有实现接口，`ProxyFactoryBean` 则会创建一个 CGLIB 代理，该代理可以代理其类中声明的所有方法。\n\n\
  在 `Main` 类中，您应该从 IoC 容器中获取代理 Bean，以便应用您的日志通知。\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \nimport org.springframework.context.ApplicationContext;\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\n\
  \npublic class Main {\n\n    9799ch05.qxd 4/14/08 10:59 AM Page 155\n\n    C H A\
  \ P T E R 5 **■** DY N A M I C P R OX Y A N D C L A S S I C S P R I N G A O P\n\n\
  \    **155**\n\n    public static void main(String[] args) {\n\n        ApplicationContext\
  \ context =\n                new ClassPathXmlApplicationContext(\"beans.xml\");\n\
  \n        ArithmeticCalculator arithmeticCalculator =\n                (ArithmeticCalculator)\
  \ context.getBean(\"**arithmeticCalculatorProxy**\");\n\n        ...\n\n       \
  \ UnitCalculator unitCalculator =\n                (UnitCalculator) context.getBean(\"\
  **unitCalculatorProxy**\");\n\n        ...\n\n    }\n}\n```\n\n**返回后通知（After Returning\
  \ Advices）**\n\n除了前置通知，您还可以编写一个*返回后*通知，用于记录方法结束时的返回值。\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \nimport java.lang.reflect.Method;\n\nimport org.apache.commons.logging.Log;\nimport\
  \ org.apache.commons.logging.LogFactory;\nimport org.springframework.aop.AfterReturningAdvice;\n\
  \npublic class LoggingAfterAdvice implements AfterReturningAdvice {\n\n    private\
  \ Log log = LogFactory.getLog(this.getClass());\n\n    public void afterReturning(Object\
  \ returnValue, Method method,\n                               Object[] args, Object\
  \ target) throws Throwable {\n        log.info(\"方法 \" + method.getName() + \"()\
  \ 结束，返回值为 \"\n                + returnValue);\n    }\n}\n```\n\n要使此通知生效，您需要在 IoC\
  \ 容器中声明其实例，并向 `interceptorNames` 属性中添加一个条目：\n\n```xml\n<beans ...>\n    ...\n  \
  \  **<bean id=\"loggingAfterAdvice\"**\n          **class=\"com.apress.springrecipes.calculator.LoggingAfterAdvice\"\
  \ />**\n\n    <bean id=\"arithmeticCalculatorProxy\"\n          class=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n\n        9799ch05.qxd 4/14/08 10:59 AM Page 156\n\n        **156**\n\n     \
  \   C H A P T E R 5 **■** DY N A M I C P R OX Y A N D C L A S S I C S P R I N G\
  \ A O P\n\n        <property name=\"target\" ref=\"arithmeticCalculator\" />\n \
  \       <property name=\"interceptorNames\">\n            <list>\n             \
  \   <value>loggingBeforeAdvice</value>\n                <value>**loggingAfterAdvice**</value>\n\
  \            </list>\n        </property>\n    </bean>\n\n    <bean id=\"unitCalculatorProxy\"\
  \n          class=\"org.springframework.aop.framework.ProxyFactoryBean\">\n    \
  \    <property name=\"target\" ref=\"unitCalculator\" />\n        <property name=\"\
  interceptorNames\">\n            <list>\n                <value>loggingBeforeAdvice</value>\n\
  \                <value>**loggingAfterAdvice**</value>\n            </list>\n  \
  \      </property>\n    </bean>\n</beans>\n```\n\n**抛出后通知（After Throwing Advices）**\n\
  \n第三种类型的通知是*抛出后*通知。首先，为了能够产生异常，您在算术计算器的 `div()` 方法中添加一个检查。如果除数为零，则抛出一个 `IllegalArgumentException`。\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n\npublic class ArithmeticCalculatorImpl\
  \ implements ArithmeticCalculator {\n\n    ...\n\n    public double div(double a,\
  \ double b) {\n        if (b == 0) {\n            throw new IllegalArgumentException(\"\
  除数为零\");\n        }\n        ...\n    }\n}\n```\n\n对于抛出后通知类型，您必须实现 `ThrowsAdvice`\
  \ 接口。请注意，此接口未声明任何方法。这是为了让您在不同的方法中处理不同类型的异常。但是，每个方法都必须命名为 `afterThrowing`，以处理特定类型的异常。异常类型由方法参数类型指定。例如，要处理\
  \ `IllegalArgumentException`，您可以编写如下所示的方法。在运行时，与此类型兼容的异常（即此类型及其子类型）将由该方法处理。\n\n\
  9799ch05.qxd 4/14/08 10:59 AM Page 157\n\n\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\n\
  **157**\n\npackage com.apress.springrecipes.calculator;\n\nimport org.apache.commons.logging.Log;\n\
  \nimport org.apache.commons.logging.LogFactory;\n\nimport org.springframework.aop.ThrowsAdvice;\n\
  \npublic class LoggingThrowsAdvice implements ThrowsAdvice {\n\nprivate Log log\
  \ = LogFactory.getLog(this.getClass());\n\npublic void afterThrowing(IllegalArgumentException\
  \ e) throws Throwable {\n\nlog.error(\"非法参数\");\n\n}\n\n}\n\n你还需要在 IoC 容器中声明该通知的一个实例，并在\
  \ `interceptorNames` 属性中添加一个条目：\n\n<beans ...>\n\n...\n\n**<bean id=\"loggingThrowsAdvice\"\
  **\n\n**class=\"com.apress.springrecipes.calculator.LoggingThrowsAdvice\" />**\n\
  \n<bean id=\"arithmeticCalculatorProxy\"\n\nclass=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n\n<property name=\"target\" ref=\"arithmeticCalculator\" />\n\n<property name=\"\
  interceptorNames\">\n\n<list>\n\n<value>loggingBeforeAdvice</value>\n\n<value>loggingAfterAdvice</value>\n\
  \n<value> **loggingThrowsAdvice**</value>\n\n</list>\n\n</property>\n\n</bean>\n\
  \n<bean id=\"unitCalculatorProxy\"\n\nclass=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n\n<property name=\"target\" ref=\"unitCalculator\" />\n\n<property name=\"interceptorNames\"\
  >\n\n<list>\n\n<value>loggingBeforeAdvice</value>\n\n<value>loggingAfterAdvice</value>\n\
  \n<value> **loggingThrowsAdvice**</value>\n\n</list>\n\n</property>\n\n</bean>\n\
  \n</beans>\n\n9799ch05.qxd 4/14/08 10:59 AM 第 158 页\n\n**158**\n\n第 5 章 **■** 动态代理与经典\
  \ Spring AOP\n\n如果需要访问方法详情和参数值，可以扩展 `afterThrowing()` 方法签名的参数列表，如下所示：\n\npackage\
  \ com.apress.springrecipes.calculator;\n\nimport java.lang.reflect.Method;\n\nimport\
  \ java.util.Arrays;\n\n...\n\npublic class LoggingThrowsAdvice implements ThrowsAdvice\
  \ {\n\n...\n\npublic void afterThrowing(**Method method, Object[] args, Object target**,\
  \ IllegalArgumentException e) throws Throwable {\n\n**log.error(\"方法 \" + method.getName()\
  \ + \"() 的非法参数 \" + Arrays.toString(args));**\n\n}\n\n}\n\n后置抛出通知中的方法签名必须采用以下形式。前三个参数是可选的，但你必须要么全部声明，要么一个都不声明。\n\
  \nafterThrowing([Method, args, target], Throwable subclass)\n\n**环绕通知**\n\n最后一种通知类型是*环绕*通知。它是所有通知类型中最强大的。它能够完全控制方法的执行，因此你可以将前面所有通知的操作合并到一个通知中。你甚至可以控制何时以及是否继续执行原始方法。\n\
  \n在经典 Spring AOP 中，环绕通知必须实现 `MethodInterceptor` 接口。该接口由 AOP 联盟定义，用于不同 AOP 框架之间的兼容性。编写环绕通知时，最重要的一点是必须调用\
  \ `methodInvocation.proceed()` 来继续执行原始方法。如果忘记执行此步骤，原始方法将不会被调用。以下环绕通知是你之前创建的前置、后置返回和后置抛出通知的组合：\n\
  \npackage com.apress.springrecipes.calculator;\n\nimport java.util.Arrays;\n\nimport\
  \ org.aopalliance.intercept.MethodInterceptor;\n\nimport org.aopalliance.intercept.MethodInvocation;\n\
  \nimport org.apache.commons.logging.Log;\n\nimport org.apache.commons.logging.LogFactory;\n\
  \npublic class LoggingAroundAdvice implements MethodInterceptor {\n\nprivate Log\
  \ log = LogFactory.getLog(this.getClass());\n\n9799ch05.qxd 4/14/08 10:59 AM 第 159\
  \ 页\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\n**159**\n\npublic Object invoke(MethodInvocation\
  \ methodInvocation) throws Throwable {\n\nlog.info(\"方法 \" + methodInvocation.getMethod().getName()\n\
  \n+ \"() 开始，参数为 \"\n\n+ Arrays.toString(methodInvocation.getArguments()));\n\ntry\
  \ {\n\nObject result = methodInvocation.proceed();\n\nlog.info(\"方法 \" + methodInvocation.getMethod().getName()\n\
  \n+ \"() 结束，结果为 \" + result);\n\nreturn result;\n\n\n\n} catch (IllegalArgumentException\
  \ e) {\n\nlog.error(\"非法参数 \"\n\n+ Arrays.toString(methodInvocation.getArguments())\n\
  \n+ \" 用于方法 \" + methodInvocation.getMethod().getName()\n\n+ \"()\");\n\nthrow e;\n\
  \n}\n\n}\n\n}\n\n环绕通知类型非常强大且灵活，因为你甚至可以修改原始参数值并改变最终返回值。使用这种通知类型时必须格外小心，因为很容易忘记调用\
  \ proceed 来执行原始方法。\n\n**■提示** 选择通知类型的一个通用规则是：使用能够满足需求的最弱类型。\n\n由于这种通知是之前所有通知的组合，你应该只为代理指定这种通知。\n\
  \n<beans ...>\n\n...\n\n**<bean id=\"loggingAroundAdvice\"**\n\n**class=\"com.apress.springrecipes.calculator.LoggingAroundAdvice\"\
  \ />**\n\n<bean id=\"arithmeticCalculatorProxy\"\n\nclass=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n\n<property name=\"target\" ref=\"arithmeticCalculator\" />\n\n<property name=\"\
  interceptorNames\">\n\n<list>\n\n<value> **loggingAroundAdvice**</value>\n\n</list>\n\
  \n</property>\n\n</bean>\n\n9799ch05.qxd 4/14/08 10:59 AM Page 160\n\n**160**\n\n\
  第 5 章 **■** 动态代理与经典 Spring AOP\n\n<bean id=\"unitCalculatorProxy\"\n\nclass=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n\n<property name=\"target\" ref=\"unitCalculator\" />\n\n<property name=\"interceptorNames\"\
  >\n\n<list>\n\n<value> **loggingAroundAdvice**</value>\n\n</list>\n\n</property>\n\
  \n</bean>\n\n</beans>\n\n**5-4. 使用经典 Spring 切入点匹配方法**\n\n问题\n\n当你为 AOP 代理指定一个通知时，目标类/代理接口中声明的所有方法都会被通知。但在大多数情况下，你只希望其中部分方法被通知。\n\
  \n解决方案\n\n*切入点*是另一个核心 AOP 概念，通常以表达式的形式出现，允许你匹配特定的程序执行点来应用通知。在经典 Spring AOP 中，切入点也通过使用切入点类声明为\
  \ Spring Bean。\n\nSpring 提供了一系列切入点类供你匹配程序执行点。\n\n你可以简单地在 Bean 配置文件中声明这些类型的 Bean\
  \ 来定义切入点。然而，如果你发现内置的切入点类无法满足需求，你可以通过扩展 `StaticMethodMatcherPointcut` 或 `DynamicMethodMatcherPointcut`\
  \ 来编写自己的切入点。\n\n前者仅通过静态的类和方法信息匹配执行点，而后者还会通过动态的参数值进行匹配。\n\n工作原理\n\n**方法名切入点**\n\n\
  要仅通知单个方法，你可以利用 `NameMatchMethodPointcut` 通过方法名进行静态匹配。你可以在 `mappedName` 属性中指定特定的方法名或带有通配符的方法名表达式。\n\
  \n<bean id=\"methodNamePointcut\"\n\nclass=\"org.springframework.aop.support.NameMatchMethodPointcut\"\
  >\n\n<property name=\"mappedName\" value=\"add\" />\n\n</bean>\n\n切入点必须与一个通知关联，以指示通知应在何处应用。在经典\
  \ Spring AOP 中，这种关联被称为*顾问*。`DefaultPointcutAdvisor` 类专门用于关联切入点和通知。顾问以与通知相同的方式应用于代理。\n\
  \n9799ch05.qxd 4/14/08 10:59 AM Page 161\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\n**161**\n\
  \n<beans ...>\n\n...\n\n**<bean id=\"methodNameAdvisor\"**\n\n**class=\"org.springframework.aop.support.DefaultPointcutAdvisor\"\
  >**\n\n**<property name=\"pointcut\" ref=\"methodNamePointcut\" />**\n\n**<property\
  \ name=\"advice\" ref=\"loggingAroundAdvice\" />**\n\n**</bean>**\n\n<bean id=\"\
  arithmeticCalculatorProxy\"\n\nclass=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n\n<property name=\"target\" ref=\"arithmeticCalculator\" />\n\n<property name=\"\
  interceptorNames\">\n\n<list>\n\n<value> **methodNameAdvisor**</value>\n\n</list>\n\
  \n</property>\n\n</bean>\n\n</beans>\n\n如果你希望在方法名切入点中匹配多个方法，则应在 `mappedNames` 属性中设置这些方法，该属性的类型为\
  \ `java.util.List`。\n\n\n\n<bean id=\"methodNamePointcut\"\nclass=\"org.springframework.aop.support.NameMatchMethodPointcut\"\
  >\n<property name=\"mappedNames\">\n<list>\n<value>add</value>\n<value>sub</value>\n\
  </list>\n</property>\n</bean>\n\n对于每种常见的切点类型，Spring 还提供了一个便捷的通知器类，让你可以一次性声明一个通知器。对于\
  \ `NameMatchMethodPointcut`，其对应的通知器类是 `NameMatchMethodPointcutAdvisor`。\n\n<bean\
  \ id=\"methodNameAdvisor\"\nclass=\"org.springframework.aop.support.NameMatchMethodPointcutAdvisor\"\
  >\n<property name=\"mappedNames\">\n<list>\n<value>add</value>\n<value>sub</value>\n\
  </list>\n</property>\n<property name=\"advice\" ref=\"loggingAroundAdvice\" />\n\
  </bean>\n\n9799ch05.qxd 4/14/08 10:59 AM Page 162\n\n**162**\n\n第 5 章 **■** 动态代理与经典\
  \ Spring AOP\n\n**正则表达式切点**\n\n除了按名称匹配方法外，你还可以使用正则表达式来匹配方法。你可以利用 `RegexpMethodPointcutAdvisor`\
  \ 来指定一个或多个正则表达式。例如，以下正则表达式匹配方法名称中包含关键字 `mul` 或 `div` 的方法：\n\n<beans ...>\n...\n\
  **<bean id=\"regexpAdvisor\"**\n**class=\"org.springframework.aop.support.RegexpMethodPointcutAdvisor\"\
  >**\n**<property name=\"patterns\">**\n**<list>**\n**<value>.*mul.*</value>**\n\
  **<value>.*div.*</value>**\n**</list>**\n**</property>**\n**<property name=\"advice\"\
  \ ref=\"loggingAroundAdvice\" />**\n**</bean>**\n\n<bean id=\"arithmeticCalculatorProxy\"\
  \nclass=\"org.springframework.aop.framework.ProxyFactoryBean\">\n<property name=\"\
  target\" ref=\"arithmeticCalculator\" />\n<property name=\"interceptorNames\">\n\
  <list>\n<value>methodNameAdvisor</value>\n<value> **regexpAdvisor**</value>\n</list>\n\
  </property>\n</bean>\n</beans>\n\n**AspectJ 表达式切点**\n\nAspectJ 框架定义了一种强大的切点表达式语言。你可以利用\
  \ `AspectJExpressionPointcutAdvisor`，使用 AspectJ 切点表达式来匹配方法。例如，以下 AspectJ 切点表达式匹配方法名称中包含关键字\
  \ `To` 的所有方法。AspectJ 切点语言将在第 6 章（关于 Spring 2.x AOP）中介绍。关于 AspectJ 切点语言的更详细说明，请参考\
  \ AspectJ 文档。\n\n**■注意** 要使用 AspectJ 表达式定义切点，你必须在类路径中包含 `aspectjweaver.jar`（位于 Spring\
  \ 安装目录的 `lib/aspectj` 目录下）。\n\n9799ch05.qxd 4/14/08 10:59 AM Page 163\n\n第 5 章 **■**\
  \ 动态代理与经典 Spring AOP\n\n**163**\n\n<beans ...>\n...\n**<bean id=\"aspectjAdvisor\"\
  **\n**class=\"org.springframework.aop.aspectj.AspectJExpressionPointcutAdvisor\"\
  >**\n**<property name=\"expression\">**\n**<value>execution(* *.*To*(..))</value>**\n\
  **</property>**\n**<property name=\"advice\">**\n**<ref bean=\"loggingAroundAdvice\"\
  \ />**\n**</property>**\n**</bean>**\n\n<bean id=\"unitCalculatorProxy\"\nclass=\"\
  org.springframework.aop.framework.ProxyFactoryBean\">\n<property name=\"target\"\
  \ ref=\"unitCalculator\" />\n<property name=\"interceptorNames\">\n<list>\n<value>\
  \ **aspectjAdvisor**</value>\n</list>\n</property>\n</bean>\n</beans>\n\n**5-5.\
  \ 自动为你的 Bean 创建代理**\n\n**问题**\n\n在使用经典 Spring AOP 时，你需要为每个需要被通知的 Bean 创建一个代理，并将其与目标\
  \ Bean 关联。结果，你的 Bean 配置文件中会声明大量的代理 Bean。\n\n**解决方案**\n\nSpring 提供了一种称为*自动代理创建器*的机制，可以自动为你的\
  \ Bean 创建代理。它作为一个 Bean 后置处理器实现，会用新创建的代理替换目标 Bean。使用自动代理创建器，你不再需要手动使用 `ProxyFactoryBean`\
  \ 创建代理。\n\n**工作原理**\n\nSpring 提供了两种内置的自动代理创建器实现供你选择。第一种是 `BeanNameAutoProxyCreator`，它需要配置一个\
  \ Bean 名称表达式列表。\n\n\n\n在每个 Bean 名称表达式中，你可以使用通配符来匹配一组 Bean。例如，以下自动代理创建器将为名称以 `Calculator`\
  \ 结尾的 Bean 创建代理。每个创建的代理都将由自动代理创建器中指定的通知器提供增强。\n\n9799ch05.qxd 4/14/08 10:59 AM 第\
  \ 164 页\n\n**164**\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\n<beans ...>\n\n...\n\n<bean\
  \ id=\"arithmeticCalculator\"\n\nclass=\"com.apress.springrecipes.calculator.ArithmeticCalculatorImpl\"\
  \ />\n\n<bean id=\"unitCalculator\"\n\nclass=\"com.apress.springrecipes.calculator.UnitCalculatorImpl\"\
  \ />\n\n<bean class=\"org.springframework.aop.framework.autoproxy. **➥**\n\nBeanNameAutoProxyCreator\"\
  >\n\n<property name=\"beanNames\">\n\n<list>\n\n<value>*Calculator</value>\n\n</list>\n\
  \n</property>\n\n<property name=\"interceptorNames\">\n\n<list>\n\n<value>methodNameAdvisor</value>\n\
  \n<value>regexpAdvisor</value>\n\n<value>aspectjAdvisor</value>\n\n</list>\n\n</property>\n\
  \n</bean>\n\n</beans>\n\n在 Main 类中，你可以直接通过原始名称获取 Bean，甚至无需知道它们已被代理。\n\npackage com.apress.springrecipes.calculator;\n\
  \nimport org.springframework.context.ApplicationContext;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class Main {\n\npublic static void main(String[] args) {\n\nApplicationContext\
  \ context =\n\nnew ClassPathXmlApplicationContext(\"beans.xml\");\n\nArithmeticCalculator\
  \ calculator1 =\n\n(ArithmeticCalculator) context.getBean(\" **arithmeticCalculator**\"\
  );\n\n...\n\nUnitCalculator calculator2 =\n\n(UnitCalculator) context.getBean(\"\
  \ **unitCalculator**\");\n\n...\n\n}\n\n}\n\n9799ch05.qxd 4/14/08 10:59 AM 第 165\
  \ 页\n\n第 5 章 **■** 动态代理与经典 Spring AOP\n\n**165**\n\n另一个自动代理创建器实现是 `DefaultAdvisorAutoProxyCreator`。请注意，你无需为此自动代理创建器进行任何配置。它会自动检查\
  \ IoC 容器中声明的每个通知器与每个 Bean 的匹配情况。如果某个 Bean 与某个通知器的切点匹配，`DefaultAdvisorAutoProxyCreator`\
  \ 将自动为其创建代理。\n\n<bean class=\"org.springframework.aop.framework.autoproxy. **➥**\n\
  \nDefaultAdvisorAutoProxyCreator\" />\n\n然而，你必须非常谨慎地使用此自动代理创建器，因为它可能会增强那些你本不希望被增强的\
  \ Bean。\n\n**5-6. 本章小结**\n\n在本章中，你了解了将横切关注点模块化在应用程序中的重要性。这类关注点通常难以通过传统的面向对象方法进行模块化。未模块化的横切关注点会导致代码缠绕和代码分散问题。\n\
  \n动态代理有助于将横切关注点模块化，但对于应用程序开发者而言，直接使用它要求过高。然而，它是 Spring AOP 的核心实现技术之一。\n\nAOP 是 OOP\
  \ 的补充，专门用于模块化横切关注点。它定义了一组高级概念，如通知和切点，供应用程序开发者表达其横切关注点。\n\n通知封装了在特定程序执行点要采取的动作。经典\
  \ Spring AOP 支持四种类型的通知：前置通知、返回后通知、抛出后通知和环绕通知。\n\n要将你的通知应用到 Spring IoC 容器中的 Bean，你必须使用\
  \ `ProxyFactoryBean` 创建代理。\n\n切点通常表现为一个表达式，用于匹配某些程序执行点以应用通知。在经典 Spring AOP 中，切点被声明为一个\
  \ Spring Bean，并通过通知器与通知关联。\n\n使用经典 Spring AOP 时，你需要为每个要增强的 Bean 创建一个代理。\n\nSpring\
  \ 提供了自动代理创建器，可以自动为你的 Bean 创建代理。使用自动代理创建器后，你不再需要手动使用 `ProxyFactoryBean` 创建代理。\n\n\
  在下一章中，你将学习新的 Spring 2.x AOP 方法及其对 AspectJ 框架的支持。\n\n9799ch05.qxd 4/14/08 10:59 AM\
  \ 第 166 页\n\n9799ch06.qxd 4/15/08 11:45 AM 第 167 页\n\n第 6 章\n\n\n\nSpring 2.x AOP\
  \ 与 AspectJ 支持\n\n**本**章中，你将学习 Spring 2.x AOP 的用法以及一些高级 AOP 主题，例如通知优先级和引入。Spring\
  \ AOP 框架的用法从 1.x 版本到 2.x 版本发生了显著变化。本章重点介绍新的 Spring AOP 方法，它使你能够编写更强大且兼容性更好的切面。此外，你还将学习如何在\
  \ Spring 应用程序中使用 AspectJ 框架。\n\n在上一章中，你学习了经典 Spring AOP 如何通过一套专有的 Spring AOP API\
  \ 工作。在 Spring 2.x 版本中，你可以将切面编写为 POJO，并使用 AspectJ 注解或基于 XML 的配置在 Bean 配置文件中进行定义。由于这两种配置方式实际上具有相同的效果，本章大部分内容将重点介绍\
  \ AspectJ 注解，同时描述基于 XML 的配置以作对比。\n\n请注意，尽管 Spring AOP 的用法发生了变化，但其核心实现技术仍然相同：动态代理。此外，Spring\
  \ AOP 是向后兼容的，因此你可以在 Spring 2.x AOP 中继续使用经典的 Spring 通知、切点和自动代理创建器。\n\n随着 AspectJ\
  \ 发展成为一个完整且流行的 AOP 框架，Spring 2.x 支持在其 AOP 框架中使用通过 AspectJ 注解编写的 POJO 切面。由于未来越来越多的\
  \ AOP 框架将支持 AspectJ 注解，你的 AspectJ 风格切面更有可能在其他支持 AspectJ 的 AOP 框架中被重用。\n\n请记住，尽管你可以在\
  \ Spring 2.x AOP 中应用 AspectJ 切面，但这与使用 AspectJ 框架本身并不相同。事实上，在 Spring AOP 中使用 AspectJ\
  \ 切面存在一些限制，因为 Spring 只允许切面应用于 IoC 容器中声明的 Bean。如果你想在此范围之外应用切面，则必须使用 AspectJ 框架，这将在本章末尾介绍。\n\
  \n完成本章后，你将能够编写 POJO 切面并在 Spring 2.x AOP 框架中使用。你还应该能够在 Spring 应用程序中利用 AspectJ 框架。\n\
  \n**167**\n\n9799ch06.qxd 4/15/08 11:45 AM 第 168 页\n\n**168**\n\n第 6 章 **■** SPRING\
  \ 2.X AOP 与 ASPECTJ 支持\n\n**6-1. 在 Spring 中启用 AspectJ 注解支持**\n\n问题\n\nSpring 2.x\
  \ 版本支持在其 AOP 框架中使用通过 AspectJ 注解编写的 POJO 切面。但首先，你必须在 Spring IoC 容器中启用 AspectJ 注解支持。\n\
  \n解决方案\n\n要在 Spring IoC 容器中启用 AspectJ 注解支持，你只需在 Bean 配置文件中定义一个空的 XML 元素 `<aop:aspectj-autoproxy>`。然后，Spring\
  \ 将自动为任何与你的 AspectJ 切面匹配的 Bean 创建代理。\n\n工作原理\n\n为了与经典 Spring AOP 进行更清晰的对比，将继续使用上一章中的计算器示例。回想一下，你为计算器应用程序定义了以下接口：\n\
  \npackage com.apress.springrecipes.calculator;\n\npublic interface ArithmeticCalculator\
