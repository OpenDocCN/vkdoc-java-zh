  **在**本章中，您将学习 *控制反转 (IoC)* 设计原则，许多现代容器都使用它来解耦组件之间的依赖关系。Spring 框架提供了一个强大且可扩展的 IoC
  容器来管理您的组件。该容器是 Spring 框架的核心，并与 Spring 的其他模块紧密集成。本章旨在为您快速开始使用 Spring 提供所需的预备知识。


  当谈到 Java EE 平台中的组件时，大多数开发人员会想到 EJB（企业级 JavaBean）。EJB 规范明确定义了 EJB 组件与 EJB 容器之间的契约。通过在
  EJB 容器中运行，EJB 组件可以获得生命周期管理、事务管理和安全服务等好处。然而，在 3.0 之前的 EJB 版本中，一个单一的 EJB 组件需要远程/本地接口、home
  接口和一个 Bean 实现类。由于它们的复杂性，这些 EJB 被称为重量级组件。


  此外，在这些 EJB 版本中，EJB 组件只能在 EJB 容器内运行，并且必须使用 JNDI（Java 命名和目录接口）查找其他 EJB。因此，EJB 组件是技术依赖的，因为它们不能在
  EJB 容器范围之外被重用和测试。


  许多轻量级容器旨在克服 EJB 的缺点。它们是轻量级的，因为它们可以支持简单的 Java 对象作为组件。轻量级容器面临的一个挑战是如何解耦组件之间的依赖关系。IoC
  已被证明是解决这个问题的有效方案。


  虽然 IoC 是一个通用的设计原则，但 *依赖注入 (DI)* 是一个体现该原则的具体设计模式。由于 DI 是 IoC 最典型（如果不是唯一）的实现，术语 IoC
  和 DI 经常互换使用。


  完成本章后，您将能够编写一个在概念上类似于 Spring IoC 容器的简单 IoC 容器。如果您已经熟悉 IoC，可以直接跳到第 2 章，该章介绍 Spring
  框架的整体架构和设置。


