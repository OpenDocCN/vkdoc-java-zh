  DestDir\", srcDir + \"_1\"));\n\nmbeanServerConnection.invoke(\n\nmbeanName, \"\
  replicate\", new Object[] {}, new String[] {});\n\n}\n\n}\n\n假设你已经创建了以下 JMX 通知监听器，用于监听文件复制通知。\n\
  \npackage com.apress.springrecipes.replicator;\n\nimport javax.management.Notification;\n\
