  \ 使用基于 XML 的配置声明切面**\n\n**问题**\n\n在大多数情况下，使用 AspectJ 注解声明切面是可行的。然而，如果你的 JVM 版本是\
  \ 1.4 或更低（因此不支持注解），或者你不希望应用程序依赖于 AspectJ，那么就不应使用 AspectJ 注解来声明切面。\n\n**解决方案**\n\n\
  除了使用 AspectJ 注解声明切面外，Spring 还支持在 Bean 配置文件中声明切面。这种声明方式是通过使用 `aop` 模式中的 XML 元素来完成的。\n\
