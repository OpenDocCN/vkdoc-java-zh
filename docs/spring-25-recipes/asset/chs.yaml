  rateCalculator\" />\n\n</lang:bsh>\n\n**19-5\\. 总结**\n\n在本章中，你已经学习了如何使用 Spring 支持的脚本语言来实现你的\
  \ Bean，以及如何在 Spring IoC 容器中声明它们。Spring 2.5 支持三种脚本语言：JRuby、Groovy 和 BeanShell。你可以在\
