  execution(* *.*(..))\",\n\n**returning = \"result\"** )\n\npublic void logAfterReturning(JoinPoint\
  \ joinPoint, **Object result**) {\n\nlog.info(\"方法 \" + joinPoint.getSignature().getName()\n\
  \n+ \"() 结束，返回值为 \" + **result**);\n\n}\n\n}\n\n**后置异常通知**\n\n*后置异常*通知仅在连接点抛出异常时执行。\n\
