  <ejb-class>\ncom.apress.springrecipes.post.PostageServiceBean\n</ejb-class>\n<session-type>Stateless</session-type>\n\
  <transaction-type>Bean</transaction-type>\n**<env-entry>**\n**<env-entry-name>ejb/BeanFactoryPath</env-entry-name>**\n\
  **<env-entry-type>java.lang.String</env-entry-type>**\n**<env-entry-value>beans-ejb.xml</env-entry-value>**\n\
  **</env-entry>**\n</session>\n</enterprise-beans>\n</ejb-jar>\n```\n\nEJB 支持类使用\
  \ `BeanFactoryLocator` 实例化 Spring IoC 容器。它们默认使用的 `BeanFactoryLocator` 是 `ContextJndiBeanFactoryLocator`，它会通过\
  \ JNDI 环境变量 `java:comp/env/ejb/BeanFactoryPath` 指定的 bean 配置文件来实例化 IoC 容器。你可以通过在构造函数或\
