  **8-5\\. 使用经典 Spring AOP 以声明方式管理事务**\n\n问题\n\n由于事务管理是一种横切关注点，AOP 是实现它的理想方式。然而，如果你希望在\
  \ Spring 1.x 中以声明方式管理事务，就必须使用经典的 Spring AOP 方法。\n\n解决方案\n\nSpring 提供了一个名为 TransactionInterceptor\
  \ 的经典环绕通知，用于事务管理。该通知像事务模板一样控制事务管理过程，但它应用于整个方法体，而不是任意代码块。默认情况下，在方法开始之前，该通知会启动一个新事务。如果该方法抛出非检查型异常，事务将回滚。否则，在方法完成后提交事务。\n\
  \n在经典 Spring AOP 中，你必须使用 ProxyFactoryBean 为 Bean 创建代理，以应用 TransactionInterceptor\
  \ 通知。由于事务管理在企业应用中非常常见，Spring 提供了一个便捷的类 TransactionProxyFactoryBean，专门用于创建事务代理。\n\
  \n9799ch08.qxd 5/6/08 10:00 AM Page 261\n\n第 8 章 **■** 在 Spring 中进行事务管理\n\n**261**\n\
  \n工作原理\n\n首先，让我们考虑使用 Spring 的 JDBC 支持来实现你的 book shop，但不包含任何事务管理代码。\n\npackage com.apress.springrecipes.bookshop;\n\
  \nimport org.springframework.jdbc.core.support.JdbcDaoSupport;\n\npublic class JdbcBookShop\
  \ extends JdbcDaoSupport implements BookShop {\n\npublic void purchase(String isbn,\
  \ String username) {\n\n\n\nint price = getJdbcTemplate().queryForInt(\n\n\"SELECT\
  \ PRICE FROM BOOK WHERE ISBN = ?\", new Object[] { isbn }); getJdbcTemplate().update(\n\
  \n\"UPDATE BOOK_STOCK SET STOCK = STOCK - 1 \" +\n\n\"WHERE ISBN = ?\",\n\nnew Object[]\
  \ { isbn });\n\ngetJdbcTemplate().update(\n\n\"UPDATE ACCOUNT SET BALANCE = BALANCE\
  \ - ? \" +\n\n\"WHERE USERNAME = ?\",\n\nnew Object[] { price, username });\n\n\
  }\n\n}\n\n在你的 Bean 配置文件中，你可以声明一个引用事务管理器的 `TransactionInterceptor` 通知。然后，你可以使用 `ProxyFactoryBean`\
  \ 创建一个代理，将该通知应用于目标 `bookShop` Bean。\n\n<beans ...>\n\n...\n\n<bean id=\"transactionManager\"\
  \n\nclass=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\">\n\
  \n<property name=\"dataSource\" ref=\"dataSource\" />\n\n</bean>\n\n<bean id=\"\
  bookShop\"\n\nclass=\"com.apress.springrecipes.bookshop. **JdbcBookShop**\">\n\n\
  <property name=\"dataSource\" ref=\"dataSource\" />\n\n</bean>\n\n<bean id=\"transactionInterceptor\"\
  \ class=\"org.springframework.transaction. **➥**\n\ninterceptor.TransactionInterceptor\"\
  >\n\n<property name=\"transactionManager\" ref=\"transactionManager\" />\n\n<property\
  \ name=\"transactionAttributes\">\n\n<props>\n\n**<prop key=\"purchase\">PROPAGATION_REQUIRED</prop>**\n\
  \n9799ch08.qxd 5/6/08 10:00 AM Page 262\n\n**262**\n\n第 8 章 **■** SPRING 中的事务管理\n\
  \n</props>\n\n</property>\n\n</bean>\n\n<bean id=\"bookShopProxy\"\n\nclass=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >\n\n<property name=\"target\" ref=\"bookShop\" />\n\n<property name=\"interceptorNames\"\
  >\n\n<list>\n\n<value>transactionInterceptor</value>\n\n</list>\n\n</property>\n\
  \n</bean>\n\n</beans>\n\n需要事务管理的方法可以在 `TransactionInterceptor` 通知的 `transactionAttributes`\
  \ 属性中指定。该属性的类型是 `Properties`，你需要将事务性方法的名称作为键，将其事务属性作为值。它支持在键中使用通配符，以便为多个方法指定相同的事务属性集。对于每个事务性方法，你至少必须指定传播事务属性。这里，为简单起见，你可以选择默认值\
  \ `PROPAGATION_REQUIRED`。\n\n你的方法必须在代理对象上调用才能获得事务管理支持。因此，在 `Main` 类中，你必须检索 `bookShopProxy`\
  \ Bean，而不是 `bookShop` Bean。\n\npackage com.apress.springrecipes.bookshop;\n\n...\n\
  \npublic class Main {\n\npublic static void main(String[] args) {\n\n...\n\nBookShop\
  \ bookShop = (BookShop) context.getBean(\" **bookShopProxy**\"); bookShop.purchase(\"\
  0001\", \"user1\");\n\n}\n\n}\n\n另一种选择是利用便捷类 `TransactionProxyFactoryBean`，它专门用于创建事务代理。现在，`TransactionInterceptor`\
  \ 通知和 `ProxyFactoryBean` 声明所需的信息可以合并到单个 `TransactionProxyFactoryBean` 声明中。\n\n<bean\
  \ id=\"bookShopProxy\" class=\" **org.springframework.transaction.➥**\n\n**interceptor.TransactionProxyFactoryBean**\"\
  >\n\n<property name=\"target\" ref=\"bookShop\" />\n\n**<property name=\"transactionManager\"\
  \ ref=\"transactionManager\" />**\n\n**<property name=\"transactionAttributes\"\
  >**\n\n**<props>**\n\n**<prop key=\"purchase\">PROPAGATION_REQUIRED</prop>**\n\n\
  9799ch08.qxd 5/6/08 10:00 AM Page 263\n\n第 8 章 **■** SPRING 中的事务管理\n\n**263**\n\n\
  **</props>**\n\n**</property>**\n\n</bean>\n\n**8-6\\. 使用事务通知以声明方式管理事务**\n\n问题\n\
  \n由于事务管理是一种横切关注点，你希望使用 Spring 2.x 中新的 AOP 方法以声明方式管理事务。\n\n解决方案\n\nSpring 2.x 提供了一个事务通知，可以通过\
  \ `tx` 模式中定义的 `<tx:advice>` 元素轻松配置。该通知可以使用 `aop` 模式中定义的 AOP 配置工具来启用。\n\n工作原理\n\n\
  \n\n要在 Spring 2.x 中启用声明式事务管理，你可以通过 tx 模式中定义的 `<tx:advice>` 元素来声明一个事务通知，因此需要事先将该模式定义添加到\
  \ `<beans>` 根元素中。声明此通知后，需要将其与一个切点关联。由于事务通知是在\n\n`<aop:config>` 元素外部声明的，它无法直接与切点链接。你必须在\
  \ `<aop:config>` 元素中声明一个通知器，将通知与切点关联起来。\n\n**■注意** 由于 Spring 2.x AOP 使用 AspectJ\
  \ 切点表达式来定义切点，你需要在类路径中包含 aspectjweaver.jar（位于 Spring 安装目录的 lib/aspectj 子目录中）。\n\n\
  <beans xmlns=\" [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n**xmlns:tx=\" [`www.springframework.org/schema/tx\"`](http://www.springframework.org/schema/tx)**\n\
  \n**xmlns:aop=\" [`www.springframework.org/schema/aop\"`](http://www.springframework.org/schema/aop)**\n\
  \nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/aop)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/aop)\n\
  \n[**http://www.springframework.org/schema/tx**](http://www.springframework.org/schema/aop)\n\
  \n[**http://www.springframework.org/schema/tx/spring-tx-2.5.xsd**](http://www.springframework.org/schema/aop)\n\
  \n[**http://www.springframework.org/schema/aop**](http://www.springframework.org/schema/aop)\n\
  \n[**http://w**](http://www.springframework.org/schema/aop)[**ww.springframework.org/schema/aop/spring-aop-2.5.xsd\"\
  >**](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsdwww.springframework.org/schema/txwww.spring)\n\
  \n<tx:advice id=\"bookShopTxAdvice\"\n\ntransaction-manager=\"transactionManager\"\
  >\n\n<tx:attributes>\n\n9799ch08.qxd 5/6/08 10:00 AM Page 264\n\n**264**\n\n第 8\
  \ 章 **■** SPRING 中的事务管理\n\n<tx:method name=\"purchase\" />\n\n</tx:attributes>\n\
  \n</tx:advice>\n\n<aop:config>\n\n<aop:pointcut id=\"bookShopOperation\" expression=\n\
  \n\"execution(* com.apress.springrecipes.bookshop.BookShop.*(..))\" />\n\n**<aop:advisor\
  \ advice-ref=\"bookShopTxAdvice\"**\n\n**pointcut-ref=\"bookShopOperation\" />**\n\
  \n</aop:config>\n\n...\n\n<bean id=\"transactionManager\"\n\nclass=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\"\
  >\n\n<property name=\"dataSource\" ref=\"dataSource\" />\n\n</bean>\n\n<bean id=\"\
  bookShop\"\n\nclass=\"com.apress.springrecipes.bookshop.JdbcBookShop\">\n\n<property\
  \ name=\"dataSource\" ref=\"dataSource\" />\n\n</bean>\n\n</beans>\n\n上述 AspectJ\
  \ 切点表达式匹配了 BookShop 接口中声明的所有方法。然而，由于 Spring AOP 基于代理的方式，它只支持对公有方法进行通知。因此，只有公有方法可以通过\
  \ Spring AOP 实现事务性。\n\n每个事务通知都需要一个标识符，以及对 IoC 容器中事务管理器的引用。需要事务管理的方法通过 `<tx:attributes>`\
  \ 元素内的多个 `<tx:method>` 元素来指定。方法名称支持通配符，以便你匹配一组方法。你还可以为每组方法定义事务属性，但这里为了简单起见，我们使用默认属性。\n\
  \n现在，你可以从 Spring IoC 容器中获取 bookShop bean 来使用。由于该 bean 的方法被切点匹配，Spring 将返回一个启用了事务管理的代理。\n\
  \npackage com.apress.springrecipes.bookshop;\n\n...\n\npublic class Main {\n\npublic\
  \ static void main(String[] args) {\n\n...\n\nBookShop bookShop = (BookShop) context.getBean(\"\
  \ **bookShop**\"); bookShop.purchase(\"0001\", \"user1\");\n\n}\n\n}\n\n9799ch08.qxd\
  \ 5/6/08 10:00 AM Page 265\n\n第 8 章 **■** SPRING 中的事务管理\n\n**265**\n\n**8-7\\. 使用声明式方式管理事务**\n\
  \n\n\n**@Transactional 注解**\n\n问题\n\n在 Bean 配置文件中声明事务需要了解 AOP 概念，如切点、通知和顾问。缺乏这方面知识的开发者可能会觉得启用声明式事务管理比较困难。\n\
  \n解决方案\n\n除了在 Bean 配置文件中使用切点、通知和顾问来声明事务外，Spring 还允许你通过简单地为事务性方法添加 `@Transactional`\
  \ 注解并启用 `<tx:annotation-driven>` 元素来声明事务。\n\n不过，使用此方法需要 Java 1.5 或更高版本。\n\n工作原理\n\
  \n要将一个方法定义为事务性方法，只需为其添加 `@Transactional` 注解即可。请注意，由于 Spring AOP 基于代理的限制，你只应对公有方法进行注解。\n\
  \n```java\npackage com.apress.springrecipes.bookshop;\n\n...\n\nimport org.springframework.transaction.annotation.Transactional;\n\
  \npublic class JdbcBookShop extends JdbcDaoSupport implements BookShop {\n\n   \
  \ @Transactional\n    public void purchase(String isbn, String username) {\n   \
  \     ...\n    }\n\n}\n```\n\n你可以在方法级别或类级别应用 `@Transactional` 注解。当将此注解应用于类时，该类中的所有公有方法都将被定义为事务性方法。虽然你也可以将\
  \ `@Transactional` 应用于接口或接口中的方法声明，但不建议这样做，因为它可能无法与基于类的代理（即 CGLIB 代理）正常工作。\n\n在 Bean\
  \ 配置文件中，你只需启用 `<tx:annotation-driven>` 元素并为其指定一个事务管理器。这就是使其工作所需的全部内容。Spring 会为 IoC\
  \ 容器中声明的、带有 `@Transactional` 注解的方法，或带有 `@Transactional` 注解的类中的方法，添加通知。因此，Spring\
  \ 可以为这些方法管理事务。\n\n```xml\n<beans ...>\n\n    <tx:annotation-driven transaction-manager=\"\
  transactionManager\" />\n\n    ...\n\n    <bean id=\"transactionManager\"\n    \
  \    class=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\"\
  >\n        <property name=\"dataSource\" ref=\"dataSource\" />\n    </bean>\n\n\
  \    <bean id=\"bookShop\"\n        class=\"com.apress.springrecipes.bookshop.JdbcBookShop\"\
  >\n        <property name=\"dataSource\" ref=\"dataSource\" />\n    </bean>\n\n\
  </beans>\n```\n\n实际上，如果你的事务管理器名为 `transactionManager`，则可以省略 `<tx:annotation-driven>`\
  \ 元素中的 `transaction-manager` 属性。该元素会自动检测名为 `transactionManager` 的事务管理器。只有当事务管理器使用其他名称时，才需要指定该属性。\n\
  \n```xml\n<beans ...>\n\n    <tx:annotation-driven />\n\n    ...\n\n</beans>\n```\n\
  \n**8-8. 设置传播事务属性**\n\n问题\n\n当一个事务性方法被另一个方法调用时，需要指定事务应如何传播。例如，该方法可以继续在现有事务中运行，也可以启动一个新事务并在其自身的事务中运行。\n\
  \n解决方案\n\n事务的传播行为可以通过 *propagation* 事务属性来指定。Spring 定义了七种传播行为，如表 8-5 所示。这些行为定义在 `org.springframework.transaction.TransactionDefinition`\
  \ 接口中。请注意，并非所有类型的事务管理器都支持所有这些传播行为。\n\n**表 8-5.** *Spring 支持的传播行为*\n\n| 传播行为 | 描述\
  \ |\n| --- | --- |\n| REQUIRED | 如果当前存在一个正在进行的事务，则当前方法应在此事务内运行。否则，应启动一个新事务并在其自身的事务内运行。\
  \ |\n| REQUIRES_NEW | 当前方法必须启动一个新事务并在其自身的事务内运行。如果当前存在一个正在进行的事务，则应将其挂起。 |\n| SUPPORTS\
  \ | 如果当前存在一个正在进行的事务，则当前方法可以在此事务内运行。否则，不必在事务内运行。 |\n| NOT_SUPPORTED | |\n\n\n\n当前方法不应在事务内运行。如果存在正在进行的事务，则应将其挂起。\n\
  \nMANDATORY\n\n当前方法必须在事务内运行。如果不存在正在进行的事务，则会抛出异常。\n\n9799ch08.qxd 5/6/08 10:00 AM\
  \ 第 267 页\n\n第 8 章 **■** 在 Spring 中进行事务管理\n\n**267**\n\n**传播行为**\n\n**描述**\n\nNEVER\n\
  \n当前方法不应在事务内运行。如果存在正在进行的事务，则会抛出异常。\n\nNESTED\n\n如果存在正在进行的事务，当前方法应在该事务的嵌套事务（由 JDBC\
  \ 3.0 保存点特性支持）中运行。否则，应启动一个新事务并在其自身的事务中运行。\n\n工作原理\n\n当一个事务性方法被另一个方法调用时，就会发生事务传播。\n\
  \n例如，假设一位顾客想在书店收银台结账购买所有书籍。为了支持此操作，你按如下方式定义 `Cashier` 接口：`package com.apress.springrecipes.bookshop;`\n\
  \n...\n\n`public interface Cashier {`\n\n`public void checkout(List<String> isbns,\
  \ String username);`\n\n`}`\n\n你可以通过多次调用书店 bean 的 `purchase()` 方法将购买操作委托给它，从而实现此接口。请注意，`checkout()`\
  \ 方法通过应用 `@Transactional` 注解被设置为事务性的。\n\n`package com.apress.springrecipes.bookshop;`\n\
  \n...\n\n`import org.springframework.transaction.annotation.Transactional;`\n\n\
  `public class BookShopCashier implements Cashier {`\n\n`private BookShop bookShop;`\n\
  \n`public void setBookShop(BookShop bookShop) {`\n\n`this.bookShop = bookShop;`\n\
  \n`}`\n\n**`@Transactional`**\n\n`public void checkout(List<String> isbns, String\
  \ username) {`\n\n`for (String isbn : isbns) {`\n\n`bookShop.purchase(isbn, username);`\n\
  \n`}`\n\n`}`\n\n`}`\n\n然后在你的 bean 配置文件中定义一个 cashier bean，并引用用于购买书籍的书店 bean。\n\n\
  9799ch08.qxd 5/6/08 10:00 AM 第 268 页\n\n**268**\n\n第 8 章 **■** 在 Spring 中进行事务管理\n\
  \n`<bean id=\"cashier\"`\n\n`class=\"com.apress.springrecipes.bookshop.BookShopCashier\"\
  >`\n\n`<property name=\"bookShop\" ref=\"bookShop\" />`\n\n`</bean>`\n\n为了说明事务的传播行为，请在\
  \ bookshop 数据库中输入表 8-6、8-7 和 8-8 所示的数据。\n\n**表 8-6.** *用于测试传播行为的 BOOK 表中的示例数据* **ISBN**\n\
  \n**BOOK_NAME**\n\n**PRICE**\n\n第一本书\n\n第二本书\n\n**表 8-7.** *用于测试传播行为的 BOOK_STOCK\
  \ 表中的示例数据* **ISBN**\n\n**STOCK**\n\n**表 8-8.** *用于测试传播行为的 ACCOUNT 表中的示例数据* **USERNAME**\n\
  \n**BALANCE**\n\nuser1\n\n**REQUIRED 传播行为**\n\n当用户 user1 从收银台结账购买两本书时，余额足够购买第一本书，但不足以购买第二本。\n\
  \n`package com.apress.springrecipes.bookshop;`\n\n...\n\n`public class Main {`\n\
  \n`public static void main(String[] args) {`\n\n...\n\n`Cashier cashier = (Cashier)\
  \ context.getBean(\"cashier\");`\n\n`List<String> isbnList =`\n\n`Arrays.asList(new\
  \ String[] { \"0001\", \"0002\" });`\n\n`cashier.checkout(isbnList, \"user1\");`\n\
  \n`}`\n\n`}`\n\n当书店的 `purchase()` 方法被另一个事务性方法（如 `checkout()`）调用时，默认情况下它将在现有事务内运行。这种默认的传播行为称为\
  \ REQUIRED。这意味着只有一个事务，其边界是 `checkout()` 方法的开始和结束。该事务仅在 `checkout()` 方法结束时提交。\n\n\
  9799ch08.qxd 5/6/08 10:00 AM 第 269 页\n\n第 8 章 **■** 在 Spring 中进行事务管理\n\n**269**\n\
  \n因此，用户将无法购买任何一本书。\n\n图 8-2 说明了 REQUIRED 传播行为。\n\n**图 8-2.** *REQUIRED 事务传播行为*\n\
  \n\n\n然而，如果 `purchase()` 方法被一个非事务性方法调用，且当前没有正在进行的事务，那么它将启动一个新事务并在其自身事务内运行。\n\n传播事务属性可以在\
  \ `@Transactional` 注解中定义。\n\n例如，你可以按如下方式为该属性设置 REQUIRED 行为。实际上，由于这是默认行为，因此并非必需。\n\
  \npackage com.apress.springrecipes.bookshop;\n\n...\n\nimport org.springframework.transaction.annotation.Propagation;\n\
  \nimport org.springframework.transaction.annotation.Transactional;\n\npublic class\
