  \ + \" kilometer = \" + mile + \" mile\");\n        log.info(\"The method kilometerToMile()\
  \ ends with \" + mile);\n        return mile;\n    }\n}\n```\n\n现在，你可以自由选择 Commons\
  \ Logging 库支持的日志实现。目前它主要支持 Apache 的 Log4J 库和 JDK Logging API（适用于 JDK 1.4 及更高版本）。其中，Log4J\
  \ 是更好的选择，因为它更强大且更易于配置。\n\n**■注意** 要使用 Log4J 库，你必须在类路径中包含`log4j-1.2.14.jar`（位于 Spring\
  \ 安装目录的`lib/log4j`目录下）。一旦在类路径中检测到 Log4J 库，Commons Logging 将把它用作底层的日志实现。\n\n你可以通过位于类路径根目录下名为`log4j.properties`的属性文件来配置\
  \ Log4J 库。以下 Log4J 配置文件定义了一个名为`stdout`的日志附加器，它将按照指定模式控制的格式将日志消息输出到控制台。有关 Log4J 日志模式的更多信息，请参考\
  \ Log4J 文档。\n\n```\n### 直接将日志消息输出到 stdout ###\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\n\
  log4j.appender.stdout.layout=org.apache.log4j.PatternLayout\nlog4j.appender.stdout.layout.ConversionPattern=**➥**\n\
  %d{yyyy-MM-dd HH:mm:ss} %5p %c{1}:%L - %m%n\n\n### 设置根日志记录器级别 ###\nlog4j.rootLogger=error,\
  \ stdout\n```\n\n\n\n### 设置应用程序日志记录级别 ###\n\nlog4j.logger.com.apress.springrecipes.calculator=info\n\
  \nLog4J 支持六种日志记录级别，供您设置日志消息的紧急程度。\n\n按从高到低的顺序排列，它们分别是：fatal、error、warn、info、debug\
  \ 和 trace。如前面的 Log4J 配置文件中所指定，此应用程序的根（默认）日志记录级别为 error，这意味着默认情况下仅输出 error 和 fatal\
  \ 级别的日志。但对于 `com.apress.springrecipes.calculator` 包及其子包，级别高于 info 的日志也将被输出。\n\n\
  为了测试这两个计算器的基本功能以及日志记录配置，您可以编写如下所示的 `Main` 类：\n\npackage com.apress.springrecipes.calculator;\n\
  \npublic class Main {\n\npublic static void main(String[] args) {\n\nArithmeticCalculator\
  \ arithmeticCalculator = new ArithmeticCalculatorImpl(); arithmeticCalculator.add(1,\
  \ 2);\n\narithmeticCalculator.sub(4, 3);\n\narithmeticCalculator.mul(2, 3);\n\n\
  arithmeticCalculator.div(4, 2);\n\nUnitCalculator unitCalculator = new UnitCalculatorImpl();\n\
