  \ 支持\n\n```xml\n        http://www.springframework.org/schema/tx\n        http://www.springframework.org/schema/tx/spring-tx-2.5.xsd\"\
  >\n\n    <context:annotation-config />\n    ...\n\n</beans>\n```\n\n此 bean 后处理器还可以将实体管理器工厂注入到带有\
  \ `@PersistenceUnit` 注解的属性中。这允许您自行创建实体管理器和管理事务。这与通过 setter 方法注入实体管理器工厂没有区别。\n\n\
  ```java\npackage com.apress.springrecipes.course.jpa;\n\n...\n\nimport javax.persistence.EntityManagerFactory;\n\
  import javax.persistence.PersistenceUnit;\n\npublic class JpaCourseDao implements\
  \ CourseDao {\n\n    @PersistenceUnit\n    private EntityManagerFactory entityManagerFactory;\n\
  \n    ...\n\n}\n```\n\n`JpaTemplate` 会将原生的 JPA 异常转换为 Spring 的 `DataAccessException`\
  \ 层次结构中的异常。但是，当在 JPA 实体管理器上调用原生方法时，抛出的异常将是原生类型的 `PersistenceException`，或其他 Java\
  \ SE 异常，如 `IllegalArgumentException` 和 `IllegalStateException`。如果您希望将 JPA 异常转换为\
  \ Spring 的 `DataAccessException`，则必须将 `@Repository` 注解应用于您的 DAO 类。\n\n```java\n\
  package com.apress.springrecipes.course.jpa;\n\n...\n\nimport org.springframework.stereotype.Repository;\n\
  \n@Repository(\"courseDao\")\npublic class JpaCourseDao implements CourseDao {\n\
  \n    ...\n\n}\n```\n\n然后注册一个 `PersistenceExceptionTranslationPostProcessor` 实例，以将原生的\
  \ JPA 异常转换为 Spring 的 `DataAccessException` 层次结构中的异常。您还可以启用 `<context:component-scan>`\
  \ 并删除原始的 `JpaCourseDao` bean 声明，因为 `@Repository` 是 Spring 2.5 中的一个构造型注解。\n\n```xml\n\
  <beans ...>\n    ...\n\n    <context:component-scan\n        base-package=\"com.apress.springrecipes.course.jpa\"\
  \ />\n```\n\n9799ch09.qxd 5/6/08 10:05 AM 第 319 页\n\n第 9 章 **■** Spring ORM 支持\n\
  \n**319**\n\n```xml\n    <bean class=\"org.springframework.dao.annotation.\n   \
  \     PersistenceExceptionTranslationPostProcessor\" />\n\n</beans>\n```\n\n**9-6.\
  \ 小结**\n\n在本章中，您学习了如何将两个流行的 ORM 框架——Hibernate 和 JPA——集成到您的 Spring 应用程序中。Spring 对不同\
  \ ORM 框架的支持是一致的，因此您可以轻松地将这些技术应用于其他 ORM 框架。\n\n\n\n使用 ORM 框架时，必须通过其 API 配置资源工厂（例如\
  \ Hibernate 中的会话工厂和 JPA 中的实体管理器工厂）。Spring 提供了多个工厂 Bean，用于在 IoC 容器中创建作为单例 Bean 的\
  \ ORM 资源工厂，从而可以通过依赖注入在多个 Bean 之间共享。该资源工厂还可以利用 Spring 的数据访问设施，例如数据源和事务管理器。\n\n单独使用\
  \ ORM 框架时，必须为每个 DAO 操作重复某些常规任务。Spring 通过提供模板类、DAO 支持类以及事务管理器实现来简化 ORM 框架的使用。你可以以类似的方式将它们用于不同的\
  \ ORM 框架以及 JDBC。\n\n对于 Hibernate 和 JPA，你也可以使用其原生 API 实现可与 Spring 的 ORM 支持集成的 DAO。通过这种方式，你的\
  \ DAO 无需依赖 Spring 的 API，并且可以获得与使用模板类相同的优势。\n\n在下一章中，你将学习如何使用 Spring MVC 框架构建基于 Web\
  \ 的应用程序。\n\n9799ch09.qxd 5/6/08 10:05 AM 第 320 页\n\n9799ch10.qxd 5/14/08 3:30 PM\
  \ 第 321 页\n\n第 10 章\n\nSpring MVC 框架\n\n**本**章中，你将学习使用 Spring MVC 框架进行基于 Web 的应用程序开发。Spring\
  \ MVC 是 Spring 框架最重要的模块之一。它构建在强大的 Spring IoC 容器之上，并广泛利用容器特性来简化其配置。大多数 Spring MVC\
  \ 配置都写在 Bean 配置文件中。\n\n*模型-视图-控制器（MVC）*是 UI 设计中常见的设计模式。它通过分离应用程序中模型、视图和控制器的作用，将业务逻辑与\
  \ UI 解耦。\n\n*模型*负责封装供视图呈现的应用程序数据。*视图*仅应呈现这些数据，而不包含任何业务逻辑。*控制器*负责接收来自用户的请求，并调用后端服务进行业务处理。处理完成后，后端服务可能返回一些数据供视图呈现。控制器收集这些数据并准备模型供视图呈现。MVC\
  \ 模式的核心思想是将业务逻辑与 UI 分离，使它们能够独立更改而互不影响。\n\n在 Spring MVC 应用程序中，模型通常由领域对象组成，这些对象由服务层处理并由持久层持久化。视图通常是使用\
  \ Java 标准标签库（JSTL）编写的 JSP 模板。在 Spring 2.0 及更早版本中，控制器必须扩展 Spring 的某个控制器类。在 Spring\
  \ 2.5 中，控制器可以是任意使用 Spring 控制器注解标注的 Java 对象。控制器必须与服务层组件交互以进行业务处理，这些组件通常启用了事务管理。\n\
  \n完成本章后，你将能够使用 Spring MVC 开发 Java Web 应用程序。你还将了解 Spring MVC 常见的控制器和视图类型，以及应在何种情况下应用它们。此外，你将能够使用\
  \ Spring 2.5 中引入的基于注解的方法开发 Web 应用程序。\n\n**10-1. 使用 Spring MVC 开发一个简单的 Web 应用程序**\n\
  \n问题\n\n你希望使用 Spring MVC 开发一个简单的 Web 应用程序，以学习该框架的基本概念和配置。\n\n**321**\n\n9799ch10.qxd\
  \ 5/14/08 3:30 PM 第 322 页\n\n**322**\n\n第 10 章 **■** Spring MVC 框架\n\n解决方案\n\nSpring\
  \ MVC 的核心组件是`DispatcherServlet`。顾名思义，它主要负责将请求分派给适当的处理器进行处理。它是你需要在 Web 部署描述符中配置的唯一\
  \ Servlet。`DispatcherServlet`实现了 Sun 公司核心 Java EE 设计模式之一，称为*前端控制器*。它充当 Spring MVC\
  \ 框架的前端控制器，每个 Web 请求都必须经过它，以便它能够管理整个请求处理过程。\n\n当 Web 请求发送到 Spring MVC 应用程序时，`DispatcherServlet`将首先接收该请求。然后，它将组织在\
  \ Spring Web 应用程序上下文中配置的不同组件来处理此请求。图 10-1 显示了 Spring MVC 中请求处理的主要流程。\n\n**图 10-1.**\
  \ *Spring MVC 中请求处理的主要流程*\n\n当`DispatcherServlet`收到请求时，它将首先查找适当的处理器来处理该请求。`DispatcherServlet`通过一个或多个处理器映射将每个请求映射到处理器。处理器映射是在\
  \ Web 应用程序上下文中配置的、实现了`HandlerMapping`接口的 Bean。它负责为请求返回适当的处理器。处理器映射通常根据请求的 URL 将请求映射到处理器。\n\
  \n一旦`DispatcherServlet`选择了适当的处理器，它将调用该处理器来处理请求。处理器是能够处理 Web 请求的任意 Java 对象。Spring\
  \ MVC 中用于处理 Web 请求的最典型处理器是*控制器*。通常，控制器必须调用后端服务来处理请求。\n\n9799ch10.qxd 5/14/08 3:30\
  \ PM 第 323 页\n\n第 10 章 **■** Spring MVC 框架\n\n**323**\n\n控制器完成请求处理后，它会向`DispatcherServlet`返回一个模型和视图名称，或者有时返回一个视图对象。模型包含控制器希望传递给视图进行显示的属性。如果返回了视图名称，它将被解析为用于渲染的视图对象。绑定模型和视图的基本类是`ModelAndView`。\n\
  \n当`DispatcherServlet`收到模型和视图名称时，它会将逻辑视图名称解析为用于渲染的视图对象。`DispatcherServlet`通过一个或多个视图解析器解析视图。视图解析器是在\
  \ Web 应用程序上下文中配置的、实现了`ViewResolver`接口的 Bean。其职责是为逻辑视图名称返回一个视图对象。\n\n一旦`DispatcherServlet`将视图名称解析为视图对象，它将渲染该视图对象并传入控制器返回的模型。视图的职责是将模型属性显示给用户。\n\
  \n工作原理\n\n假设你要为体育中心开发一个场地预订系统。该应用程序的 UI 基于 Web，以便用户可以通过互联网进行在线预订。你将使用 Spring MVC\
  \ 开发此应用程序。首先，在`domain`子包中创建以下领域类：\n\n```java\npackage com.apress.springrecipes.court.domain;\n\
  \n...\n\npublic class Reservation {\n\n    private String courtName;\n    private\
  \ Date date;\n    private int hour;\n    private Player player;\n    private SportType\
  \ sportType;\n\n    // 构造方法、Getter 和 Setter\n    ...\n}\n```\n\n```java\npackage\
  \ com.apress.springrecipes.court.domain;\n\npublic class Player {\n\n    private\
  \ String name;\n    private String phone;\n\n    // 构造方法、Getter 和 Setter\n    ...\n\
  }\n```\n\n```java\npackage com.apress.springrecipes.court.domain;\n\npublic class\
  \ SportType {\n```\n\n9799ch10.qxd 5/14/08 3:30 PM 第 324 页\n\n**324**\n\n第 10 章\
  \ **■** Spring MVC 框架\n\n```java\n    private int id;\n    private String name;\n\
  \n    // 构造方法、Getter 和 Setter\n    ...\n}\n```\n\n然后，在`service`子包中定义以下服务接口，以向表示层提供预订服务：\n\
  \n```java\npackage com.apress.springrecipes.court.service;\n\n...\n\npublic interface\
