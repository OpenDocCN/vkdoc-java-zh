  \n...\n\n**<property name=\"validator\">**\n\n**<bean class=\"com.apress.springrecipes.court.domain.➥**\n\
  \n**PeriodicReservationValidator\" />**\n\n**</property>**\n\n</bean>\n\n如果表单页面中存在绑定或验证错误，向导表单控制器将重新显示该页面并附带错误消息。\n\
  \n**10-12. 将多个操作分组到一个控制器中**\n\n问题\n\n采用每个控制器对应一个操作的方法时，向应用程序添加一个操作意味着您需要在 Web 应用程序上下文中多配置一个控制器。为了使配置更简单，您希望尽量减少\
  \ Spring MVC 应用程序中控制器的数量。\n\n解决方案\n\nSpring MVC 提供的 `MultiActionController` 类允许您将多个相关操作分组到单个控制器中。您的控制器可以继承\
  \ `MultiActionController`，并包含多个处理程序方法来处理多个操作。\n\n在多操作控制器中，您可以定义一个或多个具有以下形式的处理程序方法：\n\
  \npublic (ModelAndView | Map | String | void) actionName(\n\nHttpServletRequest,\
  \ HttpServletResponse [,HttpSession] [,CommandObject]);\n\n处理程序方法的返回类型可以是 `ModelAndView`（模型以及视图名称或视图对象）、`Map`（仅模型）、`String`（仅视图名称）或\
  \ `void`（方法本身直接处理 HTTP 响应）。\n\n当通过处理程序映射将请求映射到多操作控制器时，必须将其缩小到控制器内的特定处理程序方法。`MultiActionController`\
  \ 允许您使用 `MethodNameResolver` 对象来配置方法映射。\n\n工作原理\n\n假设您需要开发一个功能来维护体育中心的成员列表。\n\n\
  首先，您定义 `Member` 领域类和 `MemberService` 接口，供管理员添加、删除和列出成员：\n\n9799ch10.qxd 5/14/08\
  \ 3:31 PM 第 376 页\n\n**376**\n\n第 10 章 **■** S P R I N G M V C 框 架\n\npackage com.apress.springrecipes.court.domain;\n\
  \npublic class Member {\n\nprivate String name;\n\nprivate String phone;\n\nprivate\
  \ String email;\n\n// Getters and Setters\n\n...\n\n}\n\npackage com.apress.springrecipes.court.service;\n\
  \n...\n\npublic interface MemberService {\n\npublic void add(Member member);\n\n\
  public void remove(String memberName);\n\npublic List<Member> list();\n\n}\n\n出于演示目的，您可以通过将成员存储在以成员名称为键的映射中来实现此接口。在生产应用程序中，您应将它们存储在数据库中。\n\
  \npackage com.apress.springrecipes.court.service;\n\n...\n\npublic class MemberServiceImpl\
  \ implements MemberService {\n\nprivate Map<String, Member> members = new TreeMap<String,\
  \ Member>(); public void add(Member member) {\n\nmembers.put(member.getName(), member);\n\
  \n}\n\npublic void remove(String memberName) {\n\nmembers.remove(memberName);\n\n\
  }\n\npublic List<Member> list() {\n\nreturn new ArrayList<Member>(members.values());\n\
  \n}\n\n}\n\n\n\n然后，在服务层配置文件（即 `court-service.xml`）中声明一个该类型的 Bean 实例：\n\n<bean id=\"\
  memberService\"\n\nclass=\"com.apress.springrecipes.court.service.MemberServiceImpl\"\
  \ />\n\n9799ch10.qxd 5/14/08 3:31 PM 第 377 页\n\n第 10 章 **■** S P R I N G M V C 框\
  \ 架\n\n**377**\n\n**创建多动作控制器**\n\n虽然你可以为每个动作编写一个简单的控制器，但这需要在 Web 应用上下文中额外配置三个控制器。由于这些控制器非常简单且密切相关，你应该考虑通过扩展\
  \ `MultiActionController` 类将它们组合成一个控制器。然后，你可以在此控制器中声明多个处理方法：\n\npackage com.apress.springrecipes.court.web;\n\
  \n...\n\nimport org.springframework.web.bind.ServletRequestUtils;\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \nimport org.springframework.web.servlet.mvc.multiaction.MultiActionController;\
  \ public class MemberController extends MultiActionController {\n\nprivate MemberService\
  \ memberService;\n\npublic void setMemberService(MemberService memberService) {\n\
  \nthis.memberService = memberService;\n\n}\n\npublic ModelAndView add(HttpServletRequest\
  \ request,\n\nHttpServletResponse response, Member member) throws Exception {\n\n\
  memberService.add(member);\n\nreturn new ModelAndView(\"redirect:list.htm\");\n\n\
  }\n\npublic ModelAndView remove(HttpServletRequest request,\n\nHttpServletResponse\
  \ response) throws Exception {\n\nString memberName = ServletRequestUtils.getRequiredStringParameter(\n\
  \nrequest, \"memberName\");\n\nmemberService.remove(memberName);\n\nreturn new ModelAndView(\"\
  redirect:list.htm\");\n\n}\n\npublic ModelAndView list(HttpServletRequest request,\n\
  \nHttpServletResponse response) throws Exception {\n\nList<Member> members = memberService.list();\n\
  \nreturn new ModelAndView(\"memberList\", \"members\", members);\n\n}\n\n}\n\n对于\
  \ `add()` 处理方法，你希望控制器将请求参数绑定到 `Member` 类型的命令对象，因此声明了第三个方法参数为该类型。对于 `remove()` 和\
  \ `list()` 处理方法，你只需声明请求和响应参数。当 `add()` 或 `remove()` 方法完成时，你会将用户重定向到列表页面以重新显示成员。\n\
  \n9799ch10.qxd 5/14/08 3:31 PM 第 378 页\n\n**378**\n\n第 10 章 **■** S P R I N G M\
  \ V C 框 架\n\n声明此控制器时，它需要引用服务层中的 `memberService` Bean 来维护成员列表：\n\n<bean id=\"memberController\"\
  \n\nclass=\"com.apress.springrecipes.court.web.MemberController\">\n\n<property\
  \ name=\"memberService\" ref=\"memberService\" />\n\n</bean>\n\n由于你在 Web 应用上下文中配置了\
  \ `ControllerClassNameHandlerMapping`，它会注意到此控制器的类型是 `MultiActionController`，然后为其生成以下映射：\n\
  \n**Member**Controller **➔** /member/*\n\n默认情况下，`MultiActionController` 通过方法名称将\
  \ URL 映射到处理方法。\n\n对于此控制器，URL 将映射到以下方法：\n\n/member/add.htm **➔** add()\n\n/member/remove.htm\
  \ **➔** remove()\n\n/member/list.htm **➔** list()\n\n现在，让我们为此控制器创建视图页面 `memberList.jsp`。在此页面中，有一个用于添加新成员的表单，后面跟着一个显示所有成员的列表。在列表的最后一列，有一个用于删除成员的链接。\n\
  \n<%@ [taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\" %>](http://java.sun.com/jsp/jstl/core)\n\
  \n<html>\n\n<head>\n\n<title>成员列表</title>\n\n</head>\n\n<body>\n\n<form action=\"\
  \ **add.htm**\">\n\n姓名 <input type=\"text\" name=\"name\" />\n\n电话 <input type=\"\
  text\" name=\"phone\" />\n\n邮箱 <input type=\"text\" name=\"email\" />\n\n<input\
  \ type=\"submit\" />\n\n</form>\n\n<table border=\"1\">\n\n<tr>\n\n<th>姓名</th>\n\
  \n<th>电话</th>\n\n<th>邮箱</th>\n\n<th></th>\n\n</tr>\n\n<c:forEach items=\"${members}\"\
  \ var=\"member\">\n\n<tr>\n\n<td>${member.name}</td>\n\n<td>${member.phone}</td>\n\
  \n9799ch10.qxd 5/14/08 3:31 PM 第 379 页\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n\
  **379**\n\n<td>${member.email}</td>\n\n<td><a href=\" **remove.htm**?memberName=${member.name}\"\
  >删除</a></td>\n\n</tr>\n\n</c:forEach>\n\n</table>\n\n</body>\n\n</html>\n\n由于显示此页面的列表动作是通过\
  \ `/member/list.htm` 访问的，因此添加成员表单应提交到相对 URL `add.htm`，它对应于 `/member/add.htm`。同理，删除超链接应链接到相对\
  \ URL `remove.htm`，它对应于 `/member/remove.htm`。\n\n一旦添加动作或删除动作完成，你会将用户的浏览器重定向到列表动作，以便重新显示成员列表。现在，你可以通过以下\
  \ URL 列出所有成员：\n\n[`localhost:8080/court/member/list.htm`](http://localhost:8080/court/member/list.htm)\n\
  \n**将 URL 映射到处理方法**\n\n默认情况下，`MultiActionController` 使用 `InternalPathMethodNameResolver`\
  \ 通过方法名称将 URL 映射到处理方法。但是，如果你想为映射的方法名称添加前缀或后缀，则必须显式配置此解析器：\n\n<bean id=\"memberController\"\
  \n\nclass=\"com.apress.springrecipes.court.web.MemberController\">\n\n...\n\n<property\
  \ name=\"methodNameResolver\">\n\n<bean class=\"org.springframework.web.servlet.mvc.multiaction.\
