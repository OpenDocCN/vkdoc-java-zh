  \ + filename);\n\nTransport.send(message);\n\n} catch (MessagingException e) {\n\
  \nthrow new RuntimeException(e);\n\n9799ch18.qxd 5/15/08 5:08 PM 第 683 页\n\n第 18\
  \ 章 **■** 对 JMX、电子邮件和调度的 Spring 支持\n\n**683**\n\n}\n\n}\n\n}\n\n首先，你通过定义属性打开一个连接到\
  \ SMTP 服务器的邮件会话。然后，你从这个会话中创建一个消息来构建你的电子邮件。之后，你通过调用`Transport.send()`来发送电子邮件。在处理\
  \ JavaMail API 时，你必须处理受检异常`MessagingException`。请注意，所有这些类、接口和异常都是由 JavaMail 定义的。\n\
  \n接下来，你在 Spring IoC 容器中声明一个`EmailErrorNotifier`实例，以便在文件复制错误时发送电子邮件通知。\n\n<bean id=\"\
  errorNotifier\"\n\nclass=\"com.apress.springrecipes.replicator.EmailErrorNotifier\"\
  \ /> 你可以编写以下`Main`类来测试`EmailErrorNotifier`。运行后，你可以配置你的电子邮件应用程序，通过 POP3 从你的 James\
