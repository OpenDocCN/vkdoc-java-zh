  \ ref=\"rateCalculator\" />\n\n</lang:groovy>\n\n<lang:bsh id=\"interestCalculator\"\
  \n\nscript-interfaces=\"com.apress.springrecipes.interest.InterestCalculator\">\n\
  \n**<lang:inline-script>**\n\n<![CDATA[\n\nimport com.apress.springrecipes.interest.RateCalculator;\n\
