  }\n\n}\n\n验证参数\n\n现在，让我们考虑为您的计算器添加一个限制。假设您希望计算器仅支持正数。在每个方法的开头，您调用 `validate()` 方法来检查所有参数是否为正数。对于任何负数，您将抛出\
