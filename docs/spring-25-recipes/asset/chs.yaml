  \n\n\n基于注解的 Portlet 表单控制器需要提供两个处理方法，一个用于处理渲染请求，另一个用于处理动作请求。例如，你可以使用注解重新实现旅游 Portlet\
  \ 中的预订表单控制器。\n\npackage com.apress.springrecipes.travel.tour;\n\n...\n\nimport javax.portlet.ActionResponse;\n\
