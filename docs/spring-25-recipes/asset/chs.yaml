  user1\");\n\n}\n\n}\n\n当你运行此应用程序时，会遇到一个 SQLException，因为违反了 ACCOUNT 表的 CHECK 约束。这是预期结果，因为你试图扣减的金额超过了账户余额。然而，如果你检查\
