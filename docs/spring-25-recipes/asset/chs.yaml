  \n如你所见，缺少事务管理会导致数据处于不一致状态。为了避免这种不一致，你的 purchase()操作中的三条 SQL 语句应在单个事务内执行。一旦事务中的任何操作失败，整个事务应回滚，以撤销已执行操作所做的所有更改。\n\
  \n使用 JDBC 提交和回滚管理事务\n\n使用 JDBC 更新数据库时，默认情况下每条 SQL 语句执行后会立即提交。这种行为称为*自动提交*。然而，这不允许你为操作管理事务。\n\
  \nJDBC 支持通过显式调用连接上的 commit()和 rollback()方法来实现基本的事务管理策略。但在此之前，你必须关闭默认开启的自动提交功能。\n\
  \npackage com.apress.springrecipes.bookshop;\n\n...\n\npublic class JdbcBookShop\
  \ implements BookShop {\n\n...\n\n9799ch08.qxd 5/6/08 10:00 AM 第 253 页\n\n第 8 章\
  \ **■** SPRING 中的事务管理\n\n**253**\n\npublic void purchase(String isbn, String username)\
  \ {\n\nConnection conn = null;\n\ntry {\n\nconn = dataSource.getConnection();\n\n\
  **conn.setAutoCommit(false);**\n\n...\n\n**conn.commit();**\n\n} catch (SQLException\
  \ e) {\n\n**if (conn != null) {**\n\n**try {**\n\n**conn.rollback();**\n\n**} catch\
  \ (SQLException e1) {}**\n\n**}**\n\nthrow new RuntimeException(e);\n\n} finally\
  \ {\n\nif (conn != null) {\n\ntry {\n\nconn.close();\n\n} catch (SQLException e)\
  \ {}\n\n}\n\n}\n\n}\n\n}\n\n数据库连接的自动提交行为可以通过调用 setAutoCommit()方法来改变。默认情况下，自动提交处于开启状态，每条\
  \ SQL 语句执行后会立即提交。要启用事务管理，你必须关闭此默认行为，并仅在所有 SQL 语句成功执行后才提交连接。如果任何语句出错，你必须回滚此连接所做的所有更改。\n\
  \n\n\n现在，如果你再次运行应用程序，当用户余额不足以购买书籍时，将不会扣除图书库存。\n\n虽然你可以通过显式提交和回滚 JDBC 连接来管理事务，但为此所需的代码是样板代码，你必须在不同的方法中重复编写。此外，这段代码是\
  \ JDBC 特有的，因此一旦你选择了其他数据访问技术，它也需要随之更改。Spring 的事务支持提供了一套与技术无关的工具，包括事务管理器、事务模板和事务声明支持，以简化你的事务管理任务。\n\
  \n**8-2. 选择事务管理器实现**\n\n问题\n\n通常，如果你的应用程序只涉及单一数据源，你可以简单地通过调用数据库连接的 `commit()` 和\
  \ `rollback()` 方法来管理事务。然而，如果你的事务跨越多个数据源，或者你更倾向于使用 Java EE 应用服务器提供的事务管理功能，你可能会选择\n\
  \n![Image 30](img/index-280_1.jpg)\n\n9799ch08.qxd 5/6/08 10:00 AM Page 254\n\n\
  **254**\n\n第 8 章 **■** SPRING 中的事务管理\n\nJava 事务 API (JTA)。此外，对于不同的对象/关系映射框架（如 Hibernate\
  \ 和 JPA），你可能需要调用不同的专有事务 API。\n\n因此，你必须为不同的技术处理不同的事务 API。这会使你很难从一组 API 切换到另一组。\n\n\
  解决方案\n\nSpring 从不同的事务管理 API 中抽象出了一套通用的事务工具。作为应用程序开发者，你可以直接使用这些事务工具，而无需深入了解底层的事务\
  \ API。借助这些工具，你的事务管理代码将与具体的事务技术无关。\n\nSpring 核心的事务管理抽象是 `PlatformTransactionManager`。它封装了一套与技术无关的事务管理方法。请记住，无论你在\
  \ Spring 中选择哪种事务管理策略（编程式或声明式），基本上都需要一个事务管理器。\n\n工作原理\n\n`PlatformTransactionManager`\
  \ 是所有 Spring 事务管理器的通用接口。Spring 内置了该接口的多个实现，用于不同的事务管理 API：\n\n*   如果你的应用程序只需处理单一数据源，并通过\
  \ JDBC 访问它，那么 `DataSourceTransactionManager` 应该能满足你的需求。\n*   如果你在 Java EE 应用服务器上使用\
  \ JTA 进行事务管理，则应使用 `JtaTransactionManager` 从应用服务器查找事务。\n*   如果你使用对象/关系映射框架访问数据库，则应为此框架选择相应的事务管理器，例如\
  \ `HibernateTransactionManager` 和 `JpaTransactionManager`。\n\n图 8-1 展示了 Spring 中\
  \ `PlatformTransactionManager` 接口的常见实现。\n\n**图 8-1.** *PlatformTransactionManager\
  \ 接口的常见实现*\n\n9799ch08.qxd 5/6/08 10:00 AM Page 255\n\n第 8 章 **■** SPRING 中的事务管理\n\
  \n**255**\n\n事务管理器在 Spring IoC 容器中作为一个普通 bean 进行声明。例如，以下 bean 配置声明了一个 `DataSourceTransactionManager`\
  \ 实例。它需要设置 `dataSource` 属性，以便能够管理由此数据源创建的连接的事务。\n\n<bean id=\"transactionManager\"\
  \n\nclass=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\">\n\
  \n<property name=\"dataSource\" ref=\"dataSource\" />\n\n</bean>\n\n**8-3. 使用事务管理器\
  \ API 以编程方式管理事务**\n\n问题\n\n\n\n你需要在业务方法中精确控制事务的提交和回滚时机，但又不想直接处理底层的事务 API。\n\n解决方案\n\
  \nSpring 的事务管理器提供了一个与技术无关的 API，允许你通过调用 `getTransaction()` 方法启动一个新事务，并通过调用 `commit()`\
  \ 和 `rollback()` 方法来管理它。由于 `PlatformTransactionManager` 是事务管理的抽象单元，你调用的事务管理方法将保证与技术无关。\n\
  \n工作原理\n\n为了演示如何使用事务管理器 API，我们创建一个新类 `TransactionalJdbcBookShop`，它将使用 Spring JDBC\
  \ 模板。由于该类需要处理事务管理器，你需要添加一个 `PlatformTransactionManager` 类型的属性，并允许通过 setter 方法注入它。\n\
  \n```java\npackage com.apress.springrecipes.bookshop;\n\nimport org.springframework.dao.DataAccessException;\n\
  \nimport org.springframework.jdbc.core.support.JdbcDaoSupport;\n\nimport org.springframework.transaction.PlatformTransactionManager;\n\
  \nimport org.springframework.transaction.TransactionDefinition;\n\nimport org.springframework.transaction.TransactionStatus;\n\
  \nimport org.springframework.transaction.support.DefaultTransactionDefinition;\n\
  \npublic class TransactionalJdbcBookShop extends JdbcDaoSupport implements BookShop\
  \ {\n\n    private PlatformTransactionManager transactionManager;\n\n    public\
  \ void setTransactionManager(\n            PlatformTransactionManager transactionManager)\
  \ {\n        this.transactionManager = transactionManager;\n    }\n\n    public\
  \ void purchase(String isbn, String username) {\n        TransactionDefinition def\
  \ = new DefaultTransactionDefinition();\n        TransactionStatus status = transactionManager.getTransaction(def);\n\
  \        try {\n            int price = getJdbcTemplate().queryForInt(\n       \
  \             \"SELECT PRICE FROM BOOK WHERE ISBN = ?\",\n                    new\
  \ Object[] { isbn });\n            getJdbcTemplate().update(\n                 \
  \   \"UPDATE BOOK_STOCK SET STOCK = STOCK - 1 \" +\n                    \"WHERE\
  \ ISBN = ?\", new Object[] { isbn });\n            getJdbcTemplate().update(\n \
  \                   \"UPDATE ACCOUNT SET BALANCE = BALANCE - ? \" +\n          \
  \          \"WHERE USERNAME = ?\",\n                    new Object[] { price, username\
  \ });\n            transactionManager.commit(status);\n        } catch (DataAccessException\
  \ e) {\n            transactionManager.rollback(status);\n            throw e;\n\
  \        }\n    }\n}\n```\n\n在启动新事务之前，你需要在 `TransactionDefinition` 类型的事务定义对象中指定事务属性。对于此示例，你可以直接创建一个\
  \ `DefaultTransactionDefinition` 实例来使用默认事务属性。\n\n一旦有了事务定义，你可以通过调用 `getTransaction()`\
  \ 方法，要求事务管理器使用该定义启动一个新事务。然后它会返回一个 `TransactionStatus` 对象来跟踪事务状态。如果所有语句都成功执行，你可以通过传入事务状态，要求事务管理器提交此事务。由于\
  \ Spring JDBC 模板抛出的所有异常都是 `DataAccessException` 的子类，当捕获到此类异常时，你可以要求事务管理器回滚事务。\n\n\
  在这个类中，你声明了通用类型 `PlatformTransactionManager` 的事务管理器属性。现在你需要注入一个合适的事务管理器实现。由于你只处理单个数据源并通过\
  \ JDBC 访问它，你应该选择 `DataSourceTransactionManager`。\n\n```xml\n<beans ...>\n    ...\n\
  \    <bean id=\"transactionManager\"\n        class=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\"\
  >\n        <property name=\"dataSource\" ref=\"dataSource\" />\n    </bean>\n\n\
  \    <bean id=\"bookShop\"\n        class=\"com.apress.springrecipes.bookshop.TransactionalJdbcBookShop\"\
  >\n        <property name=\"dataSource\" ref=\"dataSource\" />\n    </bean>\n</beans>\n\
  ```\n\n\n\n**<property name=\"transactionManager\" ref=\"transactionManager\" />**\n\
  \n</bean>\n\n</beans>\n\n**8-4. 使用事务模板以编程方式管理事务**\n\n问题\n\n假设你有一个业务方法的代码块（并非整个方法体），该代码块具有以下事务需求：\n\
  \n• 在代码块开始时启动一个新事务。\n\n• 在代码块成功完成后提交事务。\n\n• 如果在代码块中抛出异常，则回滚事务。\n\n如果你直接调用 Spring\
  \ 的事务管理器 API，事务管理代码可以以技术无关的方式进行通用化。然而，你可能不希望为每个类似的代码块重复编写样板代码。\n\n解决方案\n\n与 JDBC\
  \ 模板类似，Spring 也提供了一个事务模板来帮助你控制整个事务管理过程。你只需将代码块封装在实现 `TransactionCallback` 接口的回调类中，并将其传递给事务模板执行。这样，你就不需要为此代码块重复编写样板式的事务管理代码。\n\
  \n工作原理\n\n事务模板基于事务管理器创建，就像 JDBC 模板基于数据源创建一样。事务模板执行一个封装了事务性代码块的事务回调对象。你可以将回调接口实现为单独的类或内部类。如果实现为内部类，则必须将方法参数声明为\
  \ `final` 才能访问。\n\n```java\npackage com.apress.springrecipes.bookshop;\n\n...\n\n\
  import org.springframework.transaction.PlatformTransactionManager;\nimport org.springframework.transaction.TransactionStatus;\n\
  import org.springframework.transaction.support.TransactionCallbackWithoutResult;\n\
  import org.springframework.transaction.support.TransactionTemplate;\n\npublic class\
  \ TransactionalJdbcBookShop extends JdbcDaoSupport implements BookShop {\n\n   \
  \ private PlatformTransactionManager transactionManager;\n\n    public void setTransactionManager(\n\
  \            PlatformTransactionManager transactionManager) {\n        this.transactionManager\
  \ = transactionManager;\n    }\n\n    public void purchase(**final** String isbn,\
  \ **final** String username) {\n        **TransactionTemplate transactionTemplate\
  \ =**\n                **new TransactionTemplate(transactionManager);**\n      \
  \  **transactionTemplate.execute(new TransactionCallbackWithoutResult() {**\n  \
  \          **protected void doInTransactionWithoutResult(**\n                  \
  \  **TransactionStatus status) {**\n                int price = getJdbcTemplate().queryForInt(\n\
  \                        \"SELECT PRICE FROM BOOK WHERE ISBN = ?\",\n          \
  \              new Object[] { isbn });\n                getJdbcTemplate().update(\n\
  \                        \"UPDATE BOOK_STOCK SET STOCK = STOCK - 1 \" +\n      \
  \                  \"WHERE ISBN = ?\", new Object[] { isbn });\n               \
  \ getJdbcTemplate().update(\n                        \"UPDATE ACCOUNT SET BALANCE\
  \ = BALANCE - ? \" +\n                        \"WHERE USERNAME = ?\",\n        \
  \                new Object[] { price, username });\n            **}**\n       \
  \ **});**\n    }\n}\n```\n\n事务模板可以接受一个实现了 `TransactionCallback` 或 `TransactionCallbackWithoutResult`\
  \ 接口的事务回调对象。对于 `purchase()` 方法中用于扣除图书库存和账户余额的代码块，没有需要返回的结果，因此使用 `TransactionCallbackWithoutResult`\
  \ 即可。对于任何有返回值的代码块，则应实现 `TransactionCallback` 接口。回调对象的返回值最终将由模板的 `execute()` 方法返回。\n\
  \n在回调对象的执行过程中，如果它抛出了非检查型异常（例如，`RuntimeException` 和 `DataAccessException` 属于此类），或者你显式地在\
  \ `TransactionStatus` 参数上调用了 `setRollbackOnly()` 方法，则事务将被回滚。否则，事务将在回调对象完成后提交。\n\n\
  \n\n\n在 Bean 配置文件中，book shop Bean 仍然需要一个事务管理器来创建事务模板。\n\n<beans ...>\n\n...\n\n\
  <bean id=\"transactionManager\"\n\nclass=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\"\
  >\n\n<property name=\"dataSource\" ref=\"dataSource\" />\n\n</bean>\n\n<bean id=\"\
  bookShop\"\n\nclass=\"com.apress.springrecipes.bookshop.TransactionalJdbcBookShop\"\
  >\n\n<property name=\"dataSource\" ref=\"dataSource\" />\n\n<property name=\"transactionManager\"\
  \ ref=\"transactionManager\" />\n\n</bean>\n\n</beans>\n\n你也可以让 IoC 容器注入一个事务模板，而不是直接创建它。由于事务模板足以满足事务管理需求，你的类就不再需要引用事务管理器了。\n\
  \npackage com.apress.springrecipes.bookshop;\n\n...\n\nimport org.springframework.transaction.support.TransactionTemplate;\n\
  \npublic class TransactionalJdbcBookShop extends JdbcDaoSupport implements\n\nBookShop\
  \ {\n\n**private TransactionTemplate transactionTemplate;**\n\n**public void setTransactionTemplate(**\n\
  \n**TransactionTemplate transactionTemplate) {**\n\n**this.transactionTemplate =\
  \ transactionTemplate;**\n\n**}**\n\npublic void purchase(final String isbn, final\
  \ String username) {\n\ntransactionTemplate.execute(new TransactionCallbackWithoutResult()\
  \ {\n\nprotected void doInTransactionWithoutResult(TransactionStatus status) {\n\
  \n...\n\n}\n\n});\n\n}\n\n}\n\n9799ch08.qxd 5/6/08 10:00 AM Page 260\n\n**260**\n\
