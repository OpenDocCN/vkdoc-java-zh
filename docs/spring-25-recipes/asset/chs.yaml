  \n第 12 章 **■** Spring 测试支持\n\n**12-4. 在集成测试中管理应用上下文**\n\n问题\n\n在为 Spring 应用程序创建集成测试时，你需要访问在应用上下文中声明的\
  \ Bean。如果没有 Spring 的测试支持，你必须在测试的初始化方法中手动加载应用上下文，例如 JUnit 3.8 中的 `setUp()`，或 JUnit\
  \ 4 中带有 `@Before` 或 `@BeforeClass` 注解的方法。然而，由于初始化方法在每个测试方法或测试类之前被调用，同一个应用上下文可能会被多次重新加载。在一个包含许多\
  \ Bean 的大型应用程序中，加载应用上下文可能需要大量时间，这会导致你的测试运行缓慢。\n\n解决方案\n\nSpring 的测试支持工具可以帮助你管理测试的应用上下文，包括从一个或多个\
  \ Bean 配置文件中加载它，并在多次测试执行之间缓存它。应用上下文将在单个 JVM 内的所有测试中被缓存，使用配置文件位置作为键。因此，你的测试可以运行得更快，而无需多次重新加载同一个应用上下文。\n\
  \n在 2.5 之前的版本中，使用 Spring 对 JUnit 3.8 的遗留支持，你的测试类可以继承 `AbstractSingleSpringContextTests`\
  \ 基类，通过继承的 `getApplicationContext()` 方法来访问被管理的应用上下文。\n\n在 Spring 2.5 中，TestContext\
  \ 框架提供了两个与上下文管理相关的测试执行监听器。如果你没有显式指定自己的监听器，它们将默认注册到测试上下文管理器中。\n\n`DependencyInjectionTestExecutionListener`：此监听器将依赖项（包括被管理的应用上下文）注入到你的测试中。\n\
  \n`DirtiesContextTestExecutionListener`：此监听器处理 `@DirtiesContext` 注解，并在必要时重新加载应用上下文。\n\
  \n为了让 TestContext 框架管理应用上下文，你的测试类必须在内部与测试上下文管理器集成。为了方便起见，TestContext 框架提供了执行此操作的支持类，如表\
  \ 12-1 所示。这些类与测试上下文管理器集成，并实现了 `ApplicationContextAware` 接口，因此它们可以通过受保护的字段 `applicationContext`\
  \ 提供对被管理的应用上下文的访问。你的测试类只需为你的测试框架扩展相应的 TestContext 支持类即可。\n\n**表 12-1.** *用于上下文管理的\
  \ TestContext 支持类*\n\n**测试框架**\n\n**TestContext 支持类***\n\nJUnit 3.8\n\nAbstractJUnit38SpringContextTests\n\
  \nJUnit 4.4\n\nAbstractJUnit4SpringContextTests\n\nTestNG\n\nAbstractTestNGSpringContextTests\n\
  \n** 这三个 TestContext 支持类仅启用了* DependencyInjectionTestExecutionListener *和* DirtiesContextTestExecutionListener\
  \ *。*\n\n9799ch12.qxd 5/14/08 4:08 PM 第 439 页\n\n第 12 章 **■** Spring 测试支持\n\n**439**\n\
  \n\n\n如果你使用的是 JUnit 4.4 或 TestNG，你可以自行将测试类与测试上下文管理器集成，并直接实现 `ApplicationContextAware`\
  \ 接口，而无需继承 TestContext 支持类。这样，你的测试类就不会绑定到 TestContext 框架的类层次结构上，因此你可以扩展自己的基类。在 JUnit\
  \ 4.4 中，你可以简单地使用测试运行器 `SpringJUnit4ClassRunner` 来运行测试，从而集成测试上下文管理器。然而，在 TestNG 中，你必须手动与测试上下文管理器集成。\n\
  \n工作原理\n\n首先，让我们在 Bean 配置文件中声明一个 `AccountService` 实例和一个 `AccountDao` 实例，如下所示。稍后，你将为其创建集成测试。\n\
  \n<beans\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<bean id=\"accountDao\"\n\nclass=\"com.apress.springrecipes.bank.InMemoryAccountDao\"\
  \ />\n\n<bean id=\"accountService\"\n\nclass=\"com.apress.springrecipes.bank.AccountServiceImpl\"\
  >\n\n<constructor-arg ref=\"accountDao\" />\n\n</bean>\n\n</beans>\n\n**使用 JUnit\
  \ 3.8 遗留支持访问上下文**\n\n当使用 Spring 的 JUnit 3.8 遗留支持创建测试时，你的测试类可以继承 `AbstractSingleSpringContextTests`\
  \ 来访问管理的应用程序上下文：package com.apress.springrecipes.bank;\n\nimport org.springframework.test.AbstractSingleSpringContextTests;\n\
  \npublic class AccountServiceJUnit38LegacyTests extends\n\n**AbstractSingleSpringContextTests**\
  \ {\n\nprivate static final String TEST_ACCOUNT_NO = \"1234\";\n\nprivate AccountService\
  \ accountService;\n\n**protected String[] getConfigLocations() {**\n\n**return new\
  \ String[] { \"beans.xml\" };**\n\n**}**\n\nprotected void **onSetUp()** throws\
  \ Exception {\n\naccountService =\n\n9799ch12.qxd 5/14/08 4:08 PM Page 440\n\n**440**\n\
  \n第 12 章 **■** Spring 测试支持\n\n(AccountService) **getApplicationContext()**.getBean(\"\
  accountService\"); accountService.createAccount(TEST_ACCOUNT_NO);\n\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n\n}\n\npublic void testDeposit() {\n\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\n\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO), 150.0);\n\n}\n\
  \npublic void testWithDraw() {\n\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\n\
  \nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO), 50.0);\n\n}\n\nprotected\
  \ void **onTearDown()** throws Exception {\n\naccountService.removeAccount(TEST_ACCOUNT_NO);\n\
  \n}\n\n}\n\n在这个类中，你可以重写 `getConfigLocations()` 方法来返回 Bean 配置文件位置的列表，这些位置默认是相对于根目录的类路径位置，但它们支持\
  \ Spring 的资源前缀（例如 `file` 和 `classpath`）。或者，你可以重写 `getConfigPath()` 方法或 `getConfigPaths()`\
  \ 方法来返回一个或多个 Bean 配置文件路径，这些路径可以是绝对类路径位置（以斜杠开头），也可以是相对于当前测试类所在包的路径。\n\n默认情况下，应用程序上下文在首次加载后会被缓存，并为每个测试方法重用。但是，在某些情况下，例如当你修改了\
  \ Bean 配置或在测试方法中更改了 Bean 的状态时，你必须重新加载应用程序上下文。你可以调用 `setDirty()` 方法来指示应用程序上下文已“脏”，以便为下一个测试方法自动重新加载。\n\
  \n最后，请注意你不能重写基类的 `setUp()` 和 `tearDown()` 方法，因为它们被声明为 `final`。要执行初始化和清理任务，你必须重写\
  \ `onSetUp()` 和 `onTearDown()` 方法，这些方法将由父类的 `setUp()` 和 `tearDown()` 方法调用。\n\n**使用\
  \ JUnit 4.4 中的 TestContext 框架访问上下文**\n\n如果你使用 JUnit 4.4 和 TestContext 框架创建测试，你将有两个选项来访问管理的应用程序上下文。第一个选项是实现\
  \ `ApplicationContextAware` 接口。对于此选项，你必须显式指定一个 Spring 特定的测试运行器来运行你的测试：`SpringJUnit4ClassRunner`。你可以在类级别的\
  \ `@RunWith` 注解中指定它。\n\npackage com.apress.springrecipes.bank;\n\nimport static\
  \ org.junit.Assert.*;\n\n9799ch12.qxd 5/14/08 4:08 PM Page 441\n\n第 12 章 **■** Spring\
  \ 测试支持\n\n**441**\n\nimport org.junit.After;\n\nimport org.junit.Before;\n\nimport\
  \ org.junit.Test;\n\nimport org.junit.runner.RunWith;\n\nimport org.springframework.context.ApplicationContext;\n\
  \nimport org.springframework.context.ApplicationContextAware;\n\nimport org.springframework.test.context.ContextConfiguration;\n\
  \nimport org.springframework.test.context.junit4.SpringJUnit4ClassRunner;\n\n**@RunWith(SpringJUnit4ClassRunner.class)**\n\
  \n**@ContextConfiguration(locations = \"/beans.xml\")**\n\npublic class AccountServiceJUnit4ContextTests\
  \ implements **ApplicationContextAware** {\n\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\n\n**private ApplicationContext applicationContext;**\n\nprivate AccountService\
