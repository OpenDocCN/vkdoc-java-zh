  Setter 注入因其简单易用而广受欢迎，因为大多数 Java IDE 支持自动生成 setter 方法。然而，这种类型存在一些小问题。首先，作为组件设计者，您无法确保依赖项会通过
  setter 方法注入。如果组件用户忘记注入必需的依赖项，将会抛出讨厌的 NullPointerException，并且很难调试。但好消息是，一些高级的 IoC
  容器（例如 Spring IoC 容器）可以帮助您在组件初始化期间检查特定的依赖项。


  Setter 注入的另一个缺点与代码安全性有关。在第一次注入之后，依赖项可能仍然可以通过再次调用 setter 方法被修改，除非您已经实现了自己的安全措施来防止这种情况。对依赖项的粗心修改可能会导致意想不到的结果，并且很难调试。


  **构造函数注入（类型 3 IoC）**


  构造函数注入与 setter 注入的不同之处在于，依赖项是通过构造函数而不是 setter 方法注入的。这种注入类型也得到大多数 IoC 容器的支持。例如，ReportService
  可以接受一个报告生成器作为构造函数参数。但是，如果您这样做，Java 编译器将不会为此类添加默认构造函数，因为您已经定义了一个显式的构造函数。常见的做法是显式定义一个默认构造函数以保证代码兼容性。


  package com.apress.springrecipes.report;


  public class ReportService {


  private ReportGenerator reportGenerator;


  **public ReportService() {}**


  **public ReportService(ReportGenerator reportGenerator) {**


  **this.reportGenerator = reportGenerator;**


  **}**


  ...


  }


