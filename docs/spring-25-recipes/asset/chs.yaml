  \        http://www.springframework.org/schema/tx/spring-tx-2.5.xsd\">\n\n    ...\n\
  \n    <tx:annotation-driven />\n\n    <bean id=\"transactionManager\"\n        class=\"\
  org.springframework.orm.jpa.JpaTransactionManager\">\n        <property name=\"\
  entityManagerFactory\" ref=\"entityManagerFactory\" />\n    </bean>\n\n    <bean\
  \ name=\"courseDao\"\n        class=\"com.apress.springrecipes.course.jpa.JpaCourseDao\"\
  \ />\n\n    <bean class=\"org.springframework.orm.jpa.support.\n        PersistenceAnnotationBeanPostProcessor\"\
  \ />\n\n</beans>\n```\n\n在 Spring 2.5 中，一旦您启用了 `<context:annotation-config>` 元素，`PersistenceAnnotationBeanPostProcessor`\
  \ 实例将自动注册。因此，您可以删除其显式的 bean 声明。\n\n```xml\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
