  **18-7. 小结**\n\n在本章中，你学习了如何通过使用 MBeanExporter 将 Spring bean 导出为 JMX MBean。Spring\
  \ 还允许你在 IoC 容器中定义 JSR-160 连接器，以通过特定协议远程访问你的 MBean。Spring 提供了多个 MBean 装配器，用于装配 MBean\
  \ 的管理接口。通过使用 Spring 的 JMX 注解对 bean 进行注解，Spring 可以自动检测并将它们导出为 MBean。\n\nSpring 允许将要导出为\
  \ MBean 的 bean 通过通知发布器发布 JMX 通知。你可以在 IoC 容器中注册标准的 JMX 通知监听器来监听 JMX 通知。\n\nSpring\
  \ 支持两种远程 MBean 访问方式。首先，它提供了一个用于创建 MBean 服务器连接的工厂 bean，允许你使用 JMX API 操作 MBean。其次，它提供了另一个用于创建\
  \ MBean 代理的工厂 bean，允许你像操作本地 bean 一样操作远程 MBean。\n\nSpring 的电子邮件支持通过提供一个抽象且与实现无关的\
  \ API 来发送电子邮件，从而简化了发送电子邮件的任务。在 Spring 2.5 中，电子邮件支持仅提供基于 JavaMail 的实现。\n\nSpring\
  \ 为 JDK Timer 和 Quartz 提供了实用工具类，使你能够在 bean 配置文件中配置调度任务，而无需针对 JDK Timer 和 Quartz\
  \ API 进行编程。\n\n在下一章中，你将学习 Spring 对三种常见脚本语言的支持：JRuby、Groovy 和 BeanShell。\n\n9799ch19.qxd\
  \ 5/15/08 5:09 PM 第 697 页\n\n第\n\n1 9\n\n章\n\nSpring 中的脚本\n\n**在**本章中，你将学习如何在 Spring\
  \ 应用程序中使用脚本语言。Spring 2.5 支持三种不同的脚本语言：JRuby、Groovy 和 BeanShell。它们是 Java 社区中最流行的脚本语言，大多数\
  \ Java 开发人员都认为这些语言易于学习。\n\n\n\n*JRuby* ([`jruby.codehaus.org`](http://jruby.codehaus.org)/)\
  \ 是一种基于 Java 的开源实现，用于流行的 Ruby 编程语言 [(http://www.ruby-lang.org](http://www.ruby-lang.org))。JRuby\
  \ 支持 Java 和 Ruby 之间的双向访问，这意味着你可以从 Java 程序中直接调用 Ruby 脚本，也可以在 Ruby 脚本中访问 Java 类。\n\
  \n*Groovy* [(http://groovy.codehaus.org](http://groovy.codehaus.org)/) 是一种用于 Java\
  \ 平台的动态语言，它融合了其他优秀编程语言的特性。它可以被直接编译成 Java 字节码，也可以作为动态脚本语言使用。Groovy 的语法与 Java 非常相似，因此\
  \ Java 开发者可以快速学习 Groovy。此外，你可以在 Groovy 中访问所有 Java 类和库。\n\n*BeanShell* [(http://www.beanshell.org/)](http://www.beanshell.org)\
  \ 是一种轻量级的 Java 脚本语言，它可以动态执行 Java 代码片段，同时支持类似其他脚本语言的脚本特性。使用 BeanShell，你可以简单地为你 Java\
  \ 应用程序的动态模块编写脚本，而无需学习一门新语言。\n\n完成本章后，你将能够使用这些脚本语言为你的 Spring 应用程序编写部分脚本。\n\n**19-1.\
  \ 使用脚本语言实现 Bean**\n\n问题\n\n有时你的应用程序可能有一些需要频繁且动态更改的模块。如果使用 Java 实现这些模块，每次更改后都必须重新编译、重新打包和重新部署你的应用程序。你可能无法随时执行这些操作，尤其是对于\
  \ 7x24 小时运行的应用程序。\n\n解决方案\n\n你可以考虑使用脚本语言来实现任何需要频繁且动态更改的模块。脚本语言的优势在于，更改后无需重新编译，因此你只需部署新脚本即可使更改生效。\n\
  \n**697**\n\n9799ch19.qxd 5/15/08 5:09 PM 第 698 页\n\n**698**\n\n第 19 章 ■ Spring\
  \ 中的脚本支持\n\nSpring 允许你使用其支持的脚本语言之一来实现一个 Bean。\n\n你可以像配置一个用 Java 实现的普通 Bean 一样，在\
  \ IoC 容器中配置一个脚本化 Bean。\n\n工作原理\n\n假设你要开发一个需要计算利息的应用程序。首先，你定义以下 `InterestCalculator`\
  \ 接口：\n\npackage com.apress.springrecipes.interest;\n\npublic interface InterestCalculator\
  \ {\n\npublic void setRate(double rate);\n\npublic double calculate(double amount,\
  \ double year);\n\n}\n\n实现这个接口并不困难。然而，由于存在多种利息计算策略，用户可能需要非常频繁且动态地更改实现。你不想每次发生这种情况时都重新编译、重新打包和重新部署你的应用程序。因此，你考虑使用\
  \ Spring 支持的脚本语言之一来实现这个接口。\n\n在 Spring 的 Bean 配置文件中，你必须在 `<beans>` 根元素中包含 `lang`\
