  \ />**\n\n...\n\n</beans>\n\n**9-5\\. 使用 JPA 的上下文注入持久化对象**\n\n问题\n\n\n\n在 Java EE\
  \ 环境中，Java EE 容器能够为您管理实体管理器，并将其直接注入到您的 EJB 组件中。EJB 组件可以简单地对注入的实体管理器执行持久化操作，而无需过多关心实体管理器的创建和事务管理。\n\
  \n9799ch09.qxd 5/6/08 10:05 AM 第 316 页\n\n**316**\n\n第 9 章 **■** Spring ORM 支持\n\
  \n类似地，Spring 提供了 `JpaTemplate`，通过为您管理实体管理器和事务来简化 DAO 的实现。然而，使用 Spring 的 `JpaTemplate`\
  \ 意味着您的 DAO 依赖于 Spring 的 API。\n\n解决方案\n\nSpring 的 `JpaTemplate` 的一个替代方案是使用 JPA 的上下文注入。最初，`@PersistenceContext`\
  \ 注解用于在 EJB 组件中进行实体管理器注入。\n\nSpring 也可以通过 bean 后处理器来解释此注解。它会将实体管理器注入到带有此注解的属性中。Spring\
  \ 确保您在单个事务中的所有持久化操作都由同一个实体管理器处理。\n\n工作原理\n\n要使用上下文注入方法，您可以在 DAO 中声明一个实体管理器字段，并使用\
  \ `@PersistenceContext` 注解对其进行注解。Spring 会将一个实体管理器注入到此字段中，供您持久化对象。\n\n```java\npackage\
  \ com.apress.springrecipes.course.jpa;\n\n...\n\nimport javax.persistence.EntityManager;\n\
  import javax.persistence.PersistenceContext;\nimport javax.persistence.Query;\n\
  import org.springframework.transaction.annotation.Transactional;\n\npublic class\
  \ JpaCourseDao implements CourseDao {\n\n    @PersistenceContext\n    private EntityManager\
  \ entityManager;\n\n    @Transactional\n    public void store(Course course) {\n\
  \        entityManager.merge(course);\n    }\n\n    @Transactional\n    public void\
  \ delete(Long courseId) {\n        Course course = entityManager.find(Course.class,\
  \ courseId);\n        entityManager.remove(course);\n    }\n\n    @Transactional(readOnly\
  \ = true)\n    public Course findById(Long courseId) {\n        return entityManager.find(Course.class,\
  \ courseId);\n    }\n```\n\n9799ch09.qxd 5/6/08 10:05 AM 第 317 页\n\n第 9 章 **■**\
  \ Spring ORM 支持\n\n**317**\n\n```java\n    @Transactional(readOnly = true)\n   \
  \ public List<Course> findAll() {\n        Query query = entityManager.createQuery(\"\
  from Course\");\n        return query.getResultList();\n    }\n}\n```\n\n您可以使用 `@Transactional`\
  \ 注解每个 DAO 方法或整个 DAO 类，以使所有这些方法具有事务性。这确保了 DAO 方法内的持久化操作将在同一个事务中执行，因此由同一个实体管理器执行。\n\
  \n在 JPA 的 bean 配置文件中（即 `beans-jpa.xml`），您必须声明一个 `JpaTransactionManager` 实例，并通过 `<tx:annotation-driven>`\
  \ 启用声明式事务管理。您还需要注册一个 `PersistenceAnnotationBeanPostProcessor` 实例，以将实体管理器注入到带有 `@PersistenceContext`\
  \ 注解的属性中。\n\n```xml\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xmlns:tx=\"http://www.springframework.org/schema/tx\"\
