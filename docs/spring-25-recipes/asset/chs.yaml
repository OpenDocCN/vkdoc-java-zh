  \ PM 第 41 页\n\n第 3 章\n\nSpring 中的 Bean 配置\n\n**本**章中，您将学习 Spring IoC 容器中的基本组件配置。作为\
  \ Spring 框架的核心，IoC 容器被设计为高度自适应和可配置的。它提供了一套工具，使您的组件配置尽可能简单。因此，您可以轻松地配置您的组件以在 Spring\
  \ IoC 容器中运行。\n\n在 Spring 中，组件也被称为“bean”。请注意，这与 Sun 定义的 JavaBeans 规范概念不同。在 Spring\
  \ IoC 容器中声明的 bean 不一定是 JavaBeans。它们可以是任何 POJO（Plain Old Java Objects，普通老式 Java 对象）。\n\
  \n术语 *POJO* 指的是没有任何特定要求（例如实现特定接口或扩展特定基类）的普通 Java 对象。该术语用于将轻量级 Java 组件与其他复杂组件模型（例如\
  \ 3.0 版本之前的 EJB 组件）中的重量级组件区分开来。\n\n完成本章后，您将能够使用 Spring IoC 容器构建一个完整的 Java 应用程序。此外，如果您回顾旧的\
  \ Java 应用程序，您可能会发现通过使用 Spring IoC 容器，可以显著地简化和改进它们。\n\n**3-1. 在 Spring IoC 容器中配置\
  \ Bean**\n\n问题\n\nSpring 提供了一个强大的 IoC 容器来管理构成应用程序的 bean。\n\n要利用容器服务，您必须配置您的 bean\
  \ 以在 Spring IoC 容器中运行。\n\n解决方案\n\n您可以通过 XML 文件、属性文件甚至 API 在 Spring IoC 容器中配置您的 bean。本书将重点介绍基于\
  \ XML 的配置，因为它简单且成熟。如果您对其他方法感兴趣，可以查阅 Spring 文档以了解更多关于 bean 配置的信息。\n\nSpring 允许您在一个或多个\
  \ bean 配置文件中配置您的 bean。对于简单的应用程序，您可以将所有 bean 集中在一个配置文件中。但对于包含大量 bean 的大型应用程序，您应该根据其功能将它们分离到多个配置文件中。\n\
  \n**41**\n\n\n\n9799ch03.qxd 5/5/08 4:50 PM Page 42\n\n**42**\n\n第 3 章 **■** SPRING\
  \ 中的 Bean 配置\n\n工作原理\n\n假设你要开发一个用于生成序列号的应用程序。在这个应用程序中，可能需要为不同目的生成多个序列号系列。每个序列号系列都有自己的前缀、后缀和初始值。因此，你需要在应用程序中创建并维护多个生成器实例。\n\
  \n**创建 Bean 类**\n\n根据需求，你创建了 `SequenceGenerator` 类，该类包含三个属性：`prefix`、`suffix` 和\
  \ `initial`，这些属性可以通过 setter 方法或构造函数进行注入。私有字段 `counter` 用于存储该生成器的当前数值。每次在生成器实例上调用\
  \ `getSequence()` 方法时，你将获得最后一个序列号，并拼接上前缀和后缀。你将该方法声明为 `synchronized`，以确保线程安全。\n\n\
  package com.apress.springrecipes.sequence;\n\npublic class SequenceGenerator {\n\
  \nprivate String prefix;\n\nprivate String suffix;\n\nprivate int initial;\n\nprivate\
  \ int counter;\n\npublic SequenceGenerator() {}\n\npublic SequenceGenerator(String\
  \ prefix, String suffix, int initial) {\n\nthis.prefix = prefix;\n\nthis.suffix\
  \ = suffix;\n\nthis.initial = initial;\n\n}\n\npublic void setPrefix(String prefix)\
  \ {\n\nthis.prefix = prefix;\n\n}\n\npublic void setSuffix(String suffix) {\n\n\
  this.suffix = suffix;\n\n}\n\npublic void setInitial(int initial) {\n\nthis.initial\
  \ = initial;\n\n}\n\npublic synchronized String getSequence() {\n\nStringBuffer\
  \ buffer = new StringBuffer();\n\nbuffer.append(prefix);\n\nbuffer.append(initial\
  \ + counter++);\n\n9799ch03.qxd 5/5/08 4:50 PM Page 43\n\n第 3 章 **■** SPRING 中的\
  \ Bean 配置\n\n**43**\n\nbuffer.append(suffix);\n\nreturn buffer.toString();\n\n}\n\
  \n}\n\n如你所见，这个 `SequenceGenerator` 类对 `prefix`、`suffix` 和 `initial` 属性同时应用了构造函数注入和\
  \ setter 注入。\n\n**创建 Bean 配置文件**\n\n要通过 XML 在 Spring IoC 容器中声明 Bean，首先需要创建一个名称合适的\
  \ XML Bean 配置文件，例如 `beans.xml`。你可以将该文件放在类路径的根目录下，以便在 IDE 中更轻松地进行测试。在该 XML 文件的开头，你可以指定\
  \ Spring 2.0 DTD，以导入 Spring 2.x 的 Bean 配置文件的有效结构。在此配置文件中，你可以在根元素 `<beans>` 下定义一个或多个\
  \ Bean。\n\n<!DOCTYPE beans PUBLIC \"-//SPRING//DTD BEAN 2.0//EN\"\n\n[\"http://www.springframework.org/dtd/spring-beans-2.0.dtd\"\
  >](http://www.springframework.org/dtd/spring-beans-2.0.dtd)\n\n<beans>\n\n...\n\n\
  </beans>\n\nSpring 的配置是向后兼容的，因此你可以在 Spring 2.x 中继续使用现有的 1.0 配置文件（使用 Spring 1.0 DTD）。但这样你将无法使用\
  \ Spring 2.x 中引入的新配置功能。旧配置文件的使用主要是为了过渡目的。\n\nSpring 2.x 还支持使用 XSD 来定义 XML Bean 配置文件的有效结构。XSD\
  \ 相比传统的 DTD 有许多优势。在 Spring 2.x 中，最显著的优势是它允许你使用来自不同模式的自定义标签，使 Bean 配置更简单、更清晰。因此，我强烈建议尽可能使用\
  \ Spring XSD 而不是 DTD。Spring XSD 是版本特定的，但向后兼容。如果你使用的是 Spring 2.5，则应定义 Spring 2.5\
  \ XSD 以利用新的 2.5 特性。\n\n<beans\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n...\n\n</beans>\n\n**在 Bean 配置文件中声明 Bean**\n\n每个 Bean 应为 Spring IoC 容器提供一个唯一的名称和完全限定的类名。\n\
  \n\n\n容器来实例化它。对于每个简单类型的 Bean 属性（例如 `String` 和其他基本类型），你可以为其指定一个 `<value>` 元素。Spring\
  \ 会尝试将你的值转换为该属性的声明类型。要通过 Setter 注入配置属性，你需要使用 `<property>` 元素，并在其 `name` 属性中指定属性名称。\n\
  \n9799ch03.qxd 5/5/08 4:50 PM 第 44 页\n\n**44**\n\n第 3 章 **■** Spring 中的 Bean 配置\n\
  \n<bean name=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"prefix\">\n\n<value>30</value>\n\n</property>\n\n<property\
  \ name=\"suffix\">\n\n<value>A</value>\n\n</property>\n\n<property name=\"initial\"\
  >\n\n<value>100000</value>\n\n</property>\n\n</bean>\n\n你也可以通过构造函数注入来配置 Bean 属性，方法是在\
  \ `<constructor-arg>` 元素中声明它们。`<constructor-arg>` 中没有 `name` 属性，因为构造函数参数是基于位置的。\n\
  \n<bean name=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<constructor-arg>\n\n<value>30</value>\n\n</constructor-arg>\n\n<constructor-arg>\n\
  \n<value>A</value>\n\n</constructor-arg>\n\n<constructor-arg>\n\n<value>100000</value>\n\
  \n</constructor-arg>\n\n</bean>\n\n在 Spring IoC 容器中，每个 Bean 的名称应该是唯一的，尽管允许重复名称以覆盖\
  \ Bean 声明。Bean 的名称可以通过 `<bean>` 元素的 `name` 属性来定义。实际上，有一种更推荐的标识 Bean 的方式，即通过标准的 XML\
  \ `id` 属性，其目的是在 XML 文档中标识一个元素。这样，如果你的文本编辑器支持 XML，它可以在设计时帮助验证每个 Bean 的唯一性。\n\n<bean\
  \ **id**=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n...\n\n</bean>\n\n然而，XML 对 `id` 属性中可出现的字符有限制，但通常你不会在 Bean 名称中使用那些特殊字符。此外，Spring\
  \ 允许你在 `name` 属性中为 Bean 指定多个名称，用逗号分隔。但你不能在 `id` 属性中这样做，因为逗号在那里是不允许的。\n\n事实上，Bean\
  \ 的名称和 Bean ID 对于 Bean 来说都不是必需的。没有定义名称的 Bean 被称为*匿名 Bean*。\n\n9799ch03.qxd 5/5/08\
  \ 4:50 PM 第 45 页\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n**45**\n\n**通过快捷方式定义 Bean 属性**\n\
  \nSpring 支持一种快捷方式，用于指定简单类型属性的值。你可以在 `<property>` 元素中呈现一个 `value` 属性，而不是在其中包含一个 `<value>`\
  \ 元素。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"prefix\" **value=\"30\"** />\n\n<property name=\"suffix\"\
  \ **value=\"A\"** />\n\n<property name=\"initial\" **value=\"100000\"** />\n\n</bean>\n\
  \n这种快捷方式也适用于构造函数参数。\n\n<bean name=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<constructor-arg **value=\"30\"** />\n\n<constructor-arg **value=\"A\"** />\n\
  \n<constructor-arg **value=\"100000\"** />\n\n</bean>\n\nSpring 2.x 提供了另一种便捷的快捷方式来定义属性，即使用\
  \ `p` 模式将 Bean 属性定义为 `<bean>` 元素的属性。这可以缩短 XML 配置的行数。\n\n<beans\n\n[](http://www.springframework.org/schema/p)\n\
  \n**[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.springframework.org/schema/p)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.springframework.org/schema/p)\n\
  \n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  \n\n**p:prefix=\"30\" p:suffix=\"A\" p:initial=\"100000\"** />\n\n</beans>\n\n**3-2.\
  \ 实例化 Spring IoC 容器**\n\n问题\n\n你必须实例化 Spring IoC 容器，以便它通过读取配置来创建 Bean 实例。然后你可以从\
  \ IoC 容器中获取 Bean 实例来使用。\n\n解决方案\n\n\n\nSpring 提供了两种类型的 IoC 容器实现。基础的一种称为 *bean 工厂*，更高级的一种称为\
  \ *应用上下文*，它是 bean 工厂的兼容扩展。请注意，这两种 IoC 容器的 bean 配置文件是相同的。\n\n![图 24](img/index-72_1.png)\n\
  \n9799ch03.qxd 5/5/08 4:50 PM 第 46 页\n\n**46**\n\n第 3 章 **■** S P R I N G 中 的 B\
  \ E A N 配 置\n\n应用上下文在保持基本功能兼容的同时，提供了比 bean 工厂更高级的特性。因此，我强烈建议为每个应用程序使用应用上下文，除非该应用程序的资源受限，例如在\
  \ applet 或移动设备中运行时。\n\nbean 工厂和应用上下文的接口分别是 BeanFactory 和 ApplicationContext。ApplicationContext\
  \ 接口是 BeanFactory 的子接口，用于保持兼容性。\n\n工作原理\n\n**实例化 Bean 工厂**\n\n要实例化 bean 工厂，首先需要将\
  \ bean 配置文件加载到 Resource 对象中。例如，以下语句从类路径的根目录加载配置文件：\n\nResource resource = new ClassPathResource(\"\
  beans.xml\");\n\nResource 只是一个接口，而 ClassPathResource 是其实现之一，用于从类路径加载资源。Resource\
  \ 接口的其他实现，例如 FileSystemResource、InputStreamResource 和 UrlResource，用于从其他位置加载资源。图\
  \ 3-1 展示了 Spring 中 Resource 接口的常见实现。\n\n**图 3-1.** *Resource 接口的常见实现*\n\n接下来，你可以使用以下语句，通过传入已加载配置文件的\
  \ Resource 对象来实例化 bean 工厂：\n\nBeanFactory factory = new XmlBeanFactory(resource);\n\
  \n如前所述，BeanFactory 只是一个用于抽象 bean 工厂操作的接口，而 XmlBeanFactory 是从 XML 配置文件构建 bean 工厂的实现。\n\
  \n![图 25](img/index-73_1.png)\n\n9799ch03.qxd 5/5/08 4:50 PM 第 47 页\n\n第 3 章 **■**\
  \ S P R I N G 中 的 B E A N 配 置\n\n**47**\n\n**实例化应用上下文**\n\n与 BeanFactory 类似，ApplicationContext\
  \ 也只是一个接口。你需要实例化它的一个实现。ClassPathXmlApplicationContext 实现通过从类路径加载 XML 配置文件来构建应用上下文。你也可以为其指定多个配置文件。\n\
  \nApplicationContext context = new ClassPathXmlApplicationContext(\"beans.xml\"\
  ); 除了 ClassPathXmlApplicationContext，Spring 还提供了其他几个 ApplicationContext 实现。FileSystemXmlApplicationContext\
  \ 用于从文件系统加载 XML 配置文件，而 XmlWebApplicationContext 和 XmlPortletApplicationContext 仅可用于\
  \ Web 和门户应用程序。图 3-2 展示了 Spring 中 ApplicationContext 接口的常见实现。\n\n**图 3-2.** *ApplicationContext\
  \ 接口的常见实现* **从 IoC 容器获取 Bean**\n\n要从 bean 工厂或应用上下文中获取已声明的 bean，只需调用 getBean() 方法并传入唯一的\
  \ bean 名称即可。getBean() 方法的返回类型是 java.lang.Object，因此在使用前必须将其强制转换为实际类型。\n\nSequenceGenerator\
  \ generator =\n\n(SequenceGenerator) context.getBean(\"sequenceGenerator\");\n\n\
  至此，你可以像使用通过构造函数创建的任何对象一样自由地使用该 bean。以下 Main 类给出了运行序列生成器应用程序的完整源代码：\n\npackage com.apress.springrecipes.sequence;\n\
  \nimport org.springframework.context.ApplicationContext;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\n\
  \n9799ch03.qxd 5/5/08 4:50 PM 第 48 页\n\n**48**\n\n\n\n第 3 章 **■** Spring 中的 Bean\
  \ 配置\n\npublic class Main {\n\npublic static void main(String[] args) {\n\nApplicationContext\
  \ context =\n\nnew ClassPathXmlApplicationContext(\"beans.xml\");\n\nSequenceGenerator\
  \ generator =\n\n(SequenceGenerator) context.getBean(\"sequenceGenerator\");\n\n\
  System.out.println(generator.getSequence());\n\nSystem.out.println(generator.getSequence());\n\
  \n}\n\n}\n\n如果一切正常，你应该会看到以下序列号输出，以及一些你可能不感兴趣的日志信息：\n\n30100000A\n\n30100001A\n\n\
  **3-3. 解决构造器歧义**\n\n问题\n\n当你为一个 Bean 指定一个或多个构造器参数时，Spring 会尝试在 Bean 类中找到一个合适的构造器，并传入你的参数来实例化\
  \ Bean。然而，如果你的参数可以应用于多个构造器，就可能导致构造器匹配上的歧义。在这种情况下，Spring 可能无法调用你期望的构造器。\n\n解决方案\n\
  \n你可以为`<constructor-arg>`元素指定`type`和`index`属性，以帮助 Spring 找到你期望的构造器。\n\n工作原理\n\n\
  现在，让我们为`SequenceGenerator`类添加一个新的构造器，该构造器以`prefix`和`suffix`作为参数。\n\npackage com.apress.springrecipes.sequence;\n\
  \npublic class SequenceGenerator {\n\n...\n\npublic SequenceGenerator(String prefix,\
  \ String suffix) {\n\nthis.prefix = prefix;\n\nthis.suffix = suffix;\n\n9799ch03.qxd\
  \ 5/5/08 4:50 PM Page 49\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n**49**\n\n}\n\n}\n\n\
  在其 Bean 声明中，你可以通过`<constructor-arg>`元素指定一个或多个构造器参数。Spring 会尝试为该类找到一个合适的构造器，并传入你的参数来实例化\
  \ Bean。回想一下，`<constructor-arg>`中没有`name`属性，因为构造器参数是基于位置的。\n\n<bean id=\"sequenceGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\">\n\n<constructor-arg\
  \ value=\"30\" />\n\n<constructor-arg value=\"A\" />\n\n<property name=\"initial\"\
  \ value=\"100000\" />\n\n</bean>\n\n对于这两个参数，Spring 很容易找到对应的构造器，因为只有一个构造器需要两个参数。假设你必须为`SequenceGenerator`添加另一个以`prefix`和`initial`为参数的构造器。\n\
  \npackage com.apress.springrecipes.sequence;\n\npublic class SequenceGenerator {\n\
  \n...\n\npublic SequenceGenerator(String prefix, String suffix) {\n\nthis.prefix\
  \ = prefix;\n\nthis.suffix = suffix;\n\n}\n\n**public SequenceGenerator(String prefix,\
  \ int initial) {**\n\n**this.prefix = prefix;**\n\n**this.initial = initial;**\n\
  \n**}**\n\n}\n\n为了调用这个构造器，你进行以下 Bean 声明，传入一个`prefix`和一个`initial`值。剩余的`suffix`通过\
  \ setter 方法注入。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n**<constructor-arg value=\"30\" />**\n\n**<constructor-arg value=\"100000\"\
  \ />**\n\n<property name=\"suffix\" value=\"A\" />\n\n</bean>\n\n然而，如果你现在运行应用程序，你将得到以下结果：300A\n\
  \n301A\n\n9799ch03.qxd 5/5/08 4:50 PM Page 50\n\n**50**\n\n第 3 章 **■** Spring 中的\
  \ Bean 配置\n\n这个意外结果的原因是，第一个以`prefix`和`suffix`为参数的构造器被调用了，而不是第二个。这是因为 Spring 默认将你的两个参数都解析为`String`类型，并认为第一个构造器最合适，因为不需要进行类型转换。要指定参数的预期类型，你必须在`<constructor-arg>`的`type`属性中进行设置。\n\
  \n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<constructor-arg **type=\"java.lang.String\"** value=\"30\" />\n\n<constructor-arg\
  \ **type=\"int\"** value=\"100000\" />\n\n<property name=\"suffix\" value=\"A\"\
  \ />\n\n</bean>\n\n现在，为`SequenceGenerator`再添加一个以`initial`和`suffix`为参数的构造器，并相应地修改你的\
  \ Bean 声明。\n\npackage com.apress.springrecipes.sequence;\n\n\n\npublic class SequenceGenerator\
  \ {\n\n...\n\npublic SequenceGenerator(String prefix, String suffix) {\n\nthis.prefix\
  \ = prefix;\n\nthis.suffix = suffix;\n\n}\n\npublic SequenceGenerator(String prefix,\
  \ int initial) {\n\nthis.prefix = prefix;\n\nthis.initial = initial;\n\n}\n\n**public\
  \ SequenceGenerator(int initial, String suffix) {**\n\n**this.initial = initial;**\n\
  \n**this.suffix = suffix;**\n\n**}**\n\n}\n\n<bean id=\"sequenceGenerator\"\n\n\
  class=\"com.apress.springrecipes.sequence.SequenceGenerator\">\n\n**<constructor-arg\
  \ type=\"int\" value=\"100000\" />**\n\n**<constructor-arg type=\"java.lang.String\"\
  \ value=\"A\" />**\n\n<property name=\"prefix\" value=\"30\" />\n\n</bean>\n\n如果再次运行应用程序，你可能会得到正确的结果，或者出现以下意外结果：\n\
  \n30100000null\n\n30100001null\n\n9799ch03.qxd 5/5/08 4:50 PM Page 51\n\n第 3 章 **■**\
  \ Spring 中的 Bean 配置\n\n**51**\n\n这种不确定性的原因是，Spring 会在内部为每个构造函数与你的参数进行兼容性评分。但在评分过程中，参数在\
  \ XML 中出现的顺序并不被考虑。这意味着，从 Spring 的角度来看，第二个和第三个构造函数将获得相同的评分。具体选择哪一个取决于哪个先被匹配到。根据 Java\
  \ 反射 API，更准确地说是 `Class.getDeclaredConstructors()` 方法，返回的构造函数顺序是任意的，可能与声明顺序不同。所有这些因素共同作用，导致了构造函数匹配的歧义性。\n\
  \n要避免这个问题，你必须通过 `<constructor-arg>` 的 `index` 属性显式指定参数的索引。同时设置了 `type` 和 `index`\
  \ 属性后，Spring 就能准确地为 Bean 找到期望的构造函数。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"\
  com.apress.springrecipes.sequence.SequenceGenerator\">\n\n<constructor-arg type=\"\
  int\" **index=\"0\"** value=\"100000\" />\n\n<constructor-arg type=\"java.lang.String\"\
  \ **index=\"1\"** value=\"A\" />\n\n<property name=\"prefix\" value=\"30\" />\n\n\
  </bean>\n\n然而，如果你非常确定你的构造函数不会引起歧义，则可以省略 `type` 和 `index` 属性。\n\n**3-4. 指定 Bean 引用**\n\
  \n问题\n\n构成应用程序的 Bean 通常需要相互协作才能完成应用的功能。为了让 Bean 能够互相访问，你必须在 Bean 配置文件中指定 Bean 引用。\n\
  \n解决方案\n\n在 Bean 配置文件中，你可以通过 `<ref>` 元素为 Bean 属性或构造函数参数指定 Bean 引用。这就像通过 `<value>`\
  \ 元素指定一个简单值一样简单。你也可以直接在属性或构造函数参数中内嵌一个 Bean 声明，作为内部 Bean。\n\n工作原理\n\n为序列生成器接受一个字符串值作为前缀，这种方式不够灵活，难以适应未来的需求。如果前缀的生成能够通过某种编程逻辑进行定制，那就更好了。你可以创建\
  \ `PrefixGenerator` 接口来定义前缀生成操作。\n\npackage com.apress.springrecipes.sequence;\n\
  \npublic interface PrefixGenerator {\n\npublic String getPrefix();\n\n}\n\n9799ch03.qxd\
  \ 5/5/08 4:50 PM Page 52\n\n**52**\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n一种前缀生成策略是使用特定的模式来格式化当前系统日期。让我们创建实现\
  \ `PrefixGenerator` 接口的 `DatePrefixGenerator` 类。\n\npackage com.apress.springrecipes.sequence;\n\
  \n...\n\npublic class DatePrefixGenerator implements PrefixGenerator {\n\nprivate\
  \ DateFormat formatter;\n\npublic void setPattern(String pattern) {\n\nthis.formatter\
  \ = new SimpleDateFormat(pattern);\n\n}\n\npublic String getPrefix() {\n\nreturn\
  \ formatter.format(new Date());\n\n}\n\n}\n\n该生成器的模式将通过 setter 方法 `setPattern()`\
  \ 注入，然后用于创建 `java.text.DateFormat` 对象来格式化日期。由于一旦 `DateFormat` 对象创建完成，模式字符串就不再使用，因此没有必要将其存储在私有字段中。\n\
  \n\n\n现在，你可以声明一个类型为 `DatePrefixGenerator` 的 Bean，并为其指定任意的日期格式化模式字符串。\n\n<bean id=\"\
  datePrefixGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.DatePrefixGenerator\"\
  >\n\n<property name=\"pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n**为 Setter 方法指定\
  \ Bean 引用**\n\n为了应用这种前缀生成器方法，`SequenceGenerator` 类应接受一个 `PrefixGenerator` 类型的对象，而不是一个简单的前缀字符串。你可以选择使用\
  \ Setter 注入来接受这个前缀生成器。你需要删除 `prefix` 属性及其会导致编译错误的 Setter 方法和构造函数。\n\npackage com.apress.springrecipes.sequence;\n\
  \npublic class SequenceGenerator {\n\n...\n\n**private PrefixGenerator prefixGenerator;**\n\
  \n**public void setPrefixGenerator(PrefixGenerator prefixGenerator) {**\n\n**this.prefixGenerator\
  \ = prefixGenerator;**\n\n**}**\n\npublic synchronized String getSequence() {\n\n\
  StringBuffer buffer = new StringBuffer();\n\n9799ch03.qxd 5/5/08 4:50 PM Page 53\n\
  \n第 3 章 **■** Spring 中的 Bean 配置\n\n**53**\n\n**buffer.append(prefixGenerator.getPrefix());**\n\
  \nbuffer.append(initial + counter++);\n\nbuffer.append(suffix);\n\nreturn buffer.toString();\n\
  \n}\n\n}\n\n然后，`SequenceGenerator` Bean 可以通过在内部包含一个 `<ref>` 元素，来引用 `datePrefixGenerator`\
  \ Bean 作为其 `prefixGenerator` 属性。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\"\
  \ value=\"A\" />\n\n**<property name=\"prefixGenerator\">**\n\n**<ref bean=\"datePrefixGenerator\"\
  \ />**\n\n**</property>**\n\n</bean>\n\n`<ref>` 元素的 `bean` 属性中的 Bean 名称可以引用 IoC\
  \ 容器中的任何 Bean，即使它没有定义在同一个 XML 配置文件中。如果你要引用同一个 XML 文件中的 Bean，则应使用 `local` 属性，因为它是一个\
  \ XML ID 引用。\n\n你的 XML 编辑器可以帮助验证具有该 ID 的 Bean 是否存在于同一个 XML 文件中（即引用完整性）。\n\n<bean\
  \ id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n...\n\n<property name=\"prefixGenerator\">\n\n<ref **local**=\"datePrefixGenerator\"\
  \ />\n\n</property>\n\n</bean>\n\n还有一种便捷的简写方式，可以在 `<property>` 元素的 `ref` 属性中指定 Bean\
  \ 引用。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n...\n\n**<property name=\"prefixGenerator\" ref=\"datePrefixGenerator\" />**\n\
  \n</bean>\n\n但通过这种方式，你的 XML 编辑器将无法验证引用的完整性。实际上，它的效果与指定 `<ref>` 元素的 `bean` 属性相同。\n\
  \nSpring 2.x 提供了另一种便捷的简写方式来指定 Bean 引用。即使用 `p` 模式将 Bean 引用指定为 `<bean>` 元素的属性。这可以缩短\
  \ XML 配置的行数。\n\n<beans\n\n[](http://www.springframework.org/schema/p)\n\n**9799ch03.qxd\
  \ 5/5/08 4:50 PM Page 54\n\n**54**\n\n第 3 章 **■** Spring 中的 Bean 配置\n\nxsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n\nhttp://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  >\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  \n\np:suffix=\"A\" p:initial=\"1000000\"\n\n**p:prefixGenerator-ref=\"datePrefixGenerator\"\
  ** />\n\n</beans>\n\n为了区分 Bean 引用和简单的属性值，你需要在属性名后添加 `-ref` 后缀。\n\n**为构造函数参数指定 Bean\
  \ 引用**\n\nBean 引用也可以应用于构造函数注入。例如，你可以添加一个接受 `PrefixGenerator` 对象作为参数的构造函数。\n\npackage\
  \ com.apress.springrecipes.sequence;\n\npublic class SequenceGenerator {\n\n...\n\
  \n**private PrefixGenerator prefixGenerator;**\n\n**public SequenceGenerator(PrefixGenerator\
  \ prefixGenerator) {**\n\n**this.prefixGenerator = prefixGenerator;**\n\n**}**\n\
  \n}\n\n在 `<constructor-arg>` 元素中，你可以像在 `<property>` 元素中一样，通过 `<ref>` 来包含一个 Bean\
  \ 引用。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n**<constructor-arg>**\n\n**<ref local=\"datePrefixGenerator\" />**\n\n**</constructor-arg>**\n\
  \n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\" value=\"\
  A\" />\n\n</bean>\n\n指定 Bean 引用的简写方式同样适用于 `<constructor-arg>`。\n\n<bean id=\"sequenceGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\">\n\n**<constructor-arg\
  \ ref=\"datePrefixGenerator\" />**\n\n...\n\n</bean>\n\n9799ch03.qxd 5/5/08 4:50\
  \ PM Page 55\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n**55**\n\n**声明内部 Bean**\n\n每当一个\
  \ Bean 实例仅用于某个特定属性时，可以将其声明为内部 Bean。内部 Bean 声明直接包含在 `<property>` 或 `<constructor-arg>`\
  \ 元素内，不设置任何 `id` 或 `name` 属性。这样，该 Bean 将是匿名的，因此你不能在其他任何地方使用它。实际上，即使你为内部 Bean 定义了\
  \ `id` 或 `name` 属性，它也会被忽略。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\"\
  \ value=\"A\" />\n\n**<property name=\"prefixGenerator\">**\n\n**<bean class=\"\
  com.apress.springrecipes.sequence.DatePrefixGenerator\">**\n\n**<property name=\"\
  pattern\" value=\"yyyyMMdd\" />**\n\n**</bean>**\n\n**</property>**\n\n</bean>\n\
  \n内部 Bean 也可以在构造函数参数中声明。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n**<constructor-arg>**\n\n**<bean class=\"com.apress.springrecipes.sequence.DatePrefixGenerator\"\
  >**\n\n**<property name=\"pattern\" value=\"yyyyMMdd\" />**\n\n**</bean>**\n\n**</constructor-arg>**\n\
  \n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\" value=\"\
  A\" />\n\n</bean>\n\n**3-5. 使用依赖检查检查属性**\n\n问题\n\n在生产规模的应用中，IoC 容器中可能声明了成百上千个 Bean，它们之间的依赖关系通常非常复杂。Setter\
  \ 注入的缺点之一是，你无法确保某个属性一定会被注入。要检查所有必需的属性是否都已设置，对你来说非常困难。\n\n解决方案\n\nSpring 的依赖检查功能可以帮助你检查\
  \ Bean 上是否已设置了所有特定类型的属性。你只需在 `<bean>` 的 `dependency-check` 属性中指定依赖检查模式即可。请注意，依赖检查功能只能检查属性是否已被设置，但不能检查其值是否不为\
  \ null。表 3-1 列出了 Spring 支持的所有依赖检查模式。\n\n9799ch03.qxd 5/5/08 4:50 PM Page 56\n\n\
  **56**\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n**表 3-1.** *Spring 支持的依赖检查模式*\n\n**模式**\n\
  \n**描述**\n\nnone*\n\n不执行任何依赖检查。任何属性都可以保持未设置状态。\n\nsimple\n\n如果任何简单类型（基本类型和集合类型）的属性未被设置，将抛出\
  \ `UnsatisfiedDependencyException`。\n\nobjects\n\n如果任何对象类型（非简单类型）的属性未被设置，将抛出 `UnsatisfiedDependencyException`。\n\
  \nall\n\n如果任何类型的属性未被设置，将抛出 `UnsatisfiedDependencyException`。\n\n** 默认模式为* none *，但可以通过设置\
  \ `<beans>` 根元素的 `default-dependency-check` 属性来更改。如果指定了 Bean 自身的模式，此默认模式将被覆盖。设置此属性时必须非常小心，因为它会更改\
  \ IoC 容器中所有 Bean 的默认依赖检查模式。*\n\n工作原理\n\n**检查简单类型的属性**\n\n\n\n假设没有为序列生成器设置后缀属性，那么生成器生成的序列号后缀将是空字符串。这类问题通常很难调试，尤其是在复杂的\
  \ bean 中。幸运的是，Spring 能够检查特定类型的所有属性是否都已设置。要让 Spring 检查简单类型（即基本类型和集合类型）的属性，请将 `<bean>`\
  \ 的 `dependency-check` 属性设置为 `simple`。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"\
  com.apress.springrecipes.sequence.SequenceGenerator\"\n\n**dependency-check=\"simple\"\
  ** >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"prefixGenerator\"\
  \ ref=\"datePrefixGenerator\" />\n\n</bean>\n\n如果此类类型的任何属性尚未设置，则会抛出 `UnsatisfiedDependencyException`\
  \ 异常，指示未设置的属性。\n\nException in thread \"main\"\n\norg.springframework.beans.factory.UnsatisfiedDependencyException:\
  \ Error creating bean with name 'sequenceGenerator' defined in class path resource\
  \ [beans.xml]: Unsatisfied dependency expressed through bean property 'suffix':\
  \ Set this property value or disable dependency checking for this bean.\n\n9799ch03.qxd\
  \ 5/5/08 4:50 PM Page 57\n\n第 3 章 **■** SPRING 中的 BEAN 配置\n\n**57**\n\n**检查对象类型的属性**\n\
  \n如果未设置前缀生成器，则在请求生成前缀时会抛出讨厌的 `NullPointerException`。要为对象类型（即非简单类型）的 bean 属性启用依赖检查，请将\
  \ `dependency-check` 属性更改为 `objects`。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"\
  com.apress.springrecipes.sequence.SequenceGenerator\"\n\n**dependency-check=\"objects\"\
  ** >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\"\
  \ value=\"A\" />\n\n</bean>\n\n然后，当你运行应用程序时，Spring 会通知你 `prefixGenerator` 属性尚未设置。\n\
  \nException in thread \"main\"\n\norg.springframework.beans.factory.UnsatisfiedDependencyException:\
  \ Error creating bean with name 'sequenceGenerator' defined in class path resource\
  \ [beans.xml]: Unsatisfied dependency expressed through bean property 'prefixGenerator':\
  \ Set this property value or disable dependency checking for this bean.\n\n**检查所有类型的属性**\n\
  \n如果你想检查所有 bean 属性，无论其类型如何，可以将 `dependency-check` 属性更改为 `all`。\n\n<bean id=\"sequenceGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\n\n**dependency-check=\"\
  all\"** >\n\n<property name=\"initial\" value=\"100000\" />\n\n</bean>\n\n**依赖检查与构造器注入**\n\
  \nSpring 的依赖检查功能只会检查属性是否已通过 setter 方法注入。因此，即使你已经通过构造器注入了前缀生成器，仍然会抛出 `UnsatisfiedDependencyException`\
  \ 异常。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  \n\n**dependency-check=\"all\"** >\n\n**<constructor-arg ref=\"datePrefixGenerator\"\
  \ />**\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\"\
  \ value=\"A\" />\n\n</bean>\n\n9799ch03.qxd 5/5/08 4:50 PM Page 58\n\n**58**\n\n\
  第 3 章 **■** SPRING 中的 BEAN 配置\n\n**3-6. 使用 @Required 注解检查属性**\n\n问题\n\nSpring 的依赖检查功能只能检查特定类型的所有属性。它不够灵活，无法仅检查特定的属性。在大多数情况下，你希望检查某些特定属性是否已设置，而不是特定类型的所有属性。\n\
  \n解决方案\n\n`RequiredAnnotationBeanPostProcessor` 是一个 Spring bean 后处理器，它检查所有带有 `@Required`\
  \ 注解的 bean 属性是否已设置。*Bean 后处理器*是一种特殊的 Spring bean，它能够在每个 bean 初始化之前对其执行额外的任务。要启用此\
  \ bean 后处理器进行属性检查，你必须在 Spring IoC 容器中注册它。请注意，此处理器只能检查属性是否已设置，但不能检查其值是否不为 null。\n\
  \n工作原理\n\n假设序列生成器需要 `prefixGenerator` 和 `suffix` 这两个属性。你可以在它们的 setter 方法上使用 `@Required`\
  \ 注解。\n\npackage com.apress.springrecipes.sequence;\n\nimport org.springframework.beans.factory.annotation.Required;\n\
  \npublic class SequenceGenerator {\n\nprivate PrefixGenerator prefixGenerator;\n\
  \nprivate String suffix;\n\n...\n\n**@Required**\n\npublic void setPrefixGenerator(PrefixGenerator\
  \ prefixGenerator) {\n\nthis.prefixGenerator = prefixGenerator;\n\n}\n\n**@Required**\n\
  \npublic void setSuffix(String suffix) {\n\nthis.suffix = suffix;\n\n}\n\n...\n\n\
  }\n\n要让 Spring 检查这些属性是否已在所有序列生成器实例上设置，你必须在 IoC 容器中注册一个 `RequiredAnnotationBeanPostProcessor`\
  \ 实例。如果你使用的是 bean 工厂，则必须通过 API 注册此 bean 后处理器。否则，你可以在应用程序上下文中直接声明此 bean 后处理器的一个实例。\n\
  \n9799ch03.qxd 5/5/08 4:50 PM Page 59\n\n第 3 章 **■** SPRING 中的 BEAN 配置\n\n**59**\n\
  \n<bean class=\"org.springframework.beans.factory.annotation. **➥**\n\nRequiredAnnotationBeanPostProcessor\"\
  \ />\n\n如果你使用的是 Spring 2.5，你可以简单地在 bean 配置文件中包含 `<context:annotation-config>` 元素，这样\
  \ `RequiredAnnotationBeanPostProcessor` 实例就会自动注册。\n\n<beans\n\n[](http://www.springframework.org/schema/context)\n\
  \n**[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.springframework.org/schema/context)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/context)\n\
  \n[**http://www.springframework.org/schema/context**](http://www.springframework.org/schema/context)\n\
  \n[**http://www.springframework.org/schema/context/spring-context-2.5.xsd\">**](http://www.springframework.org/schema/context)\n\
  \n**<context:annotation-config />**\n\n...\n\n</beans>\n\n如果任何带有 `@Required` 注解的属性尚未设置，此\
  \ bean 后处理器将抛出 `BeanInitializationException` 异常。\n\nException in thread \"main\"\
  \ org.springframework.beans.factory.BeanCreationException: Error creating bean with\
  \ name 'sequenceGenerator' defined in class path resource\n\n[beans.xml]: Initialization\
  \ of bean failed; nested exception is\n\norg.springframework.beans.factory.BeanInitializationException:\
  \ Property\n\n'prefixGenerator' is required for bean 'sequenceGenerator'\n\n除了 `@Required`\
  \ 注解之外，`RequiredAnnotationBeanPostProcessor` 还可以检查带有你自定义注解的属性。例如，你可以创建以下注解类型：\n\n\
  package com.apress.springrecipes.sequence;\n\n...\n\n@Retention(RetentionPolicy.RUNTIME)\n\
  \n@Target(ElementType.METHOD)\n\npublic @interface Mandatory {\n\n}\n\n然后，你可以将此注解应用于所需属性的\
  \ setter 方法。\n\npackage com.apress.springrecipes.sequence;\n\npublic class SequenceGenerator\
  \ {\n\nprivate PrefixGenerator prefixGenerator;\n\nprivate String suffix;\n\n...\n\
  \n**@Mandatory**\n\n9799ch03.qxd 5/5/08 4:50 PM Page 60\n\n**60**\n\n第 3 章 **■**\
  \ SPRING 中的 BEAN 配置\n\npublic void setPrefixGenerator(PrefixGenerator prefixGenerator)\
  \ {\n\nthis.prefixGenerator = prefixGenerator;\n\n}\n\n**@Mandatory**\n\npublic\
  \ void setSuffix(String suffix) {\n\nthis.suffix = suffix;\n\n}\n\n...\n\n}\n\n\
  要检查带有此注解类型的属性，你必须在 `RequiredAnnotationBeanPostProcessor` 的 `requiredAnnotationType`\
  \ 属性中指定它。\n\n<bean class=\"org.springframework.beans.factory.annotation. **➥**\n\
  \n\n\nRequiredAnnotationBeanPostProcessor\">\n\n<property name=\"requiredAnnotationType\"\
  >\n\n<value>com.apress.springrecipes.sequence.Mandatory</value>\n\n</property>\n\
  \n</bean>\n\n**3-7. 使用 XML 配置自动装配 Bean**\n\n问题\n\n当一个 Bean 需要访问另一个 Bean 时，你可以通过显式指定引用来进行装配。然而，如果你的容器能够自动装配\
  \ Bean，则可以省去手动配置装配的麻烦。\n\n解决方案\n\nSpring IoC 容器可以帮助你自动装配 Bean。你只需在 `<bean>` 的 `autowire`\
  \ 属性中指定自动装配模式即可。表 3-2 列出了 Spring 支持的自动装配模式。\n\n**表 3-2.** *Spring 支持的自动装配模式*\n\n\
  **模式**\n\n**描述**\n\nno*\n\n不执行任何自动装配。你必须显式地装配依赖关系。\n\nbyName\n\n对于每个 Bean 属性，装配一个名称与该属性名称相同的\
  \ Bean。\n\nbyType\n\n对于每个 Bean 属性，装配一个类型与该属性类型兼容的 Bean。如果找到多个 Bean，则会抛出 `UnsatisfiedDependencyException`。\n\
  \nconstructor\n\n对于每个构造函数的每个参数，首先查找一个类型与该参数类型兼容的 Bean。然后选择匹配参数最多的构造函数。如果存在任何歧义，则会抛出\
  \ `UnsatisfiedDependencyException`。\n\n9799ch03.qxd 5/5/08 4:50 PM Page 61\n\n第\
  \ 3 章 **■** Spring 中的 Bean 配置\n\n**61**\n\n**模式**\n\n**描述**\n\nautodetect\n\n如果找到无参的默认构造函数，则依赖关系将按类型自动装配。否则，将按构造函数自动装配。\n\
  \n** 默认模式为* no *，但可以通过设置 `<beans>` 根元素的 `default-autowire` 属性来更改。如果指定了 Bean 自身的模式，则会覆盖此默认模式。*\n\
  \n尽管自动装配功能非常强大，但其代价是会降低 Bean 配置的可读性。由于自动装配是在运行时由 Spring 执行的，你无法从 Bean 配置文件中推导出 Bean\
  \ 是如何装配的。在实践中，我建议仅在组件依赖关系不复杂的应用程序中应用自动装配。\n\n工作原理\n\n**按类型自动装配**\n\n你可以将 `sequenceGenerator`\
  \ Bean 的 `autowire` 属性设置为 `byType`，并保持 `prefixGenerator` 属性未设置。然后 Spring 将尝试装配一个类型与\
  \ `PrefixGenerator` 兼容的 Bean。在这种情况下，`datePrefixGenerator` Bean 将被自动装配。\n\n<beans\
  \ ...>\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  \n\n**autowire=\"byType\"** >\n\n<property name=\"initial\" value=\"100000\" />\n\
  \n<property name=\"suffix\" value=\"A\" />\n\n</bean>\n\n<bean id=\"datePrefixGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence. **DatePrefixGenerator**\">\n\n<property\
  \ name=\"pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n</beans>\n\n按类型自动装配的主要问题是，有时\
  \ IoC 容器中会有多个与目标类型兼容的 Bean。在这种情况下，Spring 将无法决定哪个 Bean 最适合该属性，因此无法执行自动装配。例如，如果你有另一个生成当前年份作为前缀的前缀生成器，按类型自动装配将立即失效。\n\
  \n<beans ...>\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  \n\n**autowire=\"byType\"** >\n\n<property name=\"initial\" value=\"100000\" />\n\
  \n<property name=\"suffix\" value=\"A\" />\n\n</bean>\n\n9799ch03.qxd 5/5/08 4:50\
  \ PM Page 62\n\n**62**\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n<bean id=\"datePrefixGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.DatePrefixGenerator\">\n\n<property\
  \ name=\"pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n<bean id=\"yearPrefixGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.DatePrefixGenerator\">\n\n<property\
  \ name=\"pattern\" value=\"yyyy\" />\n\n</bean>\n\n</beans>\n\n如果找到多个 Bean 用于自动装配，Spring\
  \ 将抛出 `UnsatisfiedDependencyException`。\n\nException in thread \"main\"\n\n\n\n\
  org.springframework.beans.factory.UnsatisfiedDependencyException: 创建在类路径资源 [beans.xml]\
  \ 中定义的名为 'sequenceGenerator' 的 bean 时出错：通过 bean 属性 'prefixGenerator' 表达的依赖关系未满足：未定义类型为\
  \ [com.apress.springrecipes.sequence.PrefixGenerator] 的唯一 bean：期望单个匹配的 bean，但找到了\
  \ 2 个：[datePrefixGenerator,\n\nyearPrefixGenerator]\n\n**按名称自动装配**\n\n另一种自动装配模式是按名称（byName），它有时可以解决按类型自动装配的问题。其工作方式与按类型（byType）非常相似，但在这种情况下，Spring\
  \ 会尝试装配一个名称相同的 bean，而不是类型兼容的 bean。由于 bean 名称在容器内是唯一的，按名称自动装配不会引起歧义。\n\n<beans ...>\n\
  \n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  \n\n**autowire=\"byName\"** >\n\n<property name=\"initial\" value=\"100000\" />\n\
  \n<property name=\"suffix\" value=\"A\" />\n\n</bean>\n\n<bean id=\" **prefixGenerator**\"\
  \n\nclass=\"com.apress.springrecipes.sequence.DatePrefixGenerator\">\n\n<property\
  \ name=\"pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n</beans>\n\n然而，按名称自动装配并非在所有情况下都有效。有时你无法使目标\
  \ bean 的名称与你的属性名称相同。在实践中，你通常需要明确指定有歧义的依赖关系，同时保持其他依赖关系自动装配。这意味着你采用了显式装配和自动装配的混合方式。\n\
  \n9799ch03.qxd 5/5/08 4:50 PM Page 63\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n**63**\n\
  \n**按构造器自动装配**\n\n构造器（constructor）自动装配模式的工作方式类似于按类型（byType），但它更为复杂。对于一个具有单个构造器的\
  \ bean，Spring 会尝试为每个构造器参数装配一个类型兼容的 bean。但对于具有多个构造器的 bean，过程则更为复杂。Spring 会首先尝试为每个构造器的每个参数找到一个类型兼容的\
  \ bean，然后选择参数匹配最多的那个构造器。\n\n假设 SequenceGenerator 有一个默认构造器和一个带 PrefixGenerator 参数的构造器。\n\
  \npackage com.apress.springrecipes.sequence;\n\npublic class SequenceGenerator {\n\
  \npublic SequenceGenerator() {}\n\npublic SequenceGenerator(PrefixGenerator prefixGenerator)\
  \ {\n\nthis.prefixGenerator = prefixGenerator;\n\n}\n\n...\n\n}\n\n在这种情况下，第二个构造器将被匹配并选中，因为\
  \ Spring 可以找到一个类型与 PrefixGenerator 兼容的 bean。\n\n<beans ...>\n\n<bean id=\"sequenceGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\n\n**autowire=\"\
  constructor\"** >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property\
  \ name=\"suffix\" value=\"A\" />\n\n</bean>\n\n<bean id=\"datePrefixGenerator\"\n\
  \nclass=\"com.apress.springrecipes.sequence.DatePrefixGenerator\">\n\n<property\
  \ name=\"pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n</beans>\n\n然而，类中的多个构造器可能会导致构造器参数匹配的歧义。如果你让\
  \ Spring 为你决定使用哪个构造器，情况可能会变得更加复杂。因此，如果你使用这种自动装配模式，请务必小心以避免歧义。\n\n**按自动检测自动装配**\n\
  \n自动检测（autodetect）自动装配模式要求 Spring 在按类型（byType）和构造器（constructor）之间决定自动装配模式。如果为该 bean\
  \ 找到了一个无参的默认构造器，则会选择按类型（byType）。否则，会选择构造器（constructor）。由于 SequenceGenerator 类定义了一个默认构造器，因此将选择按类型（byType）。这意味着前缀生成器将通过\
  \ setter 方法注入。\n\n9799ch03.qxd 5/5/08 4:50 PM Page 64\n\n**64**\n\n第 3 章 **■** Spring\
  \ 中的 Bean 配置\n\n<beans ...>\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  \n\n**autowire=\"autodetect\"** >\n\n<property name=\"initial\" value=\"100000\"\
  \ />\n\n<property name=\"suffix\" value=\"A\" />\n\n</bean>\n\n<bean id=\"datePrefixGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.DatePrefixGenerator\">\n\n\n\n<property\
  \ name=\"pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n</beans>\n\n**自动装配与依赖检查**\n\
  \n如你所见，如果 Spring 发现多个候选 bean 可用于自动装配，它将抛出 UnsatisfiedDependencyException。另一方面，如果自动装配模式设置为\
  \ byName 或 byType，且 Spring 找不到匹配的 bean 进行装配，它将保持属性未设置状态，这可能导致 NullPointerException\
  \ 或未初始化的值。\n\n然而，如果你希望在自动装配无法装配 bean 时收到通知，应将 dependency-check 属性设置为 objects 或 all。在这种情况下，每当自动装配失败时，都会抛出\
  \ UnsatisfiedDependencyException。\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"\
  com.apress.springrecipes.sequence.SequenceGenerator\"\n\n**autowire=\"byName\" dependency-check=\"\
  objects\"** >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"\
  suffix\" value=\"A\" />\n\n</bean>\n\n**3-8. 使用 @Autowired 和 @Resource 进行自动装配**\n\
  \n问题\n\n通过在 bean 配置文件中设置 autowire 属性进行自动装配，会装配 bean 的所有属性。这种方式不够灵活，无法仅装配特定属性。此外，你只能按类型或按名称自动装配\
  \ bean。如果这两种策略都无法满足你的需求，则必须显式装配 bean。\n\n解决方案\n\nSpring 2.5 对自动装配功能进行了大量增强。你可以通过使用\
  \ @Autowired 注解或 JSR-250（Java 平台通用注解）中定义的 @Resource 注解，对 setter 方法、构造器、字段甚至任意方法进行注解，从而自动装配特定属性。这意味着除了设置\
  \ autowire 属性之外，你还有另一种选择来满足需求。不过，这种基于注解的方式要求你使用 Java 1.5 或更高版本。\n\n9799ch03.qxd\
  \ 5/5/08 4:50 PM 第 65 页\n\n第 3 章 **■** SPRING 中的 BEAN 配置\n\n**65**\n\n工作原理\n\n要让\
  \ Spring 使用 @Autowired 或 @Resource 自动装配 bean 属性，你需要在 IoC 容器中注册一个 AutowiredAnnotationBeanPostProcessor\
  \ 实例。如果你使用的是 Bean 工厂，则必须通过 API 注册此 Bean 后处理器。否则，你可以在应用上下文中直接声明一个实例。\n\n<bean class=\"\
  org.springframework.beans.factory.annotation. **➥**\n\nAutowiredAnnotationBeanPostProcessor\"\
  \ />\n\n或者，你只需在 bean 配置文件中包含 <context:annotation-config> 元素，AutowiredAnnotationBeanPostProcessor\
  \ 实例便会自动注册。\n\n<beans\n\n[](http://www.springframework.org/schema/context)\n\n**[xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans](http://www.springframework.org/schema/context)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/context)\n\
  \n[**http://www.springframework.org/schema/context**](http://www.springframework.org/schema/context)\n\
  \n[**http://www.springframework.org/schema/context/spring-context-2.5.xsd\">**](http://www.springframework.org/schema/context)\n\
  \n**<context:annotation-config />**\n\n...\n\n</beans>\n\n**自动装配单个兼容类型的 Bean**\n\
  \n@Autowired 注解可以应用于特定属性，让 Spring 自动装配它。\n\n例如，你可以使用 @Autowired 注解 prefixGenerator\
  \ 属性的 setter 方法。然后 Spring 将尝试装配一个与 PrefixGenerator 类型兼容的 bean。\n\npackage com.apress.springrecipes.sequence;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\n\npublic class\
  \ SequenceGenerator {\n\n...\n\n**@Autowired**\n\npublic void setPrefixGenerator(PrefixGenerator\
  \ prefixGenerator) {\n\nthis.prefixGenerator = prefixGenerator;\n\n}\n\n}\n\n如果你在\
  \ IoC 容器中定义了一个与 PrefixGenerator 类型兼容的 bean，它将被自动设置到 prefixGenerator 属性中。\n\n9799ch03.qxd\
  \ 5/5/08 4:50 PM 第 66 页\n\n**66**\n\n第 3 章 **■** SPRING 中的 BEAN 配置\n\n<beans ...>\n\
  \n...\n\n\n\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\"\
  \ value=\"A\" />\n\n</bean>\n\n<bean id=\"datePrefixGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.\
  \ **DatePrefixGenerator**\">\n\n<property name=\"pattern\" value=\"yyyyMMdd\" />\n\
  \n</bean>\n\n</beans>\n\n默认情况下，所有带有 `@Autowired` 注解的属性都是必需的。当 Spring 找不到匹配的 Bean\
  \ 进行注入时，会抛出异常。如果你希望某个属性是可选的，可以将 `@Autowired` 的 `required` 属性设置为 `false`。这样，当 Spring\
  \ 找不到匹配的 Bean 时，会保持该属性未设置状态。\n\npackage com.apress.springrecipes.sequence;\n\nimport\
  \ org.springframework.beans.factory.annotation.Autowired;\n\npublic class SequenceGenerator\
  \ {\n\n...\n\n**@Autowired(required = false)**\n\npublic void setPrefixGenerator(PrefixGenerator\
  \ prefixGenerator) {\n\nthis.prefixGenerator = prefixGenerator;\n\n}\n\n}\n\n除了\
  \ setter 方法外，`@Autowired` 注解也可以应用于构造函数。此时，Spring 会尝试为每个构造函数参数找到类型兼容的 Bean。\n\npackage\
  \ com.apress.springrecipes.sequence;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \npublic class SequenceGenerator {\n\n...\n\n**@Autowired**\n\npublic SequenceGenerator(PrefixGenerator\
  \ prefixGenerator) {\n\nthis.prefixGenerator = prefixGenerator;\n\n}\n\n}\n\n`@Autowired`\
  \ 注解还可以应用于字段，即使该字段未声明为 `public`。通过这种方式，你可以省略为该字段声明 setter 方法或构造函数的需求。Spring 会通过反射将匹配的\
  \ Bean 注入到该字段中。然而，对非公共字段使用 `@Autowired` 注解会降低代码的可测试性，因为代码将难以进行单元测试。\n\npackage com.apress.springrecipes.sequence;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\n\npublic class\
  \ SequenceGenerator {\n\n**@Autowired**\n\nprivate PrefixGenerator prefixGenerator;\n\
  \n...\n\n}\n\n你甚至可以将 `@Autowired` 注解应用于具有任意名称和任意数量参数的方法。此时，Spring 会尝试为每个方法参数注入类型兼容的\
  \ Bean。\n\npackage com.apress.springrecipes.sequence;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \npublic class SequenceGenerator {\n\n...\n\n**@Autowired**\n\npublic void inject(PrefixGenerator\
  \ prefixGenerator) {\n\nthis.prefixGenerator = prefixGenerator;\n\n}\n\n}\n\n**自动装配所有兼容类型的\
  \ Bean**\n\n`@Autowired` 注解也可以应用于数组类型的属性，让 Spring 自动装配所有匹配的 Bean。例如，你可以使用 `@Autowired`\
  \ 注解一个 `PrefixGenerator[]` 属性。这样，Spring 会一次性自动装配所有类型与 `PrefixGenerator` 兼容的 Bean。\n\
  \npackage com.apress.springrecipes.sequence;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \npublic class SequenceGenerator {\n\n**@Autowired**\n\nprivate **PrefixGenerator[]**\
  \ prefixGenerators;\n\n...\n\n}\n\n9799ch03.qxd 5/5/08 4:50 PM Page 68\n\n**68**\n\
  \n第 3 章 **■** S P R I N G 中 的 B e a n 配 置\n\n如果你在 IoC 容器中定义了多个类型与 `PrefixGenerator`\
  \ 兼容的 Bean，它们会被自动添加到 `prefixGenerators` 数组中。\n\n<beans ...>\n\n...\n\n<bean id=\"\
  datePrefixGenerator\"\n\nclass=\"com.apress.springrecipes.sequence. **DatePrefixGenerator**\"\
  >\n\n<property name=\"pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n<bean id=\"\
  yearPrefixGenerator\"\n\nclass=\"com.apress.springrecipes.sequence. **DatePrefixGenerator**\"\
  >\n\n<property name=\"pattern\" value=\"yyyy\" />\n\n</bean>\n\n</beans>\n\n类似地，你也可以将\
  \ `@Autowired` 注解应用于类型安全的集合。Spring 能够读取该集合的类型信息，并自动装配所有类型兼容的 Bean。\n\npackage com.apress.springrecipes.sequence;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\n\n\n\npublic class\
  \ SequenceGenerator {\n\n**@Autowired**\n\nprivate **List<PrefixGenerator>** prefixGenerators;\n\
  \n...\n\n}\n\n如果 Spring 检测到 `@Autowired` 注解应用于一个类型安全的 `java.util.Map`，且键为字符串类型，那么它会将所有兼容类型的\
  \ Bean 添加到该 Map 中，并以 Bean 的名称作为键。\n\npackage com.apress.springrecipes.sequence;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\n\npublic class\
  \ SequenceGenerator {\n\n**@Autowired**\n\nprivate **Map<String, PrefixGenerator>**\
  \ prefixGenerators;\n\n...\n\n}\n\n9799ch03.qxd 5/5/08 4:50 PM Page 69\n\n第 3 章\
  \ **■** Spring 中的 Bean 配置\n\n**69**\n\n**使用限定符按类型自动装配**\n\n默认情况下，当 IoC 容器中存在多个兼容类型的\
  \ Bean 时，按类型自动装配将无法工作。然而，Spring 允许你通过在 `@Qualifier` 注解中提供 Bean 的名称来指定候选 Bean。\n\n\
  package com.apress.springrecipes.sequence;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.beans.factory.annotation.Qualifier;\n\npublic class\
  \ SequenceGenerator {\n\n**@Autowired**\n\n**@Qualifier(\"datePrefixGenerator\"\
  )**\n\nprivate PrefixGenerator prefixGenerator;\n\n...\n\n}\n\n然后，Spring 会尝试在 IoC\
  \ 容器中查找具有该名称的 Bean，并将其装配到该属性中。\n\n<bean id=\" **datePrefixGenerator**\"\n\nclass=\"\
  com.apress.springrecipes.sequence.DatePrefixGenerator\">\n\n<property name=\"pattern\"\
  \ value=\"yyyyMMdd\" />\n\n</bean>\n\n`@Qualifier` 注解也可以应用于方法参数，以实现自动装配。\n\npackage\
  \ com.apress.springrecipes.sequence;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.beans.factory.annotation.Qualifier;\n\npublic class\
  \ SequenceGenerator {\n\n...\n\n**@Autowired**\n\npublic void inject(\n\n**@Qualifier(\"\
  datePrefixGenerator\")** PrefixGenerator prefixGenerator) {\n\nthis.prefixGenerator\
  \ = prefixGenerator;\n\n}\n\n}\n\n你还可以为自动装配目的创建自定义的限定符注解类型。该注解类型本身必须使用 `@Qualifier`\
  \ 进行注解。\n\npackage com.apress.springrecipes.sequence;\n\n...\n\nimport org.springframework.beans.factory.annotation.Qualifier;\n\
  \n9799ch03.qxd 5/5/08 4:50 PM Page 70\n\n**70**\n\n第 3 章 **■** Spring 中的 Bean 配置\n\
  \n@Retention(RetentionPolicy.RUNTIME)\n\n@Target({ElementType.FIELD, ElementType.PARAMETER\
  \ })\n\n**@Qualifier**\n\npublic @interface Generator {\n\nString value();\n\n}\n\
  \n然后，你可以将此注解应用于 `@Autowired` 的 Bean 属性。这将要求 Spring 自动装配带有此限定符注解和指定值的 Bean。\n\npackage\
  \ com.apress.springrecipes.sequence;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \npublic class SequenceGenerator {\n\n**@Autowired**\n\n**@Generator(\"prefix\"\
  )**\n\nprivate PrefixGenerator prefixGenerator;\n\n...\n\n}\n\n你必须将限定符提供给要自动装配到上述属性的目标\
  \ Bean。限定符通过 `<qualifier>` 元素及其 `type` 属性添加。限定符的值在 `value` 属性中指定。\n\n<bean id=\"\
  datePrefixGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.DatePrefixGenerator\"\
  >\n\n**<qualifier type=\"Generator\" value=\"prefix\" />**\n\n<property name=\"\
  pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n**按名称自动装配**\n\n如果你希望按名称自动装配 Bean 属性，可以使用\
  \ JSR-250 的 `@Resource` 注解对 setter 方法、构造器或字段进行注解。默认情况下，Spring 会尝试查找与该属性同名的 Bean。但你可以在其\
  \ `name` 属性中显式指定 Bean 的名称。\n\n**■注意** 要使用 JSR-250 注解，你必须在类路径中包含 `common-annotations.jar`（位于\
  \ Spring 安装目录的 `lib/j2ee` 目录下）。但是，如果你的应用程序运行在 Java SE 6 或 Java EE 5 上，则无需包含此 JAR\
  \ 文件。\n\n9799ch03.qxd 5/5/08 4:50 PM Page 71\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n\
  **71**\n\npackage com.apress.springrecipes.sequence;\n\nimport javax.annotation.Resource;\n\
  \n\n\npublic class SequenceGenerator {\n\n**@Resource(name = \"datePrefixGenerator\"\
  )**\n\nprivate PrefixGenerator prefixGenerator;\n\n...\n\n}\n\n**3-9. 继承 Bean 配置**\n\
  \n问题\n\n在 Spring IoC 容器中配置 Bean 时，可能会有多个 Bean 共享一些公共配置，例如 `<bean>` 元素中的 Bean 属性和特性。通常需要为多个\
  \ Bean 重复这些配置。\n\n解决方案\n\nSpring 允许提取公共的 Bean 配置，形成一个*父 Bean*。继承自该父 Bean 的 Bean\
  \ 称为*子 Bean*。子 Bean 将从父 Bean 继承 Bean 配置，包括 `<bean>` 元素中的 Bean 属性和特性，从而避免重复配置。必要时，子\
  \ Bean 也可以覆盖继承的配置。\n\n父 Bean 既可以作为配置模板，也可以同时作为 Bean 实例。但是，如果希望父 Bean 仅作为不可获取的模板，则必须将\
  \ `abstract` 属性设置为 `true`，要求 Spring 不要实例化该 Bean。\n\n必须注意，并非父 `<bean>` 元素中定义的所有属性都会被继承。例如，`autowire`\
  \ 和 `dependency-check` 属性不会从父 Bean 继承。要了解更多关于哪些属性会从父 Bean 继承、哪些不会，请参考 Spring 文档中关于\
  \ Bean 继承的部分。\n\n工作原理\n\n假设需要添加一个新的序列生成器实例，其初始值和后缀与现有实例相同。\n\n<beans ...>\n\n<bean\
  \ id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\"\
  \ value=\"A\" />\n\n<property name=\"prefixGenerator\" ref=\"datePrefixGenerator\"\
  \ />\n\n</bean>\n\n9799ch03.qxd 5/5/08 4:50 PM Page 72\n\n**72**\n\n第三章 **■** SPRING\
  \ 中的 BEAN 配置\n\n<bean id=\"sequenceGenerator1\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\"\
  \ value=\"A\" />\n\n<property name=\"prefixGenerator\" ref=\"datePrefixGenerator\"\
  \ />\n\n</bean>\n\n<bean id=\"datePrefixGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.DatePrefixGenerator\"\
  >\n\n<property name=\"pattern\" value=\"yyyyMMdd\" />\n\n</bean>\n\n</beans>\n\n\
  为了避免重复相同的属性，可以声明一个基础序列生成器 Bean，并设置这些属性。然后两个序列生成器可以继承这个基础生成器，从而自动拥有这些属性。如果子 Bean\
  \ 的类与父 Bean 相同，则无需指定子 Bean 的 `class` 属性。\n\n<beans ...>\n\n<bean id=\"**baseSequenceGenerator**\"\
  \n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\">\n\n<property\
  \ name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\" value=\"A\"\
  \ />\n\n<property name=\"prefixGenerator\" ref=\"datePrefixGenerator\" />\n\n</bean>\n\
  \n<bean id=\"sequenceGenerator\" **parent=\"baseSequenceGenerator\"** />\n\n<bean\
  \ id=\"sequenceGenerator1\" **parent=\"baseSequenceGenerator\"** />\n\n...\n\n</beans>\n\
  \n继承的属性可以被子 Bean 覆盖。例如，可以添加一个具有不同初始值的子序列生成器。\n\n<beans ...>\n\n<bean id=\"**baseSequenceGenerator**\"\
  \n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\">\n\n<property\
  \ name=\"initial\" value=\"100000\" />\n\n<property name=\"suffix\" value=\"A\"\
  \ />\n\n<property name=\"prefixGenerator\" ref=\"datePrefixGenerator\" />\n\n</bean>\n\
  \n<bean id=\"sequenceGenerator2\" **parent=\"baseSequenceGenerator\"** >\n\n**<property\
  \ name=\"initial\" value=\"200000\" />**\n\n</bean>\n\n...\n\n</beans>\n\n9799ch03.qxd\
  \ 5/5/08 4:50 PM Page 73\n\n第三章 **■** SPRING 中的 BEAN 配置\n\n**73**\n\n基础序列生成器 Bean\
  \ 现在可以作为 Bean 实例被检索使用。如果希望它仅作为模板，则必须将 `abstract` 属性设置为 `true`。这样 Spring 就不会实例化该\
  \ Bean。\n\n<bean id=\"baseSequenceGenerator\" **abstract=\"true\"**\n\n\n\nclass=\"\
  com.apress.springrecipes.sequence.SequenceGenerator\">\n\n...\n\n</bean>\n\n你也可以省略父\
  \ bean 的 class 属性，让子 bean 自行指定，特别是当父 bean 和子 bean 不在同一个类层次结构中，但共享某些同名属性时。在这种情况下，父\
  \ bean 的 `abstract` 属性必须设置为 `true`，因为父 bean 无法被实例化。例如，让我们添加另一个具有 `initial` 属性的 `ReverseGenerator`\
  \ 类。\n\npackage com.apress.springrecipes.sequence;\n\npublic class ReverseGenerator\
  \ {\n\nprivate int initial;\n\npublic void setInitial(int initial) {\n\nthis.initial\
  \ = initial;\n\n}\n\n}\n\n现在，`SequenceGenerator` 和 `ReverseGenerator` 不继承自同一个基类——也就是说，它们不在同一个类层次结构中，但它们有一个同名的属性：`initial`。为了提取这个共同的\
  \ `initial` 属性，你需要一个没有定义 `class` 属性的 `baseGenerator` 父 bean。\n\n<beans ...>\n\n\
  <bean id=\" **baseGenerator**\" **abstract=\"true\"** >\n\n<property name=\"initial\"\
  \ value=\"100000\" />\n\n</bean>\n\n<bean id=\"baseSequenceGenerator\" abstract=\"\
  true\" **parent=\"baseGenerator\"**\n\n**class=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >**\n\n<property name=\"suffix\" value=\"A\" />\n\n<property name=\"prefixGenerator\"\
  \ ref=\"datePrefixGenerator\" />\n\n</bean>\n\n<bean id=\"reverseGenerator\" **parent=\"\
  baseGenerator\"**\n\n**class=\"com.apress.springrecipes.sequence.ReverseGenerator\"\
  ** />\n\n<bean id=\"sequenceGenerator\" parent=\"baseSequenceGenerator\" />\n\n\
  <bean id=\"sequenceGenerator1\" parent=\"baseSequenceGenerator\" />\n\n![Image 26](img/index-100_1.jpg)\n\
  \n9799ch03.qxd 5/5/08 4:50 PM Page 74\n\n**74**\n\n第 3 章 **■** SPRING 中的 BEAN 配置\n\
