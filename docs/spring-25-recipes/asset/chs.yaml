  \n</webflow:flow-executor>\n\n<bean id=\"jpaFlowExecutionListener\"\n\nclass=\"\
  org.springframework.webflow.persistence.JpaFlowExecutionListener\">\n\n<constructor-arg\
  \ ref=\"entityManagerFactory\" />\n\n9799ch15.qxd 5/22/08 4:38 PM 第 571 页\n\n第 15\
  \ 章 **■** Spring Web Flow\n\n**571**\n\n<constructor-arg ref=\"transactionManager\"\
  \ />\n\n</bean>\n\n</beans>\n\n`JpaFlowExecutionListener` 需要 JPA 实体管理器工厂和事务管理器作为其构造函数参数，这些你已经在服务层配置好了。你可以在\
  \ `criteria` 属性中过滤要监听的流程名称，使用逗号作为分隔符，或使用星号表示所有流程，这是默认值。\n\n**在 Web 流程中使用 JPA**\n\
  \n现在，让我们定义从图书馆借书的流程。首先，在流程注册表中注册一个新的流程定义：\n\n<webflow:flow-registry id=\"flowRegistry\"\
  >\n\n...\n\n**<webflow:flow-location path=\"/WEB-INF/flows/borrowBook/borrowBook.xml\"\
  \ />**\n\n</webflow:flow-registry>\n\n该流程的第一个状态将显示一个表单，供图书馆用户输入借阅详情，该表单将绑定到类型为 `BorrowingRecord`\
  \ 的表单对象。你可以在 `library-webflow.xml` 中定义一个表单动作来处理这个借阅表单。\n\n<bean id=\"borrowBookAction\"\
  \n\nclass=\"org.springframework.webflow.action.FormAction\">\n\n<property name=\"\
  formObjectClass\"\n\nvalue=\"com.apress.springrecipes.library.domain.BorrowingRecord\"\
  \ />\n\n<property name=\"propertyEditorRegistrar\">\n\n<bean class=\"com.apress.springrecipes.library.web.PropertyEditors\"\
  \ />\n\n</property>\n\n</bean>\n\n\n\n在流程定义文件 `/WEB-INF/flows/borrowBook/borrowBook.xml`\
  \ 中，你必须定义一个 `<persistence-context>` 元素，以要求 Spring Web Flow 为每个流程实例管理一个持久化上下文：\n\n\
  <flow\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/webflow](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n**<persistence-context />**\n\n<view-state id=\"borrowForm\">\n\n<on-render>\n\
  \n<evaluate expression=\"borrowBookAction.setupForm\" />\n\n</on-render>\n\n<transition\
  \ on=\"proceed\" to=\"borrowReview\">\n\n<evaluate expression=\"borrowBookAction.bindAndValidate\"\
  \ />\n\n</transition>\n\n9799ch15.qxd 5/22/08 4:38 PM Page 572\n\n**572**\n\n第 15\
  \ 章 **■** SPRING WEB FLOW\n\n<transition on=\"cancel\" to=\"cancel\" />\n\n</view-state>\n\
  \n<view-state id=\"borrowReview\">\n\n<on-render>\n\n<evaluate expression=\"borrowBookAction.setupForm\"\
  \ />\n\n</on-render>\n\n<transition on=\"confirm\" to=\"confirm\">\n\n<evaluate\
  \ expression=\" **persistenceContext.persist(borrowingRecord)**\" />\n\n</transition>\n\
  \n<transition on=\"revise\" to=\"borrowForm\" />\n\n<transition on=\"cancel\" to=\"\
  cancel\" />\n\n</view-state>\n\n<end-state id=\"confirm\" **commit=\"true\"** />\n\
  \n<end-state id=\"cancel\" />\n\n</flow>\n\n该流程包含两个视图状态和两个结束状态。`borrowForm` 状态显示一个表单，供用户输入借阅详情，这些详情将被绑定到一个名为\
  \ `borrowingRecord` 的流程作用域对象上，该对象派生自表单对象的类名 `BorrowingRecord`。如果用户继续提交借阅表单，此状态将转换到\
  \ `borrowReview` 状态，该状态显示借阅详情以供确认。如果用户确认了借阅详情，流程作用域中的表单对象将通过受管理的持久化上下文被持久化，并且此状态将转换到结束状态\
  \ `confirm`。由于此状态的 `commit` 属性被设置为 `true`，它将把更改提交到数据库。然而，在任一视图状态中，用户都可以选择取消借阅表单，这将导致转换到结束状态\
  \ `cancel`，该状态会忽略所有更改。此图书借阅流程的流程图如图 15-9 所示。\n\n**图 15-9.** *图书借阅流程的流程图*\n\n最后一步是为这两个视图状态创建视图。对于\
  \ `borrowForm` 状态，你在 `/WEB-INF/flows/borrowBook/` 目录下创建 `borrowForm.jsp`，以便它会被默认加载：\n\
  \n9799ch15.qxd 5/22/08 4:38 PM Page 573\n\n第 15 章 **■** SPRING WEB FLOW\n\n**573**\n\
  \n[<%@ taglib prefix=\"form\" uri=\"http://www.springframework.org/tags/form\" %>](http://www.springframework.org/tags/form)\n\
  \n<html>\n\n<head>\n\n<title>借阅表单</title>\n\n</head>\n\n<body>\n\n<form:form commandName=\"\
  borrowingRecord\">\n\n<table>\n\n<tr>\n\n<td>ISBN</td>\n\n<td><form:input path=\"\
  isbn\" /></td>\n\n</tr>\n\n<tr>\n\n<td>借阅日期</td>\n\n<td><form:input path=\"borrowDate\"\
  \ /></td>\n\n</tr>\n\n<tr>\n\n<td>归还日期</td>\n\n<td><form:input path=\"returnDate\"\
  \ /></td>\n\n</tr>\n\n<tr>\n\n<td>读者</td>\n\n<td><form:input path=\"reader\" /></td>\n\
  \n</tr>\n\n<tr>\n\n<td colspan=\"2\">\n\n<input type=\"submit\" name=\"_eventId_proceed\"\
  \ value=\"继续\" />\n\n<input type=\"submit\" name=\"_eventId_cancel\" value=\"取消\"\
  \ />\n\n</td>\n\n</tr>\n\n</table>\n\n</form:form>\n\n</body>\n\n</html>\n\n对于 `borrowReview`\
  \ 状态，你在同一位置创建 `borrowReview.jsp`，用于确认借阅详情：\n\n<%@ [taglib prefix=\"fmt\" uri=\"\
  http://java.sun.com/jsp/jstl/fmt\" %>](http://java.sun.com/jsp/jstl/fmt)\n\n<html>\n\
  \n<head>\n\n<title>借阅确认</title>\n\n</head>\n\n9799ch15.qxd 5/22/08 4:38 PM Page\
  \ 574\n\n**574**\n\n第 15 章 **■** SPRING WEB FLOW\n\n<body>\n\n<form method=\"POST\"\
  >\n\n<table>\n\n<tr>\n\n<td>ISBN</td>\n\n<td>${borrowingRecord.isbn}</td>\n\n</tr>\n\
  \n<tr>\n\n<td>借阅日期</td>\n\n<td>\n\n<fmt:formatDate value=\"${borrowingRecord.borrowDate}\"\
  \ pattern=\"yyyy-MM-dd\" />\n\n</td>\n\n</tr>\n\n<tr>\n\n<td>归还日期</td>\n\n<td>\n\
  \n<fmt:formatDate value=\"${borrowingRecord.returnDate}\" pattern=\"yyyy-MM-dd\"\
  \ />\n\n</td>\n\n</tr>\n\n<tr>\n\n<td>读者</td>\n\n<td>${borrowingRecord.reader}</td>\n\
  \n</tr>\n\n<tr>\n\n<td colspan=\"2\">\n\n<input type=\"submit\" name=\"_eventId_confirm\"\
  \ value=\"确认\" />\n\n\n\n<input type=\"submit\" name=\"_eventId_revise\" value=\"\
  修订\" />\n\n<input type=\"submit\" name=\"_eventId_cancel\" value=\"取消\" />\n\n</td>\n\
  \n</tr>\n\n</table>\n\n</form>\n\n</body>\n\n</html>\n\n现在你可以部署应用程序，并通过以下 URL 测试这个借书流程：\n\
  \n[`localhost:8080/library/flow/borrowBook.`](http://localhost:8080/library/flow/borrowBook)\n\
  \n**15-5. 将 Spring Web Flow 与 JSF 集成**\n\n问题\n\n默认情况下，Spring Web Flow 依赖 Spring\
  \ MVC 的视图技术（例如 JSP 和 Tiles）来渲染视图。然而，你可能希望在 Web Flow 的视图中使用 JSF 丰富的 UI 组件，或者使用 Spring\
  \ Web Flow 管理现有 JSF 应用程序的 UI 流程。无论哪种情况，你都需要将 Spring Web Flow 与 JSF 集成。\n\n9799ch15.qxd\
  \ 5/22/08 4:38 PM 第 575 页\n\n第 15 章 **■** Spring Web Flow\n\n**575**\n\n解决方案\n\n\
  Spring Web Flow 提供了两个子模块：Spring Faces 和 Spring JavaScript，以简化在 Spring 中使用 JSF 和\
  \ JavaScript。Spring Faces 通过允许你在 Spring MVC 和 Spring Web Flow 中使用 JSF 的 UI 组件，将\
  \ Spring 与 JSF 1.2 或更高版本集成。Spring Faces 支持在 Spring Web Flow 中渲染 JSF 视图，并为 Spring\
  \ Web Flow 提供了许多 JSF 集成功能。\n\nSpring JavaScript 是一个 JavaScript 抽象框架，它将 Dojo JavaScript\
  \ 工具包（[`dojotoolkit.org/）集成为底层 UI 工具包。S`](http://dojotoolkit.org)pring Faces 在 Spring\
  \ JavaScript 的基础上，为标准 JSF 输入组件提供了一套客户端验证组件。这些组件以 Facelets 标签的形式提供，因此你必须使用 Facelets\
  \ 作为 JSF 视图技术才能使用它们。\n\n工作原理\n\n**为 Spring Web Flow 渲染 JSF 视图**\n\n现在，我们考虑用 JSF\
  \ 重新实现借书流程的视图。为了使用 Spring Faces 提供的 JSF 验证组件，你必须使用 Facelets 来创建 JSF 视图。首先，在 web.xml\
  \ 中配置 JSF 的 FacesServlet。\n\n**■注意** 要将 JSF 和 Facelets 与 Spring Web Flow 集成，你必须将\
  \ spring-faces-2.0.0.jar（位于 Spring Web Flow 安装目录的 dist 目录下）复制到 WEB-INF/lib 目录。如果你选择\
  \ Sun 的 JSF 参考实现（JSF-RI）作为 JSF 实现库，则必须复制 jsf-api.jar 和 jsf-impl.jar（位于 JSF-RI 安装目录的\
  \ lib 目录下）。要使用 Facelets，你需要从 [`facelets.dev.java.`](https://facelets.dev.java) 下载其发行版（例如\
  \ facelets-1.1.14.zip），然后复制 jsf-facelets.jar（位于 Facelets 安装目录的根目录下）。最后，Facelets\
  \ 使用 Unified EL 作为其表达式语言，因此为了保持一致性，你也应该在流程定义中使用该语言。如果你正在使用 OGNL 作为表达式语言，可以从 WEB-INF/lib\
  \ 中移除 OGNL 库，并将 JBoss EL 库复制到此目录。\n\n<web-app ...>\n\n...\n\n<servlet>\n\n<servlet-name>faces</servlet-name>\n\
  \n<servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\n</servlet>\n\
  \n</web-app>\n\n请注意，此 Servlet 仅用于初始化使用 JSF 的 Web 应用程序。它不会用于处理 Web Flow 请求，因此你无需为其指定\
  \ `<servlet-mapping>` 定义。但是，如果你同时使用传统的 JSF 请求处理，则必须指定该定义。\n\n9799ch15.qxd 5/22/08\
  \ 4:38 PM 第 576 页\n\n**576**\n\n第 15 章 **■** Spring Web Flow\n\n在 JSF 配置文件（即 WEB-INF\
  \ 根目录下的 faces-config.xml）中，你必须将 FaceletViewHandler 配置为 JSF 视图处理器以启用 Facelets：\n\n\
  [<faces-config](http://java.sun.com/xml/ns/javaee)\n\nx[si:schemaLocation=\"http://java.sun.com/xml/ns/javaee](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`java.sun.com/xml/ns/javaee/web-facesconfig_1_2.xsd\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \nversion=\"1.2\">\n\n<application>\n\n<view-handler>com.sun.facelets.FaceletViewHandler</view-handler>\n\
  \n</application>\n\n</faces-config>\n\n\n\n在 `library-webflow.xml` 中，你需要为你的流程注册表指定\
  \ JSF 流程构建器服务，而不是使用默认的 Spring MVC 流程构建器服务。这样，JSF 流程构建器服务才能为 Web 流程渲染 JSF 视图。\n\n\
  <beans\n\n[](http://www.springframework.org/schema/faces)\n\n**[xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans](http://www.springframework.org/schema/faces)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/faces)\n\
  \n[`www.springframework.org/schema/webflow-config`](http://www.springframework.org/schema/faces)\n\
  \n[`www.springframework.org/schema/webflow-config/**➥**`](http://www.springframework.org/schema/faces)\n\
  \n[spring-webflow-config-2.0.xsd](http://www.springframework.org/schema/faces)\n\
  \n[**http://www.springframework.org/schema/faces**](http://www.springframework.org/schema/faces)\n\
  \n[**http://www.springframework.org/schema/faces/spring-faces-2.0.xsd\">**](http://www.springframework.org/schema/faces)\n\
  \n...\n\n<webflow:flow-registry id=\"flowRegistry\"\n\n**flow-builder-services=\"\
  facesFlowBuilderServices\"** >\n\n...\n\n</webflow:flow-registry>\n\n**<faces:flow-builder-services\
  \ id=\"facesFlowBuilderServices\" />**\n\n</beans>\n\nJSF 流程构建器服务内部使用一个 JSF 视图工厂，该工厂默认会使用视图状态的名称和\
  \ `.xhtml` 作为文件扩展名来加载一个 Facelets 页面。在为 `borrowForm` 和 `borrowReview` 状态创建 Facelets\
  \ 页面之前，你可以定义一个页面模板来统一你的 Web 应用程序的布局（例如，在 `/WEB-INF/template.xhtml` 中）：\n\n<!DOCTYPE\
  \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n<html\n\n[>](http://java.sun.com/jsf/facelets)\n\
  \n<head>\n\n9799ch15.qxd 5/22/08 4:38 PM Page 577\n\n第 15 章 **■** Spring Web Flow\n\
  \n**577**\n\n<title> **<ui:insert name=\"title\">Library</ui:insert>** </title>\n\
  \n</head>\n\n<body>\n\n**<ui:insert name=\"content\" />**\n\n</body>\n\n</html>\n\
  \n上述模板定义了两个区域，名称分别为 `title` 和 `content`。使用此模板的页面会将它们自己的内容插入到这两个区域中。\n\n现在，让我们为 `borrowForm`\
  \ 状态创建 `/WEB-INF/flows/borrowBook/borrowForm.xhtml`，以便它会被默认加载：\n\n<!DOCTYPE html\
  \ PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n[<ui:composition](http://www.w3.org/1999/xhtml)\n\
  \n**template=\"/WEB-INF/template.xhtml\"** >\n\n<ui:define name=\"title\">借阅表单**</ui:define>**\n\
  \n**<ui:define name=\"content\">**\n\n<h:form>\n\n<h:panelGrid columns=\"2\">\n\n\
  <h:outputLabel for=\"isbn\">ISBN</h:outputLabel>\n\n<h:inputText id=\"isbn\" value=\"\
  #{borrowingRecord.isbn}\" />\n\n<h:outputLabel for=\"borrowDate\">借阅日期</h:outputLabel>\n\
  \n<h:inputText id=\"borrowDate\" value=\"#{borrowingRecord.borrowDate}\">\n\n<f:convertDateTime\
  \ pattern=\"yyyy-MM-dd\" />\n\n</h:inputText>\n\n<h:outputLabel for=\"returnDate\"\
  >归还日期</h:outputLabel>\n\n<h:inputText id=\"returnDate\" value=\"#{borrowingRecord.returnDate}\"\
  >\n\n<f:convertDateTime pattern=\"yyyy-MM-dd\" />\n\n</h:inputText>\n\n<h:outputLabel\
  \ for=\"reader\">读者</h:outputLabel>\n\n<h:inputText id=\"reader\" value=\"#{borrowingRecord.reader}\"\
  \ />\n\n</h:panelGrid>\n\n<h:commandButton value=\"继续\" action=\"proceed\" />\n\n\
  <h:commandButton value=\"取消\" action=\"cancel\" />\n\n</h:form>\n\n**</ui:define>**\n\
  \n</ui:composition>\n\n9799ch15.qxd 5/22/08 4:38 PM Page 578\n\n**578**\n\n第 15\
  \ 章 **■** Spring Web Flow\n\n在此页面中，你使用标准的 JSF 组件，如 `form`、`outputLabel`、`inputText`\
  \ 和 `commandButton` 来创建一个表单，该表单将字段值绑定到一个表单对象。由命令按钮触发的动作将被映射到一个 Spring Web Flow 事件\
  \ ID，该 ID 将导致一次转换。\n\n接下来，为 `borrowReview` 状态创建 `/WEB-INF/flows/borrowBook/borrowReview.xhtml`：\n\
  \n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n[<ui:composition](http://www.w3.org/1999/xhtml)\n\
  \n**template=\"/WEB-INF/template.xhtml\"** >\n\n**<ui:define name=\"title\">** 借阅审核**</ui:define>**\n\
  \n**<ui:define name=\"content\">**\n\n<h:form>\n\n<h:panelGrid columns=\"2\">\n\n\
  <h:outputLabel for=\"isbn\">ISBN</h:outputLabel>\n\n<h:outputText id=\"isbn\" value=\"\
  #{borrowingRecord.isbn}\" />\n\n<h:outputLabel for=\"borrowDate\">借阅日期</h:outputLabel>\n\
  \n<h:outputText id=\"borrowDate\" value=\"#{borrowingRecord.borrowDate}\">\n\n<f:convertDateTime\
  \ pattern=\"yyyy-MM-dd\" />\n\n</h:outputText>\n\n<h:outputLabel for=\"returnDate\"\
  >归还日期</h:outputLabel>\n\n<h:outputText id=\"returnDate\" value=\"#{borrowingRecord.returnDate}\"\
  >\n\n<f:convertDateTime pattern=\"yyyy-MM-dd\" />\n\n</h:outputText>\n\n<h:outputLabel\
  \ for=\"reader\">读者</h:outputLabel>\n\n<h:outputText id=\"reader\" value=\"#{borrowingRecord.reader}\"\
  \ />\n\n</h:panelGrid>\n\n<h:commandButton value=\"确认\" action=\"confirm\" />\n\n\
  <h:commandButton value=\"修改\" action=\"revise\" />\n\n<h:commandButton value=\"\
  取消\" action=\"cancel\" />\n\n</h:form>\n\n**</ui:define>**\n\n</ui:composition>\n\
  \n**使用 Spring Faces 的 JSF 组件**\n\n在使用 Spring Faces 组件之前，你必须在 Web 部署描述符中注册 `ResourceServlet`，该\
  \ Servlet 由 Spring JavaScript 提供，用于访问 JAR 文件中的静态资源。\n\n9799ch15.qxd 5/22/08 4:38\
  \ PM Page 579\n\n第 15 章 **■** Spring Web Flow\n\n**579**\n\n这些组件将通过此 Servlet 从 Spring\
  \ JavaScript 中获取静态的 JavaScript 和 CSS 资源。\n\n<web-app ...>\n\n...\n\n<servlet>\n\n\
  <servlet-name>resources</servlet-name>\n\n<servlet-class>\n\norg.springframework.js.resource.ResourceServlet\n\
  \n</servlet-class>\n\n</servlet>\n\n<servlet-mapping>\n\n<servlet-name>resources</servlet-name>\n\
  \n<url-pattern>/resources/*</url-pattern>\n\n</servlet-mapping>\n\n</web-app>\n\n\
  Spring Faces 提供了一组验证组件，用于对标准的 JSF 输入组件执行客户端验证。这些组件作为 Facelets 标签提供，定义在 Spring Faces\
  \ 标签库中，因此你需要事先在根元素中包含此标签库。例如，你可以在 `/WEB-INF/flows/borrowBook/borrowForm.xhtml` 中为借阅表单组件启用客户端验证：\n\
  \n[<ui:composition](http://www.w3.org/1999/xhtml)\n\n[](http://www.springframework.org/tags/faces)\n\
  \n**template=\"/WEB-INF/template.xhtml\">\n\n<ui:define name=\"title\">借阅表单</ui:define>\n\
  \n<ui:define name=\"content\">\n\n<h:form>\n\n<h:panelGrid columns=\"2\">\n\n<h:outputLabel\
  \ for=\"isbn\">ISBN</h:outputLabel>\n\n**<sf:clientTextValidator required=\"true\"\
  \ regExp=\"[0-9]{10}\">**\n\n<h:inputText id=\"isbn\" value=\"#{borrowingRecord.isbn}\"\
  \ />\n\n**</sf:clientTextValidator>**\n\n<h:outputLabel for=\"borrowDate\">借阅日期</h:outputLabel>\n\
  \n**<sf:clientDateValidator required=\"true\">**\n\n<h:inputText id=\"borrowDate\"\
  \ value=\"#{borrowingRecord.borrowDate}\">\n\n<f:convertDateTime pattern=\"yyyy-MM-dd\"\
  \ />\n\n</h:inputText>\n\n**</sf:clientDateValidator>**\n\n9799ch15.qxd 5/22/08\
  \ 4:38 PM Page 580\n\n**580**\n\n第 15 章 **■** Spring Web Flow\n\n<h:outputLabel\
  \ for=\"returnDate\">归还日期</h:outputLabel>\n\n**<sf:clientDateValidator required=\"\
  true\">**\n\n<h:inputText id=\"returnDate\" value=\"#{borrowingRecord.returnDate}\"\
  >\n\n<f:convertDateTime pattern=\"yyyy-MM-dd\" />\n\n</h:inputText>\n\n**</sf:clientDateValidator>**\n\
  \n<h:outputLabel for=\"reader\">读者</h:outputLabel>\n\n**<sf:clientTextValidator\
  \ required=\"true\">**\n\n<h:inputText id=\"reader\" value=\"#{borrowingRecord.reader}\"\
  \ />\n\n**</sf:clientTextValidator>**\n\n</h:panelGrid>\n\n**<sf:validateAllOnClick>**\n\
  \n<h:commandButton value=\"继续\" action=\"proceed\" />\n\n**</sf:validateAllOnClick>**\n\
  \n<h:commandButton value=\"取消\" action=\"cancel\" />\n\n</h:form>\n\n</ui:define>\n\
  \n</ui:composition>\n\n这些验证组件为 `inputText` 组件启用了客户端验证。\n\n\n\n您将看到，clientDateValidator\
  \ 组件还会为其包含的输入字段额外提供一个弹出式日期选择器控件。最后，当点击由 validateAllInClick 组件包含的命令按钮时，它将触发同一页面上的所有验证器对其字段进行验证。\n\
  \n最后，您需要选择一个 Dojo 主题来渲染这些组件。例如，您可以在页面模板的 `<body>` 元素中指定使用 tundra 主题：\n\n<html\n\n\
  [>](http://java.sun.com/jsf/facelets)\n\n<head>\n\n<title><ui:insert name=\"title\"\
  >Library</ui:insert></title>\n\n</head>\n\n<body **class=\"tundra\"** >\n\n<ui:insert\
  \ name=\"content\"/>\n\n</body>\n\n</html>\n\n**15-6. 小结**\n\n在本章中，您学习了如何使用 Spring\
  \ Web Flow 2.0 来建模和管理 Web 应用程序的 UI 流程。Spring Web Flow 提供了一种用于建模 Web 流程的流程定义语言。一个流程定义由一个或多个状态组成，每个状态对应流程中的一个步骤。当一个状态完成其任务后，它会触发一个包含事件\
  \ ID 的事件。\n\n每个状态可以包含零个或多个转换，每个转换将返回的事件 ID 映射到下一个状态。Spring Web Flow 有几种内置的状态类型用于建模流程，包括视图、动作、决策、子流程和结束。\n\
  \nSpring Web Flow 提供了与 Spring Security 的集成，因此您可以轻松地使用 Spring Security 保护您的 Web 流程。此外，Spring\
  \ Web Flow 可以在 Web 流程的不同状态之间管理持久化上下文。您可以通过 Spring Web Flow 暴露的流程范围变量来访问这个受管理的持久化上下文。您可以在不同的\
  \ Web 流程状态中使用此持久化上下文来持久化您的对象，然后定义一个结束状态，该状态要么提交更改，要么自动忽略它们。Spring Web Flow 2.0 支持\
  \ JPA 和 Hibernate。\n\nSpring Web Flow 提供了两个子模块，Spring Faces 和 Spring JavaScript，用于将\
  \ Spring 与 JSF 以及 Dojo JavaScript 工具包集成。Spring Faces 支持为 Spring Web Flow 渲染 JSF\
  \ 视图，并提供了一套 JSF 验证组件，用于对标准 JSF 输入组件执行客户端验证。这些组件构建在 Spring JavaScript 之上。\n\n在下一章中，您将学习\
  \ Spring 对各种远程处理技术的支持，以及如何使用契约优先和契约最后两种方法来开发 Web 服务。\n\n9799ch15.qxd 5/22/08 4:38\
