  \n**97**\n\n**4-2\\. 通过调用静态工厂方法创建 Bean**\n\n问题\n\n你希望通过调用*静态工厂方法*在 Spring IoC 容器中创建\
  \ bean，该方法的目的是将对象创建过程封装在一个静态方法中。请求对象的客户端只需调用此方法，而无需了解创建细节。\n\n解决方案\n\nSpring 支持通过调用静态工厂方法来创建\
  \ bean，该方法应在 `factory-method` 属性中指定。\n\n工作原理\n\n例如，你可以编写以下 `createProduct()` 静态工厂方法，根据预定义的产品\
  \ ID 创建产品。根据产品 ID，该方法将决定实例化哪个具体产品类。如果没有匹配此 ID 的产品，它将抛出 `IllegalArgumentException`。\n\
  \npackage com.apress.springrecipes.shop;\n\npublic class ProductCreator {\n\npublic\
  \ static Product createProduct(String productId) {\n\nif (\"aaa\".equals(productId))\
  \ {\n\nreturn new Battery(\"AAA\", 2.5);\n\n} else if (\"cdrw\".equals(productId))\
  \ {\n\nreturn new Disc(\"CD-RW\", 1.5);\n\n}\n\nthrow new IllegalArgumentException(\"\
  Unknown product\");\n\n}\n\n}\n\n\n\n要声明由静态工厂方法创建的 Bean，你需要在 `class` 属性中指定承载工厂方法的类，并在\
  \ `factory-method` 属性中指定工厂方法的名称。最后，通过使用 `<constructor-arg>` 元素传递方法参数。\n\n<beans\
  \ ...>\n\n<bean id=\"aaa\" class=\"com.apress.springrecipes.shop. **ProductCreator**\"\
  \n\n**factory-method=\"createProduct\"** >\n\n<constructor-arg value=\"aaa\" />\n\
  \n</bean>\n\n<bean id=\"cdrw\" class=\"com.apress.springrecipes.shop. **ProductCreator**\"\
  \n\n**factory-method=\"createProduct\"** >\n\n<constructor-arg value=\"cdrw\" />\n\
  \n</bean>\n\n</beans>\n\n9799ch04.qxd 4/10/08 10:53 AM Page 98\n\n**98**\n\n第 4\
  \ 章 **■** 高级 Spring IoC 容器\n\n如果工厂方法抛出任何异常，Spring 会将其包装为 `BeanCreationException`。上述\
  \ Bean 配置的等效代码片段如下所示：\n\nProduct aaa = ProductCreator.createProduct(\"aaa\");\n\n\
  Product cdrw = ProductCreator.createProduct(\"cdrw\");\n\n**4-3. 通过调用实例工厂方法创建 Bean**\n\
  \n问题\n\n你希望通过调用*实例工厂方法*在 Spring IoC 容器中创建一个 Bean，该方法的目的是将对象创建过程封装在另一个对象实例的方法中。请求对象的客户端只需调用此方法，而无需了解创建细节。\n\
  \n解决方案\n\nSpring 支持通过调用实例工厂方法来创建 Bean。Bean 实例应在 `factory-bean` 属性中指定，而工厂方法应在 `factory-method`\
  \ 属性中指定。\n\n工作原理\n\n例如，你可以编写以下 `ProductCreator` 类，使用一个可配置的 Map 来存储预定义的产品。`createProduct()`\
  \ 实例工厂方法通过在 Map 中查找提供的 `productId` 来查找产品。如果没有匹配此 ID 的产品，它将抛出 `IllegalArgumentException`。\n\
  \npackage com.apress.springrecipes.shop;\n\n...\n\npublic class ProductCreator {\n\
  \nprivate Map<String, Product> products;\n\npublic void setProducts(Map<String,\
  \ Product> products) {\n\nthis.products = products;\n\n}\n\npublic Product createProduct(String\
  \ productId) {\n\nProduct product = products.get(productId);\n\nif (product != null)\
  \ {\n\nreturn product;\n\n}\n\nthrow new IllegalArgumentException(\"Unknown product\"\
  );\n\n}\n\n}\n\n9799ch04.qxd 4/10/08 10:53 AM Page 99\n\n第 4 章 **■** 高级 Spring IoC\
  \ 容器\n\n**99**\n\n要从此 `ProductCreator` 类创建产品，你首先需要在 IoC 容器中声明它的一个实例，并配置其产品 Map。你可以将\
  \ Map 中的产品声明为内部 Bean。要声明由实例工厂方法创建的 Bean，你需要在 `factory-bean` 属性中指定承载工厂方法的 Bean，并在\
