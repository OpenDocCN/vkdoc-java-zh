  \n**3-10. 为 Bean 属性定义集合**\n\n问题\n\n有时你的 bean 属性可能是包含多个元素的集合类型。你希望在 Spring 的 bean\
  \ 配置文件中配置这些集合属性，而不是通过编码实现。\n\n解决方案\n\nJava 集合框架为不同类型的集合（如列表、集合和映射）定义了一组接口、实现和算法。图\
  \ 3-4 展示了一个简化的 UML 类图，可能有助于你更好地理解 Java 集合框架。\n\n`List`、`Set` 和 `Map` 是代表三种主要集合类型的核心接口。对于每种集合类型，Java\
  \ 提供了多种具有不同功能和特性的实现供你选择。在 Spring 中，这些集合类型可以通过一组内置的 XML 标签（如 `<list>`、`<set>` 和 `<map>`）轻松配置。\n\
  \n![Image 27](img/index-101_1.png)\n\n9799ch03.qxd 5/5/08 4:50 PM Page 75\n\n第 3\
  \ 章 **■** SPRING 中的 BEAN 配置\n\n**75**\n\n**图 3-4.** *Java 集合框架的简化类图*\n\n工作原理\n\n\
  假设你打算允许序列生成器拥有多个后缀。这些后缀将以连字符作为分隔符附加到序列号后面。你可以考虑接受任意数据类型的后缀，并在附加到序列号时将其转换为字符串。\n\n\
  **列表、数组和集合**\n\n首先，让我们使用一个 `java.util.List` 集合来包含你的后缀。*列表*是一个有序且带索引的集合，其元素可以通过索引或\
  \ for-each 循环访问。\n\npackage com.apress.springrecipes.sequence;\n\n...\n\npublic\
  \ class SequenceGenerator {\n\n...\n\nprivate **List<Object>** suffixes;\n\npublic\
  \ void setSuffixes(**List<Object>** suffixes) {\n\nthis.suffixes = suffixes;\n\n\
  }\n\npublic synchronized String getSequence() {\n\nStringBuffer buffer = new StringBuffer();\n\
  \n...\n\n**for (Object suffix : suffixes) {**\n\n**buffer.append(\"-\");**\n\n**buffer.append(suffix);**\n\
  \n**}**\n\nreturn buffer.toString();\n\n}\n\n}\n\n9799ch03.qxd 5/5/08 4:50 PM Page\
  \ 76\n\n**76**\n\n第 3 章 **■** SPRING 中的 BEAN 配置\n\n要在 bean 配置中定义 `java.util.List`\
  \ 类型的属性，你需要指定一个包含元素的 `<list>` 标签。`<list>` 标签内允许的元素可以是：由 `<value>` 指定的简单常量值、由 `<ref>`\
  \ 指定的 bean 引用、由 `<bean>` 指定的内部 bean 定义，或由 `<null>` 指定的空元素。你甚至可以在一个集合中嵌入其他集合。\n\n\
  <bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"prefixGenerator\" ref=\"datePrefixGenerator\" />\n\n<property\
  \ name=\"initial\" value=\"100000\" />\n\n<property name=\"suffixes\">\n\n**<list>**\n\
  \n<value>A</value>\n\n<bean class=\"java.net.URL\">\n\n<constructor-arg value=\"\
  http\" />\n\n<constructor-arg [value=\"www.apress.com\" />](http://www.apress.com)\n\
  \n<constructor-arg value=\"/\" />\n\n</bean>\n\n<null />\n\n**</list>**\n\n</property>\n\
  \n</bean>\n\n从概念上讲，*数组*与列表非常相似，它也是一个有序且带索引的集合，可以通过索引访问。主要区别在于数组的长度是固定的，不能动态扩展。在\
  \ Java 集合框架中，数组和列表可以通过 `Arrays.asList()` 和 `List.toArray()` 方法相互转换。\n\n对于你的序列生成器，你可以使用一个\
  \ `Object[]` 数组来包含后缀，并通过索引或 for-each 循环访问它们。\n\npackage com.apress.springrecipes.sequence;\n\
  \n...\n\npublic class SequenceGenerator {\n\n...\n\nprivate **Object[]** suffixes;\n\
  \npublic void setSuffixes(**Object[]** suffixes) {\n\nthis.suffixes = suffixes;\n\
  \n}\n\n...\n\n}\n\n在 bean 配置文件中，数组的定义与由 `<list>` 标签表示的列表完全相同。\n\n<bean id=\"sequenceGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\">\n\n...\n\n<property\
  \ name=\"suffixes\">\n\n9799ch03.qxd 5/5/08 4:50 PM Page 77\n\n第 3 章 **■** SPRING\
  \ 中的 BEAN 配置\n\n**77**\n\n**<list>**\n\n<value>A</value>\n\n<bean class=\"java.net.URL\"\
  >\n\n<constructor-arg value=\"http\" />\n\n<constructor-arg [value=\"www.apress.com\"\
  \ />](http://www.apress.com)\n\n<constructor-arg value=\"/\" />\n\n</bean>\n\n<null\
  \ />\n\n**</list>**\n\n</property>\n\n</bean>\n\n另一种常见的集合类型是*集合*。如图 3-4 所示，`java.util.List`\
  \ 和 `java.util.Set` 都扩展了同一个接口 `java.util.Collection`。集合与列表的不同之处在于，它既无序也无索引，并且只能存储唯一的对象。这意味着集合中不能包含重复元素。当同一个元素第二次添加到集合中时，它将替换旧元素。元素的相等性由\
  \ `equals()` 方法决定。\n\npackage com.apress.springrecipes.sequence;\n\n...\n\npublic\
  \ class SequenceGenerator {\n\n...\n\nprivate **Set<Object>** suffixes;\n\npublic\
  \ void setSuffixes(**Set<Object>** suffixes) {\n\nthis.suffixes = suffixes;\n\n\
  }\n\n...\n\n}\n\n要定义 `java.util.Set` 类型的属性，请使用 `<set>` 标签，其定义元素的方式与列表相同。\n\n<bean\
  \ id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n...\n\n<property name=\"suffixes\">\n\n**<set>**\n\n<value>A</value>\n\n<bean\
  \ class=\"java.net.URL\">\n\n<constructor-arg value=\"http\" />\n\n<constructor-arg\
  \ [value=\"www.apress.com\" />](http://www.apress.com)\n\n<constructor-arg value=\"\
  /\" />\n\n</bean>\n\n<null />\n\n**</set>**\n\n</property>\n\n</bean>\n\n9799ch03.qxd\
  \ 5/5/08 4:50 PM Page 78\n\n**78**\n\n第 3 章 **■** SPRING 中的 BEAN 配置\n\n尽管在原始的集合语义中没有顺序的概念，但\
  \ Spring 通过使用 `java.util.LinkedHashSet`（一个确实保留元素顺序的 `java.util.Set` 接口实现）来保留元素的顺序。\n\
  \n**映射和属性**\n\n\n\n*映射*（*map*）是一种以键/值对形式存储条目的表。你可以通过键从映射中获取特定值，也可以使用 for-each 循环遍历映射条目。映射的键和值都可以是任意类型。键之间的相等性也由\
  \ `equals()` 方法决定。例如，你可以修改序列生成器，使其接受一个包含带键后缀的 `java.util.Map` 集合。\n\n```java\npackage\
  \ com.apress.springrecipes.sequence;\n\n...\n\npublic class SequenceGenerator {\n\
  \n...\n\nprivate **Map<Object, Object>** suffixes;\n\npublic void setSuffixes(**Map<Object,\
  \ Object>** suffixes) {\n\nthis.suffixes = suffixes;\n\n}\n\npublic synchronized\
  \ String getSequence() {\n\nStringBuffer buffer = new StringBuffer();\n\n...\n\n\
  **for (Map.Entry entry : suffixes.entrySet()) {**\n\n**buffer.append(\"-\");**\n\
  \n**buffer.append(entry.getKey());**\n\n**buffer.append(\"@\");**\n\n**buffer.append(entry.getValue());**\n\
  \n**}**\n\nreturn buffer.toString();\n\n}\n\n}\n```\n\n在 Spring 中，映射通过 `<map>` 标签定义，其子标签为多个\
  \ `<entry>` 标签。每个条目包含一个键和一个值。键必须在 `<key>` 标签内定义。键和值的类型没有限制，因此你可以自由地为它们指定 `<value>`、`<ref>`、`<bean>`\
  \ 或 `<null>` 元素。Spring 还会通过使用 `java.util.LinkedHashMap` 来保持映射条目的顺序。\n\n```xml\n\
  <bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n...\n\n<property name=\"suffixes\">\n\n**<map>**\n\n<entry>\n\n<key>\n\n<value>type</value>\n\
  \n</key>\n\n<value>A</value>\n\n</entry>\n\n<entry>\n\n<key>\n\n<value>url</value>\n\
  \n</key>\n\n<bean class=\"java.net.URL\">\n\n<constructor-arg value=\"http\" />\n\
  \n<constructor-arg value=\"www.apress.com\" />\n\n<constructor-arg value=\"/\" />\n\
  \n</bean>\n\n</entry>\n\n**</map>**\n\n</property>\n\n</bean>\n```\n\n有一种快捷方式可以将映射的键和值定义为\
  \ `<entry>` 标签的属性。如果它们是简单的常量值，你可以通过 `key` 和 `value` 属性来定义。如果它们是 Bean 引用，你可以通过 `key-ref`\
  \ 和 `value-ref` 属性来定义。\n\n```xml\n<bean id=\"sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n...\n\n<property name=\"suffixes\">\n\n<map>\n\n<entry **key=\"type\" value=\"\
  A\"** />\n\n<entry **key=\"url\"** >\n\n<bean class=\"java.net.URL\">\n\n<constructor-arg\
  \ value=\"http\" />\n\n<constructor-arg value=\"www.apress.com\" />\n\n<constructor-arg\
  \ value=\"/\" />\n\n</bean>\n\n</entry>\n\n</map>\n\n</property>\n\n</bean>\n```\n\
  \n`java.util.Properties` 集合与映射非常相似。它也实现了 `java.util.Map` 接口，并以键/值对的形式存储条目。唯一的区别是\
  \ `Properties` 集合的键和值始终是字符串。\n\n```java\npackage com.apress.springrecipes.sequence;\n\
  \n...\n\npublic class SequenceGenerator {\n\n...\n\nprivate **Properties** suffixes;\n\
  \npublic void setSuffixes(**Properties** suffixes) {\n\nthis.suffixes = suffixes;\n\
  \n}\n\n...\n\n}\n```\n\n要在 Spring 中定义 `java.util.Properties` 集合，请使用 `<props>` 标签，其子标签为多个\
  \ `<prop>` 标签。每个 `<prop>` 标签必须定义一个 `key` 属性，并将对应的值包含在标签内。\n\n```xml\n<bean id=\"\
  sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n...\n\n<property name=\"suffixes\">\n\n**<props>**\n\n<prop key=\"type\">A</prop>\n\
  \n<prop key=\"url\">http://www.apress.com/</prop>\n\n**</props>**\n\n</property>\n\
  \n</bean>\n```\n\n**合并父 Bean 的集合**\n\n如果你使用继承来定义 Bean，则可以通过将 `merge` 属性设置为 `true`，将子\
  \ Bean 的集合与其父 Bean 的集合合并。对于 `<list>` 集合，子元素将追加到父元素之后以保持顺序。因此，以下序列生成器将拥有四个后缀：A、B、A\
  \ 和 C。\n\n```xml\n<beans ...>\n\n<bean id=\"baseSequenceGenerator\"\n\nclass=\"\
  com.apress.springrecipes.sequence.SequenceGenerator\">\n\n<property name=\"prefixGenerator\"\
  \ ref=\"datePrefixGenerator\" />\n```\n\n\n<property name=\"initial\" value=\"100000\"\
  \ />\n\n<property name=\"suffixes\">\n\n<list>\n\n<value>A</value>\n\n<value>B</value>\n\
  \n</list>\n\n</property>\n\n</bean>\n\n<bean id=\"sequenceGenerator\" parent=\"\
  baseSequenceGenerator\">\n\n<property name=\"suffixes\">\n\n<list **merge=\"true\"\
  ** >\n\n<value>A</value>\n\n<value>C</value>\n\n</list>\n\n</property>\n\n9799ch03.qxd\
  \ 5/5/08 4:50 PM Page 81\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n**81**\n\n</bean>\n\
  \n...\n\n</beans>\n\n对于`<set>`或`<map>`集合，如果子元素与父元素的值相同，则子元素会覆盖父元素。因此，以下序列生成器将包含三个后缀：A、B\
  \ 和 C。\n\n<beans ...>\n\n<bean id=\"baseSequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"prefixGenerator\" ref=\"datePrefixGenerator\" />\n\n<property\
  \ name=\"initial\" value=\"100000\" />\n\n<property name=\"suffixes\">\n\n<set>\n\
  \n<value>A</value>\n\n<value>B</value>\n\n</set>\n\n</property>\n\n</bean>\n\n<bean\
  \ id=\"sequenceGenerator\" parent=\"baseSequenceGenerator\">\n\n<property name=\"\
  suffixes\">\n\n<set **merge=\"true\"** >\n\n<value>A</value>\n\n<value>C</value>\n\
  \n</set>\n\n</property>\n\n</bean>\n\n...\n\n</beans>\n\n**3-11. 指定集合元素的数据类型**\n\
  \n问题\n\n默认情况下，Spring 将集合中的每个元素都视为字符串。如果你不打算将它们作为字符串使用，则必须为集合元素指定数据类型。\n\n解决方案\n\n\
  你可以通过`<value>`标签的`type`属性为每个集合元素指定数据类型，或者通过集合标签的`value-type`属性为所有元素指定数据类型。如果你使用的是\
  \ Java 1.5 或更高版本，可以定义一个类型安全的集合，这样 Spring 就能读取你的集合类型信息。\n\n9799ch03.qxd 5/5/08 4:50\
  \ PM Page 82\n\n**82**\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n工作原理\n\n现在假设你要接受一个整数列表作为序列生成器的后缀。每个数字将通过`java.text.DecimalFormat`的实例格式化为四位数字。\n\
  \npackage com.apress.springrecipes.sequence;\n\n...\n\npublic class SequenceGenerator\
  \ {\n\n...\n\nprivate **List<Object>** suffixes;\n\npublic void setSuffixes(**List<Object>**\
  \ suffixes) {\n\nthis.suffixes = suffixes;\n\n}\n\npublic synchronized String getSequence()\
  \ {\n\nStringBuffer buffer = new StringBuffer();\n\n...\n\n**DecimalFormat formatter\
  \ = new DecimalFormat(\"0000\");**\n\n**for (Object suffix : suffixes) {**\n\n**buffer.append(\"\
  -\");**\n\n**buffer.append(formatter.format((Integer) suffix));**\n\n**}**\n\nreturn\
  \ buffer.toString();\n\n}\n\n}\n\n然后像往常一样，在 Bean 配置文件中为序列生成器定义几个后缀。\n\n<bean id=\"\
  sequenceGenerator\"\n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\"\
  >\n\n<property name=\"prefixGenerator\" ref=\"datePrefixGenerator\" />\n\n<property\
  \ name=\"initial\" value=\"100000\" />\n\n<property name=\"suffixes\">\n\n<list>\n\
  \n<value>5</value>\n\n<value>10</value>\n\n<value>20</value>\n\n</list>\n\n</property>\n\
  \n</bean>\n\n然而，当你运行此应用程序时，会遇到`ClassCastException`异常，提示后缀无法转换为整数，因为它们的类型是字符串。默认情况下，Spring\
  \ 将集合中的每个元素都视为字符串。你必须设置`<value>`标签的`type`属性来指定元素类型。\n\n9799ch03.qxd 5/5/08 4:50\
  \ PM Page 83\n\n第 3 章 **■** Spring 中的 Bean 配置\n\n**83**\n\n<bean id=\"sequenceGenerator\"\
  \n\nclass=\"com.apress.springrecipes.sequence.SequenceGenerator\">\n\n...\n\n<property\
  \ name=\"suffixes\">\n\n<list>\n\n<value **type=\"int\"** >5</value>\n\n<value **type=\"\
  int\"** >10</value>\n\n<value **type=\"int\"** >20</value>\n\n</list>\n\n</property>\n\
  \n</bean>\n\n或者，你可以设置集合标签的`value-type`属性，为这个集合中的所有元素指定类型。\n\n<bean id=\"sequenceGenerator\"\
