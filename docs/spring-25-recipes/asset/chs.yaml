  \ void setUp() throws Exception {\n\ninterestCalculator = new SimpleInterestCalculator();\n\
  \n9799ch12.qxd 5/14/08 4:08 PM Page 420\n\n**420**\n\n第 12 章 **■** Spring 测试支持\n\
