  </beans>\n\n**4-12\\. 解析文本消息**\n\n问题\n\n为了使应用程序支持国际化（简称 I18N，因为第一个字符 *i* 和最后一个字符\
  \ *n* 之间有 18 个字符），它需要具备为不同区域解析文本消息的能力。\n\n解决方案\n\nSpring 的应用上下文能够根据键为特定区域解析文本消息。通常，一个区域的文本消息应存储在一个独立的属性文件中。这个属性文件被称为*资源包*。\n\
  \n`MessageSource` 是一个定义了多个用于解析消息的方法的接口。`ApplicationContext` 接口扩展了此接口，因此所有应用上下文都能够解析文本消息。应用上下文将消息解析委托给一个名为\
  \ `messageSource` 的 Bean。`ResourceBundleMessageSource` 是最常见的 `MessageSource` 实现，它从不同区域的资源包中解析消息。\n\
  \n工作原理\n\n例如，你可以为美国英语创建以下资源包 `messages_en_US.properties`。资源包将从类路径的根目录加载。\n\n9799ch04.qxd\
  \ 4/10/08 10:53 AM Page 122\n\n**122**\n\n第 4 章 **■** 高级 Spring IoC 容器\n\nalert.checkout=一个购物车已被结账。\n\
  \n\n\n要解析资源包中的消息，你需要使用 `ResourceBundleMessageSource` 作为 `MessageSource` 的实现。该 Bean\
  \ 的名称必须设置为 `messageSource`，以便应用程序上下文能够检测到它。你需要为 `ResourceBundleMessageSource` 指定资源包的基名。\n\
  \n<beans ...>\n\n...\n\n<bean id=\"messageSource\"\n\nclass=\"org.springframework.context.support.ResourceBundleMessageSource\"\
  >\n\n<property name=\"basename\">\n\n<value>messages</value>\n\n</property>\n\n\
  </bean>\n\n</beans>\n\n对于这个 `MessageSource` 定义，如果你查找美国区域（首选语言为英语）的文本消息，会优先考虑同时匹配语言和国家的资源包\
  \ `messages_en_US.properties`。如果不存在这样的资源包或找不到消息，则会考虑仅匹配语言的 `messages_en.properties`。如果仍然找不到该资源包，最终会选择适用于所有区域的默认\
  \ `messages.properties`。有关资源包加载的更多信息，你可以参考 `java.util.ResourceBundle` 类的 javadoc。\n\
  \n现在，你可以通过 `getMessage()` 方法请求应用程序上下文解析消息。第一个参数是消息对应的键，第三个参数是目标区域。\n\npackage com.apress.springrecipes.shop;\n\
