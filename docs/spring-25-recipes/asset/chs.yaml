  \n}\n\n**12-8. 使用 Spring 的通用测试注解**\n\n问题\n\n由于 JUnit 3.8 不像 JUnit 4 那样提供内置的测试注解，你常常需要手动实现常见的测试任务，例如预期抛出异常、多次重复执行测试方法、确保测试方法在特定时间内完成等。\n\
  \n解决方案\n\nSpring 的测试支持提供了一套通用的测试注解，以简化测试的创建。这些注解是 Spring 特有的，但独立于底层测试框架。其中，以下注解对于常见的测试任务非常有用。\n\
  \n不过，它们仅支持与 JUnit（3.8 和 4.4 版本）一起使用：\n\n@Repeat：表示测试方法必须运行多次。运行次数由注解的值指定。\n\n@Timed：表示测试方法必须在指定的时间（以毫秒为单位）内完成。否则，测试失败。请注意，该时间包括测试方法的重复执行以及任何初始化和清理方法。\n\
  \n@IfProfileValue：表示测试方法只能在特定的测试环境中运行。只有当实际的 profile 值与指定的值匹配时，该测试方法才会运行。你还可以指定多个值，这样只要匹配其中任何一个值，测试方法就会运行。默认情况下，使用\
  \ SystemProfileValueSource 来检索系统属性作为 profile 值，但你可以创建自己的 ProfileValueSource 实现，并在\
  \ @ProfileValueSourceConfiguration 注解中指定它。\n\n@ExpectedException：其效果与 JUnit 4 和\
  \ TestNG 的预期异常支持相同。然而，由于 JUnit 3.8 没有类似的支持，这对于在 JUnit 3.8 中测试异常是一个很好的补充。\n\n在 2.5\
  \ 版本之前的版本中使用 Spring 的 JUnit 3.8 遗留支持时，你的测试类可以继承 AbstractAnnotationAwareTransactionalTests\
  \ 基类（它是 AbstractTransactionalDataSourceSpringContextTests 的子类），以使用 Spring 的通用测试注解。\n\
  \n在 Spring 2.5 的 TestContext 框架中，你可以通过继承一个 TestContext 支持类来使用 Spring 的测试注解。如果你没有继承支持类，而是使用测试运行器\
  \ SpringJUnit4ClassRunner 来运行你的 JUnit 4.4 测试，那么你也可以使用这些注解。\n\n9799ch12.qxd 5/14/08\
  \ 4:08 PM Page 460\n\n**460**\n\n第 12 章 **■** Spring 测试支持\n\n工作原理\n\n**将通用测试注解与\
