  \n+ \"() begins with \" + **Arrays.toString(joinPoint.getArgs())**);\n\n}\n\n}\n\
  \n**后置通知**\n\n*后置*通知在连接点结束后执行，无论它是正常返回结果还是异常抛出。以下的后置通知记录了计算器方法的结束。一个切面可以包含一个或多个通知。\n\
  \npackage com.apress.springrecipes.calculator;\n\n...\n\nimport org.aspectj.lang.JoinPoint;\n\
