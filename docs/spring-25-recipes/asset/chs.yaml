  \ Spring 2.x 中使用 `<util:property-path>` 标签。\n\n**工作原理**\n\n作为示例，让我们创建一个 `ProductRanking`\
  \ 类，其中包含一个类型为 `Product` 的 `bestSeller` 属性。\n\n```java\npackage com.apress.springrecipes.shop;\n\
  \npublic class ProductRanking {\n\n    private Product bestSeller;\n\n    public\
