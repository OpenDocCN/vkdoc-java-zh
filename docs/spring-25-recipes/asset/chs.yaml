  \ 的作用域为 request，这意味着每次请求都会创建一个新的 bean 实例。请注意，通过注册变量解析器 `DelegatingVariableResolver`，你可以轻松地以\
  \ `#{beanName}` 的形式，将 Spring 应用上下文中声明的 bean 作为 JSF 变量进行引用。该变量解析器会首先尝试从原始的 JSF 变量解析器中解析变量。如果变量无法被解析，它将在\
