  \n**7-4. 简化 JDBC 模板创建**\n\n问题\n\n每次使用 `JdbcTemplate` 时都创建一个新实例效率不高，因为你必须重复创建语句并花费创建新对象的成本。\n\
  \n解决方案\n\n`JdbcTemplate` 类被设计为线程安全的，因此你可以在 IoC 容器中声明它的单个实例，并将此实例注入到所有 DAO 实例中。此外，Spring\
  \ JDBC 框架提供了一个便捷类 `JdbcDaoSupport` 来简化你的 DAO 实现。该类声明了一个 `jdbcTemplate` 属性，该属性可以从\
  \ IoC 容器注入，也可以从数据源自动创建。你的 DAO 可以扩展此类以继承此属性。\n\n9799ch07.qxd 5/5/08 4:47 PM 第 228\
  \ 页\n\n**228**\n\n第 7 章 **■** Spring JDBC 支持\n\n工作原理\n\n**注入 JDBC 模板**\n\n\n\n到目前为止，你已经在每个\
  \ DAO 方法中都创建了一个新的 JdbcTemplate 实例。实际上，你可以在类级别注入它，并在所有 DAO 方法中使用这个注入的实例。\n\n为简单起见，以下代码仅展示对\
  \ `insert()` 方法的修改。\n\npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport\
  \ org.springframework.jdbc.core.JdbcTemplate;\n\npublic class JdbcVehicleDao implements\
  \ VehicleDao {\n\n**private JdbcTemplate jdbcTemplate;**\n\n**public void setJdbcTemplate(JdbcTemplate\
  \ jdbcTemplate) {**\n\n**this.jdbcTemplate = jdbcTemplate;**\n\n**}**\n\npublic\
  \ void insert(final Vehicle vehicle) {\n\nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO,\
  \ COLOR, WHEEL, SEAT) \"\n\n+ \"VALUES (?, ?, ?, ?)\";\n\n**jdbcTemplate**.update(sql,\
  \ new Object[] { vehicle.getVehicleNo(),\n\nvehicle.getColor(), vehicle.getWheel(),\
  \ vehicle.getSeat() });\n\n}\n\n...\n\n}\n\nJDBC 模板需要设置一个数据源。你可以通过 setter 方法或构造函数参数来注入此属性。然后，你可以将这个\
  \ JDBC 模板注入到你的 DAO 中。\n\n<beans ...>\n\n...\n\n<bean id=\"jdbcTemplate\"\n\nclass=\"\
  org.springframework.jdbc.core.JdbcTemplate\">\n\n<property name=\"dataSource\" ref=\"\
  dataSource\" />\n\n</bean>\n\n<bean id=\"vehicleDao\"\n\nclass=\"com.apress.springrecipes.vehicle.JdbcVehicleDao\"\
  >\n\n**<property name=\"jdbcTemplate\" ref=\"jdbcTemplate\" />**\n\n</bean>\n\n\
  </beans>\n\n9799ch07.qxd 5/5/08 4:47 PM Page 229\n\n第 7 章 **■** S P R I N G J D\
  \ B C 支 持\n\n**229**\n\n**扩展 JdbcDaoSupport 类**\n\nJdbcDaoSupport 类包含一个 setDataSource()\
  \ 方法和一个 setJdbcTemplate() 方法。你的 DAO 类可以通过继承此类来继承这些方法。然后，你可以直接注入一个 JDBC 模板，或者注入一个数据源供其创建\
  \ JDBC 模板。以下代码片段摘自 Spring 的 JdbcDaoSupport 类：\n\npackage org.springframework.jdbc.core.support;\n\
  \n...\n\npublic abstract class JdbcDaoSupport extends DaoSupport {\n\nprivate JdbcTemplate\
  \ jdbcTemplate;\n\npublic final void setDataSource(DataSource dataSource) {\n\n\
  this.jdbcTemplate = createJdbcTemplate(dataSource);\n\ninitTemplateConfig();\n\n\
  }\n\npublic final void setJdbcTemplate(JdbcTemplate jdbcTemplate) {\n\nthis.jdbcTemplate\
  \ = jdbcTemplate;\n\ninitTemplateConfig();\n\n}\n\npublic final JdbcTemplate getJdbcTemplate()\
  \ {\n\nreturn jdbcTemplate;\n\n}\n\n...\n\n}\n\n在你的 DAO 方法中，你可以直接调用 getJdbcTemplate()\
  \ 方法来获取 JDBC 模板。你还需要从 DAO 类中删除 dataSource 和 jdbcTemplate 属性及其 setter 方法，因为它们已经被继承了。同样，为简单起见，仅展示对\
  \ `insert()` 方法的修改。\n\npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport\
  \ org.springframework.jdbc.core.support.JdbcDaoSupport;\n\npublic class JdbcVehicleDao\
  \ **extends JdbcDaoSupport** implements VehicleDao {\n\npublic void insert(final\
  \ Vehicle vehicle) {\n\nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO, COLOR, WHEEL,\
  \ SEAT) \"\n\n+ \"VALUES (?, ?, ?, ?)\";\n\n**getJdbcTemplate()**.update(sql, new\
  \ Object[] { vehicle.getVehicleNo(), vehicle.getColor(), vehicle.getWheel(), vehicle.getSeat()\
  \ });\n\n}\n\n...\n\n}\n\n9799ch07.qxd 5/5/08 4:47 PM Page 230\n\n**230**\n\n第 7\
  \ 章 **■** S P R I N G J D B C 支 持\n\n通过扩展 JdbcDaoSupport，你的 DAO 类继承了 setDataSource()\
  \ 方法。你可以向 DAO 实例注入一个数据源，供其创建 JDBC 模板。\n\n<beans ...>\n\n...\n\n<bean id=\"vehicleDao\"\
  \n\nclass=\"com.apress.springrecipes.vehicle.JdbcVehicleDao\">\n\n**<property name=\"\
  dataSource\" ref=\"dataSource\" />**\n\n</bean>\n\n</beans>\n\n**7-5\\. 在 Java 1.5\
  \ 中使用简单 JDBC 模板**\n\n问题\n\nJdbcTemplate 类在大多数情况下工作良好，但可以进一步改进以利用 Java 1.5 的特性。\n\
  \n解决方案\n\nSimpleJdbcTemplate 是 JdbcTemplate 的演进版本，它利用 Java 1.5 的特性（如自动装箱、泛型和可变长度参数）来简化其使用。\n\
  \n工作原理\n\n**使用简单 JDBC 模板更新数据库**\n\n\n\n经典 JdbcTemplate 中的许多方法要求将语句参数以对象数组的形式传递。而在\
  \ SimpleJdbcTemplate 中，这些参数可以作为可变长度参数传递，省去了将它们包装成数组的麻烦。要使用 SimpleJdbcTemplate，你可以直接实例化它，也可以通过扩展\
  \ SimpleJdbcDaoSupport 类来获取其实例。\n\npackage com.apress.springrecipes.vehicle;\n\n\
  ...\n\nimport org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\npublic\
  \ class JdbcVehicleDao extends **SimpleJdbcDaoSupport** implements VehicleDao {\n\
  \npublic void insert(Vehicle vehicle) {\n\nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO,\
  \ COLOR, WHEEL, SEAT) \"\n\n+ \"VALUES (?, ?, ?, ?)\";\n\n**getSimpleJdbcTemplate()**.update(sql,\
  \ **vehicle.getVehicleNo(),**\n\n**vehicle.getColor(), vehicle.getWheel(), vehicle.getSeat()**);\n\
  \n}\n\n...\n\n}\n\n9799ch07.qxd 5/5/08 4:47 PM Page 231\n\n第 7 章 **■** S P R I N\
  \ G J D B C 支 持\n\n**231**\n\nSimpleJdbcTemplate 提供了一个便捷的批量更新方法，允许你以 List<Object[]>\
  \ 的形式指定 SQL 语句和一批参数，这样你就不需要实现 BatchPreparedStatementSetter 接口了。\n\npackage com.apress.springrecipes.vehicle;\n\
  \n...\n\nimport org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\npublic\
  \ class JdbcVehicleDao extends SimpleJdbcDaoSupport implements VehicleDao {\n\n\
  ...\n\npublic void insertBatch(List<Vehicle> vehicles) {\n\nString sql = \"INSERT\
  \ INTO VEHICLE (VEHICLE_NO, COLOR, WHEEL, SEAT) \"\n\n+ \"VALUES (?, ?, ?, ?)\"\
  ;\n\nList<Object[]> parameters = new ArrayList<Object[]>();\n\nfor (Vehicle vehicle\
  \ : vehicles) {\n\nparameters.add(new Object[] { vehicle.getVehicleNo(),\n\nvehicle.getColor(),\
  \ vehicle.getWheel(), vehicle.getSeat() });\n\n}\n\ngetSimpleJdbcTemplate().batchUpdate(sql,\
  \ parameters);\n\n}\n\n}\n\n**使用 Simple JDBC Template 查询数据库**\n\n在实现 RowMapper 接口时，mapRow()\
  \ 方法的返回类型是 java.lang.Object。ParameterizedRowMapper 是一个子接口，它接受一个类型参数作为 mapRow() 方法的返回类型。\n\
  \npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.simple.ParameterizedRowMapper;\n\
  \npublic class VehicleRowMapper implements **ParameterizedRowMapper<Vehicle>** {\n\
  \npublic **Vehicle** mapRow(ResultSet rs, int rowNum) throws SQLException {\n\n\
  Vehicle vehicle = new Vehicle();\n\nvehicle.setVehicleNo(rs.getString(\"VEHICLE_NO\"\
  ));\n\nvehicle.setColor(rs.getString(\"COLOR\"));\n\nvehicle.setWheel(rs.getInt(\"\
  WHEEL\"));\n\nvehicle.setSeat(rs.getInt(\"SEAT\"));\n\nreturn vehicle;\n\n}\n\n\
  }\n\n将 SimpleJdbcTemplate 与 ParameterizedRowMapper 结合使用，可以省去对返回结果进行类型转换的麻烦。对于 queryForObject()\
  \ 方法，其返回类型由 ParameterizedRowMapper 对象的类型参数决定，在本例中即为 Vehicle。\n\n9799ch07.qxd 5/5/08\
  \ 4:47 PM Page 232\n\n**232**\n\n第 7 章 **■** S P R I N G J D B C 支 持\n\n请注意，由于语句参数是可变长度的，因此必须将它们放在参数列表的末尾。\n\
  \npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\
  \npublic class JdbcVehicleDao extends SimpleJdbcDaoSupport implements\n\nVehicleDao\
  \ {\n\n...\n\npublic Vehicle findByVehicleNo(String vehicleNo) {\n\nString sql =\
  \ \"SELECT * FROM VEHICLE WHERE VEHICLE_NO = ?\";\n\n**// 不再需要强制转换为 Vehicle 类型。**\n\
  \nVehicle vehicle = **getSimpleJdbcTemplate()**.queryForObject(sql,\n\n**new VehicleRowMapper(),\
  \ vehicleNo**);\n\nreturn vehicle;\n\n}\n\n}\n\nSpring 2.5 还提供了一个便捷的 ParameterizedRowMapper\
  \ 实现——ParameterizedBeanPropertyRowMapper，它可以自动将一行数据映射到指定类的新实例。\n\npackage com.apress.springrecipes.vehicle;\n\
  \n...\n\nimport org.springframework.jdbc.core.simple.ParameterizedBeanPropertyRowMapper;\
  \ import org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\npublic class\
  \ JdbcVehicleDao extends SimpleJdbcDaoSupport implements\n\nVehicleDao {\n\n...\n\
  \npublic Vehicle findByVehicleNo(String vehicleNo) {\n\n\n\nString sql = \"SELECT\
  \ * FROM VEHICLE WHERE VEHICLE_NO = ?\";\n\nVehicle vehicle = getSimpleJdbcTemplate().queryForObject(sql,\n\
  \n**ParameterizedBeanPropertyRowMapper.newInstance(Vehicle.class),**\n\nvehicleNo);\n\
  \nreturn vehicle;\n\n}\n\n}\n\n使用经典的 JdbcTemplate 时，`findAll()` 方法会因从 `List` 到 `List<Vehicle>`\
  \ 的未检查转换而引发 Java 编译器警告。这是因为 `query()` 方法的返回类型是 `List`，而非类型安全的 `List<Vehicle>`。切换到\
  \ SimpleJdbcTemplate 和 ParameterizedBeanPropertyRowMapper 后，该警告将立即消除，因为返回的 List\
  \ 已使用与 ParameterizedRowMapper 参数相同的类型进行了参数化。\n\n9799ch07.qxd 5/5/08 4:47 PM Page\
  \ 233\n\n第 7 章 **■** S P R I N G J D B C S U P P O RT\n\n**233**\n\npackage com.apress.springrecipes.vehicle;\n\
  \n...\n\nimport org.springframework.jdbc.core.simple.ParameterizedBeanPropertyRowMapper;\
  \ import org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\npublic class\
  \ JdbcVehicleDao extends SimpleJdbcDaoSupport implements\n\nVehicleDao {\n\n...\n\
  \npublic List<Vehicle> findAll() {\n\nString sql = \"SELECT * FROM VEHICLE\";\n\n\
  List<Vehicle> vehicles = **getSimpleJdbcTemplate()**.query(sql,\n\n**ParameterizedBeanPropertyRowMapper.newInstance(Vehicle.class)**);\n\
  \nreturn vehicles;\n\n}\n\n}\n\n使用 SimpleJdbcTemplate 查询单个值时，`queryForObject()`\
  \ 方法的返回类型将由类参数（例如 `String.class`）决定。因此，您无需手动执行类型转换。请注意，可变长度的语句参数也必须在参数列表的末尾提供。\n\
  \npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\
  \npublic class JdbcVehicleDao extends SimpleJdbcDaoSupport implements\n\nVehicleDao\
  \ {\n\n...\n\npublic String getColor(String vehicleNo) {\n\nString sql = \"SELECT\
  \ COLOR FROM VEHICLE WHERE VEHICLE_NO = ?\";\n\n**// 无需再转换为 String 类型。**\n\nString\
  \ color = **getSimpleJdbcTemplate()**.queryForObject(sql,\n\n**String.class, vehicleNo**);\n\
  \nreturn color;\n\n}\n\n}\n\n**7-6\\. 在 JDBC 模板中使用命名参数**\n\n问题\n\n在经典的 JDBC 用法中，SQL\
  \ 参数由占位符 `?` 表示，并通过位置进行绑定。位置参数的问题在于，每当参数顺序发生变化时，您也必须更改参数绑定。对于包含许多参数的 SQL 语句，按位置匹配参数非常繁琐。\n\
  \n9799ch07.qxd 5/5/08 4:47 PM Page 234\n\n**234**\n\nC H A P T E R 7 **■** S P R\
  \ I N G J D B C S U P P O RT\n\n解决方案\n\n在 Spring JDBC 框架中绑定 SQL 参数的另一种选择是使用命名参数。顾名思义，命名\
  \ SQL 参数通过名称（以冒号开头）而非位置来指定。命名参数更易于维护，并且还能提高可读性。在运行时，框架类会将命名参数替换为占位符。命名参数仅在 SimpleJdbcTemplate\
  \ 和 NamedParameterJdbcTemplate 中受支持。\n\n工作原理\n\n在 SQL 语句中使用命名参数时，您可以将参数值以映射（Map）的形式提供，其中参数名称作为键。\n\
  \npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\
  \npublic class JdbcVehicleDao extends SimpleJdbcDaoSupport implements\n\nVehicleDao\
  \ {\n\npublic void insert(Vehicle vehicle) {\n\nString sql = \"INSERT INTO VEHICLE\
  \ (VEHICLE_NO, COLOR, WHEEL, SEAT) \"\n\n+ \"VALUES (**:vehicleNo, :color, :wheel,\
  \ :seat**)\";\n\nMap<String, Object> parameters = new HashMap<String, Object>();\
  \ parameters.put(\"vehicleNo\", vehicle.getVehicleNo());\n\nparameters.put(\"color\"\
  , vehicle.getColor());\n\nparameters.put(\"wheel\", vehicle.getWheel());\n\nparameters.put(\"\
  seat\", vehicle.getSeat());\n\ngetSimpleJdbcTemplate().update(sql, **parameters**);\n\
  \n}\n\n...\n\n}\n\n\n\n您还可以提供一个 SQL 参数源，其职责是为命名参数提供 SQL 参数值。`SqlParameterSource`\
  \ 接口有两种实现。基础实现是 `MapSqlParameterSource`，它将一个 Map 封装为其参数源。\n\n```java\npackage com.apress.springrecipes.vehicle;\n\
  \n...\n\nimport org.springframework.jdbc.core.namedparam.MapSqlParameterSource;\n\
  \nimport org.springframework.jdbc.core.namedparam.SqlParameterSource;\n\nimport\
  \ org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\npublic class JdbcVehicleDao\
  \ extends SimpleJdbcDaoSupport implements\n\nVehicleDao {\n\n9799ch07.qxd 5/5/08\
  \ 4:47 PM Page 235\n\nC H A P T E R 7 **■** S P R I N G J D B C S U P P O RT\n\n\
  **235**\n\npublic void insert(Vehicle vehicle) {\n\nString sql = \"INSERT INTO VEHICLE\
  \ (VEHICLE_NO, COLOR, WHEEL, SEAT) \"\n\n+ \"VALUES (:vehicleNo, :color, :wheel,\
  \ :seat)\";\n\nMap<String, Object> parameters = new HashMap<String, Object>();\n\
  \n...\n\n**SqlParameterSource parameterSource =**\n\n**new MapSqlParameterSource(parameters);**\n\
  \ngetSimpleJdbcTemplate().update(sql, **parameterSource**);\n\n}\n\n...\n\n}\n```\n\
  \n`SqlParameterSource` 的另一个实现是 `BeanPropertySqlParameterSource`，它将一个普通的 Java 对象封装为\
  \ SQL 参数源。对于每个命名参数，将使用同名的属性作为参数值。\n\n```java\npackage com.apress.springrecipes.vehicle;\n\
  \n...\n\nimport org.springframework.jdbc.core.namedparam.BeanPropertySqlParameterSource;\
  \ import org.springframework.jdbc.core.namedparam.SqlParameterSource;\n\nimport\
  \ org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\npublic class JdbcVehicleDao\
  \ extends SimpleJdbcDaoSupport implements\n\nVehicleDao {\n\npublic void insert(Vehicle\
  \ vehicle) {\n\nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO, COLOR, WHEEL, SEAT)\
  \ \"\n\n+ \"VALUES (:vehicleNo, :color, :wheel, :seat)\";\n\n**SqlParameterSource\
  \ parameterSource =**\n\n**new BeanPropertySqlParameterSource(vehicle);**\n\ngetSimpleJdbcTemplate().update(sql,\
  \ **parameterSource**);\n\n}\n\n...\n\n}\n```\n\n命名参数也可以在批量更新中使用。您可以为参数值提供一个 Map\
  \ 数组或一个 `SqlParameterSource` 数组。\n\n```java\npackage com.apress.springrecipes.vehicle;\n\
  \n...\n\nimport org.springframework.jdbc.core.namedparam.BeanPropertySqlParameterSource;\
  \ import org.springframework.jdbc.core.namedparam.SqlParameterSource;\n\nimport\
  \ org.springframework.jdbc.core.simple.SimpleJdbcDaoSupport;\n\n9799ch07.qxd 5/5/08\
  \ 4:47 PM Page 236\n\n**236**\n\nC H A P T E R 7 **■** S P R I N G J D B C S U P\
  \ P O RT\n\npublic class JdbcVehicleDao extends SimpleJdbcDaoSupport implements\
  \ VehicleDao {\n\n...\n\npublic void insertBatch(List<Vehicle> vehicles) {\n\nString\
  \ sql = \"INSERT INTO VEHICLE (VEHICLE_NO, COLOR, WHEEL, SEAT) \"\n\n+ \"VALUES\
  \ (:vehicleNo, :color, :wheel, :seat)\";\n\nList<SqlParameterSource> parameters\
  \ = new ArrayList<SqlParameterSource>(); for (Vehicle vehicle : vehicles) {\n\n\
  parameters.add(new BeanPropertySqlParameterSource(vehicle));\n\n}\n\ngetSimpleJdbcTemplate().batchUpdate(sql,\n\
  \nparameters.toArray(new SqlParameterSource[0]));\n\n}\n\n}\n```\n\n**7-7. 将 JDBC\
  \ 操作建模为细粒度对象**\n\n问题\n\n您希望通过将每个数据库操作建模为细粒度的操作对象，以更面向对象的方式组织数据访问逻辑。\n\n解决方案\n\n\
  除了 JDBC 模板方法之外，Spring JDBC 框架还支持通过扩展预定义的 JDBC 操作类（例如 `SqlUpdate`、`MappingSqlQuery`\
  \ 或 `SqlFunction`）将每个数据库操作建模为细粒度的操作对象。在使用操作对象之前，您必须执行以下任务：\n\n• 为此操作对象设置数据源。\n•\
  \ 为此操作对象设置 SQL 语句。\n• 为此操作对象按正确顺序声明参数类型。\n• 在此操作对象上调用 `compile()` 方法来编译 SQL 语句。\n\
  \n执行这些任务的最佳位置是在操作对象的构造函数中。一旦通过这些任务初始化，操作对象就是线程安全的，因此您可以在 Spring IoC 容器中声明它的单个实例以供后续使用。\n\
  \n工作原理\n\n\n\n**更新操作对象**\n\n首先，我们来考虑如何将车辆插入操作建模为一个操作对象。你可以通过扩展 `SqlUpdate` 来创建 `VehicleInsertOperation`\
  \ 类，用于更新操作。\n\n9799ch07.qxd 5/5/08 4:47 PM 第 237 页\n\n第 7 章 **■** S P R I N G J\
  \ D B C 支持\n\n**237**\n\npackage com.apress.springrecipes.vehicle;\n\nimport java.sql.Types;\n\
  \nimport javax.sql.DataSource;\n\nimport org.springframework.jdbc.core.SqlParameter;\n\
  \nimport org.springframework.jdbc.object.SqlUpdate;\n\npublic class VehicleInsertOperation\
  \ extends SqlUpdate {\n\npublic VehicleInsertOperation(DataSource dataSource) {\n\
  \nsetDataSource(dataSource);\n\nsetSql(\"INSERT INTO VEHICLE (VEHICLE_NO, COLOR,\
  \ WHEEL, SEAT) \"\n\n+ \"VALUES (?, ?, ?, ?)\");\n\ndeclareParameter(new SqlParameter(Types.VARCHAR));\n\
  \ndeclareParameter(new SqlParameter(Types.VARCHAR));\n\ndeclareParameter(new SqlParameter(Types.INTEGER));\n\
  \ndeclareParameter(new SqlParameter(Types.INTEGER));\n\ncompile();\n\n}\n\npublic\
  \ void perform(Vehicle vehicle) {\n\nupdate(new Object[] { vehicle.getVehicleNo(),\
  \ vehicle.getColor(),\n\nvehicle.getWheel(), vehicle.getSeat() });\n\n}\n\n}\n\n\
  一旦更新操作对象被正确初始化，你就可以调用其 `update()` 方法，并将参数值以对象数组的形式传入。为了更好的封装性，并避免无效参数，你可以提供一个自定义的\
  \ `perform()` 方法，从 `Vehicle` 对象中提取参数。然后，你可以在 IoC 容器中声明它的实例。\n\n<bean id=\"vehicleInsertOperation\"\
  \n\nclass=\"com.apress.springrecipes.vehicle.VehicleInsertOperation\">\n\n<constructor-arg\
