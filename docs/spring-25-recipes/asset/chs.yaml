  \ deposit(\n\n@RequestParam(\"accountNo\") String accountNo,\n\n@RequestParam(\"\
  amount\") double amount,\n\nModelMap model) {\n\naccountService.deposit(accountNo,\
  \ amount);\n\nmodel.addAttribute(\"accountNo\", accountNo);\n\nmodel.addAttribute(\"\
