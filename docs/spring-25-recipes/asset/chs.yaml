  \n第 17 章 **■** Spring 对 EJB 和 JMS 的支持\n\n**转换 JMS 消息**\n\n到目前为止，你一直在自行处理原始的 JMS\
  \ 消息。实际上，Spring 的 JMS 模板可以使用消息转换器帮助你实现 JMS 消息与 Java 对象之间的相互转换。\n\n默认情况下，JMS 模板使用\
  \ `SimpleMessageConverter` 来实现 `TextMessage` 与字符串、`BytesMessage` 与字节数组、`MapMessage`\
  \ 与 Map、以及 `ObjectMessage` 与可序列化对象之间的转换。对于你的前台和后台类，你可以使用 `convertAndSend()` 和 `receiveAndConvert()`\
  \ 方法来发送和接收 Map，该 Map 将被自动转换为 `MapMessage` 或从 `MapMessage` 转换而来。\n\n```java\npackage\
  \ com.apress.springrecipes.post;\n\n...\n\npublic class FrontDeskImpl extends JmsGatewaySupport\
  \ implements FrontDesk {\n\n    ...\n\n    public void sendMail(Mail mail) {\n \
  \       Map<String, Object> map = new HashMap<String, Object>();\n        map.put(\"\
  mailId\", mail.getMailId());\n        map.put(\"country\", mail.getCountry());\n\
  \        map.put(\"weight\", mail.getWeight());\n        getJmsTemplate(). **convertAndSend**(map);\n\
  \    }\n}\n\npackage com.apress.springrecipes.post;\n\n...\n\npublic class BackOfficeImpl\
  \ extends JmsGatewaySupport implements BackOffice {\n\n    ...\n```\n\n\npublic\
  \ Mail receiveMail() {\n\nMap map = (Map) getJmsTemplate(). **receiveAndConvert**();\n\
  \nMail mail = new Mail();\n\nmail.setMailId((String) map.get(\"mailId\"));\n\nmail.setCountry((String)\
  \ map.get(\"country\"));\n\nmail.setWeight((Double) map.get(\"weight\"));\n\nreturn\
  \ mail;\n\n}\n\n}\n\n您还可以通过实现 `MessageConverter` 接口来创建自定义消息转换器，用于转换邮件对象。\n\npackage\
  \ com.apress.springrecipes.post;\n\nimport javax.jms.JMSException;\n\nimport javax.jms.MapMessage;\n\
  \nimport javax.jms.Message;\n\nimport javax.jms.Session;\n\nimport org.springframework.jms.support.converter.MessageConversionException;\
  \ import org.springframework.jms.support.converter.MessageConverter;\n\n9799ch17.qxd\
  \ 5/15/08 5:06 PM Page 653\n\n第 17 章 **■** 对 EJB 和 JMS 的 Spring 支持\n\n**653**\n\n\
  public class MailMessageConverter implements MessageConverter {\n\npublic Object\
  \ fromMessage(Message message) throws JMSException,\n\nMessageConversionException\
  \ {\n\nMapMessage mapMessage = (MapMessage) message;\n\nMail mail = new Mail();\n\
  \nmail.setMailId(mapMessage.getString(\"mailId\"));\n\nmail.setCountry(mapMessage.getString(\"\
  country\"));\n\nmail.setWeight(mapMessage.getDouble(\"weight\"));\n\nreturn mail;\n\
  \n}\n\npublic Message toMessage(Object object, Session session) throws JMSException,\
  \ MessageConversionException {\n\nMail mail = (Mail) object;\n\nMapMessage message\
  \ = session.createMapMessage();\n\nmessage.setString(\"mailId\", mail.getMailId());\n\
  \nmessage.setString(\"country\", mail.getCountry());\n\nmessage.setDouble(\"weight\"\
  , mail.getWeight());\n\nreturn message;\n\n}\n\n}\n\n要应用此消息转换器，您需要在两个 Bean 配置文件中声明它，并将其注入到\
  \ JMS 模板中。\n\n<beans ...>\n\n...\n\n<bean id=\"mailMessageConverter\"\n\nclass=\"\
  com.apress.springrecipes.post.MailMessageConverter\" />\n\n<bean id=\"jmsTemplate\"\
  \n\nclass=\"org.springframework.jms.core.JmsTemplate\">\n\n...\n\n**<property name=\"\
  messageConverter\" ref=\"mailMessageConverter\" />**\n\n</bean>\n\n</beans>\n\n\
  当您为 JMS 模板显式设置消息转换器时，它将覆盖默认的 `SimpleMessageConverter`。现在，您可以调用 JMS 模板的 `convertAndSend()`\
  \ 和 `receiveAndConvert()` 方法来发送和接收邮件对象。\n\npackage com.apress.springrecipes.post;\n\
  \n...\n\npublic class FrontDeskImpl extends JmsGatewaySupport implements FrontDesk\
  \ {\n\n...\n\npublic void sendMail(Mail mail) {\n\ngetJmsTemplate().convertAndSend(mail);\n\
  \n9799ch17.qxd 5/15/08 5:06 PM Page 654\n\n**654**\n\n第 17 章 **■** 对 EJB 和 JMS 的\
  \ Spring 支持\n\n}\n\n}\n\npackage com.apress.springrecipes.post;\n\n...\n\npublic\
  \ class BackOfficeImpl extends JmsGatewaySupport implements BackOffice {\n\n...\n\
  \npublic Mail receiveMail() {\n\nreturn (Mail) getJmsTemplate().receiveAndConvert();\n\
  \n}\n\n}\n\n**管理 JMS 事务**\n\n当在单个方法中生成或消费多个 JMS 消息时，如果中间发生错误，目标位置生成或消费的 JMS 消息可能会处于不一致状态。您必须使用事务来包围该方法以避免此问题。\n\
  \n在 Spring 中，JMS 事务管理与其他数据访问策略保持一致。\n\n例如，您可以使用 `@Transactional` 注解来标记需要事务管理的方法。\n\
  \npackage com.apress.springrecipes.post;\n\nimport org.springframework.jms.core.support.JmsGatewaySupport;\n\
  \nimport org.springframework.transaction.annotation.Transactional;\n\npublic class\
  \ FrontDeskImpl extends JmsGatewaySupport implements FrontDesk {\n\n**@Transactional**\n\
  \npublic void sendMail(Mail mail) {\n\n...\n\n}\n\n}\n\npackage com.apress.springrecipes.post;\n\
  \nimport org.springframework.jms.core.support.JmsGatewaySupport;\n\nimport org.springframework.transaction.annotation.Transactional;\n\
  \npublic class BackOfficeImpl extends JmsGatewaySupport implements BackOffice {\n\
  \n**@Transactional**\n\npublic Mail receiveMail() {\n\n...\n\n}\n\n}\n\n9799ch17.qxd\
  \ 5/15/08 5:06 PM Page 655\n\n第 17 章 **■** 对 EJB 和 JMS 的 Spring 支持\n\n**655**\n\n\
  然后，在两个 Bean 配置文件中，添加 `<tx:annotation-driven />` 元素并声明一个事务管理器。用于本地 JMS 的相应事务管理器\n\
  \n\n\n`transactions` 是 `JmsTransactionManager`，它需要引用 JMS 连接工厂。\n\n<beans xmlns=\"\
  \ [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n**xmlns:tx=\" [`www.springframework.org/schema/tx\"`](http://www.springframework.org/schema/tx)**\n\
  \nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/tx)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/tx)\n\
  \n[**http://www.springframework.org/schema/tx**](http://www.springframework.org/schema/tx)\n\
  \n[**http://w**](http://www.springframework.org/schema/tx)[**ww.springframework.org/schema/tx/spring-tx-2.5.xsd\"\
  >**](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsdwww.springframework.org/schema/txwww.spring)\n\
  \n...\n\n**<tx:annotation-driven />**\n\n<bean id=\"transactionManager\"\n\nclass=\"\
  org.springframework.jms.connection. **JmsTransactionManager**\">\n\n<property name=\"\
  connectionFactory\">\n\n<ref bean=\"connectionFactory\" />\n\n</property>\n\n</bean>\n\
  \n</beans>\n\n如果你需要在多个资源（例如数据源和 ORM 资源工厂）之间进行事务管理，或者需要分布式事务管理，则必须在应用服务器中配置 JTA 事务并使用\
  \ `JtaTransactionManager`。当然，你的 JMS 连接工厂必须符合 XA 规范（即支持分布式事务）。\n\n**17-5\\. 在 Spring\
  \ 中创建消息驱动的 POJO**\n\n问题\n\n当你调用 JMS 消息消费者的 `receive()` 方法来接收消息时，调用线程会被阻塞，直到有消息可用。在此期间，该线程除了等待什么也做不了。这种消息接收方式称为*同步接收*，因为你的应用程序必须等待消息到达才能完成其工作。\n\
  \n从 EJB 2.0 开始，引入了一种名为 *MDB（消息驱动 Bean）* 的新型 EJB 组件，用于 JMS 消息的*异步接收*。EJB 容器可以监听消息目标上的\
  \ JMS 消息，并触发 MDB 对这些消息做出响应，这样你的应用程序就不再需要等待消息。在 EJB 2.x 中，MDB 必须同时实现 `javax.ejb.MessageDrivenBean`\
  \ 和 `javax.jms.MessageListener` 接口，并重写所有 EJB 生命周期方法。在 EJB 3.0 中，MDB 可以是一个实现了 `MessageListener`\
  \ 接口并使用 `@MessageDriven` 注解标注的 POJO。\n\n尽管 MDB 能够监听 JMS 消息，但它们必须部署在 EJB 容器中才能运行。你可能更倾向于为\
  \ POJO 添加同样的能力，这样它们无需 EJB 容器就能监听 JMS 消息。\n\n9799ch17.qxd 5/15/08 5:06 PM 第 656 页\n\
  \n**656**\n\n第 17 章 **■** Spring 对 EJB 和 JMS 的支持\n\n解决方案\n\nSpring 允许在其 IoC 容器中声明的\
  \ Bean 以与 MDB 相同的方式监听 JMS 消息。由于 Spring 为 POJO 添加了消息监听能力，因此它们被称为*消息驱动的 POJO（MDP）*。\n\
  \n工作原理\n\n假设你想在邮局的后台办公室添加一个电子公告板，以便实时显示从前台到达的邮件信息。当前台发送一条包含邮件的 JMS 消息时，后台子系统可以监听这些消息并将其显示在电子公告板上。为了获得更好的系统性能，你应该采用异步\
  \ JMS 接收方式，以避免阻塞接收这些 JMS 消息的线程。\n\n**使用消息监听器监听 JMS 消息**\n\n首先，创建一个消息监听器来监听 JMS 消息。例如，下面的\
  \ `MailListener` 监听包含邮件信息的 JMS 消息：\n\npackage com.apress.springrecipes.post;\n\n\
  import javax.jms.JMSException;\n\nimport javax.jms.MapMessage;\n\nimport javax.jms.Message;\n\
  \nimport javax.jms.MessageListener;\n\n\n\nimport org.springframework.jms.support.JmsUtils;\n\
  \npublic class MailListener implements MessageListener {\n\npublic void onMessage(Message\
  \ message) {\n\nMapMessage mapMessage = (MapMessage) message;\n\ntry {\n\nMail mail\
  \ = new Mail();\n\nmail.setMailId(mapMessage.getString(\"mailId\"));\n\nmail.setCountry(mapMessage.getString(\"\
  country\"));\n\nmail.setWeight(mapMessage.getDouble(\"weight\"));\n\ndisplayMail(mail);\n\
  \n} catch (JMSException e) {\n\nthrow JmsUtils.convertJmsAccessException(e);\n\n\
  }\n\n}\n\nprivate void displayMail(Mail mail) {\n\nSystem.out.println(\"Mail #\"\
  \ + mail.getMailId() + \" received\");\n\n}\n\n}\n\n消息监听器必须实现 `javax.jms.MessageListener`\
  \ 接口。当 JMS 消息到达时，`onMessage()` 方法将被调用，并将消息作为方法参数传入。在本示例中，你只需将邮件信息输出到控制台。请注意，从 `MapMessage`\
  \ 对象提取消息信息时，需要处理 JMS API 的 `JMSException`。你可以调用 `JmsUtils.convertJmsAccessException()`\
  \ 将其转换为 Spring 的运行时异常 `JmsException`。\n\n接下来，你需要在后台的 Bean 配置文件中配置此监听器。仅声明此监听器不足以监听\
  \ JMS 消息。你需要一个消息监听器容器来监控消息目标上的 JMS 消息，并在消息到达时触发你的消息监听器。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)\n\nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)\n\nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n<bean id=\"connectionFactory\"\n\nclass=\"org.apache.activemq.ActiveMQConnectionFactory\"\
  >\n\n<property name=\"brokerURL\" value=\" tcp://localhost:61616\" />\n\n</bean>\n\
  \n<bean id=\"mailListener\"\n\nclass=\"com.apress.springrecipes.post.MailListener\"\
  \ />\n\n<bean\n\nclass=\"org.springframework.jms.listener. **SimpleMessageListenerContainer**\"\
  >\n\n<property name=\"connectionFactory\" ref=\"connectionFactory\" />\n\n<property\
  \ name=\"destinationName\" value=\"mail.queue\" />\n\n<property name=\"messageListener\"\
  \ ref=\"mailListener\" />\n\n</bean>\n\n</beans>\n\nSpring 提供了多种类型的消息监听器容器供你选择，其中最常用的是\
  \ `SimpleMessageListenerContainer` 和 `DefaultMessageListenerContainer`。`SimpleMessageListenerContainer`\
  \ 是最简单的容器，不支持事务。如果你在接收消息时有事务需求，则必须使用 `DefaultMessageListenerContainer`。\n\n现在，你可以通过以下主类启动消息监听器，该类仅启动\
  \ Spring IoC 容器：\n\npackage com.apress.springrecipes.post;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class BackOfficeMain {\n\npublic static void main(String[] args) {\n\n\
  new ClassPathXmlApplicationContext(\"beans-back.xml\");\n\n}\n\n}\n\n**使用 POJO 监听\
  \ JMS 消息**\n\n虽然实现 `MessageListener` 接口的监听器可以监听消息，但 Spring IoC 容器中声明的任意 Bean 也可以做到。要使此\
  \ Bean 的某个方法在消息到达时被触发，该方法必须接受以下类型之一作为其唯一的方法参数：\n\n*原始 JMS 消息类型*：适用于 `TextMessage`、`MapMessage`、`BytesMessage`\
  \ 和 `ObjectMessage`\n*String*：仅适用于 `TextMessage`\n*Map*：仅适用于 `MapMessage`\n*byte[]*：仅适用于\
  \ `BytesMessage`\n*Serializable*：仅适用于 `ObjectMessage`\n\n\n\n例如，要监听 MapMessage，你可以声明一个接受\
  \ map 作为参数的方法。这个监听器不再需要实现 MessageListener 接口。\n\npackage com.apress.springrecipes.post;\n\
  \n...\n\npublic class MailListener {\n\npublic void displayMail(Map map) {\n\nMail\
  \ mail = new Mail();\n\nmail.setMailId((String) map.get(\"mailId\"));\n\nmail.setCountry((String)\
  \ map.get(\"country\"));\n\nmail.setWeight((Double) map.get(\"weight\"));\n\nSystem.out.println(\"\
  Mail #\" + mail.getMailId() + \" received\");\n\n}\n\n}\n\n一个 POJO 通过 `MessageListenerAdapter`\
  \ 实例注册到监听器容器。\n\n这个适配器实现了 `MessageListener` 接口，并通过反射将消息处理委托给目标 bean 的方法。\n\n<beans\
  \ ...>\n\n...\n\n<bean id=\"mailListener\"\n\nclass=\"com.apress.springrecipes.post.MailListener\"\
  \ />\n\n<bean id=\"mailListenerAdapter\"\n\nclass=\"org.springframework.jms.listener.adapter.MessageListenerAdapter\"\
  >\n\n<property name=\"delegate\" ref=\"mailListener\" />\n\n<property name=\"defaultListenerMethod\"\
  \ value=\"displayMail\" />\n\n</bean>\n\n<bean\n\nclass=\"org.springframework.jms.listener.SimpleMessageListenerContainer\"\
  >\n\n<property name=\"connectionFactory\" ref=\"connectionFactory\" />\n\n<property\
  \ name=\"destinationName\" value=\"mail.queue\" />\n\n9799ch17.qxd 5/15/08 5:06\
  \ PM Page 659\n\nC H A P T E R 1 7 **■** S P R I N G S U P P O RT F O R E J B A\
  \ N D J M S\n\n**659**\n\n<property name=\"messageListener\" ref=\" **mailListenerAdapter**\"\
  \ />\n\n</bean>\n\n</beans>\n\n你必须将 `MessageListenerAdapter` 的 `delegate` 属性设置为你目标\
  \ bean。默认情况下，此适配器会调用该 bean 上名为 `handleMessage` 的方法。如果你想调用其他方法，可以在 `defaultListenerMethod`\
  \ 属性中指定。\n\n最后，请注意，你必须将监听器适配器（而非目标 bean）注册到监听器容器。\n\n**转换 JMS 消息**\n\n你也可以创建一个消息转换器，用于从包含邮件信息的\
  \ JMS 消息中转换邮件对象。由于消息监听器只接收消息，`toMessage()` 方法不会被调用，因此你可以直接为其返回 null。但是，如果你也使用此消息转换器发送消息，则必须实现此方法。\n\
  \npackage com.apress.springrecipes.post;\n\nimport javax.jms.JMSException;\n\nimport\
  \ javax.jms.MapMessage;\n\nimport javax.jms.Message;\n\nimport javax.jms.Session;\n\
  \nimport org.springframework.jms.support.converter.MessageConversionException; import\
  \ org.springframework.jms.support.converter.MessageConverter;\n\npublic class MailMessageConverter\
  \ implements MessageConverter {\n\npublic Object fromMessage(Message message) throws\
  \ JMSException,\n\nMessageConversionException {\n\nMapMessage mapMessage = (MapMessage)\
  \ message;\n\nMail mail = new Mail();\n\nmail.setMailId(mapMessage.getString(\"\
  mailId\"));\n\nmail.setCountry(mapMessage.getString(\"country\"));\n\nmail.setWeight(mapMessage.getDouble(\"\
  weight\"));\n\nreturn mail;\n\n}\n\npublic Message toMessage(Object object, Session\
  \ session) throws JMSException, MessageConversionException {\n\n...\n\n}\n\n}\n\n\
  消息转换器应应用于监听器适配器，以便在调用你的 POJO 方法之前，将消息转换为对象。\n\n9799ch17.qxd 5/15/08 5:06 PM Page\
  \ 660\n\n**660**\n\nC H A P T E R 1 7 **■** S P R I N G S U P P O RT F O R E J B\
  \ A N D J M S\n\n<beans ...>\n\n...\n\n<bean id=\"mailMessageConverter\"\n\nclass=\"\
  com.apress.springrecipes.post.MailMessageConverter\" />\n\n<bean id=\"mailListenerAdapter\"\
  \n\nclass=\"org.springframework.jms.listener.adapter.MessageListenerAdapter\">\n\
  \n<property name=\"delegate\" ref=\"mailListener\" />\n\n<property name=\"defaultListenerMethod\"\
  \ value=\"displayMail\" />\n\n**<property name=\"messageConverter\" ref=\"mailMessageConverter\"\
  \ />**\n\n</bean>\n\n</beans>\n\n使用此消息转换器后，你的 POJO 的监听器方法能够接受一个邮件对象作为方法参数。\n\npackage\
  \ com.apress.springrecipes.post;\n\npublic class MailListener {\n\npublic void displayMail(Mail\
  \ mail) {\n\nSystem.out.println(\"Mail #\" + mail.getMailId() + \" received\");\n\
  \n}\n\n}\n\n**管理 JMS 事务**\n\n如前所述，`SimpleMessageListenerContainer` 不支持事务。因此，如果你需要为消息监听器方法进行事务管理，则必须改用\
  \ `DefaultMessageListenerContainer`。对于本地 JMS 事务，你可以简单地启用其 `sessionTransacted` 属性，你的监听器方法将在本地\
  \ JMS 事务中运行。\n\n<bean\n\nclass=\"org.springframework.jms.listener. **DefaultMessageListenerContainer**\"\
  >\n\n<property name=\"connectionFactory\" ref=\"connectionFactory\" />\n\n<property\
  \ name=\"destinationName\" value=\"mail.queue\" />\n\n<property name=\"messageListener\"\
  \ ref=\"mailListenerAdapter\" />\n\n**<property name=\"sessionTransacted\" value=\"\
  true\" />**\n\n</bean>\n\n但是，如果你希望监听器参与 JTA 事务，则需要声明一个 `JtaTransactionManager` 实例并将其注入到你的监听器容器中。\n\
  \n**使用 Spring 的 JMS Schema**\n\nSpring 2.5 提供了一个新的 JMS schema，以简化你的 JMS 监听器和监听器容器配置。你必须事先将\
  \ `jms` schema 定义添加到 `<beans>` 根元素中。\n\n9799ch17.qxd 5/15/08 5:06 PM Page 661\n\n\
  C H A P T E R 1 7 **■** S P R I N G S U P P O RT F O R E J B A N D J M S\n\n**661**\n\
  \n<beans xmlns=\" [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n**xmlns:jms=\" [`www.springframework.org/schema/jms\"`](http://www.springframework.org/schema/jms)**\n\
  \nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/jms)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/jms)\n\
  \n[**http://www.springframework.org/schema/jms**](http://www.springframework.org/schema/jms)\n\
  \n[**http://w**](http://www.springframework.org/schema/jms)[**ww.springframework.org/schema/jms/spring-jms-2.5.xsd\"\
  >**](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsdwww.springframework.org/schema/jmswww.sprin)\n\
  \n<bean id=\"connectionFactory\"\n\nclass=\"org.apache.activemq.ActiveMQConnectionFactory\"\
  >\n\n<property name=\"brokerURL\" value=\" tcp://localhost:61616\" />\n\n</bean>\n\
  \n<bean id=\"transactionManager\"\n\nclass=\"org.springframework.jms.connection.JmsTransactionManager\"\
  >\n\n<property name=\"connectionFactory\">\n\n<ref bean=\"connectionFactory\" />\n\
  \n</property>\n\n</bean>\n\n<bean id=\"mailMessageConverter\"\n\nclass=\"com.apress.springrecipes.post.MailMessageConverter\"\
  \ />\n\n<bean id=\"mailListener\"\n\nclass=\"com.apress.springrecipes.post.MailListener\"\
  \ />\n\n**<jms:listener-container**\n\n**connection-factory=\"connectionFactory\"\
  **\n\n**transaction-manager=\"transactionManager\"**\n\n**message-converter=\"mailMessageConverter\"\
  >**\n\n**<jms:listener**\n\n**destination=\"mail.queue\"**\n\n**ref=\"mailListener\"\
  \ method=\"displayMail\" />**\n\n**</jms:listener-container>**\n\n</beans>\n\n实际上，如果你的\
  \ JMS 连接工厂名称是 `connectionFactory`（默认可以定位到），则无需为监听器容器显式指定 `connection-factory` 属性。\n\
  \n**17-6. 总结**\n\n在本章中，你学习了 Spring 如何通过其 EJB 支持类简化 EJB 2.x 开发。这些类为所有 EJB 生命周期回调方法提供了空实现，以便你的\
  \ EJB 类可以继承它们。它们还提供了对 Spring IoC 容器的访问，以便你可以在 POJO 中实现业务逻辑，并用 EJB 组件包装它们。\n\n9799ch17.qxd\
  \ 5/15/08 5:06 PM Page 662\n\n**662**\n\nC H A P T E R 1 7 **■** S P R I N G S U\
  \ P P O RT F O R E J B A N D J M S\n\n\n\n在客户端，Spring 提供了代理工厂 Bean，用于为远程/本地无状态会话\
  \ EJB 2.x 组件创建代理，这使得 EJB 客户端能够通过业务接口调用 EJB 组件，就像调用一个简单的本地对象一样。EJB 代理在后台处理必要的任务和异常转换。Spring\
  \ 还提供了一个工厂 Bean，用于在其 IoC 容器中创建 JNDI 对象引用。你可以使用这个工厂 Bean 来声明对 EJB 3.0 组件的引用。\n\n\
  Spring 提供了一种基于模板的解决方案，用于简化 JMS 消息的发送和接收。该模板为你处理了样板任务，并将 JMS API 的异常转换为 Spring 的\
  \ JMS 运行时异常。\n\n针对 EJB 定义的 MDB，Spring 允许在其 IoC 容器中声明的 Bean 以类似方式监听 JMS 消息。由于 Spring\
  \ 为 POJO 添加了消息监听能力，因此它们被称为消息驱动型 POJO。当特定目的地有 JMS 消息时，这些 POJO 会被触发并做出响应。\n\n在下一章中，你将了解\
  \ Spring 对其他常见技术的支持：JMX、电子邮件和任务调度。\n\n9799ch18.qxd 5/15/08 5:07 PM 第 663 页\n\n第\
  \ 18 章\n\nSpring 对 JMX、电子邮件和任务调度的支持\n\n**本**章中，你将学习 Spring 对 Java SE/Java EE 平台上三种常见技术的支持：*JMX（Java\
  \ 管理扩展）*、发送电子邮件和任务调度。\n\nJMX 是一种用于管理和监控系统资源（如设备、应用程序和对象）的技术。这些资源由 *MBean（受管 Bean）*\
  \ 表示。最初，JMX 是单独分发的，但从 Java SE 5.0 版本开始，它已成为其中的一部分。Spring 支持 JMX，允许你将任何 Spring Bean\
  \ 导出为*模型 MBean*（一种*动态 MBean*），而无需针对 JMX API 进行编程。此外，Spring 还使你能够轻松访问远程 MBean。\n\n\
  JavaMail 是 Java 中用于发送电子邮件的标准 API 和实现。Spring 进一步提供了一个抽象层，使你能够以独立于实现的方式发送电子邮件。Spring\
  \ 2.0 提供了基于 JavaMail 和 Jason Hunter 的 COS（com.oreilly.servlet）的实现。但 Spring 2.5 移除了对\
  \ COS 的支持，因此你只能使用 JavaMail 作为底层实现。\n\n在 Java 平台上进行任务调度主要有两种选择：JDK Timer 和 Quartz\
  \ 调度器（[`www.opensymphony.com/quartz`](http://www.opensymphony.com/quartz)）。JDK Timer\
  \ 提供了简单的任务调度功能，你可以方便地使用，因为这些功能已捆绑在 JDK 中。与 JDK Timer 相比，Quartz 提供了更强大的作业调度功能。对于这两种选择，Spring\
  \ 都提供了实用类，让你可以在 Bean 配置文件中配置调度任务，而无需针对它们的 API 进行编程。\n\n完成本章后，你将能够在 Spring 应用程序中导出和访问\
  \ MBean。你还将能够利用 Spring 的支持功能来简化发送电子邮件和任务调度。\n\n**18-1. 将 Spring Bean 导出为 JMX MBean**\n\
  \n问题\n\n你希望将 Java 应用程序中的对象注册为 JMX MBean，以便进行管理和监控。但是，如果为此目的调用 JMX API，将需要大量编码，并且你必须处理\
  \ JMX 的复杂性。\n\n**663**\n\n9799ch18.qxd 5/15/08 5:07 PM 第 664 页\n\n**664**\n\n第 18\
  \ 章 **■** SPRING 对 JMX、电子邮件和任务调度的支持\n\n解决方案\n\nSpring 支持 JMX，允许你将 IoC 容器中的任何 Bean\
  \ 导出为模型 MBean。这只需声明一个 MBeanExporter 实例即可完成。借助 Spring 的 JMX 支持，你不再需要直接处理 JMX API，因此可以编写非\
  \ JMX 特定的代码。此外，Spring 还允许你声明 JSR-160（Java 管理扩展远程 API）连接器，通过使用工厂 Bean，基于特定协议暴露你的\
  \ MBean 以供远程访问。\n\n\n\nSpring 的 JMX 支持提供了多个 MBean 装配器，让你能够基于不同的信息（如方法名称、接口和注解）来装配\
  \ MBean 的管理接口。Spring 还可以自动检测并导出在 IoC 容器中声明、且使用了 Spring 定义的特定 JMX 注解的 Bean。\n\n工作原理\n\
  \n假设你要开发一个工具，用于将文件从源目录复制到目标目录。让我们按如下方式设计该工具的接口：`package com.apress.springrecipes.replicator;`\n\
  \n...\n\n`public interface FileReplicator {`\n\n`public String getSrcDir();`\n\n\
  `public void setSrcDir(String srcDir);`\n\n`public String getDestDir();`\n\n`public\
  \ void setDestDir(String destDir);`\n\n`public void replicate() throws IOException;`\n\
  \n`}`\n\n源目录和目标目录被设计为复制器对象的属性，而不是方法参数。这意味着每个文件复制器实例仅针对特定的源目录和目标目录复制文件。你可以在应用程序中创建多个复制器实例。\n\
  \n在实现此复制器之前，你需要另一个类，该类根据文件名将文件从一个目录复制到另一个目录。\n\n`package com.apress.springrecipes.replicator;`\n\
  \n...\n\n`public interface FileCopier {`\n\n`public void copyFile(String srcDir,\
  \ String destDir, String filename)`\n\n`throws IOException;`\n\n`}`\n\n`9799ch18.qxd\
  \ 5/15/08 5:07 PM Page 665`\n\n`C H A P T E R 1 8 **■** S P R I N G S U P P O RT\
  \ F O R J M X , E - M A I L , A N D S C H E D U L I N G`\n\n`**665**`\n\n实现此文件复制器有多种策略。例如，你可以利用\
  \ Spring 提供的 `FileCopyUtils` 类。\n\n`package com.apress.springrecipes.replicator;`\n\
  \n...\n\n`import org.springframework.util.FileCopyUtils;`\n\n`public class FileCopierImpl\
  \ implements FileCopier {`\n\n`public void copyFile(String srcDir, String destDir,\
  \ String filename)`\n\n`throws IOException {`\n\n`File srcFile = new File(srcDir,\
  \ filename);`\n\n`File destFile = new File(destDir, filename);`\n\n`FileCopyUtils.copy(srcFile,\
  \ destFile);`\n\n`}`\n\n`}`\n\n借助文件复制器，你可以按如下方式实现文件复制器。\n\n每次调用 `replicate()` 方法时，源目录中的所有文件都将被复制到目标目录。为了避免并发复制引起的意外问题，你将该方法声明为\
  \ `synchronized`。\n\n`package com.apress.springrecipes.replicator;`\n\n...\n\n`public\
  \ class FileReplicatorImpl implements FileReplicator {`\n\n`private String srcDir;`\n\
  \n`private String destDir;`\n\n`private FileCopier fileCopier;`\n\n`// srcDir 和\
  \ destDir 的 Getter 和 Setter 方法`\n\n...\n\n`// fileCopier 的 Setter 方法`\n\n...\n\n\
  `public **synchronized** void replicate() throws IOException {`\n\n`File[] files\
  \ = new File(srcDir).listFiles();`\n\n`for (File file : files) {`\n\n`if (file.isFile())\
  \ {`\n\n`fileCopier.copyFile(srcDir, destDir, file.getName());`\n\n`}`\n\n`}`\n\n\
  `}`\n\n`}`\n\n`9799ch18.qxd 5/15/08 5:07 PM Page 666`\n\n`**666**`\n\n`C H A P T\
  \ E R 1 8 **■** S P R I N G S U P P O RT F O R J M X , E - M A I L , A N D S C H\
  \ E D U L I N G`\n\n现在，你可以根据需要在 Bean 配置文件中配置一个或多个文件复制器实例。\n\n`<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)`\n\n`xmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)`\n\n`xsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)`\n\
  \n`[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >`\n\n`<bean id=\"fileCopier\"`\n\n`class=\"com.apress.springrecipes.replicator.FileCopierImpl\"\
  \ />`\n\n`<bean id=\"documentReplicator\"`\n\n`class=\"com.apress.springrecipes.replicator.FileReplicatorImpl\"\
  >`\n\n`<property name=\"srcDir\" value=\"c:/documents\" />`\n\n`<property name=\"\
  destDir\" value=\"d:/documents\" />`\n\n`<property name=\"fileCopier\" ref=\"fileCopier\"\
  \ />`\n\n`</bean>`\n\n`</beans>`\n\n**在没有 Spring 支持的情况下注册 MBean**\n\n首先，让我们看看如何直接使用\
  \ JMX API 注册一个模型 MBean。在下面的 `Main` 类中，你从 IoC 容器中获取 `documentReplicator` Bean，并将其注册为\
  \ MBean 以进行管理和监控。所有属性和方法都包含在 MBean 的管理接口中。\n\n`package com.apress.springrecipes.replicator;`\n\
  \n...\n\n`import java.lang.management.ManagementFactory;`\n\n`import javax.management.Descriptor;`\n\
  \n`import javax.management.JMException;`\n\n`import javax.management.MBeanServer;`\n\
  \n`import javax.management.ObjectName;`\n\n`import javax.management.modelmbean.DescriptorSupport;`\n\
  \n`import javax.management.modelmbean.InvalidTargetObjectTypeException;`\n\n`import\
  \ javax.management.modelmbean.ModelMBeanAttributeInfo;`\n\n`import javax.management.modelmbean.ModelMBeanInfo;`\n\
  \n`import javax.management.modelmbean.ModelMBeanInfoSupport;`\n\n`import javax.management.modelmbean.ModelMBeanOperationInfo;`\n\
  \n`import javax.management.modelmbean.RequiredModelMBean;`\n\n`import org.springframework.context.ApplicationContext;`\n\
  \n`import org.springframework.context.support.ClassPathXmlApplicationContext;` `public\
  \ class Main {`\n\n`9799ch18.qxd 5/15/08 5:07 PM Page 667`\n\n`C H A P T E R 1 8\
  \ **■** S P R I N G S U P P O RT F O R J M X , E - M A I L , A N D S C H E D U L\
  \ I N G`\n\n`**667**`\n\n`public static void main(String[] args) throws IOException\
  \ {`\n\n`ApplicationContext context =`\n\n`new ClassPathXmlApplicationContext(\"\
  beans.xml\");`\n\n`FileReplicator documentReplicator =`\n\n`(FileReplicator) context.getBean(\"\
  documentReplicator\");`\n\n`try {`\n\n`MBeanServer mbeanServer = ManagementFactory.getPlatformMBeanServer();`\n\
  \n`ObjectName objectName = new ObjectName(\"bean:name=documentReplicator\");` `RequiredModelMBean\
  \ mbean = new RequiredModelMBean();`\n\n`mbean.setManagedResource(documentReplicator,\
  \ \"objectReference\");` `Descriptor srcDirDescriptor = new DescriptorSupport(new\
  \ String[] {`\n\n`\"name=SrcDir\", \"descriptorType=attribute\",`\n\n`\"getMethod=getSrcDir\"\
  , \"setMethod=setSrcDir\" });`\n\n`ModelMBeanAttributeInfo srcDirInfo = new ModelMBeanAttributeInfo(`\n\
  \n`\"SrcDir\", \"java.lang.String\", \"源目录\", true, true, false, srcDirDescriptor);`\n\
  \n`Descriptor destDirDescriptor = new DescriptorSupport(new String[] {`\n\n`\"name=DestDir\"\
  , \"descriptorType=attribute\",`\n\n`\"getMethod=getDestDir\", \"setMethod=setDestDir\"\
  \ });`\n\n`ModelMBeanAttributeInfo destDirInfo = new ModelMBeanAttributeInfo(`\n\
  \n`\"DestDir\", \"java.lang.String\", \"目标目录\", true, true, false, destDirDescriptor);`\n\
  \n`ModelMBeanOperationInfo getSrcDirInfo = new ModelMBeanOperationInfo(`\n\n`\"\
  获取源目录\",`\n\n`FileReplicator.class.getMethod(\"getSrcDir\"));`\n\n`ModelMBeanOperationInfo\
  \ setSrcDirInfo = new ModelMBeanOperationInfo(`\n\n`\"设置源目录\",`\n\n`FileReplicator.class.getMethod(\"\
  setSrcDir\", String.class));`\n\n`ModelMBeanOperationInfo getDestDirInfo = new ModelMBeanOperationInfo(`\n\
  \n`\"获取目标目录\",`\n\n`FileReplicator.class.getMethod(\"getDestDir\"));`\n\n`ModelMBeanOperationInfo\
  \ setDestDirInfo = new ModelMBeanOperationInfo(`\n\n`\"设置目标目录\",`\n\n`FileReplicator.class.getMethod(\"\
  setDestDir\", String.class));`\n\n`ModelMBeanOperationInfo replicateInfo = new ModelMBeanOperationInfo(`\n\
  \n`\"复制文件\",`\n\n`FileReplicator.class.getMethod(\"replicate\"));`\n\n`ModelMBeanInfo\
  \ mbeanInfo = new ModelMBeanInfoSupport(`\n\n`\"FileReplicator\", \"文件复制器\",`\n\n\
  `new ModelMBeanAttributeInfo[] { srcDirInfo, destDirInfo },`\n\n`9799ch18.qxd 5/15/08\
  \ 5:07 PM Page 668`\n\n`**668**`\n\n`C H A P T E R 1 8 **■** S P R I N G S U P P\
  \ O RT F O R J M X , E - M A I L , A N D S C H E D U L I N G`\n\n`null,`\n\n`new\
  \ ModelMBeanOperationInfo[] { getSrcDirInfo, setSrcDirInfo,`\n\n`getDestDirInfo,\
  \ setDestDirInfo, replicateInfo },`\n\n`null);`\n\n`mbean.setModelMBeanInfo(mbeanInfo);`\n\
  \n`mbeanServer.registerMBean(mbean, objectName);`\n\n`} catch (JMException e) {`\n\
  \n`...`\n\n`} catch (InvalidTargetObjectTypeException e) {`\n\n`...`\n\n`} catch\
  \ (NoSuchMethodException e) {`\n\n`...`\n\n`}`\n\n`System.in.read();`\n\n`}`\n\n\
  `}`\n\n\n\n要注册一个 MBean，你需要一个 MBeanServer 实例。在 JDK 1.5 中，你可以调用静态方法 `ManagementFactory.getPlatformMBeanServer()`\
  \ 来获取一个平台 MBean 服务器。如果不存在 MBean 服务器，它会创建一个，然后注册该服务器实例以供将来使用。每个 MBean 都需要一个包含域的 MBean\
  \ *对象名称*。上述 MBean 在域 bean 下注册，名称为 documentReplicator。\n\n从上述代码可以看出，对于每个 MBean 属性和\
  \ MBean 操作，你需要创建一个 `ModelMBeanAttributeInfo` 对象和一个 `ModelMBeanOperationInfo` 对象来进行描述。之后，你必须通过组装上述信息来创建一个\
  \ `ModelMBeanInfo` 对象，用于描述 MBean 的管理接口。关于这些类的使用细节，你可以查阅它们的 javadoc。\n\n此外，在调用 JMX\
  \ API 时，你必须处理 JMX 特有的异常。\n\n这些异常是必须处理的受检异常。\n\n请注意，在使用 JMX 客户端工具查看应用程序内部之前，必须防止应用程序终止。使用\
  \ `System.in.read()` 从控制台请求一个键值会是一个不错的选择。\n\n最后，你必须添加 VM 参数 `-Dcom.sun.management.jmxremote`\
  \ 以启用对此应用程序的本地监控。\n\n```\njava -Dcom.sun.management.jmxremote com.apress.springrecipes.replicator.Main\n\
  ```\n\n现在，你可以使用任何 JMX 客户端工具在本地监控你的 MBean。最简单的工具可能是 JConsole，它随 JDK 1.5 一起提供。\n\n\
  **■注意** 要启动 JConsole，只需执行 `jconsole` 可执行文件（位于 JDK 安装目录的 bin 目录下）。\n\n9799ch18.qxd\
  \ 5/15/08 5:07 PM 第 669 页\n\n第 18 章 **■** Spring 对 JMX、电子邮件和调度的支持\n\n**669**\n\n\
  当 JConsole 启动时，你可以在连接窗口的“本地”选项卡中看到已启用 JMX 的应用程序列表。连接到 replicator 应用程序后，你可以在 bean\
  \ 域下看到你的 documentReplicator MBean。\n\n**将 Spring Bean 导出为 MBean**\n\n要将 Spring IoC\
  \ 容器中配置的 Bean 导出为 MBean，你只需声明一个 `MBeanExporter` 实例，并指定要导出的 Bean，以其 MBean 对象名称作为键。\n\
  \n```xml\n<bean id=\"mbeanExporter\"\n      class=\"org.springframework.jmx.export.MBeanExporter\"\
  >\n    <property name=\"beans\">\n        <map>\n            <entry key=\"bean:name=documentReplicator\"\
  \n                   value-ref=\"documentReplicator\" />\n        </map>\n    </property>\n\
  </bean>\n```\n\n上述配置将 `documentReplicator` Bean 导出为一个 MBean，位于域 bean 下，名称为 documentReplicator。默认情况下，所有公共属性和所有公共方法都包含在\
  \ MBean 的管理接口中。\n\n`MBeanExporter` 会尝试定位一个 MBean 服务器实例，并将你的 MBean 注册到其中。如果你的应用程序运行在提供\
  \ MBean 服务器的环境中（例如，大多数 Java EE 应用服务器），`MBeanExporter` 将能够定位到该 MBean 服务器实例。但是，在没有可用\
  \ MBean 服务器的环境中，你必须使用 Spring 的 `MBeanServerFactoryBean` 显式创建一个。为了使你的应用程序可移植到不同的运行时环境，你应该启用\
  \ `locateExistingServerIfPossible` 属性，这样该工厂 Bean 只会在没有可用 MBean 服务器时创建一个。\n\n**■注意**\
  \ JDK 1.5 会在你首次定位 MBean 服务器时创建一个。因此，如果你使用的是 JDK 1.5 或更高版本，则无需显式创建 MBean 服务器。\n\n\
  ```xml\n<beans ...>\n    ...\n    <bean id=\"mbeanServer\"\n          class=\"org.springframework.jmx.support.MBeanServerFactoryBean\"\
  >\n        <property name=\"locateExistingServerIfPossible\" value=\"true\" />\n\
  \    </bean>\n\n    <bean id=\"mbeanExporter\"\n          class=\"org.springframework.jmx.export.MBeanExporter\"\
  >\n        ...\n        9799ch18.qxd 5/15/08 5:07 PM 第 670 页\n        **670**\n\
  \        第 18 章 **■** Spring 对 JMX、电子邮件和调度的支持\n        **<property name=\"server\"\
  \ ref=\"mbeanServer\" />**\n    </bean>\n</beans>\n```\n\n\n\n你也可以为 `MBeanExporter`\
  \ 显式指定一个 MBean 服务器，以便向其导出 MBean。在这种情况下，`MBeanExporter` 不会自行定位 MBean 服务器，而是使用指定的\
  \ MBean 服务器实例。当存在多个可用的 MBean 服务器时，你可以通过此属性指定特定的一个。\n\n导出 MBean 的主类可以简化如下所示。你必须保留请求按键的语句，以防止应用程序终止。\n\
  \n```java\npackage com.apress.springrecipes.replicator;\n\n...\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\n\
  \npublic class Main {\n\n    public static void main(String[] args) throws IOException\
  \ {\n\n        new ClassPathXmlApplicationContext(\"beans.xml\");\n\n        System.in.read();\n\
  \n    }\n\n}\n```\n\n**暴露 MBean 以实现远程访问**\n\n如果你希望 MBean 能被远程访问，则需要为 JMX 启用一个远程协议。JSR-160\
  \ 定义了通过 JMX 连接器实现 JMX 远程访问的标准。Spring 允许你通过 `ConnectorServerFactoryBean` 创建一个 JMX\
  \ 连接器服务器。\n\n默认情况下，`ConnectorServerFactoryBean` 会创建并启动一个绑定到服务 URL `service:jmx:jmxmp://localhost:9875`\
  \ 的 JMX 连接器服务器，该服务器通过 JMX 消息协议（JMXMP）暴露 JMX 连接器。然而，大多数 JMX 实现（包括 JDK 1.5 的实现）并不支持\
  \ JMXMP。因此，你应该为你的 JMX 连接器选择一个广泛支持的远程协议，例如 RMI。要通过特定协议暴露你的 JMX 连接器，只需为其提供服务 URL 即可。\n\
  \n```xml\n<beans ...>\n\n    ...\n\n    <bean id=\"rmiRegistry\"\n          class=\"\
  org.springframework.remoting.rmi.RmiRegistryFactoryBean\" />\n\n    <bean id=\"\
  connectorServer\"\n          class=\"org.springframework.jmx.support.ConnectorServerFactoryBean\"\
  \n          **depends-on=\"rmiRegistry\"** >\n        <property name=\"serviceUrl\"\
  \ value=\n            \"service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator\"\
  \ />\n    </bean>\n\n</beans>\n```\n\n9799ch18.qxd 5/15/08 5:07 PM 第 671 页\n\n第\
  \ 18 章 **■** Spring 对 JMX、电子邮件和调度的支持\n\n**671**\n\n你指定上述 URL 是为了将你的 JMX 连接器绑定到监听\
  \ localhost 的 1099 端口的 RMI 注册表。如果外部尚未创建 RMI 注册表，你应该使用 `RmiRegistryFactoryBean` 创建一个。该注册表的默认端口是\
  \ 1099，但你可以在其 `port` 属性中指定其他端口。请注意，`ConnectorServerFactoryBean` 必须在 RMI 注册表创建并准备就绪之后才能创建连接器服务器。你可以设置\
  \ `depends-on` 属性来实现此目的。\n\n现在，你的 MBean 可以通过 RMI 进行远程访问了。当 JConsole 启动时，你可以在连接窗口的“高级”选项卡中输入以下服务\
  \ URL。\n\n`service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator`\n\n\
