  alert.checkout\",\n\nnew Object[] { total, new Date() }, Locale.US);\n\nSystem.out.println(alert);\n\
  \n}\n\n}\n\n**4-13. 通过应用程序事件进行通信**\n\n问题\n\n在组件之间的典型通信模型中，发送方必须定位接收方才能调用其方法。在这种情况下，发送方组件必须知晓\n\
  \n9799ch04.qxd 4/10/08 10:53 AM Page 124\n\n**124**\n\n第 4 章 **■** 高级 Spring IoC\
  \ 容器\n\n接收方组件。这种通信方式直接且简单，但发送方和接收方组件之间是紧密耦合的。\n\n\n\n使用 IoC 容器时，组件可以通过接口而非实现进行通信。这种通信模型有助于降低耦合度。然而，只有当发送方组件需要与一个接收方通信时，这种方式才高效。当发送方需要与多个接收方通信时，它必须逐一调用这些接收方。\n\
  \n解决方案\n\nSpring 的应用上下文支持其 Bean 之间基于事件的通信。在基于事件的通信模型中，发送方组件仅发布事件，而无需知道接收方是谁。实际上，可能存在多个接收方组件。\n\
  \n同时，接收方也无需知道是谁发布了事件。它可以同时监听来自不同发送方的多个事件。通过这种方式，发送方和接收方组件实现了松散耦合。\n\n在 Spring 中，所有事件类都必须继承\
  \ `ApplicationEvent` 类。然后，任何 Bean 都可以通过调用应用事件发布器的 `publishEvent()` 方法来发布事件。要使某个\
  \ Bean 监听特定事件，它必须实现 `ApplicationListener` 接口，并在 `onApplicationEvent()` 方法中处理事件。实际上，Spring\
  \ 会将所有事件通知给监听器，因此你必须自行过滤事件。\n\n工作原理\n\n**定义事件**\n\n启用基于事件通信的第一步是定义事件。假设你希望收银员 Bean\
  \ 在购物车结账后发布一个 `CheckoutEvent`。该事件包含两个属性：支付金额和结账时间。\n\n在 Spring 中，所有事件都必须继承抽象类 `ApplicationEvent`，并将事件源作为构造函数参数传入。\n\
  \n```java\npackage com.apress.springrecipes.shop;\n\n...\n\nimport org.springframework.context.ApplicationEvent;\n\
  \npublic class CheckoutEvent extends ApplicationEvent {\n\n    private double amount;\n\
  \n    private Date time;\n\n    public CheckoutEvent(Object source, double amount,\
  \ Date time) {\n        super(source);\n        this.amount = amount;\n        this.time\
  \ = time;\n    }\n\n    public double getAmount() {\n        return amount;\n  \
  \  }\n\n    public Date getTime() {\n        return time;\n    }\n}\n```\n\n**发布事件**\n\
  \n要发布事件，只需创建一个事件实例，并调用应用事件发布器的 `publishEvent()` 方法。通过实现 `ApplicationEventPublisherAware`\
  \ 接口可以获取该发布器。\n\n```java\npackage com.apress.springrecipes.shop;\n\n...\n\nimport\
  \ org.springframework.context.ApplicationEventPublisher;\nimport org.springframework.context.ApplicationEventPublisherAware;\n\
  \npublic class Cashier implements BeanNameAware, MessageSourceAware,\n        **ApplicationEventPublisherAware**,\
  \ StorageConfig {\n\n    ...\n\n    private ApplicationEventPublisher applicationEventPublisher;\n\
  \n    public void setApplicationEventPublisher(\n            ApplicationEventPublisher\
  \ applicationEventPublisher) {\n        this.applicationEventPublisher = applicationEventPublisher;\n\
  \    }\n\n    public void checkout(ShoppingCart cart) throws IOException {\n   \
  \     ...\n        CheckoutEvent event = new CheckoutEvent(this, total, new Date());\n\
  \        applicationEventPublisher.publishEvent(event);\n    }\n}\n```\n\n**监听事件**\n\
  \n在应用上下文中定义的任何实现了 `ApplicationListener` 接口的 Bean，都会收到所有事件的通知。因此，在 `onApplicationEvent()`\
  \ 方法中，你必须过滤出监听器想要处理的事件。在下面的监听器中，假设你希望向客户发送一封关于结账的电子邮件。\n\n```java\npackage com.apress.springrecipes.shop;\n\
  \n...\n\nimport org.springframework.context.ApplicationEvent;\nimport org.springframework.context.ApplicationListener;\n\
  \npublic class CheckoutListener implements ApplicationListener {\n\n    public void\
  \ onApplicationEvent(ApplicationEvent event) {\n        if (event instanceof CheckoutEvent)\
  \ {\n            double amount = ((CheckoutEvent) event).getAmount();\n        \
  \    Date time = ((CheckoutEvent) event).getTime();\n            // 对结账金额和时间进行任意处理\n\
  \            System.out.println(\"Checkout event [\" + amount + \", \" + time +\
  \ \"]\");\n        }\n    }\n}\n```\n\n接下来，你需要在应用上下文中注册此监听器以监听所有事件。注册过程非常简单，只需声明该监听器的一个\
  \ Bean 实例即可。应用上下文会自动识别实现了 `ApplicationListener` 接口的 Bean，并在每个事件发生时通知它们。\n\n```xml\n\
  <beans ...>\n    ...\n    <bean class=\"com.apress.springrecipes.shop.CheckoutListener\"\
  \ />\n</beans>\n```\n\n最后，请注意应用上下文本身也会发布容器事件，例如 `ContextClosedEvent`、`ContextRefreshedEvent`\
  \ 和 `RequestHandledEvent`。如果你的任何 Bean 希望收到这些事件的通知，它们可以实现 `ApplicationListener` 接口。\n\
  \n**4-14. 在 Spring 中注册属性编辑器**\n\n问题\n\n属性编辑器是 JavaBeans API 的一项功能，用于在属性值与文本值之间进行转换。每个属性编辑器仅针对特定类型的属性设计。你可能希望使用属性编辑器来简化\
  \ Bean 的配置。\n\n解决方案\n\nSpring IoC 容器支持使用属性编辑器来辅助 Bean 配置。例如，通过为 `java.net.URL` 类型使用属性编辑器，你可以为\
  \ URL 类型的属性指定一个 URL 字符串。Spring 会自动将该 URL 字符串转换为 `URL` 对象并注入到你的属性中。Spring 自带多个用于转换常见类型\
  \ Bean 属性的属性编辑器。\n\n通常，你应该在 Spring IoC 容器中使用属性编辑器之前先注册它。`CustomEditorConfigurer`\
  \ 作为一个 Bean 工厂后置处理器实现，允许你在任何 Bean 被实例化之前注册自定义属性编辑器。\n\n工作原理\n\n举例来说，假设你希望产品排名基于特定时期的销量。为此，你在\
  \ `ProductRanking` 类中添加了 `fromDate` 和 `toDate` 属性。\n\n```java\npackage com.apress.springrecipes.shop;\n\
  \n...\n\npublic class ProductRanking {\n\n    private Product bestSeller;\n    private\
  \ Date fromDate;\n    private Date toDate;\n\n    // Getters and Setters\n    ...\n\
  }\n```\n\n要在 Java 程序中为 `java.util.Date` 类型的属性指定值，你可以借助 `DateFormat.parse()` 方法，从特定模式的日期字符串进行转换。\n\
  \n```java\nDateFormat dateFormat = new SimpleDateFormat(\"yyyy-MM-dd\");\nproductRanking.setFromDate(dateFormat.parse(\"\
  2007-09-01\"));\nproductRanking.setToDate(dateFormat.parse(\"2007-09-30\"));\n```\n\
  \n要在 Spring 中编写等效的 Bean 配置，首先声明一个配置了模式的 `dateFormat` Bean。由于 `parse()` 方法用于将日期字符串转换为日期对象，你可以将其视为创建日期\
  \ Bean 的实例工厂方法。\n\n```xml\n<beans ...>\n    ...\n    <bean id=\"dateFormat\" class=\"\
  java.text.SimpleDateFormat\">\n        <constructor-arg value=\"yyyy-MM-dd\" />\n\
  \    </bean>\n\n    <bean id=\"productRanking\"\n          class=\"com.apress.springrecipes.shop.ProductRanking\"\
  >\n        <property name=\"bestSeller\">\n            <bean class=\"com.apress.springrecipes.shop.Disc\"\
  >\n                <property name=\"name\" value=\"CD-RW\" />\n                <property\
  \ name=\"price\" value=\"1.5\" />\n            </bean>\n        </property>\n  \
  \      <property name=\"fromDate\">\n            <bean **factory-bean=\"dateFormat\"\
  \ factory-method=\"parse\"** >\n                <constructor-arg value=\"2007-09-01\"\
  \ />\n            </bean>\n        </property>\n        <property name=\"toDate\"\
  >\n            <bean **factory-bean=\"dateFormat\" factory-method=\"parse\"** >\n\
  \                <constructor-arg value=\"2007-09-30\" />\n            </bean>\n\
  \        </property>\n    </bean>\n</beans>\n```\n\n如你所见，上述配置对于设置日期属性来说过于复杂。\n\n\
  \n\n实际上，Spring IoC 容器能够通过使用属性编辑器（property editors）将文本值转换为你的属性。Spring 自带的 `CustomDateEditor`\
  \ 类用于将日期字符串转换为 `java.util.Date` 属性。首先，你需要在 bean 配置文件中声明它的一个实例。\n\n<beans ...>\n\n\
  ...\n\n<bean id=\"dateEditor\"\n\nclass=\"org.springframework.beans.propertyeditors.CustomDateEditor\"\
  >\n\n<constructor-arg>\n\n<bean class=\"java.text.SimpleDateFormat\">\n\n<constructor-arg\
  \ value=\"yyyy-MM-dd\" />\n\n</bean>\n\n</constructor-arg>\n\n<constructor-arg value=\"\
  true\" />\n\n</bean>\n\n</beans>\n\n这个编辑器需要一个 `DateFormat` 对象作为第一个构造函数参数。第二个参数指示该编辑器是否允许空值。\n\
  \n接下来，你需要在 `CustomEditorConfigurer` 实例中注册这个属性编辑器，以便 Spring 能够转换类型为 `java.util.Date`\
  \ 的属性。现在，你可以为任何 `java.util.Date` 属性指定文本格式的日期值：\n\n<beans ...>\n\n...\n\n<bean class=\"\
  org.springframework.beans.factory.config.CustomEditorConfigurer\">\n\n<property\
  \ name=\"customEditors\">\n\n<map>\n\n<entry key=\"java.util.Date\">\n\n<ref local=\"\
  dateEditor\" />\n\n</entry>\n\n</map>\n\n</property>\n\n</bean>\n\n<bean id=\"productRanking\"\
  \n\nclass=\"com.apress.springrecipes.shop.ProductRanking\">\n\n<property name=\"\
  bestSeller\">\n\n<bean class=\"com.apress.springrecipes.shop.Disc\">\n\n<property\
  \ name=\"name\" value=\"CD-RW\" />\n\n<property name=\"price\" value=\"1.5\" />\n\
  \n</bean>\n\n</property>\n\n<property name=\"fromDate\" **value=\"2007-09-01\"**\
  \ />\n\n<property name=\"toDate\" **value=\"2007-09-30\"** />\n\n</bean>\n\n</beans>\n\
  \n9799ch04.qxd 4/10/08 10:53 AM Page 129\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n**129**\n\
  \n你可以通过以下 `Main` 类来测试你的 `CustomDateEditor` 配置是否生效：\n\npackage com.apress.springrecipes.shop;\n\
  \nimport org.springframework.context.ApplicationContext;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class Main {\n\npublic static void main(String[] args) throws Exception\
  \ {\n\nApplicationContext context =\n\nnew ClassPathXmlApplicationContext(\"beans.xml\"\
  );\n\n...\n\nProductRanking productRanking =\n\n(ProductRanking) context.getBean(\"\
  productRanking\");\n\nSystem.out.println(\n\n\"Product ranking from \" + productRanking.getFromDate()\
  \ +\n\n\" to \" + productRanking.getToDate());\n\n}\n\n}\n\n除了 `CustomDateEditor`，Spring\
  \ 还提供了几个用于转换常见数据类型的属性编辑器，例如 `CustomNumberEditor`、`ClassEditor`、`FileEditor`、`LocaleEditor`、`StringArrayPropertyEditor`\
  \ 和 `URLEditor`。其中，`ClassEditor`、`FileEditor`、`LocaleEditor` 和 `URLEditor` 已被 Spring\
  \ 预先注册，因此你无需再次注册。关于使用这些编辑器的更多信息，你可以查阅 `org.springframework.beans.propertyeditors`\
  \ 包中这些类的 javadoc。\n\n**4-15. 创建自定义属性编辑器**\n\n问题\n\n除了注册内置的属性编辑器，你可能还想编写自己的自定义属性编辑器，用于转换自定义数据类型。\n\
  \n解决方案\n\n你可以通过实现 `java.beans.PropertyEditor` 接口或继承便捷的支持类 `java.beans.PropertyEditorSupport`\
  \ 来编写自定义属性编辑器。\n\n工作原理\n\n例如，让我们为 `Product` 类编写一个属性编辑器。你可以将产品的字符串表示设计为三个部分，分别是具体类名、产品名称和价格。每个部分用逗号分隔。然后，你可以编写以下\
  \ `ProductEditor` 类来进行转换：\n\n9799ch04.qxd 4/10/08 10:53 AM Page 130\n\n**130**\n\
  \n第 4 章 **■** 高级 Spring IoC 容器\n\npackage com.apress.springrecipes.shop;\n\nimport\
  \ java.beans.PropertyEditorSupport;\n\npublic class ProductEditor extends PropertyEditorSupport\
  \ {\n\npublic String getAsText() {\n\nProduct product = (Product) getValue();\n\n\
  return product.getClass().getName() + \",\" + product.getName() + \",\"\n\n+ product.getPrice();\n\
  \n}\n\npublic void setAsText(String text) throws IllegalArgumentException {\n\n\
  String[] parts = text.split(\",\");\n\ntry {\n\n\n\nProduct product = (Product)\
  \ Class.forName(parts[0]).newInstance();\n\nproduct.setName(parts[1]);\n\nproduct.setPrice(Double.parseDouble(parts[2]));\n\
  \nsetValue(product);\n\n} catch (Exception e) {\n\nthrow new IllegalArgumentException(e);\n\
  \n}\n\n}\n\n}\n\n`getAsText()` 方法将属性转换为字符串值，而 `setAsText()` 方法则将字符串转换回属性。通过调用 `getValue()`\
  \ 和 `setValue()` 方法来获取和设置属性值。\n\n接下来，你必须在 `CustomEditorConfigurer` 实例中注册自定义编辑器，然后才能使用它。注册方式与内置编辑器相同。现在，你可以为任何类型为\
  \ `Product` 的属性指定文本格式的产品。\n\n<beans ...>\n\n...\n\n<bean class=\"org.springframework.beans.factory.config.CustomEditorConfigurer\"\
  >\n\n<property name=\"customEditors\">\n\n<map>\n\n...\n\n<entry key=\"com.apress.springrecipes.shop.Product\"\
  >\n\n<bean class=\"com.apress.springrecipes.shop.ProductEditor\" />\n\n</entry>\n\
  \n</map>\n\n</property>\n\n</bean>\n\n<bean id=\"productRanking\"\n\nclass=\"com.apress.springrecipes.shop.ProductRanking\"\
  >\n\n<property name=\"bestSeller\">\n\n![Image 28](img/index-157_1.jpg)\n\n9799ch04.qxd\
  \ 4/10/08 10:53 AM Page 131\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n**131**\n\n**<value>com.apress.springrecipes.shop.Disc,CD-RW,1.5</value>**\n\
  \n</property>\n\n...\n\n</bean>\n\n</beans>\n\n实际上，JavaBeans API 会自动为类搜索属性编辑器。为了正确搜索到属性编辑器，它必须与目标类位于同一个包中，并且名称必须是目标类名加上\
  \ `Editor` 后缀。如果你的属性编辑器遵循此约定（例如前面的 `ProductEditor`），则无需在 Spring IoC 容器中再次注册。\n\n\
  **4-16. 加载外部资源**\n\n问题\n\n有时，你的应用程序可能需要从不同位置（例如文件系统、类路径或 URL）读取外部资源（例如文本文件、XML 文件、属性文件或图像文件）。\n\
  \n通常，你必须使用不同的 API 来从不同位置加载资源。\n\n解决方案\n\nSpring 的资源加载器提供了一个统一的 `getResource()` 方法，用于通过资源路径检索外部资源。你可以为此路径指定不同的前缀，以从不同位置加载资源。要从文件系统加载资源，请使用\
  \ `file:` 前缀。要从类路径加载资源，请使用 `classpath:` 前缀。你也可以在此资源路径中指定一个 URL。\n\n`Resource` 是\
  \ Spring 中用于表示外部资源的通用接口。Spring 为 `Resource` 接口提供了几种实现，如图 4-1 所示。资源加载器的 `getResource()`\
  \ 方法将根据资源路径决定实例化哪个 `Resource` 实现。\n\n**图 4-1.** *Resource 接口的常见实现*\n\n9799ch04.qxd\
  \ 4/10/08 10:53 AM Page 132\n\n**132**\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n工作原理\n\
  \n假设你希望在商店应用程序启动时显示一个横幅。该横幅由以下字符组成，并存储在一个名为 `banner.txt` 的文本文件中。此文件可以放在应用程序的当前路径下。\n\
  \n***********************\n\n* 欢迎来到我的商店！ *\n\n***********************\n\n接下来，你必须编写\
  \ `BannerLoader` 类来加载横幅并将其输出到控制台。由于它需要访问资源加载器来加载资源，因此它必须实现 `ApplicationContextAware`\
  \ 接口或 `ResourceLoaderAware` 接口。\n\npackage com.apress.springrecipes.shop;\n\n...\n\
  \nimport org.springframework.context.ResourceLoaderAware;\n\nimport org.springframework.core.io.Resource;\n\
  \nimport org.springframework.core.io.ResourceLoader;\n\npublic class BannerLoader\
  \ implements ResourceLoaderAware {\n\nprivate ResourceLoader resourceLoader;\n\n\
  public void setResourceLoader(ResourceLoader resourceLoader) {\n\nthis.resourceLoader\
  \ = resourceLoader;\n\n}\n\npublic void showBanner() throws IOException {\n\n\n\n\
  Resource banner = resourceLoader.getResource(\"file:banner.txt\"); InputStream in\
  \ = banner.getInputStream();\n\nBufferedReader reader = new BufferedReader(new InputStreamReader(in));\n\
  \nwhile (true) {\n\nString line = reader.readLine();\n\nif (line == null)\n\nbreak;\n\
  \nSystem.out.println(line);\n\n}\n\nreader.close();\n\n}\n\n}\n\n通过从应用上下文中调用 `getResource()`\
  \ 方法，你可以获取由资源路径指定的外部资源。由于你的横幅文件位于文件系统中，资源路径应以 `file:` 前缀开头。你可以调用 `getInputStream()`\
  \ 方法来获取该资源的输入流。然后，使用 `BufferedReader` 逐行读取文件内容，并将其输出到控制台。\n\n9799ch04.qxd 4/10/08\
  \ 10:53 AM Page 133\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n**133**\n\n最后，在 Bean 配置文件中声明一个\
  \ `BannerLoader` 实例来显示横幅。由于你希望在启动时显示横幅，因此将 `showBanner()` 方法指定为初始化方法。\n\n<bean id=\"\
  bannerLoader\"\n\nclass=\"com.apress.springrecipes.shop.BannerLoader\"\n\n**init-method=\"\
  showBanner\"** />\n\n**资源前缀**\n\n之前的资源路径指定了文件系统相对路径下的一个资源。你也可以指定绝对路径。\n\nfile:c:/shop/banner.txt\n\
  \n当你的资源位于类路径（classpath）中时，必须使用 `classpath:` 前缀。如果没有提供路径信息，它将从类路径的根目录加载。\n\nclasspath:banner.txt\n\
  \n如果资源位于特定包中，你可以指定从类路径根目录开始的绝对路径。\n\nclasspath:com/apress/springrecipes/shop/banner.txt\n\
  \n除了文件系统路径或类路径，资源也可以通过指定 URL 来加载。\n\n[`springrecipes.apress.com/shop/banner.txt`](http://springrecipes.apress.com/shop/banner.txt)\n\
  \n如果资源路径中没有提供前缀，资源将根据应用上下文从相应位置加载。对于 `FileSystemXmlApplicationContext`，资源将从文件系统加载。对于\
  \ `ClassPathXmlApplicationContext`，资源将从类路径加载。\n\n**注入资源**\n\n除了显式调用 `getResource()`\
  \ 方法加载资源外，你还可以通过 setter 方法注入资源：\n\npackage com.apress.springrecipes.shop;\n\n...\n\
  \nimport org.springframework.core.io.Resource;\n\npublic class BannerLoader {\n\n\
  **private Resource banner;**\n\n**public void setBanner(Resource banner) {**\n\n\
  **this.banner = banner;**\n\n**}**\n\n9799ch04.qxd 4/10/08 10:53 AM Page 134\n\n\
  **134**\n\n第 4 章 **■** 高级 Spring IoC 容器\n\npublic void showBanner() throws IOException\
  \ {\n\nInputStream in = banner.getInputStream();\n\n...\n\n}\n\n}\n\n在 Bean 配置中，你可以直接为这个\
  \ `Resource` 属性指定资源路径。Spring 会使用预注册的属性编辑器 `ResourceEditor` 将其转换为 `Resource` 对象，然后再注入到你的\
  \ Bean 中。\n\n<bean id=\"bannerLoader\"\n\nclass=\"com.apress.springrecipes.shop.BannerLoader\"\
  \n\ninit-method=\"showBanner\">\n\n**<property name=\"banner\">**\n\n**<value>classpath:com/apress/springrecipes/shop/banner.txt</value>**\n\
  \n**</property>**\n\n</bean>\n\n**4-17. 本章小结**\n\n在本章中，你学习了创建 Bean 的各种方法，包括调用构造函数、调用静态/实例工厂方法、使用工厂\
  \ Bean，以及从静态字段/对象属性中获取。Spring IoC 容器使得通过这些方式创建 Bean 变得简单。\n\n在 Spring 2.x 中，你可以指定\
  \ Bean 的作用域来控制请求时返回哪个 Bean 实例。默认的 Bean 作用域是单例（singleton）——Spring 为每个 Spring IoC\
  \ 容器创建一个共享的单一 Bean 实例。另一个常见的作用域是原型（prototype）——每次请求时，Spring 都会创建一个新的 Bean 实例。\n\n\
  你可以通过指定相应的回调方法来定制 Bean 的初始化和销毁过程。此外，你的 Bean 可以实现特定的 Aware 接口来感知容器的配置和基础设施。Spring\
  \ IoC 容器会在 Bean 生命周期的特定时间点调用这些方法。\n\nSpring 支持在 IoC 容器中注册 Bean 后处理器，以便在初始化回调方法之前和之后执行额外的\
  \ Bean 处理。Bean 后处理器可以处理 IoC 容器中的所有 Bean。通常，Bean 后处理器用于检查 Bean 属性的有效性或根据特定标准更改 Bean\
  \ 属性。\n\n你还学习了一些高级 IoC 容器特性，例如将 Bean 配置外部化到属性文件、从资源包中解析文本消息、发布和监听应用事件、使用属性编辑器将属性值从文本值转换，以及加载外部资源。在使用\
  \ Spring 开发应用程序时，你会发现这些特性非常有用。\n\n在下一章中，你将学习 Spring 框架的另一个核心特性：面向切面编程。\n\n9799ch05.qxd\
  \ 4/14/08 10:59 AM Page 135\n\n第 5 章\n\n动态代理与经典\n\nSpring AOP\n\n**本**章中，你将首先了解横切关注点的本质，以及如何通过动态代理将其模块化。然后，你将重点学习\
  \ Spring 1.x 版本中的 AOP 用法，这被称为经典 Spring AOP。Spring AOP 的用法从 1.x 版本到 2.x 版本发生了显著变化。介绍经典\
  \ Spring AOP 主要是出于兼容性目的。\n\n每次你使用 Spring 2.x 启动新项目时，都应选择新的 Spring AOP 方法，下一章将对此进行详细介绍。\n\
  \n*面向切面编程（AOP）* 是一种新的方法论，用于补充传统的*面向对象编程（OOP）*。AOP 的动机并非取代 OOP。事实上，AOP 通常与 OOP 一起使用。在\
  \ OOP 的世界中，应用程序通过类和接口来组织。这些元素非常适合实现核心业务需求，但不适合处理横切关注点（即跨越应用程序多个模块的功能或需求）。横切关注点在企业应用中非常常见。典型的例子包括日志记录、验证和事务管理。\n\
  \nAOP 为开发者提供了另一种组织应用程序结构的方式。与 OOP 中的类和接口不同，AOP 的主要编程元素是*切面*。你可以想象，切面将横切关注点模块化，就像类在\
  \ OOP 中将状态和行为模块化一样。\n\n除了 IoC 容器，Spring 框架的另一个核心模块是其 AOP 框架。目前，市场上存在许多基于不同技术、为不同目的而实现的\
  \ AOP 框架，但只有以下三个开源 AOP 框架进入了主流：\n\n• AspectJ，自版本 5 起与 AspectWerkz 合并（[`www.eclipse.org/aspectj/`](http://www.eclipse.org/aspectj)）\n\
  \n• JBoss AOP，作为 JBoss 应用服务器的子项目（[`labs.jboss.com/jbossaop`](http://labs.jboss.com/jbossaop)）\n\
  \n• Spring AOP，作为 Spring 框架的一部分（[`www.springframework.org/`](http://www.springframework.org)）\
  \ 其中，AspectJ 是 Java 社区中最完整、最流行的 AOP 框架。相比之下，Spring AOP 并非 AspectJ 的竞争对手，旨在提供另一个完整的\
  \ AOP 实现。其目的仅仅是提供一个能够与其 IoC 容器无缝集成的 AOP 解决方案。实际上，Spring AOP 只会处理在其 IoC 容器中声明的 Bean\
  \ 的横切关注点。\n\n**135**\n\n9799ch05.qxd 4/14/08 10:59 AM Page 136\n\n**136**\n\n\n\n\
  第 5 章 **■** 动态代理与经典 Spring AOP\n\nSpring AOP 的核心实现技术是动态代理。尽管 Spring AOP 的用法从 1.x\
  \ 版本到 2.x 版本发生了显著变化，但其实现技术始终保持不变。此外，Spring AOP 是向后兼容的，因此你可以在 Spring 2.x 中继续使用 Spring\
  \ 1.x 的 AOP 元素。\n\n• 在 Spring 1.x 版本中，AOP 的使用是通过一套专有的 Spring AOP API 实现的。\n• 在 Spring\
  \ 2.0 版本中，AOP 的使用是通过编写 POJO，并在 Bean 配置文件中使用 AspectJ 注解或基于 XML 的配置来实现的。\n\n完成本章学习后，你将能够识别应用程序中的横切关注点，并使用经典\
  \ Spring AOP 将其模块化。你还将掌握 Spring AOP 核心实现技术——动态代理的基础知识，这有助于你更好地理解 Spring AOP 的机制。\n\
  \n**5-1. 非模块化横切关注点的问题**\n\n根据定义，横切关注点是一种跨越应用程序多个模块的功能。这类关注点通常难以通过传统的面向对象方法进行模块化。为了理解横切关注点，让我们从一个简单的计算器示例开始。首先，为算术计算和度量单位转换创建两个接口：`ArithmeticCalculator`和`UnitCalculator`。\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n\npublic interface ArithmeticCalculator\
  \ {\n\n    public double add(double a, double b);\n\n    public double sub(double\
  \ a, double b);\n\n    public double mul(double a, double b);\n\n    public double\
  \ div(double a, double b);\n\n}\n```\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \npublic interface UnitCalculator {\n\n    public double kilogramToPound(double\
  \ kilogram);\n\n    public double kilometerToMile(double kilometer);\n\n}\n```\n\
  \n然后，为每个计算器接口提供一个简单的实现。其中的`println`语句用于通知你这些方法何时被执行。\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \npublic class ArithmeticCalculatorImpl implements ArithmeticCalculator {\n\n  \
  \  public double add(double a, double b) {\n        double result = a + b;\n   \
  \     System.out.println(a + \" + \" + b + \" = \" + result);\n        return result;\n\
  \    }\n\n    public double sub(double a, double b) {\n        double result = a\
  \ - b;\n        System.out.println(a + \" - \" + b + \" = \" + result);\n      \
  \  return result;\n    }\n\n    public double mul(double a, double b) {\n      \
  \  double result = a * b;\n        System.out.println(a + \" * \" + b + \" = \"\
  \ + result);\n        return result;\n    }\n\n    public double div(double a, double\
  \ b) {\n        double result = a / b;\n        System.out.println(a + \" / \" +\
  \ b + \" = \" + result);\n        return result;\n    }\n}\n```\n\n```java\npackage\
  \ com.apress.springrecipes.calculator;\n\npublic class UnitCalculatorImpl implements\
  \ UnitCalculator {\n\n    public double kilogramToPound(double kilogram) {\n   \
  \     double pound = kilogram * 2.2;\n        System.out.println(kilogram + \" kilogram\
  \ = \" + pound + \" pound\");\n        return pound;\n    }\n\n    public double\
  \ kilometerToMile(double kilometer) {\n        double mile = kilometer * 0.62;\n\
  \        System.out.println(kilometer + \" kilometer = \" + mile + \" mile\");\n\
  \        return mile;\n    }\n}\n```\n\n**追踪方法**\n\n大多数应用程序的一个常见需求是追踪程序执行期间发生的活动。对于\
  \ Java 平台，有几种日志实现可供你选择。但是，如果你希望应用程序独立于日志实现，可以利用 Apache Commons Logging 库。它提供了与实现无关的抽象\
  \ API，允许你在不修改代码的情况下切换不同的实现。\n\n**■注意** 要使用 Apache Commons Logging 库，你必须在类路径中包含`commons-logging.jar`（位于\
  \ Spring 安装目录的`lib/jakarta-commons`目录下）。\n\n对于你的计算器，你可以记录每个方法的开始和结束，以及方法的参数和返回值。\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n\nimport org.apache.commons.logging.Log;\n\
  import org.apache.commons.logging.LogFactory;\n\npublic class ArithmeticCalculatorImpl\
