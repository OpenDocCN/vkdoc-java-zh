  \ Portlet 请求分派给处理请求的适当处理器。它充当 Spring Portlet MVC 的前端控制器，每个 Portlet 请求都必须经过它，以便它能够管理整个请求处理过程。当\
  \ DispatcherPortlet 接收到一个 Portlet 请求时，它将 **511**\n\n\n\n9799ch14.qxd 5/14/08 4:26\
  \ PM 第 512 页\n\n**512**\n\n第 14 章 **■** Spring Portlet MVC 框架\n\n组织在 portlet 应用程序上下文中配置的不同组件来处理此请求。图\
  \ 14-1 展示了 Spring Portlet MVC 中请求处理的主要流程。\n\n**图 14-1.** *Spring Portlet MVC 中请求处理的主要流程*\n\
  \n当 DispatcherPortlet 接收到一个 portlet 请求时，它首先会寻找一个合适的处理器来处理该请求。DispatcherPortlet 通过一个或多个处理器映射\
  \ bean 将每个请求映射到一个处理器。一旦它选定了合适的处理器，就会调用该处理器来处理请求。Spring Portlet MVC 中最典型的处理器是控制器。\n\
  \n在 portlet 中，有两种类型的 URL：*渲染 URL* 和 *动作 URL*。在大多数情况下，一个页面中会显示多个 portlet。当用户触发一个渲染\
  \ URL 时，portlet 容器会要求同一页面中的所有 portlet 处理一个*渲染请求*来渲染其视图，除非视图内容已被缓存。控制器应返回一个 ModelAndView\
  \ 对象来响应渲染请求。然而，当用户在 portlet 中触发一个动作 URL 时，portlet 容器会首先要求目标 portlet 处理一个*动作请求*。控制器无需为动作请求返回任何内容。当动作请求完成后，portlet\
  \ 容器会要求同一页面中的所有 portlet（包括目标 portlet）处理一个渲染请求来渲染其视图。\n\n控制器处理完渲染请求后，会向 DispatcherPortlet\
  \ 返回一个模型和视图名称，或者有时是一个视图对象。如果返回的是视图名称，它将被解析为一个视图对象用于渲染。DispatcherPortlet 通过一个或多个视图解析器\
  \ bean 来解析视图名称。最后，DispatcherPortlet 渲染视图并传入控制器返回的模型。请注意，动作请求不需要渲染视图。\n\n9799ch14.qxd\
