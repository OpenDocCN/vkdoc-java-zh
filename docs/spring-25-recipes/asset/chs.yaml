  \ Security 可以使用*调用后提供器*，根据领域对象的 ACL 来处理从方法返回的领域对象。对于返回单个领域对象的方法，你可以注册一个 `AclEntryAfterInvocationProvider`\
  \ 实例，以检查当前用户是否拥有访问返回领域对象的指定权限。如果用户未被授权访问该对象，此提供器将抛出异常，阻止对象被返回。\n\n另一方面，对于返回领域对象集合的方法，你可以注册一个\
  \ `AclEntryAfterInvocationCollectionFilteringProvider` 实例，根据该集合中领域对象元素的 ACL 来过滤返回的集合。当前用户没有指定权限的领域对象将在集合返回给调用方法之前被移除。\n\
