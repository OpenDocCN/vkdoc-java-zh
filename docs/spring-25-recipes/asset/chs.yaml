  ```\n\n`JavaMailSenderImpl` 使用的默认端口是标准的 SMTP 端口 25，因此如果你的邮件服务器在此端口上监听 SMTP 连接，你可以直接省略此属性。此外，如果你的\
  \ SMTP 服务器不需要用户认证，则无需设置用户名和密码。\n\n如果你在 Java EE 应用服务器中配置了一个 JavaMail 会话，你可以首先借助 `JndiObjectFactoryBean`\
  \ 来查找它。\n\n```xml\n<bean id=\"mailSession\"\n      class=\"org.springframework.jndi.JndiObjectFactoryBean\"\
  >\n    <property name=\"jndiName\" value=\"mail/Session\" />\n</bean>\n```\n\n或者，如果你使用的是\
  \ Spring 2.x，可以通过 `<jee:jndi-lookup>` 元素来查找 JavaMail 会话。\n\n```xml\n<jee:jndi-lookup\
  \ id=\"mailSession\" jndi-name=\"mail/Session\" />\n```\n\n你可以将 JavaMail 会话注入到 `JavaMailSenderImpl`\
  \ 中供其使用。在这种情况下，你不再需要设置主机、端口、用户名或密码。\n\n```xml\n<bean id=\"mailSender\"\n      class=\"\
  org.springframework.mail.javamail.JavaMailSenderImpl\">\n    <property name=\"session\"\
  \ ref=\"mailSession\" />\n</bean>\n```\n\n**定义电子邮件模板**\n\n在方法体中从头开始构建电子邮件消息效率不高，因为你必须硬编码邮件属性。此外，用\
  \ Java 字符串编写邮件文本也可能比较困难。你可以考虑在 Bean 配置文件中定义一个电子邮件消息模板，并从中构建新的电子邮件消息。\n\n```xml\n\
  <beans ...>\n    ...\n    <bean id=\"copyErrorMailMessage\"\n          class=\"\
  org.springframework.mail.SimpleMailMessage\">\n        <property name=\"from\" value=\"\
  system@localhost\" />\n        <property name=\"to\" value=\"admin@localhost\" />\n\
  \        <property name=\"subject\" value=\"文件复制错误\" />\n        <property name=\"\
  text\">\n            <value>\n                <![CDATA[\n尊敬的 Administrator，\n\n\
  复制以下文件时发生错误：\n\n源目录：**%s**\n目标目录：**%s**\n文件名：**%s**\n                ]]>\n     \
  \       </value>\n        </property>\n    </bean>\n\n    <bean id=\"errorNotifier\"\
  \n          class=\"com.apress.springrecipes.replicator.EmailErrorNotifier\">\n\
  \        ...\n        <property name=\"copyErrorMailMessage\" ref=\"copyErrorMailMessage\"\
  \ />\n    </bean>\n</beans>\n```\n\n请注意，在上述消息文本中，你包含了占位符 `%s`，这些占位符将通过 `String.format()`\
  \ 被消息参数替换。当然，你也可以使用更强大的模板语言，如 Velocity 或 FreeMarker，根据模板生成消息文本。将邮件消息模板与 Bean 配置文件分离也是一个好做法。\n\
  \n每次发送电子邮件时，你可以从这个注入的模板构建一个新的 `SimpleMailMessage` 实例。然后，你可以使用 `String.format()`\
  \ 生成消息文本，用你的消息参数替换 `%s` 占位符。\n\n```java\npackage com.apress.springrecipes.replicator;\n\
  \n...\n```\n\n\n\nimport org.springframework.mail.SimpleMailMessage;\n\npublic class\
  \ EmailErrorNotifier implements ErrorNotifier {\n\n...\n\nprivate SimpleMailMessage\
  \ copyErrorMailMessage;\n\npublic void setCopyErrorMailMessage(SimpleMailMessage\
  \ copyErrorMailMessage) {\n\nthis.copyErrorMailMessage = copyErrorMailMessage;\n\
  \n}\n\npublic void notifyCopyError(String srcDir, String destDir, String filename)\
  \ {\n\nSimpleMailMessage message = new SimpleMailMessage(copyErrorMailMessage);\n\
  \nmessage.setText(String.format(\n\ncopyErrorMailMessage.getText(), srcDir, destDir,\
  \ filename));\n\nmailSender.send(message);\n\n}\n\n}\n\n**发送 MIME 消息**\n\n到目前为止，您使用的\
  \ `SimpleMailMessage` 类只能发送简单的纯文本电子邮件消息。\n\n要发送包含 HTML 内容、内嵌图片或附件的电子邮件，您必须构建并发送\
  \ MIME 消息。JavaMail 通过 `MimeMessage` 类支持 MIME。\n\n首先，您必须使用 `JavaMailSender` 接口，而不是其父接口\
  \ `MailSender`。您注入的 `JavaMailSenderImpl` 实例确实实现了此接口，因此无需修改 bean 配置。以下通知器将 Spring\
  \ 的 bean 配置文件作为电子邮件附件发送给管理员：\n\npackage com.apress.springrecipes.replicator;\n\n\
  import javax.mail.MessagingException;\n\nimport javax.mail.internet.MimeMessage;\n\
  \n9799ch18.qxd 5/15/08 5:08 PM Page 687\n\n第 18 章 **■** SPRING 对 JMX、电子邮件和调度的支持\n\
  \n**687**\n\nimport org.springframework.core.io.ClassPathResource;\n\nimport org.springframework.mail.MailParseException;\n\
  \nimport org.springframework.mail.SimpleMailMessage;\n\nimport org.springframework.mail.javamail.JavaMailSender;\n\
  \nimport org.springframework.mail.javamail.MimeMessageHelper;\n\npublic class EmailErrorNotifier\
  \ implements ErrorNotifier {\n\nprivate **JavaMailSender** mailSender;\n\nprivate\
  \ SimpleMailMessage copyErrorMailMessage;\n\npublic void setMailSender(**JavaMailSender**\
  \ mailSender) {\n\nthis.mailSender = mailSender;\n\n}\n\npublic void setCopyErrorMailMessage(SimpleMailMessage\
  \ copyErrorMailMessage) {\n\nthis.copyErrorMailMessage = copyErrorMailMessage;\n\
  \n}\n\npublic void notifyCopyError(String srcDir, String destDir, String filename)\
  \ {\n\nMimeMessage message = mailSender.createMimeMessage();\n\ntry {\n\nMimeMessageHelper\
  \ helper = new MimeMessageHelper(message, true);\n\nhelper.setFrom(copyErrorMailMessage.getFrom());\n\
  \nhelper.setTo(copyErrorMailMessage.getTo());\n\nhelper.setSubject(copyErrorMailMessage.getSubject());\n\
  \nhelper.setText(String.format(\n\ncopyErrorMailMessage.getText(), srcDir, destDir,\
  \ filename));\n\nClassPathResource config = new ClassPathResource(\"beans.xml\"\
  );\n\nhelper.addAttachment(\"beans.xml\", config);\n\n} catch (MessagingException\
  \ e) {\n\nthrow new MailParseException(e);\n\n}\n\nmailSender.send(message);\n\n\
  }\n\n}\n\n与 `SimpleMailMessage` 不同，`MimeMessage` 类由 JavaMail 定义，因此您只能通过调用 `JavaMailSender.createMimeMessage()`\
  \ 来实例化它。Spring 提供了辅助类 `MimeMessageHelper` 来简化 `MimeMessage` 的操作。它允许您从 Spring 的 `Resource`\
  \ 对象添加附件。但是，此辅助类的操作仍然会抛出 JavaMail 的 `MessagingException`。为了保持一致性，您必须将此异常转换为 Spring\
  \ 的邮件运行时异常。\n\nSpring 还提供了另一种构建 MIME 消息的方法，即通过实现 `MimeMessagePreparator` 接口。\n\n\
  9799ch18.qxd 5/15/08 5:08 PM Page 688\n\n**688**\n\n第 18 章 **■** SPRING 对 JMX、电子邮件和调度的支持\n\
  \npackage com.apress.springrecipes.replicator;\n\n...\n\nimport javax.mail.internet.MimeMessage;\n\
  \nimport org.springframework.mail.javamail.MimeMessagePreparator;\n\npublic class\
  \ EmailErrorNotifier implements ErrorNotifier {\n\n...\n\npublic void notifyCopyError(\n\
  \n**final** String srcDir, **final** String destDir, **final** String filename)\
