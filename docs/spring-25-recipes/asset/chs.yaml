  import org.springframework.web.bind.WebDataBinder;\n\nimport org.springframework.web.bind.support.WebBindingInitializer;\n\
  \nimport org.springframework.web.context.request.WebRequest;\n\npublic class ReservationBindingInitializer\
  \ implements WebBindingInitializer {\n\nprivate ReservationService reservationService;\n\
  \n**@Autowired**\n\npublic ReservationBindingInitializer(ReservationService reservationService)\
  \ {\n\nthis.reservationService = reservationService;\n\n}\n\npublic void initBinder(WebDataBinder\
  \ binder, WebRequest request) {\n\nSimpleDateFormat dateFormat = new SimpleDateFormat(\"\
  yyyy-MM-dd\"); dateFormat.setLenient(false);\n\nbinder.registerCustomEditor(Date.class,\
  \ new CustomDateEditor(\n\ndateFormat, true));\n\nbinder.registerCustomEditor(SportType.class,\
  \ new SportTypeEditor(\n\nreservationService));\n\n}\n\n}\n\n然后，你可以为 AnnotationMethodHandlerAdapter\
  \ 指定此绑定初始化器，以便所有处理器方法都能共享相同的属性编辑器：\n\n<bean class=\"org.springframework.web.servlet.mvc.annotation.\
  \ **➥**\n\nAnnotationMethodHandlerAdapter\">\n\n**<property name=\"webBindingInitializer\"\
  >**\n\n**<bean class=\"com.apress.springrecipes.court.web.➥**\n\n**ReservationBindingInitializer\"\
  \ />**\n\n**</property>**\n\n</bean>\n\n现在，你可以删除 ReservationFormController 中的 initBinder()\
  \ 方法，因为该绑定器将在所有基于注解的控制器之间共享。\n\n**与传统控制器方法的比较**\n\n如你所见，基于注解的方法在编写控制器类和处理器方法时提供了更大的灵活性，因为你无需实现特定接口或继承特定基类。然而，为了让基于注解的控制器处理表单，其处理器方法必须执行一些原本由\
  \ SimpleFormController 处理的任务，例如调用验证器、在出错时返回表单视图，以及在处理成功时跳转到成功视图。因此，你需要更深入地了解表单处理的细节。\n\
  \n9799ch10.qxd 5/14/08 3:31 PM Page 393\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n\
  **393**\n\n**10-15. 小结**\n\n在本章中，你学习了如何使用 Spring MVC 框架开发 Java Web 应用程序。Spring MVC\
  \ 的核心组件是 DispatcherServlet，它充当前端控制器，将请求分派给适当的处理器进行处理。当 DispatcherServlet 接收到请求时，它首先从一个或多个处理器映射中查找处理器。一旦确定了处理器，DispatcherServlet\
  \ 就会调用该处理器来处理请求。处理器在处理完请求后，会返回一个模型以及一个视图名称或视图对象。如果返回的是视图名称，DispatcherServlet 将请求视图解析器将此视图名称解析为视图对象，然后将模型传递给该视图对象进行渲染。\n\
  \nDispatcherServlet 需要一组工具来帮助处理请求。这些工具包括处理器映射、区域设置解析器、视图解析器、消息源和异常解析器。你可以在 Web 应用程序上下文中轻松配置和自定义这些工具。\n\
  \nSpring MVC 提供了多个控制器类，供你在不同的使用场景中继承，例如 AbstractController、ParameterizableViewController、SimpleFormController、AbstractWizardFormController\
  \ 和 MultiActionController。它们封装了大部分特性，因此你的控制器只需继承它们即可继承这些特性。\n\nSpring MVC 支持针对不同表示技术的多种视图类型。例如，它将\
  \ Excel 和 PDF 文件视为特殊类型的视图，这样你就可以在控制器中一致地处理 Web 请求，并将数据添加到模型中，以便传递给 Excel 和 PDF 视图。\n\
  \nSpring 2.5 支持基于注解的控制器开发。你的控制器无需继承传统的控制器类——它们只需包含注解即可。通过使用注解，Spring 可以自动检测你的控制器类和处理器映射，因此你无需手动配置它们。\n\
  \n在下一章中，你将学习如何将 Spring 与几种流行的 Web 应用程序框架集成，包括 Struts、JSF 和 DWR。\n\n9799ch10.qxd\
  \ 5/14/08 3:31 PM Page 394\n\n9799ch11.qxd 5/14/08 4:13 PM Page 395\n\n第 11 章\n\n\
  将 Spring 与其他\n\nWeb 框架集成\n\n**本**章中，你将学习如何将 Spring 框架与几种流行的 Web 应用程序框架集成，包括 Struts、JSF\
  \ 和 DWR。Spring 强大的 IoC 容器和企业级支持特性使其非常适合实现 Java EE 应用程序的服务层和持久层。然而，对于表示层，你可以在许多不同的\
  \ Web 框架中进行选择。因此，你通常需要将 Spring 与你正在使用的任何 Web 应用程序框架集成。这种集成主要侧重于在这些框架中访问 Spring IoC\
  \ 容器中声明的 Bean。\n\nApache Struts ([`struts.apache.org/`](http://struts.apache.org))\
  \ 是一个基于 MVC 设计模式的流行开源 Web 应用程序框架。Struts 已广泛应用于 Java 社区的许多基于 Web 的项目中，因此拥有庞大的用户群。请注意，Spring\
  \ 对 Struts 的支持特性仅针对 Struts 1.x。这是因为在 Struts 于 2.0 版本中与 WebWork 合并后，通过使用 Spring IoC\
  \ 容器作为 Struts 2 的对象工厂，可以非常容易地在 Spring 中配置 Struts 动作。\n\nJSF（JavaServer Faces，[`java.sun.com/javaee/javaserverfaces/`](http://java.sun.com/javaee/javaserverfaces)）是一个优秀的基于组件和事件驱动的\
  \ Web 应用程序框架，作为 Java EE 规范的一部分。你可以使用丰富的标准 JSF 组件集，也可以开发自定义组件以供重用。JSF 通过将表示逻辑封装在一个或多个受管\
  \ Bean 中，可以清晰地将表示逻辑与 UI 分离。由于其基于组件的方法和流行度，JSF 得到了广泛的 IDE 支持，用于可视化开发。\n\nDWR（Direct\
  \ Web Remoting，[`getahead.org/dwr)`](http://getahead.org/dwr) 是一个为你的 Web 应用程序带来\
  \ Ajax（异步 JavaScript 和 XML）特性的库。它允许你通过 Web 浏览器中的 JavaScript 调用服务器端的 Java 对象。你还可以动态更新网页的部分内容，而无需刷新整个页面。\n\
  \n完成本章后，你将能够将 Spring 集成到使用 Servlet/JSP 以及流行的 Web 应用程序框架（如 Struts、JSF 和 DWR）实现的 Web\
  \ 应用程序中。\n\n**11-1. 在通用 Web 应用程序中访问 Spring**\n\n问题\n\n你希望在一个 Web 应用程序中访问 Spring\
  \ IoC 容器中声明的 Bean，无论该应用程序使用何种框架。\n\n**395**\n\n9799ch11.qxd 5/14/08 4:13 PM Page\
  \ 396\n\n**396**\n\n第 11 章 **■** 将 S P R I N G 与 其 他 W E B 框 架 集 成\n\n解决方案\n\nWeb\
  \ 应用程序可以通过注册 Servlet 监听器 ContextLoaderListener 来加载 Spring 的应用程序上下文。此监听器将加载的应用程序上下文存储到\
  \ Web 应用程序的 Servlet 上下文中。之后，Servlet 或任何可以访问 Servlet 上下文的对象，也可以通过一个工具方法访问 Spring\
  \ 的应用程序上下文。\n\n工作原理\n\n假设你将开发一个 Web 应用程序，供用户查找两个城市之间的距离（以公里为单位）。首先，定义以下服务接口：package\
  \ com.apress.springrecipes.city;\n\npublic interface CityService {\n\npublic double\
  \ findDistance(String srcCity, String destCity);\n\n}\n\n\n\n为简单起见，我们使用一个 Java Map\
  \ 来存储距离数据，以此实现该接口。这个 Map 的键是源城市，值则是包含目标城市及其与源城市距离的嵌套 Map。\n\npackage com.apress.springrecipes.city;\n\
  \n...\n\npublic class CityServiceImpl implements CityService {\n\nprivate Map<String,\
  \ Map<String, Double>> distanceMap;\n\npublic void setDistanceMap(Map<String, Map<String,\
  \ Double>> distanceMap) {\n\nthis.distanceMap = distanceMap;\n\n}\n\npublic double\
  \ findDistance(String srcCity, String destCity) {\n\nMap<String, Double> destinationMap\
  \ = distanceMap.get(srcCity);\n\nif (destinationMap == null) {\n\nthrow new IllegalArgumentException(\"\
  未找到源城市\");\n\n}\n\nDouble distance = destinationMap.get(destCity);\n\nif (distance\
  \ == null) {\n\nthrow new IllegalArgumentException(\"未找到目标城市\");\n\n}\n\nreturn\
  \ distance;\n\n}\n\n}\n\n接下来，为你的 Web 应用创建以下目录结构。由于此应用需要访问 Spring IoC 容器，你必须将两个必需的\
  \ Spring JAR 文件放入 `WEB-INF/lib` 目录。\n\n9799ch11.qxd 5/14/08 4:13 PM 第 397 页\n\n\
  第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n**397**\n\ncity/\nWEB-INF/\nclasses/\nlib/\n\
  commons-logging.jar\nspring.jar\njsp/\ndistance.jsp\napplicationContext.xml\nweb.xml\n\
  \n在 Spring 的 Bean 配置文件中，你可以使用 `<map>` 元素为几个城市硬编码一些距离数据。创建名为 `applicationContext.xml`\
  \ 的文件，并将其放在 `WEB-INF` 的根目录下。\n\n<beans\n[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  [`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<bean id=\"cityService\"\nclass=\"com.apress.springrecipes.city.CityServiceImpl\"\
  >\n<property name=\"distanceMap\">\n<map>\n<entry key=\"New York\">\n<map>\n<entry\
  \ key=\"London\" value=\"5574\" />\n<entry key=\"Beijing\" value=\"10976\" />\n\
  </map>\n</entry>\n</map>\n</property>\n</bean>\n</beans>\n\n在 Web 部署描述符（即 `web.xml`）中，注册\
  \ Spring 提供的 Servlet 监听器 `ContextLoaderListener`，以便在启动时将 Spring 的应用上下文加载到 Servlet\
  \ 上下文中。它会查找上下文参数 `contextConfigLocation` 以获取 Bean 配置文件的位置。你可以通过逗号或空格分隔来指定多个 Bean\
  \ 配置文件。\n\n[<web-app version=\"2.4\"](http://java.sun.com/xml/ns/j2ee)\n[xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/j2ee](http://www.w3.org/2001/XMLSchema-instance)\n[`java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\"\
  >`](http://www.w3.org/2001/XMLSchema-instance)\n\n<context-param>\n<param-name>contextConfigLocation</param-name>\n\
  9799ch11.qxd 5/14/08 4:13 PM 第 398 页\n\n**398**\n\n第 11 章 **■** 将 Spring 与其他 Web\
  \ 框架集成\n\n<param-value> **/WEB-INF/applicationContext.xml**</param-value>\n</context-param>\n\
  \n<listener>\n<listener-class>\n**org.springframework.web.context.ContextLoaderListener**\n\
  </listener-class>\n</listener>\n\n...\n</web-app>\n\n实际上，该监听器查找 Bean 配置文件的默认位置正是你所指定的（即\
  \ `/WEB-INF/applicationContext.xml`）。因此，你可以简单地省略这个上下文参数。\n\n为了允许用户查询城市间的距离，你需要创建一个包含表单的\
  \ JSP 文件。可以将其命名为 `distance.jsp`，并放在 `WEB-INF/jsp` 目录下，以防止直接访问。该表单中有两个文本字段供用户输入源城市和目标城市。还有一个表格网格用于显示实际距离。\n\
  \n<html>\n<head>\n<title>城市距离</title>\n</head>\n<body>\n<form method=\"POST\">\n\
  <table>\n<tr>\n<td>源城市</td>\n<td><input type=\"text\" name=\"srcCity\" value=\"\
  ${param.srcCity}\" /></td>\n</tr>\n<tr>\n<td>目标城市</td>\n<td><input type=\"text\"\
  \ name=\"destCity\" value=\"${param.destCity}\" /></td>\n</tr>\n<tr>\n<td>距离</td>\n\
  <td>${distance}</td>\n</tr>\n<tr>\n<td colspan=\"2\"><input type=\"submit\" value=\"\
  查找\" /></td>\n</tr>\n</table>\n</form>\n</body>\n</html>\n\n9799ch11.qxd 5/14/08\
  \ 4:13 PM 第 399 页\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n**399**\n\n你需要一个 Servlet\
  \ 来处理距离请求。当通过 HTTP GET 方法访问此 Servlet 时，它仅显示表单。随后，当通过 POST 方法提交表单时，此 Servlet 会查找两个输入城市之间的距离，并再次在表单中显示。\n\
  \n**■注意** 要开发使用 Servlet API 的 Web 应用，你必须在类路径中包含 `servlet-api.jar`（位于 Spring 安装目录的\
  \ `lib/j2ee` 目录下）。\n\npackage com.apress.springrecipes.city.servlet;\n\n...\n\n\
  import javax.servlet.RequestDispatcher;\nimport javax.servlet.ServletException;\n\
  import javax.servlet.http.HttpServlet;\nimport javax.servlet.http.HttpServletRequest;\n\
  import javax.servlet.http.HttpServletResponse;\n\nimport org.springframework.web.context.WebApplicationContext;\n\
  import org.springframework.web.context.support.WebApplicationContextUtils;\n\npublic\
  \ class DistanceServlet extends HttpServlet {\n\nprotected void doGet(HttpServletRequest\
  \ request,\nHttpServletResponse response) throws ServletException, IOException {\n\
  forward(request, response);\n}\n\nprotected void doPost(HttpServletRequest request,\n\
  HttpServletResponse response) throws ServletException, IOException {\nString srcCity\
  \ = request.getParameter(\"srcCity\");\nString destCity = request.getParameter(\"\
  destCity\");\n\n**WebApplicationContext context =**\n**WebApplicationContextUtils.getRequiredWebApplicationContext(**\n\
  **getServletContext());**\nCityService cityService = (CityService) context.getBean(\"\
  cityService\");\ndouble distance = cityService.findDistance(srcCity, destCity);\n\
  \nrequest.setAttribute(\"distance\", distance);\nforward(request, response);\n}\n\
  \nprivate void forward(HttpServletRequest request,\nHttpServletResponse response)\
  \ throws ServletException, IOException {\nRequestDispatcher dispatcher =\nrequest.getRequestDispatcher(\"\
  WEB-INF/jsp/distance.jsp\");\n9799ch11.qxd 5/14/08 4:13 PM 第 400 页\n\n**400**\n\n\
  第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\ndispatcher.forward(request, response);\n}\n\
  }\n\n此 Servlet 需要访问在 Spring IoC 容器中声明的 `cityService` Bean 来查找距离。由于 Spring 的应用上下文存储在\
  \ Servlet 上下文中，你可以通过 `WebApplicationContextUtils.getRequiredWebApplicationContext()`\
  \ 方法并传入 Servlet 上下文来检索它。\n\n最后，将此 Servlet 声明添加到 `web.xml` 中，并将其映射到 URL 模式 `/distance`。\n\
  \n<web-app ...>\n...\n<servlet>\n<servlet-name>distance</servlet-name>\n<servlet-class>\n\
  com.apress.springrecipes.city.servlet.DistanceServlet\n</servlet-class>\n</servlet>\n\
  \n<servlet-mapping>\n<servlet-name>distance</servlet-name>\n<url-pattern>/distance</url-pattern>\n\
  </servlet-mapping>\n</web-app>\n\n现在，你可以将此 Web 应用部署到 Web 容器（例如 Apache Tomcat 6.0）中。默认情况下，Tomcat\
  \ 监听 8080 端口，因此如果你将应用部署到 `city` 上下文路径，启动后可以通过以下 URL 访问它：\n\n[`localhost:8080/city/distance`](http://localhost:8080/city/distance)\n\
  \n**11-2. 将 Spring 与 Struts 1.x 集成**\n\n问题\n\n你希望在使用 Apache Struts 1.x 开发的 Web 应用中访问\
  \ Spring IoC 容器中声明的 Bean。\n\n解决方案\n\nStruts 应用可以通过注册 Servlet 监听器 `ContextLoaderListener`\
  \ 来加载 Spring 的应用上下文，并像在通用 Web 应用中一样从 Servlet 上下文中访问它。然而，Spring 提供了更好的、针对 Struts\
  \ 的特定解决方案来访问其应用上下文。\n\n\n\n首先，Spring 允许你通过在 Struts 配置文件中注册一个 Struts 插件来加载应用上下文。该应用上下文会自动将\
  \ Servlet 监听器加载的应用上下文作为其父上下文，从而能够引用父应用上下文中声明的 Bean。\n\n9799ch11.qxd 5/14/08 4:13\
  \ PM 第 401 页\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n**401**\n\n其次，Spring 提供了 `ActionSupport`\
  \ 类，它是 Action 基类的子类，其中包含一个便捷的 `getWebApplicationContext()` 方法，用于访问 Spring 的应用上下文。\n\
  \n最后，你的 Struts 动作可以通过依赖注入来注入 Spring Bean。前提条件是在 Spring 的应用上下文中声明它们，并让 Struts 从 Spring\
  \ 中查找它们。\n\n工作原理\n\n现在，让我们使用 Apache Struts 来实现一个用于查找城市距离的 Web 应用。首先，为你的 Web 应用创建以下目录结构。\n\
  \n**■注意** 对于使用 Struts 1.2 开发的 Web 应用，你需要将 `struts.jar`（位于 Spring 安装目录的 `lib/struts`\
  \ 目录下）、`commons-beanutils.jar`、`commons-digester.jar` 和 `commons-logging.jar`（位于\
  \ `lib/jakarta-commons` 目录下）复制到 `WEB-INF/lib` 目录。如果你希望使用 Spring 对 Struts 的支持，还需要复制\
  \ `spring-webmvc-struts.jar`（位于 `dist/modules` 目录下）。\n\ncity/\n\nWEB-INF/\n\nclasses/\n\
  \nlib/\n\ncommons-beanutils.jar\n\ncommons-digester.jar\n\ncommons-logging.jar\n\
  \nspring.jar\n\nspring-webmvc-struts.jar\n\nstruts.jar\n\njsp/\n\ndistance.jsp\n\
  \napplicationContext.xml\n\nstruts-config.xml\n\nweb.xml\n\n在 Struts 应用的 Web 部署描述符（即\
  \ `web.xml`）中，你需要注册 Struts Servlet `ActionServlet` 来处理 Web 请求。你可以将此 Servlet 映射到\
  \ URL 模式 `*.do`。\n\n[<web-app version=\"2.4\"](http://java.sun.com/xml/ns/j2ee)\n\
  \n[xsi:schemaLocation=\"http://java.sun.com/xml/ns/j2ee](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<servlet>\n\n<servlet-name>action</servlet-name>\n\n<servlet-class>\n\n9799ch11.qxd\
  \ 5/14/08 4:13 PM 第 402 页\n\n**402**\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n**org.apache.struts.action.ActionServlet**\n\
  \n</servlet-class>\n\n</servlet>\n\n<servlet-mapping>\n\n<servlet-name>action</servlet-name>\n\
  \n<url-pattern> ***.do**</url-pattern>\n\n</servlet-mapping>\n\n</web-app>\n\n**将\
  \ Spring 的应用上下文加载到 Struts 应用中**\n\n有两种方法可以将 Spring 的应用上下文加载到 Struts 应用中。第一种方法是在\
  \ `web.xml` 中注册 Servlet 监听器 `ContextLoaderListener`。默认情况下，此监听器会加载 `/WEB-INF/applicationContext.xml`\
  \ 作为 Spring 的 Bean 配置文件，因此你无需显式指定其位置。\n\n<web-app ...>\n\n**<listener>**\n\n**<listener-class>**\n\
  \n**org.springframework.web.context.ContextLoaderListener**\n\n**</listener-class>**\n\
  \n**</listener>**\n\n...\n\n</web-app>\n\n另一种方法是在 Struts 配置文件 `struts-config.xml`\
  \ 中注册 Struts 插件 `ContextLoaderPlugin`。默认情况下，此插件会使用在 `web.xml` 中注册的 `ActionServlet`\
  \ 实例名称，并以 `-servlet.xml` 作为后缀（本例中为 `action-servlet.xml`）来加载 Bean 配置文件。如果你希望加载其他\
  \ Bean 配置文件，可以在 `contextConfigLocation` 属性中指定其名称。\n\n<!DOCTYPE struts-config PUBLIC\n\
  \n\"-//Apache Software Foundation//DTD Struts Configuration 1.1//EN\"\n\n[\"http://jakarta.apache.org/struts/dtds/struts-config_1_1.dtd\"\
  >](http://jakarta.apache.org/struts/dtds/struts-config_1_1.dtd)\n\n<struts-config>\n\
  \n...\n\n**<plug-in className=\"org.springframework.web.struts.ContextLoaderPlugIn\"\
  >**\n\n**<set-property property=\"contextConfigLocation\"**\n\n**value=\"/WEB-INF/applicationContext.xml\"\
  \ />**\n\n**</plug-in>**\n\n</struts-config>\n\n\n\n如果两个配置同时存在，Struts 插件加载的 Spring\
  \ 应用上下文会自动引用 Servlet 监听器加载的应用上下文作为其父上下文。通常，业务服务应声明在 Servlet 监听器加载的应用上下文中，而 Web 相关组件则应分离到\
  \ Struts 插件加载的另一个应用上下文中。因此，我们暂时省略 Struts 插件的配置。\n\n9799ch11.qxd 5/14/08 4:13 PM\
  \ 第 403 页\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n**403**\n\n**在 Struts Action\
  \ 中访问 Spring 的应用上下文**\n\n当表单提交时，Struts 可以帮助你将 HTML 表单字段值绑定到表单 Bean 的属性上。首先，创建一个继承\
  \ ActionForm 的表单类，其中包含源城市和目标城市两个属性。\n\npackage com.apress.springrecipes.city.struts;\n\
  \nimport org.apache.struts.action.ActionForm;\n\npublic class DistanceForm extends\
  \ ActionForm {\n\nprivate String srcCity;\n\nprivate String destCity;\n\n// Getter\
  \ 和 Setter 方法\n\n...\n\n}\n\n然后，创建一个 JSP 文件，其中包含一个供用户输入源城市和目标城市的表单。你应该使用 Struts\
  \ 提供的标签库来定义此表单及其字段，以便这些字段能自动绑定到表单 Bean 的属性上。你可以将此 JSP 文件命名为 distance.jsp，并放在 WEB-INF/jsp\
  \ 目录下，以防止直接访问。\n\n<%@ [taglib prefix=\"html\" uri=\"http://struts.apache.org/tags-html\"\
  \ %>](http://struts.apache.org/tags-html)\n\n<html>\n\n<head>\n\n<title>城市距离</title>\n\
  \n</head>\n\n<body>\n\n<html:form method=\"POST\" action=\"/distance.do\">\n\n<table>\n\
  \n<tr>\n\n<td>源城市</td>\n<td> **<html:text property=\"srcCity\" />** </td>\n</tr>\n\
  \n<tr>\n\n<td>目标城市</td>\n<td> **<html:text property=\"destCity\" />** </td>\n</tr>\n\
  \n<tr>\n\n<td>距离</td>\n<td> **${distance}**</td>\n</tr>\n\n<tr>\n\n<td colspan=\"\
  2\"><input type=\"submit\" value=\"查找\" /></td>\n</tr>\n\n9799ch11.qxd 5/14/08 4:13\
  \ PM 第 404 页\n\n**404**\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n</table>\n\n</html:form>\n\
  \n</body>\n\n</html>\n\n在 Struts 中，每个 Web 请求都由一个继承 Action 类的 Action 处理。有时，你的 Struts\
  \ Action 需要访问 Spring Bean。你可以通过静态方法 WebApplicationContextUtils.getRequiredWebApplicationContext()\
  \ 来访问由 Servlet 监听器 ContextLoaderListener 加载的应用上下文。\n\n然而，在 Struts Action 中访问 Spring\
  \ 应用上下文有一种更好的方式：通过继承 ActionSupport 类。该类是 Action 的子类，它提供了一个便捷方法 getWebApplicationContext()，供你访问\
  \ Spring 的应用上下文。\n\n此方法首先尝试返回由 ContextLoaderPlugin 加载的应用上下文。如果该上下文不存在，则尝试返回其父上下文（即由\
  \ ContextLoaderListener 加载的应用上下文）。\n\npackage com.apress.springrecipes.city.struts;\n\
  \n...\n\nimport javax.servlet.http.HttpServletRequest;\n\nimport javax.servlet.http.HttpServletResponse;\n\
  \nimport org.apache.struts.action.ActionForm;\n\nimport org.apache.struts.action.ActionForward;\n\
  \nimport org.apache.struts.action.ActionMapping;\n\nimport org.springframework.web.struts.ActionSupport;\n\
  \npublic class DistanceAction extends **ActionSupport** {\n\npublic ActionForward\
  \ execute(ActionMapping mapping, ActionForm form,\n\nHttpServletRequest request,\
  \ HttpServletResponse response) {\n\nif (request.getMethod().equals(\"POST\")) {\n\
  \nDistanceForm distanceForm = (DistanceForm) form;\n\nString srcCity = distanceForm.getSrcCity();\n\
  \nString destCity = distanceForm.getDestCity();\n\nCityService cityService =\n\n\
  (CityService) **getWebApplicationContext()**.getBean(\"cityService\"); double distance\
  \ = cityService.findDistance(srcCity, destCity);\n\nrequest.setAttribute(\"distance\"\
  , distance);\n\n}\n\nreturn mapping.findForward(\"success\");\n\n}\n\n}\n\n\n\n\
  在 Struts 配置文件 `struts-config.xml` 中，你需要声明表单 Bean（form beans）以及应用程序中的操作（actions）及其映射。\n\
  \n9799ch11.qxd 5/14/08 4:13 PM 第 405 页\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n\
  **405**\n\n<struts-config>\n\n<form-beans>\n\n<form-bean name=\"distanceForm\"\n\
  \ntype=\"com.apress.springrecipes.city.struts.DistanceForm\" />\n\n</form-beans>\n\
  \n<action-mappings>\n\n<action path=\"/distance\"\n\ntype=\"com.apress.springrecipes.city.struts.DistanceAction\"\
  \n\nname=\"distanceForm\" validate=\"false\">\n\n<forward name=\"success\"\n\npath=\"\
