  )** BookingForm form,\n\n9799ch14.qxd 5/14/08 4:26 PM Page 542\n\n**542**\n\n第 14\
  \ 章 **■** Spring Portlet MVC 框架\n\nBindingResult result, SessionStatus status,\n\
  \nActionResponse response) {\n\nvalidator.validate(form, result);\n\nif (!result.hasErrors())\
  \ {\n\ntourService.processBooking(form);\n\nstatus.setComplete();\n\n**response.setRenderParameter(\"\
  form-submit\", \"true\");**\n\n}\n\n}\n\n}\n\n在 Portlet 表单控制器中，你必须使用一个请求参数（例如`form-submit`）来区分渲染请求是在表单提交之前还是之后发出的。当该表单控制器收到\
  \ Portlet 渲染请求要求显示表单时，`showForm()`方法将被调用，因为其返回类型不是`void`，所以它会处理渲染请求。在这种情况下，`form-submit`参数为`null`，因此你只需向用户渲染包含已初始化命令对象的表单视图。\n\
  \n当表单通过 Portlet 动作请求提交时，`processSubmit()`方法将被调用，因为其返回类型是`void`，所以它会处理动作请求。如果表单处理成功，你将在响应对象上调用`setRenderParameter()`方法，为下一次渲染请求设置`form-submit`请求参数。动作请求完成后，Portlet\
  \ 容器将要求该控制器处理一个新的渲染请求。此时，请求中应包含`form-submit`参数，因此`showForm()`方法将渲染成功视图。\n\n你必须通过`<context:component-scan>`元素启用组件扫描功能，以便\
