  \n}\n\n在上述 Excel 视图中，你首先在工作簿中创建一个工作表。在该工作表中，你在第一行显示此报告的标题。然后，你遍历预约列表，为每个预约创建一行。\n\
  \n由于你在 Web 应用程序上下文中配置了 `ResourceBundleViewResolver`，你可以在类路径根目录下的 `views.properties`\
  \ 中添加以下条目来定义此视图：excelSummary.(class)=**➥**\n\ncom.apress.springrecipes.court.web.view.ExcelReservationSummary\n\
  \n由于你在 Web 应用程序上下文中配置了 `ControllerClassNameHandlerMapping`，你可以通过以下 URL 访问此控制器。调用此控制器时，必须指定请求参数\
  \ `date` 和 `format`。\n\n[`localhost:8080/court/reservationSummary.htm?date=2008-01-14&format=excel`](http://localhost:8080/court/reservationSummary.htm?date=2008-01-14&format=excel)\n\
  \n**创建 PDF 视图**\n\n通过扩展 `AbstractPdfView` 类来创建 PDF 视图。在 `buildPdfDocument()` 方法中，你可以访问从控制器传递过来的模型，以及一个预先创建的\
