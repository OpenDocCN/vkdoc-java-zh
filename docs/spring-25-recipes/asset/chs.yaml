  \ EJB 方法的调用。\n\nEJB 代理还会将 `NamingException`、`CreateException` 和 `RemoteException`\
  \ 等异常转换为运行时异常，因此客户端代码无需处理它们。\n\n例如，如果在访问远程 EJB 组件时抛出 `RemoteException`，EJB 代理会将其转换为\
  \ Spring 的运行时异常 `RemoteAccessException`。\n\n工作原理\n\n假设你的邮局系统中有一个前台子系统，需要计算邮资。首先，让我们定义\
  \ `FrontDesk` 接口如下：\n\n```java\npackage com.apress.springrecipes.post;\n\npublic\
  \ interface FrontDesk {\n\n    public double calculatePostage(String country, double\
  \ weight);\n\n}\n```\n\n由于存在一个用于计算邮资的 EJB 2.x 远程无状态会话 Bean，你只需在前台子系统中访问它即可。以下是该\
  \ EJB 组件的远程接口和主接口：\n\n```java\npackage com.apress.springrecipes.post;\n\nimport\
  \ java.rmi.RemoteException;\n\nimport javax.ejb.EJBObject;\n\npublic interface PostageServiceRemote\
  \ extends EJBObject {\n\n    public double calculatePostage(String country, double\
  \ weight)\n            throws RemoteException;\n\n}\n```\n\n```java\npackage com.apress.springrecipes.post;\n\
  \nimport java.rmi.RemoteException;\n\n9799ch17.qxd 5/15/08 5:06 PM 第 633 页\n\n第\
