  **8-13. 小结**\n\n在本章中，你学习了事务管理对于确保数据完整性和一致性的重要性。没有事务管理，你的数据和资源可能会被破坏，并处于不一致的状态。\n\
  \nSpring 的核心事务管理抽象是 `PlatformTransactionManager`。它封装了一组与技术无关的方法，使你无需深入了解底层事务 API\
  \ 即可管理事务。Spring 为不同的事务管理 API 提供了几个内置的事务管理器实现。\n\n9799ch08.qxd 5/6/08 10:00 AM 第\
  \ 286 页\n\n**286**\n\n第 8 章 **■** SPRING 中的事务管理\n\nSpring 支持通过调用事务管理器上的 `commit()`\
  \ 和 `rollback()` 方法进行编程式事务管理。从概念上讲，这很像在 JDBC 连接上调用相同的方法，但 Spring 事务管理器中声明的方法是与技术无关的。\n\
  \n编程式事务管理的另一种选择是使用事务模板。你只需将操作封装在回调对象中，并将其传递给事务模板执行。这样，你的操作就无需考虑底层事务细节。\n\nSpring\
  \ 通过其 AOP 框架支持声明式事务管理。\n\n由于 Spring 的 AOP 用法从 1.x 版本到 2.x 版本发生了显著变化，因此也可以通过 AOP\
  \ 以不同方式声明事务。在 Spring 2.x 中，你可以简单地声明一个事务通知，并通过定义切入点（pointcut）和通知器（advisor）将其应用到你的\
  \ Bean 上。在经典的 Spring AOP 中，你必须使用 `TransactionInterceptor` 或 `TransactionProxyFactoryBean`\
  \ 创建事务代理。\n\n除了使用 AOP 设施声明事务之外，还有一种更方便的声明式事务管理方式。你只需将 `@Transactional` 注解应用于需要事务管理的方法，然后在\
  \ Bean 配置文件中启用 `<tx:annotation-driven>` 元素。Spring 2.5 提供了一个 AspectJ 切面，它可以为任何带有\
  \ `@Transactional` 的方法管理事务，即使这些方法是非公共的，或者属于在 Spring 外部创建的对象。你可以选择 AspectJ 的编译时或加载时织入来启用它。\n\
  \n最后，你可以为事务定义事务属性。Spring 总共支持五类事务属性。传播行为指定了当一个事务性方法被另一个方法调用时，事务应如何传播。隔离级别指定了当多个事务并发操作时，一个事务应如何与其他事务隔离。回滚规则指定了哪些类型的异常应导致回滚，哪些类型不应导致回滚。事务超时指定了事务在被强制回滚之前可以存活多长时间。只读属性指定事务将只读取数据而不更新数据。\n\
  \n在下一章中，你将学习 Spring 如何支持使用不同的对象/关系映射框架来实现数据访问服务。\n\n9799ch09.qxd 5/6/08 10:05 AM\
  \ 第 287 页\n\n第 9 章\n\nSpring ORM 支持\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n**在**本章中，你将学习如何将*对象/关系映射（ORM）*框架集成到你的 Spring 应用程序中。Spring 支持大多数流行的 ORM 框架，包括\
  \ Hibernate、JDO、TopLink、iBATIS 和 JPA。本章的重点将放在 Hibernate 和 Java 持久化 API（JPA）上。然而，Spring\
  \ 对这些 ORM 框架的支持是一致的，因此你可以轻松地将本章中的技术应用于其他 ORM 框架。\n\nORM 是一种将对象持久化到关系型数据库的现代技术。ORM\
  \ 框架根据你提供的映射元数据（例如类和表之间的映射、属性和列之间的映射等）来持久化你的对象。它在运行时生成用于对象持久化的 SQL 语句，因此你无需编写特定于数据库的\
  \ SQL 语句，除非你想利用特定于数据库的特性或提供你自己优化的 SQL 语句。因此，你的应用程序将与数据库无关，并且将来可以轻松地迁移到另一个数据库。与直接使用\
  \ JDBC 相比，ORM 框架可以显著减少应用程序的数据访问工作量。\n\n*Hibernate* 是 Java 社区中一个流行的开源高性能 ORM 框架。Hibernate\
  \ 支持大多数符合 JDBC 标准的数据库，并且可以使用特定的方言来访问特定的数据库。除了基本的 ORM 功能外，Hibernate 还支持更高级的功能，如缓存、级联和延迟加载。它还定义了一种称为\
  \ *HQL（Hibernate 查询语言）* 的查询语言，供你编写简单但功能强大的对象查询。\n\n*JPA* 定义了一组用于在 Java SE 和 Java\
  \ EE 平台中进行对象持久化的标准注解和 API。JPA 被定义为 JSR-220 中 EJB 3.0 规范的一部分。JPA 只是一组标准的 API，需要一个符合\
  \ JPA 规范的引擎来提供持久化服务。你可以将 JPA 比作 JDBC API，将 JPA 引擎比作 JDBC 驱动程序。Hibernate 可以通过一个名为\
  \ *Hibernate EntityManager* 的扩展模块配置为符合 JPA 规范的引擎。本章将主要演示以 Hibernate 作为底层引擎的 JPA。\n\
  \n在撰写本文时，Hibernate 的最新版本是 3.2。Spring 2.0 同时支持 Hibernate 2.x 和 3.x。对 Hibernate 2.x\
  \ 的支持由 `org.springframework.orm.hibernate` 包中的类和接口提供，而对 3.x 的支持则在 `org.springframework.orm.hibernate3`\
  \ 包中。在将类和接口导入到你的应用程序时，你必须小心。Spring 2.5 仅支持 Hibernate 3.1 或更高版本。这意味着 Hibernate 2.1\
  \ 和 Hibernate 3.0 将不再受支持。\n\n完成本章后，你将能够利用 Hibernate 和 JPA 在你的 Spring 应用程序中进行数据访问。你还将对\
  \ Spring 的数据访问模块有透彻的理解。\n\n**287**\n\n9799ch09.qxd 5/6/08 10:05 AM Page 288\n\n\
  **288**\n\n第 9 章 **■** S P R I N G O R M S U P P O RT\n\n**9-1. 直接使用 ORM 框架的问题**\n\
  \n假设你要为一个培训中心开发一个课程管理系统。你为此系统创建的第一个类是 Course。这个类被称为*实体类*或*持久化类*，因为它代表一个现实世界中的实体，并且其实例将被持久化到数据库中。请记住，对于每个将由\
  \ ORM 框架持久化的实体类，都需要一个无参的默认构造函数。\n\n```java\npackage com.apress.springrecipes.course;\n\
  \n...\n\npublic class Course {\n\n    private Long id;\n    private String title;\n\
  \    private Date beginDate;\n    private Date endDate;\n    private int fee;\n\n\
  \    // 构造函数、Getter 和 Setter\n    ...\n\n}\n```\n\n对于每个实体类，你必须定义一个标识符属性来唯一标识一个实体。最佳实践是定义一个自动生成的标识符，因为它没有业务含义，因此在任何情况下都不会被更改。此外，ORM\
  \ 框架将使用此标识符来确定实体的状态。如果标识符值为 null，则该实体将被视为一个新的、未保存的实体。当此实体被持久化时，将执行一条 insert SQL\
  \ 语句；否则将执行一条 update 语句。为了允许标识符为 null，你应该为标识符选择原始类型的包装类型，例如 `java.lang.Integer` 和\
  \ `java.lang.Long`。\n\n在你的课程管理系统中，你需要一个 DAO 接口来封装数据访问逻辑。让我们在 `CourseDao` 接口中定义以下操作：\n\
  \n```java\npackage com.apress.springrecipes.course;\n\n...\n\npublic interface CourseDao\
  \ {\n\n    public void store(Course course);\n    public void delete(Long courseId);\n\
  \    public Course findById(Long courseId);\n    public List<Course> findAll();\n\
  }\n```\n\n通常，在使用 ORM 持久化对象时，插入和更新操作被合并为一个操作（例如，store）。这是为了让 ORM 框架（而不是你）来决定一个对象应该被插入还是更新。\n\
  \n为了使 ORM 框架能够将你的对象持久化到数据库，它必须知道实体类的映射元数据。你必须以其支持的格式向其提供映射元数据。Hibernate 的原生格式是 XML。然而，由于每个\
  \ ORM 框架可能有自己的定义映射元数据的格式，JPA 定义了一组持久化注解，让你以标准格式定义映射元数据，这种格式更有可能在其他 ORM 框架中重用。\n\n\
  Hibernate 本身也支持使用 JPA 注解来定义映射元数据，因此，使用 Hibernate 和 JPA 映射和持久化对象基本上有三种不同的策略：\n\n\
  *   使用 Hibernate API 配合 Hibernate XML 映射来持久化对象\n*   使用 Hibernate API 配合 JPA 注解来持久化对象\n\
  *   使用 JPA 配合 JPA 注解来持久化对象\n\nHibernate、JPA 和其他 ORM 框架的核心编程元素与 JDBC 的相似。它们总结在表 9-1\
  \ 中。\n\n**表 9-1.** *不同数据访问策略的核心编程元素*\n| **概念** | **JDBC** | **Hibernate** | **JPA**\
  \ |\n| :--- | :--- | :--- | :--- |\n| 资源 | Connection | Session | EntityManager\
  \ |\n| 资源工厂 | DataSource | SessionFactory | EntityManagerFactory |\n| 异常 | SQLException\
  \ | HibernateException | PersistenceException |\n\n在 Hibernate 中，用于对象持久化的核心接口是 `Session`，其实例可以从\
  \ `SessionFactory` 实例获得。在 JPA 中，相应的接口是 `EntityManager`，其实例可以从 `EntityManagerFactory`\
  \ 实例获得。Hibernate 抛出的异常类型为 `HibernateException`，而 JPA 抛出的异常可能是 `PersistenceException`\
  \ 或其他 Java SE 异常，如 `IllegalArgumentException` 和 `IllegalStateException`。请注意，所有这些异常都是\
  \ `RuntimeException` 的子类，你不必强制捕获和处理它们。\n\n**使用 Hibernate API 配合 Hibernate XML 映射持久化对象**\n\
  \n要使用 Hibernate XML 映射来映射实体类，你可以为每个类提供一个单独的映射文件，或者为多个类提供一个大的文件。实际上，为了便于维护，你应该为每个类定义一个映射文件，将类名与\
  \ `.hbm.xml` 作为文件扩展名连接起来。中间扩展名 `hbm` 代表 Hibernate 元数据。\n\n`Course` 类的映射文件应命名为 `Course.hbm.xml`，并放在与实体类相同的包中。\n\
  \n```xml\n<!DOCTYPE hibernate-mapping\n    PUBLIC \"-//Hibernate/Hibernate Mapping\
  \ DTD 3.0//EN\"\n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  \ >\n<hibernate-mapping package=\"com.apress.springrecipes.course\">\n    <class\
  \ name=\"Course\" table=\"COURSE\">\n        <id name=\"id\" type=\"long\" column=\"\
  ID\">\n```\n\n\n\n<generator class=\"identity\" />\n\n</id>\n\n<property name=\"\
  title\" type=\"string\">\n\n9799ch09.qxd 5/6/08 10:05 AM 第 290 页\n\n**290**\n\n\
  第 9 章 **■** Spring ORM 支持\n\n<column name=\"TITLE\" length=\"100\" not-null=\"true\"\
  \ />\n\n</property>\n\n<property name=\"beginDate\" type=\"date\" column=\"BEGIN_DATE\"\
  \ />\n\n<property name=\"endDate\" type=\"date\" column=\"END_DATE\" />\n\n<property\
  \ name=\"fee\" type=\"int\" column=\"FEE\" />\n\n</class>\n\n</hibernate-mapping>\n\
  \n在映射文件中，你可以为该实体类指定表名，并为每个简单属性指定表列。你还可以指定列的详细信息，例如列长度、非空约束和唯一约束。此外，每个实体都必须定义一个标识符，该标识符可以自动生成或手动分配。在此示例中，标识符将使用表标识列生成。\n\
  \n每个使用 Hibernate 的应用程序都需要一个全局配置文件来配置属性，例如数据库设置（JDBC 连接属性或数据源的 JNDI 名称）、数据库方言、映射元数据的位置等。当使用\
  \ XML 映射文件定义映射元数据时，你必须指定 XML 文件的位置。默认情况下，Hibernate 会从类路径的根目录读取 `hibernate.cfg.xml`\
  \ 文件。中间的扩展名 `cfg` 代表配置。\n\n<!DOCTYPE hibernate-configuration PUBLIC\n\n\"-//Hibernate/Hibernate\
  \ Configuration DTD 3.0//EN\"\n\n[\"http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd](http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd)\"\
  >\n\n<hibernate-configuration>\n\n<session-factory>\n\n<property name=\"connection.driver_class\"\
  >\n\norg.apache.derby.jdbc.ClientDriver\n\n</property>\n\n<property name=\"connection.url\"\
  >\n\njdbc:derby://localhost:1527/course;create=true\n\n</property>\n\n<property\
  \ name=\"connection.username\">app</property>\n\n<property name=\"connection.password\"\
  >app</property>\n\n<property name=\"dialect\">org.hibernate.dialect.DerbyDialect</property>\n\
  \n<property name=\"show_sql\">true</property>\n\n<property name=\"hbm2ddl.auto\"\
  >update</property>\n\n<mapping resource=\"com/apress/springrecipes/course/Course.hbm.xml\"\
  \ />\n\n</session-factory>\n\n</hibernate-configuration>\n\n在持久化对象之前，你必须在数据库模式中创建表来存储对象数据。当使用像\
  \ Hibernate 这样的 ORM 框架时，你通常不需要自己设计表。如果将 `hbm2ddl.auto` 属性设置为 `update`，Hibernate\
  \ 可以帮助你更新数据库模式，并在必要时创建表。\n\n9799ch09.qxd 5/6/08 10:05 AM 第 291 页\n\n第 9 章 **■**\
  \ Spring ORM 支持\n\n**291**\n\n现在，让我们使用纯 Hibernate API 在 `hibernate` 子包中实现 DAO 接口。在调用\
  \ Hibernate API 进行对象持久化之前，你必须初始化一个 Hibernate 会话工厂（例如，在构造函数中）。\n\n**■注意** 要使用 Hibernate\
  \ 进行对象持久化，你必须在类路径中包含 `hibernate3.jar`（位于 Spring 安装目录的 `lib/hibernate` 目录中）、`antlr-2.7.6.jar`（位于\
  \ `lib/antlr`）、`asm-2.2.3.jar`（位于 `lib/asm`）、`cglib-nodep-2.1_3.jar`（位于 `lib/cglib`）、`dom4j-1.6.1.jar`（位于\
  \ `lib/dom4j`）、`ehcache-1.2.4.jar`（位于 `lib/ehcache`）、`jta.jar`（位于 `lib/j2ee`）、`commons-collections.jar`\
  \ 和 `commons-logging.jar`（位于 `lib/jakarta-commons`），以及 `log4j-1.2.14.jar`（位于 `lib/log4j`）。要使用\
  \ Apache Derby 作为数据库引擎，你还需要包含 `derbyclient.jar`（位于 Derby 安装目录的 `lib` 目录中）。\n\npackage\
  \ com.apress.springrecipes.course.hibernate;\n\n...\n\nimport org.hibernate.Query;\n\
  \nimport org.hibernate.Session;\n\nimport org.hibernate.SessionFactory;\n\nimport\
  \ org.hibernate.Transaction;\n\nimport org.hibernate.cfg.Configuration;\n\npublic\
  \ class HibernateCourseDao implements CourseDao {\n\nprivate SessionFactory sessionFactory;\n\
  \npublic HibernateCourseDao() {\n\nConfiguration configuration = new Configuration().configure();\n\
  \n\n\nsessionFactory = configuration.buildSessionFactory();\n\n}\n\npublic void\
  \ store(Course course) {\n\nSession session = sessionFactory.openSession();\n\n\
  Transaction tx = session.getTransaction();\n\ntry {\n\ntx.begin();\n\n**session.saveOrUpdate(course);**\n\
  \ntx.commit();\n\n} catch (RuntimeException e) {\n\ntx.rollback();\n\nthrow e;\n\
  \n} finally {\n\nsession.close();\n\n}\n\n}\n\n9799ch09.qxd 5/6/08 10:05 AM 第 292\
  \ 页\n\n**292**\n\n第 9 章 **■** S P R I N G O R M S U P P O RT\n\npublic void delete(Long\
  \ courseId) {\n\nSession session = sessionFactory.openSession();\n\nTransaction\
  \ tx = session.getTransaction();\n\ntry {\n\ntx.begin();\n\n**Course course = (Course)\
  \ session.get(Course.class, courseId);**\n\n**session.delete(course);**\n\ntx.commit();\n\
  \n} catch (RuntimeException e) {\n\ntx.rollback();\n\nthrow e;\n\n} finally {\n\n\
  session.close();\n\n}\n\n}\n\npublic Course findById(Long courseId) {\n\nSession\
  \ session = sessionFactory.openSession();\n\ntry {\n\n**return (Course) session.get(Course.class,\
  \ courseId);**\n\n} finally {\n\nsession.close();\n\n}\n\n}\n\npublic List<Course>\
  \ findAll() {\n\nSession session = sessionFactory.openSession();\n\ntry {\n\n**Query\
  \ query = session.createQuery(\"from Course\");**\n\n**return query.list();**\n\n\
  } finally {\n\nsession.close();\n\n}\n\n}\n\n}\n\n使用 Hibernate 的第一步是创建一个 Configuration\
  \ 对象，并让它加载 Hibernate 配置文件。默认情况下，当你调用 configure() 方法时，它会从类路径根目录加载 hibernate.cfg.xml。然后，你从这个\
  \ Configuration 对象构建一个 Hibernate 会话工厂。会话工厂的目的是生成会话，供你持久化对象。\n\n在前面的 DAO 方法中，你首先从会话工厂打开一个会话。对于任何涉及数据库更新的操作，例如\
  \ saveOrUpdate() 和 delete()，你必须在该会话上启动一个 Hibernate 事务。如果操作成功完成，则提交事务。否则，如果发生任何 RuntimeException，则回滚事务。对于只读操作，例如\
  \ get() 和 HQL 查询，则无需启动事务。最后，你必须记得关闭会话，以释放该会话持有的资源。\n\n9799ch09.qxd 5/6/08 10:05\
  \ AM 第 293 页\n\n第 9 章 **■** S P R I N G O R M S U P P O RT\n\n**293**\n\n你可以创建以下\
  \ Main 类来测试运行所有 DAO 方法。它还演示了一个实体的典型生命周期。\n\npackage com.apress.springrecipes.course;\n\
  \n...\n\npublic class Main {\n\npublic static void main(String[] args) {\n\nCourseDao\
  \ courseDao = new HibernateCourseDao();\n\nCourse course = new Course();\n\ncourse.setTitle(\"\
  Core Spring\");\n\ncourse.setBeginDate(new GregorianCalendar(2007, 8, 1).getTime());\n\
  \ncourse.setEndDate(new GregorianCalendar(2007, 9, 1).getTime());\n\ncourse.setFee(1000);\n\
  \ncourseDao.store(course);\n\nList<Course> courses = courseDao.findAll();\n\nLong\
  \ courseId = courses.get(0).getId();\n\ncourse = courseDao.findById(courseId);\n\
  \nSystem.out.println(\"课程标题: \" + course.getTitle());\n\nSystem.out.println(\"开始日期:\
  \ \" + course.getBeginDate());\n\nSystem.out.println(\"结束日期: \" + course.getEndDate());\n\
  \nSystem.out.println(\"费用: \" + course.getFee());\n\ncourseDao.delete(courseId);\n\
  \n}\n\n}\n\n使用带有 JPA 注解的 Hibernate API 持久化对象\n\nJPA 注解在 JSR-220 规范中已标准化，因此所有符合 JPA\
  \ 标准的 ORM 框架（包括 Hibernate）都支持它们。此外，使用注解可以更方便地在同一个源文件中编辑映射元数据。\n\n以下 Course 类演示了如何使用\
  \ JPA 注解来定义映射元数据。\n\n**■注意** 要在 Hibernate 中使用 JPA 注解，你必须在类路径中包含 persistence.jar（位于\
  \ Spring 安装目录的 lib/j2ee 目录中）、hibernate-annotations.jar 和 hibernate-commons-annotations.jar（位于\
  \ lib/hibernate 目录中）。\n\n9799ch09.qxd 5/6/08 10:05 AM 第 294 页\n\n**294**\n\n第 9\
  \ 章 **■** S P R I N G O R M S U P P O RT\n\npackage com.apress.springrecipes.course;\n\
  \n...\n\nimport javax.persistence.Column;\n\nimport javax.persistence.Entity;\n\n\
  import javax.persistence.GeneratedValue;\n\nimport javax.persistence.GenerationType;\n\
  \nimport javax.persistence.Id;\n\n\n\nimport javax.persistence.Table;\n\n**@Entity**\n\
  \n**@Table(name = \"COURSE\")**\n\npublic class Course {\n\n**@Id**\n\n**@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)**\n\n**@Column(name = \"ID\")**\n\nprivate Long id;\n\
  \n**@Column(name = \"TITLE\", length = 100, nullable = false)**\n\nprivate String\
  \ title;\n\n**@Column(name = \"BEGIN_DATE\")**\n\nprivate Date beginDate;\n\n**@Column(name\
  \ = \"END_DATE\")**\n\nprivate Date endDate;\n\n**@Column(name = \"FEE\")**\n\n\
  private int fee;\n\n// 构造方法、Getter 和 Setter\n\n...\n\n}\n\n每个实体类都必须使用 **@Entity**\
  \ 注解进行标注。你可以在此注解中为实体类指定一个表名。对于每个属性，你可以使用 **@Column** 注解指定列名和列的详细信息。每个实体类都必须有一个由\
  \ **@Id** 注解定义的标识符。你可以使用 **@GeneratedValue** 注解为标识符生成选择一种策略。此处，标识符将由表的标识列生成。\n\n\
  Hibernate 支持使用原生 XML 映射文件和 JPA 注解两种方式来定义映射元数据。对于 JPA 注解，你必须在 `hibernate.cfg.xml`\
  \ 中指定实体类的全限定名，以便 Hibernate 读取这些注解。\n\n<hibernate-configuration>\n\n<session-factory>\n\
  \n...\n\n<!-- 用于 Hibernate XML 映射 -->\n\n<!--\n\n9799ch09.qxd 5/6/08 10:05 AM Page\
  \ 295\n\n第 9 章 **■** Spring ORM 支持\n\n**295**\n\n<mapping resource=\"com/apress/springrecipes/course/Course.hbm.xml\"\
  \ />\n\n-->\n\n**<!-- 用于 JPA 注解 -->**\n\n**<mapping class=\"com.apress.springrecipes.course.Course\"\
  \ />**\n\n</session-factory>\n\n</hibernate-configuration>\n\n在 Hibernate DAO 实现中，你之前使用的\
  \ `Configuration` 类用于读取 XML 映射。如果你使用 JPA 注解为 Hibernate 定义映射元数据，则必须使用其子类 `AnnotationConfiguration`\
  \ 来代替。\n\npackage com.apress.springrecipes.course.hibernate;\n\n...\n\nimport org.hibernate.SessionFactory;\n\
  \nimport org.hibernate.cfg.AnnotationConfiguration;\n\npublic class HibernateCourseDao\
  \ implements CourseDao {\n\nprivate SessionFactory sessionFactory;\n\npublic HibernateCourseDao()\
  \ {\n\n// 用于 Hibernate XML 映射\n\n// Configuration configuration = new Configuration().configure();\n\
  \n**// 用于 JPA 注解**\n\nConfiguration configuration = new **AnnotationConfiguration()**.configure();\
  \ sessionFactory = configuration.buildSessionFactory();\n\n}\n\n...\n\n}\n\n使用 JPA\
  \ 持久化对象（以 Hibernate 作为引擎）\n\n除了持久化注解之外，JPA 还定义了一套用于对象持久化的编程接口。然而，JPA 本身并非持久化实现。你需要选择一个符合\
  \ JPA 规范的引擎来提供持久化服务。Hibernate 可以通过 Hibernate EntityManager 扩展模块来符合 JPA 规范。借助此扩展，Hibernate\
  \ 可以作为底层的 JPA 引擎来持久化对象。\n\n在 Java EE 环境中，你可以在 Java EE 容器中配置 JPA 引擎。但在 Java SE 应用程序中，你必须在本地设置引擎。JPA\
  \ 的配置通过位于类路径根目录下 `META-INF` 目录中的核心 XML 文件 `persistence.xml` 进行。\n\n在此文件中，你可以为底层引擎配置设置任何供应商特定的属性。\n\
  \n现在，让我们在类路径根目录的 `META-INF` 目录中创建 JPA 配置文件 `persistence.xml`。每个 JPA 配置文件包含一个或多个\
  \ `<persistence-unit>` 元素。\n\n一个*持久化单元*定义了一组持久化类以及它们应如何被持久化。每个\n\n9799ch09.qxd 5/6/08\
  \ 10:05 AM Page 296\n\n**296**\n\n第 9 章 **■** Spring ORM 支持\n\n持久化单元需要一个名称用于标识。此处，你为此持久化单元指定名称为\
  \ `course`。\n\n<persistence xmlns=\" [`java.sun.com/xml/ns/persistence\"`](http://java.sun.com/xml/ns/persistence)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \nxsi:schemaLocation=\" [`java.sun.com/xml/ns/persistence`](http://java.sun.com/xml/ns/persistence)\n\
  \n\n\n[`j`](http://www.w3.org/2001/XMLSchema-instance)[ava.sun.com/xml/ns/persistence/persistence_1_0.xsd\"\
  ](http://java.sun.com/xml/ns/persistencejava.sun.com/xml/ns/persistence/persistence_1_0.xsd)\n\
  \nversion=\"1.0\">\n\n<persistence-unit name=\"course\">\n\n<properties>\n\n<property\
  \ name=\"hibernate.ejb.cfgfile\" value=\"/hibernate.cfg.xml\" />\n\n</properties>\n\
  \n</persistence-unit>\n\n</persistence>\n\n在这个 JPA 配置文件中，你通过引用位于类路径根目录下的 Hibernate\
  \ 配置文件，将 Hibernate 配置为底层的 JPA 引擎。然而，由于 Hibernate EntityManager 会自动检测 XML 映射文件和 JPA\
  \ 注解作为映射元数据，你无需显式指定它们。否则，你将遇到 `org.hibernate.DuplicateMappingException` 异常。\n\n\
  <hibernate-configuration>\n\n<session-factory>\n\n...\n\n<!-- 无需指定映射文件和注解类 -->\n\
  \n<!--\n\n<mapping resource=\"com/apress/springrecipes/course/Course.hbm.xml\" />\n\
  \n<mapping class=\"com.apress.springrecipes.course.Course\" />\n\n-->\n\n</session-factory>\n\
  \n</hibernate-configuration>\n\n作为引用 Hibernate 配置文件的替代方案，你也可以将所有 Hibernate 配置集中到\
  \ `persistence.xml` 中。\n\n<persistence ...>\n\n<persistence-unit name=\"course\"\
  >\n\n<properties>\n\n<property name=\"hibernate.connection.driver_class\"\n\nvalue=\"\
  org.apache.derby.jdbc.ClientDriver\" />\n\n<property name=\"hibernate.connection.url\"\
  \n\nvalue=\"jdbc:derby://localhost:1527/course; create=true\" />\n\n<property name=\"\
  hibernate.connection.username\" value=\"app\" />\n\n<property name=\"hibernate.connection.password\"\
  \ value=\"app\" />\n\n<property name=\"hibernate.dialect\"\n\nvalue=\"org.hibernate.dialect.DerbyDialect\"\
  \ />\n\n<property name=\"hibernate.show_sql\" value=\"true\" />\n\n<property name=\"\
  hibernate.hbm2ddl.auto\" value=\"update\" />\n\n9799ch09.qxd 5/6/08 10:05 AM Page\
  \ 297\n\n第 9 章 **■** Spring ORM 支持\n\n**297**\n\n</properties>\n\n</persistence-unit>\n\
  \n</persistence>\n\n在 Java EE 环境中，Java EE 容器能够为你管理实体管理器，并将其直接注入到你的 EJB 组件中。但是，当你在\
  \ Java EE 容器之外使用 JPA 时（例如，在 Java SE 应用程序中），你必须自己创建和维护实体管理器。\n\n现在，让我们在 Java SE 应用程序中使用\
  \ JPA，在 `jpa` 子包中实现 `CourseDao` 接口。在调用 JPA 进行对象持久化之前，你必须初始化一个实体管理器工厂。实体管理器工厂的目的是为你生成实体管理器，以便持久化你的对象。\n\
  \n**■注意** 要使用 Hibernate 作为底层的 JPA 引擎，你必须在类路径中包含 `hibernate-entitymanager.jar` 和\
  \ `jboss-archive-browsing.jar`（位于 Spring 安装目录的 `lib/hibernate` 目录下）。由于 Hibernate\
  \ EntityManager 依赖于 Javassist（[`www.jboss.org/javassist`](http://www.jboss.org/javassist)），你还需要在类路径中包含\
  \ `javassist.jar`。如果你已经安装了 Hibernate，你应该能在 Hibernate 安装目录的 `lib` 目录下找到它。否则，你需要从其网站下载。\n\
  \npackage com.apress.springrecipes.course.jpa;\n\n...\n\nimport javax.persistence.EntityManager;\n\
  \nimport javax.persistence.EntityManagerFactory;\n\nimport javax.persistence.EntityTransaction;\n\
  \nimport javax.persistence.Persistence;\n\nimport javax.persistence.Query;\n\npublic\
  \ class JpaCourseDao implements CourseDao {\n\nprivate EntityManagerFactory entityManagerFactory;\n\
  \npublic JpaCourseDao() {\n\nentityManagerFactory = Persistence.createEntityManagerFactory(\"\
  course\");\n\n}\n\npublic void store(Course course) {\n\nEntityManager manager =\
  \ entityManagerFactory.createEntityManager();\n\nEntityTransaction tx = manager.getTransaction();\n\
  \ntry {\n\ntx.begin();\n\n**manager.merge(course);**\n\ntx.commit();\n\n} catch\
  \ (RuntimeException e) {\n\n9799ch09.qxd 5/6/08 10:05 AM Page 298\n\n**298**\n\n\
  第 9 章 **■** Spring ORM 支持\n\ntx.rollback();\n\nthrow e;\n\n} finally {\n\nmanager.close();\n\
  \n}\n\n}\n\npublic void delete(Long courseId) {\n\n\n\nEntityManager manager = entityManagerFactory.createEntityManager();\n\
  \nEntityTransaction tx = manager.getTransaction();\n\ntry {\n\ntx.begin();\n\n**Course\
  \ course = manager.find(Course.class, courseId);**\n\n**manager.remove(course);**\n\
  \ntx.commit();\n\n} catch (RuntimeException e) {\n\ntx.rollback();\n\nthrow e;\n\
  \n} finally {\n\nmanager.close();\n\n}\n\n}\n\npublic Course findById(Long courseId)\
  \ {\n\nEntityManager manager = entityManagerFactory.createEntityManager();\n\ntry\
  \ {\n\n**return manager.find(Course.class, courseId);**\n\n} finally {\n\nmanager.close();\n\
  \n}\n\n}\n\npublic List<Course> findAll() {\n\nEntityManager manager = entityManagerFactory.createEntityManager();\n\
  \ntry {\n\n**Query query = manager.createQuery(**\n\n**\"select course from Course\
  \ course\");**\n\n**return query.getResultList();**\n\n} finally {\n\nmanager.close();\n\
  \n}\n\n}\n\n}\n\n实体管理器工厂由 `javax.persistence.Persistence` 类的静态方法 `createEntityManagerFactory()`\
  \ 构建。你必须为实体管理器工厂传入在 `persistence.xml` 中定义的持久化单元名称。\n\n9799ch09.qxd 5/6/08 10:05\
  \ AM Page 299\n\n第 9 章 **■** S P R I N G O R M 支 持\n\n**299**\n\n在前面的 DAO 方法中，你首先从实体管理器工厂创建一个实体管理器。对于任何涉及数据库更新的操作，例如\
  \ `merge()` 和 `remove()`，你必须在实体管理器上启动一个 JPA 事务。对于只读操作，例如 `find()` 和 JPA 查询，则无需启动事务。最后，你必须关闭实体管理器以释放资源。\n\
  \n你可以使用类似的 `Main` 类来测试这个 DAO，但这次你需要实例化 JPA DAO 的实现。\n\npackage com.apress.springrecipes.course;\n\
  \n...\n\npublic class Main {\n\npublic static void main(String[] args) {\n\nCourseDao\
  \ courseDao = new JpaCourseDao();\n\n...\n\n}\n\n}\n\n在前面的 Hibernate 和 JPA 的 DAO\
  \ 实现中，每个 DAO 方法只有一两行代码不同。其余行都是你必须重复编写的样板式常规任务。此外，每个 ORM 框架都有自己用于本地事务管理的 API。\n\n\
  **9-2. 在 Spring 中配置 ORM 资源工厂**\n\n问题\n\n当单独使用 ORM 框架时，你必须使用其 API 配置资源工厂。对于 Hibernate\
  \ 和 JPA，你必须通过原生的 Hibernate API 和 JPA 来构建会话工厂和实体管理器工厂。这样一来，你只能自行管理会话工厂和实体管理器工厂。此外，你的应用程序无法利用\
  \ Spring 提供的数据访问设施。\n\n解决方案\n\nSpring 提供了几个工厂 bean，让你可以在 IoC 容器中创建一个 Hibernate 会话工厂或\
  \ JPA 实体管理器工厂作为单例 bean。这些工厂可以通过依赖注入在多个 bean 之间共享。此外，这允许会话工厂和实体管理器工厂与 Spring 的其他数据访问设施（如数据源和事务管理器）集成。\n\
  \n工作原理\n\n**在 Spring 中配置 Hibernate 会话工厂**\n\n首先，让我们修改 `HibernateCourseDao`，使其通过依赖注入接受一个会话工厂，而不是在构造函数中直接使用原生的\
  \ Hibernate API 创建它。\n\n9799ch09.qxd 5/6/08 10:05 AM Page 300\n\n**300**\n\n第 9\
  \ 章 **■** S P R I N G O R M 支 持\n\npackage com.apress.springrecipes.course.hibernate;\n\
  \n...\n\nimport org.hibernate.SessionFactory;\n\npublic class HibernateCourseDao\
  \ implements CourseDao {\n\nprivate SessionFactory sessionFactory;\n\npublic void\
  \ setSessionFactory(SessionFactory sessionFactory) {\n\nthis.sessionFactory = sessionFactory;\n\
  \n}\n\n...\n\n}\n\n现在让我们看看如何在 Spring 中声明一个使用 XML 映射文件的会话工厂。为此，你需要在 `hibernate.cfg.xml`\
  \ 中再次启用 XML 映射文件定义。\n\n<hibernate-configuration>\n\n<session-factory>\n\n...\n\n\
  **<!-- 用于 Hibernate XML 映射 -->**\n\n**<mapping resource=\"com/apress/springrecipes/course/Course.hbm.xml\"\
  \ />**\n\n</session-factory>\n\n</hibernate-configuration>\n\n\n\n随后，你需要创建一个用于将\
  \ Hibernate 作为 ORM 框架的 Bean 配置文件（例如，位于类路径根目录下的 `beans-hibernate.xml`）。你可以使用工厂 Bean\
  \ `LocalSessionFactoryBean` 来声明一个使用 XML 映射文件的会话工厂。你也可以在 Spring 的管理下声明一个 `HibernateCourseDao`\
  \ 实例。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n<bean id=\"sessionFactory\"\n\nclass=\"org.springframework.orm.hibernate3.\
  \ **LocalSessionFactoryBean**\">\n\n<property name=\"configLocation\" value=\"classpath:hibernate.cfg.xml\"\
  \ />\n\n</bean>\n\n<bean id=\"courseDao\"\n\nclass=\"com.apress.springrecipes.course.hibernate.HibernateCourseDao\"\
  >\n\n<property name=\"sessionFactory\" ref=\"sessionFactory\" />\n\n</bean>\n\n\
  </beans>\n\n请注意，你可以为此工厂 Bean 指定 `configLocation` 属性来加载 Hibernate 配置文件。该属性的类型是 `Resource`，但你可以为其赋予一个字符串值。内置的属性编辑器\
  \ `ResourceEditor` 会将其转换为 `Resource` 对象。\n\n上述工厂 Bean 从类路径的根目录加载配置文件。\n\n9799ch09.qxd\
  \ 5/6/08 10:05 AM Page 301\n\n第 9 章 **■** Spring 的 ORM 支持\n\n**301**\n\n现在，你可以修改\
  \ `Main` 类，从 Spring IoC 容器中获取 `HibernateCourseDao` 实例。\n\npackage com.apress.springrecipes.course;\n\
  \n...\n\nimport org.springframework.context.ApplicationContext;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class Main {\n\npublic static void main(String[] args) {\n\nApplicationContext\
  \ context =\n\nnew ClassPathXmlApplicationContext(\" **beans-hibernate.xml**\");\
  \ CourseDao courseDao = (CourseDao) context.getBean(\"courseDao\");\n\n...\n\n}\n\
  \n}\n\n上述工厂 Bean 通过加载 Hibernate 配置文件来创建会话工厂，该配置文件包含了数据库设置（可以是 JDBC 连接属性，也可以是数据源的\
  \ JNDI 名称）。现在，假设你在 Spring IoC 容器中定义了一个数据源。如果你想为你的会话工厂使用这个数据源，可以将其注入到 `LocalSessionFactoryBean`\
  \ 的 `dataSource` 属性中。在此属性中指定的数据源将覆盖 Hibernate 配置文件中的数据库设置。\n\n<beans ...>\n\n...\n\
  \n<bean id=\"dataSource\"\n\nclass=\"org.springframework.jdbc.datasource.DriverManagerDataSource\"\
  >\n\n<property name=\"driverClassName\"\n\nvalue=\"org.apache.derby.jdbc.ClientDriver\"\
  \ />\n\n<property name=\"url\"\n\nvalue=\"jdbc:derby://localhost:1527/course; create=true\"\
  \ />\n\n<property name=\"username\" value=\"app\" />\n\n<property name=\"password\"\
  \ value=\"app\" />\n\n</bean>\n\n<bean id=\"sessionFactory\"\n\nclass=\"org.springframework.orm.hibernate3.LocalSessionFactoryBean\"\
  >\n\n**<property name=\"dataSource\" ref=\"dataSource\" />**\n\n<property name=\"\
  configLocation\" value=\"classpath:hibernate.cfg.xml\" />\n\n</bean>\n\n</beans>\n\
  \n或者，你甚至可以忽略 Hibernate 配置文件，将所有配置合并到 `LocalSessionFactoryBean` 中。例如，你可以在 `mappingResources`\
  \ 属性中指定 XML 映射文件的位置，并在 `hibernateProperties` 属性中指定其他 Hibernate 属性，例如数据库方言。\n\n9799ch09.qxd\
  \ 5/6/08 10:05 AM Page 302\n\n**302**\n\n第 9 章 **■** Spring 的 ORM 支持\n\n<bean id=\"\
  sessionFactory\"\n\nclass=\"org.springframework.orm.hibernate3.LocalSessionFactoryBean\"\
  >\n\n<property name=\"dataSource\" ref=\"dataSource\" />\n\n<property name=\" **mappingResources**\"\
  >\n\n<list>\n\n<value>com/apress/springrecipes/course/Course.hbm.xml</value>\n\n\
  </list>\n\n</property>\n\n<property name=\" **hibernateProperties**\">\n\n<props>\n\
  \n\n\n<prop key=\"hibernate.dialect\">org.hibernate.dialect.DerbyDialect</prop>\n\
  \n<prop key=\"hibernate.show_sql\">true</prop>\n\n<prop key=\"hibernate.hbm2ddl.auto\"\
  >update</prop>\n\n</props>\n\n</property>\n\n</bean>\n\n`mappingResources`属性的类型是`String[]`，因此你可以指定类路径中的一组映射文件。`LocalSessionFactoryBean`还允许你利用\
  \ Spring 的资源加载支持，从各种位置加载映射文件。你可以在`mappingLocations`属性中指定映射文件的资源路径，该属性的类型是`Resource[]`。\n\
  \n<bean id=\"sessionFactory\"\n\nclass=\"org.springframework.orm.hibernate3.LocalSessionFactoryBean\"\
  >\n\n...\n\n<property name=\" **mappingLocations**\">\n\n<list>\n\n<value>classpath:com/apress/springrecipes/course/Course.hbm.xml</value>\n\
  \n</list>\n\n</property>\n\n...\n\n</bean>\n\n借助 Spring 的资源加载支持，你还可以在资源路径中使用通配符来匹配多个映射文件，这样每次添加新实体类时就无需配置它们的位置。Spring\
  \ 预注册的`ResourceArrayPropertyEditor`会将此路径转换为`Resource`数组。\n\n<bean id=\"sessionFactory\"\
  \n\nclass=\"org.springframework.orm.hibernate3.LocalSessionFactoryBean\">\n\n...\n\
  \n<property name=\" **mappingLocations**\"\n\nvalue=\"classpath:com/apress/springrecipes/course/*.hbm.xml\"\
  \ />\n\n...\n\n</bean>\n\n9799ch09.qxd 5/6/08 10:05 AM Page 303\n\n第 9 章 **■** Spring\
  \ ORM 支持\n\n**303**\n\n如果你的映射元数据是通过 JPA 注解提供的，则必须改用`AnnotationSessionFactoryBean`。你需要在`AnnotationSessionFactoryBean`的`annotatedClasses`属性中指定持久化类。\n\
  \n<bean id=\"sessionFactory\" class=\"org.springframework.orm.hibernate3\\. **➥**\n\
  \n**annotation.AnnotationSessionFactoryBean**\">\n\n<property name=\"dataSource\"\
  \ ref=\"dataSource\" />\n\n<property name=\" **annotatedClasses**\">\n\n<list>\n\
  \n<value>com.apress.springrecipes.course.Course</value>\n\n</list>\n\n</property>\n\
  \n<property name=\"hibernateProperties\">\n\n<props>\n\n<prop key=\"hibernate.dialect\"\
  >org.hibernate.dialect.DerbyDialect</prop>\n\n<prop key=\"hibernate.show_sql\">true</prop>\n\
  \n<prop key=\"hibernate.hbm2ddl.auto\">update</prop>\n\n</props>\n\n</property>\n\
  \n</bean>\n\n现在你可以删除 Hibernate 配置文件（即`hibernate.cfg.xml`），因为其配置已迁移到 Spring 中。\n\n\
  **在 Spring 中配置 JPA 实体管理器工厂**\n\n首先，让我们修改`JpaCourseDao`，使其通过依赖注入接受实体管理器工厂，而不是在构造函数中直接创建它。\n\
  \npackage com.apress.springrecipes.course.jpa;\n\n...\n\nimport javax.persistence.EntityManagerFactory;\n\
  \npublic class JpaCourseDao implements CourseDao {\n\nprivate EntityManagerFactory\
  \ entityManagerFactory;\n\npublic void setEntityManagerFactory(\n\nEntityManagerFactory\
  \ entityManagerFactory) {\n\nthis.entityManagerFactory = entityManagerFactory;\n\
  \n}\n\n...\n\n}\n\nJPA 规范定义了在 Java SE 和 Java EE 环境中应如何获取实体管理器工厂。在 Java SE 环境中，通过调用`Persistence`类的`createEntityManagerFactory()`静态方法来手动创建实体管理器工厂。\n\
  \n9799ch09.qxd 5/6/08 10:05 AM Page 304\n\n**304**\n\n第 9 章 **■** Spring ORM 支持\n\
  \n现在让我们创建一个用于 JPA 的 Bean 配置文件（例如，类路径根目录下的`beans-jpa.xml`）。Spring 提供了一个工厂 Bean `LocalEntityManagerFactoryBean`，用于在\
  \ IoC 容器中创建实体管理器工厂。你必须指定 JPA 配置文件中定义的持久化单元名称。你还可以在 Spring 管理下声明一个`JpaCourseDao`实例。\n\
  \n<beans xmlns=\" [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n\n\n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n<bean id=\"entityManagerFactory\"\n\nclass=\"org.springframework.orm.jpa.\
  \ **LocalEntityManagerFactoryBean**\">\n\n<property name=\"persistenceUnitName\"\
  \ value=\"course\" />\n\n</bean>\n\n<bean id=\"courseDao\"\n\nclass=\"com.apress.springrecipes.course.jpa.JpaCourseDao\"\
  >\n\n<property name=\"entityManagerFactory\" ref=\"entityManagerFactory\" />\n\n\
  </bean>\n\n</beans>\n\n现在，你可以通过从 Spring IoC 容器中获取 `JpaCourseDao` 实例，并使用 `Main` 类对其进行测试。\n\
  \npackage com.apress.springrecipes.course;\n\n...\n\nimport org.springframework.context.ApplicationContext;\n\
  \nimport org.springframework.context.support.ClassPathXmlApplicationContext; public\
  \ class Main {\n\npublic static void main(String[] args) {\n\nApplicationContext\
  \ context =\n\nnew ClassPathXmlApplicationContext(\" **beans-jpa.xml**\");\n\nCourseDao\
  \ courseDao = (CourseDao) context.getBean(\"courseDao\");\n\n...\n\n}\n\n}\n\n在\
  \ Java EE 环境中，你可以通过 JNDI 从 Java EE 容器中查找实体管理器工厂。在 Spring 2.x 中，你可以使用 `<jee:jndi-lookup>`\
  \ 元素执行 JNDI 查找。\n\n<jee:jndi-lookup id=\"entityManagerFactory\" jndi-name=\"jpa/coursePU\"\
  \ />\n\n9799ch09.qxd 5/6/08 10:05 AM Page 305\n\n第 9 章 **■** Spring ORM 支持\n\n**305**\n\
  \n`LocalEntityManagerFactoryBean` 通过加载 JPA 配置文件（即 `persistence.xml`）来创建实体管理器工厂。Spring\
  \ 支持通过另一个工厂 bean `LocalContainerEntityManagerFactoryBean` 以更灵活的方式创建实体管理器工厂。它允许你覆盖\
  \ JPA 配置文件中的某些配置，例如数据源和数据库方言。因此，你可以利用 Spring 的数据访问设施来配置实体管理器工厂。\n\n<beans ...>\n\
  \n...\n\n<bean id=\"dataSource\"\n\nclass=\"org.springframework.jdbc.datasource.DriverManagerDataSource\"\
  >\n\n<property name=\"driverClassName\"\n\nvalue=\"org.apache.derby.jdbc.ClientDriver\"\
  \ />\n\n<property name=\"url\"\n\nvalue=\"jdbc:derby://localhost:1527/course; create=true\"\
  \ />\n\n<property name=\"username\" value=\"app\" />\n\n<property name=\"password\"\
  \ value=\"app\" />\n\n</bean>\n\n<bean id=\"entityManagerFactory\" class=\"org.springframework.orm.jpa.\
  \ **➥**\n\n**LocalContainerEntityManagerFactoryBean**\">\n\n<property name=\"persistenceUnitName\"\
  \ value=\"course\" />\n\n**<property name=\"dataSource\" ref=\"dataSource\" />**\n\
  \n<property name=\"jpaVendorAdapter\">\n\n<bean class=\"org.springframework.orm.jpa.vendor.\
  \ **➥**\n\nHibernateJpaVendorAdapter\">\n\n<property name=\"databasePlatform\"\n\
  \nvalue=\"org.hibernate.dialect.DerbyDialect\" />\n\n<property name=\"showSql\"\
  \ value=\"true\" />\n\n<property name=\"generateDdl\" value=\"true\" />\n\n</bean>\n\
  \n</property>\n\n</bean>\n\n</beans>\n\n在上述 bean 配置中，你将一个数据源注入到这个实体管理器工厂。它将覆盖 JPA\
  \ 配置文件中的数据库设置。你可以为 `LocalContainerEntityManagerFactoryBean` 设置一个 JPA 供应商适配器，以指定\
  \ JPA 引擎特定的属性。当使用 Hibernate 作为底层 JPA 引擎时，你应该选择 `HibernateJpaVendorAdapter`。该适配器不支持的其他属性可以在\
  \ `jpaProperties` 属性中指定。\n\n现在，你的 JPA 配置文件（即 `persistence.xml`）可以简化为如下形式，因为其配置已迁移到\
  \ Spring：\n\n<persistence ...>\n\n<persistence-unit name=\"course\" />\n\n</persistence>\n\
  \n9799ch09.qxd 5/6/08 10:05 AM Page 306\n\n**306**\n\n第 9 章 **■** Spring ORM 支持\n\
  \n**9-3\\. 使用 Spring 的 ORM 模板持久化对象**\n\n问题\n\n当单独使用 ORM 框架时，你必须在每个 DAO 操作中重复某些常规任务。例如，在使用\
  \ Hibernate 或 JPA 实现的 DAO 操作中，你必须使用原生 API 打开和关闭会话或实体管理器，并开始、提交和回滚事务。\n\n解决方案\n\n\
  \n\nSpring 简化 ORM 框架使用的方式与 JDBC 相同——通过定义模板类和 DAO 支持类。此外，Spring 还在不同的事务管理 API 之上定义了一个抽象层。对于不同的\
  \ ORM 框架，你只需选择相应的事务管理器实现，然后就能以类似的方式为它们管理事务。\n\n在 Spring 的数据访问模块中，对不同数据访问策略的支持是一致的。表\
  \ 9-2 比较了针对 JDBC、Hibernate 和 JPA 的支持类。\n\n**表 9-2.** *Spring 对不同数据访问策略的支持类* **支持类**\n\
  \n**JDBC**\n\n**Hibernate**\n\n**JPA**\n\n模板类\n\nJdbcTemplate\n\nHibernateTemplate\n\
  \nJpaTemplate\n\nDAO 支持类\n\nJdbcDaoSupport\n\nHibernateDaoSupport\n\nJpaDaoSupport\n\
  \n事务管理器\n\nDataSourceTransactionManager\n\nHibernateTransactionManager\n\nJpaTransactionManager\n\
  \nSpring 定义了 `HibernateTemplate` 和 `JpaTemplate` 类，为不同类型的 Hibernate 和 JPA 操作提供模板方法，以最大限度地减少使用它们所需的工作量。`HibernateTemplate`\
  \ 和 `JpaTemplate` 中的模板方法确保 Hibernate 会话和 JPA 实体管理器能够正确打开和关闭。它们还会让原生的 Hibernate 和\
  \ JPA 事务参与到 Spring 管理的事务中。因此，你能够为你的 Hibernate 和 JPA DAO 声明式地管理事务，而无需编写任何样板事务代码。\n\
  \n工作原理\n\n**使用 Hibernate 模板和 JPA 模板**\n\n首先，借助 Spring 的 `HibernateTemplate`，`HibernateCourseDao`\
  \ 类可以简化为如下形式：\n\n```java\npackage com.apress.springrecipes.course.hibernate;\n\n\
  ...\n\nimport org.springframework.orm.hibernate3.HibernateTemplate;\n\nimport org.springframework.transaction.annotation.Transactional;\n\
  \npublic class HibernateCourseDao implements CourseDao {\n\n    private HibernateTemplate\
  \ hibernateTemplate;\n\n    public void setHibernateTemplate(HibernateTemplate hibernateTemplate)\
  \ {\n        this.hibernateTemplate = hibernateTemplate;\n    }\n\n    @Transactional\n\
  \    public void store(Course course) {\n        hibernateTemplate.saveOrUpdate(course);\n\
  \    }\n\n    @Transactional\n    public void delete(Long courseId) {\n        Course\
  \ course = (Course) hibernateTemplate.get(Course.class, courseId);\n        hibernateTemplate.delete(course);\n\
  \    }\n\n    @Transactional(readOnly = true)\n    public Course findById(Long courseId)\
  \ {\n        return (Course) hibernateTemplate.get(Course.class, courseId);\n  \
  \  }\n\n    @Transactional(readOnly = true)\n    public List<Course> findAll() {\n\
  \        return hibernateTemplate.find(\"from Course\");\n    }\n}\n```\n\n在这个 DAO\
  \ 实现中，你使用 `@Transactional` 注解将所有 DAO 方法声明为事务性的。在这些方法中，`findById()` 和 `findAll()`\
  \ 是只读的。`HibernateTemplate` 中的模板方法负责管理会话和事务。如果一个事务性 DAO 方法中包含多个 Hibernate 操作，模板方法将确保它们在同一个会话和事务中运行。\n\
  \n因此，你无需再处理用于会话和事务管理的 Hibernate API。\n\n`HibernateTemplate` 类是线程安全的，所以你可以在 Hibernate\
  \ 的 Bean 配置文件（即 `beans-hibernate.xml`）中声明它的单个实例，并将该实例注入到所有 Hibernate DAO 中。`HibernateTemplate`\
  \ 实例需要设置 `sessionFactory` 属性。你可以通过 setter 方法或构造函数参数来注入此属性。\n\n```xml\n<beans xmlns=\"\
  http://www.springframework.org/schema/beans\"\n       xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n       xmlns:tx=\"http://www.springframework.org/schema/tx\"\n       xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n                           http://www.springframework.org/schema/tx\"\
  >\n```\n\n\n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/tx)\n\
  \n[**http://www.springframework.org/schema/tx**](http://www.springframework.org/schema/tx)\n\
  \n9799ch09.qxd 5/6/08 10:05 AM 第 308 页\n\n**308**\n\n第 9 章 **■** Spring ORM 支持\n\
  \n[**http://www.springframework.org/schema/tx/spring-tx-2.5.xsd**](http://www.springframework.org/schema/tx/spring-tx-2.5.xsd)**\"\
  >**\n\n...\n\n<tx:annotation-driven />\n\n<bean id=\"transactionManager\"\n\nclass=\"\
  org.springframework.orm.hibernate3.HibernateTransactionManager\">\n\n<property name=\"\
  sessionFactory\" ref=\"sessionFactory\" />\n\n</bean>\n\n<bean id=\"hibernateTemplate\"\
  \n\nclass=\"org.springframework.orm.hibernate3.HibernateTemplate\">\n\n<property\
  \ name=\"sessionFactory\" ref=\"sessionFactory\" />\n\n</bean>\n\n<bean name=\"\
