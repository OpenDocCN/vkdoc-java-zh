  \ Spring 支持创建 EJB 2.x 组件**\n\n如您所见，即使不需要，您的 EJB 实现类也必须实现所有 EJB 生命周期方法。实际上，它可以继承\
  \ Spring 的 EJB 支持类，从而获得默认实现的生命周期方法。无状态会话 Bean 的支持类是`AbstractStatelessSessionBean`。\n\
  \n**■注意** 要在 EJB 实现类中使用 Spring 的 EJB 支持，您需要包含`spring.jar`（位于 Spring 安装目录的`dist`目录中）和`commons-logging.jar`（位于`lib/`目录中）。\n\
  \n\n\n将 `jakarta-commons` 添加到 EJB 容器的类路径中。对于 OpenEJB，你可以将这些 JAR 文件复制到 OpenEJB 主目录的\
  \ lib 目录下。如果你的 OpenEJB 容器正在运行，则需要重启它。\n\n```java\npackage com.apress.springrecipes.post;\n\
