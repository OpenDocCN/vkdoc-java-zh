  \nproductCreator.setProducts(...);\n\nProduct aaa = productCreator.createProduct(\"\
  aaa\");\n\nProduct cdrw = productCreator.createProduct(\"cdrw\");\n\n\n\n9799ch04.qxd\
  \ 4/10/08 10:53 AM Page 100\n\n**100**\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n**4-4.\
  \ 使用 Spring 工厂 Bean 创建 Bean**\n\n问题\n\n你希望使用 Spring 的工厂 Bean 在 Spring IoC 容器中创建一个\
  \ Bean。*工厂 Bean* 是一种在 IoC 容器内作为工厂来创建其他 Bean 的 Bean。\n\n从概念上讲，工厂 Bean 与工厂方法非常相似，但它是一个\
  \ Spring 特有的 Bean，可以在 Bean 构造过程中被 Spring IoC 容器识别。\n\n解决方案\n\n工厂 Bean 的基本要求是实现 FactoryBean\
  \ 接口。为了方便起见，Spring 提供了一个抽象模板类 AbstractFactoryBean 供你继承。工厂 Bean 主要用于实现框架设施。以下是一些示例：\n\
  \n• 从 JNDI 查找对象（如数据源）时，可以使用 JndiObjectFactoryBean。\n\n• 使用经典 Spring AOP 为 Bean 创建代理时，可以使用\
  \ ProxyFactoryBean。\n\n• 在 IoC 容器中创建 Hibernate 会话工厂时，可以使用 LocalSessionFactoryBean。\n\
  \n然而，作为框架使用者，你很少需要编写自定义工厂 Bean，因为它们是与框架相关的，无法在 Spring IoC 容器范围之外使用。\n\n实际上，你总是可以为工厂\
  \ Bean 实现一个等效的工厂方法。\n\n工作原理\n\n尽管你很少需要编写自定义工厂 Bean，但通过一个示例可以更好地理解其内部机制。例如，你可以编写一个工厂\
  \ Bean，用于创建应用了折扣价格的产品。它接受一个产品属性和一个折扣属性，将折扣应用于产品，并将其作为新 Bean 返回。\n\npackage com.apress.springrecipes.shop;\n\
  \nimport org.springframework.beans.factory.config.AbstractFactoryBean;\n\npublic\
  \ class DiscountFactoryBean extends AbstractFactoryBean {\n\nprivate Product product;\n\
  \nprivate double discount;\n\npublic void setProduct(Product product) {\n\nthis.product\
  \ = product;\n\n}\n\n9799ch04.qxd 4/10/08 10:53 AM Page 101\n\n第 4 章 **■** 高级 Spring\
  \ IoC 容器\n\n**101**\n\npublic void setDiscount(double discount) {\n\nthis.discount\
  \ = discount;\n\n}\n\npublic Class getObjectType() {\n\nreturn product.getClass();\n\
  \n}\n\nprotected Object createInstance() throws Exception {\n\nproduct.setPrice(product.getPrice()\
  \ * (1 - discount));\n\nreturn product;\n\n}\n\n}\n\n通过继承 AbstractFactoryBean 类，你的工厂\
  \ Bean 只需重写 createInstance() 方法来创建目标 Bean 实例。此外，你还需要在 getObjectType() 方法中返回目标 Bean\
  \ 的类型，以便自动装配功能正常工作。\n\n接下来，你可以使用 DiscountFactoryBean 声明产品实例。每次请求一个实现了 FactoryBean\
  \ 接口的 Bean 时，Spring IoC 容器都会使用这个工厂 Bean 来创建目标 Bean 并将其返回给你。如果你确定要获取工厂 Bean 实例本身，可以使用以\
  \ & 开头的 Bean 名称。\n\n<beans ...>\n\n<bean id=\"aaa\"\n\nclass=\" **com.apress.springrecipes.shop.DiscountFactoryBean**\"\
  >\n\n<property name=\"product\">\n\n<bean class=\"com.apress.springrecipes.shop.Battery\"\
  >\n\n<constructor-arg value=\"AAA\" />\n\n<constructor-arg value=\"2.5\" />\n\n\
  </bean>\n\n</property>\n\n<property name=\"discount\" value=\"0.2\" />\n\n</bean>\n\
  \n<bean id=\"cdrw\"\n\nclass=\" **com.apress.springrecipes.shop.DiscountFactoryBean**\"\
  >\n\n<property name=\"product\">\n\n<bean class=\"com.apress.springrecipes.shop.Disc\"\
  >\n\n<constructor-arg value=\"CD-RW\" />\n\n<constructor-arg value=\"1.5\" />\n\n\
  </bean>\n\n</property>\n\n<property name=\"discount\" value=\"0.1\" />\n\n</bean>\n\
  \n</beans>\n\n9799ch04.qxd 4/10/08 10:53 AM Page 102\n\n**102**\n\n第 4 章 **■** 高级\
  \ Spring IoC 容器\n\n上述工厂 Bean 配置的工作方式与以下代码片段类似：\n\nDiscountFactoryBean &aaa = new\
  \ DiscountFactoryBean();\n\n&aaa.setProduct(new Battery(\"AAA\", 2.5));\n\n&aaa.setDiscount(0.2);\n\
  \nProduct aaa = (Product) &aaa.createInstance();\n\n\n\n```java\nDiscountFactoryBean\
  \ &cdrw = new DiscountFactoryBean();\n\n&cdrw.setProduct(new Disc(\"CD-RW\", 1.5));\n\
  \n&cdrw.setDiscount(0.1);\n\nProduct cdrw = (Product) &cdrw.createInstance();\n\
  ```\n\n**4-5. 从静态字段声明 Bean**\n\n**问题**\n\n你希望从静态字段在 Spring IoC 容器中声明一个 Bean。在 Java\
  \ 中，常量值通常被声明为静态字段。\n\n**解决方案**\n\n要从静态字段声明 Bean，你可以使用内置的工厂 Bean `FieldRetrievingFactoryBean`，或者在\
  \ Spring 2.x 中使用 `<util:constant>` 标签。\n\n**工作原理**\n\n首先，让我们在 `Product` 类中定义两个产品常量。\n\
  \n```java\npackage com.apress.springrecipes.shop;\n\npublic abstract class Product\
  \ {\n\n    public static final Product AAA = new Battery(\"AAA\", 2.5);\n\n    public\
  \ static final Product CDRW = new Disc(\"CD-RW\", 1.5);\n\n    ...\n\n}\n```\n\n\
  要从静态字段声明 Bean，你可以使用内置的工厂 Bean `FieldRetrievingFactoryBean`，并在 `staticField` 属性中指定完全限定的字段名。\n\
  \n```xml\n<beans ...>\n\n    <bean id=\"aaa\" class=\"org.springframework.beans.factory.config.\n\
  \        FieldRetrievingFactoryBean\">\n        <property name=\"staticField\">\n\
  \            <value>com.apress.springrecipes.shop.Product.AAA</value>\n        </property>\n\
  \    </bean>\n\n    <bean id=\"cdrw\" class=\"org.springframework.beans.factory.config.\n\
  \        FieldRetrievingFactoryBean\">\n        <property name=\"staticField\">\n\
  \            <value>com.apress.springrecipes.shop.Product.CDRW</value>\n       \
  \ </property>\n    </bean>\n\n</beans>\n```\n\n上述 Bean 配置等价于以下代码片段：\n```java\nProduct\
  \ aaa = com.apress.springrecipes.shop.Product.AAA;\nProduct cdrw = com.apress.springrecipes.shop.Product.CDRW;\n\
  ```\n\n作为在 `staticField` 属性中显式指定字段名的替代方案，你可以将其设置为 `FieldRetrievingFactoryBean` 的\
  \ Bean 名称。缺点是 Bean 名称可能会变得相当冗长。\n\n```xml\n<beans ...>\n\n    <bean id=\"com.apress.springrecipes.shop.Product.AAA\"\
  \n        class=\"org.springframework.beans.factory.config.\n            FieldRetrievingFactoryBean\"\
  \ />\n\n    <bean id=\"com.apress.springrecipes.shop.Product.CDRW\"\n        class=\"\
  org.springframework.beans.factory.config.\n            FieldRetrievingFactoryBean\"\
  \ />\n\n</beans>\n```\n\nSpring 2.x 允许你使用 `<util:constant>` 标签从静态字段声明 Bean。与使用 `FieldRetrievingFactoryBean`\
  \ 相比，这是一种更简单的从静态字段声明 Bean 的方式。但在使用此标签之前，你必须将 util 模式定义添加到 `<beans>` 根元素中。\n\n```xml\n\
  <beans\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xmlns:util=\"\
  http://www.springframework.org/schema/util\"\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
  \        http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\n    \
  \    http://www.springframework.org/schema/util\n        http://www.springframework.org/schema/util/spring-util-2.5.xsd\"\
  >\n\n    <util:constant id=\"aaa\"\n        static-field=\"com.apress.springrecipes.shop.Product.AAA\"\
  \ />\n\n    <util:constant id=\"cdrw\"\n        static-field=\"com.apress.springrecipes.shop.Product.CDRW\"\
  \ />\n\n</beans>\n```\n\n**4-6. 从对象属性声明 Bean**\n\n**问题**\n\n你希望从对象属性或嵌套属性（即属性路径）在\
