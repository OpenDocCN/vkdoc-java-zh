  \ 4:38 PM 第 582 页\n\n9799ch16.qxd 5/15/08 5:04 PM 第 583 页\n\n第 16 章\n\nSpring 远程处理与\n\
  \nWeb 服务\n\n**本**章中，您将学习 Spring 对各种远程处理技术的支持，例如 RMI、Hessian、Burlap、HTTP Invoker\
  \ 和 Web 服务。远程处理是开发分布式应用程序（尤其是多层企业应用程序）的关键技术。它允许运行在不同 JVM 或不同机器上的不同应用程序或组件，使用特定协议相互通信。\n\
  \nSpring 的远程处理支持在不同的远程处理技术之间保持一致。在服务器端，Spring 允许您通过服务导出器将任意 bean 暴露为远程服务。在客户端，Spring\
  \ 提供了各种代理工厂 bean，用于为远程服务创建本地代理，以便您可以像使用本地 bean 一样使用远程服务。图 16-1 展示了 Spring 远程处理支持的架构。\n\
  \n**图 16-1.** *Spring 远程处理支持的架构*\n\n如今，开发 Web 服务主要有两种方法：*契约优先* 和 *契约最后*。从 IoC 容器中自动将\
  \ bean 暴露为 Web 服务意味着该服务是契约最后的，因为服务契约是从现有 bean 生成的。Spring 团队创建了一个名为 Spring Web Services\
  \ (Spring-WS) 的子项目，专注于契约优先 Web 服务的开发。在这种方法中，服务 **583**\n\n\n\n9799ch16.qxd 5/15/08\
  \ 5:04 PM 第 584 页\n\n**584**\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n首先定义契约，然后编写代码来履行该契约。图\
  \ 16-2 展示了 Spring-WS 应用程序的架构。\n\n**图 16-2.** *Spring-WS 应用程序的架构*\n\n完成本章学习后，你将能够利用\
  \ Spring 的远程调用支持，通过不同的远程调用技术暴露和调用远程服务。此外，你还将能够使用 Spring-WS 和不同的 XML 技术开发契约优先的 Web\
  \ 服务。\n\n**16-1. 通过 RMI 暴露和调用服务**\n\n问题\n\n你希望从 Java 应用程序中暴露一个服务，供其他基于 Java 的客户端远程调用。由于双方都运行在\
  \ Java 平台上，你可以选择纯 Java 的解决方案，无需考虑跨平台可移植性。\n\n解决方案\n\n*远程方法调用（RMI）* 是一种基于 Java 的远程调用技术，允许运行在不同\
  \ JVM 中的两个 Java 应用程序相互通信。通过 RMI，一个对象可以调用远程对象的方法。RMI 依赖对象序列化来编组和解组方法参数及返回值。\n\n考虑典型的\
  \ RMI 使用场景，要通过 RMI 暴露一个服务，你必须创建扩展`java.rmi.Remote`的服务接口，并且其方法需声明抛出`java.rmi.RemoteException`。然后为该接口创建服务实现。\n\
  \n之后，你需要启动一个 RMI 注册表并将服务注册到其中。如你所见，暴露一个简单的服务需要相当多的步骤。\n\n9799ch16.qxd 5/15/08 5:04\
  \ PM 第 585 页\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n**585**\n\n要通过 RMI 调用服务，你首先需要在\
  \ RMI 注册表中查找远程服务引用，然后就可以调用其方法。然而，要调用远程服务的方法，你必须处理`java.rmi.RemoteException`，以防远程服务抛出任何异常。\n\
  \n幸运的是，Spring 的远程调用工具可以显著简化服务器端和客户端的 RMI 使用。在服务器端，你可以使用`RmiServiceExporter`将 Spring\
  \ Bean 导出为 RMI 服务，其方法可被远程调用。只需几行 Bean 配置，无需任何编程。在客户端，你可以简单地使用`RmiProxyFactoryBean`为远程服务创建代理。它让你能够像使用本地\
  \ Bean 一样使用远程服务。同样，完全不需要额外的编程。\n\n工作原理\n\n假设你要构建一个天气 Web 服务，供运行在不同平台上的客户端调用。该服务包含一个查询某城市多日温度的操作。首先，创建`TemperatureInfo`类，表示特定城市和日期的最高、最低及平均温度。\n\
  \n```java\npackage com.apress.springrecipes.weather;\n\n...\n\npublic class TemperatureInfo\
  \ implements Serializable {\n\n    private String city;\n\n    private Date date;\n\
  \n    private double min;\n\n    private double max;\n\n    private double average;\n\
  \n    // 构造方法、Getter 和 Setter\n\n    ...\n\n}\n```\n\n接下来，定义服务接口，包含`getTemperatures()`操作，该操作按请求返回某城市多日的温度。\n\
  \n```java\npackage com.apress.springrecipes.weather;\n\n...\n\npublic interface\
  \ WeatherService {\n\n    public List<TemperatureInfo> getTemperatures(String city,\
  \ List<Date> dates);\n\n}\n```\n\n你需要为该接口提供实现。在生产应用中，你可能会通过查询数据库来实现该服务接口。此处，为测试目的，你可以硬编码温度数据。\n\
  \n```java\npackage com.apress.springrecipes.weather;\n\n...\n\npublic class WeatherServiceImpl\
  \ implements WeatherService {\n\n9799ch16.qxd 5/15/08 5:04 PM 第 586 页\n\n**586**\n\
  \n第 16 章 **■** Spring 远程调用与 Web 服务\n\n\n\npublic List<TemperatureInfo> getTemperatures(String\
  \ city, List<Date> dates) {\n\nList<TemperatureInfo> temperatures = new ArrayList<TemperatureInfo>();\
  \ for (Date date : dates) {\n\ntemperatures.add(new TemperatureInfo(city, date,\
  \ 5.0, 10.0, 8.0));\n\n}\n\nreturn temperatures;\n\n}\n\n}\n\n**公开一个 RMI 服务**\n\n\
  假设你想将天气服务公开为一个 RMI 服务。为此，要使用 Spring 的远程调用功能，可以在类路径根目录下创建一个 bean 配置文件，例如 `rmi-server.xml`，来定义该服务。在此文件中，你为天气服务实现声明一个\
  \ bean，并通过使用 `RmiServiceExporter` 将其导出为 RMI 服务。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)\n\nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)\n\nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.springframework.org/schema/beans/spring-beans-2.5.xsd)\n\
  \n<bean id=\"weatherService\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceImpl\"\
  \ />\n\n<bean class=\"org.springframework.remoting.rmi.RmiServiceExporter\">\n\n\
  <property name=\"serviceName\" value=\"WeatherService\" />\n\n<property name=\"\
  serviceInterface\"\n\nvalue=\"com.apress.springrecipes.weather.WeatherService\"\
  \ />\n\n<property name=\"service\" ref=\"weatherService\" />\n\n</bean>\n\n</beans>\n\
  \n对于 `RmiServiceExporter` 实例，你必须配置几个属性，包括服务名称、服务接口以及要导出的服务对象。你可以将 IoC 容器中配置的任何 bean\
  \ 导出为 RMI 服务。`RmiServiceExporter` 会创建一个 RMI 代理来包装这个 bean，并将其绑定到 RMI 注册表。当代理从 RMI\
  \ 注册表接收到调用请求时，它会在该 bean 上调用相应的方法。\n\n默认情况下，`RmiServiceExporter` 会尝试在本地主机的 1099 端口查找\
  \ RMI 注册表。如果找不到 RMI 注册表，它会启动一个新的注册表。但是，如果你希望将服务绑定到另一个正在运行的 RMI 注册表，可以在 `registryHost`\
  \ 和 `registryPort` 属性中指定该注册表的主机和端口。请注意，一旦你指定了注册表主机，即使指定的注册表不存在，`RmiServiceExporter`\
  \ 也不会启动新的注册表。\n\n要启动一个提供 RMI 天气服务的服务器，请运行以下类，为前面的 bean 配置文件创建一个应用上下文：\n\n9799ch16.qxd\
  \ 5/15/08 5:04 PM Page 587\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n**587**\n\npackage\
  \ com.apress.springrecipes.weather;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class RmiServer {\n\npublic static void main(String[] args) {\n\nnew ClassPathXmlApplicationContext(\"\
  rmi-server.xml\");\n\n}\n\n}\n\n**调用一个 RMI 服务**\n\n通过使用 Spring 的远程调用功能，你可以像调用本地\
  \ bean 一样调用远程服务。例如，你可以创建一个客户端，通过其接口来引用天气服务。\n\npackage com.apress.springrecipes.weather;\n\
  \n...\n\npublic class WeatherServiceClient {\n\nprivate WeatherService weatherService;\n\
  \npublic void setWeatherService(WeatherService weatherService) {\n\nthis.weatherService\
  \ = weatherService;\n\n}\n\npublic TemperatureInfo getTodayTemperature(String city)\
  \ {\n\nList<Date> dates = Arrays.asList(new Date[] { new Date() });\n\nList<TemperatureInfo>\
  \ temperatures =\n\nweatherService.getTemperatures(city, dates);\n\nreturn temperatures.get(0);\n\
  \n}\n\n}\n\n在客户端 bean 配置文件（例如位于类路径根目录下的 `client.xml`）中，你可以使用 `RmiProxyFactoryBean`\
  \ 为远程服务创建一个代理。然后，你可以像使用本地 bean 一样使用此服务（例如，将其注入到天气服务客户端中）。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)\n\nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)\n\nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.springframework.org/schema/beans/spring-beans-2.5.xsd)\n\
  \n<bean id=\"client\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceClient\"\
  >\n\n<property name=\"weatherService\" ref=\"weatherService\" />\n\n</bean>\n\n\
  9799ch16.qxd 5/15/08 5:04 PM Page 588\n\n**588**\n\n第 16 章 **■** Spring 远程调用与 Web\
  \ 服务\n\n<bean id=\"weatherService\"\n\nclass=\"org.springframework.remoting.rmi.RmiProxyFactoryBean\"\
  >\n\n<property name=\"serviceUrl\"\n\nvalue=\" rmi://localhost:1099/WeatherService\"\
  \ />\n\n<property name=\"serviceInterface\"\n\nvalue=\"com.apress.springrecipes.weather.WeatherService\"\
  \ />\n\n</bean>\n\n</beans>\n\n对于 `RmiProxyFactoryBean` 实例，你必须配置两个属性。`serviceUrl`\
  \ 属性指定了 RMI 注册表的主机和端口，以及服务名称。`serviceInterface` 属性允许此工厂 bean 为远程服务创建一个代理。\n\n该代理会透明地将调用请求传输到远程服务。你可以使用以下\
  \ `Client` 主类来测试此服务：\n\npackage com.apress.springrecipes.weather;\n\nimport org.springframework.context.ApplicationContext;\n\
  \nimport org.springframework.context.support.ClassPathXmlApplicationContext; public\
  \ class Client {\n\npublic static void main(String[] args) {\n\nApplicationContext\
  \ context =\n\nnew ClassPathXmlApplicationContext(\"client.xml\");\n\nWeatherServiceClient\
  \ client =\n\n(WeatherServiceClient) context.getBean(\"client\");\n\nTemperatureInfo\
  \ temperature = client.getTodayTemperature(\"Houston\"); System.out.println(\"Min\
  \ temperature : \" + temperature.getMin()); System.out.println(\"Max temperature\
  \ : \" + temperature.getMax()); System.out.println(\"Average temperature : \" +\
  \ temperature.getAverage());\n\n}\n\n}\n\n**16-2\\. 通过 HTTP 公开和调用服务**\n\n问题\n\n\
  由于 RMI 通过其自有协议进行通信，该协议可能无法穿透防火墙，因此你希望从 Java 应用程序中公开一个服务，供客户端通过 HTTP 进行调用，而 HTTP\
  \ 是允许穿透大多数防火墙的。\n\n解决方案\n\n*Hessian* 和 *Burlap* 是 Caucho Technology ([`www.caucho.com/`](http://www.caucho.com))\
  \ 开发的两种简单轻量级的远程调用技术。它们都通过 HTTP 使用专有消息进行通信，并拥有自己的序列化机制，但比 Web 服务简单得多。它们之间的唯一区别在于，Hessian\
  \ 使用二进制消息进行通信，而 Burlap 使用 XML 消息进行通信。Hessian 和 Burlap 的消息格式在 Java 之外的其他平台（如 PHP、Python、C#\
  \ 和 Ruby）上也受支持。这允许你的 Java 应用程序与运行在其他平台上的应用程序进行通信。\n\n除了上述两种技术之外，Spring 框架本身还提供了一种名为\
  \ *HTTP Invoker* 的远程调用技术。它也通过 HTTP 进行通信，但使用 Java 的对象序列化机制来序列化对象。与 Hessian 和 Burlap\
  \ 不同，HTTP Invoker 要求服务的两端都运行在 Java 平台上并使用 Spring 框架。然而，它可以序列化各种 Java 对象，其中一些对象可能无法被\
  \ Hessian/Burlap 的专有机制序列化。\n\n\n\nSpring 的远程调用功能在使用这些技术暴露和调用远程服务时保持一致。在服务端，你可以创建一个服务导出器，例如\
  \ `HessianServiceExporter`、`BurlapServiceExporter` 或 `HttpInvokerServiceExporter`，将\
  \ Spring Bean 导出为方法可被远程调用的远程服务。这仅需几行 Bean 配置，无需任何编程。在客户端，你可以简单地配置一个代理工厂 Bean，例如\
  \ `HessianProxyFactoryBean`、`BurlapProxyFactoryBean` 或 `HttpInvokerProxyFactoryBean`，为远程服务创建代理。这让你可以像使用本地\
  \ Bean 一样使用远程服务。同样，这完全不需要额外的编程。\n\n工作原理\n\n**暴露 Hessian 服务**\n\n要使用 Spring 暴露 Hessian\
  \ 服务，你必须使用 Spring MVC 创建一个 Web 应用程序。首先，为你的 Web 应用程序上下文创建以下目录结构。\n\n**■注意** 要暴露 Hessian\
  \ 或 Burlap 服务，你必须将 `hessian-3.0.20.jar`（位于 Spring 安装目录的 `lib/caucho` 目录下）复制到 `WEB-INF/lib`\
  \ 目录。\n\nweather/\n\nWEB-INF/\n\nclasses/\n\nlib/\n\ncommons-logging.jar\n\nhessian-3.0.20.jar\n\
  \nspring-webmvc.jar\n\nspring.jar\n\nweather-servlet.xml\n\nweb.xml\n\n在 Web 部署描述符（即\
  \ `web.xml`）中，你必须配置 Spring MVC 的 `DispatcherServlet`。\n\n9799ch16.qxd 5/15/08 5:04\
  \ PM 第 590 页\n\n**590**\n\n第 16 章 **■** S P R I N G 远程调用与 W E B 服务\n\n<web-app version=\"\
  2.4\" xmlns=\" [`java.sun.com/xml/ns/j2ee\"`](http://java.sun.com/xml/ns/j2ee)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
