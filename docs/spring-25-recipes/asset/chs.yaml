  ...\n\n}\n\n}\n\n**通过注解自动检测 MBean**\n\n除了使用 `MBeanExporter` 显式导出 Bean 之外，你还可以简单地配置其子类\
  \ `AnnotationMBeanExporter`，以从 IoC 容器中声明的 Bean 中自动检测 MBean。你无需为此导出器配置 MBean 组装器，因为它默认使用带有\
  \ `AnnotationJmxAttributeSource` 的 `MetadataMBeanInfoAssembler`。你可以为此导出器删除之前的 Bean\
  \ 和组装器属性。\n\n<bean id=\"mbeanExporter\"\n\nclass=\"org.springframework.jmx.export.\
  \ **annotation.AnnotationMBeanExporter**\">\n\n...\n\n</bean>\n\n`AnnotationMBeanExporter`\
  \ 会检测 IoC 容器中配置的、带有 `@ManagedResource` 注解的任何 Bean，并将它们导出为 MBean。默认情况下，此导出器将 Bean\
  \ 导出到与其包名同名的域中。此外，它使用 Bean 在 IoC 容器中的名称作为其 MBean 名称，并使用 Bean 的短类名作为其类型。因此，你的 `documentReplicator`\
