  }\n\n}\n\n**13-8. 小结**\n\n在本章中，你学习了如何使用 Spring Security 2.0 来保护应用程序安全。它可以用于保护任何\
  \ Java 应用程序，但主要用于 Web 应用程序。认证、授权和访问控制的概念在安全领域至关重要，因此你应该对它们有清晰的理解。\n\n你经常需要通过阻止未经授权的访问来保护关键\
  \ URL。Spring Security 可以帮助你以声明式的方式实现这一点。它通过应用 Servlet 过滤器来处理安全问题，这些过滤器可以使用简单的 XML\
  \ 元素进行配置。如果你的 Web 应用程序的安全需求简单且典型，你可以启用 HTTP 自动配置功能，这样 Spring Security 将自动为你配置基本的安全服务。\n\
  \n9799ch13.qxd 5/20/08 4:45 PM Page 510\n\n**510**\n\n第 13 章 **■** S P R I N G S\
  \ E C U R I T Y\n\nSpring Security 支持多种用户登录 Web 应用程序的方式，例如基于表单的登录和 HTTP Basic 认证。它还提供了一个匿名登录服务，允许你将匿名用户视为普通用户来处理。“记住我”支持允许应用程序在多个浏览器会话中记住用户的身份。\n\
  \n\n\nSpring Security 支持多种用户身份验证方式，并内置了相应的提供程序实现。例如，它支持针对内存定义、关系数据库和 LDAP 仓库进行用户身份验证。您应始终在用户仓库中存储加密密码，因为明文密码容易受到黑客攻击。Spring\
  \ Security 还支持在本地缓存用户详细信息，以节省执行远程查询的开销。\n\n关于用户是否被允许访问特定资源的决策由访问决策管理器做出。Spring Security\
  \ 提供了三种基于投票方式的访问决策管理器。它们都需要配置一组投票者，用于对访问控制决策进行投票。\n\nSpring Security 允许您以声明方式保护方法调用，既可以通过在\
  \ Bean 定义中嵌入安全拦截器，也可以使用 AspectJ 切点表达式或注解匹配多个方法。Spring Security 还允许您在 JSP 视图中显示用户的身份验证信息，并根据用户的权限有条件地渲染视图内容。\n\
