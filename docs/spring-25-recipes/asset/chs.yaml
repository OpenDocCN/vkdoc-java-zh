  \ void testWithDraw() {\n\n...\n\n}\n\n}\n\n**12-9 小结**\n\n在本章中，你学习了测试 Java 应用程序所使用的基本概念和技术。JUnit\
  \ 和 TestNG 是 Java 平台上最流行的测试框架。\n\nJUnit 4 相比 JUnit 3.8 引入了若干重大改进，其中最重要的是注解支持。TestNG\
  \ 也是一个基于注解的强大测试框架。\n\n单元测试用于测试单个编程单元，在面向对象语言中通常是一个类或一个方法。当测试依赖于其他单元的单元时，可以使用桩和模拟对象来模拟其依赖关系，从而使测试更简单。\n\
  \n相比之下，集成测试则用于将多个单元作为一个整体进行测试。\n\n在 Web 层，控制器通常难以测试。Spring 为 Servlet API 提供了模拟对象，以便你可以轻松模拟\
  \ Web 请求和响应对象来测试 Web\n\n9799ch12.qxd 5/14/08 4:08 PM 第 462 页\n\n**462**\n\n第 12\
  \ 章 **■** Spring 测试支持\n\n控制器。Spring 还提供了一组断言工具，用于检查控制器返回的 ModelAndView 对象。在 Spring\
  \ 2.5 中，控制器不必依赖 Spring MVC API 和 Servlet API，因此它们更易于测试。\n\nSpring 的测试支持设施可以通过从 Bean\
  \ 配置文件加载应用程序上下文并在多次测试执行之间缓存它们，来为你的测试管理应用程序上下文。在 2.5 之前的版本中，Spring 提供了特定于 JUnit 3.8\
  \ 的测试支持。Spring 2.5 通过 TestContext 框架提供了类似的支持。\n\n你可以在测试中访问被管理的应用程序上下文，并且测试夹具也会自动从应用程序上下文中注入。此外，如果你的测试涉及数据库更新，Spring\
  \ 可以为它们管理事务，以便在一个测试方法中所做的更改会被回滚，从而不会影响下一个测试方法。Spring 还可以为你创建一个 JDBC 模板，用于在数据库中准备和验证测试数据。\n\
  \nSpring 提供了一组通用的测试注解来简化测试创建。这些注解是 Spring 特有的，但独立于底层测试框架。不过，其中一些注解仅支持与 JUnit 一起使用。\n\
  \n在下一章中，你将学习如何使用 Spring Security 框架创建安全的 Spring 应用程序。\n\n9799ch13.qxd 5/20/08 4:45\
  \ PM 第 463 页\n\n第三部分\n\n高级\n\n9799ch13.qxd 5/20/08 4:45 PM 第 464 页\n\n9799ch13.qxd\
  \ 5/20/08 4:45 PM 第 465 页\n\n第 13 章\n\nSpring Security\n\n**本**章中，你将学习如何使用 Spring\
  \ Security 框架（Spring 框架的一个子项目）来保护应用程序。Spring Security 以前被称为 Acegi Security，但在加入\
  \ Spring Portfolio 项目后已更名。\n\nSpring Security 可用于保护任何 Java 应用程序，但主要用于基于 Web 的应用程序。Web\
  \ 应用程序，尤其是那些可以通过互联网访问的应用程序，如果未得到妥善保护，则容易受到黑客攻击。\n\n\n\nSpring Security 提供了一组 Servlet\
  \ 过滤器，用于为 Web 应用程序执行各种安全服务。在 Spring Security 1.x 中，你必须手动将这些过滤器配置为 Spring Bean，因此配置非常冗长且难以理解。Spring\
  \ Security 2.0 采用了一种类似于 Spring 框架 2.x 的方法，即使用基于 XML 模式和基于注解的配置，从而显著简化了其配置。本章将仅关注\
  \ Spring Security 2.0。*请注意，Spring Security 2.0 的 2.0 版本需要 Spring 框架 2.0.8，而 2.5\
  \ 版本则需要 Spring 框架 2.5.2。*\n\n在讨论安全性时，有几个你必须理解的术语和概念。*认证*是验证主体身份是否与其声称的身份相符的过程。一个*主体*可以是一个用户、一个设备或一个系统，但最典型的情况是指用户。主体必须提供其身份的证据才能通过认证。这个证据被称为*凭证*，当目标主体是用户时，凭证通常是一个密码。\n\
  \n*授权*是向已认证用户授予*权限*的过程，以便该用户被允许访问目标应用程序的特定资源。授权过程必须在认证过程之后执行。通常，权限是以*角色*的形式授予的。\n\
  \n*访问控制*意味着控制对应用程序资源的访问。它需要决定是否允许用户访问某个资源。这个决定被称为*访问控制决策*，它是通过将资源的*访问属性*与用户被授予的权限或其他特征进行比较来做出的。\n\
  \n完成本章后，你将理解基本的安全概念，并知道如何在 URL 访问级别、方法调用级别、视图渲染级别和领域对象级别保护你的 Web 应用程序。\n\n**13-1.\
  \ 保护 URL 访问**\n\n问题\n\n许多 Web 应用程序都有一些极其重要且私密的特定 URL。\n\n你必须通过阻止对这些 URL 的未授权访问来保护它们。\n\
  \n**465**\n\n9799ch13.qxd 5/20/08 4:45 PM 第 466 页\n\n**466**\n\n第 13 章 **■** Spring\
  \ Security\n\n解决方案\n\nSpring Security 使你能够通过简单的配置，以声明式的方式保护 Web 应用程序的 URL 访问。它通过将\
  \ Servlet 过滤器应用于 HTTP 请求来处理安全问题。\n\n你可以使用 Spring Security 模式中定义的 XML 元素，在 Spring\
  \ 的 Bean 配置文件中配置这些过滤器。然而，由于 Servlet 过滤器必须在 Web 部署描述符中注册才能生效，你必须在 Web 部署描述符中注册一个\
  \ `DelegatingFilterProxy` 实例，这是一个 Servlet 过滤器，它将请求过滤委托给 Spring 应用程序上下文中的一个过滤器。\n\
  \nSpring Security 允许你通过 `<http>` 元素配置 Web 应用程序的安全性。如果你的 Web 应用程序的安全需求是直接且典型的，你可以将此元素的\
  \ `auto-config` 属性设置为 `true`，这样 Spring Security 将自动注册并配置几个基本的安全服务，包括以下内容：*基于表单的登录服务*：这提供了一个默认页面，其中包含一个登录表单，供用户登录此应用程序。\n\
  \n*注销服务*：这提供了一个与 URL 映射的处理程序，供用户注销此应用程序。\n\n*HTTP 基本认证*：这可以处理 HTTP 请求头中呈现的基本认证凭证。它也可以用于认证使用远程协议和\
  \ Web 服务发出的请求。\n\n*匿名登录*：这为一个匿名用户分配一个主体并授予权限，以便你可以像处理普通用户一样处理匿名用户。\n\n*记住我支持*：这可以在多个浏览器会话中记住用户的身份，通常是通过在用户的浏览器中存储一个\
  \ cookie 来实现。\n\n\n\n*Servlet API 集成*：这使您能够通过标准 Servlet API（例如 `HttpServletRequest.isUserInRole()`\
  \ 和 `HttpServletRequest.getUserPrincipal()`）在 Web 应用中访问安全信息。\n\n注册这些安全服务后，您可以指定需要特定权限才能访问的\
  \ URL 模式。Spring Security 将根据您的配置执行安全检查。用户必须先登录应用才能访问安全 URL，除非这些 URL 已开放匿名访问。Spring\
  \ Security 提供了一系列身份验证提供程序供您选择。身份验证提供程序负责验证用户身份，并返回授予该用户的权限。\n\n工作原理\n\n假设您要开发一个在线留言板应用，供用户发布消息。首先，创建包含三个属性（author、title\
  \ 和 body）的领域类 Message：\n\n```java\npackage com.apress.springrecipes.board.domain;\n\
  \npublic class Message {\n\n    private Long id;\n    private String author;\n \
  \   private String title;\n    private String body;\n\n    // Getters and Setters\n\
  \    ...\n}\n```\n\n接下来，在服务接口中定义留言板的操作，包括列出所有消息、发布消息、删除消息以及根据 ID 查找消息：\n\n```java\n\
  package com.apress.springrecipes.board.service;\n...\npublic interface MessageBoardService\
  \ {\n    public List<Message> listMessages();\n    public void postMessage(Message\
  \ message);\n    public void deleteMessage(Message message);\n    public Message\
  \ findMessageById(Long messageId);\n}\n```\n\n为测试目的，我们使用列表来存储已发布的消息，以此实现该接口。您可以将消息发布时间（毫秒数）作为消息的标识符。同时，必须将\
  \ `postMessage()` 和 `deleteMessage()` 方法声明为 `synchronized`，以确保线程安全。\n\n```java\n\
  package com.apress.springrecipes.board.service;\n...\npublic class MessageBoardServiceImpl\
  \ implements MessageBoardService {\n    private Map<Long, Message> messages = new\
  \ LinkedHashMap<Long, Message>();\n    \n    public List<Message> listMessages()\
  \ {\n        return new ArrayList<Message>(messages.values());\n    }\n\n    public\
  \ synchronized void postMessage(Message message) {\n        message.setId(System.currentTimeMillis());\n\
  \        messages.put(message.getId(), message);\n    }\n\n    public synchronized\
  \ void deleteMessage(Message message) {\n        messages.remove(message.getId());\n\
  \    }\n\n    public Message findMessageById(Long messageId) {\n        return messages.get(messageId);\n\
  \    }\n}\n```\n\n**设置使用 Spring Security 的 Spring MVC 应用**\n\n要使用 Spring MVC 作为\
  \ Web 框架、Spring Security 作为安全框架来开发此应用，首先需要为 Web 应用创建以下目录结构。\n\n**■注意** 在使用 Spring\
  \ Security 之前，您需要下载其发行版（例如 v2.0.1）并将其解压到您选择的目录中。要使用核心 Spring Security 服务，请将 `spring-security-core-2.0.1.jar`（位于\
  \ Spring Security 安装目录的 `dist` 目录下）复制到 `WEB-INF/lib` 目录。\n\n此外，您还需要复制 `commons-codec.jar`（位于\
  \ Spring 安装目录的 `lib/jakarta-commons` 目录下）。\n\n```\nboard/\n    WEB-INF/\n      \
  \  classes/\n        jsp/\n        lib/\n            commons-codec.jar\n       \
  \     commons-logging.jar\n            jstl.jar\n            spring-security-core-2.0.1.jar\n\
  \            spring-webmvc.jar\n            spring.jar\n            standard.jar\n\
  \        board-security.xml\n        board-service.xml\n        board-servlet.xml\n\
  \        web.xml\n```\n\n此应用的 Spring 配置被分离到三个不同的文件中：`board-security.xml`、`board-service.xml`\
  \ 和 `board-servlet.xml`。每个文件负责配置特定的层。\n\n**创建配置文件**\n\n在 Web 部署描述符（即 `web.xml`）中，注册\
  \ `ContextLoaderListener` 以在启动时加载根应用上下文，并注册 Spring MVC 的 `DispatcherServlet` 用于分发请求：\n\
  \n```xml\n<web-app version=\"2.4\" xmlns=\"http://java.sun.com/xml/ns/j2ee\">\n\
  ```\n\n\n\n[xsi:schemaLocation=\"http://java.sun.com/xml/ns/j2ee](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
