  \n</beans>\n\n**基于 ACL 做出访问控制决策**\n\n有了每个领域对象的 ACL，您就可以使用对象的 ACL 对涉及该对象的方法做出访问控制决策。例如，当用户尝试删除已发布的消息时，您可以查询该消息的\
  \ ACL，以确定该用户是否被允许删除此消息。\n\nSpring Security 提供了 AclEntryVoter 类，允许您定义一个基于 ACL 进行投票的决策投票器。以下在\
  \ board-acl.xml 中定义的 ACL 投票器，会在方法具有 ACL_MESSAGE_DELETE 访问属性且方法参数类型为 Message 时，对访问控制决策进行投票。如果当前用户在消息领域对象的\
  \ ACL 中拥有 ADMINISTRATION 或 DELETE 权限，则该用户将被允许删除此消息。\n\n<beans\n\n[](http://www.springframework.org/schema/util)\n\
