  \ R I N G 测 试 支 持\n\n默认情况下，每个测试方法将在事务内运行，该事务会在方法结束时回滚。因此，你无需在 onTearDown() 方法中执行数据库清理任务，可以直接删除它。请注意，数据准备任务必须在\
  \ onSetUpInTransaction() 方法中执行，而不是 onSetUp()，以确保它们与测试方法在同一个事务中运行，该事务将在结束时回滚。\n\n\
  然而，如果你希望事务在测试方法结束时提交，可以显式调用 setComplete() 方法使其提交而非回滚。此外，你也可以在测试方法期间通过调用 endTransaction()\
  \ 方法来结束事务，该方法通常会导致事务回滚，或者如果你之前调用了 setComplete()，则会提交。\n\n此类要求在 Bean 配置文件中配置一个事务管理器。默认情况下，它会查找类型为\
  \ PlatformTransactionManager 的 Bean，并使用该 Bean 为你的测试方法管理事务。\n\n<bean id=\"transactionManager\"\
  \n\nclass=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\">\n\
  \n<property name=\"dataSource\" ref=\"dataSource\" />\n\n</bean>\n\n**使用 JUnit 4.4\
  \ 中的 TestContext 框架管理事务**\n\n当使用 TestContext 框架创建测试时，你可以通过在类级别或方法级别添加 @Transactional\
  \ 注解，使测试方法在事务内运行。在 JUnit 4.4 中，你可以为测试类指定 SpringJUnit4ClassRunner，这样它就不需要继承支持类。\n\
  \npackage com.apress.springrecipes.bank;\n\n...\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.test.context.ContextConfiguration;\n\nimport org.springframework.test.context.junit4.SpringJUnit4ClassRunner;\n\
  \nimport org.springframework.transaction.annotation.Transactional;\n\n\n\n**@RunWith(SpringJUnit4ClassRunner.class)**\n\
  \n@ContextConfiguration(locations = \"/beans.xml\")\n\n**@Transactional**\n\npublic\
  \ class AccountServiceJUnit4ContextTests {\n\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\n\n@Autowired\n\nprivate AccountService accountService;\n\n@Before\n\
  \npublic void init() {\n\naccountService.createAccount(TEST_ACCOUNT_NO);\n\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n\n}\n\n9799ch12.qxd 5/14/08 4:08 PM Page 453\n\n第 12 章 **■** Spring 测试支持\n\
  \n**453**\n\n// 不再需要 cleanup() 方法\n\n...\n\n}\n\n如果你用 `@Transactional` 注解一个测试类，那么它的所有测试方法都将在事务中运行。如果你希望某个特定方法不在事务中运行，可以用\
  \ `@NotTransactional` 注解它。另一种方法是仅对个别方法使用 `@Transactional` 注解，而不是整个类。\n\n默认情况下，测试方法的事务会在结束时回滚。你可以通过禁用\
  \ `@TransactionConfiguration` 的 `defaultRollback` 属性来改变此行为，该注解应应用于类级别。此外，你还可以使用\
  \ `@Rollback` 注解（需要布尔值）在方法级别覆盖这个类级别的回滚行为。\n\n请注意，带有 `@Before` 或 `@After` 注解的方法将与测试方法在同一个事务中执行。如果你有需要在事务之前或之后执行初始化或清理任务的方法，则必须使用\
  \ `@BeforeTransaction` 或 `@AfterTransaction` 注解它们。注意，这些方法不会为带有 `@NotTransactional`\
  \ 注解的测试方法执行。\n\n最后，你还需要在 Bean 配置文件中配置一个事务管理器。默认情况下，会使用类型为 `PlatformTransactionManager`\
  \ 的 Bean，但你可以在 `@TransactionConfiguration` 注解的 `transactionManager` 属性中通过指定名称来使用另一个事务管理器。\n\
