  }\n\n}\n\n**7-8. 在 Spring JDBC 框架中处理异常**\n\n问题\n\n许多 JDBC API 声明抛出 `java.sql.SQLException`，这是一个必须被捕获的受检异常。每次执行数据库操作时都处理这种异常非常麻烦。你通常需要定义自己的策略来处理这类异常。如果不这样做，可能会导致异常处理不一致。\n\
  \n解决方案\n\nSpring 框架为其数据访问模块（包括 JDBC 框架）提供了一致的数据访问异常处理机制。通常，Spring JDBC 框架抛出的所有异常都是\
  \ `DataAccessException` 的子类，这是一种你无需强制捕获的 `RuntimeException`。它是 Spring 数据访问模块中所有异常的根异常类。\n\
  \n图 7-1 仅展示了 Spring 数据访问模块中 `DataAccessException` 层次结构的一部分。总共定义了超过 30 个异常类，用于不同类别的数据访问异常。\n\
  \n![Image 29](img/index-267_1.jpg)\n\n9799ch07.qxd 5/5/08 4:47 PM 第 241 页\n\n第 7\
  \ 章 **■** S P R I N G J D B C 支持\n\n**241**\n\n**图 7-1.** *DataAccessException 层次结构中的常见异常类*\n\
  \n工作原理\n\n**理解 Spring JDBC 框架中的异常处理**\n\n到目前为止，在使用 JDBC 模板或 JDBC 操作对象时，你还没有显式地处理\
  \ JDBC 异常。为了帮助你理解 Spring JDBC 框架的异常处理机制，让我们考虑 `Main` 类中的以下代码片段，它插入了一辆车。如果你插入一辆具有重复车辆编号的车辆会发生什么？\n\
  \npackage com.apress.springrecipes.vehicle;\n\n...\n\npublic class Main {\n\npublic\
  \ static void main(String[] args) {\n\n...\n\nVehicleDao vehicleDao = (VehicleDao)\
  \ context.getBean(\"vehicleDao\"); Vehicle vehicle = new Vehicle(\"EX0001\", \"\
  Green\", 4, 4); vehicleDao.insert(vehicle);\n\n}\n\n}\n\n9799ch07.qxd 5/5/08 4:47\
  \ PM 第 242 页\n\n**242**\n\n第 7 章 **■** S P R I N G J D B C 支持\n\n\n\n如果你重复执行该方法两次，或者车辆信息已插入数据库，则会抛出\
  \ `DataIntegrityViolationException`，它是 `DataAccessException` 的子类。在你的 DAO 方法中，既不需要用\
  \ `try/catch` 块包裹代码，也无需在方法签名中声明抛出异常。这是因为 `DataAccessException`（及其子类，包括 `DataIntegrityViolationException`）属于非受检异常，你无需强制捕获。`DataAccessException`\
  \ 的直接父类是 `NestedRuntimeException`，这是一个核心的 Spring 异常类，用于将另一个异常包装在 `RuntimeException`\
  \ 中。\n\n当你使用 Spring JDBC 框架的类时，它们会为你捕获 `SQLException`，并将其包装为 `DataAccessException`\
  \ 的某个子类。由于该异常是 `RuntimeException`，你无需强制捕获它。\n\n但 Spring JDBC 框架如何知道应该抛出 `DataAccessException`\
  \ 层级中的哪个具体异常呢？它是通过检查捕获到的 `SQLException` 的 `errorCode` 和 `SQLState` 属性来确定的。由于 `DataAccessException`\
  \ 将底层的 `SQLException` 作为根本原因进行包装，你可以通过以下 `catch` 块来检查 `errorCode` 和 `SQLState` 属性：\n\
  \n```java\npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport java.sql.SQLException;\n\
  \nimport org.springframework.dao.DataAccessException;\n\npublic class Main {\n\n\
  \    public static void main(String[] args) {\n\n        ...\n\n        VehicleDao\
  \ vehicleDao = (VehicleDao) context.getBean(\"vehicleDao\");\n        Vehicle vehicle\
  \ = new Vehicle(\"EX0001\", \"Green\", 4, 4);\n        **try {**\n            vehicleDao.insert(vehicle);\n\
  \        **} catch (DataAccessException e) {**\n            **SQLException sqle\
  \ = (SQLException) e.getCause();**\n            **System.out.println(\"Error code:\
  \ \" + sqle.getErrorCode());**\n            **System.out.println(\"SQL state: \"\
  \ + sqle.getSQLState());**\n        **}**\n    }\n}\n```\n\n当你再次插入重复的车辆信息时，请注意 Apache\
  \ Derby 会返回以下错误代码和 SQL 状态：\n\n```\nError code : -1\nSQL state : 23505\n```\n\n如果你查阅\
  \ Apache Derby 参考手册，会发现表 7-2 中所示的错误代码描述。\n\n**表 7-2.** *Apache Derby 错误代码描述*\n\n\
  | **SQL 状态** | **消息文本** |\n|--------------|--------------|\n| 23505        | 该语句被中止，因为它会导致在由\
  \ '<*值*>' 定义的唯一或主键约束或唯一索引上出现重复键值。 |\n\n那么 Spring JDBC 框架如何知道状态 23505 应映射到 `DataIntegrityViolationException`\
  \ 呢？错误代码和 SQL 状态是数据库特定的，这意味着不同的数据库产品对于同一类错误可能返回不同的代码。\n\n此外，某些数据库产品会在 `errorCode`\
  \ 属性中指定错误，而其他数据库（如 Derby）则会在 `SQLState` 属性中指定。\n\n作为一个开放的 Java 应用程序框架，Spring 理解大多数流行数据库产品的错误代码。然而，由于错误代码数量庞大，它只能维护最常见错误的映射关系。该映射定义在\
  \ `sql-error-codes.xml` 文件中，该文件位于 `org.springframework.jdbc.support` 包中。以下针对 Apache\
  \ Derby 的代码片段取自该文件：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
  \ beans PUBLIC \"-//SPRING//DTD BEAN 2.0//EN\"\n[\"http://www.springframework.org/dtd/spring-beans-2.0.dtd\"\
  >](http://www.springframework.org/dtd/spring-beans-2.0.dtd)\n<beans>\n    ...\n\
  \    <bean id=\"Derby\"\n          class=\"org.springframework.jdbc.support.SQLErrorCodes\"\
  >\n        <property name=\"databaseProductName\">\n            <value>Apache Derby</value>\n\
  \        </property>\n        <property name=\"useSqlStateForTranslation\">\n  \
  \          <value>true</value>\n        </property>\n        <property name=\"badSqlGrammarCodes\"\
  >\n            <value>\n                42802,42821,42X01,42X02,42X03,42X04,42X05,42X06,42X07,42X08\n\
  \            </value>\n        </property>\n        <property name=\"dataAccessResourceFailureCodes\"\
  >\n            <value>04501,08004,42Y07</value>\n        </property>\n        <property\
  \ name=\"dataIntegrityViolationCodes\">\n            <value>22001,22005,23502,23503,\
  \ **23505**,23513,X0Y32</value>\n        </property>\n    </bean>\n</beans>\n```\n\
  \n\n</property>\n\n<property name=\"cannotAcquireLockCodes\">\n\n<value>40XL1</value>\n\
  \n</property>\n\n<property name=\"deadlockLoserCodes\">\n\n<value>40001</value>\n\
  \n9799ch07.qxd 5/5/08 4:47 PM Page 244\n\n**244**\n\n第 7 章 **■** Spring JDBC 支持\n\
  \n</property>\n\n</bean>\n\n</beans>\n\n请注意，`databaseProductName` 属性用于匹配由 `Connection.getMetaData().getDatabaseProductName()`\
  \ 返回的数据库产品名称。这使得 Spring 能够知道当前连接的是哪种类型的数据库。`useSqlStateForTranslation` 属性意味着应使用\
  \ `SQLState` 属性（而非 `errorCode` 属性）来匹配错误代码。最后，`SQLErrorCodes` 类定义了多个类别供你映射数据库错误代码。代码\
  \ `23505` 位于 `dataIntegrityViolationCodes` 类别中。\n\n**自定义数据访问异常处理**\n\nSpring JDBC\
  \ 框架仅映射已知的错误代码。有时你可能希望自行自定义映射。例如，你可能决定向现有类别添加更多代码，或为特定错误代码定义自定义异常。\n\n在表 7-2 中，错误代码\
  \ `23505` 表示 Apache Derby 中的重复键错误。默认情况下，它被映射到 `DataIntegrityViolationException`。假设你想为此类错误创建一个自定义异常类型\
  \ `DuplicateKeyException`。它应该继承 `DataIntegrityViolationException`，因为它也是一种数据完整性违反错误。请记住，要使异常能够被\
  \ Spring JDBC 框架抛出，它必须与根异常类 `DataAccessException` 兼容。\n\n```java\npackage com.apress.springrecipes.vehicle;\n\
  \nimport org.springframework.dao.DataIntegrityViolationException;\n\npublic class\
  \ DuplicateKeyException extends DataIntegrityViolationException {\n\n    public\
  \ DuplicateKeyException(String msg) {\n        super(msg);\n    }\n\n    public\
  \ DuplicateKeyException(String msg, Throwable cause) {\n        super(msg, cause);\n\
  \    }\n}\n```\n\n默认情况下，Spring 会从位于 `org.springframework.jdbc.support` 包中的 `sql-error-codes.xml`\
  \ 文件查找异常。但是，你可以通过在类路径根目录下提供一个同名文件来覆盖部分映射。如果 Spring 能够找到你的自定义文件，它将首先从你的映射中查找异常。然而，如果在那里没有找到合适的异常，Spring\
  \ 将查找默认映射。\n\n例如，假设你想将自定义的 `DuplicateKeyException` 类型映射到错误代码 `23505`。你必须通过 `CustomSQLErrorCodesTranslation`\
  \ bean 添加绑定，然后将此 bean 添加到 `customTranslations` 类别中。\n\n9799ch07.qxd 5/5/08 4:47\
  \ PM Page 245\n\n第 7 章 **■** Spring JDBC 支持\n\n**245**\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE beans PUBLIC \"-//SPRING//DTD BEAN 2.0//EN\"\
  \n    \"http://www.springframework.org/dtd/spring-beans-2.0.dtd\">\n<beans>\n\n\
  \    <bean id=\"Derby\"\n          class=\"org.springframework.jdbc.support.SQLErrorCodes\"\
  >\n        <property name=\"databaseProductName\">\n            <value>Apache Derby</value>\n\
  \        </property>\n        <property name=\"useSqlStateForTranslation\">\n  \
  \          <value>true</value>\n        </property>\n        <property name=\"customTranslations\"\
  >\n            <list>\n                <ref local=\"duplicateKeyTranslation\" />\n\
  \            </list>\n        </property>\n    </bean>\n\n    <bean id=\"duplicateKeyTranslation\"\
  \n          class=\"org.springframework.jdbc.support.CustomSQLErrorCodesTranslation\"\
  >\n        <property name=\"errorCodes\">\n            <value>**23505**</value>\n\
  \        </property>\n        <property name=\"exceptionClass\">\n            <value>\n\
  \                **com.apress.springrecipes.vehicle.DuplicateKeyException**\n  \
  \          </value>\n        </property>\n    </bean>\n\n</beans>\n```\n\n现在，如果你移除围绕车辆插入操作的\
  \ `try/catch` 块并插入一条重复的车辆记录，Spring JDBC 框架将抛出 `DuplicateKeyException` 而不是原来的异常。\n\
  \n然而，如果你对 `SQLErrorCodes` 类使用的基本代码到异常映射策略不满意，你可以进一步实现 `SQLExceptionTranslator` 接口，并通过\
  \ `setExceptionTranslator()` 方法将其实例注入到 JDBC 模板中。\n\n**7-9. 本章小结**\n\n在本章中，你学习了如何使用\
  \ Spring JDBC 框架来简化数据库访问任务。当直接使用 JDBC 而没有 Spring 支持时，大部分 JDBC 代码都是相似的，并且每个数据库操作都需要重复编写。这种冗余代码会使你的\
  \ DAO 方法变得冗长且可读性差。\n\n作为 Spring JDBC 框架的核心，JDBC 模板为不同类型的 JDBC 操作提供了模板方法。每个模板方法负责控制整体流程，并允许你通过实现预定义的回调接口来覆盖流程中的特定任务。\n\
  \n`JdbcTemplate` 类是经典的 Spring JDBC 模板。为了利用 Java 1.5 的特性，Spring 提供了 `SimpleJdbcTemplate`，它利用了自动装箱、泛型和可变长度参数等特性来简化其使用。此外，该类还支持在\
  \ SQL 语句中使用命名参数。\n\n除了 JDBC 模板方法外，Spring JDBC 框架还支持一种更面向对象的方法，即将每个数据库操作建模为一个细粒度的操作对象。你可以根据自己的偏好和需求选择其中一种方法。\n\
  \nSpring 为其数据访问模块（包括 JDBC 框架）提供了一致的数据访问异常处理机制。如果抛出 `SQLException`，Spring 会将其包装为\
  \ `DataAccessException` 层次结构中的适当异常。`DataAccessException` 是一个非检查型异常，因此你不必强制捕获和处理它的每个实例。\n\
  \n在下一章中，你将学习如何使用强大的事务管理功能来为你的 Spring 应用程序管理事务。\n\n9799ch08.qxd 5/6/08 10:00 AM Page\
  \ 247\n\n第 8 章\n\nSpring 中的事务管理\n\n**在**本章中，你将学习事务的基本概念以及 Spring 在事务管理方面的能力。事务管理是企业应用程序中确保数据完整性和一致性的关键技术。Spring\
  \ 作为一个企业应用框架，在不同的事务管理 API 之上定义了一个抽象层。作为应用程序开发者，你可以利用 Spring 的事务管理设施，而无需深入了解底层的事务管理\
  \ API。\n\n与 EJB 中的 *Bean 管理事务（BMT）* 和 *容器管理事务（CMT）* 方法类似，Spring 支持编程式和声明式事务管理。Spring\
  \ 事务支持的目标是通过向 POJO 添加事务能力，为 EJB 事务提供一种替代方案。\n\n*编程式事务管理* 是通过在业务方法中嵌入事务管理代码来控制事务的提交和回滚来实现的。通常，如果方法正常完成，则提交事务；如果方法抛出特定类型的异常，则回滚事务。使用编程式事务管理，你可以进一步定义自己的规则来提交和回滚事务。\n\
  \n然而，当以编程方式管理事务时，你必须在每个事务性操作中包含额外的事务管理代码。因此，样板式的事务代码会在每个此类操作中重复出现。此外，你很难为不同的应用程序启用和禁用事务管理。如果你对\
  \ AOP 有扎实的理解，应该已经注意到事务管理是一种横切关注点。\n\n\n\n在大多数情况下，*声明式事务管理*优于编程式事务管理。它通过声明的方式将事务管理代码与业务方法分离。事务管理作为一种横切关注点，可以通过\
  \ AOP 方法进行模块化。Spring 通过 Spring AOP 框架支持声明式事务管理。这可以帮助你更轻松地为应用程序启用事务，并定义一致的事务策略。然而，声明式事务管理的灵活性较差，因为你无法通过代码精确控制事务。\n\
  \n你可以指定一组事务属性来精细地定义事务。Spring 支持的事务属性包括传播行为、隔离级别、回滚规则、事务超时和只读。这些属性允许你进一步自定义事务的行为。\n\
  \n完成本章后，你将能够在应用程序中应用不同的事务管理策略。此外，你将熟悉不同的事务属性，以便精细地定义事务。\n\n**8-1. 事务管理的问题**\n\n\
  事务管理是企业应用开发中确保数据完整性和一致性的关键技术。没有事务管理，你的数据和资源可能会被破坏，并处于不一致的状态。在并发和分布式环境中，事务管理对于从意外错误中恢复至关重要。\n\
  \n简单来说，事务是一系列被视为单个工作单元的操作。这些操作要么全部完成，要么完全不生效。如果所有操作都顺利，事务应被永久提交。相反，如果任何操作出错，事务应回滚到初始状态，就像什么都没发生过一样。\n\
  \n事务的概念可以用四个关键属性来描述：*原子性、一致性、隔离性和持久性（ACID）*。具体描述如下：\n*原子性*：事务是由一系列操作组成的原子操作。事务的原子性确保这些操作要么全部完成，要么完全不生效。\n\
  \n*一致性*：一旦事务的所有操作完成，事务即被提交。此时，你的数据和资源将处于符合业务规则的一致状态。\n\n*隔离性*：由于可能同时有许多事务处理同一数据集，每个事务应与其他事务隔离，以防止数据损坏。\n\
  \n*持久性*：一旦事务完成，其结果应能持久保存，以应对任何系统故障。通常，事务的结果会被写入持久化存储。\n\n为了理解事务管理的重要性，我们先从一个从在线书店购买书籍的例子开始。首先，你需要在数据库中为这个应用程序创建一个新的模式。如果你选择\
  \ Apache Derby 作为数据库引擎，可以使用表 8-1 中所示的 JDBC 属性进行连接。\n\n**表 8-1.** *连接应用程序数据库的 JDBC\
  \ 属性*\n**属性**\n\n**值**\n\n驱动类\n\norg.apache.derby.jdbc.ClientDriver\n\nURL\n\njdbc:derby://localhost:1527/bookshop;create=true\
  \ 用户名\n\napp\n\n密码\n\napp\n\n对于你的书店应用程序，你需要创建以下表来存储应用程序数据：\n\nCREATE TABLE BOOK\
