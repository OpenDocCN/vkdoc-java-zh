  \        accountService.deposit(TEST_ACCOUNT_NO, 100);\n    }\n\n    ...\n}\n```\n\
  \n9799ch12.qxd 5/14/08 4:08 PM 第 446 页\n\n**446**\n\n第 12 章 ■ Spring 测试支持\n\n你所继承的\
