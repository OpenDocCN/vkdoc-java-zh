  \n...\n\n}\n\n}\n\n**6-6\\. 编写 AspectJ 切点表达式**\n\n问题\n\n横切关注点可能发生在不同的程序执行点，这些点被称为连接点。由于连接点的多样性，你需要一种强大的表达式语言来帮助匹配它们。\n\
  \n解决方案\n\nAspectJ 切点语言是一种强大的表达式语言，可以匹配各种类型的连接点。然而，Spring AOP 仅支持在其 IoC 容器中声明的 Bean\
  \ 的方法执行连接点。因此，这里只介绍 Spring AOP 支持的切点表达式。有关 AspectJ 切点语言的完整描述，请参考 AspectJ 官方网站上提供的\
  \ AspectJ 编程指南（[`www.eclipse.org/aspectj/`](http://www.eclipse.org/aspectj/)）。\n\
  \nSpring 2.x AOP 使用 AspectJ 切点语言来定义其切点。实际上，Spring AOP 在运行时通过使用 AspectJ 提供的库来解释切点表达式。\n\
