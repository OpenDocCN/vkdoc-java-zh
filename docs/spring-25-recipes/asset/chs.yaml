  \n</bean>\n\n**9-4. 使用 Hibernate 的上下文会话持久化对象**\n\n问题\n\nSpring 的 `HibernateTemplate`\
  \ 可以通过为你管理会话和事务来简化 DAO 的实现。然而，使用 `HibernateTemplate` 意味着你的 DAO 必须依赖 Spring 的 API。\n\
  \n解决方案\n\nSpring 的 `HibernateTemplate` 有一个替代方案，即使用 Hibernate 的上下文会话。在 Hibernate\
  \ 3 中，会话工厂能够为你管理上下文会话，并允许你通过 `getCurrentSession()` 方法获取它们。在单个事务内，每次调用 `getCurrentSession()`\
  \ 方法都会得到同一个会话。这确保了每个事务只有一个 Hibernate 会话，因此它能很好地与 Spring 的事务管理支持协同工作。\n\n工作原理\n\n\
  要使用上下文会话方法，你的 DAO 方法需要访问会话工厂，这可以通过 setter 方法或构造函数参数注入。然后，在每个 DAO 方法中，你从会话工厂获取上下文会话，并使用它进行对象持久化。\n\
  \npackage com.apress.springrecipes.course.hibernate;\n\n...\n\nimport org.hibernate.Query;\n\
  \nimport org.hibernate.SessionFactory;\n\nimport org.springframework.transaction.annotation.Transactional;\n\
  \n9799ch09.qxd 5/6/08 10:05 AM Page 313\n\n第 9 章 **■** Spring ORM 支持\n\n**313**\n\
  \npublic class HibernateCourseDao implements CourseDao {\n\nprivate SessionFactory\
  \ sessionFactory;\n\npublic void setSessionFactory(SessionFactory sessionFactory)\
  \ {\n\nthis.sessionFactory = sessionFactory;\n\n}\n\n@Transactional\n\npublic void\
  \ store(Course course) {\n\nsessionFactory.getCurrentSession().saveOrUpdate(course);\n\
  \n}\n\n@Transactional\n\npublic void delete(Long courseId) {\n\nCourse course =\
  \ (Course) sessionFactory.getCurrentSession().get(\n\nCourse.class, courseId);\n\
  \nsessionFactory.getCurrentSession().delete(course);\n\n}\n\n@Transactional(readOnly\
  \ = true)\n\npublic Course findById(Long courseId) {\n\nreturn (Course) sessionFactory.getCurrentSession().get(\n\
  \nCourse.class, courseId);\n\n}\n\n@Transactional(readOnly = true)\n\npublic List<Course>\
  \ findAll() {\n\nQuery query = sessionFactory.getCurrentSession().createQuery(\n\
  \n\"from Course\");\n\nreturn query.list();\n\n}\n\n}\n\n请注意，你所有的 DAO 方法都必须具有事务性。你可以通过在每个方法或整个类上标注\
  \ `@Transactional` 来实现这一点。这确保了 DAO 方法内的持久化操作将在同一个事务中执行，因此也由同一个会话执行。此外，如果服务层组件的方法调用了多个\
  \ DAO 方法，并且它将自己的事务传播给这些方法，那么所有这些 DAO 方法也将在同一个会话中运行。\n\n在 Hibernate 的 Bean 配置文件（即\
