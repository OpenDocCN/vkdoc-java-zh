  \ 10:53 AM Page 114\n\n**114**\n\nC H A P T E R 4 **■** A D VA N C E D S P R I N\
  \ G I O C C O N TA I N E R\n\n**4-9. 让 Bean 感知容器**\n\n**问题**\n\n一个设计良好的组件不应直接依赖其容器。然而，有时你的\
  \ Bean 需要感知容器的资源。\n\n**解决方案**\n\n你的 Bean 可以通过实现某些“感知”接口来感知 Spring IoC 容器的资源，如表 4-2\
  \ 所示。Spring 将通过这些接口中定义的 setter 方法将相应资源注入到你的 Bean 中。\n\n**表 4-2.** *Spring 中常见的感知接口*\n\
  \n| **感知接口** | **目标资源** |\n| --- | --- |\n| BeanNameAware | 在 IoC 容器中配置的其实例的 Bean\
  \ 名称 |\n| BeanFactoryAware | 当前的 Bean 工厂，通过它可以调用容器的服务 |\n| ApplicationContextAware*\
  \ | 当前的应用程序上下文，通过它可以调用容器的服务 |\n| MessageSourceAware | 消息源，通过它可以解析文本消息 |\n| ApplicationEventPublisherAware\
  \ | 应用程序事件发布器，通过它可以发布应用程序事件 |\n| ResourceLoaderAware | 资源加载器，通过它可以加载外部资源 |\n\n**\
  \ 实际上，*ApplicationContext* 接口扩展了 *MessageSource*、*ApplicationEventPublisher* 和 *ResourceLoader*\
  \ 接口，因此你只需感知应用程序上下文即可访问所有这些服务。然而，最佳实践是选择能够满足你需求的最小范围的感知接口。*\n\n感知接口中的 setter 方法将在\
  \ Bean 属性设置之后、初始化回调方法调用之前由 Spring 调用，如下列表所示：\n\n\n\n**1.** 通过构造函数或工厂方法创建 Bean 实例。\n\
  \n**2.** 为 Bean 的属性设置值和 Bean 引用。\n\n**3\\. 调用感知接口中定义的 setter 方法。**\n\n**4.** 调用初始化回调方法。\n\
  \n**5.** Bean 已准备好，可供使用。\n\n**6.** 当容器关闭时，调用销毁回调方法。\n\n9799ch04.qxd 4/10/08 10:53\
  \ AM Page 115\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n**115**\n\n请记住，一旦你的 Bean 实现了感知接口，它们就与\
  \ Spring 绑定在一起，并且在 Spring IoC 容器之外可能无法正常工作。你必须仔细考虑是否有必要实现此类专有接口。\n\n工作原理\n\n例如，你可以通过实现\
  \ `BeanNameAware` 接口，让你的收银员 Bean 感知其在 IoC 容器中的 Bean 名称。当这个 Bean 名称被注入后，你可以将其保存为收银员名称。这可以省去为收银员设置另一个名称属性的麻烦。\n\
  \n```java\npackage com.apress.springrecipes.shop;\n\n...\n\nimport org.springframework.beans.factory.BeanNameAware;\n\
  \npublic class Cashier implements **BeanNameAware** {\n\n...\n\npublic void setBeanName(String\
  \ beanName) {\n\nthis.name = beanName;\n\n}\n\n}\n```\n\n你可以通过使用 Bean 名称作为收银员名称来简化收银员\
  \ Bean 的声明。这样，你就可以省去 `name` 属性的配置，或许还有 `setName()` 方法。\n\n```xml\n<bean id=\"cashier1\"\
  \ class=\"com.apress.springrecipes.shop.Cashier\">\n    <property name=\"path\"\
  \ value=\"c:/cashier\" />\n</bean>\n```\n\n**■注意** 你是否还记得，你可以直接将字段名和属性路径指定为 `FieldRetrievingFactoryBean`\
  \ 和 `PropertyPathFactoryBean` 的 Bean 名称？实际上，这两个工厂 Bean 都实现了 `BeanNameAware` 接口。\n\
  \n**4-10. 创建 Bean 后处理器**\n\n问题\n\n你希望在 Spring IoC 容器中注册自己的插件，以便在 Bean 构建期间处理 Bean\
  \ 实例。\n\n解决方案\n\n*Bean 后处理器* 允许在初始化回调方法之前和之后进行额外的 Bean 处理。Bean 后处理器的主要特点是它会逐个处理\
  \ IoC 容器中的所有 Bean 实例，而不仅仅是单个 Bean 实例。通常，Bean 后处理器用于检查 Bean 属性的有效性或根据特定标准更改 Bean\
  \ 属性。\n\nBean 后处理器的基本要求是实现 `BeanPostProcessor` 接口。你可以通过实现 `postProcessBeforeInitialization()`\
  \ 和 `postProcessAfterInitialization()` 方法来处理每个 Bean 在初始化回调方法之前和之后的操作。然后，Spring 会在调用初始化回调方法之前和之后，将每个\
  \ Bean 实例传递给这两个方法，如下列表所示：\n\n**1.** 通过构造函数或工厂方法创建 Bean 实例。\n\n**2.** 为 Bean 的属性设置值和\
  \ Bean 引用。\n\n**3.** 调用感知接口中定义的 setter 方法。\n\n**4\\. 将 Bean 实例传递给每个 Bean 后处理器的**\
  \ `postProcessBeforeInitialization()` **方法。**\n\n**5.** 调用初始化回调方法。\n\n**6\\. 将 Bean\
  \ 实例传递给每个 Bean 后处理器的** `postProcessAfterInitialization()` **方法。**\n\n**7.** Bean\
  \ 已准备好，可供使用。\n\n**8.** 当容器关闭时，调用销毁回调方法。\n\n当使用 Bean 工厂作为 IoC 容器时，Bean 后处理器只能通过编程方式注册，或者更准确地说，通过\
  \ `addBeanPostProcessor()` 方法注册。但是，如果你使用的是应用上下文，注册将变得非常简单，只需在 Bean 配置文件中声明一个处理器实例，它就会自动注册。\n\
  \n工作原理\n\n假设你想确保在打开日志文件之前，`Cashier` 的日志路径已经存在。这是为了避免 `FileNotFoundException`。由于这是所有需要在文件系统中进行存储的组件的常见需求，你最好以一种通用且可重用的方式来实现它。在\
  \ Spring 中，Bean 后处理器是实现此类功能的理想选择。\n\n首先，为了让 Bean 后处理器区分哪些 Bean 需要被检查，你需要创建一个标记接口\
  \ `StorageConfig`，供你的目标 Bean 实现。此外，为了让你的 Bean 后处理器检查路径是否存在，它必须能够访问 `path` 属性。这可以通过向该接口添加\
  \ `getPath()` 方法来实现。\n\n```java\npackage com.apress.springrecipes.shop;\n\npublic\
  \ interface StorageConfig {\n\n    public String getPath();\n\n}\n```\n\n9799ch04.qxd\
  \ 4/10/08 10:53 AM Page 117\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n**117**\n\n然后，你应该让\
  \ `Cashier` 类实现这个标记接口。你的 Bean 后处理器将只检查实现了此接口的 Bean。\n\n```java\npackage com.apress.springrecipes.shop;\n\
  \n...\n\npublic class Cashier implements BeanNameAware, **StorageConfig** {\n\n\
  ...\n\npublic String getPath() {\n\nreturn path;\n\n}\n\n}\n```\n\n现在，你可以编写一个用于路径检查的\
  \ Bean 后处理器了。由于执行路径检查的最佳时机是在初始化方法中打开文件之前，因此你实现 `postProcessBeforeInitialization()`\
  \ 方法来执行检查。\n\n```java\npackage com.apress.springrecipes.shop;\n\n...\n\nimport org.springframework.beans.BeansException;\n\
  \nimport org.springframework.beans.factory.config.BeanPostProcessor;\n\npublic class\
  \ PathCheckingBeanPostProcessor implements BeanPostProcessor {\n\n    public Object\
  \ postProcessBeforeInitialization(Object bean, String beanName) throws BeansException\
  \ {\n\n        if (bean instanceof StorageConfig) {\n\n            String path =\
  \ ((StorageConfig) bean).getPath();\n\n            File file = new File(path);\n\
  \n            if (!file.exists()) {\n\n                file.mkdirs();\n\n      \
  \      }\n\n        }\n\n        return bean;\n\n    }\n\n    public Object postProcessAfterInitialization(Object\
  \ bean, String beanName) throws BeansException {\n\n        return bean;\n\n   \
  \ }\n\n}\n```\n\n在 Bean 构建期间，Spring IoC 容器会逐个将所有 Bean 实例传递给你的 Bean 后处理器，因此你必须通过检查标记接口\
  \ `StorageConfig` 来过滤 Bean。如果某个 Bean 实现了此接口，你可以通过 `getPath()` 方法访问其 `path` 属性，并检查该路径在文件系统中是否存在。如果该路径不存在，则使用\
  \ `File.mkdirs()` 方法创建它。\n\n`postProcessBeforeInitialization()` 和 `postProcessAfterInitialization()`\
  \ 方法都必须返回正在处理的 Bean 的实例。这意味着你甚至可以在 Bean 后处理器中用全新的实例替换原始的 Bean 实例。\n\n9799ch04.qxd\
  \ 4/10/08 10:53 AM Page 118\n\n**118**\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n请记住，即使你在方法中什么都不做，也必须返回原始的\
  \ Bean 实例。\n\n要在应用上下文中注册 Bean 后处理器，只需在 Bean 配置文件中声明它的一个实例。应用上下文将能够检测到哪个 Bean 实现了\
  \ `BeanPostProcessor` 接口，并注册它以处理容器中所有其他的 Bean 实例。\n\n```xml\n<beans ...>\n    ...\n\
  \    <bean class=\"com.apress.springrecipes.shop.PathCheckingBeanPostProcessor\"\
