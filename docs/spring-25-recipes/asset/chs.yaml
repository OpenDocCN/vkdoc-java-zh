  \ 和 PDF 视图**\n\n问题\n\n\n\n尽管 HTML 是显示网页内容最常用的方法，但有时用户可能希望从你的 Web 应用程序中以 Excel 或\
  \ PDF 格式导出内容。在 Java 中，有几个库可以帮助生成 Excel 和 PDF 文件。然而，要在 Web 应用程序中直接使用这些库，你必须在后台生成文件，并将其作为二进制附件返回给用户。为此，你需要处理\
  \ HTTP 响应头和输出流。\n\n解决方案\n\nSpring 将 Excel 和 PDF 文件的生成集成到了其 MVC 框架中。你可以将 Excel 和\
  \ PDF 文件视为特殊类型的视图，因此你可以在控制器中一致地处理 Web 请求，并将数据添加到模型中，以便传递给 Excel 和 PDF 视图。通过这种方式，你无需处理\
  \ HTTP 响应头和输出流。\n\nSpring MVC 支持使用 Apache POI 库 (http://poi.apache.org) 或 JExcelAPI\
  \ 库 (http://jexcelapi.sourceforge.net) 生成 Excel 文件。相应的视图类是 AbstractExcelView 和 AbstractJExcelView。PDF\
  \ 文件由 iText 库 (http://www.lowagie.com/iText) 生成，相应的视图类是 AbstractPdfView。\n\n工作原理\n\
  \n假设你的用户希望生成某一天的预约摘要报告。他们希望该报告以 Excel 或 PDF 格式生成。对于此报告生成功能，你需要在服务层声明一个方法，该方法返回指定日期的所有预约：\n\
  \npackage com.apress.springrecipes.court.service;\n\n...\n\npublic interface ReservationService\
  \ {\n\n...\n\npublic List<Reservation> findByDate(Date date);\n\n}\n\n然后，你通过遍历所有已创建的预约来为此方法提供一个简单的实现：\n\
  \npackage com.apress.springrecipes.court.service;\n\n...\n\npublic class ReservationServiceImpl\
  \ implements ReservationService {\n\n...\n\npublic List<Reservation> findByDate(Date\
  \ date) {\n\nList<Reservation> result = new ArrayList<Reservation>();\n\nfor (Reservation\
  \ reservation : reservations) {\n\nif (reservation.getDate().equals(date)) {\n\n\
  result.add(reservation);\n\n9799ch10.qxd 5/14/08 3:31 PM Page 382\n\n**382**\n\n\
  第 10 章 **■** S P R I N G M V C 框 架\n\n}\n\n}\n\nreturn result;\n\n}\n\n}\n\n现在，你可以编写一个简单的控制器，从\
  \ URL 中获取日期和格式参数。日期参数将被格式化为日期对象，并传递给服务层以查询预约。格式参数用于指示报告应以 Excel 还是 PDF 格式生成。\n\n\
  package com.apress.springrecipes.court.web;\n\n...\n\nimport org.springframework.web.bind.ServletRequestUtils;\n\
  \nimport org.springframework.web.servlet.ModelAndView;\n\nimport org.springframework.web.servlet.mvc.AbstractController;\n\
  \npublic class ReservationSummaryController extends AbstractController {\n\nprivate\
  \ ReservationService reservationService;\n\npublic void setReservationService(ReservationService\
  \ reservationService) {\n\nthis.reservationService = reservationService;\n\n}\n\n\
  protected ModelAndView handleRequestInternal(HttpServletRequest request,\n\nHttpServletResponse\
  \ response) throws Exception {\n\nString date =\n\nServletRequestUtils.getRequiredStringParameter(request,\
  \ \"date\"); String format =\n\nServletRequestUtils.getRequiredStringParameter(request,\
  \ \"format\"); Date summaryDate = new SimpleDateFormat(\"yyyy-MM-dd\").parse(date);\
