  \n}\n\n}\n\n被切入点匹配到的执行点被称为*连接点*。在这个术语中，切入点是用于匹配一组连接点的表达式，而通知则是在特定连接点执行的动作。\n\n为了让你的通知能够访问当前连接点的详细信息，你可以在通知方法中声明一个\
