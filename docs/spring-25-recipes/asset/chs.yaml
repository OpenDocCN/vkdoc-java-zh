  \n<value>新西兰</value>\n\n</list>\n\n</property>\n\n</bean>\n\n要向你的 portlet 应用程序添加一个新的\
  \ portlet，你需要在 portlet 部署描述符 `portlet.xml` 中创建一个 `<portlet>` 条目。请注意，此 portlet 仅支持视图模式。\n\
