  \n</supports>\n\n<portlet-info>\n\n<title>旅游</title>\n\n</portlet-info>\n\n</portlet>\n\
  \n</portlet-app>\n\n**创建表单控制器**\n\n现在，让我们创建一个控制器来处理旅游预订表单。Spring Portlet MVC 提供的\
  \ `SimpleFormController` 类也可以将表单字段值绑定到其命令对象的同名属性上。它支持与其 Web MVC 对应类相同的大部分生命周期回调方法。例如，你可以在\
  \ `initBinder()` 中注册自定义属性编辑器，并在 `referenceData()` 中为此表单提供参考数据。\n\npackage com.apress.springrecipes.travel.tour;\n\
  \n...\n\nimport javax.portlet.PortletRequest;\n\n9799ch14.qxd 5/14/08 4:26 PM Page\
  \ 532\n\n**532**\n\n第 14 章 **■** S P R I N G P O RT L E T M V C 框 架\n\nimport org.springframework.beans.propertyeditors.CustomDateEditor;\n\
  \nimport org.springframework.web.portlet.bind.PortletRequestDataBinder;\n\nimport\
  \ org.springframework.web.portlet.mvc.SimpleFormController;\n\npublic class BookingFormController\
  \ extends SimpleFormController {\n\nprivate TourService tourService;\n\npublic BookingFormController()\
  \ {\n\nsetCommandClass(BookingForm.class);\n\nsetCommandName(\"bookingForm\");\n\
  \n}\n\npublic void setTourService(TourService tourService) {\n\nthis.tourService\
  \ = tourService;\n\n}\n\nprotected void initBinder(PortletRequest request,\n\nPortletRequestDataBinder\
  \ binder) {\n\nSimpleDateFormat dateFormat = new SimpleDateFormat(\"yyyy-MM-dd\"\
  ); dateFormat.setLenient(false);\n\nbinder.registerCustomEditor(Date.class, new\
  \ CustomDateEditor(\n\ndateFormat, true));\n\n}\n\nprotected Map referenceData(PortletRequest\
  \ request) {\n\nMap referenceData = new HashMap();\n\nreferenceData.put(\"locations\"\
  , tourService.getLocations());\n\nreturn referenceData;\n\n}\n\nprotected void onSubmitAction(Object\
  \ command) {\n\nBookingForm form = (BookingForm) command;\n\ntourService.processBooking(form);\n\
  \n}\n\n}\n\n\n\nPortlet MVC 中的 SimpleFormController 类与其 Web MVC 版本的不同之处在于，它必须处理两种类型的\
  \ portlet 请求：渲染请求和动作请求。当一个表单通过映射到表单控制器且无错误的动作请求提交时，其 `onSubmitAction()` 方法将被调用来处理表单提交。在此方法中，你必须处理表单数据，例如将其存储到数据库中。然而，你无需为此方法返回\
  \ `ModelAndView` 对象，因为动作请求不期望渲染视图。动作请求完成后，portlet 容器将要求同一页面中的每个 portlet 处理一个渲染请求。如果表单处理过程中未发生错误，则会调用表单控制器的\
  \ `onSubmitRender()` 方法。默认情况下，它仅渲染表单成功视图，因此在大多数情况下你无需重写该方法。\n\n9799ch14.qxd 5/14/08\
  \ 4:26 PM 第 533 页\n\n第 14 章 **■** S P R I N G P O RT L E T M V C 框 架\n\n**533**\n\
  \n你可以使用 Spring 2.0 表单标签库为此控制器创建表单视图。让我们在 JSP 文件 `/WEB-INF/jsp/tour/bookingForm.jsp`\
  \ 中创建它。请注意，此表单将提交到动作 URL。\n\n<%@ [taglib prefix=\"portlet\" uri=\"http://java.sun.com/portlet\"\
  \ %>](http://java.sun.com/portlet)\n\n[<%@ taglib prefix=\"form\" uri=\"http://www.springframework.org/tags/form\"\
  \ %>](http://www.springframework.org/tags/form)\n\n**<portlet:actionURL var=\"formAction\"\
  \ />**\n\n<form:form method=\"POST\" action=\" **${formAction}**\" commandName=\"\
  bookingForm\">\n\n<table>\n\n<tr>\n\n<td>游客</td>\n\n<td><form:input path=\"tourist\"\
  \ /></td>\n\n<td><form:errors path=\"tourist\" cssClass=\"portlet-msg-error\" /></td>\n\
