  \n第 19 章 **■** 在 Spring 中使用脚本\n\n**19-2. 将 Spring Bean 注入到脚本中**\n\n问题\n\n有时，你的脚本可能需要某些\
  \ Java 对象的帮助来完成其任务。在 Spring 中，你必须允许你的脚本访问 IoC 容器中声明的 Bean。\n\n解决方案\n\n你可以像注入简单数据类型的属性一样，将\
  \ Spring IoC 容器中声明的 Bean 注入到脚本中。\n\n工作原理\n\n假设你希望动态计算利率。首先，定义以下接口，允许实现返回年利率、月利率和日利率：\n\
  \npackage com.apress.springrecipes.interest;\n\npublic interface RateCalculator\
  \ {\n\npublic double getAnnualRate();\n\npublic double getMonthlyRate();\n\npublic\
  \ double getDailyRate();\n\n}\n\n对于这个例子，你只需通过一个固定的年利率来计算这些利率，从而简单地实现此接口。该年利率可以通过\
  \ setter 方法注入。\n\npackage com.apress.springrecipes.interest;\n\npublic class FixedRateCalculator\
  \ implements RateCalculator {\n\nprivate double rate;\n\npublic void setRate(double\
  \ rate) {\n\nthis.rate = rate;\n\n}\n\npublic double getAnnualRate() {\n\nreturn\
  \ rate;\n\n}\n\npublic double getMonthlyRate() {\n\nreturn rate / 12;\n\n}\n\n9799ch19.qxd\
  \ 5/15/08 5:09 PM 第 703 页\n\n第 19 章 **■** 在 Spring 中使用脚本\n\n**703**\n\npublic double\
  \ getDailyRate() {\n\nreturn rate / 365;\n\n}\n\n}\n\n然后，通过提供一个年利率，在 IoC 容器中声明这个利率计算器。\n\
  \n<bean id=\"rateCalculator\"\n\nclass=\"com.apress.springrecipes.interest.FixedRateCalculator\"\
  >\n\n<property name=\"rate\" value=\"0.05\" />\n\n</bean>\n\n最后，你的利率计算器应该使用一个 `RateCalculator`\
  \ 对象，而不是一个固定的利率值。\n\npackage com.apress.springrecipes.interest;\n\npublic interface\
  \ InterestCalculator {\n\n**public void setRateCalculator(RateCalculator rateCalculator);**\n\
  \npublic double calculate(double amount, double year);\n\n}\n\n**将 Spring Bean 注入到\
  \ JRuby 中**\n\n在 JRuby 脚本中，你可以将注入的 `RateCalculator` 对象存储在一个实例变量中，并使用它进行利率计算。\n\n\
  class SimpleInterestCalculator\n\ndef setRateCalculator(rateCalculator)\n\n@rateCalculator\
  \ = rateCalculator\n\nend\n\ndef calculate(amount, year)\n\namount * year * @rateCalculator.getAnnualRate\n\
  \nend\n\nend\n\nSimpleInterestCalculator.new\n\n在 Bean 声明中，你可以通过在 `ref` 属性中指定 Bean\
