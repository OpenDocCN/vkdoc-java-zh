  \n</beans>\n\n**14-5\\. 小结**\n\n在本章中，你学习了如何使用 Spring Portlet MVC 开发一个 Portlet 应用程序，它与\
  \ Spring Web MVC 非常相似，因为其大部分内容都是从 Web MVC 移植而来的。\n\nPortlet 与 Servlet 的主要区别在于 Portlet\
  \ 中有两种类型的 URL：渲染 URL 和动作 URL。当用户触发一个渲染 URL 时，Portlet 容器将要求同一页面中的所有 Portlet 处理一个渲染请求以渲染其视图。\n\
  \n然而，当用户触发一个动作 URL 时，Portlet 容器将首先要求目标 Portlet 处理一个动作请求。当动作请求完成后，Portlet 容器将要求同一页面中的所有\
  \ Portlet（包括目标 Portlet）处理一个渲染请求以渲染其视图。\n\n与 Web 应用程序不同，你无法在 Portlet 中直接控制 URL。因此，Spring\
  \ Portlet MVC 中映射 Portlet 请求的主要策略是基于 Portlet 模式和请求参数，或者两者结合。你还可以链式组合多个处理器映射以满足需求。\n\
  \nSpring Portlet MVC 提供了一个表单控制器，它与 Spring Web MVC 中的表单控制器非常相似。然而，由于存在两种类型的 Portlet\
  \ 请求，表单处理流程与 Spring Web MVC 中的表单控制器略有不同。\n\nSpring 2.5 支持基于注解的控制器开发，既适用于 Web MVC\
  \ 也适用于 Portlet MVC。你的控制器无需继承传统的控制器类，只需包含注解即可。Spring 可以自动检测你的控制器和处理器映射，因此你无需手动配置它们。\n\
  \n在下一章中，你将学习如何使用 Spring Web Flow 管理复杂的 Web 应用程序页面流程。\n\n9799ch14.qxd 5/14/08 4:26\
  \ PM 第 544 页\n\n9799ch15.qxd 5/22/08 4:38 PM 第 545 页\n\n第 15 章\n\nSpring Web Flow\n\
  \n**本**章中，你将学习如何使用 Spring Web Flow（Spring 框架的一个子项目）来建模和管理 Web 应用程序的 UI 流程。Spring\
  \ Web Flow 的用法从 1.0 版本到 2.0 版本发生了显著变化。Spring Web Flow 2.0 比 1.0 更简单，并在约定优于配置方面做了大量改进。本章将仅关注\
  \ Spring Web Flow 2.0。*请注意，Spring Web Flow 2.0 需要 Spring 框架 2.5.4 或更高版本。*\n\n在传统的\
  \ Web 应用程序开发中，开发者通常以编程方式管理 UI 流程，因此这些流程难以维护和重用。Spring Web Flow 提供了一种流程定义语言，能够以高度可配置的方式将\
  \ UI 流程与表示逻辑分离，从而使流程易于更改和重用。Spring Web Flow 不仅支持 Spring Web MVC，还支持 Spring Portlet\
  \ MVC 以及其他 Web 应用程序框架，如 Struts 和 JSF。\n\n\n\n完成本章学习后，你将能够开发基于 Spring MVC 和 JSF 的基本\
  \ Web 应用程序，并使用 Spring Web Flow 管理其 UI 流程。本章仅涉及 Spring Web Flow 的基本特性和配置，更多细节请参考\
  \ Spring Web Flow 参考指南。\n\n**15-1\\. 使用 Spring Web Flow 管理简单的 UI 流程**\n\n问题\n\n\
  你希望在 Spring MVC 应用程序中使用 Spring Web Flow 管理一个简单的 UI 流程。\n\n解决方案\n\nSpring Web Flow\
  \ 允许你将 UI 活动建模为*流程*。它支持通过 Java 或 XML 定义流程。由于 XML 的强大功能和广泛使用，基于 XML 的流程定义被广泛采用。你还可以轻松修改基于\
  \ XML 的流程定义，而无需重新编译代码。此外，Spring IDE 通过提供可视化编辑器来编辑基于 XML 的流程定义，从而支持 Spring Web Flow。\n\
  \n一个流程定义由一个或多个*状态*组成，每个状态对应流程中的一个步骤。Spring Web Flow 内置了多种状态类型，包括视图状态、动作状态、决策状态、子流程状态和结束状态。当一个状态完成其任务后，它会触发一个*事件*。事件包含一个源和一个事件\
  \ ID，可能还包含一些属性。每个状态可能包含零个或多个*转换*，每个转换将返回的事件 ID 映射到下一个状态。\n\n**545**\n\n9799ch15.qxd\
  \ 5/22/08 4:38 PM Page 546\n\n**546**\n\n第 15 章 **■** Spring Web Flow\n\n当用户触发一个新流程时，Spring\
  \ Web Flow 可以自动检测该流程的起始状态（即没有来自其他状态转换的状态），因此你无需显式指定起始状态。一个流程可以在其定义的某个结束状态终止。这标志着流程结束，并释放该流程持有的资源。\n\
  \n工作原理\n\n假设你要为图书馆开发一个在线系统。该系统的第一个页面是欢迎页面。此页面上有两个链接。当用户点击“下一步”链接时，系统将显示图书馆介绍页面。该介绍页面上有另一个“下一步”链接，点击它将显示菜单页面。如果用户在欢迎页面上点击“跳过”链接，系统将跳过介绍页面，直接显示菜单页面。此欢迎\
  \ UI 流程如图 15-1 所示。本示例将向你展示如何使用 Spring MVC 开发此应用程序，并使用 Spring Web Flow 管理流程。\n\n\
  **图 15-1.** *欢迎 UI 流程*\n\n在图书馆介绍页面中，你希望显示图书馆将关闭的公共假日。这些假日从后端服务查询得到，其接口定义如下所示：\n\n\
  package com.apress.springrecipes.library.service;\n\n...\n\npublic interface LibraryService\
  \ {\n\npublic List<Date> getHolidays();\n\n}\n\n出于测试目的，你可以为此服务实现硬编码几个假日，如下所示：\n\n\
  package com.apress.springrecipes.library.service;\n\n...\n\npublic class LibraryServiceImpl\
  \ implements LibraryService {\n\npublic List<Date> getHolidays() {\n\nList<Date>\
  \ holidays = new ArrayList<Date>();\n\n9799ch15.qxd 5/22/08 4:38 PM Page 547\n\n\
