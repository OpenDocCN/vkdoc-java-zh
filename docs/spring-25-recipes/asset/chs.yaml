  \ weight) {\n\nreturn postageService.calculatePostage(country, weight);\n\n}\n\n\
  }\n```\n\n当你继承 `AbstractStatelessSessionBean` 类后，你的 EJB 类就不再需要实现任何 EJB 生命周期方法，但如有必要，你仍然可以重写它们。请注意，这个类有一个\
  \ `onEjbCreate()` 方法，你必须实现它来执行初始化任务。在这里，你只需从 Spring IoC 容器中获取 `postageService` bean\
