  \n\n通过依赖注入，你无需手动从应用上下文中检索它们。\n\n解决方案\n\nSpring 的测试支持工具可以将托管应用上下文中的 Bean 自动注入到你的测试中，作为测试夹具。\n\
  \n在使用 Spring 2.5 之前版本中的 JUnit 3.8 遗留支持时，你的测试类可以继承 `AbstractDependencyInjectionSpringContextTests`\
