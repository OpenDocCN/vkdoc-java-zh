  <servlet-name>weather</servlet-name>\n<servlet-class>\n**org.springframework.ws.transport.http.MessageDispatcherServlet**\n\
  </servlet-class>\n\n\n\n<load-on-startup>1</load-on-startup>\n\n</servlet>\n\n<servlet-mapping>\n\
  \n<servlet-name>weather</servlet-name>\n\n<url-pattern> **/services/***</url-pattern>\n\
  \n</servlet-mapping>\n\n</web-app>\n\n在 Spring MVC 配置文件 `weather-servlet.xml` 中，首先为天气服务实现声明一个\
  \ bean。稍后，你将定义端点（endpoints）和映射（mappings）来处理 Web 服务请求。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)\n\nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)\n\nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n9799ch16.qxd 5/15/08 5:04 PM Page 608\n\n**608**\n\n第 16 章 **■** Spring 远程调用与\
  \ Web 服务\n\n<bean id=\"weatherService\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceImpl\"\
  \ />\n\n</beans>\n\n**将 Web 服务请求映射到端点**\n\n在 Spring MVC 应用程序中，使用处理器映射（handler mapping）将\
  \ Web 请求映射到处理器。但在 Spring-WS 应用程序中，应使用端点映射（endpoint mapping）将 Web 服务请求映射到端点。\n\n\
  最常见的端点映射是 `PayloadRootQNameEndpointMapping`。它根据请求负载根元素的名称将 Web 服务请求映射到端点。\n\n此端点映射使用的名称是限定名称（即包含命名空间）。因此，必须在映射键中包含命名空间，该命名空间位于大括号内。\n\
  \n<bean class=\"org.springframework.ws.server.endpoint.mapping. **➥**\n\nPayloadRootQNameEndpointMapping\"\
  >\n\n<property name=\"mappings\">\n\n<props>\n\n<prop key=\"{[`springrecipes.apress.com/weather/schemas}**➥**`](http://springrecipes.apress.com/weather/schemas)\n\
  \nGetTemperaturesRequest\">\n\ntemperatureEndpoint\n\n</prop>\n\n</props>\n\n</property>\n\
  \n</bean>\n\n**创建服务端点**\n\nSpring-WS 支持多种 XML 解析 API，包括 DOM、JDOM、dom4j、SAX、StAX\
  \ 和 XOM。作为示例，我将使用 dom4j [(http://www.dom4j.org)](http://www.dom4j.org) 来创建服务端点。\n\
  \n使用其他 XML 解析 API 创建端点的方法非常相似。\n\n你可以通过扩展 `AbstractDom4jPayloadEndpoint` 类来创建 dom4j\
  \ 端点。此类中定义的核心方法是你必须重写的 `invokeInternal()` 方法。在此方法中，你可以访问请求 XML 元素（类型为 `org.dom4j.Element`）和响应文档（类型为\
  \ `org.dom4j.Document`），它们作为方法参数传入。响应文档的目的是让你从中创建响应元素。现在，你在此方法中需要做的就是处理请求消息并返回响应消息。\n\
  \n**■注意** 要使用带 XPath 的 dom4j 创建服务端点，必须将 `dom4j-1.6.1.jar`（位于 Spring-WS 安装目录的 `lib/dom4j`\
  \ 目录下）和 `jaxen-1.1.1.jar`（位于 `lib/jaxen` 目录下）复制到 `WEB-INF/lib` 目录。\n\n9799ch16.qxd\
  \ 5/15/08 5:04 PM Page 609\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n**609**\n\npackage\
  \ com.apress.springrecipes.weather;\n\n...\n\nimport org.dom4j.Document;\n\nimport\
  \ org.dom4j.Element;\n\nimport org.dom4j.XPath;\n\nimport org.dom4j.xpath.DefaultXPath;\n\
  \nimport org.springframework.ws.server.endpoint.AbstractDom4jPayloadEndpoint; public\
  \ class TemperatureDom4jEndpoint extends AbstractDom4jPayloadEndpoint {\n\nprivate\
  \ static final String namespaceUri =\n\n[\"http://springrecipes.apress.com/weather/schemas\"\
  ](http://springrecipes.apress.com/weather/schemas) ; private XPath cityPath;\n\n\
  private XPath datePath;\n\nprivate DateFormat dateFormat;\n\nprivate WeatherService\
  \ weatherService;\n\npublic TemperatureDom4jEndpoint() {\n\n**// 创建 XPath 对象，包含命名空间**\n\
  \nMap<String, String> namespaceUris = new HashMap<String, String>(); namespaceUris.put(\"\
  weather\", namespaceUri);\n\n\n\ncityPath = new DefaultXPath(\n\n\"/weather:GetTemperaturesRequest/weather:city\"\
  );\n\ncityPath.setNamespaceURIs(namespaceUris);\n\ndatePath = new DefaultXPath(\n\
  \n\"/weather:GetTemperaturesRequest/weather:date\");\n\ndatePath.setNamespaceURIs(namespaceUris);\n\
  \ndateFormat = new SimpleDateFormat(\"yyyy-MM-dd\");\n\n}\n\npublic void setWeatherService(WeatherService\
  \ weatherService) {\n\nthis.weatherService = weatherService;\n\n}\n\nprotected Element\
  \ invokeInternal(Element requestElement,\n\nDocument responseDocument) throws Exception\
  \ {\n\n**// 从请求消息中提取服务参数**\n\nString city = cityPath.valueOf(requestElement);\n\n\
  List<Date> dates = new ArrayList<Date>();\n\nfor (Object node : datePath.selectNodes(requestElement))\
  \ {\n\nElement element = (Element) node;\n\ndates.add(dateFormat.parse(element.getText()));\n\
  \n}\n\n9799ch16.qxd 5/15/08 5:04 PM Page 610\n\n**610**\n\n第 16 章 **■** S P R I\
  \ N G 远程调用与 W E B 服务\n\n**// 调用后端服务处理请求**\n\nList<TemperatureInfo> temperatures\
  \ =\n\nweatherService.getTemperatures(city, dates);\n\n**// 根据后端服务结果构建响应消息**\n\n\
  Element responseElement = responseDocument.addElement(\n\n\"GetTemperaturesResponse\"\
  , namespaceUri);\n\nfor (TemperatureInfo temperature : temperatures) {\n\nElement\
  \ temperatureElement = responseElement.addElement(\n\n\"TemperatureInfo\");\n\n\
  temperatureElement.addAttribute(\"city\", temperature.getCity());\n\ntemperatureElement.addAttribute(\n\
  \n\"date\", dateFormat.format(temperature.getDate()));\n\ntemperatureElement.addElement(\"\
  min\").setText(\n\nDouble.toString(temperature.getMin()));\n\ntemperatureElement.addElement(\"\
  max\").setText(\n\nDouble.toString(temperature.getMax()));\n\ntemperatureElement.addElement(\"\
  average\").setText(\n\nDouble.toString(temperature.getAverage()));\n\n}\n\nreturn\
  \ responseElement;\n\n}\n\n}\n\n在上述 `invokeInternal()` 方法中，你首先从请求消息中提取服务参数。这里，你使用\
  \ XPath 来帮助定位元素。XPath 对象在构造函数中创建，以便它们可以在后续请求处理中被重用。请注意，你必须在 XPath 表达式中包含命名空间，否则它们将无法正确定位元素。\n\
  \n提取服务参数后，你调用后端服务来处理请求。由于此端点配置在 Spring IoC 容器中，因此它可以轻松地通过依赖注入引用其他 Bean。\n\n最后，你根据后端服务的结果构建响应消息。dom4j\
  \ 库提供了丰富的 API 供你构建 XML 消息。请记住，你必须在响应元素中包含默认命名空间。\n\n编写完服务端点后，你可以在 `weather-servlet.xml`\
  \ 中声明它。由于此端点需要天气服务 Bean 的帮助来查询温度，因此你必须对其进行引用。\n\n<bean id=\"temperatureEndpoint\"\
  \n\nclass=\"com.apress.springrecipes.weather.TemperatureDom4jEndpoint\">\n\n<property\
  \ name=\"weatherService\" ref=\"weatherService\" />\n\n</bean>\n\n**发布 WSDL 文件**\n\
  \n完成 Web 服务的最后一步是发布 WSDL 文件。在 Spring-WS 中，你无需手动编写 WSDL 文件，尽管你仍然可以提供手动编写的 WSDL 文件。你只需在\
  \ Web 应用程序上下文中声明一个 `DynamicWsdl11Definition` Bean，然后它就可以动态生成 WSDL 文件。`MessageDispatcherServlet`\
  \ 也可以通过 `WsdlDefinition` 接口检测到此 Bean。\n\n<bean id=\"temperature\"\n\nclass=\"org.springframework.ws.wsdl.wsdl11.DynamicWsdl11Definition\"\
  >\n\n<property name=\"builder\">\n\n<bean class=\"org.springframework.ws.wsdl.wsdl11.builder.\
  \ **➥**\n\nXsdBasedSoap11Wsdl4jDefinitionBuilder\">\n\n<property name=\"schema\"\
  \ value=\"/WEB-INF/temperature.xsd\" />\n\n<property name=\"portTypeName\" value=\"\
  Weather\" />\n\n<property name=\"locationUri\"\n\nvalue=\" [`localhost:8080/weather/services\"\
  `](http://localhost:8080/weather/services) />\n\n</bean>\n\n</property>\n\n</bean>\n\
  \n\n\n此 WSDL 定义 Bean 唯一必须配置的属性是一个构建器，用于从您的 XSD 文件构建 WSDL 文件。`XsdBasedSoap11Wsdl4jDefinitionBuilder`\
  \ 使用 WSDL4J 库构建 WSDL 文件。假设您已将 XSD 文件放在 `WEB-INF`\n\n目录中——您可以在 `schema` 属性中指定此位置。此构建器会扫描\
  \ XSD 文件中以 `Request` 或 `Response` 后缀结尾的元素。然后，它会使用这些元素作为输入和输出消息，在由 `portTypeName`\
  \ 属性指定的 WSDL 端口类型内生成 WSDL 操作。\n\n由于您在 XSD 文件中定义了 `<GetTemperaturesRequest>` 和 `<GetTemperaturesResponse>`，并且将端口类型名称指定为\
  \ `Weather`，WSDL 构建器将为您生成以下 WSDL 端口类型和操作。以下代码片段取自生成的 WSDL 文件：\n\n<wsdl:portType\
  \ name=\"Weather\">\n\n<wsdl:operation name=\"GetTemperatures\">\n\n<wsdl:input\
  \ message=\"schema:GetTemperaturesRequest\"\n\nname=\"GetTemperaturesRequest\" />\n\
  \n<wsdl:output message=\"schema:GetTemperaturesResponse\"\n\nname=\"GetTemperaturesResponse\"\
  \ />\n\n</wsdl:operation>\n\n</wsdl:portType>\n\n最后一个属性 `locationUri` 用于在 WSDL 文件中包含此\
  \ Web 服务的部署位置。为了便于切换到生产环境的 URI，您应该将此 URI 外部化到属性文件中，并使用 Spring 的 `PropertyPlaceholderConfigurer`\
  \ 从中读取属性。\n\n最后，您可以通过将定义 Bean 的名称与 `.wsdl` 后缀拼接来访问此 WSDL 文件。假设您的服务部署在 [`localhost:8080/weather/services`](http://localhost:8080/weather/services)，\n\
  \n并且 WSDL 定义的 Bean 名称为 `temperature`，那么此 WSDL 文件的 URL 将是 [`localhost:8080/weather/services/temperature.wsdl`](http://localhost:8080/weather/services/temperature.wsdl)。\n\
  \n9799ch16.qxd 5/15/08 5:04 PM Page 612\n\n**612**\n\n第 16 章 **■** S P R I N G 远\
  \ 程 调 用 与 W E B 服 务\n\n**16-7. 使用 Spring-WS 调用 Web 服务**\n\n问题\n\n给定一个 Web 服务的契约，您可以根据该契约开始创建服务客户端来调用此服务。您希望使用\
  \ Spring-WS 来创建服务客户端。\n\n解决方案\n\n在客户端使用 Spring-WS 时，可以通过核心模板类 `org.springframework.ws.client.core.WebServiceTemplate`\
  \ 来调用 Web 服务。这与 `JdbcTemplate` 类和其他数据访问模板非常相似，因为它定义了用于发送和接收请求与响应消息的模板方法。\n\n工作原理\n\
  \n现在，让我们创建一个 Spring-WS 客户端，根据发布的契约来调用天气服务。您可以通过解析请求和响应的 XML 消息来创建 Spring-WS 客户端。作为示例，我将使用\
  \ dom4j 来实现它。不过，您也可以自由选择其他 XML\n\n解析 API。\n\n为了屏蔽客户端的底层调用细节，您可以为远程 Web 服务创建一个本地代理。此代理也实现了\
  \ `WeatherService` 接口，并将本地方法调用转换为远程 Web 服务调用。\n\n**■注意** 要使用 Spring-WS 调用 Web 服务，您必须在类路径中包含\
  \ `spring-ws-1.5.0.jar`（位于 Spring-WS 安装目录的 `dist` 目录中）、`stax-api-1.0.1.jar`（位于 `lib/stax`）、`activation-1.1.1.jar`\
  \ 和 `saaj-api-1.3.jar`（位于 `lib/java-ee`），以及 `saaj-impl-1.3.jar`（位于 `lib/saaj`）。要使用\
  \ dom4j，您还需要包含 `dom4j-1.6.1.jar`（位于 `lib/dom4j`）。\n\npackage com.apress.springrecipes.weather;\n\
  \n...\n\nimport org.dom4j.Document;\n\nimport org.dom4j.DocumentHelper;\n\nimport\
  \ org.dom4j.Element;\n\nimport org.dom4j.io.DocumentResult;\n\nimport org.dom4j.io.DocumentSource;\n\
  \nimport org.springframework.ws.client.core.WebServiceTemplate;\n\npublic class\
  \ WeatherServiceProxy implements WeatherService {\n\nprivate static final String\
  \ namespaceUri =\n\n[\"http://springrecipes.apress.com/weather/schemas\";](http://springrecipes.apress.com/weather/schemas)\n\
  \n9799ch16.qxd 5/15/08 5:04 PM Page 613\n\n\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\
  \n**613**\n\nprivate DateFormat dateFormat;\n\nprivate WebServiceTemplate webServiceTemplate;\n\
  \npublic WeatherServiceProxy() throws Exception {\n\ndateFormat = new SimpleDateFormat(\"\
  yyyy-MM-dd\");\n\n}\n\npublic void setWebServiceTemplate(WebServiceTemplate webServiceTemplate)\
  \ {\n\nthis.webServiceTemplate = webServiceTemplate;\n\n}\n\npublic List<TemperatureInfo>\
  \ getTemperatures(String city, List<Date> dates) {\n\n**// 根据方法参数构建请求文档**\n\nDocument\
  \ requestDocument = DocumentHelper.createDocument();\n\nElement requestElement =\
  \ requestDocument.addElement(\n\n\"GetTemperaturesRequest\", namespaceUri);\n\n\
  requestElement.addElement(\"city\").setText(city);\n\nfor (Date date : dates) {\n\
  \nrequestElement.addElement(\"date\").setText(dateFormat.format(date));\n\n}\n\n\
  **// 调用远程 Web 服务**\n\nDocumentSource source = new DocumentSource(requestDocument);\n\
  \nDocumentResult result = new DocumentResult();\n\nwebServiceTemplate.sendSourceAndReceiveToResult(source,\
  \ result);\n\n**// 从响应文档中提取结果**\n\nDocument responsetDocument = result.getDocument();\n\
  \nElement responseElement = responsetDocument.getRootElement();\n\nList<TemperatureInfo>\
  \ temperatures = new ArrayList<TemperatureInfo>(); for (Object node : responseElement.elements(\"\
  TemperatureInfo\")) {\n\nElement element = (Element) node;\n\ntry {\n\nDate date\
  \ = dateFormat.parse(element.attributeValue(\"date\"));\n\ndouble min = Double.parseDouble(element.elementText(\"\
  min\"));\n\ndouble max = Double.parseDouble(element.elementText(\"max\"));\n\ndouble\
  \ average = Double.parseDouble(\n\nelement.elementText(\"average\"));\n\ntemperatures.add(\n\
  \nnew TemperatureInfo(city, date, min, max, average));\n\n} catch (ParseException\
  \ e) {\n\nthrow new RuntimeException(e);\n\n}\n\n}\n\nreturn temperatures;\n\n}\n\
  \n}\n\n9799ch16.qxd 5/15/08 5:04 PM 第 614 页\n\n**614**\n\n第 16 章 **■** Spring 远程调用与\
  \ Web 服务\n\n在 getTemperatures()方法中，首先使用 dom4j API 构建请求消息。WebServiceTemplate 提供了\
  \ sendSourceAndReceiveToResult()方法，该方法接受 java.xml.transform.Source 和 java.xml.transform.Result\
  \ 对象作为参数。你需要构建一个 dom4j DocumentSource 对象来包装请求文档，并创建一个新的 dom4j DocumentResult 对象供该方法写入响应文档。最后，获取响应消息并从中提取结果。\n\
  \n编写完服务代理后，可以在客户端 bean 配置文件（如 client.xml）中声明它。由于此代理需要 WebServiceTemplate 实例来发送和接收消息，因此必须实例化该模板并将其实例注入代理中。同时，为模板指定默认服务\
  \ URI，以便所有请求默认发送到此 URI。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)\n\nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)\n\nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n<bean id=\"client\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceClient\"\
  >\n\n<property name=\"weatherService\" ref=\"weatherServiceProxy\" />\n\n</bean>\n\
  \n<bean id=\"weatherServiceProxy\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceProxy\"\
  >\n\n<property name=\"webServiceTemplate\" ref=\"webServiceTemplate\" />\n\n</bean>\n\
  \n<bean id=\"webServiceTemplate\"\n\nclass=\"org.springframework.ws.client.core.WebServiceTemplate\"\
  >\n\n<property name=\"defaultUri\"\n\nvalue=\" [`localhost:8080/weather/services\"\
  `](http://localhost:8080/weather/services) />\n\n</bean>\n\n</beans>\n\n现在，你可以将这个手动编写的代理注入\
  \ WeatherServiceClient，并通过 Client 主类运行它。\n\n\n\n正如你的 DAO 类可以通过继承 `JdbcDaoSupport`\
  \ 来获取预创建的 `JdbcTemplate` 实例，你的 Web 服务客户端同样可以继承 `WebServiceGatewaySupport` 类来获取 `WebServiceTemplate`\
  \ 实例，而无需显式注入。\n\npackage com.apress.springrecipes.weather;\n\n...\n\nimport org.springframework.ws.client.core.support.WebServiceGatewaySupport;\
  \ public class WeatherServiceProxy **extends WebServiceGatewaySupport**\n\nimplements\
  \ WeatherService {\n\n9799ch16.qxd 5/15/08 5:04 PM Page 615\n\n第 16 章 **■** S P\
  \ R I N G 远程调用与 W E B 服务\n\n**615**\n\npublic List<TemperatureInfo> getTemperatures(String\
  \ city, List<Date> dates) {\n\n...\n\n// 调用远程 Web 服务\n\nDocumentSource source =\
  \ new DocumentSource(requestDocument);\n\nDocumentResult result = new DocumentResult();\n\
  \n**getWebServiceTemplate()**.sendSourceAndReceiveToResult(source, result);\n\n\
  ...\n\n}\n\n}\n\n然而，如果没有显式声明 `WebServiceTemplate` Bean，你必须直接将默认 URI 注入到代理中。该属性的\
  \ setter 方法继承自 `WebServiceGatewaySupport` 类。\n\n<beans ...>\n\n...\n\n<bean id=\"\
  weatherServiceProxy\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceProxy\"\
  >\n\n<property name=\"defaultUri\"\n\nvalue=\" [`localhost:8080/weather/services\"\
  `](http://localhost:8080/weather/services) />\n\n</bean>\n\n</beans>\n\n**16-8\\\
  . 使用 XML 编组技术开发 Web 服务**\n\n问题\n\n为了采用契约优先的方法开发 Web 服务，你必须处理请求和响应 XML 消息。如果直接使用\
  \ XML 解析 API 解析 XML 消息，你将不得不使用底层 API 逐个处理 XML 元素，这是一项繁琐且低效的任务。\n\n解决方案\n\nSpring-WS\
  \ 支持使用 XML 编组技术将对象编组/解组为 XML 文档。通过这种方式，你可以处理对象属性，而不是 XML 元素。这项技术也被称为*对象/XML 映射 (OXM)*，因为你实际上是在对象和\
  \ XML 文档之间进行映射。\n\n要使用 XML 编组技术实现端点，你必须继承 `AbstractMarshallingPayloadEndpoint` 类并为其配置一个\
  \ XML 编组器。表 16-2\n\n列出了 Spring-WS 为不同 XML 编组 API 提供的编组器。\n\n9799ch16.qxd 5/15/08\
  \ 5:04 PM Page 616\n\n**616**\n\n第 16 章 **■** S P R I N G 远程调用与 W E B 服务\n\n**表\
  \ 16-2.** *不同 XML 编组 API 的编组器*\n\n**API**\n\n**编组器**\n\nJAXB 1.0\n\norg.springframework.oxm.jaxb.Jaxb1Marshaller\n\
  \nJAXB 2.0\n\norg.springframework.oxm.jaxb.Jaxb2Marshaller\n\nCastor\n\norg.springframework.oxm.castor.CastorMarshaller\n\
  \nXMLBeans\n\norg.springframework.oxm.xmlbeans.XmlBeansMarshaller\n\nJiBX\n\norg.springframework.oxm.jibx.JibxMarshaller\n\
  \nXStream\n\norg.springframework.oxm.xstream.XStreamMarshaller\n\n要调用 Web 服务，`WebServiceTemplate`\
  \ 也允许你选择一种 XML 编组技术来处理请求和响应 XML 消息。\n\n工作原理\n\n**使用 XML 编组创建服务端点**\n\nSpring-WS\
  \ 支持多种 XML 编组 API，包括 JAXB 1.0、JAXB 2.0、Castor、XMLBeans、JiBX 和 XStream。作为示例，我将使用\
  \ Castor\n\n[(http://www.castor.org](http://www.castor.org)/) 作为编组器来创建一个服务端点。使用其他\
  \ XML 编组 API 的方法非常相似。\n\n使用 XML 编组的第一步是根据 XML 消息格式创建对象模型。这个模型通常可以由编组 API 生成。对于某些编组\
  \ API，对象模型必须由它们生成，以便它们可以插入编组特定的信息。由于 Castor 支持 XML 消息与任意 Java 对象之间的编组，你可以自行开始创建以下类。\n\
  \npackage com.apress.springrecipes.weather;\n\n...\n\npublic class GetTemperaturesRequest\
  \ {\n\nprivate String city;\n\nprivate List<Date> dates;\n\n// 构造方法、Getter 和 Setter\n\
  \n...\n\n}\n\npackage com.apress.springrecipes.weather;\n\n...\n\npublic class GetTemperaturesResponse\
  \ {\n\nprivate List<TemperatureInfo> temperatures;\n\n\n\n// 构造函数、Getter 和 Setter\n\
  \n...\n\n}\n\n9799ch16.qxd 5/15/08 5:04 PM Page 617\n\n第 16 章 **■** S P R I N G\
  \ 远 程 调 用 与 W E B 服 务\n\n**617**\n\n创建好对象模型后，你可以通过扩展 `AbstractMarshallingPayloadEndpoint`\
  \ 类来编写一个编组端点。你必须重写的核心方法是 `invokeInternal()`。在该方法中，你可以将请求对象（已从请求消息中解组）作为方法参数进行访问。现在，你只需在此方法中处理请求对象并返回响应对象即可。随后，该响应对象将被编组为响应\
  \ XML 消息。\n\n**■注意** 要使用 Castor 创建服务端点，你需要将 `castor-1.1.2.jar`（位于 Spring-WS 安装目录的\
  \ `lib/castor` 目录下）和 `xercesImpl-2.8.1.jar`（位于 `lib/xerces` 目录下）复制到 `WEB-INF/lib`\
  \ 目录中。\n\npackage com.apress.springrecipes.weather;\n\n...\n\nimport org.springframework.ws.server.endpoint.AbstractMarshallingPayloadEndpoint;\
  \ public class TemperatureMarshallingEndpoint extends\n\nAbstractMarshallingPayloadEndpoint\
  \ {\n\nprivate WeatherService weatherService;\n\npublic void setWeatherService(WeatherService\
  \ weatherService) {\n\nthis.weatherService = weatherService;\n\n}\n\nprotected Object\
  \ invokeInternal(Object requestObject) throws Exception {\n\nGetTemperaturesRequest\
  \ request = (GetTemperaturesRequest) requestObject;\n\nList<TemperatureInfo> temperatures\
  \ =\n\nweatherService.getTemperatures(request.getCity(), request.getDates());\n\n\
  return new GetTemperaturesResponse(temperatures);\n\n}\n\n}\n\n一个编组端点需要同时设置 marshaller\
  \ 和 unmarshaller 属性。通常，你可以为这两个属性指定同一个 marshaller。对于 Castor，你需要声明一个 `CastorMarshaller`\
  \ bean 作为 marshaller。\n\n<beans ...>\n\n...\n\n<bean id=\"temperatureEndpoint\"\n\
  \nclass=\"com.apress.springrecipes.weather.TemperatureMarshallingEndpoint\">\n\n\
  **<property name=\"marshaller\" ref=\"marshaller\" />**\n\n**<property name=\"unmarshaller\"\
  \ ref=\"marshaller\" />**\n\n<property name=\"weatherService\" ref=\"weatherService\"\
  \ />\n\n</bean>\n\n9799ch16.qxd 5/15/08 5:04 PM Page 618\n\n**618**\n\n第 16 章 **■**\
  \ S P R I N G 远 程 调 用 与 W E B 服 务\n\n<bean id=\"marshaller\"\n\nclass=\"org.springframework.oxm.castor.CastorMarshaller\"\
  >\n\n**<property name=\"mappingLocation\" value=\"classpath:mapping.xml\" />**\n\
  \n</bean>\n\n</beans>\n\n请注意，Castor 需要一个映射配置文件来了解如何将对象与 XML 文档进行相互映射。你可以在类路径根目录下创建此文件，并在\
  \ `mappingLocation` 属性中指定它（例如 `mapping.xml`）。以下 Castor 映射文件定义了 `GetTemperaturesRequest`、`GetTemperaturesResponse`\
  \ 和 `TemperatureInfo` 类的映射：\n\n<!DOCTYPE mapping PUBLIC \"-//EXOLAB/Castor Mapping\
  \ DTD Version 1.0//EN\"\n\n[\"http://castor.org/mapping.dtd](http://castor.org/mapping.dtd)\"\
  >\n\n<mapping>\n\n<class name=\"com.apress.springrecipes.weather.GetTemperaturesRequest\"\
  >\n\n<map-to xml=\"GetTemperaturesRequest\"\n\nns-uri=\" [`springrecipes.apress.com/weather/schemas\"\
  `](http://springrecipes.apress.com/weather/schemas) />\n\n<field name=\"city\" type=\"\
  string\">\n\n<bind-xml name=\"city\" node=\"element\" />\n\n</field>\n\n<field name=\"\
  dates\" collection=\"arraylist\" type=\"string\"\n\nhandler=\"com.apress.springrecipes.weather.DateFieldHandler\"\
  >\n\n<bind-xml name=\"date\" node=\"element\" />\n\n</field>\n\n</class>\n\n<class\
  \ name=\"com.apress.springrecipes.weather.GetTemperaturesResponse\">\n\n<map-to\
  \ xml=\"GetTemperaturesResponse\"\n\nns-uri=\" [`springrecipes.apress.com/weather/schemas\"\
  `](http://springrecipes.apress.com/weather/schemas) />\n\n<field name=\"temperatures\"\
  \ collection=\"arraylist\"\n\ntype=\"com.apress.springrecipes.weather.TemperatureInfo\"\
  >\n\n<bind-xml name=\"TemperatureInfo\" node=\"element\" />\n\n</field>\n\n</class>\n\
  \n<class name=\"com.apress.springrecipes.weather.TemperatureInfo\">\n\n<map-to xml=\"\
  TemperatureInfo\"\n\nns-uri=\" [`springrecipes.apress.com/weather/schemas\"`](http://springrecipes.apress.com/weather/schemas)\
  \ />\n\n<field name=\"city\" type=\"string\">\n\n<bind-xml name=\"city\" node=\"\
  attribute\" />\n\n</field>\n\n\n\n<field name=\"date\" type=\"string\"\n\nhandler=\"\
  com.apress.springrecipes.weather.DateFieldHandler\">\n\n<bind-xml name=\"date\"\
  \ node=\"attribute\" />\n\n</field>\n\n<field name=\"min\" type=\"double\">\n\n\
  9799ch16.qxd 5/15/08 5:04 PM Page 619\n\n**第 16 章 ■** **SPRING 远程调用与 WEB 服务**\n\n\
  **619**\n\n<bind-xml name=\"min\" node=\"element\" />\n\n</field>\n\n<field name=\"\
  max\" type=\"double\">\n\n<bind-xml name=\"max\" node=\"element\" />\n\n</field>\n\
  \n<field name=\"average\" type=\"double\">\n\n<bind-xml name=\"average\" node=\"\
  element\" />\n\n</field>\n\n</class>\n\n</mapping>\n\n请记住，对于每个类映射，你必须指定元素的命名空间 URI。此外，对于所有日期字段，你必须指定一个处理程序，以使用特定的日期格式转换日期。该处理程序的实现如下所示：\n\
  \npackage com.apress.springrecipes.weather;\n\n...\n\nimport org.exolab.castor.mapping.GeneralizedFieldHandler;\n\
  \npublic class DateFieldHandler extends GeneralizedFieldHandler {\n\nprivate DateFormat\
  \ format = new SimpleDateFormat(\"yyyy-MM-dd\");\n\npublic Object convertUponGet(Object\
  \ value) {\n\nreturn format.format((Date) value);\n\n}\n\npublic Object convertUponSet(Object\
  \ value) {\n\ntry {\n\nreturn format.parse((String) value);\n\n} catch (ParseException\
  \ e) {\n\nthrow new RuntimeException(e);\n\n}\n\n}\n\npublic Class getFieldType()\
  \ {\n\nreturn Date.class;\n\n}\n\n}\n\n**使用 XML 编组调用 Web 服务**\n\nSpring-WS 客户端也可以将请求和响应对象编组/解组为\
  \ XML 消息。例如，我将创建一个使用 Castor 作为编组器的客户端，这样你就可以重用服务端点中的对象模型 `GetTemperaturesRequest`、`GetTemperaturesResponse`\
  \ 和 `TemperatureInfo`，以及映射配置文件 `mapping.xml`。\n\n9799ch16.qxd 5/15/08 5:04 PM Page\
  \ 620\n\n**620**\n\n**第 16 章 ■** **SPRING 远程调用与 WEB 服务**\n\n让我们使用 XML 编组来实现服务代理。`WebServiceTemplate`\
  \ 提供了一个 `marshalSendAndReceive()` 方法，该方法接受一个请求对象作为方法参数，该对象将被编组为请求消息。此方法必须返回一个响应对象，该对象将从响应消息中解组得到。\n\
  \n**■注意** 要使用 Castor 创建服务客户端，你必须在类路径中包含 `castor-1.1.2.jar`（位于 Spring-WS 安装目录的 `lib/castor`\
  \ 目录下）和 `xercesImpl-2.8.1.jar`（位于 `lib/xerces` 目录下）。\n\npackage com.apress.springrecipes.weather;\n\
  \n...\n\nimport org.springframework.ws.client.core.support.WebServiceGatewaySupport;\
  \ public class WeatherServiceProxy extends WebServiceGatewaySupport\n\nimplements\
  \ WeatherService {\n\npublic List<TemperatureInfo> getTemperatures(String city,\
  \ List<Date> dates) {\n\nGetTemperaturesRequest request = new GetTemperaturesRequest(city,\
  \ dates);\n\nGetTemperaturesResponse response = (GetTemperaturesResponse)\n\ngetWebServiceTemplate().marshalSendAndReceive(request);\n\
  \nreturn response.getTemperatures();\n\n}\n\n}\n\n当使用 XML 编组时，`WebServiceTemplate`\
  \ 需要同时设置 `marshaller` 和 `unmarshaller` 属性。如果你扩展了 `WebServiceGatewaySupport` 类以自动创建\
  \ `WebServiceTemplate`，你也可以将这些属性设置到该类上。通常，你可以为这两个属性指定同一个编组器。对于 Castor，你需要声明一个 `CastorMarshaller`\
  \ bean 作为编组器。\n\n<beans ...>\n\n<bean id=\"client\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceClient\"\
  >\n\n<property name=\"weatherService\" ref=\"weatherServiceProxy\" />\n\n</bean>\n\
  \n<bean id=\"weatherServiceProxy\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceProxy\"\
  >\n\n<property name=\"defaultUri\"\n\nvalue=\" [`localhost:8080/weather/services\"\
  `](http://localhost:8080/weather/services) />\n\n**<property name=\"marshaller\"\
  \ ref=\"marshaller\" />**\n\n**<property name=\"unmarshaller\" ref=\"marshaller\"\
  \ />**\n\n</bean>\n\n9799ch16.qxd 5/15/08 5:04 PM Page 621\n\n**第 16 章 ■** **SPRING\
  \ 远程调用与 WEB 服务**\n\n**621**\n\n<bean id=\"marshaller\"\n\nclass=\"org.springframework.oxm.castor.CastorMarshaller\"\
  >\n\n**<property name=\"mappingLocation\" value=\"classpath:mapping.xml\" />**\n\
  \n</bean>\n\n</beans>\n\n\n\n**16-9. 使用注解创建服务端点**\n\n问题\n\n通过继承 Spring-WS 的基端点类，你的端点类将被绑定到\
  \ Spring-WS 的类层次结构中，并且每个端点类只能处理一种类型的 Web 服务请求。\n\n解决方案\n\nSpring-WS 支持通过 `@Endpoint`\
  \ 注解将任意类标记为服务端点，而无需继承框架特定的类。你还可以在同一个端点类中分组多个处理方法，使其能够处理多种类型的 Web 服务请求。\n\n工作原理\n\
  \n例如，你可以使用 `@Endpoint` 注解来标注温度端点，这样它就不需要继承 Spring-WS 的基端点类。处理方法的签名也可以更加灵活。\n\n```java\n\
  package com.apress.springrecipes.weather;\n\n...\n\nimport org.springframework.ws.server.endpoint.annotation.Endpoint;\n\
  import org.springframework.ws.server.endpoint.annotation.PayloadRoot;\n\n@Endpoint\n\
  public class TemperatureMarshallingEndpoint {\n\n    private static final String\
  \ namespaceUri =\n            \"http://springrecipes.apress.com/weather/schemas\"\
  ;\n    private WeatherService weatherService;\n\n    public void setWeatherService(WeatherService\
  \ weatherService) {\n        this.weatherService = weatherService;\n    }\n\n  \
  \  @PayloadRoot(\n            localPart = \"GetTemperaturesRequest\",\n        \
  \    namespace = namespaceUri)\n    public GetTemperaturesResponse getTemperature(GetTemperaturesRequest\
  \ request) {\n        List<TemperatureInfo> temperatures =\n                weatherService.getTemperatures(request.getCity(),\
  \ request.getDates());\n        return new GetTemperaturesResponse(temperatures);\n\
  \    }\n}\n```\n\n除了 `@Endpoint` 注解，你还需要为每个处理方法标注 `@PayloadRoot` 注解，用于映射服务请求。在该注解中，你需要指定要处理的负载根元素的本地名称和命名空间。然后，只需声明一个\
  \ `PayloadRootAnnotationMethodEndpointMapping` Bean，它就能自动从 `@PayloadRoot` 注解中检测到映射关系。\n\
  \n```xml\n<beans ...>\n    ...\n    <bean class=\"org.springframework.ws.server.endpoint.mapping.\n\
  \            PayloadRootAnnotationMethodEndpointMapping\" />\n    <bean id=\"temperatureEndpoint\"\
  \n          class=\"com.apress.springrecipes.weather.TemperatureMarshallingEndpoint\"\
  >\n        <property name=\"weatherService\" ref=\"weatherService\" />\n    </bean>\n\
  \    <bean class=\"org.springframework.ws.server.endpoint.adapter.\n           \
  \ GenericMarshallingMethodEndpointAdapter\">\n        <property name=\"marshaller\"\
  \ ref=\"marshaller\" />\n        <property name=\"unmarshaller\" ref=\"marshaller\"\
  \ />\n    </bean>\n    <bean id=\"marshaller\"\n          class=\"org.springframework.oxm.castor.CastorMarshaller\"\
  >\n        <property name=\"mappingLocation\" value=\"classpath:mapping.xml\" />\n\
  \    </bean>\n</beans>\n```\n\n由于你的端点类不再继承基端点类，它不再继承编组和解组 XML 消息的能力。你需要配置一个 `GenericMarshallingMethodEndpointAdapter`\
  \ 来实现这一功能。\n\n**16-10. 总结**\n\n在本章中，你学习了如何利用 Spring 的远程支持来暴露和调用远程服务。Spring 内置了对多种远程技术的支持，例如\
  \ RMI、Hessian、Burlap 和 HTTP Invoker。虽然 Spring 没有为 Web 服务提供类似的内置支持，但有一个名为 XFire 的外部库可以实现这一功能。\n\
  \nSpring 的远程支持在不同远程技术之间保持一致。在服务端，Spring 允许你通过服务导出器将任意 Bean 暴露为远程服务。在客户端，Spring 提供了多种代理工厂\
  \ Bean，用于为远程服务创建本地代理，从而使你可以像使用本地 Bean 一样使用远程服务。\n\n\n\n您还了解了契约优先的 Web 服务的优势，以及如何使用\
  \ Spring-WS 开发它们。第一步是定义服务契约，它由两部分组成：数据契约和服务契约。数据契约使用 XSD 定义，而服务契约使用 WSDL 定义。您需要自行定义\
  \ XSD 文件，然后 WSDL 文件可以由它生成。\n\n一旦为 Web 服务定义了契约，您就可以根据该契约开始实现服务本身。服务请求由端点（Endpoint）处理，这类似于\
  \ Web 应用程序中的控制器。您可以使用 XML 解析或 XML 编组技术来实现端点。\n\n根据 Web 服务的契约，您可以创建一个服务客户端来调用此服务。您也可以使用\
  \ XML 解析或 XML 编组技术来实现服务客户端。\n\n在下一章中，您将了解 Spring 对两项关键的 Java EE 技术的支持：EJB 和 JMS。\n\
  \n9799ch16.qxd 5/15/08 5:04 PM 第 624 页\n\n9799ch17.qxd 5/15/08 5:06 PM 第 625 页\n\
  \n第 17 章\n\nSpring 对 EJB 和 JMS 的支持\n\n**本**章中，您将学习 Spring 对两项关键的 Java EE 技术的支持：*EJB（企业级\
  \ JavaBean）* 和 *JMS（Java 消息服务）*。\n\nEJB 是 Java EE 平台的核心技术，它允许您创建能够利用 EJB 容器提供的企业级服务的组件。然而，在\
  \ EJB 3.0 发布之前，由于 EJB 2.x 的复杂性，许多开发者更倾向于使用 POJO 开发应用程序。Spring 通过使用其基于 POJO 的 IoC\
  \ 容器来简化 EJB 2.x 组件的实现，从而整合了 EJB 和 POJO 两种方法。\n\n尽管您可能不太喜欢 EJB 2.x，但您仍有可能需要访问由其他人开发的\
  \ EJB 2.x 组件。访问 EJB 2.x 组件是一项繁琐的任务，因为您需要处理 Home 接口查找并处理多个异常。Spring 能够通过应用基于代理的方法来简化\
  \ EJB 2.x 的访问。在 EJB 3.0 中，EJB 访问更简单，但您仍然可以利用 Spring 的 JNDI 工具使其更加简单。\n\nJMS 为 Java\
  \ EE 平台中的面向消息通信定义了一套标准 API。使用 JMS，不同的应用程序可以以松散耦合的方式进行通信，这与其他远程技术（如 RMI）相比更具优势。然而，在使用\
  \ JMS API 发送和接收消息时，您必须自行管理 JMS 资源并处理 JMS API 的异常，这会导致大量 JMS 特定代码。Spring 采用基于模板的方法简化了\
  \ JMS 的使用，就像它对 JDBC 所做的那样。此外，Spring 允许在其 IoC 容器中声明的 Bean 监听 JMS 消息并对其做出响应。\n\n完成本章后，您将能够在\
  \ Spring 的支持下创建和访问 EJB 组件。您还将了解如何使用 Spring 的 JMS 支持来简化发送、接收和监听 JMS 消息。\n\n**17-1.\
  \ 使用 Spring 创建 EJB 2.x 组件**\n\n问题\n\n在 EJB 2.x 中，每个 EJB 组件都需要一个远程/本地接口、一个远程/本地 Home\
  \ 接口和一个 Bean 实现类，在实现类中，即使不需要，您也必须实现所有 EJB 生命周期回调方法。在这种情况下，您必须为它们提供空实现。\n\n**625**\n\
  \n9799ch17.qxd 5/15/08 5:06 PM 第 626 页\n\n**626**\n\n第 17 章 **■** Spring 对 EJB 和\
  \ JMS 的支持\n\n解决方案\n\nSpring 提供了一组 EJB 支持类，以简化不同类型 EJB 的实现。这些类为所有 EJB 生命周期回调方法提供了空实现。您的\
  \ EJB 类可以继承这些类以继承这些方法。表 17-1 展示了 Spring 针对不同类型 EJB 的 EJB 支持类。\n\n**表 17-1.** *Spring\
  \ 针对不同类型 EJB 的 EJB 支持类*\n\n**EJB 支持类**\n\n**EJB 类型**\n\nAbstractStatelessSessionBean\n\
  \n无状态会话 Bean\n\nAbstractStatefulSessionBean\n\n有状态会话 Bean\n\nAbstractMessageDrivenBean\n\
  \n可能不使用 JMS 的通用消息驱动 Bean\n\nAbstractJmsMessageDrivenBean\n\n使用 JMS 的消息驱动 Bean\n\n\
  此外，EJB 支持类提供了对 Spring IoC 容器的访问，以便您在 POJO 中实现业务逻辑，并用 EJB 组件包装它们。由于 POJO 更易于开发和测试，因此在\
  \ POJO 中实现业务逻辑可以加速您的 EJB 开发。\n\n工作原理\n\n假设您要为邮局开发一个系统。您被要求开发一个无状态会话 Bean，用于根据目的地国家和重量计算邮资。目标运行时环境是一个仅支持\
  \ EJB 2.x 的应用服务器，因此您必须开发与该版本兼容的 EJB 组件。\n\n与轻量级 POJO 相比，EJB 2.x 组件更难以构建、部署和测试。开发\
  \ EJB 2.x 组件的一个良好实践是在 POJO 中实现业务逻辑，然后用 EJB 组件包装它们。首先，您为邮资计算定义以下业务接口：\n\npackage\
  \ com.apress.springrecipes.post;\n\npublic interface PostageService {\n\npublic\
  \ double calculatePostage(String country, double weight);\n\n}\n\n然后，您必须实现此接口。通常，它应该查询数据库以获取邮资并执行一些计算。这里，为了测试目的，您可以硬编码结果。\n\
  \npackage com.apress.springrecipes.post;\n\npublic class PostageServiceImpl implements\
  \ PostageService {\n\npublic double calculatePostage(String country, double weight)\
  \ {\n\nreturn 1.0;\n\n9799ch17.qxd 5/15/08 5:06 PM 第 627 页\n\n第 17 章 **■** Spring\
  \ 对 EJB 和 JMS 的支持\n\n**627**\n\n}\n\n}\n\n在开始创建 EJB 组件之前，您可能希望有一个简单的 EJB 容器用于测试目的。为简单起见，我选择了\
  \ Apache OpenEJB ([`openejb.apache.org`](http://openejb.apache.org/)) 作为我的 EJB 容器，它非常易于安装、配置和部署。OpenEJB\
  \ 是一个为 Apache Geronimo 服务器运行时项目 ([`geronimo.apache.org`](http://geronimo.apache.org))\
  \ 设计的开源 EJB 容器。\n\n**■注意** 您可以从 OpenEJB 网站下载 OpenEJB 独立服务器（例如，v3.0 beta 1），并将其解压到您选择的目录以完成安装。\n\
  \n**不使用 Spring 支持创建 EJB 2.x 组件**\n\n首先，让我们在不使用 Spring 支持的情况下创建 EJB 组件。为了允许远程访问此\
  \ EJB 组件，您向客户端公开以下远程接口。\n\n**■注意** 要编译和构建您的 EJB 组件，您必须在类路径中包含包含标准 EJB 类和接口的库。对于\
  \ OpenEJB 3.0 beta 1，它是 geronimo-ejb_3.0_spec-1.0.jar（位于 OpenEJB 安装目录的 lib 目录中）。\n\
  \npackage com.apress.springrecipes.post;\n\nimport java.rmi.RemoteException;\n\n\
  import javax.ejb.EJBObject;\n\npublic interface PostageServiceRemote extends EJBObject\
  \ {\n\npublic double calculatePostage(String country, double weight)\n\nthrows RemoteException;\n\
  \n}\n\n此 calculatePostage() 方法的签名与业务接口中的签名类似，只是它声明抛出 RemoteException。\n\n此外，您需要一个远程\
  \ Home 接口，以便客户端获取此 EJB 组件的远程引用，其方法必须声明抛出 RemoteException 和 CreateException。\n\n\
  package com.apress.springrecipes.post;\n\nimport java.rmi.RemoteException;\n\n9799ch17.qxd\
  \ 5/15/08 5:06 PM 第 628 页\n\n**628**\n\n第 17 章 **■** Spring 对 EJB 和 JMS 的支持\n\n\
  import javax.ejb.CreateException;\n\nimport javax.ejb.EJBHome;\n\npublic interface\
  \ PostageServiceHome extends EJBHome {\n\npublic PostageServiceRemote create() throws\
  \ RemoteException, CreateException;\n\n}\n\n\n\n如果您希望在企业应用内部本地访问此 EJB 组件，则上述两个接口应分别扩展`EJBLocalObject`和`EJBLocalHome`，其方法无需抛出`RemoteException`。为简洁起见，此处省略了本地接口和本地\
  \ Home 接口。\n\n请注意，以下 EJB 实现类也实现了`PostageService`业务接口，以便您可以将请求委托给 POJO 服务实现。\n\n\
  ```java\npackage com.apress.springrecipes.post;\n\nimport javax.ejb.SessionBean;\n\
  import javax.ejb.SessionContext;\n\npublic class PostageServiceBean implements SessionBean,\
  \ PostageService {\n\n    private PostageService postageService;\n    private SessionContext\
  \ sessionContext;\n\n    public void ejbCreate() {\n        postageService = new\
  \ PostageServiceImpl();\n    }\n\n    public void ejbActivate() {}\n    public void\
  \ ejbPassivate() {}\n    public void ejbRemove() {}\n\n    public void setSessionContext(SessionContext\
  \ sessionContext) {\n        this.sessionContext = sessionContext;\n    }\n\n  \
  \  public double calculatePostage(String country, double weight) {\n        return\
  \ postageService.calculatePostage(country, weight);\n    }\n}\n```\n\n在`ejbCreate()`生命周期方法中，您实例化了\
  \ POJO 服务实现类。实际邮资计算由该对象负责，EJB 组件仅将请求委托给此对象。\n\n最后，您需要为 EJB 组件准备一个 EJB 部署描述符。在类路径的`META-INF`目录下创建`ejb-jar.xml`文件，并添加以下内容来描述您的\
  \ EJB 组件：\n\n```xml\n<ejb-jar>\n    <enterprise-beans>\n        <session>\n    \
  \        <display-name>PostageService</display-name>\n            <ejb-name>PostageService</ejb-name>\n\
  \            <home>com.apress.springrecipes.post.PostageServiceHome</home>\n   \
  \         <remote>com.apress.springrecipes.post.PostageServiceRemote</remote>\n\
  \            <ejb-class>\n                com.apress.springrecipes.post.PostageServiceBean\n\
  \            </ejb-class>\n            <session-type>Stateless</session-type>\n\
  \            <transaction-type>Bean</transaction-type>\n        </session>\n   \
  \ </enterprise-beans>\n</ejb-jar>\n```\n\n现在您的 EJB 组件已完成，应将接口、类和部署描述符打包到 JAR 文件中。然后启动\
  \ EJB 容器并将此 EJB 组件部署到其中。\n\n**■注意** 要启动 OpenEJB 容器，首先将`OPENEJB_HOME`环境变量设置为指向您的\
  \ OpenEJB 安装目录。然后使用参数`start`执行 OpenEJB 启动脚本（位于`bin`目录中）。要部署 EJB 组件，同样执行 OpenEJB\
  \ 启动脚本，但这次需传递`deploy`和您的 EJB JAR 文件路径作为参数。\n\n对于 OpenEJB，EJB 2.x 组件远程 Home 接口的默认\
  \ JNDI 名称是 EJB 名称后跟`RemoteHome`后缀（本例中为`PostageServiceRemoteHome`）。\n\n如果部署成功，您应看到以下输出：\n\
