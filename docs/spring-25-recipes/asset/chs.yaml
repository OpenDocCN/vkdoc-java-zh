  \nimport org.aspectj.lang.annotation.Before;\n\n@Aspect\n\npublic class CalculatorLoggingAspect\
  \ {\n\nprivate Log log = LogFactory.getLog(this.getClass());\n\n**@Before(\"execution(*\
