  \ 106\n\n**106**\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n**4-7. 设置 Bean 作用域**\n\n问题\n\
  \n当你在配置文件中声明一个 bean 时，实际上是在定义一个用于创建 bean 的模板，而不是一个实际的 bean 实例。当通过 `getBean()` 方法或其他\
  \ bean 的引用请求一个 bean 时，Spring 会根据 bean 的作用域决定返回哪个 bean 实例。有时，你必须为 bean 设置一个合适的非默认作用域。\n\
  \n解决方案\n\n在 Spring 2.x 中，bean 的作用域通过 `<bean>` 元素的 `scope` 属性设置。默认情况下，Spring 为 IoC\
  \ 容器中声明的每个 bean 只创建一个实例，并且该实例将在整个 IoC 容器范围内共享。所有后续的 `getBean()` 调用和 bean 引用都将返回这个唯一的\
  \ bean 实例。这种作用域称为 singleton（单例），是所有 bean 的默认作用域。表 4-1 列出了 Spring 中所有有效的 bean 作用域。\n\
  \n**表 4-1.** *Spring 中有效的 Bean 作用域*\n\n**作用域**\n\n**描述**\n\nsingleton\n\n每个 Spring\
  \ IoC 容器创建一个单一的 bean 实例\n\nprototype\n\n每次请求时创建一个新的 bean 实例\n\n\n\nrequest\n\n每个\
  \ HTTP 请求创建一个单一的 Bean 实例；仅在 Web 应用上下文中有效\n\nsession\n\n每个 HTTP 会话创建一个单一的 Bean 实例；仅在\
  \ Web 应用上下文中有效\n\nglobalSession\n\n每个全局 HTTP 会话创建一个单一的 Bean 实例；仅在门户应用上下文中有效\n\n\
  在 Spring 1.x 中，singleton 和 prototype 是仅有的两种有效 Bean 作用域，它们通过 singleton 属性（即 singleton=\"\
  true\" 或 singleton=\"false\"）来指定，而非 scope 属性。\n\n工作原理\n\n为了演示 Bean 作用域的概念，我们以商店应用中的购物车为例。首先，按如下方式创建\
