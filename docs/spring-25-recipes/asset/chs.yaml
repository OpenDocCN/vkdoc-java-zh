  \ 无法正常工作。这是因为默认情况下，你的 Bean 后处理器优先级低于 `CommonAnnotationBeanPostProcessor`。\n\n因此，初始化方法会在你的路径检查之前被调用。\n\
  \n<beans ...>\n\n...\n\n**<bean class=\"org.springframework.context.annotation.➥**\n\
  \n**CommonAnnotationBeanPostProcessor\" />**\n\n<bean class=\"com.apress.springrecipes.shop.PathCheckingBeanPostProcessor\"\
  \ />\n\n<bean id=\"cashier1\" class=\"com.apress.springrecipes.shop.Cashier\">\n\
  \n...\n\n</bean>\n\n</beans>\n\n要定义 Bean 后处理器的处理顺序，可以让它们实现 `Ordered` 或 `PriorityOrdered`\
  \ 接口，并在 `getOrder()` 方法中返回它们的顺序。此方法返回的值越小，优先级越高，并且 `PriorityOrdered` 接口返回的顺序值将始终优先于\
  \ `Ordered` 接口返回的值。\n\n由于 `CommonAnnotationBeanPostProcessor` 实现了 `PriorityOrdered`\
  \ 接口，你的 `PathCheckingBeanPostProcessor` 也必须实现此接口，才有机会优先于它执行。\n\npackage com.apress.springrecipes.shop;\n\
  \n...\n\nimport org.springframework.beans.factory.config.BeanPostProcessor;\n\n\
  import org.springframework.core.PriorityOrdered;\n\n9799ch04.qxd 4/10/08 10:53 AM\
