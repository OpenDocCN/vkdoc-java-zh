  `SimpleFormController` 可以在绑定表单字段值后帮助你验证命令对象。验证由实现 `Validator` 接口的验证器对象完成。你可以编写以下验证器来检查必填表单字段是否已填写，以及预约时间在节假日和工作日是否有效：\n\
  \npackage com.apress.springrecipes.court.domain;\n\n...\n\nimport org.springframework.validation.Errors;\n\
  \nimport org.springframework.validation.ValidationUtils;\n\nimport org.springframework.validation.Validator;\n\
  \npublic class ReservationValidator implements Validator {\n\npublic boolean supports(Class\
  \ clazz) {\n\nreturn Reservation.class.isAssignableFrom(clazz);\n\n}\n\n9799ch10.qxd\
  \ 5/14/08 3:31 PM Page 365\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n**365**\n\n\
  public void validate(Object target, Errors errors) {\n\nValidationUtils.rejectIfEmptyOrWhitespace(errors,\
  \ \"courtName\",\n\n\"required.courtName\", \"Court name is required.\");\n\nValidationUtils.rejectIfEmpty(errors,\
  \ \"date\",\n\n\"required.date\", \"Date is required.\");\n\nValidationUtils.rejectIfEmpty(errors,\
  \ \"hour\",\n\n\"required.hour\", \"Hour is required.\");\n\nValidationUtils.rejectIfEmptyOrWhitespace(errors,\
  \ \"player.name\",\n\n\"required.playerName\", \"Player name is required.\");\n\n\
  ValidationUtils.rejectIfEmpty(errors, \"sportType\",\n\n\"required.sportType\",\
  \ \"Sport type is required.\");\n\nReservation reservation = (Reservation) target;\n\
  \nDate date = reservation.getDate();\n\nint hour = reservation.getHour();\n\nif\
  \ (date != null) {\n\nCalendar calendar = Calendar.getInstance();\n\ncalendar.setTime(date);\n\
  \nif (calendar.get(Calendar.DAY_OF_WEEK) == Calendar.SUNDAY) {\n\nif (hour < 8 ||\
  \ hour > 22) {\n\nerrors.reject(\"invalid.holidayHour\", \"Invalid holiday hour.\"\
  );\n\n}\n\n} else {\n\nif (hour < 9 || hour > 21) {\n\nerrors.reject(\"invalid.weekdayHour\"\
  , \"Invalid weekday hour.\");\n\n}\n\n}\n\n}\n\n}\n\n}\n\n在此验证器中，你使用了 `ValidationUtils`\
  \ 类中的工具方法，例如 `rejectIfEmptyOrWhitespace()` 和 `rejectIfEmpty()`，来验证必填表单字段。如果这些表单字段中的任何一个为空，这些方法将创建一个*字段错误*，该错误将绑定到该字段。这些方法的第二个参数是属性名称，而第三个和第四个参数分别是错误代码和默认错误消息。\n\
  \n你还需要检查预约时间在节假日和工作日是否有效。如果无效，应使用 `reject()` 方法创建一个*对象错误*，该错误将绑定到预约对象，而不是某个字段。\n\
  \n要将此验证器应用于你的控制器，你只需在 `validator` 属性中配置它的一个实例，可以将其作为内部 bean 或通过 bean 引用来配置。如果你有多个验证器要应用于一个控制器，则可以在\
  \ `validators` 属性中设置它们，该属性的类型是一个数组。\n\n\n\n<bean id=\"reservationFormController\"\
  \n\nclass=\"com.apress.springrecipes.court.web.ReservationFormController\">\n\n\
  ...\n\n**<property name=\"validator\">**\n\n9799ch10.qxd 5/14/08 3:31 PM Page 366\n\
  \n**366**\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n**<bean class=\"com.apress.springrecipes.court.domain.➥**\n\
  \n**ReservationValidator\" />**\n\n**</property>**\n\n</bean>\n\n由于验证器在验证过程中可能会产生错误，您应为错误代码定义消息，以便向用户显示。如果您已定义\
  \ `ResourceBundleMessageSource`，则可以在资源包中为相应区域设置（例如，默认区域设置的 `messages.properties`）包含以下错误消息：\n\
  \nrequired.courtName=必须提供场地名称\n\nrequired.date=必须提供日期\n\nrequired.hour=必须提供小时数\n\
  \nrequired.playerName=必须提供玩家姓名\n\nrequired.sportType=必须提供运动类型\n\ninvalid.holidayHour=无效的节假日小时数\n\
  \ninvalid.weekdayHour=无效的工作日小时数\n\n**10-11. 使用向导表单控制器处理多页表单**\n\n问题\n\n在 Web 应用程序中，有时需要处理跨多个页面的复杂表单。此类表单通常称为*向导表单*，因为用户必须逐页填写——就像使用软件向导一样。毫无疑问，您可以通过扩展\
  \ `SimpleFormController` 创建一个或多个表单控制器来处理向导表单。然而，如果您需要在多个页面之间维护表单状态，将会有大量工作要做。\n\n\
  解决方案\n\nSpring MVC 提供的 `AbstractWizardFormController` 类定义了处理向导表单的基本任务。它还支持命令对象的概念，并可以将多个页面中的表单字段绑定到单个命令对象的同名属性上。通过扩展\
  \ `AbstractWizardFormController` 类，您的表单控制器将继承处理向导表单的能力。\n\n由于向导表单包含多个表单页面，您必须为向导表单控制器定义多个页面视图。然后，该控制器将管理所有这些表单页面之间的表单状态。在向导表单中，存在多个操作，而不是\
  \ `SimpleFormController` 中的单个提交操作。`AbstractWizardFormController` 将通过一个特殊的请求参数来确定用户的操作，该参数通常指定为提交按钮的名称：`_finish`：完成向导表单。\n\
  \n`_cancel`：取消向导表单。\n\n`_target *x*`：跳转到目标页面，其中 *x* 是从零开始的页面索引。\n\n9799ch10.qxd\
  \ 5/14/08 3:31 PM Page 367\n\n第 10 章 **■** S P R I N G M V C 框 架\n\n**367**\n\n\
  `AbstractWizardFormController` 类支持与 `SimpleFormController` 相同的大部分生命周期方法，供您自定义表单处理流程。实际上，它们都扩展了\
  \ `AbstractFormController` 基类。\n\n工作原理\n\n假设您想提供一个功能，允许用户按固定时间段定期预订场地。首先，在 domain\
  \ 子包中定义 `PeriodicReservation` 类：`package com.apress.springrecipes.court.domain;`\n\
  \n...\n\npublic class PeriodicReservation {\n\nprivate String courtName;\n\nprivate\
  \ Date fromDate;\n\nprivate Date toDate;\n\nprivate int period;\n\nprivate int hour;\n\
  \nprivate Player player;\n\n// Getters and Setters\n\n...\n\n}\n\n然后，在 `ReservationService`\
  \ 接口中添加一个 `makePeriodic()` 方法，用于进行定期预订：\n\n`package com.apress.springrecipes.court.service;`\n\
  \n...\n\npublic interface ReservationService {\n\n...\n\npublic void makePeriodic(PeriodicReservation\
  \ periodicReservation)\n\nthrows ReservationNotAvailableException;\n\n}\n\n该方法的实现涉及从\
  \ `PeriodicReservation` 生成一系列 `Reservation` 对象，并将每个预订传递给 `make()` 方法。显然，在这个简单的应用程序中，没有事务管理支持。\n\
  \n`package com.apress.springrecipes.court.service;`\n\n...\n\npublic class ReservationServiceImpl\
  \ implements ReservationService {\n\n...\n\npublic void makePeriodic(PeriodicReservation\
  \ periodicReservation)\n\nthrows ReservationNotAvailableException {\n\nCalendar\
  \ fromCalendar = Calendar.getInstance();\n\n\n\nfromCalendar.setTime(periodicReservation.getFromDate());\n\
  \nCalendar toCalendar = Calendar.getInstance();\n\ntoCalendar.setTime(periodicReservation.getToDate());\n\
  \n9799ch10.qxd 5/14/08 3:31 PM 第 368 页\n\n**368**\n\n第 10 章 **■** S P R I N G M\
  \ V C 框 架\n\nwhile (fromCalendar.before(toCalendar)) {\n\nReservation reservation\
  \ = new Reservation();\n\nreservation.setCourtName(periodicReservation.getCourtName());\n\
