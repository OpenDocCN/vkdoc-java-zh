  \ **■** 在 Spring 中进行事务管理\n\n**REQUIRES_NEW 传播行为**\n\n另一种常见的传播行为是 REQUIRES_NEW。它表示该方法必须启动一个新事务并在其新事务内运行。如果当前有一个正在进行的事务，则应先将其挂起。\n\
  \npackage com.apress.springrecipes.bookshop;\n\n...\n\nimport org.springframework.transaction.annotation.Propagation;\n\
