  \ 测试支持\n\n如果 `DepositController` 工作正常，它应该使用请求参数中指定的账号和金额来调用后端的 `AccountService`\
  \ 对象。你可以使用 EasyMock 来验证此行为。\n\n最后，你需要检查返回的 `ModelAndView` 对象的内容。对于 JUnit 3.8，你的测试类可以继承\
  \ `AbstractModelAndViewTests` 类，以继承特定于 `ModelAndView` 的断言方法。然而，JUnit 4 不要求你继承一个基础测试类。你可以使用静态导入来导入\
  \ `ModelAndViewAssert` 类的所有静态断言方法。\n\n**对基于注解的 Spring MVC 控制器进行单元测试**\n\n现在，让我们考虑使用\
  \ Spring 2.5 支持的基于注解的方法来实现 `DepositController`：\n\npackage com.apress.springrecipes.bank;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\n\nimport org.springframework.stereotype.Controller;\n\
