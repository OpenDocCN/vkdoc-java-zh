  \ + \" #\" +\n\nnotification.getSequenceNumber());\n\n}\n\n}\n\n}\n\n你可以将此通知监听器注册到\
  \ MBean 服务器连接，以监听该 MBean 服务器发出的通知。\n\n9799ch18.qxd 5/15/08 5:07 PM Page 679\n\n\
