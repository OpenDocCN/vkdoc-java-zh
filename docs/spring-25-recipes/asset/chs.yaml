  \n默认情况下，应用程序上下文会被缓存并为每个测试方法重用，但如果你希望在某个特定测试方法之后重新加载它，你可以使用 `@DirtiesContext` 注解来标注该测试方法，这样应用程序上下文将在下一个测试方法时重新加载。\n\
