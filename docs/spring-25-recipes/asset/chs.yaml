  \n</aop:config>\n\n**6-10. 在 Spring 中实现 AspectJ 切面的加载时织入**\n\n问题\n\nSpring AOP 框架仅支持有限类型的\
  \ AspectJ 切入点，并且允许切面应用于 IoC 容器中声明的 Bean。如果你想使用额外的切入点类型，或者将切面应用于 Spring IoC 容器外部创建的对象，则必须在\
  \ Spring 应用程序中使用 AspectJ 框架。\n\n解决方案\n\n\n\n*织入*是将切面应用到目标对象的过程。使用 Spring AOP 时，织入在运行时通过动态代理完成。相比之下，AspectJ\
  \ 框架同时支持编译时织入和加载时织入。\n\nAspectJ 的*编译时*织入通过一个名为 ajc 的特殊 AspectJ 编译器完成。它可以将切面织入到你的\
  \ Java 源文件中，并输出织入后的二进制类文件。它也可以将切面织入到已编译的类文件或 JAR 文件中。这个过程被称为编译后织入。你可以在将类声明到 Spring\
  \ IoC 容器之前，对它们执行编译时和编译后织入。Spring 完全不参与织入过程。有关编译时和编译后织入的更多信息，请参考 AspectJ 文档。\n\n\
  AspectJ 的*加载时*织入（也称为 LTW）发生在目标类被类加载器加载到 JVM 时。对于要织入的类，需要一个特殊的类加载器来增强目标类的字节码。AspectJ\
  \ 和 Spring 都提供了加载时织入器，用于为类加载器添加加载时织入能力。你只需要进行简单的配置即可启用这些加载时织入器。\n\n工作原理\n\n为了理解\
  \ Spring 应用程序中的 AspectJ 加载时织入过程，我们考虑一个复数计算器。首先，你创建 `Complex` 类来表示复数。你为此类定义了 `toString()`\
  \ 方法，用于将复数转换为字符串表示形式 `(a + bi)`。\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \npublic class Complex {\n\n    private int real;\n\n    private int imaginary;\n\
  \n    public Complex(int real, int imaginary) {\n\n        this.real = real;\n\n\
  \        this.imaginary = imaginary;\n\n    }\n\n    // Getters and Setters\n\n\
  \    ...\n\n    public String toString() {\n\n        return \"(\" + real + \" +\
  \ \" + imaginary + \"i)\";\n\n    }\n\n}\n```\n\n然后，你为复数运算定义一个接口。为简单起见，只支持 `add()`\
  \ 和 `sub()` 方法。\n\n```java\npackage com.apress.springrecipes.calculator;\n\npublic\
  \ interface ComplexCalculator {\n\n    public Complex add(Complex a, Complex b);\n\
  \n    public Complex sub(Complex a, Complex b);\n\n}\n```\n\n该接口的实现代码如下。每次，你都会返回一个新的复数对象作为结果。\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n\npublic class ComplexCalculatorImpl\
  \ implements ComplexCalculator {\n\n    public Complex add(Complex a, Complex b)\
  \ {\n\n        Complex result = new Complex(a.getReal() + b.getReal(),\n\n     \
  \           a.getImaginary() + b.getImaginary());\n\n        System.out.println(a\
  \ + \" + \" + b + \" = \" + result);\n\n        return result;\n\n    }\n\n    public\
  \ Complex sub(Complex a, Complex b) {\n\n        Complex result = new Complex(a.getReal()\
  \ - b.getReal(),\n\n                a.getImaginary() - b.getImaginary());\n\n  \
  \      System.out.println(a + \" - \" + b + \" = \" + result);\n\n        return\
  \ result;\n\n    }\n\n}\n```\n\n在使用此计算器之前，必须将其声明为 Spring IoC 容器中的一个 bean。\n\n```xml\n\
  <bean id=\"complexCalculator\"\n\n      class=\"com.apress.springrecipes.calculator.ComplexCalculatorImpl\"\
  \ />\n```\n\n现在，你可以使用 `Main` 类中的以下代码来测试这个复数计算器：\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \n...\n\npublic class Main {\n\n    public static void main(String[] args) {\n\n\
  \        ...\n\n        ComplexCalculator complexCalculator =\n\n              \
  \  (ComplexCalculator) context.getBean(\"complexCalculator\");\n\n        complexCalculator.add(new\
  \ Complex(1, 2), new Complex(2, 3));\n\n        complexCalculator.sub(new Complex(5,\
  \ 8), new Complex(2, 3));\n\n    }\n\n}\n```\n\n到目前为止，复数计算器运行良好。但是，你可能希望通过缓存复数对象来提高计算器的性能。由于缓存是一个众所周知的横切关注点，你可以使用切面将其模块化。\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n\nimport java.util.Collections;\n\
  \nimport java.util.HashMap;\n\nimport java.util.Map;\n\nimport org.aspectj.lang.ProceedingJoinPoint;\n\
  ```\n\n\nimport org.aspectj.lang.annotation.Around;\n\nimport org.aspectj.lang.annotation.Aspect;\n\
  \n@Aspect\n\npublic class ComplexCachingAspect {\n\nprivate Map<String, Complex>\
  \ cache;\n\npublic ComplexCachingAspect() {\n\ncache = Collections.synchronizedMap(new\
  \ HashMap<String, Complex>());\n\n}\n\n@Around(**\"call(public Complex.new(int,\
  \ int)) && args(a,b)\"** ) public Object cacheAround(ProceedingJoinPoint joinPoint,\
  \ int a, int b)\n\nthrows Throwable {\n\nString key = a + \",\" + b;\n\nComplex\
  \ complex = cache.get(key);\n\nif (complex == null) {\n\nSystem.out.println(\"缓存未命中\
  \ (\" + key + \")\");\n\ncomplex = (Complex) joinPoint.proceed();\n\ncache.put(key,\
  \ complex);\n\n}\n\n9799ch06.qxd 4/15/08 11:45 AM Page 199\n\n第 6 章 **■** S P R\
  \ I N G 2 . X A O P 与 A S P E C T J 支持\n\n**199**\n\nelse {\n\nSystem.out.println(\"\
  缓存命中 (\" + key + \")\");\n\n}\n\nreturn complex;\n\n}\n\n}\n\n在这个切面中，你将复数对象以其实部和虚部作为键值缓存到一个映射中。为了保证该映射的线程安全，应使用同步映射对其进行包装。那么，查找缓存的最佳时机就是在通过调用构造函数创建复数对象时。你使用\
  \ AspectJ 的切入点表达式 `call` 来捕获调用 `Complex(int, int)` 构造函数的连接点。Spring AOP 不支持此切入点，因此你在本章之前未曾见过。\n\
  \n然后，你需要一个环绕通知来修改返回值。如果在缓存中找到了相同值的复数对象，则直接将其返回给调用者。否则，继续执行原始构造函数调用来创建一个新的复数对象。在将其返回给调用者之前，将其缓存到映射中供后续使用。\n\
  \n由于 Spring AOP 不支持此类切入点，你必须使用 AspectJ 框架来应用此切面。AspectJ 框架的配置通过类路径根目录下 `META-INF`\
  \ 目录中名为 `aop.xml` 的文件完成。\n\n<!DOCTYPE aspectj PUBLIC \"-//AspectJ//DTD//EN\"\n\n\
  [\"http://www.eclipse.org/aspectj/dtd/aspectj.dtd\">](http://www.eclipse.org/aspectj/dtd/aspectj.dtd)\n\
  \n<aspectj>\n\n<weaver>\n\n<include within=\"com.apress.springrecipes.calculator.*\"\
  \ />\n\n</weaver>\n\n<aspects>\n\n<aspect\n\nname=\"com.apress.springrecipes.calculator.ComplexCachingAspect\"\
  \ />\n\n</aspects>\n\n</aspectj>\n\n在此 AspectJ 配置文件中，你必须指定切面以及你想要切面织入的类。这里你指定将 `ComplexCachingAspect`\
  \ 织入到 `com.apress.springrecipes.calculator` 包中的所有类。\n\n**通过 AspectJ 织入器进行加载时织入**\n\
  \nAspectJ 提供了一个加载时织入代理来实现加载时织入。你只需在运行应用程序的命令中添加一个 VM 参数即可。这样，你的类在加载到 JVM 时就会被织入。\n\
  \njava **-javaagent:c:/spring-framework-2.5/lib/aspectj/aspectjweaver.jar➥**\n\n\
  com.apress.springrecipes.calculator.Main\n\n如果你使用上述参数运行应用程序，你将得到以下输出和缓存状态。AspectJ\
  \ 代理会通知所有对 `Complex(int, int)` 构造函数的调用。\n\n9799ch06.qxd 4/15/08 11:45 AM Page 200\n\
  \n**200**\n\n第 6 章 **■** S P R I N G 2 . X A O P 与 A S P E C T J 支持\n\n缓存未命中 (1,2)\n\
  \n缓存未命中 (2,3)\n\n缓存未命中 (3,5)\n\n(1 + 2i) + (2 + 3i) = (3 + 5i)\n\n缓存未命中 (5,8)\n\n\
  缓存命中 (2,3)\n\n缓存命中 (3,5)\n\n(5 + 8i) - (2 + 3i) = (3 + 5i)\n\n**通过 Spring 2.5 加载时织入器进行加载时织入**\n\
  \nSpring 2.5 为不同的运行时环境捆绑了多个加载时织入器。要为你的 Spring 应用程序启用合适的加载时织入器，你只需声明一个空的 XML 元素 `<context:load-time-weaver>`。该元素在\
  \ context 模式中定义，并且仅适用于 Spring 2.5 及更高版本。\n\n<beans\n\n[](http://www.springframework.org/schema/context)\n\
  \n**[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.springframework.org/schema/context)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/context)\n\
  \n\n\n[`www.springframework.org/schema/aop`](http://www.springframework.org/schema/context)\n\
  \n[`www.springframework.org/schema/aop/spring-aop-2.5.xsd`](http://www.springframework.org/schema/context)\n\
  \n[**http://www.springframework.org/schema/context**](http://www.springframework.org/schema/context)\n\
  \n[**http://www.springframework.org/schema/context/spring-context-2.5.xsd\">**](http://www.springframework.org/schema/context)\n\
  \n**<context:load-time-weaver />**\n\n...\n\n</beans>\n\nSpring 能够自动检测出最适合你运行时环境的加载时织入器。某些\
  \ Java EE 应用服务器拥有支持 Spring 加载时织入机制的类加载器，因此无需在其启动命令中指定 Java 代理。\n\n然而，对于简单的 Java\
  \ 应用程序，你仍然需要 Spring 提供的织入代理来启用加载时织入。你必须在启动命令的 VM 参数中指定 Spring 代理。\n\njava **-javaagent:c:/spring-framework-2.5/dist/weaving/spring-agent.jar➥**\n\
  \ncom.apress.springrecipes.calculator.Main\n\n但是，如果你运行应用程序，将会得到以下输出和缓存状态。\n\n这是因为\
  \ Spring 代理仅对 Spring IoC 容器中声明的 bean 所调用的 `Complex(int, int)` 构造函数进行通知。由于复杂操作数是在\
  \ `Main` 类中创建的，Spring 代理不会通知它们的构造函数调用。\n\n9799ch06.qxd 4/15/08 11:45 AM 第 201 页\n\
  \n第 6 章 **■** S P R I N G 2 . X A O P 与 A S P E C T J 支持\n\n**201**\n\n(3,5) 缓存未命中\n\
  \n(1 + 2i) + (2 + 3i) = (3 + 5i)\n\n(3,5) 缓存命中\n\n(5 + 8i) - (2 + 3i) = (3 + 5i)\n\
  \n**6-11. 在 Spring 中配置 AspectJ 切面**\n\n问题\n\nSpring AOP 切面在 bean 配置文件中声明，以便于配置。然而，要在\
  \ AspectJ 框架中使用的切面是由 AspectJ 框架本身实例化的。你必须从 AspectJ 框架中获取切面实例来进行配置。\n\n解决方案\n\n每个\
  \ AspectJ 切面都提供了一个名为 `aspectOf()` 的静态工厂方法，允许你访问当前的切面实例。在 Spring IoC 容器中，你可以通过指定\
  \ `factory-method` 属性来声明一个由工厂方法创建的 bean。\n\n工作原理\n\n例如，你可以允许通过 setter 方法配置 `ComplexCachingAspect`\
  \ 的缓存映射，并从构造函数中删除其实例化代码。\n\npackage com.apress.springrecipes.calculator;\n\n...\n\
  \nimport java.util.Collections;\n\nimport java.util.Map;\n\nimport org.aspectj.lang.annotation.Aspect;\n\
  \n@Aspect\n\npublic class ComplexCachingAspect {\n\nprivate Map<String, Complex>\
  \ cache;\n\npublic void setCache(Map<String, Complex> cache) {\n\nthis.cache = Collections.synchronizedMap(cache);\n\
  \n}\n\n...\n\n}\n\n要在 Spring IoC 容器中配置此属性，你可以声明一个由工厂方法 `aspectOf()` 创建的 bean。\n\n\
  9799ch06.qxd 4/15/08 11:45 AM 第 202 页\n\n**202**\n\n第 6 章 **■** S P R I N G 2 .\
  \ X A O P 与 A S P E C T J 支持\n\n<bean class=\"com.apress.springrecipes.calculator.ComplexCachingAspect\"\
  \n\n**factory-method=\"aspectOf\"** >\n\n<property name=\"cache\">\n\n<map>\n\n\
  <entry key=\"2,3\">\n\n<bean class=\"com.apress.springrecipes.calculator.Complex\"\
  >\n\n<constructor-arg value=\"2\" />\n\n<constructor-arg value=\"3\" />\n\n</bean>\n\
  \n</entry>\n\n<entry key=\"3,5\">\n\n<bean class=\"com.apress.springrecipes.calculator.Complex\"\
  >\n\n<constructor-arg value=\"3\" />\n\n<constructor-arg value=\"5\" />\n\n</bean>\n\
  \n</entry>\n\n</map>\n\n</property>\n\n</bean>\n\n**■提示** 你可能会疑惑为什么你的 `ComplexCachingAspect`\
  \ 有一个你并未声明的静态工厂方法 `aspectOf()`。此方法是由 AspectJ 在加载时织入的，以便允许你访问当前的切面实例。因此，如果你使用 Spring\
  \ IDE，它可能会给出一个警告，因为它无法在你的类中找到此方法。\n\n**6-12. 将 Spring Bean 注入到领域对象中**\n\n问题\n\n\
  在 Spring IoC 容器中声明的 Bean 可以通过 Spring 的依赖注入能力相互装配。然而，在 Spring IoC 容器外部创建的对象\n\n\n\
  容器无法通过配置自动将自身连接到 Spring Bean。你必须通过编程代码手动执行连接。\n\n解决方案\n\n在 Spring IoC 容器外部创建的对象通常是领域对象。它们通常使用\
  \ `new` 运算符创建，或者来自数据库查询的结果。\n\n要将 Spring Bean 注入到 Spring 外部创建的领域对象中，你需要 AOP 的帮助。实际上，Spring\
  \ Bean 的注入也是一种横切关注点。由于领域对象并非由 Spring 创建，因此无法使用 Spring AOP 进行注入。Spring 为此提供了一个专门的\
  \ AspectJ 切面。你可以在 AspectJ 框架中启用此切面。\n\n9799ch06.qxd 4/15/08 11:45 AM 第 203 页\n\n\
  第 6 章 **■** S P R I N G 2 . X A O P 与 A S P E C T J 支持\n\n**203**\n\n工作原理\n\n假设你有一个全局格式化器用于格式化复数。该格式化器接受一个用于格式化的模式。\n\
  \npackage com.apress.springrecipes.calculator;\n\npublic class ComplexFormatter\
  \ {\n\nprivate String pattern;\n\npublic void setPattern(String pattern) {\n\nthis.pattern\
  \ = pattern;\n\n}\n\npublic String format(Complex complex) {\n\nreturn pattern.replaceAll(\"\
  a\", Integer.toString(complex.getReal()))\n\n.replaceAll(\"b\", Integer.toString(complex.getImaginary()));\n\
  \n}\n\n}\n\n然后，你在 Spring IoC 容器中配置此格式化器，并为其指定一个模式。\n\n<bean id=\"complexFormatter\"\
  \n\nclass=\"com.apress.springrecipes.calculator.ComplexFormatter\">\n\n<property\
  \ name=\"pattern\" value=\"(a + bi)\" />\n\n</bean>\n\n在 `Complex` 类中，你希望在 `toString()`\
  \ 方法中使用此格式化器将复数转换为字符串。它暴露了一个用于 `ComplexFormatter` 的 setter 方法。\n\npackage com.apress.springrecipes.calculator;\n\
  \npublic class Complex {\n\nprivate int real;\n\nprivate int imaginary;\n\n...\n\
  \nprivate ComplexFormatter formatter;\n\npublic void setFormatter(ComplexFormatter\
  \ formatter) {\n\nthis.formatter = formatter;\n\n}\n\npublic String toString() {\n\
  \n**return formatter.format(this);**\n\n}\n\n}\n\n9799ch06.qxd 4/15/08 11:45 AM\
  \ 第 204 页\n\n**204**\n\n第 6 章 **■** S P R I N G 2 . X A O P 与 A S P E C T J 支持\n\
  \n然而，由于复数对象并非在 Spring IoC 容器内创建，因此无法为它们配置依赖注入。你必须编写代码，将一个 `ComplexFormatter` 实例注入到每个复数对象中。\n\
  \n好消息是，Spring 在其切面库中包含了 `AnnotationBeanConfigurerAspect`，用于配置任何对象的依赖关系，即使它们不是由 Spring\
  \ IoC 容器创建的。首先，你必须使用 `@Configurable` 注解来标注你的对象类型，以声明该类型的对象是可配置的。\n\npackage com.apress.springrecipes.calculator;\n\
  \nimport org.springframework.beans.factory.annotation.Configurable;\n\n**@Configurable**\n\
  \npublic class Complex {\n\n...\n\n}\n\nSpring 定义了一个便捷的 XML 元素 `<context:spring-configured>`，供你启用上述切面。在\
  \ Spring 2.0 中，此元素位于 `aop` 模式中。自 Spring 2.5 起，它已移至 `context` 模式。\n\n**■注意** 要使用\
  \ Spring 的 AspectJ 切面库，你必须将 `spring-aspects.jar`（位于 Spring 安装目录的 `dist/weaving`\
  \ 目录下）包含在你的类路径中。\n\n<beans ...>\n\n...\n\n<context:load-time-weaver />\n\n**<context:spring-configured\
  \ />**\n\n<bean class=\"com.apress.springrecipes.calculator.Complex\"\n\n**scope=\"\
  prototype\"** >\n\n<property name=\"formatter\" ref=\"complexFormatter\" />\n\n\
  </bean>\n\n</beans>\n\n当带有 `@Configurable` 注解的类被实例化时，该切面会查找一个原型作用域的 Bean 定义，其类型与该类相同。然后，它会根据此\
  \ Bean 定义来配置新实例。如果 Bean 定义中声明了属性，新实例也将由该切面设置相同的属性。\n\n最后，需要由 AspectJ 框架启用该切面才能生效。你可以使用\
  \ Spring 代理在加载时将切面织入到你的类中。\n\njava **-javaagent:c:/spring-framework-2.5/dist/weaving/spring-agent.jar➥**\n\
  \n\n\ncom.apress.springrecipes.calculator.Main\n\n9799ch06.qxd 4/15/08 11:45 AM\
  \ 第 205 页\n\n第 6 章 **■** S P R I N G 2 . X A O P 与 A S P E C T J 支持\n\n**205**\n\
  \n将可配置类与 Bean 定义关联起来的另一种方式是通过 Bean ID。\n\n你可以将 Bean ID 作为 `@Configurable` 注解的值来呈现。\n\
  \npackage com.apress.springrecipes.calculator;\n\nimport org.springframework.beans.factory.annotation.Configurable;\n\
  \n@Configurable(**\"complex\"** )\n\npublic class Complex {\n\n...\n\n}\n\n然后，你必须在相应的\
  \ Bean 定义中添加 `id` 属性，以便与可配置类关联。\n\n<bean **id=\"complex\"** class=\"com.apress.springrecipes.calculator.Complex\"\
  \n\nscope=\"prototype\">\n\n<property name=\"formatter\" ref=\"complexFormatter\"\
  \ />\n\n</bean>\n\n与普通的 Spring Bean 类似，可配置 Bean 也支持自动装配和依赖检查。\n\npackage com.apress.springrecipes.calculator;\n\
  \nimport org.springframework.beans.factory.annotation.Autowire;\n\nimport org.springframework.beans.factory.annotation.Configurable;\n\
  \n@Configurable(\n\nvalue = \"complex\",\n\n**autowire = Autowire.BY_TYPE,**\n\n\
  **dependencyCheck = true)**\n\npublic class Complex {\n\n...\n\n}\n\n请注意，`dependencyCheck`\
  \ 属性是布尔类型，而非枚举类型。\n\n当它设置为 `true` 时，其效果与 `dependency-check=\"objects\"` 相同——即检查非原始类型和非集合类型。启用自动装配后，你不再需要显式设置\
  \ `formatter` 属性。\n\n<bean id=\"complex\" class=\"com.apress.springrecipes.calculator.Complex\"\
  \n\nscope=\"prototype\" />\n\n在 Spring 2.5 中，你不再需要在类级别为 `@Configurable` 配置自动装配和依赖检查。相反，你可以使用\
  \ `@Autowired` 注解来标注 `formatter` 的 setter 方法。\n\n9799ch06.qxd 4/15/08 11:45 AM 第\
  \ 206 页\n\n**206**\n\n第 6 章 **■** S P R I N G 2 . X A O P 与 A S P E C T J 支持\n\n\
  package com.apress.springrecipes.calculator;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.beans.factory.annotation.Configurable;\n\n**@Configurable(\"\
  complex\")**\n\npublic class Complex {\n\n...\n\nprivate ComplexFormatter formatter;\n\
  \n**@Autowired**\n\npublic void setFormatter(ComplexFormatter formatter) {\n\nthis.formatter\
  \ = formatter;\n\n}\n\n}\n\n然后，在 Bean 配置文件中启用 `<context:annotation-config>` 元素，以处理带有这些注解的方法。\n\
  \n<beans ...>\n\n**<context:annotation-config />**\n\n...\n\n</beans>\n\n**6-13.\
  \ 小结**\n\n在本章中，你学习了如何使用 AspectJ 注解或基于 XML 的配置在 Bean 配置文件中编写切面，以及如何将它们注册到 Spring\
  \ IoC 容器中。Spring 2.x AOP 支持五种类型的通知：前置通知、后置通知、返回后通知、抛出异常后通知和环绕通知。\n\n你还学习了各种类型的切点，用于通过方法签名、类型签名和\
  \ Bean 名称来匹配连接点。然而，Spring AOP 仅支持在其 IoC 容器中声明的 Bean 的方法执行连接点。如果你使用了超出此范围的切点表达式，将会抛出异常。\n\
  \n引入是一种特殊类型的 AOP 通知。它允许你的对象通过提供一个实现类来动态实现一个接口。它可以达到与多重继承相同的效果。引入通常用于为一组现有对象添加行为和状态。\n\
  \n如果你想使用 Spring AOP 不支持的切点类型，或者将切面应用于在 Spring IoC 容器外部创建的对象，你必须在 Spring 应用程序中使用\
  \ AspectJ 框架。切面可以通过加载时织入器织入到你的类中。Spring 还在其切面库中提供了几个有用的 AspectJ 切面。其中之一是将 Spring\
  \ Bean 注入到在 Spring 外部创建的领域对象中。\n\n在下一章中，你将学习 Spring JDBC 框架如何减少访问关系型数据库的工作量。\n\n\
  9799ch07.qxd 5/5/08 4:47 PM 第 207 页\n\n第 2 部分\n\n基础知识\n\n9799ch07.qxd 5/5/08 4:47\
  \ PM 第 208 页\n\n9799ch07.qxd 5/5/08 4:47 PM 第 209 页\n\n\n\n第 7 章\n\nSpring JDBC\
  \ 支持\n\n**本**章将介绍 Spring 如何简化数据库访问任务。数据访问是大多数企业应用的常见需求，通常需要访问存储在关系型数据库中的数据。作为 Java\
  \ SE 的核心组成部分，JDBC（Java 数据库连接）定义了一套标准 API，使您能够以与供应商无关的方式访问关系型数据库。\n\nJDBC 的目标是提供\
  \ API，使您能够针对数据库执行 SQL 语句。然而，使用 JDBC 时，您必须自行管理数据库相关资源，并显式处理数据库异常。为简化 JDBC 的使用，Spring\
  \ 通过在 JDBC API 之上定义抽象层，构建了一个 JDBC 访问框架。\n\n作为 Spring JDBC 框架的核心，JDBC 模板旨在为不同类型的\
  \ JDBC 操作提供模板方法。每个模板方法负责控制整体流程，并允许您覆盖流程中的特定任务。通过这种方式，您可以在保留最大灵活性的同时，最大限度地减少数据库访问的工作量。\n\
  \n除了 JDBC 模板方法外，Spring JDBC 框架还提供了另一种更面向对象的方法来组织数据访问逻辑。它使您能够将每个数据库操作建模为细粒度的操作对象。与\
  \ JDBC 模板方法相比，JDBC 操作对象方法只是组织数据访问逻辑的另一种选择。有些开发者可能更偏好前者，而另一些则更喜欢后者。\n\n完成本章学习后，您将能够使用\
  \ Spring JDBC 框架访问关系型数据库。作为 Spring 数据访问模块的一部分，Spring JDBC 框架与该模块的其他部分保持一致。因此，学习\
  \ JDBC 框架是了解整个数据访问模块的理想入门。\n\n**7-1. 直接使用 JDBC 的问题**\n\n假设您要开发一个车辆登记应用，其主要功能是对车辆记录进行基本的\
  \ CRUD（创建、读取、更新和删除）操作。\n\n这些记录将存储在关系型数据库中，并通过 JDBC 进行访问。首先，您设计了以下 Vehicle 类，用于在\
  \ Java 中表示车辆：\n\n**209**\n\n9799ch07.qxd 5/5/08 4:47 PM 第 210 页\n\n**210**\n\n第\
  \ 7 章 **■** S P R I N G J D B C 支持\n\npackage com.apress.springrecipes.vehicle;\n\
  \npublic class Vehicle {\n\nprivate String vehicleNo;\n\nprivate String color;\n\
  \nprivate int wheel;\n\nprivate int seat;\n\n// 构造方法、Getter 和 Setter 方法\n\n...\n\
  \n}\n\n设置应用数据库\n\n在开发车辆登记应用之前，您需要为其设置数据库。\n\n考虑到低内存消耗和易于配置，我选择了 Apache Derby（[`db.apache.org/derby/`](http://db.apache.org/derby)）作为数据库引擎。Derby\
  \ 是一个开源关系型数据库引擎，基于 Apache 许可证提供，并使用纯 Java 实现。\n\n**■注意** 您可以从 Apache Derby 网站下载\
  \ Apache Derby 二进制发行版（例如 v10.3），并将其解压到您选择的目录中即可完成安装。\n\nDerby 可以以嵌入式模式或客户端/服务器模式运行。出于测试目的，客户端/服务器模式更为合适，因为它允许您使用任何支持\
  \ JDBC 的可视化数据库工具（例如 Eclipse 数据工具平台（DTP））来检查和编辑数据。\n\n**■注意** 要以客户端/服务器模式启动 Derby\
  \ 服务器，只需执行适用于您平台的 startNetworkServer 脚本（位于 Derby 安装目录的 bin 目录中）。\n\n在本地主机上启动 Derby\
  \ 网络服务器后，您可以使用表 7-1 中所示的 JDBC 属性连接到该服务器。\n\n**■注意** 您需要 Derby 的客户端 JDBC 驱动程序 derbyclient.jar（位于\
  \ Derby 安装目录的 lib 目录中）才能连接到 Derby 服务器。\n\n9799ch07.qxd 5/5/08 4:47 PM 第 211 页\n\n\
  \n\n第 7 章 **■** Spring JDBC 支持\n\n**211**\n\n**表 7-1.** *连接应用程序数据库的 JDBC 属性* **属性**\n\
  \n**值**\n\n驱动类\n\norg.apache.derby.jdbc.ClientDriver\n\nURL\n\njdbc:derby://localhost:1527/vehicle;create=true\n\
  \n用户名\n\napp\n\n密码\n\napp\n\n首次连接此数据库时，如果之前不存在，则会创建 vehicle 数据库实例，因为你在 URL 中指定了\
  \ create=true。你可以为用户名和密码提供任意值，因为 Derby 默认禁用身份验证。接下来，你需要使用以下 SQL 语句创建用于存储车辆记录的 VEHICLE\
  \ 表。\n\n默认情况下，此表将在 APP 数据库模式中创建。\n\nCREATE TABLE VEHICLE (\n\nVEHICLE_NO VARCHAR(10)\
  \ NOT NULL,\n\nCOLOR VARCHAR(10),\n\nWHEEL INT,\n\nSEAT INT,\n\nPRIMARY KEY (VEHICLE_NO)\n\
  \n);\n\n理解数据访问对象设计模式\n\n经验不足的开发人员常犯的一个典型设计错误是将不同类型的逻辑（例如，表示逻辑、业务逻辑和数据访问逻辑）混合在单个大型模块中。这降低了模块的可重用性和可维护性，因为它引入了紧密耦合。*数据访问对象（DAO）*模式的一般目的是通过将数据访问逻辑与业务逻辑和表示逻辑分离来避免这些问题。该模式建议将数据访问逻辑封装在称为数据访问对象的独立模块中。\n\
  \n对于你的车辆注册应用程序，你可以抽象出插入、更新、删除和查询车辆的数据访问操作。这些操作应在 DAO 接口中声明，以允许采用不同的 DAO 实现技术。\n\n\
  package com.apress.springrecipes.vehicle;\n\npublic interface VehicleDao {\n\npublic\
  \ void insert(Vehicle vehicle);\n\npublic void update(Vehicle vehicle);\n\npublic\
  \ void delete(Vehicle vehicle);\n\npublic Vehicle findByVehicleNo(String vehicleNo);\n\
  \n}\n\nJDBC API 的大部分部分都声明抛出 java.sql.SQLException。但由于此接口仅旨在抽象数据访问操作，因此它不应依赖于实现技术。因此，这个通用接口声明抛出\
  \ JDBC 特定的 SQLException 是不明智的。实现 DAO 接口时的一种常见做法是将此类异常包装为运行时异常。\n\n使用 JDBC 实现 DAO\n\
  \n为了使用 JDBC 访问数据库，你需要为此 DAO 接口创建一个实现（例如，JdbcVehicleDao）。由于你的 DAO 实现必须连接到数据库才能执行\
  \ SQL 语句，你可以通过指定驱动类名、数据库 URL、用户名和密码来建立数据库连接。但在 JDBC 2.0 或更高版本中，你可以从预配置的 javax.sql.DataSource\
  \ 对象获取数据库连接，而无需了解连接细节。\n\npackage com.apress.springrecipes.vehicle;\n\nimport java.sql.Connection;\n\
  \nimport java.sql.PreparedStatement;\n\nimport java.sql.ResultSet;\n\nimport java.sql.SQLException;\n\
  \nimport javax.sql.DataSource;\n\npublic class JdbcVehicleDao implements VehicleDao\
  \ {\n\nprivate DataSource dataSource;\n\npublic void setDataSource(DataSource dataSource)\
  \ {\n\nthis.dataSource = dataSource;\n\n}\n\npublic void insert(Vehicle vehicle)\
  \ {\n\nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO, COLOR, WHEEL, SEAT) \"\n\n\
  + \"VALUES (?, ?, ?, ?)\";\n\nConnection conn = null;\n\ntry {\n\nconn = dataSource.getConnection();\n\
  \nPreparedStatement ps = conn.prepareStatement(sql);\n\nps.setString(1, vehicle.getVehicleNo());\n\
  \nps.setString(2, vehicle.getColor());\n\nps.setInt(3, vehicle.getWheel());\n\n\
  ps.setInt(4, vehicle.getSeat());\n\nps.executeUpdate();\n\nps.close();\n\n} catch\
  \ (SQLException e) {\n\nthrow new RuntimeException(e);\n\n} finally {\n\nif (conn\
  \ != null) {\n\ntry {\n\n9799ch07.qxd 5/5/08 4:47 PM 第 213 页\n\n第 7 章 **■** Spring\
  \ JDBC 支持\n\n**213**\n\nconn.close();\n\n} catch (SQLException e) {}\n\n}\n\n}\n\
  \n}\n\npublic Vehicle findByVehicleNo(String vehicleNo) {\n\n\n\n```java\nString\
  \ sql = \"SELECT * FROM VEHICLE WHERE VEHICLE_NO = ?\";\n\nConnection conn = null;\n\
  \ntry {\n\nconn = dataSource.getConnection();\n\nPreparedStatement ps = conn.prepareStatement(sql);\n\
  \nps.setString(1, vehicleNo);\n\nVehicle vehicle = null;\n\nResultSet rs = ps.executeQuery();\n\
  \nif (rs.next()) {\n\nvehicle = new Vehicle(rs.getString(\"VEHICLE_NO\"),\n\nrs.getString(\"\
  COLOR\"), rs.getInt(\"WHEEL\"),\n\nrs.getInt(\"SEAT\"));\n\n}\n\nrs.close();\n\n\
  ps.close();\n\nreturn vehicle;\n\n} catch (SQLException e) {\n\nthrow new RuntimeException(e);\n\
  \n} finally {\n\nif (conn != null) {\n\ntry {\n\nconn.close();\n\n} catch (SQLException\
  \ e) {}\n\n}\n\n}\n\n}\n\npublic void update(Vehicle vehicle) {}\n\npublic void\
  \ delete(Vehicle vehicle) {}\n\n}\n```\n\n车辆插入操作是一个典型的 JDBC 更新场景。每次调用此方法时，你都会从数据源获取一个连接，并在此连接上执行\
  \ SQL 语句。你的 DAO 接口没有声明抛出任何受检异常，因此如果发生 `SQLException`，你必须将其包装为未受检的 `RuntimeException`。最后，别忘了在\
  \ `finally` 块中释放连接。如果不这样做，可能会导致应用程序耗尽连接。\n\n这里将跳过更新和删除操作，因为从技术角度来看，它们与插入操作非常相似。对于查询操作，除了执行\
  \ SQL 语句外，你还必须从返回的结果集中提取数据来构建一个车辆对象。\n\n## 在 Spring 中配置数据源\n\n`javax.sql.DataSource`\
  \ 接口是 JDBC 规范定义的标准接口。不同供应商和项目提供了许多数据源实现。由于它们都实现了通用的 `DataSource` 接口，因此在不同数据源实现之间切换非常容易。作为一个\
  \ Java 应用框架，Spring 也提供了几个方便但功能较弱的数据源实现。最简单的是 `DriverManagerDataSource`，它每次被请求时都会打开一个新的连接。\n\
  \n**■注意** 要访问运行在 Derby 服务器上的数据库实例，你必须在类路径中包含 `derbyclient.jar`（位于 Derby 安装目录的 `lib`\
  \ 目录下）。\n\n```xml\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n\
  \       xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n       xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n       http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  >\n\n    <bean id=\"dataSource\"\n          class=\"org.springframework.jdbc.datasource.DriverManagerDataSource\"\
  >\n        <property name=\"driverClassName\"\n                  value=\"org.apache.derby.jdbc.ClientDriver\"\
  \ />\n        <property name=\"url\"\n                  value=\"jdbc:derby://localhost:1527/vehicle;create=true\"\
  \ />\n        <property name=\"username\" value=\"app\" />\n        <property name=\"\
  password\" value=\"app\" />\n    </bean>\n\n    <bean id=\"vehicleDao\"\n      \
  \    class=\"com.apress.springrecipes.vehicle.JdbcVehicleDao\">\n        <property\
  \ name=\"dataSource\" ref=\"dataSource\" />\n    </bean>\n\n</beans>\n```\n\n`DriverManagerDataSource`\
  \ 不是一个高效的数据源实现，因为它每次被请求时都会为客户端打开一个新的连接。Spring 提供的另一个数据源实现是 `SingleConnectionDataSource`。顾名思义，它只维护一个单一的连接，该连接一直被重用且从不关闭。显然，它不适合在多线程环境中使用。\n\
  \nSpring 自身的数据源实现主要用于测试目的。然而，许多生产环境的数据源实现都支持连接池。例如，Apache Commons 库的 DBCP（数据库连接池服务）模块就有几个支持连接池的数据源实现。其中，`BasicDataSource`\
  \ 接受与 `DriverManagerDataSource` 相同的连接属性，并允许你指定连接池的初始连接大小和最大活动连接数。\n\n**■注意** 要使用\
  \ DBCP 提供的数据源实现，你必须在类路径中包含 `commons-dbcp.jar` 和 `commons-pool.jar`（位于 Spring 安装目录的\
  \ `lib/jakarta-commons` 目录下）。\n\n```xml\n<bean id=\"dataSource\"\n      class=\"\
  org.apache.commons.dbcp.BasicDataSource\">\n    <property name=\"driverClassName\"\
  \n              value=\"org.apache.derby.jdbc.ClientDriver\" />\n    <property name=\"\
  url\"\n              value=\"jdbc:derby://localhost:1527/vehicle;create=true\" />\n\
  \    <property name=\"username\" value=\"app\" />\n    <property name=\"password\"\
  \ value=\"app\" />\n    <property name=\"initialSize\" value=\"2\" />\n    <property\
  \ name=\"maxActive\" value=\"5\" />\n</bean>\n```\n\n许多 Java EE 应用服务器内置了数据源实现，你可以通过服务器控制台进行配置。如果你在应用服务器中配置了一个数据源并暴露给\
  \ JNDI 查找，你可以使用 `JndiObjectFactoryBean` 来查找它。\n\n```xml\n<bean id=\"dataSource\"\
  \n      class=\"org.springframework.jndi.JndiObjectFactoryBean\">\n    <property\
  \ name=\"jndiName\" value=\"jdbc/VehicleDS\" />\n</bean>\n```\n\n在 Spring 2.x 中，可以通过\
  \ `jee` 模式中定义的 `jndi-lookup` 元素来简化 JNDI 查找。\n\n```xml\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n       xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n       xmlns:jee=\"\
  http://www.springframework.org/schema/jee\"\n       xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
  \       http://www.springframework.org/schema/beans/spring-beans-2.0.xsd\n     \
  \  http://www.springframework.org/schema/jee\n       http://www.springframework.org/schema/jee/spring-jee-2.0.xsd\"\
  >\n\n    <jee:jndi-lookup id=\"dataSource\" jndi-name=\"jdbc/VehicleDS\" />\n\n\
  \    ...\n\n</beans>\n```\n\n## 运行 DAO\n\n以下 `Main` 类通过使用 DAO 向数据库插入一辆新车来测试它。如果成功，你可以立即从数据库中查询该车辆。\n\
  \n```java\npackage com.apress.springrecipes.vehicle;\n\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.support.ClassPathXmlApplicationContext;\n\npublic\
  \ class Main {\n\n    public static void main(String[] args) {\n        ApplicationContext\
  \ context =\n                new ClassPathXmlApplicationContext(\"beans.xml\");\n\
  \        VehicleDao vehicleDao = (VehicleDao) context.getBean(\"vehicleDao\");\n\
  \        Vehicle vehicle = new Vehicle(\"TEM0001\", \"Red\", 4, 4);\n        vehicleDao.insert(vehicle);\n\
  \n        vehicle = vehicleDao.findByVehicleNo(\"TEM0001\");\n        System.out.println(\"\
  Vehicle No: \" + vehicle.getVehicleNo());\n        System.out.println(\"Color: \"\
  \ + vehicle.getColor());\n        System.out.println(\"Wheel: \" + vehicle.getWheel());\n\
  \        System.out.println(\"Seat: \" + vehicle.getSeat());\n    }\n}\n```\n\n\
  现在，你可以直接使用 JDBC 实现 DAO。然而，从上面的 DAO 实现可以看出，大多数 JDBC 代码都是相似的，并且每次数据库操作都需要重复编写。这种冗余代码会使你的\
  \ DAO 方法变得冗长且可读性降低。\n\n**7-2. 使用 JDBC 模板更新数据库**\n\n**问题**\n\n要实现一个 JDBC 更新操作，你必须执行以下任务，其中大部分是冗余的：\n\
  \n1.  从数据源获取数据库连接。\n2.  从连接创建 `PreparedStatement` 对象。\n3.  将参数绑定到 `PreparedStatement`\
  \ 对象。\n4.  执行 `PreparedStatement` 对象。\n5.  处理 `SQLException`。\n6.  清理语句对象和连接。\n\n\
  **解决方案**\n\n\n\n`JdbcTemplate` 类声明了许多重载的 `update()` 模板方法，用于控制整个更新过程。不同版本的 `update()`\
  \ 方法允许你覆盖默认流程中的不同任务子集。Spring JDBC 框架预定义了多个回调接口来封装不同的任务子集。你可以实现其中一个回调接口，并将其实例传递给相应的\
  \ `update()` 方法以完成该过程。\n\n工作原理\n\n**使用语句创建器更新数据库**\n\n首先要介绍的回调接口是 `PreparedStatementCreator`。实现此接口可以覆盖整个更新过程中的语句创建任务（任务\
  \ 2）和参数绑定任务（任务 3）。要向数据库中插入一辆车，你可以按如下方式实现 `PreparedStatementCreator` 接口：\n\npackage\
  \ com.apress.springrecipes.vehicle;\n\nimport java.sql.Connection;\n\nimport java.sql.PreparedStatement;\n\
  \nimport java.sql.SQLException;\n\nimport org.springframework.jdbc.core.PreparedStatementCreator;\n\
  \npublic class InsertVehicleStatementCreator implements PreparedStatementCreator\
  \ {\n\nprivate Vehicle vehicle;\n\npublic InsertVehicleStatementCreator(Vehicle\
  \ vehicle) {\n\nthis.vehicle = vehicle;\n\n}\n\npublic PreparedStatement createPreparedStatement(Connection\
  \ conn)\n\nthrows SQLException {\n\nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO,\
  \ COLOR, WHEEL, SEAT) \"\n\n+ \"VALUES (?, ?, ?, ?)\";\n\nPreparedStatement ps =\
  \ conn.prepareStatement(sql);\n\nps.setString(1, vehicle.getVehicleNo());\n\nps.setString(2,\
  \ vehicle.getColor());\n\nps.setInt(3, vehicle.getWheel());\n\nps.setInt(4, vehicle.getSeat());\n\
  \nreturn ps;\n\n}\n\n}\n\n在实现 `PreparedStatementCreator` 接口时，你会将数据库连接作为 `createPreparedStatement()`\
  \ 方法的参数传入。你只需在此方法中基于该连接创建一个 `PreparedStatement` 对象，并将参数绑定到该对象上。最后，你必须将 `PreparedStatement`\
  \ 对象作为方法的返回值返回。请注意，方法签名声明了抛出 `SQLException`，这意味着你无需自行处理此类异常。\n\n现在，你可以使用这个语句创建器来简化车辆插入操作。首先，你需要创建一个\
  \ `JdbcTemplate` 类的实例，并为该模板传入数据源以从中获取连接。然后，你只需调用 `update()` 方法，并将你的语句创建器传入，让模板完成更新过程。\n\
  \npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \npublic class JdbcVehicleDao implements VehicleDao {\n\n...\n\npublic void insert(Vehicle\
  \ vehicle) {\n\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\njdbcTemplate.update(new\
  \ InsertVehicleStatementCreator(vehicle));\n\n}\n\n}\n\n通常，如果 `PreparedStatementCreator`\
  \ 接口和其他回调接口仅在一个方法内使用，最好将它们实现为内部类。这是因为你可以直接从内部类访问局部变量和方法参数，而无需将它们作为构造函数参数传递。对这些变量和参数的唯一限制是它们必须声明为\
  \ `final`。\n\npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \nimport org.springframework.jdbc.core.PreparedStatementCreator;\n\npublic class\
  \ JdbcVehicleDao implements VehicleDao {\n\n...\n\npublic void insert(**final**\
  \ Vehicle vehicle) {\n\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  \njdbcTemplate.update(**new PreparedStatementCreator() {**\n\n**public PreparedStatement\
  \ createPreparedStatement(Connection conn)**\n\n**throws SQLException {**\n\nString\
  \ sql = \"INSERT INTO VEHICLE \"\n\n+ \"(VEHICLE_NO, COLOR, WHEEL, SEAT) \"\n\n\
  + \"VALUES (?, ?, ?, ?)\";\n\nPreparedStatement ps = conn.prepareStatement(sql);\n\
  \nps.setString(1, vehicle.getVehicleNo());\n\nps.setString(2, vehicle.getColor());\n\
  \n\n\nps.setInt(3, vehicle.getWheel());\n\nps.setInt(4, vehicle.getSeat());\n\n\
  9799ch07.qxd 5/5/08 4:47 PM Page 219\n\n第 7 章 **■** Spring JDBC 支持\n\n**219**\n\n\
  return ps;\n\n**}**\n\n**}**);\n\n}\n\n}\n\n现在你可以删除之前的 `InsertVehicleStatementCreator`\
  \ 类，因为它将不再被使用。\n\n**使用语句设置器更新数据库**\n\n第二个回调接口 `PreparedStatementSetter`，顾名思义，只执行整个更新过程中的参数绑定任务（任务\
  \ 3）。\n\npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \nimport org.springframework.jdbc.core.PreparedStatementSetter;\n\npublic class\
  \ JdbcVehicleDao implements VehicleDao {\n\n...\n\npublic void insert(final Vehicle\
  \ vehicle) {\n\nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO, COLOR, WHEEL, SEAT)\
  \ \"\n\n+ \"VALUES (?, ?, ?, ?)\";\n\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  \njdbcTemplate.update(**sql, new PreparedStatementSetter() {**\n\n**public void\
  \ setValues(PreparedStatement ps)**\n\n**throws SQLException {**\n\nps.setString(1,\
  \ vehicle.getVehicleNo());\n\nps.setString(2, vehicle.getColor());\n\nps.setInt(3,\
  \ vehicle.getWheel());\n\nps.setInt(4, vehicle.getSeat());\n\n**}**\n\n**}**);\n\
  \n}\n\n}\n\n`update()` 模板方法的另一个版本接受一个 SQL 语句和一个 `PreparedStatementSetter` 对象作为参数。该方法会根据你的\
  \ SQL 语句为你创建一个 `PreparedStatement` 对象。你只需通过此接口将参数绑定到 `PreparedStatement` 对象即可。\n\
  \n**使用 SQL 语句和参数值更新数据库**\n\n最后，`update()` 方法最简单的版本接受一个 SQL 语句和一个对象数组作为语句参数。它会根据你的\
  \ SQL 语句创建一个 `PreparedStatement` 对象，并为你绑定参数。因此，你无需重写更新过程中的任何任务。\n\n9799ch07.qxd\
  \ 5/5/08 4:47 PM Page 220\n\n**220**\n\n第 7 章 **■** Spring JDBC 支持\n\npackage com.apress.springrecipes.vehicle;\n\
  \n...\n\nimport org.springframework.jdbc.core.JdbcTemplate;\n\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\n\n...\n\npublic void insert(final Vehicle vehicle) {\n\
  \nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO, COLOR, WHEEL, SEAT) \"\n\n+ \"\
  VALUES (?, ?, ?, ?)\";\n\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  \njdbcTemplate.update(sql, **new Object[] { vehicle.getVehicleNo(),**\n\n**vehicle.getColor(),vehicle.getWheel(),\
  \ vehicle.getSeat() }**);\n\n}\n\n}\n\n在介绍的 `update()` 方法的三个不同版本中，最后一个最为简单，因为你无需实现任何回调接口。相比之下，第一个版本最为灵活，因为你可以在\
  \ `PreparedStatement` 对象执行前对其进行任何预处理。在实践中，你应该始终选择能满足你所有需求的最简单版本。\n\n`JdbcTemplate`\
  \ 类还提供了其他重载的 `update()` 方法。详情请参考其 javadoc。\n\n**批量更新数据库**\n\n假设你想向数据库中批量插入车辆。如果你多次调用\
  \ `insert()` 方法，速度会非常慢，因为 SQL 语句会被重复编译。\n\n因此，最好在 DAO 接口中添加一个新方法，用于批量插入车辆。\n\npackage\
  \ com.apress.springrecipes.vehicle;\n\n...\n\npublic interface VehicleDao {\n\n\
  ...\n\npublic void insertBatch(List<Vehicle> vehicles);\n\n}\n\n`JdbcTemplate` 类也提供了用于批量更新操作的\
  \ `batchUpdate()` 模板方法。它需要一个 SQL 语句和一个 `BatchPreparedStatementSetter` 对象作为参数。在此方法中，语句只编译一次，但会执行多次。如果你的数据库驱动程序支持\
  \ JDBC 2.0，此方法会自动利用批量更新功能来提高性能。\n\npackage com.apress.springrecipes.vehicle;\n\n\
  ...\n\nimport org.springframework.jdbc.core.BatchPreparedStatementSetter;\n\nimport\
  \ org.springframework.jdbc.core.JdbcTemplate;\n\n9799ch07.qxd 5/5/08 4:47 PM Page\
  \ 221\n\n第 7 章 **■** Spring JDBC 支持\n\n\n\n**221**\n\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\n\n...\n\npublic void insertBatch(final List<Vehicle>\
  \ vehicles) {\n\nString sql = \"INSERT INTO VEHICLE (VEHICLE_NO, COLOR, WHEEL, SEAT)\
  \ \"\n\n+ \"VALUES (?, ?, ?, ?)\";\n\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  \njdbcTemplate.batchUpdate(sql, **new BatchPreparedStatementSetter() {**\n\npublic\
  \ int getBatchSize() {\n\nreturn vehicles.size();\n\n}\n\npublic void setValues(PreparedStatement\
  \ ps, int i)\n\nthrows SQLException {\n\nVehicle vehicle = vehicles.get(i);\n\n\
  ps.setString(1, vehicle.getVehicleNo());\n\nps.setString(2, vehicle.getColor());\n\
  \nps.setInt(3, vehicle.getWheel());\n\nps.setInt(4, vehicle.getSeat());\n\n}\n\n\
  **}**);\n\n}\n\n}\n\n你可以在 Main 类中使用以下代码片段测试批量插入操作：package com.apress.springrecipes.vehicle;\n\
  \n...\n\npublic class Main {\n\npublic static void main(String[] args) {\n\n...\n\
  \nVehicleDao vehicleDao = (VehicleDao) context.getBean(\"vehicleDao\"); Vehicle\
  \ vehicle1 = new Vehicle(\"TEM0002\", \"Blue\", 4, 4); Vehicle vehicle2 = new Vehicle(\"\
  TEM0003\", \"Black\", 4, 6); vehicleDao.insertBatch(\n\nArrays.asList(new Vehicle[]\
  \ { vehicle1, vehicle2 }));\n\n}\n\n}\n\n**7-3\\. 使用 JDBC 模板查询数据库**\n\n问题\n\n要实现\
  \ JDBC 查询操作，你需要执行以下任务，其中两项（任务 5 和任务 6）是相对于更新操作额外增加的：\n\n9799ch07.qxd 5/5/08 4:47\
  \ PM Page 222\n\n**222**\n\n第 7 章 **■** Spring JDBC 支持\n\n**1.** 从数据源获取数据库连接。\n\n\
  **2.** 从连接创建 PreparedStatement 对象。\n\n**3.** 将参数绑定到 PreparedStatement 对象。\n\n**4.**\
  \ 执行 PreparedStatement 对象。\n\n**5.** 遍历返回的结果集。\n\n**6.** 从结果集中提取数据。\n\n**7.** 处理\
  \ SQLException。\n\n**8.** 清理语句对象和连接。\n\n解决方案\n\nJdbcTemplate 类声明了许多重载的 `query()`\
  \ 模板方法，用于控制整个查询过程。你可以通过实现 `PreparedStatementCreator` 和 `PreparedStatementSetter`\
  \ 接口来覆盖语句创建任务（任务 2）和参数绑定任务（任务 3），就像你在更新操作中所做的那样。此外，Spring JDBC 框架支持多种方式来覆盖数据提取任务（任务\
  \ 6）。\n\n工作原理\n\n**使用行回调处理器提取数据**\n\n`RowCallbackHandler` 是允许你处理结果集当前行的主要接口。其中一个\
  \ `query()` 方法会为你遍历结果集，并为每一行调用你的 `RowCallbackHandler`。因此，对于返回结果集中的每一行，`processRow()`\
  \ 方法都会被调用一次。\n\npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \nimport org.springframework.jdbc.core.RowCallbackHandler;\n\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\n\n...\n\npublic Vehicle findByVehicleNo(String vehicleNo)\
  \ {\n\nString sql = \"SELECT * FROM VEHICLE WHERE VEHICLE_NO = ?\";\n\nJdbcTemplate\
  \ jdbcTemplate = new JdbcTemplate(dataSource);\n\nfinal Vehicle vehicle = new Vehicle();\n\
  \njdbcTemplate. **query**(sql, new Object[] { vehicleNo },\n\n**new RowCallbackHandler()\
  \ {**\n\n**public void processRow(ResultSet rs) throws SQLException {**\n\nvehicle.setVehicleNo(rs.getString(\"\
  VEHICLE_NO\"));\n\n9799ch07.qxd 5/5/08 4:47 PM Page 223\n\n第 7 章 **■** Spring JDBC\
  \ 支持\n\n**223**\n\nvehicle.setColor(rs.getString(\"COLOR\"));\n\nvehicle.setWheel(rs.getInt(\"\
  WHEEL\"));\n\nvehicle.setSeat(rs.getInt(\"SEAT\"));\n\n}\n\n**}**);\n\nreturn vehicle;\n\
  \n}\n\n}\n\n由于该 SQL 查询最多返回一行，你可以创建一个车辆对象作为局部变量，并通过从结果集中提取数据来设置其属性。对于包含多行的结果集，你应该将对象收集到一个列表中。\n\
  \n**使用行映射器提取数据**\n\n\n\n`RowMapper` 接口比 `RowCallbackHandler` 更为通用。其目的是将结果集中的单行映射到自定义对象，因此它既可以应用于单行结果集，也可以应用于多行结果集。从复用的角度来看，将\
  \ `RowMapper` 接口实现为普通类比实现为内部类更好。在该接口的 `mapRow()` 方法中，你需要构造代表一行的对象，并将其作为方法的返回值返回。\n\
  \n```java\npackage com.apress.springrecipes.vehicle;\n\nimport java.sql.ResultSet;\n\
  import java.sql.SQLException;\nimport org.springframework.jdbc.core.RowMapper;\n\
  \npublic class VehicleRowMapper implements RowMapper {\n\n    public Object mapRow(ResultSet\
  \ rs, int rowNum) throws SQLException {\n        Vehicle vehicle = new Vehicle();\n\
  \        vehicle.setVehicleNo(rs.getString(\"VEHICLE_NO\"));\n        vehicle.setColor(rs.getString(\"\
  COLOR\"));\n        vehicle.setWheel(rs.getInt(\"WHEEL\"));\n        vehicle.setSeat(rs.getInt(\"\
  SEAT\"));\n        return vehicle;\n    }\n}\n```\n\n如前所述，`RowMapper` 可用于单行或多行结果集。\n\
  \n当查询唯一对象时（例如在 `findByVehicleNo()` 方法中），你必须调用 `JdbcTemplate` 的 `queryForObject()`\
  \ 方法。\n\n```java\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \npublic class JdbcVehicleDao implements VehicleDao {\n    ...\n    public Vehicle\
  \ findByVehicleNo(String vehicleNo) {\n        String sql = \"SELECT * FROM VEHICLE\
  \ WHERE VEHICLE_NO = ?\";\n        JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  \        Vehicle vehicle = (Vehicle) jdbcTemplate.**queryForObject**(sql,\n    \
  \            new Object[] { vehicleNo }, **new VehicleRowMapper()**);\n        return\
  \ vehicle;\n    }\n}\n```\n\nSpring 2.5 提供了一个便捷的 `RowMapper` 实现 `BeanPropertyRowMapper`，它可以自动将行映射到指定类的新实例。它首先实例化该类，然后通过匹配名称将每个列值映射到属性。它支持将属性名（例如\
  \ `vehicleNo`）匹配到相同的列名或带下划线的列名（例如 `VEHICLE_NO`）。\n\n```java\npackage com.apress.springrecipes.vehicle;\n\
  ...\nimport org.springframework.jdbc.core.BeanPropertyRowMapper;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \npublic class JdbcVehicleDao implements VehicleDao {\n    ...\n    public Vehicle\
  \ findByVehicleNo(String vehicleNo) {\n        String sql = \"SELECT * FROM VEHICLE\
  \ WHERE VEHICLE_NO = ?\";\n        JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  \        Vehicle vehicle = (Vehicle) jdbcTemplate.**queryForObject**(sql,\n    \
  \            new Object[] { vehicleNo },\n                **BeanPropertyRowMapper.newInstance(Vehicle.class)**);\n\
  \        return vehicle;\n    }\n}\n```\n\n**查询多行**\n\n现在让我们看看如何查询包含多行的结果集。例如，假设你需要在\
  \ DAO 接口中提供一个 `findAll()` 方法来获取所有车辆。\n\n```java\npackage com.apress.springrecipes.vehicle;\n\
  ...\npublic interface VehicleDao {\n    ...\n    public List<Vehicle> findAll();\n\
  }\n```\n\n即使没有 `RowMapper` 的帮助，你仍然可以调用 `queryForList()` 方法并传入 SQL 语句。返回的结果将是一个映射列表。每个映射以列名作为键，存储结果集中的一行。\n\
  \n```java\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \npublic class JdbcVehicleDao implements VehicleDao {\n    ...\n    public List<Vehicle>\
  \ findAll() {\n        String sql = \"SELECT * FROM VEHICLE\";\n        JdbcTemplate\
  \ jdbcTemplate = new JdbcTemplate(dataSource);\n        List<Vehicle> vehicles =\
  \ new ArrayList<Vehicle>();\n        List<Map> rows = jdbcTemplate.**queryForList**(sql);\n\
  \        for (Map row : rows) {\n            Vehicle vehicle = new Vehicle();\n\
  \            vehicle.setVehicleNo((String) row.get(\"VEHICLE_NO\"));\n         \
  \   vehicle.setColor((String) row.get(\"COLOR\"));\n            vehicle.setWheel((Integer)\
  \ row.get(\"WHEEL\"));\n            vehicle.setSeat((Integer) row.get(\"SEAT\"));\n\
  \            vehicles.add(vehicle);\n        }\n        return vehicles;\n    }\n\
  }\n```\n\n\n你可以在 Main 类中使用以下代码片段测试你的 `findAll()` 方法：\n\n```java\npackage com.apress.springrecipes.vehicle;\n\
  \n...\n\npublic class Main {\n\n    public static void main(String[] args) {\n\n\
  \        ...\n\n        VehicleDao vehicleDao = (VehicleDao) context.getBean(\"\
  vehicleDao\");\n        List<Vehicle> vehicles = vehicleDao.findAll();\n\n     \
  \   for (Vehicle vehicle : vehicles) {\n\n            System.out.println(\"Vehicle\
  \ No: \" + vehicle.getVehicleNo());\n            System.out.println(\"Color: \"\
  \ + vehicle.getColor());\n            System.out.println(\"Wheel: \" + vehicle.getWheel());\n\
  \            System.out.println(\"Seat: \" + vehicle.getSeat());\n        }\n  \
  \  }\n}\n```\n\n9799ch07.qxd 5/5/08 4:47 PM 第 226 页\n\n**226**\n\n第 7 章 **■** Spring\
  \ JDBC 支持\n\n如果你使用 `RowMapper` 对象来映射结果集中的行，你将通过 `query()` 方法获得一个映射对象的列表。\n\n```java\n\
  package com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.BeanPropertyRowMapper;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\n\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\n\n    ...\n\n    public List<Vehicle> findAll() {\n\n\
  \        String sql = \"SELECT * FROM VEHICLE\";\n        JdbcTemplate jdbcTemplate\
  \ = new JdbcTemplate(dataSource);\n        List<Vehicle> vehicles = jdbcTemplate.**query**(sql,\n\
  \                **BeanPropertyRowMapper.newInstance(Vehicle.class)**);\n      \
  \  return vehicles;\n    }\n}\n```\n\n**查询单个值**\n\n最后，让我们看看如何查询单行单列的结果集。作为示例，将以下操作添加到\
  \ DAO 接口中：\n\n```java\npackage com.apress.springrecipes.vehicle;\n\n...\n\npublic\
  \ interface VehicleDao {\n\n    ...\n\n    public String getColor(String vehicleNo);\n\
  \    public int countAll();\n}\n```\n\n要查询单个字符串值，你可以调用重载的 `queryForObject()` 方法，该方法需要一个\
  \ `java.lang.Class` 类型的参数。此方法将帮助你把结果值映射到你指定的类型。对于整数值，你可以调用便捷方法 `queryForInt()`。\n\
  \n```java\npackage com.apress.springrecipes.vehicle;\n\n...\n\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \npublic class JdbcVehicleDao implements VehicleDao {\n\n    ...\n\n    public String\
  \ getColor(String vehicleNo) {\n\n        String sql = \"SELECT COLOR FROM VEHICLE\
  \ WHERE VEHICLE_NO = ?\";\n        JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
