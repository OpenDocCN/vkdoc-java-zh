  \ntarget.getClass().getClassLoader(),\n\ntarget.getClass().getInterfaces(),\n\n\
  new CalculatorValidationHandler(target));\n\n}\n\nprivate Object target;\n\npublic\
  \ CalculatorValidationHandler(Object target) {\n\nthis.target = target;\n\n}\n\n\
  public Object invoke(Object proxy, Method method, Object[] args)\n\nthrows Throwable\
  \ {\n\n**for (Object arg : args) {**\n\n**validate((Double) arg);**\n\n**}**\n\n\
  Object result = method.invoke(target, args);\n\n\n\nreturn result;\n\n}\n\nprivate\
  \ void validate(double a) {\n\nif (a < 0) {\n\nthrow new IllegalArgumentException(\"\
  仅接受正数\");\n\n}\n\n}\n\n}\n\n在 `Main` 类中，你可以用验证代理包裹日志代理，从而形成代理链。任何计算器方法的调用都会先经过验证代理，再经过日志代理。这意味着验证会在日志记录之前执行。如果你希望顺序相反，则应该用日志代理包裹验证代理。\n\
