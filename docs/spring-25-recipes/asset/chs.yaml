  \ bean 实现了这些接口，并在合适的时机调用回调方法。\n\n```java\npackage com.apress.springrecipes.shop;\n\
  \n...\n\nimport org.springframework.beans.factory.DisposableBean;\n\nimport org.springframework.beans.factory.InitializingBean;\n\
  \npublic class Cashier implements **InitializingBean, DisposableBean** {\n\n...\n\
  \npublic void **afterPropertiesSet()** throws Exception {\n\n9799ch04.qxd 4/10/08\
  \ 10:53 AM Page 112\n\n**112**\n\nC H A P T E R 4 **■** A D VA N C E D S P R I N\
  \ G I O C C O N TA I N E R\n\nopenFile();\n\n}\n\npublic void **destroy**() throws\
  \ Exception {\n\ncloseFile();\n\n}\n\n}\n```\n\n现在，如果你再次运行 `Main` 类，你会看到一条结账记录被追加到文本文件\
  \ `c:/cashier/cashier1.txt` 中。然而，实现这种专有接口会使你的 bean 与 Spring 特定化，从而无法在 Spring IoC\
  \ 容器之外重用。\n\n**设置 init-method 和 destroy-method 属性**\n\n指定初始化和销毁回调方法的更好方式是在 bean\
  \ 声明中设置 `init-method` 和 `destroy-method` 属性。\n\n```xml\n<bean id=\"cashier1\" class=\"\
  com.apress.springrecipes.shop.Cashier\"\n\n**init-method=\"openFile\" destroy-method=\"\
  closeFile\"** >\n\n<property name=\"name\" value=\"cashier1\" />\n\n<property name=\"\
  path\" value=\"c:/cashier\" />\n\n</bean>\n```\n\n通过在 bean 声明中设置这两个属性，你的 `Cashier`\
  \ 类不再需要实现 `InitializingBean` 和 `DisposableBean` 接口。你也可以删除 `afterPropertiesSet()`\
  \ 和 `destroy()` 方法。\n\n**使用 @PostConstruct 和 @PreDestroy 注解**\n\n在 Spring 2.5 中，你可以使用\
  \ JSR-250 生命周期注解 `@PostConstruct` 和 `@PreDestroy` 来注解初始化和销毁回调方法。\n\n\n\n**■注意**\
  \ 要使用 JSR-250 注解，你必须在类路径中包含 `common-annotations.jar`（位于 Spring 安装目录的 `lib/j2ee`\
  \ 文件夹中）。不过，如果你的应用程序运行在 Java SE 6 或 Java EE 5 上，则无需包含此 JAR 文件。\n\n```java\npackage\
  \ com.apress.springrecipes.shop;\n\n...\n\nimport javax.annotation.PostConstruct;\n\
  \nimport javax.annotation.PreDestroy;\n\npublic class Cashier {\n\n...\n\n**@PostConstruct**\n\
  \npublic void openFile() throws IOException {\n\n9799ch04.qxd 4/10/08 10:53 AM Page\
  \ 113\n\nC H A P T E R 4 **■** A D VA N C E D S P R I N G I O C C O N TA I N E R\n\
  \n**113**\n\nFile logFile = new File(path, name + \".txt\");\n\nwriter = new BufferedWriter(new\
  \ OutputStreamWriter(\n\nnew FileOutputStream(logFile, true)));\n\n}\n\n**@PreDestroy**\n\
  \npublic void closeFile() throws IOException {\n\nwriter.close();\n\n}\n\n}\n```\n\
  \n然后，你在 IoC 容器中注册一个 `CommonAnnotationBeanPostProcessor` 实例，以便通过生命周期注解调用初始化和销毁回调方法。这样，你就不再需要为\
  \ Bean 指定 `init-method` 和 `destroy-method` 属性了。\n\n```xml\n<beans ...>\n\n...\n\n\
