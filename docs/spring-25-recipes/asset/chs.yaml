  \ 返回一个 `ModelAndView` 对象。你的 Portlet 控制器可以直接实现 `Controller` 接口，或者继承 `AbstractController`\
  \ 基类，该类提供了一些基本的控制器特性，例如内容缓存。\n\n**■注意** 要编译你的 Portlet 控制器，你必须在类路径中包含 `portlet-api.jar`（位于\
  \ Spring 安装目录的 `lib/portlet` 目录下）。\n\n```java\npackage com.apress.springrecipes.travel.weather;\n\
  \nimport javax.portlet.RenderRequest;\n\nimport javax.portlet.RenderResponse;\n\n\
  import org.springframework.web.portlet.ModelAndView;\n\nimport org.springframework.web.portlet.mvc.AbstractController;\n\
  \npublic class WeatherController extends AbstractController {\n\nprivate WeatherService\
  \ weatherService;\n\npublic void setWeatherService(WeatherService weatherService)\
  \ {\n\nthis.weatherService = weatherService;\n\n}\n\npublic ModelAndView handleRenderRequestInternal(\n\
  \nRenderRequest request, RenderResponse response) throws Exception {\n\nreturn new\
  \ ModelAndView(\"weatherView\",\n\n\"temperatures\", weatherService.getMajorCityTemperatures());\n\
  \n}\n\n}\n```\n\n9799ch14.qxd 5/14/08 4:26 PM 第 517 页\n\n第 14 章 **■** S P R I N\
