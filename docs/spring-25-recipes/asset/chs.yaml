  \ e) {}\n\n}\n\n}\n\n除了正常情况外，典型的测试还应包含异常情况，这些情况通常预期会抛出异常。要在 JUnit 3.8 中测试某个方法是否抛出异常，你可以用\
  \ `try/catch` 块包围该方法调用。然后，在 `try` 块中该方法调用的下一行，如果没有抛出异常，则测试应失败。\n\n**■注意** 大多数 Java\
  \ IDE（包括 Eclipse）都提供了 JUnit 测试运行器，供你运行 JUnit 测试用例。如果所有测试通过，你会看到绿色条；如果有任何测试失败，你会看到红色条。但是，如果你没有使用支持\
  \ JUnit 的 IDE，你仍然可以在命令行运行 JUnit 测试。JUnit 3.8 提供了基于 GUI 和基于文本的测试运行器，但 JUnit 4 不再附带基于\
  \ GUI 的测试运行器。\n\n**使用 JUnit 4 进行测试**\n\n在 JUnit 4 中，包含测试用例的类不再需要继承 `TestCase` 类。它可以是一个任意类。测试用例只是一个带有\
  \ `@Test` 注解的公有方法。类似地，你不再需要重写 `setUp()` 和 `tearDown()` 方法，而是用 `@Before` 或 `@After`\
  \ 注解来标记一个公有方法。你还可以用 `@BeforeClass` 或 `@AfterClass` 注解一个公有静态方法，使其在该类中所有测试用例之前或之后运行一次。\n\
  \n由于你的类没有继承 `TestCase`，因此它不会继承断言方法。所以，你必须直接调用 `Assert` 类中声明的静态断言方法。不过，你可以通过 Java\
  \ 1.5 中的静态导入语句来导入所有断言方法。你可以创建以下 JUnit 4 测试用例来测试你的单利计算器。\n\n\n\n**■注意** 要编译和运行针对\
  \ JUnit 4.4 创建的测试用例，你需要在类路径中包含 `junit-4.4.jar`（位于 Spring 安装目录的 `lib/junit` 目录下）。\n\
