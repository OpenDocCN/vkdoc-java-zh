  \ 高级 Spring IoC 容器\n\n**4-11\\. 外部化 Bean 配置**\n\n问题\n\n在配置文件中配置 Bean 时，必须记住，将部署细节（例如文件路径、服务器地址、用户名和密码）与\
  \ Bean 配置混合在一起并不是一个好习惯。通常，Bean 配置由应用程序开发人员编写，而部署细节则由部署人员或系统管理员负责。\n\n解决方案\n\nSpring\
  \ 提供了一个名为 `PropertyPlaceholderConfigurer` 的 Bean 工厂后处理器，用于将部分 Bean 配置外部化到属性文件中。你可以在\
  \ Bean 配置文件中使用 `${var}` 形式的变量，`PropertyPlaceholderConfigurer` 将从属性文件加载属性，并用它们替换这些变量。\n\
  \n*Bean 工厂后处理器*与 Bean 后处理器的不同之处在于，它的目标是 IoC 容器（无论是 Bean 工厂还是应用上下文），而不是 Bean 实例。它会在\
  \ IoC 容器加载 Bean 配置之后、但在任何 Bean 实例创建之前生效。Bean 工厂后处理器的典型用途是在 Bean 实例化之前修改 Bean 配置。Spring\
  \ 提供了几个 Bean 工厂后处理器供你使用。在实践中，你很少需要编写自己的 Bean 工厂后处理器。\n\n工作原理\n\n之前，你在 Bean 配置文件中为收银员指定了日志路径。将此类部署细节与\
  \ Bean 配置混合在一起并不是一个好习惯。更好的方法是将部署细节提取到一个属性文件中，例如位于类路径根目录下的 `config.properties`。然后在此文件中定义日志路径。\n\
  \ncashier.path=c:/cashier\n\n现在，你可以在 Bean 配置文件中使用 `${var}` 形式的变量。要从属性文件加载外部属性并用它们替换变量，你必须在应用上下文中注册\
  \ Bean 工厂后处理器 `PropertyPlaceholderConfigurer`。你可以在 `location` 属性中指定一个属性文件，或在 `locations`\
  \ 属性中指定多个属性文件。\n\n<beans ...>\n\n...\n\n<bean class=\"org.springframework.beans.factory.config.\
  \ **➥**\n\nPropertyPlaceholderConfigurer\">\n\n<property name=\"location\">\n\n\
  <value>config.properties</value>\n\n</property>\n\n</bean>\n\n9799ch04.qxd 4/10/08\
  \ 10:53 AM Page 121\n\n第 4 章 **■** 高级 Spring IoC 容器\n\n**121**\n\n<bean id=\"cashier1\"\
