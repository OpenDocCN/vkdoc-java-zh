  \ JdbcBookShop extends JdbcDaoSupport implements BookShop {\n\n...\n\n@Transactional(**propagation\
  \ = Propagation.REQUIRES_NEW**)\n\npublic void purchase(String isbn, String username)\
  \ {\n\n...\n\n}\n\n}\n\n在这种情况下，总共会启动三个事务。第一个事务由 `checkout()` 方法启动，但当第一个 `purchase()`\
  \ 方法被调用时，第一个事务将被挂起，并启动一个新事务。在第一个 `purchase()` 方法结束时，新事务完成并提交。当第二个 `purchase()` 方法被调用时，将启动另一个新事务。然而，这个事务将失败并回滚。因此，第一本书将成功购买，而第二本则不会。\n\
  \n图 8-3 展示了 REQUIRES_NEW 传播行为。\n\n**图 8-3.** *REQUIRES_NEW 事务传播行为*\n\n**在事务通知、代理和\
