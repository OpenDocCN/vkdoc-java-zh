  \         expression=\"org.springframework.stereotype.Controller\" />\n    </context:component-scan>\n\
  </beans>\n```\n\n由于您应用了包含过滤器来检测所有名称中包含单词 `Dao` 或 `Service` 的类，因此即使没有原型注解，`SequenceDaoImpl`\
  \ 和 `SequenceService` 组件也可以被自动检测到。\n\n**命名检测到的组件**\n\n默认情况下，Spring 会通过将非限定类名的首字母小写来命名检测到的组件。例如，`SequenceService`\
  \ 类将被命名为 `sequenceService`。您可以通过在原型注解的 `value` 属性中指定名称来显式定义组件的名称。\n\n```java\npackage\
  \ com.apress.springrecipes.sequence;\n...\nimport org.springframework.stereotype.Service;\n\
  \n@Service(\"**sequenceService**\")\npublic class SequenceService {\n    ...\n}\n\
  ```\n\n9799ch03.qxd 5/5/08 4:50 PM Page 92\n\n**92**\n\n**第 3 章 ■ 在 Spring 中配置 Bean**\n\
  \n```java\npackage com.apress.springrecipes.sequence;\nimport org.springframework.stereotype.Repository;\n\
  \n@Repository(\"**sequenceDao**\")\npublic class SequenceDaoImpl implements SequenceDao\
  \ {\n    ...\n}\n```\n\n您可以通过实现 `BeanNameGenerator` 接口并在 `<context:component-scan>`\
  \ 元素的 `name-generator` 属性中指定它，来开发自己的命名策略。\n\n**3-14. 本章小结**\n\n在本章中，您学习了 Spring\
  \ IoC 容器中的基本 Bean 配置。\n\nSpring 支持多种类型的 Bean 配置。其中，XML 是最简单、最成熟的。Spring 提供了两种 IoC\
  \ 容器实现。基础的是 Bean 工厂，高级的是应用上下文。如果可能，除非资源受限，否则应使用应用上下文。Spring 支持通过 Setter 注入和构造器注入来定义\
  \ Bean 属性，这些属性可以是简单值、集合或 Bean 引用。\n\n依赖检查和自动装配是 Spring 提供的两个有价值的容器特性。依赖检查有助于检查是否设置了所有必需的属性，而自动装配可以按类型、名称或注解自动装配您的\
  \ Bean。配置这两个特性的旧方式是通过 XML 属性，而新方式是通过注解和 Bean 后处理器，这提供了更大的灵活性。\n\nSpring 通过提取公共的\
  \ Bean 配置来形成父 Bean，从而支持 Bean 继承。父 Bean 可以充当配置模板、Bean 实例，或同时充当两者。\n\n由于集合是 Java 的基本编程元素，Spring\
  \ 提供了各种集合标签，方便您在 Bean 配置文件中配置集合。您可以使用集合工厂 Bean 或工具模式中的集合标签来为集合指定更多细节，也可以将集合定义为独立的\
  \ Bean 以在多个 Bean 之间共享。\n\n最后，Spring 可以从类路径中自动检测您的组件。默认情况下，它可以检测所有带有特定原型注解的组件。但您可以通过过滤器进一步包含或排除您的组件。组件扫描是一个强大的功能，可以减少配置量。\n\
  \n在下一章中，您将学习本章未介绍的高级 Spring IoC 容器特性。\n\n9799ch04.qxd 4/10/08 10:53 AM Page 93\n\
  \n**第 4 章**\n\n**高级 Spring IoC 容器**\n\n**本**章中，您将学习 Spring IoC 容器的高级特性和内部机制，这有助于提高您开发\
  \ Spring 应用程序的效率。虽然这些特性可能不常用，但它们对于一个全面且强大的容器来说是必不可少的。它们也是 Spring 框架其他模块的基础。\n\n\
  Spring IoC 容器本身被设计为易于定制和扩展。它允许您通过配置自定义默认容器行为，并通过注册符合容器规范的容器插件来扩展容器的功能。\n\n完成本章后，您将非常熟悉\
  \ Spring IoC 容器的大部分特性。这将为您在后续章节中学习 Spring 的不同主题打下有用的基础。\n\n**4-1. 通过调用构造器创建 Bean**\n\
  \n问题\n\n您希望通过调用其构造器在 Spring IoC 容器中创建一个 Bean，这是创建 Bean 最常见、最直接的方式。它相当于在 Java 中使用\
  \ `new` 操作符创建对象。\n\n解决方案\n\n通常，当您为 Bean 指定 `class` 属性时，您就是在要求 Spring IoC 容器通过调用其构造器来创建\
  \ Bean 实例。\n\n工作原理\n\n假设您要开发一个在线销售产品的商店应用程序。首先，您创建 `Product` 类，它有几个属性，例如产品名称和价格。由于您的商店中有多种类型的产品，您将\
  \ `Product` 类设为抽象类，以便不同的产品子类进行扩展。\n\n**93**\n\n9799ch04.qxd 4/10/08 10:53 AM Page\
  \ 94\n\n**94**\n\n**第 4 章 ■ 高级 Spring IoC 容器**\n\n```java\npackage com.apress.springrecipes.shop;\n\
  \npublic abstract class Product {\n\n    private String name;\n    private double\
  \ price;\n\n    public Product() {}\n\n    public Product(String name, double price)\
  \ {\n        this.name = name;\n        this.price = price;\n    }\n\n    // Getters\
  \ and Setters\n    ...\n\n    public String toString() {\n        return name +\
  \ \" \" + price;\n    }\n}\n```\n\n然后，您创建两个产品子类，`Battery` 和 `Disc`。每个子类都有自己的属性。\n\
  \n```java\npackage com.apress.springrecipes.shop;\n\npublic class Battery extends\
