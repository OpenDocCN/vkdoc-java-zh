  \n}\n\n}\n\n被代理包装的原始 Bean 称为*目标*对象，而代理对象称为*当前*对象。它们可以通过连接点的 `getTarget()` 和 `getThis()`\
  \ 方法访问。从以下输出中，您可以看到这两个对象的类并不相同：\n\n连接点类型 : method-execution\n\n签名声明类型 : com.apress.springrecipes.calculator.ArithmeticCalculator\
