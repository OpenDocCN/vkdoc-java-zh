  \nreturn postageService.calculatePostage(country, weight);\n\n} catch (NamingException\
  \ e) {\n\n...\n\n}\n\n}\n\n}\n\n**在 Spring 支持下访问 EJB 3.0 组件**\n\n尽管访问 EJB 3.0 组件比\
  \ EJB 2.x 更简单，但 JNDI 查找代码仍然过于复杂，并且你必须处理 NamingException。借助 Spring 的支持，你的 FrontDeskImpl\
  \ 类可以为该 EJB 组件的业务接口定义一个 setter 方法，以便 Spring 注入从 JNDI 查找的 EJB 引用。\n\n9799ch17.qxd\
  \ 5/15/08 5:06 PM Page 639\n\n第 17 章 **■** Spring 对 EJB 和 JMS 的支持\n\n**639**\n\n\
  package com.apress.springrecipes.post;\n\npublic class FrontDeskImpl implements\
  \ FrontDesk {\n\nprivate PostageService postageService;\n\npublic void setPostageService(PostageService\
  \ postageService) {\n\nthis.postageService = postageService;\n\n}\n\npublic double\
  \ calculatePostage(String country, double weight) {\n\nreturn postageService.calculatePostage(country,\
  \ weight);\n\n}\n\n}\n\nSpring 提供了工厂 Bean `JndiObjectFactoryBean`，用于在其 IoC 容器中声明一个\
  \ JNDI 对象引用。你在前台系统的 Bean 配置文件中声明此 Bean。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)\n\nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)\n\nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n<bean id=\"postageService\"\n\nclass=\"org.springframework.jndi.JndiObjectFactoryBean\"\
  >\n\n<property name=\"jndiEnvironment\">\n\n<props>\n\n<prop key=\"java.naming.factory.initial\"\
  >\n\norg.apache.openejb.client.RemoteInitialContextFactory\n\n</prop>\n\n\n\n<prop\
  \ key=\"java.naming.provider.url\">\n\nejbd://localhost:4201\n\n</prop>\n\n</props>\n\
  \n</property>\n\n<property name=\"jndiName\" value=\"PostageServiceBeanRemote\"\
  \ />\n\n</bean>\n\n<bean id=\"frontDesk\"\n\nclass=\"com.apress.springrecipes.post.FrontDeskImpl\"\
  >\n\n<property name=\"postageService\" ref=\"postageService\" />\n\n</bean>\n\n\
  </beans>\n\n你可以在 `jndiEnvironment` 和 `jndiName` 属性中配置此工厂 bean 的 JNDI 详细信息。然后，你可以像注入普通\
  \ bean 一样，将此代理注入到 `FrontDeskImpl` 中。\n\n9799ch17.qxd 5/15/08 5:06 PM 第 640 页\n\n\
  **640**\n\n第 17 章 **■** SPRING 对 EJB 和 JMS 的支持\n\n在 Spring 2.x 中，也可以使用 jee 模式中的\
  \ `<jee:jndi-lookup>` 元素来定义 JNDI 对象。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
