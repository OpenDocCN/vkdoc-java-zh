  \ JavaMail，而且更简单、更易于测试。\n\npackage com.apress.springrecipes.replicator;\n\nimport\
  \ org.springframework.mail.MailSender;\n\nimport org.springframework.mail.SimpleMailMessage;\n\
  \npublic class EmailErrorNotifier implements ErrorNotifier {\n\n9799ch18.qxd 5/15/08\
  \ 5:08 PM 第 684 页\n\n**684**\n\n第 18 章 **■** 对 JMX、电子邮件和调度的 Spring 支持\n\nprivate\
  \ MailSender mailSender;\n\npublic void setMailSender(MailSender mailSender) {\n\
  \nthis.mailSender = mailSender;\n\n}\n\npublic void notifyCopyError(String srcDir,\
  \ String destDir, String filename) {\n\n\n\n```java\nSimpleMailMessage message =\
  \ new SimpleMailMessage();\n\nmessage.setFrom(\"system@localhost\");\n\nmessage.setTo(\"\
