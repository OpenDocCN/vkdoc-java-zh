  \ successfully at \"c:\\PostageService.jar\"\nApp(id=c:\\PostageService.jar)\nEjbJar(id=PostageService.jar,\
  \ path=c:\\PostageService.jar)\nEjb(ejb-name=PostageService, id=PostageService)\n\
