  <servlet>\n\n<servlet-name>weather</servlet-name>\n\n<servlet-class>\n\n**org.springframework.web.servlet.DispatcherServlet**\n\
  \n</servlet-class>\n\n<load-on-startup>1</load-on-startup>\n\n</servlet>\n\n<servlet-mapping>\n\
  \n<servlet-name>weather</servlet-name>\n\n<url-pattern> **/services/***</url-pattern>\n\
  \n</servlet-mapping>\n\n</web-app>\n\n在上述 Servlet 映射定义中，你将 `services` 路径下的所有 URL\
  \ 映射到 `DispatcherServlet`。由于此 Servlet 的名称为 `weather`，你需要在 `WEB-INF` 根目录下创建以下 Spring\
  \ MVC 配置文件 `weather-servlet.xml`。在此文件中，你声明一个天气服务实现的 Bean，并使用 `HessianServiceExporter`\
  \ 将其导出为 Hessian 服务。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)\n\nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)\n\nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  >](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\n\
