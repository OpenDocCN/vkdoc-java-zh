  \ />\n\n<bean name=\"/WeatherService\"\n\nclass=\"org.springframework.remoting.caucho.HessianServiceExporter\"\
  >\n\n<property name=\"service\" ref=\"weatherService\" />\n\n<property name=\"serviceInterface\"\
  \n\nvalue=\"com.apress.springrecipes.weather.WeatherService\" />\n\n</bean>\n\n\
  </beans>\n\n对于一个 `HessianServiceExporter` 实例，你必须配置一个要导出的服务对象及其服务接口。你可以将 IoC 容器中配置的任何\
  \ Bean 导出为 Hessian 服务，然后 `HessianServiceExporter` 将创建一个代理来包装此 Bean。当代理接收到调用请求时，它将调用该\
  \ Bean 上的相应方法。\n\n默认情况下，`BeanNameUrlHandlerMapping` 已为 Spring MVC 应用程序预先配置。它根据指定为\
  \ Bean 名称的 URL 模式将请求映射到处理器。上述配置将 URL 模式 `/WeatherService` 映射到此导出器。\n\n9799ch16.qxd\
  \ 5/15/08 5:04 PM 第 591 页\n\n第 16 章 **■** S P R I N G 远程调用与 W E B 服务\n\n**591**\n\
  \n现在你可以将此 Web 应用程序部署到 Web 容器（例如 Apache Tomcat 6.0）。默认情况下，Tomcat 监听 8080 端口，因此如果你将应用程序部署到\
  \ `weather` 上下文路径，你可以通过以下 URL 访问此服务：\n\n[`localhost:8080/weather/services/WeatherService`](http://localhost:8080/weather/services/WeatherService)\n\
  \n**调用 Hessian 服务**\n\n通过使用 Spring 的远程调用功能，你可以像调用本地 Bean 一样调用远程服务。在客户端 Bean 配置文件\
  \ `client.xml` 中，你可以使用 `HessianProxyFactoryBean` 为远程 Hessian 服务创建一个代理。然后你可以像使用本地\
  \ Bean 一样使用此服务。\n\n**■注意** 要调用 Hessian 或 Burlap 服务，你必须在类路径中包含 `hessian-3.0.20.jar`（位于\
  \ Spring 安装目录的 `lib/caucho` 目录下）。\n\n<bean id=\"weatherService\"\n\nclass=\"org.springframework.remoting.caucho.HessianProxyFactoryBean\"\
  >\n\n<property name=\"serviceUrl\"\n\nvalue=\" [`localhost:8080/weather/services/WeatherService\"\
  `](http://localhost:8080/weather/services/WeatherService) />\n\n<property name=\"\
  serviceInterface\"\n\nvalue=\"com.apress.springrecipes.weather.WeatherService\"\
  \ />\n\n</bean>\n\n对于 `HessianProxyFactoryBean` 实例，你需要配置两个属性。`serviceUrl` 属性指定目标服务的\
  \ URL。`serviceInterface` 属性用于此工厂 Bean 为远程服务创建本地代理。该代理将透明地将调用请求发送到远程服务。\n\n**暴露 Burlap\
  \ 服务**\n\n暴露 Burlap 服务的配置与 Hessian 类似，不同之处在于你应该使用 `BurlapServiceExporter`。\n\n<bean\
  \ name=\"/WeatherService\"\n\nclass=\"org.springframework.remoting.caucho.BurlapServiceExporter\"\
  >\n\n<property name=\"service\" ref=\"weatherService\" />\n\n<property name=\"serviceInterface\"\
  \n\nvalue=\"com.apress.springrecipes.weather.WeatherService\" />\n\n</bean>\n\n\
  **调用 Burlap 服务**\n\n调用 Burlap 服务与 Hessian 非常相似。唯一的区别是你应该使用 `BurlapProxyFactoryBean`。\n\
  \n9799ch16.qxd 5/15/08 5:04 PM 第 592 页\n\n**592**\n\n第 16 章 **■** S P R I N G 远程调用与\
  \ W E B 服务\n\n<bean id=\"weatherService\"\n\nclass=\"org.springframework.remoting.caucho.BurlapProxyFactoryBean\"\
  >\n\n<property name=\"serviceUrl\"\n\nvalue=\" [`localhost:8080/weather/services/WeatherService\"\
  `](http://localhost:8080/weather/services/WeatherService) />\n\n<property name=\"\
  serviceInterface\"\n\nvalue=\"com.apress.springrecipes.weather.WeatherService\"\
  \ />\n\n</bean>\n\n**暴露 HTTP Invoker 服务**\n\n同样，使用 HTTP Invoker 暴露服务的配置与 Hessian\
  \ 和 Burlap 类似，不同之处在于你必须使用 `HttpInvokerServiceExporter`。\n\n<bean name=\"/WeatherService\"\
  \n\nclass=\"org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter\"\
  >\n\n<property name=\"service\" ref=\"weatherService\" />\n\n<property name=\"serviceInterface\"\
  \n\nvalue=\"com.apress.springrecipes.weather.WeatherService\" />\n\n</bean>\n\n\
  **调用 HTTP Invoker 服务**\n\n调用由 HTTP Invoker 暴露的服务也与 Hessian 和 Burlap 类似。这次你必须使用 `HttpInvokerProxyFactoryBean`。\n\
  \n<bean id=\"weatherService\"\n\nclass=\"org.springframework.remoting.httpinvoker.HttpInvokerProxyFactoryBean\"\
  >\n\n<property name=\"serviceUrl\"\n\nvalue=\" [`localhost:8080/weather/services/WeatherService\"\
  `](http://localhost:8080/weather/services/WeatherService) />\n\n<property name=\"\
  serviceInterface\"\n\nvalue=\"com.apress.springrecipes.weather.WeatherService\"\
  \ />\n\n</bean>\n\n**16-3\\. 选择 Web 服务开发方法**\n\n问题\n\n\n\n当您需要开发一个 Web 服务时，首先必须考虑采用哪种\
  \ Web 服务开发方法。\n\n解决方案\n\n根据定义契约的先后顺序，有两种开发 Web 服务的方法。Web 服务契约使用*Web 服务描述语言（WSDL）*进行描述。在\"\
  契约最后\"方法中，您将现有服务接口暴露为 Web 服务，其服务契约会自动生成。在\"契约优先\"方法中，您先用 XML 设计服务契约，然后编写代码来实现该契约。\n\
  \n9799ch16.qxd 5/15/08 5:04 PM 第 593 页\n\n第 16 章 **■** SPRING 远程调用与 WEB 服务\n\n**593**\n\
  \n工作原理\n\n**契约最后式 Web 服务**\n\n在契约最后式 Web 服务开发中，您将现有服务接口暴露为 Web 服务。有许多工具和库可以帮助将 Java\
  \ 类/接口暴露为 Web 服务。它们可以通过应用规则来为类/接口生成 WSDL 文件，例如将类/接口转换为端口类型，将方法转换为操作，并根据方法参数和返回值生成请求/响应消息格式。总而言之，所有内容都是从类似以下的服务接口生成的：package\
  \ com.apress.springrecipes.weather;\n\n...\n\npublic interface WeatherService {\n\
  \npublic List<TemperatureInfo> getTemperatures(String city, List<Date> dates);\n\
  \n}\n\n这种方法被称为\"契约最后\"，因为您通过从 Java 代码生成契约，将 Web 服务的契约定义作为开发过程的最后一步。换句话说，您是用 Java\
  \ 而非 WSDL 或 XML 来设计服务。\n\n**契约优先式 Web 服务**\n\n相比之下，契约优先方法鼓励您首先从 XML（包括 XSD 和 WSDL）的角度考虑服务契约。在这种方法中，您首先设计服务的请求和响应消息。这些消息使用\
  \ XML 设计，XML 非常擅长以平台无关和语言无关的方式表示复杂的数据结构。\n\n下一步是在特定的平台和编程语言中实现此契约。\n\n例如，您的天气服务的请求消息包含一个城市元素和多个日期元素。请注意，您应该为消息指定命名空间，以避免与其他\
  \ XML 文档发生命名冲突。\n\n<GetTemperaturesRequest\n\nxmlns=\"http://springrecipes.apress.com/weather/schemas\"\
  >\n\n<city>Houston</city>\n\n<date>2007-12-01</date>\n\n<date>2007-12-08</date>\n\
  \n<date>2007-12-15</date>\n\n</GetTemperaturesRequest>\n\n然后，响应消息将包含多个 Temperature\
  \ 元素，以响应请求的城市和日期。\n\n<GetTemperaturesResponse\n\nxmlns=\"http://springrecipes.apress.com/weather/schemas\"\
  >\n\n<TemperatureInfo city=\"Houston\" date=\"2007-12-01\">\n\n<min>5.0</min>\n\n\
  <max>10.0</max>\n\n<average>8.0</average>\n\n9799ch16.qxd 5/15/08 5:04 PM 第 594\
  \ 页\n\n**594**\n\n第 16 章 **■** SPRING 远程调用与 WEB 服务\n\n</TemperatureInfo>\n\n<TemperatureInfo\
  \ city=\"Houston\" date=\"2007-12-08\">\n\n<min>4.0</min>\n\n<max>13.0</max>\n\n\
  <average>7.0</average>\n\n</TemperatureInfo>\n\n<TemperatureInfo city=\"Houston\"\
  \ date=\"2007-12-15\">\n\n<min>10.0</min>\n\n<max>18.0</max>\n\n<average>15.0</average>\n\
  \n</TemperatureInfo>\n\n</GetTemperaturesResponse>\n\n设计完示例请求和响应消息后，您就可以开始使用 XSD\
  \ 和 WSDL 为这个 Web 服务创建契约。有许多工具和 IDE 可以帮助为 XML 文档生成默认的 XSD 和 WSDL 文件。您只需进行少量优化即可使其符合您的需求。\n\
  \n**比较**\n\n在开发契约最后式 Web 服务时，您实际上是在将应用程序的内部 API 暴露给客户端。但这个 API 很可能会发生变化——一旦发生变化，您也必须更改\
  \ Web 服务的契约，这可能会涉及更改所有客户端。然而，如果您先设计契约，它反映的是您希望暴露的外部 API。它不像内部 API 那样容易需要更改。\n\n\
  尽管许多工具和库可以将 Java 类/接口暴露为 Web 服务，但事实是从 Java 生成的契约并不总是可移植到其他平台。例如，Java 的 map 可能无法移植到没有类似数据结构的其他编程语言。有时您必须更改方法签名以使服务契约可移植。在某些情况下，将对象映射到\
  \ XML 也很困难（例如，具有循环引用的对象图），因为实际上对象模型和 XML 模型之间存在*阻抗不匹配*，就像对象模型和关系模型之间一样。\n\nXML 擅长以平台无关和语言无关的方式表示复杂的数据结构。使用\
  \ XML 定义的服务契约可以 100%移植到任何平台。此外，您可以在 XSD 文件中为消息定义约束，以便它们可以自动验证。基于这些原因，使用 XML 设计服务契约并使用\
  \ Java 等编程语言实现它更为高效。Java 中有许多用于高效处理 XML 的库。\n\n从性能角度来看，从 Java 代码生成服务契约可能导致低效的设计。这是因为您可能没有仔细考虑消息粒度，因为它直接源自方法签名。相比之下，先定义服务契约更有可能产生高效的设计。\n\
  \n最后，选择契约最后方法的最大原因是其简单性。将 Java 类/接口暴露为 Web 服务不需要您了解太多关于 XML、WSDL、SOAP 等知识。您可以非常快速地暴露一个\
  \ Web 服务。\n\n9799ch16.qxd 5/15/08 5:04 PM 第 595 页\n\n第 16 章 **■** SPRING 远程调用与 WEB\
  \ 服务\n\n**595**\n\n**16-4. 使用 XFire 暴露和调用 Web 服务**\n\n问题\n\n由于 Web 服务是一种标准且跨平台的应用程序通信技术，您希望从\
  \ Java 应用程序中暴露一个 Web 服务，供不同平台上的客户端调用。\n\n解决方案\n\nSpring 提供了几个服务导出器，可以基于 RMI、Hessian、Burlap\
  \ 或 HTTP Invoker 远程技术将 Bean 导出为远程服务，但 Spring 没有提供可以将 Bean 导出为 Web 服务的服务导出器。然而，有一个名为*XFire*的外部库提供了此功能。XFire\
  \ 是一个开源 Java SOAP 框架，可以将简单的 Java 对象导出为 Web 服务。XFire 通过提供服务导出器和客户端代理工厂 Bean 等设施来支持\
  \ Spring，其用法与 Spring 为其他远程技术提供的用法一致。\n\n工作原理\n\n**使用 XFire 暴露 Web 服务**\n\n要在 Spring\
  \ 中使用 XFire 暴露 Web 服务，首先为您的 Web 应用程序上下文创建以下目录结构。\n\n**■注意** 要使用 XFire 暴露 Web 服务，您必须下载并安装\
  \ XFire（例如 v1.2.6）。然后将 xfire-all-1.2.6.jar（位于 XFire 安装根目录）、activation-1.1.jar、jdom-1.0.jar、stax-api-1.0.1.jar、wsdl4j-1.6.1.jar\
  \ 和 wstx-asl-3.2.0.jar（均位于 lib 目录）复制到 WEB-INF/lib 目录。\n\nweather/\n\nWEB-INF/\n\n\
  classes/\n\nlib/\n\nactivation-1.1.jar\n\ncommons-logging.jar\n\njdom-1.0.jar\n\n\
  spring-webmvc.jar\n\nspring.jar\n\nstax-api-1.0.1.jar\n\nwsdl4j-1.6.1.jar\n\nwstx-asl-3.2.0.jar\n\
  \nxfire-all-1.2.6.jar\n\nweather-servlet.xml\n\nweb.xml\n\n9799ch16.qxd 5/15/08\
  \ 5:04 PM 第 596 页\n\n**596**\n\n\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n在 web.xml\
  \ 中，你需要配置 Spring MVC 的 DispatcherServlet，并将 services 路径下的所有 URL 映射到该 Servlet。\n\n\
  <web-app version=\"2.4\" xmlns=\" [`java.sun.com/xml/ns/j2ee\"`](http://java.sun.com/xml/ns/j2ee)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \nxsi:schemaLocation=\" [`java.sun.com/xml/ns/j2ee`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`j`](http://www.w3.org/2001/XMLSchema-instance)[ava.sun.com/xml/ns/j2ee/web-app_2_4.xsd\"\
  >](http://java.sun.com/xml/ns/j2eejava.sun.com/xml/ns/j2ee/web-app_2_4.xsd)\n\n\
  <servlet>\n\n<servlet-name>weather</servlet-name>\n\n<servlet-class>\n\n**org.springframework.web.servlet.DispatcherServlet**\n\
  \n</servlet-class>\n\n<load-on-startup>1</load-on-startup>\n\n</servlet>\n\n<servlet-mapping>\n\
  \n<servlet-name>weather</servlet-name>\n\n<url-pattern> **/services/***</url-pattern>\n\
  \n</servlet-mapping>\n\n</web-app>\n\n在 Spring MVC 配置文件 weather-servlet.xml 中，你需要为天气服务实现声明一个\
  \ bean，并通过 XFireExporter 将其导出为 Web 服务。\n\n<beans xmlns=\" [`www.springframework.org/schema/beans\"\
  `](http://www.springframework.org/schema/beans)\n\nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"\
  `](http://www.w3.org/2001/XMLSchema-instance)\n\nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  >](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\n\
  \n<bean id=\"weatherService\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceImpl\"\
  \ />\n\n<bean name=\"/WeatherService\"\n\nclass=\"org.codehaus.xfire.spring.remoting.XFireExporter\"\
  >\n\n**<property name=\"xfire\" ref=\"xfire\" />**\n\n<property name=\"serviceBean\"\
  \ ref=\"weatherService\" />\n\n<property name=\"serviceInterface\"\n\nvalue=\"com.apress.springrecipes.weather.WeatherService\"\
  \ />\n\n</bean>\n\n</beans>\n\n对于 XFireExporter 实例，你需要配置要导出的服务对象及其服务接口。请注意，该导出器需要引用核心的\
  \ xfire bean 来处理实际的 Web 服务。xfire bean 定义在 XFire 库附带的 bean 配置文件中。你只需在 web.xml 中配置\
  \ ContextLoaderListener，即可从类路径加载该文件。\n\n9799ch16.qxd 5/15/08 5:04 PM Page 597\n\n\
  第 16 章 **■** Spring 远程调用与 Web 服务\n\n**597**\n\n<web-app ...>\n\n<context-param>\n\
  \n<param-name>contextConfigLocation</param-name>\n\n<param-value>\n\nclasspath:org/codehaus/xfire/spring/xfire.xml\n\
  \n</param-value>\n\n</context-param>\n\n<listener>\n\n<listener-class>\n\norg.springframework.web.context.ContextLoaderListener\n\
  \n</listener-class>\n\n</listener>\n\n...\n\n</web-app>\n\n现在，你可以将 Web 应用程序部署到 Web\
  \ 容器（如 Apache Tomcat 6.0）中。\n\n然后，你可以通过以下 URL 访问此 Web 服务：\n\n[`localhost:8080/weather/services/WeatherService`](http://localhost:8080/weather/services/WeatherService)\n\
  \n**检查生成的 WSDL 文件**\n\n每个 Web 服务都需要一个 WSDL 文件来描述服务契约。XFire 能够动态地为你的服务生成 WSDL 文件。对于天气服务，你可以通过以下\
  \ URL 访问 WSDL 文件：\n\n[`localhost:8080/weather/services/WeatherService?wsdl`](http://localhost:8080/weather/services/WeatherService?wsdl)\n\
  \n你的天气服务生成的 WSDL 文件如下所示。为简洁起见，省略了不太重要的部分。\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  \ ?>\n\n<wsdl:definitions **targetNamespace=\" [`weather.springrecipes.apress.com\"\
  `](http://weather.springrecipes.apress.com)**\n\nxmlns:tns=\" [`weather.springrecipes.apress.com\"\
  `](http://weather.springrecipes.apress.com)\n\n...>\n\n<wsdl:types>\n\n<xsd:schema\
  \ xmlns:xsd=\" [`www.w3.org/2001/XMLSchema\"`](http://www.w3.org/2001/XMLSchema)\n\
  \n\n```xml\n\nattributeFormDefault=\"qualified\" elementFormDefault=\"qualified\"\
  \n\ntargetNamespace=[\"http://weather.springrecipes.apress.com\"](http://weather.springrecipes.apress.com)\
  \ >\n\n<xsd:complexType name=\" **ArrayOfDateTime**\">\n\n<xsd:sequence>\n\n<xsd:element\
  \ maxOccurs=\"unbounded\" minOccurs=\"0\"\n\nname=\"dateTime\" type=\" **xsd:dateTime**\"\
  \ />\n\n</xsd:sequence>\n\n</xsd:complexType>\n\n<xsd:element name=\" **getTemperatures**\"\
  >\n\n<xsd:complexType>\n\n<xsd:sequence>\n\n9799ch16.qxd 5/15/08 5:04 PM Page 598\n\
  \n**598**\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n<xsd:element maxOccurs=\"1\" minOccurs=\"\
  1\" name=\" **in0**\"\n\nnillable=\"true\" type=\" **xsd:string**\" />\n\n<xsd:element\
  \ maxOccurs=\"1\" minOccurs=\"1\" name=\" **in1**\"\n\nnillable=\"true\" type=\"\
  \ **tns:ArrayOfDateTime**\" />\n\n</xsd:sequence>\n\n</xsd:complexType>\n\n</xsd:element>\n\
  \n<xsd:complexType name=\" **ArrayOfTemperatureInfo**\">\n\n<xsd:sequence>\n\n<xsd:element\
  \ maxOccurs=\"unbounded\" minOccurs=\"0\"\n\nname=\"TemperatureInfo\" nillable=\"\
  true\"\n\ntype=\" **tns:TemperatureInfo**\" />\n\n</xsd:sequence>\n\n</xsd:complexType>\n\
  \n<xsd:complexType name=\" **TemperatureInfo**\">\n\n<xsd:sequence>\n\n<xsd:element\
  \ minOccurs=\"0\" name=\" **average**\" type=\"xsd:double\" />\n\n<xsd:element minOccurs=\"\
  0\" name=\" **city**\"\n\nnillable=\"true\" type=\"xsd:string\" />\n\n<xsd:element\
  \ minOccurs=\"0\" name=\" **date**\" type=\"xsd:dateTime\" />\n\n<xsd:element minOccurs=\"\
  0\" name=\" **max**\" type=\"xsd:double\" />\n\n<xsd:element minOccurs=\"0\" name=\"\
  \ **min**\" type=\"xsd:double\" />\n\n</xsd:sequence>\n\n</xsd:complexType>\n\n\
  <xsd:element name=\" **getTemperaturesResponse**\">\n\n<xsd:complexType>\n\n<xsd:sequence>\n\
  \n<xsd:element maxOccurs=\"1\" minOccurs=\"1\" name=\" **out**\"\n\nnillable=\"\
  true\" type=\" **tns:ArrayOfTemperatureInfo**\" />\n\n</xsd:sequence>\n\n</xsd:complexType>\n\
  \n</xsd:element>\n\n</xsd:schema>\n\n</wsdl:types>\n\n<wsdl:message name=\" **getTemperaturesRequest**\"\
  >\n\n<wsdl:part name=\"parameters\" element=\" **tns:getTemperatures**\" />\n\n\
  </wsdl:message>\n\n<wsdl:message name=\" **getTemperaturesResponse**\">\n\n<wsdl:part\
  \ name=\"parameters\" element=\" **tns:getTemperaturesResponse**\" />\n\n</wsdl:message>\n\
  \n<wsdl:portType name=\" **WeatherServicePortType**\">\n\n<wsdl:operation name=\"\
  \ **getTemperatures**\">\n\n<wsdl:input name=\"getTemperaturesRequest\"\n\nmessage=\"\
  \ **tns:getTemperaturesRequest**\" />\n\n<wsdl:output name=\"getTemperaturesResponse\"\
  \n\nmessage=\" **tns:getTemperaturesResponse**\" />\n\n</wsdl:operation>\n\n</wsdl:portType>\n\
  \n9799ch16.qxd 5/15/08 5:04 PM Page 599\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n\
  **599**\n\n...\n\n<wsdl:service name=\"WeatherService\">\n\n<wsdl:port name=\"WeatherServiceHttpPort\"\
  \n\nbinding=\"tns:WeatherServiceHttpBinding\">\n\n<wsdlsoap:address location=\n\n\
  [\" **http://localhost:8080/weather/services/WeatherService**\"](http://localhost:8080/weather/services/WeatherService)\
  \ />\n\n</wsdl:port>\n\n</wsdl:service>\n\n</wsdl:definitions>\n\n从上述 WSDL 文件中可以看出，XFire\
  \ 通过执行以下转换来生成此文件：\n\n• 包 `com.apress.springrecipes.weather` 被转换为目标命名空间\n\n[`weather.springrecipes.apress.com.`](http://weather.springrecipes.apress.com)\n\
  \n• 类 `WeatherService` 被转换为端口类型 `WeatherServicePortType`。\n\n• 方法 `getTemperatures()`\
  \ 被转换为操作 `getTemperatures`。\n\n• 方法参数被转换为 `getTemperatures` 元素，包含两个子元素 `in0` 和 `in1`，其类型分别为\
  \ `string` 和 `ArrayOfDateTime` 复杂类型。\n\n• 返回值被转换为 `getTemperaturesResponse` 元素，包含子元素\
  \ `out`，其类型为 `ArrayOfTemperatureInfo` 复杂类型。这是一个由另一个复杂类型 `TemperatureInfo` 组成的数组，该类型包含五个元素：`average`、`city`、`date`、`max`\
  \ 和 `min`。\n\n**使用 XFire 调用 Web 服务**\n\n通过使用 XFire 的客户端工厂 Bean，您可以像调用本地 Bean 一样调用\
  \ Web 服务。在客户端 Bean 配置文件 `client.xml` 中，您可以使用 `XFireClientFactoryBean` 为 Web 服务创建一个代理。然后，您可以像使用本地\
  \ Bean 一样使用此服务。\n\n**■注意** 要使用 XFire 调用 Web 服务，您必须在类路径中包含 `xfire-all-1.2.6.jar`（位于\
  \ XFire 安装根目录）、`activation-1.1.jar`、`jdom-1.0.jar`、`stax-api-1.0.1.jar`、`wsdl4j-1.6.1.jar`、`wstx-asl-3.2.0.jar`、`XmlSchema-1.1.jar`、`commons-codec-1.3.jar`\
  \ 和 `commons-httpclient-3.0.jar`（均位于 `lib` 目录中）。\n\n<bean id=\"weatherService\"\n\
  \nclass=\"org.codehaus.xfire.spring.remoting.XFireClientFactoryBean\">\n\n<property\
  \ name=\"wsdlDocumentUrl\"\n\nvalue=\" [`localhost:8080/weather/services/WeatherService?wsdl\"\
  `](http://localhost:8080/weather/services/WeatherService?wsdl) />\n\n<property name=\"\
  serviceInterface\"\n\nvalue=\"com.apress.springrecipes.weather.WeatherService\"\
  \ />\n\n</bean>\n\n9799ch16.qxd 5/15/08 5:04 PM Page 600\n\n**600**\n\n第 16 章 **■**\
  \ Spring 远程调用与 Web 服务\n\n您必须为 `XFireClientFactoryBean` 实例配置两个属性。WSDL URL 属性指定 WSDL\
  \ 文件的 URL。服务接口属性用于此工厂 Bean 为 Web 服务创建代理。该代理将透明地将调用请求传输到 Web 服务。\n\n**使用 XFire 公开基于注解的\
  \ Web 服务**\n\nXFire 还支持 JSR-181（Java 平台的 Web 服务元数据）定义的 Web 服务注解。它可以自动导出带有 Web 服务注解的\
  \ Bean，无需手动配置。首先，您必须使用这些注解来注解您的 Web 服务实现类。\n\n**■注意** 要使用 JSR-181 Web 服务注解，您必须将\
  \ `xfire-jsr181-api-1.0-M1.jar`（位于 XFire 安装的 `lib` 目录中）复制到 `WEB-INF/lib` 目录。\n\n\
  package com.apress.springrecipes.weather;\n\n...\n\nimport javax.jws.WebMethod;\n\
  \nimport javax.jws.WebService;\n\n**@WebService(serviceName = \"WeatherService\"\
  )**\n\npublic class WeatherServiceImpl implements WeatherService {\n\n**@WebMethod(operationName\
  \ = \"getTemperatures\")**\n\npublic List<TemperatureInfo> getTemperatures(String\
  \ city, List<Date> dates) {\n\n...\n\n}\n\n}\n\n然后，您可以简单地定义一个 `Jsr181HandlerMapping`\
  \ Bean，根据 JSR-181 注解将 Web 服务请求映射到相应的服务 Bean。为了使映射与之前保持一致，您应该将 `urlPrefix` 属性设置为\
  \ `/`，这样它将被添加到注解中指定的服务名称之前。请记住，您还需要将核心的 `xfire` Bean 注入到此处理器映射中。\n\n<beans ...>\n\
  \n<bean id=\"weatherService\"\n\nclass=\"com.apress.springrecipes.weather.WeatherServiceImpl\"\
  \ />\n\n<bean class=\"org.codehaus.xfire.spring.remoting.Jsr181HandlerMapping\"\
  >\n\n**<property name=\"xfire\" ref=\"xfire\" />**\n\n<property name=\"webAnnotations\"\
  >\n\n<bean class=\"org.codehaus.xfire.annotations.jsr181. **➥**\n\nJsr181WebAnnotations\"\
  \ />\n\n</property>\n\n9799ch16.qxd 5/15/08 5:04 PM Page 601\n\n第 16 章 **■** Spring\
  \ 远程调用与 Web 服务\n\n**601**\n\n<property name=\"urlPrefix\" value=\"/\" />\n\n</bean>\n\
  \n</beans>\n\n**16-5. 定义 Web 服务的契约**\n\n问题\n\n根据契约优先的 Web 服务方法，开发 Web 服务的第一步是定义服务契约。\n\
  \n解决方案\n\nWeb 服务的契约由两部分组成：数据契约和服务契约。它们都使用 XML 技术以平台和语言无关的方式进行定义。\n\n*数据契约*：描述此 Web\
  \ 服务的复杂数据类型以及请求和响应消息。数据契约使用 XSD 定义。\n\n*服务契约*：描述此 Web 服务的操作。一个 Web 服务可能有多个操作。服务契约使用\
  \ WSDL 定义。\n\n当使用像 Spring-WS 这样全面的 Web 服务开发框架时，服务契约通常可以自动生成。但您必须自己创建数据契约。\n\n```\n\
  \n\n要为你的 Web 服务创建数据契约，可以从创建 XSD 文件开始。由于社区中有许多强大的 XML 工具，这并不会太难。然而，大多数开发者更倾向于先创建一些示例\
  \ XML 消息，然后从中生成 XSD 文件。当然，你需要自行优化生成的 XSD 文件，因为它可能不完全符合你的需求，有时你可能还想为其添加更多约束。\n\n\
  工作原理\n\n**创建示例 XML 消息**\n\n对于你的天气服务，你可以用以下 XML 消息来表示特定城市和日期的温度：\n\n<TemperatureInfo\
  \ city=\"Houston\" date=\"2007-12-01\">\n\n<min>5.0</min>\n\n<max>10.0</max>\n\n\
  <average>8.0</average>\n\n</TemperatureInfo>\n\n然后，你可以为你的天气服务定义数据契约。假设你想定义一个操作，允许客户端查询特定城市在多个日期的温度。每个请求包含一个城市元素和多个日期元素。你还应该为这个请求指定命名空间，以避免与其他\
  \ XML 文档发生命名冲突。\n\n让我们将此 XML 消息保存为 request.xml。\n\n9799ch16.qxd 5/15/08 5:04 PM\
  \ 第 602 页\n\n**602**\n\n第 16 章 **■** SPRING 远程调用与 WEB 服务\n\n<GetTemperaturesRequest\n\
  \nxmlns=\" [`springrecipes.apress.com/weather/schemas`](http://springrecipes.apress.com/weather/schemas)\"\
  >\n\n<city>Houston</city>\n\n<date>2007-12-01</date>\n\n<date>2007-12-08</date>\n\
  \n<date>2007-12-15</date>\n\n</GetTemperaturesRequest>\n\n响应包含多个 TemperatureInfo\
  \ 元素，每个元素根据请求的日期，表示特定城市和日期的温度。让我们将此 XML 消息保存为 response.xml。\n\n<GetTemperaturesResponse\n\
  \nxmlns=\" [`springrecipes.apress.com/weather/schemas`](http://springrecipes.apress.com/weather/schemas)\"\
  >\n\n<TemperatureInfo city=\"Houston\" date=\"2007-12-01\">\n\n<min>5.0</min>\n\n\
  <max>10.0</max>\n\n<average>8.0</average>\n\n</TemperatureInfo>\n\n<TemperatureInfo\
  \ city=\"Houston\" date=\"2007-12-08\">\n\n<min>4.0</min>\n\n<max>13.0</max>\n\n\
  <average>7.0</average>\n\n</TemperatureInfo>\n\n<TemperatureInfo city=\"Houston\"\
  \ date=\"2007-12-15\">\n\n<min>10.0</min>\n\n<max>18.0</max>\n\n<average>15.0</average>\n\
  \n</TemperatureInfo>\n\n</GetTemperaturesResponse>\n\n**从示例 XML 消息生成 XSD 文件**\n\n\
  现在，你可以从上述示例 XML 消息生成 XSD 文件。大多数流行的 XML 工具和企业级 Java IDE 都可以从多个 XML 文件生成 XSD 文件。这里，我选择了\
  \ Apache XMLBeans [(http://xmlbeans.apache.org](http://xmlbeans.apache.org)/) 来生成我的\
  \ XSD 文件。\n\n**■注意** 你可以从 Apache XMLBeans 网站下载 Apache XMLBeans（例如 v2.3.0 版本），并将其解压到你选择的目录中以完成安装。\n\
  \nApache XMLBeans 提供了一个名为 inst2xsd 的工具，用于从 XML 实例文件生成 XSD 文件。它支持多种设计类型来生成 XSD 文件。最简单的一种称为\
  \ *俄罗斯套娃设计*，它会为目标 XSD 文件生成局部元素和局部类型。\n\n由于你的 XML 消息中没有使用枚举类型，你还应该禁用枚举生成功能。你可以执行以下命令来为你的数据契约生成\
  \ XSD 文件：\n\ninst2xsd -design rd -enumerations never request.xml response.xml\n\n\
  生成的 XSD 文件将使用默认名称 schema0.xsd，位于同一目录中。让我们将其重命名为 temperature.xsd。\n\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n\n<xs:schema attributeFormDefault=\"unqualified\"\n\n\
  elementFormDefault=\"qualified\"\n\ntargetNamespace=[\"http://springrecipes.apress.com/weather/schemas\"\
  ](http://springrecipes.apress.com/weather/schemas)\n\nxmlns:xs=\" [`www.w3.org/2001/XMLSchema\"\
  >`](http://www.w3.org/2001/XMLSchema)\n\n<xs:element name=\"GetTemperaturesRequest\"\
  >\n\n<xs:complexType>\n\n<xs:sequence>\n\n<xs:element type=\"xs:string\" name=\"\
  city\" />\n\n\n\n<xs:element type=\"xs:date\" name=\"date\"\n\nmaxOccurs=\"unbounded\"\
  \ minOccurs=\"0\" />\n\n</xs:sequence>\n\n</xs:complexType>\n\n</xs:element>\n\n\
  <xs:element name=\"GetTemperaturesResponse\">\n\n<xs:complexType>\n\n<xs:sequence>\n\
  \n<xs:element name=\"TemperatureInfo\"\n\nmaxOccurs=\"unbounded\" minOccurs=\"0\"\
  >\n\n<xs:complexType>\n\n<xs:sequence>\n\n<xs:element type=\"xs:float\" name=\"\
  min\" />\n\n<xs:element type=\"xs:float\" name=\"max\" />\n\n<xs:element type=\"\
  xs:float\" name=\"average\" />\n\n</xs:sequence>\n\n<xs:attribute type=\"xs:string\"\
  \ name=\"city\"\n\nuse=\"optional\" />\n\n<xs:attribute type=\"xs:date\" name=\"\
  date\"\n\nuse=\"optional\" />\n\n</xs:complexType>\n\n</xs:element>\n\n</xs:sequence>\n\
  \n</xs:complexType>\n\n</xs:element>\n\n</xs:schema>\n\n9799ch16.qxd 5/15/08 5:04\
  \ PM Page 604\n\n**604**\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n**优化生成的 XSD 文件**\n\
  \n如你所见，生成的 XSD 文件允许客户端查询无限日期的温度。\n\n如果你想对查询日期的最大值和最小值添加约束，可以修改 `maxOccurs` 和 `minOccurs`\
  \ 属性。\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<xs:schema attributeFormDefault=\"\
  unqualified\"\n\nelementFormDefault=\"qualified\"\n\ntargetNamespace=[\"http://springrecipes.apress.com/weather/schemas\"\
  ](http://springrecipes.apress.com/weather/schemas)\n\nxmlns:xs=\" [`www.w3.org/2001/XMLSchema\"\
  >`](http://www.w3.org/2001/XMLSchema)\n\n<xs:element name=\"GetTemperaturesRequest\"\
  >\n\n<xs:complexType>\n\n<xs:sequence>\n\n<xs:element type=\"xs:string\" name=\"\
  city\" />\n\n<xs:element type=\"xs:date\" name=\"date\"\n\n**maxOccurs=\"5\" minOccurs=\"\
  1\"** />\n\n</xs:sequence>\n\n</xs:complexType>\n\n</xs:element>\n\n<xs:element\
  \ name=\"GetTemperaturesResponse\">\n\n<xs:complexType>\n\n<xs:sequence>\n\n<xs:element\
  \ name=\"TemperatureInfo\"\n\n**maxOccurs=\"5\" minOccurs=\"1\"** >\n\n...\n\n</xs:element>\n\
  \n</xs:sequence>\n\n</xs:complexType>\n\n</xs:element>\n\n</xs:schema>\n\n**预览生成的\
  \ WSDL 文件**\n\n稍后你将了解到，Spring-WS 可以根据数据契约以及一些可覆盖的约定，自动为你生成服务契约。此处，你可以预览生成的 WSDL\
  \ 文件，以便更好地理解服务契约。为简洁起见，省略了次要部分。\n\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\
  \n<wsdl:definitions ...\n\ntargetNamespace=[\"http://springrecipes.apress.com/weather/schemas\"\
  ](http://springrecipes.apress.com/weather/schemas) >\n\n<wsdl:types>\n\n<!-- 从 XSD\
  \ 文件复制而来 -->\n\n...\n\n</wsdl:types>\n\n<wsdl:message name=\"GetTemperaturesResponse\"\
  >\n\n9799ch16.qxd 5/15/08 5:04 PM Page 605\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\
  \n**605**\n\n<wsdl:part element=\"schema:GetTemperaturesResponse\"\n\nname=\"GetTemperaturesResponse\"\
  >\n\n</wsdl:part>\n\n</wsdl:message>\n\n<wsdl:message name=\"GetTemperaturesRequest\"\
  >\n\n<wsdl:part element=\"schema:GetTemperaturesRequest\"\n\nname=\"GetTemperaturesRequest\"\
  >\n\n</wsdl:part>\n\n</wsdl:message>\n\n<wsdl:portType name=\" **Weather**\">\n\n\
  <wsdl:operation name=\" **GetTemperatures**\">\n\n<wsdl:input message=\" **schema:GetTemperaturesRequest**\"\
  \n\nname=\"GetTemperaturesRequest\">\n\n</wsdl:input>\n\n<wsdl:output message=\"\
  \ **schema:GetTemperaturesResponse**\"\n\nname=\"GetTemperaturesResponse\">\n\n\
  </wsdl:output>\n\n</wsdl:operation>\n\n</wsdl:portType>\n\n...\n\n<wsdl:service\
  \ name=\"WeatherService\">\n\n<wsdl:port binding=\"schema:WeatherBinding\" name=\"\
  WeatherPort\">\n\n<soap:address\n\nlocation=\" [`localhost:8080/weather/services\"\
  `](http://localhost:8080/weather/services) />\n\n</wsdl:port>\n\n</wsdl:service>\n\
  \n</wsdl:definitions>\n\n在 Weather 端口类型中，定义了一个 GetTemperatures 操作，其名称源自输入和输出消息的前缀（即\
  \ `<GetTemperaturesRequest>` 和 `<GetTemperaturesResponse>`）。这两个元素的定义包含在 `<wsdl:types>`\
  \ 部分中，正如数据契约中所定义的那样。\n\n**16-6. 使用 Spring-WS 实现 Web 服务**\n\n问题\n\n一旦为 Web 服务定义了契约，你就可以根据该契约开始实现服务本身。你希望使用\
  \ Spring-WS 来实现此服务。\n\n解决方案\n\n\n\nSpring-WS 提供了一套工具，用于开发契约优先的 Web 服务。构建 Spring-WS\
  \ Web 服务的基本任务包括：\n\n• 为 Spring-WS 设置并配置一个 Spring MVC 应用程序\n\n• 将 Web 服务请求映射到端点\n\
  \n9799ch16.qxd 5/15/08 5:04 PM Page 606\n\n**606**\n\n第 16 章 **■** Spring 远程调用与\
  \ Web 服务\n\n• 创建服务端点来处理请求消息并返回响应消息\n\n• 为此 Web 服务发布 WSDL 文件\n\nWeb 服务中*端点*的概念与 Web\
  \ 应用程序中的控制器非常相似。区别在于，Web 控制器处理 HTTP 请求和 HTTP 响应，而服务端点处理 XML 请求消息和 XML 响应消息。它们都需要调用其他后端服务来处理请求。\n\
  \nSpring-WS 提供了各种抽象端点类，供你使用不同的 XML 处理技术/API 来处理请求和响应 XML 消息。这些类都位于 `org.springframework.ws.server.endpoint`\
  \ 包中。你可以简单地扩展其中一个类，以使用特定的技术/API 处理 XML 消息。表 16-1 列出了这些端点类。\n\n**表 16-1.** *用于不同\
  \ XML 处理技术/API 的端点类* **技术/API**\n\n**端点类**\n\nDOM\n\n`AbstractDomPayloadEndpoint`\n\
  \nJDOM\n\n`AbstractJDomPayloadEndpoint`\n\ndom4j\n\n`AbstractDom4jPayloadEndpoint`\n\
  \nXOM\n\n`AbstractXomPayloadEndpoint`\n\nSAX\n\n`AbstractSaxPayloadEndpoint`\n\n\
  基于事件的 StAX\n\n`AbstractStaxEventPayloadEndpoint`\n\n流式 StAX\n\n`AbstractStaxStreamPayloadEndpoint`\n\
  \nXML 编组\n\n`AbstractMarshallingPayloadEndpoint`\n\n请注意，上述端点类都用于创建有效负载端点。这意味着你只能访问请求和响应消息的有效负载（即\
  \ SOAP 正文中的内容，而不能访问消息的其他部分，如 SOAP 头）。如果你需要访问整个 SOAP 消息，则应该通过实现 `org.springframework.ws.server.endpoint.MessageEndpoint`\
  \ 接口来编写一个端点类。\n\n工作原理\n\n**设置 Spring-WS 应用程序**\n\n要使用 Spring-WS 实现一个 Web 服务，你首先需要为你的\
  \ Web 应用程序上下文创建以下目录结构。\n\n**■注意** 要为 Spring-WS 创建一个 Spring MVC 应用程序，你必须下载并安装 Spring-WS（例如\
  \ v1.5）。然后将 `spring-ws-1.5.0.jar`（位于 Spring-WS 安装目录的 `dist` 目录中）、`stax-api-1.0.1.jar`（位于\
  \ `lib/stax`）、`activation-1.1.1.jar` 和 `saaj-api-1.3.jar`（位于 `lib/java-ee`）、`saaj-impl-1.3.jar`（位于\
  \ `lib/saaj`）以及 `wsdl4j-1.6.1.jar`（位于 `lib/wsdl4j`）复制到 `WEB-INF/lib` 目录中。\n\n9799ch16.qxd\
  \ 5/15/08 5:04 PM Page 607\n\n第 16 章 **■** Spring 远程调用与 Web 服务\n\n**607**\n\nweather/\n\
  WEB-INF/\nclasses/\nlib/\nactivation-1.1.1.jar\ncommons-logging.jar\nsaaj-api-1.3.jar\n\
  saaj-impl-1.3.jar\nspring-webmvc.jar\nspring-ws-1.5.0.jar\nspring.jar\nstax-api-1.0.1.jar\n\
  wsdl4j-1.6.1.jar\ntemperature.xsd\nweather-servlet.xml\nweb.xml\n\n在 `web.xml` 中，你必须配置\
  \ Spring-WS 的 `MessageDispatcherServlet` 服务，这与典型 Spring MVC 应用程序中的 `DispatcherServlet`\
  \ 不同。该服务专门负责将 Web 服务消息分派到适当的端点，并检测 Spring-WS 的框架工具。\n\n<web-app version=\"2.4\"\
  \ xmlns=\" [`java.sun.com/xml/ns/j2ee\"`](http://java.sun.com/xml/ns/j2ee)\nxmlns:xsi=\"\
