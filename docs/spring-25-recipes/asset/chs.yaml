  >**](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsdwww.springframework.org/schema/contextwww.s)\n\
  \n**<context:mbean-export server=\"mbeanServer\" default-domain=\"bean\" />**\n\n\
  ...\n\n</beans>\n\n你可以通过`server`和`default-domain`属性为该元素指定一个 MBean 服务器和默认域名。但是，你将无法设置其他\
