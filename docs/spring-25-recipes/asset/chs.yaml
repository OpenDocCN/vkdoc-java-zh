  \n第 13 章 **■** S P R I N G S E C U R I T Y\n\n`<security:accesscontrollist>` 标签会查询指定领域对象的\
  \ ACL，以检查当前用户是否拥有指定的权限。只有当用户拥有所需权限之一时，该标签才会渲染其主体内容。请注意，在此标签中，权限被定义为从其位掩码值转换而来的整数。值\
