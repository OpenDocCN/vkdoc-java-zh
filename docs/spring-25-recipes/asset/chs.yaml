  \n**<aop:aspectj-autoproxy />**\n\n<bean id=\"arithmeticCalculator\"\n\nclass=\"\
  com.apress.springrecipes.calculator.ArithmeticCalculatorImpl\" />\n\n<bean id=\"\
  unitCalculator\"\n\nclass=\"com.apress.springrecipes.calculator.UnitCalculatorImpl\"\
  \ />\n\n</beans>\n\n实际上，此元素会在后台注册`AnnotationAwareAspectJAutoProxyCreator`，其工作方式与第\
  \ 5 章介绍的自动代理创建器（如`BeanNameAutoProxyCreator`和`DefaultAdvisorAutoProxyCreator`）类似。\n\
  \n**6-2. 使用 AspectJ 注解声明切面**\n\n问题\n\n自 5.0 版本与 AspectWerkz 合并以来，AspectJ 支持将其切面编写为使用一组\
  \ AspectJ 注解标注的 POJO。Spring 2.x AOP 框架也支持此类切面。但它们必须在 Spring IoC 容器中注册才能生效。\n\n解决方案\n\
  \n只需在 IoC 容器中将 AspectJ 切面声明为 bean 实例，即可在 Spring 中注册它们。在 Spring IoC 容器中启用 AspectJ\
  \ 后，它将为与 AspectJ 切面匹配的 bean 创建代理。\n\n使用 AspectJ 注解编写的切面，本质上就是一个带有`@Aspect`注解的 Java\
  \ 类。通知则是一个带有某个通知注解的简单 Java 方法。AspectJ 支持五种类型的通知注解：`@Before`、`@After`、`@AfterReturning`、`@AfterThrowing`和`@Around`。\n\
  \n9799ch06.qxd 4/15/08 11:45 AM 第 171 页\n\n第 6 章 **■** SPRING 2.X AOP 与 ASPECTJ\
  \ 支持\n\n**171**\n\n工作原理\n\n**前置通知**\n\n要创建在特定程序执行点之前处理横切关注点的*前置*通知，可以使用`@Before`注解，并将切入点表达式作为注解值。\n\
  \npackage com.apress.springrecipes.calculator;\n\nimport org.apache.commons.logging.Log;\n\
