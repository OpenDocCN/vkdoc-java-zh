  . 安装 Spring IDE**\n\n问题\n\n你想安装一个能够辅助开发 Spring 应用程序的 IDE。\n\n解决方案\n\n如果你是 Eclipse\
  \ 用户，可以安装 Spring 的官方 Eclipse 插件，称为 Spring IDE\n\n[(http://springide.org/](http://springide.org))。IntelliJ\
  \ IDEA 具有类似的 Spring 支持功能，但不如 Spring IDE 强大或更新及时。在本书中，我将只关注 Spring IDE。安装 Spring\
  \ IDE 有三种方式：\n\n\n\n• 在 Eclipse 的更新管理器中添加 Spring IDE 的[更新站点](http://springide.org/updatesite/)并在线安装。\n\
  \n• 下载 Spring IDE 的归档更新站点，并在 Eclipse 的更新管理器中将其作为本地站点安装。\n\n• 下载 Spring IDE 的归档文件并将其解压到\
  \ Eclipse 的安装目录中。\n\n在这些方法中，如果你的机器可以连接互联网，我强烈建议你从其更新站点安装 Spring IDE。如果无法做到，则应该从归档的本地站点安装。这些方法可以帮助你检查\
  \ Spring IDE 的所有依赖插件是否都已安装。\n\n工作原理\n\n从 Eclipse 的 **Help** 菜单中，选择 **Software Updates**\
  \ **➤** **Find and Install**。Eclipse 会询问你是要更新当前已安装的功能，还是要安装新功能。对于首次安装 Spring IDE，请选择“**Search\
  \ for new features to install**”。\n\n接下来，你会看到一个现有更新站点的列表。如果这里没有 Spring IDE 的更新站点，请通过选择\
  \ **Add Remote Site** 来添加它，然后输入该站点的名称和 URL，如图 2-3 所示。\n\n![Image 13](img/index-57_1.jpg)\n\
