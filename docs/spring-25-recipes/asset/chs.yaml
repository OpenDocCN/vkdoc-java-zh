  \n*门户*是一个从不同来源收集信息，并以统一、集中和个性化的方式呈现给用户的网站。这为用户提供了访问各种信息源（如应用程序和系统）的单一入口点。在 Java\
  \ 中，门户可以使用 Portlet 来生成其内容。*Portlet* 是一种类似 Servlet 的 Web 组件技术，可以动态处理请求并生成响应。Portlet\
  \ 生成的内容通常是聚合到门户页面中的 HTML 片段。Portlet 需要由 Portlet 容器管理。Java Portlet 规范定义了 Portlet\
  \ 与 Portlet 容器之间的契约，以确保不同门户服务器之间的互操作性。在 Spring 2.5 中，Portlet MVC 框架支持该规范的 1.0 版本：JSR-168。\n\
  \n完成本章后，您将能够使用 Spring Portlet MVC 框架开发 Portlet 应用程序，并理解 Portlet 开发与 Servlet 开发之间的差异。\n\
