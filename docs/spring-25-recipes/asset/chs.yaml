  >\n\n<property name=\"connectionFactory\" ref=\"connectionFactory\" />\n\n**<property\
  \ name=\"receiveTimeout\" value=\"10000\" />**\n\n</bean>\n\n<bean id=\"backOffice\"\
  \n\nclass=\"com.apress.springrecipes.post.BackOfficeImpl\">\n\n<property name=\"\
  destination\" ref=\"mailDestination\" />\n\n<property name=\"jmsTemplate\" ref=\"\
  jmsTemplate\" />\n\n</bean>\n\n</beans>\n\n请特别注意 JMS 模板的 `receiveTimeout` 属性。默认情况下，该模板会在目的地无限期等待\
  \ JMS 消息，同时调用线程会被阻塞。为了避免长时间等待消息，你应该为此模板指定一个接收超时时间。如果在指定时间内目的地没有可用消息，JMS 模板的 `receive()`\
  \ 方法将返回一个空消息。\n\n**向默认目的地发送消息和从默认目的地接收消息**\n\n无需为每个 JMS 模板的 `send()` 和 `receive()`\
  \ 方法调用指定消息目的地，你可以为 JMS 模板指定一个默认目的地。这样，你就不再需要将其注入到你的消息发送者和接收者 Bean 中。\n\n<beans ...>\n\
