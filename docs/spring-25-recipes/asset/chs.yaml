  \n现在，你可以将此应用程序部署到 Web 容器中，并通过 URL [`localhost:8080/city/distance.do`](http://localhost:8080/city/distance.do)\
  \ 访问它。\n\n**在 Spring 的 Bean 配置文件中声明 Struts 操作**\n\n除了通过 Spring 的应用上下文在 Struts 操作中主动查找\
  \ Spring Bean 之外，你还可以应用依赖注入模式，将 Spring Bean 注入到你的 Struts 操作中。在这种情况下，你的 Struts 操作不再需要继承\
  \ `ActionSupport` 类，而只需继承 `Action` 类。\n\npackage com.apress.springrecipes.city.struts;\n\
  \n...\n\nimport javax.servlet.http.HttpServletRequest;\n\nimport javax.servlet.http.HttpServletResponse;\n\
  \nimport org.apache.struts.action.Action;\n\nimport org.apache.struts.action.ActionForm;\n\
  \nimport org.apache.struts.action.ActionForward;\n\nimport org.apache.struts.action.ActionMapping;\n\
  \npublic class DistanceAction extends **Action** {\n\n**private CityService cityService;**\n\
  \n**public void setCityService(CityService cityService) {**\n\n**this.cityService\
  \ = cityService;**\n\n**}**\n\npublic ActionForward execute(ActionMapping mapping,\
  \ ActionForm form,\n\nHttpServletRequest request, HttpServletResponse response)\
  \ {\n\nif (request.getMethod().equals(\"POST\")) {\n\n...\n\ndouble distance = **cityService**.findDistance(srcCity,\
  \ destCity);\n\n9799ch11.qxd 5/14/08 4:13 PM 第 406 页\n\n**406**\n\n第 11 章 **■**\
  \ 将 Spring 与其他 Web 框架集成\n\nrequest.setAttribute(\"distance\", distance);\n\n}\n\n\
  return mapping.findForward(\"success\");\n\n}\n\n}\n\n然而，此操作必须由 Spring 管理，才能注入其依赖项。你可以选择在\
  \ `applicationContext.xml` 或由 `ContextLoaderPlugin` 加载的其他 Bean 配置文件中声明它。为了更好地分离业务服务和\
  \ Web 组件，我建议在 `WEB-INF` 根目录下的 `action-servlet.xml` 中声明它，该文件默认由 `ContextLoaderPlugin`\
  \ 加载，因为你的 `ActionServlet` 实例名称为 `action`。\n\n<beans\n\n[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<bean name=\" **/distance**\"\n\nclass=\"com.apress.springrecipes.city.struts.DistanceAction\"\
  >\n\n<property name=\"cityService\" ref=\"cityService\" />\n\n</bean>\n\n</beans>\n\
  \n此操作的 Bean 名称必须与 `struts-config.xml` 中的操作路径相同。由于 `<bean>` 元素的 `id` 属性不能包含 `/` 字符，因此应改用\
  \ `name` 属性。在此配置文件中，你可以引用在其父应用上下文（由 `ContextLoaderListener` 加载）中声明的 Bean。\n\n在 `struts-config.xml`\
  \ 中，你必须注册 `ContextLoaderPlugin` 来加载上述 Bean 配置文件。\n\n<struts-config>\n\n...\n\n<action-mappings>\n\
  \n<action path=\" **/distance**\"\n\nname=\"distanceForm\" validate=\"false\">\n\
  \n<forward name=\"success\"\n\npath=\"/WEB-INF/jsp/distance.jsp\" />\n\n</action>\n\
  \n</action-mappings>\n\n**<controller processorClass=\"org.springframework.web.struts.➥**\n\
  \n**DelegatingRequestProcessor\" />**\n\n**<plug-in className=\"org.springframework.web.struts.ContextLoaderPlugIn\"\
  \ />**\n\n</struts-config>\n\n此外，你必须注册 Struts 请求处理器 `DelegatingRequestProcessor`，以指示\
  \ Struts 通过匹配操作路径从 Spring 的应用上下文中查找其操作。\n\n\n\n9799ch11.qxd 5/14/08 4:13 PM Page\
  \ 407\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n**407**\n\n与 bean 名称关联。注册此请求处理器后，您无需再为\
  \ action 指定 type 属性。\n\n有时您可能已经注册了另一个请求处理器，因此无法注册 `DelegatingRequestProcessor`。在这种情况下，您可以将\
  \ `DelegatingActionProxy` 指定为 action 的 type 以达到相同效果。\n\n<action path=\"/distance\"\
  \n\ntype=\" **org.springframework.web.struts.DelegatingActionProxy**\"\n\nname=\"\
  distanceForm\" validate=\"false\">\n\n<forward name=\"success\"\n\npath=\"/WEB-INF/jsp/distance.jsp\"\
  \ />\n\n</action>\n\n**11-3. 将 Spring 与 JSF 集成**\n\n问题\n\n您希望在用 JSF 开发的 Web 应用中访问在\
  \ Spring IoC 容器中声明的 bean。\n\n解决方案\n\nJSF 应用可以像通用 Web 应用一样访问 Spring 的应用上下文（即通过注册\
  \ Servlet 监听器 `ContextLoaderListener` 并从 Servlet 上下文中访问它）。然而，由于 Spring 和 JSF 的 bean\
  \ 模型相似，通过注册 Spring 提供的 JSF 变量解析器 `DelegatingVariableResolver`（它可以将 JSF 变量解析为 Spring\
  \ bean）来集成它们非常容易。此外，您甚至可以在 Spring 的 bean 配置文件中声明 JSF 受管 bean，从而将它们与您的 Spring bean\
  \ 集中管理。\n\n工作原理\n\n假设您将使用 JSF 实现一个用于查找城市距离的 Web 应用。\n\n首先，为您的 Web 应用创建以下目录结构。\n\n\
  **■注意** 在开始使用 JSF 开发 Web 应用之前，您需要一个 JSF 实现库。您可以从 [`javaserverfaces.dev.java.`](https://javaserverfaces.dev.java)\
  \ 下载 JSF 参考实现（JSF-RI）1.2。\n\nnet/。下载后，将 ZIP 文件解压到您选择的目录中，然后将 `jsf-api.jar` 和 `jsf-impl.jar`（位于\
  \ JSF-RI 安装目录的 lib 目录下）复制到您的 `WEB-INF/lib` 目录。\n\nJSF-RI 依赖于 JSTL，因此您还必须将 `jstl.jar`（位于\
  \ Spring 安装目录的 `lib/j2ee` 目录下）复制过来。\n\n9799ch11.qxd 5/14/08 4:13 PM Page 408\n\n\
  **408**\n\n第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\ncity/\n\nWEB-INF/\n\nclasses/\n\
  \nlib/\n\ncommons-logging.jar\n\njsf-api.jar\n\njsf-impl.jar\n\njstl.jar\n\nspring.jar\n\
  \napplicationContext.xml\n\nfaces-config.xml\n\nweb.xml\n\ndistance.jsp\n\n在 JSF\
  \ 应用的 Web 部署描述符（即 web.xml）中，您必须注册 JSF Servlet `FacesServlet` 来处理 Web 请求。您可以将此 Servlet\
  \ 映射到 URL 模式 `*.faces`。为了在启动时加载 Spring 的应用上下文，您还必须注册 Servlet 监听器 `ContextLoaderListener`。\n\
  \n[<web-app version=\"2.4\"](http://java.sun.com/xml/ns/j2ee)\n\n[xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/j2ee](http://www.w3.org/2001/XMLSchema-instance)\n\n\
  [`java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<listener>\n\n<listener-class>\n\n**org.springframework.web.context.ContextLoaderListener**\n\
  \n</listener-class>\n\n</listener>\n\n<servlet>\n\n<servlet-name>faces</servlet-name>\n\
  \n<servlet-class> **javax.faces.webapp.FacesServlet**</servlet-class>\n\n</servlet>\n\
  \n<servlet-mapping>\n\n<servlet-name>faces</servlet-name>\n\n<url-pattern> ***.faces**</url-pattern>\n\
  \n</servlet-mapping>\n\n</web-app>\n\nJSF 的基本思想是通过将一个或多个 JSF 受管 bean 封装起来，将表示逻辑与\
  \ UI 分离。对于您的距离查找功能，您可以创建一个如下的 `DistanceBean` 类作为 JSF 受管 bean：\n\npackage com.apress.springrecipes.city.jsf;\n\
  \n...\n\npublic class DistanceBean {\n\n9799ch11.qxd 5/14/08 4:13 PM Page 409\n\n\
  第 11 章 **■** 将 Spring 与其他 Web 框架集成\n\n**409**\n\nprivate String srcCity;\n\nprivate\
  \ String destCity;\n\nprivate double distance;\n\nprivate CityService cityService;\n\
  \npublic String getSrcCity() {\n\nreturn srcCity;\n\n}\n\npublic String getDestCity()\
  \ {\n\nreturn destCity;\n\n}\n\npublic double getDistance() {\n\nreturn distance;\n\
  \n}\n\npublic void setSrcCity(String srcCity) {\n\nthis.srcCity = srcCity;\n\n}\n\
  \npublic void setDestCity(String destCity) {\n\nthis.destCity = destCity;\n\n}\n\
  \npublic void setCityService(CityService cityService) {\n\nthis.cityService = cityService;\n\
  \n}\n\npublic void find() {\n\ndistance = cityService.findDistance(srcCity, destCity);\n\
  \n}\n\n}\n\n此 bean 中定义了四个属性。由于您的页面需要显示 `srcCity`、`destCity` 和 `distance` 属性，您为每个属性都定义了\
  \ getter 方法。用户只能输入 `srcCity` 和 `destCity` 属性，因此它们还需要 setter 方法。后端 `CityService`\
  \ bean 通过 setter 方法注入。当调用此 bean 的 `find()` 方法时，它将调用后端服务来查找这两个城市之间的距离，然后将结果存储在 `distance`\
  \ 属性中，以供后续显示。\n\n然后，在您的 Web 应用上下文的根目录下创建 `distance.jsp`。您必须将其放在此处，因为当 `FacesServlet`\
  \ 收到请求时，它会将此请求映射到同名的 JSP 文件。例如，如果您请求 URL `/distance.faces`，那么 `FacesServlet` 将相应地加载\
  \ `/distance.jsp`。\n\n9799ch11.qxd 5/14/08 4:13 PM Page 410\n\n**410**\n\n第 11 章\
  \ **■** 将 Spring 与其他 Web 框架集成\n\n<%@ [taglib prefix=\"f\" uri=\"http://java.sun.com/jsf/core\"\
  \ %>](http://java.sun.com/jsf/core)\n\n<%@ [taglib prefix=\"h\" uri=\"http://java.sun.com/jsf/html\"\
  \ %>](http://java.sun.com/jsf/html)\n\n<html>\n\n<head>\n\n<title>城市距离</title>\n\
  \n</head>\n\n<body>\n\n<f:view>\n\n<h:form>\n\n<h:panelGrid columns=\"2\">\n\n<h:outputLabel\
