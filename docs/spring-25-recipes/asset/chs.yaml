  . 设置 Spring 项目**\n\n问题\n\n你想创建一个使用 Spring 框架的 Java 项目。首先，你需要对其进行设置。\n\n解决方案\n\n\
  Spring 项目的设置包括设置类路径，并创建一个或多个 Bean 配置文件，以在 Spring IoC 容器中配置 Bean。之后，你可以使用此 Bean 配置文件实例化\
  \ Spring IoC 容器，并从中获取 Bean 实例。\n\n工作原理\n\n**设置类路径**\n\n要启动 Spring 项目，你必须在类路径中包含将要使用的\
  \ Spring 模块及其依赖库的 JAR 文件。为方便起见，你可以包含包含所有标准 Spring 模块的单个 spring.jar 文件，尽管其体积较大（约\
  \ 2.7 MB）。它位于 Spring 安装目录的 dist 目录中。或者，你也可以从 dist/modules 目录中选择将要使用的独立模块。\n\nSpring\
  \ 项目所需的另一个 JAR 文件是 commons-logging.jar，位于 lib/jakarta-commons 目录中。Spring 框架使用此库输出其日志消息，因此你必须将其包含在类路径中。Java\
  \ 项目的类路径配置因 IDE 而异。\n\n在本书中，除非特别说明，我始终将 spring.jar 和 commons-logging.jar 包含在项目的类路径中。\n\
  \n**创建 Bean 配置文件**\n\n一个典型的 Spring 项目需要一个或多个 Bean 配置文件来在 Spring IoC 容器中配置 Bean。你可以将\
  \ Bean 配置文件放在类路径或文件系统路径中。为了在 IDE 中更方便地测试，我建议将其放在项目的类路径中。在本书中，除非特别说明，我假设你在类路径的根目录下创建名为\
  \ beans.xml 的 Bean 配置文件。\n\n为了演示 Spring 项目的创建，让我们创建以下 HelloWorld 类，它通过 Setter 注入接受一个消息属性。在其\
  \ hello() 方法中，构造一条问候消息并打印到控制台。\n\npackage com.apress.springrecipes.hello;\n\npublic\
  \ class HelloWorld {\n\nprivate String message;\n\npublic void setMessage(String\
  \ message) {\n\nthis.message = message;\n\n}\n\n9799ch02.qxd 5/5/08 4:42 PM 第 29\
  \ 页\n\n第 2 章 **■** Spring 简介\n\n**29**\n\npublic void hello() {\n\nSystem.out.println(\"\
  Hello! \" + message);\n\n}\n\n}\n\n为了在 Spring IoC 容器中配置一个带有消息的 HelloWorld 类型的 Bean，你需要创建以下\
  \ Bean 配置文件。按照本书的惯例，我们在类路径的根目录下创建它，文件名为 beans.xml。\n\n<beans\n\n[xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd\">`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n<bean id=\"helloWorld\" class=\"com.apress.springrecipes.hello.HelloWorld\">\n\
  \n<property name=\"message\" value=\"How are you?\" />\n\n</bean>\n\n</beans>\n\n\
  **从 Spring IoC 容器中使用 Bean**\n\n你可以编写以下 Main 类，使用位于类路径根目录下的 Bean 配置文件 beans.xml 来实例化\
  \ Spring IoC 容器。然后，你可以从中获取 helloWorld Bean 以供使用。\n\npackage com.apress.springrecipes.hello;\n\
  \nimport org.springframework.context.ApplicationContext;\n\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\
  \ public class Main {\n\npublic static void main(String[] args) {\n\nApplicationContext\
  \ context =\n\nnew ClassPathXmlApplicationContext(\"beans.xml\");\n\nHelloWorld\
  \ helloWorld = (HelloWorld) context.getBean(\"helloWorld\"); helloWorld.hello();\n\
  \n}\n\n}\n\n如果一切正常，你应该会在控制台中看到以下输出，前面会有几行 Spring 的日志消息：\n\nHello! How are you?\n\
