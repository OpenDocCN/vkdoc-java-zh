  \ destination;\n\nprivate Date departureDate;\n\nprivate Date returnDate;\n\n//\
  \ Getters and Setters\n\n...\n\n}\n\n然后，你按如下方式定义后端旅游服务的接口。除了 `processBooking()`\
  \ 方法外，还有一个 `getLocations()` 方法用于返回所有可用的旅游地点。\n\npackage com.apress.springrecipes.travel.tour;\n\
