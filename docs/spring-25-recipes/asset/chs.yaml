  \ **用户名**\n\n**余额**\n\nuser1\n\n接下来编写以下 Main 类，用于让用户 user1 购买 ISBN 为 0001 的书籍。由于该用户的账户只有\
  \ 20 美元，不足以购买这本书。\n\npackage com.apress.springrecipes.bookshop;\n\nimport org.springframework.context.ApplicationContext;\n\
