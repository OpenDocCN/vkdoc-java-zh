  \ 为你的 Bean 引入行为**\n\n**问题**\n\n有时你可能有一组共享相同行为的类。在面向对象编程中，它们必须继承同一个基类或实现同一个接口。这个问题实际上是一个横切关注点，可以通过\
  \ AOP 进行模块化。\n\n此外，Java 的单继承机制只允许一个类最多继承一个基类。因此，你无法同时从多个实现类继承行为。\n\n**解决方案**\n\n\
  \n\n*引言*是 AOP 中一种特殊的通知类型。它允许你的对象通过为某个接口提供实现类来动态地实现该接口，效果就如同你的对象在运行时扩展了该实现类。\n\n\
  此外，你还可以同时为对象引入多个接口及对应的多个实现类，这能达到与多重继承相同的效果。\n\n工作原理\n\n假设你有两个接口：`MaxCalculator`\
  \ 和 `MinCalculator`，分别用于定义 `max()` 和 `min()` 操作。\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \npublic interface MaxCalculator {\n\n    public double max(double a, double b);\n\
  \n}\n```\n\n```java\npackage com.apress.springrecipes.calculator;\n\npublic interface\
  \ MinCalculator {\n\n    public double min(double a, double b);\n\n}\n```\n\n接着，你为每个接口提供了一个实现类，其中包含\
  \ `println` 语句，以便在方法执行时输出信息。\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \npublic class MaxCalculatorImpl implements MaxCalculator {\n\n    public double\
  \ max(double a, double b) {\n        double result = (a >= b) ? a : b;\n       \
  \ System.out.println(\"max(\" + a + \", \" + b + \") = \" + result);\n        return\
  \ result;\n    }\n\n}\n```\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  \npublic class MinCalculatorImpl implements MinCalculator {\n\n    public double\
  \ min(double a, double b) {\n        double result = (a <= b) ? a : b;\n       \
  \ System.out.println(\"min(\" + a + \", \" + b + \") = \" + result);\n        return\
  \ result;\n    }\n\n}\n```\n\n现在，假设你希望 `ArithmeticCalculatorImpl` 也能执行 `max()` 和\
  \ `min()` 计算。由于 Java 语言只支持单继承，`ArithmeticCalculatorImpl` 类无法同时扩展 `MaxCalculatorImpl`\
  \ 和 `MinCalculatorImpl` 类。唯一可行的方式是扩展其中一个类（例如 `MaxCalculatorImpl`），并实现另一个接口（例如 `MinCalculator`），要么复制实现代码，要么将处理委托给实际的实现类。无论哪种方式，你都必须重复声明方法。\n\
  \n通过引入（introduction），你可以让 `ArithmeticCalculatorImpl` 利用实现类 `MaxCalculatorImpl` 和\
  \ `MinCalculatorImpl` 动态地实现 `MaxCalculator` 和 `MinCalculator` 接口。这相当于从 `MaxCalculatorImpl`\
  \ 和 `MinCalculatorImpl` 实现了多重继承的效果。引入背后的精妙之处在于，你无需修改 `ArithmeticCalculatorImpl`\
  \ 类就能引入新方法。这意味着即使没有源代码，你也可以为现有类引入方法。\n\n**提示** 你可能会好奇，在 Spring AOP 中引入是如何做到这一点的。答案是*动态代理*。你可能还记得，你可以为动态代理指定一组接口来实现。引入的工作原理是将一个接口（例如\
  \ `MaxCalculator`）添加到动态代理中。当在代理对象上调用该接口中声明的方法时，代理会将调用委托给后端的实现类（例如 `MaxCalculatorImpl`）。\n\
  \n与通知一样，引入必须在切面内声明。为此，你可以创建一个新切面，或重用现有切面。在这个切面中，你可以通过使用 `@DeclareParents` 注解标注任意字段来声明一个引入。\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n\nimport org.aspectj.lang.annotation.Aspect;\n\
  import org.aspectj.lang.annotation.DeclareParents;\n\n@Aspect\npublic class CalculatorIntroduction\
  \ {\n\n    @DeclareParents(\n        value = \"com.apress.springrecipes.calculator.ArithmeticCalculatorImpl\"\
  ,\n        defaultImpl = MaxCalculatorImpl.class)\n    public MaxCalculator maxCalculator;\n\
  \n    @DeclareParents(\n        value = \"com.apress.springrecipes.calculator.ArithmeticCalculatorImpl\"\
  ,\n        defaultImpl = MinCalculatorImpl.class)\n    public MinCalculator minCalculator;\n\
  }\n```\n\n\n}\n\n`@DeclareParents` 注解类型的 `value` 属性指明了哪些类是此引入的目标。要引入的接口由被注解字段的类型决定。最后，用于此新接口的实现类在\
  \ `defaultImpl` 属性中指定。\n\n通过这两个引入，你可以动态地向 `ArithmeticCalculatorImpl` 类引入一对接口。实际上，你可以在\
  \ `@DeclareParents` 注解的 `value` 属性中指定一个 AspectJ 类型匹配表达式，从而向多个类引入一个接口。最后一步，别忘了在应用上下文中声明此切面的一个实例。\n\
  \n<beans ...>\n\n...\n\n<bean class=\"com.apress.springrecipes.calculator.CalculatorIntroduction\"\
  \ />\n\n</beans>\n\n9799ch06.qxd 4/15/08 11:45 AM Page 190\n\n**190**\n\n第 6 章 **■**\
  \ SPRING 2.X AOP 与 ASPECTJ 支持\n\n由于你已经向算术计算器引入了 `MaxCalculator` 和 `MinCalculator`\
  \ 接口，你可以将其转换为相应的接口来执行 `max()` 和 `min()` 计算。\n\npackage com.apress.springrecipes.calculator;\n\
  \npublic class Main {\n\npublic static void main(String[] args) {\n\n...\n\nArithmeticCalculator\
  \ arithmeticCalculator =\n\n(ArithmeticCalculator) context.getBean(\"arithmeticCalculator\"\
