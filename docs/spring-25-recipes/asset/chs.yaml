  \n**SERIALIZABLE 隔离级别**\n\n当一个事务从表中读取多行后，另一个事务向同一表中插入了新行。如果第一个事务再次读取同一表，它将发现与第一次读取不同的额外行。此问题称为*幻读*。实际上，幻读与不可重复读非常相似，但涉及多行数据。\n\
  \n为避免幻读问题，应将隔离级别提升至最高：SERIALIZABLE。请注意，此隔离级别速度最慢，因为它可能会获取整个表的读锁。在实践中，应始终选择能满足需求的最低隔离级别。\n\
