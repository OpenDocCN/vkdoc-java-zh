  \ implements BeanPostProcessor,\n\n**PriorityOrdered** {\n\nprivate int order;\n\
  \npublic int getOrder() {\n\nreturn order;\n\n}\n\npublic void setOrder(int order)\
  \ {\n\nthis.order = order;\n\n}\n\n...\n\n}\n\n现在，在 Bean 配置文件中，你应该为你的 `PathCheckingBeanPostProcessor`\
  \ 分配一个较小的顺序值，以便它在 `CommonAnnotationBeanPostProcessor` 调用 cashier Bean 的初始化方法之前，检查并创建其路径。由于\
  \ `CommonAnnotationBeanPostProcessor` 的默认顺序是 `Ordered.LOWEST_PRECEDENCE`，你可以简单地为你的\
  \ `PathCheckingBeanPostProcessor` 分配一个零值顺序。\n\n<beans ...>\n\n...\n\n<bean class=\"\
