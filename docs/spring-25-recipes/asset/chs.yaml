  \ S P R I N G 2 . X A O P A N D A S P E C T J S U P P O RT\n\n**6-4\\. 指定切面优先级**\n\
  \n问题\n\n\n\n当同一个连接点应用了多个切面时，除非你显式指定，否则这些切面的优先级是未定义的。\n\n解决方案\n\n可以通过实现 `Ordered`\
  \ 接口或使用 `@Order` 注解来指定切面的优先级。\n\n工作原理\n\n假设你编写了另一个切面来验证计算器的参数。这个切面中只有一个前置通知。\n\n\
  ```java\npackage com.apress.springrecipes.calculator;\n\nimport org.aspectj.lang.JoinPoint;\n\
  \nimport org.aspectj.lang.annotation.Aspect;\n\nimport org.aspectj.lang.annotation.Before;\n\
  \n@Aspect\n\npublic class CalculatorValidationAspect {\n\n    @Before(\"execution(*\
  \ *.*(double, double))\")\n    public void validateBefore(JoinPoint joinPoint) {\n\
  \        for (Object arg : joinPoint.getArgs()) {\n            validate((Double)\
  \ arg);\n        }\n    }\n\n    private void validate(double a) {\n        if (a\
  \ < 0) {\n            throw new IllegalArgumentException(\"Positive numbers only\"\
  );\n        }\n    }\n}\n```\n\n要在 Spring 中注册这个切面，你只需在 bean 配置文件中声明该切面的一个 bean 实例。\n\
  \n```xml\n<beans ...>\n    ...\n    <bean class=\"com.apress.springrecipes.calculator.CalculatorLoggingAspect\"\
  \ />\n    **<bean class=\"com.apress.springrecipes.calculator.➥**\n    **CalculatorValidationAspect\"\
  \ />**\n</beans>\n```\n\n9799ch06.qxd 4/15/08 11:45 AM Page 179\n\n第 6 章 **■** SPRING\
  \ 2.X AOP 与 ASPECTJ 支持\n\n**179**\n\n然而，此时切面的优先级将是未定义的。请注意，优先级并不取决于 bean 的声明顺序。因此，为了指定优先级，你必须让两个切面都实现\
  \ `Ordered` 接口。`getOrder()` 方法返回的值越小，代表优先级越高。所以，如果你希望验证切面优先应用，它应该返回一个比日志切面更低的值。\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n...\nimport org.springframework.core.Ordered;\n\
  \n@Aspect\npublic class CalculatorValidationAspect **implements Ordered** {\n  \
  \  ...\n    **public int getOrder() {**\n        **return 0;**\n    **}**\n}\n```\n\
  \n```java\npackage com.apress.springrecipes.calculator;\n...\nimport org.springframework.core.Ordered;\n\
  \n@Aspect\npublic class CalculatorLoggingAspect **implements Ordered** {\n    ...\n\
  \    **public int getOrder() {**\n        **return 1;**\n    **}**\n}\n```\n\n另一种指定优先级的方式是通过\
  \ `@Order` 注解。顺序编号应放在注解的 value 属性中。\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  ...\nimport org.springframework.core.annotation.Order;\n\n@Aspect\n**@Order(0)**\n\
  public class CalculatorValidationAspect {\n    ...\n}\n```\n\n```java\npackage com.apress.springrecipes.calculator;\n\
  ...\nimport org.springframework.core.annotation.Order;\n\n@Aspect\n**@Order(1)**\n\
  ```\n\n9799ch06.qxd 4/15/08 11:45 AM Page 180\n\n**180**\n\n第 6 章 **■** SPRING 2.X\
