  \ 5/15/08 5:07 PM 第 675 页\n\n第 18 章 **■** Spring 对 JMX、电子邮件和调度的支持\n\n**675**\n\n\
  **18-2. 发布和监听 JMX 通知**\n\n问题\n\n你希望从你的 MBean 发布 JMX 通知，并通过 JMX 通知监听器监听这些通知。\n\n\
  解决方案\n\nSpring 允许你的 bean 通过`NotificationPublisher`发布 JMX 通知。你还可以在 IoC 容器中注册标准的 JMX\
  \ 通知监听器来监听 JMX 通知。\n\n工作原理\n\n**发布 JMX 通知**\n\nSpring IoC 容器支持那些将被导出为 MBean 的 bean\
  \ 发布 JMX 通知。这些 bean 必须实现`NotificationPublisherAware`接口以获取`NotificationPublisher`的访问权限，从而能够发布通知。\n\
  \npackage com.apress.springrecipes.replicator;\n\n...\n\nimport javax.management.Notification;\n\
  \nimport org.springframework.jmx.export.notification.NotificationPublisher;\n\n\
  import org.springframework.jmx.export.notification.NotificationPublisherAware; public\
  \ class FileReplicatorImpl implements FileReplicator,\n\n\n\n**NotificationPublisherAware**\
  \ {\n\n...\n\nprivate int sequenceNumber;\n\nprivate NotificationPublisher notificationPublisher;\n\
  \npublic void setNotificationPublisher(\n\nNotificationPublisher notificationPublisher)\
  \ {\n\nthis.notificationPublisher = notificationPublisher;\n\n}\n\npublic void replicate()\
  \ throws IOException {\n\nnotificationPublisher.sendNotification(\n\nnew Notification(\"\
  replication.start\", this, sequenceNumber));\n\n...\n\nnotificationPublisher.sendNotification(\n\
  \nnew Notification(\"replication.complete\", this, sequenceNumber));\n\n9799ch18.qxd\
  \ 5/15/08 5:07 PM Page 676\n\n**676**\n\n第 18 章 **■** S P R I N G 对 J M X 、电子邮件和任务调度的支持\n\
  \nsequenceNumber++;\n\n}\n\n}\n\n在这个文件复制器中，每当复制开始或完成时，你都会发送一个 JMX 通知。`Notification`\
  \ 构造函数的第一个参数是通知类型，第二个参数是通知源。每个通知都需要一个序列号。你可以为成对的通知使用相同的序列号来跟踪它们。\n\n**监听 JMX 通知**\n\
  \n现在，让我们创建一个通知监听器来监听 JMX 通知。由于监听器会收到多种不同类型的通知（例如，当 MBean 的属性发生变化时会收到 `AttributeChangeNotification`），因此你必须过滤出那些你感兴趣处理的通知。\n\
  \npackage com.apress.springrecipes.replicator;\n\nimport javax.management.Notification;\n\
  \nimport javax.management.NotificationListener;\n\npublic class ReplicationNotificationListener\
  \ implements NotificationListener {\n\npublic void handleNotification(Notification\
  \ notification, Object handback) {\n\nif (notification.getType().startsWith(\"replication\"\
  )) {\n\nSystem.out.println(\n\nnotification.getSource() + \" \" +\n\nnotification.getType()\
  \ + \" #\" +\n\nnotification.getSequenceNumber());\n\n}\n\n}\n\n}\n\n然后，你可以将此通知监听器注册到你的\
  \ MBean 导出器中，以监听从特定 MBean 发出的通知。\n\n<bean id=\"mbeanExporter\"\n\nclass=\"org.springframework.jmx.export.annotation.AnnotationMBeanExporter\"\
  >\n\n<property name=\"defaultDomain\" value=\"bean\" />\n\n<property name=\"notificationListenerMappings\"\
  >\n\n<map>\n\n<entry key=\"bean:name=documentReplicator,type=FileReplicatorImpl\"\
  >\n\n<bean class=\"com.apress.springrecipes.replicator. **➥**\n\nReplicationNotificationListener\"\
  \ />\n\n</entry>\n\n</map>\n\n</property>\n\n</bean>\n\n9799ch18.qxd 5/15/08 5:07\
  \ PM Page 677\n\n第 18 章 **■** S P R I N G 对 J M X 、电子邮件和任务调度的支持\n\n**677**\n\n**18-3\\\
  . 在 Spring 中访问远程 JMX MBean**\n\n问题\n\n你希望访问运行在远程 MBean 服务器上的 JMX MBean，该服务器通过 JMX\
  \ 连接器暴露。当直接使用 JMX API 访问远程 MBean 时，你必须编写复杂的 JMX 特定代码。\n\n解决方案\n\nSpring 提供了两种方法来简化你的远程\
  \ MBean 访问。首先，它提供了一个工厂 bean，让你可以声明式地创建 MBean 服务器连接。通过这个服务器连接，你可以查询和更新 MBean 的属性，以及调用其操作。其次，Spring\
  \ 提供了另一个工厂 bean，允许你为远程 MBean 创建一个代理。通过这个代理，你可以像操作本地 bean 一样操作远程 MBean。\n\n工作原理\n\
  \n**通过 MBean 服务器连接访问远程 MBean**\n\nJMX 客户端需要一个 MBean 服务器连接来访问运行在远程 MBean 服务器上的 MBean。Spring\
  \ 提供了 `MBeanServerConnectionFactoryBean`，让你可以声明式地创建到远程 MBean 服务器的连接。你只需提供服务 URL\
  \ 供其定位 MBean 服务器。现在，让我们在你的客户端 bean 配置文件（例如 `beans-client.xml`）中声明这个工厂 bean。\n\n\
  <beans xmlns=\" [`www.springframework.org/schema/beans\"`](http://www.springframework.org/schema/beans)\n\
  \nxmlns:xsi=\" [`www.w3.org/2001/XMLSchema-instance\"`](http://www.w3.org/2001/XMLSchema-instance)\n\
  \nxsi:schemaLocation=\" [`www.springframework.org/schema/beans`](http://www.springframework.org/schema/beans)\n\
  \n\n\n[`w`](http://www.w3.org/2001/XMLSchema-instance)[ww.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
  ](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)\
  \ >\n\n<bean id=\"mbeanServerConnection\"\n\nclass=\"org.springframework.jmx.support.MBeanServerConnectionFactoryBean\"\
  >\n\n<property name=\"serviceUrl\" value=\n\n\"service:jmx[:rmi://localhost/jndi/rmi:](http://www.springframework.org/schema/beanswww.springframework.org/schema/beans/spring-beans-2.5.xsd)//localhost:1099/replicator\"\
  \ />\n\n</bean>\n\n</beans>\n\n通过此工厂 Bean 创建的 MBean 服务器连接，你可以访问并操作该服务器上运行的 MBean。例如，你可以通过\
  \ `getAttribute()` 和 `setAttribute()` 方法查询和更新 MBean 的属性，只需提供 MBean 的对象名称和属性名称。你还可以使用\
  \ `invoke()` 方法调用 MBean 的操作。\n\npackage com.apress.springrecipes.replicator;\n\n\
  import javax.management.Attribute;\n\nimport javax.management.MBeanServerConnection;\n\
  \nimport javax.management.ObjectName;\n\n9799ch18.qxd 5/15/08 5:07 PM Page 678\n\
  \n**678**\n\n第 18 章 **■** Spring 对 JMX、电子邮件和调度的支持\n\nimport org.springframework.context.ApplicationContext;\n\
