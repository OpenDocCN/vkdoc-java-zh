  **474**\n\n第 13 章 **■** S P R I N G S E C U R I T Y\n\n[`localhost:8080/board/messageList.htm`](http://localhost:8080/board/messageList.htm)\n\
  \n到目前为止，您尚未为此应用程序配置任何安全服务，因此您可以直接访问它，无需登录。\n\n**保护 URL 访问**\n\n现在，让我们使用 Spring Security\
  \ 来保护此 Web 应用程序的 URL 访问。首先，您必须在 `web.xml` 中配置一个 `DelegatingFilterProxy` 实例，以将 HTTP\
  \ 请求过滤委托给 Spring Security 中定义的过滤器：\n\n<web-app ...>\n\n<context-param>\n\n<param-name>contextConfigLocation</param-name>\n\
  \n<param-value>\n\n/WEB-INF/board-service.xml\n\n**/WEB-INF/board-security.xml**\n\
  \n</param-value>\n\n</context-param>\n\n...\n\n<filter>\n\n<filter-name> **springSecurityFilterChain**</filter-name>\n\
  \n<filter-class>\n\n**org.springframework.web.filter.DelegatingFilterProxy**\n\n\
  </filter-class>\n\n</filter>\n\n<filter-mapping>\n\n<filter-name>springSecurityFilterChain</filter-name>\n\
  \n<url-pattern>/*</url-pattern>\n\n</filter-mapping>\n\n...\n\n</web-app>\n\n`DelegatingFilterProxy`\
  \ 的职责很简单，就是将 HTTP 请求过滤委托给一个实现了 `Filter` 接口的 Spring Bean。默认情况下，它会委托给一个名称与其 `<filter-name>`\
  \ 属性相同的 Bean，但您可以在其 `targetBeanName` 初始化参数中覆盖该 Bean 名称。由于当您启用 Web 应用程序安全性时，Spring\
  \ Security 会自动配置一个名为 `springSecurityFilterChain` 的过滤器链，因此您可以直接将此名称用于您的 `DelegatingFilterProxy`\
  \ 实例。\n\n尽管您可以在与 Web 层和服务层相同的配置文件中配置 Spring Security，但最好将安全配置隔离在一个单独的文件中（例如 `board-security.xml`）。您必须将该文件的位置添加到\
  \ `contextConfigLocation` 上下文参数中，以便 `ContextLoaderListener` 在启动时加载它。然后，您使用以下内容创建它：\n\
  \n<beans:beans[](http://www.springframework.org/schema/security)\n\n**9799ch13.qxd\
  \ 5/20/08 4:45 PM 第 475 页\n\n第 13 章 **■** S P R I N G S E C U R I T Y\n\n**475**\n\
  \nxsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\nhttp://www.springframework.org/schema/beans/spring-beans-2.5.xsd\n\
  \nhttp://www.springframework.org/schema/security\n\nhttp://www.springframework.org/schema/security/spring-security-2.0.1.xsd\"\
  >\n\n<http auto-config=\"true\">\n\n<intercept-url pattern=\"/messageList.htm*\"\
  \n\naccess=\"ROLE_USER,ROLE_ANONYMOUS\" />\n\n<intercept-url pattern=\"/messagePost.htm*\"\
  \ access=\"ROLE_USER\" />\n\n<intercept-url pattern=\"/messageDelete.htm*\" access=\"\
  ROLE_ADMIN\" />\n\n</http>\n\n<authentication-provider>\n\n<user-service>\n\n<user\
  \ name=\"admin\" password=\"secret\"\n\nauthorities=\"ROLE_ADMIN,ROLE_USER\" />\n\
  \n<user name=\"user1\" password=\"1111\" authorities=\"ROLE_USER\" />\n\n</user-service>\n\
  \n</authentication-provider>\n\n</beans:beans>\n\n您可能会发现此文件看起来与普通的 Bean 配置文件略有不同。通常，Bean\
  \ 配置文件的默认命名空间是 `beans`，因此您可以在不使用 `beans` 前缀的情况下使用 `<bean>` 和 `<property>` 元素。但是，如果您使用这种风格来声明\
  \ Spring Security 服务，则所有安全元素都必须附加 `security` 前缀。\n\n由于安全配置文件中的元素大部分是 Spring Security\
  \ 的，您可以将 `security` 定义为默认命名空间，这样您就可以在不使用 `security` 前缀的情况下使用它们。然而，如果您这样做，当在此文件中声明普通的\
  \ Spring Bean 时，您必须为 `<bean>` 和 `<property>` 元素包含 `beans` 前缀。\n\n`<http auto-config=\"\
  true\">` 元素会自动配置典型 Web 应用程序所需的基本安全服务。您可以使用其内部的相应子元素来微调这些服务。\n\n在 `<http>` 配置元素内部，您可以使用一个或多个\
  \ `<intercept-url>` 元素来限制对特定 URL 的访问。每个 `<intercept-url>` 元素指定一个 URL 模式以及访问这些 URL\
  \ 所需的一组访问属性。请记住，您必须在 URL 模式的末尾始终包含一个通配符。如果不这样做，URL 模式将无法匹配带有请求参数的 URL。结果，黑客可以通过附加任意请求参数轻松绕过安全检查。\n\
  \n访问属性与用户的权限进行比较，以决定该用户是否可以访问这些 URL。在大多数情况下，访问属性是根据角色来定义的。例如，拥有 `ROLE_USER` 角色的用户，或者默认拥有\
  \ `ROLE_ANONYMOUS` 角色的匿名用户，能够访问 URL `/messageList.htm` 来列出所有消息。但是，用户必须拥有 `ROLE_USER`\
  \ 角色才能通过 URL `/messagePost.htm` 发布新消息。只有拥有 `ROLE_ADMIN` 角色的管理员才能通过 `/messageDelete.htm`\
  \ 删除消息。\n\n您可以在 `<authentication-provider>` 元素中配置身份验证服务。\n\nSpring Security 支持多种用户身份验证方式，包括针对数据库或\
  \ LDAP 仓库进行身份验证。对于简单的安全需求，它还支持直接在 `<user-service>` 中定义用户详细信息。\n\n9799ch13.qxd 5/20/08\
  \ 4:45 PM 第 476 页\n\n**476**\n\n第 13 章 **■** S P R I N G S E C U R I T Y\n\n您可以为每个用户指定用户名、密码和一组权限。\n\
  \n现在，您可以重新部署此应用程序来测试其安全配置。您可以像往常一样输入请求路径 `/messageList.htm` 来列出所有已发布的消息，因为它对匿名用户开放。但是，如果您点击链接发布新消息，您将被重定向到\
  \ Spring Security 生成的默认登录页面。您必须使用正确的用户名和密码登录此应用程序才能发布消息。最后，要删除消息，您必须以管理员身份登录。\n\n\
  **13-2\\. 登录 Web 应用程序**\n\n问题\n\n一个安全的应用程序要求其用户在访问某些安全功能之前先登录。这对于在开放互联网上运行的 Web\
  \ 应用程序尤其重要，因为黑客可以轻松访问它们。大多数 Web 应用程序必须提供一种方式，让用户输入其凭据来登录。\n\n解决方案\n\nSpring Security\
  \ 支持多种方式让用户登录 Web 应用程序。它通过提供一个包含登录表单的默认网页来支持基于表单的登录。您也可以提供一个自定义网页作为登录页面。此外，Spring\
  \ Security 通过处理 HTTP 请求头中呈现的基本身份验证凭据来支持 HTTP 基本身份验证。HTTP 基本身份验证也可用于对通过远程协议和 Web\
  \ 服务发出的请求进行身份验证。\n\n您应用程序的某些部分可能允许匿名访问（例如，访问欢迎页面）。Spring Security 提供了一个匿名登录服务，该服务可以为匿名用户分配一个主体并授予权限，以便您在定义安全策略时可以像对待普通用户一样处理匿名用户。\n\
  \nSpring Security 还支持“记住我”登录，它能够在多个浏览器会话之间记住用户的身份，这样用户在首次登录后无需再次登录。\n\n工作原理\n\n\
  为了帮助您更好地隔离理解各种登录机制，让我们首先通过移除 `auto-config` 属性来禁用 HTTP 自动配置：\n\n<http>\n\n<intercept-url\
  \ pattern=\"/messageList.htm*\" access=\"ROLE_USER,ROLE_ANONYMOUS\" />\n\n<intercept-url\
  \ pattern=\"/messagePost.htm*\" access=\"ROLE_USER\" />\n\n<intercept-url pattern=\"\
  /messageDelete.htm*\" access=\"ROLE_ADMIN\" />\n\n</http>\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n请注意，如果您启用了 HTTP 自动配置，接下来介绍的登录服务将会自动注册。但是，如果您禁用了 HTTP 自动配置，或者想要自定义这些服务，则必须显式地配置相应的\
  \ XML 元素。\n\n9799ch13.qxd 5/20/08 4:45 PM 第 477 页\n\n第 13 章 **■** S P R I N G S\
  \ E C U R I T Y\n\n**477**\n\n**HTTP 基本认证**\n\nHTTP 基本认证的支持可以通过 `<http-basic>` 元素进行配置。\n\
  \n当需要 HTTP 基本认证时，浏览器通常会显示一个登录对话框或一个特定的登录页面供用户登录。\n\n<http>\n\n...\n\n<http-basic\
  \ />\n\n</http>\n\n请注意，当 HTTP 基本认证和基于表单的登录同时启用时，将使用后者。因此，如果您希望 Web 应用程序的用户使用此认证类型登录，则不应启用基于表单的登录。\n\
  \n**基于表单的登录**\n\n基于表单的登录服务会渲染一个包含登录表单的网页，供用户输入其登录信息，并处理登录表单的提交。它通过 `<form-login>`\
  \ 元素进行配置：\n\n<http>\n\n...\n\n<form-login />\n\n</http>\n\n默认情况下，Spring Security\
  \ 会自动创建一个登录页面，并将其映射到 URL `/spring_security_login`。因此，您可以在应用程序中添加一个指向此 URL 的链接（例如，在\
  \ `messageList.jsp` 中）用于登录：\n\n<a href=\"<c:url value=\" **/spring_security_login**\"\
  \ />\">登录</a> 如果您不喜欢默认的登录页面，您可以提供自己的自定义登录页面。例如，您可以在 Web 应用程序的根目录下创建以下 `login.jsp`\
  \ 文件。请注意，您不应将此文件放在 `WEB-INF` 目录内，否则会阻止用户直接访问它。\n\n<%@ [taglib prefix=\"c\" uri=\"\
  http://java.sun.com/jsp/jstl/core\" %>](http://java.sun.com/jsp/jstl/core)\n\n<html>\n\
  \n<head>\n\n<title>登录</title>\n\n</head>\n\n<body>\n\n<form method=\"POST\" action=\"\
  <c:url value=\" **/j_spring_security_check**\" />\">\n\n<table>\n\n<tr>\n\n<td align=\"\
  right\">用户名</td>\n\n<td><input type=\"text\" name=\" **j_username**\" /></td>\n\n\
  </tr>\n\n9799ch13.qxd 5/20/08 4:45 PM 第 478 页\n\n**478**\n\n第 13 章 **■** S P R I\
  \ N G S E C U R I T Y\n\n<tr>\n\n<td align=\"right\">密码</td>\n\n<td><input type=\"\
  password\" name=\" **j_password**\" /></td>\n\n</tr>\n\n<tr>\n\n<td align=\"right\"\
  >记住我</td>\n\n<td><input type=\"checkbox\" name=\" **_spring_security_remember_me**\"\
  \ /></td>\n\n</tr>\n\n<tr>\n\n<td colspan=\"2\" align=\"right\">\n\n<input type=\"\
  submit\" value=\"登录\" />\n\n<input type=\"reset\" value=\"重置\" />\n\n</td>\n\n</tr>\n\
  \n</table>\n\n</form>\n\n</body>\n\n</html>\n\n请注意，表单的 action URL 和输入字段名称是 Spring\
  \ Security 特定的。但是，action URL 可以通过 `<form-login>` 的 `login-url` 属性进行自定义。\n\n现在，您必须更改之前的登录链接，使其指向此\
  \ URL 进行登录：\n\n<a href=\"<c:url value=\"/login.jsp\" />\">登录</a> 为了让 Spring Security\
  \ 在请求登录时显示您的自定义登录页面，您必须在其 `login-page` 属性中指定该页面的 URL：\n\n<http>\n\n...\n\n<form-login\
  \ **login-page=\"/login.jsp\"** />\n\n</http>\n\n如果当用户请求一个安全 URL 时，Spring Security\
  \ 显示了登录页面，那么一旦登录成功，用户将被重定向到目标 URL。但是，如果用户直接通过其 URL 请求登录页面，默认情况下，登录成功后用户将被重定向到上下文路径的根目录（即[，http://localhost:8080/board/](http://localhost:8080/board)）。如果您没有在\
  \ Web 部署描述符中定义欢迎页面，您可能希望在登录成功时将用户重定向到一个默认的目标 URL：\n\n<http>\n\n....\n\n<form-login\
  \ login-page=\"/login.jsp\" **default-target-url=\"/messageList.htm\"** />\n\n</http>\n\
  \n如果您使用 Spring Security 创建的默认登录页面，那么当登录失败时，Spring Security 将再次渲染登录页面并显示错误消息。但是，如果您指定了自定义登录页面，则必须配置\
  \ `authentication-failure-url` 属性，以指定登录错误时要重定向到的 URL。例如，您可以再次重定向到自定义登录页面，并附带错误请求参数：\n\
  \n9799ch13.qxd 5/20/08 4:45 PM 第 479 页\n\n第 13 章 **■** S P R I N G S E C U R I T\
  \ Y\n\n**479**\n\n<http>\n\n....\n\n<form-login login-page=\"/login.jsp\" default-target-url=\"\
  /messageList.htm\"\n\n**authentication-failure-url=\"/login.jsp?error=true\"** />\n\
  \n</http>\n\n然后，您的登录页面应测试 `error` 请求参数是否存在。如果发生错误，您必须通过访问会话范围属性 `SPRING_SECURITY_LAST_EXCEPTION`\
  \ 来显示错误消息，该属性存储了当前用户的最后一个异常。\n\n<%@ [taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
  \ %>](http://java.sun.com/jsp/jstl/core)\n\n<html>\n\n<head>\n\n<title>登录</title>\n\
  \n</head>\n\n<body>\n\n<c:if test=\" **${not empty param.error}**\">\n\n<font color=\"\
  red\">\n\n登录错误。 <br />\n\n原因 : **${sessionScope[\"SPRING_SECURITY_LAST_EXCEPTION\"\
  ].message}**\n\n</font>\n\n</c:if>\n\n...\n\n</body>\n\n</html>\n\n**注销服务**\n\n\
  注销服务提供了一个处理注销请求的处理程序。它可以通过 `<logout>` 元素进行配置：\n\n<http>\n\n...\n\n<logout />\n\n\
  </http>\n\n默认情况下，它被映射到 URL `/j_spring_security_logout`，因此您可以在页面中添加一个指向此 URL 的链接用于注销。请注意，此\
  \ URL 可以通过 `<logout>` 的 `logout-url` 属性进行自定义。\n\n<a href=\"<c:url value=\"/j_spring_security_logout\"\
  \ />\">注销</a> 默认情况下，注销成功后，用户将被重定向到上下文路径的根目录。但有时您可能希望将用户引导到另一个 URL，您可以按如下方式操作：\n\n\
  9799ch13.qxd 5/20/08 4:45 PM 第 480 页\n\n**480**\n\n第 13 章 **■** S P R I N G S E\
  \ C U R I T Y\n\n<http>\n\n...\n\n<logout **logout-success-url=\"/login.jsp\"**\
  \ />\n\n</http>\n\n**匿名登录**\n\n匿名登录服务可以通过 `<anonymous>` 元素进行配置，您可以在其中自定义匿名用户的用户名和权限，其默认值分别为\
  \ `anonymousUser` 和 `ROLE_ANONYMOUS`：\n\n<http>\n\n<intercept-url pattern=\"/messageList.htm*\"\
  \ access=\"ROLE_USER, **ROLE_GUEST**\" />\n\n<intercept-url pattern=\"/messagePost.htm*\"\
  \ access=\"ROLE_USER\" />\n\n<intercept-url pattern=\"/messageDelete.htm*\" access=\"\
  ROLE_ADMIN\" />\n\n...\n\n<anonymous username=\" **guest**\" granted-authority=\"\
  \ **ROLE_GUEST**\" />\n\n</http>\n\n**记住我支持**\n\n记住我支持可以通过 `<remember-me>` 元素进行配置。默认情况下，它将用户名、密码、记住我过期时间和一个私钥编码为一个令牌，并将其作为\
  \ cookie 存储在用户的浏览器中。下次用户访问同一个 Web 应用程序时，将检测到此令牌，以便用户可以自动登录。\n\n<http>\n\n...\n\n\
  <remember-me />\n\n</http>\n\n然而，静态的记住我令牌可能会引发安全问题，因为它们可能被黑客捕获。Spring Security 支持滚动令牌以满足更高级的安全需求，但这需要一个数据库来持久化这些令牌。有关滚动记住我令牌部署的详细信息，请参考\
  \ Spring Security 参考文档。\n\n**13-3\\. 认证用户**\n\n问题\n\n当用户尝试登录您的应用程序以访问其安全资源时，您必须对用户的主体进行认证，并授予该用户权限。\n\
  \n解决方案\n\n在 Spring Security 中，认证由一个或多个*认证提供者*执行，它们连接成一个链。如果这些提供者中的任何一个成功认证了用户，该用户将能够登录到应用程序。如果任何提供者报告用户被禁用、锁定或\n\
  \n9799ch13.qxd 5/20/08 4:45 PM 第 481 页\n\n第 13 章 **■** S P R I N G S E C U R I T\
  \ Y\n\n**481**\n\n\n\n如果凭据不正确，或者没有提供者能够验证该用户，那么该用户将无法登录此应用程序。\n\nSpring Security\
  \ 支持多种用户身份验证方式，并为其提供了内置的提供者实现。你可以使用内置的 XML 元素轻松配置这些提供者。大多数常见的身份验证提供者会针对存储*用户详情*（例如，在应用程序内存、关系数据库或\
  \ LDAP 仓库中）的用户仓库来验证用户。\n\n在仓库中存储用户详情时，应避免以明文形式存储用户密码，因为这样容易受到黑客攻击。相反，你应该始终在仓库中存储加密后的密码。一种典型的密码加密方式是使用单向哈希函数对密码进行编码。当用户输入密码登录时，你对该密码应用相同的哈希函数，并将结果与仓库中存储的哈希值进行比较。Spring\
  \ Security 支持多种密码编码算法（包括 MD5 和 SHA），并为这些算法提供了内置的密码编码器。\n\n如果每次用户尝试登录时，你都从用户仓库中检索用户详情，那么你的应用程序可能会受到性能影响。这是因为用户仓库通常存储在远程，并且必须执行某种查询来响应请求。因此，Spring\
  \ Security 支持在本地内存和存储中缓存用户详情，以节省执行远程查询的开销。\n\n工作原理\n\n**使用内存定义进行用户身份验证**\n\n如果你的应用程序中只有少量用户，并且很少修改他们的详细信息，你可以考虑在\
  \ Spring Security 的配置文件中定义用户详情，这样它们将被加载到应用程序的内存中：\n\n<authentication-provider>\n\
  \n<user-service>\n\n<user name=\"admin\" password=\"secret\" authorities=\"ROLE_ADMIN,ROLE_USER\"\
  \ />\n\n<user name=\"user1\" password=\"1111\" authorities=\"ROLE_USER\" />\n\n\
  <user name=\"user2\" password=\"2222\" disabled=\"true\"\n\nauthorities=\"ROLE_USER\"\
  \ />\n\n</user-service>\n\n</authentication-provider>\n\n你可以在 `<user-service>` 中使用多个\
  \ `<user>` 元素定义用户详情。对于每个用户，你可以指定用户名、密码、禁用状态以及一组授予的权限。被禁用的用户无法登录应用程序。\n\nSpring Security\
  \ 还允许你将用户详情外部化到一个属性文件中，例如 `/WEB-INF/users.properties`：\n\n<authentication-provider>\n\
  \n<user-service **properties=\"/WEB-INF/users.properties\"** />\n\n</authentication-provider>\n\
  \n然后，你可以创建指定的属性文件，并以属性的形式定义用户详情：\n\n9799ch13.qxd 5/20/08 4:45 PM Page 482\n\n**482**\n\
  \n第 13 章 **■** S P R I N G S E C U R I T Y\n\nadmin=secret,ROLE_ADMIN,ROLE_USER\n\
  \nuser1=1111,ROLE_USER\n\nuser2=2222,disabled,ROLE_USER\n\n该文件中的每个属性代表一个用户的详细信息。属性键是用户名，属性值由逗号分隔成几个部分。第一部分是密码，第二部分是启用状态（可选），默认状态为启用。后续部分是授予该用户的权限。\n\
  \n**针对数据库进行用户身份验证**\n\n更典型的情况是，用户详情应存储在数据库中以便于维护。Spring Security 内置了从数据库查询用户详情的支持。默认情况下，它使用以下\
  \ SQL 语句查询用户详情（包括权限）：\n\nSELECT username, password, enabled\n\nFROM\n\nusers\n\n\
  WHERE username = ?\n\nSELECT username, authority\n\nFROM authorities\n\nWHERE username\
  \ = ?\n\n为了让 Spring Security 使用这些 SQL 语句查询用户详情，你必须在数据库中创建相应的表。例如，你可以使用以下 SQL 语句在\
  \ Apache Derby 的 board 模式中创建它们：\n\nCREATE TABLE USERS (\n\nUSERNAME VARCHAR(10)\
  \ NOT NULL,\n\nPASSWORD VARCHAR(32) NOT NULL,\n\nENABLED SMALLINT,\n\n\n\nPRIMARY\
  \ KEY (USERNAME)\n\n);\n\nCREATE TABLE AUTHORITIES (\n\nUSERNAME VARCHAR(10) NOT\
  \ NULL,\n\nAUTHORITY VARCHAR(10) NOT NULL,\n\nFOREIGN KEY (USERNAME) REFERENCES\
  \ USERS\n\n);\n\n然后，你可以向这些表中输入一些用户数据用于测试。这两个表的数据如表 13-1 和表 13-2 所示。\n\n**表 13-1.**\
  \ *USERS 表的测试用户数据*\n\n**USERNAME**\n\n**PASSWORD**\n\n**ENABLED**\n\nadmin\n\nsecret\n\
  \nuser1\n\nuser2\n\n9799ch13.qxd 5/20/08 4:45 PM 第 483 页\n\n第 13 章 **■** S P R I\
  \ N G S E C U R I T Y\n\n**483**\n\n**表 13-2.** *AUTHORITIES 表的测试用户数据*\n\n**USERNAME**\n\
  \n**AUTHORITY**\n\nadmin\n\nROLE_ADMIN\n\nadmin\n\nROLE_USER\n\nuser1\n\nROLE_USER\n\
  \nuser2\n\nROLE_USER\n\n为了让 Spring Security 能够访问这些表，你必须声明一个数据源（例如，在 board-service.xml\
  \ 中）来创建与该数据库的连接。\n\n**■注意** 要连接到 Apache Derby 服务器中的数据库，你必须将 derbyclient.jar（位于 Derby\
  \ 安装目录的 lib 子目录中）复制到 WEB-INF/lib 目录下。\n\n<bean id=\"dataSource\"\n\nclass=\"org.springframework.jdbc.datasource.DriverManagerDataSource\"\
  >\n\n<property name=\"driverClassName\"\n\nvalue=\"org.apache.derby.jdbc.ClientDriver\"\
  \ />\n\n<property name=\"url\"\n\nvalue=\"jdbc:derby://localhost:1527/board;create=true\"\
  \ />\n\n<property name=\"username\" value=\"app\" />\n\n<property name=\"password\"\
  \ value=\"app\" />\n\n</bean>\n\n最后一步是配置一个认证提供者，使其查询该数据库以获取用户详情。你可以简单地通过使用带有数据源引用的\
  \ `<jdbc-user-service>` 元素来实现这一点：\n\n<authentication-provider>\n\n<jdbc-user-service\
  \ data-source-ref=\"dataSource\" />\n\n</authentication-provider>\n\n然而，在某些情况下，你可能已经在遗留数据库中定义了自己的用户存储库。例如，假设表是通过以下\
  \ SQL 语句创建的，并且 MEMBER 表中的所有用户都处于启用状态： CREATE TABLE MEMBER (\n\nID BIGINT NOT NULL,\n\
  \nUSERNAME VARCHAR(10) NOT NULL,\n\nPASSWORD VARCHAR(32) NOT NULL,\n\nPRIMARY KEY\
  \ (ID)\n\n);\n\n9799ch13.qxd 5/20/08 4:45 PM 第 484 页\n\n**484**\n\n第 13 章 **■**\
  \ S P R I N G S E C U R I T Y\n\nCREATE TABLE MEMBER_ROLE (\n\nMEMBER_ID BIGINT\
  \ NOT NULL,\n\nROLE VARCHAR(10) NOT NULL,\n\nFOREIGN KEY (MEMBER_ID) REFERENCES\
  \ MEMBER\n\n);\n\n假设这些表中存储了如表 13-3 和表 13-4 所示的遗留用户数据。\n\n**表 13-3.** *MEMBER 表中的遗留用户数据*\n\
  \n**ID**\n\n**USERNAME**\n\n**PASSWORD**\n\nadmin\n\nsecret\n\nuser1\n\n**表 13-4.**\
  \ *MEMBER_ROLE 表中的遗留用户数据*\n\n**MEMBER_ID**\n\n**ROLE**\n\nROLE_ADMIN\n\nROLE_USER\n\
  \nROLE_USER\n\n幸运的是，Spring Security 也支持使用自定义 SQL 语句来查询遗留数据库以获取用户详情。你可以在 `users-by-username-query`\
  \ 和 `authorities-by-username-query` 属性中指定用于查询用户信息和权限的语句：\n\n<jdbc-user-service data-source-ref=\"\
  dataSource\"\n\nusers-by-username-query=\n\n\"SELECT username, password, 'true'\
  \ as enabled**➥**\n\nFROM\n\nmember**➥**\n\nWHERE username = ?\"\n\nauthorities-by-username-query=\n\
  \n\"SELECT member.username, member_role.role as authorities**➥**\n\nFROM\n\nmember,\
  \ member_role**➥**\n\nWHERE\n\nmember.username = ? AND member.id = member_role.member_id\"\
  \ />\n\n**加密密码**\n\n到目前为止，你一直以明文密码存储用户详情。但这种方法容易受到黑客攻击，因此你应该在存储密码之前对其进行加密。Spring\
  \ Security 支持多种用于加密密码的算法。例如，你可以选择 MD5（消息摘要算法 5，一种单向哈希算法）来加密你的密码。\n\n9799ch13.qxd\
  \ 5/20/08 4:45 PM 第 485 页\n\n第 13 章 **■** S P R I N G S E C U R I T Y\n\n**485**\n\
  \n**■注意** 你可能需要一个工具来计算密码的 MD5 摘要。其中一个工具是 Jacksum，你可以从 [`sourceforge.net/projects/jacksum/`](http://sourceforge.net/projects/jacksum)\
  \ 下载它，并将其解压到你选择的目录中。然后执行以下命令来计算文本的摘要： java -jar jacksum.jar -a md5 -q \"txt:secret\"\
  \n\n\n\n现在你可以将加密后的密码存储在用户仓库中。例如，如果使用内存用户定义，可以在密码属性中指定加密后的密码。然后配置一个 `<password-encoder>`\
  \ 元素，并在其 hash 属性中指定哈希算法。\n\n<authentication-provider>\n\n**<password-encoder hash=\"\
  md5\" />**\n\n<user-service>\n\n<user name=\"admin\" password=\" **5ebe2294ecd0e0f08eab7690d2a6ee69**\"\
  \n\nauthorities=\"ROLE_ADMIN, ROLE_USER\" />\n\n<user name=\"user1\" password=\"\
  \ **b59c67bf196a4758191e42f76670ceba**\"\n\nauthorities=\"ROLE_USER\" />\n\n<user\
  \ name=\"user2\" password=\" **934b535800b1cba8f96a5d72f72f1611**\"\n\ndisabled=\"\
  true\" authorities=\"ROLE_USER\" />\n\n</user-service>\n\n</authentication-provider>\n\
  \n密码编码器同样适用于存储在数据库中的用户仓库：\n\n<authentication-provider>\n\n**<password-encoder hash=\"\
  md5\" />**\n\n<jdbc-user-service data-source-ref=\"dataSource\" />\n\n</authentication-provider>\n\
  \n当然，你必须在数据库表中存储加密后的密码，而不是明文密码，如表 13-5 所示。\n\n**表 13-5.** *用于 USERS 表的带加密密码的测试用户数据*\
  \ **USERNAME**\n\n**PASSWORD**\n\n**ENABLED**\n\nadmin\n\n5ebe2294ecd0e0f08eab7690d2a6ee69\n\
  \nuser1\n\nb59c67bf196a4758191e42f76670ceba\n\nuser2\n\n934b535800b1cba8f96a5d72f72f1611\n\
  \n**针对 LDAP 仓库进行用户认证**\n\nSpring Security 也支持访问 LDAP 仓库进行用户认证。首先，你需要准备一些用户数据来填充\
  \ LDAP 仓库。让我们以 LDAP 数据交换格式（LDIF）准备用户数据，这是一种用于导入和导出 LDAP 目录数据的标准纯文本数据格式。\n\n9799ch13.qxd\
  \ 5/20/08 4:45 PM Page 486\n\n**486**\n\n第 13 章 **■** SPRING SECURITY\n\n例如，创建包含以下内容的\
  \ users.ldif 文件：\n\ndn: dc=springrecipes,dc=com\n\nobjectClass: top\n\nobjectClass:\
  \ domain\n\ndc: springrecipes\n\ndn: ou=groups,dc=springrecipes,dc=com\n\nobjectclass:\
  \ top\n\nobjectclass: organizationalUnit\n\nou: groups\n\ndn: ou=people,dc=springrecipes,dc=com\n\
  \nobjectclass: top\n\nobjectclass: organizationalUnit\n\nou: people\n\ndn: uid=admin,ou=people,dc=springrecipes,dc=com\n\
  \nobjectclass: top\n\nobjectclass: uidObject\n\nobjectclass: person\n\nuid: admin\n\
  \ncn: admin\n\nsn: admin\n\nuserPassword: secret\n\ndn: uid=user1,ou=people,dc=springrecipes,dc=com\n\
  \nobjectclass: top\n\nobjectclass: uidObject\n\nobjectclass: person\n\nuid: user1\n\
  \ncn: user1\n\nsn: user1\n\nuserPassword: 1111\n\ndn: cn=admin,ou=groups,dc=springrecipes,dc=com\n\
  \nobjectclass: top\n\nobjectclass: groupOfNames\n\ncn: admin\n\nmember: uid=admin,ou=people,dc=springrecipes,dc=com\n\
  \ndn: cn=user,ou=groups,dc=springrecipes,dc=com\n\nobjectclass: top\n\nobjectclass:\
  \ groupOfNames\n\ncn: user\n\nmember: uid=admin,ou=people,dc=springrecipes,dc=com\n\
  \nmember: uid=user1,ou=people,dc=springrecipes,dc=com\n\n9799ch13.qxd 5/20/08 4:45\
  \ PM Page 487\n\n第 13 章 **■** SPRING SECURITY\n\n**487**\n\n如果你不太理解这个 LDIF 文件，不必担心。你可能不需要经常使用这种文件格式来定义\
  \ LDAP 数据，因为大多数 LDAP 服务器都支持基于 GUI 的配置。这个 users.ldif 文件包含以下内容：\n\n• 默认的 LDAP 域，dc=springrecipes,dc=com\n\
  • 用于存储组和用户的 groups 和 people 组织单元\n• 密码分别为 secret 和 1111 的 admin 和 user1 用户\n• admin\
  \ 组（包含 admin 用户）和 user 组（包含 admin 和 user1 用户）\n\n为了测试，你可以在本地机器上安装一个 LDAP 服务器来托管这个用户仓库。为了方便安装和配置，我推荐安装\
  \ OpenDS ([`www.opends.org/`](http://www.opends.org))，这是一个基于 Java 的开源目录服务引擎，支持 LDAP。\n\
  \n**■注意** OpenDS 支持两种安装界面：命令行和 GUI。本示例使用命令行界面，因此你需要下载 ZIP 发行版并将其解压到任意目录（例如 C:\\\
  OpenDS-1.0.0），然后在该目录的根目录下执行安装脚本。\n\nC:\\OpenDS-1.0.0>setup --cli\n\nOpenDS Directory\
  \ Server 1.0.0\n\nPlease wait while the setup program initializes...\n\nWhat would\
  \ you like to use as the initial root user DN for the Directory\n\nServer? [cn=Directory\
  \ Manager]:\n\nPlease provide the password to use for the initial root user: **ldap**\n\
  \nPlease re-enter the password for confirmation: **ldap**\n\nOn which port would\
  \ you like the Directory Server to accept connections from LDAP clients? [389]:\n\
  \nWhat do you wish to use as the base DN for the directory data?\n\n[dc=example,dc=com]:**dc=springrecipes,dc=com**\n\
  \nOptions for populating the database:\n\n1)\n\nOnly create the base entry\n\n2)\
  \ Leave the database empty\n\n3)\n\nImport data from an LDIF file\n\n4)\n\nLoad\
  \ automatically-generated sample data\n\nEnter choice [1]: **3**\n\n9799ch13.qxd\
  \ 5/20/08 4:45 PM Page 488\n\n**488**\n\n第 13 章 **■** SPRING SECURITY\n\nPlease\
  \ specify the path to the LDIF file containing the data to import: **users.ldif**\
  \ Do you want to enable SSL? (yes / no) [no]:\n\nDo you want to enable Start TLS?\
  \ (yes / no) [no]:\n\nEnable OpenDS to run as a Windows Service? (yes / no) [no]:\n\
  \nDo you want to start the server when the configuration is completed? (yes /\n\n\
  no) [yes]:\n\nConfiguring Directory Server ..... Done.\n\nImporting LDIF file users.ldif\
  \ ....... Done.\n\nStarting Directory Server ........ Done.\n\n请注意，此 LDAP 服务器的根用户和密码分别是\
  \ cn=Directory Manager 和 ldap。稍后，你将需要使用此用户连接到该服务器。\n\nLDAP 服务器启动后，你可以配置 Spring Security\
  \ 来针对其仓库进行用户认证。\n\n**■注意** 要针对 LDAP 仓库进行用户认证，你需要从 [`www.springframework.org/ldap`](http://www.springframework.org/ldap)\
  \ 下载 Spring LDAP 项目（例如 v1.2.1）并将其解压到你选择的目录。然后将 spring-ldap-1.2.1.jar（位于 Spring LDAP\
  \ 安装目录的 dist 目录中）和 commons-lang.jar（位于 lib 目录中）复制到 WEB-INF/lib 目录。\n\n<beans:beans\
  \ ...>\n\n...\n\n<authentication-provider>\n\n<password-encoder hash=\"{sha}\" />\n\
  \n<ldap-user-service server-ref=\"ldapServer\"\n\n**user-search-filter=\"uid={0}\"\
  \ user-search-base=\"ou=people\"**\n\n**group-search-filter=\"member={0}\" group-search-base=\"\
  ou=groups\"** />\n\n</authentication-provider>\n\n<ldap-server id=\"ldapServer\"\
  \n\nurl=\"ldap://localhost:389/dc=springrecipes,dc=com\"\n\nmanager-dn=\"cn=Directory\
  \ Manager\" manager-password=\"ldap\" />\n\n</beans:beans>\n\n你需要配置一个 `<ldap-user-service>`\
  \ 元素来定义如何从 LDAP 仓库搜索用户。你可以通过多个属性指定搜索用户和组的搜索过滤器和搜索基，这些属性的值必须与仓库的目录结构一致。使用上述属性值，Spring\
  \ Security 将使用特定的用户 ID 从 people 组织单元中搜索用户，并从 groups 组织单元中搜索用户的组。\n\n9799ch13.qxd\
  \ 5/20/08 4:45 PM Page 489\n\n第 13 章 **■** SPRING SECURITY\n\n**489**\n\nSpring\
  \ Security 会自动为每个组添加 ROLE_ 前缀作为权限。\n\n由于 OpenDS 默认使用 SSHA（加盐安全哈希算法）对用户密码进行编码，你必须在\
  \ `<password-encoder>` 中指定 `{sha}` 作为哈希算法。请注意，这个值与 sha 不同，因为它特定于 LDAP 密码编码。\n\n\
  最后，`<ldap-user-service>` 必须引用一个 LDAP 服务器定义，该定义描述了如何创建到 LDAP 服务器的连接。你可以指定根用户的用户名和密码来连接到运行在\
  \ localhost 上的 LDAP 服务器。\n\n**缓存用户详情**\n\n\n\n`<jdbc-user-service>` 和 `<ldap-user-service>`\
  \ 均支持缓存用户详细信息。首先，您需要选择一个提供缓存服务的缓存实现。由于 Spring 和 Spring Security 内置了对 Ehcache ([`ehcache.sourceforge.net/`](http://ehcache.sourceforge.net))\
  \ 的支持，您可以将其选为缓存实现，并为其创建配置文件（例如，位于类路径根目录下的 ehcache.xml），内容如下。\n\n**■注意** 要使用 Ehcache\
  \ 缓存对象，您必须将 ehcache-1.3.0.jar（位于 Spring 安装目录的 lib/ehcache 目录下）复制到 WEB-INF/lib 目录。\n\
  \n<ehcache>\n\n<diskStore path=\"java.io.tmpdir\"/>\n\n<defaultCache\n\nmaxElementsInMemory=\"\
  1000\"\n\neternal=\"false\"\n\ntimeToIdleSeconds=\"120\"\n\ntimeToLiveSeconds=\"\
  120\"\n\noverflowToDisk=\"true\"\n\n/>\n\n<cache name=\"userCache\"\n\nmaxElementsInMemory=\"\
  100\"\n\neternal=\"false\"\n\ntimeToIdleSeconds=\"600\"\n\ntimeToLiveSeconds=\"\
  3600\"\n\noverflowToDisk=\"true\"\n\n/>\n\n</ehcache>\n\n此 Ehcache 配置文件定义了两种缓存配置类型。一种用于默认缓存，另一种用于缓存用户详细信息。如果使用了用户缓存配置，则一个缓存实例将在内存中缓存最多\
  \ 100 个用户的详细信息。当超过此限制时，缓存的用户将被溢出到磁盘。如果某个缓存的用户在创建后空闲时间达到 10 分钟，或存活时间达到 1 小时，则该用户将过期。\n\
  \n9799ch13.qxd 5/20/08 4:45 PM 第 490 页\n\n**490**\n\n第 13 章 **■** S P R I N G S\
  \ E C U R I T Y\n\n要在 Spring Security 中启用用户详细信息缓存，您可以将 `<jdbc-user-service>` 或 `<ldap-user-service>`\
  \ 的 cache-ref 属性设置为引用一个 UserCache 对象。对于 Ehcache，Spring Security 提供了一个 UserCache\
  \ 实现，即 EhCacheBasedUserCache，它需要引用一个 Ehcache 实例。\n\n<beans:beans ...>\n\n...\n\n\
  <authentication-provider>\n\n...\n\n<ldap-user-service server-ref=\"ldapServer\"\
  \n\nuser-search-filter=\"uid={0}\" user-search-base=\"ou=people\"\n\ngroup-search-filter=\"\
  member={0}\" group-search-base=\"ou=groups\"\n\n**cache-ref=\"userCache\"** />\n\
  \n</authentication-provider>\n\n<beans:bean id=\"userCache\" class=\"org.springframework.security.providers.\
  \ **➥**\n\ndao.cache.EhCacheBasedUserCache\">\n\n<beans:property name=\"cache\"\
  \ ref=\"userEhCache\" />\n\n</beans:bean>\n\n<beans:bean id=\"userEhCache\"\n\n\
  class=\"org.springframework.cache.ehcache.EhCacheFactoryBean\">\n\n<beans:property\
  \ name=\"cacheManager\" ref=\"cacheManager\" />\n\n<beans:property name=\"cacheName\"\
  \ value=\"userCache\" />\n\n</beans:bean>\n\n</beans:beans>\n\n在 Spring 中，可以通过 EhCacheFactoryBean\
  \ 创建 Ehcache 实例，只需提供缓存管理器和缓存名称即可。Spring 还提供了 EhCacheManagerFactoryBean，供您通过加载配置文件来创建\
  \ Ehcache 管理器。默认情况下，它会加载 ehcache.xml（位于类路径根目录）。由于 Ehcache 管理器可能被其他服务组件使用，因此应在 board-service.xml\
  \ 中定义它。\n\n<bean id=\"cacheManager\"\n\nclass=\"org.springframework.cache.ehcache.EhCacheManagerFactoryBean\"\
  \ /> **13-4\\. 做出访问控制决策**\n\n问题\n\n在身份验证过程中，应用程序会为成功通过身份验证的用户授予一组权限。当该用户尝试访问应用程序中的资源时，应用程序必须根据所授予的权限或其他特征，决定该资源是否可被访问。\n\
  \n9799ch13.qxd 5/20/08 4:45 PM 第 491 页\n\n第 13 章 **■** S P R I N G S E C U R I T\
  \ Y\n\n**491**\n\n解决方案\n\n决定是否允许用户访问应用程序中资源的决策称为访问控制决策。该决策基于用户的身份验证状态、资源的性质以及访问属性做出。在\
  \ Spring Security 中，访问控制决策由*访问决策管理器*做出，这些管理器必须实现 AccessDecisionManager 接口。\n\n您可以通过实现此接口自由创建自己的访问决策管理器，但\
  \ Spring Security 提供了三种基于投票方法的便捷访问决策管理器。它们如表 13-6 所示。\n\n\n\n**表 13-6.** *Spring\
  \ Security 自带的访问决策管理器* **访问决策管理器**\n\n**授予访问权限的条件**\n\nAffirmativeBased\n\n至少有一个投票者投票授予访问权限。\n\
  \nConsensusBased\n\n多数投票者投票授予访问权限。\n\nUnanimousBased\n\n所有投票者均投弃权或授予访问权限（没有投票者投拒绝访问）。\n\
  \n所有这些访问决策管理器都需要配置一组*投票者*来对访问控制决策进行投票。每个投票者都必须实现 `AccessDecisionVoter` 接口。投票者可以对资源访问投授予、弃权或拒绝票。投票结果由\
  \ `AccessDecisionVoter` 接口中定义的 `ACCESS_GRANTED`、`ACCESS_DENIED` 和 `ACCESS_ABSTAIN`\
  \ 常量字段表示。\n\n默认情况下，如果没有显式指定访问决策管理器，Spring Security 会自动配置一个 `AffirmativeBased` 访问决策管理器，并配置以下两个投票者：\n\
  \n`RoleVoter`：根据用户的角色对访问控制决策进行投票。它只处理以 `ROLE_` 前缀开头的访问属性，但此前缀可以自定义。如果用户拥有访问资源所需的相同角色，则投票授予访问权限；如果用户缺少访问资源所需的任何角色，则投票拒绝访问。如果资源没有以\
  \ `ROLE_` 开头的访问属性，则投弃权票。\n\n`AuthenticatedVoter`：根据用户的认证级别对访问控制决策进行投票。它只处理 `IS_AUTHENTICATED_FULLY`、`IS_AUTHENTICATED_REMEMBERED`\
  \ 和 `IS_AUTHENTICATED_ANONYMOUSLY` 这些访问属性。如果用户的认证级别高于所需属性，则投票授予访问权限。认证级别从高到低依次为“完全认证”、“记住认证”和“匿名认证”。\n\
  \n工作原理\n\n默认情况下，如果没有指定访问决策管理器，Spring Security 会自动配置一个。此默认访问决策管理器等同于以下 bean 配置所定义的管理器：\n\
  \n9799ch13.qxd 5/20/08 4:45 PM Page 492\n\n**492**\n\n第 13 章 **■** SPRING SECURITY\n\
  \n<bean id=\"_accessManager\"\n\nclass=\"org.springframework.security.vote.AffirmativeBased\"\
  >\n\n<property name=\"decisionVoters\">\n\n<list>\n\n<bean class=\"org.springframework.security.vote.RoleVoter\"\
  \ />\n\n<bean class=\"org.springframework.security.vote.AuthenticatedVoter\" />\n\
  \n</list>\n\n</property>\n\n</bean>\n\n这个默认的访问决策管理器及其决策投票者应该能够满足大多数典型的授权需求。但如果它们不能满足你的需求，你可以创建自己的管理器。大多数情况下，你只需要创建一个自定义投票者。例如，你可以创建一个基于用户\
  \ IP 地址进行决策投票的投票者：\n\npackage com.apress.springrecipes.board.security;\n\nimport\
  \ org.springframework.security.Authentication;\n\nimport org.springframework.security.ConfigAttribute;\n\
  \nimport org.springframework.security.ConfigAttributeDefinition;\n\nimport org.springframework.security.ui.WebAuthenticationDetails;\n\
  \nimport org.springframework.security.vote.AccessDecisionVoter;\n\npublic class\
  \ IpAddressVoter implements AccessDecisionVoter {\n\npublic static final String\
  \ IP_PREFIX = \"IP_\";\n\npublic static final String IP_LOCAL_HOST = \"IP_LOCAL_HOST\"\
  ;\n\npublic boolean supports(ConfigAttribute attribute) {\n\nreturn attribute.getAttribute()\
  \ != null\n\n&& attribute.getAttribute().startsWith(IP_PREFIX);\n\n}\n\npublic boolean\
  \ supports(Class clazz) {\n\nreturn true;\n\n}\n\npublic int vote(Authentication\
  \ authentication, Object object,\n\nConfigAttributeDefinition config) {\n\nif (!(authentication.getDetails()\
  \ instanceof WebAuthenticationDetails)) {\n\n**return ACCESS_DENIED;**\n\n}\n\n\
  WebAuthenticationDetails details =\n\n(WebAuthenticationDetails) authentication.getDetails();\n\
  \nString address = details.getRemoteAddress();\n\n9799ch13.qxd 5/20/08 4:45 PM Page\
  \ 493\n\n第 13 章 **■** SPRING SECURITY\n\n**493**\n\n**int result = ACCESS_ABSTAIN;**\n\
  \nfor (Object element : config.getConfigAttributes()) {\n\n\n\nConfigAttribute attribute\
  \ = (ConfigAttribute) element;\n\nif (this.supports(attribute)) {\n\n**result =\
  \ ACCESS_DENIED;**\n\nif (IP_LOCAL_HOST.equals(attribute.getAttribute())) {\n\n\
  if (address.equals(\"127.0.0.1\")) {\n\n**return ACCESS_GRANTED;**\n\n}\n\n}\n\n\
  }\n\n}\n\nreturn result;\n\n}\n\n}\n\n请注意，该投票器仅处理以 `IP_` 前缀开头的访问属性。\n\n目前，它仅支持 `IP_LOCAL_HOST`\
  \ 访问属性。如果用户是 IP 地址等于 `127.0.0.1` 的 Web 客户端，此投票器将投票授予访问权限。否则，它将投票拒绝访问。如果资源没有以 `IP_`\
  \ 开头的访问属性，它将弃权。\n\n接下来，您需要定义一个包含此投票器的自定义访问决策管理器。如果您在 `board-security.xml` 中定义此访问决策管理器，则必须包含\
  \ `beans` 前缀，因为默认模式是 `security`。\n\n<beans:bean id=\"accessDecisionManager\"\n\n\
  class=\"org.springframework.security.vote.AffirmativeBased\">\n\n<beans:property\
  \ name=\"decisionVoters\">\n\n<beans:list>\n\n<beans:bean\n\nclass=\"org.springframework.security.vote.RoleVoter\"\
  \ />\n\n<beans:bean\n\nclass=\"org.springframework.security.vote.AuthenticatedVoter\"\
  \ />\n\n<beans:bean\n\nclass=\"com.apress.springrecipes.board.security.IpAddressVoter\"\
  \ />\n\n</beans:list>\n\n</beans:property>\n\n</beans:bean>\n\n现在，假设您希望允许运行 Web\
  \ 容器的机器上的用户（即服务器管理员）无需登录即可删除消息。您必须在 `<http>` 配置元素中引用此访问决策管理器，并将访问属性 `IP_LOCAL_HOST`\
  \ 添加到 URL 模式 `/messageDelete.htm*`：\n\n<http **access-decision-manager-ref=\"accessDecisionManager\"\
  ** >\n\n<intercept-url pattern=\"/messageList.htm*\" access=\"ROLE_USER,ROLE_GUEST\"\
  \ />\n\n<intercept-url pattern=\"/messagePost.htm*\" access=\"ROLE_USER\" />\n\n\
  <intercept-url pattern=\"/messageDelete.htm*\"\n\n9799ch13.qxd 5/20/08 4:45 PM Page\
  \ 494\n\n**494**\n\n第 13 章 **■** Spring 安全\n\naccess=\"ROLE_ADMIN, **IP_LOCAL_HOST**\"\
  \ />\n\n...\n\n</http>\n\n然后，如果您从本地主机访问此留言板应用程序，则无需以管理员身份登录即可删除已发布的消息。\n\n**13-5\\\
  . 保护方法调用**\n\n问题\n\n作为保护 Web 层 URL 访问的替代或补充方案，有时您可能需要保护服务层中的方法调用。例如，当单个控制器必须调用服务层中的多个方法时，您可能希望对这些方法实施细粒度的安全控制。\n\
  \n解决方案\n\nSpring Security 使您能够以声明方式保护方法调用。首先，您可以在 Bean 定义中嵌入 `<security:intercept-methods>`\
  \ 元素来保护其方法。\n\n或者，您可以配置一个全局的 `<global-method-security>` 元素，以保护与 AspectJ 切入点表达式匹配的多个方法。您还可以使用\
  \ `@Secured` 注解对 Bean 接口或实现类中声明的方法进行注解，然后在 `<global-method-security>` 中为它们启用安全性。\n\
  \n工作原理\n\n**通过嵌入安全拦截器保护方法**\n\n首先，您可以通过在 Bean 定义中嵌入 `<security:intercept-methods>`\
  \ 元素来保护 Bean 的方法。例如，您可以保护在 `board-service.xml` 中定义的 `messageBoardService` Bean 的方法。由于此元素定义在安全模式中，您需要事先导入它。\n\
  \n**■注意** 为了匹配 Spring Security 中需要保护的方法，您必须将 `aspectjrt.jar` 和 `aspectjweaver.jar`（位于\
  \ Spring 安装目录的 `lib/aspectj` 目录下）复制到 `WEB-INF/lib` 目录。\n\n<beans\n\n[](http://www.springframework.org/schema/security)\n\
  \n**[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.springframework.org/schema/security)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/security)\n\
  \n[**http://www.springframework.org/schema/security**](http://www.springframework.org/schema/security)\n\
  \n\n\n[**http://www.springframework.org/schema/security/spring-security-2.0.1.xsd\"\
  >**](http://www.springframework.org/schema/security)\n\n9799ch13.qxd 5/20/08 4:45\
  \ PM 页码 495\n\n第 13 章 **■** S P R I N G S E C U R I T Y\n\n**495**\n\n<bean id=\"\
  messageBoardService\"\n\nclass=\"com.apress.springrecipes.board.service.MessageBoardServiceImpl\"\
  >\n\n<security:intercept-methods\n\naccess-decision-manager-ref=\"accessDecisionManager\"\
  >\n\n<security:protect\n\n**method=\"com.apress.springrecipes.board.service.➥**\n\
  \n**MessageBoardService.listMessages\"**\n\naccess=\"ROLE_USER,ROLE_GUEST\" />\n\
  \n<security:protect\n\n**method=\"com.apress.springrecipes.board.service.➥**\n\n\
  **MessageBoardService.postMessage\"**\n\naccess=\"ROLE_USER\" />\n\n<security:protect\n\
  \n**method=\"com.apress.springrecipes.board.service.➥**\n\n**MessageBoardService.deleteMessage\"\
  **\n\naccess=\"ROLE_ADMIN,IP_LOCAL_HOST\" />\n\n<security:protect\n\n**method=\"\
  com.apress.springrecipes.board.service.➥**\n\n**MessageBoardService.findMessageById\"\
  **\n\naccess=\"ROLE_USER,ROLE_GUEST\" />\n\n</security:intercept-methods>\n\n</bean>\n\
  \n...\n\n</beans>\n\n在 bean 的 `<security:intercept-methods>` 中，你可以指定多个 `<security:protect>`\
  \ 元素来为该 bean 的方法设置访问属性。你可以通过使用带通配符的方法名模式来匹配多个方法。如果你想使用自定义的访问决策管理器，可以在 `access-decision-manager-ref`\
  \ 属性中指定。\n\n**使用切点保护方法**\n\n其次，你可以在 `<global-method-security>` 中定义全局切点，使用 AspectJ\
  \ 切点表达式来保护方法，而无需在每个需要安全保护的方法所属的 bean 中嵌入安全拦截器。你应该在 `board-security.xml` 中配置 `<global-method-security>`\
  \ 元素，以集中管理安全配置。由于该配置文件的默认命名空间是 security，因此你无需显式地为该元素指定前缀。你也可以在 `access-decision-manager-ref`\
  \ 属性中指定自定义的访问决策管理器。\n\n<global-method-security\n\naccess-decision-manager-ref=\"\
  accessDecisionManager\">\n\n<protect-pointcut **expression=**\n\n**\"execution(*\
  \ com.apress.springrecipes.board.service.*Service.list*(..))\"**\n\naccess=\"ROLE_USER,ROLE_GUEST\"\
  \ />\n\n<protect-pointcut **expression=**\n\n**\"execution(* com.apress.springrecipes.board.service.*Service.post*(..))\"\
  **\n\naccess=\"ROLE_USER\" />\n\n<protect-pointcut **expression=**\n\n9799ch13.qxd\
  \ 5/20/08 4:45 PM 页码 496\n\n**496**\n\n第 13 章 **■** S P R I N G S E C U R I T Y\n\
  \n**\"execution(* com.apress.springrecipes.board.service.*Service.delete*(..))\"\
  **\n\naccess=\"ROLE_ADMIN,IP_LOCAL_HOST\" />\n\n<protect-pointcut **expression=**\n\
  \n**\"execution(* com.apress.springrecipes.board.service.*Service.find*(..))\"**\n\
  \naccess=\"ROLE_USER,ROLE_GUEST\" />\n\n</global-method-security>\n\n要测试这种方法，你需要删除前面的\
  \ `<security:intercept-methods>` 元素。\n\n**使用注解保护方法**\n\n保护方法的第三种方法是用 `@Secured`\
  \ 注解对它们进行标注。例如，你可以在 `MessageBoardServiceImpl` 的方法上使用 `@Secured` 注解，并将访问属性指定为其值，该值的类型为\
  \ `String[]`。\n\n**■注意** 要使用 Spring Security 的注解支持，你必须将 `spring-security-core-tiger-2.0.1.jar`（位于\
  \ Spring Security 安装目录的 `dist` 目录下）复制到 `WEB-INF/lib` 目录中。\n\npackage com.apress.springrecipes.board.service;\n\
  \n...\n\nimport org.springframework.security.annotation.Secured;\n\npublic class\
  \ MessageBoardServiceImpl implements MessageBoardService {\n\n...\n\n**@Secured({\"\
  ROLE_USER\", \"ROLE_GUEST\"})**\n\npublic List<Message> listMessages() {\n\n...\n\
  \n}\n\n**@Secured(\"ROLE_USER\")**\n\npublic synchronized void postMessage(Message\
  \ message) {\n\n...\n\n}\n\n**@Secured({\"ROLE_ADMIN\", \"IP_LOCAL_HOST\"})**\n\n\
  public synchronized void deleteMessage(Message message) {\n\n...\n\n}\n\n**@Secured({\"\
  ROLE_USER\", \"ROLE_GUEST\"})**\n\npublic Message findMessageById(Long messageId)\
  \ {\n\nreturn messages.get(messageId);\n\n}\n\n}\n\n9799ch13.qxd 5/20/08 4:45 PM\
  \ 页码 497\n\n第 13 章 **■** S P R I N G S E C U R I T Y\n\n**497**\n\n\n\n然后在 `<global-method-security>`\
  \ 中，你必须为使用 `@Secured` 注解的方法启用安全功能。\n\n<global-method-security **secured-annotations=\"\
  enabled\"**\n\naccess-decision-manager-ref=\"accessDecisionManager\" />\n\n**13-6.\
  \ 在视图中处理安全性**\n\n问题\n\n有时你可能希望在 Web 应用程序的视图中显示用户的认证信息，例如主体名称和已授予的权限。此外，你可能希望根据用户的权限有条件地渲染视图内容。\n\
  \n解决方案\n\n虽然你可以在 JSP 文件中编写 JSP 脚本片段，通过 Spring Security API 检索认证和授权信息，但这并非高效的解决方案。Spring\
  \ Security 提供了一个 JSP 标签库，用于在 JSP 视图中处理安全性。该标签库包含可以显示用户认证信息以及根据用户权限有条件地渲染视图内容的标签。\n\
  \n工作原理\n\n**显示认证信息**\n\n假设你希望在消息列表页面（即 `messageList.jsp`）的页眉中显示用户的主体名称和已授予的权限。首先，你需要导入\
  \ Spring Security 的标签库定义。\n\n**■注意** 要使用 Spring Security 的 JSP 标签库，你必须将 `spring-security-taglibs-2.0.1.jar`（位于\
  \ Spring Security 安装目录的 `dist` 目录下）复制到 `WEB-INF/lib` 目录。\n\n<%@ [taglib prefix=\"\
  c\" uri=\"http://java.sun.com/jsp/jstl/core\" %>](http://java.sun.com/jsp/jstl/core)\n\
  \n**<%@ [taglib prefix=\"security\" uri=\"http://www.springframework.org/security/tags\"\
  \ %>](http://www.springframework.org/security/tags)**\n\n<html>\n\n<head>\n\n<title>消息列表</title>\n\
  \n</head>\n\n<body>\n\n<h2>欢迎！**<security:authentication property=\"name\" />**\
  \ </h2>\n\n9799ch13.qxd 5/20/08 4:45 PM Page 498\n\n**498**\n\n第 13 章 **■** Spring\
  \ Security\n\n**<security:authentication property=\"authorities\" var=\"authorities\"\
  \ />**\n\n<ul>\n\n<c:forEach items=\"${authorities}\" var=\"authority\">\n\n<li>${authority.authority}</li>\n\
  \n</c:forEach>\n\n</ul>\n\n<hr />\n\n...\n\n</body>\n\n</html>\n\n`<security:authentication>`\
  \ 标签会暴露当前用户的 `Authentication` 对象，供你渲染其属性。你可以在其 `property` 属性中指定属性名称或属性路径。例如，你可以通过\
  \ `name` 属性渲染用户的主体名称。\n\n除了直接渲染认证属性外，该标签还支持将属性存储到 JSP 变量中，变量名称由 `var` 属性指定。例如，你可以将包含用户已授予权限的\
  \ `authorities` 属性存储到 JSP 变量 `authorities` 中，然后通过 `<c:forEach>` 标签逐一渲染。你还可以通过 `scope`\
  \ 属性进一步指定变量的作用域。\n\n**有条件地渲染视图内容**\n\n如果你希望根据用户的权限有条件地渲染视图内容，可以使用 `<security:authorize>`\
  \ 标签。例如，你可以根据用户的权限决定是否渲染消息作者：\n\n<%@ [taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
  \ %>](http://java.sun.com/jsp/jstl/core)\n\n<%@ [taglib prefix=\"security\" uri=\"\
  http://www.springframework.org/security/tags\" %>](http://www.springframework.org/security/tags)\n\
  \n<html>\n\n<head>\n\n<title>消息列表</title>\n\n</head>\n\n<body>\n\n...\n\n<c:forEach\
  \ items=\"${messages}\" var=\"message\">\n\n<table>\n\n**<security:authorize ifAllGranted=\"\
  ROLE_ADMIN,ROLE_USER\">**\n\n<tr>\n\n<td>作者</td>\n\n<td>${message.author}</td>\n\
  \n</tr>\n\n**</security:authorize>**\n\n...\n\n</table>\n\n<hr />\n\n</c:forEach>\n\
  \n...\n\n9799ch13.qxd 5/20/08 4:45 PM Page 499\n\n第 13 章 **■** Spring Security\n\
  \n**499**\n\n</body>\n\n</html>\n\n如果你希望仅当用户同时被授予了某些权限时才渲染包含的内容，你需要在 `ifAllGranted`\
  \ 属性中指定这些权限。否则，如果包含的内容可以在用户拥有任意一个权限时渲染，你需要在 `ifAnyGranted` 属性中指定这些权限：\n\n\n\n<security:authorize\
  \ **ifAnyGranted**=\"ROLE_ADMIN,ROLE_USER\">\n\n<tr>\n\n<td>作者</td>\n\n<td>${message.author}</td>\n\
  \n</tr>\n\n</security:authorize>\n\n当用户未被授予 `ifNotGranted` 属性中指定的任何权限时，你也可以渲染包含的内容：\n\
  \n<security:authorize **ifNotGranted**=\"ROLE_GUEST\">\n\n<tr>\n\n<td>作者</td>\n\n\
  <td>${message.author}</td>\n\n</tr>\n\n</security:authorize>\n\n**13-7. 处理领域对象安全**\n\
  \n问题\n\n有时你可能遇到复杂的安全需求，需要在领域对象级别处理安全性。这意味着你必须允许每个领域对象针对不同的主体拥有不同的访问属性。\n\n解决方案\n\
  \nSpring Security 提供了一个名为 ACL 的模块，允许每个领域对象拥有自己的*访问控制列表（ACL）*。一个 ACL 包含一个领域对象的*对象标识*以关联该对象，并且还包含多个*访问控制条目（ACE）*，每个\
  \ ACE 包含以下两个核心部分：\n\n*权限*：ACE 的权限由特定的位掩码表示，每个位值对应一种特定的权限类型。`BasePermission` 类预定义了五个基本权限作为常量供你使用：READ（第\
  \ 0 位，即整数 1）、WRITE（第 1 位，即整数 2）、CREATE（第 2 位，即整数 4）、DELETE（第 3 位，即整数 8）和 ADMINISTRATION（第\
  \ 4 位，即整数 16）。你也可以使用其他未使用的位来定义自己的权限。\n\n*安全标识（SID）*：每个 ACE 包含针对特定 SID 的权限。SID 可以是主体（`PrincipalSid`）或权限（`GrantedAuthoritySid`），用于与权限关联。\n\
  \n9799ch13.qxd 5/20/08 4:45 PM 第 500 页\n\n**500**\n\n第 13 章 **■** SPRING SECURITY\n\
  \n除了定义 ACL 对象模型外，Spring Security 还定义了用于读取和维护该模型的 API，并为这些 API 提供了高性能的 JDBC 实现。为了简化\
  \ ACL 的使用，Spring Security 还提供了诸如访问决策投票器和 JSP 标签等工具，使你能够在应用程序中将 ACL 与其他安全设施一致地使用。\n\
  \n工作原理\n\n**设置 ACL 服务**\n\nSpring Security 提供了内置支持，用于将 ACL 数据存储在关系数据库中，并通过 JDBC\
  \ 访问它。首先，你必须在数据库中创建以下表来存储 ACL 数据：\n\nCREATE TABLE ACL_SID(\n\nID\n\nBIGINT\n\nNOT\
  \ NULL GENERATED BY DEFAULT AS IDENTITY,\n\nSID VARCHAR(100) NOT NULL,\n\nPRINCIPAL\
  \ SMALLINT NOT NULL,\n\nPRIMARY KEY (ID),\n\nUNIQUE (SID, PRINCIPAL)\n\n);\n\nCREATE\
  \ TABLE ACL_CLASS(\n\nID\n\nBIGINT\n\nNOT NULL GENERATED BY DEFAULT AS IDENTITY,\n\
  \nCLASS VARCHAR(100) NOT NULL,\n\nPRIMARY KEY (ID),\n\nUNIQUE (CLASS)\n\n);\n\n\
  CREATE TABLE ACL_OBJECT_IDENTITY(\n\nID BIGINT NOT NULL GENERATED BY DEFAULT AS\
  \ IDENTITY,\n\nOBJECT_ID_CLASS BIGINT NOT NULL,\n\nOBJECT_ID_IDENTITY BIGINT NOT\
  \ NULL,\n\nPARENT_OBJECT BIGINT,\n\nOWNER_SID BIGINT,\n\nENTRIES_INHERITING SMALLINT\
  \ NOT NULL,\n\nPRIMARY KEY (ID),\n\nUNIQUE (OBJECT_ID_CLASS, OBJECT_ID_IDENTITY),\n\
  \nFOREIGN KEY (PARENT_OBJECT) REFERENCES ACL_OBJECT_IDENTITY,\n\nFOREIGN KEY (OBJECT_ID_CLASS)\
  \ REFERENCES ACL_CLASS,\n\nFOREIGN KEY (OWNER_SID) REFERENCES ACL_SID\n\n);\n\n\
  CREATE TABLE ACL_ENTRY(\n\nID BIGINT NOT NULL GENERATED BY DEFAULT AS IDENTITY,\n\
  \nACL_OBJECT_IDENTITY BIGINT NOT NULL,\n\nACE_ORDER INT NOT NULL,\n\nSID BIGINT\
  \ NOT NULL,\n\n9799ch13.qxd 5/20/08 4:45 PM 第 501 页\n\n第 13 章 **■** SPRING SECURITY\n\
  \n**501**\n\nMASK INTEGER NOT NULL,\n\nGRANTING SMALLINT NOT NULL,\n\nAUDIT_SUCCESS\
  \ SMALLINT NOT NULL,\n\nAUDIT_FAILURE SMALLINT NOT NULL,\n\nPRIMARY KEY (ID),\n\n\
  UNIQUE (ACL_OBJECT_IDENTITY, ACE_ORDER),\n\nFOREIGN KEY (ACL_OBJECT_IDENTITY) REFERENCES\
  \ ACL_OBJECT_IDENTITY,\n\nFOREIGN KEY (SID) REFERENCES ACL_SID\n\n);\n\nSpring Security\
  \ 定义了 API 并提供了高性能的 JDBC 实现，供你访问存储在这些表中的 ACL 数据，因此你很少需要直接从数据库访问 ACL 数据。\n\n由于每个领域对象都可以拥有自己的\
  \ ACL，你的应用程序中可能会有大量的 ACL。幸运的是，Spring Security 支持缓存 ACL 对象。你可以继续使用 Ehcache 作为缓存实现，并在\
  \ `ehcache.xml`（位于类路径根目录）中为 ACL 缓存创建新配置。\n\n<ehcache>\n\n...\n\n<cache name=\"aclCache\"\
  \n\nmaxElementsInMemory=\"1000\"\n\neternal=\"false\"\n\ntimeToIdleSeconds=\"600\"\
  \n\ntimeToLiveSeconds=\"3600\"\n\noverflowToDisk=\"true\"\n\n/>\n\n</ehcache>\n\n\
  接下来，你必须为应用程序设置一个 ACL 服务。然而，由于 Spring Security 2.0 不支持使用基于 XML schema 的配置来配置 ACL\
  \ 模块，你必须使用一组普通的 Spring Bean 来配置此模块。由于 `board-security.xml` 的默认命名空间是 `security`，因此在此文件中使用\
  \ `beans` 命名空间的标准 XML 元素来配置 ACL 会比较繁琐。因此，让我们创建一个名为 `board-acl.xml` 的独立 Bean 配置文件，该文件将存储\
  \ ACL 特定的配置，并将其位置添加到 Web 部署描述符中：\n\n<web-app ...>\n\n...\n\n<context-param>\n\n\
