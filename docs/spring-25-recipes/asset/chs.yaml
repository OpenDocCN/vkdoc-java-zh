  \n    }\n\n}\n```\n\n**12-3. 单元测试 Spring MVC 控制器**\n\n问题\n\n\n\n在 Web 应用程序中，您需要测试使用\
  \ Spring MVC 框架开发的 Web 控制器。\n\n解决方案\n\nSpring MVC 控制器由 DispatcherServlet 通过 HTTP\
  \ 请求对象和 HTTP 响应对象调用。处理请求后，控制器会创建 ModelAndView 对象并将其返回给 DispatcherServlet 以渲染视图。对\
  \ Spring MVC 控制器以及其他 Web 应用程序框架中的 Web 控制器进行单元测试的主要挑战，在于如何在单元测试环境中模拟 HTTP 请求对象和响应对象。幸运的是，Spring\
  \ 通过为 Servlet API 提供一组模拟对象（包括 MockHttpServletRequest、MockHttpServletResponse 和 MockHttpSession）来支持\
  \ Web 控制器测试。\n\n要测试 Spring MVC 控制器的输出，您需要检查返回给 DispatcherServlet 的 ModelAndView\
  \ 对象是否正确。Spring 还提供了一组断言工具，用于检查 ModelAndView 对象的内容。\n\nSpring 2.5 支持基于注解的控制器，这些控制器无需扩展\
  \ Spring MVC 控制器基类，也无需直接处理 HTTP 请求和响应。因此，它们可以像简单的 Java 类一样进行测试。\n\n工作原理\n\n**对经典\
  \ Spring MVC 控制器进行单元测试**\n\n在您的银行系统中，假设您要使用 Spring MVC 开发一个 Web 界面，供银行职员输入存款的账号和金额。您通过扩展\
  \ Spring MVC 的 AbstractController 来创建一个简单的控制器。\n\n**■注意** 要使用 Spring MVC 开发 Web\
  \ 控制器，您必须在类路径中包含 spring-webmvc.jar（位于 Spring 安装目录的 dist/modules 目录下）和 servlet-api.jar（位于\
  \ lib/j2ee 目录下）。\n\npackage com.apress.springrecipes.bank;\n\nimport javax.servlet.http.HttpServletRequest;\n\
  \nimport javax.servlet.http.HttpServletResponse;\n\n9799ch12.qxd 5/14/08 4:08 PM\
  \ Page 434\n\n**434**\n\n第十二章 **■** Spring 测试支持\n\nimport org.springframework.web.bind.ServletRequestUtils;\n\
  \nimport org.springframework.web.servlet.ModelAndView;\n\nimport org.springframework.web.servlet.mvc.AbstractController;\n\
  \npublic class DepositController extends AbstractController {\n\nprivate AccountService\
  \ accountService;\n\npublic DepositController(AccountService accountService) {\n\
  \nthis.accountService = accountService;\n\n}\n\nprotected ModelAndView handleRequestInternal(HttpServletRequest\
  \ request,\n\nHttpServletResponse response) throws Exception {\n\nString accountNo\
  \ =\n\nServletRequestUtils.getRequiredStringParameter(request, \"accountNo\"); double\
  \ amount =\n\nServletRequestUtils.getRequiredDoubleParameter(request, \"amount\"\
  ); accountService.deposit(accountNo, amount);\n\ndouble balance = accountService.getBalance(accountNo);\n\
  \nreturn new ModelAndView(\"success\", \"accountNo\", accountNo)\n\n.addObject(\"\
  balance\", balance);\n\n}\n\n}\n\n在该控制器的请求处理方法中，您只需从 HTTP 请求对象中检索两个必需参数 accountNo\
  \ 和 amount，然后将它们传递给后端的 AccountService 对象进行存款操作。之后，您查询该账户的当前余额，并将其与账号一起存储在 ModelAndView\
  \ 对象中，该对象的视图名称设置为 success。\n\n使用 Spring 的控制器测试工具，您可以为此控制器创建如下所示的单元测试。为了确保后端的 AccountService\
  \ 对象被正确调用，您可以使用 EasyMock。\n\n**■注意** 要使用 Spring 的测试工具，您必须在类路径中包含 spring-test.jar（位于\
  \ Spring 安装目录的 dist/modules 目录下）。\n\npackage com.apress.springrecipes.bank;\n\n\
  import static org.springframework.test.web.ModelAndViewAssert.*;\n\nimport javax.servlet.http.HttpServletResponse;\n\
