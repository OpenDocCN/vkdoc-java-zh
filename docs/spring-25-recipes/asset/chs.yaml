  \ **➔ removeMember()**\n\n/member/**list**.htm **➔ listMember()**\n\n你需要在 `MemberController`\
  \ 中更改方法名称以测试此解析器： package com.apress.springrecipes.court.web;\n\n...\n\npublic class\
  \ MemberController extends MultiActionController {\n\n...\n\npublic ModelAndView\
  \ **addMember**(HttpServletRequest request,\n\nHttpServletResponse response, Member\
  \ member) throws Exception {\n\n9799ch10.qxd 5/14/08 3:31 PM 第 380 页\n\n**380**\n\
  \n第 10 章 **■** S P R I N G M V C 框 架\n\n...\n\n}\n\npublic ModelAndView **removeMember**(HttpServletRequest\
  \ request,\n\nHttpServletResponse response) throws Exception {\n\n...\n\n}\n\npublic\
  \ ModelAndView **listMember**(HttpServletRequest request,\n\nHttpServletResponse\
  \ response) throws Exception {\n\n...\n\n}\n\n}\n\n或者，你可以配置 `PropertiesMethodNameResolver`，通过显式指定映射定义来将\
  \ URL 映射到处理方法：\n\n<bean id=\"memberController\"\n\nclass=\"com.apress.springrecipes.court.web.MemberController\"\
  >\n\n...\n\n<property name=\"methodNameResolver\">\n\n<bean class=\"org.springframework.web.servlet.mvc.multiaction.\
  \ **➥**\n\n**PropertiesMethodNameResolver**\">\n\n<property name=\"mappings\">\n\
  \n<props>\n\n**<prop key=\"/member/add.htm\">addMember</prop>**\n\n**<prop key=\"\
  /member/remove.htm\">removeMember</prop>**\n\n**<prop key=\"/member/list.htm\">listMember</prop>**\n\
  \n</props>\n\n</property>\n\n</bean>\n\n</property>\n\n</bean>\n\n然后，URL 将映射到映射定义中指定名称的处理方法：\n\
  \n/member/add.htm **➔** addMember()\n\n/member/remove.htm **➔** removeMember()\n\
  \n/member/list.htm **➔** listMember()\n\n最后，你可以配置 `ParameterMethodNameResolver`，根据请求参数将\
