  \ EJB JAR 文件，将上述 bean 配置文件包含在内，然后重新部署到你的 EJB 容器中。\n\n**17-2. 在 Spring 中访问 EJB 2.x\
  \ 组件**\n\n问题\n\n在 EJB 2.x 中，你必须执行以下任务来调用远程 EJB 组件上的方法。调用本地 EJB 组件上的方法非常类似，区别仅在于你无需处理\
  \ `RemoteException`。\n\n• 初始化 JNDI 查找上下文，这可能会抛出 `NamingException`。\n• 从 JNDI 查找\
  \ home 接口，这可能会抛出 `NamingException`。\n\n\n\n• 从主接口获取远程 EJB 引用，该操作可能抛出 `CreateException`\
  \ 或 `RemoteException`。\n\n• 调用远程接口上的方法，该操作可能抛出 `RemoteException`。\n\n9799ch17.qxd\
  \ 5/15/08 5:06 PM 第 632 页\n\n**632**\n\n第 17 章 **■** Spring 对 EJB 和 JMS 的支持\n\n\
  如你所见，调用 EJB 组件上的方法需要编写大量代码。`NamingException`、`CreateException` 和 `RemoteException`\
  \ 都是你必须处理的受检异常。此外，你的客户端与 EJB 紧密耦合，如果将来将服务实现从 EJB 切换到其他技术，将需要进行大量修改。\n\n解决方案\n\n\
  Spring 提供了两个工厂 bean：`SimpleRemoteStatelessSessionProxyFactoryBean` 和 `LocalStatelessSessionProxyFactoryBean`，用于为远程/本地无状态会话\
