  \ JavaMail API 发送邮件。然而，使用 JavaMail 时，你必须处理 JavaMail 特定的邮件会话和异常。结果，你的应用程序变得依赖于 JavaMail，并且难以切换到其他电子邮件\
  \ API。\n\n解决方案\n\nSpring 的电子邮件支持通过提供一个抽象且与实现无关的 API 来发送邮件，从而简化了邮件发送过程。Spring 电子邮件支持的核心接口是\
  \ MailSender。\n\nJavaMailSender 接口是 MailSender 的子接口，它包含了专门的 JavaMail 特性，例如 *MIME（多用途互联网邮件扩展）*\
  \ 消息支持。要发送包含 HTML 内容、内嵌图片或附件的电子邮件，你必须将其作为 MIME 消息发送。\n\n工作原理\n\n假设你希望你的文件复制应用程序在发生任何错误时通知管理员。\n\
  \n首先，创建以下 ErrorNotifier 接口，其中包含一个用于通知文件复制错误的方法：\n\npackage com.apress.springrecipes.replicator;\n\
  \npublic interface ErrorNotifier {\n\n9799ch18.qxd 5/15/08 5:07 PM 第 681 页\n\n第\
  \ 18 章 **■** Spring 对 JMX、电子邮件和调度的支持\n\n**681**\n\npublic void notifyCopyError(String\
