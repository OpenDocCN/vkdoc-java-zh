  \n默认情况下，Spring 会检测所有使用 `@Component`、`@Repository`、`@Service`、`@Controller` 或您自定义的、本身被\
  \ `@Component` 注解的注解类型所标注的类。您可以通过应用一个或多个包含/排除过滤器来自定义扫描。\n\nSpring 支持四种类型的过滤器表达式。`annotation`\
  \ 和 `assignable` 类型用于指定用于过滤的注解类型和类/接口。`regex` 和 `aspectj` 类型允许您指定一个正则表达式和一个 AspectJ\
  \ 切入点表达式来匹配类。\n\n例如，以下组件扫描包含所有名称中包含单词 `Dao` 或 `Service` 的类，并排除带有 `@Controller` 注解的类：\n\
  \n```xml\n<beans ...>\n    <context:component-scan base-package=\"com.apress.springrecipes.sequence\"\
  >\n        <context:include-filter type=\"**regex**\"\n            expression=\"\
