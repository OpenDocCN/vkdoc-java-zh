  \ 方法或事务模板的构造函数。\n\nDefaultTransactionDefinition def = new DefaultTransactionDefinition();\n\
  \ndef.setIsolationLevel(**TransactionDefinition.ISOLATION_REPEATABLE_READ**); **8-10\\\
  . 设置回滚事务属性**\n\n问题\n\n默认情况下，只有非受检异常（即 RuntimeException 和 Error 类型）会导致事务回滚，而受检异常则不会。有时您可能希望打破此规则，设置自己的异常来回滚事务。\n\
  \n解决方案\n\n可以通过*回滚*事务属性指定哪些异常会导致事务回滚或不回滚。未在此属性中显式指定的任何异常都将按默认回滚规则处理（即非受检异常回滚，受检异常不回滚）。\n\
  \n工作原理\n\n事务的回滚规则可以通过 @Transactional 注解中的 rollbackFor 和 noRollbackFor 属性来定义。这两个属性声明为\
  \ Class[] 类型，因此可以为每个属性指定多个异常。\n\npackage com.apress.springrecipes.bookshop;\n\n\
  ...\n\n\n\nimport org.springframework.transaction.annotation.Propagation;\n\nimport\
