  \ 切面匹配的 bean 创建代理。\n\n9799ch06.qxd 4/15/08 11:45 AM 第 170 页\n\n**170**\n\n第 6 章\
  \ **■** SPRING 2.X AOP 与 ASPECTJ 支持\n\n**■注意** 要在 Spring 应用中使用 AspectJ 注解，必须将 AspectJ\
  \ 库（位于 Spring 安装目录的`lib/aspectj`目录下的`aspectjrt.jar`和`aspectjweaver.jar`）及其依赖项（位于`lib/asm`目录下的`asm-2.2.3.jar`、`asm-commons-2.2.3.jar`和`asm-util-2.2.3.jar`）包含在类路径中。\n\
  \n<beans\n\n[](http://www.springframework.org/schema/aop)\n\n**[xsi:schemaLocation=\"\
