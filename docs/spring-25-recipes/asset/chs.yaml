  \ **10-14. 使用注解开发控制器**\n\n问题\n\n在传统的 Spring MVC 方法中，你必须在 bean 配置文件中为每个控制器类配置一个实例和一个请求映射。如果\
  \ Spring MVC 能够自动检测你的控制器类和请求映射，就可以减少配置工作量。此外，每个控制器类都实现或扩展框架特定的接口或基类也不够灵活。\n\n解决方案\n\
  \nSpring 2.5 支持一种基于注解的新方法来进行控制器开发。Spring 可以通过 `@Controller` 注解自动检测你的控制器类，并通过 `@RequestMapping`\
  \ 注解自动检测你的请求映射。这省去了在 bean 配置文件中配置它们的麻烦。此外，如果使用注解，你的控制器类和处理器方法在访问上下文资源（例如，请求参数、模型属性和会话属性）时将更加灵活。\n\
  \n`@Controller` 注解将任意类标记为控制器类。与传统控制器相比，带注解的控制器类无需实现框架特定的接口或扩展框架特定的基类。在一个控制器类中，可以有一个或多个使用\
  \ `@RequestMapping` 注解的处理器方法。\n\n9799ch10.qxd 5/14/08 3:31 PM Page 386\n\n**386**\n\
  \n第 10 章 **■** S P R I N G M V C 框 架\n\n处理器方法的签名非常灵活。你可以为处理器方法指定任意名称，并定义以下任何类型作为其方法参数。这里仅提及常见的参数类型。有关有效参数类型的完整列表，请参阅\
  \ Spring 关于基于注解的控制器配置的文档，或 `@RequestMapping` 注解的 javadoc。\n\n• `HttpServletRequest`、`HttpServletResponse`\
  \ 或 `HttpSession`\n\n• 任意类型的请求参数，使用 `@RequestParam` 注解\n\n• 任意类型的模型属性，使用 `@ModelAttribute`\
  \ 注解\n\n• 任意类型的命令对象，供 Spring 绑定请求参数\n\n• `Map` 或 `ModelMap`，供处理器方法向模型添加属性\n\n• `Errors`\
  \ 或 `BindingResult`，供处理器方法访问命令对象的绑定和验证结果\n\n• `SessionStatus`，供处理器方法通知其会话处理已完成\n\
  \n处理器方法的返回类型可以是 `ModelAndView`（一个模型，以及一个视图名称或视图对象）、`Map`（仅模型）、`String`（仅视图名称）或 `void`（方法本身直接处理\
  \ HTTP 响应）。\n\n工作原理\n\n\n\n在创建基于注解的控制器之前，您需要先配置 Web 应用程序上下文以处理这些注解。首先，为了让 Spring\
  \ 能够通过 `@Controller` 注解自动检测您的控制器，您必须通过 `<context:component-scan>` 元素启用 Spring 的组件扫描功能。\n\
  \n此外，Spring MVC 能够根据 `@RequestMapping` 注解将请求映射到控制器类和处理方法。为了实现这一点，您需要在 Web 应用程序上下文中注册一个\
  \ `DefaultAnnotationHandlerMapping` 实例和一个 `AnnotationMethodHandlerAdapter` 实例。它们将分别处理类级别和方法级别的\
  \ `@RequestMapping` 注解。\n\n为了专注于基于注解的控制器方法，您可以在 `court-servlet.xml` 中仅包含必要的 Spring\
  \ MVC 配置，如下所示：\n\n<beans\n\n[](http://www.springframework.org/schema/context)\n\n\
  **[xsi:schemaLocation=\"http://www.springframework.org/schema/beans](http://www.springframework.org/schema/context)\n\
  \n[`www.springframework.org/schema/beans/spring-beans-2.5.xsd`](http://www.springframework.org/schema/context)\n\
  \n[**http://www.springframework.org/schema/context**](http://www.springframework.org/schema/context)\n\
  \n[**http://www.springframework.org/schema/context/spring-context-2.5.xsd\">**](http://www.springframework.org/schema/context)\n\
  \n**<context:component-scan**\n\n**base-package=\"com.apress.springrecipes.court.web\"\
  \ />**\n\n9799ch10.qxd 5/14/08 3:31 PM 第 387 页\n\n第 10 章 **■** S P R I N G M V C\
  \ 框架\n\n**387**\n\n<bean class=\"org.springframework.web.servlet.mvc.annotation.\
  \ **➥**\n\n**DefaultAnnotationHandlerMapping**\" />\n\n<bean class=\"org.springframework.web.servlet.mvc.annotation.\
  \ **➥**\n\n**AnnotationMethodHandlerAdapter**\" />\n\n<bean\n\nclass=\"org.springframework.web.servlet.view.InternalResourceViewResolver\"\
  >\n\n<property name=\"prefix\" value=\"/WEB-INF/jsp/\" />\n\n<property name=\"suffix\"\
  \ value=\".jsp\" />\n\n</bean>\n\n<bean id=\"messageSource\"\n\nclass=\"org.springframework.context.support.ResourceBundleMessageSource\"\
  >\n\n<property name=\"basename\" value=\"messages\" />\n\n</bean>\n\n</beans>\n\n\
  默认情况下，`DefaultAnnotationHandlerMapping` 和 `AnnotationMethodHandlerAdapter` 已预先注册在\
  \ Web 应用程序上下文中。但是，如果您显式注册了其他处理映射或处理适配器，它们将不再被自动注册。在这种情况下，您必须自行注册它们。\n\n**开发单动作和多动作控制器**\n\
  \n基于注解的控制器类可以是任意类，无需实现特定接口或继承特定基类。您只需使用 `@Controller` 注解对其进行标注即可。一个控制器中可以定义一个或多个处理方法，用于处理单个或多个动作。处理方法的签名足够灵活，可以接受多种参数。\n\
  \n`@RequestMapping` 注解可以应用于类级别或方法级别。第一种映射策略是将特定的 URL 模式映射到控制器类，然后将特定的 HTTP 方法映射到每个处理方法：\n\
  \npackage com.apress.springrecipes.court.web;\n\n...\n\nimport org.springframework.stereotype.Controller;\n\
  \nimport org.springframework.web.bind.annotation.RequestMapping;\n\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  \nimport org.springframework.web.servlet.ModelAndView;\n\n**@Controller**\n\n**@RequestMapping(\"\
  /welcome.htm\")**\n\npublic class WelcomeController {\n\n**@RequestMapping(method\
  \ = RequestMethod.GET)**\n\npublic ModelAndView welcome() {\n\nDate today = new\
  \ Date();\n\n9799ch10.qxd 5/14/08 3:31 PM 第 388 页\n\n**388**\n\n第 10 章 **■** S P\
  \ R I N G M V C 框架\n\nreturn new ModelAndView(\"welcome\", \"today\", today);\n\n\
  }\n\n}\n\n第二种策略是直接将 URL 模式映射到每个处理方法，而不为控制器类定义映射：\n\npackage com.apress.springrecipes.court.web;\n\
  \n...\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\nimport\
  \ org.springframework.stereotype.Controller;\n\n\n\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  \nimport org.springframework.web.bind.annotation.RequestParam;\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \n**@Controller**\n\npublic class MemberController {\n\nprivate MemberService memberService;\n\
  \n**@Autowired**\n\npublic MemberController(MemberService memberService) {\n\nthis.memberService\
  \ = memberService;\n\n}\n\n**@RequestMapping(\"/member/add.htm\")**\n\npublic String\
  \ addMember(Member member) {\n\nmemberService.add(member);\n\nreturn \"redirect:list.htm\"\
  ;\n\n}\n\n**@RequestMapping(\"/member/remove.htm\")**\n\npublic String removeMember(\n\
  \n**@RequestParam(\"memberName\")** String memberName) {\n\nmemberService.remove(memberName);\n\
  \nreturn \"redirect:list.htm\";\n\n}\n\n**@RequestMapping(\"/member/list.htm\")**\n\
  \npublic ModelAndView listMember() {\n\nList<Member> members = memberService.list();\n\
  \nreturn new ModelAndView(\"memberList\", \"members\", members);\n\n}\n\n}\n\n你可以为处理器方法指定一系列参数。例如，在\
  \ `add()` 方法中，你指定了一个 `Member` 类型的命令对象作为方法参数。然后，请求参数将绑定到该对象中同名的属性上。在 `remove()` 方法中，你指定了一个方法参数，该参数通过\
  \ `@RequestParam()` 注解绑定到请求参数。默认情况下，通过 `@RequestParam()` 注解绑定的请求参数是必需的。你可以将 `required`\
  \ 属性设置为 `false`，以表示该请求参数是可选的。\n\n**开发表单控制器**\n\n在传统的 Spring MVC 方法中，你可以通过扩展 `SimpleFormController`\
  \ 类来创建一个简单的表单控制器。该类定义了基本的表单处理流程，并允许你通过重写多个生命周期方法来定制该流程。在基于注解的 Spring MVC 方法中，你可以使用注解来模拟表单处理流程。\n\
  \n关于基于注解的方法，一个使用 `@Controller` 注解的基本控制器类也可以处理表单。你首先要做的是通过 `@RequestMapping` 注解将一个\
  \ URL 模式映射到这个控制器类。对于一个处理表单的控制器，你必须提供两个重要的方法。一个用于响应 HTTP GET 请求来渲染表单。另一个用于处理 HTTP\
  \ POST 请求的表单提交。这些方法可以有任意名称，但它们必须通过 `@RequestMapping` 注解与一个 HTTP 方法关联。\n\npackage\
  \ com.apress.springrecipes.court.web;\n\n...\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.beans.propertyeditors.CustomDateEditor;\n\nimport org.springframework.stereotype.Controller;\n\
  \nimport org.springframework.ui.ModelMap;\n\nimport org.springframework.validation.BindingResult;\n\
  \nimport org.springframework.web.bind.WebDataBinder;\n\nimport org.springframework.web.bind.annotation.InitBinder;\n\
  \nimport org.springframework.web.bind.annotation.ModelAttribute;\n\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  \nimport org.springframework.web.bind.annotation.RequestMethod;\n\nimport org.springframework.web.bind.annotation.RequestParam;\n\
  \nimport org.springframework.web.bind.annotation.SessionAttributes;\n\nimport org.springframework.web.bind.support.SessionStatus;\n\
  \n**@Controller**\n\n**@RequestMapping(\"/reservationForm.htm\")**\n\n**@SessionAttributes(\"\
  reservation\")**\n\npublic class ReservationFormController {\n\nprivate ReservationService\
  \ reservationService;\n\nprivate ReservationValidator validator;\n\n**@Autowired**\n\
  \npublic ReservationFormController(ReservationService reservationService,\n\nReservationValidator\
  \ validator) {\n\nthis.reservationService = reservationService;\n\nthis.validator\
  \ = validator;\n\n}\n\n**@InitBinder**\n\npublic void initBinder(WebDataBinder binder)\
  \ {\n\n\n\nSimpleDateFormat dateFormat = new SimpleDateFormat(\"yyyy-MM-dd\"); dateFormat.setLenient(false);\n\
  \nbinder.registerCustomEditor(Date.class, new CustomDateEditor(\n\ndateFormat, true));\n\
  \nbinder.registerCustomEditor(SportType.class, new SportTypeEditor(\n\nreservationService));\n\
  \n}\n\n**@ModelAttribute(\"sportTypes\")**\n\npublic List<SportType> populateSportTypes()\
  \ {\n\nreturn reservationService.getAllSportTypes();\n\n}\n\n**@RequestMapping(method\
  \ = RequestMethod.GET)**\n\npublic String setupForm(\n\n@RequestParam(required =\
  \ false, value = \"username\") String username, ModelMap model) {\n\nReservation\
  \ reservation = new Reservation();\n\nreservation.setPlayer(new Player(username,\
  \ null));\n\nmodel.addAttribute(\"reservation\", reservation);\n\nreturn \"reservationForm\"\
  ;\n\n}\n\n**@RequestMapping(method = RequestMethod.POST)**\n\npublic String processSubmit(\n\
  \n**@ModelAttribute(\"reservation\")** Reservation reservation,\n\nBindingResult\
  \ result, SessionStatus status) {\n\nvalidator.validate(reservation, result);\n\n\
  if (result.hasErrors()) {\n\nreturn \"reservationForm\";\n\n} else {\n\nreservationService.make(reservation);\n\
  \nstatus.setComplete();\n\nreturn \"redirect:reservationSuccess.htm\";\n\n}\n\n\
  }\n\n}\n\n与 HTTP GET 方法关联的 `setupForm()` 方法，对应于 `SimpleFormController` 的 `formBackingObject()`\
  \ 方法，该方法用于初始化绑定所需的命令对象。在此方法中，你可以通过 `@RequestParam` 注解获取任何请求参数来初始化命令对象。然后，你自行创建命令对象并将其存储到模型属性中。模型属性名称实际上就是你在\
  \ JSP 文件中可以访问的命令对象名称。如果你想将命令对象存储在会话中，就像启用 `SimpleFormController` 的 `sessionForm`\
  \ 属性一样，你可以对控制器类应用 `@SessionAttributes` 注解，并指定要存储在会话中的模型属性名称。\n\n与 HTTP POST 方法关联的\
  \ `processSubmit()` 方法，对应于 `SimpleFormController` 的 `onSubmit()` 方法，该方法用于处理表单提交。在此方法中，你可以通过\
  \ `@ModelAttribute` 注解从模型中获取命令对象。当应用于方法参数时，`@ModelAttribute` 注解用于将模型属性绑定到方法参数。与\
  \ `SimpleFormController` 的 `onSubmit()` 方法不同，你必须自行执行表单验证，并决定是渲染表单视图还是成功视图。成功处理表单提交后，你通过调用\
  \ `SessionStatus` 的 `setComplete()` 方法从会话中清除命令对象。\n\n当应用于像 `populateSportTypes()`\
  \ 这样的方法时，`@ModelAttribute` 注解用于向模型填充引用数据。这与重写 `SimpleFormController` 的 `referenceData()`\
  \ 方法具有相同的效果。\n\n使用 `@InitBinder` 注解标注的 `initBinder()` 方法，用于向绑定器对象注册你的自定义属性编辑器。它对应于\
  \ `SimpleFormController` 的 `initBinder()` 方法。\n\n请注意，此控制器的成功视图是一个重定向到预订成功页面的视图。你可以为此视图创建另一个基于注解的控制器。\n\
  \npackage com.apress.springrecipes.court.web;\n\nimport org.springframework.stereotype.Controller;\n\
  \nimport org.springframework.web.bind.annotation.RequestMapping;\n\n**@Controller**\n\
  \npublic class ReservationSuccessController {\n\n**@RequestMapping(\"/reservationSuccess.htm\"\
  )**\n\npublic String reservationSuccess() {\n\nreturn \"reservationSuccess\";\n\n\
  }\n\n}\n\n最后，在此表单控制器工作之前，你必须定义一个验证器实例，供 Spring 自动注入：\n\n<bean id=\"reservationValidator\"\
  \n\nclass=\"com.apress.springrecipes.court.domain.ReservationValidator\" /> 为了重用，你可以将绑定器初始化任务从每个控制器类中提取出来，形成一个绑定初始化器：\n\
  \npackage com.apress.springrecipes.court.web;\n\n...\n\n\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  \nimport org.springframework.beans.propertyeditors.CustomDateEditor;\n\n9799ch10.qxd\
