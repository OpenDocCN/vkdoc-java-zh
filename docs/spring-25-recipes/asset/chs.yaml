  \ MVC 中的控制器非常相似，因此将控制器代码从 Web MVC 移植到 Portlet MVC 非常容易。然而，由于存在两种类型的 Portlet 请求——渲染请求和动作请求——Spring\
  \ Portlet MVC 中的 `Controller` 接口为 Portlet 控制器定义了两个需要实现的方法：`handleActionRequest()`\
