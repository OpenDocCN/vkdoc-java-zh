- fmt: "# Classes Without Constructor Arguments\n\nLet’s begin by looking at how we\
    \ create fields within classes without defining them on the class definition line.\
    \ If you were to create a class in Scala with no fields defined on the class definition,\
    \ like this:\n\n```\n// scala\nclass Counter\n```\n\n…the Scala compiler would\
    \ still generate a primary constructor with no arguments, a lot like Java’s default\
    \ constructor. So, the Java equivalent would look like this:\n\n```\n// java\n\
    public class Counter {\n    public Counter() {\n    }\n}\n```\n\nIn Java you might\
    \ initialize a variable and create some methods.\n\n```\n// java\npublic class\
    \ Counter {\n    private int count = 0;\n    public Counter() {\n    }\n    public\
    \ void increment() {\n        count++;\n    }\n    public int getCount() {\n \
    \       return count;\n    }\n}\n```\n\nYou can do the same in Scala.\n\n```\n\
    // scala\nclass Counter {\n    private var count = 0\n    def increment() {\n\
    \        count += 1\n    }\n    def getCount = count\n}\n```\n\nWithin the primary\
    \ constructor (that is, not in the class definition but immediately afterwards\
    \ in the class body), the `val` and `var` keywords may generate getters and setters.\
    \ Their presence affects the bytecode as shown in Table 9-1.\n\n**Table 9-1**\
    \ How the presence of getters and setters affects the bytecode\n\n| Declared in\
    \ primary constructor | `val x` | `var x` | `x` | `private val x` | `private var\
    \ x` |\n| --- | --- | --- | --- | --- | --- |\n| Getter (`x()`) | Y (`public`)\
    \ | Y (`public`) | N/A | Y (`private`) | Y (`private`) |\n| Setter (`x_=(y)`)\
    \ | N | Y (`public`) | N/A | N | Y (`private`) |\n\nAs you can see, this is consistent\
    \ with Table 8-1. Getters are generated by default for `val` and `var` types and\
    \ will all be public. Adding `private` to the field declaration will make the\
    \ generated fields private and setters are only generated for vars (which are,\
    \ again, public by default).\n\n## Additional Constructors\n\nLet’s create an\
    \ alternative Java version of our `Customer` class, this time with additional\
    \ constructors.\n\n```\n// java\npublic class Customer {\n    private final String\
    \ fullname;\n    public Customer(String forename, String initial, String surname)\
    \ {\n        this.fullname =\n            String.format(\"%s %s. %s\", forename,\
    \ initial, surname);\n    }\n    public Customer(String forename, String surname)\
    \ {\n        this(forename, \"\", surname);\n    }\n}\n```\n\nWe’ve defaulted\
    \ the customer’s initial and allowed clients to choose if they want to supply\
    \ it.\n\nWe should probably tidy up the main constructor to reflect the fact that\
    \ the variable could come through as an empty string. We’ll add an `if`-condition\
    \ and format the string depending on the result.\n\n```\n// java\npublic class\
    \ Customer {\n    private final String fullname;\n    public Customer(String forename,\
    \ String initial, String surname) {\n        if (initial != null && !initial.isEmpty())\n\
    \            this.fullname =\n                String.format(\"%s %s. %s\", forename,\
    \ initial, surname);\n        else\n            this.fullname = String.format(\"\
    %s %s\", forename, surname);\n    }\n    public Customer(String forename, String\
    \ surname) {\n        this(forename, \"\", surname);\n    }\n    public static\
    \ void main(String... args) {\n        System.out.println(new Customer(\"Bob\"\
    , \"J\", \"Smith\").fullname);\n        System.out.println(new Customer(\"Bob\"\
    , \"Smith\").fullname);\n    }\n}\n```\n\nCreating additional or auxiliary constructors\
    \ in Scala is just a matter of creating methods called `this`. The one constraint\
    \ is that each auxiliary constructor must call another constructor using `this`\
    \ on its first line. That way, constructors will always be chained, all the way\
    \ to the top.\n\nScala has the notion of a primary constructor; it’s the code\
    \ in the class body. Any parameters passed in from the class definition are available\
    \ to it. If you don’t write any auxiliary constructors, the class will still have\
    \ a constructor; it’s the implicit primary constructor.\n\n```\n// scala\nclass\
    \ Customer(forename: String, initial: String, surname: String) {\n    // primary\
    \ constructor\n}\n```\n\nSo, if we create a field within the primary constructor\
    \ and assign it some value,\n\n```\n// scala\nclass Customer(forename: String,\
    \ initial: String, surname: String) {\n    val fullname = String.format(\"%s %s.\
    \ %s\", forename, initial, surname)\n}\n```\n\n…it would be equivalent to the\
    \ following Java:\n\n```\n// java\npublic class Customer {\n    private final\
    \ String fullname;\n    public Customer(String forename, String initial, String\
    \ surname) {\n        this.fullname =\n            String.format(\"%s %s. %s\"\
    , forename, initial, surname);\n    }\n}\n```\n\nIf we can add another auxiliary\
    \ constructor to the Scala version, we can refer to `this` to chain the call to\
    \ the primary constructor.\n\n```\n// scala\nclass Customer(forename: String,\
    \ initial: String, surname: String) {\n    val fullname = String.format(\"%s %s.\
    \ %s\", forename, initial, surname)\n    def this(forename: String, surname: String)\
    \ {\n        this(forename, \"\", surname)\n    }\n}\n```\n\n### Using Default\
    \ Values\n\nScala has language support for default values on method signatures,\
    \ so we could have written this using just parameters on the class definition,\
    \ and avoided the extra constructor. We’d just default the value for `initial`\
    \ to be an empty string. To make the implementation handle empty strings better,\
    \ we can put some logic in the primary constructor like in the Java version before.\n\
    \n```\nclass Customer(forename: String, initial: String = \"\", surname: String)\
    \ {\n    val fullname = if (initial != null && !initial.isEmpty)\n        forename\
    \ + \" \" + initial + \".\" + surname\n    else\n        forename + \" \" + surname\n\
