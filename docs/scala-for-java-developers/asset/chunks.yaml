- fmt: '### Methods on Traits


    Java 8 introduced default methods where you can create default implementations
    on interfaces. You can do the same thing in Scala with a few extra bits besides.


    Let’s see where Java interfaces might benefit from having default implementations.
    We could start by creating a `Sortable` interface to describe any class that can
    be sorted. More specifically, any implementations should be able to sort things
    of the generic type `A`. This implies it’s only useful for collection classes
    so we’ll make the interface extend `Iterable` to make that more obvious.


    ```java

    // java

    interface Sortable extends Iterable {

    public List sort();

    }

    ```


    If lots of classes implement this, many may well want similar sorting behavior.
    Some will want finer-grained control over the implementation. With Java 8, we
    can provide a default implementation for the common case. We mark the interface
    method as `default` indicating that it has a default implementation, then go ahead
    and provide an implementation.


    Below we’re taking advantage of the fact that the object is iterable, and copying
    its contents into a new `ArrayList`. We can then use the built-in `sort` method
    on `List`. The `sort` method takes a lambda to describe the ordering, and we can
    take a shortcut to reuse an object’s natural ordering if we say the objects to
    compare must be `Comparable`. With a slight tweak to the signature to enforce
    this we can use the comparator’s `compareTo` method. It means that we have to
    make type `A` something that is `Comparable`, but it’s still in keeping with the
    intent of the `Sortable` interface.


    ```java

    // java

    public interface Sortable extends Iterable {

    default public List sort() {

    List list = new ArrayList();

    for (A elements: this)

    list.add(elements);

    list.sort((first, second) -> first.compareTo(second));

    return list;

    }

    }

    ```


    The `default` keyword here means that the method is no longer abstract and that
    any subclasses that don’t override it will use it by default. To see this, we
    can create a class, `NumbersList` extending `Sortable`, to contain a list of numbers,
    and use the default sorting behavior to sort these. There’s no need to implement
    the `sort` method as we’re happy to use the default provided.


    ```java

    // java

    public class NumbersUsageExample {

    private static class NumberList implements Sortable {

    private Integer[] numbers;

    private NumberList(Integer... numbers) {

    this.numbers = numbers;

    }

    @Override

    public Iterator iterator() {

    return Arrays.asList(numbers).iterator();

    }

    }

    public static void main(String... args) {

    Sortable numbers = new NumberList(1, 34, 65, 23, 0, -1);

    System.out.println(numbers.sort());

    }

    }

    ```


    We can apply the same idea to our `Customer` example and create a `Customers`
    class to collect customers. All we have to do is make sure the `Customer` class
    is `Comparable` and we’ll be able to sort our list of customers without implementing
    the sort method ourselves.


    ```java

    // java

    // You’ll get a compiler error if Customer isn’t Comparable

    public class Customers implements Sortable {

    private final Set customers = new HashSet();

    public void add(Customer customer) {

    customers.add(customer);

    }

    @Override

    public Iterator iterator() {

    return customers.iterator();

    }

    }

    ```


    In our `Customer` class, if we implement `Comparable` and the `compareTo` method,
    the default natural ordering will be alphabetically by name.


    ```java

    // java

    public class Customer implements Comparable {

    // ...

    @Override

    public int compareTo(Customer other) {

    return name.compareTo(other.name);

    }

    }

    ```


    If we add some customers to the list in random order, we can print them sorted
    by `name` (as defined in the `compareTo` method).


    ```java

    // java

    public class CustomersUsageExample {

    public static void main(String... args) {

    Customers customers = new Customers();

    customers.add(new Customer("Velma Dinkley", "316 Circle Drive"));

    customers.add(new Customer("Daphne Blake", "101 Easy St"));

    customers.add(new Customer("Fred Jones", "8 Tuna Lane,"));

    customers.add(new DiscountedCustomer("Norville Rogers", "1 Lane"));

    System.out.println(customers.sort());

    }

    }

    ```


    In Scala, we can go through the same steps. Firstly, we’ll create the basic trait.


    ```scala

    // scala

    trait Sortable[A] {

    def sort: Seq[A]         // no body means abstract

    }

    ```


    This creates an abstract method `sort`. Any extending class has to provide an
    implementation, but we can provide a default implementation by just providing
    a regular method body.


    ```scala

    // scala

    trait Sortable[A <: Ordered[A]] extends Iterable[A] {

    def sort: Seq[A] = {

    this.toList.sorted     // built-in sorting method

    }

    }

    ```


    We extend `Iterable` and give the generic type `A` a constraint that it must be
    a subtype of `Ordered`. `Ordered` is like `Comparable` in Java and is used with
    built-in sorting methods. The `<:` keyword indicates the upper bound of `A`. We’re
    using it here just as we did in the Java example to constrain the generic type
    to be a subtype of `Ordered`.


    Recreating the `Customers` collection class in Scala would look like this:


    ```scala

    // scala

    import scala.collections._

    class Customers extends Sortable[Customer] {

    private val customers = mutable.Set[Customer]()

    def add(customer: Customer) = customers.add(customer)

    def iterator: Iterator[Customer] = customers.iterator

    }

    ```


    We have to make `Customer` extend `Ordered` to satisfy the upper-bound constraint,
    just as we had to make the Java version implement `Comparable`. Having done that,
    we inherit the default sorting behavior from the trait.


    ```scala

    // scala

    object Customers {

    def main(args: Array[String]) {

    val customers = new Customers()

    customers.add(new Customer("Fred Jones", "8 Tuna Lane,"))

    customers.add(new Customer("Velma Dinkley", "316 Circle Drive"))

    customers.add(new Customer("Daphne Blake", "101 Easy St"))

    customers.add(new DiscountedCustomer("Norville Rogers", "1 Lane"))

    println(customers.sort)

    }

    }

    ```


    The beauty of the default method is that we can override it and specialize it
    if we need to. For example, if we want to create another sortable collection class
    for our customers but this time sort the customers by the value of their baskets,
    we can override the `sort` method.


    In Java, we’d create a new class that extends `Customers` and overrides the default
    sort method.


    ```java

    // java

    public class CustomersSortableBySpend extends Customers {

    @Override

    public List sort() {

    List customers = new ArrayList();

    for (Customer customer: this)

    customers.add(customer);

    customers.sort((first, second) ->

    second.total().compareTo(first.total()));

    return customers;

    }

    }

    ```


    The general approach is the same as the default method, but we’ve used a different
    implementation for the sorting. We’re now sorting based on the total basket value
    of the customer. In Scala we’d do pretty much the same thing.


    ```scala

    // scala

    class CustomersSortableBySpend extends Customers {

    override def sort: List[Customer] = {

    this.toList.sorted(new Ordering[Customer] {

    def compare(a: Customer, b: Customer) = b.total.compare(a.total)

    })

    }

    }

    ```


    We extend `Customers` and override the `sort` method to provide our alternative
    implementation. We’re using the built-in sort method again, but this time using
    a different anonymous instance of `Ordering`; again, comparing the basket values
    of the customers.


    If you want to create an instance of the comparator as a Scala object rather than
    an anonymous class, we could do something like the following:


    ```scala

    class CustomersSortableBySpend extends Customers {

    override def sort: List[Customer] = {

    this.toList.sorted(BasketTotalDescending)

    }

    }

    object BasketTotalDescending extends Ordering[Customer] {

    def compare(a: Customer, b: Customer) = b.total.compare(a.total)

    }

    ```'
