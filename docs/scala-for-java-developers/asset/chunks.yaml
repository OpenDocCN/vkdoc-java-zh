    # 9. 类与对象


    在本章中，我们将探讨以下内容：


    *   如何在类体内（而非类定义行）定义字段，以及这如何影响生成的方法。

    *   如何创建额外的构造函数。

    *   使用 `object` 关键字定义的 Scala 单例对象。

    *   伴生对象，一种特殊的单例对象。

