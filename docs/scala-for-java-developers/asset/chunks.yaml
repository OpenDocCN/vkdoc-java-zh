- fmt: '# Avoid Not Enough


    I’d been working with Java for more than ten years before I starting looking at
    Scala properly. My first experience was a toe in the water. The team was naturally
    skeptical, so we decided to section off a part of the existing codebase to try
    Scala. We converted our tests to Scala and left mainline development in Java.


    In hindsight, this was a terrible idea. By working only with test code, there
    wasn’t enough critical mass or momentum to improve. The kinds of problems we were
    solving in test code were pretty well understood and the existing testing frameworks
    (like `JUnit`) solved most of them for us.


    There didn’t seem to be much scope to really use the language features. We pretty
    much just rewrote the tests in another testing framework, which happened to be
    in Scala. We didn’t learn much at all and, in the end, reverted everything back
    to Java. It was a total waste of time and effort.


    The one thing I learnt from this was that to explore a new language, you need
    real problems to solve: design problems, domain problems, business problems. Sectioning
    off a subset of your codebase limits the kinds of problems you can explore and
    so limits your learning.


    # Don’t Do Too Much


    The next time I had a chance to try out Scala, I went to the opposite extreme.
    I jumped in at the deep end, worked exclusively with Scala, and tried really hard
    to adopt functional programming, new patterns, new architectural designs… anything
    I could find that was related to Scala.


    I hadn’t done much functional programming before, so pretty quickly I hit a wall.
    I was faced with concepts and ideas that were completely foreign to me. I struggled,
    as I was trying to learn too much, too soon: new frameworks, libraries, and techniques,
    as well as a new language. I tried to run before I could walk.


    It took a while for me to realize that, despite being an experienced developer,
    I was actually a novice when it came to Scala and functional programming. I’d
    failed to recognize this and, in hindsight, it was irresponsible to commit to
    building software like this. I was hired for my expertise but managed to put barriers
    up, preventing me from applying that expertise.


    # Purely Functional FTW?


    Later on, I was fortunate enough to work with some really experienced developers,
    all well-versed in functional programming and mostly coming from a Haskell background.
    This was great as I had the chance to benefit from others’ experiences, and the
    learning curve got a little easier. After a while, the team started to adopt really
    advanced ideas and it soon became apparent that there was another wall to get
    past. We started to talk about much deeper application concerns and whether we
    could solve these functionally.


    My point here is that, for teams not used to it, heavyweight functional programming
    ideas can be pretty exotic. Even in industry, I think it’s fair to say that there
    are very few teams fully embracing this style.


    I don’t feel like, collectively, we can say if this extreme is helping to solve
    real-world business problems or not. It’s just another way of doing things. It
    does represent a very different approach to building software from the mainstream,
    and for us it was perhaps a little too much. It caused a bit of a divide in the
    team where some people were comfortable experimenting with this approach and others
    weren’t.


    # 21. What to Expect


    ## The Learning Curve


    If you’ve just started to learn Scala and are wondering what to expect, it’s typical
    to experience a quick ramp-up in skill followed by a slower adoption of the more
    sophisticated features. In this chapter, I talk about what I think of as a typical
    learning curve.


    Based on my experiences and talking to various Scala teams, we can chart a typical
    Scala learning curve as shown in Figure [21-1](#A456960_1_En_21_Chapter.html#Fig1),
    with experience (or time) on the `x` axis and some measure of “learning” on the
    `y`.


    ![A456960_1_En_21_Fig1_HTML.jpg](A456960_1_En_21_Fig1_HTML.jpg)


    Figure 21-1


    Typical Scala adoption as a learning curve


    ### Milestone 1: OO in Scala


    When you first start, you can expect getting up to speed with the language to
    be a fairly steep incline.


    “Steep” but also “short”. It’s not difficult to get to the first plateau, so you
    can expect a relatively quick increment in learning.


    You’ll probably sit here for a bit applying what you’ve learnt. I see this as
    the first milestone: to be able to build object-oriented or imperative applications
    using language-specific constructs and features, but without necessarily adopting
    functional programming. It’s just like learning any other language in the Java/C
    family.


    ### Milestone 2: FP in the Small, OO in the Large


    The next milestone involves adopting functional programming techniques.


    This is a much more challenging step, and likely to be a shallower curve. Typically,
    this will involve using traditional architecture design but implementing functional
    programming techniques in the small. You can think of this approach as “functional
    in the small, OO in the large.” Starting to embrace a new functional way of thinking
    and unlearning some of the traditional techniques can be hard, hence the shallower
    incline.


    Concrete examples here are more than just language syntax: things like higher-order
    and pure functions, referential transparency, immutability, and side effect–free,
    more declarative coding; all the things that are typically offered by pure functional
    languages. The key thing here is that they’re applied in small, isolated areas.


    ### Milestone 3: FP in the Large


    The next challenge is working towards a more cohesive functional design; this
    really means adopting a functional style at a system level; architecting the entire
    application as functions and abandoning object-oriented style completely. So,
    aiming for something like a Haskell application.


    All the concrete functional programming mechanisms mentioned here apply, but this
    time throughout the system; not to isolated areas but lifted to application-wide
    concerns. Picking up advanced libraries like `Scalaz` goes hand-in-hand with this
    part of the curve.


    ## The Learning Continuum


    You can also think of adoption of Scala as more of a continuum, with traditional
    imperative programming on the left and pure functional programming on the right
    (see Figure [21-2](#A456960_1_En_21_Chapter.html#Fig2)).


    ![A456960_1_En_21_Fig2_HTML.jpg](A456960_1_En_21_Fig2_HTML.jpg)


    Figure 21-2


    Imperative (Java) to pure functional programming (Haskell) continuum


    You can think of the far right as Haskell on the JVM. Haskell is a pure functional
    language so you don’t have any choice but to design your app in a functional way.
    Scala is an object-oriented/functional hybrid; it can only give you the tools.
    It can’t enforce functional programming; you need discipline and experience in
    Scala to avoid, for example, mutating state, whereas Haskell will actually stop
    you.


    As you start out on the continuum using Java and move to the right, libraries
    like `Functional Java`,[¹](#A456960_1_En_21_Chapter.html#Fn18) `Totally Lazy`,[²](#A456960_1_En_21_Chapter.html#Fn19)
    and even Java 8 features[³](#A456960_1_En_21_Chapter.html#Fn20) will help you
    adopt a more functional style. There comes a point where a language switch helps
    even more. Functional idioms become a language feature rather than a library feature.
    The syntactical sugar of `for` comprehensions are a good example.


    As you carry on, using libraries like `Scalaz`[⁴](#A456960_1_En_21_Chapter.html#Fn21)
    makes it easier to progress towards pure functional programming, but remember
    that reaching the far right, or the top-right quadrant of the learning curve,
    isn’t the goal in and of itself. There are plenty of teams operating effectively
    across the continuum.


    When you’re adopting Scala, make a deliberate decision about where you want to
    be on the continuum, be clear about why, and use my learning curve as a way to
    gauge your progress.'
