- fmt: '# Derived Setters and Getters


    The `val` keyword on the class definition tells the compiler to treat the arguments
    as fields. It will create the fields and accessor methods for them.


    We can prove this by taking the generated class file and decompiling it into Java.
    Round-tripping like this is a great way to explore what Scala actually produces
    behind the scenes. I’ve used the excellent CFR decompiler[¹](#A456960_1_En_8_Chapter.html#Fn8)
    by Lee Benfield here, but you could also use the `javap` program that ships with
    Java to get the basic information.


    To run the decompiler on the Scala generated class file for `Customer`, you do
    something like the following:


    ```

    java -jar cfr_0_122.jar target/scala-2.12/classes/s4j/scala/chapter09/Customer.class

    ```


    It produces the following:


    ```

    1   // decompiled from scala to java

    2   public class Customer {

    3       private final String name;

    4       private final String address;


    6       public String name() {

    7           return this.name;

    8       }


    10       public String address() {

    11           return this.address;

    12       }


    14       public Customer(String name, String address) {

    15           this.name = name;

    16           this.address = address;

    17       }

    18   }

    ```


    What’s important to notice is that Scala has generated accessor methods at lines
    6 and 10, and a constructor at line 14. The accessors aren’t using the Java getter
    convention, but we’ve got the equivalent of `getName` and `getAddress`.


    You might also want to define fields but not have them set via the constructor.
    For example, in Java, we might want to add an `id` to the customer to be set later
    with a setter method. This is a common pattern for tools like Hibernate when populating
    an object from the database.


    ```

    // java

    public class Customer {

    private final String name;

    private final String address;

    private String id;

    public Customer(String name, String address) {

    this.name = name;

    this.address = address;

    }

    public void setId(String id) {

    this.id = id;

    }

    }

    ```


    In Scala, you do pretty much the same thing.


    ```

    // scala

    class Customer(val name: String, val address: String) {

    var id = ""

    }

    ```


    You define a field, in this case a `var`, and magically Scala will create a setter
    method for you. The setter method it creates is called `id_=` rather than the
    usual `setId`. If we round-trip this through the decompiler, we see the following:


    ```

    1   // decompiled from scala to java

    2   public class Customer {

    3       private final String name;

    4       private final String address;

    5       private String id;


    7       public String name() {

    8           return this.name;

    9       }

    10       public String address() {

    11           return this.address;

    12       }

    13       public String id() {                      // notice it''s public

    14           return this.id;

    15       }

    16       public void id_$eq(String x$1) {          // notice it''s public

    17           this.id = x$1;

    18       }

    19       public Customer(String name, String address) {

    20           this.name = name;

    21           this.address = address;

    22           this.id = null;

    23       }

    24   }

    ```


    Notice it has created a method called `id_$eq` on line 16 rather than `id_=`;
    that’s because the equals symbol isn’t allowed in a method name on the JVM, so
    Scala has escaped it and will translate it as required. You can call the setter
    method directly like this:


    ```

    new Customer("Bob", "10 Downing Street").id_=("000001")

    ```


    Scala offers a shorthand; however, you can just use regular assignment and Scala
    will call the auto-generated `id_$eq` setter method under the covers:


    ```

    new Customer("Bob", "10 Downing Street").id = "000001"

    ```


    If there are no access modifiers in front of a field, the field becomes public.
    So, as well as being able to call the auto-generated setter, clients could also
    work directly on the field, potentially breaking encapsulation. We’d like to be
    able to make the field private and allow updates only from within the `Customer`
    class.


    To do this, just use the `private` keyword with the field.


    ```

    class Customer(val name: String, val address: String) {

    private var id = ""

    }

    ```


    The decompiler shows that the setter and getter methods are now private.


    ```

    1   // decompiled from scala to java

    2   public class Customer {

    3       private final String name;

    4       private final String address;

    5       private String id;


    7       public String name() {

    8           return this.name;

    9       }


    11       public String address() {

    12           return this.address;

    13       }


    15       private String id() {                 // now it''s private

    16           return this.id;

    17       }


    19       private void id_$eq(String x$1) {     // now it''s private

    20           this.id = x$1;

    21       }


    23       public Customer(String name, String address) {

    24           this.name = name;

    25           this.address = address;

    26           this.id = "";

    27       }

    28   }

    ```'
