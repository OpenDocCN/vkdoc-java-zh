- fmt: '# Working with Methods


    **Generics.** There’s better support for generic type covariance and contravariance
    in Scala than Java. This means that you can be more general and more flexible
    in your method signatures when generic types are used as arguments. Don’t worry
    about the specifics just yet, there’s a whole section on variance later.


    **Variance In-Brief**


    Covariance of generic types means that, if the generic parameter of a type (the
    bit in brackets like `<T>`) is a subtype of something, then the generic type itself
    is also a subtype of another generic type when that type’s parameter is the super-type.
    For example, a `List<Cat>` would also be (subtype of) a `List<Animal>` assuming
    `Cat extends Animal`. Contravariance also preserves the relationship but this
    time in reverse. Java doesn’t support type variance like this but does support
    covariant return types. Method arguments and variables can also be covariant or
    contravariant in both Scala and Java.


    **Variable arguments.** When working with methods, Scala supports variable arguments
    or `varargs` just like Java.


    ```

    public void add(String... names)   // java

    def add(names: String*)            // scala

    ```


    **Named method arguments.** Something Java doesn’t offer is named method arguments.
    In Scala, you can call a method with its arguments out of order, as long as you
    name them. So, given the function `def swap(first: Int, second: Int)`, you can
    call it explicitly, naming its arguments. Because they’re named, the compiler
    can work out which is which regardless of their position. So, the following is
    fine:


    ```

    swap(first = 3, second = 1)

    swap(second = 1, first = 3)

    ```


    **Default values.** You can add a default value by using `=` after the parameter
    declaration. For example, `def swap(first: Int, second: Int = 1)`. The second
    value will default to `1` if you leave it off when you call the function. You
    can still supply a value to override the default, and still use named parameters.


    ```

    swap(3)

    swap(3, 2)

    swap(first = 3)

    swap(first = 3, second = 1)

    ```


    **Function literals.** A function literal is just an expression that creates an
    unnamed function. You can store these as variables, pass them around, or pass
    them into methods. Creating them on the fly means you can create succinct bits
    of functionality without the boilerplate. A functional literal is a way to refer
    to a lambda.


    **Lambdas.** Scala supports lambdas or anonymous functions. You can pass function
    literals as arguments to methods and use a function signature as an argument in
    a method signature. So, the `test` method that follows takes a function with no
    arguments, which returns a `Boolean`.


    ```

    def test(f: () => Boolean) = ...

    ```


    When you call it, you can pass in a function literal as a parameter.


    ```

    test(() => if (!tuesday) true else false)

    ```


    As another example, you can create a function signature to represent a function
    from a `String` value to a `Boolean` like this:


    ```

    def test(f: String => Boolean): Boolean = ...

    ```


    …and call it with a function literal like this:


    ```

    test(value => if (value == "tuesday") true else false)

    ```


    # Functional Programming


    There are some other Scala features aimed more at functional programming.


    **Pattern matching.** This is a hugely powerful feature, which at first blush
    looks similar to switches but can be used for much more.


    **For comprehensions.** These are subtly different from regular `for` loops, and
    are useful when working with functional constructs. When you first encounter them,
    they’ll look like an alternative syntax to Java’s `for` loop.


    **Currying.** Although you can write your own currying functions in any language,
    Scala supports currying as a language feature. If you’re unsure what currying
    is, you don’t need to worry about it right now. See the currying section for more
    details.


    **Functional literals.** The language supports literals to represent some useful
    types like tuples. Popular Java functional libraries like totally-lazy[¹](#A456960_1_En_6_Chapter.html#Fn6)
    or functional-java[²](#A456960_1_En_6_Chapter.html#Fn7) have these kinds of things;
    Scala just makes them easier to work with.


    **Recursion.** Most languages support recursion, but Scala has compiler support
    for tail call optimization, which means it can support recursive calls that would
    result in a stack overflow in languages like Java. The compiler can even perform
    some checks for you if you use the `@tailrec` annotation.


    **Footnotes**


    [1](#A456960_1_En_6_Chapter.html#Fn6_source) [`http://totallylazy.com/`](http://totallylazy.com/)


    [2](#A456960_1_En_6_Chapter.html#Fn7_source) [`http://www.functionaljava.org/`](http://www.functionaljava.org/)


    # 7. Summary


    In this high-level tour, we talked about how Scala is both an OO language and
    a functional language. I mentioned that Scala in fact only has objects; there
    are no primitives, everything is an object.


    We talked about Scala’s background, how it grew from an academic language to a
    commercially backed mainstream language, and how it runs on the JVM. This, in
    theory, lowers the barrier of adoption by making it easy to deploy to existing
    servers.


    Running on the JVM also means there are plenty of libraries available to Scala,
    as Java interoperability is baked in. Despite some of the tools being behind and
    compilation time still being slow, Scala has been widely adopted and we see numerous
    big companies using it today.


    We had a look at installing and running Scala. You saw the three ways Scala programs
    are typically run, and along the way were introduced to the Scala REPL.


    We then moved on to a syntax tour and looked at some interesting language features.


    In the syntax tour, we saw how to define variables and values, functions and methods,
    and saw how Scala reduces the boilerplate noise by inferring types and recognizing
    terminating conditions like `return` and semicolons automatically.


    We saw how infix notation means you can avoid the classical dot notation and,
    importantly, we saw that method names can contain symbols. That’s how we’re able
    to use mathematical symbols naturally in code; they’re actually methods, so we
    can override them and, using the infix notation, use them without the noisy dots
    and brackets.


    We also worked with some collection types and saw a couple of basic ways to enumerate
    them: the `foreach` and `for` loop syntax. We saw how easy it is to work with
    Java objects; value types like `Int` and `Boolean` are basically the same in Scala
    and Java. We had a good look at how Scala represents types in its class hierarchy,
    and learnt how to look things up in the ScalaDoc.


    In terms of language features, we looked at some interesting aspects of the language
    when working with source files and packages, methods and method arguments, as
    well as some features geared up for functional programming.


    # Part II: Key Syntactical Differences


    This part of the book is about the key differences between Java and Scala language
    syntax. Given some typical Java code, we’ll look at equivalent Scala syntax. In
    Part III, we’ll look more at Scala features for which there is no direct equivalent
    in Java.


    We’re going to look at the following:


    - Lots of things around classes and objects, creating classes, fields, and methods.
    We’ll do some round-tripping from Scala-generated bytecode back to Java, so that
    you can get a feel for how Scala relates to Java.

    - Inheritance, interfaces, abstract classes, and mixins.

    - Common control structures like `for` loops.

    - Generics.'
