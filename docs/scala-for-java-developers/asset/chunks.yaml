    \ for its arguments. We had to do the same thing in Java when we called `super`\
    \ in the new constructor.\n\nScala has a primary constructor and auxiliary constructors.\
    \ Auxiliary constructors must be chained to eventually call the primary constructor\
    \ and in Scala, only the primary constructor can call the super-class constructor.\
    \ We can add arguments to the primary constructor like this:\n\n```scala\nclass\
    \ DiscountedCustomer(name: String, address: String) extends Customer\n```\n\n\
    But we can’t call `super` directly like we can in Java.\n\n```scala\nclass DiscountedCustomer(name:\
    \ String, address: String) extends Customer {\n    super(name, address)      \
    \                  // compiler error\n}\n```\n\nIn Scala, to call the super-class\
    \ constructor you pass the arguments from the primary constructor to the super-class.\
    \ Notice that the arguments to `DiscountedCustomer` aren’t set as `val`. They’re\
    \ not fields; instead, they’re locally scoped to the primary constructor and passed\
    \ directly to the super-class, like this:\n\n```scala\nclass DiscountedCustomer(name:\
    \ String, address: String)\n    extends Customer(name, address)\n```\n\nFinally,\
    \ we can implement the discounted `total` method in the subclass.\n\n```scala\n\
