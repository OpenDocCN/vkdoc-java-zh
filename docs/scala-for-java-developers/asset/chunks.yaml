- fmt: "### Stack Example\n\nAs a slightly more expanded example, in Java, we could\
    \ generalize a `Stack` class. We could create an interface `Stack` with a generic\
    \ type `T` and ensure that the `push` method takes a `T` and the `pop` method\
    \ returns a `T`.\n\n```java\npublic interface Stack {\n    void push(T t);\n \
    \   T pop();\n}\n```\n\nIn Scala:\n\n```scala\ntrait Stack[T] {\n    def push(t:\
    \ T)\n    def pop: T\n}\n```\n\nFor demonstration purposes, we could implement\
    \ `Stack` using a list in Java like this:\n\n```java\npublic class ListStack implements\
    \ Stack {\n    private final List elements = new ArrayList();\n    @Override\n\
    \    public void push(T t) {\n        elements.add(0, t);\n    }\n    @Override\n\
    \    public T pop() {\n        if (elements.isEmpty())\n            throw new\
    \ IndexOutOfBoundsException();\n        return elements.remove(0);\n    }\n}\n\
    ```\n\nWe “bind” a concrete type to the generic type when we supply the compiler\
    \ with a concrete type. Adding `String` to the following declaration (on line\
    \ 3) “binds” what was the generic type `T` to `String`. The compiler knows to\
    \ replace `T` with `String` and we can start using strings as arguments and return\
    \ types. If we try to add a number to the stack in our example, we’d get a compiler\
    \ error.\n\n```java\n1   // java\n2   public static void main(String... args)\
    \ {\n3       Stack stack = new ListStack();\n4       stack.push(\"C\");\n5   \
    \    stack.push(\"B\");\n6       stack.push(\"A\");\n7       stack.push(12); \
    \                        // compilation failure\n8       String element = stack.pop();\n\
    9   }\n```\n\nCreating the `ListStack` in Scala is straightforward. It would look\
    \ something like this:\n\n```scala\nclass ListStack[T] extends Stack[T] {\n  \
    \  private var elements: List[T] = List()\n    override def push(t: T): Unit =\
    \ {\n        elements = t +: elements\n    }\n    override def pop: T = {\n  \
    \      if (elements.isEmpty) throw new IndexOutOfBoundsException\n        val\
    \ head = elements.head\n        elements = elements.tail\n        head\n    }\n\
    }\n```\n\nWe still use a `List` to store the elements but because Scala’s `List`\
    \ is immutable, in the `push` method, we replace the instance with a new list\
    \ with the element prepended.\n\nSimilarly, when we `pop`, we have to replace\
    \ the elements with all but the first element using the `tail` method. We get\
    \ and return the first element using the `head` method. You’ll come across the\
    \ idea of head (the first) and tail (the remainder) a lot in Scala and functional\
    \ programming.\n\nBinding to a concrete type is just the same. In the following\
    \ example, I’m not declaring the `stack` variable with a type, so we need to give\
    \ the compiler a hint about what kind of `List` it will be by adding the parameterized\
    \ type on line 3.\n\n```scala\n1   // scala\n2   def main(args: String*) {\n3\
    \       val stack = new ListStack[String]\n4       stack.push(\"C\")\n5      \
