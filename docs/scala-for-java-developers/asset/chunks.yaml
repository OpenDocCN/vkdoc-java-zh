  raw: '### Ifs and Ternaries


    Conditionals are straightforward.


    ```

    // java

    if (age > 55) {

    retire();

    } else {

    carryOnWorking();

    }

    ```


    An `if` in Java looks exactly the same in Scala.


    ```

    // scala

    if (age > 55) {

    retire()

    } else {

    carryOnWorking()

    }

    ```


    You’ll often find Scala developers dropping the braces for simple `if` blocks.
    For example:


    ```

    if (age > 55)

    retire()

    else

    carryOnWorking()

    ```


    …or even pulling it all onto one line.


    ```

    if (age > 55) retire() else carryOnWorking()

    ```


    This style is favored because if/else is actually an expression in Scala and not
    a statement, and the more concise syntax makes it look more like an expression.
    What’s the difference? Well, an expression returns a value whereas a statement
    carries out an action.


    Expressions vs. Statements


    An expression returns a value whereas a statement carries out an action. Statements
    by their nature often have side effects whereas expressions are less likely to
    do so.


    For example, let’s add a creation method to our `Customer` class that will create
    either a `DiscountedCustomer` or a regular `Customer` based on how long they’ve
    been a customer.


    ```

    // java

    public static Customer create(String name, String address,

    Integer yearsOfCustom) {

    if (yearsOfCustom > 2) {

    return new DiscountedCustomer(name, address);

    } else {

    return new Customer(name, address);

    }

    }

    ```


    In Java, we’re forced to return the new `Customer` from the method. The conditions
    are statements, things that execute, not expressions that return values. We could
    do it longhand and create a variable, set then return it, but the point is the
    same; the statements here have to cause a side effect.


    ```

    public static Customer create(String name, String address,

    Integer yearsOfCustom) {

    Customer customer = null;

    if (yearsOfCustom > 2) {

    customer = new DiscountedCustomer(name, address);

    } else {

    customer = new Customer(name, address);

    }

    return customer;

    }

    ```


    Because conditionals in Scala are expressions, you don’t need to jump through
    these hoops. In the Scala equivalent, we can just create the `if` and both branches
    will return a customer. As the entire expression is the last statement in the
    method, it is what will be returned from the method.


    ```

    // scala

    object Customer {

    def create(name: String, address: String, yearsOfCustom: Int) = {

    if (yearsOfCustom > 2)

    new DiscountedCustomer(name, address)

    else

    new Customer(name, address)

    }

    }

    ```


    Longhand, we can assign the result of the `if` (remember it’s an expression not
    a statement) to a `val` and then return the value on the last line.


    ```

    object Customer {

    def create(name: String, address: String, yearsOfCustom: Int) = {

    val customer = if (yearsOfCustom > 2)

    new DiscountedCustomer(name, address)

    else

    new Customer(name, address)

    customer

    }

    }

    ```


    Another trivial example might be something like this:


    ```

    val tall = if (height > 190) "tall" else "not tall"     // scala

    ```


    You may have noticed this behaves like a ternary expression in Java.


    ```

    String tall = height > 190 ? "tall" : "not tall";       // java

    ```


    So, ternaries are expressions in Java but `if` statements are not. Scala has no
    conditional operator (`?:`) because a regular Scala `if` is an expression; it’s
    equivalent to Java’s conditional operator. In fact, the bytecode generated for
    an `if` uses a ternary.


    You don’t have to use an `if` in Scala like a ternary and assign it to anything,
    but it’s important to realize that it is an expression and has a value. In fact,
    everything in Scala is an expression. Even a simple block (denoted with curly
    braces) will return something.


    ### Switch Statements


    There are no switch statements as such in Scala. Scala uses match expressions
    instead. These look like they’re switching but differ in that the whole thing
    is an expression and not a statement. So, as we saw with the `if`, Scala’s switch-like
    construct has a value. It also uses something called pattern matching , which
    is a lot more powerful as it allows you to select on more than just equality.


    In Java, you might write a switch to work out which quarter a particular month
    falls in. So, January, February, and March are in the first quarter, April, May,
    and June in the second, and so on.


    ```

    // java

    public class Switch {

    public static void main(String... args) {

    String month = "August";

    String quarter;

    switch (month) {

    case "January":

    case "February":

    case "March":

    quarter = "1st quarter";

    break;

    case "April":

    case "May":

    case "June":

    quarter = "2nd quarter";

    break;

    case "July":

    case "August":

    case "September":

    quarter = "3rd quarter";

    break;

    case "October":

    case "November":

    case "December":

    quarter = "4th quarter";

    break;

    default:

    quarter = "unknown quarter";

    break;

    }

    System.out.println(quarter);

    }

    }

    ```


    The `break` is required to stop the statement execution falling through. When
    Java selects a case, it has to have a side effect to be useful. In this case,
    it assigns a value to a variable.


    In Scala, we’d start with something like this:


    ```

    // scala

    object BrokenSwitch extends App {

    val month = "August"

    var quarter = "???"

    month match {

    case "January"   =>

    case "February"  =>

    case "March"     => quarter = "1st quarter"

    case "April"     =>

    case "May"       =>

    case "June"      => quarter = "2nd quarter"

    case "July"      =>

    case "August"    =>

    case "September" => quarter = "3rd quarter"

    case "October"   =>

    case "November"  =>

    case "December"  => quarter = "4th quarter"

    case _           => quarter = "unknown quarter"

    }

    println(month + " is " + quarter)

    }

    ```


    The above is a direct syntactic translation. However, Scala doesn’t support the
    `break` keyword so we have to leave that out. Rather than `switch` we use `match`
    and we’re saying "does the `month` match any of these case clauses?"


    Rather than the colon, we use `=>` and the underscore at the bottom is the catch-all,
    the same as `default` in Java. Underscore is often used in Scala to mean an unknown
    value.


    So, although this is a direct translation, when we run it, something has gone
    wrong. The result hasn’t been set.


    The output says:


    ```

    August is ???

    ```


    Unlike Java, if a case matches, the break is implicit—there is no fall-through
    to the next case. So, we’ll have to add some code to the empty blocks.


    ```

    // scala

    object Switch extends App {

    val month = "August"

    var quarter = "???"

    month match {

    case "January"   => quarter = "1st quarter"

    case "February"  => quarter = "1st quarter"

    case "March"     => quarter = "1st quarter"

    case "April"     => quarter = "2nd quarter"

    case "May"       => quarter = "2nd quarter"

    case "June"      => quarter = "2nd quarter"

    case "July"      => quarter = "3nd quarter"

    case "August"    => quarter = "3rd quarter"

    case "September" => quarter = "3rd quarter"

    case "October"   => quarter = "4th quarter"

    case "November"  => quarter = "4th quarter"

    case "December"  => quarter = "4th quarter"

    case _           => quarter = "unknown quarter"

    }

    println(month + " is " + quarter)

    }

    ```


    This time it works but we’ve duplicated a fair bit.


    To remove some of the duplication, we can combine January, February, and March
    onto one line, separating them with an `or`. This means that the month can match
    either January, February, or March. In all of these cases, what follows the `=>`
    will be executed.


    ```

    case "January" | "February" | "March" => quarter = "1st quarter"

    ```


