  trans: '

    ## 避免投入不足


    在我开始认真研究 Scala 之前，我已经使用 Java 开发了十多年。我的第一次尝试只是浅尝辄止。团队自然持怀疑态度，因此我们决定将现有代码库的一部分划分出来尝试
    Scala。我们将测试代码转换为 Scala，而主线开发仍保留在 Java 中。


    事后看来，这是一个糟糕的主意。由于只处理测试代码，缺乏足够的规模或动力来推动改进。我们在测试代码中解决的问题类型已经相当成熟，现有的测试框架（如 JUnit）已经为我们解决了大部分问题。


    似乎没有太多空间来真正使用语言特性。我们基本上只是用另一个恰好是 Scala 的测试框架重写了测试。我们几乎什么也没学到，最终将所有内容都回退到了 Java。这完全是浪费时间和精力。


    我从中学到的一点是，要探索一门新语言，你需要解决真正的问题：设计问题、领域问题、业务问题。将代码库的一部分划分出来会限制你能探索的问题类型，从而限制你的学习。


    ## 避免用力过猛


    下一次我有机会尝试 Scala 时，我走向了另一个极端。我直接跳入深水区，完全使用 Scala 进行开发，并极力尝试采用函数式编程、新模式、新架构设计……凡是与
    Scala 相关的，我几乎都尝试了。


    我之前没有做过太多函数式编程，所以很快就碰壁了。我面对的是完全陌生的概念和思想。我挣扎着，因为我试图在太短的时间内学习太多东西：新的框架、库和技术，以及一门新语言。我还没学会走就想跑。


    我花了一段时间才意识到，尽管我是一名经验丰富的开发者，但在 Scala 和函数式编程方面，我实际上是个新手。我没有认识到这一点，事后看来，承诺以这种方式构建软件是不负责任的。我因专业知识而被聘用，却给自己设置了障碍，无法运用这些专业知识。


    ## 纯函数式编程是王道？


    后来，我有幸与一些经验丰富的开发者共事，他们都精通函数式编程，且大多有 Haskell 背景。这很棒，因为我得以从他人的经验中受益，学习曲线也稍微平缓了一些。过了一段时间，团队开始采用非常高级的理念，很快我们就发现还有另一道坎要过。我们开始讨论更深层次的应用问题，以及是否能用函数式方法解决这些问题。


    我在这里想说的是，对于不习惯函数式编程的团队来说，重量级的函数式编程理念可能相当陌生。即使在业界，我认为公平地说，完全拥抱这种风格的团队也寥寥无几。


    我觉得，我们整体上还无法判断这种极端方式是否有助于解决现实世界的业务问题。它只是另一种做事方式。它确实代表了一种与主流截然不同的构建软件的方法，对我们来说，这可能有点过头了。它在团队中造成了一些分歧，有些人乐于尝试这种方法，而另一些人则不然。


    # 21. 可以期待什么


    ## 学习曲线


    如果你刚开始学习 Scala，并想知道可以期待什么，典型的体验是技能快速提升，随后对更复杂特性的掌握会慢下来。在本章中，我将讨论我认为典型的学习曲线。


    根据我的经验以及与多个 Scala 团队的交流，我们可以绘制出一条典型的 Scala 学习曲线，如图 21-1 所示，其中 `x` 轴代表经验（或时间），`y`
    轴代表某种“学习”度量。


    ![A456960_1_En_21_Fig1_HTML.jpg](img/A456960_1_En_21_Fig1_HTML.jpg)


    图 21-1


    典型的 Scala 采用学习曲线


    ### 里程碑 1：Scala 中的面向对象编程


    刚开始时，你可以预期语言的学习曲线会相当陡峭。


    “陡峭”但也“短暂”。达到第一个平台期并不困难，因此你可以预期学习会有相对较快的增长。


    你可能会在这个阶段停留一段时间，应用你所学到的东西。我认为这是第一个里程碑：能够使用语言特定的结构和特性构建面向对象或命令式应用程序，但不一定采用函数式编程。这就像学习
    Java/C 家族中的任何其他语言一样。


    ### 里程碑 2：小范围函数式编程，大范围面向对象编程


    下一个里程碑涉及采用函数式编程技术。


    这是一个更具挑战性的步骤，曲线可能会更平缓。通常，这涉及使用传统的架构设计，但在小范围内实现函数式编程技术。你可以将这种方法视为“小范围函数式，大范围面向对象”。开始接受一种新的函数式思维方式，并摒弃一些传统技术，可能很困难，因此曲线更平缓。


    这里的具体例子不仅仅是语言语法：比如高阶函数和纯函数、引用透明性、不可变性、无副作用、更具声明性的编码；这些都是纯函数式语言通常提供的特性。关键在于，它们被应用于小而孤立的区域。


    ### 里程碑 3：大范围函数式编程


    下一个挑战是朝着更具凝聚力的函数式设计努力；这实际上意味着在系统级别采用函数式风格；将整个应用程序架构为函数，并完全放弃面向对象风格。因此，目标是构建类似
    Haskell 的应用程序。


    这里提到的所有具体函数式编程机制都适用，但这次是贯穿整个系统；不是应用于孤立区域，而是提升到应用程序级别的关注点。采用像 Scalaz 这样的高级库与曲线这一部分密切相关。


    ## 学习连续体


    你也可以将 Scala 的采用视为一个连续体，左侧是传统的命令式编程，右侧是纯函数式编程（见图 21-2）。


    ![A456960_1_En_21_Fig2_HTML.jpg](img/A456960_1_En_21_Fig2_HTML.jpg)


    图 21-2


    命令式（Java）到纯函数式编程（Haskell）连续体


    你可以将最右侧视为 JVM 上的 Haskell。Haskell 是一种纯函数式语言，因此你别无选择，只能以函数式方式设计应用程序。Scala 是一种面向对象/函数式混合语言；它只能为你提供工具。它不能强制进行函数式编程；你需要纪律和
    Scala 经验来避免，例如，改变状态，而 Haskell 实际上会阻止你。


    当你从使用 Java 开始沿着连续体向右移动时，像 Functional Java、¹ Totally Lazy、² 甚至 Java 8 特性³ 这样的库将帮助你采用更具函数式的风格。到了某个点，切换语言会更有帮助。函数式惯用法成为语言特性而非库特性。`for`
    推导式的语法糖就是一个很好的例子。


    随着你继续前进，使用像 Scalaz⁴ 这样的库可以更容易地向纯函数式编程迈进，但请记住，达到最右侧，或学习曲线的右上象限，本身并不是目标。有许多团队在整个连续体上高效运作。


    当你采用 Scala 时，要深思熟虑地决定你想在连续体上处于什么位置，明确原因，并使用我的学习曲线来衡量你的进展。

