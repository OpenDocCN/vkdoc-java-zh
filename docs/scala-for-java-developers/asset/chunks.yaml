  raw: '### Goals


    Reaching the purely functional milestone is going to be difficult. It may not
    even be the right thing to do for your team. A purely functional system isn’t
    necessarily better; I suggest that most Java teams trying to adopt Scala should
    aim for somewhere between Milestones 1 and 2, somewhere towards the middle of
    the continuum.


    I think this is a good balance between seeing the benefits of the language and
    taking on too much. If you’re working in a commercial environment, you still have
    to deliver software. Remember that you’re potentially trading your experienced
    developers for novices as you move to the right. It may be better to balance your
    delivery commitments with your learning, since delivery risk goes up as you go
    to the right.


    Footnotes [1](#A456960_1_En_21_Chapter.html#Fn18_source)


    [`http://www.functionaljava.org/`](http://www.functionaljava.org/)


      [2](#A456960_1_En_21_Chapter.html#Fn19_source)


    [`https://code.google.com/p/totallylazy/`](https://code.google.com/p/totallylazy/)


      [3](#A456960_1_En_21_Chapter.html#Fn20_source)


    [`https://leanpub.com/whatsnewjava8`](https://leanpub.com/whatsnewjava8)


      [4](#A456960_1_En_21_Chapter.html#Fn21_source)


