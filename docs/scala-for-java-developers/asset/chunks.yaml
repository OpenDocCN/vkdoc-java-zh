    \ objects. Value types are all predefined and can be referred to by literals.\
    \ They are usually allocated on the stack, but are allocated on the heap in Scala.\n\
    \nAll other types in Scala are known as reference types. Reference types are objects\
    \ in memory (the heap), as opposed to pointer types in C-like languages, which\
