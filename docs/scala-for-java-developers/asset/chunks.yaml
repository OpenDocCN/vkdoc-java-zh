    ## Why The Getter?


    You might be wondering why we created the getter method `def id()`. Scala won’t
    allow us to use the shorthand assignment syntax to set a value unless the class
    has both the setter (`id_=`) and getter methods defined.


    Redefining setters and getters is fairly common in Java but, in practice, is less
    so in Scala. Although this section may seem a bit academic, if you do try to redefine
    these methods in Scala and encounter unexpected compiler errors, you’ll at least
    understand why.


    ## Summary


    Creating classes is straightforward with Scala. You can add fields to the class
    simply by adding parameters to the class definition, and the equivalent Java constructor,
    getters, and setters are generated for you by the compiler.


    All fields in the class file are generated as private but have associated accessor
    methods generated. These generated methods are affected by the presence of `val`
    or `var` in the class definition.


    *   If `val` is used, a public getter is created but no setter is created. The
    value can only be set by the constructor.

    *   If `var` is used, a public getter and setter are created. The value can be
    set via the setter or the constructor.

    *   If neither `val` or `var` is used, no methods are generated and the value
    can only be used within the scope of the primary constructor; it’s not really
    a field in this case.

    *   Prefixing the class definition with `private` won’t change these rules, but
    it will make any generated methods private.


    This is summarized in Table [8-1](#A456960_1_En_8_Chapter.html#Tab1).


    **Table 8-1** Generated methods


    | `class Foo(? x)` | `val x` | `var x` | `x` | `private val x` | `private var
    x` |

    | --- | --- | --- | --- | --- | --- |

    | Getter created (`x()`) | Y (`public`) | Y (`public`) | N | Y (`private`) | Y
    (`private`) |

    | Setter created (`x_=(y)`) | N | Y (`public`) | N | N | Y (`private`) |

    | Generated constructor includes `x` | Y | Y | N | Y | Y |


    If you need to override the generated methods, you have to rename the field and
    mark it as private. You then recreate the getter and setter methods with the original
    name. In practice, it’s not something you’ll have to do very often.


    **Footnotes**


    [1](#A456960_1_En_8_Chapter.html#Fn8_source) [`http://www.benf.org/other/cfr/`](http://www.benf.org/other/cfr/)


    # 9. Classes and Objects


    In this chapter we’ll look at the following:


    *   How you can define fields within the class body rather than on the class definition
    line and how this affects the generated methods.

    *   How you create additional constructors.

    *   Scala’s singleton objects defined with the `object` keyword.

    *   Companion objects, a special type of singleton object.'
