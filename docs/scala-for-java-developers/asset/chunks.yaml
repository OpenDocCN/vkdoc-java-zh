    Footnotes [1](#A456960_1_En_1_PartFrontmatter.html#Fn1_source)


    [`http://amzn.to/1Aegnwj`](http://amzn.to/1Aegnwj)


    # 1. The Scala Language


    Scala is both a functional programming language and an object-oriented programming
    language. As a Java programmer, you’ll be comfortable with the object-oriented
    definition: Scala has classes, objects, inheritance, composition, polymorphism—all
    the things you’re used to in Java.


    In fact, Scala goes somewhat further than Java. There are no “non”-objects. Everything
    is an object, so there are no primitive types like `int` and no static methods
    or fields. Functions are objects and even values are objects.


    Scala can be accurately described as a functional programming language because
    it allows and promotes the use of techniques important in functional programming.
    It provides language level features for things like immutability and programming
    functions without side effects.


    Traditional functional programming languages like Lisp or Haskel only allow you
    to program using these techniques. These are often referred to as pure functional
    programming languages. Scala is not pure in this sense; it’s a hybrid. For example,
    you can still work with mutable data, leverage the language to work with immutable
    data, or do both. This is great for flexibility and easy adoption but not too
    great for consistency and uniformity of design.


    ## As a Functional Programming Language


    In general, functional programming languages support:


    1.  First-class and higher-order functions.  

    2.  Anonymous functions (lambdas).  

    3.  Pure functions and immutable data.  


    It can be argued that Java supports these characteristics and certainly Java has
    been trying to provide better support. However, any movement in this direction
    has felt like an after thought and has generally resulted in verbose syntax or
    tension with existing idioms and language APIs.


    It is unlikely that people will ever describe Java as a functional programming
    language despite it’s advancements. Partly because it’s clunky to use in this
    style and partly because of it’s long history as an object-oriented language.


    Scala on the other hand was designed as a functional programming language from
    day one. It has better language constructs and library support so it feels more
    natural when coding in a functional style. For example, it has keywords to define
    immutable values and the library collection classes are all immutable by default.


    ## The Past


    Scala started life in 2001 as a research project at EPFL in Switzerland. It was
    released publicly in 2004[¹](#A456960_1_En_1_Chapter.html#Fn2) after an internal
    release in 2003\. The project was headed by Martin Odersky, who’d previously worked
    on Java generics and the Java compiler for Sun Microsystems.


    It’s quite rare for an academic language to cross over into industry, but Odersky
    and others launched Typesafe Inc. (later renamed Lightbend Inc.), a commercial
    enterprise built around Scala. Since then, Scala has moved firmly into the mainstream
    as a development language.


    Scala offers a more concise syntax than Java but runs on the JVM. Running on the
    JVM should (in theory) mean an easy migration to production environments; if you
    already have the Oracle JVM installed in your production environment, it makes
    no difference if the bytecode was generated from the Java or Scala compiler.


    It also means that Scala has Java interoperability built in, which in turn means
    that Scala can use any Java library. One of Java’s strengths over its competitors
    was always the huge number of open source libraries and tools available. These
    are pretty much all available to Scala too. The Scala community has that same
    open source mentality, and so there’s a growing number of excellent Scala libraries
    out there.


    ## The Future


    Scala has definitely moved into the mainstream as a popular language. It has been
    adopted by lots of big companies including Twitter, eBay, Yahoo, HSBC, UBS, and
    Morgan Stanley, and it’s unlikely to fall out of favour anytime soon. If you’re
    nervous about using it in production, don’t be; it’s backed by an international
    organization and regularly scores well in popularity indexes.


    The tooling is still behind Java though. Powerful IDEs like IntelliJ’s IDEA and
    Eclipse make refactoring Java code straightforward but aren’t quite there yet
    for Scala. The same is true of compile times: Scala is a lot slower to compile
    than Java. These things will improve over time and, on balance, they’re not the
    biggest hindrances I encounter when developing.


    Scala’s future is tied to the future of the JVM and the JVM is still going strong.
    Various other functional languages are emerging however; Kotlin and Clojure in
    particular are interesting and may compete. If you’re not interested in JVM based
    languages but just the benefits of functional programming, Haskel and ELM are
    becoming more widely adopted in industry.


    Footnotes [1](#A456960_1_En_1_Chapter.html#Fn2_source)


    See Odersky, “A Brief History of Scala” on Artima and wikipedia for more background.


    # 2. Installing Scala


    ## Getting Started


    There are a couple of ways to get started with Scala .


    1.  Run Scala interactively with the interpreter.  

    2.  Run shorter programs as shell scripts.  

    3.  Compile programs with the `scalac` compiler.'
