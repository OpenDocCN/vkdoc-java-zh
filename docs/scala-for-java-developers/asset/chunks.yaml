    *   In Scala, a pattern match is an expression; it returns a value. Java switches
    must have side effects to be useful.

    *   We can switch on a wider variety of things with Scala, not just primitives,
    enums, and strings. We can switch on objects, and things, that fit a “pattern”
    of our own design. In the example, we’re using “or” to build a richer match condition.


    Pattern matching also gives us the following:


    *   The ability to guard the conditions of a match; using an `if`, we can enrich
    a case to match not only on the pattern (the part straight after the `case`) but
    also on some binary condition.

    *   Exceptions for failed matches; when a value doesn’t match anything at runtime,
    Scala will throw a `MatchError` exception letting us know.

    *   Optional compile-time checks: you can set it up so that if you forget to write
    a case to match all possible combinations, you’ll get a compiler warning. This
    is done using what’s called sealed traits .


    ## Patterns


    The anatomy of a match expression looks like this:


    ```

    value match {

    case pattern guard => expression

    ...

    case _             => default

    }

    ```


    We have a value, then the `match` keyword, followed by a series of match cases.
    The value can itself be an expression, a literal or even an object.


    Each case is made up of a pattern, optionally a guard condition, and the expression
    to evaluate on a successful match.


    You might add a default, catch-all pattern at the end. The underscore is our first
    example of an actual pattern. It’s the wildcard pattern and means “match on anything”.


    A pattern can be as follows:


    *   A wildcard match (`_`).

    *   A literal match, meaning equality, used for values such as `101` or `RED`.

    *   A constructor match, meaning that a value would match if it could have been
    created using a specific constructor.

    *   A deconstruction match, otherwise known as an extractor pattern.

    *   A match based on a specific type, known as a type query pattern.

    *   A pattern with alternatives (specified with `|`).


    Patterns can also include a variable name, which on matching will be available
    to the expression on the right-hand side. It’s what’s referred to as a variable
    ID in the language specification.


    There are some more which I’ve left off; if you’re interested see the Pattern
    Matching section of the Scala Language Specification.[¹](#A456960_1_En_16_Chapter.html#Fn15)


    ## Literal Matches


    A literal match is a match against any Scala literal. The following example uses
    a string literal and has similar semantics to a Java switch statement.


    ```

    val language = "French"

    value match {

    case "french" => println("Salut")

    case "French" => println("Bonjour")

    case "German" => println("Guten Tag")

    case _        => println("Hi")

    }

    ```


    The value must exactly match the literal in the case. In the example, the result
    will be to print “Bonjour” and not “Salut” as the match value has a capital `F`.
    The match is based on equality (`==`).'
