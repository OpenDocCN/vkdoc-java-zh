  raw: '### Stack Example


    As a slightly more expanded example, in Java, we could generalize a `Stack` class
    . We could create an interface `Stack` with a generic type `T` and ensure that
    the `push` method takes a `T` and the `pop` method returns a `T`.


    ```

    // java

    public interface Stack {

    void push(T t);

    T pop();

    }

    ```


    In Scala


    ```

    // scala

    trait Stack[T] {

    def push(t: T)

    def pop: T

    }

    ```


    For demonstration purposes, we could implement `Stack` using a list in Java like
    this:


    ```

    // java

    public class ListStack implements Stack {

    private final List elements = new ArrayList();

    @Override

    public void push(T t) {

    elements.add(0, t);

    }

    @Override

    public T pop() {

    if (elements.isEmpty())

    throw new IndexOutOfBoundsException();

    return elements.remove(0);

    }

    }

    ```


    We “bind” a concrete type to the generic type when we supply the compiler with
    a concrete type. Adding `String` to the following declaration (on line 3) “binds”
    what was the generic type `T` to `String`. The compiler knows to replace `T` with
    `String` and we can start using strings as arguments and return types. If we try
    to add a number to the stack in our example, we’d get a compiler error.


    ```

    1   // java

    2   public static void main(String... args) {

    3       Stack stack = new ListStack();

    4       stack.push("C");

    5       stack.push("B");

    6       stack.push("A");

    7       stack.push(12);                         // compilation failure

    8       String element = stack.pop();

    9   }

    ```


    Creating the `ListStack` in Scala is straightforward. It would look something
    like this:


    ```

    // scala

    class ListStack[T] extends Stack[T] {

    private var elements: List[T] = List()

    override def push(t: T): Unit = {

    elements = t +: elements

    }

    override def pop: T = {

    if (elements.isEmpty) throw new IndexOutOfBoundsException

    val head = elements.head

    elements = elements.tail

    head

    }

    }

    ```


    We still use a `List` to store the elements but because Scala’s `List` is immutable,
    in the `push` method, we replace the instance with a new list with the element
    prepended.


    Similarly, when we `pop`, we have to replace the elements with all but the first
    element using the `tail` method. We get and return the first element using the
    `head` method. You’ll come across the idea of head (the first) and tail (the remainder)
    a lot in Scala and functional programming.


    Binding to a concrete type is just the same. In the following example, I’m not
    declaring the `stack` variable with a type, so we need to give the compiler a
    hint about what kind of `List` it will be by adding the parameterized type on
    line 3.


    ```

    1   // scala

    2   def main(args: String*) {

    3       val stack = new ListStack[String]

    4       stack.push("C")

    5       stack.push("B")

    6       stack.push("A")

    7       val element: String = stack.pop

    8   }

    ```


    To demonstrate method-level generics, we could add a method to convert a `Stack`
    to an array. The thing to note here is that the generic is defined solely in terms
    of the method. `A` isn’t related to the generic type on the class definition.


    ```

    // java

    public interface Stack {

    static  A[] toArray(Stack stack) {

    throw new UnsupportedOperationException();

    }

    }

    ```


    You define method-level generics in Scala in just the same way. Below, `A` is
    defined purely in scope for the method.


    ```

    // scala

    object Stack {

    def toArray[A](a: Stack[A]): Array[A] = {

    ???

    }

    }

    ```


    ## Bounded Classes


    Let’s go back to the list example with a generic type of `Customer`.


    ```

    List customers = new ArrayList();         // java

    ```


    The contents of the list can be any `Customer` or subtype of `Customer`, so we
    can add a `DiscountedCustomer` to the list.


    ```

    List customers = new ArrayList();

    customers.add(new Customer("Bob Crispin", "15 Fleetwood Mack Road"));

    customers.add(new DiscountedCustomer("Derick Jonar", "23 Woodland Way"));

    ```


    Type erasure sees the collection as containing only `Object`s. The compiler will
    ensure that only things of the correct type go into the collection and use a cast
    on the way out. That means that anything you take out of our example can only
    be treated as a `Customer`.


    If all you’ve done is override `Customer` behavior in the `DiscountedCustomer`,
    you can treat the objects polymorphically and you wouldn’t see a problem. If you’ve
    added methods to `DiscountedCustomer`, however, you can’t call them without an
    unchecked cast.


    ```

    for (Customer customer : customers) { // some may be DiscountedCustomers

    // total will be the discounted total for any DiscountedCustomers

    System.out.println(customer.getName() + " : " + customer.total());

    }

    DiscountedCustomer customer = (DiscountedCustomer) customers.get(0);

    System.out.println(customer.getDiscountAmount());

    ```


    To get around this limitation, you can force generic types to be bound to specific
    types within a class hierarchy. These are called bounded types .


    ### Upper Bounds (<U extends T>)


    You can restrict a generic type using `extends` or `super` in Java . These set
    the bounds of that type to either be a subtype or super-type. You use `extends`
    to set the upper bounds and `super`, the lower bounds. They can refer to a class
    or an interface.


    We’ve actually already seen an example of setting an upper bound in the `Sortable`
    interface we wrote back in Chapter [11](#A456960_1_En_11_Chapter.html), Inheritance.
    We created an interface describing generically that things can be sortable.


    ```

    // java

    public interface Sortable> extends Iterable {

    default public List sort() {

    List list = new ArrayList();

    for (A elements: this)

    list.add(elements);

    list.sort((first, second) -> first.compareTo(second));

    return list;

    }

    // etc

    }

    ```


    This does a couple of things with generics. It both defines a generic type `A`,
    which must be a subclass of `Comparable`, and also says that implementing classes
    must be able to iterate over `A. Comparable` is the upper bound of `A`.


    This is a good example of why bounded types are useful; because we want to define
    a general-purpose algorithm yet constrain the types enough that we can call known
    methods in that algorithm. In the example, we can’t implement the `sort` method
    unless the class has the `compareTo` method from `Comparable` and also is iterable.


    We bind the type parameter when we implement the interface.


    ```

    public class Customers implements Sortable { ... }     // java

    ```


    It’s at this point that the compiler can start treating `A` as a `Customer` and
    check that `Customer` implements `Comparable` and that `Customers` implements
    `Iterable`.


    In Scala, it would look like this:


    ```

    // scala

    trait Sortable[A <: Ordered[A]] extends Iterable[A] {

    def sort: Seq[A] = {

    this.toList.sorted

    }

    }

    class Customers extends Sortable[Customer] { ... }

    ```


    The upper bound tells you what you can get out of a data structure. In our example,
    the sorting algorithm needed to get something out and use it as a `Comparable`;
    it enforces type safety. It’s set using `extends` in Java and `<:` in Scala.'
