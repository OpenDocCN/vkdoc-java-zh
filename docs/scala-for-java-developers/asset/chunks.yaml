    ### 栈示例


    作为一个稍加扩展的示例，在 Java 中，我们可以泛化一个 `Stack` 类。我们可以创建一个带有泛型类型 `T` 的接口 `Stack`，并确保 `push`
    方法接受一个 `T` 类型参数，而 `pop` 方法返回一个 `T` 类型值。


    ```

    // java

    public interface Stack {

    void push(T t);

    T pop();

    }

    ```


    在 Scala 中


    ```

    // scala

    trait Stack[T] {

    def push(t: T)

    def pop: T

    }

    ```


    为了演示，我们可以像这样在 Java 中使用列表实现 `Stack`：


    ```

    // java

    public class ListStack implements Stack {

    private final List elements = new ArrayList();

    @Override

    public void push(T t) {

    elements.add(0, t);

    }

    @Override

    public T pop() {

    if (elements.isEmpty())

    throw new IndexOutOfBoundsException();

    return elements.remove(0);

    }

    }

    ```


    当我们向编译器提供一个具体类型时，我们就将具体类型“绑定”到了泛型类型上。将 `String` 添加到以下声明（第 3 行）中，就将原本的泛型类型 `T`
    “绑定”到了 `String`。编译器知道将 `T` 替换为 `String`，我们就可以开始使用字符串作为参数和返回类型。如果我们在示例中尝试向栈中添加一个数字，就会收到编译器错误。


    ```

    1   // java

    2   public static void main(String... args) {

    3       Stack stack = new ListStack();

    4       stack.push("C");

    5       stack.push("B");

    6       stack.push("A");

    7       stack.push(12);                         // 编译失败

    8       String element = stack.pop();

    9   }

    ```


    在 Scala 中创建 `ListStack` 很简单。它看起来像这样：


    ```

    // scala

    class ListStack[T] extends Stack[T] {

    private var elements: List[T] = List()

    override def push(t: T): Unit = {

    elements = t +: elements

    }

    override def pop: T = {

    if (elements.isEmpty) throw new IndexOutOfBoundsException

    val head = elements.head

    elements = elements.tail

    head

    }

    }

    ```


    我们仍然使用 `List` 来存储元素，但由于 Scala 的 `List` 是不可变的，在 `push` 方法中，我们用一个新的列表实例替换原有实例，该新列表在开头添加了元素。


    类似地，当我们执行 `pop` 操作时，必须使用 `tail` 方法将元素替换为除第一个元素之外的所有元素。我们使用 `head` 方法获取并返回第一个元素。在
    Scala 和函数式编程中，你会经常遇到 head（第一个元素）和 tail（剩余部分）的概念。


    绑定到具体类型的方式完全相同。在下面的示例中，我没有为 `stack` 变量声明类型，因此我们需要通过在第 3 行添加参数化类型来给编译器一个关于它将是哪种
    `List` 的提示。


    ```

    1   // scala

    2   def main(args: String*) {

    3       val stack = new ListStack[String]

    4       stack.push("C")

    5       stack.push("B")

    6       stack.push("A")

    7       val element: String = stack.pop

    8   }

    ```


    为了演示方法级别的泛型，我们可以添加一个将 `Stack` 转换为数组的方法。这里需要注意的是，泛型完全是针对该方法定义的。`A` 与类定义上的泛型类型无关。


    ```

    // java

    public interface Stack {

    static  A[] toArray(Stack stack) {

    throw new UnsupportedOperationException();

    }

    }

    ```


    在 Scala 中，你以完全相同的方式定义方法级别的泛型。下面，`A` 纯粹是在该方法的作用域内定义的。


    ```

    // scala

    object Stack {

    def toArrayA: Array[A] = {

    ???

    }

    }

    ```


    ## 有界类型


    让我们回到泛型类型为 `Customer` 的列表示例。


    ```

    List customers = new ArrayList();         // java

    ```


    列表的内容可以是任何 `Customer` 或 `Customer` 的子类型，因此我们可以向列表中添加一个 `DiscountedCustomer`。


    ```

    List customers = new ArrayList();

    customers.add(new Customer("Bob Crispin", "15 Fleetwood Mack Road"));

    customers.add(new DiscountedCustomer("Derick Jonar", "23 Woodland Way"));

    ```


    类型擦除会将集合视为仅包含 `Object`。编译器将确保只有正确类型的对象才能进入集合，并在取出时使用强制类型转换。这意味着，从我们的示例中取出的任何内容都只能被视为
    `Customer`。


    如果你所做的只是在 `DiscountedCustomer` 中重写了 `Customer` 的行为，那么你可以多态地处理这些对象，并且不会看到问题。但是，如果你向
    `DiscountedCustomer` 添加了方法，那么在没有未经检查的强制类型转换的情况下，你就无法调用它们。


    ```

    for (Customer customer : customers) { // 有些可能是 DiscountedCustomer

    // 对于任何 DiscountedCustomer，total 将是折扣后的总额

    System.out.println(customer.getName() + " : " + customer.total());

    }

    DiscountedCustomer customer = (DiscountedCustomer) customers.get(0);

    System.out.println(customer.getDiscountAmount());

    ```


    为了克服这个限制，你可以强制泛型类型绑定到类层次结构中的特定类型。这些被称为有界类型。


    ### 上界 (<U extends T>)


    在 Java 中，你可以使用 `extends` 或 `super` 来限制泛型类型。这些将类型的边界设置为子类型或超类型。你使用 `extends` 来设置上界，使用
    `super` 来设置下界。它们可以引用类或接口。


    实际上，我们在第 11 章“继承”中编写的 `Sortable` 接口中已经看到了一个设置上界的示例。我们创建了一个接口，泛型地描述了事物可以是可排序的。


    ```

    // java

    public interface Sortable> extends Iterable {

    default public List sort() {

    List list = new ArrayList();

    for (A elements: this)

    list.add(elements);

    list.sort((first, second) -> first.compareTo(second));

    return list;

    }

    // 等等

    }

    ```


    这在泛型方面做了几件事。它既定义了一个泛型类型 `A`，该类型必须是 `Comparable` 的子类，又说明了实现类必须能够迭代 `A`。`Comparable`
    是 `A` 的上界。


    这是一个很好的例子，说明了为什么有界类型很有用；因为我们想要定义一个通用算法，同时又足够约束类型，以便我们可以在该算法中调用已知的方法。在这个例子中，除非该类具有来自
    `Comparable` 的 `compareTo` 方法并且也是可迭代的，否则我们无法实现 `sort` 方法。


    当我们实现接口时，我们绑定类型参数。


    ```

    public class Customers implements Sortable { ... }     // java

    ```


    正是在这一点上，编译器可以开始将 `A` 视为 `Customer`，并检查 `Customer` 是否实现了 `Comparable`，以及 `Customers`
    是否实现了 `Iterable`。


    在 Scala 中，它看起来像这样：


    ```

    // scala

    trait Sortable[A <: Ordered[A]] extends Iterable[A] {

    def sort: Seq[A] = {

    this.toList.sorted

    }

    }

    class Customers extends Sortable[Customer] { ... }

    ```


    上界告诉你可以从数据结构中获取什么。在我们的示例中，排序算法需要从中获取一些东西并将其用作 `Comparable`；它强制执行类型安全。在 Java 中使用
    `extends` 设置，在 Scala 中使用 `<:` 设置。

