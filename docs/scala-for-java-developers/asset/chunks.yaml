- fmt: '# Defining Functions


    Function and method definitions start with the `def` keyword, followed by the
    signature. The signature looks similar to a Java method signature but with the
    parameter types the other way around again, and the return type at the end rather
    than the start.


    Let’s create a function to return the minimum of two numbers.


    ```

    def min(x: Int, y: Int): Int = {

    if (x < y)

    return x

    else

    return y

    }

    ```


    We can test it in the REPL by calling it


    ```

    scala> min(34, 3)

    res3: Int = 3

    scala> min(10, 50)

    res4: Int = 10

    ```


    Note that Scala can’t infer the types of function arguments.


    Another trick is that you can drop the `return` statement. The last statement
    in a function will implicitly be the return value.


    ```

    def min(x: Int, y: Int): Int = {

    if (x < y)

    x

    else

    y

    }

    ```


    Running it the REPL would show the following:


    ```

    scala> min(300, 43)

    res5: Int = 43

    ```


    In this example, the `else` means the last statement is consistent with a `min`
    function. If I forgot the `else`, the last statement would be the same regardless
    and there would be a bug in our implementation:


    ```

    def min(x: Int, y: Int): Int = {

    if (x < y)

    x

    y         // bug! where''s the else?

    }

    ```


    It always returns `y`:


    ```

    scala> min(10, 230)

    res6: Int = 230

    ```


    If you don’t use any `return` statements, the return type can usually be inferred.


    ```

    // the return type can be omitted

    def min(x: Int, y: Int) = {

    if (x < y)

    x

    else

    y

    }

    ```


    Note that it’s the equals sign that says this function returns something. If I
    write this function on one line, without the return type and just the equals sign,
    it starts to look like a real expression rather than a function.


    ```

    def min(x: Int, y: Int) = if (x < y) x else y

    ```


    Be wary, though; if you accidentally drop the equals sign, the function won’t
    return anything. It’ll be similar to the `void` in Java.


    ```

    def min(x: Int, y: Int) {

    if (x < y) x else y

    }

    ```


    Although this compiles okay, the compiler warns that you may have missed off the
    equals sign.


    ## Operator Overloading and Infix Notation


    One interesting thing to note in Scala is that you can override operators. Arithmetic
    operators are, in fact, just methods in Scala. As such, you can create your own.
    Earlier, we saw the integer `age` used with a multiplier.


    ```

    val age: Int

    age * .5

    ```


    The value `age` is an integer and there is a method called `*` on the integer
    class. It has the following signature:


    ```

    def *(x: Double): Double

    ```


    Numbers are objects in Scala, as are literals. So, you can call `*` directly on
    a variable or a number.


    ```

    age.*(.5)

    5.*(10)

    ```


    Using the infix notation, you’re able to drop the dot notation for variables and
    literals and call


    ```

    age * .5

    ```


    …or, as another example,


    ```

    35 toString

    ```


    Remember, `35` is an instance of `Int`.


    Specifically, Scala support for infix notation means that when a method takes
    zero or one arguments you can drop the dot and parentheses, and if there is more
    than one argument you can drop the dot.


    For example,


    ```

    35 + 10

    "aBCDEFG" replace("a", "A")

    ```


    It’s optional though; you can use the dot notation if you prefer.


    What this means is that you can define your own plus or minus method on your own
    classes and use it naturally with infix notation. For example, you might have
    a `Passenger` join a `Train`.


    ```

    train + passenger

    ```


    There are not many restrictions on what you can call your functions and methods;
    you can use any symbol that makes sense to your domain.


    ## Collections


    Scala comes with immutable collection types (like `Set`, `List`, and `Map`) as
    well as mutable versions with the same API. The creators of Scala (and the functional
    programming community in general) favor immutability, so when you create a collection
    in Scala, the immutable version is the default choice.


    So, we can create a list with the following:


    ```

    val list = List("a", "b", "c")

    ```


    And create a map with


    ```

    val map = Map(1 -> "a", 2 -> "b")

    ```


    …where the arrow goes from the key to the value. These will be immutable; you
    won’t be able to add or remove elements.


    ### Why Favour Immutability?


    Immutability is usually discussed in terms of making concurrent systems easier
    to reason about. This is because if shared data can be updated at the same time
    by multiple threads, it can be difficult to reason about and diagnose unexpected
    behavior such as race conditions. Removing the ability to update shared state
    at all can alleviate the problem; immutable objects are inherently thread-safe.


    More generally though, immutability can lead to code that is easier to reason
    about even in single threaded systems. If you start out with immutable state,
    the design of your system is heavily influenced and you remove the chance of subtle
    bugs creeping in.


    You can process them in a similar way to Java’s `forEach` and lambda syntax.


    ```

    list.foreach(value => println(value))                  // scala

    ```


    which is equivalent to the following in Java:


    ```

    list.forEach(value -> System.out.println(value));      // java

    ```


    Like Java’s method reference syntax, you can auto-connect the lambda argument
    to the method call.


    ```

    list.foreach(println)                                  // scala

    ```


    which is roughly equivalent to this Java:


    ```

    list.forEach(System.out::println);                     // java

    ```


    There are lots of other Scala-esque ways to process collections. We’ll look at
    these later, but the most common way to iterate is a `for` loop written like this:


    ```

    for (value <- list) println(value)

    ```


    which reads, “for every value in list, print the value”. You can also do it in
    reverse:


    ```

    for (value <- list.reverse) println(value)

    ```


    or you might like to break it across multiple lines:


    ```

    for (value <- list) {

    println(value)

    }

    ```


    ## Tuples


    A tuple is an ordered collection of elements. The name originates from the everyday
    language we use to describe multiples of things: single, pair, triple, quadruple,
    n-tuple, and so on. For example, the familiar quadruple is a collection of four
    elements. A tuple with n elements is an n-tuple. A 1-tuple is called a single,
    a 2-tuple a pair, a 3-tuple a triple, and so on. More colloquially, people refer
    to n-numbered tuples just as tuples. It’s pronounced /tuːpəl/ and not “tupple”.


    In programming, tuples are useful to capture related values in a light-weight
    way without resorting to full blown objects. To capture a `String` value with
    a related `Int`, you’d write the following:


    ```

    val example = ("load", 21)

    ```


    The underlying type of the tuple in this case is a `Tuple2`, which captures the
    underlying types of `String` and `Int`. Where as


    ```

    val tuple = ("save", 50, true)

    ```


    …would result in a `Tuple3` capturing the types `String`, `Int`, and `Boolean`
    in that order.


    Access to the values is via numbered methods prefixed with an underscore.


    ```

    val event = tuple._1      // "save"

    val millis = tuple._2     // 50

    val success = tuple._3    // true

    ```


    …or you can assign the values directly to variables like this:


    ```

    val (event, millis, success) = tuple

    ```


    As tuple is a type, you can refer to it as such when defining values and variables
    arguments to functions.


    ```

    // specifying the type of the val

    val save: (String, Int, Boolean) = ("save", 50, true)

    // a function with a tuple as a typed argument

    def audit(event: (String, Int, Boolean)) = {

    ...

    }

    ```'
