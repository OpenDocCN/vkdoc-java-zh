    \ the `equals` method: `new Integer(42).equals(new Integer(42))`. You’re not comparing\
    \ object references, like in Java with `==`, but natural equality. Remember that\
    \ `42` in Scala is an instance of `Int`, which in turn delegates to `Integer`.\n\
    \n## Unit\n\nThe `Unit` value type is a special type used in Scala to represent\
    \ an uninteresting result. It’s similar to Java’s `Void` object or `void` keyword\
