    ## 匿名类


    你可以用与 Java 类似的方式创建匿名子类。


    在 Java 版本的 `ShoppingBasket` 类中，`add` 方法接受一个 `Item` 接口。因此，要向购物篮中添加商品，你可以创建一个 `Item`
    的匿名子类型。下面是一个程序，用于向 Joe 的购物篮中添加两个固定价格的商品。每个商品都是 `Item` 的一个匿名子类。折扣后的购物篮总价为 5.40
    美元。


    ```

    // java

    public class ShoppingBasket {

    private final Set basket = new HashSet();

    public void add(Item item) {

    basket.add(item);

    }

    public Double value() {

    return basket.stream().mapToDouble(Item::price).sum();

    }

    }

    public class AnonymousCLass {

    public static void main(String... args) {

    Customer joe = new DiscountedCustomer("Joe", "128 Bullpen Street");

    joe.add(new Item() {

    @Override

    public Double price() {

    return 2.5;

    }

    });

    joe.add(new Item() {

    @Override

    public Double price() {

    return 3.5;

    }

    });

    System.out.println("Joe’s basket will cost $ " + joe.total());

    }

    }

    ```


    在 Scala 中，情况几乎相同。在实例化 `Item` 时，可以省略类名上的括号，以及 `price` 方法签名中的类型。`price` 方法前的 `override`
    关键字也是可选的。


    ```

    // scala

    object DiscountedCustomer {

    def main(args: Array[String]) {

    val joe = new DiscountedCustomer("Joe", "128 Bullpen Street")

    joe.add(new Item {

    def price = 2.5

    })

    joe.add(new Item {

    def price = 3.5

    })

    println("Joe’s basket will cost $ " + joe.total)

    }

    }

    ```


    你可以用完全相同的方式创建类、抽象类或 Scala 特质（trait）的匿名实例。


    ## 接口/特质


    Java 中的接口与 Scala 中的特质类似。你可以像使用接口一样使用特质。你可以在实现类中实现特定的行为，同时在代码中以多态方式对待它们。然而：


    *   特质可以为方法提供默认实现。这类似于 Java 的虚拟扩展方法（Java 8 中的新特性，也称为默认方法），但在 Java 8 之前没有等效功能。

    *   特质还可以拥有字段，甚至可以为这些字段提供默认值，这是 Java 接口无法做到的。因此，特质可以同时拥有抽象方法和具体方法，并且可以拥有状态。

    *   一个类可以实现任意数量的特质，就像一个类可以实现任意数量的接口一样，不过在 Scala 中扩展带有默认实现的特质，更像是混入（mixin）行为，而非
    Java 中传统的接口继承。

    *   与 Java 8 存在交叉，因为你可以通过 Java 8 混入行为，尽管在语义以及如何处理重复方法方面存在一些差异。


    在本节中，我们将更详细地探讨这些差异。


    在 Java 中，我们可能会创建一个名为 `Readable` 的接口，用于读取一些数据并将其复制到字符缓冲区中。每个实现可能会将不同的内容读入缓冲区。例如，一个实现可能通过
    HTTP 读取网页内容，而另一个实现可能读取文件。


    ```

    // java

    public interface Readable {

    public int read(CharBuffer buffer);

    }

    ```


    在 Scala 中，Java 接口将变成一个特质，看起来像这样：


    ```

    // scala

    trait Readable {

    def read(buffer: CharBuffer): Int

    }

    ```


    定义时只需使用 `trait` 而不是 `class`。无需将方法声明为 `abstract`，因为任何未实现的方法都会自动成为抽象方法。


    在 Java 中实现接口使用 `implements` 关键字。例如，如果我们实现一个文件读取器，我们可能会将一个 `File` 对象作为构造函数参数，并重写
    `read` 方法来消费文件内容。`read` 方法将返回读取的字节数。


    ```

    // java

    public class FileReader implements Readable {

    private final File file;

    public FileReader(File file) {

    this.file = file;

    }

    @Override

    public int read(CharBuffer buffer) {

    int read = 0;

    // ...

    return read;

    }

    }

    ```


    在 Scala 中，你使用 `extends`，就像扩展常规类一样。当重写现有的具体方法时，必须使用 `override` 关键字，但在重写抽象方法时则不需要。


    ```

    // scala

    class FileReader(file: File) extends Readable {

    override def read(buffer: CharBuffer): Int = {    // override 可选

    val linesRead: Int = 0

    return linesRead

    }

    }

    ```


    在 Java 中，如果你想实现多个接口，可以将接口名称附加到 Java 类定义中，因此我们可以为 `FileReader` 添加 `AutoClosable`
    行为。


    ```

    // java

    public class FileReader implements Readable, AutoCloseable {

    private final File file;

    public FileReader(File file) {

    this.file = file;

    }

    @Override

    public int read(CharBuffer buffer) {

    int read = 0;

    // ...

    return read;

    }

    @Override

    public void close() throws Exception {

    // close

    }

    }

    ```


    在 Scala 中，你使用 `with` 关键字来添加额外的特质。当你想要扩展一个常规类、抽象类或特质时，可以这样做。只需对第一个使用 `extends`，然后对其余的每个使用
    `with`。不过，与 Java 一样，你只能有一个超类。


    ```

    // scala

    class FileReader(file: File) extends Readable with AutoCloseable {

    def read(buffer: CharBuffer): Int = {

    val linesRead: Int = 0

    // ...

    return linesRead

    }

    def close(): Unit = ???

    }

    ```


    这是什么问题？


    这里的 `???` 实际上是一个方法。它是一个很方便的方法，可以用来表示“我还不知道”。如果你调用它，它会抛出一个运行时异常，有点像 Java 中的 `UnsupportedOperationException`。当你确实还不知道需要什么时，它能让代码编译通过。

