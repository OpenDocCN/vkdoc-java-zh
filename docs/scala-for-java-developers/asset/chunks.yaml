  raw: '### Returning Functions


    Returning functions from functions is useful to decouple implementation from behavior.
    You might want to create factory style functions to be passed around or create
    calculations but don’t have all the values yet.


    An example might be that you want to convert currency amounts from US dollars.
    A simple enough function to write, a function that takes a target currency and
    dollar amount. However, let’s say that you want to call this in lots of places
    but don’t want to pass around the target currency everywhere.


    If you create a function to create the function, you can call that just once (when
    you know the target currency) and pass it around instead. It saves you passing
    around implementation details (in this case the target currency) and so decouples
    clients from the details.


    So rather than the imperative way like this:


    ```

    // scala

    def dollarTo(currency: String, dollar: Double) = {

    if (currency == "GBP") dollar * 0.76

    else if (currency == "EUR") dollar * 0.83

    else dollar

    }

    ```


    …you’d create a higher-order function that takes the target currency but returns
    a function to be evaluated later. That function would take a currency amount and
    return the converted amount, as below.


    ```

    // scala

    def dollarTo(currency: String): Double => Double = {

    if (currency == "GBP") dollar => dollar * 0.76

    else if (currency == "EUR") dollar => dollar * 0.83

    else dollar => dollar

    }

    ```


    Then rather than lock yourself into the implementation of the imperative version
    anywhere you call it — for example, from the `''calculateTicketPrice''` function
    below):


    ```

    // scala

    def calculateTicketPrice(targetCurrency: String) = {

    dollarTo(targetCurrency, 199.99)

    // ...

    }

    ```


    …you instead pass in a function signature anywhere you want the conversion.


    ```

    def calculateTicketPrice(currencyConversion: Double=> Double) = {

    currencyConversion(199.99)

    // ...

    }

    ```


    You can think of it as an informal interface; any function that converts one double
    to another can be used here. Instead of using the one above, you could pass in
    a function that calls a web service to get latest FX rates or one that shows historical
    rates without having to change any client code. Neat.


    ```

    calculateTicketPrice(dollarTo("GBP"))

    calculateTicketPrice(yahooFxRateFor("GBP"))

    calculateTicketPrice(historicalRateFor("GBP"))

    ```


    ### Storing Functions


    The following is an example of a lambda to add two numbers together:


    ```

    (Integer a, Integer b) -> a + b;        // java

    ```


    If you want to store this as a value, you need a type. Under the hood, Java treats
    lambdas as an instance of a single method interface (SAM) and provides suitable
    interfaces in the `java.util.function` package to do so.


    It defines `java.util.function.Function` to represent a single argument function
    and `java.util.function.BiFunction` for a function with two arguments.


    You can therefore assign the lambda like this:


    ```

    // java

    BiFunction plus = (Integer a, Integer b) -> a+b;

    ```


    The `BiFunction` defines the two input arguments `T` and `U` and return value
    `R`. So, the above represents a function with two integer arguments, returning
    another integer.


    ```

    public interface BiFunction {

    R apply(T t, U u);

    }

    ```


    As the variable declaration includes the type information, Java allows you to
    drop the repetition in the lambda’s arguments:


    ```

    // java

    BiFunction plus = (a, b) -> a + b;

    ```


    To execute or apply the function, you’d use the following syntax:


    ```

    // java

    plus.apply(2, 2);                     // 4

    plus.apply(plus.apply(2, 2), 2);      // 6

    ```


    The Scala version of the basic lambda is as you’d expect:


    ```

    (a: Int, b: Int) => a + b             // scala

    ```


    Although Scala uses the same trick under the covers to represent a function as
    a type, in this case `scala.Function2[Int, Int, Int]` it also allows a more succinct
    representation. So, although you can write it out long hand like this:


    ```

    val plus: Function2[Int, Int, Int] = (a: Int, b: Int) => a + b   // scala

    ```


    …it’s more concise to use the function type `(Int, Int) => Int`:


    ```

    val plus: (Int, Int) => Int = (a: Int, b: Int) => a + b          // scala

    ```


    Again, with the additional type information on the `val`, you can drop the repetition
    in the lambda arguments.


    ```

    val plus: (Int, Int) => Int = (a, b) => a + b                    // scala

    ```


    Calling it is more succinct as Scala will automatically call the `apply` method.


    ```

    // scala

    plus(2, 2)              // 4

    plus(plus(2, 2), 4)     // 8

    ```


    ## Function Types


    Both Java and Scala support functions as first-class citizens as they support
    all the preceding points. However, an academically interesting difference is that
    Java doesn’t support function types whereas Scala does.


    Although you can define a lambda’s type using `Function2` in Scala as follows:


    ```

    val f: Function2[String, String, Int] = (a, b) => a.compareTo(b)

    ```


    …you can also define it using a function type.


    ```

    val f: (String, String) => Int = (a, b) => a.compareTo(b)

    ```


    The type declaration to the left of the assignment is known as a function type.
    `(String, String) => Int` is a full type in Scala, it declares a function from
    two string arguments returning an integer. It can be used anywhere an ordinary
    type declaration can be used; to describe the type of a value, as we’ve done here,
    an argument to a function, or a return type.


    ## Functions vs. Methods


    In Scala, a `def` can be used as a function or a method. Scala developers often
    talk about functions and shy away from talking about methods, so what’s the difference?


    A method `def` will be defined within a Scala class, it will usually refer to
    instance data within the class. Its nomenclature is firmly in the object-oriented
    world; methods define behaviors for instance objects.


    Function `def`s are defined in Scala singleton objects (but, if defined in a class,
    can be converted into functions under certain conditions). Functions are firmly
    from the mathematical world, they take inputs and produce outputs. In the functional
    programming world, they don’t define behaviors for instance objects but instead
    implement independent, repeatable transformations or apply calculations.


    The difference between a function and a method then is partly about describing
    the context of their use; you talk about methods when you’re building object-oriented
    systems and functions when talking about transformations or functional programming.
    Methods will also be associated with instance objects and functions will not.


    There are several ways to create functions in Scala.


    1.  A `def` in a singleton object is inherently a function.  

    2.  Create a lambda.  

    3.  Create a `def` in a class which Scala will convert to a function when passed
    to a higher-order function.  


    There are only two ways to create functions in Java.


    1.  Create static class method.  

    2.  Create a lambda.  


    There is special type of lambda called a closure. In both Java and Scala, these
    are created differently under the hood. They are closer to anonymous classes than
    functions as a new instance is created when they are defined. You can therefore
    argue that they are not “functions” in the sense I’m describing here.


    Anonymous Class != Anonymous Function


    When you create an anonymous class, you “new up” an instance. A function has no
    instance associated with it and therefore, an instance of an anonymous class can
    not be called an anonymous function, even though it can be used and passed around
    like a first-class citizen.'
