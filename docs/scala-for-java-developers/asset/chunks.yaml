- fmt: "### Call-by-Name\n\nIn Java, you can’t do anything about an empty lambda argument\
    \ list (e.g., `() -> Void`) but in Scala, you can drop the brackets from a function\
    \ signature to indicate that the argument is call-by-name. To invoke it, you no\
    \ longer need to call the `apply` method. Instead, you simply reference it.\n\n\
    ```\ndef runInThread(function: => Unit) {         // call-by-name\nnew Thread()\
    \ {\noverride def run(): Unit = function      // not function()\n}.start()\n}\n\
    ```\n\nThe by-name parameter expression isn’t evaluated until it’s actually used;\
    \ not when it’s defined. It behaves just like the longhand function did even though\
    \ it looks like we’re calling the function at the point where we pass it into\
    \ our `runInThread` method.\n\n```\ndef updateUiElements() {\nrunInThread {\n\
    updateCustomerBasket(basket)\n}\nrunInThread {\nupdateOffersFor(customer)\n}\n\
    }\n```\n\nThis starts to make things look a lot more natural, especially if we\
    \ want to do more within a running thread. For example, let’s say we want to apply\
    \ a discount before updating a customer’s basket. The braces and indents make\
    \ it very clear that this happens in the same thread as the update.\n\n```\ndef\
    \ updateUiElements() {\nrunInThread {\napplyDiscountToBasket(basket)\nupdateCustomerBasket(basket)\n\
    }\nrunInThread {\nupdateOffersFor(customer)\n}\n}\n```\n\nYou can think of it\
    \ as shorthand for creating a parameter-less lambda.\n\n**Call-By-Name != Lazy**\n\
    \nPeople often think that by-name parameters are the same thing as lazy values\
    \ but this isn't technically accurate. Yes, they aren't evaluated until they're\
    \ encountered at runtime but, unlike true lazy values, they will be evaluated\
    \ every time they're encountered.\n\nTrue lazy values are evaluated the first\
    \ time they're encountered and stored so the second time you ask for the value,\
    \ it's just returned, not evaluated again.\n\nSo, by-name parameters are not lazy.\n\
    \n## Currying\n\nUsing the `apply` method and curly braces allows us to create\
    \ APIs that are expressive and natural to use. It allows us to create control\
    \ abstractions that conform to what we already expect from the language in terms\
    \ of syntax.\n\nBut remember what we said earlier about the curly braces rule.\n\
    \n*   Any method call that accepts exactly one argument can use curly braces to\
    \ surround the argument instead of parentheses.\n\nWe can only use curly braces\
    \ with single-argument methods. What if we want to add an argument to our `runInThread`\
    \ method and still use the elegant syntax? The good news is that it’s entirely\
    \ possible; we employ a technique called currying.\n\nLet’s extend our `runInThread`\
    \ method to add a new argument to assign a thread group.\n\n```\ndef runInThread(group:\
    \ String, function: => Unit) {\nnew Thread(new ThreadGroup(group), new Runnable()\
    \ {\ndef run(): Unit = function\n}).start()\n}\n```\n\nAs only single-argument\
    \ lists can use braces, we have to regress the `Ui` object back to using parentheses.\n\
    \n```\n// yuk!\ndef updateUiElements() {\nrunInThread(\"basket\", {\napplyDiscountToBasket(basket)\n\
    updateCustomerBasket(basket)\n})\nrunInThread(\"customer\",\nupdateOffersFor(customer)\n\
    )\n}\n```\n\nIf we could convert our function with two arguments into a function\
    \ that takes one argument we’d be able to use the curly braces again. Fortunately\
    \ for us, that’s exactly what currying is about. Currying is the process of turning\
    \ a function of two or more arguments into a series of functions, each taking\
    \ a single argument.\n\nFor a function of two arguments, currying would produce\
    \ a function that takes one argument and returns another function. This returned\
    \ function would also have a single argument (for what would have been the second\
    \ argument of the original function). Confused? Let’s work through an example.\n\
    \nLet’s say we have a function `f` that takes two arguments, `a` and `b`, and\
    \ returns `a + b`.\n\n`f (a, b) = a + b`\n\nTo convert this into two functions,\
    \ each with a single argument, first we create a function to take `a` and give\
    \ back a new function (`f′`).\n\n`f (a) → f′`\n\nThis new function should itself\
    \ take a single argument, `b`.\n\n`f (a) → f′ (b)`\n\nThat entire function should\
    \ return the result, `a + b`.\n\n`f (a) → f′ (b) → a + b`\n\nWe’re left with two\
    \ functions (`f` and `f′`), each taking a single argument.\n\nWith the pseudo-mathematical\
    \ notation on the same page, it’s worth restating my original definition and comparing\
    \ the original to the curried form of the function (see Figure [15-1](#A456960_1_En_15_Chapter.html#Fig1)).\n\
    \n![A456960_1_En_15_Fig1_HTML.jpg](A456960_1_En_15_Fig1_HTML.jpg)\n\nFigure 15-1\n\
    \nOriginal function and steps to arrive at its curried form\n\n*   For a function\
    \ of two arguments, currying would produce a function that takes one argument\
    \ and returns another function. This returned function would also have a single\
    \ argument (for what would have been the second argument of the original function).\n\
    \nTo evaluate the functions of the curried form, we’d evaluate the first function\
    \ (for example, passing in a value `1`).\n\n`f (1)`\n\nThis would return a function\
    \ that captures the value, and, because what’s returned is a function, we can\
    \ just evaluate it, providing a value for the last argument (`2`).\n\n`f (1)(2)`\n\
    \nAt this point, both values are in scope and any computation can be applied giving\
    \ the final result.\n\nI’ve been using a bit of a gorilla notation[¹](#A456960_1_En_15_Chapter.html#Fn13)\
    \ to get my point across here. Using a more mathematically correct notation, we\
    \ could show the function as being curried by creating a new function taking `a`\
    \ and mapping `b` to `a + b`.\n\n`f (a) = (b → a + b)`\n\nIf you’re familiar with\
    \ the lambda calculus,[²](#A456960_1_En_15_Chapter.html#Fn14) you’ll already know\
    \ that `λab.a + b` is shorthand for its curried form `λa. (λb.(a + b))`.\n\n**Closures**\n\
    \nInterestingly, the process of capturing a value and making it available to a\
    \ second function like this is called closure. It’s where we get the term closure\
    \ from when referring to anonymous functions or lambdas that capture values.\n\
    \n### Scala Support for Curried Functions\n\nA regular uncurried function to add\
    \ two numbers might look like this:\n\n```\ndef add(x: Int, y: Int): Int = x +\
    \ y\n```\n\nScala supports curried functions out of the box, so we don’t need\
    \ to do any manual conversion; all we do to turn this into its curried version\
    \ is to separate out the arguments using parentheses.\n\n```\ndef add(x: Int)(y:\
    \ Int): Int = x + y\n```\n\nScala has created two single-argument parameter lists\
    \ for us. To evaluate the function, we’d do the following:\n\n```\nscala> add(1)(2)\n\
    res1: Int = 3\n```\n\nTo see it in stages, we could just evaluate the first half\
    \ like this:\n\n```\nscala> val f = add(1) _\nf: Int => Int = \n```\n\nThe underscore\
    \ gives the REPL a hint about what we’re trying to do. The result `f` is a function\
    \ from `Int` to `Int`. The value `1` has been captured and is available to that\
    \ function. So, we can now just execute the returned function supplying our second\
    \ value.\n\n```\nscala> f(2)\nres2: Int = 3\n```\n\nSo, what does this mean for\
    \ our `runInThread` method? Well, if we create a curried version of the function,\
    \ we can get back to using our lovely curly braces.\n\nWe start by splitting the\
    \ argument into two to create the curried form of the original.\n\n```\ndef runInThread(group:\
    \ String)(function: => Unit) {\nnew Thread(new ThreadGroup(group), new Runnable()\
    \ {\ndef run(): Unit = function\n}).start()\n}\n```\n\nNotice there are no other\
    \ changes to make to the function. Inside `runInThread` everything is just as\
    \ it was. However, we can now change the `Ui` object back to using curly braces\
    \ for the second argument.\n\n```\ndef updateUiElements() {\nrunInThread(\"basket\"\
    ) {\napplyDiscountToBasket(basket)\nupdateCustomerBasket(basket)\n}\nrunInThread(\"\
    customer\",\nupdateOffersFor(customer)\n)\n}\n```"
  raw: "### Call-by-Name\n\nIn Java, you can’t do anything about an empty lambda argument\
    \ list (e.g., `() -> Void`) but in Scala, you can drop the brackets from a function\
    \ signature to indicate that the argument is call-by-name . To invoke it, you\
    \ no longer need to call the `apply` method. Instead, you simply reference it.\n\
    \n```\ndef runInThread(function: => Unit) {         // call-by-name\nnew Thread()\
    \ {\noverride def run(): Unit = function      // not function()\n}.start()\n}\n\
    ```\n\nThe by-name parameter expression isn’t evaluated until it’s actually used;\
    \ not when it’s defined. It behaves just like the longhand function did even though\
    \ it looks like we’re calling the function at the point where we pass it into\
    \ our `runInThread` method.\n\n```\ndef updateUiElements() {\nrunInThread {\n\
    updateCustomerBasket(basket)\n}\nrunInThread {\nupdateOffersFor(customer)\n}\n\
    }\n```\n\nThis starts to make things look a lot more natural, especially if we\
    \ want to do more within a running thread. For example, let’s say we want to apply\
    \ a discount before updating a customer’s basket. The braces and indents make\
    \ it very clear that this happens in the same thread as the update.\n\n```\ndef\
    \ updateUiElements() {\nrunInThread {\napplyDiscountToBasket(basket)\nupdateCustomerBasket(basket)\n\
    }\nrunInThread {\nupdateOffersFor(customer)\n}\n}\n```\n\nYou can think of it\
    \ as shorthand for creating a parameter-less lambda.\n\nCall-By-Name != Lazy\n\
    \nPeople often think that by-name parameters are the same thing as lazy values\
    \ but this isn't technically accurate. Yes, they aren't evaluated until they're\
    \ encountered at runtime but, unlike true lazy values, they will be evaluated\
    \ every time they're encountered.\n\nTrue lazy values are evaluated the first\
    \ time they're encountered and stored so the second time you ask for the value,\
    \ it's just returned, not evaluated again.\n\nSo, by-name parameters are not lazy.\n\
    \n## Currying\n\nUsing the `apply` method and curly braces allows us to create\
    \ APIs that are expressive and natural to use. It allows us to create control\
    \ abstractions that conform to what we already expect from the language in terms\
    \ of syntax.\n\nBut remember what we said earlier about the curly braces rule.\n\
    \n*   Any method call that accepts exactly one argument can use curly braces to\
    \ surround the argument instead of parentheses.\n\nWe can only use curly braces\
    \ with single-argument methods. What if we want to add an argument to our `runInThread`\
    \ method and still use the elegant syntax? The good news is that it’s entirely\
    \ possible; we employ a technique called currying.\n\nLet’s extend our `runInThread`\
    \ method to add a new argument to assign a thread group.\n\n```\ndef runInThread(group:\
    \ String, function: => Unit) {\nnew Thread(new ThreadGroup(group), new Runnable()\
    \ {\ndef run(): Unit = function\n}).start()\n}\n```\n\nAs only single-argument\
    \ lists can use braces, we have to regress the `Ui` object back to using parentheses.\n\
    \n```\n// yuk!\ndef updateUiElements() {\nrunInThread(\"basket\", {\napplyDiscountToBasket(basket)\n\
    updateCustomerBasket(basket)\n})\nrunInThread(\"customer\",\nupdateOffersFor(customer)\n\
    )\n}\n```\n\nIf we could convert our function with two arguments into a function\
    \ that takes one argument we’d be able to use the curly braces again. Fortunately\
    \ for us, that’s exactly what currying is about. Currying is the process of turning\
    \ a function of two or more arguments into a series of functions, each taking\
    \ a single argument.\n\nFor a function of two arguments, currying would produce\
    \ a function that takes one argument and returns another function. This returned\
    \ function would also have a single argument (for what would have been the second\
    \ argument of the original function). Confused? Let’s work through an example.\n\
    \nLet’s say we have a function f that takes two arguments, a and b, and returns\
    \ a + b.\n\nf (a, b) = a + b\n\nTo convert this into two functions, each with\
    \ a single argument, first we create a function to take a and give back a new\
    \ function (f′).\n\nf (a) → f  ′\n\nThis new function should itself take a single\
    \ argument, b.\n\nf (a) → f  ′ (b)\n\nThat entire function should return the result,\
    \ a + b.\n\nf (a) → f  ′ (b) → a + b\n\nWe’re left with two functions (f and →f  ′),\
    \ each taking a single argument.\n\nWith the pseudo-mathematical notation on the\
    \ same page, it’s worth restating my original definition and comparing the original\
    \ to the curried form of the function (see Figure [15-1](#A456960_1_En_15_Chapter.html#Fig1)).\n\
    \n![A456960_1_En_15_Fig1_HTML.jpg](A456960_1_En_15_Fig1_HTML.jpg)\n\nFigure 15-1\n\
    \nOriginal function and steps to arrive at its curried form\n\n*   For a function\
    \ of two arguments, currying would produce a function that takes one argument\
    \ and returns another function. This returned function would also have a single\
    \ argument (for what would have been the second argument of the original function).\n\
    \nTo evaluate the functions of the curried form, we’d evaluate the first function\
    \ (for example, passing in a value 1).\n\nf (1)\n\nThis would return a function\
    \ that captures the value, and, because what’s returned is a function, we can\
    \ just evaluate it, providing a value for the last argument (2).\n\nf (1)(2)\n\
    \nAt this point, both values are in scope and any computation can be applied giving\
    \ the final result.\n\nI’ve been using a bit of a gorilla notation[¹](#A456960_1_En_15_Chapter.html#Fn13)\
    \ to get my point across here. Using a more mathematically correct notation, we\
    \ could show the function as being curried by creating a new function taking a\
    \ and mapping b to a + b.\n\nf (a) = (b → a + b)\n\nIf you’re familiar with the\
    \ lambda calculus,[²](#A456960_1_En_15_Chapter.html#Fn14) you’ll already know\
    \ that λab.a + b is shorthand for its curried form λa. (λb.(a + b)).\n\nClosures\n\
    \nInterestingly, the process of capturing a value and making it available to a\
    \ second function like this is called closure . It’s where we get the term closure\
    \ from when referring to anonymous functions or lambdas that capture values.\n\
    \n### Scala Support for Curried Functions\n\nA regular uncurried function to add\
    \ two numbers might look like this:\n\n```\ndef add(x: Int, y: Int): Int = x +\
    \ y\n```\n\nScala supports curried functions out of the box, so we don’t need\
    \ to do any manual conversion; all we do to turn this into its curried version\
    \ is to separate out the arguments using parentheses.\n\n```\ndef add(x: Int)(y:\
    \ Int): Int = x + y\n```\n\nScala has created two single-argument parameter lists\
    \ for us. To evaluate the function, we’d do the following:\n\n```\nscala> add(1)(2)\n\
    res1: Int = 3\n```\n\nTo see it in stages, we could just evaluate the first half\
    \ like this:\n\n```\nscala> val f = add(1) _\nf: Int => Int = \n```\n\nThe underscore\
    \ gives the REPL a hint about what we’re trying to do. The result `f` is a function\
    \ from `Int` to `Int`. The value `1` has been captured and is available to that\
    \ function. So, we can now just execute the returned function supplying our second\
    \ value.\n\n```\nscala> f(2)\nres2: Int = 3\n```\n\nSo, what does this mean for\
    \ our `runInThread` method? Well, if we create a curried version of the function,\
    \ we can get back to using our lovely curly braces.\n\nWe start by splitting the\
    \ argument into two to create the curried form of the original.\n\n```\ndef runInThread(group:\
    \ String)(function: => Unit) {\nnew Thread(new ThreadGroup(group), new Runnable()\
    \ {\ndef run(): Unit = function\n}).start()\n}\n```\n\nNotice there are no other\
    \ changes to make to the function. Inside `runInThread` everything is just as\
    \ it was. However, we can now change the `Ui` object back to using curly braces\
    \ for the second argument.\n\n```\ndef updateUiElements() {\nrunInThread(\"basket\"\
    ) {\napplyDiscountToBasket(basket)\nupdateCustomerBasket(basket)\n}\nrunInThread(\"\
    customer\",\nupdateOffersFor(customer)\n)\n}\n```"
  trans: "\n### 按名传参\n\n在 Java 中，你无法对空的 lambda 参数列表（例如 `() -> Void`）做任何处理，但在 Scala\
    \ 中，你可以从函数签名中省略括号，以表明该参数是按名传参的。调用时，你不再需要调用 `apply` 方法，只需直接引用它即可。\n\n```\ndef runInThread(function:\
    \ => Unit) {         // 按名传参\nnew Thread() {\noverride def run(): Unit = function\
    \      // 不是 function()\n}.start()\n}\n```\n\n按名参数表达式直到实际使用时才会被求值，而不是在定义时。它的行为与长格式函数完全一致，尽管看起来我们像是在将函数传入\
    \ `runInThread` 方法时就已经调用了它。\n\n```\ndef updateUiElements() {\nrunInThread {\n\
    updateCustomerBasket(basket)\n}\nrunInThread {\nupdateOffersFor(customer)\n}\n\
    }\n```\n\n这让代码看起来自然得多，尤其是当我们在一个运行线程中想做更多操作时。例如，假设我们想在更新客户购物车之前应用一个折扣。花括号和缩进清晰地表明，这些操作与更新发生在同一个线程中。\n\
    \n```\ndef updateUiElements() {\nrunInThread {\napplyDiscountToBasket(basket)\n\
    updateCustomerBasket(basket)\n}\nrunInThread {\nupdateOffersFor(customer)\n}\n\
    }\n```\n\n你可以将其视为创建无参 lambda 的简写形式。\n\n### 按名传参 ≠ 惰性求值\n\n人们常常认为按名参数与惰性值是一回事，但这在技术上并不准确。没错，它们都是在运行时遇到时才被求值，但与真正的惰性值不同，它们每次被遇到时都会被求值。\n\
    \n真正的惰性值在第一次遇到时被求值并存储，因此第二次请求该值时，它会被直接返回，而不会再次求值。\n\n所以，按名参数并非惰性。\n\n## 柯里化\n\n\
    使用 `apply` 方法和花括号，我们可以创建出表达力强且使用自然的 API。它让我们能够创建符合语言语法预期的控制抽象。\n\n但请记住我们之前关于花括号规则的说明。\n\
    \n*   任何接受恰好一个参数的方法调用，都可以使用花括号来包围参数，而不是圆括号。\n\n我们只能对单参数方法使用花括号。如果我们想为 `runInThread`\
    \ 方法添加一个参数，同时仍然使用优雅的语法，该怎么办？好消息是，这完全可行；我们可以采用一种称为柯里化的技术。\n\n让我们扩展 `runInThread`\
    \ 方法，添加一个新参数来指定线程组。\n\n```\ndef runInThread(group: String, function: => Unit)\
    \ {\nnew Thread(new ThreadGroup(group), new Runnable() {\ndef run(): Unit = function\n\
    }).start()\n}\n```\n\n由于只有单参数列表才能使用花括号，我们不得不让 `Ui` 对象回归到使用圆括号。\n\n```\n// 真难看！\n\
    def updateUiElements() {\nrunInThread(\"basket\", {\napplyDiscountToBasket(basket)\n\
    updateCustomerBasket(basket)\n})\nrunInThread(\"customer\",\nupdateOffersFor(customer)\n\
    )\n}\n```\n\n如果我们能将这个双参数函数转换为一个单参数函数，就能再次使用花括号了。幸运的是，这正是柯里化的作用。柯里化是将一个具有两个或更多参数的函数转换为一系列函数的过程，每个函数只接受一个参数。\n\
    \n对于一个双参数函数，柯里化会产生一个接受一个参数并返回另一个函数的函数。这个返回的函数也只有一个参数（对应原函数的第二个参数）。有点困惑？让我们通过一个例子来理解。\n\
    \n假设我们有一个函数 f，它接受两个参数 a 和 b，并返回 a + b。\n\nf (a, b) = a + b\n\n要将其转换为两个各带一个参数的函数，首先我们创建一个函数来接受\
    \ a 并返回一个新函数（f′）。\n\nf (a) → f  ′\n\n这个新函数本身应该接受一个参数 b。\n\nf (a) → f  ′ (b)\n\n\
    整个函数应该返回结果 a + b。\n\nf (a) → f  ′ (b) → a + b\n\n我们最终得到两个函数（f 和 →f  ′），每个都接受一个参数。\n\
    \n在使用了类似的伪数学符号后，有必要重申我最初的定义，并将原始函数与其柯里化形式进行比较（见图 15-1）。\n\n![A456960_1_En_15_Fig1_HTML.jpg](img/A456960_1_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1\n\n原始函数及其柯里化形式的推导步骤\n\n*   对于一个双参数函数，柯里化会产生一个接受一个参数并返回另一个函数的函数。这个返回的函数也只有一个参数（对应原函数的第二个参数）。\n\
    \n要计算柯里化形式的函数，我们先计算第一个函数（例如，传入值 1）。\n\nf (1)\n\n这会返回一个捕获了该值的函数，并且由于返回的是一个函数，我们可以直接计算它，为最后一个参数提供值（2）。\n\
    \nf (1)(2)\n\n此时，两个值都在作用域内，任何计算都可以进行，从而得到最终结果。\n\n我在这里使用了一种有点“大猩猩”式的符号¹来阐明我的观点。使用更符合数学规范的符号，我们可以通过创建一个新函数来展示函数的柯里化形式，该函数接受\
    \ a 并将 b 映射到 a + b。\n\nf (a) = (b → a + b)\n\n如果你熟悉 lambda 演算²，你就会知道 λab.a + b\
    \ 是其柯里化形式 λa. (λb.(a + b)) 的简写。\n\n### 闭包\n\n有趣的是，像这样捕获一个值并使其可供第二个函数使用的过程被称为闭包。这就是我们在提及匿名函数或捕获值的\
    \ lambda 时，术语“闭包”的来源。\n\n### Scala 对柯里化函数的支持\n\n一个常规的非柯里化函数，用于将两个数相加，可能如下所示：\n\
    \n```\ndef add(x: Int, y: Int): Int = x + y\n```\n\nScala 原生支持柯里化函数，因此我们无需手动转换；要将其转换为柯里化版本，只需用圆括号将参数分开即可。\n\
    \n```\ndef add(x: Int)(y: Int): Int = x + y\n```\n\nScala 为我们创建了两个单参数列表。要计算该函数，我们可以这样做：\n\
    \n```\nscala> add(1)(2)\nres1: Int = 3\n```\n\n要分步查看，我们可以只计算前半部分，如下所示：\n\n```\n\
    scala> val f = add(1) _\nf: Int => Int = \n```\n\n下划线向 REPL 提示了我们想要做什么。结果 `f`\
    \ 是一个从 `Int` 到 `Int` 的函数。值 `1` 已被捕获，并可供该函数使用。因此，我们现在可以执行返回的函数，并提供第二个值。\n\n```\n\
    scala> f(2)\nres2: Int = 3\n```\n\n那么，这对我们的 `runInThread` 方法意味着什么呢？如果我们创建该函数的柯里化版本，就可以重新使用我们喜爱的花括号了。\n\
    \n我们首先将参数拆分为两个，以创建原函数的柯里化形式。\n\n```\ndef runInThread(group: String)(function:\
    \ => Unit) {\nnew Thread(new ThreadGroup(group), new Runnable() {\ndef run():\
    \ Unit = function\n}).start()\n}\n```\n\n注意，函数内部无需其他更改。在 `runInThread` 内部，一切照旧。然而，我们现在可以将\
    \ `Ui` 对象改回使用花括号来包围第二个参数。\n\n```\ndef updateUiElements() {\nrunInThread(\"basket\"\
    ) {\napplyDiscountToBasket(basket)\nupdateCustomerBasket(basket)\n}\nrunInThread(\"\
    customer\",\nupdateOffersFor(customer)\n)\n}\n```\n"
- fmt: '# Summary


    With a few built-in features, Scala allows us to write methods that look like
    language constructs. We can use higher-order functions to create control abstractions:
    functions that abstract over complex behavior and reduce duplication yet still
    offer flexibility to the code that calls them.


    We can use curly braces anywhere a single-argument method is used. We can use
    this to provide visual cues and patterns that are immediately recognizable. Using
    built-in currying support, we’re not limited to using this only for single-argument
    functions; we can create even richer APIs by converting multiple-argument functions
    into multiple single-argument functions.


    Footnotes [1](#A456960_1_En_15_Chapter.html#Fn13_source)


    A discussion of the notation used can be found at [`http://bit.ly/1Q2bU6s`](http://bit.ly/1Q2bU6s)


    [2](#A456960_1_En_15_Chapter.html#Fn14_source)


    Some notes on the Lambda Calculus can be found at [`http://bit.ly/1G4OdVo`](http://bit.ly/1G4OdVo)


    # 16. Pattern Matching


    As well as providing switch-like functionality (that’s more powerful than Java’s
    version), pattern matching offers a rich set of “patterns” that can be used to
    match against. In this chapter, we’ll look at the anatomy of patterns and talk
    through some examples, including literal, constructor, and type query patterns.


    Pattern matching also provides the ability to deconstruct matched objects, giving
    you access to parts of a data structure. We’ll look at the mechanics of deconstruction:
    extractors, which are basically objects with the special method `unapply` implemented.


    ## Switching


    Let’s start by looking at the pattern match expression from earlier.


    ```

    val month = "August"

    val quarter = month match {

    case "January" | "February" | "March"    => "1st quarter"

    case "April" | "May" | "June"            => "2nd quarter"

    case "July" | "August" | "September"     => "3rd quarter"

    case "October" | "November" | "December" => "4th quarter"

    case _                                   => "unknown quarter"

    }

    ```


    There are several key differences between Java’s `switch` and Scala’s `match`
    expression.


    - There is no fall-through behavior between cases in Scala. Java uses `break`
    to avoid a fall-through but Scala breaks between each case automatically.

    - In Scala, a pattern match is an expression; it returns a value. Java switches
    must have side effects to be useful.

    - We can switch on a wider variety of things with Scala, not just primitives,
    enums, and strings. We can switch on objects, and things, that fit a “pattern”
    of our own design. In the example, we’re using “or” to build a richer match condition.


    Pattern matching also gives us the following:


    - The ability to guard the conditions of a match; using an `if`, we can enrich
    a case to match not only on the pattern (the part straight after the `case`) but
    also on some binary condition.

    - Exceptions for failed matches; when a value doesn’t match anything at runtime,
    Scala will throw a `MatchError` exception letting us know.

    - Optional compile-time checks: you can set it up so that if you forget to write
    a case to match all possible combinations, you’ll get a compiler warning. This
    is done using what’s called sealed traits.


    ## Patterns


    The anatomy of a match expression looks like this:


    ```

    value match {

    case pattern guard => expression

    ...

    case _             => default

    }

    ```


    We have a value, then the `match` keyword, followed by a series of match cases.
    The value can itself be an expression, a literal or even an object.


    Each case is made up of a pattern, optionally a guard condition, and the expression
    to evaluate on a successful match.


    You might add a default, catch-all pattern at the end. The underscore is our first
    example of an actual pattern. It’s the wildcard pattern and means “match on anything”.


    A pattern can be as follows:


    - A wildcard match (`_`).

    - A literal match, meaning equality, used for values such as `101` or `RED`.

    - A constructor match, meaning that a value would match if it could have been
    created using a specific constructor.

    - A deconstruction match, otherwise known as an extractor pattern.

    - A match based on a specific type, known as a type query pattern.

    - A pattern with alternatives (specified with `|`).


    Patterns can also include a variable name, which on matching will be available
    to the expression on the right-hand side. It’s what’s referred to as a variable
    ID in the language specification.


    There are some more which I’ve left off; if you’re interested see the Pattern
    Matching section of the Scala Language Specification.[¹](#A456960_1_En_16_Chapter.html#Fn15)


    ## Literal Matches


    A literal match is a match against any Scala literal. The following example uses
    a string literal and has similar semantics to a Java switch statement.


    ```

    val language = "French"

    value match {

    case "french" => println("Salut")

    case "French" => println("Bonjour")

    case "German" => println("Guten Tag")

    case _        => println("Hi")

    }

    ```


    The value must exactly match the literal in the case. In the example, the result
    will be to print “Bonjour” and not “Salut” as the match value has a capital `F`.
    The match is based on equality (`==`).'
