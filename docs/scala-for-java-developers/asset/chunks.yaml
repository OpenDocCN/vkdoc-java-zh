  trans: '

    ## 使用方法


    泛型。Scala 对泛型类型的协变和逆变提供了比 Java 更好的支持。这意味着当泛型类型作为参数使用时，你可以在方法签名中拥有更高的通用性和灵活性。暂时不必担心具体细节，后面会有专门一节来讲解变型。


    变型简述


    泛型类型的协变意味着，如果某个类型的泛型参数（尖括号中的部分，如 `<T>`）是某个类型的子类型，那么当该类型的参数是超类型时，该泛型类型本身也是另一个泛型类型的子类型。例如，假设
    `Cat extends Animal`，那么 `List<Cat>` 也是 `List<Animal>` 的（子类型）。逆变也保持了这种关系，但方向相反。Java
    不支持这种类型变型，但支持协变返回类型。在 Scala 和 Java 中，方法参数和变量也可以是协变或逆变的。


    可变参数。在处理方法时，Scala 和 Java 一样支持可变参数或 `varargs`。


    ```

    public void add(String... names)   // java

    def add(names: String*)            // scala

    ```


    命名方法参数。Java 不提供命名方法参数。在 Scala 中，只要你为参数命名，就可以不按顺序调用方法。因此，对于函数 `def swap(first:
    Int, second: Int)`，你可以显式地调用它，并为其参数命名。由于参数已命名，编译器可以区分它们，无论其位置如何。所以，以下写法都是正确的：


    ```

    swap(first = 3, second = 1)

    swap(second = 1, first = 3)

    ```


    默认值。你可以在参数声明后使用 `=` 添加默认值。例如，`def swap(first: Int, second: Int = 1)`。如果在调用函数时省略第二个值，它将默认为
    `1`。你仍然可以提供值来覆盖默认值，并且仍然可以使用命名参数。


    ```

    swap(3)

    swap(3, 2)

    swap(first = 3)

    swap(first = 3, second = 1)

    ```


    函数字面量。函数字面量只是一个创建匿名函数的表达式。你可以将它们存储为变量、传递它们，或将它们传入方法。即时创建它们意味着你可以创建简洁的功能片段，而无需样板代码。函数字面量是引用
    lambda 的一种方式。


    Lambda 表达式。Scala 支持 lambda 表达式或匿名函数。你可以将函数字面量作为参数传递给方法，并在方法签名中使用函数签名作为参数。因此，下面的
    `test` 方法接受一个无参数、返回 `Boolean` 的函数。


    ```

    def test(f: () => Boolean) = ...

    ```


    当你调用它时，可以传入一个函数字面量作为参数。


    ```

    test(() => if (!tuesday) true else false)

    ```


    再举一个例子，你可以创建一个函数签名来表示一个从 `String` 值到 `Boolean` 的函数，如下所示：


    ```

    def test(f: String => Boolean): Boolean = ...

    ```


    ……然后像这样用一个函数字面量调用它：


    ```

    test(value => if (value == "tuesday") true else false)

    ```


    ## 函数式编程


    还有一些 Scala 特性更侧重于函数式编程。


    模式匹配。这是一个非常强大的特性，乍一看类似于 switch 语句，但用途远不止于此。


    for 推导式。这与常规的 for 循环有细微差别，并且在处理函数式结构时非常有用。当你第一次遇到它们时，它们看起来像是 Java 的 `for` 循环的另一种语法。


    柯里化。虽然你可以在任何语言中编写自己的柯里化函数，但 Scala 将柯里化作为语言特性来支持。如果你不确定什么是柯里化，现在不必担心。更多细节请参见柯里化部分。


    函数字面量。该语言支持字面量来表示一些有用的类型，例如元组。流行的 Java 函数式库，如 totally-lazy¹ 或 functional-java²，都有这类东西；而
    Scala 只是让它们更容易使用。


    递归。大多数语言都支持递归，但 Scala 的编译器支持尾调用优化，这意味着它可以支持在 Java 等语言中会导致栈溢出的递归调用。如果你使用 `@tailrec`
    注解，编译器甚至可以为你执行一些检查。


    脚注 1


    [`http://totallylazy.com/`](http://totallylazy.com/)


      2


    [`http://www.functionaljava.org/`](http://www.functionaljava.org/)


    # 7. 总结


    在这次高层概览中，我们讨论了 Scala 如何既是一门面向对象语言，又是一门函数式语言。我提到 Scala 实际上只有对象；没有基本类型，一切都是对象。


    我们讨论了 Scala 的背景，它如何从一门学术语言发展成为一门有商业支持的主流语言，以及它如何在 JVM 上运行。从理论上讲，这通过使其易于部署到现有服务器上，降低了采用的门槛。


    在 JVM 上运行也意味着 Scala 有大量的库可用，因为 Java 互操作性是内建的。尽管一些工具相对落后，编译时间仍然较慢，但 Scala 已被广泛采用，我们看到许多大公司今天都在使用它。


    我们了解了如何安装和运行 Scala。你看到了 Scala 程序通常运行的三种方式，并在此过程中介绍了 Scala REPL。


    然后我们转向了语法概览，并查看了一些有趣的语言特性。


    在语法概览中，我们看到了如何定义变量和值、函数和方法，并看到了 Scala 如何通过类型推断和自动识别终止条件（如 `return` 和分号）来减少样板代码的噪音。


    我们看到了中缀表示法如何让你避免使用经典的点表示法，并且重要的是，我们看到了方法名可以包含符号。这就是我们能够在代码中自然地使用数学符号的原因；它们实际上是方法，所以我们可以重写它们，并使用中缀表示法，而无需使用嘈杂的点和括号。


    我们还使用了一些集合类型，并看到了枚举它们的两种基本方式：`foreach` 和 `for` 循环语法。我们看到了处理 Java 对象是多么容易；像 `Int`
    和 `Boolean` 这样的值类型在 Scala 和 Java 中基本相同。我们深入了解了 Scala 如何在其类层次结构中表示类型，并学习了如何在 ScalaDoc
    中查找信息。


    在语言特性方面，我们研究了在处理源文件和包、方法及方法参数时语言的一些有趣方面，以及一些面向函数式编程的特性。


    # 第二部分

    关键语法差异


    关键语法差异


    本书的这一部分是关于 Java 和 Scala 语言语法之间的关键差异。给定一些典型的 Java 代码，我们将查看等效的 Scala 语法。在第三部分中，我们将更多地研究
    Scala 中 Java 没有直接对应项的特性。


    我们将研究以下内容：


    *   许多与类和对象、创建类、字段和方法相关的内容。我们将进行从 Scala 生成的字节码回到 Java 的往返转换，以便让你了解 Scala 与 Java
    的关系。

    *   继承、接口、抽象类和混入。

    *   常见的控制结构，如 `for` 循环。

    *   泛型。

    '
- fmt: '# Flexibility


    Scala is very flexible. There are generally several ways to achieve the same thing.
    I don’t mean the difference between using a `while` loop or `for` loop; I mean
    that the language has different syntax options for expressing the same thing.
    This flexibility gives a lot of freedom but can be confusing when you’re reading
    code from different authors.


    An example is the infix notation we saw earlier. You can often drop the dots and
    brackets when calling methods. Scala is opinion-less; it’s up to you if you want
    to use the dots or not.


    Java, on the other hand, is very restrictive; there are generally very few ways
    to express the same things. It’s often easier to recognize things at a glance.
    You might have to work a little harder to recognize some of the more exotic syntax
    options in Scala.


    This is true when it comes to the structure of your code too; you can create functions
    within functions, import statements in the middle of a class, or have a class
    live in a file with an unrelated name. It can all be a little disorienting when
    you’re used to the rigidity of Java.


    ## Immutable and Declarative


    Because Scala favors immutability, you might also notice a different approach
    to solving problems. For example, you might notice a lack of looping over mutable
    variables. Scala programs usually favor more functional idioms to achieve the
    same thing.


    This more declarative way of doing things says “tell me what to do, not how to
    do it.” You may be more used to the Java/imperative way of doing things that says
    “tell me exactly how to do it”. Ultimately, when you give up the micro-management
    style of imperative programming, you allow the language more freedom in how it
    goes about its business.


    For example, a traditional imperative `for` loop in Java looks like this:


    ```java

    // java

    for (int count = 0; count < 100; count++) {

    System.out.println(count);

    }

    ```


    It’s a typical imperative loop. We’re telling it explicitly to enumerate serially
    from zero to one hundred. If, on the other hand, we use a more declarative mechanism,
    like this:


    ```scala

    // scala

    (0 to 100).foreach(println(_))

    ```


    …the enumeration is done within the `foreach` method, not by a language construct.
    We’re saying, “for a range of numbers, perform some function on each.” Although
    only subtly different, we’re not saying how to enumerate the sequence. It means
    Scala is free to implement the enumeration however it likes. It may choose to
    do it in parallel, for example.


    Interestingly, Oracle has adopted these ideas and since Java 8 offers similar
    `for` loop enumeration. The preceding code can be written in Java like this:


    ```java

    // java

    IntStream.range(0, 100).forEach(System.out::println)

    ```


    # 8. Classes and Fields


    In this chapter, we’ll have a look at the following:


    1. Creating classes.

    2. How Scala makes things easier when defining fields.

    3. What happens behind the scenes when Scala creates methods for you.


    ## Creating Classes


    Creating a class in Java means writing something like this:


    ```java

    // java

    public class Customer {

    }

    ```


    It makes sense for us to have a name and address for a customer. So, adding these
    as fields and initializing via the constructor would give us something like this:


    ```java

    // java

    public class Customer {

    private final String name;

    private final String address;

    public Customer(String name, String address) {

    this.name = name;

    this.address = address;

    }

    }

    ```


    We can instantiate an instance with the `new` keyword and create a new customer
    called Eric like this:


    ```java

    Customer eric = new Customer("Eric", "29 Acacia Road"); // java

    ```


    In Scala, the syntax is much briefer; we can combine the class and constructor
    on a single line.


    ```scala

    class Customer(val name: String, val address: String)   // scala

    ```


    We `new` it up in the same way, like this:


    ```scala

    val eric = new Customer("Eric", "29 Acacia Road")       // scala

    ```


    Rather than define the fields as members within the class, the Scala version declares
    the variables as part of the class definition in what’s known as the primary constructor.
    In one line, we’ve declared the class `Customer` and, in effect, declared a constructor
    with two arguments.'
