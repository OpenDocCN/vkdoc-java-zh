    你定义一个字段（这里是一个 `var`），Scala 就会神奇地为你创建一个 setter 方法。它创建的 setter 方法名为 `id_=`，而不是通常的
    `setId`。如果我们通过反编译器进行往返转换，会看到以下内容：


