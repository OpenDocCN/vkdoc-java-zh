    ## 异常


    Scala 中的异常处理方式与 Java 相同。它们在中断控制流和未处理时中止程序方面具有完全相同的机制。


    Scala 中的异常与 Java 中的异常一样，都继承自 `java.lang.Throwable`，但 Scala 没有受检异常的概念。从现有 Java
    库中抛出的所有受检异常都会被转换为 `RuntimeExceptions`。你抛出的任何异常都不需要处理就能让编译器满意；Scala 中的所有异常都是运行时异常（见图
    12-2）。


    ![A456960_1_En_12_Fig2_HTML.jpg](img/A456960_1_En_12_Fig2_HTML.jpg)


    图 12-2


    Java 异常层次结构。Scala 不使用受检异常。


    捕获异常使用模式匹配，就像我们之前看到的 match 表达式一样。在 Java 中，你可能会这样做来获取网页内容：


    ```

    // java

    try {

    URL url = new URL("http://baddotrobot.com");

    BufferedReader reader = new BufferedReader(

    new InputStreamReader(url.openStream()));

    try {

    String line;

    while ((line = reader.readLine()) != null)

    System.out.println(line);

    } finally {

    reader.close();

    }

    } catch (MalformedURLException e) {

    System.out.println("Bad URL");

    } catch (IOException e) {

    System.out.println("Problem reading data: " + e.getMessage());

    }

    ```


    我们从一个要尝试下载的 URL 开始。这可能会抛出 `MalformedURLException`。由于它是一个受检异常，我们被迫处理它。然后我们创建一个
    `Reader` 并从 URL 打开一个流准备读取。这可能会抛出另一个异常，所以我们也被迫处理它。


    当我们开始读取时，`readLine` 方法也可能抛出异常，但这由现有的 catch 处理。为了确保在发生异常时正确清理资源，我们在 `finally` 块中关闭
    reader。


    如果我们想使用 Java 7 的 try-with-resources 结构，就可以避免使用 `finally` 子句。try-with-resources
    语法会自动调用 reader 的 `close` 方法。


    ```

    // java

    try {

    URL url = new URL("http://baddotrobot.com");

    try (BufferedReader reader = new BufferedReader(

    new InputStreamReader(url.openStream()))) {

    String line;

    while ((line = reader.readLine()) != null)

    System.out.println(line);

    }

    } catch (MalformedURLException e) {

    System.out.println("Bad URL");

    } catch (IOException e) {

    System.out.println("Problem reading data: " + e.getMessage());

    }

    ```


    在 Scala 中，情况看起来几乎一样。


    ```

    // scala

    try {

    val url = new URL("http://baddotrobot.com")

    val reader = new BufferedReader(new InputStreamReader(url.openStream))

    try {

    var line = reader.readLine

    while (line != null) {

    line = reader.readLine

    println(line)

    }

    } finally {

    reader.close()

    }

    } catch {

    case e: MalformedURLException => println("Bad URL")

    case e: IOException => println(e.getMessage)

    }

    ```


    我们像之前一样创建 URL。虽然它可能抛出异常，但我们并不强制捕获它。这是一个 Java 受检异常，但 Scala 将其转换为运行时异常。


    虽然我们不是必须捕获，但我们确实想要处理这些异常。因此，我们使用熟悉的 `try` 和 `catch` 语句。在 catch 中，使用 match 表达式处理异常。如果我们实际上不需要代码块中的异常，可以通过将变量名替换为下划线来调整模式。这意味着我们只关心类，而不关心变量。


    ```

    case _: MalformedURLException => println("Bad URL")

    ```


    我们只需要把 `finally` 块加回来。`finally` 与 Java 中的完全一样。Scala 中没有与 try-with-resources 等价的结构，尽管你可以编写自己的方法来实现相同的效果。（提示：使用类似
    Loan 模式的东西。）


    # 13. 泛型


    在本章中，我们将学习 Scala 中的泛型，也称为类型参数化或泛型编程。我们将学习以下内容：


    *   泛型的语法：定义类型和方法。

    *   有界类型，`extends` 和 `super`。

    *   Java 和 Scala 中的通配符。

    *   协变和逆变。


    ## 参数化多态


    我们简要讨论过子类型多态或包含多态；其思想是子类型可以替代其超类型。这些替代品可以在不改变代码结构的情况下提供不同的行为。多态的类型包括：


    *   包含多态（见第 11 章，继承）。

    *   特设多态（基本上就是方法重载）。

    *   参数化多态。


    参数化多态允许我们编写不依赖于特定类型的通用代码，同时仍然保持类型安全。当我们使用适用于多种类型的类时，我们一直在使用它。例如：


    ```

    List customers = new ArrayList();       // java

    ```


    如果你曾经在 Java 中创建过某种对象的列表，那么你对参数化多态应该很熟悉。它通常被称为泛型；通过为泛型类型（如 `List`）提供一个参数化类型，我们可以将其视为一个列表，同时以类型安全的方式引用其内容。即使在
    Java 中不指定参数化类型，泛型也在起作用。因此，尽管你可以编写以下代码：


    ```

    List collection = new ArrayList();                  // java

    ```


    ……实际上你创建的是一个类型为 `Object` 的泛型 `List`。


    ```

    List collection = new ArrayList();        // java

    ```


    菱形运算符


    你可以在 Java 中像这样创建一个 `Object` 列表：


    ```

    List collection = new ArrayList();

    ```


    赋值右侧的菱形运算符（<>）是 Java 7 中的新特性，在 Java 7 之前，你必须在右侧重复泛型类型声明。


    ### 类泛型


    当你创建一个特定类型的列表时，Java 会在接受参数和返回该类型对象的 `List` 方法上提供类型安全。例如，创建一个客户列表，然后尝试添加一个不是客户的对象会导致编译失败。


    ```

    List customers = new ArrayList();

    customers.add(new HockeyPuck());                // 编译失败

    ```


    Scala 的基本语法对 Java 开发者来说会很熟悉；我们只需将尖括号替换为方括号。


    ```

    List customers = new ArrayList();   // java

    ```


    对比


    ```

    val customers: List[Customer] = List()          // scala

    ```


    像这样在 Scala 中创建列表也表明它具有与菱形运算符等价的功能。Scala 的类型推断可以推断出 `customers` 的类型是 `Customer`，而无需在右侧重复泛型。


    ```

    val customers: List[Customer] = List[Customer]()

    ^

    // 无需重复类型

    ```


    ### 方法泛型


    你可以以类似的方式为方法定义泛型参数。要为方法定义一个泛型参数而不为整个类定义泛型类型，在 Java 中你可以这样做，其中泛型类型紧跟在 `public`
    关键字之后定义，并用作参数 `a` 的类型。


    ```

    public  void add(A a)                 // java

    ```


    ……而在 Scala 中则是这样：


    ```

    def addA                         // scala

    ```

