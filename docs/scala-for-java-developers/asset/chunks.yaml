- fmt: '# Singleton Objects


    In Java you can enforce a single instance of a class using the singleton pattern.
    Scala has adopted this idea as a feature of the language itself: as well as classes,
    you can define (singleton) objects.


    The downside is that when we talk about “objects” in Scala, we’re overloading
    the term. We might mean an instance of a class (for example, a `new ShoppingCart()`,
    of which there could be many) or we might mean the one and only instance of a
    class; that is, a singleton object.


    A typical use-case for a singleton in Java is if we need to use a single logger
    instance across an entire application.


    ```java

    Logger.getLogger().log(INFO, "Everything is fine.");

    ```


    We might implement the singleton like this:


    ```java

    public final class Logger {

    private static final Logger INSTANCE = new Logger();

    private Logger() { }

    public static Logger getLogger() {

    return INSTANCE;

    }

    public void log(Level level, String string) {

    System.out.printf("%s %s%n", level, string);

    }

    }

    ```


    We create a `Logger` class, and a single static instance of it. We prevent anyone
    else creating one by using a private constructor. We then create an accessor to
    the static instance, and finally give it a rudimentary log method. We’d call it
    like this:


    ```java

    Logger.getLogger().log(INFO, "Singleton loggers say YEAH!");

    ```


    A more concise way to achieve the same thing in Java would be to use an enum.


    ```java

    public enum LoggerEnum {

    LOGGER;

    public void log(Level level, String string) {

    System.out.printf("%s %s%n", level, string);

    }

    }

    ```


    We don’t need to use an accessor method; Java ensures a single instance is used
    and we’d call it like this:


    ```java

    LOGGER.log(INFO, "An alternative example using an enum");

    ```


    Either way, they prevent clients newing up an instance of the class and provide
    a single, global instance for use.


    The Scala equivalent would look like this:


    ```scala

    object Logger {

    def log(level: Level, string: String) {

    printf("%s %s%n", level, string)

    }

    }

    ```


    The thing to notice here is that the singleton instance is denoted by the `object`
    keyword rather than `class`. So, we’re saying “define a single object called `Logger`”
    rather than “define a class”.


    Under the covers, Scala is creating basically the same Java code as our singleton
    pattern example. You can see this when we decompile it.


    ```java

    1   // decompiled from scala to java

    2   public final class Logger$ {

    3       public static final Logger$ MODULE$;


    5       public static {

    6           new scala.demo.singleton.Logger$();

    7       }


    9       public void log(Level level, String string) {

    10           Predef..MODULE$.printf("%s %s%n", (Seq)Predef..MODULE$

    11           .genericWrapArray((Object)new Object[]{level, string}));

    12       }


    14       private Logger$() {

    15           Logger$.MODULE$ = this;

    16       }

    17   }

    ```


    There are some oddities in the `log` method, but that’s the decompiler struggling
    to decompile the bytecode, and generally how Scala goes about things. In essence
    though, it’s equivalent; there’s a private constructor like the Java version,
    and a single static instance of the object. The class itself is even final.


    There’s no need to new up a new `Logger`; `Logger` is already an object, so we
    can refer to it directly. In fact, you couldn’t new one up if you wanted to, because
    the generated constructor is private.


    A method on a Scala object is equivalent to static methods in Java. An example
    is the static `main` method on a Java class that can be executed by the runtime.
    You create a `main` method in a Scala singleton object, not a class to replicate
    the behavior.


    # Companion Objects


    You can combine objects and classes in Scala. When you create a class and an object
    with the same name in the same source file, the object is known as a companion
    object.


    Scala doesn’t have a `static` keyword but members of singleton objects are effectively
    static. Remember that a Scala singleton object is just that, a singleton. Any
    members it contains will therefore be reused by all clients using the object;
    they’re globally available just like statics.


    You use companion objects where you would mix statics and non-statics in Java.


    The Java version of `Customer` has fields for the customer’s name and address,
    and an ID to identify the customer uniquely.


    ```java

    public class Customer {

    private final String name;

    private final String address;

    private Integer id;

    public Customer(String name, String address) {

    this.name = name;

    this.address = address;

    }

    }

    ```


    Now we may want to create a helper method to create the next ID in a sequence.
    To do that globally, we create a static field to capture a value for the ID and
    a method to return and increment it. We can then just call the method on construction
    of a new instance, assigning its ID to the freshly incremented global ID.


    ```java

    public class Customer {

    private static Integer lastId;

    private final String name;

    private final String address;

    private Integer id;

    public Customer(String name, String address) {

    this.name = name;

    this.address = address;

    this.id = Customer.nextId();

    }

    private static Integer nextId() {

    return lastId++;

    }

    }

    ```


    It’s static because we want to share its implementation among all instances to
    create globally unique IDs for each.


    In Scala, we’d separate the static from non-static members and put the statics
    in the singleton object and the rest in the class. The singleton object is the
    companion object to `Customer`.


    We create our class with the two required fields and in the singleton object,
    create the `nextId` method. Next, we create a private `var` to capture the current
    value, assigning it the value of zero so Scala can infer the type as an `Integer`.
    Adding a `val` here means no setter will be generated, and adding the `private`
    modifier means the generated getter will be private. We finish off by implementing
    the increment in the `nextId` method and calling it from the primary constructor.


    ```scala

    class Customer(val name: String, val address: String) {

    private val id = Customer.nextId()

    }

    object Customer {

    private var lastId = 0

    private def nextId(): Integer = {

    lastId += 1

    lastId

    }

    }

    ```


    The singleton object is a companion object because it has the same name and lives
    in the same source file as its class. This means the two have a special relationship
    and can access each other’s private members. That’s how the `Customer` object
    can define the `nextId` method as private but the `Customer` class can still access
    it.


    If you were to name the object differently, you wouldn’t have this special relationship
    and wouldn’t be able to call the method. For example, the class `CustomerX` object
    that follows is not a companion object to `Customer` and so can’t see the private
    `nextId` method.


    ```scala

    class Customer(val name: String, val address: String) {

    private val id = CustomerX.nextId()         // compiler failure

    }

    object CustomerX {

    private var lastId = 0

    private def nextId(): Integer = {

    lastId += 1

    lastId

    }

    }

    ```'
