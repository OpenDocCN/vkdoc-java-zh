- fmt: '# Bottom Types


    A new notion to many Java developers will be the idea that a class hierarchy can
    have common bottom types. These are types that are subtypes of all types. Scala’s
    types `Null` and `Nothing` are both bottom types.


    All reference types in Scala are super-types of `Null`. `Null` is also an `AnyRef`
    object; it’s a subclass of every reference type (see Figure [4-5](#A456960_1_En_4_Chapter.html#Fig5)).


    ![A456960_1_En_4_Fig5_HTML.jpg](A456960_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    `Null` extends `AnyRef`


    Both value and reference types are super-types of `Nothing`. It’s at the bottom
    of the class hierarchy and is a subtype of all types, as shown in Figure [4-6](#A456960_1_En_4_Chapter.html#Fig6).


    ![A456960_1_En_4_Fig6_HTML.jpg](A456960_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    `Nothing` extends `Null`


    Notice that `Null` extends all reference types and that `Nothing` extends all
    types. It’s worth noting that `null` in Scala is an object and the single instance
    of the `Null` type. Because `Null` is a bottom type, `null` can be assigned to
    any reference type (`AnyRef`) but not subtypes of `AnyVal`.


    This is valid:


    ```

    val x: String = null

    ```


    …but attempting to assign `null` to a `Double` (which extends `AnyVal`) causes
    a compiler error.


    ```

    val x: Double = null         // compiler error

    ```


    The entire hierarchy is shown in Figure [4-7](#A456960_1_En_4_Chapter.html#Fig7).


    ![A456960_1_En_4_Fig7_HTML.jpg](A456960_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Full hierarchy with the bottom types `Null` and `Nothing`


    # 5. ScalaDoc


    Scala has ported the idea of JavaDoc and creatively called it ScalaDoc. Adding
    ScalaDoc to your Scala source works similarly to adding JavaDoc, and is done with
    markup in comments (see Figure [5-1](#A456960_1_En_5_Chapter.html#Fig1)). For
    example, the following fragment in source code


    ```

    /** Returns `true` if this value is equal to x, `false` otherwise. **/

    def ==(x: Byte): Boolean

    ```


    …can be turned into the following fragment in HTML:


    ![A456960_1_En_5_Fig1_HTML.jpg](A456960_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Embedded ScalaDoc markup gets rendered in HTML


    To see the documentation for the Scala Library API, head over to the Scala website.[¹](#A456960_1_En_5_Chapter.html#Fn5)
    You’ll notice it is broadly similar to JavaDoc. You can see the classes along
    the left; they’re not grouped by package like in JavaDoc but they’re clickable
    to get more information.


    ![A456960_1_En_5_Fig2_HTML.jpg](A456960_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The basic ScalaDoc for `Char`


    A neat feature of ScalaDoc is that you can also filter the content. For example,
    you can show only methods inherited from `Any`.


    If you’re interested in the hierarchy of a class, you can look at its super-types
    and subtypes. You may even see a navigable diagram of the type hierarchy, although
    not every class has this. The type hierarchy diagram for `Source` in Figure [5-3](#A456960_1_En_5_Chapter.html#Fig3)
    shows it is a subtype of `Iterable` and `Closable`, and you can navigate up through
    the hierarchy by clicking on the diagram.


    ![A456960_1_En_5_Fig3_HTML.jpg](A456960_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    ScalaDoc showing the type hierarchy diagram Footnotes [1](#A456960_1_En_5_Chapter.html#Fn5_source)


    [`http://docs.scala-lang.org/api/all.html`](http://docs.scala-lang.org/api/all.html)


    # 6. Language Features


    On our tour we’ve seen some example syntax, walked through the class hierarchy,
    and briefly looked at ScalaDoc, but Scala offers heaps of other interesting language
    features.


    In this chapter, we won’t really talk about syntax but we’ll discuss some of the
    things that make Scala an interesting and powerful language when working with
    source code, working with methods, and using its functional programming features.


    ## Working with Source Code


    **Source Files.** What you put in source files is much more flexible in Scala
    than in Java. While in Java a file must be named the same as the public class
    it contains, there’s no such restriction for `.scala` files. A file called `Customer.scala`
    might contain a class called `Customer`, but it doesn’t have to. Similarly, it
    might contain four classes, none of which is called `Customer`.


    **Packages.** Although essentially the same thing as in Java, classes in packages
    don’t have to live in folders of the same name like they do in Java. There are
    some differences in scoping—for example, there’s no `protected` keyword in Scala
    but you can use special syntax (`variable[package]`) to achieve the same thing.


    **Package objects.** Scala also has the idea of package objects. These are objects
    that you can put useful chunks of code in, for reuse within the package scope.
    They’re available to other classes in the package, and if someone imports that
    package, everything within the package object is available to them too. Libraries
    often use these to allow you to import all their classes in one go.


    **Import alias.** Imports are about the same as in Java, but once you’ve imported
    a class in Scala, you can rename it within your class. In other words, you can
    create an alias for a class within your class. This can be useful when you’ve
    got a name clash—for example, between libraries.


    **Type aliases.** Scala also supports type aliases. You can give an alias to a
    complex type definition to help clarify the intent. It’s similar to a structureless
    `typedef` or `#define` macro in C, or what’s called type synonyms in Haskell.


    **Traits.** Although Scala has classes and objects, there is no “interface” keyword.
    Instead, there is the idea of a `trait` that is similar to an interface but can
    have methods. It’s somewhere between Java 8’s default methods and Ruby’s mixins.'
