- fmt: '# The Scala Interpreter


    Before working with an IDE, it’s probably worth getting familiar with the Scala
    interpreter, or REPL.


    Download the latest Scala binaries (from [`http://scala-lang.org/downloads`](http://scala-lang.org/downloads))
    and extract the archive. Assuming you have Java installed, you can start using
    the interpreter from a command prompt or terminal window straight away. To start
    up the interpreter, navigate to the exploded folder and type[¹](#A456960_1_En_2_Chapter.html#Fn3)


    ```

    bin/scala

    ```


    You’ll be faced with the Scala prompt.


    ```

    scala> _

    ```


    You can type commands followed by `enter`, and the interpreter will evaluate the
    expression and print the result. It reads, evaluates, and prints in a loop so
    it’s known as a REPL.


    If you type `42*4` and hit `enter`, the REPL evaluates the input and displays
    the result.


    ```

    scala> 42*4

    res0: Int = 168

    ```


    In this case, the result is assigned to a variable called `res0`. You can go on
    to use this, for example, to get half of `res0`.


    ```

    scala> res0 / 2     res1: Int = 84

    ```


    The new result is assigned to `res1`.


    Notice the REPL also displays the type of the result: `res0` and `res1` are both
    integers (`Int`). Scala has inferred the types based on the values.


    If you add `res1` to the end of a string, no problem; the new result object is
    a string.


    ```

    scala> "Hello Prisoner " + res1  res2: String = Hello Prisoner 84

    ```


    To quit the REPL, type


    ```

    :quit

    ```


    The REPL is a really useful tool for experimenting with Scala without having to
    go to the effort of creating the usual project files. It’s so useful that the
    community provided a Java REPL[²](#A456960_1_En_2_Chapter.html#Fn4) as far back
    as 2013. Interestingly, Oracle followed suit and introduced the official Java
    REPL called JShell in Java 9 in 2017.


    ## Scala Scripts


    The creators of Scala originally tried to promote the use of Scala from Unix shell
    scripts. As competition to Perl, Groovy, or bash scripts on Unix environments
    it didn’t really take off, but if you want to you can create a shell script to
    wrap Scala.


    ```

    1   #!/bin/sh

    2   exec scala "$0" "$@"

    3   !#

    4   object HelloWorld {

    5     def main(args: Array[String]) {

    6       println("Hello, " + args.toList)

    7     }

    8   }

    9   HelloWorld.main(args)

    ```


    Don’t worry about the syntax or what the script does (although I’m sure you’ve
    got a pretty good idea already). The important thing to note is that some Scala
    code has been embedded in a shell script and that the last line is the command
    to run.


    You’d save it as a `.sh` file—for example, `hello.sh`—and execute it like this:


    ```

    ./hello.sh World!

    ```


    The `exec` command on line 2 spawns a process to call `scala` with arguments;
    the first is the script filename itself (`hello.sh`) and the second is the arguments
    to pass to the script. The whole thing is equivalent to running Scala like this,
    passing in a shell script as an argument:


    ```

    scala hello.sh World!

    ```


    ## `scalac`


    If you’d prefer, you can compile `.scala` files using the Scala compiler.


    The `scalac` compiler works just like `javac`. It produces Java bytecode that
    can be executed directly on the JVM. You run the generated bytecode with the `scala`
    command. Just like Java though, it’s unlikely you’ll want to build your applications
    from the command line.


    All the major IDEs support Scala projects, so you’re more likely to continue using
    your favorite IDE. We’re not going to go into the details of how to set up a Scala
    project in each of the major IDEs; if you’re familiar with creating Java projects
    in your IDE, the process will be very similar.


    For reference though, here are a few starting points.


    *   You can create bootstrap projects with Maven and the `maven-scala-plugin`.

    *   You can create a new Scala project directly within IntelliJ IDEA once you’ve
    installed the `scala` plugin (available in the JetBrains repository).

    *   Similarly, you can create a new Scala project directly within Eclipse once
    you have the Scala IDE plugin. Typesafe created this and it’s available from the
    usual update sites. You can also download a bundle directly from the scala-lang
    or scala-ide.org sites.

    *   You can use SBT and create a build file to compile and run your project. SBT
    stands for Simple Build Tool and it’s akin to Ant or Maven, but for the Scala
    world.

    *   SBT also has plugins for Eclipse and IDEA, so you can use it directly from
    within the IDE to create and manage the IDE project files.


    Footnotes [1](#A456960_1_En_2_Chapter.html#Fn3_source)


    If you don’t want to change into the install folder to run the REPL, set the `bin`
    folder on your path.


    [2](#A456960_1_En_2_Chapter.html#Fn4_source)


    [`http://www.javarepl.com/`](http://www.javarepl.com/)


    # 3. Some Basic Syntax


    ## Defining Values and Variables


    Let’s look at some syntax. We’ll start by creating a variable:


    ```

    val language: String = "Scala"

    ```


    We’ve defined a variable as a `String` and assigned to it the value of “Scala.”
    I say “variable,” but we’ve actually created an immutable value rather than a
    variable. The `val` keyword creates a constant, and `language` cannot be modified
    from this point on. Immutability is a key theme you’ll see again and again in
    Scala.


    If we will want to modify `language` later, we can use `var` instead of `val`.
    We can then reassign it if we need to.


    ```

    var language: String = "Java"

    language = "Scala"

    ```


    So far, this doesn’t look very different from Java. In the variable definition,
    the type and variable name are the opposite way around compared to Java, but that’s
    about it. Scala uses type inference heavily, so Scala can work out that the `var`
    above is a `String`, even if we don’t tell it.


    ```

    val language = "Scala"

    ```


    Notice that a semicolon isn’t needed to terminate lines. The Scala compiler can
    generally work out when an expression is finished without needing to tell it explicitly.
    You only need to add semicolons when you use multiple expressions on the same
    line.


    Operator precedence is just as you’d expect in Java. In the following example,
    the multiplication happens before the subtraction.


    ```

    scala> val age = 35

    scala> var maxHeartRate = 210 - age * .5

    res0: Double = 192.5

    ```'
