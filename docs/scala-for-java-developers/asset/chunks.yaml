    ### Converting Anonymous Classes to Lambdas


    In the Java version of the `sort` method , we could use a lambda to effectively
    create an instance of `Comparable`. The syntax is new in Java 8 and in this case,
    is an alternative to creating an anonymous instance in-line.


    ```

    // java

    customers.sort((first, second) -> second.total().compareTo(first.total()));

    ```


    To make the Scala version more like the Java one, we’d need to pass in a lambda
    instead of the anonymous instance of `Ordering`. Scala supports lambdas so we
    can pass anonymous functions directly into other functions, but the signature
    of the `sort` method wants an `Ordering`, not a function.


    Luckily, we can coerce Scala into converting a lambda into an instance of `Ordering`
    using an implicit conversion.[¹](#A456960_1_En_11_Chapter.html#Fn10) All we need
    to do is create a converting method that takes a lambda or function and returns
    an `Ordering`, and mark it as `implicit`. The `implicit` keyword tells Scala to
    try and use this method to convert from one to the other if otherwise things wouldn’t
    compile.


    ```

    // scala

    implicit def functionToOrdering[A](f: (A, A) => Int): Ordering[A] = {

    new Ordering[A] {

    def compare(a: A, b: A) = f.apply(a, b)

    }

    }

    ```


    The signature takes a function and returns an `Ordering[A]`. The function itself
    has two arguments and returns an `Int`. So, our conversion method is expecting
    a function with two arguments of type `A`, returning an `Int` (`(A, A) => Int`).


    Now we can supply a function literal to the `sorted` method that would otherwise
    not compile. As long as the function conforms to the `(A, A) => Int` signature,
    the compiler will detect that it can be converted to something that does compile
    and call our `implicit` method to do so. We can therefore modify the `sort` method
    of `CustomersSortableBySpend` like this:


    ```

    // scala

    this.toList.sorted((a: Customer, b: Customer) => b.total.compare(a.total))

    ```


    …passing in a lambda rather than an anonymous class. It’s similar to the following
    equivalent Java version and means we don’t need the `BasketTotalDescending` object
    anymore.


    ```

    // java

    list.sort((first, second) -> first.compareTo(second));

    ```


    ### Concrete Fields on Traits


    We’ve looked at default methods on traits , but Scala also allows you to provide
    default values. You can specify fields in traits.


    ```

    // scala

    trait Counter {

    var count = 0

    def increment()

    }

    ```


    Here, `count` is a field on the trait. All classes that extend `Counter` will
    have their own instance of `count` copied in. It’s not inherited—it’s a distinct
    value specified by the trait as being required and supplied for you by the compiler.
    Subtypes are provided with the field by the compiler and it’s initialized (based
    on the value in the trait) on construction.


    For example, `count` is magically available to the following class and we’re able
    to increment it in the `increment` method.


    ```

    // scala

    class IncrementByOne extends Counter {

    override def increment(): Unit = count += 1

    }

    ```


    In this example, `increment` is implemented to multiply the value by some other
    value on each call.


    ```

    // scala

    class ExponentialIncrementer(rate: Int) extends Counter {

    def increment(): Unit = if (count == 0) count = 1 else count *= rate

    }

    ```


    Incidentally, we can use `protected` on the `var` in `Counter` and it will have
    similar schematics as `protected` in Java. It gives visibility to subclasses but,
    unlike Java, not to other types in the same package. It’s slightly more restrictive
    than Java. For example, if we change it and try to access the `count` from a non-subtype
    in the same package, we won’t be allowed.


    ```

    // scala

    trait Counter {

    protected var count = 0

    def increment()

    }

    class NotASubtype {

    val counter = new IncrementByOne()            // a subtype of Counter but

    counter.count                                 // count is now inaccessible

    }

    ```


    ### Abstract Fields on Traits


    You can also have abstract values on traits by leaving off the initializing value.
    This forces subtypes to supply a value.


    ```

    // scala

    trait Counter {

    protected var count: Int                     // abstract

    def increment()

    }

    class IncrementByOne extends Counter {

    override var count: Int = 0                  // forced to supply a value

    override def increment(): Unit = count += 1

    }

    class ExponentialIncrementer(rate: Int) extends Counter {

    var count: Int = 1

    def increment(): Unit = if (count == 0) count = 1 else count *= rate

    }

    ```


    Notice that `IncrementByOne` uses the `override` keyword whereas `ExponentialIncrementer`
    doesn’t. For both fields and abstract methods, `override` is optional.


    ## Abstract Classes


    Vanilla abstract classes are created in Java with the `abstract` keyword. For
    example, we could write another version of our `Customer` class but this time
    make it abstract. We could also add a single method to calculate the customer’s
    basket value and mark that as `abstract`.


    ```

    // java

    public abstract class AbstractCustomer {

    public abstract Double total();

    }

    ```


    In the subclass, we could implement our discounted basket like this:


    ```

    // java

    public class DiscountedCustomer extends AbstractCustomer {

    private final ShoppingBasket basket = new ShoppingBasket();

    @Override

    public Double total() {

    return basket.value() * 0.90;

    }

    }

    ```


    In Scala, you still use the `abstract` keyword to denote a class that cannot be
    instantiated. However, you don’t need it to qualify a method; you just leave the
    implementation off.


    ```

    // scala

    abstract class AbstractCustomer {

    def total: Double         // no implementation means it’s abstract

    }

    ```


    Then we can create a subclass in the same way we saw earlier. We use `extends`
    like before and simply provide an implementation for the `total` method. Any method
    that implements an abstract method doesn’t require the `override` keyword in front
    of the method, although it is permitted.


    ```

    // scala

    class HeavilyDiscountedCustomer extends AbstractCustomer {

    private final val basket = new ShoppingBasket

    def total: Double = {

    return basket.value * 0.90

    }

    }

