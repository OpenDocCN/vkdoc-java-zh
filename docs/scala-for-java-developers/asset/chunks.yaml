    raw"a\nb"                                      // a\nb

    ```


    ### Apply 方法


    ```

    val bob = Customer .apply("Bob")                   // 用作工厂方法

    val bob = Customer ("Bob")                         // 无需显式调用

    val array = Array (1, 54, 23, 545, 23)

    array.apply(0)                                    // 对数组应用 apply 是"getter"

    array(0)                                          // 结果是 "1"

    ```


    ### Update 方法


    ```

    val array = Array (1, 54, 23, 545, 23)

    array(0)                                          // 结果是 "1"

    array.update(0, 34)

    array(0)                                          // 结果是 "34"

    array(0) = 55                                     // = 是 update 的快捷方式

    array(0)                                          // 结果是 "55"

    ```

