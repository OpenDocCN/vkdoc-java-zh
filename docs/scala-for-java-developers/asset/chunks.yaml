- fmt: '# Constructor Matches


    Constructor patterns allow you to match a case against how an object was constructed.
    Let’s say we have a `SuperHero` class that looks like this:


    ```

    case class

    SuperHero(heroName: String, alterEgo: String, powers: List[String])

    ```


    It’s a regular class with three constructor arguments, but the keyword `case`
    at the beginning designates it as a case class. For now, that just means that
    Scala will automatically supply a bunch of useful methods for us, like `hashCode`,
    `equals`, and `toString`.


    Given the class and its fields, we can create a match expression like this:


    ```

    1   object BasicConstructorPatternExample extends App {

    2     val hero =

    3       new SuperHero("Batman", "Bruce Wayne", List("Speed", "Agility"))


    5     hero match {

    6       case SuperHero(_, "Bruce Wayne", _) => println("I''m Batman!")

    7       case SuperHero(_, _, _)             => println("???")

    8     }

    9   }

    ```


    Using a constructor pattern, it will match for any `hero` whose `alterEgo` field
    matches the value “Bruce Wayne” and print “I’m Batman!”. For everyone else, it’ll
    print question marks.


    The underscores are used as placeholders for the constructor arguments; you need
    three on the second case (line 7) because the constructor has three arguments.
    The underscore means you don’t care what their values are. Putting the value “Bruce
    Wayne” on line 6 means you do care and that the second argument to the constructor
    must match it.


    With constructor patterns, the value must also match the type. Let’s say that
    `SuperHero` is a subtype of a `Person`, as shown in Figure [16-1](#A456960_1_En_16_Chapter.html#Fig1).


    ![A456960_1_En_16_Fig1_HTML.jpg](A456960_1_En_16_Fig1_HTML.jpg)


    Figure 16-1


    `SuperHero` is a subtype of `Person`


    If the `hero` variable was actually an instance of `Person` and not a `SuperHero`,
    nothing would match. In the case of no match, you’d see a `MatchError` exception
    at runtime. To avoid the `MatchError`, you’d need to allow non-`SuperHero` types
    to match. To do that, you could just use a wildcard as a default.


    ```

    object BasicConstructorPatternExample extends App {

    val hero = new Person("Joe Ordinary")

    hero match {

    case SuperHero(_, "Bruce Wayne", _) => println("I''m Batman!")

    case SuperHero(_, _, _)             => println("???")

    case _                              => println("I''m a civilian")

    }

    }

    ```


    Patterns can also bind a matched value to a variable. Instead of just matching
    against a literal (like “Bruce Wayne”) we can use a variable as a placeholder
    and access a matched value in the expression on the right-hand side. For example,
    we could ask the following question:


    - “What super-powers does an otherwise unknown person have, if they are a superhero
    with the alter ego Bruce Wayne?”


    ```

    1   def superPowersFor(person: Person) = {

    2     person match {

    3       case SuperHero(_, "Bruce Wayne", powers) => powers

    4       case _                                   => List()

    5     }

    6   }


    8   println("Bruce has the following powers " + superPowersFor(person))

    ```


    We’re still matching only on types of `SuperHero` with a literal match against
    their alter ego, but this time the underscore in the last position on line 3 is
    replaced with the variable `powers`. This means we can use the variable on the
    right-hand side. In this case, we just return it to answer the question.


    Variable binding is one of pattern matching’s key strengths. In practice, it doesn’t
    make much sense to use a literal value like “Bruce Wayne” as it limits the application.
    Instead, you’re more likely to replace it with either a variable or wildcard pattern.


    ```

    object HeroConstructorPatternExample extends App {

    def superPowersFor(person: Person) = {

    person match {

    case SuperHero(_, _, powers) => powers

    case _                       => List()

    }

    }

    }

    ```


    You’d then use values from the match object as input. To find out what powers
    Bruce Wayne has, you’d pass in a `SuperHero` instance for Bruce.


    ```

    val bruce =

    new SuperHero("Batman", "Bruce Wayne", List("Speed", "Agility"))

    println("Bruce has the following powers: " + superPowersFor(bruce))

    ```


    The example is a little contrived as we’re using a match expression to return
    something that we already know. But as we’ve made the `superPowersFor` method
    more general purpose, we could also find out what powers any superhero or regular
    person has.


    ```

    val steve =

    new SuperHero("Capt America", "Steve Rogers", List("Tactics", "Speed"))

    val jayne = new Person("Jayne Doe")

    println("Steve has the following powers: " + superPowersFor(steve))

    println("Jayne has the following powers: " + superPowersFor(jayne))

    ```


    Constructor Patterns


    Note that constructor patterns work on case classes out of the box. Technically,
    this is because they automatically implement a special method called `unapply`.
    We’ll see shortly how you can implement your own and achieve the same kind of
    thing for non-case classes.


    ## Type Query


    Using a constructor pattern, you can implicitly match against a type and access
    its fields. If you don’t care about the fields, you can use a type query to match
    against just the type.


    For example, we could create a method `nameFor` to give us a person or superhero’s
    name, and call it with a list of people. We’d get back either their name, or if
    they’re a superhero, their alter ego.


    ```

    1   object HeroTypePatternExample extends App {


    3     val batman =

    4       new SuperHero("Batman", "Bruce Wayne", List("Speed", "Agility"))

    5     val cap =

    6       new SuperHero("Capt America", "Steve Rogers", List("Tactics", "Speed"))

    7     val jayne = new Person("Jayne Doe")


    9     def nameFor(person: Person) = {

    10       person match {

    11         case hero: SuperHero => hero.alterEgo

    12         case person: Person => person.name

    13       }

    14     }


    16     // What''s a superhero''s alter ego?

    17     println("Batman''s Alter ego is " + nameFor(batman))

    18     println("Captain America''s Alter ego is " + nameFor(cap))

    19     println("Jayne''s Alter ego is " + nameFor(jayne))

    20   }

    ```


    Rather than use a sequence of `instanceOf` checks followed by a cast, you can
    specify a variable and type. In the expression that follows the arrow, the variable
    can be used as an instance of that type. So, on line 11, `hero` is magically an
    instance of `SuperHero` and `SuperHero` specific methods (like `alterEgo`) are
    available without casting.


    When you use pattern matching to deal with exceptions in a `try` and `catch`,
    it’s actually type queries that are being used.


    ```

    try {

    val url = new URL("http://baddotrobot.com")

    val reader = new BufferedReader(new InputStreamReader(url.openStream))

    var line = reader.readLine

    while (line != null) {

    line = reader.readLine

    println(line)

    }

    } catch {

    case _: MalformedURLException => println("Bad URL")

    case e: IOException => println("Problem reading data : " + e.getMessage)

    }

    ```


    The underscore in the `MalformedURLException` match shows that you can use a wildcard
    with type queries if you’re not interested in using the value.'
