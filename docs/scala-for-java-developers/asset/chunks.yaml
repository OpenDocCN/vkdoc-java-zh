    # 13. Generics


    In this chapter we’ll look at generics or type parameterization or generic programming
    in Scala. We’ll look at the following:


    *   Syntax for generics: defining types and methods.

    *   Bounded types, `extends` and `super`.

    *   Wildcards in both Java and Scala.

    *   Covariance and contravariance.


    ## Parametric Polymorphism


    We talked briefly about subtype or inclusion polymorphism ; the idea that subtypes
    can be substituted to stand in for their super-types. These stand-ins can provide
    different behavior without changing the structure of your code. The types of polymorphism
    are:


    *   Inclusion polymorphism (see Chapter [11](#A456960_1_En_11_Chapter.html), Inheritance).

    *   Ad hoc polymorphism (which is basically method overloading).

    *   Parametric polymorphism.


    Parametric polymorphism allows us to write code generically without depending
    on specific types, yet still maintain type safety. We use it all the time when
    we work with classes that work against multiple types. For example:


    ```

    List customers = new ArrayList();       // java

    ```


    Parametric polymorphism will be familiar if you’ve ever created a list of something
    in Java. It’s more commonly referred to as generics; by giving a generic type
    (like `List`) a parameterized type, we can treat it as a list yet still refer
    to its contents in a type-safe way. Generics are at play even if you don’t specify
    the parameterized type in Java. So, although you can write the following:


    ```

    List collection = new ArrayList();                  // java

    ```


    …you’re actually creating a generic `List` of type `Object`.


    ```

    List collection = new ArrayList();        // java

    ```


    Diamond Operator


    You can create a list of `Object` in Java like this:


    ```

    List collection = new ArrayList();

    ```


    The diamond operator (<>) on the right-hand side of the assignment was new in
    Java 7, you were forced to repeat the generic type declaration on the right-hand
    side.


    ### Class Generics


    When you create a list of a specific type , Java will give you type safety on
    `List` methods that take parameters and return things of that type. For example,
    creating a list of customers but then trying to add an object that isn’t a customer
    will result in a compiler failure.


    ```

    List customers = new ArrayList();

    customers.add(new HockeyPuck());                // compiler failure

    ```


    The basic syntax for Scala will look familiar to Java developers; we just replace
    the chevrons with square brackets.


    ```

    List customers = new ArrayList();   // java

    ```


    versus


    ```

    val customers: List[Customer] = List()          // scala

    ```


    Creating a list in Scala like this also shows that it has the equivalent of the
    diamond operator. Scala’s type inference can work out that `customers` is of type
    `Customer` without repeating the generics on the right-hand side.


    ```

    val customers: List[Customer] = List[Customer]()

    ^

    // no need to repeat the type

    ```


    ### Method Generics


    You can define generic parameters for methods in a similar way. To define a generic
    parameter to a method without defining a generic type for the whole class, you’d
    do something like this in Java, where the generic type is defined straight after
    the `public` keyword and used as the type of the parameter `a`.


    ```

    public  void add(A a)                 // java

    ```


    …versus this in Scala:


    ```

    def add[A](a: A)                         // scala

    ```'
