- fmt: '### Monadically Processing `Option`


    If you want to avoid using `get` or `getOrElse`, you can use the monadic methods
    on `Option`. To demonstrate this, we need a slightly more elaborate example. Let’s
    say we want to sum the basket value of a subset of customers. We could create
    the list of names of customers we’re interested in and find each of these by transforming
    (mapping) the customer names into a collection of `Customer` objects.


    In the following example, we create a customer database, adding some sample data
    before mapping.


    ```

    val database = new CustomerSet()

    val address1 = Some(Address("1a Bridge St", None))

    val address2 = Some(Address("2 Short Road", Some("AL1 2PY")))

    val address3 = Some(Address("221b Baker St", Some("NW1")))

    database.add(Customer("Albert", address1))

    database.add(Customer("Beatriz", None))

    database.add(Customer("Carol", address2))

    database.add(Customer("Sherlock", address3))

    val customers = Set("Albert", "Beatriz", "Carol", "Dave", "Erin")

    customers.map(database.find(_))

    ```


    We can then transform the customers again to a collection of their basket totals.


    ```

    customers.map(database.find(_).map(_.total))

    ```


    Now here’s the interesting bit. If this transformation were against a value that
    could be null, and not an `Option`, we’d have to do a null check before carrying
    on. However, as it is an option, if the customer wasn’t found, the `map` would
    just not do the transformation and return another “no value” `Option`.


    When, finally, we want to sum all the basket values and get a grand total, we
    can use the built-in function `sum`.


    ```

    customers.map(database.find(_).map(_.total)).sum       // wrong!

    ```


    However, this isn’t quite right. Chaining the two `map` functions gives a return
    type of `Set[Option[Double]]`, and we can’t sum that. We need to flatten this
    down to a sequence of doubles before summing.


    ```

    customers.map(database.find(_).map(_.total)).flatten.sum

    ^

    notice the position here, we map immediately on Option

    ```


    The flattening will discard any `None`s, so afterwards the collection size will
    be 3. Only Albert, Carol, and Beatriz’s baskets get summed.


    ### The `Option.flatMap` Function


    In the preceding example, we replicated `flatMap` behavior by mapping and then
    flattening, but we could have used `flatMap` on `Option` directly.


    The first step is to call `flatMap` on the names instead of `map`. As `flatMap`
    does the mapping and then flattens, we immediately get a collection of `Customer`.


    ```

    val r: Set[Customer] = customers.flatMap(name => database.find(name))

    ```


    The flatten part drops all the `None`s, so the result is guaranteed to contain
    only customers that exist in our repository. We can then simply transform those
    customers to their basket total, before summing.


    ```

    customers

    .flatMap(name => database.find(name))

    .map(customer => customer.total)

    .sum

    ```


    Dropping the no value options is a key behavior for `flatMap` here. For example,
    compare the flatten on a list of lists as follows:


    ```

    scala> val x = List(List(1, 2), List(3), List(4, 5))

    x: List[List[Int]] = List(List(1), List(2), List(3))

    scala> x.flatten

    res0: List[Int] = List(1, 2, 3, 4, 5)

    ```


    …to a list of options.


    ```

    scala> val y = List(Some("A"), None, Some("B"))

    y: List[Option[String]] = List(Some(A), None, Some(B))

    scala> y.flatten

    res1: List[String] = List(A, B)

    ```


    ## More Formal Definition


    As a more formal definition, a monad must:


    - Operate on a parameterized type, which implies it’s a “container” for another
    type (this is called a type constructor).

    - Have a way to construct the monad from its underlying type (the unit function).

    - Provide a `flatMap` operation (sometimes called bind).


    `Option` and `List` both meet these criteria, as shown in Table 18-1.


    **Table 18-1** Monad criteria met by `Option` and `List`


    | | `Option` | `List` |

    | --- | --- | --- |

    | Parameterized (type constructor) | `Option[A]` | `List[T]` |

    | Construction (unit) | `Option.apply(x)` | `List(x, y, z)` |

    | | `Some(x)` | |

    | | `None` | |

    | `flatMap` (bind) | `def flatMap[B](f: A => Option[B]): Option[B]` | `def flatMap[B](f:
    A => List[B]): List[B]` |


    The definition doesn’t mention `map`, though, and our layman’s definition for
    monad was the following:


    - Something that has `map` and `flatMap` functions.


    I wanted to introduce `flatMap` in terms of `map` because it always applies a
    mapping function before flattening. It’s true that to be a monad you only have
    to provide `flatMap`, but in practice monads also supply a `map` function. This
    is because all monads are also functors; it’s functors that more formally have
    to provide maps.


    So, the technical answer is that providing `flatMap`, a parameterized type, and
    the unit function makes something a monad. But all monads are functors and `map`
    comes from functor (see Figure 18-2).


    ![A456960_1_En_18_Fig2_HTML.jpg](A456960_1_En_18_Fig2_HTML.jpg)


    **Figure 18-2** The `Functor` and `Monad` behaviors


