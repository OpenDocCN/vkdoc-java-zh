- fmt: '# Deconstruction Matches and `unapply`


    It’s common to implement the `apply` method as a factory-style creation method;
    a method taking arguments and giving back a new instance. You can think of the
    special case `unapply` method as the opposite of this. It takes an instance and
    extracts values from it; usually the values that were used to construct it.


    `apply(a, b) → object(a, b)`


    `unapply(object(a, b)) → a, b`


    Because they extract values, objects that implement `unapply` are referred to
    as extractors.


    - Given an object, an extractor typically extracts the parameters that would have
    created that object.


    So, if we want to use our `Customer` in a match expression, we’d add an `unapply`
    method to its companion object. Let’s start to build this up.


    ```

    class Customer(val name: String, val address: String)

    object Customer {

    def unapply(???) = ???

    }

    ```


    An `unapply` method always takes an instance of the object you’d like to deconstruct,
    in our case a `Customer`.


    ```

    object Customer {

    def unapply(customer: Customer) = ???

    }

    ```


    It should return either the extracted parts of the object or something to indicate
    it couldn’t be deconstructed. In Scala, rather than return a null to represent
    this, we return the option of a result. It’s the same idea as the `Optional` class
    in Java.


    ```

    object Customer {

    def unapply(customer: Customer): Option[???] = ???

    }

    ```


    The last piece of the puzzle is to work out what can optionally be extracted from
    the object: the type to put in the `Option` parameter. If you wanted to be able
    to extract just the customer name, the return would be `Option[String]`, but we
    want to be able to extract both the name and address (and therefore be able to
    match on both name and address in a match expression).


    The answer is to use a tuple, the data structure we saw earlier. It’s a way of
    returning multiple pieces of data in a single type.


    ```

    object Customer {

    def unapply(customer: Customer): Option[(String, String)] = {

    Some((customer.name, customer.address))

    }

    }

    ```


    We can now use a pattern match with our customer.


    ```

    val customer = new Customer("Bob", "1 Church street")

    customer match {

    case Customer(name, address) => println(name + " " + address)

    }

    ```


    You’ll notice that this looks like our constructor pattern example. That’s because
    it’s essentially the same thing; we used a case class before, which added an `unapply`
    method for us. This time we created it ourselves. It’s both an extractor and,
    because there’s a symmetry with the constructor, a constructor pattern.


    More specifically, the list of values to extract in a pattern must match those
    in a class’s primary constructor to be called a constructor pattern. See the language
    spec[²](#A456960_1_En_16_Chapter.html#Fn16) for details.


    ### Why Write Your Own Extractors?


    Why would you implement your own extractor method (`unapply`) when case classes
    already have one? It might be simply because you can’t or don’t want to use a
    case class or you may not want the match behavior of a case class; you might want
    custom extraction behavior (for example, returning `Boolean` from `unapply` to
    indicate a match with no extraction).


    It might also be the case that you can’t modify a class but you’d like to be able
    to extract parts from it. You can write extractors for anything. For example,
    you can’t modify the `String` class but you still might want to extract things
    from it, like parts of an email address or a URL.


    For example, the stand-alone object in the following example extracts the protocol
    and host from a string when it’s a valid URL. It has no relationship with the
    `String` class but still allows us to write a match expression and “deconstruct”
    a string into a protocol and host.


    ```

    object UrlExtractor {

    def unapply(string: String): Option[(String, String)] = {

    try {

    val url = new URL(string)

    Some((url.getProtocol, url.getHost))

    } catch {

    case _: MalformedURLException => None

    }

    }

    }

    val url = "http://baddotrobot.com" match {

    case UrlExtractor(protocol, host) => println(protocol + " " + host)

    }

    ```


    This decoupling between patterns and the data types they work against is called
    representation independence (see Section 24.6 of Programming in Scala).[³](#A456960_1_En_16_Chapter.html#Fn17)


    ## Guard Conditions


    You can complement the patterns we’ve seen with `if` conditions.


    ```

    customer.yearsACustomer = 3

    val discount = customer match {

    case YearsACustomer(years) if years >= 5 => Discount(0.50)

    case YearsACustomer(years) if years >= 2 => Discount(0.20)

    case YearsACustomer(years) if years >= 1 => Discount(0.10)

    case _ if blackFriday(today)             => Discount(0.10)

    case _                                   => Discount(0)

    }

    ```


    The condition following the pattern is called a guard. You can reference a variable
    if you like, so we can say for customers of over five years, a 50% discount applies;
    two years, 20%, and so on. If a variable isn’t required, that’s fine too. For
    example, we’ve got a case that says if no previous discount applies and today
    is Black Friday, give a discount of 10%.


    Footnotes [1](#A456960_1_En_16_Chapter.html#Fn15_source)


    [`http://www.scala-lang.org/files/archive/spec/2.12/08-pattern-matching.html`](http://www.scala-lang.org/files/archive/spec/2.12/08-pattern-matching.html)


    [2](#A456960_1_En_16_Chapter.html#Fn16_source)


    [`http://www.scala-lang.org/files/archive/spec/2.12/08-pattern-matching.html`](http://www.scala-lang.org/files/archive/spec/2.12/08-pattern-matching.html)


    [3](#A456960_1_En_16_Chapter.html#Fn17_source)


