    ### 将匿名类转换为 Lambda


    在 Java 版本的`sort`方法中，我们可以使用 lambda 来有效地创建`Comparable`的实例。这种语法是 Java 8 的新特性，在这种情况下，它是创建内联匿名实例的替代方案。


    ```

    // java

    customers.sort((first, second) -> second.total().compareTo(first.total()));

    ```


    为了使 Scala 版本更接近 Java 版本，我们需要传入一个 lambda 而不是`Ordering`的匿名实例。Scala 支持 lambda，因此我们可以将匿名函数直接传递给其他函数，但`sort`方法的签名需要的是`Ordering`，而不是函数。


    幸运的是，我们可以强制 Scala 使用隐式转换将 lambda 转换为`Ordering`的实例。[¹](#A456960_1_En_11_Chapter.html#Fn10)
    我们只需要创建一个转换方法，该方法接受一个 lambda 或函数并返回一个`Ordering`，并将其标记为`implicit`。`implicit`关键字告诉
    Scala，如果否则代码无法编译，则尝试使用此方法进行类型转换。


    ```

    // scala

    implicit def functionToOrdering[A](f: (A, A) => Int): Ordering[A] = {

    new Ordering[A] {

    def compare(a: A, b: A) = f.apply(a, b)

    }

    }

    ```


    该签名接受一个函数并返回一个`Ordering[A]`。该函数本身有两个参数并返回一个`Int`。因此，我们的转换方法期望一个具有两个`A`类型参数并返回`Int`的函数（`(A,
    A) => Int`）。


    现在，我们可以向`sorted`方法提供一个函数字面量，而该方法原本无法编译。只要该函数符合`(A, A) => Int`签名，编译器就会检测到它可以被转换为可编译的内容，并调用我们的`implicit`方法来完成转换。因此，我们可以像这样修改`CustomersSortableBySpend`的`sort`方法：


    ```

    // scala

    this.toList.sorted((a: Customer, b: Customer) => b.total.compare(a.total))

    ```


    ……传入一个 lambda 而不是匿名类。这类似于以下等效的 Java 版本，并且意味着我们不再需要`BasketTotalDescending`对象。


    ```

    // java

    list.sort((first, second) -> first.compareTo(second));

    ```


    ### Trait 上的具体字段


    我们已经了解了 trait 上的默认方法，但 Scala 还允许你提供默认值。你可以在 trait 中指定字段。


    ```

    // scala

    trait Counter {

    var count = 0

    def increment()

    }

    ```


    这里，`count`是 trait 上的一个字段。所有扩展`Counter`的类都将拥有自己的`count`实例副本。它不是继承的——它是 trait 指定为必需的、并由编译器为你提供的独立值。编译器为子类型提供该字段，并在构造时（基于
    trait 中的值）进行初始化。


    例如，`count`神奇地可用于以下类，并且我们能够在`increment`方法中递增它。


    ```

    // scala

    class IncrementByOne extends Counter {

    override def increment(): Unit = count += 1

    }

    ```


    在这个例子中，`increment`被实现为在每次调用时将值乘以某个其他值。


    ```

    // scala

    class ExponentialIncrementer(rate: Int) extends Counter {

    def increment(): Unit = if (count == 0) count = 1 else count *= rate

    }

    ```


    顺便提一下，我们可以在`Counter`中的`var`上使用`protected`，其语义与 Java 中的`protected`类似。它允许子类访问，但与
    Java 不同的是，它不允许同一包中的其他类型访问。它比 Java 的限制稍严格一些。例如，如果我们更改它并尝试从同一包中的非子类型访问`count`，则是不允许的。


    ```

    // scala

    trait Counter {

    protected var count = 0

    def increment()

    }

    class NotASubtype {

    val counter = new IncrementByOne()            // a subtype of Counter but

    counter.count                                 // count is now inaccessible

    }

    ```


    ### Trait 上的抽象字段


    你也可以通过省略初始化值来在 trait 上拥有抽象值。这会强制子类型提供一个值。


    ```

    // scala

    trait Counter {

    protected var count: Int                     // abstract

    def increment()

    }

    class IncrementByOne extends Counter {

    override var count: Int = 0                  // forced to supply a value

    override def increment(): Unit = count += 1

    }

    class ExponentialIncrementer(rate: Int) extends Counter {

    var count: Int = 1

    def increment(): Unit = if (count == 0) count = 1 else count *= rate

    }

    ```


    请注意，`IncrementByOne`使用了`override`关键字，而`ExponentialIncrementer`没有。对于字段和抽象方法，`override`都是可选的。


    ## 抽象类


    在 Java 中，使用`abstract`关键字创建普通的抽象类。例如，我们可以编写另一个版本的`Customer`类，但这次将其设为抽象类。我们还可以添加一个计算客户购物篮价值的方法，并将其标记为`abstract`。


    ```

    // java

    public abstract class AbstractCustomer {

    public abstract Double total();

    }

    ```


    在子类中，我们可以像这样实现折扣购物篮：


    ```

    // java

    public class DiscountedCustomer extends AbstractCustomer {

    private final ShoppingBasket basket = new ShoppingBasket();

    @Override

    public Double total() {

    return basket.value() * 0.90;

    }

    }

    ```


    在 Scala 中，你仍然使用`abstract`关键字来表示一个不能被实例化的类。但是，你不需要用它来限定方法；只需省略实现即可。


    ```

    // scala

    abstract class AbstractCustomer {

    def total: Double         // no implementation means it’s abstract

    }

    ```


    然后，我们可以像之前看到的那样创建子类。我们像以前一样使用`extends`，并简单地为`total`方法提供实现。任何实现抽象方法的方法都不需要在方法前加上`override`关键字，尽管允许这样做。


    ```

    // scala

    class HeavilyDiscountedCustomer extends AbstractCustomer {

    private final val basket = new ShoppingBasket

    def total: Double = {

    return basket.value * 0.90

    }

    }

    ```'
