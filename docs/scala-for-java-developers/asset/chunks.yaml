    Java, on the other hand, is very restrictive; there are generally very few ways
    to express the same things. It’s often easier to recognize things at a glance.
    You might have to work a little harder to recognize some of the more exotic syntax
    options in Scala.


    This is true when it comes to the structure of your code too; you can create functions
    within functions, import statements in the middle of a class, or have a class
    live in a file with an unrelated name. It can all be a little disorienting when
    you’re used to the rigidity of Java.


    ## Immutable and Declarative


    Because Scala favors immutability , you might also notice a different approach
    to solving problems. For example, you might notice a lack of looping over mutable
    variables. Scala programs usually favor more functional idioms to achieve the
    same thing.


    This more declarative way of doing things says “tell me what to do, not how to
    do it.” You may be more used to the Java/imperative way of doing things that says
    “tell me exactly how to do it”. Ultimately, when you give up the micro-management
    style of imperative programming, you allow the language more freedom in how it
    goes about its business.


    For example, a traditional imperative for loop in Java looks like this:


    ```

    // java

    for (int count = 0; count < 100; count++) {

    System.out.println(count);

    }

    ```


    It’s a typical imperative loop. We’re telling it explicitly to enumerate serially
    from zero to one hundred. If, on the other hand, we use a more declarative mechanism,
    like this:


    ```

    // scala

    (0 to 100).foreach(println(_))

    ```


    …the enumeration is done within the `foreach` method, not by a language construct.
    We’re saying, “for a range of numbers, perform some function on each.” Although
    only subtly different, we’re not saying how to enumerate the sequence. It means
    Scala is free to implement the enumeration however it likes. It may choose to
    do it in parallel, for example.


    Interestingly, Oracle has adopted these ideas and since Java 8 offers similar
    for loop enumeration. The preceding code can be written in Java like this:


    ```

    // java

    IntStream.range(0, 100).forEach(System.out::println)

    ```


    # 8. Classes and Fields


    In this chapter, we’ll have a look at the following:


    1.  Creating classes.  

    2.  How Scala makes things easier when defining fields.  

    3.  What happens behind the scenes when Scala creates methods for you.


    ## Creating Classes


    Creating a class in Java means writing something like this:


    ```

    // java

    public class Customer {

    }

    ```


    It makes sense for us to have a name and address for a customer. So, adding these
    as fields and initializing via the constructor would give us something like this:


    ```

    // java

    public class Customer {

    private final String name;

    private final String address;

    public Customer(String name, String address) {

    this.name = name;

    this.address = address;

    }

    }

    ```


    We can instantiate an instance with the `new` keyword and create a new customer
    called Eric like this:


    ```

    Customer eric = new Customer("Eric", "29 Acacia Road"); // java

    ```


    In Scala, the syntax is much briefer; we can combine the class and constructor
    on a single line.


    ```

    class Customer(val name: String, val address: String)   // scala

    ```


    We new it up in the same way, like this:


    ```

    val eric = new Customer("Eric", "29 Acacia Road")       // scala

    ```


    Rather than define the fields as members within the class, the Scala version declares
    the variables as part of the class definition in what’s known as the primary constructor.
    In one line, we’ve declared the class `Customer` and, in effect, declared a constructor
    with two arguments.'
