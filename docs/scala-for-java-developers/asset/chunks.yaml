    # 22. Tips


    Reflecting on my experiences I have three major tips.


    1.  Be clear about what you want from Scala .  

    2.  Get guidance and share experiences.  

    3.  Be deliberate and have a plan.


    ## Be Clear


    *   Be clear what you want out of it. You should be asking what’s in it for you.
    If you’re going to use Scala, you should be able to explain why. Do you think
    being more concise will help you? Is it the benefits of functional programming?
    Immutability? How are you going to measure it? Will the whole team aim for a pure
    functional programming style like Haskell? Or OO? Decide which up front. Agree.

    *   Understand the team dynamic. Understand your team and what their wants and
    needs are. Gauge the team’s appetite and goals. Ultimately, everyone needs to
    buy into the idea and head in the same direction. If one or two people feel left
    out or pull in another direction, you’ll have problems further down the line.

    *   Set expectations. Talk to the team and management. Explain the risks and share
    your motivations and expectations. To set your expectations: learning full-on
    functional programming (think Haskell) is hard. Be prepared.

    *   Review. Once you’ve started, keep reviewing where you are. Are you getting
    out of it what you thought you would? Can you prove or disprove any of the assumptions
    you started with? Is the business benefiting? If you can be more quantitative
    and use measurements, you can be more objective. And don’t be afraid to change
    your mind. Maybe you discover that it’s not the right choice for the team. You
    can always back out.


    ## Get Guidance


    *   Hire an expert. This is my single biggest tip. If you have a real expert on
    the team, they can guide you through the syntax and features, and, more importantly,
    the adoption process. They can hold you back when you shouldn’t be racing and
    open the door to new techniques when you’re ready. It can be hard to find genuine
    experts but they can be worth their weight in gold.

    *   Be active in the community. Attend events, conferences, and meetups. Create
    a community. Learn from others and share your own experiences.

    *   Look at open source. But not too much. It’s good to see how others have done
    things—I’ve certainly been exposed to some of the more exotic syntax via open
    source—but bear in mind that what’s right for them may not be right for you. Take
    it with a pinch of salt. Use other people’s code to inspire learning but don’t
    copy it.


    ## Have a Plan


    *   Make a plan. Don’t just start your next project in Scala; be deliberate and
    have a plan.

    *   Think about your goals. Write them down, then sketch out the steps that will
    take you closer to you them. For example, if a goal is to get up to speed fast,
    you may want to run some lunchtime knowledge-sharing sessions with your team.

    *   Decide where on the functional programming continuum you want to be. Do you
    want to jump in at the deep end or adopt functional idioms later? One tip to minimize
    the learning curve is to avoid using native Scala libraries to start with. They
    often lead you into functional style and, at the end of the day, it’s another
    API to learn. You can always stick with the Java libraries you know, at least
    to start with.

    *   Make a commitment. Commit to your goals; don’t do what I did and sideline
    Scala to the tests. Actively decide on Scala and make a personal commitment to
    see it happen.


    If you follow these tips, you should be clear about your goals and expectations,
    have an idea of where you’ll get guidance from, and have planned out your next
    steps. You’ll be facing the prospect of working with a Scala codebase, probably
    converting Java code and working with new tools and libraries.


    In the next chapters we’ll look at some practical tips on how to proceed, including
    converting Java code and managing your codebase.


    # 23. Convert Your Codebase


    At this point, you’re likely to have an existing Java codebase and may be wondering
    if you should try and convert the Java to Scala .


    It may be a lot of effort, but I say it’s definitely worth investing in converting
    the entire codebase to Scala if you’re serious about adopting Scala. Don’t aim
    to leave half and half. Accept that it’s going to take some time and effort but
    commit to achieving it. If you don’t finish the job, apathy can set in, not to
    mention that inter-op between old Java and Scala can get really awkward. You’ll
    make your life easier if you see the job through.


    IntelliJ IDEA has a convert function, which is a great starting place. It’ll let
    you quickly turn a Java class into Scala, but be prepared: it’s not often idiomatic
    and may not even compile without coercion. Treat any automated conversion as a
    learning exercise. Don’t accept the transformation at face value, but look at
    the results and apply your judgement to tidy up. For example, rather than create
    a case class, IntelliJ often creates fields within the Scala class. You’ll usually
    be able to rephrase a verbatim conversion in a more Scala-savvy way.


    Consider your build tools. These will need to be updated. SBT and Maven both support
    mixed Java/Scala projects so there’s no excuse not to keep running your continuous
    integration and test environments. You might also want to consider whether it’s
    worth porting over your existing build to SBT.


    # 24. Manage Your Codebase


    Once you have your newly converted Scala codebase, you’ll be working with it for
    a while. Here are some practicalities you should be aware of and some general
    tips to help manage your codebase.


    ## Conventions


    *   There are so many syntax variations and conventions that the sheer number
    of syntax options available can be intimidating. Settle on your own conventions.

    *   Find a way of doing things that works for your team and stick to it. Avoid
    context switching between syntax modes to start with. That might mean using pattern
    matching rather than using map to start with. Wait until everyone is comfortable
    before switching over.

    *   Review these choices regularly as you don’t want to be held back once you’re
    up and running.

    *   Have a look at Twitter’s efforts[¹](#A456960_1_En_24_Chapter.html#Fn22) as
    an example. They’ve managed to condense their experiences into a really practical
    guide. Well worth a read.

    *   Typesafe have a style guide,[²](#A456960_1_En_24_Chapter.html#Fn23) which
    is worth reading over but should be taken with a pinch of salt.'
