    ### 伴生对象的其他用途


    当方法不依赖于类中的任何字段时，你可以更准确地将它们视为函数。函数通常属于单例对象而非类，因此，使用伴生对象的一个场景是，当你想要区分函数和方法，但又希望将相关函数保留在其关联类的附近时。


    使用伴生对象的另一个原因是用于工厂模式方法——即创建伴生类实例的方法。例如，你可能想创建一个工厂方法，它能以更简洁的方式创建类的实例。如果我们想为 `Customer`
    创建一个工厂，可以这样做：


    ```

    // scala

    class Customer(val name: String, val address: String) {

    val id = Customer.nextId()

    }

    object Customer {

    def apply(name: String, address: String) = new Customer(name, address)

    def nextId() = 1

    }

    ```


    `apply` 方法为类或对象提供了一种简写形式。它有点像类的默认方法，因此，如果你没有直接调用实例上的方法，而是匹配了 `apply` 方法的参数，它就会为你调用该方法。例如，你可以这样调用：


    ```

    Customer.apply("Bob Fossil", "1 London Road")

    ```


    ……或者你可以省略 `apply`，Scala 会寻找一个与你参数匹配的 `apply` 方法。这两种写法是等价的。


    ```

    Customer("Bob Fossil", "1 London Road")

    ```


    你仍然可以使用主构造函数和 `new` 关键字来构造一个类，但将伴生类的 `apply` 方法实现为工厂，意味着如果你需要创建大量对象，代码可以更简洁。


    你甚至可以通过将主构造函数设为私有，来强制客户端使用你的工厂方法而非构造函数。


    ```

    class Customer private (val name: String, val address: String) {

    val id = Customer.nextId()

    }

    ```


    Java 中的对应做法是使用一个静态工厂方法——例如 `createCustomer`——和一个私有构造函数，以确保所有人都被迫使用工厂方法。


    ```

    // java

    public class Customer {

    private static Integer lastId;

    private final String name;

    private final String address;

    private Integer id;

    public static Customer createCustomer(String name, String address) {

    return new Customer(name, address);

    }

    private Customer(String name, String address) {

    this.name = name;

    this.address = addres s;

    this.id = Customer.nextId();

    }

    private static Integer nextId() {

    return lastId++;

    }

    }

    ```


    # 10. 类与函数


    在本章中，我们将探讨以下内容：


    *   匿名函数或 lambda。

    *   匿名类与匿名函数的区别。

    *   一等函数和高阶函数。

    *   函数与方法之间的区别。

    *   lambda 与闭包之间的区别。


    ## 匿名函数


    广义上的函数是为执行特定任务或计算而设计的代码片段。你可以将函数创建为 Java 方法或 Scala 的 `def`。两者本质上都是有名称的。而匿名函数则没有名称。


    匿名函数也称为 lambda，在使用时可以被视为函数字面量。


    Java lambda 语法以列出函数的参数开始，然后是箭头标记，接着是实现体。下面的例子是一个 lambda，它接受两个字符串参数，并比较它们的值以用于排序算法。


    ```

    // java

    (String a, String b) -> {

    int comparison = a.compareTo(b);

    return comparison;

    };

    ```


    如果编译器可以推断参数的类型，你可以省略类型；如果函数体是单行表达式，你可以省略 `return`。


    ```

    (a, b) -> a.compareTo(b);         // 缩写形式

    ```


    对于单参数 lambda，你甚至可以省略参数括号，但如果没有参数，则需要空括号。


    ```

    value -> value * 2;               // 单参数

    () -> 2 + 2;                      // 无参数

    ```


    在 Scala 中，lambda 看起来非常相似。由于表达式中的最后一条语句被视为返回值，因此不需要 `return` 关键字。


    ```

    // scala

    (a: String, b: String) => {

    val comparison = a.compareTo(b)

    comparison

    }

    ```


    如果 Scala 可以推断参数类型，那么类型可以像 Java 一样省略，单行表达式也不需要花括号。


    ```

    // scala

    (a, b) => a.compareTo(b)          // 缩写形式

    ```


    匿名类可以以类似于匿名函数的方式提供功能，但它们不能准确地被称为 lambda。


    ## 匿名类


    匿名类与匿名函数不是一回事。匿名类仍然需要通过 `new` 关键字实例化为一个对象。它可能没有名称，但只有作为实例对象时才是有用的。


    另一方面，匿名函数没有与之关联的实例。函数与其所操作的数据是分离的。


    Java 中一个典型的匿名类可能如下所示：


    ```

    // java

    List list = Arrays.asList("A", "C", "B", "D");

    list.sort(new Comparator() {

    @Override

    public int compare(String a, String b) {

    return a.compareTo(b);

    }

    });

    ```


    你仍然可以在 Scala 中创建匿名类，但通常不需要这样做。在 Scala 中，更常见的是创建匿名函数或 lambda。实际上，自从 Java 8 引入 lambda
    以来，Java 也是如此。


    ```

    // scala

    val list = List("A", "C", "B", "D")

    list.sorted(new Ordering[String] {

    def compare(a: String, b: String): Int = a.compareTo(b)

    })

    ```


    与 Java 一样，要在 Scala 中创建匿名类实例，你需要使用带花括号的 `new` 关键字，并在主体内定义实现。注意，你不需要添加构造函数的括号（`new
    Ordering[String]()`）。


    ## 一等函数


    正如我们所见，匿名函数被称为 lambda。它是一种定义函数的紧凑方式。当你想要定义计算或转换，并在之后将其应用于不同的值时，匿名函数非常有用。例如，将函数作为参数传递给其他函数，或存储函数定义以供以后使用。


    这种用法被称为将函数视为一等公民。具体来说，如果一种语言支持以下特性，则它支持一等函数：


    1.  支持将函数作为参数传递给其他函数。

    2.  能够从其他函数中返回函数作为值。

    3.  能够将函数存储在变量或数据结构中。


    ## 高阶函数


    高阶函数是接受一个或多个函数作为参数，或者返回一个函数的函数。高阶函数往往比替代方案更灵活，也更容易重用。


    Lambda 通过提供紧凑的语法以及编译器为 lambda 语法生成特殊字节码这一事实，促进了对一等函数的支持。¹


    定义上述排序计算的 lambda 如下所示：


    ```

    (String a, String b) -> a.compareTo(b);     // java

    (a: String, b: String) => a.compareTo(b)    // scala

    ```


    ### 传入函数


    为什么你想要将一个函数传入另一个函数？简而言之：为了灵活性。前面给出的 `sort` 或 `sorted` 函数就是一个很好的例子。你可以创建一个函数来对列表进行排序，但允许调用者影响排序的方式。


    例如，你可以通过传入不同的函数字面量，按升序或降序对列表进行排序。


    ```

    // java

    List list = Arrays.asList("A", "C", "B", "D");

    list.sort((a, b) -> a.compareTo(b));                     // 升序

    list.sort((a, b) -> b.compareTo(a));                     // 降序

    ```


    Scala 也是如此：


    ```

    // scala

    val list = List("A", "C", "B", "D")

    list.sorted((a: String, b: String) => a.compareTo(b))    // 升序

    list.sorted((a: String, b: String) => b.compareTo(a))    // 降序

    ```

