  raw: '### Wildcard Bounds (<? extends T, <? super T>)


    We’ve already seen some examples of wildcards : the `?` in Java and the `_` in
    Scala.


    Wildcards with an upper bound look like this:


    ```

    // java

    void printAnimals(List animals) {

    for (Animal animal : animals) {

    System.out.println(animal);

    }

    }

    // scala

    def printAnimals(animals: List[_ <: Animal]) {

    for (animal <- animals) {

    println(animal)

    }

    }

    ```


    Wildcards with a lower bound look like this:


    ```

    // java

    static void addNumbers(List numbers) {

    for (int i = 0; i : Int]) {

    for (i <- 0 to 99) {

    // ...

    }

    }

    ```


    Unbounded wildcards look like this in Java:


    ```

    List list             // java

    ```


    …and like this in Scala:


    ```

    List[_]                  // scala

    ```


    An unbounded wildcard refers to an unknown generic type. For example, printing
    elements of a list of unknown type will work with all lists. Just add upper- or
    lower-bound constraints to limit the options.


    ```

    // java

    void printUnknown(List list) {

    for (Object element : list) {

    System.out.println(element);

    }

    }

    // scala

    def printUnknown(list: List[_]) {

    for (e <- list) {

    val f: Any = e

    println(f)

    }

    }

    ```


    Although the implementation can treat the elements as `Object` because everything
    is an object, you can’t add anything to a list of unknown type.


    ```

    // java

    List list = new ArrayList();

    list.add(new Object()); // compiler error

    ```


    The one exception is `null`.


    ```

    list.add(null);

    ```


    You get the same effect in Scala, where you can’t even create a list without a
    valid type.


    ```

    scala> val list = mutable.MutableList[_]()

    :7: error: unbound wildcard type

    val list = mutable.MutableList[_]()

    ^

    ```


    You mainly use wildcards when you really don’t care about the type parameter,
    just any constraints on an upper or lower bounding, or when you can treat the
    type as an instance of `Object` or `Any`.


    ### Multiple Bounds


    Types can also have multiple bounds in both Java and Scala.


    *   Java is limited to multiple upper bounds.

    *   Java can’t set a lower and upper bound on types (so you can’t have a generic
    type extend one thing and also be a super-type to another).

    *   Scala can set a single lower and an upper bound, unlike Java.

    *   However, Scala can’t set multiple upper or lower bounds. Instead it can constrain
    bounds by also forcing you to extend traits.


    Using multiple bounds, another way to express the constraints on the `Animal`
    sorting method would be to explicitly state that `A` must extend `Animal` and
    be comparable to `Animal`, using the `&` symbol in Java.


    ```

    // java

    public static > void sort(List l)

    ```


    This sets two upper bounds to the generic type `A` in Java. You can’t set two
    upper bounds on `A` in Scala, but you can achieve the same effect by specifying
    that your bound must also extend certain traits.


    ```

    // scala

    def sort[A <: Animal with Comparable[Animal]](list: List[A]) = { }

    ```


    Because we’re being more explicit, we can remove the type hints when calling the
    `sort` method. In fact, you’ll get a compiler error if you don’t.


    ```

    var enclosure = List[Lion]()

    enclosure = new Lion +: enclosure

    enclosure = new Lion +: enclosure

    // sort[Lion, Animal](enclosure)     // compiler error

    sort(enclosure)

    ```


    In Scala, you can also set both a lower and upper bound using `>:` and `<:`, like
    this:


    ```

    def example[A >: Lion <: Animal](a: A) = ()                     // scala

    ^         ^

    lower     upper

    ```


    …where `A` must be a super-type of `Lion` and a subtype of `Animal`.


    ## Variance


    Without involving generics, a simple class `B` that extends `A` (see Figure [13-1](#A456960_1_En_13_Chapter.html#Fig1))
    can be assigned to an instance of `A`; it is after all, an `A` as well as a `B`.
    Obviously, subtyping is only in one direction; the other way around, and you get
    a compiler failure.


    ![A456960_1_En_13_Fig1_HTML.jpg](A456960_1_En_13_Fig1_HTML.jpg)


    Figure 13-1


    `B extends A`


    ```

    // java

    A a = new A();

    B b = new B();

    a = b;

    b = a;                    // compiler failure

    ```


    Generic classes, however, are not subclasses themselves just because their parameterized
    type may be. So, if `B` is a subclass of `A`, should `List<B>` be a subclass of
    `List<A>`? In Java `List` of `B` is not a subtype of `List` of `A` even though
    their parameterized types are (see Figure [13-2](#A456960_1_En_13_Chapter.html#Fig2)).


    ![A456960_1_En_13_Fig2_HTML.jpg](A456960_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    `List<B>` cannot extend `List<A>` in Java


    ```

    // java

    List a = new ArrayList();

    List b = new ArrayList();

    a = b;  // compiler failure

    ```


    This is where variance comes in. Variance describes how subtyping generic types
    (like lists or “container” types) relates to subtyping their parameterized type.


    There are three types of subtype relationship described by variance.


    1.  Invariant.  

    2.  Covariant.  

    3.  Contravariant.


    ### Invariance


    Java only supports one of the three for its generic types: all generic types in
    Java are invariant, which is why we can’t assign a `List<B>` to a `List<A>`. Invariant
    generic types don’t preserve the subtype relationship of their parameterized types.


    However, you can vary the parameterized types when you use wildcards with methods
    and variables.


    The invariant relationship between generic types says that there is no relationship
    even if their contents have a subtype relationship. You can’t substitute one for
    another. Java and Scala share syntax here, as defining any generic type in chevrons
    (Java) or square brackets (Scala) describes the type as invariant.


    ```

    public class List { }         // java

    class List[T] { }                // scala

    ```


    ### Covariance


    Covariant generic types preserve the relationship between two generic types as
    subtypes when their parameterized types are subtypes. So, `List<B>` is a subtype
    of `List<A>` when a generic type is set up as covariant. Java doesn’t support
    covariance of types. Scala supports covariant generic types by using a `+` when
    you define a generic class.


    ```

    class List[+T] { }

    ```


    ### Contravariance


    Contravariance reverses a subtype relationship. So, if `A` is contravariant, `List<A>`
    is also a `List<B>`; it’s a subtype. The relationships of the parameterized types
    are reversed for their generic types. Java doesn’t support contravariance of types
    but in Scala you just add a `-` to the generic type definition.


    ```

    class List[-T] { }

    ```


    ### Variance Summary


    In summary, invariant generic types are not related, regardless of the relationship
    of their parameterized types. Covariant types maintain the subtype relationship
    of their parameterized types, and contravariant types reverse it (see Table [13-1](#A456960_1_En_13_Chapter.html#Tab1)).


    Table 13-1


    Variance summary


    |   | Description | Scala Syntax |

    | --- | --- | --- |

    | Invariant | `List<A>` and `List<B>` are not related | `[T]` |

    | Covariant | `List<B>` is a subclass of `List<A>` | `[+T]` |

    | Contravariant | `List<A>` is a subclass of `List<B>` | `[-T]` |


    The syntax for each is summarized in Table [13-2](#A456960_1_En_13_Chapter.html#Tab2).


    Table 13-2


    Syntax summary


    |   | Invariant | Covariant | Contravariance |

    | --- | --- | --- | --- |

    | Java | `<T>` | `<? extends T>` | `<? super T>` |

    | Scala | `[T]` | `[+T]` | `[-T]` |

    | Scala (wildcards) | `[T]` | `[_ <: T]` | `[_ >: T]` |


    Java Limitations


    In Java all generic types are invariant, which means you can’t assign a `List<Foo>`
    to a `List<Object>`. You can vary the types where you use them with wildcards,
    but only for methods and variable definitions, not classes.'
