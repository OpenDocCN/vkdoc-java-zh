    \ Boolean\n  def ##: Int\n  def hashCode: Int\n  def toString: String\n  // ...\n\
    }\n```\n\nEvery class in Scala inherits from the abstract class `Any`. It has\
    \ two immediate subclasses, `AnyVal` and `AnyRef`, as shown in Figure 4-1.\n\n\
