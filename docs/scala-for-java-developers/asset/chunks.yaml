  raw: '## Anonymous Classes


    You create anonymous subclasses in a similar way to Java.


    In the Java version of the `ShoppingBasket` class, the `add` method takes an `Item`
    interface. So, to add an item to your shopping basket, you could create an anonymous
    subtype of `Item`. Here is a program to add two fixed-price items to Joe’s shipping
    basket. Each item is an anonymous subclass of `Item`. The basket total after discount
    would be $5.40.


    ```

    // java

    public class ShoppingBasket {

    private final Set basket = new HashSet();

    public void add(Item item) {

    basket.add(item);

    }

    public Double value() {

    return basket.stream().mapToDouble(Item::price).sum();

    }

    }

    public class AnonymousCLass {

    public static void main(String... args) {

    Customer joe = new DiscountedCustomer("Joe", "128 Bullpen Street");

    joe.add(new Item() {

    @Override

    public Double price() {

    return 2.5;

    }

    });

    joe.add(new Item() {

    @Override

    public Double price() {

    return 3.5;

    }

    });

    System.out.println("Joe’s basket will cost $ " + joe.total());

    }

    }

    ```


    In Scala, it’s pretty much the same. You can drop the brackets on the class name
    when newing up an `Item`, and the type from the method signature of `price`. The
    `override` keyword in front of the `price` method is also optional.


    ```

    // scala

    object DiscountedCustomer {

    def main(args: Array[String]) {

    val joe = new DiscountedCustomer("Joe", "128 Bullpen Street")

    joe.add(new Item {

    def price = 2.5

    })

    joe.add(new Item {

    def price = 3.5

    })

    println("Joe’s basket will cost $ " + joe.total)

    }

    }

    ```


    You create anonymous instances of classes, abstract classes, or Scala traits in
    just the same way.


    ## Interfaces/Traits


    Interfaces in Java are similar to traits in Scala. You can use a trait in much
    the same way as you can use an interface. You can implement specialized behavior
    in implementing classes, yet still treat them polymorphically in code. However:


    *   Traits can have default implementations for methods. These are just like Java’s
    virtual extension methods (new in Java 8 and otherwise known as default methods)
    but there’s no equivalent pre-Java 8.

    *   Traits can also have fields and even default values for these, something which
    Java interfaces cannot do. Therefore, traits can have both abstract and concrete
    methods and have state.

    *   A class can implement any number of traits just as a class can implement any
    number of interfaces, although extending traits with default implementations in
    Scala is more like mixing in behaviors than traditional interface inheritance
    in Java.

    *   There’s a cross-over with Java 8 as you can mixin behavior with Java 8, although
    there are some differences in semantics and how duplicate methods are handled.


    In this section, we’ll look at these differences in more detail.


    In Java, we might create an interface called `Readable` to read some data and
    copy it into a character buffer. Each implementation may read something different
    into the buffer. For example, one might read the content of a web page over HTTP
    while another might read a file.


    ```

    // java

    public interface Readable {

    public int read(CharBuffer buffer);

    }

    ```


    In Scala, the Java interface would become a trait and it would look like this:


    ```

    // scala

    trait Readable {

    def read(buffer: CharBuffer): Int

    }

    ```


    You just use `trait` rather than `class` when you define it. There’s no need to
    declare methods as `abstract`, as any unimplemented methods are automatically
    abstract.


    Implementing the interface in Java uses the `implements` keyword. For example,
    if we implement a file reader, we might take a `File` object as a constructor
    argument and override the `read` method to consume the file. The `read` method
    would return the number of bytes read.


    ```

    // java

    public class FileReader implements Readable {

    private final File file;

    public FileReader(File file) {

    this.file = file;

    }

    @Override

    public int read(CharBuffer buffer) {

    int read = 0;

    // ...

    return read;

    }

    }

    ```


    In Scala, you use `extends` just like when you extend regular classes. You’re
    forced to use the `override` keyword when overriding an existing concrete method,
    but not when you override an abstract method.


    ```

    // scala

    class FileReader(file: File) extends Readable {

    override def read(buffer: CharBuffer): Int = {    // override optional

    val linesRead: Int = 0

    return linesRead

    }

    }

    ```


    In Java, if you want to implement multiple interfaces you append the interface
    name to the Java class definition, so we could add `AutoClosable` behavior to
    our `FileReader`.


    ```

    // java

    public class FileReader implements Readable, AutoCloseable {

    private final File file;

    public FileReader(File file) {

    this.file = file;

    }

    @Override

    public int read(CharBuffer buffer) {

    int read = 0;

    // ...

    return read;

    }

    @Override

    public void close() throws Exception {

    // close

    }

    }

    ```


    In Scala, you use the `with` keyword to add additional traits. You do this when
    you want to extend a regular class, abstract class, or trait. Just use `extends`
    for the first and then `with` for any others. However, just like in Java, you
    can have only one super-class.


    ```

    // scala

    class FileReader(file: File) extends Readable with AutoCloseable {

    def read(buffer: CharBuffer): Int = {

    val linesRead: Int = 0

    // ...

    return linesRead

    }

    def close(): Unit = ???

    }

    ```


    What’s The Question?


    The `???` here is actually a method. It’s a handy method you can use to say “I
    don’t know yet”. It throws a runtime exception if you call it, a bit like `UnsupportedOperationException`
    in Java. It gets things compiling when you really don’t know what you need yet.'
