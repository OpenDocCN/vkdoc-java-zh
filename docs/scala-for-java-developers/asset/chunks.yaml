    # 17. Map and FlatMap


    In this chapter, we’ll look at some of the functional programming features of
    Scala, specifically the ubiquitous `map` and `flatMap` functions. We’re interested
    in these because they’re closely related to the idea of monads, a key feature
    of functional programming.


    ## Mapping Functions


    You’ll see the `map` function on countless classes in Scala. It’s often described
    in the context of collections. Classes like `List`, `Set`, and `Map` all have
    it. For these, it applies a given function to each element in the collection,
    giving back a new collection based on the result of that function. You “map” some
    function over each element of your collection.


    For example, you could create a function that works out how old a person is today,
    given the year of their birth.


    ```

    import java.util.Calendar

    def age(birthYear: Int) = {

    val currentYear = Calendar.getInstance.get(Calendar.YEAR)

    currentYear - birthYear

    }

    ```


    We could call the `map` function on a list of birth years, passing in the function
    to create a new list of ages.


    ```

    val birthdays = List(1990, 1977, 1984, 1961, 1973)

    birthdays.map(age)

    ```


    The result would be a list of ages. Assuming it’s run in 2017, we can transform
    the year 1990 into age 27, for example.


    ```

    res0: List[Int] = List(25, 38, 31, 54, 42)

    ```


    Being a higher-order function, you could have written the function inline as a
    lambda like this:


    ```

    birthdays.map(year => Calendar.getInstance.get(Calendar.YEAR) - year)

    ```


    Using the underscore as a shorthand for the lambda’s parameter, it would look
    like this:


    ```

    birthdays.map(Calendar.getInstance.get(Calendar.YEAR) - _)

    ```'
