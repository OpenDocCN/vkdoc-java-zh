- fmt: "# What to Avoid\n\nIt’s also great to know what to avoid when you’re first\
    \ starting out. I wish I knew some of these things before I started.\n\n- `SBT`\
    \ can make your life harder. `SBT` starts off very simple but, if you want to\
    \ do anything sophisticated, it gets fairly taxing. Be prepared to do some learning;\
    \ `SBT` isn’t something that you can get very far with by cutting and pasting\
    \ examples from the internet. You do actually need some understanding. I think\
    \ you’ll have bigger things to worry about so my suggestion is to stick with a\
    \ build tool that you’re familiar with to start with. It’s very easy to support\
    \ Scala projects in `Maven`.\n- `Scalaz` is not the place to start. This is the\
    \ Haskell programmer’s library for Scala. It’s hardcore and if you’ve not been\
    \ doing purely functional programming for years, just plain avoid it. You don’t\
    \ need to know what an applicative functor is or why you’d use a `Kleisli`. At\
    \ least, not to start with.\n- “Fancy” Scala libraries might not help. When Scala\
    \ first came out, a bunch of open source libraries hit the web. People got carried\
    \ away and in hindsight would probably admit they went a little overboard with\
    \ the syntax. As a result, there are lots of APIs that were not designed very\
    \ well.\n    - `Dispatch` HTTP library is a good example. The method to add a\
    \ query parameter to a request is `<<?`. That just doesn’t read as intuitively\
    \ as `addRequestParameter`. In fairness, `Dispatch` offers both variants but the\
    \ upshot is to be skeptical of libraries that overuse operator overloading.\n\
    \    - `Anorm` is another one that offers a parser API to extract SQL results.\
    \ It basically parses `ResultSets` but it has such an unintuitive DSL for doing\
    \ so it makes you wonder what was wrong with doing it manually.\n- Java libraries\
    \ work just fine. You can always use the Java libraries you know and love from\
    \ Scala.\n- Lack of consistency is dangerous. We’ve already touched on this: don’t\
    \ try and use all the syntax variations at once. Figure out one properly before\
    \ moving on. Keep things consistent.\n\n## Other Challenges\n\nYou’ll face plenty\
    \ of other challenges.\n\n- Compilation speed is slow. It may or may not be something\
    \ that concerns you but be aware: it’s unlikely to match Java’s speed anytime\
    \ soon. In part, this is due to just how sophisticated the Scala compiler is;\
    \ it does a lot of work and that comes at a price.\n- Keeping your IDE build configuration\
    \ in sync with your external build tool can be a challenge. `Maven` is so mature\
    \ now that its IDE plugins pretty much handle everything for you, but the `SBT`\
    \ plugin for `IDEA` on the other hand has some problems. There are third-party\
    \ tools that generate IDE project files but your mileage may vary. The best I\
    \ can offer is to pick the tools that seem to have the most weight behind them\
    \ for your IDE.\n- We’ve already talked about the functional programming continuum\
    \ but it’s worth mentioning again that it’s a good idea to be mindful of where\
    \ you want to be. I recommend aiming for “Functional in the small, OO in the large”\
    \ to start. You’ll need to continually monitor your progress and embrace the next\
    \ learning challenge when you feel ready. Push the boundaries and keep learning.\n\
    \nFootnotes [1](#A456960_1_En_24_Chapter.html#Fn22_source)\n\n[`http://twitter.github.io/effectivescala/`](http://twitter.github.io/effectivescala/)\n\
    \n[2](#A456960_1_En_24_Chapter.html#Fn23_source)\n\n[`http://docs.scala-lang.org/style/`](http://docs.scala-lang.org/style/)\n\
    \n## Appendix A: Code Listings\n\nFor the full source, see [`https://github.com/tobyweston/learn-scala-java-devs`](https://github.com/tobyweston/learn-scala-java-devs).\
    \ The following is a selection of examples from the text, expanded to provide\
    \ fuller context for your reference.\n\n### Inheritance\n\n#### Subtype Inheritance\
    \ in Java\n\n```\npackage s4j.java.chapter12 ;\npublic class Customer implements\
    \ Comparable {\nprivate final String name;\nprivate final String address;\nprivate\
    \ final ShoppingBasket basket = new ShoppingBasket();\npublic Customer(String\
    \ name, String address) {\nthis .name = name;\nthis .address = address;\n}\npublic\
    \ void add(Item item) {\nbasket.add(item);\n}\npublic Double total() {\nreturn\
    \ basket.value();\n}\n}\npackage s4j.java.chapter12 ;\npublic class DiscountedCustomer\
    \ extends Customer {\npublic DiscountedCustomer(String name, String address) {\n\
    super (name, address);\n}\n@Override\npublic Double total() {\nreturn super .total()\
    \ * 0.90;\n}\npublic Double getDiscountAmount() {\nreturn 10.0;\n}\n}\npackage\
    \ s4j.java.chapter12 ;\npublic interface Item {\nDouble price();\n}\npackage s4j.java.chapter12\
    \ ;\nimport java.util.HashSet ;\nimport java.util.Set ;\npublic class ShoppingBasket\
    \ {\nprivate final Set basket = new HashSet();\npublic void add(Item item) {\n\
    basket.add(item);\n}\npublic Double value() {\nreturn basket.stream().mapToDouble(Item::price).sum();\n\
    }\n}\n```\n\n#### Anonymous Classes in Java\n\n```\npackage s4j.java.chapter12\
    \ ;\nclass AnonymousClass {\npublic static void main(String... args) {\nCustomer\
    \ joe = new DiscountedCustomer(\"Joe\", \"128 Bullpen Street\");\n// example of\
    \ anonymous class\njoe.add( new Item() {\n@Override\npublic Double price() {\n\
    return 2.5;\n}\n});\njoe.add( new Item() {\n@Override\npublic Double price() {\n\
    return 3.5;\n}\n});\n// which can be replaced with lambdas\njoe.add(() -> 2.5);\n\
    joe.add(() -> 3.5);\nSystem.out.println(\"Joe's basket will cost $ \" + joe.total());\n\
    }\n}\n```\n\n#### Subtype Inheritance in Scala\n\n```\npackage s4j.scala.chapter12\n\
    class Customer ( val name : String , val address : String ) extends Ordered [\
    \ Custom\ner ] {\nprivate final val basket : ShoppingBasket = new ShoppingBasket\n\
    def add(item : Item ) {\nbasket.add(item)\n}\ndef total : Double = {\nbasket.value\n\
    }\n}\npackage s4j.scala.chapter12\nclass DiscountedCustomer (name : String , address\
    \ : String ) extends Customer (nam\ne, address) {\noverride def total : Double\
    \ = {\nsuper .total * 0.9\n}\n}\npackage s4j.scala.chapter12\ntrait Item {\ndef\
    \ price : Double\n}\npackage s4j.scala.chapter12\nimport scala.collection.mutable\n\
    class ShoppingBasket {\nprivate val basket = mutable. HashSet [ Item ]()\ndef\
    \ add(items : Item* ) {\nfor (item <- items)\nbasket.add(item)\n}\ndef value :\
    \ Double = {\nbasket.map( _ .price).sum\n}\n}\n```\n\n#### Anonymous Classes in\
    \ Scala\n\n```\npackage s4j.scala.chapter12\nobject AnonymousClass extends App\
    \ {\nval joe = new DiscountedCustomer (\"Joe\", \"128 Bullpen Street\")\n// example\
    \ of anonymous class\njoe.add( new Item {\ndef price = 2.5\n})\njoe.add( new Item\
    \ {\ndef price = 3.5\n})\nprintln(\"Joe's basket will cost $ \" + joe.total)\n\
    }\n```\n\n### Generics"
