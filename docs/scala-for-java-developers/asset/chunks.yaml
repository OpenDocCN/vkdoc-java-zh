    To redefine the method, we have to jump through some hoops. Firstly, we have to
    rename the field (say to `_id`), making it private so as to make the getter and
    setter private. Then we create a new getter method called `id` and setter method
    called `id_=` that are public and are used to access the renamed private field.


    ```

    class Customer(val name: String, val address: String) {

    private var _id: String = ""

    def id = _id

    def id_=(value: String) {

