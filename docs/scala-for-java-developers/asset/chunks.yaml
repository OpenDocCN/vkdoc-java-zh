- fmt: "### Wildcard Bounds (`<? extends T>`, `<? super T>`)\n\nWe’ve already seen\
    \ some examples of wildcards: the `?` in Java and the `_` in Scala.\n\nWildcards\
    \ with an upper bound look like this:\n\n```\n// java\nvoid printAnimals(List<?\
    \ extends Animal> animals) {\n    for (Animal animal : animals) {\n        System.out.println(animal);\n\
    \    }\n}\n// scala\ndef printAnimals(animals: List[_ <: Animal]) {\n    for (animal\
    \ <- animals) {\n        println(animal)\n    }\n}\n```\n\nWildcards with a lower\
    \ bound look like this:\n\n```\n// java\nstatic void addNumbers(List<? super Integer>\
    \ numbers) {\n    for (int i = 0; i < 100; i++) {\n        numbers.add(i);\n \
    \   }\n}\n// scala\ndef addNumbers(numbers: List[_ >: Int]) {\n    for (i <- 0\
    \ to 99) {\n        // ...\n    }\n}\n```\n\nUnbounded wildcards look like this\
    \ in Java:\n\n```\nList<?> list             // java\n```\n\n…and like this in\
    \ Scala:\n\n```\nList[_]                  // scala\n```\n\nAn unbounded wildcard\
    \ refers to an unknown generic type. For example, printing elements of a list\
    \ of unknown type will work with all lists. Just add upper- or lower-bound constraints\
    \ to limit the options.\n\n```\n// java\nvoid printUnknown(List<?> list) {\n \
    \   for (Object element : list) {\n        System.out.println(element);\n    }\n\
    }\n// scala\ndef printUnknown(list: List[_]) {\n    for (e <- list) {\n      \
    \  val f: Any = e\n        println(f)\n    }\n}\n```\n\nAlthough the implementation\
    \ can treat the elements as `Object` because everything is an object, you can’t\
    \ add anything to a list of unknown type.\n\n```\n// java\nList<?> list = new\
    \ ArrayList<Object>();\nlist.add(new Object()); // compiler error\n```\n\nThe\
    \ one exception is `null`.\n\n```\nlist.add(null);\n```\n\nYou get the same effect\
    \ in Scala, where you can’t even create a list without a valid type.\n\n```\n\
    scala> val list = mutable.MutableList[_]()\n<console>:7: error: unbound wildcard\
    \ type\nval list = mutable.MutableList[_]()\n^\n```\n\nYou mainly use wildcards\
    \ when you really don’t care about the type parameter, just any constraints on\
    \ an upper or lower bounding, or when you can treat the type as an instance of\
    \ `Object` or `Any`.\n\n### Multiple Bounds\n\nTypes can also have multiple bounds\
    \ in both Java and Scala.\n\n*   Java is limited to multiple upper bounds.\n*\
    \   Java can’t set a lower and upper bound on types (so you can’t have a generic\
    \ type extend one thing and also be a super-type to another).\n*   Scala can set\
    \ a single lower and an upper bound, unlike Java.\n*   However, Scala can’t set\
    \ multiple upper or lower bounds. Instead it can constrain bounds by also forcing\
    \ you to extend traits.\n\nUsing multiple bounds, another way to express the constraints\
    \ on the `Animal` sorting method would be to explicitly state that `A` must extend\
    \ `Animal` and be comparable to `Animal`, using the `&` symbol in Java.\n\n```\n\
    // java\npublic static <A extends Animal & Comparable<Animal>> void sort(List<A>\
    \ l)\n```\n\nThis sets two upper bounds to the generic type `A` in Java. You can’t\
    \ set two upper bounds on `A` in Scala, but you can achieve the same effect by\
    \ specifying that your bound must also extend certain traits.\n\n```\n// scala\n\
    def sort[A <: Animal with Comparable[Animal]](list: List[A]) = { }\n```\n\nBecause\
    \ we’re being more explicit, we can remove the type hints when calling the `sort`\
    \ method. In fact, you’ll get a compiler error if you don’t.\n\n```\nvar enclosure\
    \ = List[Lion]()\nenclosure = new Lion +: enclosure\nenclosure = new Lion +: enclosure\n\
    // sort[Lion, Animal](enclosure)     // compiler error\nsort(enclosure)\n```\n\
    \nIn Scala, you can also set both a lower and upper bound using `>:` and `<:`,\
    \ like this:\n\n```\ndef example[A >: Lion <: Animal](a: A) = ()             \
    \        // scala\n^         ^\nlower     upper\n```\n\n…where `A` must be a super-type\
    \ of `Lion` and a subtype of `Animal`.\n\n## Variance\n\nWithout involving generics,\
    \ a simple class `B` that extends `A` (see Figure [13-1](#A456960_1_En_13_Chapter.html#Fig1))\
    \ can be assigned to an instance of `A`; it is after all, an `A` as well as a\
    \ `B`. Obviously, subtyping is only in one direction; the other way around, and\
