    It’s static because we want to share its implementation among all instances to
    create globally unique IDs for each.


    In Scala, we’d separate the static from non-static members and put the statics
    in the singleton object and the rest in the class. The singleton object is the
    companion object to `Customer`.


    We create our class with the two required fields and in the singleton object,
    create the `nextId` method. Next, we create a private `var` to capture the current
    value, assigning it the value of zero so Scala can infer the type as an `Integer`.
    Adding a `val` here means no setter will be generated, and adding the `private`
    modifier means the generated getter will be private. We finish off by implementing
    the increment in the `nextId` method and calling it from the primary constructor.


    ```

    // scala

    class Customer(val name: String, val address: String) {

    private val id = Customer.nextId()

    }

    object Customer {

    private var lastId = 0

    private def nextId(): Integer = {

    lastId += 1

    lastId

    }

    }

    ```


    The singleton object is a companion object because it has the same name and lives
    in the same source file as its class. This means the two have a special relationship
    and can access each other’s private members. That’s how the `Customer` object
    can define the `nextId` method as private but the `Customer` class can still access
    it.


    If you were to name the object differently, you wouldn’t have this special relationship
    and wouldn’t be able to call the method. For example, the class `CustomerX` object
    that follows is not a companion object to `Customer` and so can’t see the private
    `nextId` method.


    ```

    // scala

    class Customer(val name: String, val address: String) {

    private val id = CustomerX.nextId()         // compiler failure

    }

    object CustomerX {

    private var lastId = 0

    private def nextId(): Integer = {

    lastId += 1

    lastId

    }

    }

    ```'
