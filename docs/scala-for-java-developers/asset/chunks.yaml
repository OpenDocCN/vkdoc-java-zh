- fmt: '# Exceptions


    Exceptions in Scala are handled in the same way as Java. They have all the same
    schematics in terms of interrupting control flow and aborting the program if not
    dealt with.


    Exceptions in Scala extend `java.lang.Throwable` like their Java counterparts
    but Scala has no concept of checked exceptions. All checked exceptions thrown
    from existing Java libraries get converted to `RuntimeExceptions`. Any exceptions
    you throw don’t need to be dealt with to keep the compiler happy; all exceptions
    in Scala are runtime exceptions (see Figure [12-2](#A456960_1_En_12_Chapter.html#Fig2)).


    ![A456960_1_En_12_Fig2_HTML.jpg](A456960_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    The Java exception hierarchy. Scala doesn’t use checked exceptions.


    Catching exceptions uses pattern matching like we saw earlier with match expressions.
    In Java you might do something like this to get the contents of a web page:


    ```

    // java

    try {

    URL url = new URL("http://baddotrobot.com");

    BufferedReader reader = new BufferedReader(

    new InputStreamReader(url.openStream()));

    try {

    String line;

    while ((line = reader.readLine()) != null)

    System.out.println(line);

    } finally {

    reader.close();

    }

    } catch (MalformedURLException e) {

    System.out.println("Bad URL");

    } catch (IOException e) {

    System.out.println("Problem reading data: " + e.getMessage());

    }

    ```


    We start with a URL to attempt to download. This can throw a `MalformedURLException`.
    As it’s a checked exception, we’re forced to deal with it. We then create a `Reader`
    and open a stream from the URL ready for reading. This can throw another exception,
    so we’re forced to deal with that too.


    When we start reading, the `readLine` method can also throw an exception but that’s
    handled by the existing catch. To make sure we clean up properly in the event
    of an exception here, we close the reader in a `finally` block.


    If we want to use Java 7’s try-with-resources construct, we can avoid the `finally`
    clause. The try-with-resources syntax will automatically call `close` on the reader.


    ```

    // java

    try {

    URL url = new URL("http://baddotrobot.com");

    try (BufferedReader reader = new BufferedReader(

    new InputStreamReader(url.openStream()))) {

    String line;

    while ((line = reader.readLine()) != null)

    System.out.println(line);

    }

    } catch (MalformedURLException e) {

    System.out.println("Bad URL");

    } catch (IOException e) {

    System.out.println("Problem reading data: " + e.getMessage());

    }

    ```


    In Scala things look pretty much the same.


    ```

    // scala

    try {

    val url = new URL("http://baddotrobot.com")

    val reader = new BufferedReader(new InputStreamReader(url.openStream))

    try {

    var line = reader.readLine

    while (line != null) {

    line = reader.readLine

    println(line)

    }

    } finally {

    reader.close()

    }

    } catch {

    case e: MalformedURLException => println("Bad URL")

    case e: IOException => println(e.getMessage)

    }

    ```


    We create the URL as before. Although it can throw an exception, we’re not forced
    to catch it. It’s a Java checked exception but Scala is converting it to a runtime
    exception.


    Although we’re not forced to, we do actually want to deal with the exceptions.
    So, we use the familiar `try` and `catch` statements. In the catch, the exceptions
    are dealt with using match expressions. We can tweak the pattern if we don’t actually
    need the exception in the code block by replacing the variable name with an underscore.
    This means we don’t care about the variable, only the class.


    ```

    case _: MalformedURLException => println("Bad URL")

    ```


    We just need to add the `finally` block back in. `finally` is just as it is in
    Java. There is no try-with-resources equivalent in Scala, although you can write
    your own method to achieve the same thing. (Hint: With something like the Loan
    pattern.)


    # Generics


    In this chapter we’ll look at generics or type parameterization or generic programming
    in Scala. We’ll look at the following:


    - Syntax for generics: defining types and methods.

    - Bounded types, `extends` and `super`.

    - Wildcards in both Java and Scala.

    - Covariance and contravariance.


    ## Parametric Polymorphism


    We talked briefly about subtype or inclusion polymorphism; the idea that subtypes
    can be substituted to stand in for their super-types. These stand-ins can provide
    different behavior without changing the structure of your code. The types of polymorphism
    are:


    - Inclusion polymorphism (see Chapter [11](#A456960_1_En_11_Chapter.html), Inheritance).

    - Ad hoc polymorphism (which is basically method overloading).

    - Parametric polymorphism.


    Parametric polymorphism allows us to write code generically without depending
    on specific types, yet still maintain type safety. We use it all the time when
    we work with classes that work against multiple types. For example:


    ```

    List customers = new ArrayList();       // java

    ```


    Parametric polymorphism will be familiar if you’ve ever created a list of something
    in Java. It’s more commonly referred to as generics; by giving a generic type
    (like `List`) a parameterized type, we can treat it as a list yet still refer
    to its contents in a type-safe way. Generics are at play even if you don’t specify
    the parameterized type in Java. So, although you can write the following:


    ```

    List collection = new ArrayList();                  // java

    ```


    …you’re actually creating a generic `List` of type `Object`.


    ```

    List collection = new ArrayList();        // java

    ```


    Diamond Operator


    You can create a list of `Object` in Java like this:


    ```

    List collection = new ArrayList();

    ```


    The diamond operator (`<>`) on the right-hand side of the assignment was new in
    Java 7, you were forced to repeat the generic type declaration on the right-hand
    side.


    ### Class Generics


    When you create a list of a specific type, Java will give you type safety on `List`
    methods that take parameters and return things of that type. For example, creating
    a list of customers but then trying to add an object that isn’t a customer will
    result in a compiler failure.


    ```

    List customers = new ArrayList();

    customers.add(new HockeyPuck());                // compiler failure

    ```


    The basic syntax for Scala will look familiar to Java developers; we just replace
    the chevrons with square brackets.


    ```

    List customers = new ArrayList();   // java

    ```


    versus


    ```

    val customers: List[Customer] = List()          // scala

    ```


    Creating a list in Scala like this also shows that it has the equivalent of the
    diamond operator. Scala’s type inference can work out that `customers` is of type
    `Customer` without repeating the generics on the right-hand side.


    ```

    val customers: List[Customer] = List[Customer]()

    ^

    // no need to repeat the type

    ```


    ### Method Generics


    You can define generic parameters for methods in a similar way. To define a generic
    parameter to a method without defining a generic type for the whole class, you’d
    do something like this in Java, where the generic type is defined straight after
    the `public` keyword and used as the type of the parameter `a`.


    ```

    public <A> void add(A a)                 // java

    ```


    …versus this in Scala:


    ```

    def add[A](a: A)                         // scala

    ```'
