    \ using special syntax (for example, `*age = 64` in C). Reference objects are\
    \ effectively dereferenced automatically.\n\nThere are nine value types in Scala,\
    \ as shown in Figure 4-2.\n\n![A456960_1_En_4_Fig2_HTML.jpg](A456960_1_En_4_Fig2_HTML.jpg)\n\
