- fmt: "# Lambdas vs. Closures\n\nA closure is a special type of lambda. It’s an anonymous\
    \ function but it also captures something from its environment when created.\n\
    \nEvery closure is a lambda but not all lambdas are closures! To make it more\
    \ confusing, an anonymous class can also be called a closure when it captures\
    \ some data.\n\nLet’s take a look at an example. Given the following interface\
    \ `Condition`:\n\n```java\ninterface Condition {\n    Boolean isSatisfied();\n\
    }\n```\n\n…an anonymous class might implement `Condition` to check if some server\
    \ has shutdown (it calls `waitFor` to poll continuously until the `isRunning`\
    \ method returns `false`).\n\n```java\nvoid anonymousClass() {\n    final Server\
    \ server = new HttpServer();\n    waitFor(new Condition() {\n        @Override\n\
    \        public Boolean isSatisfied() {\n            return !server.isRunning();\n\
    \        }\n    });\n}\n```\n\nThe functionally equivalent closure would look\
    \ like this:\n\n```java\nvoid closure() {\n    Server server = new HttpServer();\n\
    \    waitFor(() -> !server.isRunning());\n}\n```\n\nIn the interest of completeness,\
    \ the `waitFor` method might naively be implemented like this:\n\n```java\nclass\
    \ WaitFor {\n    static void waitFor(Condition condition) throws InterruptedException\
    \ {\n        while (!condition.isSatisfied())\n            Thread.sleep(250);\n\
    \    }\n}\n```\n\nBoth implementations are closures; the former is an anonymous\
    \ class and a closure, the latter is a lambda and a closure. As we’ve said, a\
    \ closure captures its \"environment\" at runtime. In the anonymous class version,\
    \ this means copying the value of `server` into an anonymous instance of `Condition`.\
    \ In the lambda, the `server` variable would also need to be copied into the function\
    \ at runtime.\n\nAs it’s a copy, it has to be declared `final` to ensure that\
    \ it can not be changed between when it’s captured and when it’s used. The value\
    \ at these two points in time could be very different as closures are often used\
    \ to defer execution until some later point.\n\nJava uses a neat trick whereby,\
    \ if it can reason that a variable is never updated, it might as well be `final`,\
    \ so it treats it as effectively `final` and you don’t need to declare it using\
    \ the `final` keyword explicitly.\n\nA lambda, on the other hand, doesn’t need\
    \ to copy its environment or capture any terms. This means it can be treated as\
    \ a genuine function and not an instance of a class.\n\nThe same example expressed\
    \ as a lambda and not a closure would look like this:\n\n```java\nvoid lambda()\
    \ {\n    Server httpServer = new HttpServer();\n    waitFor(server -> !server.isRunning(),\
    \ httpServer);\n}\n\nvoid waitFor(ServerCondition condition, Server server) {\n\
    \    while (!condition.isSatisfied(server))\n        Thread.sleep(250);\n}\n\n\
    interface ServerCondition {\n    Boolean isSatisfied(Server server);\n}\n```\n\
    \nThe trick here is that the lambda takes the `httpServer` instance as an argument\
    \ and so doesn’t need to capture it on construction. It doesn’t reference anything\
    \ outside of its scope so nothing is copied in. The same lambda instance can be\
    \ reused with different instances of a server.\n\nIt’s an important distinction\
    \ to make as a lambda doesn’t need to be instantiated many times. A closure has\
    \ to be instantiated and memory allocated for each value it closes over. Memory\
    \ need only be allocated once for non-closure lambdas and then the lambda can\
    \ be reused. This makes it more efficient, at least in theory.\n\n## Cheat Sheet\n\
    \nIf a lambda has no arguments and references something outside of its scope,\
    \ it’s also a closure. If a lambda works only on things passed in as parameters,\
    \ it’s not a closure.\n\n```java\n(x) -> x * 2;     // lambda\n() -> x * 2;  \
    \    // closure\n```\n\n## Footnotes\n\nLambdas are called using the `invokedynamic`\
    \ bytecode. It’s more efficient than generating new classes and instantiating\
    \ them as is the case for anonymous classes.\n\n# Inheritance\n\nIn this chapter\
    \ we’ll look at inheritance in Scala: how you create subclasses and override methods,\
    \ the Scala equivalent of interfaces and abstract classes, and the mechanisms\
    \ Scala offers for mixing in reusable behavior. We’ll finish by discussing how\
    \ to pick between all the options.\n\n## Subtype Inheritance\n\nCreating a subtype\
    \ of another class is the same as in Java. You use the `extends` keyword and you\
    \ can prevent subclassing with the `final` modifier on a class definition.\n\n\
    Let’s suppose we want to extend the basic `Customer` class from earlier and create\
    \ a special subtype to represent a `DiscountedCustomer`. A shopping basket might\
    \ belong to the `Customer` super-class, along with methods to add items to the\
    \ basket and total its value.\n\n```java\npublic class Customer {\n    private\
    \ final String name;\n    private final String address;\n    private final ShoppingBasket\
    \ basket = new ShoppingBasket();\n\n    public Customer(String name, String address)\
    \ {\n        this.name = name;\n        this.address = address;\n    }\n\n   \
    \ public void add(Item item) {\n        basket.add(item);\n    }\n\n    public\
    \ Double total() {\n        return basket.value();\n    }\n}\n```\n\nLet’s say\
    \ the `DiscountedCustomer` is entitled to a 10% discount on all purchases. We\
    \ can extend `Customer`, creating a constructor to match `Customer`, and call\
    \ `super` from it. We can then override the `total` method to apply the discount.\n\
    \n```java\npublic class DiscountedCustomer extends Customer {\n    public DiscountedCustomer(String\
    \ name, String address) {\n        super(name, address);\n    }\n\n    @Override\n\
    \    public Double total() {\n        return super.total() * 0.90;\n    }\n}\n\
    ```\n\nWe do exactly the same thing in Scala. Here’s the basic `Customer` class:\n\
    \n```scala\nclass Customer(val name: String, val address: String) {\n    private\
