  raw: '## Classes Without Constructor Arguments


    Let’s begin by looking at how we create fields within classes without defining
    them on the class definition line. If you were to create a class in Scala with
    no fields defined on the class definition, like this:


    ```

    // scala

    class Counter

    ```


    …the Scala compiler would still generate a primary constructor with no arguments,
    a lot like Java’s default constructor. So, the Java equivalent would look like
    this:


    ```

    // java

    public class Counter {

    public Counter() {

    }

    }

    ```


    In Java you might initialize a variable and create some methods.


    ```

    // java

    public class Counter {

    private int count = 0;

    public Counter() {

    }

    public void increment() {

    count++;

    }

    public int getCount() {

    return count;

    }

    }

    ```


    You can do the same in Scala.


    ```

    // scala

    class Counter {

    private var count = 0

    def increment() {

    count += 1

    }

    def getCount = count

    }

    ```


    Within the primary constructor (that is, not in the class definition but immediately
    afterwards in the class body), the `val` and `var` keywords may generate getters
    and setters . Their presence affects the bytecode as shown in Table [9-1](#A456960_1_En_9_Chapter.html#Tab1).


    Table 9-1


    How the presence of getters and setters affects the bytecode


    | Declared in primary constructor | `val x` | `var x` | `x` | `private val x`
    | `private var x` |

    | --- | --- | --- | --- | --- | --- |

    | Getter (`x()`) | Y (`public`) | Y (`public`) | N/A | Y (`private`) | Y (`private`)
    |

    | Setter (`x_=(y)`) | N | Y (`public`) | N/A | N | Y (`private`) |


    As you can see, this is consistent with Table [8-1](#A456960_1_En_8_Chapter.html#Tab1).
    Getters are generated by default for `val` and `var` types and will all be public.
    Adding `private` to the field declaration will make the generated fields private
    and setters are only generated for vars (which are, again, public by default).


    ## Additional Constructors


    Let’s create an alternative Java version of our `Customer` class, this time with
    additional constructors.


    ```

    // java

    public class Customer {

    private final String fullname;

    public Customer(String forename, String initial, String surname) {

    this.fullname =

    String.format("%s %s. %s", forename, initial, surname);

    }

    public Customer(String forename, String surname) {

    this(forename, "", surname);

    }

    }

    ```


    We’ve defaulted the customer’s initial and allowed clients to choose if they want
    to supply it.


    We should probably tidy up the main constructor to reflect the fact that the variable
    could come through as an empty string. We’ll add an if-condition and format the
    string depending on the result.


    ```

    // java

    public class Customer {

    private final String fullname;

    public Customer(String forename, String initial, String surname) {

    if (initial != null && !initial.isEmpty())

    this.fullname =

    String.format("%s %s. %s", forename, initial, surname);

    else

    this.fullname = String.format("%s %s", forename, surname);

    }

    public Customer(String forename, String surname) {

    this(forename, "", surname);

    }

    public static void main(String... args) {

    System.out.println(new Customer("Bob", "J", "Smith").fullname);

    System.out.println(new Customer("Bob", "Smith").fullname);

    }

    }

    ```


    Creating additional or auxiliary constructors in Scala is just a matter of creating
    methods called `this`. The one constraint is that each auxiliary constructor must
    call another constructor using `this` on its first line. That way, constructors
    will always be chained, all the way to the top.


    Scala has the notion of a primary constructor ; it’s the code in the class body.
    Any parameters passed in from the class definition are available to it. If you
    don’t write any auxiliary constructors, the class will still have a constructor;
    it’s the implicit primary constructor.


    ```

    // scala

    class Customer(forename: String, initial: String, surname: String) {

    // primary constructor

    }

    ```


    So, if we create a field within the primary constructor and assign it some value,


    ```

    // scala

    class Customer(forename: String, initial: String, surname: String) {

    val fullname = String.format("%s %s. %s", forename, initial, surname)

    }

    ```


    …it would be equivalent to the following Java:


    ```

    // java

    public class Customer {

    private final String fullname;

    public Customer(String forename, String initial, String surname) {

    this.fullname =

    String.format("%s %s. %s", forename, initial, surname);

    }

    }

    ```


    If we can add another auxiliary constructor to the Scala version, we can refer
    to `this` to chain the call to the primary constructor .


    ```

    // scala

    class Customer(forename: String, initial: String, surname: String) {

    val fullname = String.format("%s %s. %s", forename, initial, surname)

    def this(forename: String, surname: String) {

    this(forename, "", surname)

    }

    }

    ```


    ### Using Default Values


    Scala has language support for default values on method signatures, so we could
    have written this using just parameters on the class definition, and avoided the
    extra constructor. We’d just default the value for `initial` to be an empty string.
    To make the implementation handle empty strings better, we can put some logic
    in the primary constructor like in the Java version before.


    ```

    class Customer(forename: String, initial: String = "", surname: String) {

    val fullname = if (initial != null && !initial.isEmpty)

    forename + " " + initial + "." + surname

    else

    forename + " " + surname

    }

    ```


    When calling it, we would need to name default values when we don’t supply all
    the arguments in the order they’re declared. For example:


    ```

    new Customer("Bob", "J", "Smith")

    ```


    `"Bob", "J", "Smith"` is ok, but if we skip the `initial` variable, we’d need
    to name the surname variable like this:


    ```

    new Customer("Bob", surname = "Smith")

    ```'
