- fmt: '# Polymorphism


    Where you might use inheritance in Java, there are more options available to you
    in Scala. Inheritance in Java typically means subtyping classes to inherit behavior
    and state from the super-class. You can also view implementing interfaces as inheritance
    where you inherit behavior but not state.


    In both cases the benefits are around substitutability: the idea that you can
    replace one type with another to change system behavior without changing the structure
    of the code. This is referred to as inclusion polymorphism.


    Scala allows for inclusion polymorphism in the following ways:


    - Traits without default implementations.

    - Traits with default implementations (because these are used to “mix in” behavior,
    they’re often called mixin traits).

    - Abstract classes (with and without fields).

    - Traditional class extension.

    - Structural types, a kind of duck typing familiar to Ruby developers but which
    uses reflection.


    ## Traits vs. Abstract Classes


    There are a couple of differences between traits and abstract classes. The most
    obvious is that traits cannot have constructor arguments. Traits also provide
    a way around the problem of multiple inheritance that you’d see if you were allowed
    to extend multiple classes directly. Like Java, a Scala class can only have a
    single super-class, but can mixin as many traits required. So, despite this restriction,
    Scala does support multiple inheritance. Kind of.


    Multiple inheritance can cause problems when subclasses inherit behavior or fields
    from more than one super-class. In this scenario, with methods defined in multiple
    places, it’s difficult to reason about which implementation should be used. The
    is a relationship breaks down when a type has multiple super-classes.


    Scala allows for a kind of multiple inheritance by distinguishing between the
    class hierarchy and the trait hierarchy. Although you can’t extend multiple classes,
    you can mixin multiple traits. Scala uses a process called linearization to resolve
    duplicate methods in traits. Specifically, Scala puts all the traits in a line
    and resolves calls to `super` by going from right to left along the line.


    ### Does Scala Support Multiple Inheritance?


    If by “inheritance” you mean classic class extension, then Scala doesn’t support
    multiple inheritance. Scala allows only a single class to be “extended”. It’s
    the same as Java in that respect. However, if you mean can behavior be inherited
    by other means, then yes, Scala does support multiple inheritance.


    A Scala class can mixin behavior from any number of traits, just as Java 8 can
    mixin behavior from multiple interfaces with default methods. The difference is
    in how they resolve clashes. Scala uses linearization to predictably resolve a
    method call at runtime, whereas Java 8 relies on compilation failure.


    Linearization means that the order in which traits are defined in a class definition
    is important (see Figure [11-1](#A456960_1_En_11_Chapter.html#Fig1)). For example,
    we could have the following:


    ![A456960_1_En_11_Fig1_HTML.jpg](A456960_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Basic Animal class hierarchy


    ```

    class Animal

    trait HasWings extends Animal

    trait Bird extends HasWings

    trait HasFourLegs extends Animal

    ```


    If we add a concrete class that extends `Animal` but also `Bird` and `HasFourLegs`,
    we have a creature (`FlyingHorse`) that has all of the behaviors in the hierarchy
    (see Figure [11-2](#A456960_1_En_11_Chapter.html#Fig2)).


    ![A456960_1_En_11_Fig2_HTML.jpg](A456960_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Concrete class `FlyingHorse` extends everything


    ```

    class Animal

    trait HasWings extends Animal

    trait Bird extends HasWings

    trait HasFourLegs extends Animal

    class FlyingHorse extends Animal with Bird with HasFourLegs

    ```


    The problem comes when we have a method that any of the classes could implement
    and potentially call that method on their super-class. Let’s say there’s a method
    called `move`. For an animal with legs, `move` might mean to travel forwards,
    whereas an animal with wings might travel upwards as well as forwards, as shown
    in Figure [11-3](#A456960_1_En_11_Chapter.html#Fig3). If you call `move` on our
    `FlyingHorse`, which implementation would you expect to be called? How about if
    it in turn calls `super.move`?


    ![A456960_1_En_11_Fig3_HTML.jpg](A456960_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    How should a call to `move` resolve?


    Scala addresses the problem using the linearization technique. Flattening the
    hierarchy from right to left would give us `FlyingHorse`, `HasForLegs`, `Bird`,
    `HasWings`, and finally `Animal` (see Figure [11-4](#A456960_1_En_11_Chapter.html#Fig4)).
    So, if any of the classes call a super-class’s method, it will resolve in that
    order.


    ![A456960_1_En_11_Fig4_HTML.jpg](A456960_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Class `FlyingHorse` extends `Animal with Bird with HasFourLegs`


    If we change the order of the traits and swap `HasFourLegs` with `Birds`, as shown
    in Figure [11-5](#A456960_1_En_11_Chapter.html#Fig5), the linearization changes
    and we get a different evaluation order.


    ![A456960_1_En_11_Fig5_HTML.jpg](A456960_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Class `FlyingHorse` extends `Animal with HasFourLegs with Bird`


    Figure [11-6](#A456960_1_En_11_Chapter.html#Fig6) shows what the examples look
    like side by side.


    ![A456960_1_En_11_Fig6_HTML.jpg](A456960_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    The linearization of the two hierarchies


    With default methods in Java 8 there is no linearization process: any potential
    clash causes the compiler to error and the programmer has to refactor around it.


    Apart from allowing multiple inheritance, traits can also be stacked or layered
    on top of each other to provide a call chain, similar to aspect-oriented programming,
    or using decorators. There’s a good section on layered traits in Scala for the
    Impatient [²](#A456960_1_En_11_Chapter.html#Fn11) by Cay S. Horstmann if you want
    to read more.


    ## Deciding Between the Options


    Here are some tips to help you choose when to use the different inheritance options.


    Use traits without state when you would have used an interface in Java; namely,
    when you define a role a class should play where different implementations can
    be swapped in. For example, when you want to use a test double when testing and
    a "real" implementation in production. "Role" in this sense implies no reusable
    concrete behavior, just the idea of substitutability.


    When your class has behavior and that behavior is likely to be overridden by things
    of the same type, use a regular class and extend. Both of these are types of inclusion
    polymorphism.


    Use an abstract class in the case when you’re more interested in reuse than in
    an OO is a relationship. For example, data structures might be a good place to
    reuse abstract classes, but our `Customer` hierarchy from earlier might be better
    implemented as non-abstract classes.


    If you’re creating reusable behavior that may be reused by unrelated classes,
    make it a mixin trait as they have fewer restrictions on what can use them compared
    to abstract classes.


    Odersky also talks about some other factors, like performances and Java interoperability,
    in Programming in Scala.[³](#A456960_1_En_11_Chapter.html#Fn12)


    Footnotes [1](#A456960_1_En_11_Chapter.html#Fn10_source)


    Since Scala 2.12, anonymous classes can be converted into Java SAMs automatically.


    [2](#A456960_1_En_11_Chapter.html#Fn11_source)


    [`http://amzn.to/1yskLc7`](http://amzn.to/1yskLc7)


    [3](#A456960_1_En_11_Chapter.html#Fn12_source)


    [`http://www.artima.com/pins1ed/traits.html#12.7`](http://www.artima.com/pins1ed/traits.html#12.7)


    # 12. Control Structures


    This chapter is all about control structures, like `if` statements, switch blocks,
    loops, and breaks. Specifically, we’ll look at the following:


    - Conditionals like `if` statements, ternary expressions, and switches.

    - Looping structures: `do`, `while` and `for`

    - Breaking control flow.

    - Exceptions, briefly.


    ## Conditionals'
