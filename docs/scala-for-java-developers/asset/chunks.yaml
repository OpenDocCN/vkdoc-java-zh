    ## 底部类型


    对于许多 Java 开发者来说，一个全新的概念是类层次结构可以拥有共同的底部类型。这些类型是所有类型的子类型。Scala 的 `Null` 和 `Nothing`
    类型都是底部类型。


    Scala 中的所有引用类型都是 `Null` 的超类型。`Null` 也是一个 `AnyRef` 对象；它是每个引用类型的子类（参见图 4-5）。


    ![A456960_1_En_4_Fig5_HTML.jpg](img/A456960_1_En_4_Fig5_HTML.jpg)


    图 4-5


    `Null` 扩展了 `AnyRef`


    值类型和引用类型都是 `Nothing` 的超类型。它位于类层次结构的底部，是所有类型的子类型，如图 4-6 所示。


    ![A456960_1_En_4_Fig6_HTML.jpg](img/A456960_1_En_4_Fig6_HTML.jpg)


    图 4-6


    `Nothing` 扩展了 `Null`


    请注意，`Null` 扩展了所有引用类型，而 `Nothing` 扩展了所有类型。值得注意的是，Scala 中的 `null` 是一个对象，并且是 `Null`
    类型的唯一实例。因为 `Null` 是一个底部类型，所以 `null` 可以赋值给任何引用类型（`AnyRef`），但不能赋值给 `AnyVal` 的子类型。


    以下代码是有效的：


    ```

    val x: String = null

    ```


    ……但尝试将 `null` 赋值给 `Double`（它扩展了 `AnyVal`）会导致编译器错误。


    ```

    val x: Double = null         // 编译器错误

    ```


    完整的层次结构如图 4-7 所示。


    ![A456960_1_En_4_Fig7_HTML.jpg](img/A456960_1_En_4_Fig7_HTML.jpg)


    图 4-7


    包含底部类型 `Null` 和 `Nothing` 的完整层次结构


    # 5. ScalaDoc


    Scala 借鉴了 JavaDoc 的概念，并创造性地将其命名为 ScalaDoc。为 Scala 源码添加 ScalaDoc 的方式与添加 JavaDoc
    类似，都是通过在注释中使用标记来实现（参见图 5-1）。例如，源码中的以下片段


    ```

    /** 如果此值等于 x，则返回 `true`，否则返回 `false`。 **/

    def ==(x: Byte): Boolean

    ```


    ……可以转换为 HTML 中的以下片段：


    ![A456960_1_En_5_Fig1_HTML.jpg](img/A456960_1_En_5_Fig1_HTML.jpg)


    图 5-1


    嵌入的 ScalaDoc 标记在 HTML 中呈现


    要查看 Scala 库 API 的文档，请访问 Scala 网站。¹ 你会注意到它与 JavaDoc 大体相似。你可以看到左侧的类；它们不像 JavaDoc
    那样按包分组，但你可以点击它们以获取更多信息。


    ![A456960_1_En_5_Fig2_HTML.jpg](img/A456960_1_En_5_Fig2_HTML.jpg)


    图 5-2


    `Char` 的基本 ScalaDoc


    ScalaDoc 的一个巧妙之处在于，你还可以过滤内容。例如，你可以只显示从 `Any` 继承的方法。


    如果你对某个类的层次结构感兴趣，可以查看它的超类型和子类型。你甚至可能看到一个可导航的类型层次结构图，尽管并非每个类都有此功能。图 5-3 中 `Source`
    的类型层次结构图显示它是 `Iterable` 和 `Closable` 的子类型，你可以通过点击该图在层次结构中向上导航。


    ![A456960_1_En_5_Fig3_HTML.jpg](img/A456960_1_En_5_Fig3_HTML.jpg)


    图 5-3


    显示类型层次结构图的 ScalaDoc 脚注 1


    [`http://docs.scala-lang.org/api/all.html`](http://docs.scala-lang.org/api/all.html)


    # 6. 语言特性


    在我们的探索之旅中，我们已经看到了一些示例语法，了解了类层次结构，并简要了解了 ScalaDoc，但 Scala 还提供了大量其他有趣的语言特性。


    在本章中，我们不会真正讨论语法，而是会探讨一些使 Scala 在处理源代码、使用方法以及利用其函数式编程特性时，成为一门有趣且强大语言的因素。


    ## 处理源代码


    源文件。在 Scala 中，源文件的内容比 Java 灵活得多。在 Java 中，文件名必须与其包含的公共类名称相同，但对于 `.scala` 文件则没有这样的限制。一个名为
    `Customer.scala` 的文件可能包含一个名为 `Customer` 的类，但并非必须如此。同样，它可能包含四个类，但没有一个叫 `Customer`。


    包。虽然本质上与 Java 中的包相同，但 Scala 中包内的类不必像 Java 那样存放在同名的文件夹中。在作用域方面存在一些差异——例如，Scala
    中没有 `protected` 关键字，但你可以使用特殊语法（`variable[package]`）来实现相同的效果。


    包对象。Scala 还有包对象的概念。这些对象可以放置有用的代码块，以便在包作用域内重用。它们对包中的其他类可用，如果有人导入了该包，那么包对象中的所有内容对他们也是可用的。库经常使用这些对象，以便你可以一次性导入它们的所有类。


    导入别名。导入与 Java 大致相同，但一旦你在 Scala 中导入了一个类，你就可以在你的类中重命名它。换句话说，你可以为你的类中的某个类创建别名。这在遇到名称冲突时非常有用——例如，在库之间。


    类型别名。Scala 也支持类型别名。你可以为复杂的类型定义指定别名，以帮助阐明意图。这类似于 C 语言中无结构的 `typedef` 或 `#define`
    宏，或者 Haskell 中所谓的类型同义词。


    特质。虽然 Scala 有类和对象，但没有“接口”关键字。相反，它有 `trait`（特质）的概念，它类似于接口，但可以包含方法。它介于 Java 8 的默认方法和
    Ruby 的混入（mixin）之间。

