  raw: '## Java Interoperability


    I have already mentioned that you can use any Java class from Scala. For example,
    let’s say we want to create a Java `List` rather than the usual Scala immutable
    `List`.


    ```

    val list = new java.util.ArrayList[String]

    ```


    All we did was fully qualify the class name (`java.util.ArrayList`) and use `new`
    to instantiate it. Notice the square brackets? Scala denotes generics using `[]`
    rather than `<>`. We also didn’t have to use the parentheses on the constructor,
    as we had no arguments to pass in.


    We can make method calls—for example, adding an element—just as you’d expect:


    ```

    list.add("Hello")

    ```


    …or, using infix:


    ```

    l  ist add "World!"

    ```


    ## Primitive Types


    In Java there are two integer types: the primitive (non-object) `int` and the
    `Integer` class. Scala has no concept of primitives—everything is an object—so,
    for example, Scala’s integer type is an `Int`. Similarly, you’ll be familiar with
    the other basic types.


    ```

    Byte

    Short

    Int

    Long

    Char

    String

    Float

    Double

    Boolean

    ```


    Although Scala has its own richer types, typically they just wrap the Java types.
    When working with these basic types, nine times out of ten you won’t need to worry
    if you’re using Scala or Java types. Things are pretty seamless. For example,
    Scala has a `BigDecimal` type with a `+` method, which means you can add two big
    decimals with much less code than in Java.


    Compare the following Scala to Java:


    ```

    // scala

    val total = BigDecimal(10000) + BigDecimal(200)

    // java

    BigDecimal total = new BigDecimal(10000).add(new BigDecimal(200));

    ```


    Scala hasn’t reimplemented Java’s `BigDecimal`; it just delegates to it and saves
    you having to type all that boilerplate.


    # 4. Scala’s Class Hierarchy


    Scala’s class hierarchy starts with the `Any` class in the `scala` package. It
    contains methods like `==`, `!=`, `equals`, `##`, `hashCode`, and `toString`.


    ```

    abstract class Any {

    final def ==(that: Any): Boolean

    final def !=(that: Any): Boolean

    def equals(that: Any): Boolean

    def ##: Int

    def hashCode: Int

    def toString: String

    // ...

    }

    ```


    Every class in Scala inherits from the abstract class `Any`. It has two immediate
    subclasses, `AnyVal` and `AnyRef`, as shown in Figure [4-1](#A456960_1_En_4_Chapter.html#Fig1).


    ![A456960_1_En_4_Fig1_HTML.jpg](A456960_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Every class extends the `Any` class


    ## AnyVal


    `AnyVal` is the super-type to all value types, and `AnyRef` the super-type of
    all reference types.


    Basic types such as `Byte`, `Int`, `Char`, and so on are known as value types.
    In Java value types correspond to the primitive types, but in Scala they are objects.
    Value types are all predefined and can be referred to by literals. They are usually
    allocated on the stack, but are allocated on the heap in Scala.


    All other types in Scala are known as reference types. Reference types are objects
    in memory (the heap), as opposed to pointer types in C-like languages, which are
    addresses in memory that point to something useful and need to be dereferenced
    using special syntax (for example, `*age = 64` in C). Reference objects are effectively
    dereferenced automatically.


    There are nine value types in Scala, as shown in Figure [4-2](#A456960_1_En_4_Chapter.html#Fig2).


    ![A456960_1_En_4_Fig2_HTML.jpg](A456960_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Scala’s value types


    These classes are fairly straightforward; they mostly wrap an underlying Java
    type and provide implementations for the `==` method that are consistent with
    Java’s `equals` method.


    This means, for example, that you can compare two number objects using `==` and
    get a sensible result, even though they may be distinct instances.


    So, `42 == 42` in Scala is equivalent to creating two `Integer` objects in Java
    and comparing them with the `equals` method: `new Integer(42).equals(new Integer(42))`.
    You’re not comparing object references, like in Java with `==`, but natural equality.
    Remember that `42` in Scala is an instance of `Int`, which in turn delegates to
    `Integer`.


    ## Unit


    The `Unit` value type is a special type used in Scala to represent an uninteresting
    result. It’s similar to Java’s `Void` object or `void` keyword when used as a
    return type. It has only one value, which is written as an empty pair of brackets
    as follows:


    ```

    scala> val example: Unit = ()

    example: Unit = ()

    ```


    A Java class implementing `Callable` with a `Void` object as a return would look
    like this:


    ```

    // java

    public class DoNothing implements Callable {

    @Override

    public Void call() throws Exception {

    return null;

    }

    }

    ```


    It is identical to this Scala class returning `Unit`:


    ```

    // scala

    class DoNothing extends Callable[Unit] {

    def call: Unit = ()

    }

    ```


    Remember that the last line of a Scala method is the return value, and `()` represents
    the one and only value of `Unit`.


    ## AnyRef


    `AnyRef` is an actually an alias for Java’s `java.lang.Object` class. The two
    are interchangeable. It supplies default implementations for `toString`, `equals`,
    and `hashcode` for all reference types.


    There used to be a subclass of `AnyRef` called `ScalaObject` that all Scala reference
    types extended (see Figure [4-3](#A456960_1_En_4_Chapter.html#Fig3)). However,
    it was only there for optimization purposes and was removed in Scala 2.11. (I
    mention it as a lot of documentation still refers to it.)


    ![A456960_1_En_4_Fig3_HTML.jpg](A456960_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Scala `Any`. The `ScalaObject` class no longer exists.


    The Java `String` class and other Java classes used from Scala all extend `AnyRef`.
    (Remember it’s a synonym for `java.lang.Object`.) Any Scala-specific classes,
    like Scala’s implementation of a list, `scala.List`, also extend `AnyRef`.


    ![A456960_1_En_4_Fig4_HTML.jpg](A456960_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Scala’s reference types


    For reference types like these (shown in Figure [4-4](#A456960_1_En_4_Chapter.html#Fig4)),
    `==` will delegate to the `equals` method like before. For pre-existing classes
    like `String`, `equals` is already overridden to provide a natural notion of equality.
    For your own classes, you can override the `equals` just as you would in Java,
    but still be able to use `==` in code.


    For example, you can compare two strings using `==` in Scala and it would behave
    just as it would in Java if you used the `equals` method:


    ```

    new String("A") == new String("A")        // true in scala, false in java

    new String("B").equals(new String("B"))   // true in scala and java

    ```


    If, however, you want to revert back to Java’s semantics for `==` and perform
    reference equality in Scala, you can call the `eq` method defined in `AnyRef`:


    ```

    new String("A") eq new String("A")        // false in scala

    new String("B") == new String("B")        // false in java

    ```'
