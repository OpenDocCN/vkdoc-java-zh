    需要注意的重要一点是，Scala 在第 6 行和第 10 行生成了访问器方法，并在第 14 行生成了一个构造函数。这些访问器没有使用 Java 的 getter
    约定，但我们得到了与 `getName` 和 `getAddress` 等效的方法。


    你可能还想定义字段，但不通过构造函数来设置它们。例如，在 Java 中，我们可能想为客户添加一个 `id`，稍后通过 setter 方法进行设置。这是像 Hibernate
    这类工具在从数据库填充对象时常用的模式。


