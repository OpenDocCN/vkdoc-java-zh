    ## Lambda 表达式 vs. 闭包


    闭包是一种特殊的 lambda 表达式。它是一个匿名函数，但在创建时会从环境中捕获某些内容。


    每个闭包都是 lambda 表达式，但并非所有 lambda 表达式都是闭包！更令人困惑的是，匿名类在捕获某些数据时也可以被称为闭包。


    让我们看一个例子。给定以下接口 `Condition`：


    ```

    // java

    interface Condition {

    Boolean isSatisfied();

    }

    ```


    ……一个匿名类可以实现 `Condition` 来检查某个服务器是否已关闭（它调用 `waitFor` 持续轮询，直到 `isRunning` 方法返回 `false`）。


    ```

    // java

    void anonymousClass() {

    final Server server = new HttpServer();

    waitFor(new Condition() {

    @Override

    public Boolean isSatisfied() {

    return !server.isRunning();

    }

    });

    }

    ```


    功能等效的闭包看起来像这样：


    ```

    // java

    void closure() {

    Server server = new HttpServer();

    waitFor(() -> !server.isRunning());

    }

    ```


    为了完整性，`waitFor` 方法可能被简单地实现如下：


    ```

    // java

    class WaitFor {

    static void waitFor(Condition condition) throws InterruptedException {

    while (!condition.isSatisfied())

    Thread.sleep(250);

    }

    }

    ```


    两种实现都是闭包；前者是匿名类和闭包，后者是 lambda 表达式和闭包。正如我们所说，闭包在运行时捕获其“环境”。在匿名类版本中，这意味着将 `server`
    的值复制到 `Condition` 的匿名实例中。在 lambda 表达式中，`server` 变量也需要在运行时复制到函数中。


    由于是复制，它必须被声明为 final，以确保在捕获和使用之间不会被更改。这两个时间点的值可能非常不同，因为闭包通常用于将执行推迟到稍后的某个时间点。


    Java 使用了一个巧妙的技巧：如果它能推断出一个变量从未被更新，那么它就可以被视为 final，因此它将其视为“实际上的 final”，你不需要显式使用
    `final` 关键字来声明。


    另一方面，lambda 表达式不需要复制其环境或捕获任何项。这意味着它可以被视为一个真正的函数，而不是一个类的实例。


    同一个例子，如果表示为 lambda 表达式而不是闭包，看起来像这样：


    ```

    // java

    void lambda() {

    Server httpServer = new HttpServer();

    waitFor(server -> !server.isRunning(), httpServer);

    }

    void waitFor(ServerCondition condition, Server server) {

    while (!condition.isSatisfied(server))

    Thread.sleep(250);

    }

    interface ServerCondition {

    Boolean isSatisfied(Server server);

    }

    ```


    这里的技巧是，lambda 表达式将 `httpServer` 实例作为参数，因此不需要在构造时捕获它。它不引用其作用域之外的任何内容，因此没有复制任何内容。同一个
    lambda 实例可以用于不同的服务器实例。


    这是一个重要的区别，因为 lambda 表达式不需要被多次实例化。闭包必须被实例化，并且为它关闭的每个值分配内存。对于非闭包的 lambda 表达式，内存只需分配一次，然后
    lambda 表达式可以被重用。这使得它更高效，至少在理论上是这样。


    速查表


    如果一个 lambda 表达式没有参数，并且引用了其作用域之外的内容，那么它也是一个闭包。如果一个 lambda 表达式只对作为参数传入的内容进行操作，那么它就不是闭包。


    ```

    (x) -> x * 2;     // lambda 表达式

    () -> x * 2;      // 闭包

    ```


    脚注 1


    Lambda 表达式使用 `invokedynamic` 字节码调用。这比生成新类并像匿名类那样实例化它们更高效。


    # 11. 继承


    在本章中，我们将探讨 Scala 中的继承：如何创建子类并重写方法，Scala 中接口和抽象类的等效物，以及 Scala 提供的用于混入可重用行为的机制。最后，我们将讨论如何在所有选项中进行选择。


    ## 子类型继承


    创建另一个类的子类型与 Java 相同。你使用 `extends` 关键字，并且可以通过在类定义上使用 `final` 修饰符来防止子类化。


    假设我们想扩展之前的基本 `Customer` 类，并创建一个特殊的子类型来表示 `DiscountedCustomer`。购物篮可能属于 `Customer`
    超类，以及向购物篮添加商品和计算其总价值的方法。


    ```

    // java

    public class Customer {

    private final String name;

    private final String address;

    private final ShoppingBasket basket = new ShoppingBasket();

    public Customer(String name, String address) {

    this.name = name;

    this.address = address;

    }

    public void add(Item item) {

    basket.add(item);

    }

    public Double total() {

    return basket.value();

    }

    }

    ```


    假设 `DiscountedCustomer` 有权享受所有购买商品 10% 的折扣。我们可以扩展 `Customer`，创建一个与 `Customer`
    匹配的构造函数，并从中调用 `super`。然后我们可以重写 `total` 方法来应用折扣。


    ```

    // java

    public class DiscountedCustomer extends Customer {

    public DiscountedCustomer(String name, String address) {

    super(name, address);

    }

    @Override

    public Double total() {

    return super.total() * 0.90;

    }

    }

    ```


    我们在 Scala 中做完全相同的事情。这是基本的 `Customer` 类：


    ```

    // scala

    class Customer(val name: String, val address: String) {

    private final val basket: ShoppingBasket = new ShoppingBasket

    def add(item: Item) {

    basket.add(item)

    }

    def total: Double = {

    basket.value

    }

    }

    ```


    当涉及到将 `Customer` 扩展为 `DiscountedCustomer` 时，需要考虑一些事情。首先，我们将创建 `DiscountedCustomer`
    类。


    ```

    class DiscountedCustomer

    ```


    如果我们尝试扩展 `Customer` 来创建 `DiscountedCustomer`，我们会得到一个编译器错误。


    ```

    class DiscountedCustomer extends Customer        // 编译器错误

    ```


    我们收到编译器错误，因为我们需要使用其参数的值调用 `Customer` 构造函数。在 Java 中，当我们在新构造函数中调用 `super` 时，也必须做同样的事情。


    Scala 有一个主构造函数和辅助构造函数。辅助构造函数必须被链接起来，最终调用主构造函数，而在 Scala 中，只有主构造函数可以调用超类构造函数。我们可以像这样向主构造函数添加参数：


    ```

    class DiscountedCustomer(name: String, address: String) extends Customer

    ```


    但我们不能像在 Java 中那样直接调用 `super`。


    ```

    class DiscountedCustomer(name: String, address: String) extends Customer {

    super(name, address)                        // 编译器错误

    }

    ```


    在 Scala 中，要调用超类构造函数，你需要将主构造函数的参数传递给超类。请注意，`DiscountedCustomer` 的参数没有设置为 `val`。它们不是字段；相反，它们的作用域局限于主构造函数，并直接传递给超类，如下所示：


    ```

    class DiscountedCustomer(name: String, address: String)

    extends Customer(name, address)

    ```


    最后，我们可以在子类中实现打折后的 `total` 方法。


    ```

    override def total: Double = {

    super.total * 0.90

    }

    ```


    这里需要注意两点：`override` 关键字是必需的，并且要调用超类的 `total` 方法，我们使用 `super` 加一个点，就像在 Java 中一样。


    `override` 关键字类似于 Java 中的 `@Override` 注解。它允许编译器检查错误，例如拼错方法名称或提供错误的参数。Java 注解和
    Scala 的 `override` 之间唯一的真正区别是，在 Scala 中，当你重写非抽象方法时，它是强制性的。

