    \ `total` method, we use `super` and a dot, just like in Java.\n\nThe `override`\
    \ keyword is like the `@Override` annotation in Java. It allows the compiler to\
    \ check for mistakes like misspelling the name of the method or providing the\
    \ wrong arguments. The only real difference between the Java annotation and Scala’s\
    \ is that it’s mandatory in Scala when you override non-abstract methods."
  raw: '## Lambdas vs. Closures


    A closure is a special type of lambda . It’s an anonymous function but it also
    captures something from its environment when created.


    Every closure is a lambda but not all lambdas are closures! To make it more confusing,
    an anonymous class can also be called a closure when in captures some data.


    Let’s take a look at an example. Given the following interface `Condition`:


    ```

    // java

    interface Condition {

    Boolean isSatisfied();

    }

    ```


    …an anonymous class might implement `Condition` to check if some server has shutdown
    (it calls `waitFor` to poll continuously until the `isRunning` method returns
    `false`).


    ```

    // java

    void anonymousClass() {

    final Server server = new HttpServer();

    waitFor(new Condition() {

    @Override

    public Boolean isSatisfied() {

    return !server.isRunning();

    }

    });

    }

    ```


    The functionally equivalent closure would look like this:


    ```

    // java

    void closure() {

    Server server = new HttpServer();

    waitFor(() -> !server.isRunning());

    }

    ```


    In the interest of completeness, the `waitFor` method might naively be implemented
    like this:


    ```

    // java

    class WaitFor {

    static void waitFor(Condition condition) throws InterruptedException {

    while (!condition.isSatisfied())

    Thread.sleep(250);

    }

    }

    ```


    Both implementations are closures; the former is an anonymous class and a closure,
    the latter is a lambda and a closure. As we’ve said, a closure captures its "environment"
    at runtime. In the anonymous class version, this means copying the value of `server`
    into an anonymous instance of `Condition`. In the lambda, the `server` variable
    would also need to be copied into the function at runtime.


    As it’s a copy, it has to be declared final to ensure that it can not be changed
    between when it’s captured and when it’s used. The value at these two points in
    time could be very different as closures are often used to defer execution until
    some later point.


    Java uses a neat trick whereby, if it can reason that a variable is never updated,
    it might as well be final, so it treats it as effectively final and you don’t
    need to declare it using the `final` keyword explicitly.


    A lambda, on the other hand, doesn’t need to copy its environment or capture any
    terms. This means it can be treated as a genuine function and not an instance
    of a class.


    The same example expressed as a lambda and not a closure would look like this:


    ```

    // java

    void lambda() {

    Server httpServer = new HttpServer();

    waitFor(server -> !server.isRunning(), httpServer);

    }

    void waitFor(ServerCondition condition, Server server) {

    while (!condition.isSatisfied(server))

    Thread.sleep(250);

    }

    interface ServerCondition {

    Boolean isSatisfied(Server server);

    }

    ```


    The trick here is that the lambda takes the `httpServer` instance as an argument
    and so doesn’t need to capture it on construction. It doesn’t reference anything
    outside of its scope so nothing is copied in. The same lambda instance can be
    reused with different instances of a server.


    It’s an important distinction to make as a lambda doesn’t need to be instantiated
    many times. A closure has to be instantiated and memory allocated for each value
    it closes over. Memory need only be allocated once for non-closure lambdas and
    then the lambda can be reused. This makes it more efficient, at least in theory.


    Cheat Sheet


    If a lambda has no arguments and references something outside of its scope, it’s
    also a closure. If a lambda works only on things passed in as parameters, it’s
    not a closure.


    ```

    (x) -> x * 2;     // lambda

    () -> x * 2;      // closure

    ```


    Footnotes [1](#A456960_1_En_10_Chapter.html#Fn9_source)


    Lambdas are called using the `invokedynamic` bytecode. It’s more efficient than
    generating new classes and instantiating them as is the case for anonymous classes.


    # 11. Inheritance


    In this chapter we’ll look at inheritance in Scala: how you create subclasses
    and override methods, the Scala equivalent of interfaces and abstract classes,
    and the mechanisms Scala offers for mixing in reusable behavior. We’ll finish
    by discussing how to pick between all the options.


    ## Subtype Inheritance


    Creating a subtype of another class is the same as in Java. You use the `extends`
    keyword and you can prevent subclassing with the `final` modifier on a class definition.


    Let’s suppose we want to extend the basic `Customer` class from earlier and create
    a special subtype to represent a `DiscountedCustomer`. A shopping basket might
    belong to the `Customer` super-class, along with methods to add items to the basket
    and total its value.


    ```

    // java

    public class Customer {

    private final String name;

    private final String address;

    private final ShoppingBasket basket = new ShoppingBasket();

    public Customer(String name, String address) {

    this.name = name;

    this.address = address;

    }

    public void add(Item item) {

    basket.add(item);

    }

    public Double total() {

    return basket.value();

    }

    }

    ```


    Let’s say the `DiscountedCustomer` is entitled to a 10% discount on all purchases.
    We can extend `Customer`, creating a constructor to match `Customer`, and call
    `super` from it. We can then override the `total` method to apply the discount.


    ```

    // java

    public class DiscountedCustomer extends Customer {

    public DiscountedCustomer(String name, String address) {

    super(name, address);

    }

    @Override

    public Double total() {

    return super.total() * 0.90;

    }

    }

    ```


    We do exactly the same thing in Scala. Here’s the basic `Customer` class:


    ```

    // scala

    class Customer(val name: String, val address: String) {

    private final val basket: ShoppingBasket = new ShoppingBasket

    def add(item: Item) {

    basket.add(item)

    }

    def total: Double = {

    basket.value

    }

    }

    ```


    When it comes to extending `Customer` to `DiscountedCustomer`, there are a few
    things to consider. First, we’ll create the `DiscountedCustomer` class.


    ```

    class DiscountedCustomer

    ```


    If we try and extend `Customer` to create `DiscountedCustomer`, we get a compiler
    error.


    ```

    class DiscountedCustomer extends Customer        // compiler error

    ```


    We get a compiler error because we need to call the `Customer` constructor with
    values for its arguments. We had to do the same thing in Java when we called `super`
    in the new constructor.


    Scala has a primary constructor and auxiliary constructors. Auxiliary constructors
    must be chained to eventually call the primary constructor and in Scala, only
    the primary constructor can call the super-class constructor. We can add arguments
    to the primary constructor like this:


    ```

    class DiscountedCustomer(name: String, address: String) extends Customer

    ```


    But we can’t call `super` directly like we can in Java.


    ```

    class DiscountedCustomer(name: String, address: String) extends Customer {

    super(name, address)                        // compiler error

    }

    ```


    In Scala, to call the super-class constructor you pass the arguments from the
    primary constructor to the super-class. Notice that the arguments to `DiscountedCustomer`
    aren’t set as `val`. They’re not fields; instead, they’re locally scoped to the
    primary constructor and passed directly to the super-class, like this:


    ```

    class DiscountedCustomer(name: String, address: String)

    extends Customer(name, address)

    ```


    Finally, we can implement the discounted `total` method in the subclass.


    ```

    override def total: Double = {

    super.total * 0.90

    }

    ```


    There are two things to note here: the `override` keyword is required, and to
    call the super-classes `total` method, we use `super` and a dot, just like in
    Java.


    The `override` keyword is like the `@Override` annotation in Java. It allows the
    compiler to check for mistakes like misspelling the name of the method or providing
    the wrong arguments. The only real difference between the Java annotation and
    Scala’s is that it’s mandatory in Scala when you override non-abstract methods.'
