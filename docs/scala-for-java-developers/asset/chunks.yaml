- fmt: '# Using Null Checks


    If we were to implement this where the optionality was expressed by returning
    nulls, we’d be forced to do a bunch of null checks. We have four customers: Albert,
    Beatriz, Carol, and Sherlock. Albert has an address but no postcode, Beatriz hasn’t
    given us her address, and the last two have full address information.


    ```

    val customers = new CustomerSet()

    val address1 = Some(Address("1a Bridge St", None))

    val address2 = Some(new Address("2 Short Road", Some("AL1 2PY")))

    val address3 = Some(new Address("221b Baker St", Some("NW1")))

    customers.add(new Customer("Albert", address1))

    customers.add(new Customer("Beatriz", None))

    customers.add(new Customer("Carol", address2))

    customers.add(new Customer("Sherlock", address3))

    ```


    Given a list of customers, we can attempt to create shipping labels. As you can
    see, the following list includes people that don’t exist in the database.


    ```

    val all = Set("Albert", "Beatriz", "Carol", "Dave", "Erin", "Sherlock")

    ```


    Next, we create a function to return the list of shipping labels, collecting them
    in a mutable set. For every name in our list, we attempt to find the customer
    in the database (using `customers.find`). As this could return `null`, we have
    to check the returned value isn’t `null` before we can get their address.


    Getting the address can return `null`, so we have to check for `null` again before
    getting their postcode. Once we’ve checked the postcode isn’t `null`, we can finally
    call a method (`shippingLabel`) to create a label and add it to the collection.
    Were we to run it, only Carol and Sherlock would get through all the null checks.


    ```

    import scala.collections._

    val all = Set("Albert", "Beatriz", "Carol", "Dave", "Erin", "Sherlock")

    def generateShippingLabels() = {

    val labels = mutable.Set[String]()

    all.foreach { name =>

    val customer: Customer = customers.find(name)

    if (customer != null) {

    val address: Address = customer.address

    if (address != null) {

    val postcode: String = address.postcode

    if (postcode != null) {

    labels.add(

    shippingLabel(customer.name, address.street, postcode))

    }

    }

    }

    }

    labels

    }

    def shippingLabel(name: String, street: String, postcode: String) = {

    "Ship to:\n" + "========\n" + name + "\n" + street + "\n" + postcode

    }

    ```


    ## Using `FlatMap` with `Option`


    If, instead of returning `null` for no customer, we were to use `Option` as the
    return type, we could reduce the code using `flatMap`.


    ```

    1   def generateShippingLabel(): Set[String] = {

    2     all.flatMap {

    3       name => customers.find(name).flatMap {

    4         customer => customer.address.flatMap {

    5           address => address.postcode.map {

    6             postcode => {

    7               shippingLabel(customer.name, address.street, postcode)

    8             }

    9           }

    10         }

    11       }

    12     }

    13   }


    15   def shippingLabel(name: String, street: String, postcode: String) = {

    16     "Ship to:\n" + "========\n" + name + "\n" + street + "\n" + postcode

    17   }

    ```


    We start in the same way as before, by enumerating each of the names in our list,
    calling `find` on the database for each. We use `flatMap` to do this as we’re
    transforming from a single customer name (`String`) to a monad (`Option`).


    You can think of the option as being like a list with one element in it (either
    a `Some` or a `None`), so we’re doing a “one-to-many”-like transformation. As
    we saw in the `flatMap` section of Chapter 17, this implies we’ll need to flatten
    the “many” back down into “one” later, hence the `flatMap`.


    After the initial `flatMap` where we find a customer in the database, we `flatMap`
    the result. If no customer was found, it wouldn’t continue any further. So, on
    line 4, we can be sure a customer actually exists and can go ahead and get their
    address. As address is optional, we can `flatMap` again, dropping out if a customer
    doesn’t have an address.


    On line 5, we can request a customer’s postcode. Postcode is optional, so only
    if we have one do we transform it (and the address details) into a shipping label.
    The `map` call takes care of that for us; remember that `map` here only applies
    the function (`shippingLabel`) when we have a value (that is, postcode is an instance
    of `Some`).


    Notice that we didn’t need to create a mutable collection to store the shipping
    label. Any transformation function like `map` or `flatMap` will produce a new
