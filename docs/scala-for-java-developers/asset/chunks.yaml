- fmt: '### Multiple `update` Methods


    We could also add a second `update` method, this time with an `Int` as the first
    argument.


    ```

    def update(areaCode: Int, newAreaCode: String) = {

    ???

    }

    ```


    Let’s say we want it to update an area code across all entries. We could enumerate
    each entry to work out which numbers start with the area code from the first argument.
    For any that match, we go back to the original map and update the entry.


    ```

    def update(areaCode: Int, newAreaCode: String) = {

    numbers.foreach(entry => {

    if (entry._2.startsWith(areaCode.toString))

    numbers(entry._1) = entry._2.replace(areaCode.toString, newAreaCode)

    })

    }

    ```


    The `_1` and `_2` are Scala notation for accessing what’s called a tuple. It’s
    a simple data structure that we’re using to treat what, in our case, would be
    a `Map.Entry` in Java as a single variable. The `_1` and `_2` are method calls
    that let us access the key and value respectively. Tuples are actually more general
    purpose than this and not just used for maps. We’re using a tuple of two elements
    (a `Tuple2`) but you can have tuples with up to 22 elements (`Tuple22`).


    We can call the new `update` method using the shorthand assignment syntax like
    this:


    ```

    object DirectoryExampleAlternativeUpdateMethod extends App {

    val yellowPages = new Directory

    println(yellowPages)

    yellowPages(7781) = "7555"

    println(yellowPages)

    }

    ```


    The outcome of this is that both Athos and Aramis will have their area codes updated.


    ### Multiple Arguments to `update`


    You can have as many arguments in the `update` method as you like but only the
    last will be used as the updated value. This makes sense, as you can only have
    one value to the right of an assignment operator.


    The rest of the argument list is used to select the appropriate update methods.
    So, if you had another method with three arguments (`areaCode`, `anotherArgument`,
    and `newAreaCode`) like this:


    ```

    def update(areaCode: Int, another: String, newAreaCode: String) = ???

    ```


    …the types would be used to work out which `update` method should be called on
    assignment.


    ```

    yellowPages(7998) = "7668"

    yellowPages(7998, "another argument") = "???"

    ```


    ## Summary


    We’ve seen more about the `apply` method in this chapter; how you don’t just use
    it for factory-style creation methods but also for building rich APIs. You can
    make client code more concise by making method calls look like function calls.


    We also saw how the related `update` method works and in the same way how we can
    write APIs that take advantage of the assignment operator and implement custom
    update behavior.


    # 15. Faking Language Constructs


    Scala allows you to write your code in such a way as to give the impression that
    you’re working with native language constructs, when really you’re just working
    with regular methods.


    This chapter will cover the following:


    - How Scala allows you to use curly braces instead of regular parentheses when
    calling methods.

    - How Scala supports higher-order functions: functions that take functions as
    arguments and return functions as results.

    - How Scala supports currying out of the box.


    These things don’t sound that impressive, but combined they allow for a surprising
    amount of flexibility. We’ll see how these techniques can help you write more
    flexible and readable code.


    All the code samples in this chapter are in Scala.


    ## Curly Braces (and Function Literals)


    There’s a simple rule in Scala.


    - Any method call that accepts exactly one argument can use curly braces to surround
    the argument instead of parentheses.


    So, instead of this:


    ```

    numerals.foreach(println(_))

    ```


    …you can write this:


    ```

    numerals.foreach{println(_)}

    ```


    All we’ve done is swap the brackets for curly braces. Not very impressive, but
    things start to look a bit more interesting when we introduce some new lines.


    ```

    numerals.foreach {

    println(_)

    }

    ```


    Now it begins to look like a built-in control structure. Developers are used to
    interpreting curly braces as demarcation of language syntax. So, this looks more
    like the built-in `for` loop, even though it’s just a method call.


    The main reason for doing this is to allow clients to pass in functions as arguments
    in a natural and concise way. When you write functions that can take functions
    as arguments, you’re creating higher-order functions. These allow for greater
    flexibility and re-use.


    For example, let’s say we want to do some work and update a UI element, like a
    progress bar or a customer basket. The best way to do this is in a new thread
    so that we don’t slow down the main UI thread and cause pauses for the user.


    ### Higher-Order Functions


    If every call to update a UI element must be done on its own thread, we might
    end up with a naive implementation like this:


    ```

    object Ui {

    def updateUiElements() {

    new Thread() {

    override def run(): Unit = updateCustomerBasket(basket)

    }.start()

    new Thread() {

    override def run(): Unit = updateOffersFor(customer)

    }.start()

    }

    }

    ```


    The `Ui` object executes the sequence of updates one after another, each on a
    new thread. The `Ui` object is managing the threading policy and the update behavior.
    It would be better if something else was responsible for coordinating threading
    and the `Ui` object was left to the update behavior. That way, we could avoid
    duplication and if the threading policy changes, we wouldn’t have to find all
    the usages scattered about the place.


    The solution is to define a function that can run some other function on a thread.
    We could create a function called `runInThread` with the boilerplate threading
    code.


    ```

    def runInThread() {

    new Thread() {

    override def run(): Unit = ???

    }.start()

    }

    ```


    It will create and start a new thread but it doesn’t do anything interesting.
    How do we pass in a function? In Java, you’d probably pass in an anonymous instance
    of a `Runnable` or `Callable` or a lambda.


    You do the same in Scala but rather than pass in a functional interface as the
    argument, you pass in a shorthand signature denoting a function argument. You
    define a variable as usual (`function` in the following example) but the type
    that follows the colon represents a function. Our example has no arguments and
    returns a value of `Unit`. It’s equivalent to Java’s signature for a lambda: `()
    -> Void`.


    ```

    def runInThread(function: () => Unit) {

    new Thread() {

    override def run(): Unit = ???

    }.start()

    }

    ```


    Then we just execute the function in the body of the thread. Remember the brackets
    denote the shorthand for executing the `apply` method.


    ```

    def runInThread(function: () => Unit) {

    new Thread() {

    override def run(): Unit = function()       // aka function.apply()

    }.start()

    }

    ```


    Given the new `runInThread` method, we can rewrite the UI code like this:


    ```

    def updateUiElements() {

