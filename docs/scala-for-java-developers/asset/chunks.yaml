- fmt: '### Lower Bounds (`<U super T>`)


    Setting a lower bound means using the `super` keyword in Java, something like
    the following:


    ```java

    public class Example { }             // java

    ```


    It’s saying that `U` has to be a super-type of `T`. It’s useful when we want to
    be flexible in our API design; you’ll see it a lot in Java library code or in
    libraries like Hamcrest. For example, suppose we have a class hierarchy to represent
    animals.


    ```java

    // java

    static class Animal {}

    static class Lion extends Animal {}

    static class Zebra extends Animal {}

    ```


    We might want to collect the lions together in an enclosure.


    ```java

    // java

    List enclosure = new ArrayList();

    enclosure.add(new Lion());

    enclosure.add(new Lion());

    ```


    Let’s say that we want to sort the lions, and that we already have a helper method,
    similar to the `Sortable` interface, that sorts anything that is `Comparable`.


    ```java

    // java

    public static > void sort(List list) {

    Collections.sort(list);

    }

    ```


    To sort our lions, we just make them comparable and call the `sort` method.


    ```java

    // java

    static class Lion extends Animal implements Comparable {

    @Override

    public int compareTo(Lion other) {

    return this.age.compareTo(other.age);

    }

    }

    sort(enclosure);

    ```


    Great, but what if we expand our enclosure and create a zoo? Notice that the `List`
    is now of type `Animal` rather than `Lion`.


    ```java

    // java

    List zoo = new ArrayList();

    zoo.add(new Lion());

    zoo.add(new Lion());

    zoo.add(new Zebra());

    sort(zoo);                     // compilation error

    ```


    It won’t compile, as we can’t compare zebras and lions. We need to make the comparison
    on super-type rather than the subtypes. So, we need to move the implementation
    of `Comparable` from `Lion` to `Animal`. That way, we can compare zebras to lions
    and presumably keep them away from each other.


    If we make the `Lion` and `Zebra Comparable` with `Animal`, in theory we should
    be able to compare them with each other and themselves. However, if we move the
    comparable implementation up to the super-type (that is, `Animal implements Comparable`
    and remove it from `Lion`), like this:


    ```java

    // java

    static class Animal implements Comparable {

    @Override

    public int compareTo(Animal o) {

    return 0;

    }

    }

    static class Lion extends Animal { }

    static class Zebra extends Animal { }

    List enclosure = new ArrayList();

    enclosure.add(new Lion());

    enclosure.add(new Lion());

    enclosure.sort();                 // compiler failure

    List zoo = new ArrayList();

    zoo.add(new Lion());

    zoo.add(new Lion());

    zoo.add(new Zebra());

    sort(zoo);                        // compiles ok now

    ```


    …we get a compiler error when recompiling the original `enclosure` of Lions. We
    can no longer sort the `Lion`s `enclosure`.


    ```

    java: method sort in class Zoo cannot be applied to given types;

    required: java.util.List

    found: java.util.List

    reason: inferred type does not conform to equality constraint(s)

    inferred: Animal

    equality constraints(s): Lion

    ```


    Otherwise known as:


    ```

    Inferred type ’Lion’ for type parameter ’A’ is not within its bounds;

    should implement ’Lion’

    ```


    This is because the `sort` method (`public static <A extends Comparable<A>> void
    sort(List<A> list)`) expects a type that is comparable to itself, and we’re trying
    to compare it to something higher up the class hierarchy. When `A` is bound to
    a concrete type, for example `Lion`, `Lion` must also be `Comparable` against
    `Lion`. The problem is that we’ve just made it comparable to `Animal`.


    ```

    static class Lion extends Animal implements Comparable { }

    ```


    The zoo (a `List<Animal>`) can be sorted because the generic type of the collection
    is `Animal`.


    We can fix it by adding `? super A` to the signature of `sort`. This means that
    whilst `A` is still bound to a concrete type, say `Lion`, we’re now saying that
    it needs to be comparable to some super-type of `Lion`. As `Animal` is a super-type
    of `Lion`, it conforms and the whole thing compiles again.


    ```

    public static > void sort(List list) { }

    ```


    The upshot to all this is that our API method `sort` is much more flexible with
    a lower bound; without it, we wouldn’t be able to sort different types of animal.


    In Scala, we can go through the same steps and create the `Animal` hierarchy.


    ```scala

    // scala

    class Animal extends Comparable[Animal] {

    def compareTo(o: Animal): Int = 0

    }

    class Lion extends Animal

    class Zebra extends Animal

    ```


    Then we can create our `sort` method again and recreate our enclosure.


    ```scala

    // scala

    def sort[A <: Comparable[A]](list: List[A]) = { }

    // scala

    def main(args: String*) {

    var enclosure = List[Lion]()

    enclosure = new Lion +: enclosure

    enclosure = new Lion +: enclosure

    sort(enclosure)                                 // compiler failure

    var zoo = List[Animal]()

    zoo = new Zebra +: zoo

    zoo = new Lion +: zoo

    zoo = new Lion +: zoo

    sort(zoo)                                       // compiles OK

    }

    ```


    Like before, we get a compilation failure.


    ```

    Error:(30, 5) inferred type arguments [Lion] do not conform to method

    sort’s type parameter bounds [A <: Comparable[A]] sort(enclosure)

    ^

    ```


    It correctly enforces that `A` must be of the same type but we’re treating `A`
    as both `Lion` and `Animal`. So just like before, we need to constrain the generic
    type with a lower bound.


    You might be tempted to try a direct equivalent: using an underscore with `>:
    A`:


    ```

    def sort[A : A]](a: List[A]) = { } // compiler failure

    ```


    But unfortunately, this would cause a compilation failure:


    ```

    failure: illegal cyclic reference involving type A

    ```


    It can’t cope with the reference to `A`; it sees it as cyclic. So, you have to
    try and keep the relationship with the bounds but remove the cyclic reference.
    The answer is to define a new generic type `U` and write something like this:


    ```

    def sort[A : A](list: List[A]) = { }

    ```


    So, `A` must extend `Comparable` where the `Comparable`’s generic type `U` must
    itself be a super-type of `A`. This gets rid of the cyclic problem, but the compiler
    would still complain.


    ```

    inferred type arguments [Lion,Lion] do not conform to method sort’s

    type parameter bounds [A : A] sort(enclosure)

    ^

    ```


    It’s saying that the inferred types for the enclosure don’t match the constraints
    we’ve set. It has inferred the two types to both be Lion because the inference
    engine just doesn’t have enough to go on. We can give it a hint if we specify
    the types we know to be true. So just like a type witness in Java, we can clarify
    that we want the types to be `Lion` and `Animal`.


    ```

    var enclosure = List[Lion]()

    enclosure = new Lion +: enclosure

    enclosure = new Lion +: enclosure

    sort[Lion, Animal](enclosure)                       // add a type hint

    ```


    When you round-trip the byte code, the final version looks like this:


    ```java

    // java

    public , U> void sort(List a) { }

    ```


    Which is pretty much equivalent to the following:


    ```java

    // java

    public > void sort(List a) { }

    ```


    Which is pretty much the same as the Scala version:


    ```scala

    def sort[A <: Comparable[_]](list: List[A]) { }    // scala

    ```


    So, it treats it like an unbounded type under the covers. That’s not quite true,
    in the sense that the Scala compiler is doing all the hard work here and leaves
    `U` unbounded because it’s doing all the type checking. In this example, it doesn’t
    make complete sense to round-trip from byte code to Java, as it’s not like-for-like,
    but it’s interesting to see what’s going on behind the scenes.


    A lower bound tells you what you can put in a data structure. In our `Lion` example,
    using a lower bound means you can put more than just lions in the zoo. You use
    `super` in Java and greater than colon (`>:`) in Scala.'
  raw: '### Lower Bounds (<U super T>)


    Setting a lower bound means using the `super` keyword in Java, something like
    the following:


    ```

    public class Example { }             // java

    ```


    It’s saying that `U` has to be a super-type of `T`. It’s useful when we want to
    be flexible in our API design; you’ll see it a lot in Java library code or in
    libraries like Hamcrest. For example, suppose we have a class hierarchy to represent
    animals.


    ```

    // java

    static class Animal {}

    static class Lion extends Animal {}

    static class Zebra extends Animal {}

    ```


    We might want to collect the lions together in an enclosure.


    ```

    // java

    List enclosure = new ArrayList();

    enclosure.add(new Lion());

    enclosure.add(new Lion());

    ```


    Let’s say that we want to sort the lions, and that we already have a helper method,
    similar to the `Sortable` interface, that sorts anything that is `Comparable`.


    ```

    // java

    public static > void sort(List list) {

    Collections.sort(list);

    }

    ```


    To sort our lions, we just make them comparable and call the `sort` method.


    ```

    // java

    static class Lion extends Animal implements Comparable {

    @Override

    public int compareTo(Lion other) {

    return this.age.compareTo(other.age);

    }

    }

    sort(enclosure);

    ```


    Great, but what if we expand our enclosure and create a zoo? Notice that the `List`
    is now of type `Animal` rather than `Lion`.


    ```

    // java

    List zoo = new ArrayList();

    zoo.add(new Lion());

    zoo.add(new Lion());

    zoo.add(new Zebra());

    sort(zoo);                     // compilation error

    ```


    It won’t compile, as we can’t compare zebras and lions. We need to make the comparison
    on super-type rather than the subtypes. So, we need to move the implementation
    of `Comparable` from `Lion` to `Animal`. That way, we can compare zebras to lions
    and presumably keep them away from each other.


    If we make the `Lion` and `Zebra Comparable` with `Animal`, in theory we should
    be able to compare them with each other and themselves. However, if we move the
    comparable implementation up to the super-type (that is, `Animal implements Comparable`
    and remove it from `Lion`), like this:


    ```

    // java

    static class Animal implements Comparable {

    @Override

    public int compareTo(Animal o) {

    return 0;

    }

    }

    static class Lion extends Animal { }

    static class Zebra extends Animal { }

    List enclosure = new ArrayList();

    enclosure.add(new Lion());

    enclosure.add(new Lion());

    enclosure.sort();                 // compiler failure

    List zoo = new ArrayList();

    zoo.add(new Lion());

    zoo.add(new Lion());

    zoo.add(new Zebra());

    sort(zoo);                        // compiles ok now

    ```


    …we get a compiler error when recompiling the original `enclosure` of Lions. We
    can no longer sort the `Lion`s `enclosure`.


    ```

    java: method sort in class Zoo cannot be applied to given types;

    required: java.util.List

    found: java.util.List

    reason: inferred type does not conform to equality constraint(s)

    inferred: Animal

    equality constraints(s): Lion

    ```


    Otherwise known as:


    ```

    Inferred type ’Lion’ for type parameter ’A’ is not within its bounds;

    should implement ’Lion’

    ```


    This is because the `sort` method (`public static <A extends Comparable<A>> void
    sort(List<A> list)`) expects a type that is comparable to itself, and we’re trying
    to compare it to something higher up the class hierarchy. When `A` is bound to
    a concrete type, for example `Lion`, `Lion` must also be `Comparable` against
    `Lion`. The problem is that we’ve just made it comparable to `Animal`.


    ```

    static class Lion extends Animal implements Comparable { }

    ```


    The zoo (a `List<Animal>`) can be sorted because the generic type of the collection
    is `Animal`.


    We can fix it by adding `? super A` to the signature of `sort`. This means that
    whilst `A` is still bound to a concrete type, say `Lion`, we’re now saying that
    it needs to be comparable to some super-type of `Lion`. As `Animal` is a super-type
    of `Lion`, it conforms and the whole thing compiles again.


    ```

    public static > void sort(List list) { }

    ```


    The upshot to all this is that our API method `sort` is much more flexible with
    a lower bound; without it, we wouldn’t be able to sort different types of animal.


    In Scala, we can go through the same steps and create the `Animal` hierarchy.


    ```

    // scala

    class Animal extends Comparable[Animal] {

    def compareTo(o: Animal): Int = 0

    }

    class Lion extends Animal

    class Zebra extends Animal

    ```


    Then we can create our `sort` method again and recreate our enclosure.


    ```

    // scala

    def sort[A <: Comparable[A]](list: List[A]) = { }

    // scala

    def main(args: String*) {

    var enclosure = List[Lion]()

    enclosure = new Lion +: enclosure

    enclosure = new Lion +: enclosure

    sort(enclosure)                                 // compiler failure

    var zoo = List[Animal]()

    zoo = new Zebra +: zoo

    zoo = new Lion +: zoo

    zoo = new Lion +: zoo

    sort(zoo)                                       // compiles OK

    }

    ```


    Like before, we get a compilation failure.


    ```

    Error:(30, 5) inferred type arguments [Lion] do not conform to method

    sort’s type parameter bounds [A <: Comparable[A]] sort(enclosure)

    ^

    ```


    It correctly enforces that `A` must be of the same type but we’re treating `A`
    as both `Lion` and `Animal`. So just like before, we need to constrain the generic
    type with a lower bound.


    You might be tempted to try a direct equivalent: using an underscore with `>:
    A`:


    ```

    def sort[A : A]](a: List[A]) = { } // compiler failure

    ```


    But unfortunately, this would cause a compilation failure:


    ```

    failure: illegal cyclic reference involving type A

    ```


    It can’t cope with the reference to `A`; it sees it as cyclic. So, you have to
    try and keep the relationship with the bounds but remove the cyclic reference.
    The answer is to define a new generic type `U` and write something like this:


    ```

    def sort[A : A](list: List[A]) = { }

    ```


    So, `A` must extend `Comparable` where the `Comparable`’s generic type `U` must
    itself be a super-type of `A`. This gets rid of the cyclic problem, but the compiler
    would still complain.


    ```

    inferred type arguments [Lion,Lion] do not conform to method sort’s

    type parameter bounds [A : A] sort(enclosure)

    ^

    ```


    It’s saying that the inferred types for the enclosure don’t match the constraints
    we’ve set. It has inferred the two types to both be Lion because the inference
    engine just doesn’t have enough to go on. We can give it a hint if we specify
    the types we know to be true. So just like a type witness in Java, we can clarify
    that we want the types to be `Lion` and `Animal`.


    ```

    var enclosure = List[Lion]()

    enclosure = new Lion +: enclosure

    enclosure = new Lion +: enclosure

    sort[Lion, Animal](enclosure)                       // add a type hint

    ```


    When you round-trip the byte code, the final version looks like this:


    ```

    // java

    public , U> void sort(List a) { }

    ```


    Which is pretty much equivalent to the following:


    ```

    // java

    public > void sort(List a) { }

    ```


    Which is pretty much the same as the Scala version:


    ```

    def sort[A <: Comparable[_]](list: List[A]) { }    // scala

    ```


    So, it treats it like an unbounded type under the covers. That’s not quite true,
    in the sense that the Scala compiler is doing all the hard work here and leaves
    `U` unbounded because it’s doing all the type checking. In this example, it doesn’t
    make complete sense to round-trip from byte code to Java, as it’s not like-for-like,
    but it’s interesting to see what’s going on behind the scenes.


    A lower bound tells you what you can put in a data structure. In our `Lion` example,
    using a lower bound means you can put more than just lions in the zoo. You use
    `super` in Java and greater than colon (`>:`) in Scala.'
  trans: '

    ### 下界（<U super T>）


    设置下界意味着在 Java 中使用 `super` 关键字，示例如下：


    ```

    public class Example { }             // java

    ```


    它表示 `U` 必须是 `T` 的超类型。当我们希望在 API 设计中保持灵活性时，这非常有用；你会在 Java 库代码或像 Hamcrest 这样的库中经常看到它。例如，假设我们有一个表示动物的类层次结构。


    ```

    // java

    static class Animal {}

    static class Lion extends Animal {}

    static class Zebra extends Animal {}

    ```


    我们可能想把狮子们收集到一个围栏里。


    ```

    // java

    List enclosure = new ArrayList();

    enclosure.add(new Lion());

    enclosure.add(new Lion());

    ```


    假设我们想要对狮子进行排序，并且我们已经有一个类似于 `Sortable` 接口的辅助方法，可以对任何实现 `Comparable` 的对象进行排序。


    ```

    // java

    public static > void sort(List list) {

    Collections.sort(list);

    }

    ```


    为了对狮子进行排序，我们只需让它们实现 `Comparable` 接口，然后调用 `sort` 方法。


    ```

    // java

    static class Lion extends Animal implements Comparable {

    @Override

    public int compareTo(Lion other) {

    return this.age.compareTo(other.age);

    }

    }

    sort(enclosure);

    ```


    很好，但如果我们扩大围栏并创建一个动物园呢？请注意，`List` 现在的类型是 `Animal` 而不是 `Lion`。


    ```

    // java

    List zoo = new ArrayList();

    zoo.add(new Lion());

    zoo.add(new Lion());

    zoo.add(new Zebra());

    sort(zoo);                     // 编译错误

    ```


    这段代码无法编译，因为我们无法比较斑马和狮子。我们需要在超类型而不是子类型上进行比较。因此，我们需要将 `Comparable` 的实现从 `Lion` 移到
    `Animal`。这样，我们就可以比较斑马和狮子，并大概能让它们彼此远离。


    如果我们让 `Lion` 和 `Zebra` 通过 `Animal` 实现 `Comparable`，理论上我们应该能够将它们相互比较以及与自身比较。然而，如果我们将
    `Comparable` 的实现上移到超类型（即 `Animal implements Comparable` 并从 `Lion` 中移除），就像这样：


    ```

    // java

    static class Animal implements Comparable {

    @Override

    public int compareTo(Animal o) {

    return 0;

    }

    }

    static class Lion extends Animal { }

    static class Zebra extends Animal { }

    List enclosure = new ArrayList();

    enclosure.add(new Lion());

    enclosure.add(new Lion());

    enclosure.sort();                 // 编译器失败

    List zoo = new ArrayList();

    zoo.add(new Lion());

    zoo.add(new Lion());

    zoo.add(new Zebra());

    sort(zoo);                        // 现在编译通过

    ```


    ……当我们重新编译原始的 `Lion` 围栏时，会得到一个编译器错误。我们无法再对 `Lion` 的 `enclosure` 进行排序。


    ```

    java: method sort in class Zoo cannot be applied to given types;

    required: java.util.List

    found: java.util.List

    reason: inferred type does not conform to equality constraint(s)

    inferred: Animal

    equality constraints(s): Lion

    ```


    也就是：


    ```

    Inferred type ’Lion’ for type parameter ’A’ is not within its bounds;

    should implement ’Lion’

    ```


    这是因为 `sort` 方法（`public static <A extends Comparable<A>> void sort(List<A> list)`）期望一个与自身可比较的类型，而我们却试图将其与类层次结构中更高层的类型进行比较。当
    `A` 绑定到一个具体类型（例如 `Lion`）时，`Lion` 也必须能够与 `Lion` 自身进行 `Comparable` 比较。问题在于我们刚刚让它只能与
    `Animal` 进行比较。


    ```

    static class Lion extends Animal implements Comparable { }

    ```


    动物园（一个 `List<Animal>`）可以被排序，因为集合的泛型类型是 `Animal`。


    我们可以通过在 `sort` 的签名中添加 `? super A` 来修复这个问题。这意味着当 `A` 仍然绑定到一个具体类型（比如 `Lion`）时，我们现在要求它必须能够与
    `Lion` 的某个超类型进行比较。由于 `Animal` 是 `Lion` 的超类型，它符合要求，整个代码就又能编译了。


    ```

    public static > void sort(List list) { }

    ```


    这一切的结果是，我们的 API 方法 `sort` 通过使用下界变得更加灵活；没有它，我们将无法对不同种类的动物进行排序。


    在 Scala 中，我们可以执行相同的步骤并创建 `Animal` 层次结构。


    ```

    // scala

    class Animal extends Comparable[Animal] {

    def compareTo(o: Animal): Int = 0

    }

    class Lion extends Animal

    class Zebra extends Animal

    ```


    然后我们可以再次创建我们的 `sort` 方法并重新创建围栏。


    ```

    // scala

    def sort[A <: Comparable[A]](list: List[A]) = { }

    // scala

    def main(args: String*) {

    var enclosure = List[Lion]()

    enclosure = new Lion +: enclosure

    enclosure = new Lion +: enclosure

    sort(enclosure)                                 // 编译器失败

    var zoo = List[Animal]()

    zoo = new Zebra +: zoo

    zoo = new Lion +: zoo

    zoo = new Lion +: zoo

    sort(zoo)                                       // 编译通过

    }

    ```


    和之前一样，我们遇到了编译失败。


    ```

    Error:(30, 5) inferred type arguments [Lion] do not conform to method

    sort’s type parameter bounds [A <: Comparable[A]] sort(enclosure)

    ^

    ```


    它正确地强制要求 `A` 必须是相同类型，但我们却将 `A` 同时视为 `Lion` 和 `Animal`。所以，和之前一样，我们需要用下界来约束泛型类型。


    你可能会想尝试一个直接的等价写法：使用带 `>: A` 的下划线：


    ```

    def sort[A : A]](a: List[A]) = { } // 编译器失败

    ```


    但不幸的是，这会导致编译失败：


    ```

    failure: illegal cyclic reference involving type A

    ```


    它无法处理对 `A` 的引用；将其视为循环引用。因此，你必须尝试保持与边界的关系，同时消除循环引用。答案是定义一个新的泛型类型 `U`，并编写如下代码：


    ```

    def sortA : A = { }

    ```


    所以，`A` 必须扩展 `Comparable`，其中 `Comparable` 的泛型类型 `U` 本身必须是 `A` 的超类型。这解决了循环问题，但编译器仍然会报错。


    ```

    inferred type arguments [Lion,Lion] do not conform to method sort’s

    type parameter bounds [A : A] sort(enclosure)

    ^

    ```


    它表示围栏的推断类型不符合我们设置的约束条件。它将两个类型都推断为 `Lion`，因为推断引擎没有足够的信息。如果我们指定我们知道为真的类型，就可以给它一个提示。因此，就像
    Java 中的类型见证一样，我们可以明确表示我们希望类型是 `Lion` 和 `Animal`。


    ```

    var enclosure = List[Lion]()

    enclosure = new Lion +: enclosure

    enclosure = new Lion +: enclosure

    sortLion, Animal                       // 添加类型提示

    ```


    当你对字节码进行往返转换时，最终版本看起来像这样：


    ```

    // java

    public , U> void sort(List a) { }

    ```


    这基本上等同于以下代码：


    ```

    // java

    public > void sort(List a) { }

    ```


    这与 Scala 版本基本相同：


    ```

    def sort[A <: Comparable[_]](list: List[A]) { }    // scala

    ```


    所以，它在底层将其视为无界类型。这并不完全准确，因为 Scala 编译器在这里做了所有繁重的工作，并且由于它负责所有类型检查，所以将 `U` 保留为无界。在这个例子中，从字节码往返转换到
    Java 并不完全合理，因为这不是一一对应的，但了解幕后发生的事情还是很有趣的。


    下界告诉你可以在数据结构中放入什么。在我们的 `Lion` 示例中，使用下界意味着你可以在动物园中放入不仅仅是狮子。你在 Java 中使用 `super`，在
    Scala 中使用大于冒号（`>: `）。

