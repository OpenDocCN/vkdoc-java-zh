    # Preface


    ## Audience


    This book is for Java developers looking to transition to programming in Scala.


    ## The Structure of the Book


    The book is split into four parts: a tour of Scala, a comparison between Java
    and Scala, a closer look at Scala-specific features and functional programming
    idioms, and finally a discussion about adopting Scala into existing Java teams.


    In Part I, we’re going to take a high-level tour of Scala. You’ll get a feel for
    the language’s constructs and how Scala is similar in a lot of ways to Java, yet
    very different in others. We’ll take a look at installing Scala and using the
    interactive interpreter and we’ll go through some basic syntax examples.


    Part II talks about key differences between Java and Scala. We’ll look at what’s
    missing in Scala compared to Java, vice versa, and how concepts translate from
    one language to another.


    Then in Part III, we’ll talk about some of the language features that Scala offers
    that aren’t found in Java. This part also talks a little about functional programming
    idioms.


    Finally, we’ll talk about adopting Scala into legacy Java projects and teams.
    It’s not always an easy transition, so we’ll look at why you would want to, and
    some of the challenges you might face.


    ## Compiling Code Fragments


    Later in the book, I introduce the Scala REPL: an interactive tool for working
    with Scala and the Scala version of Java’s JShell. You’ll see REPL sessions prefixed
    with `scala>`.


    When you do so, you can expect to be able to type in the code following `scala>`
    in the REPL verbatim, hit enter, and see the results. An example follows.


    ```

    // an example REPL session

    scala> val x = 6 * 9

    x: Int = 54

    ```


    If you don’t see the `scala>` prefix, assume the fragment may depend on previous
    code examples. I’ve tried to introduce these logically, balancing the need to
    show complete listings with trying to avoid pages and pages of dry code listings.


    If things don’t make sense, always refer to the full source code. In short, you
    may find it useful to consult the full source while you read.


    ### Larger Fragments in the REPL


    If you’d like to transpose some of the larger code fragments into the REPL, you
    may notice compiler errors on hitting enter. The REPL is geared up to evaluate
    a line at a time. Pasting larger fragments or typing in long examples requires
    you to be in paste mode.


    Typing `:paste` enters paste mode, allowing you to type multiple lines. Pressing
    `Ctrl + D` exits paste mode and compiles the code.


    ```

    scala> : paste

    // Entering paste mode (ctrl-D to finish)

    val x = 4

    val y = 34

    x + y * 2

    // press Ctrl + D

    res1: Int = 72

    ```


    Infrequently, you may notice an ellipsis (`...`) or triple question marks (`???`)
    in code fragments. When you see this, it indicates that the fragment is incomplete
    and will usually be followed by additional code to fill in the blanks. It probably
    won’t compile. It’s used when I’ve felt that additional code would be uninteresting,
    distracting, or when I’m building up examples.


    ## Source Code


    The source code for this book is available at GitHub: [`https://github.com/tobyweston/learn-scala-java-devs`](https://github.com/tobyweston/learn-scala-java-devs).
    You can clone the repository or download an archive directly from the site.


    The source code is licensed under Apache 2.0 open source license.


    ## Source Code Appendix


    The book often includes partial code fragments in an attempt to avoid reams of
    distracting “scaffolding” code. Code may refer to previous fragments and this
    may not be immediately obvious. Try to read the code as if each example builds
    on what’s gone before.


    If this style isn’t for you, I’ve also included a code listing appendix. This
    offers complete listings for the more complex code, in case you want to see all
    the code in one place. It’s not there to pad out the book. Honest.


    # Acknowledgments


    Thanks go out to James Maggs, Alex Luker, Rhys Keepence and Xuemin Guan for their
    feedback on early drafts and Lee Benfield for building the excellent CFR decompiler
    and sharing it with the community.


    Additionally, thank you to Amy Brown for providing an early copyedit of this book.'
