  raw: '### Other Uses for Companion Objects


    When methods don’t depend on any of the fields in a class, you can more accurately
    think of them as functions. Functions generally belong in a singleton object rather
    than a class, so one example of when to use companion objects is when you want
    to distinguish between functions and methods, but keep related functions close
    to the class they relate to.


    Another reason to use a companion object is for factory-style methods—methods
    that create instances of the class companion. For example, you might want to create
    a factory method that creates an instance of your class but with less noise. If
    we want to create a factory for `Customer`, we can do so like this:


    ```

    // scala

    class Customer(val name: String, val address: String) {

    val id = Customer.nextId()

    }

    object Customer {

    def apply(name: String, address: String) = new Customer(name, address)

    def nextId() = 1

    }

    ```


    The `apply` method affords a shorthand notation for a class or object. It’s kind
    of like the default method for a class, so if you don’t call a method directly
    on an instance, but instead match the arguments of an `apply` method, it’ll call
    it for you. For example, you can call:


    ```

    Customer.apply("Bob Fossil", "1 London Road")

    ```


    …or you can drop the `apply` and Scala will look for an apply method that matches
    your argument. The two are identical.


    ```

    Customer("Bob Fossil", "1 London Road")

    ```


    You can still construct a class using the primary constructor and `new`, but implementing
    the companion class `apply` method as a factory means you can be more concise
    if you have to create a lot of objects.


    You can even force clients to use your factory method rather than the constructor
    by making the primary constructor private.


    ```

    class Customer private (val name: String, val address: String) {

    val id = Customer.nextId()

    }

    ```


    The Java analog would have a static factory method—for example, `createCustomer`—and
    a private constructor ensuring everyone is forced to use the factory method.


    ```

    // java

    public class Customer {

    private static Integer lastId;

    private final String name;

    private final String address;

    private Integer id;

    public static Customer createCustomer(String name, String address) {

    return new Customer(name, address);

    }

    private Customer(String name, String address) {

    this.name = name;

    this.address = addres s;

    this.id = Customer.nextId();

    }

    private static Integer nextId() {

    return lastId++;

    }

    }

    ```


    # 10. Classes and Functions


    In this chapter we’ll look at the following:


    *   Anonymous functions or lambdas.

    *   How anonymous classes differ from anonymous functions.

    *   First-class and higher-order functions.

    *   The differences between a function and a method.

    *   The differences between lambdas and closures.


    ## Anonymous Functions


    A function in the general sense is a code fragment designed to perform a specific
    task or calculation. You can create a function as a Java method or a Scala `def`.
    Both by their nature are named. Anonymous functions, on the other hand, do not
    have a name.


    An anonymous function is also called a lambda and when used can be referred to
    as a function literal .


    Java lambda syntax starts by listing the arguments to the function then the arrow
    token followed by the implementation body. The following example is a lambda taking
    two string arguments and comparing their values for a sorting algorithm.


    ```

    // java

    (String a, String b) -> {

    int comparison = a.compareTo(b);

    return comparison;

    };

    ```


    If the compiler can infer the types of the argument, you can drop the types and,
    if the body is a single line expression, you can drop the `return`.


    ```

    (a, b) -> a.compareTo(b);         // abbreviated form

    ```


    For single argument lambdas, you can even drop the parameter parenthesis but if
    there are no arguments, you need empty parenthesis.


    ```

    value -> value * 2;               // single argument

    () -> 2 + 2;                      // no arguments

    ```


    In Scala, a lambda looks very similar. As the last statement in an expression
    is assumed to be the return value, the `return` keyword is not required.


    ```

    // scala

    (a: String, b: String) => {

    val comparison = a.compareTo(b)

    comparison

    }

    ```


    If Scala can infer the arguments, the types can be dropped as in Java and single
    line expressions don’t require braces.


    ```

    // scala

    (a, b) => a.compareTo(b)          // abbreviated form

    ```


    Anonymous classes can be used to provide functionality in a similar way to anonymous
    functions but they can not accurately be called lambdas.


    ## Anonymous Classes


    An anonymous class isn’t the same thing as an anonymous function. An anonymous
    class still needs to be instantiated to an object via the `new` keyword. It may
    not have a name but it’s only useful when it’s an instance object.


    An anonymous function, on the other hand, has no instance associated with it.
    Functions are disassociated with the data they act on.


    A typical anonymous class in Java might look like this:


    ```

    // java

    List list = Arrays.asList("A", "C", "B", "D");

    list.sort(new Comparator() {

    @Override

    public int compare(String a, String b) {

    return a.compareTo(b);

    }

    });

    ```


    You can still create anonymous classes in Scala but you don’t often need to. In
    Scala it’s more common to create an anonymous function or lambda. Indeed, since
    the introduction of lambdas in Java 8, the same is also true of Java.


    ```

    // scala

    val list = List("A", "C", "B", "D")

    list.sorted(new Ordering[String] {

    def compare(a: String, b: String): Int = a.compareTo(b)

    })

    ```


    Just as with Java, to create an anonymous class instance in Scala, you use the
    `new` keyword with braces and define the implementation within the body. Notice
    that you don’t need to add the constructor brackets (`new Ordering[String]()`).


    ## First-class Functions


    As we’ve seen, an anonymous function is called a lambda. It’s a compact way to
    define a function. Anonymous functions are useful when you want to define calculations
    or transformations and apply them to different values later. For example, passing
    functions into other functions or storing function definitions for later use.


    This kind of usage is referred to as treating functions as first-class citizens.
    Specifically, a language supports first-class functions, if it:


    1.  Supports passing functions as arguments into other functions.  

    2.  Can return functions as values from other functions.  

    3.  Can store them in variables or within data structures.  


    Higher-Order Functions


    A higher-order function is any function that takes one or more functions as arguments
    or returns a function. Higher-order functions tend to be more flexible and easier
    to reuse than the alternative.


    Lambdas facilitate first-class function support by providing a compact syntax
    and by the fact that the compiler generates special bytecode for the lambda syntax.[¹](#A456960_1_En_10_Chapter.html#Fn9)


    A lambda defining the preceding sorting calculations looks like this:


    ```

    (String a, String b) -> a.compareTo(b);     // java

    (a: String, b: String) => a.compareTo(b)    // scala

    ```


    ### Passing in Functions


    Why would you want to pass a function into a function. Short answer: for flexibility.
    The `sort` or `sorted` functions given earlier are a good example . You can create
    one function to sort a list but allow the caller to influence how it’s sorted.


    For example, you can sort the list by ascending or descending order by passing
    in different function literals.


    ```

    // java

    List list = Arrays.asList("A", "C", "B", "D");

    list.sort((a, b) -> a.compareTo(b));                     // ascending

    list.sort((a, b) -> b.compareTo(a));                     // descending

    ```


    The same is true for Scala:


    ```

    // scala

    val list = List("A", "C", "B", "D")

    list.sorted((a: String, b: String) => a.compareTo(b))    // ascending

    list.sorted((a: String, b: String) => b.compareTo(a))    // descending

    ```'
