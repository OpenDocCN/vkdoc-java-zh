- fmt: '# Redefining Setters and Getters


    The advantage of using setters to set values is that we can use the method to
    preserve invariants or perform special processing. In Java, it’s straightforward:
    you create the setter method in the first place. It’s more laborious for Scala,
    as the compiler generates the methods and you are forced to redefine them.


    For example, once the `id` has been set, we might want to prevent it from being
    updated. In Java, we could do something like this:


    ```

    // java

    public void setId(String id) {

    if (id.isEmpty())

    this.id = id;

    }

    ```


    Scala, on the other hand, creates the setter method automatically, so how do we
    redefine it? If we try to just replace the setter directly in the Scala code,
    we’d get a compiler error like this:


    ```

    // scala doesn''t compile

    class Customer(val name: String, val address: String) {

    private var id = ""

    def id_=(value: String) {

    if (id.isEmpty)

    this.id = value

    }

    }

    ```


    Scala can’t know to replace the method so it creates a second method of the same
    name, and the compiler fails when it sees the duplicate.


