  raw: '## Option


    Let’s take the `Option` class . You can use `Option` as a way of avoiding nulls,
    but just how does it avoid nulls and what has it got to do with monads? There
    are two parts to the answer.


    1.  You avoid returning `null` by returning a subtype of `Option` to represent
    no value (`None`) or a wrapper around a value (`Some`). As both “no value” and
    “some value” are of type `Option`, you can treat them consistently. You should
    never need to say “if not null”.  

    2.  How you actually go about treating `Option` consistently is to use the monadic
    methods `map` and `flatMap`. So, `Option` is a monad.  


    Null Object Pattern


    If you’ve ever seen the Null Object pattern , you’ll notice it’s a similar idea.
    The Null Object pattern allows you to replace a type with a subtype to represent
    no value. You can call methods on the instance as if it were a real value but
    it essentially does nothing. It’s substitutable for a real value but usually has
    no side effects.


    The main difference is that the methods you can call, defined by the instance’s
    super-type, are usually business methods. The common methods of a monad are `map`
    and `flatMap` and are lower-level, functional programming abstractions.


    We know what `map` and `flatMap` do for collections, but what do they do for an
    `Option`?


    ### The `map` Function


    The `map` function still transforms an object, but it’s an optional transformation.
    It will apply the mapping function to the value of an option, if it has a value.
    The value and no value options are implemented as subclasses of `Option`: `Some`
    and `None` respectively (see Figure [18-1](#A456960_1_En_18_Chapter.html#Fig1)).


    ![A456960_1_En_18_Fig1_HTML.jpg](A456960_1_En_18_Fig1_HTML.jpg)


    Figure 18-1


    The `Option` classes


    A mapping only applies if the option is an instance of `Some`. If it has no value
    (that is, it’s an instance of `None`), it will simply return another `None`.


    This is useful when you want to transform something but not worry about checking
    if it’s null. For example, we might have a `Customers` trait with repository methods
    `add` and `find`. What should we do in implementations of `find` when a customer
    doesn’t exist?


    ```

    trait Customers extends Iterable[Customer] {

    def add(Customer: Customer)

    def find(name: String): Customer

    }

    ```


    A typical Java implementation would likely return `null` or throw some kind of
    `NotFoundException`. For example, the following `Set`-based implementation returns
    a `null` if the customer cannot be found:


    ```

    import scala.collections._

    class CustomerSet extends Customers {

    private val customers = mutable.Set[Customer]()

    def add(customer: Customer) = customers.add(customer)

    def find(name: String): Customer = {

    for (customer <- customers) {

    if (customer.name == name)

    return customer

    }

    null

    }

    def iterator: Iterator[Customer] = customers.iterator

    }

    ```


    Returning `null` and throwing exceptions both have similar drawbacks.


    Neither communicate intent very well. If you return `null`, clients need to know
    that’s a possibility so they can avoid a `NullPointerException`. But what’s the
    best way to communicate that to clients? ScalaDoc? Ask them to look at the source?
    Both are easy for clients to miss. Exceptions may be somewhat clearer but, as
    Scala exceptions are unchecked, they’re just as easy for clients to miss.


    You also force unhappy path handling to your clients. Assuming that consumers
    do know to check for a null, you’re asking multiple clients to implement defensive
    strategies for the unhappy path. You’re forcing null checks on people and can’t
    ensure consistency, or even that people will bother.


    Defining the `find` method to return an `Option` improves the situation. In the
    following, if we find a match, we return `Some` customer or `None` otherwise.
    This communicates at an API level that the return type is optional. The type system
    forces a consistent way of dealing with the unhappy path.


    ```

    trait Customers extends Iterable[Customer] {

    def add(Customer: Customer)

    def find(name: String): Option[Customer]

    }

    ```


    Our implementation of `find` can then return either a `Some` or a `None`.


    ```

    def find(name: String): Option[Customer] = {

    for (customer <- customers) {

    if (customer.name == name)

    return Some(customer)

    }

    None

    }

    ```


    Let’s say that we’d like to find a customer and get their total shopping basket
    value. Using a method that can return `null`, clients would have to do something
    like the following, as Albert may not be in the repository.


    ```

    val albert = customers.find("Albert")           // can return null

    val basket = if (albert != null) albert.total else 0D

    ```


    If we use `Option`, we can use `map` to transform from an option of a `Customer`
    to an option of their basket value.


    ```

    val basketValue: Option[Double] =

    customers.find("A").map(customer => customer.total)

    ```


    Notice that the return type here is an `Option[Double]`. If Albert isn’t found,
    `map` will return a `None` to represent no basket value. Remember that the `map`
    on `Option` is an optional transformation.


    When you want to actually get hold of the value, you need to get it out of the
    `Option` wrapper. The API of `Option` will only allow you call `get`, `getOrElse`
    or continue processing monadically using `map` and `flatMap`.


    ### `Option.get`


    To get the raw value, you can use the `get` method but it will throw an exception
    if you call it against no value. Calling it is a bit of a smell as it’s roughly
    equivalent to ignoring the possibility of a `NullPointerException`. You should
    only call it when you know the option is a `Some`.


    ```

    // could throw an exception

    val basketValue = customers.find("A").map(customer => customer.total).get

    ```


    To ensure the value is a `Some`, you could pattern match like the following, but
    again, it’s really just an elaborate null check.


    ```

    val basketValue: Double = customers.find("Missing") match {

    case Some(customer) => customer.total          // avoids the exception

    case None => 0D

    }

    ```


    ### `Option.getOrElse`


    Calling `getOrElse` is often a better choice as it forces you to provide a default
    value. It has the same effect as the pattern match version, but with less code.


    ```

    val basketValue =

    customers.find("A").map(customer => customer.total).getOrElse(0D)

    ```'
