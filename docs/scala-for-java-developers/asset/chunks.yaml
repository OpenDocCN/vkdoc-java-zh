    ## 摘要


    借助一些内置特性，Scala 允许我们编写出看起来像语言结构的方法。我们可以使用高阶函数来创建控制抽象：这些函数抽象了复杂的行为，减少了重复代码，同时仍为调用它们的代码提供了灵活性。


    我们可以在任何使用单参数方法的地方使用花括号。我们可以利用这一点来提供一目了然的视觉提示和模式。借助内置的柯里化支持，我们不仅限于在单参数函数中使用这一特性；通过将多参数函数转换为多个单参数函数，我们可以创建更丰富的
    API。


