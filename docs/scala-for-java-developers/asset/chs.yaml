  \ jane = new Person (\"Jane Doe\")\ndef superPowersFor(person : Person ) = {\nperson\
  \ match {\ncase SuperHero ( _ , _ , powers) => powers\ncase _ => List ()\n}\n}\n\
  // 如果一个身份不明的人，其秘密身份是 Bruce Wayne，那么他拥有什么超能力？\nprintln(\"Bruce has the powers: \"\
