  list.foreach(println)\nfor (value <- list) println(value)\n```\n\n### 字符串格式化\n\n\
  ```\n// 字符串插值将 '$' 标记替换为值\ns\"Customer name: $name USD\"                    // Customer\
  \ name: Bob\n// 表达式需要额外的括号\ns\"Customer basket value is $(customer.basket.value)\
  \ USD\"\n// 'f' 前缀类似于 String.format\nf\"Square of 42 is ${ math.sqrt(42) } %1.2f\"\
  \        // Square of 42 is 6.48\n\"Escaping \\\"quotes\\\" is the same as in Java\"\
  \n// 三引号允许跨行并包含未转义的引号\n\"\"\"\"vCard\": {\n\"id\" : \"007\",\n\"name\" : \"bond\"\
  ,\n\"address\" : \"MI5\"\n}\"\"\"\n// 'raw' 字符串插值器不会转义通常的转义字符\nraw\"a\\nb\"    \
  \                                  // a\\nb\n```\n\n### Apply 方法\n\n```\nval bob\
  \ = Customer .apply(\"Bob\")                   // 用作工厂方法\nval bob = Customer (\"\
  Bob\")                         // 无需显式调用\nval array = Array (1, 54, 23, 545, 23)\n\
  array.apply(0)                                    // 对数组应用 apply 是\"getter\"\narray(0)\
  \                                          // 结果是 \"1\"\n```\n\n### Update 方法\n\n\
  ```\nval array = Array (1, 54, 23, 545, 23)\narray(0)                          \
  \                // 结果是 \"1\"\narray.update(0, 34)\narray(0)                   \
  \                       // 结果是 \"34\"\narray(0) = 55                           \
  \          // = 是 update 的快捷方式\narray(0)                                       \
  \   // 结果是 \"55\"\n```\n\n\n\n### 模式匹配\n\n```\nvalue match {\ncase 'R'         \
  \     => ...    // 字面量匹配\ncase Customer (name)   => ...    // 构造器匹配（样例类）\ncase x\
  \ : Int           => ...    // 类型查询匹配（即 instanceof）\ncase x : Int if x > 5 => ...\
  \    // 带守卫条件\ncase (x, y)           => ...    // 使用 unapply 进行解构\ncase _      \
  \         => ...    // 默认情况\n}\n// 相同的语法也用于 try/catch 和异常处理\ntry {\n// ...\n} catch\
  \ {\ncase e : MalformedURLException => println(\"错误的 URL\")\ncase e : IOException\
  \ => println(e.getMessage)\n}\n```\n\n### 协变类型\n\n保持 `Stack[Human]` 和 `Stack[Man]`（其中\
  \ Man 是 `Human` 的子类型）之间的子类型关系。\n\n```\nclass Stack [ +A ] {\n...\n}\n```\n\n####\
  \ 示例\n\n```\nclass Human\nclass Man extends Human\nclass Woman extends Human\nval\
  \ people : Stack [ Human ] = Stack [ Human ]()\nval men : Stack [ Human ] = Stack\
  \ [ Man ]()            // 正确\nval women : Stack [ Woman ] = Stack [ Human ]()  \
  \      // 编译错误\n```\n\n### 上界（extends）\n\n```\nA <: B 表示类型变量 A 继承自 B。\n```\n\n###\
  \ 逆变类型\n\n```\nclass Stack [ -A ] {\n...\n}\n```\n\n### 下界（super）\n\n`B >: A` 表示\
  \ B 是 `A` 的超类型。通常 A 是类的类型参数，而 B 是方法的类型参数。\n\n```\nclass Stack [ +A ] {\ndef push\
  \ B >: A  : Stack [ B ] = ...\n}\n```\n\n索引 A 抽象类 匿名类 转换为 lambda 创建 vs. 函数 匿名函数\
