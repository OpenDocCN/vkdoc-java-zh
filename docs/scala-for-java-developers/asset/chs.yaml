  \ Comparable[Animal] {\ndef compareTo(o: Animal): Int = 0\n}\nclass Lion extends\
  \ Animal\nclass Zebra extends Animal\n```\n\n然后我们可以再次创建我们的 `sort` 方法并重新创建围栏。\n\n\
  ```\n// scala\ndef sort[A <: Comparable[A]](list: List[A]) = { }\n// scala\ndef\
  \ main(args: String*) {\nvar enclosure = List[Lion]()\nenclosure = new Lion +: enclosure\n\
  enclosure = new Lion +: enclosure\nsort(enclosure)                             \
  \    // 编译器失败\nvar zoo = List[Animal]()\nzoo = new Zebra +: zoo\nzoo = new Lion\
  \ +: zoo\nzoo = new Lion +: zoo\nsort(zoo)                                     \
  \  // 编译通过\n}\n```\n\n和之前一样，我们遇到了编译失败。\n\n```\nError:(30, 5) inferred type arguments\
  \ [Lion] do not conform to method\nsort’s type parameter bounds [A <: Comparable[A]]\
  \ sort(enclosure)\n^\n```\n\n它正确地强制要求 `A` 必须是相同类型，但我们却将 `A` 同时视为 `Lion` 和 `Animal`。所以，和之前一样，我们需要用下界来约束泛型类型。\n\
  \n你可能会想尝试一个直接的等价写法：使用带 `>: A` 的下划线：\n\n```\ndef sort[A : A]](a: List[A]) = { } //\
  \ 编译器失败\n```\n\n但不幸的是，这会导致编译失败：\n\n```\nfailure: illegal cyclic reference involving\
  \ type A\n```\n\n它无法处理对 `A` 的引用；将其视为循环引用。因此，你必须尝试保持与边界的关系，同时消除循环引用。答案是定义一个新的泛型类型\
  \ `U`，并编写如下代码：\n\n```\ndef sortA : A = { }\n```\n\n所以，`A` 必须扩展 `Comparable`，其中 `Comparable`\
  \ 的泛型类型 `U` 本身必须是 `A` 的超类型。这解决了循环问题，但编译器仍然会报错。\n\n```\ninferred type arguments [Lion,Lion]\
  \ do not conform to method sort’s\ntype parameter bounds [A : A] sort(enclosure)\n\
  ^\n```\n\n它表示围栏的推断类型不符合我们设置的约束条件。它将两个类型都推断为 `Lion`，因为推断引擎没有足够的信息。如果我们指定我们知道为真的类型，就可以给它一个提示。因此，就像\
  \ Java 中的类型见证一样，我们可以明确表示我们希望类型是 `Lion` 和 `Animal`。\n\n```\nvar enclosure = List[Lion]()\n\
  enclosure = new Lion +: enclosure\nenclosure = new Lion +: enclosure\nsortLion,\
  \ Animal                       // 添加类型提示\n```\n\n当你对字节码进行往返转换时，最终版本看起来像这样：\n\n```\n\
  // java\npublic , U> void sort(List a) { }\n```\n\n这基本上等同于以下代码：\n\n```\n// java\n\
  public > void sort(List a) { }\n```\n\n这与 Scala 版本基本相同：\n\n```\ndef sort[A <: Comparable[_]](list:\
  \ List[A]) { }    // scala\n```\n\n所以，它在底层将其视为无界类型。这并不完全准确，因为 Scala 编译器在这里做了所有繁重的工作，并且由于它负责所有类型检查，所以将\
  \ `U` 保留为无界。在这个例子中，从字节码往返转换到 Java 并不完全合理，因为这不是一一对应的，但了解幕后发生的事情还是很有趣的。\n\n下界告诉你可以在数据结构中放入什么。在我们的\
  \ `Lion` 示例中，使用下界意味着你可以在动物园中放入不仅仅是狮子。你在 Java 中使用 `super`，在 Scala 中使用大于冒号（`>: `）。\n\
  \n\n\n### 通配符边界（`<? extends T>`、`<? super T>`）\n\n我们已经见过一些通配符的例子：Java 中的 `?` 和 Scala\
  \ 中的 `_`。\n\n带有上界的通配符如下所示：\n\n```\n// java\nvoid printAnimals(List<? extends Animal>\
  \ animals) {\n    for (Animal animal : animals) {\n        System.out.println(animal);\n\
  \    }\n}\n// scala\ndef printAnimals(animals: List[_ <: Animal]) {\n    for (animal\
  \ <- animals) {\n        println(animal)\n    }\n}\n```\n\n带有下界的通配符如下所示：\n\n```\n\
  // java\nstatic void addNumbers(List<? super Integer> numbers) {\n    for (int i\
  \ = 0; i < 100; i++) {\n        numbers.add(i);\n    }\n}\n// scala\ndef addNumbers(numbers:\
  \ List[_ >: Int]) {\n    for (i <- 0 to 99) {\n        // ...\n    }\n}\n```\n\n\
  无界通配符在 Java 中如下所示：\n\n```\nList<?> list             // java\n```\n\n……在 Scala 中如下所示：\n\
  \n```\nList[_]                  // scala\n```\n\n无界通配符表示一个未知的泛型类型。例如，打印未知类型列表的元素适用于所有列表。只需添加上界或下界约束来限制选项。\n\
  \n```\n// java\nvoid printUnknown(List<?> list) {\n    for (Object element : list)\
  \ {\n        System.out.println(element);\n    }\n}\n// scala\ndef printUnknown(list:\
  \ List[_]) {\n    for (e <- list) {\n        val f: Any = e\n        println(f)\n\
  \    }\n}\n```\n\n尽管实现可以将元素视为 `Object`，因为一切都是对象，但你不能向未知类型的列表中添加任何内容。\n\n```\n//\
  \ java\nList<?> list = new ArrayList<Object>();\nlist.add(new Object()); // 编译器错误\n\
  ```\n\n唯一的例外是 `null`。\n\n```\nlist.add(null);\n```\n\n在 Scala 中你会得到相同的效果，甚至无法在没有有效类型的情况下创建列表。\n\
  \n```\nscala> val list = mutable.MutableList[_]()\n<console>:7: error: unbound wildcard\
  \ type\nval list = mutable.MutableList[_]()\n^\n```\n\n当你确实不关心类型参数，只关心上界或下界的任何约束，或者当你可以将类型视为\
  \ `Object` 或 `Any` 的实例时，主要使用通配符。\n\n### 多重边界\n\n在 Java 和 Scala 中，类型也可以有多个边界。\n\n\
  *   Java 仅限于多个上界。\n*   Java 不能对类型同时设置下界和上界（因此你不能让一个泛型类型继承一个类，同时又成为另一个类的超类型）。\n*\
  \   与 Java 不同，Scala 可以设置单个下界和上界。\n*   然而，Scala 不能设置多个上界或下界。相反，它可以通过强制你扩展特质来约束边界。\n\
  \n使用多重边界，另一种表达对 `Animal` 排序方法约束的方式是明确声明 `A` 必须扩展 `Animal` 并且可与 `Animal` 比较，在 Java\
  \ 中使用 `&` 符号。\n\n```\n// java\npublic static <A extends Animal & Comparable<Animal>>\
  \ void sort(List<A> l)\n```\n\n这在 Java 中为泛型类型 `A` 设置了两个上界。你不能在 Scala 中为 `A` 设置两个上界，但你可以通过指定你的边界也必须扩展某些特质来达到相同的效果。\n\
  \n```\n// scala\ndef sort[A <: Animal with Comparable[Animal]](list: List[A]) =\
  \ { }\n```\n\n因为我们更加明确，所以在调用 `sort` 方法时可以移除类型提示。事实上，如果你不这样做，你会得到一个编译器错误。\n\n```\n\
  var enclosure = List[Lion]()\nenclosure = new Lion +: enclosure\nenclosure = new\
  \ Lion +: enclosure\n// sortLion, Animal     // 编译器错误\nsort(enclosure)\n```\n\n\
  在 Scala 中，你也可以使用 `>:` 和 `<:` 同时设置下界和上界，如下所示：\n\n```\ndef exampleA >: Lion <: Animal\
  \ = ()                     // scala\n^         ^\nlower     upper\n```\n\n……其中 `A`\
  \ 必须是 `Lion` 的超类型且是 `Animal` 的子类型。\n\n## 变型\n\n在不涉及泛型的情况下，一个简单的类 `B` 继承自 `A`（见图\
  \ 13-1）可以赋值给一个 `A` 的实例；毕竟，它既是 `A` 也是 `B`。显然，子类型化只是单向的；反过来，你会得到一个编译器错误。\n\n![A456960_1_En_13_Fig1_HTML.jpg](img/A456960_1_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1\n\n`B extends A`\n\n```\n// java\nA a = new A();\nB b = new B();\na = b;\n\
  b = a;                    // 编译器错误\n```\n\n然而，泛型类本身并不是子类，仅仅因为它们的参数化类型可能是。那么，如果 `B`\
  \ 是 `A` 的子类，`List<B>` 应该是 `List<A>` 的子类吗？在 Java 中，`B` 的 `List` 不是 `A` 的 `List` 的子类型，即使它们的参数化类型是（见图\
  \ 13-2）。\n\n![A456960_1_En_13_Fig2_HTML.jpg](img/A456960_1_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\n\n在 Java 中 `List<B>` 不能扩展 `List<A>`\n\n```\n// java\nList<A> a = new ArrayList<A>();\n\
  List<B> b = new ArrayList<B>();\na = b;  // 编译器错误\n```\n\n这就是变型的用武之地。变型描述了泛型类型（如列表或“容器”类型）的子类型化如何与其参数化类型的子类型化相关联。\n\
  \n变型描述了三种子类型关系。\n\n1.  不变型。\n2.  协变型。\n3.  逆变型。\n\n### 不变型\n\nJava 对其泛型类型只支持这三种中的一种：Java\
  \ 中的所有泛型类型都是不变的，这就是为什么我们不能将 `List<B>` 赋值给 `List<A>`。不变泛型类型不保留其参数化类型的子类型关系。\n\n然而，当你对方法和变量使用通配符时，你可以改变参数化类型。\n\
  \n泛型类型之间的不变关系表明，即使它们的内容具有子类型关系，它们之间也没有关系。你不能用一个替换另一个。Java 和 Scala 在这里共享语法，因为在尖括号（Java）或方括号（Scala）中定义任何泛型类型都将其描述为不变型。\n\
  \n```\npublic class List<T> { }         // java\nclass List[T] { }             \
  \   // scala\n```\n\n### 协变型\n\n协变泛型类型在其参数化类型是子类型时，保留两个泛型类型之间的子类型关系。因此，当泛型类型被设置为协变时，`List<B>`\
  \ 是 `List<A>` 的子类型。Java 不支持类型的协变。Scala 通过在定义泛型类时使用 `+` 来支持协变泛型类型。\n\n```\nclass\
  \ List[+T] { }\n```\n\n### 逆变型\n\n逆变反转了子类型关系。因此，如果 `A` 是逆变的，那么 `List<A>` 也是 `List<B>`；它是一个子类型。参数化类型的关系对其泛型类型来说是反转的。Java\
  \ 不支持类型的逆变，但在 Scala 中，你只需在泛型类型定义中添加一个 `-`。\n\n```\nclass List[-T] { }\n```\n\n###\
  \ 变型总结\n\n总之，不变泛型类型是不相关的，无论其参数化类型的关系如何。协变类型保持其参数化类型的子类型关系，而逆变类型则反转它（见表 13-1）。\n\n\
  表 13-1\n\n变型总结\n\n|   | 描述 | Scala 语法 |\n| --- | --- | --- |\n| 不变型 | `List<A>`\
  \ 和 `List<B>` 不相关 | `[T]` |\n| 协变型 | `List<B>` 是 `List<A>` 的子类 | `[+T]` |\n| 逆变型\
  \ | `List<A>` 是 `List<B>` 的子类 | `[-T]` |\n\n每种语法的总结见表 13-2。\n\n表 13-2\n\n语法总结\n\n\
  |   | 不变型 | 协变型 | 逆变型 |\n| --- | --- | --- | --- |\n| Java | `<T>` | `<? extends\
  \ T>` | `<? super T>` |\n| Scala | `[T]` | `[+T]` | `[-T]` |\n| Scala（通配符） | `[T]`\
  \ | `[_ <: T]` | `[_ >: T]` |\n\nJava 的限制\n\n在 Java 中，所有泛型类型都是不变的，这意味着你不能将 `List<Foo>`\
  \ 赋值给 `List<Object>`。你可以在使用它们的地方通过通配符改变类型，但仅限于方法和变量定义，而不是类。\n\n\n\n"
- '# 第三部分

  从 Java 到 Scala


  从 Java 到 Scala


  本书的这一部分主要探讨 Scala 与 Java 之间的差异。Scala 中有大量语言特性在 Java 中没有明显的对应物。在本部分中，我们将深入探讨其中一些特性，并探索
  Scala 相较于 Java 能为我们带来什么。


  具体来说，我们将探索许多使编写 Scala 代码更具表现力的语言特性，并研究一些 Scala 广为人知的函数式编程惯用法。


  ## 富有表现力的 Scala


  Scala 提供了若干特性，使编写代码更加简洁。除了我们已经见过的一些特性外，它还提供了以下机制：


  *   使用特殊方法 `apply` 让方法看起来像函数。

  *   使用特殊方法 `update` 为赋值操作符提供默认行为。

  *   让常规的方法调用看起来像语言结构，这实际上意味着你可以定义自己的控制结构。


  Scala 还提供了模式匹配；我们将研究 `unapply` 方法及其在模式匹配中的作用。


  ## 函数式编程惯用法


  我们还将研究 Scala 的一些函数式编程方面。


  *   用于映射值的内置方法（`map`、`flatMap`）。

  *   什么是单子（monad）以及为什么你应该关注它。

  *   `Option` 类作为避免空值检查的一种方式。

  *   链式单子调用。

  *   for 推导式及其底层工作原理。


  这仅仅是函数式编程的冰山一角，但我希望本书的这一部分能让你在接触 Scala 和函数式编程时，有一个有用的先发优势。


  '
- '# 14. 模拟函数调用


  Scala 提供了使方法调用看起来像常规函数调用的机制。它使用特殊方法 `apply` 和 `update` 来实现一种简写调用符号，可以减少代码的杂乱。


  ## `apply` 方法


  `apply` 方法提供了一种在类上调用方法的简写方式。因此，正如我们所见，你可以将它们用作工厂风格的创建方法，例如，给定某个类，比如我们的老朋友 `Customer`：


  ```

  class Customer(name: String, address: String)

  ```


  ……你可以向其伴生对象添加一个 `apply` 方法。


  ```

  object Customer {

  def apply(name: String, address: String) = new Customer(name, address)

  }

  ```


  然后，你可以直接调用该方法，或者省略 `apply` 部分，此时 Scala 会查找与你参数列表匹配的 `apply` 方法并调用它。


  ```

  Customer.apply("Bob Fossil", "1 London Road")

  Customer("Rob Randal", "14 The Arches")

  ```


  你也可以有多个 `apply` 方法。例如，我们可以创建另一个方法来为我们的客户设置默认地址字段。


  ```

  def apply(name: String) = new Customer(name, "No known address")

  Customer("Cuthbert Colbert")

  ```


  不过，你不必非得将 `apply` 方法用作工厂方法。大多数人最终使用它们是为了使类的 API 更简洁。这是 Scala 如何帮助使 API 更具表现力的关键。如果让你的类的默认行为是创建一个实例是有意义的，那很好，但你也可以使用
  `apply` 让其他方法看起来像函数调用。


  到目前为止，我们一直在单例对象（`object Customer`）上使用 `apply` 方法并省略 `apply`，但你也可以在类上定义 `apply` 方法，并在实例变量上调用它。


  例如，我们可以创建一个名为 `Adder` 的类，并在一个实例上调用 `apply` 方法来将两个数字相加。


  ```

  // scala

  class Adder {

  def apply(a: Int, b: Int) = a + b

  }

  val add = new Adder()

  add.apply(1, 3)

  ```


  但我们同样可以轻松地省略它，看起来就像我们在调用一个函数，尽管我们实际上是在调用一个实例变量上的方法。


  ```

  val add = new Adder()

  add(1, 3)

  ```


  另一个例子是访问数组值。假设我们有一个罗马数字数组。


  ```

  val numerals = Array("I", "II", "III", "IV", "V", "VI", "VII")

  ```


  要使用索引访问数组，语法是使用圆括号而不是方括号。


  ```

  numerals(5)               // 得到 "VI"

  ```


  因此，在循环中使用索引，我们可以这样做来打印整个数组：


  ```

  for (i <- 0 to numerals.length - 1)

  println(i + " = " + numerals(i))

  ```


  这里有趣的是，数组上有一个接受 `Int` 的 `apply` 方法。我们本可以这样写：


  ```

  numerals.apply(5) // 得到 "VI"

  for (i <- 0 to numerals.length - 1)

  println(i + " = " + numerals.apply(i))

  ```


  看起来像是访问数组的语言语法，实际上只是一个常规的方法调用。Scala 模拟了它。


  ## `update` 方法


  赋值的工作方式完全相同。例如，`numerals(2) = "ii"` 实际上调用了 `Array` 类上一个名为 `update` 的特殊方法（`def update(i:
  Int, x: T)`）。


  ```

  numerals(2) = "ii"

  ```


  如果 Scala 看到赋值操作符并且能找到带有适当参数的 `update` 方法，它就会将赋值转换为方法调用。


  我们可以将这个想法应用到我们自己的类上，使 API 感觉更像语言语法。假设我们从事电话业务，该业务的一部分是维护客户电话号码的目录。


  我们可以创建一个集合类来包含我们的目录，并初始化它以保存四个火枪手的电话号码，如下所示：


  ```

  class Directory {

  val numbers = scala.collection.mutable.Map(

  "Athos"      -> "7781 456782",

  "Aramis"     -> "7781 823422",

  "Porthos"    -> "1471 342383",

  "D`Artagnan" -> "7715 632982"

  )

  }

  ```


  如果我们决定目录的简写或默认行为应该是返回客户的电话号码，我们可以按如下方式实现 `apply` 方法：


  ```

  def apply(name: String) = {

  numbers.get(name)

  }

  ```


  这样，在创建目录实例后，我们可以像这样打印 Athos 的号码：


  ```

  val yellowPages = new Directory()

  println("Athos''s telephone number : " + yellowPages("Athos"))

  ```


  然后，如果我们想更新一个号码，我们可以实现一个更新方法并直接调用它。Scala 的赋值简写意味着，如果我们实际上将方法命名为 `update`，我们就可以使用赋值操作符，它会为我们调用
  `update` 方法。


  因此，我们添加一个 update 方法。


  ```

  def update(name: String, number: String) = {

  numbers.update(name, number)

  }

  ```


  然后我们可以像这样调用它来更新一个号码：


  ```

  yellowPages.update("Athos", "Unlisted")

  ```


  利用简写符号，你也可以使用赋值。


  ```

  yellowPages("Athos") = "Unlisted"

  ```




  ### 多个 `update` 方法


  我们还可以添加第二个 update 方法，这次将 `Int` 作为第一个参数。


  ```

  def update(areaCode: Int, newAreaCode: String) = {

  ???

  }

  ```


  假设我们希望它能更新所有条目中的区号。我们可以枚举每个条目，找出哪些号码以第一个参数中的区号开头。对于匹配的条目，我们返回原始映射并更新该条目。


  ```

  def update(areaCode: Int, newAreaCode: String) = {

  numbers.foreach(entry => {

  if (entry._2.startsWith(areaCode.toString))

  numbers(entry._1) = entry._2.replace(areaCode.toString, newAreaCode)

  })

  }

  ```


  `_1` 和 `_2` 是 Scala 中用于访问所谓元组（tuple）的符号。这是一种简单的数据结构，我们用它来将（在本例中）Java 中的 `Map.Entry`
  视为单个变量。`_1` 和 `_2` 是方法调用，分别让我们访问键和值。实际上，元组的用途比这更广泛，并不仅限于映射。我们这里使用的是包含两个元素的元组（`Tuple2`），但你可以拥有最多包含
  22 个元素的元组（`Tuple22`）。


  我们可以使用简写的赋值语法来调用新的 `update` 方法，如下所示：


  ```

  object DirectoryExampleAlternativeUpdateMethod extends App {

  val yellowPages = new Directory

  println(yellowPages)

  yellowPages(7781) = "7555"

  println(yellowPages)

  }

  ```


  这样做的结果是，Athos 和 Aramis 的区号都会被更新。


  ### `update` 的多个参数


  你可以在 `update` 方法中拥有任意数量的参数，但只有最后一个参数会被用作更新后的值。这很合理，因为赋值运算符的右侧只能有一个值。


  参数列表的其余部分用于选择合适的 update 方法。因此，如果你有另一个包含三个参数（`areaCode`、`anotherArgument` 和 `newAreaCode`）的方法，如下所示：


  ```

  def update(areaCode: Int, another: String, newAreaCode: String) = ???

  ```


  ……那么类型将用于确定在赋值时应调用哪个 `update` 方法。


  ```

  yellowPages(7998) = "7668"

  yellowPages(7998, "another argument") = "???"

  ```


  ## 总结


  在本章中，我们进一步了解了 `apply` 方法：它不仅用于工厂风格的创建方法，还可用于构建丰富的 API。通过让方法调用看起来像函数调用，你可以使客户端代码更加简洁。


  我们还了解了相关的 `update` 方法是如何工作的，以及如何利用赋值运算符编写 API 并实现自定义的更新行为。


  '
- "# 15. 模拟语言结构\n\nScala 允许你以这样一种方式编写代码，使其看起来像是在使用原生语言结构，而实际上你只是在使用常规方法。\n\n本章将涵盖以下内容：\n\
  \n*   Scala 如何允许你在调用方法时使用花括号代替常规圆括号。\n*   Scala 如何支持高阶函数：即以函数作为参数并返回函数作为结果的函数。\n\
  *   Scala 如何原生支持柯里化。\n\n这些特性听起来并不惊人，但结合起来却能提供令人惊讶的灵活性。我们将看到这些技术如何帮助你编写更灵活、更易读的代码。\n\
  \n本章中的所有代码示例均使用 Scala 编写。\n\n## 花括号（与函数字面量）\n\nScala 中有一条简单的规则。\n\n*   任何只接受一个参数的方法调用，都可以使用花括号代替圆括号来包围参数。\n\
  \n因此，与其这样写：\n\n```\nnumerals.foreach(println(_))\n```\n\n……不如这样写：\n\n```\nnumerals.foreach{println(_)}\n\
  ```\n\n我们只是将方括号换成了花括号。这并不令人印象深刻，但当我们引入一些换行时，情况就开始变得有趣了。\n\n```\nnumerals.foreach\
  \ {\nprintln(_)\n}\n```\n\n现在它看起来像一个内置的控制结构。开发者习惯于将花括号解释为语言语法的分界符。因此，这看起来更像内置的 `for`\
  \ 循环，尽管它只是一个方法调用。\n\n这样做的主要原因是允许客户端以一种自然且简洁的方式将函数作为参数传递。当你编写可以接受函数作为参数的函数时，你就是在创建高阶函数。这提供了更大的灵活性和复用性。\n\
  \n例如，假设我们想要执行一些工作并更新一个 UI 元素，比如进度条或客户购物车。最好的方法是在一个新线程中执行此操作，这样我们就不会拖慢主 UI 线程并导致用户界面卡顿。\n\
  \n### 高阶函数\n\n如果每次更新 UI 元素的调用都必须在其自己的线程上执行，我们可能会得到一个像这样简陋的实现：\n\n```\nobject Ui\
  \ {\ndef updateUiElements() {\nnew Thread() {\noverride def run(): Unit = updateCustomerBasket(basket)\n\
  }.start()\nnew Thread() {\noverride def run(): Unit = updateOffersFor(customer)\n\
  }.start()\n}\n}\n```\n\n`Ui` 对象依次执行一系列更新，每个更新都在一个新线程上。`Ui` 对象既管理线程策略，又管理更新行为。更好的做法是让其他东西负责协调线程，而\
  \ `Ui` 对象只负责更新行为。这样，我们可以避免重复，并且如果线程策略发生变化，我们也不必找到所有分散在各处的用法。\n\n解决方案是定义一个函数，该函数可以在一个线程上运行另一个函数。我们可以创建一个名为\
  \ `runInThread` 的函数，其中包含样板线程代码。\n\n```\ndef runInThread() {\nnew Thread() {\noverride\
  \ def run(): Unit = ???\n}.start()\n}\n```\n\n它会创建并启动一个新线程，但不会做任何有意义的事情。我们如何传入一个函数？在\
  \ Java 中，你可能会传入一个 `Runnable` 或 `Callable` 的匿名实例，或者一个 lambda 表达式。\n\n在 Scala 中也是如此，但你不是传入一个函数式接口作为参数，而是传入一个表示函数参数的简写签名。你像往常一样定义一个变量（下面的例子中是\
  \ `function`），但冒号后面的类型表示一个函数。我们的例子没有参数，并返回一个 `Unit` 类型的值。它相当于 Java 中 lambda 表达式的签名：`()\
  \ -> Void`。\n\n```\ndef runInThread(function: () => Unit) {\nnew Thread() {\noverride\
  \ def run(): Unit = ???\n}.start()\n}\n```\n\n然后我们只需在线程体中执行该函数。记住，括号表示执行 `apply`\
  \ 方法的简写。\n\n```\ndef runInThread(function: () => Unit) {\nnew Thread() {\noverride\
  \ def run(): Unit = function()       // 即 function.apply()\n}.start()\n}\n```\n\n\
  有了新的 `runInThread` 方法，我们可以像这样重写 UI 代码：\n\n```\ndef updateUiElements() {\nrunInThread(()\
  \ => updateCustomerBasket(basket))\nrunInThread(() => updateOffersFor(customer))\n\
  }\n```\n\n我们通过将函数传递给 `runInThread` 消除了重复代码。\n\n### 使用花括号的高阶函数\n\n这并没有真正实现让客户端能够“以一种自然且简洁的方式”将函数作为参数传递的承诺。它看起来很像\
  \ Java 的 lambda 语法，但如果我们使用花括号，可以使其看起来更自然，更像语言语法。\n\n如果我们只是将圆括号替换为花括号，情况并没有真正改善。\n\
  \n```\n// 真难看！\ndef updateUiElements() {\nrunInThread { () =>\nupdateCustomerBasket(basket)\n\
  }\nrunInThread { () =>\nupdateOffersFor(customer)\n}\n}\n```\n\n但我们可以使用另一个技巧来去掉空的圆括号和箭头。我们可以使用所谓的按名参数（call-by-name\
  \ parameter）。\n\n\n\n### 按名传参\n\n在 Java 中，你无法对空的 lambda 参数列表（例如 `() -> Void`）做任何处理，但在\
  \ Scala 中，你可以从函数签名中省略括号，以表明该参数是按名传参的。调用时，你不再需要调用 `apply` 方法，只需直接引用它即可。\n\n```\n\
  def runInThread(function: => Unit) {         // 按名传参\nnew Thread() {\noverride def\
  \ run(): Unit = function      // 不是 function()\n}.start()\n}\n```\n\n按名参数表达式直到实际使用时才会被求值，而不是在定义时。它的行为与长格式函数完全一致，尽管看起来我们像是在将函数传入\
  \ `runInThread` 方法时就已经调用了它。\n\n```\ndef updateUiElements() {\nrunInThread {\nupdateCustomerBasket(basket)\n\
  }\nrunInThread {\nupdateOffersFor(customer)\n}\n}\n```\n\n这让代码看起来自然得多，尤其是当我们在一个运行线程中想做更多操作时。例如，假设我们想在更新客户购物车之前应用一个折扣。花括号和缩进清晰地表明，这些操作与更新发生在同一个线程中。\n\
  \n```\ndef updateUiElements() {\nrunInThread {\napplyDiscountToBasket(basket)\n\
  updateCustomerBasket(basket)\n}\nrunInThread {\nupdateOffersFor(customer)\n}\n}\n\
  ```\n\n你可以将其视为创建无参 lambda 的简写形式。\n\n### 按名传参 ≠ 惰性求值\n\n人们常常认为按名参数与惰性值是一回事，但这在技术上并不准确。没错，它们都是在运行时遇到时才被求值，但与真正的惰性值不同，它们每次被遇到时都会被求值。\n\
  \n真正的惰性值在第一次遇到时被求值并存储，因此第二次请求该值时，它会被直接返回，而不会再次求值。\n\n所以，按名参数并非惰性。\n\n## 柯里化\n\n\
  使用 `apply` 方法和花括号，我们可以创建出表达力强且使用自然的 API。它让我们能够创建符合语言语法预期的控制抽象。\n\n但请记住我们之前关于花括号规则的说明。\n\
  \n*   任何接受恰好一个参数的方法调用，都可以使用花括号来包围参数，而不是圆括号。\n\n我们只能对单参数方法使用花括号。如果我们想为 `runInThread`\
  \ 方法添加一个参数，同时仍然使用优雅的语法，该怎么办？好消息是，这完全可行；我们可以采用一种称为柯里化的技术。\n\n让我们扩展 `runInThread`\
  \ 方法，添加一个新参数来指定线程组。\n\n```\ndef runInThread(group: String, function: => Unit) {\n\
  new Thread(new ThreadGroup(group), new Runnable() {\ndef run(): Unit = function\n\
  }).start()\n}\n```\n\n由于只有单参数列表才能使用花括号，我们不得不让 `Ui` 对象回归到使用圆括号。\n\n```\n// 真难看！\n\
  def updateUiElements() {\nrunInThread(\"basket\", {\napplyDiscountToBasket(basket)\n\
  updateCustomerBasket(basket)\n})\nrunInThread(\"customer\",\nupdateOffersFor(customer)\n\
  )\n}\n```\n\n如果我们能将这个双参数函数转换为一个单参数函数，就能再次使用花括号了。幸运的是，这正是柯里化的作用。柯里化是将一个具有两个或更多参数的函数转换为一系列函数的过程，每个函数只接受一个参数。\n\
  \n对于一个双参数函数，柯里化会产生一个接受一个参数并返回另一个函数的函数。这个返回的函数也只有一个参数（对应原函数的第二个参数）。有点困惑？让我们通过一个例子来理解。\n\
  \n假设我们有一个函数 f，它接受两个参数 a 和 b，并返回 a + b。\n\nf (a, b) = a + b\n\n要将其转换为两个各带一个参数的函数，首先我们创建一个函数来接受\
  \ a 并返回一个新函数（f′）。\n\nf (a) → f  ′\n\n这个新函数本身应该接受一个参数 b。\n\nf (a) → f  ′ (b)\n\n\
  整个函数应该返回结果 a + b。\n\nf (a) → f  ′ (b) → a + b\n\n我们最终得到两个函数（f 和 →f  ′），每个都接受一个参数。\n\
  \n在使用了类似的伪数学符号后，有必要重申我最初的定义，并将原始函数与其柯里化形式进行比较（见图 15-1）。\n\n![A456960_1_En_15_Fig1_HTML.jpg](img/A456960_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n\n原始函数及其柯里化形式的推导步骤\n\n*   对于一个双参数函数，柯里化会产生一个接受一个参数并返回另一个函数的函数。这个返回的函数也只有一个参数（对应原函数的第二个参数）。\n\
  \n要计算柯里化形式的函数，我们先计算第一个函数（例如，传入值 1）。\n\nf (1)\n\n这会返回一个捕获了该值的函数，并且由于返回的是一个函数，我们可以直接计算它，为最后一个参数提供值（2）。\n\
  \nf (1)(2)\n\n此时，两个值都在作用域内，任何计算都可以进行，从而得到最终结果。\n\n我在这里使用了一种有点“大猩猩”式的符号¹来阐明我的观点。使用更符合数学规范的符号，我们可以通过创建一个新函数来展示函数的柯里化形式，该函数接受\
  \ a 并将 b 映射到 a + b。\n\nf (a) = (b → a + b)\n\n如果你熟悉 lambda 演算²，你就会知道 λab.a + b 是其柯里化形式\
  \ λa. (λb.(a + b)) 的简写。\n\n### 闭包\n\n有趣的是，像这样捕获一个值并使其可供第二个函数使用的过程被称为闭包。这就是我们在提及匿名函数或捕获值的\
  \ lambda 时，术语“闭包”的来源。\n\n### Scala 对柯里化函数的支持\n\n一个常规的非柯里化函数，用于将两个数相加，可能如下所示：\n\n\
  ```\ndef add(x: Int, y: Int): Int = x + y\n```\n\nScala 原生支持柯里化函数，因此我们无需手动转换；要将其转换为柯里化版本，只需用圆括号将参数分开即可。\n\
  \n```\ndef add(x: Int)(y: Int): Int = x + y\n```\n\nScala 为我们创建了两个单参数列表。要计算该函数，我们可以这样做：\n\
  \n```\nscala> add(1)(2)\nres1: Int = 3\n```\n\n要分步查看，我们可以只计算前半部分，如下所示：\n\n```\n\
  scala> val f = add(1) _\nf: Int => Int = \n```\n\n下划线向 REPL 提示了我们想要做什么。结果 `f` 是一个从\
  \ `Int` 到 `Int` 的函数。值 `1` 已被捕获，并可供该函数使用。因此，我们现在可以执行返回的函数，并提供第二个值。\n\n```\nscala>\
  \ f(2)\nres2: Int = 3\n```\n\n那么，这对我们的 `runInThread` 方法意味着什么呢？如果我们创建该函数的柯里化版本，就可以重新使用我们喜爱的花括号了。\n\
  \n我们首先将参数拆分为两个，以创建原函数的柯里化形式。\n\n```\ndef runInThread(group: String)(function: =>\
  \ Unit) {\nnew Thread(new ThreadGroup(group), new Runnable() {\ndef run(): Unit\
  \ = function\n}).start()\n}\n```\n\n注意，函数内部无需其他更改。在 `runInThread` 内部，一切照旧。然而，我们现在可以将\
  \ `Ui` 对象改回使用花括号来包围第二个参数。\n\n```\ndef updateUiElements() {\nrunInThread(\"basket\"\
  ) {\napplyDiscountToBasket(basket)\nupdateCustomerBasket(basket)\n}\nrunInThread(\"\
  customer\",\nupdateOffersFor(customer)\n)\n}\n```\n\n\n\n## 摘要\n\n借助一些内置特性，Scala\
  \ 允许我们编写出看起来像语言结构的方法。我们可以使用高阶函数来创建控制抽象：这些函数抽象了复杂的行为，减少了重复代码，同时仍为调用它们的代码提供了灵活性。\n\
  \n我们可以在任何使用单参数方法的地方使用花括号。我们可以利用这一点来提供一目了然的视觉提示和模式。借助内置的柯里化支持，我们不仅限于在单参数函数中使用这一特性；通过将多参数函数转换为多个单参数函数，我们可以创建更丰富的\
  \ API。\n\n脚注 1\n\n关于所用符号的讨论，请参见 [`http://bit.ly/1Q2bU6s`](http://bit.ly/1Q2bU6s)\n\
  \n  2\n\n关于 Lambda 演算的一些说明，请参见 [`http://bit.ly/1G4OdVo`](http://bit.ly/1G4OdVo)\n\
  \n"
- '# 16. 模式匹配


  除了提供类似 switch 的功能（比 Java 的版本更强大）之外，模式匹配还提供了一组丰富的“模式”用于匹配。在本章中，我们将研究模式的构成，并通过一些示例进行讲解，包括字面量模式、构造器模式和类型查询模式。


  模式匹配还提供了解构匹配对象的能力，使你可以访问数据结构的各个部分。我们将探讨解构的机制：提取器，它本质上是实现了特殊方法 `unapply` 的对象。


  ## 切换


  让我们从之前看过的模式匹配表达式开始。


  ```

  val month = "August"

  val quarter = month match {

  case "January" | "February" | "March"    => "1st quarter"

  case "April" | "May" | "June"            => "2nd quarter"

  case "July" | "August" | "September"     => "3rd quarter"

  case "October" | "November" | "December" => "4th quarter"

  case _                                   => "unknown quarter"

  }

  ```


  Java 的 `switch` 和 Scala 的 `match` 表达式有几个关键区别。


  *   在 Scala 中，case 之间没有穿透行为。Java 使用 `break` 来避免穿透，但 Scala 会在每个 case 之间自动中断。

  *   在 Scala 中，模式匹配是一个表达式；它会返回一个值。Java 的 switch 必须依赖副作用才能发挥作用。

  *   使用 Scala，我们可以在更多类型上进行切换，不仅仅是基本类型、枚举和字符串。我们可以在对象以及符合我们自己设计的“模式”的事物上进行切换。在示例中，我们使用“或”来构建更丰富的匹配条件。


  模式匹配还为我们提供了以下功能：


  *   能够守卫匹配条件；通过使用 `if`，我们可以丰富一个 case，使其不仅匹配模式（`case` 之后紧跟的部分），还能匹配某个二元条件。

  *   匹配失败的异常；当某个值在运行时没有匹配任何 case 时，Scala 会抛出一个 `MatchError` 异常来通知我们。

  *   可选的编译时检查：你可以进行设置，这样如果你忘记编写一个能匹配所有可能组合的 case，就会收到编译器警告。这是通过使用所谓的密封特质来实现的。


  ## 模式


  一个匹配表达式的结构如下所示：


  ```

  value match {

  case pattern guard => expression

  ...

  case _             => default

  }

  ```


  我们有一个值，然后是 `match` 关键字，接着是一系列匹配 case。这个值本身可以是一个表达式、一个字面量，甚至是一个对象。


  每个 case 由一个模式、一个可选的守卫条件，以及在匹配成功时要计算的表达式组成。


  你可以在末尾添加一个默认的、捕获所有情况的模式。下划线是我们遇到的第一个实际模式的例子。它是通配符模式，意思是“匹配任何东西”。


  一个模式可以是以下形式：


  *   通配符匹配 (`_`)。

  *   字面量匹配，即相等性比较，用于诸如 `101` 或 `RED` 这样的值。

  *   构造器匹配，意味着如果一个值可以使用特定的构造器创建，那么它就会匹配。

  *   解构匹配，也称为提取器模式。

  *   基于特定类型的匹配，称为类型查询模式。

  *   带有备选项的模式（使用 `|` 指定）。


  模式还可以包含一个变量名，在匹配成功后，该变量名将可用于右侧的表达式。在语言规范中，这被称为变量标识符。


  还有一些其他模式我没有列出；如果你感兴趣，请参阅 Scala 语言规范中的模式匹配部分。¹


  ## 字面量匹配


  字面量匹配是针对任何 Scala 字面量的匹配。以下示例使用了字符串字面量，其语义类似于 Java 的 switch 语句。


  ```

  val language = "French"

  value match {

  case "french" => println("Salut")

  case "French" => println("Bonjour")

  case "German" => println("Guten Tag")

  case _        => println("Hi")

  }

  ```


  该值必须与 case 中的字面量完全匹配。在示例中，结果将是打印“Bonjour”而不是“Salut”，因为匹配值中的 `F` 是大写的。匹配基于相等性 (`==`)。




  ## 构造器匹配


  构造器模式允许你根据对象的构造方式来匹配案例。假设我们有一个如下所示的 `SuperHero` 类：


  ```

  case class

  SuperHero(heroName: String, alterEgo: String, powers: List[String])

  ```


  这是一个包含三个构造器参数的常规类，但开头的关键字 `case` 将其指定为样例类。目前，这意味着 Scala 会自动为我们提供一系列有用的方法，例如 `hashCode`、`equals`
  和 `toString`。


  给定该类及其字段，我们可以创建如下匹配表达式：


  ```

  1   object BasicConstructorPatternExample extends App {

  2     val hero =

  3       new SuperHero("Batman", "Bruce Wayne", List("Speed", "Agility"))


  5     hero match {

  6       case SuperHero(_, "Bruce Wayne", _) => println("I''m Batman!")

  7       case SuperHero(_, _, _)             => println("???")

  8     }

  9   }

  ```


  使用构造器模式，它将匹配任何 `alterEgo` 字段值为“Bruce Wayne”的 `hero`，并打印“I''m Batman!”。对于其他所有情况，它将打印问号。


  下划线用作构造器参数的占位符；第二个 case（第 7 行）需要三个下划线，因为构造器有三个参数。下划线表示你不关心它们的值是什么。在第 6 行放入值“Bruce
  Wayne”表示你确实关心，并且构造器的第二个参数必须与之匹配。


  使用构造器模式时，值还必须匹配类型。假设 `SuperHero` 是 `Person` 的子类型，如图 16-1 所示。


  ![A456960_1_En_16_Fig1_HTML.jpg](img/A456960_1_En_16_Fig1_HTML.jpg)


  图 16-1


  `SuperHero` 是 `Person` 的子类型


  如果 `hero` 变量实际上是 `Person` 的实例而不是 `SuperHero`，则不会有任何匹配。在没有匹配的情况下，你会在运行时看到 `MatchError`
  异常。为了避免 `MatchError`，你需要允许非 `SuperHero` 类型也能匹配。为此，你可以使用通配符作为默认情况。


  ```

  object BasicConstructorPatternExample extends App {

  val hero = new Person("Joe Ordinary")

  hero match {

  case SuperHero(_, "Bruce Wayne", _) => println("I''m Batman!")

  case SuperHero(_, _, _)             => println("???")

  case _                              => println("I''m a civilian")

  }

  }

  ```


  模式还可以将匹配的值绑定到变量。我们不仅可以匹配字面量（例如“Bruce Wayne”），还可以使用变量作为占位符，并在右侧的表达式中访问匹配的值。例如，我们可以提出以下问题：


  *   “一个身份未知的人，如果他是化名为 Bruce Wayne 的超级英雄，他拥有哪些超能力？”


  ```

  1   def superPowersFor(person: Person) = {

  2     person match {

  3       case SuperHero(_, "Bruce Wayne", powers) => powers

  4       case _                                   => List()

  5     }

  6   }


  8   println("Bruce has the following powers " + superPowersFor(person))

  ```


  我们仍然只匹配 `SuperHero` 类型，并对其化名进行字面量匹配，但这次第 3 行最后一个位置的下划线被替换为变量 `powers`。这意味着我们可以在右侧使用该变量。在这个例子中，我们直接返回它来回答问题。


  变量绑定是模式匹配的关键优势之一。在实践中，使用像“Bruce Wayne”这样的字面量值意义不大，因为它限制了应用范围。相反，你更可能将其替换为变量或通配符模式。


  ```

  object HeroConstructorPatternExample extends App {

  def superPowersFor(person: Person) = {

  person match {

  case SuperHero(_, _, powers) => powers

  case _                       => List()

  }

  }

  }

  ```


  然后，你将使用匹配对象中的值作为输入。要找出 Bruce Wayne 拥有哪些能力，你需要传入一个 Bruce 的 `SuperHero` 实例。


  ```

  val bruce =

  new SuperHero("Batman", "Bruce Wayne", List("Speed", "Agility"))

  println("Bruce has the following powers: " + superPowersFor(bruce))

  ```


  这个例子有点刻意，因为我们使用匹配表达式来返回我们已经知道的内容。但既然我们已经使 `superPowersFor` 方法更加通用，我们也可以找出任何超级英雄或普通人的能力。


  ```

  val steve =

  new SuperHero("Capt America", "Steve Rogers", List("Tactics", "Speed"))

  val jayne = new Person("Jayne Doe")

  println("Steve has the following powers: " + superPowersFor(steve))

  println("Jayne has the following powers: " + superPowersFor(jayne))

  ```


  构造器模式


  请注意，构造器模式开箱即用地适用于样例类。从技术上讲，这是因为它们自动实现了一个名为 `unapply` 的特殊方法。我们稍后将看到如何实现你自己的 `unapply`
  方法，并为非样例类实现同样的功能。


  ## 类型查询


  使用构造器模式，你可以隐式地匹配类型并访问其字段。如果你不关心字段，可以使用类型查询仅匹配类型。


  例如，我们可以创建一个 `nameFor` 方法来获取一个人或超级英雄的名字，并用一个人列表来调用它。我们将得到他们的名字，或者如果他们是超级英雄，则得到他们的化名。


  ```

  1   object HeroTypePatternExample extends App {


  3     val batman =

  4       new SuperHero("Batman", "Bruce Wayne", List("Speed", "Agility"))

  5     val cap =

  6       new SuperHero("Capt America", "Steve Rogers", List("Tactics", "Speed"))

  7     val jayne = new Person("Jayne Doe")


  9     def nameFor(person: Person) = {

  10       person match {

  11         case hero: SuperHero => hero.alterEgo

  12         case person: Person => person.name

  13       }

  14     }


  16     // 超级英雄的化名是什么？

  17     println("Batman''s Alter ego is " + nameFor(batman))

  18     println("Captain America''s Alter ego is " + nameFor(cap))

  19     println("Jayne''s Alter ego is " + nameFor(jayne))

  20   }

  ```


  你可以指定一个变量和类型，而不是使用一系列 `instanceOf` 检查后跟强制类型转换。在箭头后面的表达式中，该变量可以作为该类型的实例使用。因此，在第 11
  行，`hero` 神奇地成为了 `SuperHero` 的实例，并且无需强制类型转换即可使用 `SuperHero` 特有的方法（例如 `alterEgo`）。


  当你在 `try` 和 `catch` 中使用模式匹配来处理异常时，实际上就是在使用类型查询。


  ```

  try {

  val url = new URL("http://baddotrobot.com")

  val reader = new BufferedReader(new InputStreamReader(url.openStream))

  var line = reader.readLine

  while (line != null) {

  line = reader.readLine

  println(line)

  }

  } catch {

  case _: MalformedURLException => println("Bad URL")

  case e: IOException => println("Problem reading data : " + e.getMessage)

  }

  ```


  `MalformedURLException` 匹配中的下划线表明，如果你对使用该值不感兴趣，可以在类型查询中使用通配符。




  ## 解构匹配与 `unapply`


  通常，`apply` 方法被实现为一种工厂风格的创建方法：它接收参数并返回一个新实例。你可以将特殊的 `unapply` 方法视为其对立面。它接收一个实例并从中提取值，通常是那些用于构造该实例的值。


  apply (a, b) → object (a, b)


  unapply (object (a, b))) → a, b


  由于它们提取值，因此实现了 `unapply` 的对象被称为提取器。


  *   给定一个对象，提取器通常会提取出创建该对象时所用的参数。


  因此，如果我们想在匹配表达式中使用 `Customer` 类，就需要在其伴生对象中添加一个 `unapply` 方法。让我们开始构建它。


  ```

  class Customer(val name: String, val address: String)

  object Customer {

  def unapply(???) = ???

  }

  ```


  `unapply` 方法总是接收一个你想要解构的对象实例，在我们的例子中就是 `Customer`。


  ```

  object Customer {

  def unapply(customer: Customer) = ???

  }

  ```


  它应该返回提取出的对象部分，或者返回某些信息以表明无法解构。在 Scala 中，我们不会返回 `null` 来表示这种情况，而是返回一个结果的可选值（Option）。这与
  Java 中的 `Optional` 类概念相同。


  ```

  object Customer {

  def unapply(customer: Customer): Option[???] = ???

  }

  ```


  最后一块拼图是确定可以从对象中可选地提取出什么：即放入 `Option` 参数中的类型。如果你只想提取客户姓名，返回值应为 `Option[String]`，但我们希望同时提取姓名和地址（从而能够在匹配表达式中同时匹配姓名和地址）。


  答案是使用元组，这是我们之前见过的数据结构。它是一种在单一类型中返回多个数据片段的方式。


  ```

  object Customer {

  def unapply(customer: Customer): Option[(String, String)] = {

  Some((customer.name, customer.address))

  }

  }

  ```


  现在我们可以对客户使用模式匹配了。


  ```

  val customer = new Customer("Bob", "1 Church street")

  customer match {

  case Customer(name, address) => println(name + " " + address)

  }

  ```


  你会注意到，这看起来像我们之前的构造器模式示例。这是因为它们本质上是同一回事；我们之前使用了样例类，它自动为我们添加了 `unapply` 方法。而这次是我们自己创建的。它既是一个提取器，又因为与构造器存在对称性，所以也是一种构造器模式。


  更具体地说，模式中要提取的值列表必须与类的主构造器中的参数列表相匹配，才能被称为构造器模式。详情请参阅语言规范²。


  ### 为什么编写自己的提取器？


  既然样例类已经自带了 `unapply` 方法，为什么还要自己实现提取器方法呢？原因可能很简单：你无法或不想使用样例类，或者你不想要样例类的匹配行为；你可能想要自定义的提取行为（例如，从
  `unapply` 返回 `Boolean` 来表示匹配成功但无需提取任何值）。


  也可能是你无法修改某个类，但希望从中提取部分信息。你可以为任何东西编写提取器。例如，你无法修改 `String` 类，但仍然可能希望从中提取信息，比如电子邮件地址或
  URL 的组成部分。


  例如，下面例子中的独立对象，当字符串是一个有效的 URL 时，会从中提取协议和主机名。它与 `String` 类没有关系，但仍然允许我们编写匹配表达式，将字符串“解构”为协议和主机名。


  ```

  object UrlExtractor {

  def unapply(string: String): Option[(String, String)] = {

  try {

  val url = new URL(string)

  Some((url.getProtocol, url.getHost))

  } catch {

  case _: MalformedURLException => None

  }

  }

  }

  val url = "http://baddotrobot.com" match {

  case UrlExtractor(protocol, host) => println(protocol + " " + host)

  }

  ```


  这种模式与其所操作的数据类型之间的解耦被称为表示独立性（参见《Scala 编程》第 24.6 节）。³


  ## 守卫条件


  你可以用 `if` 条件来补充我们见过的模式。


  ```

  customer.yearsACustomer = 3

  val discount = customer match {

  case YearsACustomer(years) if years >= 5 => Discount(0.50)

  case YearsACustomer(years) if years >= 2 => Discount(0.20)

  case YearsACustomer(years) if years >= 1 => Discount(0.10)

  case _ if blackFriday(today)             => Discount(0.10)

  case _                                   => Discount(0)

  }

  ```


  模式后面的条件称为守卫。你可以根据需要引用变量，因此我们可以说，对于超过五年的客户，享受 50% 的折扣；两年，20%，以此类推。如果不需要变量，那也没问题。例如，我们有一个情况是，如果之前没有适用任何折扣，且今天是黑色星期五，则给予
  10% 的折扣。


  脚注 1


  [`http://www.scala-lang.org/files/archive/spec/2.12/08-pattern-matching.html`](http://www.scala-lang.org/files/archive/spec/2.12/08-pattern-matching.html)


    2


  [`http://www.scala-lang.org/files/archive/spec/2.12/08-pattern-matching.html`](http://www.scala-lang.org/files/archive/spec/2.12/08-pattern-matching.html)


    3


  [`http://www.artima.com/pins1ed/extractors.html`](http://www.artima.com/pins1ed/extractors.html)


