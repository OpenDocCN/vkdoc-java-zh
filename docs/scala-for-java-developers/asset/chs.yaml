  class Mappable  A  {\ndef map B  : List [ B ] = {\nval result = collection.mutable.\
  \ MutableList [ B ]()\nelements.foreach {\nresult += f( _ )\n}\nresult.toList\n\
  }\n// 递归版本（使用嵌套 def）\ndef recur_map B  : List [ B ] = {\ndef recur(head : A , tail\
  \ : List [ A ]) : List [ B ] = {\ntail match {\ncase Nil => List (f(head))\ncase\
  \ _ => f(head) +: recur(tail.head, tail.tail)\n}\n}\nrecur(elements.head, elements.tail)\n\
  }\n// 尾递归版本\ndef tail_recur_map B  : List [ B ] = {\ndef recur(accumulator : List\
  \ [ B ], elements : List [ A ]) : List [ B ] = {\nelements match {\ncase Nil =>\
  \ accumulator\ncase head :: tail => recur(accumulator :+ f(head), tail)\n}\n}\n\
  recur( List [ B ](), elements)\n}\n}\npackage map {\nobject Example extends App\
  \ {\nval numbers = List (1, 2, 54, 4, 12, 43, 54, 23, 34)\nval mappable = new Mappable\
  \ (numbers)\nprintln(mappable.map( _ * 2))\nprintln(mappable.recur_map( _ * 2))\n\
  println(mappable.tail_recur_map( _ * 2))\n}\n}\n```\n\n#### FlatMap\n\n```\npackage\
  \ s4j.scala.chapter19\nclass FlatMappable  A  {\ndef flatMap B  : List [ B ] = {\n\
  val result = collection.mutable. MutableList [ B ]()\nelements.foreach(element =>\
  \ {\nf(element).foreach(subElement => {\nresult += subElement\n})\n})\nresult.toList\n\
  }\n// 缩写/替代语法（如书中所示）\ndef flatMapAbbr B  : List [ B ] = {\nval result = collection.mutable.\
  \ MutableList [ B ]()\nelements.foreach {\nf( _ ).foreach {\nresult += _\n}\n}\n\
  result.toList\n}\n}\npackage flatmap {\nobject Example extends App {\ndef oddNumbersTo(end\
  \ : Int ) : List [ Int ] = {\nval odds = collection.mutable. MutableList [ Int ]()\n\
  for (i <- 0 to end) {\nif (i % 2 != 0) odds += i\n}\nodds.toList\n}\nval mappable\
  \ = new FlatMappable (1, 2, 10)\nprintln(mappable.flatMap(oddNumbersTo))\nprintln(mappable.flatMapAbbr(oddNumbersTo))\n\
  }\n}\n```\n\n## 附录 B：语法速查表\n\n### 值\n\n```\nval x : Int = 42\nvar y : String = \"\
