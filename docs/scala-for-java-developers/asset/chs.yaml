  \ )            // 这里的 val 是多余的\n// 使用样例类时无需使用 \"new\" 来创建新实例\nCustomer (\"Bob\"\
  )\n// 样例类自动提供相等性和哈希码：\nnew Customer (\"Bob\") == new Customer (\"Bob\")       //\
  \ 返回 true\n```\n\n### 单例对象\n\n```\n// 一个单例实例\n// 当与类配对时，该对象成为\"伴生\"对象\nobject Customer\n\
  ```\n\n### 继承\n\n```\nclass B extends A                       // 子类型继承\nclass C\
  \ (x : Int )\nclass D (value : Int ) extends A(value)    // 调用父类构造函数\n// 重写方法（重写非抽象方法需要\
  \ \"override\"）\nclass E {\ndef position : Int = 5\n}\nclass F extends E {\noverride\
  \ position : Int = super .position + 1\n}\n// 你可以混入多个特质，但只能混入一个类（A）\ntrait SelfDescribing\n\
