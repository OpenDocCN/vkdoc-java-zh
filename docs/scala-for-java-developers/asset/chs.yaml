- '# 6. 语言特性


  在我们的探索之旅中，我们已经看到了一些示例语法，了解了类层次结构，并简要了解了 ScalaDoc，但 Scala 还提供了大量其他有趣的语言特性。


  在本章中，我们不会真正讨论语法，而是会探讨一些使 Scala 在处理源代码、使用方法以及利用其函数式编程特性时，成为一门有趣且强大语言的因素。


  ## 处理源代码


  源文件。在 Scala 中，源文件的内容比 Java 灵活得多。在 Java 中，文件名必须与其包含的公共类名称相同，但对于 `.scala` 文件则没有这样的限制。一个名为
  `Customer.scala` 的文件可能包含一个名为 `Customer` 的类，但并非必须如此。同样，它可能包含四个类，但没有一个叫 `Customer`。


  包。虽然本质上与 Java 中的包相同，但 Scala 中包内的类不必像 Java 那样存放在同名的文件夹中。在作用域方面存在一些差异——例如，Scala 中没有
  `protected` 关键字，但你可以使用特殊语法（`variable[package]`）来实现相同的效果。


  包对象。Scala 还有包对象的概念。这些对象可以放置有用的代码块，以便在包作用域内重用。它们对包中的其他类可用，如果有人导入了该包，那么包对象中的所有内容对他们也是可用的。库经常使用这些对象，以便你可以一次性导入它们的所有类。


  导入别名。导入与 Java 大致相同，但一旦你在 Scala 中导入了一个类，你就可以在你的类中重命名它。换句话说，你可以为你的类中的某个类创建别名。这在遇到名称冲突时非常有用——例如，在库之间。


  类型别名。Scala 也支持类型别名。你可以为复杂的类型定义指定别名，以帮助阐明意图。这类似于 C 语言中无结构的 `typedef` 或 `#define`
  宏，或者 Haskell 中所谓的类型同义词。


  特质。虽然 Scala 有类和对象，但没有“接口”关键字。相反，它有 `trait`（特质）的概念，它类似于接口，但可以包含方法。它介于 Java 8 的默认方法和
  Ruby 的混入（mixin）之间。




  ## 使用方法


  泛型。Scala 对泛型类型的协变和逆变提供了比 Java 更好的支持。这意味着当泛型类型作为参数使用时，你可以在方法签名中拥有更高的通用性和灵活性。暂时不必担心具体细节，后面会有专门一节来讲解变型。


  变型简述


  泛型类型的协变意味着，如果某个类型的泛型参数（尖括号中的部分，如 `<T>`）是某个类型的子类型，那么当该类型的参数是超类型时，该泛型类型本身也是另一个泛型类型的子类型。例如，假设
  `Cat extends Animal`，那么 `List<Cat>` 也是 `List<Animal>` 的（子类型）。逆变也保持了这种关系，但方向相反。Java
  不支持这种类型变型，但支持协变返回类型。在 Scala 和 Java 中，方法参数和变量也可以是协变或逆变的。


  可变参数。在处理方法时，Scala 和 Java 一样支持可变参数或 `varargs`。


  ```

  public void add(String... names)   // java

  def add(names: String*)            // scala

  ```


  命名方法参数。Java 不提供命名方法参数。在 Scala 中，只要你为参数命名，就可以不按顺序调用方法。因此，对于函数 `def swap(first: Int,
  second: Int)`，你可以显式地调用它，并为其参数命名。由于参数已命名，编译器可以区分它们，无论其位置如何。所以，以下写法都是正确的：


  ```

  swap(first = 3, second = 1)

  swap(second = 1, first = 3)

  ```


  默认值。你可以在参数声明后使用 `=` 添加默认值。例如，`def swap(first: Int, second: Int = 1)`。如果在调用函数时省略第二个值，它将默认为
  `1`。你仍然可以提供值来覆盖默认值，并且仍然可以使用命名参数。


  ```

  swap(3)

  swap(3, 2)

  swap(first = 3)

  swap(first = 3, second = 1)

  ```


  函数字面量。函数字面量只是一个创建匿名函数的表达式。你可以将它们存储为变量、传递它们，或将它们传入方法。即时创建它们意味着你可以创建简洁的功能片段，而无需样板代码。函数字面量是引用
  lambda 的一种方式。


  Lambda 表达式。Scala 支持 lambda 表达式或匿名函数。你可以将函数字面量作为参数传递给方法，并在方法签名中使用函数签名作为参数。因此，下面的
  `test` 方法接受一个无参数、返回 `Boolean` 的函数。


  ```

  def test(f: () => Boolean) = ...

  ```


  当你调用它时，可以传入一个函数字面量作为参数。


  ```

  test(() => if (!tuesday) true else false)

  ```


  再举一个例子，你可以创建一个函数签名来表示一个从 `String` 值到 `Boolean` 的函数，如下所示：


  ```

  def test(f: String => Boolean): Boolean = ...

  ```


  ……然后像这样用一个函数字面量调用它：


  ```

  test(value => if (value == "tuesday") true else false)

  ```


  ## 函数式编程


  还有一些 Scala 特性更侧重于函数式编程。


  模式匹配。这是一个非常强大的特性，乍一看类似于 switch 语句，但用途远不止于此。


  for 推导式。这与常规的 for 循环有细微差别，并且在处理函数式结构时非常有用。当你第一次遇到它们时，它们看起来像是 Java 的 `for` 循环的另一种语法。


  柯里化。虽然你可以在任何语言中编写自己的柯里化函数，但 Scala 将柯里化作为语言特性来支持。如果你不确定什么是柯里化，现在不必担心。更多细节请参见柯里化部分。


  函数字面量。该语言支持字面量来表示一些有用的类型，例如元组。流行的 Java 函数式库，如 totally-lazy¹ 或 functional-java²，都有这类东西；而
  Scala 只是让它们更容易使用。


  递归。大多数语言都支持递归，但 Scala 的编译器支持尾调用优化，这意味着它可以支持在 Java 等语言中会导致栈溢出的递归调用。如果你使用 `@tailrec`
  注解，编译器甚至可以为你执行一些检查。


  脚注 1


  [`http://totallylazy.com/`](http://totallylazy.com/)


    2


  [`http://www.functionaljava.org/`](http://www.functionaljava.org/)


  '
- '# 7. 总结


  在这次高层概览中，我们讨论了 Scala 如何既是一门面向对象语言，又是一门函数式语言。我提到 Scala 实际上只有对象；没有基本类型，一切都是对象。


  我们讨论了 Scala 的背景，它如何从一门学术语言发展成为一门有商业支持的主流语言，以及它如何在 JVM 上运行。从理论上讲，这通过使其易于部署到现有服务器上，降低了采用的门槛。


  在 JVM 上运行也意味着 Scala 有大量的库可用，因为 Java 互操作性是内建的。尽管一些工具相对落后，编译时间仍然较慢，但 Scala 已被广泛采用，我们看到许多大公司今天都在使用它。


  我们了解了如何安装和运行 Scala。你看到了 Scala 程序通常运行的三种方式，并在此过程中介绍了 Scala REPL。


  然后我们转向了语法概览，并查看了一些有趣的语言特性。


  在语法概览中，我们看到了如何定义变量和值、函数和方法，并看到了 Scala 如何通过类型推断和自动识别终止条件（如 `return` 和分号）来减少样板代码的噪音。


  我们看到了中缀表示法如何让你避免使用经典的点表示法，并且重要的是，我们看到了方法名可以包含符号。这就是我们能够在代码中自然地使用数学符号的原因；它们实际上是方法，所以我们可以重写它们，并使用中缀表示法，而无需使用嘈杂的点和括号。


  我们还使用了一些集合类型，并看到了枚举它们的两种基本方式：`foreach` 和 `for` 循环语法。我们看到了处理 Java 对象是多么容易；像 `Int`
  和 `Boolean` 这样的值类型在 Scala 和 Java 中基本相同。我们深入了解了 Scala 如何在其类层次结构中表示类型，并学习了如何在 ScalaDoc
  中查找信息。


  在语言特性方面，我们研究了在处理源文件和包、方法及方法参数时语言的一些有趣方面，以及一些面向函数式编程的特性。


  '
- '# 第二部分

  关键语法差异


  关键语法差异


  本书的这一部分是关于 Java 和 Scala 语言语法之间的关键差异。给定一些典型的 Java 代码，我们将查看等效的 Scala 语法。在第三部分中，我们将更多地研究
  Scala 中 Java 没有直接对应项的特性。


  我们将研究以下内容：


  *   许多与类和对象、创建类、字段和方法相关的内容。我们将进行从 Scala 生成的字节码回到 Java 的往返转换，以便让你了解 Scala 与 Java
  的关系。

  *   继承、接口、抽象类和混入。

  *   常见的控制结构，如 `for` 循环。

  *   泛型。




  ## 灵活性


  Scala 非常灵活。通常有多种方式可以实现同一目标。我指的不是使用 `while` 循环或 `for` 循环的区别；而是指该语言提供了不同的语法选项来表达相同的事物。这种灵活性带来了极大的自由度，但在阅读不同作者的代码时可能会令人困惑。


  一个例子是我们之前看到的中缀表示法。调用方法时，你通常可以省略点和括号。Scala 没有强制规定；是否使用点号完全取决于你。


  相比之下，Java 则非常严格；通常只有很少的方式来表达相同的事物。一眼识别出代码含义往往更容易。而在 Scala 中，你可能需要多花些功夫才能识别出某些更特殊的语法选项。


  这一点同样适用于代码结构：你可以在函数内部创建函数，在类中间插入 import 语句，或者让一个类存在于一个名称不相关的文件中。当你习惯了 Java 的严谨性后，这一切可能会让你感到有些迷失方向。


  ## 不可变性与声明式编程


  由于 Scala 推崇不可变性，你可能会注意到解决问题的方式有所不同。例如，你可能会发现很少使用循环来操作可变变量。Scala 程序通常更倾向于使用函数式编程风格来实现相同目标。


  这种更具声明性的做事方式说的是“告诉我做什么，而不是怎么做”。你可能更习惯于 Java/命令式的做事方式，它说的是“准确地告诉我怎么做”。最终，当你放弃命令式编程那种微观管理风格时，你就赋予了语言在处理事务时更多的自由。


  例如，Java 中一个传统的命令式 for 循环如下所示：


  ```

  // java

  for (int count = 0; count < 100; count++) {

  System.out.println(count);

  }

  ```


  这是一个典型的命令式循环。我们明确地告诉它要从零到一百按顺序枚举。相反，如果我们使用更具声明性的机制，如下所示：


  ```

  // scala

  (0 to 100).foreach(println(_))

  ```


  ……枚举是在 `foreach` 方法内部完成的，而不是通过语言结构。我们说的是，“对于一个数字范围，对每个数字执行某个函数。”虽然只有细微差别，但我们并没有说明如何枚举这个序列。这意味着
  Scala 可以自由地以它喜欢的任何方式实现枚举。例如，它可以选择并行执行。


  有趣的是，Oracle 已经采纳了这些想法，自 Java 8 起提供了类似的 for 循环枚举。上述代码在 Java 中可以这样写：


  ```

  // java

  IntStream.range(0, 100).forEach(System.out::println)

  ```


  '
- '# 8. 类与字段


  在本章中，我们将了解以下内容：


  1.  创建类。

  2.  Scala 如何简化定义字段的过程。

  3.  当 Scala 为你自动生成方法时，幕后发生了什么。


  ## 创建类


  在 Java 中创建一个类意味着编写如下代码：


  ```

  // java

  public class Customer {

  }

  ```


  为客户添加姓名和地址是合理的。因此，将它们添加为字段并通过构造函数进行初始化，会得到如下代码：


  ```

  // java

  public class Customer {

  private final String name;

  private final String address;

  public Customer(String name, String address) {

  this.name = name;

  this.address = address;

  }

  }

  ```


  我们可以使用 `new` 关键字实例化一个对象，并创建一个名为 Eric 的新客户，如下所示：


  ```

  Customer eric = new Customer("Eric", "29 Acacia Road"); // java

  ```


  在 Scala 中，语法要简洁得多；我们可以将类和构造函数合并到一行中。


  ```

  class Customer(val name: String, val address: String)   // scala

  ```


  我们以相同的方式使用 new 创建实例，如下所示：


  ```

  val eric = new Customer("Eric", "29 Acacia Road")       // scala

  ```


  Scala 版本没有将字段定义为类内部的成员，而是将变量声明为类定义的一部分，这被称为主构造函数。在一行代码中，我们声明了 `Customer` 类，并且实际上声明了一个带有两个参数的构造函数。




  ## 派生 Setter 和 Getter


  类定义中的 `val` 关键字会告知编译器将参数视为字段，并为其创建字段和访问器方法。


  我们可以通过获取生成的类文件并将其反编译为 Java 来证明这一点。这种往返转换是探索 Scala 在幕后实际生成内容的好方法。这里我使用了 Lee Benfield
  编写的优秀 CFR 反编译器¹，但你也可以使用 Java 自带的 `javap` 程序来获取基本信息。


  要对 Scala 为 `Customer` 生成的类文件运行反编译器，可以执行类似以下的操作：


  ```

  java -jar cfr_0_122.jar target/scala-2.12/classes/s4j/scala/chapter09/

  Customer.class

  ```


  它会生成以下内容：


  ```

  1   // 从 Scala 反编译为 Java

  2   public class Customer {

  3       private final String name;

  4       private final String address;


  6       public String name() {

  7           return this.name;

  8       }


  10       public String address() {

  11           return this.address;

  12       }


  14       public Customer(String name, String address) {

  15           this.name = name;

  16           this.address = address;

  17       }

  18   }

  ```


  需要注意的重要一点是，Scala 在第 6 行和第 10 行生成了访问器方法，并在第 14 行生成了一个构造函数。这些访问器没有使用 Java 的 getter
  约定，但我们得到了与 `getName` 和 `getAddress` 等效的方法。


  你可能还想定义字段，但不通过构造函数来设置它们。例如，在 Java 中，我们可能想为客户添加一个 `id`，稍后通过 setter 方法进行设置。这是像 Hibernate
  这类工具在从数据库填充对象时常用的模式。


  ```

  // java

  public class Customer {

  private final String name;

  private final String address;

  private String id;

  public Customer(String name, String address) {

  this.name = name;

  this.address = address;

  }

  public void setId(String id) {

  this.id = id;

  }

  }

  ```


  在 Scala 中，你几乎可以做同样的事情。


  ```

  // scala

  class Customer(val name: String, val address: String) {

  var id = ""

  }

  ```


  你定义一个字段（这里是一个 `var`），Scala 就会神奇地为你创建一个 setter 方法。它创建的 setter 方法名为 `id_=`，而不是通常的
  `setId`。如果我们通过反编译器进行往返转换，会看到以下内容：


  ```

  1   // 从 Scala 反编译为 Java

  2   public class Customer {

  3       private final String name;

  4       private final String address;

  5       private String id;


  7       public String name() {

  8           return this.name;

  9       }

  10       public String address() {

  11           return this.address;

  12       }

  13       public String id() {                      // 注意它是 public 的

  14           return this.id;

  15       }

  16       public void id_$eq(String x$1) {          // 注意它是 public 的

  17           this.id = x$1;

  18       }

  19       public Customer(String name, String address) {

  20           this.name = name;

  21           this.address = address;

  22           this.id = null;

  23       }

  24   }

  ```


  注意，它在第 16 行创建了一个名为 `id_$eq` 的方法，而不是 `id_=`；这是因为等号符号在 JVM 的方法名中是不允许的，所以 Scala 对其进行了转义，并在需要时进行转换。你可以像这样直接调用
  setter 方法：


  ```

  new Customer("Bob", "10 Downing Street").id_=("000001")

  ```


  不过，Scala 提供了一种简写方式；你可以直接使用常规赋值，Scala 会在底层调用自动生成的 `id_$eq` setter 方法：


  ```

  new Customer("Bob", "10 Downing Street").id = "000001"

  ```


  如果字段前没有访问修饰符，则该字段变为 public。因此，除了能够调用自动生成的 setter 之外，客户端也可以直接操作该字段，这可能会破坏封装性。我们希望能够将字段设为
  private，并只允许在 `Customer` 类内部进行更新。


  为此，只需在字段前使用 `private` 关键字即可。


  ```

  class Customer(val name: String, val address: String) {

  private var id = ""

  }

  ```


  反编译器显示，setter 和 getter 方法现在都是 private 的。


  ```

  1   // 从 Scala 反编译为 Java

  2   public class Customer {

  3       private final String name;

  4       private final String address;

  5       private String id;


  7       public String name() {

  8           return this.name;

  9       }


  11       public String address() {

  12           return this.address;

  13       }


  15       private String id() {                 // 现在是 private 的

  16           return this.id;

  17       }


  19       private void id_$eq(String x$1) {     // 现在是 private 的

  20           this.id = x$1;

  21       }


  23       public Customer(String name, String address) {

  24           this.name = name;

  25           this.address = address;

  26           this.id = "";

  27       }

  28   }

  ```




  ## 重定义 Setter 与 Getter


  使用 setter 设置值的优势在于，我们可以通过该方法来维护不变式或执行特殊处理。在 Java 中，这很直接：你直接创建 setter 方法即可。但对于 Scala
  来说则更为繁琐，因为编译器会生成这些方法，而你不得不重定义它们。


  例如，一旦 `id` 被设置后，我们可能希望阻止它被更新。在 Java 中，我们可以这样做：


  ```

  // java

  public void setId(String id) {

  if (id.isEmpty())

  this.id = id;

  }

  ```


  而 Scala 会自动创建 setter 方法，那么我们该如何重定义它呢？如果我们尝试直接在 Scala 代码中替换 setter，就会遇到如下编译器错误：


  ```

  // scala 无法编译

  class Customer(val name: String, val address: String) {

  private var id = ""

  def id_=(value: String) {

  if (id.isEmpty)

  this.id = value

  }

  }

  ```


  Scala 无法识别要替换该方法，因此它会创建第二个同名方法，编译器在发现重复时就会报错。


  ```

  对重载定义存在歧义引用，

  类 Customer 中的方法 id_= 类型为 (value: String)Unit

  与类 Customer 中的方法 id_= 类型为 (x$1: String)Unit

  参数类型 (String) 匹配

  this.id = value

  方法 id_= 被定义了两次

  冲突符号均源自文件 ''Customer.scala''

  def id_=(value: String) {

  ^      ^

  ```


  要重定义该方法，我们必须绕些弯路。首先，我们必须重命名字段（例如改为 `_id`），并将其设为私有，从而使 getter 和 setter 变为私有。然后，我们创建一个名为
  `id` 的新 getter 方法和一个名为 `id_=` 的新 setter 方法，它们都是公有的，用于访问已重命名的私有字段。


  ```

  class Customer(val name: String, val address: String) {

  private var _id: String = ""

  def id = _id

  def id_=(value: String) {

  if (_id.isEmpty)

  _id = value

  }

  }

  ```


  我们通过 `private` 修饰符隐藏了真正的字段 `_id`，并暴露了一个名为 `id_=` 的方法来充当 setter。由于不再存在名为 `id` 的字段，Scala
  就不会尝试生成重复的方法，代码也就能编译通过了。


  ```

  // REPL 会话

  scala> val bob = new Customer("Bob", "32 Bread Street")

  bob: Customer = Customer@e955027

  scala> bob.id = "001"

  bob.id: String = 001

  scala> println(bob.id)


  scala> bob.id = "002"

  bob.id: String = 001

  scala> println(bob.id)


  ```


  查看反编译后的版本，你可以看到如何重定义该方法。我们隐藏了真正的字段，并暴露了公有方法，以字段名的形式来合成对其的访问。


  ```

  1   // 从 scala 反编译为 java

  2   public class Customer {

  3       private final String name;

  4       private final String address;

  5       private String _id;


  7       public String name() {

  8           return this.name;

  9       }


  11       public String address() {

  12           return this.address;

  13       }


  15       private String _id() {                     // 私有

  16           return this._id;

  17       }


  19       private void _id_$eq(String x$1) {         // 私有

  20           this._id = x$1;

  21       }


  23       public String id() {                       // 公有

  24           return this._id();

  25       }


  27       public void id_$eq(String value) {         // 公有

  28           if (!this._id().isEmpty()) return;

  29           this._id_$eq(value);

  30       }


  32       public Customer(String name, String address) {

  33           this.name = name;

  34           this.address = address;

  35           this._id = "";

  36       }

  37   }

