  WebSocket 客户端输出


  #### 单元测试 WebSocketHandler


  你需要编写一个单元测试来确保 `EchoHandler` 确实按预期工作。要对 `EchoHandler` 进行单元测试，编写一个测试并使用 Mockito（或其他模拟框架）来模拟
  WebSocket 部分。


  ```

  package com.apress.springbootrecipes.echo;

  import org.junit.Test;

  import org.springframework.web.socket.TextMessage;

  import org.springframework.web.socket.WebSocketSession;

  import static org.mockito.ArgumentMatchers.eq;

  import static org.mockito.Mockito.*;

  public class EchoHandlerTest {

  private final EchoHandler handler = new EchoHandler();

  @Test

  public void shouldEchoMessage() throws Exception {

  var mockSession = mock(WebSocketSession.class);

  var msg = new TextMessage("Hello World!");

  handler.handleTextMessage(mockSession, msg);

  verify(mockSession, times(1))

  .sendMessage(eq(new TextMessage("RECEIVED: Hello World!")));

  }

  }

  ```


  该测试构造了一个 `EchoHandler` 实例。在测试方法中，`WebSocketSession` 被模拟。`TextMessage` 可以直接构造。使用模拟的
  `WebSocketSession` 和 `TextMessage`，我们调用 `handleTextMessage`。为了验证它是否按预期工作，我们在模拟的
  `WebSocketSession` 上验证其行为。




  #### 集成测试纯 WebSocket


  编写集成测试稍微复杂一些。需要建立与服务器的 WebSocket 连接，并手动发送消息并检查响应。但在此之前，需要先启动服务器。


  要启动服务器，请使用 `@RunWith(SpringRunner.class)` 和 `@SpringBootTest` `(webEnvironment =
  SpringBootTest.WebEnvironment.RANDOM_PORT)` 注解一个类。我们实际上希望启动应用程序，而不是默认的 `WebEnvironment.MOCK`。在
  `int` 字段上使用 `@LocalServerPort` 注解来获取实际的端口值。该值用于构造要连接的 `URI`。


  ```

  @RunWith(SpringRunner.class)

  @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

  public class EchoHandlerIntegrationTest {

  @LocalServerPort

  private int port;

  }

  ```


  使用默认的 Java WebSocket API 测试 WebSocket 相当容易。为了进行测试，你可以编写一个基本的 WebSocket 客户端，用于记录接收到的消息和会话。使用
  `@ClientEndpoint` 注解一个类，并使用 `@OnOpen`、`@OnClose` 和 `@OnMessage` 注解该类中的方法。这些被注解的方法将分别在连接打开、关闭和接收到消息时接收回调。接下来有两个辅助方法：`sendTextAndWait`
  和 `closeAndWait`。`sendTextAndWait` 将使用 `Session` 发送消息并等待响应。`closeAndWait` 将 `close`
  会话并等待确认。最后，还有一些 getter 方法用于获取状态并在测试方法中进行验证。


  将 `SimpleTestClientEndpoint` 作为静态内嵌类添加到 `EchoHandlerIntegrationTest` 中。


  ```

  @ClientEndpoint

  public static class SimpleTestClientEndpoint {

  private List received = new ArrayList();

  private Session session;

  private CloseReason closeReason;

  private boolean closed = false;

  @OnOpen

  public void onOpen(Session session) {

  this.session = session;

  }

  @OnClose

  public void onClose(Session session, CloseReason reason) {

  this.closeReason = reason;

  this.closed = true;

  }

  @OnMessage

  public void onMessage(String message) {

  this.received.add(message);

  }

  public void sendTextAndWait(String text, long timeout)

  throws IOException, InterruptedException {

  var current = received.size();

  session.getBasicRemote().sendText(text);

  wait(() -> received.size() == current, timeout);

  }

  public void closeAndWait(long timeout)

  throws IOException, InterruptedException {

  if (session != null && !closed) {

  session.close();

  }

  wait(() -> closeReason == null, timeout);

  }

  private void wait(Supplier condition, long timeout)

  throws InterruptedException {

  var waited = 0;

  while (condition.get() && waited  getReceived() {

  return this.received;

  }

  public boolean isClosed() {

  return closed;

  }

  }

  ```


  现在辅助类已就绪，可以编写测试了。使用 WebSocket `ContainerProvider` 获取容器。在进行实际连接之前，必须使用 `port` 字段构造
  URI。接下来，使用 `connectToServer` 方法，通过 `SimpleTestClientEndpoint` 的实例连接到服务器。连接后，向服务器发送一条文本消息，等待一段时间，然后关闭连接（仅用于清理资源）。最后一步是对接收到的消息进行一些断言。这里我们期望恰好收到两条消息。


  ```

  @Test

  public void sendAndReceiveMessage() throws Exception {

  var container = ContainerProvider.getWebSocketContainer();

  var uri = URI.create("ws://localhost:" + port + "/echo");

  var testClient = new SimpleTestClientEndpoint();

  container.connectToServer(testClient, uri);

  testClient.sendTextAndWait("Hello World!", 200);

  testClient.closeAndWait(2);

  assertThat(testClient.getReceived())

  .containsExactly("CONNECTION ESTABLISHED", "RECEIVED: Hello World!");

  }

  ```


  ## 4.4 使用 STOMP 的 WebSocket


  ### 问题


  你想通过 WebSocket 使用 STOMP（**简单/流式文本定向消息协议**）与服务器通信。


  ### 解决方案


  配置消息代理，并在 `@Controller` 注解的类中使用 `@MessageMapping` 注解的方法来处理消息。


  ### 工作原理


  我们来谈谈如何使用 WebSocket 创建一个或多或少涉及消息传递的应用程序。虽然你可以直接使用 WebSocket 协议，但该协议允许你使用子协议。Spring
  WebSocket 支持的协议之一就是 STOMP。


  STOMP 是一种非常简单的面向文本的协议。它是为 Ruby 和 Python 等脚本语言连接消息代理而创建的。STOMP 可以用于任何可靠的、双向的网络协议，如
  TCP 以及 WebSocket。该协议本身是面向文本的，但消息的有效负载并不严格受此限制；它也可以包含二进制数据。


  在使用 Spring WebSocket 支持配置和使用 STOMP 时，WebSocket 应用程序充当所有已连接客户端的代理。该代理可以是内存代理，也可以是支持
  STOMP 协议的实际成熟的企业级解决方案（如 RabbitMQ 或 ActiveMQ）。在后一种情况下，Spring WebSocket 应用程序充当实际代理的中继。为了添加基于
  WebSocket 的消息传递，Spring 使用了 Spring Messaging 抽象。




  #### 使用 STOMP 与 @MessageMapping


  为了能够接收消息，你需要在 `@Controller` 中使用 `@MessageMapping` 注解标记一个方法，并告知它从哪个目标地址接收消息。让我们修改
  `EchoHandler`（来自之前的配方），使其支持注解方式。


  ```

  package com.apress.springbootrecipes.echo;

  import org.springframework.messaging.handler.annotation.MessageMapping;

  import org.springframework.messaging.handler.annotation.SendTo;

  import org.springframework.stereotype.Controller;

  @Controller

  public class EchoHandler {

  @MessageMapping("/echo")

  @SendTo("/topic/echo")

  public String echo(String msg) {

  return "RECEIVED: " + msg;

  }

  }

  ```


  当消息到达 `/app/echo` 目标地址时，它会被传递给带有 `@MessageMapping` 注解的方法。注意该方法上还有 `@SendTo("/topic/echo")`
  注解，这指示 Spring 将结果（一个 `String`）发送到该主题。


  配置消息代理并添加一个用于接收消息的端点。为此，在 `EchoApplication` 上添加 `@EnableWebSocketMessageBroker`
  注解，并让它实现 `WebSocketMessageBrokerConfigurer` 接口。


  ```

  package com.apress.springbootrecipes.echo;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.messaging.simp.config.MessageBrokerRegistry;

  import org.springframework.web.socket.config.annotation.EnableWebSocketMessageBroker;

  import org.springframework.web.socket.config.annotation.StompEndpointRegistry;

  import org.springframework.web.socket.config.annotation.WebSocketMessageBrokerConfigurer;

  @SpringBootApplication

  @EnableWebSocketMessageBroker

  public class EchoApplication implements WebSocketMessageBrokerConfigurer {

  @Override

  public void configureMessageBroker(MessageBrokerRegistry registry) {

  registry.enableSimpleBroker("/topic");

  registry.setApplicationDestinationPrefixes("/app");

  }

  @Override

  public void registerStompEndpoints(StompEndpointRegistry registry) {

  registry.addEndpoint("/echo-endpoint");

  }

  public static void main(String[] args) {

  SpringApplication.run(EchoApplication.class, args);

  }

  }

  ```


  `@EnableWebSocketMessageBroker` 注解将启用通过 WebSocket 进行消息传递的功能。消息代理在 `configureMessageBroker`
  方法中进行配置。这里使用的是简单消息代理。若要连接到企业级消息代理，请使用 `registry.enableStompBrokerRelay` 来连接实际的代理。


  为了区分由代理处理的消息和由应用处理的消息，使用了不同的前缀（图 4-6）。任何以 `/topic` 开头的目标地址的消息都将传递给代理；任何以 `/app`
  开头的目标地址的消息都将发送给消息处理器（即带有 `@MessageMapping` 注解的方法）。


  ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig6_HTML.jpg](img/464036_1_En_4_Fig6_HTML.jpg)


  图 4-6


  WebSocket STOMP 通道与路由


  最后一部分是注册一个 WebSocket 端点，用于监听传入的 STOMP 消息，在本例中它映射到 `/echo-endpoint`。


  修改客户端以使用 STOMP 而非纯 WebSocket。HTML 文件可以基本保持不变。你需要一个额外的库才能在浏览器中使用 STOMP；本配方使用了 **webstomp-client**
  ^(²³)，但你可以使用其他不同的库。


  最大的变化在 `app.js` 文件中。


  ```

  var ws = null;

  var url = "ws://localhost:8080/echo";

  function setConnected(connected) {

  document.getElementById(''connect'').disabled = connected;

  document.getElementById(''disconnect'').disabled = !connected;

  document.getElementById(''echo'').disabled = !connected;

  }

  function connect() {

  ws = webstomp.client(url, {protocols: [''v11.stomp'', ''v12.stomp'']});

  ws.connect({}, function(frame) {

  setConnected(true);

  log(frame);

  ws.subscribe(''/topic/echo'', function(message){

  log(message.body);

  })

  });

  }

  function disconnect() {

  if (ws != null) {

  ws.disconnect();

  ws = null;

  }

  setConnected(false);

  }

  function echo() {

  if (ws != null) {

  var message = document.getElementById(''message'').value;

  log(''Sent: '' + message);

  ws.send("/app/echo", message);

  } else {

  alert(''connection not established, please connect.'');

  }

  }

  function log(message) {

  var console = document.getElementById(''logging'');

  var p = document.createElement(''p'');

  p.appendChild(document.createTextNode(message));

  console.appendChild(p);

  while (console.childNodes.length > 12) {

  console.removeChild(console.firstChild);

  }

  console.scrollTop = console.scrollHeight;

  }

  ```


  `connect` 函数现在使用 `webstomp.client` 来创建一个连接到我们代理的 STOMP 客户端。连接成功后，客户端会订阅 `/topic/echo`
  并接收发布到该主题的消息。`echo` 函数已被修改，使用客户端的 `send` 方法将消息发送到 `/app/echo` 目标地址。


  启动应用并打开客户端后，你仍然可以发送和接收消息，但现在使用的是 STOMP 子协议。你甚至可以连接多个浏览器，每个浏览器都会看到 `/topic/echo`
  目标地址上的消息，因为它充当了一个主题。


  在编写带有 `@MessageMapping` 注解的方法时，你可以使用多种方法参数和注解（表 4-4）来获取消息的更多或更少信息。默认情况下，单个参数会被映射到消息的有效负载；`MessageConverter`
  会将消息有效负载转换为所需的类型。


  表 4-4


  支持的方法参数与注解


  | **类型** | **描述** |

  | --- | --- |

  | `Message` | 实际的底层消息，包括头部和正文 |

  | `@Payload` | 消息的有效负载（默认）；参数也可以使用 `@Validated` 注解进行验证。 |

  | `@Header` | 从 `Message` 中获取指定的头部信息 |

  | `@Headers` | 可以放在 `Map` 参数上，以获取所有 `Message` 头部信息 |

  | `MessageHeaders` | 所有 `Message` 头部信息 |

  | `Principal` | 当前用户（如果已设置） |


  #### 对处理器进行单元测试


  为处理器编写单元测试相对简单。该方法接受一个 `String` 并返回一个 `String`。测试时，只需调用该方法并断言返回值即可。


  ```

  package com.apress.springbootrecipes.echo;

  import org.junit.Test;

  import static org.assertj.core.api.Assertions.assertThat;

  public class EchoHandlerTest {

  private final EchoHandler handler = new EchoHandler();

  @Test

  public void shouldEchoMessage() throws Exception {

  var msg = "Hello World!";

  assertThat(handler.echo(msg)).isEqualTo("RECEIVED: " + msg);

  }

  }

  ```




  #### 使用 STOMP 进行集成测试


  要进行集成测试，你需要启动应用程序（可能使用随机端口），构建一个 STOMP 客户端，然后发送一条消息。测试的最后部分（发送和接收）是异步的，因此这会使测试变得稍微困难一些。首先，在随机端口上启动应用程序，并在测试类中获取该随机端口。


  ```

  @RunWith(SpringRunner.class)

  @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

  public class EchoHandlerIntegrationTest {

  @LocalServerPort

  private int port;

  }

  ```


  `@RunWith` 指示 JUnit 使用 `SpringRunner` 来执行测试。`@SpringBootTest` 将启动应用程序，并且由于 `WebEnvironment.RANDOM_PORT`
  的设置，它会在一个随机端口上启动。通过在 `int` 字段上添加 `@LocalServerPort` 注解，我们可以获取实际的端口。


  接下来，为了进行测试，你可以使用 Spring 客户端库中的 `WebSocketStompClient` 连接到服务器并订阅一个主题。为了接收某个主题上的消息，编写一个继承自
  `StompSessionHandlerAdapter` 的类，并重写 `getPayloadType` 和 `handleFrame` 方法。由于我们不会复用这个类，它可以作为
  `EchoHandlerIntegrationTest` 类内部的一个 `static` 嵌套类。


  ```

  private static class TestStompFrameHandler extends StompSessionHandlerAdapter {

  private final CompletableFuture answer;

  private TestStompFrameHandler(CompletableFuture answer) {

  this.answer = answer;

  }

  @Override

  public Type getPayloadType(StompHeaders headers) {

  return byte[].class;

  }

  @Override

  public void handleFrame(StompHeaders headers, Object payload) {

  answer.complete(new String((byte[]) payload));

  }

  }

  ```


  由于 WebSocket 的异步特性，我们需要一种机制来阻塞，直到收到响应。为了传递结果，我们使用 `CompletableFuture`，在进行断言时，我们可以使用
  `get` 方法来阻塞，直到收到答案（或超时）。


  对于测试用例，我们需要创建一个 STOMP 客户端，并使用它连接到 STOMP 代理，订阅 `/topic/echo` 以接收消息，最后发送一条消息并检查结果。


  ```

  @RunWith(SpringRunner.class)

  @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

  public class EchoHandlerIntegrationTest {

  @LocalServerPort

  private int port;

  private WebSocketStompClient stompClient;

  private List sessions = new ArrayList();

  @Before

  public void setup() {

  var webSocketClient = new StandardWebSocketClient();

  stompClient = new WebSocketStompClient(webSocketClient);

  }

  @After

  public void cleanUp() {

  this.sessions.forEach(StompSession::disconnect);

  this.sessions.clear();

  }

  @Test

  public void shouldSendAndReceiveMessage() throws Exception {

  CompletableFuture answer = new CompletableFuture();

  var stompSession = connectAndSubscribe(answer);

  stompSession.send("/app/echo", "Hello World!".getBytes());

  var result = answer.get(1, TimeUnit.SECONDS);

  assertThat(result).isEqualTo("RECEIVED: Hello World!");

  }

  private StompSession connectAndSubscribe(CompletableFuture answer)

  throws InterruptedException, ExecutionException, TimeoutException {

  var uri = "ws://localhost:" + port + "/echo-endpoint";

  var stompSession =

  stompClient.connect(uri, new StompSessionHandlerAdapter() {})

  .get(1, TimeUnit.SECONDS);

  stompSession.subscribe("/topic/echo",

  new TestStompFrameHandler(answer));

  this.sessions.add(stompSession);

  return stompSession;

  }

  ...

  }

  ```


  在 `@Before` 方法中创建了 `WebSocketStompClient`，它使用 `StandardWebSocketClient` 作为传输层。在
  `@After` 方法中，我们清理所有已连接到代理的会话（确保不留任何痕迹）。`connectAndSubscribe` 方法使用 `WebSocketStompClient`
  连接到代理，并在此处配置为等待 1 秒以完成连接。然后使用 `StompSession` 订阅之前创建的 `TestStompFrameHandler`，并传入
  `CompletableFuture`。当然，你也可以不使用这个辅助方法，但通常你需要更多的集成测试，而通过这种方式你可以创建可复用的代码片段。最后是实际的测试：首先连接并订阅，然后向服务器发送
  `Hello World!`，并期望在 1 秒（或更短）内得到响应。最后将结果与预期结果进行比对。


