- '# 4. Spring MVC - 异步


  当 Servlet API 发布时，大多数实现它的容器都采用每个请求一个线程的模式。这意味着一个线程会被阻塞，直到请求处理完成并将响应发送给客户端。


  在早期，连接到互联网的设备远没有现在这么多。由于设备数量的增加，处理的 HTTP 请求数量也随之增长。由于这种增长，对于许多 Web 应用程序来说，保持线程阻塞的状态已不再可行。


  从 Servlet 3 规范开始，可以异步处理 HTTP 请求。这是通过释放处理 HTTP 请求的线程来实现的。新线程将在后台运行，一旦结果可用，就会将其写入客户端。这一切都可以在符合
  Servlet 3.1 规范的 Servlet 容器中以非阻塞方式完成。所有使用的资源也必须是非阻塞的。


  在过去的几年里，响应式编程也兴起起来。从 Spring 5 开始，可以编写响应式 Web 应用程序。为了实现响应式，Spring 使用 Project Reactor
  作为 Reactive Streams API 的实现。深入探讨响应式编程超出了本书的范围。简而言之，响应式编程是一种进行非阻塞函数式编程的方式。


  在使用 Web 应用程序时，会有一个请求，HTML 在服务器端渲染，然后发送回客户端。在过去的几年里，HTML 的渲染转移到了客户端。通信通过向客户端返回 JSON、XML
  或其他表示形式来完成。


  这仍然是一个请求和响应周期，尽管是通过客户端通过 `XmlHttpRequest` 进行的异步调用来驱动的。客户端和服务器之间还有其他通信方式。可以使用服务器发送事件（Server-Sent-Events）进行单向通信。对于全双工通信，可以使用
  Web Socket。


  在构建常规 Web 应用程序时，添加 `spring-boot-starter-web` 作为依赖项。在构建响应式应用程序时，添加 `spring-boot-starter-webflux`。


  ## 4.1 使用控制器和 TaskExecutor 进行异步请求处理


  ### 问题


  为了减少 Servlet 容器的吞吐量，您希望异步处理请求。



  ### 解决方案


  当请求到达时，它会以同步方式处理，这会阻塞处理 HTTP 请求的线程。响应保持打开状态并可写入。例如，当某个调用需要较长时间才能完成时，与其阻塞线程，不如在后台处理该调用，并在完成后向用户返回一个值。


  ### 工作原理


  Spring MVC 支持方法返回多种类型；表 4-1 中的返回类型会以异步方式处理。


  表 4-1


  异步返回类型


  | 类型 | 描述 |

  | --- | --- |

  | `DeferredResult<V>` | 由另一个线程产生的异步结果 |

  | `ListenableFuture` | 由另一个线程产生的异步结果，是 `DeferredResult` 的等效替代方案 |

  | `CompletionStage` <v>/</v> `CompletableFuture` | 由另一个线程产生的异步结果，是 `DeferredResult`
  的等效替代方案 |

  | `Callable` | 一个异步计算，计算完成后产生结果 |

  | `ResponseBodyEmitter` | 可用于异步地向响应写入多个对象 |

  | `SseEmitter` | 可用于异步地写入服务器推送事件 |

  | `StreamingResponseBody` | 可用于异步地写入 `OutputStream`。 |


  #### 编写异步控制器


  编写一个控制器并让其异步处理请求，只需更改控制器处理方法的返回类型即可（参见表 4-1）。假设对 `HelloWorldController.hello` 的调用需要相当长的时间，但我们不希望因此阻塞服务器。


  #### 使用 Callable


  ```

  package com.apress.springbootrecipes.library;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RestController;

  import java.util.concurrent.Callable;

  import java.util.concurrent.ThreadLocalRandom;

  @RestController

  public class HelloWorldController {

  @GetMapping

  public Callable hello() {

  return () -> {

  Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

  return "Hello World, from Spring Boot 2!";

  };

  }

  }

  ```


  现在，`hello` 方法返回一个 `Callable<String>`，而不是直接返回一个 `String`。在新构建的 `Callable<String>`
  内部，有一个随机等待时间来模拟将消息返回给客户端之前的延迟。


  现在，当进行预订时，您将在日志中看到类似于图 4-1 的内容。


  ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig1_HTML.jpg](img/464036_1_En_4_Fig1_HTML.jpg)


  图 4-1


  日志输出


  您会注意到，请求处理是在某个线程（此处为 `nio-8080-exec-1`）上启动的。另一个线程（此处为 `task-1`）负责处理并返回结果。最后，请求被再次分派到
  `DispatcherServlet`，以便在另一个线程（此处为 `nio-8080-exec-2`）上处理结果。


  #### 使用 CompletableFuture


  将方法的签名更改为返回 `CompletableFuture<String>`，并使用 `TaskExecutor` 来异步执行代码。


  ```

  @RestController

  public class HelloWorldController {

  private final TaskExecutor taskExecutor;

  public HelloWorldController(TaskExecutor taskExecutor) {

  this.taskExecutor = taskExecutor;

  }

  @GetMapping

  public CompletableFuture hello() {

  return CompletableFuture.supplyAsync(() -> {

  randomDelay();

  return "Hello World, from Spring Boot 2!";

  }, taskExecutor);

  }

  private void randomDelay() {

  try {

  Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

  } catch (InterruptedException e) {

  Thread.currentThread().interrupt();

  }

  }

  }

  ```


  调用 `supplyAsync`（或者当使用 `void` 时，使用 `runAsync`）会提交一个任务。它返回一个 `CompletableFuture`。这里我们使用了同时接受
  `Supplier` 和 `Executor` 的 `supplyAsync` 方法。这样，我们就可以重用 `TaskExecutor` 进行异步处理。如果使用只接受
  `Supplier` 的 `supplyAsync` 方法，它将在 JVM 上可用的默认 fork/join 池中执行。


  当返回 `CompletableFuture` 时，您可以利用它的所有特性，例如组合和链式调用多个 `CompletableFuture` 实例。


  #### 测试异步控制器


  与常规控制器一样，Spring MVC 测试框架可用于测试异步控制器。


  创建一个测试类，并使用 `@WebMvcTest(HelloWorldController.class)` 和 `@RunWith(SpringRunner.class)`
  对其进行注解。`@WebMvcTest` 将引导一个最小的 Spring Boot 应用程序，其中包含测试控制器所需的内容。它会自动配置 Spring MockMvc，并将其自动注入到测试中。


  ```

  @RunWith(SpringRunner.class)

  @WebMvcTest(HelloWorldController.class)

  public class HelloWorldControllerTest {

  @Autowired

  private MockMvc mockMvc;

  @Test

  public void testHelloWorldController() throws Exception {

  MvcResult mvcResult = mockMvc.perform(get("/"))

  .andExpect(request().asyncStarted())

  .andDo(MockMvcResultHandlers.log())

  .andReturn();

  mockMvc.perform(asyncDispatch(mvcResult))

  .andExpect(status().isOk())

  .andExpect(content().contentTypeCompatibleWith(TEXT_PLAIN))

  .andExpect(content().string("Hello World, from Spring Boot 2!"));

  }

  }

  ```


  异步 Web 测试与常规 Web 测试的主要区别在于需要启动异步分派。首先，执行初始请求并验证异步是否已启动。出于调试目的，您可以使用 `MockMvcResultHandlers.log()`
  记录结果。接下来，应用 `asyncDispatch`。最后，我们可以断言预期的响应。


  #### 配置异步处理


  根据您的需求，您可能还希望为异步请求处理配置一个显式的 `TaskExecutor`，而不是使用 Spring Boot 提供的默认 `TaskExecutor`。


  要配置异步处理，您需要重写 `WebMvcConfigurer` 的 `configureAsyncSupport` 方法。重写此方法可以让您访问 `AsyncSupportConfigurer`。这允许您设置要使用的
  AsyncTaskExecutor（以及其他配置）。


  ```

  @SpringBootApplication

  public class HelloWorldApplication implements WebMvcConfigurer {

  public static void main(String[] args) {

  SpringApplication.run(HelloWorldApplication.class, args);

  }

  @Override

  public void configureAsyncSupport(AsyncSupportConfigurer configurer) {

  configurer.setTaskExecutor(mvcTaskExecutor());

  }

  @Bean

  public ThreadPoolTaskExecutor mvcTaskExecutor() {

  ThreadPoolTaskExecutor taskExecutor = new ThreadPoolTaskExecutor();

  taskExecutor.setThreadNamePrefix("mvc-task-");

  return taskExecutor;

  }

  }

  ```


  ## 4.2 响应写入器


  ### 问题


  您有一个服务（或多个调用），希望收集结果并将响应发送给客户端。


  ### 解决方案


  使用 `ResponseBodyEmitter`（或其子类 `SseEmitter`）来收集并将响应发送给客户端。


  ### 工作原理




  #### 在响应中发送多个结果


  Spring MVC 有一个名为 `ResponseBodyEmitter` 的类，当你希望向客户端返回多个对象而不是单个结果时，这个类非常有用。发送对象时，会使用
  `HttpMessageConverter` 将其转换为结果。要使用 `ResponseBodyEmitter`，你需要构造它，并从请求处理方法中返回它。


  创建一个 `OrderController`，其中包含一个返回 `ResponseBodyEmitter` 的 `orders` 方法，并将结果逐个发送给客户端。


  首先创建 `Order` 和 `OrderService`。


  ```

  public class Order {

  private String id;

  private BigDecimal amount;

  public Order() {

  }

  public Order(String id, BigDecimal amount) {

  this.id=id;

  this.amount = amount;

  }

  public String getId() {

  return id;

  }

  public void setId(String id) {

  this.id = id;

  }

  public BigDecimal getAmount() {

  return amount;

  }

  public void setAmount(BigDecimal amount) {

  this.amount = amount;

  }

  @Override

  public String toString() {

  return String.format("Order [id=''%s'', amount=%4.2f]", id, amount);

  }

  }

  ```


  然后添加一个简单的 `OrderService` 来保存订单。


  ```

  @Service

  public class OrderService {

  private final List orders = new ArrayList();

  @PostConstruct

  public void setup() {

  createOrders();

  }

  public Iterable findAll() {

  return List.copyOf(orders);

  }

  private Iterable createOrders() {

  for (int i = 0; i < 25; i++) {

  this.orders.add(createOrder());

  }

  return orders;

  }

  private Order createOrder() {

  String id = UUID.randomUUID().toString();

  double amount = ThreadLocalRandom.current().nextDouble(1000.00d);

  return new Order(id, BigDecimal.valueOf(amount));

  }

  }

  ```


  现在创建 `OrderController`。


  ```

  @RestController

  public class OrderController {

  private final OrderService orderService;

  public OrderController(OrderService orderService) {

  this.orderService = orderService;

  }

  @GetMapping("/orders")

  public ResponseBodyEmitter orders() {

  var emitter = new ResponseBodyEmitter();

  var executor = Executors.newSingleThreadExecutor();

  executor.execute(() -> {

  var orders = orderService.findAll();

  try {

  for (var order : orders) {

  randomDelay();

  emitter.send(order);

  }

  emitter.complete();

  } catch (IOException e) {

  emitter.completeWithError(e);

  }

  });

  executor.shutdown();

  return emitter;

  }

  private void randomDelay() {

  try {

  Thread.sleep(ThreadLocalRandom.current().nextInt(150));

  } catch (InterruptedException e) {

  Thread.currentThread().interrupt();

  }

  }

  }

  ```


  首先创建一个 `ResponseBodyEmitter`，并在方法末尾返回它。接下来执行一个任务，该任务将使用 `OrderService.findAll` 方法查询订单。该调用的所有结果都通过
  `ResponseBodyEmitter` 的 `send` 方法逐个返回。当所有对象都发送完毕后，需要调用 `complete()` 方法，以便负责发送响应的线程可以完成请求并释放资源以处理下一个响应。当发生异常并且你想通知用户时，可以调用
  `completeWithError`；该异常将通过 Spring MVC 的正常异常处理流程，之后响应完成。


  当使用 httpie 或 curl 等工具时，调用 URL `http://localhost:8080/orders` 将产生类似于图 4-2 所示的结果。


  ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig2_HTML.jpg](img/464036_1_En_4_Fig2_HTML.jpg)


  图 4-2


  ResponseBodyEmitter 的输出


  最后，让我们为这个控制器编写一个测试。使用 `@RunWith(SpringRunner.class)` 和 `@WebMvcTest(OrderController.class)`
  注解一个类，以获得一个 Web 切片测试。`OrderController` 需要一个 `OrderService`，通过在 `OrderService` 字段上使用
  `@MockBean` 来模拟它。


  ```

  @RunWith(SpringRunner.class)

  @WebMvcTest(OrderController.class)

  public class OrderControllerTest {

  @Autowired

  private MockMvc mockMvc;

  @MockBean

  private OrderService orderService;

  @Test

  public void foo() throws Exception {

  when(orderService.findAll())

  .thenReturn(List.of(new Order("1234", BigDecimal.TEN)));

  MvcResult mvcResult =

  mockMvc.perform(get("/orders"))

  .andExpect(request().asyncStarted())

  .andDo(MockMvcResultHandlers.log())

  .andReturn();

  mockMvc.perform(asyncDispatch(mvcResult))

  .andDo(MockMvcResultHandlers.log())

  .andExpect(status().isOk())

  .andExpect(content().json("{\"id\":\"1234\",\"amount\":10}"));

  }

  }

  ```


  测试方法首先在模拟的 `OrderService` 上注册行为，以返回单个 `Order` 实例。接下来，我们使用 `MockMvc` 对 `/orders`
  端点执行 `get` 请求。由于这是一个异步控制器，请求应启动异步处理。接下来，我们模拟异步分发，并对实际响应编写断言。结果应该是一个包含 `id` 和 `amount`
  的单个 JSON 元素。


  #### 以事件形式发送多个结果


  `SseEmitter` 可以将事件从服务器传递给客户端。服务器发送事件是从服务器到客户端的消息。它们的 `Content-Type` 头为 `text/event-stream`。它们非常轻量，只有四个字段（表
  4-2）。


  表 4-2


  服务器发送事件允许的字段


  | 字段 | 描述 |

  | --- | --- |

  | id | 事件的 ID |

  | event | 事件的类型 |

  | data | 事件数据 |

  | retry | 事件流的重新连接时间 |


  要从请求处理方法发送事件，你需要创建一个 `SseEmitter` 实例，并从请求处理方法中返回它。然后使用 `send` 方法将单个元素发送给客户端。


  ```

  @GetMapping("/orders")

  public SseEmitter orders() {

  SseEmitter emitter = new SseEmitter();

  ExecutorService executor = Executors.newSingleThreadExecutor();

  executor.execute(() -> {

  var orders = orderService.findAll();

  try {

  for (var order : orders) {

  randomDelay();

  emitter.send(order);

  }

  emitter.complete();

  } catch (IOException e) {

  emitter.completeWithError(e);

  }

  });

  executor.shutdown();

  return emitter;

  }

  ```




  ### 注意


  向客户端发送每个项目时存在延迟；这只是为了让您看到不同事件的传入，在实际代码中不应这样做。


  现在，当调用 URL `http://localhost:8080/orders` 时，您会看到事件逐个传入（图 4-3）。


  ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig3_HTML.jpg](img/464036_1_En_4_Fig3_HTML.jpg)


  图 4-3


  服务器推送事件结果


  请注意，`Content-Type` 标头的值为 `text/event-stream`，表示我们获取的是一个事件流。该流可以保持打开状态并持续接收事件通知。每个写入的对象都会通过
  `HttpMessageConverter` 转换为 JSON。每个对象都会作为事件数据写入 `data` 标签中。


  如果您想向事件添加更多信息（填写表 4-2 中提到的其他字段），请使用 `SseEventBuilder`。`SseEmitter` 的 `event()` 工厂方法会创建一个实例。使用它来填充
  `id` 和 `event` 字段。


  ```

  @GetMapping("/orders")

  public SseEmitter orders() {

  SseEmitter emitter = new SseEmitter();

  ExecutorService executor = Executors.newSingleThreadExecutor();

  executor.execute(() -> {

  var orders = orderService.findAll();

  try {

  for (var order : orders) {

  randomDelay();

  var eventBuilder = event();

  emitter.send(

  eventBuilder

  .data(order)

  .name("order-created")

  .id(String.valueOf(order.hashCode())));

  }

  emitter.complete();

  } catch (IOException e) {

  emitter.completeWithError(e);

  }

  });

  executor.shutdown();

  return emitter;

  }

  ```


  现在，当调用 URL `http://localhost:8080/orders` 时，事件会包含 `id`、`event` 和 `data` 字段。


  ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig4_HTML.jpg](img/464036_1_En_4_Fig4_HTML.jpg)


  图 4-4


  订单端点输出


  ### 注意


  微软的浏览器（Internet Explorer 或 Edge）不支持服务器推送事件；要使其在微软浏览器上工作，您需要使用 polyfill。^(²²)


  ## 4.3 WebSocket


  ### 问题


  您希望通过 Web 实现客户端到服务器的双向通信。


  ### 解决方案


  使用 WebSocket 实现客户端与服务器之间的双向通信。与 HTTP 不同，WebSocket 提供全双工通信。


  ### 工作原理


  对 WebSocket 的完整解释超出了本教程的范围；然而，有一点值得提及：HTTP 与 WebSocket 之间的关系实际上非常薄弱。WebSocket 仅利用
  HTTP 进行初始握手，将连接从普通 HTTP 升级为 TCP 套接字连接。


  #### 配置 WebSocket 支持


  第一步是添加对 `spring-boot-starter-websocket` 的依赖，这将引入所需的依赖项，并会在 Spring Boot 中自动配置 WebSocket
  支持。


  要启用 WebSocket 的使用，只需在应用程序中添加 `@EnableWebSocket` 注解即可。具体做法是将该注解添加到带有 `@SpringBootApplication`
  注解的类或带有 `@Configuration` 注解的类上。


  ```

  @SpringBootApplication

  @EnableWebSocket

  public class EchoApplication implements WebSocketConfigurer { ... }

  ```




  #### 创建 WebSocketHandler


  要处理 WebSocket 消息和生命周期事件（握手、连接建立等），你需要创建一个 `WebSocketHandler` 并将其注册到一个端点 URL。


  `WebSocketHandler` 定义了五个需要实现的方法（表 4-3），如果你直接实现该接口的话。不过，Spring 已经提供了一个很好的类层次结构供你利用。在编写自定义处理器时，通常只需扩展
  `TextWebSocketHandler` 或 `BinaryWebSocketHandler` 即可，顾名思义，它们分别可以处理文本或二进制消息。


  表 4-3


  WebSocketHandler 方法


  | 方法 | 描述 |

  | --- | --- |

  | `afterConnectionEstablished` | 当 WebSocket 连接打开并准备就绪时调用 |

  | `handleMessage` | 当此处理器收到 WebSocket 消息时调用 |

  | `handleTransportError` | 当发生错误时调用 |

  | `afterConnectionClosed` | 在 WebSocket 连接关闭后调用 |

  | `supportsPartialMessages` | 如果此处理器支持部分消息：若设为 `true`，则 WebSocket 消息可能通过多次调用到达。
  |


  通过扩展 `TextWebSocketHandler` 创建 `EchoHandler`，并实现 `afterConnectionEstablished` 和
  `handleTextMessage` 方法。


  ```

  package com.apress.springbootrecipes.echo;

  import org.springframework.web.socket.TextMessage;

  import org.springframework.web.socket.WebSocketSession;

  import org.springframework.web.socket.handler.TextWebSocketHandler;

  public class EchoHandler extends TextWebSocketHandler {

  @Override

  public void afterConnectionEstablished(WebSocketSession session)

  throws Exception {

  session.sendMessage(new TextMessage("CONNECTION ESTABLISHED"));

  }

  @Override

  protected void handleTextMessage(WebSocketSession session,

  TextMessage message) throws Exception {

  var msg = message.getPayload();

  session.sendMessage(new TextMessage("RECEIVED: " + msg));

  }

  }

  ```


  当连接建立时，会向客户端发送一条 `TextMessage`，告知连接已建立。当收到 `TextMessage` 时，会提取其负载（实际消息），加上前缀 `RECEIVED`
  后发送回客户端。


  接下来，你需要将此处理器注册到一个 URI；为此，你可以创建一个实现 `WebSocketConfigurer` 的 `@Configuration` 类，并在
  `registerWebSocketHandlers` 方法中注册它。将此接口添加到 `EchoApplication` 类中。


  ```

  package com.apress.springbootrecipes.echo;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  import org.springframework.web.socket.config.annotation.EnableWebSocket;

  import org.springframework.web.socket.config.annotation.WebSocketConfigurer;

  import org.springframework.web.socket.config.annotation.WebSocketHandlerRegistry;

  @SpringBootApplication

  @EnableWebSocket

  public class EchoApplication implements WebSocketConfigurer {

  public static void main(String[] args) {

  SpringApplication.run(EchoApplication.class, args);

  }

  @Bean

  public EchoHandler echoHandler() {

  return new EchoHandler();

  }

  @Override

  public void registerWebSocketHandlers(WebSocketHandlerRegistry registry) {

  registry.addHandler(echoHandler(), "/echo");

  }

  }

  ```


  首先，将 `EchoHandler` 注册为一个 Bean，以便将其绑定到 URI。在 `registerWebSocketHandlers` 方法中，你可以使用
  `WebSocketHandlerRegistry` 来注册处理器。通过 `addHandler` 方法，你可以将处理器注册到一个 URI，本例中为 `/echo`。通过此配置，我们可以使用
  `ws://localhost:8080/echo` URL 从客户端打开 WebSocket 连接。


  现在服务器已就绪，我们需要一个客户端来连接我们的 WebSocket 端点。为此，你需要一些 JavaScript 和 HTML。编写以下 `app.js` 并将其放置在
  `src/main/resources/static` 目录中。


  ```

  var ws = null;

  var url = "ws://localhost:8080/echo";

  function setConnected(connected) {

  document.getElementById(''connect'').disabled = connected;

  document.getElementById(''disconnect'').disabled = !connected;

  document.getElementById(''echo'').disabled = !connected;

  }

  function connect() {

  ws = new WebSocket(url);

  ws.onopen = function () {

  setConnected(true);

  };

  ws.onmessage = function (event) {

  log(event.data);

  };

  ws.onclose = function (event) {

  setConnected(false);

  log(''Info: Closing Connection.'');

  };

  }

  function disconnect() {

  if (ws != null) {

  ws.close();

  ws = null;

  }

  setConnected(false);

  }

  function echo() {

  if (ws != null) {

  var message = document.getElementById(''message'').value;

  log(''Sent: '' + message);

  ws.send(message);

  } else {

  alert(''connection not established, please connect.'');

  }

  }

  function log(message) {

  var console = document.getElementById(''logging'');

  var p = document.createElement(''p'');

  p.appendChild(document.createTextNode(message));

  console.appendChild(p);

  while (console.childNodes.length > 12) {

  console.removeChild(console.firstChild);

  }

  console.scrollTop = console.scrollHeight;

  }

  ```


  这里有几个函数。第一个 `connect` 将在点击 **Connect** 按钮时被调用；这将打开一个到 `ws://localhost:8080/echo`
  的 WebSocket 连接，该地址正是之前创建并注册的处理器。连接到服务器会创建一个 `WebSocket` JavaScript 对象，使你能够在客户端监听消息。这里定义了
  `onopen`、`onmessage` 和 `onclose` 回调。其中最重要的是 `onmessage`，因为每当有消息从服务器传入时它都会被调用；此方法简单地调用
  `log` 函数，该函数会将接收到的消息添加到屏幕上的 `logging` 元素中。


  接下来是 `disconnect`，它将关闭 WebSocket 连接并清理 JavaScript 对象。最后是 `echo` 函数，它将在点击 **Echo
  Message** 按钮时被调用。给定的消息将被发送到服务器（并最终被返回）。


  为了使用 `app.js`，在 `src/main/resources/static` 中添加以下 `index.html`。


  ```


  Connect

  Disconnect


  Echo message


  Logging


  ```


  现在部署应用程序时，你可以连接到 `http://localhost:8080` 上的 echo WebSocket 服务，发送消息并让它们被返回（图 4-5）。


  ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig5_HTML.jpg](img/464036_1_En_4_Fig5_HTML.jpg)


