  ## 3.6 解析用户区域设置


  ### 问题


  为了使你的 Web 应用支持国际化，你必须识别每个用户偏好的区域设置，并根据此区域设置显示内容。


  ### 解决方案


  在 Spring MVC 应用中，用户的区域设置由区域设置解析器识别，该解析器必须实现 `LocaleResolver` 接口。Spring MVC 提供了多个
  `LocaleResolver` 实现，供你根据不同的标准解析区域设置。或者，你也可以通过实现此接口来创建自己的自定义区域设置解析器。


  Spring Boot 允许你设置 `spring.mvc.locale-resolver` 属性。此属性可以设置为 `ACCEPT`（默认值）或 `FIXED`。前者将创建一个
  `AcceptHeaderLocaleResolver`；后者将创建一个 `FixedLocaleResolver`。


  你也可以通过在 Web 应用上下文中注册一个类型为 `LocaleResolver` 的 bean 来定义区域设置解析器。你必须将区域设置解析器的 bean 名称设置为
  `localeResolver`，以便它可以被自动检测到。


  ### 工作原理


  Spring MVC 提供了 `LocaleResolver` 接口的几个默认实现。还提供了一个 `HandlerInterceptor`，允许用户覆盖他们想要使用的区域设置，即
  `LocaleChangeInterceptor`。


  #### 通过 HTTP 请求头解析区域设置


  Spring Boot 注册的默认区域设置解析器是 `AcceptHeaderLocaleResolver`。它通过检查 HTTP 请求的 `Accept-Language`
  header 来解析区域设置。此 header 由用户的 Web 浏览器根据底层操作系统的区域设置进行设置。


  ### 注意


  `AcceptHeaderLocaleResolver` 无法更改用户的区域设置，因为它无法修改用户操作系统的区域设置。


  ```

  @Bean

  public LocaleResolver localeResolver () {

  return new AcceptHeaderLocaleResolver();

  }

  ```


  #### 通过会话属性解析区域设置


  解析区域设置的另一个选项是使用 `SessionLocaleResolver`。它通过检查用户会话中的预定义属性来解析区域设置。如果会话属性不存在，此区域设置解析器将从
  `Accept-Language` HTTP header 确定默认区域设置。


  ```

  @Bean

  public LocaleResolver localeResolver () {

  SessionLocaleResolver localeResolver = new SessionLocaleResolver();

  localeResolver.setDefaultLocale(new Locale("en"));

  return localeResolver;

  }

  ```


  如果会话属性不存在，你可以为此解析器设置 `defaultLocale` 属性。请注意，此区域设置解析器能够通过更改存储区域设置的会话属性来更改用户的区域设置。


  #### 通过 Cookie 解析区域设置


  你也可以使用 `CookieLocaleResolver` 通过检查用户浏览器中的 cookie 来解析区域设置。如果 cookie 不存在，此区域设置解析器将从
  `Accept-Language` HTTP header 确定默认区域设置。


  ```

  @Bean

  public LocaleResolver localeResolver() {

  return new CookieLocaleResolver();

  }

  ```


  此区域设置解析器使用的 cookie 可以通过设置 `cookieName` 和 `cookieMaxAge` 属性进行自定义。`cookieMaxAge` 属性指示此
  cookie 应持久保存多少秒。值 `-1` 表示此 cookie 将在浏览器关闭后失效。


  ```

  @Bean

  public LocaleResolver localeResolver() {

  CookieLocaleResolver cookieLocaleResolver = new CookieLocaleResolver();

  cookieLocaleResolver.setCookieName("language");

  cookieLocaleResolver.setCookieMaxAge(3600);

  cookieLocaleResolver.setDefaultLocale(new Locale("en"));

  return cookieLocaleResolver;

  }

  ```


  如果用户浏览器中不存在 cookie，你也可以为此解析器设置 `defaultLocale` 属性。此区域设置解析器能够通过更改存储区域设置的 cookie 来更改用户的区域设置。


  #### 使用固定区域设置


  `FixedLocaleResolver` 始终返回相同的固定区域设置。默认情况下，它返回 JVM 的默认区域设置，但可以通过设置 `defaultLocale`
  属性来配置为返回不同的区域设置。


  ```

  @Bean

  public LocaleResolver localeResolver() {

  FixedLocaleResolver cookieLocaleResolver = new FixedLocaleResolver();

  cookieLocaleResolver.setDefaultLocale(new Locale("en"));

  return cookieLocaleResolver;

  }

  ```


  ### 注意


  `FixedLocaleResolver` 无法更改用户的区域设置，因为顾名思义，它是固定的。


  #### 更改用户的区域设置


  除了通过显式调用 `LocaleResolver.setLocale()` 来更改用户的区域设置外，你还可以将 `LocaleChangeInterceptor`
  应用于你的处理器映射。此拦截器检测当前 HTTP 请求中是否存在特殊参数。参数名称可以通过此拦截器的 `paramName` 属性进行自定义（默认为 `locale`）。如果当前请求中存在此类参数，此拦截器将根据参数值更改用户的区域设置。


  为了能够更改区域设置，必须使用允许更改的 `LocaleResolver`。


  ```

  @Bean

  public LocaleResolver localeResolver() {

  return new CookieLocaleResolver();

  }

  ```


  要更改区域设置，请将 `LocaleChangeInterceptor` 添加为 bean 并将其注册为拦截器；对于后者，请使用 `WebMvcConfigurer`
  的 `addInterceptors` 方法。




  ### 注意


  除了将其添加到 `@SpringBootApplication` 之外，你也可以创建一个专门的 `@Configuration` 注解类来注册拦截器。请注意**不要**在该类上添加
  `@EnableWebMvc`，因为这会禁用 Spring Boot 的自动配置！


  ```

  @SpringBootApplication

  public class LibraryApplication implements WebMvcConfigurer {

  @Override

  public void addInterceptors(InterceptorRegistry registry) {

  registry.addInterceptor(localeChangeInterceptor());

  }

  @Bean

  public LocaleChangeInterceptor localeChangeInterceptor() {

  return new LocaleChangeInterceptor();

  }

  @Bean

  public LocaleResolver localeResolver() {

  return new CookieLocaleResolver();

  }

  }

  ```


  现在，将以下代码片段添加到 `index.html` 中：


  ```

  语言


  NL |

  EN


  ```


  将键值对添加到 `messages.properties` 文件中。


  ```

  main.language.nl=荷兰语

  main.language.en=英语

  ```


  现在，当选择其中一种语言时，页面将重新渲染并以所选语言显示；当你继续浏览时，其余页面也将以所选语言显示。


  ## 3.7 选择并配置嵌入式服务器


  ### 问题


  你想使用 Jetty 作为嵌入式容器，而不是默认的 Tomcat 容器。


  ### 解决方案


  排除 Tomcat 运行时并包含 Jetty 运行时。Spring Boot 会自动检测类路径上是否存在 Tomcat、Jetty 或 Undertow，并相应地配置容器。


  ### 工作原理


  Spring Boot 原生支持 Tomcat、Jetty 和 Undertow 作为嵌入式 Servlet 容器。默认情况下，Spring Boot 使用 Tomcat
  作为容器（通过 `spring-boot-starter-web` 工件中的 `spring-boot-starter-tomcat` 依赖项体现）。可以使用属性来配置容器，其中一些属性适用于所有容器，另一些则特定于某个容器。全局属性以
  `server.` 或 `server.servlet` 为前缀，而容器特定的属性则以 `server.<container>` 开头（其中 `container`
  是 `tomcat`、`jetty` 或 `undertow`）。


  #### 通用配置属性


  如表 3-6 所示，有几个通用的服务器属性可用。


  表 3-6


  通用服务器属性


  | 属性 | 描述 |

  | --- | --- |

  | `server.port` | HTTP 服务器端口，默认为 `8080` |

  | `server.address` | 要绑定的 IP 地址，默认为 `0.0.0.0`（即所有适配器） |

  | `server.use-forward-headers` | 是否应将 `X-Forwarded-*` 标头应用于当前请求，默认未设置，使用所选 Servlet
  容器的默认值 |

  | `server.server-header` | 要发送的服务器名称的标头名称，默认为空 |

  | `server.max-http-header-size` | HTTP 标头的最大大小，默认为 `0`（无限制） |

  | `server.connection-timeout` | HTTP 连接器在关闭前等待下一个请求的超时时间。默认为空，交由容器处理；值为 `-1` 表示无限期，永不超时。
  |

  | `server.http2.enabled` | 如果当前容器支持，则启用 Http2 支持。默认为 `false` |

  | `server.compression.enabled` | 是否启用 HTTP 压缩，默认为 `false` |

  | `server.compression.mime-types` | 应用压缩的 MIME 类型列表，以逗号分隔 |

  | `server.compression.excluded-user-agents` | 应禁用压缩的用户代理列表，以逗号分隔 |

  | `server.compression.min-response-size` | 应用压缩的最小请求大小，默认为 `2048` |

  | `server.servlet.context-path` | 应用程序的主上下文路径，默认为作为根应用程序启动 |

  | `server.servlet.path` | 主 `DispatcherServlet` 的路径，默认为 `/` |

  | `server.servlet.application` `-display-name` | 在容器中用作显示名称的名称，默认为 `application`
  |

  | `server.servlet.context-parameters` | Servlet 容器上下文/初始化参数 |


  由于嵌入式容器都遵循 Servlet 规范，因此也支持 JSP 页面，并且默认启用该支持。Spring Boot 可以轻松更改 JSP 提供程序，甚至完全禁用该支持。公开的属性见表
  3-7。


  表 3-7


  与 JSP 相关的服务器属性


  | 属性 | 描述 |

  | --- | --- |

  | `server.servlet.jsp.registered` | 是否应注册 JSP Servlet，默认为 `true` |

  | `server.servlet.jsp.class-name` | JSP Servlet 类名，默认为 `org.apache.jasper.servlet.JspServlet`，因为
  Tomcat 和 Jetty 都使用 Jasper 作为 JSP 实现 |

  | `server.servlet.jsp.init-parameters` | JSP Servlet 的上下文参数 |




  ### 注意


  不推荐在 Spring Boot 应用程序中使用 JSP，且其使用范围有限。^(²¹)


  使用 Spring MVC 时，您可能希望利用 HTTP Session 来存储属性（通常与 Spring Security 结合使用，用于存储 CSRF 令牌等）。通用的
  Servlet 配置也允许您配置 HTTP Session 及其存储方式（cookie、URL 等）。相关属性请参见表 3-8。


  表 3-8


  HTTP Session 相关服务器属性


  | `server.servlet.session.timeout` | Session 超时时间，默认 30 分钟 |

  | `server.servlet.session.tracking-modes` | Session 跟踪模式，可选 `cookie`、`url` 和 `ssl`
  中的一个或多个。默认为空，由容器决定 |

  | `server.servlet.session.persistent` | Session 数据是否在重启之间持久化，默认 `false` |

  | `server.servlet.session.cookie.name` | 用于存储 Session 标识符的 Cookie 名称。默认为空，由容器默认值决定
  |

  | `server.servlet.session.cookie.domain` | Session Cookie 使用的域名值。默认为空，由容器默认值决定 |

  | `server.servlet.session.cookie.path` | Session Cookie 使用的路径值。默认为空，由容器默认值决定 |

  | `server.servlet.session.cookie.comment` | Session Cookie 的注释。默认为空，由容器默认值决定 |

  | `server.servlet.session.cookie.http-only` | Session Cookie 是否仅可通过 HTTP 访问，默认为空，由容器默认值决定
  |

  | `server.servlet.session.cookie.secure` | Cookie 是否仅通过 SSL 发送，默认为空，由容器默认值决定 |

  | `server.servlet.session.cookie.max-age` | Session Cookie 的生命周期。默认为空，由容器默认值决定 |

  | `server.servlet.session.session-store-directory.directory` | 用于持久化 Cookie 的目录名称。必须是一个已存在的目录
  |


  最后，Spring Boot 通过暴露少量属性使得配置 SSL 变得非常简单，请参见表 3-9 以及配方 3.8 了解如何配置 SSL。


  表 3-9


  SSL 相关服务器属性


  | 属性 | 描述 |

  | --- | --- |

  | `server.ssl.enabled` | 是否启用 SSL，默认 `true` |

  | `server.ssl.ciphers` | 支持的 SSL 加密套件，默认为空 |

  | `server.ssl.client-auth` | SSL 客户端认证是可选（`WANT`）还是必需（`NEED`）。默认为空 |

  | `server.ssl.protocol` | 使用的 SSL 协议，默认 `TLS` |

  | `server.ssl.enabled-protocols` | 启用的 SSL 协议，默认为空 |

  | `server.ssl.key-alias` | 用于标识密钥库中密钥的别名，默认为空 |

  | `server.ssl.key-password` | 访问密钥库中密钥的密码，默认为空 |

  | `server.ssl.key-store` | 密钥库的位置，通常是一个 JKS 文件，默认为空 |

  | `server.ssl.key-store-password` | 访问密钥库的密码，默认为空 |

  | `server.ssl.key-store-type` | 密钥库的类型，默认为空 |

  | `server.ssl.key-store-provider` | 密钥库的提供者，默认为空 |

  | `server.ssl.trust-store` | 信任库的位置 |

  | `server.ssl.trust-store-password` | 访问信任库的密码，默认为空 |

  | `server.ssl.trust-store-type` | 信任库的类型，默认为空 |

  | `server.ssl.trust-store-provider` | 信任库的提供者，默认为空 |


  ### 注意


  上述表格中提到的所有属性**仅**在使用嵌入式容器运行应用程序时适用。当部署到外部容器（即部署 WAR 文件）时，这些设置不适用！


  由于我们使用的是 Thymeleaf，可以禁用 JSP Servlet 的注册；同时我们也可以更改端口和压缩设置。请在 `application.properties`
  中添加以下内容：


  ```

  server.port=8081

  server.compression.enabled=true

  server.servlet.jsp.registered=false

  ```


  现在，当（重新）启动时，您的应用程序页面（当足够大时）将被压缩，并且服务器将在端口 `8081` 而非 `8080` 上运行。


  ### 注意


  `server.servlet.context-path` 和 `server.servlet.path` 之间存在区别。查看 URL `http://localhost:8080/books`
  时，它由几个部分组成。首先是协议（通常是 `http` 或 `https`）；然后是您要访问的服务器的地址和端口，接着是 `context-path`（默认部署在根路径的
  `/`），其后是 `servlet-path`。`server.context-path` 是您应用程序的主 URL；例如，如果我们设置 `server.context-path=/library`，则整个应用程序可通过
  `/library` URL 访问。（`DispatcherServlet` 仍然监听 `context-path` 内的 `/`）。现在，如果我们设置 `server.path=/dispatch`，则需要使用
  `/library/dispatch/books` 来访问书籍。


  接下来，如果我们添加了第二个 `DispatcherServlet`，并将其路径配置为 `/services`，那么它可以通过 `/library/services`
  访问。两个 `DispatcherServlet` 都将在主 `context-path` `/library` 内处于活动状态。


  #### 更改运行时容器


  当包含 `spring-boot-starter-web` 依赖时，它会自动包含对 Tomcat 容器的依赖，因为它本身依赖于 `spring-boot-starter-tomcat`
  工件。要启用不同的 Servlet 容器，需要排除 `spring-boot-starter-tomcat`，并包含 `spring-boot-starter-jetty`
  或 `spring-boot-starter-undertow` 之一。


  ```

  org.springframework.boot

  spring-boot-starter-web


  org.springframework.boot

  spring-boot-starter-tomcat


  org.springframework.boot

  spring-boot-starter-jetty


  ```


  在 Maven 中，您可以在 `<dependency>` 内部使用 `<exclusion>` 元素来排除依赖。


  现在，当应用程序启动时，它将使用 Jetty 而不是 Tomcat（图 3-11）。


  ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig11_HTML.jpg](img/464036_1_En_3_Fig11_HTML.jpg)


  图 3-11


  使用 Jetty 容器的引导日志


  ## 3.8 为 Servlet 容器配置 SSL


  ### 问题


  您希望应用程序除了通过 HTTP 访问外（或替代 HTTP），还能通过 HTTPS 访问。


  ### 解决方案


  获取一个证书，将其放入密钥库，并使用 `server.ssl` 命名空间配置该密钥库。然后 Spring Boot 将自动配置服务器，使其仅能通过 HTTPS
  访问。


  ### 工作原理


  使用 `server.ssl.key-store`（及相关属性），您可以配置嵌入式容器仅接受 HTTPS 连接。在配置 SSL 之前，您需要拥有一个证书来保护您的应用程序。通常，您会希望从证书颁发机构（如
  VeriSign 或 Let''s Encrypt）获取证书。但是，出于开发目的，您可以使用自签名证书（请参阅**创建自签名证书**部分）。


  #### 创建自签名证书


  Java 附带了一个名为 `keytool` 的工具，可用于生成证书等。


  ```

  keytool -genkey -keyalg RSA -alias sb2-recipes -keystore sb2-recipes.pfx -storepass
  password -validity 3600 -keysize 4096 -storetype pkcs12

  ```


  上述命令将指示 `keytool` 使用 RSA 算法生成一个密钥，并将其放入名为 `sb2-recipes.pfx` 的密钥库中，别名为 `sb2-recipes`，有效期为
  3600 天。运行该命令时，它会询问一些问题；请相应回答（或留空）。之后，将生成一个名为 `sb2-recipes.pfx` 的文件，其中包含证书并使用密码保护。


  将此文件放入 `src/main/resources` 文件夹中，以便它作为应用程序的一部分被打包，并且 Spring Boot 可以轻松访问它。




  ### 警告


  使用自签名证书会在浏览器中产生警告，提示网站不安全且未受保护，因为该证书并非由受信任的机构签发（另请参见图 3-12）。


  #### 配置 Spring Boot 使用密钥库


  Spring Boot 需要了解密钥库的信息，才能配置嵌入式容器。为此，请使用 `server.ssl.key-store` 属性。你还需要指定密钥库的类型（`pkcs12`）和密码。


  ```

  server.ssl.key-store=classpath:sb2-recipes.pfx

  server.ssl.key-store-type=pkcs12

  server.ssl.key-store-password=password

  server.ssl.key-password=password

  server.ssl.key-alias=sb2-recipes

  ```


  现在，当打开 http://localhost:8080/books.html 页面时，它将通过 https 提供服务（尽管会有警告）。参见图 3-12。


  ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig12_HTML.jpg](img/464036_1_En_3_Fig12_HTML.jpg)


  图 3-12


  HTTPS 访问


  #### 同时支持 HTTP 和 HTTPS


  Spring Boot 默认只启动一个连接器：要么是 HTTP，要么是 HTTPS，但不会同时启动两者。如果你想同时支持 HTTP 和 HTTPS，则需要手动添加一个额外的连接器。最简单的方法是自行创建
  HTTP 连接器，并让 Spring Boot 设置 SSL 部分。


  首先，配置 Spring Boot 在端口 8443 上启动服务器。


  ```

  server.port=8443

  ```


  要向嵌入式 Tomcat 添加额外的连接器，你需要将 `TomcatServletWebServerFactory` 作为 bean 添加到上下文中。通常，Spring
  Boot 会检测容器并选择要使用的 `WebServerFactory`；但是，由于需要进行自定义，我们需要手动添加它。此 bean 可以添加到带有 `@Configuration`
  注解的类或 `LibraryApplication` 类中。


  ```

  @Bean

  public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

  var factory = new TomcatServletWebServerFactory();

  factory.addAdditionalTomcatConnectors(httpConnector());

  return factory;

  }

  private Connector httpConnector() {

  var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

  connector.setScheme("http");

  connector.setPort(8080);

  connector.setSecure(false);

  return connector;

  }

  ```


  这将在端口 8080 上添加一个额外的连接器。现在，应用程序将同时可以通过端口 8080 和 8443 访问。使用 Spring Security，你可以强制通过
  HTTPS 而非 HTTP 访问应用程序的某些部分。


  ### 提示


  如果你不想显式配置 `TomcatServletWebServerFactory`，也可以使用 `BeanPostProcessor` 向 `TomcatServletWebServerFactory`
  注册额外的 Tomcat `Connector`。这样，你可以为不同的嵌入式容器实现此功能，而不是局限于单一容器。


  ```

  @Bean

  public BeanPostProcessor addHttpConnectorProcessor() {

  return new BeanPostProcessor() {

  @Override

  public Object postProcessBeforeInitialization(Object bean, String beanName)

  throws BeansException {

  if (bean instanceof TomcatServletWebServerFactory) {

  var factory = (TomcatServletWebServerFactory) bean;

  factory.addAdditionalTomcatConnectors(httpConnector());

  }

  return bean;

  }

  };

  }

  ```


  #### 将 HTTP 重定向到 HTTPS


  除了同时支持 HTTP 和 HTTPS，另一种选择是仅支持 HTTPS，并将流量从 HTTP 重定向到 HTTPS。其配置与同时支持 HTTP 和 HTTPS
  时类似。但是，现在你需要配置连接器，将所有来自 8080 端口的流量重定向到 8443 端口。


  ```

  @Bean

  public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

  var factory = new TomcatServletWebServerFactory();

  factory.addAdditionalTomcatConnectors(httpConnector());

  factory.addContextCustomizers(securityCustomizer());

  return factory;

  }

  private Connector httpConnector() {

  var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

  connector.setScheme("http");

  connector.setPort(8080);

  connector.setSecure(false);

  connector.setRedirectPort(8443);

  return connector;

  }

  private TomcatContextCustomizer securityCustomizer() {

  return context -> {

  var securityConstraint = new SecurityConstraint();

  securityConstraint.setUserConstraint("CONFIDENTIAL");

  var collection = new SecurityCollection();

  collection.addPattern("/*");

  securityConstraint.addCollection(collection);

  context.addConstraint(securityConstraint);

  };

  }

  ```


  现在，`httpConnector` 设置了 `redirectPort`，以便知道要使用哪个端口。最后，你需要使用 `SecurityConstraint`
  保护所有 URL。使用 Spring Boot，你可以使用专门的 `TomcatContextCustomizer` 在 Tomcat 的 `Context`
  启动之前对其进行后处理。该约束使所有内容（由于使用了 `/*` 作为模式）都变为机密（允许使用 `NONE`、`INTEGRAL` 或 `CONFIDENTIAL`
  之一），结果是所有内容都将重定向到 https。


