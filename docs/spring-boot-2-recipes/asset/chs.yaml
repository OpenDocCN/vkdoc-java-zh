  #### 提升响应速度


  运行应用程序并打开页面时，您需要等待一段时间页面才会开始渲染。当渲染页面且模型包含 `Flux` 时，默认会等待整个 `Flux` 被消费完毕，之后才开始渲染页面。其行为本质上与检索
  `Collection` 而非 `Flux` 类似。为了更快开始渲染页面并实现流式传输，请将 `Flux` 包装在 `ReactiveDataDriverContextVariable`
  中。


  ```

  @GetMapping

  public Mono list(Model model) {

  var orders = orderService.orders();

  model.addAttribute("orders", new ReactiveDataDriverContextVariable(orders, 5));

  return Mono.just("orders/list");

  }

  ```


  `list` 方法看起来相同，但请注意 `Flux` 被包装在了 `ReactiveDataDriverContextVariable` 中。一旦接收到五个元素，它就会开始渲染，并持续渲染页面直至接收完所有数据。现在打开订单页面时，您会看到表格逐渐增长，直到所有订单都被读取完毕。


  ## 5.4 WebFlux 与 WebSocket


  ### 问题


  您希望在响应式应用程序中使用 WebSocket。


  ### 解决方案


  将 `javax.websocket-api` 作为依赖项引入，并使用响应式的 `WebSocketHandler` 接口来实现处理器。


  ### 工作原理


  在 `spring-boot-starter-webflux` 旁边添加 `javax.websocket-api` 依赖项，就足以在响应式应用程序中启用 WebSocket
  支持。


  ```

  org.springframework.boot

  spring-boot-starter-webflux


  javax.websocket

  javax.websocket-api

  1.1


  ```


  Spring WebFlux 要求使用 WebSocket 1.1 版本。如果使用 1.0 版本，代码将无法运行。


  接下来，使用 `WebSocketHandler` 来实现一个响应式处理器。


  ```

  package com.apress.springbootrecipes.echo;

  import org.springframework.web.reactive.socket.WebSocketHandler;

  import org.springframework.web.reactive.socket.WebSocketSession;

  import reactor.core.publisher.Mono;

  public class EchoHandler implements WebSocketHandler {

  @Override

  public Mono handle(WebSocketSession session) {

  return session.send(

  session.receive()

  .map( msg -> "RECEIVED: " + msg.getPayloadAsText())

  .map(session::textMessage));

  }

  }

  ```


  `EchoHandler` 会接收一条消息，并返回在其前面加上“RECEIVED: ”前缀的消息（非响应式版本请参见配方 4.4）。


  使用 WebFlux 设置 WebSocket 需要注册几个组件。首先我们需要处理器。处理器需要使用 `SimpleUrlHandlerMapping` 映射到一个
  URL。我们需要能够调用处理器的组件，此处为 `WebSocketHandlerAdapter`。最后一步是让 `WebSocketHandlerAdapter`
  理解传入的响应式运行时请求。由于我们使用 Netty（默认），我们需要使用 `ReactorNettyRequestUpgradeStrategy` 配置一个
  `WebSocketService`。


  ```

  package com.apress.springbootrecipes.echo;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  import org.springframework.core.Ordered;

  import org.springframework.web.reactive.HandlerMapping;

  import org.springframework.web.reactive.handler.SimpleUrlHandlerMapping;

  import org.springframework.web.reactive.socket.WebSocketHandler;

  import org.springframework.web.reactive.socket.server.WebSocketService;

  import org.springframework.web.reactive.socket.server.support.HandshakeWebSocketService;

  import org.springframework.web.reactive.socket.server.support.WebSocketHandlerAdapter;

  import org.springframework.web.reactive.socket.server.upgrade.ReactorNettyRequestUpgradeStrategy;

  import java.util.HashMap;

  import java.util.Map;

  @SpringBootApplication

  public class EchoApplication {

  public static void main(String[] args) {

  SpringApplication.run(EchoApplication.class, args);

  }

  @Bean

  public EchoHandler echoHandler() {

  return new EchoHandler();

  }

  @Bean

  public HandlerMapping handlerMapping() {

  Map map = new HashMap();

  map.put("/echo", echoHandler());

  var mapping = new SimpleUrlHandlerMapping();

  mapping.setUrlMap(map);

  mapping.setOrder(Ordered.HIGHEST_PRECEDENCE);

  return mapping;

  }

  @Bean

  public WebSocketHandlerAdapter handlerAdapter() {

  return new WebSocketHandlerAdapter(webSocketService());

  }

  @Bean

  public WebSocketService webSocketService() {

  var strategy = new ReactorNettyRequestUpgradeStrategy();

  return new HandshakeWebSocketService(strategy);

  }

  }

  ```


  现在您可以启动服务器，并使用 WebFlux 处理 WebSocket。


  #### HTML 与 JavaScript 回声客户端


  现在服务器已就绪，我们需要一个客户端来连接我们的 WebSocket 端点。为此，您需要一些 JavaScript 和 HTML。编写以下 `app.js` 并将其放置在
  `src/main/resources/static` 目录中。


  ```

  var ws = null;

  var url = "ws://localhost:8080/echo";

  function setConnected(connected) {

  document.getElementById(''connect'').disabled = connected;

  document.getElementById(''disconnect'').disabled = !connected;

  document.getElementById(''echo'').disabled = !connected;

  }

  function connect() {

  ws = new WebSocket(url);

  ws.onopen = function () {

  setConnected(true);

  };

  ws.onmessage = function (event) {

  log(event.data);

  };

  ws.onclose = function (event) {

  setConnected(false);

  log(''Info: Closing Connection.'');

  };

  }

  function disconnect() {

  if (ws != null) {

  ws.close();

  ws = null;

  }

  setConnected(false);

  }

  function echo() {

  if (ws != null) {

  var message = document.getElementById(''message'').value;

  log(''Sent: '' + message);

  ws.send(message);

  } else {

  alert(''connection not established, please connect.'');

  }

  }

  function log(message) {

  var console = document.getElementById(''logging'');

  var p = document.createElement(''p'');

  p.appendChild(document.createTextNode(message));

  console.appendChild(p);

  while (console.childNodes.length > 12) {

  console.removeChild(console.firstChild);

  }

  console.scrollTop = console.scrollHeight;

  }

  ```


  这里有几个函数。第一个 `connect` 会在按下 **Connect** 按钮时被调用；这将打开一个到 `ws://localhost:8080/echo`
  的 WebSocket 连接，该地址正是之前创建并注册的处理器。连接到服务器会创建一个 `WebSocket` JavaScript 对象，这使您能够在客户端监听消息和事件。这里定义了
  `onopen`、`onmessage` 和 `onclose` 回调。最重要的是 `onmessage`，因为每当有消息从服务器传入时它都会被调用；此方法简单地调用
  `log` 函数，该函数会将接收到的消息添加到屏幕上的 `logging` 元素中。


  接下来是 `disconnect`，它将关闭 WebSocket 连接并清理 JavaScript 对象。最后是 `echo` 函数，它会在按下 **Echo
  message** 按钮时被调用。给定的消息将被发送到服务器（并最终被返回）。


  要使用 `app.js`，请添加以下 `index.html`。


  ```


  Connect

  Disconnect


  Echo message


  Logging


  ```


  现在部署应用程序后，您可以连接到回声 WebSocket 服务，发送一些消息，并让它们被返回（图 5-5）。


  ![../images/464036_1_En_5_Chapter/464036_1_En_5_Fig5_HTML.jpg](img/464036_1_En_5_Fig5_HTML.jpg)


  图 5-5


  WebSocket 客户端输出




  #### 编写集成测试


  编写集成测试需要一些准备工作。需要与服务器建立 WebSocket 连接，手动发送消息并检查响应。但在此之前，需要先启动服务器。


  要启动服务器，请使用 `@RunWith(SpringRunner.class)` 和 `@SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)`
  注解一个类。我们实际上希望启动应用程序，而不是默认的 `WebEnvironment.MOCK`。在 `int` 字段上使用 `@LocalServerPort`
  注解来获取实际的端口值。该值用于构造要连接的 `URI`。


  ```

  package com.apress.springbootrecipes.echo;

  @RunWith(SpringRunner.class)

  @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

  public class EchoHandlerIntegrationTest {

  @LocalServerPort

  private int port;

  }

  ```


  使用默认的 Java WebSocket API 测试 WebSocket 相当容易。为了进行测试，你可以编写一个基本的 WebSocket 客户端，用于记录接收到的消息和会话。为此，你需要一个
  WebSocket 客户端，例如 Tomcat。


  ```

  org.apache.tomcat.embed

  tomcat-embed-websocket

  test


  ```


  然而，添加此客户端将导致启动 Tomcat 服务器，而不是我们想要的响应式 Netty。将以下内容添加到 `EchoHandlerIntegrationTest`
  中以规避此问题。


  ```

  public class EchoHandlerIntegrationTest {

  // 类的其余部分已省略

  @Configuration

  @Import(EchoApplication.class)

  public static class EchoHandlerIntegrationTestConfiguratation {

  @Bean

  public NettyReactiveWebServerFactory webServerFactory() {

  return new NettyReactiveWebServerFactory();

  }

  }

  }

  ```


  这个额外的 `@Configuration` 类将显式启动 Netty 而不是 Tomcat。这样，我们就能在与正常运行应用程序时相同的运行时环境下进行测试。根据你的客户端（或测试方式），这可能不是必需的。


  现在，使用 `@ClientEndpoint` 注解一个类，并使用 `@OnOpen`、`@OnClose` 和 `@OnMessage` 注解该类中的方法。这些带注解的方法将分别在连接打开、关闭和收到消息时接收回调。接下来是两个辅助方法：`sendTextAndWait`
  和 `closeAndWait`。`sendTextAndWait` 将使用 `Session` 发送消息并等待响应。`closeAndWait` 将关闭会话并等待确认。最后，还有一些
  getter 方法用于获取状态并在测试方法中进行验证。


  ```

  @ClientEndpoint

  public static class SimpleTestClientEndpoint {

  private List received = new ArrayList();

  private Session session;

  private CloseReason closeReason;

  private boolean closed = false;

  @OnOpen

  public void onOpen(Session session) {

  this.session = session;

  }

  @OnClose

  public void onClose(Session session, CloseReason reason) {

  this.closeReason = reason;

  this.closed = true;

  }

  @OnMessage

  public void onMessage(String message) {

  this.received.add(message);

  }

  public void sendTextAndWait(String text, long timeout)

  throws IOException, InterruptedException {

  var current = received.size();

  session.getBasicRemote().sendText(text);

  wait(() -> received.size() == current, timeout);

  }

  public void closeAndWait(long timeout)

  throws IOException, InterruptedException {

  if (session != null && !closed) {

  session.close();

  }

  wait(() -> closeReason == null, timeout);

  }

  private void wait(Supplier condition, long timeout)

  throws InterruptedException {

  var waited = 0;

  while (condition.get() && waited  getReceived() {

  return this.received;

  }

  public boolean isClosed() {

  return closed;

  }

  }

  ```


  现在辅助类已就绪，可以编写测试了。使用 WebSocket `ContainerProvider` 获取容器。在进行实际连接之前，必须使用 `port` 字段构造
  URI。接下来，使用 `connectToServer` 方法，通过 `SimpleTestClientEndpoint` 的实例连接到服务器。连接后，向服务器发送一条文本消息，等待一段时间，然后关闭连接（仅用于清理资源）。最后一步是对接收到的消息进行一些断言。


  ```

  @Test

  public void sendAndReceiveMessage() throws Exception {

  var container = ContainerProvider.getWebSocketContainer();

  var uri = URI.create("ws://localhost:" + port + "/echo");

  var testClient = new SimpleTestClientEndpoint();

  container.connectToServer(testClient, uri);

  testClient.sendTextAndWait("Hello World!", 200);

  testClient.closeAndWait(2);

  assertThat(testClient.getReceived())

  .containsExactly("RECEIVED: Hello World!");

  }

  ```


