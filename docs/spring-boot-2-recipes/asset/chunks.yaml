    that the output is what is expected from this test.


    ## 2.4 Configure Logging


    ### Problem


    You want to configure log levels for certain loggers.


    ### Solution


    With Spring Boot you can configure the logging framework and configuration.'
  trans: '

    #### 编写单元测试


    首先，让我们为计算器的一个组件编写一个简单的单元测试——`MultiplicationTest`，它将测试`Multiplication`类。


    ```

    public class MultiplicationTest {

    private final Multiplication addition = new Multiplication();

    @Test

    public void shouldMatchOperation() {

    assertThat(addition.handles(''*'')).isTrue();

    assertThat(addition.handles(''/'')).isFalse();

    }

    @Test

    public void shouldCorrectlyApplyFormula() {

    assertThat(addition.apply(2, 2)).isEqualTo(4);

    assertThat(addition.apply(12, 10)).isEqualTo(120);

    }

    }

    ```


    这是一个基础的单元测试。我们实例化了`Multiplication`，调用其方法并验证结果。第一个测试将验证它是否确实响应`*`运算符，而非其他运算符。第二个测试将验证实际的乘法逻辑。要使一个方法成为测试方法（针对
    JUnit 4），你需要使用`@Test`对其进行注解。


    #### 在单元测试中模拟依赖


    有时一个类需要依赖；然而，你希望测试仅针对单个组件（在编写单元测试时）。Spring Boot 自动引入了 Mockito 框架，这对于模拟类并记录其行为非常方便。为`Calculator`编写测试需要额外的组件，因为它将实际计算委托给了可用的`Operation`类。为了测试`Calculator`的正确行为，我们需要创建一个`Operation`的模拟对象，并将其注入到`Calculator`中。


    ```

    public class CalculatorTest {

    private Calculator calculator;

    private Operation mockOperation;

    @Before

    public void setup() {

    mockOperation = Mockito.mock(Operation.class);

    calculator = new Calculator(Collections.singletonList(mockOperation));

    }

    @Test(expected = IllegalArgumentException.class)

    public void throwExceptionWhenNoSuitableOperationFound() {

    when(mockOperation.handles(anyChar())).thenReturn(false);

    calculator.calculate(2, 2, ''*'');

    }

    @Test

    public void shouldCallApplyMethodWhenSuitableOperationFound() {

    when(mockOperation.handles(anyChar())).thenReturn(true);

    when(mockOperation.apply(2, 2)).thenReturn(4);

    calculator.calculate(2, 2, ''*'');

    verify(mockOperation, times(1)).apply(2,2);

    }

    }

    ```


    在`@Before`方法中，我们通过调用`Mockito.mock`来模拟`Operation`，并使用模拟的操作构造`Calculator`。该模拟对象在测试方法中被用于定义特定行为。在第一个测试方法中，我们想测试找不到合适操作的情况，因此我们指示模拟对象在调用`handles`方法时返回`false`。该测试预期会抛出一个异常；如果异常发生，测试将通过。第二个测试用于检查是否遵循了正确的流程；我们想测试正确的行为。模拟对象被指示为`handles`方法返回`true`，并为`apply`方法返回一个值。


    #### 使用 Spring Boot 进行集成测试


    Spring Boot 提供了多个注解来辅助测试。第一个是`@SpringBootTest`，它会使测试成为一个 Spring Boot 驱动的测试。这意味着测试上下文框架将搜索带有`@SpringBootApplication`注解的类（如果没有传递特定配置），并使用它来实际启动应用程序。


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(classes = CalculatorApplication.class)

    public class CalculatorApplicationTests {

    @Autowired

    private Calculator calculator;

    @Test(expected = IllegalArgumentException.class)

    public void doingDivisionShouldFail() {

    calculator.calculate(12,13, ''/'');

    }

    }

    ```


    上述测试将启动`CalculatorApplication`并注入完全配置好的`Calculator`。然后我们可以编写一个测试，在本例中是一个计算器无法处理的情况，并为其编写预期结果。


    进行计算时，输出会打印到控制台；使用`OutputCapture` JUnit 规则，我们还可以编写一个成功测试并测试输出的内容。


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(classes = CalculatorApplication.class)

    public class CalculatorApplicationTests {

    @Rule

    public OutputCapture capture = new OutputCapture();

    @Autowired

    private Calculator calculator;

    @Test

    public void doingMultiplicationShouldSucceed() {

    calculator.calculate(12,13, ''*'');

    capture.expect(Matchers.containsString("12 * 13 = 156"));

    }

    @Test(expected = IllegalArgumentException.class)

    public void doingDivisionShouldFail() {

    calculator.calculate(12,13, ''/'');

    }

    }

    ```


    `@Rule`将配置给定的 JUnit 规则，在本例中是`OutputCapture`规则，它随 Spring Boot 一起提供，并拦截`System.out`和`System.err`，以便可以对在这些流上生成的输出编写断言。在这个例子中，我们执行乘法运算，输出应反映这一点。


    #### 使用 Spring Boot 和模拟对象进行集成测试


    Spring Boot 使得在应用程序上下文中用模拟对象替换 bean 变得容易。为此，Spring Boot 引入了`@MockBean`注解。


    ```

    @MockBean

    private Calculator calculator

    ```


    这将用模拟实例替换整个计算器；要使用它，你需要使用常规的 Mockito 方式定义行为。当存在多个特定类型的 bean 时，你需要指定要替换的 bean 的`name`。


    ```

    @MockBean(name ="addition")

    private Operation mockOperation;

    ```


    这将用模拟实例替换常规的`Addition` bean，然后我们可以用它来注册模拟行为。如果找不到具有该名称的 bean，则模拟 bean 将作为该 bean
    的新实例注册。


    ```

    @MockBean(name ="division")

    private Operation mockOperation;

    ```


    这不会替换现有的 bean，而是向应用程序上下文添加一个 bean，结果`Calculator`将有一个额外的操作添加到它可以处理的`operations`中。你可以使用
    Spring 测试框架中的`ReflectionTestUtils`辅助类来测试这一点。


    ```

    @Test

    public void calculatorShouldHave3Operations() {

    Object operations =

    ReflectionTestUtils.getField(calculator, "operations");

    assertThat((Collection) operations).hasSize(3);

    }

    ```


    这将通过反射获取`operations`字段，并断言集合大小为 3。当移除`@MockBean`注解（或将名称更改为`addition`）时，此测试将失败，因为现在只注册了两个操作。


    使用模拟对象很简单：


    ```

    @Test

    public void mockDivision() {

    when(mockOperation.handles(''/'')).thenReturn(true);

    when(mockOperation.apply(14, 7)).thenReturn(2);

    calculator.calculate(14,7, ''/'');

    capture.expect(Matchers.containsString("14 / 7 = 2"));

    }

    ```


    这里我们指示 Mockito 在测试`/`时返回`true`，并在调用`apply`方法时返回一个值。接下来，调用该方法，并断言输出符合此测试的预期。


    ## 2.4 配置日志记录


    ### 问题


    您想要为某些日志记录器配置日志级别。


    ### 解决方案


    使用 Spring Boot，您可以配置日志记录框架和配置。

    '
- fmt: '### How It Works


    Spring Boot ships with a default configuration for the supported log providers
    (Logback, Log4j 2, and Java Util Logging). Next to the default configuration,
    it also adds support for configuring the logging levels through the regular `application.properties`
    as well as specifying patterns and where to, optionally, write log files to.


    Spring Boot uses SLF4J as the logging API, and when writing components you should
    use those interfaces to write your logging. That way you have a choice of which
    logging framework to use.


    #### Configure Logging


    One of the general things to do with a logging framework is to enable or disable
    logging for parts of the framework. With Spring Boot you can do this by adding
    some lines to your `application.properties`. The lines need to be prefixed with
    `logging.level` followed by the name of the logger and finally the level you want
    it to be.


    ```

    logging.level.org.springframework.web=DEBUG

    ```


    The preceding line will enable DEBUG logging for the `org.springframework.web`
    logger (generally all classes in that package and subpackages). To set the level
    of the root logger, use `logging.level.root=<level>`. This will set the default
    level of logging.


    #### Logging to File


    By default, Spring Boot will only log to the console. If you want to write to
    a file as well, you need to specify either `logging.file` or `logging.path`. The
    first takes the name of the file; the second, the path. The default filename used
    is `spring.log` and the default directory used is the Java temp directory.


    ```

    logging.file=application.log

    logging.path=/var/log

    ```


    With this configuration, a logfile named `application.log` will be written to
    the `/var/log` directory.


    When writing logs to a file, you might want to prevent the logfiles from flooding
    your system. You can specify how many files to retain with the `logging.file.max-history`
    (default is `0` meaning unlimited) and `logging.file.max-size` to specify the
    file size (default is 10MB).


    #### Using Your Preferred Logging Provider


    Spring Boot by default uses Logback as the provider for the logging. It does,
    however, support Java Util Logging as well as Log4j 2. To use another logging
    framework, you will have to first exclude the default framework and include your
    own. Spring Boot has a `spring-boot-starter-log4j2` to include all necessary dependencies
    for Log4j 2. To exclude the default Logback logging, you need to add an exclusion
    rule to the `spring-boot-starter` dependency; this is the main dependency that
    brings in the logging.


    ```

    org.springframework.boot

    spring-boot-starter


    org.springframework.boot

    spring-boot-starter-logging


    org.springframework.boot

    spring-boot-starter-log4j2

    ```


    ### Note


    Spring Boot 2 doesn’t support the older Log4j framework; it supports its successor,
    Log4j 2!


    ## 2.5 Reusing Existing Configuration


    ### Problem


    You have an existing, non-Spring Boot, application or module and you want to reuse
    the configuration with Spring Boot.


    ### Solution


    To import an existing configuration, add the `@Import` or `@ImportResource` annotation
    to your `@Configuration` or `@SpringBootApplication` annotated class to import
    the configuration.


    ### How It Works


    On your main application class, the one with `@SpringBootApplication`, place the
    `@Import` or `@ImportResource` annotations to let Spring load the additional files.


    #### Reusing Existing XML Configuration


    Find the class with the `@SpringBootApplication` annotation and add the `@ImportResource`
    annotation to it.


    ```

    @SpringBootApplication

    @ImportResource("classpath:application-context.xml")

    public class Application { ... }

    ```


    This configuration will load the `application-context.xml` file from the classpath
    due to the `classpath:` prefix. If the file is somewhere in the file system, you
    can use the `file:` prefix, that is, `file:/var/conf/application-context.xml`.


    When bootstrapping the application, Spring Boot will also load the additional
    configuration from the mentioned XML file.


    #### Reusing Existing Java Configuration


    Find the class with the `@SpringBootApplication` annotation and add the `@Import`
    annotation to it.


    ```

    @SpringBootApplication

    @Import(ExistingConfiguration.class)

    public class Application { ... }

    ```


    The `@Import` will take care of adding the mentioned class to the configuration.
    This can be needed if you want to include things not covered in the component
    scan or if you have disabled auto detection of `@Configuration` classes.


    # 3. Spring MVC


    Spring Boot will automatically configure a web application when it finds the classes
    on the classpath. It will also start an embedded server (by default it will launch
    an embedded Tomcat).


    ## 3.1 Getting Started with Spring MVC


    ### Problem


    You want to use Spring Boot to power a Spring MVC application.


    ### Solution


    Spring Boot will do auto-configuration for the components needed for Spring MVC.
    To enable this, Spring Boot needs to be able to detect the Spring MVC classes
    on its classpath. For this you will need to add the `spring-boot-starter-web`
    as a dependency.'
