    ##### JNDI


    将 Spring Boot 应用程序部署到 JEE 容器时，您很可能也想使用该容器中预先注册的 `ConnectionFactory`。要启用此功能，您需要依赖
    `spring-jms` 库和 `javax.jms-api`（后者可能可以标记为 provided，因为它将由您的 JEE 容器提供）。您可以使用其中一个
    starter 并排除显式的 ActiveMQ 或 Artemis 依赖项；但是，仅声明所需的依赖项更简单明了。


    ```

    org.springframework

    spring-jms


    javax.jms

    javax.jms-api

    provided


    ```


    当 JNDI 可用时，Spring Boot 将首先尝试在 JNDI 注册表中以众所周知的名称 `java:/JmsXA` 和 `java:/XAConnectionFactory`
    或通过 `spring.jms.jndi-name` 属性指定的名称来检测 `ConnectionFactory`。此外，它还会自动创建一个 `JndiDestinationResolver`，以便队列和主题也会在
    JNDI 中被检测到；默认情况下，允许回退到动态创建目标。


    ```

    spring.jms.jndi-name=java:/jms/connectionFactory

    ```


    完成这些设置并构建好您的 WAR（参见配方 11.2）后，您现在可以将应用程序部署到 JEE 容器，并重用现有的 `ConnectionFactory`。


    #### 手动配置


    配置 JMS 的最后一种方法是进行手动配置。为此，您至少需要 `spring-jms` 和 `javax.jms-api` 依赖项，以及可能用于您正在使用的
    JMS 代理的一些客户端库。在以下情况下可能需要手动配置：


    1.  Spring Boot 无法自动配置您的 `ConnectionFactory`。


    2.  需要对 `ConnectionFactory` 进行大量设置。


    3.  需要多个 `ConnectionFactory` 实例。


    要配置 `ConnectionFactory`，您可以添加一个带有 `@Bean` 注解的方法来构造一个。


    ```

    @Bean

    public ConnectionFactory connectionFactory() {

    var connectionFactory = new ActiveMQConnectionFactory("vm://localhost?broker.persistent=false");

    connectionFactory.setClientID("someId");

    connectionFactory.setCloseTimeout(125);

    return connectionFactory;

    }

    ```


    这将为 ActiveMQ 创建一个 `ConnectionFactory`；它将使用一个非持久化的嵌入式代理，并设置 `clientId` 和 `closeTimeout`。当
    Spring Boot 检测到预先配置的 `ConnectionFactory` 时，它不会尝试自己创建一个。


    ## 9.2 使用 JMS 发送消息


    ### 问题


    您希望通过 JMS 向其他系统发送消息。


    ### 解决方案


    使用 Spring Boot 提供的 `JmsTemplate` 来发送和（可选地）转换消息。

