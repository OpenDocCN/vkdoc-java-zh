- fmt: "### Initializing the Database with Spring Boot\n\nWhen working with an existing\
    \ database, you probably already have existing tables, views, and procedures.\
    \ However, when you create a new database it is empty and you will need to create\
    \ the tables yourself. Using Spring Boot, this is supported out-of-the-box. You\
    \ can add a `schema.sql` to initialize the schema (tables, views, etc.) and a\
    \ `data.sql` to insert data into the tables. Spring Boot will also allow you to\
    \ provide a `schema-<db-platform>.sql` and `data-<db-platform>.sql` to do database-specific\
    \ initialization. The value for `<db-platform>` is read from the `spring.datasource.platform`\
    \ property (see also Table [7-2](#464036_1_En_7_Chapter.xhtml#Tab2)). When using\
    \ Derby, you could add a `schema-derby.sql`, etc. The name of the schema and data\
    \ files can be changed through the `spring.datasource.schema` and `spring.datasource.data`\
    \ properties. See Table [7-2](#464036_1_En_7_Chapter.xhtml#Tab2) for a description\
    \ of available properties.\n\n**Table 7-2** DataSource Initialize Properties\n\
    \n| Property | Description |\n| --- | --- |\n| `spring.datasource.continue-on-error`\
    \ | Whether to stop if an error occurs while initializing the database, default\
    \ `false` |\n| `spring.datasource.data` | Data (DML) script resource references,\
    \ default `classpath:data` |\n| `spring.datasource.data-password` | Password of\
    \ the database to execute DML scripts, defaults to the normal password |\n| `spring.datasource.data-username`\
    \ | Username of the database to execute DML scripts, defaults to the normal username\
    \ |\n| `spring.datasource.initialization-mode` | Initialize the datasource with\
    \ available DDL and DML scripts. Default `EMBEDDED`, can be changed to `NEVER`\
    \ or `ALWAYS` |\n| `spring.datasource.platform` | Platform to use in the DDL or\
    \ DML scripts (such as `schema-${platform}.sql` or `data-${platform}.sql`). Defaults\
    \ is `all`. |\n| `spring.datasource.schema` | Data (DDL) script resource references,\
    \ default `classpath:schema` |\n| `spring.datasource.schema-password` | Password\
    \ of the database to execute DDL scripts, defaults to the normal password. |\n\
    | `spring.datasource.schema-username` | Username of the database to execute DDL\
    \ scripts, defaults to the normal username |\n| `spring.datasource.separator`\
    \ | Statement separator in SQL initialization scripts. Default `;` |\n| `spring.datasource.sql-script-encoding`\
    \ | SQL scripts encoding. Defaults to platform encoding |\n\nLet’s create a table\
    \ `customer` and insert some data into this. To create the table, add the following\
    \ `schema.sql` to the `src/main/resources` directory:\n\n```sql\nDROP TABLE IF\
    \ EXISTS customer;\nCREATE TABLE customer (\nid SERIAL PRIMARY KEY,\nname VARCHAR(100)\
    \ NOT NULL,\nemail VARCHAR(255) NOT NULL,\nUNIQUE(name)\n);\n```\n\nTo insert\
    \ the data, add the `data.sql` to the `src/main/resources` directory.\n\n```sql\n\
    INSERT INTO customer (name, email) VALUES\n('Marten Deinum', 'marten.deinum@conspect.nl'),\n\
    ('Josh Long', 'jlong@pivotal.com'),\n('John Doe', 'john.doe@island.io'),\n('Jane\
    \ Doe', 'jane.doe@island.io');\n```\n\nTo see if this is working, let’s add another\
    \ `ApplicationRunner` that prints the content of the `customer` table using the\
    \ `DataSource`.\n\n```java\npackage com.apress.springboot2recipes.jdbc;\n// Imports\
    \ removed\n@SpringBootApplication\npublic class JdbcApplication {\npublic static\
    \ void main(String[] args) {\nSpringApplication.run(JdbcApplication.class, args);\n\
    }\n}\n... // Other code removed\n@Component\nclass CustomerLister implements ApplicationRunner\
    \ {\nprivate final Logger logger = LoggerFactory.getLogger(getClass());\nprivate\
    \ final DataSource dataSource;\nCustomerLister(DataSource dataSource) {\nthis.dataSource\
    \ = dataSource;\n}\n@Override\npublic void run(ApplicationArguments args) throws\
    \ Exception {\nvar query = \"SELECT id, name, email FROM customer\";\ntry (var\
    \ con = dataSource.getConnection();\nvar stmt = con.createStatement();\nvar rs\
    \ = stmt.executeQuery(query)) {\nwhile (rs.next()) {\nlogger.info(\"Customer [id={},\
    \ name={}, email={}]\",\nrs.getLong(1), rs.getString(2), rs.getString(3));\n}\n\
    }\n}\n}\n```\n\nDatabase initialization is always on for embedded databases, so\
    \ when using Derby, H2, or HSQLDB, this is default on. When using an external\
    \ database, the initialization doesn’t happen by default. To change this you can\
    \ toggle the `spring.datasource.initialization-mode` property to `always`, so\
    \ that it will always run.\n\n```properties\nspring.datasource.initialization-mode=always\n\
    ```\n\nWhen the application starts, you will now see the list of customers from\
    \ the database being printed in the logs.\n\n### Initializing the Database with\
    \ Flyway\n\nWhen developing an application, you want more control of the database\
    \ migration. Using a `schema.sql` and `data.sql` can work very well and quickly,\
    \ but it eventually will be cumbersome to maintain. Spring Boot also supports\
    \ Flyway^([^(29)](#fn29)) which is, simply said, a version control for your database\
    \ schema. It allows you to incrementally change/update your database schema. To\
    \ use Flyway the first thing to do is to add the dependency on Flyway itself.\n\
    \n```xml\n<dependency>\n    <groupId>org.flywaydb</groupId>\n    <artifactId>flyway-core</artifactId>\n\
    </dependency>\n```\n\nSpring Boot will detect the presence of Flyway and it will\
    \ assume you want to use it to do database migrations. The migration scripts should\
    \ be in the `db/migration` folder in `src/main/resources`.\n\n```sql\nCREATE TABLE\
    \ customer (\nid SERIAL PRIMARY KEY,\nname VARCHAR(100) NOT NULL,\nemail VARCHAR(255)\
    \ NOT NULL,\nUNIQUE(name)\n);\nINSERT INTO customer (name, email) VALUES\n('Marten\
    \ Deinum', 'marten.deinum@conspect.nl'),\n('Josh Long', 'jlong@pivotal.com'),\n\
    ('John Doe', 'john.doe@island.io'),\n('Jane Doe', 'jane.doe@island.io');\n```\n\
    \nThis SQL, when put in a `V1__first.sql` in the `db/migration` folder, will be\
    \ executed on startup (assuming an empty database). The naming convention by default\
    \ is `V<sequence>__<name>.sql` and is used to determine what to execute. Once\
    \ a script has been executed, you cannot (and shouldn’t) modify the script. That\
    \ will lead to Flyway preventing your application from starting. It detects changes\
    \ in scripts already executed.\n\nWhen running the application the customers should\
    \ still be listed. You will notice an additional table in the table listing (Figure\
    \ [7-3](#464036_1_En_7_Chapter.xhtml#Fig3)), the `flyway_schema_history`. This\
    \ table contains the metadata used by Flyway to detect (and guard) database changes.\n\
    \n![../images/464036_1_En_7_Chapter/464036_1_En_7_Fig3_HTML.jpg](images/464036_1_En_7_Chapter/464036_1_En_7_Fig3_HTML.jpg)\n\
    \n**Figure 7-3** Table listing with Flyway\n\nThere are also several properties\
    \ you can use to configure Flyway with Spring Boot. See Table [7-3](#464036_1_En_7_Chapter.xhtml#Tab3)\
    \ for the most commonly used properties.\n\n**Table 7-3** Commonly Used Flyway\
    \ Properties\n\n| Property | Description |\n| --- | --- |\n| `spring.flyway.enabled`\
    \ | Should Flyway be enabled, default `true` |\n| `spring.flyway.locations` |\
    \ The locations of migrations scripts, default `classpath:db/migration` |\n| `spring.flyway.url`\
    \ | JDBC URL of the database to migrate, when not set uses the default configured\
    \ `DataSource` |\n| `spring.flyway.user` | Username to use for the database if\
    \ Flyway uses its own `DataSource` configuration |\n| `spring.flyway.password`\
    \ | Password to use for the database if Flyway uses its own `DataSource` configuration\
    \ |\n\n## 7.2 Use JdbcTemplate\n\n### Problem\n\nYou want to use `JdbcTemplate`\
    \ or `NamedParameterJdbcTemplate` to have a better JDBC experience.\n\n### Solution\n\
    \nUse the automatically configured `JdbcTemplate` or `NamedParameterJdbcTemplate`\
    \ to execute the queries and handle the results."
  raw: '#### Initializing the Database with Spring Boot


    When working with an existing database, you probably already have existing tables,
    views, and procedures. However, when you create a new database it is empty and
    you will need to create the tables yourself. Using Spring Boot, this is supported
    out-of-the-box. You can add a `schema.sql` to initialize the schema (tables, views,
    etc.) and a `data.sql` to insert data into the tables. Spring Boot will also allow
    you to provide a `schema-<db-platform>.sql` and `data-<db-platform>.sql` to do
    database-specific initialization. The value for `<db-platform>` is read from the
    `spring.datasource.platform` property (see also Table [7-2](#464036_1_En_7_Chapter.xhtml#Tab2)).
    When using Derby, you could add a `schema-derby.sql`, etc. The name of the schema
    and data files can be changed through the `spring.datasource.schema` and `spring.datasource.data`
    properties. See Table [7-2](#464036_1_En_7_Chapter.xhtml#Tab2) for a description
    of available properties.


    Table 7-2


    DataSource Initialize Properties


    | Property | Description |

    | --- | --- |

    | `spring.datasource.continue-on-error` | Whether to stop if an error occurs while
    initializing the database, default `false` |

    | `spring.datasource.data` | Data (DML) script resource references, default `classpath:data`
    |

    | `spring.datasource.data-password` | Password of the database to execute DML
    scripts, defaults to the normal password |

    | `spring.datasource.data-username` | Username of the database to execute DML
    scripts, defaults to the normal username |

    | `spring.datasource.initialization-mode` | Initialize the datasource with available
    DDL and DML scripts. Default `EMBEDDED`, can be changed to `NEVER` or `ALWAYS`
    |

    | `spring.datasource.platform` | Platform to use in the DDL or DML scripts (such
    as schema-${platform}.sql or data-${platform}.sql). Defaults is `all`. |

    | `spring.datasource.schema` | Data (DDL) script resource references, default
    `classpath:schema` |

    | `spring.datasource.schema-password` | Password of the database to execute DDL
    scripts, defaults to the normal password. |

    | `spring.datasource.schema-username` | Username of the database to execute DDL
    scripts, defaults to the normal username |

    | `spring.datasource.separator` | Statement separator in SQL initialization scripts.
    Default `;` |

    | `spring.datasource.sql-script-encoding` | SQL scripts encoding. Defaults to
    platform encoding |


    Let’s create a table `customer` and insert some data into this. To create the
    table, add the following `schema.sql` to the `src/main/resources` directory:


    ```

    DROP TABLE IF EXISTS customer;

    CREATE TABLE customer (

    id SERIAL PRIMARY KEY,

    name VARCHAR(100) NOT NULL,

    email VARCHAR(255) NOT NULL,

    UNIQUE(name)

    );

    ```


    To insert the data, add the `data.sql` to the `src/main/resources` directory.


    ```

    INSERT INTO customer (name, email) VALUES

    (''Marten Deinum'', ''marten.deinum@conspect.nl''),

    (''Josh Long'', ''jlong@pivotal.com''),

    (''John Doe'', ''john.doe@island.io''),

    (''Jane Doe'', ''jane.doe@island.io'');

    ```


    To see if this is working, let’s add another `ApplicationRunner` that prints the
    content of the `customer` table using the `DataSource`.


    ```

    package com.apress.springboot2recipes.jdbc;

    // Imports removed

    @SpringBootApplication

    public class JdbcApplication {

    public static void main(String[] args) {

    SpringApplication.run(JdbcApplication.class, args);

    }

    }

    ... // Other code removed

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final DataSource dataSource;

    CustomerLister(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    var query = "SELECT id, name, email FROM customer";

    try (var con = dataSource.getConnection();

    var stmt = con.createStatement();

    var rs = stmt.executeQuery(query)) {

    while (rs.next()) {

    logger.info("Customer [id={}, name={}, email={}]",

    rs.getLong(1), rs.getString(2), rs.getString(3));

    }

    }

    }

    }

    ```


    Database initialization is always on for embedded databases, so when using Derby,
    H2, or HSQLDB, this is default on. When using an external database, the initialization
    doesn’t happen by default. To change this you can toggle the `spring.datasource.initialization-mode`
    property to `always`, so that it will always run.


    ```

    spring.datasource.initialization-mode=always

    ```


    When the application starts, you will now see the list of customers from the database
    being printed in the logs.


    #### Initializing the Database with Flyway


    When developing an application, you want more control of the database migration.
    Using a `schema.sql` and `data.sql` can work very well and quickly, but it eventually
    will be cumbersome to maintain. Spring Boot also supports Flyway^([^(29)](#fn29))
    which is, simply said, a version control for your database schema. It allows you
    to incrementally change/update your database schema. To use Flyway the first thing
    to do is to add the dependency on Flyway itself.


    ```

    org.flywaydb

    flyway-core


    ```


    Spring Boot will detect the presence of Flyway and it will assume you want to
    use it to do database migrations. The migration scripts should be in the `db/migration`
    folder in `src/main/resources`.


    ```

    CREATE TABLE customer (

    id SERIAL PRIMARY KEY,

    name VARCHAR(100) NOT NULL,

    email VARCHAR(255) NOT NULL,

    UNIQUE(name)

    );

    INSERT INTO customer (name, email) VALUES

    (''Marten Deinum'', ''marten.deinum@conspect.nl''),

    (''Josh Long'', ''jlong@pivotal.com''),

    (''John Doe'', ''john.doe@island.io''),

    (''Jane Doe'', ''jane.doe@island.io'');

    ```


    This SQL, when put in a `V1__first.sql` in the `db/migration` folder, will be
    executed on startup (assuming an empty database). The naming convention by default
    is `V<sequence__<name>.sql` and is used to determine what to execute. Once a script
    has been executed, you cannot (and shouldn’t) modify the script. That will lead
    to Flyway preventing your application from starting. It detects changes in scripts
    already executed.


    When running the application the customers should still be listed. You will notice
    an additional table in the table listing (Figure [7-3](#464036_1_En_7_Chapter.xhtml#Fig3)),
    the `flyway_schema_history` . This table contains the metadata used by Flyway
    to detect (and guard) database changes.


    ![../images/464036_1_En_7_Chapter/464036_1_En_7_Fig3_HTML.jpg](images/464036_1_En_7_Chapter/464036_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Table listing with Flyway


    There are also several properties you can use to configure Flyway with Spring
    Boot. See Table [7-3](#464036_1_En_7_Chapter.xhtml#Tab3) for the most commonly
    used properties.


    Table 7-3


    Commonly Used Flyway Properties


    | Property | Description |

    | --- | --- |

    | `spring.flyway.enabled` | Should Flyway be enabled, default `true` |

    | `spring.flyway.locations` | The locations of migrations scripts, default `classpath:db/migration`
    |

    | `spring.flyway.url` | JDBC URL of the database to migrate, when not set uses
    the default configured `DataSource` |

    | `spring.flyway.user` | Username to use for the database if Flyway uses its own
    `DataSource` configuration |

    | `spring.flyway.password` | Password to use for the database if Flyway uses its
    own `DataSource` configuration |


    ## 7.2 Use JdbcTemplate


    ### Problem


    You want to use `JdbcTemplate` or `NamedParameterJdbcTemplate` to have a better
    JDBC experience.


    ### Solution


    Use the automatically configured `JdbcTemplate` or `NamedParameterJdbcTemplate`
    to execute the queries and handle the results.'
