  raw: '### Tip


    It generally is a good idea to explicitly define type mappings. This way you don’t
    explicitly bind two or more applications together on the Java level. They can
    use their own mapping for `order` to their own `Order` class.


    With all this in place, we can write a test to see if orders are actually being
    sent.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest

    public class JmsSenderApplicationTest {

    @Autowired

    private JmsTemplate jms;

    @Test

    public void shouldReceiveOrderPlain() throws Exception {

    Message message = jms.receive("orders");

    assertThat(message)

    .isInstanceOf(BytesMessage.class);

    BytesMessage msg = (BytesMessage) message;

    ObjectMapper mapper = new ObjectMapper();

    byte[] content = new byte[(int) msg.getBodyLength()];

    msg.readBytes(content);

    Order order = mapper.readValue( content, Order.class);

    assertThat(order).hasNoNullFieldsOrProperties();

    }

    @Test

    public void shouldReceiveOrderWithConversion() throws Exception {

    Order order = (Order) jms.receiveAndConvert("orders");

    System.out.println(order);

    assertThat(order).hasNoNullFieldsOrProperties();

    }

    }

    ```


    There are two test methods here: the plain one does manual conversion of the message
    to an `Order,` whereas the second uses the `receiveAndConvert` method to have
    the conversion done for you. This to show what the `MessageConverter` is doing
    and that it makes your code more readable. The `MappingJackson2MessageConverter`
    converts the `Order` into a `BytesMessages`. To use a `TextMessage`, you can set
    the `targetType` property to `TEXT.` You will then recieve a `TextMessage` with
    a JSON as a `String` as the payload.


    ## 9.3 Receive Messages Using JMS


    ### Problem


    You want to read messages from a JMS destination so that you can handle them in
    your application.


    ### Solution


    Create a class and annotate methods with `@JmsListener` to bind it to a destination
    and handle incoming messages.


    ### How It Works


    You can create a POJO and annotate its methods with `@JmsListener`. Spring will
    detect this and create a JMS listener for it. Spring Boot exposes properties to
    configure the listeners under the `spring.jms.listener` namespace.


    #### Receiving Messages


    Let’s create a service that listens to the message sent by the sender from Recipe
    9.2.


    ```

    @Component

    class CurrentDateTimeService {

    @JmsListener(destination = "time-queue")

    public void handle(Message msg) throws JMSException {

    Assert.state(msg instanceof TextMessage, "Can only handle TextMessage.");

    System.out.println("[RECEIVED] - " + ((TextMessage) msg).getText());

    }

    }

    ```


    It is a regular class and has a method annotated with `@JmsListener`, which requires
    at least a `destination` so that it knowns where to retrieve messages from. It
    accepts a `javax.jms.Message`, which we validate to be a `TextMessage` and print
    the content to the console. The method signature of a `@JmsListener` annotated
    method is somewhat flexible, as it allows for several arguments either annotated
    or from a specific type (Table [9-6](#464036_1_En_9_Chapter.xhtml#Tab6)).


    Table 9-6


    Allowed Method Parameter Types


    | Type | Description |

    | --- | --- |

    | `java.lang.String` | Get message payload as `String` only for `TextMessage`
    |

    | `java.util.Map` | Get message payload as `Map` only for `MapMessage` |

    | `byte[]` | Get message payload as `byte[]` only for `BytesMessage` |

    | Serializable object | Deserialize Object from `ObjectMessage` |

    | `javax.jms.Message` | To get the actual JMS message |

    | `javax.jms.Session` | To access the `Session` for access, sending a custom reply
    for instance |

    | `@Header` annotated element | Extract a header from the JMS message |

    | `@Headers` annotated element | Only usable on a `java.util.Map` to get all the
    JMS message headers |


    The listener could be simplified by simply using a `String` as a method argument
    instead of handling the `javax.jms.Message` ourselves.


    ```

    @Component

    class CurrentDateTimeService {

    @JmsListener(destination = "time-queue")

    public void handle(String msg) {

    System.out.println("[RECEIVED] - " + msg);

    }

    }

    ```


    #### Configure the Listener Container


    Spring uses a `JmsListenerContainerFactory` to create the infrastructure needed
    to support the `@JmsListener` annotation. Spring Boot configures a default one,
    which can be configured using properties from the `spring.jms.listener` namespace.
    If that doesn’t suffice, you can always configure your own instance and do all
    the configuration options manually. Spring Boot will then refrain from creating
    `JmsListenerContainerFactory` when it already detects one in the context.


    Table 9-7


    Listener Container Properties


    | Property | Description |

    | --- | --- |

    | `spring.jms.listener.acknowledge-mode` | Acknowledge mode of the container,
    default is automatic. |

    | `spring.jms.listener.auto-startup` | Start the container automatically on startup.
    Default `true` |

    | `spring.jms.listener.concurrency` | Minimum number of concurrent consumers.
    Default is none, leading to 1 concurrent consumer (the Spring default). |

    | `spring.jms.listener.max-concurrency` | Maximum number of concurrent consumers.
    Default is none, leading to 1 concurrent consumer (the Spring default). |

    | `spring.jms.pub-sub-domain` | Default destination is a topic. Default `false`
    meaning queue. |


    The default configured `JmsListenerContainerFactory` will also detect a single,
    unique `DestinationResolver` and `MessageConverter` and when found will use that;
    otherwise it will use the Spring defaults `DynamicDestinationResolver` and `SimpleMessageConverter`
    (see recipe 9.2 for more information).


    #### Use Custom **MessageConverter**


    What if you want to send objects as JSON to the next system over JMS? You can
    rely on Java Serialization, but that generally is frowned upon because that tightly
    couples systems. Using JSON or XML to transfer objects/messages is a better way.
    With Spring JMS it is a matter of configuring a different `MessageConverter` (see
    also Recipe 9.2 on the sending part).


    ```

    @Bean

    public MappingJackson2MessageConverter messageConverter() {

    var messageConverter = new MappingJackson2MessageConverter();

    messageConverter.setTypeIdPropertyName("content-type");

    messageConverter.setTypeIdMappings(singletonMap("order", Order.class));

    return messageConverter;

    }

    ```


    The `MappingJackson2MessageConverter` by default requires a property name to put
    in the identifier for the content type. This will be read from a header in the
    JMS message (here we set it to `content-type`). Next we can, optionally, define
    a mapping between a type and the class. As we want to be able to map objects to
    the `Order` class, we specify that as the mapping for the content-type `order`.


    ```

    @Component

    class OrderService {

    @JmsListener(destination = "orders")

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    ```


    The listener receives the `Order` object, as Spring JMS will take care of receiving
    and converting the messages. If you combine this listener with the order sender
    from Recipe 9.2, you will see a steady stream of orders coming in.'
