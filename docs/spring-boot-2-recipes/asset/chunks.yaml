- fmt: '### How It Works


    When adding the `spring-boot-starter-actuator`, Spring Boot will automatically
    set up the health and metrics based on the beans in the application context. Which
    health and metrics are exposed depends on the beans and features that are enabled.
    When a `DataSource` is detected, metrics for that will be collected and exposed
    as well as health. Spring Boot does this for many components like Hibernate, RabbitMQ,
    Caches, etc.


    To enable the actuator, add the dependency to your application (here we assume
    Recipe 3.3 sources as a starting point).


    ```

    org.springframework.boot

    spring-boot-starter-actuator

    ```


    Now when starting the application, Spring Boot will have the actuator configured
    and it is accessible through JMX (Figure [10-1](#464036_1_En_10_Chapter.xhtml#Fig1),
    and see Recipe 8.4 on how to use JConsole) and through the web (default under
    the `/actuator` path)(see Figure [10-2](#464036_1_En_10_Chapter.xhtml#Fig2)).


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig2_HTML.jpg](images/464036_1_En_10_Chapter/464036_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    HTTP exposed metrics


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig1_HTML.jpg](images/464036_1_En_10_Chapter/464036_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    JMX exposed metrics


    You will notice that JMX exposes a lot more endpoints then HTTP does. HTTP only
    exposes `/actuator/health` and `/actuator/info`. JMX exposed a lot more. This
    is done with security in mind: the `/actuator` is exposed publicly and as such
    you don’t want everyone to see things. What to expose can be configured through
    the `management.endpoints.web.exposure.include` and `management.endpoints.web.exposure.exclude`
    properties. Using a `*` for the `include` will expose all endpoints to the web.


    ```

    management.endpoints.web.exposure.include=*

    ```


    With the preceding configuration added to the `application.properties`, the same
    features will be exposed to the web as through JMX (Figure [10-3](#464036_1_En_10_Chapter.xhtml#Fig3)).


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig3_HTML.jpg](images/464036_1_En_10_Chapter/464036_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    HTTP exposed metrics (all)


    ### Configure the Management Server


    By default, the actuator is available on the same port and address (`http://localhost:8080`)
    as the regular application. It is, however, very easy (and common) to run the
    management endpoints on a different port. This can be configured through properties
    in the `management.server` namespace; most of them mimic the ones in the regular
    `server` namespace (Table [10-1](#464036_1_En_10_Chapter.xhtml#Tab1)).


    Table 10-1


    Management Server Properties


    | Property | Description |

    | --- | --- |

    | `management.server.add-application-context-header` | Add an `X-Application-Context`
    header to the response containing the application context name |

    | `management.server.port` | The port to run the management server on, default
    same as `server.port` |

    | `management.server.address` | The network address to bind to, default same as
    `server.address` (which is `0.0.0.0` all addresses) |

    | `management.server.servlet.context-path` | The context path of the management
    server, default none resulting in `/` |

    | `management.server.ssl.*` | SSL properties to configure SSL for the management
    server (see Recipe 3.8 on how to configure SSL) |


    Adding the following to the `application.properties` will run the management endpoints
    on a separate port and add the `X-Application-Context` header.


    ```

    management.server.add-application-context-header=true

    management.server.port=8090

    ```


    When restarting the application, the management endpoints are now available on
    `http://localhost:8090/actuator`. Running the actuator on a different port has
    the benefit of hiding it from the public internet by blocking the port on the
    firewall and only allowing local access.


    > **Note**: The `management.server` properties are only effective when using an
    embedded server; when deploying to an external server these properties don’t apply
    anymore!


    ### Configure Individual Management Endpoints


    Individual endpoints can be configured through properties in the `management.endpoint.<endpoint-name>`
    namespace. Most of them have at least an `enabled` property and a `cache.time-to-live`
    property. The first will enable or disable the endpoint, the other one specifies
    how long to cache a result of the endpoint (Table [10-2](#464036_1_En_10_Chapter.xhtml#Tab2)).


    Table 10-2


    Endpoint Configuration Properties


    | Property | Description |

    | --- | --- |

    | `management.endpoint.<endpoint-name>.enabled` | Whether the specific endpoint
    is enabled, generally defaults to `true` and sometimes depends on availability
    of a feature (i.e., if Flyway isn’t present, then enabling the flyway endpoint
    wouldn’t have any effect) |

    | `management.endpoint.<endpoint-name>.cache.time-to-live` | Time to cache a response,
    default is 0ms meaning no caching |

    | `management.endpoint.health.show-details` | Whether to show details for the
    health endpoint, default is `never`, can be changed to `always` or `when-authorized`
    |

    | `management.endpoint.health.roles` | Roles that are allowed to see the details
    (use together with `when-authorized` for `show-details`) |


    Adding `management.endpoint.health.show-details=always` to the `application.properties`
    will show more information about the health of the application. By default it
    will only show UP, but now you can see the different parts of the health information
    for your application (Figure [10-4](#464036_1_En_10_Chapter.xhtml#Fig4)).


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig4_HTML.jpg](images/464036_1_En_10_Chapter/464036_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Extended health endpoint output


    ### Securing Management Endpoints


    When Spring Boot detects both Spring Boot Actuator and Spring Security, it will
    enable secure access to management endpoints automatically. When accessing the
    endpoint, a Basic Login prompt will be shown and asks for a username and password.
    Spring Boot will generate a default `user`, with the username user and a generated
    password (see Recipe 6.1) to use for login.


    Adding the `spring-boot-starter-security` in addition to the `spring-boot-starter-actuator`
    is enough to have secured management endpoints.


    ```

    org.springframework.boot

    spring-boot-starter-security

    ```


    This will enable security in your application and for the management endpoints.
    Now when accessing the endpoint `http://localhost:8090/actuator` a Basic login
    prompt will be shown. After entering the correct credentials you should still
    be able to see the results.


    ### Configure Healthchecks


    One of the features of Spring Boot Actuator is to do healthchecks. Those are exposed
    under `http://localhost:8090/actuator/health`; this produces a result if the application
    is UP or DOWN. The health endpoint calls all the available `HealthIndicator`s
    in the system and reports those in the endpoint. Which `HealthIndicator`s are
    present can be controlled by setting the `management.health.<health-indicator>.enabled`
    property. Setting a property to `true` for a not available feature (like trying
    to get information on the `DataSource` while one isn’t available) won’t work.


    ```

    management.health.diskspace.enabled=false

    ```


    This will disable the healthcheck for the diskspace, and it won’t be part of the
    health checks anymore.'
