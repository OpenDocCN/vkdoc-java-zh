    # 11. Packaging


    In this chapter you will take a look at different solutions for packaging a Spring
    Boot based application.


    ## 11.1 Create an Executable Archive


    By default, Spring Boot creates a `JAR` or `WAR` and that can be run with `java
    -jar your-application.jar`. However, you might want to run the application as
    part of the startup of your server (currently tested and supported for Debian
    and Ubuntu-based systems). For this you can use the Maven or Gradle plugins to
    create an executable jar.


    ### Problem


    You want an executable `JAR` so that it can be installed as service on your environment.


    ### Solution


    The Spring Boot Maven and Gradle plugins both have the option to make the created
    artifact executable.^([^(40)](#fn40)) When doing so, the archive also becomes/behaves
    like a Unix shell script to start/stop a service.


    ### How It Works


    To make an artifact executable, you would need to configure the Maven or Gradle
    plugin as such.


    ### Making the Archive Executable


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    true


    ```


    In the Maven plugin you can set the `executable` property to `true` and the archive
    will be executable.


    ```

    bootJar {

    launchScript()

    }

    ```


    Now after building your artifact, the artifact itself is executable and can be
    used to launch the application. Instead of `java -jar your-application.jar` you
    can now simply type `./your-application.jar` and it will start.


    ### Note


    It might be necessary to make the archive executable; use `chmod +x your-application.jar`
    for that.


    When making the archive executable, the archive will be prefixed with a bash script.
    You might think that doing so will break the Java archive. However, due to the
    way Java reads archives (bottom to top) and the way the shell reads the archives
    (top to bottom) this actually does work.


    You can see the bash script using `head -n 290 your-application.jar`.


    ```

    #!/bin/bash

    #

    #    .   ____          _            __ _ _

    #   /\\ / ___''_ __ _ _(_)_ __  __ _ \ \ \ \

    #  ( ( )\___ | ''_ | ''_| | ''_ \/ _` | \ \ \ \

    #   \\/  ___)| |_)| | | | | || (_| |  ) ) ) )

    #    ''  |____| .__|_| |_|_| |_\__, | / / / /

    #   =========|_|==============|___/=/_/_/_/

    #   :: Spring Boot Startup Script ::

    #

    ### BEGIN INIT INFO

    # Provides:          recipe_14_1

    # Required-Start:    $remote_fs $syslog $network

    # Required-Stop:     $remote_fs $syslog $network

    # Default-Start:     2 3 4 5

    # Default-Stop:      0 1 6

    # Short-Description: recipe_14_1

    # Description:       Demo project for Spring Boot

    # chkconfig:         2345 99 01

    ### END INIT INFO

    ```


    This is the header of the script the Java archive will be prefixed with. The description
    will be filled with the project description as given in Maven. You could override
    this by specifying the `initInfoDescription` next to the `executable` property.


    #### Specifying Configuration


    Normally when you launch a Spring Boot-based application, there are several options
    for providing additional configuration (see Recipe 2.2). However, when using the
    archive as a script (or as a service), some of them don’t apply anymore. What
    you can do instead is make use of a `.conf` file next to your executable archive
    (it must be named `your-application.conf`) to contain additional configuration
    options for your application (See Table [11-1](#464036_1_En_11_Chapter.xhtml#Tab1)).


    Table 11-1


    Available Properties


    | Property | Description |

    | --- | --- |

    | `MODE` | The “mode” of operation. Default is `auto`, which will detect the mode;
    when launched from a symlink will behave like `service`. Change to `run` if you
    want to run the process in the foreground. |

    | `USE_START_STOP_DAEMON` | Whether to use the start-stop-daemon command or not.
    By default will detect if the command is available |

    | `PID_FOLDER` | Name of the folder to write the PID to, default /var/run |

    | `LOG_FOLDER` | Name of the folder to write the logging to, default /var/log
    |

    | `CONF_FOLDER` | Name of the folder to read .conf from, default the same directory
    as the jar file |

    | `LOG_FILENAME` | Name of the logfile to write to, default <appname>.log. |

    | `APP_NAME` | The name of the application. If the jar is run from a symlink,
    the script guesses the app name. |

    | `RUN_ARGS` | The arguments to pass to the Spring Boot application |

    | `JAVA_HOME` | By default will be discovered from the $PATH but can be explicitly
    defined if needed |

    | `JAVA_OPTS` | Options to pass to the JVM (like memory settings, GC settings,
    etc.) |

    | `JARFILE` | The explicit location of the JAR file, in case the script is being
    used to launch a JAR that it is not actually embedded |

    | `DEBUG` | If not empty, sets the -x flag on the shell process, making it easy
    to see the logic in the script |

    | `STOP_WAIT_TIME` | The time to wait before forcing a shutdown (default is 60
    seconds) |


    When using an embedded script (the default) the `JARFILE` and `APP_NAME` properties
    aren’t configurable using a `.conf` file.


    ```

    JAVA_OPTS=-Xmx1024m

    DEBUG=true

    ```


    With this, you will assign a maximum of 1GB of memory to your application and
    it will do some additional logging for the shell script.


    ## 11.2 Create a WAR for Deployment


    ### Problem


    Instead of creating a JAR file, you want a WAR file for deployment to a Servlet
    Container or JEE Container.


    ### Solution


    Change the packaging of the application from JAR to WAR and let your Spring Boot
    application extend the `SpringBootServletInitializer` so that it can bootstrap
    itself as a regular application.'
