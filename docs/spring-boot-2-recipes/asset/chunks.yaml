- fmt: "### How It Works\n\nFirst, let’s inspect the default JMX support that is enabled\
    \ by Spring Boot. Let’s create a simple Spring Boot application that will keep\
    \ running and use JConsole to inspect the running application.\n\n```\npackage\
    \ com.apress.springbootrecipes.jmx;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport java.io.IOException;\n\
    @SpringBootApplication\npublic class JmxApplication {\npublic static void main(String[]\
    \ args) throws IOException {\nSpringApplication.run(JmxApplication.class, args);\n\
    System.out.print(\"Press [ENTER] to quit:\");\nSystem.in.read();\n}\n}\n```\n\n\
    When the application is running you can start `jconsole` and you will be prompted\
    \ with a screen in which you can select the local process to connect to. Select\
    \ the one that is running the `JmxApplication` (Figure [8-1](#464036_1_En_8_Chapter.xhtml#Fig1)).\n\
    \n![../images/464036_1_En_8_Chapter/464036_1_En_8_Fig1_HTML.jpg](images/464036_1_En_8_Chapter/464036_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1\n\nJConsole process selection\n\nAfter selecting the process, go\
    \ to the **MBeans** tab and open the `org.springframework.boot` menu and everything\
    \ under it on the left side of the screen. There is a `shutdown` operation on\
    \ the `SpringApplication` that you can invoke. When invoked, it will shut down\
    \ the application (Figure [8-2](#464036_1_En_8_Chapter.xhtml#Fig2)).\n\n![../images/464036_1_En_8_Chapter/464036_1_En_8_Fig2_HTML.jpg](images/464036_1_En_8_Chapter/464036_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2\n\nInvoking the shutdown method\n\nTo configure JMX, Spring Boot\
    \ offers three properties (Table [8-3](#464036_1_En_8_Chapter.xhtml#Tab3)).\n\n\
    Table 8-3\n\nSpring Boot JMX Properties\n\n| **Property** | **Description** |\n\
    | --- | --- |\n| `spring.jmx.enabled` | Should JMX be enabled or not (default\
    \ `true`) |\n| `spring.jmx.server` | The bean name of the JMX MBeanServer to use\
    \ (default `mbeanServer`). This is generally only needed if an `MBeanServer` has\
    \ been manually registered in the application context. |\n| `spring.jmx.default-domain`\
    \ | The JMX domain name to use to register the beans (default is the package name)\
    \ |\n\nAs Spring Boot by default has JMX and the Spring support for JMX enabled,\
    \ exposing a bean is pretty straightforward. For a bean to be exposed, it needs\
    \ to have an `@ManagedResource` annotation and the operations to expose the `@ManagedOperation`\
    \ annotation.\n\n```\npackage com.apress.springbootrecipes.jmx;\nimport org.slf4j.Logger;\n\
    import org.slf4j.LoggerFactory;\nimport org.springframework.jmx.export.annotation.ManagedOperation;\n\
    import org.springframework.jmx.export.annotation.ManagedResource;\nimport org.springframework.scheduling.annotation.Async;\n\
    import org.springframework.stereotype.Component;\n@Component\n@ManagedResource\n\
    public class HelloWorld {\nprivate static final Logger logger =\nLoggerFactory.getLogger(HelloWorld.class);\n\
    @ManagedOperation\npublic void printMessage() {\nlogger.info(\"Hello World, from\
    \ Spring Boot 2!\");\n}\n}\n```\n\nWhen the application has been restarted and\
    \ JConsole reconnected to the process running the `JmxApplication`, you will now\
    \ notice a `com.apress.springbootrecipes.jmx` leaf in the menu on the left side.\
    \ Open up all the nodes and in the Operations leaf you will find the `printMessage`\
    \ operation (Figure [8-3](#464036_1_En_8_Chapter.xhtml#Fig3)).\n\n![../images/464036_1_En_8_Chapter/464036_1_En_8_Fig3_HTML.jpg](images/464036_1_En_8_Chapter/464036_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3\n\nInvoking the printMessage method\n\nWhen invoking the `printMessage`\
    \ method, the console will print the message (Figure [8-4](#464036_1_En_8_Chapter.xhtml#Fig4)).\n\
    \n![../images/464036_1_En_8_Chapter/464036_1_En_8_Fig4_HTML.jpg](images/464036_1_En_8_Chapter/464036_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4\n\nConsole output\n\nFootnotes [1](#464036_1_En_8_Chapter.xhtml#Fn1_source)\n\
    \n# 9. Messaging\n\n## 9.1 Configure JMS\n\n### Problem\n\nYou want to use JMS\
    \ in a Spring Boot application and need to connect to the JMS broker.\n\n### Solution\n\
    \nSpring Boot supports auto-configuration for ActiveMQ^([^(36)](#fn36)) and Artemis.^([^(37)](#fn37))\
    \ Adding one of those JMS Providers together with setting some properties in,\
    \ respectively, the `spring.activemq` and `spring.artemis` namespace will be all\
    \ you need.\n\n### How It Works\n\nBy declaring a dependency of the JMS provider\
    \ of your choice, Spring Boot will automatically configure the `ConnectionFactory`\
    \ and strategy to look up destinations, the `DestinationResolver`, for your environment.\
    \ This can also be done by using JNDI, and a final solution would be to do all\
    \ the configuration yourself if you need more control over the `ConnectionFactory`.\n\
    \nAdding dependencies for the supported JMS providers is pretty easy, as Spring\
    \ Boot has provides starter projects for those; for JNDI you need to include the\
    \ JMS dependencies yourself.\n\n#### Use ActiveMQ\n\nWhen using ActiveMQ, the\
    \ first thing to do is to include the `spring-boot-starter-activemq` and this\
    \ will pull in all the needed JMS and ActiveMQ dependencies to get started. It\
    \ will include the `spring-jms` dependency and the client libraries for ActiveMQ.\n\
    \n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-activemq</artifactId>\n\
    </dependency>\n```\n\nBy default, Spring Boot will start an embedded broker if\
    \ no explicit broker configuration is given. Configuration can be changed by using\
    \ properties from the `spring.activemq` namespace (see Table [9-1](#464036_1_En_9_Chapter.xhtml#Tab1)).\n\
    \nTable 9-1\n\nActiveMQ Configuration Properties\n\n| Property | Description |\n\
    | --- | --- |\n| `spring.activemq.broker-url` | URL of the broker to connect to,\
    \ default `vm://localhost?broker.persistent=false` for an in-memory broker, else\
    \ `tcp://localhost:61616` |\n| `spring.activemq.user` | Username to use to connect\
    \ to the broker, default empty |\n| `spring.activemq.password` | Password to use\
    \ to connect to the broker, default empty |\n| `spring.activemq.in-memory` | Should\
    \ an embedded broker be used, default `true`. Ignored when `spring.activemq.broker-url`\
    \ has been explicitly set |\n| `spring.activemq.non-blocking-redelivery` | Stop\
    \ message delivery before redelivering rolled-back messages; when enabled message\
    \ order will not be preserved!, default `false` |\n| `spring.activemq.close-timeout`\
    \ | Time to wait to consider a close to be effective, default 15 seconds |\n|\
    \ `spring.activemq.send-timeout` | Time to wait for a response from the broker,\
    \ default 0 (unlimited) |\n| `spring.activemq.packages.trust-all` | When using\
    \ Java Serialization to send JMS messages should classes from all packages be\
    \ trusted, default none (requires explicit setting the packages) |\n| `spring.activemq.packages.trusted`\
    \ | Comma-separated list of specific packages to trust |\n\nA simple application\
    \ to list all the beans with `jms` in their name, this should include a bean named\
    \ `cachingJmsConnectionFactory`.\n\n```\n@SpringBootApplication\npublic class\
    \ JmsActiveMQApplication {\nprivate static final String MSG = \"\\tName: %100s,\
    \ Type: %s\\n\";\npublic static void main(String[] args) {\nvar ctx = SpringApplication.run(JmsActiveMQApplication.class,\
    \ args);\nSystem.out.println(\"# Beans: \" + ctx.getBeanDefinitionCount());\n\
    var names = ctx.getBeanDefinitionNames();\nStream.of(names)\n.filter(name -> name.toLowerCase().contains(\"\
    jms\"))\n.forEach(name -> {\nObject bean = ctx.getBean(name);\nSystem.out.printf(MSG,\
    \ name, bean.getClass().getSimpleName());\n});\n}\n}\n```\n\nWhen running the\
    \ preceding, it will print all the names and type of the beans containing `jms`\
    \ in their name to the console. The output should be similar to that of Figure\
    \ [9-1](#464036_1_En_9_Chapter.xhtml#Fig1).\n\n![../images/464036_1_En_9_Chapter/464036_1_En_9_Fig1_HTML.jpg](images/464036_1_En_9_Chapter/464036_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nActiveMQ beans output"
  raw: '### How It Works


    First, let’s inspect the default JMX support that is enabled by Spring Boot. Let’s
    create a simple Spring Boot application that will keep running and use JConsole
    to inspect the running application.


    ```

    package com.apress.springbootrecipes.jmx;

    import org.springframework.boot.SpringApplication;

