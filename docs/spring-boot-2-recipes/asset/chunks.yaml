    #### 配置连接池


    Spring Boot 使用的默认连接池是 HikariCP。当包含 `spring-boot-starter-jdbc` 依赖（或其他与数据库相关的依赖）时，它会自动引入。Spring
    Boot 会使用一些默认设置来配置连接池；但是，你可能希望覆盖这些设置（增加或减少最大连接数、设置超时等）。HikariCP 的配置选项位于 `spring.datasource.hikari`
    命名空间下（表 7-1）。


    表 7-1


    HikariCP 常用连接池设置


    | 属性 | 描述 |

    | --- | --- |

    | `spring.datasource.hikari.connection-timeout` | 客户端等待从池中获取连接的最大毫秒数。默认 30 秒 |

    | `spring.datasource.hikari.leak-detection-threshold` | 连接离开池后，在记录可能连接泄漏的消息之前可以经过的毫秒数。默认
    0（实际禁用） |

    | `spring.datasource.hikari.idle-timeout` | 连接在池中允许空闲的最大毫秒数。默认 10 分钟 |

    | `spring.datasource.hikari.validation-timeout` | 池等待连接被验证为存活的最大毫秒数。默认 5 秒 |

    | `spring.datasource.hikari.connection-test-query` | 用于测试连接有效性的 SQL 查询。**注意：**
    通常 JDBC 4.0（或更高版本）驱动不需要！默认无。 |

    | `spring.datasource.hikari.maximum-pool-size` | 池中将保持的最大连接数。默认 10 个连接 |

    | `spring.datasource.hikari.minimum-idle` | 池中维护的最小空闲连接数。默认 10 个连接 |


    还有更多属性可供使用，但列表相当长，表 7-1 中提到的属性是最常用的。


    ### 注意


    Tomcat JDBC 的属性位于 `spring.datasource.tomcat` 命名空间下，Commons DBCP2 的属性位于 `spring.datasource.dbcp2`
    命名空间下。


    要将数据源配置为最大五个连接、最小两个连接，以及阈值为 20 秒的泄漏检测，需要添加以下配置。


    ```

    spring.datasource.hikari.maximum-pool-size=5

    spring.datasource.hikari.minimum-idle=2

    spring.datasource.hikari.leak-detection-threshold=20000

    ```

