    基于表单的登录服务会渲染一个包含登录表单的网页，供用户输入登录信息并处理表单提交。该功能通过 `formLogin` 方法进行配置。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .formLogin();

    }

    }

    ```


    默认情况下，Spring Security 会自动创建一个登录页面，并将其映射到 URL `/login`。因此，你可以在应用程序中添加一个指向该 URL
    的链接（例如，在配方 3.3 的 `index.html` 中）：


    ```

    Login

    ```


    如果你不喜欢默认的登录页面，可以提供一个自定义的登录页面。例如，你可以在 `src/main/resources/templates` 目录下创建以下 `login.html`
    文件（使用 Thymeleaf 时）。由于默认开启了 CSRF 保护，你需要在表单中添加一个 CSRF 令牌，这就是隐藏字段的作用。如果你禁用了 CSRF（不推荐），则应删除此行。


    ```


    Login


    body {

    background-color: #DADADA;

    }

    body > .grid {

    height: 100%;

    }

    .column {

    max-width: 450px;

    }


    登录到您的账户


    Login


