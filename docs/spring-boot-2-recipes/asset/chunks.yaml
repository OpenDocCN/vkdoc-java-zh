- fmt: '### Using `@Bean` Method


    Instead of automatically detecting components, you can also use a factory method
    to create beans. This is useful if you want or need more control over the construction
    of your bean. A factory method is a method annotated with `@Bean`^([⁶](#fn6))
    and it will be used to register a bean in the application context. The name of
    the bean is the same as the name of the method. The method can have arguments
    and those will be resolved to other beans in the application context.


    Let’s create an application that can do some basic calculations for integers.
    First let’s write the `Calculator`; it will get a collection of `Operation` beans
    in the constructor. `Operation` is an interface, and the different implementations
    will do the actual calculation.


    ```

    package com.apress.springbootrecipes.calculator;

    import java.util.Collection;

    public class Calculator {

    private final Collection operations;

    public Calculator(Collection operations) {

    this.operations = operations;

    }

    public void calculate(int lhs, int rhs, char op) {

    for (var operation : operations) {

    if (operation.handles(op)) {

    var result = operation.apply(lhs, rhs);

    System.out.printf("%d %s %d = %s%n", lhs, op, rhs, result);

    return;

    }

    }

    throw new IllegalArgumentException("Unknown operation " + op);

    }

    }

    ```


    In the `calculate` method, the correct `Operation` is detected using the `Operation.handles`
    method; when the correct one is found, the `Operation.apply` method is called
    to do the actual calculation. If we pass in an operation that the calculator cannot
    handle, an exception is thrown.


    The `Operation` interface is a simple interface with the earlier mentioned two
    methods.


    ```

    package com.apress.springbootrecipes.calculator;

    public interface Operation {

    int apply(int lhs, int rhs);

    boolean handles(char op);

    }

    ```


    Now let’s add two operations: one for adding values and one for multiplying values.


    ```

    package com.apress.springbootrecipes.calculator.operation;

    import com.apress.springbootrecipes.calculator.Operation;

    import org.springframework.stereotype.Component;

    @Component

    class Addition implements Operation {

    @Override

    public int apply(int lhs, int rhs) {

    return lhs + rhs;

    }

    @Override

    public boolean handles(char op) {

    return ''+'' == op;

    }

    }

    package com.apress.springbootrecipes.calculator.operation;

    import com.apress.springbootrecipes.calculator.Operation;

    import org.springframework.stereotype.Component;

    @Component

    class Multiplication implements Operation {

    @Override

    public int apply(int lhs, int rhs) {

    return lhs * rhs;

    }

    @Override

    public boolean handles(char op) {

    return ''*'' == op;

    }

    }

    ```


    These are all the components we need to make a calculator that can do additions
    and multiplications and still have an extensible mechanism.


    Finally let’s make an application that configures and uses the `Calculator`. To
    make an instance of the `Calculator`, a `@Bean` method is needed. This method
    can be added to the class annotated with `@SpringBootApplication` or a regular
    `@Configuration`.


    ```

    package com.apress.springbootrecipes.calculator;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import java.util.Collection;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    var ctx = SpringApplication.run(CalculatorApplication.class, args);

    var calculator = ctx.getBean(Calculator.class);

    calculator.calculate(137, 21, ''+'');

    calculator.calculate(137, 21, ''*'');

    calculator.calculate(137, 21, ''-'');

    }

    @Bean

    public Calculator calculator(Collection operations) {

    return new Calculator(operations);

    }

    }

    ```


    The `calculator` factory method takes a `List<Operation>` and we use that to construct
    the `Calculator`. When using parameters in a `@Bean` annotated method, those will
    automatically be resolved; and when injecting a collection, Spring will automatically
    detect all instances of the beans required and use that to invoke the `calculator`
    factory method.


    In the `main` method we retrieve the `Calculator` and call its `calculate` method
    with different numbers and operations. The first two will nicely print some output
    to the console; the last one will throw an exception, as there is no suitable
    operation to do subtractions.


    Although you created a factory method for the `Calculator`, this isn’t actually
    needed. When annotating the `Calculator` with `@Component`, Spring will detect
    it. The single constructor in the class will be used to construct it. When there
    are multiple constructors, annotate the one to use with `@Autowired`.


    Another thing that isn’t really nice about this code is that beans are retrieved
    manually and that could be considered as a bad practice; generally you want to
    use dependency injection. Spring Boot has an interface `ApplicationRunner`, which
    can be used to run some code after startup of the application. When Spring Boot
    detects a bean of type `ApplicationRunner`, it will invoke its `run` method as
    soon as the application has started.


    ```

    package com.apress.springbootrecipes.calculator;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    SpringApplication.run(CalculatorApplication.class, args);

    }

    @Bean

    public ApplicationRunner calculationRunner(Calculator calculator) {

    return args -> {

    calculator.calculate(137, 21, ''+'');

    calculator.calculate(137, 21, ''*'');

    calculator.calculate(137, 21, ''-'');

    };

    }

    }

    ```


    The method to create a `Calculator` has been replaced by an `ApplicationRunner`.
    This `ApplicationRunner` receives the automatically configured `Calculator` and
    runs some operations on it. When running this class, the output should still be
    the same as before. The major difference and advantage is that it is no longer
    needed to manually get beans from the `ApplicationContext`, as Spring will take
    care of getting the correct beans.


    ## Externalize Properties


    ### Problem


    You want to use properties to configure your application for different environments
    or executions.


    ### Solution


    By default, Spring Boot supports getting properties from numerous locations. By
    default, it will load a file named `application.properties`, and use the environment
    variables and Java System properties. When running from the command line, it will
    also take command line arguments into consideration. There are more locations
    that are taken into account depending on the type of application and availability
    of capabilities (like JNDI, for instance).^([⁷](#fn7)) For our application the
    following resources are taken into considering in given order.


    1.  Command line arguments

    2.  `application.properties` outside of the packaged application

    3.  `application.properties` packaged inside the application


    Next to that, for options 2 and 3 you can also load a profile-specific one based
    on the active profiles. The profiles to activate can be passed through the `spring.profiles.active`
    property. The profile-specific `application-{profile}.properties` takes precedence
    over the non–profile-specific one. Each will get loaded and with that you can
    override properties, which makes the list a bit longer.


    1.  Command line arguments

    2.  `application-{profile}.properties` outside the packaged application

    3.  `application.properties` outside the packaged application

    4.  `application-{profile}.properties` packaged inside the application

    5.  `application.properties` packaged inside the application'
