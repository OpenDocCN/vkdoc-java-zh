    When using the Spring Boot plugin as is, all the needed libraries are included
    in the archive in the `BOOT-INF/lib` folder. However, one might want to reduce
    the size of the JAR and enable reuse of dependencies to create an even smaller
    overall footprint. For example, the archive generated with Recipe 14.1 is around
    7.1M. Most of this comes from included dependencies.


    It is possible to add a custom layout and launcher to the Spring Boot plugin.
    A layout defines where the sources are loaded from, and the launcher uses this
    information to load those dependencies. The Thin Launcher will download the artifacts
    from Maven Central and place them in a shared repository. So when multiple applications
    share the dependencies, they are only downloaded once.


    To use the Thin Launcher, add a dependency to the Spring Boot plugin.


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    org.springframework.boot.experimental

    spring-boot-thin-layout

    1.0.15.RELEASE


    ```


    This is enough to create a considerably smaller archive. When running `./mvn package`
    the resulting JAR is around 12K. The drawback is, however, that it needs to download
    the dependencies when the application is started, so starting the application
    might take longer depending on the number of dependencies.


    What happens is that a class named `ThinJarWrapper` has been added and that will
    be the entrypoint of your application. Now your application contains a `pom.xml`
    and/or a `META-INF/thin.properties` to determine the dependencies. The `thinJarWrapper`
    will locate another JAR file (the “launcher”). The wrapper downloads the launcher
    (if it needs to), or else uses the cached version in your local Maven repository.


    The launcher then takes over and reads the `pom.xml` (if present) and the `META-INF/thin.properties`
    , downloading the dependencies (and all transitives) as necessary. It will now
    create a custom class loader with all the downloaded dependencies on the classpath.
    Then it runs the application’s own main method with that class loader.


    ### Note


    When downloaded, the dependencies from Maven will respect settings made in the
    Maven `settings.xml`, as it uses regular Maven tooling. When using a mirror like
    Nexus for Maven repositories, include a `thin.repo` in the `META-INF/thin.properties`
    to point to that mirror, else downloading the launcher will fail.


    ## 11.4 Using Docker


    Using Docker^([^(42)](#fn42)) to build and ship containers is common practice
    nowadays. When using Spring Boot, it is quite easy to wrap that into a Docker
    container.


    ### Problem


    You want to run your Spring Boot-based application inside a Docker container.


    ### Solution


    Create a `Dockerfile` and use one of the available Maven Docker plugins to build
    the Docker container.


    ### Note


    In this recipe we choose to use the `dockerfile-maven-plugin` from Spotify, but
    there are others that work equally well.'
