- fmt: "### Warning\n\n使用自签名证书会在浏览器中产生警告，提示网站不安全且未受保护，因为该证书并非由受信任的机构签发（另请参见图 [3-12](#464036_1_En_3_Chapter.xhtml#Fig12)）。\n\
    \n#### 配置 Spring Boot 使用密钥库\n\nSpring Boot 需要了解密钥库，以便能够配置嵌入式容器。为此，请使用`server.ssl.key-store`属性。您还需要指定密钥库的类型（`pkcs12`）和密码。\n\
    \n```\nserver.ssl.key-store=classpath:sb2-recipes.pfx\nserver.ssl.key-store-type=pkcs12\n\
    server.ssl.key-store-password=password\nserver.ssl.key-password=password\nserver.ssl.key-alias=sb2-recipes\n\
    ```\n\n现在，当打开`http://localhost:8080/books.html`页面时，它将通过`https`提供服务（尽管会有警告）。参见图\
    \ [3-12](#464036_1_En_3_Chapter.xhtml#Fig12)。\n\n![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig12_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig12_HTML.jpg)\n\
    \n图 3-12 HTTPS 访问\n\n#### 同时支持 HTTP 和 HTTPS\n\nSpring Boot 默认只启动一个连接器：要么是 HTTP，要么是\
    \ HTTPS，但不能同时启动两者。如果您想同时支持 HTTP 和 HTTPS，则必须手动添加一个额外的连接器。最简单的方法是自行创建 HTTP 连接器，并让\
    \ Spring Boot 设置 SSL 部分。\n\n首先，让我们配置 Spring Boot 在端口 8443 上启动服务器。\n\n```\nserver.port=8443\n\
    ```\n\n要向嵌入式 Tomcat 添加额外的连接器，您需要将`TomcatServletWebServerFactory`作为 bean 添加到我们的上下文中。通常，Spring\
    \ Boot 会检测容器并选择要使用的`WebServerFactory`；但是，由于需要进行自定义，我们需要手动添加它。此 bean 可以添加到带有`@Configuration`注解的类或`LibraryApplication`类中。\n\
    \n```\n@Bean\npublic TomcatServletWebServerFactory tomcatServletWebServerFactory()\
    \ {\n    var factory = new TomcatServletWebServerFactory();\n    factory.addAdditionalTomcatConnectors(httpConnector());\n\
    \    return factory;\n}\n\nprivate Connector httpConnector() {\n    var connector\
    \ = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);\n    connector.setScheme(\"\
    http\");\n    connector.setPort(8080);\n    connector.setSecure(false);\n    return\
    \ connector;\n}\n```\n\n这将在端口 8080 上添加一个额外的连接器。现在，应用程序将可以通过端口 8080 和 8443 访问。使用\
    \ Spring Security，您现在可以强制通过 HTTPS 而非 HTTP 访问应用程序的某些部分。\n\n### 提示\n\n如果您不想显式配置`TomcatServletWebServerFactory`，也可以使用`BeanPostProcessor`向`TomcatServletWebServerFactory`注册额外的\
    \ Tomcat `Connector`。这样，您可以为不同的嵌入式容器实现此功能，而不是局限于单个容器。\n\n```\n@Bean\npublic BeanPostProcessor\
    \ addHttpConnectorProcessor() {\n    return new BeanPostProcessor() {\n      \
    \  @Override\n        public Object postProcessBeforeInitialization(Object bean,\
    \ String beanName)\n                throws BeansException {\n            if (bean\
    \ instanceof TomcatServletWebServerFactory) {\n                var factory = (TomcatServletWebServerFactory)\
    \ bean;\n                factory.addAdditionalTomcatConnectors(httpConnector());\n\
    \            }\n            return bean;\n        }\n    };\n}\n```\n\n#### 将\
    \ HTTP 重定向到 HTTPS\n\n除了同时支持 HTTP 和 HTTPS，另一种选择是仅支持 HTTPS，并将流量从 HTTP 重定向到 HTTPS。其配置与同时支持\
    \ HTTP 和 HTTPS 时类似。但是，您现在需要配置连接器，将所有来自 8080 端口的流量重定向到 8443 端口。\n\n```\n@Bean\n\
    public TomcatServletWebServerFactory tomcatServletWebServerFactory() {\n    var\
    \ factory = new TomcatServletWebServerFactory();\n    factory.addAdditionalTomcatConnectors(httpConnector());\n\
    \    factory.addContextCustomizers(securityCustomizer());\n    return factory;\n\
    }\n\nprivate Connector httpConnector() {\n    var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);\n\
    \    connector.setScheme(\"http\");\n    connector.setPort(8080);\n    connector.setSecure(false);\n\
    \    connector.setRedirectPort(8443);\n    return connector;\n}\n\nprivate TomcatContextCustomizer\
    \ securityCustomizer() {\n    return context -> {\n        var securityConstraint\
    \ = new SecurityConstraint();\n        securityConstraint.setUserConstraint(\"\
    CONFIDENTIAL\");\n        var collection = new SecurityCollection();\n       \
    \ collection.addPattern(\"/*\");\n        securityConstraint.addCollection(collection);\n\
    \        context.addConstraint(securityConstraint);\n    };\n}\n```\n\n`httpConnector`现在设置了`redirectPort`，以便它知道要使用哪个端口。最后，您需要使用`SecurityConstraint`保护所有\
    \ URL。使用 Spring Boot，您可以使用专门的`TomcatContextCustomizer`在 Tomcat 的`Context`启动之前对其进行后处理。该约束使所有内容（由于使用了`/*`作为模式）都变为机密（允许使用`NONE`、`INTEGRAL`或`CONFIDENTIAL`之一），结果是所有内容都将被重定向到`https`。\n\
