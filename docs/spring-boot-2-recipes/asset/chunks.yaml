  raw: '### How It Works


    The first thing to do is add the `spring-boot-starter-mail` dependency to your
    list of dependencies. This will add the necessary `javax.mail` as well as the
    `spring-context` dependencies on the classpath.


    ```

    org.springframework.boot

    spring-boot-starter-mail


    ```


    #### Configure the JavaMailSender


    To be able to send mail, you need to configure the appropriate `spring.mail` properties
    (Table [8-2](#464036_1_En_8_Chapter.xhtml#Tab2)). At least the `spring.mail.host`
    property is needed; the other properties are optional.


    Table 8-2


    Spring Boot Mail Properties


    | **Property** | **Description** |

    | --- | --- |

    | `spring.mail.host` | The SMTP server host |

    | `spring.mail.port` | The SMTP sever port (default 25) |

    | `spring.mail.username` | Username to use for connecting to the SMTP server |

    | `spring.mail.password` | Password to use for connecting to the SMTP server |

    | `spring.mail.protocol` | The protocol used by the SMTP server (default `smtp`)
    |

    | `spring.mail.test-connection` | Test if the SMTP server is available at startup
    (default `false`) |

    | `spring.mail.default-encoding` | Encoding used for MIME messages (default `UTF-8`)
    |

    | `spring.mail.properties.*` | Additional properties to be set on the JavaMail
    Session |

    | `spring.mail.jndi-name` | JNDI name of the JavaMail Session, can be used when
    deploying to a JEE server with preconfigured JavaMail Sessions in JNDI. |


    Next, you need to define at least the `spring.mail.host` property to be able to
    send mail.


    ```

    spring.mail.host=localhost

    spring.mail.port=3025

    ```


    ### Note


    The code for this recipe uses GreenMail as an SMTP server; a configured instance
    can be run using the `smtp.sh` script from the `bin` directory. It will, by default,
    expose an SMTP server on port 3025.


    #### Sending a Plain Text E-mail


    With the added dependencies and `spring.mail` properties, Spring Boot will add
    a preconfigured `JavaMailSenderImpl` as a bean to the `ApplicationContext`. This
    bean can be autowired into components, by either using an `@Autowired` field or
    through constructors or, as shown here, as dependencies in `@Bean` annotated methods.


    ```

    package com.apress.springbootrecipes.mailsender;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.mail.javamail.JavaMailSender;

    import org.springframework.mail.javamail.MimeMessageHelper;

    import javax.mail.Message;

    @SpringBootApplication

    public class MailSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(MailSenderApplication.class, args);

    }

    @Bean

    public ApplicationRunner startupMailSender(JavaMailSender mailSender) {

    return (args) -> {

    mailSender.send((msg) -> {

    var helper = new MimeMessageHelper(msg);

    helper.setTo("recipient@some.where");

    helper.setFrom("spring-boot-2-recipes@apress.com");

    helper.setSubject("Status message");

    helper.setText("All is well.");

    });

    };

    }

    }

    ```


    The `MailSenderApplication` will send an e-mail when the application finished
    starting. The `startupMailSender` is an `ApplicationRunner` (see Chapter [2](#464036_1_En_2_Chapter.xhtml)),
    which takes the preconfigured `JavaMailSender` to send a mail message.


    #### Using Thymeleaf for E-mail Templates


    Spring Boot has some nice support for using Thymeleaf^([^(35)](#fn35)) as a templating
    solution; however, the default setup is mainly for using Thymeleaf for webpages.
    It is, however, very possible to use Thymeleaf for e-mail templates.


    First, add the `spring-boot-starter-thymeleaf` as a dependency. This will pull
    in all the needed Thymeleaf dependencies and will automatically configure the
    Thymeleaf `TemplateEngine`, which we need to generate the HTML content.


    ```

    org.springframework.boot

    spring-boot-starter-thymeleaf


    ```


    By default, the Spring configured Thymeleaf `TemplateEngine` will resolve the
    HTML templates from the `templates` directory under `src/main/resources`. Add
    a file named `email.html` to this directory and make a nice looking e-mail message
    from it.


    ```


    Some email content will be here.


    Kind Regards,

    Your Application


    ```


    The `th:text` is a Thymeleaf tag and will replace the content with the value of
    that attribute. Of Course we would need to pass in a value for that attribute
    from our mail sending/generating code.


    ```

    package com.apress.springbootrecipes.mailsender;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.i18n.LocaleContextHolder;

    import org.springframework.mail.javamail.JavaMailSender;

    import org.springframework.mail.javamail.MimeMessageHelper;

    import org.thymeleaf.context.Context;

    import org.thymeleaf.spring5.SpringTemplateEngine;

    import javax.mail.Message;

    import java.util.Collections;

    @SpringBootApplication

    public class MailSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(MailSenderApplication.class, args);

    }

    @Bean

    public ApplicationRunner startupMailSender(

    JavaMailSender mailSender,

    SpringTemplateEngine templateEngine) {

    return (args) -> {

    mailSender.send((msg) -> {

    var helper = new MimeMessageHelper(msg);

    helper.setTo("recipient@some.where");

    helper.setFrom("spring-boot-2-recipes@apress.com");

    helper.setSubject("Status message");

    var context =  new Context(

    LocaleContextHolder.getLocale(),

    Collections.singletonMap("msg", "All is well!"));

    var body = templateEngine.process("email.html", context);

    helper.setText(body, true);

    });

    };

    }

    }

    ```


    The code still is very similar to the code as it was, but with this difference
    now we also have a `SpringTemplateEnginge` at our disposable to generate the HTML
    content for our e-mail. We use the `process` method to select the template we
    want to render, `email.html`, and pass in a `Context` object. The `Context` object
    is used by Thymeleaf to resolve the attributes, in our case the `msg` one.


    ## 8.4 Register a JMX MBean


    ### Problem


    You want to register an object in your Spring Boot application as a JMX MBean,
    to have the ability to look at services that are running and manipulate their
    state at runtime. This will allow you to perform tasks like rerun batch jobs,
    invoke methods, and change configuration metadata.


    ### Solution


    Spring Boot by default enables the Spring JMX support and will detect the `@ManagedResource`
    annotated beans and register them with the JMX server.'
  trans: '

    ### 工作原理


    首先，需要在依赖列表中添加 `spring-boot-starter-mail` 依赖。这将把必要的 `javax.mail` 以及 `spring-context`
    依赖添加到类路径中。


    ```

    org.springframework.boot

    spring-boot-starter-mail


    ```


    #### 配置 JavaMailSender


    要能够发送邮件，你需要配置相应的 `spring.mail` 属性（表 8-2）。至少需要 `spring.mail.host` 属性；其他属性是可选的。


    表 8-2


    Spring Boot 邮件属性


    | **属性** | **描述** |

    | --- | --- |

    | `spring.mail.host` | SMTP 服务器主机 |

    | `spring.mail.port` | SMTP 服务器端口（默认 25） |

    | `spring.mail.username` | 用于连接 SMTP 服务器的用户名 |

    | `spring.mail.password` | 用于连接 SMTP 服务器的密码 |

    | `spring.mail.protocol` | SMTP 服务器使用的协议（默认 `smtp`） |

    | `spring.mail.test-connection` | 启动时测试 SMTP 服务器是否可用（默认 `false`） |

    | `spring.mail.default-encoding` | MIME 消息使用的编码（默认 `UTF-8`） |

    | `spring.mail.properties.*` | 要在 JavaMail Session 上设置的附加属性 |

    | `spring.mail.jndi-name` | JavaMail Session 的 JNDI 名称，可在部署到 JEE 服务器时使用，该服务器在
    JNDI 中预配置了 JavaMail Session。 |


    接下来，你至少需要定义 `spring.mail.host` 属性才能发送邮件。


    ```

    spring.mail.host=localhost

    spring.mail.port=3025

    ```


    ### 注意


    本配方的代码使用 GreenMail 作为 SMTP 服务器；可以通过 `bin` 目录中的 `smtp.sh` 脚本运行一个已配置的实例。默认情况下，它会在端口
    3025 上暴露一个 SMTP 服务器。


    #### 发送纯文本电子邮件


    添加了依赖和 `spring.mail` 属性后，Spring Boot 会将一个预配置的 `JavaMailSenderImpl` 作为 bean 添加到
    `ApplicationContext` 中。这个 bean 可以通过 `@Autowired` 字段、构造函数或（如下所示）作为 `@Bean` 注解方法中的依赖项自动注入到组件中。


    ```

    package com.apress.springbootrecipes.mailsender;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.mail.javamail.JavaMailSender;

    import org.springframework.mail.javamail.MimeMessageHelper;

    import javax.mail.Message;

    @SpringBootApplication

    public class MailSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(MailSenderApplication.class, args);

    }

    @Bean

    public ApplicationRunner startupMailSender(JavaMailSender mailSender) {

    return (args) -> {

    mailSender.send((msg) -> {

    var helper = new MimeMessageHelper(msg);

    helper.setTo("recipient@some.where");

    helper.setFrom("spring-boot-2-recipes@apress.com");

    helper.setSubject("Status message");

    helper.setText("All is well.");

    });

    };

    }

    }

    ```


    `MailSenderApplication` 在应用程序完成启动后会发送一封电子邮件。`startupMailSender` 是一个 `ApplicationRunner`（参见第
    2 章），它使用预配置的 `JavaMailSender` 来发送邮件消息。


    #### 使用 Thymeleaf 作为电子邮件模板


    Spring Boot 对使用 Thymeleaf^(³⁵) 作为模板解决方案提供了很好的支持；然而，默认设置主要用于将 Thymeleaf 用于网页。不过，将
    Thymeleaf 用于电子邮件模板也是完全可行的。


    首先，添加 `spring-boot-starter-thymeleaf` 作为依赖。这将引入所有需要的 Thymeleaf 依赖，并自动配置 Thymeleaf
    `TemplateEngine`，我们需要它来生成 HTML 内容。


    ```

    org.springframework.boot

    spring-boot-starter-thymeleaf


    ```


    默认情况下，Spring 配置的 Thymeleaf `TemplateEngine` 会从 `src/main/resources` 下的 `templates`
    目录解析 HTML 模板。向此目录添加一个名为 `email.html` 的文件，并从中制作一封漂亮的电子邮件消息。


    ```


    此处将包含一些电子邮件内容。


    此致

    敬礼


    您的应用程序


    ```


    `th:text` 是一个 Thymeleaf 标签，它会用该属性的值替换内容。当然，我们需要从邮件发送/生成代码中为该属性传递一个值。


    ```

    package com.apress.springbootrecipes.mailsender;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.i18n.LocaleContextHolder;

    import org.springframework.mail.javamail.JavaMailSender;

    import org.springframework.mail.javamail.MimeMessageHelper;

    import org.thymeleaf.context.Context;

    import org.thymeleaf.spring5.SpringTemplateEngine;

    import javax.mail.Message;

    import java.util.Collections;

    @SpringBootApplication

    public class MailSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(MailSenderApplication.class, args);

    }

    @Bean

    public ApplicationRunner startupMailSender(

    JavaMailSender mailSender,

    SpringTemplateEngine templateEngine) {

    return (args) -> {

    mailSender.send((msg) -> {

    var helper = new MimeMessageHelper(msg);

    helper.setTo("recipient@some.where");

    helper.setFrom("spring-boot-2-recipes@apress.com");

    helper.setSubject("Status message");

    var context =  new Context(

    LocaleContextHolder.getLocale(),

    Collections.singletonMap("msg", "All is well!"));

    var body = templateEngine.process("email.html", context);

    helper.setText(body, true);

    });

    };

    }

    }

    ```


    这段代码与之前的代码仍然非常相似，但区别在于现在我们有了一个 `SpringTemplateEngine` 可供使用，来为我们的电子邮件生成 HTML 内容。我们使用
    `process` 方法选择要渲染的模板 `email.html`，并传入一个 `Context` 对象。Thymeleaf 使用 `Context` 对象来解析属性，在我们的例子中是
    `msg` 属性。


    ## 8.4 注册 JMX MBean


    ### 问题


    你希望在 Spring Boot 应用程序中将一个对象注册为 JMX MBean，以便能够查看正在运行的服务并在运行时操作其状态。这将允许你执行诸如重新运行批处理作业、调用方法和更改配置元数据等任务。


    ### 解决方案


    Spring Boot 默认启用 Spring JMX 支持，并会检测带有 `@ManagedResource` 注解的 bean，并将它们注册到 JMX
    服务器。

