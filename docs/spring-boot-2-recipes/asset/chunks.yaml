    HTTPS 而非 HTTP 访问应用程序的某些部分。


    ### 提示


    如果你不想显式配置 `TomcatServletWebServerFactory`，也可以使用 `BeanPostProcessor` 向 `TomcatServletWebServerFactory`
    注册额外的 Tomcat `Connector`。这样，你可以为不同的嵌入式容器实现此功能，而不是局限于单一容器。


    ```

    @Bean

    public BeanPostProcessor addHttpConnectorProcessor() {

    return new BeanPostProcessor() {

    @Override

    public Object postProcessBeforeInitialization(Object bean, String beanName)

    throws BeansException {

    if (bean instanceof TomcatServletWebServerFactory) {

    var factory = (TomcatServletWebServerFactory) bean;

    factory.addAdditionalTomcatConnectors(httpConnector());

    }

    return bean;

    }

    };

    }

