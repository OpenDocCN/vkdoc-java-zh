    pages will also be shown in the selected language.


    ## 3.7 Selecting and Configuring the Embedded Server


    ### Problem


    You want to use Jetty as an embedded container instead of the default Tomcat container.


    ### Solution


    Exclude the Tomcat runtime and include the Jetty runtime. Spring Boot will automatically
    detect if Tomcat, Jetty, or Undertow is on the classpath and configure the container
    accordingly.


    ### How It Works


    Spring Boot has out-of-the-box support for Tomcat, Jetty, and Undertow as embedded
    servlet containers. By default, Spring Boot uses Tomcat as the container (expressed
    through the `spring-boot-starter-tomcat` dependency in the `spring-boot-starter-web`
    artifact). The container can be configured using properties for which some apply
    to all containers and others to a specific container. The global properties are
    prefixed with `server.` or `server.servlet` whereas the container ones start with
    `server.<container>` (where `container` is either `tomcat`, `jetty`, or `undertow`).


    #### General Configuration Properties


    There are several general server properties available, as seen in Table 3-6.


    **Table 3-6** General Server Properties


    | Property | Description |

    | --- | --- |

    | `server.port` | The HTTP server port, default `8080` |

    | `server.address` | The IP Address to bind to, default `0.0.0.0` (i.e., all adapters)
    |

    | `server.use-forward-headers` | Should `X-Forwarded-*` headers be applied to
    the current request, default not set and uses the default from the selected servlet
    container |

    | `server.server-header` | Name of the header to be sent the Server name, default
    empty |

    | `server.max-http-header-size` | Maximum size of a HTTP header, default `0` (unlimited)
    |

    | `server.connection-timeout` | Timeout for HTTP connectors to wait for the next
    request before closing. Default is empty leaving it to the container; a value
    of `-1` means infinite and never timeout. |

    | `server.http2.enabled` | Enable Http2 support if the current container supports
    it. Default `false` |

    | `server.compression.enabled` | Should HTTP compression be enabled, default `false`
    |

    | `server.compression.mime-types` | Comma separated list of MIME types that compression
    applies to |

    | `server.compression.excluded-user-agents` | Comma separated list of user agents
    for which compression should be disabled |

    | `server.compression.min-response-size` | Minimum size of the request for compression
    to be applied, default `2048` |

    | `server.servlet.context-path` | The main context path of the application, default
    launched as the root application |

    | `server.servlet.path` | The path of the main `DispatcherServlet`, default `/`
    |

    | `server.servlet.application-display-name` | Name used as display name in the
    container, default `application` |

    | `server.servlet.context-parameters` | Servlet Container Context/init parameters
    |


    As the embedded containers all adhere to the Servlet specification, there is also
    support for JSP pages and that support is enabled by default. Spring Boot makes
    it easy to change the JSP provider or even disable the support in full. See Table
    3-7 for the exposed properties.


    **Table 3-7** JSP Related Server Properties


    | Property | Description |

    | --- | --- |

    | `server.servlet.jsp.registered` | Should the JSP servlet be registered, default
    `true` |

    | `server.servlet.jsp.class-name` | The JSP servlet classname, default `org.apache.jasper.servlet.JspServlet`
    as both Tomcat and Jetty use Jasper as the JSP implementation |

    | `server.servlet.jsp.init-parameters` | Context parameters for the JSP servlet
    |'
