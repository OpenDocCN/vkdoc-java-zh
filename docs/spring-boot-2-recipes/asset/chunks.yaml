    mockMvc.perform(get("/orders"))

    .andExpect(request().asyncStarted())

    .andDo(MockMvcResultHandlers.log())

    .andReturn();

    mockMvc.perform(asyncDispatch(mvcResult))

    .andDo(MockMvcResultHandlers.log())

    .andExpect(status().isOk())

    .andExpect(content().json("{\"id\":\"1234\",\"amount\":10}"));

    }

    }

    ```


    The test method first registers behavior on the mocked `OrderService` to return
    a single instance of an `Order`. Next we use `MockMvc` to perform a `get` on the
    `/orders` endpoint. As this is an asynchronous controller, the request should
    start asynchronous processing. Next we mimic the async dispatching and write assertions
    for the actual response. The result should be a single JSON element containing
    the `id` and `amount`.


    ### Sending Multiple Results as Events


    The `SseEmitter` can deliver events from the server to the client. Server-Sent-Events
    are messages from the server to the client. They have a `Content-Type` header
    of `text/event-stream`. They are quite lightweight, with only four fields (Table
    [4-2](#464036_1_En_4_Chapter.xhtml#Tab2)).


    **Table 4-2** Allowed Fields For Server-Sent-Events


    | Field | Description |

    | --- | --- |

    | id | The ID of the event |

    | event | the type of event |

    | data | The event data |

    | retry | Reconnection time for the event stream |


    To send events from a request handling method, you need to create an instance
    of `SseEmitter` and return it from the request handling method. Then use the `send`
    method to send individual elements to the client.


    ```java

    @GetMapping("/orders")

    public SseEmitter orders() {

    SseEmitter emitter = new SseEmitter();

    ExecutorService executor = Executors.newSingleThreadExecutor();

    executor.execute(() -> {

    var orders = orderService.findAll();

    try {

    for (var order : orders) {

    randomDelay();

    emitter.send(order);

    }

    emitter.complete();

    } catch (IOException e) {

    emitter.completeWithError(e);

    }

    });

    executor.shutdown();

    return emitter;

    }

    ```'
  raw: '#### Send Multiple Results in a Response


    Spring MVC has a class named `ResponseBodyEmitter`, which is useful if instead
    of a single result you want to return multiple objects to the client. When sending
    an object, it is converted to a result using an `HttpMessageConverter` . To use
    the `ResponseBodyEmitter` you have to construct it and return it from the request
    handling method.


    Create an `OrderController` with an `orders` method that returns a `ResponseBodyEmitter`
    and send the results one by one to the client.


    First create the `Order` and `OrderService`.


    ```

    public class Order {

    private String id;

    private BigDecimal amount;

    public Order() {

    }

    public Order(String id, BigDecimal amount) {

    this.id=id;

    this.amount = amount;

    }

    public String getId() {

    return id;

    }

    public void setId(String id) {

    this.id = id;

    }

    public BigDecimal getAmount() {

    return amount;

    }

    public void setAmount(BigDecimal amount) {

    this.amount = amount;

    }

    @Override

    public String toString() {

    return String.format("Order [id=''%s'', amount=%4.2f]", id, amount);

    }

    }

    ```


    Then add a simple `OrderService` to hold the orders.


    ```

    @Service

    public class OrderService {

    private final List orders = new ArrayList();

    @PostConstruct

    public void setup() {

    createOrders();

    }

    public Iterable findAll() {

    return List.copyOf(orders);

    }

    private Iterable createOrders() {

    for (int i = 0; i < 25; i++) {

    this.orders.add(createOrder());

    }

    return orders;

    }

    private Order createOrder() {

    String id = UUID.randomUUID().toString();

    double amount = ThreadLocalRandom.current().nextDouble(1000.00d);

    return new Order(id, BigDecimal.valueOf(amount));

    }

    }

    ```


    Now create the `OrderController` .


    ```

    @RestController

    public class OrderController {

    private final OrderService orderService;

    public OrderController(OrderService orderService) {

    this.orderService = orderService;

    }

    @GetMapping("/orders")

    public ResponseBodyEmitter orders() {

    var emitter = new ResponseBodyEmitter();

    var executor = Executors.newSingleThreadExecutor();

    executor.execute(() -> {

    var orders = orderService.findAll();

    try {

    for (var order : orders) {

    randomDelay();

    emitter.send(order);

    }

    emitter.complete();

    } catch (IOException e) {

    emitter.completeWithError(e);

    }

    });

    executor.shutdown();

    return emitter;

    }

    private void randomDelay() {

    try {

    Thread.sleep(ThreadLocalRandom.current().nextInt(150));

    } catch (InterruptedException e) {

    Thread.currentThread().interrupt();

    }

    }

    }

    ```


    First a `ResponseBodyEmitter` is created, and in the end returned from this method.
    Next a task is executed that will query the reservations using the `OrderService.findAll`
    method . All the results from that call are returned one by one using the `send`
    method of the `ResponseBodyEmitter`. When all the objects have been sent, the
    `complete()` method needs to be called so that the thread responsible for sending
    the response can complete the request and be freed up for the next response to
    handle. When an exception occurs and you want to inform the user of this, you
    call the `completeWithError`; the exception will pass through the normal exception
    handling of Spring MVC and after that the response is completed.


    When using a tool like httpie or curl, calling the URL `http://localhost:8080/orders`
    will yield a result similar to that depicted in Figure [4-2](#464036_1_En_4_Chapter.xhtml#Fig2).


    ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig2_HTML.jpg](images/464036_1_En_4_Chapter/464036_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Output of ResponseBodyEmitter


    Finally, let’s write a test for this controller. Annotate a class with `@RunWith`
    `(SpringRunner.class)` and `@WebMvcTest` `(OrderController.class)` to get a web
    slice test. The `OrderController` needs an `OrderService`, which is mocked by
    using `@MockBean` on the `OrderService` field.


    ```

    @RunWith(SpringRunner.class)

    @WebMvcTest(OrderController.class)

