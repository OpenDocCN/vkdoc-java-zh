- fmt: '# Write an Integration Test


    Writing an integration test requires some work. A WebSocket connection needs to
    be made to the server, and we need to manually send messages and check the response.
    But before that the server needs to be started.


    To start the server, annotate a class with `@RunWith(SpringRunner.class)` and
    `@SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)`.
    We actually want to start the application instead of the default `WebEnvironment.MOCK`.
    Use the `@LocalServerPort` annotation on an `int` field to get the actual port
    value. This value is needed to construct the `URI` to connect to.


    ```

    package com.apress.springbootrecipes.echo;

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    public class EchoHandlerIntegrationTest {

    @LocalServerPort

    private int port;

    }

    ```


    Testing websockets is fairly easy with the default Java WebSocket API. To test,
    you can write a basic WebSockets client that records the received messages and
    session. For this you would need a WebSocket client, like Tomcat.


    ```

    org.apache.tomcat.embed

    tomcat-embed-websocket

    test

    ```


    Adding this client, however, will result in bootstrapping a Tomcat server instead
    of the reactive Netty that we want. Add the following to the `EchoHandlerIntegrationTest`
    to circumvent this.


    ```

    public class EchoHandlerIntegrationTest {

    // Remainder of class omitted

    @Configuration

    @Import(EchoApplication.class)

    public static class EchoHandlerIntegrationTestConfiguratation {

    @Bean

    public NettyReactiveWebServerFactory webServerFactory() {

    return new NettyReactiveWebServerFactory();

    }

    }

    }

    ```


    This additional `@Configuration` class will explicitly launch Netty instead of
    Tomcat. This way we test against the same runtime as we would do when normally
    running our application. Depending on your client (or way of testing) this might
    not be needed.


    Now annotate a class with `@ClientEndpoint` and methods in that class with `@OnOpen`,
    `@OnClose`, and `@OnMessage`. These annotated methods will receive callbacks when
    the connection is opened, closed, and when a message is received, respectively.
    Next there are two helper methods: `sendTextAndWait` and `closeAndWait`. The `sendTextAndWait`
    will send a message using the `Session` and wait for a response. The `closeAndWait`
    will `close` the session and wait until that has been confirmed. Finally, there
    are some getter methods to receive the state and validate it in the test methods.


    ```

    @ClientEndpoint

    public static class SimpleTestClientEndpoint {

    private List received = new ArrayList();

    private Session session;

    private CloseReason closeReason;

    private boolean closed = false;

    @OnOpen

    public void onOpen(Session session) {

    this.session = session;

    }

    @OnClose

    public void onClose(Session session, CloseReason reason) {

    this.closeReason = reason;

    this.closed = true;

    }

    @OnMessage

    public void onMessage(String message) {

    this.received.add(message);

    }

    public void sendTextAndWait(String text, long timeout)

    throws IOException, InterruptedException {

    var current = received.size();

    session.getBasicRemote().sendText(text);

    wait(() -> received.size() == current, timeout);

    }

    public void closeAndWait(long timeout)

    throws IOException, InterruptedException {

    if (session != null && !closed) {

    session.close();

    }

    wait(() -> closeReason == null, timeout);

    }

    private void wait(Supplier condition, long timeout)

    throws InterruptedException {

    var waited = 0;

    while (condition.get() && waited  getReceived() {

    return this.received;

    }

    public boolean isClosed() {

    return closed;

    }

    }

    ```


    Now that the helper classes are in place, write the test. Use the WebSocket `ContainerProvider`
    to obtain the container. Before making the actual connection, you have to construct
    the URI using the `port` field. Next, use the `connectToServer` method to connect
    to the server, using an instance of the `SimpleTestClientEndpoint`. After connecting,
    send a text message to the server and wait for some time and close the connection
    (just to cleanup resources). The final thing is to actually do some assertions
    on the received messages.


    ```

    @Test

    public void sendAndReceiveMessage() throws Exception {

    var container = ContainerProvider.getWebSocketContainer();

    var uri = URI.create("ws://localhost:" + port + "/echo");

    var testClient = new SimpleTestClientEndpoint();

    container.connectToServer(testClient, uri);

    testClient.sendTextAndWait("Hello World!", 200);

    testClient.closeAndWait(2);

    assertThat(testClient.getReceived())

    .containsExactly("RECEIVED: Hello World!");

    }

    ```


    # 6. Spring Security


    In this chapter we will take a look at the Spring Security integration for Spring
    Boot. Spring Security can be used for both authentication and authorization of
    users for your application. Spring Security has a plugable mechanism for both
    the authentication and authorization process and by default, supports different
    mechanisms. For authentication, Spring Security out-of-the-box has support for
    JDBC, LDAP, and property files.


    ## 6.1 Enable Security in Your Spring Boot Application


    ### Problem


    You have a Spring Boot-based application and you want to enable security in this
    application.


    ### Solution


    Add the `spring-boot-starter-security` as a dependency to have security automatically
    configured and set up for your application.


    ### How it Works


    To get started you will need to get the libraries for Spring Security into your
    application; to do this you can add the `spring-boot-starter-security` to your
    list of dependencies.


    ```

    org.springframework.boot

    spring-boot-starter-security

    ```


    This will add the `spring-security-core`, `spring-security-config`, and `spring-security-web`
    dependencies to your project. Spring Boot detects the availability of some of
    the classes inside these JAR files, and with that will automatically enable security.


    Spring Boot will configure Spring Security with the following: authentication
    with Basic authentication and form login; enable HTTP headers for security; Servlet
    API integration; anonymous login; and disable caching of resources.'
