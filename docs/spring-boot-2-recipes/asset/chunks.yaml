    # 4. Spring MVC - Async


    When the Servlet API was released, the majority of the implementing containers
    used a thread per request. This meant a thread was blocked until the request processing
    finished and the response was sent to the client.


    In those early days there weren’t as many devices connected to the Internet as
    nowadays. Due to the increased number of devices, the number of HTTP requests
    handled has grown. Due to this increase for a lot of web applications, keeping
    a thread blocked isn’t workable anymore.


    As of the Servlet 3 specification, it is possible to handle a HTTP request asynchronously.
    This is done by releasing the thread that handled the HTTP request. The new thread
    will run in the background, and as soon as the result is available it’s written
    to the client. This all can be done in a nonblocking way on a Servlet 3.1-compliant
    servlet container. All used resources then also would have to be nonblocking.


    In the last couple of years there has also been an uprising in Reactive programming.
    As of Spring 5 it is possible to write Reactive web applications. To be reactive,
    spring utilizes Project Reactor as an implementation of the Reactive Streams API.
    It goes beyond the scope of this book to do a full dive into Reactive programming.
    Reactive programming is, in short, a way of doing nonblocking functional programming.


    When working with web applications there would be a request, HTML would render
    on the server, and that got sent back to the client. In the last couple of years,
    rendering of HTML moved to the client. Communication is done by returning JSON,
    XML, or another representation to the client.


    This was still a request and response cycle, although driven through an async
    call by the client through the `XmlHttpRequest`. There are also other ways of
    communicating between the client and server. One could use Server-Sent-Events
    to have one-way communication. For full duplex communication, one could use Web
    Sockets.


    Add the `spring-boot-starter-web` as a dependency when building a regular web
    application. Add `spring-boot-starter-webflux` when building a reactive application.


    ## 4.1 Asynchronous Request Handling with Controllers and TaskExecutor


    ### Problem


    To reduce the throughput on the servlet container, you want to asynchronously
    handle the request.'
