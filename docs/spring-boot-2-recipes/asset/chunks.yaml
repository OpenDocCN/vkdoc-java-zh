  raw: '### Warning


    Spring Boot will add a default user, named `user`, with a random generated password,
    visible in the startup logs. This is only intended to be used for testing, prototyping,
    or demos; do not use the generated user in a live system!.


    When adding the dependency `spring-boot-starter-security` to Recipe 3.2, it will
    automatically secure all exposed endpoints. At startup the generated password
    will be logged (Figure [6-1](#464036_1_En_6_Chapter.xhtml#Fig1)).


    Table 6-1


    Properties for Default User


    | Property | Description |

    | --- | --- |

    | `spring.security.user.name` | Default user name, default `user` |

    | `spring.security.user.password` | Password for the default user, default generated
    `UUID` |

    | `spring.security.user.roles` | Roles for the default user. Default none |


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig1_HTML.jpg](images/464036_1_En_6_Chapter/464036_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Generated password Output


    Spring Boot exposes some properties to configure the default user; those can be
    found in the `spring.security` namespace (Table [6-1](#464036_1_En_6_Chapter.xhtml#Tab1)).


    After adding the dependency and starting the `LibraryApplication` , the endpoints
    are secured. When trying to obtain a list of books from `http://localhost:8080/books`
    the result will be an HTTP result with status 401 - Unauthorized (Figure [6-2](#464036_1_En_6_Chapter.xhtml#Fig2)).


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig2_HTML.jpg](images/464036_1_En_6_Chapter/464036_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Unauthenticated access result


    When adding the correct authentication headers (username `user`, password from
    the logging or as specified in the `spring.security.user.password` property),
    the result will be the regular list of books (Figure [6-3](#464036_1_En_6_Chapter.xhtml#Fig3)).


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig3_HTML.jpg](images/464036_1_En_6_Chapter/464036_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Authenticated access result


    #### Testing Security


    When using Spring Security to secure your endpoints together with an `@WebMvcTest`,
    the security infrastructure will be automatically applied. Spring Security provides
    some nice annotations to help in writing tests (Table [6-2](#464036_1_En_6_Chapter.xhtml#Tab2)).


    ### Note


    If you want to test your controllers without security, you can disable it by setting
    the `secure` attribute on `@WebMvcTest` to `false`; it defaults to `true`.


    Table 6-2


    Spring Security Annotations for Testing


    | Annotation | Description |

    | --- | --- |

    | `@WithMockUser` | Run as the user with the given `username`, `password`, and
    `roles`/`authorities` |

    | `@WithAnonymousUser` | Run as an Anonymous user |

    | `@WithUserDetails` | Run as the user with the configured name, does a lookup
    in the `UserDetailsService` |


    To use these annotations, a dependency to `spring-security-test` must be added.


    ```

    org.springframework.security

    spring-security-test

    test


    ```


    With this dependency the `BookControllerTest` from Recipe 3.2 can be extended
    and fixed again. If you don’t mind disabling security for your test, you could
    add `@WebMvcTest` `(value = BookController.class, secure = false)` to the test
    class. With it, the security filter won’t be added and thus security will be disabled.
    The tests will run and succeed.


    ```

    @RunWith(SpringRunner.class)

    @WebMvcTest(value = BookController.class, secure = false)

    public class BookControllerUnsecuredTest { ... }

    ```


    If, however, you want to test with security enabled, you will need to make some
    minor modifications to the test class. First, add `@WithMockUser` to run with
    an authenticated user. Second, as Spring Security by default enabled CSRF^([^(26)](#fn26))
    protection, a header or parameter needs to be added to the request. When using
    Mock MVC, Spring Security provides a `RequestPostProcessor` for that, the `CsrfRequestPostProcessor`.
    The `SecurityMockMvcRequestPostProcessors` contains factory methods to easily
    use them.


    ```

    @RunWith(SpringRunner.class)

    @WebMvcTest(BookController.class)

    @WithMockUser

    public class BookControllerSecuredTest {

    @Test

    public void shouldAddBook() throws Exception {

    when(bookService.create(any(Book.class))).thenReturn(new Book("123456789", "Test
    Book Stored", "T. Author"));

    mockMvc.perform(post("/books")

    .contentType(MediaType.APPLICATION_JSON)

    .content("{ \"isbn\" : \"123456789\"}, \"title\" : \"Test Book\", \"authors\"
    : [\"T. Author\"]")

    .with(csrf()))

    .andExpect(status().isCreated())

    .andExpect(header()

    .string("Location", "http://localhost/books/123456789"));

    }

    }

    ```


    The test now uses the user as specified in `@WithMockUser` ; here it uses the
    default user, with `user` as the username and `password` as the password. The
    line `with(csrf())` takes care of adding the CSRF token to the request.


    Which option to use depends on the needs you have. If for instance in your controller
    you need the current user, then security should probably be enabled and an `@WithMockUser`
    or `@WithUserDetails` should be used. If that isn’t the case and you can test
    your controller without the security (and you don’t have additional security rules
    [see Recipe 6.2]), you can run with disabled security.


    #### Integration Testing Security


    When using `@SpringBootTest` to write an integration test, it depends on if you
    can use the `@With*` annotations . With the default mocked environment, it still
    will work.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest

    @WithMockUser

    @AutoConfigureMockMvc

    public class BookControllerIntegrationMockTest { ... }

    ```


    This test will create an almost full-blown application but still uses Mock MVC
    to access the endpoints. It still runs in the same process as the tests, and that
    is why the `@WithMockUser` and `with(csrf())` still work. When running the test
    on an external port, it won’t work anymore.


    To test the application on a port, you would need to run the tests through the
    test client `TestRestTemplate` and/or `WebTestClient` and pass the authentication
    headers or implement the flow by first doing a form-based login in your integration
    test. To write a successful integration test, inject the `TestRestTemplate,` and
    before doing the actual request use the `withBasicAuth` helper method to set the
    basic authentication header.'
