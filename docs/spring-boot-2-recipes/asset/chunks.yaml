    Library

    List of books

    ```


    For Thymeleaf you can use a `#{...}` expression in the `th:text` attribute; this
    will (due to the automatic Spring integration) resolve the messages from the `MessageSource`.
    When restarting the application, it appears as nothing has changed in the output.
    However all the texts now come from the `messages.properties`.


    Now let’s add a `messages_nl.properties` for the Dutch translation of the website.


    ```

    main.title=Spring Boot Recipes - Bibliotheek

    index.title=Bibliotheek

    index.books.link=Lijst van boeken

    books.list.title=Beschikbare Boeken

    books.list.table.title=Titel

    books.list.table.author=Auteur

    books.list.table.isbn=ISBN

    ```


    Now when changing the accept header to Dutch, the website will translate to Dutch
    (Figure [3-10](#464036_1_En_3_Chapter.xhtml#Fig10)).


    ### Tip


    Changing the language for your browser might not be that easy, for Chrome and
    Firefox there are plug-ins that allow you to switch the `Accept-Language` header
    easily.


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig10_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Homepage in Dutch


    ## 3.6 Resolving User Locales


    ### Problem


    In order for your web application to support internationalization, you have to
    identify each user’s preferred locale and display contents according to this locale.


    ### Solution


    In a Spring MVC application, a user’s locale is identified by a locale resolver,
    which has to implement the `LocaleResolver` interface. Spring MVC comes with several
    `LocaleResolver` implementations for you to resolve locales by different criteria.
    Alternatively, you may create your own custom locale resolver by implementing
    this interface.


    Spring Boot allows you to set the `spring.mvc.locale-resolver` property. This
    can be set to `ACCEPT` (the default) or `FIXED`. The first will create an `AcceptHeaderLocaleResolver`;
    the latter, a `FixedLocaleResolver`.


    You can also define a locale resolver by registering a bean of type `LocaleResolver`
    in the web application context. You must set the bean name of the locale resolver
    to `localeResolver` so it can be autodetected.


    ### How It Works


    Spring MVC ships with several default implementations of the `LocaleResolver`
    interface. There is a `HandlerInterceptor` provided to allow users to override
    the locale they want to use, the `LocaleChangeInterceptor`.


    #### Resolving Locales by an HTTP Request Header


    The default locale resolver registered by Spring Boot is the `AcceptHeaderLocaleResolver`.
    It resolves locales by inspecting the `Accept-Language` header of an HTTP request.
    This header is set by a user’s web browser according to the locale setting of
    the underlying operating system.


    ### Note


    The `AcceptHeaderLocaleResolver` cannot change a user’s locale, because it is
    unable to modify the locale setting of the user’s operating system.


    ```

    @Bean

    public LocaleResolver localeResolver () {

    return new AcceptHeaderLocaleResolver();

    }

    ```


    #### Resolving Locales by a Session Attribute


    Another option of resolving locales is by `SessionLocaleResolver`. It resolves
    locales by inspecting a predefined attribute in a user’s session. If the session
    attribute doesn’t exist, this locale resolver determines the default locale from
    the `Accept-Language` HTTP header.


    ```

    @Bean

    public LocaleResolver localeResolver () {

    SessionLocaleResolver localeResolver = new SessionLocaleResolver();

    localeResolver.setDefaultLocale(new Locale("en"));

    return localeResolver;

    }

    ```


    You can set the `defaultLocale` property for this resolver in case the session
    attribute doesn’t exist. Note that this locale resolver is able to change a user’s
    locale by altering the session attribute that stores the locale.


    #### Resolving Locales by a Cookie


    You can also use `CookieLocaleResolver` to resolve locales by inspecting a cookie
    in a user’s browser. If the cookie doesn’t exist, this locale resolver determines
    the default locale from the `Accept-Language` HTTP header.


    ```

    @Bean

    public LocaleResolver localeResolver() {

    return new CookieLocaleResolver();

    }

    ```


    The cookie used by this locale resolver can be customized by setting the `cookieName`
    and `cookieMaxAge` properties. The `cookieMaxAge` property indicates how many
    seconds this cookie should be persisted. The value `-1` indicates that this cookie
    will be invalid after the browser is closed.


    ```

    @Bean

    public LocaleResolver localeResolver() {

    CookieLocaleResolver cookieLocaleResolver = new CookieLocaleResolver();

    cookieLocaleResolver.setCookieName("language");

    cookieLocaleResolver.setCookieMaxAge(3600);

    cookieLocaleResolver.setDefaultLocale(new Locale("en"));

    return cookieLocaleResolver;

    }

    ```


    You can also set the `defaultLocale` property for this resolver in case the cookie
    doesn’t exist in a user’s browser. This locale resolver is able to change a user’s
    locale by altering the cookie that stores the locale.


    #### Using a Fixed Locale


    The `FixedLocaleResolver` always returns the same fixed locale. By default it
    returns the JVM default locale but it can be configured to return a different
    one by setting the `defaultLocale` property.


    ```

    @Bean

    public LocaleResolver localeResolver() {

    FixedLocaleResolver cookieLocaleResolver = new FixedLocaleResolver();

    cookieLocaleResolver.setDefaultLocale(new Locale("en"));

    return cookieLocaleResolver;

    }

    ```


    ### Note


    The `FixedLocaleResolver` cannot change a user’s locale because, as the name implies,
    it is fixed.


    #### Changing a User’s Locale


    In addition to changing a user’s locale by calling `LocaleResolver.setLocale()`
    explicitly, you can also apply `LocaleChangeInterceptor` to your handler mappings.
    This interceptor detects if a special parameter is present in the current HTTP
    request. The parameter name can be customized with the `paramName` property of
    this interceptor (default is `locale`). If such a parameter is present in the
    current request, this interceptor changes the user’s locale according to the parameter
    value.


    To be able to change the locale, a `LocaleResolver` that allows change has to
    be used.


    ```

    @Bean

    public LocaleResolver localeResolver() {

    return new CookieLocaleResolver();

    }

    ```


    To change the locale, add the `LocaleChangeInterceptor` as a bean and register
    it as an interceptor; for the latter, use the `addInterceptors` method from the
    `WebMvcConfigurer`.'
