    \                <th>Amount</th>\n            </tr>\n        </thead>\n      \
    \  <tbody>\n            <tr th:each=\"order : ${orders}\">\n                <td\
    \ th:text=\"${order.id}\">Id</td>\n                <td th:text=\"${order.amount}\"\
