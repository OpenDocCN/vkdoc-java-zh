  trans: '

    #### 响应式控制器的单元测试


    对控制器进行集成测试有两种方式。第一种是直接编写测试，创建 `HelloWorldController` 的实例，调用其方法，并对结果进行断言。第二种是使用
    `@WebFluxTest` 注解来创建测试。后者会启动一个包含 Web 基础设施的最小化应用上下文，你可以使用 `MockMvc` 来测试控制器。这种方式介于纯单元测试和完整集成测试之间。


    ```

    package com.apress.springbootrecipes.helloworld;

    import org.junit.Test;

    import reactor.core.publisher.Mono;

    import reactor.test.StepVerifier;

    public class HelloWorldControllerTest {

    private final HelloWorldController controller = new HelloWorldController();

    @Test

    public void shouldSayHello() {

    Mono result = controller.hello();

    StepVerifier.create(result)

    .expectNext("Hello World, from Reactive Spring Boot 2!")

    .verifyComplete();

    }

    }

    ```


    这是一个基础的单元测试。它实例化了控制器，并直接调用了待测试的方法。它使用了 `reactive-test` 模块中的 `StepVerifier` 来简化测试过程。调用
    `hello` 方法后，使用 `StepVerifier` 对结果进行验证。


    添加 `reactive-test` 依赖的方式如下：


    ```

    io.projectreactor

    reactor-test

    test


    ```


    第二种选择是针对特定控制器使用 `@WebFluxTest`。


    ```

    @RunWith(SpringRunner.class)

    @WebFluxTest(HelloWorldController.class)

    public class HelloWorldControllerSliceTest {

    @Autowired

    private WebTestClient webClient;

    @Test

    public void shouldSayHello() {

    webClient.get().uri("/hello").accept(MediaType.TEXT_PLAIN)

    .exchange()

    .expectStatus().isOk()

    .expectBody(String.class)

    .isEqualTo("Hello World, from Reactive Spring Boot 2!");

    }

    }

    ```


    此测试会启动一个最小化的 Spring Boot 上下文，并自动检测项目中所有与 Web 相关的 Bean，例如 `@ControllerAdvice`、`@Controller`
    等。现在不再直接调用 `HelloWorldController`，而是使用特殊的 `WebTestClient` 来声明一个请求 `.get().uri("/hello")`，并通过
    `exchange()` 以非阻塞方式发送该请求。最后，对断言/期望进行验证。预期该请求应返回 OK 状态，并包含指定的响应体。


    #### 响应式控制器的集成测试


    集成测试看起来与上一节的 `@WebFluxTest` 非常相似。主要区别在于使用 `@SpringBootTest` 而不是 `@WebFluxTest`。使用
    `@SpringBootTest` 会启动完整的应用程序，包括所有其他 Bean（服务、仓库等）。通过 `webEnvironment` 可以指定要使用的环境：可选值有
    `RANDOM_PORT`、`MOCK`（默认）、`DEFINED_PORT` 和 `NONE`。这里我们使用随机端口，并再次使用 `WebTestClient`
    来发起请求。


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    public class HelloWorldControllerIntegrationTest {

    @Autowired

    private WebTestClient webClient;

    @Test

    public void shouldSayHello() {

    webClient.get().uri("/hello").accept(MediaType.TEXT_PLAIN)

    .exchange()

    .expectStatus().isOk()

    .expectBody(String.class)

    .isEqualTo("Hello World, from Reactive Spring Boot 2!");

    }

    }

    ```


    请求被发送到内嵌服务器，之后验证结果的状态和响应体内容是否正确。


    ### 注意


    当使用 `MOCK`（也是默认值）作为 `webEnvironment` 时，必须添加 `@AutoConfigureWebTestClient` 注解才能获取用于测试的
    `WebTestClient`。


    ## 5.2 使用响应式 REST 服务进行发布和消费


    ### 问题


    你想要编写一个能够生成 JSON 的响应式 REST 端点。


    ### 解决方案


    与常规的 `@RestController` 一样，你可以返回一个普通对象或对象列表，这些对象将被发送给客户端。为了使它们具有响应式特性，你需要将这些返回值包装成对应的响应式类型：`Mono`
    或 `Flux`。

    '
- fmt: "### How it Works\n\nLet’s start by writing a Reactive `OrderService`. Each\
    \ method will return either a `Mono<Order>` or a `Flux<Order>`.\n\n```java\npackage\
    \ com.apress.springbootrecipes.order;\n\n@Service\npublic class OrderService {\n\
    \  private final Map orders = new ConcurrentHashMap(10);\n\n  @PostConstruct\n\
    \  public void init() {\n    OrderGenerator generator = new OrderGenerator();\n\
    \    for (int i = 0; i < 25; i++) {\n      save(generator.generate());\n    }\n\
    \  }\n\n  public Mono<Order> findById(String id) {\n    return Mono.justOrEmpty(orders.get(id));\n\
    \  }\n\n  public Mono<Order> save(Mono<Order> order) {\n    return order.map(this::save);\n\
    \  }\n\n  private Order save(Order order) {\n    orders.put(order.getId(), order);\n\
    \    return order;\n  }\n\n  public Flux<Order> orders() {\n    return Flux.fromIterable(orders.values()).delayElements(Duration.ofMillis(128));\n\
    \  }\n}\n```\n\nThe `OrderService` creates 25 random orders at startup. It has\
    \ some simple methods to obtain or save an order. When retrieving all orders,\
    \ it will delay them for 128 milliseconds. Next to this service, create a basic\
    \ `Order` class and `OrderGenerator`.\n\n```java\npackage com.apress.springbootrecipes.order;\n\
    \n// Imports omitted\npublic class Order {\n  private String id;\n  private BigDecimal\
    \ amount;\n\n  public Order() {\n  }\n\n  public Order(String id, BigDecimal amount)\
    \ {\n    this.id = id;\n    this.amount = amount;\n  }\n\n  public String getId()\
    \ {\n    return id;\n  }\n\n  public void setId(String id) {\n    this.id = id;\n\
    \  }\n\n  public BigDecimal getAmount() {\n    return amount;\n  }\n\n  public\
    \ void setAmount(BigDecimal amount) {\n    this.amount = amount;\n  }\n\n  @Override\n\
    \  public String toString() {\n    return String.format(\"Order [id='%s', amount=%4.2f]\"\
    , id, amount);\n  }\n\n  @Override\n  public boolean equals(Object o) {\n    if\
    \ (this == o) return true;\n    if (o == null || getClass() != o.getClass()) return\
    \ false;\n    Order order = (Order) o;\n    return Objects.equals(id, order.id)\
    \ &&\n        Objects.equals(amount, order.amount);\n  }\n\n  @Override\n  public\
    \ int hashCode() {\n    return Objects.hash(id, amount);\n  }\n}\n```\n\nThis\
    \ is the full `Order` class; it holds nothing more than an id and a total amount.\n\
    \nThe `OrderGenerator` is a simple component for creating `Order` instances.\n\
    \n```java\npackage com.apress.springbootrecipes.order;\n\nimport java.math.BigDecimal;\n\
    import java.util.UUID;\nimport java.util.concurrent.ThreadLocalRandom;\n\npublic\
    \ class OrderGenerator {\n  public Order generate() {\n    var amount = ThreadLocalRandom.current().nextDouble(1000.00);\n\
    \    return new Order(UUID.randomUUID().toString(),\n        BigDecimal.valueOf(amount));\n\
    \  }\n}\n```\n\nAn `OrderController` is needed to expose the `Order` as a REST\
    \ resource.\n\n```java\npackage com.apress.springbootrecipes.order.web;\n\nimport\
    \ com.apress.springbootrecipes.order.Order;\nimport com.apress.springbootrecipes.order.OrderService;\n\
    import org.springframework.web.bind.annotation.*;\nimport reactor.core.publisher.Flux;\n\
    import reactor.core.publisher.Mono;\n\n@RestController\n@RequestMapping(\"/orders\"\
    )\npublic class OrderController {\n  private final OrderService orderService;\n\
    \n  OrderController(OrderService orderService) {\n    this.orderService = orderService;\n\
    \  }\n\n  @PostMapping\n  public Mono<Order> store(@RequestBody Mono<Order> order)\
    \ {\n    return orderService.save(order);\n  }\n\n  @GetMapping(\"/{id}\")\n \
    \ public Mono<Order> find(@PathVariable(\"id\") String id) {\n    return orderService.findById(id);\n\
    \  }\n\n  @GetMapping\n  public Flux<Order> list() {\n    return orderService.orders();\n\
    \  }\n}\n```\n\nThe `OrderController` is mapped to `/orders` and supports listing\
    \ all orders or a single one and adding/modifying an order. To bootstrap everything,\
    \ a simple `OrderApplication` is needed.\n\n```java\npackage com.apress.springbootrecipes.order;\n\
    \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    \n@SpringBootApplication\npublic class OrderApplication {\n  public static void\
    \ main(String[] args) {\n    SpringApplication.run(OrderApplication.class, args);\n\
    \  }\n}\n```\n\nUsing something like cUrl or httpie, you can query the endpoint.\n\
    \nAn `http http://localhost:8080/orders --stream` should list all the orders in\
    \ the system (Figure [5-1](#464036_1_En_5_Chapter.xhtml#Fig1)) and `http http://localhost:8080/orders/{some-id}`\
    \ should list a single one.\n\n![../images/464036_1_En_5_Chapter/464036_1_En_5_Fig1_HTML.jpg](images/464036_1_En_5_Chapter/464036_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nResult of getting all orders\n\n### Streaming JSON\n\nThe result\
    \ of the call to `/orders` isn’t streaming, but rather it is blocking. It first\
    \ collects all the results before sending them out. See also the Content-Type\
    \ header in Figure [5-1](#464036_1_En_5_Chapter.xhtml#Fig1); it is set to `application/json`.\
    \ To stream the result, it should be `application/stream+json`. For this, modify\
    \ the controller’s `list` method.\n\n```java\n@GetMapping(produces = MediaType.APPLICATION_STREAM_JSON_VALUE)\n\
    public Flux<Order> list() {\n  return orderService.orders();\n}\n```\n\nNotice\
    \ the `produces = MediaType.APPLICATION_STREAM_JSON_VALUE`. This instructs Spring\
    \ to stream the results when a part is ready. Restart the application and again\
    \ issue an `http http://localhost:8080/orders --stream`. The result will now gently\
    \ stream in until there is nothing more to consume (Figure [5-2](#464036_1_En_5_Chapter.xhtml#Fig2)).\n\
    \n![../images/464036_1_En_5_Chapter/464036_1_En_5_Fig2_HTML.jpg](images/464036_1_En_5_Chapter/464036_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\n\nResult of streaming all orders\n\nThe result also slightly changed:\
    \ instead of returning an array or orders (see Figure [5-1](#464036_1_En_5_Chapter.xhtml#Fig1))\
    \ it now returns single orders (see Figure [5-2](#464036_1_En_5_Chapter.xhtml#Fig2)).\n\
    \n### Server Sent Events\n\nInstead of using a stream of JSON, one can also use\
    \ Server Sent Events. With WebFlux this is as easy as changing the produces in\
    \ the `@GetMapping` to `MediaType.TEXT_EVENT_STREAM_VALUE`. Then events will be\
    \ written.\n\n```java\n@GetMapping(produces = MediaType.TEXT_EVENT_STREAM_VALUE)\n\
    public Flux<Order> list() {\n  return orderService.orders();\n}\n```\n\nRestart\
    \ the application and again issue an `http http://localhost:8080/orders --stream`.\
    \ The result, as events, will now gently stream in until there is nothing more\
    \ to consume (Figure [5-3](#464036_1_En_5_Chapter.xhtml#Fig3)). Notice that the\
    \ content type has changed to `text/event-stream`.\n\n![../images/464036_1_En_5_Chapter/464036_1_En_5_Fig3_HTML.jpg](images/464036_1_En_5_Chapter/464036_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\n\nResult of streaming all orders as events"
