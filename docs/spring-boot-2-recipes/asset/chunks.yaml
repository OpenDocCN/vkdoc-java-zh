    # 8. Java 企业级服务


    在本章中，你将学习 Spring 对最常见 Java 企业级服务的支持：Java 管理扩展（JMX）、使用 JavaMail 发送电子邮件、后台处理以及任务调度。


    JMX 是 JavaSE 的一部分，是一种用于管理和监控系统资源（如设备、应用程序、对象和服务驱动网络）的技术。这些资源被表示为托管 Bean（MBean）。Spring
    通过将任何 Spring Bean 导出为模型 MBean 来支持 JMX，而无需针对 JMX API 进行编程。此外，Spring 可以轻松访问远程 MBean。


    JavaMail 是 Java 中用于发送电子邮件的标准 API 和实现。Spring 进一步提供了一个抽象层，以独立于实现的方式发送电子邮件。


    ## 8.1 Spring 异步处理


    ### 问题


    你希望异步调用一个包含长时间运行方法的方法。


    ### 解决方案


    Spring 支持配置 `TaskExecutor`，并能够异步执行带有 `@Async` 注解的方法。这可以以透明的方式完成，无需进行异步执行的常规设置。然而，Spring
    Boot 不会自动检测异步方法执行的需求。必须使用 `@EnableAsync` 配置注解来启用此支持。


    ### 工作原理


    让我们编写一个组件，以异步方式向控制台打印一些内容。


    ```

    package com.apress.springbootrecipes.scheduling;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.scheduling.annotation.Async;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorld {

    private static final Logger logger = LoggerFactory.getLogger(HelloWorld.class);

    @Async

    public void printMessage() throws InterruptedException {

    Thread.sleep(500);

    logger.info("Hello World, from Spring Boot 2!");

    }

    }

    ```


    该类将等待 500 毫秒，然后向日志记录器打印内容。注意方法上的 `@Async` 注解；这表示该方法可以以异步方式执行。但是，必须为 Spring Boot
    应用程序显式启用此支持。


    要启用异步处理，需要 `@EnableAsync` 配置注解。最简单的解决方案是将此注解添加到你的应用程序类中。


    ```

    package com.apress.springbootrecipes.scheduling;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.scheduling.annotation.EnableAsync;

    import org.springframework.scheduling.annotation.EnableScheduling;

    import java.io.IOException;

    @SpringBootApplication

    @EnableAsync

    public class ThreadingApplication {

    public static void main(String[] args) throws IOException {

    SpringApplication.run(ThreadingApplication.class, args);

    System.out.println("Press [ENTER] to quit:");

    System.in.read();

    }

    @Bean

    public ApplicationRunner startupRunner(HelloWorld hello) {

    return (args) -> {hello.printMessage();};

    }

    }

    ```


    Spring Boot 默认会创建一个名为 `applicationTaskExecutor` 的 `TaskExecutor`。当添加 `@EnableAsync`
    时，它将自动检测此实例并将其用于方法的异步执行，同时还会启用对 `@Async` 注解方法的检测。


    `System.in.read` 的存在是为了防止应用程序关闭，以便后台任务可以完成处理。当按下 ENTER 键时，程序将退出。通常，在开发 Web 应用程序时，你不需要这样的东西。

    '
- fmt: '### Configuring the TaskExecutor


    Spring Boot will automatically configure a `ThreadPoolTaskExecutor`. This can
    be configured through the properties in the `spring.task.execution` namespace
    (Table 8-1).


    **Table 8-1** Spring Boot Task Executor Properties


    | Property | Description |

    | --- | --- |

    | `spring.task.execution.pool.core-size` | Number of core threads, default 8 |

    | `spring.task.execution.pool.max-size` | Maximum number of threads, default `Integer.MAX_VALUE`
    |

    | `spring.task.execution.pool.queue-capacity` | Queue capacity. Default is unbounded
    and this by default ignores the `max-size` property. |

    | `spring.task.execution.pool.keep-alive` | Limit of how long threads can be idle
    before being terminated |

    | `spring.task.execution.thread-name-prefix` | Prefix to use for the names of
    newly created threads. Default is `task-` |

    | `spring.task.execution.pool.allow-core-thread-timeout` | Are core threads allowed
    to time out, default true. This enables dynamically growing and shrinking the
    pool. |


    Adding the following to the `application.properties` will override some of the
    defaults.


    ```

    spring.task.execution.pool.core-size=4

    spring.task.execution.pool.max-size=16

    spring.task.execution.pool.queue-capacity=125

    spring.task.execution.thread-name-prefix=sbr-exec-

    ```


    Now when rerunning the application, the name of the thread will start with `sbr-exec`.
    It will start four threads and will grow to a maximum size of 16. To enable pool
    resizing, it is required to give a fixed number to the capacity of the queue.
    Too large (or unbounded) will not increase the number of threads automatically.


    ### Use the TaskExecutorBuilder to Create a TaskExecutor


    If you need to construct a `TaskExecutor`, Spring Boot provides the `TaskExecutorBuilder`.
    This builder class makes it easier to construct a `ThreadPoolTaskExecutor`. It
    allows us to set the same properties as shown in Table 8-1.


    ```

    @Bean

    public TaskExecutor customTaskExecutor(TaskExecutorBuilder builder) {

    return builder.corePoolSize(4)

    .maxPoolSize(16)

    .queueCapacity(125)

    .threadNamePrefix("sbr-exec-").build();

    }

    ```


    If there are, for some reason, multiple `TaskExecutor` instances in your application,
    you would need to either mark one of them as `@Primary` to be used as the default
    `TaskExecutor` or use the `AsyncConfigurer` interface and implement the `taskExecutor`
    method to return the default `TaskExecutor` to use.


    ```

    @SpringBootApplication

    @EnableAsync

    public class ThreadingApplication implements AsyncConfigurer {

    @Bean

    public ThreadPoolTaskExecutor taskExecutor() { ... }

    @Override

    public Executor getAsyncExecutor() {

    return taskExecutor();

    }

    }

    ```


    ## 8.2 Spring Task Scheduling


    ### Problem


    You want to schedule a method invocation in a consistent manner, using either
    a cron expression, an interval, or a rate.


    #### Solution


    Spring has support to configure `TaskExecutor`s and `TaskScheduler`s. This capability,
    coupled with the ability to schedule method execution using the `@Scheduled` annotation,
    makes Spring scheduling support work with a minimum of fuss: all you need are
    a method, an annotation, and to have switched on the scanner for annotations.
    Spring Boot will not automatically detect the need for scheduling; you will have
    to enable it yourself using the `@EnableScheduling` annotation.


    ### How It Works


    Let’s write a component that prints out a message in the logging every four seconds.
    Create a Java class and use the `@Scheduled` annotation on a method to indicate
    that this needs to be invoked. Using `fixedRate=4000` as an argument, it will
    run every four seconds. If you want to use a cron expression, you can set the
    `cron` attribute on the `@Scheduled` annotation instead.


    ```

    package com.apress.springbootrecipes.scheduling;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorld {

    private static final Logger logger =

    LoggerFactory.getLogger(HelloWorld.class);

    @Scheduled(fixedRate = 4000)

    public void printMessage() {

    logger.info("Hello World, from Spring Boot 2!");

    }

    }

    ```


    The `@Component` will make sure that it will be detected by Spring Boot.


    The next thing to do is enable scheduling for your application. The easiest solution
    is to annotate the application class with `@EnableScheduling`. Of course you can
    also place it on other `@Configuration` annotated classes.


    ```

    package com.apress.springbootrecipes.scheduling;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;

    @SpringBootApplication

    @EnableScheduling

    public class SchedulingApplication {

    public static void main(String[] args) {

    SpringApplication.run(SchedulingApplication.class, args);

    }

    }

    ```


    The `@EnableScheduling` will enable the detection of `@Scheduled` annotated methods
    and will register a `TaskScheduler` to use for scheduling tasks. When a single
    `TaskScheduler` is detected in the application context, it will use that one rather
    than creating a new one.


    Running the `SchedulingApplication` will give you an output in the logs about
    every four seconds.


    Instead of using the `@Scheduled` annotation, you could also schedule a method
    using Java. This can be needed if you cannot place a `@Scheduled` annotation on
    the method you want to execute periodically or you just want to limit the amount
    of annotations. For this you can use the `SchedulingConfigurer`, which has a single
    callback method to configure additional tasks.


    ```

    @SpringBootApplication

    @EnableScheduling

    public class SchedulingApplication implements SchedulingConfigurer {

    @Autowired

    private HelloWorld helloWorld;

    public static void main(String[] args) {

    SpringApplication.run(SchedulingApplication.class, args);

    }

    @Override

    public void configureTasks(ScheduledTaskRegistrar taskRegistrar) {

    taskRegistrar.addFixedRateTask(

    () -> helloWorld.printMessage()

    , 4000);

    }

    }

    ```


    ## 8.3 Sending E-mail


    Spring Boot will automatically configure the ability to send mail when mail properties
    and the java mail library are detected on the classpath. In this recipe we will
    take a look at how to set the properties and how to send an e-mail using Spring
    Boot.


    ### Problem


    You want to send e-mail from a Spring Boot application.


    ### Solution


    Spring’s e-mail support makes it easier to send e-mail by providing an abstract
    and implementation-independent API for sending e-mail. The core interface of Spring’s
    e-mail support is `MailSender`. The `JavaMailSender` interface is a subinterface
    of `MailSender` that includes specialized JavaMail features such as Multipurpose
    Internet Mail Extensions (MIME message) support. To send an e-mail message with
    HTML content, inline images, or attachments, you have to send it as a MIME message.
    Spring Boot will automatically configure the `JavaMailSender` when the `javax.mail`
    classes are found on the classpath and when the appropriate `spring.mail` properties
    have been set.'
