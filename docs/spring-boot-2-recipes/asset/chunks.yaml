    # 10. Spring Boot Actuator


    在开发应用程序时，你通常也希望能够监控应用程序的行为。Spring Boot 通过引入 Spring Boot Actuator 使得这一过程变得非常简单。Spring
    Boot Actuator 向相关方公开应用程序的健康状况和指标。这可以通过 JMX、HTTP 实现，或者导出到外部系统。


    健康端点可以告知应用程序和/或其所运行系统的健康状况。它会检测数据库是否正常运行、报告磁盘空间等。指标端点则公开使用情况和性能统计数据，例如请求数量、最长请求时间、最快请求时间、连接池利用率等。


    所有这些指标在启用后，既可以通过 JMX 或 HTTP 查看，也可以自动导出到外部系统，如 Graphite、InfluxDB 等。


    ## 10.1 启用和配置 Spring Boot Actuator


    ### 问题


    你希望在应用程序中启用健康检查和指标功能，以便能够监控应用程序的状态。


    ### 解决方案


    将 `spring-boot-starter-actuator` 依赖添加到你的项目中，健康检查和指标功能将被启用并公开给你的应用程序。可以通过 `management`
    命名空间下的属性进行额外配置。

