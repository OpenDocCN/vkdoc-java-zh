    assertThat(order).hasNoNullFieldsOrProperties();

    }

    }

    ```


    这里有两个测试方法：第一个是普通方法，手动将消息转换为 `Order`；而第二个方法使用 `receiveAndConvert` 方法，让转换自动完成。这旨在展示
    `MessageConverter` 的作用，以及它如何使你的代码更具可读性。`MappingJackson2MessageConverter` 将 `Order`
    转换为 `BytesMessages`。要使用 `TextMessage`，你可以将 `targetType` 属性设置为 `TEXT`。然后，你将收到一个
    `TextMessage`，其负载是一个 JSON 格式的 `String`。


    ## 9.3 使用 JMS 接收消息


    ### 问题


    你想从 JMS 目的地读取消息，以便在应用程序中处理它们。


    ### 解决方案


    创建一个类，并使用 `@JmsListener` 注解方法，将其绑定到一个目的地并处理传入的消息。


    ### 工作原理


    你可以创建一个 POJO，并使用 `@JmsListener` 注解其方法。Spring 会检测到这一点，并为其创建一个 JMS 监听器。Spring Boot
    暴露了属性，用于在 `spring.jms.listener` 命名空间下配置监听器。


    #### 接收消息


    让我们创建一个服务，用于监听来自配方 9.2 中发送者发送的消息。


    ```

    @Component

    class CurrentDateTimeService {

    @JmsListener(destination = "time-queue")

    public void handle(Message msg) throws JMSException {

    Assert.state(msg instanceof TextMessage, "Can only handle TextMessage.");

    System.out.println("[RECEIVED] - " + ((TextMessage) msg).getText());

    }

    }

    ```


    这是一个普通的类，其方法使用了 `@JmsListener` 注解，该注解至少需要一个 `destination` 属性，以便知道从哪里检索消息。它接受一个
    `javax.jms.Message` 参数，我们验证其为 `TextMessage` 类型，并将内容打印到控制台。`@JmsListener` 注解方法的方法签名具有一定的灵活性，因为它允许使用多个参数，这些参数可以是注解类型的，也可以是特定类型的（表
    9-6）。


    表 9-6


    允许的方法参数类型


    | 类型 | 描述 |

    | --- | --- |

    | `java.lang.String` | 获取消息负载为 `String`，仅适用于 `TextMessage` |

    | `java.util.Map` | 获取消息负载为 `Map`，仅适用于 `MapMessage` |

    | `byte[]` | 获取消息负载为 `byte[]`，仅适用于 `BytesMessage` |

    | 可序列化对象 | 从 `ObjectMessage` 反序列化对象 |

    | `javax.jms.Message` | 获取实际的 JMS 消息 |

    | `javax.jms.Session` | 访问 `Session`，例如用于发送自定义回复 |

    | `@Header` 注解的元素 | 从 JMS 消息中提取一个标头 |

    | `@Headers` 注解的元素 | 仅可用于 `java.util.Map`，以获取所有 JMS 消息标头 |


    监听器可以简化，只需使用 `String` 作为方法参数，而无需我们自己处理 `javax.jms.Message`。


    ```

    @Component

    class CurrentDateTimeService {

    @JmsListener(destination = "time-queue")

    public void handle(String msg) {

    System.out.println("[RECEIVED] - " + msg);

    }

    }

    ```


    #### 配置监听器容器


    Spring 使用 `JmsListenerContainerFactory` 来创建支持 `@JmsListener` 注解所需的基础设施。Spring
    Boot 配置了一个默认的工厂，可以使用 `spring.jms.listener` 命名空间下的属性进行配置。如果这还不够，你始终可以配置自己的实例，并手动完成所有配置选项。当
    Spring Boot 在上下文中检测到 `JmsListenerContainerFactory` 时，它将不再创建。


    表 9-7


    监听器容器属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.jms.listener.acknowledge-mode` | 容器的确认模式，默认为自动。 |

    | `spring.jms.listener.auto-startup` | 启动时自动启动容器。默认值为 `true` |

    | `spring.jms.listener.concurrency` | 并发消费者的最小数量。默认值为 none，导致 1 个并发消费者（Spring
    默认值）。 |

    | `spring.jms.listener.max-concurrency` | 并发消费者的最大数量。默认值为 none，导致 1 个并发消费者（Spring
    默认值）。 |

    | `spring.jms.pub-sub-domain` | 默认目的地是主题。默认值为 `false`，表示队列。 |


    默认配置的 `JmsListenerContainerFactory` 也会检测单个、唯一的 `DestinationResolver` 和 `MessageConverter`，如果找到，则会使用它们；否则，它将使用
    Spring 默认的 `DynamicDestinationResolver` 和 `SimpleMessageConverter`（更多信息请参见配方 9.2）。


    #### 使用自定义 **MessageConverter**


    如果你想通过 JMS 将对象作为 JSON 发送到下一个系统，该怎么办？你可以依赖 Java 序列化，但这通常不被推荐，因为它会使系统紧密耦合。使用 JSON
    或 XML 来传输对象/消息是更好的方式。使用 Spring JMS，只需配置一个不同的 `MessageConverter` 即可（发送部分也请参见配方
    9.2）。


    ```

    @Bean

    public MappingJackson2MessageConverter messageConverter() {

    var messageConverter = new MappingJackson2MessageConverter();

    messageConverter.setTypeIdPropertyName("content-type");

    messageConverter.setTypeIdMappings(singletonMap("order", Order.class));

    return messageConverter;

    }

    ```


    `MappingJackson2MessageConverter` 默认需要一个属性名来存放内容类型的标识符。该标识符将从 JMS 消息的标头中读取（这里我们将其设置为
    `content-type`）。接下来，我们可以选择性地定义类型与类之间的映射。由于我们希望能够将对象映射到 `Order` 类，我们将其指定为内容类型 `order`
    的映射。


    ```

    @Component

    class OrderService {

    @JmsListener(destination = "orders")

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    ```


    监听器接收 `Order` 对象，因为 Spring JMS 会负责接收和转换消息。如果你将此监听器与配方 9.2 中的订单发送者结合使用，你将看到源源不断的订单流入。

