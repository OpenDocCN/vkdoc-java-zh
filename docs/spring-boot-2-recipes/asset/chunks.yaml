- fmt: '#### Testing Mongo Repositories


    When testing MongoDB code a running Mongo instance is used; for testing an embedded
    MongoDB is often used. Spring Boot makes it very easy to write tests for MongoDB,
    using the `@DataMongoTest`. Spring Boot will create a minimal application with
    only the MongoDB-related beans and start an embedded MongoDB (if detected).


    Let’s write a test for the `CustomerRepository` and use an embedded MongoDB. First,
    add the embedded MongoDB as a test dependency.


    ```

    de.flapdoodle.embed

    de.flapdoodle.embed.mongo

    test

    ```


    Next create the `CustomerRepositoryTest`.


    ```

    @RunWith(SpringRunner.class)

    @DataMongoTest

    public class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @After

    public void cleanUp() {

    repository.deleteAll();

    }

    }

    ```


    The `@RunWith(SpringRunner.class)` executes the test by a special JUnit runner
    to bootstrap the Spring Test Context framework. The `@DataMongoTest` will replace
    the preconfigured MongoDB with an embedded one (if on the classpath). It will
    also bootstrap the MongoDB components and, when detected, Spring Data Mongo repositories.


    After each test, we want to make sure that the embedded MongoDB doesn’t contain
    any data. This can be achieved by adding an `@After` annotated method and calling
    `deleteAll` on the repository. This method will be called after each executed
    test method.


    Now write a test that checks if records get inserted correctly.


    ```

    @Test

    public void insertNewCustomer() {

    assertThat(repository.findAll()).isEmpty();

    Customer customer = repository.save(new Customer(-1, "T. Testing", "t.testing@test123.tst"));

    assertThat(customer.getId()).isGreaterThan(-1L);

    assertThat(customer.getName()).isEqualTo("T. Testing");

    assertThat(customer.getEmail()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.getId())).isEqualTo(customer);

    }

    ```


    This test first asserts that the database is empty—not really required but can
    be useful to detect if other tests pollute the database. Next, a `Customer` is
    added to the database by calling the `save` method on the `CustomerRepository`.
    The resulting `Customer` is validated to have an id, and if the `name` and `email`
    attributes are there. Finally, the `Customer` is retrieved again and compared
    to be the same.


    Another test you could add is the `findAll` method. When inserting two records,
    calling `findAll` should result in two records being retrieved.


    ```

    @Test

    public void findAllCustomers() {

    assertThat(repository.findAll()).isEmpty();

    repository.save(new Customer(-1, "T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer(-1, "T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(2);

    }

    ```


    Of course there could be more assertions, but saving the data is already verified
    in the other test method.


