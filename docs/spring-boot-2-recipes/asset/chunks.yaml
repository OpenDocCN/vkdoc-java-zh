- fmt: '### Configure Metrics


    One of the features of Spring Boot Actuator is to expose metrics. Those are exposed
    under `http://localhost:8090/actuator/metrics`; this will produce a list of available
    metrics for your application (Figure [10-5](#464036_1_En_10_Chapter.xhtml#Fig5)).


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig5_HTML.jpg](images/464036_1_En_10_Chapter/464036_1_En_10_Fig5_HTML.jpg)


    **Figure 10-5** List of currently available metrics


    More information about a metric can be obtained by accessing `http://localhost:8090/actuator/metrics/{name-of-metric}`,
    for example, `http://localhost:8090/actuator/metrics/system.cpu.usage` will show
    the current CPU usage (Figure [10-6](#464036_1_En_10_Chapter.xhtml#Fig6)).


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig6_HTML.jpg](images/464036_1_En_10_Chapter/464036_1_En_10_Fig6_HTML.jpg)


    **Figure 10-6** Detailed CPU metrics


    Spring Boot uses `micrometer.io`^([^(39)](#fn39)) to record metrics. Metrics are
    enabled by default for the features detected by Spring Boot. So if a `DataSource`
    is detected, metrics will be enabled. To disable metrics, add them to the `management.metrics.enable`
    property. This is a map containing keys and values on which metrics to enable.


    ```

    management.metrics.enable.system=false

    management.metrics.enable.tomcat=false

    ```


    The preceding configuration will disable `system` and `tomcat` metrics. When viewing
    the metrics at `http://localhost:8090/actuator/metrics`, they aren’t part of the
    list anymore.


    ## 10.2 Create Custom Health Checks and Metrics


    ### Problem


    Your application needs to expose certain metrics and have a health check that
    aren’t available by default.


    ### Solution


    The health checks and metrics are pluggable, and beans of type `HealthIndicator`
    and `MetricBinder` are automatically registered to provide additional health checks
    and/or metrics. The task is to create a class implementing the desired interface
    and register an instance of that class as a bean in the context of having it contribute
    to the health and metrics.


    ### How It Works


    Assuming that a dependency on Spring Boot Actuator is already present, you can
    start writing an implementation right away. Assume you have an application using
    a `TaskScheduler` and you want to have some metrics and health on it. (Adding
    `@EnableScheduling` is enough to have Spring Boot create a default `TaskScheduler`.)


    First, let’s write the `HealthIndicator`. You can either directly implement the
    `HealthIndicator` interface or use the convenience `AbstractHealthIndicator` as
    a base class.


    ```

    package com.apress.springbootrecipes.library.actuator;

    import org.springframework.boot.actuate.health.AbstractHealthIndicator;

    import org.springframework.boot.actuate.health.Health;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

    import org.springframework.stereotype.Component;

    @Component

    class TaskSchedulerHealthIndicator extends AbstractHealthIndicator {

    private final ThreadPoolTaskScheduler taskScheduler;

    TaskSchedulerHealthIndicator(ThreadPoolTaskScheduler taskScheduler) {

    this.taskScheduler = taskScheduler;

    }

    @Override

    protected void doHealthCheck(Health.Builder builder) throws Exception {

    int poolSize = taskScheduler.getPoolSize();

    int active = taskScheduler.getActiveCount();

    int free = poolSize - active;

    builder

    .withDetail("active", taskScheduler.getActiveCount())

    .withDetail("poolsize", taskScheduler.getPoolSize());

    if (poolSize > 0 && free <= 1) {

    builder.down();

    } else {

    builder.up();

    }

    }

    }

    ```


    The `TaskSchedulerHealthIndicator` operates on the given `ThreadPoolTaskExecutor`.
    It reports the status as down if there is one or fewer threads available to schedule
    tasks. The condition on `poolSize > 0` is there because the creation of the underlying
    `Executor` is delayed until needed; until then the `poolSize` will report `0`.
    The returned value includes the `poolsize` and `active` thread count just for
    information.


    The `TaskSchedulerMetrics` implements the `MeterBinder` interface from `micrometer.io`.
    It exposes the `active` and `pool-size` to the metrics registry.


    ```

    package com.apress.springbootrecipes.library.actuator;

    import io.micrometer.core.instrument.FunctionCounter;

    import io.micrometer.core.instrument.MeterRegistry;

    import io.micrometer.core.instrument.binder.MeterBinder;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

    import org.springframework.stereotype.Component;

    @Component

    class TaskSchedulerMetrics implements MeterBinder {

    private final ThreadPoolTaskScheduler taskScheduler;

    TaskSchedulerMetrics(ThreadPoolTaskScheduler taskScheduler) {

    this.taskScheduler = taskScheduler;

    }

    @Override

    public void bindTo(MeterRegistry registry) {

    FunctionCounter

    .builder("task.scheduler.active", taskScheduler,

    ThreadPoolTaskScheduler::getActiveCount)

    .register(registry);

    FunctionCounter

    .builder("task.scheduler.pool-size", taskScheduler,

    ThreadPoolTaskScheduler::getPoolSize)

    .register(registry);

    }

    }

    ```


    Now when placing an `@EnableScheduling` on the `LibraryApplication` and restarting
    the application, metrics and health will be reported for the `TaskScheduler` (Figure
    [10-7](#464036_1_En_10_Chapter.xhtml#Fig7)).


