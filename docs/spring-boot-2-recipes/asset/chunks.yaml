    ## 4.3 WebSockets


    ### Problem


    You want to use bidirectional communication from the client to the server over
    the web.


    ### Solution


    Use WebSockets to communicate from the client to the server and vice versa. WebSockets
    provide full duplex communication, unlike HTTP.


    ### How It Works


    A full explanation of WebSockets goes beyond the scope of this recipe; however,
    one thing worth mentioning is that the relation between HTTP and WebSockets is
    actually quite thin. The only usage of HTTP for WebSockets is that the initial
    handshake uses HTTP, to upgrade the connection from plain HTTP to a TCP socket
    connection.


    #### Configure WebSocket Support


    The first step is to add a dependency on `spring-boot-starter-websocket` , which
    brings in the needed dependencies and will auto-configure websocket support in
    Spring Boot.


    To enable the use of WebSockets, it is just a matter of adding `@EnableWebSocket`
    to your application. Do this by adding the annotation to the `@SpringBootApplication`
    annotated class or an `@Configuration` annotated class.


    ```

    @SpringBootApplication

    @EnableWebSocket

    public class EchoApplication implements WebSocketConfigurer { ... }

    ```'
