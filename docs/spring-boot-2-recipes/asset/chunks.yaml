    ## 6.6 本章小结


    在本章中，你学习了如何使用 Spring Security 保护 Spring Boot 应用程序。它可用于保护任何 Java 应用程序，但主要用于基于 Web
    的应用程序。认证、授权和访问控制的概念在安全领域至关重要，因此你应当对其有清晰的理解。


    通常，你需要通过阻止未经授权的访问来保护关键 URL。Spring Security 可以帮助你以声明式方式实现这一点。它通过应用 Servlet 过滤器来处理安全性，这些过滤器可以通过简单的基于
    Java 的配置进行配置。Spring Security 会自动为你配置基本的安全服务，并默认尽可能保证安全。


    Spring Security 支持多种用户登录 Web 应用程序的方式，例如基于表单的登录和 HTTP Basic 认证。它还提供匿名登录服务，允许你将匿名用户视为普通用户处理。“记住我”功能允许应用程序在多个浏览器会话中记住用户的身份。


    Spring Security 支持多种用户认证方式，并内置了相应的提供者实现。例如，它支持针对内存定义、关系数据库和 LDAP 仓库进行用户认证。你应始终在用户仓库中存储加密后的密码，因为明文密码容易受到黑客攻击。Spring
    Security 还支持在本地缓存用户详细信息，以节省执行远程查询的开销。


    用户是否被允许访问给定资源的决策由访问决策管理器做出。Spring Security 提供了三种基于投票方式的访问决策管理器。它们都需要配置一组投票者，以便对访问控制决策进行投票。


    Spring Security 允许你使用 `@PreAuthorize` 和 `@PostAuthorize` 注解以声明式方式保护方法调用。


    Spring Security 还支持保护基于 Spring WebFlux 的应用程序。在最后一个示例中，你探索了如何为此类应用程序添加安全性。


