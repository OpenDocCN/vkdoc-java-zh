    # 7. 数据访问


    在使用数据库时，首先需要的是与数据库的连接。在 Java 中，连接通过 `javax.sql.DataSource` 获取。Spring 提供了多种开箱即用的
    `DataSource` 实现，例如 `DriverManagerDataSource` 和 `SimpleDriverDataSource`。然而，这些实现并非连接池，主要应视为用于测试而非生产环境。对于生产系统，你应使用像
    HikariCP^(²⁷) 这样合适的连接池。


    ### 提示


    在 `db` 文件夹中有一个 `Dockerfile`，它将构建一个自动创建数据库的 PostgreSQL^(²⁸)。使用 `docker build -t
    sb2r-postgres` 构建它。然后可以使用 `docker run -p 5432:5432 -it sb2r-postgres` 运行它。


    ## 7.1 配置数据源


    ### 问题


    你需要从应用程序访问数据库。


    ### 解决方案


    使用 `spring.datasource.url`、`spring.datasource.username` 和 `spring.datasource.password`
    属性，让 Spring Boot 配置一个 `DataSource`。


    ### 工作原理


    要配置 `DataSource`，Spring Boot 需要存在连接池或嵌入式数据库（如 H2、HSQLDB 或 Derby）。Spring Boot 会自动检测
    HikariCP、Tomcat JDBC 和 Commons DBCP2 连接池（按此顺序）。要使用连接池，请配置 `spring.datasource.url`、`spring.datasource.username`
    和 `spring.datasource.password` 属性。可以通过添加 `spring-boot-starter-jdbc` 依赖来启用 JDBC
    支持。这将引入使用 JDBC 所需的所有依赖。


    ```

    org.springframework.boot

    spring-boot-starter-jdbc


    ```


    包含的依赖项有 `spring-jdbc`、`spring-tx` 以及作为默认连接池的 HikariCP。


    #### 使用嵌入式 `DataSource`


    当 Spring Boot 检测到 H2、HSQLDB 或 Derby 时，它将默认使用检测到的嵌入式实现启动一个嵌入式数据库。这在编写测试或为业务准备演示时非常有用。让
    Spring Boot 创建它只需包含所需的依赖即可。


    ```

    org.apache.derby

    derby

    runtime


    ```


    现在，Spring Boot 将检测到 Derby 并引导一个嵌入式 `DataSource`。让我们编写一个应用程序来列出数据库中的表。


    ```

    package com.apress.springboot2recipes.jdbc;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.ApplicationArguments;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.stereotype.Component;

    import javax.sql.DataSource;

    @SpringBootApplication

    public class JdbcApplication {

    public static void main(String[] args) {

    SpringApplication.run(JdbcApplication.class, args);

    }

    }

    @Component

    class TableLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final DataSource dataSource;

    TableLister(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    try (var con = dataSource.getConnection();

    var rs = con.getMetaData().getTables(null, null, "%", null)) {

    while (rs.next()) {

    logger.info("{}", rs.getString(3));

    }

    }

    }

    }

    ```


    当应用程序运行时，它将创建一个 `TableLister` 实例，并且该实例将接收配置好的 `DataSource`。Spring Boot 随后会检测到它是一个
    `ApplicationRunner`，并调用 `run` 方法。`run` 方法从 `DataSource` 获取一个 `Connection`，并使用
    `DatabaseMetaData`（来自 JDBC）获取数据库中的表。现在，运行应用程序时，它应显示类似于图 7-1 所示的输出。


    ![../images/464036_1_En_7_Chapter/464036_1_En_7_Fig1_HTML.jpg](img/464036_1_En_7_Fig1_HTML.jpg)


    图 7-1


    Derby 的 TableLister 输出

