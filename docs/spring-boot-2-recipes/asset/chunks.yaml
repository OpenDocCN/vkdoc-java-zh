    # 2. Spring Boot—Basics


    In this chapter we will take a look at the basic features of Spring Boot.


    ### Note


    To get a starting point, use the Spring Initializr to create a project. No additional
    dependencies are required, just a Spring Boot project.


    ## 2.1 Configure a Bean


    ### Problem


    You want Spring Boot to use your class as a bean.


    ### Solution


    Depending on your needs, you can either leverage `@ComponentScan` to automatically
    detect your class and have an instance created; use it together with `@Autowired`
    and `@Value` to get dependencies or properties injected; or you can use a method
    annotated with `@Bean` to have more control over the construction of the bean
    being created.


    ### How It Works


    Recipe 1.1 explained that `@SpringBootApplication` includes both `@ComponentScan`
    and `@Configuration`. This means that any `@Component` annotated class will be
    automatically detected and instantiated by Spring Boot; it also allows for `@Bean`
    methods to be defined to declare beans.


    #### Using `@Component`


    First, create a class to bootstrap the application. Create a `HelloWorldApplication`
    that is annotated with `@SpringBootApplication`.


    ```

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    ```


    ### Tip


    Place the `@SpringBootApplication` annotated class in a top-level package; this
    way it will automatically detect all your annotated components, configuration
    classes, etc. defined in this package and all subpackages.^([⁵](#fn5))


    This will bootstrap the application, detect all `@Component` annotated classes,
    and detect which libraries are on the classpath (see also Chapter [1](#464036_1_En_1_Chapter.xhtml)).
    When running this `HelloWorldApplication` it won’t do much, as there is nothing
    to detect or to run. Let’s create a simple class that will be automatically detected
    by Spring Boot.


    ```

    @Component

    public class HelloWorld {

    @PostConstruct

    public void sayHello() {

    System.out.println("Hello World, from Spring Boot 2!");

    }

    }

    ```


    Spring Boot will detect this class and create a bean instance from it. The `@PostConstruct`
    annotated method is invoked after construction and injection of all dependencies.
    Simply put, at startup the `sayHello` method will run and the console will print
    the line `Hello World, from Spring Boot 2!`.


    ### Important


    When you need to scan packages not covered by the default component scanning,
    you need to add a `@ComponentScan` annotation to your `@SpringBootApplication`
    annotated class so that those packages will be scanned as well. These packages
    are scanned in addition to the default scanning applied through the `@SpringBootApplication`
    annotation.'
