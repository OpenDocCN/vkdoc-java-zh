    Spring Boot 使用 micrometer.io^(³⁹) 来记录指标。对于 Spring Boot 检测到的功能，指标默认是启用的。因此，如果检测到
    `DataSource`，指标就会被启用。要禁用指标，请将它们添加到 `management.metrics.enable` 属性中。这是一个包含键值对的映射，用于指定哪些指标需要启用。


