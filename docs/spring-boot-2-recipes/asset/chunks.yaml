    ### 工作原理


    使用 Spring Boot 时，当检测到 JMS 和单个 `ConnectionFactory`，它会自动配置一个 `JmsTemplate`，可用于发送和转换消息。Spring
    Boot 在 `spring.jms.template` 命名空间中暴露了属性，可用于配置 `JmsTemplate`。


    #### 使用 **JmsTemplate** 发送消息


    要通过 JMS 发送消息，你可以使用 `JmsTemplate` 上的 `send` 或 `sendAndConvert` 方法。让我们编写一个组件，每秒将包含当前日期和时间的消息放入队列。


    ```

    @Component

    class MessageSender {

    private final JmsTemplate jms;

    MessageSender(JmsTemplate jms) {

    this.jms = jms;

    }

    @Scheduled(fixedRate = 1000)

    public void sendTime() {

    jms.convertAndSend("time-queue", "Current Date & Time is: " +

    LocalDateTime.now());

    }

    }

    ```


    `JmsTemplate` 通过构造函数自动注入，由于定时调度，我们将在一个名为 `time-queue` 的队列上收到包含当前日期和时间的消息。要运行此代码，你需要一个带有
    `@EnableScheduling` 注解的 `@SpringBootApplication` 类，以便处理 `@Scheduled`。


    ```

    @SpringBootApplication

    @EnableScheduling

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    }

    ```


    现在运行此类时，看起来似乎没有发生太多事情，但消息正在填充队列。我们可以编写一个简单的集成测试来检查此代码是否正常工作。


    ```

    package com.apress.springbootrecipes.demo;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.test.context.junit4.SpringRunner;

    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.TextMessage;

    import static org.assertj.core.api.Assertions.assertThat;

    @RunWith(SpringRunner.class)

    @SpringBootTest

    public class JmsSenderApplicationTest {

    @Autowired

    private JmsTemplate jms;

    @Test

    public void shouldSendMessage() throws JMSException {

    Message message = jms.receive("time-queue");

    assertThat(message)

    .isInstanceOf(TextMessage.class);

    assertThat(((TextMessage) message).getText())

    .startsWith("Current Date & Time is: ");

    }

    }

    ```


    这个 JUnit 测试将启动应用程序并开始发送消息。在测试中，我们使用 `JmsTemplate` 来 `receive` 消息，并对其进行一些断言，以查看消息是否确实已发送并包含我们期望的内容。由于我们尚未进行任何配置，测试将使用嵌入式
    JMS 代理。运行测试时，它应该通过，因为消息将被发送和接收。


    ### 提示


    在为消息传递编写测试时，你可能希望设置 `JmsTemplate` 的 `receive-timeout` 属性，因为默认情况下会无限期等待消息到达；然而，在
    500 毫秒后，你可能希望测试失败。你可以通过将 `spring.jms.template.receive-timeout=500ms` 添加到 `application.properties`
    来实现这一点。


    #### 配置 **JmsTemplate**


    Spring Boot 在 `spring.jms.template` 命名空间中提供了属性来配置 `JmsTemplate`（表 9-4）。


    表 9-4


    `JmsTemplate` 属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.jms.template.default-destination` | 当未指定特定目标时，用于发送和接收操作的默认目标 |

    | `spring.jms.template.delivery-delay` | 发送消息的投递延迟 |

    | `spring.jms.template.delivery-mode` | 投递模式，`persistent` 或 `non-persistent`，当显式设置时将
    `qos-enabled` 设置为 `true` |

    | `spring.jms.template.priority` | 发送消息时的优先级。默认为无，当显式设置时将 `qos-enabled` 设置为 `true`
    |

    | `spring.jms.template.qos-enabled` | 是否启用 QOS（服务质量）。启用后，将设置消息的优先级、投递模式和生存时间。默认为
    `false` |

    | `spring.jms.template.receive-timeout` | 接收调用的超时时间。默认为无限期 |

    | `spring.jms.template.time-to-live` | JMS 消息的生存时间，设置时将 `qos-enabled` 设置为 `true`
    |

    | `spring.jms.pub-sub-domain` | 默认目标是主题还是队列。默认为 `false`，表示队列 |


    除了这些属性之外，如果能够找到 Bean 的唯一实例，`JmsTemplate` 还将自动配置一个 `DestinationResolver` 和 `MessageConverter`。如果找不到唯一实例，将使用默认值，即
    `DynamicDestinationResolver` 和 `SimpleMessageConverter`（表 9-5）。


    表 9-5


    `SimpleMessageConverter` 类到 JMS 消息的转换器


    | 类型 | JMS 消息类型 |

    | --- | --- |

    | `java.lang.String` | `javax.jms.TextMessage` |

    | `java.util.Map` | `javax.jms.MapMessage` |

    | `java.io.Serializable` | `javax.jms.ObjectMessage` |

    | `byte[]` | `javax.jms.BytesMessage` |


    让我们向 `orders` 队列发送一个 `Order`。使用 Jackson 发送 JSON，而不是使用 Java 序列化机制。


    ```

    public class Order {

    private String id;

    private BigDecimal amount;

    public Order() {

    }

    public Order(String id, BigDecimal amount) {

    this.id=id;

    this.amount = amount;

    }

    // 为简洁起见，省略了 Getter/Setter

    @Override

    public String toString() {

    return String.format("Order [id=''%s'', amount=%4.2f]", id, amount);

    }

    }

    ```


    这就是我们要发送的简单订单。


    现在我们需要一个发送器，它构造一个 `Order` 并使用 `JmsTemplate` 将其放入队列。


    ```

    @Component

    class OrderSender {

    private final JmsTemplate jms;

    OrderSender(JmsTemplate jms) {

    this.jms = jms;

    }

    @Scheduled(fixedRate = 1000)

    public void sendTime() {

    var id = UUID.randomUUID().toString();

    var amount = ThreadLocalRandom.current().nextDouble(1000.00d);

    var order = new Order(id, BigDecimal.valueOf(amount));

    jms.convertAndSend("orders", order);

    }

    }

    ```


    这与之前编写的 `MessageSender` 没有太大区别，但现在它创建了一个包含一些随机生成数据的 `Order`，并将其发送到 `orders` 队列。运行此代码时，实际上会失败。转换失败，因为
    `Order` 没有实现 `Serializable`，而这是将 `Order` 转换为 `ObjectMessage` 所必需的（参见表 9-5）。然而，我们希望使用
    JSON 来实现这一点；需要一个不同的 `MessageConverter`，确切地说是 `MappingJackson2MessageConverter`。它使用
    Jackson 将对象编组和解组为 JSON。它应该作为 Bean 添加到配置中。


    首先，你需要将 Jackson 的依赖项添加到构建配置中。


    ```

    com.fasterxml.jackson.core

    jackson-core


    ```


    接下来，你可以配置 `MappingJackson2MessageConverter`。


    ```

    @SpringBootApplication

    @EnableScheduling

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    @Bean

    public MappingJackson2MessageConverter messageConverter() {

    var messageConverter = new MappingJackson2MessageConverter();

    messageConverter.setTypeIdPropertyName("content-type");

    messageConverter.setTypeIdMappings(

    Collections.singletonMap("order", Order.class));

    return messageConverter;

    }

    }

    ```


    `typeIdPropertyName` 是一个必需属性，指示存储消息实际类型的属性名称。如果不进行进一步配置，将使用类的完全限定名（FQN）。使用 `typeIdMappings`，你可以指定将哪个类型映射到哪个类，反之亦然。如果未指定，则类的
    FQN 将用作映射中的类型。发送 `Order` 时，`content-type` 标头将包含值 `order`。

