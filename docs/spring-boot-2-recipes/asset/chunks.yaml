    ### 解决方案


    Spring WebFlux 最底层的组件是 `HttpHandler`，它是一个包含单个 `handle` 方法的接口。


    ```

    public interface HttpHandler {

    Mono handle(ServerHttpRequest request, ServerHttpResponse response);

    }

    ```


    `handle` 方法返回一个 `Mono<Void>`，这是响应式编程中表示返回 `void` 的方式。它接收来自 `org.springframework.http.server.reactive`
    包中的 `ServerHttpRequest` 和 `ServerHttpResponse` 对象。这些同样是接口，根据运行时所使用的容器，会创建相应的接口实例。为此，存在多种针对不同容器的适配器或桥接器；当运行在支持非阻塞
    IO 的 Servlet 3.1 容器上时，会使用 `ServletHttpHandlerAdapter`（或其子类）来从普通的 Servlet 世界适配到响应式世界。当运行在像
    Netty^(²⁴) 这样的原生响应式引擎上时，则会使用 `ReactorHttpHandlerAdapter`。


    当 Web 请求发送到 Spring WebFlux 应用程序时，`HandlerAdapter` 首先接收该请求。然后，它会组织在 Spring 应用上下文中配置的各种组件——这些组件都是处理请求所必需的。


    要在 Spring WebFlux 中定义一个控制器类，需要使用 `@Controller` 或 `@RestController` 注解标记该类（这与 Spring
    MVC 相同；参见第 3 章）。


    当一个被 `@Controller` 注解的类（即控制器类）接收到请求时，它会寻找合适的处理器方法来处理该请求。这要求控制器类通过一个或多个处理器映射将每个请求映射到一个处理器方法。为此，控制器类的方法需要使用
    `@RequestMapping` 注解进行修饰，使其成为处理器方法。


    这些处理器方法的签名——正如你对任何标准类所期望的那样——是开放式的。你可以为处理器方法指定任意名称，并定义各种方法参数。同样，处理器方法可以返回一系列值中的任何一种（例如
    `String` 或 `void`），具体取决于它所实现的应用程序逻辑。以下只是有效参数类型的部分列表，旨在让你有个概念。


    1.  `ServerHttpRequest` 或 `ServerHttpResponse`

    2.  来自 URL 的任意类型的请求参数，使用 `@RequestParam` 注解

    3.  传入请求中包含的 Cookie 值，使用 `@CookieValue` 注解

    4.  任意类型的请求头值，使用 `@RequestHeader` 注解

    5.  任意类型的请求属性，使用 `@RequestAttribute` 注解

    6.  `Map` 或 `ModelMap`，用于处理器方法向模型添加属性

    7.  `WebSession`，用于会话


    一旦控制器类选定了合适的处理器方法，它就会使用该请求调用处理器方法的逻辑。通常，控制器的逻辑会调用后端服务来处理请求。此外，处理器方法的逻辑可能会从众多输入参数（例如
    `ServerHttpRequest`、`Map` 或 `Errors`）中添加或删除信息，这些参数将构成后续流程的一部分。


    处理器方法处理完请求后，它会将控制权委托给一个视图，该视图表示为处理器方法的返回值。为了提供灵活的方法，处理器方法的返回值并不代表视图的具体实现（例如 `user.html`
    或 `report.pdf`），而是代表一个逻辑视图（例如 `user` 或 `report`）——注意没有文件扩展名。


    处理器方法的返回值可以是表示逻辑视图名称的 `String`，也可以是 `void`，在后一种情况下，会根据处理器方法或控制器的名称来确定默认的逻辑视图名称。


    为了将信息从控制器传递到视图，处理器方法返回的是逻辑视图名称（`String` 或 `void`）并不重要，因为处理器方法的输入参数将对视图可用。


    例如，如果处理器方法将 `Map` 和 `Model` 对象作为输入参数——并在处理器方法的逻辑中修改它们的内容——那么这些相同的对象将对处理器方法返回的视图可访问。


    当控制器类接收到视图时，它会通过视图解析器将逻辑视图名称解析为特定的视图实现（例如 `user.html` 或 `report.fmt`）。视图解析器是在
    Web 应用上下文中配置的一个 bean，它实现了 `ViewResolver` 接口。其职责是为逻辑视图名称返回一个特定的视图实现。


    一旦控制器类将视图名称解析为视图实现，根据视图实现的设计，它会渲染由控制器处理器方法传递的对象（例如 `ServerHttpRequest`、`Map`、`Errors`
    或 `WebSession`）。视图的职责是将处理器方法逻辑中添加的对象展示给用户。


    ### 工作原理


    让我们编写一个来自配方 4-1 的 `HelloWorldApplication` 的响应式版本。


    ```

    package com.apress.springbootrecipes.helloworld;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Mono;

    @RestController

    public class HelloWorldController {

    @GetMapping

    public Mono hello() {

    return Mono.just("Hello World, from Spring Boot 2!");

    }

    }

    ```


    注意，`hello` 方法的返回类型是 `Mono<String>`，而不是普通的 `String`。`Mono` 正是使其具有响应式特性的关键。


    #### 设置 Spring WebFlux 应用程序


    为了能够以响应式方式处理请求，你需要启用 WebFlux。这可以通过添加对 `spring-boot-starter-webflux` 的依赖来实现。


    ```

    org.springframework.boot

    spring-boot-starter-webflux


    ```


    这会引入所需的依赖项，例如 `spring-webflux` 和 Project Reactor（[`http://www.projectreactor.io`](http://www.projectreactor.io)）的依赖项。它还包括一个响应式运行时，默认情况下是
    Netty。


    现在一切已配置完毕，最后要做的是创建一个应用程序类。


    ```

    package com.apress.springbootrecipes.library;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    ```


    Spring Boot 将检测响应式运行时，并使用 `server.*` 属性对其进行配置（参见配方 3-7）。


    #### 创建 Spring WebFlux 控制器


    基于注解的控制器类可以是任意类，不需要实现特定接口或继承特定基类。你可以使用 `@Controller` 或 `@RestController` 注解对其进行注解。控制器中可以定义一个或多个处理器方法来处理单个或多个操作。处理器方法的签名足够灵活，可以接受一系列参数。


    ```

    package com.apress.springbootrecipes.helloworld;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Mono;

    @RestController

    public class HelloWorldController {

    @GetMapping("/hello")

    public Mono hello() {

    return Mono.just("Hello World, from Reactive Spring Boot 2!");

    }

    }

    ```


    注解 `@GetMapping` 用于将 `hello` 方法修饰为控制器的 HTTP GET 处理器方法。值得一提的是，如果没有声明默认的 HTTP GET
    处理器方法，则会抛出 `ServletException`——因此控制器至少拥有一个 URL 路由和至少一个处理器方法至关重要。由于 `@GetMapping`
    中的表达式，该方法绑定到 `/hello`。


    当对 `/hello` 发起请求时，它将响应式地返回 `Hello World, from Reactive Spring Boot 2!`，尽管客户端不会注意到这一点。对于客户端来说，它仍然是一个普通的
    HTTP 请求。

