    \           new Customer(\"John Doe\", \"john.doe@island.io\"),\n            \
    \    new Customer(\"Jane Doe\", \"jane.doe@island.io\"))\n        ).delayElements(Duration.ofMillis(250))\n\
    \        .flatMap(customers::save)\n        .subscribe(System.out::println);\n\
    \    }\n}\n```\n\n现在，每个单独元素的插入将延迟250毫秒。当运行应用程序时，您会看到客户监听器也需要一些时间才能让每个元素出现。"
  raw: '### Note


    The `bin` directory contains a `mongo.sh` script that will start a MongoDB instance
    using Docker.


    When starting the `MongoApplication` without the Embedded MongoDB, it will by
    default try to connect to a MongoDB server on `localhost` and port `27017` . If
    that is not where you want to connect to, use the `spring.data.mongodb` properties
    (Table [7-6](#464036_1_En_7_Chapter.xhtml#Tab6)) to configure the correct location.


    Table 7-6


    MongoDB Properties


    | Property | Description |

    | --- | --- |

    | `spring.data.mongodb.uri` | Mongo database URI, including credentials, settings
    etc. Default `mongodb://localhost/test` |

    | `spring.data.mongodb.username` | Login user of the mongo server. Default none
    |

    | `spring.data.mongodb.password` | Login password of the mongo server. Default
    none |

    | `spring.data.mongodb.host` | Hostname (or IP address) if the MongoDB server.
    Default fallback to `localhost` |

    | `spring.data.mongodb.port` | Port of the MongoDB server. Default fallback to
    `27017` |

    | `spring.data.mongodb.database` | Name of the MongoDB database/collection to
    use |

    | `spring.data.mongodb.field-naming-strategy` | FQN of the `FieldNamingStrategy`
    used to map object fields to document fields. Defaults to `PropertyNameFieldNamingStrategy`
    |

    | `spring.data.mongodb.authentication-database` | Name of MongoDB to use for authentication.
    Defaults to `spring.data.mongodb.database` value |

    | `spring.data.mongodb.grid-fs-database` | Name of MongoDB to connect to. Defaults
    to `spring.data.mongodb.database` value |


    ### Warning


    The `spring.data.mongodb.username`, `spring.data.mongodb.password`, `spring.data.mongodb.host`,
    `spring.data.mongodb.port`, and `spring.data.mongodb.database` are only supported
    for MongoDB 2.0; for MongoDB 3.0 and up, you have to use the `spring.data.mongodb.uri`
    property!


    Although you can use Spring Boot to configure the `MongoClient` `,` if you need
    more control you can always specify the `MongoDbFactory` or `MongoClient` yourself
    as a bean and Spring Boot will not autoconfigure the `MongoClient`. It will still
    detect Spring Data MongoDB classes and will enable repository support.


    #### Use Spring Data MongoDB Repositories


    Instead of writing your own implementation of the repository, you can also use
    Spring Data MongoDB to create them for you (just like as with Spring Data JPA).
    For this you need to extend one of the `Repository` interfaces from Spring Data.
    The easiest is to extend `CrudRepository` or `MongoRepository` .


    ```

    public interface CustomerRepository extends MongoRepository

    { }

    ```


    This is all we need to get a fully functional repository, you can remove the `MongoCustomerRepository`
    implementation. This will give you `save`, `findAll`, `findById`, and many more
    methods.


    The application will still run, insert some customers, and list them in the logs.


    #### Reactive MongoDB Repositories


    Instead of using regular blocking operations, MongoDB can also be used in a reactive
    fashion. For this, use the `spring-boot-starter-data-mongodb-reactive` instead
    of the `spring-boot-starter-data-mongodb`. This dependency will include the needed
    reactive libraries and reactive driver for MongoDB.


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb-reactive


    ```


    With the dependencies in order, you can make the `CustomerRepository` a reactive
    one. This is done by simply extending `ReactiveRepository`, `ReactiveSortingRepository`,
    or `ReactiveMongoRepository` depending on your needs.


    ```

    public interface CustomerRepository

    extends ReactiveMongoRepository { }

    ```


    Now that `CustomerRepository` extends `ReactiveMongoRepository` , all the methods
    return either `Flux` (zero or more elements) or `Mono` (zero or one element).


    ### Note


    The default implementations use Project Reactor^([^(33)](#fn33)) as the reactive
    framework; however, you can also use RxJava.^([^(34)](#fn34)) Then instead of
    a `Flux` and `Mono` you will use an `Observable` or `Single`. For this you need
    to extend the `RxJava2CrudRepository` or `RxJava2SortingRepository`.


    The `DataInitializer` needs to be made reactive as well.


    ```

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    customers.deleteAll()

    .thenMany(

    Flux.just(

    new Customer("Marten Deinum", "marten.deinum@conspect.nl"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"))

    ).flatMap(customers::save).subscribe(System.out::println);

    }

    }

    ```


    First it deletes everything, and then we create new `Customer`s and add them to
    the repository. Finally we need to subscribe to this flow, else nothing will happen.
    Instead of subscribing you could also `block,` but blocking in a reactive application
    should be avoided.


    Finally, also the `CustomerListener` needs to be made reactive.


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll().subscribe(customer -> logger.info("{}", customer));

    }

    }

    ```


    It will `findAll` the customers from the repository and for each will print a
    line in the log file.


    When starting the application you will probably see nothing in the log files.
    Due to the reactive nature of the application, it finishes quickly and the `CustomerListener`
    doesn’t have time to register itself and start listening. To prevent the shutdown
    of the application, add a `System.in.read()` ; this will keep the application
    running until you press Enter. Generally when running an application this isn’t
    needed, because the application is exposed as a service/web application, which
    keeps running automatically.


    ```

    public static void main(String[] args) throws IOException {

    SpringApplication.run(ReactiveMongoApplication.class, args);

    System.in.read();

    }

    ```


    Now when running the application you will see that the customers will be retrieved
    from MongoDB and printed in the logs. This might not look like a huge difference,
    but the way in which the retrieval is done is totally different. This can be made
    clear with a small modification to the `DataInitializer’`; let’s delay the elements
    with 250ms.


    ```

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    customers.deleteAll().thenMany(

    Flux.just(

    new Customer("Marten Deinum", "marten.deinum@conspect.nl"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"))

    ).delayElements(Duration.ofMillis(250))

    .flatMap(customers::save)

    .subscribe(System.out::println);

    }

    }

    ```


    Now the insert of each individual element will be delayed with 250ms. When running
    the application you will see that the customer listener also takes some time for
    each element to appear.'
