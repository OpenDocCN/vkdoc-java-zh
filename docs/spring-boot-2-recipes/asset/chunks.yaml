    new Book("123", "Spring 5 Recipes", "Marten Deinum", "Josh Long"),

    new Book("321", "Pro Spring MVC", "Marten Deinum", "Colin Yates")));

    webTestClient

    .get()

    .uri("/books")

    .headers( headers -> headers.setBasicAuth("user", "s3cr3t"))

    .exchange()

    .expectStatus().isOk()

    .expectBodyList(Book.class).hasSize(2);

    }

    }

    ```


    请求被构建并通过 `exchange()` “触发”。然后期望结果是 HTTP 200（OK），并且结果包含两本书。


    ## 6.2 登录 Web 应用程序


    ### 问题


    一个安全的应用程序要求其用户在访问某些安全功能之前先登录。这对于运行在开放互联网上的应用程序尤其重要，因为黑客可以轻易地访问它们。大多数应用程序必须提供一种方式，让用户输入其凭据来登录。


    ### 解决方案


    Spring Security 支持多种方式让用户登录 Web 应用程序。它通过提供一个包含登录表单的默认网页来支持基于表单的登录。你也可以提供一个自定义网页作为登录页面。此外，Spring
    Security 通过处理 HTTP 请求头中呈现的基本认证凭据来支持 HTTP 基本认证。HTTP 基本认证也可用于对通过远程协议和 Web 服务发出的请求进行认证。


    你应用程序的某些部分可能允许匿名访问（例如，访问欢迎页面）。Spring Security 提供了一个匿名登录服务，可以为匿名用户分配一个主体并授予权限，这样在定义安全策略时，你可以像处理普通用户一样处理匿名用户。


    Spring Security 还支持“记住我”登录，它能够在多个浏览器会话中记住用户的身份，这样用户在首次登录后无需再次登录。


    ### 工作原理


    当找不到显式的 `WebSecurityConfigurerAdapter` 时，Spring Boot 会启用默认的安全设置。当找到一个或多个时，它将使用这些配置来配置安全性。


    为了帮助你更好地理解各种登录机制，我们首先禁用默认的安全配置。


    ### 警告


    通常建议保留默认设置，只禁用你不需要的部分，例如 `httpBasic().disable()`，而不是禁用所有安全默认设置！


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    public LibrarySecurityConfig() {

    super(true); // 禁用默认配置

    }

    }

    ```


    请注意，如果你启用了 HTTP 自动配置，接下来介绍的登录服务将自动注册。但是，如果你禁用了默认配置或想要自定义这些服务，则必须显式配置相应的功能。


    在启用认证功能之前，你需要先启用基本的 Spring Security 要求；你至少需要配置异常处理和安全上下文集成。


    ```

    @Override

    protected void configure(HttpSecurity http) {

    http.securityContext()

    .and()

    .exceptionHandling();

    }

    ```


    没有这些基础，Spring Security 在登录后不会存储用户，也不会对安全相关的异常进行适当的异常转换（它们会直接冒泡，这可能会将你的一些内部信息暴露给外部）。你可能还想启用
    Servlet API 集成，以便可以在视图中使用 `HttpServletRequest` 上的方法进行检查。


    ```

    @Override

    protected void configure(HttpSecurity http) {

    http.servletApi();

    }

    ```


    #### HTTP 基本认证


    HTTP 基本认证支持可以通过 `httpBasic()` 方法进行配置。当需要 HTTP 基本认证时，浏览器通常会显示一个登录对话框或特定于浏览器的登录页面供用户登录。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .httpBasic();

    }

    }

    ```

    '
- fmt: '### Form-Based Login


    The form-based login service will render a web page that contains a login form
    for users to input their login details and process the login form submission.
    It’s configured via the `formLogin` method.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .formLogin();

    }

    }

    ```


    By default, Spring Security automatically creates a login page and maps it to
    the URL `/login`. So, you can add a link to your application (e.g., in `index.html`
    of Recipe 3.3), referring to this URL for login:


    ```html

    Login

    ```


    If you don’t prefer the default login page, you can provide a custom login page
    of your own. For example, you can create the following `login.html` file in `src/main/resources/templates`
    (when using Thymeleaf). As by default the CSRF protection is on, you need to add
    a CSRF token to the form. That is what the hidden field is for. If you disabled
    CSRF (not recommended), you should remove this line.


    ```html

    <!DOCTYPE html>

    <html xmlns:th="http://www.thymeleaf.org">

    <head>

    <title>Login</title>

    <style>

    body {

    background-color: #DADADA;

    }

    body > .grid {

    height: 100%;

    }

    .column {

    max-width: 450px;

    }

    </style>

    </head>

    <body>

    <form th:action="@{/login}" method="post">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"
    />

    <div>

    <label>Username: <input type="text" name="username"/></label>

    </div>

    <div>

    <label>Password: <input type="password" name="password"/></label>

    </div>

    <div>

    <button type="submit">Login</button>

    </div>

    </form>

    </body>

    </html>

    ```


    In order for Spring Security to display your custom login page when a login is
    requested, you have to specify its URL in the `loginPage` configuration method.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .formLogin().loginPage("/login");

    }

    }

    ```


    Finally, add a view resolver to map `/login` to the `login.html` page. For this
    you can have the `LibrarySecurityConfig` implement the `WebMvcConfigurer` and
    override the `addViewControllers` methods.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    ...

    public void addViewControllers(ViewControllerRegistry registry) {

    registry.addViewController("/login").setViewName("login");

    }

    }

    ```


    If the login page is displayed by Spring Security when a user requests a secure
    URL, the user will be redirected to the target URL once the login succeeds. However,
    if the user requests the login page directly via its URL, by default the user
    will be redirected to the context path’s root (i.e., `http://localhost:8080/`)
    after a successful login. If you have not defined a welcome page in your web deployment
    descriptor, you may wish to redirect the user to a default target URL when the
    login succeeds.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .formLogin().loginPage("/login").defaultSuccessUrl("/books");

    }

    }

    ```


    If you use the default login page created by Spring Security, then when a login
    fails, Spring Security will render the login page again with the error message.
    However, if you specify a custom login page, you will have to configure the `authentication-failure-url`
    to specify which URL to redirect to on login error. For example, you can redirect
    to the custom login page again with the error request parameter.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .formLogin()

    .loginPage("/login.html")

    .defaultSuccessUrl("/books")

    .failureUrl("/login.html?error=true");

    }

    }

    ```


    Then your login page should test whether the error request parameter is present.
    If an error has occurred, you will have to display the error message by accessing
    the session scope attribute `SPRING_SECURITY_LAST_EXCEPTION`, which stores the
    last `Exception` thrown by Spring Security for the current user.


    ```html

    ...

    <div th:if="${param.error}">

    Authentication Failed

    Reason : <span th:text="${session.SPRING_SECURITY_LAST_EXCEPTION.message}">Error</span>

    </div>

    ...

    ```


    ### The Logout Service


    The logout service provides a handler to handle logout requests. It can be configured
    via the `logout()` configuration method.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .logout();

    }

    }

    ```


    By default, it’s mapped to the URL `/logout` and will react to POST requests only.
    You can add a small html form to your page to log out.


    ```html

    <form th:action="@{/logout}" method="post">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"
    />

    <button type="submit">Logout</button>

    </form>

    ```


    ### Note


    When using CSRF protection, don’t forget to add the CSRF token to the form, else
    logout will fail.


    By default, a user will be redirected to the context path’s root when the logout
    succeeds, but sometimes you may wish to direct the user to another URL, which
    you can do by using the `logoutSuccessUrl` configuration method.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .logout().logoutSuccessUrl("/");

    }

    }

    ```


    After logout you might notice that when using the browser back button you will
    still be able to see the previous pages, even if your logout was successful. This
    has to do with the fact that the browser caches the pages. By enabling the security
    headers with the `headers()` configuration method, the browser will be instructed
    to not cache the page.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .headers();

    }

    }

    ```


    Next to the no-cache headers this will also disable content sniffing and enable
    x-frame protection. With this enabled and using the browser back button, you will
    be redirected to the login page again.


    ### Anonymous Login


    The anonymous login service can be configured via the `anonymous()` method in
    Java config, where you can customize the `username` and `authorities` of an anonymous
    user, whose default values are `anonymousUser` and `ROLE_ANONYMOUS`.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .anonymous().principal("guest").authorities("ROLE_GUEST");

    }

    }

    ```


    ### Remember-Me Support


    Remember-me support can be configured via the `rememberMe()` method in Java config.
    By default, it encodes the `username`, `password`, remember-me expiration time,
    and a private key as a token, and stores it as a cookie in the user’s browser.
    The next time the user accesses the same web application, this token will be detected
    so that the user can log in automatically.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .rememberMe();

    }

    }

    ```


    However, static remember-me tokens can cause security issues because they may
    be captured by hackers. Spring Security supports rolling tokens for more advanced
    security needs, but this requires a database to persist the tokens. For details
    about rolling remember-me token deployment, please refer to the Spring Security
    reference documentation.


    ## 6.3 Authenticating Users


    ### Problem


    When a user attempts to log into your application to access its secure resources,
    you have to authenticate the user’s principal and grant authorities to this user.'
