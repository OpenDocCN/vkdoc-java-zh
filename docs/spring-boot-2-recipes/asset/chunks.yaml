  trans: '

    ### 工作原理


    为配方 2.1 创建的 `Calculator` 本身相当灵活；然而，`CalculatorApplication` 在其执行的计算中使用了硬编码的值。现在，当我们想要计算不同的内容时，就需要修改代码、重新编译并运行新编译的代码。我们希望为此使用属性，以便在需要时能够更改它们。


    首先修改应用程序，使其使用属性中的值而不是硬编码的值。为此，将 `ApplicationRunner` 的 `@Bean` 方法改为接受三个额外的参数，并且这些参数将使用
    `@Value` 进行注解。


    ```

    package com.apress.springbootrecipes.calculator;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    SpringApplication.run(CalculatorApplication.class, args);

    }

    @Bean

    public ApplicationRunner calculationRunner(Calculator calculator,

    @Value("${lhs}") int lhs,

    @Value("${rhs}") int rhs,

    @Value("${op}") char op) {

    return args -> calculator.calculate(lhs, rhs, op);

    }

    }

    ```


    `@Value` 将指示 Spring 查找该属性并使用其值。例如，如果我们使用 `@Value("${lhs}")`，Spring 会尝试检测名为 `lhs`
    的属性并使用其值。你也可以通过添加分号来指定默认值。使用 `@Value("${lhs:12}")` 时，如果找不到值，它将使用 `12`。如果没有指定默认值，则会因缺少属性而抛出
    `IllegalArgumentException`。如果我们现在启动应用程序，将会抛出一个异常，说明找不到 `lhs` 属性。


    在 `src/main/resources` 中添加一个 `application.properties` 文件，并在其中为 `lhs`、`rhs` 和 `op`
    设置值。


    ```

    lhs=7

    rhs=6

    op=*

    ```


    Spring Boot 会在启动时加载 `application.properties`，这样这些属性就可用。现在运行应用程序时，它应该再次根据 `application.properties`
    中给定的值生成输出。


    虽然你现在已经将属性外部化到了 `application.properties` 文件中，但这些属性仍然被打包在应用程序内部，这意味着你仍然需要更改它们才能执行不同的计算。这意味着对于每种属性组合，你都需要进行一次全新的构建。想象一下，在一个真实的生产系统中，仅仅因为配置需要更改就要创建新的构建产物。Spring
    Boot 可以通过多种方式帮助你解决这个问题。


    #### 使用外部 **application.properties** 进行覆盖


    首先构建构建产物，并使用 `java -jar recipe_2_2-1.0.0.jar` 启动应用程序。它仍然会运行并使用提供的、打包好的 `application.properties`。现在，在与构建产物相同的位置添加一个
    `application.properties` 文件，并为不同的属性设置值。


    ```

    lhs=26

    rhs=952

    op=*

    ```


    再次启动应用程序时，它将使用这个 `application.properties` 中的值。


    #### 使用 Profile 覆盖属性


    Spring Boot 可以使用激活的 profile 来加载额外的配置文件，这些文件可以完全替换或覆盖通用配置的某些部分。让我们在 `src/main/resources`
    中添加一个 `application-add.properties` 文件，其中包含 `op` 的不同值。


    ```

    op=+

    ```


    现在构建构建产物（一个 JAR 文件），并从命令行使用 `java -jar recipe_2_2-1.0.0.jar --spring.profiles.active=add`
    启动它。它将启动并使用 `application.properties` 和 `application-add.properties` 中的属性来配置应用程序。注意，执行的是加法而不是乘法，这表明
    `application-add.properties` 的优先级高于通用的 `application.properties`。


    ### 提示


    当使用外部的 `application.properties` 和 `application-{profile}.properties` 时，这种方法同样有效。


    #### 使用命令行参数覆盖属性


    最后一个选项是使用命令行参数来覆盖属性；在上一节中，你已经使用了命令行参数 `--spring.profile.active=add` 来指定激活的 profile。你也可以通过这种方式指定
    `lhs` 和其他参数。使用 `java -jar recipe_2_2-1.0.0.jar --lhs=12 --rhs=15 --op=+` 来运行应用程序，你会看到它根据通过命令行传入的参数进行计算。来自命令行的参数总是会覆盖所有其他配置。


    #### 从不同的配置文件加载属性


    如果你使用的文件不是 `application.properties`，或者你有一些带有嵌入式文件需要加载的组件，你可以在 `@SpringBootApplication`
    注解的类上使用额外的 `@PropertySource` 注解来加载该额外文件。


    ```

    @PropertySource("classpath:your-external.properties")

    @SpringBootApplication

    public class MyApplication { ... }

    ```


    `@PropertySource` 注解允许你添加额外的属性文件，以便在启动时加载。除了使用 `@PropertySource`，你还可以指示 Spring
    Boot 使用表 2-1 中的命令行参数来加载额外的属性文件。


    表 2-1


    配置参数


    | 参数 | 描述 |

    | --- | --- |

    | `spring.config.name` | 要加载的文件名的逗号分隔字符串，默认为 `application` |

    | `spring.config.location` | 要考虑从中加载属性文件的资源位置（或文件）的逗号分隔字符串，默认为 `classpath:/,classpath:/config/,file:./,file:./config/`
    |

    | `spring.config.additional-location` | 要考虑从中加载属性文件的额外资源位置（或文件）的逗号分隔字符串，默认为空 |


    ### 警告


    当使用 `spring.config.location` 或 `spring.config.additional-location` 并指定文件时，该文件将按原样使用，并且不会加载特定于
    profile 的文件。当指定目录时，则会加载特定于 profile 的文件。


    使用 `--spring.config.name=your-external` 来加载 `your-external.properties` 就足够了；但是，这会破坏
    `application.properties` 的加载。更好的做法是使用 `--spring.config.name=application,your-external`；现在，所有位置都会搜索
    `application.properties` 和 `your-external.properties`，并且特定于 profile 的版本也会被考虑在内。


    ## 2.3 测试


    ### 问题


    你想为 Spring Boot 应用程序的某个组件或部分编写测试。


    ### 解决方案


    Spring Boot 扩展了 Spring 测试框架的功能范围。它增加了对 Bean 进行模拟和监视的支持，并为 Web 测试提供了自动配置。然而，它也引入了对应用程序进行切片测试的简便方法，即仅启动所需的部分（例如，通过使用
    `@WebMvCTest` 或 `@JdbcTest`）。


    ### 工作原理


    Spring Boot 也将自动配置扩展到了测试框架的各个部分。它还与 Mockito^(⁸) 集成，以便于对 Bean 进行模拟（或监视）。它还提供了基于
    Web 的测试的自动配置，可以使用 Spring MockMvc 测试框架或基于 WebDriver 的测试。

    '
- fmt: '### Writing a Unit Test


    First, let’s write a simple unit test for one of the components of the calculator,
    the `MultiplicationTest`, which will test the `Multiplication` class.


    ```

    public class MultiplicationTest {

    private final Multiplication addition = new Multiplication();

    @Test

    public void shouldMatchOperation() {

    assertThat(addition.handles(''*'')).isTrue();

    assertThat(addition.handles(''/'')).isFalse();

    }

    @Test

    public void shouldCorrectlyApplyFormula() {

    assertThat(addition.apply(2, 2)).isEqualTo(4);

    assertThat(addition.apply(12, 10)).isEqualTo(120);

    }

    }

    ```


    This is a basic unit test. The `Multiplication` is instantiated and we call methods
    on it and validate the outcome. The first test will test if it really reacts to
    the `*` operator and not something else. The second test will test the actual
    multiplication logic. To make a method a test method (for JUnit 4) you will have
    to annotate it with `@Test`.


    ### Mocking Dependencies in a Unit Test


    Sometimes a class needs dependencies; however, you want your test to test only
    a single component (when writing a unit test). Spring Boot automatically brings
    in the Mockito framework, which is very nice to mock classes and record behavior
    on it. Writing a test for the `Calculator` requires additional components, as
    it delegates the actual calculation to the available `Operation` classes. To test
    the correct behavior of the `Calculator` we would need to create a mock of the
    `Operation` and inject that into the `Calculator`.


    ```

    public class CalculatorTest {

    private Calculator calculator;

    private Operation mockOperation;

    @Before

    public void setup() {

    mockOperation = Mockito.mock(Operation.class);

    calculator = new Calculator(Collections.singletonList(mockOperation));

    }

    @Test(expected = IllegalArgumentException.class)

    public void throwExceptionWhenNoSuitableOperationFound() {

    when(mockOperation.handles(anyChar())).thenReturn(false);

    calculator.calculate(2, 2, ''*'');

    }

    @Test

    public void shouldCallApplyMethodWhenSuitableOperationFound() {

    when(mockOperation.handles(anyChar())).thenReturn(true);

    when(mockOperation.apply(2, 2)).thenReturn(4);

    calculator.calculate(2, 2, ''*'');

    verify(mockOperation, times(1)).apply(2,2);

    }

    }

    ```


    In the `@Before` class we mock the `Operation` by calling `Mockito.mock` and we
    construct the `Calculator` using the mocked operation. The mock is used in the
    test methods to have a certain behavior. In the first test method we want to test
    the situation where no suitable operation can be found, hence we instruct the
    mock to return `false` when the `handles` method is being called. The test will
    expect an exception; if the exception occurs the test will succeed. The second
    test is to check if the correct flow is followed; we want to test the correct
    behavior. The mock is instructed to return `true` for the `handles` method and
    a return value for the `apply` method.


    ### Integration Testing with Spring Boot


    Spring Boot provides several annotations to aid in testing. The first is `@SpringBootTest`,
    which will make the test a Spring Boot-driven test. This means that the test context
    framework will be searching for the class annotated with `@SpringBootApplication`
    (if no specific configuration is passed) and will use that to actually start the
    application.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(classes = CalculatorApplication.class)

    public class CalculatorApplicationTests {

    @Autowired

    private Calculator calculator;

    @Test(expected = IllegalArgumentException.class)

    public void doingDivisionShouldFail() {

    calculator.calculate(12,13, ''/'');

    }

    }

    ```


    The preceding test will start the `CalculatorApplication` and inject the fully
    configured `Calculator`. We can then write a test, in this case a situation that
    the calculator cannot handle, and write expectations for it.


    When doing a calculation, the output is printed to the console; using an `OutputCapture`
    JUnit rule, we could also write a success test and test the written output.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(classes = CalculatorApplication.class)

    public class CalculatorApplicationTests {

    @Rule

    public OutputCapture capture = new OutputCapture();

    @Autowired

    private Calculator calculator;

    @Test

    public void doingMultiplicationShouldSucceed() {

    calculator.calculate(12,13, ''*'');

    capture.expect(Matchers.containsString("12 * 13 = 156"));

    }

    @Test(expected = IllegalArgumentException.class)

    public void doingDivisionShouldFail() {

    calculator.calculate(12,13, ''/'');

    }

    }

    ```


    The `@Rule` will configure the given JUnit rule, in this case the `OutputCapture`
    rule, which comes with Spring Boot and intercepts the `System.out` and `System.err`
    so that assertions can be written on the output generated on those streams. In
    this case we do a multiplication and the output should reflect that.


    ### Integration Testing with Spring Boot and Mocks


    Spring Boot makes it easy to replace a bean with a mock in the application context.
    For this, Spring Boot introduced the `@MockBean` annotation.


    ```

    @MockBean

    private Calculator calculator

    ```


    This would replace the whole calculator with a mocked instance; to be able to
    use it you would need to define the behavior using the regular Mockito way. When
    there are multiple beans of a certain type, you need to specify the `name` of
    the bean you wish to replace.


    ```

    @MockBean(name ="addition")

    private Operation mockOperation;

    ```


    This would replace the regular `Addition` bean with a mocked instance, which we
    can then use to register mock behavior on. When a bean with that name cannot be
    found, the mocked bean will be registered as a new instance of that bean.


    ```

    @MockBean(name ="division")

    private Operation mockOperation;

    ```


    Would not replace an existing bean but add a bean to the application context and
    as a result the `Calculator` would have an additional operation added to the `operations`
    it can handle. You could test that using the `ReflectionTestUtils` helper class
    from the Spring Test framework.


    ```

    @Test

    public void calculatorShouldHave3Operations() {

    Object operations =

    ReflectionTestUtils.getField(calculator, "operations");

    assertThat((Collection) operations).hasSize(3);

    }

    ```


    This will obtain the `operations` field through reflection and assert that the
    collection size is 3. When the `@MockBean` annotation is removed (or the name
    changed to `addition`), this test will fail because there are now only two operations
    registered.


    Using the mock is straightforward:


    ```

    @Test

    public void mockDivision() {

    when(mockOperation.handles(''/'')).thenReturn(true);

    when(mockOperation.apply(14, 7)).thenReturn(2);

    calculator.calculate(14,7, ''/'');

    capture.expect(Matchers.containsString("14 / 7 = 2"));

    }

    ```


    Here we instruct Mockito to return `true` when a `/` is being tested and to return
    a value when the `apply` method is called. Next, the method is called and we assert
    that the output is what is expected from this test.


