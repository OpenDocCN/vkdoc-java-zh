    #### 同时支持 HTTP 和 HTTPS


    Spring Boot 默认只启动一个连接器：要么是 HTTP，要么是 HTTPS，但不会同时启动两者。如果你想同时支持 HTTP 和 HTTPS，则需要手动添加一个额外的连接器。最简单的方法是自行创建
    HTTP 连接器，并让 Spring Boot 设置 SSL 部分。


    首先，配置 Spring Boot 在端口 8443 上启动服务器。


    ```

    server.port=8443

    ```


    要向嵌入式 Tomcat 添加额外的连接器，你需要将 `TomcatServletWebServerFactory` 作为 bean 添加到上下文中。通常，Spring
    Boot 会检测容器并选择要使用的 `WebServerFactory`；但是，由于需要进行自定义，我们需要手动添加它。此 bean 可以添加到带有 `@Configuration`
    注解的类或 `LibraryApplication` 类中。


    ```

    @Bean

    public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

    var factory = new TomcatServletWebServerFactory();

    factory.addAdditionalTomcatConnectors(httpConnector());

    return factory;

    }

    private Connector httpConnector() {

    var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

    connector.setScheme("http");

    connector.setPort(8080);

    connector.setSecure(false);

    return connector;

