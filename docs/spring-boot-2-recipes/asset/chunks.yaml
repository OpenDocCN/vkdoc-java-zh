  raw: '#### Sending an Object


    To send a message to RabbitMQ, the message payload has to be converted into a
    `byte[]`. For a `String` that is pretty easy by calling `String.getBytes` . However,
    when sending an object this becomes more cumbersome. The default implementation
    will check if the object is `Serializable` and if so will use Java serialization
    to convert the object to a `byte[]`. Using Java serialization isn’t the best solution,
    especially if you need to send messages to non-Java clients.


    The `RabbitTemplate` uses a `MessageConverter` to delegate the message creation
    to. By default it uses the `SimpleMessageConverter` , which implements the strategy
    outlined above. There are, however, various implementations that use XML (`MarshallingMessageConverter`)
    or JSON (`Jackson2JsonMessageConverter`) for the actual payload (instead of Java
    serialization).


    Spring Boot will automatically detect the configured `MessageConverter` and use
    it for both the `RabbitTemplate` as well as the listeners (see Recipe 9.5).


    ```

    @Bean

    public Jackson2JsonMessageConverter jsonMessageConverter() {

    return new Jackson2JsonMessageConverter();

    }

    ```


    This is enough to change the `SimpleMessageConverter` into a `Jackson2JsonMessageConverter`
    .


    Let’s create an `Order` and use the `RabbitTemplate` to send it to the `orders`
    exchange using a `new-order` routing key.


    ```

    package com.apress.springbootrecipes.demo;

    import java.math.BigDecimal;

    public class Order {

    private String id;

    private BigDecimal amount;

    public Order() {

    }

    public Order(String id, BigDecimal amount) {

    this.id=id;

    this.amount = amount;

    }

    public String getId() {

    return id;

    }

    public void setId(String id) {

    this.id = id;

    }

    public BigDecimal getAmount() {

    return amount;

    }

    public void setAmount(BigDecimal amount) {

    this.amount = amount;

    }

    @Override

    public String toString() {

    return String.format("Order [id=''%s'', amount=%4.2f]", id, amount);

    }

    }

    ```


    Now that we have an order, let’s create a scheduled method that periodically sends
    a message with a random order.


    ```

    @Component

    class OrderSender {

    private final RabbitTemplate rabbit;

    OrderSender(RabbitTemplate rabbit) {

    this.rabbit = rabbit;

    }

    @Scheduled(fixedRate = 256)

    public void sendTime() {

    var id = UUID.randomUUID().toString();

    var amount = ThreadLocalRandom.current().nextDouble(1000.00d);

    var order = new Order(id, BigDecimal.valueOf(amount));

    rabbit.convertAndSend("orders", "new-order", order);

    }

    }

    ```


    It will create an `Order` with a random amount of max 1000.00\. It will then send
    it, using the `convertAndSend` method , to the `orders` exchange, using the `new-order`
    routing key.


    The test will create a mock of the `RabbitTemplate` using `@MockBean` again and
    will test the method invocation.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest

    public class RabbitSenderApplicationTest {

    @MockBean

    private RabbitTemplate rabbitTemplate;

    @Test

    public void shouldSendAtLeastASingleMessage() {

    verify(rabbitTemplate, atLeastOnce())

    .convertAndSend(

    eq("orders"),

    eq("new-order"),

    any(Order.class));

    }

    }

    ```


    ##### Write an Integration Test


    Add a dependency to an embedded RabbitMQ server to easily start it from a test
    case.


    ```

    io.arivera.oss

    embedded-rabbitmq

    1.3.0

    test


    ```


    Next, create a `RabbitSenderApplicationIntegrationTestConfiguration` that contains
    the additional configuration needed to run an integration test.


    ```

    @TestConfiguration

    public class RabbitSenderApplicationIntegrationTestConfiguration {

    @Bean(initMethod = "start", destroyMethod = "stop")

    public EmbeddedRabbitMq embeddedRabbitMq() {

    EmbeddedRabbitMqConfig config = new

    EmbeddedRabbitMqConfig.Builder()

    .rabbitMqServerInitializationTimeoutInMillis(10000).build();

    return new EmbeddedRabbitMq(config);

    }

    @Bean

    public Queue newOrderQueue() {

    return QueueBuilder.durable("new-order").build();

    }

    @Bean

    public Exchange ordersExchange() {

    return ExchangeBuilder.topicExchange("orders").durable(true).build();

    }

    @Bean

    public Binding newOrderQueueBinding(Queue queue, Exchange exchange) {

    return BindingBuilder.bind(queue).to(exchange)

    .with("new-order").noargs();

    }

    }

    ```


    The configuration includes the embedded RabbitMQ definition, a `Queue` and `Exchange`
    definition, and finally the `Binding` of the `Queue` to the `Exchange` with the
    `routingKey`.


    The queue and bindings are needed to be able to receive the messages, else they
    would only reside on the exchange (or, depending on the configuration, be discarded).


    The integration test will load the application and the additional configuration.
    It will use the `RabbitTemplate` to receive the message.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(classes = {

    RabbitSenderApplication.class,

    RabbitSenderApplicationIntegrationTestConfiguration.class })

    public class RabbitSenderApplicationIntegrationTest {

    @Autowired

    private RabbitTemplate rabbitTemplate;

    @Test

    public void shouldSendAtLeastASingleMessage() {

    Message msg = rabbitTemplate.receive("new-order", 1500);

    assertThat(msg).isNotNull();

    assertThat(msg.getBody()).isNotEmpty();

    assertThat(msg.getMessageProperties().getReceivedExchange())

    .isEqualTo("orders");

    assertThat(msg.getMessageProperties().getReceivedRoutingKey())

    .isEqualTo("new-order");

    assertThat(msg.getMessageProperties().getContentType())

    .isEqualTo(MediaType.APPLICATION_JSON_VALUE);

    }

    }

    ```


    This test will load the application and additional configuration class. This is
    done by specifing the `classes` attribute on the `@SpringBootApplication` annotation.
    When the test starts it will receive a message from the `new-order` queue defined
    in the configuration. The received message will be used to do assertions on the
    message like the encoding (`application/json`), the routing key, etc.


    ## 9.6 Receive Messages Using RabbitMQ


    ### Problem


    You want to receive messages from a RabbitMQ.


    ### Solution


    Annotating a method with `@RabbitListener` will bind it to a queue and let it
    receive messages.


    ### How It Works


    A bean that has `@RabbitListener` annotated methods will be used as a message
    listener for incoming messages. A message listener container is constructed and
    the annotated method will receive the incoming message. The message listener container
    can be configured through properties in the `spring.rabbitmq.listener` namespace.


    Table 9-11


    Rabbit Listener Properties


    | Property | Description |

    | --- | --- |

    | `spring.rabbitmq.listener.type` | The listener container type `direct` or `simple`,
    default is `simple` |

    | `spring.rabbitmq.listener.simple.acknowledge-mode` | Container acknowledge mode,
    default none |

    | `spring.rabbitmq.listener.simple.prefetch` | Number of messages to be handled
    in a single request, default none |

    | `spring.rabbitmq.listener.simple.default-requeue-rejected` | Should rejected
    deliveries be re-queued |

    | `spring.rabbitmq.listener.simple.concurrency` | Minimum number of listener invoker
    threads |

    | `spring.rabbitmq.listener.simple.max-concurrency` | Maximum number of listener
    invoker threads |

    | `spring.rabbitmq.listener.simple.transaction-size` | Number of messages processed
    in a single transaction. For best results should be smaller or equal to the prefetch
    size |

    | `spring.rabbitmq.listener.direct.acknowledge-mode` | Container acknowledge mode,
    default none |

    | `spring.rabbitmq.listener.direct.prefetch` | Number of messages to be handled
    in a single request, default none |

    | `spring.rabbitmq.listener.direct.default-requeue-rejected` | Should rejected
    deliveries be re-queued |

    | `spring.rabbitmq.listener.direct.consumers-per-queue` | Number of consumers
    per queue. Default is 1 |'
