    #### 简化应用类


    查看该类定义，会发现它上面有三个注解。


    ```

    @Configuration

    @EnableAutoConfiguration

    @ComponentScan

    public class DemoApplication { ... }

    ```


    在编写基于 Spring Boot 的应用时，大多数情况下都需要所有这些注解。这段代码可以通过使用 `@SpringBootApplication` 注解来简化。类头将变为：


    ```

    @SpringBootApplication

    public class DemoApplication { ... }

    ```


    `@SpringBootApplication` 注解是一个所谓的组合注解，它由之前所需的那些注解组成。


    ```

    @Target({ElementType.TYPE})

    @Retention(RetentionPolicy.RUNTIME)

    @Documented

    @Inherited

    @SpringBootConfiguration

    @EnableAutoConfiguration

    @ComponentScan

    public @interface SpringBootApplication { ... }

    ```


    `@SpringBootApplication` 与之前提到的注解之间有一个区别。这里使用的是 `@SpringBootConfiguration` 注解，而不是
    `@Configuration` 注解。`@SpringBootConfiguration` 是一个专门的 `@Configuration` 注解。它表明这是一个基于
    Spring Boot 的应用。在你的应用中使用 `@SpringBootConfiguration` 时，只能有一个类被此注解标注！


    ## 1.2 使用 Gradle 创建 Spring Boot 应用


    ### 问题


    你想使用 Spring Boot 和 Gradle 开始开发一个应用。


    ### 解决方案


    创建一个 Gradle 构建文件 `build.gradle`，并添加所需的依赖。要启动应用，创建一个包含 `main` 方法的 Java 类来引导应用。


    ### 实现原理


    假设你要创建一个简单的应用，该应用引导一个 `SpringApplication`，从 `ApplicationContext` 中获取所有 bean，并将它们输出到控制台。


    #### 创建 **build.gradle**


    首先，你需要创建一个 `build.gradle`，并使用 Gradle 正确管理 Spring Boot 依赖所需的两个插件。Spring Boot 需要一个特殊的
    Gradle 插件（Spring Boot Gradle 插件），以及一个用于扩展 Gradle 默认依赖管理能力的插件（依赖管理插件）。要启用并配置这些插件，请在
    `build.gradle` 中创建一个 `buildscript` 任务。


    ```

    buildscript {

    ext {

    springBootVersion = ''2.1.0.RELEASE''

    }

    repositories {

    mavenCentral()

    }

    dependencies {

    classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")

    }

    }

    ```


    此任务现在将正确配置要使用的 Spring Boot 插件。接下来，你需要指定要使用的插件；由于这是一个基于 Java 的项目，你至少需要 `Java` 插件，并且由于本书是关于
    Spring Boot 的，你还需要 `org.springframework.boot` 插件。最后，你需要包含 `io.spring.dependency-management`
    插件，以便让 Spring Boot Starters 管理依赖。


    ```

    apply plugin: ''java''

    apply plugin: ''org.springframework.boot''

    apply plugin: ''io.spring.dependency-management''

    ```


    最后，你需要添加所需的依赖；与配方 1.1 一样，添加 `spring-boot-starter` 依赖。


    ```

    dependencies {

    compile ''org.springframework.boot:spring-boot-starter''

    }

    ```


    注意依赖项上没有指定具体版本。无需指定版本并让其自动管理，是由于使用了 `io.spring.dependency-management` 插件，该插件与
    Maven 一样，可以简化依赖管理。


    完整的 `build.gradle` 现在应该如下所示：


    ```

    buildscript {

    ext {

    springBootVersion = ''2.1.0.RELEASE''

    }

    repositories {

    mavenCentral()

    }

    dependencies {

    classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")

    }

    }

    apply plugin: ''java''

    apply plugin: ''org.springframework.boot''

    apply plugin: ''io.spring.dependency-management''

    dependencies {

    compile ''org.springframework.boot:spring-boot-starter''

    }

    repositories {

    mavenCentral()

    }

    ```


    #### 创建应用类


    让我们创建一个包含 `main` 方法的 `DemoApplication` 类。`main` 方法调用 `SpringApplication.run`，并传入
    `DemoApplication.class` 以及来自 main 方法的参数。`run` 方法返回一个 `ApplicationContext`，用于从
    `ApplicationContext` 中检索 bean 名称。这些名称被排序后打印到控制台。


    最终的类如下所示：


    ```

    package com.apress.springbootrecipes.demo;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import java.util.Arrays;

    @SpringBootApplication

    public class DemoApplication {

    public static void main(String[] args) {

    var ctx = SpringApplication.run(DemoApplication.class, args);

    System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

    var names = ctx.getBeanDefinitionNames();

    Arrays.sort(names);

    Arrays.asList(names).forEach(System.out::println);

    }

    }

    ```


    这个类是一个带有 `main` 方法的普通 Java 类。你可以从 IDE 中运行此类。当应用运行时，它将显示类似于图 1-2 的输出。


    ![../images/464036_1_En_1_Chapter/464036_1_En_1_Fig2_HTML.jpg](img/464036_1_En_1_Fig2_HTML.jpg)


    图 1-2


    运行应用的输出


