- fmt: '### How It Works


    Spring Boot will configure a `JdbcTemplate` and `NamedParameterJdbcTemplate` by
    default and does so when it can detect a single candidate `DataSource`. A single
    candidate `DataSource` means there is either only a single `DataSource` or there
    is one marked as primary resource using `@Primary`. As the `JdbcTemplate` is already
    available, you can use that to write your JDBC code. Rewriting the `CustomerLister`
    to use the `JdbcTemplate` instead of a plain `DataSource` will make the code easier
    to read and thus easier to handle.


    ### Note


    The `NamedParameterJdbcTemplate` is similar to the `JdbcTemplate`, with the major
    advantage of being able to use named parameters in a query instead of the regular
    JDBC placeholders.


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final JdbcTemplate jdbc;

    CustomerLister(JdbcTemplate jdbc) {

    this.jdbc = jdbc;

    }

    @Override

    public void run(ApplicationArguments args) {

    var query = "SELECT id, name, email FROM customer";

    jdbc.query(query, rs -> {

    logger.info("Customer [id={}, name={}, email={}]",

    rs.getLong(1), rs.getString(2), rs.getString(3));

    });

    }

    }

    ```


    The `JdbcTemplate` is used to execute the query through the `query` method; this
    method takes a `String` and a `RowCallbackHandler`. The `JdbcTemplate` will execute
    the query and for each row call the `RowCallbackHandler`, which does the logging
    of the row. When running the application, the output is still the same but the
    code became cleaner.


    The `JdbcTemplate` also has the, probably more familiar, `RowMapper` interface,
    which can be used to map a row from the `ResultSet` to a Java object. Let’s create
    a `Customer` class and use a `RowMapper` to create `Customer` instances from the
    database.


    ```

    package com.apress.springboot2recipes.jdbc;

    import java.util.Objects;

    public class Customer {

    private final long id;

    private final String name;

    private final String email;

    Customer(long id, String name, String email) {

    this.id = id;

    this.name = name;

    this.email = email;

    }

    public long getId() {

    return id;

    }

    public String getName() {

    return name;

    }

    public String getEmail() {

    return email;

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o == null || getClass() != o.getClass()) return false;

    Customer customer = (Customer) o;

    return id == customer.id &&

    Objects.equals(name, customer.name) &&

    Objects.equals(email, customer.email);

    }

    @Override

    public int hashCode() {

    return Objects.hash(id, name, email);

    }

    @Override

    public String toString() {

    return "Customer [" +

    "id=" + id +", name=''" + name + ''\" +

    ", email=''" + email + ''\" + '']'';

    }

    }

    ```


    Next we create a repository interface to define the contract and create a JDBC-based
    implementation.


    ```

    package com.apress.springboot2recipes.jdbc;

    import java.util.List;

    public interface CustomerRepository {

    List findAll();

    Customer findById(long id);

    Customer save(Customer customer);

    }

    ```


    Next, the implementation uses the `JdbcTemplate` and a `RowMapper` to map the
    results to `Customer` objects.


    ```

    package com.apress.springboot2recipes.jdbc;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.jdbc.support.GeneratedKeyHolder;

    import org.springframework.stereotype.Repository;

    import java.sql.PreparedStatement;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import java.util.List;

    @Repository

    class JdbcCustomerRepository implements CustomerRepository {

    private static final String ALL_QUERY =

    "SELECT id, name, email FROM customer";

    private static final String BY_ID_QUERY =

    "SELECT id, name, email FROM customer WHERE id=?";

    private static final String INSERT_QUERY =

    "INSERT INTO customer (name, email) VALUES (?,?)";

    private final JdbcTemplate jdbc;

    JdbcCustomerRepository(JdbcTemplate jdbc) {

    this.jdbc = jdbc;

    }

    @Override

    public List findAll() {

    return jdbc.query(ALL_QUERY, (rs, rowNum) -> toCustomer(rs));

    }

    @Override

    public Customer findById(long id) {

    return jdbc.queryForObject(BY_ID_QUERY, (rs, rowNum) -> toCustomer(rs), id);

    }

    @Override

    public Customer save(Customer customer) {

    var keyHolder = new GeneratedKeyHolder();

    jdbc.update(con -> {

    var ps = con.prepareStatement(INSERT_QUERY);

    ps.setString(1, customer.getName());

    ps.setString(2, customer.getEmail());

    return ps;

    }, keyHolder);

    return new Customer(keyHolder.getKey().longValue(),

    customer.getName(), customer.getEmail());

    }

    private Customer toCustomer(ResultSet rs) throws SQLException {

    var id = rs.getLong(1);

    var name = rs.getString(2);

    var email = rs.getString(3);

    return new Customer(id, name, email);

    }

    }

    ```


    The `JdbcCustomerRepository` uses a `JdbcTemplate` and `RowMapper` (through a
    lambda expression) to convert the `ResultSet` into a `Customer`. The `CustomerListener`
    can now use the `CustomerRepository` to get all the `Customer`s from the database
    and print them to the console.


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( customer -> logger.info("{}", customer));

    }

    }

    ```


    As all JDBC code has been moved to the `JdbcCustomerRepository`, the class becomes
    very simple. It gets a `CustomerRepository` injected and, using the `findAll`
    method, it obtains the content of the database and for each customer prints a
    line.


    ### Testing JDBC Code


    When testing JDBC code one requires a database, often an embedded database like
    H2, Derby, or HSQLDB is used for testing. Spring Boot makes it very easy to write
    tests for JDBC code. JDBC-based tests can be annotated with `@JdbcTest` and Spring
    Boot will create a minimal application with only the JDBC-related beans like a
    `DataSource` and transaction manager.


    Let’s write a test for the `JdbcCustomerRepository` and use H2 as the embedded
    database. First, add H2 as a test dependency.


    ```

    com.h2database

    h2

    test

    ```


    Next create the `JdbcCustomerRepositoryTest`.


    ```

    @RunWith(SpringRunner.class)

    @JdbcTest(includeFilters =

    @ComponentScan.Filter(

    type= FilterType.REGEX,

    pattern = "com.apress.springboot2recipes.jdbc.*Repository"))

    @TestPropertySource(properties = "spring.flyway.enabled=false")

    public class JdbcCustomerRepositoryTest {

    @Autowired

    private JdbcCustomerRepository repository;

    }

    ```


    The `@RunWith(SpringRunner.class)` executes the test by a special JUnit runner
    to bootstrap the Spring Test Context framework. The `@JdbcTest` will replace the
    preconfigured `DataSource` with an embedded one (H2 in this case). As we also
    want to create instances of our repositories, we add an `includeFilters` and give
    it a regular expression to match our `JdbcCustomerRepository`.


    Finally, there is the `@TestPropertySource(properties = "spring.flyway.enabled=false")`,
    which indicates that we want to disable Flyway. The application uses Flyway to
    manage the schema; however, those scripts are written for PostgreSQL and not H2.
    For testing, we want to disable Flyway and provide an H2-based `schema.sql` to
    create the schema.'
