    \ wrapped in the `ReactiveDataDriverContextVariable`. It will start rendering\
    \ as soon as five elements are received and will continue to render the page until\
    \ everything is received. Now when opening the orders page you will see the table\
    \ grow until all orders are read.\n\n## 5.4 WebFlux and WebSockets\n\n### Problem\n\
