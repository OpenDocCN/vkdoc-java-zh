    \ | Should resolved templates be cached or not, default `true` |\n| `spring.thymeleaf.template-resolver-order`\
    \ | Order of the `ViewResolver` default is 1 |\n| `spring.thymeleaf.view-names`\
    \ | The view names (comma separated) that can be resolved with this `ViewResolver`\
    \ |\n| `spring.thymeleaf.exclude-view-names` | The view names (comma separated)\
    \ that are excluded from being resolved |\n| `spring.thymeleaf.enabled` | Should\
    \ Thymeleaf be enabled, default `true` |\n| `spring.thymeleaf.enable-spring-el-compiler`\
    \ | Enable the compilation of SpEL expressions, default `false` |\n| `spring.thymeleaf.reactive.max-chunk-size`\
    \ | Maximum size of databuffers used to write the response in bytes. Default 0\
    \ |\n| `spring.thymeleaf.reactive.media-types` | Media types supported by this\
    \ view technology, like `text/html` |\n| `spring.thymeleaf.reactive.full-mode-view-names`\
    \ | Comma-separated list of view names that should operate in FULL mode. Default\
    \ none. Full mode means basically blocking mode. |\n| `spring.thymeleaf.reactive.chunked-mode-view-names`\
    \ | Comma-separated list of view names that should operate in chunked mode |\n\
    \n#### Use Thymeleaf Views\n\nFirst create an `index.html` in the `src/main/resources/templates`\
    \ directory.\n\n```html\n<!DOCTYPE html>\n<html xmlns:th=\"http://www.thymeleaf.org\"\
    >\n<head>\n    <title>Spring Boot - Orders</title>\n</head>\n<body>\n    <h1>Order\
    \ Management System</h1>\n    <a th:href=\"@{/orders}\">List of orders</a>\n</body>\n\
    </html>\n```\n\nThis page will render a simple page with a single link, pointing\
    \ to `/orders`. This URL is rendered using the `th:href` tag, which will expand\
    \ `/orders` to a proper URL. Next, write a controller that will select the page\
    \ to render.\n\n```java\npackage com.apress.springbootrecipes.order.web;\n\nimport\
    \ org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
    \n@Controller\nclass IndexController {\n    @GetMapping\n    public String index()\
    \ {\n        return \"index\";\n    }\n}\n```\n\nWrite an `OrderController`, which\
    \ will return the `orders/list` as the name of the view and adds `Flux<Order>`\
    \ to the model.\n\n```java\npackage com.apress.springbootrecipes.order.web;\n\n\
    import org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
    import org.springframework.web.bind.annotation.RequestMapping;\nimport reactor.core.publisher.Mono;\n\
    import org.springframework.ui.Model;\n\n@Controller\n@RequestMapping(\"/orders\"\
    )\nclass OrderController {\n    private final OrderService orderService;\n\n \
    \   OrderController(OrderService orderService) {\n        this.orderService =\
    \ orderService;\n    }\n\n    @GetMapping\n    public Mono<String> list(Model\
    \ model) {\n        var orders = orderService.orders();\n        model.addAttribute(\"\
    orders\", orders);\n        return Mono.just(\"orders/list\");\n    }\n}\n```\n\
