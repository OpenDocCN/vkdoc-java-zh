- fmt: "### How It Works\n\nSpring Boot by default comes with the error handling enabled\
    \ and will show a default error page. This can be disabled in full by setting\
    \ the `server.error.whitelabel.enabled` property to `false`. When disabled, the\
    \ exception handling will be handled by the Servlet Container instead of the general\
    \ exception handling mechanism provided by Spring and Spring Boot.\n\nThere are\
    \ also some other properties that can be used to configure the whitelabel error\
    \ page, mainly on what is going to be included in the model so that it, optionally,\
    \ could be used to display. See Table [3-3](#464036_1_En_3_Chapter.xhtml#Tab3)\
    \ for the properties.\n\n**Table 3-3** Error Handling Properties\n\n| Property\
    \ | Description |\n| --- | --- |\n| `server.error.whitelabel.enabled` | Is the\
    \ whitelabel error page enabled, default `true` |\n| `server.error.path` | The\
    \ path of the error page, default `/error` |\n| `server.error.include-exception`\
    \ | Should the name of the exception be included in the model, default `false`\
    \ |\n| `server.error.include-stacktrace` | Should the stacktrace be included in\
    \ the model, default `never` |\n\nFirst let’s add a method to the `BookController`\
    \ that forces an exception.\n\n```java\n@GetMapping(\"/books/500\")\npublic void\
    \ error() {\n    throw new NullPointerException(\"Dummy NullPointerException.\"\
    );\n}\n```\n\nThis will throw an exception and as a result the whitelabel error\
    \ page will be shown when visiting `http://localhost:8080/books/500` (see Figure\
    \ [3-6](#464036_1_En_3_Chapter.xhtml#Fig6)).\n\n![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig6_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig6_HTML.jpg)\n\
    \n**Figure 3-6** Default error page\n\nThis is shown if no error page can be found.\
    \ To override this, add an `error.html` to the `src/main/resources/templates`\
    \ directory.\n\n```html\nSpring Boot Recipes - Library\n\nOops something went\
    \ wrong, we don't know what but we are going to work on it!\n\nStatus\n\nError\n\
    \nMessage\n\nException\n\nStacktrace\n```\n\nNow when the application is started\
    \ and an exception occurs, this custom error page will be shown (Figure [3-7](#464036_1_En_3_Chapter.xhtml#Fig7)).\
    \ The page will be rendered by the view technology of your choice (in this case\
    \ it uses Thymeleaf).\n\n![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig7_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7** Custom error page\n\nIf you now set the `server.error.include-exception`\
    \ to `true` and `server.error.include-stacktrace` to `always`, the customized\
    \ error page will also include the classname of the exception and the stacktrace\
    \ (Figure [3-8](#464036_1_En_3_Chapter.xhtml#Fig8)).\n\n![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig8_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig8_HTML.jpg)\n\
    \n**Figure 3-8** Custom error page with stacktrace\n\nNext to providing a custom\
    \ generic error page, you could also add an error page for specific HTTP status\
    \ codes. This can be achieved by adding a `<http-status>.html` to the `src/main/resources/templates/error`\
    \ directory. Let’s add a `404.html` to be shown for unknown URLs.\n\n```html\n\
    Spring Boot Recipes - Library - Resource Not Found\n\nOops the page couldn't be\
    \ located.\n```\n\nWhen navigating to a URL that is unknown to the application,\
    \ it will render this page, and when triggering the exception it will still show\
    \ the customized error page, as shown in Figures [3-7](#464036_1_En_3_Chapter.xhtml#Fig7)\
    \ and [3-8](#464036_1_En_3_Chapter.xhtml#Fig8).\n\n### Tip\n\nYou can also add\
    \ a `4xx.html` or `5xx.html` for a custom error page for all http status code\
    \ in the 400 or 500 range.\n\n#### Adding Attributes to the Model\n\nBy default,\
    \ Spring Boot will include the attributes in the model for the error page, as\
    \ listed in Table [3-4](#464036_1_En_3_Chapter.xhtml#Tab4).\n\n**Table 3-4** Default\
    \ Error Model Attributes\n\n| Attribute | Description |\n| --- | --- |\n| `timestamp`\
    \ | The time that the errors were extracted |\n| `status` | The status code |\n\
    | `error` | The error reason |\n| `exception` | The class name of the root exception\
    \ (if configured) |\n| `message` | The exception message |\n| `errors` | Any `ObjectError`\
    \ from a `BindingResult` (when using binding and/or validation) |\n| `trace` |\
    \ The exception stack trace (if configured) |\n| `path` | The URL path when the\
    \ exception was raised |\n\nThis is all done through the use of an `ErrorAttributes`\
    \ component. The default used and configured is the `DefaultErrorAttributes`.\
    \ You can create your own `ErrorAttributes` handler to create a custom model or\
    \ extend the `DefaultErrorAttributes` to add additional attributes.\n\n```java\n\
    package com.apress.springbootrecipes.library;\nimport org.springframework.boot.web.servlet.error.DefaultErrorAttributes;\n\
    import org.springframework.web.context.request.WebRequest;\nimport java.util.Map;\n\
    public class CustomizedErrorAttributes extends DefaultErrorAttributes {\n    @Override\n\
    \    public Map getErrorAttributes(WebRequest webRequest, boolean includeStackTrace)\
    \ {\n        Map errorAttributes =\n                super.getErrorAttributes(webRequest,\
    \ includeStackTrace);\n        errorAttributes.put(\"parameters\", webRequest.getParameterMap());\n\
    \        return errorAttributes;\n    }\n}\n```\n\nThe `CustomizedErrorAttributes`\
    \ will add the original request parameters to the model next to the default attributes.\
    \ Next step is to configure this as a bean in the `LibraryApplication`. Spring\
    \ Boot will then detect it and use it instead of configuring the default.\n\n\
    ```java\n@Bean\npublic CustomizedErrorAttributes errorAttributes() {\n    return\
    \ new CustomizedErrorAttributes();\n}\n```\n\nFinally, you might want to use the\
    \ additional properties in your `error.html`.\n\n```html\nParameters\n```\n\n\
    When the preceding part is included in your `error.html` it will print the content\
    \ of the map of parameters available in the model (Figure [3-9](#464036_1_En_3_Chapter.xhtml#Fig9)).\n\
    \n![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig9_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig9_HTML.jpg)\n\
    \n**Figure 3-9** Custom error page with parameters\n\n## 3.5 Internationalizing\
    \ Your Application\n\n### Problem\n\nWhen developing an internationalized web\
    \ application, you have to display your web pages in a user’s preferred locale.\
    \ You don’t want to create different versions of the same page for different locales.\n\
    \n### Solution\n\nTo avoid creating different versions of a page for different\
    \ locales, you should make your web page independent of the locale by externalizing\
    \ locale-sensitive text messages. Spring is able to resolve text messages for\
    \ you by using a message source, which has to implement the `MessageSource` interface.\
    \ In your page templates you can then use either special tags or do lookups for\
    \ the messages.\n\n### How It Works\n\nSpring Boot automatically configures a\
    \ `MessageSource` when it finds a `messages.properties` in `src/main/resources`\
    \ (the default location). This `messages.properties` contains the default messages\
    \ to be used in your application. Spring Boot will use the `Accept-Language` header\
    \ from the request to determine which locale to use for the current request (see\
    \ Recipe 3.6 on how to change that).\n\nThere are some properties that change\
    \ the way the `MessageSource` reacts to missing translations, caching, etc. See\
    \ Table [3-5](#464036_1_En_3_Chapter.xhtml#Tab5) for an overview of the properties.\n\
    \n**Table 3-5** I18N Properties\n\n| Property | Description |\n| --- | --- |\n\
    | `spring.messages.basename` | Comma-separated list of basenames, default `messages`\
    \ |\n| `spring.messages.encoding` | Message bundle encoding, default `UTF-8` |\n\
    | `spring.messages.always-use-message-format` | Should `MessageFormat` be applied\
    \ to all messages, default `false` |\n| `spring.messages.fallback-to-system-locale`\
    \ | Fallback to the systems locale when no resource bundle for the detected locale\
    \ can be found. When disabled, will load the defaults from the default file. Default\
    \ `true` |\n| `spring.messages.use-code-as-default-message` | Use the message\
    \ code as a default message when no message can be found instead of throwing a\
    \ `NoSuchMessageException`. Default `false` |\n| `spring.messages.cache-duration`\
    \ | Cache duration, default forever |"
  raw: '### How It Works


    Spring Boot by default comes with the error handling enabled and will show a default
    error page. This can be disabled in full by setting the `server.error.whitelabel.enabled`
    property to `false`. When disabled, the exception handling will be handled by
    the Servlet Container instead of the general exception handling mechanism provided
    by Spring and Spring Boot.


    There are also some other properties that can be used to configure the whitelabel
    error page, mainly on what is going to be included in the model so that it, optionally,
    could be used to display. See Table [3-3](#464036_1_En_3_Chapter.xhtml#Tab3) for
    the properties.


    Table 3-3


    Error Handling Properties


    | Property | Description |

    | --- | --- |

    | server.error.whitelabel.enabled | Is the whitelabel error page enabled, default
    `true` |

    | server.error.path | The path of the error page, default `/error` |

    | server.error.include-exception | Should the name of the exception be included
    in the model, default `false` |

    | server.error.include-stacktrace | Should the stacktrace be included in the model,
    default `never` |


    First let’s add a method to the `BookController` that forces an exception.


    ```

    @GetMapping("/books/500")

    public void error() {

    throw new NullPointerException("Dummy NullPointerException.");

    }

    ```


    This will throw an exception and as a result the whitelabel error page will be
    shown when visiting `http://localhost:8080/books/500` (see Figure [3-6](#464036_1_En_3_Chapter.xhtml#Fig6)).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig6_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Default error page


    This is shown if no error page can be found. To override this, add an `error.html`
    to the `src/main/resources/templates` directory.


    ```


    Spring Boot Recipes - Library


    Oops something went wrong, we don''t know what but we are going to work on it!


    Status


    Error


    Message


    Exception


    Stacktrace


    ```


    Now when the application is started and an exception occurs, this custom error
    page will be shown (Figure [3-7](#464036_1_En_3_Chapter.xhtml#Fig7)). The page
    will be rendered by the view technology of your choice (in this case it uses Thymeleaf).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig7_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Custom error page


    If you now set the `server.error.include-exception` to `true` and `server.error.include-stacktrace`
    to `always`, the customized error page will also include the classname of the
    exception and the stacktrace (Figure [3-8](#464036_1_En_3_Chapter.xhtml#Fig8)).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig8_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Custom error page with stacktrace


    Next to providing a custom generic error page, you could also add an error page
    for specific HTTP status codes. This can be achieved by adding a `<http-status>.html`
    to the `src/main/resources/templates/error` directory. Let’s add a `404.html`
    to be shown for unknown URLs.


    ```


    Spring Boot Recipes - Library - Resource Not Found


    Oops the page couldn''t be located.


    ```


    When navigating to a URL that is unknown to the application, it will render this
    page, and when triggering the exception it will still show the customized error
    page, as shown in Figures [3-7](#464036_1_En_3_Chapter.xhtml#Fig7) and [3-8](#464036_1_En_3_Chapter.xhtml#Fig8).


    ### Tip


    You can also add a `4xx.html` or `5xx.html` for a custom error page for all http
    status code in the 400 or 500 range.


    #### Adding Attributes to the Model


    By default, Spring Boot will include the attributes in the model for the error
    page, as listed in Table [3-4](#464036_1_En_3_Chapter.xhtml#Tab4).


    Table 3-4


    Default Error Model Attributes


    | Attribute | Description |

    | --- | --- |

    | timestamp | The time that the errors were extracted |

    | status | The status code |

    | error | The error reason |

    | exception | The class name of the root exception (if configured) |

    | message | The exception message |

    | errors | Any `ObjectError` from a `BindingResult` (when using binding and/or
    validation) |

    | trace | The exception stack trace (if configured) |

    | path | The URL path when the exception was raised |


    This is all done through the use of an `ErrorAttributes` component. The default
    used and configured is the `DefaultErrorAttributes`. You can create your own `ErrorAttributes`
    handler to create a custom model or extend the `DefaultErrorAttributes` to add
    additional attributes.


    ```

    package com.apress.springbootrecipes.library;

    import org.springframework.boot.web.servlet.error.DefaultErrorAttributes;

    import org.springframework.web.context.request.WebRequest;

    import java.util.Map;

    public class CustomizedErrorAttributes extends DefaultErrorAttributes {

    @Override

    public Map getErrorAttributes(WebRequest webRequest, boolean includeStackTrace)
    {

    Map errorAttributes =

    super.getErrorAttributes(webRequest, includeStackTrace);

    errorAttributes.put("parameters", webRequest.getParameterMap());

    return errorAttributes;

    }

    }

    ```


    The `CustomizedErrorAttributes` will add the original request parameters to the
    model next to the default attributes. Next step is to configure this as a bean
    in the LibraryApplication. Spring Boot will then detect it and use it instead
    of configuring the default.


    ```

    @Bean

    public CustomizedErrorAttributes errorAttributes() {

    return new CustomizedErrorAttributes();

    }

    ```


    Finally, you might want to use the additional properties in your `error.html`.


    ```

    Parameters


    ```


    When the preceding part is included in your `error.html` it will print the content
    of the map of parameters available in the model (Figure [3-9](#464036_1_En_3_Chapter.xhtml#Fig9)).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig9_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Custom error page with parameters


    ## 3.5 Internationalizing Your Application


    ### Problem


    When developing an internationalized web application, you have to display your
    web pages in a user’s preferred locale. You don’t want to create different versions
    of the same page for different locales.


    ### Solution


    To avoid creating different versions of a page for different locales, you should
    make your web page independent of the locale by externalizing locale-sensitive
    text messages. Spring is able to resolve text messages for you by using a message
    source, which has to implement the `MessageSource` interface. In your page templates
    you can then use either special tags or do lookups for the messages.


    ### How It Works


    Spring Boot automatically configures a `MessageSource` when it finds a `messages.properties`
    in `src/main/resources` (the default location). This `messages.properties` contains
    the default messages to be used in your application. Spring Boot will use the
    `Accept-Language` header from the request to determine which locale to use for
    the current request (see Recipe 3.6 on how to change that).


    There are some properties that change the way the `MessageSource` reacts to missing
    translations, caching, etc. See Table [3-5](#464036_1_En_3_Chapter.xhtml#Tab5)
    for an overview of the properties.


    Table 3-5


    I18N Properties


    | Property | Description |

    | --- | --- |

    | `spring.messages.basename` | Comma-separated list of basenames, default `messages`
    |

    | `spring.messages.encoding` | Message bundle encoding, default `UTF-8` |

    | `spring.messages.always-use-message-format` | Should `MessageFormat` be applied
    to all messages, default `false` |

    | `spring.messages.fallback-to-system-locale` | Fallback to the systems locale
    when no resource bundle for the detected locale can be found. When disabled, will
    load the defaults from the default file. Default `true` |

    | `spring.messages.use-code-as-default-message` | Use the message code as a default
    message when no message can be found instead of throwing a `NoSuchMessageException`.
    Default `false` |

    | `spring.messages.cache-duration` | Cache duration, default forever |'
