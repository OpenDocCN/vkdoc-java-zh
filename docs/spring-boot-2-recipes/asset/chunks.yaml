    # 6. Spring Security


    在本章中，我们将了解 Spring Boot 的 Spring Security^(²⁵) 集成。Spring Security 可用于应用程序的用户身份验证和授权。Spring
    Security 的身份验证和授权过程都具有可插拔机制，并且默认支持不同的机制。对于身份验证，Spring Security 开箱即用地支持 JDBC、LDAP
    和属性文件。


    ## 6.1 在 Spring Boot 应用程序中启用安全性


    ### 问题


    你有一个基于 Spring Boot 的应用程序，并且希望在此应用程序中启用安全性。


    ### 解决方案


    添加 `spring-boot-starter-security` 作为依赖项，以便为你的应用程序自动配置和设置安全性。


    ### 工作原理


    首先，你需要将 Spring Security 的库引入到你的应用程序中；为此，你可以将 `spring-boot-starter-security` 添加到依赖项列表中。


    ```

    org.springframework.boot

    spring-boot-starter-security


    ```


    这将把 `spring-security-core`、`spring-security-config` 和 `spring-security-web` 依赖项添加到你的项目中。Spring
    Boot 会检测这些 JAR 文件中某些类的可用性，并据此自动启用安全性。


    Spring Boot 将按以下方式配置 Spring Security：使用基本身份验证和表单登录进行身份验证；启用 HTTP 安全标头；Servlet
    API 集成；匿名登录；以及禁用资源缓存。

