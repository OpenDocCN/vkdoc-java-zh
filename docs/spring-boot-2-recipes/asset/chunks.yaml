    # 8. Java Enterprise Services


    In this chapter, you will learn about Spring’s support for the most common Java
    enterprise services: Java Management Extensions (JMX), sending e-mail with JavaMail,
    background processing, and scheduling tasks.


    JMX is part of JavaSE and is a technology for managing and monitoring system resources
    such as devices, applications, objects, and service-driven networks. These resources
    are represented as managed beans (MBeans). Spring supports JMX by exporting any
    Spring bean as model MBeans without programming against the JMX API. In addition,
    Spring can easily access remote MBeans.


    JavaMail is the standard API and implementation for sending e-mail in Java. Spring
    further provides an abstract layer to send e-mail in an implementation-independent
    fashion.


    ## 8.1 Spring Asynchronous Processing


    ### Problem


    You want to asynchronously invoke a method with a long-running method.


    ### Solution


    Spring has support to configure a `TaskExecutor` and the ability to asynchronously
    execute methods annotated with `@Async`. This can be done in a transparent way
    without the normal setup for doing asynchronous execution. Spring Boot, however,
    will not automatically detect the need for asynchronous method execution. This
    support has to be enabled with the `@EnableAsync` configuration annotation.


    ### How It Works


    Let’s write a component that prints something in an asynchronous way to the console.


    ```

    package com.apress.springbootrecipes.scheduling;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.scheduling.annotation.Async;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorld {

    private static final Logger logger = LoggerFactory.getLogger(HelloWorld.class);

    @Async

    public void printMessage() throws InterruptedException {

    Thread.sleep(500);

    logger.info("Hello World, from Spring Boot 2!");

    }

    }

    ```


    The class will wait for 500 milliseconds before printing something to the logger.
    Notice the `@Async` annotation on the method; this indicates that the method can
    be executed in an asynchronous manner. However, this support has to be explicitly
    enabled for a Spring Boot application.


    To enable asynchronous processing, the `@EnableAsync` configuration annotation
    is needed. The easiest solution is to add this annotation to your application
    class.


    ```

    package com.apress.springbootrecipes.scheduling;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.scheduling.annotation.EnableAsync;

    import org.springframework.scheduling.annotation.EnableScheduling;

    import java.io.IOException;

    @SpringBootApplication

    @EnableAsync

    public class ThreadingApplication {

    public static void main(String[] args) throws IOException {

    SpringApplication.run(ThreadingApplication.class, args);

    System.out.println("Press [ENTER] to quit:");

    System.in.read();

    }

    @Bean

    public ApplicationRunner startupRunner(HelloWorld hello) {

    return (args) -> {hello.printMessage();};

    }

    }

    ```


    Spring Boot will by default create a `TaskExecutor` named `applicationTaskExecutor`.
    When adding `@EnableAsync`, it will automatically detect this instance and use
    it for asynchronous execution of methods, and also will enable the detection of
    `@Async` annotated methods.


    The `System.in.read` is in there to prevent the application from shutting down,
    so that the background task can finish processing. When pressing the ENTER key
    the program will quit. Generally, when developing a web application you don’t
    need things like this.'
