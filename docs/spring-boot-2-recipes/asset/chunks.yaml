    We always welcome your questions and feedback regarding the contents of this book.
    You can contact Marten Deinum by e-mail at `marten@deinum.biz` or Twitter at `@mdeinum`.


    ### Acknowledgments


    Although this is the fourth book I’ve ever (co)authored, I’m still amazed by the
    amount of work that goes into creating the book. Not just by me writing the content,
    but also by the very nice people at Apress. I realized with my first book that
    writing a book is hard; however, writing a book on cutting edge technology (Spring
    Boot 2.1) is even harder. Writing content against prerelease/beta software will
    result in rewriting samples and content. This, at times, drove me and I guess
    my Editorial Manager (Mark Powers) nuts as well. So I’m sorry I had to rewrite
    and reproduce so much content and that all in all it took more time then I initially
    thought it would. However, the result is a fresh book using Java 11 and covering
    Spring Boot 2.1.


    I owe a big thanks to all the people at Apress for trying to keep me on schedule
    while still keeping the quality and content up. Thank you for giving me the chance
    to finish my fourth book and for the support. So a very big thanks to all of you.


    A book isn’t written in isolation and without the comments and suggestions from
    the review, Manuel Jordan, some parts of the book would have been quite different.
    So Manuel, thanks for the comments, suggestions, and your time for reviewing this
    book (and reaching out to me).


    Thanks to my family and friends for the times they had to miss me and again to
    my dive buddies for all the dives and trips I missed.


    Last but definitely not least, I thank my wife, Djoke Deinum, and daughters, Geeske
    and Sietske, for their endless support, love, and dedication, despite the long
    evenings and sacrificed weekends and holidays to finish the book. Without your
    support, I probably would have abandoned the endeavor long ago.


    ### About the Author and About the Technical Reviewer


    #### About the Author


    #### About the Technical Reviewer


    Footnotes [1](#464036_1_En_BookFrontmatter_OnlinePDF.xhtml#Fn1_source) [2](#464036_1_En_BookFrontmatter_OnlinePDF.xhtml#Fn2_source)
    [3](#464036_1_En_BookFrontmatter_OnlinePDF.xhtml#Fn3_source) [4](#464036_1_En_BookFrontmatter_OnlinePDF.xhtml#Fn4_source)


    # 1. Spring Boot—Introduction


    In this chapter you will get a brief introduction to Spring Boot. At the heart
    of Spring Boot lies the Spring Framework; Spring Boot extends this to make auto-configuration,
    among others, possible.


    *Spring Boot makes it easy to create stand-alone, production-grade, Spring-based
    Applications that you can “just run.” We take an opinionated view of the Spring
    platform and third-party libraries so you can get started with minimum fuss. Most
    Spring Boot applications need very little Spring configuration.*


    From the Spring Boot Reference Guide


    Spring Boot has auto-configuration for infrastructure like JMS, JDBC, JPA, RabbitMQ,
    and lots more. Spring Boot also offers auto-configuration for different frameworks
    like Spring Integration, Spring Batch, Spring Security, and many others. When
    these frameworks or capabilities are detected, Spring Boot will configure them
    with opinionated but sensible defaults.


    The source code uses Maven for its build. Maven will take care of getting the
    necessary dependencies, compiling the code, and creating the artifact (generally
    a jar-file). Furthermore, if a recipe illustrates more than one approach, the
    source code is classified with various examples with roman letters (e.g., `Recipe_2_1_i`,
    `Recipe_2_1_ii`, `Recipe_2_1_iii`, etc.).


    ### Tip


    To build each application, go inside the Recipe directory (e.g., `ch2/recipe_2_1_i/`)
    and execute the `mvnw` command to compile the source code. Once the source code
    is compiled, a `target` subdirectory is created with the application executable.
    You can then run the application JAR from the command line (e.g., `java -jar target/Recipe_2_1_i.jar`).


    ## 1.1 Create a Spring Boot Application Using Maven


    ### Problem


    You want to start developing an application using Spring Boot and Maven.


    ### Solution


    Create a Maven build file, the `pom.xml`, and add the needed dependencies. To
    launch the application, create a Java class containing a `main` method to bootstrap
    the application.


    ### How It Works


    Suppose you are going to create a simple application that bootstraps a `SpringApplication`
    (the main entry point for a Spring Boot application), gets all the beans from
    the `ApplicationContext`, and outputs them to the console.


    #### Create the `pom.xml`


    Before you can start coding you need to create the `pom.xml` the file used by
    Maven to determine what needs to be done. The easiest way to use Spring Boot is
    by using the `spring-boot-starter-parent` as the `parent` for your application.


    ```

    org.springframework.boot

    spring-boot-starter-parent

    2.1.0.RELEASE

    ```


    Next you need to add some Spring dependencies to get started using Spring; for
    this, add the `spring-boot-starter` as a dependency to your `pom.xml`.


    ```

    org.springframework.boot

    spring-boot-starter

    ```


    Notice the fact that there is no version or other information needed; all this
    is managed because the `spring-boot-starter-parent` is used as the parent for
    the application. The `spring-boot-starter` will pull in all the core dependencies
    needed to start a very basic Spring Boot application, things like the Spring Framework,
    Logback for logging, and Spring Boot itself.


    The full `pom.xml` should now look like this.


    ```

    4.0.0

    com.apress.springbootrecipes

    chapter_1_1

    2.0.0


    org.springframework.boot

    spring-boot-starter-parent

    2.1.0.RELEASE


    org.springframework.boot

    spring-boot-starter

    ```


    #### Create the Application Class


    Let’s create a `DemoApplication` class with a `main` method. The `main` method
    calls `SpringApplication.run` with the `DemoApplication.class` and arguments from
    the main method. The `run` method returns an `ApplicationContext`, which is used
    to retrieve the bean names from `ApplicationContext`. The names are sorted and
    then printed to the console.


    The resulting class would look like the following:


    ```

    package com.apress.springbootrecipes.demo;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import java.util.Arrays;

    @Configuration

    @EnableAutoConfiguration

    @ComponentScan

    public class DemoApplication {

    public static void main(String[] args) {

    var ctx = SpringApplication.run(DemoApplication.class, args);

    System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

    var names = ctx.getBeanDefinitionNames();

    Arrays.sort(names);

    Arrays.asList(names).forEach(System.out::println);

    }

    }

    ```


    This class is a regular Java class with a `main` method. You can run this class
    from your IDE. When the application runs it will show output similar to Figure
    [1-1](#464036_1_En_1_Chapter.xhtml#Fig1).


    ![../images/464036_1_En_1_Chapter/464036_1_En_1_Fig1_HTML.jpg](images/464036_1_En_1_Chapter/464036_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Output of running application


    What did happen with the code and annotations? The `@Configuration` annotation
    makes this class a Spring Java configuration class. Generally when creating an
