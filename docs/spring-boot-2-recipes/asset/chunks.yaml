    为了让 Spring Security 在请求登录时显示你的自定义登录页面，你需要在 `loginPage` 配置方法中指定其 URL。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .formLogin().loginPage("/login");

    }

    }

    ```


    最后，添加一个视图解析器，将 `/login` 映射到 `login.html` 页面。为此，你可以让 `LibrarySecurityConfig` 实现
    `WebMvcConfigurer` 接口，并重写 `addViewControllers` 方法。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    ...

    public void addViewControllers(ViewControllerRegistry registry) {

    registry.addViewController("/login").setViewName("login");

    }

    }

    ```


    如果用户在请求安全 URL 时，Spring Security 显示了登录页面，那么登录成功后用户将被重定向到目标 URL。但是，如果用户直接通过其 URL
    请求登录页面，默认情况下，登录成功后用户将被重定向到上下文路径的根目录（即 `http://localhost:8080/`）。如果你没有在 Web 部署描述符中定义欢迎页面，你可能希望在登录成功时将用户重定向到一个默认的目标
    URL。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .formLogin().loginPage("/login").defaultSuccessUrl("/books");

    }

    }

    ```


    如果你使用 Spring Security 创建的默认登录页面，那么当登录失败时，Spring Security 会重新渲染登录页面并显示错误消息。但是，如果你指定了自定义登录页面，则必须配置
    `authentication-failure-url` 来指定登录错误时要重定向到的 URL。例如，你可以再次重定向到自定义登录页面，并附带错误请求参数。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .formLogin()

    .loginPage("/login.html")

    .defaultSuccessUrl("/books")

    .failureUrl("/login.html?error=true");

    }

    }

    ```


    然后，你的登录页面应检查是否存在 `error` 请求参数。如果发生错误，你需要通过访问会话范围属性 `SPRING_SECURITY_LAST_EXCEPTION`
    来显示错误消息，该属性存储了 Spring Security 为当前用户抛出的最后一个 `Exception`。


    ```

    ...


    认证失败

    原因：


    ```


    #### 注销服务


    注销服务提供了一个处理注销请求的处理器。它可以通过 `logout()` 配置方法进行配置。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .logout();

    }

    }

    ```


    默认情况下，它被映射到 URL `/logout`，并且仅响应 POST 请求。你可以在页面中添加一个小的 HTML 表单来执行注销操作。


    ```

    Logout

    ```


    ### 注意


    使用 CSRF 保护时，不要忘记在表单中添加 CSRF 令牌，否则注销将失败。


    默认情况下，注销成功后用户将被重定向到上下文路径的根目录，但有时你可能希望将用户引导到另一个 URL，这可以通过使用 `logoutSuccessUrl`
    配置方法来实现。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .logout().logoutSuccessUrl("/");

    }

    }

    ```


    注销后，你可能会注意到，即使注销成功，使用浏览器的后退按钮仍然可以看到之前的页面。这是因为浏览器缓存了这些页面。通过使用 `headers()` 配置方法启用安全标头，可以指示浏览器不要缓存页面。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .headers();

    }

    }

    ```


    除了无缓存标头之外，这还会禁用内容嗅探并启用 X-Frame 保护。启用此功能后，使用浏览器的后退按钮时，你将被重定向到登录页面。


    #### 匿名登录


    匿名登录服务可以通过 Java 配置中的 `anonymous()` 方法进行配置，你可以在其中自定义匿名用户的 `username` 和 `authorities`，其默认值分别为
    `anonymousUser` 和 `ROLE_ANONYMOUS`。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .anonymous().principal("guest").authorities("ROLE_GUEST");

    }

    }

    ```


    #### 记住我支持


    记住我功能可以通过 Java 配置中的 `rememberMe()` 方法进行配置。默认情况下，它将 `username`、`password`、记住我过期时间以及一个私钥编码为令牌，并将其作为
    cookie 存储在用户的浏览器中。下次用户访问同一个 Web 应用程序时，将检测到此令牌，从而使用户能够自动登录。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .and()

    .rememberMe();

    }

    }

    ```


    然而，静态的记住我令牌可能会引发安全问题，因为它们可能被黑客捕获。Spring Security 支持滚动令牌以满足更高级的安全需求，但这需要数据库来持久化令牌。有关滚动记住我令牌部署的详细信息，请参阅
    Spring Security 参考文档。


    ## 6.3 认证用户


    ### 问题


    当用户尝试登录你的应用程序以访问其安全资源时，你必须对用户的主体进行认证，并向该用户授予权限。

    '
- fmt: '### Solution


    在 Spring Security 中，认证由一个或多个`AuthenticationProvider`执行，它们以链的形式连接。如果其中任何一个提供者成功验证了用户，该用户将能够登录到应用程序。如果任何提供者报告用户被禁用、锁定或凭据不正确，或者没有提供者能够验证用户，那么该用户将无法登录此应用程序。


    Spring Security 支持多种用户认证方式，并为此提供了内置的提供者实现。你可以使用内置的 XML 元素轻松配置这些提供者。最常见的认证提供者会针对存储用户详细信息的用户仓库（例如，在应用程序内存、关系数据库或
    LDAP 仓库中）对用户进行认证。


    在仓库中存储用户详细信息时，应避免以明文形式存储用户密码，因为这会使它们容易受到黑客攻击。相反，你应该始终在仓库中存储加密后的密码。一种典型的密码加密方式是使用单向哈希函数对密码进行编码。当用户输入密码登录时，你对这个密码应用相同的哈希函数，并将结果与仓库中存储的密码进行比较。Spring
    Security 支持多种密码编码算法（包括 BCrypt 和 SCrypt），并为这些算法提供了内置的密码编码器。


    ### How It Works


    #### Authenticating Users with In-Memory Definitions


    如果你的应用程序中只有少量用户，并且很少修改他们的详细信息，你可以考虑在 Spring Security 的配置文件中定义用户详细信息，这样它们将被加载到应用程序的内存中。


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    UserDetails adminUser = User.withDefaultPasswordEncoder()

    .username("admin@books.io")

    .password("secret")

    .authorities("ADMIN","USER").build();

    UserDetails normalUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io")

    .password("user")

    .authorities("USER").build();

    UserDetails disabledUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io")

    .password("user")

    .disabled(true)

    .authorities("USER").build();

    auth.inMemoryAuthentication()

    .withUser(adminUser)

    .withUser(normalUser)

    .withUser(disabledUser);

    }

    }

    ```


    使用通过`User.withDefaultPasswordEncoder()`获得的`UserBuild`，你可以构建具有加密密码的用户。它将使用 Spring
    Security 默认的密码编码器（默认情况下使用 BCrypt 进行编码）。你可以使用`inMemoryAuthentication()`方法添加用户详细信息；使用`withUser`方法，你可以定义用户。对于每个用户，你可以指定`username`、`password`、禁用状态以及一组授予的`authorities`。被禁用的用户无法登录应用程序。


    #### Authenticating Users Against a Database


    更典型的情况是，用户详细信息应存储在数据库中以便于维护。Spring Security 内置了从数据库查询用户详细信息的支持。默认情况下，它使用以下 SQL
    语句查询用户详细信息（包括权限）：


    ```sql

    SELECT username, password, enabled

    FROM   users

    WHERE  username = ?

    SELECT username, authority

    FROM   authorities

    WHERE  username = ?

    ```


    为了让 Spring Security 使用这些 SQL 语句查询用户详细信息，你必须在数据库中创建相应的表。例如，你可以使用以下 SQL 语句在数据库中创建它们：


    ```sql

    CREATE TABLE USERS (

    USERNAME    VARCHAR(50)    NOT NULL,

    PASSWORD    VARCHAR(50)    NOT NULL,

    ENABLED     SMALLINT       NOT NULL,

    PRIMARY KEY (USERNAME)

    );

    CREATE TABLE AUTHORITIES (

    USERNAME    VARCHAR(50)    NOT NULL,

    AUTHORITY   VARCHAR(50)    NOT NULL,

    FOREIGN KEY (USERNAME) REFERENCES USERS

    );

    ```


    接下来，你可以向这些表中输入一些用户详细信息用于测试。这两个表的数据如表 6-3 和 6-4 所示。


    **表 6-3** USERS 表的测试用户数据


    | USERNAME | PASSWORD | ENABLED |

    | --- | --- | --- |

    | admin@books.io | {noop}secret | 1 |

    | marten@books.io | {noop}user | 1 |

    | jdoe@books.net | {noop}unknown | 0 |


    ### 注意


    密码字段中的`{noop}`表示未对存储的密码应用任何加密。Spring Security 使用委托来确定使用哪种编码方法；值可以是`{bcrypt}`、`{scrypt}`、`{pbkdf2}`和`{sha256}`。`{sha256}`主要用于兼容性原因，应被视为不安全。


    **表 6-4** AUTHORITIES 表的测试用户数据


    | USERNAME | AUTHORITY |

    | --- | --- |

    | admin@books.io | ADMIN |

    | admin@books.io | USER |

    | marten@books.io | USER |

    | jdoe@books.net | USER |


    为了让 Spring Security 访问这些表，你必须声明一个数据源，以便能够创建到此数据库的连接。


    对于 Java 配置，请使用`jdbcAuthentication()`配置方法并向其传递一个`DataSource`。通常，这将是 Spring Boot
    配置的`DataSource`，可以通过`spring.datasource`属性进行配置（有关更多详细信息，请参见 Recipe 7.1）。


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Autowired

    private DataSource dataSource;

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.jdbcAuthentication().dataSource(dataSource);

    }

    }

    ```


    然而，在某些情况下，你可能已经在遗留数据库中定义了自己的用户仓库。例如，假设表是使用以下 SQL 语句创建的，并且`MEMBER`表中的所有用户都具有启用状态：


    ```sql

    CREATE TABLE MEMBER (

    ID          BIGINT         NOT NULL,

    USERNAME    VARCHAR(50)    NOT NULL,

    PASSWORD    VARCHAR(32)    NOT NULL,

    PRIMARY KEY (ID)

    );

    CREATE TABLE MEMBER_ROLE (

    MEMBER_ID    BIGINT         NOT NULL,

    ROLE         VARCHAR(10)    NOT NULL,

    FOREIGN KEY (MEMBER_ID) REFERENCES MEMBER

    );

    ```


    假设你将这些表中的遗留用户数据存储为表 6-5 和 6-6 所示。


    **表 6-6** MEMBER_ROLE 表中的遗留用户数据


    | MEMBER_ID | ROLE |

    | --- | --- |

    | 1 | ROLE_ADMIN |

    | 1 | ROLE_USER |

    | 2 | ROLE_USER |


    **表 6-5** MEMBER 表中的遗留用户数据


    | ID | USERNAME | PASSWORD |

    | --- | --- | --- |

    | 1 | admin@ya2do.io | {noop}secret |

    | 2 | marten@ya2do.io | {noop}user |


    幸运的是，Spring Security 也支持使用自定义 SQL 语句从遗留数据库查询用户详细信息。你可以使用`usersByUsernameQuery()`和`authoritiesByUsernameQuery()`配置方法指定用于查询用户信息和权限的语句。


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.jdbcAuthentication()

    .dataSource(dataSource)

    .usersByUsernameQuery(

    "SELECT username, password, ''true'' as enabled " +

    "FROM member WHERE username = ?")

    .authoritiesByUsernameQuery(

    "SELECT member.username, member_role.role as authorities " +

    "FROM member, member_role " +

    "WHERE  member.username = ? AND member.id = member_role.member_id");

    }

    }

    ```


    #### Encrypting Passwords


    到目前为止，你一直在使用明文密码存储用户详细信息。但这种方法容易受到黑客攻击，因此你应该在存储密码之前对其进行加密。Spring Security 支持多种密码加密算法。例如，你可以选择
    BCrypt（一种单向哈希算法）来加密你的密码。'
  raw: '### Solution


    In Spring Security, authentication is performed by one or more `AuthenticationProvider`s
    , connected as a chain. If any of these providers authenticates a user successfully,
    that user will be able to log into the application. If any provider reports that
    the user is disabled or locked or that the credential is incorrect, or if no provider
    can authenticate the user, then the user will be unable to log into this application.


    Spring Security supports multiple ways of authenticating users and includes built-in
    provider implementations for them. You can easily configure these providers with
    the built-in XML elements. Most common authentication providers authenticate users
    against a user repository storing user details (e.g., in an application’s memory,
    a relational database, or an LDAP repository).


    When storing user details in a repository, you should avoid storing user passwords
    in clear text because that makes them vulnerable to hackers. Instead, you should
    always store encrypted passwords in your repository. A typical way of encrypting
    passwords is to use a one-way hash function to encode the passwords. When a user
    enters a password to log in, you apply the same hash function to this password
    and compare the result with the one stored in the repository. Spring Security
    supports several algorithms for encoding passwords (including BCrypt and SCrypt)
    and provides built-in password encoders for these algorithms.


    ### How It Works


    #### Authenticating Users with In-Memory Definitions


    If you have only a few users in your application and you seldom modify their details,
    you can consider defining the user details in Spring Security’s configuration
    file so that they will be loaded into your application’s memory.


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    UserDetails adminUser = User.withDefaultPasswordEncoder()

    .username("admin@books.io")

    .password("secret")

    .authorities("ADMIN","USER").build();

    UserDetails normalUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io")

    .password("user")

    .authorities("USER").build();

    UserDetails disabledUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io")

    .password("user")

    .disabled(true)

    .authorities("USER").build();

    auth.inMemoryAuthentication()

    .withUser(adminUser)

    .withUser(normalUser)

    .withUser(disabledUser);

    }

    }

    ```


    Using the `UserBuild`, obtained through `User.withDefaultPasswordEncoder()` ,
    you can construct users with encrypted passwords. It will use the Spring Security
    default password encoded (which by is by default encoding with BCrypt). You can
    add user details with the `inMemoryAuthentication()` method ; using the `withUser`
    method, you can define the users. For each user you can specify a `username`,
    a `password`, a disabled status, and a set of granted `authorities`. A disabled
    user cannot log into an application.


    #### Authenticating Users Against a Database


    More typically, user details should be stored in a database for easy maintenance.
    Spring Security has built-in support for querying user details from a database.
    By default, it queries user details, including authorities, with the following
    SQL statements:


    ```

    SELECT username, password, enabled

    FROM   users

    WHERE  username = ?

    SELECT username, authority

    FROM   authorities

    WHERE  username = ?

    ```


    In order for Spring Security to query user details with these SQL statements,
    you have to create the corresponding tables in your database. For example, you
    can create them in the database with the following SQL statements:


    ```

    CREATE TABLE USERS (

    USERNAME    VARCHAR(50)    NOT NULL,

    PASSWORD    VARCHAR(50)    NOT NULL,

    ENABLED     SMALLINT       NOT NULL,

    PRIMARY KEY (USERNAME)

    );

    CREATE TABLE AUTHORITIES (

    USERNAME    VARCHAR(50)    NOT NULL,

    AUTHORITY   VARCHAR(50)    NOT NULL,

    FOREIGN KEY (USERNAME) REFERENCES USERS

    );

    ```


    Next, you can input some user details into these tables for testing purposes.
    The data for these two tables is shown in Tables [6-3](#464036_1_En_6_Chapter.xhtml#Tab3)
    and [6-4](#464036_1_En_6_Chapter.xhtml#Tab4).


    Table 6-3


    Testing User Data for the USERS Table


    | USERNAME | PASSWORD | ENABLED |

    | --- | --- | --- |

    | admin@books.io | {noop}secret | 1 |

    | marten@books.io | {noop}user | 1 |

    | jdoe@books.net | {noop}unknown | 0 |


    ### Note


    The `{noop}` in the password field indicates that no encryption has been applied
    to the stored password. Spring Security uses delegation to determine which encoding
    method to use; values can be `{bcrypt}`, `{scrypt}`, `{pbkdf2}` and `{sha256}`.
    The `{sha256}` is mainly there for compatibility reasons and should be considered
    unsecure.


    Table 6-4


    Testing User Data for the AUTHORITIES Table


    | USERNAME | AUTHORITY |

    | --- | --- |

    | admin@books.io | ADMIN |

    | admin@books.io | USER |

    | marten@books.io | USER |

    | jdoe@books.net | USER |


    In order for Spring Security to access these tables, you have to declare a data
    source to be able to create connections to this database.


    For Java Config use the `jdbcAuthentication()` configuration method and pass it
    a `DataSource`. Generally this will be the Spring Boot-configured `DataSource`,
    which can be configured through the `spring.datasource` properties (see Recipe
    7.1 for more details).


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Autowired

    private DataSource dataSource;

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.jdbcAuthentication().dataSource(dataSource);

    }

    }

    ```


    However, in some cases you may already have your own user repository defined in
    a legacy database. For example, suppose that the tables are created with the following
    SQL statements, and that all users in the `MEMBER` table have the enabled status:


    ```

    CREATE TABLE MEMBER (

    ID          BIGINT         NOT NULL,

    USERNAME    VARCHAR(50)    NOT NULL,

    PASSWORD    VARCHAR(32)    NOT NULL,

    PRIMARY KEY (ID)

    );

    CREATE TABLE MEMBER_ROLE (

    MEMBER_ID    BIGINT         NOT NULL,

    ROLE         VARCHAR(10)    NOT NULL,

    FOREIGN KEY (MEMBER_ID) REFERENCES MEMBER

    );

    ```


    Suppose you have the legacy user data stored in these tables as shown in Tables
    [6-5](#464036_1_En_6_Chapter.xhtml#Tab5) and [6-6](#464036_1_En_6_Chapter.xhtml#Tab6).


    Table 6-6


    Legacy User Data in the MEMBER_ROLE Table


    | MEMBER_ID | ROLE |

    | --- | --- |

    | 1 | ROLE_ADMIN |

    | 1 | ROLE_USER |

    | 2 | ROLE_USER |


    Table 6-5


    Legacy User Data in the MEMBER Table


    | ID | USERNAME | PASSWORD |

    | --- | --- | --- |

    | 1 | admin@ya2do.io | {noop}secret |

    | 2 | marten@ya2do.io | {noop}user |


    Fortunately, Spring Security also supports using custom SQL statements to query
    a legacy database for user details. You can specify the statements for querying
    a user’s information and authorities using `usersByUsernameQuery()` and `authoritiesByUsernameQuery()`
    configuration methods.


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.jdbcAuthentication()

    .dataSource(dataSource)

    .usersByUsernameQuery(

    "SELECT username, password, ''true'' as enabled " +

    "FROM member WHERE username = ?")

    .authoritiesByUsernameQuery(

    "SELECT member.username, member_role.role as authorities " +

    "FROM member, member_role " +

    "WHERE  member.username = ? AND member.id = member_role.member_id");

    }

    }

    ```


    #### Encrypting Passwords


    Until now, you have been storing user details with clear-text passwords. But this
    approach is vulnerable to hacker attacks, so you should encrypt the passwords
    before storing them. Spring Security supports several algorithms for encrypting
    passwords. For example, you can choose BCrypt, a one-way hash algorithm, to encrypt
    your passwords.'
  trans: '

    ### 解决方案


    在 Spring Security 中，认证由一个或多个 `AuthenticationProvider` 执行，它们以链式结构连接。如果其中任何一个提供者成功验证了用户，该用户就能登录到应用程序。如果某个提供者报告用户被禁用、锁定或凭据不正确，或者没有任何提供者能够验证用户，那么该用户将无法登录此应用程序。


    Spring Security 支持多种用户认证方式，并为此提供了内置的提供者实现。你可以通过内置的 XML 元素轻松配置这些提供者。最常见的认证提供者会针对存储用户详细信息的用户仓库（例如，在应用程序内存、关系数据库或
    LDAP 仓库中）来验证用户。


    在仓库中存储用户详细信息时，应避免以明文形式存储用户密码，因为这会使它们容易受到黑客攻击。相反，你应该始终在仓库中存储加密后的密码。一种典型的密码加密方式是使用单向哈希函数对密码进行编码。当用户输入密码登录时，你对该密码应用相同的哈希函数，并将结果与仓库中存储的密码进行比较。Spring
    Security 支持多种密码编码算法（包括 BCrypt 和 SCrypt），并为这些算法提供了内置的密码编码器。


    ### 工作原理


    #### 使用内存定义进行用户认证


    如果你的应用程序中只有少量用户，并且很少修改他们的详细信息，你可以考虑在 Spring Security 的配置文件中定义用户详细信息，这样它们将被加载到应用程序的内存中。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    UserDetails adminUser = User.withDefaultPasswordEncoder()

    .username("admin@books.io")

    .password("secret")

    .authorities("ADMIN","USER").build();

    UserDetails normalUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io")

    .password("user")

    .authorities("USER").build();

    UserDetails disabledUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io")

    .password("user")

    .disabled(true)

    .authorities("USER").build();

    auth.inMemoryAuthentication()

    .withUser(adminUser)

    .withUser(normalUser)

    .withUser(disabledUser);

    }

    }

    ```


    使用通过 `User.withDefaultPasswordEncoder()` 获取的 `UserBuild`，你可以构建带有加密密码的用户。它将使用 Spring
    Security 默认的密码编码器（默认情况下使用 BCrypt 编码）。你可以通过 `inMemoryAuthentication()` 方法添加用户详细信息；使用
    `withUser` 方法，你可以定义用户。对于每个用户，你可以指定 `username`、`password`、禁用状态以及一组授予的 `authorities`。被禁用的用户无法登录应用程序。


    #### 针对数据库进行用户认证


    更常见的情况是，用户详细信息应存储在数据库中以便于维护。Spring Security 内置了从数据库查询用户详细信息的支持。默认情况下，它使用以下 SQL
    语句查询用户详细信息（包括权限）：


    ```

    SELECT username, password, enabled

    FROM   users

    WHERE  username = ?

    SELECT username, authority

    FROM   authorities

    WHERE  username = ?

    ```


    为了让 Spring Security 使用这些 SQL 语句查询用户详细信息，你必须在数据库中创建相应的表。例如，你可以使用以下 SQL 语句在数据库中创建它们：


    ```

    CREATE TABLE USERS (

    USERNAME    VARCHAR(50)    NOT NULL,

    PASSWORD    VARCHAR(50)    NOT NULL,

    ENABLED     SMALLINT       NOT NULL,

    PRIMARY KEY (USERNAME)

    );

    CREATE TABLE AUTHORITIES (

    USERNAME    VARCHAR(50)    NOT NULL,

    AUTHORITY   VARCHAR(50)    NOT NULL,

    FOREIGN KEY (USERNAME) REFERENCES USERS

    );

    ```


    接下来，你可以向这些表中输入一些用户详细信息用于测试。这两个表的数据如表 6-3 和表 6-4 所示。


    表 6-3


    USERS 表的测试用户数据


    | USERNAME | PASSWORD | ENABLED |

    | --- | --- | --- |

    | admin@books.io | {noop}secret | 1 |

    | marten@books.io | {noop}user | 1 |

    | jdoe@books.net | {noop}unknown | 0 |


    ### 注意


    密码字段中的 `{noop}` 表示存储的密码未应用任何加密。Spring Security 使用委托来确定使用哪种编码方法；值可以是 `{bcrypt}`、`{scrypt}`、`{pbkdf2}`
    和 `{sha256}`。`{sha256}` 主要用于兼容性考虑，应视为不安全。


    表 6-4


    AUTHORITIES 表的测试用户数据


    | USERNAME | AUTHORITY |

    | --- | --- |

    | admin@books.io | ADMIN |

    | admin@books.io | USER |

    | marten@books.io | USER |

    | jdoe@books.net | USER |


    为了让 Spring Security 访问这些表，你必须声明一个数据源，以便能够创建到该数据库的连接。


    对于 Java 配置，使用 `jdbcAuthentication()` 配置方法并向其传递一个 `DataSource`。通常，这将是 Spring Boot
    配置的 `DataSource`，可以通过 `spring.datasource` 属性进行配置（更多详情请参见配方 7.1）。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Autowired

    private DataSource dataSource;

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.jdbcAuthentication().dataSource(dataSource);

    }

    }

    ```


    然而，在某些情况下，你可能已经在遗留数据库中定义了自己的用户仓库。例如，假设表是使用以下 SQL 语句创建的，并且 `MEMBER` 表中的所有用户都处于启用状态：


    ```

    CREATE TABLE MEMBER (

    ID          BIGINT         NOT NULL,

    USERNAME    VARCHAR(50)    NOT NULL,

    PASSWORD    VARCHAR(32)    NOT NULL,

    PRIMARY KEY (ID)

    );

    CREATE TABLE MEMBER_ROLE (

    MEMBER_ID    BIGINT         NOT NULL,

    ROLE         VARCHAR(10)    NOT NULL,

    FOREIGN KEY (MEMBER_ID) REFERENCES MEMBER

    );

    ```


    假设这些表中存储的遗留用户数据如表 6-5 和表 6-6 所示。


    表 6-6


    MEMBER_ROLE 表中的遗留用户数据


    | MEMBER_ID | ROLE |

    | --- | --- |

    | 1 | ROLE_ADMIN |

    | 1 | ROLE_USER |

    | 2 | ROLE_USER |


    表 6-5


    MEMBER 表中的遗留用户数据


    | ID | USERNAME | PASSWORD |

    | --- | --- | --- |

    | 1 | admin@ya2do.io | {noop}secret |

    | 2 | marten@ya2do.io | {noop}user |


    幸运的是，Spring Security 也支持使用自定义 SQL 语句从遗留数据库查询用户详细信息。你可以使用 `usersByUsernameQuery()`
    和 `authoritiesByUsernameQuery()` 配置方法来指定查询用户信息和权限的语句。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    @Override

    protected void configure(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.jdbcAuthentication()

    .dataSource(dataSource)

    .usersByUsernameQuery(

    "SELECT username, password, ''true'' as enabled " +

    "FROM member WHERE username = ?")

    .authoritiesByUsernameQuery(

    "SELECT member.username, member_role.role as authorities " +

    "FROM member, member_role " +

    "WHERE  member.username = ? AND member.id = member_role.member_id");

    }

    }

    ```


    #### 加密密码


    到目前为止，你一直在以明文密码存储用户详细信息。但这种方法容易受到黑客攻击，因此你应该在存储密码之前对其进行加密。Spring Security 支持多种密码加密算法。例如，你可以选择
    BCrypt（一种单向哈希算法）来加密你的密码。

    '
- fmt: '### Note


    You may need a helper to calculate BCrypt hashes for your passwords. You can do
    this online through, for example, [`www.browserling.com/tools/bcrypt`](http://www.browserling.com/tools/bcrypt),
    or you can simply create a class with a `main` method that uses Spring Security’s
    `BCryptPasswordEncoder`.


    Of course, you have to store the encrypted passwords in the database tables instead
    of the clear-text passwords, as shown in Table [6-7](#464036_1_En_6_Chapter.xhtml#Tab7).
    To store BCrypt hashes in the password field, the length of the field has to be
    at least 68 chars long (that is the length of the BCrypt hash + the encryption
    type `{bcrypt}`).


    **Table 6-7** Testing User Data with Encrypted Passwords for the USERS Table


    | USERNAME | PASSWORD | ENABLED |

    | --- | --- | --- |

    | admin@ya2do.io | `{bcrypt}$2a$10$E3mPTZb50e7sSW15fDx8Ne7hDZpfDjrmMPTTUp8wVjLTu.G5oPYCO`
    | 1 |

    | marten@ya2do.io | `{bcrypt}$2a$10$5VWqjwoMYnFRTTmbWCRZT.iY3WW8ny27kQuUL9yPK1/WJcPcBLFWO`
    | 1 |

    | jdoe@does.net | `{bcrypt}$2a$10$cFKh0.XCUOA9L.in5smIiO2QIOT8.6ufQSwIIC.AVz26WctxhSWC6`
    | 0 |


    ## 6.4 Making Access Control Decisions


    ### Problem


    In the authentication process, an application will grant a successfully authenticated
    user a set of authorities. When this user attempts to access a resource in the
    application, the application has to decide whether the resource is accessible
    with the granted authorities or other characteristics.


    ### Solution


    The decision on whether a user is allowed to access a resource in an application
    is called an access control decision. It is made based on the user’s authentication
    status, and the resource’s nature and access attributes.


    ### How It Works


    With Spring Security it is possible to use Spring Expression Language (SpEL) to
    create powerful access control rules. Spring Security supports a couple of expressions
    out of the box (see Table [6-8](#464036_1_En_6_Chapter.xhtml#Tab8) for a list).
    Using constructs like `and`, `or`, and `not` one can create very powerful and
    flexible expressions.


    **Table 6-8** Spring Security Built-in Expressions


    | Expression | Description |

    | --- | --- |

    | `hasRole(''role'')` or `hasAuthority(''authority'')` | Returns true if the current
    user has the given role |

    | `hasAnyRole(''role1'',''role2'')` / `hasAnyAuthority(''auth1'',''auth2'')` |
    Returns true if the current user has at least one of the given roles |

    | `hasIpAddress(''ip-address'')` | Returns true if the current user has the given
    ip-address |

    | `principal` | The current user |

    | `Authentication` | Access to the Spring Security authentication object |

    | `permitAll` | Always evaluates to true |

    | `denyAll` | Always evaluates to false |

    | `isAnonymous()` | Returns true if the current user is anonymous |

    | `isRememberMe()` | Returns true if the current user logged in by the means of
    remember-me functionality |

    | `isAuthenticated()` | Returns true if this is not an anonymous user |

    | `isFullyAuthenticated()` | Returns true if the user is not an anonymous or a
    remember-me user |


    ### Caution


    Although role and authority are almost the same, there is a slight, but important,
    difference in how they are processed. When using `hasRole` the passed in value
    for the role will be checked if it starts with `ROLE_` (the default role prefix);
    if not, this will be added before checking the authority. So `hasRole(''ADMIN'')`
    will actually check if the current user has the authority `ROLE_ADMIN`. When using
    `hasAuthority` it will check the value as is.


    The following expression would give access to deletion of a book if someone had
    the ADMIN role or was logged in on the local machine. Writing such an expression
    can be done through the `access` method instead of one of the `has*` methods when
    defining a matcher.


    ```java

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .authorizeRequests()

    .antMatchers(HttpMethod.GET, "/books*").hasAnyRole("USER", "GUEST")

    .antMatchers(HttpMethod.POST, "/books*").hasRole("USER")

    .antMatchers(HttpMethod.DELETE, "/books*")

    .access("hasRole(''ROLE_ADMIN'') or hasIpAddress(''127.0.0.1'') " +

    "or hasIpAddress(''0:0:0:0:0:0:0:1'')")

    ...

    }

    }

    ```


    #### Using Expression to Make Access Control Decisions Using Spring Beans


    Using the `@` syntax in the expression, you can call any bean in the application
    context. So you could write an expression like `@accessChecker.hasLocalAccess(authentication)`
    and provide a bean named `accessChecker`, which has a `hasLocalAccess` method
    that takes an `Authentication` object.


    ```java

    package com.apress.springbootrecipes.library.security;

    import org.springframework.security.core.Authentication;

    import org.springframework.security.web.authentication.WebAuthenticationDetails;

    @Component

    public class AccessChecker {

    public boolean hasLocalAccess(Authentication authentication) {

    boolean access = false;

    if (authentication.getDetails() instanceof WebAuthenticationDetails) {

    WebAuthenticationDetails details =

    (WebAuthenticationDetails) authentication.getDetails();

    String address = details.getRemoteAddress();

    access = address.equals("127.0.0.1") ||

    address.equals("0:0:0:0:0:0:0:1");

    }

    return access;

    }

    }

    ```


    The `AccessChecker` does the same checks as the earlier written custom expression
    handler but doesn’t extend the Spring Security classes.


    ```java

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.authorizeRequests()

    .antMatchers(HttpMethod,POST, "/books*").hasAuthority("USER")

    .antMatchers(HttpMethod.DELETE, "/books*")

    .access("hasAuthority(''ADMIN'') " +

    "or @accessChecker.hasLocalAccess(authentication)");

    ...

    }

    ```


    #### Securing Methods with Annotations and Expressions


    You can use the `@PreAuthorize` and `@PostAuthorize` annotations to secure method
    invocations instead of only securing URLs. The `@PreAuthorize` is checked before
    the method is invoked and `@PostAuthorize` after the method invocation and could
    be used to do security checks on the returned value. With those you can write
    security-based expressions just as with the URL-based security. To enable the
    annotation processing, add the `@EnableGlobalMethodSecurity` annotation to the
    security configuration and set the `prePostEnabled` attribute to `true`.


    ```java

    @Configuration

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter { ...
    }

    ```


    Now you can use the `@PreAuthorize` annotation to secure your application.


    ```java

    package com.apress.springbootrecipes.library;

    import org.springframework.security.access.prepost.PreAuthorize;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    @Override

    @PreAuthorize("isAuthenticated()")

    public Iterable findAll() {

    return books.values();

    }

    @Override

    @PreAuthorize("hasAuthority(''USER'')")

    public Book create(Book book) {

    books.put(book.getIsbn(), book);

    return book;

    }

    @Override

    @PreAuthorize("hasAuthority(''ADMIN'') or @accessChecker.hasLocalAccess(authentication)")

    public void remove(Book book) {

    books.remove(book.getIsbn());

    }

    @Override

    @PreAuthorize("isAuthenticated()")

    public Optional find(String isbn) {

    return Optional.ofNullable(books.get(isbn));

    }

    }

    ```


    The `@PreAuthorize` annotation will trigger Spring Security to validate expression
    in there. If it is successful, then access is granted, else an exception will
    be thrown and indicated to the user that he doesn’t have access.


    ## 6.5 Adding Security to a WebFlux Application


    ### Problem


    You have an application built with Spring Web Flux (see Chapter [5](#464036_1_En_5_Chapter.xhtml))
    and you want to secure it using Spring Security.'
  raw: '### Note


    You may need a helper to calculate BCypt hashes for your passwords. You can do
    this online through, for example, [`www.browserling.com/tools/bcrypt`](http://www.browserling.com/tools/bcrypt)
    , or you can simply create a class with a `main` method that uses Spring Security’s
    `BCryptPasswordEncoder`.


    Of course, you have to store the encrypted passwords in the database tables instead
    of the clear-text passwords, as shown in Table [6-7](#464036_1_En_6_Chapter.xhtml#Tab7).
    To store BCrypt hashes in the password field, the length of the field has to be
    at least 68 chars long (that is the length of the BCrypt hash + the encryption
    type `{bcrypt}`).


