    ### 警告


    Spring Boot 会添加一个默认用户，名为 `user`，并附带一个随机生成的密码，该密码可在启动日志中查看。这仅用于测试、原型开发或演示；请勿在生产系统中使用生成的用户！


    当将依赖 `spring-boot-starter-security` 添加到配方 3.2 时，它会自动保护所有暴露的端点。启动时，生成的密码会被记录（图
    6-1）。


    表 6-1


    默认用户的属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.security.user.name` | 默认用户名，默认为 `user` |

    | `spring.security.user.password` | 默认用户的密码，默认为生成的 `UUID` |

    | `spring.security.user.roles` | 默认用户的角色。默认为空 |


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig1_HTML.jpg](img/464036_1_En_6_Fig1_HTML.jpg)


    图 6-1


    生成的密码输出


    Spring Boot 暴露了一些用于配置默认用户的属性；这些属性可以在 `spring.security` 命名空间中找到（表 6-1）。


    添加依赖并启动 `LibraryApplication` 后，端点将被保护。当尝试从 `http://localhost:8080/books` 获取书籍列表时，结果将是一个
    HTTP 状态码为 401（未授权）的响应（图 6-2）。


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig2_HTML.jpg](img/464036_1_En_6_Fig2_HTML.jpg)


    图 6-2


    未认证的访问结果


    当添加正确的认证头（用户名 `user`，密码来自日志或 `spring.security.user.password` 属性中指定的值）时，结果将是常规的书籍列表（图
    6-3）。


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig3_HTML.jpg](img/464036_1_En_6_Fig3_HTML.jpg)


    图 6-3


    已认证的访问结果


    #### 测试安全性


    当使用 Spring Security 保护端点并结合 `@WebMvcTest` 时，安全基础设施将自动应用。Spring Security 提供了一些有用的注解来帮助编写测试（表
    6-2）。


    ### 注意


    如果你想在没有安全性的情况下测试控制器，可以通过将 `@WebMvcTest` 上的 `secure` 属性设置为 `false` 来禁用安全性；其默认值为
    `true`。


    表 6-2


    用于测试的 Spring Security 注解


    | 注解 | 描述 |

    | --- | --- |

    | `@WithMockUser` | 以具有给定 `username`、`password` 和 `roles`/`authorities` 的用户身份运行
    |

    | `@WithAnonymousUser` | 以匿名用户身份运行 |

    | `@WithUserDetails` | 以配置了名称的用户身份运行，会在 `UserDetailsService` 中进行查找 |


    要使用这些注解，必须添加对 `spring-security-test` 的依赖。


    ```

    org.springframework.security

    spring-security-test

    test


    ```


    有了这个依赖，就可以扩展并修复来自配方 3.2 的 `BookControllerTest`。如果你不介意在测试中禁用安全性，可以在测试类上添加 `@WebMvcTest`
    `(value = BookController.class, secure = false)`。这样，安全过滤器就不会被添加，从而禁用安全性。测试将运行并通过。


    ```

    @RunWith(SpringRunner.class)

    @WebMvcTest(value = BookController.class, secure = false)

    public class BookControllerUnsecuredTest { ... }

    ```


    然而，如果你想在启用安全性的情况下进行测试，就需要对测试类做一些小的修改。首先，添加 `@WithMockUser` 以使用已认证的用户运行。其次，由于 Spring
    Security 默认启用了 CSRF^(²⁶) 保护，因此需要在请求中添加一个头或参数。当使用 Mock MVC 时，Spring Security 为此提供了一个
    `RequestPostProcessor`，即 `CsrfRequestPostProcessor`。`SecurityMockMvcRequestPostProcessors`
    包含了一些工厂方法，可以方便地使用它们。


    ```

    @RunWith(SpringRunner.class)

    @WebMvcTest(BookController.class)

    @WithMockUser

    public class BookControllerSecuredTest {

    @Test

    public void shouldAddBook() throws Exception {

    when(bookService.create(any(Book.class))).thenReturn(new Book("123456789", "Test
    Book Stored", "T. Author"));

    mockMvc.perform(post("/books")

    .contentType(MediaType.APPLICATION_JSON)

    .content("{ \"isbn\" : \"123456789\"}, \"title\" : \"Test Book\", \"authors\"
    : [\"T. Author\"]")

    .with(csrf()))

    .andExpect(status().isCreated())

    .andExpect(header()

    .string("Location", "http://localhost/books/123456789"));

    }

    }

    ```


    现在，测试使用了 `@WithMockUser` 中指定的用户；这里使用了默认用户，用户名为 `user`，密码为 `password`。`with(csrf())`
    这一行负责将 CSRF 令牌添加到请求中。


    使用哪个选项取决于你的需求。例如，如果在控制器中需要当前用户，那么应该启用安全性，并使用 `@WithMockUser` 或 `@WithUserDetails`。如果不是这种情况，并且你可以在没有安全性的情况下测试控制器（并且你没有额外的安全规则
    [参见配方 6.2]），那么你可以在禁用安全性的情况下运行。


    #### 集成测试安全性


    当使用 `@SpringBootTest` 编写集成测试时，能否使用 `@With*` 注解取决于具体情况。使用默认的模拟环境时，它仍然可以工作。


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest

    @WithMockUser

    @AutoConfigureMockMvc

    public class BookControllerIntegrationMockTest { ... }

    ```


    这个测试将创建一个几乎完整的应用程序，但仍然使用 Mock MVC 来访问端点。它仍然在与测试相同的进程中运行，这就是为什么 `@WithMockUser`
    和 `with(csrf())` 仍然有效的原因。当在外部端口上运行测试时，它将不再有效。


    要在某个端口上测试应用程序，你需要通过测试客户端 `TestRestTemplate` 和/或 `WebTestClient` 运行测试，并传递认证头，或者通过在集成测试中首先执行基于表单的登录来实现流程。要编写一个成功的集成测试，请注入
    `TestRestTemplate`，并在执行实际请求之前使用 `withBasicAuth` 辅助方法来设置基本认证头。

