    \    }\n}\n```\n\nNow you can launch the server and handle WebSockets with WebFlux.\n\
    \n#### HTML & JavaScript Echo Client\n\nNow that the server is ready, we need\
    \ a client to connect to our WebSocket endpoint. For this you will need some JavaScript\
    \ and HTML. Write the following `app.js` and place it in the `src/main/resources/static`\
    \ directory.\n\n```\nvar ws = null;\nvar url = \"ws://localhost:8080/echo\";\n\
