- fmt: "### Caution\n\nAlthough role and authority are almost the same, there is a\
    \ slight, but important, difference in how they are processed. When using `hasRole`\
    \ the passed in value for the role will be checked if it starts with `ROLE` (the\
    \ default role prefix); if not, this will be added before checking the authority.\
    \ So `hasRole('ADMIN')` will actually check if the current user has the authority\
    \ `ROLE_ADMIN`. When using `hasAuthority` it will check the value as is.\n\n```\n\
    @Bean\nSecurityWebFilterChain springWebFilterChain(HttpSecurity http) throws Exception\
    \ {\nreturn http\n.authorizeExchange()\n.pathMatchers(\"/\").permitAll()\n.pathMatchers(\"\
    /orders*\").access(this::ordersAllowed)\n.anyExchange().authenticated()\n.and()\n\
    .build();\n}\nprivate Mono ordersAllowed(Mono authentication, AuthorizationContext\
    \ context) {\nreturn authentication\n.map( a.getAuthorities()\n.contains(new SimpleGrantedAuthority(\"\
    ROLE_ADMIN\")))\n.map( AuthorizationDecision::new);\n}\n```\n\nThe `access()`\
    \ expression can be used to write a very powerful expression. The preceding snippet\
    \ allows access if the current user has the `ROLE_ADMIN` authority. The `Authentication`\
    \ contains the collection of `GrantedAuthorities`, which you can check for the\
    \ `ROLE_ADMIN`. Of course you can write as many complex expressions as you like:\
    \ you could check for the ip-address, request headers, etc.\n\n## 6.6 Summary\n\
    \nIn this chapter you learned how to secure Spring Boot applications with Spring\
    \ Security. It can be used to secure any Java application, but it’s mostly used\
    \ for web-based applications. The concepts of authentication, authorization, and\
    \ access control are essential in the security area, so you should have a clear\
    \ understanding of them.\n\nYou often have to secure critical URLs by preventing\
    \ unauthorized access to them. Spring Security can help you to achieve this in\
    \ a declarative way. It handles security by applying servlet filters, which can\
    \ be configured with simple Java-based configuration. Spring Security will automatically\
    \ configure the basic security services for you and tries to be as secure as possible\
    \ by default.\n\nSpring Security supports multiple ways for users to log into\
    \ a web application, such as form-based login and HTTP Basic authentication. It\
    \ also provides an anonymous login service that allows you to handle an anonymous\
    \ user just like a normal user. Remember-me support allows an application to remember\
    \ a user’s identity across multiple browser sessions.\n\nSpring Security supports\
    \ multiple ways of authenticating users and has built-in provider implementations\
    \ for them. For example, it supports authenticating users against in-memory definitions,\
    \ a relational database, and an LDAP repository. You should always store encrypted\
    \ passwords in your user repository, because clear-text passwords are vulnerable\
    \ to hacker attacks. Spring Security also supports caching user details locally\
    \ to save you the overhead of performing remote queries.\n\nDecisions on whether\
    \ a user is allowed to access a given resource are made by access decision managers.\
    \ Spring Security comes with three access decision managers that are based on\
    \ the voting approach. All of them require a group of voters to be configured\
    \ for voting on access control decisions.\n\nSpring Security enables you to secure\
    \ method invocations in a declarative way using the `@PreAuthorize` and `@PostAuthorize`\
    \ annotations.\n\nSpring Security also has support for securing Spring WebFlux-based\
    \ applications. In the last recipe, you explored how you could add security to\
    \ such an application.\n\nFootnotes [1](#464036_1_En_6_Chapter.xhtml#Fn1_source)\
    \ [2](#464036_1_En_6_Chapter.xhtml#Fn2_source)\n\n# 7. Data Access\n\nWhen working\
    \ with a database the first thing you need is a connection to the database. A\
    \ connection in Java is obtained through a `javax.sql.DataSource`. Spring provides\
    \ out-of-the-box several implementations of a `DataSource` like the `DriverManagerDataSource`\
    \ and `SimpleDriverDataSource`. However, these implementations aren’t connections\
    \ pool and should be considered mainly for testing but not production use. For\
    \ a live system, you want to use a proper connection pool like HikariCP.^([^(27)](#fn27))\n\
    \n### Tip\n\nIn the `db` folder there is a `Dockerfile` that will build a PostgreSQL^([^(28)](#fn28))\
    \ with the database automatically created. Build it using `docker build -t sb2r-postgres`.\
    \ You can then run it using `docker run -p 5432:5432 -it sb2r-postgres`.\n\n##\
    \ 7.1 Configuring a DataSource\n\n### Problem\n\nYou need access to a database\
    \ from your application.\n\n### Solution\n\nUse the `spring.datasource.url`, `spring.datasource.username`,\
    \ and `spring.datasource.password` properties to let Spring Boot configure a `DataSource`.\n\
    \n### How It Works\n\nTo configure a `DataSource`, Spring Boot requires the presence\
    \ of a connection pool or an embedded database like H2, HSQLDB, or Derby. Spring\
    \ Boot automatically detects HikariCP, Tomcat JDBC, and Commons DBCP2-based connection\
    \ pools (in that order). To use the connection pool, configure the `spring.datasource.url`,\
    \ `spring.datasource.username`, and `spring.datasource.password` properties. The\
    \ JDBC support can be enabled by adding the `spring-boot-starter-jdbc` dependency.\
    \ This will pull in all required dependencies to work with JDBC.\n\n```\n<dependency>\n\
    \    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-jdbc</artifactId>\n\
    </dependency>\n```\n\nDependencies included are `spring-jdbc`, `spring-tx`, and\
    \ HikariCP as the default connection pool.\n\n#### Use an Embedded `DataSource`\n\
    \nWhen Spring Boot detects the presence of H2, HSQLDB, or Derby it will by default\
    \ start an embedded database using the detected embedded implementation. This\
    \ is very useful when writing a test or preparing a demonstration for a business.\
    \ Letting Spring Boot create this is a simple matter of including the desired\
    \ dependency.\n\n```\n<dependency>\n    <groupId>org.apache.derby</groupId>\n\
    \    <artifactId>derby</artifactId>\n    <scope>runtime</scope>\n</dependency>\n\
    ```\n\nSpring Boot will now detect Derby and bootstrap an embedded `DataSource`.\
    \ Let’s write an application that lists the tables in the database.\n\n```\npackage\
    \ com.apress.springboot2recipes.jdbc;\n\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
    import org.springframework.boot.ApplicationArguments;\nimport org.springframework.boot.ApplicationRunner;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.stereotype.Component;\n\nimport javax.sql.DataSource;\n\
    \n@SpringBootApplication\npublic class JdbcApplication {\n\n    public static\
    \ void main(String[] args) {\n        SpringApplication.run(JdbcApplication.class,\
    \ args);\n    }\n}\n\n@Component\nclass TableLister implements ApplicationRunner\
    \ {\n\n    private final Logger logger = LoggerFactory.getLogger(getClass());\n\
    \    private final DataSource dataSource;\n\n    TableLister(DataSource dataSource)\
    \ {\n        this.dataSource = dataSource;\n    }\n\n    @Override\n    public\
    \ void run(ApplicationArguments args) throws Exception {\n        try (var con\
    \ = dataSource.getConnection();\n             var rs = con.getMetaData().getTables(null,\
    \ null, \"%\", null)) {\n            while (rs.next()) {\n                logger.info(\"\
    {}\", rs.getString(3));\n            }\n        }\n    }\n}\n```\n\nWhen the application\
    \ runs, it will create an instance of the `TableLister` and the instance will\
    \ receive the configured `DataSource`. Spring Boot will then detect the fact it\
    \ is an `ApplicationRunner` and will call the `run` method. The `run` method obtains\
    \ a `Connection` from the `DataSource` and uses the `DatabaseMetaData` (from JDBC)\
    \ to obtain the tables in the database. Now when running the application it should\
    \ display output similar to that as in Figure [7-1](#464036_1_En_7_Chapter.xhtml#Fig1).\n\
    \n![../images/464036_1_En_7_Chapter/464036_1_En_7_Fig1_HTML.jpg](images/464036_1_En_7_Chapter/464036_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\n\nTableLister output for Derby"
