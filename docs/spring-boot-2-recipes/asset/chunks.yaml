    #### 使用 **@Bean** 方法


    除了自动检测组件，你还可以使用工厂方法来创建 Bean。当你希望或需要对 Bean 的构造过程拥有更多控制权时，这种方法非常有用。工厂方法是一个使用 `@Bean`^(⁶)
    注解的方法，它将被用于在应用上下文中注册一个 Bean。该 Bean 的名称与方法名相同。该方法可以包含参数，这些参数将被解析为应用上下文中的其他 Bean。


    让我们创建一个能够对整数进行基本计算的应用。首先，编写 `Calculator` 类；它将在构造函数中接收一个 `Operation` Bean 的集合。`Operation`
    是一个接口，其不同的实现将负责执行实际的计算。


    ```

    package com.apress.springbootrecipes.calculator;

    import java.util.Collection;

    public class Calculator {

    private final Collection operations;

    public Calculator(Collection operations) {

    this.operations = operations;

    }

    public void calculate(int lhs, int rhs, char op) {

    for (var operation : operations) {

    if (operation.handles(op)) {

    var result = operation.apply(lhs, rhs);

    System.out.printf("%d %s %d = %s%n", lhs, op, rhs, result);

    return;

    }

    }

    throw new IllegalArgumentException("Unknown operation " + op);

    }

    }

    ```


    在 `calculate` 方法中，通过 `Operation.handles` 方法检测正确的 `Operation`；找到后，调用 `Operation.apply`
    方法执行实际计算。如果传入的计算器无法处理的操作，则会抛出异常。


    `Operation` 接口是一个简单的接口，包含前面提到的两个方法。


    ```

    package com.apress.springbootrecipes.calculator;

    public interface Operation {

    int apply(int lhs, int rhs);

    boolean handles(char op);

    }

    ```


    现在，让我们添加两个操作：一个用于加法，一个用于乘法。


    ```

    package com.apress.springbootrecipes.calculator.operation;

    import com.apress.springbootrecipes.calculator.Operation;

    import org.springframework.stereotype.Component;

    @Component

    class Addition implements Operation {

    @Override

    public int apply(int lhs, int rhs) {

    return lhs + rhs;

    }

    @Override

    public boolean handles(char op) {

    return ''+'' == op;

    }

    }

    package com.apress.springbootrecipes.calculator.operation;

    import com.apress.springbootrecipes.calculator.Operation;

    import org.springframework.stereotype.Component;

    @Component

    class Multiplication implements Operation {

    @Override

    public int apply(int lhs, int rhs) {

    return lhs * rhs;

    }

    @Override

    public boolean handles(char op) {

    return ''*'' == op;

    }

    }

    ```


    这些就是我们制作一个能够进行加法和乘法运算，并且仍然具有可扩展机制的计算器所需的所有组件。


    最后，让我们创建一个配置并使用 `Calculator` 的应用。要创建 `Calculator` 的实例，需要一个 `@Bean` 方法。此方法可以添加到使用
    `@SpringBootApplication` 或常规 `@Configuration` 注解的类中。


    ```

    package com.apress.springbootrecipes.calculator;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import java.util.Collection;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    var ctx = SpringApplication.run(CalculatorApplication.class, args);

    var calculator = ctx.getBean(Calculator.class);

    calculator.calculate(137, 21, ''+'');

    calculator.calculate(137, 21, ''*'');

    calculator.calculate(137, 21, ''-'');

    }

    @Bean

    public Calculator calculator(Collection operations) {

    return new Calculator(operations);

    }

    }

    ```


    `calculator` 工厂方法接收一个 `List<Operation>`，我们用它来构造 `Calculator`。当在 `@Bean` 注解的方法中使用参数时，这些参数会被自动解析；并且当注入一个集合时，Spring
    会自动检测所需 Bean 的所有实例，并使用它们来调用 `calculator` 工厂方法。


    在 `main` 方法中，我们获取 `Calculator` 并使用不同的数字和操作调用其 `calculate` 方法。前两个操作会正常向控制台输出一些结果；最后一个操作会抛出异常，因为没有合适的操作来执行减法。


    尽管你为 `Calculator` 创建了一个工厂方法，但这实际上并非必需。当使用 `@Component` 注解 `Calculator` 时，Spring
    会自动检测到它。该类中的唯一构造函数将被用于构造它。如果有多个构造函数，请使用 `@Autowired` 注解要使用的那一个。


    这段代码的另一个不太好的地方是手动获取 Bean，这可以被视为一种不良实践；通常你应该使用依赖注入。Spring Boot 有一个 `ApplicationRunner`
    接口，可用于在应用启动后运行一些代码。当 Spring Boot 检测到类型为 `ApplicationRunner` 的 Bean 时，它会在应用启动后立即调用其
    `run` 方法。


    ```

    package com.apress.springbootrecipes.calculator;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    SpringApplication.run(CalculatorApplication.class, args);

    }

    @Bean

    public ApplicationRunner calculationRunner(Calculator calculator) {

    return args -> {

    calculator.calculate(137, 21, ''+'');

    calculator.calculate(137, 21, ''*'');

    calculator.calculate(137, 21, ''-'');

    };

    }

    }

    ```


    创建 `Calculator` 的方法已被替换为 `ApplicationRunner`。这个 `ApplicationRunner` 接收自动配置好的 `Calculator`，并对其执行一些操作。运行此类时，输出应与之前相同。主要区别和优势在于，不再需要手动从
    `ApplicationContext` 获取 Bean，因为 Spring 会负责获取正确的 Bean。


    ## 2.2 外部化属性


    ### 问题


    你希望使用属性来为不同环境或执行场景配置你的应用。


    ### 解决方案


    默认情况下，Spring Boot 支持从多个位置获取属性。默认情况下，它会加载名为 `application.properties` 的文件，并使用环境变量和
    Java 系统属性。当从命令行运行时，它还会考虑命令行参数。根据应用类型和可用功能（例如 JNDI），还会考虑更多位置。^(⁷) 对于我们的应用，将按给定顺序考虑以下资源。


    1.  命令行参数

    2.  打包应用外部的 `application.properties`

    3.  打包在应用内部的 `application.properties`


    除此之外，对于选项 2 和 3，你还可以根据激活的配置文件加载特定于配置文件的属性。要激活的配置文件可以通过 `spring.profiles.active`
    属性传递。特定于配置文件的 `application-{profile}.properties` 优先级高于非特定于配置文件的属性。每个文件都会被加载，并且你可以通过这种方式覆盖属性，这使得列表变得更长一些。


    1.  命令行参数

    2.  打包应用外部的 `application-{profile}.properties`

    3.  打包应用外部的 `application.properties`

    4.  打包在应用内部的 `application-{profile}.properties`

    5.  打包在应用内部的 `application.properties`

