  raw: '#### Sending a Reply


    Sometimes when receiving a message, you want to return an answer or trigger another
    part of the process. With Spring Messaging this is pretty easy: you can simply
    return what you want to send from your handler method. To determine where to send
    the response to, you can add an additional `@SendTo` annotation to specify the
    destination. Let’s modify the sample to send an `OrderConfirmation` to the `order-confirmations`
    queue.


    ```

    @Component

    class OrderService {

    @JmsListener(destination = "orders")

    @SendTo("order-confirmations")

    public OrderConfirmation handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    return new OrderConfirmation(order.getId());

    }

    }

    ```


    The `OrderService` changed slightly; it now returns an `OrderConfirmation` after
    processing the order. With the `@SendTo` annotation, we specify which destination
    to put the result on.


    Let’s create another listener for the `OrderConfirmation` object so that we can
    see them coming in.


    ```

    @Component

    class OrderConfirmationService {

    @JmsListener(destination = "order-confirmations")

    public void handle(OrderConfirmation confirmation) {

    System.out.println("[RECEIVED] - " + confirmation);

    }

    }

    ```


    As last the `OrderConfirmation` class. This will be constructed from the incoming
    message.


    ```

    public class OrderConfirmation {

    private String orderId;

    public OrderConfirmation() {}

    public OrderConfirmation(String orderId) {

    this.orderId = orderId;

    }

    public String getOrderId() {

    return orderId;

    }

    public void setOrderId(String orderId) {

    this.orderId = orderId;

    }

    @Override

    public String toString() {

    return String.format("OrderConfirmation [orderId=''%s'']", orderId);

    }

    }

    ```


    When running the application, you will see that first the order is received and
    next that the `OrderConfirmation` is being received.


    ## 9.4 Configure RabbitMQ


    ### Problem


    You want to use AMQP messaging in a Spring Boot application and need to connect
    to the RabbitMQ broker.


    ### Solution


    Configure the appropriate `spring.rabbitmq` properties (minimal `spring.rabbitmq.host`)
    to connect to the exchange and be able to send and receive messages.


    ### How It Works


    Spring Boot will automatically create a `ConnectionFactory` when it detects the
    RabbitMQ client library on the classpath. To get started, you need to add the
    `spring-boot-starter-amqp` dependencies; this will pull in all the required dependencies.


    ```

    org.springframework.boot

    spring-boot-starter-amqp


    ```


    Now you can use the `spring.rabbitmq` properties to connect to the broker.


    ```

    spring.rabbitmq.host=localhost

    spring.rabbitmq.port=5672

    spring.rabbitmq.username=guest

    spring.rabbitmq.password=guest

    ```


    The preceding configuration is all that is needed to connect to a default instance
    of RabbitMQ and are also the defaults as used by Spring Boot.


    Table 9-8


    Common RabbitMQ Properties


    | Property | Description |

    | --- | --- |

    | `spring.rabbitmq.addresses` | Comma-separated list of addresses to which the
    client should connect |

    | `spring.rabbitmq.connection-timeout` | Connection timeout. Default none, `0`
    never timeout |

    | `spring.rabbitmq.host` | The RabbitMQ Host, default `localhost` |

    | `spring.rabbitmq.port` | The RabbitMQ port, default `5672` |

    | `spring.rabbitmq.username` | Username to use for connecting, default `guest`
    |

    | `spring.rabbitmq.password` | Password to use for connecting, default `guest`
    |

    | `spring.rabbitmq.virtual-host` | Virtual host to use when connecting to the
    broker |


    ## 9.5 Send Messages Using RabbitMQ


    ### Problem


    You want to send a message to a RabbitMQ broker so that the message can be delivered
    to the receiver.


    ### Solution


    Using the `RabbitTemplate,` you can send messages to an exchange and provide a
    routing key.


    ### How It Works


    Spring Boot automatically configures a `RabbitTemplate` when it finds a unique
    `ConnectionFactory`; this template can be used to send a message to a queue.


    #### Configure the **RabbitTemplate**


    Spring Boot will automaticaly configure a `RabbitTemplate` if it can find a unique
    `ConnectionFactory` and if no `RabbitTemplate` exists in the configuration. Spring
    Boot allows us to modify the configured `RabbitTemplate` through properties in
    the `spring.rabbitmq.template` namespace (Table [9-9](#464036_1_En_9_Chapter.xhtml#Tab9)).


    Table 9-9


    RabbitTemplate Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.rabbitmq.template.exchange` | Name of the default exchange to use for
    send operations, default none |

    | `spring.rabbitmq.template.routing-key` | Value of a default routing key to use
    for send operations, default none |

    | `spring.rabbitmq.template.receive-timeout` | Timeout for receive operations.
    Default 0, no timeout |

    | `spring.rabbitmq.template.reply-timeout` | Timeout for send-and-receive operations.
    Default 5 seconds |


    Spring Boot also makes it easy to configure retry logic with the `RabbitTemplate`;
    by default it is disabled. By putting `spring.rabbitmq.template.retry.enabled=true`
    in the `application.properties` it will be enabled. Now when sending fails, it
    will try an additional two times to send the message. To change the number of
    retries or the interval, you can use properties from the `spring.rabbitmq.template.retry`
    namespace (Table [9-10](#464036_1_En_9_Chapter.xhtml#Tab10)).


    Table 9-10


    RabbitTemplate Retry Configuration


    | Property | Description |

    | --- | --- |

    | `spring.rabbitmq.template.retry.enabled` | Publishing retries enabled, default
    false |

    | `spring.rabbitmq.template.retry.max-attempts` | Number of attempts to deliver
    a message, default 3. |

    | `spring.rabbitmq.template.retry.initial-interval` | Duration between the first
    and second publishing attempt, default 1 second |

    | `spring.rabbitmq.template.retry.max-interval` | Number of attempts to deliver
    a message, default 10 seconds |

    | `spring.rabbitmq.template.retry.multiplier` | Multiplier to apply to the previous
    interval, default 1.0 |


    #### Sending a Simple Message


    Sending a message with the `RabbitTemplate` can be done by the `convertAndSend`
    method . It takes, at least, the routing key and the object to send in the message.


    ```

    @Component

    class HelloWorldSender {

    private final RabbitTemplate rabbit;

    HelloWorldSender(RabbitTemplate rabbit) {

    this.rabbit = rabbit;

    }

    @Scheduled(fixedRate = 500)

    public void sendTime() {

    rabbit.convertAndSend("hello",

    "Hello World, from Spring Boot 2, over RabbitMQ!");

    }

    }

    ```


    The `HelloWorldSender` will be injected with the `RabbitTemplate` through the
    constructor. Every 500ms a message will be sent on the default exchange with the
    `hello` routing key. As it is sent to the default exchange, a queue with the name
    `hello` will be automatically created. You can check in the RabbitMQ management
    console (default `http://localhost:15672`) the number of messages on the queue.


    Write a test to verify the correct behavior of the application. As there isn’t
    an embedded broker for RabbitMQ, you need to mock the `RabbitTemplate` with `@MockBean`
    . In the `@Test` method , validate the method call with the proper arguments.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest

    public class RabbitSenderApplicationTest {

    @MockBean

    private RabbitTemplate rabbitTemplate;

    @Test

    public void shouldSendAtLeastASingleMessage() {

    verify(rabbitTemplate, Mockito.atLeastOnce())

    .convertAndSend("hello",

    "Hello World, from Spring Boot 2, over RabbitMQ!");

    }

    }

    ```


    ### Tip


    There are ways of using Docker or an embedded process^([^(38)](#fn38)) to bootstrap
    RabbitMQ. The source code includes a test with an embedded process.'
