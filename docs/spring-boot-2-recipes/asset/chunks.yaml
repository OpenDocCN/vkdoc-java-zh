    Instead of adding it to the `@SpringBootApplication` you could also create a specialized
    `@Configuration` annotated class to register the interceptors. Be aware of **not**
    adding `@EnableWebMvc` to that class, as that will disable the auto configuration
    from Spring Boot!


    ```

    @SpringBootApplication

    public class LibraryApplication implements WebMvcConfigurer {

    @Override

    public void addInterceptors(InterceptorRegistry registry) {

    registry.addInterceptor(localeChangeInterceptor());

    }

    @Bean

    public LocaleChangeInterceptor localeChangeInterceptor() {

    return new LocaleChangeInterceptor();

    }

    @Bean

    public LocaleResolver localeResolver() {

    return new CookieLocaleResolver();

    }

    }

    ```


    Now add the following snippet to the `index.html`:


    ```

    Language


    NL |

    EN


    ```


    Add the keys to the `messages.properties` file.


    ```

    main.language.nl=Dutch

    main.language.en=English

    ```


    Now when selecting one of the languages, the page will re-render and be shown
