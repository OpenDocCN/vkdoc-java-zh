    ## 6.4 制定访问控制决策


    ### 问题


    在身份验证过程中，应用程序会为成功通过身份验证的用户授予一组权限。当该用户尝试访问应用程序中的资源时，应用程序必须根据所授予的权限或其他特征来决定该资源是否可访问。


    ### 解决方案


    决定用户是否被允许访问应用程序中资源的过程称为访问控制决策。该决策基于用户的身份验证状态以及资源的性质和访问属性做出。


    ### 工作原理


    使用 Spring Security，可以利用 Spring 表达式语言（SpEL）创建强大的访问控制规则。Spring Security 开箱即用地支持多种表达式（列表见表
    6-8）。通过使用 `and`、`or` 和 `not` 等结构，可以创建非常强大且灵活的表达式。


    表 6-8


    Spring Security 内置表达式


    | 表达式 | 描述 |

    | --- | --- |

    | hasRole(‘role’) 或 hasAuthority(‘authority’) | 如果当前用户拥有给定角色，则返回 true |

    | hasAnyRole(‘role1’,‘role2’) / hasAnyAuthority(‘auth1’,‘auth2’) | 如果当前用户至少拥有给定角色之一，则返回
    true |

    | hasIpAddress(‘ip-address’) | 如果当前用户拥有给定的 IP 地址，则返回 true |

    | principal | 当前用户 |

    | Authentication | 访问 Spring Security 的身份验证对象 |

    | permitAll | 始终评估为 true |

    | denyAll | 始终评估为 false |

    | isAnonymous() | 如果当前用户是匿名用户，则返回 true |

    | isRememberMe() | 如果当前用户通过“记住我”功能登录，则返回 true |

    | isAuthenticated() | 如果当前用户不是匿名用户，则返回 true |

    | isFullyAuthenticated() | 如果当前用户既不是匿名用户也不是“记住我”用户，则返回 true |


    ### 警告


    尽管角色和权限几乎相同，但它们的处理方式存在细微但重要的区别。使用 `hasRole` 时，会检查传入的角色值是否以 `ROLE_`（默认角色前缀）开头；如果不是，则在检查权限之前会添加此前缀。因此，`hasRole(''ADMIN'')`
    实际上会检查当前用户是否拥有 `ROLE_ADMIN` 权限。而使用 `hasAuthority` 时，则会按原样检查该值。


    以下表达式将允许具有 ADMIN 角色或在本地机器上登录的用户删除书籍。在定义匹配器时，可以通过 `access` 方法（而不是某个 `has*` 方法）来编写此类表达式。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    ...

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .authorizeRequests()

    .antMatchers(HttpMethod.GET, "/books*").hasAnyRole("USER", "GUEST")

    .antMatchers(HttpMethod.POST, "/books*").hasRole("USER")

    .antMatchers(HttpMethod.DELETE, "/books*")

    .access("hasRole(''ROLE_ADMIN'') or hasIpAddress(''127.0.0.1'') " +

    "or hasIpAddress(''0:0:0:0:0:0:0:1'')")

    ...

    }

    }

    ```


    #### 使用表达式通过 Spring Bean 制定访问控制决策


    在表达式中使用 `@` 语法，可以调用应用程序上下文中的任何 Bean。因此，你可以编写类似 `@accessChecker.hasLocalAccess`
    `(authentication)` 的表达式，并提供一个名为 `accessChecker` 的 Bean，该 Bean 包含一个接受 `Authentication`
    对象的 `hasLocalAccess` 方法。


    ```

    package com.apress.springbootrecipes.library.security;

    import org.springframework.security.core.Authentication;

    import org.springframework.security.web.authentication.WebAuthenticationDetails;

    @Component

    public class AccessChecker {

    public boolean hasLocalAccess(Authentication authentication) {

    boolean access = false;

    if (authentication.getDetails() instanceof WebAuthenticationDetails) {

    WebAuthenticationDetails details =

    (WebAuthenticationDetails) authentication.getDetails();

    String address = details.getRemoteAddress();

    access = address.equals("127.0.0.1") ||

    address.equals("0:0:0:0:0:0:0:1");

    }

    return access;

    }

    }

    ```


    `AccessChecker` 执行与之前编写的自定义表达式处理器相同的检查，但无需扩展 Spring Security 类。


    ```

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.authorizeRequests()

    .antMatchers(HttpMethod,POST, "/books*").hasAuthority("USER")

    .antMatchers(HttpMethod.DELETE, "/books*")

    .access("hasAuthority(''ADMIN'') " +

    "or @accessChecker.hasLocalAccess(authentication)");

    ...

    }

    ```


    #### 使用注解和表达式保护方法


    你可以使用 `@PreAuthorize` 和 `@PostAuthorize` 注解来保护方法调用，而不仅仅是保护 URL。`@PreAuthorize`
    在方法调用之前进行检查，而 `@PostAuthorize` 在方法调用之后进行检查，可用于对返回值进行安全检查。使用这些注解，你可以像编写基于 URL 的安全表达式一样编写基于安全性的表达式。要启用注解处理，请在安全配置中添加
    `@EnableGlobalMethodSecurity` 注解，并将 `prePostEnabled` 属性设置为 `true`。


    ```

    @Configuration

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter { ...
    }

    ```


    现在，你可以使用 `@PreAuthorize` 注解来保护你的应用程序。


    ```

    package com.apress.springbootrecipes.library;

    import org.springframework.security.access.prepost.PreAuthorize;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    @Override

    @PreAuthorize("isAuthenticated()")

    public Iterable findAll() {

    return books.values();

    }

    @Override

    @PreAuthorize("hasAuthority(''USER'')")

    public Book create(Book book) {

    books.put(book.getIsbn(), book);

    return book;

    }

    @Override

    @PreAuthorize("hasAuthority(''ADMIN'') or @accessChecker.hasLocalAccess(authentication)")

    public void remove(Book book) {

    books.remove(book.getIsbn());

    }

    @Override

    @PreAuthorize("isAuthenticated()")

    public Optional find(String isbn) {

    return Optional.ofNullable(books.get(isbn));

    }

    }

    ```


    `@PreAuthorize` 注解会触发 Spring Security 验证其中的表达式。如果验证成功，则授予访问权限；否则，将抛出异常，并向用户提示其没有访问权限。


    ## 6.5 为 WebFlux 应用程序添加安全性


    ### 问题


    你有一个使用 Spring Web Flux 构建的应用程序（参见第 5 章），并且希望使用 Spring Security 来保护它。

    '
- fmt: "### Solution\n\n当将 Spring Security 作为依赖项添加到基于 WebFlux 的应用程序时，Spring Boot 会自动启用安全功能。它会向应用程序添加一个带有`@EnableWebFluxSecurity`注解的配置类。`@EnableWebFluxSecurity`注解随后会导入默认的\
    \ Spring Security `WebFluxSecurityConfiguration`。\n\n### 工作原理\n\nSpring WebFlux\
    \ 应用程序在本质上与常规的 Spring MVC 应用程序有很大不同；尽管如此，Spring Boot 和 Spring Security 仍致力于让构建安全的\
    \ WebFlux 应用程序变得更加容易。\n\n要启用安全功能，请将`spring-boot-starter-security`添加到你的 WebFlux\
    \ 应用程序中（来自配方 5.3）。\n\n```xml\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-security</artifactId>\n</dependency>\n```\n\
    \n这将把`spring-security-core`、`spring-security-config`和`spring-security-web`依赖项添加到你的项目中。Spring\
    \ Boot 会检测这些 JAR 文件中某些类的可用性，并据此自动启用安全功能。\n\nSpring Boot 将使用以下内容配置 Spring Security：使用基本认证和表单登录进行身份验证；启用\
    \ HTTP 安全头；并要求登录才能访问任何资源。\n\n### 警告\n\nSpring Boot 会添加一个默认用户，名为`user`，并附带一个生成的密码，该密码会在启动日志中显示。这仅用于测试、原型设计或演示；请勿在生产系统中使用生成的用户！\n\
    \n当将`spring-boot-starter-security`依赖项添加到配方 5.3 时，它会自动保护所有暴露的端点。在启动时，生成的密码会被记录下来（图\
    \ [6-4](#464036_1_En_6_Chapter.xhtml#Fig4)）。\n\n![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig4_HTML.jpg](images/464036_1_En_6_Chapter/464036_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4 安全的 WebFlux 输出\n\n现在，当尝试访问`http://localhost:8080/`时，会显示一个登录页面（图 [6-5](#464036_1_En_6_Chapter.xhtml#Fig5)）。\n\
    \n![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig5_HTML.jpg](images/464036_1_En_6_Chapter/464036_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5 默认登录页面\n\n#### 保护 URL 访问\n\n可以通过添加自定义的`SecurityWebFilterChain`来配置访问规则。首先，让我们创建一个`OrdersSecurityConfiguration`。\n\
    \n```java\n@Configuration\npublic class OrdersSecurityConfiguration { ... }\n\
    ```\n\nSpring Security 中的`WebFluxSecurityConfiguration`类会检测`SecurityWebFilterChain`的实例（包含安全配置），该实例被包装为`WebFilter`，而`WebFilter`又被\
    \ WebFlux 用于为传入请求添加行为（就像普通的 Servlet 过滤器一样）。\n\n目前，该配置仅启用了安全功能；让我们添加一些安全规则。\n\n\
    ```java\n@Bean\nSecurityWebFilterChain springWebFilterChain(ServerHttpSecurity\
    \ http) throws Exception {\n    return http\n        .authorizeExchange()\n  \
    \          .pathMatchers(\"/\").permitAll()\n            .pathMatchers(\"/orders*\"\
    ).hasRole(\"USER\")\n            .anyExchange().authenticated()\n            .and().build();\n\
    }\n```\n\n`ServerHttpSecurity`应该看起来很熟悉（请参阅本章中的其他配方），它用于添加安全规则并进行进一步配置（例如添加/删除头以及配置登录方法）。通过`authorizeExchange`可以编写规则，其中对于安全的\
    \ URL，`/`允许所有人访问，而`/orders` URL 仅对具有`USER`角色的用户可用。对于其他请求，你至少需要进行身份验证。最后，你需要调用`build()`来实际构建`SecurityWebFilterChain`。\n\
    \n除了`authorizeExchange`之外，还可以使用`headers()`配置方法向请求添加安全头，使用`csrf()`添加 CSRF 保护等。\n\
    \n#### 登录 WebFlux 应用程序\n\n你可以通过显式配置来覆盖默认配置的某些部分；你可以覆盖所使用的身份验证管理器以及用于存储安全上下文的存储库。身份验证管理器是自动检测的；你只需要注册一个类型为`ReactiveAuthenticationManager`或`UserDetailsRepository`的\
    \ Bean。\n\n你还可以通过配置`ServerSecurityContextRepository`来配置`SecurityContext`的存储位置。默认使用的实现是`WebSessionServerSecurityContextRepository`，它将上下文存储在`WebSession`中。另一个默认实现是`NoOpServerSecurityContextRepository`，用于无状态应用程序。\n\
    \n```java\n@Bean\nSecurityWebFilterChain springWebFilterChain(HttpSecurity http)\
    \ throws Exception {\n    return http\n        .httpBasic()\n            .and()\n\
    \        .formLogin()\n            .authenticationManager(new CustomReactiveAuthenticationManager())\n\
    \            .securityContextRepository(\n                new ServerWebExchangeAttributeSecurityContextRepository())\n\
    \            .and().build();\n}\n```\n\n这将使用`CustomReactiveAuthenticationManager`和无状态的`NoOpServerSecurityContextRepository`覆盖默认值。然而，对于我们的应用程序，我们将坚持使用默认值。\n\
    \n#### 对用户进行身份验证\n\n在基于 Spring WebFlux 的应用程序中对用户进行身份验证是通过`ReactiveAuthenticationManager`完成的；这是一个带有单个`authenticate`方法的接口。你可以提供自己的实现，或者使用两个提供的实现之一。第一个是`UserDetailsRepositoryAuthenticationManager`，它包装了一个`ReactiveUserDetailsService`的实例。\n\
    \n### 注意\n\n`ReactiveUserDetailsService`只有一个实现，即`MapReactiveUserDetailsService`，这是一个内存实现。你可以提供基于响应式数据存储（如\
    \ MongoDB 或 Couchbase）的自定义实现。\n\n另一个实现`ReactiveAuthenticationManagerAdapter`实际上是一个常规`AuthenticationManager`的包装器。它将包装一个常规实例，因此你可以以响应式的方式使用阻塞式实现。这并不会使它们变成响应式：它们仍然会阻塞，但这种方式使它们可以重用。通过这种方式，你也可以为你的响应式应用程序使用\
    \ JDBC、LDAP 等。\n\n在 Spring WebFlux 应用程序中配置 Spring Security 时，你可以将`ReactiveAuthenticationManager`的实例或`UserDetailsRepository`添加到你的\
    \ Java 配置类中。当检测到后者时，它会自动被包装在`UserDetailsRepositoryAuthenticationManager`中。\n\n\
    ```java\n@Bean\npublic MapUserDetailsRepository userDetailsRepository() {\n  \
    \  UserDetails marten =\n        User.withUsername(\"marten\").password(\"secret\"\
    )\n            .roles(\"USER\").build();\n    UserDetails admin =\n        User.withUsername(\"\
    admin\").password(\"admin\")\n            .roles(\"USER\",\"ADMIN\").build();\n\
    \    return new MapUserDetailsRepository(marten, admin);\n}\n```\n\n现在，当你运行应用程序时，你可以自由访问`/`页面，但当访问以`/orders`开头的\
    \ URL 时，你会看到一个登录表单（见图 [6-5](#464036_1_En_6_Chapter.xhtml#Fig5)）。输入预定义用户的凭据后，你应该被允许访问请求的\
