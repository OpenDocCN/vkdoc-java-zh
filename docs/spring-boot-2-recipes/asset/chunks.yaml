    \ and send that to the server. After sending the response, it can do expectations\
    \ on the result.\n\n## Use Thymeleaf as a Template Engine\n\n### Problem\n\nYou\
    \ want to render a view in a WebFlux based application.\n\n### Solution\n\nUse\
    \ Thymeleaf to create a view and reactively return the view name and fill the\
    \ model.\n\n### How It Works\n\nAdd a dependency on `spring-boot-starter-webflux`\
    \ and `spring-boot-starter-thymeleaf`. This is enough for Spring Boot to automatically\
