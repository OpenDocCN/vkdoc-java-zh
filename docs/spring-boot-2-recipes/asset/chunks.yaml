    #### 从 JNDI 获取 `DataSource`


    如果你将 Spring Boot 应用程序部署到应用服务器（或者有远程 JNDI 服务器），并希望使用预配置的 `DataSource`，则可以使用 `spring.datasource.jndi-name`
