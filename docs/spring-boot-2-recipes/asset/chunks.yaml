    Introduction


    Welcome to the first edition of *Spring Boot 2 Recipes* . It will focus on developing
    software using Spring Boot 2.1 and the supported projects like Spring Security,
    Spring AMQP etc.


    ## Who This Book is For


    This book is for the developer who wants to simplify application development and
    have a faster startup time for writing applications. Introducing Spring Boot to
    you will simplify your application configuration. Using the full power of Spring
    Boot simplifies your deployment and management as well.


    This book assumes that you are familiar with Java, Spring, and an IDE of some
    sort. This book doesn’t explain all the internals and in-depth workings of Spring
    or the related projects. For in-depth coverage, pick up a copy of Spring 5 Recipes
    or Pro Spring MVC.


    ## How This Book Is Structured


    Chapter [1](#464036_1_En_1_Chapter.xhtml) , “Spring Boot – Introduction,” gives
    a quick overview of Spring Boot and how to get started.


    Chapter [2](#464036_1_En_2_Chapter.xhtml) , “Spring Boot – Basics,” covers the
    basic scenarios of how to define and configure a bean and do dependency injection
    with Spring Boot.


    Chapter [3](#464036_1_En_3_Chapter.xhtml) , “Spring MVC,” Covers web-based application
    development using Spring MVC.


    Chapter [4](#464036_1_En_4_Chapter.xhtml) , “Spring MVC - Async,” covers asynchrounous
    web-based application development using Spring MVC.


    Chapter [5](#464036_1_En_5_Chapter.xhtml) , “Spring WebFlux,” covers reactive
    web-application development using Spring WebFlux.


    Chapter [6](#464036_1_En_6_Chapter.xhtml) , “Spring Security,” provides an overview
    on how to secure your Spring Boot application using Spring Security.


    Chapter [7](#464036_1_En_7_Chapter.xhtml) “Data Access,” explains how to access
    data storage like a database or MongoDB.


    Chapter [8](#464036_1_En_8_Chapter.xhtml) “Java Enterprise Services,” introduces
    how to use enterprise services like JMX, Mail, and scheduling with Spring Boot.


    Chapter [9](#464036_1_En_9_Chapter.xhtml) “Messaging,” provides an introduction
    on how to do messaging with JMS and RabbitMQ using Spring Boot.


    Chapter [10](#464036_1_En_10_Chapter.xhtml) , “Spring Boot Actuator,” explains
    how to use the production-ready features like health and metrics endpoints from
    Spring Boot Actuator.


    Chapter [11](#464036_1_En_11_Chapter.xhtml) , “Packaging,” covers how to package
    and deploy your Spring Boot application by making it executable or wrapping it
    in a Docker container.


    ### Conventions


    Sometimes, when we want you to pay particular attention to a part within a code
    example, we will make the font bold. Please note that the bold doesn’t necessarily
    reflect a code change from the previous version.


    In case a code line is too long to fit the page’s width, we will break it with
    a code continuation character. Please note that when you try to type the code,
    you have to concatenate the line by yourself without any spaces.


    ### Prerequisites


    Because the Java programming language is platform independent, you are free to
    choose any supported operating system. However, some of the examples in this book
    use platform-specific paths. Translate them as necessary to your operating system’s
    format before typing the examples.


    To make the most out of this book, install JDK version 11 ^([¹](#fn1)) or higher.
    You should have a Java IDE installed to make development easier. For this book,
    most of the sample code is Maven ^([²](#fn2)) based, and most IDE’s have build
    in support for Maven to manage the classpath. The samples all make use of the
    Maven Wrapper ^([³](#fn3)) so you don’t necessarily need to install Maven to be
    able to build the samples from the command line.


    The samples sometimes need additional libraries installed like PostreSQL, ActiveMQ,
    etc.; for this, the book uses Docker. ^([⁴](#fn4)) Of course you can install the
    libraries on your machine instead of using Docker, but for ease of use (and not
    polluting your system) using Docker is preferred.


    ### Downloading the Code


    The source code for this book can be accessed by clicking the Download Source
    Code link located at [`www.apress.com/9781484239629`](http://www.apress.com/9781484239629)
    . The source code is organized by chapters, each of which includes one of more
    independent examples.'
