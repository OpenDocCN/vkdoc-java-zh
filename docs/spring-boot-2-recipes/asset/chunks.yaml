    # 7. Data Access


    When working with a database the first thing you need is a connection to the database.
    A connection in Java is obtained through a `javax.sql.DataSource`. Spring provides
    out-of-the-box several implementations of a `DataSource` like the `DriverManagerDataSource`
    and `SimpleDriverDataSource` . However, these implementations aren’t connections
    pool and should be considered mainly for testing but not production use. For a
    live system, you want to use a proper connection pool like HikariCP.^([^(27)](#fn27))


    ### Tip


    In the `db` folder there is a `Dockerfile` that will build a PostgreSQL^([^(28)](#fn28))
    with the database automatically created. Build it using `docker build -t sb2r-postgres`.
    You can then run it using `docker run -p 5432:5432 -it sb2r-postgres`.


    ## 7.1 Configuring a DataSource


    ### Problem


    You need access to a database from your application.


    ### Solution


    Use the `spring.datasource.url`, `spring.datasource.username`, and `spring.datasource.password`
    properties to let Spring Boot configure a `DataSource`.


    ### How It Works


    To configure a `DataSource` , Spring Boot requires the presence of a connection
    pool or an embedded database like H2, HSQLDB, or Derby. Spring Boot automatically
    detects HikariCP, Tomcat JDBC, and Commons DBCP2-based connection pools (in that
    order). To use the connection pool, configure the `spring.datasource.url`, `spring.datasource.username`,
    and `spring.datasource.password` properties. The JDBC support can be enabled by
    adding the `spring-boot-starter-jdbc` dependency. This will pull in all required
    dependencies to work with JDBC.


    ```

    org.springframework.boot

    spring-boot-starter-jdbc


    ```


    Dependencies included are `spring-jdbc`, `spring-tx`, and HikariCP as the default
    connection pool.


    #### Use an Embedded `DataSource`


    When Spring Boot detects the presence of H2, HSQLDB, or Derby it will by default
    start an embedded database using the detected embedded implementation. This is
    very useful when writing a test or preparing a demonstration for a business. Letting
    Spring Boot create this is a simple matter of including the desired dependency.


    ```

    org.apache.derby

    derby

    runtime


    ```


    Spring Boot will now detect Derby and bootstrap an embedded `DataSource`. Let’s
    write an application that lists the tables in the database.


    ```

    package com.apress.springboot2recipes.jdbc;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.ApplicationArguments;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.stereotype.Component;

    import javax.sql.DataSource;

    @SpringBootApplication

    public class JdbcApplication {

    public static void main(String[] args) {

    SpringApplication.run(JdbcApplication.class, args);

    }

    }

    @Component

    class TableLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final DataSource dataSource;

    TableLister(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    try (var con = dataSource.getConnection();

    var rs = con.getMetaData().getTables(null, null, "%", null)) {

    while (rs.next()) {

    logger.info("{}", rs.getString(3));

    }

    }

    }

    }

    ```


    When the application runs, it will create an instance of the `TableLister` and
    the instance will receive the configured `DataSource`. Spring Boot will then detect
    the fact it is an `ApplicationRunner` and will call the `run` method. The `run`
    method obtains a `Connection` from the `DataSource` and uses the `DatabaseMetaData`
    (from JDBC) to obtain the tables in the database. Now when running the application
    it should display output similar to that as in Figure [7-1](#464036_1_En_7_Chapter.xhtml#Fig1).


    ![../images/464036_1_En_7_Chapter/464036_1_En_7_Fig1_HTML.jpg](images/464036_1_En_7_Chapter/464036_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    TableLister output for Derby'
