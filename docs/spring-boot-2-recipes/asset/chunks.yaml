    图 3-2


    控制器输出


    #### 测试


    现在应用程序正在运行并返回结果，是时候为控制器添加测试了（理想情况下，你应该先编写测试！）。Spring 已经拥有一些令人印象深刻的测试功能，而 Spring
    Boot 又增加了更多。使用 Spring Boot 测试控制器变得非常简单。


    ```

    package com.apress.springbootrecipes.hello;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.http.MediaType;

    import org.springframework.test.context.junit4.SpringRunner;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.request.MockMvcRequestBuilders;

    import staticorg.springframework.test.web.servlet.result.MockMvcResultMatchers.content;

    import staticorg.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @RunWith(SpringRunner.class)

    @WebMvcTest(HelloWorldController.class)

    public class HelloWorldControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @Test

    public void testHelloWorldController() throws Exception {

    mockMvc.perform(MockMvcRequestBuilders.get("/"))

    .andExpect(status().isOk())

    .andExpect(content().string("Hello World, from Spring Boot 2!"))

    .andExpect(content().contentTypeCompatibleWith(MediaType.TEXT_PLAIN));

    }

    }

    ```


    `@RunWith(SpringRunner.class)` 用于指示 JUnit 使用这个特定的运行器。这个特殊的运行器是将 Spring 测试框架与 JUnit
    集成的关键。`@WebMvcTest` 指示 Spring 测试框架为测试这个特定控制器设置一个应用程序上下文。它将启动一个最小的 Spring Boot
    应用程序，仅包含与 Web 相关的 bean，如 `@Controller`、`@ControllerAdvice` 等。此外，它还会预配置 Spring
    Test Mock MVC 支持，然后可以自动注入。


    Spring Test Mock MVC 可用于模拟向控制器发起 HTTP 请求，并对结果进行一些预期。这里我们使用 `GET` 调用 `/`，并期望得到
    HTTP 200（即 OK）响应，以及纯文本消息 `Hello World, from Spring Boot 2!`。


    ## 3.2 使用 Spring MVC 暴露 REST 资源


    ### 问题


    你想使用 Spring MVC 来暴露基于 REST 的资源 `@WebMvcTest`。


    ### 解决方案


    你需要一个 JSON 库来进行 JSON 编组（尽管你也可以使用 XML 和其他格式，因为内容协商^(¹³)是 REST 的一部分）。在本方案中，我们将使用
    Jackson^(¹⁴) 库来处理 JSON 转换。


    ### 工作原理


    假设你为一家图书馆工作，需要开发一个 REST API 来列出和搜索图书。


    `spring-boot-starter-web` 依赖（另请参见方案 3.1）默认已经包含了所需的 Jackson 库。


