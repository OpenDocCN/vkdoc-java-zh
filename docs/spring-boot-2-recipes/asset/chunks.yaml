    **Figure 10-7** TaskScheduler health check


    ## 10.3 Export Metrics


    ### Problem


    You want to export the metrics to an external system, to create a dashboard to
    monitor the application.


    ### Solution


    Use one of the supported systems like Graphite and periodically push the metrics
    to that system. Include a `micrometer.io` registry dependency in your application
    (next to the `spring-boot-starter-actuator` dependency) and metrics will automatically
    be exported. By default, every minute the data will be pushed to the server.


    ### How It Works


    Exporting metrics is part of the Micrometer.io library and it supports a wide
    variety of services like Graphite, DataDog, Ganglia, or regular StatsD. This recipe
    uses Graphite, so a dependency to `micrometer-registry-graphite` needs to be added.


    ```

    io.micrometer

    micrometer-registry-graphite

    ```


    In theory this could be enough to have metrics published to Graphite if Graphite
    ( [`https://graphiteapp.org`](https://graphiteapp.org) ) is running on `localhost`
    and with the default ports. However, Spring Boot makes it easy to configure this
    by exposing some properties, generally in the `management.metrics.export.<registry-name>`
    namespace (Table [10-3](#464036_1_En_10_Chapter.xhtml#Tab3)).


    **Table 10-3** Common Metrics Export Properties


    | Property | Description |

    | --- | --- |

    | `management.metrics.export.<registry-name>.enabled` | Whether or not to enable
    metrics exporting. Default `true` when the library is detected on the classpath
    |

    | `management.metrics.export.<registry-name>.host` | Host to send metrics to,
    mostly `localhost` or well-known url of service (like SignalFX, DataDog, etc.)
    |

    | `management.metrics.export.<registry-name>.port` | Port to send metrics to,
    defaults to the well-known port of the desired service |

    | `management.metrics.export.<registry-name>.step` | How often to send metrics,
    default 1 minute |

    | `management.metrics.export.<registry-name>.rate-units` | Base time unit used
    to report rates, default `seconds` |

    | `management.metrics.export.<registry-name>.duration-units` | Base time unit
    used to report durations, default `milliseconds` |


    To report the metrics every ten seconds instead of each minute, add the following
    to the `application.properties`:


    ```

    management.metrics.export.graphite.step=10s

    ```'
