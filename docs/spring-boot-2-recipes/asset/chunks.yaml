    ## 3.5 国际化您的应用程序


    ### 问题


    在开发国际化 Web 应用程序时，您需要根据用户的首选区域设置显示网页。您不希望为不同的区域设置创建同一页面的不同版本。


    ### 解决方案


    为了避免为不同区域设置创建页面的不同版本，您应该通过外部化区域设置敏感的文本消息，使网页独立于区域设置。Spring 能够通过使用消息源（必须实现 `MessageSource`
    接口）为您解析文本消息。在页面模板中，您可以使用特殊标签或查找消息。


    ### 工作原理


    当 Spring Boot 在 `src/main/resources`（默认位置）中找到 `messages.properties` 时，它会自动配置一个
    `MessageSource`。此 `messages.properties` 包含应用程序中要使用的默认消息。Spring Boot 将使用请求中的 `Accept-Language`
    标头来确定当前请求应使用哪个区域设置（有关如何更改此行为，请参见配方 3.6）。


    有一些属性可以改变 `MessageSource` 对缺失翻译、缓存等的响应方式。有关这些属性的概述，请参见表 3-5。


    表 3-5


    I18N 属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.messages.basename` | 以逗号分隔的基名称列表，默认值为 `messages` |

    | `spring.messages.encoding` | 消息包编码，默认值为 `UTF-8` |

    | `spring.messages.always-use-message-format` | 是否对所有消息应用 `MessageFormat`，默认值为
    `false` |

    | `spring.messages.fallback-to-system-locale` | 当找不到检测到的区域设置的资源包时，回退到系统区域设置。禁用时，将从默认文件加载默认值。默认值为
    `true` |

    | `spring.messages.use-code-as-default-message` | 当找不到消息时，使用消息代码作为默认消息，而不是抛出 `NoSuchMessageException`。默认值为
    `false` |

    | `spring.messages.cache-duration` | 缓存持续时间，默认值为永久 |

