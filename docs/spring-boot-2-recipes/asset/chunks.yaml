  raw: '#### Write an Integration Test


    An integration test for the `OrderController` can be written quite easily using
    the `WebTestClient` and a `MOCK` web environment (you could also use a `RANDOM_PORT`
    instead of `MOCK`).


    ```

    package com.apress.springbootrecipes.order.web;

    import com.apress.springbootrecipes.order.Order;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.reactive.AutoConfigureWebTestClient;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.test.annotation.DirtiesContext;

    import org.springframework.test.context.junit4.SpringRunner;

    import org.springframework.test.web.reactive.server.WebTestClient;

    import java.math.BigDecimal;

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.MOCK)

    @AutoConfigureWebTestClient

    @DirtiesContext(classMode = DirtiesContext.ClassMode.AFTER_EACH_TEST_METHOD)

    public class OrderControllerIntegrationTest {

    @Autowired

    private WebTestClient webTestClient;

    @Test

    public void listOrders() {

    webTestClient.get().uri("/orders")

    .exchange()

    .expectStatus().isOk()

    .expectBodyList(Order.class).hasSize(25);

    }

    @Test

    public void addAndGetOrder() {

    var order = new Order("test1", BigDecimal.valueOf(1234.56));

    webTestClient.post().uri("/orders").syncBody(order)

    .exchange()

    .expectStatus().isOk()

    .expectBody(Order.class).isEqualTo(order);

    webTestClient.get().uri("/orders/{id}", order.getId())

    .exchange()

    .expectStatus().isOk()

    .expectBody(Order.class).isEqualTo(order);

    }

    }

    ```


    The `@DirtiesContext` is needed here because the `OrderService` is a stateful
    bean. So after adding an `Order` to the collection, it needs to be reset for the
    next test. The test will start the full application, due to the `@SpringBootTest`
    with a mocked environment. The `@AutoConfigureWebTestClient` is needed for a mocked
    environment to get a `WebTestClient`. The `WebTestClient` makes it easy to build
    a request and send that to the server. After sending the response, it can do expectations
    on the result.


    ## 5.3 Use Thymeleaf as a Template Engine


    ### Problem


    You want to render a view in a WebFlux based application.


    ### Solution


    Use Thymeleaf to create a view and reactively return the view name and fill the
    model.


    ### How It Works


    Add a dependency on `spring-boot-starter-webflux` and `spring-boot-starter-thymeleaf`.
    This is enough for Spring Boot to automatically configure Thymeleaf for use in
    a WebFlux application.


    ```

    org.springframework.boot

    spring-boot-starter-webflux


    org.springframework.boot

    spring-boot-starter-thymeleaf


    ```


    With the addition of this dependency, you will get the Thymeleaf library as well
    as the Thymeleaf Spring Dialect so that they integrate nicely. Due to the existence
    of these two libraries, Spring Boot will automatically configure the `ThymeleafReactiveViewResolver`
    .


    The `ThymeleafReactiveViewResolver` requires a Thymeleaf `ISpringWebFluxTemplateEngine`
    to be able to resolve and render the views. A special `SpringWebFluxTemplateEngine`
    will be preconfigured with the `SpringDialect` so that you can use SpEL inside
    Thymeleaf pages.


    To configure Thymeleaf, Spring Boot exposes several properties in the `spring.thymeleaf`
    and `spring.thymeleaf.reactive` namespaces (Table [5-1](#464036_1_En_5_Chapter.xhtml#Tab1)).


    Table 5-1


    Common Thymeleaf Properties


    | Property | Description |

    | --- | --- |

    | `spring.thymeleaf.prefix` | The `prefix` to use for the `ViewResolver`, default
    `classpath:/templates/` |

    | `spring.thymeleaf.suffix` | The `suffix` to use for the `ViewResolver`, default
    `.html` |

    | `spring.thymeleaf.encoding` | The encoding of the templates, default `UTF-8`
    |

    | `spring.thymeleaf.check-template` | Check if the template exists before rendering,
    default `true`. |

    | `spring.thymeleaf.check-template-location` | Check if the template location
    exists. Default is true. |

    | `spring.thymeleaf.mode` | Thymeleaf `TemplateMode` to use, default `HTML` |

    | `spring.thymeleaf.cache` | Should resolved templates be cached or not, default
    `true` |

    | `spring.thymeleaf.template-resolver-order` | Order of the `ViewResolver` default
    is 1 |

    | `spring.thymeleaf.view-names` | The view names (comma separated) that can be
    resolved with this `ViewResolver` |

    | `spring.thymeleaf.exclude-view-names` | The view names (comma separated) that
    are excluded from being resolved |

    | `spring.thymeleaf.enabled` | Should Thymeleaf be enabled, default `true` |

    | `spring.thymeleaf.enable-spring-el-compiler` | Enable the compilation of SpEL
    expressions, default `false` |

    | `spring.thymeleaf.reactive.max-chunk-size` | Maximum size of databuffers used
    to write the response in bytes. Default 0 |

    | `spring.thymeleaf.reactive.media-types` | Media types supported by this view
    technology, like `text/html` |

    | `spring.thymeleaf.reactive.full-mode-view-names` | Comma-separated list of view
    names that should operate in FULL mode. Default none. Full mode means basically
    blocking mode. |

    | `spring.thymeleaf.reactive.chunked-mode-view-names` | Comma-separated list of
    view names that should operate in chunked mode |


