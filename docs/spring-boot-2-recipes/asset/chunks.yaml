    # 4. Spring MVC - 异步


    当 Servlet API 发布时，大多数实现它的容器都采用每个请求一个线程的模式。这意味着一个线程会被阻塞，直到请求处理完成并将响应发送给客户端。


    在早期，连接到互联网的设备远没有现在这么多。由于设备数量的增加，处理的 HTTP 请求数量也随之增长。由于这种增长，对于许多 Web 应用程序来说，保持线程阻塞的状态已不再可行。


    从 Servlet 3 规范开始，可以异步处理 HTTP 请求。这是通过释放处理 HTTP 请求的线程来实现的。新线程将在后台运行，一旦结果可用，就会将其写入客户端。这一切都可以在符合
    Servlet 3.1 规范的 Servlet 容器中以非阻塞方式完成。所有使用的资源也必须是非阻塞的。


    在过去的几年里，响应式编程也兴起起来。从 Spring 5 开始，可以编写响应式 Web 应用程序。为了实现响应式，Spring 使用 Project Reactor
    作为 Reactive Streams API 的实现。深入探讨响应式编程超出了本书的范围。简而言之，响应式编程是一种进行非阻塞函数式编程的方式。


    在使用 Web 应用程序时，会有一个请求，HTML 在服务器端渲染，然后发送回客户端。在过去的几年里，HTML 的渲染转移到了客户端。通信通过向客户端返回
    JSON、XML 或其他表示形式来完成。


    这仍然是一个请求和响应周期，尽管是通过客户端通过 `XmlHttpRequest` 进行的异步调用来驱动的。客户端和服务器之间还有其他通信方式。可以使用服务器发送事件（Server-Sent-Events）进行单向通信。对于全双工通信，可以使用
    Web Socket。


    在构建常规 Web 应用程序时，添加 `spring-boot-starter-web` 作为依赖项。在构建响应式应用程序时，添加 `spring-boot-starter-webflux`。


    ## 4.1 使用控制器和 TaskExecutor 进行异步请求处理


    ### 问题


    为了减少 Servlet 容器的吞吐量，您希望异步处理请求。'
- fmt: '### Solution


    当请求到来时，它会同步处理，这会阻塞处理 HTTP 请求的线程。响应保持打开状态并可写入。这在以下场景中很有用：例如，某个调用需要一些时间才能完成，与其阻塞线程，不如在后台处理并在完成时向用户返回一个值。


    ### How It Works


    Spring MVC 支持方法返回多种类型；表 [4-1](#464036_1_En_4_Chapter.xhtml#Tab1) 中的返回类型以异步方式处理。


    **表 4-1** 异步返回类型


    | 类型 | 描述 |

    | --- | --- |

    | `DeferredResult<V>` | 从另一个线程生成的异步结果 |

    | `ListenableFuture` | 从另一个线程生成的异步结果，是 `DeferredResult` 的等效替代 |

    | `CompletionStage` / `CompletableFuture` | 从另一个线程生成的异步结果，是 `DeferredResult` 的等效替代
    |

    | `Callable` | 一个异步计算，计算完成后产生结果 |

    | `ResponseBodyEmitter` | 可用于异步地将多个对象写入响应 |

    | `SseEmitter` | 可用于异步地写入服务器发送事件 |

    | `StreamingResponseBody` | 可用于异步地写入 `OutputStream` |


    #### 编写异步控制器


    编写一个控制器并使其异步处理请求，只需更改控制器处理方法的返回类型即可（参见表 [4-1](#464036_1_En_4_Chapter.xhtml#Tab1)）。假设对
    `HelloWorldController.hello` 的调用需要相当长的时间，但我们不希望因此阻塞服务器。


    #### 使用 `Callable`


    ```java

    package com.apress.springbootrecipes.library;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import java.util.concurrent.Callable;

    import java.util.concurrent.ThreadLocalRandom;

    @RestController

    public class HelloWorldController {

    @GetMapping

    public Callable hello() {

    return () -> {

    Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

    return "Hello World, from Spring Boot 2!";

    };

    }

    }

    ```


    `hello` 方法现在返回一个 `Callable<String>`，而不是直接返回一个 `String`。在新构建的 `Callable<String>`
    内部，有一个随机等待来模拟将消息返回给客户端之前的延迟。


    现在，当进行请求时，您将在日志中看到类似于图 [4-1](#464036_1_En_4_Chapter.xhtml#Fig1) 的内容。


    ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig1_HTML.jpg](images/464036_1_En_4_Chapter/464036_1_En_4_Fig1_HTML.jpg)


    **图 4-1** 日志输出


    您会注意到，请求处理在某个线程上启动（此处为 `nio-8080-exec-1`）。另一个线程正在处理并返回结果（此处为 `task-1`）。最后，请求被再次分派到
    `DispatcherServlet`，以在另一个线程上处理结果（此处为 `nio-8080-exec-2`）。


    #### 使用 `CompletableFuture`


    将方法的签名更改为返回 `CompletableFuture<String>`，并使用 `TaskExecutor` 异步执行代码。


    ```java

    @RestController

    public class HelloWorldController {

    private final TaskExecutor taskExecutor;

    public HelloWorldController(TaskExecutor taskExecutor) {

    this.taskExecutor = taskExecutor;

    }

    @GetMapping

    public CompletableFuture hello() {

    return CompletableFuture.supplyAsync(() -> {

    randomDelay();

    return "Hello World, from Spring Boot 2!";

    }, taskExecutor);

    }

    private void randomDelay() {

    try {

    Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

    } catch (InterruptedException e) {

    Thread.currentThread().interrupt();

    }

    }

    }

    ```


    调用 `supplyAsync`（或者当使用 `void` 时，使用 `runAsync`）会提交一个任务。它返回一个 `CompletableFuture`。这里使用了
    `supplyAsync` 方法，该方法同时接受一个 `Supplier` 和一个 `Executor`。这样，您可以重用 `TaskExecutor` 进行异步处理。如果您使用仅接受一个
    `Supplier` 的 `supplyAsync` 方法，它将使用 JVM 上可用的默认 fork/join 池执行。


    当返回一个 `CompletableFuture` 时，您可以利用它的所有特性，例如组合和链接多个 `CompletableFuture` 实例。


    #### 测试异步控制器


    与常规控制器一样，Spring MVC Test 框架可用于测试异步控制器。


    创建一个测试类，并使用 `@WebMvcTest(HelloWorldController.class)` 和 `@RunWith(SpringRunner.class)`
    对其进行注解。`@WebMvcTest` 将引导一个最小的 Spring Boot 应用程序，其中包含测试控制器所需的内容。它会自动配置 Spring MockMvc，并将其自动注入到测试中。


    ```java

    @RunWith(SpringRunner.class)

    @WebMvcTest(HelloWorldController.class)

    public class HelloWorldControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @Test

    public void testHelloWorldController() throws Exception {

    MvcResult mvcResult = mockMvc.perform(get("/"))

    .andExpect(request().asyncStarted())

    .andDo(MockMvcResultHandlers.log())

    .andReturn();

    mockMvc.perform(asyncDispatch(mvcResult))

    .andExpect(status().isOk())

    .andExpect(content().contentTypeCompatibleWith(TEXT_PLAIN))

    .andExpect(content().string("Hello World, from Spring Boot 2!"));

    }

    }

    ```


    异步 Web 测试与常规 Web 测试的主要区别在于需要启动异步分派。首先，执行初始请求并验证异步是否已启动。出于调试目的，您可以使用 `MockMvcResultHandlers.log()`
    记录结果。接下来，应用 `asyncDispatch`。最后，我们可以断言预期的响应。


    #### 配置异步处理


    根据您的需求，您可能还希望为异步请求处理配置一个显式的 `TaskExecutor`，而不是使用 Spring Boot 提供的默认 `TaskExecutor`。


    要配置异步处理，请重写 `WebMvcConfigurer` 的 `configureAsyncSupport` 方法。重写此方法使您可以访问 `AsyncSupportConfigurer`。这允许您设置要使用的
    `AsyncTaskExecutor`（以及其他配置）。


    ```java

    @SpringBootApplication

    public class HelloWorldApplication implements WebMvcConfigurer {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    @Override

    public void configureAsyncSupport(AsyncSupportConfigurer configurer) {

    configurer.setTaskExecutor(mvcTaskExecutor());

    }

    @Bean

    public ThreadPoolTaskExecutor mvcTaskExecutor() {

    ThreadPoolTaskExecutor taskExecutor = new ThreadPoolTaskExecutor();

    taskExecutor.setThreadNamePrefix("mvc-task-");

    return taskExecutor;

    }

    }

    ```


    ## 4.2 响应写入器


    ### 问题


    您有一个服务或多次调用，希望收集结果并将响应发送给客户端。


    ### 解决方案


    使用 `ResponseBodyEmitter`（或其子类 `SseEmitter`）来收集并将响应发送给客户端。


    ### 工作原理'
  raw: '### Solution


    When a request comes in it is handled synchronously, which blocks the HTTP request
    handling thread. The response stays open and is available to be written to. This
    is useful when, for instance, a call takes some time to finish and instead of
    blocking threads you can have this processed in the background and return a value
    to the user when finished.


    ### How It Works


    Spring MVC supports a number of return types from methods; the return types in
    Table [4-1](#464036_1_En_4_Chapter.xhtml#Tab1) are processed in an asynchronous
    way.


    Table 4-1


    Asynchronously Return Types


    | Type | Description |

    | --- | --- |

    | `DeferredResult<V>` | Async result produced from another thread |

    | `ListenableFuture` | Async result produced from another thread, an equivalent
    alternative for `DeferredResult` |

    | `CompletionStage` <v>/</v> `CompletableFuture` | Async result produced from
    another thread, an equivalent alternative for `DeferredResult` |

    | `Callable` | An async computation with the result produced after the computation
    finishes |

    | `ResponseBodyEmitter` | Can be used to write multiple objects to the response
    asynchronously |

    | `SseEmitter` | Can be used to write Server-Sent Event asynchronously |

    | `StreamingResponseBody` | Can be used to write to the `OutputStream` asynchronously.
    |


    #### Writing an Asynchronous Controller


    Writing a controller and having it handle the request asynchronously is as simple
    as changing the return type of the controllers handler method (see Table [4-1](#464036_1_En_4_Chapter.xhtml#Tab1)).
    Let’s imagine that the call to `HelloWorldController.hello` takes quite some time
    but we don’t want to block the server for that.


    #### Use a Callable


    ```

    package com.apress.springbootrecipes.library;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import java.util.concurrent.Callable;

    import java.util.concurrent.ThreadLocalRandom;

    @RestController

    public class HelloWorldController {

    @GetMapping

    public Callable hello() {

    return () -> {

    Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

    return "Hello World, from Spring Boot 2!";

    };

    }

    }

    ```


    The `hello` method now returns a `Callable<String>` instead of returning a `String`
    directly. Inside the newly constructed `Callable<String>` there is a random wait
    to simulate a delay before the message is returned to the client.


    Now when making a reservation, you will see something in the logs similar to Figure
    [4-1](#464036_1_En_4_Chapter.xhtml#Fig1).


    ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig1_HTML.jpg](images/464036_1_En_4_Chapter/464036_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Logging Output


    You notice that request handling is started on a certain thread (here `nio-8080-exec-1`).
    Another thread is doing the processing and returning the result (here, `task-1`).
    Finally, the request is dispatched to the `DispatcherServlet` again to handle
    the result on yet another thread (here `nio-8080-exec-2)`.


    #### Use a CompletableFuture


    Change the signature of the method to return `CompletableFuture<String>` and use
    the `TaskExecutor` to asynchronously execute the code.


    ```

    @RestController

    public class HelloWorldController {

    private final TaskExecutor taskExecutor;

    public HelloWorldController(TaskExecutor taskExecutor) {

    this.taskExecutor = taskExecutor;

    }

    @GetMapping

    public CompletableFuture hello() {

    return CompletableFuture.supplyAsync(() -> {

    randomDelay();

    return "Hello World, from Spring Boot 2!";

    }, taskExecutor);

    }

    private void randomDelay() {

    try {

    Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

    } catch (InterruptedException e) {

    Thread.currentThread().interrupt();

    }

    }

    }

    ```


    Calling the `supplyAsync` (or when using `void,` use `runAsync`) a task is submitted.
    It returns a `CompletableFuture`. Here you use the `supplyAsync` method that takes
    both a `Supplier` and an `Executor`. This way you can reuse the `TaskExecutor`
    for async processing. If you use the `supplyAsync` method, which only takes a
    `Supplier,` it will be executed using the default fork/join pool available on
    the JVM.


    When returning a `CompletableFuture`, you can take advantage of all the features
    of it like composing and chaining multiple `CompletableFuture` instances.


    #### Testing Async Controllers


    Just as with regular controllers, the Spring MVC Test framework can be used to
    test async controllers.


    Create a test class and annotate it with `@WebMvcTest(HelloWorldController.class)`
    and `@RunWith(SpringRunner.class)`. The `@WebMvcTest` will bootstrap a minimal
    Spring Boot application containing the things needed to test the controller. It
    automatically configures Spring MockMvc, which is autowired into the test.


    ```

    @RunWith(SpringRunner.class)

    @WebMvcTest(HelloWorldController.class)

    public class HelloWorldControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @Test

    public void testHelloWorldController() throws Exception {

    MvcResult mvcResult = mockMvc.perform(get("/"))

    .andExpect(request().asyncStarted())

    .andDo(MockMvcResultHandlers.log())

    .andReturn();

    mockMvc.perform(asyncDispatch(mvcResult))

    .andExpect(status().isOk())

    .andExpect(content().contentTypeCompatibleWith(TEXT_PLAIN))

    .andExpect(content().string("Hello World, from Spring Boot 2!"));

    }

    }

    ```


    The main difference between an async web test and a regular web test is the fact
    that the async dispatching needs to be initiated. First the initial request is
    performed and validated for async to be started. For debugging purposes you could
    log the result with `MockMvcResultHandlers.log()`. Next, the `asyncDispatch` is
    applied. Finally we can assert the expected response.


    #### Configuring Async Processing


    Depending on your needs, you probably also want to configure an explicit `TaskExecutor`
    for the asynchronous request handling instead of using the default `TaskExecutor`
    provided by Spring Boot.


    To configure async processing, you override the `configureAsyncSupport` method
    of `WebMvcConfigurer` . Overriding this method gives you access to the `AsyncSupportConfigurer`.
    This allows you to set the AsyncTaskExecutor to use (among others).


    ```

    @SpringBootApplication

    public class HelloWorldApplication implements WebMvcConfigurer {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    @Override

    public void configureAsyncSupport(AsyncSupportConfigurer configurer) {

    configurer.setTaskExecutor(mvcTaskExecutor());

    }

    @Bean

    public ThreadPoolTaskExecutor mvcTaskExecutor() {

    ThreadPoolTaskExecutor taskExecutor = new ThreadPoolTaskExecutor();

    taskExecutor.setThreadNamePrefix("mvc-task-");

    return taskExecutor;

    }

    }

    ```


    ## 4.2 Response Writers


    ### Problem


    You have a service, or multiple calls, and want to collect the results and send
    the response to the client.


    ### Solution


    Use a `ResponseBodyEmitter` (or its subclass `SseEmitter`) to collect and send
    the response to the client.


    ### How It Works'
