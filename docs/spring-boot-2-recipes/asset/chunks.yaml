- fmt: '### Tip


    When writing this test and using the default user, you might want to set a default
    password using the `spring.security.user.password`. This recipe uses a `@TestPropertySource`
    to do so, but you could add it to the `application.properties` as well.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    @TestPropertySource(properties = "spring.security.user.password=s3cr3t")

    public class BookControllerIntegrationTest {

    @Autowired

    private TestRestTemplate testRestTemplate;

    @MockBean

    private BookService bookService;

    @Test

    public void shouldReturnListOfBooks() throws Exception {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", "Marten Deinum", "Josh Long"),

    new Book("321", "Pro Spring MVC", "Marten Deinum", "Colin Yates")));

    ResponseEntity books = testRestTemplate

    .withBasicAuth("user", "s3cr3t")

    .getForEntity("/books", Book[].class);

    assertThat(books.getStatusCode()).isEqualTo(HttpStatus.OK);

    assertThat(books.getBody()).hasSize(2);

    }

    }

    ```


    The test uses the default-configured `TestRestTemplate` to issue a request. The
    `withBasicAuth` uses the default `user` and preset `s3cr3t` as the username and
    password to send to the server. The `getForEntity` can be used to get the result,
    including some additional information about the response. Using the `ResponseEntity`
    it is also possible to validate the status code, etc.


    When testing a WebFlux-based application instead of the `TestRestTemplate`, you
    would need the `WebTestClient` (see also Chapter [5](#464036_1_En_5_Chapter.xhtml)
    for more information on Spring WebFlux). The `WebTestClient` has the `headers()`
    function to add additional headers to the request. It exposed the `HttpHeaders`,
    which in turn has the convenient `setBasicAuth` method to apply the basic authentication.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    @TestPropertySource(properties = "spring.security.user.password=s3cr3t")

    public class BookControllerIntegrationWebClientTest {

    @Autowired

    private WebTestClient webTestClient;

    @MockBean

    private BookService bookService;

    @Test

    public void shouldReturnListOfBooks() throws Exception {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", "Marten Deinum", "Josh Long"),

    new Book("321", "Pro Spring MVC", "Marten Deinum", "Colin Yates")));

    webTestClient

    .get()

    .uri("/books")

    .headers( headers -> headers.setBasicAuth("user", "s3cr3t"))

    .exchange()

    .expectStatus().isOk()

    .expectBodyList(Book.class).hasSize(2);

    }

    }

    ```


    The request is built and “fired” using `exchange()`. Then the result is expected
    to be an HTTP 200 (OK) and the result contains two books.


    ## 6.2 Logging into Web Applications


    ### Problem


    A secure application requires its users to log in before they can access certain
    secure functions. This is especially important for applications running on the
    open Internet, because hackers can easily reach them. Most applications have to
    provide a way for users to input their credentials to log in.


    ### Solution


    Spring Security supports multiple ways for users to log into a web application.
    It supports form-based login by providing a default web page that contains a login
    form. You can also provide a custom web page as the login page. In addition, Spring
    Security supports HTTP Basic authentication by processing the Basic authentication
    credentials presented in HTTP request headers. HTTP Basic authentication can also
    be used for authenticating requests made with remoting protocols and web services.


    Some parts of your application may allow for anonymous access (e.g., access to
    the welcome page). Spring Security provides an anonymous login service that can
    assign a principal and grant authorities to an anonymous user, so that you can
    handle an anonymous user like a normal user when defining security policies.


    Spring Security also supports remember-me login, which is able to remember a user’s
    identity across multiple browser sessions so that a user needn’t log in again
    after logging in for the first time.


    ### How It Works


    Spring Boot enables the default security settings when no explicit `WebSecurityConfigurerAdapter`
    can be found. When one or more are found, it will use those to configure the security.


    To help you better understand the various login mechanisms in isolation, let’s
    first disable the default security configuration.


    ### Caution


    You generally want to stick with the defaults and just disable what you don’t
    want, like `httpBasic().disable()`, instead of disabling all of the security defaults!


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    public LibrarySecurityConfig() {

    super(true); // disable default configuration

    }

    }

    ```


    Note that the login services introduced next will be registered automatically
    if you enable HTTP auto-config. However, if you disable the default configuration
    or you want to customize these services, you have to configure the corresponding
    features explicitly.


    Before enabling the authentication features you will have to enable basic Spring
    Security requirements; you need at least to configure exception handling and security
    context integration.


    ```

    @Override

    protected void configure(HttpSecurity http) {

    http.securityContext()

    .and()

    .exceptionHandling();

    }

    ```


    Without these basics, Spring Security wouldn’t store the user after doing a login
    and it wouldn’t do proper exception translation for security-related exceptions
    (they would simply bubble up, which might expose some of your internals to the
    outside world). You also might want to enable the Servlet API integration so that
    you can use the methods on the `HttpServletRequest` to do checks in your view.


    ```

    @Override

    protected void configure(HttpSecurity http) {

    http.servletApi();

    }

    ```


    #### HTTP Basic Authentication


    The HTTP Basic authentication support can be configured via the `httpBasic()`
    method. When HTTP Basic authentication is required, a browser will typically display
    a login dialog or a browser-specific login page for users to log in.


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter {

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    ...

    .httpBasic();

    }

    }

    ```'
