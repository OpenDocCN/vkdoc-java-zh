    ### 工作原理


    当添加 `spring-boot-starter-actuator` 依赖后，Spring Boot 会根据应用程序上下文中的 Bean 自动设置健康检查和指标。具体暴露哪些健康检查和指标，取决于已启用的
    Bean 和功能。当检测到 `DataSource` 时，系统会收集并暴露其指标以及健康状态。Spring Boot 对许多组件（如 Hibernate、RabbitMQ、缓存等）都采用此机制。


    要启用 Actuator，请将依赖添加到您的应用程序中（此处假设以配方 3.3 的源码为起点）。


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    ```


    现在，启动应用程序时，Spring Boot 将配置好 Actuator，并且可以通过 JMX（图 10-1，关于如何使用 JConsole 请参见配方 8.4）和
    Web（默认路径为 `/actuator`）进行访问（见图 10-2）。


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig2_HTML.jpg](img/464036_1_En_10_Fig2_HTML.jpg)


    图 10-2


    HTTP 暴露的指标


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig1_HTML.jpg](img/464036_1_En_10_Fig1_HTML.jpg)


    图 10-1


    JMX 暴露的指标


    您会注意到，JMX 暴露的端点比 HTTP 多得多。HTTP 仅暴露 `/actuator/health` 和 `/actuator/info`。而 JMX
    暴露了更多端点。这是出于安全考虑：`/actuator` 是公开暴露的，因此您不希望所有人都能看到所有信息。可以通过 `management.endpoints.web.exposure.include`
    和 `management.endpoints.web.exposure.exclude` 属性来配置要暴露的内容。在 `include` 中使用 `*`
    将向 Web 暴露所有端点。


    ```

    management.endpoints.web.exposure.include=*

    ```


    将上述配置添加到 `application.properties` 后，Web 将暴露与 JMX 相同的功能（图 10-3）。


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig3_HTML.jpg](img/464036_1_En_10_Fig3_HTML.jpg)


    图 10-3


    HTTP 暴露的指标（全部）


    #### 配置管理服务器


    默认情况下，Actuator 与常规应用程序使用相同的端口和地址（`http://localhost:8080`）。但是，将管理端点运行在不同的端口上非常容易（也很常见）。这可以通过
    `management.server` 命名空间中的属性进行配置；其中大多数属性模仿了常规 `server` 命名空间中的属性（表 10-1）。


    表 10-1


    管理服务器属性


    | 属性 | 描述 |

    | --- | --- |

    | `management.server.add-application-context-header` | 向响应中添加一个包含应用程序上下文名称的 `X-Application-Context`
    头 |

    | `management.server.port` | 管理服务器运行的端口，默认与 `server.port` 相同 |

    | `management.server.address` | 要绑定的网络地址，默认与 `server.address` 相同（即 `0.0.0.0` 所有地址）
    |

    | `management.server.servlet.context-path` | 管理服务器的上下文路径，默认为空，即 `/` |

    | `management.server.ssl.*` | 用于为管理服务器配置 SSL 的 SSL 属性（关于如何配置 SSL，请参见配方 3.8） |


    将以下内容添加到 `application.properties` 中，将在单独的端口上运行管理端点，并添加 `X-Application-Context`
    头。


    ```

    management.server.add-application-context-header=true

    management.server.port=8090

    ```


    重新启动应用程序后，管理端点现在可在 `http://localhost:8090/actuator` 上访问。将 Actuator 运行在不同的端口上，其好处是可以通过在防火墙上阻止该端口来将其对公共互联网隐藏，仅允许本地访问。


    ### 注意


    `management.server` 属性仅在使用嵌入式服务器时有效；当部署到外部服务器时，这些属性将不再适用！


    #### 配置单个管理端点


    可以通过 `management.endpoint.<endpoint-name>` 命名空间中的属性来配置单个端点。大多数端点至少有一个 `enabled`
    属性和一个 `cache.time-to-live` 属性。前者用于启用或禁用端点，后者用于指定端点结果的缓存时间（表 10-2）。


    表 10-2


    端点配置属性


    | 属性 | 描述 |

    | --- | --- |

    | `management.endpoint.<endpoint-name>.enabled` | 特定端点是否启用，通常默认为 `true`，有时取决于某个功能的可用性（例如，如果
    Flyway 不存在，则启用 flyway 端点将不会产生任何效果） |

    | `management.endpoint.<endpoint-name>.cache.time-to-live` | 响应的缓存时间，默认为 0ms，表示不缓存
    |

    | `management.endpoint.health.show-details` | 是否显示健康端点的详细信息，默认为 `never`，可更改为 `always`
    或 `when-authorized` |

    | `management.endpoint.health.roles` | 允许查看详细信息的角色（与 `show-details` 的 `when-authorized`
    值一起使用） |


    将 `management.endpoint.health.show-details=always` 添加到 `application.properties`
    中，将显示有关应用程序健康状况的更多信息。默认情况下，它只显示 UP，但现在您可以查看应用程序健康信息的不同部分（图 10-4）。


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig4_HTML.jpg](img/464036_1_En_10_Fig4_HTML.jpg)


    图 10-4


    扩展的健康端点输出


    #### 保护管理端点


    当 Spring Boot 同时检测到 Spring Boot Actuator 和 Spring Security 时，它会自动启用对管理端点的安全访问。访问端点时，将显示一个基本登录提示，要求输入用户名和密码。Spring
    Boot 会生成一个默认的 `user`，用户名为 user，并附带一个生成的密码（参见配方 6.1）用于登录。


    在 `spring-boot-starter-actuator` 之外再添加 `spring-boot-starter-security` 就足以保护管理端点的安全。


    ```

    org.springframework.boot

    spring-boot-starter-security


    ```


    这将在您的应用程序和管理端点中启用安全性。现在，当访问端点 `http://localhost:8090/actuator` 时，将显示一个基本登录提示。输入正确的凭据后，您应该仍然能够看到结果。


    #### 配置健康检查


    Spring Boot Actuator 的功能之一是进行健康检查。这些检查通过 `http://localhost:8090/actuator/health`
    暴露；如果应用程序处于 UP 或 DOWN 状态，则会生成相应结果。健康端点会调用系统中所有可用的 `HealthIndicator`，并在端点中报告这些信息。可以通过设置
    `management.health.<health-indicator>.enabled` 属性来控制哪些 `HealthIndicator` 存在。对于不可用的功能（例如，在没有
    `DataSource` 的情况下尝试获取其信息），将属性设置为 `true` 是无效的。


    ```

    management.health.diskspace.enabled=false

    ```


    这将禁用磁盘空间的健康检查，并且它不再属于健康检查的一部分。

