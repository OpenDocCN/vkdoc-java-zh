    ## 7.3 Use JPA


    ### Problem


    You want to use JPA in your Spring Boot application.


    ### Solution


    Spring Boot automatically detects the presence of Hibernate, and the needed JPA
    classes will use that information to configure the `EntityManagerFactory`.


    ### How It Works


    Spring Boot has out-of-the-box support for JPA through Hibernate.^([^(30)](#fn30))
    When Hibernate is detected, an `EntityManagerFactory` will be automatically configured
    using the earlier configured `DataSource (see Recipe 7.1)`.


    First you need to add `hibernate-core` and `spring-orm` as a dependency to your
    project. However, it is easier to add the `spring-boot-starter-data-jpa` dependency
    to your project (although this will also pull in `spring-data-jpa` as a dependency.)


    ```

    org.springframework.boot

    spring-boot-starter-data-jpa


    ```


    This will add all the necessary dependencies to the classpath.


    #### Using Plain JPA Repositories


    For JPA to work you have to annotate the classes representing entities in your
    system. In your system we are going to store and retrieve the `Customer` from
    the database. We need to mark this as an entity using the `@Entity` annotation.
    A JPA entity class is required to have a default no-args constructor (although
    it can be package private) and a field marked with `@id` to mark the primary key.


    ```

    @Entity

    public class Customer {

    @Id

    @GeneratedValue(strategy = GenerationType.IDENTITY)

    private long id;

    @Column(nullable = false)

    private final String name;

    @Column(nullable = false)

    private final String email;

    Customer() {

    this(null,null);

    }

    // Other code omitted

    }

    ```


    Next, create a JPA implementation of the `CustomerRepository` (see Recipe 7.2);
    to use JPA you have to get the `EntityManager` . This is done by declaring a field
    and annotating it with `@PersistenceContext` .


    ```

    package com.apress.springboot2recipes.jpa;

    import org.springframework.stereotype.Repository;

    import javax.persistence.EntityManager;

    import javax.persistence.PersistenceContext;

    import java.util.List;

    @Repository

    class JpaCustomerRepository implements CustomerRepository {

    @PersistenceContext

    private EntityManager em;

    @Override

    public List findAll() {

    var query = em.createQuery("SELECT c FROM Customer c", Customer.class);

    return query.getResultList();

    }

    @Override

    public Customer findById(long id) {

    return em.find(Customer.class, id);

    }

    @Override

    public Customer save(Customer customer) {

    em.persist(customer);

    return customer;

    }

    }

    ```


    The following application class (similar to the one of Recipe 7.2) will read all
    `Customer`s from the database and print them to the logging (Figure [7-4](#464036_1_En_7_Chapter.xhtml#Fig4)).


    ![../images/464036_1_En_7_Chapter/464036_1_En_7_Fig4_HTML.jpg](images/464036_1_En_7_Chapter/464036_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    JPA Customer output


    ```

    package com.apress.springboot2recipes.jpa;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.ApplicationArguments;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.stereotype.Component;

    @SpringBootApplication

    public class JpaApplication {

    public static void main(String[] args) {

    SpringApplication.run(JpaApplication.class, args);

    }

    }

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( customer -> logger.info("{}", customer));

    }

    }

    ```


    There are some configuration options you can use to configure the `EntityManagerFactory`
    in your application; those properties can be found in the `spring.jpa` namespace.


    Table 7-4


    JPA Properties


    | Property | Description |

    | --- | --- |

    | `spring.jpa.database` | Target database to operate on, auto-detected by default.
    |

    | `spring.jpa.database-platform` | Name of the target database to operate on,
    auto-detected by default. Can be used to specify a specific Hibernate `Dialect`
    to use. |

    | `spring.jpa.generate-ddl` | Initialize the schema on startup, default is `false`.
    |

    | `spring.jpa.show-sql` | Enable logging of SQL statements, default is `false`.
    |

    | `spring.jpa.open-in-view` | Register the `OpenEntityManagerInViewInterceptor`.
    Binds the `EntityManager` to the request processing thread. Default `true`. |

    | `spring.jpa.hibernate.ddl-auto` | Shorthand for the `hibernate.hbm2ddl.auto`
    property. Default `none` and `create-drop` for embedded databases. |

    | `spring.jpa.hibernate.use-new-id-generator-mappings` | Shorthand for the `hibernate.id.new_generator_mappings`
    property. When not explicitly set, defaults to `true`. |

    | `spring.jpa.hibernate.naming.implicit-strategy` | FQN of the implicit naming
    strategy, default `org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy.`
    |

    | `spring.jpa.hibernate.naming.physical-strategy` | FQN of the physical naming
    strategy, default `org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy.`
    |

    | `spring.jpa.mapping-resources` | Additional XML files containing entity mappings
    in XML instead of Java. Like the JPA specified `orm.xml`. |

    | `spring.jpa.properties` `.*` | Additional properties to set on the JPA provider.
    |


    The `spring.jpa.properties` is useful if you want to configure advanced features
    of Hibernate like the fetch size `hibernate.jdbc.fetch_size` or batch size `hibernate.jdbc.batch_size`
    when doing batch processing.


    ```

    spring.jpa.properties.hibernate.jdbc.fetch_size=250

    spring.jpa.properties.hibernate.jdbc.batch_size=50

    ```


    This will set the properties on the JPA provider.'
