  raw: '### Solution


    When adding Spring Security as a dependency to a WebFlux-based application, Spring
    Boot will automatically enable security. It will add an `@EnableWebFluxSecurity`
    annotated configuration class to the application. The `@EnableWebFluxSecurity`
    annotation then imports the default Spring Security `WebFluxSecurityConfiguration`.


    ### How It Works


    A Spring WebFlux application is very different in nature than a regular Spring
    MVC application; nonetheless, Spring Boot and Spring Security strive to make it
    easier to build secure WebFlux-based applications.


    To get security enabled, add the `spring-boot-starter-security` to your WebFlux
    application (from Recipe 5.3).


    ```

    org.springframework.boot

    spring-boot-starter-security


    ```


    This will add the `spring-security-core`, `spring-security-config`, and `spring-security-web`
    dependencies to your project. Spring Boot detects the availability of some of
    the classes inside these JAR files, and with that will automatically enable security.


    Spring Boot will configure Spring Security with the following: authentication
    with Basic Authentication and form login’ enable HTTP headers for security; and
    require a login to access any resource.


    ### Warning


    Spring Boot will add a default user, named `user`, with a generated password,
    visible in the startup logs. This is only intended to be used for testing, prototyping,
    or demos; do not use the generated user in a live system!.


    When adding the dependency `spring-boot-starter-security` to Recipe 5.3, it will
    automatically secure all exposed endpoints. At startup the generated password
    will be logged (Figure [6-4](#464036_1_En_6_Chapter.xhtml#Fig4)).


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig4_HTML.jpg](images/464036_1_En_6_Chapter/464036_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Secure WebFlux output


    Now when trying to access `http://localhost:8080/` a login page will be shown
    (Figure [6-5](#464036_1_En_6_Chapter.xhtml#Fig5)).


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig5_HTML.jpg](images/464036_1_En_6_Chapter/464036_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Default login page


    #### Securing URL Access


    Access rules can be configured by adding a custom `SecurityWebFilterChain` . First
    let’s create an `OrdersSecurityConfiguration.`


    ```

    @Configuration

    public class OrdersSecurityConfiguration { ... }

    ```


    The `WebFluxSecurityConfiguration` class from Spring Security detects instances
    of `SecurityWebFilterChain` (containing the security configuration), which is
    wrapped as a `WebFilter` which in turn is used by WebFlux to add behavior to incoming
    request (just as a normal Servlet Filter).


    Currently the configuration only enables security; let’s add some security rules.


    ```

    @Bean

    SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http) throws Exception
    {

    return http

    .authorizeExchange()

    .pathMatchers("/").permitAll()

    .pathMatchers("/orders*").hasRole("USER")

    .anyExchange().authenticated()

    .and().build();

    }

    ```


    The `ServerHttpSecurity` should look familiar (see other recipes in this chapter)
    and is used to add security rules and do further configuration (like adding/removing
    headers and configure the login method). With the `authorizeExchange` it is possible
    to write rules, where with secure URLs the `/` is permitted for everyone and the
    `/orders` URLs are only available for the role `USER`. For other requests you
    have at least to be authenticated. Finally you need to call `build()` to actually
    build the `SecurityWebFilterChain`.


    Next to the `authorizeExchange` it is also possible to use the `headers()` configuration
    method to add security headers to requests, `csrf()` for adding CSRF protection,
    etc.


    #### Logging in to Web Flux Applications


    You could override parts of the default configuration by explicitly configuring
    them; you could override the authentication manager used and the repository used
    to store the security context. The authentication manager is detected automatically;
    you just need to register a bean of type `ReactiveAuthenticationManager` or of
    `UserDetailsRepository`.


    You can also configure the location where the `SecurityContext` is stored by configuring
    the `ServerSecurityContextRepository` . The default implementation used is the
    `WebSessionServerSecurityContextRepository`, which stores the context in the `WebSession`.
    The other default implementation is the `NoOpServerSecurityContextRepository`
    , which is used in stateless applications.


    ```

    @Bean

    SecurityWebFilterChain springWebFilterChain(HttpSecurity http) throws Exception
    {

    return http

    .httpBasic().

    .and().formLogin().

    .authenticationManager(new CustomReactiveAuthenticationManager())

    .securityContextRepository(

    new ServerWebExchangeAttributeSecurityContextRepository())

    .and().build();

    }

    ```


    This would override the defaults with a `CustomReactiveAuthenticationManager`
    and the stateless `NoOpServerSecurityContextRepository`. However, for our application
    we are going to stick with the defaults.


    #### Authenticating Users


    Authenticating users in a Spring WebFlux-based application is done through a `ReactiveAuthenticationManager`
    ; this is an interface with a single `authenticate` method. You can either provide
    your own implementation or use one of the two provided implementations. The first
    is the `UserDetailsRepositoryAuthenticationManager`, which wraps an instance of
    `ReactiveUserDetailsService`.


    ### Note


    The `ReactiveUserDetailsService` has only a single implementation, the `MapReactiveUserDetailsService`,
    which is an in-memory implementation. You could provide your own implementation
    based on a Reactive datastore (like MongoDB or Couchbase).


    The other implementation, the `ReactiveAuthenticationManagerAdapter` , is actually
    a wrapper for a regular `AuthenticationManager`. It will wrap a regular instance
    and because of that you can use the blocking implementations in a reactive way.
    This doesn’t make them reactive: they still block, but they are reusable this
    way. With this you could use JDBC, LDAP, etc. also for your reactive application.


    When configuring Spring Security in a Spring WebFlux application, you can either
    add an instance of a `ReactiveAuthenticationManager` to your Java configuration
    class or a `UserDetailsRepository` . When the latter is detected, it will automatically
    be wrapped in a `UserDetailsRepositoryAuthenticationManager`.


    ```

    @Bean

    public MapUserDetailsRepository userDetailsRepository() {

    UserDetails marten =

    User.withUsername("marten").password("secret")

    .roles("USER").build();

    UserDetails admin =

    User.withUsername("admin").password("admin")

    .roles("USER","ADMIN").build();

    return new MapUserDetailsRepository(marten, admin);

    }

    ```


    When you now run the application you would be free to access the `/` page but
    when accessing a URL starting with `/orders` you would be greeted by a login form
    (see Figure [6-5](#464036_1_En_6_Chapter.xhtml#Fig5)). When entering the credentials
    of one of the predefined users, you should be allowed access to the requested
    URL.


    #### Making Access Control Decisions


    At some point in your application you need to grant access to a user, based on
    the authorities or roles the user has. Spring Security provides some built-in
    expressions (Table [6-9](#464036_1_En_6_Chapter.xhtml#Tab9)) to handle that.


    Table 6-9


    Spring Security WebFlux Built-in Expressions


    | Expression | Description |

    | --- | --- |

    | `hasRole(''role'') or hasAuthority(''authority'')` | Returns true if the current
    user has the given role |

    | `permitAll()` | Always evaluates to `true` |

    | `denyAll()` | Always evaluates to `false` |

    | `authenticated()` | Returns `true` if the user is authenticated |

    | `access()` | Use a function to determine if access is granted |'
  trans: '

    ### 解决方案


    当将 Spring Security 作为依赖项添加到基于 WebFlux 的应用程序时，Spring Boot 会自动启用安全功能。它会向应用程序添加一个带有
    `@EnableWebFluxSecurity` 注解的配置类。`@EnableWebFluxSecurity` 注解随后会导入默认的 Spring Security
    `WebFluxSecurityConfiguration`。


    ### 工作原理


    Spring WebFlux 应用程序在本质上与常规的 Spring MVC 应用程序有很大不同；尽管如此，Spring Boot 和 Spring Security
    仍致力于让构建安全的 WebFlux 应用程序变得更加容易。


    要启用安全功能，请将 `spring-boot-starter-security` 添加到你的 WebFlux 应用程序中（来自配方 5.3）。


    ```

    org.springframework.boot

    spring-boot-starter-security


    ```


    这会将 `spring-security-core`、`spring-security-config` 和 `spring-security-web` 依赖项添加到你的项目中。Spring
    Boot 会检测这些 JAR 文件中某些类的可用性，并据此自动启用安全功能。


    Spring Boot 将使用以下方式配置 Spring Security：使用基本认证和表单登录进行身份验证；启用 HTTP 安全标头；并要求登录才能访问任何资源。


    ### 警告


    Spring Boot 会添加一个默认用户，名为 `user`，并附带一个生成的密码，该密码会在启动日志中显示。这仅用于测试、原型设计或演示；请勿在生产系统中使用生成的用户！


    当将依赖项 `spring-boot-starter-security` 添加到配方 5.3 时，它会自动保护所有暴露的端点。在启动时，生成的密码会被记录下来（图
    6-4）。


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig4_HTML.jpg](img/464036_1_En_6_Fig4_HTML.jpg)


    图 6-4


    安全的 WebFlux 输出


    现在，当尝试访问 `http://localhost:8080/` 时，将显示一个登录页面（图 6-5）。


    ![../images/464036_1_En_6_Chapter/464036_1_En_6_Fig5_HTML.jpg](img/464036_1_En_6_Fig5_HTML.jpg)


    图 6-5


    默认登录页面


    #### 保护 URL 访问


    可以通过添加自定义的 `SecurityWebFilterChain` 来配置访问规则。首先，让我们创建一个 `OrdersSecurityConfiguration`。


    ```

    @Configuration

    public class OrdersSecurityConfiguration { ... }

    ```


    Spring Security 中的 `WebFluxSecurityConfiguration` 类会检测 `SecurityWebFilterChain`
    的实例（包含安全配置），该实例被包装为一个 `WebFilter`，而 `WebFilter` 又被 WebFlux 用于为传入请求添加行为（就像普通的 Servlet
    过滤器一样）。


    目前，该配置仅启用了安全功能；让我们添加一些安全规则。


    ```

    @Bean

    SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http) throws Exception
    {

    return http

    .authorizeExchange()

    .pathMatchers("/").permitAll()

    .pathMatchers("/orders*").hasRole("USER")

    .anyExchange().authenticated()

    .and().build();

    }

    ```


    `ServerHttpSecurity` 应该看起来很熟悉（请参阅本章中的其他配方），它用于添加安全规则并进行进一步配置（例如添加/删除标头和配置登录方法）。通过
    `authorizeExchange`，可以编写规则，其中对于安全的 URL，`/` 允许所有人访问，而 `/orders` URL 仅对角色 `USER`
    可用。对于其他请求，你至少需要进行身份验证。最后，你需要调用 `build()` 来实际构建 `SecurityWebFilterChain`。


    除了 `authorizeExchange`，还可以使用 `headers()` 配置方法向请求添加安全标头，使用 `csrf()` 添加 CSRF 保护等。


    #### 登录 WebFlux 应用程序


    你可以通过显式配置来覆盖默认配置的某些部分；你可以覆盖所使用的身份验证管理器以及用于存储安全上下文的存储库。身份验证管理器是自动检测的；你只需要注册一个类型为
    `ReactiveAuthenticationManager` 或 `UserDetailsRepository` 的 Bean。


    你还可以通过配置 `ServerSecurityContextRepository` 来配置 `SecurityContext` 的存储位置。默认使用的实现是
    `WebSessionServerSecurityContextRepository`，它将上下文存储在 `WebSession` 中。另一个默认实现是 `NoOpServerSecurityContextRepository`，它用于无状态应用程序。


    ```

    @Bean

    SecurityWebFilterChain springWebFilterChain(HttpSecurity http) throws Exception
    {

    return http

    .httpBasic().

    .and().formLogin().

    .authenticationManager(new CustomReactiveAuthenticationManager())

    .securityContextRepository(

    new ServerWebExchangeAttributeSecurityContextRepository())

    .and().build();

    }

    ```


    这将使用 `CustomReactiveAuthenticationManager` 和无状态的 `NoOpServerSecurityContextRepository`
    覆盖默认值。但是，对于我们的应用程序，我们将坚持使用默认值。


    #### 验证用户身份


    在基于 Spring WebFlux 的应用程序中，用户身份验证是通过 `ReactiveAuthenticationManager` 完成的；这是一个包含单个
    `authenticate` 方法的接口。你可以提供自己的实现，或者使用两个提供的实现之一。第一个是 `UserDetailsRepositoryAuthenticationManager`，它包装了一个
    `ReactiveUserDetailsService` 实例。


    ### 注意


    `ReactiveUserDetailsService` 只有一个实现，即 `MapReactiveUserDetailsService`，这是一个内存实现。你可以基于响应式数据存储（如
    MongoDB 或 Couchbase）提供自己的实现。


    另一个实现 `ReactiveAuthenticationManagerAdapter` 实际上是常规 `AuthenticationManager` 的包装器。它将包装一个常规实例，因此你可以以响应式方式使用阻塞式实现。这并不会使它们变成响应式：它们仍然会阻塞，但这种方式使它们可重用。通过这种方式，你也可以为你的响应式应用程序使用
    JDBC、LDAP 等。


    在 Spring WebFlux 应用程序中配置 Spring Security 时，你可以将 `ReactiveAuthenticationManager`
    的实例或 `UserDetailsRepository` 添加到你的 Java 配置类中。当检测到后者时，它将自动被包装在 `UserDetailsRepositoryAuthenticationManager`
    中。


    ```

    @Bean

    public MapUserDetailsRepository userDetailsRepository() {

    UserDetails marten =

    User.withUsername("marten").password("secret")

    .roles("USER").build();

    UserDetails admin =

    User.withUsername("admin").password("admin")

    .roles("USER","ADMIN").build();

    return new MapUserDetailsRepository(marten, admin);

    }

    ```


    现在，当你运行应用程序时，你可以自由访问 `/` 页面，但当访问以 `/orders` 开头的 URL 时，你会看到一个登录表单（见图 6-5）。输入预定义用户的凭据后，你应该被允许访问请求的
    URL。


    #### 做出访问控制决策


    在应用程序的某个时刻，你需要根据用户拥有的权限或角色来授予用户访问权限。Spring Security 提供了一些内置表达式（表 6-9）来处理这个问题。


    表 6-9


    Spring Security WebFlux 内置表达式


    | 表达式 | 描述 |

    | --- | --- |

    | `hasRole(''role'') 或 hasAuthority(''authority'')` | 如果当前用户拥有给定角色，则返回 true |

    | `permitAll()` | 始终评估为 `true` |

    | `denyAll()` | 始终评估为 `false` |

    | `authenticated()` | 如果用户已通过身份验证，则返回 `true` |

    | `access()` | 使用函数来确定是否授予访问权限 |

