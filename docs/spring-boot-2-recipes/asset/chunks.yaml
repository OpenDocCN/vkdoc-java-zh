- fmt: '### Use Spring Data JPA Repositories


    Instead of writing your own repositories, which can be a tedious and repetitive
    task, you can also let Spring Data JPA do the heavy lifting for you. Instead of
    writing your own implementation, you can extend the `CrudRepository` interface
    from Spring Data and have a repository available at runtime. This saves you from
    writing the data access code. Spring Boot will also autoconfigure Spring Data
    JPA when it detects it on the classpath.


    ```

    public interface CustomerRepository extends CrudRepository { }

    ```


    That is all you need; the `findAll`, `findById`, and `save` methods, among others,
    are provided out-of-the-box by Spring Data JPA. You can remove the `JpaCustomerRepository`
    implementation. Due to the `CrudRepository<Customer, Long>`, Spring Data knows
    that it can query for `Customer` instances and that it has a `Long` as an id field.


    Running the application should result in the same output as before (see Figure
    7-4).


    There is only a single property available for Spring Data JPA and that is to enable
    or disable it explicitly. It is by default enabled. Setting the `spring.data.jpa.repositories.enabled`
    to `false` will disable Spring Data JPA.


    ### Including Entities from Different Packages


    By default, Spring Boot will detect components, repositories, and entities starting
    from the package the `@SpringBootApplication` annotated class is in. But what
    if you have entities in a different package that still need to be included? For
    this you can use the `@EntityScan` annotation; it works like `@ComponentScan`
    but then for `@Entity` annotated beans.


    ```

    package com.apress.springboot2recipes.order;

    import javax.persistence.Entity;

    import javax.persistence.Id;

    import java.util.Objects;

    @Entity

    public class Order {

    @Id

    private long id;

    private String number;

    public long getId() {

    return id;

    }

    public void setId(long id) {

    this.id = id;

    }

    public String getNumber() {

    return number;

    }

    public void setNumber(String number) {

    this.number = number;

    }

    // Other methods omitted

    }

    ```


    This `Order` class is in the `com.apress.springboot2recipes.order` package, which
    isn’t covered by the `@SpringBootApplication` annotated class as that is in the
    `com.apress.springboot2.recipes.jpa` package. To have this entity detected, you
    can add the `@EntityScan` annotation with the package(s) to scan to your `@SpringBootApplication`
    annotated class (or a regular `@Configuration` class).


    ```

    @SpringBootApplication

    @EntityScan({

    "com.apress.springboot2recipes.order",

    "com.apress.springboot2recipes.jpa" })

    ```


    With this addition the `Order` entity will now be detected and accessible by JPA.


    ### Testing JPA Repositories


    When testing JPA code, a database is required, often an embedded database like
    H2, Derby, or HSQLDB is used for testing. Spring Boot makes it very easy to write
    tests for JPA. JPA-based tests can be annotated with `@DataJpaTest`, and Spring
    Boot will create a minimal application with only the JPA-related beans like a
    `DataSource`, transaction manager, and if needed Spring Data JPA repositories.


    Let’s write a test for the `CustomerRepository` and use H2 as the embedded database.
    First, add H2 as a test dependency.


    ```

    com.h2database

    h2

    test

    ```


    Next, create the `CustomerRepositoryTest`.


    ```

    @RunWith(SpringRunner.class)

    @DataJpaTest

    @TestPropertySource(properties = "spring.flyway.enabled=false")

    public class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @Autowired

    private TestEntityManager testEntityManager

    }

    ```


    The `@RunWith(SpringRunner.class)` executes the test by a special JUnit runner
    to bootstrap the Spring Test Context framework. The `@DataJpaTest` will replace
    the preconfigured `DataSource` with an embedded one (H2 in this case). It will
    also bootstrap the JPA components and, when detected, Spring Data JPA repositories.


    Spring Boot also offers a `TestEntityManager`, which offers some convenience methods
    to easily store and find data for testing.


    Finally there is the `@TestPropertySource(properties = "spring.flyway.enabled=false")`,
    which indicates that we want to disable Flyway. The application uses Flyway to
    manage the schema; however, those scripts are written for PostgreSQL and not H2.
    For testing, you can let Hibernate manage the schema, which is also the default
    setting when using an embedded database with Spring Boot.


    Now, write a test that checks if records get inserted correctly.


    ```

    @Test

    public void insertNewCustomer() {

    assertThat(repository.findAll()).isEmpty();

    Customer customer = repository.save(new Customer(-1, "T. Testing", "t.testing@test123.tst"));

    assertThat(customer.getId()).isGreaterThan(-1L);

    assertThat(customer.getName()).isEqualTo("T. Testing");

    assertThat(customer.getEmail()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.getId())).isEqualTo(customer);

    }

    ```


    This test first asserts that the database is empty—not really required but can
    be useful to detect if other tests pollute the database. Next, a `Customer` is
    added to the database by calling the `save` method on the `CustomerRepository`.
    The resulting `Customer` is validated to have an id, and if the `name` and `email`
    attributes are there. Finally, the `Customer` is retrieved again and compared
    to be the same.


    Another test you could add is the `findAll` method. When inserting two records,
    calling `findAll` should result in two records being retrieved.


    ```

    @Test

    public void findAllCustomers() {

    assertThat(repository.findAll()).isEmpty();

    repository.save(new Customer(-1, "T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer(-1, "T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(2);

    }

    ```


    Of course there could be more assertions, but saving the data is already verified
    in the other test method.


    ## Use Plain Hibernate


    ### Problem


    You have some code that uses the plain Hibernate API, `Session`, and/or `SessionFactory`
    that you want to use with Spring Boot.


    ### Solution


    Use the `EntityManager` or `EntityManagerFactory` to obtain the plain Hibernate
    objects like `Session` or `SessionFactory`.


    ### How It Works


    When migrating older code to Spring Boot or when using a third-party library,
    it might not always be feasible to migrate everything to JPA. You want to use
    that code as is or with as little modification possible. There are two ways you
    can use the plain Hibernate API: either by getting the `Session` from the current
    `EntityManager` or configuring the `SessionFactory`. Which you want or can use
    depends on the influence you have on the code using the plain Hibernate API.'
