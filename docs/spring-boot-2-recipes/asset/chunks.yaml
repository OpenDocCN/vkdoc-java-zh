  raw: '#### Creating a WebSocketHandler


    To handle WebSocket messages and lifecycle events (handshake, connection established,
    etc.) you need to create a `WebSocketHandler` and register it to an endpoint URL.


    The `WebSocketHandler` defines five methods, which need implementing (Table [4-3](#464036_1_En_4_Chapter.xhtml#Tab3))
    if you would implement this interface directly. However, Spring already provides
    a nice class hierarchy that you can use to your advantage. When writing your own
    custom handlers, it is often enough to extend one of `TextWebSocketHandler` or
    `BinaryWebSocketHandler` which, as their names imply, can handle either text or
    binary messages.


    Table 4-3


    WebSocketHandler methods


    | Method | Description |

    | --- | --- |

    | `afterConnectionEstablished` | Invoked when the websocket connection is open
    and ready for use |

    | `handleMessage` | Called when a WebSocket message arrives for this handler |

    | `handleTransportError` | Called when an error occurs |

    | `afterConnectionClosed` | Invoked after the websocket connection has been closed
    |

    | `supportsPartialMessages` | If this handler supports partial messages: if set
    `true` the WebSocket messages can arrive over multiple calls. |


    Create `EchoHandler` by extending the `TextWebSocketHandler` and implement the
    `afterConnectionEstablished` and `handleTextMessage` methods.


    ```

    package com.apress.springbootrecipes.echo;

    import org.springframework.web.socket.TextMessage;

    import org.springframework.web.socket.WebSocketSession;

    import org.springframework.web.socket.handler.TextWebSocketHandler;

    public class EchoHandler extends TextWebSocketHandler {

    @Override

    public void afterConnectionEstablished(WebSocketSession session)

    throws Exception {

    session.sendMessage(new TextMessage("CONNECTION ESTABLISHED"));

    }

    @Override

    protected void handleTextMessage(WebSocketSession session,

    TextMessage message) throws Exception {

    var msg = message.getPayload();

    session.sendMessage(new TextMessage("RECEIVED: " + msg));

    }

    }

    ```


    When a connection is established, a `TextMessage` will be sent back to the client
    telling it that the connection was established. When a `TextMessage` is received,
    the payload (the actual message) is extracted and prefixed with `RECEIVED` and
    sent back to the client.


    Next you need to register this handler with a URI; to do so you can create a `@Configuration`
    class that implements `WebSocketConfigurer` and register it in the `registerWebSocketHandlers`
    method . Add this interface to the `EchoApplication` class.


    ```

    package com.apress.springbootrecipes.echo;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.web.socket.config.annotation.EnableWebSocket;

    import org.springframework.web.socket.config.annotation.WebSocketConfigurer;

    import org.springframework.web.socket.config.annotation.WebSocketHandlerRegistry;

    @SpringBootApplication

    @EnableWebSocket

    public class EchoApplication implements WebSocketConfigurer {

    public static void main(String[] args) {

    SpringApplication.run(EchoApplication.class, args);

    }

    @Bean

    public EchoHandler echoHandler() {

    return new EchoHandler();

    }

    @Override

    public void registerWebSocketHandlers(WebSocketHandlerRegistry registry) {

    registry.addHandler(echoHandler(), "/echo");

    }

    }

    ```


    First you register the `EchoHandler` as a bean so that it can be used to attach
    it to a URI. In the `registerWebSocketHandlers` you can use the `WebSocketHandlerRegistry`
    to register the handler. Using the `addHandler` method you can register the handler
    to a URI, in this case `/echo`. With this configuration we could use the `ws://localhost:8080/echo`
    URL to open a WebSocket connection from the client.


    Now that the server is ready, we need a client to connect to our WebSocket endpoint.
    For this you will need some JavaScript and HTML. Write the following `app.js`
    and place it in the `src/main/resources/static` directory.


    ```

    var ws = null;

    var url = "ws://localhost:8080/echo";

    function setConnected(connected) {

    document.getElementById(''connect'').disabled = connected;

    document.getElementById(''disconnect'').disabled = !connected;

    document.getElementById(''echo'').disabled = !connected;

    }

    function connect() {

    ws = new WebSocket(url);

    ws.onopen = function () {

    setConnected(true);

    };

    ws.onmessage = function (event) {

    log(event.data);

    };

    ws.onclose = function (event) {

    setConnected(false);

    log(''Info: Closing Connection.'');

    };

    }

    function disconnect() {

    if (ws != null) {

    ws.close();

    ws = null;

    }

    setConnected(false);

    }

    function echo() {

    if (ws != null) {

    var message = document.getElementById(''message'').value;

    log(''Sent: '' + message);

    ws.send(message);

    } else {

    alert(''connection not established, please connect.'');

    }

    }

    function log(message) {

    var console = document.getElementById(''logging'');

    var p = document.createElement(''p'');

    p.appendChild(document.createTextNode(message));

    console.appendChild(p);

    while (console.childNodes.length > 12) {

    console.removeChild(console.firstChild);

    }

    console.scrollTop = console.scrollHeight;

    }

    ```


    There are a few functions here. The first `connect` will be invoked when pressing
    the **Connect** button; this will open a WebSocket connection to `ws://localhost:8080/echo`,
    which is the handler created and registered earlier. Connecting to the server
    will create a `WebSocket` JavaScript object and that gives you the ability to
    listen to messages on the client. Here the `onopen` , `onmessage` , and `onclose`
    callbacks are defined. The most important is the `onmessage` because that will
    be invoked whenever a message comes in from the server; this method simply calls
    the `log` function, which will add the received message to the `logging` element
    on the screen.


    Next there is `disconnect`, which will close the WebSocket connection and clean
    up the JavaScript objects. Finally there is the `echo` function , which will be
    invoked whenever the **Echo Message** button is pressed. The given message will
    be sent to the server (and eventually will be returned).


    To use the `app.js` add the next `index.html` in `src/main/resources/static`.


    ```


    Connect

    Disconnect


    Echo message


    Logging


    ```


    Now when deploying the application, you can connect to the echo WebSocket service
    on `http://localhost:8080` and send a message and have them send it back (Figure
    [4-5](#464036_1_En_4_Chapter.xhtml#Fig5)).


    ![../images/464036_1_En_4_Chapter/464036_1_En_4_Fig5_HTML.jpg](images/464036_1_En_4_Chapter/464036_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    WebSocket client output


    #### Unit Testing a WebSocketHandler


    You want to write a unit test to make sure that the `EchoHandler` actually does
    what you want it to do. To unit test the `EchoHandler`, write a test and use Mockito
    (or another mocking framework) to mock the websocket parts.


    ```

    package com.apress.springbootrecipes.echo;

    import org.junit.Test;

    import org.springframework.web.socket.TextMessage;

    import org.springframework.web.socket.WebSocketSession;

    import static org.mockito.ArgumentMatchers.eq;

    import static org.mockito.Mockito.*;

    public class EchoHandlerTest {

    private final EchoHandler handler = new EchoHandler();

    @Test

    public void shouldEchoMessage() throws Exception {

    var mockSession = mock(WebSocketSession.class);

    var msg = new TextMessage("Hello World!");

    handler.handleTextMessage(mockSession, msg);

    verify(mockSession, times(1))

    .sendMessage(eq(new TextMessage("RECEIVED: Hello World!")));

    }

    }

    ```


    The test constructs an instance of the `EchoHandler`. In the test method the `WebSocketSession`
    is mocked. The `TextMessage` can simply be constructed. With the mocked `WebSocketSession`
    and `TextMessage` we call the `handleTextMessage`. To verify that it does what
    it is meant to do, we verify the behavior on the mocked `WebSocketSession`.'
