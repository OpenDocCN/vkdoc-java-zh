- fmt: '### How It Works


    To make Recipe 3.1 into a deployable WAR, three things need to be done:


    1. Change the packaging from JAR to WAR.

    2. Extend `SpringBootServletInitializer` to bootstrap the application on deployment.

    3. Change the scope of the embedded server to `provided`.


    In the `pom.xml` change the packaging from JAR to WAR.


    ```

    war

    ```


    To prevent the embedded container from adding its classes to the web application,
    the scope of the embedded container needs to be changed to `provided` instead
    of the default `compile`.


    When using an embedded Tomcat (the default), add the following to the `pom.xml`.


    ```

    org.springframework.boot

    spring-boot-starter-tomcat

    provided

    ```


    When using a different embedded container, see Recipe 3.7, then change the scope
    of that container to `provided` by including `<scope>provided</scope>`. When doing
    so, the Spring Boot plugin will not add the libraries to the default `WEB-INF/lib`.
    However, they will still be part of the created WAR file, but in the special `WEB-INF/lib-provided`
    directory. Spring Boot knows this location, and as such you can also use the WAR
    to start the embedded container. Starting an embedded container is very nice for
    development; however, as it is a WAR file it is also deployable to a container
    like Tomcat of WebSphere.


    To make sure that the application will start, you need your application to extend
    the `SpringBootServletInitializer`. This is a special class needed to bootstrap
    Spring Boot in a Servlet or JEE container.


    ```

    package com.apress.springbootrecipes.helloworld;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.boot.builder.SpringApplicationBuilder;

    import org.springframework.boot.web.servlet.support.SpringBootServletInitializer;

    @SpringBootApplication

    public class HelloWorldApplication extends SpringBootServletInitializer {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    @Override

    protected SpringApplicationBuilder configure(SpringApplicationBuilder builder)
    {

    return builder.sources(HelloWorldApplication.class);

    }

    }

    ```


    When extending the `SpringBootServletInitializer`, you need to override the `configure`
    method. The `configure` method gets a `SpringApplicationBuilder`, which you can
    use to configure the application. One of the things to add is the main configuration
    class, just as with `SpringApplication.run`. That is what the line `builder.sources(HelloWorldApplication.class)`
    does. This will be used to bootstrap the application.


    For completeness, the `HelloWorldController` as used in Recipe 3.7.


    ```

    package com.apress.springbootrecipes.helloworld;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class HelloWorldController {

    @GetMapping

    public String hello() {

    return "Hello World, from Spring Boot 2!";

    }

    }

    ```


    ### Warning


    When deploying something to a Servlet or JEE Container, Spring Boot is no longer
    in control of the server; due to this configuration, options from the `server`
    and `management.servlet` namespaces don’t apply anymore. So when a `server.port`
    has been defined, it will be ignored when deploying to an external server!


    When the application has been deployed, it is no longer available at the root
    URL `/` as it would be when using the embedded server. It will be available at
    the `/<name-of-war>` URL instead: generally, something like `http://<name-of-server>:8080/<name-of-war>`
    to access the application. When deployed to a standard Tomcat installation and
    looking at the Management GUI, it looks like Figure [11-1](#464036_1_En_11_Chapter.xhtml#Fig1).


    ![../images/464036_1_En_11_Chapter/464036_1_En_11_Fig1_HTML.jpg](images/464036_1_En_11_Chapter/464036_1_En_11_Fig1_HTML.jpg)


    Figure 11-1 Tomcat management GUI


    Clicking the `/spring-mvc-as-war-2.0.0` link will open the application (Figure
    [11-2](#464036_1_En_11_Chapter.xhtml#Fig2)).


    ![../images/464036_1_En_11_Chapter/464036_1_En_11_Fig2_HTML.jpg](images/464036_1_En_11_Chapter/464036_1_En_11_Fig2_HTML.jpg)


    Figure 11-2 Result of deployed application


    ## 11.3 Reduce Archive Size Through the Thin Launcher


    ### Problem


    Spring Boot, by default, generates a so-called fat JAR, a JAR with all the dependencies
    inside it. This has some obvious benefits, as the JAR is fully self-contained.
    However, the JAR size can grow considerably, and when using multiple applications
    you might want to reuse already downloaded dependencies to reduce the overall
    footprint.


    ### Solution


    When packaging the application, you can specify a custom layout. One such a custom
    layout is the `Thin Launcher`. This launcher will result in the dependencies being
    downloaded before starting the application, instead of the dependencies packaged
    inside the application.


    ### How It Works


    When using the Spring Boot plugin as is, all the needed libraries are included
    in the archive in the `BOOT-INF/lib` folder. However, one might want to reduce
    the size of the JAR and enable reuse of dependencies to create an even smaller
    overall footprint. For example, the archive generated with Recipe 14.1 is around
    7.1M. Most of this comes from included dependencies.


    It is possible to add a custom layout and launcher to the Spring Boot plugin.
    A layout defines where the sources are loaded from, and the launcher uses this
    information to load those dependencies. The Thin Launcher will download the artifacts
    from Maven Central and place them in a shared repository. So when multiple applications
    share the dependencies, they are only downloaded once.


    To use the Thin Launcher, add a dependency to the Spring Boot plugin.


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    org.springframework.boot.experimental

    spring-boot-thin-layout

    1.0.15.RELEASE

    ```


    This is enough to create a considerably smaller archive. When running `./mvn package`
    the resulting JAR is around 12K. The drawback is, however, that it needs to download
    the dependencies when the application is started, so starting the application
    might take longer depending on the number of dependencies.


    What happens is that a class named `ThinJarWrapper` has been added and that will
    be the entrypoint of your application. Now your application contains a `pom.xml`
    and/or a `META-INF/thin.properties` to determine the dependencies. The `ThinJarWrapper`
    will locate another JAR file (the “launcher”). The wrapper downloads the launcher
    (if it needs to), or else uses the cached version in your local Maven repository.


    The launcher then takes over and reads the `pom.xml` (if present) and the `META-INF/thin.properties`,
    downloading the dependencies (and all transitives) as necessary. It will now create
    a custom class loader with all the downloaded dependencies on the classpath. Then
    it runs the application’s own main method with that class loader.


    ### Note


    When downloaded, the dependencies from Maven will respect settings made in the
    Maven `settings.xml`, as it uses regular Maven tooling. When using a mirror like
    Nexus for Maven repositories, include a `thin.repo` in the `META-INF/thin.properties`
    to point to that mirror, else downloading the launcher will fail.


    ## 11.4 Using Docker


    Using Docker to build and ship containers is common practice nowadays. When using
    Spring Boot, it is quite easy to wrap that into a Docker container.


    ### Problem


    You want to run your Spring Boot-based application inside a Docker container.


    ### Solution


    Create a `Dockerfile` and use one of the available Maven Docker plugins to build
    the Docker container.


    ### Note


    In this recipe we choose to use the `dockerfile-maven-plugin` from Spotify, but
    there are others that work equally well.'
