    An `OrderController` is needed to expose the `Order` as a REST resource.


    ```

    package com.apress.springbootrecipes.order.web;

    import com.apress.springbootrecipes.order.Order;

    import com.apress.springbootrecipes.order.OrderService;

    import org.springframework.web.bind.annotation.*;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    @RestController

    @RequestMapping("/orders")

    public class OrderController {

    private final OrderService orderService;

    OrderController(OrderService orderService) {

    this.orderService = orderService;

    }

    @PostMapping

    public Mono store(@RequestBody Mono order) {

    return orderService.save(order);

    }

    @GetMapping("/{id}")

    public Mono find(@PathVariable("id") String id) {

    return orderService.findById(id);

    }

    @GetMapping

    public Flux list() {

    return orderService.orders();

    }

    }

    ```


    The `OrderController` is mapped to `/orders` and supports listing all orders or
    a single one and adding/modifying an order. To bootstrap everything, a simple
    `OrderApplication` is needed.


    ```

    package com.apress.springbootrecipes.order;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class OrderApplication {

    public static void main(String[] args) {

    SpringApplication.run(OrderApplication.class, args);

    }

    }

    ```


    Using something like cUrl or httpie, you can query the endpoint.


    An `http http://localhost:8080/orders --stream` should list all the orders in
    the system (Figure [5-1](#464036_1_En_5_Chapter.xhtml#Fig1)) and `http http://localhost:8080/orders/{some-id}`
    should list a single one.


    ![../images/464036_1_En_5_Chapter/464036_1_En_5_Fig1_HTML.jpg](images/464036_1_En_5_Chapter/464036_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Result of getting all orders


    #### Streaming JSON


    The result of the call to `/orders` isn’t streaming, but rather it is blocking.
    It first collects all the results before sending them out. See also the Content-Type
    header in Figure [5-1](#464036_1_En_5_Chapter.xhtml#Fig1); it is set to `application/json`.
    To stream the result, it should be `application/stream+json`. For this, modify
    the controller’s `list` method .


    ```

    @GetMapping(produces = MediaType.APPLICATION_STREAM_JSON_VALUE)

    public Flux list() {

    return orderService.orders();

    }

    ```


    Notice the `produces = MediaType.APPLICATION_STREAM_JSON_VALUE`. This instructs
    Spring to stream the results when a part is ready. Restart the application and
    again issue an `http http://localhost:8080/orders --stream`. The result will now
    gently stream in until there is nothing more to consume (Figure [5-2](#464036_1_En_5_Chapter.xhtml#Fig2)).


    ![../images/464036_1_En_5_Chapter/464036_1_En_5_Fig2_HTML.jpg](images/464036_1_En_5_Chapter/464036_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Result of streaming all orders


    The result also slightly changed: instead of returning an array or orders (see
    Figure [5-1](#464036_1_En_5_Chapter.xhtml#Fig1)) it now returns single orders
    (see Figure [5-2](#464036_1_En_5_Chapter.xhtml#Fig2)).


    #### Server Sent Events


    Instead of using a stream of JSON, one can also use Server Sent Events. With WebFlux
    this is as easy as changing the produces in the `@GetMapping` to `MediaType.TEXT_EVENT_STREAM_VALUE`.
    Then events will be written.


    ```

    @GetMapping(produces = MediaType.TEXT_EVENT_STREAM_VALUE)

    public Flux list() {

    return orderService.orders();

    }

    ```


    Restart the application and again issue an `http http://localhost:8080/orders
    --stream`. The result, as events, will now gently stream in until there is nothing
    more to consume (Figure [5-3](#464036_1_En_5_Chapter.xhtml#Fig3)). Notice that
    the content type has changed to `text/event-stream`.


    ![../images/464036_1_En_5_Chapter/464036_1_En_5_Fig3_HTML.jpg](images/464036_1_En_5_Chapter/464036_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Result of streaming all orders as events'
