  raw: '#### Testing a **@RestController**


    As you want to make sure that the controller does what it is supposed to do, write
    a test to verify the correct behavior of the controller.


    ```

    Package com.apress.springbootrecipes.library.rest;

    import com.apress.springbootrecipes.library.Book;

    import com.apress.springbootrecipes.library.BookService;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.boot.test.mock.mockito.MockBean;

    import org.springframework.test.context.junit4.SpringRunner;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.result.MockMvcResultMatchers;

    import java.util.Arrays;

    import java.util.Optional;

    import static org.hamcrest.Matchers.*;

    import static org.mockito.ArgumentMatchers.anyString;

    import static org.mockito.Mockito.when;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @RunWith(SpringRunner.class)

    @WebMvcTest(BookController.class)

    public class BookControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @MockBean

    private BookService bookService;

    @Test

    public void shouldReturnListOfBooks() throws Exception {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", "Marten Deinum", "Josh Long"),

    new Book("321", "Pro Spring MVC", "Marten Deinum", "Colin Yates")));

    mockMvc.perform(get("/books"))

    .andExpect(status().isOk())

    .andExpect(jsonPath("$", hasSize(2)))

    .andExpect(jsonPath("$[*].isbn", containsInAnyOrder("123", "321")))

    .andExpect(jsonPath("$[*].title",

    containsInAnyOrder ("Spring 5 Recipes", "Pro Spring MVC")));

    }

    @Test

    public void shouldReturn404WhenBookNotFound() throws Exception {

    when(bookService.find(anyString())).thenReturn(Optional.empty());

    mockMvc.perform(get("/books/123")).andExpect(status().isNotFound());

    }

    @Test

    public void shouldReturnBookWhenFound() throws Exception {

    when(bookService.find(anyString())).thenReturn(

    Optional.of(

    new Book("123", "Spring 5 Recipes", "Marten Deinum", "Josh Long")));

    mockMvc.perform(get("/books/123"))

    .andExpect(status().isOk())

    .andExpect(jsonPath("$.isbn", equalTo("123")))

    .andExpect(jsonPath("$.title", equalTo("Spring 5 Recipes")));

    }

    }

    ```


    The test uses `@WebMvcTest` to create a `MockMvc`-based test and will create a
    minimal Spring Boot application to be able to run the controller. The controller
    needs an instance of a `BookService,` so we let the framework create a mock for
    this using the `@MockBean` annotation. In the different test methods, we mock
    the expected behavior (like returning a list of books, returning an empty `Optional,`
    etc.).


    ### Note


    Spring Boot uses Mockito ^([^(17)](#fn17)) to create mocks using `@MockBean`.


    Furthermore, the test uses the JsonPath^([^(18)](#fn18)) library so that you can
    use expressions to test the JSON result. JsonPath is for JSON what Xpath is for
    XML.


    ## 3.3 Using Thymeleaf with Spring Boot


    ### Problem


    You want to use Thymeleaf to render the pages of your application.


    ### Solution


    Add the dependency for Thymeleaf and create a regular `@Controller` to determine
    the view and fill the model.


    ### How It Works


    To get started you will first need to add the `spring-boot-starter-thymeleaf`
    as a dependency to your project to get the desired Thymeleaf^([^(19)](#fn19))
    dependencies.


    ```

    org.springframework.boot

    spring-boot-starter-thymeleaf


    ```


    With the addition of this dependency, you will get the Thymeleaf library as well
    as the Thymeleaf Spring Dialect so that the two integrate nicely. Due to the existence
    of these two libraries, Spring Boot will automatically configure the `ThymeleafViewResolver`.


    The `ThymeleafViewResolver` requires a Thymeleaf `ItemplateEngine` to be able
    to resolve and render the views. A special `SpringTemplateEngine` will be preconfigured
    with the `SpringDialect` so that you can use SpEL inside Thymeleaf pages.


    To configure Thymeleaf, Spring Boot exposes several properties in the `spring.thymeleaf`
    namespace (Table [3-2](#464036_1_En_3_Chapter.xhtml#Tab2)).


    Table 3-2


    Thymeleaf Properties


    | Property | Description |

    | --- | --- |

    | `spring.thymeleaf.prefix` | The `prefix` to use for the `ViewResolver`, default
    `classpath:/templates/` |

    | `Spring.thymeleaf.suffix` | The `suffix` to use for the `ViewResolver`, default
    `.html` |

    | `spring.thymeleaf.encoding` | The encoding of the templates, default `UTF-8`
    |

    | `spring.thymeleaf.check-template` | Check if the template exists before rendering,
    default `true`. |

    | `Spring.thymeleaf.check-template-location` | Check if the template location
    exists, the default is `true`. |

    | `Spring.thymeleaf.mode` | Thymeleaf `TemplateMode` to use, default `HTML` |

    | `Spring.thymeleaf.cache` | Should resolved templates be cached or not, default
    `true` |

    | `Spring.thymeleaf.template-resolver-order` | Order of the `ViewResolver` default
    is 1. |

    | `Spring.thymeleaf.view-names` | The view names (comma separated) that can be
    resolved with this `ViewResolver` |

    | `spring.thymeleaf.excluded-view-names` | The view names (comma separated) that
    are excluded from being resolved |

    | `Spring.thymeleaf.enabled` | Should Thymeleaf be enabled, default `true` |

    | `Spring.thymeleaf.enable-spring-el-compiler` | Enable the compilation of SpEL
    expressions, default `false` |

    | `Spring.thymeleaf.servlet.content-type` | Content-Type value used to write the
    HTTP Response, default `text/html` |


    #### Adding an Index Page


    First add an index page to the application. Create an `index.html` inside the
    `src/main/resources/templates` directory (the default location).


    ```


    Spring Boot Recipes – Library


    Library

    List of books


    ```


    This is just a basic HTML5 page with some minor additions for Thymeleaf. First
    there is `xmlns:th="` [`http://www.thymeleaf.org`](http://www.thymeleaf.org) `"`
    to enable the namespace for Thymeleaf. The namespace is used in the link through
    `th:href`. The `@{/books.html}` will be expanded, by Thymeleaf, to a proper link
    and placed in the actual `href` attribute of the link.


    Now when running the application and visiting the homepage (http://localhost:8080/),
    you should be greeted by a page with a link to the books overview (Figure [3-4](#464036_1_En_3_Chapter.xhtml#Fig4)).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig4_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Rendered index page'
