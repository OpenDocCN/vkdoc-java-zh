  trans: '

    ### 工作原理


    Spring Boot 为支持的日志提供程序（Logback、^(⁹) Log4j 2、^(¹⁰) 和 Java Util Logging）提供了默认配置。除了默认配置外，它还支持通过常规的
    `application.properties` 配置日志级别，以及指定日志格式和可选的日志文件写入位置。


    Spring Boot 使用 SLF4J 作为日志记录 API，在编写组件时，应使用这些接口来记录日志。这样，你就可以选择使用哪个日志框架。


    #### 配置日志


    使用日志框架时，常见的操作之一是启用或禁用框架某些部分的日志记录。使用 Spring Boot，你可以通过在 `application.properties`
    中添加一些配置行来实现。这些行需要以 `logging.level` 为前缀，后跟日志记录器的名称，最后是所需的日志级别。


    ```

    logging.level.org.springframework.web=DEBUG

    ```


    上述配置将为 `org.springframework.web` 日志记录器（通常包括该包及其子包中的所有类）启用 DEBUG 级别的日志记录。要设置根日志记录器的级别，请使用
    `logging.level.root=<level>`。这将设置日志记录的默认级别。


    #### 日志输出到文件


    默认情况下，Spring Boot 仅将日志输出到控制台。如果你还想将日志写入文件，则需要指定 `logging.file` 或 `logging.path`。前者指定文件名；后者指定路径。默认文件名为
    `spring.log`，默认目录为 Java 临时目录。


    ```

    logging.file=application.log

    logging.path=/var/log

    ```


    使用此配置，名为 `application.log` 的日志文件将被写入 `/var/log` 目录。


    将日志写入文件时，你可能希望防止日志文件淹没系统。你可以使用 `logging.file.max-history`（默认值为 `0`，表示无限制）指定保留的文件数量，并使用
    `logging.file.max-size` 指定文件大小（默认值为 10MB）。


    #### 使用你偏好的日志提供程序


    Spring Boot 默认使用 Logback 作为日志提供程序。不过，它也支持 Java Util Logging 和 Log4j 2。要使用其他日志框架，你首先需要排除默认框架，然后引入你自己的框架。Spring
    Boot 提供了 `spring-boot-starter-log4j2` 来包含 Log4j 2 的所有必要依赖。要排除默认的 Logback 日志记录，你需要在
    `spring-boot-starter` 依赖中添加一个排除规则；这是引入日志记录的主要依赖。


    ```

    org.springframework.boot

    spring-boot-starter


    org.springframework.boot

    spring-boot-starter-logging


    org.springframework.boot

    spring-boot-starter-log4j2


    ```


    ### 注意


    Spring Boot 2 不支持较旧的 Log4j 框架；它支持其继任者 Log4j 2！


    ## 2.5 重用现有配置


    ### 问题


    你有一个现有的非 Spring Boot 应用程序或模块，并且希望将其配置与 Spring Boot 一起重用。


    ### 解决方案


    要导入现有配置，请在带有 `@Configuration` 或 `@SpringBootApplication` 注解的类上添加 `@Import` 或 `@ImportResource`
    注解，以导入配置。


    ### 工作原理


    在你的主应用程序类（带有 `@SpringBootApplication` 注解的类）上，放置 `@Import` 或 `@ImportResource`
    注解，让 Spring 加载额外的文件。


    #### 重用现有的 XML 配置


    找到带有 `@SpringBootApplication` 注解的类，并向其添加 `@ImportResource` 注解。


    ```

    @SpringBootApplication

    @ImportResource("classpath:application-context.xml")

    public class Application { ... }

    ```


    由于使用了 `classpath:` 前缀，此配置将从类路径加载 `application-context.xml` 文件。如果文件位于文件系统中的某个位置，你可以使用
    `file:` 前缀，例如 `file:/var/conf/application-context.xml`。


    在引导应用程序时，Spring Boot 还将从上述 XML 文件中加载额外的配置。


    #### 重用现有的 Java 配置


    找到带有 `@SpringBootApplication` 注解的类，并向其添加 `@Import` 注解。


    ```

    @SpringBootApplication

    @Import(ExistingConfiguration.class)

    public class Application { ... }

    ```


    `@Import` 将负责将提到的类添加到配置中。如果你希望包含组件扫描未覆盖的内容，或者已禁用 `@Configuration` 类的自动检测，则可能需要这样做。


