    ## 10.2 创建自定义健康检查和指标


    ### 问题


    你的应用程序需要暴露某些默认不可用的指标，并执行健康检查。


    ### 解决方案


    健康检查和指标是可插拔的，`HealthIndicator` 和 `MetricBinder` 类型的 Bean 会被自动注册，以提供额外的健康检查和/或指标。任务是创建一个实现所需接口的类，并将该类的实例注册为
    Bean，使其能够为健康和指标功能做出贡献。


    ### 工作原理


    假设已经存在对 Spring Boot Actuator 的依赖，你可以立即开始编写实现。假设你有一个使用 `TaskScheduler` 的应用程序，并且希望为其添加一些指标和健康检查功能。（添加
    `@EnableScheduling` 就足以让 Spring Boot 创建一个默认的 `TaskScheduler`。）


    首先，让我们编写 `HealthIndicator`。你可以直接实现 `HealthIndicator` 接口，或者使用便捷的 `AbstractHealthIndicator`
    作为基类。


    ```

    package com.apress.springbootrecipes.library.actuator;

    import org.springframework.boot.actuate.health.AbstractHealthIndicator;

    import org.springframework.boot.actuate.health.Health;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

    import org.springframework.stereotype.Component;

    @Component

    class TaskSchedulerHealthIndicator extends AbstractHealthIndicator {

    private final ThreadPoolTaskScheduler taskScheduler;

    TaskSchedulerHealthIndicator(ThreadPoolTaskScheduler taskScheduler) {

    this.taskScheduler = taskScheduler;

    }

    @Override

    protected void doHealthCheck(Health.Builder builder) throws Exception {

    int poolSize = taskScheduler.getPoolSize();

    int active = taskScheduler.getActiveCount();

    int free = poolSize - active;

    builder

    .withDetail("active", taskScheduler.getActiveCount())

    .withDetail("poolsize", taskScheduler.getPoolSize());

    if (poolSize > 0 && free <= 1) {

    builder.down();

    } else {

    builder.up();

    }

    }

    }

    ```


    `TaskSchedulerHealthIndicator` 对给定的 `ThreadPoolTaskExecutor` 进行操作。如果可用于调度任务的线程数为一个或更少，它将状态报告为
    `down`。`poolSize > 0` 这个条件是因为底层 `Executor` 的创建会延迟到需要时才进行；在此之前，`poolSize` 将报告为
    `0`。返回值中包含 `poolsize` 和 `active` 线程数，仅用于提供信息。


    `TaskSchedulerMetrics` 实现了 micrometer.io 中的 `MeterBinder` 接口。它将 `active` 和 `pool-size`
    暴露给指标注册表。


    ```

    package com.apress.springbootrecipes.library.actuator;

    import io.micrometer.core.instrument.FunctionCounter;

    import io.micrometer.core.instrument.MeterRegistry;

    import io.micrometer.core.instrument.binder.MeterBinder;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

    import org.springframework.stereotype.Component;

    @Component

    class TaskSchedulerMetrics implements MeterBinder {

    private final ThreadPoolTaskScheduler taskScheduler;

    TaskSchedulerMetrics(ThreadPoolTaskScheduler taskScheduler) {

    this.taskScheduler = taskScheduler;

    }

    @Override

    public void bindTo(MeterRegistry registry) {

    FunctionCounter

    .builder("task.scheduler.active", taskScheduler,

    ThreadPoolTaskScheduler::getActiveCount)

    .register(registry);

    FunctionCounter

    .builder("task.scheduler.pool-size", taskScheduler,

    ThreadPoolTaskScheduler::getPoolSize)

    .register(registry);

    }

    }

    ```


    现在，在 `LibraryApplication` 上放置 `@EnableScheduling` 并重启应用程序后，`TaskScheduler` 的指标和健康检查信息将被报告（图
    10-7）。


    ![../images/464036_1_En_10_Chapter/464036_1_En_10_Fig7_HTML.jpg](img/464036_1_En_10_Fig7_HTML.jpg)


    图 10-7


    TaskScheduler 健康检查


    ## 10.3 导出指标


    ### 问题


    你想将指标导出到外部系统，以创建仪表板来监控应用程序。


    ### 解决方案


    使用 Graphite 等受支持的系统之一，并定期将指标推送到该系统。在你的应用程序中包含一个 micrometer.io 注册表依赖（除了 `spring-boot-starter-actuator`
    依赖之外），指标将自动被导出。默认情况下，数据会每分钟推送到服务器。


    ### 工作原理


    导出指标是 Micrometer.io 库的一部分，它支持多种服务，如 Graphite、DataDog、Ganglia 或常规的 StatsD。本方案使用
    Graphite，因此需要添加对 `micrometer-registry-graphite` 的依赖。


    ```

    io.micrometer

    micrometer-registry-graphite


    ```


    理论上，如果 Graphite ([`https://graphiteapp.org`](https://graphiteapp.org)) 运行在 `localhost`
    上并使用默认端口，这足以将指标发布到 Graphite。然而，Spring Boot 通过暴露一些属性（通常在 `management.metrics.export.<注册表名称>`
    命名空间下）使得配置变得简单（表 10-3）。


    表 10-3


    通用指标导出属性


    | 属性 | 描述 |

    | --- | --- |

    | `management.metrics.export.<注册表名称>.enabled` | 是否启用指标导出。当在类路径上检测到该库时，默认为 `true`
    |

    | `management.metrics.export.<注册表名称>.host` | 发送指标的主机，通常是 `localhost` 或服务的已知 URL（如
    SignalFX、DataDog 等） |

    | `management.metrics.export.<注册表名称>.port` | 发送指标的端口，默认为所需服务的已知端口 |

    | `management.metrics.export.<注册表名称>.step` | 发送指标的频率，默认为 1 分钟 |

    | `management.metrics.export.<注册表名称>.rate-units` | 用于报告速率的基本时间单位，默认为 `seconds`
    |

    | `management.metrics.export.<注册表名称>.duration-units` | 用于报告持续时间的基本时间单位，默认为 `milliseconds`
    |


    要每十秒而不是每分钟报告一次指标，请将以下内容添加到 `application.properties` 中：


    ```

    management.metrics.export.graphite.step=10s

    ```

