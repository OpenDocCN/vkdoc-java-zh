    ## 5.4 WebFlux and WebSockets


    ### Problem


    You want to use WebSockets in a Reactive application.


    ### Solution


    Include the `javax.websocket-api` as a dependency and use the Reactive `WebSocketHandler`
    interface to implement the handler.


    ### How It Works


    Adding a dependency on `javax.websocket-api` next to `spring-boot-starter-webflux`
    is enough to get WebSockets support running in a reactive application.


    ```

    org.springframework.boot

    spring-boot-starter-webflux


    javax.websocket

    javax.websocket-api

    1.1


    ```


    Spring WebFlux expects that WebSockets version 1.1 is used. When using 1.0, the
    code won’t run.


    Next, use the `WebSocketHandler` to implement a reactive handler.


    ```

    package com.apress.springbootrecipes.echo;

    import org.springframework.web.reactive.socket.WebSocketHandler;

    import org.springframework.web.reactive.socket.WebSocketSession;

    import reactor.core.publisher.Mono;

    public class EchoHandler implements WebSocketHandler {

    @Override

    public Mono handle(WebSocketSession session) {

    return session.send(

    session.receive()

    .map( msg -> "RECEIVED: " + msg.getPayloadAsText())

    .map(session::textMessage));

    }

    }

    ```


    The `EchoHandler` will receive a message and return it prefixed with “RECEIVED:
    ” (see also recipe 4.4 for the nonreactive version).


    Setting up WebSockets with WebFlux requires a few components to be registered.
    First we need the handler. The handler needs to be mapped to a URL using the `SimpleUrlHandlerMapping`
    . We need something that can invoke our handler, in this case the `WebSocketHandlerAdapter`.
    The final part is to let the `WebSocketHandlerAdapter` understand the incoming
    reactive runtime request. As we use Netty (the default), we need to configure
    a `WebSocketService` with the `ReactorNettyRequestUpgradeStrategy`.


    ```

    package com.apress.springbootrecipes.echo;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.core.Ordered;

    import org.springframework.web.reactive.HandlerMapping;

    import org.springframework.web.reactive.handler.SimpleUrlHandlerMapping;

    import org.springframework.web.reactive.socket.WebSocketHandler;

    import org.springframework.web.reactive.socket.server.WebSocketService;

    import org.springframework.web.reactive.socket.server.support.HandshakeWebSocketService;

    import org.springframework.web.reactive.socket.server.support.WebSocketHandlerAdapter;

    import org.springframework.web.reactive.socket.server.upgrade.ReactorNettyRequestUpgradeStrategy;

    import java.util.HashMap;

    import java.util.Map;

    @SpringBootApplication

    public class EchoApplication {

    public static void main(String[] args) {

    SpringApplication.run(EchoApplication.class, args);

    }

    @Bean

    public EchoHandler echoHandler() {

    return new EchoHandler();

    }

    @Bean

    public HandlerMapping handlerMapping() {

    Map map = new HashMap();

    map.put("/echo", echoHandler());

    var mapping = new SimpleUrlHandlerMapping();

    mapping.setUrlMap(map);

    mapping.setOrder(Ordered.HIGHEST_PRECEDENCE);

    return mapping;

    }

    @Bean

    public WebSocketHandlerAdapter handlerAdapter() {

    return new WebSocketHandlerAdapter(webSocketService());

    }

    @Bean

    public WebSocketService webSocketService() {

    var strategy = new ReactorNettyRequestUpgradeStrategy();

    return new HandshakeWebSocketService(strategy);

    }

    }

    ```


    Now you can launch the server and handle WebSockets with WebFlux.


    #### HTML & JavaScript Echo Client


    Now that the server is ready, we need a client to connect to our WebSocket endpoint.
    For this you will need some JavaScript and HTML. Write the following `app.js`
    and place it in the `src/main/resources/static` directory.


    ```

    var ws = null;

    var url = "ws://localhost:8080/echo";

    function setConnected(connected) {

    document.getElementById(''connect'').disabled = connected;

    document.getElementById(''disconnect'').disabled = !connected;

    document.getElementById(''echo'').disabled = !connected;

    }

    function connect() {

    ws = new WebSocket(url);

    ws.onopen = function () {

    setConnected(true);

    };

    ws.onmessage = function (event) {

    log(event.data);

    };

    ws.onclose = function (event) {

    setConnected(false);

    log(''Info: Closing Connection.'');

    };

    }

    function disconnect() {

    if (ws != null) {

    ws.close();

    ws = null;

    }

    setConnected(false);

    }

    function echo() {

    if (ws != null) {

    var message = document.getElementById(''message'').value;

    log(''Sent: '' + message);

    ws.send(message);

    } else {

    alert(''connection not established, please connect.'');

    }

    }

    function log(message) {

    var console = document.getElementById(''logging'');

    var p = document.createElement(''p'');

    p.appendChild(document.createTextNode(message));

    console.appendChild(p);

    while (console.childNodes.length > 12) {

    console.removeChild(console.firstChild);

    }

    console.scrollTop = console.scrollHeight;

    }

    ```


    There are a few functions here. The first `connect` will be invoked when pressing
    the **Connect** button; this will open a WebSocket connection to `ws://localhost:8080/echo`,
    which is the handler created and registered earlier. Connecting to the server
    will create a `WebSocket` JavaScript object, and that gives you the ability to
    listen to messages and events on the client. Here the `onopen`, `onmessage`, and
    `onclose` callbacks are defined. The most important is the `onmessage` because
    that will be invoked whenever a message comes in from the server; this method
    simply calls the `log` function, which will add the received message to the `logging`
    element on the screen.


    Next there is `disconnect`, which will close the WebSocket connection and clean
    up the JavaScript objects. Finally, there is the `echo` function , which will
    be invoked whenever the **Echo message** button is pressed. The given message
    will be sent to the server (and eventually will be returned).


    To use the `app.js` add the next `index.html` .


    ```


    Connect

    Disconnect


    Echo message


    Logging


    ```


    Now when deploying the application you can connect to the echo WebSocket service
    and send some message and have them send it back (Figure [5-5](#464036_1_En_5_Chapter.xhtml#Fig5)).


