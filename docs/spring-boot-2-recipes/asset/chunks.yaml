    # 9. Messaging


    ## 9.1 Configure JMS


    ### Problem


    You want to use JMS in a Spring Boot application and need to connect to the JMS
    broker.


    ### Solution


    Spring Boot supports auto-configuration for ActiveMQ^([^(36)](#fn36)) and Artemis.^([^(37)](#fn37))
    Adding one of those JMS Providers together with setting some properties in, respectively,
    the `spring.activemq` and `spring.artemis` namespace will be all you need.


    ### How It Works


    By declaring a dependency of the JMS provider of your choice, Spring Boot will
    automatically configure the `ConnectionFactory` and strategy to look up destinations,
    the `DestinationResolver`, for your environment. This can also be done by using
    JNDI, and a final solution would be to do all the configuration yourself if you
    need more control over the `ConnectionFactory`.


    Adding dependencies for the supported JMS providers is pretty easy, as Spring
    Boot has provides starter projects for those; for JNDI you need to include the
    JMS dependencies yourself.


    #### Use ActiveMQ


    When using ActiveMQ, the first thing to do is to include the `spring-boot-starter-activemq`
    and this will pull in all the needed JMS and ActiveMQ dependencies to get started.
    It will include the `spring-jms` dependency and the client libraries for ActiveMQ.


    ```

    org.springframework.boot

    spring-boot-starter-activemq


    ```


    By default, Spring Boot will start an embedded broker if no explicit broker configuration
    is given. Configuration can be changed by using properties from the `spring.activemq`
    namespace (see Table [9-1](#464036_1_En_9_Chapter.xhtml#Tab1)).


    Table 9-1


    ActiveMQ Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.activemq.broker-url` | URL of the broker to connect to, default `vm://localhost?broker.persistent=false`
    for an in-memory broker, else `tcp://localhost:61616` |

    | `spring.activemq.user` | Username to use to connect to the broker, default empty
    |

    | `spring.activemq.password` | Password to use to connect to the broker, default
    empty |

    | `spring.activemq.in-memory` | Should an embedded broker be used, default `true`.
    Ignored when `spring.activemq.broker-url` has been explicitly set |

    | `spring.activemq.non-blocking-redelivery` | Stop message delivery before redelivering
    rolled-back messages; when enabled message order will not be preserved!, default
    `false` |

    | `spring.activemq.close-timeout` | Time to wait to consider a close to be effective,
    default 15 seconds |

    | `spring.activemq.send-timeout` | Time to wait for a response from the broker,
    default 0 (unlimited) |

    | `spring.activemq.packages.trust-all` | When using Java Serialization to send
    JMS messages should classes from all packages be trusted, default none (requires
    explicit setting the packages) |

    | `spring.activemq.packages.trusted` | Comma-separated list of specific packages
    to trust |


    A simple application to list all the beans with `jms` in their name, this should
    include a bean named `cachingJmsConnectionFactory` .


    ```

    @SpringBootApplication

    public class JmsActiveMQApplication {

    private static final String MSG = "\tName: %100s, Type: %s\n";

    public static void main(String[] args) {

    var ctx = SpringApplication.run(JmsActiveMQApplication.class, args);

    System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

    var names = ctx.getBeanDefinitionNames();

    Stream.of(names)

    .filter(name -> name.toLowerCase().contains("jms"))

    .forEach(name -> {

    Object bean = ctx.getBean(name);

    System.out.printf(MSG, name, bean.getClass().getSimpleName());

    });

    }

    }

    ```


    When running the preceding, it will print all the names and type of the beans
    containing `jms` in their name to the console. The output should be similar to
    that of Figure [9-1](#464036_1_En_9_Chapter.xhtml#Fig1).


    ![../images/464036_1_En_9_Chapter/464036_1_En_9_Fig1_HTML.jpg](images/464036_1_En_9_Chapter/464036_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    ActiveMQ beans output'
