    #### Obtaining a `DataSource` from JNDI


    If you are deploying your Spring Boot application to an application server (or
    if you have a remote JNDI server) and want to use a preconfigured `DataSource`,
    you can use the `spring.datasource.jndi-name` property to let Spring Boot know
    you want to obtain a `DataSource` from JNDI.


    ```

    spring.datasource.jndi-name=java:jdbc/customers

    ```


    #### Configure the Connection Pool


    The default connection pool used by Spring Boot is HikariCP. This comes automatically
    when including the `spring-boot-starter-jdbc` dependency (or one of the other
    database-related dependencies). Spring Boot will configure the connection pool
    with some default settings; however, you might want to override this (increase
    the max connections or reduce it, set the timeouts, etc.). The configuration options
    for HikariCP are in the `spring.datasource.hikari` namespace (Table [7-1](#464036_1_En_7_Chapter.xhtml#Tab1)).


    Table 7-1


    HikariCP Common Connection Pool Settings


    | Property | Description |

    | --- | --- |

    | `spring.datasource.hikari.connection-timeout` | Maximum number of milliseconds
    that a client will wait for a connection from the pool. Default 30 seconds |

    | `spring.datasource.hikari.leak-detection-threshold` | Amount of milliseconds
    that a connection can be out of the pool before a message is logged indicating
    a possible connection leak. Default 0 (effectively disabled) |

    | `spring.datasource.hikari.idle-timeout` | Maximum number of milliseconds that
    a connection is allowed to sit idle in the pool. Default 10 minutes |

    | `spring.datasource.hikari.validation-timeout` | Maximum number of milliseconds
    that the pool will wait for a connection to be validated as alive. Default 5 seconds
    |

    | `spring.datasource.hikari.connection-test-query` | SQL query to be executed
    to test the validity of connections. **NOTE:** Generally not needed with JDBC
    4.0 (or higher) drivers! Default is none. |

    | `spring.datasource.hikari.maximum-pool-size` | Maximum number of connections
    that will be kept in the pool. Default 10 connections |

    | `spring.datasource.hikari.minimum-idle` | Minimum number of idle connections
    that are maintained in the pool. Default 10 connections |


    There are more properties you can use, but the list is quite long and the properties
    mentioned in Table [7-1](#464036_1_En_7_Chapter.xhtml#Tab1) are the most commonly
    used properties.


    ### Note


    The properties for Tomcat JDBC are in the `spring.datasource.tomcat` namespace
    and for Commons DBCP2 in the `spring.datasource.dbcp2` namespace.


    To configure the datasource with a maximum of five connections, minimum of two,
    and leak detection with a threshold of 20 seconds, the following configuration
    needs to be added.


    ```

    spring.datasource.hikari.maximum-pool-size=5

    spring.datasource.hikari.minimum-idle=2

    spring.datasource.hikari.leak-detection-threshold=20000

    ```'
