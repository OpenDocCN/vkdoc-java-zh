  raw: '### Note


    The use of JSP with a Spring Boot application is discouraged and limited.^([^(21)](#fn21))


    When using Spring MVC, you might want to use the HTTP Session to store attributes
    (generally with Spring Security to store CSFR tokens, etc.). The general servlet
    configuration also allows you to configure the http session and the way it will
    be stored (cookie, URL, etc.). See Table [3-8](#464036_1_En_3_Chapter.xhtml#Tab8)
    for the properties.


    Table 3-8


    HTTP Session Related Server Properties


    | `server.servlet.session.timeout` | Session timeout, default 30 minutes |

    | `server.servlet.session.tracking-modes` | Session tracking modes one or more
    of `cookie`, `url` and `ssl`. Default empty leaving it to the container |

    | `server.servlet.session.persistent` | Should session data be persisted between
    restarts, default `false` |

    | `server.servlet.session.cookie.name` | Name of the cookie to store the session
    identifier. Default empty leaving it to the container default |

    | `server.servlet.session.cookie.domain` | Domain value to use for the session
    cookie. Default empty leaving it to the container default |

    | `server.servlet.session.cookie.path` | Path value to use for the session cookie.
    Default empty leaving it to the container default |

    | `server.servlet.session.cookie.comment` | Comment to use for the session cookie.
    Default empty leaving it to the container default |

    | `server.servlet.session.cookie.http-only` | Should the session cookie be http-only
    accesible, default empty leaving it to the container default |

    | `server.servlet.session.cookie.secure` | Should the cookie be send through SSL
    only, default empty leaving it to the container default |

    | `server.servlet.session.cookie.max-age` | The lifetime of the session cookie.
    Default empty leaving it to the container default |

    | `server.servlet.session.session-store-directory.directory` | Name of the directory
    to use for persistent cookies. Has to be an existing directory |


    Finally, Spring Boot makes it very easy to configure SSL by exposing a few properties,
    see Table [3-9](#464036_1_En_3_Chapter.xhtml#Tab9) and Recipe 3.8 on how to configure
    SSL.


    Table 3-9


    SSL Related Server Properties


    | Property | Description |

    | --- | --- |

    | `server.ssl.enabled` | Should SSL be enabled, default `true` |

    | `server.ssl.ciphers` | Supported SSL ciphers, default empty |

    | `server.ssl.client-auth` | Should SSL client authentication be wanted (`WANT`)
    or needed `NEED`. Default empty |

    | `server.ssl.protocol` | SSL protocol to use, default `TLS` |

    | `server.ssl.enabled-protocols` | Which SSL protocols are enabled, default empty
    |

    | `server.ssl.key-alias` | The alias to identify the key in the keystore, default
    empty |

    | `server.ssl.key-password` | The password to access the key in the keystore,
    default empty |

    | `server.ssl.key-store` | Location of the keystore, typically a JKS file, default
    empty |

    | `server.ssl.key-store-password` | Password to access the keystore, default empty
    |

    | `server.ssl.key-store-type` | Type of the keystore, default empty |

    | `server.ssl.key-store-provider` | Provider of the keystore, default empty |

    | `server.ssl.trust-store` | Location of the truststore |

    | `server.ssl.trust-store-password` | Password to access the truststore, default
    empty |

    | `server.ssl.trust-store-type` | Type of the truststore, default empty |

    | `server.ssl.trust-store-provider` | Provider of the truststore, default empty
    |


    ### Note


    All the properties mentioned in the aforementioned tables apply **only** when
    using an embedded container to run your application. When deploying to an external
    container (i.e., deploying a WAR file), the settings do not apply!


    As we are using Thymeleaf, we could disable the registration of the JSP servlet;
    and let’s change the port and compression as well. Place the following in the
    `application.properties`:


    ```

    server.port=8081

    server.compression.enabled=true

    server.servlet.jsp.registered=false

    ```


    Now when (re)starting, your application pages (when large enough) will be compressed
    and the server will run on port `8081` instead of `8080`.


    ### Note


    There is a difference between `server.servlet.context-path` and `server.servlet.path`.
    When looking at a URL `http://localhost:8080/books` it consists of several parts.
    The first is the protocol (generally `http` or `https`); then there is the address
    and port of the server you want to access, followed by the `context-path` (default
    `/` deployed at the root), which in turn is followed by the `servlet-path`. The
    `server.context-path` is the main URL to your application; for instance if we
    set the `server.context-path=/library` the whole application is available on the
    `/library` URL. (The `DispatcherServlet` still listens to `/` within the `context-path`
    ). Now if we set the `server.path=/dispatch` we need to use `/library/dispatch/books`
    to access the books.


    Next, if we added a second `DispatcherServlet`, which we configure to have a path
    of `/services`, that would be accesible through `/library/services`. Both `DispatcherServlet`s
    would be active within the main `context-path` of `/library`.


    #### Changing the Runtime Container


    When including the `spring-boot-starter-web` dependency, it will automatically
    include a dependency to the Tomcat container as it itself has a dependency on
    the `spring-boot-starter-tomcat` artifact. To enable a different servlet container,
    the `spring-boot-starter-tomca` `t` needs to be excluded and one of `spring-boot-starter-jetty`
    or `spring-boot-starter-undertow` needs to be included.


    ```

    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-tomcat


    org.springframework.boot

    spring-boot-starter-jetty


    ```


    In Maven you can use an `<exclusion>` element inside your `<dependency>` to exclude
    a dependency.


    Now when the application is started it will start with Jetty instead of using
    Tomcat (Figure [3-11](#464036_1_En_3_Chapter.xhtml#Fig11)).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig11_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Bootstrap logging with Jetty container


    ## 3.8 Configuring SSL for the Servlet Container


    ### Problem


    You want your application to be accessible through HTTPS next (or instead of)
    HTTP.


    ### Solution


    Get a certificate, place it in a keystore, and use the `server.ssl` namespace
    to configure the keystore. Spring Boot will then automatically configure the server
    to be accessible through HTTPS only.


    ### How It Works


    Using the `server.ssl.` `key-store` (and related properties) you can configure
    the embedded container to only accept HTTPS connection. Before you can configure
    SSL you will need to have a certificate to secure your application with. Generally
    you will want to get a certificate from a certification authority like VeriSign
    or Let’s Encrypt. However, for development purposes you can use a self-signed
    certificate (see the section on **Creating a Self-Signed Certificate**).


    #### Creating a Self-Signed Certificate


    Java comes packaged with a tool called the `keytool` `,` which can be used to
    generate certificates among other things.


    ```

    keytool -genkey -keyalg RSA -alias sb2-recipes -keystore sb2-recipes.pfx -storepass
    password -validity 3600 -keysize 4096 -storetype pkcs12

    ```


    The preceding command will tell `keytool` to generate a key using the RSA algorithm
    and place it in the keystore named `sb2-recipes.pfx` with the alias `sb2-recipes,`
    and it will be valid for 3,600 days. When running the command, it will ask a few
    questions; answer them accordingly (or leave empty). After that, there will be
    a file called `sb2-recipes.pfx` containing the certificate and protected with
    a password.


    Place this file in the `src/main/resources` folder so that it is packaged as part
    of your application and Spring Boot can easily access it.'
