    # 3. Spring MVC


    当 Spring Boot 在类路径上发现相关类时，它会自动配置一个 Web 应用程序。它还会启动一个嵌入式服务器（默认情况下，它将启动一个嵌入式 Tomcat）^(¹¹)


    ## 3.1 Spring MVC 入门


    ### 问题


    你想使用 Spring Boot 来驱动一个 Spring MVC 应用程序。


    ### 解决方案


    Spring Boot 将为 Spring MVC 所需的组件进行自动配置。要启用此功能，Spring Boot 需要能够在类路径上检测到 Spring MVC
    类。为此，你需要将 `spring-boot-starter-web` 添加为依赖项。

    '
- fmt: '### How It Works


    In your project, add the dependency for `spring-boot-starter-web`.


    ```

    org.springframework.boot

    spring-boot-starter-web

    ```


    What this does is add the needed dependencies for Spring MVC. Now that Spring
    Boot can detect these classes, it will do additional configuration to set up the
    `DispatcherServlet`. It will also add all the JAR files needed to be able to start
    an embedded Tomcat server.


    ```

    package com.apress.springbootrecipes.hello;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    ```


    These few lines of code are enough to start the embedded Tomcat server and have
    a preconfigured Spring MVC setup. When you start the application, you will see
    output similar to that in Figure [3-1](#464036_1_En_3_Chapter.xhtml#Fig1).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig1_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** Startup output logging


    The following things happen when you start the `HelloWorldApplication`:


    **Table 3-1** Automatically Registered Servlet Filters


    | Filter | Description |

    | --- | --- |

    | `CharacterEncodingFilter` | Will force the encoding to be `UTF-8` by default,
    can be configured by setting the `spring.http.encoding.charset` property. Can
    be disabled through setting the `spring.http.encoding.enabled` to `false` |

    | `HiddenHttpMethodFilter` | Enables the use of hidden form field named `_method`
    to specify the actual HTTP method. Can be disabled by setting the `spring.mvc.hiddenmethod.filter.enabled`
    to `false` |

    | `FormContentFilter` | Will wrap the request for `PUT`, `PATCH`, and `DELETE`
    requests so that those can also benefit from binding. Can be disabled by setting
    the `spring.mvc.formcontent.filter.enabled` to `false` |

    | `RequestContextFilter` | Exposes the current request to the current thread so
    that you can use the `RequestContextHolder` and `LocaleContextHolder` even in
    a non-Spring MVC application like Jersey |


    1. Start an embedded Tomcat server on port 8080 (by default)

    2. Register and enable a couple of default Servlet Filters (Table [3-1](#464036_1_En_3_Chapter.xhtml#Tab1))

    3. Set up static resource handling for things like `.css`, `.js` and `favicon.ico`

    4. Enable integration with WebJars^([^(12)](#fn12))

    5. Setup basic error handling features

    6. Preconfigure the `DispatcherServlet` with the needed components (i.e., `ViewResolvers`,
    I18N, etc.)


    In the current state, the `HelloWorldApplication` doesn’t do anything but start
    the server. Let’s add a controller to return some information.


    ```

    package com.apress.springbootrecipes.hello;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class HelloWorldController {

    @GetMapping("/")

    public String hello() {

    return "Hello World, from Spring Boot 2!";

    }

    }

    ```


    This `HelloWorldController` will be registered at the `/` URL and when called
    will return the phrase `Hello World from Spring Boot 2!`. The `@RestController`
    indicates that this is a `@Controller` and as such will be detect by Spring Boot.
    Additionally, it adds the `@ResponseBody` annotation to all request handling methods,
    indicating it should send the result to the client. The `@GetMapping` maps the
    `hello` method to every GET request that arrives at `/`. We could also have written
    `@RequestMapping(value="/", method=RequestMethod.GET)`.


    When restarting the `HelloWorldApplication`, the `HelloWorldController` will be
    detected and processed. Now when using something like `curl` or `http` to access
    `http://localhost:8080/` the result should be like that in Figure [3-2](#464036_1_En_3_Chapter.xhtml#Fig2).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig2_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** Output of controller


    #### Testing


    Now that the application is running and returning results, it’s time to add a
    test for the controller (ideally you would write the test first!). Spring already
    has some impressive testing features and Spring Boot adds more of those. Testing
    a controller has become pretty easy with Spring Boot.


    ```

    package com.apress.springbootrecipes.hello;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.http.MediaType;

    import org.springframework.test.context.junit4.SpringRunner;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.request.MockMvcRequestBuilders;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @RunWith(SpringRunner.class)

    @WebMvcTest(HelloWorldController.class)

    public class HelloWorldControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @Test

    public void testHelloWorldController() throws Exception {

    mockMvc.perform(MockMvcRequestBuilders.get("/"))

    .andExpect(status().isOk())

    .andExpect(content().string("Hello World, from Spring Boot 2!"))

    .andExpect(content().contentTypeCompatibleWith(MediaType.TEXT_PLAIN));

    }

    }

    ```


    The `@RunWith(SpringRunner.class)` is needed to instruct JUnit to use this specific
    runner. This special runner is what integrates the Spring Test framework with
    JUnit. The `@WebMvcTest` instructs the Spring Test framework to set up an application
    context for testing this specific controller. It will start a minimal Spring Boot
    application with only the web-related beans like `@Controller`, `@ControllerAdvice`,
    etc. In addition it will preconfigure the Spring Test Mock MVC support, which
    can then be autowired.


    Spring Test Mock MVC can be used to simulate making an HTTP request to the controller
    and do some expectations on the result. Here we call the `/` with `GET` and expect
    an HTTP 200 (thus OK) response with the plain text message of `Hello World, from
    Spring Boot 2!`.


