- fmt: '### How It Works


    When using Spring Boot, when it detects JMS and a single `ConnectionFactory` it
    will also automatically configure a `JmsTemplate`, which can be used to send and
    convert messages. Spring Boot exposes properties in the `spring.jms.template`
    namespace, which can be used to configure the `JmsTemplate`.


    ### Send a Message with `JmsTemplate`


    To send a message through JMS, you can use the `send` or `sendAndConvert` methods
    on the `JmsTemplate`. Let’s write a component that places a message with the current
    date and time on a queue every second.


    ```

    @Component

    class MessageSender {

    private final JmsTemplate jms;

    MessageSender(JmsTemplate jms) {

    this.jms = jms;

    }

    @Scheduled(fixedRate = 1000)

    public void sendTime() {

    jms.convertAndSend("time-queue", "Current Date & Time is: " +

    LocalDateTime.now());

    }

    }

    ```


    The `JmsTemplate` is automatically injected through the constructor, and due to
    scheduling we will get a message containing the current date and time on a queue
    called `time-queue`. To run this code, you will need an `@SpringBootApplication`
    class with the `@EnableScheduling` annotation so that the `@Scheduled` will be
    processed.


    ```

    @SpringBootApplication

    @EnableScheduling

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    }

    ```


    Now when running this class it appears as if nothing much is happening, but the
    messages are filling up the queue. We can write a simple integration test to check
    if this code is working.


    ```

    package com.apress.springbootrecipes.demo;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.test.context.junit4.SpringRunner;

    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.TextMessage;

    import static org.assertj.core.api.Assertions.assertThat;

    @RunWith(SpringRunner.class)

    @SpringBootTest

    public class JmsSenderApplicationTest {

    @Autowired

    private JmsTemplate jms;

    @Test

    public void shouldSendMessage() throws JMSException {

    Message message = jms.receive("time-queue");

    assertThat(message)

    .isInstanceOf(TextMessage.class);

    assertThat(((TextMessage) message).getText())

    .startsWith("Current Date & Time is: ");

    }

    }

    ```


    This JUnit test will bootstrap the application and starts sending messages. In
    the test, we use a `JmsTemplate` to `receive` a message and we do some assertions
    on it to see if messages are really sent and contain what we expected them to
    contain. The test will use the embedded JMS broker, as we haven’t configured anything.
    When running the test, it should be green as a message will be sent and received.


    ### Tip


    When writing tests for messaging, you might want to set the `receive-timeout`
    property of the `JmsTemplate`, as the default is to indefinitly wait for a message
    to come; however, after 500ms you might want to fail your test. You can do this
    by adding `spring.jms.template.receive-timeout=500ms` to your `application.properties`.


    ### Configure the `JmsTemplate`


    Spring Boot provides properties in the `spring.jms.template` namespace to configure
    the `JmsTemplate` (Table 9-4).


    **Table 9-4** `JmsTemplate` Properties


    | Property | Description |

    | --- | --- |

    | `spring.jms.template.default-destination` | Default destination to use for send
    and receive operations when a specific destination isn’t specified |

    | `spring.jms.template.delivery-delay` | Delivery delay for sending a message
    |

    | `spring.jms.template.delivery-mode` | Delivery mode, `persistent` or `non-persistent`,
    when explicitly set sets `qos-enabled` to `true` |

    | `spring.jms.template.priority` | Priority of the message when sending. Default
    none, when explicitly set sets `qos-enabled` to `true` |

    | `spring.jms.template.qos-enabled` | Should QOS (Quality of Service) be enabled.
    When enabled the priority, delivery-mode, and time-to-live of a message will be
    set. Default `false` |

    | `spring.jms.template.receive-timeout` | Timeout to use for recieve calls. Default
    indefinite |

    | `spring.jms.template.time-to-live` | Time-to-live of a JMS message, when set
    sets `qos-enabled` to `true` |

    | `spring.jms.pub-sub-domain` | Default destination is a topic or queue. Default
    `false` meaning queue |


    Next to these properties the `JmsTemplate` will also be auto-configured with a
    `DestinationResolver` and `MessageConverter` if a unique instance of the beans
    can be found. If no unique instance can be found, the defaults will be used, `DynamicDestinationResolver`
    and `SimpleMessageConverter` (Table 9-5).


    **Table 9-5** `SimpleMessageConverter` Class to JMS Message Converter


    | Type | JMS Message Type |

    | --- | --- |

    | `java.lang.String` | `javax.jms.TextMessage` |

    | `java.util.Map` | `javax.jms.MapMessage` |

    | `java.io.Serializable` | `javax.jms.ObjectMessage` |

    | `byte[]` | `javax.jms.BytesMessage` |


    Let’s send an `Order` to the `orders` queue. Use Jackson to send JSON instead
    of using the Java Serialization mechanism.


    ```

    public class Order {

    private String id;

    private BigDecimal amount;

    public Order() {

    }

    public Order(String id, BigDecimal amount) {

    this.id=id;

    this.amount = amount;

    }

    // Getters / Setters omitted for brevity

    @Override

    public String toString() {

    return String.format("Order [id=''%s'', amount=%4.2f]", id, amount);

    }

    }

    ```


    That is the simple order we are going to send.


    Now we need a sender that constructs an `Order` and places it on the queue using
    a `JmsTemplate`.


    ```

    @Component

    class OrderSender {

    private final JmsTemplate jms;

    OrderSender(JmsTemplate jms) {

    this.jms = jms;

    }

    @Scheduled(fixedRate = 1000)

    public void sendTime() {

    var id = UUID.randomUUID().toString();

    var amount = ThreadLocalRandom.current().nextDouble(1000.00d);

    var order = new Order(id, BigDecimal.valueOf(amount));

    jms.convertAndSend("orders", order);

    }

    }

    ```


    It isn’t that different from the `MessageSender` written earlier, but now it creates
    an `Order` with some random generated data and sends it on the `orders` queue.
    When running this, it would actually fail. Converting fails, as `Order` doesn’t
    implement `Serializable`, which is needed to convert the `Order` into an `ObjectMessage`
    (see Table 9-5). However, we wanted to use JSON to make this happen; a different
    `MessageConverter` is needed, the `MappingJackson2MessageConverter` to be exact.
    This uses Jackson to marshal and unmarshal objects to JSON. It should be added
    as a bean to the configuration.


    First you will need to add the dependency on Jackson to your build configuration.


    ```

    com.fasterxml.jackson.core

    jackson-core

    ```


    Next you can configure the `MappingJackson2MessageConverter`.


    ```

    @SpringBootApplication

    @EnableScheduling

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    @Bean

    public MappingJackson2MessageConverter messageConverter() {

    var messageConverter = new MappingJackson2MessageConverter();

    messageConverter.setTypeIdPropertyName("content-type");

    messageConverter.setTypeIdMappings(

    Collections.singletonMap("order", Order.class));

    return messageConverter;

    }

    }

    ```


    The `typeIdPropertyName` is a required property and indicates the name of the
    property in which the actual type of the message is stored. Without any further
    configuration, the FQN of the class will be used. With the `typeIdMappings` you
    can specify which type to map to which class and vice versa. When not specified,
    the FQN of a class will be used as the type in the mapping. When sending an `Order`,
    the `content-type` header will contain the value `order`.'
