    在本章中，我们将介绍 Spring Boot 的基本特性。


    ### 注意


    要获得一个起点，请使用 Spring Initializr 创建一个项目。不需要额外的依赖项，只需要一个 Spring Boot 项目。


    ## 2.1 配置 Bean


    ### 问题


    你希望 Spring Boot 将你的类用作 Bean。


    ### 解决方案


    根据你的需求，你可以利用 `@ComponentScan` 自动检测你的类并创建实例；将其与 `@Autowired` 和 `@Value` 结合使用以注入依赖项或属性；或者，你可以使用带有
    `@Bean` 注解的方法，以便对正在创建的 Bean 的构造过程拥有更多控制权。


    ### 工作原理


    配方 1.1 中解释过，`@SpringBootApplication` 同时包含了 `@ComponentScan` 和 `@Configuration`。这意味着任何带有
    `@Component` 注解的类都会被 Spring Boot 自动检测并实例化；同时，它也允许定义带有 `@Bean` 注解的方法来声明 Bean。


    #### 使用 **@Component**


    首先，创建一个类来引导应用程序。创建一个带有 `@SpringBootApplication` 注解的 `HelloWorldApplication`。


    ```

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    ```


    ### 提示


    将带有 `@SpringBootApplication` 注解的类放在顶层包中；这样，它将自动检测该包及其所有子包中定义的所有带注解的组件、配置类等。^(⁵)


    这将引导应用程序，检测所有带有 `@Component` 注解的类，并检测类路径上有哪些库（另请参见第 1 章）。运行这个 `HelloWorldApplication`
    时，它不会做太多事情，因为没有什么需要检测或运行的内容。让我们创建一个简单的类，它将被 Spring Boot 自动检测到。


    ```

    @Component

    public class HelloWorld {

    @PostConstruct

    public void sayHello() {

    System.out.println("Hello World, from Spring Boot 2!");

    }

    }

    ```


    Spring Boot 将检测到这个类并从中创建一个 Bean 实例。带有 `@PostConstruct` 注解的方法在构造和所有依赖项注入完成后被调用。简单来说，在启动时，`sayHello`
    方法将运行，控制台将打印出 `Hello World, from Spring Boot 2!` 这一行。


    ### 重要


    当你需要扫描默认组件扫描未覆盖的包时，需要在带有 `@SpringBootApplication` 注解的类上添加一个 `@ComponentScan` 注解，以便这些包也能被扫描。这些包是在通过
    `@SpringBootApplication` 注解应用的默认扫描之外额外扫描的。

