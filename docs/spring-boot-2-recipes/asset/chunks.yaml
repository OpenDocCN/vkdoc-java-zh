- fmt: '#### Unit Test for Reactive Controllers


    You have two ways of doing an integration test for a controller. The first approach
    is to simply write a test that creates an instance of the `HelloWorldController`,
    call the method, and do expectations on the result. The second is to use the `@WebFluxTest`
    annotation to create the test. The latter will start a minimal application context
    containing the web infrastructure and you can use `MockMvc` to test the controller.
    This last approach sits between a plain unit test and a full-blown integration
    test.


    ```

    package com.apress.springbootrecipes.helloworld;

    import org.junit.Test;

    import reactor.core.publisher.Mono;

    import reactor.test.StepVerifier;

    public class HelloWorldControllerTest {

    private final HelloWorldController controller = new HelloWorldController();

    @Test

    public void shouldSayHello() {

    Mono result = controller.hello();

    StepVerifier.create(result)

    .expectNext("Hello World, from Reactive Spring Boot 2!")

    .verifyComplete();

    }

    }

    ```


    This is a basic unit test. It instantiates the controller, and simply calls the
    method to be tested. It uses the `StepVerifier` from the `reactive-test` module
    to make it easier to test. The `hello` method is called, and the result is then
    verified using the `StepVerifier`.


    Adding the `reactive-test` dependency is done by adding the following dependency:


    ```

    io.projectreactor

    reactor-test

    test

    ```


    The second option is to use `@WebFluxTest` for a specific controller.


    ```

    @RunWith(SpringRunner.class)

    @WebFluxTest(HelloWorldController.class)

    public class HelloWorldControllerSliceTest {

    @Autowired

    private WebTestClient webClient;

    @Test

    public void shouldSayHello() {

    webClient.get().uri("/hello").accept(MediaType.TEXT_PLAIN)

    .exchange()

    .expectStatus().isOk()

    .expectBody(String.class)

    .isEqualTo("Hello World, from Reactive Spring Boot 2!");

    }

    }

    ```


    This test will start a minimal Spring Boot context and auto detect all web related
    beans in your project, like `@ControllerAdvice`, `@Controller`, etc. Instead of
    now directly calling the `HelloWorldController`, you can use the special `WebTestClient`
    to declare a request `.get().uri("/hello")` and send that nonblocking using `exchange()`.
    Finally, the assertions/expectations are verified. The request is expected to
    have an OK status and to contain the specified body.


    #### Integration Test for Reactive Controllers


    The integration test looks very much like the `@WebFluxTest` in the previous section.
    The main difference is the use of `@SpringBootTest` instead of `@WebFluxTest`.
    Using `@SpringBootTest` this will bootstrap the full application, including all
    other beans (services, repositories, etc.). With the `webEnvironment` you can
    specify which environment to use: values are `RANDOM_PORT`, `MOCK` (default),
    `DEFINED_PORT`, and `NONE`. Here we use a random port and again use the `WebTestClient`
    to fire off a request.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    public class HelloWorldControllerIntegrationTest {

    @Autowired

    private WebTestClient webClient;

    @Test

    public void shouldSayHello() {

    webClient.get().uri("/hello").accept(MediaType.TEXT_PLAIN)

    .exchange()

    .expectStatus().isOk()

    .expectBody(String.class)

    .isEqualTo("Hello World, from Reactive Spring Boot 2!");

    }

    }

    ```


    The request is sent to the embedded server, after which the result is verified
    to have the correct status and body content.


    ### Note


    When using `MOCK` (also the default) as the `webEnvironment` you must add the
    `@AutoConfigureWebTestClient` annotation to get the `WebTestClient` for testing.


    ## 5.2 Publishing and Consuming with Reactive Rest Services


    ### Problem


    You want to write a reactive REST endpoint that will produce JSON.


    ### Solution


    Just as with a regular `@RestController`, you can return a regular object or list
    of objects and those will be sent to the client. To make them reactive, you will
    have to wrap those return values in their reactive counterparts: a `Mono` or a
    `Flux`.'
