- fmt: '### How It Works


    First you will need a `Dockerfile` containing the information needed to build
    the container. When the container has been built, you can launch it using the
    `docker run` command.


    #### Update Build Script to Produce a Docker Container


    To create a Docker container, first create a `Dockerfile`. The `Dockerfile` is
    the file containing the information on how to build the container. Place this
    file in the root of the project.


    ```

    FROM openjdk:11-jre-slim

    VOLUME /tmp

    ARG JAR_FILE

    COPY ${JAR_FILE} app.jar

    ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-jar","/app.jar"]

    ```


    With the preceding `Dockerfile`, we use the `openjdk`-provided container to build
    our own. We are going to add our application to it using the `ADD` command, and
    finally we need to tell the container what to start during startup; for this you
    can use the `ENTRYPOINT` command.


    ### Caution


    Using publicly available containers as a starting point might seem like a good
    idea, but you have to be aware of the possible security implications this can
    have. As you don’t control that specific container, you cannot guarantee what
    is built into (or not) the container. For real-life situations you might want
    to build your own base containers.


    The `ARG` with the `JAR_FILE` argument is telling the build that there is a variable
    `JAR_FILE` available that can be used in the build script. We will provide the
    value of that variable through the plugin configuration.


    The `ENTRYPOINT` simply specifies that it will run `java -jar /app.jar`. You could
    also combine this with Recipe 14.1 and install an executable JAR as script, making
    the entrypoint a little smaller.


    Now that there is a `Dockerfile`, you need to add the `dockerfile-maven-plugin`
    to your build section of the `pom.xml`.


    ```

    com.spotify

    dockerfile-maven-plugin

    1.4.4


    spring-boot-recipes/${project.name}

    ${project.version}


    target/${project.build.finalName}.jar


    javax.activation

    javax.activation-api

    1.2.0


    org.codehaus.plexus

    plexus-archiver

    3.6.0


    ```


    We specify a name of the image through the `repository` property in the plugin;
    that way we know where to find the container later on. Generally you also want
    to place a tag on the container, and we choose to use the `${project.version}`
    as the `tag`.


    The `buildArgs` are for passing arguments to the `docker build` command so that
    they can be made available when processing the `Dockerfile`. As we have specified
    a `JAR_FILE`, we also declare that in the configuration and point it to the location
    of the generated artifact.


    ### Note


    The dependency on the `javax.activation-api` is there because that isn’t part
    of the default set of available classes of Java 9; if you are on Java 8 you don’t
    need this. The dependency for `plexus-archiver` is there because the default version
    with Maven doesn’t work on Java 9+.


    #### Building and Starting the Container


    Now that everything is in place, you can use `mvn clean build dockerfile:build`
    to generate a Docker container.


    To launch the container, you can run it with something like this:


    ```

    docker run -d spring-boot-recipes/dockerize:2.0.0-SNAPSHOT

    ```


    This will start the container in the background and it will start to print messages
    to the console. To see the logs, do `docker logs <name-of-container> --follow`
    and you will see a message printed every two seconds (Figure [11-3](#464036_1_En_11_Chapter.xhtml#Fig3)).


    ![../images/464036_1_En_11_Chapter/464036_1_En_11_Fig3_HTML.jpg](images/464036_1_En_11_Chapter/464036_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Docker container logging


    #### Passing Properties to the Spring Boot Application


    When running a Spring Boot application in a Docker container, you probably want
    to be able to change properties based on the environment the application gets
    deployed on. You can use Spring Profiles for this (see also recipes in Chapter
    [2](#464036_1_En_2_Chapter.xhtml)) but you still need to provide a variable specifying
    which profile to use. Normally you would start the application like `java -jar
    your-applicarion.jar --spring.profiles.active=profile1,profile`. However, as you
    have a Docker container, that isn’t possible.


    Luckily with Docker you can use the `-e` switch to pass in environment variables
    and, as Spring Boot also takes into consideration the variables in the local environment,^([^(43)](#fn43))
    that will work.


    For the simple application we have here, we can pass the `audience` property (by
    default it will say `World` and the message becomes `Hello World, from Spring
    Boot 2!`). Let’s change it to `Docker`. To do this you need to add `-e AUDIENCE="Docker"`
    to the run command.


    ```

    docker run -d -e AUDIENCE="Docker" spring-boot-recipes/dockerize:2.0.0-SNAPSHOT

    ```


    When looking at the logging of the newly started container, the message has changed
    to `Hello Docker, from Spring Boot 2!` (Figure [11-4](#464036_1_En_11_Chapter.xhtml#Fig4)).


    ![../images/464036_1_En_11_Chapter/464036_1_En_11_Fig4_HTML.jpg](images/464036_1_En_11_Chapter/464036_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Docker container output


    ### Note


    When setting variables to a Unix based system, you generally want to use all uppercase
    characters in the name and replace any `.` with a `_`. So when passing in `spring.profiles.active`
    that would become `SPRING_PROFILES_ACTIVE`.


    Footnotes [1](#464036_1_En_11_Chapter.xhtml#Fn1_source) [2](#464036_1_En_11_Chapter.xhtml#Fn2_source)
    [3](#464036_1_En_11_Chapter.xhtml#Fn3_source) [4](#464036_1_En_11_Chapter.xhtml#Fn4_source)


    ### Index


    ### A


    Access control decision ADMIN role annotations and expressions `@EnableGlobalMethodSecurity`
    `@PostAuthorize` `@PreAuthorize` built-in expressions SpEL Spring Beans `@` syntax
    `AccessChecker` `@accessChecker.hasLocalAccess` Access data DataSource (see DataSource)
    Flyway, database database migrations database schema Flyway properties `flyway_schema_history`
    Spring Boot, database `ApplicationRunner` DataSource initialize properties `data.sql`
    Derby initialization `schema.sql` using `JdbcTemplate` (see JdbcTemplate) using
    JPA (see JPA) using plain Hibernate (see Plain Hibernate) Actuator configuration
    (see Configuration, actuator) exporting metrics CPU usage Graphite micrometer.io
    properties health checks `@EnableScheduling` `HealthIndicator` `MeterBinder` interface
    `MetricBinder` `poolSize` `TaskScheduler` `TaskSchedulerMetrics` `ThreadPoolTaskExecutor`
    `anonymous()` method Applications, Spring Boot annotations, testing authenticated
    result authentication `BookControllerTest` HTTP headers integration test `LibraryApplication`
    password generation `RequestPostProcessor` `ResponseEntity` `setBasicAuth` method
    `spring-boot-starter-security` `TestRestTemplate` unauthenticated result user
    `@WebMvcTest` `WebTestClient` `@With*` annotations `withBasicAuth` `@WithMockUser`
    `@WithUserDetails` Web applications (see Web applications, logging) WebFlux application
    (see WebFlux application, security) Asynchronous request async controllers testing
    `asyncDispatch` async processing `Callable<String>` `CompletableFuture<String>`
    controller `DispatcherServlet` HTTP request return types Spring MockMvc `supplyAsync`
    method throughput `WebMvcConfigurer` `@WebMvcTest`


    ### B


    `@Bean` method `ApplicationRunner` interface `@Autowired` calculator, application
    calculator factory method calculator operations factory method `operation.apply`
    method `operation.handles` method `@SpringBootApplication`


    ### C


    Configuration, actuator DataSource HTTP metrics JMX metrics management server
    CPU metrics endpoint properties healthcheck `HealthIndicators` individual endpoints
    micrometer.io port properties public internet secure management endpoints tomcat
    metrics `X-Application-Context` header metrics `spring-boot-starter-actuator`
    `@Controller` annotated class `@CookieValue`'
