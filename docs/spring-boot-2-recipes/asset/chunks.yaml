  trans: '

    #### 添加控制器和视图


    当点击首页提供的链接时，我们希望看到一个显示图书馆中可用书籍列表的页面（图 3-5）。为此，需要添加两个部分：首先是一个能够处理请求并准备模型的控制器，其次是一个用于渲染书籍列表的视图。


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig5_HTML.jpg](img/464036_1_En_3_Fig5_HTML.jpg)


    图 3-5


    书籍列表页面


    让我们添加一个控制器，它将用书籍列表填充模型，并选择要渲染的视图名称。控制器是一个用 `@Controller` 注解的类，其中包含请求处理方法（用 `@RequestMapping`
    或本示例中的 `@GetMapping` 注解的方法，`@GetMapping` 是 `@RequestMapping` 的一种特化形式）。


    ```

    package com.apress.springbootrecipes.library.web;

    @Controller

    public class BookController {

    private final BookService bookService;

    public BookController(BookService bookService) {

    this.bookService = bookService;

    }

    @GetMapping("/books.html")

    public String all(Model model) {

    model.addAttribute("books", bookService.findAll());

    return "books/list";

    }

    }

    ```


    `BookController` 需要 `BookService`，以便获取要显示的书籍列表。`all` 方法将 `org.springframework.ui.Model`
    作为方法参数，这样我们就可以将书籍列表放入模型中。请求处理方法可以有不同的参数^(²⁰)；其中之一就是 `Model` 类。在 `all` 方法中，我们使用
    `BookService` 从数据存储中检索所有书籍，并通过 `model.addAttribute` 将其添加到模型中。现在，书籍列表在模型中可以通过键
    `books` 获取。


    最后，我们返回要渲染的视图名称 `books/list`。这个名称会被传递给 `ThymeleafViewResolver`，并解析为路径 classpath:/templates/books/list.html。


    现在，控制器和请求处理方法已经添加完毕，我们需要创建视图。在 `src/main/templates/books` 目录下创建一个 `list.html`
    文件。


    ```


    Library - Available Books


    Available Books


    Title

    Author

    ISBN


    Title

    Authors


    ```


    这又是一个使用 Thymeleaf 语法的 HTML5 页面。该页面将使用 `th:each` 表达式渲染书籍列表。它会从模型中的 `books` 属性获取所有书籍，并为每本书创建一行。行中的每一列都会使用
    `th:text` 表达式包含一些文本；它将打印书籍的标题、作者和 ISBN。表格的最后一列包含一个指向书籍详情的链接。它使用 `th:href` 表达式构建
    URL。注意 `()` 之间的表达式；这将添加 `isbn` 请求参数。


    启动应用程序并点击首页上的链接后，您将看到一个显示图书馆内容的页面，如图 3-5 所示。


    #### 添加详情页面


    最后，当点击表格中的 ISBN 号码时，您希望看到一个显示详情的页面。该链接包含一个名为 `isbn` 的请求参数，我们可以在控制器中检索并使用它来查找书籍。请求参数可以通过用
    `@RequestParam` 注解的方法参数来获取。


    以下方法将处理 GET 请求，将请求参数映射到方法参数，并包含模型，以便我们可以将书籍添加到模型中。


    ```

    @GetMapping(value = "/books.html", params = "isbn")

    public String get(@RequestParam("isbn") String isbn, Model model) {

    bookService.find(isbn)

    .ifPresent(book -> model.addAttribute("book", book));

    return "books/details";

    }

    ```


    控制器将渲染 `books/details` 页面。将 `details.html` 添加到 `src/main/resources/templates/books`
    目录中。


    ```


    Library - Available Books


    Title

    authors

    ISBN


    Not Found


    ```


    这个 HTML5 Thymeleaf 模板将渲染页面上的两个可用块之一。要么找到了书籍并显示详情，要么显示未找到消息。这是通过使用 `th:if` 表达式实现的。未找到消息的
    `isbn` 通过使用 `param` 作为前缀从请求参数中获取。`${param.isbn}` 将获取 `isbn` 请求参数。


    ## 3.4 处理异常


    ### 问题


    您想要自定义 Spring Boot 显示的默认白标错误页面。


    ### 解决方案


    添加一个额外的 `error.html` 作为自定义错误页面，或者为特定的 HTTP 错误代码（例如 `404.html` 和 `500.html`）添加特定的错误页面。

