    As you are making an application for a library it will probably include books,
    so let’s create a `Book` class.


    ```

    package com.apress.springbootrecipes.library;

    import java.util.*;

    public class Book {

    private String isbn;

    private String title;

    private List authors = new ArrayList();

    public Book() {}

    public Book(String isbn, String title, String... authors) {

    this.isbn = isbn;

    this.title = title;

    this.authors.addAll(Arrays.asList(authors));

    }

    public String getIsbn() {

    return isbn;

    }

    public void setIsbn(String isbn) {

    this.isbn = isbn;

    }

    public String getTitle() {

    return title;

    }

    public void setTitle(String title) {

    this.title = title;

    }

    public void setAuthors(List authors) {

    this.authors = authors;

    }

    public List getAuthors() {

    return Collections.unmodifiableList(authors);

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o == null || getClass() != o.getClass()) return false;

    Book book = (Book) o;

    return Objects.equals(isbn, book.isbn);

    }

    @Override

    public int hashCode() {

    return Objects.hash(isbn);

    }

    @Override

    public String toString() {

    return String.format("Book [isbn=%s, title=%s, authors=%s]",

    this.isbn, this.title, this.authors);

    }

    }

    ```


    A book is defined by its ISBN number; it has a `title` and 1 or more `authors`.


    You would also need a service to work with the books in the library. Let’s define
    an interface and implementation for the `BookService`.


    ```

    package com.apress.springbootrecipes.library;

    import java.util.Optional;

    public interface BookService {

    Iterable findAll();

    Book create(Book book);

    Optional find(String isbn);

    }

    ```


    The implementation, for now, is a simple in-memory implementation.


    ```

    package com.apress.springbootrecipes.library;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    @Override

    public Iterable findAll() {

    return books.values();

    }

    @Override

    public Book create(Book book) {

    books.put(book.getIsbn(), book);

    return book;

    }

    @Override

    public Optional find(String isbn) {

    return Optional.ofNullable(books.get(isbn));

    }

    }

    ```


    The service has been annotated with `@Service` so that Spring Boot will detect
    it and create an instance of it.


    ```

    package com.apress.springbootrecipes.library;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class LibraryApplication {

    public static void main(String[] args) {

    SpringApplication.run(LibraryApplication.class, args);

    }

    @Bean

    public ApplicationRunner booksInitializer(BookService bookService) {

    return args -> {

    bookService.create(

    new Book("9780061120084", "To Kill a Mockingbird", "Harper Lee"));

    bookService.create(

    new Book("9780451524935", "1984", "George Orwell"));

    bookService.create(

    new Book("9780618260300", "The Hobbit", "J.R.R. Tolkien"));

    };

    }

    }

    ```


    The `LibraryApplication` will detect all the classes and start the server. Upon
    starting, it will preregister three books so that we have something in our library.


    To expose the `Book` as a REST resource, create a class, `BookController`, and
    annotate it with `@RestController`. Spring Boot will detect this class and create
    an instance of it. Using `@RequestMapping` (and `@GetMapping` and `@PostMapping`)
    you can write methods to handle the incoming requests.


    ### Note


    Instead of `@RestController` you could also use `@Controller` and put `@ResponseBody`
    on each request handling method. Using `@RestController` will implicitly add `@ResponseBody`
    to request handling methods.


    ```

    package com.apress.springbootrecipes.library.rest;

    import com.apress.springbootrecipes.library.Book;

    import com.apress.springbootrecipes.library.BookService;

    import org.springframework.http.ResponseEntity;

    import org.springframework.web.bind.annotation.*;

    import org.springframework.web.util.UriComponentsBuilder;

    import java.net.URI;

    @RestController

    @RequestMapping("/books")

    public class BookController {

    private final BookService bookService;

    public BookController(BookService bookService) {

    this.bookService = bookService;

    }

    @GetMapping

    public Iterable list() {

    return bookService.findAll();

    }

    @GetMapping("/{isbn}")

    public ResponseEntity get(@PathVariable("isbn") String isbn) {

    return bookService.find(isbn)

    .map(ResponseEntity::ok)

    .orElse(ResponseEntity.notFound().build());

    }

    @PostMapping

    public Book create(@RequestBody Book book,

    UriComponentsBuilder uriBuilder) {

    Book created = bookService.create(book);

    URI newBookUri = uriBuilder.path("/books/{isbn}").build(created.getIsbn());

    return ResponseEntity.created(newBookUri).body(created);

    }

    }

    ```


    The controller will be mapped to the `/books` path due to the `@RequestMapping("/books")`
    annotation on the class. The `list` method will be invoked for GET requests on
    `/books`. When `/books/<isbn>` is called with a GET request, the `get` method
    will be invoked and return the result for a single book or, when no book can be
    found, a 404 response status. Finally, you can add books to the library using
    a POST request on `/books`; then the `create` method will be invoked and the body
    of the incoming request will be converted into a book.


    After the application has started, you can use HTTPie^([^(15)](#fn15)) or cURL^([^(16)](#fn16))
    to retrieve the books. When using `HTTPie` to access `http://localhost:8080/books`,
    you should see output similar to that of Figure [3-3](#464036_1_En_3_Chapter.xhtml#Fig3).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig3_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    JSON output for list of books


    A request to `http://localhost:8080/books/9780451524935` will give you the result
    of a single book, in this case for `1984` by George Orwell. Using an unknown ISBN
    will result in a 404.


    When issuing a POST request, we could add a new book to the list.


    ```

    http POST :8080/books \

    title="The Lord of the Rings" \

    isbn="9780618640157" \

    authors:=''["J.R.R. Tolkien"]''

    ```


    The result of this call, when done correctly, is the freshly added book and a
    location header. Now when you get the list of books it should contain four books
    instead of the three books you started with.


    What happens is that HTTPie translates the parameters into a JSON request body,
    which in turn is read by the Jackson library and turned into a `Book`.


    ```

    {

    "title": "The Lord of the Rings",

    "isbn": "9780618640157",

    "authors": ["J.R.R. Tolkien"]

    }

    ```


    By default Jackson will use the getter and setter to map the JSON to an object.
    What happens is that a new `Book` instance is created using the default no-args
    constructor and all properties are set through the setters. For the `title` property,
    the `setTitle` is called, etc.'
