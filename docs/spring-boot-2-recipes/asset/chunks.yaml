    \    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-webflux</artifactId>\n\
    </dependency>\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-thymeleaf</artifactId>\n</dependency>\n```\n\
    \nWith the addition of this dependency, you will get the Thymeleaf library as\
    \ well as the Thymeleaf Spring Dialect so that they integrate nicely. Due to the\
    \ existence of these two libraries, Spring Boot will automatically configure the\
    \ `ThymeleafReactiveViewResolver`.\n\nThe `ThymeleafReactiveViewResolver` requires\
    \ a Thymeleaf `ISpringWebFluxTemplateEngine` to be able to resolve and render\
    \ the views. A special `SpringWebFluxTemplateEngine` will be preconfigured with\
    \ the `SpringDialect` so that you can use SpEL inside Thymeleaf pages.\n\nTo configure\
    \ Thymeleaf, Spring Boot exposes several properties in the `spring.thymeleaf`\
    \ and `spring.thymeleaf.reactive` namespaces (Table 5-1).\n\n**Table 5-1** Common\
    \ Thymeleaf Properties\n\n| Property | Description |\n| --- | --- |\n| `spring.thymeleaf.prefix`\
