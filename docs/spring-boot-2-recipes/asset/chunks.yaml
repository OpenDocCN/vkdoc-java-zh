  raw: '#### Use the MongoTemplate


    Now that the connection is set up you can use it, ideally through the `MongoTemplate`
    to make it easier to store and retrieve documents. First you need a document you
    want to store; let’s create a `Customer` that we want to persist.


    ```

    package com.apress.springboot2recipes.mongo;

    public class Customer {

    private String id;

    private final String name;

    private final String email;

    Customer() {

    this(null,null);

    }

    Customer(String name, String email) {

    this.name = name;

    this.email = email;

    }

    public String getId() {

    return id;

    }

    public String getName() {

    return name;

    }

    public String getEmail() {

    return email;

    }

    // equals(), hashCode() and toString() omitted

    }

    ```


    The `id` field will automatically be mapped to the `_id` document identifier of
    MongoDB. If you would like to use another field, you could use the `@Id` annotation
    from Spring Data to specify which field should be used.


    Let’s create a `CustomerRepository` so that instances can be saved and retrieved.


    ```

    package com.apress.springboot2recipes.mongo;

    import java.util.List;

    public interface CustomerRepository {

    List findAll();

    Customer findById(long id);

    Customer save(Customer customer);

    }

    ```


    The MongoDB CustomerRepository is implemented by using a `MongoTemplate` .


    ```

    package com.apress.springboot2recipes.mongo;

    import org.springframework.data.mongodb.core.MongoTemplate;

    import org.springframework.stereotype.Repository;

    import java.util.List;

    @Repository

    class MongoCustomerRepository implements CustomerRepository {

    private final MongoTemplate mongoTemplate;

    MongoCustomerRepository(MongoTemplate mongoTemplate) {

    this.mongoTemplate = mongoTemplate;

    }

    @Override

    public List findAll() {

    return mongoTemplate.findAll(Customer.class);

    }

    @Override

    public Customer findById(long id) {

    return mongoTemplate.findById(id, Customer.class);

    }

    @Override

    public Customer save(Customer customer) {

    mongoTemplate.save(customer);

    return customer;

    }

    }

    ```


    The `MongoCustomerRepository` uses the preconfigured `MongoTemplate` to store
    and retrieve customers in Mongo.


    To use all the parts, first there needs to be some data in MongoDB; an `ApplicationRunner`
    can be used to insert some data.


    ```

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    List.of(

    new Customer("Marten Deinum", "marten.deinum@conspect.nl"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"))

    .forEach(customers::save);

    }

    }

    ```


    The `DataInitializer` will use the `CustomerRepository` to save some `Customer`
    instances into MongoDB. Notice the `@Order` we want this to execute first this
    can be enforced by explicitly ordering the bean.


    Next create an `ApplicationRunner` to retrieve all the customers from MongoDB.


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll().forEach( customer -> logger.info("{}", customer));

    }

    }

    ```


    This listener will use the `CustomerRepository` to load all customers from the
    database and print a line in the logs.


    Finally the application class to bootstrap all this (including the two aforementioned
    `ApplicationListeners` ).


    ```

    package com.apress.springboot2recipes.mongo;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.ApplicationArguments;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.core.annotation.Order;

    import org.springframework.stereotype.Component;

    import java.util.Arrays;

    @SpringBootApplication

    public class MongoApplication {

    public static void main(String[] args) {

    SpringApplication.run(MongoApplication.class, args);

    }

    }

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    List.of(

    new Customer("Marten Deinum", "marten.deinum@conspect.nl"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"))

    .forEach(customers::save);

    }

    }

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll().forEach( customer -> logger.info("{}", customer));

    }

    }

    ```


    When running the application, it will automatically connect to the MongoDB instance,
    insert data into it, and finally retrieve it and print it to the logs.


    You will need a MongoDB instance to store and retrieve documents. You can either
    use an embedded MongoDB (ideal for testing) or connect to an actual MongoDB instance.


    #### Use Embedded MongoDB


    An easy project to use is the Embedded MongoDB^([^(32)](#fn32)); this will automatically
    start a MongoDB when Spring Boot starts. Spring Boot even has extensive support
    for this embedded MongoDB through properties in the `spring.mongodb.embedded`
    namespace (Table [7-5](#464036_1_En_7_Chapter.xhtml#Tab5)). The only thing needed
    for this to work is to add the necessary dependency.


    Table 7-5


    Embedded MongoDB Properties


    | Property | Description |

    | --- | --- |

    | `spring.mongodb.embedded.version` | The version of MongoDB to use. Default `3.2.2`
    |

    | `spring.mongodb.embedded.features` | List of features to enable, default only
    `sync-delay`. |

    | `spring.mongodb.embedded.storage.database-dir` | Directory to store the data
    in |

    | `spring.mongodb.embedded.storage.oplog-size` | Size of the log in megabytes.
    |

    | `spring.mongodb.embedded.storage.repl-set-name-dir` | Name of the replica set,
    default `null`. |


    ```

    de.flapdoodle.embed

    de.flapdoodle.embed.mongo


    ```


    Now when running the `MongoApplication,` it will automatically bootstrap MongoDB
    as well and tear it down when the application stops.


