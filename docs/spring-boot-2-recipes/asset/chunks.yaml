    时有用。默认为 Java 临时目录。 |

    | `spring.artemis.embedded.queues` | 启动时要创建的队列列表，以逗号分隔 |

    | `spring.artemis.embedded.topics` | 启动时要创建的主题列表，以逗号分隔 |

    | `spring.artemis.embedded.cluster-password` | 集群密码，默认自动生成 |


