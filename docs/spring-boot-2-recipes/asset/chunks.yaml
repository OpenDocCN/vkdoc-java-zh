  raw: '#### Receiving a Simple Message


    A component with an `@RabbitListener` annotation is all that is needed to start
    receiving messages from RabbitMQ.


    ```

    @Component

    class HelloWorldReceiver {

    @RabbitListener( queues = "hello")

    public void receive(String msg) {

    System.out.println("Received: " + msg);

    }

    }

    ```


    The preceding component will receive all the messages from the `hello` queue and
    print it to the console. This works fine for simple payloads or if the receiving
    object can be deserialized from the payload of the message. However, when sending
    objects or complex messages, one might prefer to use JSON or XML.


    #### Receiving an Object


    To receive a more complex object without relying on Java serialization, you need
    to configure a `MessageConverter` (see also Recipe 9.4). The configured `MessageConverter`
    will be used by the message listener container to convert incoming payloads into
    an object required by the `@RabbitListener` annotated method.


    ```

    @Bean

    public Jackson2JsonMessageConverter jsonMessageConverter() {

    return new Jackson2JsonMessageConverter();

    }

    ```


    To configure the `MessageConverter,` create an `@Bean` annotated method and construct
    the converter you want to use. Here the converter is a Jackson 2-based one, but
    there is also one for unmarshalling XML, the `MarshallingMessageConverter` .


    ```

    @Component

    class OrderService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "incoming-orders"),

    key = "new-order"

    ))

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    ```


    The preceding listener will use the `orders` exchange (which is a topic exchange)
    and creates a binding for the `incoming-orders` using the `new-order` routing
    key. When started, the exchange and queue will automatically be created if they
    don’t already exist. The incoming message is converted into an `Order` using the
    `Jackson2JsonMessageConverter` .


    #### Receiving a Message and Sending a Reply


    When receiving a message, it might be necessary to send a response back to the
    client or communicate with a different message; using an `@RabbitListener` on
    a nonvoid method is possible. It will create a result message and place it on
    an exchange with a routing-key; this needs to be specified in the `@SendTo` annotation
    .


    ```

    @Component

    class OrderService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "incoming-orders"),

    key = "new-order"

    ))

    @SendTo("orders/order-confirmation")

    public OrderConfirmation handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    return new OrderConfirmation(order.getId());

    }

    }

    ```


    When receiving an `Order` after processing it, an `OrderConfirmation` will be
    sent; the `@SendTo` annotation (from the general Spring Messaging component) contains
    the exchange and routing key. The part before the `/` is the exchange, the part
    afterwards is the routing key, thus `<exchange>/<routing-key>` is the pattern
    used. An empty exchange or routing key value is possible (or both); in that case,
    the default configured exchange and routing key will be used. Here it will use
    the `orders` exchange and use `order-confirmation` as the routing key.


    Another listener could be used to process the `OrderConfirmation` messages.


    ```

    @Component

    class OrderConfirmationService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "order-confirmations"),

    key = "order-confirmation"

    ))

    public void handle(OrderConfirmation confirmation) {

    System.out.println("[RECEIVED] - " + confirmation);

    }

    }

    ```


    It will create a queue `order-confirmations` using the `order-confirmation` routing-key
    and bind that on the `orders` exchange (just as the `OrderService` created earlier).
    When running the code, together with the sender from Recipe 9.4 you should receive
    `Order` instances and see that they will be confirmed as well.


