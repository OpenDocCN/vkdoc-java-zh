    ## 7.4 Use Plain Hibernate


    ### Problem


    You have some code that uses the plain Hibernate API, `Session`, and/or `SessionFactory`
    that you want to use with Spring Boot.


    ### Solution


    Use the `EntityManager` or `EntityManagerFactory` to obtain the plain Hibernate
    objects like `Session` or `SessionFactory` .


    ### How It Works


    When migrating older code to Spring Boot or when using a third-party library,
    it might not always be feasible to migrate everything to JPA. You want to use
    that code as is or with as little modification possible. There are two ways you
    can use the plain Hibernate API: either by getting the `Session` from the current
    `EntityManager` or configuring the SessionFactory. Which you want or can use depends
    on the influence you have on the code using the plain Hibernate API.'
  trans: '

    #### 使用 Spring Data JPA 仓库


    与其编写自己的仓库（这可能是一项繁琐且重复的任务），你也可以让 Spring Data JPA^(³¹) 为你完成繁重的工作。无需自行实现，你可以扩展 Spring
    Data 中的 `CrudRepository` 接口，并在运行时获得一个可用的仓库。这让你免于编写数据访问代码。当 Spring Boot 在类路径上检测到
    Spring Data JPA 时，它也会自动配置它。


    ```

    public interface CustomerRepository extends CrudRepository { }

    ```


    这就是你所需要的全部；`findAll`、`findById` 和 `save` 等方法均由 Spring Data JPA 开箱即用地提供。你可以移除 `JpaCustomerRepository`
    的实现。由于 `CrudRepository<Customer, Long>`，Spring Data 知道它可以查询 `Customer` 实例，并且其
    id 字段类型为 `Long`。


    运行应用程序应产生与之前相同的输出（参见图 7-4）。


    Spring Data JPA 只有一个可用属性，即显式启用或禁用它。它默认是启用的。将 `spring.data.jpa.repositories.enabled`
    设置为 `false` 将禁用 Spring Data JPA。


    #### 包含来自不同包的实体


    默认情况下，Spring Boot 会从 `@SpringBootApplication` 注解类所在的包开始检测组件、仓库和实体。但是，如果你有位于不同包中但仍需包含的实体，该怎么办？为此，你可以使用
    `@EntityScan` 注解；它的工作方式类似于 `@ComponentScan`，但针对的是 `@Entity` 注解的 bean。


    ```

    package com.apress.springboot2recipes.order;

    import javax.persistence.Entity;

    import javax.persistence.Id;

    import java.util.Objects;

    @Entity

    public class Order {

    @Id

    private long id;

    private String number;

    public long getId() {

    return id;

    }

    public void setId(long id) {

    this.id = id;

    }

    public String getNumber() {

    return number;

    }

    public void setNumber(String number) {

    this.number = number;

    }

    // 其他方法已省略

    }

    ```


    这个 `Order` 类位于 `com.apress.springboot2recipes.order` 包中，而 `@SpringBootApplication`
    注解的类位于 `com.apress.springboot2.recipes.jpa` 包中，因此它未被覆盖。为了让这个实体被检测到，你可以在 `@SpringBootApplication`
    注解的类（或一个普通的 `@Configuration` 类）上添加 `@EntityScan` 注解，并指定要扫描的包。


    ```

    @SpringBootApplication

    @EntityScan({

    "com.apress.springboot2recipes.order",

    "com.apress.springboot2recipes.jpa" })

    ```


    添加此注解后，`Order` 实体将被检测到，并且 JPA 可以访问它。


    #### 测试 JPA 仓库


    在测试 JPA 代码时，需要数据库，通常使用嵌入式数据库（如 H2、Derby 或 HSQLDB）进行测试。Spring Boot 使得为 JPA 编写测试变得非常容易。基于
    JPA 的测试可以使用 `@DataJpaTest` 注解，Spring Boot 将创建一个最小的应用程序，其中仅包含与 JPA 相关的 bean，例如
    `DataSource`、事务管理器，以及（如果需要）Spring Data JPA 仓库。


    让我们为 `CustomerRepository` 编写一个测试，并使用 H2 作为嵌入式数据库。首先，将 H2 添加为测试依赖项。


    ```

    com.h2database

    h2

    test


    ```


    接下来，创建 `CustomerRepositoryTest`。


    ```

    @RunWith(SpringRunner.class)

    @DataJpaTest

    @TestPropertySource(properties = "spring.flyway.enabled=false")

    public class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @Autowired

    private TestEntityManager testEntityManager

    }

    ```


    `@RunWith(SpringRunner.class)` 通过一个特殊的 JUnit 运行器来执行测试，以引导 Spring 测试上下文框架。`@DataJpaTest`
    将用嵌入式数据库（此处为 H2）替换预配置的 `DataSource`。它还将引导 JPA 组件，并在检测到时引导 Spring Data JPA 仓库。


    Spring Boot 还提供了一个 `TestEntityManager`，它提供了一些便捷方法，可以轻松地存储和查找用于测试的数据。


    最后是 `@TestPropertySource(properties = "spring.flyway.enabled=false")`，它表示我们要禁用
    Flyway。应用程序使用 Flyway 来管理模式；但是，这些脚本是为 PostgreSQL 编写的，而不是 H2。对于测试，你可以让 Hibernate
    管理模式，这也是在 Spring Boot 中使用嵌入式数据库时的默认设置。


    现在，编写一个测试来检查记录是否正确插入。


    ```

    @Test

    public void insertNewCustomer() {

    assertThat(repository.findAll()).isEmpty();

    Customer customer = repository.save(new Customer(-1, "T. Testing", "t.testing@test123.tst"));

    assertThat(customer.getId()).isGreaterThan(-1L);

    assertThat(customer.getName()).isEqualTo("T. Testing");

    assertThat(customer.getEmail()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.getId())).isEqualTo(customer);

    }

    ```


    此测试首先断言数据库为空——并非必需，但有助于检测其他测试是否污染了数据库。接下来，通过调用 `CustomerRepository` 上的 `save`
    方法将一个 `Customer` 添加到数据库。验证生成的 `Customer` 是否具有 id，以及 `name` 和 `email` 属性是否存在。最后，再次检索该
    `Customer` 并进行比较，确认相同。


    你可以添加的另一个测试是 `findAll` 方法。当插入两条记录时，调用 `findAll` 应检索到两条记录。


    ```

    @Test

    public void findAllCustomers() {

    assertThat(repository.findAll()).isEmpty();

    repository.save(new Customer(-1, "T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer(-1, "T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(2);

    }

    ```


    当然，还可以有更多断言，但保存数据的验证已在另一个测试方法中完成。


    ## 7.4 使用原生 Hibernate


    ### 问题


    你有一些使用原生 Hibernate API（`Session` 和/或 `SessionFactory`）的代码，希望与 Spring Boot 一起使用。


    ### 解决方案


    使用 `EntityManager` 或 `EntityManagerFactory` 来获取原生的 Hibernate 对象，例如 `Session` 或
    `SessionFactory`。


    ### 工作原理


    在将旧代码迁移到 Spring Boot 或使用第三方库时，将所有内容迁移到 JPA 可能并不总是可行的。你希望按原样使用该代码，或尽可能少地修改。有两种方法可以使用原生
    Hibernate API：从当前的 `EntityManager` 获取 `Session`，或者配置 `SessionFactory`。你想要或能够使用哪种方法，取决于你对使用原生
    Hibernate API 的代码的控制程度。

    '
- fmt: '#### Using the `EntityManager` to Obtain the `Session`


    To obtain the underlying Hibernate `Session`, the `unwrap` method can be used.
    This method has been added in JPA 2.0 to have a unified and convenient way to
    obtain the underlying JPA implementor classes, for those cases where you really
    need to access the native classes.


    ```java

    package com.apress.springboot2recipes.jpa;

    import org.hibernate.Session;

    import org.springframework.stereotype.Repository;

    import javax.persistence.EntityManager;

    import javax.persistence.PersistenceContext;

    import javax.transaction.Transactional;

    import java.util.List;

    @Repository

    @Transactional

    class HibernateCustomerRepository implements CustomerRepository {

    @PersistenceContext

    private EntityManager em;

    private Session getSession() {

    return em.unwrap(Session.class);

    }

    @Override

    public List findAll() {

    return getSession().createQuery("SELECT c FROM Customer c", Customer.class).getResultList();

    }

    @Override

    public Customer findById(long id) {

    return getSession().find(Customer.class, id);

    }

    @Override

    public Customer save(Customer customer) {

    getSession().persist(customer);

    return customer;

    }

    }

    ```


    The `HibernateCustomerRepository` gets the `EntityManager` injected, and to obtain
    the `Session` (see the `getSession` method) the `unwrap` method is used. Now you
    can use the Hibernate `Session` to perform queries, etc.


    #### Using the `SessionFactory`


    As of Hibernate 5.2 the Hibernate `SessionFactory` extends `EntityManagerFactory`
    and as such can be used to create both a `Session` and `EntityManager`. Spring
    5.1 added support for this in the `LocalSessionFactoryBean` and this can be used
    to mix both native Hibernate code and JPA code.


    To configure a `SessionFactory` bean, use the `LocalSessionFactoryBean`.


    ```java

    @Bean

    public LocalSessionFactoryBean sessionFactory(DataSource dataSource) {

    Properties properties = new Properties();

    properties.setProperty(DIALECT,

    "org.hibernate.dialect.PostgreSQL95Dialect");

    LocalSessionFactoryBean sessionFactoryBean = new LocalSessionFactoryBean();

    sessionFactoryBean.setDataSource(dataSource);

    sessionFactoryBean.setPackagesToScan("com.apress.springboot2recipes.jpa");

    sessionFactoryBean.setHibernateProperties(properties);

    return sessionFactoryBean;

    }

    ```


    The `SessionFactory` requires a `DataSource` to obtain connections to the database,
    a dialect to create SQL, and it needs to know where the entities are. This is
    the minimal configuration needed for a `SessionFactory`. There is no need to add
    the `HibernateTransactionManager`, as the default configured `JpaTransactionManager`
    can take care of the transactions. However, as JPA has some limitations (especially
    in transaction propagation levels) you might want to add the `HibernateTransactionManager`,
    which doesn’t suffer from these limitations.


    The modified `HibernateCustomerRepository` uses the `getCurrentSession` method
    from the `SessionFactory` to obtain the `Session`.


    ```java

    @Repository

    @Transactional

    class HibernateCustomerRepository implements CustomerRepository {

    private final SessionFactory sf;

    HibernateCustomerRepository(SessionFactory sf) {

    this.sf=sf;

    }

    private Session getSession() {

    return sf.getCurrentSession();

    }

    // unmodified methods omitted

    }

    ```


    ### Note


    Because the `SessionFactory` can also create the `EntityManager`, the `CustomerRepository`
    from Recipe 7-3 could be used as well!


    ## 7.5 Spring Data MongoDB


    ### Problem


    You want to use MongoDB in your Spring Boot application.


    ### Solution


    Add the Mongo Driver as a dependency and use the `spring.data.mongodb` properties
    to let Spring Boot set up the `MongoTemplate` to the correct MongoDB.


    ### How It Works


    Spring Boot automatically detects the presence of the MongoDB driver combined
    with the Spring Data MongoDB classes. If those are found, MongoDB as well as the
    `MongoTemplate` (among others) will be automatically set up for you.'
  raw: '#### Using the **EntityManager** to Obtain the **Session**


    To obtain the underlying Hibernate `Session`, the `unwrap` method can be used.
    This method has been added in JPA 2.0 to have a unified and convenient way to
    obtain the underlying JPA implementor classes, for those cases where you really
    need to access the native classes.


    ```

    package com.apress.springboot2recipes.jpa;

    import org.hibernate.Session;

    import org.springframework.stereotype.Repository;

    import javax.persistence.EntityManager;

    import javax.persistence.PersistenceContext;

    import javax.transaction.Transactional;

    import java.util.List;

    @Repository

    @Transactional

    class HibernateCustomerRepository implements CustomerRepository {

    @PersistenceContext

    private EntityManager em;

    private Session getSession() {

    return em.unwrap(Session.class);

    }

    @Override

    public List findAll() {

    return getSession().createQuery("SELECT c FROM Customer c", Customer.class).getResultList();

    }

    @Override

    public Customer findById(long id) {

    return getSession().find(Customer.class, id);

    }

    @Override

    public Customer save(Customer customer) {

    getSession().persist(customer);

    return customer;

    }

    }

    ```


    The `HibernateCustomerRepository` gets the `EntityManager` injected, and to obtain
    the `Session` (see the `getSession` method) the `unwrap` method is used. Now you
    can use the Hibernate `Session` to perform queries, etc.


    #### Using the **SessionFactory**


    As of Hibernate 5.2 the Hibernate `SessionFactory` extends `EntityManagerFactory`
    and as such can be used to create both a `Session` and `EntityManager`. Spring
    5.1 added support for this in the `LocalSessionFactoryBean` and this can be used
    to mix both native Hibernate code and JPA code.


    To configure a `SessionFactory` bean, use the `LocalSessionFactoryBean` .


    ```

    @Bean

    public LocalSessionFactoryBean sessionFactory(DataSource dataSource) {

    Properties properties = new Properties();

    properties.setProperty(DIALECT,

    "org.hibernate.dialect.PostgreSQL95Dialect");

    LocalSessionFactoryBean sessionFactoryBean = new LocalSessionFactoryBean();

    sessionFactoryBean.setDataSource(dataSource);

    sessionFactoryBean.setPackagesToScan("com.apress.springboot2recipes.jpa");

    sessionFactoryBean.setHibernateProperties(properties);

    return sessionFactoryBean;

    }

    ```


    The `SessionFactory` requires a `DataSource` to obtain connections to the database,
    a dialect to create SQL, and it needs to know where the entities are. This is
    the minimal configuration needed for a `SessionFactory`. There is no need to add
    the `HibernateTransactionManager`, as the default configured `JpaTransactionManager`
    can take care of the transactions. However, as JPA has some limitations (especially
    in transaction propagation levels) you might want to add the `HibernateTransactionManager`,
    which doesn’t suffer from these limitations.


    The modified `HibernateCustomerRepository` uses the `getCurrentSession` method
    from the `SessionFactory` to obtain the `Session`.


    ```

    @Repository

    @Transactional

    class HibernateCustomerRepository implements CustomerRepository {

    private final SessionFactory sf;

    HibernateCustomerRepository(SessionFactory sf) {

    this.sf=sf;

    }

    private Session getSession() {

    return sf.getCurrentSession();

    }

    // unmodified methods omitted

    }

    ```


    ### Note


    Because the `SessionFactory` can also create the `EntityManager`, the `CustomerRepository`
    from Recipe 7-3 could be used as well!


    ## 7.5 Spring Data MongoDB


    ### Problem


    You want to use MongoDB in your Spring Boot application.


    ### Solution


    Add the Mongo Driver as a dependency and use the `spring.data.mongodb` properties
    to let Spring Boot set up the `MongoTemplate` to the correct MongoDB.


    ### How It Works


    Spring Boot automatically detects the presence of the MongoDB driver combined
    with the Spring Data MongoDB classes. If those are found, MongoDB as well as the
    `MongoTemplate` (among others) will be automatically set up for you.'
  trans: '

    #### 使用 **EntityManager** 获取 **Session**


    要获取底层的 Hibernate `Session`，可以使用 `unwrap` 方法。该方法在 JPA 2.0 中引入，旨在提供一种统一且便捷的方式来获取底层
    JPA 实现类的实例，适用于确实需要访问原生类的场景。


    ```

    package com.apress.springboot2recipes.jpa;

    import org.hibernate.Session;

    import org.springframework.stereotype.Repository;

    import javax.persistence.EntityManager;

    import javax.persistence.PersistenceContext;

    import javax.transaction.Transactional;

    import java.util.List;

    @Repository

    @Transactional

    class HibernateCustomerRepository implements CustomerRepository {

    @PersistenceContext

    private EntityManager em;

    private Session getSession() {

    return em.unwrap(Session.class);

    }

    @Override

    public List findAll() {

    return getSession().createQuery("SELECT c FROM Customer c", Customer.class).getResultList();

    }

    @Override

    public Customer findById(long id) {

    return getSession().find(Customer.class, id);

    }

    @Override

    public Customer save(Customer customer) {

    getSession().persist(customer);

    return customer;

    }

    }

    ```


    `HibernateCustomerRepository` 通过注入获取 `EntityManager`，并使用 `unwrap` 方法获取 `Session`（参见
    `getSession` 方法）。现在，你可以使用 Hibernate `Session` 来执行查询等操作。


    #### 使用 **SessionFactory**


    从 Hibernate 5.2 开始，Hibernate `SessionFactory` 扩展了 `EntityManagerFactory`，因此可用于创建
    `Session` 和 `EntityManager`。Spring 5.1 在 `LocalSessionFactoryBean` 中添加了对这一特性的支持，可用于混合使用原生
    Hibernate 代码和 JPA 代码。


    要配置 `SessionFactory` Bean，请使用 `LocalSessionFactoryBean`。


    ```

    @Bean

    public LocalSessionFactoryBean sessionFactory(DataSource dataSource) {

    Properties properties = new Properties();

    properties.setProperty(DIALECT,

    "org.hibernate.dialect.PostgreSQL95Dialect");

    LocalSessionFactoryBean sessionFactoryBean = new LocalSessionFactoryBean();

    sessionFactoryBean.setDataSource(dataSource);

    sessionFactoryBean.setPackagesToScan("com.apress.springboot2recipes.jpa");

    sessionFactoryBean.setHibernateProperties(properties);

    return sessionFactoryBean;

    }

    ```


    `SessionFactory` 需要一个 `DataSource` 来获取数据库连接，一个方言来生成 SQL，并且需要知道实体类的位置。这是 `SessionFactory`
    所需的最小配置。无需添加 `HibernateTransactionManager`，因为默认配置的 `JpaTransactionManager` 可以处理事务。然而，由于
    JPA 存在一些限制（尤其是在事务传播级别方面），你可能希望添加 `HibernateTransactionManager`，它不受这些限制的影响。


    修改后的 `HibernateCustomerRepository` 使用 `SessionFactory` 的 `getCurrentSession` 方法来获取
    `Session`。


    ```

    @Repository

    @Transactional

    class HibernateCustomerRepository implements CustomerRepository {

    private final SessionFactory sf;

    HibernateCustomerRepository(SessionFactory sf) {

    this.sf=sf;

    }

    private Session getSession() {

    return sf.getCurrentSession();

    }

    // 未修改的方法已省略

    }

    ```


    ### 注意


    由于 `SessionFactory` 也可以创建 `EntityManager`，因此配方 7-3 中的 `CustomerRepository` 同样可以使用！


    ## 7.5 Spring Data MongoDB


    ### 问题


    你希望在 Spring Boot 应用程序中使用 MongoDB。


    ### 解决方案


    将 Mongo 驱动程序添加为依赖项，并使用 `spring.data.mongodb` 属性让 Spring Boot 将 `MongoTemplate`
    配置到正确的 MongoDB。


    ### 工作原理


    Spring Boot 会自动检测 MongoDB 驱动程序以及 Spring Data MongoDB 类的存在。如果检测到这些组件，MongoDB 以及
    `MongoTemplate`（等组件）将自动为你配置好。

