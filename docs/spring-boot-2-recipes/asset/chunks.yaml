    # 10. Spring Boot Actuator


    When developing an application, you also want to be able to monitor the behavior
    of the application. Spring Boot makes it very easy to enable that by introducing
    Spring Boot Actuator. Spring Boot actuator exposes health and metrics from the
    application to interested parties. This can be over JMX, HTTP, or exported to
    an external system.


    The health endpoints tell something about the health of your application and/or
    the system it is running on. It will detect if the database is up, report the
    diskspace, etc. The metrics endpoints expose usage and performance statistics
    like number of request, the longest request, the fastest, the utilization of your
    connection pool, etc.


    All these metrics can be viewed either through JMX or HTTP when enabled, but can
    also be automatically exported to an external system like Graphite, InfluxDB,
    and many others.


    ## 10.1 Enable and Configure Spring Boot Actuator


    ### Problem


    You want to enable health and metrics in your application so that you can monitor
    the status of the application.


    ### Solution


    Add a dependency for the `spring-boot-starter-actuator` to your project and the
    health and metrics will be enabled and exposed for your application. Additional
    configuration can be done through properties in the `management` namespace.'
  trans: '

    #### 接收简单消息


    只需一个带有 `@RabbitListener` 注解的组件，即可开始从 RabbitMQ 接收消息。


    ```

    @Component

    class HelloWorldReceiver {

    @RabbitListener( queues = "hello")

    public void receive(String msg) {

    System.out.println("Received: " + msg);

    }

    }

    ```


    上述组件将接收来自 `hello` 队列的所有消息，并将其打印到控制台。这对于简单的负载或接收对象能够从消息负载中反序列化的情况非常适用。然而，当发送对象或复杂消息时，可能更倾向于使用
    JSON 或 XML。


    #### 接收对象


    要接收更复杂的对象而不依赖 Java 序列化，你需要配置一个 `MessageConverter`（另请参阅配方 9.4）。配置好的 `MessageConverter`
    将被消息监听器容器使用，以将传入的负载转换为 `@RabbitListener` 注解方法所需的对象。


    ```

    @Bean

    public Jackson2JsonMessageConverter jsonMessageConverter() {

    return new Jackson2JsonMessageConverter();

    }

    ```


    要配置 `MessageConverter`，创建一个带有 `@Bean` 注解的方法，并构造你想要使用的转换器。这里的转换器是基于 Jackson 2 的，但还有一个用于解组
    XML 的转换器，即 `MarshallingMessageConverter`。


    ```

    @Component

    class OrderService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "incoming-orders"),

    key = "new-order"

    ))

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    ```


    上述监听器将使用 `orders` 交换机（这是一个主题交换机），并使用 `new-order` 路由键为 `incoming-orders` 队列创建绑定。启动时，如果交换机和队列尚不存在，它们将自动创建。传入的消息将使用
    `Jackson2JsonMessageConverter` 转换为 `Order` 对象。


    #### 接收消息并发送回复


    在接收消息时，可能需要向客户端发送响应或与不同的消息进行通信；可以在非 void 方法上使用 `@RabbitListener`。它会创建一个结果消息，并将其放置到具有路由键的交换机上；这需要在
    `@SendTo` 注解中指定。


    ```

    @Component

    class OrderService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "incoming-orders"),

    key = "new-order"

    ))

    @SendTo("orders/order-confirmation")

    public OrderConfirmation handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    return new OrderConfirmation(order.getId());

    }

    }

    ```


    当接收到 `Order` 并处理完成后，将发送一个 `OrderConfirmation`；`@SendTo` 注解（来自通用的 Spring Messaging
    组件）包含了交换机和路由键。`/` 之前的部分是交换机，之后的部分是路由键，因此模式为 `<exchange>/<routing-key>`。交换机或路由键的值可以为空（或两者都为空）；在这种情况下，将使用默认配置的交换机和路由键。这里将使用
    `orders` 交换机，并将 `order-confirmation` 作为路由键。


    可以使用另一个监听器来处理 `OrderConfirmation` 消息。


    ```

    @Component

    class OrderConfirmationService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "order-confirmations"),

    key = "order-confirmation"

    ))

    public void handle(OrderConfirmation confirmation) {

    System.out.println("[RECEIVED] - " + confirmation);

    }

    }

    ```


    它将使用 `order-confirmation` 路由键创建一个名为 `order-confirmations` 的队列，并将其绑定到 `orders`
    交换机上（就像之前创建的 `OrderService` 一样）。运行代码时，结合配方 9.4 中的发送者，你应该能够接收到 `Order` 实例，并看到它们也会被确认。


