    \ truststore, default empty |\n| `server.ssl.trust-store-provider` | Provider\
    \ of the truststore, default empty |\n\n### Note\n\nAll the properties mentioned\
    \ in the aforementioned tables apply **only** when using an embedded container\
    \ to run your application. When deploying to an external container (i.e., deploying\
