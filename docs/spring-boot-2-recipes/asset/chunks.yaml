    \ [3](#464036_1_En_3_Chapter.xhtml#Fn3_source) [4](#464036_1_En_3_Chapter.xhtml#Fn4_source)\
    \ [5](#464036_1_En_3_Chapter.xhtml#Fn5_source) [6](#464036_1_En_3_Chapter.xhtml#Fn6_source)\
    \ [7](#464036_1_En_3_Chapter.xhtml#Fn7_source) [8](#464036_1_En_3_Chapter.xhtml#Fn8_source)\
    \ [9](#464036_1_En_3_Chapter.xhtml#Fn9_source) [10](#464036_1_En_3_Chapter.xhtml#Fn10_source)\
    \ [11](#464036_1_En_3_Chapter.xhtml#Fn11_source)\n\n# 4. Spring MVC - 异步\n\n当\
    \ Servlet API 发布时，大多数实现容器使用每个请求一个线程的模式。这意味着一个线程会被阻塞，直到请求处理完成并将响应发送回客户端。\n\n在早期，连接到互联网的设备远没有现在这么多。由于设备数量的增加，处理的\
    \ HTTP 请求数量也随之增长。由于这种增长，对于许多 Web 应用程序来说，保持线程阻塞已不再可行。\n\n从 Servlet 3 规范开始，可以异步处理\
    \ HTTP 请求。这是通过释放处理 HTTP 请求的线程来实现的。新线程将在后台运行，一旦结果可用，就会将其写入客户端。这一切都可以在符合 Servlet\
    \ 3.1 规范的 Servlet 容器上以非阻塞方式完成。所有使用的资源也必须是非阻塞的。\n\n在过去的几年里，响应式编程也兴起起来。从 Spring\
    \ 5 开始，可以编写响应式 Web 应用程序。为了实现响应式，Spring 利用 Project Reactor 作为 Reactive Streams\
    \ API 的实现。深入探讨响应式编程超出了本书的范围。简而言之，响应式编程是一种进行非阻塞函数式编程的方式。\n\n在使用 Web 应用程序时，会有一个请求，HTML\
    \ 在服务器端渲染，然后发送回客户端。在过去的几年里，HTML 的渲染转移到了客户端。通信通过返回 JSON、XML 或其他表示形式给客户端来完成。\n\n\
    这仍然是一个请求和响应周期，尽管是通过客户端的`XmlHttpRequest`进行的异步调用驱动的。客户端和服务器之间还有其他通信方式。可以使用服务器发送事件（Server-Sent-Events）进行单向通信。对于全双工通信，可以使用\
    \ Web Socket。\n\n在构建常规 Web 应用程序时，添加`spring-boot-starter-web`作为依赖项。在构建响应式应用程序时，添加`spring-boot-starter-webflux`。\n\
    \n## 4.1 使用控制器和 TaskExecutor 进行异步请求处理\n\n### 问题\n\n为了减少 Servlet 容器的吞吐量，您希望异步处理请求。"
  raw: '### Warning


    Using a self-signed certificate will produce a warning in the browser that the
    website isn’t safe and protected, because the certificate isn’t issued by a trusted
    authority (see also Figure [3-12](#464036_1_En_3_Chapter.xhtml#Fig12)).


    #### Configure Spring Boot to Use the Keystore


    Spring Boot will need to know about the keystore to be able to configure the embedded
    container. For this, use the `server.ssl.key-store` property. You will also need
    to specify the type of keystore (`pkcs12`) and the password.


    ```

    server.ssl.key-store=classpath:sb2-recipes.pfx

    server.ssl.key-store-type=pkcs12

    server.ssl.key-store-password=password

    server.ssl.key-password=password

    server.ssl.key-alias=sb2-recipes

    ```


    Now when opening the http://localhost:8080/books.html page, it will be served
    through https (although with a warning). See Figure [3-12](#464036_1_En_3_Chapter.xhtml#Fig12).


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig12_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig12_HTML.jpg)


    Figure 3-12


    HTTPS access


    #### Support Both HTTP and HTTPS


    Spring Boot by default only starts one connector: either HTTP or HTTPS but not
    both. If you want to support both HTTP and HTTPS, you will manually have to add
    an additional connector. It is easiest to create the HTTP connector yourself and
    let Spring Boot set up the SSL part.


    First let’s configure Spring Boot to start the server on port 8443.


    ```

    server.port=8443

    ```


    To add an additional connector to the embedded Tomcat, you will need to add the
    `TomcatServletWebServerFactory` as a bean to our context. Normally Spring Boot
    would detect the container and select the `WebServerFactory` to use; however,
    as a customization needs to be done we need to add it manually. This bean can
    be added to a `@Configuration` annotated class or to the `LibraryApplication`
    class.


    ```

    @Bean

    public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

    var factory = new TomcatServletWebServerFactory();

    factory.addAdditionalTomcatConnectors(httpConnector());

    return factory;

    }

    private Connector httpConnector() {

    var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

    connector.setScheme("http");

    connector.setPort(8080);

    connector.setSecure(false);

    return connector;

    }

    ```


    This will add an additional connector on port 8080. The application will now be
    usable from both port 8080 and 8443\. Using Spring Security, you could now force
    access to parts of your application over HTTPS instead of HTTP.


    ### Tip


    If you don’t want to explicitly configure the `TomcatServletWebServerFactory`
    you could also use a `BeanPostProcessor` to register the additional Tomcat `Connector`
    with the `TomcatServletWebServerFactory`. That way you could implement this for
    different embedded containers instead of being tied to a single container.


    ```

    @Bean

    public BeanPostProcessor addHttpConnectorProcessor() {

    return new BeanPostProcessor() {

    @Override

    public Object postProcessBeforeInitialization(Object bean, String beanName)

    throws BeansException {

    if (bean instanceof TomcatServletWebServerFactory) {

    var factory = (TomcatServletWebServerFactory) bean;

    factory.addAdditionalTomcatConnectors(httpConnector());

    }

    return bean;

    }

    };

    }

    ```


    #### Redirect HTTP to HTTPS


    Instead of supporting both HTTP and HTTPS, another option is to support only HTTPS
    and redirect the traffic from HTTP to HTTPS. The configuration is similar to that
    as when supporting both HTTP and HTTPS. However, you now configure the connector
    to redirect all traffic from 8080 to 8443.


    ```

    @Bean

    public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

    var factory = new TomcatServletWebServerFactory();

    factory.addAdditionalTomcatConnectors(httpConnector());

    factory.addContextCustomizers(securityCustomizer());

    return factory;

    }

    private Connector httpConnector() {

    var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

    connector.setScheme("http");

    connector.setPort(8080);

    connector.setSecure(false);

    connector.setRedirectPort(8443);

    return connector;

    }

    private TomcatContextCustomizer securityCustomizer() {

    return context -> {

    var securityConstraint = new SecurityConstraint();

    securityConstraint.setUserConstraint("CONFIDENTIAL");

    var collection = new SecurityCollection();

    collection.addPattern("/*");

    securityConstraint.addCollection(collection);

    context.addConstraint(securityConstraint);

    };

    }

    ```


    The `httpConnector` now has a `redirectPort` set so that it knows which port to
    use. Finally, you need to secure all URLs with a `SecurityConstraint`. With Spring
    Boot you can use a specialized `TomcatContextCustomizer` to post-process the `Context`
    from Tomcat before it is started. The constraint makes everything (due to the
    use of `/*` as pattern) confidential (one of `NONE`, `INTEGRAL`, or `CONFIDENTIAL`
    is allowed) and the result is that everything will be redirected to https.


