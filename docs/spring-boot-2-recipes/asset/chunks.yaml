    \ get WebSockets support running in a reactive application.\n\n```\n<dependency>\n\
    \    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-webflux</artifactId>\n\
    </dependency>\n<dependency>\n    <groupId>javax.websocket</groupId>\n    <artifactId>javax.websocket-api</artifactId>\n\
    \    <version>1.1</version>\n</dependency>\n```\n\nSpring WebFlux expects that\
    \ WebSockets version 1.1 is used. When using 1.0, the code won’t run.\n\nNext,\
    \ use the `WebSocketHandler` to implement a reactive handler.\n\n```\npackage\
    \ com.apress.springbootrecipes.echo;\n\nimport org.springframework.web.reactive.socket.WebSocketHandler;\n\
