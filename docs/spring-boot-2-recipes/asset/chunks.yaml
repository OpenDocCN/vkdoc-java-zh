- fmt: '### Solution


    The lowest component of Spring WebFlux is the `HttpHandler`, an interface with
    a single `handle` method.


    ```

    public interface HttpHandler {

    Mono handle(ServerHttpRequest request, ServerHttpResponse response);

    }

    ```


    The `handle` method returns a `Mono<Void>`, which is the reactive way of saying
    it returns `void`. It takes both a `ServerHttpRequest` and `ServerHttpResponse`
    from the `org.springframework.http.server.reactive` package. These are again interfaces
    and depending on the container used for running, an instance of the interface
    is created. For this, several adapters or bridges for containers exist; when running
    on a Servlet 3.1 container (supporting nonblocking IO) the `ServletHttpHandlerAdapter`
    (or one of its subclasses) is used to adapt from the plain Servlet world to the
    Reactive world. When running on a native Reactive engine like Netty^([^(24)](#fn24))
    the `ReactorHttpHandlerAdapter` is used.


    When a web request is sent to a Spring WebFlux application, the `HandlerAdapter`
    first receives the request. Then it organizes the different components configured
    in Spring’s application context—all needed to handle the request.


    To define a controller class in Spring WebFlux, a class has to be marked with
    the `@Controller` or `@RestController` annotation (just as with Spring MVC; see
    Chapter [3](#464036_1_En_3_Chapter.xhtml)).


    When a `@Controller` annotated class (i.e., a controller class) receives a request,
    it looks for an appropriate handler method to handle the request. This requires
    that a controller class map each request to a handler method by one or more handler
    mappings. In order to do so, a controller class’s methods are decorated with the
    `@RequestMapping` annotation, making them handler methods.


    The signature for these handler methods—as you can expect from any standard class—is
    open ended. You can specify an arbitrary name for a handler method and define
    a variety of method arguments. Equally, a handler method can return any of a series
    of values (e.g., `String` or `void`), depending on the application logic it fulfills.
    The following is only a partial list of valid argument types, just to give you
    an idea.


    1. `ServerHttpRequest` or `ServerHttpResponse`

    2. Request parameters from the URL of arbitrary type, annotated with `@RequestParam`

    3. Cookie values included in an incoming request, annotated with `@CookieValue`

    4. Request header values of arbitrary type, annotated with `@RequestHeader`

    5. Request attribute of arbitrary type, annotated with `@RequestAttribute`

    6. `Map` or `ModelMap`, for the handler method to add attributes to the model

    7. `WebSession`, for the session


    Once the controller class has picked an appropriate handler method, it invokes
    the handler method’s logic with the request. Usually, a controller’s logic invokes
    back-end services to handle the request. In addition, a handler method’s logic
    is likely to add or remove information from the numerous input arguments (e.g.,
    `ServerHttpRequest`, `Map` or `Errors`) that will form part of the ongoing flow.


    After a handler method has finished processing the request, it delegates control
    to a view, which is represented as the handler method’s return value. To provide
    a flexible approach, a handler method’s return value doesn’t represent a view’s
    implementation (e.g., `user.html` or `report.pdf`) but rather a logical view (e.g.,
    `user` or `report`)—note the lack of file extension.


    A handler method’s return value can be either a `String`—representing a logical
    view name—or void, in which case a default logical view name is determined on
    the basis of a handler method’s or controller’s name.


    In order to pass information from a controller to a view, it’s irrelevant that
    a handler’s method returns a logical view name—`String` or a `void`—since the
    handler method input arguments will be available to a view.


    For example, if a handler method takes `Map` and `Model` objects as input parameters—modifying
    their contents inside the handler method’s logic—these same objects will be accessible
    to the view returned by the handler method.


    When the controller class receives a view, it resolves the logical view name into
    a specific view implementation (e.g., `user.html` or `report.fmt`) by means of
    a view resolver. A view resolver is a bean configured in the web application context
    that implements the `ViewResolver` interface. Its responsibility is to return
    a specific view implementation for a logical view name.


    Once the controller class has resolved a view name into a view implementation,
    per the view implementation’s design, it renders the objects (e.g., `ServerHttpRequest`,
    `Map`, `Errors`, or `WebSession`) passed by the controller’s handler method. The
    view’s responsibility is to display the objects added in the handler method’s
    logic to the user.


    ### How It Works


    Let’s write a reactive version of the `HelloWorldApplication` from Recipe 4-1.


    ```

    package com.apress.springbootrecipes.helloworld;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Mono;

    @RestController

    public class HelloWorldController {

    @GetMapping

    public Mono hello() {

    return Mono.just("Hello World, from Spring Boot 2!");

    }

    }

    ```


    Notice the `Mono<String>` is a return type for the `hello` method, instead of
    a plain `String`. The `Mono` is what makes it reactive.


    #### Setting Up a Spring WebFlux Application


    To be able to handle requests in a reactive way, you need to enable webflux. This
    is done by adding a dependency on `spring-boot-starter-webflux`.


    ```

    org.springframework.boot

    spring-boot-starter-webflux

    ```


    This brings in the needed dependencies like `spring-webflux` and the project Reactor
    ( [`http://www.projectreactor.io`](http://www.projectreactor.io) ) dependencies.
    It also includes a reactive runtime, which by default is Netty.


    Now that everything is configured, the final thing to do is create an application
    class.


    ```

    package com.apress.springbootrecipes.library;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    ```


    Spring Boot will detect the reactive runtime and configure it using the `server.*`
    properties (see Recipe 3-7).


    #### Creating Spring WebFlux Controllers


    An annotation-based controller class can be an arbitrary class that doesn’t implement
    a particular interface or extend a particular base class. You can annotate it
    with the `@Controller` or `@RestController` annotation. There can be one or more
    handler methods defined in a controller to handle single or multiple actions.
    The signature of the handler methods is flexible enough to accept a range of arguments.


    ```

    package com.apress.springbootrecipes.helloworld;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Mono;

    @RestController

    public class HelloWorldController {

    @GetMapping("/hello")

    public Mono hello() {

    return Mono.just("Hello World, from Reactive Spring Boot 2!");

    }

    }

    ```


    The annotation `@GetMapping` is used to decorate the `hello` method as the controller’s
    HTTP GET handler method. It’s worth mentioning that if no default HTTP GET handler
    method is declared, a `ServletException` is thrown—hence the importance of a controller
    having at a minimum a URL route and at least one handler method. The method is
    bound to `/hello` due to the expression in the `@GetMapping`.


    When a request is made on `/hello` it will reactively return `Hello World, from
    Reactive Spring Boot 2!`, although the client won’t notice this. For the client
    it still is a regular HTTP request.'
