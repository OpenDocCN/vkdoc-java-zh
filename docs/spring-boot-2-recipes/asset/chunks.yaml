- fmt: '#### Integration Testing with STOMP


    To do integration testing you would need to start the application, probably on
    a random port, construct a STOMP client, and send a message. The last part of
    the test (sending and receiving) is asynchronous, so that makes it a bit more
    difficult to do testing. First, start the application on a random port and get
    the random port in the test class.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    public class EchoHandlerIntegrationTest {

    @LocalServerPort

    private int port;

    }

    ```


    The `@RunWith` instructs JUnit to use the `SpringRunner` to execute the test.
    The `@SpringBootTest` will start the application, and due to the `WebEnvironment.RANDOM_PORT`
    it will start at a random port. With the `@LocalServerPort` annotation on an `int`
    field, we can get the actual port.


    Next, to test you can use the `WebSocketStompClient` from the Spring client library
    to connect to the server and subscribe to a topic. To receive messages on a topic,
    write a class that extends from `StompSessionHandlerAdapter` and override the
    `getPayloadType` and `handleFrame` methods. This class, as we don’t reuse it,
    can be a `static` nested class inside the `EchoHandlerIntegrationTest` class.


    ```

    private static class TestStompFrameHandler extends StompSessionHandlerAdapter
    {

    private final CompletableFuture answer;

    private TestStompFrameHandler(CompletableFuture answer) {

    this.answer = answer;

    }

    @Override

    public Type getPayloadType(StompHeaders headers) {

    return byte[].class;

    }

    @Override

    public void handleFrame(StompHeaders headers, Object payload) {

    answer.complete(new String((byte[]) payload));

    }

    }

    ```


    Due to the asynchronous nature of WebSockets, we need something we can use to
    block until we receive a response. To transfer the result we use a `CompletableFuture`,
    and when asserting we can use the `get` method to block until we receive an answer
    (or timeout).


    For the test case, we need to create a STOMP client and use that to connect to
    the STOMP broker, subscribe to the `/topic/echo` to receive messages, and finally
    send a message and check the result.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    public class EchoHandlerIntegrationTest {

    @LocalServerPort

    private int port;

    private WebSocketStompClient stompClient;

    private List sessions = new ArrayList();

    @Before

    public void setup() {

    var webSocketClient = new StandardWebSocketClient();

    stompClient = new WebSocketStompClient(webSocketClient);

    }

    @After

    public void cleanUp() {

    this.sessions.forEach(StompSession::disconnect);

    this.sessions.clear();

    }

    @Test

    public void shouldSendAndReceiveMessage() throws Exception {

    CompletableFuture answer = new CompletableFuture();

    var stompSession = connectAndSubscribe(answer);

    stompSession.send("/app/echo", "Hello World!".getBytes());

    var result = answer.get(1, TimeUnit.SECONDS);

    assertThat(result).isEqualTo("RECEIVED: Hello World!");

    }

    private StompSession connectAndSubscribe(CompletableFuture answer)

    throws InterruptedException, ExecutionException, TimeoutException {

    var uri = "ws://localhost:" + port + "/echo-endpoint";

    var stompSession =

    stompClient.connect(uri, new StompSessionHandlerAdapter() {})

    .get(1, TimeUnit.SECONDS);

    stompSession.subscribe("/topic/echo",

    new TestStompFrameHandler(answer));

    this.sessions.add(stompSession);

    return stompSession;

    }

    ...

    }

    ```


    In the `@Before` the `WebSocketStompClient` is created, and it uses a `StandardWebSocketClient`
    as a transport. In the `@After` method, we clean up any sessions that have connected
    to the broker (just to be sure not to leave anything behind). The `connectAndSubscribe`
    method uses the `WebSocketStompClient` to connect to the broker and here it is
    configured to wait 1 second to be connected. The `StompSession` is then used to
    subscribe the earlier created `TestStompFrameHandler` using the passed in `CompletableFuture`.
    Of course you could do without the helper method, but generally you need more
    integration tests and with this you can create a reusable piece of code. Finally
    the actual test: it first connects and subscribes, then it sends `Hello World!`
    to the server and expects an answer in 1 second (or less). The result is checked
    with the expected result.


    Footnotes [1](#464036_1_En_4_Chapter.xhtml#Fn1_source) [2](#464036_1_En_4_Chapter.xhtml#Fn2_source)


