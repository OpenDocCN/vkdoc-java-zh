    own configuration as needed.


    ```

    spring.datasource.url=jdbc:postgresql://localhost:5432/customers

    spring.datasource.username=customers

    spring.datasource.password=customers

    ```


    The `spring.datasource.url` tells the datasource where to connect to, and `spring.datasource.username`
    and `spring.datasource.password` configure the username and password to use when
    connecting. You could also specify the `spring.datasource.driver-class-name` to
    specify the JDBC driver class to use; generally Spring Boot will detect the driver
    to use from the passed in URL. If you want to use a nondefault driver (for performance
    or logging), you could specify this as well.


    When running the `JdbcApplication` the output should be like that of Figure [7-2](#464036_1_En_7_Chapter.xhtml#Fig2);
    there are now a bunch of different tables (compared with Derby).


    ![../images/464036_1_En_7_Chapter/464036_1_En_7_Fig2_HTML.jpg](images/464036_1_En_7_Chapter/464036_1_En_7_Fig2_HTML.jpg)


