  raw: '#### Integration Testing Plain WebSockets


    Writing an integration test is a little harder. A websocket connection needs to
    be made to the server, and we need to manually send messages and check the response.
    But before that the server needs to be started.


    To start the server, annotate a class with `@RunWith(SpringRunner.class)` and
    `@SpringBootTest` `(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)`.
    We actually want to start the application instead of the default `WebEnvironment.MOCK`.
    Use the `@LocalServerPort` annotation on an `int` field to get the actual port
    value. This value is needed to construct the `URI` to connect to.


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    public class EchoHandlerIntegrationTest {

    @LocalServerPort

    private int port;

    }

    ```


    Testing websockets is fairly easy with the default Java WebSocket API. To test,
    you can write a basic websocket client that records the received messages and
    session. Annotate a class with `@ClientEndpoint` and methods in that class with
    `@OnOpen`, `@OnClose`, and `@OnMessage`. These annotated methods will receive
    callbacks when the connection is opened, closed, and when a message is received,
    respectively. Next there are two helper methods: `sendTextAndWait` and `closeAndWait`
    . The `sendTextAndWait` will send a message using the `Session` and wait for a
    response. The `closeAndWait` will `close` the session and wait until that has
    been confirmed. Finally, there are some getter methods to receive the state and
    validate it in the test methods.


    Add the `SimpleTestClientEndpoint` as a static embedded class in the `EchoHandlerIntegrationTest`
    .


    ```

    @ClientEndpoint

    public static class SimpleTestClientEndpoint {

    private List received = new ArrayList();

    private Session session;

    private CloseReason closeReason;

    private boolean closed = false;

    @OnOpen

    public void onOpen(Session session) {

    this.session = session;

    }

    @OnClose

    public void onClose(Session session, CloseReason reason) {

    this.closeReason = reason;

    this.closed = true;

    }

    @OnMessage

    public void onMessage(String message) {

    this.received.add(message);

    }

    public void sendTextAndWait(String text, long timeout)

    throws IOException, InterruptedException {

    var current = received.size();

    session.getBasicRemote().sendText(text);

    wait(() -> received.size() == current, timeout);

    }

    public void closeAndWait(long timeout)

    throws IOException, InterruptedException {

    if (session != null && !closed) {

    session.close();

    }

    wait(() -> closeReason == null, timeout);

    }

    private void wait(Supplier condition, long timeout)

    throws InterruptedException {

    var waited = 0;

    while (condition.get() && waited  getReceived() {

    return this.received;

    }

    public boolean isClosed() {

    return closed;

    }

    }

    ```


    Now that the helper classes are in place, write a test. Use the WebSocket `ContainerProvider`
    to obtain the container. Before making the actual connection, you have to construct
    the URI using the `port` field. Next, use the `connectToServer` method to connect
    to the server, using an instance of the `SimpleTestClientEndpoint`. After connecting,
    send a text message to the server and wait for some time and close the connection
    (just to cleanup resources). The final thing is to actually do some assertions
    on the received messages. Here we expect exactly two messages to be received.


    ```

    @Test

    public void sendAndReceiveMessage() throws Exception {

    var container = ContainerProvider.getWebSocketContainer();

    var uri = URI.create("ws://localhost:" + port + "/echo");

    var testClient = new SimpleTestClientEndpoint();

    container.connectToServer(testClient, uri);

    testClient.sendTextAndWait("Hello World!", 200);

    testClient.closeAndWait(2);

    assertThat(testClient.getReceived())

    .containsExactly("CONNECTION ESTABLISHED", "RECEIVED: Hello World!");

    }

    ```


    ## 4.4 WebSockets with STOMP


    ### Problem


    You want to use STOMP (**S**imple/**S**treaming **T**ext **O**riented **M**essage
    **P**rotocol) over WebSockets to communicate with the server.


    ### Solution


    Configure the message broker and use `@MessageMapping` annotated methods in an
    `@Controller` annotated class to handle the messages.


    ### How It Works


    Let’s talk about using WebSockets to create an application that more or less implies
    messaging. Although you can use the WebSocket protocol as is, the protocol allows
    you to use subprotocols. One of those protocols, supported by Spring WebSocket,
    is STOMP.


    STOMP is a very simple text-oriented protocol. It was created for scripting languages
    like Ruby and Python to connect to message brokers. STOMP can be used over any
    reliable bidirectional network protocol like TCP and also WebSocket. The protocol
    itself is text-oriented, but the payload of the messages isn’t strictly bound
    to this; it can also contain binary data.


    When configuring and using STOMP with Spring WebSocket support, the WebSocket
    application acts as a broker for all connected clients. The broker can be an in-memory
    broker or an actual full-blown enterprise solution that supports the STOMP protocol
    (like RabbitMQ or ActiveMQ). In the latter case the Spring WebSocket application
    acts as a relay for the actual broker. To add messaging over WebSocket, spring
    uses the Spring Messaging abstraction.'
