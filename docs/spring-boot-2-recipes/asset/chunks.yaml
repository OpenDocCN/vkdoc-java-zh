- fmt: '#### Simplify the Application Class


    If you look at the class definition, there are three annotations on it.


    ```

    @Configuration

    @EnableAutoConfiguration

    @ComponentScan

    public class DemoApplication { ... }

    ```


    When writing a Spring Boot-based application, most of those require all these
    annotations. This code can be simplified by using the `@SpringBootApplication`
    annotation instead. The class header then becomes


    ```

    @SpringBootApplication

    public class DemoApplication { ... }

    ```


    The `@SpringBootApplication` annotation is a so-called composed annotation and
    consists of the earlier needed annotations.


    ```

    @Target({ElementType.TYPE})

    @Retention(RetentionPolicy.RUNTIME)

    @Documented

    @Inherited

    @SpringBootConfiguration

    @EnableAutoConfiguration

    @ComponentScan

    public @interface SpringBootApplication { ... }

    ```


    There is one difference between the `@SpringBootApplication` and the earlier mentioned
    annotations. Here the `@SpringBootConfiguration` annotation is used instead of
    the `@Configuration` annotation. The `@SpringBootConfiguration` is a specialized
    `@Configuration` annotation. It indicates that this is a Spring Boot-based application.
    When using `@SpringBootConfiguration` in your application, there can only be one
    class annotated with this annotation!


    ## 1.2 Create a Spring Boot Application Using Gradle


    ### Problem


    You want to start developing an application using Spring Boot and Gradle.


    ### Solution


    Create a Gradle build file, the `build.gradle`, and add the needed dependencies.
    To launch the application, create a Java class containing a `main` method to bootstrap
    the application.


    ### How It Works


    Suppose you are going to create a simple application that bootstraps a `SpringApplication`,
    gets all the beans from the `ApplicationContext`, and outputs them to the console.


    #### Create the `build.gradle`


    First you need to create a `build.gradle` and use the two plug-ins needed for
    Gradle to properly manage the dependencies for Spring Boot. Spring Boot requires
    a special Gradle plug-in (the Spring Boot Gradle plug-in) as well as a plug-in
    to extend the default dependency management capabilities of Gradle (the dependency
    management plug-in). To enable and configure these plug-ins, create a `buildscript`
    task in your `build.gradle`.


    ```

    buildscript {

    ext {

    springBootVersion = ''2.1.0.RELEASE''

    }

    repositories {

    mavenCentral()

    }

    dependencies {

    classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")

    }

    }

    ```


    This task will now properly configure the Spring Boot plug-in to use. Next you
    need to specify the plug-ins you want to use; as this is a Java-based project,
    you at least need the `Java` plug-in and as this book is about Spring Boot, you
    will also need the `org.springframework.boot` plug-in. Finally, you need to include
    the `io.spring.dependency-management` plug-in, for letting the Spring Boot Starters
    manage the dependencies.


    ```

    apply plugin: ''java''

    apply plugin: ''org.springframework.boot''

    apply plugin: ''io.spring.dependency-management''

    ```


    Finally you will need to add the needed dependencies; just as with Recipe 1.1,
    add the `spring-boot-starter` dependency.


    ```

    dependencies {

    compile ''org.springframework.boot:spring-boot-starter''

    }

    ```


    Notice the absence of the specific version on the dependency. Not needing to specify
    the version, and have it automatically managed, is due to the usage of the `io.spring.dependency-management`
    plug-in which, just as with Maven, allows for easier dependency management.


    The full `build.gradle` should now look something like this:


    ```

    buildscript {

    ext {

    springBootVersion = ''2.1.0.RELEASE''

    }

    repositories {

    mavenCentral()

    }

    dependencies {

    classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")

    }

    }

    apply plugin: ''java''

    apply plugin: ''org.springframework.boot''

    apply plugin: ''io.spring.dependency-management''

    dependencies {

    compile ''org.springframework.boot:spring-boot-starter''

    }

    repositories {

    mavenCentral()

    }

    ```


    #### Create the Application Class


    Let’s create a `DemoApplication` class with a `main` method. The `main` method
    calls `SpringApplication.run` with the `DemoApplication.class` and arguments from
    the main method. The `run` method returns an `ApplicationContext`, which is used
    to retrieve the bean names from `ApplicationContext`. The names are sorted and
    then printed to the console.


    The resulting class would look like the following:


    ```

    package com.apress.springbootrecipes.demo;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import java.util.Arrays;

    @SpringBootApplication

    public class DemoApplication {

    public static void main(String[] args) {

    var ctx = SpringApplication.run(DemoApplication.class, args);

    System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

    var names = ctx.getBeanDefinitionNames();

    Arrays.sort(names);

    Arrays.asList(names).forEach(System.out::println);

    }

    }

    ```


    This class is a regular Java class with a `main` method. You can run this class
    from your IDE. When the application runs, it will show output similar to Figure
    [1-2](#464036_1_En_1_Chapter.xhtml#Fig2).


    ![../images/464036_1_En_1_Chapter/464036_1_En_1_Fig2_HTML.jpg](images/464036_1_En_1_Chapter/464036_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Output of running application


    ## 1.3 Create a Spring Boot Application Using Spring Initializr


    ### Problem


    You want to start a Spring Boot application using Spring Initializr.


    ### Solution


    Go to [`http://start.spring.io`](http://start.spring.io), select the Spring Boot
    version and the different dependencies you think you need, and download the project.'
