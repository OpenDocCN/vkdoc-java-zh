    **Figure 9-2** Artemis beans output


    ### Note


    You might wonder when using Artemis if there is still an `ActiveMQConnectionFactory`
    in your configuration. Artemis is based on ActiveMQ, and as such shares classes
    with it.


    Artemis can be used in embedded mode (just like ActiveMQ); it will then start
    an embedded broker. To configure it, there are several properties exposed in the
    `spring.artemis.embedded` namespace (see Table [9-3](#464036_1_En_9_Chapter.xhtml#Tab3)).
    The embedded mode requires `artemis-server` as an additional dependency.


    **Table 9-3** Artemis Embedded Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.artemis.embedded.enabled` | Should embedded mode be enabled, default
    `true` |

    | `spring.artemis.embedded.persistent` | Are messages persisted, default `false`
    |

    | `spring.artemis.embedded.data-directory` | Directory used to store the journal,
    only useful when `persistent` is `true`. Default is the Java Tempdir. |

    | `spring.artemis.embedded.queues` | Comma-separated list of queues to create
    on startup |

    | `spring.artemis.embedded.topics` | Comma-separated list of topics to create
    on startup |

    | `spring.artemis.embedded.cluster-password` | Cluster password, default generated
    |


    ```

    org.apache.activemq

    artemis-server

    ```


    #### JNDI


    When deploying a Spring Boot application to a JEE container, there is a big chance
    that you want to use a preregistered `ConnectionFactory` from that container as
    well. To enable this, you would need a dependency on the `spring-jms` library
    and the `javax.jms-api` (the latter can then probably be marked, provided as well
    as that it will be supplied by your JEE container). You could use one of the starters
    and exclude the explicit ActiveMQ or Artemis dependencies; however, declaring
    only the needed dependencies is easier and clearer.


    ```

    org.springframework

    spring-jms


    javax.jms

    javax.jms-api

    provided

    ```


    When JNDI is available, Spring Boot will first try to detect the `ConnectionFactory`
    in the JNDI register under one of the well-known names `java:/JmsXA` and `java:/XAConnectionFactory`
    or by the name specified in the `spring.jms.jndi-name` property. Furthermore,
    it will also automatically create a `JndiDestinationResolver` so that the queues
    and topics will also be detected in JNDI; by default a fallback to dynamic creation
    of destinations is allowed.


    ```

    spring.jms.jndi-name=java:/jms/connectionFactory

    ```


    With that in place and having built your WAR (see Recipe 11.2), you can now deploy
    your application to the JEE container and reuse the existing `ConnectionFactory`.


    #### Manual Configuration


    The final way of configuring JMS is to do manual configuration. For this you will
    at least need the `spring-jms` and `javax.jms-api` dependencies and probably some
    client libraries for the JMS broker you are using. Manual configuration can be
    needed when:


    1. Spring Boot cannot auto-configure your `ConnectionFactory`.

    2. Extensive setup of the `ConnectionFactory` is needed.

    3. Multiple `ConnectionFactory` instances are needed.


    To configure a `ConnectionFactory`, you can add a `@Bean` annotated method that
    constructs one.


    ```

    @Bean

    public ConnectionFactory connectionFactory() {

    var connectionFactory = new ActiveMQConnectionFactory("vm://localhost?broker.persistent=false");

    connectionFactory.setClientID("someId");

    connectionFactory.setCloseTimeout(125);

    return connectionFactory;

    }

    ```


    This will create a `ConnectionFactory` for ActiveMQ; it will use an embedded nonpersistent
    broker and set the `clientId` and `closeTimeout`. When Spring Boot detects a preconfigured
    `ConnectionFactory`, it doesn''t attempt to create one itself.


    ## 9.2 Send Messages Using JMS


    ### Problem


    You want to send messages to other systems over JMS.


    ### Solution


    Use the Spring Boot-provided `JmsTemplate` to send and (optionally) convert messages.'
