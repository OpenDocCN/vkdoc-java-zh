  trans: '

    #### 配置 TaskExecutor


    Spring Boot 会自动配置一个 `ThreadPoolTaskExecutor`。这可以通过 `spring.task.execution` 命名空间下的属性进行配置（表
    8-1）。


    表 8-1


    Spring Boot 任务执行器属性


    | **属性** | **描述** |

    | --- | --- |

    | `spring.task.execution.pool.core-size` | 核心线程数，默认为 8 |

    | `spring.task.execution.pool.max-size` | 最大线程数，默认为 `Integer.MAX_VALUE` |

    | `spring.task.execution.pool.queue-capacity` | 队列容量。默认无限制，此时会忽略 `max-size` 属性。
    |

    | `spring.task.execution.pool.keep-alive` | 线程在终止前可以保持空闲的时间限制 |

    | `spring.task.execution.thread-name-prefix` | 新创建线程名称的前缀。默认为 `task-` |

    | `spring.task.execution.pool.allow-core-thread-timeout` | 是否允许核心线程超时，默认为 true。这允许线程池动态增长和收缩。
    |


    将以下内容添加到 `application.properties` 中，将覆盖部分默认值。


    ```

    spring.task.execution.pool.core-size=4

    spring.task.execution.pool.max-size=16

    spring.task.execution.pool.queue-capacity=125

    spring.task.execution.thread-name-prefix=sbr-exec-

    ```


    现在重新运行应用程序，线程名称将以 `sbr-exec` 开头。它将启动四个线程，并最多增长到 16 个。要启用线程池大小调整，需要为队列容量指定一个固定数值。过大（或无限制）的队列容量不会自动增加线程数量。


    #### 使用 TaskExecutorBuilder 创建 TaskExecutor


    如果需要构造一个 `TaskExecutor`，Spring Boot 提供了 `TaskExecutorBuilder`。这个构建器类使得构造 `ThreadPoolTaskExecutor`
    更加容易。它允许我们设置与表 8-1 中相同的属性。


    ```

    @Bean

    public TaskExecutor customTaskExecutor(TaskExecutorBuilder builder) {

    return builder.corePoolSize(4)

    .maxPoolSize(16)

    .queueCapacity(125)

    .threadNamePrefix("sbr-exec-").build();

    }

    ```


    如果由于某种原因，你的应用程序中存在多个 `TaskExecutor` 实例，你需要将其中一个标记为 `@Primary` 以用作默认的 `TaskExecutor`，或者使用
    `AsyncConfigurer` 接口并实现 `taskExecutor` 方法来返回要使用的默认 `TaskExecutor`。


    ```

    @SpringBootApplication

    @EnableAsync

    public class ThreadingApplication implements AsyncConfigurer {

    @Bean

    public ThreadPoolTaskExecutor taskExecutor() { ... }

    @Override

    public Executor getAsyncExecutor() {

    return taskExecutor();

    }

    }

    ```


    ## 8.2 Spring 任务调度


    ### 问题


    你希望以一致的方式调度方法调用，可以使用 cron 表达式、固定间隔或固定速率。


    #### 解决方案


    Spring 支持配置 `TaskExecutor` 和 `TaskScheduler`。此功能结合使用 `@Scheduled` 注解调度方法执行的能力，使得
    Spring 的调度支持几乎无需额外配置：你只需要一个方法、一个注解，并启用注解扫描器即可。Spring Boot 不会自动检测调度需求；你需要使用 `@EnableScheduling`
    注解自行启用。


    ### 工作原理


    让我们编写一个组件，该组件每四秒在日志中输出一条消息。创建一个 Java 类，并在方法上使用 `@Scheduled` 注解，以指示该方法需要被调用。使用
    `fixedRate=4000` 作为参数，它将每四秒运行一次。如果你想使用 cron 表达式，可以在 `@Scheduled` 注解上设置 `cron`
    属性。


    ```

    package com.apress.springbootrecipes.scheduling;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorld {

    private static final Logger logger =

    LoggerFactory.getLogger(HelloWorld.class);

    @Scheduled(fixedRate = 4000)

    public void printMessage() {

    logger.info("Hello World, from Spring Boot 2!");

    }

    }

    ```


    `@Component` 将确保它被 Spring Boot 检测到。


    接下来要做的是为你的应用程序启用调度。最简单的解决方案是使用 `@EnableScheduling` 注解应用程序类。当然，你也可以将其放在其他带有 `@Configuration`
    注解的类上。


    ```

    package com.apress.springbootrecipes.scheduling;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;

    @SpringBootApplication

    @EnableScheduling

    public class SchedulingApplication {

    public static void main(String[] args) {

    SpringApplication.run(SchedulingApplication.class, args);

    }

    }

    ```


    `@EnableScheduling` 将启用对 `@Scheduled` 注解方法的检测，并注册一个用于调度任务的 `TaskScheduler`。当在应用程序上下文中检测到单个
    `TaskScheduler` 时，它将使用该实例，而不是创建一个新的。


    运行 `SchedulingApplication` 将在大约每四秒在日志中输出一条信息。


    除了使用 `@Scheduled` 注解，你也可以使用 Java 代码来调度方法。如果你无法在你希望定期执行的方法上放置 `@Scheduled` 注解，或者你只是想减少注解的使用，那么可能需要这样做。为此，你可以使用
    `SchedulingConfigurer`，它有一个用于配置额外任务的单一回调方法。


    ```

    @SpringBootApplication

    @EnableScheduling

    public class SchedulingApplication implements SchedulingConfigurer {

    @Autowired

    private HelloWorld helloWorld;

    public static void main(String[] args) {

    SpringApplication.run(SchedulingApplication.class, args);

    }

    @Override

    public void configureTasks(ScheduledTaskRegistrar taskRegistrar) {

    taskRegistrar.addFixedRateTask(

    () -> helloWorld.printMessage()

    , 4000);

    }

    }

    ```


    ## 8.3 发送电子邮件


    当在类路径上检测到邮件属性和 Java 邮件库时，Spring Boot 将自动配置发送邮件的能力。在本节中，我们将了解如何设置属性以及如何使用 Spring
    Boot 发送电子邮件。


    ### 问题


    你希望从 Spring Boot 应用程序发送电子邮件。


    ### 解决方案


    Spring 的电子邮件支持通过提供一个抽象且与实现无关的 API 来发送电子邮件，从而简化了电子邮件的发送。Spring 电子邮件支持的核心接口是 `MailSender`。`JavaMailSender`
    接口是 `MailSender` 的子接口，它包含了专门的 JavaMail 特性，例如多用途互联网邮件扩展（MIME 消息）支持。要发送包含 HTML 内容、内嵌图片或附件的电子邮件，你必须将其作为
    MIME 消息发送。当在类路径上找到 `javax.mail` 类并且设置了相应的 `spring.mail` 属性时，Spring Boot 将自动配置
    `JavaMailSender`。

    '
- fmt: "### How It Works\n\nThe first thing to do is add the `spring-boot-starter-mail`\
    \ dependency to your list of dependencies. This will add the necessary `javax.mail`\
    \ as well as the `spring-context` dependencies on the classpath.\n\n```\n<dependency>\n\
    \    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-mail</artifactId>\n\
    </dependency>\n```\n\n#### Configure the JavaMailSender\n\nTo be able to send\
    \ mail, you need to configure the appropriate `spring.mail` properties (Table\
    \ 8-2). At least the `spring.mail.host` property is needed; the other properties\
    \ are optional.\n\n**Table 8-2** Spring Boot Mail Properties\n\n| Property | Description\
    \ |\n| --- | --- |\n| `spring.mail.host` | The SMTP server host |\n| `spring.mail.port`\
    \ | The SMTP server port (default 25) |\n| `spring.mail.username` | Username to\
    \ use for connecting to the SMTP server |\n| `spring.mail.password` | Password\
    \ to use for connecting to the SMTP server |\n| `spring.mail.protocol` | The protocol\
    \ used by the SMTP server (default `smtp`) |\n| `spring.mail.test-connection`\
    \ | Test if the SMTP server is available at startup (default `false`) |\n| `spring.mail.default-encoding`\
    \ | Encoding used for MIME messages (default `UTF-8`) |\n| `spring.mail.properties.*`\
    \ | Additional properties to be set on the JavaMail Session |\n| `spring.mail.jndi-name`\
    \ | JNDI name of the JavaMail Session, can be used when deploying to a JEE server\
    \ with preconfigured JavaMail Sessions in JNDI. |\n\nNext, you need to define\
    \ at least the `spring.mail.host` property to be able to send mail.\n\n```\nspring.mail.host=localhost\n\
    spring.mail.port=3025\n```\n\n> **Note:** The code for this recipe uses GreenMail\
    \ as an SMTP server; a configured instance can be run using the `smtp.sh` script\
    \ from the `bin` directory. It will, by default, expose an SMTP server on port\
    \ 3025.\n\n#### Sending a Plain Text E-mail\n\nWith the added dependencies and\
    \ `spring.mail` properties, Spring Boot will add a preconfigured `JavaMailSenderImpl`\
    \ as a bean to the `ApplicationContext`. This bean can be autowired into components,\
    \ by either using an `@Autowired` field or through constructors or, as shown here,\
    \ as dependencies in `@Bean` annotated methods.\n\n```java\npackage com.apress.springbootrecipes.mailsender;\n\
    \nimport org.springframework.boot.ApplicationRunner;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.mail.javamail.JavaMailSender;\nimport org.springframework.mail.javamail.MimeMessageHelper;\n\
    \nimport javax.mail.Message;\n\n@SpringBootApplication\npublic class MailSenderApplication\
    \ {\n\n    public static void main(String[] args) {\n        SpringApplication.run(MailSenderApplication.class,\
    \ args);\n    }\n\n    @Bean\n    public ApplicationRunner startupMailSender(JavaMailSender\
    \ mailSender) {\n        return (args) -> {\n            mailSender.send((msg)\
    \ -> {\n                var helper = new MimeMessageHelper(msg);\n           \
    \     helper.setTo(\"recipient@some.where\");\n                helper.setFrom(\"\
    spring-boot-2-recipes@apress.com\");\n                helper.setSubject(\"Status\
    \ message\");\n                helper.setText(\"All is well.\");\n           \
    \ });\n        };\n    }\n}\n```\n\nThe `MailSenderApplication` will send an e-mail\
    \ when the application finished starting. The `startupMailSender` is an `ApplicationRunner`\
    \ (see Chapter 2), which takes the preconfigured `JavaMailSender` to send a mail\
    \ message.\n\n#### Using Thymeleaf for E-mail Templates\n\nSpring Boot has some\
    \ nice support for using Thymeleaf as a templating solution; however, the default\
    \ setup is mainly for using Thymeleaf for webpages. It is, however, very possible\
    \ to use Thymeleaf for e-mail templates.\n\nFirst, add the `spring-boot-starter-thymeleaf`\
    \ as a dependency. This will pull in all the needed Thymeleaf dependencies and\
    \ will automatically configure the Thymeleaf `TemplateEngine`, which we need to\
    \ generate the HTML content.\n\n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-thymeleaf</artifactId>\n</dependency>\n```\n\
    \nBy default, the Spring configured Thymeleaf `TemplateEngine` will resolve the\
    \ HTML templates from the `templates` directory under `src/main/resources`. Add\
    \ a file named `email.html` to this directory and make a nice looking e-mail message\
    \ from it.\n\n```html\n<!DOCTYPE html>\n<html xmlns:th=\"http://www.thymeleaf.org\"\
    >\n<head>\n    <title>Email</title>\n</head>\n<body>\n    <p th:text=\"${msg}\"\
    >Some email content will be here.</p>\n    <p>Kind Regards,</p>\n    <p>Your Application</p>\n\
    </body>\n</html>\n```\n\nThe `th:text` is a Thymeleaf tag and will replace the\
    \ content with the value of that attribute. Of course we would need to pass in\
    \ a value for that attribute from our mail sending/generating code.\n\n```java\n\
    package com.apress.springbootrecipes.mailsender;\n\nimport org.springframework.boot.ApplicationRunner;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.i18n.LocaleContextHolder;\n\
    import org.springframework.mail.javamail.JavaMailSender;\nimport org.springframework.mail.javamail.MimeMessageHelper;\n\
