- fmt: '#### Adding a Controller and View


    When clicking the link provided in the index page, we want to be shown a page
    that shows a list of available books in the library (Figure [3-5](#464036_1_En_3_Chapter.xhtml#Fig5)).
    For this, two things need to be added: first a controller that can handle the
    request and prepare the model, and second a view to render the list of books.


    ![../images/464036_1_En_3_Chapter/464036_1_En_3_Fig5_HTML.jpg](images/464036_1_En_3_Chapter/464036_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Books list page


    Let’s add a controller that will fill the model with a list of books and select
    the name of the view to render. A controller is a class annotated with `@Controller`
    and which contains request handling methods (methods annotated with `@RequestMapping`
    or as in this recipe `@GetMapping`, which is a specialized `@RequestMapping` annotation).


    ```

    package com.apress.springbootrecipes.library.web;

    @Controller

    public class BookController {

    private final BookService bookService;

    public BookController(BookService bookService) {

    this.bookService = bookService;

    }

    @GetMapping("/books.html")

    public String all(Model model) {

    model.addAttribute("books", bookService.findAll());

    return "books/list";

    }

    }

    ```


    The `BookController` needs the `BookService` so that it can obtain a list of books
    to show. The `all` method has an `org.springframework.ui.Model` as method argument
    so that we can put the list of books in the model. A request handling method can
    have different arguments^([^(20)](#fn20)); one of them is the `Model` class. In
    the `all` method, we use the `BookService` to retrieve all the books from the
    datastore and add it to the model using `model.addAttribute`. The list of books
    is now available in the model under the key `books`.


    Finally, we return the name of the view to render `books/list`. This name is passed
    on to the `ThymeleafViewResolver` and will result in a path to `classpath:/templates/books/list.html`.


    Now that the controller together with the request handling method has been added,
    we need to create the view. Create a `list.html` in the `src/main/templates/books`
    directory.


    ```

    Library - Available Books


    Available Books


    Title

    Author

    ISBN


    Title

    Authors


    ```


    This is again an HTML5 page using the Thymeleaf syntax. The page will render a
    list of books using the `th:each` expression. It will take all the books from
    the `books` property in the model and for each book create a row. Each column
    in the row will contain some text using the `th:text` expression; it will print
    the title, authors, and ISBN of the book. The final column in the table contains
    a link to the book details. It constructs a URL using the `th:href` expression.
    Notice the expression between `()`; this will add the `isbn` request parameter.


    When launching the application and clicking the link on the index page, you should
    be greeted with a page showing the contents of the library as shown in Figure
    [3-5](#464036_1_En_3_Chapter.xhtml#Fig5).


    #### Adding a Details Page


    Finally, when clicking the ISBN number in the table, you want a page with details
    to be shown. The link contains a request parameter named `isbn`, which we can
    retrieve and use in the controller to find a book. The request parameter can be
    retrieved through a method argument annotated with `@RequestParam`.


    The following method will handle the GET request, map the request parameter to
    the method argument, and includes the model so that we can add the book to the
    model.


    ```

    @GetMapping(value = "/books.html", params = "isbn")

    public String get(@RequestParam("isbn") String isbn, Model model) {

    bookService.find(isbn)

    .ifPresent(book -> model.addAttribute("book", book));

    return "books/details";

    }

    ```


    The controller will render the `books/details` page. Add the `details.html` to
    the `src/main/resources/templates/books` directory.


    ```

    Library - Available Books


    Title

    authors

    ISBN


    Not Found


    ```


    This HTML5 Thymeleaf template will render one of the two available blocks on the
    page. Either the book has been found and it will display the details, else it
    will show a not found message. This is achieved by using the `th:if` expression.
    The `isbn` for the not found message is retrieved from the request parameters
    using the `param` as a prefix. `${param.isbn}` will get the `isbn` request parameter.


    ## 3.4 Handling Exceptions


    ### Problem


    You want to customize the default white label error page shown by Spring Boot.


    ### Solution


    Add an additional `error.html` as a customized error page, or specific error pages
    for specific HTTP error codes (i.e., `404.html` and `500.html`).'
