    \ you want Spring to do things automatically, yet provide the flexibility to override\
    \ the default configuration in a simpler way. You are about to enter the world\
    \ of Spring Boot, where your dreams can come true!\n\n## A Quick Taste of Spring\
    \ Boot\n\nWelcome to Spring Boot! Spring Boot will configure application components\
    \ automatically for you, but allows you to override the defaults if you want to.\n\
    \nInstead of explaining this in theory, I prefer to explain by example. In this\
    \ section, you’ll see how to implement the same application, this time using Spring\
    \ Boot.\n\n1.  Create a Maven-based Spring Boot project and configure the dependencies\
    \ in the `pom.xml` file, as shown in Listing [1-15](#A447991_1_En_1_Chapter.html#Par84).\n\
    \n    ```\n\n    4.0.0\n    com.apress\n    hello-springboot\n    jar\n    1.0-SNAPSHOT\n\
