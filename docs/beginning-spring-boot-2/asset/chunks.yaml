    # Web Applications with Spring Boot


    Spring MVC is the most popular Java web framework based on the Model-View-Controller
    (MVC) design pattern. Since the Spring 3.0 version, Spring MVC has provided annotation
    based request mapping capabilities using `@Controller` and `@RequestMapping`.
    But configuring Spring MVC web application components such as `DispatcherServlet`,
    `ViewResolver`s, `MultiPartResolver`, and `ExceptionHandler`s is a repetitive
    and tedious process.


    Spring Boot makes it very easy to get started with Spring MVC because the Spring
    Boot autoconfiguration mechanism configures most of the components such as `DispatcherServlet`,
    `ViewResolver`s, `ContentNegotiatingViewResolver`, `LocaleResolver`, `MessageCodesResolver`,
    etc., with default values and provides the options to customize them.


    Traditionally JSPs are being used for view rendering, but there are many other
    view templating technologies emerged over the time such as Thymeleaf, Mustache,
    Groovy Templates, FreeMarker, etc. Spring Boot provides autoconfiguration for
    these view templating libraries as well.


    Spring Boot provides embedded servlet container support so that you can build
    your applications as self-contained deployment units. Spring Boot supports Tomcat,
    Jetty, and Undertow servlet containers out-of-the-box and provides customization
    hooks to implement all server level customizations.


    This chapter looks into how to develop Spring MVC based web applications using
    the Web starter with Tomcat, Jetty, and Undertow as embedded servlet containers.
    You will learn how to customize the default Spring MVC configuration and how to
    register servlets, filters, and listeners as Spring beans.


    You will learn how to use Thymeleaf View templates, how to perform form validations,
    and how to upload files and use ResourceBundles for internationalization (i18n).


    Finally, you will learn about various ways of handling exceptions using `@ExceptionHandler`
    and `@ControllerAdvice` annotations and how Spring Boot makes it even simpler
    to do so.


    ## Introducing SpringMVC


    Spring MVC is a powerful web framework built on MVC and front controller design
    patterns. Spring MVC provides `DispatcherServlet`, which acts as a front controller
    by receiving all the requests and delegates the processing to request handlers
    (controllers). Once the processing is done, `ViewResolver` will render a view
    based on the view name. Figure 10-1 shows this flow process.


    ![A447991_1_En_10_Fig1_HTML.gif](A447991_1_En_10_Fig1_HTML.gif)


    Figure 10-1. SpringMVC request processing flow


    Spring MVC provides annotation-based mapping support to map request URL patterns
    to handler classes using `@Controller` and `@RequestMapping` annotations (Listing
    10-1).


    ```

    @Controller

    public class HomeController

    {

    @RequestMapping(value="/home", method=RequestMethod.GET)

    public String home(Model model) {

    model.addAttribute("message", "Hello Spring MVC!!");

    return "home";

    }

    }

    Listing 10-1.

    SpringMVC Annotation-Based Controller

    ```


    The `@Controller` annotation on the `HomeController` class marks it as a request
    handler Spring component and the `home()` method will handle the `GET` requests
    to the `/home` URL. The `ViewResolver` will resolve the logical view name `"home"`
    to a view template, say `/WEB-INF/views/home.html`, and then render the view.


    Spring 4.3 introduced `@GetMapping`, `@PostMapping`, `@PutMapping`, etc., annotations
    as convenient composed annotations so that you don’t have to specify a `method`
    type in `@RequestMapping(value="/url", method=RequestMethod.XXX)`. See Listing
    10-2.


    ```

    @Controller

    public class HomeController

    {

    @GetMapping("/home")

    public String home(Model model) {

    model.addAttribute("message", "Hello Spring MVC!!");

    return "home";

    }

    @PostMapping("/users")

    public String createUser(User user) {

    userRepository.save(user);

    return "users";

    }

    }

    Listing 10-2.

    Using the @GetMapping and @PostMapping Annotations

    ```


    For SpringMVC-based web applications, we need to configure various web layer components
    like `DispatcherServlet`, `ViewResolver`s, `LocaleResolver`, `HandlerExceptionResolver`,
    etc. Spring Boot provides the Web starter, which autoconfigures all these commonly
    used web layer components, thus making web application development much easier.'
