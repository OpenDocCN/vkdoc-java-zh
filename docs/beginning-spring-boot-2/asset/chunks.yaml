- fmt: '# Using Spring Data JPA with Spring Boot


    Now that you’ve had a glimpse of what Spring Data JPA is and what kind of features
    it provides, this section shows you how to put it into action.


    1. Create a Spring Boot Maven project and add the following dependencies.


    ```

    org.springframework.boot

    spring-boot-starter-data-jpa


    com.h2database

    h2


    org.springframework.boot

    spring-boot-starter-test

    test

    ```


    2. Create a JPA entity called `User` and a JPA repository interface called `UserRepository`.

    3. Create a user JPA entity, as shown in Listing [8-1](#A447991_1_En_8_Chapter.html#Par28).


    ```

    @Entity

    @Table(name="USERS")

    public class User

    {

    @Id @GeneratedValue(strategy=GenerationType.AUTO)

    private Integer id;

    @Column(nullable=false)

    private String name;

    @Column(nullable=false, unique=true)

    private String email;

    private boolean disabled;

    //setters and getters

    }

    Listing 8-1.

    JPA Entity User.java

    ```


    4. Create the `UserRepository` interface by extending the `JpaRepository` interface,
    as shown in Listing [8-2](#A447991_1_En_8_Chapter.html#Par30).


    ```

    public interface UserRepository extends JpaRepository

    {

    }

    Listing 8-2.

    JPA Repository Interface UserRepository.java

    ```


    5. You can now populate some sample data using the SQL script `src/main/resources/data.sql`:


    ```

    insert into users(id, name, email,disabled)

    values(1,''John'',''john@gmail.com'', false);

    insert into users(id, name, email,disabled)

    values(2,''Rod'',''rod@gmail.com'', false);

    insert into users(id, name, email,disabled)

    values(3,''Becky'',''becky@gmail.com'', true);

    ```


    Since you configured the in-memory database (H2) driver, Spring Boot automatically
    registers a `DataSource`. Since you added the `spring-boot-starter-data-jpa` dependency,
    Spring Boot autoconfiguration takes care of creating the JPA related beans like
    `LocalContainerEntityManagerFactoryBean`, `TransactionManager`, etc., automatically
    with sensible defaults.


    6. Create a Spring Boot entry point class called `SpringbootJPADemoApplication.java`,
    as shown in Listing [8-3](#A447991_1_En_8_Chapter.html#Par35).


    ```

    @SpringBootApplication

    public class SpringbootJPADemoApplication

    {

    public static void main(String[] args)

    {

    SpringApplication.run(SpringbootJPADemoApplication.class, args);

    }

    }

    Listing 8-3.

    SpringbootJPADemoApplication.java

    ```


    7. Create a JUnit test class for testing the `UserRepository` methods, as shown
    in Listing [8-4](#A447991_1_En_8_Chapter.html#Par37).


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest

    public class SpringbootJPADemoApplicationTests

    {

    @Autowired

    private UserRepository userRepository;

    @Test

    public void findAllUsers()  {

    List users = userRepository.findAll();

    assertNotNull(users);

    assertTrue(!users.isEmpty());

    }

    @Test

    public void findUserById()  {

    Optional user = userRepository.getById(1);

    assertNotNull(user.get());

    }

    @Test

    public void createUser() {

    User user = new User(null, "Paul", "paul@gmail.com");

    User savedUser = userRepository.save(user);

    User newUser = userRepository.findById(savedUser.getId()).get();

    assertEquals("SivaPrasad", newUser.getName());

    assertEquals("sivaprasad@gmail.com", newUser.getEmail());

    }

    }

    Listing 8-4.

    SpringbootJPADemoApplicationTests.java

    ```


    ## Add Dynamic Query Methods


    Now you’ll add some finder methods to see how dynamic query generation based on
    method names works.


    To get a user by name, use this:


    ```

    User findByName(String name)

    ```


    To search for users by name, use this:


    ```

    List findByNameLike(String name)

    ```


    The preceding method generates a `where` clause like `where u.name like ?1`.


    Suppose you want to do a wildcard search, such as `where u.name like %?1%`. You
    can use `@Query` as follows:


    ```

    @Query("select u from User u where u.name like %?1%")

    List searchByName(String name)

    ```


    ## Using the Sort and Pagination Features


    Suppose you want to get all users by their names in ascending order. You can use
    the `findAll(Sort sort)` method as follows:


    ```

    Sort sort = new Sort(Direction.ASC, "name");

    List users = userRepository.findAll(sort);

    ```


    You can also apply sorting on multiple properties, as follows:


    ```

    Order order1 = new Order(Direction.ASC, "name");

    Order order2 = new Order(Direction.DESC, "id");

    Sort sort = Sort.by(order1, order2);

    List users = userRepository.findAll(sort);

    ```


    The users will be ordered first by name in ascending order and then by ID in descending
    order.


    In many web applications, you’ll want to show data in a page-by-page manner. Spring
    Data makes it very easy to load data in the pagination style. Suppose you want
    to load the first 25 users on one page. We can use `Pageable` and `PageRequest`
    to get results by page, as follows:


    ```

    int size = 25;

    int page = 0; //zero-based page index.

    Pageable pageable = PageRequest.of(page, size);

    Page usersPage = userRepository.findAll(pageable);

    ```


    The `usersPage` will contain the first 25 user records only. You can get additional
    details, like the total number of pages, the current page number, whether there
    is a next page, whether there is a previous page, and more.


    * `usersPage.getTotalElements();`—Returns the total amount of elements.

    * `usersPage.getTotalPages();`—Returns the total number of pages.

    * `usersPage.hasNext();`

    * `usersPage.hasPrevious();`

    * `List<User> usersList = usersPage.getContent();`


    You can also apply pagination along with sorting as follows:


    ```

    Sort sort = new Sort(Direction.ASC, "name");

    Pageable pageable = PageRequest.of(page, size, sort);

    Page usersPage = userRepository.findAll(pageable);

    ```'
