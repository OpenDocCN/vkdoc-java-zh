- fmt: '# Registering Servlets, Filters, and Listeners as Spring Beans


    You can register servlets, filters, listeners by using the `ServletRegistrationBean`,
    `FilterRegistrationBean`, and `ServletListenerRegistrationBean` bean definitions.


    Suppose you created the servlet shown in Listing [10-5](#A447991_1_En_10_Chapter.html#Par66)
    and marked it as a Spring bean using the `@Component` annotation.


    ```

    @Component

    public class MyServlet extends HttpServlet

    {

    @Autowired

    private UserService userService;

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws ServletException, IOException {

    resp.getWriter().write(userService.getMessage());

    }

    }

    ```


    Now you can register `MyServlet` using `ServletRegistrationBean` and map it to
    the URL pattern `/myServlet`, as shown in Listing [10-6](#A447991_1_En_10_Chapter.html#Par68).


    ```

    @Configuration

    public class WebMvcConfig implements WebMvcConfigurer

    {

    @Autowired

    private MyServlet myServlet;

    @Bean

    public ServletRegistrationBean myServletBean()

    {

    ServletRegistrationBean servlet = new ServletRegistrationBean();

    servlet.setServlet(myServlet);

    servlet.addUrlMappings("/myServlet");

    return servlet;

    }

    ...

    ...

    }

    ```


    With this approach, you can take advantage of Spring’s dependency injection for
    servlets, filters, and listeners. Let’s take a look at how you can register filters
    and listeners as well.


    JavaMelody ([https://github.com/javamelody/javamelody/wiki](https://github.com/javamelody/javamelody/wiki))
    is a library that can be used to monitor Java-based web applications. JavaMelody
    can provide various metrics about the running application, including:


    - A summary indicating the overall number of executions, the average execution
    time, the CPU time, and the percentage of errors.

    - The percentage of time spent on the requests when the average time exceeds a
    configurable threshold.

    - The complete list of requests, aggregated without dynamic parameters with the
    number of executions, the mean execution time, the mean CPU time, the percentage
    of errors, and an evolution chart of execution time over time.

    - Each HTTP request indicates the size of the flow response, the mean number of
    SQL executions, and the mean SQL time.


    Integrating JavaMelody into a Java web application is very simple. You need to
    register `net.bull.javamelody.MonitoringFilter`, which is a filter, and `net.bull.javamelody.SessionListener`,
    which is a `HttpSessionListener`.


    Listing [10-7](#A447991_1_En_10_Chapter.html#Par77) shows how to configure JavaMelody’s
    `MonitoringFilter` and `SessionListener` as Spring beans using `FilterRegistrationBean`
    and `ServletListenerRegistrationBean`.


    ```

    @Configuration

    public class WebMvcConfig implements WebMvcConfigurer

    {

    @Bean(name = "javamelodyFilter")

    public FilterRegistrationBean javamelodyFilterBean() {

    FilterRegistrationBean registration = new FilterRegistrationBean();

    registration.setFilter(new MonitoringFilter());

    registration.addUrlPatterns("/*");

    registration.setName("javamelodyFilter");

    registration.setAsyncSupported(true);

    registration.setDispatcherTypes(DispatcherType.REQUEST, DispatcherType.ASYNC);

    return registration;

    }

    @Bean(name = "javamelodySessionListener")

    public ServletListenerRegistrationBean sessionListener() {

    return new ServletListenerRegistrationBean(new SessionListener());

    }

    }

    ```


    With this configuration, you can start the application and see JavaMelody’s monitoring
    dashboard at `http://localhost:8080/monitoring`. See Figure [10-3](#A447991_1_En_10_Chapter.html#Fig3).


    ![A447991_1_En_10_Fig3_HTML.jpg](A447991_1_En_10_Fig3_HTML.jpg)


    ## Spring Boot Web Application as a Deployable WAR


    The Spring Boot web application can be developed using WAR type packaging also.
    The first thing you do if you want to build a deployable WAR file is change the
    `packaging` type.


    If you are using Maven, then in `pom.xml`, change the `packaging` type to `war`.


    ```

    war

    ```


    If you are using Gradle, you need to apply the WAR plugin.


    ```

    apply plugin: ''war''

    ```


    When you add the `spring-boot-starter-web` dependency, it will transitively add
    the `spring-boot-starter-tomcat` dependency as well. So you need to add `spring-boot-starter-tomcat`
    as the `provided` scope so that it won’t get packaged inside the WAR file.


    ```

    org.springframework.boot

    spring-boot-starter-tomcat

    provided

    ```


    If you are using Gradle, add `spring-boot-starter-tomcat` with the `providedRuntime`
    scope as follows:


    ```

    dependencies {

    ...

    providedRuntime ''org.springframework.boot:spring-boot-starter-tomcat''

    ...

    }

    ```


    Finally, you need to provide a `SpringBootServletInitializer` sub-class and override
    its `configure()` method. You can simply make your application’s entry point class
    extend `SpringBootServletInitializer`, as shown in Listing [10-8](#A447991_1_En_10_Chapter.html#Par89).


    ```

    @SpringBootApplication

    public class SpringbootWebDemoApplication extends SpringBootServletInitializer
    {

    @Override

    protected SpringApplicationBuilder configure(SpringApplicationBuilder application)
    {

    return application.sources(SpringbootWebDemoApplication.class);

    }

    public static void main(String[] args) throws Exception {

    SpringApplication.run(SpringbootWebDemoApplication.class, args);

    }

    }

    ```


    Now running the Maven/Gradle build tool will produce a WAR file that can be deployed
    on an external server.


    ## View Templates that Spring Boot Supports


    Java Server Pages (JSP) is the most commonly used view templating technology in
    traditional Java-based web applications. However, there are new view templating
    libraries, such as Thymeleaf, Mustache, etc., that have emerged as alternatives
    to JSP.


    Spring Boot provides autoconfiguration for the following view templating technologies:


    - Thymeleaf ([http://www.thymeleaf.org/](http://www.thymeleaf.org/))

    - Mustache ([http://mustache.github.io/](http://mustache.github.io/))

    - Groovy ([http://docs.groovy-lang.org/docs/next/html/documentation/template-engines.html#_the_markuptemplateengine](http://docs.groovy-lang.org/docs/next/html/documentation/template-engines.html#_the_markuptemplateengine))

    - FreeMarker ([http://freemarker.org/docs/](http://freemarker.org/docs/))


    Although Spring MVC supports JSP, there are some known limitations ([http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-jsp-limitations](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-jsp-limitations))
    to using JSP in Spring Boot applications with an embedded servlet container. But
    JSP works fine in Spring Boot WAR type modules.'
  raw: '## Registering Servlets, Filters, and Listeners as Spring Beans


    You can register servlets, filters, listeners by using the `ServletRegistrationBean`
    , `FilterRegistrationBean` , and `ServletListenerRegistrationBean` bean definitions.


    Suppose you created the servlet shown in Listing [10-5](#A447991_1_En_10_Chapter.html#Par66)
    and marked it as a Spring bean using the `@Component` annotation.


    ```

    @Component

    public class MyServlet extends HttpServlet

    {

    @Autowired

    private UserService userService;

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws ServletException, IOException {

    resp.getWriter().write(userService.getMessage());

    }

    }

    Listing 10-5.

    MyServlet Defined as a Spring Bean Using the @Component Annotation

    ```


    Now you can register `MyServlet` using `ServletRegistrationBean` and map it to
    the URL pattern `/myServlet`, as shown in Listing [10-6](#A447991_1_En_10_Chapter.html#Par68).


    ```

    @Configuration

    public class WebMvcConfig implements WebMvcConfigurer

    {

    @Autowired

    private MyServlet myServlet;

    @Bean

    public ServletRegistrationBean myServletBean()

    {

    ServletRegistrationBean servlet = new ServletRegistrationBean();

    servlet.setServlet(myServlet);

    servlet.addUrlMappings("/myServlet");

    return servlet;

    }

    ...

    ...

    }

    Listing 10-6.

    Registering MyServlet Using ServletRegistrationBean

    ```


    With this approach, you can take advantage of Spring’s dependency injection for
    servlets, filters, and listeners. Let’s take a look at how you can register filters
    and listeners as well.


    JavaMelody ( [`https://github.com/javamelody/javamelody/wiki`](https://github.com/javamelody/javamelody/wiki)
    ) is a library that can be used to monitor Java-based web applications. JavaMelody
    can provide various metrics about the running application, including:


    *   A summary indicating the overall number of executions, the average execution
    time, the CPU time, and the percentage of errors.

    *   The percentage of time spent on the requests when the average time exceeds
    a configurable threshold.

    *   The complete list of requests, aggregated without dynamic parameters with
    the number of executions, the mean execution time, the mean CPU time, the percentage
    of errors, and an evolution chart of execution time over time.

    *   Each HTTP request indicates the size of the flow response, the mean number
    of SQL executions, and the mean SQL time.


    Integrating JavaMelody into a Java web application is very simple. You need to
    register `net.bull.javamelody.MonitoringFilter`, which is a filter, and `net.bull.javamelody.SessionListener`,
    which is a `HttpSessionListener`.


    Listing [10-7](#A447991_1_En_10_Chapter.html#Par77) shows how to configure JavaMelody’s
    `MonitoringFilter` and `SessionListener` as Spring beans using `FilterRegistrationBean`
    and `ServletListenerRegistrationBean`.


    ```

    @Configuration

    public class WebMvcConfig implements WebMvcConfigurer

    {

    @Bean(name = "javamelodyFilter")

    public FilterRegistrationBean javamelodyFilterBean() {

    FilterRegistrationBean registration = new FilterRegistrationBean();

    registration.setFilter(new MonitoringFilter());

    registration.addUrlPatterns("/*");

    registration.setName("javamelodyFilter");

    registration.setAsyncSupported(true);

    registration.setDispatcherTypes(DispatcherType.REQUEST, DispatcherType.ASYNC);

    return registration;

    }

    @Bean(name = "javamelodySessionListener")

    public ServletListenerRegistrationBean sessionListener() {

    return new ServletListenerRegistrationBean(new SessionListener());

    }

    }

    Listing 10-7.

    Registering JavaMelody’s MonitoringFilter and SessionListener

    ```


    With this configuration, you can start the application and see JavaMelody’s monitoring
    dashboard at `http://localhost:8080/monitoring`. See Figure [10-3](#A447991_1_En_10_Chapter.html#Fig3).


    ![A447991_1_En_10_Fig3_HTML.jpg](A447991_1_En_10_Fig3_HTML.jpg)


    Figure 10-3.


    JavaMelody monitoring dashboard


