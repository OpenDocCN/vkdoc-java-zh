    \ folder to render a list of users, as shown in Listing [1-14](#A447991_1_En_1_Chapter.html#Par69).\n\
    \n```\n\nHome\n\nApp Title\n\nId\n    Name\n\nId\n    Name\n\nListing 1-14.\n\
    \    The src/main/webapp/WEB-INF/views/index.html File\n    ```\n\n*   Marked\
    \ it as a Spring `Configuration` class using the `@Configuration` annotation.\n\
    *   Enabled Annotation-based transaction management using `@EnableTransactionManagement`.\n\
    *   Configured `@EnableJpaRepositories` to indicate where to look for Spring Data\
    \ JPA repositories.\n*   Configured the `PropertyPlaceHolder` bean using the `@PropertySource`\
    \ annotation and `PropertySourcesPlaceholderConfigurer` bean definition, which\
    \ loads properties from the `application.properties` file.\n*   Defined beans\
    \ for `DataSource`, JPA `EntityManagerFactory`, and `JpaTransactionManager`.\n\
    *   Configured the `DataSourceInitializer` bean to initialize the database by\
    \ executing the `data.sql` script on application start-up.\n\nYou are all set\
    \ now to run the application. But before that, you need to download and configure\
    \ a server like Tomcat, Jetty, or Wildflyetc in your IDE. You can download Tomcat\
    \ 8 and configure your favorite IDE, run the application, and point your browser\
