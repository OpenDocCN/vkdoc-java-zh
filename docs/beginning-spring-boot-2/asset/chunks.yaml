    \ Siva Prasad Reddy 著 《Spring Boot 2 实战：使用 Spring 框架构建应用与微服务》\n\n![A447991_1_En_BookFrontmatter_Figa_HTML.png](img/A447991_1_En_BookFrontmatter_Figa_HTML.png)\n\
