    `FROM ubuntu:14.04`


    # Author: Siva

    `MAINTAINER Siva`


    # Install apache2 package

    `RUN apt-get update && apt-get install -y apache2 && apt-get clean`


    # run command on startup

    `CMD ["echo", "Dockerfile demo"]`


    Listing 19-12. Sample Dockerfile


