    \ 方法加密。\n\n运行应用程序并转到 `http://localhost:8080/home`。你将被重定向到登录页面，因为你尚未通过身份验证。提交有效凭据（例如\
    \ `admin@gmail.com/admin`）后，你将被重定向到首页。如果你以具有 `ADMIN` 角色的用户身份登录，你应该能够看到文本“只有当你具有\
    \ ADMIN 角色时，你才会看到此内容”以及指向管理员首页的链接。如果你单击管理员首页链接，你应该能够看到管理员首页页面。\n\n如果你以普通用户（`user@gmail.com/user`）身份登录，你将无法看到“只有当你具有\
    \ ADMIN 角色时，你才会看到此内容”以及指向管理员首页的链接。如果你尝试通过直接输入 `http://localhost:8080/admin/home`\
    \ 来访问管理员首页 URL，你将被重定向到访问被拒绝页面（`403.html` 视图）。\n\n实现“记住我”功能\n\nSpring Security\
    \ 提供了“记住我”功能，以便应用程序可以在会话之间记住用户的身份。要使用“记住我”功能，你只需要发送 HTTP 参数 `remember-me`。\n\n\
    ```\n\n记住我\n登录\n\n```\n\nSpring Security 提供了以下两种开箱即用的“记住我”功能实现：\n\n*   基于简单哈希的令牌作为\
    \ Cookie——此方法通过哈希用户身份信息并将其设置为客户端浏览器上的 Cookie 来创建令牌。\n*   持久化令牌——此方法使用持久化存储（如关系数据库）来存储令牌。\n\
    \n基于简单哈希的令牌作为 Cookie\n\n你可以在安全配置中启用“记住我”功能，默认情况下使用基于哈希的令牌方法，如清单 13-12 所示。\n\n\
    ```\n@Configuration\n@EnableWebSecurity\npublic class WebSecurityConfig extends\
    \ WebSecurityConfigurerAdapter\n{\n...\n...\n@Override\nprotected void configure(HttpSecurity\
    \ http) throws Exception {\nhttp\n.authorizeRequests()\n.antMatchers(\"/resources/**\"\
    , \"/webjars/**\",\"/assets/**\").permitAll()\n.antMatchers(\"/\").permitAll()\n\
    .antMatchers(\"/admin/**\").hasRole(\"ADMIN\")\n.anyRequest().authenticated()\n\
    .and()\n.formLogin()\n.loginPage(\"/login\")\n.defaultSuccessUrl(\"/home\")\n\
    .failureUrl(\"/login?error\")\n.permitAll()\n.and()\n.logout()\n.logoutRequestMatcher(new\
    \ AntPathRequestMatcher(\"/logout\"))\n.logoutSuccessUrl(\"/login?logout\")\n\
    .deleteCookies(\"remember-me\")\n.permitAll()\n.and()\n.rememberMe()\n.and()\n\
    .exceptionHandling()\n;\n}\n}\n清单 13-12.\n启用“记住我”的 Spring Security 配置\n```\n\n\
    使用此配置，当你通过选中“记住我”复选框登录时，将设置一个带有 `remember-me` 的 Cookie，其中包含基于哈希的令牌作为值。现在，如果你关闭并重新打开浏览器并转到应用程序，你将自动通过身份验证。还要注意，当用户注销时，`remember-me`\
    \ Cookie 会被删除。\n\n这种基于哈希的令牌作为 Cookie 的方法由 Spring Security 使用 `org.springframework.security.web.authentication.rememberme.TokenBasedRememberMeServices`\
    \ 实现。\n\n`remember-me` Cookie 令牌值生成如下：\n\n```\nbase64(username + \":\" + expirationTime\
    \ + \":\" + md5Hex(username + \":\" + expirationTime + \":\" password + \":\"\
    \ + key))\n```\n\n默认的 `expirationTime` 是两周（1209600 秒），`key` 是一个随机生成的字符串（`UUID.randomUUID().toString()`）。\n\
    \n你可以按如下方式自定义 Cookie 名称、过期时间和密钥：\n\n```\n.rememberMe()\n.key(\"my-secure-key\"\
    )\n.rememberMeCookieName(\"my-remember-me-cookie\")\n.tokenValiditySeconds(24\
    \ * 60 * 60)\n.and()\n```\n\n通过此自定义，在成功身份验证后，它将创建一个名为 `my-remember-me-cookie`\
    \ 的 `remember-me` Cookie。它将有效期为一天（24 * 60 * 60 秒）。\n\n警告\n\n在这种方法中，生成的令牌包含 MD5\
    \ 哈希密码，如果 Cookie 被捕获，则存在潜在的安全漏洞。\n\n持久化令牌\n\nSpring Security 提供了“记住我”功能的另一种实现，可用于将生成的令牌存储在持久化存储（如数据库）中。持久化令牌方法使用\
    \ `org.springframework.security.web.authentication.rememberme.PersistentTokenBasedRememberMeServices`\
    \ 实现，它在内部使用 `PersistentTokenRepository` 接口来存储令牌。\n\nSpring 提供了以下两种开箱即用的 `PersistentTokenRepository`\
    \ 实现。\n\n*   `InMemoryTokenRepositoryImpl` 可用于在内存中存储令牌（不建议用于生产环境）。\n*   `JdbcTokenRepositoryImpl`\
    \ 可用于在数据库中存储令牌。\n\n`JdbcTokenRepositoryImpl` 将令牌存储在 `persistent_logins` 表中。参见清单\
    \ 13-13。\n\n```\ncreate table persistent_logins\n(\nusername varchar(64) not null,\n\
    series varchar(64) primary key,\ntoken varchar(64) not null,\nlast_used timestamp\
    \ not null\n);\n清单 13-13.\npersistent_logins 表\n```\n\n现在你将看到如何配置“记住我”功能以使用关系数据库来存储令牌。参见清单\
    \ 13-14。\n\n```\n@Configuration\n@EnableWebSecurity\npublic class WebSecurityConfig\
    \ extends WebSecurityConfigurerAdapter\n{\n@Autowired\nprivate UserDetailsService\
    \ customUserDetailsService;\n@Autowired\nprivate DataSource dataSource;\n...\n\
    ...\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http\n...\n...\n.rememberMe()\n.tokenRepository(persistentTokenRepository())\n\
    .tokenValiditySeconds(24 * 60 * 60)\n.and()\n.exceptionHandling()\n;\n}\nPersistentTokenRepository\
    \ persistentTokenRepository(){\nJdbcTokenRepositoryImpl tokenRepositoryImpl =\
    \ new JdbcTokenRepositoryImpl();\ntokenRepositoryImpl.setDataSource(dataSource);\n\
    return tokenRepositoryImpl;\n}\n}\n清单 13-14.\n使用持久化令牌配置“记住我”\n```\n\n现在，当你成功登录并选中“记住我”复选框时，生成的令牌将存储在\
    \ `persistent_logins` 表中。\n\n这种方法为用户生成一个唯一的系列值，连同随机令牌数据一起创建令牌并将其设置为 Cookie。每次用户随后使用\
    \ Cookie 登录时，都会生成新的随机令牌数据，但该用户的系列值将保持不变。\n\n跨站请求伪造\n\n跨站请求伪造（CSRF）是一种攻击，它允许用户在经过身份验证的\
    \ Web 应用程序上执行不需要的操作。假设你访问 `genuinesite.com` 网站并进行身份验证。这可能会在你的浏览器上设置 Cookie，包括身份验证令牌。现在，如果你在同一个浏览器但在不同的选项卡中打开\
    \ `malicioussite.com` 网站，你可以从 `malicioussite.com` 向 `genuinesite.com` 发送带有不需要数据的请求。此数据将连同\
    \ `genuinesite.com` 设置的 Cookie 一起发送请求。\n\nSpring Security 提供了 CSRF 保护，并且默认启用。Spring\
    \ Security 通过使用 `org.springframework.security.web.csrf.CsrfFilter` 提供 CSRF 保护。`CsrfFilter`\
    \ 将拦截所有请求，忽略 `GET`、`HEAD`、`TRACE` 和 `OPTIONS` 请求，并检查所有其他请求（例如 `POST`、`PUT`、`DELETE`\
    \ 等）是否存在有效的 CSRF 令牌。如果 CSRF 令牌丢失或包含无效令牌，则它将抛出 `AccessDeniedException`。\n\n你应该将状态更改请求（例如\
    \ `POST`、`PUT`、`DELETE` 等）与 CSRF 令牌一起作为请求中的隐藏参数发送。你可以按如下方式手动插入令牌：\n\n```\n...\n\
    ...\n\n```\n\n如果你使用 Spring Security 和 Thymeleaf，如果 `<form>` 具有 `th:action` 属性且\
    \ `method` 不是 `GET`、`HEAD`、`TRACE` 或 `OPTIONS`，则 CSRF 令牌将自动包含在内。\n\n假设你有以下 Thymeleaf\
    \ 表单。\n\n当它被渲染时，如果你查看页面源代码，你可以看到 CSRF 令牌作为隐藏参数自动插入。\n\n注意\n\n如果你使用 `action` 属性而不是设置\
    \ `th:action`，或者将 `method` 值设置为 `GET`、`HEAD`、`TRACE` 或 `OPTIONS` 中的任何一个，则 CSRF\
    \ 令牌不会自动插入。\n\n如果你在没有 CSRF 令牌或使用无效 CSRF 令牌的情况下提交表单，则会抛出带有 `403` HTTP 状态码的 `AccessDeniedException`。\n\
    \n方法级安全性\n\n你已经学习了如何通过保护对 Web URL 的访问来保护 Web 应用程序。但是，那些本应仅由经过身份验证的用户调用的服务层方法，如果用户拥有\
    \ Spring bean，则仍然可以不受限制地访问。你不仅可以将 Spring 用于开发 Web 应用程序，还可以用于批处理应用程序、集成服务器等，这些不提供\
    \ Web 界面。因此，你可能需要根据角色和权限保护方法访问。\n\nSpring Security 使用 `@Secured` 注解提供方法级安全性。它还支持\
    \ JSR-250 安全注解 `@RolesAllowed`。从 3.0 版本开始，Spring Security 使用 `@PreAuthorize` 和\
    \ `@PostAuthorize` 注解提供了基于表达式的安全配置，这提供了更细粒度的控制。\n\n你可以通过在任何配置类上使用 `@EnableGlobalMethodSecurity`\
    \ 注解来启用方法级安全性，如下所示：\n\n*   `secureEnabled`：定义是否启用 `@Secured`。\n*   `prePostEnabled`：定义是否启用前置/后置注解\
    \ `@PreAuthorize` 和 `@PostAuthorize`。\n*   `jsr250Enabled`：定义是否启用 JSR-250 注解 `@RolesAllowed`。\n\
    \n```\n@Configuration\n@EnableWebSecurity\n@EnableGlobalMethodSecurity(securedEnabled\
    \ = true,\nprePostEnabled=true,\njsr250Enabled=true)\npublic class WebSecurityConfig\
    \ extends WebSecurityConfigurerAdapter\n{\n...\n...\n}\n```\n\n一旦启用了方法级安全性，你就可以使用\
    \ `@Secured`、`@PreAuthorize` 或 `@RolesAllowed` 注解 SpringMVC 控制器请求处理方法、服务层方法或任何\
    \ Spring 组件，以定义你的安全限制。参见清单 13-15。\n\n```\n@RestController\npublic class AdminRestController\n\
    {\n@Autowired\nprivate UserService userService;\n@PreAuthorize(\"hasRole('ADMIN')\
    \ OR hasRole('USER')\")\n@PutMapping(\"/admin/users/{id}\")\npublic User updateUser(@RequestBody\
    \ User user)\n{\nuserService.updateUser(user);\nreturn user;\n}\n@Secured(\"ROLE_ADMIN\"\
    )\n@DeleteMapping(\"/admin/users/{id}\")\npublic void deleteUser(@PathVariable(\"\
    id\") Integer userId)\n{\nuserService.deleteUser(userId);\n}\n}\n清单 13-15.\n使用方法级安全注解的\
    \ SpringMVC REST 控制器\n```\n\n类似地，你可以使用 `@Secured`、`@PreAuthorize` 或 `@RolesAllowed`\
    \ 注解来保护服务层方法。\n\n```\n@Service\n@Transactional\npublic class UserService\n{\n\
    @PreAuthorize(\"hasRole('ADMIN')\")\npublic void deleteUser(Integer userId)\n\
    {\n....\n}\n}\n```\n\n你也可以在类级别使用 `@Secured`、`@PreAuthorize` 或 `@RolesAllowed`\
    \ 注解，这会将安全配置应用于该类中的所有方法。\n\n你可以使用 Spring 表达式语言（SpEL）来定义安全表达式，如下所示：\n\n*   `hasRole(role)`：如果当前用户具有指定的角色，则返回\
    \ true。\n*   `hasAnyRole(role1,role2)`：如果当前用户具有任何提供的角色，则返回 true。\n*   `isAnonymous()`：如果当前用户是匿名用户，则返回\
    \ true。\n*   `isAuthenticated()`：如果用户不是匿名的，则返回 true。\n*   `isFullyAuthenticated()`：如果用户不是匿名用户或“记住我”用户，则返回\
    \ true。\n\n你可以使用逻辑运算符 `AND`、`OR` 和 `NOT`(`!`) 组合这些表达式。\n\n```\n@PreAuthorize(\"\
    hasRole('ADMIN') OR hasRole('USER')\")\n@PreAuthorize(\"isFullyAuthenticated()\
    \ AND hasRole('ADMIN')\")\n@PreAuthorize(\"!isAnonymous()\")\n```\n\n尽管使用 `@Secured`\
    \ 和 `@PreAuthorize` 定义安全限制看起来很相似，但有一些细微的差别需要注意。\n\n`@Secured(\"ROLE_ADMIN\")`\
    \ 注解等同于 `@PreAuthorize(\"hasRole('ROLE_ADMIN')\")`。`@Secured({\"ROLE_USER\", \"\
    ROLE_ADMIN\")` 被视为 `ROLE_USER OR ROLE_ADMIN`，因此你不能使用 `@Secured` 表达 `AND` 条件。你可以使用\
    \ `@PreAuthorize(\"hasRole('ADMIN') OR hasRole('USER')\")` 定义相同的内容，这更容易理解。你也可以表达\
    \ `AND`、`OR` 或 `NOT`(`!`)。\n\n```\n@PreAuthorize(\"!isAnonymous() AND hasRole('ADMIN')\"\
    )\n```\n\n注意\n\n与 `@Secured/@RolesAllowed` 相比，`@PreAuthorize` 注解更强大，因此最好使用 `@PreAuthorize`。\n\
    \n使用 Spring Security 保护 REST API\n\n在上一节中，你学习了如何使用 Spring Security 保护传统的 Web 应用程序。某些\
    \ Spring Security 组件的默认行为适用于 Web 应用程序。然而，为了保护 REST API，你需要自定义组件的行为以更好地适应 REST\
    \ 语义。请按照以下步骤操作：\n\n1.  设置 `AuthenticationEntryPoint`。\n\n    默认情况下，当用户尝试在未登录的情况下访问受保护资源时，Spring\
    \ Security 的 `AuthenticationEntryPoint` 会将用户重定向到登录 URL。然而，对于 REST API，当未经授权的用户尝试访问受保护资源时，返回\
    \ HTTP 状态码 `401`（`SC_UNAUTHORIZED`）会更有意义。\n\n    Spring Security 提供了几种开箱即用的 `AuthenticationEntryPoint`\
    \ 实现。其中，`org.springframework.boot.autoconfigure.security.Http401AuthenticationEntryPoint`\
    \ 提供了你所需的确切行为——返回 HTTP 状态码 `401 SC_UNAUTHORIZED`。参见清单 13-16。\n\n    ```\n    public\
    \ class Http401AuthenticationEntryPoint\n    implements AuthenticationEntryPoint\n\
    \    {\n    private final String headerValue;\n    public Http401AuthenticationEntryPoint(String\
    \ headerValue) {\n    this.headerValue = headerValue;\n    }\n    @Override\n\
    \    public void commence(HttpServletRequest request,\n    HttpServletResponse\
    \ response,\n    AuthenticationException authException)\n    throws IOException,\
    \ ServletException\n    {\n    response.setHeader(\"WWW-Authenticate\", this.headerValue);\n\
    \    response.sendError(HttpServletResponse.SC_UNAUTHORIZED,\n    authException.getMessage());\n\
    \    }\n    }\n    清单 13-16.\n    REST API 的 AuthenticationEntryPoint\n    ```\n\
    \n2.  设置 `AuthenticationSuccessHandler`。\n\n    默认情况下，Spring Security 使用 `SavedRequestAwareAuthenticationSuccessHandler`，它实现了\
    \ `AuthenticationSuccessHandler`，以使用 `301 MOVED PERMANENTLY` HTTP 状态码将用户重定向到 `redirectUrl`。但对于\
    \ REST API，对于成功的身份验证，返回状态码 `200 OK` 以及经过身份验证的用户详细信息作为响应体会更有意义。\n\n    清单 13-17\
    \ 显示了如何实现一个自定义的 `AuthenticationSuccessHandler` 作为 Spring bean，以便你可以利用 `HttpMessageConverters`\
    \ 将 `User` 详细信息作为响应体发送。\n\n    ```\n    @Component\n    public class RestAuthenticationSuccessHandler\n\
    \    extends SavedRequestAwareAuthenticationSuccessHandler\n    {\n    private\
    \ final ObjectMapper mapper;\n    @Autowired\n    public RestAuthenticationSuccessHandler\n\
    \    (MappingJackson2HttpMessageConverter messageConverter) {\n    this.mapper\
    \ = messageConverter.getObjectMapper();\n    }\n    @Override\n    public void\
    \ onAuthenticationSuccess(HttpServletRequest request,\n    HttpServletResponse\
    \ response,\n    Authentication authentication)\n    throws IOException, ServletException\n\
    \    {\n    response.setStatus(HttpServletResponse.SC_OK);\n    UserDetails userDetails\
    \ = (UserDetails) authentication.getPrincipal();\n    PrintWriter writer = response.getWriter();\n\
    \    mapper.writeValue(writer, userDetails);\n    writer.flush();\n    writer.close();\n\
    \    }\n    }\n    清单 13-17.\n    REST API 的 AuthenticationSuccessHandler\n  \
    \  ```\n\n3.  设置 `AuthenticationFailureHandler`。\n\n    Spring Security 提供了 `SimpleUrlAuthenticationFailureHandler`，它实现了\
    \ `AuthenticationFailureHandler`，如果 `defaultFailureUrl` 不为 null，则重定向到 `defaultFailureUrl`。如果\
    \ `defaultFailureUrl` 为 null，则它将简单地返回 HTTP 状态码 `401 SC_UNAUTHORIZED`。参见清单 13-18。\n\
    \n    ```\n    public class SimpleUrlAuthenticationFailureHandler implements\n\
    \    AuthenticationFailureHandler {\n    protected final Log logger = LogFactory.getLog(getClass());\n\
    \    private String defaultFailureUrl;\n    ....\n    ....\n    public SimpleUrlAuthenticationFailureHandler()\
    \ {\n    }\n    public SimpleUrlAuthenticationFailureHandler(String defaultFailureUrl)\
    \ {\n    setDefaultFailureUrl(defaultFailureUrl);\n    }\n    public void onAuthenticationFailure(HttpServletRequest\
    \ request,\n    HttpServletResponse response, AuthenticationException exception)\n\
    \    throws IOException, ServletException {\n    if (defaultFailureUrl == null)\
    \ {\n    logger.debug(\"No failure URL set, sending 401 Unauthorized error\");\n\
    \    response.sendError(HttpServletResponse.SC_UNAUTHORIZED,\n    \"Authentication\
    \ Failed: \" + exception.getMessage());\n    }\n    else {\n    ....\n    ....\n\
    \    }\n    }\n    ...\n    ...\n    }\n    清单 13-18.\n    REST API 的 AuthenticationFailureHandler\n\
    \    ```\n\n    因此，你可以使用 `SimpleUrlAuthenticationFailureHandler` 而不设置 `defaultFailureUrl`\
    \ 值，这适用于 REST API。\n\n4.  设置 `LogoutSuccessHandler`。\n\n当用户从 Spring Security 注销时，它使用\
    \ `SimpleUrlLogoutSuccessHandler`，该处理程序实现了 `LogoutSuccessHandler`，以将用户重定向到默认的目标\
    \ URL。对于 REST API，你应该返回 HTTP 状态码 `200 OK`，类似于 `AuthenticationSuccessHandler`。\n\
    \nSpring Security 提供了 `HttpStatusReturningLogoutSuccessHandler`，你可以使用它简单地返回 HTTP\
    \ 状态码 `200`，如清单 13-19 所示。\n\n```\npublic class HttpStatusReturningLogoutSuccessHandler\n\
    implements LogoutSuccessHandler\n{\nprivate final HttpStatus httpStatusToReturn;\n\
    ....\n....\npublic HttpStatusReturningLogoutSuccessHandler() {\nthis.httpStatusToReturn\
    \ = HttpStatus.OK;\n}\npublic void onLogoutSuccess(HttpServletRequest request,\n\
    HttpServletResponse response,\nAuthentication authentication)\nthrows IOException,\
    \ ServletException\n{\nresponse.setStatus(httpStatusToReturn.value());\nresponse.getWriter().flush();\n\
    }\n}\n清单 13-19.\nREST API 的 LogoutSuccessHandler\n```\n\n现在你已经完成了保护 REST API 的所有\
    \ Spring Security 自定义设置。是时候将它们与 Spring Security 配置挂钩了。参见清单 13-20。\n\n```\n@Configuration\n\
    @EnableWebSecurity\n@EnableGlobalMethodSecurity(securedEnabled = true)\npublic\
    \ class WebSecurityConfig extends WebSecurityConfigurerAdapter {\n@Autowired\n\
    private UserDetailsService customUserDetailsService;\n@Autowired\nprivate RestAuthenticationSuccessHandler\
    \ authenticationSuccessHandler;\n@Bean\npublic PasswordEncoder passwordEncoder()\
    \ {\nreturn new BCryptPasswordEncoder();\n}\n@Autowired\npublic void configureGlobal(AuthenticationManagerBuilder\
    \ auth)\nthrows Exception\n{\nauth.userDetailsService(customUserDetailsService)\n\
    .passwordEncoder(passwordEncoder());\n}\n@Override\nprotected void configure(HttpSecurity\
    \ http) throws Exception {\nhttp\n.csrf().disable()\n.authorizeRequests()\n.antMatchers(\"\
    /\",\"/register\",\"/forgotPassword\").permitAll()\n.antMatchers(\"/admin/\").hasRole(\"\
    ADMIN\")\n.and()\n.exceptionHandling()\n.authenticationEntryPoint(\nnew Http401AuthenticationEntryPoint(\"\
    Basic realm=\\\"MyApp\\\"\"))\n.and()\n.formLogin()\n.permitAll()\n.loginProcessingUrl(\"\
    /login\")\n.successHandler(authenticationSuccessHandler)\n.failureHandler(new\
    \ SimpleUrlAuthenticationFailureHandler())\n.and()\n.logout()\n.permitAll()\n\
    .logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"))\n.logoutSuccessHandler(\n\
    new HttpStatusReturningLogoutSuccessHandler())\n;\n}\n}\n清单 13-20.\n为 REST API\
    \ 自定义的 Spring Security 配置\n```\n\n你已经完成了保护 REST API 的完整配置。现在，在向受保护资源发出请求之前，客户端需要进行身份验证。否则，将返回\
    \ `401 UNAUTHORIZED` 响应代码。在此示例中，你将使用 Postman REST 客户端（[`https://www.getpostman.com/`](https://www.getpostman.com/)）来验证\
    \ REST API 是否安全。\n\n如果你打开 Postman 客户端并向 `http://localhost:8080/api/posts` 发送 `GET`\
    \ 请求，你将看到以下响应，因为你尚未通过身份验证。\n\n```\n{\n\"timestamp\": 1496547074713,\n\"status\"\
    : 401,\n\"error\": \"Unauthorized\",\n\"message\": \"Full authentication is required\
    \ to access this resource\",\n\"path\": \"/api/posts\"\n}\n```\n\n现在向 `http://localhost:8080/login`\
    \ 发送 `POST` 请求，并将 `form-data` 设置为 `username` 和 `password` 值。这将产生以下响应：\n\n```\n\
    {\n\"password\":null,\n\"username\":\"admin@gmail.com\",\n\"authorities\":[\n\
    {\"authority\":\"ROLE_ADMIN\"},\n{\"authority\":\"ROLE_USER\"}\n],\n\"accountNonExpired\"\
    :true,\n\"accountNonLocked\":true,\n\"credentialsNonExpired\":true,\n\"enabled\"\
    :true,\n\"name\":\"admin@gmail.com\"\n}\n```\n\n现在你已通过身份验证，再次向 `http://localhost:8080/api/posts`\
    \ 发送 `GET` 请求。你应该会成功。\n\n总结\n\n本章探讨了如何使用 Spring Security 启动器保护使用 SpringMVC 和 Thymeleaf\
    \ 构建的传统 Web 应用程序。你还学习了如何通过自定义 Spring Security 来保护使用 Spring Boot 构建的 REST API。下一章将介绍\
    \ Spring Boot Actuator。\n\n14. Spring Boot Actuator\n\nSpring Boot 是一个固执己见的框架，它根据多种标准（例如你使用的启动器、属性配置和活动的环境配置文件）自动配置各种应用程序组件。\n\
    \n*   有没有办法知道 Spring Boot 自动注册了哪些组件（哪些 Spring bean）？\n*   是否可以检查当前运行的应用程序应用的所有配置参数？\n\
    *   你能确定哪个请求 URL 将由哪个控制器处理吗？\n*   你能获取应用程序的指标，例如内存使用情况、线程分配等吗？\n\n所有这些问题的答案都是肯定的。你可以使用\
    \ Spring Boot Actuator 执行所有这些活动。\n\n本章介绍 Spring Boot Actuator，并探讨各种 Actuator 端点，这些端点提供了大量关于正在运行的\
    \ Spring Boot 应用程序的有用信息。你还将学习如何保护 Actuator 端点、为 Actuator 端点启用 CORS，以及实现自定义健康检查和指标。最后，本章将介绍如何使用\
    \ JMX 通过 JConsole 监控你的应用程序。\n\nSpring Boot Actuator 简介\n\nSpring Boot Actuator\
    \ 模块提供了生产就绪的功能，例如监控、指标、健康检查等。Spring Boot Actuator 使你能够使用 HTTP 端点和 JMX 监控应用程序。\n\
    \nSpring Boot 提供了 `spring-boot-starter-actuator` 来自动配置 Actuator。你可以利用 Actuator\
    \ 的功能来监控 Spring Boot 应用程序，你将在本节中看到。\n\n首先，创建一个带有 Web、Data-JPA 和 Actuator 启动器的\
    \ Spring Boot 应用程序。\n\n```\n\norg.springframework.boot\nspring-boot-starter-web\n\
    \norg.springframework.boot\nspring-boot-starter-data-jpa\n\norg.springframework.boot\n\
    spring-boot-starter-actuator\n\ncom.h2database\nh2\n\n```\n\n运行入口点类 `SpringbootActuatorDemoApplication`。\n\
    \n```\n@SpringBootApplication\npublic class SpringbootActuatorDemoApplication\n\
    {\npublic static void main(String[] args)\n{\nSpringApplication.run(SpringbootActuatorDemoApplication.class,\
    \ args);\n}\n}\n```\n\n你可以看到控制台输出显示了 Spring Boot Actuator 提供的请求映射。\n\n```\n...\
    \ EndpointHandlerMapping     : Mapped \"{[/application/health || /application/health.json],methods=[GET],....\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers/{name:.*}],methods=[POST],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers || /application/loggers.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/auditevents || /application/auditevents.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/dump || /application/dump.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/env/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/env || /application/env.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/beans || /application/beans.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application || /application.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/trace || /application/trace.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/metrics/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/metrics || /application/metrics.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/info || /application/info.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/logfile || /application/logfile.json],methods=[GET\
    \ || HEAD]}\" ...\n... EndpointHandlerMapping     : Mapped \"{[/application/autoconfig\
