    # 8. 使用 JPA


    Java 持久化 API（JPA）是一个对象关系映射（ORM）框架，它是 Java EE 平台的一部分。JPA 通过让开发者使用面向对象的 API 而不是手动编写
    SQL 查询，简化了数据访问层的实现。最流行的 JPA 实现包括 Hibernate、EclipseLink 和 OpenJPA。


    Spring 框架提供了一个 Spring ORM 模块，以便轻松集成 ORM 框架。你还可以将 Spring 的声明式事务管理功能与 JPA 结合使用。除了
    Spring ORM 模块，Spring Data 项目组合还提供了一个基于 Spring 的一致编程模型，用于访问关系型数据库和 NoSQL 数据存储。


    Spring Data 集成了大多数流行的数据访问技术，包括 JPA、MongoDB、Redis、Cassandra、Solr、ElasticSearch
    等。


    本章将探讨 Spring Data JPA，解释如何将其与 Spring Boot 一起使用，并研究如何在同一个 Spring Boot 应用程序中处理多个数据库。


    ## 介绍 Spring Data JPA


    第 1 章讨论了如何在不使用 Spring Boot 的情况下，使用 SpringMVC 和 JPA 开发 Web 应用程序。如果不使用 Spring Boot，你需要自行配置各种
    Bean，例如 `DataSource`、`TransactionManager`、`LocalContainerEntityManagerFactoryBean`
    等。你可以使用 Spring Boot JPA 启动器 `spring-boot-starter-data-jpa` 来快速启动并运行 JPA。在深入了解如何使用
    `spring-boot-starter-data-jpa` 之前，让我们先看看 Spring Data JPA。


    如第 5 章所述，Spring Data 是一个伞形项目，它以一种一致的编程模型为大多数流行的数据访问技术（包括 JPA、MongoDB、Redis、Cassandra、Solr
    和 ElasticSearch）提供数据访问支持。Spring Data JPA 是使用 JPA 处理关系型数据库的模块之一。


    有时，你可能需要实现数据管理应用程序来存储、编辑和删除数据。对于这些应用程序，你只需要实现实体的 CRUD（创建、读取、更新、删除）操作。Spring Data
    没有让你一遍又一遍地实现相同的 CRUD 操作，或者推出你自己的通用 CRUD DAO 实现，而是提供了各种仓库抽象，例如 `CrudRepository`、`PagingAndSortingRepository`、`JpaRepository`
    等。它们为 CRUD 操作以及分页和排序提供了开箱即用的支持。参见图 8-1。


    ![A447991_1_En_8_Fig1_HTML.jpg](img/A447991_1_En_8_Fig1_HTML.jpg)


    图 8-1.


    JpaRepository 方法


    如图 8-1 所示，`JpaRepository` 提供了多种用于 CRUD 操作的方法，以及以下值得关注的方法：


    *   `long count();`——返回可用的实体总数。

    *   `boolean existsById(ID id);`——返回具有给定 ID 的实体是否存在。

    *   `List<T> findAll(Sort sort);`——返回按给定选项排序的所有实体。

    *   `Page<T> findAll(Pageable pageable);`——返回满足 `Pageable` 对象中提供的分页限制的实体页面。


    Spring Data JPA 不仅提供了开箱即用的 CRUD 操作，还支持基于方法名称的动态查询生成。


    例如：


    *   通过定义一个 `User findByEmail(String email)` 方法，Spring Data 将自动生成带有 `where` 子句的查询，例如
    `"where email = ?1"`。

    *   通过定义一个 `User findByEmailAndPassword(String email, String password)` 方法，Spring
    Data 将自动生成带有 `where` 子句的查询，例如 `"where email = ?1 and password=?2"`。


    注意


    你还可以使用其他运算符，例如 `OR`、`LIKE`、`Between`、`LessThan`、`LessThanEqual` 等。有关支持操作的完整列表，请参阅
    [`http://docs.spring.io/spring-data/jpa/docs/current/reference/html/#jpa.query-methods.query-creation`](http://docs.spring.io/spring-data/jpa/docs/current/reference/html/#jpa.query-methods.query-creation)。


    但有时你可能无法使用方法名称来表达你的条件，或者方法名称看起来很不美观。Spring Data 提供了使用 `@Query` 注解显式配置查询的灵活性。


    ```

    @Query("select u from User u where u.email=?1 and u.password=?2 and u.enabled=true")

    User findByEmailAndPassword(String email, String password);

    ```


    你还可以使用 `@Modifying` 和 `@Query` 执行数据更新操作，如下所示：


    ```

    @Modifying

    @Query("update User u set u.enabled=:status")

    int updateUserStatus(@Param("status") boolean status)

    ```


    请注意，此示例使用了命名参数 `:status` 而不是位置参数 `?1`。

