    , newUser.getEmail());\n    }\n    }\n    Listing 8-4.\n    SpringbootJPADemoApplicationTests.java\n\
    \    ```\n\n### 添加动态查询方法\n\n现在，您将添加一些查找方法，以了解基于方法名称的动态查询生成是如何工作的。\n\n要按名称获取用户，请使用：\n\
    \n```\nUser findByName(String name)\n```\n\n要按名称搜索用户，请使用：\n\n```\nList findByNameLike(String\
    \ name)\n```\n\n上述方法会生成一个类似 `where u.name like ?1` 的 `where` 子句。\n\n假设您想进行通配符搜索，例如\
    \ `where u.name like %?1%`。您可以按如下方式使用 `@Query`：\n\n```\n@Query(\"select u from\
    \ User u where u.name like %?1%\")\nList searchByName(String name)\n```\n\n###\
    \ 使用排序和分页功能\n\n假设您想按名称升序获取所有用户。您可以按如下方式使用 `findAll(Sort sort)` 方法：\n\n```\nSort\
    \ sort = new Sort(Direction.ASC, \"name\");\nList users = userRepository.findAll(sort);\n\
    ```\n\n您也可以对多个属性应用排序，如下所示：\n\n```\nOrder order1 = new Order(Direction.ASC, \"\
    name\");\nOrder order2 = new Order(Direction.DESC, \"id\");\nSort sort = Sort.by(order1,\
    \ order2);\nList users = userRepository.findAll(sort);\n```\n\n用户将首先按名称升序排序，然后按\
    \ ID 降序排序。\n\n在许多 Web 应用程序中，您希望以分页的方式显示数据。Spring Data 使得以分页样式加载数据变得非常容易。假设您想在一页中加载前\
    \ 25 个用户。我们可以使用 `Pageable` 和 `PageRequest` 按页获取结果，如下所示：\n\n```\nint size = 25;\n\
    int page = 0; //基于零的页码索引。\nPageable pageable = PageRequest.of(page, size);\nPage\
    \ usersPage = userRepository.findAll(pageable);\n```\n\n`usersPage` 将仅包含前 25 条用户记录。您可以获取其他详细信息，例如总页数、当前页码、是否有下一页、是否有上一页等。\n\
    \n*   `usersPage.getTotalElements();` — 返回元素总数。\n*   `usersPage.getTotalPages();`\
    \ — 返回总页数。\n*   `usersPage.hasNext();`\n*   `usersPage.hasPrevious();`\n*   `List<User>\
    \ usersList = usersPage.getContent();`\n\n您也可以将分页与排序结合使用，如下所示：\n\n```\nSort sort\
    \ = new Sort(Direction.ASC, \"name\");\nPageable pageable = PageRequest.of(page,\
    \ size, sort);\nPage usersPage = userRepository.findAll(pageable);\n```\n"
- fmt: "### Working with Multiple Databases\n\nSpring Boot autoconfiguration works\
    \ out-of-the-box if you have single database to work with and provides plenty\
    \ of customization options through its properties.\n\nBut if your application\
    \ demands more control over the application configuration, you can turn off specific\
    \ autoconfigurations and configure the components by yourself.\n\nFor example,\
    \ you might want to use multiple databases in the same application. If you need\
    \ to connect to multiple databases, you need to configure various Spring beans\
    \ like `DataSources`, `TransactionManagers`, `EntityManagerFactoryBeans`, `DataSourceInitializers`,\
    \ etc., explicitly.\n\nSuppose you have an application where the security data\
    \ has been stored in one database/schema and order-related data has been stored\
    \ in another database/schema.\n\nIf you add the `spring-boot-starter-data-jpa`\
    \ starter and just define the `DataSource` beans only, then Spring Boot will try\
    \ to automatically create some beans (for example, `TransactionManager`), assuming\
    \ there will be only one data source. It will fail.\n\nNow you’ll see how you\
    \ can work with multiple databases in Spring Boot and use the Spring Data JPA\
    \ based application.\n\n1.  Create a Spring Boot application with the `data-jpa`\
    \ starter. Configure the following dependencies in `pom.xml`:\n\n```\n    org.springframework.boot\n\
    \    spring-boot-starter-data-jpa\n\nmysql\n    mysql-connector-java\n\n```\n\n\
    2.  Turn off the DataSource/JPA autoconfiguration. As you are going to configure\
    \ the database related beans explicitly, you will turn off the DataSource/JPA\
    \ autoconfiguration by excluding the `AutoConfiguration` classes , as shown in\
    \ Listing [8-5](#A447991_1_En_8_Chapter.html#Par70).\n\n```\n    @SpringBootApplication(\n\
    \    exclude = { DataSourceAutoConfiguration.class,\n    HibernateJpaAutoConfiguration.class,\n\
    \    DataSourceTransactionManagerAutoConfiguration.class})\n    @EnableTransactionManagement\n\
    \    public class SpringbootMultipleDSDemoApplication\n    {\n    public static\
    \ void main(String[] args)\n    {\n    SpringApplication.run(SpringbootMultipleDSDemoApplication.class,\
    \ args);\n    }\n    }\n    Listing 8-5.\n    SpringbootMultipleDSDemoApplication.java\n\
    \    ```\n\nAs you have turned off `AutoConfigurations`, you are enabling `TransactionManagement`\
    \ explicitly by using the `@EnableTransactionManagement` annotation.  \n3.  Configure\
    \ the `datasource` properties. Configure the `Security` and `Orders` database\
    \ connection parameters in the `application.properties` file.\n\n```\n    datasource.security.driver-class-name=com.mysql.jdbc.Driver\n\
    \    datasource.security.url=jdbc:mysql://localhost:3306/security\n    datasource.security.username=root\n\
    \    datasource.security.password=admin\n    datasource.security.initialize=true\n\
    \    datasource.orders.driver-class-name=com.mysql.jdbc.Driver\n    datasource.orders.url=jdbc:mysql://localhost:3306/orders\n\
    \    datasource.orders.username=root\n    datasource.orders.password=admin\n \
    \   datasource.orders.initialize=true\n    hibernate.hbm2ddl.auto=update\n   \
    \ hibernate.show-sql=true\n    ```\n\nHere, you have used custom property keys\
    \ to configure the two `datasource` properties.  \n4.  Create a security related\
    \ JPA entity and a JPA repository. Then create a `User` entity, as follows:\n\n\
    ```\n    package com.apress.demo.security.entities;\n    @Entity\n    @Table(name=\"\
    USERS\")\n    public class User\n    {\n    @Id @GeneratedValue(strategy=GenerationType.AUTO)\n\
    \    private Integer id;\n    @Column(nullable=false)\n    private String name;\n\
    \    @Column(nullable=false, unique=true)\n    private String email;\n    private\
    \ boolean disabled;\n    //setters & getters\n    }\n    ```\n\n5.  Create `UserRepository`\
    \ as follows:\n\n```\n    package com.apress.demo.security.repositories;\n   \
    \ public interface UserRepository extends JpaRepository\n    {\n    }\n    ```\n\
    \nNote that you have created `User.java` and `UserRepository.java` in the `com.apress.demo.security`\
    \ sub-packages.  \n6.  Create an orders-related JPA entity and JPA repository.\
    \ Create an `Order` entity as follows:\n\n```\n    package com.apress.demo.orders.entities;\n\
    \    @Entity\n    @Table(name=\"ORDERS\")\n    public class Order\n    {\n   \
    \ @Id @GeneratedValue(strategy=GenerationType.AUTO)\n    private Integer id;\n\
    \    @Column(nullable=false, name=\"cust_name\")\n    private String customerName;\n\
    \    @Column(nullable=false, name=\"cust_email\")\n    private String customerEmail;\n\
    \    //setters & getters\n    }\n    ```\n\nCreate the `OrderRepository` as follows:\n\
    \n```\n    package com.apress.demo.orders.repositories;\n    public interface\
    \ OrderRepository extends JpaRepository\n    {\n    }\n    ```\n\nNote that you\
    \ have created `Order.java` and `OrderRepository.java` in the `com.apress.demo.orders`\
    \ sub-packages.  \n7.  Create SQL scripts to initialize sample data. Create the\
    \ `security-data.sql` script in the `src/main/resources` folder to initialize\
    \ the `USERS` table with sample data.\n\n```\n    delete from users;\n    insert\
    \ into users(id, name, email,disabled)\n    values(1,'John','john@gmail.com',\
    \ false);\n    insert into users(id, name, email,disabled)\n    values(2,'Rob','rob@gmail.com',\
    \ false);\n    insert into users(id, name, email,disabled)\n    values(3,'Remo','remo@gmail.com',\
    \ true);\n    ```\n\nCreate the `orders-data.sql` script in the `src/main/resources`\
    \ folder to initialize the `ORDERS` table with sample data.\n\n```\n    delete\
    \ from orders;\n    insert into orders(id, cust_name, cust_email)\n    values(1,'Andrew','andrew@gmail.com');\n\
    \    insert into orders(id, cust_name, cust_email)\n    values(2,'Paul','paul@gmail.com');\n\
    \    insert into orders(id, cust_name, cust_email)\n    values(3,'Jimmy','jimmy@gmail.com');\n\
    \    ```\n\n8.  Create the `SecurityDBConfig.java` configuration class. You will\
    \ configure the Spring beans such as `DataSource`, `TransactionManager`, `EntityManagerFactoryBean`,\
    \ and `DataSourceInitializer` by connecting to the `Security` database in `SecurityDBConfig.java`,\
    \ as shown in Listing [8-6](#A447991_1_En_8_Chapter.html#Par90)."
