    \    2.0.0.RELEASE\n\n    UTF-8\n    1.8\n\n    org.springframework.boot\n   \
    \ spring-boot-starter-data-jpa\n\n    org.springframework.boot\n    spring-boot-starter-web\n\
    \n    org.springframework.boot\n    spring-boot-starter-thymeleaf\n\n    mysql\n\
    \    mysql-connector-java\n\n    org.springframework.boot\n    spring-boot-maven-plugin\n\
    \n    Listing 1-15.\n    The pom.xml File\n    ```\n\n    Wow, this `pom.xml`\
    \ file suddenly become so small! Note Don’t worry if this configuration doesn’t\
    \ make sense at this point in time. You have plenty more to learn in coming chapters.\
    \ If you want to use any the `MILESTONE` or `SNAPSHOT` version of Spring Boot,\
    \ you need to configure the following milestone/snapshot repositories in `pom.xml`.\n\
    \n    ```\n    org.springframework.boot\n    spring-boot-starter-parent\n    2.0.0.BUILD-SNAPSHOT\n\
    \n    spring-snapshots\n    Spring Snapshots\n    https://repo.spring.io/snapshot\n\
    \n    true\n\n    spring-milestones\n    Spring Milestones\n    https://repo.spring.io/milestone\n\
    \n    false\n\n    spring-snapshots\n    Spring Snapshots\n    https://repo.spring.io/snapshot\n\
    \n    true\n\n    spring-milestones\n    Spring Milestones\n    https://repo.spring.io/milestone\n\
    \n    false\n\n    ```\n\n2.  Configure datasource/JPA properties in `src/main/resources/application.properties`,\
    \ as shown in Listing [1-16](#A447991_1_En_1_Chapter.html#Par90).\n\n    ```\n\
