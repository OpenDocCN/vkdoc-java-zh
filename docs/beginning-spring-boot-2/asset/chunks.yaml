- fmt: "### Using the Thymeleaf View Templates\n\nThymeleaf is a server-side Java\
    \ template engine that provides support for integrating with SpringMVC and SpringSecurity.\
    \ Among the supporting view templates, Thymeleaf is the most popular one used\
    \ in Spring Boot applications.\n\nIn this section, you see how you can use Thymeleaf\
    \ in a Spring Boot web application.\n\nCreate a Spring Boot Maven project with\
    \ the `spring-boot-starter-thymeleaf` starter.\n\n```xml\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-web</artifactId>\n</dependency>\n<dependency>\n\
    \    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-thymeleaf</artifactId>\n\
    </dependency>\n```\n\n`ThymeleafAutoConfiguration` will take care of registering\
    \ `TemplateResolver`, `ThymeleafViewResolver`, `SpringResourceTemplateResolver`,\
    \ and `SpringTemplateEngine`. By default, Spring Boot loads the Thymeleaf view\
    \ templates from the `classpath:/templates/` directory.\n\nNow create a controller\
    \ to handle the `\"/home\"` request.\n\n```java\n@Controller\npublic class HomeController\n\
    {\n    @GetMapping(\"/home\")\n    public String home(Model model) {\n       \
    \ model.addAttribute(\"message\", \"Spring Boot + Thymeleaf rocks\");\n      \
    \  return \"home\";\n    }\n}\n```\n\nThis example is adding the string `\"Spring\
    \ Boot + Thymeleaf rocks\"` to model the key `\"message\"`, which you want to\
    \ render in the Thymeleaf template.\n\nCreate the Thymeleaf view called `home.html`\
    \ in the `src/main/resources/templates` directory.\n\n```html\n<!DOCTYPE html>\n\
    <html xmlns:th=\"http://www.thymeleaf.org\">\n<head>\n    <title>Home</title>\n\
    </head>\n<body>\n    <h1>Welcome</h1>\n    <p th:text=\"${message}\">Message</p>\n\
    </body>\n</html>\n```\n\nThis displays the model attribute `\"message\"` value\
    \ in the Thymeleaf template using `th:text=\"${message}\"`.\n\nNow run the following\
    \ entry point class.\n\n```java\n@SpringBootApplication\npublic class SpringbootThymeleafDemoApplication\n\
    {\n    public static void main(String[] args)\n    {\n        SpringApplication.run(SpringbootThymeleafDemoApplication.class,\
    \ args);\n    }\n}\n```\n\nPoint the browser to `http://localhost:8080/home`.\
    \ You should be able to see the response `Spring Boot + Thymeleaf rocks`."
