  trans: "\n## 使用 Spring Boot 开发 Web 应用\n\nSpring Boot 提供了 Web 启动器 `spring-boot-starter-web`，用于使用\
    \ Spring MVC 开发 Web 应用。Spring Boot 的自动配置会注册 Spring MVC 的 Bean，例如 `DispatcherServlet`、`ViewResolver`、`ExceptionHandler`\
    \ 等。你可以将 Spring Boot Web 应用开发为 JAR 类型的模块（使用内嵌 Servlet 容器），或 WAR 类型的模块（可部署在任何外部\
    \ Servlet 容器上）。\n\n```\norg.springframework.boot\nspring-boot-starter-web\n\n\
    ```\n\n`spring-boot-starter-web` 启动器默认将 `DispatcherServlet` 配置到 URL 模式 `\"/\"\
    `，并添加 Tomcat 作为内嵌 Servlet 容器，运行在 8080 端口。\n\nSpring Boot 默认从以下 `CLASSPATH` 位置提供静态资源（HTML、CSS、JS、图片等）：\n\
    \n*   `/static`\n*   `/public`\n*   `/resources`\n*   `/META-INF/resources`\n\n\
    除了这些位置，你还可以使用 WebJars（[`http://www.webjars.org/`](http://www.webjars.org/)）来提供静态资源。Spring\
    \ Boot 会自动处理对 `/webjars/` 路径的请求，并从 WebJars 的 JAR 文件中提供资源。你可以通过在 `application.properties`\
    \ 文件中配置 `spring.resources.staticLocations` 属性来覆盖静态资源的位置。\n\n```\nspring.resources.staticLocations=classpath:/assets/\n\
    ```\n\n现在，你将学习如何创建一个 Spring Boot Web 项目，显示一个简单的 HTML 页面，并使用 CSS 和图片等静态资源。Bootstrap（[`http://getbootstrap.com/`](http://getbootstrap.com/)）是一个流行的\
    \ CSS 框架。本示例通过 WebJars 将 Bootstrap CSS 添加到项目中。\n\n1.  创建一个包含 Web 启动器的 Spring Boot\
    \ Maven 项目，并添加 Bootstrap WebJars 依赖。\n\n    ```\n\n    org.springframework.boot\n\
    \    spring-boot-starter-web\n\n    org.webjars.bower\n    bootstrap\n    3.3.7\n\
    \n    ```\n\n2.  在 `src/main/resources/static/css` 文件夹中创建 `styles.css` 样式表。\n\n\
    \    ```\n    body {\n    background-color: #A7A5A4;\n    padding-top: 50px;\n\
    \    }\n    ```\n\n3.  将一张图片（例如 `spring-boot.png`）复制到 `src/main/resources/static/images`\
    \ 文件夹中。  \n4.  在 `src/main/resources/public` 文件夹中创建 `index.html` 文件，并将 `bootstrap.css`\
    \ 添加到 `index.html` 文件中。使用 Bootstrap 导航栏组件。\n\n    ```\n\n    Home\n\n    Toggle\
    \ navigation\n\n    Project name\n\n    Home\n    About\n    Contact\n\n    Hello\
    \ World!!\n\n    ```\n\n5.  创建一个应用程序入口点类。\n\n    ```\n    @SpringBootApplication\n\
    \    public class SpringbootWebDemoApplication\n    {\n    public static void\
    \ main(String[] args)\n    {\n    SpringApplication.run(SpringbootWebDemoApplication.class,\
    \ args);\n    }\n    }\n    ```\n\n现在运行 `SpringbootWebDemoApplication` 并导航到 `http://localhost:8080/`。你应该能够看到带有\
    \ Bootstrap 导航栏的网页，如图 10-2 所示。\n\n![A447991_1_En_10_Fig2_HTML.jpg](img/A447991_1_En_10_Fig2_HTML.jpg)\n\
    \n图 10-2.\n\n使用 WebJars 集成 Bootstrap 组件的网页\n\n默认情况下，Spring Boot Web 启动器使用 Tomcat\
    \ 作为内嵌 Servlet 容器，并运行在 8080 端口。但是，你可以通过在 `application.properties` 中使用 `server.*`\
    \ 来自定义服务器属性。\n\n```\nserver.port=9090\nserver.servlet.context-path=/demo\nserver.servlet.path=/app\n\
    ```\n\n通过这些自定义配置，`DispatcherServlet` 被配置为处理 URL 模式 `/app`，根 `contextPath` 将是 `/demo`，Tomcat\
    \ 现在运行在端口 `9090` 上。因此，你可以通过 `http://localhost:9090/demo/app/` 访问 `index.html`\
    \ 文件。\n\n## 使用 Tomcat、Jetty 和 Undertow 内嵌 Servlet 容器\n\n如前所述，Spring Boot Web 启动器默认包含\
    \ Tomcat 作为内嵌 Servlet 容器。不过，你可以使用其他 Servlet 容器（如 Jetty 或 Undertow）来代替 Tomcat。\n\
    \n要使用 Jetty 作为内嵌容器，你只需排除 `spring-boot-starter-tomcat` 并添加 `spring-boot-starter-jetty`。\n\
    \n```\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
    spring-boot-starter-tomcat\n\norg.springframework.boot\nspring-boot-starter-jetty\n\
    \n```\n\nUndertow（[`http://undertow.io/`](http://undertow.io/)）是一个用 Java 编写的 Web\
    \ 服务器。它提供了基于 NIO 的阻塞和非阻塞 API。Spring Boot 也为 Undertow 服务器提供了自动配置支持。与 Jetty 类似，你可以按如下方式配置\
    \ Spring Boot 使用 Undertow 内嵌服务器代替 Tomcat：\n\n```\norg.springframework.boot\nspring-boot-starter-web\n\
    \nspring-boot-starter-tomcat\norg.springframework.boot\n\norg.springframework.boot\n\
    spring-boot-starter-undertow\n\n```\n\n你可以分别使用 `server.tomcat.*`、`server.jetty.*`\
    \ 和 `server.undertow.*` 属性来自定义 Tomcat、Jetty 和 Undertow Servlet 容器的各种属性。\n\n```\n\
    server.tomcat.accesslog.directory=logs # 创建日志文件的目录。\nserver.tomcat.accesslog.enabled=false\
    \ # 启用访问日志。\nserver.tomcat.accesslog.file-date-format=.yyyy-MM-dd # 日志文件名中的日期格式。\n\
    server.tomcat.basedir= # Tomcat 基础目录。如果未指定，将使用临时目录。\nserver.tomcat.max-connections=\
    \ # 服务器在任何给定时间将接受和处理的最大连接数。\nserver.tomcat.max-http-header-size=0 # HTTP 消息头的最大大小（字节）。\n\
    server.tomcat.max-http-post-size=0 # HTTP POST 内容的最大大小（字节）。\nserver.tomcat.max-threads=0\
    \ # 最大工作线程数。\nserver.tomcat.min-spare-threads=0 # 最小工作线程数。\nserver.tomcat.port-header=X-Forwarded-Port\
    \ # 用于覆盖原始端口值的 HTTP 头名称。\nserver.jetty.acceptors= # 要使用的接收器线程数。\nserver.jetty.accesslog.append=false\
    \ # 追加到日志。\nserver.jetty.accesslog.date-format=dd/MMM/yyyy:HH:mm:ss Z\nserver.jetty.accesslog.enabled=false\
    \ # 启用访问日志。\nserver.jetty.accesslog.filename= # 日志文件名。如果未指定，日志将被重定向到 \"System.err\"\
    。\nserver.jetty.accesslog.log-cookies=false # 启用请求 cookie 的日志记录。\nserver.jetty.accesslog.log-latency=false\
    \ # 启用请求处理时间的日志记录。\nserver.jetty.max-http-post-size=0 # HTTP POST 或 PUT 内容的最大大小（字节）。\n\
    server.undertow.accesslog.dir= # Undertow 访问日志目录。\nserver.undertow.accesslog.enabled=false\
    \ # 启用访问日志。\nserver.undertow.accesslog.rotate=true # 启用访问日志轮转。\nserver.undertow.accesslog.suffix=log\
    \ # 日志文件名的后缀。\nserver.undertow.buffer-size= # 每个缓冲区的大小（字节）。\nserver.undertow.io-threads=\
    \ # 为工作线程创建的 I/O 线程数。\nserver.undertow.max-http-post-size=0 # HTTP POST 内容的最大大小（字节）。\n\
    ```\n\n使用 `org.springframework.boot.autoconfigure.web.ServerProperties` 类可以查看服务器自定义属性的完整列表。\n"
- fmt: '# Customizing Embedded Servlet Containers


    Spring Boot provides lot of customization options for configuring servlet containers
    using the `server.*` properties. You can customize the `port`, `connectionTimeout`,
    `contextPath`, and SSL configuration parameters, as well as the session configuration
    parameters by configuring these properties in `application.properties`.


    But if you need more control, you can register embedded servlet containers programmatically
    by registering a bean of type `TomcatServletWebServerFactory`, `JettyServletWebServerFactory`,
    or `UndertowServletWebServerFactory` based on the embedded server you want to
    use.


    One common scenario where you would want to register embedded servlet containers
    programmatically is to redirect the default HTTP request to the HTTPS protocol.


    Suppose your application is running on `http://localhost:8080` and you want to
    use the HTTPS protocol. If anyone is accessing `http://localhost:8080`, you’ll
    want to redirect the request to `https://localhost:8443`.


    First, you generate a self-signed SSL certificate using the following command:


    ```

    keytool -genkey -alias mydomain -keyalg RSA -keysize 2048 -keystore KeyStore.jks
    -validity 3650

    ```


    After providing answers to questions that `keytool` asks, it will generate a `KeyStore.jks`
    file and copy it to the `src/main/resources` folder.


    Now configure the SSL properties in the `application.properties` file as follows:


    ```

    server.port=8443

    server.ssl.key-store=classpath:KeyStore.jks

    server.ssl.key-store-password=mysecret

    server.ssl.keyStoreType=JKS

    server.ssl.keyAlias=mydomain

    ```


    If you are using the Tomcat embedded container, you can register `TomcatServletWebServerFactory`
    programmatically, as shown in Listing [10-3](#A447991_1_En_10_Chapter.html#Par57).


    ```

    @Configuration

    public class TomcatConfiguration

    {

    @LocalServerPort

    int serverPort;

    @Bean

    public ServletWebServerFactory servletContainer() {

    TomcatServletWebServerFactory tomcat = new TomcatServletWebServerFactory() {

    @Override

    protected void postProcessContext(Context context) {

    SecurityConstraint securityConstraint = new SecurityConstraint();

    securityConstraint.setUserConstraint("CONFIDENTIAL");

    SecurityCollection collection = new SecurityCollection();

    collection.addPattern("/*");

    securityConstraint.addCollection(collection);

    context.addConstraint(securityConstraint);

    }

    };

    tomcat.addAdditionalTomcatConnectors(initiateHttpConnector());

    return tomcat;

    }

    private Connector initiateHttpConnector() {

    Connector connector = new Connector("org.apache.coyote.http11.Http11NioProtocol");

    connector.setScheme("http");

    connector.setPort(8080);

    connector.setSecure(false);

    connector.setRedirectPort(serverPort);

    return connector;

    }

    }

    Listing 10-3.

    Registering the Tomcat Embedded Container Programmatically

    ```


    With this customization, the request to `http://localhost:8080/` will be automatically
    redirected to `https://localhost:8443/`.


    # Customizing SpringMVC Configuration


    Most of the time, Spring Boot’s default autoconfiguration, along with the customization
    properties, will be sufficient to tune your web application. But at times, you
    may need more control to configure the application components in a specific way
    to meet your application needs.


    If you want to take advantage of Spring Boot’s autoconfiguration and add some
    additional MVC configuration (interceptors, formatters, view controllers, etc.),
    then you can create a configuration class without the `@EnableWebMvc` annotation,
    which implements `WebMvcConfigurer` and supplies additional configuration. See
    Listing [10-4](#A447991_1_En_10_Chapter.html#Par62).


    **Note:** If you want complete control over the Spring MVC configuration, you
    can add your own configuration class annotated with `@EnableWebMvc`. Spring Boot’s
    WebMVC autoconfiguration will be completely turned off if you create a configuration
    class with the `@Configuration` and `@EnableWebMvc` annotations.


    ```

    @Configuration

    public class WebConfig implements WebMvcConfigurer

    {

    @Override

    public void addViewControllers(ViewControllerRegistry registry){

    registry.addViewController("/login").setViewName("public/login");

    registry.addRedirectViewController("/", "/home");

    }

    @Override

    public void addInterceptors(InterceptorRegistry registry) {

    //Add additional interceptors here

    }

    @Override

    public void addResourceHandlers(ResourceHandlerRegistry registry) {

    registry.addResourceHandler("/assets/").addResourceLocations("/resources/assets/");

    }

    @Override

    public void configureDefaultServletHandling(DefaultServletHandlerConfigurer configurer)
    {

    configurer.enable();

    }

    @Override

    public void addFormatters(FormatterRegistry registry) {

    //Add additional formatters here

    }

    }

    Listing 10-4.

    Customizing the SpringMVC Configuration

    ```


    SpringMVC provides `WebMvcConfigurerAdapter`, which is an implementation of the
    `WebMvcConfigurer` interface. But `WebMvcConfigurerAdapter` is deprecated as of
    Spring 5.0, because `WebMvcConfigurer` has default method implementations and
    uses Java 8 default method support.'
