    Boot application and run it, you probably want to understand how Spring Boot’s
    autoconfiguration works. But before that, you should know about Spring’s `@Conditional`
    feature, on which Spring Boot’s autoconfiguration depends.


    The next chapter explores the power of the `@Conditional` annotation feature and
    takes a detailed look at how Spring Boot autoconfiguration works.


    # 3. Spring Boot Autoconfiguration


    The Spring Boot autoconfiguration mechanism heavily depends on the `@Conditional`
    feature. This chapter explores how you can conditionally register Spring beans
    by using the `@Conditional` annotation and create various types of `Conditional`
    implementations meeting certain criteria. Then you will look into how Spring Boot
    leverages the `@Conditional` feature to configure beans automatically based on
    certain criteria.


    ## Exploring the Power of @Conditional


    While developing Spring-based applications, you may come across a need to register
    beans conditionally. For example, you may want to register a `DataSource` bean
    pointing to the `DEV` database when running applications locally and point to
    a different `PRODUCTION` database when running in production.


    You can externalize the database connection parameters into property files and
    use the file that’s appropriate for the environment. But you must change the configuration
    whenever you need to point to a different environment and redeploy the application.


    To address this issue, Spring 3.1 introduced the concept of profiles . You can
    register multiple beans of the same type and associate them with one or more profiles.
    When you run the application, you can activate the desired profile(s). That way,
    only the beans associated with the activated profiles will be registered.


    ```

    @Configuration

    public class AppConfig

    {

    @Bean

    @Profile("DEV")

    public DataSource devDataSource() {

    ...

    }

    @Bean

    @Profile("PROD")

    public DataSource prodDataSource() {

    ...

    }

    }

    ```


    With this configuration, you can specify the active profile using the `-Dspring.profiles.active=DEV`
    system property. This approach works fine for simple cases, such as when you’re
    enabling or disabling bean registrations based on activated profiles. But if you
    want to register beans based on some conditional logic, the profiles approach
    itself is not sufficient.


    To provide much more flexibility for registering Spring beans conditionally, Spring
    4 introduced the concept of the `@Conditional` . Using the `@Conditional` approach,
    you can register a bean conditionally based on any arbitrary condition.


    For example, you may want to register a bean when:


    *   A specific class is present in the classpath

    *   A Spring bean of a certain type isn’t already registered in the `ApplicationContext`

    *   A specific file exists in a location

    *   A specific property value is configured in a configuration file

    *   A specific system property is present/absent


    These are just a few examples and you can set up any condition you want. The next
    section looks at how Spring’s `@Conditional` works.


    ### Using @Conditional Based on System Properties


    Suppose you have a `UserDAO` interface with methods to get data from a datastore.
    You have two implementations of `UserDAO` interface—`JdbcUserDAO` talks to the
    MySQL database and `MongoUserDAO` talks to MongoDB. You may want to enable only
    `J` `dbcUserDAO` or `MongoUserDAO` based on a specific system property, say `dbType`.


    If the application is started using `java -jar myapp.jar -DdbType=MySQL`, then
    you want to enable `JdbcUserDAO`; otherwise, if the application is started using
    `java -jar myapp.jar -DdbType=MONGO`, you want to enable `MongoUserDAO`.


    Suppose you have the `UserDAO` interface and the `JdbcUserDAO` and `MongoUserDAO`
    implementations, as shown in Listing [3-1](#A447991_1_En_3_Chapter.html#Par18).


    ```

    public interface UserDAO

    {

    List getAllUserNames();

    }

    public class JdbcUserDAO implements UserDAO

    {

    @Override

    public List getAllUserNames()

    {

    System.out.println("**** Getting usernames from RDBMS *****");

    return Arrays.asList("Jim","John","Rob");

    }

    }

    public class MongoUserDAO implements UserDAO

    {

    @Override

    public List getAllUserNames()

    {

    System.out.println("**** Getting usernames from MongoDB *****");

    return Arrays.asList("Bond","James","Bond");

    }

    }

    Listing 3-1.

    UserDAO Interface and the JdbcUserDAO and MongoUserDAO Implementations

    ```


    You can implement the `M` `ySQLDatabaseTypeCondition` condition to check whether
    the `dbType` system property is `MYSQL`, as shown in Listing [3-2](#A447991_1_En_3_Chapter.html#Par20).


    ```

    public class MySQLDatabaseTypeCondition implements Condition

    {

    @Override

    public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
    metadata)

    {

    String enabledDBType = System.getProperty("dbType");

    return (enabledDBType != null &&

    enabledDBType.equalsIgnoreCase("MYSQL"));

    }

    }

    Listing 3-2.

    MySQLDatabaseTypeCondition.java

    ```


    You can implement the `MongoDBDatabaseTypeCondition` condition to check whether
    the `dbType` system property is `MONGODB`, as shown in Listing [3-3](#A447991_1_En_3_Chapter.html#Par22).


    ```

    public class MongoDBDatabaseTypeCondition implements Condition

    {

    @Override

    public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
    metadata)

    {

    String enabledDBType = System.getProperty("dbType");

    return (enabledDBType != null && enabledDBType.equalsIgnoreCase("MONGODB"));

    }

    }

    Listing 3-3.

    MongoDBDatabaseTypeCondition.java

    ```


    Now you can configure both the `JdbcUserDAO` and `MongoUserDAO` beans conditionally
    using `@Conditional`, as shown in Listing [3-4](#A447991_1_En_3_Chapter.html#Par24).


    ```

    @Configuration

    public class AppConfig

    {

    @Bean

    @Conditional(MySQLDatabaseTypeCondition.class)

    public UserDAO jdbcUserDAO(){

    return new JdbcUserDAO();

    }

    @Bean

    @Conditional(MongoDBDatabaseTypeCondition.class)

    public UserDAO mongoUserDAO(){

    return new MongoUserDAO();

    }

    }

    Listing 3-4.

    AppConfig.java

    ```


    If you run the application, such as `java -jar myapp.jar -DdbType=MYSQL`, only
    the `JdbcUserDAO` bean will be registered. But if you set the system property
    to `-DdbType=MONGODB`, the `MongoUserDAO` bean will be registered. This is how
    you conditionally register a bean based on a system property .'
