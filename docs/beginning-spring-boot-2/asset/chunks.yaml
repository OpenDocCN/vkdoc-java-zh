    \n## 使用docker-compose运行多个容器\n\n如果你的应用程序依赖于多个服务，并且你需要将所有服务都启动在Docker容器中，那么逐个启动它们会很繁琐。你可以使用`docker-compose`工具来编排运行应用程序所需的多个容器。你需要创建一个`docker-compose.yml`文件，并配置要运行的服务。\n\
    \n在应用程序的根目录下创建`docker-compose.yml`，如清单[19-13](#A447991_1_En_19_Chapter.html#Par124)所示。\n\
