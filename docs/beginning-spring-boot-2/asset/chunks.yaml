  trans: '

    # 1. Spring Boot 简介


    Spring 框架是一个非常流行且广泛使用的 Java 框架，用于构建 Web 和企业级应用程序。Spring 的核心是一个依赖注入容器，它提供了多种配置
    Bean 的灵活性，例如 XML、注解和 JavaConfig。多年来，Spring 框架通过满足现代业务应用程序的需求（如安全性、对 NoSQL 数据存储的支持、处理大数据、批处理、与其他系统的集成等）而呈指数级增长。Spring
    及其子项目已成为构建企业级应用程序的可行平台。


    Spring 框架非常灵活，提供了多种配置应用程序组件的方式。丰富的功能集加上多种配置选项，使得配置 Spring 应用程序变得复杂且容易出错。Spring
    团队创建了 Spring Boot，旨在通过其强大的自动配置机制来解决配置的复杂性。


    本章将快速介绍 Spring 框架。你将使用 SpringMVC 和 JPA 以传统方式（不使用 Spring Boot）开发一个 Web 应用程序。然后，你将了解传统方式的痛点，并学习如何使用
    Spring Boot 开发相同的应用程序。


    ## Spring 框架概述


    如果你是一名 Java 开发者，那么你很有可能听说过 Spring 框架并在项目中使用过它。Spring 框架最初是作为一个依赖注入容器创建的，但它的功能远不止于此。Spring
    之所以非常流行，有以下几个原因：


    *   Spring 的依赖注入方法鼓励编写可测试的代码

    *   易于使用且功能强大的数据库事务管理能力

    *   Spring 简化了与其他 Java 框架（如 JPA/Hibernate ORM 和 Struts/JSF Web 框架）的集成

    *   用于构建 Web 应用程序的最先进的 Web MVC 框架


    除了 Spring 框架本身，还有许多其他的 Spring 子项目可以帮助构建满足现代业务需求的应用程序：


    *   Spring Data：简化了从关系型和 NoSQL 数据存储中访问数据的过程。

    *   Spring Batch：提供了一个强大的批处理框架。

    *   Spring Security：用于保护应用程序的健壮安全框架。

    *   Spring Social：支持与社交网站（如 Facebook、Twitter、LinkedIn、GitHub 等）的集成。

    *   Spring Integration：企业集成模式的实现，通过轻量级消息传递和声明式适配器促进与其他企业应用程序的集成。


    还有许多其他有趣的项目，用于满足各种现代应用程序开发需求。更多信息，请查看 [`http://spring.io/projects`](http://spring.io/projects)。


    ## Spring 配置风格


    Spring 最初提供了基于 XML 的方法来配置 Bean。后来，Spring 引入了基于 XML 的 DSL、注解和基于 JavaConfig 的方法来配置
    Bean。清单 1-1 到 1-3 展示了每种配置风格的样子。


    ```


    清单 1-1.

    基于 XML 的配置示例

    ```


    ```

    @Service public class UserService

    {

    private UserDao userDao;

    @Autowired    public UserService(UserDao dao){

    this.userDao = dao;

    }

    ...

    ...

    }

    @Repository public class JdbcUserDao

    {

    private DataSource dataSource;

    @Autowired

    public JdbcUserDao(DataSource dataSource){

    this.dataSource = dataSource;

    }

    ...

    ...

    }

    清单 1-2.

    基于注解的配置示例

    ```


    ```

    @Configuration

    public class AppConfig

    {

    @Bean

    public UserService userService(UserDao dao){

    return new UserService(dao);

    }

    @Bean

    public UserDao userDao(DataSource dataSource){

    return new JdbcUserDao(dataSource);

    }

    @Bean

    public DataSource dataSource(){

    BasicDataSource dataSource = new BasicDataSource();

    dataSource.setDriverClassName("com.mysql.jdbc.Driver");

    dataSource.setUrl("jdbc:mysql://localhost:3306/test");

    dataSource.setUsername("root");

    dataSource.setPassword("secret");

    return dataSource;

    }

    }

    清单 1-3.

    基于 JavaConfig 的配置示例

    ```


    如你所见，Spring 提供了多种配置应用程序组件的方法，你甚至可以混合使用这些方法。例如，你可以在同一个应用程序中同时使用 JavaConfig 和基于注解的配置风格。这带来了极大的灵活性，但有利也有弊。刚接触
    Spring 框架的人可能会对应该遵循哪种方法感到困惑。


    目前，Spring 社区建议你遵循基于 JavaConfig 的方法，因为它提供了更大的灵活性。但并没有一种放之四海而皆准的解决方案。你必须根据自己的应用程序需求来选择合适的方法。


    现在你已经了解了各种 Spring Bean 配置风格的样子，接下来我们将快速浏览一个典型的基于 SpringMVC 和 JPA/Hibernate 的 Web
    应用程序配置。


    ## 使用 SpringMVC 和 JPA 开发 Web 应用程序


    在了解 Spring Boot 及其提供的功能之前，我们先来看看一个典型的 Spring Web 应用程序配置是什么样的，并了解其中的痛点。然后，我们将看到
    Spring Boot 是如何解决这些问题的。


    首先要做的是创建一个 Maven 项目，并在 `pom.xml` 文件中配置所有必需的依赖项，如清单 1-4 所示。


    ```


