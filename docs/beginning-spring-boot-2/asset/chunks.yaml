    ## 将 Servlet、Filter 和 Listener 注册为 Spring Bean


    你可以通过使用 `ServletRegistrationBean`、`FilterRegistrationBean` 和 `ServletListenerRegistrationBean`
    的 Bean 定义来注册 Servlet、Filter 和 Listener。


    假设你创建了清单 10-5 中所示的 Servlet，并使用 `@Component` 注解将其标记为 Spring Bean。


    ```

    @Component

    public class MyServlet extends HttpServlet

    {

    @Autowired

    private UserService userService;

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws ServletException, IOException {

    resp.getWriter().write(userService.getMessage());

    }

    }

    清单 10-5.

    使用 @Component 注解将 MyServlet 定义为 Spring Bean

    ```


    现在，你可以使用 `ServletRegistrationBean` 注册 `MyServlet`，并将其映射到 URL 模式 `/myServlet`，如清单
    10-6 所示。


    ```

    @Configuration

    public class WebMvcConfig implements WebMvcConfigurer

    {

    @Autowired

    private MyServlet myServlet;

    @Bean

    public ServletRegistrationBean myServletBean()

    {

    ServletRegistrationBean servlet = new ServletRegistrationBean();

    servlet.setServlet(myServlet);

    servlet.addUrlMappings("/myServlet");

    return servlet;

    }

    ...

    ...

    }

    清单 10-6.

    使用 ServletRegistrationBean 注册 MyServlet

    ```


    通过这种方法，你可以利用 Spring 的依赖注入功能来处理 Servlet、Filter 和 Listener。接下来，我们看看如何注册 Filter 和
    Listener。


    JavaMelody ( [`https://github.com/javamelody/javamelody/wiki`](https://github.com/javamelody/javamelody/wiki)
    ) 是一个可用于监控基于 Java 的 Web 应用程序的库。JavaMelody 可以提供关于运行中应用程序的各种指标，包括：


    *   一个摘要，显示总执行次数、平均执行时间、CPU 时间和错误百分比。

    *   当平均时间超过可配置阈值时，请求所花费的时间百分比。

    *   完整的请求列表，聚合了无动态参数的请求，包含执行次数、平均执行时间、平均 CPU 时间、错误百分比以及执行时间随时间变化的趋势图。

    *   每个 HTTP 请求都指示了流量响应的大小、SQL 平均执行次数和 SQL 平均时间。


    将 JavaMelody 集成到 Java Web 应用程序中非常简单。你需要注册 `net.bull.javamelody.MonitoringFilter`（这是一个
    Filter）和 `net.bull.javamelody.SessionListener`（这是一个 `HttpSessionListener`）。


    清单 10-7 展示了如何使用 `FilterRegistrationBean` 和 `ServletListenerRegistrationBean` 将
    JavaMelody 的 `MonitoringFilter` 和 `SessionListener` 配置为 Spring Bean。


    ```

    @Configuration

    public class WebMvcConfig implements WebMvcConfigurer

    {

    @Bean(name = "javamelodyFilter")

    public FilterRegistrationBean javamelodyFilterBean() {

    FilterRegistrationBean registration = new FilterRegistrationBean();

    registration.setFilter(new MonitoringFilter());

    registration.addUrlPatterns("/*");

    registration.setName("javamelodyFilter");

    registration.setAsyncSupported(true);

    registration.setDispatcherTypes(DispatcherType.REQUEST, DispatcherType.ASYNC);

    return registration;

    }

    @Bean(name = "javamelodySessionListener")

    public ServletListenerRegistrationBean sessionListener() {

    return new ServletListenerRegistrationBean(new SessionListener());

    }

    }

    清单 10-7.

    注册 JavaMelody 的 MonitoringFilter 和 SessionListener

    ```


    通过此配置，你可以启动应用程序，并在 `http://localhost:8080/monitoring` 查看 JavaMelody 的监控仪表盘。参见图
    10-3。


    ![A447991_1_En_10_Fig3_HTML.jpg](img/A447991_1_En_10_Fig3_HTML.jpg)


    图 10-3.


    JavaMelody 监控仪表盘


    ## 作为可部署 WAR 的 Spring Boot Web 应用程序


    Spring Boot Web 应用程序也可以使用 WAR 类型打包进行开发。如果要构建一个可部署的 WAR 文件，首先要做的就是更改 `packaging`
    类型。


    如果你使用 Maven，则在 `pom.xml` 中将 `packaging` 类型更改为 `war`。


    ```

    war

    ```


    如果你使用 Gradle，则需要应用 WAR 插件。


    ```

    apply plugin: ''war''

    ```


    当你添加 `spring-boot-starter-web` 依赖时，它也会传递性地添加 `spring-boot-starter-tomcat` 依赖。因此，你需要将
    `spring-boot-starter-tomcat` 添加为 `provided` 作用域，这样它就不会被打包到 WAR 文件中。


    ```

    org.springframework.boot

    spring-boot-starter-tomcat

    provided


    ```


    如果你使用 Gradle，则按如下方式添加 `providedRuntime` 作用域的 `spring-boot-starter-tomcat`：


    ```

    dependencies {

    ...

    providedRuntime ''org.springframework.boot:spring-boot-starter-tomcat''

    ...

    }

    ```


    最后，你需要提供一个 `SpringBootServletInitializer` 的子类，并重写其 `configure()` 方法。你可以简单地让应用程序的入口点类继承
    `SpringBootServletInitializer`，如清单 10-8 所示。


    ```

    @SpringBootApplication

    public class SpringbootWebDemoApplication extends SpringBootServletInitializer
    {

    @Override

    protected SpringApplicationBuilder configure(SpringApplicationBuilder application)
    {

    return application.sources(SpringbootWebDemoApplication.class);

    }

    public static void main(String[] args) throws Exception {

    SpringApplication.run(SpringbootWebDemoApplication.class, args);

    }

    }

    清单 10-8.

    实现 SpringBootServletInitializer

    ```


    现在，运行 Maven/Gradle 构建工具将生成一个 WAR 文件，该文件可以部署到外部服务器上。


    ## Spring Boot 支持的视图模板


    Java Server Pages (JSP) 是传统基于 Java 的 Web 应用程序中最常用的视图模板技术。然而，出现了新的视图模板库，例如 Thymeleaf、Mustache
    等，作为 JSP 的替代方案。


    Spring Boot 为以下视图模板技术提供了自动配置。


    *   Thymeleaf ( [`http://www.thymeleaf.org/`](http://www.thymeleaf.org/) )

    *   Mustache ( [`http://mustache.github.io/`](http://mustache.github.io/) )

    *   Groovy ( [`http://docs.groovy-lang.org/docs/next/html/documentation/template-engines.html#_the_markuptemplateengine`](http://docs.groovy-lang.org/docs/next/html/documentation/template-engines.html#_the_markuptemplateengine)
    )

    *   FreeMarker ( [`http://freemarker.org/docs/`](http://freemarker.org/docs/)
    )


    尽管 Spring MVC 支持 JSP，但在使用嵌入式 Servlet 容器的 Spring Boot 应用程序中使用 JSP 存在一些已知的限制 ( [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-jsp-limitations`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-jsp-limitations)
    )。但 JSP 在 Spring Boot 的 WAR 类型模块中运行良好。

