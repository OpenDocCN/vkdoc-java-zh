  trans: '

    ## 开发者工具


    在开发过程中，你可能需要频繁修改代码，并重启服务器以使这些代码更改生效。Spring Boot 提供了开发者工具（`spring-boot-devtools`
    模块），该模块支持在应用程序类路径内容发生变化时快速重启应用。


    当你在开发阶段引入 `spring-boot-devtools` 模块时，视图模板（Thymeleaf、Velocity 和 Freemarker 等）的缓存将被自动禁用，以便你能立即看到更改效果。你可以在
    `org.springframework.boot.devtools.env.DevToolsPropertyDefaultsPostProcessor`
    中查看已配置的属性列表。


    ```

    org.springframework.boot

    spring-boot-devtools

    true


    ```


    请注意，这里通过使用 `<optional>true</optional>` 将 `spring-boot-devtools` 指定为可选依赖，这样它就不会被打包到
    fat JAR 中。


    Spring Boot 开发者工具会在类路径内容发生任何更改时自动触发应用程序重启。


    注意


    在 Eclipse 或 STS 中，只要你更改类路径资源并保存，devtools 就会重启服务器。在 IntelliJ IDEA 中，你需要运行“构建项目”来触发重启。


    每当你更改类路径中的类或属性文件时，Spring Boot 会自动重启服务器。当静态内容（如 CSS、JS 和 HTML）发生更改时，你通常不需要重启服务器。因此，默认情况下，Spring
    Boot 会将这些静态资源位置排除在文件更改监视列表之外。


    ```

    @ConfigurationProperties(prefix = "spring.devtools")

    public class DevToolsProperties {

    ....

    ....

    public static class Restart {

    private static final String DEFAULT_RESTART_EXCLUDES =

    "META-INF/maven/**,"

    + "META-INF/resources/**,resources/**,"

    + "static/**,public/**,templates/**,"

    + "**/*Test.class,**/*Tests.class,git.properties, META-INF/build-info.properties
    ";

    /**

    * 应排除在触发完全重启之外的模式。

    */

    private String exclude = DEFAULT_RESTART_EXCLUDES;

    ....

    ....

    }

    }

    ```


    你可以通过配置 `spring.devtools.restart.exclude` 属性来覆盖此默认排除列表。


    ```

    spring.devtools.restart.exclude=assets/**,resources/**

    ```


    如果你想将位置添加到重启排除/包含路径中，请使用以下属性。


    ```

    spring.devtools.restart.additional-exclude=assets/**,setup-instructions/**

    spring.devtools.restart.additional-paths=D:/global-overrides/

    ```


    Spring Boot 的重启机制通过在代码更改后自动重启服务器，有助于提高开发人员的工作效率。但有时，你可能需要更改多个类来实现某个功能，如果每次文件更改后服务器都不断重启，那将会很烦人。在这种情况下，你可以使用
    `spring.devtools.restart.trigger-file` 属性来配置一个用于监视更改的文件路径。这样，服务器将仅在 `trigger-file`
    发生更改时重启。


    ```

    spring.devtools.restart.trigger-file=restart.txt

    ```


    注意


    一旦你配置了 `spring.devtools.restart.trigger-file` 并更新了触发文件，服务器将仅在被监视的文件发生修改时重启。否则，服务器不会重启。


    重启机制通过使用两个类加载器来工作——一个（基类加载器）用于加载不会更改的类（例如第三方 jar 中的类），另一个（重启类加载器）用于加载频繁更改的类（例如来自应用程序代码的类）。当应用程序重启时，只有重启类加载器中的类会被重新创建。这将实现更快的重启。


    你可以通过设置 `spring.devtools.restart.enabled = false` 属性来禁用重启。这仍会使用两个类加载器，但重启类加载器不会监视文件更改。如果你想完全关闭重启机制，请将
    `spring.devtools.restart.enabled=false` 属性设置为系统属性，如下所示。


    ```

    java -jar -Dspring.devtools.restart.enabled=false app.jar

    ```


    如果你正在开发多个 Spring Boot 应用程序，并希望将相同的 devtools 设置应用于所有应用程序，你可以通过在 `HOME` 目录中创建一个
    `.spring-bootdevtools.properties` 文件来配置全局设置。


    在 Windows 操作系统上，路径为 `C:\Users\<username>\.spring-boot-devtools.properties`；在 Linux/MacOS
    上，路径为 `/home/<username>/.spring-boot-devtools.properties`。


    你可以在 [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-devtools`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-devtools)
    阅读更多关于 Spring Boot 开发者工具的信息。


    ## 总结


    本章介绍了一些有助于提高开发人员工作效率的 Spring Boot 酷炫特性。下一章将介绍如何使用 Spring Boot 处理关系型数据库。


    # 5. 使用 JdbcTemplate


    数据持久化是软件系统的关键部分。大多数软件应用程序使用关系型数据库作为数据存储，但近年来，像 MongoDB、Redis、Cassandra 这样的 NoSQL
    数据存储也越来越受欢迎。Java 提供了 JDBC API 来与数据库通信，但它是一个低级 API，需要大量样板代码。JavaEE 平台提供了 Java 持久化
    API（JPA）规范，这是一种对象关系映射（ORM）框架。Hibernate 和 EclipseLink 是最流行的 JPA 实现。还有其他流行的持久化框架，如
    MyBatis 和 JOOQ，它们更侧重于 SQL。


    Spring 在 JDBC API 之上提供了一个很好的抽象，使用 `JdbcTemplate`，并通过基于注解的方法提供了出色的事务管理能力。Spring
    Data 是一个伞形项目，为与大多数流行的数据访问技术（如 JPA、MongoDB、Redis、Cassandra、Solr、ElasticSearch 等）的集成提供支持。Spring
    Boot 通过根据各种标准自动配置所需的 Bean，使得使用这些持久化技术变得更加容易。


    本章将介绍如何在不使用 Spring Boot 的情况下使用 `JdbcTemplate`，以及 Spring Boot 如何让你无需大量编码或配置即可轻松使用
    `JdbcTemplate`。你还将学习如何使用 Flyway 执行数据库迁移。

    '
- fmt: "# Using JdbcTemplate Without SpringBoot\n\nFirst, let's take a quick look\
    \ at how you can generally use Spring's `JdbcTemplate` (without Spring Boot) by\
    \ registering the `DataSource`, `TransactionManager`, and `JdbcTemplate` beans.\
    \ You can also register the `DataSourceInitializer` bean to initialize the database.\n\
    \n```\n@Configuration\n@ComponentScan\n@EnableTransactionManagement\n@PropertySource(value\
    \ = { \"classpath:application.properties\" })\npublic class AppConfig {\n@Autowired\n\
    private Environment env;\n@Bean\npublic static PropertySourcesPlaceholderConfigurer\
    \ placeHolderConfigurer()\n{\nreturn new PropertySourcesPlaceholderConfigurer();\n\
    }\n@Value(\"${init-db:false}\")\nprivate String initDatabase;\n@Bean\npublic JdbcTemplate\
    \ jdbcTemplate(DataSource dataSource)\n{\nreturn new JdbcTemplate(dataSource);\n\
    }\n@Bean\npublic PlatformTransactionManager transactionManager(DataSource dataSource)\n\
    {\nreturn new DataSourceTransactionManager(dataSource);\n}\n@Bean\npublic DataSource\
    \ dataSource()\n{\nBasicDataSource dataSource = new BasicDataSource();\ndataSource.setDriverClassName(env.getProperty(\"\
    jdbc.driverClassName\"));\ndataSource.setUrl(env.getProperty(\"jdbc.url\"));\n\
    dataSource.setUsername(env.getProperty(\"jdbc.username\"));\ndataSource.setPassword(env.getProperty(\"\
    jdbc.password\"));\nreturn dataSource;\n}\n@Bean\npublic DataSourceInitializer\
    \ dataSourceInitializer(DataSource dataSource)\n{\nDataSourceInitializer dataSourceInitializer\
    \ = new DataSourceInitializer();\ndataSourceInitializer.setDataSource(dataSource);\n\
    ResourceDatabasePopulator databasePopulator = new ResourceDatabasePopulator();\n\
    databasePopulator.addScript(new ClassPathResource(\"data.sql\"));\ndataSourceInitializer.setDatabasePopulator(databasePopulator);\n\
    dataSourceInitializer.setEnabled(Boolean.parseBoolean(initDatabase));\nreturn\
    \ dataSourceInitializer;\n}\n}\n```\n\nYou should configure the JDBC connection\
    \ parameters in `src/main/resources/application.properties`, as follows.\n\n```\n\
    jdbc.driverClassName=com.mysql.jdbc.Driver\njdbc.url=jdbc:mysql://localhost:3306/test\n\
    jdbc.username=root\njdbc.password=admin\n```\n\nYou can then create a database\
    \ setup script called `data.sql` in `src/main/resources`, as follows:\n\n```\n\
    DROP TABLE IF EXISTS USERS;\nCREATE TABLE users (\nid int(11) NOT NULL AUTO_INCREMENT,\n\
    name varchar(100) NOT NULL,\nemail varchar(100) DEFAULT NULL,\nPRIMARY KEY (id)\n\
    );\ninsert into users(id, name, email) values(1,'John','john@gmail.com');\ninsert\
    \ into users(id, name, email) values(2,'Rod','rod@gmail.com');\ninsert into users(id,\
    \ name, email) values(3,'Mike','mike@gmail.com');\n```\n\nIf you prefer to keep\
    \ the schema generation script and seed data insertion script separate, you can\
    \ put them in separate files and add them as follows:\n\n```\ndatabasePopulator.addScripts(new\
    \ ClassPathResource(\"schema.sql\"),\nnew ClassPathResource(\"seed-data.sql\"\
    ) );\n```\n\nWith this configuration in place, you can inject `JdbcTemplate` into\
    \ the data access components to interact with the databases.\n\n```\npublic class\
    \ User\n{\nprivate Integer id;\nprivate String name;\nprivate String email;\n\
    // setters & getters\n}\n@Repository\npublic class UserRepository\n{\n@Autowired\n\
    private JdbcTemplate jdbcTemplate;\n@Transactional(readOnly=true)\npublic List\
    \ findAll() {\nreturn jdbcTemplate.query(\"select * from users\", new UserRowMapper());\n\
    }\n}\nclass UserRowMapper implements RowMapper\n{\n@Override\npublic User mapRow(ResultSet\
    \ rs, int rowNum) throws SQLException {\nUser user = new User();\nuser.setId(rs.getInt(\"\
    id\"));\nuser.setName(rs.getString(\"name\"));\nuser.setEmail(rs.getString(\"\
    email\"));\nreturn user;\n}\n}\n```\n\nYou might have observed that most of the\
    \ time, you’ll use this similar type of configuration in your applications.\n\n\
    The next section shows you how to use `JdbcTemplate` without having to configure\
    \ all these beans manually, by using Spring Boot.\n\n# Using JdbcTemplate with\
    \ Spring Boot\n\nIf you use Spring Boot’s autoconfiguration feature, you don’t\
    \ have to configure beans manually. To start, create a Spring Boot Maven-based\
    \ project and add the `spring-boot-starter-jdbc` module.\n\n```\norg.springframework.boot\n\
    spring-boot-starter-jdbc\n\n```\n\nBy adding the `spring-boot-starter-jdbc` module,\
    \ you get the following autoconfiguration features:\n\n*   The `spring-boot-starter-jdbc`\
    \ module transitively pulls `tomcat-jdbc-{version}.jar`, which is used to configure\
    \ the `DataSource` bean.\n*   If you have not defined a `DataSource` bean explicitly\
    \ and if you have any embedded database drivers in the classpath, such as H2,\
    \ HSQL, or Derby, then Spring Boot will automatically register the `DataSource`\
    \ bean using the in-memory database settings.\n*   If you haven’t registered any\
    \ of the following beans, then Spring Boot will register them automatically.\n\
    \    *   `PlatformTransactionManager` (`DataSourceTransactionManager`)\n    *\
    \   `JdbcTemplate`\n    *   `NamedParameterJdbcTemplate`\n*   You can have the\
    \ `schema.sql` and `data.sql` files in the root classpath, which Spring Boot will\
    \ automatically use to initialize the database."
