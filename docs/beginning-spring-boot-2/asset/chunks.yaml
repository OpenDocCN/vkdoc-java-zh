    \ conditionally using the `@Conditional` annotation and how Spring Boot leverages\
    \ `@Conditional` and `@EnableAutoConfiguration` annotations to autoconfigure beans\
    \ based on various criteria.\n\nThe next chapter looks at some of the cool features\
    \ of Spring Boot that help increase developer productivity.\n\n# 4. Spring Boot\
    \ Essentials\n\nThe primary goal of Spring Boot is to make it easy to develop\
    \ Spring-based applications. Spring Boot provides several features to implement\
    \ commonly used features, such as logging and externalizing configuration properties\
    \ in a much easier way. This chapter covers configuring logging, externalizing\
    \ configuration properties, and configuring profile specific properties. Then\
    \ it explores how to use the Spring Boot developer tools to automatically restart\
    \ the server on code changes, which will improve developer productivity.\n\n##\
    \ Logging\n\nLogging is a very important part of any application and it helps\
    \ with debugging issues. Spring Boot, by default, includes `spring-boot-starter-logging`\
    \ as a transitive dependency for the `spring-boot-starter` module. By default,\
    \ Spring Boot includes SLF4J along with Logback implementations. Spring Boot has\
    \ a `LoggingSystem` abstraction that automatically configures logging based on\
    \ the logging configuration files available in the classpath.\n\nIf Logback is\
    \ available, Spring Boot will choose it as the logging handler. You can easily\
    \ configure logging levels within the `application.properties` file without having\
    \ to create logging provider specific configuration files such as `logback.xml`\
    \ or `log4j.properties`.\n\n```\nlogging.level.org.springframework.web=INFO\n\
    logging.level.org.hibernate=ERROR\nlogging.level.com.apress=DEBUG\n```\n\nIf you\
    \ want to log the data into a file in addition to the console, specify the filename\
    \ as follows:\n\n```\nlogging.path=/var/logs/app.log\n```\n\nor\n\n```\nlogging.file=myapp.log\n\
    ```\n\nIf you want to have more control over the logging configuration, create\
    \ the logging provider specific configuration files in their default locations,\
    \ which Spring Boot will automatically use.\n\nFor example, if you place the `logback.xml`\
    \ file in the root classpath, Spring Boot will automatically use it to configure\
    \ the logging system. See Listing [4-1](#A447991_1_En_4_Chapter.html#Par11).\n\
    \n```\n\n%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n\n\napp.log\n\
    \n%date %level [%thread] %logger{10} [%file:%line] %msg%n \n\nListing 4-1.\nThe\
    \ logback.xml File\n```\n\nIf you want to use other logging libraries, such as\
    \ Log4J or Log4j2, instead of Logback, you can exclude `spring-boot-starter-logging`\
    \ and include the respective logging starter, as follows:\n\n```\norg.springframework.boot\n\
    spring-boot-starter\n\norg.springframework.boot\nspring-boot-starter-logging\n\
    \norg.springframework.boot\nspring-boot-starter-log4j\n\n```\n\nNow you can add\
    \ the `log4j.properties` file to the root classpath, which Spring Boot will automatically\
    \ use for logging."
  trans: "\n## Spring Boot 自动配置的工作原理\n\nSpring Boot 自动配置的关键在于其 `@EnableAutoConfiguration`\
    \ 注解。通常，你会使用 `@SpringBootApplication` 来注解应用程序入口类，或者，如果你想自定义默认配置，可以使用以下注解：\n\n\
    ```\n@Configuration\n@EnableAutoConfiguration\n@ComponentScan\npublic class Application\n\
    {\n}\n```\n\n`@EnableAutoConfiguration` 注解通过扫描类路径组件并注册符合各种条件的 Bean，从而启用 Spring\
    \ `ApplicationContext` 的自动配置。Spring Boot 在 `spring-boot-autoconfigure-{version}.jar`\
    \ 中提供了各种自动配置类，它们负责注册各种组件。\n\n自动配置类通常使用 `@Configuration` 注解标记为 Spring 配置类，并使用 `@EnableConfigurationProperties`\
    \ 注解来绑定自定义属性以及一个或多个条件化的 Bean 注册方法。\n\n例如，考虑 `org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration`\
    \ 类。\n\n```\n@Configuration\n@ConditionalOnClass({ DataSource.class, EmbeddedDatabaseType.class\
    \ })\n@EnableConfigurationProperties(DataSourceProperties.class)\n@Import({ Registrar.class,\
    \ DataSourcePoolMetadataProvidersConfiguration.class })\npublic class DataSourceAutoConfiguration\
    \ {\n...\n...\n@Bean\n@ConditionalOnMissingBean\npublic DataSourceInitializer\
    \ dataSourceInitializer(DataSourceProperties properties,\nApplicationContext applicationContext)\
    \ {\nreturn new DataSourceInitializer(properties, applicationContext);\n}\n...\n\
    ...\n@Conditional(EmbeddedDatabaseCondition.class)\n@ConditionalOnMissingBean({\
    \ DataSource.class, XADataSource.class })\n@Import(EmbeddedDataSourceConfiguration.class)\n\
    protected static class EmbeddedDatabaseConfiguration {\n}\n@Configuration\n@Conditional(PooledDataSourceCondition.class)\n\
    @ConditionalOnMissingBean({ DataSource.class, XADataSource.class })\n@Import({\
    \ DataSourceConfiguration.Tomcat.class, DataSourceConfiguration.Hikari.class,\n\
    DataSourceConfiguration.Dbcp2.class, DataSourceConfiguration.Generic.class })\n\
    protected static class PooledDataSourceConfiguration {\n}\n...\n...\n@Configuration\n\
    @ConditionalOnProperty(prefix = \"spring.datasource\", name = \"jmx-enabled\"\
    )\n@ConditionalOnClass(name = \"org.apache.tomcat.jdbc.pool.DataSourceProxy\"\
    )\n@Conditional(DataSourceAutoConfiguration.DataSourceAvailableCondition.class)\n\
    @ConditionalOnMissingBean(name = \"dataSourceMBean\")\nprotected static class\
    \ TomcatDataSourceJmxConfiguration {\n...\n...\n}\n...\n...\n}\n```\n\n这里，`DataSourceAutoConfiguration`\
    \ 使用了 `@ConditionalOnClass({ DataSource.class, EmbeddedDatabaseType.class })`\
    \ 注解，这意味着只有当 `DataSource.class` 和 `EmbeddedDatabaseType.class` 类在类路径上可用时，才会考虑\
    \ `DataSourceAutoConfiguration` 中定义的 Bean 的自动配置。\n\n该类还使用了 `@EnableConfigurationProperties(DataSourceProperties.class)`\
    \ 注解，这使得 `application.properties` 中的属性能够自动绑定到 `DataSourceProperties` 类的属性上。\n\n\
    ```\n@ConfigurationProperties(prefix = DataSourceProperties.PREFIX)\npublic class\
    \ DataSourceProperties implements BeanClassLoaderAware, EnvironmentAware, InitializingBean\
    \ {\npublic static final String PREFIX = \"spring.datasource\";\n...\n...\nprivate\
    \ String driverClassName;\nprivate String url;\nprivate String username;\nprivate\
    \ String password;\n...\n//setters and getters\n}\n```\n\n通过此配置，所有以 `spring.datasource.*`\
    \ 开头的属性都将自动绑定到 `DataSourceProperties` 对象。\n\n```\nspring.datasource.url=jdbc:mysql://localhost:3306/test\n\
    spring.datasource.username=root\nspring.datasource.password=secret\nspring.datasource.driver-class-name=com.mysql.jdbc.Driver\n\
    ```\n\n你还可以看到一些内部类和 Bean 定义方法使用了 Spring Boot 的条件注解，例如 `@ConditionalOnMissingBean`、`@ConditionalOnClass`\
    \ 和 `@ConditionalOnProperty`。只有当这些条件匹配时，这些 Bean 定义才会被注册到 `ApplicationContext`\
    \ 中。\n\n你还可以在 `spring-boot-autoconfigure-{version}.jar` 中探索许多其他的 `AutoConfiguration`\
    \ 类，例如：\n\n*   `org.springframework.boot.autoconfigure.web.DispatcherServletAutoConfiguration`\n\
    *   `org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration`\n\
    *   `org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration`\n\
    *   `org.springframework.boot.autoconfigure.jackson.JacksonAutoConfiguration`\n\
    \n现在，你应该对 Spring Boot 自动配置的工作原理有了基本的了解，即通过使用各种自动配置类以及 `@Conditional` 特性来实现。\n\n\
    ## 总结\n\n本章解释了如何使用 `@Conditional` 注解有条件地注册 Spring Bean，以及 Spring Boot 如何利用 `@Conditional`\
    \ 和 `@EnableAutoConfiguration` 注解根据各种标准自动配置 Bean。\n\n下一章将介绍 Spring Boot 的一些有助于提高开发人员生产力的酷炫特性。\n\
    \n# 4. Spring Boot 要点\n\nSpring Boot 的主要目标是简化基于 Spring 的应用程序的开发。Spring Boot 提供了多种特性，以便更轻松地实现常用功能，例如日志记录和外部化配置属性。本章涵盖配置日志、外部化配置属性以及配置特定于\
    \ Profile 的属性。然后，它将探讨如何使用 Spring Boot 开发者工具在代码更改时自动重启服务器，从而提高开发人员生产力。\n\n## 日志记录\n\
    \n日志记录是任何应用程序中非常重要的一部分，它有助于调试问题。默认情况下，Spring Boot 将 `spring-boot-starter-logging`\
    \ 作为 `spring-boot-starter` 模块的传递依赖包含在内。默认情况下，Spring Boot 包含 SLF4J 以及 Logback 实现。Spring\
    \ Boot 有一个 `LoggingSystem` 抽象，它会根据类路径中可用的日志配置文件自动配置日志记录。\n\n如果 Logback 可用，Spring\
    \ Boot 将选择它作为日志处理器。你可以在 `application.properties` 文件中轻松配置日志级别，而无需创建特定于日志提供程序的配置文件，例如\
    \ `logback.xml` 或 `log4j.properties`。\n\n```\nlogging.level.org.springframework.web=INFO\n\
    logging.level.org.hibernate=ERROR\nlogging.level.com.apress=DEBUG\n```\n\n如果你想将日志数据记录到文件以及控制台，请按如下方式指定文件名：\n\
    \n```\nlogging.path=/var/logs/app.log\n```\n\n或\n\n```\nlogging.file=myapp.log\n\
    ```\n\n如果你想对日志配置有更多控制，可以在其默认位置创建特定于日志提供程序的配置文件，Spring Boot 将自动使用它们。\n\n例如，如果你将\
    \ `logback.xml` 文件放在根类路径中，Spring Boot 将自动使用它来配置日志系统。参见清单 4-1。\n\n```\n\n%d{HH:mm:ss.SSS}\
    \ [%thread] %-5level %logger{36} - %msg%n\n\napp.log\n\n%date %level [%thread]\
    \ %logger{10} [%file:%line] %msg%n \n\n清单 4-1.\nlogback.xml 文件\n```\n\n如果你想使用其他日志库（例如\
    \ Log4J 或 Log4j2）而不是 Logback，你可以排除 `spring-boot-starter-logging` 并包含相应的日志启动器，如下所示：\n\
    \n```\norg.springframework.boot\nspring-boot-starter\n\norg.springframework.boot\n\
    spring-boot-starter-logging\n\norg.springframework.boot\nspring-boot-starter-log4j\n\
    \n```\n\n现在，你可以将 `log4j.properties` 文件添加到根类路径，Spring Boot 将自动使用它进行日志记录。\n"
- fmt: '# Externalizing Configuration Properties


    Typically you will want to externalize configuration parameters into separate
    properties or XML files instead of burying them inside code so that you can easily
    change them based on the environment of the application. Spring provides the `@PropertySource`
    annotation to specify the list of configuration files.


    Spring Boot takes it one step further by automatically registering a `PropertyPlaceHolderConfigurer`
    bean using the `application.properties` file in the root classpath by default.
    You can also create profile specific configuration files using the filename as
    `application-{profile}.properties`.


    For example, you can have `application.properties`, which contains the default
    properties values, `application-dev.properties`, which contains the `dev` profile
    configuration, and `application-prod.properties`, which contains the `production`
    profile configuration values. If you want to configure properties that are common
    for all the profiles, you can configure them in `application-default.properties`.


    **Note:** You can also use YAML (`.yml`) files as an alternative to `.properties`.
    See the "Using YAML Instead of Properties" section of the Spring Boot reference
    documentation at: [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config-yaml`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config-yaml).


    ## Type-Safe Configuration Properties


    Spring provides the `@Value` annotation to bind any property value to a bean property.
    Suppose you had the following `application.properties` file:


    ```

    jdbc.driver=com.mysql.jdbc.Driver

    jdbc.url=jdbc:mysql://localhost:3306/test

    jdbc.username=root

    jdbc.password=secret

    ```


    You can bind these property values into bean properties using `@Value` as follows:


    ```

    @Configuration

    public class AppConfig

    {

    @Value("${jdbc.driver}")

    private String driver;

    @Value("${jdbc.url}")

    private String url;

    @Value("${jdbc.username}")

    private String username;

    @Value("${jdbc.password}")

    private String password;

    ...

    ...

    }

    ```


    But binding each property using `@Value` is a tedious process. So, Spring Boot
    introduced a mechanism to bind a set of properties to a bean''s properties automatically
    in a type-safe manner.


    Suppose you have the previous JDBC parameters and a `DataSourceConfig` class as
    follows:


    ```

    public class DataSourceConfig

    {

    private String driver;

    private String url;

    private String username;

    private String password;

    //setters and getters

    }

    ```


    Now you can simply annotate `DataSourceConfig` with `@ConfigurationProperties(prefix="jdbc")`
    to automatically bind the properties that start with `jdbc.*`.


    ```

    @Component

    @ConfigurationProperties(prefix="jdbc")

    public class DataSourceConfig

    {

    ...

    ...

    }

    ```


    Now you can inject the `DataSourceConfig` bean into other Spring beans and access
    the properties using getters.


    ### Relaxed Binding


    The bean property names need not be exactly the same as the property key names.
    Spring Boot supports relaxed binding, where the bean property `driverClassName`
    will be mapped from any of these: `driverClassName`, `driver-class-name`, or `DRIVER_CLASS_NAME`.


    ### Validating Properties with the Bean Validation API


    You can use Bean Validation API annotations such as `@NotNull`, `@Min`, `@Max`,
    etc., to validate the property''s values.


    ```

    @Component

    @ConfigurationProperties(prefix="support")

    public class Support

    {

    @NotNull

    private String applicationName;

    @NotNull

    @Email

    private String email;

    @Min(1) @Max(5)

    private Integer severity;

    //setters and getters

    }

    ```


    If you configured any property values that are invalid as per the configured validation
    annotations, an exception will be thrown at the application startup time. For
    more details on externalizing properties, see "Externalized Configuration" at:
    [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config).'
