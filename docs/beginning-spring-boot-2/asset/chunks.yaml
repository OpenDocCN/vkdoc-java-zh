    ### Maven 还是 Gradle？


    在 Java 世界中，Maven 和 Gradle 是两种最流行的构建工具。Maven 于 2004 年发布，被许多开发者广泛使用。Gradle 于 2012
    年发布，它更强大且易于定制。


    由于 Maven 仍然是最常用的构建工具，本书将全程使用它。不过，你可以在本书每个模块的示例代码中找到 Gradle 构建脚本。因此，你可以选择使用 Maven
    或 Gradle。选择权在你手中！


    ## 本章小结


    本章快速介绍了 Spring Boot 的特性，并讨论了创建 Spring Boot 应用程序的不同方法。既然你已经知道如何创建并运行一个简单的 Spring
    Boot 应用程序，你可能想了解 Spring Boot 的自动配置是如何工作的。但在此之前，你应该了解 Spring 的 `@Conditional` 特性，Spring
    Boot 的自动配置正是依赖于它。


    下一章将探讨 `@Conditional` 注解特性的强大之处，并详细研究 Spring Boot 自动配置的工作原理。


    # 3. Spring Boot 自动配置


    Spring Boot 的自动配置机制严重依赖于 `@Conditional` 特性。本章将探讨如何通过使用 `@Conditional` 注解有条件地注册
    Spring Bean，并创建满足特定条件的各种类型的 `Conditional` 实现。然后，你将深入了解 Spring Boot 如何利用 `@Conditional`
    特性，根据特定条件自动配置 Bean。


    ## 探索 @Conditional 的强大功能


    在开发基于 Spring 的应用程序时，你可能会遇到需要有条件地注册 Bean 的情况。例如，你可能希望在本地运行应用程序时注册一个指向 `DEV` 数据库的
    `DataSource` Bean，而在生产环境中运行时指向一个不同的 `PRODUCTION` 数据库。


    你可以将数据库连接参数外部化到属性文件中，并使用适合当前环境的文件。但是，每当需要指向不同的环境时，你都必须更改配置并重新部署应用程序。


    为了解决这个问题，Spring 3.1 引入了 profile 的概念。你可以注册多个相同类型的 Bean，并将它们与一个或多个 profile 关联起来。当运行应用程序时，你可以激活所需的
    profile。这样，只有与已激活 profile 关联的 Bean 才会被注册。


    ```

    @Configuration

    public class AppConfig

    {

    @Bean

    @Profile("DEV")

    public DataSource devDataSource() {

    ...

    }

    @Bean

    @Profile("PROD")

    public DataSource prodDataSource() {

    ...

    }

    }

    ```


    通过这种配置，你可以使用 `-Dspring.profiles.active=DEV` 系统属性来指定激活的 profile。这种方法适用于简单的情况，例如根据激活的
    profile 来启用或禁用 Bean 注册。但是，如果你想基于某些条件逻辑来注册 Bean，仅靠 profile 方法是不够的。


    为了提供更大的灵活性来有条件地注册 Spring Bean，Spring 4 引入了 `@Conditional` 的概念。使用 `@Conditional`
    方法，你可以基于任意条件来有条件地注册 Bean。


    例如，你可能希望在以下情况下注册一个 Bean：


    *   类路径中存在特定的类

    *   `ApplicationContext` 中尚未注册某种类型的 Spring Bean

    *   某个位置存在特定的文件

    *   配置文件中配置了特定的属性值

    *   存在/不存在特定的系统属性


    这些只是几个例子，你可以设置任何你需要的条件。下一节将介绍 Spring 的 `@Conditional` 是如何工作的。


    ### 基于系统属性使用 @Conditional


    假设你有一个 `UserDAO` 接口，其中包含从数据存储中获取数据的方法。你有两个 `UserDAO` 接口的实现——`JdbcUserDAO` 与 MySQL
    数据库交互，`MongoUserDAO` 与 MongoDB 交互。你可能希望根据特定的系统属性（例如 `dbType`）仅启用 `JdbcUserDAO`
    或 `MongoUserDAO`。


    如果应用程序使用 `java -jar myapp.jar -DdbType=MySQL` 启动，那么你希望启用 `JdbcUserDAO`；否则，如果应用程序使用
    `java -jar myapp.jar -DdbType=MONGO` 启动，你希望启用 `MongoUserDAO`。


    假设你有 `UserDAO` 接口以及 `JdbcUserDAO` 和 `MongoUserDAO` 的实现，如清单 3-1 所示。


    ```

    public interface UserDAO

    {

    List getAllUserNames();

    }

    public class JdbcUserDAO implements UserDAO

    {

    @Override

    public List getAllUserNames()

    {

    System.out.println("**** Getting usernames from RDBMS *****");

    return Arrays.asList("Jim","John","Rob");

    }

    }

    public class MongoUserDAO implements UserDAO

    {

    @Override

    public List getAllUserNames()

    {

    System.out.println("**** Getting usernames from MongoDB *****");

    return Arrays.asList("Bond","James","Bond");

    }

    }

    清单 3-1.

    UserDAO 接口以及 JdbcUserDAO 和 MongoUserDAO 实现

    ```


    你可以实现 `MySQLDatabaseTypeCondition` 条件来检查 `dbType` 系统属性是否为 `MYSQL`，如清单 3-2 所示。


    ```

    public class MySQLDatabaseTypeCondition implements Condition

    {

    @Override

    public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
    metadata)

    {

    String enabledDBType = System.getProperty("dbType");

    return (enabledDBType != null &&

    enabledDBType.equalsIgnoreCase("MYSQL"));

    }

    }

    清单 3-2.

    MySQLDatabaseTypeCondition.java

    ```


    你可以实现 `MongoDBDatabaseTypeCondition` 条件来检查 `dbType` 系统属性是否为 `MONGODB`，如清单 3-3
    所示。


    ```

    public class MongoDBDatabaseTypeCondition implements Condition

    {

    @Override

    public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
    metadata)

    {

    String enabledDBType = System.getProperty("dbType");

    return (enabledDBType != null && enabledDBType.equalsIgnoreCase("MONGODB"));

    }

    }

    清单 3-3.

    MongoDBDatabaseTypeCondition.java

    ```


    现在，你可以使用 `@Conditional` 有条件地配置 `JdbcUserDAO` 和 `MongoUserDAO` Bean，如清单 3-4 所示。


    ```

    @Configuration

    public class AppConfig

    {

    @Bean

    @Conditional(MySQLDatabaseTypeCondition.class)

    public UserDAO jdbcUserDAO(){

    return new JdbcUserDAO();

    }

    @Bean

    @Conditional(MongoDBDatabaseTypeCondition.class)

    public UserDAO mongoUserDAO(){

    return new MongoUserDAO();

    }

    }

    清单 3-4.

    AppConfig.java

    ```


    如果你运行应用程序，例如 `java -jar myapp.jar -DdbType=MYSQL`，则只会注册 `JdbcUserDAO` Bean。但是，如果你将系统属性设置为
    `-DdbType=MONGODB`，则会注册 `MongoUserDAO` Bean。这就是如何基于系统属性有条件地注册 Bean 的方法。

