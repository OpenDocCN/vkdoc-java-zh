  trans: '

    ## 外部化配置属性


    通常，您会希望将配置参数外部化到单独的 properties 或 XML 文件中，而不是将它们硬编码在代码里，这样您就可以根据应用程序的环境轻松更改它们。Spring
    提供了 `@PropertySource` 注解来指定配置文件列表。


    Spring Boot 更进一步，默认会在根类路径下使用 `application.properties` 文件自动注册一个 `PropertyPlaceHolderConfigurer`
    bean。您还可以使用 `application-{profile}.properties` 这样的文件名来创建特定于环境的配置文件。


    例如，您可以有一个包含默认属性值的 `application.properties`，一个包含 `dev` 环境配置的 `application-dev.properties`，以及一个包含
    `production` 环境配置值的 `application-prod.properties`。如果您想配置所有环境通用的属性，可以在 `application-default.properties`
    中进行配置。


    注意


    您也可以使用 YAML (`.yml`) 文件作为 `.properties` 的替代方案。请参阅 Spring Boot 参考文档中的“使用 YAML 替代
    Properties”部分，网址为：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config-yaml`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config-yaml)
    。


    ### 类型安全的配置属性


    Spring 提供了 `@Value` 注解来将任何属性值绑定到 bean 的属性上。假设您有以下 `application.properties` 文件：


    ```

    jdbc.driver=com.mysql.jdbc.Driver

    jdbc.url=jdbc:mysql://localhost:3306/test

    jdbc.username=root

    jdbc.password=secret

    ```


    您可以使用 `@Value` 将这些属性值绑定到 bean 的属性上，如下所示：


    ```

    @Configuration

    public class AppConfig

    {

    @Value("${jdbc.driver}")

    private String driver;

    @Value("${jdbc.url}")

    private String url;

    @Value("${jdbc.username}")

    private String username;

    @Value("${jdbc.password}")

    private String password;

    ...

    ...

    }

    ```


    但是，使用 `@Value` 逐个绑定每个属性是一个繁琐的过程。因此，Spring Boot 引入了一种机制，可以以类型安全的方式自动将一组属性绑定到 bean
    的属性上。


    假设您有之前的 JDBC 参数和一个如下的 `DataSourceConfig` 类：


    ```

    public class DataSourceConfig

    {

    private String driver;

    private String url;

    private String username;

    private String password;

    //setters and getters

    }

    ```


    现在，您只需用 `@ConfigurationProperties(prefix=`"`jdbc`"`)` 注解 `DataSourceConfig`，即可自动绑定以
    `jdbc.*` 开头的属性。


    ```

    @Component

    @ConfigurationProperties(prefix="jdbc")

    public class DataSourceConfig

    {

    ...

    ...

    }

    ```


    现在，您可以将 `DataSourceConfig` bean 注入到其他 Spring bean 中，并通过 getter 方法访问这些属性。


    ### 宽松绑定


    Bean 的属性名称不必与属性键名完全一致。Spring Boot 支持宽松绑定，其中 bean 属性 `driverClassName` 将映射自以下任意一个：`driverClassName`、`driver-class-name`
    或 `DRIVER_CLASS_NAME`。


    ### 使用 Bean Validation API 验证属性


    您可以使用 Bean Validation API 注解（例如 `@NotNull`、`@Min`、`@Max` 等）来验证属性的值。


    ```

    @Component

    @ConfigurationProperties(prefix="support")

    public class Support

    {

    @NotNull

    private String applicationName;

    @NotNull

    @Email

    private String email;

    @Min(1) @Max(5)

    private Integer severity;

    //setters and getters

    }

    ```


    如果您配置的任何属性值根据配置的验证注解被判定为无效，则在应用程序启动时会抛出异常。有关外部化属性的更多详细信息，请参阅“外部化配置”，网址为：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config)
    。

    '
- fmt: '# Developer Tools


    During development, you may need to change the code often and restart the server
    for those code changes to take effect. Spring Boot provides developer tools (the
    `spring-boot-devtools` module) that include support for quick application restarts
    whenever the application classpath content changes.


    When you include the `spring-boot-devtools` module during development, the caching
    of the view templates (Thymeleaf, Velocity, and Freemarkeretc) will be disabled
    automatically so that you can see the changes immediately. You can see the list
    of configured properties at `org.springframework.boot.devtools.env.DevToolsPropertyDefaultsPostProcessor`.


    ```

    org.springframework.boot

    spring-boot-devtools

    true

    ```


    Note that this specifies `spring-boot-devtools` as optional by using `<optional>true</optional>`
    so that it won’t be packaged in a fat JAR.


    The Spring Boot developer tools trigger application restarts automatically whenever
    there is a change to the classpath content.


    **Note**


    In Eclipse or STS, as soon as you change the classpath resources and save them,
    devtools will restart the server. In Intellij IDEA, you need to run Make Project
    to trigger a restart.


    Whenever you change the class or properties files in the classpath, Spring Boot
    will automatically restart the server. You won’t typically need to restart the
    server when static content, such as CSS, JS, and HTMLs, changes. So by default
    Spring Boot excludes these static resource locations from the file change watch
    list.


    ```

    @ConfigurationProperties(prefix = "spring.devtools")

    public class DevToolsProperties {

    ....

    ....

    public static class Restart {

    private static final String DEFAULT_RESTART_EXCLUDES =

    "META-INF/maven/**,"

    + "META-INF/resources/**,resources/**,"

    + "static/**,public/**,templates/**,"

    + "**/*Test.class,**/*Tests.class,git.properties, META-INF/build-info.properties
    ";

    /**

    * Patterns that should be excluded from triggering a full restart.

    */

    private String exclude = DEFAULT_RESTART_EXCLUDES;

    ....

    ....

    }

    }

    ```


    You can override this default exclusion list by configuring the `spring.devtools.restart.exclude`
    property.


    ```

    spring.devtools.restart.exclude=assets/**,resources/**

    ```


    If you want to add locations to the restart exclude/include paths, use the following
    properties.


    ```

    spring.devtools.restart.additional-exclude=assets/**,setup-instructions/**

    spring.devtools.restart.additional-paths=D:/global-overrides/

    ```


    Spring Boot’s restart mechanism helps increase developer productivity by automatically
    restarting the server after code changes. But at times, you may need to change
    multiple classes to implement some feature and it would be annoying if the server
    kept restarting after every file change. In this case, you can use the `spring.devtools.restart.trigger-file`
    property to configure a file path to watch for changes. That way, the server will
    restart only when the `trigger-file` has changed.


    ```

    spring.devtools.restart.trigger-file=restart.txt

    ```


    **Note**


    Once you configure `spring.devtools.restart.trigger-file` and update the trigger
    file, the server will restart only if there are modifications to the files being
    watched. Otherwise, the server won’t be restarted.


    The restart mechanism works by using two classloaders—one (the base classloader)
    to load classes that don’t change (such as classes in third-party jars) and the
    other (the restart classloader) to load classes that frequently change (such as
    classes from your application code). When the application restarts, only the classes
    in the restart classloader will be recreated. This will yield faster restarts.


    You can disable restarting by setting the `spring.devtools.restart.enabled = false`
    property. This will still use two classloaders but the restart classloader won’t
    watch for file changes. If you want to completely turn off the restart mechanism,
    set the `spring.devtools.restart.enabled=false` property as the system property,
    as follows.


    ```

    java -jar -Dspring.devtools.restart.enabled=false app.jar

    ```


    If you are developing a bunch of Spring Boot applications and want to apply the
    same devtools settings to all of them, you can configure global settings by creating
    a `.spring-bootdevtools.properties` file in the `HOME` directory.


    On Windows OS, it is `C:\Users\<username>\.spring-boot-devtools.properties` and
    on Linux/MacOS, it is `/home/<username>/.spring-boot-devtools.properties`.


    You can read more about the Spring Boot developer tools at [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-devtools`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-devtools).


    ## Summary


    This chapter looked at some of the cool features of Spring Boot that help developers
    increase productivity. The next chapter covers how to work with relational databases
    using Spring Boot.


    # 5. Working with JdbcTemplate


    Data persistence is a crucial part of software systems. Most software applications
    use relational databases as datastores but recently NoSQL data stores like MongoDB,
    Redis, Cassandra are getting popular too. Java provides JDBC API to talk to the
    database, but it is a low-level API that requires lots of boilerplate coding.
    The JavaEE platform provides the Java Persistence API (JPA) specification, which
    is an Object Relational Mapping (ORM) framework. Hibernate and EclipseLink are
    the most popular JPA implementations. There are other popular persistence frameworks,
    such as MyBatis and JOOQ, that are more SQL focused.


    Spring provides a nice abstraction on top of the JDBC API, using `JdbcTemplate`,
    and provides great transaction management capabilities using an annotation-based
    approach. Spring Data is an umbrella project that provides support for integration
    with most of the popular data access technologies, such as JPA, MongoDB, Redis,
    Cassandra, Solr, ElasticSearch, etc. Spring Boot makes it easier to work with
    these persistence technologies by automatically configuring required beans based
    on various criteria.


    This chapter takes a look at how you can use `JdbcTemplate` without Spring Boot
    and how Spring Boot makes it easy to use `JdbcTemplate` without much coding or
    configuration. You will also learn about the performing database migration using
    Flyway.'
  raw: '## Developer Tools


    During development, you may need to change the code often and restart the server
    for those code changes to take effect. Spring Boot provides developer tools (the
    `spring-boot-devtools` module) that include support for quick application restarts
    whenever the application classpath content changes.


    When you include the `spring-boot-devtools` module during development, the caching
    of the view templates (Thymeleaf, Velocity, and Freemarkeretc) will be disabled
    automatically so that you can see the changes immediately. You can see the list
    of configured properties at `org.springframework.boot.devtools.env.DevToolsPropertyDefaultsPostProcessor`.


    ```

    org.springframework.boot

    spring-boot-devtools

    true


    ```


    Note that this specifies `spring-boot-devtools` as optional by using `<optional>true</optional>`
    so that it won’t be packaged in a fat JAR.


    The Spring Boot developer tools trigger application restarts automatically whenever
    there is a change to the classpath content.


    Note


    In Eclipse or STS, as soon as you change the classpath resources and save them,
    devtools will restart the server. In Intellij IDEA, you need to run Make Project
    to trigger a restart.


    Whenever you change the class or properties files in the classpath, Spring Boot
    will automatically restart the server. You won’t typically need to restart the
    server when static content, such as CSS, JS, and HTMLs, changes. So by default
    Spring Boot excludes these static resource locations from the file change watch
    list.


    ```

    @ConfigurationProperties(prefix = "spring.devtools")

    public class DevToolsProperties {

    ....

    ....

    public static class Restart {

    private static final String DEFAULT_RESTART_EXCLUDES =

    "META-INF/maven/**,"

    + "META-INF/resources/**,resources/**,"

    + "static/**,public/**,templates/**,"

    + "**/*Test.class,**/*Tests.class,git.properties, META-INF/build-info.properties
    ";

    /**

    * Patterns that should be excluded from triggering a full restart.

    */

    private String exclude = DEFAULT_RESTART_EXCLUDES;

    ....

    ....

    }

    }

    ```


