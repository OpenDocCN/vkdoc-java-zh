    If you have any in-memory database drivers like H2 or HSQL in the classpath, then
    Spring Boot will automatically create an in-memory datasource and will register
    the `EntityManagerFactory` and `TransactionManager` beans automatically with sensible
    defaults.


    But you are using MySQL, so you need to explicitly provide MySQL connection details.
    You have configured those MySQL connection details in the `application.properties`
    file and Spring Boot creates a `DataSource` using those properties.


    ### Embedded Servlet Container Support


    The most important and surprising thing is that we created a simple Java class
    annotated with some magical annotation (`@SpringApplication`), which has a `main()`
    method. By running that `main()` method, we are able to run the application and
    access it at `http://localhost:8080/`. Where does the servlet container come from?


    We added `spring-boot-starter-web`, which pulls `spring-boot-starter-tomcat` automatically.
    When we run the `main()` method, it starts tomcat as an embedded container so
    that we don’t have to deploy our application on any externally installed tomcat
    server. What if we want to use a Jetty server instead of Tomcat? You simply exclude
    `spring-boot-starter-tomcat` from `spring-boot-starter-web` and include `spring-boot-starter-jetty`.
    That’s it.


    But this looks magical! I can imagine what you are thinking . You are thinking
    like Spring Boot looks cool and it is doing a lot of things automatically for
    you. You still do not fully understand how it is all working behind the scenes.
    Right?


    I can understand. Watching a magic show is fun, but mystery is not so fun with
    software development. Don’t worry, we will be looking at each of these things
    and explaining in detail what’s happening behind the scenes. I don’t want to overwhelm
    you by dumping everything on you in this first chapter.


    ## Summary


    This chapter was a quick overview of various Spring configuration styles. The
    goal was to show you the complexity of configuring Spring applications. Also,
    you had a quick look at Spring Boot by creating a simple web application.


    The next chapter takes a more detailed look at Spring Boot and shows how you can
    create Spring Boot applications in different ways.


    # 2. Getting Started with Spring Boot


    This chapter takes a more detailed look at Spring Boot and its features. Then
    the chapter looks at various options of creating a Spring Boot application, such
    as the Spring Initializr, Spring Tool Suite, Intellij IDEA, etc. Finally, the
    chapter explores the generated code and looks at how to run an application.


    ## What Is Spring Boot?


    Spring Boot is an opinionated framework that helps developers build Spring-based
    applications quickly and easily. The main goal of Spring Boot is to quickly create
    Spring-based applications without requiring developers to write the same boilerplate
    configuration again and again. The key Spring Boot features include:


    *   Spring Boot starters

    *   Spring Boot autoconfiguration

    *   Elegant configuration management

    *   Spring Boot actuator

    *   Easy-to-use embedded servlet container support


    ### Spring Boot Starters


    Spring Boot offers many starter modules to get started quickly with many of the
    commonly used technologies, like SpringMVC, JPA, MongoDB, Spring Batch, SpringSecurity,
    Solr, ElasticSearch, etc. These starters are pre-configured with the most commonly
    used library dependencies so you don’t have to search for the compatible library
    versions and configure them manually.


    For example, the `spring-boot-starter-data-jpa` starter module includes all the
    dependencies required to use Spring Data JPA, along with Hibernate library dependencies,
    as Hibernate is the most commonly used JPA implementation.


    Note


    You can find a list of all the Spring Boot starters that come out-of-the-box in
    the official documentation at: [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-starter-poms`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-starter-poms)
    .


    ### Spring Boot Autoconfiguration


    Spring Boot addresses the problem that Spring applications need complex configuration
    by eliminating the need to manually set up the boilerplate configuration.


    Spring Boot takes an opinionated view of the application and configures various
    components automatically, by registering beans based on various criteria. The
    criteria can be:


    *   Availability of a particular class in a classpath

    *   Presence or absence of a Spring bean

    *   Presence of a system property

    *   Absence of a configuration file


    For example, if you have the `spring-webmvc` dependency in your classpath, Spring
    Boot assumes you are trying to build a SpringMVC-based web application and automatically
    tries to register `DispatcherServlet` if it is not already registered.


    If you have any embedded database drivers in the classpath, such as H2 or HSQL,
    and if you haven’t configured a `DataSource` bean explicitly, then Spring Boot
    will automatically register a `DataSource` bean using in-memory database settings.
    You will learn more about the autoconfiguration in Chapter [3](#A447991_1_En_3_Chapter.html).


    ### Elegant Configuration Management


    Spring supports externalizing configurable properties using the `@PropertySource`
    configuration. Spring Boot takes it even further by using the sensible defaults
    and powerful type-safe property binding to bean properties. Spring Boot supports
    having separate configuration files for different profiles without requiring much
    configuration.


    ### Spring Boot Actuator


    Being able to get the various details of an application running in production
    is crucial to many applications. The Spring Boot actuator provides a wide variety
    of such production-ready features without requiring developers to write much code.
    Some of the Spring actuator features are:


    *   Can view the application bean configuration details

    *   Can view the application URL mappings, environment details, and configuration
    parameter values

    *   Can view the registered health check metrics


    ### Easy-to-Use Embedded Servlet Container Support


    Traditionally, while building web applications, you need to create WAR type modules
    and then deploy them on external servers like Tomcat, WildFly, etc. But by using
    Spring Boot, you can create a JAR type module and embed the servlet container
    in the application very easily so that the application will be a self-contained
    deployment unit. Also, during development, you can easily run the Spring Boot
    JAR type module as a Java application from the IDE or from the command-line using
    a build tool like Maven or Gradle.


    You will learn more about these features and how to use them effectively in the
    following chapters.'
  trans: '

    ### 轻松管理依赖


    首先要注意的是以 `spring-boot-starter-*` 命名的依赖项的使用。还记得我说过，“大多数情况下，你使用的都是相同的配置”。因此，当你添加
    `springboot-starter-web` 依赖时，它会默认拉取开发 Spring MVC 应用程序时常用的所有库，例如 `spring-webmvc`、`jackson-json`、`validation-api`
    和 `tomcat`。


    我们添加了 `spring-boot-starter-data-jpa` 依赖。这会拉取所有 `spring-data-jpa` 依赖并添加 Hibernate
    库，因为大多数应用程序都使用 Hibernate 作为 JPA 实现。


    ### 自动配置


    `spring-boot-starter-web` 不仅添加了所有这些库，还使用合理的默认值配置了常用的注册 bean，例如 `DispatcherServlet`、`ResourceHandler`、`MessageSource`
    等。


    我们还添加了 `spring-boot-starter-thymeleaf`，它不仅添加了 Thymeleaf 库依赖，还自动配置了 `ThymeleafViewResolver`
    bean。


    我们没有定义任何 `DataSource`、`EntityManagerFactory` 或 `TransactionManager` bean，但它们都被自动创建了。这是如何做到的？


    如果你的类路径中有任何内存数据库驱动程序（如 H2 或 HSQL），那么 Spring Boot 将自动创建一个内存数据源，并使用合理的默认值自动注册 `EntityManagerFactory`
    和 `TransactionManager` bean。


    但是你使用的是 MySQL，因此需要显式提供 MySQL 连接详细信息。你已在 `application.properties` 文件中配置了这些 MySQL
    连接详细信息，Spring Boot 会使用这些属性创建一个 `DataSource`。


    ### 嵌入式 Servlet 容器支持


    最重要且令人惊讶的是，我们创建了一个简单的 Java 类，并用一些神奇的注解（`@SpringApplication`）进行了标注，该类有一个 `main()`
    方法。通过运行该 `main()` 方法，我们能够运行应用程序并通过 `http://localhost:8080/` 访问它。Servlet 容器是从哪里来的？


    我们添加了 `spring-boot-starter-web`，它会自动拉取 `spring-boot-starter-tomcat`。当我们运行 `main()`
    方法时，它会启动 Tomcat 作为嵌入式容器，这样我们就不必将应用程序部署到任何外部安装的 Tomcat 服务器上。如果我们想使用 Jetty 服务器而不是
    Tomcat 呢？你只需从 `spring-boot-starter-web` 中排除 `spring-boot-starter-tomcat`，并包含 `spring-boot-starter-jetty`
    即可。就这么简单。


    但这看起来太神奇了！我能想象你在想什么。你可能会想，Spring Boot 看起来很酷，它自动为你做了很多事情。你仍然不完全理解这一切在幕后是如何运作的，对吧？


    我能理解。看魔术表演很有趣，但在软件开发中，神秘感就没那么有趣了。别担心，我们将逐一审视这些内容，并详细解释幕后发生的事情。我不想在第一章节就把所有东西都抛给你，让你不知所措。


    ## 总结


    本章快速概述了各种 Spring 配置风格。目的是向你展示配置 Spring 应用程序的复杂性。同时，你也通过创建一个简单的 Web 应用程序，快速了解了
    Spring Boot。


    下一章将更详细地介绍 Spring Boot，并展示如何以不同方式创建 Spring Boot 应用程序。


    # 2. Spring Boot 入门


    本章将更详细地介绍 Spring Boot 及其特性。然后，本章将探讨创建 Spring Boot 应用程序的各种选项，例如 Spring Initializr、Spring
    Tool Suite、Intellij IDEA 等。最后，本章将探索生成的代码，并介绍如何运行应用程序。


    ## 什么是 Spring Boot？


    Spring Boot 是一个固执己见的框架，可帮助开发者快速、轻松地构建基于 Spring 的应用程序。Spring Boot 的主要目标是快速创建基于
    Spring 的应用程序，而无需开发者一遍又一遍地编写相同的样板配置。Spring Boot 的关键特性包括：


    *   Spring Boot 启动器

    *   Spring Boot 自动配置

    *   优雅的配置管理

    *   Spring Boot Actuator

    *   易于使用的嵌入式 Servlet 容器支持


    ### Spring Boot 启动器


    Spring Boot 提供了许多启动器模块，可以快速上手许多常用技术，例如 SpringMVC、JPA、MongoDB、Spring Batch、SpringSecurity、Solr、ElasticSearch
    等。这些启动器预先配置了最常用的库依赖，因此你无需搜索兼容的库版本并手动配置它们。


    例如，`spring-boot-starter-data-jpa` 启动器模块包含了使用 Spring Data JPA 所需的所有依赖，以及 Hibernate
    库依赖，因为 Hibernate 是最常用的 JPA 实现。


    注意


    你可以在官方文档中找到所有开箱即用的 Spring Boot 启动器列表：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-starter-poms`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-starter-poms)。


    ### Spring Boot 自动配置


    Spring Boot 解决了 Spring 应用程序需要复杂配置的问题，它消除了手动设置样板配置的需要。


    Spring Boot 对应用程序采取固执己见的看法，并根据各种标准自动注册 bean，从而自动配置各种组件。这些标准可以是：


    *   类路径中存在特定类

    *   Spring bean 的存在或不存在

    *   系统属性的存在

    *   配置文件的不存在


    例如，如果你的类路径中有 `spring-webmvc` 依赖，Spring Boot 会假定你正在尝试构建一个基于 SpringMVC 的 Web 应用程序，并自动尝试注册
    `DispatcherServlet`（如果尚未注册）。


    如果你的类路径中有任何嵌入式数据库驱动程序（例如 H2 或 HSQL），并且你尚未显式配置 `DataSource` bean，那么 Spring Boot
    将使用内存数据库设置自动注册一个 `DataSource` bean。你将在第 3 章中了解更多关于自动配置的信息。


    ### 优雅的配置管理


    Spring 支持使用 `@PropertySource` 配置来外部化可配置属性。Spring Boot 通过使用合理的默认值和强大的类型安全属性绑定到
    bean 属性，将其更进一步。Spring Boot 支持为不同的配置文件（profile）使用单独的配置文件，而无需大量配置。


    ### Spring Boot Actuator


    能够获取生产环境中运行的应用程序的各种详细信息，对许多应用程序来说至关重要。Spring Boot Actuator 提供了多种此类生产就绪特性，而无需开发者编写大量代码。Spring
    Actuator 的一些特性包括：


    *   可以查看应用程序 bean 配置详细信息

    *   可以查看应用程序 URL 映射、环境详细信息和配置参数值

    *   可以查看已注册的健康检查指标


    ### 易于使用的嵌入式 Servlet 容器支持


    传统上，在构建 Web 应用程序时，你需要创建 WAR 类型的模块，然后将它们部署到外部服务器（如 Tomcat、WildFly 等）上。但是，通过使用 Spring
    Boot，你可以创建一个 JAR 类型的模块，并非常轻松地将 Servlet 容器嵌入到应用程序中，这样应用程序将成为一个自包含的部署单元。此外，在开发过程中，你可以轻松地从
    IDE 或使用构建工具（如 Maven 或 Gradle）从命令行将 Spring Boot JAR 类型模块作为 Java 应用程序运行。


    你将在后续章节中了解更多关于这些特性以及如何有效使用它们的信息。

