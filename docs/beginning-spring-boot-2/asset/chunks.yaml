    ## 本章小结


    本章介绍了 Spring Data JPA，并讲解了如何将其与 Spring Boot 结合使用。下一章将解释如何在 Spring Boot 应用中使用 MongoDB。


    # 9. 使用 MongoDB


    MongoDB 是最流行的面向文档的 NoSQL 数据库之一。Spring Data MongoDB 提供了对 MongoDB 的支持，其编程模型与 Spring
    Data JPA 类似，都基于一致的 Spring 框架。Spring Boot 为 Spring Data Mongo 提供了一个启动器，通过实现其自动配置机制，使其更易于使用。


    本章将讨论 MongoDB，包括如何在 Windows、MacOS 和 Linux 等各种平台上安装 MongoDB 服务器。本章将解释如何从 Mongo
    Shell 执行各种数据库操作。然后，你将探索如何通过使用 Spring Boot 的 `spring-boot-starter-data-mongodb`
    启动器来使用 Spring Data Mongo 的功能。


    ## 认识 MongoDB


    MongoDB 是一个开源的面向文档的 NoSQL 数据库。MongoDB 使用一种名为 BSON 的文档存储和数据交换格式，它提供了类 JSON 文档的二进制表示形式。MongoDB
    将文档存储在集合中。集合类似于关系数据库中的表。然而，与表不同的是，集合不要求其文档具有相同的模式。参见清单 9-1。


