- fmt: '### Use `OpenEntityManagerInViewFilter` for Multiple Data Sources


    If you have multiple database configuration set up as described in previous section
    in web applications, and want to use `OpenEntityManagerInViewFilter` to enable
    lazy loading of JPA entity `LAZY` associated collections while rendering the view,
    you need to register the `OpenEntityManagerInViewFilter` beans, as shown in Listing
    [8-9](#A447991_1_En_8_Chapter.html#Par100).


    ```

    @Configuration

    public class WebMvcConfig

    {

    @Bean

    public OpenEntityManagerInViewFilter primaryOpenEntityManagerInViewFilter()

    {

    OpenEntityManagerInViewFilter osivFilter =

    new OpenEntityManagerInViewFilter();

    osivFilter.setEntityManagerFactoryBeanName

    ("primaryEntityManagerFactory");

    return osivFilter;

    }

    @Bean

    public OpenEntityManagerInViewFilter reportingOpenEntityManagerInViewFilter()

    {

    OpenEntityManagerInViewFilter osivFilter =

    new OpenEntityManagerInViewFilter();

    osivFilter.setEntityManagerFactoryBeanName

    ("reportingEntityManagerFactory");

    return osivFilter;

    }

    }

    Listing 8-9.

    WebMvcConfig.java

    ```


    This code configures two `OpenEntityManagerInViewFilter` beans by setting the
    two `EntityManagerFactory` bean names—`primaryEntityManagerFactory` and `reportingEntityManagerFactory`.


    **Note**


    To learn more about Spring Data JPA, visit the official Spring Data JPA Documentation
    at: [`http://docs.spring.io/spring-data/jpa/docs/current/reference/html`](http://docs.spring.io/spring-data/jpa/docs/current/reference/html).


    ## Summary


    This chapter covered Spring Data JPA and covered how to use it with Spring Boot.
    The next chapter explains how to work with MongoDB in your Spring Boot applications.


    # 9. Working with MongoDB


    MongoDB is one of the most popular document-oriented NoSQL databases. Spring Data
    MongoDB provides support for working with MongoDB with a consistent Spring-based
    programming model similar to Spring Data JPA. Spring Boot provides a starter for
    Spring Data Mongo, which makes it even easier to use by implementing its autoconfiguring
    mechanism.


    This chapter discusses MongoDB, including how to install a MongoDB server on various
    platforms like Windows, MacOS, and Linux. The chapter explains how to perform
    various database operations from the Mongo Shell. Then you will explore how to
    use Spring Data Mongo features by using Spring Boot''s `spring-boot-starter-data-mongodb`
    starter.


    ## Introducing MongoDB


    MongoDB is an open-source document-oriented NoSQL database. MongoDB uses a document
    storage and data interchange format called BSON, which provides a binary representation
    of JSON-like documents. MongoDB stores documents in collections. Collections are
    analogous to tables in relational databases. Unlike a table, however, a collection
    does not require its documents to have the same schema. See Listing [9-1](#A447991_1_En_9_Chapter.html#Par4).


