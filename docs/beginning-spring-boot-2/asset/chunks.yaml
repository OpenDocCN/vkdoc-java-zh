    \ Spring Boot\n\nIf you use Spring Boot’s autoconfiguration feature, you don’t\
    \ have to configure beans manually. To start, create a Spring Boot Maven-based\
    \ project and add the `spring-boot-starter-jdbc` module.\n\n```\norg.springframework.boot\n\
    spring-boot-starter-jdbc\n\n```\n\nBy adding the `spring-boot-starter-jdbc` module,\
    \ you get the following autoconfiguration features:\n\n*   The `spring-boot-starter-jdbc`\
    \ module transitively pulls `tomcat-jdbc-{version}.jar`, which is used to configure\
    \ the `DataSource` bean.\n*   If you have not defined a `DataSource` bean explicitly\
    \ and if you have any embedded database drivers in the classpath, such as H2,\
    \ HSQL, or Derby, then Spring Boot will automatically register the `DataSource`\
    \ bean using the in-memory database settings.\n*   If you haven’t registered any\
    \ of the following beans, then Spring Boot will register them automatically.\n\
    \    *   `PlatformTransactionManager` (`DataSourceTransactionManager`)\n    *\
    \   `JdbcTemplate`\n    *   `NamedParameterJdbcTemplate`\n*   You can have the\
    \ `schema.sql` and `data.sql` files in the root classpath, which Spring Boot will\
    \ automatically use to initialize the database."
  trans: "\n## 在不使用 Spring Boot 的情况下使用 JdbcTemplate\n\n首先，我们快速了解一下如何通过注册 `DataSource`、`TransactionManager`\
    \ 和 `JdbcTemplate` Bean，来常规使用 Spring 的 JdbcTemplate（不使用 Spring Boot）。你也可以注册 `DataSourceInitializer`\
    \ Bean 来初始化数据库。\n\n```\n@Configuration\n@ComponentScan\n@EnableTransactionManagement\n\
    @PropertySource(value = { \"classpath:application.properties\" })\npublic class\
    \ AppConfig {\n@Autowired\nprivate Environment env;\n@Bean\npublic static PropertySourcesPlaceholderConfigurer\
    \ placeHolderConfigurer()\n{\nreturn new PropertySourcesPlaceholderConfigurer();\n\
    }\n@Value(\"${init-db:false}\")\nprivate String initDatabase;\n@Bean\npublic JdbcTemplate\
    \ jdbcTemplate(DataSource dataSource)\n{\nreturn new JdbcTemplate(dataSource);\n\
    }\n@Bean\npublic PlatformTransactionManager transactionManager(DataSource dataSource)\n\
    {\nreturn new DataSourceTransactionManager(dataSource);\n}\n@Bean\npublic DataSource\
    \ dataSource()\n{\nBasicDataSource dataSource = new BasicDataSource();\ndataSource.setDriverClassName(env.getProperty(\"\
    jdbc.driverClassName\"));\ndataSource.setUrl(env.getProperty(\"jdbc.url\"));\n\
    dataSource.setUsername(env.getProperty(\"jdbc.username\"));\ndataSource.setPassword(env.getProperty(\"\
    jdbc.password\"));\nreturn dataSource;\n}\n@Bean\npublic DataSourceInitializer\
    \ dataSourceInitializer(DataSource dataSource)\n{\nDataSourceInitializer dataSourceInitializer\
    \ = new DataSourceInitializer();\ndataSourceInitializer.setDataSource(dataSource);\n\
    ResourceDatabasePopulator databasePopulator = new ResourceDatabasePopulator();\n\
    databasePopulator.addScript(new ClassPathResource(\"data.sql\"));\ndataSourceInitializer.setDatabasePopulator(databasePopulator);\n\
    dataSourceInitializer.setEnabled(Boolean.parseBoolean(initDatabase));\nreturn\
    \ dataSourceInitializer;\n}\n}\n```\n\n你需要在 `src/main/resources/application.properties`\
    \ 中配置 JDBC 连接参数，如下所示。\n\n```\njdbc.driverClassName=com.mysql.jdbc.Driver\njdbc.url=jdbc:mysql://localhost:3306/test\n\
    jdbc.username=root\njdbc.password=admin\n```\n\n然后，你可以在 `src/main/resources` 中创建一个名为\
    \ `data.sql` 的数据库设置脚本，如下所示：\n\n```\nDROP TABLE IF EXISTS USERS;\nCREATE TABLE\
    \ users (\nid int(11) NOT NULL AUTO_INCREMENT,\nname varchar(100) NOT NULL,\n\
    email varchar(100) DEFAULT NULL,\nPRIMARY KEY (id)\n);\ninsert into users(id,\
    \ name, email) values(1,'John','john@gmail.com');\ninsert into users(id, name,\
    \ email) values(2,'Rod','rod@gmail.com');\ninsert into users(id, name, email)\
    \ values(3,'Mike','mike@gmail.com');\n```\n\n如果你希望将模式生成脚本和种子数据插入脚本分开存放，可以将它们放在不同的文件中，并按如下方式添加：\n\
    \n```\ndatabasePopulator.addScripts(new ClassPathResource(\"schema.sql\"),\nnew\
    \ ClassPathResource(\"seed-data.sql\") );\n```\n\n完成上述配置后，你就可以将 `JdbcTemplate`\
    \ 注入到数据访问组件中，以便与数据库进行交互。\n\n```\npublic class User\n{\nprivate Integer id;\nprivate\
    \ String name;\nprivate String email;\n// setters & getters\n}\n@Repository\n\
    public class UserRepository\n{\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\n\
    @Transactional(readOnly=true)\npublic List findAll() {\nreturn jdbcTemplate.query(\"\
    select * from users\", new UserRowMapper());\n}\n}\nclass UserRowMapper implements\
    \ RowMapper\n{\n@Override\npublic User mapRow(ResultSet rs, int rowNum) throws\
    \ SQLException {\nUser user = new User();\nuser.setId(rs.getInt(\"id\"));\nuser.setName(rs.getString(\"\
    name\"));\nuser.setEmail(rs.getString(\"email\"));\nreturn user;\n}\n}\n```\n\n\
    你可能已经注意到，在大多数情况下，你会在应用程序中使用类似这样的配置。\n\n下一节将向你展示如何使用 Spring Boot，而无需手动配置所有这些 Bean。\n\
    \n## 在 Spring Boot 中使用 JdbcTemplate\n\n如果你使用 Spring Boot 的自动配置功能，则无需手动配置 Bean。首先，创建一个基于\
    \ Maven 的 Spring Boot 项目，并添加 `spring-boot-starter-jdbc` 模块。\n\n```\norg.springframework.boot\n\
    spring-boot-starter-jdbc\n\n```\n\n通过添加 `spring-boot-starter-jdbc` 模块，你将获得以下自动配置特性：\n\
    \n*   `spring-boot-starter-jdbc` 模块会传递性地引入 `tomcat-jdbc-{version}.jar`，该 JAR 包用于配置\
