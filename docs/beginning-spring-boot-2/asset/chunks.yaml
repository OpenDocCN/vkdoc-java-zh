    ```


    ### Using `@Conditional` Based on a Property’s Configuration


    What if you want to register the `MongoUserDAO` bean only if the `app.dbType=MONGO`
    property is set in the property’s placeholder configuration file? You can implement
    that condition, as shown in Listing [3-7](#A447991_1_En_3_Chapter.html#Par34).


    ```

    public class MongoDbTypePropertyCondition implements Condition

    {

    @Override

    public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
    metadata)

    {

    String dbType = conditionContext.getEnvironment().getProperty("app.dbType");

    return "MONGO".equalsIgnoreCase(dbType);

    }

    }

    Listing 3-7.

    MongoDbTypePropertyCondition.java

    ```


    You have seen how to implement various types of conditions. But there is an even
    more elegant way to implement conditions using annotations.


    Instead of creating a condition implementation for MYSQL and MongoDB, you can
    create a `DatabaseType` annotation as follows:


    ```

    @Target({ ElementType.TYPE, ElementType.METHOD })

    @Retention(RetentionPolicy.RUNTIME)

    @Conditional(DatabaseTypeCondition.class)

    public @interface DatabaseType

    {

    String value();

    }

    ```


    Then you implement `DatabaseTypeCondition` to use the `DatabaseType` value to
    determine whether to enable or disable bean registration, as follows:


    ```

    public class DatabaseTypeCondition implements Condition

    {

    @Override

    public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
    metadata)

    {

    Map attributes = metadata.getAnnotationAttributes(DatabaseType.class.getName());

    String type = (String) attributes.get("value");

    String enabledDBType = System.getProperty("dbType","MYSQL");

    return (enabledDBType != null && type != null && enabledDBType.equalsIgnoreCase(type));

    }

    }

    ```


    Now you can use the `@DatabaseType` annotation on the bean definitions, as follows:


    ```

    @Configuration

    @ComponentScan

    public class AppConfig

    {

    @DatabaseType("MYSQL")

    public UserDAO jdbcUserDAO(){

    return new JdbcUserDAO();

    }

    @Bean

    @DatabaseType("MONGO")

    public UserDAO mongoUserDAO(){

    return new MongoUserDAO();

    }

    }

    ```


    Here, you are getting the metadata from `DatabaseType` annotation and checking
    against the `dbType` system property value to determine whether to enable or disable
    the bean registration.


    You have seen a good number of examples of how you can register beans conditionally
    using the `@Conditional` annotation. Spring Boot extensively uses the `@Conditional`
    feature to register beans conditionally based on various criteria.


    ## Spring Boot’s Built-In `@Conditional` Annotations


    Spring Boot provides many custom `@Conditional` annotations to meet developers’
    autoconfiguration needs based on various criteria. Table [3-1](#A447991_1_En_3_Chapter.html#Tab1)
    lists the `@Conditional` annotations provided by Spring Boot out-of-the-box.


    **Table 3-1.** Spring Boot `@Conditional` Annotations


    | Annotation | Description |

    | --- | --- |

    | `@ConditionalOnBean` | Matches when the specified bean classes and/or names
    are already registered. |

    | `@ConditionalOnMissingBean` | Matches when the specified bean classes and/or
    names are not already registered. |

    | `@ConditionalOnClass` | Matches when the specified classes are on the classpath.
    |

    | `@ConditionalOnMissingClass` | Matches when the specified classes are not on
    the classpath. |

    | `@ConditionalOnProperty` | Matches when the specified properties have a specific
    value. |

    | `@ConditionalOnResource` | Matches when the specified resources are on the classpath.
    |

    | `@ConditionalOnWebApplication` | Matches when the application context is a web
    application context. |


    Spring Boot provides implementations for these annotations to verify whether the
    condition is matching or not. For example, look at the source code of the `@ConditionalOnClass`
    annotation and `OnClassCondition.java` in the Spring Boot source code.


    ```

    @Target({ ElementType.TYPE, ElementType.METHOD })

    @Retention(RetentionPolicy.RUNTIME)

    @Documented

    @Conditional(OnClassCondition.class)

    public @interface ConditionalOnClass {

    /**

    * The classes that must be present. Since this annotation parsed by loading class

    * bytecode it is safe to specify classes here that may ultimately not be on the

    * classpath.

    * @return the classes that must be present

    */

    Class[] value() default {};

    /**

    * The classes names that must be present.

    * @return the class names that must be present.

    */

    String[] name() default {};

    }

    @Order(Ordered.HIGHEST_PRECEDENCE)

    class OnClassCondition extends SpringBootCondition

    implements AutoConfigurationImportFilter, BeanFactoryAware, BeanClassLoaderAware
    {

    private BeanFactory beanFactory;

    private ClassLoader beanClassLoader;

    @Override

    public boolean[] match(String[] autoConfigurationClasses,

    AutoConfigurationMetadata autoConfigurationMetadata) {

    ConditionEvaluationReport report = getConditionEvaluationReport();

    ConditionOutcome[] outcomes = getOutcomes(autoConfigurationClasses,

    autoConfigurationMetadata);

    boolean[] match = new boolean[outcomes.length];

    for (int i = 0; i < outcomes.length; i++) {

    match[i] = (outcomes[i] == null || outcomes[i].isMatch());

    if (!match[i] && outcomes[i] != null) {

    logOutcome(autoConfigurationClasses[i], outcomes[i]);

    if (report != null) {

    report.recordConditionEvaluation(autoConfigurationClasses[i], this,

    outcomes[i]);

    }

    }

    }

    return match;

    }

    ...

    ...

    ...

    }

    ```


    You can see how Spring Boot is using the `@ConditionalOnClass` annotation and
    `OnClassCondition.class` to check whether a given class is present or not. Similarly,
    you can find various other conditional annotations from Spring Boot, such as `@ConditionalOnBean`,
    `@ConditionalOnMissingBean`, `@ConditionalOnResource`, `@ConditionalOnProperty`,
    etc.


    **Note**


    You can find various condition implementations that Spring Boot uses in the `org.springframework.boot.autoconfigure.condition`
    package of `spring-boot-autoconfigure-{version}.jar`.


    Now that you know how Spring Boot uses the `@Conditional` feature to conditionally
    check whether to register a bean, you might wonder what exactly triggers the autoconfiguration
    mechanism. This is what the next section covers.'
