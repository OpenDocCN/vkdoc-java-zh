- fmt: "# Database Migration with Flyway\n\nHaving a proper database migration plan\
    \ for enterprise applications is crucial. The new versions of the application\
    \ may be released with new features or enhancements that involve changes to the\
    \ database schema. It is strongly recommended that you have versioned database\
    \ scripts so that you can track which database changes were introduced in which\
    \ release and can restore the database to a particular version if required.\n\n\
    This section looks at one of the popular database migration tools, called Flyway,\
    \ which Spring Boot supports out of the box.\n\nYou can create your database migration\
    \ scripts as `.sql` files following a specific naming pattern so that Flyway can\
    \ run these scripts in order based on the current schema version. Flyway creates\
    \ a database table called `schema_version` that keeps track of the current schema\
    \ version so that it will run any pending migration scripts while performing the\
    \ migration operation (Figure [5-1](#A447991_1_En_5_Chapter.html#Fig1)).\n\n![A447991_1_En_5_Fig1_HTML.jpg](A447991_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1. Flyway `schema_version` table\n\nYou should follow the naming convention\
    \ when naming the migration scripts so that the scripts will run in the correct\
    \ order.\n\n```\nV{Version}__{Description}.sql\n```\n\nHere, `{Version}` is the\
    \ version number and can contain dots (`.`) and underscores (`_`). The `{Description}`\
    \ can contain text describing the migration changes. `{Version}` and `{Description}`\
    \ should be separated by a separator; the default is two consecutive underscores\
    \ (`__`), but this option is configurable.\n\nExamples:\n\n```\nV1__Init.sql\n\
    V1.1_CreatePersonTable.sql\nV1_2__UpdatePersonTable.sql\nV2.1.0__CreateSecurityTables.sql\n\
    V2_1_1__AddAuditingTables.sql\n```\n\nTo add Flyway migration support to a Spring\
    \ Boot application, you just need to add the `flyway-core` dependency and place\
    \ the migration scripts in the `db/migration` directory in the classpath.\n\n\
    ```\n<dependency>\n    <groupId>org.flywaydb</groupId>\n    <artifactId>flyway-core</artifactId>\n\
    </dependency>\n```\n\nNow create the two migration scripts shown in Listings [5-4](#A447991_1_En_5_Chapter.html#Par71)\
    \ and [5-5](#A447991_1_En_5_Chapter.html#Par72) in the `src/main/resources/db/migration`\
    \ directory.\n\n```\nCREATE TABLE users\n(\nid int(11) NOT NULL AUTO_INCREMENT,\n\
    name varchar(100) NOT NULL,\nemail varchar(100) DEFAULT NULL,\nPRIMARY KEY (id)\n\
    );\ninsert into users(id, name, email) values(1,'John','john@gmail.com');\ninsert\
    \ into users(id, name, email) values(2,'Rod','rod@gmail.com');\ninsert into users(id,\
    \ name, email) values(3,'Renold','renold@gmail.com');\n```\n\nListing 5-4. `V1.0__Init.sql`\n\
    \n```\nALTER TABLE USERS ADD COLUMN DOB DATE DEFAULT NULL;\n```\n\nListing 5-5.\
    \ `V1.1__Add_DOB_Column.sql`\n\nNow, when you start the application, it will check\
    \ the current schema version number (maximum of the `schema_version.version` column\
    \ value) and run if there are any pending migration scripts with a higher version\
    \ value.\n\nIf you already have an existing database with tables, you can take\
    \ the dump of the existing database structure and make it the baseline script\
    \ so that you can clean the database and start from scratch. If you don't want\
    \ to take a dump and re-run the initial script (which is common in production\
    \ environments), you can set `flyway.baseline-on-migrate=true`, which will insert\
    \ a baseline record in the `schema_version` table with the version set to 1. Now\
    \ you can add migration scripts with version numbers higher than 1—say 1.1, 1_2,\
    \ etc.\n\nFor more information about Flyway migrations, see [`https://flywaydb.org/`](https://flywaydb.org/).\n\
    \n# Summary\n\nIn this chapter, you learned how to use `JdbcTemplate` easily in\
    \ Spring Boot and how to connect to databases like H2 and MySQL. The chapter also\
    \ covered how to initialize a database using SQL scripts. You also learned how\
    \ to use various connection pooling libraries. The next chapter explains how to\
    \ use MyBatis with Spring Boot.\n\n# 6. Working with MyBatis\n\nMyBatis is an\
    \ open source Java persistence framework that abstracts JDBC boilerplate code\
    \ and provides a simple and easy-to-use API to interact with the database.\n\n\
    Unlike Hibernate, which is a full-blown ORM framework, MyBatis is a SQL mapping\
    \ framework. It automates the process of populating the SQL resultset into Java\
    \ objects and it persists data into tables by extracting the data from the Java\
    \ objects.\n\nThis chapter covers how to use the Spring Boot MyBatis starter,\
    \ how to execute database queries using MyBatis XML, and how to use annotation-based\
    \ mappers."
  raw: '## Database Migration with Flyway


    Having a proper database migration plan for enterprise applications is crucial.
    The new versions of the application may be released with new features or enhancements
    that involve changes to the database schema. It is strongly recommended that you
    have versioned database scripts so that you can track which database changes were
    introduced in which release and can restore the database to a particular version
    if required.


    This section looks at one of the popular database migration tools, called Flyway
    , which Spring Boot supports out of the box.


    You can create your database migration scripts as `.sql` files following a specific
    naming pattern so that Flyway can run these scripts in order based on the current
    schema version. Flyway creates a database table called `schema_version` that keeps
    track of the current schema version so that it will run any pending migration
    scripts while performing the migration operation (Figure [5-1](#A447991_1_En_5_Chapter.html#Fig1)).


    ![A447991_1_En_5_Fig1_HTML.jpg](A447991_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    Flyway schema_version table


    You should follow the naming convention when naming the migration scripts so that
    the scripts will run in the correct order.


    ```

    V{Version}__{Description}.sql

    ```


    Here, `{Version}` is the version number and can contain dots (.) and underscores
    (_). The `{Description}` can contain text describing the migration changes. `{Version}`
    and `{Description}` should be separated by a separator; the default is two consecutive
    underscores (`__`), but this option is configurable.


    Examples:


    ```

    V1__Init.sql

    V1.1_CreatePersonTable.sql

    V1_2__UpdatePersonTable.sql

    V2.1.0__CreateSecurityTables.sql

    V2_1_1__AddAuditingTables.sql

    ```


    To add Flyway migration support to a Spring Boot application, you just need to
    add the `flyway-core` dependency and place the migration scripts in the `db/migration`
    directory in the classpath.


    ```

    org.flywaydb

    flyway-core


    ```


    Now create the two migration scripts shown in Listings [5-4](#A447991_1_En_5_Chapter.html#Par71)
    and [5-5](#A447991_1_En_5_Chapter.html#Par72) in the `src/main/resources/db/migration`
    directory.


    ```

    CREATE TABLE users

    (

    id int(11) NOT NULL AUTO_INCREMENT,

    name varchar(100) NOT NULL,

    email varchar(100) DEFAULT NULL,

    PRIMARY KEY (id)

    );

    insert into users(id, name, email) values(1,''John'',''john@gmail.com'');

    insert into users(id, name, email) values(2,''Rod'',''rod@gmail.com'');

    insert into users(id, name, email) values(3,''Renold'',''renold@gmail.com'');

    Listing 5-4.

    V1.0__Init.sql

    ```


    ```

    ALTER TABLE USERS ADD COLUMN DOB DATE DEFAULT NULL;

    Listing 5-5.

    V1.1__Add_DOB_Column.sql

    ```


    Now, when you start the application, it will check the current schema version
    number (maximum of the `schema_version.version` column value) and run if there
    are any pending migration scripts with a higher version value.


    If you already have an existing database with tables, you can take the dump of
    the existing database structure and make it the baseline script so that you can
    clean the database and start from scratch. If you don''t want to take a dump and
    re-run the initial script (which is common in production environments), you can
    set `flyway.baseline-on-migrate=true`, which will insert a baseline record in
    the `schema_version` table with the version set to 1\. Now you can add migration
    scripts with version numbers higher than 1—say 1.1, 1_2, etc.


    For more information about Flyway migrations, see [`https://flywaydb.org/`](https://flywaydb.org/)
    .


    ## Summary


    In this chapter, you learned how to use `JdbcTemplate` easily in Spring Boot and
    how to connect to databases like H2 and MySQL. The chapter also covered how to
    initialize a database using SQL scripts. You also learned how to use various connection
    pooling libraries. The next chapter explains how to use MyBatis with Spring Boot.


    # 6. Working with MyBatis


    MyBatis is an open source Java persistence framework that abstracts JDBC boilerplate
    code and provides a simple and easy-to-use API to interact with the database.


    Unlike Hibernate, which is a full-blown ORM framework, MyBatis is a SQL mapping
    framework. It automates the process of populating the SQL resultset into Java
    objects and it persists data into tables by extracting the data from the Java
    objects.


    This chapter covers how to use the Spring Boot MyBatis starter, how to execute
    database queries using MyBatis XML, and how to use annotation-based mappers.'
  trans: '

    ## 使用 Flyway 进行数据库迁移


    对于企业级应用而言，制定合理的数据库迁移计划至关重要。应用的新版本可能会发布涉及数据库模式变更的新功能或增强特性。强烈建议使用带版本号的数据库脚本，这样你就可以追踪每个版本引入了哪些数据库变更，并在需要时将数据库恢复到特定版本。


    本节将介绍一款名为 Flyway 的流行数据库迁移工具，Spring Boot 对其提供了开箱即用的支持。


    你可以按照特定的命名模式将数据库迁移脚本创建为 `.sql` 文件，这样 Flyway 就能根据当前模式版本按顺序执行这些脚本。Flyway 会创建一个名为
    `schema_version` 的数据库表来记录当前模式版本，从而在执行迁移操作时运行所有待处理的迁移脚本（图 5-1）。


    ![A447991_1_En_5_Fig1_HTML.jpg](img/A447991_1_En_5_Fig1_HTML.jpg)


    图 5-1.


    Flyway schema_version 表


    在命名迁移脚本时，应遵循命名规范，以确保脚本按正确顺序执行。


    ```

    V{版本号}__{描述}.sql

    ```


    其中，`{版本号}` 是版本号，可以包含点号 (.) 和下划线 (_)。`{描述}` 可以包含描述迁移变更的文本。`{版本号}` 和 `{描述}` 之间应使用分隔符分隔；默认分隔符是两个连续的下划线
    (`__`)，但此选项是可配置的。


    示例：


    ```

    V1__Init.sql

    V1.1_CreatePersonTable.sql

    V1_2__UpdatePersonTable.sql

    V2.1.0__CreateSecurityTables.sql

    V2_1_1__AddAuditingTables.sql

    ```


    要为 Spring Boot 应用添加 Flyway 迁移支持，你只需添加 `flyway-core` 依赖，并将迁移脚本放置在类路径下的 `db/migration`
    目录中。


    ```

    org.flywaydb

    flyway-core


    ```


    现在，在 `src/main/resources/db/migration` 目录中创建清单 5-4 和 5-5 所示的两个迁移脚本。


    ```

    CREATE TABLE users

    (

    id int(11) NOT NULL AUTO_INCREMENT,

    name varchar(100) NOT NULL,

    email varchar(100) DEFAULT NULL,

    PRIMARY KEY (id)

    );

    insert into users(id, name, email) values(1,''John'',''john@gmail.com'');

    insert into users(id, name, email) values(2,''Rod'',''rod@gmail.com'');

    insert into users(id, name, email) values(3,''Renold'',''renold@gmail.com'');

    清单 5-4.

    V1.0__Init.sql

    ```


    ```

    ALTER TABLE USERS ADD COLUMN DOB DATE DEFAULT NULL;

    清单 5-5.

    V1.1__Add_DOB_Column.sql

    ```


    现在，当你启动应用时，它会检查当前模式版本号（`schema_version.version` 列的最大值），如果存在版本号更高的待处理迁移脚本，则会执行这些脚本。


    如果你已经有一个包含表的现有数据库，可以导出现有数据库结构并将其作为基线脚本，这样你就可以清理数据库并从头开始。如果你不想导出并重新运行初始脚本（这在生产环境中很常见），可以设置
    `flyway.baseline-on-migrate=true`，这将在 `schema_version` 表中插入一条版本设置为 1 的基线记录。现在，你可以添加版本号高于
    1 的迁移脚本，例如 1.1、1_2 等。


    有关 Flyway 迁移的更多信息，请参阅 [`https://flywaydb.org/`](https://flywaydb.org/) 。


    ## 本章小结


    在本章中，你学习了如何在 Spring Boot 中轻松使用 `JdbcTemplate`，以及如何连接到 H2 和 MySQL 等数据库。本章还介绍了如何使用
    SQL 脚本初始化数据库。此外，你还学习了如何使用各种连接池库。下一章将解释如何将 MyBatis 与 Spring Boot 结合使用。


    # 6. 使用 MyBatis


    MyBatis 是一个开源的 Java 持久化框架，它抽象了 JDBC 样板代码，并提供了简单易用的 API 来与数据库交互。


    与 Hibernate 这种全功能的 ORM 框架不同，MyBatis 是一个 SQL 映射框架。它自动化了将 SQL 结果集填充到 Java 对象的过程，并通过从
    Java 对象中提取数据来将数据持久化到表中。


    本章涵盖如何使用 Spring Boot MyBatis 启动器、如何使用 MyBatis XML 执行数据库查询，以及如何使用基于注解的映射器。

    '
- fmt: '# Using the Spring Boot MyBatis Starter


    The MyBatis community built the Spring Boot starter for MyBatis, which you can
    use while creating the Spring Boot project from the Spring Initializer or from
    the IDE. You can explore the source code on GitHub at: [`https://github.com/mybatis/mybatis-spring-boot`](https://github.com/mybatis/mybatis-spring-boot).


    Next you learn how to use the Spring Boot MyBatis starter to use MyBatis in SpringBoot
    applications quickly.


    1. Create a Spring Boot Maven project and configure the MyBatis Starter dependency
    and H2/MySQL driver dependencies.


    ```

    org.mybatis.spring.boot

    mybatis-spring-boot-starter

    1.3.0


    com.h2database

    h2


    mysql

    mysql-connector-java

    ```


    This example reuses the `User.java`, `schema.sql`, and `data.sql` files created
    in the previous chapter.


    2. Create the MyBatis SQL Mapper interface called `UserMapper.java` with a few
    database operations, as shown in Listing [6-1](#A447991_1_En_6_Chapter.html#Par10).


    ```

    package com.apress.demo.mappers;

    public interface UserMapper

    {

    void insertUser(User user);

    User findUserById(Integer id);

    List findAllUsers();

    }

    Listing 6-1.

    com.apress.demo.mappers.UserMapper.java

    ```


    3. You now need to create mapper XML files to define the queries for the SQL statements
    mapped to the corresponding mapper interface methods. Create the `UserMapper.xml`
    file in the `src/main/resources/com/apress/demo/mappers/` directory, as shown
    in Listing [6-2](#A447991_1_En_6_Chapter.html#Par12).


    ```

    <mapper namespace="com.apress.demo.mappers.UserMapper">

    <select id="findAllUsers" resultType="User">

    select id, name, email from users

    </select>

    <select id="findUserById" resultType="User">

    select id, name, email from users WHERE id=#{id}

    </select>

    <insert id="insertUser" parameterType="User">

    insert into users(name,email) values(#{name},#{email})

    </insert>

    </mapper>

    Listing 6-2.

    src/main/resources/com/apress/demo/mappers/UserMapper.xml

    ```


    A few things to observe here are:

    - The namespace in the mapper XML should be the same as the Fully Qualified Name
    (FQN) of the mapper interface.

    - The statement `id` values should be the same as the mapper interface method
    names.

    - If the query result column names are different from the bean property names,
    you can use the `<resultMap>` configuration to provide mapping between column
    names and their corresponding bean property names.


    4. MyBatis also provides annotation-based query configurations without requiring
    mapper XMLs. You can create the `UserMapper.java` interface and configure the
    mapped SQLs using annotations, as shown in Listing [6-3](#A447991_1_En_6_Chapter.html#Par18).


    ```

    public interface UserMapper

    {

    @Insert("insert into users(name,email) values(#{name},#{email})")

    @SelectKey(statement="call identity()", keyProperty="id",

    before=false, resultType=Integer.class)

    void insertUser(User user);

    @Select("select id, name, email from users WHERE id=#{id}")

    User findUserById(Integer id);

    @Select("select id, name, email from users")

    List findAllUsers();

    }

    Listing 6-3.

    com.apress.demo.mappers.UserMapper.java

    ```


    5. Next, you have to configure the starter configuration parameters. Configure
    the `type-aliases-package` and `mapper-locations` parameters in `application.properties`
    as follows.


    ```

    mybatis.type-aliases-package=com.apress.demo.domain

    mybatis.mapper-locations=classpath*:/mappers/*.xml

    ```


    6. Create the entry point class called `SpringbootMyBatisDemoApplication.java`,
    as shown in Listing [6-4](#A447991_1_En_6_Chapter.html#Par22).


    ```

    @SpringBootApplication

    @MapperScan("com.apress.demo.mappers")

    public class SpringbootMyBatisDemoApplication

    {

    public static void main(String[] args)

    {

    SpringApplication.run(SpringbootMyBatisDemoApplication.class, args);

    }

    }

    Listing 6-4.

    com.apress.demo.SpringbootMyBatisDemoApplication.java

    ```


    Note: This example uses the `@MapperScan("com.apress.demo.mappers")` annotation
    to specify where to look for the mapper interfaces. Instead of using `@MapperScan`,
    you could also annotate mapper interfaces with the new `@Mapper` annotation that
    shipped with MyBatis 3.4.0.


    7. Create a JUnit test class and test the `UserMapper` methods, as shown in Listing
    [6-5](#A447991_1_En_6_Chapter.html#Par25).


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest

    public class SpringbootMyBatisDemoApplicationTests

    {

    @Autowired

    private UserMapper userMapper;

    @Test

    public void findAllUsers()  {

    List users = userMapper.findAllUsers();

    assertNotNull(users);

    assertTrue(!users.isEmpty());

    }

    @Test

    public void findUserById()  {

    User user = userMapper.findUserById(1);

    assertNotNull(user);

    }

    @Test

    public void createUser() {

    User user = new User(0, "george", "george@gmail.com");

    userMapper.insertUser(user);

    User newUser = userMapper.findUserById(user.getId());

    assertEquals("george", newUser.getName());

    assertEquals("george@gmail.com", newUser.getEmail());

    }

    }

    Listing 6-5.

    com.apress.demo.SpringbootMyBatisDemoApplicationTests.java

    ```


    The Spring Boot MyBatis starter provides the following MyBatis configuration parameters,
    which you can use to customize your MyBatis settings.


    ```

    mybatis.config-location =  #mybatis config filename

    mybatis.check-config-location=  # Indicates whether to perform presence check
    of the MyBatis xml config file

    mybatis.mapper-locations =  #mappers file locations

    mybatis.type-aliases-package =  #domain object''s package

    mybatis.type-handlers-package =  #handler''s package

    mybatis.check-config-location =  #check the mybatis configuration exists

    mybatis.executor-type =  #mode of execution. Default is SIMPLE

    mybatis.configuration-properties=  #externalized properties for mybatis configuration

    ```


    You can read more about MyBatis at [`http://blog.mybatis.org/p/products.html`](http://blog.mybatis.org/p/products.html).


    ## Summary


    In this chapter, you learned how to work with MyBatis in Spring Boot applications.
    The next chapter covers how to use another popular Java persistence framework
    with Spring Boot, called JOOQ.


    # Working with JOOQ


    JOOQ (Java Object Oriented Querying) is a persistence framework that embraces
    SQL. JOOQ provides the following features:


    - Typesafe SQL using DSL API

    - Typesafe database object referencing using code generation

    - Easy-to-use API for querying and data fetching

    - SQL logging and debugging


    This chapter covers using the Spring Boot JOOQ Starter, using the JOOQ Maven Codegen
    plugin to generate code from the database schema, and performing various types
    of database operations.'
  raw: "## Using the Spring Boot MyBatis Starter\n\nThe MyBatis community built the\
    \ Spring Boot starter for MyBatis, which you can use while creating the Spring\
    \ Boot project from the Spring Initializer or from the IDE. You can explore the\
    \ source code on GitHub at: [`https://github.com/mybatis/mybatis-spring-boot`](https://github.com/mybatis/mybatis-spring-boot)\
    \ .\n\nNext you learn how to use the Spring Boot MyBatis starter to use MyBatis\
    \ in SpringBoot applications quickly.\n\n1.  Create a Spring Boot Maven project\
    \ and configure the MyBatis Starter dependency and H2/MySQL driver dependencies.\n\
    \n```\n    org.mybatis.spring.boot\n    mybatis-spring-boot-starter\n    1.3.0\n\
    \ncom.h2database\n    h2\n\nmysql\n    mysql-connector-java\n\n```\n\nThis example\
    \ reuses the `User.java`, `schema.sql`, and `data.sql` files created in the previous\
    \ chapter.  \n2.  Create the MyBatis SQL Mapper interface called `UserMapper.java`\
    \ with a few database operations, as shown in Listing [6-1](#A447991_1_En_6_Chapter.html#Par10).\n\
    \n```\n    package com.apress.demo.mappers;\n    public interface UserMapper\n\
    \    {\n    void insertUser(User user);\n    User findUserById(Integer id);\n\
    \    List findAllUsers();\n    }\n    Listing 6-1.\n    com.apress.demo.mappers.UserMapper.java\n\
    \    ```\n\n3.  You now need to create mapper XML files to define the queries\
    \ for the SQL statements mapped to the corresponding mapper interface methods.\
    \ Create the `UserMapper.xml` file in the `src/main/resources/com/apress/demo/mappers/`\
    \ directory, as shown in Listing [6-2](#A447991_1_En_6_Chapter.html#Par12).\n\n\
    ```\n\nselect id, name, email from users\n\nselect id, name, email from users\
    \ WHERE id=#{id}\n\ninsert into users(name,email) values(#{name},#{email})\n\n\
    Listing 6-2.\n    src/main/resources/com/apress/demo/mappers/UserMapper.xml\n\
    \    ```\n\nA few things to observe here are:\n    *   The namespace in the mapper\
    \ XML should be the same as the Fully Qualified Name (FQN) of the mapper interface.\n\
    \    *   The statement `id` values should be the same as the mapper interface\
    \ method names.\n    *   If the query result column names are different from the\
    \ bean property names, you can use the `<resultMap>` configuration to provide\
    \ mapping between column names and their corresponding bean property names. \n\
    4.  MyBatis also provides annotation-based query configurations without requiring\
    \ mapper XMLs. You can create the `UserMapper.java` interface and configure the\
    \ mapped SQLs using annotations, as shown in Listing [6-3](#A447991_1_En_6_Chapter.html#Par18).\n\
    \n```\n    public interface UserMapper\n    {\n    @Insert(\"insert into users(name,email)\
    \ values(#{name},#{email})\")\n    @SelectKey(statement=\"call identity()\", keyProperty=\"\
    id\",\n    before=false, resultType=Integer.class)\n    void insertUser(User user);\n\
    \    @Select(\"select id, name, email from users WHERE id=#{id}\")\n    User findUserById(Integer\
    \ id);\n    @Select(\"select id, name, email from users\")\n    List findAllUsers();\n\
    \    }\n    Listing 6-3.\n    com.apress.demo.mappers.UserMapper.java\n    ```\n\
    \n5.  Next, you have to configure the starter configuration parameters. Configure\
    \ the `type-aliases-package` and `mapper-locations` parameters in `application.properties`\
    \ as follows.\n\n```\n    mybatis.type-aliases-package=com.apress.demo.domain\n\
    \    mybatis.mapper-locations=classpath*:/mappers/*.xml\n    ```\n\n6.  Create\
    \ the entry point class called `SpringbootMyBatisDemoApplication.java` , as shown\
    \ in Listing [6-4](#A447991_1_En_6_Chapter.html#Par22).\n\n```\n    @SpringBootApplication\n\
    \    @MapperScan(\"com.apress.demo.mappers\")\n    public class SpringbootMyBatisDemoApplication\n\
    \    {\n    public static void main(String[] args)\n    {\n    SpringApplication.run(SpringbootMyBatisDemoApplication.class,\
    \ args);\n    }\n    }\n    Listing 6-4.\n    com.apress.demo.SpringbootMyBatisDemoApplication.java\n\
    \    ```\n\nNote This example uses the `@MapperScan(\"com.apress.demo.mappers\"\
    )` annotation to specify where to look for the mapper interfaces. Instead of using\
    \ `@MapperScan`, you could also annotate mapper interfaces with the new `@Mapper`\
    \ annotation that shipped with MyBatis 3.4.0.  \n7.  Create a JUnit test class\
    \ and test the `UserMapper` methods , as shown in Listing [6-5](#A447991_1_En_6_Chapter.html#Par25).\n\
    \n```\n    @RunWith(SpringRunner.class)\n    @SpringBootTest\n    public class\
    \ SpringbootMyBatisDemoApplicationTests\n    {\n    @Autowired\n    private UserMapper\
    \ userMapper;\n    @Test\n    public void findAllUsers()  {\n    List users =\
    \ userMapper.findAllUsers();\n    assertNotNull(users);\n    assertTrue(!users.isEmpty());\n\
    \    }\n    @Test\n    public void findUserById()  {\n    User user = userMapper.findUserById(1);\n\
    \    assertNotNull(user);\n    }\n    @Test\n    public void createUser() {\n\
    \    User user = new User(0, \"george\", \"george@gmail.com\");\n    userMapper.insertUser(user);\n\
    \    User newUser = userMapper.findUserById(user.getId());\n    assertEquals(\"\
    george\", newUser.getName());\n    assertEquals(\"george@gmail.com\", newUser.getEmail());\n\
    \    }\n    }\n    Listing 6-5.\n    com.apress.demo.SpringbootMyBatisDemoApplicationTests.java\n\
    \    ```\n\nThe Spring Boot MyBatis starter provides the following MyBatis configuration\
    \ parameters, which you can use to customize your MyBatis settings.\n\n```\nmybatis.config-location\
    \ =  #mybatis config filename\nmybatis.check-config-location=  # Indicates whether\
    \ to perform presence check of the MyBatis xml config file\nmybatis.mapper-locations\
    \ =  #mappers file locations\nmybatis.type-aliases-package =  #domain object's\
    \ package\nmybatis.type-handlers-package =  #handler's package\nmybatis.check-config-location\
    \ =  #check the mybatis configuration exists\nmybatis.executor-type =  #mode of\
    \ execution. Default is SIMPLE\nmybatis.configuration-properties=  #externalized\
    \ properties for mybatis configuration\n```\n\nYou can read more about MyBatis\
    \ at [`http://blog.mybatis.org/p/products.html`](http://blog.mybatis.org/p/products.html)\
    \ .\n\n## Summary\n\nIn this chapter, you learned how to work with MyBatis in\
    \ Spring Boot applications. The next chapter covers how to use another popular\
    \ Java persistence framework with Spring Boot, called JOOQ.\n\n# 7. Working with\
    \ JOOQ\n\nJOOQ (Java Object Oriented Querying) is a persistence framework that\
    \ embraces SQL. JOOQ provides the following features:\n\n*   Typesafe SQL using\
    \ DSL API\n*   Typesafe database object referencing using code generation\n* \
    \  Easy-to-use API for querying and data fetching\n*   SQL logging and debugging\n\
    \nThis chapter covers using the Spring Boot JOOQ Starter, using the JOOQ Maven\
    \ Codegen plugin to generate code from the database schema, and performing various\
    \ types of database operations."
  trans: "\n## 使用 Spring Boot MyBatis Starter\n\nMyBatis 社区为 MyBatis 构建了 Spring Boot\
    \ Starter，你可以在通过 Spring Initializer 或 IDE 创建 Spring Boot 项目时使用它。你可以在 GitHub 上查看其源代码：[`https://github.com/mybatis/mybatis-spring-boot`](https://github.com/mybatis/mybatis-spring-boot)。\n\
    \n接下来你将学习如何使用 Spring Boot MyBatis Starter 在 Spring Boot 应用中快速集成 MyBatis。\n\n1.\
    \  创建一个 Spring Boot Maven 项目，并配置 MyBatis Starter 依赖以及 H2/MySQL 驱动依赖。\n\n```\n\
    \    org.mybatis.spring.boot\n    mybatis-spring-boot-starter\n    1.3.0\n\ncom.h2database\n\
    \    h2\n\nmysql\n    mysql-connector-java\n\n```\n\n本示例复用了上一章创建的 `User.java`、`schema.sql`\
    \ 和 `data.sql` 文件。\n2.  创建名为 `UserMapper.java` 的 MyBatis SQL 映射器接口，其中包含一些数据库操作，如清单\
    \ 6-1 所示。\n\n```\n    package com.apress.demo.mappers;\n    public interface UserMapper\n\
    \    {\n    void insertUser(User user);\n    User findUserById(Integer id);\n\
    \    List findAllUsers();\n    }\n    清单 6-1.\n    com.apress.demo.mappers.UserMapper.java\n\
    \    ```\n\n3.  现在你需要创建映射器 XML 文件，为映射到相应映射器接口方法的 SQL 语句定义查询。在 `src/main/resources/com/apress/demo/mappers/`\
    \ 目录下创建 `UserMapper.xml` 文件，如清单 6-2 所示。\n\n```\n\nselect id, name, email from\
    \ users\n\nselect id, name, email from users WHERE id=#{id}\n\ninsert into users(name,email)\
    \ values(#{name},#{email})\n\n清单 6-2.\n    src/main/resources/com/apress/demo/mappers/UserMapper.xml\n\
    \    ```\n\n这里需要注意以下几点：\n    *   映射器 XML 中的命名空间应与映射器接口的完全限定名（FQN）保持一致。\n    *\
    \   语句的 `id` 值应与映射器接口的方法名保持一致。\n    *   如果查询结果列名与 Bean 属性名不同，你可以使用 `<resultMap>`\
    \ 配置来提供列名与其对应 Bean 属性名之间的映射关系。\n4.  MyBatis 也提供了基于注解的查询配置，无需映射器 XML。你可以创建 `UserMapper.java`\
    \ 接口并使用注解配置映射的 SQL，如清单 6-3 所示。\n\n```\n    public interface UserMapper\n    {\n\
    \    @Insert(\"insert into users(name,email) values(#{name},#{email})\")\n   \
    \ @SelectKey(statement=\"call identity()\", keyProperty=\"id\",\n    before=false,\
    \ resultType=Integer.class)\n    void insertUser(User user);\n    @Select(\"select\
    \ id, name, email from users WHERE id=#{id}\")\n    User findUserById(Integer\
    \ id);\n    @Select(\"select id, name, email from users\")\n    List findAllUsers();\n\
    \    }\n    清单 6-3.\n    com.apress.demo.mappers.UserMapper.java\n    ```\n\n\
    5.  接下来，你需要配置 Starter 的配置参数。在 `application.properties` 中配置 `type-aliases-package`\
    \ 和 `mapper-locations` 参数，如下所示。\n\n```\n    mybatis.type-aliases-package=com.apress.demo.domain\n\
    \    mybatis.mapper-locations=classpath*:/mappers/*.xml\n    ```\n\n6.  创建名为 `SpringbootMyBatisDemoApplication.java`\
    \ 的入口类，如清单 6-4 所示。\n\n```\n    @SpringBootApplication\n    @MapperScan(\"com.apress.demo.mappers\"\
    )\n    public class SpringbootMyBatisDemoApplication\n    {\n    public static\
    \ void main(String[] args)\n    {\n    SpringApplication.run(SpringbootMyBatisDemoApplication.class,\
    \ args);\n    }\n    }\n    清单 6-4.\n    com.apress.demo.SpringbootMyBatisDemoApplication.java\n\
    \    ```\n\n注意 本示例使用 `@MapperScan(\"com.apress.demo.mappers\")` 注解来指定映射器接口的查找位置。除了使用\
    \ `@MapperScan`，你也可以使用 MyBatis 3.4.0 中新增的 `@Mapper` 注解来标注映射器接口。\n7.  创建一个 JUnit\
    \ 测试类并测试 `UserMapper` 方法，如清单 6-5 所示。\n\n```\n    @RunWith(SpringRunner.class)\n\
    \    @SpringBootTest\n    public class SpringbootMyBatisDemoApplicationTests\n\
    \    {\n    @Autowired\n    private UserMapper userMapper;\n    @Test\n    public\
    \ void findAllUsers()  {\n    List users = userMapper.findAllUsers();\n    assertNotNull(users);\n\
    \    assertTrue(!users.isEmpty());\n    }\n    @Test\n    public void findUserById()\
    \  {\n    User user = userMapper.findUserById(1);\n    assertNotNull(user);\n\
    \    }\n    @Test\n    public void createUser() {\n    User user = new User(0,\
    \ \"george\", \"george@gmail.com\");\n    userMapper.insertUser(user);\n    User\
    \ newUser = userMapper.findUserById(user.getId());\n    assertEquals(\"george\"\
    , newUser.getName());\n    assertEquals(\"george@gmail.com\", newUser.getEmail());\n\
    \    }\n    }\n    清单 6-5.\n    com.apress.demo.SpringbootMyBatisDemoApplicationTests.java\n\
    \    ```\n\nSpring Boot MyBatis Starter 提供了以下 MyBatis 配置参数，你可以使用它们来自定义 MyBatis\
    \ 设置。\n\n```\nmybatis.config-location =  #mybatis 配置文件名称\nmybatis.check-config-location=\
    \  #是否检查 MyBatis XML 配置文件是否存在\nmybatis.mapper-locations =  #映射器文件位置\nmybatis.type-aliases-package\
    \ =  #领域对象的包名\nmybatis.type-handlers-package =  #类型处理器的包名\nmybatis.check-config-location\
    \ =  #检查 MyBatis 配置是否存在\nmybatis.executor-type =  #执行模式。默认为 SIMPLE\nmybatis.configuration-properties=\
    \  #MyBatis 配置的外部化属性\n```\n\n你可以在 [`http://blog.mybatis.org/p/products.html`](http://blog.mybatis.org/p/products.html)\
    \ 了解更多关于 MyBatis 的信息。\n\n## 本章小结\n\n在本章中，你学习了如何在 Spring Boot 应用中使用 MyBatis。下一章将介绍如何在\
    \ Spring Boot 中使用另一个流行的 Java 持久化框架 JOOQ。\n\n# 7. 使用 JOOQ\n\nJOOQ（Java 面向对象查询）是一个拥抱\
    \ SQL 的持久化框架。JOOQ 提供了以下特性：\n\n*   使用 DSL API 进行类型安全的 SQL 操作\n*   使用代码生成进行类型安全的数据库对象引用\n\
    *   易于使用的查询和数据获取 API\n*   SQL 日志记录与调试\n\n本章将介绍如何使用 Spring Boot JOOQ Starter，如何使用\
    \ JOOQ Maven Codegen 插件从数据库模式生成代码，以及如何执行各种类型的数据库操作。\n"
- fmt: '# Introduction to JOOQ


    JOOQ is a Java persistence framework that provides typesafe QueryDSL so that you
    can implement the persistence layer of your application in a typesafe manner.
    JOOQ provides code generation tools to generate code based on the database schema
    and you can use that generated code to build typesafe queries.


    You’ll first see how you can use JOOQ to query a database table.


    Create a configuration file named `jooq-config.xml`, as shown in Listing [7-1](#A447991_1_En_7_Chapter.html#Par10).


    ```

    com.mysql.jdbc.Driver

    jdbc:mysql://localhost:3306/test

    root

    admin


    org.jooq.util.JavaGenerator


    org.jooq.util.mysql.MySQLDatabase

    test

    .*


    org.mycompany.myproj.jooq.model

    C:/projects/myproject/src/main/java


    Listing 7-1.

    The jooq-config.xml File

    ```


    Now you can run the following command to generate JOOQ code based on the configuration:


    ```

    java -classpath jooq-3.9.3.jar;jooq-meta-3.9.3.jar;jooq-codegen-3.9.3.jar;mysql-connector-java-5.1.18-bin.jar;.
    org.jooq.util.GenerationTool jooq-config.xml

    ```


    Assume that you have a `POST` table in your database. JOOQ will generate a `POST`
    class based on the `POST` table’s metadata. Now you can use JOOQ to query the
    `POST` table and fetch data, as shown in Listing [7-2](#A447991_1_En_7_Chapter.html#Par14).


    ```

    String userName = "root";

    String password = "admin";

    String url = "jdbc:mysql://localhost:3306/test";

    Class.forName(''com.mysql.jdbc.Driver'');

    Connection conn = DriverManager.getConnection(url, userName, password);

    DSLContext jooq = DSL.using(conn, SQLDialect.MYSQL);

    Result result = jooq.select().from(POST).fetch();

    for (Record r : result)

    {

    Integer id = r.getValue(POST.ID);

    String title = r.getValue(POST.TITLE);

    String content = r.getValue(POST.CONTENT);

    System.out.println("Id: " + id + " title: " + title + " content: " + content);

    }

    Listing 7-2.

    Using the JOOQ DSL API

    ```


    This example creates a database `Connection` and instantiates the `DSLContext`
    object, which is the entry point for using JOOQ QueryDSL. Using the `DSLContext`
    object, it is querying the `POST` table and iterating through the resultset.


    You can integrate JOOQ with the Spring framework so that you don''t have to create
    `Connection` and instantiate `DSLContext` manually. See [https://www.jooq.org/doc/3.9/manual-single-page/#jooq-with-spring](https://www.jooq.org/doc/3.9/manual-single-page/#jooq-with-spring)
    to learn how to integrate Spring with JOOQ.


    Spring Boot provides JOOQ Starter so that you can quickly get up and running with
    JOOQ. You do this by leveraging its autoconfiguration mechanism.


    ## Using Spring Boot’s JOOQ Starter


    Spring Boot provides a starter, called `spring-boot-starter-jooq`, which allows
    you to quickly integrate with JOOQ. This section shows you how to use `spring-boot-starter-jooq`
    using a step-by-step approach.


    ### Configure Spring Boot JOOQ Starter


    Create a Spring Boot Maven-based project and add the `spring-boot-starter-jooq`
    dependency along with H2 and MySQL driver dependencies.


    ```

    org.springframework.boot

    spring-boot-starter-jooq


    org.springframework.boot

    spring-boot-starter-test

    test


    com.h2database

    h2


    mysql

    mysql-connector-java


    ```


    This example uses the H2 in-memory database first, and later you will see how
    to use MySQL.


    ### Database Schema


    Create a simple database with two tables—`POSTS` and `COMMENTS`. Create the database
    creation script called `src/main/resources/schema.sql`, as shown in Listing [7-3](#A447991_1_En_7_Chapter.html#Par23).


    ```

    DROP TABLE IF EXISTS POSTS;

    CREATE TABLE POSTS

    (

    ID int(11) NOT NULL AUTO_INCREMENT,

    TITLE VARCHAR(200) NOT NULL,

    CONTENT LONGTEXT DEFAULT NULL,

    CREATED_ON DATETIME DEFAULT NULL,

    PRIMARY KEY (ID)

    );

    DROP TABLE IF EXISTS COMMENTS;

    CREATE TABLE COMMENTS

    (

    ID INT(11) NOT NULL AUTO_INCREMENT,

    POST_ID INT(11) NOT NULL,

    NAME VARCHAR(200) NOT NULL,

    EMAIL VARCHAR(200) NOT NULL,

    CONTENT LONGTEXT DEFAULT NULL,

    CREATED_ON DATETIME DEFAULT NULL,

    PRIMARY KEY (ID),

    FOREIGN KEY (POST_ID) REFERENCES POSTS(ID)

    );

    Listing 7-3.

    The src/main/resources/schema.sql File

    ```


    Now populate some sample data using the `src/main/resources/data.sql` script,
    as shown in Listing [7-4](#A447991_1_En_7_Chapter.html#Par25).


    ```

    insert into posts(id, title, content, created_on)

    values(1, ''Post 1'', ''This is post 1'', ''2017-01-03'');

    insert into posts(id, title, content, created_on)

    values(2, ''Post 2'', ''This is post 2'', ''2017-01-05'');

    insert into posts(id, title, content, created_on)

    values(3, ''Post 3'', ''This is post 3'', ''2017-01-07'');

    insert into comments(id, post_id, name, email, content, created_on)

    values(1, 1, ''User1'', ''user1@gmail.com'', ''This is comment 1 on post 1'',
    ''2017-01-07'');

    insert into comments(id, post_id, name, email, content, created_on)

    values(2, 1, ''User2'', ''user2@gmail.com'', ''This is comment 2 on post 1'',
    ''2017-01-07'');

    insert into comments(id, post_id, name, email, content, created_on)

    values(3, 2, ''User1'', ''user1@gmail.com'', ''This is comment 1 on post 2'',
    ''2017-01-07'');

    Listing 7-4.

    The src/main/resources/data.sql File

    ```


    ### Code Generation Using the JOOQ Maven Codegen Plugin


    JOOQ provides the JOOQ Maven Codegen plugin to generate database artifacts using
    Maven goals. In this section, you see how to use Maven profiles to configure the
    `jooq-codegen-maven` configuration properties based on database type. See Listing
    [7-5](#A447991_1_En_7_Chapter.html#Par27).


    ```


    h2


    org.jooq

    jooq-codegen-maven


    generate


    com.h2database

    h2

    ${h2.version}


    org.h2.Driver

    jdbc:h2:ʿ/springbootjooq


    org.jooq.util.DefaultGenerator


    org.jooq.util.h2.H2Database

    .*


    PUBLIC


    com.apress.demo.jooq.domain

    gensrc/main/java


    mysql


    org.jooq

    jooq-codegen-maven


    generate


    mysql

    mysql-connector-java

    ${mysql.version}


    com.mysql.jdbc.Driver

    jdbc:mysql://localhost:3306/test

    root

    admin


    org.jooq.util.DefaultGenerator


    org.jooq.util.mysql.MySQLDatabase

    .*


    test


    com.apress.demo.jooq.domain

    gensrc/main/java


    Listing 7-5.

    The jooq-codegen-maven Plugin Configuration in the pom.xml File

    ```


    This example configures two profiles (`h2` and `mysql`) with the appropriate JDBC
    configuration parameters. It generates the code artifacts and places them in the
    `com.apress.demo.jooq.domain` package within the `gensrc/main/java` directory.


    You can run the Maven build that activates the `h2` or `mysql` profile, as follows:


    ```

    mvn clean install -P h2 (or) mvn clean install -P mysql

    ```


    ### Add JOOQ Generated Code as a Source Folder


    Next, you have to configure `build-helper-maven-plugin` so that Maven will add
    the JOOQ generated code to the `gensrc/main/java` directory as a source folder.


    ```

    org.codehaus.mojo

    build-helper-maven-plugin


    generate-sources


    add-source


    gensrc/main/java


    ```


    ### Domain Objects


    This section shows how to create the following domain objects, which can be used
    to pass data across the layers. It uses only JOOQ generated database artifacts
    to talk to the database. See Listing [7-6](#A447991_1_En_7_Chapter.html#Par34).


    ```

    package com.apress.demo.entities;

    public class Post

    {

    private Integer id;

    private String title;

    private String content;

    private Timestamp createdOn;

    private List comments = new ArrayList();

    //setters & getters

    }

    package com.apress.demo.entities;

    public class Comment

    {

    private Integer id;

    private Integer postId;

    private String name;

    private String email;

    private String content;

    private Timestamp createdOn;

    //setters & getters

    }

    Listing 7-6.

    Domain Objects Post.java and Comment.java

    ```'
