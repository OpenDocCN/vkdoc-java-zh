    )`。然后你可以将 `403.html` 文件放在 `src/main/resources/public/error/` 文件夹中，该文件将被 Spring\
    \ Boot 错误处理机制自动拾取。\n\n在运行此应用程序之前，你需要使用一些 `users` 和 `roles` 的示例数据初始化数据库，如清单 13-11\
