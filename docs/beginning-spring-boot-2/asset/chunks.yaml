    ```


    This file creates a base image called `ubuntu:14.04` by using the `FROM` command.
    You can optionally provide author details using the `MAINTAINER` command.


    Next, the code runs the commands to install the `apache2` web server using the
    `RUN` command, which will be executed during the image-building time.


    Finally, this code runs the `echo` command with the `Dockerfile demo` argument,
    using the `CMD` command. You can use the `CMD` command to specify which command
    should be executed when you launch the container. You can override the `CMD` command
    while launching the container by specifying the command as an argument to the
    `docker run` command.


    You should have only one `CMD` command in a `Dockerfile`. Even if you specify
    multiple `CMD` commands, only the last one will be considered.


    You can use the `docker build` command to build an image from `Dockerfile` and
    tag it with name using the `-t` flag. Run the following command from the same
    directory having `Dockerfile`:


    ```

    sudo docker build -t my-apache2.

    ```


    Note the dot at the end of the command. This indicates the location of `Dockerfile`,
    which is the current directory.


    You can use the `docker images` command to list all the images that are available
    locally.


    Now you can launch a container from the `my-apache2` image by using the `docker
    run` command as follows:


    ```

    sudo docker run my-apache2

    ```


    This command should print `Dockerfile demo` on the console.


    You can use the `sudo docker ps` command to display the running container details.


    Now that you have a basic understand of how to work with Docker, in the next section,
    you will see how to package and run a Spring Boot application in a Docker container.


    ## Running a Spring Boot Application in a Docker Container


    You are going to use the application you built for deploying Spring Boot on Heroku
    in the previous section. Create `Dockerfile` in the root of the project, as follows:


    ```

    FROM java:8

    ADD target/springboot-heroku-demo.jar app.jar

    RUN bash -c ''touch /app.jar''

    ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-jar","/app.jar"]

    ```


    This code uses `java:8` as the base image. It copies `target/springboot-heroku-demo.jar`
    into the target image with the name `app.jar`. Finally, it invokes the `java -jar
    app.jar` command using `ENTRYPOINT`.


    Before building the Docker image, you first need to build the application:


    ```

    springboot-heroku-demo> mvn clean package

    ```


    Now you can run the `docker build` command as follows:


    ```

    docker build -t sivaprasadreddy/springboot-heroku-demo .

    ```


    Here, you are tagging the image with the name `sivaprasadreddy/springboot-heroku-demo`.
    As you haven’t activated any profiles, the default profile will be active and
    the application will use the `H2` in-memory database.


    Now launch the container from the `sivaprasadreddy/springboot-heroku-demo` image,
    as follows:


    ```

    docker run -d \

    --name springboot-heroku-demo \

    -p 80:8080 \

    sivaprasadreddy/springboot-heroku-demo

    ```


    You are running the container by giving it the name `springboot-heroku-demo` and
    exposing the container’s port `8080` on the Docker host machine at port `80`.


    Now you’ll see how to launch a Postgres database in one Docker container and then
    launch the application in another container using the Postgres database from the
    first container.


    You can launch a Postgres database container by using the `postgres` image as
    follows:


    ```

    docker run --name demo-postgres \

    -e POSTGRES_DB=demodb  \

    -e POSTGRES_USER=postgres \

    -e POSTGRES_PASSWORD=secret123 \

    -d postgres

    ```


    This code launches a `postgres` container in detached mode by using the `-d` flag
    and gives it the name `demo-postgres`. It also specifies the database name, username,
    and password as environment variables by using `-e` flags.


    Now you’ll create the Docker profile configuration file `application-docker.properties`
    as follows:'
