- fmt: "# Developing Web Application Using Spring Boot\n\nSpring Boot provides the\
    \ Web starter `spring-boot-starter-web` for developing web applications using\
    \ Spring MVC. Spring Boot autoconfiguration registers the SpringMVC beans like\
    \ `DispatcherServlet`, `ViewResolver`s, `ExceptionHandler`s, etc. You can develop\
    \ a Spring Boot web application as a JAR type module using an embedded servlet\
    \ container or as a WAR type module, which can be deployed on any external servlet\
    \ container.\n\n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-web</artifactId>\n</dependency>\n```\n\n\
    The `spring-boot-starter-web` starter by default configures `DispatcherServlet`\
    \ to the URL pattern `\"/\"` and adds Tomcat as the embedded servlet container,\
    \ which runs on port 8080.\n\nSpring Boot by default serves the static resources\
    \ (HTML, CSS, JS, images, etc.) from the following `CLASSPATH` locations:\n\n\
    *   `/static`\n*   `/public`\n*   `/resources`\n*   `/META-INF/resources`\n\n\
    In addition to these locations, you can also use WebJars ( [http://www.webjars.org/](http://www.webjars.org/)\
    \ ) for serving static resources. Spring Boot automatically serves any request\
    \ to the `/webjars/` path from the WebJars JAR files. You can override the static\
    \ resource locations by configuring the `spring.resources.staticLocations` property\
    \ in the `application.properties` file.\n\n```\nspring.resources.staticLocations=classpath:/assets/\n\
    ```\n\nNow you’ll see how to create a Spring Boot Web project, display a simple\
    \ HTML page, and use static resources like CSS and images. Bootstrap ( [http://getbootstrap.com/](http://getbootstrap.com/)\
    \ ) is a popular CSS framework. This example adds Bootstrap CSS to the project\
    \ using WebJars.\n\n1.  Create a Spring Boot Maven project with the Web starter\
    \ and add the Bootstrap WebJars dependency.\n\n    ```\n    <dependency>\n   \
    \     <groupId>org.springframework.boot</groupId>\n        <artifactId>spring-boot-starter-web</artifactId>\n\
    \    </dependency>\n    <dependency>\n        <groupId>org.webjars.bower</groupId>\n\
    \        <artifactId>bootstrap</artifactId>\n        <version>3.3.7</version>\n\
    \    </dependency>\n    ```\n\n2.  Create the `styles.css` stylesheet in the `src/main/resources/static/css`\
    \ folder.\n\n    ```css\n    body {\n        background-color: #A7A5A4;\n    \
    \    padding-top: 50px;\n    }\n    ```\n\n3.  Copy an image, such as `spring-boot.png`,\
    \ into the `src/main/resources/static/images` folder.  \n4.  Create the `index.html`\
    \ file in the `src/main/resources/public` folder and add `bootstrap.css` to the\
    \ `index.html` file. Use the Bootstrap navigation bar component.\n\n    ```html\n\
    \    <!DOCTYPE html>\n    <html>\n    <head>\n        <title>Home</title>\n  \
    \      <meta charset=\"UTF-8\">\n        <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1.0\">\n        <link href=\"webjars/bootstrap/3.3.7/css/bootstrap.min.css\"\
    \ rel=\"stylesheet\">\n        <link href=\"css/styles.css\" rel=\"stylesheet\"\
    >\n    </head>\n    <body>\n        <nav class=\"navbar navbar-inverse navbar-fixed-top\"\
    >\n            <div class=\"container\">\n                <div class=\"navbar-header\"\
    >\n                    <button type=\"button\" class=\"navbar-toggle collapsed\"\
    \ data-toggle=\"collapse\" data-target=\"#navbar\" aria-expanded=\"false\" aria-controls=\"\
    navbar\">\n                        <span class=\"sr-only\">Toggle navigation</span>\n\
    \                        <span class=\"icon-bar\"></span>\n                  \
    \      <span class=\"icon-bar\"></span>\n                        <span class=\"\
    icon-bar\"></span>\n                    </button>\n                    <a class=\"\
    navbar-brand\" href=\"#\">Project name</a>\n                </div>\n         \
    \       <div id=\"navbar\" class=\"collapse navbar-collapse\">\n             \
    \       <ul class=\"nav navbar-nav\">\n                        <li class=\"active\"\
    ><a href=\"#\">Home</a></li>\n                        <li><a href=\"#about\">About</a></li>\n\
    \                        <li><a href=\"#contact\">Contact</a></li>\n         \
    \           </ul>\n                </div>\n            </div>\n        </nav>\n\
    \        <div class=\"container\">\n            <div class=\"jumbotron\">\n  \
    \              <h1>Hello World!!</h1>\n            </div>\n        </div>\n  \
    \  </body>\n    </html>\n    ```\n\n5.  Create an application entry point class.\n\
    \n    ```java\n    @SpringBootApplication\n    public class SpringbootWebDemoApplication\
    \ {\n        public static void main(String[] args) {\n            SpringApplication.run(SpringbootWebDemoApplication.class,\
    \ args);\n        }\n    }\n    ```\n\nNow run the `SpringbootWebDemoApplication`\
    \ and navigate to `http://localhost:8080/`. You should be able to see the web\
    \ page with the Bootstrap navigation bar, as shown in Figure [10-2](#A447991_1_En_10_Chapter.html#Fig2).\n\
    \n![A447991_1_En_10_Fig2_HTML.jpg](A447991_1_En_10_Fig2_HTML.jpg)\n\nFigure 10-2.\
    \ Web page with bootstrap components using WebJars\n\nBy default, the Spring Boot\
    \ Web starter uses Tomcat as the embedded servlet container and runs on port 8080.\
    \ However, you can customize the server properties using `server.*` in `application.properties`.\n\
    \n```\nserver.port=9090\nserver.servlet.context-path=/demo\nserver.servlet.path=/app\n\
    ```\n\nWith these customizations, `DispatcherServlet` is configured to handle\
    \ the URL pattern `/app`, the root `contextPath` will be `/demo`, and Tomcat now\
    \ runs on port `9090`. So, you would access the `index.html` file at `http://localhost:9090/demo/app/`.\n\
    \n## Using the Tomcat, Jetty, and Undertow Embedded Servlet Containers\n\nAs mentioned,\
    \ the Spring Boot Web starter includes Tomcat as the embedded servlet container\
    \ by default. Instead of Tomcat, though, you can use other servlet containers\
    \ like Jetty or Undertow.\n\nTo use Jetty as the embedded container, you simply\
    \ need to exclude `spring-boot-starter-tomcat` and add `spring-boot-starter-jetty`.\n\
    \n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-web</artifactId>\n\
    \    <exclusions>\n        <exclusion>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-tomcat</artifactId>\n        </exclusion>\n\
    \    </exclusions>\n</dependency>\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-jetty</artifactId>\n</dependency>\n```\n\n\
    Undertow ( [http://undertow.io/](http://undertow.io/) ) is a web server written\
    \ in Java. It provides blocking and non-blocking APIs based on NIO. Spring Boot\
    \ provides autoconfiguration support for the Undertow server as well. Similar\
    \ to what you saw with Jetty, you can configure Spring Boot to use the Undertow\
    \ embedded server instead of Tomcat as follows:\n\n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-web</artifactId>\n    <exclusions>\n    \
    \    <exclusion>\n            <groupId>org.springframework.boot</groupId>\n  \
    \          <artifactId>spring-boot-starter-tomcat</artifactId>\n        </exclusion>\n\
    \    </exclusions>\n</dependency>\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-undertow</artifactId>\n</dependency>\n```\n\
    \nYou can customize various properties of the Tomcat, Jetty, and Undertow servlet\
    \ containers using the `server.tomcat.*`, `server.jetty.*`, and `server.undertow.*`\
    \ properties, respectively.\n\n```\nserver.tomcat.accesslog.directory=logs # Directory\
    \ in which log files are created.\nserver.tomcat.accesslog.enabled=false # Enable\
    \ access log.\nserver.tomcat.accesslog.file-date-format=.yyyy-MM-dd # Date format\
    \ to place in log file name.\nserver.tomcat.basedir= # Tomcat base directory.\
    \ If not specified a temporary directory will be used.\nserver.tomcat.max-connections=\
    \ # Maximum number of connections that the server will accept and process at any\
    \ given time.\nserver.tomcat.max-http-header-size=0 # Maximum size in bytes of\
    \ the HTTP message header.\nserver.tomcat.max-http-post-size=0 # Maximum size\
    \ in bytes of the HTTP post content.\nserver.tomcat.max-threads=0 # Maximum amount\
    \ of worker threads.\nserver.tomcat.min-spare-threads=0 # Minimum amount of worker\
    \ threads.\nserver.tomcat.port-header=X-Forwarded-Port # Name of the HTTP header\
    \ used to override the original port value.\nserver.jetty.acceptors= # Number\
    \ of acceptor threads to use.\nserver.jetty.accesslog.append=false # Append to\
    \ log.\nserver.jetty.accesslog.date-format=dd/MMM/yyyy:HH:mm:ss Z\nserver.jetty.accesslog.enabled=false\
    \ # Enable access log.\nserver.jetty.accesslog.filename= # Log filename. If not\
    \ specified, logs will be redirected to \"System.err\".\nserver.jetty.accesslog.log-cookies=false\
    \ # Enable logging of the request cookies.\nserver.jetty.accesslog.log-latency=false\
    \ # Enable logging of request processing time.\nserver.jetty.max-http-post-size=0\
    \ # Maximum size in bytes of the HTTP post or put content.\nserver.undertow.accesslog.dir=\
    \ # Undertow access log directory.\nserver.undertow.accesslog.enabled=false #\
    \ Enable access log.\nserver.undertow.accesslog.rotate=true # Enable access log\
    \ rotation.\nserver.undertow.accesslog.suffix=log # Log file name suffix.\nserver.undertow.buffer-size=\
    \ # Size of each buffer in bytes.\nserver.undertow.io-threads= # Number of I/O\
    \ threads to create for the worker.\nserver.undertow.max-http-post-size=0 # Maximum\
    \ size in bytes of the HTTP post content.\n```\n\nUse the `org.springframework.boot.autoconfigure.web.ServerProperties`\
    \ class to see a complete list of server customization properties."
