    ## Installing MongoDB


    MongoDB supports a wide variety of platforms, including the Windows, Linux, and
    MacOS operating systems. To get a complete list of supported platforms, see [`https://docs.mongodb.com/manual/installation/#supported-platforms`](https://docs.mongodb.com/manual/installation/#supported-platforms).


    **Note**


    We use the MongoDB Community Server in this book.


    ### Installing MongoDB on Windows


    Download the latest version of MongoDB from [`https://www.mongodb.com/download-center`](https://www.mongodb.com/download-center).
    Run the MSI installer and choose an installation directory, say `C:\Apps`. In
    that case, MongoDB server will be installed at `C:\Apps\MongoDB\Server\3.4`.


    MongoDB requires a data directory to store its files. The default location for
    the MongoDB data folder on Windows is `C:\data\db`. You can either create the
    data directory structure `C:\data\db` or pass a custom location of the data directory
    as an argument, as follows:


    ```

    C:\Apps\MongoDB\Server\3.4\bin>mongod.exe --dbpath " C:\Apps\MongoDB\Server\3.4\data"

    ```


    After you run this command, MongoDB should start on default port `27017`. Instead
    of running this command and passing all the configuration options every time,
    you can create a config file and batch script to start MongoDB.


    For example, you could create `mongod.cfg` in the `C:\Apps\MongoDB\Server\3.4`
    directory with the content shown in Listing [9-2](#A447991_1_En_9_Chapter.html#Par12).


    ```

    systemLog:

    destination: file

    path: C:/Apps/MongoDB/Server/3.4/logs/mongo.log

    storage:

    dbPath: C:/Apps/MongoDB/Server/3.4/data/db

    net:

    bindIp: 127.0.0.1

    port: 27017

    Listing 9-2.

    MongoDB Server Configuration File Called mongod.cfg

    ```


    You create `start-mongo.bat` in the `C:\Apps\MongoDB\Server\3.4` directory as
    follows:


    ```

    bin\mongod.exe --config C:\Apps\MongoDB\Server\3.4\mongod.cfg

    ```


    Now you can simply start the MongoDB server as follows:


    ```

    C:\Apps\MongoDB\Server\3.4>start-mongo.bat

    ```


    **Note**


    Make sure that the data and logs directories are already created before starting
    MongoDB.


    You can learn more about the MongoDB server configuration options at [`https://docs.mongodb.com/manual/reference/configuration-options/`](https://docs.mongodb.com/manual/reference/configuration-options/).


    ### Installing MongoDB on MacOS


    The easiest way to install the MongoDB server on MacOS is by using Homebrew. See
    [`https://brew.sh/`](https://brew.sh/) on how to install Homebrew. Once Homebrew
    is installed, you need to update Homebrew''s package database and install the
    MongoDB package as follows:


    ```

    > brew update

    > brew install mongodb

    ```


    On MacOS, the default data directory is `/data/db`. Make sure that the data directory
    has read-write permission. You can start the Mongo server without specifying the
    `dbpath`, which means it will use the default data directory, or you can pass
    a custom data directory location as follows:


    ```

    > mongod --dbpath /Users/username/mongodb/data

    ```


    For alternative options for installing MongoDB on MacOS, see [`https://docs.mongodb.com/manual/tutorial/install-mongodb-on-os-x/`](https://docs.mongodb.com/manual/tutorial/install-mongodb-on-os-x/).


    ### Installing MongoDB on Linux


    MongoDB provides packages for most of the popular Linux distributions. For installation
    instructions of your specific Linux distribution, refer to [`https://docs.mongodb.com/manual/administration/install-on-linux/`](https://docs.mongodb.com/manual/administration/install-on-linux/).'
