    @Controller\npublic class HomeController\n{\n@Autowired\nprivate UserRepository\
    \ userRepo;\n@RequestMapping(\"/\")\npublic String home(Model model)\n{\nmodel.addAttribute(\"\
    users\", userRepo.findAll());\nreturn \"index\";\n}\n}\n```\n*Listing 1-13.* `com.apress.demo.web.controllers.HomeController.java`\
    \ File\n\n9.  Create a Thymeleaf view called `index.html` in the `/WEB-INF/views/`\
    \ folder to render a list of users, as shown in Listing [1-14](#A447991_1_En_1_Chapter.html#Par69).\n\
    \n```html\nHome\n\nApp Title\n\nId\n    Name\n\nId\n    Name\n```\n*Listing 1-14.*\
    \ `src/main/webapp/WEB-INF/views/index.html` File\n\n- Marked it as a Spring `Configuration`\
    \ class using the `@Configuration` annotation.\n- Enabled Annotation-based transaction\
    \ management using `@EnableTransactionManagement`.\n- Configured `@EnableJpaRepositories`\
    \ to indicate where to look for Spring Data JPA repositories.\n- Configured the\
    \ `PropertyPlaceHolder` bean using the `@PropertySource` annotation and `PropertySourcesPlaceholderConfigurer`\
    \ bean definition, which loads properties from the `application.properties` file.\n\
    - Defined beans for `DataSource`, JPA `EntityManagerFactory`, and `JpaTransactionManager`.\n\
    - Configured the `DataSourceInitializer` bean to initialize the database by executing\
    \ the `data.sql` script on application start-up.\n\nYou are all set now to run\
    \ the application. But before that, you need to download and configure a server\
    \ like Tomcat, Jetty, or Wildflyetc in your IDE. You can download Tomcat 8 and\
    \ configure your favorite IDE, run the application, and point your browser to\
    \ `http://localhost:8080/springmvcjpa-demo`. If you do, you should see the list\
    \ of user details in a table, as shown in Figure [1-1](#A447991_1_En_1_Chapter.html#Fig1).\n\
    \n![A447991_1_En_1_Fig1_HTML.jpg](A447991_1_En_1_Fig1_HTML.jpg)\n\n*Figure 1-1.*\
    \ Showing a list of users\n\nYay…you did it. But wait, isn’t it too much work\
    \ to just show a list of user details pulled from a database table?\n\nLet’s be\
    \ honest and fair. All this configuration is not just for this one use-case. This\
    \ configuration becomes the basis for the rest of the application. Again, this\
    \ is too much work to do if you want to quickly get up and running. Another problem\
    \ with it is, assume that you want to develop another SpringMVC application with\
    \ a similar technical stack. You could copy and paste the configuration and tweak\
    \ it. Right?\n\nRemember one thing: if you have to do the same thing again and\
    \ again, you should find an automated way to do it.\n\nApart from writing the\
    \ same configuration again and again, do you see any other problems here? Let’s\
    \ take a look at the problems I am seeing here.\n\n- You need to hunt through\
    \ all the compatible libraries for the specific Spring version and configure them.\n\
    - Most of the time, you’ll configure the `DataSource`, `EntitymanagerFactory`,\
    \ `TransactionManager`, etc. beans the same way. Wouldn’t it be great if Spring\
    \ could do it for you automatically?\n- Similarly, you configure the SpringMVC\
    \ beans like `ViewResolver`, `MessageSource`, etc. the same way most of the time.\
    \ If Spring can automatically do it for you, that would be awesome.\n\nWhat if\
    \ Spring is capable of configuring beans automatically? What if you can customize\
    \ the automatic configuration using simple customizable properties?\n\nFor example,\
    \ instead of mapping the `DispatcherServlet url-pattern` to `/`, you want to map\
    \ it to `/app/`. Instead of putting Thymeleaf views in the `/WEB-INF/views` folder,\
    \ you want to place them in the `/WEB-INF/templates/` folder.\n\nSo basically\
    \ you want Spring to do things automatically, yet provide the flexibility to override\
    \ the default configuration in a simpler way. You are about to enter the world\
    \ of Spring Boot, where your dreams can come true!\n\n## A Quick Taste of Spring\
    \ Boot\n\nWelcome to Spring Boot! Spring Boot will configure application components\
    \ automatically for you, but allows you to override the defaults if you want to.\n\
    \nInstead of explaining this in theory, I prefer to explain by example. In this\
    \ section, you’ll see how to implement the same application, this time using Spring\
    \ Boot.\n\n1.  Create a Maven-based Spring Boot project and configure the dependencies\
    \ in the `pom.xml` file, as shown in Listing [1-15](#A447991_1_En_1_Chapter.html#Par84).\n\
    \n    ```xml\n    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n    <project xmlns=\"\
    http://maven.apache.org/POM/4.0.0\"\n             xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n             xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n      \
    \       http://maven.apache.org/xsd/maven-4.0.0.xsd\">\n        <modelVersion>4.0.0</modelVersion>\n\
    \        <groupId>com.apress</groupId>\n        <artifactId>hello-springboot</artifactId>\n\
    \        <version>1.0-SNAPSHOT</version>\n        <packaging>jar</packaging>\n\
    \        <name>hello-springboot</name>\n\n        <parent>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-parent</artifactId>\n           \
    \ <version>2.0.0.RELEASE</version>\n        </parent>\n\n        <properties>\n\
    \            <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n\
    \            <java.version>1.8</java.version>\n        </properties>\n\n     \
    \   <dependencies>\n            <dependency>\n                <groupId>org.springframework.boot</groupId>\n\
    \                <artifactId>spring-boot-starter-data-jpa</artifactId>\n     \
    \       </dependency>\n            <dependency>\n                <groupId>org.springframework.boot</groupId>\n\
    \                <artifactId>spring-boot-starter-web</artifactId>\n          \
    \  </dependency>\n            <dependency>\n                <groupId>org.springframework.boot</groupId>\n\
    \                <artifactId>spring-boot-starter-thymeleaf</artifactId>\n    \
    \        </dependency>\n            <dependency>\n                <groupId>mysql</groupId>\n\
    \                <artifactId>mysql-connector-java</artifactId>\n            </dependency>\n\
    \        </dependencies>\n\n        <build>\n            <plugins>\n         \
    \       <plugin>\n                    <groupId>org.springframework.boot</groupId>\n\
    \                    <artifactId>spring-boot-maven-plugin</artifactId>\n     \
    \           </plugin>\n            </plugins>\n        </build>\n    </project>\n\
    \    ```\n    *Listing 1-15.* `pom.xml` File\n\n    Wow, this `pom.xml` file suddenly\
    \ become so small! Note: Don’t worry if this configuration doesn’t make sense\
    \ at this point in time. You have plenty more to learn in coming chapters. If\
    \ you want to use any `MILESTONE` or `SNAPSHOT` version of Spring Boot, you need\
    \ to configure the following milestone/snapshot repositories in `pom.xml`.\n\n\
    \    ```xml\n    <repositories>\n        <repository>\n            <id>spring-snapshots</id>\n\
    \            <name>Spring Snapshots</name>\n            <url>https://repo.spring.io/snapshot</url>\n\
    \            <snapshots>\n                <enabled>true</enabled>\n          \
    \  </snapshots>\n        </repository>\n        <repository>\n            <id>spring-milestones</id>\n\
    \            <name>Spring Milestones</name>\n            <url>https://repo.spring.io/milestone</url>\n\
    \            <snapshots>\n                <enabled>false</enabled>\n         \
    \   </snapshots>\n        </repository>\n    </repositories>\n    <pluginRepositories>\n\
    \        <pluginRepository>\n            <id>spring-snapshots</id>\n         \
    \   <name>Spring Snapshots</name>\n            <url>https://repo.spring.io/snapshot</url>\n\
    \            <snapshots>\n                <enabled>true</enabled>\n          \
    \  </snapshots>\n        </pluginRepository>\n        <pluginRepository>\n   \
    \         <id>spring-milestones</id>\n            <name>Spring Milestones</name>\n\
    \            <url>https://repo.spring.io/milestone</url>\n            <snapshots>\n\
    \                <enabled>false</enabled>\n            </snapshots>\n        </pluginRepository>\n\
    \    </pluginRepositories>\n    ```\n\n2.  Configure datasource/JPA properties\
    \ in `src/main/resources/application.properties`, as shown in Listing [1-16](#A447991_1_En_1_Chapter.html#Par90).\n\
    \n    ```properties\n    spring.datasource.driver-class-name=com.mysql.jdbc.Driver\n\
    \    spring.datasource.url=jdbc:mysql://localhost:3306/test\n    spring.datasource.username=root\n\
    \    spring.datasource.password=admin\n    spring.datasource.initialize=true\n\
    \    spring.jpa.hibernate.ddl-auto=update\n    spring.jpa.show-sql=true\n    ```\n\
    \    *Listing 1-16.* `src/main/resources/application.properties` File\n\n    Copy\
    \ the same `data.sql` file into the `src/main/resources` folder.\n\n3.  Create\
    \ a JPA Entity called `User.java`, Spring Data JPA Repository Interface called\
    \ `UserRepository.java`, and controller called `HomeController.java`, as shown\
    \ in the previous `springmvc-jpa-demo` application.\n\n4.  Create a Thymeleaf\
    \ view to show the list of users. You can copy `/WEB-INF/views/index.html`, which\
    \ you created in the `springmvc-jpa-demo` application, into the `src/main/resources/templates`\
    \ folder of this new project.\n\n5.  Create a Spring Boot `EntryPoint` class `Application.java`\
    \ with the main method, as shown in Listing [1-17](#A447991_1_En_1_Chapter.html#Par95).\n\
    \n    ```java\n    package com.apress.demo;\n    import org.springframework.boot.SpringApplication;\n\
    \    import org.springframework.boot.autoconfigure.SpringBootApplication;\n  \
    \  @SpringBootApplication\n    public class Application\n    {\n    public static\
    \ void main(String[] args)\n    {\n    SpringApplication.run(Application.class,\
    \ args);\n    }\n    }\n    ```\n    *Listing 1-17.* `com.apress.demo.Application.java`\
    \ File\n\nNow run `Application.java` as a Java application and point your browser\
    \ to `http://localhost:8080/`. You should see the list of users in a table format.\n\
    \nBy you might be scratching your head, thinking “What is going on?”. The next\
    \ section explains what just happened."
