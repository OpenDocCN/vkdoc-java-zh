  raw: "```\n    @Target(ElementType.TYPE)\n    @Retention(RetentionPolicy.RUNTIME)\n\
    \    @Documented\n    @Configuration\n    public @interface SpringBootConfiguration\
    \ {\n    }\n    ```\n\nHere are the meanings of these annotations:\n    *   `@Configuration`\
    \ indicates that this class is a Spring configuration class.\n    *   `@ComponentScan`\
    \ enables component scanning for Spring beans in the package in which the current\
