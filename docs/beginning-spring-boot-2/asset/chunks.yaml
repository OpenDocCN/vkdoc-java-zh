- fmt: "# Your First Spring Boot Application\n\nThere are many ways to create a Spring\
    \ Boot application. The simplest way is to use Spring Initializr at [`http://start.spring.io/`](http://start.spring.io/),\
    \ which is an online Spring Boot application generator. In this section, you’ll\
    \ see how to create a simple Spring Boot web application serving a simple HTML\
    \ page and explore various aspects of a typical Spring Boot application.\n\n##\
    \ Using Spring Initializr\n\nYou can point your browser to [`http://start.spring.io/`](http://start.spring.io/)\
    \ and see the project details, as shown in Figure 2-1.\n\n1. Select Maven Project\
    \ and Spring Boot version (as of writing this book, the latest version is 2.0.0—SNAPSHOT).\n\
    2. Enter the Maven project details as follows:\n   * Group: `com.apress`\n   *\
    \ Artifact: `springboot-basic`\n   * Name: `springboot-basic`\n   * Package Name:\
    \ `com.apress.demo`\n   * Packaging: JAR\n   * Java version: 1.8\n   * Language:\
    \ Java\n3. You can search for the starters if you are already familiar with their\
    \ names or click on the Switch to the Full Version link to see all the available\
    \ starters. You’ll see many starter modules organized into various categories,\
    \ like Core, Web, Data, etc. Select the Web checkbox from the Web category.\n\
    4. Click on the Generate Project button.\n\n![A447991_1_En_2_Fig1_HTML.jpg](A447991_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1. Spring Initializr\n\nNow you can extract the downloaded ZIP file\
    \ and import it into your favorite IDE.\n\n## Using the Spring Tool Suite\n\n\
    The Spring Tool Suite (STS: [`https://spring.io/tools/sts`](https://spring.io/tools/sts))\
    \ is an extension of the Eclipse IDE with lots of Spring framework related plugins.\
    \ You can easily create a Spring Boot application from STS by selecting File ➤\
    \ New ➤ Other ➤ Spring ➤ Spring Starter Project ➤ Next. You will see the wizard,\
    \ which looks similar to the Spring Initializr (Figure 2-2).\n\n![A447991_1_En_2_Fig2_HTML.jpg](A447991_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2. STS New Spring Starter Project wizard\n\nEnter the project details\
    \ and click Next. Then select the latest Spring Boot Version and Web starter (Figure\
    \ 2-3) and click Finish.\n\n![A447991_1_En_2_Fig3_HTML.jpg](A447991_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3. STS Spring Starters selection wizard\n\nThe Spring Boot project\
    \ will be created and automatically imported into the STS IDE.\n\n## Using Intellij\
    \ IDEA\n\nIntellij IDEA is a powerful commercial IDE with great features, including\
    \ support for Spring Boot. You can create a Spring Boot project from Intellij\
    \ IDEA by selecting File ➤ New ➤ Project ➤ Spring Initializr ➤ Next. Enter the\
    \ project details and click Next. Then select the starters and click Next. Finally,\
    \ enter the project name and click Finish.\n\n> **Note**: Spring framework support\
    \ comes only with the commercial Intellij IDEA Ultimate Edition, not with the\
    \ Community Edition, which is free. If you want to use the Intellij IDEA Community\
    \ Edition, you can generate the project using Spring Initializr and import it\
    \ into Intellij IDEA as a Maven/Gradle project.\n\n## Using NetBeans IDE\n\nThe\
    \ NetBeans IDE is another popular IDE for developing Java applications. As of\
    \ now, there is no out-of-the-box support for creating Spring Boot projects in\
    \ NetBeans, but the community built the NB Spring Boot plugin (see [`https://github.com/AlexFalappa/nb-springboot`](https://github.com/AlexFalappa/nb-springboot)),\
    \ which supports creating Spring Boot applications directly from the IDE.\n\n\
    > **Note**: There are some other options for quickly using Spring Boot, by using\
    \ Spring Boot CLI and SDKMAN. You can find more details at “Installing Spring\
    \ Boot” at: [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started-installing-spring-boot`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started-installing-spring-boot).\n\
    \n## Exploring the Project\n\nNow that you created a Spring Boot Maven-based project\
    \ with the `web` starter, you’re ready to explore what is contained in the generated\
    \ application.\n\n1. First, take a look at the `pom.xml` file, as shown in Listing\
    \ 2-1.\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\"\
    http://maven.apache.org/POM/4.0.0\"\n         xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n         xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress</groupId>\n\
    \    <artifactId>springboot-basic</artifactId>\n    <version>0.0.1-SNAPSHOT</version>\n\
    \    <packaging>jar</packaging>\n    <name>springboot-basic</name>\n    <description>Demo\
    \ project for Spring Boot</description>\n\n    <parent>\n        <groupId>org.springframework.boot</groupId>\n\
    \        <artifactId>spring-boot-starter-parent</artifactId>\n        <version>2.0.0.BUILD-SNAPSHOT</version>\n\
    \    </parent>\n\n    <properties>\n        <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n\
    \        <project.reporting.outputEncoding>UTF-8</project.reporting.outputEncoding>\n\
    \        <java.version>1.8</java.version>\n    </properties>\n\n    <repositories>\n\
    \        <repository>\n            <id>spring-snapshots</id>\n            <name>Spring\
    \ Snapshots</name>\n            <url>https://repo.spring.io/snapshot</url>\n \
    \           <snapshots>\n                <enabled>true</enabled>\n           \
    \ </snapshots>\n        </repository>\n        <repository>\n            <id>spring-milestones</id>\n\
    \            <name>Spring Milestones</name>\n            <url>https://repo.spring.io/milestone</url>\n\
    \            <snapshots>\n                <enabled>false</enabled>\n         \
    \   </snapshots>\n        </repository>\n    </repositories>\n\n    <pluginRepositories>\n\
    \        <pluginRepository>\n            <id>spring-snapshots</id>\n         \
    \   <name>Spring Snapshots</name>\n            <url>https://repo.spring.io/snapshot</url>\n\
    \            <snapshots>\n                <enabled>true</enabled>\n          \
    \  </snapshots>\n        </pluginRepository>\n        <pluginRepository>\n   \
    \         <id>spring-milestones</id>\n            <name>Spring Milestones</name>\n\
    \            <url>https://repo.spring.io/milestone</url>\n            <snapshots>\n\
    \                <enabled>false</enabled>\n            </snapshots>\n        </pluginRepository>\n\
    \    </pluginRepositories>\n\n    <dependencies>\n        <dependency>\n     \
    \       <groupId>org.springframework.boot</groupId>\n            <artifactId>spring-boot-starter-web</artifactId>\n\
    \        </dependency>\n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-test</artifactId>\n            <scope>test</scope>\n\
    \        </dependency>\n    </dependencies>\n\n    <build>\n        <plugins>\n\
    \            <plugin>\n                <groupId>org.springframework.boot</groupId>\n\
    \                <artifactId>spring-boot-maven-plugin</artifactId>\n         \
    \   </plugin>\n        </plugins>\n    </build>\n</project>\n```\n\nListing 2-1.\
    \ The `pom.xml` File\n\nThe first thing to note here is that the `springboot-basic`\
    \ Maven module is inheriting from the `springboot-starter-parent` module. By inheriting\
    \ from `spring-boot-starter-parent`, this new module will automatically have the\
    \ following benefits:\n\n* You only need to specify the Spring Boot version once\
    \ in the parent module configuration. You don’t need to specify the version for\
    \ all the starter dependencies and other supporting libraries. To see the list\
    \ of supporting libraries, check out the `pom.xml` file of the `org.springframework.boot:springboot-dependencies:{version}`\
    \ Maven module.\n* The parent module `spring-boot-starter-parent` already includes\
    \ the most commonly used plugins, such as `maven-jar-plugin`, `maven-surefire-plugin`,\
    \ `maven-war-plugin`, `exec-maven-plugin`, and `maven-resources-plugin`, with\
    \ sensible defaults.\n* In addition to the previously mentioned plugins, the `spring-boot-starter-parent`\
    \ module also configures the `spring-boot-maven-plugin`, which will be used to\
    \ build fat JARs. We cover the `spring-boot-maven-plugin` in more detail later\
    \ in this chapter.\n\nThis example selects only `web` starter, but `test` starter\
    \ is also included by default. We selected 1.8 as the Java version, hence the\
    \ property `<java.version>1.8</java.version>` is included. This `java.version`\
    \ value will be used to configure the JDK version for the Maven compiler in the\
    \ `spring-boot-starter-parent` module.\n\n```xml\n<plugin>\n    <groupId>org.apache.maven.plugins</groupId>\n\
    \    <artifactId>maven-compiler-plugin</artifactId>\n    <configuration>\n   \
    \     <source>${java.version}</source>\n        <target>${java.version}</target>\n\
    \    </configuration>\n</plugin>\n```\n\n2. The generated Spring Boot JAR type\
    \ module will have an application entry point Java class called `SpringbootBasicApplication.java`\
    \ with the `public static void main(String[] args)` method, which you can run\
    \ to start the application. See Listing 2-2.\n\n```java\npackage com.apress.demo;\n\
    \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    \n@SpringBootApplication\npublic class SpringbootBasicApplication {\n    public\
    \ static void main(String[] args) {\n        SpringApplication.run(SpringbootBasicApplication.class,\
    \ args);\n    }\n}\n```\n\nListing 2-2. `com.apress.demo.SpringbootBasicApplication.java`\n\
    \nHere, the `SpringbootBasicApplication` class is annotated with the `@SpringBootApplication`\
    \ annotation, which is a composed annotation.\n\n```java\n@Target(ElementType.TYPE)\n\
    @Retention(RetentionPolicy.RUNTIME)\n@Documented\n@Inherited\n@SpringBootConfiguration\n\
    @EnableAutoConfiguration\n@ComponentScan(excludeFilters = {\n    @Filter(type\
    \ = FilterType.CUSTOM, classes = TypeExcludeFilter.class),\n    @Filter(type =\
    \ FilterType.CUSTOM, classes = AutoConfigurationExcludeFilter.class)\n})\npublic\
    \ @interface SpringBootApplication {\n    // ...\n}\n```\n\nThe `@SpringBootConfiguration`\
    \ is another composed annotation with the `@Configuration` annotation."
  raw: "## Your First Spring Boot Application\n\nThere are many ways to create a Spring\
    \ Boot application. The simplest way is to use Spring Initializr at [`http://start.spring.io/`](http://start.spring.io/)\
    \ , which is an online Spring Boot application generator. In this section, you’ll\
    \ see how to create a simple Spring Boot web application serving a simple HTML\
    \ page and explore various aspects of a typical Spring Boot application.\n\n###\
    \ Using Spring Initializr\n\nYou can point your browser to [`http://start.spring.io/`](http://start.spring.io/)\
    \ and see the project details, as shown in Figure [2-1](#A447991_1_En_2_Chapter.html#Fig1).\n\
    \n1.  Select Maven Project and Spring Boot version (as of writing this book, the\
    \ latest version is 2.0.0—SNAPSHOT).  \n2.  Enter the Maven project details as\
    \ follows:\n    *   Group: `com.apress`\n    *   Artifact: `springboot-basic`\n\
    \    *   Name: `springboot-basic`\n    *   Package Name: `com.apress.demo`\n \
    \   *   Packaging: JAR\n    *   Java version: 1.8\n    *   Language: Java \n3.\
    \  You can search for the starters if you are already familiar with their names\
    \ or click on the Switch to the Full Version link to see all the available starters.\
    \ You’ll see many starter modules organized into various categories, like Core,\
    \ Web, Data, etc. Select the Web checkbox from the Web category.  \n4.  Click\
    \ on the Generate Project button.  \n\n![A447991_1_En_2_Fig1_HTML.jpg](A447991_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1.\n\nSpring Initializr\n\nNow you can extract the downloaded ZIP file\
    \ and import it into your favorite IDE.\n\n### Using the Spring Tool Suite\n\n\
    The Spring Tool Suite (STS : [`https://spring.io/tools/sts`](https://spring.io/tools/sts)\
    \ ) is an extension of the Eclipse IDE with lots of Spring framework related plugins.\
    \ You can easily create a Spring Boot application from STS by selecting File ➤\
    \ New ➤ Other ➤ Spring ➤ Spring Starter Project ➤ Next. You will see the wizard,\
    \ which looks similar to the Spring Initializr (Figure [2-2](#A447991_1_En_2_Chapter.html#Fig2)).\n\
    \n![A447991_1_En_2_Fig2_HTML.jpg](A447991_1_En_2_Fig2_HTML.jpg)\n\nFigure 2-2.\n\
    \nSTS New Spring Starter Project wizard\n\nEnter the project details and click\
    \ Next. Then select the latest Spring Boot Version and Web starter (Figure [2-3](#A447991_1_En_2_Chapter.html#Fig3))\
    \ and click Finish.\n\n![A447991_1_En_2_Fig3_HTML.jpg](A447991_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3.\n\nSTS Spring Starters selection wizard\n\nThe Spring Boot project\
    \ will be created and automatically imported into the STS IDE.\n\n### Using Intellij\
    \ IDEA\n\nIntellij IDEA is a powerful commercial IDE with great features, including\
    \ support for Spring Boot. You can create a Spring Boot project from Intellij\
    \ IDEA by selecting File ➤ New ➤ Project ➤ Spring Initializr ➤ Next. Enter the\
    \ project details and click Next. Then select the starters and click Next. Finally,\
    \ enter the project name and click Finish.\n\nNote\n\nSpring framework support\
    \ comes only with the commercial Intellij IDEA Ultimate Edition, not with the\
    \ Community Edition, which is free. If you want to use the Intellij IDEA Community\
    \ Edition , you can generate the project using Spring Initializr and import it\
    \ into Intellij IDEA as a Maven/Gradle project.\n\n### Using NetBeans IDE\n\n\
    The NetBeans IDE is another popular IDE for developing Java applications. As of\
    \ now, there is no out-of- the-box support for creating Spring Boot projects in\
    \ NetBeans, but the community built the NB Spring Boot plugin (see [`https://github.com/AlexFalappa/nb-springboot`](https://github.com/AlexFalappa/nb-springboot)\
    \ ), which supports creating Spring Boot applications directly from the IDE.\n\
    \nNote\n\nThere are some other options for quickly using Spring Boot, by using\
    \ Spring Boot CLI and SDKMAN. You can find more details at “Installing Spring\
    \ Boot” at: [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started-installing-spring-boot`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started-installing-spring-boot)\
    \ .\n\n### Exploring the Project\n\nNow that you created a Spring Boot Maven-based\
    \ project with the `web` starter, you’re ready to explore what is contained in\
    \ the generated application.\n\n1.  First, take a look at the `pom.xml` file,\
    \ as shown in Listing [2-1](#A447991_1_En_2_Chapter.html#Par49).\n\n```\n\n4.0.0\n\
    \    com.apress\n    springboot-basic\n    0.0.1-SNAPSHOT\n    jar\n    springboot-basic\n\
    \    Demo project for Spring Boot\n\norg.springframework.boot\n    spring-boot-starter-parent\n\
    \    2.0.0.BUILD-SNAPSHOT\n\nUTF-8\n    UTF-8\n    1.8\n\nspring-snapshots\n \
    \   Spring Snapshots\n    https://repo.spring.io/snapshot\n\ntrue\n\nspring-milestones\n\
    \    Spring Milestones\n    https://repo.spring.io/milestone\n\nfalse\n\nspring-snapshots\n\
    \    Spring Snapshots\n    https://repo.spring.io/snapshot\n\ntrue\n\nspring-milestones\n\
    \    Spring Milestones\n    https://repo.spring.io/milestone\n\nfalse\n\norg.springframework.boot\n\
    \    spring-boot-starter-web\n\norg.springframework.boot\n    spring-boot-starter-test\n\
    \    test\n\norg.springframework.boot\n    spring-boot-maven-plugin\n\nListing\
    \ 2-1.\n    The pom.xml File\n    ```\n\nThe first thing to note here is that\
    \ the `springboot-basic` Maven module is inheriting from the `springboot-starter-parent`\
    \ module. By inheriting from `spring-boot-starter-parent`, this new module will\
    \ automatically have the following benefits:\n    *   You only need to specify\
    \ the Spring Boot version once in the parent module configuration. You don’t need\
    \ to specify the version for all the starter dependencies and other supporting\
    \ libraries. To see the list of supporting libraries, check out the `pom.xml`\
    \ file of the `org.springframework.boot:springboot-dependencies:{version}` Maven\
    \ module.\n    *   The parent module `spring-boot-starter-parent` already includes\
    \ the most commonly used plugins, such as `maven-jar-plugin`, `maven-surefire-plugin`,\
    \ `maven-war-plugin`, `exec-maven-plugin`, and `maven-resources-plugin`, with\
    \ sensible defaults.\n    *   In addition to the previously mentioned plugins,\
    \ the `spring-boot-starter-parent` module also configures the `spring-boot-maven-plugin`,\
    \ which will be used to build fat JARs. We cover the `spring-boot-maven-plugin`\
    \ in more detail later in this chapter.This example selects only `web` starter,\
    \ but `test` starter is also included by default. We selected 1.8 as the Java\
    \ version, hence the property `<java.version>1.8</java.version>` is included.\
    \ This `java.version` value will be used to configure the JDK version for the\
    \ Maven compiler in the `spring-boot-starter-parent` module.\n\n```\n    ${java.version}\n\
    \    ${java.version}\n    ```\n\n2.  The generated Spring Boot JAR type module\
    \ will have an application entry point Java class called `SpringbootBasicApplication.java`\
    \ with the `public static void main(String[] args)` method, which you can run\
    \ to start the application. See Listing [2-2](#A447991_1_En_2_Chapter.html#Par57).\n\
    \n```\n    package com.apress.demo;\n    import org.springframework.boot.SpringApplication;\n\
    \    import org.springframework.boot.autoconfigure.SpringBootApplication;\n  \
    \  @SpringBootApplication\n    public class SpringbootBasicApplication\n    {\n\
    \    public static void main(String[] args)\n    {\n    SpringApplication.run(SpringbootBasicApplication.class,\
    \ args);\n    }\n    }\n    Listing 2-2.\n    com.apress.demo.SpringbootBasicApplication.java\n\
    \    ```\n\nHere, the `SpringbootBasicApplication` class is annotated with the\
    \ `@SpringBootApplication` annotation, which is a composed annotation.\n\n```\n\
    \    @Target(ElementType.TYPE)\n    @Retention(RetentionPolicy.RUNTIME)\n    @Documented\n\
    \    @Inherited\n    @SpringBootConfiguration\n    @EnableAutoConfiguration\n\
    \    @ComponentScan(excludeFilters = {\n    @Filter(type = FilterType.CUSTOM,\
    \ classes = TypeExcludeFilter.class),\n    @Filter(type = FilterType.CUSTOM, classes\
    \ = AutoConfigurationExcludeFilter.class) })\n    public @interface SpringBootApplication\
    \ {\n    ....\n    ....\n    }\n    ```\n\nThe `@SpringBootConfiguration` is another\
    \ composed annotation with the `@Configuration` annotation."
  trans: "\n## 你的第一个 Spring Boot 应用\n\n创建 Spring Boot 应用的方法有很多种。最简单的方式是使用位于 [`http://start.spring.io/`](http://start.spring.io/)\
    \ 的 Spring Initializr，这是一个在线 Spring Boot 应用生成器。在本节中，你将了解如何创建一个提供简单 HTML 页面的 Spring\
    \ Boot Web 应用，并探索典型 Spring Boot 应用的各个方面。\n\n### 使用 Spring Initializr\n\n你可以将浏览器指向\
    \ [`http://start.spring.io/`](http://start.spring.io/)，查看项目详情，如图 2-1 所示。\n\n1.\
    \  选择 Maven 项目和 Spring Boot 版本（在撰写本书时，最新版本是 2.0.0—SNAPSHOT）。\n2.  按如下方式输入 Maven\
    \ 项目详情：\n    *   组（Group）：`com.apress`\n    *   工件（Artifact）：`springboot-basic`\n\
    \    *   名称（Name）：`springboot-basic`\n    *   包名（Package Name）：`com.apress.demo`\n\
    \    *   打包方式（Packaging）：JAR\n    *   Java 版本：1.8\n    *   语言：Java\n3.  如果你已经熟悉启动器的名称，可以直接搜索；或者点击“切换到完整版本”链接，查看所有可用的启动器。你会看到许多启动器模块，它们被组织成不同的类别，如核心（Core）、Web、数据（Data）等。从\
    \ Web 类别中选择 Web 复选框。\n4.  点击“生成项目”按钮。\n\n![A447991_1_En_2_Fig1_HTML.jpg](img/A447991_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1.\n\nSpring Initializr\n\n现在，你可以解压下载的 ZIP 文件，并将其导入到你喜欢的 IDE 中。\n\n### 使用\
    \ Spring Tool Suite\n\nSpring Tool Suite（STS：[`https://spring.io/tools/sts`](https://spring.io/tools/sts)）是\
    \ Eclipse IDE 的一个扩展，包含许多与 Spring 框架相关的插件。你可以通过选择“文件 ➤ 新建 ➤ 其他 ➤ Spring ➤ Spring\
    \ Starter 项目 ➤ 下一步”，轻松地从 STS 创建一个 Spring Boot 应用。你将看到一个向导，它看起来与 Spring Initializr\
    \ 类似（图 2-2）。\n\n![A447991_1_En_2_Fig2_HTML.jpg](img/A447991_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2.\n\nSTS 新建 Spring Starter 项目向导\n\n输入项目详情并点击“下一步”。然后选择最新的 Spring Boot 版本和\
    \ Web 启动器（图 2-3），并点击“完成”。\n\n![A447991_1_En_2_Fig3_HTML.jpg](img/A447991_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3.\n\nSTS Spring 启动器选择向导\n\nSpring Boot 项目将被创建并自动导入到 STS IDE 中。\n\n### 使用\
    \ Intellij IDEA\n\nIntellij IDEA 是一款功能强大的商业 IDE，具有出色的特性，包括对 Spring Boot 的支持。你可以通过选择“文件\
    \ ➤ 新建 ➤ 项目 ➤ Spring Initializr ➤ 下一步”，从 Intellij IDEA 创建一个 Spring Boot 项目。输入项目详情并点击“下一步”。然后选择启动器并点击“下一步”。最后，输入项目名称并点击“完成”。\n\
    \n注意\n\nSpring 框架支持仅适用于商业版的 Intellij IDEA Ultimate Edition，而不适用于免费的 Community\
    \ Edition。如果你想使用 Intellij IDEA Community Edition，你可以使用 Spring Initializr 生成项目，然后将其作为\
    \ Maven/Gradle 项目导入到 Intellij IDEA 中。\n\n### 使用 NetBeans IDE\n\nNetBeans IDE 是另一个用于开发\
    \ Java 应用的流行 IDE。目前，NetBeans 中没有开箱即用的创建 Spring Boot 项目的支持，但社区构建了 NB Spring Boot\
    \ 插件（参见 [`https://github.com/AlexFalappa/nb-springboot`](https://github.com/AlexFalappa/nb-springboot)），该插件支持直接从\
    \ IDE 创建 Spring Boot 应用。\n\n注意\n\n还有一些其他快速使用 Spring Boot 的选项，例如使用 Spring Boot\
    \ CLI 和 SDKMAN。你可以在以下地址找到更多详细信息：“安装 Spring Boot”：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started-installing-spring-boot`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started-installing-spring-boot)。\n\
    \n### 探索项目\n\n现在你已经创建了一个包含 `web` 启动器的基于 Maven 的 Spring Boot 项目，可以开始探索生成的应用中包含的内容了。\n\
    \n1.  首先，查看 `pom.xml` 文件，如代码清单 2-1 所示。\n\n```\n4.0.0\n    com.apress\n    springboot-basic\n\
    \    0.0.1-SNAPSHOT\n    jar\n    springboot-basic\n    Demo project for Spring\
    \ Boot\n\norg.springframework.boot\n    spring-boot-starter-parent\n    2.0.0.BUILD-SNAPSHOT\n\
    \nUTF-8\n    UTF-8\n    1.8\n\nspring-snapshots\n    Spring Snapshots\n    https://repo.spring.io/snapshot\n\
    \ntrue\n\nspring-milestones\n    Spring Milestones\n    https://repo.spring.io/milestone\n\
    \nfalse\n\nspring-snapshots\n    Spring Snapshots\n    https://repo.spring.io/snapshot\n\
    \ntrue\n\nspring-milestones\n    Spring Milestones\n    https://repo.spring.io/milestone\n\
    \nfalse\n\norg.springframework.boot\n    spring-boot-starter-web\n\norg.springframework.boot\n\
    \    spring-boot-starter-test\n    test\n\norg.springframework.boot\n    spring-boot-maven-plugin\n\
    \n代码清单 2-1.\n    pom.xml 文件\n    ```\n\n这里首先要注意的是，`springboot-basic` Maven 模块继承自\
    \ `springboot-starter-parent` 模块。通过继承 `spring-boot-starter-parent`，这个新模块将自动获得以下好处：\n\
    \    *   你只需要在父模块配置中指定一次 Spring Boot 版本。你不需要为所有启动器依赖项和其他支持库指定版本。要查看支持库的列表，请查看\
    \ `org.springframework.boot:springboot-dependencies:{version}` Maven 模块的 `pom.xml`\
    \ 文件。\n    *   父模块 `spring-boot-starter-parent` 已经包含了最常用的插件，例如 `maven-jar-plugin`、`maven-surefire-plugin`、`maven-war-plugin`、`exec-maven-plugin`\
    \ 和 `maven-resources-plugin`，并带有合理的默认配置。\n    *   除了前面提到的插件，`spring-boot-starter-parent`\
    \ 模块还配置了 `spring-boot-maven-plugin`，该插件将用于构建 fat JAR。我们将在本章后面更详细地介绍 `spring-boot-maven-plugin`。此示例仅选择了\
    \ `web` 启动器，但 `test` 启动器也默认包含在内。我们选择了 1.8 作为 Java 版本，因此包含了属性 `<java.version>1.8</java.version>`。这个\
    \ `java.version` 值将用于在 `spring-boot-starter-parent` 模块中配置 Maven 编译器的 JDK 版本。\n\
    \n```\n    ${java.version}\n    ${java.version}\n    ```\n\n2.  生成的 Spring Boot\
    \ JAR 类型模块将有一个应用入口点 Java 类，名为 `SpringbootBasicApplication.java`，其中包含 `public static\
    \ void main(String[] args)` 方法，你可以运行它来启动应用。参见代码清单 2-2。\n\n```\n    package com.apress.demo;\n\
    \    import org.springframework.boot.SpringApplication;\n    import org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    \    @SpringBootApplication\n    public class SpringbootBasicApplication\n   \
    \ {\n    public static void main(String[] args)\n    {\n    SpringApplication.run(SpringbootBasicApplication.class,\
    \ args);\n    }\n    }\n    代码清单 2-2.\n    com.apress.demo.SpringbootBasicApplication.java\n\
    \    ```\n\n这里，`SpringbootBasicApplication` 类使用了 `@SpringBootApplication` 注解进行标注，这是一个组合注解。\n\
    \n```\n    @Target(ElementType.TYPE)\n    @Retention(RetentionPolicy.RUNTIME)\n\
    \    @Documented\n    @Inherited\n    @SpringBootConfiguration\n    @EnableAutoConfiguration\n\
    \    @ComponentScan(excludeFilters = {\n    @Filter(type = FilterType.CUSTOM,\
    \ classes = TypeExcludeFilter.class),\n    @Filter(type = FilterType.CUSTOM, classes\
    \ = AutoConfigurationExcludeFilter.class) })\n    public @interface SpringBootApplication\
    \ {\n    ....\n    ....\n    }\n    ```\n\n`@SpringBootConfiguration` 是另一个带有 `@Configuration`\
    \ 注解的组合注解。\n"
- fmt: "```java\n@Target(ElementType.TYPE)\n@Retention(RetentionPolicy.RUNTIME)\n\
    @Documented\n@Configuration\npublic @interface SpringBootConfiguration {\n}\n\
    ```\n\nHere are the meanings of these annotations:\n\n- `@Configuration` indicates\
    \ that this class is a Spring configuration class.\n- `@ComponentScan` enables\
    \ component scanning for Spring beans in the package in which the current class\
    \ is defined.\n- `@EnableAutoConfiguration` triggers Spring Boot’s autoconfiguration\
    \ mechanisms.\n\nYou are bootstrapping the application by calling `SpringApplication.run(SpringbootBasicApplication.class,\
    \ args)` in the `main()` method. You can pass one or more Spring configuration\
    \ classes to the `SpringApplication.run()` method. But if you have your application\
    \ entry point class in a root package, it is sufficient to pass the application\
    \ entry class only, which takes care of scanning other Spring configuration classes\
    \ in all the sub-packages.\n\nNow create a simple SpringMVC controller, called\
    \ `HomeController.java`, as shown in Listing 2-3.\n\n```java\npackage com.apress.demo;\n\
    import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
    import org.springframework.web.bind.annotation.RequestMapping;\n@Controller\n\
    public class HomeController\n{\n    @RequestMapping(\"/\")\n    public String\
    \ home(Model model) {\n        return \"index.html\";\n    }\n}\n```\n\nThis is\
    \ a simple SpringMVC controller with one request handler method for URL `/`, which\
    \ returns the view named `index.html`.\n\nCreate a HTML view called `index.html`.\
    \ By default, Spring Boot serves the static content from the `src/main/public/`\
    \ and `src/main/static/` directories. So create `index.html` in `src/main/public/`,\
    \ as shown in Listing 2-4.\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <title>Home</title>\n\
    </head>\n<body>\n    Hello World!!\n</body>\n</html>\n```\n\nNow, from your IDE,\
    \ run the `SpringbootBasicApplication.main()` method as a standalone Java class\
    \ that will start the embedded Tomcat server on port 8080 and point the browser\
    \ to `http://localhost:8080/`. You should be able to see the response: `Hello\
    \ World!!`.\n\nYou can also run the Spring Boot application using `spring-boot-maven-plugin`,\
    \ as follows:\n\n```\nmvn spring-boot:run\n```\n\n## The Application Entry Point\
    \ Class\n\nSpring Boot applications should have an entry point class with the\
    \ `public static void main(String[] args)` method, which is usually annotated\
    \ with the `@SpringBootApplication` annotation and will be used to bootstrap the\
    \ application (Listing 2-5).\n\n```java\npackage com.mycompany.myproject;\nimport\
    \ org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    @SpringBootApplication\npublic class Application\n{\n    public static void main(String[]\
    \ args)\n    {\n        SpringApplication.run(Application.class, args);\n    }\n\
    }\n```\n\nIt is highly recommended that you put the main entry point class in\
    \ the root package, say in `com.mycompany.myproject`, so that the `@EnableAutoConfiguration`\
    \ and `@ComponentScan` annotations will scan for Spring beans, JPA entities, etc.,\
    \ in the root and all of its sub-packages automatically.\n\nIf you have an entry\
    \ point class in a nested package, you might need to specify the `basePackages`\
    \ to scan for Spring components explicitly (Listing 2-6).\n\n```java\npackage\
    \ com.mycompany.myproject.config;\n@Configuration\n@EnableAutoConfiguration\n\
    @ComponentScan(basePackages = \"com.mycompany.myproject\")\n@EntityScan(basePackageClasses=Person.class)\n\
    public class Application\n{\n    public static void main(String[] args)\n    {\n\
    \        SpringApplication.run(Application.class, args);\n    }\n}\n```\n\nHere,\
    \ the `Application.java` main class is in the `com.mycompany.myproject.config`\
    \ package, which is not the root package. So, you need to specify `@ComponentScan(basePackages\
    \ = \"com.mycompany.myproject\")` so that Spring Boot will scan `com.mycompany.myproject`\
    \ and all of its sub-packages for Spring components. Also, we specified `@EntityScan(basePackageClasses=Person.class)`\
    \ so that Spring Boot will scan for JPA entities under the package where `Person.class`\
    \ exists.\n\n## Fat JAR Using the Spring Boot Maven Plugin\n\nYou can run your\
    \ application directly from the IDE or use Maven `spring-boot:run` during development,\
    \ but ultimately you need to create a deployment unit that can be run in the production\
    \ environment without any IDE support. You can use `spring-boot-maven-plugin`\
    \ to create a single deployment unit (a fat JAR) by executing the following Maven\
    \ goals.\n\n```\nmvn clean package\n```\n\nNow there are two interesting files\
    \ in the `target` directory—`springboot-basic-1.0-SNAPSHOT.jar` and `springboot-basic-1.0-SNAPSHOT.jar.original`.\
    \ The `springboot-basic-1.0-SNAPSHOT.jar.original` file will contain only the\
    \ compiled classes and classpath resources.\n\nBut if you look at `springboot-basic-1.0-SNAPSHOT.jar`,\
    \ you find the following:\n\n- Compiled classes of your own source code in `src/main/java`\
    \ and static resources from `src/main/resources` will be in the `BOOT-INF/classes`\
    \ directory\n- All the dependent JARs in the `BOOT-INF/lib` directory\n- Classes\
    \ in the `org.springframework.boot.loader` package that do the Spring Boot magic\
    \ of running the Spring Boot application\n\nYou can create self-contained deployment\
    \ units for JAR-type modules using plugins like `maven-shade-plugin`, which packages\
    \ all the dependent JAR classes into a single JAR file. But Spring Boot follows\
    \ a different approach and it allows you to nest JARs directly within your Spring\
    \ Boot application JAR file. You can read more about at: [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#executable-jar`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#executable-jar).\n\
    \nYou can run the application using the following command:\n\n```\njava -jar springboot-basic-1.0-SNAPSHOT.jar\n\
    ```\n\n## Spring Boot Using Gradle\n\nGradle is another popular build tool based\
    \ on Groovy DSL. You can use Gradle instead of Maven to build Spring Boot applications.\
    \ Gradle follows a similar project structure as Maven. For example, like the main\
    \ Java source resides in `src/main/java`, the main resources reside in `src/main/resources`,\
    \ and so on.\n\nYou can create a Gradle-based Spring Boot project by selecting\
    \ Gradle as the build tool while creating the application through Spring Initializr\
    \ or the IDEs. The generated `build.gradle` file will look like Listing 2-7.\n\
    \n```groovy\nbuildscript {\n    ext {\n        springBootVersion = '2.0.0.BUILD-SNAPSHOT'\n\
    \    }\n    repositories {\n        mavenCentral()\n        maven { url \"https://repo.spring.io/snapshot\"\
    \ }\n        maven { url \"https://repo.spring.io/milestone\" }\n    }\n    dependencies\
    \ {\n        classpath(\"org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}\"\
    )\n    }\n}\napply plugin: 'java'\napply plugin: 'eclipse'\napply plugin: 'org.springframework.boot'\n\
    version = '0.0.1-SNAPSHOT'\nsourceCompatibility = 1.8\nrepositories {\n    mavenCentral()\n\
    \    maven { url \"https://repo.spring.io/snapshot\" }\n    maven { url \"https://repo.spring.io/milestone\"\
    \ }\n}\ndependencies {\n    compile('org.springframework.boot:spring-boot-starter-web')\n\
    \    testCompile('org.springframework.boot:spring-boot-starter-test')\n}\n```\n\
    \nNow you can run the application by using the `gradle bootRun` command. You can\
    \ also use the `gradle build` command, which generates the fat JAR in the `build/libs`\
