    ## JOOQ 简介


    JOOQ 是一个 Java 持久化框架，它提供了类型安全的 QueryDSL，使你能够以类型安全的方式实现应用程序的持久层。JOOQ 提供了代码生成工具，可以根据数据库模式生成代码，你可以使用这些生成的代码来构建类型安全的查询。


