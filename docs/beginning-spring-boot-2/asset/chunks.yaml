    6.  Next, you are going to register the Spring MVC `FrontController` servlet `DispatcherServlet`.
    Note: Prior to Servlet 3.x specification, you have to register servlets/filters
    in `web.xml`. Since the Servlet 3.x specification, you can register servlets/filters
    programmatically using `ServletContainerInitializer`. Spring MVC provides a convenient
    class called `AbstractAnnotationConfigDispatcherServletInitializer` to register
    `DispatcherServlet`.


    ```java

    package com.apress.demo.config;

    import javax.servlet.Filter;

    import org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter;

    import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;

    public class SpringWebAppInitializer extends AbstractAnnotationConfigDispatcherServletInitializer

    {

    @Override

    protected Class[] getRootConfigClasses()

    {

    return new Class[] { AppConfig.class};

    }

    @Override

    protected Class[] getServletConfigClasses()

    {

    return new Class[] { WebMvcConfig.class };

    }

    @Override

    protected String[] getServletMappings()

    {

    return new String[] { "/" };

    }

    @Override

    protected Filter[] getServletFilters()

    {

    return new Filter[]{ new OpenEntityManagerInViewFilter() };

    }

    }

    ```

    **Listing 1-10.** The `com.apress.demo.config.SpringWebAppInitializer.java` File


    In the `SpringWebAppInitializer.java` configuration class, we did the following:

    *   Configured `AppConfig.class` as `RootConfirationClasses`, which will become
    the parent `ApplicationContext` that contains bean definitions shared by all child
    (`DispatcherServlet`) contexts.

    *   Configured `WebMvcConfig.class` as `ServletConfigClasses`, which is the child
    `ApplicationContext` that contains `WebMvc` bean definitions.

    *   Configured `/` as `ServletMapping`, which means that all the requests will
    be handled by `DispatcherServlet`.

    *   Registered `OpenEntityManagerInViewFilter` as a servlet filter so that we
    can lazy-load the JPA entity lazy collections while rendering the view.


