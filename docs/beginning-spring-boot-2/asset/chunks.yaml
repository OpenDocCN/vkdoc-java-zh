- fmt: '# Getting Started with MongoDB Using the Mongo Shell


    Once the MongoDB server is started, you can connect to the MongoDB server by starting
    the Mongo Shell. Open another command prompt and run `C:\Apps\MongoDB\Server\3.4\bin\mongo.exe`.
    If you have connected to the server successfully, it will print the MongoDB Shell
    version and the message `connecting to: test`.


    ```

    C:\Apps\MongoDB\Server\3.4\bin> mongo.exe

    MongoDB shell version: 3.2.1

    connecting to: test

    Welcome to the MongoDB shell.

    For interactive help, type "help".

    For more comprehensive documentation, see

    http://docs.mongodb.org/

    Questions? Try the support group

    http://groups.google.com/group/mongodb-user

    >

    ```


    You can use the `show dbs` command to check the list of available databases:


    ```

    > show dbs

    ```


    By default, you are connected to the default database called `test`. You can use
    the `use db_name` command to switch to another database.


    ```

    > use users

    switched to db users

    ```


    You can insert a user document into the `users` collection as follows:


    ```

    > db.users.insert({"username": "siva","password": "secret" })

    ```


    If the collection does not exist, it will be created automatically.


    You can query the database to return all the documents as follows:


    ```

    > db.users.find()

    ```


    You can also apply filters to a query as follows:


    ```

    > db.users.find({"name": "siva" })

    ```


    You can also get the count of number of documents as follows:


    ```

    > db.users.count()

    ```


    Note


    Covering MongoDB in-depth is out of the scope of this book. Visit the official
    documentation at: [`https://docs.mongodb.com/manual/`](https://docs.mongodb.com/manual/)
    to learn more about MongoDB.


    ## Introducing Spring Data MongoDB


    The Spring Data umbrella project provides the Spring Data Mongo module, which
    provides support for performing CRUD (Create, Read, Update, Delete) operations
    and dynamic queries based on method names similar to Spring Data JPA.


    The Spring Data MongoDB module provides the `MongoTemplate`, which provides higher
    level abstraction over MongoDB Java driver API `com.mongodb.Mongo`.


    If you are not using Spring Boot, you need to configure the MongoDB components
    using JavaConfig, as shown in Listing [9-3](#A447991_1_En_9_Chapter.html#Par44).


    ```

    @Configuration

    public class MongoConfiguration

    {

    @Bean

    public MongoDbFactory mongoDbFactory() throws Exception {

    return new SimpleMongoDbFactory(new Mongo(), "database");

    }

    @Bean

    public MongoTemplate mongoTemplate() throws Exception {

    return new MongoTemplate(mongoDbFactory());

    }

    }

    Listing 9-3.

    MongoDB Components Configuration Using JavaConfig

    ```


    Spring Boot provides the `spring-boot-starter-data-mongodb` starter to easily
    work with MongoDB by autoconfiguring the MongoDB components without requiring
    the manual configuration.


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb


    ```


    By adding the `spring-boot-starter-data-mongodb` dependency, Spring Boot will
    autoconfigure `MongoClient`, `MongoDbFactory`, `MongoTemplate`, etc. and connect
    to the local MongoDB server at `mongodb://localhost/test`.


    You can customize the `mongodb` server URL by configuring the `spring.data.mongodb.uri`
    property in the `application.properties` file.


    ```

    spring.data.mongodb.uri=mongodb://remoteserver:27017/blog

    ```


    You can also use `MongoTemplate` to save, update, and delete domain objects that
    internally take care of mapping domain objects to documents in MongoDB.


    First, you create the `User` class as follows:


    ```

    public class User

    {

    private String id;

    private String name;

    private String email;

    private boolean disabled;

    //setters and getters

    }

    ```


    You can then inject `MongoTemplate` and perform various operations on MongoDB,
    as shown in Listing [9-4](#A447991_1_En_9_Chapter.html#Par54).


    ```

    @Service

    public class MongoUserService

    {

    @Autowired

    private MongoTemplate mongoTemplate;

    public List getUsers()

    {

    return mongoTemplate.findAll(User.class, "users");

    }

    public User getUser(String id)

    {

    Query query = Query.query(Criteria.where("id").is(id));

    return mongoTemplate.findOne(query, User.class);

    }

    public void createUser(User user)

    {

    mongoTemplate.save(user, "users");

    }

    }

    Listing 9-4.

    Performing Database Operations Using MongoTemplate

    ```


    In addition to using `MongoTemplate`, you can also create repositories that extend
    the `MongoRepository` interface and provide CRUD operations out-of-the-box.


    You can map a domain object to a particular MongoDB collection name using the
    `@Document` annotation.


    ```

    @Document(collection="users")

    public class User

    {

    @Id

    private String id;

    private String name;

    private String email;

    private boolean disabled;

    //setters and getters

    }

    ```


    By default, MongoDB generates an `ObjectId` primary key called `_id`. But you
    can map any existing property to be used as the primary key, simply by using the
    `@Id` annotation.


    Create the `UserRepository` interface by extending the `MongoRepository` interface,
    as shown in Listing [9-5](#A447991_1_En_9_Chapter.html#Par60).


    ```

    public interface UserRepository extends MongoRepository

    {

    }

    Listing 9-5.

    UserRepository.java

    ```


    Now you can perform various CRUD operations as follows:


    ```

    List users = userRepository.findAll();

    Optional user1 = userRepository.findById("1");

    User user2 = new User("2", "Robert", "robert@gmail.com");

    User savedUser = userRepository.save(user2);

    // delete user by primary key

    userRepository.deleteById("1");

    // delete user by object

    userRepository.delete(user);

    // get total count of user documents in users collection

    userRepository.count();

    ```


    You can also perform sorting and pagination similar to Spring Data JPA repositories.


    ```

    Sort sort = new Sort(Direction.ASC, "name");

    List users = userRepository.findAll(sort);

    ```


    You can also express the query criteria using `@Query` as follows:


    ```

    @Query("{ ''name'' : ?0 }")

    User findByUserName(String name);

    ```'
