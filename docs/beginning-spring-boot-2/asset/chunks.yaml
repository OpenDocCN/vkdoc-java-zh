    创建 JUnit 测试来测试 `UserRepository` 上的基本 CRUD 操作，如清单 9-7 所示。


    ```

    @RunWith(SpringRunner.class)

    public class SpringbootMongodbDemoApplicationTests

    {

    @Autowired

    private UserRepository userRepository;

    @Test

    public void findAllUsers()  {

    List users = userRepository.findAll();

    assertNotNull(users);

    assertTrue(!users.isEmpty());

    }

    @Test

    public void findUserById()  {

    User user = userRepository.findById("1").get();

    assertNotNull(user);

    }

    @Test

    public void createUser() {

    User user = new User("3", "Joseph", "joseph@gmail.com");

    User savedUser = userRepository.save(user);

    User newUser = userRepository.findById(savedUser.getId()).get();

    assertEquals("Joseph", newUser.getName());

    assertEquals("joseph@gmail.com", newUser.getEmail());

    }

    }

    清单 9-7.

    SpringbootMongodbDemoApplicationTests.java

    ```


    要了解更多关于 Spring Data Mongo 特性的信息，请参阅 Spring Data MongoDB 参考文档：[`http://docs.spring.io/spring-data/data-mongo/docs/current/reference/html`](http://docs.spring.io/spring-data/data-mongo/docs/current/reference/html)。


    ## 本章小结


    本章介绍了如何安装和使用 MongoDB 服务器，并探讨了如何在 Spring Boot 应用程序中使用 Spring Data MongoDB。下一章，你将开始使用
    Spring Boot 和 Spring MVC 开发 Web 应用程序。


    # 10. 使用 Spring Boot 开发 Web 应用程序


    Spring MVC 是基于模型-视图-控制器（MVC）设计模式的最流行的 Java Web 框架。自 Spring 3.0 版本起，Spring MVC
    就提供了基于注解的请求映射功能，使用 `@Controller` 和 `@RequestMapping`。但是，配置 Spring MVC Web 应用程序组件（如
    `DispatcherServlet`、`ViewResolver`、`MultiPartResolver` 和 `ExceptionHandler`）是一个重复且繁琐的过程。


    Spring Boot 使得开始使用 Spring MVC 变得非常简单，因为 Spring Boot 的自动配置机制会为大多数组件（如 `DispatcherServlet`、`ViewResolver`、`ContentNegotiatingViewResolver`、`LocaleResolver`、`MessageCodesResolver`
    等）配置默认值，并提供自定义选项。


    传统上，JSP 用于视图渲染，但随着时间的推移，出现了许多其他视图模板技术，例如 Thymeleaf、Mustache、Groovy Templates、FreeMarker
    等。Spring Boot 也为这些视图模板库提供了自动配置。


    Spring Boot 提供了嵌入式 Servlet 容器支持，因此你可以将应用程序构建为自包含的部署单元。Spring Boot 开箱即用地支持 Tomcat、Jetty
    和 Undertow Servlet 容器，并提供了自定义钩子来实现所有服务器级别的自定义。


    本章将探讨如何使用 Web Starter 开发基于 Spring MVC 的 Web 应用程序，并将 Tomcat、Jetty 和 Undertow 作为嵌入式
    Servlet 容器。你将学习如何自定义默认的 Spring MVC 配置，以及如何将 Servlet、过滤器和监听器注册为 Spring Bean。


    你将学习如何使用 Thymeleaf 视图模板、如何执行表单验证、如何上传文件以及如何使用 ResourceBundle 进行国际化（i18n）。


    最后，你将学习使用 `@ExceptionHandler` 和 `@ControllerAdvice` 注解处理异常的各种方法，以及 Spring Boot
    如何使这一过程更加简单。


    ## 介绍 Spring MVC


    Spring MVC 是一个基于 MVC 和前端控制器设计模式构建的强大 Web 框架。Spring MVC 提供了 `DispatcherServlet`，它作为前端控制器接收所有请求，并将处理委托给请求处理器（控制器）。处理完成后，`ViewResolver`
    将根据视图名称渲染视图。图 10-1 展示了这个流程。


    ![A447991_1_En_10_Fig1_HTML.gif](img/A447991_1_En_10_Fig1_HTML.gif)


    图 10-1.


    Spring MVC 请求处理流程


    Spring MVC 提供了基于注解的映射支持，可以使用 `@Controller` 和 `@RequestMapping` 注解将请求 URL 模式映射到处理器类（清单
    10-1）。


    ```

    @Controller

    public class HomeController

    {

    @RequestMapping(value="/home", method=RequestMethod.GET)

    public String home(Model model) {

    model.addAttribute("message", "Hello Spring MVC!!");

    return "home";

    }

    }

    清单 10-1.

    Spring MVC 基于注解的控制器

    ```


    `HomeController` 类上的 `@Controller` 注解将其标记为请求处理器的 Spring 组件，`home()` 方法将处理对 `/home`
    URL 的 `GET` 请求。`ViewResolver` 会将逻辑视图名称 `"home"` 解析为视图模板，例如 `/WEB-INF/views/home.html`，然后渲染视图。


    Spring 4.3 引入了 `@GetMapping`、`@PostMapping`、`@PutMapping` 等注解作为便捷的组合注解，这样你就不必在
    `@RequestMapping(value="/url", method=RequestMethod.XXX)` 中指定 `method` 类型。参见清单
    10-2。


    ```

    @Controller

    public class HomeController

    {

    @GetMapping("/home")

    public String home(Model model) {

    model.addAttribute("message", "Hello Spring MVC!!");

    return "home";

    }

    @PostMapping("/users")

    public String createUser(User user) {

    userRepository.save(user);

    return "users";

    }

    }

    清单 10-2.

    使用 @GetMapping 和 @PostMapping 注解

    ```


    对于基于 Spring MVC 的 Web 应用程序，我们需要配置各种 Web 层组件，如 `DispatcherServlet`、`ViewResolver`、`LocaleResolver`、`HandlerExceptionResolver`
    等。Spring Boot 提供了 Web Starter，它可以自动配置所有这些常用的 Web 层组件，从而使 Web 应用程序开发变得更加容易。

