    使用 docker-compose 运行多个容器


    如果你的应用程序依赖于多个服务，并且你需要将它们全部启动在 Docker 容器中，那么逐个启动它们会很繁琐。你可以使用 `docker-compose` 工具来编排运行应用程序所需的多个容器。你需要创建一个
    `docker-compose.yml` 文件，并配置你想要运行的服务。


    在应用程序的根目录下创建 `docker-compose.yml`，如清单 19-13 所示。


    ```

    demo-postgres:

    image: postgres:latest

    environment:

    - POSTGRES_DB=demodb

    - POSTGRES_USER=postgres

    - POSTGRES_PASSWORD=secret123

    springboot-heroku-demo:

    image: sivaprasadreddy/springboot-heroku-demo

    links:

    - demo-postgres:postgres

    ports:

    - 80:8080

    清单 19-13.

    docker-compose.yml

    ```


    现在，你只需在存放 `docker-compose.yml` 文件的目录下运行 `docker-compose up` 命令，即可启动应用程序和 Postgres
    容器。


    注意


    你可以使用 `docker-maven-plugin` 来构建 Docker 镜像。访问 [`https://github.com/spotify/docker-maven-plugin`](https://github.com/spotify/docker-maven-plugin)
    以了解更多关于 `docker-maven-plugin` 的信息。如果你使用的是 Gradle 构建工具，可以使用 `gradle-docker` 插件（
    [`https://github.com/Transmode/gradle-docker`](https://github.com/Transmode/gradle-docker)
    ）来构建 Docker 镜像。


    要了解更多关于 Docker 的信息，请访问 [`https://docs.docker.com/`](https://docs.docker.com/)
    。


    总结


    本章讨论了如何在生产环境中运行应用程序，以及如何在 Heroku 云平台上部署 Spring Boot 应用程序。你还学习了如何在 Docker 容器上运行
    Spring Boot 应用程序。


