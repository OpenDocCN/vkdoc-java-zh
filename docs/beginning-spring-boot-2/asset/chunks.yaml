    \ 或 Derby），那么 Spring Boot 将使用内存数据库设置自动注册 `DataSource` Bean。\n*   如果你尚未注册以下任何 Bean，则\
    \ Spring Boot 会自动注册它们。\n    *   `PlatformTransactionManager` (`DataSourceTransactionManager`)\n\
    \    *   `JdbcTemplate`\n    *   `NamedParameterJdbcTemplate`\n*   你可以在根类路径下放置\
    \ `schema.sql` 和 `data.sql` 文件，Spring Boot 将自动使用它们来初始化数据库。\n"
- fmt: '### Initializing the Database


    Spring Boot uses the `spring.datasource.initialize` property value, which is true
    by default, to determine whether to initialize the database. If the `spring.datasource.initialize`
    property is set to `true`, Spring Boot will use the `schema.sql` and `data.sql`
    files in the root classpath to initialize the database.


    In addition to `schema.sql` and `data.sql`, Spring Boot will load the `schema-${platform}.sql`
    and `data-${platform}.sql` files if they are available in the root classpath.
    Here, the platform value is the value of the `spring.datasource.platform` property,
    which can be `hsqldb`, `h2`, `oracle`, `mysql`, `postgresql`, etc.


    You can customize the default names of the scripts using the following properties:


    ```

    spring.datasource.schema=create-db.sql

    spring.datasource.data=seed-data.sql

    ```


    If you want to turn off the database initialization, you can set `spring.datasource.initialize=false`.
    If there are any errors in executing the scripts, the application will fail to
    start. If you want to continue, you can set `spring.datasource.continueOnError=true`.


    To add the H2 database driver to the `pom.xml` file, you use the following:


    ```

    com.h2database

    h2


    ```


    Create `schema.sql` in `src/main/resources`, as follows:


    ```

    CREATE TABLE users

    (

    id int(11) NOT NULL AUTO_INCREMENT,

    name varchar(100) NOT NULL,

    email varchar(100) DEFAULT NULL,

    PRIMARY KEY (id)

    );

    ```


    Create `data.sql` in `src/main/resources`, as follows:


    ```

    insert into users(id, name, email) values(1,''John'',''john@gmail.com'');

    insert into users(id, name, email) values(2,''Rod'',''rod@gmail.com'');

    insert into users(id, name, email) values(3,''Mike'',''mike@gmail.com'');

    ```


    Now you can inject `JdbcTemplate` into `UserRepository`, as shown in Listing [5-1](#A447991_1_En_5_Chapter.html#Par38).


    ```

    @Repository

    public class UserRepository

    {

    @Autowired

    private JdbcTemplate jdbcTemplate;

    @Transactional(readOnly=true)

    public List findAll() {

    return jdbcTemplate.query("select * from users",

    new UserRowMapper());

    }

    @Transactional(readOnly=true)

    public User findUserById(int id) {

    return jdbcTemplate.queryForObject("select * from users where id=?",

    new Object[]{id}, new UserRowMapper());

    }

    public User create(final User user) {

    final String sql = "insert into users(name,email) values(?,?)";

    KeyHolder holder = new GeneratedKeyHolder();

    jdbcTemplate.update(new PreparedStatementCreator() {

    @Override

    public PreparedStatement createPreparedStatement(Connection connection)

    throws SQLException {

    PreparedStatement ps = connection

    .prepareStatement(sql, Statement.RETURN_GENERATED_KEYS);

    ps.setString(1, user.getName());

    ps.setString(2, user.getEmail());

    return ps;

    }

    }, holder);

    int newUserId = holder.getKey().intValue();

    user.setId(newUserId);

    return user;

    }

    }

    class UserRowMapper implements RowMapper

    {

    @Override

    public User mapRow(ResultSet rs, int rowNum) throws SQLException {

    User user = new User();

    user.setId(rs.getInt("id"));

    user.setName(rs.getString("name"));

    user.setEmail(rs.getString("email"));

    return user;

    }

    }

    Listing 5-1.

    UserRepository.java

    ```


    Create the entry point called `SpringbootJdbcDemoApplication.java`, as shown in
    Listing [5-2](#A447991_1_En_5_Chapter.html#Par40).


    ```

    @SpringBootApplication

    public class SpringbootJdbcDemoApplication

    {

    public static void main(String[] args)

    {

    SpringApplication.run(SpringbootJdbcDemoApplication.class, args);

    }

    }

    Listing 5-2.

    SpringbootJdbcDemoApplication.java

    ```


    Now you can create a JUnit test class to test the `UserRepository` methods, as
    shown in Listing [5-3](#A447991_1_En_5_Chapter.html#Par42).


    ```

    @RunWith(SpringRunner.class)

    @SpringBootTest(SpringbootJdbcDemoApplication.class)

    public class SpringbootJdbcDemoApplicationTests

    {

    @Autowired

    private UserRepository userRepository;

    @Test

    public void findAllUsers()  {

    List users = userRepository.findAll();

    assertNotNull(users);

    assertTrue(!users.isEmpty());

    }

    @Test

    public void findUserById()  {

    User user = userRepository.findUserById(1);

    assertNotNull(user);

    }

    @Test

    public void createUser() {

    User user = new User(0, "Johnson", "johnson@gmail.com");

    User savedUser = userRepository.create(user);

    User newUser = userRepository.findUserById(savedUser.getId());

    assertNotNull(newUser);

    assertEquals("Johnson", newUser.getName());

    assertEquals("johnson@gmail.com", newUser.getEmail());

    }

    }

    Listing 5-3.

    SpringbootJdbcDemoApplicationTests.java

    ```


    **Note**


    By default, the Spring Boot features such as external properties, logging, etc.,
    are available in the `ApplicationContext` only if you use `SpringApplication`.
    So, Spring Boot provides the `@SpringBootTest` annotation to configure the `ApplicationContext`
    for tests that use `SpringApplication` behind the scenes.


    You have learned how to get started quickly with embedded databases. But what
    if you want to use non-embedded databases like MySQL, Oracle, and PostgreSQL?


    You can configure the database properties in the `application.properties` file
    so that Spring Boot will use those JDBC parameters to configure the `DataSource`
    bean.


    ```

    spring.datasource.driver-class-name=com.mysql.jdbc.Driver

    spring.datasource.url=jdbc:mysql://localhost:3306/test

    spring.datasource.username=root

    spring.datasource.password=admin

    ```


    For any reason if you want to have more control and configure the `DataSource`
    bean by yourself, you can configure it in a configuration class. If you register
    the `DataSource` bean, Spring Boot will not configure it automatically using autoconfiguration.


    ### Using Other Connection Pooling Libraries


    Spring Boot, by default, pulls in `tomcat-jdbc-{version}.jar` and uses `org.apache.tomcat.jdbc.pool.DataSource`
    to configure the `DataSource` bean.


    Spring Boot checks the availability of the following classes and uses the first
    one that is available in the classpath.


    *   `org.apache.tomcat.jdbc.pool.DataSource`

    *   `com.zaxxer.hikari.HikariDataSource`

    *   `org.apache.commons.dbcp.BasicDataSource`

    *   `org.apache.commons.dbcp2.BasicDataSource`


    If you want to use `HikariDataSource`, you can exclude `tomcat-jdbc` and add the
    `HikariCP` dependency as follows:


    ```

    org.springframework.boot

    spring-boot-starter-jdbc


    org.apache.tomcat

    tomcat-jdbc


    com.zaxxer

    HikariCP


    ```


    You can configure specific settings for the connection pool library as follows:


    ```

    spring.datasource.tomcat.*= # Tomcat Datasource specific settings

    spring.datasource.hikari.*= # Hikari DataSource specific settings

    spring.datasource.dbcp2.*= # Commons DBCP2 specific settings

    ```


    For example, you can set the `HikariCP` connection pool settings as follows:


    ```

    spring.datasource.hikari.allow-pool-suspension=true

    spring.datasource.hikari.connection-test-query=SELECT 1

    spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

    spring.datasource.hikari.connection-timeout=45000

    ```'
