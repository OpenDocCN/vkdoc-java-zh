  trans: '

    ## 自定义嵌入式 Servlet 容器


    Spring Boot 提供了大量自定义选项，可通过 `server.*` 属性配置 Servlet 容器。你可以在 `application.properties`
    中配置这些属性，以自定义 `port`、`connectionTimeout`、`contextPath`、SSL 配置参数以及会话配置参数。


    但如果需要更多控制权，你可以根据要使用的嵌入式服务器，通过注册类型为 `TomcatServletWebServerFactory`、`JettyServletWebServerFactory`
    或 `UndertowServletWebServerFactory` 的 Bean，以编程方式注册嵌入式 Servlet 容器。


    需要以编程方式注册嵌入式 Servlet 容器的一个常见场景是将默认的 HTTP 请求重定向到 HTTPS 协议。


    假设你的应用程序运行在 `http://localhost:8080` 上，并且你想使用 HTTPS 协议。如果有人访问 `http://localhost:8080`，你希望将请求重定向到
    `https://localhost:8443`。


    首先，使用以下命令生成自签名 SSL 证书：


    ```

    keytool -genkey -alias mydomain -keyalg RSA -keysize 2048 -keystore KeyStore.jks
    -validity 3650

    ```


    在回答 keytool 提出的问题后，它将生成一个 `KeyStore.jks` 文件，并将其复制到 `src/main/resources` 文件夹中。


    现在，在 `application.properties` 文件中按如下方式配置 SSL 属性：


    ```

    server.port=8443

    server.ssl.key-store=classpath:KeyStore.jks

    server.ssl.key-store-password=mysecret

    server.ssl.keyStoreType=JKS

    server.ssl.keyAlias=mydomain

    ```


    如果你使用的是 Tomcat 嵌入式容器，可以按清单 10-3 所示，以编程方式注册 `TomcatServletWebServerFactory`。


    ```

    @Configuration

    public class TomcatConfiguration

    {

    @LocalServerPort

    int serverPort;

    @Bean

    public ServletWebServerFactory servletContainer() {

    TomcatServletWebServerFactory tomcat = new TomcatServletWebServerFactory() {

    @Override

    protected void postProcessContext(Context context) {

    SecurityConstraint securityConstraint = new SecurityConstraint();

    securityConstraint.setUserConstraint("CONFIDENTIAL");

    SecurityCollection collection = new SecurityCollection();

    collection.addPattern("/*");

    securityConstraint.addCollection(collection);

    context.addConstraint(securityConstraint);

    }

    };

    tomcat.addAdditionalTomcatConnectors(initiateHttpConnector());

    return tomcat;

    }

    private Connector initiateHttpConnector() {

    Connector connector = new Connector("org.apache.coyote.http11.Http11NioProtocol");

    connector.setScheme("http");

    connector.setPort(8080);

    connector.setSecure(false);

    connector.setRedirectPort(serverPort);

    return connector;

    }

    }

    清单 10-3. 以编程方式注册 Tomcat 嵌入式容器

    ```


    通过此自定义配置，对 `http://localhost:8080/` 的请求将自动重定向到 `https://localhost:8443/`。


    ## 自定义 SpringMVC 配置


    大多数情况下，Spring Boot 的默认自动配置以及自定义属性足以调整你的 Web 应用程序。但有时，你可能需要以特定方式配置应用程序组件以满足应用需求，从而获得更多控制权。


    如果你想利用 Spring Boot 的自动配置并添加一些额外的 MVC 配置（拦截器、格式化器、视图控制器等），那么你可以创建一个不带 `@EnableWebMvc`
    注解的配置类，该类实现 `WebMvcConfigurer` 并提供额外的配置。参见清单 10-4。


    注意


    如果你想完全控制 Spring MVC 配置，可以添加一个使用 `@EnableWebMvc` 注解的自定义配置类。如果你创建了一个带有 `@Configuration`
    和 `@EnableWebMvc` 注解的配置类，Spring Boot 的 WebMVC 自动配置将完全关闭。


    ```

    @Configuration

    public class WebConfig implements WebMvcConfigurer

    {

    @Override

    public void addViewControllers(ViewControllerRegistry registry){

    registry.addViewController("/login").setViewName("public/login");

    registry.addRedirectViewController("/", "/home");

    }

    @Override

    public void addInterceptors(InterceptorRegistry registry) {

    //在此处添加额外的拦截器

    }

    @Override

    public void addResourceHandlers(ResourceHandlerRegistry registry) {

    registry.addResourceHandler("/assets/").addResourceLocations("/resources/assets/");

    }

    @Override

    public void configureDefaultServletHandling(DefaultServletHandlerConfigurer configurer)
    {

    configurer.enable();

    }

    @Override

    public void addFormatters(FormatterRegistry registry) {

    //在此处添加额外的格式化器

    }

    }

    清单 10-4. 自定义 SpringMVC 配置

    ```


    SpringMVC 提供了 `WebMvcConfigurerAdapter`，它是 `WebMvcConfigurer` 接口的一个实现。但从 Spring
    5.0 开始，`WebMvcConfigurerAdapter` 已被弃用，因为 `WebMvcConfigurer` 具有默认方法实现，并使用了 Java
    8 的默认方法支持。

