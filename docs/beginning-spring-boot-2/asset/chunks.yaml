    \ args);\n    }\n    }\n    Listing 1-17.\n    The com.apress.demo.Application.java\
    \ File\n    ```\n\nNow run `Application.java` as a Java application and point\
    \ your browser to `http://localhost:8080/`. You should see the list of users in\
    \ a table format.\n\nBy you might be scratching your head, thinking “What is going\
