    ```


    This is how you register beans conditionally based on the presence or absence
    of a class in the classpath.


    ### Using `@Conditional` Based on the Configured Spring Beans


    What if you want to register the `MongoUserDAO` bean only when no other Spring
    bean of type `UserDAO` are already registered?


    You can create a condition to check if there are any existing beans of a certain
    type, as shown in Listing [3-6](#A447991_1_En_3_Chapter.html#Par32).


    ```

    public class UserDAOBeanNotPresentsCondition implements Condition

    {

    @Override

    public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
    metadata)

    {

    UserDAO userDAO = conditionContext.getBeanFactory().getBean(UserDAO.class);

    return (userDAO == null);

    }

    }

    Listing 3-6.

