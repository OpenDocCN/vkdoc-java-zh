    \  \n印刷于无酸纸上  \n全球图书贸易由 Springer Science+Business Media New York 发行，地址：233 Spring\
    \ Street, 6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：orders-ny@springer-sbm.com，或访问\
    \ www.springeronline.com。  \nApress Media, LLC 是加利福尼亚州有限责任公司，其唯一成员（所有者）是 Springer\
    \ Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是特拉华州公司。\n\
    \n## 引言\n\nSpring 是构建企业级应用最流行的基于 Java 的框架。Spring 框架提供了丰富的项目生态系统，以满足现代应用的需求，例如安全、简化关系型和\
    \ NoSQL 数据存储的访问、批处理、与社交网站的集成、大量数据流的处理等。由于 Spring 是一个非常灵活且可定制的框架，通常有多种方式来配置应用。虽然拥有多种选择是件好事，但对于初学者来说可能会感到不知所措。Spring\
    \ Boot 通过其强大的自动配置机制，解决了“Spring 应用需要复杂配置”这一问题。\n\nSpring Boot 是一个遵循“约定优于配置”方法的固执己见的框架，有助于快速、轻松地构建基于\
    \ Spring 的应用。Spring Boot 的主要目标是快速创建基于 Spring 的应用，而无需开发人员反复编写相同的样板配置。\n\n近年来，微服务架构已成为构建复杂企业应用的首选架构风格。Spring\
    \ Boot 是使用各种 Spring Cloud 模块构建基于微服务的应用的绝佳选择。\n\n本书将帮助您理解什么是 Spring Boot，Spring\
    \ Boot 如何帮助您快速轻松地构建基于 Spring 的应用，以及通过易于理解的示例了解 Spring Boot 的内部工作原理。\n\n## 本书涵盖内容\n\
    \n本书涵盖以下主题：\n\n*   什么是 Spring Boot，它如何提高开发人员生产力？\n*   Spring Boot 自动配置在幕后是如何工作的？\n\
    *   如何创建自定义的 Spring Boot Starter？\n*   使用 JdbcTemplate、MyBatis、JOOQ 和 Spring Data\
    \ JPA 操作数据库\n*   使用 MongoDB NoSQL 数据库\n*   使用 Spring Boot 和 Thymeleaf 开发 Web 应用\n\
    *   使用 Spring WebFlux 开发响应式 Web 应用\n*   使用 Spring Boot 开发 REST API\n*   使用 Spring\
    \ Security 保护 Web 应用\n*   使用 Spring Boot Actuator 监控 Spring Boot 应用\n*   测试 Spring\
    \ Boot 应用\n*   使用 Groovy、Scala 和 Kotlin 开发 Spring Boot 应用\n*   在 Docker 容器中运行\
    \ Spring Boot 应用\n\n## 本书所需环境\n\n要学习本书中的示例，您必须安装以下软件：\n\n*   JDK 1.8\n*   您喜欢的\
    \ IDE\n    *   Spring Tool Suite\n    *   IntelliJ IDEA\n    *   NetBeans IDE\n\
    *   构建工具\n    *   Maven\n    *   Gradle\n*   数据库服务器\n    *   MySQL\n    *   PostgreSQL\n\
    \n致谢\n\n我要感谢我的妻子 Neha Jain 和我的家人，在我撰写本书的整个过程中给予的持续支持。\n\n我要向 Apress 团队，特别是 Steve\
    \ Anglin 和 Mark Powers，在整个过程中给予的持续支持表示衷心的感谢。我还要感谢审阅者提供的宝贵反馈，这些反馈有助于提高内容的质量。\n\n"
