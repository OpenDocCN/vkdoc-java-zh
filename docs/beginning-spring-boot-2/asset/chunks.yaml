    \n![A447991_1_En_1_Fig1_HTML.jpg](A447991_1_En_1_Fig1_HTML.jpg)\n\nFigure 1-1.\n\
    \nShowing a list of users\n\nYay…you did it. But wait, isn’t it too much work\
    \ to just show a list of user details pulled from a database table?\n\nLet’s be\
    \ honest and fair. All this configuration is not just for this one use-case. This\
    \ configuration becomes the basis for the rest of the application. Again, this\
    \ is too much work to do if you want to quickly get up and running. Another problem\
    \ with it is, assume that you want to develop another SpringMVC application with\
    \ a similar technical stack. You could copy and paste the configuration and tweak\
    \ it. Right?\n\nRemember one thing: if you have to do the same thing again and\
    \ again, you should find an automated way to do it.\n\nApart from writing the\
    \ same configuration again and again, do you see any other problems here? Let’s\
    \ take a look at the problems I am seeing here.\n\n*   You need to hunt through\
    \ all the compatible libraries for the specific Spring version and configure them.\n\
    *   Most of the time, you’ll configure the `DataSource`, `EntitymanagerFactory`,\
    \ `TransactionManager`, etc. beans the same way. Wouldn’t it be great if Spring\
    \ could do it for you automatically?\n*   Similarly, you configure the SpringMVC\
    \ beans like `ViewResolver`, `MessageSource`, etc. the same way most of the time.\
    \ If Spring can automatically do it for you, that would be awesome.\n\nWhat if\
