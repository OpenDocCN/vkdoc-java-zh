    \ '2017-05-20', null),\n(3, 'Introducing Spring Social', 'Developing social web\
    \ applications using Spring Social', '2017-05-24', null);\ninsert into comments(id,\
    \ post_id, name, email, content, created_on, updated_on) values\n(1, 1, 'John','john@gmail.com',\
    \ 'This is cool', '2017-05-10', null),\n(2, 1, 'Rambo','rambo@gmail.com', 'Thanks\
    \ for awesome tips', '2017-05-20', null),\n(3, 2, 'Paul', 'paul@gmail.com', 'Nice\
    \ post buddy.', '2017-05-24', null);\n清单 11-8.\nsrc/test/resources/data.sql\n\
    ```\n\n现在你将编写一个 Spring Boot 测试，它在定义的端口（`server.port` 值）上启动一个嵌入式 Servlet 容器，并使用\
    \ `RestTemplate` 调用 REST API 端点。参见清单 11-9。\n\n```\n@RunWith(SpringRunner.class)\n\
    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.DEFINED_PORT)\n\
    public class SpringbootMvcRestDemoApplicationTest\n{\nprivate static final String\
    \ ROOT_URL = \"http://localhost:8080\";\nRestTemplate restTemplate = new RestTemplate();\n\
    @Test\npublic void testGetAllPosts()\n{\nResponseEntity responseEntity =\nrestTemplate.getForEntity(ROOT_URL+\"\
    /posts\", Post[].class);\nList posts = Arrays.asList(responseEntity.getBody());\n\
    assertNotNull(posts);\n}\n@Test\npublic void testGetPostById()\n{\nPost post =\
    \ restTemplate.getForObject(ROOT_URL+\"/posts/1\", Post.class);\nassertNotNull(post);\n\
    }\n@Test\npublic void testCreatePost()\n{\nPost post = new Post();\npost.setTitle(\"\
    Exploring SpringBoot REST\");\npost.setContent(\"SpringBoot is awesome!!\");\n\
    post.setCreatedOn(new Date());\nResponseEntity postResponse =\nrestTemplate.postForEntity(ROOT_URL+\"\
    /posts\", post, Post.class);\nassertNotNull(postResponse);\nassertNotNull(postResponse.getBody());\n\
    }\n@Test\npublic void testUpdatePost()\n{\nint id = 1;\nPost post = restTemplate.getForObject(ROOT_URL+\"\
    /posts/\"+id, Post.class);\npost.setContent(\"This my updated post1 content\"\
    );\npost.setUpdatedOn(new Date());\nrestTemplate.put(ROOT_URL+\"/posts/\"+id,\
    \ post);\nPost updatedPost = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id,\
    \ Post.class);\nassertNotNull(updatedPost);\n}\n@Test\npublic void testDeletePost()\n\
    {\nint id = 2;\nPost post = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id,\
    \ Post.class);\nassertNotNull(post);\nrestTemplate.delete(ROOT_URL+\"/posts/\"\
    +id);\ntry {\npost = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id, Post.class);\n\
    }\ncatch (final HttpClientErrorException e) {\nassertEquals(e.getStatusCode(),\
    \ HttpStatus.NOT_FOUND);\n}\n}\n}\n清单 11-9.\n使用 RestTemplate 测试 REST 端点\n```\n\
    \n你使用了 `RestTemplate` 上的各种方法来调用 REST 服务，触发 `GET`、`POST`、`PUT` 和 `DELETE` 操作。然后你使用\
    \ `HttpMessageConverter` 将响应作为 Java 对象接收。\n\nCORS（跨域资源共享）支持\n\n出于安全原因，浏览器不允许你向当前源之外的资源发出\
    \ AJAX 请求。CORS 规范（[`https://www.w3.org/TR/cors/`](https://www.w3.org/TR/cors/)）提供了一种指定允许哪些跨域请求的方法。SpringMVC\
    \ 为 REST API 端点提供启用 CORS 的支持，以便 API 消费者（例如 Web 客户端和移动设备）可以调用 REST API。\n\n类和方法的\
    \ CORS 配置\n\n你可以使用 `@CrossOrigin` 注解在控制器级别或方法级别启用 CORS。现在你将看到如何在特定的请求处理方法上启用 CORS\
    \ 支持。\n\n```\n@RestController\npublic class UserController\n{\n@CrossOrigin\n\
    @GetMapping(\"/users/{id}\")\npublic User getUser(@PathVariable Long id) {\n//\
    \ ...\n}\n@DeleteMapping(\"/users/{id}\")\npublic void deleteUser(@PathVariable\
    \ Long id) {\n// ...\n}\n}\n```\n\n在这里，CORS 支持仅使用默认配置为 `forgetUsers()` 方法启用。\n\
    \n*   允许所有标头和源\n*   允许凭据\n*   最大年龄设置为 30 分钟\n*   HTTP 方法列表设置为 `@RequestMethod`\
    \ 注解上的方法\n\n你可以通过在 `@CrossOrigin` 注解上提供选项来自定义这些属性。\n\n```\n@CrossOrigin(origins={\"\
    http://domain1.com\", \"http://domain2.com\"},\nallowedHeaders=\"X-AUTH-TOKEN\"\
    ,\nallowCredentials=\"false\",\nmaxAge=15*60,\nmethods={RequestMethod.GET, RequestMethod.POST\
    \ }\n)\n@GetMapping(\"/users/{id}\")\npublic User getUser(@PathVariable Long id)\
    \ {\n// ...\n}\n```\n\n类似地，你可以在控制器类级别应用 `@CrossOrigin` 注解。\n\n```\n@CrossOrigin\n\
    @RestController\npublic class UserController\n{\n....\n....\n}\n```\n\n当在类级别应用时，相同的\
    \ `@CrossOrigin` 配置将应用于所有 `@RequestMapping` 方法。如果在类级别和方法级别都指定了 `@CrossOrigin`\
    \ 注解，Spring 将通过组合两个注解的属性来派生 CORS 配置。\n\n全局 CORS 配置\n\n除了在类和方法级别指定 CORS 配置之外，你还可以通过实现\
    \ `WebMvcConfigurer.addCorsMappings()` 方法全局配置它。参见清单 11-10。\n\n```\n@Configuration\n\
    public class WebConfig implements WebMvcConfigurer\n{\n@Override\npublic void\
    \ addCorsMappings(CorsRegistry registry) {\nregistry.addMapping(\"/api/**\")\n\
    .allowedOrigins(\"http://localhost:3000\")\n.allowedMethods(\"*\")\n.allowedHeaders(\"\
    *\")\n.allowCredentials(false)\n.maxAge(3600);\n}\n}\n清单 11-10.\nSpringMVC 全局\
    \ CORS 配置\n```\n\n此配置仅为来自源 `http://localhost:3000` 的 URL 模式 `/api/**` 启用 CORS。你可以指定\
    \ `allowedOrigins(\"*\")` 以允许来自任何源的请求。\n\n通过 RESTful 服务公开具有双向引用的 JPA 实体\n\n在通过\
    \ RESTful 服务公开具有双向引用的 JPA 实体时，你需要格外小心。如果你尝试编组一个包含子实体集合（例如 `List<Comment>`）的 JPA\
    \ 父实体（例如 `Post`），并且子实体具有对父实体（`Post`）的引用，那么 JPA 编组将导致无限递归并抛出 `StackOverflowError`。\n\
    \n假设你有以下 `Post` 和 `Comment` 实体：\n\n```\n@Entity\n@Table(name = \"POSTS\")\npublic\
    \ class Post\n{\n@Id @GeneratedValue(strategy = GenerationType.IDENTITY)\nprivate\
    \ Integer id;\n@Column(name = \"title\", nullable = false, length = 150)\nprivate\
    \ String title;\n....\n....\n@OneToMany(mappedBy=\"post\")\nprivate List comments;\n\
    //setters & getters\n}\n@Entity\n@Table(name = \"COMMENTS\")\npublic class Comment\n\
    {\n@Id @GeneratedValue(strategy = GenerationType.IDENTITY)\nprivate Integer id;\n\
    @Column(name = \"name\", nullable = false, length = 150)\nprivate String name;\n\
    ...\n...\n@ManyToOne(optional=false)\n@JoinColumn(name=\"post_id\")\nprivate Post\
    \ post;\n//setters & getters\n}\n```\n\n在这里，你在 `Post` 和 `Comment` 实体之间有一个双向关联。现在假设你正在公开一个\
    \ REST 端点以通过其 `id` 获取 `Post`，如下所示：\n\n```\n@GetMapping(\"/{id}\")\npublic Post\
    \ getPost(@PathVariable(\"id\") Integer id)\n{\nreturn postRepository.findById(id)\n\
    .orElseThrow(() -> new ResourceNotFoundException(\"No post found with id=\"+id));\n\
    }\n```\n\n如果你访问 `http://localhost:8080/posts/1`，代码将进入无限递归，服务器将抛出 `StackOverflowError`。\n\
    \nSpring Boot 默认配置 Jackson JSON（[`https://github.com/FasterXML/jackson-databind`](https://github.com/FasterXML/jackson-databind)）库来将\
    \ Java bean 编组/解组为 JSON，反之亦然。\n\n你可以通过以下方式使用 Jackson JSON 库注解来解决无限递归问题。\n\n使用\
    \ @JsonIgnore\n\n你可以通过向子对象的反向引用添加 `@JsonIgnore` 注解来打破无限递归。\n\n```\n@Entity\n@Table(name\
    \ = \"COMMENTS\")\npublic class Comment\n{\n...\n...\n@JsonIgnore\n@ManyToOne(optional=false)\n\
    @JoinColumn(name=\"post_id\")\nprivate Post post;\n...\n...\n}\n```\n\n你可以将 `@JsonIgnore`\
    \ 添加到所有你想要排除在编组之外的属性，或者你可以在类级别使用 `@JsonIgnoreProperties` 来列出所有要忽略的属性名称。\n\n```\n\
    @JsonIgnoreProperties({\"post\"})\n@Entity\n@Table(name = \"COMMENTS\")\npublic\
    \ class Comment\n{\n....\n....\n}\n```\n\n现在你应该能够访问 `http://localhost:8080/posts/1`\
    \ 并获取响应 JSON。\n\n使用 @JsonManagedReference 和 @JsonBackReference\n\n你也可以使用 `@JsonManagedReference`\
    \ 和 `@JsonBackReference` 注解来打破无限递归。\n\n注意\n\n`@JsonManagedReference` 注解用于指示带注解的属性是字段之间双向链接的一部分，并且其角色是“父级”（或“正向”）链接。`@JsonBackReference`\
    \ 注解也用于指示关联属性是字段之间双向链接的一部分，但其角色是“子级”（或“反向”）链接。\n\n你将使用 `@JsonManagedReference`\
    \ 注解 `Post` 中的 `List<Comment>` 集合，因为它在编组 `Post` 对象的上下文中是父级。你将使用 `@JsonBackReference`\
    \ 注解 `Comment` 类中的反向引用属性 `POST`，因为它是到父级 `Post` 对象的反向链接。\n\n```\n@Entity\n@Table(name\
    \ = \"POSTS\")\npublic class Post\n{\n....\n....\n@JsonManagedReference\n@OneToMany(mappedBy=\"\
    post\")\nprivate List comments;\n//setters & getters\n}\n@Entity\n@Table(name\
    \ = \"COMMENTS\")\npublic class Comment\n{\n....\n....\n@JsonBackReference\n@ManyToOne(optional=false)\n\
    @JoinColumn(name=\"post_id\")\nprivate Post post;\n//setters & getters\n}\n```\n\
    \n有时，你可能需要对响应格式进行更多控制，并且不能或不想直接将数据库实体公开为 REST 端点响应。在这种情况下，你可以使用数据传输对象（DTO），你可以使用\
    \ Java 对象映射器库（例如 Dozer（[`http://dozer.sourceforge.net/`](http://dozer.sourceforge.net/)）、ModelMapper（[`http://modelmapper.org/`](http://modelmapper.org/)）和\
    \ MapStruct（[`http://mapstruct.org/`](http://mapstruct.org/)））从实体填充 DTO。\n\n使用\
    \ Spring Data REST 的 REST API\n\n在上一节中，你为 JPA 实体实现了具有 CRUD 操作的 REST API。如果你的应用程序需求更像是基于数据库表的\
    \ CRUD 操作的 REST API，你可以使用 Spring Data REST。\n\nSpring Data REST 构建在 Spring Data\
    \ 存储库之上，并自动将它们导出为 REST 资源。Spring Data REST 配置在配置类 `RepositoryRestMvcConfiguration`\
    \ 中定义，你可以简单地使用 `@Import(RepositoryRestMvcConfiguration.class)` 导入它以在我们的应用程序中激活它。\n\
    \n如果你将 `spring-boot-starter-data-rest` 添加到你的应用程序，Spring Boot 将自动启用 Spring Data\
    \ REST。\n\n```\norg.springframework.boot\nspring-boot-starter-data-rest\n\n```\n\
    \n要使用默认设置将 Spring Data 存储库公开为 REST 资源，你无需添加任何额外配置。你可以像上一节所示那样简单地创建 JPA 实体和 Spring\
    \ Data JPA 存储库。\n\n现在你可以运行以下入口点类来启动服务器。\n\n```\n@SpringBootApplication\npublic\
    \ class SpringbootDataRestDemoApplication\n{\npublic static void main(String[]\
    \ args)\n{\nSpringApplication.run(SpringbootDataRestDemoApplication.class, args);\n\
    }\n}\n```\n\n假设你创建了 JPA 实体 `User`、`Post` 和 `Comment` 以及它们的 JPA 存储库，如上一节所示，现在你将使用\
    \ Postman REST 客户端工具调用 REST 服务。\n\n调用 `http://localhost:8080/posts GET` 请求，并将\
    \ `Accept` 标头设置为 `application/json`。这应该返回清单 11-11 中所示的响应。\n\n```\n{\n_embedded:{\n\
    posts:[\n{\nid:1,\ntitle:\"Introducing SpringBoot\",\ncontent:\"SpringBoot is\
    \ awesome\",\ncreatedOn:\"2017-05-09T18:30:00.000+0000\",\nupdatedOn:null,\n_links:{\n\
    self:{\nhref:\"http://localhost:8080/api/posts/1\"\n},\npost:{\nhref:\"http://localhost:8080/api/posts/1\"\
    \n},\ncomments:{\nhref:\"http://localhost:8080/api/posts/1/comments\"\n}\n}\n\
    },\n{\nid:2,\ntitle:\"Securing Web applications\",\ncontent:\"This post will show\
    \ how to use SpringSecurity\",\ncreatedOn:\"2017-05-19T18:30:00.000+0000\",\n\
    updatedOn:null,\n_links:{\nself:{\nhref:\"http://localhost:8080/api/posts/2\"\n\
    },\npost:{\nhref:\"http://localhost:8080/api/posts/2\"\n},\ncomments:{\nhref:\"\
    http://localhost:8080/api/posts/2/comments\"\n}\n}\n},\n{\nid:3,\ntitle:\"Introducing\
    \ Spring Social\",\ncontent:\"Developing social web applications using Spring\
    \ Social\",\ncreatedOn:\"2017-05-23T18:30:00.000+0000\",\nupdatedOn:null,\n_links:{\n\
    self:{\nhref:\"http://localhost:8080/api/posts/3\"\n},\npost:{\nhref:\"http://localhost:8080/api/posts/3\"\
    \n},\ncomments:{\nhref:\"http://localhost:8080/api/posts/3/comments\"\n}\n}\n\
    }\n]\n},\n_links:{\nself:{\nhref:\"http://localhost:8080/api/posts{?page,size,sort}\"\
    ,\ntemplated:true\n},\nprofile:{\nhref:\"http://localhost:8080/api/profile/posts\"\
    \n},\nsearch:{\nhref:\"http://localhost:8080/api/posts/search\"\n}\n},\npage:{\n\
    size:20,\ntotalElements:3,\ntotalPages:1,\nnumber:0\n}\n}\n清单 11-11.\nSpring Data\
    \ REST 集合资源响应\n```\n\n你可以通过在 `http://localhost:8080/posts` 上调用 `POST` 请求来创建一个新的\
    \ `Post`，并将 `Accept` 和 `Content-Type` 标头设置为 `application/json`。将要创建的 `Post` 详细信息作为\
    \ JSON 传递到请求体中。\n\n```\n{\n\"title\": \"My 4th Post\",\n\"content\": \"This is\
    \ my awesome 4th post\",\n\"createdOn\": \"2016-05-09T18:30:00.000+0000\"\n}\n\
    ```\n\n类似地，你可以通过在 `http://localhost:8080/posts/4` 上使用 `PUT` 请求来更新 `id=4` 的 `POST`。\n\
    \n```\n{\n\"title\": \"My fourth Post\",\n\"content\": \"This is my awesome 4th\
    \ post\",\n\"createdOn\": \"2016-05-09T18:30:00.000+0000\",\n\"updatedOn\": \"\
    2016-05-09T18:40:00.000+0000\"\n}\n```\n\n你可以通过在 `http://localhost:8080/posts/4`\
    \ 上使用 `DELETE` 请求来删除 `id=4` 的 `POST`。\n\n默认情况下，Spring Data REST 在根 URI `\"/\"\
    ` 上提供 REST 资源。你可以使用 `application.properties` 中的 `spring.data.rest.basePath` 属性自定义路径。\n\
    \n```\nspring.data.rest.basePath=/api\n```\n\n排序和分页\n\n如果 `Repository` 扩展了 `PagingAndSortingRepository`，那么\
    \ Spring Data REST 端点开箱即用地支持分页和排序。\n\n你可以使用 `size` 查询参数来限制返回的条目数。\n\n```\nhttp://localhost:8080/posts/?size=10\n\
    ```\n\n要检索每页五个条目的第二页条目，请使用 `page` 和 `size` 查询参数。\n\n```\nhttp://localhost:8080/posts?page=1&size=5\n\
    ```\n\n要检索按某个属性排序的条目，请使用 `sort` 查询参数。\n\n```\nhttp://localhost:8080/posts?sort=createdOn,desc\n\
    ```\n\nSpring Data REST 默认公开所有公共存储库接口，无需任何额外配置。但是，如果你想自定义默认设置，可以使用 `@RepositoryRestResource`\
    \ 和 `@RestResource` 注解。你可以通过添加 `@RepositoryRestResource(exported = false)` 来禁用将存储库公开为\
    \ REST 资源。\n\n```\n@RepositoryRestResource(exported = false)\npublic interface\
    \ CommentRepository extends JpaRepository\n{\n}\n```\n\n你可以通过向方法添加 `@RestResource(exported\
    \ = false)` 来禁用将特定方法公开为 REST 资源。你还可以使用 `@RepositoryRestResource` 自定义默认的 `path`\
    \ 和 `rel` 属性值，如下所示：\n\n```\n@RepositoryRestResource(path = \"people\", rel = \"\
    people\")\npublic interface UserRepository extends JpaRepository\n{\n@Override\n\
    @RestResource(exported = false)\nvoid delete(Integer id);\n@Override\n@RestResource(exported\
    \ = false)\nvoid delete(User entity);\n}\n```\n\n你可以使用 `application.properties`\
    \ 文件中的 `spring.data.rest.*` 属性自定义 Spring Data REST 的各种属性。如果你想要对自定义进行更多控制，你可以注册一个\
    \ `RepositoryRestConfigurer`（或扩展 `RepositoryRestConfigurerAdapter`）并根据需要实现或覆盖\
    \ `configure*()` 方法。\n\n例如，默认情况下，实体的主键（`id`）值不会在响应中公开。如果你想公开某些实体的 `id` 值，你可以按如下方式自定义：\n\
    \n```\n@Configuration\npublic class RestRepositoryConfig extends RepositoryRestConfigurerAdapter\n\
    {\n@Override\npublic void configureRepositoryRestConfiguration(RepositoryRestConfiguration\
    \ config)\n{\nconfig.exposeIdsFor(User.class);\n}\n}\n```\n\n通过此自定义，响应将包含 `id`\
    \ 属性。\n\nSpring Data REST 中的 CORS 支持\n\n与 SpringMVC REST 端点类似，你可以使用存储库级别或全局的 `@CrossOrigin`\
    \ 注解为 Spring Data REST 端点启用 CORS 支持。\n\n```\n@CrossOrigin\npublic interface UserRepository\
    \ extends JpaRepository\n{\n}\n```\n\n要全局启用 CORS 支持，你可以扩展 `RepositoryRestConfigurerAdapter`\
    \ 并提供 CORS 配置，如清单 11-12 所示。\n\n```\n@Configuration\npublic class RepositoryConfig\
    \ extends RepositoryRestConfigurerAdapter\n{\n@Override\npublic void configureRepositoryRestConfiguration(RepositoryRestConfiguration\
    \ config)\n{\nconfig.getCorsRegistry()\n.addMapping(\"/api/**\")\n.allowedOrigins(\"\
    http://localhost:3000\")\n.allowedMethods(\"*\")\n.allowedHeaders(\"*\")\n.allowCredentials(false)\n\
    .maxAge(3600);\n}\n}\n清单 11-12.\nSpring Data REST 全局 CORS 配置\n```\n\n注意\n\nSpringMVC\
    \ 的 CORS 配置不适用于 Spring Data REST 端点。\n\n要了解有关 Spring Data REST 的更多信息，请访问 Spring\
    \ Data REST 文档： [`http://docs.spring.io/spring-data/rest/docs/current/reference/html/`](http://docs.spring.io/spring-data/rest/docs/current/reference/html/)\
    \ 。\n\n异常处理\n\n你可以像在基于 SpringMVC 的 Web 应用程序中处理异常一样处理 REST API 中的异常——通过使用 `@ExceptionHandler`\
    \ 和 `@ControllerAdvice` 注解。你可以返回带有适当 HTTP 状态码和异常详细信息的 `ResponseEntity`，而不是渲染视图。\n\
    \n与其简单地抛出带有 HTTP 状态码的异常，不如提供有关问题的更多详细信息，例如错误代码、消息、开发人员消息等。\n\n创建一个名为 `ErrorDetails`\
    \ 的类，如清单 11-13 所示。\n\n```\npublic class ErrorDetails\n{\nprivate String errorCode;\n\
    private String errorMessage;\nprivate String devErrorMessage;\nprivate Map additionalData\
    \ = new HashMap();\n//setters & getters\n}\n清单 11-13.\nErrorDetails.java\n```\n\
    \n在控制器处理方法中，你可以根据错误条件抛出异常，并使用 `@ExceptionHandler` 方法处理这些异常，如清单 11-14 所示。\n\n```\n\
    @RestController\n@RequestMapping(value=\"/posts\")\npublic class PostController\n\
    {\n...\n...\n@DeleteMapping(\"/{id}\")\npublic void deletePost(@PathVariable(\"\
    id\") Integer id)\n{\nPost post = postRepository.findById(id)\n.orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\ntry {\npostRepository.deleteById(post.getId());\n\
    } catch (Exception e) {\nthrow new PostDeletionException(\"Post with id=\"+id+\"\
    \ can't be deleted\");\n}\n}\n...\n...\n@ExceptionHandler(PostDeletionException.class)\n\
    public ResponseEntity servletRequestBindingException(PostDeletionException e)\n\
    {\nErrorDetails errorDetails = new ErrorDetails();\nerrorDetails.setErrorMessage(e.getMessage());\n\
    StringWriter sw = new StringWriter();\nPrintWriter pw = new PrintWriter(sw);\n\
    e.printStackTrace(pw);\nerrorDetails.setDevErrorMessage(sw.toString());\nreturn\
    \ new ResponseEntity(errorDetails, HttpStatus.INTERNAL_SERVER_ERROR);\n}\n}\n\
    清单 11-14.\n在控制器级别使用 @ExceptionHandler 方法处理 REST API 异常\n```\n\n你可以使用带有 `@ExceptionHandler`\
    \ 方法的 `@ControllerAdvice` 类全局处理异常，如清单 11-15 所示。\n\n```\n@ControllerAdvice\npublic\
    \ class GlobalExceptionHandler\n{\n@ExceptionHandler(ServletRequestBindingException.class)\n\
    public ResponseEntity servletRequestBindingException(ServletRequestBindingException\
    \ e) {\nErrorDetails errorDetails = new ErrorDetails();\nerrorDetails.setErrorMessage(e.getMessage());\n\
    errorDetails.setDevErrorMessage(getStackTraceAsString(e));\nreturn new ResponseEntity(errorDetails,\
    \ HttpStatus.BAD_REQUEST);\n}\n@ExceptionHandler(Exception.class)\npublic ResponseEntity\
    \ exception(Exception e) {\nErrorDetails errorDetails = new ErrorDetails();\n\
    errorDetails.setErrorMessage(e.getMessage());\nerrorDetails.setDevErrorMessage(getStackTraceAsString(e));\n\
    return new ResponseEntity(errorDetails, HttpStatus.INTERNAL_SERVER_ERROR);\n}\n\
    private String getStackTraceAsString(Exception e)\n{\nStringWriter sw = new StringWriter();\n\
    PrintWriter pw = new PrintWriter(sw);\ne.printStackTrace(pw);\nreturn sw.toString();\n\
    }\n}\n清单 11-15.\n使用 @ExceptionHandler 方法全局处理 REST API 异常\n```\n\n全局异常处理机制帮助你在一个中心位置处理异常（如数据库通信错误和第三方服务调用失败），而不是在每个控制器类中处理它们。\n\
    \n总结\n\n本章讨论了如何使用 SpringMVC 和 Spring Data REST 创建 REST API。还介绍了如何在控制器级别和全局级别处理异常。在下一章中，你将学习如何使用\
    \ Spring WebFlux 构建响应式 Web 应用程序。\n\n12. 使用 Spring WebFlux 进行响应式编程\n\n与几年前相比，现代\
    \ IT 业务需求发生了显著变化。从各种来源（如社交媒体网站、物联网设备、传感器等）生成的数据量是巨大的。传统的数据处理模型可能不适合处理如此大量的数据。尽管如今我们有更好的硬件支持，但许多现有的\
    \ API 是同步和阻塞的 API，这成为提高吞吐量的瓶颈。\n\n响应式编程是一种编程范式，它提倡一种异步、非阻塞、事件驱动的数据处理方法。响应式编程正在获得发展势头，许多编程语言都提供了响应式框架和库。\n\
    \n在 Java 中，有像 RxJava 和 Reactor 这样的响应式库，它们支持响应式编程。随着 Java 社区对响应式编程的兴趣日益增长，一项名为响应式流的新倡议开始为具有非阻塞背压的异步流处理提供标准。响应式流支持将成为\
    \ Java 9 版本的一部分。\n\nSpring 框架 5 引入了对响应式编程的支持，并提供了新的 WebFlux 模块。使用 Spring 5 的 Spring\
    \ Boot 2 也提供了一个启动器，用于使用 WebFlux 快速创建响应式应用程序。本章教你如何使用 Spring WebFlux 构建响应式 Web\
    \ 应用程序。\n\n响应式编程简介\n\n响应式编程涉及将数据和事件建模为可观察的数据流，并实现数据处理例程以响应这些流中的变化。一群人共同制定了响应式宣言，网址为\
    \ [ `http://www.reactivemanifesto.org/`\n](http://www.reactivemanifesto.org/)\
    \ ，以描述响应式系统的特征。\n\n响应式编程正变得越来越流行，并且许多流行的编程语言已经有了响应式框架或库。\n\n*   Project Reactor—\
    \ [`https://projectreactor.io/`](https://projectreactor.io/) \n*   RxJava— [`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava)\
    \ \n*   Akka Streams— [`http://doc.akka.io/docs/akka/2.5.3/scala/stream/index.html`](http://doc.akka.io/docs/akka/2.5.3/scala/stream/index.html)\
    \ \n*   RxJS— [`https://github.com/ReactiveX/rxjs`](https://github.com/ReactiveX/rxjs)\
    \ \n*   Rx.NET— [`https://github.com/Reactive-Extensions/Rx.NET`](https://github.com/Reactive-Extensions/Rx.NET)\
    \ \n*   RxScala— [`http://reactivex.io/rxscala`](http://reactivex.io/rxscala)\
    \ \n*   RxClojure— [`https://github.com/ReactiveX/RxClojure`](https://github.com/ReactiveX/RxClojure)\
    \ \n*   RxSwift— [`https://github.com/ReactiveX/RxSwift`](https://github.com/ReactiveX/RxSwift)\
    \ \n\n响应式流\n\n响应式流（[`http://www.reactive-streams.org/`](http://www.reactive-streams.org/)）是一项为具有非阻塞背压的异步流处理提供标准的倡议。响应式流的关键组件是\
    \ `Publisher` 和 `Subscriber`。\n\n`Publisher` 是无限数量的有序元素的提供者，这些元素根据从订阅者那里收到的需求发布。\n\
    \n```\npublic interface Publisher {\npublic void subscribe(Subscriber s);\n}\n\
    ```\n\n`Subscriber` 订阅发布者以进行回调。发布者不会自动将数据推送给订阅者，除非订阅者请求数据。\n\n```\npublic interface\
    \ Subscriber {\npublic void onSubscribe(Subscription s);\npublic void onNext(T\
    \ t);\npublic void onError(Throwable t);\npublic void onComplete();\n}\n```\n\n\
    响应式流的两个流行实现是 RxJava（[`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava)）和\
    \ Project Reactor（[`https://projectreactor.io/`](https://projectreactor.io/)）。\n\
    \nProject Reactor\n\nProject Reactor 是响应式流规范的一个实现，具有非阻塞和背压支持。Reactor 提供了两种可组合的响应式类型——`Flux`\
    \ 和 `Mono`——它们实现了发布者，但也提供了丰富的操作符集。`Flux` 表示 0..N 个项目的响应式序列，而 `Mono` 表示单个值或空结果。\n\
    \n`Flux<T>` 是一个标准的 `Publisher<T>`，表示 0 到 N 个发射项的异步序列，可选地由成功信号或错误终止。\n\n`Mono<T>`\
    \ 是一个专门的 `Publisher<T>`，它最多发射一个项目，然后可选地以 `onComplete` 信号或 `onError` 终止。`Mono`\
    \ 可用于表示返回 `Mono<Void>` 的无值异步进程。\n\n现在你将看到如何创建 `Mono` 和 `Flux` 类型以及如何从中消费数据。\n\n\
    ```\nMono mono = Mono.just(\"Spring\");\nMono mono = Mono.empty();\nFlux flux\
    \ = Flux.just(\"Spring\", \"SpringBoot\", \"Reactor\");\nFlux flux = Flux.fromArray(new\
    \ String[]{\"Spring\", \"SpringBoot\", \"Reactor\"});\nFlux flux = Flux.fromIterable(Arrays.asList(\"\
    Spring\", \"SpringBoot\", \"Reactor\"));\n```\n\n在你订阅发布者之前，不会发生数据流。你必须启用日志记录并订阅\
    \ flux。\n\n```\nFlux flux = Flux.just(\"Spring\", \"SpringBoot\", \"Reactor\"\
    );\nflux.log().subscribe();\n```\n\n当你运行此代码时，它将记录底层回调方法调用，如下所示：\n\n```\n[main]\
    \ INFO reactor.Flux.Array.1 - | onSubscribe([Synchronous Fuseable] FluxArray.ArraySubscription)\n\
    [main] INFO reactor.Flux.Array.1 - | request(unbounded)\n[main] INFO reactor.Flux.Array.1\
    \ - | onNext(Spring)\n[main] INFO reactor.Flux.Array.1 - | onNext(SpringBoot)\n\
    [main] INFO reactor.Flux.Array.1 - | onNext(Reactor)\n[main] INFO reactor.Flux.Array.1\
    \ - | onComplete()\n```\n\n查看日志语句，你可以看到当你订阅 `Publisher` 时：\n\n*   当你订阅 `Publisher(Flux)`\
    \ 时，会调用 `onSubscribe()` 方法。\n*   当你在 `Publisher` 上调用 `subscribe()` 时，会创建一个订阅。此订阅从发布者请求数据。在此示例中，它默认为无限制，因此请求每个可用的元素。\n\
    *   为每个元素调用 `onNext()` 回调方法。\n*   在接收到最后一个元素后，最后调用 `onComplete()` 回调方法。\n*   如果在消费下一个元素时发生错误，则会调用\
    \ `onError()` 回调。\n\n注意\n\n深入介绍 Project Reactor 超出了本书的范围。有关更多详细信息，请参阅 Project\
    \ Reactor 文档：[ `http://projectreactor.io/docs/core/release/reference/`\n](http://projectreactor.io/docs/core/release/reference/)\
    \ 。\n\nSpring WebFlux 响应式框架构建在 Project Reactor 之上，Project Reactor 是响应式流规范的实现。\n\
    \n使用 Spring WebFlux 的响应式 Web 应用程序\n\nSpring 框架 5 附带了一个名为 `spring-webflux` 的新模块，以支持构建响应式\
    \ Web 应用程序。Spring WebFlux 默认使用 Project Reactor，它是用于响应式支持的响应式流实现。但你也可以使用其他响应式流实现，例如\
    \ RxJava。`spring-webflux` 模块支持使用 REST、HTML 浏览器和 WebSocket 风格的通信创建响应式服务器应用程序以及响应式客户端应用程序。\n\
    \nSpring WebFlux 可以在支持 Servlet 3.1 非阻塞 I/O API 的 Servlet 容器上运行，也可以在 Netty 和 Undertow\
    \ 等其他异步运行时上运行。参见图 12-1。\n\n![A447991_1_En_12_Fig1_HTML.gif](img/A447991_1_En_12_Fig1_HTML.gif)\n\
    \n图 12-1.\n\nSpring WebFlux 运行时支持\n\n每个运行时都适配为响应式 `ServerHttpRequest` 和 `ServerHttpResponse`，从而将请求和响应的体暴露为\
    \ `Flux<DataBuffer>`，而不是 `InputStream` 和 `OutputStream`，并具有响应式背压。在此基础上支持 REST\
    \ 风格的 JSON 和 XML 序列化与反序列化以及 HTML 视图渲染，作为 `Flux<Object>`。\n\n你可以通过两种方式使用 `spring-webflux`\
    \ 模块开发响应式 Web 应用程序：\n\n*   使用基于 SpringMVC 风格注解的方法，使用 `@Controller & @RestController`\n\
    *   使用带有路由器和处理器的函数式风格\n\n使用基于注解的编程模型的 WebFlux\n\n你可以使用熟悉的 Spring MVC 注解 `@Controller`\
    \ 或 `@RestController` 构建响应式 Web 应用程序，这些注解也适用于 WebFlux。当与 WebFlux 一起使用时，底层框架组件（如\
    \ `HandlerMapping` 和 `HandlerAdapter`）是非阻塞的，并在响应式 `ServerHttpRequest` 和 `ServerHttpResponse`\
    \ 上运行，而不是在 `HttpServletRequest` 和 `HttpServletResponse` 上运行。\n\n即使你在控制器层使用 WebFlux\
    \ 响应式支持，如果你使用阻塞式数据访问 API（如 JDBC 或 JPA），你的应用程序也不会是完全响应式的。截至目前，关系数据库供应商尚未提供非阻塞驱动程序实现。有一些\
    \ NoSQL 数据存储（如 MongoDB、Cassandra 和 Redis）提供了响应式驱动程序。\n\n现在你将使用基于注解的编程模型开发一个带有\
    \ Spring WebFlux 的响应式 Web 应用程序。你将使用 MongoDB 响应式流驱动程序（[`https://mongodb.github.io/mongo-java-driver-reactivestreams/`](https://mongodb.github.io/mongo-java-driver-reactivestreams/)）来充分利用\
    \ MongoDB 的响应式支持。\n\n创建一个带有响应式 Web 和响应式 Mongo 启动器的 Spring Boot 应用程序。\n\n```\n\
    org.springframework.boot\nspring-boot-starter-webflux\n\norg.springframework.boot\n\
    spring-boot-starter-data-mongodb-reactive\n\n```\n\n通过添加以下依赖项来使用嵌入式 MongoDB 服务器，这样你就不需要安装\
    \ MongoDB 服务器。\n\n```\nde.flapdoodle.embed\nde.flapdoodle.embed.mongo\n\n```\n\
    \n创建一个表示 MongoDB 中文档的 `User` POJO，如清单 12-1 所示。\n\n```\nimport org.springframework.data.annotation.Id;\n\
    import org.springframework.data.mongodb.core.mapping.Document;\n@Document\npublic\
    \ class User\n{\n@Id\nprivate String id;\nprivate String name;\nprivate String\
    \ email;\n//setters and getters\n}\n清单 12-1.\nUser.java\n```\n\nSpring Data Mongo\
    \ 库提供了 `ReactiveCrudRepository`，它类似于 `CrudRepository`，但具有响应式支持，它将在底层与 MongoDB\
    \ 响应式驱动程序交互。\n\n现在为 `User` 创建一个 Spring Data 存储库，如清单 12-2 所示。\n\n```\nimport org.springframework.data.repository.reactive.ReactiveCrudRepository;\n\
    public interface UserReactiveRepository extends ReactiveCrudRepository\n{\n}\n\
    清单 12-2.\nUserReactiveRepository.java\n```\n\n基于 Spring WebFlux 注解的控制器看起来与 SpringMVC\
    \ 控制器非常相似，只是输入和返回类型将使用 Reactor 类型 `Mono` 或 `Flux`。\n\n现在你可以实现 `User` 的 CRUD 操作，如清单\
    \ 12-3 所示。\n\n```\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.web.bind.annotation.*;\nimport reactor.core.publisher.Flux;\n\
    import reactor.core.publisher.Mono;\n@RestController\n@RequestMapping(\"/api/users\"\
    )\npublic class UserController\n{\n@Autowired\nprivate UserReactiveRepository\
    \ userReactiveRepository;\n@GetMapping\npublic Flux allUsers() {\nreturn userReactiveRepository.findAll();\n\
    }\n@GetMapping(\"/{id}\")\npublic Mono  getUser(@PathVariable String id) {\nreturn\
    \ userReactiveRepository.findById(id);\n}\n@PostMapping\npublic Mono saveUser(@RequestBody\
    \ Mono userMono) {\nreturn userMono.flatMap(user -> userReactiveRepository.save(user));\n\
    }\n@DeleteMapping(\"/{id}\")\npublic Mono deleteUser(@PathVariable String id)\
    \ {\nreturn userReactiveRepository.deleteById(id);\n}\n}\n清单 12-3.\n遵循基于注解的响应式编程模型的\
    \ UserController.java\n```\n\n`UserController` 实现中没有什么新内容，只是你使用了 Reactor 类型，例如\
    \ `Mono<User>` 来表示单个用户对象的流，并使用 `Flux<User>` 来表示一个或多个 `User` 对象的流。\n\n需要记住的一个关键点是，除非有人订阅了响应式流管道，否则什么也不会发生。例如，以下方法不会在\
    \ MongoDB 中插入用户文档。\n\n```\n@PostMapping\npublic Mono saveUser(@RequestBody Mono\
    \ userMono) {\nuserMono.flatMap(user -> userReactiveRepository.save(user));\n\
    return Mono.empty();\n}\n```\n\n这只是定义了流管道，但没有人订阅它，所以什么也不会发生。以下代码将插入用户文档，因为它显式地在管道上调用了\
    \ `subscribe()`。\n\n```\nuserMono.flatMap(user -> userReactiveRepository.save(user)).subscribe();\n\
    ```\n\n`UserController.saveUser()` 实现返回 `Mono<User>`，以便 Web 响应订阅管道。因此，它按预期工作。\n\
    \n使用函数式编程模型的 WebFlux\n\nSpring 框架 5 引入了一种新的函数式风格编程模型，它构建在响应式基础之上，除了基于注解的编程模型之外。\n\
    \n你可以将 `HandlerFunctions` 实现为 Java 8 lambda，并使用 `RouterFunctions` 将请求 URL 模式映射到\
    \ `HandlerFunctions`，而不是使用注解来定义请求处理方法。\n\n```\nHandlerFunction echoHandlerFn =\n\
    ( request ) -> ServerResponse.ok().body(fromObject(request.queryParam(\"name\"\
    )));\nRequestPredicate predicate = RequestPredicates.GET(\"/echo\");\nRouterFunction\
    \ routerFunction = RouterFunctions.route(predicate, echoHandlerFn);\n```\n\n此示例将\
    \ URL 模式 GET `\"/echo\"` 映射到 `echoHandlerFn`，后者返回请求参数 `\"name\"` 的值作为响应体。你可以使用\
    \ Java 8 lambda 和静态导入以更简洁的方式编写相同的代码块，如下所示：\n\n```\nroute(GET(\"/echo\"), request\
    \ -> ok().body(fromObject(request.queryParam(\"name\"))));\n```\n\n现在你可以探索函数式\
    \ Web 框架的关键组件。\n\nHandlerFunction\n\n`HandlerFunction` 是一个函数式接口，它接受 `ServletRequest`\
    \ 并返回 `ServletResponse`。\n\n```\n@FunctionalInterface\npublic interface HandlerFunction\n\
    {\nMono handle(ServerRequest request);\n}\n```\n\n这里，`ServerRequest` 和 `ServerResponse`\
    \ 是构建在 Reactor 类型之上的不可变接口。你可以将请求体转换为 Reactor 的 `Mono` 或 `Flux` 类型，并且你可以将响应式流的\
    \ `Publisher` 的任何实例作为响应体发送。\n\nServerRequest\n\n`org.springframework.web.reactive.function.server.ServerRequest`\
    \ 接口表示服务器端的 HTTP 请求。你可以使用各种方法从 `ServerRequest` 中检索输入 HTTP 请求的信息，如下所示：\n\n```\n\
    HttpMethod method = request.method();\nString path = request.path();\nString id\
    \ = request.pathVariable(\"id\");\nMap pathVariables = request.pathVariables();\n\
    Optional email = request.queryParam(\"email\");\nURI uri = request.uri();\n```\n\
    \n你可以使用 `bodyToMono()` 和 `bodyToFlux()` 方法将请求体转换为 `Mono` 或 `Flux`。\n\n```\nMono\
    \ userMono = request.bodyToMono(User.class);\nFlux usersFlux = request.bodyToFlux(User.class);\n\
    ```\n\n`bodyToMono()` 和 `bodyToFlux()` 方法实际上是 `BodyExtractor` 的实例，用于提取请求体并将其反序列化为对象。\n\
    \n你可以使用 `BodyExtractors` 工具类将请求体提取到 `Mono` 或 `Flux` 中，如下所示：\n\n```\nMono userMono\
    \ = request.body(BodyExtractors.toMono(User.class));\nFlux userFlux = request.body(BodyExtractors.toFlux(User.class));\n\
    ```\n\n如果你想将请求体转换为泛型类型，可以使用 `ParameterizedTypeReference`。\n\n```\nParameterizedTypeReference>>\
    \ typeReference = new ParameterizedTypeReference>>() {};\nMono>> mapMono = request.body(BodyExtractors.toMono(typeReference));\n\
    ```\n\nServerResponse\n\n`org.springframework.web.reactive.function.server.ServerResponse`\
    \ 接口表示服务器端的 HTTP 响应。`ServerResponse` 是一个不可变接口，并提供了许多静态构建器方法来构造带有 `status`、`contentType`、`cookies`、`headers`、`body`\
    \ 等的响应。\n\n以下是一些如何使用构建器方法构造 `ServerResponse` 的示例。\n\n```\nServerResponse.ok().contentType(APPLICATION_JSON).body(userMono,\
    \ User.class);\nServerResponse.ok().contentType(APPLICATION_JSON).body(BodyInserters.fromObject(user));\n\
    ServerResponse.created(uri).build();\nServerResponse.notFound().build();\n```\n\
    \n你也可以使用 `render()` 方法渲染视图模板，如下所示：\n\n```\nMap modelAttributes = new HashMap();\n\
    modelAttributes.put(\"user\",user);\nServerResponse.ok().render(\"home\", modelAttributes);\n\
    ```\n\n因此，本质上，使用这些 `ServerResponse` 构建器方法，你可以构造 `HandlerFunction.handle(ServerRequest)`\
    \ 方法的返回值。\n\nRouterFunction\n\n`RouterFunction` 使用 `RequestPredicate` 将传入请求映射到\
    \ `HandlerFunction`。你可以使用 `RouterFunctions` 工具类的静态方法构建 `RouterFunction`，如下所示：\n\
    \n```\nRouterFunctions.route(GET(\"/echo\"), request -> ok().body(fromObject(request.queryParam(\"\
    name\"))));\n```\n\n你可以将多个路由定义组合成一个新的路由定义，该定义路由到与谓词匹配的第一个处理函数。\n\n```\nimport\
    \ static org.springframework.web.reactive.function.server.RequestPredicates.*;\
    \ RouterFunctions.route(GET(\"/echo\"), request -> ok().body(fromObject(request.queryParam(\"\
    name\"))))\n.and(route(GET(\"/home\"), request -> ok().render(\"home\")))\n.andRoute(POST(\"\
    /users\"), request -> ServerResponse.ok().build());\n```\n\n此示例将三个路由定义组合成一个；传入请求将由第一个匹配\
    \ `RequestPredicate` 的 `HandlerFunction` 处理。\n\n假设你需要组合多个具有相同前缀的路由。你可以使用 `RouterFunctions.nest()`\
    \ 如下所示，而不是在每个路由中重复 URL 路径：\n\n```\nRouterFunctions.nest(path(\"/api/users\"),\n\
    nest(accept(APPLICATION_JSON),\nroute(GET(\"/{id}\"), request -> ServerResponse.ok().build())\n\
    .andRoute(method(HttpMethod.GET), request -> ServerResponse.ok().build())));\n\
    ```\n\n此代码将两个 URL 映射到它们的处理函数。一个是 `GET /api/users`，返回所有用户，另一个是 `GET /api/users/{id}`，返回给定\
    \ `id` 的用户详细信息。它使用 `nest()` 来组合路由，而不是重复公共路径前缀 `/api/users`。\n\n你可以使用 `RequestPredicates`\
    \ 静态方法创建 `RequestPredicate`，并且还可以使用 `RequestPredicate.and(RequestPredicate)` 和\
    \ `RequestPredicate.or(RequestPredicate)` 组合请求谓词。\n\n```\nRouterFunctions.route(path(\"\
    /api/users\").and(method(HttpMethod.GET)),\nrequest -> ServerResponse.ok().build());\n\
    RouterFunctions.route(GET(\"/api/users\").or(GET(\"/api/users/list\")),\nrequest\
    \ -> ServerResponse.ok().build());\n```\n\nHandlerFilterFunction\n\n如果你必须比较基于注解的方法和函数式方法，`RouterFunction`\
    \ 类似于 `@RequestMapping` 注解，`HandlerFunction` 类似于使用 `@RequestMapping` 注解的方法。新的函数式\
    \ Web 框架还提供了 `HandlerFilterFunction`，它类似于 Servlet `Filter` 或 `@ControllerAdvice`\
    \ 方法。\n\n```\n@FunctionalInterface\npublic interface HandlerFilterFunction\n{\n\
    Mono filter(ServerRequest request, HandlerFunction next);\n//other methods\n}\n\
    ```\n\n例如，你可以使用 `HandlerFilterFunction` 根据用户角色过滤路由，如下所示：\n\n```\nRouterFunction\
    \ route = route(DELETE(\"/api/users/{id}\"), request -> ok().build());\nRouterFunction\
    \ filteredRoute = route.filter((request, next) -> {\nif (hasAdminRole()) {\nreturn\
    \ next.handle(request);\n}\nelse {\nreturn ServerResponse.status(UNAUTHORIZED).build();\n\
    }\n});\nprivate boolean hasAdminRole()\n{\n//logic to check current user has ADMIN\
    \ role or not\n}\n```\n\n当你向 `/api/users/{id}` URL 发出请求时，过滤器会检查用户是否具有管理员角色，并决定执行处理函数或返回\
    \ `UNAUTHORIZED` 响应。\n\n将 HandlerFunctions 注册为方法引用\n\n与其使用内联 lambda 定义 `HandlerFunction`，不如将它们定义为方法，并在路由配置中使用方法引用，如清单\
    \ 12-4 所示。\n\n```\n@Component\nclass EchoHandler\n{\npublic Mono echo(ServerRequest\
    \ request)\n{\nreturn ServerResponse.ok().body(fromObject(request.queryParam(\"\
    name\")));\n}\n}\n@SpringBootApplication\nclass Applications\n{\n@Autowired\n\
    EchoHandler echoHandler;\n@Bean\npublic RouterFunction echoRouterFunction() {\n\
    return RouterFunctions.route(GET(\"/echo\"), echoHandler::echo);\n}\n}\n清单 12-4.\n\
    使用方法引用将 HandlerFunction 与路由注册\n```\n\n现在你可以使用函数式编程模型构建与上一节中构建的相同的应用程序。你将创建 `UserHandler`，其中包含用于各种操作的\
    \ `HandlerFunction` 方法，然后配置 `RouterFunctions` 将路由映射到处理函数。参见清单 12-5。\n\n```\nimport\
    \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.stereotype.Component;\nimport org.springframework.web.reactive.function.server.ServerRequest;\n\
    import org.springframework.web.reactive.function.server.ServerResponse;\nimport\
    \ reactor.core.publisher.Flux;\nimport reactor.core.publisher.Mono;\nimport static\
    \ org.springframework.web.reactive.function.BodyInserters.fromObject;\n@Component\n\
    public class UserHandler\n{\nprivate UserReactiveRepository userReactiveRepository;\n\
    @Autowired\npublic UserHandlerFunctions(UserReactiveRepository userReactiveRepository)\
    \ {\nthis.userReactiveRepository = userReactiveRepository;\n}\npublic Mono getAllUsers(ServerRequest\
    \ request)\n{\nFlux allUsers = userReactiveRepository.findAll();\nreturn ServerResponse.ok().contentType(MediaType.APPLICATION_JSON_UTF8)\n\
    .body(allUsers, User.class);\n}\npublic Mono getUserById(ServerRequest request)\n\
    {\nMono userMono = userReactiveRepository.findById(request.pathVariable(\"id\"\
    ));\nMono notFount = ServerResponse.notFound().build();\nreturn userMono.flatMap(user\
    \ -> ServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON_UTF8)\n.body(fromObject(user)))\n\
    .switchIfEmpty(notFount);\n}\npublic Mono saveUser(ServerRequest request)\n{\n\
    Mono userMono = request.bodyToMono(User.class);\nMono mono = userMono.flatMap(user\
    \ -> userReactiveRepository.save(user));\nreturn ServerResponse.ok().body(mono,\
    \ User.class);\n}\npublic Mono deleteUser(ServerRequest request)\n{\nString id\
    \ = request.pathVariable(\"id\");\nreturn ServerResponse.ok().build(userReactiveRepository.deleteById(id));\n\
    }\n}\n清单 12-5.\n使用函数式编程模型的 UserHandler.java\n```\n\n你已经将 CRUD 操作的处理函数定义为单独的方法。现在你可以配置路由器函数，如清单\
    \ 12-6 所示。\n\n```\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.http.HttpMethod;\n\
    import org.springframework.web.reactive.function.server.*;\nimport static org.springframework.http.MediaType.APPLICATION_JSON;\n\
    import static org.springframework.web.reactive.function.BodyInserters.fromObject;\n\
    import static org.springframework.web.reactive.function.server.RequestPredicates.*;\n\
    import static org.springframework.web.reactive.function.server.RouterFunctions.nest;\n\
    import static org.springframework.web.reactive.function.server.RouterFunctions.route;\n\
    import static org.springframework.web.reactive.function.server.ServerResponse.ok;\n\
    @SpringBootApplication\npublic class Application\n{\npublic static void main(String[]\
    \ args) {\nSpringApplication.run(SpringBootWebfluxFunctionalDemoApplication.class,\
    \ args);\n}\n@Autowired\nUserHandler userHandler;\n@Bean\npublic RouterFunction\
    \ routerFunctions() {\nreturn\nnest(path(\"/api/users\"),\nnest(accept(APPLICATION_JSON),\n\
    route(GET(\"/{id}\"), userHandler::getUserById)\n.andRoute(method(HttpMethod.GET),\
    \ userHandler::getAllUsers)\n.andRoute(DELETE(\"/{id}\"), userHandler::deleteUser)\n\
    .andRoute(POST(\"/\"), userHandler::saveUser)));\n}\n}\n清单 12-6.\nApplication.java\n\
    ```\n\n你定义了路由器配置，并将它们注册为 `RouterFunction` bean。你甚至可以在同一个应用程序中混合使用基于注解和基于函数的编程模型。\n\
    \n默认情况下，`spring-boot-starter-webflux` 使用 `reactor-netty` 作为运行时引擎。你可以排除 `reactor-netty`\
    \ 并使用其他支持响应式非阻塞 I/O 的服务器，例如 Undertow、Jetty 或 Tomcat。\n\n注意\n\n有关 WebFlux 自动配置的更多详细信息，请查看\
    \ `org.springframework.boot.autoconfigure.web.reactive` 包中的配置类。\n\nThymeleaf 响应式支持\n\
    \nThymeleaf 提供了 `thymeleaf-spring5` 模块来支持 Spring 框架 5 集成。`thymeleaf-spring5` 模块提供了响应式支持，以便你可以将其与基于\
    \ Spring WebFlux 的响应式应用程序一起使用。\n\nSpring Boot 2 Thymeleaf 启动器将 `thymeleaf-spring5`\
    \ 库作为依赖项包含在内，并自动配置 Thymeleaf 的响应式支持。你可以在配置类 `org.springframework.boot.autoconfigure.thymeleaf.ThymeleafAutoConfiguration`\
    \ 中查看 Thymeleaf 响应式自动配置。\n\n新的 `thymeleaf-spring5` 模块提供了 `SpringWebFluxTemplateEngine`，它扩展了\
    \ `SpringTemplateEngine`，作为 Spring WebFlux 应用程序中使用的默认模板引擎实现。`SpringWebFluxTemplateEngine`\
    \ 提供了三种处理模式：\n\n*   完整模式：当未指定最大块大小限制且未指定数据驱动上下文变量时，Thymeleaf 将使用 FULL 模式。所有模板输出将在内存中生成，然后作为单个\
    \ `DataBuffer` 发送到服务器的输出通道。\n*   分块模式：当指定了最大块大小限制但未指定数据驱动上下文变量时，Thymeleaf 将使用\
    \ `CHUNKED` 模式。模板输出将生成等于或小于指定限制（以字节为单位）的块，然后发送到服务器的输出通道。在每个块发送到输出后，模板引擎将等待服务器通过响应式背压请求更多块。\n\
    *   数据驱动模式：当向上下文添加了数据驱动变量（包装在 `IReactiveDataDriverContextVariable` 中的数据流）时，Thymeleaf\
    \ 将使用 `DATA-DRIVEN` 模式。在此模式下，Thymeleaf 将使用背压以块的形式从数据驱动程序流式传输数据。\n\n清单 12-7 显示了如何获取数据流（`Flux<T>`）并使用\
    \ Thymeleaf 响应式支持进行渲染。\n\n```\n@Controller\npublic class UserListController\n\
    {\n@Autowired\nprivate UserReactiveRepository userReactiveRepository;\n@GetMapping(\"\
    /list-users\")\npublic String listUsers(Model model)\n{\nFlux userFlux = this.userReactiveRepository.findAll();\n\
    List userList = userFlux.collectList().block();\nmodel.addAttribute(\"users\"\
    , userList);\nreturn \"users\";\n}\n@GetMapping(\"/list-users-chunked\")\npublic\
    \ String listUsersChunked(Model model)\n{\nFlux userFlux = this.userReactiveRepository.findAll();\n\
    model.addAttribute(\"users\", userFlux);\nreturn \"users\";\n}\n@GetMapping(\"\
    /list-users-reactive\")\npublic String listUsersReactive(Model model)\n{\nFlux\
    \ userFlux = this.userReactiveRepository.findAll();\nmodel.addAttribute(\"users\"\
    , new ReactiveDataDriverContextVariable(userFlux, 1000));\nreturn \"users\";\n\
    }\n}\n清单 12-7.\n使用 Thymeleaf 响应式支持的 UserListController.java\n```\n\n在 `listUsers()`\
    \ 方法中，你从 MongoDB 获取数据作为响应式流 `Flux<User>`，并完全解析数据，然后使用内存中可用的完整数据集渲染视图。\n\n在 `listUsersChunked()`\
    \ 方法中，你直接将 `Flux<User>` 添加到模型中，但你没有指定 `responseMaxChunkSizeBytes`，因此它将像 `FULL`\
    \ 模式一样处理。如果你配置了 `spring.thymeleaf.reactive.max-chunk-size=size_in_bytes` 属性，那么它将以\
    \ `CHUNKED` 模式处理。\n\n在 `listUsersReactive()` 方法中，你从 MongoDB 获取数据作为响应式流 `Flux<User>`，并将其包装在带有缓冲区大小的\
    \ `ReactiveDataDriverContextVariable` 中，以便 Thymeleaf 将使用数据驱动模式来渲染视图。\n\n注意\n\n\
    在 Thymeleaf 数据驱动模式下，你只能向上下文添加一个多值 Publisher（flux）。\n\n清单 12-8 显示了如何创建 Thymeleaf\
    \ 视图模板来渲染用户。\n\n```\n\n用户\n\n姓名\n电子邮件\n\n...\n...\n\n清单 12-8.\nusers.html Thymeleaf\
    \ 视图\n```\n\n这个 Thymeleaf 视图在处理响应式流渲染方面没有什么特别之处；在幕后，Thymeleaf 将无缝地处理来自数据流的视图解析逻辑。\n\
    \n你可以使用 Web 函数式框架风格的 `HandlerFunction` 实现相同的端点，如清单 12-9 所示。\n\n```\n@Component\n\
    public class UserHandler\n{\n@Autowired\nprivate UserReactiveRepository userReactiveRepository;\n\
    ...\n...\npublic Mono listUsers(ServerRequest request)\n{\nList userList = userReactiveRepository.findAll().collectList().block();\n\
    Map data = new HashMap();\ndata.put(\"users\", userList);\nreturn ServerResponse.ok().contentType(MediaType.TEXT_HTML).render(\"\
    users\", data);\n}\npublic Mono listUsersReactive(ServerRequest request)\n{\n\
    Flux userFlux = userReactiveRepository.findAll();\nReactiveDataDriverContextVariable\
    \ users = new ReactiveDataDriverContextVariable(userFlux, 1000);\nMap data = new\
    \ HashMap();\ndata.put(\"users\", users);\nreturn ServerResponse.ok().contentType(MediaType.TEXT_HTML).render(\"\
    users\", data);\n}\n}\n清单 12-9.\nUserHandler.java\n```\n\n现在你可以定义路由以将 URL 映射到\
    \ `HandlerFunction`，如清单 12-10 所示。\n\n```\n@SpringBootApplication\npublic class\
    \ Application\n{\n@Autowired\nUserHandler userHandler;\npublic static void main(String[]\
    \ args) {\nSpringApplication.run(SpringBootWebfluxFunctionalDemoApplication.class,\
    \ args);\n}\n...\n...\n@Bean\npublic RouterFunction listUsersRouter() {\nreturn\
    \ route(GET(\"/list-users\"), userHandler::listUsers);\n}\n@Bean\npublic RouterFunction\
    \ listUsersReactiveRouter() {\nreturn route(GET(\"/list-users-reactive\"), userHandler::listUsersReactive);\n\
    }\n}\n清单 12-10.\nApplication.java\n```\n\n如果你在 MongoDB 中有大型数据集并访问端点 `/list-users`\
    \ 和 `/list-users-reactive`，你可以清楚地看到 `/list-users-reactive` 响应更快。\n\n响应式 WebClient\n\
    \nSpring 提供了 `RestTemplate` 来调用 RESTful 服务端点，它支持消息转换器，因此可以使用 Java 对象而不是手动准备 JSON\
    \ 或 XML 的输入请求体来发出 HTTP 请求。\n\nSpring WebFlux 提供了 WebClient 作为 `RestTemplate` 的响应式替代方案，它支持非阻塞。`WebClient`\
    \ 使用 `Flux<DataBuffer>` 作为请求和响应体，而不是使用 `InputStream` 和 `OutputStream` 进行请求处理。\n\
    \n清单 12-11 显示了作为客户端如何向响应式端点发出请求。\n\n```\nWebClient webClient = WebClient.create(\"\
    http://localhost:\"+port);\nList users = webClient.get().uri(\"/api/users\")\n\
    .accept(MediaType.APPLICATION_JSON)\n.exchange()\n.flatMap(response -> response.bodyToFlux(User.class).collectList()).block();\n\
    清单 12-11.\n使用 WebClient 调用响应式 REST 端点\n```\n\n`webClient.get().uri(\"/api/users\"\
    ).exchange()` 将返回一个 `Mono<ClientResponse>`，而 `ClientResponse` 提供了各种实用方法，例如 `bodyToMono()、bodyToFlux()`\
    \ 和 `body(BodyExtractor)` 方法来提取体内容。\n\n测试 Spring WebFlux 应用程序\n\n`spring-test`\
    \ 模块提供了 `WebTestClient`，可用于测试响应式端点。Spring Boot 自动配置 `WebTestClient`，因此你可以自动注入\
    \ `WebTestClient`，而无需手动配置它。\n\n清单 12-12 显示了如何使用 `WebTestClient` 测试响应式 REST 端点\
    \ `GET /api/users`。\n\n```\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
    import static org.springframework.http.MediaType.*;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    import org.springframework.test.web.reactive.server.WebTestClient;\nimport java.util.List;\n\
    import static org.junit.Assert.assertEquals;\nimport static org.junit.Assert.assertNotNull;\n\
    @RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)\n\
    public class SpringBootWebfluxFunctionalDemoApplicationTests\n{\n@Autowired\n\
    private WebTestClient webTestClient;\n@Test\npublic void getAllUsers() {\nwebTestClient.get().uri(\"\
    /api/users\").accept(APPLICATION_JSON).exchange()\n.expectStatus().isOk()\n.expectHeader().contentType(APPLICATION_JSON)\n\
    .expectBodyList(User.class)\n.consumeWith(result -> assertEquals(5, result.getResponseBody().size()));\n\
    }\n}\n清单 12-12.\n使用 WebTestClient 测试响应式端点\n```\n\n你可以注入 `WebTestClient` 并使用相对\
    \ URL 进行测试，而不是提供完整的 URL。一旦调用了 REST 端点，你可以断言 HTTP 状态和 `ContentType` 标头值，并指定响应体需要转换成的类类型。\n\
    \n类似地，你可以执行其他操作，如 `POST`、`DELETE` 等，如清单 12-13 所示。\n\n```\n@Test\npublic void createUser()\
    \ {\nUser user = new User(UUID.randomUUID().toString(), \"Zinx\", \"zinx@gmail.com\"\
    );\nwebTestClient.post().uri(\"/api/users\")\n.body(Mono.just(user), User.class)\n\
    .exchange()\n.expectStatus().isOk()\n.expectHeader().contentType(MediaType.APPLICATION_JSON_UTF8)\n\
    .expectBody(User.class)\n.consumeWith(result -> assertThat(result.getResponseBody()).isEqualToComparingFieldByField(user));\n\
    }\n清单 12-13.\n使用 WebTestClient 执行 POST 请求\n```\n\n此示例执行 `POST` 请求到 `/api/users`\
    \ 以创建一个新的 `User`。它发送 `Mono<User>` 作为请求体，并获取创建的 `User` 作为响应体。\n\n你还可以通过使用 JSON\
    \ Path 库断言对响应体执行 JSON 断言。你可以调用 `GET /api/users/{id}` 端点来检索给定 ID 的特定用户，并断言响应 JSON，如清单\
    \ 12-14 所示。\n\n```\n@Test\npublic void getUserById() {\nString id = \"uid1\";\n\
    webTestClient.get().uri(\"/api/users/\"+id)\n.exchange()\n.expectStatus().isOk()\n\
    .expectBody()\n.jsonPath(\"$.id\").isEqualTo(id)\n.jsonPath(\"$.name\").isEqualTo(\"\
    Admin\")\n.jsonPath(\"$.email\").isEqualTo(\"admin@gmail.com\");\n}\n清单 12-14.\n\
    对 WebTestClient 响应体执行 JSON 断言\n```\n\n此示例使用 JSON Path 库提供的 `jsonPath()` 断言来断言响应\
    \ JSON。有关 JSON Path 的更多详细信息，请参见 [`https://github.com/json-path/JsonPath`](https://github.com/json-path/JsonPath)\
    \ 。\n\n注意\n\n你将在第 15 章中学习更多关于测试 Spring Boot 应用程序的知识。\n\n总结\n\n本章向你展示了如何使用 Spring\
    \ WebFlux 框架构建响应式 Web 应用程序，这是 Spring 5 中引入的一个新模块。你使用 MongoDB 响应式流驱动程序和 WebFlux\
    \ 构建了一个响应式应用程序，使用了基于注解的模型和函数式风格编程模型。在下一章中，你将学习如何使用 Spring Security 保护传统的 Web 应用程序和\
    \ REST API。\n\n13. 保护 Web 应用程序\n\n安全是软件应用程序设计的一个重要方面。它确保只有有权访问受保护资源的人才能这样做。在保护应用程序方面，你需要处理的两件主要事情是身份验证和授权。身份验证是指验证用户的过程，通常通过要求提供凭据来完成。授权是指验证是否允许用户执行某项活动的过程。\n\
    \nSpring Security 是一个强大且灵活的安全框架，用于保护基于 Java 的 Web 应用程序。尽管 Spring Security 通常与基于\
    \ Spring 的应用程序一起使用，但你也可以使用它来保护非基于 Spring 的 Web 应用程序。\n\n本章解释如何使用 Spring Boot Security\
    \ 启动器来保护基于 SpringMVC 的 Web 应用程序，以及如何使用方法级安全性来保护服务层组件。本章还探讨了如何配置 Spring Security\
    \ 来保护 REST API。\n\nSpring Boot Web 应用程序中的 Spring Security\n\nSpring Security 是一个用于在多个层保护基于\
    \ Java 的应用程序的框架，具有极大的灵活性和可定制性。Spring Security 提供针对数据库身份验证、LDAP、表单身份验证、JA-SIG 中央身份验证服务、Java\
    \ 身份验证和授权服务（JAAS）等的身份验证和授权支持。Spring Security 提供对处理常见攻击（如 CSRF、XSS 和会话固定保护）的支持，只需最少的配置。\n\
    \nSpring Security 可用于在多个层保护应用程序，例如 Web URL、服务层方法等。从 3.2 版本开始，Spring Security 为安全提供了\
    \ Java 配置支持。在 Spring Boot 应用程序中使用 Spring Security 由于其自动配置功能而变得更加容易。\n\n将 Spring\
    \ Security 启动器（`spring-boot-starter-security`）添加到 Spring Boot 应用程序将：\n\n*   启用\
    \ HTTP 基本安全\n*   注册带有内存存储和单个用户的 `AuthenticationManager` bean\n*   忽略常用静态资源位置的路径（例如\
    \ `/css/**`、`/js/**`、`/images/**` 等）\n*   启用常见的低级功能，如 XSS、CSRF、缓存等\n\n你将首先了解如何使用\
    \ Spring Security 保护 Spring Boot 应用程序。首先，创建一个带有 Web、Thymeleaf 和 Spring Security\
    \ 启动器的 Spring Boot 项目。\n\n```\norg.springframework.boot\nspring-boot-starter-web\n\
    \norg.springframework.boot\nspring-boot-starter-thymeleaf\n\norg.springframework.boot\n\
    spring-boot-starter-security\n\n```\n\n现在，如果你运行应用程序并访问 `http://localhost:8080`，系统将提示你输入用户凭据。默认用户是\
    \ `user`，密码是自动生成的。你可以在控制台日志中找到它。\n\n```\nUsing default security password: 78fa095d-3f4c-48b1-ad50-e24c31d5cf35\n\
    ```\n\n你可以在 `application.properties` 中更改默认用户凭据，如下所示：\n\n```\nsecurity.user.name=admin\n\
    security.user.password=secret\nsecurity.user.role=USER,ADMIN\n```\n\n好的，这对于快速演示来说很不错。但在你的实际项目中，你可能希望使用持久化数据存储（如数据库）来实现基于角色的访问控制。此外，你可能希望根据角色微调对资源（URL、服务层方法等）的访问。现在你将看到如何自定义默认的\
    \ Spring Security 自动配置以满足你的需求。\n\n首先，你将创建图 13-1 中所示的数据库表来存储用户和角色。\n\n![A447991_1_En_13_Fig1_HTML.jpg](img/A447991_1_En_13_Fig1_HTML.jpg)\n\
    \n图 13-1.\n\n用户和角色数据库表\n\n你将使用 Spring Data JPA 启动器与数据库通信。\n\n```\norg.springframework.boot\n\
    spring-boot-starter-data-jpa\n\ncom.h2database\nh2\n\n```\n\n创建名为 `users` 和 `roles`\
    \ 的 JPA 实体，如清单 13-1 和 13-2 所示。\n\n```\n@Entity\n@Table(name=\"users\")\npublic\
    \ class User\n{\n@Id @GeneratedValue(strategy=GenerationType.AUTO)\nprivate Integer\
    \ id;\n@Column(nullable=false, unique=true)\nprivate String email;\n@Column(nullable=false)\n\
    private String password;\n@ManyToMany(cascade=CascadeType.MERGE)\n@JoinTable(\n\
    name=\"user_role\",\njoinColumns={@JoinColumn(name=\"USER_ID\",\nreferencedColumnName=\"\
    ID\")},\ninverseJoinColumns={@JoinColumn(name=\"ROLE_ID\",\nreferencedColumnName=\"\
    ID\")})\nprivate List roles;\n//setters and getters\n}\n清单 13-1.\nUser JPA 实体\n\
    ```\n\n```\n@Entity\n@Table(name=\"roles\")\npublic class Role\n{\n@Id @GeneratedValue(strategy=GenerationType.AUTO)\n\
    private Integer id;\n@Column(nullable=false, unique=true)\nprivate String name;\n\
    @ManyToMany(mappedBy=\"roles\")\nprivate List users;\n//setters and getters\n\
    }\n清单 13-2.\nRole JPA 实体\n```\n\n接下来，为 `user` 实体创建 Spring Data JPA 存储库，如清单 13-3\
    \ 所示。\n\n```\npublic interface UserRepository extends JpaRepository\n{\nOptional\
    \ findByEmail(String email);\n}\n清单 13-3.\nSpring Data JPA 存储库接口 UserRepository.java\n\
    ```\n\nSpring Security 使用 `UserDetailsService` 接口，该接口包含 `loadUserByUsername(String\
    \ username)` 方法，用于查找给定 `username` 的 `UserDetails`。`UserDetails` 接口表示一个经过身份验证的用户对象，Spring\
    \ Security 提供了 `org.springframework.security.core.userdetails.User` 的开箱即用实现。\n\
    \n现在你实现一个 `UserDetailsService` 以从数据库获取 `UserDetails`，如清单 13-4 所示。\n\n```\n@Service\n\
    @Transactional\npublic class CustomUserDetailsService implements UserDetailsService\n\
    {\n@Autowired\nprivate UserRepository userRepository;\n@Override\npublic UserDetails\
    \ loadUserByUsername(String userName)\nthrows UsernameNotFoundException {\nUser\
    \ user = userRepository.findByEmail(userName)\n.orElseThrow(() -> new UsernameNotFoundException(\"\
    Email \"+userName+\" not found\"));\nreturn new org.springframework.security.core.userdetails.User(\n\
    user.getEmail(),\nuser.getPassword(),\ngetAuthorities(user)\n);\n}\nprivate static\
    \ Collection getAuthorities(User user)\n{\nString[] userRoles = user.getRoles()\n\
    .stream()\n.map((role) -> role.getName())\n.toArray(String[]::new);\nCollection\
    \ authorities = AuthorityUtils.createAuthorityList(userRoles);\nreturn authorities;\n\
    }\n}\n清单 13-4.\nUserDetailsService 实现\n```\n\nSpring Boot 在 `SecurityAutoConfiguration`\
    \ 中实现了默认的 Spring Security 自动配置。要切换默认的 Web 应用程序安全配置并提供你自己的自定义安全配置，你可以创建一个扩展 `WebSecurityConfigurerAdapter`\
    \ 并使用 `@EnableWebSecurity` 注解的配置类。\n\n现在你将创建一个扩展 `WebSecurityConfigurerAdapter`\
    \ 的配置类，以自定义默认的 Spring Security 配置，如清单 13-5 所示。\n\n```\n@Configuration\n@EnableWebSecurity\n\
    public class WebSecurityConfig extends WebSecurityConfigurerAdapter {\n@Autowired\n\
    private UserDetailsService customUserDetailsService;\n@Bean\npublic PasswordEncoder\
    \ passwordEncoder() {\nreturn new BCryptPasswordEncoder();\n}\n@Autowired\npublic\
    \ void configureGlobal(AuthenticationManagerBuilder auth)\nthrows Exception\n\
    {\nauth\n.userDetailsService(customUserDetailsService)\n.passwordEncoder(passwordEncoder());\n\
    }\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http\n.authorizeRequests()\n.antMatchers(\"/resources/\", \"/webjars/\",\"/assets/\"\
    )\n.permitAll()\n.antMatchers(\"/\").permitAll()\n.antMatchers(\"/admin/\").hasRole(\"\
    ADMIN\")\n.anyRequest().authenticated()\n.and()\n.formLogin()\n.loginPage(\"/login\"\
    )\n.defaultSuccessUrl(\"/home\")\n.failureUrl(\"/login?error\")\n.permitAll()\n\
    .and()\n.logout()\n.logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"\
    ))\n.logoutSuccessUrl(\"/login?logout\")\n.permitAll()\n.and()\n.exceptionHandling()\n\
    .accessDeniedPage(\"/accessDenied\");\n}\n}\n清单 13-5.\n扩展 WebSecurityConfigurerAdapter\
    \ 的自定义 Spring Security 配置\n```\n\n此示例配置了 `CustomUserDetailsService` 和 `BCryptPasswordEncoder`，供\
    \ `AuthenticationManager` 使用，而不是使用带有明文密码的单个用户的默认内存数据库。\n\n`configure(HttpSecurity\
    \ http)` 方法配置为：\n\n*   忽略静态资源路径 `\"/resources/**\"`、`\"/webjars/**\"` 和 `\"/assets/**\"\
    `\n*   允许所有人访问根 URL `\"/\"`\n*   将访问以 `/admin/` 开头的 URL 限制为仅具有 `ADMIN` 角色的用户\n\
    *   所有其他 URL 仅对经过身份验证的用户可访问\n\n你还在配置自定义的基于表单的登录参数，并使它们对所有人可访问。默认情况下，注销请求仅适用于 HTTP\
    \ `POST` 方法，因此此示例将其配置为可与任何 HTTP 方法一起使用，这使得它对所有人可访问。\n\n该示例还配置了 URL，以便在用户尝试访问他们无权访问的资源时，将他们重定向到\
    \ `/accessDenied` URL。\n\n你将使用 Thymeleaf 视图模板来渲染视图。`thymeleaf-extras-springsecurity4`\
    \ 模块提供了 Thymeleaf Spring Security 方言属性（`sec:authentication`、`sec:authorize` 等），以根据身份验证状态、登录用户角色等有条件地渲染视图的部分内容。\n\
    \n添加以下依赖项以使用 Thymeleaf Spring Security 方言。\n\n```\norg.thymeleaf.extras\nthymeleaf-extras-springsecurity4\n\
    \n```\n\n现在你需要创建一个配置类来提供 MVC 配置，如清单 13-6 所示。\n\n```\n@Configuration\npublic class\
    \ WebConfig implements WebMvcConfigurer\n{\n@Override\npublic void addViewControllers(ViewControllerRegistry\
    \ registry)\n{\nregistry.addViewController(\"/login\").setViewName(\"login\");\n\
    registry.addViewController(\"/home\").setViewName(\"home\");\nregistry.addViewController(\"\
    /admin/home\").setViewName(\"adminhome\");\nregistry.addViewController(\"/accessDenied\"\
    ).setViewName(\"403\");\n}\n@Bean\npublic SpringSecurityDialect securityDialect()\
    \ {\nreturn new SpringSecurityDialect();\n}\n}\n清单 13-6.\nSpring WebMVC 配置\n```\n\
    \n此示例配置了视图控制器，以指定为哪个 URL 渲染哪个视图。此外，它还注册了 `SpringSecurityDialect` 以启用使用 Thymeleaf\
    \ Spring Security 方言。\n\n现在你已经准备好所有配置，是时候使用 Thymeleaf 创建视图了。\n\n创建 `src/main/resources/templates/login.html`，如清单\
    \ 13-7 所示。\n\n```\n\nSpringBoot 安全\n\n无效的电子邮件和密码。\n\n登录\n\n清单 13-7.\nThymeleaf\
