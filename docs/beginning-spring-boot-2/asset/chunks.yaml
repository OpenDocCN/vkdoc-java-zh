    \ Street, 6th Floor, New York, NY 10013. Phone 1-800-SPRINGER, fax (201) 348-4505,\
    \ e-mail orders-ny@springer-sbm.com, or visit www.springeronline.com.  \nApress\
    \ Media, LLC is a California LLC and the sole member (owner) is Springer Science\
    \ + Business Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is a Delaware\
    \ corporation.\n\n## Introduction\n\nSpring is the most popular Java-based framework\
    \ for building enterprise applications. The Spring framework provides a rich ecosystem\
    \ of projects to address modern application needs, like security, simplified access\
    \ to relational and NoSQL datastores, batch processing, integration with social\
    \ networking sites, large volume of data streams processing, etc. As Spring is\
    \ a very flexible and customizable framework, there are usually multiple ways\
    \ to configure the application. Although it is a good thing to have multiple options,\
    \ it can be overwhelming to the beginners. Spring Boot addresses this “Spring\
    \ applications need complex configuration” problem by using its powerful autoconfiguration\
    \ mechanism.\n\nSpring Boot is an opinionated framework following the “Convention\
    \ Over Configuration” approach, which helps build Spring-based applications quickly\
    \ and easily. The main goal of Spring Boot is to quickly create Spring-based applications\
    \ without requiring the developers to write the same boilerplate configuration\
    \ again and again.\n\nIn recent years, the microservices architecture has become\
    \ the preferred architecture style for building complex enterprise applications.\
    \ Spring Boot is a great choice for building microservices-based applications\
    \ using various Spring Cloud modules.\n\nThis book will help you understand what\
    \ Spring Boot is, how Spring Boot helps you build Spring-based applications quickly\
    \ and easily, and the inner workings of Spring Boot using easy-to-follow examples.\n\
    \n## What This Book Covers\n\nThis book covers the following topics:\n\n*   What\
    \ is Spring Boot and how does it improve developer productivity?\n*   How does\
    \ Spring Boot autoconfiguration work behind the scenes?\n*   How do you create\
    \ custom Spring Boot starters?\n*   Working with databases using `JdbcTemplate`,\
    \ `MyBatis`, `JOOQ`, and Spring Data JPA\n*   Working with the MongoDB NoSQL database\n\
    *   Developing web applications using Spring Boot and Thymeleaf\n*   Developing\
    \ Reactive Web Applications using Spring WebFlux\n*   Developing REST API using\
    \ Spring Boot\n*   Securing web applications using Spring Security\n*   Monitoring\
    \ Spring Boot applications with Spring Boot Actuator\n*   Testing Spring Boot\
    \ applications\n*   Developing Spring Boot applications in Groovy, Scala, and\
    \ Kotlin\n*   Running Spring Boot applications in the Docker container\n\n## What\
    \ You Need for This Book\n\nTo follow the examples in this book, you must have\
    \ the following software installed:\n\n*   JDK 1.8\n*   Your favorite IDE\n  \
    \  *   Spring Tool Suite\n    *   IntelliJ IDEA\n    *   NetBeans IDE\n*   Build\
    \ tools\n    *   Maven\n    *   Gradle\n*   Database server\n    *   MySQL\n \
    \   *   PostgreSQL\n\n## Acknowledgments\n\nI would like to thank my wife Neha\
    \ Jain and my family members for their continuous support all the days I spent\
    \ writing this book.\n\nI would like to express my gratitude to the Apress team,\
    \ specifically to Steve Anglin and Mark Powers, for their continuous support throughout\
    \ the journey. I would also like to thank the reviewers for providing valuable\
    \ feedback that helped improve the quality of the content."
