- fmt: '# 1. Introduction to Spring Boot


    The Spring framework is a very popular and widely used Java framework for building
    web and enterprise applications. Spring at its core is a dependency injection
    container that provides flexibility to configure beans in multiple ways, such
    as XML, Annotations, and JavaConfig. Over the years, the Spring framework grew
    exponentially by addressing the needs of modern business applications like security,
    support for NoSQL datastores, handling big data, batch processing, integration
    with other systems, etc. Spring, along with its sub-projects, became a viable
    platform for building enterprise applications.


    The Spring framework is very flexible and provides multiple ways of configuring
    the application components. With a rich set of features combined with multiple
    configuration options, configuring Spring applications becomes complex and error-prone.
    The Spring team created Spring Boot to address the complexity of configuration
    through its powerful AutoConfiguration mechanism.


    This chapter takes a quick look at the Spring framework. You’ll develop a web
    application using SpringMVC and JPA the traditional way (without using Spring
    Boot). Then you will look at the pain points of the traditional way and see how
    to develop the same application using Spring Boot.


    ## Overview of the Spring Framework


    If you are a Java developer, then there is a good chance that you have heard about
    the Spring framework and have used it in your projects. The Spring framework was
    created primarily as a dependency injection container, but it is much more than
    that. Spring is very popular for several reasons:


    * Spring’s dependency injection approach encourages writing testable code

    * Easy-to-use and powerful database transaction management capabilities

    * Spring simplifies integration with other Java frameworks, like the JPA/Hibernate
    ORM and Struts/JSF web frameworks

    * State-of-the-art Web MVC framework for building web applications


    Along with the Spring framework, there are many other Spring sub-projects that
    help build applications that address modern business needs:


    * Spring Data: Simplifies data access from relational and NoSQL datastores.

    * Spring Batch: Provides a powerful batch-processing framework.

    * Spring Security: Robust security framework to secure applications.

    * Spring Social: Supports integration with social networking sites like Facebook,
    Twitter, LinkedIn, GitHub, etc.

    * Spring Integration: An implementation of enterprise integration patterns to
    facilitate integration with other enterprise applications using lightweight messaging
    and declarative adapters.


    There are many other interesting projects addressing various other modern application
    development needs. For more information, take a look at [`http://spring.io/projects`](http://spring.io/projects).


    ## Spring Configuration Styles


    Spring initially provided an XML-based approach for configuring beans. Later Spring
    introduced XML-based DSLs, Annotations, and JavaConfig-based approaches for configuring
    beans. Listings [1-1](#A447991_1_En_1_Chapter.html#Par17) through [1-3](#A447991_1_En_1_Chapter.html#Par21)
    show how each of those configuration styles looks.


    ```

    Listing 1-1.

    Example of XML-Based Configuration

    ```


    ```

    @Service public class UserService

    {

    private UserDao userDao;

    @Autowired    public UserService(UserDao dao){

    this.userDao = dao;

    }

    ...

    ...

    }

    @Repository public class JdbcUserDao

    {

    private DataSource dataSource;

    @Autowired

    public JdbcUserDao(DataSource dataSource){

    this.dataSource = dataSource;

    }

    ...

    ...

    }

    Listing 1-2.

    Example of Annotation-Based Configuration

    ```


    ```

    @Configuration

    public class AppConfig

    {

    @Bean

    public UserService userService(UserDao dao){

    return new UserService(dao);

    }

    @Bean

    public UserDao userDao(DataSource dataSource){

    return new JdbcUserDao(dataSource);

    }

    @Bean

    public DataSource dataSource(){

    BasicDataSource dataSource = new BasicDataSource();

    dataSource.setDriverClassName("com.mysql.jdbc.Driver");

    dataSource.setUrl("jdbc:mysql://localhost:3306/test");

    dataSource.setUsername("root");

    dataSource.setPassword("secret");

    return dataSource;

    }

    }

    Listing 1-3.

    Example of a JavaConfig-Based Configuration

    ```


    As you can see, Spring provides multiple approaches for configuring application
    components and you can even mix the approaches as well. For example, you can use
    JavaConfig- and Annotation-based configuration styles in the same application.
    That is a lot of flexibility, which is good and bad. People who are new to the
    Spring framework may get confused about which approach to follow.


    As of now, the Spring community is suggesting you follow the JavaConfig-based
    approach, as it gives you more flexibility. But there is no one-size-fits-all
    kind of solution. You have to choose the approach based on your own application
    needs.


    Now that you’ve had a glimpse of how various styles of Spring Bean configurations
    look, you’ll take a quick look at the configuration of a typical SpringMVC and
    JPA/Hibernate-based web application configuration.


    ## Developing Web Application Using SpringMVC and JPA


    Before getting to know Spring Boot and learning what kind of features it provides,
    we’ll take a look at how a typical Spring web application configuration looks
    and learn about the pain points. Then, we will see how Spring Boot addresses those
    problems.


    The first thing to do is create a Maven project and configure all the dependencies
    required in the `pom.xml` file, as shown in Listing [1-4](#A447991_1_En_1_Chapter.html#Par27).


    ```

