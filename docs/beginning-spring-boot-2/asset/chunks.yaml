- fmt: "# How Spring Boot Autoconfiguration Works\n\nThe key to Spring Boot’s autoconfiguration\
    \ is its `@EnableAutoConfiguration` annotation. Typically, you annotate the application\
    \ entry point class with `@SpringBootApplication` or, if you want to customize\
    \ the defaults, you can use the following annotations:\n\n```\n@Configuration\n\
    @EnableAutoConfiguration\n@ComponentScan\npublic class Application\n{\n}\n```\n\
    \nThe `@EnableAutoConfiguration` annotation enables the autoconfiguration of Spring\
    \ `ApplicationContext` by scanning the classpath components and registering the\
    \ beans that match various conditions. Spring Boot provides various autoconfiguration\
    \ classes in `spring-boot-autoconfigure-{version}.jar`, and they are responsible\
    \ for registering various components.\n\nAutoconfiguration classes are typically\
    \ annotated with `@Configuration` to mark it as a Spring configuration class and\
    \ annotated with `@EnableConfigurationProperties` to bind the customization properties\
    \ and one or more conditional bean registration methods.\n\nFor example, consider\
    \ the `org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration`\
    \ class.\n\n```\n@Configuration\n@ConditionalOnClass({ DataSource.class, EmbeddedDatabaseType.class\
    \ })\n@EnableConfigurationProperties(DataSourceProperties.class)\n@Import({ Registrar.class,\
    \ DataSourcePoolMetadataProvidersConfiguration.class })\npublic class DataSourceAutoConfiguration\
    \ {\n...\n...\n@Bean\n@ConditionalOnMissingBean\npublic DataSourceInitializer\
    \ dataSourceInitializer(DataSourceProperties properties,\nApplicationContext applicationContext)\
    \ {\nreturn new DataSourceInitializer(properties, applicationContext);\n}\n...\n\
    ...\n@Conditional(EmbeddedDatabaseCondition.class)\n@ConditionalOnMissingBean({\
    \ DataSource.class, XADataSource.class })\n@Import(EmbeddedDataSourceConfiguration.class)\n\
    protected static class EmbeddedDatabaseConfiguration {\n}\n@Configuration\n@Conditional(PooledDataSourceCondition.class)\n\
    @ConditionalOnMissingBean({ DataSource.class, XADataSource.class })\n@Import({\
    \ DataSourceConfiguration.Tomcat.class, DataSourceConfiguration.Hikari.class,\n\
    DataSourceConfiguration.Dbcp2.class, DataSourceConfiguration.Generic.class })\n\
    protected static class PooledDataSourceConfiguration {\n}\n...\n...\n@Configuration\n\
    @ConditionalOnProperty(prefix = \"spring.datasource\", name = \"jmx-enabled\"\
    )\n@ConditionalOnClass(name = \"org.apache.tomcat.jdbc.pool.DataSourceProxy\"\
    )\n@Conditional(DataSourceAutoConfiguration.DataSourceAvailableCondition.class)\n\
    @ConditionalOnMissingBean(name = \"dataSourceMBean\")\nprotected static class\
    \ TomcatDataSourceJmxConfiguration {\n...\n...\n}\n...\n...\n}\n```\n\nHere, `DataSourceAutoConfiguration`\
    \ is annotated with `@ConditionalOnClass({ DataSource.class, EmbeddedDatabaseType.class\
    \ })`, which means that the autoconfiguration of beans defined in `DataSourceAutoConfiguration`\
    \ will be considered only if the `DataSource.class` and `EmbeddedDatabaseType.class`\
    \ classes are available on the classpath.\n\nThe class is also annotated with\
    \ `@EnableConfigurationProperties(DataSourceProperties.class)`, which enables\
    \ binding the properties in `application.properties` to the properties of the\
    \ `DataSourceProperties` class automatically.\n\n```\n@ConfigurationProperties(prefix\
    \ = DataSourceProperties.PREFIX)\npublic class DataSourceProperties implements\
    \ BeanClassLoaderAware, EnvironmentAware, InitializingBean {\npublic static final\
    \ String PREFIX = \"spring.datasource\";\n...\n...\nprivate String driverClassName;\n\
    private String url;\nprivate String username;\nprivate String password;\n...\n\
    //setters and getters\n}\n```\n\nWith this configuration, all the properties that\
    \ start with `spring.datasource.*` will be automatically bound to the `DataSourceProperties`\
    \ object.\n\n```\nspring.datasource.url=jdbc:mysql://localhost:3306/test\nspring.datasource.username=root\n\
    spring.datasource.password=secret\nspring.datasource.driver-class-name=com.mysql.jdbc.Driver\n\
    ```\n\nYou can also see some inner classes and bean definition methods that are\
    \ annotated with Spring Boot’s conditional annotations, such as `@ConditionalOnMissingBean`,\
    \ `@ConditionalOnClass`, and `@ConditionalOnProperty`. These bean definitions\
    \ will be registered in `ApplicationContext` only if those conditions match.\n\
    \nYou can also explore many other `AutoConfiguration` classes in `spring-boot-autoconfigure-{version}.jar`,\
    \ such as:\n\n*   `org.springframework.boot.autoconfigure.web.DispatcherServletAutoConfiguration`\n\
    *   `org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration`\n\
    *   `org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration`\n\
    *   `org.springframework.boot.autoconfigure.jackson.JacksonAutoConfiguration`\n\
    \nYou should now have a basic understanding of how Spring Boot autoconfiguration\
    \ works, by using various autoconfiguration classes along with `@Conditional`\
    \ features.\n\n## Summary\n\nThis chapter explained how to register Spring beans\
    \ conditionally using the `@Conditional` annotation and how Spring Boot leverages\
    \ `@Conditional` and `@EnableAutoConfiguration` annotations to autoconfigure beans\
    \ based on various criteria.\n\nThe next chapter looks at some of the cool features\
    \ of Spring Boot that help increase developer productivity.\n\n# 4. Spring Boot\
    \ Essentials\n\nThe primary goal of Spring Boot is to make it easy to develop\
    \ Spring-based applications. Spring Boot provides several features to implement\
    \ commonly used features, such as logging and externalizing configuration properties\
    \ in a much easier way. This chapter covers configuring logging, externalizing\
    \ configuration properties, and configuring profile specific properties. Then\
    \ it explores how to use the Spring Boot developer tools to automatically restart\
    \ the server on code changes, which will improve developer productivity.\n\n##\
    \ Logging\n\nLogging is a very important part of any application and it helps\
    \ with debugging issues. Spring Boot, by default, includes `spring-boot-starter-logging`\
    \ as a transitive dependency for the `spring-boot-starter` module. By default,\
    \ Spring Boot includes SLF4J along with Logback implementations. Spring Boot has\
    \ a `LoggingSystem` abstraction that automatically configures logging based on\
    \ the logging configuration files available in the classpath.\n\nIf Logback is\
    \ available, Spring Boot will choose it as the logging handler. You can easily\
    \ configure logging levels within the `application.properties` file without having\
    \ to create logging provider specific configuration files such as `logback.xml`\
    \ or `log4j.properties`.\n\n```\nlogging.level.org.springframework.web=INFO\n\
    logging.level.org.hibernate=ERROR\nlogging.level.com.apress=DEBUG\n```\n\nIf you\
    \ want to log the data into a file in addition to the console, specify the filename\
    \ as follows:\n\n```\nlogging.path=/var/logs/app.log\n```\n\nor\n\n```\nlogging.file=myapp.log\n\
    ```\n\nIf you want to have more control over the logging configuration, create\
    \ the logging provider specific configuration files in their default locations,\
    \ which Spring Boot will automatically use.\n\nFor example, if you place the `logback.xml`\
    \ file in the root classpath, Spring Boot will automatically use it to configure\
    \ the logging system. See Listing 4-1.\n\n```\n%d{HH:mm:ss.SSS} [%thread] %-5level\
    \ %logger{36} - %msg%n\n\napp.log\n\n%date %level [%thread] %logger{10} [%file:%line]\
    \ %msg%n \n\nListing 4-1. The logback.xml File\n```\n\nIf you want to use other\
    \ logging libraries, such as Log4J or Log4j2, instead of Logback, you can exclude\
    \ `spring-boot-starter-logging` and include the respective logging starter, as\
    \ follows:\n\n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter</artifactId>\n    <exclusions>\n        <exclusion>\n\
    \            <groupId>org.springframework.boot</groupId>\n            <artifactId>spring-boot-starter-logging</artifactId>\n\
    \        </exclusion>\n    </exclusions>\n</dependency>\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-log4j</artifactId>\n</dependency>\n```\n\n\
    Now you can add the `log4j.properties` file to the root classpath, which Spring\
    \ Boot will automatically use for logging."
