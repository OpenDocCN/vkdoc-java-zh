    \ as shown in Listing [2-4](#A447991_1_En_2_Chapter.html#Par72).\n\n```\n\nHome\n\
    \nHello World!!\n\nListing 2-4.\nsrc/main/public/index.html\n```\n\nNow, from\
    \ your IDE , run the `SpringbootBasicApplication.main()` method as a standalone\
    \ Java class that will start the embedded Tomcat server on port 8080 and point\
    \ the browser to `http://localhost:8080/`. You should be able to see the response:\
    \ `Hello World!!`.\n\nYou can also run the Spring Boot application using `spring-boot-maven-plugin`,\
    \ as follows:\n\n```\nmvn spring-boot:run\n```\n\n## The Application Entry Point\
    \ Class\n\nSpring Boot applications should have an entry point class with the\
    \ `public static void main(String[] args)` method, which is usually annotated\
    \ with the `@SpringBootApplication` annotation and will be used to bootstrap the\
    \ application (Listing [2-5](#A447991_1_En_2_Chapter.html#Par77)).\n\n```\npackage\
    \ com.mycompany.myproject;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\n@SpringBootApplication\n\
    public class Application\n{\npublic static void main(String[] args)\n{\nSpringApplication.run(Application.class,\
    \ args);\n}\n}\nListing 2-5.\nMain Class com.mycompany.myproject.Application.java\
    \ in the Root Package\n```\n\nIt is highly recommended that you put the main entry\
    \ point class in the root package, say in `com.mycompany.myproject`, so that the\
    \ `@EnableAutoConfiguration` and `@ComponentScan` annotations will scan for Spring\
    \ beans, JPA entities, etc., in the root and all of its sub-packages automatically.\n\
    \nIf you have an entry point class in a nested package, you might need to specify\
    \ the `basePackage`s to scan for Spring components explicitly (Listing [2-6](#A447991_1_En_2_Chapter.html#Par80)).\n\
    \n```\npackage com.mycompany.myproject.config;\n@Configuration\n@EnableAutoConfiguration\n\
    @ComponentScan(basePackages = \"com.mycompany.myproject\")\n@EntityScan(basePackageClasses=Person.class)\n\
    public class Application\n{\npublic static void main(String[] args)\n{\nSpringApplication.run(Application.class,\
    \ args);\n}\n}\nListing 2-6.\nMain Class com.mycompany.myproject.config.Application.java\
    \ in a Non-Root Package\n```\n\nHere, the `Application.java` main class is in\
    \ the `com.mycompany.myproject.config` package, which is not the root package.\
    \ So, you need to specify `@ComponentScan(basePackages = \"com.mycompany.myproject\"\
    )` so that Spring Boot will scan `com.mycompany.myproject` and all of its sub-packages\
    \ for Spring components. Also, we specified `@EntityScan(basePackageClasses=Person.class)`\
    \ so that Spring Boot will scan for JPA entities under the package where `Person.class`\
    \ exists.\n\n## Fat JAR Using the Spring Boot Maven Plugin\n\nYou can run your\
    \ application directly from the IDE or use Maven `spring-boot:run` during development,\
    \ but ultimately you need to create a deployment unit that can be run in the production\
    \ environment without any IDE support. You can use `spring-boot-maven-plugin`\
    \ to create a single deployment unit (a fat JAR) by executing the following Maven\
    \ goals.\n\n```\nmvn clean package\n```\n\nNow there are two interesting files\
    \ in the `target` directory—`springboot-basic-1.0-SNAPSHOT.jar` and `springboot-basic-1.0-SNAPSHOT.jar.original`.\
    \ The `springboot-basic-1.0-SNAPSHOT.jar.original` file will contain only the\
    \ compiled classes and classpath resources.\n\nBut if you look at `springboot-basic-1.0-SNAPSHOT.jar`,\
    \ you find the following:\n\n*   Compiled classes of your own source code in `src/main/java`\
    \ and static resources from `src/main/resources` will be in the `BOOT-INF/classes`\
    \ directory\n*   All the dependent JARs in the `BOOT-INF/lib` directory\n*   Classes\
    \ in the `org.springframework.boot.loader` package that do the Spring Boot magic\
    \ of running the Spring Boot application\n\nYou can create self-contained deployment\
    \ units for JAR-type modules using plugins like `maven-shade-plugin`, which packages\
    \ all the dependent JAR classes into a single JAR file. But Spring Boot follows\
    \ a different approach and it allows you to nest JARs directly within your Spring\
    \ Boot application JAR file. You can read more about at: [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#executable-jar`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#executable-jar)\
    \ .\n\nYou can run the application using the following command:\n\n```\njava -jar\
    \ springboot-basic-1.0-SNAPSHOT.jar\n```\n\n## Spring Boot Using Gradle\n\nGradle\
    \ is another popular build tool based on Groovy DSL. You can use Gradle instead\
    \ of Maven to build Spring Boot applications. Gradle follows a similar project\
    \ structure as Maven. For example, like the main Java source resides in `src/main/java`,\
    \ the main resources reside in `src/main/resources`, and so on.\n\nYou can create\
    \ a Gradle-based Spring Boot project by selecting Gradle as the build tool while\
    \ creating the application through Spring Initializr or the IDEs. The generated\
    \ `build.gradle` file will look like Listing [2-7](#A447991_1_En_2_Chapter.html#Par94).\n\
    \n```\nbuildscript {\next {\nspringBootVersion = '2.0.0.BUILD-SNAPSHOT'\n}\nrepositories\
    \ {\nmavenCentral()\nmaven { url \"https://repo.spring.io/snapshot\" }\nmaven\
    \ { url \"https://repo.spring.io/milestone\" }\n}\ndependencies {\nclasspath(\"\
    org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}\")\n}\n\
    }\napply plugin: 'java'\napply plugin: 'eclipse'\napply plugin: 'org.springframework.boot'\n\
    version = '0.0.1-SNAPSHOT'\nsourceCompatibility = 1.8\nrepositories {\nmavenCentral()\n\
    maven { url \"https://repo.spring.io/snapshot\" }\nmaven { url \"https://repo.spring.io/milestone\"\
    \ }\n}\ndependencies {\ncompile('org.springframework.boot:spring-boot-starter-web')\n\
    testCompile('org.springframework.boot:spring-boot-starter-test')\n}\nListing 2-7.\n\
    build.gradle\n```\n\nNow you can run the application by using the `gradle bootRun`\
    \ command. You can also use the `gradle build` command, which generates the fat\
    \ JAR in the `build/libs` directory."
