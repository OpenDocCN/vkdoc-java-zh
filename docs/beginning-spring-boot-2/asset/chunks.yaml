- fmt: "### Working with Thymeleaf Forms\n\nThymeleaf offers very good Spring integration\
    \ with support for:\n\n* Forms with backing beans and result/error bindings\n\
    * Use of property editors and conversion services\n* Displaying internationalization\
    \ (i18n) messages using `ResourceBundles`\n* Using the Spring Expression Language\
    \ (Spring EL)\n\nIn this section, you see how you can create a user registration\
    \ form using Thymeleaf and handle the form submission using Spring controllers.\n\
    \nCreate a simple POJO called `User.java`, as shown in Listing [10-9](#A447991_1_En_10_Chapter.html#Par119).\n\
    \n```java\npublic class User\n{\nprivate Long id;\nprivate String name;\nprivate\
    \ String email;\nprivate String password;\n//setters & getters\n}\n```\n\nCreate\
    \ the `registration.html` file in the `src/main/resources/templates` directory,\
    \ as shown in Listing [10-10](#A447991_1_En_10_Chapter.html#Par121).\n\n```html\n\
    <!DOCTYPE html>\n<html xmlns:th=\"http://www.thymeleaf.org\">\n<head>\n<title>User\
    \ Registration</title>\n</head>\n<body>\n<h1>User Registration Form</h1>\n<form\
    \ th:action=\"@{/registration}\" th:object=\"${user}\" method=\"post\">\n<label>Name</label>\n\
    <input type=\"text\" th:field=\"*{name}\"/>\n<label>Email</label>\n<input type=\"\
    text\" th:field=\"*{email}\"/>\n<label>Password</label>\n<input type=\"password\"\
    \ th:field=\"*{password}\"/>\n<button type=\"submit\">Submit</button>\n</form>\n\
    </body>\n</html>\n```\n\nCreate a SpringMVC controller to handle the `GET` and\
    \ `POST` requests to the `/registration` URL, as shown in Listing [10-11](#A447991_1_En_10_Chapter.html#Par123).\n\
    \n```java\n@Controller\npublic class RegistrationController\n{\n@GetMapping(\"\
    /registration\")\npublic String registrationForm(Model model) {\nmodel.addAttribute(\"\
    user\", new User());\nreturn \"registration\";\n}\n@PostMapping(\"/registration\"\
    )\npublic String handleRegistration(User user) {\nlogger.debug(\"Registering User\
    \ : \"+user);\nreturn \"redirect:/login\";\n}\n}\n```\n\nWhen you request the\
    \ `\"/registration\"` URL, a `GET` request is triggered and will be handled by\
    \ the `RegistrationController.registrationForm()` method. You are adding the `User`\
    \ object to `Model` with the `\"user\"` key so that you can bind the form properties\
    \ in your Thymeleaf form.\n\nNote that this example uses two Thymeleaf attributes—`th:action`\
    \ builds a context-relative URL and `th:object` specifies the model attribute\
    \ name.\n\n```html\n<form th:action=\"@{/registration}\" th:object=\"${user}\"\
    \ method=\"post\">\n...\n</form>\n```\n\nThe example uses the syntax `th:field=\"\
    *{propertyName}\"` for form input fields so that the field will be backed by the\
    \ model object property. So when you use `<input type=\"text\" th:field=\"*{name}\"\
    />`, the `name` input field value will be bounded to the `user.name` property.\
    \ If you see the source of the rendered form, `<input type=\"text\" th:field=\"\
    *{name}\"/>` is rendered as follows:\n\n```html\n<input type=\"text\" id=\"name\"\
    \ name=\"name\" value=\"\" />\n```\n\n### Form Validation\n\nValidating the user\
    \ submitted data is crucial in web applications. Spring supports data validation\
    \ using Spring's own validation framework and supports the Java Bean Validation\
    \ API.\n\nFirst, you need to specify the user validation rules using Java Bean\
    \ validation annotations.\n\n```java\npublic class User\n{\nprivate Long id;\n\
    @NotNull\n@Size(min=3, max=50)\nprivate String name;\n@NotNull\n@Email(message=\"\
    {invalid.email}\")\nprivate String email;\n@NotNull\n@Size(min=6, max=50)\nprivate\
    \ String password;\n//setters & getters\n}\n```\n\nThymeleaf provides the syntax\
    \ `#fields.hasErrors('fieldName')` to check if there are any errors associated\
    \ with the `fieldName` field.\n\n```html\n<p th:if=\"${#fields.hasErrors('name')}\"\
    \ th:errors=\"*{name}\">Incorrect data</p>\n```\n\nYou can use `#fields.hasErrors('global')`\
    \ to check whether there are any global errors (not related to any specific fields).\n\
    \nYou can now update `registration.html` to show the validation errors, as shown\
    \ in Listing [10-12](#A447991_1_En_10_Chapter.html#Par136).\n\n```html\n<!DOCTYPE\
    \ html>\n<html xmlns:th=\"http://www.thymeleaf.org\">\n<head>\n<title>User Registration</title>\n\
    </head>\n<body>\n<h1>User Registration Form</h1>\n<form th:action=\"@{/registration}\"\
    \ th:object=\"${user}\" method=\"post\">\n<p th:if=\"${#fields.hasErrors('global')}\"\
    \ th:errors=\"*{global}\">Incorrect data</p>\n<label>Name</label>\n<input type=\"\
    text\" th:field=\"*{name}\"/>\n<p th:if=\"${#fields.hasErrors('name')}\" th:errors=\"\
    *{name}\">Incorrect data</p>\n<label>Email</label>\n<input type=\"text\" th:field=\"\
    *{email}\"/>\n<p th:if=\"${#fields.hasErrors('email')}\" th:errors=\"*{email}\"\
    >Incorrect data</p>\n<label>Password</label>\n<input type=\"password\" th:field=\"\
    *{password}\"/>\n<p th:if=\"${#fields.hasErrors('password')}\" th:errors=\"*{password}\"\
    >Incorrect data</p>\n<button type=\"submit\">Submit</button>\n</form>\n</body>\n\
    </html>\n```\n\nWith this updated form if there are any form validation failures,\
    \ it will show those errors next to the field and all global errors at the beginning.\
    \ Observe that this example uses `th:classappend=\"${#fields.hasErrors('email')}?\
    \ 'has-error'\"` to add some CSS style dynamically if there are any errors.\n\n\
    You need to update the `\"/registration\" POST` handler method to trigger validation\
    \ for the model object. You can add the `@Valid` annotation to the model parameter\
    \ to perform validations on the form submit.\n\nYou also need to define the `BindingResult`\
    \ parameter immediately next to the model object. The validation errors will be\
    \ populated in `BindingResult`, which you can inspect later in your method body.\n\
    \n```java\n@Controller\npublic class RegistrationController\n{\n...\n...\n@PostMapping(\"\
    /registration\")\npublic String handleRegistration(@Valid User user, BindingResult\
    \ result) {\nlogger.debug(\"Registering User : \"+user);\nif(result.hasErrors()){\n\
    return \"registration\";\n}\nreturn \"redirect:/registrationsuccess\";\n}\n}\n\
    ```\n\nWhen the form is submitted with invalid data, those validation errors will\
    \ be populated in `BindingResult`. The example checks whether there are any errors\
    \ and redisplays the registration form, which will be rendered along with the\
    \ errors.\n\nSometimes you can't express all the validation rules using annotations\
    \ only. For example, you want the user e-mail to be unique. You can't implement\
    \ this without checking against your database.\n\nNext, you'll see how you can\
    \ use Spring's Validation framework to implement complex validations.\n\nYou can\
    \ create `UserValidator` by implementing the `org.springframework.validation.Validator`\
    \ interface, as shown in Listing [10-13](#A447991_1_En_10_Chapter.html#Par145).\n\
    \n```java\n@Component\npublic class UserValidator implements Validator\n{\n@Autowired\n\
    UserRepository userRepository;\n@Override\npublic boolean supports(Class clazz)\n\
    {\nreturn User.class.isAssignableFrom(clazz);\n}\n@Override\npublic void validate(Object\
    \ target, Errors errors)\n{\nUser user = (User) target;\nString email = user.getEmail();\n\
    User userByEmail = userRepository.findByEmail(email);\nif(userByEmail != null){\n\
    errors.rejectValue(\"email\",\n\"email.exists\",\nnew Object[]{email},\n\"Email\
    \ \"+email+\" already in use\");\n}\n}\n}\n```\n\nIn the `validate(Object target,\
    \ Errors errors)` method, you can implement any complex validation logic and register\
    \ errors.\n\nNow you can inject `UserValidator` into the `RegistrationController`\
    \ and use it to validate the model object as follows:\n\n```java\n@Controller\n\
    public class RegistrationController\n{\n@Autowired\nprivate UserValidator userValidator;\n\
    @PostMapping(\"/registration\")\npublic String handleRegistration(@Valid User\
    \ user, BindingResult result) {\nuserValidator.validate(user, result);\nif(result.hasErrors()){\n\
    return \"registration\";\n}\nreturn \"redirect:/registrationsuccess\";\n}\n}\n\
    ```\n\nWhen the form is then submitted, if there are any validation failures as\
    \ per the Bean Validation Constraint annotations, they will be populated in `BindingResult`.\
    \ After that, the example checks for duplicate e-mails using `userValidator.validate(user,\
    \ result)`. This will add an error to the `email` property if the given e-mail\
    \ already exists.\n\n### File Uploading\n\nSpring Boot's `org.springframework.boot.autoconfigure.web.servlet.MultipartAutoConfiguration`\
    \ enables multi-part uploads by default.\n\nYou can create a form with `enctype=\"\
    multipart/form-data\"` to upload a file, as shown in Listing [10-14](#A447991_1_En_10_Chapter.html#Par152).\n\
    \n```html\n<form method=\"POST\" enctype=\"multipart/form-data\" action=\"/uploadMyFile\"\
    >\n<input type=\"file\" name=\"myFile\"/>\n<button type=\"submit\">Upload</button>\n\
    </form>\n```\n\nYou can then implement the `FileUploadController` to handle the\
    \ request, as shown in Listing [10-15](#A447991_1_En_10_Chapter.html#Par154).\n\
    \n```java\n@PostMapping(\"/uploadMyFile\")\npublic String handleFileUpload(@RequestParam(\"\
    myFile\") MultipartFile file)\n{\nif (!file.isEmpty())\n{\nString name = file.getOriginalFilename();\n\
    try\n{\nbyte[] bytes = file.getBytes();\nFiles.write(new File(name).toPath(),\
    \ bytes);\n}\ncatch (Exception e)\n{\ne.printStackTrace();\n}\n}\nreturn \"redirect:/fileUpload\"\
    ;\n}\n```\n\nNote that this example binds the `file` type input parameter `myFile`\
    \ to the `MultipartFile` argument with `@RequestParam(\"myFile\")`, from which\
    \ you can extract `byte[]` or `InputStream`.\n\nYou can customize multipart configuration\
    \ using the following properties:\n\n```properties\nspring.servlet.multipart.enabled=true\n\
    spring.servlet.multipart.max-file-size=2MB\nspring.servlet.multipart.max-request-size=20MB\n\
    spring.servlet.multipart.file-size-threshold=5MB\n```\n\n### Using ResourceBundles\
    \ for Internationalization (i18n)\n\nBy default, Spring Boot's `org.springframework.boot.autoconfigure.context.MessageSourceAutoConfiguration`\
    \ registers the `MessageSource` bean with the base name `\"messages\"`.\n\nYou\
    \ can add `ResourceBundles` such as `messages.properties`, `messages_en.properties`,\
    \ and `messages_fr.properties` in the root classpath, which will be automatically\
    \ picked up by Spring Boot. You can also customize the `ResourceBundles basename`\
    \ using the `spring.messages.basename` property.\n\nIn addition to that, Spring\
    \ Boot provides the following customization properties.\n\n```properties\nspring.messages.basename=messages\n\
    spring.messages.cache-seconds=-1(cache expiration in seconds. If set to -1, bundles\
    \ are cached forever)\nspring.messages.encoding=UTF-8\nspring.messages.fallback-to-system-locale=true\n\
    ```\n\nCreate the default `ResourceBundle messages.properties` in `src/main/resources/`\
    \ folder as follows:\n\n```properties\napp.title=SpringBoot Thymeleaf Demo\napp.version=1.0\n\
    email.exists=Email {0} is already in use.\n```\n\nYou can render these values\
    \ in your Thymeleaf templates using `th:text=\"#{msgKey}\"`.\n\n```html\n<h1 th:text=\"\
    #{app.title}\">App Title</h1>\n```\n\nYou can also obtain these messages programmatically\
    \ from `MessageSource`, as shown in Listing [10-16](#A447991_1_En_10_Chapter.html#Par167).\n\
    \n```java\n@Controller\npublic class RegistrationController\n{\n@Autowired\nprivate\
    \ MessageSource messageSource;\n....\n....\npublic String handleRegistration(User\
    \ user)\n{\n...\nString code=\"email.exists\";\nObject[] args = new Object[]{email};\n\
    String defaultMsg = \"Email \"+email+\" already in use\";\nLocale locale = Locale.getDefault();\n\
    String errorMsg =\nmessageSource.getMessage(code, args, defaultMsg, locale);\n\
    ...\n}\n}\n```\n\n### ResourceBundles for Hibernate Validation Errors\n\nSpring\
    \ Boot uses Hibernate Validator as the Bean Validation API implementation. By\
    \ default, Hibernate validation looks for the `ValidationMessages.properties`\
    \ file in the root classpath for failure message keys. If you want to use `messages.properties`\
    \ for both i18n and Hibernate Validation error messages, you can register the\
    \ `Validator` bean, as shown in Listing [10-17](#A447991_1_En_10_Chapter.html#Par169).\n\
    \n```java\n@Configuration\npublic class WebConfig implements WebMvcConfigurer\n\
    {\n...\n...\n@Autowired\nprivate MessageSource messageSource;\n@Override\npublic\
    \ Validator getValidator() {\nLocalValidatorFactoryBean factory = new LocalValidatorFactoryBean();\n\
    factory.setValidationMessageSource(messageSource);\nreturn factory;\n}\n}\n```\n\
    \nWith this configuration, both the internationalization (i18n) and Hibernate\
    \ Validation error message keys will be picked up from the `messages*.properties`\
    \ files.\n\n### Error Handling\n\nYou can handle exceptions in Spring MVC applications\
    \ by registering the `SimpleMappingExceptionResolver` bean and configuring which\
    \ view to render for what type of exception, as shown in Listing [10-18](#A447991_1_En_10_Chapter.html#Par172).\n\
    \n```java\n@Configuration\n@EnableWebMvc\npublic class WebMvcConfig implements\
    \ WebMvcConfigurer\n{\n@Bean(name=\"simpleMappingExceptionResolver\")\npublic\
    \ SimpleMappingExceptionResolver simpleMappingExceptionResolver()\n{\nSimpleMappingExceptionResolver\
    \ exceptionResolver = new SimpleMappingExceptionResolver();\nProperties mappings\
    \ = new Properties();\nmappings.setProperty(\"DataAccessException\", \"dbError\"\
    );\nmappings.setProperty(\"RuntimeException\", \"error\");\nexceptionResolver.setExceptionMappings(mappings);\n\
    exceptionResolver.setDefaultErrorView(\"error\");\nreturn exceptionResolver;\n\
    }\n}\n```\n\nYou can also use the `@ExceptionHandler` annotation to define handler\
    \ methods for specific exception types, as shown in Listing [10-19](#A447991_1_En_10_Chapter.html#Par174).\n\
    \n```java\n@Controller\npublic class CustomerController\n{\n@GetMapping(\"/customers/{id}\"\
    )\npublic String findCustomer(@PathVariable Long id, Model model)\n{\nCustomer\
    \ c = customerRepository.findById(id);\nif(c == null) throw new CustomerNotFoundException();\n\
    model.add(\"customer\", c);\nreturn \"view_customer\";\n}\n@ExceptionHandler(CustomerNotFoundException.class)\n\
    public ModelAndView handleCustomerNotFoundException(CustomerNotFoundException\
    \ ex)\n{\nModelAndView model = new ModelAndView(\"error/404\");\nmodel.addObject(\"\
    exception\", ex);\nreturn model;\n}\n}\n```\n\nThe `handleCustomerNotFoundException()`\
    \ method in `CustomerController` will only handle the exception `CustomerNotFoundException`\
    \ raised from `CustomerController @RequestMapping` methods.\n\nYou can handle\
    \ exceptions globally by creating an exception handler class annotated with `@ControllerAdvice`.\
    \ The `@ExceptionHandler` methods in the `@ControllerAdvice` class handle errors\
    \ that occur in any controller request handling method. See Listing [10-20](#A447991_1_En_10_Chapter.html#Par177).\n\
    \n```java\n@ControllerAdvice\npublic class GlobalExceptionHandler\n{\nprivate\
    \ static final Logger logger = LoggerFactory.getLogger(GlobalExceptionHandler.class);\n\
    @ExceptionHandler(DataAccessException.class)\npublic String handleDataAccessException(HttpServletRequest\
    \ request, DataAccessException ex){\nlogger.info(\"DataAccessException Occurred::\
    \ URL=\"+request.getRequestURL());\nreturn \"db_error\";\n}\n@ExceptionHandler(ServletRequestBindingException.class)\n\
    public String servletRequestBindingException(ServletRequestBindingException e)\
    \ {\nlogger.error(\"ServletRequestBindingException occurred: \"+e.getMessage());\n\
    return \"validation_error\"\n}\n}\n```\n\nSpring Boot registers a global error\
    \ handler and maps `/error` by default, which renders an HTML response for browser\
    \ clients and a JSON response for REST clients. You can provide the custom error\
    \ page by implementing `ErrorController`. See Listing [10-21](#A447991_1_En_10_Chapter.html#Par179).\n\
    \n```java\n@Controller\npublic class GenericErrorController implements ErrorController\n\
    {\nprivate static final String ERROR_PATH = \"/error\";\n@RequestMapping(ERROR_PATH)\n\
    public String error(){\nreturn \"errorPage.html\";\n}\n@Override\npublic String\
    \ getErrorPath() {\nreturn ERROR_PATH;\n}\n}\n```\n\nYou can also provide custom\
    \ error pages based on the HTTP error status code. Spring Boot looks for error\
    \ pages in the `/error` folder under the static resource locations (`classpath:/static`,\
    \ `classpath:/public`, etc.).\n\nFor example, you can display the `src/main/resources/static/error/404.html`\
    \ file when a 404 error occurs. Likewise, you can also display the `src/main/resources/static/error/5xx.html`\
    \ file for all server errors with `5xx` error status codes.\n\n### Summary\n\n\
    This chapter discussed how to develop web applications using Spring Boot with\
    \ Thymeleaf view templates. It also looked at performing form validations using\
    \ the Bean Validation API and Spring's validation framework. You learned how to\
    \ handle exception scenarios at the controller level and globally. In the next\
    \ chapter, you will learn about developing RESTful web services using Spring Boot.\n\
    \n## 11. Building REST APIs Using Spring Boot\n\nREST (REpresentational State\
    \ Transfer) is an architectural style for building distributed systems that provide\
    \ interoperability between heterogeneous systems. The need for REST APIs increased\
    \ a lot with the drastic increase of mobile devices. It became logical to build\
    \ REST APIs and let the web and mobile clients consume the API instead of developing\
    \ separate applications.\n\nSpringMVC provides first-class support for building\
    \ RESTful web services. As Spring's REST support is built on top of SpringMVC,\
    \ you can leverage the knowledge of SpringMVC for building REST APIs.\n\nSpring\
    \ Data REST is a spring portfolio project that can be used to expose Spring Data\
    \ repositories as REST endpoints. You can expose Spring Data JPA, Spring Data\
    \ Mongo, and Spring Data Cassandra repositories as REST endpoints without much\
    \ effort.\n\nThis chapter covers RESTful web services, including how you can build\
    \ REST APIs using SpringMVC. Then you will learn about building REST APIs using\
    \ Spring Data REST.\n\n### Introduction to RESTful Web Services\n\nREST stands\
    \ for representational state transfer and is an architectural style for designing\
    \ distributed hypermedia systems. The term REST was coined by Roy Fielding in\
    \ 2000 in his doctoral dissertation, which you can find at: [`http://www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%7Efielding/pubs/dissertation/rest_arch_style.htm).\n\
    \nThe fundamental concept of a REST-based system is the resource, which can be\
    \ identified by a Uniform Resource Identifier (URI). For web-based systems, HTTP\
    \ is the most commonly used protocol for communicating with external systems.\
    \ You can identify a unique resource using a URI.\n\nFor example, a blog post\
    \ can be identified by the URI [`http://www.myblog.com/posts/restful-architecture`](http://www.myblog.com/posts/restful-architecture).\
    \ A resource can be a collection resource, which represents a grouped set of resources.\
    \ For example, the URI [`http://www.myblog.com/posts/`](http://www.myblog.com/posts/)\
    \ represents the `posts` resource, which may contain zero or more `Post` resources,\
    \ each of which can be identified by its own URI. The various operations that\
    \ can be performed on a resource can be expressed using its URI along with the\
    \ appropriate HTTP method (`GET`, `POST`, `PUT`, `DELETE`, etc.).\n\nAssume for\
    \ example that you're building a REST API for a blog application. The resources\
    \ that can be identified in a blog domain are post, comment, and user.\n\nFollowing\
    \ the REST principles, you can use the following HTTP verbs:\n\n* `GET`—To get\
    \ a collection or a single resource\n* `POST`—To create a new resource\n* `PUT`—To\
    \ update an existing resource\n* `DELETE`—To delete a collection or a single resource\n\
    \nNow consider how you can define URIs for a blog system's resources:\n\n* `GET`—`http://localhost:8080/myblog/posts/`:\
    \ Returns a list of all posts\n* `GET`—`http://localhost:8080/myblog/posts/2`:\
    \ Returns a post whose ID is 2\n* `POST`—`http://localhost:8080/myblog/posts/`:\
    \ Creates a new `Post` resource\n* `PUT`—`http://localhost:8080/myblog/posts/2`:\
    \ Updates a POST resource whose ID is 2\n* `DELETE`—`http://localhost:8080/myblog/posts/2`:\
    \ Deletes a POST resource whose ID is 2\n* `GET`—`http://localhost:8080/myblog/posts/2/comments`:\
    \ Returns all the comments of the post whose ID is `2`\n* `POST`—`http://localhost:8080/myblog/posts/2/comments`:\
    \ Creates a new comment for the `POST` whose ID is 2\n* `DELETE`—`http://localhost:8080/myblog/posts/2/comments`:\
    \ Deletes all the comments of the `POST` whose ID is 2\n\nThe most commonly used\
    \ data exchange formats (ContentTypes) are JSON and XML. The typical practice\
    \ of determining the input request content and output response types in web based\
    \ systems are based on the `ContentType` and `Accept` header values.\n\n### REST\
    \ API Using SpringMVC\n\nSpringMVC provides support for building RESTful web services\
    \ and Spring Boot makes it much easier with its autoconfiguration mechanism.\n\
    \nListing [11-1](#A447991_1_En_11_Chapter.html#Par26) shows a SpringMVC-based\
    \ REST endpoint.\n\n```java\n@Controller\npublic class PostController\n{\n@Autowired\n\
    PostRepository postRepository;\n@ResponseBody\n@GetMapping(\"/posts\")\npublic\
    \ List listPosts()\n{\nreturn postRepository.findAll();\n}\n}\n```\n\nIt just\
    \ looks like a normal SpringMVC controller, with two noticeable differences:\n\
    \n* Unlike the normal controller methods, which return a view name or a `ModelAndView`\
    \ object, the `listPosts()` method returns a list of `Post` objects.\n* The `listPosts()`\
    \ request handler method is annotated with `@ResponseBody`.\n\nThe `@ResponseBody`\
    \ annotation on the request handler method indicates that the return value should\
    \ be bound to the response body. If you make a `GET` request to the `\"/posts\"\
    ` URL, you might get a JSON or XML representation of the list of `Post` objects\
    \ based on the `Accept` header value.\n\nListing [11-2](#A447991_1_En_11_Chapter.html#Par32)\
    \ shows another method used to create a new post.\n\n```java\n@Controller\npublic\
    \ class PostController\n{\n@Autowired\nPostRepository postRepository;\n...\n...\n\
    @ResponseBody\n@PostMapping(\"/posts\")\npublic Post createPost(@RequestBody Post\
    \ post)\n{\nreturn postRepository.save(post);\n}\n}\n```\n\nIn the `createPost()`\
    \ handler method, the interesting part is the `@RequestBody` annotation. The `@RequestBody`\
    \ annotation will take care of binding the web request body to the method parameter\
    \ with the help of the registered `HttpMessageConverter`s. So, when you make a\
    \ `POST` request to the `\"/post\"` URL with a `Post` JSON body, `HttpMessageConverters`\
    \ converts the JSON request body into a `Post` object and passes it to the `savePost()`\
    \ method.\n\nIf all of your handler methods are REST endpoint handler methods,\
    \ you can have a `@ResponseBody` at the class level instead of adding it to each\
    \ method. Even better, you can use `@RestController`, which is a composed annotation\
    \ of `@Controller` and `@ResponseBody`.\n\nNow you'll take a deep look at implementing\
    \ the REST API for a simple blog application using Spring Data JPA, SpringMVC,\
    \ and, of course, Spring Boot.\n\n1. Create a Spring Boot project and configure\
    \ the Web and JPA starters.\n\n   Create a Spring Boot Maven project and add the\
    \ following starters:\n\n   ```xml\n   <dependency>\n   <groupId>org.springframework.boot</groupId>\n\
    \   <artifactId>spring-boot-starter-web</artifactId>\n   </dependency>\n   <dependency>\n\
    \   <groupId>org.springframework.boot</groupId>\n   <artifactId>spring-boot-starter-data-jpa</artifactId>\n\
    \   </dependency>\n   <dependency>\n   <groupId>com.h2database</groupId>\n   <artifactId>h2</artifactId>\n\
    \   </dependency>\n   ```\n\n   Model the REST resources. This example assumes\
    \ your blog application is a simple one where the administrator can create posts,\
    \ and the blog viewers can view and add their comments to the posts. You can therefore\
    \ identify that there will be `User`, `Post`, and `Comment` resources in the application\
    \ domain.\n\n   First, you create these resources as JPA entities, as shown in\
    \ Listing [11-3](#A447991_1_En_11_Chapter.html#Par41).\n\n   ```java\n   @Entity\n\
    \   @Table(name = \"USERS\")\n   public class User\n   {\n   @Id @GeneratedValue(strategy\
    \ = GenerationType.IDENTITY)\n   private Integer id;\n   @Column(name = \"name\"\
    , nullable = false, length = 150)\n   private String name;\n   @Column(name =\
    \ \"email\", nullable = false, length = 150)\n   private String email;\n   @Column(name\
    \ = \"password\", nullable = false, length = 150)\n   private String password;\n\
    \   //setters & getters\n   }\n   @Entity\n   @Table(name = \"POSTS\")\n   public\
    \ class Post\n   {\n   @Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n\
    \   private Integer id;\n   @Column(name = \"title\", nullable = false, length\
    \ = 150)\n   private String title;\n   @Lob\n   @Column(name = \"content\", nullable\
    \ = false, columnDefinition=\"TEXT\")\n   private String content;\n   @Temporal(TemporalType.TIMESTAMP)\n\
    \   @Column(name=\"created_on\")\n   private Date createdOn = new Date();\n  \
    \ @Temporal(TemporalType.TIMESTAMP)\n   @Column(name=\"updated_on\")\n   private\
    \ Date updatedOn;\n   @OneToMany\n   @JoinColumn(name=\"post_id\")\n   private\
    \ List comments;\n   //setters & getters\n   }\n   @Entity\n   @Table(name = \"\
    COMMENTS\")\n   public class Comment\n   {\n   @Id @GeneratedValue(strategy =\
    \ GenerationType.IDENTITY)\n   private Integer id;\n   @Column(name = \"name\"\
    , nullable = false, length = 150)\n   private String name;\n   @Column(name =\
    \ \"email\", nullable = false, length = 150)\n   private String email;\n   @Lob\n\
    \   @Column(name = \"content\", nullable = false, columnDefinition=\"TEXT\")\n\
    \   private String content;\n   @Temporal(TemporalType.TIMESTAMP)\n   @Column(name=\"\
    created_on\")\n   private Date createdOn = new Date();\n   @Temporal(TemporalType.TIMESTAMP)\n\
    \   @Column(name=\"updated_on\")\n   private Date updatedOn;\n   //setters & getters\n\
    \   }\n   ```\n\n2. Now you create the Spring Data JPA repositories for the JPA\
    \ entities you just created, as shown in Listing [11-4](#A447991_1_En_11_Chapter.html#Par43).\n\
    \n   ```java\n   public class UserRepository extends JpaRepository\n   {\n   }\n\
    \   public class PostRepository extends JpaRepository\n   {\n   }\n   public class\
    \ CommentRepository extends JpaRepository\n   {\n   }\n   ```\n\n3. Now you create\
    \ a SpringMVC controller to implement all the `Post` resource related REST endpoints:\n\
    \n   ```java\n   @RestController\n   @RequestMapping(value=\"/posts\")\n   public\
    \ class PostController\n   {\n   @Autowired\n   PostRepository postRepository;\n\
    \   @Autowired\n   CommentRepository commentRepository;\n   ...\n   ...\n   }\n\
    \   ```\n\n   This example uses `@RestController`, as all the request handler\
    \ methods are REST endpoints only. Also, it annotates with `@RequestMapping(value=\"\
    /posts\")` to have the common root URL named `\"/posts\"` so that you don't have\
    \ to repeat it for each method.\n\n   Before jumping on to implementing REST endpoints,\
    \ first you need to create a custom exception class, called `ResourceNotFoundException`\
    \ (Listing [11-5](#A447991_1_En_11_Chapter.html#Par48)). It will be thrown when\
    \ the client sends a request to get the details of a resource that doesn't exist.\n\
    \n   ```java\n   @ResponseStatus(HttpStatus.NOT_FOUND)\n   public class ResourceNotFoundException\
    \ extends RuntimeException\n   {\n   public ResourceNotFoundException() {\n  \
    \ this(\"Resource not found!\");\n   }\n   public ResourceNotFoundException(String\
    \ message) {\n   this(message, null);\n   }\n   public ResourceNotFoundException(String\
    \ message, Throwable cause) {\n   super(message, cause);\n   }\n   }\n   ```\n\
    \n   Note that the example annotates the `ResourceNotFoundException` class with\
    \ `@ResponseStatus(HttpStatus.NOT_FOUND)` so that when the request handler method\
    \ throws `ResourceNotFoundException`, the proper HTTP error status code (404 `NOT_FOUND`)\
    \ will be returned to the client.\n\n   You'll start by implementing the endpoint\
    \ for creating a new post. As per the REST principles, you use `http://localhost:8080/posts`\
    \ as the URI and an HTTP `POST` method to create a new post. If the `POST` creation\
    \ is successful, you return the appropriate HTTP status code (201 `CREATED`) along\
    \ with newly created post as the `Response` body.\n\n   ```java\n   @ResponseStatus(HttpStatus.CREATED)\n\
    \   @PostMapping(\"\")\n   public Post createPost(@RequestBody Post post)\n  \
    \ {\n   return postRepository.save(post);\n   }\n   ```\n\n   By default, if the\
    \ request handling method completes successfully, the HTTP status code `200 OK`\
    \ will be returned. So, you are annotating with `@ResponseStatus(HttpStatus.CREATED)`\
    \ explicitly to return the appropriate HTTP status code (201 `CREATED`).\n\n \
    \  Next you will implement the endpoint for fetching all posts for which the endpoint\
    \ URL will be `GET http://localhost:8080/posts`.\n\n   ```java\n   @GetMapping(\"\
    \")\n   public List listPosts()\n   {\n   return postRepository.findAll();\n \
    \  }\n   ```\n\n   This example is loading all the posts from the database and\
    \ returning them as a response.\n\n   Next, you will implement the endpoint for\
    \ fetching a post for the given ID for which the endpoint URL will be `GET http://localhost:8080/posts/{id}`.\n\
    \n   ```java\n   @GetMapping(value=\"/{id}\")\n   public Post getPost(@PathVariable(\"\
    id\") Integer id)\n   {\n   return postRepository.findById(id)\n   .orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\n   }\n  \
    \ ```\n\n   This example is getting the `Post` object from the database for the\
    \ given ID and throwing `ResourceNotFoundException` if the post is not found;\
    \ otherwise, it returns the `POST` object.\n\n   Next, you need to implement the\
    \ endpoint for updating a post for the given ID for which the endpoint URL will\
    \ be `PUT http://localhost:8080/posts/{id}`.\n\n   ```java\n   @PutMapping(\"\
    /{id}\")\n   public Post updatePost(@PathVariable(\"id\") Integer id, @RequestBody\
    \ Post post)\n   {\n   postRepository.findById(id)\n   .orElseThrow(() -> new\
    \ ResourceNotFoundException(\"No post found with id=\"+id));\n   return  postRepository.save(post);\n\
    \   }\n   ```\n\n   The example gets the `Post` object from the database for the\
    \ given ID and throws the `ResourceNotFoundException` if the post not found, otherwise\
    \ updating the post.\n\n   Similarly, you can implement the endpoint by deleting\
    \ a post using the HTTP `DELETE` method at the URI `http://localhost:8080/posts/{id}`,\
    \ as follows:\n\n   ```java\n   @DeleteMapping(\"/{id}\")\n   public void deletePost(@PathVariable(\"\
    id\") Integer id)\n   {\n   Post post = postRepository.findById(id)\n   .orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\n   postRepository.deleteById(post.getId());\n\
    \   }\n   ```\n\n   Note that you are not returning any content to the client,\
    \ so on successful deletion of the post, the HTTP 200 `OK` status code will be\
    \ sent.\n\n   You can also implement the REST endpoints for creating new comments\
    \ and deleting an existing comment for a given post as follows:\n\n   ```java\n\
    \   @ResponseStatus(HttpStatus.CREATED)\n   @PostMapping(\"/{id}/comments\")\n\
    \   public void createPostComment(@PathVariable(\"id\") Integer id, @RequestBody\
    \ Comment comment)\n   {\n   Post post = postRepository.findById(id)\n   .orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\n   post.getComments().add(comment);\n\
    \   }\n   @DeleteMapping(\"/{postId}/comments/{commentId}\")\n   public void deletePostComment(@PathVariable(\"\
    postId\") Integer postId,\n   @PathVariable(\"commentId\") Integer commentId)\n\
    \   {\n   commentRepository.deleteById(commentId);\n   }\n   ```\n\n   You can\
    \ also add validation for the REST endpoint handler methods, similar to SpringMVC\
    \ controllers for traditional web applications. See Listing [11-16](#A447991_1_En_11_Chapter.html#Par68).\n\
    \n   ```java\n   @ResponseStatus(HttpStatus.CREATED)\n   @PostMapping(value=\"\
    \")\n   public Post createPost(@RequestBody @Valid Post post, BindingResult result)\n\
    \   {\n   if(result.hasErrors()){\n   //handle errors\n   //throw Exception with\
    \ Invalid data details\n   }\n   return postRepository.save(post);\n   }\n   ```\n\
    \n   This example adds the `@Valid` annotation to the method parameter `Post`\
    \ so that the post object data will be validated against the Java Bean Validation\
    \ Constraints defined on the `POST` properties.\n\n4. In addition to returning\
    \ a arbitrary object from request handler methods, you can also return `ResponseEntity/HttpEntity`,\
    \ which provides an easy way to set response headers and the status code. See\
    \ Listing [11-7](#A447991_1_En_11_Chapter.html#Par71).\n\n   ```java\n   @PostMapping(\"\
    \")\n   public ResponseEntity createPost(@RequestBody @Valid Post post, BindingResult\
    \ result)\n   {\n   if(result.hasErrors()){\n   return new ResponseEntity(post,\
    \ HttpStatus.BAD_REQUEST);\n   }\n   Post savedPost = postRepository.save(post);\n\
    \   HttpHeaders responseHeaders = new HttpHeaders();\n   responseHeaders.set(\"\
    MyResponseHeader1\", \"MyValue1\");\n   responseHeaders.set(\"MyResponseHeader2\"\
    , \"MyValue2\");\n   return new ResponseEntity(savedPost, responseHeaders, HttpStatus.CREATED);\n\
    \   }\n   ```\n\n   This code is verifying whether there are any validation errors\
    \ and is returning a response with the status code `BAD_REQUEST` (400). Otherwise,\
    \ it saves the post and adds custom response headers. It then returns with a status\
    \ code of `CREATED` (201).\n\n   The `ResponseEntity/HttpEntity` classes can also\
    \ be used along with `RestTemplate` to consume REST services, which is discussed\
    \ in the next section.\n\n5. You can test the REST endpoints using any REST client\
    \ tools such as Chrome Browser's Postman ([`http://www.getpostman.com/`](http://www.getpostman.com/))\
    \ or the Advanced REST Client ([`https://chromerestclient.appspot.com/`](https://chromerestclient.appspot.com/))\
    \ extensions.\n\nYou can also use Spring's `RestTemplate` as a client to invoke\
    \ RESTful services. Now you'll test the REST endpoints you have implemented using\
    \ `RestTemplate`.\n\nFirst, you need to populate some sample data using the SQL\
    \ script, as shown in Listing [11-8](#A447991_1_En_11_Chapter.html#Par77).\n\n\
    ```sql\ndelete from  users;\nINSERT INTO users (id, email, password, name) VALUES\n\
    (1, 'admin@gmail.com', 'admin', 'Admin'),\n(2, 'david@gmail.com', 'david', 'David'),\n\
    (3, 'ron@gmail.com', 'ron', 'Ron');\ninsert into posts(id, title, content, created_on,\
    \ updated_on) values\n(1, 'Introducing SpringBoot', 'SpringBoot is awesome', '2017-05-10',\
    \ null),\n(2, 'Securing Web applications', 'This post will show how to use SpringSecurity',\
    \ '2017-05-20', null),\n(3, 'Introducing Spring Social', 'Developing social web\
    \ applications using Spring Social', '2017-05-24', null);\ninsert into comments(id,\
    \ post_id, name, email, content, created_on, updated_on) values\n(1, 1, 'John','john@gmail.com',\
    \ 'This is cool', '2017-05-10', null),\n(2, 1, 'Rambo','rambo@gmail.com', 'Thanks\
    \ for awesome tips', '2017-05-20', null),\n(3, 2, 'Paul', 'paul@gmail.com', 'Nice\
    \ post buddy.', '2017-05-24', null);\n```\n\nNow you'll write a Spring Boot test\
    \ that starts an embedded servlet container on a defined port (`server.port` value)\
    \ and uses `RestTemplate` to invoke the REST API endpoints. See Listing [11-9](#A447991_1_En_11_Chapter.html#Par79).\n\
    \n```java\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.DEFINED_PORT)\n\
    public class SpringbootMvcRestDemoApplicationTest\n{\nprivate static final String\
    \ ROOT_URL = \"http://localhost:8080\";\nRestTemplate restTemplate = new RestTemplate();\n\
    @Test\npublic void testGetAllPosts()\n{\nResponseEntity responseEntity =\nrestTemplate.getForEntity(ROOT_URL+\"\
    /posts\", Post[].class);\nList posts = Arrays.asList(responseEntity.getBody());\n\
    assertNotNull(posts);\n}\n@Test\npublic void testGetPostById()\n{\nPost post =\
    \ restTemplate.getForObject(ROOT_URL+\"/posts/1\", Post.class);\nassertNotNull(post);\n\
    }\n@Test\npublic void testCreatePost()\n{\nPost post = new Post();\npost.setTitle(\"\
    Exploring SpringBoot REST\");\npost.setContent(\"SpringBoot is awesome!!\");\n\
    post.setCreatedOn(new Date());\nResponseEntity postResponse =\nrestTemplate.postForEntity(ROOT_URL+\"\
    /posts\", post, Post.class);\nassertNotNull(postResponse);\nassertNotNull(postResponse.getBody());\n\
    }\n@Test\npublic void testUpdatePost()\n{\nint id = 1;\nPost post = restTemplate.getForObject(ROOT_URL+\"\
    /posts/\"+id, Post.class);\npost.setContent(\"This my updated post1 content\"\
    );\npost.setUpdatedOn(new Date());\nrestTemplate.put(ROOT_URL+\"/posts/\"+id,\
    \ post);\nPost updatedPost = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id,\
    \ Post.class);\nassertNotNull(updatedPost);\n}\n@Test\npublic void testDeletePost()\n\
    {\nint id = 2;\nPost post = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id,\
    \ Post.class);\nassertNotNull(post);\nrestTemplate.delete(ROOT_URL+\"/posts/\"\
    +id);\ntry {\npost = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id, Post.class);\n\
    }\ncatch (final HttpClientErrorException e) {\nassertEquals(e.getStatusCode(),\
    \ HttpStatus.NOT_FOUND);\n}\n}\n}\n```\n\nYou have used various methods on `RestTemplate`\
    \ to invoke the REST services triggering `GET`, `POST`, `PUT`, and `DELETE` operations.\
    \ You then received the responses as Java objects using the `HttpMessageConverter`s.\n\
    \n### CORS (Cross-Origin Resource Sharing) Support\n\nFor security reasons, browsers\
    \ don't allow you to make AJAX requests to resources residing outside of the current\
    \ origin. CORS specification ([`https://www.w3.org/TR/cors/`](https://www.w3.org/TR/cors/))\
    \ provides a way to specify which cross-origin requests are permitted. SpringMVC\
    \ provides support for enabling CORS for REST API endpoints so that the API consumers,\
    \ such as web clients and mobile devices, can make calls to REST APIs.\n\n####\
    \ Class- and Method-Level CORS Configuration\n\nYou can enable CORS at the controller\
    \ level or at the method level using the `@CrossOrigin` annotation. Now you'll\
    \ see how you can enable CORS support on a specific request handling method.\n\
    \n```java\n@RestController\npublic class UserController\n{\n@CrossOrigin\n@GetMapping(\"\
    /users/{id}\")\npublic User getUser(@PathVariable Long id) {\n// ...\n}\n@DeleteMapping(\"\
    /users/{id}\")\npublic void deleteUser(@PathVariable Long id) {\n// ...\n}\n}\n\
    ```\n\nHere, the CORS support enables only the `forgetUsers()` method using the\
    \ default configuration.\n\n* All headers and origins are permitted\n* Credentials\
    \ are allowed\n* Maximum age is set to 30 minutes\n* The list of HTTP methods\
    \ is set to the methods on the `@RequestMethod` annotation\n\nYou can customize\
    \ these properties by providing options on the `@CrossOrigin` annotation.\n\n\
    ```java\n@CrossOrigin(origins={\"http://domain1.com\", \"http://domain2.com\"\
    },\nallowedHeaders=\"X-AUTH-TOKEN\",\nallowCredentials=\"false\",\nmaxAge=15*60,\n\
    methods={RequestMethod.GET, RequestMethod.POST }\n)\n@GetMapping(\"/users/{id}\"\
    )\npublic User getUser(@PathVariable Long id) {\n// ...\n}\n```\n\nSimilarly,\
    \ you can apply the `@CrossOrigin` annotation at the controller class level.\n\
    \n```java\n@CrossOrigin\n@RestController\npublic class UserController\n{\n....\n\
    ....\n}\n```\n\nWhen applied at the class level, the same `@CrossOrigin` configuration\
    \ is applied to all the `@RequestMapping` methods. If the `@CrossOrigin` annotation\
    \ is specified at both the class level and the method level, Spring will derive\
    \ the CORS configuration by combining attributes from both annotations.\n\n####\
    \ Global CORS Configuration\n\nIn addition to specifying CORS configuration at\
    \ the class and method levels, you can configure it globally by implementing the\
    \ `WebMvcConfigurer.addCorsMappings()` method. See Listing [11-10](#A447991_1_En_11_Chapter.html#Par95).\n\
    \n```java\n@Configuration\npublic class WebConfig implements WebMvcConfigurer\n\
    {\n@Override\npublic void addCorsMappings(CorsRegistry registry) {\nregistry.addMapping(\"\
    /api/**\")\n.allowedOrigins(\"http://localhost:3000\")\n.allowedMethods(\"*\"\
    )\n.allowedHeaders(\"*\")\n.allowCredentials(false)\n.maxAge(3600);\n}\n}\n```\n\
    \nThis configuration enables the CORS for URL pattern `/api/**` from the origin\
    \ `http://localhost:3000` only. You can specify `allowedOrigins(\"*\")` to allow\
    \ requests from any origin.\n\n### Exposing JPA Entities with Bi-Directional References\
    \ Through RESTful Services\n\nYou need to take extra care when exposing JPA entities\
    \ with bi-directional references through RESTful services. If you try to marshal\
    \ a JPA parent entity (say `Post`) that has a collection of child entities (say\
    \ `List<Comment>`) and the child has a reference back to the parent (`Post`),\
    \ then the JPA marshaling will end up in infinite recursion and will throw `StackOverflowError`.\n\
    \nAssume you have the following `Post` and `Comment` entities:\n\n```java\n@Entity\n\
    @Table(name = \"POSTS\")\npublic class Post\n{\n@Id @GeneratedValue(strategy =\
    \ GenerationType.IDENTITY)\nprivate Integer id;\n@Column(name = \"title\", nullable\
    \ = false, length = 150)\nprivate String title;\n....\n....\n@OneToMany(mappedBy=\"\
    post\")\nprivate List comments;\n//setters & getters\n}\n@Entity\n@Table(name\
    \ = \"COMMENTS\")\npublic class Comment\n{\n@Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n\
    private Integer id;\n@Column(name = \"name\", nullable = false, length = 150)\n\
    private String name;\n...\n...\n@ManyToOne(optional=false)\n@JoinColumn(name=\"\
    post_id\")\nprivate Post post;\n//setters & getters\n}\n```\n\nHere, you have\
    \ a bi-directional association between the `Post` and `Comment` entities. Now\
    \ assume you are exposing a REST endpoint to get a `Post` by its `id` as follows:\n\
    \n```java\n@GetMapping(\"/{id}\")\npublic Post getPost(@PathVariable(\"id\") Integer\
    \ id)\n{\nreturn postRepository.findById(id)\n.orElseThrow(() -> new ResourceNotFoundException(\"\
    No post found with id=\"+id));\n}\n```\n\nIf you access `http://localhost:8080/posts/1`,\
    \ the code will enter infinite recursion and the server will throw `StackOverflowError`.\n\
    \nSpring Boot by default configures the Jackson JSON ([`https://github.com/FasterXML/jackson-databind`](https://github.com/FasterXML/jackson-databind))\
    \ library to marshal/unmarshal Java beans into JSON and vice versa.\n\nYou can\
    \ fix the infinite recursion problem by using the Jackson JSON library annotations\
    \ in the following ways.\n\n#### Using @JsonIgnore\n\nYou can break the infinite\
    \ recursion by adding the `@JsonIgnore` annotation on the back reference from\
    \ the child object.\n\n```java\n@Entity\n@Table(name = \"COMMENTS\")\npublic class\
    \ Comment\n{\n...\n...\n@JsonIgnore\n@ManyToOne(optional=false)\n@JoinColumn(name=\"\
    post_id\")\nprivate Post post;\n...\n...\n}\n```\n\nYou can add `@JsonIgnore`\
    \ on all the properties that you want to exclude from marshaling or you can use\
    \ `@JsonIgnoreProperties` at the class level to list all the property names to\
    \ ignore.\n\n```java\n@JsonIgnoreProperties({\"post\"})\n@Entity\n@Table(name\
    \ = \"COMMENTS\")\npublic class Comment\n{\n....\n....\n}\n```\n\nNow you should\
    \ be able to access `http://localhost:8080/posts/1` and get response JSON.\n\n\
    #### Using @JsonManagedReference and @JsonBackReference\n\nYou can break the infinite\
    \ recursion by using `@JsonManagedReference` and `@JsonBackReference` annotations\
    \ as well.\n\n> **Note:** The `@JsonManagedReference` annotation is used to indicate\
    \ that the annotated property is part of a two-way linkage between fields and\
    \ that its role is as a \"parent\" (or \"forward\") link. The `@JsonBackReference`\
    \ annotation is also used to indicate that the associated property is part of\
    \ a two-way linkage between fields, but its role is as a \"child\" (or \"back\"\
    ) link.\n\nYou will annotate the `List<Comment>` collection in `Post` with `@JsonManagedReference`,\
    \ as it is the parent in the context of marshaling the `Post` object. You will\
    \ annotate the back reference property `POST` in the `Comment` class with `@JsonBackReference`,\
    \ as it is the back link to the parent `Post` object.\n\n```java\n@Entity\n@Table(name\
    \ = \"POSTS\")\npublic class Post\n{\n....\n....\n@JsonManagedReference\n@OneToMany(mappedBy=\"\
    post\")\nprivate List comments;\n//setters & getters\n}\n@Entity\n@Table(name\
    \ = \"COMMENTS\")\npublic class Comment\n{\n....\n....\n@JsonBackReference\n@ManyToOne(optional=false)\n\
    @JoinColumn(name=\"post_id\")\nprivate Post post;\n//setters & getters\n}\n```\n\
    \nAt times, you may need more control over the response formats and can't or don't\
    \ want to directly expose database entities as REST endpoint responses. In that\
    \ case, you can use Data Transfer Objects (DTOs), which you can populate from\
    \ entities using Java Object Mapper libraries such as Dozer ([`http://dozer.sourceforge.net/`](http://dozer.sourceforge.net/)),\
    \ ModelMapper ([`http://modelmapper.org/`](http://modelmapper.org/)), and MapStruct\
    \ ([`http://mapstruct.org/`](http://mapstruct.org/)).\n\n### REST API Using Spring\
    \ Data REST\n\nIn the previous section, you implemented the REST API with CRUD\
    \ operations for JPA entities. If your application needs are more like a REST\
    \ API with CRUD operations on top of database tables, you can use Spring Data\
    \ REST.\n\nSpring Data REST builds on top of the Spring Data repositories and\
    \ automatically exports them as REST resources. Spring Data REST configuration\
    \ is defined in the configuration class `RepositoryRestMvcConfiguration` and you\
    \ can simply import it using `@Import(RepositoryRestMvcConfiguration.class)` to\
    \ activate it in our application.\n\nSpring Boot will automatically enable Spring\
    \ Data REST if you add `spring-boot-starter-data-rest` to your application.\n\n\
    ```xml\n<dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-data-rest</artifactId>\n\
    </dependency>\n```\n\nTo expose the Spring Data repositories as REST resources\
    \ with the defaults, you don't need to add any extra configuration. You can simply\
    \ create the JPA entities and Spring Data JPA repositories as shown in the previous\
    \ section.\n\nNow you can run the following entry point class to start the server.\n\
    \n```java\n@SpringBootApplication\npublic class SpringbootDataRestDemoApplication\n\
    {\npublic static void main(String[] args)\n{\nSpringApplication.run(SpringbootDataRestDemoApplication.class,\
    \ args);\n}\n}\n```\n\nAssuming you created the JPA entities `User`, `Post`, and\
    \ `Comment` and their JPA repositories as shown in the previous section, you'll\
    \ now invoke the REST services using the Postman REST client tool.\n\nInvoke the\
    \ `http://localhost:8080/posts GET` request with the `Accept` header set to `application/json`.\
    \ This should return the response shown in Listing [11-11](#A447991_1_En_11_Chapter.html#Par124).\n\
    \n```json\n{\n_embedded:{\nposts:[\n{\nid:1,\ntitle:\"Introducing SpringBoot\"\
    ,\ncontent:\"SpringBoot is awesome\",\ncreatedOn:\"2017-05-09T18:30:00.000+0000\"\
    ,\nupdatedOn:null,\n_links:{\nself:{\nhref:\"http://localhost:8080/api/posts/1\"\
    \n},\npost:{\nhref:\"http://localhost:8080/api/posts/1\"\n},\ncomments:{\nhref:\"\
    http://localhost:8080/api/posts/1/comments\"\n}\n}\n},\n{\nid:2,\ntitle:\"Securing\
    \ Web applications\",\ncontent:\"This post will show how to use SpringSecurity\"\
    ,\ncreatedOn:\"2017-05-19T18:30:00.000+0000\",\nupdatedOn:null,\n_links:{\nself:{\n\
    href:\"http://localhost:8080/api/posts/2\"\n},\npost:{\nhref:\"http://localhost:8080/api/posts/2\"\
    \n},\ncomments:{\nhref:\"http://localhost:8080/api/posts/2/comments\"\n}\n}\n\
    },\n{\nid:3,\ntitle:\"Introducing Spring Social\",\ncontent:\"Developing social\
    \ web applications using Spring Social\",\ncreatedOn:\"2017-05-23T18:30:00.000+0000\"\
    ,\nupdatedOn:null,\n_links:{\nself:{\nhref:\"http://localhost:8080/api/posts/3\"\
    \n},\npost:{\nhref:\"http://localhost:8080/api/posts/3\"\n},\ncomments:{\nhref:\"\
    http://localhost:8080/api/posts/3/comments\"\n}\n}\n}\n]\n},\n_links:{\nself:{\n\
    href:\"http://localhost:8080/api/posts{?page,size,sort}\",\ntemplated:true\n},\n\
    profile:{\nhref:\"http://localhost:8080/api/profile/posts\"\n},\nsearch:{\nhref:\"\
    http://localhost:8080/api/posts/search\"\n}\n},\npage:{\nsize:20,\ntotalElements:3,\n\
    totalPages:1,\nnumber:0\n}\n}\n```\n\nYou can create a new `Post` by invoking\
    \ the `POST` request on `http://localhost:8080/posts` with the `Accept` and `Content-Type`\
    \ headers set to `application/json`. Pass the `Post` details to be created as\
    \ JSON in request body.\n\n```json\n{\n\"title\": \"My 4th Post\",\n\"content\"\
    : \"This is my awesome 4th post\",\n\"createdOn\": \"2016-05-09T18:30:00.000+0000\"\
    \n}\n```\n\nSimilarly, you can update `POST` with `id=4` by using the `PUT` request\
    \ on `http://localhost:8080/posts/4`.\n\n```json\n{\n\"title\": \"My fourth Post\"\
    ,\n\"content\": \"This is my awesome 4th post\",\n\"createdOn\": \"2016-05-09T18:30:00.000+0000\"\
    ,\n\"updatedOn\": \"2016-05-09T18:40:00.000+0000\"\n}\n```\n\nYou can delete `POST`\
    \ with `id=4` by using the `DELETE` request on `http://localhost:8080/posts/4`.\n\
    \nBy default, the Spring Data REST serves up the REST resources at the root URI,\
    \ `\"/\"`. You can customize the path using the `spring.data.rest.basePath` property\
    \ in `application.properties`.\n\n```properties\nspring.data.rest.basePath=/api\n\
    ```\n\n#### Sorting and Pagination\n\nIf the `Repository` extends `PagingAndSortingRepository`,\
    \ then Spring Data REST endpoints support pagination and sorting out-of-the-box.\n\
    \nYou can use the `size` query parameter to limit the number of entries returning.\n\
    \n```\nhttp://localhost:8080/posts/?size=10\n```\n\nTo retrieve the second page\
    \ entries with five entries per page, use the `page` and `size` query parameters.\n\
    \n```\nhttp://localhost:8080/posts?page=1&size=5\n```\n\nTo retrieve entries sorted\
    \ by some property, use the `sort` query parameter.\n\n```\nhttp://localhost:8080/posts?sort=createdOn,desc\n\
    ```\n\nSpring Data REST by default exposes all the public repository interfaces\
    \ without requiring any extra configuration. But if you want to customize the\
    \ defaults, you can use the `@RepositoryRestResource` and `@RestResource` annotations.\
    \ You can disable a repository from being exposed as a REST resource by adding\
    \ `@RepositoryRestResource(exported = false)`.\n\n```java\n@RepositoryRestResource(exported\
    \ = false)\npublic interface CommentRepository extends JpaRepository\n{\n}\n```\n\
    \nYou can disable specific methods from being exposed as REST resources by adding\
    \ `@RestResource(exported = false)` on the methods. You can also customize the\
    \ default `path` and `rel` attribute values using `@RepositoryRestResource`, as\
    \ follows:\n\n```java\n@RepositoryRestResource(path = \"people\", rel = \"people\"\
    )\npublic interface UserRepository extends JpaRepository\n{\n@Override\n@RestResource(exported\
    \ = false)\nvoid delete(Integer id);\n@Override\n@RestResource(exported = false)\n\
    void delete(User entity);\n}\n```\n\nYou can customize various properties of Spring\
    \ Data REST using the `spring.data.rest.*` properties in the `application.properties`\
    \ file. If you want even more control over the customization, you can register\
    \ a `RepositoryRestConfigurer` (or extend `RepositoryRestConfigurerAdapter`) and\
    \ implement or override the `configure*()` methods based on your needs.\n\nFor\
    \ example, by default, the entity's primary key (`id`) values won't be exposed\
    \ in the responses. If you want to expose the `id` values for certain entities,\
    \ you can customize it as follows:\n\n```java\n@Configuration\npublic class RestRepositoryConfig\
    \ extends RepositoryRestConfigurerAdapter\n{\n@Override\npublic void configureRepositoryRestConfiguration(RepositoryRestConfiguration\
    \ config)\n{\nconfig.exposeIdsFor(User.class);\n}\n}\n```\n\nWith this customization,\
    \ the responses will include the `id` property as well.\n\n#### CORS Support in\
    \ Spring Data REST\n\nSimilar to SpringMVC REST endpoints, you can enable CORS\
    \ support for Spring Data REST endpoints using the `@CrossOrigin` annotation at\
    \ the repository level or globally.\n\n```java\n@CrossOrigin\npublic interface\
    \ UserRepository extends JpaRepository\n{\n}\n```\n\nTo enable CORS support globally,\
    \ you can extend `RepositoryRestConfigurerAdapter` and provide CORS configuration,\
    \ as shown in Listing [11-12](#A447991_1_En_11_Chapter.html#Par150).\n\n```java\n\
    @Configuration\npublic class RepositoryConfig extends RepositoryRestConfigurerAdapter\n\
    {\n@Override\npublic void configureRepositoryRestConfiguration(RepositoryRestConfiguration\
    \ config)\n{\nconfig.getCorsRegistry()\n.addMapping(\"/api/**\")\n.allowedOrigins(\"\
    http://localhost:3000\")\n.allowedMethods(\"*\")\n.allowedHeaders(\"*\")\n.allowCredentials(false)\n\
    .maxAge(3600);\n}\n}\n```\n\n> **Note:** SpringMVC's CORS configuration is NOT\
    \ applied to Spring Data REST endpoints.\n\nTo learn more about Spring Data REST,\
    \ visit the Spring Data REST documentation at: [`http://docs.spring.io/spring-data/rest/docs/current/reference/html/`](http://docs.spring.io/spring-data/rest/docs/current/reference/html/).\n\
    \n### Exception Handling\n\nYou can handle exceptions in REST API in the same\
    \ way you handle them in the SpringMVC based web application—by using the `@ExceptionHandler`\
    \ and `@ControllerAdvice` annotations. Instead of rendering a view, you can return\
    \ `ResponseEntity` with the appropriate HTTP status code and exception details.\n\
    \nInstead of simply throwing an exception with the HTTP status code, it is better\
    \ to provide more details about the issue, such as the error code, message, developer\
    \ message, etc.\n\nCreate a class called `ErrorDetails`, as shown in Listing [11-13](#A447991_1_En_11_Chapter.html#Par156).\n\
    \n```java\npublic class ErrorDetails\n{\nprivate String errorCode;\nprivate String\
    \ errorMessage;\nprivate String devErrorMessage;\nprivate Map additionalData =\
    \ new HashMap();\n//setters & getters\n}\n```\n\nIn the controller handler method,\
    \ you can throw exception based on error conditions and handle those exceptions\
    \ using the `@ExceptionHandler` methods, as shown in Listing [11-14](#A447991_1_En_11_Chapter.html#Par158).\n\
    \n```java\n@RestController\n@RequestMapping(value=\"/posts\")\npublic class PostController\n\
    {\n...\n...\n@DeleteMapping(\"/{id}\")\npublic void deletePost(@PathVariable(\"\
    id\") Integer id)\n{\nPost post = postRepository.findById(id)\n.orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\ntry {\npostRepository.deleteById(post.getId());\n\
    } catch (Exception e) {\nthrow new PostDeletionException(\"Post with id=\"+id+\"\
    \ can't be deleted\");\n}\n}\n...\n...\n@ExceptionHandler(PostDeletionException.class)\n\
    public ResponseEntity servletRequestBindingException(PostDeletionException e)\n\
    {\nErrorDetails errorDetails = new ErrorDetails();\nerrorDetails.setErrorMessage(e.getMessage());\n\
    StringWriter sw = new StringWriter();\nPrintWriter pw = new PrintWriter(sw);\n\
    e.printStackTrace(pw);\nerrorDetails.setDevErrorMessage(sw.toString());\nreturn\
    \ new ResponseEntity(errorDetails, HttpStatus.INTERNAL_SERVER_ERROR);\n}\n}\n\
    ```\n\nYou can handle exceptions globally using the `@ControllerAdvice` class\
    \ with the `@ExceptionHandler` methods, as shown in Listing [11-15](#A447991_1_En_11_Chapter.html#Par160).\n\
    \n```java\n@ControllerAdvice\npublic class GlobalExceptionHandler\n{\n@ExceptionHandler(ServletRequestBindingException.class)\n\
    public ResponseEntity servletRequestBindingException(ServletRequestBindingException\
    \ e) {\nErrorDetails errorDetails = new ErrorDetails();\nerrorDetails.setErrorMessage(e.getMessage());\n\
    errorDetails.setDevErrorMessage(getStackTraceAsString(e));\nreturn new ResponseEntity(errorDetails,\
    \ HttpStatus.BAD_REQUEST);\n}\n@ExceptionHandler(Exception.class)\npublic ResponseEntity\
    \ exception(Exception e) {\nErrorDetails errorDetails = new ErrorDetails();\n\
    errorDetails.setErrorMessage(e.getMessage());\nerrorDetails.setDevErrorMessage(getStackTraceAsString(e));\n\
    return new ResponseEntity(errorDetails, HttpStatus.INTERNAL_SERVER_ERROR);\n}\n\
    private String getStackTraceAsString(Exception e)\n{\nStringWriter sw = new StringWriter();\n\
    PrintWriter pw = new PrintWriter(sw);\ne.printStackTrace(pw);\nreturn sw.toString();\n\
    }\n}\n```\n\nThe global exception handling mechanism helps you handle exceptions\
    \ (like database communication errors and third-party service invocation failures)\
    \ in a central place instead of handling them in each controller class.\n\n###\
    \ Summary\n\nThis chapter discussed how to create REST APIs using SpringMVC and\
    \ Spring Data REST. It also looked at how to handle exceptions at the controller\
    \ level and globally. In the next chapter, you will learn how to build Reactive\
    \ Web Applications using Spring WebFlux.\n\n## 12. Reactive Programming Using\
    \ Spring WebFlux\n\nModern IT business needs have changed significantly compared\
    \ to a few years ago. The amount of data that is being generated from various\
    \ sources like social media sites, IoT devices, sensors, and the like is humongous.\
    \ The traditional data processing models may not be suitable to process such a\
    \ huge volume of data. Even though we have better hardware support these days,\
    \ many of the existing APIs are synchronous and blocking APIs, which become bottlenecks\
    \ to better throughput.\n\nReactive programming is a programming paradigm that\
    \ promotes an asynchronous, non-blocking, event-driven approach to data processing.\
    \ Reactive programming is gaining momentum and many of the programming languages\
    \ provide reactive frameworks and libraries.\n\nIn Java, there are reactive libraries\
    \ like RxJava and Reactor, which supports reactive programming. As interest in\
    \ reactive programming grows in the Java community, a new initiative called reactive\
    \ streams is starting to provide a standard for asynchronous stream processing\
    \ with non-blocking back pressure. Reactive streams support will be part of the\
    \ Java 9 release.\n\nThe Spring framework 5 introduced support for reactive programming\
    \ with the new WebFlux module. Spring Boot 2, which uses Spring 5, also provides\
    \ a starter to quickly create reactive applications using WebFlux. This chapter\
    \ teaches you how to build reactive web applications using Spring WebFlux.\n\n\
    ### Introduction to Reactive Programming\n\nReactive programming involves modeling\
    \ data and events as observable data streams and implementing data processing\
    \ routines to react to the changes in those streams. A group of people put together\
    \ a Reactive Manifesto at [`http://www.reactivemanifesto.org/`](http://www.reactivemanifesto.org/)\
    \ to describe the characteristics of a reactive system.\n\nReactive programming\
    \ is becoming popular and there are already reactive frameworks or libraries for\
    \ many of the popular programming languages.\n\n* Project Reactor—[`https://projectreactor.io/`](https://projectreactor.io/)\n\
    * RxJava—[`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava)\n\
    * Akka Streams—[`http://doc.akka.io/docs/akka/2.5.3/scala/stream/index.html`](http://doc.akka.io/docs/akka/2.5.3/scala/stream/index.html)\n\
    * RxJS—[`https://github.com/ReactiveX/rxjs`](https://github.com/ReactiveX/rxjs)\n\
    * Rx.NET—[`https://github.com/Reactive-Extensions/Rx.NET`](https://github.com/Reactive-Extensions/Rx.NET)\n\
    * RxScala—[`http://reactivex.io/rxscala`](http://reactivex.io/rxscala)\n* RxClojure—[`https://github.com/ReactiveX/RxClojure`](https://github.com/ReactiveX/RxClojure)\n\
    * RxSwift—[`https://github.com/ReactiveX/RxSwift`](https://github.com/ReactiveX/RxSwift)\n\
    \n#### Reactive Streams\n\nReactive streams ([`http://www.reactive-streams.org/`](http://www.reactive-streams.org/))\
    \ is an initiative to provide a standard for asynchronous stream processing with\
    \ non-blocking back pressure. The key components of reactive streams are the `Publisher`\
    \ and `Subscriber`.\n\nA `Publisher` is a provider of an unbounded number of sequenced\
    \ elements, which are published according to the demand received from the subscriber(s).\n\
    \n```java\npublic interface Publisher {\npublic void subscribe(Subscriber s);\n\
    }\n```\n\nA `Subscriber` subscribes to the publisher for callbacks. Publishers\
    \ don't automatically push data to subscribers unless subscribers request the\
    \ data.\n\n```java\npublic interface Subscriber {\npublic void onSubscribe(Subscription\
    \ s);\npublic void onNext(T t);\npublic void onError(Throwable t);\npublic void\
    \ onComplete();\n}\n```\n\nTwo popular implementations of reactive streams are\
    \ RxJava ([`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava))\
    \ and Project Reactor ([`https://projectreactor.io/`](https://projectreactor.io/)).\n\
    \n#### Project Reactor\n\nProject Reactor is an implementation of the reactive\
    \ streams specification with non-blocking and back pressure support. Reactor provides\
    \ two composable reactive types—`Flux` and `Mono`—that implement the publisher\
    \ but also provide a rich set of operators. A `Flux` represents a reactive sequence\
    \ of 0..N items, whereas a `Mono` represents a single value or an empty result.\n\
    \nA `Flux<T>` is a standard `Publisher<T>` representing an asynchronous sequence\
    \ of 0 to N emitted items, optionally terminated by either a success signal or\
    \ an error.\n\nA `Mono<T>` is a specialized `Publisher<T>` that emits at most\
    \ one item and then optionally terminates with an `onComplete` signal or an `onError`.\
    \ A `Mono` can be used to represent no-value asynchronous processes returning\
    \ `Mono<Void>`.\n\nNow you'll see how to create `Mono` and `Flux` types and how\
    \ to consume data from them.\n\n```java\nMono mono = Mono.just(\"Spring\");\n\
    Mono mono = Mono.empty();\nFlux flux = Flux.just(\"Spring\", \"SpringBoot\", \"\
    Reactor\");\nFlux flux = Flux.fromArray(new String[]{\"Spring\", \"SpringBoot\"\
    , \"Reactor\"});\nFlux flux = Flux.fromIterable(Arrays.asList(\"Spring\", \"SpringBoot\"\
    , \"Reactor\"));\n```\n\nUntil you subscribe to the publisher, no data flow will\
    \ happen. You must enable logging and subscribe to the flux.\n\n```java\nFlux\
    \ flux = Flux.just(\"Spring\", \"SpringBoot\", \"Reactor\");\nflux.log().subscribe();\n\
    ```\n\nWhen you run this code it will log the underlying callback method invocations\
    \ as follows:\n\n```\n[main] INFO reactor.Flux.Array.1 - | onSubscribe([Synchronous\
    \ Fuseable] FluxArray.ArraySubscription)\n[main] INFO reactor.Flux.Array.1 - |\
    \ request(unbounded)\n[main] INFO reactor.Flux.Array.1 - | onNext(Spring)\n[main]\
    \ INFO reactor.Flux.Array.1 - | onNext(SpringBoot)\n[main] INFO reactor.Flux.Array.1\
    \ - | onNext(Reactor)\n[main] INFO reactor.Flux.Array.1 - | onComplete()\n```\n\
    \nLooking at the log statements, you can see that when you subscribe to `Publisher`:\n\
    \n* The `onSubscribe()` method is called when you subscribe to `Publisher(Flux)`.\n\
    * When you call `subscribe()` on `Publisher`, a subscription is created. This\
    \ subscription requests data from the publisher. In this example, it defaults\
    \ to unbounded and hence it requests every element available.\n* The `onNext()`\
    \ callback method is called for every element.\n* The `onComplete()` callback\
    \ method is called last after receiving the last element.\n* If an error occurs\
    \ while consuming the next element, then `onError()` callback would have been\
    \ called.\n\n> **Note:** Covering Project Reactor in-depth is out of the scope\
    \ of this book. Refer to the Project Reactor documentation at: [`http://projectreactor.io/docs/core/release/reference/`](http://projectreactor.io/docs/core/release/reference/)\
    \ for more details.\n\nThe Spring WebFlux Reactive framework is built on top of\
    \ Project Reactor, which is an implementation of the reactive streams specification.\n\
    \n### Reactive Web Applications Using Spring WebFlux\n\nSpring framework 5 comes\
    \ with a new module called `spring-webflux` to support building reactive web applications.\
    \ Spring WebFlux by default uses Project Reactor, which is an implementation of\
    \ reactive streams for reactive support. But you can use other reactive streams\
    \ implementations, like RxJava, as well. The `spring-webflux` module provides\
    \ support for creating reactive server applications as well as reactive client\
    \ applications using REST, HTML browsers, and WebSocket style communications.\n\
    \nSpring WebFlux can run on servlet containers with support for Servlet 3.1 non-blocking\
    \ I/O APIs as well as on other async runtimes like Netty and Undertow. See Figure\
    \ [12-1](#A447991_1_En_12_Chapter.html#Fig1).\n\n![A447991_1_En_12_Fig1_HTML.gif](A447991_1_En_12_Fig1_HTML.gif)\n\
    \n**Figure 12-1.** Spring WebFlux runtime support\n\nEach runtime is adapted to\
    \ a reactive `ServerHttpRequest` and `ServerHttpResponse`, thus exposing the body\
    \ of a request and response as `Flux<DataBuffer>` instead of `InputStream` and\
    \ `OutputStream` with reactive back pressure. REST-style JSON and XML serialization\
    \ and deserialization and HTML view rendering is supported on top as a `Flux<Object>`.\n\
    \nYou can develop Reactive web applications using the `spring-webflux` module\
    \ in two ways:\n\n* Using the SpringMVC style annotation based approach with `@Controller\
    \ & @RestController`\n* Using the functional style with routers and handlers\n\
    \n### WebFlux Using the Annotation-Based Programming Model\n\nYou can build reactive\
    \ web applications using the familiar Spring MVC annotations `@Controller` or\
    \ `@RestController`, which also work with WebFlux. When used with WebFlux, the\
    \ underlying framework components like `HandlerMapping` and `HandlerAdapter` are\
    \ non-blocking and operate on the reactive `ServerHttpRequest` and `ServerHttpResponse`\
    \ rather than on `HttpServletRequest` and `HttpServletResponse`.\n\nEven though\
    \ you use WebFlux reactive support at the controller layer, if you use a blocking\
    \ API for data access like JDBC or JPA, your application will not be fully reactive.\
    \ As of now, relational database vendors haven't provided non-blocking driver\
    \ implementations. There are some NoSQL datastores such as MongoDB, Cassandra,\
    \ and Redis that provide reactive drivers.\n\nNow you'll develop a reactive web\
    \ application with Spring WebFlux using the annotation based programming model.\
    \ You are going to use the MongoDB Reactive Stream Driver ([`https://mongodb.github.io/mongo-java-driver-reactivestreams/`](https://mongodb.github.io/mongo-java-driver-reactivestreams/))\
    \ to take full advantage of MongoDB's reactive support.\n\nCreate a Spring Boot\
    \ application with the Reactive web and Reactive Mongo starters.\n\n```xml\n<dependency>\n\
    <groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-webflux</artifactId>\n\
    </dependency>\n<dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-data-mongodb-reactive</artifactId>\n\
    </dependency>\n```\n\nUse the embedded MongoDB server by adding the following\
    \ dependency so that you don't need to install the MongoDB server.\n\n```xml\n\
    <dependency>\n<groupId>de.flapdoodle.embed</groupId>\n<artifactId>de.flapdoodle.embed.mongo</artifactId>\n\
    </dependency>\n```\n\nCreate a `User` POJO that represents a document in MongoDB,\
    \ as shown in Listing [12-1](#A447991_1_En_12_Chapter.html#Par52).\n\n```java\n\
    import org.springframework.data.annotation.Id;\nimport org.springframework.data.mongodb.core.mapping.Document;\n\
    @Document\npublic class User\n{\n@Id\nprivate String id;\nprivate String name;\n\
    private String email;\n//setters and getters\n}\n```\n\nThe Spring Data Mongo\
    \ library provides `ReactiveCrudRepository`, which is similar to `CrudRepository`,\
    \ but with reactive support, which will be interacting with MongoDB Reactive driver\
    \ under-the-hood.\n\nNow create a Spring Data Repository for `User`, as shown\
    \ in Listing [12-2](#A447991_1_En_12_Chapter.html#Par55).\n\n```java\nimport org.springframework.data.repository.reactive.ReactiveCrudRepository;\n\
    public interface UserReactiveRepository extends ReactiveCrudRepository\n{\n}\n\
    ```\n\nThe Spring WebFlux annotation based controllers look very similar to SpringMVC\
    \ controllers except that the input and return types will use the Reactor types\
    \ `Mono` or `Flux`.\n\nNow you can implement the CRUD operations for `User`, as\
    \ shown in Listing [12-3](#A447991_1_En_12_Chapter.html#Par58).\n\n```java\nimport\
    \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.web.bind.annotation.*;\n\
    import reactor.core.publisher.Flux;\nimport reactor.core.publisher.Mono;\n@RestController\n\
    @RequestMapping(\"/api/users\")\npublic class UserController\n{\n@Autowired\n\
    private UserReactiveRepository userReactiveRepository;\n@GetMapping\npublic Flux\
    \ allUsers() {\nreturn userReactiveRepository.findAll();\n}\n@GetMapping(\"/{id}\"\
    )\npublic Mono  getUser(@PathVariable String id) {\nreturn userReactiveRepository.findById(id);\n\
    }\n@PostMapping\npublic Mono saveUser(@RequestBody Mono userMono) {\nreturn userMono.flatMap(user\
    \ -> userReactiveRepository.save(user));\n}\n@DeleteMapping(\"/{id}\")\npublic\
    \ Mono deleteUser(@PathVariable String id) {\nreturn userReactiveRepository.deleteById(id);\n\
    }\n}\n```\n\nThere is nothing new in the `UserController` implementation except\
    \ that you are using Reactor types such as `Mono<User>` to represent a stream\
    \ of a single user object and using `Flux<User>` to represent a stream of one\
    \ or more `User` objects.\n\nOne key point to remember is that, unless someone\
    \ subscribes to the reactive stream pipeline, nothing happens. For example, the\
    \ following method doesn't insert the user document in MongoDB.\n\n```java\n@PostMapping\n\
    public Mono saveUser(@RequestBody Mono userMono) {\nuserMono.flatMap(user -> userReactiveRepository.save(user));\n\
    return Mono.empty();\n}\n```\n\nThis just defined the stream pipeline, but nobody\
    \ subscribed to it, so nothing happens. The following code will insert the user\
    \ document because it is explicitly calling `subscribe()` on the pipeline.\n\n\
    ```java\nuserMono.flatMap(user -> userReactiveRepository.save(user)).subscribe();\n\
    ```\n\nThe `UserController.saveUser()` implementation returns `Mono<User>` so\
    \ that the web response subscribes to the pipeline. Hence, it works as expected.\n\
    \n### WebFlux Using a Functional Programming Model\n\nSpring framework 5 introduced\
    \ a new functional style programming model built on top of the reactive foundation\
    \ in addition to the annotation based programming model.\n\nInstead of using annotations\
    \ to define request handling methods, you can implement `HandlerFunctions` as\
    \ Java 8 lambdas and map the request URL patterns to `HandlerFunctions` using\
    \ `RouterFunctions`.\n\n```java\nHandlerFunction echoHandlerFn =\n( request )\
    \ -> ServerResponse.ok().body(fromObject(request.queryParam(\"name\")));\nRequestPredicate\
    \ predicate = RequestPredicates.GET(\"/echo\");\nRouterFunction routerFunction\
    \ = RouterFunctions.route(predicate, echoHandlerFn);\n```\n\nThis example mapped\
    \ the URL pattern GET `\"/echo\"` to `echoHandlerFn`, which returns the value\
    \ of the request parameter `\"name\"` as the response body. You can write the\
    \ same code block using Java 8 lambdas and static imports in a much more concise\
    \ way, as follows:\n\n```java\nroute(GET(\"/echo\"), request -> ok().body(fromObject(request.queryParam(\"\
    name\"))));\n```\n\nNow you can explore the key components of functional web framework.\n\
    \n#### HandlerFunction\n\nThe `HandlerFunction` is a functional interface that\
    \ takes `ServletRequest` and returns `ServletResponse`.\n\n```java\n@FunctionalInterface\n\
    public interface HandlerFunction\n{\nMono handle(ServerRequest request);\n}\n\
    ```\n\nHere, `ServerRequest` and `ServerResponse` are immutable interfaces built\
    \ on top of Reactor types. You can convert a request body into Reactor's `Mono`\
    \ or `Flux` types and you can send any instance of reactive stream's `Publisher`\
    \ as a response body.\n\n#### ServerRequest\n\nThe `org.springframework.web.reactive.function.server.ServerRequest`\
    \ interface represent a server-side HTTP request. You can retrieve information\
    \ from an input HTTP request from `ServerRequest` using various methods, as follows:\n\
    \n```java\nHttpMethod method = request.method();\nString path = request.path();\n\
    String id = request.pathVariable(\"id\");\nMap pathVariables = request.pathVariables();\n\
    Optional email = request.queryParam(\"email\");\nURI uri = request.uri();\n```\n\
    \nYou can convert a request body into a `Mono` or `Flux` using the `bodyToMono()`\
    \ and `bodyToFlux()` methods.\n\n```java\nMono userMono = request.bodyToMono(User.class);\n\
    Flux usersFlux = request.bodyToFlux(User.class);\n```\n\nThe `bodyToMono()` and\
    \ `bodyToFlux()` methods are actually instances of `BodyExtractor`, which is used\
    \ to extract the request body and deserialize it into an object.\n\nYou can use\
    \ the `BodyExtractors` utility class to extract a request body into a `Mono` or\
    \ `Flux` as follows:\n\n```java\nMono userMono = request.body(BodyExtractors.toMono(User.class));\n\
    Flux userFlux = request.body(BodyExtractors.toFlux(User.class));\n```\n\nYou can\
    \ use `ParameterizedTypeReference` if you want to convert a request body into\
    \ a generic type.\n\n```java\nParameterizedTypeReference>> typeReference = new\
    \ ParameterizedTypeReference>>() {};\nMono>> mapMono = request.body(BodyExtractors.toMono(typeReference));\n\
    ```\n\n#### ServerResponse\n\nThe `org.springframework.web.reactive.function.server.ServerResponse`\
    \ interface represents a server-side HTTP response. The `ServerResponse` is an\
    \ immutable interface and provides many static builder methods to construct the\
    \ response with `status`, `contentType`, `cookies`, `headers`, `body`, etc.\n\n\
    The following are a few examples of how you can construct `ServerResponse` using\
    \ builder methods.\n\n```java\nServerResponse.ok().contentType(APPLICATION_JSON).body(userMono,\
    \ User.class);\nServerResponse.ok().contentType(APPLICATION_JSON).body(BodyInserters.fromObject(user));\n\
    ServerResponse.created(uri).build();\nServerResponse.notFound().build();\n```\n\
    \nYou can also render the view templates using the `render()` method as follows:\n\
    \n```java\nMap modelAttributes = new HashMap();\nmodelAttributes.put(\"user\"\
    ,user);\nServerResponse.ok().render(\"home\", modelAttributes);\n```\n\nSo, essentially\
    \ using these `ServerResponse` builder methods, you can construct the return value\
    \ of the `HandlerFunction.handle(ServerRequest)` method.\n\n#### RouterFunction\n\
    \n`RouterFunction` maps the incoming request to a `HandlerFunction` using `RequestPredicate`.\
    \ You can use the `RouterFunctions` utility class static methods to build the\
    \ `RouterFunction` as follows:\n\n```java\nRouterFunctions.route(GET(\"/echo\"\
    ), request -> ok().body(fromObject(request.queryParam(\"name\"))));\n```\n\nYou\
    \ can compose multiple route definitions into a new route definition that routes\
    \ to the first handler function that matches the predicate.\n\n```java\nimport\
    \ static org.springframework.web.reactive.function.server.RequestPredicates.*;\n\
    RouterFunctions.route(GET(\"/echo\"), request -> ok().body(fromObject(request.queryParam(\"\
    name\"))))\n.and(route(GET(\"/home\"), request -> ok().render(\"home\")))\n.andRoute(POST(\"\
    /users\"), request -> ServerResponse.ok().build());\n```\n\nThis example composes\
    \ three route definitions into one; the incoming request will be handled by the\
    \ first `HandlerFunction` that matches the `RequestPredicate`.\n\nSuppose you\
    \ need to compose multiple routes with the same prefix. Instead of repeating the\
    \ URL path in every route you can use `RouterFunctions.nest()` as follows:\n\n\
    ```java\nRouterFunctions.nest(path(\"/api/users\"),\nnest(accept(APPLICATION_JSON),\n\
    route(GET(\"/{id}\"), request -> ServerResponse.ok().build())\n.andRoute(method(HttpMethod.GET),\
    \ request -> ServerResponse.ok().build())));\n```\n\nThe code maps two URLs to\
    \ their handler functions. One is to `GET /api/users`, which returns all users\
    \ and `GET /api/users/{id}` to return the user details for the given `id`. Instead\
    \ of repeating the common path prefix `/api/users`, it uses `nest()` to compose\
    \ the routes.\n\nYou can create a `RequestPredicate` using the `RequestPredicates`\
    \ static methods and you can also compose request predicates using `RequestPredicate.and(RequestPredicate)`\
    \ and `RequestPredicate.or(RequestPredicate)`.\n\n```java\nRouterFunctions.route(path(\"\
    /api/users\").and(method(HttpMethod.GET)),\nrequest -> ServerResponse.ok().build());\n\
    RouterFunctions.route(GET(\"/api/users\").or(GET(\"/api/users/list\")),\nrequest\
    \ -> ServerResponse.ok().build());\n```\n\n#### HandlerFilterFunction\n\nIf you\
    \ have to compare annotation based approaches to functional approaches, `RouterFunction`\
    \ is similar to the `@RequestMapping` annotation and `HandlerFunction` is similar\
    \ to the method annotated with `@RequestMapping`. The new functional web framework\
    \ also provides `HandlerFilterFunction`, which is similar to the servlet `Filter`\
    \ or `@ControllerAdvice` methods.\n\n```java\n@FunctionalInterface\npublic interface\
    \ HandlerFilterFunction\n{\nMono filter(ServerRequest request, HandlerFunction\
    \ next);\n//other methods\n}\n```\n\nFor example, you can filter a route based\
    \ on a user role using `HandlerFilterFunction` as follows:\n\n```java\nRouterFunction\
    \ route = route(DELETE(\"/api/users/{id}\"), request -> ok().build());\nRouterFunction\
    \ filteredRoute = route.filter((request, next) -> {\nif (hasAdminRole()) {\nreturn\
    \ next.handle(request);\n}\nelse {\nreturn ServerResponse.status(UNAUTHORIZED).build();\n\
    }\n});\nprivate boolean hasAdminRole()\n{\n//logic to check current user has ADMIN\
    \ role or not\n}\n```\n\nWhen you make a request to the `/api/users/{id}` URL,\
    \ the filter checks whether the user has the admin role or not and decides to\
    \ execute the handler function or return an `UNAUTHORIZED` response.\n\n#### Registering\
    \ HandlerFunctions as Method References\n\nInstead of defining the `HandlerFunction`s\
    \ using inline lambdas, it would be better to define them as methods and use method\
    \ references in the route configuration, as shown in Listing [12-4](#A447991_1_En_12_Chapter.html#Par105).\n\
    \n```java\n@Component\nclass EchoHandler\n{\npublic Mono echo(ServerRequest request)\n\
    {\nreturn ServerResponse.ok().body(fromObject(request.queryParam(\"name\")));\n\
    }\n}\n@SpringBootApplication\nclass Applications\n{\n@Autowired\nEchoHandler echoHandler;\n\
    @Bean\npublic RouterFunction echoRouterFunction() {\nreturn RouterFunctions.route(GET(\"\
    /echo\"), echoHandler::echo);\n}\n}\n```\n\nNow you can build the same application\
    \ that you built in an earlier section using the functional programming model.\
    \ You are going to create `UserHandler` with methods to define `HandlerFunction`s\
    \ for various operations and then configure `RouterFunctions` mapping routes to\
    \ handle functions. See Listing [12-5](#A447991_1_En_12_Chapter.html#Par107).\n\
    \n```java\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.http.MediaType;\nimport org.springframework.stereotype.Component;\n\
    import org.springframework.web.reactive.function.server.ServerRequest;\nimport\
    \ org.springframework.web.reactive.function.server.ServerResponse;\nimport reactor.core.publisher.Flux;\n\
    import reactor.core.publisher.Mono;\nimport static org.springframework.web.reactive.function.BodyInserters.fromObject;\n\
    @Component\npublic class UserHandler\n{\nprivate UserReactiveRepository userReactiveRepository;\n\
    @Autowired\npublic UserHandlerFunctions(UserReactiveRepository userReactiveRepository)\
    \ {\nthis.userReactiveRepository = userReactiveRepository;\n}\npublic Mono getAllUsers(ServerRequest\
    \ request)\n{\nFlux allUsers = userReactiveRepository.findAll();\nreturn ServerResponse.ok().contentType(MediaType.APPLICATION_JSON_UTF8)\n\
    .body(allUsers, User.class);\n}\npublic Mono getUserById(ServerRequest request)\n\
    {\nMono userMono = userReactiveRepository.findById(request.pathVariable(\"id\"\
    ));\nMono notFount = ServerResponse.notFound().build();\nreturn userMono.flatMap(user\
    \ -> ServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON_UTF8)\n.body(fromObject(user)))\n\
    .switchIfEmpty(notFount);\n}\npublic Mono saveUser(ServerRequest request)\n{\n\
    Mono userMono = request.bodyToMono(User.class);\nMono mono = userMono.flatMap(user\
    \ -> userReactiveRepository.save(user));\nreturn ServerResponse.ok().body(mono,\
    \ User.class);\n}\npublic Mono deleteUser(ServerRequest request)\n{\nString id\
    \ = request.pathVariable(\"id\");\nreturn ServerResponse.ok().build(userReactiveRepository.deleteById(id));\n\
    }\n}\n```\n\nYou have defined handler functions for CRUD operations as separate\
    \ methods. Now you can configure router functions, as shown in Listing [12-6](#A447991_1_En_12_Chapter.html#Par109).\n\
    \n```java\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.http.HttpMethod;\n\
    import org.springframework.web.reactive.function.server.*;\nimport static org.springframework.http.MediaType.APPLICATION_JSON;\n\
    import static org.springframework.web.reactive.function.BodyInserters.fromObject;\n\
    import static org.springframework.web.reactive.function.server.RequestPredicates.*;\n\
    import static org.springframework.web.reactive.function.server.RouterFunctions.nest;\n\
    import static org.springframework.web.reactive.function.server.RouterFunctions.route;\n\
    import static org.springframework.web.reactive.function.server.ServerResponse.ok;\n\
    @SpringBootApplication\npublic class Application\n{\npublic static void main(String[]\
    \ args) {\nSpringApplication.run(SpringBootWebfluxFunctionalDemoApplication.class,\
    \ args);\n}\n@Autowired\nUserHandler userHandler;\n@Bean\npublic RouterFunction\
    \ routerFunctions() {\nreturn\nnest(path(\"/api/users\"),\nnest(accept(APPLICATION_JSON),\n\
    route(GET(\"/{id}\"), userHandler::getUserById)\n.andRoute(method(HttpMethod.GET),\
    \ userHandler::getAllUsers)\n.andRoute(DELETE(\"/{id}\"), userHandler::deleteUser)\n\
    .andRoute(POST(\"/\"), userHandler::saveUser)));\n}\n}\n```\n\nYou defined the\
    \ router configurations and registered them as a `RouterFunction` bean. You can\
    \ even mix the annotation-based and functional-based programming models in the\
    \ same application.\n\nBy default, `spring-boot-starter-webflux` uses `reactor-netty`\
    \ as the runtime engine. You can exclude `reactor-netty` and use some other server\
    \ that supports reactive non-blocking I/O, such as Undertow, Jetty, or Tomcat\
    \ as well.\n\n> **Note:** For more details on WebFlux autoconfiguration, look\
    \ at the configuration classes in the `org.springframework.boot.autoconfigure.web.reactive`\
    \ package.\n\n### Thymeleaf Reactive Support\n\nThymeleaf provides the `thymeleaf-spring5`\
    \ module to support Spring framework 5 integration. The `thymeleaf-spring5` module\
    \ provides reactive support so that you can use it with Spring WebFlux-based reactive\
    \ applications.\n\nSpring Boot 2 Thymeleaf starter includes the `thymeleaf-spring5`\
    \ library as a dependency and autoconfigures Thymeleaf's reactive support. You\
    \ can check the Thymeleaf reactive autoconfiguration in the configuration class\
    \ `org.springframework.boot.autoconfigure.thymeleaf.ThymeleafAutoConfiguration`.\n\
    \nThe new `thymeleaf-spring5` module provides `SpringWebFluxTemplateEngine`, which\
    \ extends `SpringTemplateEngine` as the default template engine implementation\
    \ used in the Spring WebFlux applications. The `SpringWebFluxTemplateEngine` provides\
    \ three types of processing modes:\n\n* **Full:** Thymeleaf will use FULL mode\
    \ when no limit for max chunk size is specified and no data-driver context variable\
    \ has been specified. All template output will be generated in memory and then\
    \ sent to the server's output channels as a single `DataBuffer`.\n* **Chunked:**\
    \ Thymeleaf will use `CHUNKED` mode when a limit for max chunk size is specified\
    \ but no data-driver context variable has been specified. Template output will\
    \ be generated in chunks equal to or less than the specified limit in bytes and\
    \ then sent to the server's output channels. After each chunk is sent to the output,\
    \ the template engine will wait for the server to request more chunks by means\
    \ of reactive back pressure.\n* **Data-driven:** Thymeleaf will use `DATA-DRIVEN`\
    \ mode when a data-driver variable (data stream wrapped in `IReactiveDataDriverContextVariable`)\
    \ has been added to the context. In this mode, Thymeleaf will stream data from\
    \ the data driver in chunks using back pressure.\n\nListing [12-7](#A447991_1_En_12_Chapter.html#Par120)\
    \ shows how you can get a stream of data (`Flux<T>`) and render it using Thymeleaf\
    \ reactive support.\n\n```java\n@Controller\npublic class UserListController\n\
    {\n@Autowired\nprivate UserReactiveRepository userReactiveRepository;\n@GetMapping(\"\
    /list-users\")\npublic String listUsers(Model model)\n{\nFlux userFlux = this.userReactiveRepository.findAll();\n\
    List userList = userFlux.collectList().block();\nmodel.addAttribute(\"users\"\
    , userList);\nreturn \"users\";\n}\n@GetMapping(\"/list-users-chunked\")\npublic\
    \ String listUsersChunked(Model model)\n{\nFlux userFlux = this.userReactiveRepository.findAll();\n\
    model.addAttribute(\"users\", userFlux);\nreturn \"users\";\n}\n@GetMapping(\"\
    /list-users-reactive\")\npublic String listUsersReactive(Model model)\n{\nFlux\
    \ userFlux = this.userReactiveRepository.findAll();\nmodel.addAttribute(\"users\"\
    , new ReactiveDataDriverContextVariable(userFlux, 1000));\nreturn \"users\";\n\
    }\n}\n```\n\nIn the `listUsers()` method, you are getting data from MongoDB as\
    \ a reactive stream `Flux<User>` and fully resolving the data and then rendering\
    \ the view with a complete set of data available in memory.\n\nIn the `listUsersChunked()`\
    \ method, you are adding `Flux<User>` directly to the model, but you haven't specified\
    \ `responseMaxChunkSizeBytes`, so it will be processed like `FULL` mode. If you\
    \ configure the `spring.thymeleaf.reactive.max-chunk-size=size_in_bytes` property,\
    \ then it will be processed in `CHUNKED` mode.\n\nIn the `listUsersReactive()`\
    \ method, you are getting data from MongoDB as a reactive stream `Flux<User>`\
    \ and wrapping it in `ReactiveDataDriverContextVariable` with a buffer size so\
    \ that Thymeleaf will use the data-driven mode to the render view.\n\n> **Note:**\
    \ In the Thymeleaf data-driven mode, you can add only one multi-valued Publisher\
    \ (flux) to the context.\n\nListing [12-8](#A447991_1_En_12_Chapter.html#Par126)\
    \ shows how you can create the Thymeleaf view template to render users.\n\n```html\n\
    <!DOCTYPE html>\n<html xmlns:th=\"http://www.thymeleaf.org\">\n<head>\n<title>Users</title>\n\
    </head>\n<body>\n<h1>Users</h1>\n<table>\n<thead>\n<tr>\n<th>Name</th>\n<th>Email</th>\n\
    </tr>\n</thead>\n<tbody>\n<tr th:each=\"user : ${users}\">\n<td th:text=\"${user.name}\"\
    >...</td>\n<td th:text=\"${user.email}\">...</td>\n</tr>\n</tbody>\n</table>\n\
    </body>\n</html>\n```\n\nThere is nothing special in this Thymeleaf view to deal\
    \ with reactive streams rendering; behind the scenes Thymeleaf will handle the\
    \ view resolving logic from data streams seamlessly.\n\nYou can implement the\
    \ same endpoints using the web functional framework style `HandlerFunction`s,\
    \ as shown in Listing [12-9](#A447991_1_En_12_Chapter.html#Par129).\n\n```java\n\
    @Component\npublic class UserHandler\n{\n@Autowired\nprivate UserReactiveRepository\
    \ userReactiveRepository;\n...\n...\npublic Mono listUsers(ServerRequest request)\n\
    {\nList userList = userReactiveRepository.findAll().collectList().block();\nMap\
    \ data = new HashMap();\ndata.put(\"users\", userList);\nreturn ServerResponse.ok().contentType(MediaType.TEXT_HTML).render(\"\
    users\", data);\n}\npublic Mono listUsersReactive(ServerRequest request)\n{\n\
    Flux userFlux = userReactiveRepository.findAll();\nReactiveDataDriverContextVariable\
    \ users = new ReactiveDataDriverContextVariable(userFlux, 1000);\nMap data = new\
    \ HashMap();\ndata.put(\"users\", users);\nreturn ServerResponse.ok().contentType(MediaType.TEXT_HTML).render(\"\
    users\", data);\n}\n}\n```\n\nNow you can define routes to map URLs to `HandlerFunction`s,\
    \ as shown in Listing [12-10](#A447991_1_En_12_Chapter.html#Par131).\n\n```java\n\
    @SpringBootApplication\npublic class Application\n{\n@Autowired\nUserHandler userHandler;\n\
    public static void main(String[] args) {\nSpringApplication.run(SpringBootWebfluxFunctionalDemoApplication.class,\
    \ args);\n}\n...\n...\n@Bean\npublic RouterFunction listUsersRouter() {\nreturn\
    \ route(GET(\"/list-users\"), userHandler::listUsers);\n}\n@Bean\npublic RouterFunction\
    \ listUsersReactiveRouter() {\nreturn route(GET(\"/list-users-reactive\"), userHandler::listUsersReactive);\n\
    }\n}\n```\n\nIf you have a large data set in MongoDB and access the endpoints\
    \ `/list-users` and `/list-users-reactive`, you can clearly see that `/list-users-reactive`\
    \ is more responsive.\n\n### Reactive WebClient\n\nSpring provides `RestTemplate`\
    \ to invoke RESTful service endpoints, which support message converters so that\
    \ HTTP requests can be made using Java objects instead of preparing an input request\
    \ body with JSON or XML manually.\n\nSpring WebFlux provides WebClient as a reactive\
    \ alternative to `RestTemplate` that supports non-blocking. Instead of using `InputStream`\
    \ and `OutputStream` for request processing, `WebClient` uses `Flux<DataBuffer>`\
    \ as the request and the response body.\n\nListing [12-11](#A447991_1_En_12_Chapter.html#Par136)\
    \ shows how, as a client, you can make a request to a reactive endpoint.\n\n```java\n\
    WebClient webClient = WebClient.create(\"http://localhost:\"+port);\nList users\
    \ = webClient.get().uri(\"/api/users\")\n.accept(MediaType.APPLICATION_JSON)\n\
    .exchange()\n.flatMap(response -> response.bodyToFlux(User.class).collectList()).block();\n\
    ```\n\nThe `webClient.get().uri(\"/api/users\").exchange()` will return a `Mono<ClientResponse>`\
    \ and `ClientResponse` provides various utility methods, like the `bodyToMono(),bodyToFlux()`\
    \ and `body(BodyExtractor)` methods to extract body content.\n\n### Testing Spring\
    \ WebFlux Applications\n\nThe `spring-test` module provides `WebTestClient`, which\
    \ can be used for testing reactive endpoints. Spring Boot autoconfigures the `WebTestClient`\
    \ so you can autowire `WebTestClient` without having to manually configuring it.\n\
    \nListing [12-12](#A447991_1_En_12_Chapter.html#Par140) shows how to test the\
    \ reactive REST endpoint `GET /api/users` using `WebTestClient`.\n\n```java\n\
    import org.junit.Test;\nimport org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport static org.springframework.http.MediaType.*;\n\
    import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.reactive.server.WebTestClient;\n\
    import java.util.List;\nimport static org.junit.Assert.assertEquals;\nimport static\
    \ org.junit.Assert.assertNotNull;\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment\
    \ = SpringBootTest.WebEnvironment.RANDOM_PORT)\npublic class SpringBootWebfluxFunctionalDemoApplicationTests\n\
    {\n@Autowired\nprivate WebTestClient webTestClient;\n@Test\npublic void getAllUsers()\
    \ {\nwebTestClient.get().uri(\"/api/users\").accept(APPLICATION_JSON).exchange()\n\
    .expectStatus().isOk()\n.expectHeader().contentType(APPLICATION_JSON)\n.expectBodyList(User.class)\n\
    .consumeWith(result -> assertEquals(5, result.getResponseBody().size()));\n}\n\
    }\n```\n\nYou can inject `WebTestClient` and use relative URLs for testing instead\
    \ of providing complete URLs. Once the REST endpoint is invoked, you can assert\
    \ HTTP status and `ContentType` header values and specify the class type that\
    \ response body needs to be converted to.\n\nSimilarly, you can perform other\
    \ operations like `POST`, `DELETE`, etc., as shown in Listing [12-13](#A447991_1_En_12_Chapter.html#Par143).\n\
    \n```java\n@Test\npublic void createUser() {\nUser user = new User(UUID.randomUUID().toString(),\
    \ \"Zinx\", \"zinx@gmail.com\");\nwebTestClient.post().uri(\"/api/users\")\n.body(Mono.just(user),\
    \ User.class)\n.exchange()\n.expectStatus().isOk()\n.expectHeader().contentType(MediaType.APPLICATION_JSON_UTF8)\n\
    .expectBody(User.class)\n.consumeWith(result -> assertThat(result.getResponseBody()).isEqualToComparingFieldByField(user));\n\
    }\n```\n\nThis example performs a `POST` request to `/api/users` to create a new\
    \ `User`. It sends `Mono<User>` as the request body and gets the created `User`\
    \ as the response body.\n\nYou can also perform JSON assertions on the response\
    \ body by using JSON Path library assertions. You can invoke the `GET /api/users/{id}`\
    \ endpoint to retrieve a particular user for the given ID and assert the response\
    \ JSON, as shown in Listing [12-14](#A447991_1_En_12_Chapter.html#Par146).\n\n\
    ```java\n@Test\npublic void getUserById() {\nString id = \"uid1\";\nwebTestClient.get().uri(\"\
    /api/users/\"+id)\n.exchange()\n.expectStatus().isOk()\n.expectBody()\n.jsonPath(\"\
    $.id\").isEqualTo(id)\n.jsonPath(\"$.name\").isEqualTo(\"Admin\")\n.jsonPath(\"\
    $.email\").isEqualTo(\"admin@gmail.com\");\n}\n```\n\nThis example asserts the\
    \ response JSON using `jsonPath()` assertions provided by the JSON Path library.\
    \ For more details on JSON Path, see [`https://github.com/json-path/JsonPath`](https://github.com/json-path/JsonPath).\n\
    \n> **Note:** You will learn more about testing Spring Boot applications in Chapter\
    \ [15](#A447991_1_En_15_Chapter.html).\n\n### Summary\n\nThis chapter showed you\
    \ how to build reactive web applications using the Spring WebFlux framework, which\
    \ is a new module introduced in Spring 5. You built a reactive application using\
    \ the MongoDB reactive stream driver and WebFlux with the annotation-based model\
    \ and the functional style programming model. In the next chapter, you learn how\
    \ to secure traditional web applications and REST APIs using Spring Security.\n\
    \n## 13. Securing Web Applications\n\nSecurity is an important aspect of software\
    \ application design. It ensures that only those who have authority to access\
    \ the secured resources can do so. When it comes to securing an application, two\
    \ primary things you'll need to take care of are authentication and authorization.\
    \ Authentication refers to the process of verifying the user, which is typically\
    \ done by asking for credentials. Authorization refers to the process of verifying\
    \ whether or not the user is allowed to do a certain activity.\n\nSpring Security\
    \ is a powerful and flexible security framework for securing Java-based web applications.\
    \ Even though Spring Security is commonly used with Spring-based applications,\
    \ you can use it to secure non-Spring-based web applications too.\n\nThis chapter\
    \ explains how to use the Spring Boot Security starter to secure SpringMVC-based\
    \ web applications and how to secure service layer components using method-level\
    \ security. The chapter also explores how to configure Spring Security to secure\
    \ the REST API.\n\n### Spring Security in Spring Boot Web Application\n\nSpring\
    \ Security is a framework for securing Java-based applications at various layers\
    \ with great flexibility and customizability. Spring Security provides authentication\
    \ and authorization support against database authentication, LDAP, form authentication,\
    \ JA-SIG central authentication service, Java Authentication and Authorization\
    \ Service (JAAS), and many more. Spring Security provides support for dealing\
    \ with common attacks like CSRF, XSS, and session fixation protection, with minimal\
    \ configuration.\n\nSpring Security can be used to secure the application at various\
    \ layers, such as web URLs, service layer methods, etc. Spring Security from version\
    \ 3.2 onward provides Java configuration support for security. Using Spring Security\
    \ in Spring Boot application became easier with its autoconfiguration features.\n\
    \nAdding the Spring Security Starter (`spring-boot-starter-security`) to an Spring\
    \ Boot application will:\n\n* Enable HTTP basic security\n* Register the `AuthenticationManager`\
    \ bean with an in-memory store and a single user\n* Ignore paths for commonly\
    \ used static resource locations (such as `/css/**`, `/js/**`, `/images/**`, etc.)\n\
    * Enable common low-level features such as XSS, CSRF, caching, etc.\n\nYou'll\
    \ get started by looking at how to secure a Spring Boot application using Spring\
    \ Security. First, create a Spring Boot project with the Web, Thymeleaf, and Spring\
    \ Security starters.\n\n```xml\n<dependency>\n<groupId>org.springframework.boot</groupId>\n\
    <artifactId>spring-boot-starter-web</artifactId>\n</dependency>\n<dependency>\n\
    <groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-thymeleaf</artifactId>\n\
    </dependency>\n<dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-security</artifactId>\n\
    </dependency>\n```\n\nNow if you run the application and access `http://localhost:8080`,\
    \ you will be prompted to enter the user credentials. The default user is `user`\
    \ and the password is auto-generated. You can find it in the console log.\n\n\
    ```\nUsing default security password: 78fa095d-3f4c-48b1-ad50-e24c31d5cf35\n```\n\
    \nYou can change the default user credentials in `application.properties` as follows:\n\
    \n```properties\nsecurity.user.name=admin\nsecurity.user.password=secret\nsecurity.user.role=USER,ADMIN\n\
    ```\n\nOkay, that's nice for a quick demo. But in your actual projects, you may\
    \ want to implement role-based access control using a persistence datastore such\
    \ as a database. Also, you might want to fine-tune the access to resources (URLs,\
    \ service layer methods, etc.) based on roles. Now you'll see how to customize\
    \ the default Spring Security autoconfiguration to meet your needs.\n\nFirst,\
    \ you'll create the database tables shown in Figure [13-1](#A447991_1_En_13_Chapter.html#Fig1)\
    \ to store users and roles.\n\n![A447991_1_En_13_Fig1_HTML.jpg](A447991_1_En_13_Fig1_HTML.jpg)\n\
    \n**Figure 13-1.** Users and roles database tables\n\nYou are going to use the\
    \ Spring Data JPA starter to talk to your database.\n\n```xml\n<dependency>\n\
    <groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-data-jpa</artifactId>\n\
    </dependency>\n<dependency>\n<groupId>com.h2database</groupId>\n<artifactId>h2</artifactId>\n\
    </dependency>\n```\n\nCreate the JPA entities called `users` and `roles`, as shown\
    \ in Listings [13-1](#A447991_1_En_13_Chapter.html#Par22) and [13-2](#A447991_1_En_13_Chapter.html#Par23).\n\
    \n```java\n@Entity\n@Table(name=\"users\")\npublic class User\n{\n@Id @GeneratedValue(strategy=GenerationType.AUTO)\n\
    private Integer id;\n@Column(nullable=false, unique=true)\nprivate String email;\n\
    @Column(nullable=false)\nprivate String password;\n@ManyToMany(cascade=CascadeType.MERGE)\n\
    @JoinTable(\nname=\"user_role\",\njoinColumns={@JoinColumn(name=\"USER_ID\",\n\
    referencedColumnName=\"ID\")},\ninverseJoinColumns={@JoinColumn(name=\"ROLE_ID\"\
    ,\nreferencedColumnName=\"ID\")})\nprivate List roles;\n//setters and getters\n\
    }\n```\n\n```java\n@Entity\n@Table(name=\"roles\")\npublic class Role\n{\n@Id\
    \ @GeneratedValue(strategy=GenerationType.AUTO)\nprivate Integer id;\n@Column(nullable=false,\
    \ unique=true)\nprivate String name;\n@ManyToMany(mappedBy=\"roles\")\nprivate\
    \ List users;\n//setters and getters\n}\n```\n\nNext, create the Spring Data JPA\
    \ repository for the `user` entity, as shown in Listing [13-3](#A447991_1_En_13_Chapter.html#Par25).\n\
    \n```java\npublic interface UserRepository extends JpaRepository\n{\nOptional\
    \ findByEmail(String email);\n}\n```\n\nSpring Security uses the `UserDetailsService`\
    \ interface, which contains the `loadUserByUsername(String username)` method to\
    \ look up `UserDetails` for a given `username`. The `UserDetails` interface represents\
    \ an authenticated user object and Spring Security provides an out-of-the-box\
    \ implementation of `org.springframework.security.core.userdetails.User`.\n\n\
    Now you implement a `UserDetailsService` to get `UserDetails` from database, as\
    \ shown in Listing [13-4](#A447991_1_En_13_Chapter.html#Par28).\n\n```java\n@Service\n\
    @Transactional\npublic class CustomUserDetailsService implements UserDetailsService\n\
    {\n@Autowired\nprivate UserRepository userRepository;\n@Override\npublic UserDetails\
    \ loadUserByUsername(String userName)\nthrows UsernameNotFoundException {\nUser\
    \ user = userRepository.findByEmail(userName)\n.orElseThrow(() -> new UsernameNotFoundException(\"\
    Email \"+userName+\" not found\"));\nreturn new org.springframework.security.core.userdetails.User(\n\
    user.getEmail(),\nuser.getPassword(),\ngetAuthorities(user)\n);\n}\nprivate static\
    \ Collection getAuthorities(User user)\n{\nString[] userRoles = user.getRoles()\n\
    .stream()\n.map((role) -> role.getName())\n.toArray(String[]::new);\nCollection\
    \ authorities = AuthorityUtils.createAuthorityList(userRoles);\nreturn authorities;\n\
    }\n}\n```\n\nSpring Boot implemented the default Spring Security autoconfiguration\
    \ in `SecurityAutoConfiguration`. To switch the default web application security\
    \ configuration and provide your own customized security configuration, you can\
    \ create a configuration class that extends `WebSecurityConfigurerAdapter` and\
    \ is annotated with `@EnableWebSecurity`.\n\nNow you'll create a configuration\
    \ class that extends `WebSecurityConfigurerAdapter` to customize the default Spring\
    \ Security configuration, as shown in Listing [13-5](#A447991_1_En_13_Chapter.html#Par31).\n\
    \n```java\n@Configuration\n@EnableWebSecurity\npublic class WebSecurityConfig\
    \ extends WebSecurityConfigurerAdapter {\n@Autowired\nprivate UserDetailsService\
    \ customUserDetailsService;\n@Bean\npublic PasswordEncoder passwordEncoder() {\n\
    return new BCryptPasswordEncoder();\n}\n@Autowired\npublic void configureGlobal(AuthenticationManagerBuilder\
    \ auth)\nthrows Exception\n{\nauth\n.userDetailsService(customUserDetailsService)\n\
    .passwordEncoder(passwordEncoder());\n}\n@Override\nprotected void configure(HttpSecurity\
    \ http) throws Exception {\nhttp\n.authorizeRequests()\n.antMatchers(\"/resources/\"\
    , \"/webjars/\",\"/assets/\")\n.permitAll()\n.antMatchers(\"/\").permitAll()\n\
    .antMatchers(\"/admin/\").hasRole(\"ADMIN\")\n.anyRequest().authenticated()\n\
    .and()\n.formLogin()\n.loginPage(\"/login\")\n.defaultSuccessUrl(\"/home\")\n\
    .failureUrl(\"/login?error\")\n.permitAll()\n.and()\n.logout()\n.logoutRequestMatcher(new\
    \ AntPathRequestMatcher(\"/logout\"))\n.logoutSuccessUrl(\"/login?logout\")\n\
    .permitAll()\n.and()\n.exceptionHandling()\n.accessDeniedPage(\"/accessDenied\"\
    );\n}\n}\n```\n\nThis example configures `CustomUserDetailsService` and `BCryptPasswordEncoder`\
    \ to be used by `AuthenticationManager` instead of the default in-memory database\
    \ with a single-user with a plaintext password.\n\nThe `configure(HttpSecurity\
    \ http)` method is configured to:\n\n* Ignore the static resource paths `\"/resources/**\"\
    `, `\"/webjars/**\"`, and `\"/assets/**\"`\n* Allow everyone to have access to\
    \ the root URL `\"/\"`\n* Restrict access to URLs that start with `/admin/` to\
    \ only users with the `ADMIN` role\n* All other URLs should be accessible to authenticated\
    \ users only\n\nYou are also configuring custom form-based login parameters and\
    \ making them accessible to everyone. By default, the logout request works only\
    \ with the HTTP `POST` method, so this example configures it to be used with any\
    \ HTTP method, which makes it accessible to everyone.\n\nThe example also configures\
    \ the URL to redirect the users to the `/accessDenied` URL if they try to access\
    \ a resource they don't have access to.\n\nYou are going to use Thymeleaf view\
    \ templates for rendering views. The `thymeleaf-extras-springsecurity4` module\
    \ provides Thymeleaf Spring Security dialect attributes (`sec:authentication`,\
    \ `sec:authorize`, etc.) to conditionally render parts of the view based on authentication\
    \ status, logged-in user roles, etc.\n\nAdd the following dependency to use the\
    \ Thymeleaf Spring Security dialect.\n\n```xml\n<dependency>\n<groupId>org.thymeleaf.extras</groupId>\n\
    <artifactId>thymeleaf-extras-springsecurity4</artifactId>\n</dependency>\n```\n\
    \nNow you need to create a configuration class for providing MVC configuration,\
    \ as shown in Listing [13-6](#A447991_1_En_13_Chapter.html#Par44).\n\n```java\n\
    @Configuration\npublic class WebConfig implements WebMvcConfigurer\n{\n@Override\n\
    public void addViewControllers(ViewControllerRegistry registry)\n{\nregistry.addViewController(\"\
    /login\").setViewName(\"login\");\nregistry.addViewController(\"/home\").setViewName(\"\
    home\");\nregistry.addViewController(\"/admin/home\").setViewName(\"adminhome\"\
    );\nregistry.addViewController(\"/accessDenied\").setViewName(\"403\");\n}\n@Bean\n\
    public SpringSecurityDialect securityDialect() {\nreturn new SpringSecurityDialect();\n\
    }\n}\n```\n\nThis example configures view controllers to specify which view to\
    \ render for which URL. Also, it registers `SpringSecurityDialect` to enable using\
    \ the Thymeleaf Spring Security dialect.\n\nNow that you have all the configuration\
    \ ready, it's time to create views using Thymeleaf.\n\nCreate `src/main/resources/templates/login.html`,\
    \ as shown in Listing [13-7](#A447991_1_En_13_Chapter.html#Par48).\n\n```html\n\
    <!DOCTYPE html>\n<html xmlns:th=\"http://www.thymeleaf.org\">\n<head>\n<title>SpringBoot\
    \ Security</title>\n</head>\n<body>\n<h1>Login</h1>\n<div th:if=\"${param.error}\"\
    >\nInvalid Email and Password.\n</div>\n<form th:action=\"@{/login}\" method=\"\
    post\">\n<label>Email</label>\n<input type=\"text\" name=\"username\"/>\n<label>Password</label>\n\
    <input type=\"password\" name=\"password\"/>\n<button type=\"submit\">LogIn</button>\n\
    </form>\n</body>\n</html>\n```\n\nThis code creates the login form with the `username`\
    \ and `password` fields and renders a login error if there is an `error` request\
    \ parameter. The code configures the login form `failureUrl` to `\"/login?error\"\
    `, so if the users provide incorrect credentials, they will be redirected to the\
    \ `/login?error` URL.\n\nNext, create `src/main/resources/templates/home.html`,\
    \ as shown in Listing [13-8](#A447991_1_En_13_Chapter.html#Par51).\n\n```html\n\
    <!DOCTYPE html>\n<html xmlns:th=\"http://www.thymeleaf.org\"\nxmlns:sec=\"http://www.thymeleaf.org/thymeleaf-extras-springsecurity4\"\
    >\n<head>\n<title>SpringBoot Security</title>\n</head>\n<body>\n<h1>Welcome <span\
    \ sec:authentication=\"principal.username\">User</span></h1>\n<a href=\"/logout\"\
    >Logout</a>\n<div sec:authorize=\"hasRole('ROLE_ADMIN')\">\n<p>You will see this\
    \ only if you are ADMIN</p>\n<a href=\"/admin/home\">Admin Home</a>\n</div>\n\
    </body>\n</html>\n```\n\nThe code configures `\"/home\"` as `defaultSuccessUrl`,\
    \ so after successful authentication, users will be redirected to the `/home`\
    \ URL, which will render the `home.html` view.\n\nIn the `home.html` view, you\
    \ are using `sec:authentication=\"principal.username\"` to display the authenticated\
    \ username. This example also conditionally renders the link to the admin's home\
    \ page only if the authenticated user has the role `ROLE_ADMIN`. This is done\
    \ by using `sec:authorize=\"hasRole('ROLE_ADMIN')\"`.\n\nCreate `src/main/resources/templates/adminhome.html`,\
    \ as shown in Listing [13-9](#A447991_1_En_13_Chapter.html#Par55).\n\n```html\n\
    <!DOCTYPE html>\n<html xmlns:th=\"http://www.thymeleaf.org\"\nxmlns:sec=\"http://www.thymeleaf.org/thymeleaf-extras-springsecurity4\"\
    >\n<head>\n<title>SpringBoot Security</title>\n</head>\n<body>\n<h1>Welcome Administrator(<span\
    \ sec:authentication=\"principal.username\">User</span>)</h1>\n<a href=\"/logout\"\
    >Logout</a>\n</body>\n</html>\n```\n\nNext, create `src/main/resources/templates/403.html`,\
    \ as shown in Listing [13-10](#A447991_1_En_13_Chapter.html#Par57).\n\n```html\n\
    <!DOCTYPE html>\n<html xmlns:th=\"http://www.thymeleaf.org\">\n<head>\n<title>Access\
    \ Denied</title>\n</head>\n<body>\n<h1>Access Denied</h1>\n<p>You are not authorized\
    \ to view this page!!</p>\n</body>\n</html>\n```\n\nIf the logged-in user doesn't\
    \ have the `ROLE_ADMIN` role and tries to access the `/admin/home` URL, then Spring\
    \ Security will throw `AccessDeniedException`. The code then redirects the user\
    \ to the `/accessDenied` URL when `AccessDeniedException` occurs. That's because\
    \ the example maps the `/accessDenied` URL to view the `403.html` file.\n\nInstead\
    \ of configuring `exceptionHandling().accessDeniedPage(\"/accessDenied\")`, you\
    \ can simply configure `exceptionHandling();` which will throw `AccessDeniedException`\
    \ with the HTTP status code `403`. You can then place the `403.html` file in the\
    \ `src/main/resources/public/error/` folder, which will automatically be picked\
    \ up by the Spring Boot error-handling mechanism.\n\nBefore running this application,\
    \ you need to initialize the database with some sample data for `users` and `roles`,\
    \ as shown in Listing [13-11](#A447991_1_En_13_Chapter.html#Par61).\n\n```sql\n\
    delete from  user_role;\ndelete from  roles;\ndelete from  users;\nINSERT INTO\
    \ roles (id, name) VALUES\n(1, 'ROLE_ADMIN'),\n(2, 'ROLE_USER');\nINSERT INTO\
    \ users (id, email, password, name) VALUES\n(1, 'admin@gmail.com', '$2a$10$hKDVYxLefVHV/vtuPhWD3OigtRyOykRLDdUAp80Z1crSoS1lFqaFS',\
    \ 'Admin'),\n(2, 'siva@gmail.com', '$2a$10$UFEPYW7Rx1qZqdHajzOnB.VBR3rvm7OI7uSix4RadfQiNhkZOi2fi',\
    \ 'Siva'),\n(3, 'user@gmail.com', '$2a$10$ByIUiNaRfBKSV6urZoBBxe4UbJ/sS6u1ZaPORHF9AtNWAuVPVz1by',\
    \ 'DemoUser');\ninsert into user_role(user_id, role_id) values\n(1,1),\n(1,2),\n\
    (3,2);\n```\n\nThe passwords are encrypted using the `BCryptPasswordEncoder.encode(plan_tx_password)`\
    \ method.\n\nRun the application and go to `http://localhost:8080/home`. You will\
    \ be redirected to the login page, as you are not yet authenticated. After submitting\
    \ the valid credentials (such as `admin@gmail.com/admin`), you will be redirected\
    \ to the home page. If you have logged in as a user with the `ADMIN` role, you\
    \ should be able to see the text \"You will see this only if you are ADMIN\" and\
    \ a link to Admin Home. If you click on the Admin Home link, you should be able\
    \ to see the Admin Home page.\n\nIf you have logged in as a normal user (`user@gmail.com/user`),\
    \ you will not be able to see \"You will see this only if you are ADMIN\" and\
    \ a link to Admin Home. If you try to access the Admin Home URL by directly entering\
    \ `http://localhost:8080/admin/home`, you will be redirected to the Access Denied\
    \ page (the `403.html` view).\n\n### Implementing the Remember-Me Feature\n\n\
    Spring Security provides the Remember-Me feature so that applications can remember\
    \ the identity of a user between sessions. To use the Remember-Me functionality,\
    \ you just need to send the HTTP parameter `remember-me`.\n\n```html\n<form th:action=\"\
    @{/login}\" method=\"post\">\n<label>Email</label>\n<input type=\"text\" name=\"\
    username\"/>\n<label>Password</label>\n<input type=\"password\" name=\"password\"\
    />\n<label>Remember Me</label>\n<input type=\"checkbox\" name=\"remember-me\"\
    />\n<button type=\"submit\">LogIn</button>\n</form>\n```\n\nSpring Security provides\
    \ the following two implementations of the Remember-Me feature out-of-the-box:\n\
    \n* **Simple hash-based token as a cookie**—This approach creates a token by hashing\
    \ the user identity information and setting it as a cookie on the client browser.\n\
    * **Persistent token**—This approach uses a persistent store like a relational\
    \ database to store the tokens.\n\n#### Simple Hash-Based Token as Cookie\n\n\
    You can enable the Remember-Me feature in the Security configuration which by\
    \ default use hash-based token approach, as shown in Listing [13-12](#A447991_1_En_13_Chapter.html#Par71).\n\
    \n```java\n@Configuration\n@EnableWebSecurity\npublic class WebSecurityConfig\
    \ extends WebSecurityConfigurerAdapter\n{\n...\n...\n@Override\nprotected void\
    \ configure(HttpSecurity http) throws Exception {\nhttp\n.authorizeRequests()\n\
    .antMatchers(\"/resources/**\", \"/webjars/**\",\"/assets/**\").permitAll()\n\
    .antMatchers(\"/\").permitAll()\n.antMatchers(\"/admin/**\").hasRole(\"ADMIN\"\
    )\n.anyRequest().authenticated()\n.and()\n.formLogin()\n.loginPage(\"/login\"\
    )\n.defaultSuccessUrl(\"/home\")\n.failureUrl(\"/login?error\")\n.permitAll()\n\
    .and()\n.logout()\n.logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"\
    ))\n.logoutSuccessUrl(\"/login?logout\")\n.deleteCookies(\"remember-me\")\n.permitAll()\n\
    .and()\n.rememberMe()\n.and()\n.exceptionHandling()\n;\n}\n}\n```\n\nWith this\
    \ configuration, when you log in by selecting the Remember Me checkbox, a cookie\
    \ will be set with `remember-me` and will contain the hash-based token as a value.\
    \ Now if you close and reopen the browser and go to the application, you will\
    \ be automatically authenticated. Also note that the `remember-me` cookie is deleted\
    \ when the user logs out.\n\nThis hash-based token as a cookie approach is implemented\
    \ by Spring Security using `org.springframework.security.web.authentication.rememberme.TokenBasedRememberMeServices`.\n\
    \nThe `remember-me` cookie token value is generated as follows:\n\n```\nbase64(username\
    \ + \":\" + expirationTime + \":\" + md5Hex(username + \":\" + expirationTime\
    \ + \":\" password + \":\" + key))\n```\n\nThe default `expirationTime` is two\
    \ weeks (1209600 seconds) and `key` is a random generated string (`UUID.randomUUID().toString()`).\n\
    \nYou can customize the cookie name, expiration time, and key as follows:\n\n\
    ```java\n.rememberMe()\n.key(\"my-secure-key\")\n.rememberMeCookieName(\"my-remember-me-cookie\"\
    )\n.tokenValiditySeconds(24 * 60 * 60)\n.and()\n```\n\nWith this customization,\
    \ after successful authentication, it will create the `remember-me` cookie with\
    \ the name `my-remember-me-cookie`. It will be valid for one day (24 * 60 * 60\
    \ seconds).\n\n> **Caution:** In this approach, the generated token contains the\
    \ MD5 hashed password and is a potential security vulnerability if the cookie\
    \ is captured.\n\n#### Persistent Tokens\n\nSpring Security provides another implementation\
    \ of the Remember-Me feature, which can be used to store the generated tokens\
    \ in a persistent storage such as a database. The persistent tokens approach is\
    \ implemented using `org.springframework.security.web.authentication.rememberme.PersistentTokenBasedRememberMeServices`,\
    \ which internally uses the `PersistentTokenRepository` interface to store the\
    \ tokens.\n\nSpring provides the following two implementations of `PersistentTokenRepository`\
    \ out-of-the-box.\n\n* `InMemoryTokenRepositoryImpl` can be used to store tokens\
    \ in-memory (not recommended for production use).\n* `JdbcTokenRepositoryImpl`\
    \ can be used to store tokens in a database.\n\nThe `JdbcTokenRepositoryImpl`\
    \ stores the tokens in the `persistent_logins` table. See Listing [13-13](#A447991_1_En_13_Chapter.html#Par86).\n\
    \n```sql\ncreate table persistent_logins\n(\nusername varchar(64) not null,\n\
    series varchar(64) primary key,\ntoken varchar(64) not null,\nlast_used timestamp\
    \ not null\n);\n```\n\nNow you'll see how to configure Remember-Me functionality\
    \ to use a relational database to store the tokens. See Listing [13-14](#A447991_1_En_13_Chapter.html#Par88).\n\
    \n```java\n@Configuration\n@EnableWebSecurity\npublic class WebSecurityConfig\
    \ extends WebSecurityConfigurerAdapter\n{\n@Autowired\nprivate UserDetailsService\
    \ customUserDetailsService;\n@Autowired\nprivate DataSource dataSource;\n...\n\
    ...\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http\n...\n...\n.rememberMe()\n.tokenRepository(persistentTokenRepository())\n\
    .tokenValiditySeconds(24 * 60 * 60)\n.and()\n.exceptionHandling()\n;\n}\nPersistentTokenRepository\
    \ persistentTokenRepository(){\nJdbcTokenRepositoryImpl tokenRepositoryImpl =\
    \ new JdbcTokenRepositoryImpl();\ntokenRepositoryImpl.setDataSource(dataSource);\n\
    return tokenRepositoryImpl;\n}\n}\n```\n\nNow when you successfully log in with\
    \ the Remember-Me checkbox selected, the generated token will be stored in the\
    \ `persistent_logins` table.\n\nThis approach generates a unique series value\
    \ for the user, together with random token data to create a token and set it as\
    \ a cookie. Every time the user then logs in with the cookie, a new random token\
    \ data will be generated, but the series value will be intact for that user.\n\
    \n### Cross-Site Request Forgery\n\nCross-Site Request Forgery (CSRF) is an attack\
    \ that lets users execute unwanted actions on an authenticated web application.\
    \ Suppose you go to the `genuinesite.com` web site and authenticate yourself.\
    \ This may set cookies on your browser, including an authentication token. Now,\
    \ if you open the `malicioussite.com` web site on the same browser but in a different\
    \ tab, you can send a request from `malicioussite.com` to `genuinesite.com` with\
    \ unwanted data. This data will send the request along with the cookies set by\
    \ `genuinesite.com`.\n\nSpring Security provides CSRF protection and is enabled\
    \ by default. Spring Security provides CSRF protection by using `org.springframework.security.web.csrf.CsrfFilter`.\
    \ The `CsrfFilter` will intercept all the requests, ignore the `GET`, `HEAD`,\
    \ `TRACE`, and `OPTIONS` requests, and check whether a valid CSRF token is present\
    \ for all the other requests (such as `POST`, `PUT`, `DELETE`, etc.). If the CSRF\
    \ token is missing or contains an invalid token, then it will throw `AccessDeniedException`.\n\
    \nYou should send the state-changing requests (such as `POST`, `PUT`, `DELETE`,\
    \ etc.) with the CSRF token as a hidden parameter in the request. You can manually\
    \ insert the token as follows:\n\n```html\n<form th:action=\"@{/login}\" method=\"\
    post\">\n<input type=\"hidden\" th:name=\"${_csrf.parameterName}\" th:value=\"\
    ${_csrf.token}\"/>\n...\n</form>\n```\n\nIf you are using Spring Security and\
    \ Thymeleaf, the CSRF token will be automatically included if the `<form>` has\
    \ the `th:action` attribute and `method` is anything other than `GET`, `HEAD`,\
    \ `TRACE`, or `OPTIONS`.\n\nSuppose you have the following Thymeleaf form.\n\n\
    ```html\n<form th:action=\"@{/login}\" method=\"post\">\n...\n</form>\n```\n\n\
    When it is rendered, if you see the page source, you can see the CSRF token inserted\
    \ automatically as a hidden parameter.\n\n> **Note:** If you use the `action`\
    \ attribute instead of setting the `th:action` or `method` value to any of `GET`,\
    \ `HEAD`, `TRACE`, or `OPTIONS`, the CSRF token won't be inserted automatically.\n\
    \nIf you submit the form without a CSRF token or with an invalid CSRF token, then\
    \ `AccessDeniedException` will be thrown with the `403` HTTP status code.\n\n\
    ### Method-Level Security\n\nYou have learned how to secure web applications by\
    \ protecting access to web URLs. But the service-layer methods that are supposed\
    \ to be invoked only by authenticated users are still accessible without restriction\
    \ if users have the Spring bean. You can use Spring not only for developing web\
    \ applications but also for batch-processing applications, integration servers,\
    \ etc., which doesn't provide a web interface. So, you may need to secure the\
    \ methods access based on roles and permissions.\n\nSpring Security provides method-level\
    \ security using the `@Secured` annotation. It also supports the JSR-250 security\
    \ annotation `@RolesAllowed`. From version 3.0, Spring Security has provided an\
    \ expression-based security configuration using the `@PreAuthorize` and `@PostAuthorize`\
    \ annotations, which provides more fine-grained control.\n\nYou can enable method-level\
    \ security using the `@EnableGlobalMethodSecurity` annotation on any configuration\
    \ class, as follows:\n\n* `secureEnabled`: Defines whether `@Secured` is enabled.\n\
    * `prePostEnabled`: Defines whether the pre/post annotations `@PreAuthorize` and\
    \ `@PostAuthorize` are enabled.\n* `jsr250Enabled`: Defines whether the JSR-250\
    \ annotation `@RolesAllowed` is enabled.\n\n```java\n@Configuration\n@EnableWebSecurity\n\
    @EnableGlobalMethodSecurity(securedEnabled = true,\nprePostEnabled=true,\njsr250Enabled=true)\n\
    public class WebSecurityConfig extends WebSecurityConfigurerAdapter\n{\n...\n\
    ...\n}\n```\n\nOnce you enable method-level security, you can annotate the SpringMVC\
    \ controller request-handling methods, service-layer methods, or any Spring components\
    \ with `@Secured`, `@PreAuthorize`, or `@RolesAllowed` in order to define your\
    \ security restrictions. See Listing [13-15](#A447991_1_En_13_Chapter.html#Par110).\n\
    \n```java\n@RestController\npublic class AdminRestController\n{\n@Autowired\n\
    private UserService userService;\n@PreAuthorize(\"hasRole('ADMIN') OR hasRole('USER')\"\
    )\n@PutMapping(\"/admin/users/{id}\")\npublic User updateUser(@RequestBody User\
    \ user)\n{\nuserService.updateUser(user);\nreturn user;\n}\n@Secured(\"ROLE_ADMIN\"\
    )\n@DeleteMapping(\"/admin/users/{id}\")\npublic void deleteUser(@PathVariable(\"\
    id\") Integer userId)\n{\nuserService.deleteUser(userId);\n}\n}\n```\n\nSimilarly,\
    \ you can secure service-layer methods using the `@Secured`, `@PreAuthorize`,\
    \ or `@RolesAllowed` annotations.\n\n```java\n@Service\n@Transactional\npublic\
    \ class UserService\n{\n@PreAuthorize(\"hasRole('ADMIN')\")\npublic void deleteUser(Integer\
    \ userId)\n{\n....\n}\n}\n```\n\nYou can use the `@Secured`, `@PreAuthorize`,\
    \ or `@RolesAllowed` annotations at the class level as well, which applies security\
    \ configuration to all the methods in that class.\n\nYou can use the Spring Expression\
    \ Language (SpEL) to define the security expressions as follows:\n\n* `hasRole(role)`:\
    \ Returns true if the current user has the specified role.\n* `hasAnyRole(role1,role2)`:\
    \ Returns true if the current user has any of the supplied roles.\n* `isAnonymous()`:\
    \ Returns true if the current user is an anonymous user.\n* `isAuthenticated()`:\
    \ Returns true if the user is not anonymous.\n* `isFullyAuthenticated()`: Returns\
    \ true if the user is not an anonymous or Remember-Me user.\n\nYou can combine\
    \ these expressions using the logical operators `AND`, `OR`, and `NOT`(`!`).\n\
    \n```java\n@PreAuthorize(\"hasRole('ADMIN') OR hasRole('USER')\")\n@PreAuthorize(\"\
    isFullyAuthenticated() AND hasRole('ADMIN')\")\n@PreAuthorize(\"!isAnonymous()\"\
    )\n```\n\nAlthough defining security restrictions using `@Secured` and `@PreAuthorize`\
    \ looks similar, there are some minor differences to be noted.\n\nThe `@Secured(\"\
    ROLE_ADMIN\")` annotation is the same as `@PreAuthorize(\"hasRole('ROLE_ADMIN')\"\
    )`. The `@Secured({\"ROLE_USER\", \"ROLE_ADMIN\")` is considered as `ROLE_USER\
    \ OR ROLE_ADMIN`, so you cannot express the `AND` condition using `@Secured`.\
    \ You can define the same with `@PreAuthorize(\"hasRole('ADMIN') OR hasRole('USER')\"\
    )`, which is easier to understand. You can express `AND`, `OR`, or `NOT`(`!`)\
    \ as well.\n\n```java\n@PreAuthorize(\"!isAnonymous() AND hasRole('ADMIN')\")\n\
    ```\n\n> **Note:** The `@PreAuthorize` annotation is more powerful compared to\
    \ `@Secured/@RolesAllowed`, so it's better to use `@PreAuthorize`.\n\n### Securing\
    \ the REST API Using Spring Security\n\nIn the previous section, you learned how\
    \ to secure a traditional web application using Spring Security. The default behavior\
    \ of some of the Spring Security components is suitable to web applications. To\
    \ secure a REST API, however, you need to customize the components behavior to\
    \ better suit the REST semantics. Follow these steps to do so:\n\n1. Set up `AuthenticationEntryPoint`.\n\
    \n   By default, when a user tries to access a secured resource without logging\
    \ in, Spring Security's `AuthenticationEntryPoint` redirects the user to the login\
    \ URL. However, for the REST API, it would make more sense to return the HTTP\
    \ status code `401` (`SC_UNAUTHORIZED`) when an unauthorized user tries to access\
    \ secured resource.\n\n   Spring Security provides several implementations of\
    \ `AuthenticationEntryPoint` out-of-the-box. Among them, `org.springframework.boot.autoconfigure.security.Http401AuthenticationEntryPoint`\
    \ provides the exact behavior you want—return the HTTP status code `401 SC_UNAUTHORIZED`.\
    \ See Listing [13-16](#A447991_1_En_13_Chapter.html#Par130).\n\n   ```java\n \
    \  public class Http401AuthenticationEntryPoint\n   implements AuthenticationEntryPoint\n\
    \   {\n   private final String headerValue;\n   public Http401AuthenticationEntryPoint(String\
    \ headerValue) {\n   this.headerValue = headerValue;\n   }\n   @Override\n   public\
    \ void commence(HttpServletRequest request,\n   HttpServletResponse response,\n\
    \   AuthenticationException authException)\n   throws IOException, ServletException\n\
    \   {\n   response.setHeader(\"WWW-Authenticate\", this.headerValue);\n   response.sendError(HttpServletResponse.SC_UNAUTHORIZED,\n\
    \   authException.getMessage());\n   }\n   }\n   ```\n\n2. Set up `AuthenticationSuccessHandler`.\n\
    \n   By default, Spring Security uses `SavedRequestAwareAuthenticationSuccessHandler`,\
    \ which implements `AuthenticationSuccessHandler` to redirect the user to `redirectUrl`\
    \ with the `301 MOVED PERMANENTLY` HTTP status code. But for REST APIs, it would\
    \ make sense to return the status code `200 OK`, along with the authenticated\
    \ user details as the response body for a successful authentication.\n\n   Listing\
    \ [13-17](#A447991_1_En_13_Chapter.html#Par134) shows how to implement a custom\
    \ `AuthenticationSuccessHandler` as a Spring bean so that you can take advantage\
    \ of `HttpMessageConverters` to send `User` details as the response body.\n\n\
    \   ```java\n   @Component\n   public class RestAuthenticationSuccessHandler\n\
    \   extends SavedRequestAwareAuthenticationSuccessHandler\n   {\n   private final\
    \ ObjectMapper mapper;\n   @Autowired\n   public RestAuthenticationSuccessHandler\n\
    \   (MappingJackson2HttpMessageConverter messageConverter) {\n   this.mapper =\
    \ messageConverter.getObjectMapper();\n   }\n   @Override\n   public void onAuthenticationSuccess(HttpServletRequest\
    \ request,\n   HttpServletResponse response,\n   Authentication authentication)\n\
    \   throws IOException, ServletException\n   {\n   response.setStatus(HttpServletResponse.SC_OK);\n\
    \   UserDetails userDetails = (UserDetails) authentication.getPrincipal();\n \
    \  PrintWriter writer = response.getWriter();\n   mapper.writeValue(writer, userDetails);\n\
    \   writer.flush();\n   writer.close();\n   }\n   }\n   ```\n\n3. Set up `AuthenticationFailureHandler`.\n\
    \n   Spring Security provides `SimpleUrlAuthenticationFailureHandler`, which implements\
    \ `AuthenticationFailureHandler` to redirect to `defaultFailureUrl` if `defaultFailureUrl`\
    \ is not null. If `defaultFailureUrl` is null, then it will simply return the\
    \ HTTP status code `401 SC_UNAUTHORIZED`. See Listing [13-18](#A447991_1_En_13_Chapter.html#Par137).\n\
    \n   ```java\n   public class SimpleUrlAuthenticationFailureHandler implements\n\
    \   AuthenticationFailureHandler {\n   protected final Log logger = LogFactory.getLog(getClass());\n\
    \   private String defaultFailureUrl;\n   ....\n   ....\n   public SimpleUrlAuthenticationFailureHandler()\
    \ {\n   }\n   public SimpleUrlAuthenticationFailureHandler(String defaultFailureUrl)\
    \ {\n   setDefaultFailureUrl(defaultFailureUrl);\n   }\n   public void onAuthenticationFailure(HttpServletRequest\
    \ request,\n   HttpServletResponse response, AuthenticationException exception)\n\
    \   throws IOException, ServletException {\n   if (defaultFailureUrl == null)\
    \ {\n   logger.debug(\"No failure URL set, sending 401 Unauthorized error\");\n\
    \   response.sendError(HttpServletResponse.SC_UNAUTHORIZED,\n   \"Authentication\
    \ Failed: \" + exception.getMessage());\n   }\n   else {\n   ....\n   ....\n \
    \  }\n   }\n   ...\n   ...\n   }\n   ```\n\n   So, you can use `SimpleUrlAuthenticationFailureHandler`\
    \ without setting the `defaultFailureUrl` value, which will be suitable for the\
    \ REST API.\n\n4. Set up `LogoutSuccessHandler`.\n\nWhen a user logs out of Spring\
    \ Security, it uses `SimpleUrlLogoutSuccessHandler`, which implements `LogoutSuccessHandler`\
    \ to redirect the user to a default target URL. For the REST API, you should return\
    \ the HTTP status code `200 OK`, similar to `AuthenticationSuccessHandler`.\n\n\
    Spring Security provides `HttpStatusReturningLogoutSuccessHandler`, which you\
    \ can use to simply return the HTTP status code `200`, as shown in Listing [13-19](#A447991_1_En_13_Chapter.html#Par142).\n\
    \n```java\npublic class HttpStatusReturningLogoutSuccessHandler\nimplements LogoutSuccessHandler\n\
    {\nprivate final HttpStatus httpStatusToReturn;\n....\n....\npublic HttpStatusReturningLogoutSuccessHandler()\
    \ {\nthis.httpStatusToReturn = HttpStatus.OK;\n}\npublic void onLogoutSuccess(HttpServletRequest\
    \ request,\nHttpServletResponse response,\nAuthentication authentication)\nthrows\
    \ IOException, ServletException\n{\nresponse.setStatus(httpStatusToReturn.value());\n\
    response.getWriter().flush();\n}\n}\n```\n\nYou now have all the Spring Security\
    \ customizations in place for securing the REST API. It's time to hook them up\
    \ with the Spring Security configuration. See Listing [13-20](#A447991_1_En_13_Chapter.html#Par144).\n\
    \n```java\n@Configuration\n@EnableWebSecurity\n@EnableGlobalMethodSecurity(securedEnabled\
    \ = true)\npublic class WebSecurityConfig extends WebSecurityConfigurerAdapter\
    \ {\n@Autowired\nprivate UserDetailsService customUserDetailsService;\n@Autowired\n\
    private RestAuthenticationSuccessHandler authenticationSuccessHandler;\n@Bean\n\
    public PasswordEncoder passwordEncoder() {\nreturn new BCryptPasswordEncoder();\n\
    }\n@Autowired\npublic void configureGlobal(AuthenticationManagerBuilder auth)\n\
    throws Exception\n{\nauth.userDetailsService(customUserDetailsService)\n.passwordEncoder(passwordEncoder());\n\
    }\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http\n.csrf().disable()\n.authorizeRequests()\n.antMatchers(\"/\",\"/register\"\
    ,\"/forgotPassword\").permitAll()\n.antMatchers(\"/admin/\").hasRole(\"ADMIN\"\
    )\n.and()\n.exceptionHandling()\n.authenticationEntryPoint(\nnew Http401AuthenticationEntryPoint(\"\
    Basic realm=\\\"MyApp\\\"\"))\n.and()\n.formLogin()\n.permitAll()\n.loginProcessingUrl(\"\
    /login\")\n.successHandler(authenticationSuccessHandler)\n.failureHandler(new\
    \ SimpleUrlAuthenticationFailureHandler())\n.and()\n.logout()\n.permitAll()\n\
    .logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"))\n.logoutSuccessHandler(\n\
    new HttpStatusReturningLogoutSuccessHandler())\n;\n}\n}\n```\n\nYou have the complete\
    \ configuration in place to secure the REST API. Now, before making a request\
    \ to a secured resource, the client needs to be authenticated. Otherwise, the\
    \ `401 UNAUTHORIZED` response code will be returned. In this example, you'll use\
    \ Postman REST client ([`https://www.getpostman.com/`](https://www.getpostman.com/))\
    \ to verify that the REST API is secured.\n\nIf you open the Postman client and\
    \ send a `GET` request to `http://localhost:8080/api/posts`, you will see the\
    \ following response, as you are not yet authenticated.\n\n```json\n{\n\"timestamp\"\
    : 1496547074713,\n\"status\": 401,\n\"error\": \"Unauthorized\",\n\"message\"\
    : \"Full authentication is required to access this resource\",\n\"path\": \"/api/posts\"\
    \n}\n```\n\nNow send a `POST` request to `http://localhost:8080/login` with `form-data`\
    \ set to the `username` and `password` values. This will produce the following\
    \ response:\n\n```json\n{\n\"password\":null,\n\"username\":\"admin@gmail.com\"\
    ,\n\"authorities\":[\n{\"authority\":\"ROLE_ADMIN\"},\n{\"authority\":\"ROLE_USER\"\
    }\n],\n\"accountNonExpired\":true,\n\"accountNonLocked\":true,\n\"credentialsNonExpired\"\
    :true,\n\"enabled\":true,\n\"name\":\"admin@gmail.com\"\n}\n```\n\nNow that you\
    \ have been authenticated, send a `GET` request to `http://localhost:8080/api/posts`\
    \ again. You should be successful.\n\n### Summary\n\nThis chapter explored how\
    \ to secure traditional web applications built with SpringMVC and Thymeleaf by\
    \ using the Spring Security starter. You also learned how to secure the REST API\
    \ built with Spring Boot by customizing Spring Security. The next chapter looks\
    \ at the Spring Boot Actuator.\n\n## 14. Spring Boot Actuator\n\nSpring Boot is\
    \ an opinionated framework that autoconfigures various application components\
    \ based on several criteria, like the starters you used, the properties configuration,\
    \ and the active environment profile(s).\n\n* Is there a way to know which components\
    \ (which Spring beans) are automatically registered by Spring Boot?\n* Is it possible\
    \ to check all the configuration parameters applied for the current running application?\n\
    * Can you determine which request URL will be handled by which controller?\n*\
    \ Can you get metrics on the application, such as memory usage, thread allocation,\
    \ etc.?\n\nThe answer to all these questions is yes. You can perform all these\
    \ activities with the Spring Boot Actuator.\n\nThis chapter introduces the Spring\
    \ Boot Actuator and explores the various actuator endpoints that provide lots\
    \ of useful information about running Spring Boot applications. You will also\
    \ learn how to secure actuator endpoints, enable CORS for actuator endpoints,\
    \ and implement custom health checks and metrics. Finally, the chapter looks into\
    \ using JMX to monitor your application using JConsole.\n\n### Introducing the\
    \ Spring Boot Actuator\n\nThe Spring Boot Actuator module provides production-ready\
    \ features such as monitoring, metrics, health checks, etc. The Spring Boot Actuator\
    \ enables you to monitor the application using HTTP endpoints and JMX.\n\nSpring\
    \ Boot provides `spring-boot-starter-actuator` to autoconfigure Actuator. You\
    \ can take advantage of Actuator's features in order to monitor a Spring Boot\
    \ application, as you'll see in this section.\n\nFirst, create a Spring Boot application\
    \ with the Web, Data-JPA, and Actuator starters.\n\n```xml\n<dependency>\n<groupId>org.springframework.boot</groupId>\n\
    <artifactId>spring-boot-starter-web</artifactId>\n</dependency>\n<dependency>\n\
    <groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-data-jpa</artifactId>\n\
    </dependency>\n<dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-actuator</artifactId>\n\
    </dependency>\n<dependency>\n<groupId>com.h2database</groupId>\n<artifactId>h2</artifactId>\n\
    </dependency>\n```\n\nRun the entry point class `SpringbootActuatorDemoApplication`.\n\
    \n```java\n@SpringBootApplication\npublic class SpringbootActuatorDemoApplication\n\
    {\npublic static void main(String[] args)\n{\nSpringApplication.run(SpringbootActuatorDemoApplication.class,\
    \ args);\n}\n}\n```\n\nYou can see the console output displaying the request mapping\
    \ provided by the Spring Boot Actuator.\n\n```\n... EndpointHandlerMapping   \
    \  : Mapped \"{[/application/health || /application/health.json],methods=[GET],....\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers/{name:.*}],methods=[POST],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers || /application/loggers.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/auditevents || /application/auditevents.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/dump || /application/dump.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/env/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/env || /application/env.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/beans || /application/beans.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application || /application.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/trace || /application/trace.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/metrics/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/metrics || /application/metrics.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/info || /application/info.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/logfile || /application/logfile.json],methods=[GET\
    \ || HEAD]}\" ...\n... EndpointHandlerMapping     : Mapped \"{[/application/autoconfig\
    \ || /application/autoconfig.json],methods=[GET],...\n... EndpointHandlerMapping\
    \     : Mapped \"{[/application/docs],produces=[text/html]}\" ...\n... EndpointHandlerMapping\
    \     : Mapped \"{[/application/docs/],produces=[text/html]}\" ...\n... EndpointHandlerMapping\
    \     : Mapped \"{[/application/heapdump || /application/heapdump.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/mappings || /application/mappings.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/configprops || /application/configprops.json],methods=[GET],...\n\
    ```\n\nThere are lots of endpoints that are automatically added by the Spring\
    \ Boot Actuator. The next section explores various Actuator endpoints in detail.\n\
    \n### Exploring Actuator's Endpoints\n\nThe Actuator endpoints listed in Table\
    \ [14-1](#A447991_1_En_14_Chapter.html#Tab1) are autoconfigured by the Actuator\
    \ starter with the default settings.\n\n**Table 14-1.** Spring Boot Actuator Endpoints\n\
    \n| ID | Description | Sensitive Default |\n|---|---|---|\n| `info` | Displays\
    \ arbitrary application info. | `false` |\n| `health` | Shows application basic\
    \ health info for unauthenticated users and full details for authenticated users.\
    \ | `false` |\n| `beans` | Shows a list of all Spring beans configured in the\
    \ application. | `true` |\n| `autoconfig` | Displays an autoconfiguration report\
    \ showing all autoconfiguration candidates and the reason they were/were not applied.\
    \ | `true` |\n| `mappings` | Displays a collated list of all `@RequestMapping`\
    \ paths. | `true` |\n| `configprops` | Displays a collated list of all `@ConfigurationProperties`.\
    \ | `true` |\n| `metrics` | Shows metrics information for the current application.\
    \ | `true` |\n| `env` | Exposes properties from Spring's `ConfigurableEnvironment`.\
    \ | `true` |\n| `trace` | Displays trace information (by default, the last 100\
    \ HTTP requests). | `true` |\n| `dump` | Performs a thread dump. | `true` |\n\
    | `loggers` | Shows and modifies the configuration of loggers in the application.\
    \ | `true` |\n| `auditevents` | Exposes audit events information for the current\
    \ application. | `true` |\n| `flyway` | Shows any Flyway database migrations that\
    \ have been applied. | `true` |\n| `liquibase` | Shows any Liquibase database\
    \ migrations that have been applied. | `true` |\n| `actuator` | Provides a hypermedia-based\
    \ \"discovery page\" for the other endpoints. Requires Spring `HATEOAS` to be\
    \ on the classpath. | `true` |\n| `shutdown` | Allows the application to be gracefully\
    \ shut down (not enabled by default). | `true` |\n\nTable [14-2](#A447991_1_En_14_Chapter.html#Tab2)\
    \ lists the additional Actuator endpoints that are available based on certain\
    \ conditions.\n\n**Table 14-2.** Additional Spring Boot Actuator Endpoints for\
    \ SpringMVC Applications\n\n| ID | Description | Sensitive Default |\n|---|---|---|\n\
    | `docs` | Displays documentation, including example requests and responses, for\
    \ the Actuator's endpoints. Requires `spring-boot-actuator-docs` to be on the\
    \ classpath. | `false` |\n| `heapdump` | Returns a GZip-compressed `hprof` heap\
    \ dump file. | `true` |\n| `jolokia` | Exposes JMX beans over HTTP (when `Jolokia`\
    \ is on the classpath). | `true` |\n| `logfile` | Returns the contents of the\
    \ logfile (if the `logging.file` or `logging.path` properties have been set).\
    \ | `true` |\n\nThe sensitive actuator endpoints can be accessed by authenticated\
    \ users only. You will learn how to configure security for endpoints in later\
    \ sections, so for now you can disable security for actuator endpoints by setting\
    \ the following property.\n\n```properties\nmanagement.security.enabled=false\n\
    ```\n\nBy default actuator endpoints run on the same HTTP port (`server.port`)\
    \ with `/application` as the base path prefix.\n\nIn this section, you will explore\
    \ several commonly used Actuator endpoints.\n\n#### The /info Endpoint\n\nIf you\
    \ added any information about the application in the `application.properties`\
    \ file using the `info.app.*` properties, as shown in Figure [14-1](#A447991_1_En_14_Chapter.html#Fig1),\
    \ then you can view it at the `http://localhost:8080/application/info` endpoint.\n\
    \n![A447991_1_En_14_Fig1_HTML.jpg](A447991_1_En_14_Fig1_HTML.jpg)\n\n**Figure\
    \ 14-1.** Spring Boot Actuator /info endpoint\n\n```properties\ninfo.app.name=Beginning\
    \ Spring Boot 2\ninfo.app.description=This is a SpringBoot Demo app\ninfo.app.version=1.0.0\n\
    ```\n\n#### The /health Endpoint\n\nThe `/health` endpoint shows the health of\
    \ the application, including the disk space, databases, etc. Go to `http://localhost:8080/application/health`\
    \ to check the health of the application, as shown in Figure [14-2](#A447991_1_En_14_Chapter.html#Fig2).\n\
    \n![A447991_1_En_14_Fig2_HTML.jpg](A447991_1_En_14_Fig2_HTML.jpg)\n\n**Figure\
    \ 14-2.** Spring Boot Actuator /health endpoint\n\nBy default, the `/health` endpoint\
    \ shows only whether the application is `UP` or `DOWN` for unauthorized users.\
    \ If the user is authorized or management security is disabled, the `/health`\
    \ endpoint shows additional information, such as disk space, databases, health,\
    \ etc.\n\n#### The /beans Endpoint\n\nThe `/beans` endpoint shows all the beans\
    \ registered in your application, including the beans you explicitly configured\
    \ and the beans autoconfigured by Spring Boot.\n\nPoint your browser to `http://localhost:8080/application/beans`.\
    \ You should be able to see output similar to what's shown in Figure [14-3](#A447991_1_En_14_Chapter.html#Fig3).\n\
    \n![A447991_1_En_14_Fig3_HTML.jpg](A447991_1_En_14_Fig3_HTML.jpg)\n\n**Figure\
    \ 14-3.** Spring Boot Actuator /beans endpoint\n\n#### The /autoconfig Endpoint\n\
    \nThe `/autoconfig` endpoint shows the autoconfiguration report, which is categorized\
    \ into `positiveMatches` and `negativeMatches`.\n\nIf you go to `http://localhost:8080/application/autoconfig`,\
    \ you should see an autoconfiguration report similar to the one in Figure [14-4](#A447991_1_En_14_Chapter.html#Fig4).\n\
    \n![A447991_1_En_14_Fig4_HTML.jpg](A447991_1_En_14_Fig4_HTML.jpg)\n\n**Figure\
    \ 14-4.** Spring Boot Actuator /autoconfig endpoint\n\nThe elements in `positiveMatches`\
    \ are the conditions matched by various `@Conditional` components.\n\nFor example:\n\
    \n```\nDataSourceAutoConfiguration: [\n{\ncondition: \"OnClassCondition\",\nmessage:\
    \ \"@ConditionalOnClass classes found: javax.sql.DataSource,org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType\"\
    \n}\n]\n```\n\nSince this example added the `data-jpa` starter and `H2` driver,\
    \ the classes `javax.sql.DataSource` and `org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType`\
    \ are found in the classpath and hence `DataSourceAutoConfiguration` becomes a\
    \ positive match.\n\nThe elements in `negativeMatches` are the conditions not\
    \ matched by various `@Conditional` components.\n\nFor example:\n\n```\nJooqAutoConfiguration:\
    \ [\n{\ncondition: \"OnClassCondition\",\nmessage: \"required @ConditionalOnClass\
    \ classes not found: org.jooq.DSLContext\"\n}\n]\n```\n\nAs there aren't JOOQ\
    \ libraries on the application classpath, `@ConditionalOnClass` could not find\
    \ the `org.jooq.DSLContext` class and hence `JooqAutoConfiguration` became a negative\
    \ match.\n\n#### The /mappings Endpoint\n\nThe `/mappings` endpoint shows all\
    \ the `@RequestMapping` paths declared in the application. This is very helpful\
    \ for checking which request path will be handled by which controller method.\n\
    \nIf you go to `http://localhost:8080/application/mappings`, you should see all\
    \ the mappings shown in Figure [14-5](#A447991_1_En_14_Chapter.html#Fig5).\n\n\
    ![A447991_1_En_14_Fig5_HTML.jpg](A447991_1_En_14_Fig5_HTML.jpg)\n\n**Figure 14-5.**\
    \ Spring Boot Actuator /mappings endpoint\n\n#### The /configprops Endpoint\n\n\
    The `/configprops` shows all the configuration properties defined by the `@ConfigurationProperties`\
    \ beans, including your own configuration properties defined in the `application.properties`\
    \ or YAML files.\n\nIf you go to `http://localhost:8080/application/configprops`,\
    \ you should see all the configuration properties, as shown in Figure [14-6](#A447991_1_En_14_Chapter.html#Fig6).\n\
    \n![A447991_1_En_14_Fig6_HTML.jpg](A447991_1_En_14_Fig6_HTML.jpg)\n\n**Figure\
    \ 14-6.** Spring Boot Actuator /configprops endpoint\n\n#### The /metrics Endpoint\n\
    \nThe `/metrics` endpoint shows various metrics about the current application,\
    \ such as how much memory it is using, how much memory is free, the size of the\
    \ heap being used, the number of threads used, and so on.\n\nIf you go to `http://localhost:8080/application/metrics`,\
    \ you should see all the configuration properties shown in Figure [14-7](#A447991_1_En_14_Chapter.html#Fig7).\n\
    \n![A447991_1_En_14_Fig7_HTML.jpg](A447991_1_En_14_Fig7_HTML.jpg)\n\n**Figure\
    \ 14-7.** Spring Boot Actuator /metrics endpoint\n\n#### The /env Endpoint\n\n\
    The `/env` endpoint will expose all the properties from the Spring's `ConfigurableEnvironment`\
    \ interface, such as a list of active profiles, application properties, system\
    \ environment variables, and so on.\n\nIf you go to `http://localhost:8080/application/env`,\
    \ you should be able to see all the environment details shown in Figure [14-8](#A447991_1_En_14_Chapter.html#Fig8).\n\
    \n![A447991_1_En_14_Fig8_HTML.jpg](A447991_1_En_14_Fig8_HTML.jpg)\n\n**Figure\
    \ 14-8.** Spring Boot Actuator /env endpoint\n\n#### The /trace Endpoint\n\nThe\
    \ `/trace` endpoint shows the tracing information of the last few HTTP requests,\
    \ which is very helpful for debugging the request/response details, like headers,\
    \ cookies, etc. Go to `http://localhost:8080/application/trace` to view the HTTP\
    \ request tracing details, as shown in Figure [14-9](#A447991_1_En_14_Chapter.html#Fig9).\n\
    \n![A447991_1_En_14_Fig9_HTML.jpg](A447991_1_En_14_Fig9_HTML.jpg)\n\n**Figure\
    \ 14-9.** Spring Boot Actuator /trace endpoint\n\n#### The /dump Endpoint\n\n\
    You can view the thread dump of your application with the details of the running\
    \ threads and the stack trace of the JVM at `http://localhost:8080/application/dump\
    \ endpoint`. See Figure [14-10](#A447991_1_En_14_Chapter.html#Fig10).\n\n![A447991_1_En_14_Fig10_HTML.jpg](A447991_1_En_14_Fig10_HTML.jpg)\n\
    \n**Figure 14-10.** Spring Boot Actuator /dump endpoint\n\n#### The /loggers Endpoint\n\
    \nThe `/loggers` endpoint allows you to view and configure the log levels of your\
    \ application at runtime. You can view the logging levels of all loggers at `http://localhost:8080/application/loggers`,\
    \ as shown in Figure [14-11](#A447991_1_En_14_Chapter.html#Fig11).\n\n![A447991_1_En_14_Fig11_HTML.jpg](A447991_1_En_14_Fig11_HTML.jpg)\n\
    \n**Figure 14-11.** Spring Boot Actuator /loggers endpoint\n\nYou can view the\
    \ logging level of a specific logger at `http://localhost:8080/application/{loggerName}`.\
    \ For example, if you want to view the logging level of the `com.apress.demo`\
    \ logger, go to `http://localhost:8080/application/loggers/com.apress.demo`.\n\
    \n```json\n{\nconfiguredLevel: null,\neffectiveLevel: \"INFO\"\n}\n```\n\nYou\
    \ can update the logging level of a logger at runtime by issuing a `POST` request\
    \ to `http://localhost:8080/application/{loggerName}`. Suppose you want to change\
    \ the logging level of `com.apress.demo` to `DEBUG`. You can send a `POST` request\
    \ to the `http://localhost:8080/application/loggers/com.apress.demo` URL with\
    \ the following request body JSON.\n\n```json\n{\nconfiguredLevel: \"DEBUG\"\n\
    }\n```\n\n```bash\n> curl -i -X POST -H 'Content-Type: application/json' -d '{\"\
    configuredLevel\": \"DEBUG\"}' http://localhost:8080/application/loggers/com.apress.demo\n\
    ```\n\nNow, if you again check the logging level of the `com.apress.demo` logger\
    \ by issuing a `GET` request to `http://localhost:8080/application/loggers/com.apress.demo`,\
    \ you will see the updated logging configuration.\n\n```json\n{\nconfiguredLevel:\
    \ \"DEBUG\",\neffectiveLevel: \"DEBUG\"\n}\n```\n\n#### The /logfile Endpoint\n\
    \nIf you enabled file-based logging by setting `logging.file` or `logging.path`\
    \ or using the native file configuration files (`logback.xml`, `log4j.properties`,\
    \ etc.), you can use the `/logfile` endpoint to view the log file content. Go\
    \ to `http://localhost:8080/application/logfile`, as shown in Figure [14-12](#A447991_1_En_14_Chapter.html#Fig12).\n\
    \n![A447991_1_En_14_Fig12_HTML.jpg](A447991_1_En_14_Fig12_HTML.jpg)\n\n**Figure\
    \ 14-12.** Spring Boot Actuator /logfile endpoint\n\n#### The /shutdown Endpoint\n\
    \nThe `/shutdown` endpoint can be used to gracefully shut down the application,\
    \ which is not enabled by default. You can enable this endpoint by adding the\
    \ following property to `application.properties`.\n\n```properties\nendpoints.shutdown.enabled=true\n\
    ```\n\nAfter adding this property, you can send the HTTP `POST` method to `http://localhost:8080/application/shutdown`\
    \ to invoke the `/shutdown` endpoint.\n\nOnce the `/shutdown` endpoint is invoked\
    \ successfully, you should see the following message:\n\n```json\n{\n\"message\"\
    : \"Shutting down, bye...\"\n}\n```\n\n> **Note:** Be careful about enabling /shutting\
    \ down an endpoint. Enable or shut down an endpoint only when it is absolutely\
    \ required and be sure to protect the endpoint with the appropriate security configuration.\n\
    \n#### The /actuator Endpoint\n\nThe `/actuator` endpoint provides a hypermedia-based\
    \ \"discovery page\" for the other endpoints. To activate this endpoint, you need\
    \ to have the following Spring `HATEOAS` dependency.\n\n```xml\n<dependency>\n\
    <groupId>org.springframework.hateoas</groupId>\n<artifactId>spring-hateoas</artifactId>\n\
    </dependency>\n```\n\nGo to `http://localhost:8080/application/` to see the list\
    \ of actuator endpoints, as shown in Figure [14-13](#A447991_1_En_14_Chapter.html#Fig13).\n\
    \n![A447991_1_En_14_Fig13_HTML.jpg](A447991_1_En_14_Fig13_HTML.jpg)\n\n**Figure\
    \ 14-13.** Spring Boot Actuator /actuator endpoint\n\nYou can customize the actuator\
    \ endpoint URL by setting the `endpoints.actuator.path` property.\n\n```properties\n\
    endpoints.actuator.path=/actuator\n```\n\nNow you can access the Actuator endpoint\
    \ at `http://localhost:8080/application/actuator`.\n\n### Customizing Actuator\
    \ Endpoints\n\nBy default, the Spring Boot Actuator endpoints run on the same\
    \ port and the default management context-path is `\"/application\"`. You can\
    \ customize these properties using the following properties.\n\n```properties\n\
    management.context-path=/management\nmanagement.port=9090\n```\n\nWith this customization,\
    \ you can access Actuator endpoints at `http://localhost:9090/management/` as\
    \ the base path. The `/health` endpoint would become `http://localhost:8080/management/health`.\n\
    \nYou can change endpoint IDs, sensitivity, and enabled values using the `endpoints.{endpointName}.*`\
    \ properties.\n\n```properties\nendpoints.beans.id=springbeans\nendpoints.beans.sensitive=false\n\
    endpoints.beans.enabled=true\n```\n\nWith these customizations, you can access\
    \ the `/beans` endpoint at `http://localhost:8080/application/springbeans`.\n\n\
    You can also selectively enable/disable an endpoint using the `endpoints.{endpoint}.enabled`\
    \ property.\n\n```properties\nendpoints.trace.enabled=false\nendpoints.shutdown.enabled=true\n\
    ```\n\nYou can enable/disable all endpoints using `endpoints.enabled` property\
    \ and selectively override for specific endpoints. For example, if you want to\
    \ disable all endpoints except /info then configure as follows:\n\n```properties\n\
    endpoints.enabled=false\nendpoints.info.enabled=true\n```\n\nYou can set sensitivity\
    \ for all endpoints using the `endpoints.sensitive` property and selectively override\
    \ for specific endpoints. For example, if you want to make all endpoints non-sensitive\
    \ except for `/trace`, you can configure it as follows:\n\n```properties\nendpoints.sensitive=false\n\
    endpoints.trace.sensitive=true\n```\n\nIf you don't want to expose the endpoints\
    \ over HTTP, you can disable this option by adding the following property.\n\n\
    ```properties\nmanagement.port=-1\n```\n\n### Securing Actuator Endpoints\n\n\
    By default all sensitive endpoints are secured and only authenticated users who\
    \ have the `ACTUATOR` role can access those endpoints. You can change the `ACTUATOR`\
    \ role name to something else, say `SUPERADMIN`, by setting the following property.\n\
    \n```properties\nmanagement.security.roles=SUPERADMIN\n```\n\nIf you have the\
    \ Spring Boot Security starter on the classpath, the Actuator endpoints will be\
    \ secured by Spring Security.\n\nAdd the Security starter dependency to `pom.xml`.\n\
    \n```xml\n<dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-security</artifactId>\n\
    </dependency>\n```\n\nInstead of using the default user credentials, you can configure\
    \ the security user credential in `application.properties` as follows.\n\n```properties\n\
    security.user.name=admin\nsecurity.user.password=secret\nsecurity.user.role=USER,ADMIN,ACTUATOR\n\
    ```\n\nNow if you try to access any endpoint, say `http://localhost:8080/application/beans`,\
    \ you will be prompted to enter credentials.\n\nBut most likely you will be using\
    \ a custom Spring Security configuration backed by a datastore for user credentials,\
    \ so you can configure Actuator endpoints for security as needed.\n\nIf, for any\
    \ reason, you want to disable security for your Actuator endpoints, you can set\
    \ the following property:\n\n```properties\nmanagement.security.enabled=false\n\
    ```\n\nThis will disable security for all Actuator endpoints. You are **strongly**\
    \ advised to secure the Actuator endpoints, especially if your application is\
    \ publicly accessible.\n\n### Implementing Custom Health Indicators\n\nSpring\
    \ Boot provides the following `HealthIndicator` implementations out-of-the-box.\
    \ They are autoconfigured by default.\n\n* `CassandraHealthIndicator`\n* `DiskSpaceHealthIndicator`\n\
    * `DataSourceHealthIndicator`\n* `ElasticsearchHealthIndicator`\n* `JmsHealthIndicator`\n\
    * `MailHealthIndicator`\n* `MongoHealthIndicator`\n* `RabbitHealthIndicator`\n\
    * `RedisHealthIndicator`\n* `SolrHealthIndicator`\n\nIn addition to these, you\
    \ can also implement your own `HealthIndicators` based on your application health\
    \ check needs.\n\nSuppose you need to download some feed data from a remote server\
    \ on a regular interval basis and there is an endpoint to invoke for checking\
    \ the server reachability.\n\nTo implement a custom `HealthIndicator`, you need\
    \ to register a Spring bean that implements the `HealthIndicator` interface. You\
    \ can implement a `HealthIndicator` to ping the feed server, as shown in Listing\
    \ [14-1](#A447991_1_En_14_Chapter.html#Par109).\n\n```java\nimport java.util.Date;\n\
    import org.springframework.boot.actuate.health.Health;\nimport org.springframework.boot.actuate.health.HealthIndicator;\n\
    import org.springframework.stereotype.Component;\nimport org.springframework.web.client.RestClientException;\n\
    import org.springframework.web.client.RestTemplate;\n@Component\npublic class\
    \ FeedServerHealthIndicator implements HealthIndicator\n{\n@Override\npublic Health\
    \ health() {\nRestTemplate restTemplate = new RestTemplate();\nString url = \"\
    http://feedserver.com/ping\";\ntry {\nString resp = restTemplate.getForObject(url,\
    \ String.class);\nif(\"OK\".equalsIgnoreCase(resp)){\nreturn Health.up().\nbuild();\n\
    } else {\nreturn Health.down()\n.withDetail(\"ping_url\", url)\n.withDetail(\"\
    ping_time\", new Date())\n.build();\n}\n} catch (RestClientException e) {\nreturn\
    \ Health.down(e)\n.withDetail(\"ping_url\", url)\n.withDetail(\"ping_time\", new\
    \ Date())\n.build();\n}\n}\n}\n```\n\nNow, when you go to the `http://localhost:8080/application/health`\
    \ URL and the feed server is not reachable, you will see the following response:\n\
    \n```json\n{\nstatus: \"DOWN\",\nfeedServer: {\nstatus: \"DOWN\",\nerror: \"org.springframework.web.client.HttpClientErrorException:\
    \ 410 Gone\",\nping_url: \"http://feedserver.com/ping\",\nping_time: 1495777475435\n\
    },\ndiskSpace: {\nstatus: \"UP\",\ntotal: 340650881024,\nfree: 260343615488,\n\
    threshold: 10485760\n},\ndb: {\nstatus: \"UP\",\ndatabase: \"H2\",\nhello: 1\n\
    }\n}\n```\n\nHaving health checks for various application components and integration\
    \ points will help you monitor the overall application health.\n\n### Capturing\
    \ Custom Application Metrics\n\nYou have already seen how you can use Actuator's\
    \ `/metrics` endpoint to view various application metrics, such as memory, heap,\
    \ thread pool, and datasource information. In addition to that, you can also record\
    \ your own metrics by using `CounterService` and `GaugeService`.\n\n`CounterService`\
    \ can be used to increment, decrement, and reset a named counter value. `GaugeService`\
    \ can be used to submit a named metric value for further analysis.\n\nSuppose\
    \ you want to capture the count of successful and failed login attempts. You can\
    \ use `CounterService` to record those metrics, as shown in Listing [14-2](#A447991_1_En_14_Chapter.html#Par116).\n\
    \n```java\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.boot.actuate.metrics.CounterService;\nimport org.springframework.stereotype.Service;\n\
    @Service\npublic class LoginService\n{\n@Autowired\nprivate CounterService counterService;\n\
    public boolean login(String email, String password)\n{\nif(\"admin@gmail.com\"\
    .equalsIgnoreCase(email) && \"admin\".equals(password)){\ncounterService.increment(\"\
    counter.login.success\");\nreturn true;\n} else {\ncounterService.increment(\"\
    counter.login.failure\");\nreturn false;\n}\n}\n}\n```\n\nNow if you invoke the\
    \ `LoginService.login()` method with correct and incorrect credentials, you can\
    \ see those metrics at `http://localhost:8080/application/metrics endpoint`.\n\
    \n```json\n{\nmem: 491423,\nmem.free: 155266,\n....\n....\ndatasource.primary.active:\
    \ 0,\ndatasource.primary.usage: 0,\ngauge.response.application.health: 1679,\n\
    gauge.response.application.metrics: 12,\n...\n...\ncounter.login.failure: 2,\n\
    counter.login.success: 3,\n....\n...\n}\n```\n\nSuppose you want to capture the\
    \ time needed to invoke a third-party web service. You can use `GaugeService`\
    \ to record the time taken for this web service call. The default `GaugeService`\
    \ implementation will store the data in-memory, but you can create an implementation\
    \ to feed the data into your analytical tools. See Listing [14-3](#A447991_1_En_14_Chapter.html#Par120).\n\
    \n```java\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.boot.actuate.metrics.GaugeService;\nimport org.springframework.stereotype.Service;\n\
    import org.springframework.web.client.RestClientException;\nimport org.springframework.web.client.RestTemplate;\n\
    import com.apress.demo.models.GitHubUser;\n@Service\npublic class GitHubService\
    \ {\n@Autowired\nGaugeService gaugeService;\npublic GitHubUser getUserInfo(String\
    \ username)\n{\nRestTemplate restTemplate = new RestTemplate();\nString url =\
    \ \"https://api.github.com/users/\"+username;\nGitHubUser gitHubUser = null;\n\
    try {\nlong start = System.currentTimeMillis();\ngitHubUser = restTemplate.getForObject(url,\
    \ GitHubUser.class);\nlong end = System.currentTimeMillis();\ngaugeService.submit(\"\
    gauge.guthub.response-time\", (end-start));\n} catch (RestClientException e) {\n\
    e.printStackTrace();\n}\nreturn gitHubUser;\n}\n}\n```\n\nNow if you invoke the\
    \ `GitHubService.getUserInfo()` method, the time taken for the call will be recorded\
    \ using `GaugeService`. You can look at those metrics at the `http://localhost:8080/application/metrics`\
    \ endpoint.\n\n```json\n{\nmem: 491423,\nmem.free: 155266,\n....\n....\ndatasource.primary.active:\
    \ 0,\ndatasource.primary.usage: 0,\n...\ngauge.guthub.response-time: 126,\n...\n\
    ...\n}\n```\n\n### CORS Support for Actuator Endpoints\n\nIn order to access the\
    \ Actuator endpoints from other origins, you need to enable CORS support for them.\
    \ CORS support is disabled by default and you need to set the `endpoints.cors.allowed-origins`\
    \ property to enable it.\n\n```properties\nendpoints.cors.allowed-origins=http://remoteserver.com\n\
    endpoints.cors.allowed-methods=GET,POST\n```\n\nYou can also add other CORS properties\
    \ using the `endpoints.cors.*` properties.\n\n### Monitoring and Management Over\
    \ JMX\n\nBy default Spring Boot exposes Actuator endpoints as JMX MBeans under\
    \ the `org.springframework.boot` domain. You can use JConsole, which comes with\
    \ JDK, to view JMX MBeans.\n\nRun JConsole from `C:\\\\Program Files\\\\Java\\\
    \\jdk1.8.0_45\\\\bin\\\\jconsole.exe`. Select the Spring Boot application main\
    \ class and click Connect. If you see a dialog box that says \"Secure Connection\
    \ Failed. Retry Insecurely?\", click on Insecure Connection.\n\nBy default, you\
    \ will be on the Overview tab. Click on the MBeans tab.\n\nNow expand the `org.springframework.boot`\
    \ domain, where you'll find Actuator endpoints exported as MBeans. See Figure\
    \ [14-14](#A447991_1_En_14_Chapter.html#Fig14).\n\n![A447991_1_En_14_Fig14_HTML.jpg](A447991_1_En_14_Fig14_HTML.jpg)\n\
    \n**Figure 14-14.** Spring Boot Actuator JMX monitoring\n\nYou can customize the\
    \ domain name by using the `endpoints.jmx.domain` property.\n\n```properties\n\
    endpoints.jmx.domain=mydomain\n```\n\nYou can disable exposing endpoints over\
    \ JMX by setting `endpoints.jmx.enabled=false`.\n\n### Summary\n\nIn this chapter,\
    \ you explored the Spring Boot Actuator, which includes very helpful production\
    \ support features. You learned about the various endpoints, including how to\
    \ customize them and how to invoke them over HTTP and JMX. In the next chapter,\
    \ you will learn how to test Spring Boot applications.\n\n## 15. Testing Spring\
    \ Boot Applications\n\nTesting is an important part of software development. It\
    \ helps developers verify the correctness of the functionality. JUnit and TestNG\
    \ are two of the most popular testing libraries used in Java projects.\n\nTest\
    \ Driven Development (TDD) is a popular development practice where you write tests\
    \ first and write just enough production code to pass the tests. You write various\
    \ types of tests, such as unit tests, integration tests, performance tests, etc.\
    \ Unit tests focus on testing one component in isolation, whereas integration\
    \ tests verify the behavior of a feature, which could possibly involve multiple\
    \ components. While doing integration testing, you may have to mock the behavior\
    \ of dependent components such as third-party web service classes, database method\
    \ invocations, etc. There are mocking libraries like Mockito, PowerMock, and jMock,\
    \ for mocking the object's behavior.\n\nThe dependency injection (DI) design pattern\
    \ encourages programming to practice and write testable code. With dependency\
    \ injection, you can inject mock implementations for testing and real implementations\
    \ for production. At its core, Spring is a dependency injection container and\
    \ it provides great support for testing various parts of an application.\n\nIn\
    \ this chapter, you will learn how to test Spring components in Spring Boot applications.\
    \ You will take a detailed look at how to test slices of applications, such as\
    \ web components (regular MVC Controllers, REST API endpoints), Spring data repositories,\
    \ and secured controller/service methods using the `@WebMvcTest`, `@DataJpaTest`,\
    \ and the `@JdbcTest` annotations.\n\n### Testing Spring Boot Applications\n\n\
    One of the key reasons for the popularity of the Spring framework is its great\
    \ support for testing. Spring provides `SpringRunner`, which is a custom JUnit\
    \ runner helping to load the Spring `ApplicationContext` by using `@ContextConfiguration(classes=AppConfig.class)`.\n\
    \nA typical Spring unit/integration test is shown in Listing [15-1](#A447991_1_En_15_Chapter.html#Par7).\n\
    \n```java\n@RunWith(SpringRunner.class)\n@ContextConfiguration(classes=AppConfig.class)\n\
    public class UserServiceTests\n{\n@Autowired\nUserService userService;\n@Test\n\
    public void should_load_all_users()\n{\nList users = userService.getAllUsers();\n\
    assertNotNull(users);\nassertEquals(10, users.size());\n}\n}\n```\n\nThe Spring\
    \ Boot application is also nothing but a Spring application, so you can use all\
    \ of Spring's testing features in your Spring Boot applications as well.\n\nHowever,\
    \ some of the Spring Boot features, like loading external properties and logging,\
    \ are available only if you create `ApplicationContext` using the `SpringApplication`\
    \ class, which you'll typically use in your entry point class. These additional\
    \ Spring Boot features won't be available if you use `@ContextConfiguration`.\n\
    \n```java\n@SpringBootApplication\npublic class SpringbootTestingDemoApplication\n\
    {\npublic static void main(String[] args)\n{\nSpringApplication.run(SpringbootTestingDemoApplication.class,\
    \ args);\n}\n}\n```\n\nSpring Boot provides the `@SpringBootTest` annotation,\
    \ which uses `SpringApplication` behind the scenes to load `ApplicationContext`\
    \ so that all the Spring Boot features will be available. See Listing [15-2](#A447991_1_En_15_Chapter.html#Par12).\n\
    \n```java\n@RunWith(SpringRunner.class)\n@SpringBootTest\npublic class SpringbootTestingDemoApplicationTests\n\
    {\n@Autowired\nUserService userService;\n@Test\npublic void should_load_all_users()\n\
    {\n...\n...\n}\n}\n```\n\nFor `@SpringBootTest`, you can pass Spring configuration\
    \ classes, Spring bean definition XML files, and more, but in Spring Boot applications,\
    \ you'll typically use the entry point class.\n\nThe Spring Boot Test starter\
    \ `spring-boot-starter-test` pulls in the JUnit, Spring Test, and Spring Boot\
    \ Test modules, along with the following most commonly used mocking and asserting\
    \ libraries:\n\n* Mockito—A Java mocking framework found at [`http://site.mockito.org/`](http://site.mockito.org/).\n\
    * Hamcrest—A matcher/predicates library for data assertion found at [`http://hamcrest.org/JavaHamcrest/`](http://hamcrest.org/JavaHamcrest/).\n\
    * AssertJ—A fluent assertion library found at [`https://joel-costigliola.github.io/assertj/`](https://joel-costigliola.github.io/assertj/).\n\
    * JSONassert—An assertion library for JSON found at [`https://github.com/skyscreamer/JSONassert`](https://github.com/skyscreamer/JSONassert).\n\
    * JsonPath—XPath for JSON found at [`https://github.com/json-path/JsonPath`](https://github.com/json-path/JsonPath).\n\
    \nNow you'll see how to create a simple Spring Boot web application with a simple\
    \ REST endpoint.\n\n```xml\n<dependency>\n<groupId>org.springframework.boot</groupId>\n\
    <artifactId>spring-boot-starter-web</artifactId>\n</dependency>\n<dependency>\n\
    <groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-test</artifactId>\n\
    <scope>test</scope>\n</dependency>\n```\n\nFirst create an entry point class called\
    \ `Application.java`, as follows:\n\n```java\n@SpringBootApplication\npublic class\
    \ Application\n{\npublic static void main(String[] args)\n{\nSpringApplication.run(Application.class,\
    \ args);\n}\n}\n```\n\nListing [15-3](#A447991_1_En_15_Chapter.html#Par25) shows\
    \ how to create a simple REST endpoint called `/ping`.\n\n```java\n@RestController\n\
    public class PingController\n{\n@GetMapping(\"/ping\")\npublic String ping()\n\
    {\nreturn \"OK\";\n}\n}\n```\n\nNow if you run the application, you can invoke\
    \ the REST endpoint `http://localhost:8080/ping`, which gives the response `\"\
    OK\"`. Now you can write a test for the `/ping` endpoint. See Listing [15-4](#A447991_1_En_15_Chapter.html#Par27).\n\
    \n```java\nimport static org.assertj.core.api.Assertions.assertThat;\nimport org.junit.Test;\n\
    import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.boot.test.context.SpringBootTest.WebEnvironment;\n\
    import org.springframework.boot.test.web.client.TestRestTemplate;\nimport org.springframework.http.HttpStatus;\n\
    import org.springframework.http.ResponseEntity;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    @RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\n\
    public class PingControllerTests\n{\n@Autowired\nTestRestTemplate restTemplate;\n\
    @Test\npublic void testPing()\n{\nResponseEntity respEntity = restTemplate.getForEntity(\"\
    /ping\", String.class);\nassertThat(respEntity.getStatusCode()).isEqualTo(HttpStatus.OK);\n\
    assertThat(respEntity.getBody()).isEqualTo(\"OK\");\n}\n}\n```\n\nAs you need\
    \ to test the REST endpoint, you start the embedded servlet container by specifying\
    \ the `webEnvironment` attribute of `@SpringBootTest`.\n\nThe default `webEnvironment`\
    \ value is `WebEnvironment.MOCK`, which doesn't start an embedded servlet container.\n\
    \nYou can use various `webEnvironment` values based on how you want to run the\
    \ tests.\n\n* `MOCK (default)`—Loads a `WebApplicationContext` and provides a\
    \ mock servlet environment. It will not start an embedded servlet container. If\
    \ servlet APIs are not on your classpath, this mode will fall back to creating\
    \ a regular non-web `ApplicationContext`.\n* `RANDOM_PORT`—Loads a `ServletWebServerApplicationContext`\
    \ and starts an embedded servlet container listening on a random available port.\n\
    * `DEFINED_PORT`—Loads a `ServletWebServerApplicationContext` and starts an embedded\
    \ servlet container listening on a defined port (`server.port`).\n* `NONE`—Loads\
    \ an `ApplicationContext` using `SpringApplication` but does not provide a servlet\
    \ environment.\n\nThe `TestRestTemplate` bean will be registered automatically\
    \ only when `@SpringBootTest` is started with an embedded servlet container.\n\
    \nWhile running the integration tests that start the embedded servlet containers,\
    \ it is better to use `WebEnvironment.RANDOM_PORT` so that it won't conflict with\
    \ other running applications, especially in Continuous Integration (CI) environments\
    \ where multiple builds run in parallel.\n\nYou can specify which configuration\
    \ classes to use to build `ApplicationContext` by using the `classes` attribute\
    \ of the `@SpringBootTest` annotation. If you don't specify any classes explicitly,\
    \ it will automatically search for nested `@Configuration` classes and will fall\
    \ back to searching for `@SpringBootConfiguration` classes. The `@SpringBootApplication`\
    \ is annotated with `@SpringBootConfiguration` so `@SpringBootTest` would pick\
    \ up the application's entry point class.\n\n### Testing with Mock Implementations\n\
    \nWhile performing unit testing, you may want to mock calls to external services\
    \ like database interactions and web service invocations. You can create mock\
    \ implementations to be used in tests and real implementations used in production.\n\
    \nSay you have an `EmployeeRepository` file that talks to the database and gets\
    \ employee data, as shown in Listing [15-5](#A447991_1_En_15_Chapter.html#Par40).\n\
    \n```java\npublic interface EmployeeRepository\n{\nList findAllEmployees();\n\
    }\n```\n\nSuppose you have `EmployeeService`, which depends on `EmployeeRepository`,\
    \ with `getMaxSalariedEmployee()` and a few other employee-related methods. See\
    \ Listing [15-6](#A447991_1_En_15_Chapter.html#Par42).\n\n```java\n@Service\n\
    public class EmployeeService\n{\nprivate EmployeeRepository employeeRepository;\n\
    @Autowired\npublic EmployeeService(EmployeeRepository employeeRepository)\n{\n\
    this.employeeRepository = employeeRepository;\n}\npublic Employee getMaxSalariedEmployee()\n\
    {\nEmployee emp = null;\nList emps = employeeRepository.findAllEmployees();\n\
    //loop through emps and find max salaried emp\nreturn emp;\n}\n}\n```\n\nNow you\
    \ can create a mock `EmployeeRepository` file for testing, as shown in Listing\
    \ [15-7](#A447991_1_En_15_Chapter.html#Par44).\n\n```java\n@Repository\n@Profile(\"\
    test\")\npublic class MockEmployeeRepository implements EmployeeRepository\n{\n\
    public List findAllEmployees()\n{\nreturn Arrays.asList(\nnew Employee(1, \"A\"\
    , 50000),\nnew Employee(2, \"B\", 75000),\nnew Employee(3, \"C\", 43000)\n);\n\
    }\n}\n```\n\nNow you'll create a real implementation of `EmployeeRepository` for\
    \ production, as shown in Listing [15-8](#A447991_1_En_15_Chapter.html#Par46).\n\
    \n```java\n@Service\n@Profile(\"production\")\npublic class JdbcEmployeeRepository\
    \ implements EmployeeRepository\n{\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\n\
    public List findAllEmployees()\n{\nreturn jdbcTemplate.query(...);\n}\n}\n```\n\
    \nYou can use the `@ActiveProfiles` annotation to specify which profiles to use\
    \ so that only the beans associated with those profiles will be activated. See\
    \ Listing [15-9](#A447991_1_En_15_Chapter.html#Par48).\n\n```java\n@ActiveProfiles(\"\
    test\")\n@RunWith(SpringRunner.class)\n@SpringBootTest\npublic class ApplicationTests\n\
    {\n@Autowired\nEmployeeService employeeService;\n@Test\npublic void test_getMaxSalariedEmployee()\n\
    {\nEmployee emp = employeeService.getMaxSalariedEmployee();\nassertNotNull(emp);\n\
    assertEquals(2, emp.getId());\nassertEquals(\"B\", emp.getName());\nassertEquals(75000,\
    \ emp.getSalary());\n}\n}\n```\n\nAs you have enabled the `test` profile, `MockEmployeeRepository`\
    \ will be injected into `EmployeeService`. You can activate the `production` profile\
    \ while running the application in production as follows:\n\n```bash\njava -jar\
    \ myapp.jar -Dspring.profiles.active=production\n```\n\nWhile running the main\
    \ application, the `production` profile will be used and `JdbcEmployeeRepository`\
    \ will be injected into `EmployeeService`.\n\nIn addition to providing mock data,\
    \ you may also need to simulate other behaviors, like throwing exceptions when\
    \ certain methods are called. But creating mock implementations for every use\
    \ case can be tedious. You can use mocking libraries to create mock objects without\
    \ actually creating classes with mock behavior. The next section looks into how\
    \ to unit test using the popular mocking library, Mockito.\n\n### Testing with\
    \ Mockito\n\nMockito is a popular Java mocking framework that can be used along\
    \ with JUnit. Mockito lets you write tests by mocking the external dependencies\
    \ with the desired behavior.\n\nFor example, assume you are invoking some external\
    \ web service. When it fails due to some communication failures, you want to retry\
    \ three times before giving up. To test the retry behavior, that external web\
    \ service should throw an exception that may not be in your control. You can use\
    \ Mockito to simulate this behavior so that you can test the retry functionality.\n\
    \nSuppose you are importing user data from a third-party using a web service,\
    \ as shown in Listing [15-10](#A447991_1_En_15_Chapter.html#Par56).\n\n```java\n\
    @Service\npublic class UsersImporter\n{\npublic List importUsers() throws UserImportServiceCommunicationFailure\n\
    {\nList users = new ArrayList();\n//get users by invoking some web service\n//if\
    \ any exception occurs throw UserImportServiceCommunicationFailure\n//dummy data\n\
    users.add(new User());\nusers.add(new User());\nusers.add(new User());\nreturn\
    \ users;\n}\n}\n```\n\n`UserService` uses `UsersImporter` to get user data and\
    \ retries three times in case a `UserImportServiceCommunicationFailure` occurs.\
    \ See Listing [15-11](#A447991_1_En_15_Chapter.html#Par58).\n\n```java\n@Service\n\
    @Transactional\npublic class UsersImportService\n{\nprivate Logger logger = LoggerFactory.getLogger(UserService.class);\n\
    private UsersImporter usersImporter;\n@Autowired\npublic UsersImportService(UsersImporter\
    \ usersImporter)\n{\nthis.usersImporter = usersImporter;\n}\npublic UsersImportResponse\
    \ importUsers()\n{\nint retryCount = 0;\nint maxRetryCount = 3;\nfor (int i =\
    \ 0; i < maxRetryCount; i++)\n{\ntry\n{\nList importUsers = usersImporter.importUsers();\n\
    logger.info(\"Import Users: \"+importUsers);\nbreak;\n} catch (UserImportServiceCommunicationFailure\
    \ e)\n{\nretryCount++;\nlogger.error(\"Error: \"+e.getMessage());\n}\n}\nif(retryCount\
    \ >= maxRetryCount)\nreturn new UsersImportResponse(retryCount, \"FAILURE\");\n\
    else\nreturn new UsersImportResponse(0, \"SUCCESS\");\n}\n}\npublic class UsersImportResponse\n\
    {\nprivate int retryCount;\nprivate String status;\n//setters & getters\n}\n```\n\
    \nThis code invokes the `usersImporter.importUsers()` method and, if it throws\
    \ `UserImportServiceCommunicationFailure`, it retries three times.\n\nIf you want\
    \ to test if `usersImporter.importUsers()` returns the result without getting\
    \ an exception, then `UsersImportResponse(0, \"SUCCESS\")` should be returned;\
    \ otherwise, `UsersImportResponse(3, \"FAILURE\")` should be returned.\n\nYou\
    \ can use `@Mock` to create a mock object and `@InjectMocks` to inject the dependencies\
    \ with mocks. You can use `@RunWith(MockitoJUnitRunner.class)` to initialize the\
    \ mock objects or trigger the mock object initialization using `MockitoAnnotations.initMocks(this)`\
    \ in the JUnit `@Before` method. See Listing [15-12](#A447991_1_En_15_Chapter.html#Par62).\n\
    \n```java\nimport static org.assertj.core.api.Assertions.assertThat;\nimport static\
    \ org.mockito.BDDMockito.*;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
    import org.mockito.InjectMocks;\nimport org.mockito.Mock;\nimport org.mockito.junit.MockitoJUnitRunner;\n\
    import com.apress.demo.exceptions.UserImportServiceCommunicationFailure;\nimport\
    \ com.apress.demo.model.UsersImportResponse;\n@RunWith(MockitoJUnitRunner.class)\n\
    public class UsersImportServiceMockitoTest\n{\n@Mock\nprivate UsersImporter usersImporter;\n\
    @InjectMocks\nprivate UsersImportService usersImportService;\n@Test\npublic void\
    \ should_retry_3times_when_UserImportServiceCommunicationFailure_occured()\n{\n\
    given(usersImporter.importUsers()).willThrow(new UserImportServiceCommunicationFailure());\n\
    UsersImportResponse response = usersImportService.importUsers();\nassertThat(response.getRetryCount()).isEqualTo(3);\n\
    assertThat(response.getStatus()).isEqualTo(\"FAILURE\");\n}\n}\n```\n\nHere you\
    \ are simulating the failure condition while importing users using the web service\
    \ as follows:\n\n```java\ngiven(usersImporter.importUsers()).willThrow(new UserImportServiceCommunicationFailure());\n\
    ```\n\nSo, when you call `userService.importUsers()` and the mock `usersImporter`\
    \ object throws `UserImportServiceCommunicationFailure`, it will retry three times.\
    \ Similarly, you can use Mockito to simulate any kind of behavior to meet these\
    \ test cases.\n\nSpring Boot provides the `@MockBean` annotation that can be used\
    \ to define a new Mockito mock bean or replace a Spring bean with a mock bean\
    \ and inject that into their dependent beans. Mock beans will be automatically\
    \ reset after each test method. See Listing [15-13](#A447991_1_En_15_Chapter.html#Par67).\n\
    \n```java\nimport static org.assertj.core.api.Assertions.assertThat;\nimport static\
    \ org.mockito.BDDMockito.*;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
    import org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    import com.apress.demo.exceptions.UserImportServiceCommunicationFailure;\nimport\
    \ com.apress.demo.model.UsersImportResponse;\n@RunWith(SpringRunner.class)\n@SpringBootTest\n\
    public class UsersImportServiceMockitoTest\n{\n@MockBean\nprivate UsersImporter\
    \ usersImporter;\n@Autowired\nprivate UsersImportService usersImportService;\n\
    @Test\npublic void should_retry_3times_when_UserImportServiceCommunicationFailure_occured()\n\
    {\ngiven(usersImporter.importUsers()).willThrow(new UserImportServiceCommunicationFailure());\n\
    UsersImportResponse response = usersImportService.importUsers();\nassertThat(response.getRetryCount()).isEqualTo(3);\n\
    assertThat(response.getStatus()).isEqualTo(\"FAILURE\");\n}\n}\n```\n\nHere, Spring\
    \ Boot will create a Mockito mock object for `UsersImporter` and inject it into\
    \ the `UsersImportService` bean.\n\n### Testing Slices of Application Using @*Test\
    \ Annotations\n\nWhile testing various components of the application, you may\
    \ want to load a subset of the Spring `ApplicationContext` beans, which are related\
    \ to the subject under test (SUT). For example, when testing a SpringMVC controller,\
    \ you may want to load only the MVC layer components and provide mock service-layer\
    \ beans as dependencies.\n\nSpring Boot provides annotations like `@WebMvcTest`,\
    \ `@DataJpaTest`, `@DataMongoTest`, `@JdbcTest`, and `@JsonTest` to test slices\
    \ of the application.\n\n#### Testing SpringMVC Controllers Using @WebMvcTest\n\
    \nSpring Boot provides the `@WebMvcTest` annotation, which will autoconfigure\
    \ SpringMVC infrastructure components and load only `@Controller`, `@ControllerAdvice`,\
    \ `@JsonComponent`, `Filter`, `WebMvcConfigurer`, and `HandlerMethodArgumentResolver`\
    \ components. Other Spring beans (annotated with `@Component`, `@Service`, `@Repository`,\
    \ etc.) will not be scanned when using this annotation.\n\nNow you'll see how\
    \ to create a controller that adds data to the model and renders a Thymeleaf view.\
    \ See Listing [15-14](#A447991_1_En_15_Chapter.html#Par73).\n\n```java\nimport\
    \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
    import com.apress.demo.repositories.TodoRepository;\n@Controller\npublic class\
    \ TodoController\n{\n@Autowired\nTodoRepository todoRepository;\n@GetMapping(\"\
    /todolist\")\npublic String showTodos(Model model)\n{\nmodel.addAttribute(\"todos\"\
    , todoRepository.findAll());\nreturn \"todos\";\n}\n}\n```\n\nListing [15-15](#A447991_1_En_15_Chapter.html#Par75)\
    \ shows how to write a test for `TodoController` using `@WebMvcTest`.\n\n```java\n\
    import static org.mockito.BDDMockito.*;\nimport static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.*;\n\
    import static org.hamcrest.Matchers.*;\nimport java.util.Arrays;\nimport org.junit.Test;\n\
    import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\nimport\
    \ org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.servlet.MockMvc;\n\
    import com.apress.demo.entities.Todo;\nimport com.apress.demo.repositories.TodoRepository;\n\
    @RunWith(SpringRunner.class)\n@WebMvcTest(controllers= TodoController.class)\n\
    public class TodoControllerTests\n{\n@Autowired\nprivate MockMvc mvc;\n@MockBean\n\
    private TodoRepository todoRepository;\n@Test\npublic void testShowAllTodos()\
    \ throws Exception\n{\nTodo todo1 = new Todo(1, \"Todo1\",false);\nTodo todo2\
    \ = new Todo(2, \"Todo2\",true);\ngiven(this.todoRepository.findAll()).willReturn(Arrays.asList(todo1,\
    \ todo2));\nthis.mvc.perform(get(\"/todolist\")\n.accept(MediaType.TEXT_HTML))\n\
    .andExpect(status().isOk())\n.andExpect(view().name(\"todos\"))\n.andExpect(model().attribute(\"\
    todos\", hasSize(2)))\n;\nverify(todoRepository, times(1)).findAll();\n}\n}\n\
    ```\n\nYou have annotated the test with `@WebMvcTest(controllers = TodoController.class)`\
    \ by explicitly specifying which controller you are testing. As `@WebMvcTest`\
    \ doesn't load other regular Spring beans and `TodoController` depends on `TodoRepository`,\
    \ you provided a mock bean using the `@MockBean` annotation. The `@WebMvcTest`\
    \ autoconfigures `MockMvc`, which can be used to test controllers without starting\
    \ an actual servlet container.\n\nIn this test method, you set the expected behavior\
    \ on `todoRepository.findAll()` to return a list of two `Todo` objects. Then you\
    \ issue a `GET` request to `\"/todolist\"` and assert various things on response.\n\
    \n#### Testing SpringMVC REST Controllers Using @WebMvcTest\n\nSimilar to how\
    \ you can test SpringMVC controllers, you can test REST controllers as well. You\
    \ can write assertions on response data using `JsonPath` or `JSONassert` libraries.\n\
    \nCreate a `TodoRestController`, as shown in Listing [15-16](#A447991_1_En_15_Chapter.html#Par80).\n\
    \n```java\nimport java.util.Optional;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
    import org.springframework.web.bind.annotation.RestController;\nimport com.apress.demo.entities.Todo;\n\
    import com.apress.demo.repositories.TodoRepository;\n@RestController\npublic class\
    \ TodoRestController\n{\n@Autowired\nprivate TodoRepository todoRepository;\n\
    @GetMapping(\"/api/todos/{id}\")\npublic Optional findById(@PathVariable Integer\
    \ id)\n{\nreturn todoRepository.findById(id);\n}\n}\n```\n\nYou can write a test\
    \ for `TodoRestController`, as shown in Listing [15-17](#A447991_1_En_15_Chapter.html#Par82).\n\
    \n```java\nimport static org.hamcrest.CoreMatchers.*;\nimport static org.mockito.BDDMockito.*;\n\
    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.jsonPath;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
    import java.util.Optional;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\n\
    import org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.servlet.MockMvc;\n\
    import com.apress.demo.entities.Todo;\nimport com.apress.demo.repositories.TodoRepository;\n\
    @RunWith(SpringRunner.class)\n@WebMvcTest(controllers= TodoRestController.class)\n\
    public class TodoRestControllerTests\n{\n@Autowired\nprivate MockMvc mvc;\n@MockBean\n\
    private TodoRepository todoRepository;\n@Test\npublic void testFindTodoById()\
    \ throws Exception\n{\nTodo todo = new Todo(1, \"Todo1\", false);\ngiven(this.todoRepository.findById(1)).willReturn(Optional.of(todo));\n\
    this.mvc.perform(get(\"/api/todos/1\")\n.accept(MediaType.APPLICATION_JSON))\n\
    .andExpect(status().isOk())\n.andExpect(jsonPath(\"$.id\", is(1)))\n.andExpect(jsonPath(\"\
    $.text\", is(\"Todo1\")))\n.andExpect(jsonPath(\"$.done\", is(false)));\nverify(todoRepository,\
    \ times(1)).findById(1);\n}\n}\n```\n\nYou are testing the `TodoRestController`\
    \ endpoint `\"/api/todos/{id}\"` in the same way you tested `TodoController`,\
    \ but you are using the JSON `Path` assertions to verify the returned JSON response\
    \ data.\n\n#### Testing Secured Controller/Service Methods\n\nIn Chapter [13](#A447991_1_En_13_Chapter.html),\
    \ you learned how to secure web applications and REST APIs and apply method-level\
    \ security. Spring provides several ways to test these secured resources as well.\n\
    \nYou'll now see how you can test secured resources.\n\nAdd the following dependencies\
    \ to enable Spring Security and security testing capabilities.\n\n```xml\n<dependency>\n\
    <groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-security</artifactId>\n\
    </dependency>\n<dependency>\n<groupId>org.springframework.security</groupId>\n\
    <artifactId>spring-security-test</artifactId>\n<scope>test</scope>\n</dependency>\n\
    ```\n\nWhen you add the Security starter without custom security configurations,\
    \ MVC endpoints will be secured using HTTP basic authentication with a default\
    \ user and generated password. Instead of using the default credentials, you can\
    \ configure credentials in `application.properties` as follows:\n\n```properties\n\
    security.user.name=admin\nsecurity.user.password=admin123\nsecurity.user.role=USER,ADMIN\n\
    ```\n\nYou can use the autoconfigured `TestRestTemplate` to test REST endpoints,\
    \ passing the HTTP basic auth parameters, as shown in Listing [15-18](#A447991_1_En_15_Chapter.html#Par91).\n\
    \n```java\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\n\
    public class PingControllerTests\n{\n@Autowired\nTestRestTemplate restTemplate;\n\
    @Test\npublic void testPing() throws Exception\n{\nResponseEntity respEntity =\n\
    restTemplate.withBasicAuth(\"admin\", \"admin123\")\n.getForEntity(\"/ping\",\
    \ String.class);\nassertThat(respEntity.getStatusCode()).isEqualTo(HttpStatus.OK);\n\
    assertThat(respEntity.getBody()).isEqualTo(\"OK\");\n}\n}\n```\n\nNote that you\
    \ have passed the credentials using `restTemplate.withBasicAuth(\"admin\", \"\
    admin123\")`. Also note that by using `TestRestTemplate`, you can invoke REST\
    \ endpoints using relative paths like `\"/ping\"` instead of specifying the complete\
    \ URL `http://localhost:<port>/ping`. This is very convenient when using `RANDOM_PORT`.\
    \ But if you want to construct a URL yourself, you can get the `RANDOM_PORT` value\
    \ using the `@LocalServerPort` as follows:\n\n```java\nimport org.springframework.boot.web.server.LocalServerPort;\n\
    @LocalServerPort\nint port;\n```\n\nYou might want to customize the default Spring\
    \ Security configuration and use form-based authentication instead of HTTP basic\
    \ authentication.\n\nNow you'll see how to customize Spring Security to configure\
    \ a few in-memory user details and enable method-level security, as shown in Listing\
    \ [15-19](#A447991_1_En_15_Chapter.html#Par96).\n\n```java\n@Configuration\n@EnableWebSecurity\n\
    @EnableGlobalMethodSecurity(securedEnabled = true, prePostEnabled=true)\npublic\
    \ class WebSecurityConfig extends WebSecurityConfigurerAdapter\n{\n@Autowired\n\
    protected void configureGlobal(AuthenticationManagerBuilder auth) throws Exception\n\
    {\nauth\n.inMemoryAuthentication()\n.withUser(\"user\").password(\"password\"\
    ).roles(\"USER\").and()\n.withUser(\"admin\").password(\"admin123\").roles(\"\
    USER\", \"ADMIN\");\n}\n@Override\nprotected void configure(HttpSecurity http)\
    \ throws Exception {\nhttp.authorizeRequests()\n.antMatchers(\"/api/todos/**\"\
    ).hasRole(\"USER\")\n.antMatchers(\"/admin/**\").hasRole(\"ADMIN\")\n.antMatchers(\"\
    /ping\").hasAnyRole(\"USER\",\"ADMIN\")\n.anyRequest().authenticated()\n;\n}\n\
    }\n```\n\nYou have customized the Security configuration and the `httpBasic` authentication\
    \ is not enabled. So you can't use `TestRestTemplate` with basic auth parameters\
    \ to test the secured REST endpoints. You can use `@WebMvcTest` and invoke the\
    \ REST endpoint using `MockMvc`, which allows you to pass security user credentials.\n\
    \nWhen using `@WebMvcTest`, the Spring Security HTTP basic authentication will\
    \ be used by default instead of the custom Security configuration that you manually\
    \ configured. You can turn off basic authentication using the `secure=false` attribute\
    \ of `@WebMvcTest` and load the security configuration using `@ContextConfiguration`,\
    \ as shown in Listing [15-20](#A447991_1_En_15_Chapter.html#Par99).\n\n```java\n\
    @RunWith(SpringRunner.class)\n@WebMvcTest(controllers= TodoRestController.class,\
    \ secure=false)\n@ContextConfiguration(classes={SpringbootTestingDemoApplication.class,\
    \ WebSecurityConfig.class})\npublic class TodoRestControllerTests\n{\n@Autowired\n\
    private MockMvc mvc;\n@MockBean\nprivate TodoRepository todoRepository;\n//@Test\
    \ methods\n}\n```\n\nListing [15-21](#A447991_1_En_15_Chapter.html#Par101) shows\
    \ you how to test the `GET /api/todos/{id}` endpoint using `MockMvc`.\n\n```java\n\
    @Test\npublic void testFindTodoById() throws Exception\n{\nTodo todo = new Todo(1,\
    \ \"Todo1\", false);\ngiven(this.todoRepository.findById(1)).willReturn(Optional.of(todo));\n\
    this.mvc.perform(get(\"/api/todos/1\")\n.with(user(\"admin\").password(\"admin123\"\
    ).roles(\"USER\",\"ADMIN\"))\n.accept(MediaType.APPLICATION_JSON))\n.andExpect(status().isOk())\n\
    .andExpect(jsonPath(\"$.id\", is(1)))\n.andExpect(jsonPath(\"$.text\", is(\"Todo1\"\
    )))\n.andExpect(jsonPath(\"$.done\", is(false)));\nverify(todoRepository, times(1)).findById(1);\n\
    }\n```\n\nHere you are mocking `todoRepository.findById(1)` method and trigger\
    \ GET request using `MockMvc.perform()` and you are passing the security user\
    \ credentials using `.with(user(\"admin\").password(\"admin123\").roles(\"USER\"\
    ,\"ADMIN\"))`.\n\nListing [15-22](#A447991_1_En_15_Chapter.html#Par104) shows\
    \ you how to test the `POST /api/todos` endpoint to create a new `Todo`.\n\n```java\n\
    @Autowired\nprivate ObjectMapper objectMapper;\n@Test\npublic void testCreateTodo()\
    \ throws Exception\n{\nTodo todo = new Todo(null, \"New Todo1\", false);\nString\
    \ content = objectMapper.writeValueAsString(todo);\ngiven(this.todoRepository.save(any(Todo.class))).willReturn(todo);\n\
    this.mvc.perform(post(\"/api/todos\")\n.contentType(MediaType.APPLICATION_JSON_VALUE)\n\
    .content(content)\n.with(csrf())\n.with(user(\"admin\").password(\"admin123\"\
    ).roles(\"USER\",\"ADMIN\"))\n.accept(MediaType.APPLICATION_JSON_VALUE))\n.andExpect(status().isOk())\n\
    .andExpect(MockMvcResultMatchers.content().json(content))\n.andReturn()\n;\nverify(todoRepository,\
    \ times(1)).save(any(Todo.class));\n}\n```\n\nIt is similar to the previous test\
    \ method, but you are performing a `POST` request using `MockMvc.perform()` and\
    \ you are setting the CSRF token using `with(csrf())`. As it is a `POST` request\
    \ and CSRF is enabled, you should send the CSRF token; otherwise, it will throw\
    \ `AccessDeniedException` with the HTTP status code `403`.\n\nIn addition to using\
    \ the `configure(HttpSecurity http)` method to configure security constraints,\
    \ you can also use the `@Secured` or `@PreAuthorize` annotations to secure REST\
    \ endpoints. See Listing [15-23](#A447991_1_En_15_Chapter.html#Par107).\n\n```java\n\
    @RestController\npublic class AdminRestController\n{\n@Autowired\nprivate UserService\
    \ userService;\n@Secured(\"ROLE_ADMIN\")\n@DeleteMapping(\"/admin/users/{id}\"\
    )\npublic void deleteUser(@PathVariable(\"id\") Integer userId)\n{\nuserService.deleteUser(userId);\n\
    }\n}\n```\n\nThe REST endpoint `DELETE /admin/users/{id}` can be accessed by the\
    \ users with the `ADMIN` role. You can test the REST endpoints secured by the\
    \ `@Secured` or `@PreAuthorize` annotations in the same way using `MockMvc`, as\
    \ shown in Listing [15-24](#A447991_1_En_15_Chapter.html#Par109).\n\n```java\n\
    @RunWith(SpringRunner.class)\n@WebMvcTest(controllers= AdminRestController.class,\
    \ secure=false)\n@ContextConfiguration(classes={SpringbootTestingDemoApplication.class,\
    \ WebSecurityConfig.class})\npublic class AdminRestControllerTests\n{\n@Autowired\n\
    private MockMvc mvc;\n@MockBean\nprivate UserService userService;\n@Test\npublic\
    \ void testAdminDeleteUser() throws Exception\n{\nMockito.doNothing()\n.when(userService)\n\
    .deleteUser(Mockito.any(Integer.class));\nthis.mvc.perform(delete(\"/admin/users/2\"\
    )\n.with(csrf())\n.with(user(\"admin\").password(\"admin123\").roles(\"ADMIN\"\
    ))\n.accept(MediaType.APPLICATION_JSON))\n.andExpect(status().isOk());\nverify(userService,\
    \ times(1)).deleteUser(2);\n}\n}\n```\n\nIn addition to securing the web layer,\
    \ you can also secure any Spring components by using method-level security and\
    \ annotating the methods with `@Secured` or `@PreAuthorize`. You can also annotate\
    \ these annotations at the class level, which applies the security configuration\
    \ for all the methods in that class.\n\nListing [15-25](#A447991_1_En_15_Chapter.html#Par112)\
    \ shows you how to secure the `UserService` methods using `@Secured` and `@PreAuthorize`.\n\
    \n```java\n@Service\n@Transactional\npublic class UserService\n{\nprivate UserRepository\
    \ userRepository;\n@Autowired\npublic UserService(UserRepository repo)\n{\nthis.userRepository\
    \ = repo;\n}\npublic Optional findUserById(Integer userId)\n{\nreturn userRepository.findById(userId);\n\
    }\n@Secured(\"ROLE_USER\")\npublic void createUser(User user)\n{\nuserRepository.save(user);\n\
    }\n@PreAuthorize(\"isAuthenticated()\")\npublic void updateUser(User user)\n{\n\
    userRepository.save(user);\n}\n@Secured(\"ROLE_ADMIN\")\npublic void deleteUser(Integer\
    \ userId)\n{\nuserRepository.delete(userId);\n}\n}\n```\n\nIn `UserService`, you\
    \ have configured the `deleteUser()` method to be accessible for `ADMIN` users\
    \ only, the `createUser()` method to be accessible for users with the `USER` only,\
    \ and the `updateUser()` method to be accessed by any authenticated user.\n\n\
    **Approach One**\n\nYou can use the JUnit `@Before` method to initialize Spring\
    \ Security user authentication and the `@After` method to clear `SecurityContextHolder`.\
    \ See Listing [15-26](#A447991_1_En_15_Chapter.html#Par115).\n\n```java\n@RunWith(SpringRunner.class)\n\
    @SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\npublic class SpringbootTestingDemoApplicationTests\n\
    {\n@Autowired\nprivate UserService userService;\n@Autowired\nprivate ApplicationContext\
    \ context;\nprivate Authentication authentication;\n@Before\npublic void init()\
    \ {\nAuthenticationManager authenticationManager =\nthis.context.getBean(AuthenticationManager.class);\n\
    this.authentication = authenticationManager.authenticate(\nnew UsernamePasswordAuthenticationToken(\"\
    admin\", \"admin123\"));\n}\n@After\npublic void close() {\nSecurityContextHolder.clearContext();\n\
    }\n@Test(expected = AuthenticationCredentialsNotFoundException.class)\npublic\
    \ void deleteUserUnauthenticated() {\nuserService.deleteUser(3);\n}\n@Test\npublic\
    \ void deleteUserAuthenticated() {\nSecurityContextHolder.getContext().setAuthentication(this.authentication);\n\
    userService.deleteUser(3);\n}\n}\n```\n\nHere, you are invoking the `deleteUserUnauthenticated()`\
    \ test method without authentication. That means that `userService.deleteUser()`\
    \ will throw `AuthenticationCredentialsNotFoundException`. But in the `deleteUserAuthenticated()`\
    \ test case, you are setting user authentication with valid user credentials to\
    \ the `ADMIN` role, so it will allow you to invoke the `userService.deleteUser()`\
    \ method.\n\n**Approach Two**\n\nSpring Security 4.0 introduced the `@WithMockUser`\
    \ annotation, which allows you to test secured resources even more easily. The\
    \ `@WithMockUser` will by default initialize user authentication with the username\
    \ set to `user`, the password set to `password`, and the role set to `ROLE_USER`.\n\
    \n```java\n@Test\n@WithMockUser\npublic void createUserWithMockUser() {\nUser\
    \ user = new User();\nuser.setName(\"Yosin\");\nuser.setEmail(\"yosin@gmail.com\"\
    );\nuser.setPassword(\"yosin123\");\nuserService.createUser(user);\n}\n```\n\n\
    As `userService.createUser()` is allowed to be called by users with the `ROLE_USER`\
    \ role, you can simply add `@WithMockUser` to run the `createUserWithMockUser()`\
    \ test case.\n\nYou can also explicitly provide `username`, `password`, and `roles`\
    \ to `@WithMockUser`, as follows.\n\n```java\n@Test\n@WithMockUser(username=\"\
    admin\", password=\"admin123\", roles={\"USER\",\"ADMIN\"})\npublic void deleteUserAuthenticatedWithMockUser()\
    \ {\nuserService.deleteUser(2);\n}\n```\n\n**Approach Three**\n\nIn real applications,\
    \ you may have used custom `UserDetailsService` and a custom implementation of\
    \ `UserDetails`. In these cases, you can use `@WithUserDetails` to initialize\
    \ user authentication loaded by using a custom `UserDetailsService`.\n\n```java\n\
    @Test\n@WithUserDetails\npublic void createUserWithUserDetails()\n{\n...\n}\n\
    ```\n\nYou can also pass a specific `username` as `@WithUserDetails(\"admin\"\
    )`, which initializes the user authentication with the `admin` user details loaded\
    \ by using custom `UserDetailsService`.\n\nFor more details on Spring Security\
    \ testing, visit the reference documentation at [`http://docs.spring.io/spring-security/site/docs/current/reference/htmlsingle/#test`](http://docs.spring.io/spring-security/site/docs/current/reference/htmlsingle/#test).\n\
    \n### Testing Persistence Layer Components Using @DataJpaTest and @JdbcTest\n\n\
    You might want to test the persistence layer components of your application, which\
    \ doesn't require loading of many components like controllers, security configuration,\
    \ and so on. Spring Boot provides the `@DataJpaTest` and `@JdbcTest` annotations\
    \ to test the Spring beans, which talk to relational databases.\n\nSpring Boot\
    \ provides the `@DataJpaTest` annotation to test the persistence layer components\
    \ that will autoconfigure in-memory embedded databases and scan for `@Entity`\
    \ classes and Spring Data JPA repositories. The `@DataJpaTest` annotation doesn't\
    \ load other Spring beans `(@Components`, `@Controller`, `@Service`, and annotated\
    \ beans) into `ApplicationContext`.\n\nNow you'll see how to test the Spring Data\
    \ JPA repositories in a Spring Boot application. Create a Spring Boot Maven project\
    \ with the Data-JPA and Test starters.\n\n```xml\n<dependency>\n<groupId>org.springframework.boot</groupId>\n\
    <artifactId>spring-boot-starter-data-jpa</artifactId>\n</dependency>\n<dependency>\n\
    <groupId>com.h2database</groupId>\n<artifactId>h2</artifactId>\n</dependency>\n\
    <dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter-test</artifactId>\n\
    <scope>test</scope>\n</dependency>\n```\n\nCreate a JPA entity called `User` and\
    \ a Spring Data JPA repository called `UserRepository`, as shown in Listing [15-27](#A447991_1_En_15_Chapter.html#Par131).\n\
    \n```java\n@Entity\n@Table(name=\"users\")\npublic class User\n{\n@Id @GeneratedValue(strategy=GenerationType.AUTO)\n\
    private Integer id;\n@Column(nullable=false)\nprivate String name;\n@Column(nullable=false,\
    \ unique=true)\nprivate String email;\n@Column(nullable=false)\nprivate String\
    \ password;\n//setters & getters\n}\npublic interface UserRepository extends JpaRepository\n\
    {\nUser findByEmail(String email);\n}\n```\n\nYou can initialize the `USERS` table\
    \ with some static data using `src/main/resources/data.sql`. See Listing [15-28](#A447991_1_En_15_Chapter.html#Par133).\n\
    \n```sql\ninsert into users(id, email, password, name) values\n(1, 'admin@gmail.com','admin','Admin'),\n\
    (2, 'siva@gmail.com','siva','Siva'),\n(3, 'test@gmail.com','test','Test');\n```\n\
    \nNow you can test `UserRepository` using the `@DataJpaTest` annotation, as shown\
    \ in Listing [15-29](#A447991_1_En_15_Chapter.html#Par135).\n\n```java\n@RunWith(SpringRunner.class)\n\
    @DataJpaTest\npublic class UserRepositoryTests\n{\n@Autowired\nprivate UserRepository\
    \ userRepository;\n@Test\npublic void testFindByEmail() {\nUser user = userRepository.findByEmail(\"\
    admin@gmail.com\");\nassertNotNull(user);\nassertEquals(1, user.getId());\nassertEquals(\"\
    admin\", user.getName());\n}\n}\n```\n\nWhen you run `UserRepositoryTests`, Spring\
    \ Boot will autoconfigure the `H2` in-memory embedded database (as you have the\
    \ `H2` database driver in the classpath) and run the tests.\n\nIf you want to\
    \ run the tests against the actual registered database, you can annotate the test\
    \ with `@AutoConfigureTestDatabase(replace=Replace.NONE)`, which will use the\
    \ registered `DataSource` instead of an in-memory datasource. You can use `Replace.AUTO_CONFIGURED`\
    \ to replace autoconfigured `DataSource` and use `Replace.ANY` (the default) to\
    \ replace any datasource bean that's autoconfigured or explicitly defined.\n\n\
    The `@DataJpaTest` tests are transactional and rolled back at the end of each\
    \ test by default. You can disable this default rollback behavior for a single\
    \ test or for an entire test class by annotating with `@Transactional(propagation\
    \ = Propagation.NOT_SUPPORTED)`. See Listing [15-30](#A447991_1_En_15_Chapter.html#Par139).\n\
    \n```java\n@RunWith(SpringRunner.class)\n@DataJpaTest\npublic class UserRepositoryTests\n\
    {\n@Autowired\nprivate UserRepository userRepository;\n@Test\n@Transactional(propagation\
    \ = Propagation.NOT_SUPPORTED)\npublic void testCreateUser() {\nUser user = new\
    \ User(null, \"john@gmail.com\", \"john\", \"John\");\nuserRepository.save(user);\n\
    //assertions\n}\n@Test\npublic void testUpdateUser() {\nUser user = userRepository.findByEmail(\"\
    admin@gmail.com\");\nuser.setName(\"Administrator\")\nuserRepository.save(user);\n\
    //assertions\n}\n}\n```\n\nWhen the `testCreateUser()` test method runs, the changes\
    \ will not be rolled back, whereas the database changes made in `testUpdateUser()`\
    \ will be automatically rolled back.\n\nThe `@DataJpaTest` annotation also autoconfigures\
    \ `TestEntityManager`, which is an alternative to the JPA `EntityManager` to be\
    \ used in JPA tests. See Listing [15-31](#A447991_1_En_15_Chapter.html#Par142).\n\
    \n```java\n@RunWith(SpringRunner.class)\n@DataJpaTest\npublic class UserRepositoryTests\n\
    {\n@Autowired\nprivate UserRepository userRepository;\n@Autowired\nprivate TestEntityManager\
    \ entityManager;\n@Test\npublic void testFindByEmail() {\nUser user = new User(null,\
    \ \"john@gmail.com\", \"john\", \"John\");\nInteger id = entityManager.persistAndGetId(user,\
    \ Integer.class);\nUser john = userRepository.findByEmail(\"john@gmail.com\");\n\
    assertNotNull(john);\nassertEquals(id, john.getId());\nassertEquals(\"john\",\
    \ user.getName());\n}\n}\n```\n\nThe `TestEntityManager` provides some convenient\
    \ methods—like `persistAndGetId()`, `persistAndFlush()`, and `persistFlushFind()`—which\
    \ are useful in tests.\n\nSimilar to the `@DataJpaTest` annotation, you can use\
    \ `@JdbcTest` to test plain JDBC-related methods using `JdbcTemplate`. The `@JdbcTest`\
    \ annotation also autoconfigures in-memory embedded databases and runs the tests\
    \ in a transactional manner.\n\nNow you'll create a `JdbcUserRepository` to perform\
    \ database operations using `JdbcTemplate`. See Listing [15-32](#A447991_1_En_15_Chapter.html#Par146).\n\
    \n```java\npublic class JdbcUserRepository\n{\nprivate JdbcTemplate jdbcTemplate;\n\
    public JdbcUserRepository(JdbcTemplate jdbcTemplate) {\nthis.jdbcTemplate = jdbcTemplate;\n\
    }\npublic List findAll() {\n....\n....\n}\n}\n```\n\nListing [15-33](#A447991_1_En_15_Chapter.html#Par148)\
    \ shows you how to test `JdbcUserRepository` methods using `@JdbcTest`.\n\n```java\n\
    @RunWith(SpringRunner.class)\n@JdbcTest\npublic class JdbcUserRepositoryTests\n\
    {\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\nprivate JdbcUserRepository\
    \ userRepository;\n@Before\npublic void init()\n{\nuserRepository = new JdbcUserRepository(jdbcTemplate);\n\
    jdbcTemplate.execute(\"create table people(id int, name varchar(100))\");\njdbcTemplate.execute(\"\
    insert into people(id, name) values(1, 'John')\");\njdbcTemplate.execute(\"insert\
    \ into people(id, name) values(2, 'Remo')\");\njdbcTemplate.execute(\"insert into\
    \ people(id, name) values(3, 'Dale')\");\n}\n@Test\npublic void testFindAllUsers()\
    \ throws Exception\n{\nList users = userRepository.findAll();\nassertThat(users.size()).isEqualTo(3);\n\
    }\n}\n```\n\nAs `@jdbcTest` will not load any regular `@Component` Spring beans,\
    \ this example manually creates the `JdbcUserRepository` instance by using the\
    \ autoconfigured `JdbcTemplate` bean.\n\nSimilar to `@DataJpaTest` and `@jdbcTest`,\
    \ Spring Boot provides other annotations like `@DataMongoTest`, `@DataNeo4jTest`,\
    \ `@JooqTest`, `@JsonTest`, and `@DataLdapTest` to test slices of application.\n\
    \n### Summary\n\nIn this chapter, you learned about various techniques that test\
    \ Spring Boot applications. You looked at testing controllers, REST API endpoints,\
    \ and service-layer methods. You also learned how to test secured methods and\
    \ REST endpoints using the Spring Security test module. In the next chapter, you\
    \ will look at how to create your own Spring Boot Starter.\n\n## 16. Creating\
    \ a Custom Spring Boot Starter\n\nThe main purpose of Spring Boot is to increase\
    \ developer productivity by taking an opinionated view of the application and\
    \ autoconfiguring the Spring `ApplicationContext`. Spring Boot provides starters\
    \ for a wide range of commonly used frameworks and libraries. Spring Boot's autoconfiguration\
    \ mechanism takes care of configuring Spring Beans on your behalf based on various\
    \ criteria.\n\nIn addition to the Spring Boot Starters that come out-of-the-box,\
    \ you can also create your own starter modules. You may have some reusable modules\
    \ developed in your organization that are used in many applications. You can create\
    \ your own custom Spring Boot Starter to utilize those reusable modules in a much\
    \ simpler way in Spring Boot applications.\n\nThis chapter looks into how to create\
    \ a custom Spring Boot Starter. To demonstrate it, you are going to create `twitter4j-spring-boot-starter`,\
    \ which will autoconfigure Twitter4j, which is a Java library that interacts with\
    \ the Twitter API.\n\n### Introducing Twitter4j\n\nTwitter4j provides Java bindings\
    \ for the Twitter REST API. In order to use Twitter4j, you need to add the following\
    \ Maven dependency.\n\n```xml\n<dependency>\n<groupId>org.twitter4j</groupId>\n\
    <artifactId>twitter4j-core</artifactId>\n<version>4.0.4</version>\n</dependency>\n\
    ```\n\nThe Twitter4j API main entry point is the `Twitter` class and you can create\
    \ an instance of Twitter, as shown in Listing [16-1](#A447991_1_En_16_Chapter.html#Par7).\n\
    \n```java\nConfigurationBuilder cb = new ConfigurationBuilder();\ncb.setDebugEnabled(true)\n\
    .setOAuthConsumerKey(\"your-consumer-key-here\")\n.setOAuthConsumerSecret(\"your-consumer-secret-here\"\
    )\n.setOAuthAccessToken(\"your-access-token-here\")\n.setOAuthAccessTokenSecret(\"\
    your-access-token-secret-here\");\nTwitterFactory tf = new TwitterFactory(cb.build());\n\
    Twitter twitter = tf.getInstance();\n```\n\nNow you can use `Twitter` instance\
    \ to get the latest tweets, as follows:\n\n```java\nList statuses = twitter.getHomeTimeline();\n\
    for (Status status : statuses)\n{\nSystem.out.println(status.getUser().getName()\
    \ + \":\" + status.getText());\n}\n```\n\nYou are going to create a Spring Boot\
    \ Starter for Twitter4j so that you can autowire `Twitter` instances without having\
    \ to explicitly register them.\n\n### Custom Spring Boot Starter\n\nIn Chapter\
    \ [3](#A447991_1_En_3_Chapter.html), you learned how Spring Boot autoconfiguration\
    \ works by using the `@Conditional` feature.\n\nSpring Boot Starter is typically\
    \ aimed at autoconfiguring some library or framework based on the presence of\
    \ a class or a configuration property or depends on whether a bean of a particular\
    \ type is already registered or not.\n\nCreating a custom Spring Boot Starter\
    \ generally involves:\n\n* Creating an autoconfigure module that autoconfigures\
    \ Spring Beans based on some criteria\n* Creating a starter module that provides\
    \ a dependency to the autoconfigure module along with the dependent libraries\n\
    \nSo, you are going to create:\n\n* The `twitter4j-spring-boot-autoconfigure`\
    \ module, which contains Twitter4j autoconfiguration bean definitions.\n* The\
    \ `twitter4j-spring-boot-starter` module, which pulls in the `twitter4j-spring-boot-autoconfigure`\
    \ and `twitter4j-core` dependencies.\n\nAfter creating the custom Twitter4j starter,\
    \ you will build a Spring Boot application using `twitter4j-spring-boot-starter`.\n\
    \n### Create the twitter4j-spring-boot-autoconfigure Module\n\nNow you will create\
    \ a module called `twitter4j-spring-boot-autoconfigure` and add the Maven dependencies\
    \ such as `spring-boot-autoconfigure`, `twitter4j-core`, and `spring-boot-starter-test`.\
    \ See Listing [16-2](#A447991_1_En_16_Chapter.html#Par21).\n\n```xml\n<project\
    \ xmlns=\"http://maven.apache.org/POM/4.0.0\"\nxmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \nxsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\nhttp://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n<modelVersion>4.0.0</modelVersion>\n<groupId>com.apress</groupId>\n<artifactId>twitter4j-spring-boot-autoconfigure</artifactId>\n\
    <packaging>jar</packaging>\n<version>1.0-SNAPSHOT</version>\n<properties>\n<project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n\
    <java.version>1.8</java.version>\n<maven.compiler.source>1.8</maven.compiler.source>\n\
    <maven.compiler.target>1.8</maven.compiler.target>\n<twitter4j.version>4.0.4</twitter4j.version>\n\
    <spring-boot.version>2.0.0.BUILD-SNAPSHOT</spring-boot.version>\n</properties>\n\
    <dependencyManagement>\n<dependencies>\n<dependency>\n<groupId>org.springframework.boot</groupId>\n\
    <artifactId>spring-boot-dependencies</artifactId>\n<version>${spring-boot.version}</version>\n\
    <type>pom</type>\n<scope>import</scope>\n</dependency>\n</dependencies>\n</dependencyManagement>\n\
    <dependencies>\n<dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-autoconfigure</artifactId>\n\
    </dependency>\n<dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-configuration-processor</artifactId>\n\
    <optional>true</optional>\n</dependency>\n<dependency>\n<groupId>org.springframework.boot</groupId>\n\
    <artifactId>spring-boot-starter-test</artifactId>\n<scope>test</scope>\n</dependency>\n\
    <dependency>\n<groupId>org.twitter4j</groupId>\n<artifactId>twitter4j-core</artifactId>\n\
    <version>${twitter4j.version}</version>\n<optional>true</optional>\n</dependency>\n\
    </dependencies>\n</project>\n```\n\nNote that this example specifies `twitter4j-core`\
    \ as an optional dependency because `twitter4j-core` should be added to the project\
    \ only when `twitter4j-spring-boot-starter` is added to the project.\n\n#### Twitter4j\
    \ Properties to Hold the Twitter4j Config Parameters\n\nNow you'll create `Twitter4jProperties.java`\
    \ to bind the Twitter4j OAuth config parameters that start with `twitter4j.*`\
    \ using `@ConfigurationProperties`. See Listing [16-3](#A447991_1_En_16_Chapter.html#Par24).\n\
    \n```java\npackage com.apress.spring.boot.autoconfigure;\nimport org.springframework.boot.context.properties.ConfigurationProperties;\n\
    @ConfigurationProperties(prefix= Twitter4jProperties.TWITTER4J_PREFIX)\npublic\
    \ class Twitter4jProperties\n{\npublic static final String TWITTER4J_PREFIX =\
    \ \"twitter4j\";\nprivate Boolean debug = false;\nprivate OAuth oauth = new OAuth();\n\
    public Boolean getDebug() {\nreturn debug;\n}\npublic void setDebug(Boolean debug)\
    \ {\nthis.debug = debug;\n}\npublic OAuth getOauth() {\nreturn oauth;\n}\npublic\
    \ static class OAuth {\nprivate String consumerKey;\nprivate String consumerSecret;\n\
    private String accessToken;\nprivate String accessTokenSecret;\npublic String\
    \ getConsumerKey() {\nreturn consumerKey;\n}\npublic void setConsumerKey(String\
    \ consumerKey) {\nthis.consumerKey = consumerKey;\n}\npublic String getConsumerSecret()\
    \ {\nreturn consumerSecret;\n}\npublic void setConsumerSecret(String consumerSecret)\
    \ {\nthis.consumerSecret = consumerSecret;\n}\npublic String getAccessToken()\
    \ {\nreturn accessToken;\n}\npublic void setAccessToken(String accessToken) {\n\
    this.accessToken = accessToken;\n}\npublic String getAccessTokenSecret() {\nreturn\
    \ accessTokenSecret;\n}\npublic void setAccessTokenSecret(String accessTokenSecret)\
    \ {\nthis.accessTokenSecret = accessTokenSecret;\n}\n}\n}\n```\n\nThe `@ConfigurationProperties`\
    \ annotation allows you to bind a set of properties with a common prefix to Java\
    \ bean properties. With this configuration object, you can configure the Twitter4j\
    \ properties in `application.properties`, as shown in Listing [16-4](#A447991_1_En_16_Chapter.html#Par26).\n\
    \n```properties\ntwitter4j.debug=true\ntwitter4j.oauth.consumer-key=your-consumer-key-here\n\
    twitter4j.oauth.consumer-secret=your-consumer-secret-here\ntwitter4j.oauth.access-token=your-access-token-here\n\
    twitter4j.oauth.access-token-secret=your-access-token-secret-here\n```\n\n####\
    \ Twitter4j Autoconfiguration to Autoconfigure Twitter4j\n\nNow you create an\
    \ autoconfiguration class called `Twitter4jAutoConfiguration`, which contains\
    \ the bean definitions that will be automatically configured based on some criteria.\n\
    \nWhat is that criteria?\n\n* If `twitter4j.TwitterFactory.class` is on the classpath\n\
    * If the `TwitterFactory` bean is not already defined explicitly\n\nSo, you are\
    \ going to autoconfigure `TwitterFactory` and the Twitter beans if there is a\
    \ `TwitterFactory` class in the classpath and if the `TwitterFactory` bean is\
    \ not already registered.\n\nCreate the `Twitter4jAutoConfiguration` class, as\
    \ shown in Listing [16-5](#A447991_1_En_16_Chapter.html#Par33).\n\n```java\npackage\
    \ com.apress.spring.boot.autoconfigure;\nimport org.apache.commons.logging.Log;\n\
    import org.apache.commons.logging.LogFactory;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.autoconfigure.condition.ConditionalOnClass;\n\
    import org.springframework.boot.autoconfigure.condition.ConditionalOnMissingBean;\n\
    import org.springframework.boot.context.properties.EnableConfigurationProperties;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import twitter4j.Twitter;\nimport twitter4j.TwitterFactory;\nimport twitter4j.conf.ConfigurationBuilder;\n\
    @Configuration\n@ConditionalOnClass({ TwitterFactory.class })\n@EnableConfigurationProperties(Twitter4jProperties.class)\n\
    public class Twitter4jAutoConfiguration {\nprivate static Log log = LogFactory.getLog(Twitter4jAutoConfiguration.class);\n\
    @Autowired\nprivate Twitter4jProperties properties;\n@Bean\n@ConditionalOnMissingBean\n\
    public TwitterFactory twitterFactory(){\nif (this.properties.getOauth().getConsumerKey()\
    \ == null\n|| this.properties.getOauth().getConsumerSecret() == null\n|| this.properties.getOauth().getAccessToken()\
    \ == null\n|| this.properties.getOauth().getAccessTokenSecret() == null)\n{\n\
    log.error(\"Twitter4j properties not configured properly. Please check twitter4j.*\
    \ properties settings in configuration file.\");\nthrow new RuntimeException(\"\
    Twitter4j properties not configured properly. Please check twitter4j.* properties\
    \ settings in configuration file.\");\n}\nConfigurationBuilder cb = new ConfigurationBuilder();\n\
    cb.setDebugEnabled(properties.getDebug())\n.setOAuthConsumerKey(properties.getOauth().getConsumerKey())\n\
    .setOAuthConsumerSecret(properties.getOauth().getConsumerSecret())\n.setOAuthAccessToken(properties.getOauth().getAccessToken())\n\
    .setOAuthAccessTokenSecret(properties.getOauth().getAccessTokenSecret());\nTwitterFactory\
    \ tf = new TwitterFactory(cb.build());\nreturn tf;\n}\n@Bean\n@ConditionalOnMissingBean\n\
    public Twitter twitter(TwitterFactory twitterFactory){\nreturn twitterFactory.getInstance();\n\
    }\n}\n```\n\nThis example uses `@ConditionalOnClass({ TwitterFactory.class})`\
    \ to specify that this autoconfiguration should take place only when the `TwitterFactory.class`\
    \ class is present.\n\nIt also uses `@ConditionalOnMissingBean` on bean definition\
    \ methods to consider this bean definition only if the `TwitterFactory` bean is\
    \ not already defined explicitly.\n\nAlso note that the example annotated with\
    \ `@EnableConfigurationProperties(Twitter4jProperties.class)` to enable support\
    \ for `ConfigurationProperties` and injected the `Twitter4jProperties` bean.\n\
    \nNow you need to configure the custom `Twitter4jAutoConfiguration` in the `src/main/resources/METAINF/spring.factories`\
    \ file as follows:\n\n```properties\norg.springframework.boot.autoconfigure.EnableAutoConfiguration=\\\
    \ com.apress.spring.boot.autoconfigure.Twitter4jAutoConfiguration\n```\n\nNext\
    \ you are going to create the starter module called `twitter4j-spring-boot-starter`.\n\
    \n### Create the twitter4j-spring-boot-starter Module\n\nNow you'll create a module\
    \ called `twitter4j-spring-boot-starter` and configure its dependencies, as shown\
    \ in Listing [16-6](#A447991_1_En_16_Chapter.html#Par41).\n\n```xml\n<project\
    \ xmlns=\"http://maven.apache.org/POM/4.0.0\"\nxmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \nxsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\nhttp://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n<modelVersion>4.0.0</modelVersion>\n<groupId>com.apress</groupId>\n<artifactId>twitter4j-spring-boot-starter</artifactId>\n\
    <packaging>jar</packaging>\n<version>1.0-SNAPSHOT</version>\n<properties>\n<project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n\
    <java.version>1.8</java.version>\n<maven.compiler.source>1.8</maven.compiler.source>\n\
    <maven.compiler.target>1.8</maven.compiler.target>\n<spring-boot.version>2.0.0.BUILD-SNAPSHOT</spring-boot.version>\n\
    <twitter4j.version>4.0.4</twitter4j.version>\n</properties>\n<dependencyManagement>\n\
    <dependencies>\n<dependency>\n<groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-dependencies</artifactId>\n\
    <version>${spring-boot.version}</version>\n<type>pom</type>\n<scope>import</scope>\n\
    </dependency>\n</dependencies>\n</dependencyManagement>\n<dependencies>\n<dependency>\n\
    <groupId>org.springframework.boot</groupId>\n<artifactId>spring-boot-starter</artifactId>\n\
    </dependency>\n<dependency>\n<groupId>com.apress</groupId>\n<artifactId>twitter4j-spring-boot-autoconfigure</artifactId>\n\
    <version>${project.version}</version>\n</dependency>\n<dependency>\n<groupId>org.twitter4j</groupId>\n\
    <artifactId>twitter4j-core</artifactId>\n<version>${twitter4j.version}</version>\n\
    </dependency>\n</dependencies>\n</project>\n```\n\nNote that in this Maven module,\
    \ you are actually pulling in the `twitter4j-core` dependency.\n\nYou don't need\
    \ to add any code to this module, but you can optionally specify the dependencies\
    \ you are going to provide through this starter in the `src/main/resources/M"
  raw: "### Working with Thymeleaf Forms\n\nThymeleaf offers very good Spring integration\
    \ with support for:\n\n*   Forms with backing beans and result/error bindings\n\
    *   Use of property editors and conversion services\n*   Displaying internationalization\
    \ (i18n) messages using ResourceBundles\n*   Using the Spring Expression Language\
    \ (Spring EL)\n\nIn this section, you see how you can create a user registration\
    \ form using Thymeleaf and handle the form submission using Spring controllers.\n\
    \nCreate a simple POJO called `User.java`, as shown in Listing [10-9](#A447991_1_En_10_Chapter.html#Par119).\n\
    \n```\npublic class User\n{\nprivate Long id;\nprivate String name;\nprivate String\
    \ email;\nprivate String password;\n//setters & getters\n}\nListing 10-9.\nUser.java\n\
    ```\n\nCreate the `registration.html` file in the `src/main/resources/templates`\
    \ directory, as shown in Listing [10-10](#A447991_1_En_10_Chapter.html#Par121).\n\
    \n```\n\nUser Registration\n\nUser Registration Form\n\nName\n\nEmail\n\nPassword\n\
    \nSubmit\n\nListing 10-10.\nThymeleaf Registration View src/main/resources/templates/registration.html\n\
    ```\n\nCreate a SpringMVC controller to handle the `GET` and `POST` requests to\
    \ the `/registration` URL, as shown in Listing [10-11](#A447991_1_En_10_Chapter.html#Par123).\n\
    \n```\n@Controller\npublic class RegistrationController\n{\n@GetMapping(\"/registration\"\
    )\npublic String registrationForm(Model model) {\nmodel.addAttribute(\"user\"\
    , new User());\nreturn \"registration\";\n}\n@PostMapping(\"/registration\")\n\
    public String handleRegistration(User user) {\nlogger.debug(\"Registering User\
    \ : \"+user);\nreturn \"redirect:/login\";\n}\n}\nListing 10-11.\nRegistrationController.java\n\
    ```\n\nWhen you request the `\"/registration\"` URL, a `GET` request is triggered\
    \ and will be handled by the `RegistrationController.registrationForm()` method.\
    \ You are adding the `User` object to `Model` with the `\"user\"` key so that\
    \ you can bind the form properties in your Thymeleaf form.\n\nNote that this example\
    \ uses two Thymeleaf attributes—`th:action` builds a context-relative URL and\
    \ `th:object` specifies the model attribute name.\n\n```\n...\n...\n\n```\n\n\
    The example uses the syntax `th:field=\"*{propertyName}\"` for form input fields\
    \ so that the field will be backed by the model object property. So when you use\
    \ `<input type=\"text\" th:field=\"*{name}\"/>`, the `name` input field value\
    \ will be bounded to the `user.name` property. If you see the source of the rendered\
    \ form, `<input type=\"text\" th:field=\"*{name}\"/>` is rendered as follows:\n\
    \n```\n\nForm Validation\n\nValidating the user submitted data is crucial in web\
    \ applications.\nSpring supports data validation using Spring’s own validation\
    \ framework\nand supports the Java Bean Validation API. \n\nFirst, you need to\
    \ specify the user validation rules using Java Bean\nvalidation annotations.\n\
    \n```\npublic class User\n{\nprivate Long id;\n@NotNull\n@Size(min=3, max=50)\n\
    private String name;\n@NotNull\n@Email(message=\"{invalid.email}\")\nprivate String\
    \ email;\n@NotNull\n@Size(min=6, max=50)\nprivate String password;\n//setters\
    \ & getters\n}\n```\n\nThymeleaf provides the syntax `#fields.hasErrors('fieldName')`\n\
    to check if there are any errors associated with the `fieldName` field.\n\n```\n\
    Incorrect data\n```\n\nYou can use `#fields.hasErrors('global')`\nto check whether\
    \ there are any global errors (not related to any\nspecific fields).\n\nYou can\
    \ now update `registration.html` to\nshow the validation errors, as shown in Listing\
    \ [10-12](#A447991_1_En_10_Chapter.html#Par136).\n\n```\n\nUser Registration\n\
    \nUser Registration Form\n\nIncorrect data\n\nName\n\nIncorrect data\n\nEmail\n\
    \nIncorrect data\n\nPassword\n\nIncorrect data\n\nSubmit\n\nListing 10-12.\nThe\
    \ registration.html File with Validation Error Tags\n```\n\nWith this updated\
    \ form if there are any form validation failures, it\nwill show those errors next\
    \ to the field and all global errors at the\nbeginning. Observe that this example\
    \ uses `th:classappend=\"${#fields.hasErrors('email')}? 'has-error'\"` to add\
    \ some CSS style dynamically if there are any\nerrors.\n\nYou need to update the\
    \ `\"/registration\" POST`\nhandler method to trigger validation for the model\
    \ object. You can add\nthe `@Valid`\nannotation to the model parameter to perform\
    \ validations on the form\nsubmit.\n\nYou also need to define the `BindingResult`\n\
    parameter immediately next to the model\nobject. The validation errors will be\
    \ populated in `BindingResult`, which\nyou can inspect later in your method body.\n\
    \n```\n@Controller\npublic class RegistrationController\n{\n...\n...\n@PostMapping(\"\
    /registration\")\npublic String handleRegistration(@Valid User user, BindingResult\
    \ result) {\nlogger.debug(\"Registering User : \"+user);\nif(result.hasErrors()){\n\
    return \"registration\";\n}\nreturn \"redirect:/registrationsuccess\";\n}\n}\n\
    ```\n\nWhen the form is submitted with invalid data, those validation errors\n\
    will be populated in `BindingResult`. The\nexample checks whether there are any\
    \ errors and redisplays the\nregistration form, which will be rendered along with\
    \ the errors.\n\nSometimes you can’t express all the validation rules using annotations\n\
    only. For example, you want the user e-mail to be unique. You can’t\nimplement\
    \ this without checking against your database.\n\nNext, you’ll see how you can\
    \ use Spring’s Validation framework to\nimplement complex validations.\n\nYou\
    \ can create  `UserValidator` \nby implementing the `org.springframework.validation.Validator`\n\
    interface, as shown in Listing [10-13](#A447991_1_En_10_Chapter.html#Par145).\n\
    \n```\n@Component\npublic class UserValidator implements Validator\n{\n@Autowired\n\
    UserRepository userRepository;\n@Override\npublic boolean supports(Class clazz)\n\
    {\nreturn User.class.isAssignableFrom(clazz);\n}\n@Override\npublic void validate(Object\
    \ target, Errors errors)\n{\nUser user = (User) target;\nString email = user.getEmail();\n\
    User userByEmail = userRepository.findByEmail(email);\nif(userByEmail != null){\n\
    errors.rejectValue(\"email\",\n\"email.exists\",\nnew Object[]{email},\n\"Email\
    \ \"+email+\" already in use\");\n}\n}\n}\nListing 10-13.\nUserValidator.java\n\
    ```\n\nIn the `validate(Object target, Errors errors)` method, you can implement\
    \ any complex\nvalidation logic and register errors.\n\nNow you can inject `UserValidator`\
    \ into\nthe `RegistrationController`\nand use it to validate the model object\
    \ as follows:\n\n```\n@Controller\npublic class RegistrationController\n{\n@Autowired\n\
    private UserValidator userValidator;\n@PostMapping(\"/registration\")\npublic\
    \ String handleRegistration(@Valid User user, BindingResult result) {\nuserValidator.validate(user,\
    \ result);\nif(result.hasErrors()){\nreturn \"registration\";\n}\nreturn \"redirect:/registrationsuccess\"\
    ;\n}\n}\n```\n\nWhen the form is then submitted, if there are any validation failures\
    \ as\nper the Bean Validation Constraint annotations, they will be populated\n\
    in `BindingResult`. After\nthat, the example checks for duplicate e-mails using\
    \ `userValidator.validate(user, result)`. This will add an error to the `email`\
    \ property if the\ngiven e-mail already exists.\n\nFile Uploading\n\nSpring Boot’s\
    \ `org.springframework.boot.autoconfigure.web.servlet.MultipartAutoConfiguration`\n\
    enables multi-part uploads by default.\n\nYou can create a form with `enctype=\"\
    multipart/form-data\"`\nto upload a file, as shown in Listing [10-14](#A447991_1_En_10_Chapter.html#Par152).\n\
    \n```\n\nListing 10-14.\nFile Uploading Form\n```\n\nYou can then implement the\
    \ `FileUploadController`\nto handle the request, as shown in Listing [10-15](#A447991_1_En_10_Chapter.html#Par154).\n\
    \n```\n@PostMapping(\"/uploadMyFile\")\npublic String handleFileUpload(@RequestParam(\"\
    myFile\") MultipartFile file)\n{\nif (!file.isEmpty())\n{\nString name = file.getOriginalFilename();\n\
    try\n{\nbyte[] bytes = file.getBytes();\nFiles.write(new File(name).toPath(),\
    \ bytes);\n}\ncatch (Exception e)\n{\ne.printStackTrace();\n}\n}\nreturn \"redirect:/fileUpload\"\
    ;\n}\nListing 10-15.\nFileUploadController.java\n```\n\nNote that this example\
    \ binds the `file` type input\nparameter `myFile` to the `MultipartFile`\nargument\
    \ with `@RequestParam(\"myFile\")`,\nfrom which you can extract `byte[]` or `InputStream`.\n\
    \nYou can customize multipart configuration using the following\nproperties:\n\
    \n```\nspring.servlet.multipart.enabled=true\nspring.servlet.multipart.max-file-size=2MB\n\
    spring.servlet.multipart.max-request-size=20MB\nspring.servlet.multipart.file-size-threshold=5MB\n\
    ```\n\nUsing ResourceBundles for Internationalization\n(i18n)\n\nBy default, Spring\
    \ Boot’s `org.springframework.boot.autoconfigure.context.MessageSourceAutoConfiguration`\n\
    registers the `MessageSource` bean\nwith the base name `\"messages\"`.\n\nYou\
    \ can add ResourceBundles  such\nas `messages.properties`,\n`messages_en.properties`,\n\
    and `messages_fr.properties`\nin the root classpath, which will be automatically\
    \ picked up by Spring\nBoot. You can also customize the ResourceBundles `basename`\
    \ using the\n`spring.messages.basename`\nproperty.\n\nIn addition to that, Spring\
    \ Boot provides the following customization\nproperties.\n\n```\nspring.messages.basename=messages\n\
    spring.messages.cache-seconds=-1(cache expiration in seconds. If set to -1, bundles\
    \ are cached forever)\nspring.messages.encoding=UTF-8\nspring.messages.fallback-to-system-locale=true\n\
    ```\n\nCreate the default ResourceBundle `messages.properties`\nin `src/main/resources/`\n\
    folder as follows:\n\n```\napp.title=SpringBoot Thymeleaf Demo\napp.version=1.0\n\
    email.exists=Email {0} is already in use.\n```\n\nYou can render these values\
    \ in your Thymeleaf templates using `th:text=\"#{msgKey}\"`.\n\n```\nApp Title\n\
    ```\n\nYou can also obtain these messages programmatically from `MessageSource`,\
    \ as\nshown in Listing [10-16](#A447991_1_En_10_Chapter.html#Par167).\n\n```\n\
    @Controller\npublic class RegistrationController\n{\n@Autowired\nprivate MessageSource\
    \ messageSource;\n....\n....\npublic String handleRegistration(User user)\n{\n\
    ...\nString code=\"email.exists\";\nObject[] args = new Object[]{email};\nString\
    \ defaultMsg = \"Email \"+email+\" already in use\";\nLocale locale = Locale.getDefault();\n\
    String errorMsg =\nmessageSource.getMessage(code, args, defaultMsg, locale);\n\
    ...\n}\n}\nListing 10-16.\nReading i18n Messages Programatically\n```\n\nResourceBundles\
    \ for Hibernate Validation Errors\n\nSpring Boot uses Hibernate Validator  as\n\
    the Bean Validation API implementation. By default, Hibernate validation\nlooks\
    \ for the `ValidationMessages.properties`\nfile in the root classpath for failure\
    \ message keys. If you want to use\n`messages.properties`\nfor both i18n and Hibernate\
    \ Validation error messages, you can register\nthe `Validator`\nbean, as shown\
    \ in Listing [10-17](#A447991_1_En_10_Chapter.html#Par169).\n\n```\n@Configuration\n\
    public class WebConfig implements WebMvcConfigurer\n{\n...\n...\n@Autowired\n\
    private MessageSource messageSource;\n@Override\npublic Validator getValidator()\
    \ {\nLocalValidatorFactoryBean factory = new LocalValidatorFactoryBean();\nfactory.setValidationMessageSource(messageSource);\n\
    return factory;\n}\n}\nListing 10-17.\nUsing MessageSource for Hibernate Validation\
    \ Messages\n```\n\nWith this configuration, both the internationalization (i18n)\
    \ and\nHibernate Validation error message keys will be picked up from the `messages*.properties`\n\
    files.\n\nError Handling\n\nYou can handle exceptions in Spring MVC \napplications\
    \ by registering the `SimpleMappingExceptionResolver`\nbean and configuring which\
    \ view to render for what type of exception, as\nshown in Listing [10-18](#A447991_1_En_10_Chapter.html#Par172).\n\
    \n```\n@Configuration\n@EnableWebMvc\npublic class WebMvcConfig implements WebMvcConfigurer\n\
    {\n@Bean(name=\"simpleMappingExceptionResolver\")\npublic SimpleMappingExceptionResolver\
    \ simpleMappingExceptionResolver()\n{\nSimpleMappingExceptionResolver exceptionResolver\
    \ = new SimpleMappingExceptionResolver();\nProperties mappings = new Properties();\n\
    mappings.setProperty(\"DataAccessException\", \"dbError\");\nmappings.setProperty(\"\
    RuntimeException\", \"error\");\nexceptionResolver.setExceptionMappings(mappings);\n\
    exceptionResolver.setDefaultErrorView(\"error\");\nreturn exceptionResolver;\n\
    }\n}\nListing 10-18.\nHandling Exceptions Using SimpleMappingExceptionResolver\n\
    ```\n\nYou can also use the `@ExceptionHandler`\nannotation to define handler\
    \ methods for specific exception types, as\nshown in Listing [10-19](#A447991_1_En_10_Chapter.html#Par174).\n\
    \n```\n@Controller\npublic class CustomerController\n{\n@GetMapping(\"/customers/{id}\"\
    )\npublic String findCustomer(@PathVariable Long id, Model model)\n{\nCustomer\
    \ c = customerRepository.findById(id);\nif(c == null) throw new CustomerNotFoundException();\n\
    model.add(\"customer\", c);\nreturn \"view_customer\";\n}\n@ExceptionHandler(CustomerNotFoundException.class)\n\
    public ModelAndView handleCustomerNotFoundException(CustomerNotFoundException\
    \ ex)\n{\nModelAndView model = new ModelAndView(\"error/404\");\nmodel.addObject(\"\
    exception\", ex);\nreturn model;\n}\n}\nListing 10-19.\nHandling Exceptions Using\
    \ Controller Level @ExceptionHandler\n```\n\nThe `handleCustomerNotFoundException()`\n\
    method in `CustomerController`\nwill only handle the exception `CustomerNotFoundException`\n\
    raised from `CustomerController @RequestMapping` methods.\n\nYou can handle exceptions\
    \ globally by creating an exception handler\nclass annotated with `@ControllerAdvice`.\n\
    The `@ExceptionHandler`\nmethods in the `@ControllerAdvice`\nclass handle errors\
    \ that occur in any controller request handling\nmethod. See Listing [10-20](#A447991_1_En_10_Chapter.html#Par177).\n\
    \n```\n@ControllerAdvice\npublic class GlobalExceptionHandler\n{\nprivate static\
    \ final Logger logger = LoggerFactory.getLogger(GlobalExceptionHandler.class);\n\
    @ExceptionHandler(DataAccessException.class)\npublic String handleDataAccessException(HttpServletRequest\
    \ request, DataAccessException ex){\nlogger.info(\"DataAccessException Occurred::\
    \ URL=\"+request.getRequestURL());\nreturn \"db_error\";\n}\n@ExceptionHandler(ServletRequestBindingException.class)\n\
    public String servletRequestBindingException(ServletRequestBindingException e)\
    \ {\nlogger.error(\"ServletRequestBindingException occurred: \"+e.getMessage());\n\
    return \"validation_error\"\n}\n}\nListing 10-20.\nGlobal Exception Handler Using\
    \ @ControllerAdvice\n```\n\nSpring Boot registers a global error handler and maps\
    \ `/error` by default,\nwhich renders an HTML response for browser clients and\
    \ a JSON response\nfor REST clients. You can provide the custom error page by\
    \ implementing\n`ErrorController`. See\nListing [10-21](#A447991_1_En_10_Chapter.html#Par179).\n\
    \n```\n@Controller\npublic class GenericErrorController implements ErrorController\n\
    {\nprivate static final String ERROR_PATH = \"/error\";\n@RequestMapping(ERROR_PATH)\n\
    public String error(){\nreturn \"errorPage.html\";\n}\n@Override\npublic String\
    \ getErrorPath() {\nreturn ERROR_PATH;\n}\n}\nListing 10-21.\nImplementing a Custom\
    \ ErrorController\n```\n\nYou can also provide custom error pages based on the\
    \ HTTP error status\ncode. Spring Boot looks for error pages in the `/error` folder\
    \ under\nthe static resource locations (`classpath:/static`,\n`classpath:/public`,\n\
    etc.).\n\nFor example, you can display the `src/main/resources/static/error/404.html`\n\
    file when a 404 error occurs. Likewise, you can also display the `src/main/resources/static/error/5xx.html`\n\
    file for all server errors with `5xx` error status\ncodes.\n\nSummary\n\nThis\
    \ chapter discussed how to develop web applications using Spring Boot\nwith Thymeleaf\
    \ view templates. It also looked at performing form\nvalidations using the Bean\
    \ Validation API and Spring’s validation\nframework. You learned how to handle\
    \ exception scenarios at the\ncontroller level and globally. In the next chapter,\
    \ you will learn about\ndeveloping RESTful web services using Spring Boot.\n\n\
    11. Building REST APIs Using Spring\nBoot\n\nREST (REpresentational State Transfer)\
    \ is an architectural style for\nbuilding distributed systems that provide interoperability\
    \ between\nheterogeneous systems. The need for REST APIs increased a lot with\
    \ the\ndrastic increase of mobile devices. It became logical to build REST APIs\n\
    and let the web and mobile clients consume the API instead of developing\nseparate\
    \ applications. \n\nSpringMVC provides first-class support for building RESTful\
    \ web\nservices. As Spring’s REST support is built on top of SpringMVC, you can\n\
    leverage the knowledge of SpringMVC for building REST APIs.\n\nSpring Data REST\
    \ is a spring portfolio project that can be used to\nexpose Spring Data repositories\
    \ as REST endpoints. You can expose Spring\nData JPA, Spring Data Mongo, and Spring\
    \ Data Cassandra repositories as\nREST endpoints without much effort.\n\nThis\
    \ chapter covers RESTful web services, including how you can build\nREST APIs\
    \ using SpringMVC. Then you will learn about building REST APIs\nusing Spring\
    \ Data REST.\n\nIntroduction to RESTful Web Services\n\nREST stands for representational\
    \ state  transfer  and is an\narchitectural style for designing distributed hypermedia\
    \ systems. The\nterm REST was coined by Roy Fielding in 2000 in his doctoral\n\
    dissertation, which you can find at: [`http://www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%7Efielding/pubs/dissertation/rest_arch_style.htm)\
    \ .\n\nThe fundamental concept of a REST-based system is the resource, which can\
    \ be identified by a\nUniform Resource Identifier (URI). For web-based systems,\
    \ HTTP is the\nmost commonly used protocol for communicating with external systems.\
    \ You\ncan identify a unique resource using a URI.\n\nFor example, a blog post\
    \ can be identified by the URI [`http://www.myblog.com/posts/restful-architecture`](http://www.myblog.com/posts/restful-architecture)\
    \ . A resource can be a  collection resource  , which represents a grouped set\
    \ of\nresources. For example, the URI [ `http://www.myblog.com/posts/`\n](http://www.myblog.com/posts/)\
    \ represents the `posts` resource, which\nmay contain zero or more `Post` resources,\
    \ each\nof which can be identified by its own URI. The various operations that\n\
    can be performed on a resource can be expressed using its URI along with\nthe\
    \ appropriate HTTP method (`GET`, `POST`, `PUT`, `DELETE`, etc.).\n\nAssume for\
    \ example that you’re building a REST API for a blog\napplication. The resources\
    \ that can be identified in a blog domain are\npost, comment, and user.\n\nFollowing\
    \ the REST principles, you can use the following HTTP verbs:\n\n*   `GET`—To get\
    \ a\n    collection or a single resource\n\n*   `POST`—To create\n    a new resource\n\
    \n*   `PUT`—To update\n    an existing resource\n\n*   `DELETE`—To\n    delete\
    \ a collection or a single resource\n\nNow consider how you can define URIs for\
    \ a blog system’s resources:\n\n*   `GET`—`http://localhost:8080/myblog/posts/`:\n\
    \    Returns a list of all posts\n\n*   `GET`—`http://localhost:8080/myblog/posts/2`:\n\
    \    Returns a post whose ID is 2\n\n*   `POST`—`http://localhost:8080/myblog/posts/`:\n\
    \    Creates a new `Post` resource\n\n*   `PUT`—`http://localhost:8080/myblog/posts/2`:\n\
    \    Updates a POST resource whose ID is 2\n\n*   `DELETE`—`http://localhost:8080/myblog/posts/2`:\n\
    \    Deletes a POST resource whose ID is 2\n\n*   `GET`—`http://localhost:8080/myblog/posts/2/comments`:\n\
    \    Returns all the comments of the post whose ID is `2`\n\n*   `POST`—`http://localhost:8080/myblog/posts/2/comments`:\n\
    \    Creates a new comment for the `POST` whose ID is 2\n\n*   `DELETE`—`http://localhost:8080/myblog/posts/2/comments`:\n\
    \    Deletes all the comments of the `POST` whose ID is 2\n\nThe most commonly\
    \ used data exchange formats (ContentTypes) are JSON and\nXML. The typical practice\
    \ of determining the input request content and\noutput response types in web based\
    \ systems are based on the `ContentType` and `Accept` header values.\n\nREST API\
    \ Using SpringMVC\n\nSpringMVC provides support for building RESTful web services\
    \ and Spring\nBoot makes it much easier with its autoconfiguration mechanism.\n\
    \nListing [11-1](#A447991_1_En_11_Chapter.html#Par26) shows a SpringMVC -based\
    \ REST\nendpoint.\n\n```\n@Controller\npublic class PostController\n{\n@Autowired\n\
    PostRepository postRepository;\n@ResponseBody\n@GetMapping(\"/posts\")\npublic\
    \ List listPosts()\n{\nreturn postRepository.findAll();\n}\n}\nListing 11-1.\n\
    SpringMVC REST Controller\n```\n\nIt just looks like a normal SpringMVC controller,\
    \ with two noticeable\ndifferences:\n\n*   Unlike the normal controller methods,\
    \ which return a view name or a\n    `ModelAndView`\n    object, the  `listPosts()`\
    \ method\n     returns a list of `Post` objects.\n\n*   The `listPosts()`\n  \
    \  request handler method is annotated with `@ResponseBody`.\n\nThe `@ResponseBody`\n\
    annotation on the request handler method indicates that the return value\nshould\
    \ be bound to the response body. If you make a `GET` request to the\n`\"/posts\"\
    ` URL,\nyou might get a JSON or XML representation of the list of `Post` objects\
    \ based on\nthe `Accept`\nheader value.\n\nListing [11-2](#A447991_1_En_11_Chapter.html#Par32)\
    \ shows another\nmethod used to create a new post.\n\n```\n@Controller\npublic\
    \ class PostController\n{\n@Autowired\nPostRepository postRepository;\n...\n...\n\
    @ResponseBody\n@PostMapping(\"/posts\")\npublic Post createPost(@RequestBody Post\
    \ post)\n{\nreturn postRepository.save(post);\n}\n}\nListing 11-2.\nREST Controller\
    \ Method Using @RequestBody Annotation\n```\n\nIn the  `createPost()` handler\n\
    method , the interesting part is the `@RequestBody`\nannotation. The `@RequestBody`\n\
    annotation will take care of binding the web request body to the method\nparameter\
    \ with the help of the registered `HttpMessageConverter`s.\nSo, when you make\
    \ a `POST` request to the\n`\"/post\"` URL\nwith a `Post`\nJSON body, `HttpMessageConverters`\n\
    converts the JSON request body into a `Post` object and\npasses it to the `savePost()`\
    \ method.\n\nIf all of your handler methods are REST endpoint handler methods,\
    \ you\ncan have a `@ResponseBody` at the\nclass level instead of adding it to\
    \ each method. Even better, you can\nuse `@RestController`,\nwhich is a composed\
    \ annotation of `@Controller` and `@ResponseBody`.\n\nNow you’ll take a deep look\
    \ at implementing the REST API for a simple\nblog application using Spring Data\
    \ JPA, SpringMVC, and, of course,\nSpring Boot.\n\n1.  Create a Spring Boot project\
    \ and configure the Web and JPA starters.\n\n    Create a Spring Boot Maven project\
    \ and add the following starters:\n\n    ```\n    org.springframework.boot\n \
    \   spring-boot-starter-web\n\n    org.springframework.boot\n    spring-boot-starter-data-jpa\n\
    \n    com.h2database\n    h2\n\n    ```\n\n    Model the REST resources. This\
    \ example assumes your blog application is\n    a simple one where the administrator\
    \ can create posts, and the blog\n    viewers can view and add their comments\
    \ to the posts. You can therefore\n    identify that there will be `User`, `Post,`\
    \ and `Comment` resources in\n    the application domain.\n\n    First, you create\
    \ these resources as JPA entities , as shown in\n    Listing [11-3](#A447991_1_En_11_Chapter.html#Par41).\n\
    \n    ```\n    @Entity\n    @Table(name = \"USERS\")\n    public class User\n\
    \    {\n    @Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private\
    \ Integer id;\n    @Column(name = \"name\", nullable = false, length = 150)\n\
    \    private String name;\n    @Column(name = \"email\", nullable = false, length\
    \ = 150)\n    private String email;\n    @Column(name = \"password\", nullable\
    \ = false, length = 150)\n    private String password;\n    //setters & getters\n\
    \    }\n    @Entity\n    @Table(name = \"POSTS\")\n    public class Post\n   \
    \ {\n    @Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private\
    \ Integer id;\n    @Column(name = \"title\", nullable = false, length = 150)\n\
    \    private String title;\n    @Lob\n    @Column(name = \"content\", nullable\
    \ = false, columnDefinition=\"TEXT\")\n    private String content;\n    @Temporal(TemporalType.TIMESTAMP)\n\
    \    @Column(name=\"created_on\")\n    private Date createdOn = new Date();\n\
    \    @Temporal(TemporalType.TIMESTAMP)\n    @Column(name=\"updated_on\")\n   \
    \ private Date updatedOn;\n    @OneToMany\n    @JoinColumn(name=\"post_id\")\n\
    \    private List comments;\n    //setters & getters\n    }\n    @Entity\n   \
    \ @Table(name = \"COMMENTS\")\n    public class Comment\n    {\n    @Id @GeneratedValue(strategy\
    \ = GenerationType.IDENTITY)\n    private Integer id;\n    @Column(name = \"name\"\
    , nullable = false, length = 150)\n    private String name;\n    @Column(name\
    \ = \"email\", nullable = false, length = 150)\n    private String email;\n  \
    \  @Lob\n    @Column(name = \"content\", nullable = false, columnDefinition=\"\
    TEXT\")\n    private String content;\n    @Temporal(TemporalType.TIMESTAMP)\n\
    \    @Column(name=\"created_on\")\n    private Date createdOn = new Date();\n\
    \    @Temporal(TemporalType.TIMESTAMP)\n    @Column(name=\"updated_on\")\n   \
    \ private Date updatedOn;\n    //setters & getters\n    }\n    Listing 11-3.\n\
    \    JPA Entities User.java, Post.java, and Comment.java\n    ```\n\n2.  Now you\
    \ create the Spring Data JPA repositories for the JPA entities you\n    just created,\
    \ as shown in Listing [11-4](#A447991_1_En_11_Chapter.html#Par43).\n\n    ```\n\
    \    public class UserRepository extends JpaRepository\n    {\n    }\n    public\
    \ class PostRepository extends JpaRepository\n    {\n    }\n    public class CommentRepository\
    \ extends JpaRepository\n    {\n    }\n    Listing 11-4.\n    JPA Repositories\
    \ for the User, Post, and Comment Entities\n    ```\n\n3.  Now you create a SpringMVC\
    \ controller to implement all the `Post` resource related\n    REST endpoints:\n\
    \n    ```\n    @RestController\n    @RequestMapping(value=\"/posts\")\n    public\
    \ class PostController\n    {\n    @Autowired\n    PostRepository postRepository;\n\
    \    @Autowired\n    CommentRepository commentRepository;\n    ...\n    ...\n\
    \    }\n    ```\n\n    This example uses `@RestController`, as\n    all the request\
    \ handler methods are REST endpoints only. Also, it\n    annotates with `@RequestMapping(value=\"\
    /posts\")`\n    to have the common root URL named `\"/posts\"` so that you\n \
    \   don’t have to repeat it for each method.\n\n    Before jumping on to implementing\
    \ REST endpoints, first you need to\n    create a custom exception class, called\
    \ `ResourceNotFoundException`\n    (Listing [11-5](#A447991_1_En_11_Chapter.html#Par48)).\
    \ It will be\n    thrown when the client sends a request to get the details of\
    \ a resource\n    that doesn’t exist.\n\n    ```\n    @ResponseStatus(HttpStatus.NOT_FOUND)\n\
    \    public class ResourceNotFoundException extends RuntimeException\n    {\n\
    \    public ResourceNotFoundException() {\n    this(\"Resource not found!\");\n\
    \    }\n    public ResourceNotFoundException(String message) {\n    this(message,\
    \ null);\n    }\n    public ResourceNotFoundException(String message, Throwable\
    \ cause) {\n    super(message, cause);\n    }\n    }\n    Listing 11-5.\n    ResourceNotFoundException.java\n\
    \    ```\n\n    Note that the example annotates the `ResourceNotFoundException`\n\
    \    class with `@ResponseStatus(HttpStatus.NOT_FOUND)`\n    so that when the\
    \ request handler method throws `ResourceNotFoundException`,\n    the proper HTTP\
    \ error status code (404 `NOT_FOUND` ) will be returned to the client.\n\n   \
    \ You’ll start by implementing the endpoint for creating a new post. As\n    per\
    \ the REST principles, you use `http://localhost:8080/posts`\n    as the URI and\
    \ an HTTP `POST` method to create\n    a new post. If the `POST` creation is\n\
    \    successful, you return the appropriate HTTP status code (201 `CREATED`) along\
    \ with\n    newly created post as the `Response` body.\n\n    ```\n    @ResponseStatus(HttpStatus.CREATED)\n\
    \    @PostMapping(\"\")\n    public Post createPost(@RequestBody Post post)\n\
    \    {\n    return postRepository.save(post);\n    }\n    ```\n\n    By default,\
    \ if the request handling method completes successfully, the\n    HTTP status\
    \ code `200 OK` will be returned. So, you are annotating with `@ResponseStatus(HttpStatus.CREATED)`\n\
    \    explicitly to return the appropriate HTTP status code (201 `CREATED`).\n\n\
    \    Next you will implement the endpoint for fetching all posts for which\n \
    \   the endpoint URL will be `GET http://localhost:8080/posts`.\n\n    ```\n \
    \   @GetMapping(\"\")\n    public List listPosts()\n    {\n    return postRepository.findAll();\n\
    \    }\n    ```\n\n    This example is loading all the posts from the database\
    \ and returning\n    them as a response.\n\n    Next, you will implement the endpoint\
    \ for fetching a post for the given\n    ID for which the endpoint URL will be\
    \ `GET http://localhost:8080/posts/{id}`.\n\n    ```\n    @GetMapping(value=\"\
    /{id}\")\n    public Post getPost(@PathVariable(\"id\") Integer id)\n    {\n \
    \   return postRepository.findById(id)\n    .orElseThrow(() -> new ResourceNotFoundException(\"\
    No post found with id=\"+id));\n    }\n    ```\n\n    This example is getting\
    \ the `Post` object from the\n    database for the given ID and throwing `ResourceNotFoundException`\n\
    \    if the post is not found; otherwise, it returns the `POST` object.\n\n  \
    \  Next, you need to implement the endpoint for updating a post for the\n    given\
    \ ID for which the endpoint URL will be `PUT http://localhost:8080/posts/{id}`.\n\
    \n    ```\n    @PutMapping(\"/{id}\")\n    public Post updatePost(@PathVariable(\"\
    id\") Integer id, @RequestBody Post post)\n    {\n    postRepository.findById(id)\n\
    \    .orElseThrow(() -> new ResourceNotFoundException(\"No post found with id=\"\
    +id));\n    return  postRepository.save(post);\n    }\n    ```\n\n    The example\
    \ gets the `Post` object from the\n    database for the given ID and throws the\
    \ `ResourceNotFoundException`\n    if the post not found, otherwise updating the\
    \ post.\n\n    Similarly, you can implement the endpoint by deleting a post using\
    \ the\n    HTTP `DELETE`\n    method at the URI `http://localhost:8080/posts/{id}`,\n\
    \    as follows:\n\n    ```\n    @DeleteMapping(\"/{id}\")\n    public void deletePost(@PathVariable(\"\
    id\") Integer id)\n    {\n    Post post = postRepository.findById(id)\n    .orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\n    postRepository.deleteById(post.getId());\n\
    \    }\n    ```\n\n    Note that you are not returning any content to the client,\
    \ so on\n    successful deletion of the post, the HTTP 200 `OK` status code will\n\
    \    be sent.\n\n    You can also implement the REST endpoints for creating new\
    \ comments and\n    deleting an existing comment for a given post as follows:\n\
    \n    ```\n    @ResponseStatus(HttpStatus.CREATED)\n    @PostMapping(\"/{id}/comments\"\
    )\n    public void createPostComment(@PathVariable(\"id\") Integer id, @RequestBody\
    \ Comment comment)\n    {\n    Post post = postRepository.findById(id)\n    .orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\n    post.getComments().add(comment);\n\
    \    }\n    @DeleteMapping(\"/{postId}/comments/{commentId}\")\n    public void\
    \ deletePostComment(@PathVariable(\"postId\") Integer postId,\n    @PathVariable(\"\
    commentId\") Integer commentId)\n    {\n    commentRepository.deleteById(commentId);\n\
    \    }\n    ```\n\n    You can also add validation for the REST endpoint handler\
    \ methods,\n    similar to SpringMVC controllers for traditional web applications.\
    \ See\n    Listing [11-16](#A447991_1_En_11_Chapter.html#Par68).\n\n    ```\n\
    \    @ResponseStatus(HttpStatus.CREATED)\n    @PostMapping(value=\"\")\n    public\
    \ Post createPost(@RequestBody @Valid Post post, BindingResult result)\n    {\n\
    \    if(result.hasErrors()){\n    //handle errors\n    //throw Exception with\
    \ Invalid data details\n    }\n    return postRepository.save(post);\n    }\n\
    \    Listing 11-6.\n    Performing Validation Using the Java Bean Validation API\n\
    \    ```\n\n    This example adds the `@Valid` annotation to\n    the method parameter\
    \ `Post` so that the post\n    object data will be validated against the Java\
    \ Bean Validation\n    Constraints defined on the `POST` properties.\n\n4.  In\
    \ addition to returning a arbitrary object from request handler\n    methods,\
    \ you can also return `ResponseEntity/HttpEntity`,\n    which provides an easy\
    \ way to set response headers and the status code.\n    See Listing [11-7](#A447991_1_En_11_Chapter.html#Par71).\n\
    \n    ```\n    @PostMapping(\"\")\n    public ResponseEntity createPost(@RequestBody\
    \ @Valid Post post, BindingResult result)\n    {\n    if(result.hasErrors()){\n\
    \    return new ResponseEntity(post, HttpStatus.BAD_REQUEST);\n    }\n    Post\
    \ savedPost = postRepository.save(post);\n    HttpHeaders responseHeaders = new\
    \ HttpHeaders();\n    responseHeaders.set(\"MyResponseHeader1\", \"MyValue1\"\
    );\n    responseHeaders.set(\"MyResponseHeader2\", \"MyValue2\");\n    return\
    \ new ResponseEntity(savedPost, responseHeaders, HttpStatus.CREATED);\n    }\n\
    \    Listing 11-7.\n    Using ResponseEntity for Fine-Grained Control Over Responses\n\
    \    ```\n\n    This code is verifying whether there are any validation errors\
    \ and is\n    returning a response with the status code `BAD_REQUEST` (400).\n\
    \    Otherwise, it saves the post and adds custom response headers. It then\n\
    \    returns with a status code of `CREATED` (201).\n\n    The `ResponseEntity/HttpEntity`\n\
    \    classes can also be used along with `RestTemplate` to\n    consume REST services,\
    \ which is discussed in the next section.\n\n5.  You can test the REST endpoints\
    \ using any REST client tools such as\n    Chrome Browser’s Postman ( [`http://www.getpostman.com/`](http://www.getpostman.com/)\
    \ ) or the Advanced REST Client ( [`https://chromerestclient.appspot.com/`](https://chromerestclient.appspot.com/)\
    \ ) extensions.\n\nYou can also use Spring’s `RestTemplate` as a\nclient to invoke\
    \ RESTful services. Now you’ll test the REST endpoints\nyou have implemented using\
    \ `RestTemplate`.\n\nFirst, you need to populate some sample data using the SQL\
    \ script , as shown\nin Listing [11-8](#A447991_1_En_11_Chapter.html#Par77).\n\
    \n```\ndelete from  users;\nINSERT INTO users (id, email, password, name) VALUES\n\
    (1, 'admin@gmail.com', 'admin', 'Admin'),\n(2, 'david@gmail.com', 'david', 'David'),\n\
    (3, 'ron@gmail.com', 'ron', 'Ron');\ninsert into posts(id, title, content, created_on,\
    \ updated_on) values\n(1, 'Introducing SpringBoot', 'SpringBoot is awesome', '2017-05-10',\
    \ null),\n(2, 'Securing Web applications', 'This post will show how to use SpringSecurity',\
    \ '2017-05-20', null),\n(3, 'Introducing Spring Social', 'Developing social web\
    \ applications using Spring Social', '2017-05-24', null);\ninsert into comments(id,\
    \ post_id, name, email, content, created_on, updated_on) values\n(1, 1, 'John','john@gmail.com',\
    \ 'This is cool', '2017-05-10', null),\n(2, 1, 'Rambo','rambo@gmail.com', 'Thanks\
    \ for awesome tips', '2017-05-20', null),\n(3, 2, 'Paul', 'paul@gmail.com', 'Nice\
    \ post buddy.', '2017-05-24', null);\nListing 11-8.\nsrc/test/resources/data.sql\n\
    ```\n\nNow you’ll write a Spring Boot test that starts an embedded servlet\ncontainer\
    \ on a defined port (`server.port` value)\nand uses `RestTemplate` to\ninvoke\
    \ the REST API endpoints. See Listing [11-9](#A447991_1_En_11_Chapter.html#Par79).\n\
    \n```\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.DEFINED_PORT)\n\
    public class SpringbootMvcRestDemoApplicationTest\n{\nprivate static final String\
    \ ROOT_URL = \"http://localhost:8080\";\nRestTemplate restTemplate = new RestTemplate();\n\
    @Test\npublic void testGetAllPosts()\n{\nResponseEntity responseEntity =\nrestTemplate.getForEntity(ROOT_URL+\"\
    /posts\", Post[].class);\nList posts = Arrays.asList(responseEntity.getBody());\n\
    assertNotNull(posts);\n}\n@Test\npublic void testGetPostById()\n{\nPost post =\
    \ restTemplate.getForObject(ROOT_URL+\"/posts/1\", Post.class);\nassertNotNull(post);\n\
    }\n@Test\npublic void testCreatePost()\n{\nPost post = new Post();\npost.setTitle(\"\
    Exploring SpringBoot REST\");\npost.setContent(\"SpringBoot is awesome!!\");\n\
    post.setCreatedOn(new Date());\nResponseEntity postResponse =\nrestTemplate.postForEntity(ROOT_URL+\"\
    /posts\", post, Post.class);\nassertNotNull(postResponse);\nassertNotNull(postResponse.getBody());\n\
    }\n@Test\npublic void testUpdatePost()\n{\nint id = 1;\nPost post = restTemplate.getForObject(ROOT_URL+\"\
    /posts/\"+id, Post.class);\npost.setContent(\"This my updated post1 content\"\
    );\npost.setUpdatedOn(new Date());\nrestTemplate.put(ROOT_URL+\"/posts/\"+id,\
    \ post);\nPost updatedPost = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id,\
    \ Post.class);\nassertNotNull(updatedPost);\n}\n@Test\npublic void testDeletePost()\n\
    {\nint id = 2;\nPost post = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id,\
    \ Post.class);\nassertNotNull(post);\nrestTemplate.delete(ROOT_URL+\"/posts/\"\
    +id);\ntry {\npost = restTemplate.getForObject(ROOT_URL+\"/posts/\"+id, Post.class);\n\
    }\ncatch (final HttpClientErrorException e) {\nassertEquals(e.getStatusCode(),\
    \ HttpStatus.NOT_FOUND);\n}\n}\n}\nListing 11-9.\nTesting REST Endpoints Using\
    \ RestTemplate\n```\n\nYou have used various methods on `RestTemplate` to\ninvoke\
    \ the REST services triggering `GET`, `POST`, `PUT`, and `DELETE` operations.\n\
    You then received the responses as Java objects using the `HttpMessageConverter`s.\n\
    \nCORS\n(Cross-Origin Resource Sharing)  Support\n\nFor security reasons, browsers\
    \ don’t allow you to make AJAX requests to\nresources residing outside of the\
    \ current origin. CORS  specification\n( [`https://www.w3.org/TR/cors/`](https://www.w3.org/TR/cors/)\
    \ ) provides a way to specify which cross-origin\nrequests are permitted. SpringMVC\
    \ provides support for enabling CORS for\nREST API endpoints so that the API consumers,\
    \ such as web clients and\nmobile devices, can make calls to REST APIs.\n\nClass-\
    \ and Method-Level\n CORS Configuration\n\nYou can enable CORS at the controller\
    \ level or at the method level using\nthe `@CrossOrigin`\nannotation. Now you’ll\
    \ see how you can enable CORS support on a specific\nrequest handling method.\n\
    \n```\n@RestController\npublic class UserController\n{\n@CrossOrigin\n@GetMapping(\"\
    /users/{id}\")\npublic User getUser(@PathVariable Long id) {\n// ...\n}\n@DeleteMapping(\"\
    /users/{id}\")\npublic void deleteUser(@PathVariable Long id) {\n// ...\n}\n}\n\
    ```\n\nHere, the CORS support enables only the  `forgetUsers()` method\n using\
    \ the default configuration.\n\n*   All headers and origins are permitted\n\n\
    *   Credentials are allowed\n\n*   Maximum age is set to 30 minutes\n\n*   The\
    \ list of HTTP methods is set to the methods on the `@RequestMethod`\n    annotation\n\
    \nYou can customize these properties by providing options on the `@CrossOrigin`\n\
    annotation.\n\n```\n@CrossOrigin(origins={\"http://domain1.com\", \"http://domain2.com\"\
    },\nallowedHeaders=\"X-AUTH-TOKEN\",\nallowCredentials=\"false\",\nmaxAge=15*60,\n\
    methods={RequestMethod.GET, RequestMethod.POST }\n)\n@GetMapping(\"/users/{id}\"\
    )\npublic User getUser(@PathVariable Long id) {\n// ...\n}\n```\n\nSimilarly,\
    \ you can apply the `@CrossOrigin`\nannotation at the controller class level.\n\
    \n```\n@CrossOrigin\n@RestController\npublic class UserController\n{\n....\n....\n\
    }\n```\n\nWhen applied at the class level, the same `@CrossOrigin`\nconfiguration\
    \ is applied to all the `@RequestMapping`\nmethods. If the `@CrossOrigin`\nannotation\
    \ is specified at both the class level and the method level,\nSpring will derive\
    \ the CORS configuration by combining attributes from\nboth annotations.\n\nGlobal\
    \ CORS Configuration\n\nIn addition to specifying CORS configuration at the class\
    \ and method\nlevels, you can configure it globally by implementing the  `WebMvcConfigurer.addCorsMappings()`\n\
    method . See Listing [11-10](#A447991_1_En_11_Chapter.html#Par95).\n\n```\n@Configuration\n\
    public class WebConfig implements WebMvcConfigurer\n{\n@Override\npublic void\
    \ addCorsMappings(CorsRegistry registry) {\nregistry.addMapping(\"/api/**\")\n\
    .allowedOrigins(\"http://localhost:3000\")\n.allowedMethods(\"*\")\n.allowedHeaders(\"\
    *\")\n.allowCredentials(false)\n.maxAge(3600);\n}\n}\nListing 11-10.\nSpringMVC\
    \ Global CORS Configuration\n```\n\nThis configuration enables the CORS for URL\
    \ pattern `/api/**` from the\norigin `http://localhost:3000`\nonly. You can specify\
    \ `allowedOrigins(\"*\")`\nto allow requests from any origin.\n\nExposing JPA\
    \ Entities with Bi-Directional References\nThrough RESTful Services\n\nYou need\
    \ to take extra care when exposing JPA entities with\nbi-directional references\
    \ through RESTful services. If you try to\nmarshal a JPA parent entity (say `Post`)\
    \ that has a\ncollection of child entities (say `List<Comment>`)\nand the child\
    \ has a reference back to the parent (`Post`), then the JPA\nmarshaling will end\
    \ up in infinite recursion and will throw  `StackOverflowError`\n.\n\nAssume you\
    \ have the following `Post` and `Comment` entities:\n\n```\n@Entity\n@Table(name\
    \ = \"POSTS\")\npublic class Post\n{\n@Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n\
    private Integer id;\n@Column(name = \"title\", nullable = false, length = 150)\n\
    private String title;\n....\n....\n@OneToMany(mappedBy=\"post\")\nprivate List\
    \ comments;\n//setters & getters\n}\n@Entity\n@Table(name = \"COMMENTS\")\npublic\
    \ class Comment\n{\n@Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n\
    private Integer id;\n@Column(name = \"name\", nullable = false, length = 150)\n\
    private String name;\n...\n...\n@ManyToOne(optional=false)\n@JoinColumn(name=\"\
    post_id\")\nprivate Post post;\n//setters & getters\n}\n```\n\nHere, you have\
    \ a bi-directional association between the `Post` and `Comment` entities. Now\n\
    assume you are exposing a REST endpoint to get a `Post` by its `id` as follows:\n\
    \n```\n@GetMapping(\"/{id}\")\npublic Post getPost(@PathVariable(\"id\") Integer\
    \ id)\n{\nreturn postRepository.findById(id)\n.orElseThrow(() -> new ResourceNotFoundException(\"\
    No post found with id=\"+id));\n}\n```\n\nIf you access `http://localhost:8080/posts/1`,\n\
    the code will enter infinite recursion and the server will throw `StackOverflowError`.\n\
    \nSpring Boot by default configures the Jackson JSON ( [`https://github.com/FasterXML/jackson-databind`](https://github.com/FasterXML/jackson-databind)\
    \ ) library to marshal/unmarshal Java beans into JSON\nand vice versa.\n\nYou\
    \ can fix the infinite recursion problem by using the Jackson JSON\nlibrary annotations\
    \ in the following ways.\n\nUsing @JsonIgnore\n\nYou can break the infinite recursion\
    \ by adding the  `@JsonIgnore`\nannotation  on the back reference from the child\
    \ object.\n\n```\n@Entity\n@Table(name = \"COMMENTS\")\npublic class Comment\n\
    {\n...\n...\n@JsonIgnore\n@ManyToOne(optional=false)\n@JoinColumn(name=\"post_id\"\
    )\nprivate Post post;\n...\n...\n}\n```\n\nYou can add `@JsonIgnore` on all\n\
    the properties that you want to exclude from marshaling or you can use\n`@JsonIgnoreProperties`\n\
    at the class level to list all the property names to ignore.\n\n```\n@JsonIgnoreProperties({\"\
    post\"})\n@Entity\n@Table(name = \"COMMENTS\")\npublic class Comment\n{\n....\n\
    ....\n}\n```\n\nNow you should be able to access `http://localhost:8080/posts/1`\n\
    and get response JSON.\n\nUsing @JsonManagedReference and\n@JsonBackReference\n\
    \nYou can break the infinite recursion by using `@`  `JsonManagedReference`\n\
    \ and  `@JsonBackReference`\nannotations  as well.\n\nNote\n\nThe `@JsonManagedReference`\n\
    annotation is used to indicate that the annotated property is part of a\ntwo-way\
    \ linkage between fields and that its role is as a \"parent\" (or\n\"forward\"\
    ) link. The `@JsonBackReference`\nannotation is also used to indicate that the\
    \ associated property is part\nof a two-way linkage between fields, but its role\
    \ is as a \"child\" (or\n\"back\") link.\n\nYou will annotate the `List<Comment>`\n\
    collection in `Post` with `@JsonManagedReference`,\nas it is the parent in the\
    \ context of marshaling the `Post` object. You will\nannotate the back reference\
    \ property `POST` in the `Comment` class with\n`@JsonBackReference`,\nas it is\
    \ the back link to the parent `Post` object.\n\n```\n@Entity\n@Table(name = \"\
    POSTS\")\npublic class Post\n{\n....\n....\n@JsonManagedReference\n@OneToMany(mappedBy=\"\
    post\")\nprivate List comments;\n//setters & getters\n}\n@Entity\n@Table(name\
    \ = \"COMMENTS\")\npublic class Comment\n{\n....\n....\n@JsonBackReference\n@ManyToOne(optional=false)\n\
    @JoinColumn(name=\"post_id\")\nprivate Post post;\n//setters & getters\n}\n```\n\
    \nAt times, you may need more control over the response formats and can’t\nor\
    \ don’t want to directly expose database entities as REST endpoint\nresponses.\
    \ In that case, you can use Data Transfer Objects (DTOs), which\nyou can populate\
    \ from entities using Java Object Mapper libraries such\nas Dozer ( [`http://dozer.sourceforge.net/`](http://dozer.sourceforge.net/)\
    \ ), ModelMapper ( [`http://modelmapper.org/`](http://modelmapper.org/) ), and\
    \ MapStruct ( [`http://mapstruct.org/`](http://mapstruct.org/) ).\n\nREST API\
    \ Using Spring Data REST\n\nIn the previous section, you implemented the REST\
    \ API with CRUD\noperations for JPA entities. If your application needs are more\
    \ like a\nREST API with CRUD\noperations  on top of database tables, you can use\
    \ Spring Data\nREST.\n\nSpring Data REST builds on top of the Spring Data repositories\
    \ and\nautomatically exports them as REST resources. Spring Data REST\nconfiguration\
    \ is defined in the configuration class `RepositoryRestMvcConfiguration`\nand\
    \ you can simply import it using `@Import(RepositoryRestMvcConfiguration.class)`\n\
    to activate it in our application.\n\nSpring Boot will automatically enable Spring\
    \ Data REST if you add `spring-boot-starter-data-rest`\nto your application.\n\
    \n```\norg.springframework.boot\nspring-boot-starter-data-rest\n\n```\n\nTo expose\
    \ the Spring Data repositories as REST resources with the\ndefaults, you don’t\
    \ need to add any extra configuration. You can simply\ncreate the JPA entities\
    \ and Spring Data JPA repositories as shown in the\nprevious section.\n\nNow you\
    \ can run the following entry point class to start the server.\n\n```\n@SpringBootApplication\n\
    public class SpringbootDataRestDemoApplication\n{\npublic static void main(String[]\
    \ args)\n{\nSpringApplication.run(SpringbootDataRestDemoApplication.class, args);\n\
    }\n}\n```\n\nAssuming you created the JPA entities `User`, `Post`, and `Comment`\
    \ and their JPA\nrepositories as shown in the previous section, you’ll now invoke\
    \ the\nREST services using the Postman REST client tool.\n\nInvoke the `http://localhost:8080/posts\
    \ GET` request with the `Accept` header set to\n`application/json`.\nThis should\
    \ return the response shown in Listing [11-11](#A447991_1_En_11_Chapter.html#Par124).\n\
    \n```\n{\n_embedded:{\nposts:[\n{\nid:1,\ntitle:\"Introducing SpringBoot\",\n\
    content:\"SpringBoot is awesome\",\ncreatedOn:\"2017-05-09T18:30:00.000+0000\"\
    ,\nupdatedOn:null,\n_links:{\nself:{\nhref:\"http://localhost:8080/api/posts/1\"\
    \n},\npost:{\nhref:\"http://localhost:8080/api/posts/1\"\n},\ncomments:{\nhref:\"\
    http://localhost:8080/api/posts/1/comments\"\n}\n}\n},\n{\nid:2,\ntitle:\"Securing\
    \ Web applications\",\ncontent:\"This post will show how to use SpringSecurity\"\
    ,\ncreatedOn:\"2017-05-19T18:30:00.000+0000\",\nupdatedOn:null,\n_links:{\nself:{\n\
    href:\"http://localhost:8080/api/posts/2\"\n},\npost:{\nhref:\"http://localhost:8080/api/posts/2\"\
    \n},\ncomments:{\nhref:\"http://localhost:8080/api/posts/2/comments\"\n}\n}\n\
    },\n{\nid:3,\ntitle:\"Introducing Spring Social\",\ncontent:\"Developing social\
    \ web applications using Spring Social\",\ncreatedOn:\"2017-05-23T18:30:00.000+0000\"\
    ,\nupdatedOn:null,\n_links:{\nself:{\nhref:\"http://localhost:8080/api/posts/3\"\
    \n},\npost:{\nhref:\"http://localhost:8080/api/posts/3\"\n},\ncomments:{\nhref:\"\
    http://localhost:8080/api/posts/3/comments\"\n}\n}\n}\n]\n},\n_links:{\nself:{\n\
    href:\"http://localhost:8080/api/posts{?page,size,sort}\",\ntemplated:true\n},\n\
    profile:{\nhref:\"http://localhost:8080/api/profile/posts\"\n},\nsearch:{\nhref:\"\
    http://localhost:8080/api/posts/search\"\n}\n},\npage:{\nsize:20,\ntotalElements:3,\n\
    totalPages:1,\nnumber:0\n}\n}\nListing 11-11.\nSpring Data REST Collection Resource\
    \ Response\n```\n\nYou can create a new `Post` by invoking the\n`POST` request\
    \ on\n`http://localhost:8080/posts`\nwith the `Accept`\nand `Content-Type` headers\n\
    set to `application/json`.\nPass the `Post`\ndetails to be created as JSON in\
    \ request body.\n\n```\n{\n\"title\": \"My 4th Post\",\n\"content\": \"This is\
    \ my awesome 4th post\",\n\"createdOn\": \"2016-05-09T18:30:00.000+0000\"\n}\n\
    ```\n\nSimilarly, you can update `POST` with `id=4` by using the\n`PUT` request\
    \ on\n`http://localhost:8080/posts/4`.\n\n```\n{\n\"title\": \"My fourth Post\"\
    ,\n\"content\": \"This is my awesome 4th post\",\n\"createdOn\": \"2016-05-09T18:30:00.000+0000\"\
    ,\n\"updatedOn\": \"2016-05-09T18:40:00.000+0000\"\n}\n```\n\nYou can delete `POST`\
    \ with `id=4` by using the\n`DELETE` request\non `http://localhost:8080/posts/4`.\n\
    \nBy default, the Spring Data REST serves up the REST resources at the\nroot URI,\
    \ `\"/\"`.\nYou can customize the path using the `spring.data.rest.basePath`\n\
    property in `application.properties`.\n\n```\nspring.data.rest.basePath=/api\n\
    ```\n\nSorting and Pagination\n\nIf the `Repository` extends\n `PagingAndSortingRepository`\n\
    , then Spring Data REST endpoints support pagination and sorting\nout-of-the-box.\n\
    \nYou can use the `size` query parameter\nto limit the number of entries returning.\n\
    \n```\nhttp://localhost:8080/posts/?size=10\n```\n\nTo retrieve the second page\
    \ entries with five entries per page, use the\n`page` and `size` query\nparameters.\n\
    \n```\nhttp://localhost:8080/posts?page=1&size=5\n```\n\nTo retrieve entries sorted\
    \ by some property, use the `sort` query parameter.\n\n```\nhttp://localhost:8080/posts?sort=createdOn,desc\n\
    ```\n\nSpring Data REST by default exposes all the public repository interfaces\n\
    without requiring any extra configuration. But if you want to customize\nthe defaults,\
    \ you can use the `@RepositoryRestResource`\nand `@RestResource`\nannotations.\
    \ You can disable a repository from being exposed as a REST\nresource by adding\
    \ `@RepositoryRestResource(exported = false)`.\n\n```\n@RepositoryRestResource(exported\
    \ = false)\npublic interface CommentRepository extends JpaRepository\n{\n}\n```\n\
    \nYou can disable specific methods from being exposed as REST resources by\nadding\
    \ `@RestResource(exported = false)` on the methods. You can also customize the\
    \ default `path` and `rel` attribute values\nusing `@RepositoryRestResource`,\n\
    as follows:\n\n```\n@RepositoryRestResource(path = \"people\", rel = \"people\"\
    )\npublic interface UserRepository extends JpaRepository\n{\n@Override\n@RestResource(exported\
    \ = false)\nvoid delete(Integer id);\n@Override\n@RestResource(exported = false)\n\
    void delete(User entity);\n}\n```\n\nYou can customize various properties of Spring\
    \ Data REST using the `spring.data.rest.*`\nproperties in the `application.properties`\n\
    file. If you want even more control over the customization, you can\nregister\
    \ a `RepositoryRestConfigurer`\n(or extend `RepositoryRestConfigurerAdapter`)\n\
    and implement or override the `configure*()` methods\nbased on your needs.\n\n\
    For example, by default, the entity’s primary key (`id`) values won’t be\nexposed\
    \ in the responses. If you want to expose the `id` values for certain\nentities,\
    \ you can customize it as follows:\n\n```\n@Configuration\npublic class RestRepositoryConfig\
    \ extends RepositoryRestConfigurerAdapter\n{\n@Override\npublic void configureRepositoryRestConfiguration(RepositoryRestConfiguration\
    \ config)\n{\nconfig.exposeIdsFor(User.class);\n}\n}\n```\n\nWith this customization,\
    \ the responses will include the `id` property as well.\n\nCORS Support in Spring\
    \ Data REST\n\nSimilar to SpringMVC REST endpoints, you can enable CORS support\
    \ for\nSpring Data REST endpoints using the `@CrossOrigin`\nannotation at the\
    \ repository level or globally.\n\n```\n@CrossOrigin\npublic interface UserRepository\
    \ extends JpaRepository\n{\n}\n```\n\nTo enable CORS support globally, you can\
    \ extend  `RepositoryRestConfigurerAdapter`\n and provide CORS configuration,\
    \ as shown in Listing [11-12](#A447991_1_En_11_Chapter.html#Par150).\n\n```\n\
    @Configuration\npublic class RepositoryConfig extends RepositoryRestConfigurerAdapter\n\
    {\n@Override\npublic void configureRepositoryRestConfiguration(RepositoryRestConfiguration\
    \ config)\n{\nconfig.getCorsRegistry()\n.addMapping(\"/api/**\")\n.allowedOrigins(\"\
    http://localhost:3000\")\n.allowedMethods(\"*\")\n.allowedHeaders(\"*\")\n.allowCredentials(false)\n\
    .maxAge(3600);\n}\n}\nListing 11-12.\nSpring Data REST Global CORS Configuration\n\
    ```\n\nNote\n\nSpringMVC’s CORS configuration is NOT applied to Spring Data REST\n\
    endpoints.\n\nTo learn more about Spring Data REST, visit the Spring Data REST\n\
    documentation at: [`http://docs.spring.io/spring-data/rest/docs/current/reference/html/`](http://docs.spring.io/spring-data/rest/docs/current/reference/html/)\
    \ .\n\nException Handling\n\nYou can handle exceptions in REST API in the same\
    \ way you handle them in\nthe SpringMVC based web application—by using the `@ExceptionHandler`\
    \ and\n`@ControllerAdvice`\nannotations. Instead of rendering a view, you can\
    \ return `ResponseEntity` with\nthe appropriate HTTP status code and exception\
    \ details.\n\nInstead of simply throwing an exception with the HTTP status code,\
    \ it is\nbetter to provide more details about the issue, such as the error code,\n\
    message, developer message, etc.\n\nCreate a class called `ErrorDetails`, as\n\
    shown in Listing [11-13](#A447991_1_En_11_Chapter.html#Par156).\n\n```\npublic\
    \ class ErrorDetails\n{\nprivate String errorCode;\nprivate String errorMessage;\n\
    private String devErrorMessage;\nprivate Map additionalData = new HashMap();\n\
    //setters & getters\n}\nListing 11-13.\nErrorDetails.java\n```\n\nIn the controller\
    \ handler method, you can throw exception based on error\nconditions and handle\
    \ those exceptions using the `@ExceptionHandler`\nmethods, as shown in Listing\
    \ [11-14](#A447991_1_En_11_Chapter.html#Par158).\n\n```\n@RestController\n@RequestMapping(value=\"\
    /posts\")\npublic class PostController\n{\n...\n...\n@DeleteMapping(\"/{id}\"\
    )\npublic void deletePost(@PathVariable(\"id\") Integer id)\n{\nPost post = postRepository.findById(id)\n\
    .orElseThrow(() -> new ResourceNotFoundException(\"No post found with id=\"+id));\n\
    try {\npostRepository.deleteById(post.getId());\n} catch (Exception e) {\nthrow\
    \ new PostDeletionException(\"Post with id=\"+id+\" can't be deleted\");\n}\n\
    }\n...\n...\n@ExceptionHandler(PostDeletionException.class)\npublic ResponseEntity\
    \ servletRequestBindingException(PostDeletionException e)\n{\nErrorDetails errorDetails\
    \ = new ErrorDetails();\nerrorDetails.setErrorMessage(e.getMessage());\nStringWriter\
    \ sw = new StringWriter();\nPrintWriter pw = new PrintWriter(sw);\ne.printStackTrace(pw);\n\
    errorDetails.setDevErrorMessage(sw.toString());\nreturn new ResponseEntity(errorDetails,\
    \ HttpStatus.INTERNAL_SERVER_ERROR);\n}\n}\nListing 11-14.\nHandling REST API\
    \ Exception at Controller Level @ExceptionHandler Methods\n```\n\nYou can handle\
    \ exceptions globally using the `@ControllerAdvice`\nclass with the `@ExceptionHandler`\n\
    methods, as shown in Listing [11-15](#A447991_1_En_11_Chapter.html#Par160).\n\n\
    ```\n@ControllerAdvice\npublic class GlobalExceptionHandler\n{\n@ExceptionHandler(ServletRequestBindingException.class)\n\
    public ResponseEntity servletRequestBindingException(ServletRequestBindingException\
    \ e) {\nErrorDetails errorDetails = new ErrorDetails();\nerrorDetails.setErrorMessage(e.getMessage());\n\
    errorDetails.setDevErrorMessage(getStackTraceAsString(e));\nreturn new ResponseEntity(errorDetails,\
    \ HttpStatus.BAD_REQUEST);\n}\n@ExceptionHandler(Exception.class)\npublic ResponseEntity\
    \ exception(Exception e) {\nErrorDetails errorDetails = new ErrorDetails();\n\
    errorDetails.setErrorMessage(e.getMessage());\nerrorDetails.setDevErrorMessage(getStackTraceAsString(e));\n\
    return new ResponseEntity(errorDetails, HttpStatus.INTERNAL_SERVER_ERROR);\n}\n\
    private String getStackTraceAsString(Exception e)\n{\nStringWriter sw = new StringWriter();\n\
    PrintWriter pw = new PrintWriter(sw);\ne.printStackTrace(pw);\nreturn sw.toString();\n\
    }\n}\nListing 11-15.\nHandling REST API Exceptions Globally Using @ExceptionHandler\
    \ Methods\n```\n\nThe global exception handling mechanism helps you handle exceptions\n\
    (like database communication errors and third-party service invocation\nfailures)\
    \ in a central place instead of handling them in each controller\nclass.\n\nSummary\n\
    \nThis chapter discussed how to create REST APIs using SpringMVC and\nSpring Data\
    \ REST. It also looked at how to handle exceptions at the\ncontroller level and\
    \ globally. In the next chapter, you will learn how\nto build Reactive Web Applications\
    \ using Spring WebFlux.\n\n12. Reactive Programming Using Spring\nWebFlux\n\n\
    Modern IT business needs have changed significantly compared to a few\nyears ago.\
    \ The amount of data that is being generated from various\nsources like social\
    \ media sites, IoT devices, sensors, and the like is\nhumongous. The traditional\
    \ data processing models may not be suitable to\nprocess such a huge volume of\
    \ data. Even though we have better hardware\nsupport these days, many of the existing\
    \ APIs are synchronous and\nblocking APIs, which become bottlenecks to better\
    \ throughput.\n\nReactive programming is a\nprogramming paradigm that promotes\
    \ an asynchronous, non-blocking,\nevent-driven approach to data processing. Reactive\
    \ programming is\ngaining momentum and many of the programming languages provide\
    \ reactive\nframeworks and libraries.\n\nIn Java, there are reactive libraries\
    \ like RxJava and Reactor, which\nsupports reactive programming. As interest in\
    \ reactive programming grows\nin the Java community, a new initiative called reactive\
    \ streams is starting to\nprovide a standard for asynchronous stream processing\
    \ with non-blocking\nback pressure. Reactive streams support will be part of the\
    \ Java 9\nrelease.\n\nThe Spring framework 5 introduced support for reactive programming\
    \ with\nthe new WebFlux module. Spring Boot 2, which uses Spring 5, also\nprovides\
    \ a starter to quickly create reactive applications using\nWebFlux. This chapter\
    \ teaches you how to build reactive web applications\nusing Spring WebFlux.\n\n\
    Introduction to Reactive Programming\n\nReactive programming involves modeling\
    \ data and events as observable\ndata streams and implementing data processing\
    \ routines to react to the\nchanges in those streams. A group of people put together\
    \ a Reactive Manifesto at [ `http://www.reactivemanifesto.org/`\n](http://www.reactivemanifesto.org/)\
    \ to describe the characteristics of a reactive system.\n\nReactive programming\
    \ is becoming popular and there are already reactive\nframeworks or libraries\n\
    \ for many of the popular programming languages.\n\n*   Project Reactor— [`https://projectreactor.io/`](https://projectreactor.io/)\
    \ \n\n*   RxJava— [`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava)\
    \ \n\n*   Akka Streams— [`http://doc.akka.io/docs/akka/2.5.3/scala/stream/index.html`](http://doc.akka.io/docs/akka/2.5.3/scala/stream/index.html)\
    \ \n\n*   RxJS— [`https://github.com/ReactiveX/rxjs`](https://github.com/ReactiveX/rxjs)\
    \ \n\n*   Rx.NET— [`https://github.com/Reactive-Extensions/Rx.NET`](https://github.com/Reactive-Extensions/Rx.NET)\
    \ \n\n*   RxScala— [`http://reactivex.io/rxscala`](http://reactivex.io/rxscala)\
    \ \n\n*   RxClojure— [`https://github.com/ReactiveX/RxClojure`](https://github.com/ReactiveX/RxClojure)\
    \ \n\n*   RxSwift— [`https://github.com/ReactiveX/RxSwift`](https://github.com/ReactiveX/RxSwift)\
    \ \n\nReactive Streams \n\nReactive streams ( [`http://www.reactive-streams.org/`](http://www.reactive-streams.org/)\
    \ ) is an initiative to provide a standard for\nasynchronous stream processing\
    \ with non-blocking back pressure. The key\ncomponents of reactive streams are\
    \ the `Publisher` and `Subscriber`.\n\nA `Publisher` is\na provider of an unbounded\
    \ number of sequenced elements, which are\npublished according to the demand received\
    \ from the subscriber(s).\n\n```\npublic interface Publisher {\npublic void subscribe(Subscriber\
    \ s);\n}\n```\n\nA `Subscriber`\nsubscribes to the publisher for callbacks. Publishers\
    \ don’t\nautomatically push data to subscribers unless subscribers request the\n\
    data.\n\n```\npublic interface Subscriber {\npublic void onSubscribe(Subscription\
    \ s);\npublic void onNext(T t);\npublic void onError(Throwable t);\npublic void\
    \ onComplete();\n}\n```\n\nTwo popular implementations of reactive streams are\
    \ RxJava ( [`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava)\
    \ ) and Project Reactor ( [`https://projectreactor.io/`](https://projectreactor.io/)\
    \ `)`.\n\nProject Reactor\n\nProject Reactor \nis an implementation of the reactive\
    \ streams specification with\nnon-blocking and back pressure support. Reactor\
    \ provides two composable\nreactive types—`Flux` and `Mono`—that implement\nthe\
    \ publisher but also provide a rich set of operators. A `Flux` represents a\n\
    reactive sequence of 0..N items, whereas a `Mono` represents a\nsingle value or\
    \ an empty result.\n\nA `Flux<T>`\nis a standard `Publisher<T>`\nrepresenting\
    \ an asynchronous sequence of 0 to N emitted items,\noptionally terminated by\
    \ either a success signal or an error.\n\nA `Mono<T>`\nis a specialized `Publisher<T>`\n\
    that emits at most one item and then optionally terminates with an `onComplete`\
    \ signal or\nan `onError`. A\n`Mono` can be\nused to represent no-value asynchronous\
    \ processes returning `Mono<Void>`.\n\nNow you’ll see how to create  `Mono`  \
    \  and `Flux` types and how to\nconsume data from them.\n\n```\nMono mono = Mono.just(\"\
    Spring\");\nMono mono = Mono.empty();\nFlux flux = Flux.just(\"Spring\", \"SpringBoot\"\
    , \"Reactor\");\nFlux flux = Flux.fromArray(new String[]{\"Spring\", \"SpringBoot\"\
    , \"Reactor\"});\nFlux flux = Flux.fromIterable(Arrays.asList(\"Spring\", \"SpringBoot\"\
    , \"Reactor\"));\n```\n\nUntil you subscribe to the publisher, no data flow will\
    \ happen. You must\nenable logging and subscribe to the flux.\n\n```\nFlux flux\
    \ = Flux.just(\"Spring\", \"SpringBoot\", \"Reactor\");\nflux.log().subscribe();\n\
    ```\n\nWhen you run this code it will log the underlying callback method\ninvocations\
    \ as follows:\n\n```\n[main] INFO reactor.Flux.Array.1 - | onSubscribe([Synchronous\
    \ Fuseable] FluxArray.ArraySubscription)\n[main] INFO reactor.Flux.Array.1 - |\
    \ request(unbounded)\n[main] INFO reactor.Flux.Array.1 - | onNext(Spring)\n[main]\
    \ INFO reactor.Flux.Array.1 - | onNext(SpringBoot)\n[main] INFO reactor.Flux.Array.1\
    \ - | onNext(Reactor)\n[main] INFO reactor.Flux.Array.1 - | onComplete()\n```\n\
    \nLooking at the log statements, you can see that when you subscribe to\n`Publisher`:\n\
    \n*   The `onSubscribe()` method\n    is called when you subscribe to `Publisher(Flux)`.\n\
    \n*   When you call `subscribe()` on `Publisher`, a\n    subscription is created.\
    \ This subscription requests data from the\n    publisher. In this example, it\
    \ defaults to unbounded and hence it requests every\n    element available.\n\n\
    *   The `onNext()`\n    callback method is called for every element.\n\n*   The\
    \ `onComplete()` callback\n    method is called last after receiving the last\
    \ element.\n\n*   If an error occurs while consuming the next element, then `onError()`\
    \ callback\n    would have been called.\n\nNote\n\nCovering Project Reactor in-depth\
    \ is out of the scope of this book.\nRefer to the Project Reactor documentation\
    \ at: [ `http://projectreactor.io/docs/core/release/reference/`\n](http://projectreactor.io/docs/core/release/reference/)\
    \ for more details.\n\nThe Spring WebFlux Reactive framework is built on top of\
    \ Project\nReactor, which is an implementation of the reactive streams\nspecification.\n\
    \nReactive Web Applications Using Spring WebFlux\n\nSpring framework 5 comes with\
    \ a new module called `spring-webflux` to\nsupport building reactive web applications.\
    \ Spring WebFlux by default\nuses Project Reactor, which is an implementation\
    \ of reactive streams for\nreactive support. But you can use other reactive streams\n\
    implementations, like RxJava, as well. The `spring-webflux` module\nprovides support\
    \ for creating reactive server applications as well as\nreactive client applications\
    \ using REST, HTML browsers, and WebSocket\nstyle communications.\n\nSpring WebFlux\
    \ can run on servlet containers with support for Servlet\n3.1 non-blocking I/O\
    \ APIs as well as on other async runtimes like Netty and Undertow . See\nFigure\
    \ [12-1](#A447991_1_En_12_Chapter.html#Fig1).\n\n![A447991_1_En_12_Fig1_HTML.gif](A447991_1_En_12_Fig1_HTML.gif)\n\
    \nFigure 12-1.\n\nSpring WebFlux runtime support \n\nEach runtime is adapted to\
    \ a reactive  `ServerHttpRequest` and\n`ServerHttpResponse`\n, thus exposing the\
    \ body of a request and response as `Flux<DataBuffer>`\ninstead of `InputStream`\
    \ and `OutputStream` with\nreactive back pressure. REST-style JSON and XML serialization\
    \ and\ndeserialization and HTML view rendering is supported on top as a `Flux<Object>`.\n\
    \nYou can develop Reactive web applications  using the\n`spring-webflux`\nmodule\
    \ in two ways:\n\n*   Using the SpringMVC style annotation based approach with\
    \ `@Controller & @RestController`\n\n*   Using the functional style with routers\
    \ and handlers\n\nWebFlux Using the Annotation-Based Programming\nModel\n\nYou\
    \ can build reactive web applications using the familiar Spring MVC\nannotations\
    \ `@Controller` or `@RestController`,\nwhich also work with WebFlux. When used\
    \ with WebFlux, the underlying\nframework components like `HandlerMapping` and\n\
    `HandlerAdapter`\nare non-blocking and operate on the reactive `ServerHttpRequest`\
    \ and\n`ServerHttpResponse`\nrather than on `HttpServletRequest`\nand `HttpServletResponse`.\n\
    \nEven though you use WebFlux reactive support at the controller layer, if\nyou\
    \ use a blocking API for data access like JDBC or JPA, your\napplication will\
    \ not be fully reactive. As of now, relational database\nvendors haven’t provided\
    \ non-blocking driver implementations. There are\nsome NoSQL datastores such as\
    \ MongoDB, Cassandra, and Redis that provide\nreactive drivers.\n\nNow you’ll\
    \ develop a reactive web application with Spring WebFlux using\nthe annotation\
    \ based programming model. You are going to use the MongoDB\nReactive Stream Driver\
    \ ( [`https://mongodb.github.io/mongo-java-driver-reactivestreams/`](https://mongodb.github.io/mongo-java-driver-reactivestreams/)\
    \ ) to take full advantage of MongoDB’s reactive\nsupport.\n\nCreate a Spring\
    \ Boot application with the Reactive web and Reactive\nMongo starters.\n\n```\n\
    org.springframework.boot\nspring-boot-starter-webflux\n\norg.springframework.boot\n\
    spring-boot-starter-data-mongodb-reactive\n\n```\n\nUse the embedded MongoDB server\
    \ by adding the following dependency so\nthat you don’t need to install the MongoDB\
    \ server.\n\n```\nde.flapdoodle.embed\nde.flapdoodle.embed.mongo\n\n```\n\nCreate\
    \ a `User`\nPOJO that represents a document in MongoDB, as shown in Listing [12-1](#A447991_1_En_12_Chapter.html#Par52).\n\
    \n```\nimport org.springframework.data.annotation.Id;\nimport org.springframework.data.mongodb.core.mapping.Document;\n\
    @Document\npublic class User\n{\n@Id\nprivate String id;\nprivate String name;\n\
    private String email;\n//setters and getters\n}\nListing 12-1.\nUser.java\n```\n\
    \nThe Spring Data Mongo library provides `ReactiveCrudRepository`,\nwhich is similar\
    \ to `CrudRepository`, but\nwith reactive support, which will be interacting with\
    \ MongoDB Reactive\ndriver under-the-hood.\n\nNow create a Spring Data Repository\
    \ for `User`, as shown in\nListing [12-2](#A447991_1_En_12_Chapter.html#Par55).\n\
    \n```\nimport org.springframework.data.repository.reactive.ReactiveCrudRepository;\n\
    public interface UserReactiveRepository extends ReactiveCrudRepository\n{\n}\n\
    Listing 12-2.\nUserReactiveRepository.java\n```\n\nThe Spring WebFlux annotation\
    \ based controllers look very similar to\nSpringMVC controllers except that the\
    \ input and return types will use\nthe Reactor types `Mono` or `Flux`.\n\nNow\
    \ you can implement the CRUD operations for `User`, as shown in\nListing [12-3](#A447991_1_En_12_Chapter.html#Par58).\n\
    \n```\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.web.bind.annotation.*;\nimport reactor.core.publisher.Flux;\n\
    import reactor.core.publisher.Mono;\n@RestController\n@RequestMapping(\"/api/users\"\
    )\npublic class UserController\n{\n@Autowired\nprivate UserReactiveRepository\
    \ userReactiveRepository;\n@GetMapping\npublic Flux allUsers() {\nreturn userReactiveRepository.findAll();\n\
    }\n@GetMapping(\"/{id}\")\npublic Mono  getUser(@PathVariable String id) {\nreturn\
    \ userReactiveRepository.findById(id);\n}\n@PostMapping\npublic Mono saveUser(@RequestBody\
    \ Mono userMono) {\nreturn userMono.flatMap(user -> userReactiveRepository.save(user));\n\
    }\n@DeleteMapping(\"/{id}\")\npublic Mono deleteUser(@PathVariable String id)\
    \ {\nreturn userReactiveRepository.deleteById(id);\n}\n}\nListing 12-3.\nUserController.java\
    \ Following the Annotation Based Reactive Programming model\n```\n\nThere is nothing\
    \ new in the  `UserController`\n implementation except that you are using Reactor\
    \ types such as\n`Mono<User>` to\nrepresent a stream of a single user object and\
    \ using `Flux<User>` to\nrepresent a stream of one or more `User` objects.\n\n\
    One key point to remember is that, unless someone subscribes to the\nreactive\
    \ stream pipeline, nothing happens. For example, the following\nmethod doesn’t\
    \ insert the user document in MongoDB.\n\n```\n@PostMapping\npublic Mono saveUser(@RequestBody\
    \ Mono userMono) {\nuserMono.flatMap(user -> userReactiveRepository.save(user));\n\
    return Mono.empty();\n}\n```\n\nThis just defined the stream pipeline, but nobody\
    \ subscribed to it, so\nnothing happens. The following code will insert the user\
    \ document\nbecause it is explicitly calling `subscribe()` on the\npipeline.\n\
    \n```\nuserMono.flatMap(user -> userReactiveRepository.save(user)).subscribe();\n\
    ```\n\nThe `UserController.saveUser()`\nimplementation returns `Mono<User>` so\n\
    that the web response subscribes to the pipeline. Hence, it works as\nexpected.\n\
    \nWebFlux Using a Functional Programming Model\n\nSpring framework 5 introduced\
    \ a new functional style programming\nmodel  built on top of the reactive foundation\
    \ in addition to the\nannotation based programming model.\n\nInstead of using\
    \ annotations to define request handling methods, you can\nimplement `HandlerFunctions`\
    \ as\nJava 8 lambdas and map the request URL patterns to `HandlerFunctions`\n\
    using `RouterFunctions`.\n\n```\nHandlerFunction echoHandlerFn =\n( request )\
    \ -> ServerResponse.ok().body(fromObject(request.queryParam(\"name\")));\nRequestPredicate\
    \ predicate = RequestPredicates.GET(\"/echo\");\nRouterFunction routerFunction\
    \ = RouterFunctions.route(predicate, echoHandlerFn);\n```\n\nThis example mapped\
    \ the URL pattern GET `\"/echo\"` to `echoHandlerFn`, which\nreturns the value\
    \ of the request parameter `\"name\"` as the\nresponse body. You can write the\
    \ same code block using Java 8 lambdas\nand static imports in a much more concise\
    \ way, as follows:\n\n```\nroute(GET(\"/echo\"), request -> ok().body(fromObject(request.queryParam(\"\
    name\"))));\n```\n\nNow you can explore the key components of functional web framework.\n\
    \nHandlerFunction\n\nThe `HandlerFunction` is a\nfunctional interface that takes\
    \ `ServletRequest` and\nreturns `ServletResponse`.\n\n```\n@FunctionalInterface\n\
    public interface HandlerFunction\n{\nMono handle(ServerRequest request);\n}\n\
    ```\n\nHere, `ServerRequest` and\n`ServerResponse`\nare immutable interfaces built\
    \ on top of Reactor types. You can convert\na request body into Reactor’s `Mono`\
    \ or `Flux` types and you\ncan send any instance of reactive stream’s `Publisher`\
    \ as a\nresponse body.\n\nServerRequest\n\nThe `org.springframework.web.reactive.function.server.ServerRequest`\n\
    interface represent a server-side HTTP request. You can retrieve\ninformation\
    \ from an input HTTP request from `ServerRequest` using\nvarious methods, as follows:\n\
    \n```\nHttpMethod method = request.method();\nString path = request.path();\n\
    String id = request.pathVariable(\"id\");\nMap pathVariables = request.pathVariables();\n\
    Optional email = request.queryParam(\"email\");\nURI uri = request.uri();\n```\n\
    \nYou can convert a request body into a `Mono` or `Flux` using the `bodyToMono()`\
    \ and\n`bodyToFlux()`\nmethods.\n\n```\nMono userMono = request.bodyToMono(User.class);\n\
    Flux usersFlux = request.bodyToFlux(User.class);\n```\n\nThe `bodyToMono()` and\n\
    `bodyToFlux()`\nmethods are actually instances of `BodyExtractor`, which\nis used\
    \ to extract the request body and deserialize it into an object.\n\nYou can use\
    \ the `BodyExtractors`\nutility class to extract a request body into a `Mono`\
    \ or `Flux` as follows:\n\n```\nMono userMono = request.body(BodyExtractors.toMono(User.class));\n\
    Flux userFlux = request.body(BodyExtractors.toFlux(User.class));\n```\n\nYou can\
    \ use `ParameterizedTypeReference`\nif you want to convert a request body into\
    \ a generic type.\n\n```\nParameterizedTypeReference>> typeReference = new ParameterizedTypeReference>>()\
    \ {};\nMono>> mapMono = request.body(BodyExtractors.toMono(typeReference));\n\
    ```\n\nServerResponse\n\nThe `org.springframework.web.reactive.function.server.ServerResponse`\n\
    interface represents a server-side HTTP response. The `ServerResponse` is an\n\
    immutable interface and provides many static builder methods to\nconstruct the\
    \ response with `status`, `contentType`, `cookies`, `headers`, `body`, etc.\n\n\
    The following are a few examples of how you can construct `ServerResponse` using\n\
    builder methods.\n\n```\nServerResponse.ok().contentType(APPLICATION_JSON).body(userMono,\
    \ User.class);\nServerResponse.ok().contentType(APPLICATION_JSON).body(BodyInserters.fromObject(user));\n\
    ServerResponse.created(uri).build();\nServerResponse.notFound().build();\n```\n\
    \nYou can also render the view templates using the `render()` method as\nfollows:\n\
    \n```\nMap modelAttributes = new HashMap();\nmodelAttributes.put(\"user\",user);\n\
    ServerResponse.ok().render(\"home\", modelAttributes);\n```\n\nSo, essentially\
    \ using these  `ServerResponse`\nbuilder methods  \n, you can construct the return\
    \ value of the `HandlerFunction.handle(ServerRequest)`\nmethod.\n\nRouterFunction\n\
    \n`RouterFunction`\nmaps the incoming\n request to a `HandlerFunction` using\n\
    `RequestPredicate`. You\ncan use the `RouterFunctions`\nutility class static methods\
    \ to build the `RouterFunction` as\nfollows:\n\n```\nRouterFunctions.route(GET(\"\
    /echo\"), request -> ok().body(fromObject(request.queryParam(\"name\"))));\n```\n\
    \nYou can compose multiple route definitions into a new route definition\nthat\
    \ routes to the first handler function that matches the predicate.\n\n```\nimport\
    \ static org.springframework.web.reactive.function.server.RequestPredicates.*;\
    \ RouterFunctions.route(GET(\"/echo\"), request -> ok().body(fromObject(request.queryParam(\"\
    name\"))))\n.and(route(GET(\"/home\"), request -> ok().render(\"home\")))\n.andRoute(POST(\"\
    /users\"), request -> ServerResponse.ok().build());\n```\n\nThis example composes\
    \ three route definitions into one; the incoming\nrequest will be handled by the\
    \ first `HandlerFunction` that\nmatches the `RequestPredicate`.\n\nSuppose you\
    \ need to compose multiple routes with the same prefix.\nInstead of repeating\
    \ the URL path in every route you can use `RouterFunctions.nest()`\nas follows:\n\
    \n```\nRouterFunctions.nest(path(\"/api/users\"),\nnest(accept(APPLICATION_JSON),\n\
    route(GET(\"/{id}\"), request -> ServerResponse.ok().build())\n.andRoute(method(HttpMethod.GET),\
    \ request -> ServerResponse.ok().build())));\n```\n\nThe code maps two URLs to\
    \ their handler functions. One is to `GET /api/users`, which\nreturns all users\
    \ and `GET /api/users/{id}`\nto return the user details for the given `id`. Instead\
    \ of\nrepeating the common path prefix `/api/users`, it uses\n`nest()` to\ncompose\
    \ the routes.\n\nYou can create a `RequestPredicate`\nusing the `RequestPredicates`\n\
    static methods and you can also compose request predicates using `RequestPredicate.and(RequestPredicate)`\n\
    and `RequestPredicate.or(RequestPredicate)`.\n\n```\nRouterFunctions.route(path(\"\
    /api/users\").and(method(HttpMethod.GET)),\nrequest -> ServerResponse.ok().build());\n\
    RouterFunctions.route(GET(\"/api/users\").or(GET(\"/api/users/list\")),\nrequest\
    \ -> ServerResponse.ok().build());\n```\n\nHandlerFilterFunction\n\nIf you have\
    \ to compare annotation based approaches to functional\napproaches, `RouterFunction`\
    \ is\nsimilar to the `@RequestMapping`\nannotation and `HandlerFunction` is\n\
    similar to the method annotated with `@RequestMapping`. The\nnew functional web\
    \ framework also provides `HandlerFilterFunction`,\nwhich is similar to the servlet\
    \ `Filter` or `@ControllerAdvice`\nmethods.\n\n```\n@FunctionalInterface\npublic\
    \ interface HandlerFilterFunction\n{\nMono filter(ServerRequest request, HandlerFunction\
    \ next);\n//other methods\n}\n```\n\nFor example, you can filter a route based\
    \ on a user role using `HandlerFilterFunction`\nas follows:\n\n```\nRouterFunction\
    \ route = route(DELETE(\"/api/users/{id}\"), request -> ok().build());\nRouterFunction\
    \ filteredRoute = route.filter((request, next) -> {\nif (hasAdminRole()) {\nreturn\
    \ next.handle(request);\n}\nelse {\nreturn ServerResponse.status(UNAUTHORIZED).build();\n\
    }\n});\nprivate boolean hasAdminRole()\n{\n//logic to check current user has ADMIN\
    \ role or not\n}\n```\n\nWhen you make a request to the `/api/users/{id}` URL,\n\
    the filter checks whether the user has the admin role or not and decides\nto execute\
    \ the handler function or return an `UNAUTHORIZED`\nresponse.\n\nRegistering HandlerFunctions\
    \ as Method\nReferences\n\nInstead of defining the `HandlerFunction`s\nusing inline\
    \ lambdas, it would be better to define them as methods and\nuse method references\
    \ in the route configuration, as shown in Listing\n[12-4](#A447991_1_En_12_Chapter.html#Par105).\n\
    \n```\n@Component\nclass EchoHandler\n{\npublic Mono echo(ServerRequest request)\n\
    {\nreturn ServerResponse.ok().body(fromObject(request.queryParam(\"name\")));\n\
    }\n}\n@SpringBootApplication\nclass Applications\n{\n@Autowired\nEchoHandler echoHandler;\n\
    @Bean\npublic RouterFunction echoRouterFunction() {\nreturn RouterFunctions.route(GET(\"\
    /echo\"), echoHandler::echo);\n}\n}\nListing 12-4.\nRegistering HandlerFunction\
    \ with Route Using Method References\n```\n\nNow you can build the same application\
    \ that you built in an earlier\nsection using the functional programming model.\
    \ You are going to create\n`UserHandler`\nwith methods to define `HandlerFunction`s\
    \ for\nvarious operations and then configure `RouterFunctions`\nmapping routes\
    \ to handle functions. See Listing [12-5](#A447991_1_En_12_Chapter.html#Par107).\n\
    \n```\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.http.MediaType;\nimport org.springframework.stereotype.Component;\n\
    import org.springframework.web.reactive.function.server.ServerRequest;\nimport\
    \ org.springframework.web.reactive.function.server.ServerResponse;\nimport reactor.core.publisher.Flux;\n\
    import reactor.core.publisher.Mono;\nimport static org.springframework.web.reactive.function.BodyInserters.fromObject;\n\
    @Component\npublic class UserHandler\n{\nprivate UserReactiveRepository userReactiveRepository;\n\
    @Autowired\npublic UserHandlerFunctions(UserReactiveRepository userReactiveRepository)\
    \ {\nthis.userReactiveRepository = userReactiveRepository;\n}\npublic Mono getAllUsers(ServerRequest\
    \ request)\n{\nFlux allUsers = userReactiveRepository.findAll();\nreturn ServerResponse.ok().contentType(MediaType.APPLICATION_JSON_UTF8)\n\
    .body(allUsers, User.class);\n}\npublic Mono getUserById(ServerRequest request)\n\
    {\nMono userMono = userReactiveRepository.findById(request.pathVariable(\"id\"\
    ));\nMono notFount = ServerResponse.notFound().build();\nreturn userMono.flatMap(user\
    \ -> ServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON_UTF8)\n.body(fromObject(user)))\n\
    .switchIfEmpty(notFount);\n}\npublic Mono saveUser(ServerRequest request)\n{\n\
    Mono userMono = request.bodyToMono(User.class);\nMono mono = userMono.flatMap(user\
    \ -> userReactiveRepository.save(user));\nreturn ServerResponse.ok().body(mono,\
    \ User.class);\n}\npublic Mono deleteUser(ServerRequest request)\n{\nString id\
    \ = request.pathVariable(\"id\");\nreturn ServerResponse.ok().build(userReactiveRepository.deleteById(id));\n\
    }\n}\nListing 12-5.\nUserHandler.java Using the Functional Programming Model\n\
    ```\n\nYou have defined handler functions for CRUD operations as separate\nmethods.\
    \ Now you can configure router functions, as shown in Listing\n[12-6](#A447991_1_En_12_Chapter.html#Par109).\n\
    \n```\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.http.HttpMethod;\n\
    import org.springframework.web.reactive.function.server.*;\nimport static org.springframework.http.MediaType.APPLICATION_JSON;\n\
    import static org.springframework.web.reactive.function.BodyInserters.fromObject;\n\
    import static org.springframework.web.reactive.function.server.RequestPredicates.*;\n\
    import static org.springframework.web.reactive.function.server.RouterFunctions.nest;\n\
    import static org.springframework.web.reactive.function.server.RouterFunctions.route;\n\
    import static org.springframework.web.reactive.function.server.ServerResponse.ok;\n\
    @SpringBootApplication\npublic class Application\n{\npublic static void main(String[]\
    \ args) {\nSpringApplication.run(SpringBootWebfluxFunctionalDemoApplication.class,\
    \ args);\n}\n@Autowired\nUserHandler userHandler;\n@Bean\npublic RouterFunction\
    \ routerFunctions() {\nreturn\nnest(path(\"/api/users\"),\nnest(accept(APPLICATION_JSON),\n\
    route(GET(\"/{id}\"), userHandler::getUserById)\n.andRoute(method(HttpMethod.GET),\
    \ userHandler::getAllUsers)\n.andRoute(DELETE(\"/{id}\"), userHandler::deleteUser)\n\
    .andRoute(POST(\"/\"), userHandler::saveUser)));\n}\n}\nListing 12-6.\nApplication.java\n\
    ```\n\nYou defined the router configurations and registered them as a `RouterFunction`\
    \ bean.\nYou can even mix the annotation-based and functional-based programming\n\
    models in the same application.\n\nBy default, `spring-boot-starter-webflux`\n\
    uses  `reactor-netty` as the\nruntime engine. You can exclude `reactor-netty`\
    \ and use\nsome other server that supports reactive non-blocking I/O, such as\n\
    Undertow, Jetty, or Tomcat as well.\n\nNote\n\nFor more details on WebFlux autoconfiguration,\
    \ look at the configuration\nclasses in the `org.springframework.boot.autoconfigure.web.reactive`\n\
    package.\n\nThymeleaf Reactive Support\n\nThymeleaf provides the `thymeleaf-spring5`\n\
    module to support Spring framework 5 integration. The `thymeleaf-spring5`\nmodule\
    \ provides reactive support so that you can use it with Spring\nWebFlux-based\
    \ reactive applications.\n\nSpring Boot 2 Thymeleaf starter includes the `thymeleaf-spring5`\n\
    library as a dependency and autoconfigures Thymeleaf’s reactive support.\nYou\
    \ can check the Thymeleaf reactive autoconfiguration in the\nconfiguration class\
    \ `org.springframework.boot.autoconfigure.thymeleaf.ThymeleafAutoConfiguration`.\n\
    \nThe new `thymeleaf-spring5`\nmodule provides `SpringWebFluxTemplateEngine`,\n\
    which extends `SpringTemplateEngine`\nas the default template engine implementation\
    \ used in the Spring WebFlux\napplications. The `SpringWebFluxTemplateEngine`\n\
    provides three types of processing modes:\n\n*   Full: Thymeleaf will use FULL\n\
    \    mode when no limit for max chunk size is specified and no data-driver\n \
    \   context variable has been specified. All template output will be\n    generated\
    \ in memory and then sent to the server’s output channels as a\n    single `DataBuffer`.\n\
    \n*   Chunked: Thymeleaf will use\n    `CHUNKED` mode\n    when a limit for max\
    \ chunk size is specified but no data-driver context\n    variable has been specified.\
    \ Template output will be generated in chunks\n    equal to or less than the specified\
    \ limit in bytes and then sent to the\n    server’s output channels. After each\
    \ chunk is sent to the output, the\n    template engine will wait for the server\
    \ to request more chunks by means\n    of reactive back pressure.\n\n*   Data-driven:\
    \ Thymeleaf will use\n    `DATA-DRIVEN`\n    mode when a data-driver variable\
    \ (data stream wrapped in `IReactiveDataDriverContextVariable`)\n    has been\
    \ added to the context. In this mode, Thymeleaf will stream data\n    from the\
    \ data driver in chunks using back pressure.\n\nListing [12-7](#A447991_1_En_12_Chapter.html#Par120)\
    \ shows how\nyou can get a stream of data (`Flux<T>`) and\nrender it using Thymeleaf\
    \ reactive support.\n\n```\n@Controller\npublic class UserListController\n{\n\
    @Autowired\nprivate UserReactiveRepository userReactiveRepository;\n@GetMapping(\"\
    /list-users\")\npublic String listUsers(Model model)\n{\nFlux userFlux = this.userReactiveRepository.findAll();\n\
    List userList = userFlux.collectList().block();\nmodel.addAttribute(\"users\"\
    , userList);\nreturn \"users\";\n}\n@GetMapping(\"/list-users-chunked\")\npublic\
    \ String listUsersChunked(Model model)\n{\nFlux userFlux = this.userReactiveRepository.findAll();\n\
    model.addAttribute(\"users\", userFlux);\nreturn \"users\";\n}\n@GetMapping(\"\
    /list-users-reactive\")\npublic String listUsersReactive(Model model)\n{\nFlux\
    \ userFlux = this.userReactiveRepository.findAll();\nmodel.addAttribute(\"users\"\
    , new ReactiveDataDriverContextVariable(userFlux, 1000));\nreturn \"users\";\n\
    }\n}\nListing 12-7.\nUserListController.java Using Thymeleaf Reactive Support\n\
    ```\n\nIn the `listUsers()` method,\nyou are getting data from MongoDB as a reactive\
    \ stream `Flux<User>` and\nfully resolving the data and then rendering the view\
    \ with a complete set\nof data available in memory.\n\nIn the `listUsersChunked()`\n\
    method, you are adding `Flux<User>`\ndirectly to the model, but you haven’t specified\
    \ `responseMaxChunkSizeBytes`,\nso it will be processed like `FULL` mode. If you\n\
    configure the `spring.thymeleaf.reactive.max-chunk-size=size_in_bytes`\nproperty,\
    \ then it will be processed in `CHUNKED` mode.\n\nIn the `listUsersReactive()`\n\
    method, you are getting data from MongoDB as a reactive stream `Flux<User>` and\n\
    wrapping it in `ReactiveDataDriverContextVariable`\nwith a buffer size so that\
    \ Thymeleaf will use the data-driven mode to\nthe render view.\n\nNote\n\nIn the\
    \ Thymeleaf data-driven mode, you can add only one multi-valued\nPublisher (flux)\
    \ to the context.\n\nListing [12-8](#A447991_1_En_12_Chapter.html#Par126) shows\
    \ how\nyou can create the Thymeleaf view template to render users.\n\n```\n\n\
    Users\n\nName\nEmail\n\n...\n...\n\nListing 12-8.\nusers.html Thymeleaf View\n\
    ```\n\nThere is nothing special in this Thymeleaf view to deal with reactive\n\
    streams rendering; behind the scenes Thymeleaf will handle the view\nresolving\
    \ logic from data streams seamlessly.\n\nYou can implement the same endpoints\
    \ using the web functional framework\nstyle `HandlerFunction`s, as\nshown in Listing\
    \ [12-9](#A447991_1_En_12_Chapter.html#Par129).\n\n```\n@Component\npublic class\
    \ UserHandler\n{\n@Autowired\nprivate UserReactiveRepository userReactiveRepository;\n\
    ...\n...\npublic Mono listUsers(ServerRequest request)\n{\nList userList = userReactiveRepository.findAll().collectList().block();\n\
    Map data = new HashMap();\ndata.put(\"users\", userList);\nreturn ServerResponse.ok().contentType(MediaType.TEXT_HTML).render(\"\
    users\", data);\n}\npublic Mono listUsersReactive(ServerRequest request)\n{\n\
    Flux userFlux = userReactiveRepository.findAll();\nReactiveDataDriverContextVariable\
    \ users = new ReactiveDataDriverContextVariable(userFlux, 1000);\nMap data = new\
    \ HashMap();\ndata.put(\"users\", users);\nreturn ServerResponse.ok().contentType(MediaType.TEXT_HTML).render(\"\
    users\", data);\n}\n}\nListing 12-9.\nUserHandler.java\n```\n\nNow you can define\
    \ routes to map URLs to `HandlerFunction`s, as\nshown in Listing [12-10](#A447991_1_En_12_Chapter.html#Par131).\n\
    \n```\n@SpringBootApplication\npublic class Application\n{\n@Autowired\nUserHandler\
    \ userHandler;\npublic static void main(String[] args) {\nSpringApplication.run(SpringBootWebfluxFunctionalDemoApplication.class,\
    \ args);\n}\n...\n...\n@Bean\npublic RouterFunction listUsersRouter() {\nreturn\
    \ route(GET(\"/list-users\"), userHandler::listUsers);\n}\n@Bean\npublic RouterFunction\
    \ listUsersReactiveRouter() {\nreturn route(GET(\"/list-users-reactive\"), userHandler::listUsersReactive);\n\
    }\n}\nListing 12-10.\nApplication.java\n```\n\nIf you have a large data set in\
    \ MongoDB  and access the\nendpoints `/list-users` and `/list-users-reactive`,\n\
    you can clearly see that `/list-users-reactive`\nis more responsive.\n\nReactive\
    \ WebClient\n\nSpring provides  `RestTemplate` \nto invoke RESTful service endpoints,\
    \ which support message converters so\nthat HTTP requests can be made using Java\
    \ objects instead of preparing\nan input request body with JSON or XML manually.\n\
    \nSpring WebFlux provides WebClient as a reactive alternative to `RestTemplate`\
    \ that\nsupports non-blocking. Instead of using `InputStream` and `OutputStream`\
    \ for\nrequest processing, `WebClient` uses `Flux<DataBuffer>`\nas the request\
    \ and the response body.\n\nListing [12-11](#A447991_1_En_12_Chapter.html#Par136)\
    \ shows how,\nas a client, you can make a request to a reactive endpoint.\n\n\
    ```\nWebClient webClient = WebClient.create(\"http://localhost:\"+port);\nList\
    \ users = webClient.get().uri(\"/api/users\")\n.accept(MediaType.APPLICATION_JSON)\n\
    .exchange()\n.flatMap(response -> response.bodyToFlux(User.class).collectList()).block();\n\
    Listing 12-11.\nInvoking Reactive REST Endpoints Using WebClient\n```\n\nThe `webClient.get().uri(\"\
    /api/users\").exchange()`\nwill return a `Mono<ClientResponse>`\nand `ClientResponse`\n\
    provides various utility methods, like the `bodyToMono(),bodyToFlux()`\nand `body(BodyExtractor)`\n\
    methods to extract body content.\n\nTesting Spring WebFlux Applications\n\nThe\
    \ `spring-test`\nmodule provides `WebTestClient`, which\ncan be used for testing\
    \ reactive endpoints. Spring Boot autoconfigures\nthe `WebTestClient` so you\n\
    can autowire `WebTestClient` without\nhaving to manually configuring it.\n\nListing\
    \ [12-12](#A447991_1_En_12_Chapter.html#Par140) shows how\nto test the reactive\
    \ REST endpoint `GET /api/users` using\n`WebTestClient`.\n\n```\nimport org.junit.Test;\n\
    import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport static org.springframework.http.MediaType.*;\n\
    import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.reactive.server.WebTestClient;\n\
    import java.util.List;\nimport static org.junit.Assert.assertEquals;\nimport static\
    \ org.junit.Assert.assertNotNull;\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment\
    \ = SpringBootTest.WebEnvironment.RANDOM_PORT)\npublic class SpringBootWebfluxFunctionalDemoApplicationTests\n\
    {\n@Autowired\nprivate WebTestClient webTestClient;\n@Test\npublic void getAllUsers()\
    \ {\nwebTestClient.get().uri(\"/api/users\").accept(APPLICATION_JSON).exchange()\n\
    .expectStatus().isOk()\n.expectHeader().contentType(APPLICATION_JSON)\n.expectBodyList(User.class)\n\
    .consumeWith(result -> assertEquals(5, result.getResponseBody().size()));\n}\n\
    }\nListing 12-12.\nTesting Reactive Endpoints Using WebTestClient\n```\n\nYou\
    \ can inject `WebTestClient` and use\nrelative URLs for testing instead of providing\
    \ complete URLs. Once the\nREST endpoint is invoked, you can assert HTTP status\
    \ and `ContentType` header\nvalues and specify the class type that response body\
    \ needs to be\nconverted to.\n\nSimilarly, you can perform other operations like\
    \ `POST`, `DELETE`, etc., as\nshown in Listing [12-13](#A447991_1_En_12_Chapter.html#Par143).\n\
    \n```\n@Test\npublic void createUser() {\nUser user = new User(UUID.randomUUID().toString(),\
    \ \"Zinx\", \"zinx@gmail.com\");\nwebTestClient.post().uri(\"/api/users\")\n.body(Mono.just(user),\
    \ User.class)\n.exchange()\n.expectStatus().isOk()\n.expectHeader().contentType(MediaType.APPLICATION_JSON_UTF8)\n\
    .expectBody(User.class)\n.consumeWith(result -> assertThat(result.getResponseBody()).isEqualToComparingFieldByField(user));\n\
    }\nListing 12-13.\nPerforming POST Requests Using WebTestClient\n```\n\nThis example\
    \ performs a `POST` request to `/api/users` to create\na new `User`. It\nsends\
    \ `Mono<User>` as\nthe request body and gets the created `User` as the response\n\
    body.\n\nYou can also perform JSON assertions on the response body by using JSON\n\
    Path library assertions. You can invoke the `GET /api/users/{id}`\nendpoint to\
    \ retrieve a particular user for the given ID and assert the\nresponse JSON, as\
    \ shown in Listing [12-14](#A447991_1_En_12_Chapter.html#Par146).\n\n```\n@Test\n\
    public void getUserById() {\nString id = \"uid1\";\nwebTestClient.get().uri(\"\
    /api/users/\"+id)\n.exchange()\n.expectStatus().isOk()\n.expectBody()\n.jsonPath(\"\
    $.id\").isEqualTo(id)\n.jsonPath(\"$.name\").isEqualTo(\"Admin\")\n.jsonPath(\"\
    $.email\").isEqualTo(\"admin@gmail.com\");\n}\nListing 12-14.\nPerforming JSON\
    \ Assertions on WebTestClient Response Body\n```\n\nThis example asserts the response\
    \ JSON  using `jsonPath()` assertions\nprovided by the JSON Path library. For\
    \ more details on JSON Path, see\n [`https://github.com/json-path/JsonPath`](https://github.com/json-path/JsonPath)\
    \ .\n\nNote\n\nYou will learn more about testing Spring Boot applications in Chapter\n\
    [15](#A447991_1_En_15_Chapter.html).\n\nSummary\n\nThis chapter showed you how\
    \ to build reactive web applications using the\nSpring WebFlux framework, which\
    \ is a new module introduced in Spring 5.\nYou built a reactive application using\
    \ the MongoDB reactive stream\ndriver and WebFlux with the annotation-based model\
    \ and the functional\nstyle programming model. In the next chapter, you learn\
    \ how to secure\ntraditional web applications and REST APIs using Spring Security.\n\
    \n13. Securing Web Applications\n\nSecurity  is an\nimportant aspect of software\
    \ application design. It ensures that only\nthose who have authority to access\
    \ the secured resources can do so. When\nit comes to securing an application,\
    \ two primary things you’ll need to\ntake care of are authentication and authorization.\
    \ Authentication refers\nto the process of verifying the user, which is typically\
    \ done by asking\nfor credentials. Authorization refers to the process of verifying\n\
    whether or not the user is allowed to do a certain activity.\n\nSpring Security\
    \ is a powerful and flexible security framework for\nsecuring Java-based web applications.\
    \ Even though Spring Security is\ncommonly used with Spring-based applications,\
    \ you can use it to secure\nnon-Spring-based web applications too.\n\nThis chapter\
    \ explains how to use the Spring Boot Security starter to\nsecure SpringMVC-based\
    \ web applications and how to secure service layer\ncomponents using method-level\
    \ security. The chapter also explores how to\nconfigure Spring Security to secure\
    \ the REST API.\n\nSpring Security in Spring Boot Web Application\n\nSpring Security\
    \ is a framework for securing Java-based applications at\nvarious layers with\
    \ great flexibility and customizability. Spring\nSecurity provides authentication\
    \ and authorization support against\ndatabase authentication, LDAP, form authentication,\
    \ JA-SIG central\nauthentication service, Java Authentication and Authorization\
    \ Service\n(JAAS), and many more. Spring Security provides support for dealing\
    \ with\ncommon attacks like CSRF, XSS, and session fixation protection, with\n\
    minimal configuration.\n\nSpring Security can be used to secure the application\
    \ at various layers,\nsuch as web URLs, service layer methods, etc. Spring Security\
    \ from\nversion 3.2 onward provides Java configuration support for security.\n\
    Using Spring Security in Spring Boot application became easier with its\nautoconfiguration\
    \ features.\n\nAdding the Spring Security Starter (`spring-boot-starter-security`)\n\
    to an Spring Boot application will:\n\n*   Enable HTTP basic security\n\n*   Register\
    \ the `AuthenticationManager`\n    bean with an in-memory store and a single user\n\
    \n*   Ignore paths for commonly used static resource locations (such as `/css/**`,\
    \ `/js/**`, `/images/**`, etc.)\n\n*   Enable common low-level features such as\
    \ XSS, CSRF, caching, etc.\n\nYou’ll get started by looking at how to secure a\
    \ Spring Boot application\nusing Spring Security. First, create a Spring Boot\
    \ project with the Web,\nThymeleaf, and Spring Security starters.\n\n```\norg.springframework.boot\n\
    spring-boot-starter-web\n\norg.springframework.boot\nspring-boot-starter-thymeleaf\n\
    \norg.springframework.boot\nspring-boot-starter-security\n\n```\n\nNow if you\
    \ run the application and access `http://localhost:8080`,\nyou will be prompted\
    \ to enter the user credentials. The default user is\n`user` and the\npassword\
    \ is auto-generated. You can find it in the console log.\n\n```\nUsing default\
    \ security password: 78fa095d-3f4c-48b1-ad50-e24c31d5cf35\n```\n\nYou can change\
    \ the default user credentials in  `application.properties`\n as follows:\n\n\
    ```\nsecurity.user.name=admin\nsecurity.user.password=secret\nsecurity.user.role=USER,ADMIN\n\
    ```\n\nOkay, that’s nice for a quick demo. But in your actual projects, you may\n\
    want to implement role-based access control using a persistence\ndatastore such\
    \ as a database. Also, you might want to fine-tune the\naccess to resources (URLs,\
    \ service layer methods, etc.) based on roles.\nNow you’ll see how to customize\
    \ the default Spring Security\nautoconfiguration to meet your needs.\n\nFirst,\
    \ you’ll create the database tables shown in Figure [13-1](#A447991_1_En_13_Chapter.html#Fig1)\
    \ to store users\nand roles.\n\n![A447991_1_En_13_Fig1_HTML.jpg](A447991_1_En_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1.\n\nUsers and roles database\ntables \n\nYou are going to use the\
    \ Spring Data JPA starter to talk to your\ndatabase.\n\n```\norg.springframework.boot\n\
    spring-boot-starter-data-jpa\n\ncom.h2database\nh2\n\n```\n\nCreate the JPA entities\
    \ called `users` and `roles`, as shown in\nListings [13-1](#A447991_1_En_13_Chapter.html#Par22)\
    \ and [13-2](#A447991_1_En_13_Chapter.html#Par23).\n\n```\n@Entity\n@Table(name=\"\
    users\")\npublic class User\n{\n@Id @GeneratedValue(strategy=GenerationType.AUTO)\n\
    private Integer id;\n@Column(nullable=false, unique=true)\nprivate String email;\n\
    @Column(nullable=false)\nprivate String password;\n@ManyToMany(cascade=CascadeType.MERGE)\n\
    @JoinTable(\nname=\"user_role\",\njoinColumns={@JoinColumn(name=\"USER_ID\",\n\
    referencedColumnName=\"ID\")},\ninverseJoinColumns={@JoinColumn(name=\"ROLE_ID\"\
    ,\nreferencedColumnName=\"ID\")})\nprivate List roles;\n//setters and getters\n\
    }\nListing 13-1.\nUser JPA Entity\n```\n\n```\n@Entity\n@Table(name=\"roles\"\
    )\npublic class Role\n{\n@Id @GeneratedValue(strategy=GenerationType.AUTO)\nprivate\
    \ Integer id;\n@Column(nullable=false, unique=true)\nprivate String name;\n@ManyToMany(mappedBy=\"\
    roles\")\nprivate List users;\n//setters and getters\n}\nListing 13-2.\nRole JPA\
    \ Entity\n```\n\nNext, create the Spring Data JPA repository for the `user` entity,\
    \ as shown\nin Listing [13-3](#A447991_1_En_13_Chapter.html#Par25).\n\n```\npublic\
    \ interface UserRepository extends JpaRepository\n{\nOptional findByEmail(String\
    \ email);\n}\nListing 13-3.\nSpring Data JPA Repository Interface UserRepository.java\n\
    ```\n\nSpring Security uses the `UserDetailsService`\ninterface, which contains\
    \ the `loadUserByUsername(String username)` method to look up `UserDetails` for\
    \ a\ngiven `username`.\nThe `UserDetails`\ninterface represents an authenticated\
    \ user object and Spring Security\nprovides an out-of-the-box implementation of\
    \ `org.springframework.security.core.userdetails.User`.\n\nNow you implement a\
    \ \n`UserDetailsService`\n   to get\n`UserDetails`\nfrom database, as shown in\
    \ Listing [13-4](#A447991_1_En_13_Chapter.html#Par28).\n\n```\n@Service\n@Transactional\n\
    public class CustomUserDetailsService implements UserDetailsService\n{\n@Autowired\n\
    private UserRepository userRepository;\n@Override\npublic UserDetails loadUserByUsername(String\
    \ userName)\nthrows UsernameNotFoundException {\nUser user = userRepository.findByEmail(userName)\n\
    .orElseThrow(() -> new UsernameNotFoundException(\"Email \"+userName+\" not found\"\
    ));\nreturn new org.springframework.security.core.userdetails.User(\nuser.getEmail(),\n\
    user.getPassword(),\ngetAuthorities(user)\n);\n}\nprivate static Collection getAuthorities(User\
    \ user)\n{\nString[] userRoles = user.getRoles()\n.stream()\n.map((role) -> role.getName())\n\
    .toArray(String[]::new);\nCollection authorities = AuthorityUtils.createAuthorityList(userRoles);\n\
    return authorities;\n}\n}\nListing 13-4.\nUserDetailsService Implementation\n\
    ```\n\nSpring Boot implemented the default Spring Security autoconfiguration in\n\
    \ `SecurityAutoConfiguration`\n. To switch the default web application security\
    \ configuration\nand provide your own customized security configuration, you can\
    \ create a\nconfiguration class that extends `WebSecurityConfigurerAdapter`\n\
    and is annotated with `@EnableWebSecurity`.\n\nNow you’ll create a configuration\
    \ class that extends  `WebSecurityConfigurerAdapter`\n   to\ncustomize the default\
    \ Spring Security configuration, as shown in Listing\n[13-5](#A447991_1_En_13_Chapter.html#Par31).\n\
    \n```\n@Configuration\n@EnableWebSecurity\npublic class WebSecurityConfig extends\
    \ WebSecurityConfigurerAdapter {\n@Autowired\nprivate UserDetailsService customUserDetailsService;\n\
    @Bean\npublic PasswordEncoder passwordEncoder() {\nreturn new BCryptPasswordEncoder();\n\
    }\n@Autowired\npublic void configureGlobal(AuthenticationManagerBuilder auth)\n\
    throws Exception\n{\nauth\n.userDetailsService(customUserDetailsService)\n.passwordEncoder(passwordEncoder());\n\
    }\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http\n.authorizeRequests()\n.antMatchers(\"/resources/\", \"/webjars/\",\"/assets/\"\
    )\n.permitAll()\n.antMatchers(\"/\").permitAll()\n.antMatchers(\"/admin/\").hasRole(\"\
    ADMIN\")\n.anyRequest().authenticated()\n.and()\n.formLogin()\n.loginPage(\"/login\"\
    )\n.defaultSuccessUrl(\"/home\")\n.failureUrl(\"/login?error\")\n.permitAll()\n\
    .and()\n.logout()\n.logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"\
    ))\n.logoutSuccessUrl(\"/login?logout\")\n.permitAll()\n.and()\n.exceptionHandling()\n\
    .accessDeniedPage(\"/accessDenied\");\n}\n}\nListing 13-5.\nCustomized Spring\
    \ Security Configuration Extending WebSecurityConfigurerAdapter\n```\n\nThis example\
    \ configures `CustomUserDetailsService`\nand `BCryptPasswordEncoder`\nto be used\
    \ by `AuthenticationManager`\ninstead of the default in-memory database with a\
    \ single-user with a\nplaintext password.\n\nThe  `configure(HttpSecurity http)`\
    \ method    is configured to:\n\n*   Ignore the static resource paths `\"/resources/**\"\
    `,\n    `\"/webjars/**\"`,\n    and `\"/assets/**\"`\n\n*   Allow everyone to\
    \ have access to the root URL `\"/\"`\n\n*   Restrict access to URLs that start\
    \ with `/admin/` to only users\n    with the `ADMIN`\n    role\n\n*   All other\
    \ URLs should be accessible to authenticated users only\n\nYou are also configuring\
    \ custom form-based login parameters and making\nthem accessible to everyone.\
    \ By default, the logout request works only\nwith the HTTP `POST` method, so this\n\
    example configures it to be used with any HTTP method, which makes it\naccessible\
    \ to everyone.\n\nThe example also configures the URL to redirect the users to\
    \ the `/accessDenied` URL if\nthey try to access a resource they don’t have access\
    \ to.\n\nYou are going to use Thymeleaf view templates for rendering views. The\n\
    \ `thymeleaf-extras-springsecurity4`\nmodule  provides Thymeleaf Spring Security\
    \ dialect attributes\n(`sec:authentication`,\n`sec:authorize`,\netc.) to conditionally\
    \ render parts of the view based on authentication\nstatus, logged-in user roles,\
    \ etc.\n\nAdd the following dependency to use the Thymeleaf Spring Security\n\
    dialect.\n\n```\norg.thymeleaf.extras\nthymeleaf-extras-springsecurity4\n\n```\n\
    \nNow you need to create a configuration class for providing MVC\nconfiguration,\
    \ as shown in Listing [13-6](#A447991_1_En_13_Chapter.html#Par44).\n\n```\n@Configuration\n\
    public class WebConfig implements WebMvcConfigurer\n{\n@Override\npublic void\
    \ addViewControllers(ViewControllerRegistry registry)\n{\nregistry.addViewController(\"\
    /login\").setViewName(\"login\");\nregistry.addViewController(\"/home\").setViewName(\"\
    home\");\nregistry.addViewController(\"/admin/home\").setViewName(\"adminhome\"\
    );\nregistry.addViewController(\"/accessDenied\").setViewName(\"403\");\n}\n@Bean\n\
    public SpringSecurityDialect securityDialect() {\nreturn new SpringSecurityDialect();\n\
    }\n}\nListing 13-6.\nSpring WebMVC Configuration\n```\n\nThis example configures\
    \ view controllers to specify which view to render\nfor which URL. Also, it registers\
    \ `SpringSecurityDialect`\nto enable using the Thymeleaf Spring Security dialect.\n\
    \nNow that you have all the configuration ready, it’s time to create views\nusing\
    \ Thymeleaf.\n\nCreate `src/main/resources/templates/login.html`,\nas shown in\
    \ Listing [13-7](#A447991_1_En_13_Chapter.html#Par48).\n\n```\n\nSpringBoot Security\n\
    \nInvalid Email and Password.\n\nLogIn\n\nListing 13-7.\nThymeleaf Login View\n\
    ```\n\nThis code creates the login form with the `username` and `password` fields\
    \ and\nrenders a login error if there is an `error` request\nparameter. The code\
    \ configures the login form `failureUrl` to `\"/login?error\"`, so if\nthe users\
    \ provide incorrect credentials, they will be redirected to the\n`/login?error`\n\
    URL.\n\nNext, create `src/main/resources/templates/home.html`,\nas shown in Listing\
    \ [13-8](#A447991_1_En_13_Chapter.html#Par51).\n\n```\n\nSpringBoot Security\n\
    \nWelcome User\nLogout\n\nYou will see this only if you are ADMIN\nAdmin Home\n\
    \nListing 13-8.\nThymeleaf Home View\n```\n\nThe code configures `\"/home\"` as\
    \ `defaultSuccessUrl`, so\nafter successful authentication, users will be redirected\
    \ to the `/home` URL, which will\nrender the `home.html` view.\n\nIn the `home.html`\
    \ view, you\nare using `sec:authentication=\"principal.username\"`\nto display\
    \ the authenticated username. This example also conditionally\nrenders the link\
    \ to the admin’s home page only if the authenticated user\nhas the role `ROLE_ADMIN`.\
    \ This is\ndone by using `sec:authorize=\"hasRole('ROLE_ADMIN')\"`.\n\nCreate\
    \ `src/main/resources/templates/adminhome.html`,\nas shown in Listing [13-9](#A447991_1_En_13_Chapter.html#Par55).\n\
    \n```\n\nSpringBoot Security\n\nWelcome Administrator(User)\nLogout\n\nListing\
    \ 13-9.\nThymeleaf Adminhome View\n```\n\nNext, create `src/main/resources/templates/403.html`,\n\
    as shown in Listing [13-10](#A447991_1_En_13_Chapter.html#Par57).\n\n```\n\nAccess\
    \ Denied\n\nYou are not authorized to view this page!!\n\nListing 13-10.\nAccessDenied\
    \ View 403.html\n```\n\nIf the logged-in user doesn’t have the `ROLE_ADMIN` role\
    \ and\ntries to access the `/admin/home` URL, then\nSpring Security will throw\
    \ `AccessDeniedException`.\nThe code then redirects the user to the `/accessDenied`\
    \ URL\nwhen `AccessDeniedException`\noccurs. That’s because the example maps the\
    \ `/accessDenied` URL to\nview the `403.html` file.\n\nInstead of configuring\
    \ `exceptionHandling().accessDeniedPage(\"/accessDenied\")`,\nyou can simply configure\
    \ `exceptionHandling();`\nwhich will throw `AccessDeniedException`\nwith the HTTP\
    \ status code `403`. You can then\nplace the `403.html` file in the\n`src/main/resources/public/error/`\n\
    folder, which will automatically be picked up by the Spring Boot\nerror-handling\
    \ mechanism.\n\nBefore running this application, you need to initialize the database\n\
    with some sample data for `users` and `roles`, as shown in\nListing [13-11](#A447991_1_En_13_Chapter.html#Par61).\n\
    \n```\ndelete from  user_role;\ndelete from  roles;\ndelete from  users;\nINSERT\
    \ INTO roles (id, name) VALUES\n(1, 'ROLE_ADMIN'),\n(2, 'ROLE_USER');\nINSERT\
    \ INTO users (id, email, password, name) VALUES\n(1, 'admin@gmail.com', '$2a$10$hKDVYxLefVHV/vtuPhWD3OigtRyOykRLDdUAp80Z1crSoS1lFqaFS',\
    \ 'Admin'),\n(2, 'siva@gmail.com', '$2a$10$UFEPYW7Rx1qZqdHajzOnB.VBR3rvm7OI7uSix4RadfQiNhkZOi2fi',\
    \ 'Siva'),\n(3, 'user@gmail.com', '$2a$10$ByIUiNaRfBKSV6urZoBBxe4UbJ/sS6u1ZaPORHF9AtNWAuVPVz1by',\
    \ 'DemoUser');\ninsert into user_role(user_id, role_id) values\n(1,1),\n(1,2),\n\
    (3,2);\nListing 13-11.\nsrc/main/resources/data.sql\n```\n\nThe passwords are\
    \ encrypted using the  `BCryptPasswordEncoder.encode(plan_tx_password)`\nmethod\
    \   .\n\nRun the application and go to `http://localhost:8080/home`.\nYou will\
    \ be redirected to the login page, as you are not yet\nauthenticated. After submitting\
    \ the valid credentials (such as `admin@gmail.com/admin`),\nyou will be redirected\
    \ to the home page. If you have logged in as a user\nwith the `ADMIN`\nrole, you\
    \ should be able to see the text You will see this only if you are ADMIN\nand\
    \ a link to Admin Home. If you\nclick on the Admin Home link, you should be able\
    \ to see the Admin Home\npage.\n\nIf you have logged in as a normal user (`user@gmail.com/user`),\n\
    you will not be able to see You will see\nthis only if you are ADMIN and a link\
    \ to Admin Home. If you try\nto access the Admin Home URL by directly entering\
    \ `http://localhost:8080/admin/home`,\nyou will be redirected to the Access Denied\
    \ page (the `403.html` view).\n\nImplementing the Remember-Me Feature\n\nSpring\
    \ Security provides the Remember-Me feature so that applications\ncan remember\
    \ the identity of a user between sessions. To use the\nRemember-Me functionality,\
    \ you just need to send the HTTP parameter\n`remember-me`.\n\n```\n\nRemember\
    \ Me\nLogIn\n\n```\n\nSpring Security provides the following two implementations\
    \ of the\nRemember-Me feature out-of-the-box:\n\n*   Simple hash-based token as\
    \ a\n    cookie—This approach creates a token by hashing the user identity\n \
    \   information and setting it as a cookie on the client browser.\n\n*   Persistent\
    \ token—This approach\n    uses a persistent store like a relational database\
    \ to store the tokens.\n\nSimple Hash-Based Token as\nCookie \n\nYou can enable\
    \ the Remember-Me feature in the Security configuration\nwhich by default use\
    \ hash-based token approach, as shown in Listing\n[13-12](#A447991_1_En_13_Chapter.html#Par71).\n\
    \n```\n@Configuration\n@EnableWebSecurity\npublic class WebSecurityConfig extends\
    \ WebSecurityConfigurerAdapter\n{\n...\n...\n@Override\nprotected void configure(HttpSecurity\
    \ http) throws Exception {\nhttp\n.authorizeRequests()\n.antMatchers(\"/resources/**\"\
    , \"/webjars/**\",\"/assets/**\").permitAll()\n.antMatchers(\"/\").permitAll()\n\
    .antMatchers(\"/admin/**\").hasRole(\"ADMIN\")\n.anyRequest().authenticated()\n\
    .and()\n.formLogin()\n.loginPage(\"/login\")\n.defaultSuccessUrl(\"/home\")\n\
    .failureUrl(\"/login?error\")\n.permitAll()\n.and()\n.logout()\n.logoutRequestMatcher(new\
    \ AntPathRequestMatcher(\"/logout\"))\n.logoutSuccessUrl(\"/login?logout\")\n\
    .deleteCookies(\"remember-me\")\n.permitAll()\n.and()\n.rememberMe()\n.and()\n\
    .exceptionHandling()\n;\n}\n}\nListing 13-12.\nSpring Security Configuration Enabling\
    \ Remember-Me\n```\n\nWith this configuration, when you log in by selecting the\
    \ Remember Me\ncheckbox, a cookie will be set with `remember-me` and will\ncontain\
    \ the hash-based token as a value. Now if you close and reopen the\nbrowser and\
    \ go to the application, you will be automatically\nauthenticated. Also note that\
    \ the `remember-me` cookie is\ndeleted when the user logs out.\n\nThis hash-based\
    \ token as a cookie approach is implemented by Spring\nSecurity using `org.springframework.security.web.authentication.rememberme.TokenBasedRememberMeServices`.\n\
    \nThe `remember-me`\ncookie token value is generated as follows:\n\n```\nbase64(username\
    \ + \":\" + expirationTime + \":\" + md5Hex(username + \":\" + expirationTime\
    \ + \":\" password + \":\" + key))\n```\n\nThe default `expirationTime` is two\n\
    weeks (1209600 seconds) and `key` is a random\ngenerated string (`UUID.randomUUID().toString()`).\n\
    \nYou can customize the cookie name, expiration time, and key as follows:\n\n\
    ```\n.rememberMe()\n.key(\"my-secure-key\")\n.rememberMeCookieName(\"my-remember-me-cookie\"\
    )\n.tokenValiditySeconds(24 * 60 * 60)\n.and()\n```\n\nWith this customization,\
    \ after successful authentication, it will create\nthe `remember-me`\ncookie with\
    \ the name `my-remember-me-cookie`.\nIt will be valid for one day (24 * 60 * 60\
    \ seconds).\n\nCaution\n\nIn this approach, the generated token contains the MD5\
    \ hashed password\nand is a potential security vulnerability if the cookie is\
    \ captured.\n\nPersistent Tokens \n\nSpring Security provides another implementation\
    \ of the Remember-Me\nfeature, which can be used to store the generated tokens\
    \ in a persistent\nstorage such as a database. The persistent tokens approach\n\
    \ is implemented using `org.springframework.security.web.authentication.rememberme.PersistentTokenBasedRememberMeServices`,\n\
    which internally uses the `PersistentTokenRepository`\ninterface to store the\
    \ tokens.\n\nSpring provides the following two implementations of `PersistentTokenRepository`\n\
    out-of-the-box.\n\n*   `InMemoryTokenRepositoryImpl`\n    can be used to store\
    \ tokens in-memory (not recommended for production\n    use).\n\n*   `JdbcTokenRepositoryImpl`\n\
    \    can be used to store tokens in a database.\n\nThe `JdbcTokenRepositoryImpl`\n\
    stores the tokens in the `persistent_logins`\ntable. See Listing [13-13](#A447991_1_En_13_Chapter.html#Par86).\n\
    \n```\ncreate table persistent_logins\n(\nusername varchar(64) not null,\nseries\
    \ varchar(64) primary key,\ntoken varchar(64) not null,\nlast_used timestamp not\
    \ null\n);\nListing 13-13.\npersistent_logins table\n```\n\nNow you’ll see how\
    \ to configure Remember-Me functionality to use a\nrelational database to store\
    \ the tokens. See Listing [13-14](#A447991_1_En_13_Chapter.html#Par88).\n\n```\n\
    @Configuration\n@EnableWebSecurity\npublic class WebSecurityConfig extends WebSecurityConfigurerAdapter\n\
    {\n@Autowired\nprivate UserDetailsService customUserDetailsService;\n@Autowired\n\
    private DataSource dataSource;\n...\n...\n@Override\nprotected void configure(HttpSecurity\
    \ http) throws Exception {\nhttp\n...\n...\n.rememberMe()\n.tokenRepository(persistentTokenRepository())\n\
    .tokenValiditySeconds(24 * 60 * 60)\n.and()\n.exceptionHandling()\n;\n}\nPersistentTokenRepository\
    \ persistentTokenRepository(){\nJdbcTokenRepositoryImpl tokenRepositoryImpl =\
    \ new JdbcTokenRepositoryImpl();\ntokenRepositoryImpl.setDataSource(dataSource);\n\
    return tokenRepositoryImpl;\n}\n}\nListing 13-14.\nConfiguring Remember-Me Using\
    \ Persistent Tokens\n```\n\nNow when you successfully log in with the Remember-Me\
    \ checkbox selected,\nthe generated token will be stored in the `persistent_logins`\n\
    table.\n\nThis approach generates a unique series value for the user, together\n\
    with random token data to create a token and set it as a cookie. Every\ntime the\
    \ user then logs in with the cookie, a new random token data will\nbe generated,\
    \ but the series value will be intact for that user.\n\nCross-Site Request Forgery\n\
    \nCross-Site Request Forgery (CSRF )  is an attack that\nlets users execute unwanted\
    \ actions on an authenticated web application.\nSuppose you go to the `genuinesite.com`\
    \ web\nsite and authenticate yourself. This may set cookies on your browser,\n\
    including an authentication token. Now, if you open the `malicioussite.com` web\n\
    site on the same browser but in a different tab, you can send a request\nfrom\
    \ `malicioussite.com` to\n`genuinesite.com`\nwith unwanted data. This data will\
    \ send the request along with the\ncookies set by `genuinesite.com`.\n\nSpring\
    \ Security provides CSRF protection and is enabled by default.\nSpring Security\
    \ provides CSRF protection by using `org.springframework.security.web.csrf.CsrfFilter`.\n\
    The `CsrfFilter`\nwill intercept all the requests, ignore the `GET`, `HEAD`, `TRACE`,\
    \ and `OPTIONS` requests, and\ncheck whether a valid CSRF token is present for\
    \ all the other requests\n(such as `POST`,\n`PUT`, `DELETE`, etc.). If the\nCSRF\
    \ token is missing or contains an invalid token, then it will throw\n`AccessDeniedException`.\n\
    \nYou should send the state-changing requests (such as `POST`, `PUT`, `DELETE`,\
    \ etc.) with\nthe CSRF token as a hidden parameter in the request. You can manually\n\
    insert the token as follows:\n\n```\n...\n...\n\n```\n\nIf you are using Spring\
    \ Security and Thymeleaf, the CSRF token will be\nautomatically included if the\
    \ `<form>` has the\n`th:action`\nattribute and `method` is anything\nother than\
    \ `GET`,\n`HEAD`, `TRACE`, or `OPTIONS`.\n\nSuppose you have the following Thymeleaf\
    \ form.\n\nWhen it is rendered, if you see the page source, you can see the CSRF\n\
    token inserted automatically as a hidden parameter.\n\nNote\n\nIf you use the\
    \ `action` attribute\ninstead of setting the `th:action` or `method` value to\
    \ any\nof `GET`, `HEAD`, `TRACE`, or `OPTIONS`, the CSRF\ntoken won’t be inserted\
    \ automatically.\n\nIf you submit the form without a CSRF token or with an invalid\
    \ CSRF\ntoken, then `AccessDeniedException`\nwill be thrown with the `403` HTTP\
    \ status code.\n\nMethod-Level Security\n\nYou have learned how to secure web\
    \ applications by protecting access to\nweb URLs. But the service-layer methods\
    \ that are supposed to be invoked\nonly by authenticated users are still accessible\
    \ without restriction if\nusers have the Spring bean. You can use Spring not only\
    \ for developing\nweb applications but also for batch-processing applications,\
    \ integration\nservers, etc., which doesn’t provide a web interface. So, you may\
    \ need\nto secure the methods access based on roles and permissions.\n\nSpring\
    \ Security provides method-level security \n  using the `@Secured` annotation.\n\
    It also supports the JSR-250 security annotation `@RolesAllowed`. From\nversion\
    \ 3.0, Spring Security has provided an expression-based security\nconfiguration\
    \ using the `@PreAuthorize` and\n`@PostAuthorize`\nannotations, which provides\
    \ more fine-grained control.\n\nYou can enable method-level security using the\
    \ `@EnableGlobalMethodSecurity`\nannotation on any configuration class, as follows:\n\
    \n*   `secureEnabled`:\n    Defines whether `@Secured` is enabled.\n\n*   `prePostEnabled`:\n\
    \    Defines whether the pre/post annotations `@PreAuthorize` and\n    `@PostAuthorize`\n\
    \    are enabled.\n\n*   `jsr250Enabled`:\n    Defines whether the JSR-250 annotation\
    \ `@RolesAllowed` is\n    enabled.\n\n```\n@Configuration\n@EnableWebSecurity\n\
    @EnableGlobalMethodSecurity(securedEnabled = true,\nprePostEnabled=true,\njsr250Enabled=true)\n\
    public class WebSecurityConfig extends WebSecurityConfigurerAdapter\n{\n...\n\
    ...\n}\n```\n\nOnce you enable method-level security, you can annotate the SpringMVC\n\
    controller request-handling methods, service-layer methods, or any\nSpring components\
    \ with `@Secured`, `@PreAuthorize`, or\n`@RolesAllowed`\nin order to define your\
    \ security restrictions. See Listing [13-15](#A447991_1_En_13_Chapter.html#Par110).\n\
    \n```\n@RestController\npublic class AdminRestController\n{\n@Autowired\nprivate\
    \ UserService userService;\n@PreAuthorize(\"hasRole('ADMIN') OR hasRole('USER')\"\
    )\n@PutMapping(\"/admin/users/{id}\")\npublic User updateUser(@RequestBody User\
    \ user)\n{\nuserService.updateUser(user);\nreturn user;\n}\n@Secured(\"ROLE_ADMIN\"\
    )\n@DeleteMapping(\"/admin/users/{id}\")\npublic void deleteUser(@PathVariable(\"\
    id\") Integer userId)\n{\nuserService.deleteUser(userId);\n}\n}\nListing 13-15.\n\
    SpringMVC REST Controller Using Method-Level Security Annotations\n```\n\nSimilarly,\
    \ you can secure service-layer methods using the `@Secured`, `@PreAuthorize`,\
    \ or\n`@RolesAllowed`\nannotations.\n\n```\n@Service\n@Transactional\npublic class\
    \ UserService\n{\n@PreAuthorize(\"hasRole('ADMIN')\")\npublic void deleteUser(Integer\
    \ userId)\n{\n....\n}\n}\n```\n\nYou can use the `@Secured`, `@PreAuthorize`,\
    \ or\n`@RolesAllowed`\nannotations at the class level as well, which applies security\n\
    configuration to all the methods in that class.\n\nYou can use the Spring Expression\
    \ Language (SpEL) to define the security\nexpressions as follows:\n\n*   `hasRole(role)`:\n\
    \    Returns true if the current user has the specified role.\n\n*   `hasAnyRole(role1,role2)`:\n\
    \    Returns true if the current user has any of the supplied roles.\n\n*   `isAnonymous()`:\n\
    \    Returns true if the current user is an anonymous user.\n\n*   `isAuthenticated()`:\n\
    \    Returns true if the user is not anonymous.\n\n*   `isFullyAuthenticated()`:\n\
    \    Returns true if the user is not an anonymous or Remember-Me user.\n\nYou\
    \ can combine these expressions using the logical operators `AND`, `OR`, and `NOT`(`!`).\n\
    \n```\n@PreAuthorize(\"hasRole('ADMIN') OR hasRole('USER')\")\n@PreAuthorize(\"\
    isFullyAuthenticated() AND hasRole('ADMIN')\")\n@PreAuthorize(\"!isAnonymous()\"\
    )\n```\n\nAlthough defining security restrictions using `@Secured` and `@PreAuthorize`\
    \ looks\nsimilar, there are some minor differences to be noted.\n\nThe `@Secured(\"\
    ROLE_ADMIN\")`\nannotation is the same as `@PreAuthorize(\"hasRole('ROLE_ADMIN')\"\
    )`.\nThe `@Secured({\"ROLE_USER\", \"ROLE_ADMIN\")` is considered as `ROLE_USER\
    \ OR ROLE_ADMIN`, so you cannot express the `AND` condition using\n`@Secured`.\
    \ You\ncan define the same with `@PreAuthorize(\"hasRole('ADMIN') OR hasRole('USER')\"\
    )`, which is easier to understand. You can\nexpress `AND`,\n`OR`, or `NOT`(`!`)\
    \ as well.\n\n```\n@PreAuthorize(\"!isAnonymous() AND hasRole('ADMIN')\")\n```\n\
    \nNote\n\nThe `@PreAuthorize`\nannotation is more powerful compared to `@Secured/@RolesAllowed`,\n\
    so it’s better to use `@PreAuthorize`.\n\nSecuring the REST API Using Spring Security\n\
    \nIn the previous section, you learned how to secure a traditional web\napplication\
    \ using Spring Security. The default behavior of some of the\nSpring Security\
    \ components is suitable to web applications. To secure a\nREST API ,\nhowever,\
    \ you need to customize the components behavior to better suit\nthe REST semantics.\
    \ Follow these steps to do so:\n\n1.  Set up  `AuthenticationEntryPoint`\n   \
    \ .\n\n    By default, when a user tries to access a secured resource without\n\
    \    logging in, Spring Security’s `AuthenticationEntryPoint`\n    redirects the\
    \ user to the login URL. However, for the REST API, it would\n    make more sense\
    \ to return the HTTP status code `401` (`SC_UNAUTHORIZED`) when\n    an unauthorized\
    \ user tries to access secured resource.\n\n    Spring Security provides several\
    \ implementations of `AuthenticationEntryPoint`\n    out-of-the-box. Among them,\
    \ `org.springframework.boot.autoconfigure.security.Http401AuthenticationEntryPoint`\n\
    \    provides the exact behavior you want—return the HTTP status code `401 SC_UNAUTHORIZED`.\n\
    \    See Listing [13-16](#A447991_1_En_13_Chapter.html#Par130).\n\n    ```\n \
    \   public class Http401AuthenticationEntryPoint\n    implements AuthenticationEntryPoint\n\
    \    {\n    private final String headerValue;\n    public Http401AuthenticationEntryPoint(String\
    \ headerValue) {\n    this.headerValue = headerValue;\n    }\n    @Override\n\
    \    public void commence(HttpServletRequest request,\n    HttpServletResponse\
    \ response,\n    AuthenticationException authException)\n    throws IOException,\
    \ ServletException\n    {\n    response.setHeader(\"WWW-Authenticate\", this.headerValue);\n\
    \    response.sendError(HttpServletResponse.SC_UNAUTHORIZED,\n    authException.getMessage());\n\
    \    }\n    }\n    Listing 13-16.\n    AuthenticationEntryPoint for the REST API\n\
    \    ```\n\n2.  Set up  `AuthenticationSuccessHandler`\n    .\n\n    By default,\
    \ Spring Security uses `SavedRequestAwareAuthenticationSuccessHandler`,\n    which\
    \ implements `AuthenticationSuccessHandler`\n    to redirect the user to `redirectUrl`\
    \ with the\n    `301 MOVED PERMANENTLY` HTTP status code. But for REST APIs, it\
    \ would make\n    sense to return the status code `200 OK`, along with\n    the\
    \ authenticated user details as the response body for a successful\n    authentication.\n\
    \n    Listing [13-17](#A447991_1_En_13_Chapter.html#Par134) shows how\n    to\
    \ implement a custom `AuthenticationSuccessHandler`\n    as a Spring bean so that\
    \ you can take advantage of `HttpMessageConverters`\n    to send `User`\n    details\
    \ as the response body.\n\n    ```\n    @Component\n    public class RestAuthenticationSuccessHandler\n\
    \    extends SavedRequestAwareAuthenticationSuccessHandler\n    {\n    private\
    \ final ObjectMapper mapper;\n    @Autowired\n    public RestAuthenticationSuccessHandler\n\
    \    (MappingJackson2HttpMessageConverter messageConverter) {\n    this.mapper\
    \ = messageConverter.getObjectMapper();\n    }\n    @Override\n    public void\
    \ onAuthenticationSuccess(HttpServletRequest request,\n    HttpServletResponse\
    \ response,\n    Authentication authentication)\n    throws IOException, ServletException\n\
    \    {\n    response.setStatus(HttpServletResponse.SC_OK);\n    UserDetails userDetails\
    \ = (UserDetails) authentication.getPrincipal();\n    PrintWriter writer = response.getWriter();\n\
    \    mapper.writeValue(writer, userDetails);\n    writer.flush();\n    writer.close();\n\
    \    }\n    }\n    Listing 13-17.\n    AuthenticationSuccessHandler for the REST\
    \ API\n    ```\n\n3.  Set up  `AuthenticationFailureHandler`\n    .\n\n    Spring\
    \ Security provides `SimpleUrlAuthenticationFailureHandler`,\n    which implements\
    \ `AuthenticationFailureHandler`\n    to redirect to `defaultFailureUrl` if\n\
    \    `defaultFailureUrl` is\n    not null. If `defaultFailureUrl` is\n    null,\
    \ then it will simply return the HTTP status code `401 SC_UNAUTHORIZED`.\n   \
    \ See Listing [13-18](#A447991_1_En_13_Chapter.html#Par137).\n\n    ```\n    public\
    \ class SimpleUrlAuthenticationFailureHandler implements\n    AuthenticationFailureHandler\
    \ {\n    protected final Log logger = LogFactory.getLog(getClass());\n    private\
    \ String defaultFailureUrl;\n    ....\n    ....\n    public SimpleUrlAuthenticationFailureHandler()\
    \ {\n    }\n    public SimpleUrlAuthenticationFailureHandler(String defaultFailureUrl)\
    \ {\n    setDefaultFailureUrl(defaultFailureUrl);\n    }\n    public void onAuthenticationFailure(HttpServletRequest\
    \ request,\n    HttpServletResponse response, AuthenticationException exception)\n\
    \    throws IOException, ServletException {\n    if (defaultFailureUrl == null)\
    \ {\n    logger.debug(\"No failure URL set, sending 401 Unauthorized error\");\n\
    \    response.sendError(HttpServletResponse.SC_UNAUTHORIZED,\n    \"Authentication\
    \ Failed: \" + exception.getMessage());\n    }\n    else {\n    ....\n    ....\n\
    \    }\n    }\n    ...\n    ...\n    }\n    Listing 13-18.\n    AuthenticationFailureHandler\
    \ for the REST API\n    ```\n\n    So, you can use `SimpleUrlAuthenticationFailureHandler`\n\
    \    without setting the `defaultFailureUrl`\n    value, which will be suitable\
    \ for the REST API.\n\n4.  Set up  `LogoutSuccessHandler`\n    .\n\nWhen a user\
    \ logs out of Spring Security, it uses `SimpleUrlLogoutSuccessHandler`,\nwhich\
    \ implements `LogoutSuccessHandler`\nto redirect the user to a default target\
    \ URL. For the REST API, you\nshould return the HTTP status code `200 OK`, similar\
    \ to\n`AuthenticationSuccessHandler`.\n\nSpring Security provides `HttpStatusReturningLogoutSuccessHandler`,\n\
    which you can use to simply return the HTTP status code `200`, as shown in\nListing\
    \ [13-19](#A447991_1_En_13_Chapter.html#Par142).\n\n```\npublic class HttpStatusReturningLogoutSuccessHandler\n\
    implements LogoutSuccessHandler\n{\nprivate final HttpStatus httpStatusToReturn;\n\
    ....\n....\npublic HttpStatusReturningLogoutSuccessHandler() {\nthis.httpStatusToReturn\
    \ = HttpStatus.OK;\n}\npublic void onLogoutSuccess(HttpServletRequest request,\n\
    HttpServletResponse response,\nAuthentication authentication)\nthrows IOException,\
    \ ServletException\n{\nresponse.setStatus(httpStatusToReturn.value());\nresponse.getWriter().flush();\n\
    }\n}\nListing 13-19.\nLogoutSuccessHandle r for the REST API\n```\n\nYou now have\
    \ all the Spring Security customizations in place for\nsecuring the REST API.\
    \ It’s time to hook them up with the Spring Security configuration\n. See Listing\
    \ [13-20](#A447991_1_En_13_Chapter.html#Par144).\n\n```\n@Configuration\n@EnableWebSecurity\n\
    @EnableGlobalMethodSecurity(securedEnabled = true)\npublic class WebSecurityConfig\
    \ extends WebSecurityConfigurerAdapter {\n@Autowired\nprivate UserDetailsService\
    \ customUserDetailsService;\n@Autowired\nprivate RestAuthenticationSuccessHandler\
    \ authenticationSuccessHandler;\n@Bean\npublic PasswordEncoder passwordEncoder()\
    \ {\nreturn new BCryptPasswordEncoder();\n}\n@Autowired\npublic void configureGlobal(AuthenticationManagerBuilder\
    \ auth)\nthrows Exception\n{\nauth.userDetailsService(customUserDetailsService)\n\
    .passwordEncoder(passwordEncoder());\n}\n@Override\nprotected void configure(HttpSecurity\
    \ http) throws Exception {\nhttp\n.csrf().disable()\n.authorizeRequests()\n.antMatchers(\"\
    /\",\"/register\",\"/forgotPassword\").permitAll()\n.antMatchers(\"/admin/\").hasRole(\"\
    ADMIN\")\n.and()\n.exceptionHandling()\n.authenticationEntryPoint(\nnew Http401AuthenticationEntryPoint(\"\
    Basic realm=\\\"MyApp\\\"\"))\n.and()\n.formLogin()\n.permitAll()\n.loginProcessingUrl(\"\
    /login\")\n.successHandler(authenticationSuccessHandler)\n.failureHandler(new\
    \ SimpleUrlAuthenticationFailureHandler())\n.and()\n.logout()\n.permitAll()\n\
    .logoutRequestMatcher(new AntPathRequestMatcher(\"/logout\"))\n.logoutSuccessHandler(\n\
    new HttpStatusReturningLogoutSuccessHandler())\n;\n}\n}\nListing 13-20.\nSpring\
    \ Security Customized Configuration for the REST API\n```\n\nYou have the complete\
    \ configuration in place to secure the REST API.\nNow, before making a request\
    \ to a secured resource, the client needs to\nbe authenticated. Otherwise, the\
    \ `401 UNAUTHORIZED`\nresponse code will be returned. In this example, you’ll\
    \ use Postman REST\nclient ( [`https://www.getpostman.com/`](https://www.getpostman.com/)\
    \ ) to verify that the REST API is secured.\n\nIf you open the Postman client\
    \ and send a `GET` request to `http://localhost:8080/api/posts`,\nyou will see\
    \ the following response, as you are not yet authenticated.\n\n```\n{\n\"timestamp\"\
    : 1496547074713,\n\"status\": 401,\n\"error\": \"Unauthorized\",\n\"message\"\
    : \"Full authentication is required to access this resource\",\n\"path\": \"/api/posts\"\
    \n}\n```\n\nNow send a `POST`\nrequest to `http://localhost:8080/login`\nwith\
    \ `form-data`\nset to the `username` and `password` values. This\nwill produce\
    \ the following response:\n\n```\n{\n\"password\":null,\n\"username\":\"admin@gmail.com\"\
    ,\n\"authorities\":[\n{\"authority\":\"ROLE_ADMIN\"},\n{\"authority\":\"ROLE_USER\"\
    }\n],\n\"accountNonExpired\":true,\n\"accountNonLocked\":true,\n\"credentialsNonExpired\"\
    :true,\n\"enabled\":true,\n\"name\":\"admin@gmail.com\"\n}\n```\n\nNow that you\
    \ have been authenticated, send a `GET` request to `http://localhost:8080/api/posts`\n\
    again. You should be successful.\n\nSummary\n\nThis chapter explored how to secure\
    \ traditional web applications built\nwith SpringMVC and Thymeleaf by using the\
    \ Spring Security starter. You\nalso learned how to secure the REST API built\
    \ with Spring Boot by\ncustomizing Spring Security. The next chapter looks at\
    \ the Spring Boot\nActuator.\n\n14. Spring Boot Actuator\n\nSpring Boot is an\
    \ opinionated framework that autoconfigures various\napplication components based\
    \ on several criteria, like the starters you\nused, the properties configuration,\
    \ and the active environment\nprofile(s).\n\n*   Is there a way to know which\
    \ components (which Spring beans) are\n    automatically registered by Spring\
    \ Boot?\n\n*   Is it possible to check all the configuration parameters applied\
    \ for the\n    current running application?\n\n*   Can you determine which request\
    \ URL will be handled by which controller?\n\n*   Can you get metrics on the application,\
    \ such as memory usage, thread\n    allocation, etc.?\n\nThe answer to all these\
    \ questions is yes. You can perform all these\nactivities with the Spring Boot\
    \ Actuator.\n\nThis chapter introduces the Spring Boot Actuator and explores the\n\
    various actuator endpoints that provide lots of useful information about\nrunning\
    \ Spring Boot applications. You will also learn how to secure\nactuator endpoints,\
    \ enable CORS for actuator endpoints, and implement\ncustom health checks and\
    \ metrics. Finally, the chapter looks into using\nJMX to monitor your application\
    \ using JConsole.\n\nIntroducing the Spring Boot Actuator\n\nThe Spring Boot Actuator\
    \ module provides production-ready features such\nas monitoring, metrics, health\
    \ checks, etc. The Spring Boot Actuator\nenables you to monitor the application\
    \ using HTTP endpoints and JMX.\n\nSpring Boot provides `spring-boot-starter-actuator`\n\
    to autoconfigure Actuator. You can take advantage of Actuator’s features\nin order\
    \ to monitor a Spring Boot application, as you’ll see in this\nsection.\n\nFirst,\
    \ create a Spring Boot application with the Web, Data-JPA, and\nActuator starters.\n\
    \n```\n\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
    spring-boot-starter-data-jpa\n\norg.springframework.boot\nspring-boot-starter-actuator\n\
    \ncom.h2database\nh2\n\n```\n\nRun the entry point class `SpringbootActuatorDemoApplication`.\n\
    \n```\n@SpringBootApplication\npublic class SpringbootActuatorDemoApplication\n\
    {\npublic static void main(String[] args)\n{\nSpringApplication.run(SpringbootActuatorDemoApplication.class,\
    \ args);\n}\n}\n```\n\nYou can see the console output displaying the request mapping\
    \ provided\nby the Spring Boot Actuator.\n\n```\n... EndpointHandlerMapping  \
    \   : Mapped \"{[/application/health || /application/health.json],methods=[GET],....\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers/{name:.*}],methods=[POST],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/loggers || /application/loggers.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/auditevents || /application/auditevents.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/dump || /application/dump.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/env/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/env || /application/env.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/beans || /application/beans.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application || /application.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/trace || /application/trace.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/metrics/{name:.*}],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/metrics || /application/metrics.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/info || /application/info.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/logfile || /application/logfile.json],methods=[GET\
    \ || HEAD]}\" ...\n... EndpointHandlerMapping     : Mapped \"{[/application/autoconfig\
    \ || /application/autoconfig.json],methods=[GET],...\n... EndpointHandlerMapping\
    \     : Mapped \"{[/application/docs],produces=[text/html]}\" ...\n... EndpointHandlerMapping\
    \     : Mapped \"{[/application/docs/],produces=[text/html]}\" ...\n... EndpointHandlerMapping\
    \     : Mapped \"{[/application/heapdump || /application/heapdump.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/mappings || /application/mappings.json],methods=[GET],...\n\
    ... EndpointHandlerMapping     : Mapped \"{[/application/configprops || /application/configprops.json],methods=[GET],...\n\
    ```\n\nThere are lots of endpoints  that are\nautomatically added by the Spring\
    \ Boot Actuator. The next section\nexplores various Actuator endpoints in detail.\n\
    \nExploring Actuator’s Endpoints\n\nThe Actuator endpoints listed in Table [14-1](#A447991_1_En_14_Chapter.html#Tab1)\
    \ are\nautoconfigured by the Actuator starter with the default settings.\n\nTable\
    \ 14-1.\n\nSpring Boot Actuator Endpoints\n\n  ID\n |\n  Description\n |\n  Sensitive\
    \ Default\n |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n  `info`\n |\n\
    \  Displays arbitrary application info.\n |\n  `false`\n |\n\n  `health`\n |\n\
    \  Shows application basic health info for unauthenticated users and full\ndetails\
    \ for authenticated users.\n |\n  `false`\n |\n\n  `beans`\n |\n  Shows a list\
    \ of all Spring beans configured in the application.\n |\n  `true`\n |\n\n  `autoconfig`\n\
    \ |\n  Displays an autoconfiguration report showing all autoconfiguration\ncandidates\
    \ and the reason they were/were not applied.\n |\n  `true`\n |\n\n  `mappings`\n\
    \ |\n  Displays a collated list of all `@RequestMapping`\npaths.\n |\n  `true`\n\
    \ |\n\n  `configprops`\n |\n  Displays a collated list of all `@ConfigurationProperties`.\n\
    \ |\n  `true`\n |\n\n  `metrics`\n |\n  Shows metrics information for the current\
    \ application.\n |\n  `true`\n |\n\n  `env`\n |\n  Exposes properties from Spring’s\
    \ `ConfigurableEnvironment`.\n |\n  `true`\n |\n\n  `trace`\n |\n  Displays trace\
    \ information (by default, the last 100 HTTP requests).\n |\n  `true`\n |\n\n\
    \  `dump`\n |\n  Performs a thread dump.\n |\n  `true`\n |\n\n  `loggers`\n |\n\
    \  Shows and modifies the configuration of loggers in the application.\n |\n \
    \ `true`\n |\n\n  `auditevents`\n |\n  Exposes audit events information for the\
    \ current application.\n |\n  `true`\n |\n\n  `flyway`\n |\n  Shows any Flyway\
    \ database migrations that have been applied.\n |\n  `true`\n |\n\n  `liquibase`\n\
    \ |\n  Shows any Liquibase database migrations that have been applied.\n |\n \
    \ `true`\n |\n\n  `actuator`\n |\n  Provides a hypermedia-based “discovery page”\
    \ for the other endpoints.\nRequires Spring `HATEOAS` to be on the\nclasspath.\n\
    \ |\n  `true`\n |\n\n  `shutdown`\n |\n  Allows the application to be gracefully\
    \ shut down (not enabled by\ndefault).\n |\n  `true`\n |\n\nTable [14-2](#A447991_1_En_14_Chapter.html#Tab2)\
    \ lists the\nadditional Actuator endpoints that are available based on certain\n\
    conditions.\n\nTable 14-2.\n\nAdditional Spring Boot Actuator Endpoints  for SpringMVC\n\
    Applications\n\n  ID\n |\n  Description\n |\n  Sensitive Default\n |\n\n| ---\
    \ | --- | --- | --- | --- | --- | --- |\n\n  `docs`\n |\n  Displays documentation,\
    \ including example requests and responses, for\nthe Actuator’s endpoints. Requires\
    \ `spring-boot-actuator-docs`\nto be on the classpath.\n |\n  `false`\n |\n\n\
    \  `heapdump`\n |\n  Returns a GZip-compressed `hprof` heap dump file.\n |\n \
    \ `true`\n |\n\n  `jolokia`\n |\n  Exposes JMX beans over HTTP (when `Jolokia`\
    \ is on the\nclasspath).\n |\n  `true`\n |\n\n  `logfile`\n |\n  Returns the contents\
    \ of the logfile (if the `logging.file` or `logging.path`\nproperties have been\
    \ set).\n |\n  `true`\n |\n\nThe sensitive actuator endpoints can be accessed\
    \ by authenticated users\nonly. You will learn how to configure security for endpoints\
    \ in later\nsections, so for now you can disable security for actuator endpoints\
    \ by\nsetting the following property.\n\n```\nmanagement.security.enabled=false\n\
    ```\n\nBy default actuator endpoints run on the same HTTP port (`server.port`)\
    \ with\n`/application` as\nthe base path prefix.\n\nIn this section, you will\
    \ explore several commonly used Actuator\nendpoints.\n\nThe /info Endpoint \n\n\
    If you added any information about the application in the `application.properties`\n\
    file using the `info.app.*`\nproperties, as shown in Figure [14-1](#A447991_1_En_14_Chapter.html#Fig1),\
    \ then you can\nview it at the `http://localhost:8080/application/info`\nendpoint.\n\
    \n![A447991_1_En_14_Fig1_HTML.jpg](A447991_1_En_14_Fig1_HTML.jpg)\n\nFigure 14-1.\n\
    \nSpring Boot Actuator /info endpoint\n\n```\ninfo.app.name=Beginning Spring Boot\
    \ 2\ninfo.app.description=This is a SpringBoot Demo app\ninfo.app.version=1.0.0\n\
    ```\n\nThe /health Endpoint\n\nThe  `/health` endpoint\n shows the health of the\
    \ application, including the disk space,\ndatabases, etc. Go to `http://localhost:8080/application/health`\n\
    to check the health of the application, as shown in Figure [14-2](#A447991_1_En_14_Chapter.html#Fig2).\n\
    \n![A447991_1_En_14_Fig2_HTML.jpg](A447991_1_En_14_Fig2_HTML.jpg)\n\nFigure 14-2.\n\
    \nSpring Boot Actuator /health endpoint\n\nBy default, the  `/health` endpoint\n\
    \ shows only whether the application is `UP` or `DOWN` for unauthorized\nusers.\
    \ If the user is authorized or management security is disabled, the\n`/health`\n\
    endpoint shows additional information, such as disk space, databases,\nhealth,\
    \ etc.\n\nThe /beans Endpoint\n\nThe  `/beans` endpoint\n shows all the beans\
    \ registered in your application, including\nthe beans you explicitly configured\
    \ and the beans autoconfigured by\nSpring Boot.\n\nPoint your browser to `http://localhost:8080/application/beans`.\n\
    You should be able to see output similar to what’s shown in Figure [14-3](#A447991_1_En_14_Chapter.html#Fig3).\n\
    \n![A447991_1_En_14_Fig3_HTML.jpg](A447991_1_En_14_Fig3_HTML.jpg)\n\nFigure 14-3.\n\
    \nSpring Boot Actuator /beans endpoint\n\nThe /autoconfig Endpoint\n\nThe `/autoconfig`\n\
    endpoint shows the autoconfiguration report, which is categorized into\n`positiveMatches`\n\
    and `negativeMatches`.\n\nIf you go to `http://localhost:8080/application/autoconfig`,\n\
    you should see an autoconfiguration report similar to the one in Figure\n[14-4](#A447991_1_En_14_Chapter.html#Fig4).\n\
    \n![A447991_1_En_14_Fig4_HTML.jpg](A447991_1_En_14_Fig4_HTML.jpg)\n\nFigure 14-4.\n\
    \nSpring Boot Actuator /autoconfig endpoint\n\nThe elements in `positiveMatches`\
    \ are\nthe conditions matched by various `@Conditional`\ncomponents.\n\nFor example:\n\
    \n```\nDataSourceAutoConfiguration: [\n{\ncondition: \"OnClassCondition\",\nmessage:\
    \ \"@ConditionalOnClass classes found: javax.sql.DataSource,org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType\"\
    \n}\n]\n```\n\nSince this example added the `data-jpa` starter and\n`H2` driver,\
    \ the\nclasses `javax.sql.DataSource`\nand `org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType`\n\
    are found in the classpath and hence `DataSourceAutoConfiguration`\nbecomes a\
    \ positive match.\n\nThe elements in `negativeMatches` are\nthe conditions not\
    \ matched by various `@Conditional`\ncomponents.\n\nFor example:\n\n```\nJooqAutoConfiguration:\
    \ [\n{\ncondition: \"OnClassCondition\",\nmessage: \"required @ConditionalOnClass\
    \ classes not found: org.jooq.DSLContext\"\n}\n]\n```\n\nAs there aren’t JOOQ\
    \ libraries  on the\napplication classpath, `@ConditionalOnClass`\ncould not find\
    \ the `org.jooq.DSLContext`\nclass and hence `JooqAutoConfiguration`\nbecame a\
    \ negative match.\n\nThe /mappings Endpoint\n\nThe  `/mappings` endpoint\n shows\
    \ all the `@RequestMapping` paths\ndeclared in the application. This is very helpful\
    \ for checking which\nrequest path will be handled by which controller method.\n\
    \nIf you go to `http://localhost:8080/application/mappings`,\nyou should see all\
    \ the mappings shown in Figure [14-5](#A447991_1_En_14_Chapter.html#Fig5).\n\n\
    ![A447991_1_En_14_Fig5_HTML.jpg](A447991_1_En_14_Fig5_HTML.jpg)\n\nFigure 14-5.\n\
    \nSpring Boot Actuator /mappings endpoint\n\nThe /configprops Endpoint\n\nThe\
    \  `/configprops` \nshows all the configuration properties defined by the `@ConfigurationProperties`\n\
    beans, including your own configuration properties defined in the `application.properties`\n\
    or YAML files.\n\nIf you go to `http://localhost:8080/application/configprops`,\n\
    you should see all the configuration properties, as shown in Figure\n[14-6](#A447991_1_En_14_Chapter.html#Fig6).\n\
    \n![A447991_1_En_14_Fig6_HTML.jpg](A447991_1_En_14_Fig6_HTML.jpg)\n\nFigure 14-6.\n\
    \nSpring Boot Actuator /configprops endpoint\n\nThe /metrics Endpoint\n\nThe \
    \ `/metrics` endpoint\n shows various metrics about the current application, such\
    \ as how\nmuch memory it is using, how much memory is free, the size of the heap\n\
    being used, the number of threads used, and so on.\n\nIf you go to `http://localhost:8080/application/metrics`,\n\
    you should see all the configuration properties shown in Figure [14-7](#A447991_1_En_14_Chapter.html#Fig7).\n\
    \n![A447991_1_En_14_Fig7_HTML.jpg](A447991_1_En_14_Fig7_HTML.jpg)\n\nFigure 14-7.\n\
    \nSpring Boot Actuator /metrics endpoint \n\nThe /env Endpoint\n\nThe  `/env`\
    \ endpoint \nwill expose all the properties from the Spring’s `ConfigurableEnvironment`\n\
    interface, such as a list of active profiles, application properties,\nsystem\
    \ environment variables, and so on.\n\nIf you go to `http://localhost:8080/application/env`,\n\
    you should be able to see all the environment details shown in Figure\n[14-8](#A447991_1_En_14_Chapter.html#Fig8).\n\
    \n![A447991_1_En_14_Fig8_HTML.jpg](A447991_1_En_14_Fig8_HTML.jpg)\n\nFigure 14-8.\n\
    \nSpring Boot Actuator /env endpoint \n\nThe /trace Endpoint\n\nThe  `/trace`\
    \ endpoint\n shows the tracing information of the last few HTTP requests,\nwhich\
    \ is very helpful for debugging the request/response details, like\nheaders, cookies,\
    \ etc. Go to `http://localhost:8080/application/trace`\nto view the HTTP request\
    \ tracing details, as shown in Figure [14-9](#A447991_1_En_14_Chapter.html#Fig9).\n\
    \n![A447991_1_En_14_Fig9_HTML.jpg](A447991_1_En_14_Fig9_HTML.jpg)\n\nFigure 14-9.\n\
    \nSpring Boot Actuator /trace endpoint \n\nThe /dump Endpoint\n\nYou can view\
    \ the thread\n dump of your application with the details of the running threads\n\
    and the stack trace of the JVM at `http://localhost:8080/application/dump endpoint`.\
    \ See Figure [14-10](#A447991_1_En_14_Chapter.html#Fig10).\n\n![A447991_1_En_14_Fig10_HTML.jpg](A447991_1_En_14_Fig10_HTML.jpg)\n\
    \nFigure 14-10.\n\nSpring Boot Actuator /dump endpoint \n\nThe /loggers Endpoint\n\
    \nThe  `/loggers` endpoint\n allows you to view and configure the log levels of\
    \ your\napplication at runtime. You can view the logging levels of all loggers\n\
    at `http://localhost:8080/application/loggers`,\nas shown in Figure [14-11](#A447991_1_En_14_Chapter.html#Fig11).\n\
    \n![A447991_1_En_14_Fig11_HTML.jpg](A447991_1_En_14_Fig11_HTML.jpg)\n\nFigure\
    \ 14-11.\n\nSpring Boot Actuator /loggers endpoint \n\nYou can view the logging\
    \ level of a specific logger at `http://localhost:8080/application/{loggerName}`.\n\
    For example, if you want to view the logging level of the `com.apress.demo`\n\
    logger, go to `http://localhost:8080/application/loggers/com.apress.demo`.\n\n\
    ```\n{\nconfiguredLevel: null,\neffectiveLevel: \"INFO\"\n}\n```\n\nYou can update\
    \ the logging level of a logger at runtime by issuing a\n`POST` request to\n`http://localhost:8080/application/{loggerName}`.\n\
    Suppose you want to change the logging level of `com.apress.demo` to\n`DEBUG`.\
    \ You can\nsend a `POST`\nrequest to the `http://localhost:8080/application/loggers/com.apress.demo`\n\
    URL with the following request body JSON.\n\n```\n{\nconfiguredLevel: \"DEBUG\"\
    \n}\n> curl -i -X POST -H 'Content-Type: application/json' -d '{\"configuredLevel\"\
    : \"DEBUG\"}' http://localhost:8080/application/loggers/com.apress.demo\n```\n\
    \nNow, if you again check the logging  level of the\n`com.apress.demo`\nlogger\
    \ by issuing a `GET` request to `http://localhost:8080/application/loggers/com.apress.demo`,\n\
    you will see the updated logging configuration.\n\n```\n{\nconfiguredLevel: \"\
    DEBUG\",\neffectiveLevel: \"DEBUG\"\n}\n```\n\nThe /logfile Endpoint\n\nIf you\
    \ enabled file-based logging by setting  `logging.file` \nor `logging.path`\n\
    or using the native file configuration files (`logback.xml`, `log4j.properties`,\n\
    etc.), you can use the `/logfile` endpoint to\nview the log file content. Go to\
    \ `http://localhost:8080/application/logfile`,\nas shown in Figure [14-12](#A447991_1_En_14_Chapter.html#Fig12).\n\
    \n![A447991_1_En_14_Fig12_HTML.jpg](A447991_1_En_14_Fig12_HTML.jpg)\n\nFigure\
    \ 14-12.\n\nSpring Boot Actuator /logfile endpoint \n\nThe /shutdown Endpoint\n\
    \nThe  `/shutdown` endpoint\n can be used to gracefully shut down the application,\
    \ which is\nnot enabled by default. You can enable this endpoint by adding the\n\
    following property to `application.properties`.\n\n```\nendpoints.shutdown.enabled=true\n\
    ```\n\nAfter adding this property, you can send the HTTP `POST` method to `http://localhost:8080/application/shutdown`\n\
    to invoke the `/shutdown` endpoint.\n\nOnce the `/shutdown` endpoint is\ninvoked\
    \ successfully, you should see the following message:\n\n```\n{\n\"message\":\
    \ \"Shutting down, bye...\"\n}\n```\n\nNote\n\nBe careful about enabling /shutting\
    \ down an endpoint. Enable or shut\ndown an endpoint only when it is absolutely\
    \ required and be sure to\nprotect the endpoint with the appropriate security\
    \ configuration.\n\nThe /actuator Endpoint\n\nThe  `/actuator` endpoint\n provides\
    \ a hypermedia-based “discovery page” for the other\nendpoints. To activate this\
    \ endpoint, you need to have the following\nSpring `HATEOAS`\ndependency.\n\n\
    ```\norg.springframework.hateoas\nspring-hateoas\n\n```\n\nGo to `http://localhost:8080/application/`\n\
    to see the list of actuator endpoints, as shown in Figure [14-13](#A447991_1_En_14_Chapter.html#Fig13).\n\
    \n![A447991_1_En_14_Fig13_HTML.jpg](A447991_1_En_14_Fig13_HTML.jpg)\n\nFigure\
    \ 14-13.\n\nSpring Boot Actuator /actuator endpoint \n\nYou can customize the\
    \ actuator endpoint URL by setting the `endpoints.actuator.path`\nproperty.\n\n\
    ```\nendpoints.actuator.path=/actuator\n```\n\nNow you can access the Actuator\
    \ endpoint at `http://localhost:8080/application/actuator`.\n\nCustomizing Actuator\
    \ Endpoints\n\nBy default, the Spring Boot Actuator endpoints run on the same\
    \ port and\nthe default management context-path is `\"/application\"`. You\ncan\
    \ customize these properties using the following properties.\n\n```\nmanagement.context-path=/management\n\
    management.port=9090\n```\n\nWith this customization, you can access Actuator\
    \ endpoints at `http://localhost:9090/management/`\nas the base path. The `/health`\
    \ endpoint\nwould become `http://localhost:8080/management/health`.\n\nYou can\
    \ change endpoint IDs, sensitivity, and enabled values using the\n`endpoints.{endpointName}.*`\n\
    properties.\n\n```\nendpoints.beans.id=springbeans\nendpoints.beans.sensitive=false\n\
    endpoints.beans.enabled=true\n```\n\nWith these customizations, you can access\
    \ the `/beans` endpoint at\n`http://localhost:8080/application/springbeans`.\n\
    \nYou can also selectively enable/disable an endpoint using the `endpoints.{endpoint}.enabled`\n\
    property.\n\n```\nendpoints.trace.enabled=false\nendpoints.shutdown.enabled=true\n\
    ```\n\nYou can enable/disable all endpoints using `endpoints.enabled`\nproperty\
    \ and selectively override for specific endpoints. For example,\nif you want to\
    \ disable all endpoints except /info then configure as\nfollows:\n\n```\nendpoints.enabled=false\n\
    endpoints.info.enabled=true\n```\n\nYou can set sensitivity for all endpoints\
    \ using the `endpoints.sensitive`\nproperty and selectively override for specific\
    \ endpoints. For example,\nif you want to make all endpoints non-sensitive except\
    \ for `/trace`, you can\nconfigure it as follows:\n\n```\nendpoints.sensitive=false\n\
    endpoints.trace.sensitive=true\n```\n\nIf you don’t want to expose  the endpoints\n\
    over HTTP, you can disable this option by adding the following property.\n\n```\n\
    management.port=-1\n```\n\nSecuring Actuator Endpoints\n\nBy default all sensitive\
    \ endpoints are secured and only authenticated\nusers who have the `ACTUATOR`\
    \ role can\naccess those endpoints. You can change the `ACTUATOR` role name to\n\
    something else, say `SUPERADMIN`, by\nsetting the following property.\n\n```\n\
    management.security.roles=SUPERADMIN\n```\n\nIf you have the Spring Boot Security\
    \ starter on the classpath, the\nActuator endpoints will be secured by Spring\
    \ Security.\n\nAdd the Security starter dependency to `pom.xml`.\n\n```\norg.springframework.boot\n\
    spring-boot-starter-security\n\n```\n\nInstead of using the default user credentials,\
    \ you can configure the\nsecurity user credential in `application.properties`\n\
    as follows.\n\n```\nsecurity.user.name=admin\nsecurity.user.password=secret\n\
    security.user.role=USER,ADMIN,ACTUATOR\n```\n\nNow if you try to access any endpoint,\
    \ say `http://localhost:8080/application/beans`,\nyou will be prompted to enter\
    \ credentials.\n\nBut most likely you will be using a custom Spring Security configuration\n\
    backed by a datastore for user credentials, so you can configure\nActuator endpoints\
    \ for security as needed.\n\nIf, for any reason, you want to disable security\
    \ for your Actuator\nendpoints, you can set the following property:\n\n```\nmanagement.security.enabled=false\n\
    ```\n\nThis will disable security for all Actuator endpoints. You are  strongly\
    \  advised to secure the Actuator endpoints,\nespecially if your application is\
    \ publicly accessible .\n\nImplementing Custom Health Indicators\n\nSpring Boot\
    \ provides the following `HealthIndicator`\nimplementations out-of-the-box. They\
    \ are autoconfigured by default.\n\n*   `CassandraHealthIndicator`\n\n*   `DiskSpaceHealthIndicator`\n\
    \n*   `DataSourceHealthIndicator`\n\n*   `ElasticsearchHealthIndicator`\n\n* \
    \  `JmsHealthIndicator`\n\n*   `MailHealthIndicator`\n\n*   `MongoHealthIndicator`\n\
    \n*   `RabbitHealthIndicator`\n\n*   `RedisHealthIndicator`\n\n*   `SolrHealthIndicator`\n\
    \nIn addition to these, you can also implement your own `HealthIndicators`\nbased\
    \ on your application health check needs.\n\nSuppose you need to download some\
    \ feed data from a remote server on a\nregular interval basis and there is an\
    \ endpoint to invoke for checking\nthe server reachability.\n\nTo implement a\
    \ custom `HealthIndicator`, you\nneed to register a Spring bean that implements\
    \ the `HealthIndicator`\ninterface. You can implement a `HealthIndicator` to\n\
    ping the feed server, as shown in Listing [14-1](#A447991_1_En_14_Chapter.html#Par109).\n\
    \n```\nimport java.util.Date;\nimport org.springframework.boot.actuate.health.Health;\n\
    import org.springframework.boot.actuate.health.HealthIndicator;\nimport org.springframework.stereotype.Component;\n\
    import org.springframework.web.client.RestClientException;\nimport org.springframework.web.client.RestTemplate;\n\
    @Component\npublic class FeedServerHealthIndicator implements HealthIndicator\n\
    {\n@Override\npublic Health health() {\nRestTemplate restTemplate = new RestTemplate();\n\
    String url = \"http://feedserver.com/ping\";\ntry {\nString resp = restTemplate.getForObject(url,\
    \ String.class);\nif(\"OK\".equalsIgnoreCase(resp)){\nreturn Health.up().\nbuild();\n\
    } else {\nreturn Health.down()\n.withDetail(\"ping_url\", url)\n.withDetail(\"\
    ping_time\", new Date())\n.build();\n}\n} catch (RestClientException e) {\nreturn\
    \ Health.down(e)\n.withDetail(\"ping_url\", url)\n.withDetail(\"ping_time\", new\
    \ Date())\n.build();\n}\n}\n}\nListing 14-1.\nImplementing a Custom HealthIndicator\n\
    ```\n\nNow, when you go to the `http://localhost:8080/application/health`\nURL\
    \ and the feed server is not reachable, you will see the following\nresponse:\n\
    \n```\n{\nstatus: \"DOWN\",\nfeedServer: {\nstatus: \"DOWN\",\nerror: \"org.springframework.web.client.HttpClientErrorException:\
    \ 410 Gone\",\nping_url: \"http://feedserver.com/ping\",\nping_time: 1495777475435\n\
    },\ndiskSpace: {\nstatus: \"UP\",\ntotal: 340650881024,\nfree: 260343615488,\n\
    threshold: 10485760\n},\ndb: {\nstatus: \"UP\",\ndatabase: \"H2\",\nhello: 1\n\
    }\n}\n```\n\nHaving health checks for various application  components\nand integration\
    \ points will help you monitor the overall application\nhealth.\n\nCapturing Custom\
    \ Application Metrics\n\nYou have already seen how you can use Actuator’s `/metrics`\
    \ endpoint to\nview various application metrics, such as memory, heap, thread\
    \ pool, and\ndatasource information. In addition to that, you can also record\
    \ your\nown metrics by using `CounterService` and\n`GaugeService`.\n\n`CounterService`\n\
    can be used to increment, decrement, and reset a named counter value.\n`GaugeService`\n\
    can be used to submit a named metric value for further analysis.\n\nSuppose you\
    \ want to capture the count of successful and failed login\nattempts. You can\
    \ use `CounterService` to\nrecord those metrics, as shown in Listing [14-2](#A447991_1_En_14_Chapter.html#Par116).\n\
    \n```\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.boot.actuate.metrics.CounterService;\nimport org.springframework.stereotype.Service;\n\
    @Service\npublic class LoginService\n{\n@Autowired\nprivate CounterService counterService;\n\
    public boolean login(String email, String password)\n{\nif(\"admin@gmail.com\"\
    .equalsIgnoreCase(email) && \"admin\".equals(password)){\ncounterService.increment(\"\
    counter.login.success\");\nreturn true;\n} else {\ncounterService.increment(\"\
    counter.login.failure\");\nreturn false;\n}\n}\n}\nListing 14-2.\nUsing CounterService\
    \ to Record Login Metrics\n```\n\nNow if you invoke the `LoginService.login()`\n\
    method with correct and incorrect credentials, you can see those metrics\nat `http://localhost:8080/application/metrics\
    \ endpoint`.\n\n```\n{\nmem: 491423,\nmem.free: 155266,\n....\n....\ndatasource.primary.active:\
    \ 0,\ndatasource.primary.usage: 0,\ngauge.response.application.health: 1679,\n\
    gauge.response.application.metrics: 12,\n...\n...\ncounter.login.failure: 2,\n\
    counter.login.success: 3,\n....\n...\n}\n```\n\nSuppose you want to capture the\
    \ time needed to invoke a third-party web\nservice. You can use `GaugeService`\
    \ to\nrecord the time taken for this web service call. The default `GaugeService`\n\
    implementation will store the data in-memory, but you can create an\nimplementation\
    \ to feed the data into your analytical tools. See Listing\n[14-3](#A447991_1_En_14_Chapter.html#Par120).\n\
    \n```\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.boot.actuate.metrics.GaugeService;\nimport org.springframework.stereotype.Service;\n\
    import org.springframework.web.client.RestClientException;\nimport org.springframework.web.client.RestTemplate;\n\
    import com.apress.demo.models.GitHubUser;\n@Service\npublic class GitHubService\
    \ {\n@Autowired\nGaugeService gaugeService;\npublic GitHubUser getUserInfo(String\
    \ username)\n{\nRestTemplate restTemplate = new RestTemplate();\nString url =\
    \ \"https://api.github.com/users/\"+username;\nGitHubUser gitHubUser = null;\n\
    try {\nlong start = System.currentTimeMillis();\ngitHubUser = restTemplate.getForObject(url,\
    \ GitHubUser.class);\nlong end = System.currentTimeMillis();\ngaugeService.submit(\"\
    gauge.guthub.response-time\", (end-start));\n} catch (RestClientException e) {\n\
    e.printStackTrace();\n}\nreturn gitHubUser;\n}\n}\nListing 14-3.\nUsing GaugeService\
    \ to Record Response Times\n```\n\nNow if you invoke the `GitHubService.getUserInfo()`\n\
    method, the time taken for the call will be recorded using `GaugeService`. You\
    \ can\nlook at those metrics at the `http://localhost:8080/application/metrics`\n\
    endpoint.\n\n```\n{\nmem: 491423,\nmem.free: 155266,\n....\n....\ndatasource.primary.active:\
    \ 0,\ndatasource.primary.usage: 0,\n...\ngauge.guthub.response-time: 126,\n...\n\
    ...\n}\n```\n\nCORS Support for Actuator Endpoints\n\nIn order to access the Actuator\
    \ endpoints from other origins, you need\nto enable CORS \nsupport for them. CORS\
    \ support is disabled by default and you need to\nset the `endpoints.cors.allowed-origins`\n\
    property to enable it.\n\n```\nendpoints.cors.allowed-origins=http://remoteserver.com\n\
    endpoints.cors.allowed-methods=GET,POST\n```\n\nYou can also add other CORS properties\
    \ using the `endpoints.cors.*`\nproperties.\n\nMonitoring and Management Over\
    \ JMX\n\nBy default Spring Boot exposes Actuator endpoints as JMX MBeans  under\
    \ the\n`org.springframework.boot`\ndomain. You can use JConsole, which comes with\
    \ JDK, to view JMX MBeans.\n\nRun JConsole from `C:\\\\Program Files\\\\Java\\\
    \\jdk1.8.0_45\\\\bin\\\\jconsole.exe`. Select the Spring\nBoot application main\
    \ class and click Connect. If you see a dialog box\nthat says “Secure Connection\
    \ Failed. Retry Insecurely?”, click on\nInsecure Connection.\n\nBy default, you\
    \ will be on the Overview tab. Click on the MBeans tab.\n\nNow expand the `org.springframework.boot`\n\
    domain , where\nyou’ll find Actuator endpoints exported as MBeans. See Figure\
    \ [14-14](#A447991_1_En_14_Chapter.html#Fig14).\n\n![A447991_1_En_14_Fig14_HTML.jpg](A447991_1_En_14_Fig14_HTML.jpg)\n\
    \nFigure 14-14.\n\nSpring Boot Actuator JMX monitoring\n\nYou can customize the\
    \ domain name by using the `endpoints.jmx.domain`\nproperty.\n\n```\nendpoints.jmx.domain=mydomain\n\
    ```\n\nYou can disable exposing endpoints over JMX by setting `endpoints.jmx.enabled=false`.\n\
    \nSummary\n\nIn this chapter, you explored the Spring Boot Actuator, which includes\n\
    very helpful production support features. You learned about the various\nendpoints,\
    \ including how to customize them and how to invoke them over\nHTTP and JMX. In\
    \ the next chapter, you will learn how to test Spring\nBoot applications.\n\n\
    15. Testing Spring Boot\nApplications\n\nTesting is an important part of software\
    \ development. It helps\ndevelopers verify the correctness of the functionality.\
    \ JUnit and TestNG\nare two of the most popular testing libraries used in Java\
    \ projects.\n\nTest Driven Development (TDD) is a popular development practice\
    \ where\nyou write tests first and write just enough production code to pass the\n\
    tests. You write various types of tests, such as unit tests, integration\ntests,\
    \ performance tests, etc. Unit tests focus on testing one component\nin isolation,\
    \ whereas integration tests verify the behavior of a\nfeature, which could possibly\
    \ involve multiple components. While doing\nintegration testing, you may have\
    \ to mock the behavior of dependent\ncomponents such as third-party web service\
    \ classes, database method\ninvocations, etc. There are mocking libraries like\
    \ Mockito, PowerMock,\nand jMock, for mocking the object’s behavior.\n\nThe dependency\
    \ injection (DI) design pattern encourages programming to\npractice and write\
    \ testable code. With dependency injection, you can\ninject mock implementations\
    \ for testing and real implementations for\nproduction. At its core, Spring is\
    \ a dependency injection container and\nit provides great support for testing\
    \ various parts of an application.\n\nIn this chapter, you will learn how to test\
    \ Spring components in Spring\nBoot applications. You will take a detailed look\
    \ at how to test slices\nof applications, such as web components (regular MVC\
    \ Controllers, REST\nAPI endpoints), Spring data repositories, and secured controller/service\n\
    methods using the `@WebMvcTest`, `@DataJpaTest`, and the\n`@JdbcTest`\nannotations.\n\
    \nTesting Spring Boot Applications\n\nOne of the key reasons for the popularity\
    \ of the Spring framework is its\ngreat support for testing. Spring provides `SpringRunner`,\
    \ which\nis a custom JUnit runner helping to load the Spring `ApplicationContext`\
    \ by\nusing `@ContextConfiguration(classes=AppConfig.class)`.\n\nA typical Spring\
    \ unit/integration test is shown in Listing [15-1](#A447991_1_En_15_Chapter.html#Par7).\n\
    \n```\n@RunWith(SpringRunner.class)\n@ContextConfiguration(classes=AppConfig.class)\n\
    public class UserServiceTests\n{\n@Autowired\nUserService userService;\n@Test\n\
    public void should_load_all_users()\n{\nList users = userService.getAllUsers();\n\
    assertNotNull(users);\nassertEquals(10, users.size());\n}\n}\nListing 15-1.\n\
    Typical Spring JUnit Test\n```\n\nThe Spring Boot application is also nothing\
    \ but a Spring application, so\nyou can use all of Spring’s testing features in\
    \ your Spring Boot\napplications as well.\n\nHowever, some of the Spring Boot\
    \ features, like loading external\nproperties and logging, are available only\
    \ if you create `ApplicationContext`\nusing the `SpringApplication`\nclass, which\
    \ you’ll typically use in your entry point class. These\nadditional Spring Boot\
    \ features won’t be available if you use `@ContextConfiguration`.\n\n```\n@SpringBootApplication\n\
    public class SpringbootTestingDemoApplication\n{\npublic static void main(String[]\
    \ args)\n{\nSpringApplication.run(SpringbootTestingDemoApplication.class, args);\n\
    }\n}\n```\n\nSpring Boot provides the `@SpringBootTest`\nannotation, which uses\
    \ `SpringApplication`\nbehind the scenes to load `ApplicationContext` so\nthat\
    \ all the Spring Boot features will be available. See Listing [15-2](#A447991_1_En_15_Chapter.html#Par12).\n\
    \n```\n@RunWith(SpringRunner.class)\n@SpringBootTest\npublic class SpringbootTestingDemoApplicationTests\n\
    {\n@Autowired\nUserService userService;\n@Test\npublic void should_load_all_users()\n\
    {\n...\n...\n}\n}\nListing 15-2.\nTypical Spring Boot JUnit Test\n```\n\nFor `@SpringBootTest`,\
    \ you\ncan pass Spring configuration classes, Spring bean definition XML files,\n\
    and more, but in Spring Boot applications, you’ll typically use the\nentry point\
    \ class.\n\nThe Spring Boot Test starter `spring-boot-starter-test`\npulls in\
    \ the JUnit, Spring Test, and Spring Boot Test modules, along\nwith the following\
    \ most commonly used mocking and asserting libraries:\n\n*   Mockito—A Java mocking\
    \ framework found at [`http://site.mockito.org/`](http://site.mockito.org/) .\n\
    \n*   Hamcrest—A matcher/predicates library for data assertion found at [`http://hamcrest.org/JavaHamcrest/`](http://hamcrest.org/JavaHamcrest/)\
    \ .\n\n*   AssertJ—A fluent assertion library found at [`https://joel-costigliola.github.io/assertj/`](https://joel-costigliola.github.io/assertj/)\
    \ .\n\n*   JSONassert—An assertion library for JSON found at [`https://github.com/skyscreamer/JSONassert`](https://github.com/skyscreamer/JSONassert)\
    \ .\n\n*   JsonPath—XPath for JSON found at [`https://github.com/json-path/JsonPath`](https://github.com/json-path/JsonPath)\
    \ .\n\nNow you’ll see how to create a simple Spring Boot web application with\
    \ a\nsimple REST endpoint.\n\n```\n\norg.springframework.boot\nspring-boot-starter-web\n\
    \norg.springframework.boot\nspring-boot-starter-test\ntest\n\n```\n\nFirst create\
    \ an entry point class called `Application.java`, as\nfollows:\n\n```\n@SpringBootApplication\n\
    public class Application\n{\npublic static void main(String[] args)\n{\nSpringApplication.run(Application.class,\
    \ args);\n}\n}\n```\n\nListing [15-3](#A447991_1_En_15_Chapter.html#Par25) shows\
    \ how to\ncreate a simple REST endpoint called `/ping`.\n\n```\n@RestController\n\
    public class PingController\n{\n@GetMapping(\"/ping\")\npublic String ping()\n\
    {\nreturn \"OK\";\n}\n}\nListing 15-3.\nSpring REST Controller\n```\n\nNow if\
    \ you run the application, you can invoke the REST endpoint `http://localhost:8080/ping`,\n\
    which gives the response `\"OK\"`. Now you can\nwrite a test for the `/ping` endpoint.\
    \ See\nListing [15-4](#A447991_1_En_15_Chapter.html#Par27).\n\n```\nimport static\
    \ org.assertj.core.api.Assertions.assertThat;\nimport org.junit.Test;\nimport\
    \ org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.boot.test.context.SpringBootTest.WebEnvironment;\n\
    import org.springframework.boot.test.web.client.TestRestTemplate;\nimport org.springframework.http.HttpStatus;\n\
    import org.springframework.http.ResponseEntity;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    @RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\n\
    public class PingControllerTests\n{\n@Autowired\nTestRestTemplate restTemplate;\n\
    @Test\npublic void testPing()\n{\nResponseEntity respEntity = restTemplate.getForEntity(\"\
    /ping\", String.class);\nassertThat(respEntity.getStatusCode()).isEqualTo(HttpStatus.OK);\n\
    assertThat(respEntity.getBody()).isEqualTo(\"OK\");\n}\n}\nListing 15-4.\nTesting\
    \ Spring REST Endpoint Using TestRestTemplate\n```\n\nAs you need to test the\
    \ REST endpoint, you start the embedded servlet\ncontainer by specifying the `webEnvironment`\n\
    attribute of `@SpringBootTest`.\n\nThe default `webEnvironment` value\nis `WebEnvironment.MOCK`,\n\
    which doesn’t start an embedded servlet container.\n\nYou can use various `webEnvironment`\
    \ values\nbased on how you want to run the tests.\n\n*   `MOCK (default)`—Loads\
    \ a `WebApplicationContext`\n    and provides a mock servlet environment. It will\
    \ not start an embedded\n    servlet container. If servlet APIs are not on your\
    \ classpath, this mode\n    will fall back to creating a regular non-web `ApplicationContext`.\n\
    \n*   `RANDOM_PORT`—\n    Loads a `ServletWebServerApplicationContext`\n    and\
    \ starts an embedded servlet container listening on a random available\n    port.\n\
    \n*   `DEFINED_PORT`—Loads a\n    `ServletWebServerApplicationContext`\n    and\
    \ starts an embedded servlet container listening on a defined port\n    (`server.port`).\n\
    \n*   `NONE`—Loads an\n    `ApplicationContext`\n    using `SpringApplication`\
    \ but\n    does not provide a servlet environment.\n\nThe `TestRestTemplate` bean\n\
    will be registered automatically only when `@SpringBootTest` is\nstarted with\
    \ an embedded servlet container.\n\nWhile running the integration tests that start\
    \ the embedded servlet\ncontainers, it is better to use `WebEnvironment.RANDOM_PORT`\n\
    so that it won’t conflict with other running applications, especially in\nContinuous\
    \ Integration (CI) environments where multiple builds run in\nparallel.\n\nYou\
    \ can specify which configuration  classes\nto use to build `ApplicationContext`\
    \ by\nusing the `classes` attribute of\nthe `@SpringBootTest`\nannotation. If\
    \ you don’t specify any classes explicitly, it will\nautomatically search for\
    \ nested `@Configuration`\nclasses and will fall back to searching for `@SpringBootConfiguration`\n\
    classes. The `@SpringBootApplication`\nis annotated with `@SpringBootConfiguration`\n\
    so `@SpringBootTest` would\npick up the application’s entry point class.\n\nTesting\
    \ with Mock Implementations\n\nWhile performing unit testing, you may want to\
    \ mock calls to external\nservices like database interactions and web service\
    \ invocations. You can\ncreate mock implementations to be used in tests and real\
    \ implementations\nused in production.\n\nSay you have an `EmployeeRepository`\n\
    file that talks to the database and gets employee data, as shown in\nListing [15-5](#A447991_1_En_15_Chapter.html#Par40).\n\
    \n```\npublic interface EmployeeRepository\n{\nList findAllEmployees();\n}\nListing\
    \ 15-5.\nEmployeeRepository.java\n```\n\nSuppose you have `EmployeeService`,\n\
    which depends on `EmployeeRepository`,\nwith `getMaxSalariedEmployee()`\nand a\
    \ few other employee-related methods. See Listing [15-6](#A447991_1_En_15_Chapter.html#Par42).\n\
    \n```\n@Service\npublic class EmployeeService\n{\nprivate EmployeeRepository employeeRepository;\n\
    @Autowired\npublic EmployeeService(EmployeeRepository employeeRepository)\n{\n\
    this.employeeRepository = employeeRepository;\n}\npublic Employee getMaxSalariedEmployee()\n\
    {\nEmployee emp = null;\nList emps = employeeRepository.findAllEmployees();\n\
    //loop through emps and find max salaried emp\nreturn emp;\n}\n}\nListing 15-6.\n\
    EmployeeService.java\n```\n\nNow you can create a mock `EmployeeRepository`\n\
    file for testing, as shown in Listing [15-7](#A447991_1_En_15_Chapter.html#Par44).\n\
    \n```\n@Repository\n@Profile(\"test\")\npublic class MockEmployeeRepository implements\
    \ EmployeeRepository\n{\npublic List findAllEmployees()\n{\nreturn Arrays.asList(\n\
    new Employee(1, \"A\", 50000),\nnew Employee(2, \"B\", 75000),\nnew Employee(3,\
    \ \"C\", 43000)\n};\n}\n}\nListing 15-7.\nMockEmployeeRepository.java\n```\n\n\
    Now you’ll create a real implementation of `EmployeeRepository`\nfor production,\
    \ as shown in Listing [15-8](#A447991_1_En_15_Chapter.html#Par46).\n\n```\n@Service\n\
    @Profile(\"production\")\npublic class JdbcEmployeeRepository implements EmployeeRepository\n\
    {\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\npublic List findAllEmployees()\n\
    {\nreturn jdbcTemplate.query(...);\n}\n}\nListing 15-8.\nJdbcEmployeeRepository.java\n\
    ```\n\nYou can use the `@ActiveProfiles`\nannotation to specify which profiles\
    \ to use so that only the beans\nassociated with those profiles will be activated.\
    \ See Listing [15-9](#A447991_1_En_15_Chapter.html#Par48).\n\n```\n@ActiveProfiles(\"\
    test\")\n@RunWith(SpringRunner.class)\n@SpringBootTest\npublic class ApplicationTests\n\
    {\n@Autowired\nEmployeeService employeeService;\n@Test\npublic void test_getMaxSalariedEmployee()\n\
    {\nEmployee emp = employeeService.getMaxSalariedEmployee();\nassertNotNull(emp);\n\
    assertEquals(2, emp.getId());\nassertEquals(\"B\", emp.getName());\nassertEquals(75000,\
    \ emp.getSalary());\n}\n}\nListing 15-9.\nTesting with Mock implementation Using\
    \ Profiles\n```\n\nAs you have enabled the `test` profile, `MockEmployeeRepository`\n\
    will be injected into `EmployeeService`. You\ncan activate the `production` profile\n\
    while running the application in production as follows:\n\n```\njava -jar myapp.jar\
    \ -Dspring.profiles.active=production\n```\n\nWhile running the main application,\
    \ the `production` profile\nwill be used and `JdbcEmployeeRepository`\nwill be\
    \ injected into `EmployeeService`.\n\nIn addition to providing mock data, you\
    \ may also need to simulate other\nbehaviors, like throwing exceptions when certain\
    \ methods are called. But\ncreating mock implementations for every use case can\
    \ be tedious. You can\nuse mocking libraries to create mock objects without actually\
    \ creating\nclasses with mock behavior. The next section looks into how to unit\
    \ test\nusing the popular mocking library, Mockito.\n\nTesting with Mockito\n\n\
    Mockito is a popular Java mocking framework that can be used along with\nJUnit.\
    \ Mockito lets you write tests by mocking the external dependencies\nwith the\
    \ desired behavior.\n\nFor example, assume you are invoking some external web\
    \ service. When it\nfails due to some communication failures, you want to retry\
    \ three times\nbefore giving up. To test the retry behavior, that external web\
    \ service\nshould throw an exception that may not be in your control. You can\
    \ use\nMockito to simulate this behavior so that you can test the retry\nfunctionality.\n\
    \nSuppose you are importing user data from a third-party using a web\nservice,\
    \ as shown in Listing [15-10](#A447991_1_En_15_Chapter.html#Par56).\n\n```\n@Service\n\
    public class UsersImporter\n{\npublic List importUsers() throws UserImportServiceCommunicationFailure\n\
    {\nList users = new ArrayList();\n//get users by invoking some web service\n//if\
    \ any exception occurs throw UserImportServiceCommunicationFailure\n//dummy data\n\
    users.add(new User());\nusers.add(new User());\nusers.add(new User());\nreturn\
    \ users;\n}\n}\nListing 15-10.\nUsersImporter.java\n```\n\n`UserService`\nuses\
    \ `UsersImporter` to get\nuser data and retries three times in case a `UserImportServiceCommunicationFailure`\n\
    occurs. See Listing [15-11](#A447991_1_En_15_Chapter.html#Par58).\n\n```\n@Service\n\
    @Transactional\npublic class UsersImportService\n{\nprivate Logger logger = LoggerFactory.getLogger(UserService.class);\n\
    private UsersImporter usersImporter;\n@Autowired\npublic UsersImportService(UsersImporter\
    \ usersImporter)\n{\nthis.usersImporter = usersImporter;\n}\npublic UsersImportResponse\
    \ importUsers()\n{\nint retryCount = 0;\nint maxRetryCount = 3;\nfor (int i =\
    \ 0; i  importUsers = usersImporter.importUsers();\nlogger.info(\"Import Users:\
    \ \"+importUsers);\nbreak;\n} catch (UserImportServiceCommunicationFailure e)\n\
    {\nretryCount++;\nlogger.error(\"Error: \"+e.getMessage());\n}\n}\nif(retryCount\
    \ >= maxRetryCount)\nreturn new UsersImportResponse(retryCount, \"FAILURE\");\n\
    else\nreturn new UsersImportResponse(0, \"SUCCESS\");\n}\n}\npublic class UsersImportResponse\n\
    {\nprivate int retryCount;\nprivate String status;\n//setters & getters\n}\nListing\
    \ 15-11.\nUsersImportService.java\n```\n\nThis code invokes the `usersImporter.importUsers()`\n\
    method and, if it throws `UserImportServiceCommunicationFailure`,\nit retries\
    \ three times.\n\nIf you want to test if `usersImporter.importUsers()`\nreturns\
    \ the result without getting an exception, then `UsersImportResponse(0, \"SUCCESS\"\
    )` should be returned; otherwise, `UsersImportResponse(3, \"FAILURE\")` should\
    \ be returned.\n\nYou can use `@Mock` to create a\nmock object and `@InjectMocks`\
    \ to\ninject the dependencies with mocks. You can use `@RunWith(MockitoJUnitRunner.class)`\n\
    to initialize the mock objects or trigger the mock object initialization\nusing\
    \ `MockitoAnnotations.initMocks(this)`\nin the JUnit `@Before` method. See\nListing\
    \ [15-12](#A447991_1_En_15_Chapter.html#Par62).\n\n```\nimport static org.assertj.core.api.Assertions.assertThat;\n\
    import static org.mockito.BDDMockito.*;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
    import org.mockito.InjectMocks;\nimport org.mockito.Mock;\nimport org.mockito.junit.MockitoJUnitRunner;\n\
    import com.apress.demo.exceptions.UserImportServiceCommunicationFailure;\nimport\
    \ com.apress.demo.model.UsersImportResponse;\n@RunWith(MockitoJUnitRunner.class)\n\
    public class UsersImportServiceMockitoTest\n{\n@Mock\nprivate UsersImporter usersImporter;\n\
    @InjectMocks\nprivate UsersImportService usersImportService;\n@Test\npublic void\
    \ should_retry_3times_when_UserImportServiceCommunicationFailure_occured()\n{\n\
    given(usersImporter.importUsers()).willThrow(new UserImportServiceCommunicationFailure());\n\
    UsersImportResponse response = usersImportService.importUsers();\nassertThat(response.getRetryCount()).isEqualTo(3);\n\
    assertThat(response.getStatus()).isEqualTo(\"FAILURE\");\n}\n}\nListing 15-12.\n\
    Testing Using Mockito Mock Objects\n```\n\nHere you are simulating the failure\
    \ condition while importing users\nusing the web service as follows:\n\n```\n\
    given(usersImporter.importUsers()).willThrow(new UserImportServiceCommunicationFailure());\n\
    ```\n\nSo, when you call `userService.importUsers()`\nand the mock `usersImporter`\
    \ object\nthrows `UserImportServiceCommunicationFailure`,\nit will retry three\
    \ times. Similarly, you can use Mockito to simulate\nany kind of behavior to meet\
    \ these test cases.\n\nSpring Boot provides the `@MockBean` annotation\nthat can\
    \ be used to define a new Mockito mock bean or replace a Spring\nbean with a mock\
    \ bean and inject that into their dependent beans. Mock\nbeans will be automatically\
    \ reset after each test method. See Listing\n[15-13](#A447991_1_En_15_Chapter.html#Par67).\n\
    \n```\nimport static org.assertj.core.api.Assertions.assertThat;\nimport static\
    \ org.mockito.BDDMockito.*;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
    import org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    import com.apress.demo.exceptions.UserImportServiceCommunicationFailure;\nimport\
    \ com.apress.demo.model.UsersImportResponse;\n@RunWith(SpringRunner.class)\n@SpringBootTest\n\
    public class UsersImportServiceMockitoTest\n{\n@MockBean\nprivate UsersImporter\
    \ usersImporter;\n@Autowired\nprivate UsersImportService usersImportService;\n\
    @Test\npublic void should_retry_3times_when_UserImportServiceCommunicationFailure_occured()\n\
    {\ngiven(usersImporter.importUsers()).willThrow(new UserImportServiceCommunicationFailure());\n\
    UsersImportResponse response = usersImportService.importUsers();\nassertThat(response.getRetryCount()).isEqualTo(3);\n\
    assertThat(response.getStatus()).isEqualTo(\"FAILURE\");\n}\n}\nListing 15-13.\n\
    Testing Using Spring Boot’s @MockBean Mocks\n```\n\nHere, Spring Boot will create\
    \ a Mockito  mock object for\n`UsersImporter`\nand inject it into the `UsersImportService`\n\
    bean.\n\nTesting Slices of Application Using @*Test\nAnnotations\n\nWhile testing\
    \ various components of the application, you may want to\nload a subset of the\
    \ Spring `ApplicationContext`\nbeans, which are related to the subject under test\
    \ (SUT). For example,\nwhen testing a SpringMVC controller, you may want to load\
    \ only the MVC\nlayer components and provide mock service-layer beans as dependencies.\n\
    \nSpring Boot provides annotations like `@WebMvcTest`, `@DataJpaTest`, `@DataMongoTest`,\
    \ `@JdbcTest`, and `@JsonTest` to test\nslices of the application.\n\nTesting\
    \ SpringMVC Controllers Using @WebMvcTest\n\nSpring Boot provides the `@WebMvcTest`\n\
    annotation, which will autoconfigure SpringMVC infrastructure components\nand\
    \ load only `@Controller`, `@ControllerAdvice`,\n`@JsonComponent`,\n`Filter`,\
    \ `WebMvcConfigurer`, and\n`HandlerMethodArgumentResolver`\ncomponents. Other\
    \ Spring beans (annotated with `@Component`, `@Service`, `@Repository`, etc.)\n\
    will not be scanned when using this annotation.\n\nNow you’ll see how to create\
    \ a controller that adds data to the model\nand renders a Thymeleaf view. See\
    \ Listing [15-14](#A447991_1_En_15_Chapter.html#Par73).\n\n```\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
    import org.springframework.web.bind.annotation.GetMapping;\nimport com.apress.demo.repositories.TodoRepository;\n\
    @Controller\npublic class TodoController\n{\n@Autowired\nTodoRepository todoRepository;\n\
    @GetMapping(\"/todolist\")\npublic String showTodos(Model model)\n{\nmodel.addAttribute(\"\
    todos\", todoRepository.findAll());\nreturn \"todos\";\n}\n}\nListing 15-14.\n\
    TodoController.java\n```\n\nListing [15-15](#A447991_1_En_15_Chapter.html#Par75)\
    \ shows how to\nwrite a test for `TodoController` using\n`@WebMvcTest`.\n\n```\n\
    import static org.mockito.BDDMockito.*;\nimport static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.*;\n\
    import static org.hamcrest.Matchers.*;\nimport java.util.Arrays;\nimport org.junit.Test;\n\
    import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\nimport\
    \ org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.servlet.MockMvc;\n\
    import com.apress.demo.entities.Todo;\nimport com.apress.demo.repositories.TodoRepository;\n\
    @RunWith(SpringRunner.class)\n@WebMvcTest(controllers= TodoController.class)\n\
    public class TodoControllerTests\n{\n@Autowired\nprivate MockMvc mvc;\n@MockBean\n\
    private TodoRepository todoRepository;\n@Test\npublic void testShowAllTodos()\
    \ throws Exception\n{\nTodo todo1 = new Todo(1, \"Todo1\",false);\nTodo todo2\
    \ = new Todo(2, \"Todo2\",true);\ngiven(this.todoRepository.findAll()).willReturn(Arrays.asList(todo1,\
    \ todo2));\nthis.mvc.perform(get(\"/todolist\")\n.accept(MediaType.TEXT_HTML))\n\
    .andExpect(status().isOk())\n.andExpect(view().name(\"todos\"))\n.andExpect(model().attribute(\"\
    todos\", hasSize(2)))\n;\nverify(todoRepository, times(1)).findAll();\n}\n}\n\
    Listing 15-15.\nTesting SpringMVC Controller Using MockMvc\n```\n\nYou have annotated\
    \ the test with `@`  `WebMvcTest` \n`(controllers = TodoController.class)` by\
    \ explicitly specifying which controller\nyou are testing. As `@WebMvcTest` doesn’t\n\
    load other regular Spring beans and `TodoController`\ndepends on `TodoRepository`,\
    \ you\nprovided a mock bean using the `@MockBean` annotation.\nThe `@WebMvcTest`\n\
    autoconfigures `MockMvc`, which can be\nused to test controllers without starting\
    \ an actual servlet container.\n\nIn this test method, you set the expected behavior\
    \ on `todoRepository.findAll()`\nto return a list of two `Todo` objects. Then\n\
    you issue a `GET`\nrequest to `\"/todolist\"` and\nassert various things on response.\n\
    \nTesting SpringMVC REST Controllers Using\n@WebMvcTest\n\nSimilar to how you\
    \ can test SpringMVC controllers, you can test REST\ncontrollers as well. You\
    \ can write assertions on response data using\n`JsonPath` or\n`JSONassert`\nlibraries.\n\
    \nCreate a `TodoRestController`,\nas shown in Listing [15-16](#A447991_1_En_15_Chapter.html#Par80).\n\
    \n```\nimport java.util.Optional;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
    import org.springframework.web.bind.annotation.RestController;\nimport com.apress.demo.entities.Todo;\n\
    import com.apress.demo.repositories.TodoRepository;\n@RestController\npublic class\
    \ TodoRestController\n{\n@Autowired\nprivate TodoRepository todoRepository;\n\
    @GetMapping(\"/api/todos/{id}\")\npublic Optional findById(@PathVariable Integer\
    \ id)\n{\nreturn todoRepository.findById(id);\n}\n}\nListing 15-16.\nTodoRestController.java.\n\
    ```\n\nYou can write a test for `TodoRestController`,\nas shown in Listing [15-17](#A447991_1_En_15_Chapter.html#Par82).\n\
    \n```\nimport static org.hamcrest.CoreMatchers.*;\nimport static org.mockito.BDDMockito.*;\n\
    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.jsonPath;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
    import java.util.Optional;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\n\
    import org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.servlet.MockMvc;\n\
    import com.apress.demo.entities.Todo;\nimport com.apress.demo.repositories.TodoRepository;\n\
    @RunWith(SpringRunner.class)\n@WebMvcTest(controllers= TodoRestController.class)\n\
    public class TodoRestControllerTests\n{\n@Autowired\nprivate MockMvc mvc;\n@MockBean\n\
    private TodoRepository todoRepository;\n@Test\npublic void testFindTodoById()\
    \ throws Exception\n{\nTodo todo = new Todo(1, \"Todo1\", false);\ngiven(this.todoRepository.findById(1)).willReturn(Optional.of(todo));\n\
    this.mvc.perform(get(\"/api/todos/1\")\n.accept(MediaType.APPLICATION_JSON))\n\
    .andExpect(status().isOk())\n.andExpect(jsonPath(\"$.id\", is(1)))\n.andExpect(jsonPath(\"\
    $.text\", is(\"Todo1\")))\n.andExpect(jsonPath(\"$.done\", is(false)));\nverify(todoRepository,\
    \ times(1)).findById(1);\n}\n}\nListing 15-17.\nTesting SpringMVC REST Controller\
    \ Using MockMvc\n```\n\nYou are testing the `TodoRestController`\nendpoint  `\"\
    /api/todos/{id}\"` in\nthe same way you tested `TodoController`, but\nyou are\
    \ using the JSON `Path` assertions to\nverify the returned JSON response data.\n\
    \nTesting Secured Controller/Service Methods\n\nIn Chapter [13](#A447991_1_En_13_Chapter.html),\
    \ you learned how to secure web\napplications and REST APIs and apply method-level\
    \ security. Spring\nprovides several ways to test these secured resources as well.\n\
    \nYou’ll now see how you can test secured resources.\n\nAdd the following dependencies\
    \ to enable Spring Security and security\ntesting capabilities.\n\n```\norg.springframework.boot\n\
    spring-boot-starter-security\n\norg.springframework.security\nspring-security-test\n\
    test\n\n```\n\nWhen you add the Security starter without custom security\nconfigurations,\
    \ MVC endpoints will be secured using HTTP basic\nauthentication with a default\
    \ user and generated password. Instead of\nusing the default credentials, you\
    \ can configure credentials in `application.properties`\nas follows:\n\n```\n\
    security.user.name=admin\nsecurity.user.password=admin123\nsecurity.user.role=USER,ADMIN\n\
    ```\n\nYou can use the autoconfigured `TestRestTemplate` to\ntest REST endpoints,\
    \ passing the HTTP basic auth parameters, as shown in\nListing [15-18](#A447991_1_En_15_Chapter.html#Par91).\n\
    \n```\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\n\
    public class PingControllerTests\n{\n@Autowired\nTestRestTemplate restTemplate;\n\
    @Test\npublic void testPing() throws Exception\n{\nResponseEntity respEntity =\n\
    restTemplate.withBasicAuth(\"admin\", \"admin123\")\n.getForEntity(\"/ping\",\
    \ String.class);\nassertThat(respEntity.getStatusCode()).isEqualTo(HttpStatus.OK);\n\
    assertThat(respEntity.getBody()).isEqualTo(\"OK\");\n}\n}\nListing 15-18.\nTesting\
    \ REST Endpoint with TestRestTemplate Using HTTP Basic Authentication\n```\n\n\
    Note that you have passed the credentials using `restTemplate.withBasicAuth(\"\
    admin\", \"admin123\")`. Also note that by using `TestRestTemplate`, you\ncan\
    \ invoke REST endpoints using relative paths like `\"/ping\"` instead of\nspecifying\
    \ the complete URL `http://localhost:<port>/ping`.\nThis is very convenient when\
    \ using `RANDOM_PORT`. But if\nyou want to construct a URL yourself, you can get\
    \ the `RANDOM_PORT` value\nusing the `@LocalServerPort` as\nfollows:\n\n```\n\
    import org.springframework.boot.web.server.LocalServerPort;\n@LocalServerPort\n\
    int port;\n```\n\nYou might want to customize the default Spring Security configuration\n\
    and use form-based authentication instead of HTTP basic authentication.\n\nNow\
    \ you’ll see how to customize Spring Security to configure a few\nin-memory user\
    \ details and enable method-level security, as shown in\nListing [15-19](#A447991_1_En_15_Chapter.html#Par96).\n\
    \n```\n@Configuration\n@EnableWebSecurity\n@EnableGlobalMethodSecurity(securedEnabled\
    \ = true, prePostEnabled=true)\npublic class WebSecurityConfig extends WebSecurityConfigurerAdapter\n\
    {\n@Autowired\nprotected void configureGlobal(AuthenticationManagerBuilder auth)\
    \ throws Exception\n{\nauth\n.inMemoryAuthentication()\n.withUser(\"user\").password(\"\
    password\").roles(\"USER\").and()\n.withUser(\"admin\").password(\"admin123\"\
    ).roles(\"USER\", \"ADMIN\");\n}\n@Override\nprotected void configure(HttpSecurity\
    \ http) throws Exception {\nhttp.authorizeRequests()\n.antMatchers(\"/api/todos/**\"\
    ).hasRole(\"USER\")\n.antMatchers(\"/admin/**\").hasRole(\"ADMIN\")\n.antMatchers(\"\
    /ping\").hasAnyRole(\"USER\",\"ADMIN\")\n.anyRequest().authenticated()\n;\n}\n\
    }\nListing 15-19.\nCustom Spring Security Configuration\n```\n\nYou have customized\
    \ the Security configuration and the `httpBasic`\nauthentication is not enabled.\
    \ So you can’t use `TestRestTemplate` with\nbasic auth parameters to test the\
    \ secured REST endpoints. You can use\n`@WebMvcTest` and\ninvoke the REST endpoint\
    \ using `MockMvc`, which allows\nyou to pass security user credentials.\n\nWhen\
    \ using `@WebMvcTest`, the\nSpring Security HTTP basic authentication will be\
    \ used by default\ninstead of the custom Security configuration that you manually\n\
    configured. You can turn off basic authentication using the `secure=false`\nattribute\
    \ of `@WebMvcTest` and load\nthe security configuration using `@ContextConfiguration`,\n\
    as shown in Listing [15-20](#A447991_1_En_15_Chapter.html#Par99).\n\n```\n@RunWith(SpringRunner.class)\n\
    @WebMvcTest(controllers= TodoRestController.class, secure=false)\n@ContextConfiguration(classes={SpringbootTestingDemoApplication.class,\
    \ WebSecurityConfig.class})\npublic class TodoRestControllerTests\n{\n@Autowired\n\
    private MockMvc mvc;\n@MockBean\nprivate TodoRepository todoRepository;\n//@Test\
    \ methods\n}\nListing 15-20.\nTesting REST Controllers Using a Custom Spring Security\
    \ Configuration\n```\n\nListing [15-21](#A447991_1_En_15_Chapter.html#Par101)\
    \ shows you\nhow to test the `GET /api/todos/{id}` endpoint using `MockMvc`.\n\
    \n```\n@Test\npublic void testFindTodoById() throws Exception\n{\nTodo todo =\
    \ new Todo(1, \"Todo1\", false);\ngiven(this.todoRepository.findById(1)).willReturn(Optional.of(todo));\n\
    this.mvc.perform(get(\"/api/todos/1\")\n.with(user(\"admin\").password(\"admin123\"\
    ).roles(\"USER\",\"ADMIN\"))\n.accept(MediaType.APPLICATION_JSON))\n.andExpect(status().isOk())\n\
    .andExpect(jsonPath(\"$.id\", is(1)))\n.andExpect(jsonPath(\"$.text\", is(\"Todo1\"\
    )))\n.andExpect(jsonPath(\"$.done\", is(false)));\nverify(todoRepository, times(1)).findById(1);\n\
    }\nListing 15-21.\nTesting a Secured REST Endpoint Using MockMvc\n```\n\nHere\
    \ you are mocking `todoRepository.findById(1)`\nmethod and trigger GET request\
    \ using `MockMvc.perform()` and\nyou are passing the security user credentials\
    \ using `.with(user(\"admin\").password(\"admin123\").roles(\"USER\",\"ADMIN\"\
    ))`.\n\nListing [15-22](#A447991_1_En_15_Chapter.html#Par104) shows you\nhow to\
    \ test the `POST /api/todos` endpoint to create a new `Todo`.\n\n```\n@Autowired\n\
    private ObjectMapper objectMapper;\n@Test\npublic void testCreateTodo() throws\
    \ Exception\n{\nTodo todo = new Todo(null, \"New Todo1\", false);\nString content\
    \ = objectMapper.writeValueAsString(todo);\ngiven(this.todoRepository.save(any(Todo.class))).willReturn(todo);\n\
    this.mvc.perform(post(\"/api/todos\")\n.contentType(MediaType.APPLICATION_JSON_VALUE)\n\
    .content(content)\n.with(csrf())\n.with(user(\"admin\").password(\"admin123\"\
    ).roles(\"USER\",\"ADMIN\"))\n.accept(MediaType.APPLICATION_JSON_VALUE))\n.andExpect(status().isOk())\n\
    .andExpect(MockMvcResultMatchers.content().json(content))\n.andReturn()\n;\nverify(todoRepository,\
    \ times(1)).save(any(Todo.class));\n}\nListing 15-22.\nTesting a Secured REST\
    \ Endpoint with a CSRF Token Using MockMvc\n```\n\nIt is similar to the previous\
    \ test method, but you are performing a\n`POST` request\nusing `MockMvc.perform()`\
    \ and\nyou are setting the CSRF token using `with(csrf())`. As it\nis a `POST`\n\
    request and CSRF is enabled, you should send the CSRF token; otherwise,\nit will\
    \ throw `AccessDeniedException`\nwith the HTTP status code `403`.\n\nIn addition\
    \ to using the `configure(HttpSecurity http)` method to configure security constraints,\
    \ you can also use\nthe `@Secured` or\n`@PreAuthorize`\nannotations to secure\
    \ REST endpoints. See Listing [15-23](#A447991_1_En_15_Chapter.html#Par107).\n\
    \n```\n@RestController\npublic class AdminRestController\n{\n@Autowired\nprivate\
    \ UserService userService;\n@Secured(\"ROLE_ADMIN\")\n@DeleteMapping(\"/admin/users/{id}\"\
    )\npublic void deleteUser(@PathVariable(\"id\") Integer userId)\n{\nuserService.deleteUser(userId);\n\
    }\n}\nListing 15-23.\nAdminRestController with Secured Methods Using Annotations\n\
    ```\n\nThe REST endpoint `DELETE /admin/users/{id}` can be accessed by the users\
    \ with the `ADMIN` role. You can\ntest the REST endpoints secured by the `@Secured`\
    \ or `@PreAuthorize`\nannotations in the same way using `MockMvc`, as shown in\n\
    Listing [15-24](#A447991_1_En_15_Chapter.html#Par109).\n\n```\n@RunWith(SpringRunner.class)\n\
    @WebMvcTest(controllers= AdminRestController.class, secure=false)\n@ContextConfiguration(classes={SpringbootTestingDemoApplication.class,\
    \ WebSecurityConfig.class})\npublic class AdminRestControllerTests\n{\n@Autowired\n\
    private MockMvc mvc;\n@MockBean\nprivate UserService userService;\n@Test\npublic\
    \ void testAdminDeleteUser() throws Exception\n{\nMockito.doNothing()\n.when(userService)\n\
    .deleteUser(Mockito.any(Integer.class));\nthis.mvc.perform(delete(\"/admin/users/2\"\
    )\n.with(csrf())\n.with(user(\"admin\").password(\"admin123\").roles(\"ADMIN\"\
    ))\n.accept(MediaType.APPLICATION_JSON))\n.andExpect(status().isOk());\nverify(userService,\
    \ times(1)).deleteUser(2);\n}\n}\nListing 15-24.\nTesting REST Endpoints Secured\
    \ with the @Secured Annotation Using MockMvc\n```\n\nIn addition to securing the\
    \ web layer, you can also secure any Spring\ncomponents by using method-level\
    \ security and annotating the methods\nwith `@Secured`\nor `@PreAuthorize`. You\n\
    can also annotate these annotations at the class level, which applies\nthe security\
    \ configuration for all the methods in that class.\n\nListing [15-25](#A447991_1_En_15_Chapter.html#Par112)\
    \ shows you\nhow to secure the `UserService` methods\nusing `@Secured`\nand `@PreAuthorize`.\n\
    \n```\n@Service\n@Transactional\npublic class UserService\n{\nprivate UserRepository\
    \ userRepository;\n@Autowired\npublic UserService(UserRepository repo)\n{\nthis.userRepository\
    \ = repo;\n}\npublic Optional findUserById(Integer userId)\n{\nreturn userRepository.findById(userId);\n\
    }\n@Secured(\"ROLE_USER\")\npublic void createUser(User user)\n{\nuserRepository.save(user);\n\
    }\n@PreAuthorize(\"isAuthenticated()\")\npublic void updateUser(User user)\n{\n\
    userRepository.save(user);\n}\n@Secured(\"ROLE_ADMIN\")\npublic void deleteUser(Integer\
    \ userId)\n{\nuserRepository.delete(userId);\n}\n}\nListing 15-25.\nUserService.java\
    \ with Method-Level Security\n```\n\nIn `UserService`,\nyou have configured\n\
    \ the  `deleteUser()` method\n to be accessible for `ADMIN` users only, the\n\
    `createUser()`\nmethod to be accessible for users with the `USER` only, and the\n\
    `updateUser()`\nmethod to be accessed by any authenticated user.\n\nApproach One\n\
    \nYou can use the JUnit `@Before` method to\ninitialize Spring Security user authentication\
    \ and the `@After` method to\nclear  `SecurityContextHolder`\n. See Listing [15-26](#A447991_1_En_15_Chapter.html#Par115).\n\
    \n```\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\n\
    public class SpringbootTestingDemoApplicationTests\n{\n@Autowired\nprivate UserService\
    \ userService;\n@Autowired\nprivate ApplicationContext context;\nprivate Authentication\
    \ authentication;\n@Before\npublic void init() {\nAuthenticationManager authenticationManager\
    \ =\nthis.context.getBean(AuthenticationManager.class);\nthis.authentication =\
    \ authenticationManager.authenticate(\nnew UsernamePasswordAuthenticationToken(\"\
    admin\", \"admin123\"));\n}\n@After\npublic void close() {\nSecurityContextHolder.clearContext();\n\
    }\n@Test(expected = AuthenticationCredentialsNotFoundException.class)\npublic\
    \ void deleteUserUnauthenticated() {\nuserService.deleteUser(3);\n}\n@Test\npublic\
    \ void deleteUserAuthenticated() {\nSecurityContextHolder.getContext().setAuthentication(this.authentication);\n\
    userService.deleteUser(3);\n}\n}\nListing 15-26.\nTesting Secured Methods Using\
    \ AuthenticationManager\n```\n\nHere, you are invoking\n the  `deleteUserUnauthenticated()`\n\
    test method  without authentication. That means that `userService.deleteUser()`\n\
    \  will throw\n`AuthenticationCredentialsNotFoundException`.\nBut in the `deleteUserAuthenticated()`\n\
    test case, you are setting user authentication with valid user\ncredentials to\
    \ the `ADMIN` role, so it\nwill allow you to invoke the `userService.deleteUser()`\n\
    method.\n\nApproach Two\n\nSpring Security 4.0 introduced the  `@WithMockUser`\n\
    annotation , which allows you to test secured resources even more\neasily. The\
    \ `@WithMockUser` will by\ndefault initialize user authentication with the username\
    \ set to `user`, the password\nset to `password`, and the\nrole set to `ROLE_USER`.\n\
    \n```\n@Test\n@WithMockUser\npublic void createUserWithMockUser() {\nUser user\
    \ = new User();\nuser.setName(\"Yosin\");\nuser.setEmail(\"yosin@gmail.com\");\n\
    user.setPassword(\"yosin123\");\nuserService.createUser(user);\n}\n```\n\nAs `userService.createUser()`\n\
    \  is allowed to\nbe called by users with the `ROLE_USER` role, you\ncan simply\
    \ add `@WithMockUser` to run\nthe `createUserWithMockUser()`\ntest case.\n\nYou\
    \ can also explicitly provide `username`, `password`, and `roles` to `@WithMockUser`,\
    \ as\nfollows.\n\n```\n@Test\n@WithMockUser(username=\"admin\", password=\"admin123\"\
    , roles={\"USER\",\"ADMIN\"})\npublic void deleteUserAuthenticatedWithMockUser()\
    \ {\nuserService.deleteUser(2);\n}\n```\n\nApproach Three\n\nIn real applications,\
    \ you may have used custom  `UserDetailsService`\n and a custom implementation\
    \ of `UserDetails`. In these\ncases, you can use `@WithUserDetails` to\ninitialize\
    \ user authentication loaded by using a custom `UserDetailsService`.\n\n```\n\
    @Test\n@WithUserDetails\npublic void createUserWithUserDetails()\n{\n...\n}\n\
    ```\n\nYou can also pass a specific `username` as `@WithUserDetails(\"admin\"\
    )`,\nwhich initializes the user authentication with the `admin` user details\n\
    loaded by using custom `UserDetailsService`.\n\nFor more details on Spring Security\
    \ testing, visit the reference\ndocumentation at [`http://docs.spring.io/spring-security/site/docs/current/reference/htmlsingle/#test`](http://docs.spring.io/spring-security/site/docs/current/reference/htmlsingle/#test)\
    \ .\n\nTesting Persistence Layer Components Using\n@DataJpaTest and @JdbcTest\n\
    \nYou might want \n  to test the\npersistence layer components of your application,\
    \ which doesn’t require\nloading of many components like controllers, security\
    \ configuration, and\nso on. Spring Boot provides the `@DataJpaTest` and\n`@JdbcTest`\n\
    annotations to test the Spring beans, which talk to relational\ndatabases.\n\n\
    Spring Boot provides the `@DataJpaTest`\nannotation to test the persistence layer\
    \ components that will\nautoconfigure in-memory embedded databases and scan for\
    \ `@Entity` classes and\nSpring Data JPA repositories. The `@DataJpaTest`\nannotation\
    \ doesn’t load other Spring beans `(@Components`, `@Controller`, `@Service`, and\n\
    annotated beans) into `ApplicationContext`.\n\nNow you’ll see how to test the\
    \ Spring Data JPA repositories in a Spring\nBoot application. Create a Spring\
    \ Boot Maven project with the Data-JPA\nand Test starters.\n\n```\n\norg.springframework.boot\n\
    spring-boot-starter-data-jpa\n\ncom.h2database\nh2\n\norg.springframework.boot\n\
    spring-boot-starter-test\ntest\n\n```\n\nCreate a JPA entity called `User` and\
    \ a Spring\nData JPA repository called `UserRepository`, as\nshown in Listing\
    \ [15-27](#A447991_1_En_15_Chapter.html#Par131).\n\n```\n@Entity\n@Table(name=\"\
    users\")\npublic class User\n{\n@Id @GeneratedValue(strategy=GenerationType.AUTO)\n\
    private Integer id;\n@Column(nullable=false)\nprivate String name;\n@Column(nullable=false,\
    \ unique=true)\nprivate String email;\n@Column(nullable=false)\nprivate String\
    \ password;\n//setters & getters\n}\npublic interface UserRepository extends JpaRepository\n\
    {\nUser findByEmail(String email);\n}\nListing 15-27.\nJPA Entity User.java and\
    \ Data JPA Repository UserRepository.java\n```\n\nYou can initialize the `USERS`\
    \ table with some\nstatic data using `src/main/resources/data.sql`.\nSee Listing\
    \ [15-28](#A447991_1_En_15_Chapter.html#Par133).\n\n```\ninsert into users(id,\
    \ email, password, name) values\n(1, 'admin@gmail.com','admin','Admin'),\n(2,\
    \ 'siva@gmail.com','siva','Siva'),\n(3, 'test@gmail.com','test','Test');\nListing\
    \ 15-28.\nsrc/main/resources/data.sql\n```\n\nNow you can test `UserRepository`\
    \ using\nthe `@DataJpaTest`\nannotation, as shown in Listing [15-29](#A447991_1_En_15_Chapter.html#Par135).\n\
    \n```\n@RunWith(SpringRunner.class)\n@DataJpaTest\npublic class UserRepositoryTests\n\
    {\n@Autowired\nprivate UserRepository userRepository;\n@Test\npublic void testFindByEmail()\
    \ {\nUser user = userRepository.findByEmail(\"admin@gmail.com\");\nassertNotNull(user);\n\
    assertEquals(1, user.getId());\nassertEquals(\"admin\", user.getName());\n}\n\
    }\nListing 15-29.\nTesting Spring Data JPA Repositories Using @DataJpaTest\n```\n\
    \nWhen you run `UserRepositoryTests`,\nSpring Boot will autoconfigure the `H2`\
    \ in-memory embedded\ndatabase (as you have the `H2` database driver in\nthe classpath)\
    \ and run the tests.\n\nIf you want to run the tests against the actual registered\
    \ database, you\ncan annotate the test with `@AutoConfigureTestDatabase(replace=Replace.NONE)`,\n\
    which will use the registered `DataSource` instead of\nan in-memory datasource.\
    \ You can use `Replace.AUTO_CONFIGURED`\nto replace autoconfigured `DataSource`\
    \ and use\n`Replace.ANY`\n(the default) to replace any datasource bean that’s\
    \ autoconfigured or\nexplicitly defined.\n\nThe `@`  `DataJpaTest` \n  tests are\n\
    transactional and rolled back at the end of each test by default. You\ncan disable\
    \ this default rollback behavior for a single test or for an\nentire test class\
    \ by annotating with `@Transactional(propagation = Propagation.NOT_SUPPORTED)`.\
    \ See Listing [15-30](#A447991_1_En_15_Chapter.html#Par139).\n\n```\n@RunWith(SpringRunner.class)\n\
    @DataJpaTest\npublic class UserRepositoryTests\n{\n@Autowired\nprivate UserRepository\
    \ userRepository;\n@Test\n@Transactional(propagation = Propagation.NOT_SUPPORTED)\n\
    public void testCreateUser() {\nUser user = new User(null, \"john@gmail.com\"\
    , \"john\", \"John\");\nuserRepository.save(user);\n//assertions\n}\n@Test\npublic\
    \ void testUpdateUser() {\nUser user = userRepository.findByEmail(\"admin@gmail.com\"\
    );\nuser.setName(\"Administrator\")\nuserRepository.save(user);\n//assertions\n\
    }\n}\nListing 15-30.\n@DataJpaTest with Custom Transactional Behavior\n```\n\n\
    When the `testCreateUser()` test\nmethod runs, the changes will not be rolled\
    \ back, whereas the database\nchanges made in `testUpdateUser()` will\nbe automatically\
    \ rolled back.\n\nThe `@DataJpaTest`\nannotation also autoconfigures `TestEntityManager`,\n\
    which is an alternative to the JPA `EntityManager` to be\nused in JPA tests. See\
    \ Listing [15-31](#A447991_1_En_15_Chapter.html#Par142).\n\n```\n@RunWith(SpringRunner.class)\n\
    @DataJpaTest\npublic class UserRepositoryTests\n{\n@Autowired\nprivate UserRepository\
    \ userRepository;\n@Autowired\nprivate TestEntityManager entityManager;\n@Test\n\
    public void testFindByEmail() {\nUser user = new User(null, \"john@gmail.com\"\
    , \"john\", \"John\");\nInteger id = entityManager.persistAndGetId(user, Integer.class);\n\
    User john = userRepository.findByEmail(\"john@gmail.com\");\nassertNotNull(john);\n\
    assertEquals(id, john.getId());\nassertEquals(\"john\", user.getName());\n}\n\
    }\nListing 15-31.\n@DataJpaTest Using TestEntityManager\n```\n\nThe `TestEntityManager`\n\
    provides some convenient methods—like `persistAndGetId()`,\n`persistAndFlush()`,\n\
    and `persistFlushFind()`—which\nare useful in tests.\n\nSimilar to the `@DataJpaTest`\n\
    annotation, you can use `@JdbcTest` to test\nplain JDBC-related methods using\
    \ `JdbcTemplate`. The\n`@JdbcTest`\nannotation also autoconfigures in-memory embedded\
    \ databases and runs the\ntests in a transactional manner.\n\nNow you’ll create\
    \ a `JdbcUserRepository` to\nperform database operations using `JdbcTemplate`.\
    \ See\nListing [15-32](#A447991_1_En_15_Chapter.html#Par146).\n\n```\npublic class\
    \ JdbcUserRepository\n{\nprivate JdbcTemplate jdbcTemplate;\npublic JdbcUserRepository(JdbcTemplate\
    \ jdbcTemplate) {\nthis.jdbcTemplate = jdbcTemplate;\n}\npublic List findAll()\
    \ {\n....\n....\n}\n}\nListing 15-32.\nJdbc UserRepository.java\n```\n\nListing\
    \ [15-33](#A447991_1_En_15_Chapter.html#Par148) shows you\nhow to test `JdbcUserRepository`\n\
    methods using `@JdbcTest`.\n\n```\n@RunWith(SpringRunner.class)\n@JdbcTest\npublic\
    \ class JdbcUserRepositoryTests\n{\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\n\
    private JdbcUserRepository userRepository;\n@Before\npublic void init()\n{\nuserRepository\
    \ = new JdbcUserRepository(jdbcTemplate);\njdbcTemplate.execute(\"create table\
    \ people(id int, name varchar(100))\");\njdbcTemplate.execute(\"insert into people(id,\
    \ name) values(1, 'John')\");\njdbcTemplate.execute(\"insert into people(id, name)\
    \ values(2, 'Remo')\");\njdbcTemplate.execute(\"insert into people(id, name) values(3,\
    \ 'Dale')\");\n}\n@Test\npublic void testFindAllUsers() throws Exception\n{\n\
    List users = userRepository.findAll();\nassertThat(users.size()).isEqualTo(3);\n\
    }\n}\nListing 15-33.\nTesting JDBC Operations Using @JdbcTest\n```\n\nAs `@jdbcTest`\n\
    will    not load any regular\n`@Component`\nSpring beans, this example manually\
    \ creates the `JdbcUserRepository`\ninstance by using the autoconfigured `JdbcTemplate`\
    \ bean.\n\nSimilar to `@DataJpaTest` and\n`@jdbcTest`,\nSpring Boot provides other\
    \ annotations like `@DataMongoTest`, `@DataNeo4jTest`, `@JooqTest`, `@JsonTest`,\
    \ and `@DataLdapTest` to test\nslices of application.\n\nSummary\n\nIn this chapter,\
    \ you learned about various techniques that test Spring\nBoot applications. You\
    \ looked at testing controllers, REST API\nendpoints, and service-layer methods.\
    \ You also learned how to test\nsecured methods and REST endpoints using the Spring\
    \ Security test\nmodule. In the next chapter, you will look at how to create your\
    \ own\nSpring Boot Starter.\n\n16. Creating a Custom Spring Boot\nStarter\n\n\
    The main purpose of Spring Boot is to increase developer productivity by\ntaking\
    \ an opinionated view of the application and autoconfiguring the\nSpring `ApplicationContext`.\n\
    Spring Boot provides starters for a wide range of commonly used\nframeworks and\
    \ libraries. Spring Boot’s autoconfiguration mechanism\ntakes care of configuring\
    \ Spring Beans on your behalf based on various\ncriteria.\n\nIn addition to the\
    \ Spring Boot Starters that come out-of-the-box, you\ncan also create your own\
    \ starter modules. You may have some reusable\nmodules developed in your organization\
    \ that are used in many\napplications. You can create your own custom Spring Boot\
    \ Starter to\nutilize those reusable modules in a much simpler way in Spring Boot\n\
    applications.\n\nThis chapter looks into how to create a custom Spring Boot Starter.\
    \ To\ndemonstrate it, you are going to create `twitter4j-spring-boot-starter`,\n\
    which will autoconfigure Twitter4j, which is a Java library that\ninteracts with\
    \ the Twitter API.\n\nIntroducing Twitter4j\n\nTwitter4j provides\n Java bindings\
    \ for the Twitter REST API. In order to use\nTwitter4j, you need to add the following\
    \ Maven dependency.\n\n```\norg.twitter4j\ntwitter4j-core\n4.0.4\n\n```\n\nThe\
    \ Twitter4j API main entry point is the `Twitter` class and you\ncan create an\
    \ instance of Twitter, as shown in Listing [16-1](#A447991_1_En_16_Chapter.html#Par7).\n\
    \n```\nConfigurationBuilder cb = new ConfigurationBuilder();\ncb.setDebugEnabled(true)\n\
    .setOAuthConsumerKey(\"your-consumer-key-here\")\n.setOAuthConsumerSecret(\"your-consumer-secret-here\"\
    )\n.setOAuthAccessToken(\"your-access-token-here\")\n.setOAuthAccessTokenSecret(\"\
    your-access-token-secret-here\");\nTwitterFactory tf = new TwitterFactory(cb.build());\n\
    Twitter twitter = tf.getInstance();\nListing 16-1.\nUsing the Twitter4j API\n\
    ```\n\nNow you can use `Twitter` instance to\nget the latest tweets, as follows:\n\
    \n```\nList statuses = twitter.getHomeTimeline();\nfor (Status status : statuses)\n\
    {\nSystem.out.println(status.getUser().getName() + \":\" + status.getText());\n\
    }\n```\n\nYou are going to create a Spring Boot Starter for Twitter4j  so that\
    \ you\ncan autowire `Twitter` instances\nwithout having to explicitly register\
    \ them.\n\nCustom Spring Boot Starter\n\nIn Chapter [3](#A447991_1_En_3_Chapter.html),\
    \ you learned how Spring Boot\nautoconfiguration works by using the  `@Conditional`\
    \ feature\n.\n\nSpring Boot Starter is typically aimed at autoconfiguring some\
    \ library\nor framework based on the presence of a class or a configuration\n\
    property or depends on whether a bean of a particular type is already\nregistered\
    \ or not.\n\nCreating a custom \nSpring Boot Starter generally involves:\n\n*\
    \   Creating an autoconfigure module that autoconfigures Spring Beans based\n\
    \    on some criteria\n\n*   Creating a starter module that provides a dependency\
    \ to the\n    autoconfigure module along with the dependent libraries\n\nSo, you\
    \ are going to create:\n\n*   The `twitter4j-spring-boot-autoconfigure`\n    module,\
    \ which contains Twitter4j autoconfiguration bean definitions.\n\n*   The `twitter4j-spring-boot-starter`\n\
    \    module, which pulls in the `twitter4j-spring-boot-autoconfigure`\n    and\
    \ `twitter4j-core`\n    dependencies.\n\nAfter creating the custom Twitter4j starter,\
    \ you will build a Spring\nBoot application using `twitter4j-spring-boot-starter`.\n\
    \nCreate the twitter4j-spring-boot-autoconfigure\nModule\n\nNow you will create\
    \ a module called  `twitter4j-spring-boot-autoconfigure`\n and add the Maven dependencies\
    \ such as `spring-boot-autoconfigure`,\n`twitter4j-core`,\nand `spring-boot-starter-test`.\n\
    See Listing [16-2](#A447991_1_En_16_Chapter.html#Par21).\n\n```\n\n4.0.0\ncom.apress\n\
    twitter4j-spring-boot-autoconfigure\njar\n1.0-SNAPSHOT\n\nUTF-8\n1.8\n1.8\n4.0.4\n\
    2.0.0.BUILD-SNAPSHOT\n\norg.springframework.boot\nspring-boot-dependencies\n${spring-boot.version}\n\
    pom\nimport\n\norg.springframework.boot\nspring-boot-autoconfigure\n\norg.springframework.boot\n\
    spring-boot-configuration-processor\ntrue\n\norg.springframework.boot\nspring-boot-starter-test\n\
    test\n\norg.twitter4j\ntwitter4j-core\n${twitter4j.version}\ntrue\n\nListing 16-2.\n\
    twitter4j-spring-boot-autoconfigure/pom.xml\n```\n\nNote that this example specifies\
    \  `twitter4j-core`\n as an optional dependency because `twitter4j-core` should\n\
    be added to the project only when `twitter4j-spring-boot-starter`\nis added to\
    \ the project.\n\nTwitter4j Properties to Hold the Twitter4j Config\nParameters\n\
    \nNow you’ll create `Twitter4jProperties.java`\nto bind the Twitter4j OAuth config\
    \ parameters  that\nstart with `twitter4j.*` using\n`@ConfigurationProperties`.\n\
    See Listing [16-3](#A447991_1_En_16_Chapter.html#Par24).\n\n```\npackage com.apress.spring.boot.autoconfigure;\n\
    import org.springframework.boot.context.properties.ConfigurationProperties;\n\
    @ConfigurationProperties(prefix= Twitter4jProperties.TWITTER4J_PREFIX)\npublic\
    \ class Twitter4jProperties\n{\npublic static final String TWITTER4J_PREFIX =\
    \ \"twitter4j\";\nprivate Boolean debug = false;\nprivate OAuth oauth = new OAuth();\n\
    public Boolean getDebug() {\nreturn debug;\n}\npublic void setDebug(Boolean debug)\
    \ {\nthis.debug = debug;\n}\npublic OAuth getOauth() {\nreturn oauth;\n}\npublic\
    \ static class OAuth {\nprivate String consumerKey;\nprivate String consumerSecret;\n\
    private String accessToken;\nprivate String accessTokenSecret;\npublic String\
    \ getConsumerKey() {\nreturn consumerKey;\n}\npublic void setConsumerKey(String\
    \ consumerKey) {\nthis.consumerKey = consumerKey;\n}\npublic String getConsumerSecret()\
    \ {\nreturn consumerSecret;\n}\npublic void setConsumerSecret(String consumerSecret)\
    \ {\nthis.consumerSecret = consumerSecret;\n}\npublic String getAccessToken()\
    \ {\nreturn accessToken;\n}\npublic void setAccessToken(String accessToken) {\n\
    this.accessToken = accessToken;\n}\npublic String getAccessTokenSecret() {\nreturn\
    \ accessTokenSecret;\n}\npublic void setAccessTokenSecret(String accessTokenSecret)\
    \ {\nthis.accessTokenSecret = accessTokenSecret;\n}\n}\n}\nListing 16-3.\nTwitter4jProperties.java\n\
    ```\n\nThe `@`  `ConfigurationProperties`\n annotation allows you to bind a set\
    \ of properties with a common\nprefix to Java bean properties. With this configuration\
    \ object, you can\nconfigure the Twitter4j properties in `application.properties`,\n\
    as shown in Listing [16-4](#A447991_1_En_16_Chapter.html#Par26).\n\n```\ntwitter4j.debug=true\n\
    twitter4j.oauth.consumer-key=your-consumer-key-here\ntwitter4j.oauth.consumer-secret=your-consumer-secret-here\n\
    twitter4j.oauth.access-token=your-access-token-here\ntwitter4j.oauth.access-token-secret=your-access-token-secret-here\n\
    Listing 16-4.\napplication.properties\n```\n\nTwitter4j Autoconfiguration to Autoconfigure\n\
    Twitter4j\n\nNow you create an autoconfiguration class called  `Twitter4jAutoConfiguration`\n\
    , which contains the bean definitions that will be automatically\nconfigured based\
    \ on some criteria.\n\nWhat is that criteria?\n\n*   If `twitter4j.TwitterFactory.class`\n\
    \    is on the classpath\n\n*   If the `TwitterFactory` bean\n    is not already\
    \ defined explicitly\n\nSo, you are going to autoconfigure `TwitterFactory` and\n\
    the Twitter beans if there is a `TwitterFactory` class\nin the classpath and if\
    \ the `TwitterFactory` bean\nis not already registered.\n\nCreate the `Twitter4jAutoConfiguration`\n\
    class, as shown in Listing [16-5](#A447991_1_En_16_Chapter.html#Par33).\n\n```\n\
    package com.apress.spring.boot.autoconfigure;\nimport org.apache.commons.logging.Log;\n\
    import org.apache.commons.logging.LogFactory;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.autoconfigure.condition.ConditionalOnClass;\n\
    import org.springframework.boot.autoconfigure.condition.ConditionalOnMissingBean;\n\
    import org.springframework.boot.context.properties.EnableConfigurationProperties;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import twitter4j.Twitter;\nimport twitter4j.TwitterFactory;\nimport twitter4j.conf.ConfigurationBuilder;\n\
    @Configuration\n@ConditionalOnClass({ TwitterFactory.class })\n@EnableConfigurationProperties(Twitter4jProperties.class)\n\
    public class Twitter4jAutoConfiguration {\nprivate static Log log = LogFactory.getLog(Twitter4jAutoConfiguration.class);\n\
    @Autowired\nprivate Twitter4jProperties properties;\n@Bean\n@ConditionalOnMissingBean\n\
    public TwitterFactory twitterFactory(){\nif (this.properties.getOauth().getConsumerKey()\
    \ == null\n|| this.properties.getOauth().getConsumerSecret() == null\n|| this.properties.getOauth().getAccessToken()\
    \ == null\n|| this.properties.getOauth().getAccessTokenSecret() == null)\n{\n\
    log.error(\"Twitter4j properties not configured properly. Please check twitter4j.*\
    \ properties settings in configuration file.\");\nthrow new RuntimeException(\"\
    Twitter4j properties not configured properly. Please check twitter4j.* properties\
    \ settings in configuration file.\");\n}\nConfigurationBuilder cb = new ConfigurationBuilder();\n\
    cb.setDebugEnabled(properties.getDebug())\n.setOAuthConsumerKey(properties.getOauth().getConsumerKey())\n\
    .setOAuthConsumerSecret(properties.getOauth().getConsumerSecret())\n.setOAuthAccessToken(properties.getOauth().getAccessToken())\n\
    .setOAuthAccessTokenSecret(properties.getOauth().getAccessTokenSecret());\nTwitterFactory\
    \ tf = new TwitterFactory(cb.build());\nreturn tf;\n}\n@Bean\n@ConditionalOnMissingBean\n\
    public Twitter twitter(TwitterFactory twitterFactory){\nreturn twitterFactory.getInstance();\n\
    }\n}\nListing 16-5.\nTwitter4jAutoConfiguration.java\n```\n\nThis example uses\
    \ `@ConditionalOnClass({ TwitterFactory.class})`   to specify that this\nautoconfiguration\
    \ should take place only when the `TwitterFactory.class`\nclass is present.\n\n\
    It also uses `@ConditionalOnMissingBean`\non bean definition methods to consider\
    \ this bean definition only if the\n`TwitterFactory`\nbean is not already defined\
    \ explicitly.\n\nAlso note that the example annotated with `@EnableConfigurationProperties(Twitter4jProperties.class)`\n\
    to enable support for `ConfigurationProperties`\nand injected the `Twitter4jProperties`\n\
    bean.\n\nNow you need to configure the custom `Twitter4jAutoConfiguration`\nin\
    \ the `src/main/resources/METAINF/spring.factories`\nfile as follows:\n\n```\n\
    org.springframework.boot.autoconfigure.EnableAutoConfiguration=\\ com.apress.spring.boot.autoconfigure.Twitter4jAutoConfiguration\n\
    ```\n\nNext you are going to create the starter module called `twitter4j-spring-boot-starter`.\n\
    \nCreate the twitter4j-spring-boot-starter Module\n\nNow you’ll create a module\
    \ called  `twitter4j-spring-boot-starter`\n and configure its dependencies, as\
    \ shown in Listing [16-6](#A447991_1_En_16_Chapter.html#Par41).\n\n```\n\n4.0.0\n\
    com.apress\ntwitter4j-spring-boot-starter\njar\n1.0-SNAPSHOT\n\nUTF-8\n1.8\n1.8\n\
    2.0.0.BUILD-SNAPSHOT\n4.0.4\n\norg.springframework.boot\nspring-boot-dependencies\n\
    ${spring-boot.version}\npom\nimport\n\norg.springframework.boot\nspring-boot-starter\n\
    \ncom.apress\ntwitter4j-spring-boot-autoconfigure\n${project.version}\n\norg.twitter4j\n\
    twitter4j-core\n${twitter4j.version}\n\nListing 16-6.\ntwitter4j-spring-boot-starter/pom.xml\n\
    ```\n\nNote that in this Maven module, you are actually pulling in the `twitter4j-core`\n\
    dependency.\n\nYou don’t need to add any code to this module , but you can\noptionally\
    \ specify the dependencies you are going to provide through\nthis starter in the\
    \ `src/main/resources/METAINF/spring.provides`\nfile, as follows:\n\n```\nprovides:\
    \ twitter4j-core\n```\n\nThat’s all for this starter. Next, you see how to create\
    \ a sample using\n`twitter4j-spring-boot-starter`.\n\nApplication Using twitter4j-spring-boot-starter\n\
    \nWe are going to create a simple Maven-based Spring Boot application and\nuse\
    \  `twitter4j-spring-boot-starter`\n to fetch the latest tweets. First, you create\
    \ a simple Spring\nBoot application and add the `twitter4j-spring-boot-starter`\n\
    dependency, as shown in Listing [16-7](#A447991_1_En_16_Chapter.html#Par47).\n\
    \n```\n\n4.0.0\ncom.apress\ntwitter4j-spring-boot-sample\njar\n1.0-SNAPSHOT\n\n\
    org.springframework.boot\nspring-boot-starter-parent\n2.0.0.BUILD-SNAPSHOT\n\n\
    UTF-8\n1.8\n\norg.springframework.boot\nspring-boot-maven-plugin\n\ncom.apress\n\
    twitter4j-spring-boot-starter\n1.0-SNAPSHOT\n\norg.springframework.boot\nspring-boot-starter-test\n\
    test\n\nListing 16-7.\ntwitter4j-spring-boot-sample/pom.xml\n```\n\nCreate the\
    \ entry point class  `SpringbootTwitter4jDemoApplication`\n, as shown in Listing\
    \ [16-8](#A447991_1_En_16_Chapter.html#Par49).\n\n```\npackage com.apress.demo;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    @SpringBootApplication\npublic class SpringbootTwitter4jDemoApplication\n{\npublic\
    \ static void main(String[] args)\n{\nSpringApplication.run(SpringbootTwitter4jDemoApplication.class,\
    \ args);\n}\n}\nListing 16-8.\nSpringbootTwitter4jDemoApplication.java\n```\n\n\
    Next, create `TweetService`, as\nshown in Listing [16-9](#A447991_1_En_16_Chapter.html#Par51).\n\
    \n```\npackage com.apress.demo;\nimport java.util.ArrayList;\nimport java.util.List;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
    import twitter4j.ResponseList;\nimport twitter4j.Status;\nimport twitter4j.Twitter;\n\
    import twitter4j.TwitterException;\n@Service\npublic class TweetService\n{\n@Autowired\n\
    private Twitter twitter;\npublic List getLatestTweets()\n{\nList tweets = new\
    \ ArrayList();\ntry {\nResponseList homeTimeline = twitter.getHomeTimeline();\n\
    for (Status status : homeTimeline)\n{\ntweets.add(status.getText());\n}\n}\ncatch\
    \ (TwitterException e) {\nthrow new RuntimeException(e);\n}\nreturn tweets;\n\
    }\n}\nListing 16-9.\nTweetService.java\n```\n\nNow create a test to verify the\
    \ Twitter4j \nautoconfiguration (see Listing [16-10](#A447991_1_En_16_Chapter.html#Par53)).\
    \ Before\nthat, make sure you have set your Twitter4j OAuth configuration\nparameter\
    \ to your actual values. You can get them from [`https://apps.twitter.com/`](https://apps.twitter.com/)\
    \ .\n\n```\npackage com.apress.demo;\nimport java.util.List;\nimport org.junit.Test;\n\
    import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    import twitter4j.TwitterException;\n@RunWith(SpringRunner.class)\n@SpringBootTest\n\
    public class SpringbootTwitter4jDemoApplicationTest\n{\n@Autowired\nprivate TweetService\
    \ tweetService;\n@Test\npublic void testGetTweets() throws TwitterException\n\
    {\nList tweets = tweetService.getLatestTweets();\nfor (String tweet : tweets)\n\
    {\nSystem.err.println(tweet);\n}\n}\n}\nListing 16-10.\nSpringbootTwitter4jDemoApplicationTest.java\n\
    ```\n\nNow when you run this JUnit test , you should be\nable to see the latest\
    \ tweets on your console output.\n\nSummary\n\nIn this chapter, you learned how\
    \ to create your own autoconfiguration\nclasses and your own Spring Boot Starter.\
    \ In the next chapter, you will\nlearn how to develop Spring Boot applications\
    \ using JVM languages like\nGroovy, Scala, and Kotlin.\n\n17. Spring Boot with\
    \ Groovy, Scala,\nand Kotlin\n\nJava is the most widely used programming language\
    \ that runs on Java\nVirtual Machine (JVM). There are many other JVM-based languages,\
    \ such as\nGroovy, Scala, JRuby, Jython, Kotlin, etc. Among them, Groovy and Scala\n\
    are widely adopted and very popular among the Java community and Kotlin\nadoption\
    \ is growing very rapidly.\n\nSpring Boot is a Java-based framework that can also\
    \ be used with other\nJVM-based languages. This chapter looks at how to use Spring\
    \ Boot with\nthe Groovy, Scala, and Kotlin programming languages.\n\nUsing Spring\
    \ Boot with Groovy\n\nGroovy is a dynamically typed language that runs on JVM.\
    \ As Groovy’s\nsyntax is very close to Java’s, it is very easy for Java developers\
    \ to\nget started with Groovy. Spring Boot applications can be developed using\n\
    the Groovy programming language.\n\nIntroducing Groovy\n\nGroovy is a JVM-based\
    \ programming language with Java-like syntax. But\nGroovy supports dynamic typing,\
    \ closures, meta-programming, operator\noverloading, and more. In addition to\
    \ these, Groovy provides many cool\nfeatures, such as multi-line strings, string\
    \ interpolation, elegant\nlooping structures, and easy property access. Also,\
    \ semicolons are\noptional. These all help to improve developer productivity.\n\
    \nGroovy Strings\n\nYou can create strings in Groovy using either single quotes\
    \ or double\nquotes. When using\n single quotes, the string is treated as an instance\
    \ of `java.lang.String`,\nwhereas when using double quotes, it is treated as an\
    \ instance of `groovy.lang.Gstring`,\nwhich supports string interpolation.\n\n\
    ```\ndef name = \"John\"\ndef amount = 125\nprintln('My name is ${name}')\nprintln(\"\
    My name is ${name}\")\nprintln(\"He paid \\$${amount}\")\n```\n\nWhen you run\
    \ this code, it will print the following output:\n\n```\nMy name is ${name}\n\
    My name is John\nHe paid $125\n```\n\nAs single quotes are used in the first `println()`\
    \ statement , `${name}` is printed as\nit is, whereas it is interpolated in the\
    \ second `println()` statement\nbecause double quotes are used there. This code\
    \ also uses the escape\ncharacter `\\$` to\nprint the `$`\nsymbol.\n\nGroovy supports\
    \ multi-line strings using triple quotes (`\"\"\"` or `'''`) as follows:\n\n```\n\
    //using single quotes\ndef content = '''My Name is John.\nI live in London.\n\
    I am a software developer'''\ndef name = 'John'\ndef address = 'London'\ndef occupation\
    \ = 'software developer'\n//using double quotes\ndef bio = \"\"\"My name is ${name}.\n\
    I live in ${address}.\nI am a ${occupation}.\"\"\"\n```\n\nGroovy’s multi-line\
    \ supports come in very handy while creating strings\nthat span multiple lines,\
    \ like table creation scripts, HTML templates\nwith placeholders, etc.\n\nJavaBean\
    \ \nProperties\n\nIn Java, you usually create Java beans by creating private properties\n\
    and setters and getters for those properties. Although you can generate\nthe setters\
    \ and getters using IDE support, it is verbose and unnecessary\nnoisy.\n\nIn Groovy,\
    \ you can create beans just by declaring the properties and\nthen access them\
    \ using the `object.propertyName`\nsyntax without having to create setters and\
    \ getters.\n\n```\nclass Person\n{\ndef id\ndef name\ndef email\n}\ndef p = new\
    \ Person()\np.id = 1\np.name = 'Jon'\np.email = 'john@mail.com'\nprintln(\"Id:\
    \ ${p.id}, Name: ${p.name}, Email: ${p.email}\")\n```\n\nHere, you can  see\n\
    that the values are assigned to the bean properties directly, like `p.id=1`, without\n\
    having to create a setter for `id`. Similarly, you\ncan read the property `id`\
    \ using `p.id`, without\nrequiring a getter for `id`. Behind the\nscenes, Groovy\
    \ will generate setters and getters for the properties.\n\nLooping\n\nGroovy supports\
    \ a variety of looping structures  in\naddition to the regular `while` and `for`\
    \ loops.\n\nIterate using the range operator (`..`):\n\n```\nfor(i in 0..5) {\
    \ print \"${i}\" }\n```\n\nThe output is as follows:\n\n```\n0 1 2 3 4 5\n```\n\
    \nIterate using `upto()` with the lower\nand upper limits inclusive:\n\n```\n\
    0.upto(3) { print \"$it \" }\n```\n\nThe output is as follows:\n\n```\n0 1 2 3\n\
    ```\n\nIterate using `times()`, starting\nfrom `0`:\n\n```\n5.times { print \"\
    $it \" }\n```\n\nThe output is as follows:\n\n```\n0 1 2 3 4\n```\n\nIterate using\
    \ `step()` with the lower\nand upper limits and a step value:\n\n```\n0.step(10,\
    \ 2) { print \"$it \"}\n```\n\nThe output is as follows:\n\n```\n0 2 4 6 8\n```\n\
    \nThere are many other features provided by Groovy that help you build the\napplication\
    \ faster:\n\n*   Working with collections— [`http://docs.groovy-lang.org/latest/html/documentation/#_working_with_collections`](http://docs.groovy-lang.org/latest/html/documentation/#_working_with_collections)\
    \ \n\n*   Closures— [`http://groovy-lang.org/closures.html`](http://groovy-lang.org/closures.html)\
    \ \n\n*   Regular expressions— [`http://docs.groovy-lang.org/latest/html/documentation/#_regular_expression_operators`](http://docs.groovy-lang.org/latest/html/documentation/#_regular_expression_operators)\
    \ \n\n*   Traits— [`http://docs.groovy-lang.org/latest/html/documentation/#_traits`](http://docs.groovy-lang.org/latest/html/documentation/#_traits)\
    \ \n\n*   Groovy truth— [`http://docs.groovy-lang.org/latest/html/documentation/#Groovy-Truth`](http://docs.groovy-lang.org/latest/html/documentation/#Groovy-Truth)\
    \ \n\n*   Typing— [`http://docs.groovy-lang.org/latest/html/documentation/#_typing`](http://docs.groovy-lang.org/latest/html/documentation/#_typing)\
    \ \n\n*   Parsing and producing JSON— [`http://groovy-lang.org/json.html`](http://groovy-lang.org/json.html)\
    \ \n\n*   Processing XML— [`http://docs.groovy-lang.org/latest/html/documentation/#_processing_xml`](http://docs.groovy-lang.org/latest/html/documentation/#_processing_xml)\
    \ \n\n*   Meta programming— [`http://docs.groovy-lang.org/latest/html/documentation/#_metaprogramming`](http://docs.groovy-lang.org/latest/html/documentation/#_metaprogramming)\
    \ \n\nTo learn more about\n Groovy, refer to the official documentation at: [`http://groovy-lang.org/documentation.html`](http://groovy-lang.org/documentation.html)\
    \ .\n\nCreating a Spring Boot Application Using Groovy\n\nYou can create a Spring\
    \ Boot application using Groovy either from the\nIDE or using the online Spring\
    \ Boot application generator [ `http://start.spring.io`\n](http://start.spring.io)\
    \ and selecting Groovy as the language.\n\nIf you are using the Maven build tool,\
    \ `gmavenplus-plugin` is\nconfigured to compile Groovy code. You can put the Groovy\
    \ main source\ncode in the `src/main/groovy`\nfolder and then test the Groovy\
    \ code in the `src/test/groovy`\nfolder. See Listing [17-1](#A447991_1_En_17_Chapter.html#Par47).\n\
    \n```\n\n4.0.0\ncom.apress\nspringboot-groovy-demo\n0.0.1-SNAPSHOT\njar\nspringboot-groovy-demo\n\
    \norg.springframework.boot\nspring-boot-starter-parent\n2.0.0.BUILD-SNAPSHOT\n\
    \nUTF-8\nUTF-8\n1.8\n\norg.springframework.boot\nspring-boot-starter-web\n\norg.codehaus.groovy\n\
    groovy\n\norg.springframework.boot\nspring-boot-starter-test\ntest\n\norg.springframework.boot\n\
    spring-boot-maven-plugin\n\norg.codehaus.gmavenplus\ngmavenplus-plugin\n1.5\n\n\
    addSources\naddTestSources\ngenerateStubs\ncompile\ntestGenerateStubs\ntestCompile\n\
    removeStubs\nremoveTestStubs\n\n...\n...\n\n...\n...\n\nListing 17-1.\npom.xml\n\
    ```\n\nIf you selected Gradle as the build tool, the `groovy` plugin will be\n\
    configured, as shown in Listing [17-2](#A447991_1_En_17_Chapter.html#Par49).\n\
    \n```\n...\n...\napply plugin: 'groovy'\napply plugin: 'org.springframework.boot'\n\
    apply plugin: 'io.spring.dependency-management'\n...\n...\ndependencies {\ncompile('org.springframework.boot:spring-boot-starter-web')\n\
    compile('org.codehaus.groovy:groovy')\ntestCompile('org.springframework.boot:spring-boot-starter-test')\n\
    }\nListing 17-2.\nbuild.gradle\n```\n\nYou’ll now see how to develop a simple\
    \ Spring Boot web application using\nGroovy, Spring Data JPA, and Thymeleaf. Add\
    \ the Web, Thymeleaf, JPA, and\nH2 starters dependencies to your application.\n\
    \nCreate a JPA entity called `User.groovy`, as shown\nin Listing [17-3](#A447991_1_En_17_Chapter.html#Par52).\n\
    \n```\nimport javax.persistence.*\n@Entity\n@Table(name=\"users\")\nclass User\
    \ {\n@Id @GeneratedValue(strategy = GenerationType.AUTO)\nLong id\nString name\n\
    String email\n}\nListing 17-3.\nUser.groovy\n```\n\nAs you are using Groovy, you\
    \ don’t need to create setters and getters\nfor your entity properties.\n\nCreate\
    \ a Spring Data JPA repository for the `User` entity, as shown\nin Listing [17-4](#A447991_1_En_17_Chapter.html#Par55).\n\
    \n```\ninterface UserRepository extends JpaRepository\n{\nUser findByEmail(String\
    \ email);\n}\nListing 17-4.\nUserRepository.groovy\n```\n\nCreate a SpringMVC\
    \ controller to show the list of users, as shown in\nListing [17-5](#A447991_1_En_17_Chapter.html#Par57).\n\
    \n```\nimport org.springframework.beans.factory.annotation.Autowired\nimport org.springframework.stereotype.Controller\n\
    import org.springframework.ui.Model\nimport org.springframework.web.bind.annotation.GetMapping\n\
    @Controller\nclass HomeController\n{\n@Autowired\nUserRepository repo;\n@GetMapping(\"\
    /\")\nString home(Model model) {\nmodel.addAttribute(\"users\", repo.findAll())\n\
    \"home\"\n}\n}\nListing 17-5.\nHomeController.groovy\n```\n\nIn Groovy, the last\
    \ statement in the method is treated as a returned\nvalue, so you can just mention\
    \ `\"home\"` instead of\n`return \"home\"`.\n\nCreate the Thymeleaf view `home.html`\
    \ to render\nusers, as shown in Listing [17-6](#A447991_1_En_17_Chapter.html#Par60).\n\
    \n```\n\nUsers List\n\nId\nName\n\nId\nName\n\nListing 17-6.\nsrc/main/resources/templates/home.html\n\
    ```\n\nWhen you generate the application, the main entry point class is\ncreated,\
    \ as shown in Listing [17-7](#A447991_1_En_17_Chapter.html#Par62).\n\n```\nimport\
    \ org.springframework.boot.SpringApplication\nimport org.springframework.boot.autoconfigure.SpringBootApplication\n\
    @SpringBootApplication\nclass SpringbootGroovyDemoApplication {\nstatic void main(String[]\
    \ args) {\nSpringApplication.run SpringbootGroovyDemoApplication, args\n}\n}\n\
    Listing 17-7.\nSpringbootGroovyDemoApplication.groovy\n```\n\nInitialize the database\
    \ with sample data using a SQL script, as shown in\nListing [17-8](#A447991_1_En_17_Chapter.html#Par64).\n\
    \n```\ninsert into users(id, name, email) values\n(1,'admin','admin@gmail.com'),\n\
    (2,'john','john@gmail.com'),\n(3,'test','test@gmail.com');\nListing 17-8.\nsrc/main/resources/data.sql\n\
    ```\n\nNow you can run the application by  executing the `SpringbootGroovyDemoApplication.main()`\n\
    method or using the `mvn spring-boot:run`\nor `gradle bootRun` commands. If you\
    \ point your browser to `http://localhost:8080/`,\nyou should be able to see user\
    \ details.\n\nUsing Spring Boot with Scala\n\nScala is one of the most popular\
    \ JVM-based programming languages. It\nmixes functional programming and object\
    \ oriented programming idioms into\na single language.\n\nSpring Initializer (\
    \ [`http://start.spring.io`](http://start.spring.io) ) doesn’t provide support\
    \ for Scala yet, but you can\ncreate Spring Boot applications using the Scala\
    \ programming language by\nconfiguring appropriate plugins based on the build\
    \ tool you are using.\n\nIntroducing Scala\n\nScala is a JVM-based statically\
    \ typed programming language that supports\nboth the functional programming and\
    \ object oriented programming\nparadigms. You can write programs in Scala in a\
    \ concise and expressive\nmanner instead of using the verbose and imperative style\
    \ of coding.\n\nThe next few sections look at a few of the Scala features that\
    \ are\nslightly different from Java.\n\nType Inference\n\nIn Scala, a variable\
    \ declaration  syntax\nlooks like `var variable_name : data_type = value`. But\
    \ Scala can infer the data\ntype of the variable based on the assigned value.\
    \ That means you can\nomit the `:data_type` part in\nthe declaration.\n\n```\n\
    var n : Int = 5 //with explicit type declaration\nvar n = 5 //with type inference\n\
    ```\n\nClasses and Objects\n\nThe classes in Scala are similar to Java and can\
    \ contain variables,\nmethods, etc. But in Scala, a class can contain one primary\
    \ constructor\nand zero or more auxiliary constructors. The auxiliary constructors\n\
    should invoke primary constructors directly or through another auxiliary\nconstructor.\n\
    \n```\nclass Person (val firstName: String, val lastName: String){\ndef this(firstName:\
    \ String) { this(firstName, \"\")}\n}\nobject Main extends App {\nval p1 = new\
    \ Person(\"Siva\",\"Prasad\")\nval p2 = new Person(\"Siva\")\n}\n```\n\nIn Scala,\
    \ there is no concept  of `static`. If you want\nto mimic the behavior of `static`\
    \ in Scala, you\ncreate a companion object with\nthe same name as the class and\
    \ put all the members, including  properties\nand methods, in there. The object\
    \ in Scala is a singleton and you can\naccess members without creating an instance\
    \ of it.\n\n```\nclass StringUtils {}\nobject StringUtils {\ndef toUpper(str :\
    \ String): String = {\nreturn str.toUpperCase()\n}\n}\nval str = \"john\"\nprintln(StringUtils.toUpper(str))\n\
    ```\n\nTraits\n\nTraits in Scala are similar  to Java 8\ninterfaces, which encapsulate\
    \ fields, methods, and abstract methods.\nClasses can extend any number of traits.\n\
    \n```\ntrait ReportSender {\ndef sendReport(report: String): Unit = {\n//send\
    \ email with report content\n}\ndef generateReport() : String\n}\nclass HTMLReportSender\
    \ extends ReportSender {\noverride def generateReport(): String = \"ReportData\"\
    \n}\n```\n\nTo learn more about Scala, refer to Scala’s official documentation\
    \ at:\n [`http://docs.scala-lang.org/index.html`](http://docs.scala-lang.org/index.html)\
    \ .\n\nCreating a Spring Boot Application Using Scala\n\nYou can develop Spring\
    \ Boot applications using the Scala programming\nlanguage. If you want to use\
    \ Maven as a build tool, you can use `scala-maven-plugin` to\ncompile your Scala\
    \ code. You can place the main Scala code in `src/main/scala` and\nthe test Scala\
    \ code in the `src/test/scala`\nfolder. See Listing [17-9](#A447991_1_En_17_Chapter.html#Par80).\n\
    \n```\n\n4.0.0\ncom.apress\nspringboot-scala-demo\n0.0.1-SNAPSHOT\njar\nspringboot-scala-demo\n\
    \norg.springframework.boot\nspring-boot-starter-parent\n2.0.0.BUILD-SNAPSHOT\n\
    \ntrue\nUTF-8\nUTF-8\n1.8\n2.11.1\n\norg.scala-lang\nscala-library\n${scala.version}\n\
    \norg.springframework.boot\nspring-boot-starter-test\ntest\n\nsrc/main/scala\n\
    src/test/scala\n\norg.springframework.boot\nspring-boot-maven-plugin\n\nnet.alchim31.maven\n\
    scala-maven-plugin\n3.2.1\n\ncompile\ntestCompile\n\n-Xms64m\n-Xmx1024m\n\n...\n\
    ...\n\n...\n...\n\nListing 17-9.\npom.xml\n```\n\nNote that this code adds `src/main/scala`\
    \ and\n`src/test/scala`\nfolders as source folders using the `<sourceDirectory>`\n\
    and `<testSourceDirectory>`\nconfigurations. It also adds the `scala-library`\n\
    dependency to use Scala.\n\nIf you want to use the Gradle build tool, you can\
    \ use the `scala` plugin, which\nautomatically uses the `src/main/scala` and\n\
    `src/test/scala`\nfolders as Scala source code directories. See Listing [17-10](#A447991_1_En_17_Chapter.html#Par83).\n\
    \n```\napply plugin: 'java'\napply plugin: 'scala'\napply plugin: 'application'\n\
    apply plugin: 'org.springframework.boot'\napply plugin: 'io.spring.dependency-management'\n\
    mainClassName = 'com.apress.demo.Application'\n...\n...\ndependencies {\n...\n\
    ...\ncompile('org.scala-lang:scala-library:2.11.1')\n...\n...\n}\nListing 17-10.\n\
    build.gradle\n```\n\nNow you’ll see how to develop a simple web application using\
    \ Spring Boot\nand Scala. Add the Web, Spring Data JPA, Thymeleaf, and H2 starter\n\
    dependencies.\n\nCreate a JPA entity called `User.scala`, as shown\nin Listing\
    \ [17-11](#A447991_1_En_17_Chapter.html#Par86).\n\n```\nimport javax.persistence._\n\
    import scala.beans.BeanProperty\n@Entity\n@Table(name=\"users\")\nclass User {\n\
    @Id\n@GeneratedValue(strategy = GenerationType.AUTO)\n@BeanProperty\nvar id: Long\
    \ = _\n@BeanProperty\nvar name: String = _\n@BeanProperty\nvar email: String =\
    \ _\n}\nListing 17-11.\nUser.scala\n```\n\nYou are using the `@BeanProperty` to\n\
    generate setters and getters for fields based on the JavaBean naming\nconventions.\n\
    \nNow you’ll see how to create the Spring Data JPA repository for the\n`User`\
    \ entity. As\nScala doesn’t have interfaces, you are going to create `UserRepository`\
    \ as a\ntrait, as shown in Listing [17-12](#A447991_1_En_17_Chapter.html#Par89).\n\
    \n```\nimport org.springframework.data.jpa.repository.JpaRepository\nimport org.springframework.data.repository.query.Param\n\
    trait UserRepository extends JpaRepository[User, java.lang.Long] {\ndef findByEmail(@Param(\"\
    email\") name: String): List[User]\n}\nListing 17-12.\nUserRepository.scala\n\
    ```\n\nYou will create a Spring MVC controller to show the list of users, as\n\
    shown in Listing [17-13](#A447991_1_En_17_Chapter.html#Par91).\n\n```\nimport\
    \ org.springframework.beans.factory.annotation.Autowired\nimport org.springframework.stereotype.Controller\n\
    import org.springframework.ui.Model\nimport org.springframework.web.bind.annotation.{GetMapping}\n\
    @Controller\nclass HomeController\n{\n@Autowired\nvar repo: UserRepository = _\n\
    @GetMapping(Array(\"/\"))\ndef home(model: Model) : String = {\nmodel.addAttribute(\"\
    users\", repo.findAll())\n\"home\"\n}\n}\nListing 17-13.\nHomeController.scala\n\
    ```\n\nYou can use the same `home.html` Thymeleaf\ntemplate you created for the\
    \ Groovy sample application. Next, you are\ngoing to create the application main\
    \ entry point class. As Scala doesn’t\nsupport static methods, you have to create\
    \ a companion object and write\nthe `main()`\nmethod, as shown in Listing [17-14](#A447991_1_En_17_Chapter.html#Par93).\n\
    \n```\nimport org.springframework.boot.SpringApplication\nimport org.springframework.boot.autoconfigure.SpringBootApplication\n\
    @SpringBootApplication\nclass Application {\n}\nobject Application {\ndef main(args:\
    \ Array[String]) : Unit = {\nSpringApplication.run(classOf[Application], args:_*)\n\
    }\n}\nListing 17-14.\nApplication.scala\n```\n\nNow you can run `Application.main()`,\n\
    which starts \nyour Spring Boot application and accesses it at `http://localhost:8080/`.\n\
    This shows a list of users.\n\nUsing Spring Boot with Kotlin\n\nSpring Boot officially\
    \ supports the Kotlin programming language and you\ncan create Spring Boot applications\
    \ using Kotlin from Spring Initializer\nat [ `http://start.spring.io`\n](http://start.spring.io)\
    \ or from your IDE. Kotlin support is introduced in the\nnew Spring Framework\
    \ 5 release. You can read more about it at [`https://spring.io/blog/2017/01/04/introducing-kotlin-support-in-spring-framework-5-0`](https://spring.io/blog/2017/01/04/introducing-kotlin-support-in-spring-framework-5-0)\
    \ .\n\nIntroducing Kotlin\n\nKotlin ( [`https://kotlinlang.org/`](https://kotlinlang.org/)\
    \ ) is a JVM-based statically typed programming language\ncreated by JetBrains.\
    \ One of the key goals of Kotlin is to be\ninteroperable with Java so that you\
    \ can use Java and Kotlin together in\nthe same project.\n\nHere’s how you write\
    \ a simple Hello World program  in\nKotlin.\n\n```\npackage demo\nfun main(args:\
    \ Array){\nprintln(\"Hello World\");\n}\n```\n\nIn Kotlin, there are no static\
    \ methods like in Java, so you can write\nthose methods that you want to be static\
    \ as top-level functions.\n\nClasses\n\nClasses  in\nKotlin are similar to Scala\
    \ classes in that they have a class name with\none primary constructor and one\
    \ or more secondary constructors.\n\n```\nclass Person(val firstname: String,val\
    \ lastname: String) {\nconstructor(name: String) : this(name, \"\")\nfun printDetails()\
    \ = println(\"FirstName: ${firstname}, LastName: ${lastname}\")\n}\n```\n\nInterfaces\n\
    \nInterfaces in Kotlin are similar  to Java 8\ninterfaces in that they can have\
    \ abstract method declarations as well as\nimplemented methods.\n\n```\ninterface\
    \ ReportSender\n{\nfun generateReport() : String\nfun sendReport() {\nval report\
    \ = generateReport()\nprintln(\"Report: \"+ report)\n//send email with report\
    \ content\n}\n}\nclass HTMLReportSender : ReportSender\n{\noverride fun generateReport():\
    \ String = \"ReportData\"\n}\nfun main(args: Array)\n{\nval rs = HTMLReportSender()\n\
    rs.sendReport()\n}\n```\n\nData Classes\n\nIn Java, you usually\n create data\
    \ holder classes as POJOs (plain old Java objects)\nwith just private properties\
    \ and setters and getters. Then you implement\nthe `equals()`,\n`hashCode()`,\
    \ and\n`toStirng()`\nmethods. Kotlin makes creating such classes very easy by\
    \ using data classes.\n\n```\ndata class Person(val name: String, val email: String)\n\
    ```\n\nJust by declaring a class as a data class, the Kotlin compiler will\nautomatically\
    \ generate the `equals()`, `hashCode()`, and `equals()` methods.\n\nYou can learn\
    \ more about Kotlin at [`https://kotlinlang.org/docs/reference/`](https://kotlinlang.org/docs/reference/)\
    \ .\n\nCreating a Spring Boot Application Using Kotlin\n\nYou can create Spring\
    \ Boot applications using Kotlin from the IDE or\nfrom [ `http://start.spring.io`\n\
    ](http://start.spring.io) by selecting Kotlin as the language of choice.\n\nIf\
    \ you are using the Maven build tool, `kotlin-maven-plugin`\nwill be configured\
    \ to use `src/main/kotlin` and\n`src/test/kotlin`\nas the main and test source\
    \ code folders, respectively. See Listing\n[17-15](#A447991_1_En_17_Chapter.html#Par110).\n\
    \n```\n\n4.0.0\ncom.apress\nspringboot-kotlin-demo\n0.0.1-SNAPSHOT\njar\nspringboot-kotlin-demo\n\
    \norg.springframework.boot\nspring-boot-starter-parent\n2.0.0.BUILD-SNAPSHOT\n\
    \ntrue\nUTF-8\nUTF-8\n1.8\n1.1.2-5\n\n...\n...\n\norg.jetbrains.kotlin\nkotlin-stdlib-jre8\n\
    ${kotlin.version}\n\norg.jetbrains.kotlin\nkotlin-reflect\n${kotlin.version}\n\
    \n...\n...\n\n${project.basedir}/src/main/kotlin\n${project.basedir}/src/test/kotlin\n\
    \norg.springframework.boot\nspring-boot-maven-plugin\n\nkotlin-maven-plugin\n\
    org.jetbrains.kotlin\n${kotlin.version}\n\nspring\n\n1.8\n\ncompile\ncompile\n\
    \ncompile\n\ntest-compile\ntest-compile\n\ntest-compile\n\norg.jetbrains.kotlin\n\
    kotlin-maven-allopen\n${kotlin.version}\n\n...\n\n...\n\nListing 17-15.\npom.xml\n\
    ```\n\nNote that the Kotlin library dependencies `kotlin-stdlib-jre8`\nand `kotlin-reflect`\
    \ are\nalso added. With this configuration, you can place your Kotlin source\n\
    code in `src/main/kotlin`,\nwhich will be automatically compiled using the Kotlin\
    \ compiler.\n\nIf you are using the Gradle build tool, the `build.gradle` file\n\
    will be generated, as shown in Listing [17-16](#A447991_1_En_17_Chapter.html#Par113).\n\
    \n```\nbuildscript {\next {\nkotlinVersion = '1.1.2-4'\nspringBootVersion = '2.0.0.BUILD-SNAPSHOT'\n\
    }\nrepositories {\nmavenCentral()\nmaven { url \"https://repo.spring.io/snapshot\"\
    \ }\nmaven { url \"https://repo.spring.io/milestone\" }\n}\ndependencies {\nclasspath(\"\
    org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}\")\nclasspath(\"\
    org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}\")\nclasspath(\"org.jetbrains.kotlin:kotlin-allopen:${kotlinVersion}\"\
    )\n}\n}\napply plugin: 'kotlin'\napply plugin: 'kotlin-spring'\napply plugin:\
    \ 'eclipse'\napply plugin: 'org.springframework.boot'\napply plugin: 'io.spring.dependency-management'\n\
    version = '0.0.1-SNAPSHOT'\nsourceCompatibility = 1.8\ncompileKotlin {\nkotlinOptions.jvmTarget\
    \ = \"1.8\"\n}\ncompileTestKotlin {\nkotlinOptions.jvmTarget = \"1.8\"\n}\n...\n\
    ...\ndependencies {\n...\ncompile(\"org.jetbrains.kotlin:kotlin-stdlib-jre8:${kotlinVersion}\"\
    )\ncompile(\"org.jetbrains.kotlin:kotlin-reflect:${kotlinVersion}\")\n...\n}\n\
    Listing 17-16.\nbuild.gradle\n```\n\nThe Spring framework needs configuration\
    \ classes (classes annotated with\n`@Configuration`,\n`@Service`, `@Component`,\
    \ `@Repository`, etc.) to\nbe non-final so that it can create CGLIB proxies. But\
    \ Kotlin classes are\nfinal by default. If you want to make a class non-final\
    \ in Kotlin, you\nneed to add the `open` modifier to the\nclass.\n\n```\nopen\
    \ class Application {\n}\n```\n\nAs this is a common requirement to be interoperable\
    \ with many Java-based\nframeworks, Kotlin provides the `all-open` compiler\n\
    plugin, which allows you to specify a list of annotations and make the\nclasses\
    \ with those annotations open by default. Then you don’t have to\nmanually add\
    \ the `open` modifier.\n\nThe `spring`\nplugin opens classes annotated with Spring\
    \ annotations—such as `@Component`, `@Async`, `@Transactional`, and\n`@Cacheable`—automatically.\n\
    As other Spring annotations—such as `@Configuration`, `@Controller`, `@RestController`,\n\
    `@Service`, and\n`@Repository`—are\nmeta-annotated with the `@Component`\nannotation,\
    \ these classes will also be opened automatically. When you\ngenerate a Spring\
    \ Boot application with Kotlin from the Spring\nInitializer, the `kotlin-spring`\
    \ plugin\nis configured by default.\n\nNow you’ll see how to develop a simple\
    \ web application with Spring Boot\nand Kotlin. Add the Web, Spring Data JPA,\
    \ and Thymeleaf starter\ndependencies.\n\nCreate a JPA entity called `User`, as\
    \ shown in\nListing [17-17](#A447991_1_En_17_Chapter.html#Par120).\n\n```\nimport\
    \ javax.persistence.*\n@Entity\n@Table(name=\"users\")\nclass User(\n@Id @GeneratedValue(strategy\
    \ = GenerationType.AUTO)\nvar id: Long = -1,\nvar name: String = \"\",\nvar email:\
    \ String = \"\"\n) {\noverride fun toString(): String {\nreturn \"User(id=$id,\
    \ name='$name', email='$email')\"\n}\n}\nListing 17-17.\nUser.kt\n```\n\nJPA entities\
    \ should have a default constructor. One option is to have a\n`User` entity\n\
    with a primary constructor using the `var` type properties\nwith their default\
    \ values. Another option is to create a `no-arg` default\nconstructor as a secondary\
    \ constructor and pass default values to the\nprimary constructor.\n\nNote\n\n\
    You can also use `kotlin-jpa plugin` to\ngenerate a `no-arg` constructor\nfor\
    \ JPA entities. Refer to [ `https://kotlinlang.org/docs/reference/compiler-plugins.html#kotlin-jpa-compiler-plugin`\n\
    ](https://kotlinlang.org/docs/reference/compiler-plugins.html#kotlin-jpa-compiler-plugin)\
    \ for more information.\n\nListing [17-18](#A447991_1_En_17_Chapter.html#Par124)\
    \ shows you\nhow to create a Spring Data JPA repository for the `User` entity.\n\
    \n```\nimport org.springframework.data.jpa.repository.JpaRepository\ninterface\
    \ UserRepository : JpaRepository {\nfun findByEmail(email: String): Iterable\n\
    }\nListing 17-18.\nUserRepository.kt\n```\n\nCreate a SpringMVC controller to\
    \ display the list of users, as shown in\nListing [17-19](#A447991_1_En_17_Chapter.html#Par126).\n\
    \n```\nimport org.springframework.stereotype.Controller\nimport org.springframework.ui.Model\n\
    import org.springframework.web.bind.annotation.GetMapping\n@Controller\nclass\
    \ HomeController(val repository:UserRepository) {\n@GetMapping(\"/\")\nfun home(model:\
    \ Model): String {\nmodel.addAttribute(\"users\", repository.findAll())\nreturn\
    \ \"home\"\n}\n}\nListing 17-19.\nHomeController.kt\n```\n\nYou can reuse the\
    \ `home.html` Thymeleaf\ntemplate and `data.sql` script to\npopulate sample users\
    \ that you created in the previous section.\n\nFinally, create the main entry\
    \ point class, as shown in Listing [17-20](#A447991_1_En_17_Chapter.html#Par129).\n\
    \n```\nimport org.springframework.boot.SpringApplication\nimport org.springframework.boot.autoconfigure.SpringBootApplication\n\
    @SpringBootApplication\nclass SpringbootKotlinDemoApplication\nfun main(args:\
    \ Array) {\nSpringApplication.run(SpringbootKotlinDemoApplication::class.java,\
    \ *args)\n}\nListing 17-20.\nSpringbootKotlinDemoApplication.kt\n```\n\nThis code\
    \ creates the `main()` method  as a top-level\nfunction. Now if you run the `main()`\
    \ method, it\nwill start the application. You can then access `http://localhost:8080/`,\n\
    which shows the list of users.\n\nSummary\n\nThis chapter discussed how to a create\
    \ Spring Boot application using the\nJVM-based languages Groovy, Scala, and Kotlin.\
    \ In the next chapter, you\nwill learn about JHipster, which is a Yeoman-based\
    \ Spring Boot\napplication generator.\n\n18. Introducing JHipster\n\nJHipster\
    \ is a Yeoman-based generator that creates Spring Boot based web\napplications.\
    \ JHipster configures a wide variety of tools and frameworks\nthat are commonly\
    \ used in Spring Boot applications, which improves\ndeveloper productivity.\n\n\
    This chapter covers how to install JHipster and create a monolithic\napplication.\
    \ It explores the generated application features and looks at\nhow to create entities\
    \ using the sub-generator as well as JDL Studio.\n\nIntroducing JHipster\n\nTechnology\
    \ is evolving very rapidly and new tools, frameworks, and\nlibraries are being\
    \ created everyday. In recent years, there has been a\nlot of innovation in the\
    \ JavaScript ecosystem and lot of high-quality\nmodern web development tools were\
    \ born. There are build tools like\nGrunt, Gulp, Webpack, etc. There are Single\
    \ Page Application (SPA)\nframeworks like AngularJS, ReactJS, VueJS, etc. And\
    \ there are many\nJavaScript testing libraries like Mocha, Jasmine, Jest, etc.\
    \ Integrating\nall these tools manually is tedious and repetitive.\n\nYeoman (\
    \ [`http://yeoman.io/`](http://yeoman.io/) ) is a scaffolding tool that generates\
    \ web projects\nfollowing best practices. Yeoman provides various generators to\
    \ scaffold\nweb projects using various technologies. For example, if you want\
    \ to\ncreate an AngularJS 1.x based project, you can use `generator-angular`,\n\
    which will generate an AngularJS project with the Grunt build tool, with\nkarma\
    \ based testing support.\n\nJHipster ( [`https://jhipster.github.io/`](https://jhipster.github.io/)\
    \ ) is a Yeoman-based generator that generates Spring\nBoot based web projects\
    \ with a wide variety of options for building\ntools, front-end frameworks, relational\
    \ databases, NoSQL databases,\nSpring security strategies, caching options, and\
    \ more.\n\nWith JHipster you can generate Spring Boot applications with most of\
    \ the\nconfiguration configured properly and then start implementing the\nbusiness\
    \ use cases. JHipster also provides sub-generators to generate\nJPA entities and\
    \ scaffolding UI for typical CRUD (Create, Read, Update,\nDelete) operations,\
    \ which makes development faster.\n\nInstalling JHipster\n\nJHipster is a Yeoman-based\
    \ generator that depends on the NPM (Node\nPackage Manager). The next section\
    \ covers the prerequisites for using\nJHipster.\n\nPrerequisites \n\nFollow these\
    \ steps to install JHipster:\n\n1.  Install JDK 8.\n\n2.  Install Git from [`https://git-scm.com/`](https://git-scm.com/)\
    \ .\n\n3.  Install Node.js from [`https://nodejs.org/`](https://nodejs.org/) .\n\
    \n4.  You can use NPM or Yarn to install JHipster. These examples use Yarn.\n\
    \    You install Yarn from [`https://yarnpkg.com/`](https://yarnpkg.com/) .\n\n\
    5.  Install Yeoman using `yarn global add yo`.\n\n6.  If you want to use AngularJS\
    \ 1.x for the front-end, you need to install\n    `bower` and `gulp-cli`. If you\
    \ want\n    to use Angular 2.x onward, you don’t need to install them. The commands\n\
    \    are as follows:\n\n    *   `yarn global add bower`\n\n    *   `yarn global\
    \ add gulp-cli`\n\n7.  Install JHipster generator using `yarn global add generator-jhipster`.\n\
    \nNow you should be able to run `jhipster --help` and\nsee the various commands\
    \ that JHipster supports.\n\nCreating a JHipster Application\n\nCreating a JHipster\
    \ application is very easy; you simply run the `jhipster` command and\nanswer\
    \ the questions based on your technology’s preferences and\napplication’s needs.\
    \ JHipster can generate a monolithic application or a\nmicroservices based application.\n\
    \nIn this chapter, you are going to create a simple monolithic blog\napplication\
    \ and then use the relational database `H2` for development\nand `MySQL` for\n\
    production.\n\n```\n> mkdir jhipster-blog\n> cd jhipster-blog\n> jhipster\n```\n\
    \nThe `jhipster`\ncommand will ask you a series of questions. Select the options\
    \ shown\nhere:\n\n```\n? (1/16) Which *type* of application would you like to\
    \ create? Monolithic application (recommended for simple projects)\n? (2/16) What\
    \ is the base name of your application? jhipsterblog\n? (3/16) Would you like\
    \ to install other generators from the JHipster Marketplace? No\n? (4/16) What\
    \ is your default Java package name? com.apress.jhblog\n? (5/16) Do you want to\
    \ use the JHipster Registry to configure, monitor and scale your application?\
    \ No\n? (6/16) Which *type* of authentication would you like to use? JWT authentication\
    \ (stateless, with a token)\n? (7/16) Which *type* of database would you like\
    \ to use? SQL (H2, MySQL, MariaDB, PostgreSQL, Oracle, MSSQL)\n? (8/16) Which\
    \ *production* database would you like to use? MySQL\n? (9/16) Which *development*\
    \ database would you like to use? H2 with in-memory persistence\n? (10/16) Do\
    \ you want to use Hibernate 2nd level cache? Yes, with ehcache (local cache, for\
    \ a single node)\n? (11/16) Would you like to use Maven or Gradle for building\
    \ the backend? Maven\n? (12/16) Which other technologies would you like to use?\
    \ (Press  to select,  to toggle all,  to inverse selection)\n? (13/16) Which *Framework*\
    \ would you like to use for the client? [BETA] Angular 4\n? (14/16) Would you\
    \ like to use the LibSass stylesheet preprocessor for your CSS? No\n? (15/16)\
    \ Would you like to enable internationalization support? No\n? (16/16) Besides\
    \ JUnit and Karma, which testing frameworks would you like to use? (Press  to\
    \ select,  to toggle all,  to inverse selection)\n```\n\nBased on the options\
    \ selected here, JHipster will generate a Spring Boot\napplication with the following\
    \ features:\n\n*   Angular 4-based front-end with Webpack configuration\n\n* \
    \  `H2` in-memory\n    database used in development and `MySQL` used for\n   \
    \ production\n\n*   Liquibase migration support for database migrations\n\n* \
    \  Spring Data JPA configured for database interaction\n\n*   Caching support\
    \ is configured using EHCache\n\n*   Application is secured with Spring Security\
    \ JWT token based\n    authentication\n\n*   Provides an Administration dashboard\
    \ showing application metrics using\n    the Spring Boot Actuator\n\n*   Ability\
    \ to change log levels at runtime through UI\n\n*   Swagger-based REST API documentation\n\
    \n*   Provides a few user accounts out-of-the-box with Login, Change Password,\n\
    \    and New User Registration functionality\n\nNow you can run the application\
    \ by running `./mvnw` on Linux/MacOS\nor `mvnw.cmd` on\nWindows. This command\
    \ will start the application `dev` profile and is\naccessible at `http://localhost:8080/`.\n\
    Next, you’ll explore the generated application.\n\nAs shown on the home page,\
    \ you can log in with `admin/admin`, which\nhas both the `ROLE_USER` and `ROLE_ADMIN`\
    \ roles, or\nwith `user/user`,\nwhich has only the `ROLE_USER` role.\n\nLog in\
    \ as the `admin` user using\n`admin/admin`.\nAfter a successful login, you will\
    \ be redirected to the home page. The\ntop navigation bar includes the Entities,\
    \ Administration, and Account\nmenus. As you haven’t created any entities yet,\
    \ there won’t be any\nentities listed in the Entities menu.\n\nChoose Administration\
    \ ➤ Metrics to view the application metrics, such as\nmemory consumption, thread\
    \ states, garbage collection details, HTTP\nrequest statistics, etc., which are\
    \ provided by the Spring Boot Actuator\n(Figure [18-1](#A447991_1_En_18_Chapter.html#Fig1)).\
    \ You can also\nview cache statistics, datasource statistics, and service method\n\
    execution metrics provided by `GaugeService`.\n\n![A447991_1_En_18_Fig1_HTML.jpg](A447991_1_En_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1.\n\nJHipster metrics dashboard\n\nYou can also explore the Health\
    \ info, which shows the disk space and\ndatabase health information.\n\nYou can\
    \ explore Configuration, which shows the current running\napplication’s aggregated\
    \ configuration from the default YAML\nconfiguration files, profile-specific YAML\
    \ configuration files, system\nproperties, and more.\n\nYou can view the application\
    \ logger and its current log levels by\nchoosing Administration ➤ Logs. You can\
    \ search for loggers and change\nthe log level by clicking on the desired level.\n\
    \nYou can click on Administration ➤ Database to open the H2 in-memory\ndatabase\
    \ console, where you can explore the current state of the\ndatabase.\n\nThe JHipster\
    \ application is configured to capture events like\nauthentication for audit purposes.\
    \ You can view the audit log by\nchoosing Administration ➤ Audits.\n\nYou can\
    \ also manage the application’s users by clicking on\nAdministration ➤ User Management,\
    \ where you can perform CRUD operations\non users. See Figure [18-2](#A447991_1_En_18_Chapter.html#Fig2).\n\
    \n![A447991_1_En_18_Fig2_HTML.jpg](A447991_1_En_18_Fig2_HTML.jpg)\n\nFigure 18-2.\n\
    \nJHipster user management\n\nYou can view the Swagger\ndocumentation  \n for\
    \ the REST API by choosing Administration ➤ API. You can also\nview the Request\
    \ and Response formats for each endpoint and trigger REST\nAPI calls by providing\
    \ inputs if needed.\n\nCreating Entities\n\nOnce the application is created, you\
    \ may want to create entities and\nscaffold UI for that entity to perform CRUD\
    \ operations on it. JHipster\nprovides ways to create entities and perform the\
    \ following tasks:\n\n*   Create a JPA entity\n\n*   Create a database table based\
    \ on the properties information provided\n\n*   Create a Liquibase changeset for\
    \ database migration\n\n*   Create a Spring data JPA repository for the entity\n\
    \n*   Create a Spring MVC REST controller with basic CRUD operations\n\n*   Create\
    \ an Angular router, component, and service\n\n*   Create HTML views\n\n*   Generate\
    \ integration and performance tests\n\nYou can generate entities using the `jhipster\
    \ entity`\nsub-generator, the JHipster Domain Language (JDL) Studio, or the\n\
    JHipster UML ( [`https://jhipster.github.io/jhipster-uml/`](https://jhipster.github.io/jhipster-uml/)\
    \ ). The next section looks at how to use the JHipster\nentity sub-generator and\
    \ JDL Studio to generate entities.\n\nUsing the JHipster Entity Sub-Generator\n\
    \nYou can generate entities using the `jhipster`  `entity` sub-generator\n by\
    \ providing a table name and column details, as follows:\n\n```\njhipster entity\
    \ Post --table-name posts\n```\n\nThis command will ask whether you want to add\
    \ a field to your entity. In\nthis example, you’ll add three fields—`title`, `content`,\
    \ and `createdOn`—and specify\ntype and validation rules as follows:\n\n*   Name:\
    \ `title`,\n    Type: `String`,\n    Validation: Required\n\n*   Name: `content`,\n\
    \    Type: `String`,\n    Validation: Required\n\n*   Name: `createdOn`, Type:\n\
    \    `LocalDate`\n\nNext it will ask if you want to add a relationship to another\
    \ entity.\nAnswer no. You will learn how to manage relationships in the next\n\
    section.\n\nThe following questions will be asked; answer them as follows:\n\n\
    ```\n? Do you want to use a Data Transfer Object (DTO)? No, use the entity directly\n\
    ? Do you want to use separate service class for your business logic? No, the REST\
    \ controller should use the repository directly\n? Do you want pagination on your\
    \ entity? No\n```\n\nYou can choose to create Data Transfer Objects (DTOs), which\
    \ will be\nused to create a response for the REST API, but for now you can choose\n\
    to return entities. You can also choose to create a service layer to\nperform\
    \ any business logic, but you are choosing to directly use the\nSpring Data JPA\
    \ repositories because there is no business logic\ninvolved. Lastly, you can choose\
    \ whether you need pagination support or\nnot.\n\nAfter running the `jhipster\
    \ entity`\nsub-generator command successfully, you can run the application and\
    \ see\nthe `Post` menu\nitem in the Entities menu. You can perform the CRUD operations\
    \ on the\n`Post` entity.\n\nInstead of running the \n`entity` \nsub-generator\
    \ and answering all these questions, you can use JDL Studio\nto create entities.\n\
    \nUsing JDL Studio\n\nJDL Studio  is an\nonline utility that creates entities\
    \ and configures relationships among\nentities using the JHipster Domain Language\
    \ (JDL)\n. You can read about JDL at [`https://jhipster.github.io/jdl/`](https://jhipster.github.io/jdl/)\
    \ .\n\nIf you go to [`https://jhipster.github.io/jdl-studio/`](https://jhipster.github.io/jdl-studio/)\
    \ , a sample domain model is configured with various\nentity definitions and relationship\
    \ among those entities. Remove all of\nthat and add the `Post` entity\ndefinition\
    \ as follows:\n\n```\nentity Post {\ntitle String required\ncontent String required\n\
    createdOn LocalDate\n}\n```\n\nClick on the “Download Text File of This JDL” link\
    \ in the top-right\ncorner. The `jhipster-jdl.jh` file\nwill download. Now you\
    \ can run `jhipster import-jdl`\ncommand to create the entities from the JDL file.\n\
    \n```\n> jhipster import-jdl jhipster-jdl-file.jh\n```\n\nAfter running this command,\
    \ the `Post` entity, Spring\nData JPA repository, Spring MVC controller, Angular\
    \ front-end\ncomponents, and more, will be generated. If you already have a `Post`\
    \ entity, it will\nupdate the entity.\n\nManaging Relationships\n\nYou can use\
    \ the JHipster `entity` command not\nonly for creating entities but also to specify\
    \ relationships  among\nentities. For example, you can create a `Comment` entity,\
    \ then\nestablish a one-to-many\nrelationship from `Post` to `Comment` and a many-to-one\
    \ entity from `Comment` to `Post`.\n\nWhile creating the `Post` entity using the\n\
    `jhipster entity`\nsub-generator, you can specify the relationship to the `Comment`\
    \ entity as\nfollows:\n\n```\n> jhipster entity Post --table-name posts\n```\n\
    \nAs you already have a `Post` entity, it will\ndisplay options to regenerate,\
    \ add, and remove fields and relationships.\nChoose `Yes, add more fields and\
    \ relationships`.\n\n```\n? Do you want to add a field to your entity? No\n? Do\
    \ you want to add a relationship to another entity? Yes\n? What is the name of\
    \ the other entity? Comment\n? What is the name of the relationship? comments\n\
    ? What is the type of the relationship? one-to-many\n? What is the name of this\
    \ relationship in the other entity? post\n```\n\nNow you can generate a `Comment`\
    \ entity with\nthe `name, email, content`, and `createdOn` fields.\nWhen prompted\
    \ to add a relationship to another entity, you can add a\nmany-to-one relationship\
    \ from `Comment` to the `Post` entity as\nfollows:\n\n```\n? What is the name\
    \ of the other entity? Post\n? What is the name of the relationship? post\n? What\
    \ is the type of the relationship? many-to-one\n? When you display this relationship\
    \ with Angular, which field from 'Post' do you want to use? id\n? Do you want\
    \ to add any validation rules to this relationship? No\n```\n\nYou can use JDL\
    \ Studio to create  entities and\nspecify relationships among them as well. Configure\
    \ the `Post` and `Comment` entities and\nthe `OneToMany`\nrelationship as follows:\n\
    \n```\nentity Post {\ntitle String required\ncontent String required\ncreatedOn\
    \ LocalDate\n}\nentity Comment {\nname String required\nemail String required\n\
    content String required\ncreatedOn LocalDate\n}\nrelationship OneToMany {\nPost{comments}\
    \ to Comment{post}\n}\n```\n\nNow you can download this  JDL file and\nimport\
    \ it as you did earlier. This will create JPA entities and\nestablish JPA relationship\
    \ as follows:\n\n```\n@Entity\n@Table(name = \"post\")\n@Cache(usage = CacheConcurrencyStrategy.NONSTRICT_READ_WRITE)\n\
    public class Post implements Serializable {\n...\n...\n@OneToMany(mappedBy = \"\
    post\")\n@JsonIgnore\n@Cache(usage = CacheConcurrencyStrategy.NONSTRICT_READ_WRITE)\n\
    private Set comments = new HashSet();\n...\n...\n}\n@Entity\n@Table(name = \"\
    comment\")\n@Cache(usage = CacheConcurrencyStrategy.NONSTRICT_READ_WRITE)\npublic\
    \ class Comment implements Serializable {\n...\n...\n@ManyToOne\nprivate Post\
    \ post;\n}\n```\n\nJHipster scaffolding will generate a dropdown with `post`s\
    \ to select while\ncreating a comment.\n\nYou can read more about managing  relationships\n\
    at [`https://jhipster.github.io/managing-relationships/`](https://jhipster.github.io/managing-relationships/)\
    \ .\n\nBy default, when you run `./mvnw`, the\napplication will start in development\
    \ mode using the `dev` profile. If you\nwant to run the application in production\
    \ mode, you can run it using the\n`prod` profile,\nas in `./mvnw -Pprod`.\n\n\
    You can also generate a runnable WAR file using the `./mvnw -Pprod package`\n\
    command and run the application as follows:\n\n```\njava -jar jhipsterblog-0.0.1-SNAPSHOT.war\n\
    ```\n\nWhen you run the application in the production profile, various\noptimizations\
    \ will be performed. For example, static assets like HTML,\nJS, and CSS files\
    \ will be optimized and GZip compression will be\nconfigured.\n\nNote\n\nYou can\
    \ also use JHipster to generate Spring Boot-based microservices.\nTo learn how\
    \ to create microservices using JHipster, refer to [`https://jhipster.github.io/microservices-architecture`](https://jhipster.github.io/microservices-architecture)\
    \ .\n\nSummary\n\nIn this chapter, you learned how to use JHipster to generate\
    \ Spring\nBoot-based web applications with the Angular front-end. In the next\n\
    chapter, you will look at how to run applications in production and how\nto deploy\
    \ a Spring Boot application on the Heroku Cloud platform.\n\n19. Deploying Spring\
    \ Boot\nApplications\n\nSpring Boot supports embedded servlet containers, which\
    \ makes deploying\napplications much easier, because you don’t need an external\
    \ application\nserver setup. You can simply package your Spring Boot application\
    \ as a\nJAR module and run it using the `java -jar` command.\nHowever, you need\
    \ to consider a few things while running applications in\na production environment.\n\
    \nYou can use profiles to externalize configuration properties per\nenvironment\
    \ and run your application, activating desired profiles. But\nyou don’t want to\
    \ specify sensitive data in configuration properties and\ncommit it in the source\
    \ code. Spring Boot provides various mechanisms to\noverride the configuration\
    \ properties when starting the application.\n\nIn recent years, containerization\
    \ technologies like\nDocker have become a very popular way to run applications\
    \ in both\ndevelopment and production environments. In complex applications, you\n\
    may need to run multiple services like databases, search engines, log\nmonitoring\
    \ tools, etc. Installing all these services on the development\nenvironment is\
    \ tedious. You can use Docker to spin up multiple\ncontainers with all the required\
    \ services, without having to install all\nof them locally.\n\nThis chapter you\
    \ looks into how to run Spring Boot applications in\nproduction mode and how to\
    \ override configuration properties. You will\nalso look at deploying Spring Boot\
    \ applications on the Heroku Cloud\nplatform. Finally, you will learn about running\
    \ Spring Boot applications\non Docker containers.\n\nRunning Spring Boot Applications\
    \ in Production\nMode\n\nSpring Boot applications with JAR-type packaging are\
    \ self-contained\napplications that can run easily and don’t require any external\n\
    application server setup. Once the application is packaged as a JAR, you\ncan\
    \ simply run the application as follows:\n\n```\njava -jar app.jar\n```\n\nAs\
    \ discussed in Chapter [4](#A447991_1_En_4_Chapter.html), you can have multiple\
    \ profile\nconfiguration files, such as `application-qa.properties`\nand `application-prod.properties`,\n\
    and can activate the desired profiles using the `spring.profiles.active`\nsystem\
    \ property. Suppose you configured the datasource properties in the\n `dev` and\
    \ `prod` profile\nconfiguration files , as shown in Listing [19-1](#A447991_1_En_19_Chapter.html#Par8).\n\
    \n```\nspring.datasource.driver-class-name=com.mysql.jdbc.Driver\nspring.datasource.url=jdbc:mysql://localhost:3306/myapp\n\
    spring.datasource.username=root\nspring.datasource.password=admin\nListing 19-1.\n\
    src/main/resources/application-dev.properties\n```\n\nListing [19-1](#A447991_1_En_19_Chapter.html#Par8)\
    \ shows how to\nconfigure  your\nlocal MySQL server properties for the `dev` profile.\n\
    \n```\nspring.datasource.driver-class-name=com.mysql.jdbc.Driver\nspring.datasource.url=jdbc:mysql://prodmysqlsrv:3306/myapp\n\
    spring.datasource.username=appuser\nspring.datasource.password=S3*(Hi)@32vi\n\
    Listing 19-2.\nsrc/main/resources/application-prod.properties\n```\n\nListing\
    \ [19-2](#A447991_1_En_19_Chapter.html#Par10) configuration\nis pointing to remote\
    \ MySQL server properties for the `prod` profile.\n\nNow you can run the application\
    \ in production by activating the `prod` profile, as\nfollows:\n\n```\njava -jar\
    \ -Dspring.profiles.active=prod app.jar\n```\n\nSuppose you have Spring components\
    \ that should be activated only when\nyou’re running in a cloud environment. In\
    \ that case, you can activate\nmultiple profiles by specifying a comma-separated\
    \ list of profile names.\n\n```\njava -jar -Dspring.profiles.active=prod,cloud\
    \ app.jar\n```\n\nBy activating prod and cloud profiles, all the default profile\n\
    components (ie, components which are not associated to any specific\nenvironment)\
    \ and components associated with prod and cloud profiles will\nbe activated. But\
    \ you don’t want to configure sensitive information like\nactual production server\
    \ credentials in these properties files and\ncommit them to version control systems.\n\
    \nSpring Boot allows you to\n override the configuration parameters in various\
    \ ways. You can\noverride the properties using system properties as follows:\n\
    \n```\njava -jar -Dserver.port=8585 app.jar\n```\n\nBy specifying system properties,\
    \ even if you configure the `server.port` property\nin the `application-*.properties`\n\
    files, it will be overridden with `server.port=8585` and\nthe application will\
    \ start on port `8585`. Specifying a\nlong list of properties like this can be\
    \ cumbersome, so Spring Boot\nprovides another mechanism to override the properties.\n\
    \nYou can load the properties from multiple locations.  `SpringApplication`\n\
    \ will load properties from the `application-*.properties`\nfiles in the following\
    \ locations:\n\n*   A `/config`\n    subdirectory of the current directory\n\n\
    *   The current directory\n\n*   A classpath `/config` package\n\n*   The classpath\
    \ root\n\nThe properties  defined  in the top location take higher precedence\n\
    over the properties defined in lower locations.\n\nSuppose you have the `app.jar`\
    \ in the `/home/appserver/app1.0/`\ndirectory from which you run the application\
    \ using the `java -jar` command.\n\nNow you can create an `application-prod.properties`\n\
    file in the `/home/appserver/app1.0/config`\ndirectory, which overrides the properties\
    \ defined in the `application-prod.properties`\nfile in classpath. So you can\
    \ configure all the default properties in\nthe `src/main/resources/application-*.properties`\n\
    files and override them using the `config/application-*.properties`\nfile while\
    \ running the application.\n\nNote that you should not commit the `config/applzication-*.properties`\n\
    files into version control systems, as they contain sensitive\nconfiguration details.\n\
    \nSpring Boot also provides support for running applications as native\nexecutable\
    \ services on Unix-based systems or as a Windows service. For\nmore information\
    \ on installing Spring Boot applications as services,\nread [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#deployment-install`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#deployment-install)\
    \ .\n\nDeploying Spring Boot Application on Heroku\n\nHeroku ( [`https://www.heroku.com/`](https://www.heroku.com/)\
    \ ) is a platform as a service (PaaS) that enables\ndevelopers to build and run\
    \ applications in the cloud. Heroku supports a\nwide variety of programming languages,\
    \ including Ruby, Java, NodeJS,\nPython, PHP, Scala, and Go.\n\nIn this section,\
    \ you learn how to deploy a Spring Boot application on\nHeroku. First familiarize\
    \ yourself with Heroku by reading the “Getting\nStarted on Heroku with Java” guide\
    \ at: [`https://devcenter.heroku.com/articles/getting-started-with-java#introduction`](https://devcenter.heroku.com/articles/getting-started-with-java#introduction)\
    \ .\n\nCreate an account on Heroku and install the Heroku Toolbelt based on\n\
    your operating system.\n\nYou can create an application using the `heroku create`\n\
    command, which will automatically create a GIT remote (called `heroku`) and associate\n\
    it with your local GIT repository.\n\nAnother option is to host your application\
    \ code on a GitHub repository\nand link that repository to your Heroku application.\
    \ This chapter\nfollows the second approach.\n\n1.  Create a repository on GitHub.\n\
    \n    Create an account on GitHub, if you don’t have one, and create a\n    repository\
    \ named `springboot-heroku-demo.`\n    I created a repository at [`https://github.com/sivaprasadreddy/springboot-heroku-demo`](https://github.com/sivaprasadreddy/springboot-heroku-demo)\
    \ .\n\n2.  Create a Spring Boot application.\n\n    You are going to create a\
    \ simple Spring Boot application with the Web\n    and Data-JPA starters. You\
    \ are going to use the Postgres database, which\n    is a free add-on for your\
    \ application. See Listing [19-3](#A447991_1_En_19_Chapter.html#Par39).\n\n  \
    \  ```\n\n    4.0.0\n    com.apress\n    springboot-heroku-demo\n    1.0\n\n \
    \   org.springframework.boot\n    spring-boot-starter-parent\n    2.0.0.BUILD-SNAPSHOT\n\
    \n    1.8\n\n    ${project.artifactId}\n\n    org.springframework.boot\n    spring-boot-maven-plugin\n\
    \n    org.springframework.boot\n    spring-boot-starter-test\n    test\n\n   \
    \ org.springframework.boot\n    spring-boot-starter-web\n\n    org.springframework.boot\n\
    \    spring-boot-starter-thymeleaf\n\n    org.springframework.boot\n    spring-boot-starter-data-jpa\n\
    \n    com.h2database\n    h2\n\n    org.postgresql\n    postgresql\n\n    Listing\
    \ 19-3.\n    pom.xml\n    ```\n\n3.  Create a JPA entity and a Spring Data repository.\n\
    \n    Now you need to create a simple JPA entity called `User` and a Spring\n\
    \    Data JPA repository called `UserRepository`, as\n    shown in Listings [19-4](#A447991_1_En_19_Chapter.html#Par42)\
    \ and [19-5](#A447991_1_En_19_Chapter.html#Par43).\n\n    ```\n    @Entity\n \
    \   @Table(name=\"USERS\")\n    public class User\n    {\n    @Id\n    @GeneratedValue(strategy\
    \ = GenerationType.IDENTITY)\n    private long id;\n    private String name;\n\
    \    //setters & getters\n    }\n    Listing 19-4.\n    User.java\n    ```\n\n\
    \    ```\n    @Repository\n    public interface UserRepository extends JpaRepository\n\
    \    {\n    }\n    Listing 19-5.\n    UserRepository.java\n    ```\n\n4.  Configure\
    \ the datasource properties.\n\n    As you have the `H2` database driver in\n\
    \    the classpath, if you don’t configure any datasource properties, Spring\n\
    \    Boot will create an in-memory datasource. While running the application\n\
    \    locally, you can configure datasource properties by pointing to your\n  \
    \  local Postgres database in `src/main/resources/application-dev.properties`,\n\
    \    as shown in Listing [19-6](#A447991_1_En_19_Chapter.html#Par46).\n\n    ```\n\
    \    spring.datasource.url=jdbc:postgresql://localhost:5432/demodb\n    spring.datasource.driver-class-name=org.postgresql.Driver\n\
    \    spring.datasource.username=postgres\n    spring.datasource.password=secret123\n\
    \    spring.datasource.maxActive=10\n    spring.datasource.maxIdle=5\n    spring.datasource.minIdle=2\n\
    \    spring.datasource.initialSize=5\n    spring.datasource.removeAbandoned=true\n\
    \    spring.jpa.hibernate.ddl-auto=update\n    Listing 19-6.\n    src/main/resources/application-dev.properties\n\
    \    ```\n\n    But when deploying on Heroku, you have to use the Postgres database\n\
    \    provided by the Heroku platform. So you can configure the datasource\n  \
    \  properties in `src/main/resources/application-heroku.properties`,\n    as shown\
    \ in Listing [19-7](#A447991_1_En_19_Chapter.html#Par48), and enable\n    the\
    \ `heroku`\n    profile.\n\n    ```\n    spring.datasource.url=${JDBC_DATABASE_URL}\n\
    \    spring.datasource.driver-class-name=org.postgresql.Driver\n    spring.datasource.maxActive=10\n\
    \    spring.datasource.maxIdle=5\n    spring.datasource.minIdle=2\n    spring.datasource.initialSize=5\n\
    \    spring.datasource.removeAbandoned=true\n    spring.jpa.hibernate.ddl-auto=update\n\
    \    Listing 19-7.\n    src/main/resources/application-heroku.properties\n   \
    \ ```\n\n    `JDBC_DATABASE_URL` is\n    an environment variable that’s generated\
    \ dynamically by pointing to the\n    Postgres database server. You can check\
    \ the value of the `JDBC_DATABASE_URL`\n    environment variable by running the\
    \ following command:\n\n    ```\n    heroku run echo \\$JDBC_DATABASE_URL\n  \
    \  ```\n\n5.  Initialize the database with sample data. This example uses a SQL\
    \ script\n    to populate sample user data, as shown in Listing [19-8](#A447991_1_En_19_Chapter.html#Par52).\n\
    \n    ```\n    delete from users;\n    insert into users(id,name) values (1, 'Admin');\n\
    \    insert into users(id,name) values (2, 'Test');\n    Listing 19-8.\n    src/main/resources/data.sql\n\
    \    ```\n\n6.  Create a controller to display the users.\n\n    Listing [19-9](#A447991_1_En_19_Chapter.html#Par55)\
    \ shows how to\n    create a SpringMVC request handler method to display a list\
    \ of users.\n\n    ```\n    @Controller\n    public class HomeController\n   \
    \ {\n    private UserRepository repository;\n    @Autowired\n    public HomeController(UserRepository\
    \ repository) {\n    this.repository = repository;\n    }\n    @GetMapping(\"\
    /\")\n    public String home(Model model) {\n    List users = repository.findAll();\n\
    \    model.addAttribute(\"users\", users);\n    return \"home\";\n    }\n    }\n\
    \    Listing 19-9.\n    HomeController.java\n    ```\n\n7.  Create a Thymeleaf\
    \ view to render the users list, as shown in Listing\n    [19-10](#A447991_1_En_19_Chapter.html#Par550).\n\
    \n    ```\n\n    SpringBoot Heroku Demo\n\n    List of Users\n\n    user name\n\
    \n    Listing 19-10.\n    src/main/resources/templates/home.html\n    ```\n\n\
    8.  Create a `Procfile`.\n\nIn order to run an application on Heroku, you need\
    \ to create a `Procfile` in the root\ndirectory of the project. The `Procfile`\
    \ is a text\nfile that declares what command should be executed to start your\n\
    application. Add the command shown in Listing [19-11](#A447991_1_En_19_Chapter.html#Par60)\
    \ in the `Procfile` to run your\nSpring Boot application.\n\n```\nweb java -Dserver.port=$PORT\
    \ -Dspring.profiles.active=heroku $JAVA_OPTS -jar target/springboot-heroku-demo.jar\n\
    Listing 19-11.\nProcfile in Project Root Directory\n```\n\nNote that the code\
    \ configures the `server.port` property\nas a system property using `-Dserver.port=$PORT`,\n\
    where the `$PORT`\nvalue is provided by Heroku dynamically. The code enables the\
    \ `heroku` profile by\nspecifying the `-Dspring.profiles.active=heroku`\nsystem\
    \ property.\n\nNow that you have the application code ready, you need to create\
    \ an\napplication on Heroku and link to the GitHub repository.\n\nGo to [ `https://www.heroku.com/`\n\
    ](https://www.heroku.com/) and log in with your credentials. After a successful\n\
    login, you will be redirected to the dashboard. On the Dashboard page,\nyou can\
    \ click on the New button on the top-right corner and select\nCreate New App.\
    \ There, you can provide the app name and select Runtime\nSelection. If you don’t\
    \ provide an app name, Heroku will generate a\nrandom name. Enter the application\
    \ name and click on Create New App; it\nwill take you to the application’s Deploy\
    \ configuration screen.\n\nClick on the Resources tab and search for Postgres\
    \ Add-on. Add the\nHeroku Postgres database. Click on the Deploy tab and, in the\
    \ Deployment\nMethod section, click on GitHub. Select your GitHub username, search\
    \ for\nrepository, and click Connect on the repository you want to link to.\n\n\
    Now you can click on Deploy Branch to deploy your application on Heroku.\nYou\
    \ can also enable automatic deployment of your application whenever\nyou push\
    \ changes to the GitHub repository by clicking on the Enable\nAutomatic Deploys\
    \ button.\n\nOnce the application is deployed, you can click on the Open App button\n\
    in top-right corner, which will open your application home page in a new\ntab.\
    \ If something goes wrong or you want to check the logs, choose More\n--> View\
    \ Logs. You can also view logs from the terminal by running\nthe following command.\n\
    \n```\nheroku logs --tail --app \n```\n\nTo learn more about the Heroku platform\
    \ , visit\n [`https://devcenter.heroku.com/`](https://devcenter.heroku.com/) .\n\
    \nRunning a Spring Boot Application on Docker\n\nDocker ( [`https://www.docker.com/`](https://www.docker.com/)\
    \ ) is an open source platform for packaging and running\napplications. Docker\
    \ is becoming more and more popular because it\nquickly packages and runs the\
    \ application in lightweight containers with\nthe required dependencies installed\
    \ and configured.\n\nFirst, you should familiarize yourself with some Docker terminology\
    \ .\n\n*   A Docker image is a kind of\n    blueprint from which you can create\
    \ a container. For example, there is a\n    Docker Ubuntu image from which you\
    \ can create a container and perform\n    actions just like you do on any Ubuntu\
    \ OS.\n\n*   A Docker container is an\n    instance of a Docker image that can\
    \ be started, stopped, paused, and\n    restarted. Each Docker container is assigned\
    \ a unique identifier.\n\n*   A Docker host is the host operating  system from\n\
    \    which you are spinning up the Docker containers.\n\n*   A Docker hub is a\
    \ cloud-based\n    registry service that hosts plenty of free Docker images that\
    \ you can\n    use. You can also build your own image and publish them.\n\nYou\
    \ can create Docker containers using various Docker commands, but\nusing Dockerfile\
    \ is the\npreferred approach. Dockerfile contains the instructions on how to build\n\
    the Docker image so that you can easily repeat the image building\nprocess on\
    \ any machine.\n\nInstalling Docker\n\nDocker is a rapidly evolving technology\
    \ and hence the Docker\ninstallation process may change over time. I strongly\
    \ recommend you\nrefer to the official Docker installation \ndocumentation at\
    \ [ `https://docs.docker.com/engine/installation/`\n](https://docs.docker.com/engine/installation/)\
    \ to install Docker based on your operating system.\nOnce Docker is installed,\
    \ you can determine whether the installation is\nsuccessful by running the following\
    \ command.\n\n```\nsudo docker info\n```\n\nIf the installation is successful,\
    \ you should be able to see various\ndetails about Docker.\n\nListing [19-12](#A447991_1_En_19_Chapter.html#Par80)\
    \ shows a\nsample Dockerfile.\n\n```"
  trans: "\n### 使用 Thymeleaf 表单\n\nThymeleaf 提供了非常出色的 Spring 集成，支持以下功能：\n\n*   使用带有支持\
    \ bean 和结果/错误绑定的表单\n*   使用属性编辑器和转换服务\n*   使用 ResourceBundle 显示国际化（i18n）消息\n* \
    \  使用 Spring 表达式语言（Spring EL）\n\n在本节中，你将看到如何使用 Thymeleaf 创建用户注册表单，并使用 Spring 控制器处理表单提交。\n\
    \n创建一个名为 `User.java` 的简单 POJO，如清单 10-9 所示。\n\n```\npublic class User\n{\nprivate\
    \ Long id;\nprivate String name;\nprivate String email;\nprivate String password;\n\
    //setters & getters\n}\n清单 10-9.\nUser.java\n```\n\n在 `src/main/resources/templates`\
    \ 目录中创建 `registration.html` 文件，如清单 10-10 所示。\n\n```\n\n用户注册\n\n用户注册表单\n\n姓名\n\n\
    电子邮件\n\n密码\n\n提交\n\n清单 10-10.\nThymeleaf 注册视图 src/main/resources/templates/registration.html\n\
    ```\n\n创建一个 SpringMVC 控制器来处理对 `/registration` URL 的 `GET` 和 `POST` 请求，如清单 10-11\
    \ 所示。\n\n```\n@Controller\npublic class RegistrationController\n{\n@GetMapping(\"\
    /registration\")\npublic String registrationForm(Model model) {\nmodel.addAttribute(\"\
    user\", new User());\nreturn \"registration\";\n}\n@PostMapping(\"/registration\"\
    )\npublic String handleRegistration(User user) {\nlogger.debug(\"Registering User\
    \ : \"+user);\nreturn \"redirect:/login\";\n}\n}\n清单 10-11.\nRegistrationController.java\n\
    ```\n\n当你请求 `\"/registration\"` URL 时，会触发一个 `GET` 请求，并由 `RegistrationController.registrationForm()`\
    \ 方法处理。你将 `User` 对象以 `\"user\"` 键添加到 `Model` 中，以便可以在 Thymeleaf 表单中绑定表单属性。\n\n\
    请注意，此示例使用了两个 Thymeleaf 属性——`th:action` 用于构建上下文相关的 URL，`th:object` 用于指定模型属性名称。\n\
    \n```\n...\n...\n\n```\n\n该示例对表单输入字段使用了 `th:field=\"*{propertyName}\"` 语法，以便该字段将由模型对象属性支持。因此，当你使用\
    \ `<input type=\"text\" th:field=\"*{name}\"/>` 时，`name` 输入字段值将绑定到 `user.name`\
    \ 属性。如果你查看渲染后表单的源代码，`<input type=\"text\" th:field=\"*{name}\"/>` 会被渲染如下：\n\n\
    ```\n\n表单验证\n\n验证用户提交的数据在 Web 应用程序中至关重要。\nSpring 使用其自身的验证框架支持数据验证，\n并支持 Java Bean\
    \ 验证 API。\n\n首先，你需要使用 Java Bean\n验证注解指定用户验证规则。\n\n```\npublic class User\n{\n\
    private Long id;\n@NotNull\n@Size(min=3, max=50)\nprivate String name;\n@NotNull\n\
    @Email(message=\"{invalid.email}\")\nprivate String email;\n@NotNull\n@Size(min=6,\
    \ max=50)\nprivate String password;\n//setters & getters\n}\n```\n\nThymeleaf\
    \ 提供了 `#fields.hasErrors('fieldName')` 语法\n来检查 `fieldName` 字段是否存在任何错误。\n\n```\n\
    数据不正确\n```\n\n你可以使用 `#fields.hasErrors('global')`\n来检查是否存在任何全局错误（与任何特定字段无关）。\n\
    \n你现在可以更新 `registration.html` 以\n显示验证错误，如清单 10-12 所示。\n\n```\n\n用户注册\n\n用户注册表单\n\
    \n数据不正确\n\n姓名\n\n数据不正确\n\n电子邮件\n\n数据不正确\n\n密码\n\n数据不正确\n\n提交\n\n清单 10-12.\n包含验证错误标签的\
    \ registration.html 文件\n```\n\n使用此更新后的表单，如果存在任何表单验证失败，它将在字段旁边显示这些错误，并在开头显示所有全局错误。请注意，此示例使用\
    \ `th:classappend=\"${#fields.hasErrors('email')}? 'has-error'\"` 在存在任何错误时动态添加一些\
    \ CSS 样式。\n\n你需要更新 `\"/registration\" POST` 处理程序方法以触发模型对象的验证。你可以向模型参数添加 `@Valid`\
    \ 注解以在表单提交时执行验证。\n\n你还需要在模型对象之后立即定义 `BindingResult` 参数。验证错误将填充到 `BindingResult`\
    \ 中，你可以在方法体中稍后检查它。\n\n```\n@Controller\npublic class RegistrationController\n\
    {\n...\n...\n@PostMapping(\"/registration\")\npublic String handleRegistration(@Valid\
    \ User user, BindingResult result) {\nlogger.debug(\"Registering User : \"+user);\n\
    if(result.hasErrors()){\nreturn \"registration\";\n}\nreturn \"redirect:/registrationsuccess\"\
    ;\n}\n}\n```\n\n当使用无效数据提交表单时，这些验证错误将填充到 `BindingResult` 中。该示例检查是否存在任何错误，并重新显示注册表单，该表单将连同错误一起渲染。\n\
    \n有时，你无法仅使用注解来表达所有验证规则。例如，你希望用户电子邮件是唯一的。如果不检查数据库，你就无法实现这一点。\n\n接下来，你将看到如何使用 Spring\
    \ 的验证框架来实现复杂的验证。\n\n你可以通过实现 `org.springframework.validation.Validator` 接口来创建 `UserValidator`，如清单\
    \ 10-13 所示。\n\n```\n@Component\npublic class UserValidator implements Validator\n\
    {\n@Autowired\nUserRepository userRepository;\n@Override\npublic boolean supports(Class\
    \ clazz)\n{\nreturn User.class.isAssignableFrom(clazz);\n}\n@Override\npublic\
    \ void validate(Object target, Errors errors)\n{\nUser user = (User) target;\n\
    String email = user.getEmail();\nUser userByEmail = userRepository.findByEmail(email);\n\
    if(userByEmail != null){\nerrors.rejectValue(\"email\",\n\"email.exists\",\nnew\
    \ Object[]{email},\n\"Email \"+email+\" already in use\");\n}\n}\n}\n清单 10-13.\n\
    UserValidator.java\n```\n\n在 `validate(Object target, Errors errors)` 方法中，你可以实现任何复杂的验证逻辑并注册错误。\n\
    \n现在，你可以将 `UserValidator` 注入到 `RegistrationController` 中，并使用它来验证模型对象，如下所示：\n\n\
    ```\n@Controller\npublic class RegistrationController\n{\n@Autowired\nprivate\
    \ UserValidator userValidator;\n@PostMapping(\"/registration\")\npublic String\
    \ handleRegistration(@Valid User user, BindingResult result) {\nuserValidator.validate(user,\
    \ result);\nif(result.hasErrors()){\nreturn \"registration\";\n}\nreturn \"redirect:/registrationsuccess\"\
    ;\n}\n}\n```\n\n当表单随后被提交时，如果根据 Bean 验证约束注解存在任何验证失败，它们将填充到 `BindingResult` 中。之后，该示例使用\
    \ `userValidator.validate(user, result)` 检查重复的电子邮件。如果给定的电子邮件已存在，这将向 `email` 属性添加一个错误。\n\
    \n文件上传\n\nSpring Boot 的 `org.springframework.boot.autoconfigure.web.servlet.MultipartAutoConfiguration`\
    \ 默认启用多部分上传。\n\n你可以创建一个带有 `enctype=\"multipart/form-data\"` 的表单来上传文件，如清单 10-14\
    \ 所示。\n\n```\n\n清单 10-14.\n文件上传表单\n```\n\n然后，你可以实现 `FileUploadController` 来处理请求，如清单\
    \ 10-15 所示。\n\n```\n@PostMapping(\"/uploadMyFile\")\npublic String handleFileUpload(@RequestParam(\"\
    myFile\") MultipartFile file)\n{\nif (!file.isEmpty())\n{\nString name = file.getOriginalFilename();\n\
    try\n{\nbyte[] bytes = file.getBytes();\nFiles.write(new File(name).toPath(),\
    \ bytes);\n}\ncatch (Exception e)\n{\ne.printStackTrace();\n}\n}\nreturn \"redirect:/fileUpload\"\
    ;\n}\n清单 10-15.\nFileUploadController.java\n```\n\n请注意，此示例将 `file` 类型的输入参数 `myFile`\
    \ 绑定到 `MultipartFile` 参数，使用 `@RequestParam(\"myFile\")`，从中你可以提取 `byte[]` 或 `InputStream`。\n\
    \n你可以使用以下属性自定义多部分配置：\n\n```\nspring.servlet.multipart.enabled=true\nspring.servlet.multipart.max-file-size=2MB\n\
    spring.servlet.multipart.max-request-size=20MB\nspring.servlet.multipart.file-size-threshold=5MB\n\
    ```\n\n使用 ResourceBundle 进行国际化（i18n）\n\n默认情况下，Spring Boot 的 `org.springframework.boot.autoconfigure.context.MessageSourceAutoConfiguration`\
    \ 会注册一个基础名称为 `\"messages\"` 的 `MessageSource` bean。\n\n你可以在根类路径中添加诸如 `messages.properties`、`messages_en.properties`\
    \ 和 `messages_fr.properties` 之类的 ResourceBundle，Spring Boot 会自动拾取它们。你还可以使用 `spring.messages.basename`\
    \ 属性自定义 ResourceBundle 的 `basename`。\n\n除此之外，Spring Boot 还提供了以下自定义属性。\n\n```\n\
    spring.messages.basename=messages\nspring.messages.cache-seconds=-1(缓存过期时间（秒）。如果设置为\
    \ -1，则捆绑包将永久缓存)\nspring.messages.encoding=UTF-8\nspring.messages.fallback-to-system-locale=true\n\
    ```\n\n在 `src/main/resources/` 文件夹中创建默认的 ResourceBundle `messages.properties`，如下所示：\n\
    \n```\napp.title=SpringBoot Thymeleaf Demo\napp.version=1.0\nemail.exists=Email\
    \ {0} is already in use.\n```\n\n你可以使用 `th:text=\"#{msgKey}\"` 在 Thymeleaf 模板中渲染这些值。\n\
    \n```\n应用标题\n```\n\n你还可以从 `MessageSource` 以编程方式获取这些消息，如清单 10-16 所示。\n\n```\n@Controller\n\
    public class RegistrationController\n{\n@Autowired\nprivate MessageSource messageSource;\n\
    ....\n....\npublic String handleRegistration(User user)\n{\n...\nString code=\"\
    email.exists\";\nObject[] args = new Object[]{email};\nString defaultMsg = \"\
    Email \"+email+\" already in use\";\nLocale locale = Locale.getDefault();\nString\
    \ errorMsg =\nmessageSource.getMessage(code, args, defaultMsg, locale);\n...\n\
    }\n}\n清单 10-16.\n以编程方式读取 i18n 消息\n```\n\n用于 Hibernate 验证错误的 ResourceBundle\n\n\
    Spring Boot 使用 Hibernate Validator 作为 Bean 验证 API 的实现。默认情况下，Hibernate 验证会在根类路径中查找\
    \ `ValidationMessages.properties` 文件以获取失败消息键。如果你想将 `messages.properties` 同时用于\
    \ i18n 和 Hibernate 验证错误消息，你可以注册 `Validator` bean，如清单 10-17 所示。\n\n```\n@Configuration\n\
    public class WebConfig implements WebMvcConfigurer\n{\n...\n...\n@Autowired\n\
    private MessageSource messageSource;\n@Override\npublic Validator getValidator()\
    \ {\nLocalValidatorFactoryBean factory = new LocalValidatorFactoryBean();\nfactory.setValidationMessageSource(messageSource);\n\
    return factory;\n}\n}\n清单 10-17.\n为 Hibernate 验证消息使用 MessageSource\n```\n\n使用此配置，国际化（i18n）和\
    \ Hibernate 验证错误消息键都将从 `messages*.properties` 文件中获取。\n\n错误处理\n\n你可以通过注册 `SimpleMappingExceptionResolver`\
    \ bean 并配置为哪种异常类型渲染哪个视图来处理 Spring MVC 应用程序中的异常，如清单 10-18 所示。\n\n```\n@Configuration\n\
    @EnableWebMvc\npublic class WebMvcConfig implements WebMvcConfigurer\n{\n@Bean(name=\"\
    simpleMappingExceptionResolver\")\npublic SimpleMappingExceptionResolver simpleMappingExceptionResolver()\n\
    {\nSimpleMappingExceptionResolver exceptionResolver = new SimpleMappingExceptionResolver();\n\
    Properties mappings = new Properties();\nmappings.setProperty(\"DataAccessException\"\
    , \"dbError\");\nmappings.setProperty(\"RuntimeException\", \"error\");\nexceptionResolver.setExceptionMappings(mappings);\n\
    exceptionResolver.setDefaultErrorView(\"error\");\nreturn exceptionResolver;\n\
    }\n}\n清单 10-18.\n使用 SimpleMappingExceptionResolver 处理异常\n```\n\n你还可以使用 `@ExceptionHandler`\
    \ 注解为特定的异常类型定义处理程序方法，如清单 10-19 所示。\n\n```\n@Controller\npublic class CustomerController\n\
    {\n@GetMapping(\"/customers/{id}\")\npublic String findCustomer(@PathVariable\
    \ Long id, Model model)\n{\nCustomer c = customerRepository.findById(id);\nif(c\
    \ == null) throw new CustomerNotFoundException();\nmodel.add(\"customer\", c);\n\
    return \"view_customer\";\n}\n@ExceptionHandler(CustomerNotFoundException.class)\n\
    public ModelAndView handleCustomerNotFoundException(CustomerNotFoundException\
    \ ex)\n{\nModelAndView model = new ModelAndView(\"error/404\");\nmodel.addObject(\"\
    exception\", ex);\nreturn model;\n}\n}\n清单 10-19.\n使用控制器级别的 @ExceptionHandler\
    \ 处理异常\n```\n\n`CustomerController` 中的 `handleCustomerNotFoundException()` 方法将仅处理从\
    \ `CustomerController @RequestMapping` 方法中抛出的 `CustomerNotFoundException` 异常。\n\
    \n你可以通过创建一个使用 `@ControllerAdvice` 注解的异常处理程序类来全局处理异常。`@ControllerAdvice` 类中的 `@ExceptionHandler`\
    \ 方法处理在任何控制器请求处理方法中发生的错误。参见清单 10-20。\n\n```\n@ControllerAdvice\npublic class GlobalExceptionHandler\n\
    {\nprivate static final Logger logger = LoggerFactory.getLogger(GlobalExceptionHandler.class);\n\
    @ExceptionHandler(DataAccessException.class)\npublic String handleDataAccessException(HttpServletRequest\
    \ request, DataAccessException ex){\nlogger.info(\"DataAccessException Occurred::\
    \ URL=\"+request.getRequestURL());\nreturn \"db_error\";\n}\n@ExceptionHandler(ServletRequestBindingException.class)\n\
    public String servletRequestBindingException(ServletRequestBindingException e)\
    \ {\nlogger.error(\"ServletRequestBindingException occurred: \"+e.getMessage());\n\
    return \"validation_error\"\n}\n}\n清单 10-20.\n使用 @ControllerAdvice 的全局异常处理程序\n\
    ```\n\nSpring Boot 默认注册一个全局错误处理程序并映射 `/error`，它为浏览器客户端渲染 HTML 响应，为 REST 客户端渲染\
    \ JSON 响应。你可以通过实现 `ErrorController` 提供自定义错误页面。参见清单 10-21。\n\n```\n@Controller\n\
    public class GenericErrorController implements ErrorController\n{\nprivate static\
    \ final String ERROR_PATH = \"/error\";\n@RequestMapping(ERROR_PATH)\npublic String\
    \ error(){\nreturn \"errorPage.html\";\n}\n@Override\npublic String getErrorPath()\
    \ {\nreturn ERROR_PATH;\n}\n}\n清单 10-21.\n实现自定义 ErrorController\n```\n\n你还可以根据\
    \ HTTP 错误状态码提供自定义错误页面。Spring Boot 在静态资源位置（`classpath:/static`、`classpath:/public`\
    \ 等）下的 `/error` 文件夹中查找错误页面。\n\n例如，当发生 404 错误时，你可以显示 `src/main/resources/static/error/404.html`\
    \ 文件。同样，你也可以为所有带有 `5xx` 错误状态码的服务器错误显示 `src/main/resources/static/error/5xx.html`\
    \ 文件。\n\n总结\n\n本章讨论了如何使用 Spring Boot 和 Thymeleaf 视图模板开发 Web 应用程序。还介绍了如何使用 Bean\
    \ 验证 API 和 Spring 的验证框架执行表单验证。你学习了如何在控制器级别和全局级别处理异常场景。在下一章中，你将学习如何使用 Spring Boot\
    \ 开发 RESTful Web 服务。\n\n11. 使用 Spring Boot 构建 REST API\n\nREST（表述性状态转移）是一种用于构建分布式系统的架构风格，它提供了异构系统之间的互操作性。随着移动设备的急剧增加，对\
    \ REST API 的需求大大增加。构建 REST API 并让 Web 和移动客户端消费该 API，而不是开发单独的应用程序，这变得合乎逻辑。\n\n\
    SpringMVC 为构建 RESTful Web 服务提供了一流的支持。由于 Spring 的 REST 支持是构建在 SpringMVC 之上的，你可以利用\
    \ SpringMVC 的知识来构建 REST API。\n\nSpring Data REST 是一个 Spring 组合项目，可用于将 Spring Data\
    \ 存储库公开为 REST 端点。你可以毫不费力地将 Spring Data JPA、Spring Data Mongo 和 Spring Data Cassandra\
    \ 存储库公开为 REST 端点。\n\n本章涵盖 RESTful Web 服务，包括如何使用 SpringMVC 构建 REST API。然后你将学习如何使用\
    \ Spring Data REST 构建 REST API。\n\nRESTful Web 服务简介\n\nREST 代表表述性状态转移，是一种用于设计分布式超媒体系统的架构风格。REST\
    \ 一词由 Roy Fielding 于 2000 年在他的博士论文中提出，你可以在以下网址找到： [`http://www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%7Efielding/pubs/dissertation/rest_arch_style.htm)\
    \ 。\n\n基于 REST 的系统的基本概念是资源，它可以通过统一资源标识符（URI）来标识。对于基于 Web 的系统，HTTP 是与外部系统通信最常用的协议。你可以使用\
    \ URI 标识唯一的资源。\n\n例如，一篇博客文章可以通过 URI [`http://www.myblog.com/posts/restful-architecture`](http://www.myblog.com/posts/restful-architecture)\
    \ 来标识。资源可以是集合资源，它表示一组分组的资源。例如，URI [ `http://www.myblog.com/posts/`\n](http://www.myblog.com/posts/)\
    \ 表示 `posts` 资源，它可能包含零个或多个 `Post` 资源，每个资源都可以通过其自己的 URI 来标识。可以对资源执行的各种操作可以使用其 URI\
    \ 以及适当的 HTTP 方法（`GET`、`POST`、`PUT`、`DELETE` 等）来表达。\n\n例如，假设你正在为博客应用程序构建 REST API。在博客域中可以标识的资源是文章、评论和用户。\n\
    \n遵循 REST 原则，你可以使用以下 HTTP 动词：\n\n*   `GET`—获取集合或单个资源\n*   `POST`—创建新资源\n*   `PUT`—更新现有资源\n\
    *   `DELETE`—删除集合或单个资源\n\n现在考虑如何为博客系统的资源定义 URI：\n\n*   `GET`—`http://localhost:8080/myblog/posts/`：返回所有文章的列表\n\
    *   `GET`—`http://localhost:8080/myblog/posts/2`：返回 ID 为 2 的文章\n*   `POST`—`http://localhost:8080/myblog/posts/`：创建一个新的\
    \ `Post` 资源\n*   `PUT`—`http://localhost:8080/myblog/posts/2`：更新 ID 为 2 的 POST\
    \ 资源\n*   `DELETE`—`http://localhost:8080/myblog/posts/2`：删除 ID 为 2 的 POST 资源\n\
    *   `GET`—`http://localhost:8080/myblog/posts/2/comments`：返回 ID 为 `2` 的文章的所有评论\n\
    *   `POST`—`http://localhost:8080/myblog/posts/2/comments`：为 ID 为 2 的 `POST` 创建新评论\n\
    *   `DELETE`—`http://localhost:8080/myblog/posts/2/comments`：删除 ID 为 2 的 `POST`\
    \ 的所有评论\n\n最常用的数据交换格式（ContentTypes）是 JSON 和 XML。在基于 Web 的系统中，确定输入请求内容和输出响应类型的典型做法是基于\
    \ `ContentType` 和 `Accept` 标头值。\n\n使用 SpringMVC 的 REST API\n\nSpringMVC 为构建 RESTful\
    \ Web 服务提供支持，Spring Boot 通过其自动配置机制使其变得更加容易。\n\n清单 11-1 显示了一个基于 SpringMVC 的 REST\
    \ 端点。\n\n```\n@Controller\npublic class PostController\n{\n@Autowired\nPostRepository\
    \ postRepository;\n@ResponseBody\n@GetMapping(\"/posts\")\npublic List listPosts()\n\
    {\nreturn postRepository.findAll();\n}\n}\n清单 11-1.\nSpringMVC REST 控制器\n```\n\
    \n它看起来就像一个普通的 SpringMVC 控制器，有两个明显的区别：\n\n*   与返回视图名称或 `ModelAndView` 对象的普通控制器方法不同，`listPosts()`\
    \ 方法返回一个 `Post` 对象列表。\n*   `listPosts()` 请求处理程序方法使用 `@ResponseBody` 注解。\n\n请求处理程序方法上的\
    \ `@ResponseBody` 注解表示返回值应绑定到响应体。如果你向 `\"/posts\"` URL 发出 `GET` 请求，你可能会根据 `Accept`\
    \ 标头值获得 `Post` 对象列表的 JSON 或 XML 表示。\n\n清单 11-2 显示了用于创建新文章的另一方法。\n\n```\n@Controller\n\
    public class PostController\n{\n@Autowired\nPostRepository postRepository;\n...\n\
    ...\n@ResponseBody\n@PostMapping(\"/posts\")\npublic Post createPost(@RequestBody\
    \ Post post)\n{\nreturn postRepository.save(post);\n}\n}\n清单 11-2.\n使用 @RequestBody\
    \ 注解的 REST 控制器方法\n```\n\n在 `createPost()` 处理程序方法中，有趣的部分是 `@RequestBody` 注解。`@RequestBody`\
    \ 注解将借助注册的 `HttpMessageConverter` 负责将 Web 请求体绑定到方法参数。因此，当你使用 `Post` JSON 体向 `\"\
    /post\"` URL 发出 `POST` 请求时，`HttpMessageConverters` 会将 JSON 请求体转换为 `Post` 对象并将其传递给\
    \ `savePost()` 方法。\n\n如果你所有的处理程序方法都是 REST 端点处理程序方法，你可以在类级别使用 `@ResponseBody`，而不是将其添加到每个方法。更好的是，你可以使用\
    \ `@RestController`，它是 `@Controller` 和 `@ResponseBody` 的组合注解。\n\n现在你将深入研究如何使用\
    \ Spring Data JPA、SpringMVC 以及当然还有 Spring Boot 为简单的博客应用程序实现 REST API。\n\n1.  创建一个\
    \ Spring Boot 项目并配置 Web 和 JPA 启动器。\n\n    创建一个 Spring Boot Maven 项目并添加以下启动器：\n\
    \n    ```\n    org.springframework.boot\n    spring-boot-starter-web\n\n    org.springframework.boot\n\
    \    spring-boot-starter-data-jpa\n\n    com.h2database\n    h2\n\n    ```\n\n\
    \    对 REST 资源进行建模。此示例假设你的博客应用程序是一个简单的应用程序，管理员可以在其中创建文章，博客查看者可以查看文章并添加评论。因此，你可以确定应用程序域中将存在\
    \ `User`、`Post` 和 `Comment` 资源。\n\n    首先，你将这些资源创建为 JPA 实体，如清单 11-3 所示。\n\n  \
    \  ```\n    @Entity\n    @Table(name = \"USERS\")\n    public class User\n   \
    \ {\n    @Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private\
    \ Integer id;\n    @Column(name = \"name\", nullable = false, length = 150)\n\
    \    private String name;\n    @Column(name = \"email\", nullable = false, length\
    \ = 150)\n    private String email;\n    @Column(name = \"password\", nullable\
    \ = false, length = 150)\n    private String password;\n    //setters & getters\n\
    \    }\n    @Entity\n    @Table(name = \"POSTS\")\n    public class Post\n   \
    \ {\n    @Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private\
    \ Integer id;\n    @Column(name = \"title\", nullable = false, length = 150)\n\
    \    private String title;\n    @Lob\n    @Column(name = \"content\", nullable\
    \ = false, columnDefinition=\"TEXT\")\n    private String content;\n    @Temporal(TemporalType.TIMESTAMP)\n\
    \    @Column(name=\"created_on\")\n    private Date createdOn = new Date();\n\
    \    @Temporal(TemporalType.TIMESTAMP)\n    @Column(name=\"updated_on\")\n   \
    \ private Date updatedOn;\n    @OneToMany\n    @JoinColumn(name=\"post_id\")\n\
    \    private List comments;\n    //setters & getters\n    }\n    @Entity\n   \
    \ @Table(name = \"COMMENTS\")\n    public class Comment\n    {\n    @Id @GeneratedValue(strategy\
    \ = GenerationType.IDENTITY)\n    private Integer id;\n    @Column(name = \"name\"\
    , nullable = false, length = 150)\n    private String name;\n    @Column(name\
    \ = \"email\", nullable = false, length = 150)\n    private String email;\n  \
    \  @Lob\n    @Column(name = \"content\", nullable = false, columnDefinition=\"\
    TEXT\")\n    private String content;\n    @Temporal(TemporalType.TIMESTAMP)\n\
    \    @Column(name=\"created_on\")\n    private Date createdOn = new Date();\n\
    \    @Temporal(TemporalType.TIMESTAMP)\n    @Column(name=\"updated_on\")\n   \
    \ private Date updatedOn;\n    //setters & getters\n    }\n    清单 11-3.\n    JPA\
    \ 实体 User.java、Post.java 和 Comment.java\n    ```\n\n2.  现在为你刚刚创建的 JPA 实体创建 Spring\
    \ Data JPA 存储库，如清单 11-4 所示。\n\n    ```\n    public class UserRepository extends\
    \ JpaRepository\n    {\n    }\n    public class PostRepository extends JpaRepository\n\
    \    {\n    }\n    public class CommentRepository extends JpaRepository\n    {\n\
    \    }\n    清单 11-4.\n    User、Post 和 Comment 实体的 JPA 存储库\n    ```\n\n3.  现在创建一个\
    \ SpringMVC 控制器来实现所有 `Post` 资源相关的 REST 端点：\n\n    ```\n    @RestController\n \
    \   @RequestMapping(value=\"/posts\")\n    public class PostController\n    {\n\
    \    @Autowired\n    PostRepository postRepository;\n    @Autowired\n    CommentRepository\
    \ commentRepository;\n    ...\n    ...\n    }\n    ```\n\n    此示例使用 `@RestController`，因为所有请求处理程序方法都只是\
    \ REST 端点。此外，它还使用 `@RequestMapping(value=\"/posts\")` 注解，以拥有名为 `\"/posts\"` 的公共根\
    \ URL，这样你就不必为每个方法重复它。\n\n    在开始实现 REST 端点之前，首先需要创建一个自定义异常类，称为 `ResourceNotFoundException`（清单\
    \ 11-5）。当客户端发送请求以获取不存在的资源的详细信息时，将抛出此异常。\n\n    ```\n    @ResponseStatus(HttpStatus.NOT_FOUND)\n\
    \    public class ResourceNotFoundException extends RuntimeException\n    {\n\
    \    public ResourceNotFoundException() {\n    this(\"Resource not found!\");\n\
    \    }\n    public ResourceNotFoundException(String message) {\n    this(message,\
    \ null);\n    }\n    public ResourceNotFoundException(String message, Throwable\
    \ cause) {\n    super(message, cause);\n    }\n    }\n    清单 11-5.\n    ResourceNotFoundException.java\n\
    \    ```\n\n    请注意，该示例使用 `@ResponseStatus(HttpStatus.NOT_FOUND)` 注解了 `ResourceNotFoundException`\
    \ 类，以便当请求处理程序方法抛出 `ResourceNotFoundException` 时，将向客户端返回适当的 HTTP 错误状态码（404 `NOT_FOUND`）。\n\
    \n    你将首先实现用于创建新文章的端点。根据 REST 原则，你使用 `http://localhost:8080/posts` 作为 URI，并使用\
    \ HTTP `POST` 方法来创建新文章。如果 `POST` 创建成功，你将返回适当的 HTTP 状态码（201 `CREATED`）以及新创建的文章作为\
    \ `Response` 体。\n\n    ```\n    @ResponseStatus(HttpStatus.CREATED)\n    @PostMapping(\"\
    \")\n    public Post createPost(@RequestBody Post post)\n    {\n    return postRepository.save(post);\n\
    \    }\n    ```\n\n    默认情况下，如果请求处理方法成功完成，将返回 HTTP 状态码 `200 OK`。因此，你显式使用 `@ResponseStatus(HttpStatus.CREATED)`\
    \ 注解以返回适当的 HTTP 状态码（201 `CREATED`）。\n\n    接下来，你将实现用于获取所有文章的端点，其端点 URL 将是 `GET\
    \ http://localhost:8080/posts`。\n\n    ```\n    @GetMapping(\"\")\n    public\
    \ List listPosts()\n    {\n    return postRepository.findAll();\n    }\n    ```\n\
    \n    此示例从数据库加载所有文章并将它们作为响应返回。\n\n    接下来，你将实现用于获取给定 ID 的文章的端点，其端点 URL 将是 `GET\
    \ http://localhost:8080/posts/{id}`。\n\n    ```\n    @GetMapping(value=\"/{id}\"\
    )\n    public Post getPost(@PathVariable(\"id\") Integer id)\n    {\n    return\
    \ postRepository.findById(id)\n    .orElseThrow(() -> new ResourceNotFoundException(\"\
    No post found with id=\"+id));\n    }\n    ```\n\n    此示例从数据库中获取给定 ID 的 `Post`\
    \ 对象，如果未找到文章则抛出 `ResourceNotFoundException`；否则，返回 `POST` 对象。\n\n    接下来，你需要实现用于更新给定\
    \ ID 的文章的端点，其端点 URL 将是 `PUT http://localhost:8080/posts/{id}`。\n\n    ```\n  \
    \  @PutMapping(\"/{id}\")\n    public Post updatePost(@PathVariable(\"id\") Integer\
    \ id, @RequestBody Post post)\n    {\n    postRepository.findById(id)\n    .orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\n    return\
    \  postRepository.save(post);\n    }\n    ```\n\n    该示例从数据库中获取给定 ID 的 `Post`\
    \ 对象，如果未找到文章则抛出 `ResourceNotFoundException`，否则更新文章。\n\n    类似地，你可以通过使用 HTTP `DELETE`\
    \ 方法在 URI `http://localhost:8080/posts/{id}` 上实现删除文章的端点，如下所示：\n\n    ```\n   \
    \ @DeleteMapping(\"/{id}\")\n    public void deletePost(@PathVariable(\"id\")\
    \ Integer id)\n    {\n    Post post = postRepository.findById(id)\n    .orElseThrow(()\
    \ -> new ResourceNotFoundException(\"No post found with id=\"+id));\n    postRepository.deleteById(post.getId());\n\
    \    }\n    ```\n\n    请注意，你没有向客户端返回任何内容，因此在成功删除文章后，将发送 HTTP 200 `OK` 状态码。\n\n\
    \    你还可以实现用于创建新评论和删除给定文章的现有评论的 REST 端点，如下所示：\n\n    ```\n    @ResponseStatus(HttpStatus.CREATED)\n\
    \    @PostMapping(\"/{id}/comments\")\n    public void createPostComment(@PathVariable(\"\
    id\") Integer id, @RequestBody Comment comment)\n    {\n    Post post = postRepository.findById(id)\n\
    \    .orElseThrow(() -> new ResourceNotFoundException(\"No post found with id=\"\
    +id));\n    post.getComments().add(comment);\n    }\n    @DeleteMapping(\"/{postId}/comments/{commentId}\"\
    )\n    public void deletePostComment(@PathVariable(\"postId\") Integer postId,\n\
    \    @PathVariable(\"commentId\") Integer commentId)\n    {\n    commentRepository.deleteById(commentId);\n\
    \    }\n    ```\n\n    你还可以为 REST 端点处理程序方法添加验证，类似于传统 Web 应用程序的 SpringMVC 控制器。参见清单\
    \ 11-16。\n\n    ```\n    @ResponseStatus(HttpStatus.CREATED)\n    @PostMapping(value=\"\
    \")\n    public Post createPost(@RequestBody @Valid Post post, BindingResult result)\n\
    \    {\n    if(result.hasErrors()){\n    //handle errors\n    //throw Exception\
    \ with Invalid data details\n    }\n    return postRepository.save(post);\n  \
    \  }\n    清单 11-6.\n    使用 Java Bean 验证 API 执行验证\n    ```\n\n    此示例向方法参数 `Post`\
    \ 添加了 `@Valid` 注解，以便文章对象数据将根据在 `POST` 属性上定义的 Java Bean 验证约束进行验证。\n\n4.  除了从请求处理方法返回任意对象之外，你还可以返回\
    \ `ResponseEntity/HttpEntity`，它提供了一种设置响应标头和状态码的简便方法。参见清单 11-7。\n\n    ```\n  \
    \  @PostMapping(\"\")\n    public ResponseEntity createPost(@RequestBody @Valid\
    \ Post post, BindingResult result)\n    {\n    if(result.hasErrors()){\n    return\
    \ new ResponseEntity(post, HttpStatus.BAD_REQUEST);\n    }\n    Post savedPost\
    \ = postRepository.save(post);\n    HttpHeaders responseHeaders = new HttpHeaders();\n\
    \    responseHeaders.set(\"MyResponseHeader1\", \"MyValue1\");\n    responseHeaders.set(\"\
    MyResponseHeader2\", \"MyValue2\");\n    return new ResponseEntity(savedPost,\
    \ responseHeaders, HttpStatus.CREATED);\n    }\n    清单 11-7.\n    使用 ResponseEntity\
    \ 对响应进行细粒度控制\n    ```\n\n    此代码验证是否存在任何验证错误，并返回状态码为 `BAD_REQUEST`（400）的响应。否则，它保存文章并添加自定义响应标头。然后返回状态码为\
    \ `CREATED`（201）的响应。\n\n    `ResponseEntity/HttpEntity` 类也可以与 `RestTemplate` 一起使用来消费\
    \ REST 服务，这将在下一节中讨论。\n\n5.  你可以使用任何 REST 客户端工具（例如 Chrome 浏览器的 Postman（[`http://www.getpostman.com/`](http://www.getpostman.com/)）或\
    \ Advanced REST Client（[`https://chromerestclient.appspot.com/`](https://chromerestclient.appspot.com/)）扩展）来测试\
    \ REST 端点。\n\n你还可以使用 Spring 的 `RestTemplate` 作为客户端来调用 RESTful 服务。现在你将使用 `RestTemplate`\
    \ 测试已实现的 REST 端点。\n\n首先，你需要使用 SQL 脚本填充一些示例数据，如清单 11-8 所示。\n\n```\ndelete from\
    \  users;\nINSERT INTO users (id, email, password, name) VALUES\n(1, 'admin@gmail.com',\
    \ 'admin', 'Admin'),\n(2, 'david@gmail.com', 'david', 'David'),\n(3, 'ron@gmail.com',\
    \ 'ron', 'Ron');\ninsert into posts(id, title, content, created_on, updated_on)\
    \ values\n(1, 'Introducing SpringBoot', 'SpringBoot is awesome', '2017-05-10',\
