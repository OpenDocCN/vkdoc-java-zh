  \n此示例配置了视图控制器，以指定为哪个 URL 渲染哪个视图。此外，它还注册了 `SpringSecurityDialect` 以启用使用 Thymeleaf\
  \ Spring Security 方言。\n\n现在你已经准备好所有配置，是时候使用 Thymeleaf 创建视图了。\n\n创建 `src/main/resources/templates/login.html`，如清单\
  \ 13-7 所示。\n\n```\n\nSpringBoot 安全\n\n无效的电子邮件和密码。\n\n登录\n\n清单 13-7.\nThymeleaf 登录视图\n\
