- "# 1. Spring Boot 简介\n\nSpring 框架是一个非常流行且广泛使用的 Java 框架，用于构建 Web 和企业级应用程序。Spring\
  \ 的核心是一个依赖注入容器，它提供了多种配置 Bean 的灵活性，例如 XML、注解和 JavaConfig。多年来，Spring 框架通过满足现代业务应用程序的需求（如安全性、对\
  \ NoSQL 数据存储的支持、处理大数据、批处理、与其他系统的集成等）而呈指数级增长。Spring 及其子项目已成为构建企业级应用程序的可行平台。\n\nSpring\
  \ 框架非常灵活，提供了多种配置应用程序组件的方式。丰富的功能集加上多种配置选项，使得配置 Spring 应用程序变得复杂且容易出错。Spring 团队创建了\
  \ Spring Boot，旨在通过其强大的自动配置机制来解决配置的复杂性。\n\n本章将快速介绍 Spring 框架。你将使用 SpringMVC 和 JPA\
  \ 以传统方式（不使用 Spring Boot）开发一个 Web 应用程序。然后，你将了解传统方式的痛点，并学习如何使用 Spring Boot 开发相同的应用程序。\n\
  \n## Spring 框架概述\n\n如果你是一名 Java 开发者，那么你很有可能听说过 Spring 框架并在项目中使用过它。Spring 框架最初是作为一个依赖注入容器创建的，但它的功能远不止于此。Spring\
  \ 之所以非常流行，有以下几个原因：\n\n*   Spring 的依赖注入方法鼓励编写可测试的代码\n*   易于使用且功能强大的数据库事务管理能力\n* \
  \  Spring 简化了与其他 Java 框架（如 JPA/Hibernate ORM 和 Struts/JSF Web 框架）的集成\n*   用于构建 Web\
  \ 应用程序的最先进的 Web MVC 框架\n\n除了 Spring 框架本身，还有许多其他的 Spring 子项目可以帮助构建满足现代业务需求的应用程序：\n\
  \n*   Spring Data：简化了从关系型和 NoSQL 数据存储中访问数据的过程。\n*   Spring Batch：提供了一个强大的批处理框架。\n\
  *   Spring Security：用于保护应用程序的健壮安全框架。\n*   Spring Social：支持与社交网站（如 Facebook、Twitter、LinkedIn、GitHub\
  \ 等）的集成。\n*   Spring Integration：企业集成模式的实现，通过轻量级消息传递和声明式适配器促进与其他企业应用程序的集成。\n\n还有许多其他有趣的项目，用于满足各种现代应用程序开发需求。更多信息，请查看\
  \ [`http://spring.io/projects`](http://spring.io/projects)。\n\n## Spring 配置风格\n\n\
  Spring 最初提供了基于 XML 的方法来配置 Bean。后来，Spring 引入了基于 XML 的 DSL、注解和基于 JavaConfig 的方法来配置\
  \ Bean。清单 1-1 到 1-3 展示了每种配置风格的样子。\n\n```\n\n清单 1-1.\n基于 XML 的配置示例\n```\n\n```\n\
  @Service public class UserService\n{\nprivate UserDao userDao;\n@Autowired    public\
  \ UserService(UserDao dao){\nthis.userDao = dao;\n}\n...\n...\n}\n@Repository public\
  \ class JdbcUserDao\n{\nprivate DataSource dataSource;\n@Autowired\npublic JdbcUserDao(DataSource\
  \ dataSource){\nthis.dataSource = dataSource;\n}\n...\n...\n}\n清单 1-2.\n基于注解的配置示例\n\
  ```\n\n```\n@Configuration\npublic class AppConfig\n{\n@Bean\npublic UserService\
  \ userService(UserDao dao){\nreturn new UserService(dao);\n}\n@Bean\npublic UserDao\
  \ userDao(DataSource dataSource){\nreturn new JdbcUserDao(dataSource);\n}\n@Bean\n\
  public DataSource dataSource(){\nBasicDataSource dataSource = new BasicDataSource();\n\
  dataSource.setDriverClassName(\"com.mysql.jdbc.Driver\");\ndataSource.setUrl(\"\
  jdbc:mysql://localhost:3306/test\");\ndataSource.setUsername(\"root\");\ndataSource.setPassword(\"\
  secret\");\nreturn dataSource;\n}\n}\n清单 1-3.\n基于 JavaConfig 的配置示例\n```\n\n如你所见，Spring\
  \ 提供了多种配置应用程序组件的方法，你甚至可以混合使用这些方法。例如，你可以在同一个应用程序中同时使用 JavaConfig 和基于注解的配置风格。这带来了极大的灵活性，但有利也有弊。刚接触\
  \ Spring 框架的人可能会对应该遵循哪种方法感到困惑。\n\n目前，Spring 社区建议你遵循基于 JavaConfig 的方法，因为它提供了更大的灵活性。但并没有一种放之四海而皆准的解决方案。你必须根据自己的应用程序需求来选择合适的方法。\n\
  \n现在你已经了解了各种 Spring Bean 配置风格的样子，接下来我们将快速浏览一个典型的基于 SpringMVC 和 JPA/Hibernate 的 Web\
  \ 应用程序配置。\n\n## 使用 SpringMVC 和 JPA 开发 Web 应用程序\n\n在了解 Spring Boot 及其提供的功能之前，我们先来看看一个典型的\
  \ Spring Web 应用程序配置是什么样的，并了解其中的痛点。然后，我们将看到 Spring Boot 是如何解决这些问题的。\n\n首先要做的是创建一个\
  \ Maven 项目，并在 `pom.xml` 文件中配置所有必需的依赖项，如清单 1-4 所示。\n\n```\n\n4.0.0\ncom.apress\n\
  springmvc-jpa-demo\nwar\n1.0-SNAPSHOT\nspringmvc-jpa-demo\n\nUTF-8\n1.8\n1.8\nfalse\n\
  \norg.apache.tomcat.maven\ntomcat7-maven-plugin\n2.2\n\norg.springframework\nspring-webmvc\n\
  4.3.7.RELEASE\n\norg.springframework.data\nspring-data-jpa\n1.11.1.RELEASE\n\norg.slf4j\n\
  jcl-over-slf4j\n1.7.22\n\norg.slf4j\nslf4j-api\n1.7.22\n\norg.slf4j\nslf4j-log4j12\n\
  1.7.22\n\nlog4j\nlog4j\n1.2.17\n\ncom.h2database\nh2\n1.4.193\n\ncommons-dbcp\n\
  commons-dbcp\n1.4\n\nmysql\nmysql-connector-java\n5.1.38\n\norg.hibernate\nhibernate-entitymanager\n\
  5.2.5.Final\n\njavax.servlet\njavax.servlet-api\n3.1.0\nprovided\n\norg.thymeleaf\n\
  thymeleaf-spring4\n2.1.4.RELEASE\n\n清单 1-4.\npom.xml 文件\n```\n\n我们已经在 Maven 的 `pom.xml`\
  \ 文件中配置了所有 Spring MVC、Spring Data JPA、JPA/Hibernate、Thymeleaf 和 Log4j 的依赖项。\n\n\
  使用 JavaConfig 配置服务层/DAO 层的 Bean，如清单 1-5 所示。\n\n\n\n```\npackage com.apress.demo.config;\n\
  import java.util.Properties;\nimport javax.persistence.EntityManagerFactory;\nimport\
  \ javax.sql.DataSource;\nimport org.apache.commons.dbcp.BasicDataSource;\nimport\
  \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.annotation.PropertySource;\n\
  import org.springframework.context.support.PropertySourcesPlaceholderConfigurer;\n\
  import org.springframework.core.env.Environment;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\nimport\
  \ org.springframework.instrument.classloading.InstrumentationLoadTimeWeaver;\nimport\
  \ org.springframework.jdbc.datasource.init.DataSourceInitializer;\nimport org.springframework.jdbc.datasource.init.ResourceDatabasePopulator;\n\
