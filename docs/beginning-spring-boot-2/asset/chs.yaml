  '
- "# 10. 使用 Spring Boot 开发 Web 应用程序\n\nSpring MVC 是基于模型-视图-控制器（MVC）设计模式的最流行的 Java\
  \ Web 框架。自 Spring 3.0 版本起，Spring MVC 就提供了基于注解的请求映射功能，使用 `@Controller` 和 `@RequestMapping`。但是，配置\
  \ Spring MVC Web 应用程序组件（如 `DispatcherServlet`、`ViewResolver`、`MultiPartResolver`\
  \ 和 `ExceptionHandler`）是一个重复且繁琐的过程。\n\nSpring Boot 使得开始使用 Spring MVC 变得非常简单，因为 Spring\
  \ Boot 的自动配置机制会为大多数组件（如 `DispatcherServlet`、`ViewResolver`、`ContentNegotiatingViewResolver`、`LocaleResolver`、`MessageCodesResolver`\
  \ 等）配置默认值，并提供自定义选项。\n\n传统上，JSP 用于视图渲染，但随着时间的推移，出现了许多其他视图模板技术，例如 Thymeleaf、Mustache、Groovy\
  \ Templates、FreeMarker 等。Spring Boot 也为这些视图模板库提供了自动配置。\n\nSpring Boot 提供了嵌入式 Servlet\
  \ 容器支持，因此你可以将应用程序构建为自包含的部署单元。Spring Boot 开箱即用地支持 Tomcat、Jetty 和 Undertow Servlet\
  \ 容器，并提供了自定义钩子来实现所有服务器级别的自定义。\n\n本章将探讨如何使用 Web Starter 开发基于 Spring MVC 的 Web 应用程序，并将\
  \ Tomcat、Jetty 和 Undertow 作为嵌入式 Servlet 容器。你将学习如何自定义默认的 Spring MVC 配置，以及如何将 Servlet、过滤器和监听器注册为\
  \ Spring Bean。\n\n你将学习如何使用 Thymeleaf 视图模板、如何执行表单验证、如何上传文件以及如何使用 ResourceBundle 进行国际化（i18n）。\n\
  \n最后，你将学习使用 `@ExceptionHandler` 和 `@ControllerAdvice` 注解处理异常的各种方法，以及 Spring Boot\
  \ 如何使这一过程更加简单。\n\n## 介绍 Spring MVC\n\nSpring MVC 是一个基于 MVC 和前端控制器设计模式构建的强大 Web 框架。Spring\
  \ MVC 提供了 `DispatcherServlet`，它作为前端控制器接收所有请求，并将处理委托给请求处理器（控制器）。处理完成后，`ViewResolver`\
  \ 将根据视图名称渲染视图。图 10-1 展示了这个流程。\n\n![A447991_1_En_10_Fig1_HTML.gif](img/A447991_1_En_10_Fig1_HTML.gif)\n\
  \n图 10-1.\n\nSpring MVC 请求处理流程\n\nSpring MVC 提供了基于注解的映射支持，可以使用 `@Controller` 和 `@RequestMapping`\
  \ 注解将请求 URL 模式映射到处理器类（清单 10-1）。\n\n```\n@Controller\npublic class HomeController\n\
  {\n@RequestMapping(value=\"/home\", method=RequestMethod.GET)\npublic String home(Model\
  \ model) {\nmodel.addAttribute(\"message\", \"Hello Spring MVC!!\");\nreturn \"\
  home\";\n}\n}\n清单 10-1.\nSpring MVC 基于注解的控制器\n```\n\n`HomeController` 类上的 `@Controller`\
  \ 注解将其标记为请求处理器的 Spring 组件，`home()` 方法将处理对 `/home` URL 的 `GET` 请求。`ViewResolver`\
  \ 会将逻辑视图名称 `\"home\"` 解析为视图模板，例如 `/WEB-INF/views/home.html`，然后渲染视图。\n\nSpring 4.3\
  \ 引入了 `@GetMapping`、`@PostMapping`、`@PutMapping` 等注解作为便捷的组合注解，这样你就不必在 `@RequestMapping(value=\"\
  /url\", method=RequestMethod.XXX)` 中指定 `method` 类型。参见清单 10-2。\n\n```\n@Controller\n\
  public class HomeController\n{\n@GetMapping(\"/home\")\npublic String home(Model\
  \ model) {\nmodel.addAttribute(\"message\", \"Hello Spring MVC!!\");\nreturn \"\
  home\";\n}\n@PostMapping(\"/users\")\npublic String createUser(User user) {\nuserRepository.save(user);\n\
  return \"users\";\n}\n}\n清单 10-2.\n使用 @GetMapping 和 @PostMapping 注解\n```\n\n对于基于\
  \ Spring MVC 的 Web 应用程序，我们需要配置各种 Web 层组件，如 `DispatcherServlet`、`ViewResolver`、`LocaleResolver`、`HandlerExceptionResolver`\
  \ 等。Spring Boot 提供了 Web Starter，它可以自动配置所有这些常用的 Web 层组件，从而使 Web 应用程序开发变得更加容易。\n\n\
  \n\n## 使用 Spring Boot 开发 Web 应用\n\nSpring Boot 提供了 Web 启动器 `spring-boot-starter-web`，用于使用\
  \ Spring MVC 开发 Web 应用。Spring Boot 的自动配置会注册 Spring MVC 的 Bean，例如 `DispatcherServlet`、`ViewResolver`、`ExceptionHandler`\
  \ 等。你可以将 Spring Boot Web 应用开发为 JAR 类型的模块（使用内嵌 Servlet 容器），或 WAR 类型的模块（可部署在任何外部 Servlet\
  \ 容器上）。\n\n```\norg.springframework.boot\nspring-boot-starter-web\n\n```\n\n`spring-boot-starter-web`\
  \ 启动器默认将 `DispatcherServlet` 配置到 URL 模式 `\"/\"`，并添加 Tomcat 作为内嵌 Servlet 容器，运行在 8080\
  \ 端口。\n\nSpring Boot 默认从以下 `CLASSPATH` 位置提供静态资源（HTML、CSS、JS、图片等）：\n\n*   `/static`\n\
  *   `/public`\n*   `/resources`\n*   `/META-INF/resources`\n\n除了这些位置，你还可以使用 WebJars（[`http://www.webjars.org/`](http://www.webjars.org/)）来提供静态资源。Spring\
  \ Boot 会自动处理对 `/webjars/` 路径的请求，并从 WebJars 的 JAR 文件中提供资源。你可以通过在 `application.properties`\
  \ 文件中配置 `spring.resources.staticLocations` 属性来覆盖静态资源的位置。\n\n```\nspring.resources.staticLocations=classpath:/assets/\n\
  ```\n\n现在，你将学习如何创建一个 Spring Boot Web 项目，显示一个简单的 HTML 页面，并使用 CSS 和图片等静态资源。Bootstrap（[`http://getbootstrap.com/`](http://getbootstrap.com/)）是一个流行的\
  \ CSS 框架。本示例通过 WebJars 将 Bootstrap CSS 添加到项目中。\n\n1.  创建一个包含 Web 启动器的 Spring Boot\
  \ Maven 项目，并添加 Bootstrap WebJars 依赖。\n\n    ```\n\n    org.springframework.boot\n\
  \    spring-boot-starter-web\n\n    org.webjars.bower\n    bootstrap\n    3.3.7\n\
  \n    ```\n\n2.  在 `src/main/resources/static/css` 文件夹中创建 `styles.css` 样式表。\n\n\
  \    ```\n    body {\n    background-color: #A7A5A4;\n    padding-top: 50px;\n \
  \   }\n    ```\n\n3.  将一张图片（例如 `spring-boot.png`）复制到 `src/main/resources/static/images`\
  \ 文件夹中。  \n4.  在 `src/main/resources/public` 文件夹中创建 `index.html` 文件，并将 `bootstrap.css`\
  \ 添加到 `index.html` 文件中。使用 Bootstrap 导航栏组件。\n\n    ```\n\n    Home\n\n    Toggle\
  \ navigation\n\n    Project name\n\n    Home\n    About\n    Contact\n\n    Hello\
  \ World!!\n\n    ```\n\n5.  创建一个应用程序入口点类。\n\n    ```\n    @SpringBootApplication\n\
  \    public class SpringbootWebDemoApplication\n    {\n    public static void main(String[]\
  \ args)\n    {\n    SpringApplication.run(SpringbootWebDemoApplication.class, args);\n\
  \    }\n    }\n    ```\n\n现在运行 `SpringbootWebDemoApplication` 并导航到 `http://localhost:8080/`。你应该能够看到带有\
  \ Bootstrap 导航栏的网页，如图 10-2 所示。\n\n![A447991_1_En_10_Fig2_HTML.jpg](img/A447991_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2.\n\n使用 WebJars 集成 Bootstrap 组件的网页\n\n默认情况下，Spring Boot Web 启动器使用 Tomcat\
  \ 作为内嵌 Servlet 容器，并运行在 8080 端口。但是，你可以通过在 `application.properties` 中使用 `server.*`\
  \ 来自定义服务器属性。\n\n```\nserver.port=9090\nserver.servlet.context-path=/demo\nserver.servlet.path=/app\n\
  ```\n\n通过这些自定义配置，`DispatcherServlet` 被配置为处理 URL 模式 `/app`，根 `contextPath` 将是 `/demo`，Tomcat\
  \ 现在运行在端口 `9090` 上。因此，你可以通过 `http://localhost:9090/demo/app/` 访问 `index.html` 文件。\n\
  \n## 使用 Tomcat、Jetty 和 Undertow 内嵌 Servlet 容器\n\n如前所述，Spring Boot Web 启动器默认包含 Tomcat\
  \ 作为内嵌 Servlet 容器。不过，你可以使用其他 Servlet 容器（如 Jetty 或 Undertow）来代替 Tomcat。\n\n要使用 Jetty\
  \ 作为内嵌容器，你只需排除 `spring-boot-starter-tomcat` 并添加 `spring-boot-starter-jetty`。\n\n\
  ```\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
  spring-boot-starter-tomcat\n\norg.springframework.boot\nspring-boot-starter-jetty\n\
  \n```\n\nUndertow（[`http://undertow.io/`](http://undertow.io/)）是一个用 Java 编写的 Web\
  \ 服务器。它提供了基于 NIO 的阻塞和非阻塞 API。Spring Boot 也为 Undertow 服务器提供了自动配置支持。与 Jetty 类似，你可以按如下方式配置\
  \ Spring Boot 使用 Undertow 内嵌服务器代替 Tomcat：\n\n```\norg.springframework.boot\nspring-boot-starter-web\n\
  \nspring-boot-starter-tomcat\norg.springframework.boot\n\norg.springframework.boot\n\
  spring-boot-starter-undertow\n\n```\n\n你可以分别使用 `server.tomcat.*`、`server.jetty.*`\
  \ 和 `server.undertow.*` 属性来自定义 Tomcat、Jetty 和 Undertow Servlet 容器的各种属性。\n\n```\n\
  server.tomcat.accesslog.directory=logs # 创建日志文件的目录。\nserver.tomcat.accesslog.enabled=false\
  \ # 启用访问日志。\nserver.tomcat.accesslog.file-date-format=.yyyy-MM-dd # 日志文件名中的日期格式。\n\
  server.tomcat.basedir= # Tomcat 基础目录。如果未指定，将使用临时目录。\nserver.tomcat.max-connections=\
  \ # 服务器在任何给定时间将接受和处理的最大连接数。\nserver.tomcat.max-http-header-size=0 # HTTP 消息头的最大大小（字节）。\n\
  server.tomcat.max-http-post-size=0 # HTTP POST 内容的最大大小（字节）。\nserver.tomcat.max-threads=0\
  \ # 最大工作线程数。\nserver.tomcat.min-spare-threads=0 # 最小工作线程数。\nserver.tomcat.port-header=X-Forwarded-Port\
  \ # 用于覆盖原始端口值的 HTTP 头名称。\nserver.jetty.acceptors= # 要使用的接收器线程数。\nserver.jetty.accesslog.append=false\
  \ # 追加到日志。\nserver.jetty.accesslog.date-format=dd/MMM/yyyy:HH:mm:ss Z\nserver.jetty.accesslog.enabled=false\
  \ # 启用访问日志。\nserver.jetty.accesslog.filename= # 日志文件名。如果未指定，日志将被重定向到 \"System.err\"\
  。\nserver.jetty.accesslog.log-cookies=false # 启用请求 cookie 的日志记录。\nserver.jetty.accesslog.log-latency=false\
  \ # 启用请求处理时间的日志记录。\nserver.jetty.max-http-post-size=0 # HTTP POST 或 PUT 内容的最大大小（字节）。\n\
  server.undertow.accesslog.dir= # Undertow 访问日志目录。\nserver.undertow.accesslog.enabled=false\
  \ # 启用访问日志。\nserver.undertow.accesslog.rotate=true # 启用访问日志轮转。\nserver.undertow.accesslog.suffix=log\
  \ # 日志文件名的后缀。\nserver.undertow.buffer-size= # 每个缓冲区的大小（字节）。\nserver.undertow.io-threads=\
  \ # 为工作线程创建的 I/O 线程数。\nserver.undertow.max-http-post-size=0 # HTTP POST 内容的最大大小（字节）。\n\
  ```\n\n使用 `org.springframework.boot.autoconfigure.web.ServerProperties` 类可以查看服务器自定义属性的完整列表。\n\
  \n\n\n## 自定义嵌入式 Servlet 容器\n\nSpring Boot 提供了大量自定义选项，可通过 `server.*` 属性配置 Servlet\
  \ 容器。你可以在 `application.properties` 中配置这些属性，以自定义 `port`、`connectionTimeout`、`contextPath`、SSL\
  \ 配置参数以及会话配置参数。\n\n但如果需要更多控制权，你可以根据要使用的嵌入式服务器，通过注册类型为 `TomcatServletWebServerFactory`、`JettyServletWebServerFactory`\
  \ 或 `UndertowServletWebServerFactory` 的 Bean，以编程方式注册嵌入式 Servlet 容器。\n\n需要以编程方式注册嵌入式\
  \ Servlet 容器的一个常见场景是将默认的 HTTP 请求重定向到 HTTPS 协议。\n\n假设你的应用程序运行在 `http://localhost:8080`\
  \ 上，并且你想使用 HTTPS 协议。如果有人访问 `http://localhost:8080`，你希望将请求重定向到 `https://localhost:8443`。\n\
  \n首先，使用以下命令生成自签名 SSL 证书：\n\n```\nkeytool -genkey -alias mydomain -keyalg RSA -keysize\
  \ 2048 -keystore KeyStore.jks -validity 3650\n```\n\n在回答 keytool 提出的问题后，它将生成一个 `KeyStore.jks`\
  \ 文件，并将其复制到 `src/main/resources` 文件夹中。\n\n现在，在 `application.properties` 文件中按如下方式配置\
  \ SSL 属性：\n\n```\nserver.port=8443\nserver.ssl.key-store=classpath:KeyStore.jks\n\
  server.ssl.key-store-password=mysecret\nserver.ssl.keyStoreType=JKS\nserver.ssl.keyAlias=mydomain\n\
  ```\n\n如果你使用的是 Tomcat 嵌入式容器，可以按清单 10-3 所示，以编程方式注册 `TomcatServletWebServerFactory`。\n\
  \n```\n@Configuration\npublic class TomcatConfiguration\n{\n@LocalServerPort\nint\
  \ serverPort;\n@Bean\npublic ServletWebServerFactory servletContainer() {\nTomcatServletWebServerFactory\
  \ tomcat = new TomcatServletWebServerFactory() {\n@Override\nprotected void postProcessContext(Context\
  \ context) {\nSecurityConstraint securityConstraint = new SecurityConstraint();\n\
  securityConstraint.setUserConstraint(\"CONFIDENTIAL\");\nSecurityCollection collection\
  \ = new SecurityCollection();\ncollection.addPattern(\"/*\");\nsecurityConstraint.addCollection(collection);\n\
  context.addConstraint(securityConstraint);\n}\n};\ntomcat.addAdditionalTomcatConnectors(initiateHttpConnector());\n\
  return tomcat;\n}\nprivate Connector initiateHttpConnector() {\nConnector connector\
  \ = new Connector(\"org.apache.coyote.http11.Http11NioProtocol\");\nconnector.setScheme(\"\
  http\");\nconnector.setPort(8080);\nconnector.setSecure(false);\nconnector.setRedirectPort(serverPort);\n\
  return connector;\n}\n}\n清单 10-3. 以编程方式注册 Tomcat 嵌入式容器\n```\n\n通过此自定义配置，对 `http://localhost:8080/`\
  \ 的请求将自动重定向到 `https://localhost:8443/`。\n\n## 自定义 SpringMVC 配置\n\n大多数情况下，Spring\
  \ Boot 的默认自动配置以及自定义属性足以调整你的 Web 应用程序。但有时，你可能需要以特定方式配置应用程序组件以满足应用需求，从而获得更多控制权。\n\n\
  如果你想利用 Spring Boot 的自动配置并添加一些额外的 MVC 配置（拦截器、格式化器、视图控制器等），那么你可以创建一个不带 `@EnableWebMvc`\
  \ 注解的配置类，该类实现 `WebMvcConfigurer` 并提供额外的配置。参见清单 10-4。\n\n注意\n\n如果你想完全控制 Spring MVC\
  \ 配置，可以添加一个使用 `@EnableWebMvc` 注解的自定义配置类。如果你创建了一个带有 `@Configuration` 和 `@EnableWebMvc`\
  \ 注解的配置类，Spring Boot 的 WebMVC 自动配置将完全关闭。\n\n```\n@Configuration\npublic class WebConfig\
  \ implements WebMvcConfigurer\n{\n@Override\npublic void addViewControllers(ViewControllerRegistry\
  \ registry){\nregistry.addViewController(\"/login\").setViewName(\"public/login\"\
  );\nregistry.addRedirectViewController(\"/\", \"/home\");\n}\n@Override\npublic\
  \ void addInterceptors(InterceptorRegistry registry) {\n//在此处添加额外的拦截器\n}\n@Override\n\
  public void addResourceHandlers(ResourceHandlerRegistry registry) {\nregistry.addResourceHandler(\"\
  /assets/\").addResourceLocations(\"/resources/assets/\");\n}\n@Override\npublic\
  \ void configureDefaultServletHandling(DefaultServletHandlerConfigurer configurer)\
  \ {\nconfigurer.enable();\n}\n@Override\npublic void addFormatters(FormatterRegistry\
  \ registry) {\n//在此处添加额外的格式化器\n}\n}\n清单 10-4. 自定义 SpringMVC 配置\n```\n\nSpringMVC\
  \ 提供了 `WebMvcConfigurerAdapter`，它是 `WebMvcConfigurer` 接口的一个实现。但从 Spring 5.0 开始，`WebMvcConfigurerAdapter`\
  \ 已被弃用，因为 `WebMvcConfigurer` 具有默认方法实现，并使用了 Java 8 的默认方法支持。\n\n\n\n## 将 Servlet、Filter\
  \ 和 Listener 注册为 Spring Bean\n\n你可以通过使用 `ServletRegistrationBean`、`FilterRegistrationBean`\
  \ 和 `ServletListenerRegistrationBean` 的 Bean 定义来注册 Servlet、Filter 和 Listener。\n\n\
  假设你创建了清单 10-5 中所示的 Servlet，并使用 `@Component` 注解将其标记为 Spring Bean。\n\n```\n@Component\n\
  public class MyServlet extends HttpServlet\n{\n@Autowired\nprivate UserService userService;\n\
  @Override\nprotected void doGet(HttpServletRequest req, HttpServletResponse resp)\n\
  throws ServletException, IOException {\nresp.getWriter().write(userService.getMessage());\n\
  }\n}\n清单 10-5.\n使用 @Component 注解将 MyServlet 定义为 Spring Bean\n```\n\n现在，你可以使用 `ServletRegistrationBean`\
  \ 注册 `MyServlet`，并将其映射到 URL 模式 `/myServlet`，如清单 10-6 所示。\n\n```\n@Configuration\n\
  public class WebMvcConfig implements WebMvcConfigurer\n{\n@Autowired\nprivate MyServlet\
  \ myServlet;\n@Bean\npublic ServletRegistrationBean myServletBean()\n{\nServletRegistrationBean\
  \ servlet = new ServletRegistrationBean();\nservlet.setServlet(myServlet);\nservlet.addUrlMappings(\"\
  /myServlet\");\nreturn servlet;\n}\n...\n...\n}\n清单 10-6.\n使用 ServletRegistrationBean\
  \ 注册 MyServlet\n```\n\n通过这种方法，你可以利用 Spring 的依赖注入功能来处理 Servlet、Filter 和 Listener。接下来，我们看看如何注册\
  \ Filter 和 Listener。\n\nJavaMelody ( [`https://github.com/javamelody/javamelody/wiki`](https://github.com/javamelody/javamelody/wiki)\
  \ ) 是一个可用于监控基于 Java 的 Web 应用程序的库。JavaMelody 可以提供关于运行中应用程序的各种指标，包括：\n\n*   一个摘要，显示总执行次数、平均执行时间、CPU\
  \ 时间和错误百分比。\n*   当平均时间超过可配置阈值时，请求所花费的时间百分比。\n*   完整的请求列表，聚合了无动态参数的请求，包含执行次数、平均执行时间、平均\
  \ CPU 时间、错误百分比以及执行时间随时间变化的趋势图。\n*   每个 HTTP 请求都指示了流量响应的大小、SQL 平均执行次数和 SQL 平均时间。\n\
  \n将 JavaMelody 集成到 Java Web 应用程序中非常简单。你需要注册 `net.bull.javamelody.MonitoringFilter`（这是一个\
  \ Filter）和 `net.bull.javamelody.SessionListener`（这是一个 `HttpSessionListener`）。\n\n\
  清单 10-7 展示了如何使用 `FilterRegistrationBean` 和 `ServletListenerRegistrationBean` 将 JavaMelody\
  \ 的 `MonitoringFilter` 和 `SessionListener` 配置为 Spring Bean。\n\n```\n@Configuration\n\
  public class WebMvcConfig implements WebMvcConfigurer\n{\n@Bean(name = \"javamelodyFilter\"\
  )\npublic FilterRegistrationBean javamelodyFilterBean() {\nFilterRegistrationBean\
  \ registration = new FilterRegistrationBean();\nregistration.setFilter(new MonitoringFilter());\n\
  registration.addUrlPatterns(\"/*\");\nregistration.setName(\"javamelodyFilter\"\
  );\nregistration.setAsyncSupported(true);\nregistration.setDispatcherTypes(DispatcherType.REQUEST,\
  \ DispatcherType.ASYNC);\nreturn registration;\n}\n@Bean(name = \"javamelodySessionListener\"\
  )\npublic ServletListenerRegistrationBean sessionListener() {\nreturn new ServletListenerRegistrationBean(new\
  \ SessionListener());\n}\n}\n清单 10-7.\n注册 JavaMelody 的 MonitoringFilter 和 SessionListener\n\
  ```\n\n通过此配置，你可以启动应用程序，并在 `http://localhost:8080/monitoring` 查看 JavaMelody 的监控仪表盘。参见图\
  \ 10-3。\n\n![A447991_1_En_10_Fig3_HTML.jpg](img/A447991_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3.\n\nJavaMelody 监控仪表盘\n\n## 作为可部署 WAR 的 Spring Boot Web 应用程序\n\nSpring Boot\
  \ Web 应用程序也可以使用 WAR 类型打包进行开发。如果要构建一个可部署的 WAR 文件，首先要做的就是更改 `packaging` 类型。\n\n如果你使用\
  \ Maven，则在 `pom.xml` 中将 `packaging` 类型更改为 `war`。\n\n```\nwar\n```\n\n如果你使用 Gradle，则需要应用\
  \ WAR 插件。\n\n```\napply plugin: 'war'\n```\n\n当你添加 `spring-boot-starter-web` 依赖时，它也会传递性地添加\
  \ `spring-boot-starter-tomcat` 依赖。因此，你需要将 `spring-boot-starter-tomcat` 添加为 `provided`\
  \ 作用域，这样它就不会被打包到 WAR 文件中。\n\n```\norg.springframework.boot\nspring-boot-starter-tomcat\n\
  provided\n\n```\n\n如果你使用 Gradle，则按如下方式添加 `providedRuntime` 作用域的 `spring-boot-starter-tomcat`：\n\
  \n```\ndependencies {\n...\nprovidedRuntime 'org.springframework.boot:spring-boot-starter-tomcat'\n\
  ...\n}\n```\n\n最后，你需要提供一个 `SpringBootServletInitializer` 的子类，并重写其 `configure()`\
  \ 方法。你可以简单地让应用程序的入口点类继承 `SpringBootServletInitializer`，如清单 10-8 所示。\n\n```\n@SpringBootApplication\n\
  public class SpringbootWebDemoApplication extends SpringBootServletInitializer {\n\
  @Override\nprotected SpringApplicationBuilder configure(SpringApplicationBuilder\
  \ application) {\nreturn application.sources(SpringbootWebDemoApplication.class);\n\
  }\npublic static void main(String[] args) throws Exception {\nSpringApplication.run(SpringbootWebDemoApplication.class,\
  \ args);\n}\n}\n清单 10-8.\n实现 SpringBootServletInitializer\n```\n\n现在，运行 Maven/Gradle\
  \ 构建工具将生成一个 WAR 文件，该文件可以部署到外部服务器上。\n\n## Spring Boot 支持的视图模板\n\nJava Server Pages\
  \ (JSP) 是传统基于 Java 的 Web 应用程序中最常用的视图模板技术。然而，出现了新的视图模板库，例如 Thymeleaf、Mustache 等，作为\
  \ JSP 的替代方案。\n\nSpring Boot 为以下视图模板技术提供了自动配置。\n\n*   Thymeleaf ( [`http://www.thymeleaf.org/`](http://www.thymeleaf.org/)\
  \ )\n*   Mustache ( [`http://mustache.github.io/`](http://mustache.github.io/) )\n\
  *   Groovy ( [`http://docs.groovy-lang.org/docs/next/html/documentation/template-engines.html#_the_markuptemplateengine`](http://docs.groovy-lang.org/docs/next/html/documentation/template-engines.html#_the_markuptemplateengine)\
  \ )\n*   FreeMarker ( [`http://freemarker.org/docs/`](http://freemarker.org/docs/)\
  \ )\n\n尽管 Spring MVC 支持 JSP，但在使用嵌入式 Servlet 容器的 Spring Boot 应用程序中使用 JSP 存在一些已知的限制\
  \ ( [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-jsp-limitations`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-jsp-limitations)\
  \ )。但 JSP 在 Spring Boot 的 WAR 类型模块中运行良好。\n\n\n\n### 使用 Thymeleaf 视图模板\n\nThymeleaf\
  \ 是一个服务端 Java 模板引擎，支持与 SpringMVC 和 SpringSecurity 集成。在众多支持的视图模板中，Thymeleaf 是 Spring\
  \ Boot 应用中最流行的一个。\n\n在本节中，你将了解如何在 Spring Boot Web 应用中使用 Thymeleaf。\n\n创建一个包含 `spring-boot-starter-thymeleaf`\
  \ 起步依赖的 Spring Boot Maven 项目。\n\n```\n\norg.springframework.boot\nspring-boot-starter-web\n\
  \norg.springframework.boot\nspring-boot-starter-thymeleaf\n\n```\n\n`ThymeleafAutoConfiguration`\
  \ 将负责注册 `TemplateResolver`、`ThymeleafViewResolver`、`SpringResourceTemplateResolver`\
  \ 和 `SpringTemplateEngine`。默认情况下，Spring Boot 从 `classpath:/templates/` 目录加载 Thymeleaf\
  \ 视图模板。\n\n现在创建一个控制器来处理 `\"/home\"` 请求。\n\n```\n@Controller\npublic class HomeController\n\
  {\n@GetMapping(\"/home\")\npublic String home(Model model) {\nmodel.addAttribute(\"\
  message\", \"Spring Boot + Thymeleaf rocks\");\nreturn \"home\";\n}\n}\n```\n\n\
  此示例将字符串 `\"Spring Boot + Thymeleaf rocks\"` 添加到模型中，键为 `\"message\"`，你希望在 Thymeleaf\
  \ 模板中渲染该值。\n\n在 `src/main/resources/templates` 目录中创建名为 `home.html` 的 Thymeleaf 视图。\n\
  \n```\n\nHome\n\nWelcome \nMessage\n\n```\n\n这将使用 `th:text=\"${message}\"` 在 Thymeleaf\
  \ 模板中显示模型属性 `\"message\"` 的值。\n\n现在运行以下入口点类。\n\n```\n@SpringBootApplication\npublic\
  \ class SpringbootThymeleafDemoApplication\n{\npublic static void main(String[]\
  \ args)\n{\nSpringApplication.run(SpringbootThymeleafDemoApplication.class, args);\n\
  }\n}\n```\n\n在浏览器中访问 `http://localhost:8080/home`。你应该能看到响应 `Spring Boot + Thymeleaf\
  \ rocks`。\n\n\n\n### 使用 Thymeleaf 表单\n\nThymeleaf 提供了非常出色的 Spring 集成，支持以下功能：\n\n\
  *   使用带有支持 bean 和结果/错误绑定的表单\n*   使用属性编辑器和转换服务\n*   使用 ResourceBundle 显示国际化（i18n）消息\n\
  *   使用 Spring 表达式语言（Spring EL）\n\n在本节中，你将看到如何使用 Thymeleaf 创建用户注册表单，并使用 Spring 控制器处理表单提交。\n\
  \n创建一个名为 `User.java` 的简单 POJO，如清单 10-9 所示。\n\n```\npublic class User\n{\nprivate\
  \ Long id;\nprivate String name;\nprivate String email;\nprivate String password;\n\
  //setters & getters\n}\n清单 10-9.\nUser.java\n```\n\n在 `src/main/resources/templates`\
  \ 目录中创建 `registration.html` 文件，如清单 10-10 所示。\n\n```\n\n用户注册\n\n用户注册表单\n\n姓名\n\n\
  电子邮件\n\n密码\n\n提交\n\n清单 10-10.\nThymeleaf 注册视图 src/main/resources/templates/registration.html\n\
  ```\n\n创建一个 SpringMVC 控制器来处理对 `/registration` URL 的 `GET` 和 `POST` 请求，如清单 10-11\
  \ 所示。\n\n```\n@Controller\npublic class RegistrationController\n{\n@GetMapping(\"\
  /registration\")\npublic String registrationForm(Model model) {\nmodel.addAttribute(\"\
  user\", new User());\nreturn \"registration\";\n}\n@PostMapping(\"/registration\"\
  )\npublic String handleRegistration(User user) {\nlogger.debug(\"Registering User\
  \ : \"+user);\nreturn \"redirect:/login\";\n}\n}\n清单 10-11.\nRegistrationController.java\n\
  ```\n\n当你请求 `\"/registration\"` URL 时，会触发一个 `GET` 请求，并由 `RegistrationController.registrationForm()`\
  \ 方法处理。你将 `User` 对象以 `\"user\"` 键添加到 `Model` 中，以便可以在 Thymeleaf 表单中绑定表单属性。\n\n请注意，此示例使用了两个\
  \ Thymeleaf 属性——`th:action` 用于构建上下文相关的 URL，`th:object` 用于指定模型属性名称。\n\n```\n...\n\
  ...\n\n```\n\n该示例对表单输入字段使用了 `th:field=\"*{propertyName}\"` 语法，以便该字段将由模型对象属性支持。因此，当你使用\
  \ `<input type=\"text\" th:field=\"*{name}\"/>` 时，`name` 输入字段值将绑定到 `user.name` 属性。如果你查看渲染后表单的源代码，`<input\
  \ type=\"text\" th:field=\"*{name}\"/>` 会被渲染如下：\n\n```\n\n表单验证\n\n验证用户提交的数据在 Web\
  \ 应用程序中至关重要。\nSpring 使用其自身的验证框架支持数据验证，\n并支持 Java Bean 验证 API。\n\n首先，你需要使用 Java Bean\n\
  验证注解指定用户验证规则。\n\n```\npublic class User\n{\nprivate Long id;\n@NotNull\n@Size(min=3,\
  \ max=50)\nprivate String name;\n@NotNull\n@Email(message=\"{invalid.email}\")\n\
  private String email;\n@NotNull\n@Size(min=6, max=50)\nprivate String password;\n\
  //setters & getters\n}\n```\n\nThymeleaf 提供了 `#fields.hasErrors('fieldName')` 语法\n\
  来检查 `fieldName` 字段是否存在任何错误。\n\n```\n数据不正确\n```\n\n你可以使用 `#fields.hasErrors('global')`\n\
  来检查是否存在任何全局错误（与任何特定字段无关）。\n\n你现在可以更新 `registration.html` 以\n显示验证错误，如清单 10-12 所示。\n\
  \n```\n\n用户注册\n\n用户注册表单\n\n数据不正确\n\n姓名\n\n数据不正确\n\n电子邮件\n\n数据不正确\n\n密码\n\n数据不正确\n\
  \n提交\n\n清单 10-12.\n包含验证错误标签的 registration.html 文件\n```\n\n使用此更新后的表单，如果存在任何表单验证失败，它将在字段旁边显示这些错误，并在开头显示所有全局错误。请注意，此示例使用\
  \ `th:classappend=\"${#fields.hasErrors('email')}? 'has-error'\"` 在存在任何错误时动态添加一些\
  \ CSS 样式。\n\n你需要更新 `\"/registration\" POST` 处理程序方法以触发模型对象的验证。你可以向模型参数添加 `@Valid`\
  \ 注解以在表单提交时执行验证。\n\n你还需要在模型对象之后立即定义 `BindingResult` 参数。验证错误将填充到 `BindingResult`\
  \ 中，你可以在方法体中稍后检查它。\n\n```\n@Controller\npublic class RegistrationController\n{\n\
  ...\n...\n@PostMapping(\"/registration\")\npublic String handleRegistration(@Valid\
  \ User user, BindingResult result) {\nlogger.debug(\"Registering User : \"+user);\n\
  if(result.hasErrors()){\nreturn \"registration\";\n}\nreturn \"redirect:/registrationsuccess\"\
  ;\n}\n}\n```\n\n当使用无效数据提交表单时，这些验证错误将填充到 `BindingResult` 中。该示例检查是否存在任何错误，并重新显示注册表单，该表单将连同错误一起渲染。\n\
  \n有时，你无法仅使用注解来表达所有验证规则。例如，你希望用户电子邮件是唯一的。如果不检查数据库，你就无法实现这一点。\n\n接下来，你将看到如何使用 Spring\
  \ 的验证框架来实现复杂的验证。\n\n你可以通过实现 `org.springframework.validation.Validator` 接口来创建 `UserValidator`，如清单\
  \ 10-13 所示。\n\n```\n@Component\npublic class UserValidator implements Validator\n\
  {\n@Autowired\nUserRepository userRepository;\n@Override\npublic boolean supports(Class\
  \ clazz)\n{\nreturn User.class.isAssignableFrom(clazz);\n}\n@Override\npublic void\
  \ validate(Object target, Errors errors)\n{\nUser user = (User) target;\nString\
  \ email = user.getEmail();\nUser userByEmail = userRepository.findByEmail(email);\n\
  if(userByEmail != null){\nerrors.rejectValue(\"email\",\n\"email.exists\",\nnew\
  \ Object[]{email},\n\"Email \"+email+\" already in use\");\n}\n}\n}\n清单 10-13.\n\
  UserValidator.java\n```\n\n在 `validate(Object target, Errors errors)` 方法中，你可以实现任何复杂的验证逻辑并注册错误。\n\
  \n现在，你可以将 `UserValidator` 注入到 `RegistrationController` 中，并使用它来验证模型对象，如下所示：\n\n```\n\
  @Controller\npublic class RegistrationController\n{\n@Autowired\nprivate UserValidator\
  \ userValidator;\n@PostMapping(\"/registration\")\npublic String handleRegistration(@Valid\
  \ User user, BindingResult result) {\nuserValidator.validate(user, result);\nif(result.hasErrors()){\n\
  return \"registration\";\n}\nreturn \"redirect:/registrationsuccess\";\n}\n}\n```\n\
  \n当表单随后被提交时，如果根据 Bean 验证约束注解存在任何验证失败，它们将填充到 `BindingResult` 中。之后，该示例使用 `userValidator.validate(user,\
  \ result)` 检查重复的电子邮件。如果给定的电子邮件已存在，这将向 `email` 属性添加一个错误。\n\n文件上传\n\nSpring Boot 的\
  \ `org.springframework.boot.autoconfigure.web.servlet.MultipartAutoConfiguration`\
  \ 默认启用多部分上传。\n\n你可以创建一个带有 `enctype=\"multipart/form-data\"` 的表单来上传文件，如清单 10-14 所示。\n\
  \n```\n\n清单 10-14.\n文件上传表单\n```\n\n然后，你可以实现 `FileUploadController` 来处理请求，如清单 10-15\
  \ 所示。\n\n```\n@PostMapping(\"/uploadMyFile\")\npublic String handleFileUpload(@RequestParam(\"\
  myFile\") MultipartFile file)\n{\nif (!file.isEmpty())\n{\nString name = file.getOriginalFilename();\n\
  try\n{\nbyte[] bytes = file.getBytes();\nFiles.write(new File(name).toPath(), bytes);\n\
  }\ncatch (Exception e)\n{\ne.printStackTrace();\n}\n}\nreturn \"redirect:/fileUpload\"\
  ;\n}\n清单 10-15.\nFileUploadController.java\n```\n\n请注意，此示例将 `file` 类型的输入参数 `myFile`\
  \ 绑定到 `MultipartFile` 参数，使用 `@RequestParam(\"myFile\")`，从中你可以提取 `byte[]` 或 `InputStream`。\n\
  \n你可以使用以下属性自定义多部分配置：\n\n```\nspring.servlet.multipart.enabled=true\nspring.servlet.multipart.max-file-size=2MB\n\
  spring.servlet.multipart.max-request-size=20MB\nspring.servlet.multipart.file-size-threshold=5MB\n\
  ```\n\n使用 ResourceBundle 进行国际化（i18n）\n\n默认情况下，Spring Boot 的 `org.springframework.boot.autoconfigure.context.MessageSourceAutoConfiguration`\
  \ 会注册一个基础名称为 `\"messages\"` 的 `MessageSource` bean。\n\n你可以在根类路径中添加诸如 `messages.properties`、`messages_en.properties`\
  \ 和 `messages_fr.properties` 之类的 ResourceBundle，Spring Boot 会自动拾取它们。你还可以使用 `spring.messages.basename`\
  \ 属性自定义 ResourceBundle 的 `basename`。\n\n除此之外，Spring Boot 还提供了以下自定义属性。\n\n```\nspring.messages.basename=messages\n\
  spring.messages.cache-seconds=-1(缓存过期时间（秒）。如果设置为 -1，则捆绑包将永久缓存)\nspring.messages.encoding=UTF-8\n\
  spring.messages.fallback-to-system-locale=true\n```\n\n在 `src/main/resources/` 文件夹中创建默认的\
  \ ResourceBundle `messages.properties`，如下所示：\n\n```\napp.title=SpringBoot Thymeleaf\
  \ Demo\napp.version=1.0\nemail.exists=Email {0} is already in use.\n```\n\n你可以使用\
  \ `th:text=\"#{msgKey}\"` 在 Thymeleaf 模板中渲染这些值。\n\n```\n应用标题\n```\n\n你还可以从 `MessageSource`\
  \ 以编程方式获取这些消息，如清单 10-16 所示。\n\n```\n@Controller\npublic class RegistrationController\n\
  {\n@Autowired\nprivate MessageSource messageSource;\n....\n....\npublic String handleRegistration(User\
  \ user)\n{\n...\nString code=\"email.exists\";\nObject[] args = new Object[]{email};\n\
  String defaultMsg = \"Email \"+email+\" already in use\";\nLocale locale = Locale.getDefault();\n\
  String errorMsg =\nmessageSource.getMessage(code, args, defaultMsg, locale);\n...\n\
  }\n}\n清单 10-16.\n以编程方式读取 i18n 消息\n```\n\n用于 Hibernate 验证错误的 ResourceBundle\n\nSpring\
  \ Boot 使用 Hibernate Validator 作为 Bean 验证 API 的实现。默认情况下，Hibernate 验证会在根类路径中查找 `ValidationMessages.properties`\
  \ 文件以获取失败消息键。如果你想将 `messages.properties` 同时用于 i18n 和 Hibernate 验证错误消息，你可以注册 `Validator`\
  \ bean，如清单 10-17 所示。\n\n```\n@Configuration\npublic class WebConfig implements WebMvcConfigurer\n\
  {\n...\n...\n@Autowired\nprivate MessageSource messageSource;\n@Override\npublic\
  \ Validator getValidator() {\nLocalValidatorFactoryBean factory = new LocalValidatorFactoryBean();\n\
  factory.setValidationMessageSource(messageSource);\nreturn factory;\n}\n}\n清单 10-17.\n\
  为 Hibernate 验证消息使用 MessageSource\n```\n\n使用此配置，国际化（i18n）和 Hibernate 验证错误消息键都将从 `messages*.properties`\
  \ 文件中获取。\n\n错误处理\n\n你可以通过注册 `SimpleMappingExceptionResolver` bean 并配置为哪种异常类型渲染哪个视图来处理\
  \ Spring MVC 应用程序中的异常，如清单 10-18 所示。\n\n```\n@Configuration\n@EnableWebMvc\npublic\
  \ class WebMvcConfig implements WebMvcConfigurer\n{\n@Bean(name=\"simpleMappingExceptionResolver\"\
  )\npublic SimpleMappingExceptionResolver simpleMappingExceptionResolver()\n{\nSimpleMappingExceptionResolver\
  \ exceptionResolver = new SimpleMappingExceptionResolver();\nProperties mappings\
  \ = new Properties();\nmappings.setProperty(\"DataAccessException\", \"dbError\"\
  );\nmappings.setProperty(\"RuntimeException\", \"error\");\nexceptionResolver.setExceptionMappings(mappings);\n\
  exceptionResolver.setDefaultErrorView(\"error\");\nreturn exceptionResolver;\n}\n\
  }\n清单 10-18.\n使用 SimpleMappingExceptionResolver 处理异常\n```\n\n你还可以使用 `@ExceptionHandler`\
  \ 注解为特定的异常类型定义处理程序方法，如清单 10-19 所示。\n\n```\n@Controller\npublic class CustomerController\n\
  {\n@GetMapping(\"/customers/{id}\")\npublic String findCustomer(@PathVariable Long\
  \ id, Model model)\n{\nCustomer c = customerRepository.findById(id);\nif(c == null)\
  \ throw new CustomerNotFoundException();\nmodel.add(\"customer\", c);\nreturn \"\
  view_customer\";\n}\n@ExceptionHandler(CustomerNotFoundException.class)\npublic\
  \ ModelAndView handleCustomerNotFoundException(CustomerNotFoundException ex)\n{\n\
  ModelAndView model = new ModelAndView(\"error/404\");\nmodel.addObject(\"exception\"\
  , ex);\nreturn model;\n}\n}\n清单 10-19.\n使用控制器级别的 @ExceptionHandler 处理异常\n```\n\n\
  `CustomerController` 中的 `handleCustomerNotFoundException()` 方法将仅处理从 `CustomerController\
  \ @RequestMapping` 方法中抛出的 `CustomerNotFoundException` 异常。\n\n你可以通过创建一个使用 `@ControllerAdvice`\
  \ 注解的异常处理程序类来全局处理异常。`@ControllerAdvice` 类中的 `@ExceptionHandler` 方法处理在任何控制器请求处理方法中发生的错误。参见清单\
  \ 10-20。\n\n```\n@ControllerAdvice\npublic class GlobalExceptionHandler\n{\nprivate\
  \ static final Logger logger = LoggerFactory.getLogger(GlobalExceptionHandler.class);\n\
  @ExceptionHandler(DataAccessException.class)\npublic String handleDataAccessException(HttpServletRequest\
  \ request, DataAccessException ex){\nlogger.info(\"DataAccessException Occurred::\
  \ URL=\"+request.getRequestURL());\nreturn \"db_error\";\n}\n@ExceptionHandler(ServletRequestBindingException.class)\n\
  public String servletRequestBindingException(ServletRequestBindingException e) {\n\
  logger.error(\"ServletRequestBindingException occurred: \"+e.getMessage());\nreturn\
  \ \"validation_error\"\n}\n}\n清单 10-20.\n使用 @ControllerAdvice 的全局异常处理程序\n```\n\n\
  Spring Boot 默认注册一个全局错误处理程序并映射 `/error`，它为浏览器客户端渲染 HTML 响应，为 REST 客户端渲染 JSON 响应。你可以通过实现\
  \ `ErrorController` 提供自定义错误页面。参见清单 10-21。\n\n```\n@Controller\npublic class GenericErrorController\
  \ implements ErrorController\n{\nprivate static final String ERROR_PATH = \"/error\"\
  ;\n@RequestMapping(ERROR_PATH)\npublic String error(){\nreturn \"errorPage.html\"\
  ;\n}\n@Override\npublic String getErrorPath() {\nreturn ERROR_PATH;\n}\n}\n清单 10-21.\n\
  实现自定义 ErrorController\n```\n\n你还可以根据 HTTP 错误状态码提供自定义错误页面。Spring Boot 在静态资源位置（`classpath:/static`、`classpath:/public`\
  \ 等）下的 `/error` 文件夹中查找错误页面。\n\n例如，当发生 404 错误时，你可以显示 `src/main/resources/static/error/404.html`\
  \ 文件。同样，你也可以为所有带有 `5xx` 错误状态码的服务器错误显示 `src/main/resources/static/error/5xx.html`\
  \ 文件。\n\n总结\n\n本章讨论了如何使用 Spring Boot 和 Thymeleaf 视图模板开发 Web 应用程序。还介绍了如何使用 Bean 验证\
  \ API 和 Spring 的验证框架执行表单验证。你学习了如何在控制器级别和全局级别处理异常场景。在下一章中，你将学习如何使用 Spring Boot 开发\
  \ RESTful Web 服务。\n\n11. 使用 Spring Boot 构建 REST API\n\nREST（表述性状态转移）是一种用于构建分布式系统的架构风格，它提供了异构系统之间的互操作性。随着移动设备的急剧增加，对\
  \ REST API 的需求大大增加。构建 REST API 并让 Web 和移动客户端消费该 API，而不是开发单独的应用程序，这变得合乎逻辑。\n\nSpringMVC\
  \ 为构建 RESTful Web 服务提供了一流的支持。由于 Spring 的 REST 支持是构建在 SpringMVC 之上的，你可以利用 SpringMVC\
  \ 的知识来构建 REST API。\n\nSpring Data REST 是一个 Spring 组合项目，可用于将 Spring Data 存储库公开为 REST\
  \ 端点。你可以毫不费力地将 Spring Data JPA、Spring Data Mongo 和 Spring Data Cassandra 存储库公开为\
  \ REST 端点。\n\n本章涵盖 RESTful Web 服务，包括如何使用 SpringMVC 构建 REST API。然后你将学习如何使用 Spring\
  \ Data REST 构建 REST API。\n\nRESTful Web 服务简介\n\nREST 代表表述性状态转移，是一种用于设计分布式超媒体系统的架构风格。REST\
  \ 一词由 Roy Fielding 于 2000 年在他的博士论文中提出，你可以在以下网址找到： [`http://www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%7Efielding/pubs/dissertation/rest_arch_style.htm)\
  \ 。\n\n基于 REST 的系统的基本概念是资源，它可以通过统一资源标识符（URI）来标识。对于基于 Web 的系统，HTTP 是与外部系统通信最常用的协议。你可以使用\
  \ URI 标识唯一的资源。\n\n例如，一篇博客文章可以通过 URI [`http://www.myblog.com/posts/restful-architecture`](http://www.myblog.com/posts/restful-architecture)\
  \ 来标识。资源可以是集合资源，它表示一组分组的资源。例如，URI [ `http://www.myblog.com/posts/`\n](http://www.myblog.com/posts/)\
  \ 表示 `posts` 资源，它可能包含零个或多个 `Post` 资源，每个资源都可以通过其自己的 URI 来标识。可以对资源执行的各种操作可以使用其 URI\
  \ 以及适当的 HTTP 方法（`GET`、`POST`、`PUT`、`DELETE` 等）来表达。\n\n例如，假设你正在为博客应用程序构建 REST API。在博客域中可以标识的资源是文章、评论和用户。\n\
  \n遵循 REST 原则，你可以使用以下 HTTP 动词：\n\n*   `GET`—获取集合或单个资源\n*   `POST`—创建新资源\n*   `PUT`—更新现有资源\n\
  *   `DELETE`—删除集合或单个资源\n\n现在考虑如何为博客系统的资源定义 URI：\n\n*   `GET`—`http://localhost:8080/myblog/posts/`：返回所有文章的列表\n\
  *   `GET`—`http://localhost:8080/myblog/posts/2`：返回 ID 为 2 的文章\n*   `POST`—`http://localhost:8080/myblog/posts/`：创建一个新的\
  \ `Post` 资源\n*   `PUT`—`http://localhost:8080/myblog/posts/2`：更新 ID 为 2 的 POST 资源\n\
  *   `DELETE`—`http://localhost:8080/myblog/posts/2`：删除 ID 为 2 的 POST 资源\n*   `GET`—`http://localhost:8080/myblog/posts/2/comments`：返回\
  \ ID 为 `2` 的文章的所有评论\n*   `POST`—`http://localhost:8080/myblog/posts/2/comments`：为\
  \ ID 为 2 的 `POST` 创建新评论\n*   `DELETE`—`http://localhost:8080/myblog/posts/2/comments`：删除\
  \ ID 为 2 的 `POST` 的所有评论\n\n最常用的数据交换格式（ContentTypes）是 JSON 和 XML。在基于 Web 的系统中，确定输入请求内容和输出响应类型的典型做法是基于\
  \ `ContentType` 和 `Accept` 标头值。\n\n使用 SpringMVC 的 REST API\n\nSpringMVC 为构建 RESTful\
  \ Web 服务提供支持，Spring Boot 通过其自动配置机制使其变得更加容易。\n\n清单 11-1 显示了一个基于 SpringMVC 的 REST\
  \ 端点。\n\n```\n@Controller\npublic class PostController\n{\n@Autowired\nPostRepository\
  \ postRepository;\n@ResponseBody\n@GetMapping(\"/posts\")\npublic List listPosts()\n\
  {\nreturn postRepository.findAll();\n}\n}\n清单 11-1.\nSpringMVC REST 控制器\n```\n\n\
  它看起来就像一个普通的 SpringMVC 控制器，有两个明显的区别：\n\n*   与返回视图名称或 `ModelAndView` 对象的普通控制器方法不同，`listPosts()`\
  \ 方法返回一个 `Post` 对象列表。\n*   `listPosts()` 请求处理程序方法使用 `@ResponseBody` 注解。\n\n请求处理程序方法上的\
  \ `@ResponseBody` 注解表示返回值应绑定到响应体。如果你向 `\"/posts\"` URL 发出 `GET` 请求，你可能会根据 `Accept`\
  \ 标头值获得 `Post` 对象列表的 JSON 或 XML 表示。\n\n清单 11-2 显示了用于创建新文章的另一方法。\n\n```\n@Controller\n\
  public class PostController\n{\n@Autowired\nPostRepository postRepository;\n...\n\
  ...\n@ResponseBody\n@PostMapping(\"/posts\")\npublic Post createPost(@RequestBody\
  \ Post post)\n{\nreturn postRepository.save(post);\n}\n}\n清单 11-2.\n使用 @RequestBody\
  \ 注解的 REST 控制器方法\n```\n\n在 `createPost()` 处理程序方法中，有趣的部分是 `@RequestBody` 注解。`@RequestBody`\
  \ 注解将借助注册的 `HttpMessageConverter` 负责将 Web 请求体绑定到方法参数。因此，当你使用 `Post` JSON 体向 `\"\
  /post\"` URL 发出 `POST` 请求时，`HttpMessageConverters` 会将 JSON 请求体转换为 `Post` 对象并将其传递给\
  \ `savePost()` 方法。\n\n如果你所有的处理程序方法都是 REST 端点处理程序方法，你可以在类级别使用 `@ResponseBody`，而不是将其添加到每个方法。更好的是，你可以使用\
  \ `@RestController`，它是 `@Controller` 和 `@ResponseBody` 的组合注解。\n\n现在你将深入研究如何使用 Spring\
  \ Data JPA、SpringMVC 以及当然还有 Spring Boot 为简单的博客应用程序实现 REST API。\n\n1.  创建一个 Spring\
  \ Boot 项目并配置 Web 和 JPA 启动器。\n\n    创建一个 Spring Boot Maven 项目并添加以下启动器：\n\n    ```\n\
  \    org.springframework.boot\n    spring-boot-starter-web\n\n    org.springframework.boot\n\
  \    spring-boot-starter-data-jpa\n\n    com.h2database\n    h2\n\n    ```\n\n \
  \   对 REST 资源进行建模。此示例假设你的博客应用程序是一个简单的应用程序，管理员可以在其中创建文章，博客查看者可以查看文章并添加评论。因此，你可以确定应用程序域中将存在\
  \ `User`、`Post` 和 `Comment` 资源。\n\n    首先，你将这些资源创建为 JPA 实体，如清单 11-3 所示。\n\n    ```\n\
  \    @Entity\n    @Table(name = \"USERS\")\n    public class User\n    {\n    @Id\
  \ @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private Integer id;\n\
  \    @Column(name = \"name\", nullable = false, length = 150)\n    private String\
  \ name;\n    @Column(name = \"email\", nullable = false, length = 150)\n    private\
  \ String email;\n    @Column(name = \"password\", nullable = false, length = 150)\n\
  \    private String password;\n    //setters & getters\n    }\n    @Entity\n   \
  \ @Table(name = \"POSTS\")\n    public class Post\n    {\n    @Id @GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\n    private Integer id;\n    @Column(name = \"title\"\
  , nullable = false, length = 150)\n    private String title;\n    @Lob\n    @Column(name\
  \ = \"content\", nullable = false, columnDefinition=\"TEXT\")\n    private String\
  \ content;\n    @Temporal(TemporalType.TIMESTAMP)\n    @Column(name=\"created_on\"\
  )\n    private Date createdOn = new Date();\n    @Temporal(TemporalType.TIMESTAMP)\n\
  \    @Column(name=\"updated_on\")\n    private Date updatedOn;\n    @OneToMany\n\
