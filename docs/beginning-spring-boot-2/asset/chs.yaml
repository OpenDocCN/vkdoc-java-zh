  ### 为多数据源使用 OpenEntityManagerInViewFilter\n\n如果在 Web 应用中按照上一节所述设置了多个数据库配置，并希望使用\
  \ `OpenEntityManagerInViewFilter` 在渲染视图时启用 JPA 实体 `LAZY` 关联集合的懒加载，则需要注册 `OpenEntityManagerInViewFilter`\
  \ 的 Bean，如清单 8-9 所示。\n\n```\n@Configuration\npublic class WebMvcConfig\n{\n@Bean\n\
  public OpenEntityManagerInViewFilter primaryOpenEntityManagerInViewFilter()\n{\n\
  OpenEntityManagerInViewFilter osivFilter =\nnew OpenEntityManagerInViewFilter();\n\
  osivFilter.setEntityManagerFactoryBeanName\n(\"primaryEntityManagerFactory\");\n\
  return osivFilter;\n}\n@Bean\npublic OpenEntityManagerInViewFilter reportingOpenEntityManagerInViewFilter()\n\
  {\nOpenEntityManagerInViewFilter osivFilter =\nnew OpenEntityManagerInViewFilter();\n\
  osivFilter.setEntityManagerFactoryBeanName\n(\"reportingEntityManagerFactory\");\n\
  return osivFilter;\n}\n}\n清单 8-9.\nWebMvcConfig.java\n```\n\n这段代码通过设置两个 `EntityManagerFactory`\
  \ 的 Bean 名称——`primaryEntityManagerFactory` 和 `reportingEntityManagerFactory`，配置了两个\
  \ `OpenEntityManagerInViewFilter` 的 Bean。\n\n注意\n\n要了解更多关于 Spring Data JPA 的信息，请访问官方\
  \ Spring Data JPA 文档：[`http://docs.spring.io/spring-data/jpa/docs/current/reference/html`](http://docs.spring.io/spring-data/jpa/docs/current/reference/html)\
  \ 。\n\n## 本章小结\n\n本章介绍了 Spring Data JPA，并讲解了如何将其与 Spring Boot 结合使用。下一章将解释如何在 Spring\
  \ Boot 应用中使用 MongoDB。\n\n"
- '# 9. 使用 MongoDB


  MongoDB 是最流行的面向文档的 NoSQL 数据库之一。Spring Data MongoDB 提供了对 MongoDB 的支持，其编程模型与 Spring
  Data JPA 类似，都基于一致的 Spring 框架。Spring Boot 为 Spring Data Mongo 提供了一个启动器，通过实现其自动配置机制，使其更易于使用。


  本章将讨论 MongoDB，包括如何在 Windows、MacOS 和 Linux 等各种平台上安装 MongoDB 服务器。本章将解释如何从 Mongo Shell
  执行各种数据库操作。然后，你将探索如何通过使用 Spring Boot 的 `spring-boot-starter-data-mongodb` 启动器来使用
  Spring Data Mongo 的功能。


  ## 认识 MongoDB


  MongoDB 是一个开源的面向文档的 NoSQL 数据库。MongoDB 使用一种名为 BSON 的文档存储和数据交换格式，它提供了类 JSON 文档的二进制表示形式。MongoDB
  将文档存储在集合中。集合类似于关系数据库中的表。然而，与表不同的是，集合不要求其文档具有相同的模式。参见清单 9-1。


  ```

  {

  "_id" : ObjectId("13f345492b7c8eb21818bd09"),

  "title" : "在 SpringBoot 应用中使用 MongoDB",

  "url": "http://localhost:8080/blog/working-with-mongodb",

  "created_on" : ISODate("2016-10-01T00:00:00Z"),

