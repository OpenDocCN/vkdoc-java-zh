  \ 14-2 列出了根据某些条件可用的其他 Actuator 端点。\n\n表 14-2.\n\nSpringMVC 应用程序的其他 Spring Boot Actuator\
  \ 端点\n\n  ID\n |\n  描述\n |\n  敏感默认值\n |\n\n| --- | --- | --- | --- | --- | --- |\
  \ --- |\n\n  `docs`\n |\n  显示 Actuator 端点的文档，包括示例请求和响应。需要 `spring-boot-actuator-docs`\
  \ 在类路径上。\n |\n  `false`\n |\n\n  `heapdump`\n |\n  返回 GZip 压缩的 `hprof` 堆转储文件。\n\
  \ |\n  `true`\n |\n\n  `jolokia`\n |\n  通过 HTTP 公开 JMX bean（当 `Jolokia` 在类路径上时）。\n\
  \ |\n  `true`\n |\n\n  `logfile`\n |\n  返回日志文件的内容（如果已设置 `logging.file` 或 `logging.path`\
  \ 属性）。\n |\n  `true`\n |\n\n敏感的 Actuator 端点只能由经过身份验证的用户访问。你将在后面的部分中学习如何为端点配置安全性，因此现在你可以通过设置以下属性来禁用\
  \ Actuator 端点的安全性。\n\n```\nmanagement.security.enabled=false\n```\n\n默认情况下，Actuator\
  \ 端点在同一个 HTTP 端口（`server.port`）上运行，并以 `/application` 作为基本路径前缀。\n\n在本节中，你将探索几个常用的\
  \ Actuator 端点。\n\n/info 端点\n\n如果你使用 `info.app.*` 属性在 `application.properties` 文件中添加了关于应用程序的任何信息，如图\
  \ 14-1 所示，那么你可以在 `http://localhost:8080/application/info` 端点查看它。\n\n![A447991_1_En_14_Fig1_HTML.jpg](img/A447991_1_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1.\n\nSpring Boot Actuator /info 端点\n\n```\ninfo.app.name=Beginning Spring\
  \ Boot 2\ninfo.app.description=This is a SpringBoot Demo app\ninfo.app.version=1.0.0\n\
  ```\n\n/health 端点\n\n`/health` 端点显示应用程序的健康状况，包括磁盘空间、数据库等。转到 `http://localhost:8080/application/health`\
  \ 检查应用程序的健康状况，如图 14-2 所示。\n\n![A447991_1_En_14_Fig2_HTML.jpg](img/A447991_1_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2.\n\nSpring Boot Actuator /health 端点\n\n默认情况下，`/health` 端点仅向未经授权的用户显示应用程序是\
  \ `UP` 还是 `DOWN`。如果用户已授权或管理安全性已禁用，`/health` 端点会显示其他信息，例如磁盘空间、数据库健康状况等。\n\n/beans\
  \ 端点\n\n`/beans` 端点显示应用程序中注册的所有 bean，包括你显式配置的 bean 和 Spring Boot 自动配置的 bean。\n\n\
  将浏览器指向 `http://localhost:8080/application/beans`。你应该能够看到类似于图 14-3 所示的输出。\n\n![A447991_1_En_14_Fig3_HTML.jpg](img/A447991_1_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3.\n\nSpring Boot Actuator /beans 端点\n\n/autoconfig 端点\n\n`/autoconfig` 端点显示自动配置报告，该报告分为\
  \ `positiveMatches` 和 `negativeMatches`。\n\n如果你转到 `http://localhost:8080/application/autoconfig`，你应该会看到类似于图\
  \ 14-4 的自动配置报告。\n\n![A447991_1_En_14_Fig4_HTML.jpg](img/A447991_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4.\n\nSpring Boot Actuator /autoconfig 端点\n\n`positiveMatches` 中的元素是各种 `@Conditional`\
  \ 组件匹配的条件。\n\n例如：\n\n```\nDataSourceAutoConfiguration: [\n{\ncondition: \"OnClassCondition\"\
  ,\nmessage: \"@ConditionalOnClass classes found: javax.sql.DataSource,org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType\"\
  \n}\n]\n```\n\n由于此示例添加了 `data-jpa` 启动器和 `H2` 驱动程序，因此在类路径中找到了类 `javax.sql.DataSource`\
  \ 和 `org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType`，因此 `DataSourceAutoConfiguration`\
  \ 成为正匹配。\n\n`negativeMatches` 中的元素是各种 `@Conditional` 组件未匹配的条件。\n\n例如：\n\n```\nJooqAutoConfiguration:\
  \ [\n{\ncondition: \"OnClassCondition\",\nmessage: \"required @ConditionalOnClass\
  \ classes not found: org.jooq.DSLContext\"\n}\n]\n```\n\n由于应用程序类路径上没有 JOOQ 库，`@ConditionalOnClass`\
  \ 无法找到 `org.jooq.DSLContext` 类，因此 `JooqAutoConfiguration` 成为负匹配。\n\n/mappings 端点\n\
  \n`/mappings` 端点显示应用程序中声明的所有 `@RequestMapping` 路径。这对于检查哪个请求路径将由哪个控制器方法处理非常有帮助。\n\
  \n如果你转到 `http://localhost:8080/application/mappings`，你应该会看到图 14-5 中所示的所有映射。\n\n\
  ![A447991_1_En_14_Fig5_HTML.jpg](img/A447991_1_En_14_Fig5_HTML.jpg)\n\n图 14-5.\n\
  \nSpring Boot Actuator /mappings 端点\n\n/configprops 端点\n\n`/configprops` 显示由 `@ConfigurationProperties`\
  \ bean 定义的所有配置属性，包括你在 `application.properties` 或 YAML 文件中定义的自定义配置属性。\n\n如果你转到 `http://localhost:8080/application/configprops`，你应该会看到所有配置属性，如图\
  \ 14-6 所示。\n\n![A447991_1_En_14_Fig6_HTML.jpg](img/A447991_1_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6.\n\nSpring Boot Actuator /configprops 端点\n\n/metrics 端点\n\n`/metrics` 端点显示当前应用程序的各种指标，例如它使用了多少内存、有多少空闲内存、正在使用的堆大小、使用的线程数等。\n\
  \n如果你转到 `http://localhost:8080/application/metrics`，你应该会看到图 14-7 中所示的所有配置属性。\n\n\
  ![A447991_1_En_14_Fig7_HTML.jpg](img/A447991_1_En_14_Fig7_HTML.jpg)\n\n图 14-7.\n\
  \nSpring Boot Actuator /metrics 端点\n\n/env 端点\n\n`/env` 端点将公开 Spring 的 `ConfigurableEnvironment`\
  \ 接口中的所有属性，例如活动配置文件列表、应用程序属性、系统环境变量等。\n\n如果你转到 `http://localhost:8080/application/env`，你应该能够看到图\
  \ 14-8 中所示的所有环境详细信息。\n\n![A447991_1_En_14_Fig8_HTML.jpg](img/A447991_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8.\n\nSpring Boot Actuator /env 端点\n\n/trace 端点\n\n`/trace` 端点显示最后几个 HTTP\
  \ 请求的跟踪信息，这对于调试请求/响应详细信息（如标头、Cookie 等）非常有帮助。转到 `http://localhost:8080/application/trace`\
  \ 查看 HTTP 请求跟踪详细信息，如图 14-9 所示。\n\n![A447991_1_En_14_Fig9_HTML.jpg](img/A447991_1_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9.\n\nSpring Boot Actuator /trace 端点\n\n/dump 端点\n\n你可以在 `http://localhost:8080/application/dump`\
  \ 端点查看应用程序的线程转储，其中包含正在运行的线程的详细信息和 JVM 的堆栈跟踪。参见图 14-10。\n\n![A447991_1_En_14_Fig10_HTML.jpg](img/A447991_1_En_14_Fig10_HTML.jpg)\n\
  \n图 14-10.\n\nSpring Boot Actuator /dump 端点\n\n/loggers 端点\n\n`/loggers` 端点允许你在运行时查看和配置应用程序的日志级别。你可以在\
  \ `http://localhost:8080/application/loggers` 查看所有日志记录器的日志级别，如图 14-11 所示。\n\n![A447991_1_En_14_Fig11_HTML.jpg](img/A447991_1_En_14_Fig11_HTML.jpg)\n\
  \n图 14-11.\n\nSpring Boot Actuator /loggers 端点\n\n你可以在 `http://localhost:8080/application/{loggerName}`\
  \ 查看特定日志记录器的日志级别。例如，如果你想查看 `com.apress.demo` 日志记录器的日志级别，请转到 `http://localhost:8080/application/loggers/com.apress.demo`。\n\
  \n```\n{\nconfiguredLevel: null,\neffectiveLevel: \"INFO\"\n}\n```\n\n你可以通过向 `http://localhost:8080/application/{loggerName}`\
  \ 发出 `POST` 请求来在运行时更新日志记录器的日志级别。假设你想将 `com.apress.demo` 的日志级别更改为 `DEBUG`。你可以向 `http://localhost:8080/application/loggers/com.apress.demo`\
  \ URL 发送 `POST` 请求，并附带以下请求体 JSON。\n\n```\n{\nconfiguredLevel: \"DEBUG\"\n}\n> curl\
  \ -i -X POST -H 'Content-Type: application/json' -d '{\"configuredLevel\": \"DEBUG\"\
  }' http://localhost:8080/application/loggers/com.apress.demo\n```\n\n现在，如果你通过向 `http://localhost:8080/application/loggers/com.apress.demo`\
  \ 发出 `GET` 请求再次检查 `com.apress.demo` 日志记录器的日志级别，你将看到更新后的日志配置。\n\n```\n{\nconfiguredLevel:\
  \ \"DEBUG\",\neffectiveLevel: \"DEBUG\"\n}\n```\n\n/logfile 端点\n\n如果你通过设置 `logging.file`\
  \ 或 `logging.path` 或使用本机文件配置文件（`logback.xml`、`log4j.properties` 等）启用了基于文件的日志记录，则可以使用\
  \ `/logfile` 端点查看日志文件内容。转到 `http://localhost:8080/application/logfile`，如图 14-12\
  \ 所示。\n\n![A447991_1_En_14_Fig12_HTML.jpg](img/A447991_1_En_14_Fig12_HTML.jpg)\n\
  \n图 14-12.\n\nSpring Boot Actuator /logfile 端点\n\n/shutdown 端点\n\n`/shutdown` 端点可用于优雅地关闭应用程序，默认情况下未启用。你可以通过将以下属性添加到\
  \ `application.properties` 来启用此端点。\n\n```\nendpoints.shutdown.enabled=true\n```\n\
  \n添加此属性后，你可以将 HTTP `POST` 方法发送到 `http://localhost:8080/application/shutdown` 以调用\
  \ `/shutdown` 端点。\n\n成功调用 `/shutdown` 端点后，你应该会看到以下消息：\n\n```\n{\n\"message\": \"\
  Shutting down, bye...\"\n}\n```\n\n注意\n\n小心启用/关闭端点。仅在绝对需要时启用或关闭端点，并确保使用适当的安全配置保护端点。\n\
  \n/actuator 端点\n\n`/actuator` 端点为其他端点提供基于超媒体的“发现页面”。要激活此端点，你需要具有以下 Spring `HATEOAS`\
  \ 依赖项。\n\n```\norg.springframework.hateoas\nspring-hateoas\n\n```\n\n转到 `http://localhost:8080/application/`\
  \ 查看 Actuator 端点列表，如图 14-13 所示。\n\n![A447991_1_En_14_Fig13_HTML.jpg](img/A447991_1_En_14_Fig13_HTML.jpg)\n\
  \n图 14-13.\n\nSpring Boot Actuator /actuator 端点\n\n你可以通过设置 `endpoints.actuator.path`\
  \ 属性来自定义 Actuator 端点 URL。\n\n```\nendpoints.actuator.path=/actuator\n```\n\n现在你可以在\
  \ `http://localhost:8080/application/actuator` 访问 Actuator 端点。\n\n自定义 Actuator 端点\n\
  \n默认情况下，Spring Boot Actuator 端点在同一个端口上运行，默认的管理上下文路径是 `\"/application\"`。你可以使用以下属性自定义这些属性。\n\
  \n```\nmanagement.context-path=/management\nmanagement.port=9090\n```\n\n通过此自定义，你可以在\
  \ `http://localhost:9090/management/` 作为基本路径访问 Actuator 端点。`/health` 端点将变为 `http://localhost:8080/management/health`。\n\
  \n你可以使用 `endpoints.{endpointName}.*` 属性更改端点 ID、敏感度和启用值。\n\n```\nendpoints.beans.id=springbeans\n\
  endpoints.beans.sensitive=false\nendpoints.beans.enabled=true\n```\n\n通过这些自定义，你可以在\
  \ `http://localhost:8080/application/springbeans` 访问 `/beans` 端点。\n\n你还可以使用 `endpoints.{endpoint}.enabled`\
  \ 属性有选择地启用/禁用端点。\n\n```\nendpoints.trace.enabled=false\nendpoints.shutdown.enabled=true\n\
  ```\n\n你可以使用 `endpoints.enabled` 属性启用/禁用所有端点，并有选择地为特定端点覆盖。例如，如果你想禁用除 /info 之外的所有端点，则按如下方式配置：\n\
  \n```\nendpoints.enabled=false\nendpoints.info.enabled=true\n```\n\n你可以使用 `endpoints.sensitive`\
  \ 属性为所有端点设置敏感度，并有选择地为特定端点覆盖。例如，如果你想使所有端点不敏感，但 `/trace` 除外，你可以按如下方式配置：\n\n```\nendpoints.sensitive=false\n\
  endpoints.trace.sensitive=true\n```\n\n如果你不想通过 HTTP 公开端点，可以通过添加以下属性来禁用此选项。\n\n```\n\
  management.port=-1\n```\n\n保护 Actuator 端点\n\n默认情况下，所有敏感端点都是安全的，只有具有 `ACTUATOR` 角色的经过身份验证的用户才能访问这些端点。你可以通过设置以下属性将\
  \ `ACTUATOR` 角色名称更改为其他名称，例如 `SUPERADMIN`。\n\n```\nmanagement.security.roles=SUPERADMIN\n\
  ```\n\n如果你在类路径上有 Spring Boot Security 启动器，则 Actuator 端点将由 Spring Security 保护。\n\n\
  将 Security 启动器依赖项添加到 `pom.xml`。\n\n```\norg.springframework.boot\nspring-boot-starter-security\n\
  \n```\n\n你可以按如下方式在 `application.properties` 中配置安全用户凭据，而不是使用默认用户凭据。\n\n```\nsecurity.user.name=admin\n\
  security.user.password=secret\nsecurity.user.role=USER,ADMIN,ACTUATOR\n```\n\n现在，如果你尝试访问任何端点，例如\
  \ `http://localhost:8080/application/beans`，系统将提示你输入凭据。\n\n但很可能你将使用由数据存储支持的自定义 Spring\
  \ Security 配置来存储用户凭据，因此你可以根据需要为 Actuator 端点配置安全性。\n\n如果出于任何原因，你想禁用 Actuator 端点的安全性，可以设置以下属性：\n\
  \n```\nmanagement.security.enabled=false\n```\n\n这将禁用所有 Actuator 端点的安全性。强烈建议保护 Actuator\
  \ 端点，尤其是当你的应用程序可公开访问时。\n\n实现自定义健康指示器\n\nSpring Boot 提供了以下开箱即用的 `HealthIndicator`\
  \ 实现。它们默认是自动配置的。\n\n*   `CassandraHealthIndicator`\n*   `DiskSpaceHealthIndicator`\n\
  *   `DataSourceHealthIndicator`\n*   `ElasticsearchHealthIndicator`\n*   `JmsHealthIndicator`\n\
  *   `MailHealthIndicator`\n*   `MongoHealthIndicator`\n*   `RabbitHealthIndicator`\n\
  *   `RedisHealthIndicator`\n*   `SolrHealthIndicator`\n\n除了这些，你还可以根据应用程序的健康检查需求实现自己的\
  \ `HealthIndicators`。\n\n假设你需要定期从远程服务器下载一些馈送数据，并且有一个端点可用于检查服务器可达性。\n\n要实现自定义 `HealthIndicator`，你需要注册一个实现\
  \ `HealthIndicator` 接口的 Spring bean。你可以实现一个 `HealthIndicator` 来 ping 馈送服务器，如清单 14-1\
  \ 所示。\n\n```\nimport java.util.Date;\nimport org.springframework.boot.actuate.health.Health;\n\
  import org.springframework.boot.actuate.health.HealthIndicator;\nimport org.springframework.stereotype.Component;\n\
  import org.springframework.web.client.RestClientException;\nimport org.springframework.web.client.RestTemplate;\n\
  @Component\npublic class FeedServerHealthIndicator implements HealthIndicator\n\
  {\n@Override\npublic Health health() {\nRestTemplate restTemplate = new RestTemplate();\n\
  String url = \"http://feedserver.com/ping\";\ntry {\nString resp = restTemplate.getForObject(url,\
  \ String.class);\nif(\"OK\".equalsIgnoreCase(resp)){\nreturn Health.up().\nbuild();\n\
  } else {\nreturn Health.down()\n.withDetail(\"ping_url\", url)\n.withDetail(\"ping_time\"\
  , new Date())\n.build();\n}\n} catch (RestClientException e) {\nreturn Health.down(e)\n\
  .withDetail(\"ping_url\", url)\n.withDetail(\"ping_time\", new Date())\n.build();\n\
  }\n}\n}\n清单 14-1.\n实现自定义 HealthIndicator\n```\n\n现在，当你转到 `http://localhost:8080/application/health`\
  \ URL 并且馈送服务器不可达时，你将看到以下响应：\n\n```\n{\nstatus: \"DOWN\",\nfeedServer: {\nstatus:\
  \ \"DOWN\",\nerror: \"org.springframework.web.client.HttpClientErrorException: 410\
  \ Gone\",\nping_url: \"http://feedserver.com/ping\",\nping_time: 1495777475435\n\
  },\ndiskSpace: {\nstatus: \"UP\",\ntotal: 340650881024,\nfree: 260343615488,\nthreshold:\
  \ 10485760\n},\ndb: {\nstatus: \"UP\",\ndatabase: \"H2\",\nhello: 1\n}\n}\n```\n\
  \n对各种应用程序组件和集成点进行健康检查将帮助你监控整体应用程序健康状况。\n\n捕获自定义应用程序指标\n\n你已经了解了如何使用 Actuator 的 `/metrics`\
  \ 端点查看各种应用程序指标，例如内存、堆、线程池和数据源信息。除此之外，你还可以通过使用 `CounterService` 和 `GaugeService`\
  \ 记录自己的指标。\n\n`CounterService` 可用于递增、递减和重置命名计数器的值。`GaugeService` 可用于提交命名的指标值以供进一步分析。\n\
  \n假设你想捕获成功和失败登录尝试的次数。你可以使用 `CounterService` 记录这些指标，如清单 14-2 所示。\n\n```\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.boot.actuate.metrics.CounterService;\nimport org.springframework.stereotype.Service;\n\
  @Service\npublic class LoginService\n{\n@Autowired\nprivate CounterService counterService;\n\
  public boolean login(String email, String password)\n{\nif(\"admin@gmail.com\".equalsIgnoreCase(email)\
  \ && \"admin\".equals(password)){\ncounterService.increment(\"counter.login.success\"\
  );\nreturn true;\n} else {\ncounterService.increment(\"counter.login.failure\");\n\
  return false;\n}\n}\n}\n清单 14-2.\n使用 CounterService 记录登录指标\n```\n\n现在，如果你使用正确和不正确的凭据调用\
  \ `LoginService.login()` 方法，你可以在 `http://localhost:8080/application/metrics` 端点看到这些指标。\n\
  \n```\n{\nmem: 491423,\nmem.free: 155266,\n....\n....\ndatasource.primary.active:\
  \ 0,\ndatasource.primary.usage: 0,\ngauge.response.application.health: 1679,\ngauge.response.application.metrics:\
  \ 12,\n...\n...\ncounter.login.failure: 2,\ncounter.login.success: 3,\n....\n...\n\
  }\n```\n\n假设你想捕获调用第三方 Web 服务所需的时间。你可以使用 `GaugeService` 记录此 Web 服务调用所花费的时间。默认的 `GaugeService`\
  \ 实现会将数据存储在内存中，但你可以创建一个实现来将数据馈送到你的分析工具中。参见清单 14-3。\n\n```\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.boot.actuate.metrics.GaugeService;\nimport org.springframework.stereotype.Service;\n\
  import org.springframework.web.client.RestClientException;\nimport org.springframework.web.client.RestTemplate;\n\
  import com.apress.demo.models.GitHubUser;\n@Service\npublic class GitHubService\
  \ {\n@Autowired\nGaugeService gaugeService;\npublic GitHubUser getUserInfo(String\
  \ username)\n{\nRestTemplate restTemplate = new RestTemplate();\nString url = \"\
  https://api.github.com/users/\"+username;\nGitHubUser gitHubUser = null;\ntry {\n\
  long start = System.currentTimeMillis();\ngitHubUser = restTemplate.getForObject(url,\
  \ GitHubUser.class);\nlong end = System.currentTimeMillis();\ngaugeService.submit(\"\
  gauge.guthub.response-time\", (end-start));\n} catch (RestClientException e) {\n\
  e.printStackTrace();\n}\nreturn gitHubUser;\n}\n}\n清单 14-3.\n使用 GaugeService 记录响应时间\n\
  ```\n\n现在，如果你调用 `GitHubService.getUserInfo()` 方法，调用所花费的时间将使用 `GaugeService` 记录。你可以在\
  \ `http://localhost:8080/application/metrics` 端点查看这些指标。\n\n```\n{\nmem: 491423,\n\
  mem.free: 155266,\n....\n....\ndatasource.primary.active: 0,\ndatasource.primary.usage:\
  \ 0,\n...\ngauge.guthub.response-time: 126,\n...\n...\n}\n```\n\nActuator 端点的 CORS\
  \ 支持\n\n为了从其他源访问 Actuator 端点，你需要为它们启用 CORS 支持。CORS 支持默认是禁用的，你需要设置 `endpoints.cors.allowed-origins`\
  \ 属性来启用它。\n\n```\nendpoints.cors.allowed-origins=http://remoteserver.com\nendpoints.cors.allowed-methods=GET,POST\n\
  ```\n\n你还可以使用 `endpoints.cors.*` 属性添加其他 CORS 属性。\n\n通过 JMX 进行监控和管理\n\n默认情况下，Spring\
  \ Boot 将 Actuator 端点公开为 `org.springframework.boot` 域下的 JMX MBean。你可以使用 JDK 附带的 JConsole\
  \ 查看 JMX MBean。\n\n从 `C:\\\\Program Files\\\\Java\\\\jdk1.8.0_45\\\\bin\\\\jconsole.exe`\
  \ 运行 JConsole。选择 Spring Boot 应用程序主类并单击连接。如果你看到一个对话框显示“安全连接失败。不安全地重试？”，请单击不安全连接。\n\
  \n默认情况下，你将在“概述”选项卡上。单击 MBeans 选项卡。\n\n现在展开 `org.springframework.boot` 域，你将在其中找到作为\
  \ MBean 导出的 Actuator 端点。参见图 14-14。\n\n![A447991_1_En_14_Fig14_HTML.jpg](img/A447991_1_En_14_Fig14_HTML.jpg)\n\
  \n图 14-14.\n\nSpring Boot Actuator JMX 监控\n\n你可以使用 `endpoints.jmx.domain` 属性自定义域名。\n\
  \n```\nendpoints.jmx.domain=mydomain\n```\n\n你可以通过设置 `endpoints.jmx.enabled=false`\
  \ 来禁用通过 JMX 公开端点。\n\n总结\n\n在本章中，你探索了 Spring Boot Actuator，它包含了非常有用的生产支持功能。你了解了各种端点，包括如何自定义它们以及如何通过\
  \ HTTP 和 JMX 调用它们。在下一章中，你将学习如何测试 Spring Boot 应用程序。\n\n15. 测试 Spring Boot 应用程序\n\n\
  测试是软件开发的重要组成部分。它帮助开发人员验证功能的正确性。JUnit 和 TestNG 是 Java 项目中最常用的两个测试库。\n\n测试驱动开发（TDD）是一种流行的开发实践，你首先编写测试，然后编写刚好足够的代码来通过测试。你编写各种类型的测试，例如单元测试、集成测试、性能测试等。单元测试侧重于隔离测试一个组件，而集成测试则验证一个功能的行为，这可能涉及多个组件。在进行集成测试时，你可能需要模拟依赖组件的行为，例如第三方\
  \ Web 服务类、数据库方法调用等。有像 Mockito、PowerMock 和 jMock 这样的模拟库用于模拟对象的行为。\n\n依赖注入（DI）设计模式鼓励实践并编写可测试的代码。通过依赖注入，你可以为测试注入模拟实现，为生产注入真实实现。Spring\
  \ 本质上是一个依赖注入容器，它为测试应用程序的各个部分提供了极好的支持。\n\n在本章中，你将学习如何在 Spring Boot 应用程序中测试 Spring\
  \ 组件。你将详细了解如何使用 `@WebMvcTest`、`@DataJpaTest` 和 `@JdbcTest` 注解测试应用程序的切片，例如 Web 组件（常规\
  \ MVC 控制器、REST API 端点）、Spring 数据存储库以及受保护的控制器/服务方法。\n\n测试 Spring Boot 应用程序\n\nSpring\
  \ 框架流行的关键原因之一是其对测试的出色支持。Spring 提供了 `SpringRunner`，这是一个自定义的 JUnit 运行器，通过使用 `@ContextConfiguration(classes=AppConfig.class)`\
  \ 帮助加载 Spring `ApplicationContext`。\n\n一个典型的 Spring 单元/集成测试如清单 15-1 所示。\n\n```\n\
  @RunWith(SpringRunner.class)\n@ContextConfiguration(classes=AppConfig.class)\npublic\
  \ class UserServiceTests\n{\n@Autowired\nUserService userService;\n@Test\npublic\
  \ void should_load_all_users()\n{\nList users = userService.getAllUsers();\nassertNotNull(users);\n\
  assertEquals(10, users.size());\n}\n}\n清单 15-1.\n典型的 Spring JUnit 测试\n```\n\nSpring\
  \ Boot 应用程序也只是一个 Spring 应用程序，因此你也可以在 Spring Boot 应用程序中使用 Spring 的所有测试功能。\n\n但是，某些\
  \ Spring Boot 功能（例如加载外部属性和日志记录）仅在你使用 `SpringApplication` 类创建 `ApplicationContext`\
  \ 时才可用，你通常会在入口点类中使用该类。如果你使用 `@ContextConfiguration`，这些额外的 Spring Boot 功能将不可用。\n\n\
  ```\n@SpringBootApplication\npublic class SpringbootTestingDemoApplication\n{\n\
  public static void main(String[] args)\n{\nSpringApplication.run(SpringbootTestingDemoApplication.class,\
  \ args);\n}\n}\n```\n\nSpring Boot 提供了 `@SpringBootTest` 注解，它在后台使用 `SpringApplication`\
  \ 来加载 `ApplicationContext`，以便所有 Spring Boot 功能都可用。参见清单 15-2。\n\n```\n@RunWith(SpringRunner.class)\n\
  @SpringBootTest\npublic class SpringbootTestingDemoApplicationTests\n{\n@Autowired\n\
  UserService userService;\n@Test\npublic void should_load_all_users()\n{\n...\n...\n\
  }\n}\n清单 15-2.\n典型的 Spring Boot JUnit 测试\n```\n\n对于 `@SpringBootTest`，你可以传递 Spring\
  \ 配置类、Spring bean 定义 XML 文件等，但在 Spring Boot 应用程序中，你通常会使用入口点类。\n\nSpring Boot 测试启动器\
  \ `spring-boot-starter-test` 引入了 JUnit、Spring Test 和 Spring Boot Test 模块，以及以下最常用的模拟和断言库：\n\
  \n*   Mockito——一个 Java 模拟框架，位于 [`http://site.mockito.org/`](http://site.mockito.org/)\
  \ 。\n*   Hamcrest——一个用于数据断言的匹配器/谓词库，位于 [`http://hamcrest.org/JavaHamcrest/`](http://hamcrest.org/JavaHamcrest/)\
  \ 。\n*   AssertJ——一个流畅的断言库，位于 [`https://joel-costigliola.github.io/assertj/`](https://joel-costigliola.github.io/assertj/)\
  \ 。\n*   JSONassert——一个用于 JSON 的断言库，位于 [`https://github.com/skyscreamer/JSONassert`](https://github.com/skyscreamer/JSONassert)\
  \ 。\n*   JsonPath——用于 JSON 的 XPath，位于 [`https://github.com/json-path/JsonPath`](https://github.com/json-path/JsonPath)\
  \ 。\n\n现在你将看到如何创建一个简单的 Spring Boot Web 应用程序和一个简单的 REST 端点。\n\n```\n\norg.springframework.boot\n\
  spring-boot-starter-web\n\norg.springframework.boot\nspring-boot-starter-test\n\
  test\n\n```\n\n首先创建一个名为 `Application.java` 的入口点类，如下所示：\n\n```\n@SpringBootApplication\n\
  public class Application\n{\npublic static void main(String[] args)\n{\nSpringApplication.run(Application.class,\
  \ args);\n}\n}\n```\n\n清单 15-3 显示了如何创建一个名为 `/ping` 的简单 REST 端点。\n\n```\n@RestController\n\
  public class PingController\n{\n@GetMapping(\"/ping\")\npublic String ping()\n{\n\
  return \"OK\";\n}\n}\n清单 15-3.\nSpring REST 控制器\n```\n\n现在，如果你运行应用程序，你可以调用 REST\
  \ 端点 `http://localhost:8080/ping`，它将返回响应 `\"OK\"`。现在你可以为 `/ping` 端点编写一个测试。参见清单 15-4。\n\
  \n```\nimport static org.assertj.core.api.Assertions.assertThat;\nimport org.junit.Test;\n\
  import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.boot.test.context.SpringBootTest.WebEnvironment;\n\
  import org.springframework.boot.test.web.client.TestRestTemplate;\nimport org.springframework.http.HttpStatus;\n\
  import org.springframework.http.ResponseEntity;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
  @RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\n\
  public class PingControllerTests\n{\n@Autowired\nTestRestTemplate restTemplate;\n\
  @Test\npublic void testPing()\n{\nResponseEntity respEntity = restTemplate.getForEntity(\"\
  /ping\", String.class);\nassertThat(respEntity.getStatusCode()).isEqualTo(HttpStatus.OK);\n\
  assertThat(respEntity.getBody()).isEqualTo(\"OK\");\n}\n}\n清单 15-4.\n使用 TestRestTemplate\
  \ 测试 Spring REST 端点\n```\n\n由于你需要测试 REST 端点，因此通过指定 `@SpringBootTest` 的 `webEnvironment`\
  \ 属性来启动嵌入式 Servlet 容器。\n\n默认的 `webEnvironment` 值是 `WebEnvironment.MOCK`，它不会启动嵌入式\
  \ Servlet 容器。\n\n你可以根据你希望如何运行测试来使用各种 `webEnvironment` 值。\n\n*   `MOCK (默认)`——加载\
  \ `WebApplicationContext` 并提供模拟的 Servlet 环境。它不会启动嵌入式 Servlet 容器。如果 Servlet API 不在你的类路径上，此模式将回退到创建常规的非\
  \ Web `ApplicationContext`。\n*   `RANDOM_PORT`——加载 `ServletWebServerApplicationContext`\
  \ 并启动一个监听随机可用端口的嵌入式 Servlet 容器。\n*   `DEFINED_PORT`——加载 `ServletWebServerApplicationContext`\
  \ 并启动一个监听已定义端口（`server.port`）的嵌入式 Servlet 容器。\n*   `NONE`——使用 `SpringApplication`\
  \ 加载 `ApplicationContext`，但不提供 Servlet 环境。\n\n仅当 `@SpringBootTest` 与嵌入式 Servlet\
  \ 容器一起启动时，`TestRestTemplate` bean 才会自动注册。\n\n在运行启动嵌入式 Servlet 容器的集成测试时，最好使用 `WebEnvironment.RANDOM_PORT`，这样它就不会与其他正在运行的应用程序冲突，尤其是在多个构建并行运行的持续集成（CI）环境中。\n\
  \n你可以通过使用 `@SpringBootTest` 注解的 `classes` 属性来指定用于构建 `ApplicationContext` 的配置类。如果你没有显式指定任何类，它将自动搜索嵌套的\
  \ `@Configuration` 类，并将回退到搜索 `@SpringBootConfiguration` 类。`@SpringBootApplication`\
  \ 使用 `@SpringBootConfiguration` 注解，因此 `@SpringBootTest` 将拾取应用程序的入口点类。\n\n使用模拟实现进行测试\n\
  \n在执行单元测试时，你可能希望模拟对外部服务（如数据库交互和 Web 服务调用）的调用。你可以创建用于测试的模拟实现和用于生产的真实实现。\n\n假设你有一个\
  \ `EmployeeRepository` 文件，它与数据库通信并获取员工数据，如清单 15-5 所示。\n\n```\npublic interface EmployeeRepository\n\
  {\nList findAllEmployees();\n}\n清单 15-5.\nEmployeeRepository.java\n```\n\n假设你有 `EmployeeService`，它依赖于\
  \ `EmployeeRepository`，具有 `getMaxSalariedEmployee()` 和其他一些与员工相关的方法。参见清单 15-6。\n\n\
  ```\n@Service\npublic class EmployeeService\n{\nprivate EmployeeRepository employeeRepository;\n\
  @Autowired\npublic EmployeeService(EmployeeRepository employeeRepository)\n{\nthis.employeeRepository\
  \ = employeeRepository;\n}\npublic Employee getMaxSalariedEmployee()\n{\nEmployee\
  \ emp = null;\nList emps = employeeRepository.findAllEmployees();\n//loop through\
  \ emps and find max salaried emp\nreturn emp;\n}\n}\n清单 15-6.\nEmployeeService.java\n\
  ```\n\n现在你可以为测试创建一个模拟的 `EmployeeRepository` 文件，如清单 15-7 所示。\n\n```\n@Repository\n\
  @Profile(\"test\")\npublic class MockEmployeeRepository implements EmployeeRepository\n\
  {\npublic List findAllEmployees()\n{\nreturn Arrays.asList(\nnew Employee(1, \"\
  A\", 50000),\nnew Employee(2, \"B\", 75000),\nnew Employee(3, \"C\", 43000)\n};\n\
  }\n}\n清单 15-7.\nMockEmployeeRepository.java\n```\n\n现在你将创建一个用于生产的真实 `EmployeeRepository`\
  \ 实现，如清单 15-8 所示。\n\n```\n@Service\n@Profile(\"production\")\npublic class JdbcEmployeeRepository\
  \ implements EmployeeRepository\n{\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\n\
  public List findAllEmployees()\n{\nreturn jdbcTemplate.query(...);\n}\n}\n清单 15-8.\n\
  JdbcEmployeeRepository.java\n```\n\n你可以使用 `@ActiveProfiles` 注解来指定要使用的配置文件，以便仅激活与这些配置文件关联的\
  \ bean。参见清单 15-9。\n\n```\n@ActiveProfiles(\"test\")\n@RunWith(SpringRunner.class)\n\
  @SpringBootTest\npublic class ApplicationTests\n{\n@Autowired\nEmployeeService employeeService;\n\
  @Test\npublic void test_getMaxSalariedEmployee()\n{\nEmployee emp = employeeService.getMaxSalariedEmployee();\n\
  assertNotNull(emp);\nassertEquals(2, emp.getId());\nassertEquals(\"B\", emp.getName());\n\
  assertEquals(75000, emp.getSalary());\n}\n}\n清单 15-9.\n使用配置文件进行模拟实现测试\n```\n\n由于你已启用\
  \ `test` 配置文件，`MockEmployeeRepository` 将被注入到 `EmployeeService` 中。你可以在生产环境中运行应用程序时激活\
  \ `production` 配置文件，如下所示：\n\n```\njava -jar myapp.jar -Dspring.profiles.active=production\n\
  ```\n\n在运行主应用程序时，将使用 `production` 配置文件，并且 `JdbcEmployeeRepository` 将被注入到 `EmployeeService`\
  \ 中。\n\n除了提供模拟数据之外，你可能还需要模拟其他行为，例如在调用某些方法时抛出异常。但是，为每个用例创建模拟实现可能很繁琐。你可以使用模拟库来创建模拟对象，而无需实际创建具有模拟行为的类。下一节将介绍如何使用流行的模拟库\
  \ Mockito 进行单元测试。\n\n使用 Mockito 进行测试\n\nMockito 是一个流行的 Java 模拟框架，可以与 JUnit 一起使用。Mockito\
  \ 允许你通过模拟具有所需行为的外部依赖项来编写测试。\n\n例如，假设你正在调用某个外部 Web 服务。当它由于某些通信故障而失败时，你希望在放弃之前重试三次。为了测试重试行为，该外部\
  \ Web 服务应该抛出一个你可能无法控制的异常。你可以使用 Mockito 来模拟此行为，以便你可以测试重试功能。\n\n假设你正在使用 Web 服务从第三方导入用户数据，如清单\
  \ 15-10 所示。\n\n```\n@Service\npublic class UsersImporter\n{\npublic List importUsers()\
  \ throws UserImportServiceCommunicationFailure\n{\nList users = new ArrayList();\n\
  //get users by invoking some web service\n//if any exception occurs throw UserImportServiceCommunicationFailure\n\
  //dummy data\nusers.add(new User());\nusers.add(new User());\nusers.add(new User());\n\
  return users;\n}\n}\n清单 15-10.\nUsersImporter.java\n```\n\n`UserService` 使用 `UsersImporter`\
  \ 获取用户数据，并在发生 `UserImportServiceCommunicationFailure` 时重试三次。参见清单 15-11。\n\n```\n\
  @Service\n@Transactional\npublic class UsersImportService\n{\nprivate Logger logger\
  \ = LoggerFactory.getLogger(UserService.class);\nprivate UsersImporter usersImporter;\n\
  @Autowired\npublic UsersImportService(UsersImporter usersImporter)\n{\nthis.usersImporter\
  \ = usersImporter;\n}\npublic UsersImportResponse importUsers()\n{\nint retryCount\
  \ = 0;\nint maxRetryCount = 3;\nfor (int i = 0; i  importUsers = usersImporter.importUsers();\n\
  logger.info(\"Import Users: \"+importUsers);\nbreak;\n} catch (UserImportServiceCommunicationFailure\
  \ e)\n{\nretryCount++;\nlogger.error(\"Error: \"+e.getMessage());\n}\n}\nif(retryCount\
  \ >= maxRetryCount)\nreturn new UsersImportResponse(retryCount, \"FAILURE\");\n\
  else\nreturn new UsersImportResponse(0, \"SUCCESS\");\n}\n}\npublic class UsersImportResponse\n\
  {\nprivate int retryCount;\nprivate String status;\n//setters & getters\n}\n清单 15-11.\n\
  UsersImportService.java\n```\n\n此代码调用 `usersImporter.importUsers()` 方法，如果它抛出 `UserImportServiceCommunicationFailure`，则重试三次。\n\
  \n如果你想测试 `usersImporter.importUsers()` 是否在没有异常的情况下返回结果，那么应该返回 `UsersImportResponse(0,\
  \ \"SUCCESS\")`；否则，应该返回 `UsersImportResponse(3, \"FAILURE\")`。\n\n你可以使用 `@Mock`\
  \ 创建模拟对象，使用 `@InjectMocks` 将依赖项与模拟对象一起注入。你可以使用 `@RunWith(MockitoJUnitRunner.class)`\
  \ 初始化模拟对象，或者在 JUnit `@Before` 方法中使用 `MockitoAnnotations.initMocks(this)` 触发模拟对象初始化。参见清单\
  \ 15-12。\n\n```\nimport static org.assertj.core.api.Assertions.assertThat;\nimport\
  \ static org.mockito.BDDMockito.*;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
  import org.mockito.InjectMocks;\nimport org.mockito.Mock;\nimport org.mockito.junit.MockitoJUnitRunner;\n\
  import com.apress.demo.exceptions.UserImportServiceCommunicationFailure;\nimport\
  \ com.apress.demo.model.UsersImportResponse;\n@RunWith(MockitoJUnitRunner.class)\n\
  public class UsersImportServiceMockitoTest\n{\n@Mock\nprivate UsersImporter usersImporter;\n\
  @InjectMocks\nprivate UsersImportService usersImportService;\n@Test\npublic void\
  \ should_retry_3times_when_UserImportServiceCommunicationFailure_occured()\n{\n\
  given(usersImporter.importUsers()).willThrow(new UserImportServiceCommunicationFailure());\n\
  UsersImportResponse response = usersImportService.importUsers();\nassertThat(response.getRetryCount()).isEqualTo(3);\n\
  assertThat(response.getStatus()).isEqualTo(\"FAILURE\");\n}\n}\n清单 15-12.\n使用 Mockito\
  \ 模拟对象进行测试\n```\n\n在这里，你模拟了使用 Web 服务导入用户时的失败条件，如下所示：\n\n```\ngiven(usersImporter.importUsers()).willThrow(new\
  \ UserImportServiceCommunicationFailure());\n```\n\n因此，当你调用 `userService.importUsers()`\
  \ 并且模拟的 `usersImporter` 对象抛出 `UserImportServiceCommunicationFailure` 时，它将重试三次。类似地，你可以使用\
  \ Mockito 模拟任何类型的行为以满足这些测试用例。\n\nSpring Boot 提供了 `@MockBean` 注解，可用于定义新的 Mockito\
  \ 模拟 bean 或用模拟 bean 替换 Spring bean，并将其注入到它们的依赖 bean 中。模拟 bean 将在每个测试方法后自动重置。参见清单\
  \ 15-13。\n\n```\nimport static org.assertj.core.api.Assertions.assertThat;\nimport\
  \ static org.mockito.BDDMockito.*;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
  import org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
  import com.apress.demo.exceptions.UserImportServiceCommunicationFailure;\nimport\
  \ com.apress.demo.model.UsersImportResponse;\n@RunWith(SpringRunner.class)\n@SpringBootTest\n\
  public class UsersImportServiceMockitoTest\n{\n@MockBean\nprivate UsersImporter\
  \ usersImporter;\n@Autowired\nprivate UsersImportService usersImportService;\n@Test\n\
  public void should_retry_3times_when_UserImportServiceCommunicationFailure_occured()\n\
  {\ngiven(usersImporter.importUsers()).willThrow(new UserImportServiceCommunicationFailure());\n\
  UsersImportResponse response = usersImportService.importUsers();\nassertThat(response.getRetryCount()).isEqualTo(3);\n\
  assertThat(response.getStatus()).isEqualTo(\"FAILURE\");\n}\n}\n清单 15-13.\n使用 Spring\
  \ Boot 的 @MockBean 模拟进行测试\n```\n\n在这里，Spring Boot 将为 `UsersImporter` 创建一个 Mockito\
  \ 模拟对象，并将其注入到 `UsersImportService` bean 中。\n\n使用 @*Test 注解测试应用程序切片\n\n在测试应用程序的各个组件时，你可能希望加载\
  \ Spring `ApplicationContext` bean 的一个子集，这些 bean 与测试中的主题（SUT）相关。例如，在测试 SpringMVC\
  \ 控制器时，你可能只想加载 MVC 层组件，并提供模拟的服务层 bean 作为依赖项。\n\nSpring Boot 提供了诸如 `@WebMvcTest`、`@DataJpaTest`、`@DataMongoTest`、`@JdbcTest`\
  \ 和 `@JsonTest` 之类的注解来测试应用程序的切片。\n\n使用 @WebMvcTest 测试 SpringMVC 控制器\n\nSpring Boot\
  \ 提供了 `@WebMvcTest` 注解，它将自动配置 SpringMVC 基础设施组件，并仅加载 `@Controller`、`@ControllerAdvice`、`@JsonComponent`、`Filter`、`WebMvcConfigurer`\
  \ 和 `HandlerMethodArgumentResolver` 组件。使用此注解时，不会扫描其他 Spring bean（使用 `@Component`、`@Service`、`@Repository`\
  \ 等注解的 bean）。\n\n现在你将看到如何创建一个将数据添加到模型并渲染 Thymeleaf 视图的控制器。参见清单 15-14。\n\n```\nimport\
  \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  import com.apress.demo.repositories.TodoRepository;\n@Controller\npublic class TodoController\n\
  {\n@Autowired\nTodoRepository todoRepository;\n@GetMapping(\"/todolist\")\npublic\
  \ String showTodos(Model model)\n{\nmodel.addAttribute(\"todos\", todoRepository.findAll());\n\
  return \"todos\";\n}\n}\n清单 15-14.\nTodoController.java\n```\n\n清单 15-15 显示了如何使用\
  \ `@WebMvcTest` 为 `TodoController` 编写测试。\n\n```\nimport static org.mockito.BDDMockito.*;\n\
  import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.*;\n\
  import static org.hamcrest.Matchers.*;\nimport java.util.Arrays;\nimport org.junit.Test;\n\
  import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\nimport\
  \ org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.servlet.MockMvc;\n\
  import com.apress.demo.entities.Todo;\nimport com.apress.demo.repositories.TodoRepository;\n\
  @RunWith(SpringRunner.class)\n@WebMvcTest(controllers= TodoController.class)\npublic\
  \ class TodoControllerTests\n{\n@Autowired\nprivate MockMvc mvc;\n@MockBean\nprivate\
  \ TodoRepository todoRepository;\n@Test\npublic void testShowAllTodos() throws Exception\n\
  {\nTodo todo1 = new Todo(1, \"Todo1\",false);\nTodo todo2 = new Todo(2, \"Todo2\"\
  ,true);\ngiven(this.todoRepository.findAll()).willReturn(Arrays.asList(todo1, todo2));\n\
  this.mvc.perform(get(\"/todolist\")\n.accept(MediaType.TEXT_HTML))\n.andExpect(status().isOk())\n\
  .andExpect(view().name(\"todos\"))\n.andExpect(model().attribute(\"todos\", hasSize(2)))\n\
  ;\nverify(todoRepository, times(1)).findAll();\n}\n}\n清单 15-15.\n使用 MockMvc 测试 SpringMVC\
  \ 控制器\n```\n\n你已使用 `@WebMvcTest(controllers = TodoController.class)` 注解了测试，并通过显式指定你正在测试的控制器。由于\
  \ `@WebMvcTest` 不加载其他常规 Spring bean，并且 `TodoController` 依赖于 `TodoRepository`，因此你使用\
  \ `@MockBean` 注解提供了一个模拟 bean。`@WebMvcTest` 自动配置 `MockMvc`，可用于测试控制器，而无需启动实际的 Servlet\
  \ 容器。\n\n在此测试方法中，你设置了 `todoRepository.findAll()` 的预期行为，以返回两个 `Todo` 对象的列表。然后你向 `\"\
  /todolist\"` 发出 `GET` 请求，并对响应进行各种断言。\n\n使用 @WebMvcTest 测试 SpringMVC REST 控制器\n\n\
  与测试 SpringMVC 控制器类似，你也可以测试 REST 控制器。你可以使用 `JsonPath` 或 `JSONassert` 库对响应数据编写断言。\n\
  \n创建一个 `TodoRestController`，如清单 15-16 所示。\n\n```\nimport java.util.Optional;\nimport\
  \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  import org.springframework.web.bind.annotation.PathVariable;\nimport org.springframework.web.bind.annotation.RestController;\n\
  import com.apress.demo.entities.Todo;\nimport com.apress.demo.repositories.TodoRepository;\n\
  @RestController\npublic class TodoRestController\n{\n@Autowired\nprivate TodoRepository\
  \ todoRepository;\n@GetMapping(\"/api/todos/{id}\")\npublic Optional findById(@PathVariable\
  \ Integer id)\n{\nreturn todoRepository.findById(id);\n}\n}\n清单 15-16.\nTodoRestController.java.\n\
  ```\n\n你可以为 `TodoRestController` 编写一个测试，如清单 15-17 所示。\n\n```\nimport static org.hamcrest.CoreMatchers.*;\n\
  import static org.mockito.BDDMockito.*;\nimport static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.jsonPath;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
  import java.util.Optional;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\n\
  import org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.servlet.MockMvc;\n\
  import com.apress.demo.entities.Todo;\nimport com.apress.demo.repositories.TodoRepository;\n\
  @RunWith(SpringRunner.class)\n@WebMvcTest(controllers= TodoRestController.class)\n\
  public class TodoRestControllerTests\n{\n@Autowired\nprivate MockMvc mvc;\n@MockBean\n\
  private TodoRepository todoRepository;\n@Test\npublic void testFindTodoById() throws\
  \ Exception\n{\nTodo todo = new Todo(1, \"Todo1\", false);\ngiven(this.todoRepository.findById(1)).willReturn(Optional.of(todo));\n\
  this.mvc.perform(get(\"/api/todos/1\")\n.accept(MediaType.APPLICATION_JSON))\n.andExpect(status().isOk())\n\
  .andExpect(jsonPath(\"$.id\", is(1)))\n.andExpect(jsonPath(\"$.text\", is(\"Todo1\"\
  )))\n.andExpect(jsonPath(\"$.done\", is(false)));\nverify(todoRepository, times(1)).findById(1);\n\
  }\n}\n清单 15-17.\n使用 MockMvc 测试 SpringMVC REST 控制器\n```\n\n你以与测试 `TodoController`\
  \ 相同的方式测试 `TodoRestController` 端点 `\"/api/todos/{id}\"`，但使用 JSON `Path` 断言来验证返回的\
  \ JSON 响应数据。\n\n测试受保护的控制器/服务方法\n\n在第 13 章中，你学习了如何保护 Web 应用程序和 REST API，以及应用方法级安全性。Spring\
  \ 也提供了几种测试这些受保护资源的方法。\n\n现在你将看到如何测试受保护的资源。\n\n添加以下依赖项以启用 Spring Security 和安全测试功能。\n\
  \n```\norg.springframework.boot\nspring-boot-starter-security\n\norg.springframework.security\n\
  spring-security-test\ntest\n\n```\n\n当你添加 Security 启动器而没有自定义安全配置时，MVC 端点将使用 HTTP\
  \ 基本身份验证进行保护，并使用默认用户和生成的密码。你可以按如下方式在 `application.properties` 中配置凭据，而不是使用默认凭据：\n\
  \n```\nsecurity.user.name=admin\nsecurity.user.password=admin123\nsecurity.user.role=USER,ADMIN\n\
  ```\n\n你可以使用自动配置的 `TestRestTemplate` 来测试 REST 端点，传递 HTTP 基本身份验证参数，如清单 15-18 所示。\n\
  \n```\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\n\
  public class PingControllerTests\n{\n@Autowired\nTestRestTemplate restTemplate;\n\
  @Test\npublic void testPing() throws Exception\n{\nResponseEntity respEntity =\n\
  restTemplate.withBasicAuth(\"admin\", \"admin123\")\n.getForEntity(\"/ping\", String.class);\n\
  assertThat(respEntity.getStatusCode()).isEqualTo(HttpStatus.OK);\nassertThat(respEntity.getBody()).isEqualTo(\"\
  OK\");\n}\n}\n清单 15-18.\n使用 TestRestTemplate 通过 HTTP 基本身份验证测试 REST 端点\n```\n\n请注意，你使用\
  \ `restTemplate.withBasicAuth(\"admin\", \"admin123\")` 传递了凭据。还要注意，通过使用 `TestRestTemplate`，你可以使用相对路径（如\
  \ `\"/ping\"`）调用 REST 端点，而不是指定完整的 URL `http://localhost:<port>/ping`。这在使用 `RANDOM_PORT`\
  \ 时非常方便。但是，如果你想自己构造 URL，可以使用 `@LocalServerPort` 获取 `RANDOM_PORT` 值，如下所示：\n\n```\n\
  import org.springframework.boot.web.server.LocalServerPort;\n@LocalServerPort\n\
  int port;\n```\n\n你可能希望自定义默认的 Spring Security 配置，并使用基于表单的身份验证而不是 HTTP 基本身份验证。\n\n\
  现在你将看到如何自定义 Spring Security 以配置一些内存中的用户详细信息并启用方法级安全性，如清单 15-19 所示。\n\n```\n@Configuration\n\
  @EnableWebSecurity\n@EnableGlobalMethodSecurity(securedEnabled = true, prePostEnabled=true)\n\
  public class WebSecurityConfig extends WebSecurityConfigurerAdapter\n{\n@Autowired\n\
  protected void configureGlobal(AuthenticationManagerBuilder auth) throws Exception\n\
  {\nauth\n.inMemoryAuthentication()\n.withUser(\"user\").password(\"password\").roles(\"\
  USER\").and()\n.withUser(\"admin\").password(\"admin123\").roles(\"USER\", \"ADMIN\"\
  );\n}\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
  http.authorizeRequests()\n.antMatchers(\"/api/todos/**\").hasRole(\"USER\")\n.antMatchers(\"\
  /admin/**\").hasRole(\"ADMIN\")\n.antMatchers(\"/ping\").hasAnyRole(\"USER\",\"\
  ADMIN\")\n.anyRequest().authenticated()\n;\n}\n}\n清单 15-19.\n自定义 Spring Security\
  \ 配置\n```\n\n你已经自定义了安全配置，并且 `httpBasic` 身份验证未启用。因此，你不能使用带有基本身份验证参数的 `TestRestTemplate`\
  \ 来测试受保护的 REST 端点。你可以使用 `@WebMvcTest` 并使用 `MockMvc` 调用 REST 端点，这允许你传递安全用户凭据。\n\n\
  当使用 `@WebMvcTest` 时，默认情况下将使用 Spring Security HTTP 基本身份验证，而不是你手动配置的自定义安全配置。你可以使用\
  \ `@WebMvcTest` 的 `secure=false` 属性关闭基本身份验证，并使用 `@ContextConfiguration` 加载安全配置，如清单\
  \ 15-20 所示。\n\n```\n@RunWith(SpringRunner.class)\n@WebMvcTest(controllers= TodoRestController.class,\
  \ secure=false)\n@ContextConfiguration(classes={SpringbootTestingDemoApplication.class,\
  \ WebSecurityConfig.class})\npublic class TodoRestControllerTests\n{\n@Autowired\n\
  private MockMvc mvc;\n@MockBean\nprivate TodoRepository todoRepository;\n//@Test\
  \ methods\n}\n清单 15-20.\n使用自定义 Spring Security 配置测试 REST 控制器\n```\n\n清单 15-21 向你展示了如何使用\
  \ `MockMvc` 测试 `GET /api/todos/{id}` 端点。\n\n```\n@Test\npublic void testFindTodoById()\
  \ throws Exception\n{\nTodo todo = new Todo(1, \"Todo1\", false);\ngiven(this.todoRepository.findById(1)).willReturn(Optional.of(todo));\n\
  this.mvc.perform(get(\"/api/todos/1\")\n.with(user(\"admin\").password(\"admin123\"\
  ).roles(\"USER\",\"ADMIN\"))\n.accept(MediaType.APPLICATION_JSON))\n.andExpect(status().isOk())\n\
  .andExpect(jsonPath(\"$.id\", is(1)))\n.andExpect(jsonPath(\"$.text\", is(\"Todo1\"\
  )))\n.andExpect(jsonPath(\"$.done\", is(false)));\nverify(todoRepository, times(1)).findById(1);\n\
  }\n清单 15-21.\n使用 MockMvc 测试受保护的 REST 端点\n```\n\n在这里，你模拟了 `todoRepository.findById(1)`\
  \ 方法，并使用 `MockMvc.perform()` 触发 GET 请求，并使用 `.with(user(\"admin\").password(\"admin123\"\
  ).roles(\"USER\",\"ADMIN\"))` 传递安全用户凭据。\n\n清单 15-22 向你展示了如何测试 `POST /api/todos`\
  \ 端点以创建一个新的 `Todo`。\n\n```\n@Autowired\nprivate ObjectMapper objectMapper;\n@Test\n\
  public void testCreateTodo() throws Exception\n{\nTodo todo = new Todo(null, \"\
  New Todo1\", false);\nString content = objectMapper.writeValueAsString(todo);\n\
  given(this.todoRepository.save(any(Todo.class))).willReturn(todo);\nthis.mvc.perform(post(\"\
  /api/todos\")\n.contentType(MediaType.APPLICATION_JSON_VALUE)\n.content(content)\n\
  .with(csrf())\n.with(user(\"admin\").password(\"admin123\").roles(\"USER\",\"ADMIN\"\
  ))\n.accept(MediaType.APPLICATION_JSON_VALUE))\n.andExpect(status().isOk())\n.andExpect(MockMvcResultMatchers.content().json(content))\n\
  .andReturn()\n;\nverify(todoRepository, times(1)).save(any(Todo.class));\n}\n清单\
  \ 15-22.\n使用 MockMvc 测试带有 CSRF 令牌的受保护 REST 端点\n```\n\n它类似于之前的测试方法，但你使用 `MockMvc.perform()`\
  \ 执行 `POST` 请求，并使用 `with(csrf())` 设置 CSRF 令牌。由于这是一个 `POST` 请求并且 CSRF 已启用，你应该发送 CSRF\
  \ 令牌；否则，它将抛出带有 HTTP 状态码 `403` 的 `AccessDeniedException`。\n\n除了使用 `configure(HttpSecurity\
  \ http)` 方法配置安全约束之外，你还可以使用 `@Secured` 或 `@PreAuthorize` 注解来保护 REST 端点。参见清单 15-23。\n\
  \n```\n@RestController\npublic class AdminRestController\n{\n@Autowired\nprivate\
  \ UserService userService;\n@Secured(\"ROLE_ADMIN\")\n@DeleteMapping(\"/admin/users/{id}\"\
  )\npublic void deleteUser(@PathVariable(\"id\") Integer userId)\n{\nuserService.deleteUser(userId);\n\
  }\n}\n清单 15-23.\n使用注解保护方法的 AdminRestController\n```\n\nREST 端点 `DELETE /admin/users/{id}`\
  \ 可以由具有 `ADMIN` 角色的用户访问。你可以使用 `MockMvc` 以相同的方式测试由 `@Secured` 或 `@PreAuthorize` 注解保护的\
  \ REST 端点，如清单 15-24 所示。\n\n```\n@RunWith(SpringRunner.class)\n@WebMvcTest(controllers=\
  \ AdminRestController.class, secure=false)\n@ContextConfiguration(classes={SpringbootTestingDemoApplication.class,\
  \ WebSecurityConfig.class})\npublic class AdminRestControllerTests\n{\n@Autowired\n\
  private MockMvc mvc;\n@MockBean\nprivate UserService userService;\n@Test\npublic\
  \ void testAdminDeleteUser() throws Exception\n{\nMockito.doNothing()\n.when(userService)\n\
  .deleteUser(Mockito.any(Integer.class));\nthis.mvc.perform(delete(\"/admin/users/2\"\
  )\n.with(csrf())\n.with(user(\"admin\").password(\"admin123\").roles(\"ADMIN\"))\n\
  .accept(MediaType.APPLICATION_JSON))\n.andExpect(status().isOk());\nverify(userService,\
  \ times(1)).deleteUser(2);\n}\n}\n清单 15-24.\n使用 MockMvc 测试由 @Secured 注解保护的 REST\
  \ 端点\n```\n\n除了保护 Web 层之外，你还可以通过使用方法级安全性并使用 `@Secured` 或 `@PreAuthorize` 注解方法来保护任何\
  \ Spring 组件。你也可以在类级别使用这些注解，这会将安全配置应用于该类中的所有方法。\n\n清单 15-25 向你展示了如何使用 `@Secured`\
  \ 和 `@PreAuthorize` 保护 `UserService` 方法。\n\n```\n@Service\n@Transactional\npublic\
  \ class UserService\n{\nprivate UserRepository userRepository;\n@Autowired\npublic\
  \ UserService(UserRepository repo)\n{\nthis.userRepository = repo;\n}\npublic Optional\
  \ findUserById(Integer userId)\n{\nreturn userRepository.findById(userId);\n}\n\
  @Secured(\"ROLE_USER\")\npublic void createUser(User user)\n{\nuserRepository.save(user);\n\
  }\n@PreAuthorize(\"isAuthenticated()\")\npublic void updateUser(User user)\n{\n\
  userRepository.save(user);\n}\n@Secured(\"ROLE_ADMIN\")\npublic void deleteUser(Integer\
  \ userId)\n{\nuserRepository.delete(userId);\n}\n}\n清单 15-25.\n具有方法级安全性的 UserService.java\n\
  ```\n\n在 `UserService` 中，你已将 `deleteUser()` 方法配置为仅对 `ADMIN` 用户可访问，`createUser()`\
  \ 方法仅对具有 `USER` 角色的用户可访问，`updateUser()` 方法可由任何经过身份验证的用户访问。\n\n方法一\n\n你可以使用 JUnit\
  \ `@Before` 方法初始化 Spring Security 用户身份验证，并使用 `@After` 方法清除 `SecurityContextHolder`。参见清单\
  \ 15-26。\n\n```\n@RunWith(SpringRunner.class)\n@SpringBootTest(webEnvironment=WebEnvironment.RANDOM_PORT)\n\
  public class SpringbootTestingDemoApplicationTests\n{\n@Autowired\nprivate UserService\
  \ userService;\n@Autowired\nprivate ApplicationContext context;\nprivate Authentication\
  \ authentication;\n@Before\npublic void init() {\nAuthenticationManager authenticationManager\
  \ =\nthis.context.getBean(AuthenticationManager.class);\nthis.authentication = authenticationManager.authenticate(\n\
  new UsernamePasswordAuthenticationToken(\"admin\", \"admin123\"));\n}\n@After\n\
  public void close() {\nSecurityContextHolder.clearContext();\n}\n@Test(expected\
  \ = AuthenticationCredentialsNotFoundException.class)\npublic void deleteUserUnauthenticated()\
  \ {\nuserService.deleteUser(3);\n}\n@Test\npublic void deleteUserAuthenticated()\
  \ {\nSecurityContextHolder.getContext().setAuthentication(this.authentication);\n\
  userService.deleteUser(3);\n}\n}\n清单 15-26.\n使用 AuthenticationManager 测试受保护的方法\n\
  ```\n\n在这里，你在没有身份验证的情况下调用 `deleteUserUnauthenticated()` 测试方法。这意味着 `userService.deleteUser()`\
  \ 将抛出 `AuthenticationCredentialsNotFoundException`。但在 `deleteUserAuthenticated()`\
  \ 测试用例中，你使用有效的用户凭据为 `ADMIN` 角色设置了用户身份验证，因此它将允许你调用 `userService.deleteUser()` 方法。\n\
  \n方法二\n\nSpring Security 4.0 引入了 `@WithMockUser` 注解，它允许你更轻松地测试受保护的资源。`@WithMockUser`\
  \ 默认将使用用户名设置为 `user`、密码设置为 `password`、角色设置为 `ROLE_USER` 来初始化用户身份验证。\n\n```\n@Test\n\
  @WithMockUser\npublic void createUserWithMockUser() {\nUser user = new User();\n\
  user.setName(\"Yosin\");\nuser.setEmail(\"yosin@gmail.com\");\nuser.setPassword(\"\
  yosin123\");\nuserService.createUser(user);\n}\n```\n\n由于 `userService.createUser()`\
  \ 允许具有 `ROLE_USER` 角色的用户调用，你可以简单地添加 `@WithMockUser` 来运行 `createUserWithMockUser()`\
  \ 测试用例。\n\n你还可以显式地向 `@WithMockUser` 提供 `username`、`password` 和 `roles`，如下所示。\n\n\
  ```\n@Test\n@WithMockUser(username=\"admin\", password=\"admin123\", roles={\"USER\"\
  ,\"ADMIN\"})\npublic void deleteUserAuthenticatedWithMockUser() {\nuserService.deleteUser(2);\n\
  }\n```\n\n方法三\n\n在实际应用程序中，你可能使用了自定义的 `UserDetailsService` 和自定义的 `UserDetails` 实现。在这些情况下，你可以使用\
  \ `@WithUserDetails` 来初始化通过使用自定义 `UserDetailsService` 加载的用户身份验证。\n\n```\n@Test\n\
  @WithUserDetails\npublic void createUserWithUserDetails()\n{\n...\n}\n```\n\n你还可以传递特定的\
  \ `username` 作为 `@WithUserDetails(\"admin\")`，它使用通过使用自定义 `UserDetailsService` 加载的\
  \ `admin` 用户详细信息来初始化用户身份验证。\n\n有关 Spring Security 测试的更多详细信息，请访问参考文档：[`http://docs.spring.io/spring-security/site/docs/current/reference/htmlsingle/#test`](http://docs.spring.io/spring-security/site/docs/current/reference/htmlsingle/#test)\
  \ 。\n\n使用 @DataJpaTest 和 @JdbcTest 测试持久层组件\n\n你可能希望测试应用程序的持久层组件，这不需要加载许多组件，如控制器、安全配置等。Spring\
  \ Boot 提供了 `@DataJpaTest` 和 `@JdbcTest` 注解来测试与关系数据库通信的 Spring bean。\n\nSpring Boot\
  \ 提供了 `@DataJpaTest` 注解来测试持久层组件，它将自动配置内存中的嵌入式数据库，并扫描 `@Entity` 类和 Spring Data JPA\
  \ 存储库。`@DataJpaTest` 注解不会将其他 Spring bean（`@Components`、`@Controller`、`@Service`\
  \ 和带注解的 bean）加载到 `ApplicationContext` 中。\n\n现在你将看到如何在 Spring Boot 应用程序中测试 Spring\
  \ Data JPA 存储库。创建一个带有 Data-JPA 和 Test 启动器的 Spring Boot Maven 项目。\n\n```\n\norg.springframework.boot\n\
  spring-boot-starter-data-jpa\n\ncom.h2database\nh2\n\norg.springframework.boot\n\
  spring-boot-starter-test\ntest\n\n```\n\n创建一个名为 `User` 的 JPA 实体和一个名为 `UserRepository`\
  \ 的 Spring Data JPA 存储库，如清单 15-27 所示。\n\n```\n@Entity\n@Table(name=\"users\")\n\
  public class User\n{\n@Id @GeneratedValue(strategy=GenerationType.AUTO)\nprivate\
  \ Integer id;\n@Column(nullable=false)\nprivate String name;\n@Column(nullable=false,\
  \ unique=true)\nprivate String email;\n@Column(nullable=false)\nprivate String password;\n\
  //setters & getters\n}\npublic interface UserRepository extends JpaRepository\n\
  {\nUser findByEmail(String email);\n}\n清单 15-27.\nJPA 实体 User.java 和数据 JPA 存储库 UserRepository.java\n\
  ```\n\n你可以使用 `src/main/resources/data.sql` 用一些静态数据初始化 `USERS` 表。参见清单 15-28。\n\n\
  ```\ninsert into users(id, email, password, name) values\n(1, 'admin@gmail.com','admin','Admin'),\n\
  (2, 'siva@gmail.com','siva','Siva'),\n(3, 'test@gmail.com','test','Test');\n清单 15-28.\n\
  src/main/resources/data.sql\n```\n\n现在你可以使用 `@DataJpaTest` 注解测试 `UserRepository`，如清单\
  \ 15-29 所示。\n\n```\n@RunWith(SpringRunner.class)\n@DataJpaTest\npublic class UserRepositoryTests\n\
  {\n@Autowired\nprivate UserRepository userRepository;\n@Test\npublic void testFindByEmail()\
  \ {\nUser user = userRepository.findByEmail(\"admin@gmail.com\");\nassertNotNull(user);\n\
  assertEquals(1, user.getId());\nassertEquals(\"admin\", user.getName());\n}\n}\n\
  清单 15-29.\n使用 @DataJpaTest 测试 Spring Data JPA 存储库\n```\n\n当你运行 `UserRepositoryTests`\
  \ 时，Spring Boot 将自动配置 `H2` 内存嵌入式数据库（因为你在类路径中有 `H2` 数据库驱动程序）并运行测试。\n\n如果你想针对实际注册的数据库运行测试，你可以使用\
  \ `@AutoConfigureTestDatabase(replace=Replace.NONE)` 注解测试，它将使用注册的 `DataSource` 而不是内存数据源。你可以使用\
  \ `Replace.AUTO_CONFIGURED` 替换自动配置的 `DataSource`，并使用 `Replace.ANY`（默认值）替换任何自动配置或显式定义的数据源\
  \ bean。\n\n`@DataJpaTest` 测试默认是事务性的，并在每个测试结束时回滚。你可以通过使用 `@Transactional(propagation\
  \ = Propagation.NOT_SUPPORTED)` 注解来禁用单个测试或整个测试类的默认回滚行为。参见清单 15-30。\n\n```\n@RunWith(SpringRunner.class)\n\
  @DataJpaTest\npublic class UserRepositoryTests\n{\n@Autowired\nprivate UserRepository\
  \ userRepository;\n@Test\n@Transactional(propagation = Propagation.NOT_SUPPORTED)\n\
  public void testCreateUser() {\nUser user = new User(null, \"john@gmail.com\", \"\
  john\", \"John\");\nuserRepository.save(user);\n//assertions\n}\n@Test\npublic void\
  \ testUpdateUser() {\nUser user = userRepository.findByEmail(\"admin@gmail.com\"\
  );\nuser.setName(\"Administrator\")\nuserRepository.save(user);\n//assertions\n\
  }\n}\n清单 15-30.\n具有自定义事务行为的 @DataJpaTest\n```\n\n当 `testCreateUser()` 测试方法运行时，更改将不会被回滚，而在\
  \ `testUpdateUser()` 中进行的数据库更改将自动回滚。\n\n`@DataJpaTest` 注解还会自动配置 `TestEntityManager`，它是\
  \ JPA `EntityManager` 的替代品，用于 JPA 测试。参见清单 15-31。\n\n```\n@RunWith(SpringRunner.class)\n\
  @DataJpaTest\npublic class UserRepositoryTests\n{\n@Autowired\nprivate UserRepository\
  \ userRepository;\n@Autowired\nprivate TestEntityManager entityManager;\n@Test\n\
  public void testFindByEmail() {\nUser user = new User(null, \"john@gmail.com\",\
  \ \"john\", \"John\");\nInteger id = entityManager.persistAndGetId(user, Integer.class);\n\
  User john = userRepository.findByEmail(\"john@gmail.com\");\nassertNotNull(john);\n\
  assertEquals(id, john.getId());\nassertEquals(\"john\", user.getName());\n}\n}\n\
  清单 15-31.\n使用 TestEntityManager 的 @DataJpaTest\n```\n\n`TestEntityManager` 提供了一些便捷方法——例如\
  \ `persistAndGetId()`、`persistAndFlush()` 和 `persistFlushFind()`——这些方法在测试中很有用。\n\
  \n与 `@DataJpaTest` 注解类似，你可以使用 `@JdbcTest` 来测试使用 `JdbcTemplate` 的纯 JDBC 相关方法。`@JdbcTest`\
  \ 注解也会自动配置内存中的嵌入式数据库，并以事务方式运行测试。\n\n现在你将创建一个 `JdbcUserRepository` 来使用 `JdbcTemplate`\
  \ 执行数据库操作。参见清单 15-32。\n\n```\npublic class JdbcUserRepository\n{\nprivate JdbcTemplate\
  \ jdbcTemplate;\npublic JdbcUserRepository(JdbcTemplate jdbcTemplate) {\nthis.jdbcTemplate\
  \ = jdbcTemplate;\n}\npublic List findAll() {\n....\n....\n}\n}\n清单 15-32.\nJdbc\
  \ UserRepository.java\n```\n\n清单 15-33 向你展示了如何使用 `@JdbcTest` 测试 `JdbcUserRepository`\
  \ 方法。\n\n```\n@RunWith(SpringRunner.class)\n@JdbcTest\npublic class JdbcUserRepositoryTests\n\
  {\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\nprivate JdbcUserRepository userRepository;\n\
  @Before\npublic void init()\n{\nuserRepository = new JdbcUserRepository(jdbcTemplate);\n\
  jdbcTemplate.execute(\"create table people(id int, name varchar(100))\");\njdbcTemplate.execute(\"\
  insert into people(id, name) values(1, 'John')\");\njdbcTemplate.execute(\"insert\
  \ into people(id, name) values(2, 'Remo')\");\njdbcTemplate.execute(\"insert into\
  \ people(id, name) values(3, 'Dale')\");\n}\n@Test\npublic void testFindAllUsers()\
  \ throws Exception\n{\nList users = userRepository.findAll();\nassertThat(users.size()).isEqualTo(3);\n\
  }\n}\n清单 15-33.\n使用 @JdbcTest 测试 JDBC 操作\n```\n\n由于 `@jdbcTest` 不会加载任何常规的 `@Component`\
  \ Spring bean，此示例通过使用自动配置的 `JdbcTemplate` bean 手动创建 `JdbcUserRepository` 实例。\n\n\
  与 `@DataJpaTest` 和 `@jdbcTest` 类似，Spring Boot 提供了其他注解，如 `@DataMongoTest`、`@DataNeo4jTest`、`@JooqTest`、`@JsonTest`\
  \ 和 `@DataLdapTest` 来测试应用程序的切片。\n\n总结\n\n在本章中，你学习了测试 Spring Boot 应用程序的各种技术。你研究了测试控制器、REST\
  \ API 端点和服务层方法。你还学习了如何使用 Spring Security 测试模块测试受保护的方法和 REST 端点。在下一章中，你将了解如何创建自己的\
  \ Spring Boot 启动器。\n\n16. 创建自定义 Spring Boot 启动器\n\nSpring Boot 的主要目的是通过采取固执己见的应用程序视图并自动配置\
  \ Spring `ApplicationContext` 来提高开发人员生产力。Spring Boot 为广泛使用的框架和库提供了启动器。Spring Boot\
  \ 的自动配置机制根据各种标准代表你配置 Spring Bean。\n\n除了开箱即用的 Spring Boot 启动器之外，你还可以创建自己的启动器模块。你可能在组织中开发了一些可重用的模块，这些模块在许多应用程序中使用。你可以创建自己的自定义\
  \ Spring Boot 启动器，以便在 Spring Boot 应用程序中以更简单的方式利用这些可重用模块。\n\n本章介绍如何创建自定义 Spring Boot\
  \ 启动器。为了演示，你将创建 `twitter4j-spring-boot-starter`，它将自动配置 Twitter4j，这是一个与 Twitter API\
  \ 交互的 Java 库。\n\nTwitter4j 简介\n\nTwitter4j 为 Twitter REST API 提供了 Java 绑定。为了使用 Twitter4j，你需要添加以下\
  \ Maven 依赖项。\n\n```\norg.twitter4j\ntwitter4j-core\n4.0.4\n\n```\n\nTwitter4j API\
  \ 的主要入口点是 `Twitter` 类，你可以创建 Twitter 的实例，如清单 16-1 所示。\n\n```\nConfigurationBuilder\
  \ cb = new ConfigurationBuilder();\ncb.setDebugEnabled(true)\n.setOAuthConsumerKey(\"\
  your-consumer-key-here\")\n.setOAuthConsumerSecret(\"your-consumer-secret-here\"\
  )\n.setOAuthAccessToken(\"your-access-token-here\")\n.setOAuthAccessTokenSecret(\"\
  your-access-token-secret-here\");\nTwitterFactory tf = new TwitterFactory(cb.build());\n\
  Twitter twitter = tf.getInstance();\n清单 16-1.\n使用 Twitter4j API\n```\n\n现在你可以使用\
  \ `Twitter` 实例获取最新的推文，如下所示：\n\n```\nList statuses = twitter.getHomeTimeline();\n\
  for (Status status : statuses)\n{\nSystem.out.println(status.getUser().getName()\
  \ + \":\" + status.getText());\n}\n```\n\n你将创建一个用于 Twitter4j 的 Spring Boot 启动器，以便你可以自动注入\
  \ `Twitter` 实例，而无需显式注册它们。\n\n自定义 Spring Boot 启动器\n\n在第 3 章中，你学习了 Spring Boot 自动配置如何使用\
  \ `@Conditional` 功能。\n\nSpring Boot 启动器通常旨在根据类的存在、配置属性或是否已注册特定类型的 bean 来自动配置某些库或框架。\n\
  \n创建自定义 Spring Boot 启动器通常涉及：\n\n*   创建一个自动配置模块，该模块根据某些标准自动配置 Spring Bean\n*   创建一个启动器模块，该模块提供对自动配置模块以及依赖库的依赖\n\
  \n因此，你将创建：\n\n*   `twitter4j-spring-boot-autoconfigure` 模块，其中包含 Twitter4j 自动配置 bean\
  \ 定义。\n*   `twitter4j-spring-boot-starter` 模块，它引入 `twitter4j-spring-boot-autoconfigure`\
  \ 和 `twitter4j-core` 依赖项。\n\n创建自定义 Twitter4j 启动器后，你将使用 `twitter4j-spring-boot-starter`\
  \ 构建一个 Spring Boot 应用程序。\n\n创建 twitter4j-spring-boot-autoconfigure 模块\n\n现在你将创建一个名为\
  \ `twitter4j-spring-boot-autoconfigure` 的模块，并添加 Maven 依赖项，例如 `spring-boot-autoconfigure`、`twitter4j-core`\
  \ 和 `spring-boot-starter-test`。参见清单 16-2。\n\n```\n\n4.0.0\ncom.apress\ntwitter4j-spring-boot-autoconfigure\n\
  jar\n1.0-SNAPSHOT\n\nUTF-8\n1.8\n1.8\n4.0.4\n2.0.0.BUILD-SNAPSHOT\n\norg.springframework.boot\n\
  spring-boot-dependencies\n${spring-boot.version}\npom\nimport\n\norg.springframework.boot\n\
  spring-boot-autoconfigure\n\norg.springframework.boot\nspring-boot-configuration-processor\n\
  true\n\norg.springframework.boot\nspring-boot-starter-test\ntest\n\norg.twitter4j\n\
  twitter4j-core\n${twitter4j.version}\ntrue\n\n清单 16-2.\ntwitter4j-spring-boot-autoconfigure/pom.xml\n\
  ```\n\n请注意，此示例将 `twitter4j-core` 指定为可选依赖项，因为仅当将 `twitter4j-spring-boot-starter`\
  \ 添加到项目时，才应将 `twitter4j-core` 添加到项目。\n\n用于保存 Twitter4j 配置参数的 Twitter4j 属性\n\n现在你将创建\
  \ `Twitter4jProperties.java`，以使用 `@ConfigurationProperties` 绑定以 `twitter4j.*` 开头的\
  \ Twitter4j OAuth 配置参数。参见清单 16-3。\n\n```\npackage com.apress.spring.boot.autoconfigure;\n\
  import org.springframework.boot.context.properties.ConfigurationProperties;\n@ConfigurationProperties(prefix=\
  \ Twitter4jProperties.TWITTER4J_PREFIX)\npublic class Twitter4jProperties\n{\npublic\
  \ static final String TWITTER4J_PREFIX = \"twitter4j\";\nprivate Boolean debug =\
  \ false;\nprivate OAuth oauth = new OAuth();\npublic Boolean getDebug() {\nreturn\
  \ debug;\n}\npublic void setDebug(Boolean debug) {\nthis.debug = debug;\n}\npublic\
  \ OAuth getOauth() {\nreturn oauth;\n}\npublic static class OAuth {\nprivate String\
  \ consumerKey;\nprivate String consumerSecret;\nprivate String accessToken;\nprivate\
  \ String accessTokenSecret;\npublic String getConsumerKey() {\nreturn consumerKey;\n\
  }\npublic void setConsumerKey(String consumerKey) {\nthis.consumerKey = consumerKey;\n\
  }\npublic String getConsumerSecret() {\nreturn consumerSecret;\n}\npublic void setConsumerSecret(String\
  \ consumerSecret) {\nthis.consumerSecret = consumerSecret;\n}\npublic String getAccessToken()\
  \ {\nreturn accessToken;\n}\npublic void setAccessToken(String accessToken) {\n\
  this.accessToken = accessToken;\n}\npublic String getAccessTokenSecret() {\nreturn\
  \ accessTokenSecret;\n}\npublic void setAccessTokenSecret(String accessTokenSecret)\
  \ {\nthis.accessTokenSecret = accessTokenSecret;\n}\n}\n}\n清单 16-3.\nTwitter4jProperties.java\n\
  ```\n\n`@ConfigurationProperties` 注解允许你将一组具有公共前缀的属性绑定到 Java bean 属性。使用此配置对象，你可以在\
  \ `application.properties` 中配置 Twitter4j 属性，如清单 16-4 所示。\n\n```\ntwitter4j.debug=true\n\
  twitter4j.oauth.consumer-key=your-consumer-key-here\ntwitter4j.oauth.consumer-secret=your-consumer-secret-here\n\
  twitter4j.oauth.access-token=your-access-token-here\ntwitter4j.oauth.access-token-secret=your-access-token-secret-here\n\
  清单 16-4.\napplication.properties\n```\n\n用于自动配置 Twitter4j 的 Twitter4j 自动配置\n\n现在你创建一个名为\
  \ `Twitter4jAutoConfiguration` 的自动配置类，其中包含将根据某些标准自动配置的 bean 定义。\n\n标准是什么？\n\n* \
  \  如果 `twitter4j.TwitterFactory.class` 在类路径上\n*   如果 `TwitterFactory` bean 尚未显式定义\n\
  \n因此，如果类路径中存在 `TwitterFactory` 类并且尚未注册 `TwitterFactory` bean，你将自动配置 `TwitterFactory`\
  \ 和 Twitter bean。\n\n创建 `Twitter4jAutoConfiguration` 类，如清单 16-5 所示。\n\n```\npackage\
  \ com.apress.spring.boot.autoconfigure;\nimport org.apache.commons.logging.Log;\n\
  import org.apache.commons.logging.LogFactory;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.boot.autoconfigure.condition.ConditionalOnClass;\nimport\
  \ org.springframework.boot.autoconfigure.condition.ConditionalOnMissingBean;\nimport\
  \ org.springframework.boot.context.properties.EnableConfigurationProperties;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import twitter4j.Twitter;\nimport twitter4j.TwitterFactory;\nimport twitter4j.conf.ConfigurationBuilder;\n\
  @Configuration\n@ConditionalOnClass({ TwitterFactory.class })\n@EnableConfigurationProperties(Twitter4jProperties.class)\n\
  public class Twitter4jAutoConfiguration {\nprivate static Log log = LogFactory.getLog(Twitter4jAutoConfiguration.class);\n\
  @Autowired\nprivate Twitter4jProperties properties;\n@Bean\n@ConditionalOnMissingBean\n\
  public TwitterFactory twitterFactory(){\nif (this.properties.getOauth().getConsumerKey()\
  \ == null\n|| this.properties.getOauth().getConsumerSecret() == null\n|| this.properties.getOauth().getAccessToken()\
  \ == null\n|| this.properties.getOauth().getAccessTokenSecret() == null)\n{\nlog.error(\"\
  Twitter4j properties not configured properly. Please check twitter4j.* properties\
  \ settings in configuration file.\");\nthrow new RuntimeException(\"Twitter4j properties\
  \ not configured properly. Please check twitter4j.* properties settings in configuration\
  \ file.\");\n}\nConfigurationBuilder cb = new ConfigurationBuilder();\ncb.setDebugEnabled(properties.getDebug())\n\
  .setOAuthConsumerKey(properties.getOauth().getConsumerKey())\n.setOAuthConsumerSecret(properties.getOauth().getConsumerSecret())\n\
  .setOAuthAccessToken(properties.getOauth().getAccessToken())\n.setOAuthAccessTokenSecret(properties.getOauth().getAccessTokenSecret());\n\
  TwitterFactory tf = new TwitterFactory(cb.build());\nreturn tf;\n}\n@Bean\n@ConditionalOnMissingBean\n\
  public Twitter twitter(TwitterFactory twitterFactory){\nreturn twitterFactory.getInstance();\n\
  }\n}\n清单 16-5.\nTwitter4jAutoConfiguration.java\n```\n\n此示例使用 `@ConditionalOnClass({\
  \ TwitterFactory.class})` 来指定仅当 `TwitterFactory.class` 类存在时才应进行此自动配置。\n\n它还使用 bean\
  \ 定义方法上的 `@ConditionalOnMissingBean` 来仅当尚未显式定义 `TwitterFactory` bean 时才考虑此 bean\
  \ 定义。\n\n还要注意，该示例使用 `@EnableConfigurationProperties(Twitter4jProperties.class)`\
  \ 注解以启用对 `ConfigurationProperties` 的支持，并注入了 `Twitter4jProperties` bean。\n\n现在你需要在\
  \ `src/main/resources/METAINF/spring.factories` 文件中配置自定义的 `Twitter4jAutoConfiguration`，如下所示：\n\
  \n```\norg.springframework.boot.autoconfigure.EnableAutoConfiguration=\\ com.apress.spring.boot.autoconfigure.Twitter4jAutoConfiguration\n\
  ```\n\n接下来，你将创建名为 `twitter4j-spring-boot-starter` 的启动器模块。\n\n创建 twitter4j-spring-boot-starter\
  \ 模块\n\n现在你将创建一个名为 `twitter4j-spring-boot-starter` 的模块，并配置其依赖项，如清单 16-6 所示。\n\n\
  ```\n\n4.0.0\ncom.apress\ntwitter4j-spring-boot-starter\njar\n1.0-SNAPSHOT\n\nUTF-8\n\
  1.8\n1.8\n2.0.0.BUILD-SNAPSHOT\n4.0.4\n\norg.springframework.boot\nspring-boot-dependencies\n\
  ${spring-boot.version}\npom\nimport\n\norg.springframework.boot\nspring-boot-starter\n\
  \ncom.apress\ntwitter4j-spring-boot-autoconfigure\n${project.version}\n\norg.twitter4j\n\
  twitter4j-core\n${twitter4j.version}\n\n清单 16-6.\ntwitter4j-spring-boot-starter/pom.xml\n\
  ```\n\n请注意，在此 Maven 模块中，你实际上引入了 `twitter4j-core` 依赖项。\n\n你不需要向此模块添加任何代码，但你可以选择在\
  \ `src/main/resources/METAINF/spring.provides` 文件中指定你将通过此启动器提供的依赖项，如下所示：\n\n```\n\
  provides: twitter4j-core\n```\n\n这就是这个启动器的全部内容。接下来，你将看到如何使用 `twitter4j-spring-boot-starter`\
  \ 创建一个示例。\n\n使用 twitter4j-spring-boot-starter 的应用程序\n\n我们将创建一个简单的基于 Maven 的 Spring\
  \ Boot 应用程序，并使用 `twitter4j-spring-boot-starter` 来获取最新的推文。首先，你创建一个简单的 Spring Boot\
  \ 应用程序并添加 `twitter4j-spring-boot-starter` 依赖项，如清单 16-7 所示。\n\n```\n\n4.0.0\ncom.apress\n\
  twitter4j-spring-boot-sample\njar\n1.0-SNAPSHOT\n\norg.springframework.boot\nspring-boot-starter-parent\n\
  2.0.0.BUILD-SNAPSHOT\n\nUTF-8\n1.8\n\norg.springframework.boot\nspring-boot-maven-plugin\n\
  \ncom.apress\ntwitter4j-spring-boot-starter\n1.0-SNAPSHOT\n\norg.springframework.boot\n\
  spring-boot-starter-test\ntest\n\n清单 16-7.\ntwitter4j-spring-boot-sample/pom.xml\n\
  ```\n\n创建入口点类 `SpringbootTwitter4jDemoApplication`，如清单 16-8 所示。\n\n```\npackage\
  \ com.apress.demo;\nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  @SpringBootApplication\npublic class SpringbootTwitter4jDemoApplication\n{\npublic\
  \ static void main(String[] args)\n{\nSpringApplication.run(SpringbootTwitter4jDemoApplication.class,\
  \ args);\n}\n}\n清单 16-8.\nSpringbootTwitter4jDemoApplication.java\n```\n\n接下来，创建\
  \ `TweetService`，如清单 16-9 所示。\n\n```\npackage com.apress.demo;\nimport java.util.ArrayList;\n\
  import java.util.List;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\nimport twitter4j.ResponseList;\n\
  import twitter4j.Status;\nimport twitter4j.Twitter;\nimport twitter4j.TwitterException;\n\
  @Service\npublic class TweetService\n{\n@Autowired\nprivate Twitter twitter;\npublic\
  \ List getLatestTweets()\n{\nList tweets = new ArrayList();\ntry {\nResponseList\
  \ homeTimeline = twitter.getHomeTimeline();\nfor (Status status : homeTimeline)\n\
  {\ntweets.add(status.getText());\n}\n}\ncatch (TwitterException e) {\nthrow new\
  \ RuntimeException(e);\n}\nreturn tweets;\n}\n}\n清单 16-9.\nTweetService.java\n```\n\
  \n现在创建一个测试来验证 Twitter4j 自动配置（参见清单 16-10）。在此之前，请确保已将 Twitter4j OAuth 配置参数设置为你实际的值。你可以从\
  \ [`https://apps.twitter.com/`](https://apps.twitter.com/) 获取它们。\n\n```\npackage\
  \ com.apress.demo;\nimport java.util.List;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
  import org.springframework.test.context.junit4.SpringRunner;\nimport twitter4j.TwitterException;\n\
  @RunWith(SpringRunner.class)\n@SpringBootTest\npublic class SpringbootTwitter4jDemoApplicationTest\n\
  {\n@Autowired\nprivate TweetService tweetService;\n@Test\npublic void testGetTweets()\
  \ throws TwitterException\n{\nList tweets = tweetService.getLatestTweets();\nfor\
  \ (String tweet : tweets)\n{\nSystem.err.println(tweet);\n}\n}\n}\n清单 16-10.\nSpringbootTwitter4jDemoApplicationTest.java\n\
  ```\n\n现在，当你运行此 JUnit 测试时，你应该能够在控制台输出中看到最新的推文。\n\n总结\n\n在本章中，你学习了如何创建自己的自动配置类和你自己的\
  \ Spring Boot 启动器。在下一章中，你将学习如何使用 Groovy、Scala 和 Kotlin 等 JVM 语言开发 Spring Boot 应用程序。\n\
  \n17. Spring Boot 与 Groovy、Scala 和 Kotlin\n\nJava 是在 Java 虚拟机（JVM）上运行的最广泛使用的编程语言。还有许多其他基于\
  \ JVM 的语言，例如 Groovy、Scala、JRuby、Jython、Kotlin 等。其中，Groovy 和 Scala 被广泛采用，在 Java 社区中非常流行，而\
  \ Kotlin 的采用率正在迅速增长。\n\nSpring Boot 是一个基于 Java 的框架，也可以与其他基于 JVM 的语言一起使用。本章介绍如何将\
  \ Spring Boot 与 Groovy、Scala 和 Kotlin 编程语言一起使用。\n\n将 Spring Boot 与 Groovy 一起使用\n\
  \nGroovy 是一种在 JVM 上运行的动态类型语言。由于 Groovy 的语法与 Java 非常接近，Java 开发人员很容易上手 Groovy。可以使用\
  \ Groovy 编程语言开发 Spring Boot 应用程序。\n\nGroovy 简介\n\nGroovy 是一种基于 JVM 的编程语言，具有类似 Java\
  \ 的语法。但 Groovy 支持动态类型、闭包、元编程、运算符重载等。除此之外，Groovy 还提供了许多很酷的功能，例如多行字符串、字符串插值、优雅的循环结构和简单的属性访问。此外，分号是可选的。所有这些都有助于提高开发人员的工作效率。\n\
  \nGroovy 字符串\n\n你可以使用单引号或双引号在 Groovy 中创建字符串。使用单引号时，字符串被视为 `java.lang.String` 的实例，而使用双引号时，它被视为\
  \ `groovy.lang.Gstring` 的实例，它支持字符串插值。\n\n```\ndef name = \"John\"\ndef amount =\
  \ 125\nprintln('My name is ${name}')\nprintln(\"My name is ${name}\")\nprintln(\"\
  He paid \\$${amount}\")\n```\n\n当你运行此代码时，它将打印以下输出：\n\n```\nMy name is ${name}\n\
  My name is John\nHe paid $125\n```\n\n由于第一个 `println()` 语句中使用了单引号，`${name}` 按原样打印，而在第二个\
  \ `println()` 语句中，由于使用了双引号，它被插值。此代码还使用了转义字符 `\\$` 来打印 `$` 符号。\n\nGroovy 支持使用三引号（`\"\
  \"\"` 或 `'''`）的多行字符串，如下所示：\n\n```\n//using single quotes\ndef content = '''My Name\
  \ is John.\nI live in London.\nI am a software developer'''\ndef name = 'John'\n\
  def address = 'London'\ndef occupation = 'software developer'\n//using double quotes\n\
  def bio = \"\"\"My name is ${name}.\nI live in ${address}.\nI am a ${occupation}.\"\
  \"\"\n```\n\nGroovy 的多行支持在创建跨越多行的字符串（如创建表脚本、带有占位符的 HTML 模板等）时非常方便。\n\nJavaBean 属性\n\
  \n在 Java 中，你通常通过创建私有属性以及这些属性的 setter 和 getter 来创建 Java bean。尽管你可以使用 IDE 支持生成 setter\
  \ 和 getter，但它冗长且不必要地嘈杂。\n\n在 Groovy 中，你可以通过仅声明属性来创建 bean，然后使用 `object.propertyName`\
  \ 语法访问它们，而无需创建 setter 和 getter。\n\n```\nclass Person\n{\ndef id\n\n\n"
- '# 基础镜像为 Ubuntu

  FROM ubuntu:14.04


  '
- '# 作者：Siva

  MAINTAINER Siva


  '
- '# 安装 apache2 软件包

  RUN apt-get update && apt-get install -y apache2 && apt-get clean


  '
- '# 启动时运行的命令

  CMD ["echo", "Dockerfile demo"]

  列表 19-12.

  示例 Dockerfile

  ```


  该文件通过 `FROM` 命令使用基础镜像 `ubuntu:14.04`。你可以选择使用 `MAINTAINER` 命令提供作者详细信息。


  接下来，代码使用 `RUN` 命令运行安装 `apache2` Web 服务器的指令，这些指令将在镜像构建期间执行。


  最后，代码使用 `CMD` 命令运行带有参数 `Dockerfile demo` 的 `echo` 命令。你可以使用 `CMD` 命令指定启动容器时应执行的命令。在启动容器时，可以通过将命令作为参数传递给
  `docker run` 命令来覆盖 `CMD` 命令。


  一个 `Dockerfile` 中只能有一个 `CMD` 命令。即使指定了多个 `CMD` 命令，也只会考虑最后一个。


  你可以使用 `docker build` 命令从 `Dockerfile` 构建镜像，并使用 `-t` 标志为其命名。在包含 `Dockerfile` 的同一目录下运行以下命令：


  ```

  sudo docker build -t my-apache2.

  ```


  注意命令末尾的点。这表示 `Dockerfile` 的位置，即当前目录。


  你可以使用 `docker images` 命令列出本地所有可用的镜像。


  现在，你可以使用 `docker run` 命令从 `my-apache2` 镜像启动一个容器，如下所示：


  ```

  sudo docker run my-apache2

  ```


  此命令应在控制台打印 `Dockerfile demo`。


  你可以使用 `sudo docker ps` 命令显示正在运行的容器详细信息。


  现在你已经基本了解了如何使用 Docker，在下一节中，你将看到如何将 Spring Boot 应用程序打包并在 Docker 容器中运行。


  在 Docker 容器中运行 Spring Boot 应用程序


  你将使用上一节中为在 Heroku 上部署 Spring Boot 而构建的应用程序。在项目的根目录下创建 `Dockerfile`，内容如下：


  ```

  FROM java:8

  ADD target/springboot-heroku-demo.jar app.jar

  RUN bash -c ''touch /app.jar''

  ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-jar","/app.jar"]

  ```


  此代码使用 `java:8` 作为基础镜像。它将 `target/springboot-heroku-demo.jar` 复制到目标镜像中，并命名为 `app.jar`。最后，它使用
  `ENTRYPOINT` 调用 `java -jar app.jar` 命令。


  在构建 Docker 镜像之前，你首先需要构建应用程序：


  ```

  springboot-heroku-demo> mvn clean package

  ```


  现在，你可以按如下方式运行 `docker build` 命令：


  ```

  docker build -t sivaprasadreddy/springboot-heroku-demo .

  ```


  在这里，你将镜像标记为 `sivaprasadreddy/springboot-heroku-demo`。由于你尚未激活任何配置文件，因此默认配置文件将处于活动状态，应用程序将使用
  `H2` 内存数据库。


  现在，从 `sivaprasadreddy/springboot-heroku-demo` 镜像启动容器，如下所示：


  ```

  docker run -d \

  --name springboot-heroku-demo \

  -p 80:8080 \

  sivaprasadreddy/springboot-heroku-demo

  ```


  你正在运行容器，将其命名为 `springboot-heroku-demo`，并将容器的端口 `8080` 暴露在 Docker 主机的端口 `80` 上。


  现在，你将看到如何在一个 Docker 容器中启动 Postgres 数据库，然后在另一个容器中启动应用程序，并使用第一个容器中的 Postgres 数据库。


  你可以使用 `postgres` 镜像启动一个 Postgres 数据库容器，如下所示：


  ```

  docker run --name demo-postgres \

  -e POSTGRES_DB=demodb  \

  -e POSTGRES_USER=postgres \

  -e POSTGRES_PASSWORD=secret123 \

  -d postgres

  ```


  此代码使用 `-d` 标志以分离模式启动一个 `postgres` 容器，并将其命名为 `demo-postgres`。它还通过使用 `-e` 标志将数据库名称、用户名和密码指定为环境变量。


  现在，你将创建 Docker 配置文件 `application-docker.properties`，内容如下：




  ```

  spring.datasource.driver-class-name=org.postgresql.Driver

  spring.datasource.url=jdbc:postgresql://${POSTGRES_PORT_5432_TCP_ADDR}:${POSTGRES_PORT_5432_TCP_PORT}/demodb

  spring.datasource.username=${POSTGRES_ENV_POSTGRES_USER}

  spring.datasource.password=${POSTGRES_ENV_POSTGRES_PASSWORD}

  spring.jpa.hibernate.ddl-auto=update

  ```


  你可以修改 `Dockerfile`，通过激活 `docker` 配置文件来运行应用程序：


  ```

  FROM java:8

  ADD target/springboot-heroku-demo.jar app.jar

  RUN bash -c ''touch /app.jar''

  ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-Dspring.profiles.active=docker","-jar","/app.jar"]

  ```


  请注意，代码中指定了 `-Dspring.profiles.active=docker` 来激活 `docker` 配置文件，这样应用程序将使用运行在另一个 Docker
  容器中的 Postgres 数据库，而不是使用 `H2` 内存数据库。


  现在使用 `mvn clean package` 命令构建项目，并构建你的应用程序 Docker 镜像。


  ```

  docker build -t sivaprasadreddy/springboot-heroku-demo .

  ```


  在启动容器之前，你需要删除现有的容器。可以按如下方式删除现有容器：


  ```

  sudo docker rm springboot-heroku-demo

  ```


  你需要将应用程序的 Docker 容器与 `demo-postgres` Docker 容器链接起来，以便能够从应用程序中使用 Postgres 数据库。


  使用以下命令启动应用程序容器：


  ```

  docker run -d \

  --name springboot-heroku-demo \

  --link demo-postgres:postgres \

  -p 80:8080 \

  sivaprasadreddy/springboot-heroku-demo

  ```


  请注意，你使用 `--link` 标志链接了 `demo-postgres` 容器，并为其指定了一个别名 `postgres`。现在，应用程序在一个容器中运行，并与另一个容器中运行的
  Postgres 数据库进行通信。


  使用 docker-compose 运行多个容器


  如果你的应用程序依赖于多个服务，并且你需要将它们全部启动在 Docker 容器中，那么逐个启动它们会很繁琐。你可以使用 `docker-compose` 工具来编排运行应用程序所需的多个容器。你需要创建一个
  `docker-compose.yml` 文件，并配置你想要运行的服务。


  在应用程序的根目录下创建 `docker-compose.yml`，如清单 19-13 所示。


  ```

  demo-postgres:

  image: postgres:latest

  environment:

  - POSTGRES_DB=demodb

  - POSTGRES_USER=postgres

  - POSTGRES_PASSWORD=secret123

  springboot-heroku-demo:

  image: sivaprasadreddy/springboot-heroku-demo

  links:

  - demo-postgres:postgres

  ports:

  - 80:8080

  清单 19-13.

  docker-compose.yml

  ```


  现在，你只需在存放 `docker-compose.yml` 文件的目录下运行 `docker-compose up` 命令，即可启动应用程序和 Postgres
  容器。


  注意


  你可以使用 `docker-maven-plugin` 来构建 Docker 镜像。访问 [`https://github.com/spotify/docker-maven-plugin`](https://github.com/spotify/docker-maven-plugin)
  以了解更多关于 `docker-maven-plugin` 的信息。如果你使用的是 Gradle 构建工具，可以使用 `gradle-docker` 插件（ [`https://github.com/Transmode/gradle-docker`](https://github.com/Transmode/gradle-docker)
  ）来构建 Docker 镜像。


  要了解更多关于 Docker 的信息，请访问 [`https://docs.docker.com/`](https://docs.docker.com/) 。


  总结


  本章讨论了如何在生产环境中运行应用程序，以及如何在 Heroku 云平台上部署 Spring Boot 应用程序。你还学习了如何在 Docker 容器上运行 Spring
  Boot 应用程序。


