  \ IDE 中下载并配置一个服务器，例如 Tomcat、Jetty 或 Wildfly 等。您可以下载 Tomcat 8 并配置您喜欢的 IDE，运行应用程序，然后将浏览器指向\
  \ `http://localhost:8080/springmvcjpa-demo`。如果一切顺利，您应该会看到一个表格中显示的用户详细信息列表，如图 1-1\
  \ 所示。\n\n![A447991_1_En_1_Fig1_HTML.jpg](img/A447991_1_En_1_Fig1_HTML.jpg)\n\n图\
  \ 1-1.\n\n显示用户列表\n\n耶……您做到了。但是，等等，仅仅为了显示从数据库表中拉取的用户详细信息列表，这工作量是不是太大了？\n\n让我们坦诚且公平地说。所有这些配置并不仅仅是为了这一个用例。这些配置成为了应用程序其余部分的基础。同样，如果您想快速启动并运行，这工作量也太大了。它的另一个问题是，假设您想开发另一个具有类似技术栈的\
  \ SpringMVC 应用程序。您可以复制粘贴配置并进行调整，对吧？\n\n记住一件事：如果您不得不一次又一次地做同样的事情，您应该找到一种自动化的方法来完成它。\n\
  \n除了反复编写相同的配置之外，您在这里还看到其他问题了吗？让我们看看我在这里看到的问题。\n\n*   您需要为特定的 Spring 版本搜寻所有兼容的库并进行配置。\n\
  *   大多数情况下，您会以相同的方式配置 `DataSource`、`EntitymanagerFactory`、`TransactionManager` 等\
  \ bean。如果 Spring 能自动为您完成这些工作，那岂不是很好？\n*   类似地，大多数情况下，您也会以相同的方式配置 `ViewResolver`、`MessageSource`\
  \ 等 SpringMVC bean。如果 Spring 能自动为您完成，那就太棒了。\n\n如果 Spring 能够自动配置 bean 会怎样？如果您可以使用简单的可定制属性来自定义自动配置会怎样？\n\
  \n例如，您可能希望将 `DispatcherServlet url-pattern` 映射到 `/app/`，而不是映射到 `/`。您可能希望将 Thymeleaf\
  \ 视图放在 `/WEB-INF/templates/` 文件夹中，而不是放在 `/WEB-INF/views` 文件夹中。\n\n所以，基本上您希望 Spring\
  \ 自动完成事情，同时又能以更简单的方式提供覆盖默认配置的灵活性。您即将进入 Spring Boot 的世界，在这里您的梦想可以成真！\n\n## 快速体验 Spring\
  \ Boot\n\n欢迎来到 Spring Boot！Spring Boot 会自动为您配置应用程序组件，但如果您愿意，也允许您覆盖默认配置。\n\n与其从理论上解释这一点，我更喜欢通过示例来解释。在本节中，您将看到如何使用\
  \ Spring Boot 实现相同的应用程序。\n\n1.  创建一个基于 Maven 的 Spring Boot 项目，并在 `pom.xml` 文件中配置依赖项，如清单\
  \ 1-15 所示。\n\n    ```\n\n    4.0.0\n    com.apress\n    hello-springboot\n    jar\n\
  \    1.0-SNAPSHOT\n    hello-springboot\n\n    org.springframework.boot\n    spring-boot-starter-parent\n\
  \    2.0.0.RELEASE\n\n    UTF-8\n    1.8\n\n    org.springframework.boot\n    spring-boot-starter-data-jpa\n\
  \n    org.springframework.boot\n    spring-boot-starter-web\n\n    org.springframework.boot\n\
  \    spring-boot-starter-thymeleaf\n\n    mysql\n    mysql-connector-java\n\n  \
  \  org.springframework.boot\n    spring-boot-maven-plugin\n\n    清单 1-15.\n    pom.xml\
  \ 文件\n    ```\n\n    哇，这个 `pom.xml` 文件突然变得这么小！注意 如果此时这个配置看起来没有意义，请不要担心。在接下来的章节中，您还有很多要学习的内容。如果您想使用\
  \ Spring Boot 的任何 `MILESTONE` 或 `SNAPSHOT` 版本，您需要在 `pom.xml` 中配置以下里程碑/快照仓库。\n\n\
  \    ```\n    org.springframework.boot\n    spring-boot-starter-parent\n    2.0.0.BUILD-SNAPSHOT\n\
  \n    spring-snapshots\n    Spring Snapshots\n    https://repo.spring.io/snapshot\n\
  \n    true\n\n    spring-milestones\n    Spring Milestones\n    https://repo.spring.io/milestone\n\
  \n    false\n\n    spring-snapshots\n    Spring Snapshots\n    https://repo.spring.io/snapshot\n\
  \n    true\n\n    spring-milestones\n    Spring Milestones\n    https://repo.spring.io/milestone\n\
  \n    false\n\n    ```\n\n2.  在 `src/main/resources/application.properties` 中配置数据源/JPA\
  \ 属性，如清单 1-16 所示。\n\n    ```\n    spring.datasource.driver-class-name=com.mysql.jdbc.Driver\n\
  \    spring.datasource.url=jdbc:mysql://localhost:3306/test\n    spring.datasource.username=root\n\
  \    spring.datasource.password=admin\n    spring.datasource.initialize=true\n \
  \   spring.jpa.hibernate.ddl-auto=update\n    spring.jpa.show-sql=true\n    清单 1-16.\n\
  \    src/main/resources/application.properties 文件\n    ```\n\n    将相同的 `data.sql`\
  \ 文件复制到 `src/main/resources` 文件夹中。  \n3.  创建一个名为 `User.java` 的 JPA 实体、一个名为 `UserRepository.java`\
  \ 的 Spring Data JPA 仓库接口以及一个名为 `HomeController.java` 的控制器，如之前的 `springmvc-jpa-demo`\
  \ 应用程序所示。  \n4.  创建一个 Thymeleaf 视图来显示用户列表。您可以将之前在 `springmvc-jpa-demo` 应用程序中创建的\
  \ `/WEB-INF/views/index.html` 复制到新项目的 `src/main/resources/templates` 文件夹中。  \n5.\
  \  创建一个包含 main 方法的 Spring Boot 入口点类 `Application.java` 文件，如清单 1-17 所示。\n\n    ```\n\
  \    package com.apress.demo;\n    import org.springframework.boot.SpringApplication;\n\
  \    import org.springframework.boot.autoconfigure.SpringBootApplication;\n    @SpringBootApplication\n\
  \    public class Application\n    {\n    public static void main(String[] args)\n\
  \    {\n    SpringApplication.run(Application.class, args);\n    }\n    }\n    清单\
  \ 1-17.\n    com.apress.demo.Application.java 文件\n    ```\n\n现在，将 `Application.java`\
  \ 作为 Java 应用程序运行，并将浏览器指向 `http://localhost:8080/`。您应该会看到一个表格格式的用户列表。\n\n但您可能会挠头，心想“这是怎么回事？”。下一节将解释刚才发生的事情。\n\
  \n\n\n### 轻松管理依赖\n\n首先要注意的是以 `spring-boot-starter-*` 命名的依赖项的使用。还记得我说过，“大多数情况下，你使用的都是相同的配置”。因此，当你添加\
  \ `springboot-starter-web` 依赖时，它会默认拉取开发 Spring MVC 应用程序时常用的所有库，例如 `spring-webmvc`、`jackson-json`、`validation-api`\
  \ 和 `tomcat`。\n\n我们添加了 `spring-boot-starter-data-jpa` 依赖。这会拉取所有 `spring-data-jpa`\
  \ 依赖并添加 Hibernate 库，因为大多数应用程序都使用 Hibernate 作为 JPA 实现。\n\n### 自动配置\n\n`spring-boot-starter-web`\
  \ 不仅添加了所有这些库，还使用合理的默认值配置了常用的注册 bean，例如 `DispatcherServlet`、`ResourceHandler`、`MessageSource`\
  \ 等。\n\n我们还添加了 `spring-boot-starter-thymeleaf`，它不仅添加了 Thymeleaf 库依赖，还自动配置了 `ThymeleafViewResolver`\
  \ bean。\n\n我们没有定义任何 `DataSource`、`EntityManagerFactory` 或 `TransactionManager` bean，但它们都被自动创建了。这是如何做到的？\n\
  \n如果你的类路径中有任何内存数据库驱动程序（如 H2 或 HSQL），那么 Spring Boot 将自动创建一个内存数据源，并使用合理的默认值自动注册 `EntityManagerFactory`\
  \ 和 `TransactionManager` bean。\n\n但是你使用的是 MySQL，因此需要显式提供 MySQL 连接详细信息。你已在 `application.properties`\
  \ 文件中配置了这些 MySQL 连接详细信息，Spring Boot 会使用这些属性创建一个 `DataSource`。\n\n### 嵌入式 Servlet\
  \ 容器支持\n\n最重要且令人惊讶的是，我们创建了一个简单的 Java 类，并用一些神奇的注解（`@SpringApplication`）进行了标注，该类有一个\
  \ `main()` 方法。通过运行该 `main()` 方法，我们能够运行应用程序并通过 `http://localhost:8080/` 访问它。Servlet\
  \ 容器是从哪里来的？\n\n我们添加了 `spring-boot-starter-web`，它会自动拉取 `spring-boot-starter-tomcat`。当我们运行\
  \ `main()` 方法时，它会启动 Tomcat 作为嵌入式容器，这样我们就不必将应用程序部署到任何外部安装的 Tomcat 服务器上。如果我们想使用 Jetty\
  \ 服务器而不是 Tomcat 呢？你只需从 `spring-boot-starter-web` 中排除 `spring-boot-starter-tomcat`，并包含\
  \ `spring-boot-starter-jetty` 即可。就这么简单。\n\n但这看起来太神奇了！我能想象你在想什么。你可能会想，Spring Boot\
  \ 看起来很酷，它自动为你做了很多事情。你仍然不完全理解这一切在幕后是如何运作的，对吧？\n\n我能理解。看魔术表演很有趣，但在软件开发中，神秘感就没那么有趣了。别担心，我们将逐一审视这些内容，并详细解释幕后发生的事情。我不想在第一章节就把所有东西都抛给你，让你不知所措。\n\
  \n## 总结\n\n本章快速概述了各种 Spring 配置风格。目的是向你展示配置 Spring 应用程序的复杂性。同时，你也通过创建一个简单的 Web 应用程序，快速了解了\
  \ Spring Boot。\n\n下一章将更详细地介绍 Spring Boot，并展示如何以不同方式创建 Spring Boot 应用程序。\n\n"
- "# 2. Spring Boot 入门\n\n本章将更详细地介绍 Spring Boot 及其特性。然后，本章将探讨创建 Spring Boot 应用程序的各种选项，例如\
  \ Spring Initializr、Spring Tool Suite、Intellij IDEA 等。最后，本章将探索生成的代码，并介绍如何运行应用程序。\n\
  \n## 什么是 Spring Boot？\n\nSpring Boot 是一个固执己见的框架，可帮助开发者快速、轻松地构建基于 Spring 的应用程序。Spring\
  \ Boot 的主要目标是快速创建基于 Spring 的应用程序，而无需开发者一遍又一遍地编写相同的样板配置。Spring Boot 的关键特性包括：\n\n\
  *   Spring Boot 启动器\n*   Spring Boot 自动配置\n*   优雅的配置管理\n*   Spring Boot Actuator\n\
  *   易于使用的嵌入式 Servlet 容器支持\n\n### Spring Boot 启动器\n\nSpring Boot 提供了许多启动器模块，可以快速上手许多常用技术，例如\
  \ SpringMVC、JPA、MongoDB、Spring Batch、SpringSecurity、Solr、ElasticSearch 等。这些启动器预先配置了最常用的库依赖，因此你无需搜索兼容的库版本并手动配置它们。\n\
  \n例如，`spring-boot-starter-data-jpa` 启动器模块包含了使用 Spring Data JPA 所需的所有依赖，以及 Hibernate\
  \ 库依赖，因为 Hibernate 是最常用的 JPA 实现。\n\n注意\n\n你可以在官方文档中找到所有开箱即用的 Spring Boot 启动器列表：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-starter-poms`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-starter-poms)。\n\
  \n### Spring Boot 自动配置\n\nSpring Boot 解决了 Spring 应用程序需要复杂配置的问题，它消除了手动设置样板配置的需要。\n\
  \nSpring Boot 对应用程序采取固执己见的看法，并根据各种标准自动注册 bean，从而自动配置各种组件。这些标准可以是：\n\n*   类路径中存在特定类\n\
  *   Spring bean 的存在或不存在\n*   系统属性的存在\n*   配置文件的不存在\n\n例如，如果你的类路径中有 `spring-webmvc`\
  \ 依赖，Spring Boot 会假定你正在尝试构建一个基于 SpringMVC 的 Web 应用程序，并自动尝试注册 `DispatcherServlet`（如果尚未注册）。\n\
  \n如果你的类路径中有任何嵌入式数据库驱动程序（例如 H2 或 HSQL），并且你尚未显式配置 `DataSource` bean，那么 Spring Boot\
  \ 将使用内存数据库设置自动注册一个 `DataSource` bean。你将在第 3 章中了解更多关于自动配置的信息。\n\n### 优雅的配置管理\n\n\
  Spring 支持使用 `@PropertySource` 配置来外部化可配置属性。Spring Boot 通过使用合理的默认值和强大的类型安全属性绑定到 bean\
  \ 属性，将其更进一步。Spring Boot 支持为不同的配置文件（profile）使用单独的配置文件，而无需大量配置。\n\n### Spring Boot\
  \ Actuator\n\n能够获取生产环境中运行的应用程序的各种详细信息，对许多应用程序来说至关重要。Spring Boot Actuator 提供了多种此类生产就绪特性，而无需开发者编写大量代码。Spring\
  \ Actuator 的一些特性包括：\n\n*   可以查看应用程序 bean 配置详细信息\n*   可以查看应用程序 URL 映射、环境详细信息和配置参数值\n\
  *   可以查看已注册的健康检查指标\n\n### 易于使用的嵌入式 Servlet 容器支持\n\n传统上，在构建 Web 应用程序时，你需要创建 WAR 类型的模块，然后将它们部署到外部服务器（如\
  \ Tomcat、WildFly 等）上。但是，通过使用 Spring Boot，你可以创建一个 JAR 类型的模块，并非常轻松地将 Servlet 容器嵌入到应用程序中，这样应用程序将成为一个自包含的部署单元。此外，在开发过程中，你可以轻松地从\
  \ IDE 或使用构建工具（如 Maven 或 Gradle）从命令行将 Spring Boot JAR 类型模块作为 Java 应用程序运行。\n\n你将在后续章节中了解更多关于这些特性以及如何有效使用它们的信息。\n\
  \n\n\n## 你的第一个 Spring Boot 应用\n\n创建 Spring Boot 应用的方法有很多种。最简单的方式是使用位于 [`http://start.spring.io/`](http://start.spring.io/)\
  \ 的 Spring Initializr，这是一个在线 Spring Boot 应用生成器。在本节中，你将了解如何创建一个提供简单 HTML 页面的 Spring\
  \ Boot Web 应用，并探索典型 Spring Boot 应用的各个方面。\n\n### 使用 Spring Initializr\n\n你可以将浏览器指向\
  \ [`http://start.spring.io/`](http://start.spring.io/)，查看项目详情，如图 2-1 所示。\n\n1. \
  \ 选择 Maven 项目和 Spring Boot 版本（在撰写本书时，最新版本是 2.0.0—SNAPSHOT）。\n2.  按如下方式输入 Maven 项目详情：\n\
  \    *   组（Group）：`com.apress`\n    *   工件（Artifact）：`springboot-basic`\n    * \
  \  名称（Name）：`springboot-basic`\n    *   包名（Package Name）：`com.apress.demo`\n   \
  \ *   打包方式（Packaging）：JAR\n    *   Java 版本：1.8\n    *   语言：Java\n3.  如果你已经熟悉启动器的名称，可以直接搜索；或者点击“切换到完整版本”链接，查看所有可用的启动器。你会看到许多启动器模块，它们被组织成不同的类别，如核心（Core）、Web、数据（Data）等。从\
  \ Web 类别中选择 Web 复选框。\n4.  点击“生成项目”按钮。\n\n![A447991_1_En_2_Fig1_HTML.jpg](img/A447991_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1.\n\nSpring Initializr\n\n现在，你可以解压下载的 ZIP 文件，并将其导入到你喜欢的 IDE 中。\n\n### 使用\
  \ Spring Tool Suite\n\nSpring Tool Suite（STS：[`https://spring.io/tools/sts`](https://spring.io/tools/sts)）是\
  \ Eclipse IDE 的一个扩展，包含许多与 Spring 框架相关的插件。你可以通过选择“文件 ➤ 新建 ➤ 其他 ➤ Spring ➤ Spring\
  \ Starter 项目 ➤ 下一步”，轻松地从 STS 创建一个 Spring Boot 应用。你将看到一个向导，它看起来与 Spring Initializr\
  \ 类似（图 2-2）。\n\n![A447991_1_En_2_Fig2_HTML.jpg](img/A447991_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2.\n\nSTS 新建 Spring Starter 项目向导\n\n输入项目详情并点击“下一步”。然后选择最新的 Spring Boot 版本和\
  \ Web 启动器（图 2-3），并点击“完成”。\n\n![A447991_1_En_2_Fig3_HTML.jpg](img/A447991_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3.\n\nSTS Spring 启动器选择向导\n\nSpring Boot 项目将被创建并自动导入到 STS IDE 中。\n\n### 使用\
  \ Intellij IDEA\n\nIntellij IDEA 是一款功能强大的商业 IDE，具有出色的特性，包括对 Spring Boot 的支持。你可以通过选择“文件\
  \ ➤ 新建 ➤ 项目 ➤ Spring Initializr ➤ 下一步”，从 Intellij IDEA 创建一个 Spring Boot 项目。输入项目详情并点击“下一步”。然后选择启动器并点击“下一步”。最后，输入项目名称并点击“完成”。\n\
  \n注意\n\nSpring 框架支持仅适用于商业版的 Intellij IDEA Ultimate Edition，而不适用于免费的 Community Edition。如果你想使用\
  \ Intellij IDEA Community Edition，你可以使用 Spring Initializr 生成项目，然后将其作为 Maven/Gradle\
  \ 项目导入到 Intellij IDEA 中。\n\n### 使用 NetBeans IDE\n\nNetBeans IDE 是另一个用于开发 Java 应用的流行\
  \ IDE。目前，NetBeans 中没有开箱即用的创建 Spring Boot 项目的支持，但社区构建了 NB Spring Boot 插件（参见 [`https://github.com/AlexFalappa/nb-springboot`](https://github.com/AlexFalappa/nb-springboot)），该插件支持直接从\
  \ IDE 创建 Spring Boot 应用。\n\n注意\n\n还有一些其他快速使用 Spring Boot 的选项，例如使用 Spring Boot CLI\
  \ 和 SDKMAN。你可以在以下地址找到更多详细信息：“安装 Spring Boot”：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started-installing-spring-boot`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started-installing-spring-boot)。\n\
  \n### 探索项目\n\n现在你已经创建了一个包含 `web` 启动器的基于 Maven 的 Spring Boot 项目，可以开始探索生成的应用中包含的内容了。\n\
  \n1.  首先，查看 `pom.xml` 文件，如代码清单 2-1 所示。\n\n```\n4.0.0\n    com.apress\n    springboot-basic\n\
  \    0.0.1-SNAPSHOT\n    jar\n    springboot-basic\n    Demo project for Spring\
  \ Boot\n\norg.springframework.boot\n    spring-boot-starter-parent\n    2.0.0.BUILD-SNAPSHOT\n\
  \nUTF-8\n    UTF-8\n    1.8\n\nspring-snapshots\n    Spring Snapshots\n    https://repo.spring.io/snapshot\n\
  \ntrue\n\nspring-milestones\n    Spring Milestones\n    https://repo.spring.io/milestone\n\
  \nfalse\n\nspring-snapshots\n    Spring Snapshots\n    https://repo.spring.io/snapshot\n\
  \ntrue\n\nspring-milestones\n    Spring Milestones\n    https://repo.spring.io/milestone\n\
  \nfalse\n\norg.springframework.boot\n    spring-boot-starter-web\n\norg.springframework.boot\n\
  \    spring-boot-starter-test\n    test\n\norg.springframework.boot\n    spring-boot-maven-plugin\n\
  \n代码清单 2-1.\n    pom.xml 文件\n    ```\n\n这里首先要注意的是，`springboot-basic` Maven 模块继承自\
  \ `springboot-starter-parent` 模块。通过继承 `spring-boot-starter-parent`，这个新模块将自动获得以下好处：\n\
  \    *   你只需要在父模块配置中指定一次 Spring Boot 版本。你不需要为所有启动器依赖项和其他支持库指定版本。要查看支持库的列表，请查看 `org.springframework.boot:springboot-dependencies:{version}`\
  \ Maven 模块的 `pom.xml` 文件。\n    *   父模块 `spring-boot-starter-parent` 已经包含了最常用的插件，例如\
  \ `maven-jar-plugin`、`maven-surefire-plugin`、`maven-war-plugin`、`exec-maven-plugin`\
  \ 和 `maven-resources-plugin`，并带有合理的默认配置。\n    *   除了前面提到的插件，`spring-boot-starter-parent`\
  \ 模块还配置了 `spring-boot-maven-plugin`，该插件将用于构建 fat JAR。我们将在本章后面更详细地介绍 `spring-boot-maven-plugin`。此示例仅选择了\
  \ `web` 启动器，但 `test` 启动器也默认包含在内。我们选择了 1.8 作为 Java 版本，因此包含了属性 `<java.version>1.8</java.version>`。这个\
  \ `java.version` 值将用于在 `spring-boot-starter-parent` 模块中配置 Maven 编译器的 JDK 版本。\n\n\
  ```\n    ${java.version}\n    ${java.version}\n    ```\n\n2.  生成的 Spring Boot JAR\
  \ 类型模块将有一个应用入口点 Java 类，名为 `SpringbootBasicApplication.java`，其中包含 `public static\
  \ void main(String[] args)` 方法，你可以运行它来启动应用。参见代码清单 2-2。\n\n```\n    package com.apress.demo;\n\
  \    import org.springframework.boot.SpringApplication;\n    import org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  \    @SpringBootApplication\n    public class SpringbootBasicApplication\n    {\n\
  \    public static void main(String[] args)\n    {\n    SpringApplication.run(SpringbootBasicApplication.class,\
  \ args);\n    }\n    }\n    代码清单 2-2.\n    com.apress.demo.SpringbootBasicApplication.java\n\
  \    ```\n\n这里，`SpringbootBasicApplication` 类使用了 `@SpringBootApplication` 注解进行标注，这是一个组合注解。\n\
  \n```\n    @Target(ElementType.TYPE)\n    @Retention(RetentionPolicy.RUNTIME)\n\
  \    @Documented\n    @Inherited\n    @SpringBootConfiguration\n    @EnableAutoConfiguration\n\
  \    @ComponentScan(excludeFilters = {\n    @Filter(type = FilterType.CUSTOM, classes\
  \ = TypeExcludeFilter.class),\n    @Filter(type = FilterType.CUSTOM, classes = AutoConfigurationExcludeFilter.class)\
  \ })\n    public @interface SpringBootApplication {\n    ....\n    ....\n    }\n\
  \    ```\n\n`@SpringBootConfiguration` 是另一个带有 `@Configuration` 注解的组合注解。\n\n\n\n\
  ```\n    @Target(ElementType.TYPE)\n    @Retention(RetentionPolicy.RUNTIME)\n  \
  \  @Documented\n    @Configuration\n    public @interface SpringBootConfiguration\
  \ {\n    }\n    ```\n\n以下是这些注解的含义：\n*   `@Configuration` 表示该类是一个 Spring 配置类。\n*\
  \   `@ComponentScan` 启用对当前类所在包中 Spring Bean 的组件扫描。\n*   `@EnableAutoConfiguration`\
  \ 触发 Spring Boot 的自动配置机制。你通过在 `main()` 方法中调用 `SpringApplication.run(SpringbootBasicApplication.class,\
  \ args)` 来启动应用程序。你可以向 `SpringApplication.run()` 方法传递一个或多个 Spring 配置类。但如果你将应用程序入口点类放在根包中，则只需传递应用程序入口类即可，它会负责扫描所有子包中的其他\
  \ Spring 配置类。\n3.  现在创建一个简单的 SpringMVC 控制器，命名为 `HomeController.java`，如清单 2-3 所示。\n\
  \n```\n    package com.apress.demo;\n    import org.springframework.stereotype.Controller;\n\
  \    import org.springframework.ui.Model;\n    import org.springframework.web.bind.annotation.RequestMapping;\n\
  \    @Controller\n    public class HomeController\n    {\n    @RequestMapping(\"\
  /\")\n    public String home(Model model) {\n    return \"index.html\";\n    }\n\
  \    }\n    清单 2-3.\n    HomeController.java\n    ```\n\n这是一个简单的 SpringMVC 控制器，包含一个用于\
  \ URL `/` 的请求处理方法，该方法返回名为 `index.html` 的视图。\n4.  创建一个名为 `index.html` 的 HTML 视图。\n\
  \n默认情况下，Spring Boot 从 `src/main/public/` 和 `src/main/static/` 目录提供静态内容。因此，在 `src/main/public/`\
  \ 中创建 `index.html`，如清单 2-4 所示。\n\n```\n\nHome\n\nHello World!!\n\n清单 2-4.\nsrc/main/public/index.html\n\
  ```\n\n现在，从你的 IDE 中，将 `SpringbootBasicApplication.main()` 方法作为独立的 Java 类运行，它将启动嵌入式\
  \ Tomcat 服务器（端口 8080），并将浏览器指向 `http://localhost:8080/`。你应该能够看到响应：`Hello World!!`。\n\
  \n你也可以使用 `spring-boot-maven-plugin` 运行 Spring Boot 应用程序，如下所示：\n\n```\nmvn spring-boot:run\n\
  ```\n\n## 应用程序入口点类\n\nSpring Boot 应用程序应有一个包含 `public static void main(String[] args)`\
  \ 方法的入口点类，该类通常使用 `@SpringBootApplication` 注解进行标注，并用于启动应用程序（清单 2-5）。\n\n```\npackage\
  \ com.mycompany.myproject;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n@SpringBootApplication\n\
  public class Application\n{\npublic static void main(String[] args)\n{\nSpringApplication.run(Application.class,\
  \ args);\n}\n}\n清单 2-5.\n根包中的主类 com.mycompany.myproject.Application.java\n```\n\n\
  强烈建议你将主入口点类放在根包中，例如 `com.mycompany.myproject`，这样 `@EnableAutoConfiguration` 和 `@ComponentScan`\
  \ 注解将自动扫描根包及其所有子包中的 Spring Bean、JPA 实体等。\n\n如果你将入口点类放在嵌套包中，则可能需要显式指定要扫描的 `basePackage`\
  \ 以查找 Spring 组件（清单 2-6）。\n\n```\npackage com.mycompany.myproject.config;\n@Configuration\n\
  @EnableAutoConfiguration\n@ComponentScan(basePackages = \"com.mycompany.myproject\"\
  )\n@EntityScan(basePackageClasses=Person.class)\npublic class Application\n{\npublic\
  \ static void main(String[] args)\n{\nSpringApplication.run(Application.class, args);\n\
  }\n}\n清单 2-6.\n非根包中的主类 com.mycompany.myproject.config.Application.java\n```\n\n\
  这里，`Application.java` 主类位于 `com.mycompany.myproject.config` 包中，这不是根包。因此，你需要指定 `@ComponentScan(basePackages\
  \ = \"com.mycompany.myproject\")`，以便 Spring Boot 扫描 `com.mycompany.myproject` 及其所有子包以查找\
  \ Spring 组件。此外，我们还指定了 `@EntityScan(basePackageClasses=Person.class)`，以便 Spring Boot\
  \ 扫描 `Person.class` 所在包下的 JPA 实体。\n\n## 使用 Spring Boot Maven 插件创建 Fat JAR\n\n你可以在开发期间直接从\
  \ IDE 运行应用程序，或使用 Maven `spring-boot:run`，但最终你需要创建一个无需任何 IDE 支持即可在生产环境中运行的部署单元。你可以通过执行以下\
  \ Maven 目标，使用 `spring-boot-maven-plugin` 创建一个单一的部署单元（fat JAR）。\n\n```\nmvn clean\
  \ package\n```\n\n现在，`target` 目录中有两个有趣的文件——`springboot-basic-1.0-SNAPSHOT.jar` 和\
  \ `springboot-basic-1.0-SNAPSHOT.jar.original`。`springboot-basic-1.0-SNAPSHOT.jar.original`\
  \ 文件仅包含编译后的类文件和类路径资源。\n\n但如果你查看 `springboot-basic-1.0-SNAPSHOT.jar`，你会发现以下内容：\n\n\
  *   你自己源代码（位于 `src/main/java`）的编译类文件和来自 `src/main/resources` 的静态资源将位于 `BOOT-INF/classes`\
  \ 目录中\n*   所有依赖的 JAR 文件位于 `BOOT-INF/lib` 目录中\n*   `org.springframework.boot.loader`\
  \ 包中的类，这些类负责执行 Spring Boot 应用程序的魔法\n\n你可以使用 `maven-shade-plugin` 等插件为 JAR 类型的模块创建自包含的部署单元，该插件将所有依赖的\
  \ JAR 类打包到一个 JAR 文件中。但 Spring Boot 采用了不同的方法，它允许你直接将 JAR 嵌套在 Spring Boot 应用程序 JAR\
  \ 文件中。你可以在以下地址阅读更多相关信息：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#executable-jar`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#executable-jar)。\n\
  \n你可以使用以下命令运行应用程序：\n\n```\njava -jar springboot-basic-1.0-SNAPSHOT.jar\n```\n\n\
  ## 使用 Gradle 的 Spring Boot\n\nGradle 是另一种基于 Groovy DSL 的流行构建工具。你可以使用 Gradle 代替 Maven\
  \ 来构建 Spring Boot 应用程序。Gradle 遵循与 Maven 类似的项目结构。例如，主 Java 源代码位于 `src/main/java`，主资源位于\
  \ `src/main/resources`，等等。\n\n你可以通过 Spring Initializr 或 IDE 创建应用程序时选择 Gradle 作为构建工具，来创建一个基于\
  \ Gradle 的 Spring Boot 项目。生成的 `build.gradle` 文件将如清单 2-7 所示。\n\n```\nbuildscript\
  \ {\next {\nspringBootVersion = '2.0.0.BUILD-SNAPSHOT'\n}\nrepositories {\nmavenCentral()\n\
  maven { url \"https://repo.spring.io/snapshot\" }\nmaven { url \"https://repo.spring.io/milestone\"\
  \ }\n}\ndependencies {\nclasspath(\"org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}\"\
  )\n}\n}\napply plugin: 'java'\napply plugin: 'eclipse'\napply plugin: 'org.springframework.boot'\n\
  version = '0.0.1-SNAPSHOT'\nsourceCompatibility = 1.8\nrepositories {\nmavenCentral()\n\
  maven { url \"https://repo.spring.io/snapshot\" }\nmaven { url \"https://repo.spring.io/milestone\"\
  \ }\n}\ndependencies {\ncompile('org.springframework.boot:spring-boot-starter-web')\n\
  testCompile('org.springframework.boot:spring-boot-starter-test')\n}\n清单 2-7.\nbuild.gradle\n\
  ```\n\n现在，你可以使用 `gradle bootRun` 命令运行应用程序。你也可以使用 `gradle build` 命令，该命令会在 `build/libs`\
  \ 目录中生成 fat JAR。\n\n\n\n### Maven 还是 Gradle？\n\n在 Java 世界中，Maven 和 Gradle 是两种最流行的构建工具。Maven\
  \ 于 2004 年发布，被许多开发者广泛使用。Gradle 于 2012 年发布，它更强大且易于定制。\n\n由于 Maven 仍然是最常用的构建工具，本书将全程使用它。不过，你可以在本书每个模块的示例代码中找到\
  \ Gradle 构建脚本。因此，你可以选择使用 Maven 或 Gradle。选择权在你手中！\n\n## 本章小结\n\n本章快速介绍了 Spring Boot\
  \ 的特性，并讨论了创建 Spring Boot 应用程序的不同方法。既然你已经知道如何创建并运行一个简单的 Spring Boot 应用程序，你可能想了解 Spring\
  \ Boot 的自动配置是如何工作的。但在此之前，你应该了解 Spring 的 `@Conditional` 特性，Spring Boot 的自动配置正是依赖于它。\n\
  \n下一章将探讨 `@Conditional` 注解特性的强大之处，并详细研究 Spring Boot 自动配置的工作原理。\n\n"
- '# 3. Spring Boot 自动配置


  Spring Boot 的自动配置机制严重依赖于 `@Conditional` 特性。本章将探讨如何通过使用 `@Conditional` 注解有条件地注册 Spring
  Bean，并创建满足特定条件的各种类型的 `Conditional` 实现。然后，你将深入了解 Spring Boot 如何利用 `@Conditional`
  特性，根据特定条件自动配置 Bean。


  ## 探索 @Conditional 的强大功能


  在开发基于 Spring 的应用程序时，你可能会遇到需要有条件地注册 Bean 的情况。例如，你可能希望在本地运行应用程序时注册一个指向 `DEV` 数据库的
  `DataSource` Bean，而在生产环境中运行时指向一个不同的 `PRODUCTION` 数据库。


  你可以将数据库连接参数外部化到属性文件中，并使用适合当前环境的文件。但是，每当需要指向不同的环境时，你都必须更改配置并重新部署应用程序。


  为了解决这个问题，Spring 3.1 引入了 profile 的概念。你可以注册多个相同类型的 Bean，并将它们与一个或多个 profile 关联起来。当运行应用程序时，你可以激活所需的
  profile。这样，只有与已激活 profile 关联的 Bean 才会被注册。


  ```

  @Configuration

  public class AppConfig

  {

  @Bean

  @Profile("DEV")

  public DataSource devDataSource() {

  ...

  }

  @Bean

  @Profile("PROD")

  public DataSource prodDataSource() {

  ...

  }

  }

  ```


  通过这种配置，你可以使用 `-Dspring.profiles.active=DEV` 系统属性来指定激活的 profile。这种方法适用于简单的情况，例如根据激活的
  profile 来启用或禁用 Bean 注册。但是，如果你想基于某些条件逻辑来注册 Bean，仅靠 profile 方法是不够的。


  为了提供更大的灵活性来有条件地注册 Spring Bean，Spring 4 引入了 `@Conditional` 的概念。使用 `@Conditional`
  方法，你可以基于任意条件来有条件地注册 Bean。


  例如，你可能希望在以下情况下注册一个 Bean：


  *   类路径中存在特定的类

  *   `ApplicationContext` 中尚未注册某种类型的 Spring Bean

  *   某个位置存在特定的文件

  *   配置文件中配置了特定的属性值

  *   存在/不存在特定的系统属性


  这些只是几个例子，你可以设置任何你需要的条件。下一节将介绍 Spring 的 `@Conditional` 是如何工作的。


  ### 基于系统属性使用 @Conditional


  假设你有一个 `UserDAO` 接口，其中包含从数据存储中获取数据的方法。你有两个 `UserDAO` 接口的实现——`JdbcUserDAO` 与 MySQL
  数据库交互，`MongoUserDAO` 与 MongoDB 交互。你可能希望根据特定的系统属性（例如 `dbType`）仅启用 `JdbcUserDAO` 或
  `MongoUserDAO`。


  如果应用程序使用 `java -jar myapp.jar -DdbType=MySQL` 启动，那么你希望启用 `JdbcUserDAO`；否则，如果应用程序使用
  `java -jar myapp.jar -DdbType=MONGO` 启动，你希望启用 `MongoUserDAO`。


  假设你有 `UserDAO` 接口以及 `JdbcUserDAO` 和 `MongoUserDAO` 的实现，如清单 3-1 所示。


  ```

  public interface UserDAO

  {

  List getAllUserNames();

  }

  public class JdbcUserDAO implements UserDAO

  {

  @Override

  public List getAllUserNames()

  {

  System.out.println("**** Getting usernames from RDBMS *****");

  return Arrays.asList("Jim","John","Rob");

  }

  }

  public class MongoUserDAO implements UserDAO

  {

  @Override

  public List getAllUserNames()

  {

  System.out.println("**** Getting usernames from MongoDB *****");

  return Arrays.asList("Bond","James","Bond");

  }

  }

  清单 3-1.

  UserDAO 接口以及 JdbcUserDAO 和 MongoUserDAO 实现

  ```


  你可以实现 `MySQLDatabaseTypeCondition` 条件来检查 `dbType` 系统属性是否为 `MYSQL`，如清单 3-2 所示。


  ```

  public class MySQLDatabaseTypeCondition implements Condition

  {

  @Override

  public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
  metadata)

  {

  String enabledDBType = System.getProperty("dbType");

  return (enabledDBType != null &&

  enabledDBType.equalsIgnoreCase("MYSQL"));

  }

  }

  清单 3-2.

  MySQLDatabaseTypeCondition.java

  ```


  你可以实现 `MongoDBDatabaseTypeCondition` 条件来检查 `dbType` 系统属性是否为 `MONGODB`，如清单 3-3 所示。


  ```

  public class MongoDBDatabaseTypeCondition implements Condition

  {

  @Override

  public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
  metadata)

  {

  String enabledDBType = System.getProperty("dbType");

  return (enabledDBType != null && enabledDBType.equalsIgnoreCase("MONGODB"));

  }

  }

  清单 3-3.

  MongoDBDatabaseTypeCondition.java

  ```


  现在，你可以使用 `@Conditional` 有条件地配置 `JdbcUserDAO` 和 `MongoUserDAO` Bean，如清单 3-4 所示。


  ```

  @Configuration

  public class AppConfig

  {

  @Bean

  @Conditional(MySQLDatabaseTypeCondition.class)

  public UserDAO jdbcUserDAO(){

  return new JdbcUserDAO();

  }

  @Bean

  @Conditional(MongoDBDatabaseTypeCondition.class)

  public UserDAO mongoUserDAO(){

  return new MongoUserDAO();

  }

  }

  清单 3-4.

  AppConfig.java

  ```


  如果你运行应用程序，例如 `java -jar myapp.jar -DdbType=MYSQL`，则只会注册 `JdbcUserDAO` Bean。但是，如果你将系统属性设置为
  `-DdbType=MONGODB`，则会注册 `MongoUserDAO` Bean。这就是如何基于系统属性有条件地注册 Bean 的方法。




  ### 基于 Java 类的存在/缺失使用 @Conditional


  假设你希望仅在类路径中存在名为 `com.mongodb.Server` 的 `MongoDB` Java 驱动类时，才注册 `MongoUserDAO` bean。否则，你希望注册
  `JdbcUserDAO` bean。


  为此，你可以创建条件来检查名为 `com.mongodb.Server` 的 MongoDB 驱动类是否存在或缺失，如清单 3-5 所示。


  ```

  public class MongoDriverPresentsCondition implements Condition

  {

  @Override

  public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
  metadata)

  {

  try {

  Class.forName("com.mongodb.Server");

  return true;

  } catch (ClassNotFoundException e) {

  return false;

  }

  }

  }

  public class MongoDriverNotPresentsCondition implements Condition

  {

  @Override

  public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
  metadata)

  {

  try {

  Class.forName("com.mongodb.Server");

  return false;

  } catch (ClassNotFoundException e) {

  return true;

  }

  }

  }

  清单 3-5.

  MongoDriverPresentsCondition.java 和 MongoDriverNotPresentsCondition.java

  ```


  这就是如何根据类路径中某个类的存在或缺失来有条件地注册 bean。


  ### 基于已配置的 Spring Bean 使用 @Conditional


  如果你希望仅当尚未注册其他类型为 `UserDAO` 的 Spring bean 时，才注册 `MongoUserDAO` bean，该怎么办？


  你可以创建一个条件来检查是否已存在某种类型的 bean，如清单 3-6 所示。


  ```

  public class UserDAOBeanNotPresentsCondition implements Condition

  {

  @Override

  public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
  metadata)

  {

  UserDAO userDAO = conditionContext.getBeanFactory().getBean(UserDAO.class);

  return (userDAO == null);

  }

  }

  清单 3-6.

  UserDAOBeanNotPresentsCondition.java

  ```


  ### 基于属性配置使用 @Conditional


  如果你希望仅当属性占位符配置文件中设置了 `app.dbType=MONGO` 属性时，才注册 `MongoUserDAO` bean，该怎么办？你可以实现该条件，如清单
  3-7 所示。


  ```

  public class MongoDbTypePropertyCondition implements Condition

  {

  @Override

  public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
  metadata)

  {

  String dbType = conditionContext.getEnvironment().getProperty("app.dbType");

  return "MONGO".equalsIgnoreCase(dbType);

  }

  }

  清单 3-7.

  MongoDbTypePropertyCondition.java

  ```


  你已经了解了如何实现各种类型的条件。但还有一种更优雅的方式，即使用注解来实现条件。


  无需为 MYSQL 和 MongoDB 分别创建条件实现，你可以创建一个 `DatabaseType` 注解，如下所示：


  ```

  @Target({ ElementType.TYPE, ElementType.METHOD })

  @Retention(RetentionPolicy.RUNTIME)

  @Conditional(DatabaseTypeCondition.class)

  public @interface DatabaseType

  {

  String value();

  }

  ```


  然后，你实现 `DatabaseTypeCondition`，以使用 `DatabaseType` 的值来决定是启用还是禁用 bean 注册，如下所示：


  ```

  public class DatabaseTypeCondition implements Condition

  {

  @Override

  public boolean matches(ConditionContext conditionContext, AnnotatedTypeMetadata
  metadata)

  {

  Map attributes = metadata.getAnnotationAttributes(DatabaseType.class.getName());

  String type = (String) attributes.get("value");

  String enabledDBType = System.getProperty("dbType","MYSQL");

  return (enabledDBType != null && type != null && enabledDBType.equalsIgnoreCase(type));

  }

  }

  ```


  现在，你可以在 bean 定义上使用 `@DatabaseType` 注解，如下所示：


  ```

  @Configuration

  @ComponentScan

  public class AppConfig

  {

  @DatabaseType("MYSQL")

  public UserDAO jdbcUserDAO(){

  return new JdbcUserDAO();

  }

  @Bean

  @DatabaseType("MONGO")

  public UserDAO mongoUserDAO(){

  return new MongoUserDAO();

  }

  }

  ```


  在这里，你从 `DatabaseType` 注解获取元数据，并与 `dbType` 系统属性值进行比对，以决定是启用还是禁用 bean 注册。


  你已经看到了大量关于如何使用 `@Conditional` 注解有条件地注册 bean 的示例。Spring Boot 广泛使用 `@Conditional`
  特性，根据各种标准有条件地注册 bean。


  ## Spring Boot 内置的 @Conditional 注解


  Spring Boot 提供了许多自定义的 `@Conditional` 注解，以满足开发者基于各种标准的自动配置需求。表 3-1 列出了 Spring Boot
  开箱即用的 `@Conditional` 注解。


  表 3-1.


  Spring Boot @Conditional 注解


  | 注解 | 描述 |

  | --- | --- |

  | `@ConditionalOnBean` | 当指定的 bean 类和/或名称已注册时匹配。 |

  | `@ConditionalOnMissingBean` | 当指定的 bean 类和/或名称尚未注册时匹配。 |

  | `@ConditionalOnClass` | 当指定的类在类路径上时匹配。 |

  | `@ConditionalOnMissingClass` | 当指定的类不在类路径上时匹配。 |

  | `@ConditionalOnProperty` | 当指定的属性具有特定值时匹配。 |

  | `@ConditionalOnResource` | 当指定的资源在类路径上时匹配。 |

  | `@ConditionalOnWebApplication` | 当应用程序上下文是 Web 应用程序上下文时匹配。 |


  Spring Boot 为这些注解提供了实现，以验证条件是否匹配。例如，查看 Spring Boot 源码中 `@ConditionalOnClass` 注解和
  `OnClassCondition.java` 的源代码。


  ```

  @Target({ ElementType.TYPE, ElementType.METHOD })

  @Retention(RetentionPolicy.RUNTIME)

  @Documented

  @Conditional(OnClassCondition.class)

  public @interface ConditionalOnClass {

  /**

  * 必须存在的类。由于此注解通过加载类字节码进行解析，

  * 因此在此处指定最终可能不在类路径上的类是安全的。

  * @return 必须存在的类

  */

  Class[] value() default {};

  /**

  * 必须存在的类名。

  * @return 必须存在的类名

  */

  String[] name() default {};

  }

  @Order(Ordered.HIGHEST_PRECEDENCE)

  class OnClassCondition extends SpringBootCondition

  implements AutoConfigurationImportFilter, BeanFactoryAware, BeanClassLoaderAware
  {

  private BeanFactory beanFactory;

  private ClassLoader beanClassLoader;

  @Override

  public boolean[] match(String[] autoConfigurationClasses,

  AutoConfigurationMetadata autoConfigurationMetadata) {

  ConditionEvaluationReport report = getConditionEvaluationReport();

  ConditionOutcome[] outcomes = getOutcomes(autoConfigurationClasses,

  autoConfigurationMetadata);

  boolean[] match = new boolean[outcomes.length];

  for (int i = 0; i < outcomes.length; i++) {

  match[i] = (outcomes[i] == null || outcomes[i].isMatch());

  if (!match[i] && outcomes[i] != null) {

  logOutcome(autoConfigurationClasses[i], outcomes[i]);

  if (report != null) {

  report.recordConditionEvaluation(autoConfigurationClasses[i], this,

  outcomes[i]);

  }

  }

  }

  return match;

  }

  ...

  ...

  ...

  }

  ```


  你可以看到 Spring Boot 如何使用 `@ConditionalOnClass` 注解和 `OnClassCondition.class` 来检查给定的类是否存在。类似地，你可以在
  Spring Boot 中找到其他各种条件注解，例如 `@ConditionalOnBean`、`@ConditionalOnMissingBean`、`@ConditionalOnResource`、`@ConditionalOnProperty`
  等。


  注意


  你可以在 `spring-boot-autoconfigure-{version}.jar` 的 `org.springframework.boot.autoconfigure.condition`
  包中找到 Spring Boot 使用的各种条件实现。


  既然你已经了解了 Spring Boot 如何使用 `@Conditional` 特性来有条件地检查是否注册 bean，你可能会想，究竟是什么触发了自动配置机制。这正是下一节要介绍的内容。




  ## Spring Boot 自动配置的工作原理


  Spring Boot 自动配置的关键在于其 `@EnableAutoConfiguration` 注解。通常，你会使用 `@SpringBootApplication`
  来注解应用程序入口类，或者，如果你想自定义默认配置，可以使用以下注解：


  ```

  @Configuration

  @EnableAutoConfiguration

  @ComponentScan

  public class Application

  {

  }

  ```


  `@EnableAutoConfiguration` 注解通过扫描类路径组件并注册符合各种条件的 Bean，从而启用 Spring `ApplicationContext`
  的自动配置。Spring Boot 在 `spring-boot-autoconfigure-{version}.jar` 中提供了各种自动配置类，它们负责注册各种组件。


  自动配置类通常使用 `@Configuration` 注解标记为 Spring 配置类，并使用 `@EnableConfigurationProperties`
  注解来绑定自定义属性以及一个或多个条件化的 Bean 注册方法。


  例如，考虑 `org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration`
  类。


  ```

  @Configuration

  @ConditionalOnClass({ DataSource.class, EmbeddedDatabaseType.class })

  @EnableConfigurationProperties(DataSourceProperties.class)

  @Import({ Registrar.class, DataSourcePoolMetadataProvidersConfiguration.class })

  public class DataSourceAutoConfiguration {

  ...

  ...

  @Bean

  @ConditionalOnMissingBean

  public DataSourceInitializer dataSourceInitializer(DataSourceProperties properties,

  ApplicationContext applicationContext) {

  return new DataSourceInitializer(properties, applicationContext);

  }

  ...

  ...

  @Conditional(EmbeddedDatabaseCondition.class)

  @ConditionalOnMissingBean({ DataSource.class, XADataSource.class })

  @Import(EmbeddedDataSourceConfiguration.class)

  protected static class EmbeddedDatabaseConfiguration {

  }

  @Configuration

  @Conditional(PooledDataSourceCondition.class)

  @ConditionalOnMissingBean({ DataSource.class, XADataSource.class })

  @Import({ DataSourceConfiguration.Tomcat.class, DataSourceConfiguration.Hikari.class,

  DataSourceConfiguration.Dbcp2.class, DataSourceConfiguration.Generic.class })

  protected static class PooledDataSourceConfiguration {

  }

  ...

  ...

  @Configuration

  @ConditionalOnProperty(prefix = "spring.datasource", name = "jmx-enabled")

  @ConditionalOnClass(name = "org.apache.tomcat.jdbc.pool.DataSourceProxy")

  @Conditional(DataSourceAutoConfiguration.DataSourceAvailableCondition.class)

  @ConditionalOnMissingBean(name = "dataSourceMBean")

  protected static class TomcatDataSourceJmxConfiguration {

  ...

  ...

  }

  ...

  ...

  }

  ```


  这里，`DataSourceAutoConfiguration` 使用了 `@ConditionalOnClass({ DataSource.class, EmbeddedDatabaseType.class
  })` 注解，这意味着只有当 `DataSource.class` 和 `EmbeddedDatabaseType.class` 类在类路径上可用时，才会考虑
  `DataSourceAutoConfiguration` 中定义的 Bean 的自动配置。


  该类还使用了 `@EnableConfigurationProperties(DataSourceProperties.class)` 注解，这使得 `application.properties`
  中的属性能够自动绑定到 `DataSourceProperties` 类的属性上。


  ```

  @ConfigurationProperties(prefix = DataSourceProperties.PREFIX)

  public class DataSourceProperties implements BeanClassLoaderAware, EnvironmentAware,
  InitializingBean {

  public static final String PREFIX = "spring.datasource";

  ...

  ...

  private String driverClassName;

  private String url;

  private String username;

  private String password;

  ...

  //setters and getters

  }

  ```


  通过此配置，所有以 `spring.datasource.*` 开头的属性都将自动绑定到 `DataSourceProperties` 对象。


  ```

  spring.datasource.url=jdbc:mysql://localhost:3306/test

  spring.datasource.username=root

  spring.datasource.password=secret

  spring.datasource.driver-class-name=com.mysql.jdbc.Driver

  ```


  你还可以看到一些内部类和 Bean 定义方法使用了 Spring Boot 的条件注解，例如 `@ConditionalOnMissingBean`、`@ConditionalOnClass`
  和 `@ConditionalOnProperty`。只有当这些条件匹配时，这些 Bean 定义才会被注册到 `ApplicationContext` 中。


  你还可以在 `spring-boot-autoconfigure-{version}.jar` 中探索许多其他的 `AutoConfiguration` 类，例如：


  *   `org.springframework.boot.autoconfigure.web.DispatcherServletAutoConfiguration`

  *   `org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration`

  *   `org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration`

  *   `org.springframework.boot.autoconfigure.jackson.JacksonAutoConfiguration`


  现在，你应该对 Spring Boot 自动配置的工作原理有了基本的了解，即通过使用各种自动配置类以及 `@Conditional` 特性来实现。


  ## 总结


  本章解释了如何使用 `@Conditional` 注解有条件地注册 Spring Bean，以及 Spring Boot 如何利用 `@Conditional`
  和 `@EnableAutoConfiguration` 注解根据各种标准自动配置 Bean。


  下一章将介绍 Spring Boot 的一些有助于提高开发人员生产力的酷炫特性。


  '
- "# 4. Spring Boot 要点\n\nSpring Boot 的主要目标是简化基于 Spring 的应用程序的开发。Spring Boot 提供了多种特性，以便更轻松地实现常用功能，例如日志记录和外部化配置属性。本章涵盖配置日志、外部化配置属性以及配置特定于\
  \ Profile 的属性。然后，它将探讨如何使用 Spring Boot 开发者工具在代码更改时自动重启服务器，从而提高开发人员生产力。\n\n## 日志记录\n\
  \n日志记录是任何应用程序中非常重要的一部分，它有助于调试问题。默认情况下，Spring Boot 将 `spring-boot-starter-logging`\
  \ 作为 `spring-boot-starter` 模块的传递依赖包含在内。默认情况下，Spring Boot 包含 SLF4J 以及 Logback 实现。Spring\
  \ Boot 有一个 `LoggingSystem` 抽象，它会根据类路径中可用的日志配置文件自动配置日志记录。\n\n如果 Logback 可用，Spring\
  \ Boot 将选择它作为日志处理器。你可以在 `application.properties` 文件中轻松配置日志级别，而无需创建特定于日志提供程序的配置文件，例如\
  \ `logback.xml` 或 `log4j.properties`。\n\n```\nlogging.level.org.springframework.web=INFO\n\
  logging.level.org.hibernate=ERROR\nlogging.level.com.apress=DEBUG\n```\n\n如果你想将日志数据记录到文件以及控制台，请按如下方式指定文件名：\n\
  \n```\nlogging.path=/var/logs/app.log\n```\n\n或\n\n```\nlogging.file=myapp.log\n\
  ```\n\n如果你想对日志配置有更多控制，可以在其默认位置创建特定于日志提供程序的配置文件，Spring Boot 将自动使用它们。\n\n例如，如果你将 `logback.xml`\
  \ 文件放在根类路径中，Spring Boot 将自动使用它来配置日志系统。参见清单 4-1。\n\n```\n\n%d{HH:mm:ss.SSS} [%thread]\
  \ %-5level %logger{36} - %msg%n\n\napp.log\n\n%date %level [%thread] %logger{10}\
  \ [%file:%line] %msg%n \n\n清单 4-1.\nlogback.xml 文件\n```\n\n如果你想使用其他日志库（例如 Log4J\
  \ 或 Log4j2）而不是 Logback，你可以排除 `spring-boot-starter-logging` 并包含相应的日志启动器，如下所示：\n\n\
  ```\norg.springframework.boot\nspring-boot-starter\n\norg.springframework.boot\n\
  spring-boot-starter-logging\n\norg.springframework.boot\nspring-boot-starter-log4j\n\
  \n```\n\n现在，你可以将 `log4j.properties` 文件添加到根类路径，Spring Boot 将自动使用它进行日志记录。\n\n\n\n\
  ## 外部化配置属性\n\n通常，您会希望将配置参数外部化到单独的 properties 或 XML 文件中，而不是将它们硬编码在代码里，这样您就可以根据应用程序的环境轻松更改它们。Spring\
  \ 提供了 `@PropertySource` 注解来指定配置文件列表。\n\nSpring Boot 更进一步，默认会在根类路径下使用 `application.properties`\
  \ 文件自动注册一个 `PropertyPlaceHolderConfigurer` bean。您还可以使用 `application-{profile}.properties`\
  \ 这样的文件名来创建特定于环境的配置文件。\n\n例如，您可以有一个包含默认属性值的 `application.properties`，一个包含 `dev`\
  \ 环境配置的 `application-dev.properties`，以及一个包含 `production` 环境配置值的 `application-prod.properties`。如果您想配置所有环境通用的属性，可以在\
  \ `application-default.properties` 中进行配置。\n\n注意\n\n您也可以使用 YAML (`.yml`) 文件作为 `.properties`\
  \ 的替代方案。请参阅 Spring Boot 参考文档中的“使用 YAML 替代 Properties”部分，网址为：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config-yaml`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config-yaml)\
  \ 。\n\n### 类型安全的配置属性\n\nSpring 提供了 `@Value` 注解来将任何属性值绑定到 bean 的属性上。假设您有以下 `application.properties`\
  \ 文件：\n\n```\njdbc.driver=com.mysql.jdbc.Driver\njdbc.url=jdbc:mysql://localhost:3306/test\n\
  jdbc.username=root\njdbc.password=secret\n```\n\n您可以使用 `@Value` 将这些属性值绑定到 bean 的属性上，如下所示：\n\
  \n```\n@Configuration\npublic class AppConfig\n{\n@Value(\"${jdbc.driver}\")\nprivate\
  \ String driver;\n@Value(\"${jdbc.url}\")\nprivate String url;\n@Value(\"${jdbc.username}\"\
  )\nprivate String username;\n@Value(\"${jdbc.password}\")\nprivate String password;\n\
  ...\n...\n}\n```\n\n但是，使用 `@Value` 逐个绑定每个属性是一个繁琐的过程。因此，Spring Boot 引入了一种机制，可以以类型安全的方式自动将一组属性绑定到\
  \ bean 的属性上。\n\n假设您有之前的 JDBC 参数和一个如下的 `DataSourceConfig` 类：\n\n```\npublic class\
  \ DataSourceConfig\n{\nprivate String driver;\nprivate String url;\nprivate String\
  \ username;\nprivate String password;\n//setters and getters\n}\n```\n\n现在，您只需用\
  \ `@ConfigurationProperties(prefix=`\"`jdbc`\"`)` 注解 `DataSourceConfig`，即可自动绑定以\
  \ `jdbc.*` 开头的属性。\n\n```\n@Component\n@ConfigurationProperties(prefix=\"jdbc\")\n\
  public class DataSourceConfig\n{\n...\n...\n}\n```\n\n现在，您可以将 `DataSourceConfig`\
  \ bean 注入到其他 Spring bean 中，并通过 getter 方法访问这些属性。\n\n### 宽松绑定\n\nBean 的属性名称不必与属性键名完全一致。Spring\
  \ Boot 支持宽松绑定，其中 bean 属性 `driverClassName` 将映射自以下任意一个：`driverClassName`、`driver-class-name`\
  \ 或 `DRIVER_CLASS_NAME`。\n\n### 使用 Bean Validation API 验证属性\n\n您可以使用 Bean Validation\
  \ API 注解（例如 `@NotNull`、`@Min`、`@Max` 等）来验证属性的值。\n\n```\n@Component\n@ConfigurationProperties(prefix=\"\
  support\")\npublic class Support\n{\n@NotNull\nprivate String applicationName;\n\
  @NotNull\n@Email\nprivate String email;\n@Min(1) @Max(5)\nprivate Integer severity;\n\
  //setters and getters\n}\n```\n\n如果您配置的任何属性值根据配置的验证注解被判定为无效，则在应用程序启动时会抛出异常。有关外部化属性的更多详细信息，请参阅“外部化配置”，网址为：[`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-external-config)\
  \ 。\n\n\n\n## 开发者工具\n\n在开发过程中，你可能需要频繁修改代码，并重启服务器以使这些代码更改生效。Spring Boot 提供了开发者工具（`spring-boot-devtools`\
  \ 模块），该模块支持在应用程序类路径内容发生变化时快速重启应用。\n\n当你在开发阶段引入 `spring-boot-devtools` 模块时，视图模板（Thymeleaf、Velocity\
  \ 和 Freemarker 等）的缓存将被自动禁用，以便你能立即看到更改效果。你可以在 `org.springframework.boot.devtools.env.DevToolsPropertyDefaultsPostProcessor`\
  \ 中查看已配置的属性列表。\n\n```\norg.springframework.boot\nspring-boot-devtools\ntrue\n\n\
  ```\n\n请注意，这里通过使用 `<optional>true</optional>` 将 `spring-boot-devtools` 指定为可选依赖，这样它就不会被打包到\
  \ fat JAR 中。\n\nSpring Boot 开发者工具会在类路径内容发生任何更改时自动触发应用程序重启。\n\n注意\n\n在 Eclipse 或\
  \ STS 中，只要你更改类路径资源并保存，devtools 就会重启服务器。在 IntelliJ IDEA 中，你需要运行“构建项目”来触发重启。\n\n每当你更改类路径中的类或属性文件时，Spring\
  \ Boot 会自动重启服务器。当静态内容（如 CSS、JS 和 HTML）发生更改时，你通常不需要重启服务器。因此，默认情况下，Spring Boot 会将这些静态资源位置排除在文件更改监视列表之外。\n\
  \n```\n@ConfigurationProperties(prefix = \"spring.devtools\")\npublic class DevToolsProperties\
  \ {\n....\n....\npublic static class Restart {\nprivate static final String DEFAULT_RESTART_EXCLUDES\
  \ =\n\"META-INF/maven/**,\"\n+ \"META-INF/resources/**,resources/**,\"\n+ \"static/**,public/**,templates/**,\"\
  \n+ \"**/*Test.class,**/*Tests.class,git.properties, META-INF/build-info.properties\
  \ \";\n/**\n* 应排除在触发完全重启之外的模式。\n*/\nprivate String exclude = DEFAULT_RESTART_EXCLUDES;\n\
  ....\n....\n}\n}\n```\n\n你可以通过配置 `spring.devtools.restart.exclude` 属性来覆盖此默认排除列表。\n\
  \n```\nspring.devtools.restart.exclude=assets/**,resources/**\n```\n\n如果你想将位置添加到重启排除/包含路径中，请使用以下属性。\n\
  \n```\nspring.devtools.restart.additional-exclude=assets/**,setup-instructions/**\n\
  spring.devtools.restart.additional-paths=D:/global-overrides/\n```\n\nSpring Boot\
  \ 的重启机制通过在代码更改后自动重启服务器，有助于提高开发人员的工作效率。但有时，你可能需要更改多个类来实现某个功能，如果每次文件更改后服务器都不断重启，那将会很烦人。在这种情况下，你可以使用\
  \ `spring.devtools.restart.trigger-file` 属性来配置一个用于监视更改的文件路径。这样，服务器将仅在 `trigger-file`\
  \ 发生更改时重启。\n\n```\nspring.devtools.restart.trigger-file=restart.txt\n```\n\n注意\n\
  \n一旦你配置了 `spring.devtools.restart.trigger-file` 并更新了触发文件，服务器将仅在被监视的文件发生修改时重启。否则，服务器不会重启。\n\
  \n重启机制通过使用两个类加载器来工作——一个（基类加载器）用于加载不会更改的类（例如第三方 jar 中的类），另一个（重启类加载器）用于加载频繁更改的类（例如来自应用程序代码的类）。当应用程序重启时，只有重启类加载器中的类会被重新创建。这将实现更快的重启。\n\
  \n你可以通过设置 `spring.devtools.restart.enabled = false` 属性来禁用重启。这仍会使用两个类加载器，但重启类加载器不会监视文件更改。如果你想完全关闭重启机制，请将\
  \ `spring.devtools.restart.enabled=false` 属性设置为系统属性，如下所示。\n\n```\njava -jar -Dspring.devtools.restart.enabled=false\
  \ app.jar\n```\n\n如果你正在开发多个 Spring Boot 应用程序，并希望将相同的 devtools 设置应用于所有应用程序，你可以通过在\
  \ `HOME` 目录中创建一个 `.spring-bootdevtools.properties` 文件来配置全局设置。\n\n在 Windows 操作系统上，路径为\
  \ `C:\\Users\\<username>\\.spring-boot-devtools.properties`；在 Linux/MacOS 上，路径为\
  \ `/home/<username>/.spring-boot-devtools.properties`。\n\n你可以在 [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-devtools`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#using-boot-devtools)\
  \ 阅读更多关于 Spring Boot 开发者工具的信息。\n\n## 总结\n\n本章介绍了一些有助于提高开发人员工作效率的 Spring Boot 酷炫特性。下一章将介绍如何使用\
  \ Spring Boot 处理关系型数据库。\n\n"
- "# 5. 使用 JdbcTemplate\n\n数据持久化是软件系统的关键部分。大多数软件应用程序使用关系型数据库作为数据存储，但近年来，像 MongoDB、Redis、Cassandra\
  \ 这样的 NoSQL 数据存储也越来越受欢迎。Java 提供了 JDBC API 来与数据库通信，但它是一个低级 API，需要大量样板代码。JavaEE 平台提供了\
  \ Java 持久化 API（JPA）规范，这是一种对象关系映射（ORM）框架。Hibernate 和 EclipseLink 是最流行的 JPA 实现。还有其他流行的持久化框架，如\
  \ MyBatis 和 JOOQ，它们更侧重于 SQL。\n\nSpring 在 JDBC API 之上提供了一个很好的抽象，使用 `JdbcTemplate`，并通过基于注解的方法提供了出色的事务管理能力。Spring\
  \ Data 是一个伞形项目，为与大多数流行的数据访问技术（如 JPA、MongoDB、Redis、Cassandra、Solr、ElasticSearch 等）的集成提供支持。Spring\
  \ Boot 通过根据各种标准自动配置所需的 Bean，使得使用这些持久化技术变得更加容易。\n\n本章将介绍如何在不使用 Spring Boot 的情况下使用\
  \ `JdbcTemplate`，以及 Spring Boot 如何让你无需大量编码或配置即可轻松使用 `JdbcTemplate`。你还将学习如何使用 Flyway\
  \ 执行数据库迁移。\n\n\n\n## 在不使用 Spring Boot 的情况下使用 JdbcTemplate\n\n首先，我们快速了解一下如何通过注册 `DataSource`、`TransactionManager`\
  \ 和 `JdbcTemplate` Bean，来常规使用 Spring 的 JdbcTemplate（不使用 Spring Boot）。你也可以注册 `DataSourceInitializer`\
  \ Bean 来初始化数据库。\n\n```\n@Configuration\n@ComponentScan\n@EnableTransactionManagement\n\
  @PropertySource(value = { \"classpath:application.properties\" })\npublic class\
  \ AppConfig {\n@Autowired\nprivate Environment env;\n@Bean\npublic static PropertySourcesPlaceholderConfigurer\
  \ placeHolderConfigurer()\n{\nreturn new PropertySourcesPlaceholderConfigurer();\n\
  }\n@Value(\"${init-db:false}\")\nprivate String initDatabase;\n@Bean\npublic JdbcTemplate\
  \ jdbcTemplate(DataSource dataSource)\n{\nreturn new JdbcTemplate(dataSource);\n\
  }\n@Bean\npublic PlatformTransactionManager transactionManager(DataSource dataSource)\n\
  {\nreturn new DataSourceTransactionManager(dataSource);\n}\n@Bean\npublic DataSource\
  \ dataSource()\n{\nBasicDataSource dataSource = new BasicDataSource();\ndataSource.setDriverClassName(env.getProperty(\"\
  jdbc.driverClassName\"));\ndataSource.setUrl(env.getProperty(\"jdbc.url\"));\ndataSource.setUsername(env.getProperty(\"\
  jdbc.username\"));\ndataSource.setPassword(env.getProperty(\"jdbc.password\"));\n\
  return dataSource;\n}\n@Bean\npublic DataSourceInitializer dataSourceInitializer(DataSource\
  \ dataSource)\n{\nDataSourceInitializer dataSourceInitializer = new DataSourceInitializer();\n\
  dataSourceInitializer.setDataSource(dataSource);\nResourceDatabasePopulator databasePopulator\
  \ = new ResourceDatabasePopulator();\ndatabasePopulator.addScript(new ClassPathResource(\"\
  data.sql\"));\ndataSourceInitializer.setDatabasePopulator(databasePopulator);\n\
  dataSourceInitializer.setEnabled(Boolean.parseBoolean(initDatabase));\nreturn dataSourceInitializer;\n\
  }\n}\n```\n\n你需要在 `src/main/resources/application.properties` 中配置 JDBC 连接参数，如下所示。\n\
  \n```\njdbc.driverClassName=com.mysql.jdbc.Driver\njdbc.url=jdbc:mysql://localhost:3306/test\n\
  jdbc.username=root\njdbc.password=admin\n```\n\n然后，你可以在 `src/main/resources` 中创建一个名为\
  \ `data.sql` 的数据库设置脚本，如下所示：\n\n```\nDROP TABLE IF EXISTS USERS;\nCREATE TABLE users\
  \ (\nid int(11) NOT NULL AUTO_INCREMENT,\nname varchar(100) NOT NULL,\nemail varchar(100)\
  \ DEFAULT NULL,\nPRIMARY KEY (id)\n);\ninsert into users(id, name, email) values(1,'John','john@gmail.com');\n\
  insert into users(id, name, email) values(2,'Rod','rod@gmail.com');\ninsert into\
  \ users(id, name, email) values(3,'Mike','mike@gmail.com');\n```\n\n如果你希望将模式生成脚本和种子数据插入脚本分开存放，可以将它们放在不同的文件中，并按如下方式添加：\n\
  \n```\ndatabasePopulator.addScripts(new ClassPathResource(\"schema.sql\"),\nnew\
  \ ClassPathResource(\"seed-data.sql\") );\n```\n\n完成上述配置后，你就可以将 `JdbcTemplate` 注入到数据访问组件中，以便与数据库进行交互。\n\
  \n```\npublic class User\n{\nprivate Integer id;\nprivate String name;\nprivate\
  \ String email;\n// setters & getters\n}\n@Repository\npublic class UserRepository\n\
  {\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\n@Transactional(readOnly=true)\n\
  public List findAll() {\nreturn jdbcTemplate.query(\"select * from users\", new\
  \ UserRowMapper());\n}\n}\nclass UserRowMapper implements RowMapper\n{\n@Override\n\
  public User mapRow(ResultSet rs, int rowNum) throws SQLException {\nUser user =\
  \ new User();\nuser.setId(rs.getInt(\"id\"));\nuser.setName(rs.getString(\"name\"\
  ));\nuser.setEmail(rs.getString(\"email\"));\nreturn user;\n}\n}\n```\n\n你可能已经注意到，在大多数情况下，你会在应用程序中使用类似这样的配置。\n\
  \n下一节将向你展示如何使用 Spring Boot，而无需手动配置所有这些 Bean。\n\n## 在 Spring Boot 中使用 JdbcTemplate\n\
  \n如果你使用 Spring Boot 的自动配置功能，则无需手动配置 Bean。首先，创建一个基于 Maven 的 Spring Boot 项目，并添加 `spring-boot-starter-jdbc`\
  \ 模块。\n\n```\norg.springframework.boot\nspring-boot-starter-jdbc\n\n```\n\n通过添加\
  \ `spring-boot-starter-jdbc` 模块，你将获得以下自动配置特性：\n\n*   `spring-boot-starter-jdbc`\
  \ 模块会传递性地引入 `tomcat-jdbc-{version}.jar`，该 JAR 包用于配置 `DataSource` Bean。\n*   如果你没有显式定义\
  \ `DataSource` Bean，并且在类路径中存在任何嵌入式数据库驱动（例如 H2、HSQL 或 Derby），那么 Spring Boot 将使用内存数据库设置自动注册\
  \ `DataSource` Bean。\n*   如果你尚未注册以下任何 Bean，则 Spring Boot 会自动注册它们。\n    *   `PlatformTransactionManager`\
  \ (`DataSourceTransactionManager`)\n    *   `JdbcTemplate`\n    *   `NamedParameterJdbcTemplate`\n\
  *   你可以在根类路径下放置 `schema.sql` 和 `data.sql` 文件，Spring Boot 将自动使用它们来初始化数据库。\n\n\n\n\
  ### 初始化数据库\n\nSpring Boot 使用 `spring.datasource.initialize` 属性值（默认为 true）来决定是否初始化数据库。如果\
  \ `spring.datasource.initialize` 属性设置为 `true`，Spring Boot 将使用根类路径下的 `schema.sql`\
  \ 和 `data.sql` 文件来初始化数据库。\n\n除了 `schema.sql` 和 `data.sql` 之外，如果根类路径中存在 `schema-${platform}.sql`\
  \ 和 `data-${platform}.sql` 文件，Spring Boot 也会加载它们。这里的 platform 值是 `spring.datasource.platform`\
  \ 属性的值，可以是 `hsqldb`、`h2`、`oracle`、`mysql`、`postgresql` 等。\n\n你可以使用以下属性自定义脚本的默认名称：\n\
  \n```\nspring.datasource.schema=create-db.sql\nspring.datasource.data=seed-data.sql\n\
  ```\n\n如果你想关闭数据库初始化，可以将 `spring.datasource.initialize` 设置为 `false`。如果执行脚本时出现任何错误，应用程序将无法启动。如果你想继续，可以将\
  \ `spring.datasource.continueOnError` 设置为 `true`。\n\n要将 H2 数据库驱动程序添加到 `pom.xml`\
  \ 文件中，请使用以下内容：\n\n```\ncom.h2database\nh2\n\n```\n\n在 `src/main/resources` 中创建 `schema.sql`，内容如下：\n\
  \n```\nCREATE TABLE users\n(\nid int(11) NOT NULL AUTO_INCREMENT,\nname varchar(100)\
  \ NOT NULL,\nemail varchar(100) DEFAULT NULL,\nPRIMARY KEY (id)\n);\n```\n\n在 `src/main/resources`\
  \ 中创建 `data.sql`，内容如下：\n\n```\ninsert into users(id, name, email) values(1,'John','john@gmail.com');\n\
  insert into users(id, name, email) values(2,'Rod','rod@gmail.com');\ninsert into\
  \ users(id, name, email) values(3,'Mike','mike@gmail.com');\n```\n\n现在你可以将 `JdbcTemplate`\
  \ 注入到 `UserRepository` 中，如清单 5-1 所示。\n\n```\n@Repository\npublic class UserRepository\n\
  {\n@Autowired\nprivate JdbcTemplate jdbcTemplate;\n@Transactional(readOnly=true)\n\
  public List findAll() {\nreturn jdbcTemplate.query(\"select * from users\",\nnew\
  \ UserRowMapper());\n}\n@Transactional(readOnly=true)\npublic User findUserById(int\
  \ id) {\nreturn jdbcTemplate.queryForObject(\"select * from users where id=?\",\n\
  new Object[]{id}, new UserRowMapper());\n}\npublic User create(final User user)\
  \ {\nfinal String sql = \"insert into users(name,email) values(?,?)\";\nKeyHolder\
  \ holder = new GeneratedKeyHolder();\njdbcTemplate.update(new PreparedStatementCreator()\
  \ {\n@Override\npublic PreparedStatement createPreparedStatement(Connection connection)\n\
  throws SQLException {\nPreparedStatement ps = connection\n.prepareStatement(sql,\
  \ Statement.RETURN_GENERATED_KEYS);\nps.setString(1, user.getName());\nps.setString(2,\
  \ user.getEmail());\nreturn ps;\n}\n}, holder);\nint newUserId = holder.getKey().intValue();\n\
  user.setId(newUserId);\nreturn user;\n}\n}\nclass UserRowMapper implements RowMapper\n\
  {\n@Override\npublic User mapRow(ResultSet rs, int rowNum) throws SQLException {\n\
  User user = new User();\nuser.setId(rs.getInt(\"id\"));\nuser.setName(rs.getString(\"\
  name\"));\nuser.setEmail(rs.getString(\"email\"));\nreturn user;\n}\n}\n清单 5-1.\n\
  UserRepository.java\n```\n\n创建名为 `SpringbootJdbcDemoApplication.java` 的入口点，如清单 5-2\
  \ 所示。\n\n```\n@SpringBootApplication\npublic class SpringbootJdbcDemoApplication\n\
  {\npublic static void main(String[] args)\n{\nSpringApplication.run(SpringbootJdbcDemoApplication.class,\
  \ args);\n}\n}\n清单 5-2.\nSpringbootJdbcDemoApplication.java\n```\n\n现在你可以创建一个 JUnit\
  \ 测试类来测试 `UserRepository` 的方法，如清单 5-3 所示。\n\n```\n@RunWith(SpringRunner.class)\n\
  @SpringBootTest(SpringbootJdbcDemoApplication.class)\npublic class SpringbootJdbcDemoApplicationTests\n\
  {\n@Autowired\nprivate UserRepository userRepository;\n@Test\npublic void findAllUsers()\
  \  {\nList users = userRepository.findAll();\nassertNotNull(users);\nassertTrue(!users.isEmpty());\n\
  }\n@Test\npublic void findUserById()  {\nUser user = userRepository.findUserById(1);\n\
  assertNotNull(user);\n}\n@Test\npublic void createUser() {\nUser user = new User(0,\
  \ \"Johnson\", \"johnson@gmail.com\");\nUser savedUser = userRepository.create(user);\n\
  User newUser = userRepository.findUserById(savedUser.getId());\nassertNotNull(newUser);\n\
  assertEquals(\"Johnson\", newUser.getName());\nassertEquals(\"johnson@gmail.com\"\
  , newUser.getEmail());\n}\n}\n清单 5-3.\nSpringbootJdbcDemoApplicationTests.java\n\
  ```\n\n注意\n\n默认情况下，只有当你使用 `SpringApplication` 时，诸如外部属性、日志记录等 Spring Boot 特性才在 `ApplicationContext`\
  \ 中可用。因此，Spring Boot 提供了 `@SpringBootTest` 注解，用于为那些在后台使用 `SpringApplication` 的测试配置\
  \ `ApplicationContext`。\n\n你已经学习了如何快速上手嵌入式数据库。但是，如果你想使用非嵌入式数据库（如 MySQL、Oracle 和\
  \ PostgreSQL）该怎么办呢？\n\n你可以在 `application.properties` 文件中配置数据库属性，这样 Spring Boot 就会使用这些\
  \ JDBC 参数来配置 `DataSource` bean。\n\n```\nspring.datasource.driver-class-name=com.mysql.jdbc.Driver\n\
  spring.datasource.url=jdbc:mysql://localhost:3306/test\nspring.datasource.username=root\n\
  spring.datasource.password=admin\n```\n\n如果出于任何原因，你想拥有更多控制权并自行配置 `DataSource` bean，你可以在配置类中进行配置。如果你注册了\
  \ `DataSource` bean，Spring Boot 将不会使用自动配置来配置它。\n\n### 使用其他连接池库\n\n默认情况下，Spring Boot\
  \ 会引入 `tomcat-jdbc-{version}.jar`，并使用 `org.apache.tomcat.jdbc.pool.DataSource` 来配置\
  \ `DataSource` bean。\n\nSpring Boot 会检查以下类的可用性，并使用类路径中第一个可用的类。\n\n*   `org.apache.tomcat.jdbc.pool.DataSource`\n\
  *   `com.zaxxer.hikari.HikariDataSource`\n*   `org.apache.commons.dbcp.BasicDataSource`\n\
  *   `org.apache.commons.dbcp2.BasicDataSource`\n\n如果你想使用 `HikariDataSource`，可以排除\
  \ `tomcat-jdbc` 并添加 `HikariCP` 依赖，如下所示：\n\n```\norg.springframework.boot\nspring-boot-starter-jdbc\n\
  \norg.apache.tomcat\ntomcat-jdbc\n\ncom.zaxxer\nHikariCP\n\n```\n\n你可以按如下方式配置连接池库的特定设置：\n\
  \n```\nspring.datasource.tomcat.*= # Tomcat 数据源特定设置\nspring.datasource.hikari.*=\
  \ # Hikari 数据源特定设置\nspring.datasource.dbcp2.*= # Commons DBCP2 特定设置\n```\n\n例如，你可以按如下方式设置\
  \ `HikariCP` 连接池设置：\n\n```\nspring.datasource.hikari.allow-pool-suspension=true\n\
  spring.datasource.hikari.connection-test-query=SELECT 1\nspring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED\n\
  spring.datasource.hikari.connection-timeout=45000\n```\n\n\n\n## 使用 Flyway 进行数据库迁移\n\
  \n对于企业级应用而言，制定合理的数据库迁移计划至关重要。应用的新版本可能会发布涉及数据库模式变更的新功能或增强特性。强烈建议使用带版本号的数据库脚本，这样你就可以追踪每个版本引入了哪些数据库变更，并在需要时将数据库恢复到特定版本。\n\
  \n本节将介绍一款名为 Flyway 的流行数据库迁移工具，Spring Boot 对其提供了开箱即用的支持。\n\n你可以按照特定的命名模式将数据库迁移脚本创建为\
  \ `.sql` 文件，这样 Flyway 就能根据当前模式版本按顺序执行这些脚本。Flyway 会创建一个名为 `schema_version` 的数据库表来记录当前模式版本，从而在执行迁移操作时运行所有待处理的迁移脚本（图\
  \ 5-1）。\n\n![A447991_1_En_5_Fig1_HTML.jpg](img/A447991_1_En_5_Fig1_HTML.jpg)\n\n\
  图 5-1.\n\nFlyway schema_version 表\n\n在命名迁移脚本时，应遵循命名规范，以确保脚本按正确顺序执行。\n\n```\nV{版本号}__{描述}.sql\n\
  ```\n\n其中，`{版本号}` 是版本号，可以包含点号 (.) 和下划线 (_)。`{描述}` 可以包含描述迁移变更的文本。`{版本号}` 和 `{描述}`\
  \ 之间应使用分隔符分隔；默认分隔符是两个连续的下划线 (`__`)，但此选项是可配置的。\n\n示例：\n\n```\nV1__Init.sql\nV1.1_CreatePersonTable.sql\n\
  V1_2__UpdatePersonTable.sql\nV2.1.0__CreateSecurityTables.sql\nV2_1_1__AddAuditingTables.sql\n\
  ```\n\n要为 Spring Boot 应用添加 Flyway 迁移支持，你只需添加 `flyway-core` 依赖，并将迁移脚本放置在类路径下的 `db/migration`\
  \ 目录中。\n\n```\norg.flywaydb\nflyway-core\n\n```\n\n现在，在 `src/main/resources/db/migration`\
  \ 目录中创建清单 5-4 和 5-5 所示的两个迁移脚本。\n\n```\nCREATE TABLE users\n(\nid int(11) NOT NULL\
  \ AUTO_INCREMENT,\nname varchar(100) NOT NULL,\nemail varchar(100) DEFAULT NULL,\n\
  PRIMARY KEY (id)\n);\ninsert into users(id, name, email) values(1,'John','john@gmail.com');\n\
  insert into users(id, name, email) values(2,'Rod','rod@gmail.com');\ninsert into\
  \ users(id, name, email) values(3,'Renold','renold@gmail.com');\n清单 5-4.\nV1.0__Init.sql\n\
  ```\n\n```\nALTER TABLE USERS ADD COLUMN DOB DATE DEFAULT NULL;\n清单 5-5.\nV1.1__Add_DOB_Column.sql\n\
  ```\n\n现在，当你启动应用时，它会检查当前模式版本号（`schema_version.version` 列的最大值），如果存在版本号更高的待处理迁移脚本，则会执行这些脚本。\n\
  \n如果你已经有一个包含表的现有数据库，可以导出现有数据库结构并将其作为基线脚本，这样你就可以清理数据库并从头开始。如果你不想导出并重新运行初始脚本（这在生产环境中很常见），可以设置\
  \ `flyway.baseline-on-migrate=true`，这将在 `schema_version` 表中插入一条版本设置为 1 的基线记录。现在，你可以添加版本号高于\
  \ 1 的迁移脚本，例如 1.1、1_2 等。\n\n有关 Flyway 迁移的更多信息，请参阅 [`https://flywaydb.org/`](https://flywaydb.org/)\
  \ 。\n\n## 本章小结\n\n在本章中，你学习了如何在 Spring Boot 中轻松使用 `JdbcTemplate`，以及如何连接到 H2 和 MySQL\
  \ 等数据库。本章还介绍了如何使用 SQL 脚本初始化数据库。此外，你还学习了如何使用各种连接池库。下一章将解释如何将 MyBatis 与 Spring Boot\
  \ 结合使用。\n\n"
- "# 6. 使用 MyBatis\n\nMyBatis 是一个开源的 Java 持久化框架，它抽象了 JDBC 样板代码，并提供了简单易用的 API 来与数据库交互。\n\
  \n与 Hibernate 这种全功能的 ORM 框架不同，MyBatis 是一个 SQL 映射框架。它自动化了将 SQL 结果集填充到 Java 对象的过程，并通过从\
  \ Java 对象中提取数据来将数据持久化到表中。\n\n本章涵盖如何使用 Spring Boot MyBatis 启动器、如何使用 MyBatis XML 执行数据库查询，以及如何使用基于注解的映射器。\n\
  \n\n\n## 使用 Spring Boot MyBatis Starter\n\nMyBatis 社区为 MyBatis 构建了 Spring Boot Starter，你可以在通过\
  \ Spring Initializer 或 IDE 创建 Spring Boot 项目时使用它。你可以在 GitHub 上查看其源代码：[`https://github.com/mybatis/mybatis-spring-boot`](https://github.com/mybatis/mybatis-spring-boot)。\n\
  \n接下来你将学习如何使用 Spring Boot MyBatis Starter 在 Spring Boot 应用中快速集成 MyBatis。\n\n1. \
  \ 创建一个 Spring Boot Maven 项目，并配置 MyBatis Starter 依赖以及 H2/MySQL 驱动依赖。\n\n```\n   \
  \ org.mybatis.spring.boot\n    mybatis-spring-boot-starter\n    1.3.0\n\ncom.h2database\n\
  \    h2\n\nmysql\n    mysql-connector-java\n\n```\n\n本示例复用了上一章创建的 `User.java`、`schema.sql`\
  \ 和 `data.sql` 文件。\n2.  创建名为 `UserMapper.java` 的 MyBatis SQL 映射器接口，其中包含一些数据库操作，如清单\
  \ 6-1 所示。\n\n```\n    package com.apress.demo.mappers;\n    public interface UserMapper\n\
  \    {\n    void insertUser(User user);\n    User findUserById(Integer id);\n  \
  \  List findAllUsers();\n    }\n    清单 6-1.\n    com.apress.demo.mappers.UserMapper.java\n\
  \    ```\n\n3.  现在你需要创建映射器 XML 文件，为映射到相应映射器接口方法的 SQL 语句定义查询。在 `src/main/resources/com/apress/demo/mappers/`\
  \ 目录下创建 `UserMapper.xml` 文件，如清单 6-2 所示。\n\n```\n\nselect id, name, email from users\n\
  \nselect id, name, email from users WHERE id=#{id}\n\ninsert into users(name,email)\
  \ values(#{name},#{email})\n\n清单 6-2.\n    src/main/resources/com/apress/demo/mappers/UserMapper.xml\n\
  \    ```\n\n这里需要注意以下几点：\n    *   映射器 XML 中的命名空间应与映射器接口的完全限定名（FQN）保持一致。\n    *  \
  \ 语句的 `id` 值应与映射器接口的方法名保持一致。\n    *   如果查询结果列名与 Bean 属性名不同，你可以使用 `<resultMap>` 配置来提供列名与其对应\
  \ Bean 属性名之间的映射关系。\n4.  MyBatis 也提供了基于注解的查询配置，无需映射器 XML。你可以创建 `UserMapper.java`\
  \ 接口并使用注解配置映射的 SQL，如清单 6-3 所示。\n\n```\n    public interface UserMapper\n    {\n\
  \    @Insert(\"insert into users(name,email) values(#{name},#{email})\")\n    @SelectKey(statement=\"\
  call identity()\", keyProperty=\"id\",\n    before=false, resultType=Integer.class)\n\
  \    void insertUser(User user);\n    @Select(\"select id, name, email from users\
  \ WHERE id=#{id}\")\n    User findUserById(Integer id);\n    @Select(\"select id,\
  \ name, email from users\")\n    List findAllUsers();\n    }\n    清单 6-3.\n    com.apress.demo.mappers.UserMapper.java\n\
  \    ```\n\n5.  接下来，你需要配置 Starter 的配置参数。在 `application.properties` 中配置 `type-aliases-package`\
  \ 和 `mapper-locations` 参数，如下所示。\n\n```\n    mybatis.type-aliases-package=com.apress.demo.domain\n\
  \    mybatis.mapper-locations=classpath*:/mappers/*.xml\n    ```\n\n6.  创建名为 `SpringbootMyBatisDemoApplication.java`\
  \ 的入口类，如清单 6-4 所示。\n\n```\n    @SpringBootApplication\n    @MapperScan(\"com.apress.demo.mappers\"\
  )\n    public class SpringbootMyBatisDemoApplication\n    {\n    public static void\
  \ main(String[] args)\n    {\n    SpringApplication.run(SpringbootMyBatisDemoApplication.class,\
  \ args);\n    }\n    }\n    清单 6-4.\n    com.apress.demo.SpringbootMyBatisDemoApplication.java\n\
  \    ```\n\n注意 本示例使用 `@MapperScan(\"com.apress.demo.mappers\")` 注解来指定映射器接口的查找位置。除了使用\
  \ `@MapperScan`，你也可以使用 MyBatis 3.4.0 中新增的 `@Mapper` 注解来标注映射器接口。\n7.  创建一个 JUnit\
  \ 测试类并测试 `UserMapper` 方法，如清单 6-5 所示。\n\n```\n    @RunWith(SpringRunner.class)\n\
  \    @SpringBootTest\n    public class SpringbootMyBatisDemoApplicationTests\n \
  \   {\n    @Autowired\n    private UserMapper userMapper;\n    @Test\n    public\
  \ void findAllUsers()  {\n    List users = userMapper.findAllUsers();\n    assertNotNull(users);\n\
  \    assertTrue(!users.isEmpty());\n    }\n    @Test\n    public void findUserById()\
  \  {\n    User user = userMapper.findUserById(1);\n    assertNotNull(user);\n  \
  \  }\n    @Test\n    public void createUser() {\n    User user = new User(0, \"\
  george\", \"george@gmail.com\");\n    userMapper.insertUser(user);\n    User newUser\
  \ = userMapper.findUserById(user.getId());\n    assertEquals(\"george\", newUser.getName());\n\
  \    assertEquals(\"george@gmail.com\", newUser.getEmail());\n    }\n    }\n   \
  \ 清单 6-5.\n    com.apress.demo.SpringbootMyBatisDemoApplicationTests.java\n    ```\n\
  \nSpring Boot MyBatis Starter 提供了以下 MyBatis 配置参数，你可以使用它们来自定义 MyBatis 设置。\n\n```\n\
  mybatis.config-location =  #mybatis 配置文件名称\nmybatis.check-config-location=  #是否检查\
  \ MyBatis XML 配置文件是否存在\nmybatis.mapper-locations =  #映射器文件位置\nmybatis.type-aliases-package\
  \ =  #领域对象的包名\nmybatis.type-handlers-package =  #类型处理器的包名\nmybatis.check-config-location\
  \ =  #检查 MyBatis 配置是否存在\nmybatis.executor-type =  #执行模式。默认为 SIMPLE\nmybatis.configuration-properties=\
  \  #MyBatis 配置的外部化属性\n```\n\n你可以在 [`http://blog.mybatis.org/p/products.html`](http://blog.mybatis.org/p/products.html)\
  \ 了解更多关于 MyBatis 的信息。\n\n## 本章小结\n\n在本章中，你学习了如何在 Spring Boot 应用中使用 MyBatis。下一章将介绍如何在\
  \ Spring Boot 中使用另一个流行的 Java 持久化框架 JOOQ。\n\n"
- '# 7. 使用 JOOQ


  JOOQ（Java 面向对象查询）是一个拥抱 SQL 的持久化框架。JOOQ 提供了以下特性：


  *   使用 DSL API 进行类型安全的 SQL 操作

  *   使用代码生成进行类型安全的数据库对象引用

  *   易于使用的查询和数据获取 API

  *   SQL 日志记录与调试


  本章将介绍如何使用 Spring Boot JOOQ Starter，如何使用 JOOQ Maven Codegen 插件从数据库模式生成代码，以及如何执行各种类型的数据库操作。




  ## JOOQ 简介


  JOOQ 是一个 Java 持久化框架，它提供了类型安全的 QueryDSL，使你能够以类型安全的方式实现应用程序的持久层。JOOQ 提供了代码生成工具，可以根据数据库模式生成代码，你可以使用这些生成的代码来构建类型安全的查询。


  你首先会看到如何使用 JOOQ 查询数据库表。


  创建一个名为 `jooq-config.xml` 的配置文件，如清单 7-1 所示。


  ```

  com.mysql.jdbc.Driver

  jdbc:mysql://localhost:3306/test

  root

  admin


  org.jooq.util.JavaGenerator


  org.jooq.util.mysql.MySQLDatabase

  test

  .*


  org.mycompany.myproj.jooq.model

  C:/projects/myproject/src/main/java


  清单 7-1.

  jooq-config.xml 文件

  ```


  现在，你可以运行以下命令，根据配置生成 JOOQ 代码：


  ```

  java -classpath jooq-3.9.3.jar;jooq-meta-3.9.3.jar;jooq-codegen-3.9.3.jar;mysql-connector-java-5.1.18-bin.jar;.
  org.jooq.util.GenerationTool jooq-config.xml

  ```


  假设你的数据库中有一个 `POST` 表。JOOQ 会根据 `POST` 表的元数据生成一个 `POST` 类。现在，你可以使用 JOOQ 查询 `POST`
  表并获取数据，如清单 7-2 所示。


  ```

  String userName = "root";

  String password = "admin";

  String url = "jdbc:mysql://localhost:3306/test";

  Class.forName(''com.mysql.jdbc.Driver'');

  Connection conn = DriverManager.getConnection(url, userName, password);

  DSLContext jooq = DSL.using(conn, SQLDialect.MYSQL);

  Result result = jooq.select().from(POST).fetch();

  for (Record r : result)

  {

  Integer id = r.getValue(POST.ID);

  String title = r.getValue(POST.TITLE);

  String content = r.getValue(POST.CONTENT);

  System.out.println("Id: " + id + " title: " + title + " content: " + content);

  }

  清单 7-2.

  使用 JOOQ DSL API

  ```


  此示例创建了一个数据库 `Connection` 并实例化了 `DSLContext` 对象，这是使用 JOOQ QueryDSL 的入口点。通过 `DSLContext`
  对象，它查询了 `POST` 表并遍历了结果集。


  你可以将 JOOQ 与 Spring 框架集成，这样就不必手动创建 `Connection` 和实例化 `DSLContext`。请参阅 [`https://www.jooq.org/doc/3.9/manual-single-page/#jooq-with-spring`](https://www.jooq.org/doc/3.9/manual-single-page/#jooq-with-spring)
  了解如何将 Spring 与 JOOQ 集成。


  Spring Boot 提供了 JOOQ Starter，以便你可以快速上手使用 JOOQ。你可以通过利用其自动配置机制来实现这一点。


  ## 使用 Spring Boot 的 JOOQ Starter


  Spring Boot 提供了一个名为 `spring-boot-starter-jooq` 的 starter，它允许你快速与 JOOQ 集成。本节将逐步向你展示如何使用
  `spring-boot-starter-jooq`。


  ### 配置 Spring Boot JOOQ Starter


  创建一个基于 Maven 的 Spring Boot 项目，并添加 `spring-boot-starter-jooq` 依赖以及 H2 和 MySQL 驱动依赖。


  ```

  org.springframework.boot

  spring-boot-starter-jooq


  org.springframework.boot

  spring-boot-starter-test

  test


  com.h2database

  h2


  mysql

  mysql-connector-java


  ```


  此示例首先使用 H2 内存数据库，稍后你将看到如何使用 MySQL。


  ### 数据库模式


  创建一个包含两个表（`POSTS` 和 `COMMENTS`）的简单数据库。创建名为 `src/main/resources/schema.sql` 的数据库创建脚本，如清单
  7-3 所示。


  ```

  DROP TABLE IF EXISTS POSTS;

  CREATE TABLE POSTS

  (

  ID int(11) NOT NULL AUTO_INCREMENT,

  TITLE VARCHAR(200) NOT NULL,

  CONTENT LONGTEXT DEFAULT NULL,

  CREATED_ON DATETIME DEFAULT NULL,

  PRIMARY KEY (ID)

  );

  DROP TABLE IF EXISTS COMMENTS;

  CREATE TABLE COMMENTS

  (

  ID INT(11) NOT NULL AUTO_INCREMENT,

  POST_ID INT(11) NOT NULL,

  NAME VARCHAR(200) NOT NULL,

  EMAIL VARCHAR(200) NOT NULL,

  CONTENT LONGTEXT DEFAULT NULL,

  CREATED_ON DATETIME DEFAULT NULL,

  PRIMARY KEY (ID),

  FOREIGN KEY (POST_ID) REFERENCES POSTS(ID)

  );

  清单 7-3.

  src/main/resources/schema.sql 文件

  ```


  现在，使用 `src/main/resources/data.sql` 脚本填充一些示例数据，如清单 7-4 所示。


  ```

  insert into posts(id, title, content, created_on)

  values(1, ''Post 1'', ''This is post 1'', ''2017-01-03'');

  insert into posts(id, title, content, created_on)

  values(2, ''Post 2'', ''This is post 2'', ''2017-01-05'');

  insert into posts(id, title, content, created_on)

  values(3, ''Post 3'', ''This is post 3'', ''2017-01-07'');

  insert into comments(id, post_id, name, email, content, created_on)

  values(1, 1, ''User1'', ''user1@gmail.com'', ''This is comment 1 on post 1'', ''2017-01-07'');

  insert into comments(id, post_id, name, email, content, created_on)

  values(2, 1, ''User2'', ''user2@gmail.com'', ''This is comment 2 on post 1'', ''2017-01-07'');

  insert into comments(id, post_id, name, email, content, created_on)

  values(3, 2, ''User1'', ''user1@gmail.com'', ''This is comment 1 on post 2'', ''2017-01-07'');

  清单 7-4.

  src/main/resources/data.sql 文件

  ```


  ### 使用 JOOQ Maven Codegen 插件生成代码


  JOOQ 提供了 JOOQ Maven Codegen 插件，用于通过 Maven 目标生成数据库工件。在本节中，你将看到如何使用 Maven 配置文件根据数据库类型配置
  `jooq-codegen-maven` 配置属性。请参见清单 7-5。


  ```


  h2


  org.jooq

  jooq-codegen-maven


  generate


  com.h2database

  h2

  ${h2.version}


  org.h2.Driver

  jdbc:h2:ʿ/springbootjooq


  org.jooq.util.DefaultGenerator


  org.jooq.util.h2.H2Database

  .*


  PUBLIC


  com.apress.demo.jooq.domain

  gensrc/main/java


  mysql


  org.jooq

  jooq-codegen-maven


  generate


  mysql

  mysql-connector-java

  ${mysql.version}


  com.mysql.jdbc.Driver

  jdbc:mysql://localhost:3306/test

  root

  admin


  org.jooq.util.DefaultGenerator


  org.jooq.util.mysql.MySQLDatabase

  .*


  test


  com.apress.demo.jooq.domain

  gensrc/main/java


  清单 7-5.

  pom.xml 文件中的 jooq-codegen-maven 插件配置

  ```


  此示例配置了两个配置文件（`h2` 和 `mysql`），并带有相应的 JDBC 配置参数。它会生成代码工件，并将其放置在 `gensrc/main/java`
  目录下的 `com.apress.demo.jooq.domain` 包中。


  你可以运行激活 `h2` 或 `mysql` 配置文件的 Maven 构建，如下所示：


  ```

  mvn clean install -P h2 (或) mvn clean install -P mysql

  ```


  ### 将 JOOQ 生成的代码添加为源文件夹


  接下来，你必须配置 `build-helper-maven-plugin`，以便 Maven 将 JOOQ 生成的代码作为源文件夹添加到 `gensrc/main/java`
  目录。


  ```

  org.codehaus.mojo

  build-helper-maven-plugin


  generate-sources


  add-source


  gensrc/main/java


  ```


  ### 领域对象


