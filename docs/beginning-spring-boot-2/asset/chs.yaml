  \ 13-9 所示。\n\n```\n\nSpringBoot 安全\n\n欢迎管理员（用户）\n注销\n\n清单 13-9.\nThymeleaf 管理员首页视图\n\
  ```\n\n接下来，创建 `src/main/resources/templates/403.html`，如清单 13-10 所示。\n\n```\n\n访问被拒绝\n\
  \n你无权查看此页面！！\n\n清单 13-10.\n访问被拒绝视图 403.html\n```\n\n如果登录用户没有 `ROLE_ADMIN` 角色并尝试访问\
