  ### 使用 JOOQ DSL


  `DSLContext` 是 JOOQ DSL API 的主要入口点。你将了解如何使用 JOOQ DSL API 实现数据持久化方法。


  首先，创建带有自动注入的 `DSLContext` 对象的 `PostService` 类，如清单 7-7 所示。


