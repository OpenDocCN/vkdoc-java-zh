  ## 总结


  本章解释了如何通过使用 Spring Boot JOOQ Starter 来使用 JOOQ 框架。下一章将解释如何在 Spring Boot 应用程序中使用 JPA（通过
  Hibernate 实现）。




  '
- "# 8. 使用 JPA\n\nJava 持久化 API（JPA）是一个对象关系映射（ORM）框架，它是 Java EE 平台的一部分。JPA 通过让开发者使用面向对象的\
  \ API 而不是手动编写 SQL 查询，简化了数据访问层的实现。最流行的 JPA 实现包括 Hibernate、EclipseLink 和 OpenJPA。\n\
  \nSpring 框架提供了一个 Spring ORM 模块，以便轻松集成 ORM 框架。你还可以将 Spring 的声明式事务管理功能与 JPA 结合使用。除了\
  \ Spring ORM 模块，Spring Data 项目组合还提供了一个基于 Spring 的一致编程模型，用于访问关系型数据库和 NoSQL 数据存储。\n\
  \nSpring Data 集成了大多数流行的数据访问技术，包括 JPA、MongoDB、Redis、Cassandra、Solr、ElasticSearch\
  \ 等。\n\n本章将探讨 Spring Data JPA，解释如何将其与 Spring Boot 一起使用，并研究如何在同一个 Spring Boot 应用程序中处理多个数据库。\n\
  \n## 介绍 Spring Data JPA\n\n第 1 章讨论了如何在不使用 Spring Boot 的情况下，使用 SpringMVC 和 JPA 开发\
  \ Web 应用程序。如果不使用 Spring Boot，你需要自行配置各种 Bean，例如 `DataSource`、`TransactionManager`、`LocalContainerEntityManagerFactoryBean`\
  \ 等。你可以使用 Spring Boot JPA 启动器 `spring-boot-starter-data-jpa` 来快速启动并运行 JPA。在深入了解如何使用\
  \ `spring-boot-starter-data-jpa` 之前，让我们先看看 Spring Data JPA。\n\n如第 5 章所述，Spring Data\
  \ 是一个伞形项目，它以一种一致的编程模型为大多数流行的数据访问技术（包括 JPA、MongoDB、Redis、Cassandra、Solr 和 ElasticSearch）提供数据访问支持。Spring\
  \ Data JPA 是使用 JPA 处理关系型数据库的模块之一。\n\n有时，你可能需要实现数据管理应用程序来存储、编辑和删除数据。对于这些应用程序，你只需要实现实体的\
  \ CRUD（创建、读取、更新、删除）操作。Spring Data 没有让你一遍又一遍地实现相同的 CRUD 操作，或者推出你自己的通用 CRUD DAO 实现，而是提供了各种仓库抽象，例如\
  \ `CrudRepository`、`PagingAndSortingRepository`、`JpaRepository` 等。它们为 CRUD 操作以及分页和排序提供了开箱即用的支持。参见图\
  \ 8-1。\n\n![A447991_1_En_8_Fig1_HTML.jpg](img/A447991_1_En_8_Fig1_HTML.jpg)\n\n\
  图 8-1.\n\nJpaRepository 方法\n\n如图 8-1 所示，`JpaRepository` 提供了多种用于 CRUD 操作的方法，以及以下值得关注的方法：\n\
  \n*   `long count();`——返回可用的实体总数。\n*   `boolean existsById(ID id);`——返回具有给定 ID 的实体是否存在。\n\
  *   `List<T> findAll(Sort sort);`——返回按给定选项排序的所有实体。\n*   `Page<T> findAll(Pageable\
  \ pageable);`——返回满足 `Pageable` 对象中提供的分页限制的实体页面。\n\nSpring Data JPA 不仅提供了开箱即用的 CRUD\
  \ 操作，还支持基于方法名称的动态查询生成。\n\n例如：\n\n*   通过定义一个 `User findByEmail(String email)` 方法，Spring\
  \ Data 将自动生成带有 `where` 子句的查询，例如 `\"where email = ?1\"`。\n*   通过定义一个 `User findByEmailAndPassword(String\
  \ email, String password)` 方法，Spring Data 将自动生成带有 `where` 子句的查询，例如 `\"where email\
  \ = ?1 and password=?2\"`。\n\n注意\n\n你还可以使用其他运算符，例如 `OR`、`LIKE`、`Between`、`LessThan`、`LessThanEqual`\
  \ 等。有关支持操作的完整列表，请参阅 [`http://docs.spring.io/spring-data/jpa/docs/current/reference/html/#jpa.query-methods.query-creation`](http://docs.spring.io/spring-data/jpa/docs/current/reference/html/#jpa.query-methods.query-creation)。\n\
  \n但有时你可能无法使用方法名称来表达你的条件，或者方法名称看起来很不美观。Spring Data 提供了使用 `@Query` 注解显式配置查询的灵活性。\n\
  \n```\n@Query(\"select u from User u where u.email=?1 and u.password=?2 and u.enabled=true\"\
  )\nUser findByEmailAndPassword(String email, String password);\n```\n\n你还可以使用 `@Modifying`\
  \ 和 `@Query` 执行数据更新操作，如下所示：\n\n```\n@Modifying\n@Query(\"update User u set u.enabled=:status\"\
  )\nint updateUserStatus(@Param(\"status\") boolean status)\n```\n\n请注意，此示例使用了命名参数\
  \ `:status` 而不是位置参数 `?1`。\n\n\n\n## 在 Spring Boot 中使用 Spring Data JPA\n\n现在您已经初步了解了\
  \ Spring Data JPA 及其提供的功能，本节将向您展示如何将其付诸实践。\n\n1.  创建一个 Spring Boot Maven 项目，并添加以下依赖项。\n\
  \n    ```\n\n    org.springframework.boot\n    spring-boot-starter-data-jpa\n\n\
  \    com.h2database\n    h2\n\n    org.springframework.boot\n    spring-boot-starter-test\n\
  \    test\n\n    ```\n\n2.  创建一个名为 `User` 的 JPA 实体和一个名为 `UserRepository` 的 JPA 仓库接口。\
  \  \n3.  创建一个用户 JPA 实体，如清单 8-1 所示。\n\n    ```\n    @Entity\n    @Table(name=\"USERS\"\
  )\n    public class User\n    {\n    @Id @GeneratedValue(strategy=GenerationType.AUTO)\n\
  \    private Integer id;\n    @Column(nullable=false)\n    private String name;\n\
  \    @Column(nullable=false, unique=true)\n    private String email;\n    private\
  \ boolean disabled;\n    //setters and getters\n    }\n    Listing 8-1.\n    JPA\
  \ Entity User.java\n    ```\n\n4.  通过扩展 `JpaRepository` 接口来创建 `UserRepository` 接口，如清单\
  \ 8-2 所示。\n\n    ```\n    public interface UserRepository extends JpaRepository\n\
  \    {\n    }\n    Listing 8-2.\n    JPA Repository Interface UserRepository.java\n\
  \    ```\n\n5.  现在，您可以使用 SQL 脚本 `src/main/resources/data.sql` 填充一些示例数据：\n\n    ```\n\
  \    insert into users(id, name, email,disabled)\n    values(1,'John','john@gmail.com',\
  \ false);\n    insert into users(id, name, email,disabled)\n    values(2,'Rod','rod@gmail.com',\
  \ false);\n    insert into users(id, name, email,disabled)\n    values(3,'Becky','becky@gmail.com',\
  \ true);\n    ```\n\n    由于您配置了内存数据库（H2）驱动，Spring Boot 会自动注册一个 `DataSource`。由于您添加了\
  \ `spring-boot-starter-data-jpa` 依赖，Spring Boot 的自动配置会使用合理的默认值自动创建 JPA 相关的 Bean，例如\
  \ `LocalContainerEntityManagerFactoryBean`、`TransactionManager` 等。  \n6.  创建一个名为\
  \ `SpringbootJPADemoApplication.java` 的 Spring Boot 入口类，如清单 8-3 所示。\n\n    ```\n\
  \    @SpringBootApplication\n    public class SpringbootJPADemoApplication\n   \
  \ {\n    public static void main(String[] args)\n    {\n    SpringApplication.run(SpringbootJPADemoApplication.class,\
  \ args);\n    }\n    }\n    Listing 8-3.\n    SpringbootJPADemoApplication.java\n\
  \    ```\n\n7.  创建一个 JUnit 测试类来测试 `UserRepository` 的方法，如清单 8-4 所示。\n\n    ```\n\
  \    @RunWith(SpringRunner.class)\n    @SpringBootTest\n    public class SpringbootJPADemoApplicationTests\n\
  \    {\n    @Autowired\n    private UserRepository userRepository;\n    @Test\n\
  \    public void findAllUsers()  {\n    List users = userRepository.findAll();\n\
  \    assertNotNull(users);\n    assertTrue(!users.isEmpty());\n    }\n    @Test\n\
  \    public void findUserById()  {\n    Optional user = userRepository.getById(1);\n\
  \    assertNotNull(user.get());\n    }\n    @Test\n    public void createUser()\
  \ {\n    User user = new User(null, \"Paul\", \"paul@gmail.com\");\n    User savedUser\
  \ = userRepository.save(user);\n    User newUser = userRepository.findById(savedUser.getId()).get();\n\
  \    assertEquals(\"SivaPrasad\", newUser.getName());\n    assertEquals(\"sivaprasad@gmail.com\"\
  , newUser.getEmail());\n    }\n    }\n    Listing 8-4.\n    SpringbootJPADemoApplicationTests.java\n\
  \    ```\n\n### 添加动态查询方法\n\n现在，您将添加一些查找方法，以了解基于方法名称的动态查询生成是如何工作的。\n\n要按名称获取用户，请使用：\n\
  \n```\nUser findByName(String name)\n```\n\n要按名称搜索用户，请使用：\n\n```\nList findByNameLike(String\
  \ name)\n```\n\n上述方法会生成一个类似 `where u.name like ?1` 的 `where` 子句。\n\n假设您想进行通配符搜索，例如\
  \ `where u.name like %?1%`。您可以按如下方式使用 `@Query`：\n\n```\n@Query(\"select u from User\
  \ u where u.name like %?1%\")\nList searchByName(String name)\n```\n\n### 使用排序和分页功能\n\
  \n假设您想按名称升序获取所有用户。您可以按如下方式使用 `findAll(Sort sort)` 方法：\n\n```\nSort sort = new Sort(Direction.ASC,\
  \ \"name\");\nList users = userRepository.findAll(sort);\n```\n\n您也可以对多个属性应用排序，如下所示：\n\
  \n```\nOrder order1 = new Order(Direction.ASC, \"name\");\nOrder order2 = new Order(Direction.DESC,\
  \ \"id\");\nSort sort = Sort.by(order1, order2);\nList users = userRepository.findAll(sort);\n\
  ```\n\n用户将首先按名称升序排序，然后按 ID 降序排序。\n\n在许多 Web 应用程序中，您希望以分页的方式显示数据。Spring Data 使得以分页样式加载数据变得非常容易。假设您想在一页中加载前\
  \ 25 个用户。我们可以使用 `Pageable` 和 `PageRequest` 按页获取结果，如下所示：\n\n```\nint size = 25;\n\
  int page = 0; //基于零的页码索引。\nPageable pageable = PageRequest.of(page, size);\nPage\
  \ usersPage = userRepository.findAll(pageable);\n```\n\n`usersPage` 将仅包含前 25 条用户记录。您可以获取其他详细信息，例如总页数、当前页码、是否有下一页、是否有上一页等。\n\
  \n*   `usersPage.getTotalElements();` — 返回元素总数。\n*   `usersPage.getTotalPages();`\
  \ — 返回总页数。\n*   `usersPage.hasNext();`\n*   `usersPage.hasPrevious();`\n*   `List<User>\
  \ usersList = usersPage.getContent();`\n\n您也可以将分页与排序结合使用，如下所示：\n\n```\nSort sort\
  \ = new Sort(Direction.ASC, \"name\");\nPageable pageable = PageRequest.of(page,\
  \ size, sort);\nPage usersPage = userRepository.findAll(pageable);\n```\n\n\n\n\
  ### 使用多个数据库\n\n如果你只需要处理单个数据库，Spring Boot 的自动配置可以开箱即用，并通过其属性提供了大量的自定义选项。\n\n但如果你的应用程序需要对应用配置进行更精细的控制，你可以关闭特定的自动配置，并自行配置相关组件。\n\
  \n例如，你可能想在同一个应用程序中使用多个数据库。如果需要连接多个数据库，你需要显式地配置各种 Spring Bean，例如 `DataSources`、`TransactionManagers`、`EntityManagerFactoryBeans`、`DataSourceInitializers`\
  \ 等。\n\n假设你的应用程序中，安全数据存储在一个数据库/模式中，而订单相关数据存储在另一个数据库/模式中。\n\n如果你添加了 `spring-boot-starter-data-jpa`\
  \ 启动器，并且只定义了 `DataSource` Bean，那么 Spring Boot 会尝试自动创建一些 Bean（例如 `TransactionManager`），并假设只有一个数据源。这将会失败。\n\
  \n现在你将看到如何在 Spring Boot 中使用多个数据库，并构建基于 Spring Data JPA 的应用程序。\n\n1.  使用 `data-jpa`\
  \ 启动器创建一个 Spring Boot 应用程序。在 `pom.xml` 中配置以下依赖项：\n\n```\n    org.springframework.boot\n\
  \    spring-boot-starter-data-jpa\n\nmysql\n    mysql-connector-java\n\n```\n\n\
  2.  关闭 DataSource/JPA 自动配置。由于你将显式配置与数据库相关的 Bean，因此需要通过排除 `AutoConfiguration` 类来关闭\
  \ DataSource/JPA 自动配置，如清单 8-5 所示。\n\n```\n    @SpringBootApplication(\n    exclude\
  \ = { DataSourceAutoConfiguration.class,\n    HibernateJpaAutoConfiguration.class,\n\
  \    DataSourceTransactionManagerAutoConfiguration.class})\n    @EnableTransactionManagement\n\
  \    public class SpringbootMultipleDSDemoApplication\n    {\n    public static\
  \ void main(String[] args)\n    {\n    SpringApplication.run(SpringbootMultipleDSDemoApplication.class,\
  \ args);\n    }\n    }\n    清单 8-5.\n    SpringbootMultipleDSDemoApplication.java\n\
  \    ```\n\n由于你已经关闭了 `AutoConfigurations`，你需要通过使用 `@EnableTransactionManagement`\
  \ 注解来显式启用 `TransactionManagement`。  \n3.  配置 `datasource` 属性。在 `application.properties`\
  \ 文件中配置 `Security` 和 `Orders` 数据库的连接参数。\n\n```\n    datasource.security.driver-class-name=com.mysql.jdbc.Driver\n\
