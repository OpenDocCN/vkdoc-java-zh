    \ A value of 0 indicates having to wait forever.\n*   `executorService(ExecutorService\
    \ executor)`: Used for async requests. We will return to this in the async section.\n\
    \n# MicroProfile REST Client CDI usage\n\nMP-RC type-safe interfaces may be injected\
    \ as CDI beans. The runtime must create a CDI bean for each interface annotated\
    \ with `@RegisterRestClient`. A CDI client injects bean created will include a\
    \ qualifier, `@RestClient` , to differentiate use as an MP-RC injection point.\
    \ The following update to our `WorldClockApi` interface illustrates the use of\
    \ the `@RegisterRestClient` annotation:\n\n```\nimport javax.ws.rs.GET;import\
    \ javax.ws.rs.Path;import javax.ws.rs.PathParam;import javax.ws.rs.Produces;import\
    \ javax.ws.rs.core.MediaType;import org.eclipse.microprofile.rest.client.inject.RegisterRestClient;@Path(\"\
    /api/json\")@RegisterRestClient()public interface WorldClockApi { static final\
    \ String BASE_URL = \"http://worldclockapi.com/api/json\"; ...\n```"
  trans: "\n# 静态 OpenAPI 文件\n\n如本章前面所述，静态 OpenAPI 文件是创建 OpenAPI 文档的三个来源之一。下面，我们将简要介绍如何生成此类文件以及如何将其包含在部署中。许多组织采用\
    \ API 优先的开发实践，这意味着甚至在实现任何代码之前，就需要定义静态 OpenAPI 文件。\n\n首先，你可以使用开源编辑器（如 Swagger Editor\
    \ ([`editor.swagger.io`](https://editor.swagger.io))）创建 OpenAPI 文档。以下截图展示了这一点：\n\
    \n![](img/db11ee83-6eab-4cfd-a4c1-089959d1e197.png)\n\n使用此编辑器，你可以从示例开始...\n\n\
    # 编程模型\n\n你可以通过使用 MicroProfile OpenAPI 编程模型，借助 Java POJO（普通旧式 Java 对象）提供 OpenAPI\
    \ 元素。完整的模型集在 `org.eclipse.microprofile.openapi.models` 包中描述。你可以在 [`github.com/eclipse/microprofile-open-api/tree/master/api/src/main/java/org/eclipse/microprofile/openapi/models`](https://github.com/eclipse/microprofile-open-api/tree/master/api/src/main/java/org/eclipse/microprofile/openapi/models)\
    \ 阅读更多相关信息。\n\n你可以使用 `OASFactory` 创建 OpenAPI 树。请参考以下代码块作为示例：\n\n```\nOASFactory.createObject(Info.class).title(\"\
    Weather\")\n          .description(\"Weather APIs\").version(\"1.0.0\");\n```\n\
    \n要引导 OpenAPI 模型树，你可以使用 `OASModelReader` 接口。然后，你可以创建此接口的实现，并使用 `mp.openapi.model.reader`\
    \ 配置键进行注册。\n\n以下是在 `META-INF/microprofile-config.properties` 中其定义的大致示例：\n\n```\n\
    mp.openapi.model.reader=com.mypackage.MyModelReader\n```\n\n与静态文件类似，模型读取器可用于提供完整或部分的模型树。要提供完整的\
    \ OpenAPI 模型树，应将 `mp.openapi.scan.disable` 配置设置为 `true`。否则，将假定为部分模型。\n\n# 使用过滤器进行更新\n\
    \n要更新或移除 OpenAPI 文档的某些元素和字段，你可以使用过滤器。`OASFilter` ([`github.com/eclipse/microprofile-open-api/blob/master/api/src/main/java/org/eclipse/microprofile/openapi/OASFilter.java`](https://github.com/eclipse/microprofile-open-api/blob/master/api/src/main/java/org/eclipse/microprofile/openapi/OASFilter.java))\
    \ 接口允许你接收各种 OpenAPI 元素的回调。它允许你覆盖你关心的方法。你可以创建此接口的实现，并使用 `mp.openapi.filter` 配置键进行注册。\n\
    \n以下是在 `META-INF/microprofile-config.properties` 中其定义的大致示例：\n\n```\nmp.openapi.filter=com.mypackage.MyFilter\n\
    ```\n\n注册的过滤器会为每个模型元素调用一次。例如，`filterPathItem` 方法用于...\n\n# MicroProfile REST 客户端及其功能简介\n\
    \n**MicroProfile REST 客户端**（**MP-RC**）提供了一种用于对 REST 端点进行类型安全调用的 API。应用程序可以使用它来对其他服务执行远程调用。\n\
    \n它利用 Java 接口上的 JAX-RS 注解来描述与远程服务的实际契约。然后，这些接口用于创建客户端代理，这些代理隐藏了底层 HTTP 通信的许多细节。\n\
    \nMP-RC 规范定义了在 Java 接口上利用 JAX-RS 注解的要求，以及用于增强行为的 MP-RC 特定注解，包括如何传播传入请求头、如何使用提供程序增强\
    \ JAX-RS 行为、异常映射、CDI 支持以及与其他 MicroProfile 规范的集成。我们将从定义类型安全端点接口开始，更详细地了解 MP-RC。\n\
    \n# 定义端点接口\n\n要为端点定义类型安全接口，我们创建一个 Java 接口，该接口利用 JAX-RS 注解将接口方法映射到它们代理的 REST 端点。以下\
    \ `WorldClockApi` 接口展示了一个基本示例：\n\n```\npackage io.pckt.restc.contract;import javax.ws.rs.GET;import\
    \ javax.ws.rs.Path;import javax.ws.rs.PathParam;import javax.ws.rs.Produces;import\
    \ javax.ws.rs.core.MediaType;@Path(\"/api/json\")public interface WorldClockApi\
    \ { static final String BASE_URL = \"http://worldclockapi.com/api/json\"; @GET\
    \ @Path(\"/utc/now\") @Produces(MediaType.APPLICATION_JSON) Now utc(); @GET @Path(\"\
    {tz}/now\") @Produces(MediaType.APPLICATION_JSON) Now tz(@PathParam(\"tz\") String\
    \ tz);}public class Now ...\n```\n\n# MicroProfile REST 客户端编程式 API 使用\n\nMP-RC\
    \ 支持编程式查找和 CDI 注入两种使用方式。以下 `WorldClockUser.java` 列出了一个 REST 服务使用 `org.eclipse.microprofile.rest.client.RestClientBuilder`\
    \ 为 `WorldClockApi` 接口创建类型安全客户端的示例：\n\n```\npackage io.pckt.restc.contract;\n\n\
    import javax.ws.rs.GET;\nimport javax.ws.rs.Path;\nimport javax.ws.rs.PathParam;\n\
    import javax.ws.rs.Produces;\nimport javax.ws.rs.core.MediaType;\n\n@Path(\"/api\"\
    )\n@ApplicationScoped\npublic class WorldClockUser {\n @GET\n @Path(\"/now-utc\"\
    )\n @Produces(MediaType.TEXT_PLAIN)\n public String getCurrentDateTime() {\n WorldClockApi\
    \ remoteApi = RestClientBuilder.newBuilder()\n .baseUri(URI.create(WorldClockApi.BASE_URL))\n\
    \ .build(WorldClockApi.class);\n Now now = remoteApi.utc();\n return now.getCurrentDateTime();\n\
    \ }\n}\n```\n\n`baseUri()` 方法用于指定服务器 URI，`WorldClockApi` 方法路径将根据该 URI 进行解析。`build()`\
    \ 方法接收要构建的类型安全客户端的 Java 接口。其他 `RestClientBuilder` 方法包括：\n\n*   `baseUrl(URL)`：类似于\
    \ `baseUri`，但接受 `java.net.URL` 类型。\n*   `connectTimeout(long timeout, TimeUnit\
    \ unit)`：等待连接到远程服务器的时间。值为 0 表示无限期等待。\n*   `readTimeout(long timeout, TimeUnit\
    \ unit)`：等待读取远程服务器连接的时间。值为 0 表示无限期等待。\n*   `executorService(ExecutorService executor)`：用于异步请求。我们将在异步部分再次讨论这一点。\n\
    \n# MicroProfile REST 客户端 CDI 使用\n\nMP-RC 类型安全接口可以作为 CDI Bean 注入。运行时必须为每个使用 `@RegisterRestClient`\
    \ 注解的接口创建一个 CDI Bean。注入的 CDI 客户端 Bean 将包含一个限定符 `@RestClient`，以区分其作为 MP-RC 注入点的用途。以下对\
    \ `WorldClockApi` 接口的更新说明了 `@RegisterRestClient` 注解的使用：\n\n```\nimport javax.ws.rs.GET;import\
    \ javax.ws.rs.Path;import javax.ws.rs.PathParam;import javax.ws.rs.Produces;import\
    \ javax.ws.rs.core.MediaType;import org.eclipse.microprofile.rest.client.inject.RegisterRestClient;@Path(\"\
    /api/json\")@RegisterRestClient()public interface WorldClockApi { static final\
    \ String BASE_URL = \"http://worldclockapi.com/api/json\"; ...\n```\n"
- fmt: "# MicroProfile Config integration\n\nFor CDI-defined interfaces, it is possible\
    \ to use MicroProfile Config properties to define additional behaviors that are\
    \ available via the `RestClientBuilder` API. Given our `io.pckt.restc.contract.WorldClockApi`\
    \ interface, the following MicroProfile Config properties are available to control\
    \ the generated proxy behavior:\n\n- `io.pckt.restc.contract.WorldClockApi/mp-rest/url`:\
    \ The base URL to use for this service, the equivalent of the `RestClientBuilder#baseUrl`\
    \ method.\n- `io.pckt.restc.contract.WorldClockApi/mp-rest/scope`: The fully qualified\
    \ class name to a CDI scope to use for injection; it defaults to `javax.enterprise.context.Dependent`.\n\
    - `io.pckt.restc.contract.WorldClockApi/mp-rest/providers`: A comma-separated\
    \ list of fully qualified provider class names to include in the client, the equivalent\
    \ of the `RestClientBuilder#register` method or the `@RegisterProvider` annotation.\n\
    - `io.pckt.restc.contract.WorldClockApi/mp-rest/providers/com.mycompany.MyProvider/priority`:\
    \ This will override the priority of the `com.mycompany.MyProvider` provider for\
    \ this interface.\n- `io.pckt.restc.contract.WorldClockApi/mp-rest/connectTimeout`:\
    \ The timeout specified in milliseconds to wait to connect to the remote endpoint.\n\
    - `io.pckt.restc.contract.WorldClockApi/mp-rest/readTimeout`: The timeout specified\
    \ in milliseconds to wait for a response from the remote endpoint.\n\n# Simplifying\
    \ configuration keys\n\nSince the default MP Config property names for a CDI interface\
    \ can be quite long due to the inclusion of the interface package name, the MP-RC\
    \ specification supports a way to simplify the property name prefix using the\
    \ `configKey` attribute of the `@RegisterRestClient` annotation:\n\n```\n@Path(\"\
    /api/json\")\n@RegisterRestClient(baseUri = WorldClockApi.BASE_URL, configKey\
    \ = \"worldClock\")\npublic interface WorldClockApi {\n    static final String\
    \ BASE_URL = \"http://worldclockapi.com/api/json\";\n    ...\n}\n```\n\nWith the\
    \ `worldClock` configKey, the previous list of property names simplifies to the\
    \ following:\n\n- `worldClock/mp-rest/url`\n- `worldClock/mp-rest/uri`\n- `worldClock/mp-rest/scope`\n\
    - `worldClock/mp-rest/providers`\n- `worldClock/mp-rest/providers/com.mycompany.MyProvider/priority`\n\
    - ...\n\n# Dealing with client headers\n\nLet's say you want to specify credentials\
    \ in the HTTP authorization header to a secure remote service, but you do not\
    \ want to have a string `authHeader` parameter in the client interface method.\
    \ The MP-RC `@ClientHeaderParam` annotation can be used to specify HTTP headers\
    \ that should be sent without altering the client interface method signature.\n\
    \nThe following example illustrates two uses of the `@ClientHeaderParam` annotation\
    \ to provide a `User-Agent` HTTP header in a variation of the `WorldClockApi`\
    \ interface:\n\n```\nWorldClockApiWithHeaders.java\npublic interface WorldClockApiWithHeaders\
    \ {\n    static final String BASE_URL = \"http://worldclockapi.com/api/json\"\
    ;\n\n    default String lookupUserAgent() {\n        Config config = ConfigProvider.getConfig();\n\
    \        String userAgent = config.getValue(\"WorldClockApi.userAgent\", String.class);\n\
    \        if (userAgent == null) {\n            userAgent = \"MicroProfile REST\
    \ Client 1.2\";\n        }\n        return userAgent;\n    }\n\n    @GET\n   \
    \ @Path(\"/utc/now\")\n    @Produces(MediaType.APPLICATION_JSON)\n    @ClientHeaderParam(name\
    \ = \"User-Agent\", value = \"{lookupUserAgent}\")\n    Now utc();\n\n    @GET\n\
    \    @Path(\"{tz}/now\")\n    @Produces(MediaType.APPLICATION_JSON)\n    @ClientHeaderParam(name\
    \ = \"User-Agent\", value = \"MicroProfile REST Client 1.2\")\n    Now tz(@PathParam(\"\
    tz\") String tz);\n}\n```\n\nIt is also possible to add or propagate headers in\
    \ bulk using a `ClientHeadersFactory` implementation:\n\n```\npackage org.eclipse.microprofile.rest.client.ext;\n\
    \npublic interface ClientHeadersFactory {\n    MultivaluedMap<String, String>\
    \ update(\n        MultivaluedMap<String, String> incomingHeaders,\n        MultivaluedMap<String,\
    \ String> clientOutgoingHeaders);\n}\n```\n\nIn the preceding code snippet, the\
    \ `incomingHeaders` and `clientOutgoingHeaders` parameters are used as follows:\n\
    \n- `incomingHeaders`: Represents the map of headers for the inbound request\n\
    - `clientOutgoingHeaders`: Represents the read-only map of header values specified\
    \ on the client interface, the union of header values from `@ClientHeaderParam`,\
    \ `@HeaderParam`, and so on\n\nThe `update` method should return a `MultivaluedMap`\
    \ that contains the headers to merge with the `clientOutgoingHeaders` map for\
    \ the complete map of headers to be sent to the outbound request. Providers such\
    \ as filters, interceptors, and message body writers could still modify the final\
    \ map of headers prior to sending the HTTP request.\n\nTo enable a `ClientHeadersFactory`,\
    \ the client interface must be annotated with the `@RegisterClientHeaders` annotation.\
    \ If this annotation specifies a value, the client implementation must invoke\
    \ an instance of the specified `ClientHeadersFactory` implementation class. If\
    \ no value is specified, then the client implementation must invoke `DefaultClientHeadersFactoryImpl`.\
    \ This default factory will propagate specified headers from the inbound JAX-RS\
    \ request to the outbound request – these headers are specified with a comma-separated\
    \ list using the MicroProfile Config property `org.eclipse.microprofile.rest.client.propagateHeaders`.\n\
    \n# Provider registration for advanced usage\n\nThe `RestClientBuilder` interface\
    \ extends the `Configurable` interface from JAX-RS, allowing a user to register\
    \ custom providers while it is being built. The behavior of the providers supported\
    \ is defined by the JAX-RS Client API specification. An MP-RC implementation will\
    \ support `ClientResponseFilter`, `ClientRequestFilter`, `MessageBodyReader`,\
    \ `MessageBodyWriter`, `ParamConverter`, `ReaderInterceptor`, and `WriterInterceptor`\
    \ from JAX-RS.\n\nFor the `ClientResponseFilter` and `ClientRequestFilter` interfaces\
    \ that have a `ClientRequestContext` parameter in their `filter` method, MP-RC\
    \ implementations add an `org.eclipse.microprofile.rest.client.invokedMethod`\
    \ property, the value of which is the `java.lang.reflect.Method` object ...\n\n\
    # Provider priority\n\nProviders may be registered via both annotations and `RestClientBuilder`.\
    \ Providers registered via a builder will take precedence over the `@RegisterProvider`\
    \ annotation. The `@RegisterProvider` annotation priority value takes precedence\
    \ over any `@javax.annotation.Priority` annotation on the class. Provider priorities\
    \ can be overridden when using the register methods on the `RestClientBuilder`\
    \ interface as it allows for priority.\n\n# Feature registration\n\nIf the type\
    \ of provider registered is a JAX-RS `Feature`, then the priority set by that\
    \ `Feature` will be part of the builder as well. Implementations maintain the\
    \ overall priority of registered providers, regardless of how they are registered.\
    \ `Feature` will be used to register additional providers at runtime, and may\
    \ be registered via `@RegisterProvider`, configuration, or via `RestClientBuilder`.\
    \ `Feature` will be executed immediately. As a result, its priority is not taken\
    \ into account (features are always executed).\n\n# Default providers\n\nMP-RC\
    \ implementations must provide a minimum set of providers, including the following:\n\
    \n- `*/json` types:\n    - JSON-P, `javax.json.JsonValue`\n    - JSON-B, `javax.json.bind`\n\
    - `*` types:\n    - `byte[]`\n    - `java.lang.String`\n    - `java.io.InputStream`\n\
    \    - `java.io.Reader`\n- `text/plain` types:\n    - `java.lang.Number` and subtypes\n\
    \    - `int`, `long`, `float` and `double`\n    - `java.lang.Character` and `char`\n\
    \    - `java.lang.Boolean` and `boolean`"
