- fmt: "# Chapter 6\n\n1. No: by default, any REST endpoint will have OpenAPI generated\
    \ for it even if none of the MP OpenAPI annotations are used.\n2. Yes: you can\
    \ choose to use as many or as few of the MP OpenAPI annotations as you wish, to\
    \ represent the REST endpoints in your microservice.\n3. The notion is that you\
    \ predefine the expected contracts of your endpoints and encapsulate these in\
    \ OpenAPI documents that can be bundled with your microservice.\n4. No: you just\
    \ need to know what the formats of the request and response are, and then you\
    \ can create your own type-safe interface.\n5. By using the `.../mp-rest/url`\
    \ MP Config setting, where `...` is either the interface name of the type-safe\
    \ interface or the `configKey` passed to the `RegisterRestClient` annotation.\n\
    6. One way is to register a `ClientHeadersFactory` implementation. Another is\
    \ to list the headers in the `org.eclipse.microprofile.rest.client.propagateHeaders`\
    \ MP-Config property.\n\n# Chapter 7\n\n1. At the time of writing, there are eight\
    \ implementations of Eclipse MicroProfile, all of which are open source. They\
    \ are Thorntail, Open Liberty, Apache TomEE, Payara Micro, Hammock, KumuluzEE,\
    \ Launcher, and Helidon. There is also Quarkus as the latest entrant.\n2. An application\
    \ server is a container for Java EE applications. An application assembler only\
    \ includes the functionality that the application needs, instead of requiring\
    \ an application server to be up and running, and commonly generates an executable\
    \ JAR. An application assembler can generate an uberjar, a self-contained runnable\
    \ JAR file, or an application jar with its runtime dependencies located in a sub-directory,\
    \ for example, an accompanying `lib` or `libs` sub-directory.\n\n# Chapter 8\n\
    \n1. We have seen many examples throughout the book and this chapter that MP-Config\
    \ settings affect both application and MP features.\n2. As long as the path you\
    \ supplied exists, you should be able to see a successful heath check with information\
    \ about that path.\n3. It shows information about the KeyCloak server. If KeyCloak\
    \ is stopped, it shows an error.\n4. It will not be found because the metric is\
    \ generated lazily on first request.\n5. TBD.\n6. For unsecured methods the behavior\
    \ should be similar. For secured methods, the Swagger-UI invocations fail.\n7.\
    \ You will see error responses.\n8. That is the encoded MP-JWT. You can use that\
    \ in a `curl` command as the `Authorization: Bearer ...` header value where you\
    \ would replace the `...` with the string found in the `Access Base64 Token` field.\n\
    \n# Chapter 9\n\n1. MicroProfile Reactive Messaging is a great option for handling\
    \ message sources via connectors, especially in situations where the source is\
    \ generating messages at a high frequency and an asynchronous approach to processing\
    \ them makes the most sense.\n2. MicroProfile Context Propagation best supports\
    \ MicroProfile Reactive Streams Operators and MicroProfile Reactive Messaging\
    \ in that it allows the propagation of context that was traditionally associated\
    \ with the current thread across various types of units of work.\n3. The current\
    \ specifications that support reactive programming are MicroProfile Reactive Streams\
    \ Operators, MicroProfile Reactive Messaging, and MicroProfile Context Propagation.\n\
    4. At the time of writing, the projects that sit ...\n\n# Chapter 10\n\n1. Eclipse\
    \ MicroProfile provide one of the best approaches to develop microservices using\
    \ enterprise Java. In turn, microservices developed using containers as their\
    \ unit of deployment provide one of the best approaches to develop highly distributed\
    \ systems in the cloud and on-premises, that is, cloud-native applications. Hence,\
    \ MicroProfile-based microservices facilitate the development of cloud-native\
    \ applications.\n2. There are two complementary aspects or components to cloud-native\
    \ application development: application services and infrastructure services. Application\
    \ services speed up the development of business logic of a cloud-native application,\
    \ and infrastructure services speed up its delivery and deployment. These two\
    \ aspects are complementary and integral to cloud-native application development.\n\
    3. Cloud-native application development is an approach to building and running\
    \ applications that takes full advantage of the cloud computing model based upon\
    \ four key tenets: a) A service-based architecture (miniservices, microservices,\
    \ SOA services, and so on); b) An API-driven approach for inter-service communication;\
    \ c) An underlying infrastructure that’s based on containers; and d) DevOps processes.\
    \ The architecture and communication aspects are related to the development concerns\
    \ of cloud-native applications, and the infrastructure and the process aspects\
    \ are related to their delivery/deployment. Eclipse MicroProfile relates to these\
    \ tenets in that it supports the implementation of microservices that can be part\
    \ of an architecture that uses containers as its underlying infrastructure, where\
    \ microservices communicate with each other using their APIs, and are developed\
    \ using DevOps processes.\n4. This is how Eclipse MicroProfile contributes to\
    \ each of the eight steps to guide your journey to cloud-native applications:\n\
    \   1. Evolve a DevOps culture and practices: \"Take advantage of new technology,\
    \ faster approaches, and tighter collaboration by embracing the principles and\
    \ cultural values of DevOps and organizing your organization around those values.\"\
    \ Although this is an organizational and process-related step, Eclipse MicroProfile,\
    \ as a specification for microservices, can be a good fit for this adaptation\
    \ of culture and process because microservices, due to its characteristics, closely\
    \ support DevOps processes.\n   2. Speed up existing applications using fast monoliths:\
    \ \"Accelerate existing applications by migrating to a modern, container-based\
    \ platform—and break up monolithic applications into microservices or miniservices\
    \ for additional efficiency gains.\" Eclipse MicroProfile can be of great help\
    \ when breaking up your monolith into microservices. As you identify bounded contexts\
    \ in your monolith, consider using Eclipse MicroProfile to implement each of the\
    \ microservices that implement the logic of each bounded context."
