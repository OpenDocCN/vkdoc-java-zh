    ## GraphQL and databases


    GraphQL is not a database technology. Instead, it is a data query and manipulation
    tool for APIs and is agnostic to any database or storage technologies. However,
    it can be used in front of any backend and is capable of aggregating data from
    multiple backend data sources with a single API.


    ## Projects in the sandbox


    The MicroProfile Project sandbox is where the community can come up with ideas
    by trying out an implementation of features and capabilities to elicit feedback,
    discussion, and evaluation from members within the community with the goal of
    deciding whether or not the idea should become a new API/specification for the
    MicroProfile project.


    The MicroProfile sandbox is located at [https://github.com/eclipse/microprofile-sandbox](https://github.com/eclipse/microprofile-sandbox).


    Past project proposals that graduated from the sandbox into official MicroProfile
    projects were GraphQL and Reactive Streams Operators. At the time of writing,
    there is only one proposal project in the sandbox, Boost.


    ### MicroProfile Boost


    At the time of writing, the MicroProfile Boost is under community evaluation in
    the MicroProfile sandbox. Boost is a Maven plugin that enhances builds for your
    MicroProfile applications.


    For more information on Boost, go to [https://github.com/eclipse/microprofile-sandbox/tree/master/proposals/boost](https://github.com/eclipse/microprofile-sandbox/tree/master/proposals/boost).


    Boost defines Maven dependencies, known as boosters, for MicroProfile APIs, for
    example `mpConfig` for MicroProfile Config, as well as for Java EE APIs. In addition,
    it defines dependencies for the runtimes that implement the different MicroProfile
    APIs, for example `openliberty`. One more Boost-defined maven dependency specified
    as a BOM (Bill-of-Material) indicates the version of the MicroProfile umbrella
    project to use for the maven build with respect to the MicroProfile APIs. The
    BOM contents are managed by the plugin. As a user of Boost, you include these
    dependencies in your `pom.xml` file to ease the build process of your MicroProfile
    application.


    ## Eclipse MicroProfile and Jakarta EE


    What is the relationship between the Eclipse Jakarta Enterprise Java project and
    the Eclipse MicroProfile project? Short answer: it remains to be seen. Long answer:
    let''s begin.


    The Eclipse MicroProfile project was initiated to address a lack of progress in
    the Java EE specifications under the Java Community Process (JCP).


    For more information on the Java Community Process, please visit `https://jcp.org/en/home/index`.


