    \ via MP-Config properties:\n\n*   `mp.jwt.verify.publickey`: This provides the\
    \ embedded key material of the public key for the MP-JWT signer, typically in\
    \ PKCS8 PEM format.\n*   `mp.jwt.verify.issuer`: This specifies the expected value\
    \ of the `iss` claim found in the JWT.\n\nAn example `microprofile-configuration.properties`\
