  raw: "# Summary\n\nIn this chapter, you have learned how Eclipse MicroProfile facilitates\
    \ cloud-native application development, regardless of whether it is a hybrid cloud\
    \ or multi-cloud application. We also discussed the relationship between microservices,\
    \ cloud-native development, and container-native development, and how microservices\
    \ running on containers are an ideal option for cloud-native development. You\
    \ also learned how Eclipse MicroProfile relates to the 12-factor app, as well\
    \ as serverless and FaaS environments.\n\nWe covered the eight steps to guide\
    \ your journey into cloud-native applications and how Eclipse MicroProfile can\
    \ help at each step. In addition, we discussed what you need to consider when\
    \ using Eclipse MicroProfile for applications that span across clouds, when to\
    \ run Eclipse MicroProfile on bare-metal machines versus VMs versus containers,\
    \ what to consider when running Eclipse MicroProfile microservices in hybrid cloud\
    \ applications, the challenges to be aware of when running Eclipse MicroProfile\
    \ OpenTracing in a multi-cloud deployment, and finally what to consider when using\
    \ Eclipse MicroProfile in a service mesh.\n\nThroughout this book, we've covered\
    \ the origins of MicroProfile, a specification for Java microservices, and the\
    \ history behind how it came into being. We introduced the open source project,\
    \ its mission, governance, benefits, how to contribute to it, and the life cycle\
    \ of its sub-projects. We then delved into each of the MicroProfile APIs/sub-projects\
    \ that make up the umbrella/platform release, as well as the sub-projects outside\
    \ the umbrella release.\n\nWe also covered the current implementations of MicroProfile\
    \ in the market, including Quarkus, and showed you how to \"quark\" a generated\
    \ MicroProfile project by the MicroProfile Starter. We discussed the Conference\
    \ Application, a community sample project that demonstrates the interoperability\
    \ of MicroProfile across different vendor implementations. We also provided code\
    \ examples throughout for reference and discussion purposes, and also provided\
    \ a fully working project with source code that implemented all the MicroProfile\
    \ APIs that you can freely access, download, compile, and reuse in your development\
    \ efforts and to get jump-started with MicroProfile. Later, we discussed the reactive\
    \ functionality offered by MicroProfile and its future developments, such as sub-projects\
    \ in the pipeline and in the MicroProfile sandbox, as well as its likely future\
