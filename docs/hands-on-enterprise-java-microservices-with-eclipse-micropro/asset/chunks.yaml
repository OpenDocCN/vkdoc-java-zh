    \ from your application\n*   Providing additional sources of configuration to\
    \ your application\n*   Providing conversion from plain configuration into application-specific\
    \ objects\n\n# Understanding Eclipse MicroProfile Config\n\nEvery application\
    \ needs some external configuration to adapt its behavior to the runtime platform\
    \ it's running on. It can range from the HTTP endpoints that the application must\
    \ connect to, or the size of some internal structures.\n\nThese configuration\
    \ parameters can also come from different sources:\n\n*   From the operating system\
