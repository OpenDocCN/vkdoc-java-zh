  trans: "\n# Helidon\n\nOracle 公司是开源 Helidon 项目的赞助商，该项目实现了 Eclipse MicroProfile 规范。Helidon\
    \ 是一组 Java 库，使开发者能够编写微服务。它利用了 Netty（一个非阻塞 I/O 客户端服务器框架）。Helidon 是一个应用程序组装器，因为它会生成应用程序\
    \ JAR。构建好应用程序 JAR 后，你可以使用以下命令执行它：\n\n```\n$ java -jar <可执行 JAR 文件>\n```\n\nHelidon\
    \ 有两种版本：SE 和 MP。Helidon SE 是所有 Helidon 库提供的函数式编程风格，它提供了一个名为 MicroFramework 的微服务框架。Helidon\
    \ MP 实现了微服务的 MicroProfile 规范，并且构建在 Helidon 库之上。虽然没有示例项目生成器工具，但 Helidon 提供了丰富且详尽的文档手册。\n\
    \nHelidon 的文档可以在 [`helidon.io/docs/latest/#/about/01_overview`](https://helidon.io/docs/latest/#/about/01_overview)\
    \ 找到。\n\nHelidon SE 提供了一个 WebServer，这是一个用于创建 Web 应用程序的异步和响应式 API。Helidon MP 提供了一个封装了\
    \ Helidon WebServer 的 MicroProfile 服务器实现。\n\n# 为当前实现生成示例代码\n\n如前几节所述，大多数 MicroProfile\
    \ 实现并不提供自己的示例项目生成器。相反，它们只提供文档。这时，MicroProfile Starter 就派上用场了！\n\nMicroProfile\
    \ Starter 由 MicroProfile 社区赞助，是一个为所有已通过 MicroProfile TCK 的 MicroProfile 实现生成 MicroProfile\
    \ 规范示例项目和源代码的工具。在第 2 章，*治理与贡献*中，我们带你了解了 MicroProfile Starter。为避免重复，我们只想指出，你可以通过下拉菜单选择\
    \ MicroProfile 版本，如下所示：...\n\n# 其他实现 MicroProfile 的项目\n\nSmallRye 是一个开源项目，它开发了任何供应商或项目都可以使用的\
    \ Eclipse MicroProfile 实现。这是一项社区工作，欢迎所有人参与并为 SmallRye 做出贡献，[`smallrye.io`](https://smallrye.io)。例如，社区最近将\
    \ Extensions for MicroProfile 项目贡献给了 SmallRye，从而通过为 Config Sources、OpenAPI、Health、JAX-RS\
    \ 和 REST Client 提供扩展来丰富其功能。\n\nExtensions for MicroProfile 项目网站是 [`www.microprofile-ext.org`](https://www.microprofile-ext.org)，其\
    \ GitHub 仓库是 [`github.com/microprofile-extensions`](https://github.com/microprofile-extensions)。\n\
    \nSmallRye 的实现已经过 Eclipse MicroProfile TCK 的测试并已通过。\n\n使用 SmallRye 的开源项目包括 Thorntail\
    \ ([`thorntail.io`](https://thorntail.io))、WildFly ([`wildfly.org`](https://wildfly.org))\
    \ 和 Quarkus ([`quarkus.io`](https://quarkus.io))。\n\n# Quarkus\n\n开源项目 Quarkus\
    \ 于 2019 年首次亮相。Quarkus 是一个 Kubernetes 原生 Java 栈，可以编译为原生机器语言或构建到 HotSpot (OpenJDK)。使用\
    \ Quarkus 时，你的应用程序消耗的内存非常少，性能出色，能够处理高吞吐量的调用，并且启动时间非常快（即，启动加上首次响应时间），这使得 Quarkus\
    \ 成为容器以及云原生和无服务器部署的绝佳运行时。Quarkus 还提供了一个扩展框架，允许对库和项目进行 *quarking*，使它们能够与 Quarkus\
    \ 无缝协作。\n\nQuarkus 的使命是将你的整个应用程序及其使用的库转换为最优化的...\n\n# 如何 quark 一个生成的 MicroProfile\
    \ 项目\n\n在我们开始介绍如何 *quark* 一个由 MicroProfile Starter 生成的 MicroProfile 项目的步骤之前，我们首先需要确保在你的环境中安装、定义并配置了\
    \ `GRAALVM_HOME`。为此，请遵循以下步骤：\n\n1.  访问 `https://github.com/oracle/graal/releases`\
    \ 并为你的操作系统下载最新版本的 GraalVM。\n\n2.  将下载的文件解压到你选择的子目录中。顺便说一下，解压会为 GraalVM 创建一个子目录，例如\
    \ `/Users/[你的主目录]/graalvm-ce-1.0.0-rc13`：\n\n```\n$ cd $HOME\n$ tar -xzf graalvm-ce-1.0.0-rc16-macos-amd64.tar.gz\n\
    ```\n\n3.  打开一个终端窗口，创建一个名为 `GRAALVM_HOME` 的环境变量，例如：\n\n```\n$ export GRAALVM_HOME=/Users/[你的主目录]/graalvm-ce-1.0.0-rc13/Contents/Home\n\
    ```\n\n现在我们已经安装了 GraalVM，我们可以继续介绍如何使用 MicroProfile Starter 来 *quark* 一个生成的 MicroProfile\
    \ 项目的步骤：\n\n1.  首先，将浏览器指向 [`start.microprofile.io`](https://start.microprofile.io)，然后选择\
    \ Thorntail 作为 MicroProfile 服务器。\n\n你也可以利用以下步骤来 *quark* 任何现有的 Java 应用程序。\n\n如果你不记得如何操作，请转到第\
    \ 2 章，*治理与贡献*，并按照 *MicroProfile Starter 快速浏览* 部分中的说明操作，直到第 5 步，此时 `demo.zip` 文件会下载到你本地的\
    \ `Downloads` 目录。\n\n2.  使用你喜欢的解压工具，展开 MicroProfile Starter 在你本地 `Downloads` 目录下生成的\
    \ `demo.zip` 文件。如果你的 `demo.zip` 文件没有自动展开，以下是执行此操作的命令（假设是 Linux；对于 Windows，请使用等效命令）：\n\
    \n```\n$ cd $HOME/Downloads\n$ unzip demo.zip\n```\n\n这将创建一个 `demo` 子目录，其下包含一个完整的目录树结构，其中包含使用\
    \ Maven 构建和运行 Thorntail 示例 MicroProfile 项目所需的所有源文件。\n\n3.  与其在 `demo` 子目录中进行更改，不如在\
    \ `demo` 子目录旁边创建第二个名为 `Qproj4MP` 的目录，如下所示：\n\n```\n$ mkdir $HOME/Downloads/Qproj4MP\n\
    ```\n\n这应该在 `Downloads` 目录中，与你现有的 `demo` 子目录同级，创建一个名为 `Qproj4MP` 的子目录。\n\n4. \
    \ 将你的目录更改为 `Qproj4MP`，并通过输入以下命令创建一个空的 Quarkus 项目：\n\n```\n$ cd $HOME/Downloads/Qproj4MP\n\
    $ mvn io.quarkus:quarkus-maven-plugin:0.12.0:create \\\n -DprojectGroupId=com.example\
    \ \\\n -DprojectArtifactId=demo \\\n -Dextensions=\"smallrye-health, smallrye-metrics,\
    \ smallrye-openapi, smallrye-fault-tolerance, smallrye-jwt, resteasy, resteasy-jsonb,\
    \ arc\"\n```\n\n5.  在 `Qproj4MP` 目录中，删除 `src` 子目录，并通过输入以下命令将其替换为 Thorntail 示例\
    \ MicroProfile 项目中的 `src` 子目录：\n\n```\n$ cd $HOME/Downloads/Qproj4MP  # 确保你在 Qproj4MP\
    \ 子目录中\n$ rm -rf ./src\n$ cp -pR $HOME/Downloads/demo/src .\n```\n\n6.  Quarkus\
    \ 和 Thorntail 对某些配置和 Web 应用相关文件应放置的位置有不同的期望。因此，为了让 Quarkus 满意，让我们通过输入以下命令来复制一些文件：\n\
    \n```\n$ cd $HOME/Downloads/Qproj4MP # 确保你在 Qproj4MP 子目录中\n$ mkdir src/main/resources/META-INF/resources\n\
    $ cp /Users/csaavedr/Downloads/demo/src/main/webapp/index.html src/main/resources/META-INF/resources\n\
    $ cp -p src/main/resources/META-INF/microprofile-config.properties src/main/resources/application.properties\n\
    ```\n\n我们本可以将这些文件从其原始位置移动过来，但在此示例中我们选择只复制它们。\n"
- fmt: "7.  The Thorntail sample MicroProfile project that was generated by MicroProfile\
    \ Starter and whose `src` sub-directory contents you copied to `Qproj4MP` uses\
    \ a security library called `bouncycastle`. The reason for this is that the generated\
    \ code includes an example for the MicroProfile JWT Propagation specification,\
    \ which allows you propagate security across microservices. Because of this, we\
    \ also need to add two more dependencies to the Quarkus project POM file, one\
    \ for `bouncycastle` and one for `nimbusds`.\n\nThe `bouncycastle` dependency\
    \ will be removed from the Thorntail server code generation in the next sprint\
    \ release of MicroProfile Starter.\n\nTo add these dependencies, edit the `pom.xml`\
    \ file under your `$HOME/Downloads/Qproj4MP` directory and, in the section for\
    \ `<dependencies>`, enter the following code block:\n\n```\n<dependency>\n <groupId>org.bouncycastle</groupId>\n\
    \ <artifactId>bcpkix-jdk15on</artifactId>\n <version>1.53</version>\n <scope>test</scope>\n\
    </dependency>\n<dependency>\n <groupId>com.nimbusds</groupId>\n <artifactId>nimbus-jose-jwt</artifactId>\n\
    \ <version>6.7</version>\n <scope>test</scope>\n</dependency>\n```\n\nWe are now\
    \ ready to compile the quarked MicroProfile project.\n\n8.  In addition to supporting\
    \ building a Java project to run on OpenJDK, Quarkus supports compiling a Java\
    \ project all the way down to machine code. Enter the following command to compile\
    \ the quarked sample project to native code:\n\n```\n$ cd $HOME/Downloads/Qproj4MP\
    \ # ensuring you are in the Qproj4MP sub-directory\n$ ./mvnw package -Pnative\n\
    ```\n\n9.  To run the application, enter the following command:\n\n```\n$ ./target/demo-1.0-SNAPSHOT-runner\n\
    ```\n\nTo test the application, please follow the instructions listed in [Chapter\
    \ 2](#0f9d569f-1ffb-4662-8cea-c8b230a4d627.xhtml), *Governance and Contributions*,\
    \ in the *Quick tour of MicroProfile Starter* section, starting at step 10.\n\n\
    10.  If you'd like to run the quarked project in development mode, first stop\
    \ the running process and then enter the following commands:\n\n```\n$ cd $HOME/Downloads/Qproj4MP\
    \ # ensuring you are in the Qproj4MP sub-directory\n$ ./mvnw compile quarkus:dev\n\
    ```\n\nAt this point, you can open up the project with an IDE of your choice,\
    \ such as Visual Studio Code or Eclipse IDE, and start making changes to the source\
    \ code. Quarkus supports hot reloads, meaning that, as soon as you make any changes\
    \ to the source code, Quarkus rebuilds and redeploys your application in the background\
    \ so that you can immediately see and test the effect of the changes. In addition,\
    \ if you make a syntactical mistake in your source code, Quarkus will propagate\
    \ meaningful error messages to the web app to help you fix your errors, making\
    \ you more productive.\n\n11.  If you'd like to generate an executable application\
    \ JAR, enter the following commands:\n\n```\n$ cd $HOME/Downloads/Qproj4MP # ensuring\
    \ you are in the Qproj4MP sub-directory\n$ ./mvn clean package\n```\n\n12.  To\
    \ run the executable application JAR, enter the following command:\n\n```\n$ java\
    \ -jar target/demo-1.0-SNAPSHOT-runner.jar\n```\n\nA `lib` directory is created\
    \ alongside the application JAR with the library files it needs to run.\n\nWe\
    \ have shown you the steps to *quark* a MicroProfile project generated by MicroProfile\
    \ Starter. Although these steps apply to a specific generated project, you could\
    \ use the same instructions to *quark* an existing Java application or microservice\
    \ so that you can take advantage of the benefits that Quarkus provides, such as\
    \ low memory consumption, fast start up time, and native compilation of your Java\
    \ code so that you can run it efficiently in containers, the cloud, and Function-as-a-Service\
    \ environments. No matter which implementation of MicroProfile you are using,\
    \ a big benefit that MicroProfile provides to end users is interoperability. This\
    \ means that you can design an application with microservices that use different\
    \ implementations of MicroProfile, which is the topic of the following section.\n\
    \n## MicroProfile interoperability – the conference application\n\nThe **Conference\
    \ Application**, first presented ([https://www.youtube.com/watch?v=iG-XvoIfKtg](https://www.youtube.com/watch?v=iG-XvoIfKtg))\
    \ during Devoxx Belgium in November 2016, is a MicroProfile demo that showcases\
    \ the integration and interoperability of different MicroProfile vendor implementations.\
    \ This is important because it demonstrates the separation between implementation\
    \ and interfaces of the specification, which provides a platform that allows vendors\
    \ to develop and provide their own implementation that could coexist side by side\
    \ with other competing implementations. The common interfaces across all implementations\
    \ also provided end users with the benefit of flexibility and choice to use whichever\
    \ MicroProfile implementation(s) ...\n\n## Summary\n\nIn this chapter, we have\
    \ learned about the open source MicroProfile implementations that currently exist\
    \ on the market, what types of implementation they are, how to get more information\
    \ about each of them, and how to generate sample code for these implementations\
    \ using MicroProfile Starter. We have also covered the latest MicroProfile implementation\
    \ entrant, Quarkus, which introduces significant improvements to Java in start\
    \ up time and memory consumption in interpreted and compiled modes, improving\
    \ MicroProfile for cloud-native microservices and serverless environments even\
    \ more. You also learned about The Conference Application, which demonstrates\
    \ the interoperability of MicroProfile across different implementations.\n\nAs\
    \ a consumer of Eclipse MicroProfile and its nature of being interoperable across\
    \ implementations, you have the freedom to select the implementation that makes\
    \ the most sense to your organization or is the best fit for your environment,\
    \ ultimately giving you the option to choose the right tool for the right task.\
    \ Moreover, you don't need to be stuck with a single vendor for a commercially\
    \ supported version of Eclipse MicroProfile, and, as a result of this, you have\
    \ the advantage to negotiate on your terms and select from a rich set of MicroProfile\
    \ features offered by different vendors.\n\nIn the next chapter, we will cover\
    \ a full code sample for the entire set of MicroProfile APIs.\n\n## Questions\n\
    \n1.  At present, how many implementations of MicroProfile exist in the market?\
    \ List them.\n2.  What is the difference between an application server and an\
    \ application assembler?\n3.  Describe each of the eight implementations of MicroProfile\
    \ that exist in the market.\n4.  What is Quarkus?\n5.  What is compile-time boot?\n\
    6.  What types of deployment is Quarkus a great runtime for?\n7.  What is the\
    \ Quarkus extension framework?\n8.  What is the key benefit that The Conference\
    \ Application demonstrates?\n\n## Section 4: A Working MicroProfile Example\n\n\
    This section goes over an application that showcases MicroProfile.\n\nThis section\
    \ contains the following chapter:\n\n*   [Chapter 8](#5535a9c6-c887-40a5-95cd-c8b51ef75bf1.xhtml),\
    \ *A Working Eclipse MicroProfile Code Sample*\n\n## A Working Eclipse MicroProfile\
    \ Code Sample\n\nIn this chapter, we will discuss a sample application that makes\
    \ use of the various MicroProfile features introduced earlier in this book. The\
    \ MicroProfile runtime we will use in this chapter is the Quarkus runtime, a Kubernetes-native\
    \ Java stack tailored for GraalVM and OpenJDK HotSpot, crafted from best of breed\
    \ Java libraries and standards. Key topics that we will cover include the following:\n\
    \n*   Use of configuration for both application and MicroProfile container behaviors\n\
    *   Realistic health checks\n*   Securing an application with an external JWT\
    \ security provider\n*   Integrating and viewing trace information with a Jaeger\
    \ instance\n*   Inspecting microservice endpoint information using Swagger\n*\
    \   Viewing individual ..."
