- fmt: "# Challenges when using MicroProfile OpenTracing in a multi-cloud deployment\n\
    \nDistributed tracing in a multi-cloud environment can be challenging. We want\
    \ to fulfill the same objective that we would with a single cloud environment,\
    \ that is, to visualize the single end-to-end trace associated with a request\
    \ as it passes through services within and across each cloud, but may face complications\
    \ when dealing with different context propagation formats and storage of the tracing\
    \ data in different formats per cloud.\n\nThe first challenge is to ensure that\
    \ a trace continues across different cloud environments. This is a problem because,\
    \ at the time of writing this book, there is not a widely adopted or standardized\
    \ trace context format. Usually, each tracing system uses different headers and\
    \ formats to propagate the tracing context. For instance, Zipkin uses B3 propagation,\
    \ Jaeger uses a `ber-trace-id` header, Amazon X-Ray uses `X-Amzn-Trace-Id`, and\
    \ Google uses `X-Cloud-Trace-Context`. Therefore, if a request has to be traced\
    \ across heterogenous tracing systems, each time it leaves or enters a different\
    \ environment, the trace context has to be converted. This can usually be done\
    \ by configuring a tracer with a custom injector or extractor implementation.\
    \ However, this is currently beyond the scope of the MicroProfile OpenTracing\
    \ project. In the future, the trace context format might be standardized under\
    \ the W3C Trace Context project ([https://www.w3.org/TR/trace-context/](https://www.w3.org/TR/trace-context/)).\n\
    \nThe second challenge, even in a homogenous tracing environment, is to visualize\
    \ tracing data from multi-cloud environments. This can be problematic because\
    \ tracing data in each cloud might be stored in different databases or in different\
    \ formats. This can be overcome by replicating the data to a single unified storage\
    \ or sending missing tracing data between systems on-demand with the appropriate\
    \ data format adjustments.\n\nNext, we will discuss the challenges of using Eclipse\
    \ MicroProfile in a service mesh, such as Istio.\n\n# Considerations when using\
    \ Eclipse MicroProfile in a service mesh\n\nService meshes such as Istio or LinkerD\
    \ offer services at the platform level on top of Kubernetes in the areas of discovery,\
    \ routing, and fault tolerance. Some of those services can also be found in MicroProfile.\
    \ When you deploy a MicroProfile application into such a service mesh, you need\
    \ to consider whether you want to use the version from MicroProfile or the one\
    \ from the mesh.\n\nThe MicroProfile feature that is most likely affected here\
    \ is fault tolerance, especially the retry logic.\n\n## Retry\n\n`Retry` in fault\
    \ tolerance lets you retry a request to another service in case the first request\
    \ fails (see [Chapter 3](#73f2287d-1676-47c9-9887-cf74aa0aa6f0.xhtml), *MicroProfile\
    \ Config and Fault Tolerance*, for more information). Now, consider that you have\
    \ the following code:\n\n```\n@Retry (maxRetries = 3)\nvoid aMethod() {\n    callBackend();\n\
    }\n```\n\nAlthough this tells Istio to retry 5 times, you may end up with 15 retries\
    \ (Istio will retry 5 times for each of the 3 retries in your code before it returns\
    \ an error) before `aMethod` finally ends with an error. You may consider turning\
    \ off the retries in code, as changes to the number of retries in Istio can be\
    \ made on the fly without the need to restart a pod.\n\n## Fallback\n\nOn the\
    \ other hand, Istio does not have a fallback policy for when all the retries fail\
    \ – it is not possible to have Istio call another version of your workload. When\
    \ you annotate the preceding code with the `@Fallback` annotation, it is possible\
    \ to execute another action in case the original call fails:\n\n```\n@Fallback(fallbackMethod\
    \ = \"fallbackForA\")\n@Retry (maxRetries = 3)\nString aMethod() {\n    callBackend();\n\
    }\nvoid String fallbackForA() {\n    return \"A cached string\";\n}\n```\n\nIn\
    \ this case, the `fallbackForA` fallback method will be called once all the retries\
    \ from Istio, times those from MicroProfile, have been exhausted. If you remove\
    \ the `@Retry` annotation from the preceding example, the fallback method is called\
    \ when the Istio retries have been exhausted.\n\n## Fault injection in the service\
    \ mesh\n\nIstio lets you inject faults into the results pretty easily. This sounds\
    \ counterproductive at the start, but can be a very nice way of testing that you\
    \ get the fault tolerance handling right. The following `VirtualService` for Istio\
    \ defines such fault injection:\n\n```\napiVersion: networking.istio.io/v1alpha3\n\
    kind: VirtualService\nmetadata:\n  name: fault-injection-service\nspec:\n  hosts:\n\
    \  - myTarget\n  http:\n  - route:\n    - destination:\n      host: myTarget\n\
    \    fault:\n      abort:\n        httpStatus: 404\n        percent: 20\n    \
    \ delay:\n       percent: 50\n       fixedDelay: 200ms\n```\n\nIstio will hear\
    \ for calls to the destination host, `myTarget`, and send a 404 response for 20%\
    \ of the calls instead of the real response code. On top of this, it will delay\
    \ every other response by 200 milliseconds.\n\n# Conclusion\n\nMicroProfile defines\
    \ primitives in the area of fault tolerance that can also be provided by other\
    \ means, such as in a service mesh. If this is the case for you, you have to consider\
    \ which one to activate. Activating both may result in unexpected behavior."
