    \ = \"http://worldclockapi.com/api/json\";\n    @GET\n    @Path(\"/utc/now\")\n\
    \    @Produces(MediaType.APPLICATION_JSON)\n    CompletionStage<Now> utc();\n\
    \    @GET\n    @Path(\"{tz}/now\")\n    @Produces(MediaType.APPLICATION_JSON)\n\
    \    ...\n}\n```\n\n# Summary\n\nIn this chapter, we have learned about two Eclipse\
    \ MicroProfile specifications, namely, Eclipse MicroProfile OpenAPI and Eclipse\
    \ MicroProfile REST Client. The former provides a specification for generating\
    \ OpenAPI-compliant documentation for your microservices, and the latter supplies\
    \ a specification for calling REST endpoints in a type-safe manner. In this chapter,\
    \ we covered the specific capabilities of these specifications, provided some\
    \ example code, and supplied pointers on how to get further information about\
    \ these specifications. You have learned the features and capabilities of the\
    \ Eclipse MicroProfile OpenAPI and Eclipse MicroProfile REST Client specifications,\
    \ how to use their annotations and programmatic interfaces, and how you could\
    \ incorporate them into your applications.\n\nIn the next chapter, we will discuss\
    \ and delve into the open source implementations of Eclipse MicroProfile that\
    \ currently exist on the market.\n\n# Questions\n\n1. Do you need to do anything\
    \ to get information supplied to the `/openapi` endpoint?\n2. Can I enhance OpenAPI\
    \ output with just one or two extra annotations?\n3. What is the point of using\
    \ static OpenAPI files?\n4. Do I need the REST endpoint microservice I want to\
    \ use to provide the MP-REST interface?\n5. How do you externalize the base URL\
    \ for a type-safe interface?\n6. What if I need to propagate incoming request\
    \ headers?\n\n# Section 3: MicroProfile Implementations and Roadmap\n\nThis section\
    \ goes over the current market implementations and a possible roadmap for future\
    \ projects.\n\nThis section contains the following chapter:\n\n* [Chapter 7](#e38ec16e-cd38-411c-8a81-18932cdfb4d3.xhtml),\
    \ *MicroProfile Implementations, Quarkus, and Interoperability via the Conference\
    \ Application*\n\n# MicroProfile Implementations, Quarkus, and Interoperability\
    \ via the Conference Application\n\nOne of the benefits of Eclipse MicroProfile\
    \ is that it provides a specification that allows many implementations to be interoperable\
    \ with each other. This benefit has encouraged many vendors and community groups\
    \ to implement the Eclipse MicroProfile specification as open source implementations.\
    \ There are currently eight implementations of Eclipse MicroProfile in the market,\
    \ with a ninth entrant, Quarkus.\n\nThe following topics will be covered in this\
    \ chapter:\n\n* A description of the eight implementations of Eclipse MicroProfile\
    \ and how to find further information on each\n* How to generate Eclipse MicroProfile\
    \ sample code for each of these implementations ...\n\n# Current MicroProfile\
    \ implementations\n\nAt the time of writing, there are eight implementations of\
    \ Eclipse MicroProfile, all of which are open source. Here is a table of these\
    \ implementations:\n\n| **Open source project basis** | **Project location** |\
    \ **Supporting vendor** |\n| Thorntail ([http://thorntail.io/](http://thorntail.io/))\
    \ | [https://github.com/thorntail/thorntail](https://github.com/thorntail/thorntail)\
