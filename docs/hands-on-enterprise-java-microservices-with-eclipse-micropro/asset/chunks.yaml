  raw: '# Exception mapping


    MP-RC provides support for mapping an invocation response into an exception via
    the `org.eclipse.microprofile.rest.client.ext.ResponseExceptionMapper` interface:


    ```

    import javax.annotation.Priority;import javax.ws.rs.Priorities;import javax.ws.rs.core.MultivaluedMap;import
    javax.ws.rs.core.Response;import java.util.Optional;public interface ResponseExceptionMapper<T
    extends Throwable> {    int DEFAULT_PRIORITY = Priorities.USER;    T toThrowable(Response
    response);    default boolean handles(int status, MultivaluedMap<String, Object>
    headers) {        return status >= 400;    }    default int getPriority() {        return
    Optional.ofNullable(getClass().getAnnotation(Priority.class))            .map(Priority::value)            .orElse(DEFAULT_PRIORITY);    }}

    ```


    Consider the following ...


    # Default exception mapping


    Each implementation provides a default `ResponseExceptionMapper` implementation
    that will map and invoke a response to `javax.ws.rs.WebApplicationException` when
    the response status code is >= 400\. It has a priority of `Integer.MAX_VALUE`,
    and is meant to be used as a fallback whenever an error is encountered. This mapper
    will be registered by default to all client interfaces, but this can be disabled
    by setting an MP Config property, `microprofile.rest.client.disable.default.mapper`,
    to `true`. It can also be disabled on a per-client basis by using the same property
    when building the client:


    ```

    RestClientBuilder.newBuilder().property("microprofile.rest.client.disable.default.mapper",true)

    ```


    # Async support


    MP-RC supports asynchronous method invocations. A client interface method is asynchronous
    when the return type of the method is of the `java.util.concurrent.CompletionStage<?>`
    type. An alternative version, called `WorldClockApiAsync.java`, of the `WorldClockApi`
    interface that declares an asynchronous method is as follows:


    ```

    import java.util.concurrent.CompletionStage;import javax.ws.rs.GET;import javax.ws.rs.Path;import
    javax.ws.rs.PathParam;import javax.ws.rs.Produces;import javax.ws.rs.core.MediaType;@Path("/api/json")public
    interface WorldClockApiAsync { String BASE_URL = "http://worldclockapi.com/api/json";
    @GET @Path("/utc/now") @Produces(MediaType.APPLICATION_JSON) CompletionStage<Now>
    utc(); @GET @Path("{tz}/now") @Produces(MediaType.APPLICATION_JSON) ...

    ```


    # Summary


    In this chapter, we have learned about two Eclipse MicroProfile specifications,
    namely, Eclipse MicroProfile OpenAPI and Eclipse MicroProfile REST Client. The
    former provides a specification for generating OpenAPI-compliant documentation
    for your microservices, and the latter supplies a specification for calling REST
    endpoints in a type-safe manner. In this chapter, we covered the specific capabilities
    of these specifications, provided some example code, and supplied pointers on
    how to get further information about these specifications. You have learned the
    features and capabilities of the Eclipse MicroProfile OpenAPI and Eclipse MicroProfile
    REST Client specifications, how to use their annotations and programmatic interfaces,
    and how you could incorporate them into your applications.


    In the next chapter, we will discuss and delve into the open source implementations
    of Eclipse MicroProfile that currently exist on the market.


    # Questions


    1.  Do you need to do anything to get information supplied to the `/openapi` endpoint?

    2.  Can I enhance OpenAPI output with just one or two extra annotations?

    3.  What is the point of using static OpenAPI files?

    4.  Do I need the REST endpoint microservice I want to use to provide the MP-REST
    interface?

    5.  How do you externalize the base URL for a type-safe interface?

    6.  What if I need to propagate incoming request headers?


    # Section 3: MicroProfile Implementations and Roadmap


    This section goes over the current market implementations and a possible roadmap
    for future projects.


    This section contains the following chapter:


    *   [Chapter 7](#e38ec16e-cd38-411c-8a81-18932cdfb4d3.xhtml), *MicroProfile Implementations,
    Quarkus, and Interoperability via the Conference Application*


    # MicroProfile Implementations, Quarkus, and Interoperability via the Conference
    Application


    One of the benefits of Eclipse MicroProfile is that it provides a specification
    that allows many implementations to be interoperable with each other. This benefit
    has encouraged many vendors and community groups to implement the Eclipse MicroProfile specification
    as open source implementations. There are currently eight implementations of Eclipse
    MicroProfile in the market, with a ninth entrant, Quarkus.


    The following topics will be covered in this chapter:


    *   A description of the eight implementations of Eclipse MicroProfile and how
    to find further information on each

    *   How to generate Eclipse MicroProfile sample code for each of these implementations
    ...


    # Current MicroProfile implementations


    At the time of writing, there are eight implementations of Eclipse MicroProfile,
    all of which are open source. Here is a table of these implementations:


    | **Open source project basis** | **Project location** | **Supporting vendor**
    |

    | Thorntail ([http://thorntail.io/](http://thorntail.io/)) | [https://github.com/thorntail/thorntail](https://github.com/thorntail/thorntail)
    | Red Hat |

    | Open Liberty ([https://openliberty.io/](https://openliberty.io/)) | [https://github.com/openliberty](https://github.com/openliberty)
    | IBM |

    | Apache TomEE ([http://tomee.apache.org/](http://tomee.apache.org/)) | [https://github.com/apache/tomee](https://github.com/apache/tomee)
    | Tomitribe |

    | Payara Micro ([https://www.payara.fish/payara_micro](https://www.payara.fish/payara_micro))
    | [https://github.com/payara/Payara](https://github.com/payara/Payara) | Payara
    Services Ltd. |

    | Hammock ([https://hammock-project.github.io/](https://hammock-project.github.io/))
    | [https://github.com/hammock-project](https://github.com/hammock-project) | Hammock
    |

    | KumuluzEE ([https://ee.kumuluz.com/](https://ee.kumuluz.com/)) | [https://github.com/kumuluz](https://github.com/kumuluz)
    | KumuluzEE |

    | Launcher ([https://github.com/fujitsu/launcher](https://github.com/fujitsu/launcher))
    | [https://github.com/fujitsu/launcher](https://github.com/fujitsu/launcher) |
    Fujitsu |

    | Helidon ([https://helidon.io/#](https://helidon.io/#)) | [https://github.com/oracle/helidon](https://github.com/oracle/helidon)
    | Oracle |


    Some of these implementations are based on *application servers*, such as Payara
    and Open Liberty, while others are based on *application assemblers* that include
    only the functionality that the application needs, instead of requiring an application
    server to be up and running, and commonly generate an executable JAR. However,
    the implementations based on application servers are also capable of producing
    executable JAR as well.


    An application assembler can generate an *uberjar*, a self-contained runnable
    JAR file, or an *application jar* with its runtime dependencies located in a subdirectory,
    for example, an accompanying `lib` or `libs` subdirectory.


    Eclipse MicroProfile implementations that pass the MicroProfile **Test Compatibility
    Kit** (**TCK**) for the entire umbrella release, or a specific version of a MicroProfile
    API are listed at [https://wiki.eclipse.org/MicroProfile/Implementation](https://wiki.eclipse.org/MicroProfile/Implementation).
    At the moment, inclusion in this list uses the honor system because it does not
    require proof of the TCK results; it just requires that the publishers assert
    that their implementation has passed the TCK.


    The project also has a site where organizations/groups can self-include in the
    list of production deployments of MicroProfile. This list can be found at [https://wiki.eclipse.org/MicroProfile/Adoptions](https://wiki.eclipse.org/MicroProfile/Adoptions).


    In the next sections, we provide brief descriptions of these implementations and
    how to get more information on each of them.'
