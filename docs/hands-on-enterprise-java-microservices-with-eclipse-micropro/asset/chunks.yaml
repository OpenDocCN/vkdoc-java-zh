  trans: "\n# 注入 JsonWebToken 信息\n\n以下代码示例演示了如何将传入的 MP-JWT 令牌作为 `JsonWebToken` 进行访问、获取原始\
    \ JWT 令牌字符串、`upn` 声明，以及与 JAX-RS `SecurityContext` 的集成：\n\n```\npackage io.pckt.jwt.rest;import\
    \ javax.annotation.security.DenyAll;import javax.annotation.security.PermitAll;import\
    \ javax.annotation.security.RolesAllowed;import javax.inject.Inject;import javax.ws.rs.GET;import\
    \ javax.ws.rs.Path;import javax.ws.rs.Produces;import javax.ws.rs.core.Context;import\
    \ javax.ws.rs.core.MediaType;import javax.ws.rs.core.SecurityContext;import org.eclipse.microprofile.jwt.Claim;import\
    \ org.eclipse.microprofile.jwt.Claims;import org.eclipse.microprofile.jwt.JsonWebToken;@Path(\"\
    /jwt\")@DenyAll //1public class ...\n```\n\n# 注入 JWT 声明值\n\n本节中的代码片段演示了如何注入单个\
    \ JWT 声明值。对于注入的值，我们可以使用几种不同的格式。标准声明支持 `Claim#getType` 字段和 `JsonValue` 子类型中定义的对象子类型。自定义声明类型仅支持注入\
    \ `JsonValue` 子类型。\n\n以下代码示例演示了如何注入标准的 `groups` 和 `iss` 声明，以及 `customString`、`customInteger`、`customDouble`\
    \ 和 `customObject` 自定义声明：\n\n```\npackage io.pckt.jwt.rest;\n\nimport java.util.Set;\n\
    import javax.annotation.security.DenyAll;\nimport javax.annotation.security.RolesAllowed;\n\
    import javax.inject.Inject;\nimport javax.json.JsonArray;\nimport javax.json.JsonNumber;\n\
    import javax.json.JsonObject;\nimport javax.json.JsonString;\nimport javax.ws.rs.GET;\n\
    import javax.ws.rs.Path;\n\nimport org.eclipse.microprofile.jwt.Claim;\nimport\
    \ org.eclipse.microprofile.jwt.Claims;\n\n@Path(\"/jwt\")\n@DenyAll\npublic class\
    \ InjectionExampleEndpoint {\n    @Inject\n    @Claim(standard = Claims.groups)\n\
    \    Set<String> rolesSet; // 1\n    @Inject\n    @Claim(standard = Claims.iss)\n\
    \    String issuer; // 2\n\n    @Inject\n    @Claim(standard = Claims.groups)\n\
    \    JsonArray rolesAsJson; // 3\n    @Inject\n    @Claim(standard = Claims.iss)\n\
    \    JsonString issuerAsJson; // 4\n    // 作为 JsonValue 类型的自定义声明\n    @Inject\n\
    \    @Claim(\"customString\")\n    JsonString customString; // 5\n    @Inject\n\
    \    @Claim(\"customInteger\")\n    JsonNumber customInteger; // 6\n    @Inject\n\
    \    @Claim(\"customDouble\")\n    JsonNumber customDouble; // 7\n    @Inject\n\
    \    @Claim(\"customObject\")\n    JsonObject customObject; // 8\n\n    @GET\n\
    \    @Path(\"/printClaims\")\n    @RolesAllowed(\"Tester\")\n    public String\
    \ printClaims() {\n        return String.format(\"rolesSet=%s\\n\");\n    }\n\
    }\n```\n\n这八处带注释的注入如下所示：\n\n1.  将标准 `groups` 声明作为其默认的 `Set<String>` 类型注入\n2. \
    \ 将标准 `iss` 声明作为其默认的 String 类型注入\n3.  将标准 `groups` 声明作为其默认的 `JsonArray` 类型注入\n\
    4.  将标准 `iss` 声明作为其默认的 `JsonString` 类型注入\n5.  将非标准 `customString` 声明作为 `JsonString`\
    \ 类型注入\n6.  将非标准 `customInteger` 声明作为 `JsonNumber` 类型注入\n7.  将非标准 `customDouble`\
    \ 声明作为 `JsonNumber` 类型注入\n8.  将非标准 `customObject` 声明作为 `JsonString` 类型注入\n\n#\
    \ 配置 JWT 的身份验证\n\n要接受 JWT 作为应被认证并因此受信任的身份标识，我们需要配置 MP-JWT 功能，提供用于验证 JWT 签名者和签发者的信息。这通过\
    \ MP-Config 属性完成：\n\n*   `mp.jwt.verify.publickey`：提供 MP-JWT 签名者公钥的内嵌密钥材料，通常采用\
    \ PKCS8 PEM 格式。\n*   `mp.jwt.verify.issuer`：指定 JWT 中 `iss` 声明的预期值。\n\n本书的一个示例\
    \ `microprofile-configuration.properties` 文件如下：\n\n```\n# MP-JWT Configmp.jwt.verify.\
    \ ...\n```\n"
- fmt: "# Running the samples\n\nThe samples we looked at can be deployed to Thorntail\
    \ and accessed via command-line queries against the endpoints to validate the\
    \ expected behaviors. Since authentication against the endpoints marked with security\
    \ constraints requires a valid JWT, we need a way to generate a JWT that will\
    \ be accepted by the Thorntail server.\n\nThis chapter's code provides an `io.packt.jwt.test.GenerateToken`\
    \ utility that will create a JWT signed by a key that has been configured with\
    \ the Thorntail server. The claims included in the JWT are defined by the `src/test/resources/JwtClaims.json`\
    \ document of this chapter's project. You run the utility using the `mvn exec:java`\
    \ command, as shown here:\n\n```\nScotts-iMacPro:jwtprop starksm$ mvn exec:java\
    \ -Dexec.mainClass=io.packt.jwt.test.GenerateToken -Dexec.classpathScope=test\n\
