    [INFO] Total time:  1.352 s\n[INFO] Finished at: 2019-04-19T08:35:12-07:00\n[INFO]\
    \ ------------------------------------------------------------------------\nScotts-iMacPro:jwtprop\
    \ starksm$ JWT=\"eyJraWQiOi...\"\nScotts-iMacPro:jwtprop starksm$ curl -H \"Authorization:\
    \ Bearer $JWT\" http://localhost:8080/jwt/secureHello; echo\nHello[secure] user=jdoe@example.com,\
    \ upn=jdoe@example.com, scheme=MP-JWT, isUserRole=true\n```\n\nIn the previous\
    \ code snippet, for Windows users, please install a bash-compatible shell for\
    \ Windows; otherwise, you will get an error due to the `echo` command.\n\nThis\
    \ time, the query succeeds and we see that the username, `upn` claim value, scheme,\
    \ and `isUserInRole(\"User\")` check are as expected.\n\nNow, try accessing the\
    \ `/jwt/printClaims` endpoint that illustrated the injection of standard and non-standard\
    \ claims as different types:\n\n```shell\nScotts-iMacPro:jwtprop starksm$ curl\
    \ -H \"Authorization: Bearer $JWT\" http://localhost:8080/jwt/printClaims\n+++\
    \ Standard claims as primitive types\nrolesSet=[Echoer, Tester, User, group2,\
    \ group1]\nissuer=http://io.packt.jwt\n+++ Standard claims as JSON types\nrolesAsJson=[\"\
    Echoer\",\"Tester\",\"User\",\"group2\",\"group1\"]\nissuerAsJson=\"http://io.packt.jwt\"\
    \n+++ Custom claim JSON types\ncustomString=\"customStringValue\"\ncustomInteger=123456789\n\
    customDouble=3.141592653589793\ncustomObject={\"my-service\":{\"roles\":[\"role-in-my-service\"\
    ],\"groups\":[\"group1\",\"group2\"]},\"service-B\":{\"roles\":[\"role-in-B\"\
