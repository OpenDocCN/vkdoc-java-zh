    \nAdditionally, you can use a filter to update the OpenAPI model after it has\
    \ been built.\n\n# MicroProfile OpenAPI annotations\n\nProbably the most common\
    \ source of OpenAPI information is the set of annotations that make up the definition\
    \ of a standard JAX-RS application. These annotations, along with additional (optional)\
    \ annotations defined by the MicroProfile OpenAPI specification, can be scanned\
    \ and processed by the MicroProfile platform to produce an OpenAPI document.\n\
    \nThe MP OpenAPI specification requires the generation of a valid OpenAPI document\
    \ from pure JAX-RS 2.0 applications. If you are new to OpenAPI, you can simply\
    \ deploy your existing JAX-RS application to a MicroProfile OpenAPI runtime and\
    \ check out the output from `/openapi`.\n\nTo fill out additional details of the\
    \ generated OpenAPI document, you may further annotate your ...\n\n# Usage examples\n\
    \nSome usage examples of MicroProfile OpenAPI annotations are as follows:\n\n\
    Example 1 – Simple operation description (abbreviated):\n\n```\n@GET\n@Path(\"\
    /findByMake\")\n@Operation(summary = \"Finds cars by make\",\n           description\
    \ = \"Find cars by their manufacturer\")\npublic Response findCarsByMake(...)\n\
    { ... }\n```\n\nThe following is the output for example 1:\n\n```\n/car/findByMake:\n\
    \  get:\n    summary: Finds cars by make\n    description: Find cars by their\
    \ manufacturer\n```\n\nExample 2 – Operation with different responses (abbreviated):\n\
    \n```\n@GET\n@Path(\"/{name}\")\n@Operation(summary = \"Get customer by name\"\
    )\n  @APIResponse(description = \"The customer\",\n             content = @Content(mediaType\
    \ = \"application/json\",\n                                schema = @Schema(implementation\
    \ = Customer.class))),\n@APIResponse(responseCode = \"400\", description = \"\
    Customer not found\")\npublic Response getCustomerByName(\n        @Parameter(description\
    \ = \"The name of the customer to be fetched\", required = true) @PathParam(\"\
    name\") String name)\n\n{...}\n```\n\nThe following is the output for example\
    \ 2:\n\n```\n/customer/{name}:\n    get:\n       summary: Get customer by name\n\
    \       operationId: getCutomerByName\n       parameters:\n       - name: name\n\
    \         in: path\n         description: 'The name of the customer to be fetched'\n\
    \         required: true\n         schema:\n           type: string\n       responses:\n\
    \         default:\n           description: The customer\n           content:\n\
    \             application/json:\n               schema:\n                 $ref:\
    \ '#/components/schemas/Customer'\n         400:\n           description: Customer\
    \ not found\n```\n\nFor more examples, please refer to the MicroProfile OpenAPI\
    \ specification wiki at [https://github.com/eclipse/microprofile-open-api/wiki](https://github.com/eclipse/microprofile-open-api/wiki)."
  trans: "\n# MicroProfile OpenAPI 与类型安全 REST 客户端\n\nEclipse MicroProfile 为 Java 微服务提供了一套丰富的规范。其中，Eclipse\
    \ MicroProfile OpenAPI 和 Eclipse MicroProfile REST Client 分别用于帮助编写微服务的 API 文档，并提供在\
    \ REST 端点上进行类型安全调用的 API。OpenAPI 简化了微服务端点的文档编写，并使这些元数据可供第三方开发者查阅。类型安全的 REST 客户端则简化了对象与\
    \ HTTP 或 JSON 之间的序列化与反序列化。\n\n本章将涵盖以下主题：\n\n*   每个规范所提供的功能\n*   部分功能的简单代码示例\n\
    *   如何获取关于每个规范的更多信息\n\n# MicroProfile OpenAPI 及其功能简介\n\n推动数字经济的移动力量促使企业需要建立全渠道的开发方法，以优化成本、提高效率并改善客户体验。这种方法的推动者是\
    \ API，它催生了 API 经济以及诸如 API 主导或 API 优先的开发实践等概念。此外，微服务架构已成为现代开发的首选架构。微服务之间基于 API（即\
    \ RESTful）的通信已被采纳为*事实上的*标准，因为它非常适合微服务的*智能端点与哑管道*、*去中心化治理*以及*去中心化数据管理*等特性。\n\n\
    然而，随着微服务架构中微服务数量的增加，其管理可能会变得棘手。不过，你可以通过微服务的 API 来管理它们。你可以将管理、安全、负载均衡和限流策略应用于微服务前端的\
    \ API。\n\nEclipse MicroProfile OpenAPI 为开发者提供了 Java 接口，用于从其 Java RESTful Web 服务（JAX-RS）应用程序生成\
    \ OpenAPI v3 文档。该规范要求，一个经过完整处理的 OpenAPI 文档必须能够通过 HTTP `GET` 操作在根 URL `/openapi`\
    \ 上获取，如下所示：\n\n```\nGET http://myHost:myPort/openapi\n```\n\n所需的协议是 `http`。然而，强烈建议规范的实现者也支持\
    \ `https` 协议，以便安全地连接到 OpenAPI 端点。\n\nOpenAPI 文档的创建有三个来源。这三个来源（将在本章后续章节中描述）如下：\n\
    \n*   通过处理应用程序中的 JAX-RS 注解（以及可选的 OpenAPI 注解）生成\n*   由应用程序通过提供一个实现 `OasModelReader`\
    \ 的 Java 类以编程方式构建\n*   包含在应用程序部署中的静态 OpenAPI 文档\n\n这三个来源（任意组合）会被合并以生成一个单一的 OpenAPI\
    \ 文档，该文档可以被过滤（通过提供一个实现 `OasFilter` 接口的 Java 类），然后通过前述的 `/openapi` 端点提供服务。\n\n\
    # 配置\n\nMicroProfile OpenAPI 规范利用 MicroProfile 配置规范来配置其参数和值。例如，为了注入配置值，MicroProfile\
    \ OpenAPI 可以使用默认和自定义的 ConfigSource。\n\n有关 ConfigSource 的更多信息，可以访问 [`github.com/eclipse/microprofile-config/blob/master/spec/src/main/asciidoc/configsources.asciidoc`](https://github.com/eclipse/microprofile-config/blob/master/spec/src/main/asciidoc/configsources.asciidoc)。\n\
    \n有许多可配置项。下表包含了其中一部分：\n\n| **配置项** | **描述** |\n| --- | --- |\n| `mp.openapi.scan.di\
    \ sable` | 用于禁用注解扫描的配置属性。默认值为 `false`。 |\n| `mp.openapi.servers` | 用于指定全局服务器列表的配置属性，这些服务器...\
    \ |\n\n# 生成 OpenAPI 文档\n\n如前所述，MicroProfile OpenAPI 规范要求从三个来源的组合中生成一个 OpenAPI\
    \ 文档。\n\n然后，你有多种选择：\n\n*   使用 MicroProfile OpenAPI 注解扩展由 JAX-RS 注解生成的 OpenAPI\
    \ 文档。\n*   利用 `/openapi` 的初始输出，将其作为开始记录 API 的参考。在这种情况下，你可以在编写任何代码之前编写静态 OpenAPI\
    \ 文件（本章后续部分将描述），这是组织锁定 API 契约的常用方法，即 API 优先的开发实践。\n*   通过使用编程模型进行编码来引导或完成 OpenAPI\
    \ 模型树，这将在本章后面介绍。\n\n此外，你可以在 OpenAPI 模型构建完成后使用过滤器对其进行更新。\n\n# MicroProfile OpenAPI\
    \ 注解\n\nOpenAPI 信息最常见的来源可能是构成标准 JAX-RS 应用程序定义的一组注解。这些注解，连同 MicroProfile OpenAPI\
    \ 规范定义的额外（可选）注解，可以被 MicroProfile 平台扫描和处理，以生成 OpenAPI 文档。\n\nMP OpenAPI 规范要求能够从纯\
    \ JAX-RS 2.0 应用程序生成有效的 OpenAPI 文档。如果你是 OpenAPI 新手，可以简单地将现有的 JAX-RS 应用程序部署到 MicroProfile\
    \ OpenAPI 运行时，并查看 `/openapi` 的输出。\n\n为了填充生成的 OpenAPI 文档的更多细节，你可以进一步注解你的...\n\n\
    # 使用示例\n\n以下是一些 MicroProfile OpenAPI 注解的使用示例：\n\n示例 1 – 简单的操作描述（缩写）：\n\n```\n\
    @GET\n@Path(\"/findByMake\")\n@Operation(summary = \"Finds cars by make\",\n \
    \          description = \"Find cars by their manufacturer\")\npublic Response\
    \ findCarsByMake(...)\n{ ... }\n```\n\n以下是示例 1 的输出：\n\n```\n/car/findByMake:\n\
    \  get:\n    summary: Finds cars by make\n    description: Find cars by their\
    \ manufacturer\n```\n\n示例 2 – 具有不同响应的操作（缩写）：\n\n```\n@GET\n@Path(\"/{name}\")\n\
    @Operation(summary = \"Get customer by name\")\n  @APIResponse(description = \"\
    The customer\",\n             content = @Content(mediaType = \"application/json\"\
    ,\n                                schema = @Schema(implementation = Customer.class))),\n\
    @APIResponse(responseCode = \"400\", description = \"Customer not found\")\npublic\
    \ Response getCustomerByName(\n        @Parameter(description = \"The name of\
    \ the customer to be fetched\", required = true) @PathParam(\"name\") String name)\n\
    \n{...}\n```\n\n以下是示例 2 的输出：\n\n```\n/customer/{name}:\n    get:\n       summary:\
    \ Get customer by name\n       operationId: getCutomerByName\n       parameters:\n\
    \       - name: name\n         in: path\n         description: 'The name of the\
    \ customer to be fetched'\n         required: true\n         schema:\n       \
    \    type: string\n       responses:\n         default:\n           description:\
    \ The customer\n           content:\n             application/json:\n        \
    \       schema:\n                 $ref: '#/components/schemas/Customer'\n    \
    \     400:\n           description: Customer not found\n```\n\n更多示例，请参考 MicroProfile\
    \ OpenAPI 规范维基页面：[`github.com/eclipse/microprofile-open-api/wiki`](https://github.com/eclipse/microprofile-open-api/wiki)。\n"
- fmt: "# Static OpenAPI files\n\nAs mentioned earlier in the chapter, static OpenAPI\
    \ files are one of the three sources from which the OpenAPI document can be created.\
    \ In the following, we give you a short introductory description of how you could\
    \ generate one and how to include it in your deployment. Many organizations use\
    \ an API-first development practice, which entails defining static OpenAPI files\
    \ even before any code is implemented for them.\n\nFirst, you can create an OpenAPI\
    \ document by using an open source editor such as Swagger Editor ([https://editor.swagger.io](https://editor.swagger.io)).\
    \ The following is a screenshot shows this:\n\n![](Images/db11ee83-6eab-4cfd-a4c1-089959d1e197.png)\n\
    \nUsing this editor, you can start with sample ...\n\n# Programming model\n\n\
    You can provide OpenAPI elements via Java POJOs (Plain Old Java Objects) by using\
    \ the MicroProfile OpenAPI programming model. The complete set of models is described\
    \ in the `org.eclipse.microprofile.openapi.models` package. You can read more\
    \ about it at [https://github.com/eclipse/microprofile-open-api/tree/master/api/src/main/java/org/eclipse/microprofile/openapi/models](https://github.com/eclipse/microprofile-open-api/tree/master/api/src/main/java/org/eclipse/microprofile/openapi/models).\n\
    \nYou can create an OpenAPI tree by using `OASFactory`. Refer to the following\
    \ code block by way of an example:\n\n```\nOASFactory.createObject(Info.class).title(\"\
    Weather\")\n          .description(\"Weather APIs\").version(\"1.0.0\");\n```\n\
    \nTo bootstrap the OpenAPI model tree, you can use the `OASModelReader` interface.\
    \ You can then create an implementation of this interface and register it using\
    \ the `mp.openapi.model.reader` configuration key.\n\nThe following is globally\
    \ an example of what its definition would look like in `META-INF/microprofile-config.properties`:\n\
    \n```\nmp.openapi.model.reader=com.mypackage.MyModelReader\n```\n\nLike static\
    \ files, the model reader can be used to provide either complete or partial model\
    \ trees. To provide a complete OpenAPI model tree, you should set the `mp.openapi.scan.disable`\
    \ configuration to `true`. Otherwise, this partial model will be assumed.\n\n\
    # Using a filter for updates\n\nTo update or remove certain elements and fields\
    \ of the OpenAPI document, you can use a filter. The `OASFilter` ([https://github.com/eclipse/microprofile-open-api/blob/master/api/src/main/java/org/eclipse/microprofile/openapi/OASFilter.java](https://github.com/eclipse/microprofile-open-api/blob/master/api/src/main/java/org/eclipse/microprofile/openapi/OASFilter.java))\
    \ interface allows you to receive callbacks for various OpenAPI elements. It allows\
    \ you to override the methods you care about. You can create an implementation\
    \ of this interface and register it using the `mp.openapi.filter` configuration\
    \ key.\n\nHere's an example of what its definition would look like in `META-INF/microprofile-config.properties`:\n\
    \n```\nmp.openapi.filter=com.mypackage.MyFilter\n```\n\nA registered filter is\
    \ called once for each model element. For example, the `filterPathItem` method\
    \ is ...\n\n# Introduction to the MicroProfile REST Client and its capabilities\n\
    \nThe MicroProfile REST Client (MP-RC) provides an API for type-safe invocation\
    \ on REST endpoints. It can be used from applications to perform remote invocations\
    \ on other services.\n\nIt leverages JAX-RS annotations on Java interfaces to\
    \ describe the actual contract with remotes services. These interfaces are then\
    \ used to create client proxies that hide much of the underlying HTTP communication.\n\
    \nThe MP-RC specification defines the requirements for leveraging the JAX-RS annotations\
    \ on the Java interface, as well as MP-RC-specific annotations to augment behavior,\
    \ including how incoming request headers should be propagated, how to augment\
    \ JAX-RS behaviors using providers, exception mapping, CDI support, and integration\
    \ with other MicroProfile specifications. We will look at MP-RC in more detail\
    \ by starting with the definition of a type-safe endpoint interface.\n\n# Defining\
    \ the endpoint Interface\n\nTo define the type-safe interface for an endpoint,\
    \ we create a Java interface that leverages JAX-RS annotations to map interface\
    \ methods to the REST endpoint they proxy. A basic example is illustrated in the\
    \ following `WorldClockApi` interface:\n\n```\npackage io.pckt.restc.contract;import\
    \ javax.ws.rs.GET;import javax.ws.rs.Path;import javax.ws.rs.PathParam;import\
    \ javax.ws.rs.Produces;import javax.ws.rs.core.MediaType;@Path(\"/api/json\")public\
    \ interface WorldClockApi { static final String BASE_URL = \"http://worldclockapi.com/api/json\"\
    ; @GET @Path(\"/utc/now\") @Produces(MediaType.APPLICATION_JSON) Now utc(); @GET\
    \ @Path(\"{tz}/now\") @Produces(MediaType.APPLICATION_JSON) Now tz(@PathParam(\"\
    tz\") String tz);}public class Now ...\n```\n\n# MicroProfile REST Client programmatic\
    \ API usage\n\nMP-RC supports both programmatic lookup and CDI injection approaches\
    \ for usage. An example of a REST service making use of `org.eclipse.microprofile.rest.client.RestClientBuilder`\
    \ to create a type-safe client for the `WorldClockApi` interface is listed in\
    \ the following as `WorldClockUser.java`:\n\n```\npackage io.pckt.restc.contract;\n\
    \nimport javax.ws.rs.GET;\nimport javax.ws.rs.Path;\nimport javax.ws.rs.PathParam;\n\
    import javax.ws.rs.Produces;\nimport javax.ws.rs.core.MediaType;\n\n@Path(\"/api\"\
    )\n@ApplicationScoped\npublic class WorldClockUser {\n @GET\n @Path(\"/now-utc\"\
    )\n @Produces(MediaType.TEXT_PLAIN)\n public String getCurrentDateTime() {\n WorldClockApi\
    \ remoteApi = RestClientBuilder.newBuilder()\n .baseUri(URI.create(WorldClockApi.BASE_URL))\n\
    \ .build(WorldClockApi.class);\n Now now = remoteApi.utc();\n return now.getCurrentDateTime();\n\
    \ }\n}\n```\n\nThe `baseUri()` method is used to specify the server URI against\
    \ which the `WorldClockApi` method paths are to be resolved. The `build()` method\
    \ takes the Java interface of the type-safe client that is to be built. Additional\
    \ `RestClientBuilder` methods include the following:\n\n*   `baseUrl(URL)`: Similar\
    \ to `baseUri`, but takes a `java.net.URL` type.\n*   `connectTimeout(long timeout,\
    \ TimeUnit unit)`: The amount of time to wait to connect to the remote server.\
    \ A value of 0 indicates having to wait forever.\n*   `readTimeout(long timeout,\
    \ TimeUnit unit)`: The amount of time to wait on reads of the remote server connection.\
    \ A value of 0 indicates having to wait forever.\n*   `executorService(ExecutorService\
    \ executor)`: Used for async requests. We will return to this in the async section.\n\
    \n# MicroProfile REST Client CDI usage\n\nMP-RC type-safe interfaces may be injected\
    \ as CDI beans. The runtime must create a CDI bean for each interface annotated\
    \ with `@RegisterRestClient`. A CDI client injects bean created will include a\
    \ qualifier, `@RestClient`, to differentiate use as an MP-RC injection point.\
    \ The following update to our `WorldClockApi` interface illustrates the use of\
    \ the `@RegisterRestClient` annotation:\n\n```\nimport javax.ws.rs.GET;import\
    \ javax.ws.rs.Path;import javax.ws.rs.PathParam;import javax.ws.rs.Produces;import\
    \ javax.ws.rs.core.MediaType;import org.eclipse.microprofile.rest.client.inject.RegisterRestClient;@Path(\"\
    /api/json\")@RegisterRestClient()public interface WorldClockApi { static final\
    \ String BASE_URL = \"http://worldclockapi.com/api/json\"; ...\n```"
