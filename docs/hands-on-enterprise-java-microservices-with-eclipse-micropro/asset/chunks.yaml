  trans: "\n# JWT 选项卡\n\n点击 JWT 选项卡后，您应该会看到类似下图的视图，其中包含两个端点链接：\n\n![](img/d7875e8b-4474-48c4-b850-279881c58802.png)\n\
    \n第一个链接会向一个未受保护的端点发起请求，该端点会从 JWT 中打印名称，如果存在 `upn` 声明，也会一并打印。\n\n但是，由于 Web 前端未为此请求提供\
    \ JWT，输出部分将显示以下内容：\n\n```\nHello[open] user=anonymous, upn=no-upn\n```\n\n点击第二个链接将访问该端点的安全版本，其中包含以下代码片段：\n\
    \n```\npublic class JwtEndpoint {\n    @Inject\n    private JsonWebToken jwt;\n\
    \    @Inject\n    @Claim(standard = Claims.raw_token)\n    private ClaimValue<String>\
    \ jwtString;\n    @Inject\n    @Claim(standard = Claims.upn)\n    private ClaimValue<String>\
    \ upn;\n    @Context\n    private SecurityContext context;\n...\n    @GET\n  \
    \  @Path(\"/secureHello\")\n    @Produces(MediaType.TEXT_PLAIN)\n    @RolesAllowed(\"\
    user\") // 1\n    public String secureHello() {\n        String user = jwt ==\
    \ null ? \"anonymous\" : jwt.getName(); // 2\n        String scheme = context.getAuthenticationScheme();\
    \ // 3\n        boolean isUserInRole = context.isUserInRole(\"PacktMPUser\");\
    \ // 4\n        return String.format(\"Hello[secure] user=%s, upn=%s, scheme=%s,\
    \ \n        isUserInRole(PacktMPUser)=%s\", user, upn.getValue(), \n        scheme,\
    \ isUserInRole);\n    }\n```\n\n我们来讨论一下重要的几行：\n\n1.  `@RolesAllowed(\"user\")`\
    \ 注解表明该端点是受保护的，并且调用者需要拥有 `user` 角色。我们之前看到的 JWT `groups` 声明中包含此角色。\n2.  通过 `getName()`\
    \ 方法从 JWT 中获取用户。如 MP-JWT 章节所述，这映射到 JWT 中的 `upn` 声明。\n3.  从注入的 `SecurityContext`\
    \ 中获取当前的安全认证方案。\n4.  进行程序化安全检查，判断调用者是否拥有 `PacktMPUser` 角色。该检查将返回 true，因为我们之前看到的\
    \ JWT groups 声明中包含此角色。\n\n这些信息被组合成一个字符串，作为 `secureHello` 方法的返回值。点击 demo1/jwt/secureHello\
    \ 链接按钮后，响应区域将生成以下输出字符串：\n\n```\nHello[secure] user=packt-mp-book, upn=packt-mp-book,\
    \ scheme=MP-JWT, isUserInRole(PacktMPUser)=true\n```\n\n通过结合使用 `@RolesAllowed`\
    \ 注解和与 MP-JWT 功能的集成，我们可以看到如何保护微服务端点的访问，以及如何根据经过身份验证的 JWT 中的内容引入应用程序行为。接下来，让我们回到\
    \ RestClient 选项卡。\n\n# RestClient 选项卡\n\nRestClient 选项卡包含三个链接，如下图所示：\n\n![](img/994277da-2795-4b3f-99c0-783f2ae4b6f6.png)\n\
    \n这些链接对应于使用外部世界时钟公共端点的端点，该端点在被访问时会返回当前时间的信息。已创建以下 MP-RC 接口来封装外部端点：\n\n```\n@RegisterRestClient(baseUri\
    \ = WorldClockApi.BASE_URL)public interface WorldClockApi {    static final String\
    \ BASE_URL = \"http://worldclockapi.com/api/json\";    @GET    @Path(\"/utc/now\"\
    )    @Produces(MediaType.APPLICATION_JSON)    Now utc();    @GET    @Path(\"{tz}/now\"\
    )    @Produces(MediaType.APPLICATION_JSON)    Now tz(@PathParam(\"tz\") String\
    \ tz);}\n```\n\n# 总结\n\n本章引导我们了解了一个示例服务网格，它由一个 Web 应用程序、两个在新型 Quarkus 实现中使用 MP\
    \ 功能的微服务镜像、一个外部 Web 服务以及两个基于 Docker 的服务组成。这展示了您将在云环境中遇到的各种 MP 功能与外部服务之间的相互作用，以及与本地网格环境外部的\
    \ Web 服务的集成。这应该能让您体会到使用 MicroProfile API 和实现来组合微服务所涉及的步骤。\n\n在下一章中，我们将了解正在开发中的\
    \ MicroProfile 规范，以了解正在探索的方向。虽然这些规范目前不属于 MicroProfile 核心功能集，但它们是未来纳入的候选对象，研究它们将让我们了解\
    \ MicroProfile 可能的发展方向。\n\n# 问题\n\n1.  MP-Config 设置会影响应用程序代码、MP 功能代码，还是两者都影响？\n\
    2.  您是否能够将 `health.pathToMonitor` 更新为有效路径，并看到更新的健康状态回复？\n3.  Health 选项卡上的 `Svcs2`\
    \ 健康状态链接（`http://localhost:8082/health`）显示的输出是什么？如果您停止 KeyCloak Docker 镜像并再次点击该链接，输出会改变吗？\n\
    4.  如果您在 Metrics 选项卡中选择 `MetricController.timed-request` 链接（`http://localhost:8080/metrics/application/io.packt.sample.metric.MetricController.timed-request`），但之前至少没有点击过一次\
    \ `Timed` 端点链接（`http://localhost:8080/demo1/metric/timed`），会发生什么？\n5.  转到 RestClient\
    \ 选项卡并点击链接，确保您有一个有效的 ...\n\n# 延伸阅读\n\n仔细阅读代码，尝试更改，然后与更新后的代码进行交互，是深入了解示例服务背后更多细节的好方法。Quarkus\
    \ MicroProfile 实现支持实时重新加载功能，允许您在不重新构建的情况下进行更改。有关此主题的更多信息，请参阅 Quarkus 网站上的 Maven\
    \ 工具指南（[`quarkus.io/guides/maven-tooling.html`](https://quarkus.io/guides/maven-tooling.html)）。\n\
    \n# 第 5 部分：展望未来\n\n本节涵盖现有项目（例如候选 API），并讨论 MicroProfile 如何适应多云环境。\n\n本节包含以下章节：\n\
    \n*   第 9 章，*响应式编程与未来发展*\n*   第 10 章，*多云环境中的 MicroProfile*\n\n# 响应式编程与未来发展\n\n\
    事件驱动架构已经存在了很长时间，异步方法调用、消息驱动 Bean、事件控制逻辑等结构是开发人员熟悉的。然而，随着云资源的普及和按需可扩展性的采用，组织对能够利用无服务器和函数即服务类型环境的响应式编程方法重新产生了兴趣。Eclipse\
    \ MicroProfile 还包括与响应式编程相关的规范，这些规范目前位于 Eclipse MicroProfile 伞形/平台版本之外。\n\n除此之外，Eclipse\
    \ MicroProfile 沙盒中还有一些项目，社区正在讨论、实施和评估这些项目，以决定是否应将它们提升为正式的 MicroProfile 项目。本章将帮助您了解当前与响应式编程相关的\
    \ MicroProfile 规范，并让您一窥伞形/平台版本之外以及 MicroProfile 沙盒中的项目已经启动和即将到来的内容。本章将涵盖以下主题：\n\
    \n*   响应式消息传递概述\n*   Eclipse MicroProfile 中响应式消息传递架构的解释\n*   与响应式编程相关的 Eclipse\
    \ MicroProfile 规范描述\n*   如何使用 Eclipse MicroProfile 响应式消息规范的示例\n*   伞形或平台版本之外的\
    \ MicroProfile 项目/规范概述\n*   Eclipse MicroProfile 沙盒内项目的描述\n*   对 Eclipse MicroProfile\
    \ 与 Jakarta EE 当前关系的见解及其可能的未来分析\n"
- fmt: '# Reactive Programming Work in Eclipse MicroProfile


    At the time of writing, the reactive-related specifications that are part of Eclipse
    MicroProfile are `Reactive Streams Operators`, `Reactive Messaging`, and `Context
    Propagation`. Reactive work within the MicroProfile community continues to evolve,
    and new specifications may surface in the future as well as newer releases of
    existing reactive-related ones.


    # An Overview of Reactive Messaging


    The [Reactive Manifesto](https://www.reactivemanifesto.org/) defines the characteristics
    of reactive systems to including an asynchronous messaging core that is used to
    build elastic, resilient systems. This is typically illustrated via a diagram
    such as the following:


    ![](Images/a5e7920f-3372-4247-a4d6-a9e52c974d3f.png)


    The idea is that interaction via asynchronous messages promotes resilience, elasticity,
    and, in turn, responsiveness.


    The `MicroProfile Reactive Messaging` (`MP-RM`) specification aims to enable microservice-based
    applications with the characteristics of reactive systems via event-driven microservices.
    The specification focuses on versatility and is suitable for building different
    types of architecture and applications.


    Asynchronous interactions with different services and resources can be implemented
    using reactive messaging. Typically, asynchronous database drivers can be used
    in conjunction with reactive messaging to read and write into a data store in
    a non-blocking and asynchronous manner.


    When building microservices, `Command Query Responsibility Segregation` (`CQRS`)
    and event-sourcing patterns provide an answer to data sharing between microservices
    ([https://martinfowler.com/bliki/CQRS.html](https://martinfowler.com/bliki/CQRS.html)).
    Reactive messaging can also be used as the foundation for CQRS and the event-sourcing
    mechanism, as these patterns embrace message-passing as a core communication pattern.


    # MicroProfile Reactive Messaging Architecture


    An application using reactive messaging is composed of CDI beans that consume,
    produce, and process messages. The messages can be internal to the application,
    or can be sent and received via external message brokers, as illustrated in the
    following diagram:


    ![](Images/8aec63b4-925c-414e-97b0-409c29421e65.png)


    This figure shows a Kafka topic publishing messages to a first bean, which does
    some processing and publishes it to a second bean, which does its own processing/filtering,
    and finally publishes the message as an AMQP topic.


    As we will see when we look into MP-RM examples, application beans contain methods
    annotated with `@Incoming` and/or `@Outgoing`.


    # Message Shapes


    The MP-RM specification defines a number of supported signature types that beans
    can use to define publish and subscriber behaviors. These signatures depend on
    a few key types that are outlined in the following list:


    *   `org.reactivestreams.Publisher`: A Reactive Streams `Publisher<T>` is a provider
    of a potentially unlimited number of sequenced elements, publishing them according
    to the demand received from its link subscriber(s).

    *   `org.reactivestreams.Subscriber`: A Reactive Stream `Subscriber<T>` interface
    that is used to signal demand to `Publisher`. It provides events for subscription
    information, zero or more data events, and error and completion events.

    *   `org.reactivestreams.Processor`: This Reactive Stream `Processor<T,R>` interface
    simply extends both `Subscriber<T>` and `Publisher<R>`.

    *   `org.eclipse.microprofile.reactive.streams.operators.PublisherBuilder`: The
    MP Reactive Streams Operators `PublisherBuilder` interface allows you to build
    up a Reactive Streams `Publisher` from various sources and apply operations to
    transform/filter ultimately published messages.

    *   `org.eclipse.microprofile.reactive.streams.operators.ProcessorBuilder`: The
    MP Reactive Streams Operators `ProcessorBuilder` interface allows you to build
    up a Reactive Streams `Processor` from various sources and apply operations to
    transform/filter ultimately published messages.

    *   `org.eclipse.microprofile.reactive.streams.operators.SubscriberBuilder`: The
    MP Reactive Streams Operators `ProcessorBuilder` interface allows you to build
    up a Reactive Streams `Subscriber` from various sources and apply operations to
    transform/filter ultimately published messages.

    *   `java.util.concurrent.CompletionStage`: This JDK concurrent `util` package
    interface defines a stage of computation that is typically asynchronous, and computes
    an action or value. `CompletionStage` can be combined so that a graph of stages
    may be executed to produce the final result.

    *   `org.eclipse.microprofile.reactive.messaging.Message<T>`: An MP-RM interface
    that provides a wrapper around the payload of type `T` and an `ack` method to
    acknowledge receipt of the message.


    With these types defined, we can look at the various types of method that produce
    data by pushing messages onto outgoing channels that MP-RM supports. The publisher
    method types of methods all have an `@Outgoing("channel-name")` annotation and
    support signatures as follows:


    *   `Publisher<Message<T>> method()`

    *   `Publisher<T> method()`

    *   `PublisherBuilder<Message<T>> method()`

    *   `PublisherBuilder<T> method()`

    *   `T method()`

    *   `CompletionStage<T> method()`


    Consumer methods all have an `@Incoming("channel-name")` annotation and support
    signatures as follows:


    *   `Subscriber<Message<T>> method()`

    *   `Subscriber<T> method()`

    *   `SubscriberBuilder<Message<T>>`

    *   `SubscriberBuilder<T>`

    *   `void method(Message<T> payload)`

    *   `void method(T payload)`

    *   `CompletionStage<?> method(Message<T> payload)`

    *   `CompletionStage<?> method(T payload)`


    Methods that both consume and produce data are known as processors, and will have
    both an `@Incoming("channel-in")` and `@Outgoing("channel-out")` annotation. Supported
    signatures are as follows:


    *   `Processor<Message<I>, Message<O>> method()`

    *   `Processor<I, O> method();`

    *   `ProcessorBuilder<Message<I>, Message<O>> method()`

    *   `ProcessorBuilder<I, O> method();`

    *   `Publisher<Message<O>> method(Message<I> msg)`

    *   `Publisher<O> method(I payload)`

    *   `PublisherBuilder<Message<O>> method(Message<I> msg)`

    *   `PublisherBuilder<O> method(I payload)`

    *   `Message<O> method(Message<I> msg)`

    *   `O method(I payload)`

    *   `CompletionStage<Message<O>> method(Message<I> msg)`

    *   `CompletionStage<O> method(I payload)`

    *   `Publisher<Message<O>> method(Publisher<Message<I>> pub)`

    *   `PublisherBuilder<Message<O>> method(PublisherBuilder<Message<I>> pub)`

    *   `Publisher<O> method(Publisher<I> pub)`

    *   `PublisherBuilder<O> method(PublisherBuilder<I> pub)`


    Now, we will look at some examples of using beans with these signatures to build
    up message processing chains.


    # MicroProfile Reactive Streams Operators


    Reactive Streams requires more than just plumbing publishers to subscribers. Typically,
    a stream needs to be manipulated in some way, such as applying operations including
    `map`, `filter`, and `flatMap`. Neither Reactive Streams nor the JDK provide an
    API for performing these manipulations. Since users are not meant to implement
    Reactive Streams themselves, this means the only way to do these manipulations
    currently is to depend on a third-party library providing operators, such as Akka
    Streams, RxJava, or Reactor.


    The MicroProfile Reactive Streams Operators API seeks to fill that gap so that
    MicroProfile application developers can manipulate Reactive Streams without bringing
    in a third-party dependency.'
