    \ From some external configuration files (such as the Java properties file)\n\
    *   From other places (an LDAP server, database, key-value store, and so on)\n\
    \nOn the one hand, these configuration parameters come from many different sources.\
    \ On the ...\n\n# Reading configuration from the MicroProfile Config API\n\nThe\
    \ MicroProfile Config specification defines two objects to read the value of configuration\
    \ parameters:\n\n*   The `Config` object to programmatically access the configuration\
    \ values\n*   The `@ConfigProperty` annotation to inject the configuration values\
    \ using **Contexts and Dependency Injection** (**CDI**)\n\nLet's discuss them\
    \ in detail."
