    # 异常映射


    MP-RC 通过 `org.eclipse.microprofile.rest.client.ext.ResponseExceptionMapper` 接口支持将调用响应映射为异常：


    ```

    import javax.annotation.Priority;import javax.ws.rs.Priorities;import javax.ws.rs.core.MultivaluedMap;import
    javax.ws.rs.core.Response;import java.util.Optional;public interface ResponseExceptionMapper<T
    extends Throwable> {    int DEFAULT_PRIORITY = Priorities.USER;    T toThrowable(Response
    response);    default boolean handles(int status, MultivaluedMap<String, Object>
    headers) {        return status >= 400;    }    default int getPriority() {        return
    Optional.ofNullable(getClass().getAnnotation(Priority.class))            .map(Priority::value)            .orElse(DEFAULT_PRIORITY);    }}

    ```


    请考虑以下内容……


    # 默认异常映射


    每个实现都提供了一个默认的 `ResponseExceptionMapper` 实现，当响应状态码 >= 400 时，该实现会将响应映射并调用为 `javax.ws.rs.WebApplicationException`。其优先级为
    `Integer.MAX_VALUE`，旨在作为遇到错误时的回退机制。此映射器默认会注册到所有客户端接口，但可以通过将 MP Config 属性 `microprofile.rest.client.disable.default.mapper`
    设置为 `true` 来禁用。也可以在构建客户端时，通过使用相同的属性来按客户端禁用：


    ```

    RestClientBuilder.newBuilder().property("microprofile.rest.client.disable.default.mapper",true)

    ```


    # 异步支持


    MP-RC 支持异步方法调用。当客户端接口方法的返回类型为 `java.util.concurrent.CompletionStage<?>` 类型时，该方法即为异步方法。`WorldClockApi`
    接口的一个声明了异步方法的替代版本（称为 `WorldClockApiAsync.java`）如下所示：


    ```

    import java.util.concurrent.CompletionStage;import javax.ws.rs.GET;import javax.ws.rs.Path;import
    javax.ws.rs.PathParam;import javax.ws.rs.Produces;import javax.ws.rs.core.MediaType;@Path("/api/json")public
    interface WorldClockApiAsync { String BASE_URL = "http://worldclockapi.com/api/json";
    @GET @Path("/utc/now") @Produces(MediaType.APPLICATION_JSON) CompletionStage<Now>
    utc(); @GET @Path("{tz}/now") @Produces(MediaType.APPLICATION_JSON) ...

    ```


    # 总结


    在本章中，我们学习了两个 Eclipse MicroProfile 规范，即 Eclipse MicroProfile OpenAPI 和 Eclipse
    MicroProfile REST Client。前者提供了为微服务生成符合 OpenAPI 规范的文档的规范，后者则提供了以类型安全的方式调用 REST
    端点的规范。在本章中，我们介绍了这些规范的具体功能，提供了一些示例代码，并提供了如何获取这些规范更多信息的指引。您已经了解了 Eclipse MicroProfile
    OpenAPI 和 Eclipse MicroProfile REST Client 规范的特性和功能，如何使用它们的注解和编程接口，以及如何将它们集成到您的应用程序中。


    在下一章中，我们将讨论并深入探讨当前市场上存在的 Eclipse MicroProfile 开源实现。


    # 问题


    1.  是否需要执行任何操作才能将信息提供给 `/openapi` 端点？

    2.  能否仅通过一两个额外的注解来增强 OpenAPI 输出？

    3.  使用静态 OpenAPI 文件的意义何在？

    4.  是否需要我打算使用的 REST 端点微服务来提供 MP-REST 接口？

    5.  如何将类型安全接口的基础 URL 外部化？

    6.  如果需要传播传入请求头，该怎么办？


    # 第 3 部分：MicroProfile 实现与路线图


    本节将介绍当前市场上的实现以及未来项目的可能路线图。


    本节包含以下章节：


    *   第 7 章，*MicroProfile 实现、Quarkus 以及通过会议应用实现互操作性*


    # MicroProfile 实现、Quarkus 以及通过会议应用实现互操作性


    Eclipse MicroProfile 的优势之一在于它提供了一个规范，允许许多实现彼此互操作。这一优势鼓励了许多供应商和社区团体将 Eclipse MicroProfile
    规范实现为开源实现。目前市场上有八个 Eclipse MicroProfile 实现，第九个实现 Quarkus 也已加入。


    本章将涵盖以下主题：


    *   描述八个 Eclipse MicroProfile 实现以及如何获取每个实现的更多信息

    *   如何为这些实现中的每一个生成 Eclipse MicroProfile 示例代码……


    # 当前的 MicroProfile 实现


    在撰写本文时，共有八个 Eclipse MicroProfile 实现，全部都是开源的。以下是这些实现的表格：


    | **开源项目基础** | **项目地址** | **支持供应商** |

    | Thorntail ([`thorntail.io/`](http://thorntail.io/)) | [`github.com/thorntail/thorntail`](https://github.com/thorntail/thorntail)
    | Red Hat |

    | Open Liberty ([`openliberty.io/`](https://openliberty.io/)) | [`github.com/openliberty`](https://github.com/openliberty)
    | IBM |

    | Apache TomEE ([`tomee.apache.org/`](http://tomee.apache.org/)) | [`github.com/apache/tomee`](https://github.com/apache/tomee)
    | Tomitribe |

    | Payara Micro ([`www.payara.fish/payara_micro`](https://www.payara.fish/payara_micro))
    | [`github.com/payara/Payara`](https://github.com/payara/Payara) | Payara Services
    Ltd. |

    | Hammock ([`hammock-project.github.io/`](https://hammock-project.github.io/))
    | [`github.com/hammock-project`](https://github.com/hammock-project) | Hammock
    |

    | KumuluzEE ([`ee.kumuluz.com/`](https://ee.kumuluz.com/)) | [`github.com/kumuluz`](https://github.com/kumuluz)
    | KumuluzEE |

    | Launcher ([`github.com/fujitsu/launcher`](https://github.com/fujitsu/launcher))
    | [`github.com/fujitsu/launcher`](https://github.com/fujitsu/launcher) | Fujitsu
    |

    | Helidon ([`helidon.io/#`](https://helidon.io/#)) | [`github.com/oracle/helidon`](https://github.com/oracle/helidon)
    | Oracle |


    其中一些实现基于*应用服务器*，例如 Payara 和 Open Liberty，而另一些则基于*应用组装器*，后者仅包含应用程序所需的功能，无需启动并运行应用服务器，并且通常生成可执行的
    JAR。然而，基于应用服务器的实现也能够生成可执行的 JAR。


    应用组装器可以生成一个 *uberjar*（一个自包含的可运行 JAR 文件），或者一个*应用 jar*，其运行时依赖项位于子目录中，例如，一个附带的 `lib`
    或 `libs` 子目录。


    通过了整个伞式版本或特定版本 MicroProfile API 的 MicroProfile **测试兼容性套件**（**TCK**）的 Eclipse MicroProfile
    实现，会列在 [`wiki.eclipse.org/MicroProfile/Implementation`](https://wiki.eclipse.org/MicroProfile/Implementation)
    上。目前，列入此列表采用诚信制度，因为它不需要提供 TCK 结果的证明；只需要发布者声明其实现已通过 TCK。


    该项目还有一个站点，组织/团体可以在 MicroProfile 生产部署列表中自行添加。此列表可在 [`wiki.eclipse.org/MicroProfile/Adoptions`](https://wiki.eclipse.org/MicroProfile/Adoptions)
    找到。


    在接下来的章节中，我们将简要介绍这些实现以及如何获取每个实现的更多信息。

