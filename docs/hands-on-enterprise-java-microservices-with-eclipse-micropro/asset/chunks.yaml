    \ `8081` 端口的 HTTP 请求，并且我们看到已安装的各种 Quarkus 特性，以支持我们对 MicroProfile 特性的使用。\n\n# Svcs2\
    \ Shell 命令\n\n接下来，在您之前要求打开的 Svcs2 终端窗口中，`cd` 到项目的 `svcs2` 子目录，然后运行以下命令来构建 `svcs2`\
    \ 镜像：\n\n```\nmvn clean package\n```\n\n构建完成后，要运行 `svcs2` JAR，请输入以下命令：\n\n```\n\
    \ java -jar target/sample-svcs2-runner.jar\n```\n\n您将得到以下输出：\n\n```\nScotts-iMacPro:svcs2\
    \ starksm$ java -jar target/sample-svcs2-runner.jar...20:58:55 INFO [io.quarkus]]\
    \ (main) Quarkus 0.15.0 started in 0.936s. Listening on: http://[::]:808220:58:55\
    \ INFO [io.quarkus]] (main) Installed features: [cdi, jaeger, resteasy, resteasy-jsonb,\
    \ security, smallrye-health, smallrye-jwt, smallrye-metrics, smallrye-opentracing,\
    \ smallrye-rest-client]\n```\n\n在这里，我们 ...\n\n# Web Shell 命令\n\n接下来，在您要求打开的 Web\
    \ Shell 终端窗口中，将此项目克隆到您的计算机，`cd` 到 `web` 子目录，然后运行以下命令以开发模式执行 Web 应用程序：\n\n```\n\
    mvn clean package\n```\n\n构建完成后，要运行 Web 子项目 JAR，请输入以下命令：\n\n```\njava -jar target/sample-web-runner.jar\n\
    ```\n\n应用程序启动并运行后，将您的浏览器指向 Web 应用程序 [`localhost:8080/index.html`](http://localhost:8080/index.html)。在下一节中，我们将详细介绍\
    \ Web 应用程序。\n\n# 示例应用的详细信息\n\n让我们详细讨论应用程序中的各个选项卡。\n\n# 配置选项卡\n\n应用程序的初始视图显示的是配置选项卡，如下面的截图所示：\n\
    \n![](img/c919e34a-eaea-4f7e-9ae8-2dfba21c976e.png)\n\n页面上的三个链接指向 `Chapter08-mpcodesample/svcs1`\
    \ 子项目中 `io.packt.sample.config.ConfigTestController` 类的端点。点击各个链接会显示 MP-Config\
    \ 的值。上图中显示的值对应于第二个链接和 `injected.piValue` 配置值。来自 `Chapter08-mpcodesample/svcs1/src/main/resources/application.properties`\
    \ 的相关设置如下所示：\n\n```\n# MP Config values for ConfigTestController\ninjected.value=Injected\
    \ value\ninjected.piValue=3.1415926532\nlookup.value=A Lookup value\n```\n\n这里值得注意的是，通过\
    \ `ConfigTestController` 中的 `@ConfigProperty(name = \"injected.piValue\", defaultValue\
    \ = \"pi5=3.14159\")` 注解设置的默认五位数值，被覆盖为如上图所示的完整的十位 PI 值。\n\n# 健康检查选项卡\n\n点击应用程序的健康检查选项卡，会显示如下页面：\n\
    \n![](img/13372fe8-e683-4dde-8cad-a06d611177b2.png)\n\n页面上的链接对应于 `svcs1` 和 `svcs2`\
    \ 镜像的 `health` 检查端点。选择任一链接都会显示该镜像的健康检查输出。`svcs1` 镜像的健康检查由 `io.packt.sample.health.ServiceHealthCheck`\
    \ 和 `io.packt.sample.health.CheckDiskspace` 组成。此外，`ServiceHealthCheck` 只是一个始终返回正常状态的模拟实现。`CheckDiskspace`\
    \ 健康检查过程会查找使用 MP-Config 的 `health.pathToMonitor` 属性设置的路径，然后根据检查结果将过程状态设置为正常/异常...\n"
- fmt: "# The Metrics tab\n\nThe Metrics tab shows the following view containing three\
    \ links:\n\n![](Images/18e4884e-02d6-4796-ac68-4c560d3d8e7e.png)\n\nThe first\
    \ link accesses the following endpoint in the `io.packt.sample.metric.MetricController`\
    \ class:\n\n```\n@Path(\"timed\")\n@Timed(name = \"timed-request\")\n@GET\n@Produces(MediaType.TEXT_PLAIN)\n\
    public String timedRequest() {\n    long start = System.currentTimeMillis();\n\
    \    // Demo, not production style\n    int wait = new Random().nextInt(1000);\n\
    \    try {\n        Thread.sleep(wait);\n    } catch (InterruptedException e)\
    \ {\n        // Demo\n        e.printStackTrace();\n    }\n    long end = System.currentTimeMillis();\n\
    \    long delay = end - start;\n\n    doIncrement();\n    long count = getCustomerCount();\n\
    \    return String.format(\"MetricController#timedRequest, delay[0-1000]=%d, \n\
    \    count=%d\", delay, count);\n}\n```\n\nThis annotates the `timed` path endpoint\
    \ with an `@Timed(name = \"timed-request\")` annotation. This method uses a random\
    \ delay between 0-1,000 ms to generate a distribution of response times. The next\
    \ link is a direct link to the application-level metric for the `timedRequest()`\
    \ method. The MP-Metrics specification defines the path as `metrics/application/io.packt.sample.metric.MetricController.timed-request`.\
    \ After a few accesses to the first link to generate a range of response times,\
    \ accessing the second link to retrieve the `timedRequest()` method metric will\
    \ show something like the following:\n\n```\n# TYPE application:io_packt_sample_metric_metric_controller_timed_request_rate_per_second\
    \ gauge\napplication:io_packt_sample_metric_metric_controller_timed_request_rate_per_second\
    \ 0.4434851530761856\n# TYPE application:io_packt_sample_metric_metric_controller_timed_request_one_min_rate_per_second\
    \ gauge\napplication:io_packt_sample_metric_metric_controller_timed_request_one_min_rate_per_second\
    \ 0.552026648777594\n...\n# TYPE application:io_packt_sample_metric_metric_controller_timed_request_seconds\
    \ summary\napplication:io_packt_sample_metric_metric_controller_timed_request_seconds_count\
    \ 6.0\napplication:io_packt_sample_metric_metric_controller_timed_request_seconds{quantile=\"\
    0.5\"} 0.923901552\n...\napplication:io_packt_sample_metric_metric_controller_timed_request_seconds{quantile=\"\
    0.999\"} 0.970502841\n```\n\nThis is the range of information that the `@Timed`\
    \ style of metric generates. The final link accesses the `metrics` endpoint that\
    \ returns all of the metrics available in the image.\n\n# The OpenTracing tab\n\
    \nThe OpenTracing tab shows the following view with two links:\n\n![](Images/fdac27b8-b33b-4f90-aa6f-b0a3d6863ff4.png)\n\
    \nThe first link accesses the following `io.packt.sample.tracing.TracedEndpoint`\
    \ method:\n\n```\n@GET@Path(\"/randomDelay\")@Produces(MediaType.TEXT_PLAIN)@Traced(operationName\
    \ = \"TracedEndpoint#demoRandomDelay\")public String randomDelay() {    long start\
    \ = System.currentTimeMillis();    // 0-5 seconds random sleep    long sleep =\
    \ Math.round(Math.random() * 5000);    try {        Thread.sleep(sleep);    }\
    \ catch (InterruptedException e) {        e.printStackTrace();    }    long end\
    \ = System.currentTimeMillis();    return String.format(\"TracedEndpoint.randomDelay[0-5000],\
    \ elapsed=%d\",     (end - start));}\n```\n\nThe method ...\n\n# The OpenAPI tab\n\
    \nThe OpenAPI tab view contains two links and is as shown in the following screenshot:\n\
    \n![](Images/1313c2c2-2ebb-4ca9-81b5-0a8cbcdf3c96.png)\n\nThe first link generates\
    \ an OpenAPI document, a YAML file that contains descriptions for all endpoints\
    \ in the application. This can be fed into other programs or applications capable\
    \ of consuming the OpenAPI format. The second link is an example of such an application,\
    \ the Swagger UI. Opening that link will bring up a new window similar to the\
    \ following:\n\n![](Images/176d8da0-5532-4a16-aac2-fd92224543d4.png)\n\nThere\
    \ are three sections in this view of the sample application. The first section\
    \ is information that was specified on the JAX-RS application bean via the OpenAPI\
    \ annotations, as shown in this code fragment:\n\n```\n@ApplicationPath(\"/demo1\"\
    )\n@LoginConfig(authMethod = \"MP-JWT\", realmName = \"quarkus-quickstart\")\n\
    @OpenAPIDefinition(\n    info = @Info(\n        title = \"Quarkus MicroProfile\
    \ 2.2 Extensions Demo\",\n        version = \"1.0\",\n        contact = @Contact(\n\
    \            name = \"QUARKUS - COMMUNITY\",\n            url = \"https://quarkus.io/community/\"\
    ,\n            email = \"quarkus-dev+subscribe@googlegroups.com\"),\n        license\
    \ = @License(\n            name = \"Apache 2.0\",\n            url = \"http://www.apache.org/licenses/LICENSE-2.0.html\"\
    )\n    ),\n    servers = {\n        @Server(url = \"http://localhost:8080/\",\
    \ description = \"demo1 host\"),\n        @Server(url = \"http://localhost:8081/\"\
    , description = \"demo2 host\")\n    },\n    externalDocs = @ExternalDocumentation(url=\"\
    http://microprofile.io\", description = \n    \"Eclipse MicroProfile Homepage\"\
    )\n)\npublic class DemoRestApplication extends Application {\n...\n```\n\nComparing\
    \ this information to that shown in the Swagger UI shows that all of the information\
    \ from the `@OpenAPIDefinition` annotation has been incorporated into the UI top\
    \ section. The next section of the Swagger UI with the `time` and `default` subheadings\
    \ corresponds to the operation information taken from the application REST endpoint.\
    \ The `default` section corresponds to endpoints that did not include any OpenAPI\
    \ specification annotations. There is a default behavior to create an OpenAPI\
    \ endpoint definition for any JAX-RS endpoint found in the application.\n\nThe\
    \ `time` section corresponds to the following `io.packt.sample.restclient.TimeService`\
    \ endpoint code fragment that has included the `@Tag`, `@ExternalDocumentation`,\
    \ and `@Operation` MP-OpenAPI annotations:\n\n```\n@GET\n@Path(\"/now\")\n@Produces(MediaType.APPLICATION_JSON)\n\
    @Tag(name = \"time\", description = \"time service methods\")\n@ExternalDocumentation(description\
    \ = \"Basic World Clock API Home.\",\n    url = \"http://worldclockapi.com/\"\
    )\n@Operation(summary = \"Queries the WorldClockApi using the MP-RestClient\"\
    ,\n    description = \"Uses the WorldClockApi type proxy injected by the \n  \
    \  MP-RestClient to access the worldclockapi.com service\")\npublic Now utc()\
    \ {\n    return clockApi.utc();\n}\n```\n\nIf you expand the first operation under\
    \ the `time` section, you will obtain a view like this:\n\n![](Images/6b5ab70d-40c6-4a23-9cd7-6fbee406239b.png)\n\
    \nYou can see that the `@Tag` has defined the `time` section and its description,\
    \ and the `@Operation` annotation has augmented the operation summary and description\
    \ sections. This shows how you can provide more information to consumers of your\
    \ endpoints using the MP-OAPI annotations and OpenAPI aware apps like the Swagger\
    \ UI.\n\n# The KeyCloak tab\n\nWe'll skip to the KeyCloak tab next because the\
    \ RestClient and JWT tabs include secured calls that require a JWT to access the\
    \ endpoints. When you access the KeyCloak tab for the first time, it should look\
    \ like the following:\n\n![](Images/75d20658-d086-43be-8eef-324fcae0bea6.png)\n\
    \nIt will not show any token information, and the status line just below the Refresh\
    \ checkbox should indicate (Not Authenticated). Click on the green Login button\
    \ to bring up the following Log In screen:\n\n![](Images/fc49cde6-aa33-4c09-8c30-6beca3e6a967.png)\n\
    \nEnter the following for the Username and Password fields, respectively:\n\n\
    *   `packt-mp-book`\n*   `password`\n\nThis ..."
