    **David R. Heffelfinger** is an independent consultant based in the Washington
    D.C. area. He is a Java champion, a member of the NetBeans Dream Team, and is
    a part of the JavaOne content committee.


    He has written several books on Java EE, application servers, NetBeans, and JasperReports.
