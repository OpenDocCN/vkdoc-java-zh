  trans: "\n# 总结\n\n在本章中，你学习了 Eclipse MicroProfile 如何促进云原生应用开发，无论其是混合云还是多云应用。我们还讨论了微服务、云原生开发和容器原生开发之间的关系，以及运行在容器上的微服务如何成为云原生开发的理想选择。你还了解了\
    \ Eclipse MicroProfile 与 12 要素应用以及无服务器和 FaaS 环境的关系。\n\n我们涵盖了引导你进入云原生应用之旅的八个步骤，以及\
    \ Eclipse MicroProfile 如何在每个步骤中提供帮助。此外，我们还讨论了在跨云应用中使用 Eclipse MicroProfile 时需要考虑的事项，何时在裸机、虚拟机与容器上运行\
    \ Eclipse MicroProfile，在混合云应用中运行 Eclipse MicroProfile 微服务时需要考虑的事项，在多云部署中运行 Eclipse\
    \ MicroProfile OpenTracing 时需要注意的挑战，以及最后在服务网格中使用 Eclipse MicroProfile 时需要考虑的事项。\n\
    \n在本书中，我们介绍了 MicroProfile（一个 Java 微服务规范）的起源及其诞生的历史背景。我们介绍了这个开源项目，包括其使命、治理、优势、如何为其做出贡献，以及其子项目的生命周期。然后，我们深入探讨了构成伞式/平台发布的每个\
    \ MicroProfile API/子项目，以及伞式发布之外的子项目。\n\n我们还介绍了市场上 MicroProfile 的当前实现，包括 Quarkus，并向你展示了如何“quark”一个由\
    \ MicroProfile Starter 生成的 MicroProfile 项目。我们讨论了 Conference Application，这是一个社区示例项目，展示了\
    \ MicroProfile 在不同供应商实现之间的互操作性。我们还提供了贯穿全文的代码示例以供参考和讨论，并提供了一个包含源代码的完整工作项目，该项目实现了所有\
    \ MicroProfile API，你可以自由访问、下载、编译并在开发工作中重用，从而快速上手 MicroProfile。随后，我们讨论了 MicroProfile\
    \ 提供的响应式功能及其未来发展，例如正在开发中的子项目和 MicroProfile 沙箱中的项目，以及其未来与 Jakarta EE 可能的关系。\n\n\
    最后，我们回顾了基于 MicroProfile 的应用和微服务如何非常适合在容器、云和无服务器/FaaS 部署中实现解决方案。无论你是 Java 微服务的新手还是经验丰富的\
    \ Java 开发者，你都可以利用从本书中获得的所有知识，开始开发基于这一新颖且由社区驱动的规范的微服务，以创建可观察、可扩展、安全且高可用的混合云和多云应用，从而更快地为你的业务创造价值。\n\
    \n# 问题\n\n1.  Eclipse MicroProfile 如何促进云原生应用开发？\n2.  云原生应用开发的两个互补关注点是什么？Eclipse\
    \ MicroProfile 如何契合这些关注点？\n3.  云原生应用开发的四个关键原则是什么？Eclipse MicroProfile 如何与之关联？\n\
    4.  Eclipse MicroProfile 如何为引导你进入云原生应用之旅的八个步骤中的每一步做出贡献？\n5.  Eclipse MicroProfile\
    \ 与 12 要素应用有何关系？\n6.  Eclipse MicroProfile 如何促进无服务器和 FaaS 环境？\n7.  在跨云环境中实施和运行\
    \ Eclipse MicroProfile 时，你应该考虑什么？\n8.  使用 Eclipse MicroProfile ... 时面临的挑战是什么？\n\
    \n# 评估\n\n# 第 1 章\n\n1.  一个企业级 Java 微服务具有以下特征：\n\n    *   使用 Java 语言编写。\n    *\
    \   可以使用任何 Java 框架。\n    *   可以使用任何 Java API。\n    *   必须达到企业级标准：可靠、可用、可扩展、安全、健壮且高性能。\n\
    \    *   必须满足 [`martinfowler.com/microservices/`](https://martinfowler.com/microservices/)\
    \ 中列出的微服务架构特征，具体如下：\n        *   通过服务进行组件化\n        *   围绕业务能力组织\n        *  \
    \ 产品而非项目\n        *   智能端点和哑管道\n        *   去中心化治理\n        *   去中心化数据管理\n   \
    \     *   基础设施自动化\n        *   为故障而设计\n        *   演进式设计\n2.  数字经济与数字化转型这两个术语描述了四种不同力量的融合...\n"
- fmt: '# Chapter 2


    1. The main means of communication for the MicroProfile community is their Google
    Group, called *Eclipse MicroProfile*. You can post a message to it by sending
    an email to `microprofile@googlegroups.com`. Another great way to get your voice
    heard is by attending the bi-weekly MicroProfile Hangout call. Please check the
    MicroProfile Google Calendar to find out the exact date, time, and meeting information
    to join.

    2. The MicroProfile Hangout call serves as a forum where topics brought up by
    attendees are discussed and decisions are made, from sub-project statuses and
    release contents to release dates and sub-project creation approvals.

    3. A sub-project (MicroProfile specification) lead or a group of leads are usually
    subject-matter experts in the topic at hand and are designated to serve as its
    facilitators. One important aspect to note is that the lead or leads of a working
    group (or sub-project for that matter) do not single-handedly shape or determine
    the evolution of a specification or what capabilities are included or not. They
    do not have veto power or a final say in the decisions made with respect to their
    specification. By sharing of ideas, expertise, past experiences, analysis of existing
    technologies, and best practices, the working group will come up with their best
    proposal possible.

    4. After the community discusses a new idea at length in the MicroProfile Google
    Group and/or the MicroProfile Hangout call, and it''s been determined that it
    is worth furthering the debate, the community decides to create a working group
    for this new idea, and a lead or a group of leads, who are usually subject-matter
    experts in the topic at hand, are designated to serve as its facilitators. The
    working group will establish a recurring weekly or bi-weekly meeting, which is
    entered in the MicroProfile Google Calendar. Anybody can attend these meetings,
    but there''s usually a core number of people that serve as the subject-matter
    experts that participate in these calls. After a few meetings, the working group
    decides whether or not the new functionality should be brought up to the MicroProfile
    Hangout call to discuss its proposal to become a MicroProfile sub-project. At
    the MicroProfile Hangout call, a sub-project proposal may be rejected or accepted.
    The acceptance of a sub-project means that it effectively addresses a need that
    enriches the specification towards its goal of optimizing enterprise Java for
    a microservices architecture. It is at this moment, that a sub-project becomes
    an official MicroProfile API. Once the sub-project becomes a MicroProfile API,
    then a determination is made whether it should be a standalone sub-project outside
    the umbrella or a sub-project included in the umbrella of MicroProfile releases.

    5. Eclipse MicroProfile follows a time-boxed rapid incremental release schedule,
    which is public and listed on the Eclipse Foundation MicroProfile Project page.
    Major Eclipse MicroProfile releases, for example, from 1.x to 2.x, include major
    updates to MicroProfile APIs that may introduce breaking changes. Minor releases,
    that is, point releases, include small API updates or new APIs that make the predetermined
    release date. Currently, the MicroProfile community release windows are in February,
    June, and November of every year for minor and/or major releases.

    6. The sandbox repository, which is a GitHub repository, is for incubating ideas
    and code examples that will eventually turn into a separate repository, contributing
    to a new specification. Anybody can open pull requests and use the sandbox for
    experimentation of new ideas and to share code and documentation, which can be
    used as part of the discussion in the community Google Group, the MicroProfile
    Hangout calls, or working group meetings.

    7. The reason for releasing a sub-project outside the MicroProfile umbrella/platform
    release is that it gives the community and end users an opportunity to utilize
    and test the new technology, hence proving it in real applications before it can
    be considered for inclusion to the umbrella. The MicroProfile project encourages
    that a new sub-project specification at least release one version outside the
    umbrella before its inclusion in the umbrella/platform release can be considered.

    8. The MicroProfile Starter is a samples source code generator, whose goal is
    to aid developers to quickly get started using and exploiting the capabilities
    of the community-driven open source specification for enterprise Java microservices,
    Eclipse MicroProfile, by generating working sample code in a Maven project.


    # Chapter 3


    1. The default sources of configuration properties are environment variables,
    Java system properties, and the `META-INF/microprofile-config.properties` file.

    2. You can provide a custom `ConfigSource` implementation that maps property names
    to values in the custom source.

    3. Strings are not the only supported types, as MP-Config supports type conversion
    via a pluggable SPI, and provides several default conversions by default.

    4. You do not need to provide a value for an injected property if you have given
    a `defaultValue`, or have injected the property as an `Optional<?>` value.

    5. Complex property types can be handled using a custom `Converter<?>` implementation
    that takes a string and returns the complex type.

    6. When an annotation is specified at the class ...


    # Chapter 4


    1. The wire format is not usable in environments that only look at the HTTP status
    code to determine the HC status.

    2. An MP-HC response can include arbitrary properties using the `HealthCheckResponse#withData()`
    methods.

    3. You can create a `HealthCheck` implementation for each service, and the MP-HC
    feature will logically combine them to produce an overall status response.

    4. A JWT is a JSON Web Token, a JSON-formatted object that has a header, payload,
    and signature component.

    5. A claim is a single named value from the JWT payload.

    6. Anything that can be represented in JSON can be used in a JWT.

    7. The single main step in authenticating a JWT is validating that it is signed
    via the RS256 algorithm based on a configured public key.

    8. One could look at claims other than the groups claim to make checks to add
    application specific authorization decisions.


    # Chapter 5


    1. Distributed tracing provides a micro-view of what happened with a request from
    end to end, whereas metrics expose scalar numerical values from a single component.

    2. Distributed tracing systems usually provide features such as the root cause
    and critical path analysis, contextualized logging, distributed context propagation,
    and service dependency diagrams.

    3. Automatically traced are JAX-RS server endpoints and MicroProfile Rest clients.
    Some vendors can also automatically trace JAX-RS clients.

    4. These tags are added for every REST request: `http.method`, `http.status_code`,
    `http.url`, `component`, `span.kind`, and `error` if an exception is thrown.

    5. Explicit instrumentation can be added by using the `@Traced` annotation or
    injecting the tracer and creating ...'
