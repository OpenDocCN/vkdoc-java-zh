    \ >-----------------\n[INFO] Building JWT Propagation 1.0-SNAPSHOT\n[INFO] --------------------------------[\
    \ war ]---------------------------------\n[INFO]\n[INFO] --- exec-maven-plugin:1.6.0:java\
    \ (default-cli) @ jwt-propagation ---\nSetting exp: 1555684338 / Fri Apr 19 07:32:18\
    \ PDT 2019\n    Added claim: sub, value: 24400320\n    Added claim: customIntegerArray,\
    \ value: [0,1,2,3]\n    Added claim: customDoubleArray, value: [0.1,1.1,2.2,3.3,4.4]\n\
