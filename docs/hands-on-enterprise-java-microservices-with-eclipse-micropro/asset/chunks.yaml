  trans: '

    # 伞式发布与伞外项目


    Eclipse MicroProfile 由一组规范组成，每个规范都有特定的关注点。例如，Eclipse MicroProfile Config 规范涵盖了与微服务参数配置相关的所有内容。某个版本的规范可以作为
    Eclipse MicroProfile 伞式发布的一部分被包含在内，也可以在伞外发布。具体来说，最新的 Eclipse MicroProfile 2.2
    伞式发布于 2019 年 2 月 12 日发布，包含了以下规范：


    *   Eclipse MicroProfile Open Tracing 1.3

    *   Eclipse MicroProfile Open API 1.1

    *   Eclipse MicroProfile Rest Client 1.2

    *   Eclipse MicroProfile Fault Tolerance 2.0

    *   Eclipse MicroProfile Config 1.3

    *   Eclipse MicroProfile Metrics 1.1

    *   Eclipse MicroProfile JWT Propagation 1.1

    *   Eclipse MicroProfile Health Check 1.0

    *   CDI 2.0

    *   JSON-P 1.1

    *   JAX-RS 2.1

    *   JSON-B 1.0


    然而，Eclipse MicroProfile 也有其他在伞式发布之外发布的规范。例如，我们将在第 9 章*响应式编程与未来发展*中介绍的 Eclipse
    MicroProfile Reactive Streams Operators 1.0，就是一个最近在伞外发布的规范。那么，为什么 MicroProfile
    允许在伞外发布规范呢？原因在于，先在伞外发布，可以让社区和最终用户有机会使用和测试新技术，从而在实际应用中验证它，之后再考虑将其纳入伞式发布。


    # MicroProfile Starter


    MicroProfile Starter 是一个示例源代码生成器，其目标是通过在 Maven 项目中生成可工作的示例代码，帮助开发者快速上手使用和利用社区驱动的企业级
    Java 微服务开源规范 Eclipse MicroProfile 的功能。


    自 2016 年中该项目创建以来，MicroProfile Starter 的想法就已存在，并在 2016 年 Devoxx BE（2016 年 11 月
    7 日那周）上进行了公开讨论。在可用的前两周内，世界各地的开发者通过 MicroProfile Starter 项目创建了超过 1200 个项目，这很好地积极表明了其在全球范围内的采用情况。


    # MicroProfile Starter 快速导览


    让我们快速浏览一下 MicroProfile Starter：


    1.  当你访问 **MicroProfile Starter "Beta"** 页面 [`start.microprofile.io/`](https://start.microprofile.io/)
    时，你将看到以下登录页面：


    ![](img/5bc19663-c627-42b8-a08a-350ce79a877c.png)


    你可以接受 Maven 相关参数（[`maven.apache.org/guides/mini/guide-naming-conventions.html`](https://maven.apache.org/guides/mini/guide-naming-conventions.html)）`groupId`
    和 `artifactId` 的默认值，或者根据自己的喜好更改它们。`groupId` 参数用于在所有项目中唯一标识你的项目，而 `artifactId`
    是不带 MicroProfile 版本号的 JAR 文件名。在本导览中，请接受所有默认值。


    2.  接下来，从下拉列表中选择 **MicroProfile 版本**：


    ![](img/1331ec98-e279-496c-ac0a-801886cbfb85.png)


    在本导览中，请选择 MicroProfile 版本 MP 2.1。请注意，根据你选择的 MicroProfile 版本，**示例规范**部分列出的规范数量会有所不同。这个数量取决于每个
    MicroProfile 伞式发布中包含的 API 数量。要了解每个版本包含了哪些 API，请参考 MicroProfile 社区演示文稿（[`docs.google.com/presentation/d/1BYfVqnBIffh-QDIrPyromwc9YSwIbsawGUECSsrSQB0/edit#slide=id.g4ef35057a0_6_205`](https://docs.google.com/presentation/d/1BYfVqnBIffh-QDIrPyromwc9YSwIbsawGUECSsrSQB0/edit#slide=id.g4ef35057a0_6_205)）。


    3.  然后，从下拉列表中选择 **MicroProfile 服务器**：


    ![](img/c101fb03-4a50-4586-898c-c49210885448.png)


    在本导览中，请选择 Thorntail V2，这是 Red Hat 用于实现 Eclipse MicroProfile 规范的开源项目。


    4.  保持所有**示例规范**复选框处于选中状态（即，不要取消选中任何复选框）：


    ![](img/c64b1d4b-bb8c-46bd-a45e-9a4cd9dad36e.png)


    这将为 MicroProfile 2.1 版本中包含的所有 API 生成示例工作代码。


    5.  使用 MicroProfile Starter 生成示例源代码过程的最后一步是点击 **下载** 按钮，这将创建一个 ZIP 归档文件。确保将 `demo.zip`
    文件保存到本地驱动器。然后，在本地驱动器中解压 `demo.zip`。其内容应如下所示：


    ![](img/560eb505-0fe8-43ce-994c-84a6db717b1f.png)


    请注意，生成的内容中有一个 `readme.md` 文件。该文件包含如何编译和运行生成代码的说明，其中包含一个示例 Web 应用程序，该程序演示了 Eclipse
    MicroProfile 的不同功能。


    6.  切换到解压 demo 项目的目录。在我的例子中，它位于我的 `Downloads` 目录中：


    ```

    $ cd Downloads/demo

    ```


    7.  输入以下命令编译生成的示例代码：


    ```

    $ mvn clean package

    ```


    8.  运行微服务：


    ```

    $ java -jar target/demo-thorntail.jar

    ```


    9.  几秒钟后，你将看到以下消息：


    ```

    $ INFO  [org.wildfly.swarm] (main) WFSWARM99999: Thorntail is Ready

    ```


    这表明微服务已启动并正在运行。


    10. 打开你喜欢的 Web 浏览器，并将其指向 `http://localhost:8080/index.html`。


    这将打开示例 Web 应用程序，如下所示：


    ![](img/37b7bd6b-1714-437d-aacf-8dd2123ff8cd.png)


    11. 要查看 MicroProfile Config 的功能，请点击 **注入的配置值**。将打开一个窗口选项卡，显示如下内容：


    ![](img/7bf94342-0d9e-43ad-8c5e-0cf0bc67be4a.png)


    12. 同样，如果你点击 **通过查找获取配置值**，将显示另一个窗口选项卡，如下所示：


    ![](img/d58d0ff0-17c1-4cf7-8a1c-647dfc6f5e2a.png)


    我们之前看到的参数值的*注入值*和*查找值*定义在 `./demo/src/main/resources/META-INF/microprofile-config.properties`
    文件中，如下所示：


    ```

    $ cat ./src/main/resources/META-INF/microprofile-config.properties

    injected.value=Injected value

    value=lookup value

    ```

    '
- fmt: "13. Imagine that you need to use a different value for the `value` parameter\
    \ between development and system testing. You could do this by passing a parameter\
    \ in the command line when starting the microservice as follows (ensure to exit\
    \ the running application by pressing *Ctrl* + *C* on the Terminal window first):\n\
    \n```\n$ java -jar target/demo-thorntail.jar -Dvalue=hola\n```\n\n14. Now, when\
    \ you click on Config values by lookup, another window tab is displayed:\n\n![](Images/faf2d928-0fb2-49ef-82bc-9a67409b6aa6.png)\n\
    \nNote that the source code executing this logic is located in the generated `./src/main/java/com/example/demo/config/ConfigTestController.java`\
    \ file.\n\n15. To see the capabilities of MicroProfile Fault Tolerance, click\
    \ on Fallback after timeout. A window tab will open with the following display:\n\
    \n![](Images/dc1dcb42-0d68-4030-b163-186cae70d6bd.png)\n\nFor more information\
    \ on the MicroProfile Config API, please refer to its documentation ([https://github.com/eclipse/microprofile-config/releases/download/1.3/microprofile-config-spec-1.3.pdf](https://github.com/eclipse/microprofile-config/releases/download/1.3/microprofile-config-spec-1.3.pdf)).\n\
    \nThe sample code is exercising the `@Fallback` annotation in combination with\
    \ `@Timeout`. Here's the sample code:\n\n```\n@Fallback(fallbackMethod = \"fallback\"\
    ) // fallback handler\n   @Timeout(500)\n   @GET\n   public String checkTimeout()\
    \ {\n     try {\n       Thread.sleep(700L);\n     } catch (InterruptedException\
    \ e) {\n       //\n     }\n     return \"Never from normal processing\";\n   }\n\
    \   public String fallback() {\n   return \"Fallback answer due to timeout\";\n\
    \   }\n```\n\nThe `@Timeout` annotation specifies that if the method takes longer\
    \ than 500 milliseconds to execute, a timeout exception should be thrown. This\
    \ annotation can be used together with `@Fallback`, which, in this case, invokes\
    \ the fallback handler called `fallback` when the timeout exception occurs. In\
    \ the previously generated sample code, the timeout exception will always happen\
    \ because the method is executing—that is, sleeping for 700 milliseconds, which\
    \ is longer than 500 milliseconds.\n\nNote that the source code executing this\
    \ logic is located in the generated `./src/main/java/com/example/demo/resilient/ResilienceController.java`\
    \ file.\n\nFor more information on the MicroProfile Fault Tolerance API, please\
    \ refer to its documentation ([https://github.com/eclipse/microprofile-opentracing/releases/download/1.2/microprofile-opentracing-spec-1.2.pdf](https://github.com/eclipse/microprofile-opentracing/releases/download/1.2/microprofile-opentracing-spec-1.2.pdf)).\n\
    \nThe MicroProfile community welcomes your feedback as well as collaboration or\
    \ contributions toward the continued development of the MicroProfile Starter project.\
    \ To give feedback, you need to click on the Give Feedback button in the top-right\
    \ of the MicroProfile Starter \"Beta\"([https://start.microprofile.io/](https://start.microprofile.io/))\
    \ landing page and create an issue.\n\nThe MicroProfile Starter project groups\
    \ and prioritizes requested items and fixes in milestones with the goal of releasing\
    \ continuously. The MicroProfile Starter working group meets on a regular basis\
    \ and if you'd like to help the project with your development skills, please send\
    \ an email to `microprofile@googlegroups.com` or join the discussion on its Gitter\
    \ channel ([https://gitter.im/eclipse/microprofile-starter](https://gitter.im/eclipse/microprofile-starter)).\
    \ The project information, including the location of its source code, can be found\
    \ at [https://wiki.eclipse.org/MicroProfile/StarterPage](https://wiki.eclipse.org/MicroProfile/StarterPage).\n\
    \n# Summary\n\nIn this chapter, we learned about the lightweight governance processes\
    \ of the Eclipse MicroProfile project, its rapid approach to innovation, and how\
    \ sandboxes are used to foster collaboration and encourage code development and\
    \ documentation. We also learned about its sub-projects, the leaders of these\
    \ sub-projects, and how they can be released either standalone or as part of an\
    \ Eclipse MicroProfile umbrella release.\n\nIn addition, you learned about MicroProfile\
    \ Starter, which is a Maven project generation tool that provides code samples\
    \ so that developers can get their MicroProfile applications started quickly.\
    \ Finally, we got a sneak-peek at how an application's properties can be easily\
    \ modified using Eclipse MicroProfile Config constructs, ...\n\n# Questions\n\n\
    1. What are the main means of communication for the MicroProfile community?\n\
    2. What is the goal of the bi-weekly MicroProfile Hangout call?\n3. What is the\
    \ role of a sub-project (MicroProfile specification) lead/leads?\n4. What is the\
    \ process followed by a new MicroProfile specification proposal?\n5. What is the\
    \ release schedule that the MicroProfile project follows?\n6. What is the goal\
    \ of the MicroProfile sandbox?\n7. What is the difference between projects released\
    \ under the umbrella/platform MicroProfile release and outside it?\n8. What is\
    \ MicroProfile Starter and what benefits does it provide?\n\n# Section 2: MicroProfile's\
    \ Current Capabilities\n\nThis section goes over the capabilities of the project\
    \ and its sub-projects, along with code examples.\n\nThis section contains the\
    \ following chapters:\n\n* [Chapter 3](#73f2287d-1676-47c9-9887-cf74aa0aa6f0.xhtml),\
    \ *MicroProfile Config and Fault Tolerance*\n* [Chapter 4](#04ecd2bc-06b2-402e-a64f-50c532d7dabd.xhtml),\
    \ *MicroProfile Health Check and JWT Propagation*\n* [Chapter 5](#48206e01-5c6f-4860-8f87-1c2067f24034.xhtml),\
    \ *MicroProfile Metrics and OpenTracing*\n* [Chapter 6](#88a56ac7-86bd-4d62-bf72-966f47a60798.xhtml),\
    \ *MicroProfile OpenAPI and the Type-Safe REST Client*\n\n# MicroProfile Config\
    \ and Fault Tolerance\n\nIn this chapter, we will start by introducing MicroProfile\
    \ Config as it is the basis for the configuration of other MicroProfile features,\
    \ in addition to application-level configuration. The MicroProfile Config specification\
    \ provides a common way to retrieve configuration coming from a variety of sources\
    \ (properties files, system properties, environment variables, databases, and\
    \ so on).\n\nThe topics we will cover include the following:\n\n* Reading configuration\
    \ from your application\n* Providing additional sources of configuration to your\
    \ application\n* Providing conversion from plain configuration into application-specific\
    \ objects\n\n# Understanding Eclipse MicroProfile Config\n\nEvery application\
    \ needs some external configuration to adapt its behavior to the runtime platform\
    \ it's running on. It can range from the HTTP endpoints that the application must\
    \ connect to, or the size of some internal structures.\n\nThese configuration\
    \ parameters can also come from different sources:\n\n* From the operating system\
    \ or the container in a cloud-native environment (through the use of environment\
    \ variables)\n* From the Java virtual machine (with system properties)\n* From\
    \ some external configuration files (such as the Java properties file)\n* From\
