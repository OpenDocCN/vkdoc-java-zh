  trans: '

    # MicroProfile 上下文传播


    本规范位于 MicroProfile 平台版本体系之外，目前仍处于提议或草案阶段。我们将在本章稍后的*MicroProfile 未来发展*部分更详细地讨论此规范，但在此先进行一个高层级的介绍。


    MicroProfile 上下文传播规范引入了用于在非线程关联的工作单元之间传播上下文的 API。它使得传播传统上与当前线程关联的上下文成为可能，这些上下文可以跨越各种类型的工作单元，例如
    `CompletionStage`、`CompletableFuture`、`Function` 和 `Runnable`，无论最终由哪个特定线程执行它们。


    # MicroProfile 响应式消息传递示例


    在本节中，我们将介绍一些使用 MP-RM 创建生成和消费消息的 CDI Bean 的示例。


    假设您希望一个 CDI Bean 充当 `Message<String>` 的源，以便每当调用其 `publishMessage(String)` 方法时，一条
    MP-RM 消息就会被发布到某个 MP-RM 通道。为此，我们需要定义一个连接器，在 CDI Bean 和 MP-RM 层之间建立桥梁。以下代码展示了一个执行此操作的传入消息连接器示例：


    ```

    package io.pckt.reactive;import javax.enterprise.context.ApplicationScoped;import
    javax.inject.Inject;import org.eclipse.microprofile.config.Config;import org.eclipse.microprofile.reactive.messaging.Message;import
    org.eclipse.microprofile.reactive.messaging.spi. ...

    ```


    # MicroProfile 未来发展


    如第 2 章*治理与贡献*所述，提交给 Eclipse MicroProfile 项目的新想法首先会在 MicroProfile 沙箱中尝试，遵循实现优先的创新方法。沙箱演练为实施者和社区提供了讨论、分析和评估这个新想法如何融入
    MicroProfile 项目的机会。如果在沙箱演练结束时，社区认为这个新想法值得添加到项目中，则会为其创建一个特定的 MicroProfile 子项目。该子项目必须至少发布一个版本，才能被考虑添加到
    MicroProfile 平台版本中。从高层级来看，这就是新想法和未来发展在 MicroProfile 项目下遵循的流程。


    在接下来的几节中，我们将讨论两类项目：一类是目前属于 MicroProfile 子项目但位于 MicroProfile 平台版本之外的项目（可以将其视为已从
    MicroProfile 沙箱毕业的项目），另一类是仍处于 MicroProfile 沙箱中的项目。最后，我们将讨论 Eclipse MicroProfile
    与 Jakarta EE 之间的当前关系，以及它们的路线图是否可能交汇。


    # 平台版本之外的项目


    在本节中，我们将介绍在撰写本文时位于 Eclipse MicroProfile 平台版本之外的项目。这些项目如下：


    *   响应式流操作符

    *   响应式消息传递

    *   长时间运行操作

    *   上下文传播

    *   GraphQL


    响应式流操作符和响应式消息传递项目已在本章前面的部分讨论过，因此在本节中，我们将仅介绍长时间运行操作、上下文传播和 GraphQL。


    # 长时间运行操作


    在松散耦合的服务环境中，**长时间运行操作**（**LRA**）规范背后的动机是，通过由对多个微服务的调用组成的业务流程提供一致的结果，而无需锁定数据。理解
    LRA 的一种方式是将其视为*微服务的事务*。需要 LRA 的场景示例包括：


    *   在线订购一本书需要从库存中扣减一本书、处理付款，最后发货。所有这些任务都需要原子性地发生，换句话说，它们需要一起处理，如果任何任务失败，则所有任务都必须撤销。

    *   预订航班需要从飞机的可用座位列表中移除一个座位、为旅客选择和分配特定座位、处理付款以及创建记录定位码。同样，所有这些任务都必须在同一个长时间运行操作内完成。


    上述示例不仅需要原子性地发生，而且即使其中间步骤有任何失败，它们也必须生成一个数据一致的结果。


    MicroProfile LRA 当前提出的解决方案灵感来源于 *OASIS Web 服务复合应用程序框架技术委员会*（[`www.oasis-open.org/committees/tc_home.php?wg_abbrev=ws-caf`](https://www.oasis-open.org/committees/tc_home.php?wg_abbrev=ws-caf)），即
    *Web 服务**长时间运行操作事务模型*（[`www.oasis-open.org/committees/document.php?document_id=12794`](https://www.oasis-open.org/committees/document.php?document_id=12794)），但已进行更新以更适合在基于微服务的架构中使用。


    有关 MicroProfile LRA 规范的更多信息，请参阅 [`github.com/eclipse/microprofile-lra/blob/master/spec/src/main/asciidoc/microprofile-lra-spec.adoc`](https://github.com/eclipse/microprofile-lra/blob/master/spec/src/main/asciidoc/microprofile-lra-spec.adoc)。


    MicroProfile 长时间运行操作规范模型包括三个主要实体：补偿器、逻辑协调器和客户端。客户端可以通过两种不同的方式显式启动一个新的 LRA：


    *   通过注解，或

    *   通过 API 调用


    任何一种方式都会创建一个新的 LRA。如果某个服务执行了可能需要稍后撤销的操作，则客户端需要向 LRA 注册一个补偿器。如果客户端选择关闭或取消 LRA，补偿器将撤销该服务在
    LRA 范围内执行的工作，或补偿任何未完成的工作。


    以下是全局范围内一些主要的 LRA 注解：


    *   `@LRA` 控制 LRA 的生命周期。

    *   `@Compensate` 指示如果 LRA 被取消，则应调用该方法。

    *   `@Complete` 指示如果 LRA 被关闭，则应调用该方法。

    *   `@Forget` 指示该方法可以释放为此 LRA 分配的任何资源。

    *   `@Leave` 指示此类不再对此 LRA 感兴趣。

    *   `@Status` 在调用带注解的方法时报告状态。


    您可以将这些注解与 JAX-RS 和非 JAX-RS 方法一起使用。此外，本规范支持 JAX-RS 的异步和响应式特性、LRA 嵌套以及超时。最后，值得一提的是，LRA
    规范通过对参与协议的实体施加某些要求来确保原子性和最终一致性。作为一个 MicroProfile 项目，MicroProfile LRA 规范在撰写本文时处于提议或草案状态。


    # 上下文传播


    MicroProfile 上下文传播规范的目标是在非线程关联的工作单元之间传播上下文。在响应式模型中，逻辑的执行被拆分为多个工作单元，这些工作单元链接在一起以组装成一个响应式管道。每个工作单元都在一个上下文中执行，该上下文通常是不可预测的，并且取决于所使用的特定响应式引擎。某些单元可能使用等待完成的线程的上下文运行，或者使用已完成并触发依赖单元的先前单元的上下文运行，或者根本没有上下文。MicroProfile
    上下文传播规范使得线程上下文传播能够以类型安全的方式轻松完成，从而减少样板代码……

    '
- fmt: '# GraphQL


    GraphQL is an open source data query and manipulation language for APIs, and a
    runtime for fulfilling queries with existing data. It interprets strings from
    the client and returns data in an understandable, predictable, and predefined
    manner. GraphQL is an alternative to REST, though not necessarily a replacement.
    The goal of the MicroProfile GraphQL specification is to provide a set of APIs
    to enable users to quickly develop portable GraphQL-based applications in Java.
    As a MicroProfile project, the MicroProfile GraphQL specification is currently,
    at the time of writing, in a proposed or draft state.


    GraphQL is based on a Facebook specification. For more information on this, please
    refer to `https://graphql.github.io/graphql-spec`. A more general overview of
    GraphQL can be found on [https://graphql.org/](https://graphql.org/).


    GraphQL and REST have many similarities and are both widely used in modern microservice-based
    applications.


    ## Differences between GraphQL and REST


    Here are the main differentiating features of GraphQL when compared to REST:


    * **Schema-driven**: The schema acts as a contract between the server and its
    clients.

    * **Single HTTP endpoint**: A single endpoint and access to data and operations
    are achieved through the query language.

    * **Flexible data retrieval**: Enables the client to select data in the response
    with a fine level of granularity, thereby avoiding over- or under-fetching data.

    * **Reduction of server requests**: The language allows the client to aggregate
