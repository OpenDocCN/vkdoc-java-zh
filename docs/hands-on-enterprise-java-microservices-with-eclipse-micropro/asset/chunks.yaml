- fmt: "# Helidon\n\nOracle Corporation are the sponsors of the open source Helidon\
    \ project, which implements the Eclipse MicroProfile specification. Helidon is\
    \ a set of Java libraries that enable a developer to write microservices. It leverages\
    \ Netty, a non-blocking I/O client server framework. Helidon is an application\
    \ assembler in that it generates application JAR. Once you have built the application\
    \ JAR, you can execute it with the following command:\n\n```\n$ java -jar <executable\
    \ JAR file>\n```\n\nHelidon comes in two flavors: SE and MP. Helidon SE is the\
    \ functional programming style provided by all Helidon libraries and it provides\
    \ a microservices framework called MicroFramework. Helidon MP implements the MicroProfile\
    \ specification for microservices, and it's built on top of Helidon libraries.\
    \ There is no sample project generator tool, but Helidon provides a rich and thorough\
    \ set of documentation manuals.\n\nThe documentation for Helidon can be found\
    \ at [https://helidon.io/docs/latest/#/about/01_overview](https://helidon.io/docs/latest/#/about/01_overview).\n\
    \nHelidon SE provides a WebServer, which is an asynchronous and reactive API for\
    \ creating web applications. Helidon MP provides a MicroProfile server implementation\
    \ that encapsulates the Helidon WebServer.\n\n# Generating sample code for the\
    \ current implementations\n\nAs described in the previous sections, most MicroProfile\
    \ implementations do not provide their own sample project generators. Instead,\
    \ they just provide documentation. This is where the MicroProfile Starter comes\
    \ to the rescue!\n\nThe MicroProfile Starter is sponsored by the MicroProfile\
    \ community and is a tool that generates sample project and source code for the\
    \ MicroProfile specifications for all of the MicroProfile implementations that\
    \ have passed the MicroProfile TCK. In [Chapter 2](#0f9d569f-1ffb-4662-8cea-c8b230a4d627.xhtml),\
    \ *Governance and Contributions*, we gave you a tour of the MicroProfile Starter.\
    \ To avoid being repetitive, we just want to point out that you can select the\
    \ MicroProfile version in the drop-down menu as follows: ...\n\n# Other projects\
    \ that implement MicroProfile\n\nSmallRye is an open source project that develops\
    \ implementations of Eclipse MicroProfile usable by any vendor or project. It's\
    \ a community effort and everyone is welcome to participate and contribute to\
    \ SmallRye, [https://smallrye.io](https://smallrye.io). As an example of this,\
    \ the community recently contributed the Extensions for MicroProfile project into\
    \ SmallRye, hence enriching its functionality with extensions for Config Sources,\
    \ OpenAPI, Health, JAX-RS, and REST Client.\n\nThe Extensions for MicroProfile\
    \ project website is [https://www.microprofile-ext.org](https://www.microprofile-ext.org),\
    \ and its GitHub is [https://github.com/microprofile-extensions](https://github.com/microprofile-extensions).\n\
    \nSmallRye implementations are tested against, and have passed, the Eclipse MicroProfile\
    \ TCKs.\n\nOpen source projects that consume SmallRye are Thorntail ([https://thorntail.io](https://thorntail.io)),\
    \ WildFly ([https://wildfly.org](https://wildfly.org)), and Quarkus ([https://quarkus.io](https://quarkus.io)).\n\
    \n# Quarkus\n\nThe open source Quarkus project made its debut in 2019. Quarkus\
    \ is a Kubernetes-native Java stack with that can compile to native machine language\
    \ or building to HotSpot (OpenJDK). When using Quarkus, your application consumes\
    \ very little memory, has great performance that allows it to handle a high throughput\
    \ of invocations, and has a very fast start up time (that is, boot plus first\
    \ response time), making Quarkus a great runtime for containers, as well as cloud-native\
    \ and serverless deployments. Quarkus also provides an extension framework that\
    \ allows the *quarking* of libraries and projects to make them work seamlessly\
    \ with Quarkus.\n\nQuarkus's mission is to transform your full application and\
    \ the libraries it uses into an optimal ...\n\n# How to quark a generated MicroProfile\
    \ project\n\nBefore we start with the steps on how to *quark* a generated MicroProfile\
    \ project by the MicroProfile Starter, we need to first make sure to have `GRAALVM_HOME`\
    \ installed, defined, and configured in your environment. To this end, follow\
    \ these steps:\n\n1. Go to `https://github.com/oracle/graal/releases` and download\
    \ the latest release of GraalVM for your operating system.\n\n2. Unzip the downloaded\
    \ file into a sub-directory of your choosing. By the way, the unzipping will create\
    \ a sub-directory for GraalVM, `/Users/[YOUR HOME DIRECTORY]/graalvm-ce-1.0.0-rc13`,\
    \ for example:\n\n```\n$ cd $HOME\n$ tar -xzf graalvm-ce-1.0.0-rc16-macos-amd64.tar.gz\n\
    ```\n\n3. Open a terminal window and create an environment variable called `GRAALVM_HOME`,\
    \ for example:\n\n```\n$ export GRAALVM_HOME=/Users/[YOUR HOME DIRECTORY]/graalvm-ce-1.0.0-rc13/Contents/Home\n\
    ```\n\nNow that we have installed GraalVM, we can move on to the steps on how\
    \ to *quark* a generated MicroProfile project with MicroProfile Starter:\n\n1.\
    \ First, point your browser to [https://start.microprofile.io](https://start.microprofile.io)\
    \ and select Thorntail as the MicroProfile Server.\n\nYou can leverage the following\
    \ steps to *quark* any existing Java application as well.\n\nIf you don't recall\
    \ how to do this, go to [Chapter 2](#0f9d569f-1ffb-4662-8cea-c8b230a4d627.xhtml),\
    \ *Governance and Contributions*, and follow the instructions in the *Quick tour\
    \ of the MicroProfile Starter* section up to step 5, where the `demo.zip` file\
    \ is downloaded to your local `Downloads` directory.\n\n2. Expand the `demo.zip`\
    \ file that the MicroProfile Starter generated under your `Downloads` local directory\
    \ using your favorite unzipping tool. If your `demo.zip` file didn't get automatically\
    \ expanded, here are the commands to do it (assuming Linux; for Windows, please\
    \ use the equivalent commands):\n\n```\n$ cd $HOME/Downloads\n$ unzip demo.zip\n\
    ```\n\nThis will create a `demo` sub-directory with an entire directory tree structure\
    \ under it with all the source files needed to build and run the Thorntail sample\
    \ MicroProfile project using Maven.\n\n3. Instead of making changes in the `demo`\
    \ sub-directory, let's create a second directory called `Qproj4MP` alongside the\
    \ `demo` sub-directory, as follows:\n\n```\n$ mkdir $HOME/Downloads/Qproj4MP\n\
    ```\n\nThis should create a sub-directory called `Qproj4MP` at the same level\
    \ as your existing `demo` sub-directory in your `Downloads` directory.\n\n4. Change\
    \ your directory to `Qproj4MP` and create an empty Quarkus project by entering\
    \ the following commands:\n\n```\n$ cd $HOME/Downloads/Qproj4MP\n$ mvn io.quarkus:quarkus-maven-plugin:0.12.0:create\
    \ \\\n -DprojectGroupId=com.example \\\n -DprojectArtifactId=demo \\\n -Dextensions=\"\
    smallrye-health, smallrye-metrics, smallrye-openapi, smallrye-fault-tolerance,\
    \ smallrye-jwt, resteasy, resteasy-jsonb, arc\"\n```\n\n5. Within the `Qproj4MP`\
    \ directory, delete the `src` sub-directory and replace it with the `src` sub-directory\
    \ from the Thorntail sample MicroProfile project by entering the following commands:\n\
    \n```\n$ cd $HOME/Downloads/Qproj4MP  # ensuring you are in the Qproj4MP sub-directory\n\
    $ rm -rf ./src\n$ cp -pR $HOME/Downloads/demo/src .\n```\n\n6. Quarkus and Thorntail\
    \ differ in their expectations of where some configuration and web app-related\
    \ files need to be. So, in order to make Quarkus happy, let's copy some files\
    \ around by entering the following commands:\n\n```\n$ cd $HOME/Downloads/Qproj4MP\
    \ # ensuring you are in the Qproj4MP sub-directory\n$ mkdir src/main/resources/META-INF/resources\n\
    $ cp /Users/csaavedr/Downloads/demo/src/main/webapp/index.html src/main/resources/META-INF/resources\n\
    $ cp -p src/main/resources/META-INF/microprofile-config.properties src/main/resources/application.properties\n\
    ```\n\nWe could have moved these files from their original locations, but we chose\
    \ to just copy them for this example."
