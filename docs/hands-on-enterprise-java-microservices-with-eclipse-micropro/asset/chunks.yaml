- fmt: '# Thorntail


    Red Hat 是开源项目 Thorntail 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Thorntail 是一个应用程序组装器，它仅打包应用程序所需的服务器运行时组件，并创建一个可运行的
    JAR（即 uberjar），你可以通过调用以下命令来执行它：


    ```

    $ java -jar <executable JAR file>

    ```


    Thorntail 不仅兼容 MicroProfile，还可以在应用程序中包含 MicroProfile 之外的功能。它引入了“分片”（fraction）的概念，分片是一个特定的库，包含你想要包含在应用程序中的功能。分片作为依赖项包含在应用程序的
    Maven POM 文件中。除了 MicroProfile 之外...


    # Open Liberty


    IBM 是开源项目 Open Liberty 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Open Liberty 是 IBM
    WebSphere Liberty 应用服务器的上游开源项目。Open Liberty 是一个应用服务器，能够生成包含你的应用程序以及嵌入式 Open Liberty
    服务器的 uberjar。要运行该 uberjar，你需要输入以下命令：


    ```

    $ java -jar <executable JAR file>

    ```


    此命令会将 JAR 文件解压到你的用户临时目录，然后从该目录执行应用程序。


    请确保 JAR 文件的路径中没有空格，否则启动过程将失败。


    生成的 uberjar 只能包含由 `server.xml` 文件中定义的功能所决定的应用程序服务器功能子集。要使用这一最小功能集构建 uberjar，你需要在运行
    Maven 时使用 `minify-runnable-package` 配置文件。


    Open Liberty 的文档非常详尽，包含大量指南和参考文档。


    你可以在 [https://openliberty.io/docs/](https://openliberty.io/docs/) 找到 Open Liberty
    文档。


    在他们的文档中，有一个专门介绍 MicroProfile 指南的部分，其中提供了文档齐全的教程。


    # Apache TomEE


    Tomitribe 是开源项目 TomEE 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Apache TomEE 由 Apache
    Tomcat 组装而成，并添加了 Java EE 功能。TomEE 已通过 Java EE 6 Web Profile 认证。正如其 GitHub 描述所言：“Apache
    TomEE 是一个轻量级但功能强大的 JavaEE 应用服务器，拥有丰富的工具集。”你可以下载多个不同版本的 TomEE；例如，TomEE、TomEE+ 和
    TomEE WebApp，但我们感兴趣的是 TomEE MicroProfile。对于 MicroProfile，TomEE 会为你的微服务生成一个 uberjar，你可以按如下方式运行它：


    ```

    $ java -jar <executable JAR file>

    ```


    尽管 TomEE MicroProfile 的文档很少，但有一套详尽的...


    # Payara Micro


    Payara 是开源项目 Payara Micro 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Payara Server 基于开源应用服务器
    GlassFish。Payara Micro 基于 Payara Server，但它是其精简版。正如其网站所述：“Payara Micro 是 Payara
    Server 的微服务就绪版本。”


    Payara Micro 的工作方式是：先启动一个 Payara Micro 实例，然后将你的 MicroProfile 微服务作为 WAR 文件部署到该实例上。例如，要启动一个
    Payara Micro 实例，你需要输入以下命令：


    ```

    $ java -jar payara-micro.jar

    ```


    要启动一个 Payara Micro 实例并将你的应用程序部署到其上，你需要输入以下命令：


    ```

    $ java -jar payara-micro.jar --deploy <WAR file>

    ```


    Payara Micro 支持 Java EE 应用程序部署，并且与 Eclipse MicroProfile 兼容。


    有关 Payara Micro 的文档，请参考 [https://docs.payara.fish/documentation/payara-micro/payara-micro.html](https://docs.payara.fish/documentation/payara-micro/payara-micro.html)。


    最后，Payara Micro 通过使用第三方内存数据网格产品支持自动集群。


    # Hammock


    John Ament 是开源项目 Hammock 的赞助商，该项目实现了 Eclipse MicroProfile 规范。与 Thorntail 类似，Hammock
    是一个生成 uberjar 的应用程序组装器。要运行该 uberjar，你需要输入以下命令：


    ```

    $ java -jar <executable JAR file>

    ```


    Hammock 是一个用于构建应用程序的、固执己见的微服务框架。它是一个基于 CDI 的框架，意味着它运行在一个 CDI 容器上，其中包含基于 CDI 的
    bean。它支持两种 CDI 实现（JBoss Weld 和 Apache OpenWebBeans）、三种 JAX-RS 实现（Apache CXF、Jersey
    和 JBoss RestEasy）以及三种不同的 Servlet 容器（Apache Tomcat、JBoss Undertow 和 Eclipse Jetty）。除此之外，Hammock
    还...


    # KumuluzEE


    Sunesis 是开源项目 KumuluzEE 的赞助商，该项目实现了 Eclipse MicroProfile 规范。KumuluzEE 将自己定义为使用
    Java 和 Java EE 技术的轻量级微服务框架，并且是符合 Eclipse MicroProfile 规范的实现。KumuluzEE 允许你仅使用所需的组件来引导
    Java EE 应用程序，并且支持将微服务打包并作为 uberjar 运行。与其他支持 uberjar 的实现一样，你可以通过输入以下命令来运行你的微服务：


    ```

    $ java -jar <executable JAR file>

    ```


    KumuluzEE 还提供了一个 POM 生成器，可以创建一个包含你计划开发的微服务所需选项和功能的 `pom.xml` 文件。POM 生成器提供了一个清晰且组织良好的列表，列出了
    KumuluzEE 支持的配置文件、组件和项目，你可以选择将其包含在 `pom.xml` 文件中。


    KumuluzEE 为不同的 MicroProfile API 提供了少量示例。


    有关 KumuluzEE 实现 Eclipse MicroProfile 的文档，请参考 [https://ee.kumuluz.com/microprofile](https://ee.kumuluz.com/microprofile)。


    最后，KumuluzEE 在 [https://ee.kumuluz.com/tutorials/](https://ee.kumuluz.com/tutorials/)
    提供了一些有趣的教程。


    # Launcher


    Fujitsu 是开源项目 Launcher 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Launcher 利用了嵌入式 GlassFish
    Server 和 Apache Geronimo MicroProfile API 实现。你可以按如下方式将微服务作为 WAR 文件运行：


    ```

    $ java -jar launcher-1.0.jar --deploy my-app.war

    ```


    此外，Launcher 可以创建 uberjar。要创建微服务并将其作为 uberjar 运行，首先生成 uberjar，然后使用 `java -jar`
    调用它，如下所示：


    ```

    $ java -jar launcher-1.0.jar --deploy my-app.war --generate my-uber.jar$ java
    -jar my-uber.jar

    ```


    Launcher 的文档非常稀少且有限。你可以在 [https://github.com/fujitsu/launcher/blob/master/doc/Usage.adoc
    ...](https://github.com/fujitsu/launcher/blob/master/doc/Usage.adoc) 找到关于 Launcher
    的使用信息。'
  raw: '# Thorntail


    Red Hat are the sponsors of the open source Thorntail project, which implements
    the Eclipse MicroProfile specification. Thorntail is an application assembler
    that packages just the server runtime components required by your application
    and creates a runnable JAR (that is, an uberjar), which you can execute by invoking the
    following command:


    ```

    $ java -jar <executable JAR file>

    ```


    Not only is Thorntail MicroProfile-compatible, but it can also include functionality
    beyond MicroProfile in your application. It has the concept of a fraction, which
    is a specific library that contains functionality you want to include in your
    application. A fraction is included in the Maven POM file of your application
    as a dependency. Beyond the MicroProfile ...


    # Open Liberty


    IBM are the sponsors of the open source Open Liberty project, which implements
    the Eclipse MicroProfile specification. Open Liberty is the upstream open source
    project for the IBM WebSphere Liberty application server. Open Liberty is an application
    server capable of generating an uberjar, which contains your application with
    an embedded Open Liberty server inside of it. To run the uberjar, you need to
    enter the following command:


    ```

    $ java -jar <executable JAR file>

    ```


    This command will explode the JAR file into your username''s temporary directory,
    and then it will execute the application from there.


    Ensure there are no spaces in the path to the JAR file, otherwise the start up
    process will fail.


    The generated uberjar can contain only a subset of application server functionality
    as defined by the features included in the `server.xml` file. To build an uberjar
    with this minimal set of features, you need to use the `minify-runnable-package`
    profile when running Maven.


    The Open Liberty documentation is very thorough and replete with guides and reference
    documents.


    You can find the Open Liberty documentation at [https://openliberty.io/docs/](https://openliberty.io/docs/).


    In their documentation, they have a section dedicated to MicroProfile guides,
    which provide well-documented tutorials.


    # Apache TomEE


    Tomitribe are the sponsors of the open source TomEE project, which implements
    the Eclipse MicroProfile specification. Apache TomEE is assembled from Apache
    Tomcat with added Java EE features. TomEE is Java EE 6 Web Profile-certified.
    As its GitHub describes it, *Apache TomEE is a lightweight, yet powerful, JavaEE
    Application server with feature-rich tooling*. There are a few different versions
    of TomEE that you can download; for example, TomEE, TomEE+, and TomEE WebApp,
    but the one we are interested in is TomEE MicroProfile. For MicroProfile, TomEE
    generates an uberjar for your microservice, which you can run as follows:


    ```

    $ java -jar <executable JAR file>

    ```


    Although the TomEE MicroProfile documentation is scarce, a set of thorough ...


    # Payara Micro


    Payara are the sponsors of the open source Payara Micro project, which implements
    the Eclipse MicroProfile specification. Payara Server is based on the open source
    application server, GlassFish. Payara Micro is based on Payara Server, albeit
    a slimmed-down version of it. As their website describes, *Payara Micro is the
    microservices-ready version of Payara Server*.


    The way Payara Micro works is that a Payara Micro instance starts and then your
    MicroProfile microservice is deployed to it as a WAR file. For example, to start
    a Payara Micro instance, you would enter the following command:


    ```

    $ java -jar payara-micro.jar

    ```


    To start a Payara Micro instance and deploy your application to it, you would
    enter the following command:


    ```

    $ java -jar payara-micro.jar --deploy <WAR file>

    ```


    Payara Micro supports Java EE application deployments and it is also compatible
    with Eclipse MicroProfile.


    For the Payara Micro documentation, please refer to [https://docs.payara.fish/documentation/payara-micro/payara-micro.html](https://docs.payara.fish/documentation/payara-micro/payara-micro.html).


    Lastly, Payara Micro supports automatic clustering by using a third-party in-memory
    data grid product.


    # Hammock


    John Ament is the sponsor of the open source Hammock project, which implements
    the Eclipse MicroProfile specification. Similar to Thorntail, Hammock is an application
    assembler that generates uberjars. To run the uberjar, you need to enter the following
    command:


    ```

    $ java -jar <executable JAR file>

    ```


    Hammock is an opinionated microservices framework for building applications. It
    is a CDI-based framework, meaning that it is on a CDI container with CDI-based
    beans that run in it. It supports two CDI implementations (JBoss Weld and Apache
    OpenWebBeans), three JAX-RS implementations (Apache CXF, Jersey, and JBoss RestEasy),
    and three different servlet containers (Apache Tomcat, JBoss Undertow, and Eclipse
    Jetty). Besides these, Hammock also ...


    # KumuluzEE


    Sunesis are the sponsors of the open source KumuluzEE project, which implements
    the Eclipse MicroProfile specification. KumuluzEE defines itself as a lightweight
    microservices framework using Java and Java EE technologies and as Eclipse MicroProfile-compliant
    implementation. KumuluzEE allows you to bootstrap a Java EE application using
    just the components that you need, and it also supports the packing and running
    microservices as uberjars. Just like other implementations that support uberjars,
    you can run your microservices by entering the following command:


    ```

    $ java -jar <executable JAR file>

    ```


    KumuluzEE also provides a POM generator that can create a `pom.xml` with the selected
    options and features you would like to include for the microservice you plan to
    develop. The POM generator provides a clear and organized list of profiles, components,
    and projects supported by KumuluzEE that you can select to include in the `pom.xml` file.


    KumuluzEE provides a handful of samples for the different MicroProfile APIs.


    For documentation related to the KumuluzEE implementation of Eclipse MicroProfile,
    refer to [https://ee.kumuluz.com/microprofile](https://ee.kumuluz.com/microprofile).


    Lastly, KumuluzEE provides some interesting tutorials at [https://ee.kumuluz.com/tutorials/](https://ee.kumuluz.com/tutorials/).


    # Launcher


    Fujitsu are the sponsors of the open source Launcher project, which implements
    the Eclipse MicroProfile specification. Launcher leverages an embedded GlassFish
    Server and Apache Geronimo MicroProfile API implementations. You can run your
    microservice as a WAR file, as follows:


    ```

    $ java -jar launcher-1.0.jar --deploy my-app.war

    ```


    In addition, Launcher can create uberjars. To create and run your microservice
    as an uberjar, first generate the uberjar and then invoke it using `java -jar`,
    as follows:


    ```

    $ java -jar launcher-1.0.jar --deploy my-app.war --generate my-uber.jar$ java
    -jar my-uber.jar

    ```


    The documentation for Launcher is very scarce and limited. You can find usage
    information about Launcher at [https://github.com/fujitsu/launcher/blob/master/doc/Usage.adoc
    ...](https://github.com/fujitsu/launcher/blob/master/doc/Usage.adoc)'
