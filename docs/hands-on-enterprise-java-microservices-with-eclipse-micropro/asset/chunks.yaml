    ```\n\n此时，我们可以查询服务器端点。我们定义了一个不需要任何身份验证的端点，即 `io.pckt.jwt.rest.SecureEndpoint`\
    \ 类的 `jwt/openHello` 端点。运行以下命令验证你的 Thorntail 服务器是否按预期运行：\n\n```\nScotts-iMacPro:jwtprop\
