  trans: '

    # GraphQL


    GraphQL 是一种用于 API 的开源数据查询与操作语言，也是一个利用现有数据完成查询的运行时。它能够解析来自客户端的字符串，并以可理解、可预测且预定义的方式返回数据。GraphQL
    是 REST 的一种替代方案，但并非必然取代后者。MicroProfile GraphQL 规范的目标是提供一组 API，使开发者能够用 Java 快速开发可移植的基于
    GraphQL 的应用程序。作为 MicroProfile 项目的一部分，在撰写本文时，MicroProfile GraphQL 规范仍处于提议或草案阶段。


    GraphQL 基于 Facebook 的一项规范。有关更多信息，请参阅 `https://graphql.github.io/graphql-spec`。关于
    GraphQL 的更全面概述，可访问 [`graphql.org/`](https://graphql.org/)。


    GraphQL 与 REST 有许多相似之处，两者都广泛用于现代基于微服务的应用程序中。


    # GraphQL 与 REST 的区别


    以下是 GraphQL 相较于 REST 的主要区别特征：


    *   **模式驱动**：模式充当服务器与其客户端之间的契约。

    *   **单一 HTTP 端点**：通过查询语言实现单一端点以及对数据和操作的访问。

    *   **灵活的数据检索**：允许客户端以精细的粒度选择响应中的数据，从而避免数据获取过多或不足。

    *   **减少服务器请求**：该语言允许客户端将预期数据聚合到单个请求中。

    *   **更易管理的版本控制**：支持在弃用旧数据的同时创建新数据。

    *   **部分结果**：结果由数据和错误组成。客户端负责...


    # GraphQL 与数据库


    GraphQL 并非数据库技术。相反，它是一种用于 API 的数据查询与操作工具，并且与任何数据库或存储技术无关。然而，它可以部署在任何后端之前，并能够通过单个
    API 聚合来自多个后端数据源的数据。


    # 沙箱中的项目


    MicroProfile 项目沙箱是社区成员通过尝试实现某些特性和功能来提出想法的地方，旨在从社区成员那里获取反馈、讨论和评估，以决定该想法是否应成为 MicroProfile
    项目的新 API/规范。


    MicroProfile 沙箱位于 [`github.com/eclipse/microprofile-sandbox`](https://github.com/eclipse/microprofile-sandbox)。


    过去从沙箱毕业并成为官方 MicroProfile 项目的提案包括 GraphQL 和 Reactive Streams Operators。在撰写本文时，沙箱中只有一个提案项目：Boost。


    # MicroProfile Boost


    在撰写本文时，MicroProfile Boost 正在 MicroProfile 沙箱中接受社区评估。Boost 是一个 Maven 插件，用于增强 MicroProfile
    应用程序的构建。


    有关 Boost 的更多信息，请访问 [`github.com/eclipse/microprofile-sandbox/tree/master/proposals/boost`](https://github.com/eclipse/microprofile-sandbox/tree/master/proposals/boost)。


    Boost 为 MicroProfile API（例如用于 MicroProfile Config 的 `mpConfig`）以及 Java EE API
    定义了 Maven 依赖项，这些依赖项被称为 **boosters**。此外，它还为实现不同 MicroProfile API 的运行时（例如 `openliberty`）定义了依赖项。另一个由
    Boost 定义的、指定为 BOM（物料清单）的 Maven 依赖项，指明了在 Maven 构建中针对 MicroProfile API 应使用的 MicroProfile
    总括项目的版本。BOM 的内容由插件管理。作为 Boost 的用户，您可以将这些依赖项包含在您的 `pom.xml` 文件中，以简化 MicroProfile
    应用程序的构建过程。


    # Eclipse MicroProfile 与 Jakarta EE


    Eclipse Jakarta Enterprise Java 项目与 Eclipse MicroProfile 项目之间是什么关系？简短的回答是：有待观察。详细的回答是：让我们从头说起。


    Eclipse MicroProfile 项目的启动是为了解决在 **Java 社区流程**（**JCP**）下 Java EE 规范进展缓慢的问题。


    有关 Java 社区流程的更多信息，请访问 `https://jcp.org/en/home/index`。


    自 MicroProfile 项目迁移到 Eclipse 基金会以来，已经过去了两年多。大约一年后，Oracle 宣布打算将 Java EE 迁移到 Eclipse
    基金会，并将其重命名为 Jakarta EE。向 Jakarta 的迁移是一个旷日持久的过程，目前仍在进行中...


    # 总结


    在本章中，我们了解了 MicroProfile 规范在总括版本之外的未来发展，包括 Long Running Actions、Context Propagation
    和 GraphQL 项目，以及仍处于 MicroProfile 沙箱中的 Boost 项目。此外，您还学习了响应式消息传递概念、MicroProfile 响应式消息传递架构，以及如何通过代码示例使用
    Eclipse MicroProfile 响应式构造来实现响应式微服务。您还了解了这些项目的背景、功能、注解和适用的代码示例，以及它们当前的状态。最后，我们介绍了两个相似但不同的项目——Eclipse
    MicroProfile 和 Jakarta EE 之间的关系，并讨论了它们未来可能如何演变。


    在下一章中，我们将学习 Eclipse MicroProfile 在多云环境中的部署。


    # 问题


    1.  如果我有一个消息源，如何将其集成到我的 MicroProfile 应用程序中？

    2.  现有的 MicroProfile 规范中，哪一个最能得到 MicroProfile Context Propagation 的支持？

    3.  当前支持响应式编程的 MicroProfile 规范有哪些？

    4.  目前哪些 MicroProfile 规范不属于总括/平台 MicroProfile 版本？

    5.  设立 MicroProfile 沙箱的目的是什么？

    6.  目前位于 MicroProfile 沙箱中的项目有哪些？

    7.  Eclipse MicroProfile 与 Jakarta EE 当前的关系是什么？

    8.  Eclipse MicroProfile 与 Jakarta EE 未来的关系会是什么样子？


    # 延伸阅读


    *   关于 MicroProfile 响应式消息传递，[`reactivex.io/`](http://reactivex.io/) 网站提供了动机、教程、语言绑定等更多信息。

    *   GraphQL 的一个很好的起点是 [`graphql.org/`](https://graphql.org/) 网站，该网站提供了其背后动机的更多背景信息，以及许多用于探索如何使用它的资源。


    # 在多云环境中使用 MicroProfile


    微服务和微服务架构是云和多云环境（包括混合云部署）的理想开发方法，在这种环境中，您的应用程序既包含本地逻辑，也包含在云中运行的逻辑。Eclipse MicroProfile
    是一个优化 Java 以适应微服务架构的规范，因此提供了相应的构造，使您能够用 Java 和云实现微服务。这些主题将帮助您理解为什么 Eclipse MicroProfile
    是开发混合云和多云环境应用程序的理想选择，以及在这些类型的部署中使用它时必须考虑哪些因素。


    在本章中，我们将讨论以下内容...

