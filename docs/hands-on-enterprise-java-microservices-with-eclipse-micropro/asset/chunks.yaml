    \ *MicroProfile OpenAPI and the Type-Safe REST Client*\n\n# MicroProfile Config\
    \ and Fault Tolerance\n\nIn this chapter, we will start by introducing MicroProfile\
    \ Config as it is the basis for the configuration of other MicroProfile features,\
    \ in addition to application-level configuration. The MicroProfile Config specification\
    \ provides a common way to retrieve configuration coming from a variety of sources\
    \ (properties files, system properties, environment variables, databases, and\
