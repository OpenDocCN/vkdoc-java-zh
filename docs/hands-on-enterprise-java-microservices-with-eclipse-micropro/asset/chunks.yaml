  trans: "\n# 第 6 章\n\n1.  不是：默认情况下，即使未使用任何 MP OpenAPI 注解，任何 REST 端点都会为其生成 OpenAPI。\n\
    2.  是的：你可以根据需要选择使用任意数量（或多或少的）MP OpenAPI 注解，以表示微服务中的 REST 端点。\n3.  其理念是，你预先定义端点的预期契约，并将这些契约封装在可与微服务捆绑在一起的\
    \ OpenAPI 文档中。\n4.  不需要：你只需了解请求和响应的格式，然后就可以创建自己的类型安全接口。\n5.  通过使用 `.../mp-rest/url`\
    \ MP 配置设置，其中 `...` 是类型安全接口的接口名称，或者是传递给 `RegisterRestClient` 注解的 configKey。\n6.\
    \  一种方法是注册一个 `ClientHeadersFactory` 实现。另一种方法是在 `org.eclipse.microprofile.rest.client.propagateHeaders`\
    \ MP 配置属性中列出标头。\n\n# 第 7 章\n\n1.  在撰写本文时，共有八个 Eclipse MicroProfile 的实现，它们都是开源的。分别是\
    \ Thorntail、Open Liberty、Apache TomEE、Payara Micro、Hammock、KumuluzEE、Launcher\
    \ 和 Helidon。此外，还有最新加入的 Quarkus。\n2.  应用服务器是 Java EE 应用程序的容器。应用组装器仅包含应用程序所需的功能，而不是要求应用服务器启动并运行，并且通常会生成一个可执行的\
    \ JAR 文件。应用组装器可以生成一个 uberjar（一个自包含的可运行 JAR 文件），或者一个应用程序 JAR，其运行时依赖项位于子目录中，例如，一个附带的\
    \ `lib` 或 `libs` 子目录。……\n\n# 第 8 章\n\n1.  我们在本书和本章中看到了许多示例，表明 MP 配置设置会影响应用程序和\
    \ MP 功能。\n2.  只要你提供的路径存在，你应该就能看到一次成功的健康检查，并显示有关该路径的信息。\n3.  它显示有关 KeyCloak 服务器的信息。如果\
    \ KeyCloak 已停止，则会显示错误。\n4.  它将不会被找到，因为该指标是在首次请求时延迟生成的。\n5.  待定。\n6.  对于未受保护的方法，行为应该是类似的。对于受保护的方法，Swagger-UI\
    \ 调用会失败。\n7.  你将看到错误响应。\n8.  那是编码后的 MP-JWT。你可以在 curl 命令中将其用作 *Authorization: Bearer\
    \ ...* 标头值，其中将 ... 替换为在 Access Base64 Token 字段中找到的字符串。\n\n# 第 9 章\n\n1.  MicroProfile\
    \ Reactive Messaging 是通过连接器处理消息源的绝佳选择，尤其是在消息源以高频率生成消息，并且采用异步方式处理它们最有意义的情况下。\n\
    2.  MicroProfile Context Propagation 最能支持 MicroProfile Reactive Streams Operators\
    \ 和 MicroProfile Reactive Messaging，因为它允许将传统上与当前线程关联的上下文传播到各种类型的工作单元中。\n3.  当前支持响应式编程的规范是\
    \ MicroProfile Reactive Streams Operators、MicroProfile Reactive Messaging 和 MicroProfile\
    \ Context Propagation。\n4.  在撰写本文时，相关的项目有……\n\n# 第 10 章\n\n1.  Eclipse MicroProfile\
    \ 提供了使用企业 Java 开发微服务的最佳方法之一。反过来，使用容器作为部署单元的微服务，提供了在云中和本地开发高度分布式系统（即云原生应用程序）的最佳方法之一。因此，基于\
    \ MicroProfile 的微服务促进了云原生应用程序的开发。\n2.  云原生应用程序开发有两个互补的方面或组成部分：应用服务和基础设施服务。应用服务加速了云原生应用程序业务逻辑的开发，而基础设施服务则加速了其交付和部署。这两个方面是互补的，并且是云原生应用程序开发不可或缺的组成部分。\n\
    3.  云原生应用程序开发是一种构建和运行应用程序的方法，它充分利用了基于四个关键原则的云计算模型：a) 基于服务的架构（迷你服务、微服务、SOA 服务等）；b)\
    \ 用于服务间通信的 API 驱动方法；c) 基于容器的底层基础设施；以及 d) DevOps 流程。架构和通信方面与云原生应用程序的开发关注点相关，而基础设施和流程方面则与其交付/部署相关。Eclipse\
    \ MicroProfile 与这些原则相关，因为它支持实现微服务，这些微服务可以成为使用容器作为其底层基础设施的架构的一部分，在该架构中，微服务使用其 API\
    \ 相互通信，并使用 DevOps 流程进行开发。\n4.  这就是 Eclipse MicroProfile 如何为引导你走向云原生应用程序的八个步骤中的每一步做出贡献：\n\
    \    1.  发展 DevOps 文化和实践：“通过拥抱 DevOps 的原则和文化价值观，并围绕这些价值观组织你的团队，来利用新技术、更快速的方法和更紧密的协作。”尽管这是一个组织和流程相关的步骤，但\
    \ Eclipse MicroProfile 作为微服务的规范，非常适合这种文化和流程的适应，因为微服务由于其特性，紧密支持 DevOps 流程。\n  \
    \  2.  使用快速单体加速现有应用程序：“通过迁移到现代的、基于容器的平台来加速现有应用程序——并将单体应用程序拆分为微服务或迷你服务以获得额外的效率提升。”在将单体应用拆分为微服务时，Eclipse\
    \ MicroProfile 可以提供很大帮助。当你在单体应用中识别出有界上下文时，考虑使用 Eclipse MicroProfile 来实现每个实现该有界上下文逻辑的微服务。\n"
- fmt: "*   3.  Use application services to speed up development: \"Speed software\
    \ development with reusability. Cloud-native application services are ready-to-use\
    \ developer tools. However, these reusable components must be optimized and integrated\
    \ into the underlying cloud-native infrastructure to maximize benefits.\" An `In-Memory-Data-Grid`\
    \ (`IMDG`) and a messaging broker are application services that help speed up\
    \ the development of business logic. A microservice, developed using `Eclipse\
    \ MicroProfile`, can leverage these application services by invoking them from\
    \ within its method bodies. `Eclipse MicroProfile` does not impose any kind of\
    \ restriction when integrating to application services, such as an `IMDG` or a\
    \ messaging broker.\n*   4.  Choose the right tool for the right task: \"Use a\
    \ container-based application platform that supports the right mix of frameworks,\
    \ languages, and architectures—and can be tailored to your specific business application\
    \ need.\" `Eclipse MicroProfile` is one of these tools that a developer can use\
    \ when choosing the right tool for the right task. For example, `Red Hat Application\
    \ Runtimes` is a collection of runtimes and tools, which includes `Eclipse MicroProfile`,\
    \ `Node.js`, `Spring Boot`, and `Vert.x`.\n*   5.  Provide developers with self-service\
    \ on-demand infrastructure: \"Use containers and container orchestration technology\
    \ to simplify access to underlying infrastructure, give control and visibility\
    \ to IT operations teams, and provide robust application life-cycle management\
    \ across various infrastructure environments, such as datacenters, private clouds,\
    \ and public clouds.\" The microservices you develop with `Eclipse MicroProfile`\
    \ can be deployed to one or more containers. By easily managing these containers\
    \ and your microservices architecture running on them, you can accelerate your\
    \ development cycles to deliver value to the business faster.\n*   6.  Automate\
    \ IT to accelerate application delivery: \"Create automation sandboxes for learning\
    \ the automation language and process, establish collaborative dialog across organizations\
    \ for defining service requirements, create self-service catalogs that empower\
    \ users and speed delivery, and use metering, monitoring, and chargeback policies\
    \ and processes.\" `Eclipse MicroProfile` provides capabilities for metrics, fault\
    \ tolerance, and health checks, all of which can be used as input to the IT automation\
    \ processes.\n*   7.  Implement continuous delivery and advanced deployment techniques:\
    \ \"Accelerate the delivery of your cloud-native applications with automated delivery,\
    \ continuous integration/continuous delivery (CI/CD) pipelines, rolling blue/green\
    \ and canary deployments, and A/B testing.\" The use of microservices in combination\
    \ with CI/CD can facilitate advanced deployment techniques. For example, you can\
    \ introduce a `MicroProfile`-based microservice with new functionality as part\
    \ of a blue/green or canary deployment intro production, and switch all of the\
    \ traffic to it once you have proven that the new functionality works as expected.\n\
    *   8.  Evolve a more modular architecture: \"Choose a modular design that makes\
    \ sense for your specific needs, using microservices, a monolith-first approach,\
    \ or miniservices—or a combination.\" For this step, you can use `Eclipse MicroProfile`\
    \ to develop microservices for new applications or as you break specific bounded\
    \ contexts of your monolith into microservices.\n5.  Twelve-factor app is a methodology\
    \ that a developer can follow while designing and implementing microservices and\
    \ applications, independent of the programming language or framework being used\
    \ to implement them. The framework that a developer can use to implement microservices\
    \ using twelve-factor app is `Eclipse MicroProfile`. Twelve-factor app and `Eclipse\
    \ MicroProfile` are not mutually exclusive, but are complementary to each other.\n\
    6.  Most, if not all, market FaaS offerings support Java. As such, developers\
    \ can write the function bodies in one of the many implementations of `Eclipse\
    \ MicroProfile`, which are all in Java. The ease of use and rich functionality\
    \ of `Eclipse MicroProfile` combined with the simplicity of a FaaS platform can\
    \ greatly improve the ability of developers to deliver value to the business faster.\
    \ In addition, a technology such as `Quarkus`, which implements `Eclipse MicroProfile`,\
    \ uses low amounts of memory and has fast startup times, is an ideal runtime for\
    \ a FaaS.\n7.  When using `Eclipse MicroProfile` in a deployment across clouds,\
    \ here are the things you need to consider:\n    *   Configuration of communication\
    \ routes between the cloud environment and the on-premise environment needs to\
    \ be done using whatever DNS support the cloud environment provides.\n    *  \
    \ Configuration of `MicroProfile OpenTracing` to enable capture of tracing across\
    \ the cloud environments.\n    *   Monitoring of the split `MicroProfile Metrics`\
    \ information across the cloud environments.\n    *   Setting up the CI tasks\
    \ to target the appropriate cloud environment to maintain the correct microservices.\n\
    8.  Distributed tracing in a multi-cloud environment can be challenging. We want\
    \ to fulfill the same objective as with a single cloud environment to visualize\
    \ the single end-to-end trace associated with a request as it passes through services\
    \ within and across each cloud, but may face complications when dealing with different\
    \ context propagation formats and storage of the tracing data in different formats\
    \ per cloud. The first challenge is to ensure that a trace continues across different\
    \ cloud environments. This is a problem because, at the time of writing, there\
    \ is not widely adopted or standardized trace context format. Usually, each tracing\
    \ system uses different headers and formats to propagate the tracing context.\
    \ The second challenge, even in a homogenous tracing environment, is to visualize\
    \ tracing data from multi-cloud environments. This can be problematic because\
    \ tracing data in each cloud might be stored in different databases or in different\
    \ formats. This can be overcome by replicating the data to a single unified storage\
    \ or sending missing tracing data between systems on-demand with the appropriate\
    \ data format adjustments.\n9.  Service Meshes such as `Istio` or `LinkerD` offer\
    \ services at the platform level on top of Kubernetes in the areas of discovery,\
    \ routing, and fault tolerance. Some of those services can also be found in `MicroProfile`.\
    \ When you deploy a `MicroProfile` application into such a Service Mesh, you need\
    \ to consider if you want to use the version from `MicroProfile` or the one from\
    \ the Mesh. The `MicroProfile` feature that is most likely affected here is Fault\
    \ Tolerance, and especially the retry logic.\n\n## Other Books You May Enjoy\n\
    \nIf you enjoyed this book, you may be interested in these other books by Packt:\n\
    \n[![](Images/2678ffa3-995d-4e8f-b326-8f7892f1b8e1.png)](https://www.packtpub.com/application-development/mastering-microservices-java-third-edition)\n\
    \n**Mastering Microservices with Java - Third Edition** Sourabh Sharma\n\nISBN:\
    \ 978-1-78953-072-8\n\n*   Use domain-driven designs to develop and implement\
    \ microservices\n*   Understand how to implement microservices using Spring Boot\n\
    *   Explore service orchestration and distributed transactions using the Sagas\n\
    *   Discover interprocess communication using **REpresentational State Transfer**\
    \ (**REST**) and events\n*   Gain knowledge of how to implement and design reactive\
    \ microservices\n*   Deploy and test various microservices\n\n**Microservice Patterns\
    \ and Best Practices** Vinicius Feitosa ..."
