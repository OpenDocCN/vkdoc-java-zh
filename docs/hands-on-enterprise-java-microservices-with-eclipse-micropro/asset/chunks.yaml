- fmt: "# The Health Check protocol and wire format\n\nThe MP-HC specification defines\
    \ the requirement to support the HTTP GET requests against a logical `/health`\
    \ REST endpoint that may return any one of the following codes to represent the\
    \ endpoint's status:\n\n* `200`: It is up and healthy.\n* `500`: It is unhealthy\
    \ due to an unknown error.\n* `503`: It is down and not ready to respond to requests.\n\
    \nNote that many cloud environments simply look at the request return code as\
    \ either success or failure, so the differentiation between a `500` and `503`\
    \ code may not be distinguishable.\n\nThe payload of a `/health` request must\
    \ be a JSON object that matches the schema given in the following (for more information\
    \ on the JSON schema syntax see [http://jsonschema.net/#/](http://jsonschema.net/#/)).\n\
    \nFollowing is ...\n\n# The Health Check Java API\n\nMost of the plumbing is performed\
    \ by the application framework that implements the MP-HC specification. Your part\
    \ is to decide how liveness or readiness are determined through the health check\
    \ procedures that your microservice defines using the MP-HC API.\n\nTo do this,\
    \ you need to implement a health check procedure by implementing one or more instances\
    \ of the `HealthCheck` interface using beans that are marked with a `Health` annotation.\n\
    \nThe `HealthCheck` interface is provided in the following code block:\n\n```\n\
    package org.eclipse.microprofile.health;\n\n@FunctionalInterface\npublic interface\
    \ HealthCheck {\n  HealthCheckResponse call();\n}\n```\n\nThe code for the `Health`\
    \ annotation is provided in the following code block:\n\n```\npackage org.eclipse.microprofile.health;\n\
    \nimport javax.inject.Qualifier;\nimport java.lang.annotation.Documented;\nimport\
    \ java.lang.annotation.Retention;\nimport java.lang.annotation.RetentionPolicy;\n\
    \n@Qualifier\n@Documented\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface\
    \ Health {\n}\n```\n\nAn example `HealthCheck` implementation that represents\
    \ the status of a hypothetical disk space check is shown in the following example.\
    \ Note that the check includes the current free space as part of the response\
    \ data. The `HealthCheckResponse` class supports a builder interface to populate\
    \ the response object.\n\nFollowing is a hypothetical disk space `HealthCheck`\
    \ procedure implementation:\n\n```\nimport javax.enterprise.context.ApplicationScoped;\n\
    import org.eclipse.microprofile.health.Health;\nimport org.eclipse.microprofile.health.HealthCheck;\n\
    import org.eclipse.microprofile.health.HealthCheckResponse;\n\n@Health\n@ApplicationScoped\n\
    public class CheckDiskspace implements HealthCheck {\n  @Override\n  public HealthCheckResponse\
    \ call() {\n      return HealthCheckResponse.named(\"diskspace\")\n          \
    \    .withData(\"free\", \"780mb\")\n              .up()\n              .build();\n\
    \  }\n}\n```\n\nIn this example, we created a health response that is named `diskspace`\
    \ with a status of `up` and custom data named `free` with a string value of `780mb`.\n\
    \nAnother health check example representing some service endpoint is shown in\
    \ the following.\n\nA hypothetical service `HealthCheck` procedure implementation\
    \ is shown here:\n\n```\npackage io.packt.hc.rest;\n//ServiceCheck example\n\n\
    import javax.enterprise.context.ApplicationScoped;\nimport org.eclipse.microprofile.health.Health;\n\
    import org.eclipse.microprofile.health.HealthCheck;\nimport org.eclipse.microprofile.health.HealthCheckResponse;\n\
    \n@Health\n@ApplicationScoped\npublic class ServiceCheck implements HealthCheck\
    \ {\n public HealthCheckResponse call() {\n return HealthCheckResponse.named(\"\
    service-check\")\n .withData(\"port\", 12345)\n .withData(\"isSecure\", true)\n\
    \ .withData(\"hostname\", \"service.jboss.com\")\n .up()\n .build();\n }\n}\n\
    ```\n\nIn this example, we created a health response named `service-check` with\
    \ a status of `up` that includes the following additional data:\n\n* A `port`\
    \ item with an integer value of `12345`\n* An `isSecure` item with a Boolean value\
    \ of `true`\n* A `hostname` item with a string value of `service.jboss.com`\n\n\
    The CDI-managed health checks are discovered and registered automatically by the\
    \ application runtime. The runtime automatically exposes an HTTP endpoint, `/health`,\
    \ used by the cloud platform to poke into your application to determine its state.\
    \ You can test this by building the `Chapter04-healthcheck` application and running\
    \ it. You will see the following output:\n\n```\nScotts-iMacPro:hc starksm$ mvn\
    \ package\n[INFO] Scanning for projects…\n...\nResolving 144 out of 420 artifacts\n\
    \n[INFO] Repackaging .war: /Users/starksm/Dev/JBoss/Microprofile/PacktBook/Chapter04-metricsandhc/hc/target/health-check.war\n\
    \n[INFO] Repackaged .war: /Users/starksm/Dev/JBoss/Microprofile/PacktBook/Chapter04-metricsandhc/hc/target/health-check.war\n\
    \n[INFO] -----------------------------------------------------------------------\n\
    \n[INFO] BUILD SUCCESS\n\n[INFO] -----------------------------------------------------------------------\n\
    \n[INFO] Total time:  7.660 s\n\n[INFO] Finished at: 2019-04-16T21:55:14-07:00\n\
    \n[INFO] -----------------------------------------------------------------------\n\
    \nScotts-iMacPro:hc starksm$ java -jar target/health-check-thorntail.jar\n\n2019-04-16\
    \ 21:57:03,305 INFO  [org.wildfly.swarm] (main) THORN0013: Installed fraction:\
    \ MicroProfile Fault Tolerance - STABLE          io.thorntail:microprofile-fault-tolerance:2.4.0.Final\n\
    \n…\n\n2019-04-16 21:57:07,449 INFO  [org.jboss.as.server] (main) WFLYSRV0010:\
    \ Deployed \"health-check.war\" (runtime-name : \"health-check.war\")\n\n2019-04-16\
    \ 21:57:07,453 INFO  [org.wildfly.swarm] (main) THORN99999: Thorntail is Ready\n\
    ```\n\nOnce the server has started, test the health checks by querying the health\
    \ endpoint:\n\n```\nScotts-iMacPro:Microprofile starksm$ curl -s http://localhost:8080/health\
    \ | jq\n{\n \"outcome\": \"UP\",\n \"checks\": [\n   {\n     \"name\": \"service-check\"\
    ,\n     \"state\": \"UP\",\n     \"data\": {\n       \"hostname\": \"service.jboss.com\"\
    ,\n       \"port\": 12345,\n       \"isSecure\": true\n     }\n   },\n   {\n \
    \    \"name\": \"diskspace\",\n     \"state\": \"UP\",\n     \"data\": {\n   \
    \    \"free\": \"780mb\"\n     }\n   }\n ]\n}\n```\n\nThis shows the overall health\
    \ to be `UP`. The overall status is the logical `OR` of all of the health check\
    \ procedures found in the application. In this case, it is `AND` of the two health\
    \ check procedures we have seen: `diskspace` and `service-check`.\n\n# Integration\
    \ with the cloud platform\n\nMost cloud platforms support both TCP- and HTTP-based\
    \ checks. To integrate health checks with your selected cloud platform, you need\
    \ to configure your cloud deployment to point to the HTTP entry point, `/health`,\
    \ on the node that hosts your application.\n\nThe cloud platform will invoke a\
    \ `GET` query on the HTTP entry point; all checks that are registered will be\
    \ performed and the sum of individual checks determines the overall outcome.\n\
    \nUsually, the response payload is ignored by the cloud platform and it only looks\
    \ at the HTTP status code to determine the liveness or readiness of your application.\
    \ A successful outcome, `UP`, will be mapped to `200` and `DOWN` to `503`."
