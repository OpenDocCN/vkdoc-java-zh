  trans: "\n7.  由 MicroProfile Starter 生成的 Thorntail 示例 MicroProfile 项目，其 `src` 子目录内容已复制到\
    \ `Qproj4MP` 中，该项目使用了一个名为 `bouncycastle` 的安全库。原因是生成的代码包含一个 MicroProfile JWT 传播规范的示例，该规范允许你在微服务之间传播安全信息。因此，我们还需要在\
    \ Quarkus 项目的 POM 文件中添加两个依赖项，一个用于 `bouncycastle`，另一个用于 `nimbusds`。\n\n在 MicroProfile\
    \ Starter 的下一个 sprint 版本中，`bouncycastle` 依赖项将从 Thorntail 服务器代码生成中移除。\n\n要添加这些依赖项，请编辑\
    \ `$HOME/Downloads/Qproj4MP` 目录下的 `pom.xml` 文件，并在 `<dependencies>` 部分输入以下代码块：\n\
    \n```\n <dependency>\n <groupId>org.bouncycastle</groupId>\n <artifactId>bcpkix-jdk15on</artifactId>\n\
    \ <version>1.53</version>\n <scope>test</scope>\n </dependency>\n <dependency>\n\
    \ <groupId>com.nimbusds</groupId>\n <artifactId>nimbus-jose-jwt</artifactId>\n\
    \ <version>6.7</version>\n <scope>test</scope>\n </dependency>\n```\n\n现在，我们已经准备好编译这个“Quarkus\
    \ 化”的 MicroProfile 项目了。\n\n8.  除了支持构建在 OpenJDK 上运行的 Java 项目外，Quarkus 还支持将 Java\
    \ 项目一直编译到机器码。输入以下命令，将“Quarkus 化”的示例项目编译为原生代码：\n\n```\n$ cd $HOME/Downloads/Qproj4MP\
    \ # 确保你在 Qproj4MP 子目录中\n$ ./mvnw package -Pnative\n```\n\n9.  要运行该应用程序，请输入以下命令：\n\
    \n```\n$./target/demo-1.0-SNAPSHOT-runner\n```\n\n要测试该应用程序，请按照第 2 章（*治理与贡献*）中\
    \ *MicroProfile Starter 快速入门* 部分从第 10 步开始的说明进行操作。\n\n10.  如果你想在开发模式下运行这个“Quarkus\
    \ 化”的项目，请先停止正在运行的进程，然后输入以下命令：\n\n```\n$ cd $HOME/Downloads/Qproj4MP # 确保你在 Qproj4MP\
    \ 子目录中\n$ ./mvnw compile quarkus:dev\n```\n\n此时，你可以使用你选择的 IDE（例如 Visual Studio\
    \ Code 或 Eclipse IDE）打开该项目，并开始修改源代码。Quarkus 支持热重载，这意味着，一旦你对源代码进行了任何更改，Quarkus\
    \ 就会在后台重建并重新部署你的应用程序，以便你可以立即查看并测试更改的效果。此外，如果你在源代码中犯了语法错误，Quarkus 会将有意义的错误信息传播到\
    \ Web 应用程序，以帮助你修复错误，从而提高你的工作效率。\n\n11.  如果你想生成一个可执行的应用程序 JAR，请输入以下命令：\n\n```\n\
    $ cd $HOME/Downloads/Qproj4MP # 确保你在 Qproj4MP 子目录中\n$ ./mvn clean package\n```\n\
    \n12.  要运行可执行的应用程序 JAR，请输入以下命令：\n\n```\n$ java -jar target/demo-1.0-SNAPSHOT-runner.jar\n\
    ```\n\n在应用程序 JAR 旁边会创建一个 `lib` 目录，其中包含运行所需的库文件。\n\n我们已经向你展示了“Quarkus 化”一个由 MicroProfile\
    \ Starter 生成的 MicroProfile 项目的步骤。虽然这些步骤适用于一个特定的生成项目，但你可以使用相同的指令来“Quarkus 化”一个现有的\
    \ Java 应用程序或微服务，以便利用 Quarkus 提供的优势，例如低内存消耗、快速启动时间，以及将 Java 代码编译为原生代码，从而使其能够在容器、云和函数即服务环境中高效运行。无论你使用哪种\
    \ MicroProfile 实现，MicroProfile 为最终用户提供的一个巨大好处是互操作性。这意味着你可以使用不同 MicroProfile 实现的微服务来设计应用程序，这正是下一节的主题。\n\
    \n# MicroProfile 互操作性 – 会议应用程序\n\n**会议应用程序** 首次于 2016 年 11 月在比利时 Devoxx 大会上展示（[`www.youtube.com/watch?v=iG-XvoIfKtg`](https://www.youtube.com/watch?v=iG-XvoIfKtg)），是一个\
    \ MicroProfile 演示，展示了不同 MicroProfile 供应商实现的集成和互操作性。这很重要，因为它展示了规范中实现与接口的分离，提供了一个平台，允许供应商开发并提供他们自己的实现，这些实现可以与其他竞争性实现共存。所有实现共有的公共接口也为最终用户提供了灵活性和选择权，可以使用任何\
    \ MicroProfile 实现……\n\n# 总结\n\n在本章中，我们了解了市场上目前存在的开源 MicroProfile 实现，它们属于哪种类型，如何获取关于每种实现的更多信息，以及如何使用\
    \ MicroProfile Starter 为这些实现生成示例代码。我们还介绍了最新的 MicroProfile 实现新成员 Quarkus，它在解释模式和编译模式下显著改善了\
    \ Java 的启动时间和内存消耗，进一步改进了用于云原生微服务和无服务器环境的 MicroProfile。你还了解了会议应用程序，它展示了 MicroProfile\
    \ 在不同实现之间的互操作性。\n\n作为 Eclipse MicroProfile 的使用者，并且由于其跨实现互操作性的特性，你可以自由选择最适合你组织或最符合你环境的实现，最终让你能够为正确的任务选择正确的工具。此外，你无需为了获得商业支持的\
    \ Eclipse MicroProfile 版本而局限于单一供应商，因此，你有优势根据自己的条件进行协商，并从不同供应商提供的丰富 MicroProfile\
    \ 功能集中进行选择。\n\n在下一章中，我们将介绍一个涵盖所有 MicroProfile API 的完整代码示例。\n\n# 问题\n\n1.  目前，市场上有多少种\
    \ MicroProfile 实现？请列出它们。\n2.  应用服务器和应用组装器之间有什么区别？\n3.  描述市场上存在的八种 MicroProfile\
    \ 实现中的每一种。\n4.  什么是 Quarkus？\n5.  什么是编译时启动？\n6.  Quarkus 非常适合哪种类型的部署？\n7.  什么是\
    \ Quarkus 扩展框架？\n8.  会议应用程序展示的关键优势是什么？\n\n# 第 4 节：一个可运行的 MicroProfile 示例\n\n本节将介绍一个展示\
    \ MicroProfile 的应用程序。\n\n本节包含以下章节：\n\n*   第 8 章，*一个可运行的 Eclipse MicroProfile 代码示例*\n\
    \n# 一个可运行的 Eclipse MicroProfile 代码示例\n\n在本章中，我们将讨论一个示例应用程序，该应用程序使用了本书前面介绍的各种 MicroProfile\
    \ 功能。我们在本章中将使用的 MicroProfile 运行时是 Quarkus 运行时，这是一个为 GraalVM 和 OpenJDK HotSpot\
    \ 量身定制的 Kubernetes 原生 Java 栈，由精选的 Java 库和标准构建而成。我们将涵盖的关键主题包括：\n\n*   使用配置来控制应用程序和\
    \ MicroProfile 容器的行为\n*   实际的健康检查\n*   使用外部 JWT 安全提供程序保护应用程序\n*   集成并查看 Jaeger\
    \ 实例的跟踪信息\n*   使用 Swagger 检查微服务端点信息\n*   查看单个……\n"
- fmt: '# Technical requirements


    For this chapter, we''ll require the following:


    * An IDE

    * JDK 1.8+ installed with `JAVA_HOME` configured appropriately

    * Apache Maven 3.5.3+

    * A running Docker environment


    The code for this chapter can be found at [https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter08-mpcodesample](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter08-mpcodesample).


    The sample in this chapter can be compiled into a native binary using the GraalVM
    ([https://github.com/oracle/graal/releases/tag/vm-1.0.0-rc16](https://github.com/oracle/graal/releases/tag/vm-1.0.0-rc16))
    integration of Quarkus. This has additional requirements for the installation
    of the 1.0-RC16 version Graal VM and a working C development environment. The
    details of the native image generation requirements can be found at [https://quarkus.io/guides/building-native-image-guide](https://quarkus.io/guides/building-native-image-guide).


    # Sample architecture of a multiservice MicroProfile application


    The sample application we will go over in this chapter is composed of an HTML
    frontend, two MicroProfile-based microservices, two external services we spin
    up using Docker, and an external time service on the web we have no control over.
    The architecture of our sample application is shown in the following diagram:


    ![](Images/fa068f6a-caf2-45db-b56f-b288d4bf73db.png)


    The key elements in this diagram include the following:


    * **Svcs1 Image**: This is a collection of REST endpoints that make use of MP-HC,
    MP-Metrics, MP-OT, MP-JWT, MP-OAPI, MP-FT, and MP-RC in a Quarkus runtime.

    * **Svcs2 Image**: This is a collection of REST endpoints that make ...


    # Running the sample application


    The sample application is designed to be run from four different shells, so let''s
    organize them into four shell windows, as shown here:


    | Docker Shell | Web Shell |

    | Svcs1 Shell | Svcs2 Shell |


    In each shell, run the commands as outlined in the correspondingly named sections
    that follow.


    # The Docker shell commands


    A common way to provide preconfigured servers/services is to use a Docker image
    that contains the service and all of its dependencies. In this example, we use
    Docker to run KeyCloak and Jaeger images. If you are not familiar with Docker
    or do not have the `docker` command installed, see the instructions for how to
    install Docker for your platform ([https://docs.docker.com/v17.12/install/](https://docs.docker.com/v17.12/install/)).


    This project depends on KeyCloak for the MP-JWT token generation. To launch KeyCloak
    in a Docker container, run the following command in your shell:


    ```

    docker run -d --name keycloak -e KEYCLOAK_USER=admin -e KEYCLOAK_PASSWORD=admin
    -p 8180:8180 -v `pwd`/packt-mp-realm.json:/config/quarkus-packt.json -it jboss/keycloak:6.0.1
    -b 0.0.0.0 ...

    ```


    # The Svcs1 shell command


    Next, in the Svcs1 Terminal window you were asked to open earlier, navigate to
    the `svcs1` subdirectory of the project and then run the following command to
    execute the `svcs1` image in development mode:


    ```

    mvn compile quarkus:dev

    ```


    You will see the following output:


    ```

    Scotts-iMacPro:svcs1 starksm$ mvn compile quarkus:dev

    [INFO] Scanning for projects...

    ...

    20:56:27 INFO [io.quarkus]] (main) Quarkus 0.15.0 started in 2.492s. Listening
    on: http://[::]:8081

    20:56:27 INFO [io.quarkus]] (main) Installed features: [cdi, jaeger, resteasy,
    resteasy-jsonb, security, smallrye-fault-tolerance, smallrye-health, smallrye-jwt,
    smallrye-metrics, smallrye-openapi, smallrye-opentracing, smallrye-rest-client,
    swagger-ui]

    ```


    In the output, we see that this instance is listening on the `8081` port for HTTP
    requests, and we see various Quarkus features that are installed to support our
    MicroProfile feature usage.


    # The Svcs2 shell command


    Next, in the Svcs2 Terminal window you were asked to open earlier, `cd` to the
    `svcs2` subdirectory of the project and then run the following command to build
    the `svcs2` image:


    ```

    mvn clean package

    ```


    Once the build is finished, to run the `svcs2` JAR, enter the following command:


    ```

    java -jar target/sample-svcs2-runner.jar

    ```


    You will get the following output:


    ```

    Scotts-iMacPro:svcs2 starksm$ java -jar target/sample-svcs2-runner.jar...20:58:55
    INFO [io.quarkus]] (main) Quarkus 0.15.0 started in 0.936s. Listening on: http://[::]:808220:58:55
    INFO [io.quarkus]] (main) Installed features: [cdi, jaeger, resteasy, resteasy-jsonb,
    security, smallrye-health, smallrye-jwt, smallrye-metrics, smallrye-opentracing,
    smallrye-rest-client]

    ```


    Here, we ...


    # The web shell command


    Next, in the web shell Terminal window you were asked to open, clone this project
    to your computer, `cd` to the `web` subdirectory, and then run the following command
    to execute the web application in development mode:


    ```

    mvn clean package

    ```


    Once the build is finished, to run the web subproject JAR, enter the following:


    ```

    java -jar target/sample-web-runner.jar

    ```


    Once the application is up and running, point your browser to the web application
    at [http://localhost:8080/index.html](http://localhost:8080/index.html). In the
    next section, we will go over the web application details.


    # Details of the sample application


    Let''s discuss in detail the various tabs in our application.


    ## The Config tab


    The initial view of the application shows the Config tab, as shown in the following
    screenshot:


    ![](Images/c919e34a-eaea-4f7e-9ae8-2dfba21c976e.png)


    The three links are on the page reference endpoints in the `io.packt.sample.config.ConfigTestController`
    class of the `Chapter08-mpcodesample/svcs1` subproject. Clicking on the various
    links displays the MP-Config values. The value displayed in the previous screenshot
    corresponds to the second link and the `injected.piValue` config value. The relevant
    settings from `Chapter08-mpcodesample/svcs1/src/main/resources/application.properties`
    are shown here:


    ```

    # MP Config values for ConfigTestController

    injected.value=Injected value

    injected.piValue=3.1415926532

    lookup.value=A Lookup value

    ```


    Of note here is the override of the default five-digit value set via the `@ConfigProperty(name
    = "injected.piValue", defaultValue = "pi5=3.14159")` annotation in `ConfigTestController`
    to the full 10-digit value of PI as seen in the previous screenshot.


    ## The Health tab


    Clicking on the Health tab of the application displays a page like the following:


    ![](Images/13372fe8-e683-4dde-8cad-a06d611177b2.png)


    The links on the page correspond to the `health` check endpoints for the `svcs1`
    and `svcs2` images. Selecting either shows the health check output from the image.
    The `svcs1` image health check is composed of the `io.packt.sample.health.ServiceHealthCheck`
    and `io.packt.sample.health.CheckDiskspace`. Furthermore, `ServiceHealthCheck`
    is just a mock implementation that always returns an up status. The `CheckDiskspace`
    health check procedure looks to a path set using the MP-Config `health.pathToMonitor`
    property and then sets the procedure status to up/down, based ...'
