    # Developing and running MicroProfile applications across clouds


    What features does `MicroProfile` provide to support development across clouds?
    Microservices and support for language-agnostic communication based on HTTP REST
    API are two of the main features that are supported. In addition, `MicroProfile
    Config` supports the integration of cloud environment variables that define integration
    with the cloud environment. `MicroProfile Health Check` supports integration with
    the cloud environment health checks. `MicroProfile Metrics` and `MicroProfile
    OpenTracing` support integration with the DevOps monitoring tasks. Finally, `MicroProfile`
    fault tolerance supports fallback and recovery behaviors between the independent
    microservices.


