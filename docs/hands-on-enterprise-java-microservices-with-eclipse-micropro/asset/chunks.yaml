  trans: "\n# MicroProfile Config 集成\n\n对于 CDI 定义的接口，可以使用 MicroProfile Config 属性来定义通过\
    \ `RestClientBuilder` API 可用的额外行为。以我们的 `io.pckt.restc.contract.WorldClockApi`\
    \ 接口为例，以下 MicroProfile Config 属性可用于控制生成的代理行为：\n\n*   `io.pckt.restc.contract.WorldClockApi/mp-rest/url`：此服务使用的基础\
    \ URL，相当于 `RestClientBuilder#baseUrl` 方法。\n*   `io.pckt.restc.contract.WorldClockApi/mp-rest/scope`：用于注入的\
    \ CDI 作用域的完全限定类名；默认为 `javax.enterprise.context.Dependent`。\n*   `io.pckt.restc.contract.WorldClockApi/mp-rest/providers`：要包含在客户端中的提供者完全限定类名的逗号分隔列表，相当于\
    \ `RestClientBuilder#register` 方法或 `@RegisterProvider` 注解。\n*   `io.pckt.restc.contract.WorldClockApi/mp-rest/providers/com.mycompany.MyProvider/priority`：这将覆盖此接口的\
    \ `com.mycompany.MyProvider` 提供者的优先级。\n*   `io.pckt.restc.contract.WorldClockApi/mp-rest/connectTimeout`：等待连接到远程端点的超时时间，以毫秒为单位。\n\
    *   `io.pckt.restc.contract.WorldClockApi/mp-rest/readTimeout`：等待远程端点响应的超时时间，以毫秒为单位。\n\
    \n# 简化配置键\n\n由于 CDI 接口的默认 MP Config 属性名称因包含接口包名而可能相当长，MP-RC 规范支持使用 `@RegisterRestClient`\
    \ 注解的 `configKey` 属性来简化属性名称前缀：\n\n```\n@Path(\"/api/json\")@RegisterRestClient(baseUri\
    \ = WorldClockApi.BASE_URL, configKey = \"worldClock\")public interface WorldClockApi\
    \ { static final String BASE_URL = \"http://worldclockapi.com/api/json\";...}\n\
    ```\n\n使用 `worldClock` 这个 configKey，之前的属性列表简化为以下内容：\n\n*   `worldClock/mp-rest/url`\n\
    *   `worldClock/mp-rest/uri`\n*   `worldClock/mp-rest/scope`\n*   `worldClock/mp-rest/providers`\n\
    *   `worldClock/mp-rest/providers/com.mycompany.MyProvider/priority ...`\n\n#\
    \ 处理客户端标头\n\n假设您想要在 HTTP 授权标头中指定凭据以访问安全的远程服务，但又不希望在客户端接口方法中包含一个字符串 `authHeader`\
    \ 参数。MP-RC 的 `@ClientHeaderParam` 注解可用于指定应发送的 HTTP 标头，而无需更改客户端接口方法签名。\n\n以下示例说明了\
    \ `@ClientHeaderParam` 注解的两种用法，用于在 `WorldClockApi` 接口的变体中提供 `User-Agent` HTTP\
    \ 标头：\n\n```\nWorldClockApiWithHeaders.java\npublic interface WorldClockApiWithHeaders\
    \ {\n static final String BASE_URL = \"http://worldclockapi.com/api/json\";\n\n\
    \ default String lookupUserAgent() {\n Config config = ConfigProvider.getConfig();\n\
    \ String userAgent = config.getValue(\"WorldClockApi.userAgent\", String.class);\n\
    \ if(userAgent == null) {\n userAgent = \"MicroProfile REST Client 1.2\";\n }\n\
    \ return userAgent;\n }\n\n @GET\n @Path(\"/utc/now\")\n @Produces(MediaType.APPLICATION_JSON)\n\
    \ @ClientHeaderParam(name = \"User-Agent\", value = \"{lookupUserAgent}\")\n Now\
    \ utc();\n\n @GET\n @Path(\"{tz}/now\")\n @Produces(MediaType.APPLICATION_JSON)\n\
    \ @ClientHeaderParam(name = \"User-Agent\", value = \"MicroProfile REST Client\
    \ 1.2\")\n Now tz(@PathParam(\"tz\") String tz);\n} \n```\n\n也可以使用 `ClientHeadersFactory`\
    \ 实现来批量添加或传播标头：\n\n```\npackage org.eclipse.microprofile.rest.client.ext;\n\n\
    public interface ClientHeadersFactory {\n MultivaluedMap<String, String> update(\n\
    \    MultivaluedMap<String, String> incomingHeaders,\n    MultivaluedMap<String,\
    \ String> clientOutgoingHeaders);\n}\n```\n\n在前面的代码片段中，`incomingHeaders` 和 `clientOutgoingHeaders`\
    \ 参数的用途如下：\n\n*   `incomingHeaders`：表示入站请求的标头映射\n*   `clientOutgoingHeaders`：表示在客户端接口上指定的标头值的只读映射，是来自\
    \ `@ClientHeaderParam`、`@HeaderParam` 等的标头值的并集\n\n`update` 方法应返回一个 `MultivaluedMap`，其中包含要与\
    \ `clientOutgoingHeaders` 映射合并的标头，以形成将发送到出站请求的完整标头映射。诸如过滤器、拦截器和消息体写入器之类的提供者仍然可以在发送\
    \ HTTP 请求之前修改最终的标头映射。\n\n要启用 `ClientHeadersFactory`，客户端接口必须使用 `@RegisterClientHeaders`\
    \ 注解进行注解。如果此注解指定了一个值，则客户端实现必须调用指定 `ClientHeadersFactory` 实现类的实例。如果未指定值，则客户端实现必须调用\
    \ `DefaultClientHeadersFactoryImpl`。此默认工厂会将指定的标头从入站 JAX-RS 请求传播到出站请求——这些标头使用 MicroProfile\
    \ Config 属性 `org.eclipse.microprofile.rest.client.propagateHeaders` 以逗号分隔的列表指定。\n\
    \n# 高级用法的提供者注册\n\n`RestClientBuilder` 接口扩展了 JAX-RS 的 `Configurable` 接口，允许用户在构建时注册自定义提供者。所支持的提供者的行为由\
    \ JAX-RS 客户端 API 规范定义。MP-RC 实现将支持来自 JAX-RS 的 `ClientResponseFilter`、`ClientRequestFilter`、`MessageBodyReader`、`MessageBodyWriter`、`ParamConverter`、`ReaderInterceptor`\
    \ 和 `WriterInterceptor`。\n\n对于在其 `filter` 方法中具有 `ClientRequestContext` 参数的 `ClientResponseFilter`\
    \ 和 `ClientRequestFilter` 接口，MP-RC 实现会添加一个 `org.eclipse.microprofile.rest.client.invokedMethod`\
    \ 属性，其值为 `java.lang.reflect.Method` 对象……\n\n# 提供者优先级\n\n提供者可以通过注解和 `RestClientBuilder`\
    \ 进行注册。通过构建器注册的提供者将优先于 `@RegisterProvider` 注解。`@RegisterProvider` 注解的优先级值优先于类上的任何\
    \ `@javax.annotation.Priority` 注解。当使用 `RestClientBuilder` 接口上的 register 方法时，可以覆盖提供者优先级，因为它允许设置优先级。\n\
    \n# 功能注册\n\n如果注册的提供者类型是 JAX-RS `Feature`，则该 `Feature` 设置的优先级也将成为构建器的一部分。实现会维护已注册提供者的整体优先级，无论它们是如何注册的。`Feature`\
    \ 将用于在运行时注册额外的提供者，并且可以通过 `@RegisterProvider`、配置或 `RestClientBuilder` 进行注册。`Feature`\
    \ 将立即执行。因此，其优先级不被考虑（功能总是被执行）。\n\n# 默认提供者\n\nMP-RC 实现必须提供一组最低限度的提供者，包括以下内容：\n\n\
    *   `*/json` 类型：\n    *   JSON-P，`javax.json.JsonValue`\n    *   JSON-B，`javax.json.bind`\n\
    *   `*` 类型：\n    *   `byte[]`\n    *   `java.lang.String`\n    *   `java.io.InputStream`\n\
    \    *   `java.io.Reader`\n*   `text/plain` 类型：\n    *   `java.lang.Number 及其子类型`\n\
    \    *   `int, long, float 和 double`\n    *   `java.lang.Character 和 char`\n \
    \   *   `java.lang.Boolean 和 boolean`\n"
- fmt: "# Exception mapping\n\nMP-RC provides support for mapping an invocation response\
    \ into an exception via the `org.eclipse.microprofile.rest.client.ext.ResponseExceptionMapper`\
    \ interface:\n\n```\nimport javax.annotation.Priority;\nimport javax.ws.rs.Priorities;\n\
    import javax.ws.rs.core.MultivaluedMap;\nimport javax.ws.rs.core.Response;\nimport\
    \ java.util.Optional;\n\npublic interface ResponseExceptionMapper<T extends Throwable>\
    \ {\n    int DEFAULT_PRIORITY = Priorities.USER;\n    T toThrowable(Response response);\n\
    \    default boolean handles(int status, MultivaluedMap<String, Object> headers)\
    \ {\n        return status >= 400;\n    }\n    default int getPriority() {\n \
    \       return Optional.ofNullable(getClass().getAnnotation(Priority.class))\n\
    \            .map(Priority::value)\n            .orElse(DEFAULT_PRIORITY);\n \
    \   }\n}\n```\n\nConsider the following ...\n\n# Default exception mapping\n\n\
    Each implementation provides a default `ResponseExceptionMapper` implementation\
    \ that will map and invoke a response to `javax.ws.rs.WebApplicationException`\
    \ when the response status code is >= 400. It has a priority of `Integer.MAX_VALUE`,\
    \ and is meant to be used as a fallback whenever an error is encountered. This\
    \ mapper will be registered by default to all client interfaces, but this can\
    \ be disabled by setting an MP Config property, `microprofile.rest.client.disable.default.mapper`,\
    \ to `true`. It can also be disabled on a per-client basis by using the same property\
    \ when building the client:\n\n```\nRestClientBuilder.newBuilder().property(\"\
    microprofile.rest.client.disable.default.mapper\", true)\n```\n\n# Async support\n\
    \nMP-RC supports asynchronous method invocations. A client interface method is\
    \ asynchronous when the return type of the method is of the `java.util.concurrent.CompletionStage<?>`\
    \ type. An alternative version, called `WorldClockApiAsync.java`, of the `WorldClockApi`\
    \ interface that declares an asynchronous method is as follows:\n\n```\nimport\
    \ java.util.concurrent.CompletionStage;\nimport javax.ws.rs.GET;\nimport javax.ws.rs.Path;\n\
    import javax.ws.rs.PathParam;\nimport javax.ws.rs.Produces;\nimport javax.ws.rs.core.MediaType;\n\
