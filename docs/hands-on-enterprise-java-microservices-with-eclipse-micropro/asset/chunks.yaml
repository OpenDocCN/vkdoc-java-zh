    and OpenTracing*, discusses the Metrics and OpenTracing sub-projects and the problems
    they solve. You will learn how to work with code examples of these sub-projects.


    [Chapter 6](#88a56ac7-86bd-4d62-bf72-966f47a60798.xhtml), *MicroProfile OpenAPI
    and Type-Safe REST Client*, covers two more sub-projects: OpenAPI and type-safe
    REST client. This chapter will help you work with code examples and understand
    the utility of these sub-projects in solving your enterprise problems.


    [Chapter 7](#e38ec16e-cd38-411c-8a81-18932cdfb4d3.xhtml), *MicroProfile Implementations,
    Quarkus, and Interoperability via the Conference Application*, provides details
    on the implementations of MicroProfile that are currently available on the market
    and discusses the project''s progress to date. It also delves into *The Conference
    Application*, a demo that showcases the integration of different vendors'' implementations
    of MicroProfile.


    [Chapter 8](#5535a9c6-c887-40a5-95cd-c8b51ef75bf1.xhtml), *A Working Eclipse MicroProfile
    Code Sample*, provides a fully working project developed using MicroProfile (based
    on the *Conference Application*) and also gives coordinates to download the assets
    described.


    [Chapter 9](#2bf742ea-ed02-4f2b-8e91-f7ae4c200e6f.xhtml), *Reactive Programming
    and Future Developments*, goes over present APIs currently being incubated/developed
    and APIs being discussed for future inclusion in the MicroProfile specification.
    In addition, it covers MicroProfile candidate APIs for reactive programming as
    well as potential future relationships between MicroProfile and Jakarta EE.


    [Chapter 10](#6641f316-51af-43d0-9649-78888dad5f90.xhtml), *MicroProfile in Multi-Cloud
    Environments*, discusses how MicroProfile is a great specification for microservices-based
    applications in the cloud and provides guidance and considerations for using MicroProfile
    in hybrid-cloud and multi-cloud environments.


    # Table of Contents


    # Preface


    This book will help you learn about Eclipse MicroProfile, an open source specification
    for enterprise Java microservices that started back in 2016, along with its background
    and history, its value proposition to organizations and businesses, its community
    governance, the current Eclipse MicroProfile sub-projects (more are being added
    as the open source project evolves), its implementations, and its interoperability.
    It will also provide a peek into the future direction of Eclipse MicroProfile,
    a sample application in Red Hat''s implementation of Eclipse MicroProfile in Thorntail,
    one of the runtimes provided by Red Hat Runtimes, and guidance and considerations
    for running Eclipse MicroProfile in hybrid-cloud and multi-cloud environments.
    This book will follow a step-by-step approach to help you understand the Eclipse
    MicroProfile project and its implementations in the market.


    # Who this book is for


    This book is for Java developers who wish to create enterprise microservices.
    To get the most out of this book, you need to be familiar with Java EE and the
    concept of microservices.


    # To get the most out of this book


    A basic understanding of microservices and enterprise Java is required. Other
    installation and setup instructions are provided where necessary.


    # Download the example code files


    You can download the example code files for this book from your account at [www.packt.com](http://www.packt.com).
    If you purchased this book elsewhere, you can visit [www.packtpub.com/support](http://www.packtpub.com/support)
    and register to have the files emailed directly to you.


    You can download the code files by following these steps:


    1.  Log in or register at [www.packt.com](http://www.packt.com).

    2.  Select the Support tab.

    3.  Click on Code Downloads.

    4.  Enter the name of the book in the Search box and follow the onscreen instructions.


    Once the file is downloaded, please make sure that you unzip or extract the folder
    using the latest version of:


    *   WinRAR/7-Zip for Windows

    *   Zipeg/iZip/UnRarX for Mac

    *   7-Zip/PeaZip for Linux


    The code bundle for the book is also hosted on GitHub at [https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile
    ...](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile)


    # Download the color images


    We also provide a PDF file that has color images of the screenshots/diagrams used
    in this book. You can download it here: [https://static.packt-cdn.com/downloads/9781838643102_ColorImages.pdf](_ColorImages.pdf).


    # Conventions used


    There are a number of text conventions used throughout this book.


    `CodeInText`: Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and Twitter handles.
    Here is an example: "The `checks` array object type consists of a required `name`
    and `status` string, along with an optional `data` object that contains optional
    `key` and `value` pairs."


    A block of code is set as follows:


    ```

    package org.eclipse.microprofile.health;@FunctionalInterfacepublic interface HealthCheck
    {  HealthCheckResponse call();}

    ```


    Any command-line input or output is written as follows:


    ```

    Scotts-iMacPro:jwtprop starksm$ curl http://localhost:8080/jwt/secureHello; echoNot
    authorized

    ```


    **Bold**: Indicates a new ...


    # Get in touch


    Feedback from our readers is always welcome.


    **General feedback**: If you have questions about any aspect of this book, mention
    the book title in the subject of your message and email us at `customercare@packtpub.com`.


    **Errata**: Although we have taken every care to ensure the accuracy of our content,
    mistakes do happen. If you have found a mistake in this book, we would be grateful
    if you would report this to us. Please visit [www.packtpub.com/submit/errata](http://www.packtpub.com/submit/errata),
    selecting your book, clicking on the Errata Submission Form link, and entering
    the details.


    **Piracy**: If you come across any illegal copies of our works in any form on
    the internet, we would be grateful if you would provide us with the location address
    or website name. Please contact us at `copyright@packt.com` with a link to the
    material.


    **If you are interested in becoming an author**: If there is a topic that you
    have expertise in, and you are interested in either writing or contributing to
    a book, please visit [authors.packtpub.com](http://authors.packtpub.com/).


    # Reviews


    Please leave a review. Once you have read and used this book, why not leave a
    review on the site that you purchased it from? Potential readers can then see
    and use your unbiased opinion to make purchase decisions, we at Packt can understand
    what you think about our products, and our authors can see your feedback on their
    book. Thank you!


    For more information about Packt, please visit [packt.com](http://www.packt.com/).'
  trans: '

    # 本书涵盖内容


    第 1 章，*Eclipse MicroProfile 简介*，在数字经济背景下展开讨论，阐述了什么是企业级 Java 微服务，以及本书后续章节将涵盖的内容。


    第 2 章，*治理与贡献*，涵盖了治理、流程以及如何为 MicroProfile 项目做出贡献。


    第 3 章，*MicroProfile 配置与容错*，详细介绍了 MicroProfile 子项目中的配置和容错，解释了每个子项目解决的问题，并给出了相应的代码示例。


    第 4 章，*MicroProfile 健康检查与 JWT 传播*，将带你了解健康检查和 JWT 传播子项目，借助代码示例帮助你理解它们所应对的挑战。


    第 5 章，*MicroProfile 指标与 OpenTracing*，讨论了指标和 OpenTracing 子项目及其解决的问题。你将学习如何使用这些子项目的代码示例。


    第 6 章，*MicroProfile OpenAPI 与类型安全 REST 客户端*，涵盖了另外两个子项目：OpenAPI 和类型安全 REST 客户端。本章将帮助你使用代码示例，并理解这些子项目在解决企业问题中的实用性。


    第 7 章，*MicroProfile 实现、Quarkus 以及通过会议应用实现的互操作性*，详细介绍了当前市场上可用的 MicroProfile 实现，并讨论了该项目迄今为止的进展。它还深入探讨了*会议应用*，这是一个展示不同供应商
    MicroProfile 实现集成的演示程序。


    第 8 章，*一个可运行的 Eclipse MicroProfile 代码示例*，提供了一个使用 MicroProfile（基于*会议应用*）开发的完整可运行项目，并提供了下载所述资源的坐标。


    第 9 章，*响应式编程与未来发展*，回顾了当前正在孵化/开发的 API，以及正在讨论未来纳入 MicroProfile 规范的 API。此外，它还涵盖了用于响应式编程的
    MicroProfile 候选 API，以及 MicroProfile 与 Jakarta EE 之间潜在的未来关系。


    第 10 章，*多云环境中的 MicroProfile*，讨论了 MicroProfile 如何成为云中基于微服务的应用的优秀规范，并为在混合云和多云环境中使用
    MicroProfile 提供了指导和建议。


    # 目录


    # 前言


    本书将帮助你了解 Eclipse MicroProfile，这是一个始于 2016 年的企业级 Java 微服务开源规范，涵盖其背景和历史、对组织和企业的价值主张、社区治理、当前的
    Eclipse MicroProfile 子项目（随着开源项目的发展，更多子项目正在添加中）、其实现及其互操作性。本书还将展望 Eclipse MicroProfile
    的未来方向，提供一个在 Red Hat 的 Eclipse MicroProfile 实现（Thorntail，Red Hat Runtimes 提供的运行时之一）中的示例应用，以及关于在混合云和多云环境中运行
    Eclipse MicroProfile 的指导和建议。本书将采用循序渐进的方法，帮助你理解 Eclipse MicroProfile 项目及其在市场上的实现。


    # 本书读者对象


    本书面向希望创建企业级微服务的 Java 开发者。为了充分利用本书，你需要熟悉 Java EE 和微服务的概念。


    # 充分利用本书


    需要具备微服务和企业级 Java 的基本理解。必要时会提供其他安装和设置说明。


    # 下载示例代码文件


    你可以从你在 [www.packt.com](http://www.packt.com) 的账户下载本书的示例代码文件。如果你从别处购买了本书，可以访问 [www.packtpub.com/support](http://www.packtpub.com/support)
    并注册，以便将文件直接通过电子邮件发送给你。


    你可以按照以下步骤下载代码文件：


    1.  登录或注册 [www.packt.com](http://www.packt.com)。

    2.  选择“支持”选项卡。

    3.  点击“代码下载”。

    4.  在搜索框中输入书名，然后按照屏幕上的说明操作。


    文件下载后，请确保使用最新版本的以下软件解压或提取文件夹：


    *   Windows 系统：WinRAR/7-Zip

    *   Mac 系统：Zipeg/iZip/UnRarX

    *   Linux 系统：7-Zip/PeaZip


    本书的代码包也托管在 GitHub 上，地址为 [`github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile
    ...`](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile)


    # 下载彩色图片


    我们还提供了一个 PDF 文件，其中包含本书中使用的截图/图表的彩色图片。你可以在此处下载：`static.packt-cdn.com/downloads/9781838643102_ColorImages.pdf`。


    # 使用约定


    本书通篇使用了许多文本约定。


    `CodeInText`：表示文本中的代码词、数据库表名、文件夹名、文件名、文件扩展名、路径名、虚拟 URL、用户输入和 Twitter 句柄。示例如下："`checks`
    数组对象类型由一个必需的 `name` 和 `status` 字符串，以及一个可选的 `data` 对象组成，该对象包含可选的 `key` 和 `value`
    对。"


    代码块设置如下：


    ```

    package org.eclipse.microprofile.health;@FunctionalInterfacepublic interface HealthCheck
    {  HealthCheckResponse call();}

    ```


    任何命令行输入或输出编写如下：


    ```

    Scotts-iMacPro:jwtprop starksm$ curl http://localhost:8080/jwt/secureHello; echoNot
    authorized

    ```


    **粗体**：表示新术语...


    # 联系我们


    我们始终欢迎读者的反馈。


    **一般反馈**：如果你对本书的任何方面有疑问，请在邮件主题中注明书名，并发送电子邮件至 `customercare@packtpub.com`。


    **勘误**：尽管我们已尽一切努力确保内容的准确性，但错误仍可能发生。如果你在本书中发现错误，我们将不胜感激，请向我们报告。请访问 [www.packtpub.com/submit/errata](http://www.packtpub.com/submit/errata)，选择你的书籍，点击“勘误提交表”链接，并输入详细信息。


    **盗版**：如果你在互联网上发现任何形式的我们作品的非法副本，我们将不胜感激，请向我们提供位置地址或网站名称。请通过 `copyright@packt.com`
    联系我们，并附上材料的链接。


    **如果你有兴趣成为作者**：如果你有擅长的主题，并且有兴趣撰写或为本书做出贡献，请访问 [authors.packtpub.com](http://authors.packtpub.com/)。


    # 评论


    请留下评论。一旦你阅读并使用了本书，为什么不在你购买它的网站上留下评论呢？这样潜在读者可以看到并利用你公正的意见做出购买决定，我们 Packt 可以了解你对我们产品的看法，我们的作者也可以看到你对他们书籍的反馈。谢谢！


    有关 Packt 的更多信息，请访问 [packt.com](http://www.packt.com/)。

