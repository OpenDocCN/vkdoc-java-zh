- fmt: '# Using Eclipse MicroProfile for cloud-native application development


    What is a cloud-native application? Typically, a definition for **cloud-native**
    entails the following characteristics:


    - Designed as loosely coupled services, such as microservices

    - Loosely coupled services that interact via language-independent communication
    protocols, which allow microservices to be implemented in different programming
    languages and frameworks

    - Lightweight containers that can scale up and down on-demand or via resource
    utilization metrics

    - Managed through Agile DevOps processes, with each microservice of a cloud-native
    application going through an independent life cycle that''s managed through an
    Agile process using **continuous integration/continuous delivery** (**CI/CD**)
    pipelines


    However, Eclipse MicroProfile''s goal is to optimize Java for microservice architectures,
    so does it make it suitable for cloud-native application development? What about
    container-native development? What is the relationship between microservices,
    cloud-native development, and container-native development? How do these differ
    or compare? Let''s find out!


    # Microservices versus cloud native versus container native


    First, let''s draw the differences between these three terms with respect to how
    an application is developed. As we discussed in [Chapter 1](#96308ec7-7393-41b7-a17c-43c15d409f40.xhtml),
    *Introduction to Eclipse MicroProfile*, an Enterprise Java microservice has the
    following features:


    - It is a microservice written using the Java language.

    - It can use any Java framework.

    - It can use any Java API.

    - It must be enterprise grade, which means it must have high reliability, availability,
    scalability, security, robustness, and performance.

    - It must fulfill the characteristics of a microservice, all of which are listed
    at [https://martinfowler.com/microservices/](https://martinfowler.com/microservices/).


    By its definition, a microservice does not prescribe specific details of the underlying
    ...


    # What about 12-factor applications?


    Just like the microservices and microservices architecture definitions, a 12-factor
    app does not prescribe the underlying technologies, for example, the programming
    language, database, caches, and so on, or frameworks that should be used to implement
    them. The 12-factor app is a methodology that''s used for implementing applications.
    These twelve factors are as follows:


    - One codebase tracked in revision control, many deploys

    - Explicitly declare and isolate dependencies

    - Store config in the environment

    - Treat backing services as attached resources

    - Strictly separate build and run stages

    - Execute the app as one or more stateless processes

    - Export services via port binding

    - Scale out via the process model

    - Maximize robustness with fast startup and graceful shutdown

    - Keep development, staging, and production as similar as possible

    - Treat logs as event streams

    - Run admin/management tasks as one-off processes


    Implementing an application using this methodology helps us do the following:


    - Minimize time and cost for new developers joining the project

    - Offer portability between execution environments

    - Easily deploy the application to cloud platforms

    - Minimize the differences between development and production

    - Scale it up without changes


    You can read all about the 12 factors at [https://12factor.net](https://12factor.net).


    The 12-factor app is a methodology that a developer can follow while designing
    and implementing microservices and applications, independent of the programming
    language or framework that''s being used to implement them. The framework that
    a developer can use to implement microservices using the 12-factor app is Eclipse
    MicroProfile. The 12-factor app and Eclipse MicroProfile are not mutually exclusive
    but really complement each other.


    But what about a methodology for designing and implementing applications that''s
    not the 12-factor app? What about serverless and **Function-as-a-Service** (**FaaS**)
    technologies? How does Eclipse MicroProfile fit into these newer cloud-native
    technologies?


    # What about serverless and FaaS?


    Serverless and FaaS cloud-native technologies have been experiencing steady interest
    and growth in the market, as evidenced by offerings from all the major cloud providers,
    that is, AWS Lambda, Azure Functions, Oracle Functions, and Google Cloud Functions.
    In an era where organizations are increasingly using the cloud for development
    and production workloads, and compute and memory costs are operational expenses
    that need to be tracked and monitored, FaaS is attractive because it abstracts
    compute and memory management away from the user, who is then able to focus on
    developing business logic, thereby becoming a lot more productive than ever before.


    With FaaS, developers don''t need to set up VMs and memory, ...


    # Cloud-native application development


    There are two complementary aspects or components to cloud-native application
    development: application services and infrastructure services. Application services
    speed up the development of the business logic of a cloud-native application,
    and infrastructure services speed up its delivery and deployment. These two aspects
    are complementary and integral to cloud-native application development. You cannot
    have one without the other. They are essentially the yin and the yang of cloud-native
    application development, as depicted by the following diagram:


    ![](Images/5396deb8-7e59-4be5-9b20-a31287abeed3.png)


    As we mentioned earlier in this chapter, cloud-native application development
    is an approach to building and running applications that takes full advantage
    of the cloud computing model, which is based on four key tenets:


    - A service-based architecture (miniservices, microservices, SOA services, and
    so on)

    - An API-driven approach for inter-service communication

    - An underlying infrastructure that''s based on containers

    - DevOps processes


    The following diagram depicts the four key tenets of cloud-native application
    development:


    ![](Images/5994cf8f-77e2-4906-b576-0a8742fe81b5.png)


    As shown in the previous diagram, the architecture and communication aspects are
    related to the development concerns of cloud-native applications, and the infrastructure
    and the process aspects are related to their delivery/deployment.


    Organizations who are on their journey to adopting cloud-native application development
    can benefit from eight steps, as described by the e-Book titled *The path to cloud-native
    applications: **8 steps to guide your journey*.


    To obtain the e-Book *The path to cloud-native applications: **8 steps to guide
    your journey*, please refer to [https://www.redhat.com/en/resources/path-to-cloud-native-applications-ebook](https://www.redhat.com/en/resources/path-to-cloud-native-applications-ebook).
    Let''s discuss how Eclipse MicroProfile can play a role in these eight steps:'
