    \n这些示例应该能让你感受到微服务客户端之间的交互，以及如何使用 JWT 来保护微服务端点，从而实现无状态认证和基于角色的访问控制（RBAC），以及基于 JWT\
    \ 中声明的自定义授权。\n\n# 总结\n\n在本章中，我们学习了 MicroProfile Health Check 和 JWT Propagation\
    \ 项目。你现在应该理解了什么是健康检查，以及如何添加特定于应用程序的检查（称为过程）。这些检查允许你的微服务在云环境中描述其非平凡的健康需求。你还应该理解如何使用\
    \ JWT 在微服务之上提供认证和授权能力，以控制对端点的访问。你还应该理解如何使用 JWT 中的内容以特定于用户的方式增强你的微服务。\n\n下一章将介绍\
    \ MicroProfile Metrics 和 OpenTracing 特性。这些特性允许你的微服务提供额外的信息……\n"
- fmt: "# Questions\n\n1. Is the `MP-HC` wire format useful in all environments?\n\
    2. Can an `MP-HC` response contain arbitrary properties?\n3. What if my application\
    \ has different types of services that need to report health status?\n4. What\
    \ is a `JWT`?\n5. What is a claim?\n6. Are there restrictions on what can be in\
    \ a `JWT`?\n7. What is/are the main step(s) in authenticating a `JWT`?\n8. Beyond\
    \ the security annotations, how might we perform an authorization check using\
    \ `JWT`s?\n\n# MicroProfile Metrics and OpenTracing\n\nOnce developers have written\
    \ code and it is put into production, there is a need to observe what the code\
    \ is doing, how well it is performing, and what resources it is using. MicroProfile\
    \ has created two specifications to deal with these concerns: Metrics and (integration\
    \ with) OpenTracing.\n\nStarting off with the Metrics section, we will discuss\
    \ the following topics:\n\n- The rationale behind specifications\n- Exposition\
    \ formats of metrics on an enabled server\n- Providing metrics from within your\
    \ application\n- Using Prometheus, a cloud-native time series database, to retrieve\
    \ and analyze metric data\n\nIn the OpenTracing section, we will discuss the following:\n\
    \n- An introduction to the tracing domain\n- Configuration properties ...\n\n\
    # MicroProfile Metrics\n\nMicroProfile Metrics exposes the metric data (often\
    \ called **telemetry**) of the running server, for example, CPU and memory usage,\
    \ and the thread count. This data is then often fed into charting systems to visualize\
    \ metrics over time or to serve capacity-planning purposes; of course, they also\
    \ serve to notify DevOps people when the values go outside a predefined threshold\
    \ range.\n\nThe Java Virtual Machine had a way to expose data for a long time\
    \ via `MBeans` and the `MBeanServer`. Java SE 6 saw the introduction of an (RMI-based)\
    \ remote protocol for all VMs defining how to access the `MBean Server` from remote\
    \ processes. Dealing with this protocol is difficult and does not fit in with\
    \ today's HTTP-based interactions.\n\nThe other pain point is that many globally\
    \ existing servers have different properties exposed under different names. It\
    \ is thus not easy to set up monitoring of different kinds of server.\n\nMicroProfile\
    \ has created a monitoring specification that addresses these two points via an\
    \ HTTP-based API permitting access by monitoring agents and a Java API that allows\
    \ application-specific metrics to be exported on top of a set of servers and JVM\
    \ metrics.\n\nMicroProfile Metrics is developing the 2.x version of the specification\
    \ that has some breaking changes to 1.x. The following sections talk about 1.x\
    \ – the changes in 2.0 are discussed in the *New in MP-Metrics 2.0* section.\n\
    \nThe specification defines three scopes for metrics:\n\n- **Base**: These are\
    \ metrics, mostly JVM statistics, that every compliant vendor has to support.\n\
    - **Vendor**: Optional vendor-specific metrics that are not portable.\n- **Application**:\
    \ Optional metrics from deployed applications. The Java API will be shown in the\
    \ *Supplying application-specific metrics* section.\n\nAnother issue with the\
    \ classic JMX approach, which MicroProfile Metrics addresses, is the lack of metadata\
    \ information about the semantics of a metric.\n\n# Metadata\n\nMetadata is a\
    \ very important part of MicroProfile Metrics. While it is possible to expose\
    \ a metric `foo` with a value of `142`, it is not self-describing. An operator\
    \ seeing that metric can't tell what this is about, what the unit is, and whether\
    \ `142` is a good value or not.\n\nMetadata is used to provide units and also\
    \ a description of the metric so that the preceding could now be `foo: runtime;\
    \ 142` seconds. This now allows for correct scaling on the display to *two minutes\
    \ and 22 seconds*. And the user receiving an alert relating to this metric can\
    \ understand that it refers to some runtime timing.\n\n# Retrieving metrics from\
    \ the server\n\nMicroProfile Metrics exposes metrics via a REST interface, by\
    \ default, under the `/metrics` context root. You can find the code at [https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter05-metrics](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter05-metrics).\
    \ Follow the `README.md` file to build the code, run it, and hit the [http://localhost:8080/book-metrics/hello](http://localhost:8080/book-metrics/hello)\
    \ and [http://localhost:8080/book-metrics](http://localhost:8080/book-metrics)\
    \ endpoints a few times with your browser to generate some data.\n\nAs of MicroProfile\
    \ 1.3/2.0, there is nothing in the specifications about securing that endpoint.\
    \ This is thus left to the individual implementation.\n\nUsing this REST interface,\
    \ it is easy to retrieve the data, for example, via the following `curl` command:\n\
    \n```\n$ curl http://localhost:8080/metrics\n```\n\nThis command shows the Metrics\
    \ 1.x output in Prometheus text format (abbreviated):\n\n```\n# TYPE base:classloader_total_loaded_class_count\
    \ counter\nbase:classloader_total_loaded_class_count 13752.0 \n# TYPE base:cpu_system_load_average\
    \ gauge\nbase:cpu_system_load_average 2.796875\n# TYPE base:thread_count counter\n\
    base:thread_count 76.0\n# TYPE vendor:memory_pool_metaspace_usage_max_bytes gauge\n\
    vendor:memory_pool_metaspace_usage_max_bytes 7.0916056E7\n# TYPE application:hello_time_rate_per_second\
    \ gauge\napplication:hello_time_rate_per_second{app=\"shop\",type=\"timer\"} \n\
    3.169298061424996E-10\n# TYPE application:hello_time_one_min_rate_per_second gauge\n\
    application:hello_time_one_min_rate_per_second{app=\"shop\",type=\"timer\"} 0.0\n\
    [...]\n```\n\nIf you do not provide a media type, the default output format is\
    \ the Prometheus text format (which can also be rendered nicely in the browser).\
    \ The Prometheus format exposes additional metadata to the values in the `# TYPE`\
    \ and `# HELP` lines. You can also see in the previous example how the scopes\
    \ (base, vendor, and application) are prepended to the actual metrics name.\n\n\
    Alternatively, it is possible to retrieve data in the JSON format by providing\
    \ an `HAccept` header (again abbreviated):\n\n```\n$ curl -HAccept:application/json\
    \ http://localhost:8080/metrics\n```\n\nThis command results in the following\
    \ output:\n\n```\n{\n \"application\" :\n  {\n    \"helloTime\" : {\n        \"\
    p50\": 1.4884994E7,\n     [...]\n       \"count\": 1,\n       \"meanRate\": 0.06189342578194245\n\
    \     },\n    \"getCounted\" : 1\n  },\n  \"base\" :\n  {\n    \"classloader.totalLoadedClass.count\"\
    \ : 13970,\n    \"cpu.systemLoadAverage\" : 2.572265625,\n    \"gc.PS Scavenge.time\"\
    \ : 290\n  },\n  \"vendor\" :\n  {\n    \"test\" : 271,\n    \"memoryPool.Metaspace.usage.max\"\
    \ : 72016928,\n }\n```\n\nIn this case, the pure data is exposed; the scopes form\
    \ a top level, and respective metrics are nested inside. Matching metadata can\
    \ be retrieved via an HTTP `XOPTIONS` call:\n\n```\n$ curl XOPTIONS -HAccept:application/json\
    \ http://localhost:8080/metrics\n```\n\nThe output now contains the metadata as\
    \ a map:\n\n```\n{\n\"application\" : {\n \"helloTime\": {\n \"unit\": \"nanoseconds\"\
    ,\n \"type\": \"timer\",\n \"description\": \"Timing of the Hello call\",\n \"\
    tags\": \"app=shop,type=timer\",\n \"displayName\": \"helloTime\"\n }\n}\n[...]\n\
    ```\n\nNow that we have seen how we can retrieve different types of data and metadata,\
    \ we will have a quick look at how we can limit retrieval to specific scopes."
  raw: "# Questions\n\n1.  Is the MP-HC wire format useful in all environments?\n\
    2.  Can an MP-HC response contain arbitrary properties?\n3.  What if my application\
    \ has different types of services that need to report health status?\n4.  What\
    \ is a JWT?\n5.  What is a claim?\n6.  Are there restrictions on what can be in\
    \ a JWT?\n7.  What is/are the main step(s) in authenticating a JWT?\n8.  Beyond\
    \ the security annotations, how might we perform an authorization check using\
    \ JWTs?\n\n# MicroProfile Metrics and OpenTracing\n\nOnce developers have written\
    \ code and it is put into production, there is a need to observe what the code\
    \ is doing, how well it is performing, and what resources it is using. MicroProfile\
    \ has created two specifications to deal with these concerns: Metrics and (integration\
    \ with) OpenTracing.\n\nStarting off with the Metrics section, we will discuss\
    \ the following topics:\n\n*   The rationale behind specifications\n*   Exposition\
    \ formats of metrics on an enabled server\n*   Providing metrics from within your\
    \ application\n*   Using Prometheus, a cloud-native time series database, to retrieve\
    \ and analyze metric data\n\nIn the OpenTracing section, we will discuss the following:\n\
    \n*   An introduction to the tracing domain \n*   Configuration properties ...\n\
    \n# MicroProfile Metrics\n\nMicroProfile Metrics exposes the metric data (often\
    \ called **telemetry**) of the running server, for example, CPU and memory usage,\
    \ and the thread count. This data is then often fed into charting systems to visualize\
    \ metrics over time or to serve capacity-planning purposes; of course, they also\
    \ serve to notify DevOps people when the values go outside a predefined threshold\
    \ range.\n\nThe Java Virtual Machine had a way to expose data for a long time\
    \ via MBeans and the MBeanServer. Java SE 6 saw the introduction of an (RMI-based)\
    \ remote protocol for all VMs defining how to access the MBean Server from remote\
    \ processes. Dealing with this protocol is difficult and does not fit in with\
    \ today's HTTP-based interactions.\n\nThe other pain point is that many globally\
    \ existing servers have different properties exposed under different names. It\
    \ is thus not easy to set up monitoring of different kinds of server.\n\nMicroProfile\
    \ has created a monitoring specification that addresses these two points via an\
    \ HTTP-based API permitting access by monitoring agents and a Java API that allows\
    \ application-specific metrics to be exported on top of a set of servers and JVM\
    \ metrics.\n\nMicroProfile Metrics is developing the 2.x version of the specification\
    \ that has some breaking changes to 1.x. The following sections talk about 1.x\
    \ – the changes in 2.0 are discussed in the *New in MP-Metrics 2.0* section.\n\
    \nThe specification defines three scopes for metrics:\n\n*   Base: These are metrics,\
    \ mostly JVM statistics, that every compliant vendor has to support.\n*   Vendor:\
    \ Optional vendor-specific metrics that are not portable.\n*   Application: Optional\
    \ metrics from deployed applications. The Java API will be shown in the *Supplying\
    \ application-specific metrics* section.\n\nAnother issue with the classic JMX\
    \ approach, which MicroProfile Metrics addresses, is the lack of metadata information\
    \ about the semantics of a metric.\n\n# Metadata\n\nMetadata is a very important\
    \ part of MicroProfile Metrics. While it is possible to expose a metric `foo`\
    \ with a value of `142`, it is not self-describing. An operator seeing that metric\
    \ can't tell what this is about, what the unit is, and whether `142` is a good\
    \ value or not.\n\nMetadata is used to provide units and also a description of\
    \ the metric so that the preceding could now be `foo: runtime; 142` seconds. This\
    \ now allows for correct scaling on the display to *two minutes and 22 seconds*.\
    \ And the user receiving an alert relating to this metric can understand that\
    \ it refers to some runtime timing.\n\n# Retrieving metrics from the server\n\n\
    MicroProfile Metrics exposes metrics via a REST interface, by default, under the\
    \ `/metrics` context root. You can find the code at [https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter05-metrics](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter05-metrics).\
    \ Follow the `README.md` file to build the code, run it, and hit the [http://localhost:8080/book-metrics/hello](http://localhost:8080/book-metrics/hello)\
    \ and [http://localhost:8080/book-metrics](http://localhost:8080/book-metrics)\
    \ endpoints a few times with your browser to generate some data.\n\nAs of MicroProfile\
    \ 1.3/2.0, there is nothing in the specifications about securing that endpoint.\
    \ This is thus left to the individual implementation.\n\nUsing this REST interface,\
    \ it is easy to retrieve the data, for example, via the following `curl` command:\n\
    \n```\n$ curl http://localhost:8080/metrics\n```\n\nThis command shows the Metrics\
    \ 1.x output in Prometheus text format (abbreviated):\n\n```\n# TYPE base:classloader_total_loaded_class_count\
    \ counter\nbase:classloader_total_loaded_class_count 13752.0 \n# TYPE base:cpu_system_load_average\
    \ gauge\nbase:cpu_system_load_average 2.796875\n# TYPE base:thread_count counter\n\
    base:thread_count 76.0\n# TYPE vendor:memory_pool_metaspace_usage_max_bytes gauge\n\
    vendor:memory_pool_metaspace_usage_max_bytes 7.0916056E7\n# TYPE application:hello_time_rate_per_second\
    \ gauge\napplication:hello_time_rate_per_second{app=\"shop\",type=\"timer\"} \n\
    3.169298061424996E-10\n# TYPE application:hello_time_one_min_rate_per_second gauge\n\
    application:hello_time_one_min_rate_per_second{app=\"shop\",type=\"timer\"} 0.0\n\
    [...]\n```\n\nIf you do not provide a media type, the default output format is\
    \ the Prometheus text format (which can also be rendered nicely in the browser).\
    \ The Prometheus format exposes additional metadata to the values in the `# TYPE`\
    \ and `# HELP` lines. You can also see in the previous example how the scopes\
    \ (base, vendor, and application) are prepended to the actual metrics name.\n\n\
    Alternatively, it is possible to retrieve data in the JSON format by providing\
    \ an `HAccept` header (again abbreviated):\n\n```\n$ curl -HAccept:application/json\
    \ http://localhost:8080/metrics\n```\n\nThis command results in the following\
    \ output:\n\n```\n{\n \"application\" :\n  {\n    \"helloTime\" : {\n        \"\
    p50\": 1.4884994E7,\n     [...]\n       \"count\": 1,\n       \"meanRate\": 0.06189342578194245\n\
    \     },\n    \"getCounted\" : 1\n  },\n  \"base\" :\n  {\n    \"classloader.totalLoadedClass.count\"\
    \ : 13970,\n    \"cpu.systemLoadAverage\" : 2.572265625,\n    \"gc.PS Scavenge.time\"\
    \ : 290\n  },\n  \"vendor\" :\n  {\n    \"test\" : 271,\n    \"memoryPool.Metaspace.usage.max\"\
    \ : 72016928,\n }\n```\n\nIn this case, the pure data is exposed; the scopes form\
    \ a top level, and respective metrics are nested inside. Matching metadata can\
    \ be retrieved via an HTTP `XOPTIONS` call:\n\n```\n$ curl XOPTIONS -HAccept:application/json\
    \ http://localhost:8080/metrics\n```\n\nThe output now contains the metadata as\
    \ a map:\n\n```\n{\n\"application\" : {\n \"helloTime\": {\n \"unit\": \"nanoseconds\"\
    ,\n \"type\": \"timer\",\n \"description\": \"Timing of the Hello call\",\n \"\
    tags\": \"app=shop,type=timer\",\n \"displayName\": \"helloTime\"\n }\n}\n[...]\n\
    }\n```\n\nNow that we have seen how we can retrieve different types of data and\
    \ metadata, we will have a quick look at how we can limit retrieval to specific\
    \ scopes."
  trans: "\n# 问题\n\n1.  MP-HC 线路格式是否适用于所有环境？\n2.  MP-HC 响应能否包含任意属性？\n3.  如果我的应用程序有不同类型的服务需要报告健康状态，该怎么办？\n\
    4.  什么是 JWT？\n5.  什么是声明（claim）？\n6.  JWT 的内容是否有限制？\n7.  验证 JWT 的主要步骤是什么？\n8. \
    \ 除了安全注解，我们如何使用 JWT 执行授权检查？\n\n# MicroProfile Metrics 和 OpenTracing\n\n一旦开发人员编写了代码并将其投入生产，就需要观察代码正在做什么、性能如何以及正在使用哪些资源。MicroProfile\
    \ 创建了两个规范来处理这些问题：Metrics 和（与）OpenTracing（的集成）。\n\n从 Metrics 部分开始，我们将讨论以下主题：\n\n\
    *   规范背后的基本原理\n*   已启用服务器上指标的展示格式\n*   从应用程序内部提供指标\n*   使用 Prometheus（一种云原生时序数据库）检索和分析指标数据\n\
    \n在 OpenTracing 部分，我们将讨论以下内容：\n\n*   追踪领域简介\n*   配置属性 ...\n\n# MicroProfile Metrics\n\
    \nMicroProfile Metrics 公开了运行中服务器的指标数据（通常称为**遥测**），例如 CPU 和内存使用情况以及线程数。这些数据通常被输入到图表系统中，以可视化指标随时间的变化或用于容量规划目的；当然，当数值超出预定义的阈值范围时，它们也用于通知\
    \ DevOps 人员。\n\nJava 虚拟机长期以来一直通过 MBean 和 MBeanServer 提供一种公开数据的方式。Java SE 6 为所有虚拟机引入了一种（基于\
    \ RMI 的）远程协议，定义了如何从远程进程访问 MBean Server。处理此协议很困难，并且不适合当今基于 HTTP 的交互。\n\n另一个痛点是，许多全球现有的服务器以不同的名称公开不同的属性。因此，设置对不同类型服务器的监控并不容易。\n\
    \nMicroProfile 创建了一个监控规范，通过一个基于 HTTP 的 API（允许监控代理访问）和一个 Java API（允许在一组服务器和 JVM\
    \ 指标之上导出特定于应用程序的指标）来解决这两个问题。\n\nMicroProfile Metrics 正在开发规范的 2.x 版本，该版本对 1.x 有一些重大更改。以下部分讨论\
    \ 1.x——2.0 中的更改在 *MP-Metrics 2.0 中的新特性* 部分中讨论。\n\n该规范为指标定义了三个范围：\n\n*   **基础**：这些是每个合规供应商都必须支持的指标，主要是\
    \ JVM 统计数据。\n*   **供应商**：可选的供应商特定指标，不可移植。\n*   **应用程序**：来自已部署应用程序的可选指标。Java API\
    \ 将在*提供特定于应用程序的指标*部分中展示。\n\nMicroProfile Metrics 解决的经典 JMX 方法的另一个问题是缺乏关于指标语义的元数据信息。\n\
    \n# 元数据\n\n元数据是 MicroProfile Metrics 中非常重要的一部分。虽然可以公开一个值为 `142` 的指标 `foo`，但它不是自描述的。看到该指标的操作员无法判断这是什么、单位是什么，以及\
    \ `142` 是否是一个好值。\n\n元数据用于提供单位以及指标的描述，这样前面的内容现在可以是 `foo: runtime; 142` 秒。这现在允许在显示时正确缩放为*两分二十二秒*。并且收到与此指标相关警报的用户可以理解它指的是某个运行时计时。\n\
    \n# 从服务器检索指标\n\n默认情况下，MicroProfile Metrics 通过 REST 接口在 `/metrics` 上下文根下公开指标。您可以在\
    \ [`github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter05-metrics`](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter05-metrics)\
    \ 找到代码。按照 `README.md` 文件构建代码、运行它，并使用浏览器多次访问 [`localhost:8080/book-metrics/hello`](http://localhost:8080/book-metrics/hello)\
    \ 和 [`localhost:8080/book-metrics`](http://localhost:8080/book-metrics) 端点以生成一些数据。\n\
    \n从 MicroProfile 1.3/2.0 开始，规范中没有关于保护该端点的内容。因此，这留给各个实现自行处理。\n\n使用此 REST 接口，可以轻松检索数据，例如，通过以下\
    \ `curl` 命令：\n\n```\n$ curl http://localhost:8080/metrics\n```\n\n此命令以 Prometheus\
    \ 文本格式（缩写）显示 Metrics 1.x 输出：\n\n```\n# TYPE base:classloader_total_loaded_class_count\
    \ counter\nbase:classloader_total_loaded_class_count 13752.0 \n# TYPE base:cpu_system_load_average\
    \ gauge\nbase:cpu_system_load_average 2.796875\n# TYPE base:thread_count counter\n\
    base:thread_count 76.0\n# TYPE vendor:memory_pool_metaspace_usage_max_bytes gauge\n\
    vendor:memory_pool_metaspace_usage_max_bytes 7.0916056E7\n# TYPE application:hello_time_rate_per_second\
    \ gauge\napplication:hello_time_rate_per_second{app=\"shop\",type=\"timer\"} \n\
    3.169298061424996E-10\n# TYPE application:hello_time_one_min_rate_per_second gauge\n\
    application:hello_time_one_min_rate_per_second{app=\"shop\",type=\"timer\"} 0.0\n\
    [...]\n```\n\n如果您不提供媒体类型，默认输出格式是 Prometheus 文本格式（也可以在浏览器中很好地呈现）。Prometheus 格式在\
    \ `# TYPE` 和 `# HELP` 行中向值公开了额外的元数据。您还可以在前面的示例中看到范围（base、vendor 和 application）是如何添加到实际指标名称之前的。\n\
    \n或者，可以通过提供 `HAccept` 标头以 JSON 格式检索数据（同样缩写）：\n\n```\n$ curl -HAccept:application/json\
    \ http://localhost:8080/metrics\n```\n\n此命令产生以下输出：\n\n```\n{\n \"application\"\
    \ :\n  {\n    \"helloTime\" : {\n        \"p50\": 1.4884994E7,\n     [...]\n \
    \      \"count\": 1,\n       \"meanRate\": 0.06189342578194245\n     },\n    \"\
    getCounted\" : 1\n  },\n  \"base\" :\n  {\n    \"classloader.totalLoadedClass.count\"\
    \ : 13970,\n    \"cpu.systemLoadAverage\" : 2.572265625,\n    \"gc.PS Scavenge.time\"\
    \ : 290\n  },\n  \"vendor\" :\n  {\n    \"test\" : 271,\n    \"memoryPool.Metaspace.usage.max\"\
    \ : 72016928,\n }\n```\n\n在这种情况下，公开的是纯数据；范围构成顶层，相应的指标嵌套在其中。可以通过 HTTP `XOPTIONS`\
    \ 调用检索匹配的元数据：\n\n```\n$ curl XOPTIONS -HAccept:application/json http://localhost:8080/metrics\n\
    ```\n\n输出现在包含作为映射的元数据：\n\n```\n{\n\"application\" : {\n \"helloTime\": {\n \"\
    unit\": \"nanoseconds\",\n \"type\": \"timer\",\n \"description\": \"Timing of\
    \ the Hello call\",\n \"tags\": \"app=shop,type=timer\",\n \"displayName\": \"\
    helloTime\"\n }\n}\n[...]\n```\n\n现在我们已经了解了如何检索不同类型的数据和元数据，我们将快速了解一下如何将检索限制到特定范围。\n"
- fmt: "# Accessing specific scopes\n\nIt is also possible to retrieve data for only\
    \ a single scope by appending the scope name to the path. In the following example,\
    \ we only retrieve metrics for the `base` scope:\n\n```\n$ curl http://localhost:8080/metrics/base\n\
    ```\n\nThis now only shows metrics for the `base` scope:\n\n```\n# TYPE base:classloader_total_loaded_class_count\
    \ counterbase:classloader_total_loaded_class_count 13973.0# TYPE base:cpu_system_load_average\
    \ gaugebase:cpu_system_load_average 1.92236328125\n```\n\nIn this section, we\
    \ have seen how to retrieve metrics from a MicroProfile Metrics-enabled server.\
    \ Metrics in `base` and `vendor` scopes are predefined by the server. Metrics\
    \ in the `application` scope can be defined by the user, which we are going to\
    \ explore in the next section.\n\n# Supplying application-specific metrics\n\n\
    Applications can choose to expose metric data via a CDI programming model. This\
    \ model was inspired by DropWizard Metrics, so that it is easier to transition\
    \ applications to MP-Metrics. It also uses the annotations from DropWizard Metrics,\
    \ which have been augmented to support metadata.\n\nLet’s start with an example\
    \ by defining a counter that is then incremented in code:\n\n```\n@Inject\n@Metric(absolute\
    \ = true, description = \"# calls to /health\")\nCounter hCount; // This is the\
    \ counter\n\n@GET\n@Path(\"/health\")\npublic Response getHealth() throws Exception\
    \ {\n    hCount.inc(); // It is increased in the application\n    [...]\n}\n```\n\
    \nIn this example, we are registering a counter by getting it injected into the\
    \ `hCount` variable:\n\nThe `@Metric` annotation provides additional information,\
    \ such as the description, and also indicates that the name is the variable name\
    \ without an additional package (`absolute=true`).\n\nIn the following example,\
    \ we let the implementation do the counting for us. This implements the common\
    \ use case of counting the number of invocations of a method or REST endpoint:\n\
    \n```\n@Counted(absolute=true,\n        description=\"# calls to getCounted\"\
    ,\n        monotonic=true)\n@GET\n@Path(\"/c\")\npublic String getCounted() {\n\
    \    return \"Counted called\";\n}\n```\n\nThe `monotonic` attribute of `@Counted`\
    \ says to keep increasing the counter, otherwise it will be decreased when leaving\
    \ the method.\n\n# More types of metric\n\nCounters are only one type of metric\
    \ that can be exposed and, very often, more complex types are needed, for example,\
    \ to record the distribution of the duration of method calls.\n\nLet's have a\
    \ quick look at these. Most follow the pattern of `@Counted`.\n\n# Gauges\n\n\
    A gauge is a metric whose value arbitrarily goes up and down. Gauges are always\
    \ backed by a method that supplies the value of the gauge:\n\n```\n@Gauge\nint\
    \ provideGaugeValue() {\n  return 42;  // The value of the gauge is always 42\n\
    }\n```\n\nThe gauge's value is computed, like all other values, when a client\
    \ requests the values. This requires the implementation of the gauge method to\
    \ be very quick, so that a caller is not blocked.\n\n# Meter\n\nA meter measures\
    \ the rate at which the decorated method is called over time. For a JAX-RS endpoint,\
    \ this would be the number of requests per second. Meters can be declared via\
    \ an annotation:\n\n```\n@GET@Path(\"/m\")@Metered(absolute = true)public String\
    \ getMetered() {  return \"Metered called\";}\n```\n\nWhen a client requests the\
    \ data from the meter, the server supplies the mean rate, as well as one-, five-,\
    \ and fifteen-minute moving averages. The latter may be familiar to some readers\
    \ from the Unix/Linux `uptime` command.\n\n# Histograms\n\nA histogram is a type\
    \ of metric that samples the distribution of data. It is mostly used to record\
    \ the distribution of the time it takes to execute the decorated method. Histograms\
    \ cannot be declared via dedicated annotation, unlike other types, but a timer,\
    \ for example, includes histogram data. To use a histogram on its own, you need\
    \ to register and update it in code:\n\n```\n// Register the Histogram\n@Inject\n\
    @Metric(absolute = true)\nprivate Histogram aHistogram;\n\n// Update with a value\
    \ from 0 to 10\n@GET\n@Path(\"/h\")\npublic String getHistogram() {\n  aHistogram.update((int)\
    \ (Math.random() * 10.0));\n  return \"Histogram called\";\n}\n```\n\nThis way\
    \ of using metrics in code is feasible for the other types as well.\n\n# Timers\n\
    \nA timer basically is a combination of a histogram and a meter and can again\
    \ be declared via an annotation:\n\n```\n@GET@Path(\"/hello\")@Timed(name=\"helloTime\"\
    , absolute = true,        description = \"Timing of the Hello call\",       tags={\"\
    type=timer\",\"app=shop\"})public String getHelloTimed() {  try {    Thread.sleep((long)\
    \ (Math.random()*200.0));  } catch (InterruptedException e) {     // We don't\
    \ care if the sleep is interrupted.  }  return \"Hello World\";}\n```\n\nThe code\
    \ in this example waits for a small random amount of time to make the output a\
    \ bit more interesting.\n\n# Tagging\n\nTags or labels are a way to additionally\
    \ organize information. These became popular with Docker and Kubernetes. Within\
    \ MicroProfile Metrics 1.x, they are directly forwarded to the output without\
    \ further ado and do not serve to distinguish metrics. MicroProfile Metrics supports\
    \ server-wide and per-metrics tags, which are then merged together in the output.\n\
    \n# Server-wide tags\n\nServer-wide tags are set via the environment variable,\
    \ `MP_METRICS_TAGS`, as shown:\n\n```\nexport MP_METRICS_TAGS=app=myShopjava -jar\
    \ target/metrics-thorntail.jar\n```\n\nThese tags will be added to all metrics\
    \ defined in the server and also added to the respective output format.\n\nSo,\
    \ given the preceding command, a counter, `@Counted(absolute=true) int myCount;`,\
    \ would end up in Prometheus as follows:\n\n```\n# TYPE application:my_count counterapplication:my_count{app=\"\
    myShop\"} 0\n```\n\n# Per-metrics tags\n\nTags can also be supplied on a per-metric\
    \ basis:\n\n```\n@Counted(tags=[“version=v1”,”commit=abcde”])\nvoid doSomething()\
    \ {\n  [...]\n}\n```\n\nThis example defines two labels, `version=v1` and `commit=abcde`,\
    \ on the metric with the name `doSomething`. Those will be merged with the global\
    \ tags for the output. With the preceding global tag, there would thus be three\
    \ tags in the output.\n\nIn this section, we have seen how to add labels to metrics\
    \ to provide additional metadata. These can be global, for all metrics exposed\
    \ from a server, or application-specific, for one single metric.\n\n# Using Prometheus\
    \ to retrieve metrics\n\nNow that we have seen what metrics are exposed and how\
    \ we can define our own, let's have a look at how we can collect them in a **time\
    \ series database** (**TSDB**). For this purpose, we use Prometheus, a CNCF ([https://www.cncf.io/](https://www.cncf.io/))\
    \ project that has gained widespread adoption in the cloud-native world.\n\nYou\
    \ can download Prometheus from [https://prometheus.io](https://prometheus.io/)\
    \ or on macOS via `brew install prometheus`.\n\nOnce Prometheus is downloaded,\
    \ we need a configuration file that defines which targets to scrape and can then\
    \ start the server. For our purposes, we will use the following simple file:\n\
    \n```\n.Prometheus configuration for a Thorntail Server, prom.ymlscrape_configs:#\
    \ Configuration to poll from Thorntail- job_name: 'thorntail' ...\n```\n\n# New\
    \ in MP-Metrics 2.0\n\nNOTE: MicroProfile Metrics 2.0 may not be released when\
    \ you read this, and the content may have changed slightly depending on feedback\
    \ from early users/implementors."
  raw: "# Accessing specific scopes\n\nIt is also possible to retrieve data for only\
    \ a single scope by appending the scope name to the path. In the following example,\
    \ we only retrieve metrics for the base scope:\n\n```\n$ curl http://localhost:8080/metrics/base\n\
    ```\n\nThis now only shows metrics for the base scope:\n\n```\n# TYPE base:classloader_total_loaded_class_count\
    \ counterbase:classloader_total_loaded_class_count 13973.0# TYPE base:cpu_system_load_average\
    \ gaugebase:cpu_system_load_average 1.92236328125\n```\n\nIn this section, we\
    \ have seen how to retrieve metrics from a MicroProfile Metrics-enabled server.\
    \ Metrics in base and vendor scopes are predefined by the server. Metrics in the\
    \ application scope can be defined by the user, which we are going to explore\
    \ in the next section. ...\n\n# Supplying application-specific metrics\n\nApplications\
    \ can choose to expose metric data via a CDI programming model. This model was\
    \ inspired by DropWizard Metrics, so that it is easier to transition applications\
    \ to MP-Metrics. It also uses the annotations from DropWizard Metrics, which have\
    \ been augmented to support metadata.\n\nLet’s start with an example by defining\
    \ a counter that is then incremented in code:\n\n```\n@Inject\n@Metric(absolute\
    \ = true, description = \"# calls to /health\")\nCounter hCount; // This is the\
    \ counter\n\n@GET\n@Path(\"/health\")\npublic Response getHealth() throws Exception\
    \ {\n    hCount.inc(); // It is increased in the application\n    [...]\n}\n```\n\
    \nIn this example, we are registering a counter by getting it injected into the\
    \ `hCount` variable:\n\nThe `@Metric` annotation provides additional information,\
    \ such as the description, and also indicates that the name is the variable name\
    \ without an additional package (`absolute=true`).\n\nIn the following example,\
    \ we let the implementation do the counting for us. This implements the common\
    \ use case of counting the number of invocations of a method or REST endpoint:\n\
    \n```\n@Counted(absolute=true,\n        description=\"# calls to getCounted\"\
    ,\n        monotonic=true)\n@GET\n@Path(\"/c\")\npublic String getCounted() {\n\
    \    return \"Counted called\";\n}\n```\n\nThe `monotonic` attribute of `@Counted`\
    \ says to keep increasing the counter, otherwise it will be decreased when leaving\
    \ the method.\n\n# More types of metric\n\nCounters are only one type of metric that\
    \ can be exposed and, very often, more complex types are needed, for example,\
    \ to record the distribution of the duration of method calls.\n\nLet's have a\
    \ quick look at these. Most follow the pattern of `@Counted`.\n\n# Gauges\n\n\
    A gauge is a metric whose value arbitrarily goes up and down. Gauges are always\
    \ backed by a method that supplies the value of the gauge:\n\n```\n@Gauge\nint\
    \ provideGaugeValue() {\n  return 42;  // The value of the gauge is always 42\n\
    }\n```\n\nThe gauge's value is computed, like all other values, when a client\
    \ requests the values. This requires the implementation of the gauge method to\
    \ be very quick, so that a caller is not blocked.\n\n# Meter\n\nA meter measures\
    \ the rate at which the decorated method is called over time. For a JAX-RS endpoint,\
    \ this would be the number of requests per second. Meters can be declared via\
    \ an annotation:\n\n```\n@GET@Path(\"/m\")@Metered(absolute = true)public String\
    \ getMetered() {  return \"Metered called\";}\n```\n\nWhen a client requests the\
    \ data from the meter, the server supplies the mean rate, as well as one-, five-,\
    \ and fifteen-minute moving averages. The latter may be familiar to some readers\
    \ from the Unix/Linux `uptime` command.\n\n# Histograms\n\nA histogram is a type\
    \ of metric that samples the distribution of data. It is mostly used to record\
    \ the distribution of the time it takes to execute the decorated method. Histograms\
    \ cannot be declared via dedicated annotation, unlike other types, but a timer,\
    \ for example, includes histogram data. To use a histogram on its own, you need\
    \ to register and update it in code:\n\n```\n// Register the Histogram\n@Inject\n\
    @Metric(absolute = true)\nprivate Histogram aHistogram;\n\n// Update with a value\
    \ from 0 to 10\n@GET\n@Path(\"/h\")\npublic String getHistogram() {\n  aHistogram.update((int)\
    \ (Math.random() * 10.0));\n  return \"Histogram called\";\n}\n```\n\nThis way\
    \ of using metrics in code is feasible for the other types as well.\n\n# Timers\n\
    \nA timer basically is a combination of a histogram and a meter and can again\
    \ be declared via an annotation:\n\n```\n@GET@Path(\"/hello\")@Timed(name=\"helloTime\"\
    , absolute = true,        description = \"Timing of the Hello call\",       tags={\"\
    type=timer\",\"app=shop\"})public String getHelloTimed() {  try {    Thread.sleep((long)\
    \ (Math.random()*200.0));  } catch (InterruptedException e) {     // We don't\
    \ care if the sleep is interrupted.  }  return \"Hello World\";}\n```\n\nThe code\
    \ in this example waits for a small random amount of time to make the output a\
    \ bit more interesting.\n\n# Tagging\n\nTags or labels are a way to additionally\
    \ organize information. These became popular with Docker and Kubernetes. Within\
    \ MicroProfile Metrics 1.x, they are directly forwarded to the output without\
    \ further ado and do not serve to distinguish metrics. MicroProfile Metrics supports\
    \ server-wide and per-metrics tags, which are then merged together in the output.\n\
    \n# Server-wide tags\n\nServer-wide tags are set via the environment variable,\
    \ `MP_METRICS_TAGS`, as shown:\n\n```\nexport MP_METRICS_TAGS=app=myShopjava -jar\
    \ target/metrics-thorntail.jar\n```\n\nThese tags will be added to all metrics\
    \ defined in the server and also added to the respective output format.\n\nSo,\
    \ given the preceding command, a counter, `@Counted(absolute=true) int myCount;`,\
    \ would end up in Prometheus as follows:\n\n```\n# TYPE application:my_count counterapplication:my_count{app=\"\
    myShop\"} 0\n```\n\n# Per-metrics tags\n\nTags can also be supplied on a per-metric\
    \ basis:\n\n```\n@Counted(tags=[“version=v1”,”commit=abcde”])\nvoid doSomething()\
    \ {\n  [...]\n}\n```\n\nThis example defines two labels, `version=v1` and `commit=abcde`,\
    \ on the metric with the name `doSomething`. Those will be merged with the global\
    \ tags for the output. With the preceding global tag, there would thus be three\
    \ tags in the output.\n\nIn this section, we have seen how to add labels to metrics\
    \ to provide additional metadata. These can be global, for all metrics exposed\
    \ from a server, or application-specific, for one single metric.\n\n# Using Prometheus\
    \ to retrieve metrics\n\nNow that we have seen what metrics are exposed and how\
    \ we can define our own, let's have a look at how we can collect them in a **time\
    \ series database** (**TSDB**). For this purpose, we use Prometheus, a CNCF ([https://www.cncf.io/](https://www.cncf.io/))\
    \ project that has gained widespread adoption in the cloud-native world.\n\nYou\
    \ can download Prometheus from [https://prometheus.io](https://prometheus.io/)\
    \ or on macOS via `brew install prometheus`.\n\nOnce Prometheus is downloaded,\
    \ we need a configuration file that defines which targets to scrape and can then\
    \ start the server. For our purposes, we will use the following simple file:\n\
    \n```\n.Prometheus configuration for a Thorntail Server, prom.ymlscrape_configs:#\
    \ Configuration to poll from Thorntail- job_name: 'thorntail' ...\n```\n\n# New\
    \ in MP-Metrics 2.0\n\nNOTE: MicroProfile Metrics 2.0 may not be released when\
    \ you read this, and the content may have changed slightly depending on feedback\
    \ from early users/implementors."
  trans: "\n# 访问特定作用域\n\n通过在路径后附加作用域名称，也可以仅检索单个作用域的数据。在以下示例中，我们仅检索基础作用域的指标：\n\n```\n\
    $ curl http://localhost:8080/metrics/base\n```\n\n现在，这仅显示基础作用域的指标：\n\n```\n# TYPE\
    \ base:classloader_total_loaded_class_count counterbase:classloader_total_loaded_class_count\
    \ 13973.0# TYPE base:cpu_system_load_average gaugebase:cpu_system_load_average\
    \ 1.92236328125\n```\n\n在本节中，我们了解了如何从启用了 MicroProfile Metrics 的服务器检索指标。基础作用域和供应商作用域中的指标由服务器预定义。应用程序作用域中的指标可以由用户定义，我们将在下一节中探讨这一点。……\n\
    \n# 提供特定于应用程序的指标\n\n应用程序可以选择通过 CDI 编程模型公开指标数据。此模型受 DropWizard Metrics 启发，以便更容易地将应用程序迁移到\
    \ MP-Metrics。它还使用了 DropWizard Metrics 中的注解，这些注解已得到增强以支持元数据。\n\n让我们从一个示例开始，定义一个计数器，然后在代码中递增它：\n\
    \n```\n@Inject\n@Metric(absolute = true, description = \"# calls to /health\"\
    )\nCounter hCount; // 这是计数器\n\n@GET\n@Path(\"/health\")\npublic Response getHealth()\
    \ throws Exception {\n    hCount.inc(); // 它在应用程序中被增加\n    [...]\n}\n```\n\n在此示例中，我们通过将计数器注入到\
    \ `hCount` 变量中来注册它：\n\n`@Metric` 注解提供了额外信息，例如描述，并且还指示名称是变量名，不包含额外的包（`absolute=true`）。\n\
    \n在以下示例中，我们让实现为我们执行计数。这实现了计算方法或 REST 端点调用次数的常见用例：\n\n```\n@Counted(absolute=true,\n\
    \        description=\"# calls to getCounted\",\n        monotonic=true)\n@GET\n\
    @Path(\"/c\")\npublic String getCounted() {\n    return \"Counted called\";\n\
    }\n```\n\n`@Counted` 的 `monotonic` 属性表示持续增加计数器，否则在离开方法时计数器会减少。\n\n# 更多指标类型\n\n\
    计数器只是可以公开的指标类型之一，通常需要更复杂的类型，例如，记录方法调用持续时间的分布。\n\n让我们快速了解一下这些类型。它们大多遵循 `@Counted`\
    \ 的模式。\n\n# 仪表\n\n仪表是一种其值可以任意上下波动的指标。仪表始终由一个提供其值的方法支持：\n\n```\n@Gauge\nint provideGaugeValue()\
    \ {\n  return 42;  // 仪表的值始终是 42\n}\n```\n\n与其他所有值一样，仪表的值是在客户端请求值时计算的。这要求仪表方法的实现非常快速，以免阻塞调用方。\n\
    \n# 计量器\n\n计量器测量被装饰方法随时间被调用的速率。对于 JAX-RS 端点，这将是每秒的请求数。计量器可以通过注解声明：\n\n```\n@GET@Path(\"\
    /m\")@Metered(absolute = true)public String getMetered() {  return \"Metered called\"\
    ;}\n```\n\n当客户端从计量器请求数据时，服务器提供平均速率，以及一分钟、五分钟和十五分钟的移动平均值。后者可能对一些读者来说很熟悉，类似于 Unix/Linux\
    \ 的 `uptime` 命令。\n\n# 直方图\n\n直方图是一种对数据分布进行采样的指标类型。它主要用于记录执行被装饰方法所花费时间的分布。与其他类型不同，直方图不能通过专用注解声明，但例如计时器包含直方图数据。要单独使用直方图，您需要在代码中注册并更新它：\n\
    \n```\n// 注册直方图\n@Inject\n@Metric(absolute = true)\nprivate Histogram aHistogram;\n\
    \n// 使用 0 到 10 之间的值更新\n@GET\n@Path(\"/h\")\npublic String getHistogram() {\n \
    \ aHistogram.update((int) (Math.random() * 10.0));\n  return \"Histogram called\"\
    ;\n}\n```\n\n这种在代码中使用指标的方式也适用于其他类型。\n\n# 计时器\n\n计时器基本上是直方图和计量器的组合，并且同样可以通过注解声明：\n\
    \n```\n@GET@Path(\"/hello\")@Timed(name=\"helloTime\", absolute = true,      \
    \  description = \"Timing of the Hello call\",       tags={\"type=timer\",\"app=shop\"\
    })public String getHelloTimed() {  try {    Thread.sleep((long) (Math.random()*200.0));\
    \  } catch (InterruptedException e) {     // 我们不在乎睡眠是否被中断。  }  return \"Hello\
    \ World\";}\n```\n\n此示例中的代码会等待一小段随机时间，以使输出更有趣一些。\n\n# 标签\n\n标签或标记是一种额外组织信息的方式。它们随着\
    \ Docker 和 Kubernetes 而流行起来。在 MicroProfile Metrics 1.x 中，它们被直接转发到输出，无需进一步处理，并且不用于区分指标。MicroProfile\
    \ Metrics 支持服务器范围的和每个指标的标签，这些标签会在输出中合并在一起。\n\n# 服务器范围的标签\n\n服务器范围的标签通过环境变量 `MP_METRICS_TAGS`\
    \ 设置，如下所示：\n\n```\nexport MP_METRICS_TAGS=app=myShopjava -jar target/metrics-thorntail.jar\n\
    ```\n\n这些标签将被添加到服务器中定义的所有指标，并添加到相应的输出格式中。\n\n因此，给定上述命令，一个计数器 `@Counted(absolute=true)\
    \ int myCount;` 在 Prometheus 中最终会如下所示：\n\n```\n# TYPE application:my_count counterapplication:my_count{app=\"\
    myShop\"} 0\n```\n\n# 每个指标的标签\n\n标签也可以基于每个指标提供：\n\n```\n@Counted(tags=[\"version=v1\"\
    ,\"commit=abcde\"])\nvoid doSomething() {\n  [...]\n}\n```\n\n此示例在名为 `doSomething`\
    \ 的指标上定义了两个标签：`version=v1` 和 `commit=abcde`。这些标签将与全局标签合并以用于输出。结合前面的全局标签，输出中将有三个标签。\n\
    \n在本节中，我们了解了如何向指标添加标签以提供额外的元数据。这些标签可以是全局的，适用于服务器公开的所有指标，也可以是特定于应用程序的，适用于单个指标。\n\
    \n# 使用 Prometheus 检索指标\n\n现在我们已经了解了公开了哪些指标以及如何定义我们自己的指标，让我们看看如何将它们收集到**时序数据库**（**TSDB**）中。为此，我们使用\
    \ Prometheus，这是一个 CNCF（[`www.cncf.io/`](https://www.cncf.io/)）项目，已在云原生世界中得到广泛采用。\n\
    \n您可以从 [`prometheus.io`](https://prometheus.io/) 下载 Prometheus，或者在 macOS 上通过 `brew\
    \ install prometheus` 安装。\n\n下载 Prometheus 后，我们需要一个配置文件来定义要抓取的目标，然后才能启动服务器。出于我们的目的，我们将使用以下简单的文件：\n\
    \n```\n.Prometheus configuration for a Thorntail Server, prom.ymlscrape_configs:#\
    \ Configuration to poll from Thorntail- job_name: 'thorntail' ...\n```\n\n# MP-Metrics\
    \ 2.0 中的新特性\n\n注意：当您阅读本文时，MicroProfile Metrics 2.0 可能尚未发布，并且内容可能因早期用户/实施者的反馈而略有变化。\n"
- fmt: "# Change for counters – introducing ConcurrentGauge\n\nCounters in Metrics\
    \ 1.x had two functions:\n\n- To provide a measure for the number of concurrent\
    \ invocations\n- As a metric that can count up to the number of transactions committed,\
    \ for example\n\nUnfortunately, the first way was the default when using the annotation\
    \ without specifying the `monotonic` keyword, which is unexpected and was confusing\
    \ a lot of users. The second version of this also had its issues, as a counter\
    \ value could also decrease at will, which violates the understanding that a counter\
    \ is a monotonically increasing metric.\n\nFor this reason, the Metrics working\
    \ group has decided to change the behavior of counters so they only work as monotonically\
    \ increasing metrics and to defer the ...\n\n# Tagging\n\nTags now also serve\
    \ to distinguish metrics with the same name and type, but different tags. They\
    \ could be used to support many metrics `result_code` on a REST endpoint to count\
    \ the number of (un)successful calls:\n\n```\n@Inject\n@Metric(tags=\"{code,200}\"\
    , name=\"result_code\")\nCounter result_code_200k;\n\n@Inject\n@Metric(tags=\"\
    {code,500}\", name=\"result_code\")\nCounter result_code_500;\n\n@GET\n@Path(\"\
    /\")\npublic String getData(String someParam) {\n\n String result = getSomeData(someParam);\n\
    \ if (result == null ) {\n   result_code_500.inc();\n } else {\n   result_code_200.inc();\n\
    \ }\n return result;\n}\n```\n\nUnder the covers, metrics are no longer only keyed\
    \ by name and type, but also by their tags. For this, new `MetricID` has been\
    \ introduced to host the name and the tags.\n\n# Changes in data output format\n\
    \nThe introduction of multi-tag metrics in MicroProfile Metrics 2.0 necessitated\
    \ changes in the format of metric data that is made available to clients.\n\n\
    The Prometheus format also had some inconsistencies, so we decided to revamp the\
    \ formats in sometimes incompatible ways:\n\n- The colon (`:`) as a separator\
    \ between the scope and metric name has been changed to an underscore (`_`).\n\
    - The Prometheus output format no longer requires that camelCase is turned into\
    \ snake_case.\n- The format of the base metrics for garbage collectors has changed\
    \ and now uses tags for the various garbage collectors.\n\nPlease consult the\
    \ release notes in the MicroProfile 2.0 specification at [https://github.com/eclipse/microprofile-metrics/releases/tag/2.0\
    \ ...](https://github.com/eclipse/microprofile-metrics/releases/tag/2.0)\n\n#\
    \ MicroProfile OpenTracing\n\nIn the modern world of microservices, a single request\
    \ can traverse multiple processes running on different machines, data centers,\
    \ or even geographical regions.\n\nThe observability of such systems is a challenging\
    \ task but, when done right, it allows us to *tell the story* about each individual\
    \ request as opposed to the overall state of the system derived from signals such\
    \ as metrics and logs. In this chapter, we will introduce you to distributed tracing\
    \ and explain OpenTracing with its integration in MicroProfile OpenTracing 1.3.\n\
    \nIn the previous section, we learned about metrics and how they observe an application\
    \ or each individual component. This information is no doubt very valuable and\
    \ provides a macro view of the system, but, at the same time, it says very little\
    \ about each individual request that traverses multiple components. Distributed\
    \ tracing shows a micro view of what happened with a request end to end so that\
    \ we can retrospectively understand the behavior of each individual component\
    \ of the application.\n\nDistributed tracing is action-based; in other words,\
    \ it records everything related to an action in the system. For example, it captures\
    \ detailed information of a request and all causally related activities. We will\
    \ not go through the details of how this tracing works, but, in a nutshell, we\
    \ can state the following:\n\n- The tracing infrastructure attaches contextual\
    \ metadata to each request, typically, a set of unique IDs – `traceId`, `spanId`,\
    \ and `parentId`.\n- The instrumentation layer records profiling data and propagates\
    \ metadata inside and between processes.\n- The captured profiling data contains\
    \ metadata and causality references to preceding events.\n\nBased on the captured\
    \ data, distributed tracing systems usually offer the following functionality:\n\
    \n- Root-cause analysis\n- Latency optimization – critical path analysis\n- Distributed\
    \ context propagation – baggage\n- Contextualized logging\n- Service dependency\
    \ analysis\n\nBefore we delve into MicroProfile OpenTracing, let's briefly look\
    \ at OpenTracing so that we can better understand what the API offers.\n\n# OpenTracing\
    \ project\n\nThe OpenTracing project ([https://opentracing.io](https://opentracing.io/))\
    \ provides a vendor-neutral specification [(https://github.com/opentracing/specification)](https://github.com/opentracing/specification)\
    \ and polyglot APIs for describing distributed transactions. Vendor neutrality\
    \ is important because code instrumentation is the most time-consuming and challenging\
    \ task when enabling distributed tracing in large organizations. We would like\
    \ to stress that OpenTracing is just an API. A real deployment will require a\
    \ plugged tracer implementation that runs inside the monitored process and sends\
    \ data to a tracing system.\n\nFrom an API perspective, there are three key concepts:\
    \ `Tracer`, `Span`, and `SpanContext`. `Tracer` is a singleton object available\
    \ to the application that can be used to model a ...\n\n# Configuration properties\n\
    \nOpenTracing is vendor-neutral and can, therefore, work with any vendor's tracing\
    \ implementation that uses this API. Each tracer implementation will be configured\
    \ differently. Therefore, the configuration is outside the scope of the MicroProfile\
    \ OpenTracing specification. However, the specification itself exposes a couple\
    \ of configuration properties to adjust the tracing scope or generated data. The\
    \ configuration leverages the MicroProfile Config specification to provide a consistent\
    \ means for all supported configuration options.\n\nCurrently, the specification\
    \ exposes the following:\n\n- `mp.opentracing.server.skip-pattern`: A skip pattern\
    \ to avoid the tracing of selected REST endpoints.\n- `mp.opentracing.server.operation-name-provider`:\
    \ This specifies the operation name provider for server spans. Possible values\
    \ are `http-path` and `class-method`. The default value is `class-method`, which\
    \ fully uses a qualified class name concatenated with a method name; for example,\
    \ `GET:org.eclipse.Service.get`. The `http-path` uses a value of `@Path` annotation\
    \ as an operation name.\n\n# Automatic instrumentation\n\nThe motivation here\
    \ is to have tracing automatically capture all crucial performance information\
    \ and also automatically propagate tracing context between runtimes. The second\
    \ part is especially crucial because it ensures that traces are not broken and\
    \ we are able to investigate end-to-end invocation. For successful tracing, every\
    \ communication technology between runtimes has to be instrumented. In the case\
    \ of MicroProfile, it is JAX-RS and MicroProfile Rest Client."
  raw: "# Change for counters – introducing ConcurrentGauge\n\nCounters in Metrics\
    \ 1.x had two functions:\n\n*   To provide a measure for the number of concurrent\
    \ invocations\n*   As a metric that can count up to the number of transactions\
    \ committed, for example\n\nUnfortunately, the first way was the default when\
    \ using the annotation without specifying the `monotonic` keyword, which is unexpected\
    \ and was confusing a lot of users. The second version of this also had its issues,\
    \ as a counter value could also decrease at will, which violates the understanding\
    \ that a counter is a monotonically increasing metric.\n\nFor this reason, the\
    \ Metrics working group has decided to change the behavior of counters so they\
    \ only work as monotonically increasing metrics and to defer the ...\n\n# Tagging\n\
    \nTags now also serve to distinguish metrics with the same name and type, but\
    \ different tags. They could be used to support many metrics `result_code` on\
    \ a REST endpoint to count the number of (un)successful calls:\n\n```\n@Inject\n\
    @Metric(tags=\"{code,200}\", name=\"result_code\")\nCounter result_code_200k;\n\
    \n@Inject\n@Metric(tags=\"{code,500}\", name=\"result_code\")\nCounter result_code_500;\n\
    \n@GET\n@Path(\"/\")\npublic String getData(String someParam) {\n\n String result\
    \ = getSomeData(someParam);\n if (result == null ) {\n   result_code_500.inc();\n\
    \ } else {\n   result_code_200.inc();\n }\n return result;\n}\n```\n\nUnder the\
    \ covers, metrics are no longer only keyed by name and type, but also by their\
    \ tags. For this, new `MetricID` has been introduced to host the name and the\
    \ tags.\n\n# Changes in data output format\n\nThe introduction of multi-tag metrics\
    \ in MicroProfile Metrics 2.0 necessitated changes in the format of metric data\
    \ that is made available to clients.\n\nThe Prometheus format also had some inconsistencies,\
    \ so we decided to revamp the formats in sometimes incompatible ways:\n\n*   The\
    \ colon (:) as a separator between the scope and metric name has been changed\
    \ to an underscore (_).\n*   The Prometheus output format no longer requires that\
    \ camelCase is turned into snake_case.\n*   The format of the base metrics for\
    \ garbage collectors has changed and now uses tags for the various garbage collectors.\n\
    \nPlease consult the release notes in the MicroProfile 2.0 specification at [https://github.com/eclipse/microprofile-metrics/releases/tag/2.0\
    \ ...](https://github.com/eclipse/microprofile-metrics/releases/tag/2.0)\n\n#\
    \ MicroProfile OpenTracing\n\nIn the modern world of microservices, a single request\
    \ can traverse multiple processes running on different machines, data centers,\
    \ or even geographical regions.\n\nThe observability of such systems is a challenging\
    \ task but, when done right, it allows us to *tell the story* about each individual\
    \ request as opposed to the overall state of the system derived from signals such\
    \ as metrics and logs. In this chapter, we will introduce you to distributed tracing\
    \ and explain OpenTracing with its integration in MicroProfile OpenTracing 1.3.\n\
    \nIn the previous section, we learned about metrics and how they observe an application\
    \ or each individual component. This information is no doubt very valuable and\
    \ provides a macro view of the system, but, at the same time, it says very little\
    \ about each individual request that traverses multiple components. Distributed\
    \ tracing shows a micro view of what happened with a request end to end so that\
    \ we can retrospectively understand the behavior of each individual component\
    \ of the application.\n\nDistributed tracing is action-based; in other words,\
    \ it records everything related to an action in the system. For example, it captures\
    \ detailed information of a request and all causally related activities. We will\
    \ not go through the details of how this tracing works, but, in a nutshell, we\
    \ can state the following:\n\n*   The tracing infrastructure attaches contextual\
    \ metadata to each request, typically, a set of unique IDs – `traceId`, `spanId`,\
    \ and `parentId`.\n*   The instrumentation layer records profiling data and propagates\
    \ metadata inside and between processes.\n*   The captured profiling data contains\
    \ metadata and causality references to preceding events.\n\nBased on the captured\
    \ data, distributed tracing systems usually offer the following functionality:\n\
    \n*   Root-cause analysis\n*   Latency optimization – critical path analysis\n\
    *   Distributed context propagation – baggage\n*   Contextualized logging\n* \
    \  Service dependency analysis\n\nBefore we delve into MicroProfile OpenTracing,\
    \ let's briefly look at OpenTracing so that we can better understand what the\
    \ API offers.\n\n# OpenTracing project\n\nThe OpenTracing project ([https://opentracing.io](https://opentracing.io/))\
    \ provides a vendor-neutral specification [(https://github.com/opentracing/specification)](https://github.com/opentracing/specification) and\
    \ polyglot APIs for describing distributed transactions. Vendor neutrality is\
    \ important because code instrumentation is the most time-consuming and challenging\
    \ task when enabling distributed tracing in large organizations. We would like\
    \ to stress that OpenTracing is just an API. A real deployment will require a\
    \ plugged tracer implementation that runs inside the monitored process and sends\
    \ data to a tracing system.\n\nFrom an API perspective, there are three key concepts:\
    \ Tracer, Span, and SpanContext. Tracer is a singleton object available to the\
    \ application that can be used to model a ...\n\n# Configuration properties\n\n\
    OpenTracing is vendor-neutral and can, therefore, work with any vendor's tracing\
    \ implementation that uses this API. Each tracer implementation will be configured\
    \ differently. Therefore, the configuration is outside the scope of the MicroProfile\
    \ OpenTracing specification. However, the specification itself exposes a couple\
    \ of configuration properties to adjust the tracing scope or generated data. The\
    \ configuration leverages the MicroProfile Config specification to provide a consistent\
    \ means for all supported configuration options.\n\nCurrently, the specification\
    \ exposes the following:\n\n*   `mp.opentracing.server.skip-pattern`: A skip pattern\
    \ to avoid the tracing of selected REST endpoints.\n*   `mp.opentracing.server.operation-name-provider`:\
    \ This specifies the operation name provider for server spans. Possible values\
    \ are `http-path` and `class-method`. The default value is `class-method`, which\
    \ fully uses a qualified class name concatenated with a method name; for example, `GET:org.eclipse.Service.get`.\
    \ The `http-path` uses a value of `@Path` annotation as an operation name.\n\n\
    # Automatic instrumentation\n\nThe motivation here is to have tracing automatically\
    \ capture all crucial performance information and also automatically propagate\
    \ tracing context between runtimes. The second part is especially crucial because\
    \ it ensures that traces are not broken and we are able to investigate end-to-end\
    \ invocation. For successful tracing, every communication technology between runtimes\
    \ has to be instrumented. In the case of MicroProfile, it is JAX-RS and MicroProfile\
    \ Rest Client."
  trans: "\n# 计数器的变革——引入 ConcurrentGauge\n\nMetrics 1.x 中的计数器具有两个功能：\n\n*   提供并发调用次数的度量\n\
    *   作为一个可以累计到已提交事务数量的指标，例如\n\n不幸的是，第一种方式是使用注解时未指定 `monotonic` 关键字的默认行为，这出乎意料且让许多用户感到困惑。第二种方式也存在问题，因为计数器的值可以随意减少，这违反了计数器是单调递增指标的理解。\n\
    \n因此，Metrics 工作组决定改变计数器的行为，使其仅作为单调递增的指标工作，并将...\n\n# 标签\n\n标签现在也用于区分具有相同名称和类型但标签不同的指标。它们可用于在\
    \ REST 端点上支持多个 `result_code` 指标，以统计（不）成功调用的次数：\n\n```\n@Inject\n@Metric(tags=\"\
    {code,200}\", name=\"result_code\")\nCounter result_code_200k;\n\n@Inject\n@Metric(tags=\"\
    {code,500}\", name=\"result_code\")\nCounter result_code_500;\n\n@GET\n@Path(\"\
    /\")\npublic String getData(String someParam) {\n\n String result = getSomeData(someParam);\n\
    \ if (result == null ) {\n   result_code_500.inc();\n } else {\n   result_code_200.inc();\n\
    \ }\n return result;\n}\n```\n\n在底层，指标不再仅通过名称和类型来标识，还通过它们的标签来标识。为此，引入了新的 `MetricID`\
    \ 来承载名称和标签。\n\n# 数据输出格式的变化\n\nMicroProfile Metrics 2.0 中多标签指标的引入，要求改变提供给客户端的指标数据格式。\n\
    \nPrometheus 格式也存在一些不一致之处，因此我们决定以有时不兼容的方式改进这些格式：\n\n*   作用域和指标名称之间的冒号（:）分隔符已改为下划线（_）。\n\
    *   Prometheus 输出格式不再要求将驼峰式命名转换为蛇形命名。\n*   垃圾收集器的基本指标格式已更改，现在为各种垃圾收集器使用标签。\n\n\
    请查阅 MicroProfile 2.0 规范中的发布说明，网址为 [`github.com/eclipse/microprofile-metrics/releases/tag/2.0\
    \ ...`](https://github.com/eclipse/microprofile-metrics/releases/tag/2.0)\n\n\
    # MicroProfile OpenTracing\n\n在现代微服务世界中，单个请求可能穿越运行在不同机器、数据中心甚至地理区域上的多个进程。\n\n\
    此类系统的可观测性是一项具有挑战性的任务，但如果做得好，它允许我们*讲述*每个单独请求的故事，而不是从指标和日志等信号中推导出的系统整体状态。在本章中，我们将向您介绍分布式追踪，并解释\
    \ OpenTracing 及其在 MicroProfile OpenTracing 1.3 中的集成。\n\n在上一节中，我们了解了指标以及它们如何观测应用程序或每个单独的组件。这些信息无疑非常有价值，并提供了系统的宏观视图，但同时，它对于穿越多个组件的每个单独请求几乎没有任何说明。分布式追踪展示了请求端到端发生情况的微观视图，以便我们可以追溯性地理解应用程序中每个单独组件的行为。\n\
    \n分布式追踪是基于动作的；换句话说，它记录系统中与某个动作相关的所有内容。例如，它捕获请求的详细信息以及所有因果相关的活动。我们不会详细讨论这种追踪的工作原理，但简而言之，我们可以说明以下几点：\n\
    \n*   追踪基础设施将上下文元数据附加到每个请求，通常是一组唯一的 ID——`traceId`、`spanId` 和 `parentId`。\n*  \
    \ 检测层记录性能分析数据，并在进程内部和进程之间传播元数据。\n*   捕获的性能分析数据包含元数据和对先前事件的因果引用。\n\n基于捕获的数据，分布式追踪系统通常提供以下功能：\n\
    \n*   根因分析\n*   延迟优化——关键路径分析\n*   分布式上下文传播——行李\n*   上下文日志记录\n*   服务依赖关系分析\n\n\
    在我们深入探讨 MicroProfile OpenTracing 之前，让我们简要地看一下 OpenTracing，以便更好地理解该 API 提供了什么。\n\
    \n# OpenTracing 项目\n\nOpenTracing 项目 ([`opentracing.io`](https://opentracing.io/))\
    \ 提供了一个供应商中立的规范 [(https://github.com/opentracing/specification)](https://github.com/opentracing/specification)\
    \ 和用于描述分布式事务的多语言 API。供应商中立性很重要，因为在大型组织中启用分布式追踪时，代码检测是最耗时且最具挑战性的任务。我们想强调，OpenTracing\
    \ 只是一个 API。实际部署将需要一个插入式的追踪器实现，该实现在被监控的进程内运行，并将数据发送到追踪系统。\n\n从 API 的角度来看，有三个关键概念：Tracer、Span\
    \ 和 SpanContext。Tracer 是应用程序可用的单例对象，可用于建模...\n\n# 配置属性\n\nOpenTracing 是供应商中立的，因此可以与任何使用此\
    \ API 的供应商的追踪实现一起工作。每个追踪器实现都将以不同的方式进行配置。因此，配置超出了 MicroProfile OpenTracing 规范的范围。然而，该规范本身公开了一些配置属性，用于调整追踪范围或生成的数据。该配置利用\
    \ MicroProfile Config 规范为所有支持的配置选项提供一致的方法。\n\n目前，该规范公开了以下内容：\n\n*   `mp.opentracing.server.skip-pattern`：一个跳过模式，用于避免追踪选定的\
    \ REST 端点。\n*   `mp.opentracing.server.operation-name-provider`：这指定了服务器跨度（span）的操作名称提供者。可能的值为\
    \ `http-path` 和 `class-method`。默认值为 `class-method`，它完全使用限定类名与方法名连接；例如，`GET:org.eclipse.Service.get`。`http-path`\
    \ 使用 `@Path` 注解的值作为操作名称。\n\n# 自动检测\n\n这里的动机是让追踪自动捕获所有关键的性能信息，并自动在运行时之间传播追踪上下文。第二部分尤其关键，因为它确保追踪不会中断，并且我们能够调查端到端的调用。为了成功追踪，运行时之间的每种通信技术都必须被检测。在\
    \ MicroProfile 的情况下，它是 JAX-RS 和 MicroProfile Rest Client。\n"
- fmt: "# JAX-RS\n\nMicroProfile OpenTracing automatically traces all inbound JAX-RS\
    \ endpoints. However, the JAX-RS client side is more tricky and requires the registration\
    \ API, `org.eclipse.microprofile.opentracing.ClientTracingRegistrar.configure(ClientBuilder\
    \ clientBuilder)`, to be called to add tracing capability. MicroProfile implementation\
    \ can enable tracing for all client interfaces globally; however, it is recommended\
    \ to use the registration API for better portability.\n\nThe default tracing behavior\
    \ can be modified by disabling the tracing of specific requests or changing operation\
    \ names of produced server spans. For more information, refer to the *Configuration\
    \ properties* section later in this chapter. The instrumentation layer automatically\
    \ adds the following request-scoped information to each span:\n\n* `http.method`:\
    \ The HTTP method of the request.\n* `http.status_code`: The status code of the\
    \ request.\n* `http.url`: The URL of the request.\n* `component`: The name of\
    \ the instrumented component, `jaxrs`.\n* `span.kind`: The client or server.\n\
    * `error` – `true` or `false`. This is optional and, if present, instrumentation\
    \ also adds an exception as `error.object` to span logs.\n\nAll these tags can\
    \ be used to query data via the tracing system user interface, or they can be\
    \ used for data analytics jobs that many tracing systems provide. Additional metadata\
    \ can be added to the current active span via an injected tracer instance. This\
    \ can be conducted globally in filters or locally in rest handlers, as shown in\
    \ the following code example, by adding a user agent header to the server span\
    \ (1):\n\n```\n@Path(\"/\")\npublic class JaxRsService {\n   @Inject\n   private\
    \ io.opentracing.Tracer tracer;\n\n   @GET\n   @Path(\"/hello\")\n   @Traced(operationName=\"\
    greeting\") (2)\n   public String hello(@HeaderParam(\"user-agent\") String userAgent)\
    \ {\n       tracer.activeSpan().setTag(\"user-agent\", userAgent); (1)\n   }\n\
    }\n```\n\nBy default, server-side spans have the operation name `http_method:package.className.method`.\
    \ However, this can be changed locally by using the `@Traced` annotation (2),\
    \ or globally via the configuration property (refer to the configuration section).\n\
    \n# MicroProfile Rest Client\n\nAs was mentioned in the previous section, all\
    \ REST client interfaces are, by default, automatically traced with no additional\
    \ configuration required. This behavior can be changed by applying the `@Traced`\
    \ annotation to the interface or method to disable tracing. When applied to the\
    \ interface, all methods are skipped from tracing. Note that the tracing context\
    \ is not being propagated. Therefore, if the request continues to an instrumented\
    \ runtime, a new trace is started.\n\n# Explicit instrumentation\n\nSometimes,\
    \ the automatic instrumentation does not capture all critical timing information\
    \ and, therefore, additional trace points are needed. For example, we would like\
    \ to trace an invocation of a business layer or initialize third-party instrumentation\
    \ provided by the OpenTracing project ([https://github.com/opentracing-contrib](https://github.com/opentracing-contrib)).\n\
    \nThe explicit instrumentation can be done in three ways:\n\n* Add the `@Traced`\
    \ annotation on **Context and Dependency Injection** (**CDI**) beans.\n* Inject\
    \ the tracer and create spans manually.\n* Initialize third-party instrumentation.\
    \ The initialization of external instrumentation depends on its own initialization\
    \ requirements. MicroProfile just has to provide a tracer instance, which is covered\
    \ in the previous bullet point.\n\nLet's now discuss these in detail.\n\n# @Traced\
    \ annotation\n\nMicroProfile OpenTracing defines an `@Traced` annotation that\
    \ can be used to enable tracing on CDI beans or disable tracing on automatically\
    \ traced interfaces. The annotation can also be used to override the operation\
    \ name on other automatically traced components – JAX-RS endpoints.\n\nThe following\
    \ code example shows how the `@Traced` annotation can be used to enable tracing\
    \ on a CDI bean. `(1)` enables tracing for all methods the bean defines. `(2)`\
    \ overrides the default operation name (`package.className.method`) to `get_all_users`.\
    \ `(3)` disables tracing of the health method:\n\n```\n@Traced (1)@ApplicationScopedpublic\
    \ class Service {   @Traced(operationName = \"get_all_users\") (2)   public void\
    \ getUsers() {        // business code   } @Traced(false) (3) ...\n```\n\n# Tracer\
    \ injection\n\nThe application can inject an `io.opentracing.Tracer` bean that\
    \ exposes the full OpenTracing API. This allows application developers to leverage\
    \ more advanced use cases, such as adding metadata to the currently active span,\
    \ manually creating spans, using baggage for context propagation, or initializing\
    \ additional third-party instrumentation.\n\nThe following code shows how the\
    \ tracer is used to attach data to the currently active span, `(1)`:\n\n```\n\
    @Path(\"/\")\npublic class Service {\n    @Inject\n    private Tracer tracer;\n\
    \n    @GET\n    @Path(\"\")\n    @Produces(MediaType.TEXT_PLAIN)\n    public String\
    \ greeting() {\n       tracer.activeSpan()\n           .setTag(\"greeting\", \"\
    hello\"); (1)\n       return \"hello\";\n   }\n}\n```\n\nThis can be useful for\
    \ adding business-related data to spans, but also to log exceptions or any other\
    \ profiling information.\n\n# Tracing with Jaeger\n\nSo far, we have only talked\
    \ about different aspects of the instrumentation. However, to run the full tracing\
    \ infrastructure, we need a tracing backend. In this section, we will use Jaeger\
    \ ([https://www.jaegertracing.io/](https://www.jaegertracing.io/)) to demonstrate\
    \ how collected tracing data is presented in a tracing system. We have chosen\
    \ Jaeger because Thorntail provides direct integration with Jaeger. Other vendors\
    \ can provide integrations with other systems, for instance, Zipkin, and Instana.\
    \ Almost every tracing system offers a Gannt chart style view (or timeline) of\
    \ a trace. This view might be overwhelming for tracing novices, but it is a great\
    \ tool to systematically analyze an invocation in a distributed system.\n\nThe\
    \ following screenshot shows ...\n\n# Summary\n\nIn this chapter, we learned about\
    \ the observability of servers and applications.\n\nMetrics, or telemetry, can\
    \ help to pinpoint the performance characteristics of a server or an application.\
    \ MicroProfile offers, via the Metrics specification, a way to export Metrics\
    \ in standardized ways. Application writers can use MicroProfile Metrics to expose\
    \ their data to monitoring clients decoratively via annotations or via calls to\
    \ the Metrics API.\n\nThe chapter further explained how OpenTracing integration\
    \ in MicroProfile provides an end-to-end view for each individual transaction\
    \ going through the system. We went through the configuration properties, showcasing\
    \ tracing for JAX-RS, and finally investigating data in the Jaeger system.\n\n\
    In the next chapter, we will learn how to document (REST) APIs via OpenAPI and\
    \ call those APIs via the type-safe REST client.\n\n# Questions\n\n1.  What is\
    \ the difference between distributed tracing and metrics? \n2.  What functionality\
    \ do distributed tracing systems usually provide?\n3.  What parts of the system\
    \ are automatically traced in MicroProfile OpenTracing?\n4.  Which tags are added\
    \ for every REST request by MicroProfile OpenTracing?\n5.  How can explicit instrumentation\
    \ be added to the business code?\n6.  What are scopes in Metrics and what is their\
    \ rationale?\n7.  What determines the output format of a REST request to the Metrics\
    \ API?\n8.  What ways are available to export metrics within a user application?"
