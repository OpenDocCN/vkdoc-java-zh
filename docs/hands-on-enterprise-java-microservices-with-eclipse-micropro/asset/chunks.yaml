    如果你有兴趣成为 Packt 的作者，请访问 [authors.packtpub.com](http://authors.packtpub.com) 并立即申请。我们已与成千上万像你一样的开发者和技术专业人士合作，帮助他们与全球技术社区分享见解。你可以进行一般性申请，申请我们正在招募作者的具体热门主题，或提交你自己的创意。\n\
