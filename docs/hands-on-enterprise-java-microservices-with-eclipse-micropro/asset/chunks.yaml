    \n# MicroProfile Rest Client\n\nAs was mentioned in the previous section, all\
    \ REST client interfaces are, by default, automatically traced with no additional\
    \ configuration required. This behavior can be changed by applying the `@Traced`\
    \ annotation to the interface or method to disable tracing. When applied to the\
    \ interface, all methods are skipped from tracing. Note that the tracing context\
    \ is not being propagated. Therefore, if the request continues to an instrumented\
    \ runtime, a new trace is started.\n\n# Explicit instrumentation\n\nSometimes,\
    \ the automatic instrumentation does not capture all critical timing information\
    \ and, therefore, additional trace points are needed. For example, we would like\
    \ to trace an invocation of a business layer or initialize third-party instrumentation\
    \ provided by the OpenTracing project ([https://github.com/opentracing-contrib](https://github.com/opentracing-contrib)).\n\
    \nThe explicit instrumentation can be done in three ways:\n\n*   Add the `@Traced`\
    \ annotation on **Context and Dependency Injection** (**CDI**) beans.\n*   Inject\
    \ the tracer and create spans manually.\n*   Initialize third-party instrumentation.\
    \ The initialization of external instrumentation depends on its own initialization\
    \ requirements. MicroProfile just has to provide a tracer instance, which is covered\
    \ in the previous bullet point.\n\nLet's now discuss these in detail.\n\n# @Traced\
    \ annotation\n\nMicroProfile OpenTracing defines an `@Traced` annotation that\
    \ can be used to enable tracing on CDI beans or disable tracing on automatically\
    \ traced interfaces. The annotation can also be used to override the operation\
    \ name on other automatically traced components – JAX-RS endpoints.\n\nThe following\
    \ code example shows how the `@Traced` annotation can be used to enable tracing\
    \ on a CDI bean. `(1)` enables tracing for all methods the bean defines. `(2)`\
    \ overrides the default operation name (`package.className.method`) to `get_all_users`.\
    \ `(3)` disables tracing of the health method:\n\n```\n@Traced (1)@ApplicationScopedpublic\
    \ class Service {   @Traced(operationName = \"get_all_users\") (2)   public void\
    \ getUsers() {        // business code   } @Traced(false) (3) ...\n```\n\n# Tracer\
    \ injection\n\nThe application can inject an `io.opentracing.Tracer` bean that\
    \ exposes the full OpenTracing API. This allows application developers to leverage\
    \ more advanced use cases, such as adding metadata to the currently active span,\
    \ manually creating spans, using baggage for context propagation, or initializing\
    \ additional third-party instrumentation.\n\nThe following code shows how the\
    \ tracer is used to attach data to the currently active span, `(1)`:\n\n```\n\
    @Path(\"/\")\npublic class Service {\n    @Inject\n    private Tracer tracer;\n\
    \n    @GET\n    @Path(\"\")\n    @Produces(MediaType.TEXT_PLAIN)\n    public String\
    \ greeting() {\n       tracer.activeSpan()\n           .setTag(\"greeting\", \"\
    hello\"); (1)\n       return \"hello\";\n   }\n}\n```\n\nThis can be useful for\
    \ adding business-related data to spans, but also to log exceptions or any other\
    \ profiling information.\n\n# Tracing with Jaeger\n\nSo far, we have only talked\
    \ about different aspects of the instrumentation. However, to run the full tracing\
    \ infrastructure, we need a tracing backend. In this section, we will use Jaeger\
    \ ([https://www.jaegertracing.io/](https://www.jaegertracing.io/)) to demonstrate\
    \ how collected tracing data is presented in a tracing system. We have chosen\
    \ Jaeger because Thorntail provides direct integration with Jaeger. Other vendors\
    \ can provide integrations with other systems, for instance, Zipkin, and Instana.\
    \ Almost every tracing system offers a Gannt chart style view (or timeline) of\
    \ a trace. This view might be overwhelming for tracing novices, but it is a great\
    \ tool to systematically analyze an invocation in a distributed system.\n\nThe\
    \ following screenshot shows ...\n\n# Summary\n\nIn this chapter, we learned about\
    \ the observability of servers and applications.\n\nMetrics, or telemetry, can\
    \ help to pinpoint the performance characteristics of a server or an application.\
    \ MicroProfile offers, via the Metrics specification, a way to export Metrics\
    \ in standardized ways. Application writers can use MicroProfile Metrics to expose\
    \ their data to monitoring clients decoratively via annotations or via calls to\
    \ the Metrics API.\n\nThe chapter further explained how OpenTracing integration\
    \ in MicroProfile provides an end-to-end view for each individual transaction\
    \ going through the system. We went through the configuration properties, showcasing\
    \ tracing for JAX-RS, and finally investigating data in the Jaeger system.\n\n\
    In the next chapter, we will learn how to document (REST) APIs via OpenAPI and\
    \ call those APIs via the type-safe REST client.\n\n# Questions\n\n1.  What is\
    \ the difference between distributed tracing and metrics? \n2.  What functionality\
    \ do distributed tracing systems usually provide?\n3.  What parts of the system\
    \ are automatically traced in MicroProfile OpenTracing?\n4.  Which tags are added\
    \ for every REST request by MicroProfile OpenTracing?\n5.  How can explicit instrumentation\
    \ be added to the business code?\n6.  What are scopes in Metrics and what is their\
    \ rationale?\n7.  What determines the output format of a REST request to the Metrics\
    \ API?\n8.  What ways are available to export metrics within a user application?"
  trans: "\n# JAX-RS\n\nMicroProfile OpenTracing 会自动追踪所有入站 JAX-RS 端点。然而，JAX-RS 客户端侧的处理更为复杂，需要调用注册\
    \ API `org.eclipse.microprofile.opentracing.ClientTracingRegistrar.configure(ClientBuilder\
    \ clientBuilder)` 来添加追踪能力。MicroProfile 实现可以全局地为所有客户端接口启用追踪；但为了更好的可移植性，建议使用注册 API。\n\
    \n默认的追踪行为可以通过禁用特定请求的追踪或更改生成的服务端跨度操作名称来修改。更多信息，请参考本章后面的*配置属性*部分。检测层会自动将以下请求范围的信息添加到每个跨度中：\n\
    \n*   `http.method`：请求的 HTTP 方法。\n*   `http.status_code`：请求的状态码。\n*   `http.url`：请求的\
    \ URL。\n*   `component`：被检测组件的名称，即 `jaxrs`。\n*   `span.kind`：客户端或服务端。\n*   `error`\
    \ – `true` 或 `false`。此为可选字段，如果存在，检测层还会将异常作为 `error.object` 添加到跨度日志中。\n\n所有这些标签都可以通过追踪系统用户界面来查询数据，或者用于许多追踪系统提供的数据分析任务。可以通过注入的追踪器实例将额外的元数据添加到当前活跃的跨度中。这可以在过滤器中全局执行，也可以在\
    \ REST 处理器中局部执行，如下面的代码示例所示，通过向服务端跨度添加用户代理标头（1）：\n\n```\n@Path(\"/\")\npublic class\
    \ JaxRsService {\n   @Inject\n   private io.opentracing.Tracer tracer;\n\n   @GET\n\
    \   @Path(\"/hello\")\n   @Traced(operationName=\"greeting\") (2)\n   public String\
    \ hello(@HeaderParam(\"user-agent\") String userAgent) {\n       tracer.activeSpan().setTag(\"\
    user-agent\", userAgent); (1)\n   }\n}\n```\n\n默认情况下，服务端跨度的操作名称为 `http_method:package.className.method`。但是，可以通过使用\
    \ `@Traced` 注解（2）在本地更改此设置，或者通过配置属性（请参阅配置部分）进行全局更改。\n\n# MicroProfile Rest Client\n\
    \n如前一节所述，默认情况下，所有 REST 客户端接口都会自动被追踪，无需额外配置。可以通过将 `@Traced` 注解应用于接口或方法来更改此行为以禁用追踪。当应用于接口时，所有方法都将跳过追踪。请注意，追踪上下文不会被传播。因此，如果请求继续到已检测的运行时，则会启动一个新的追踪。\n\
    \n# 显式检测\n\n有时，自动检测无法捕获所有关键的时间信息，因此需要额外的追踪点。例如，我们可能希望追踪业务层的调用，或初始化 OpenTracing\
    \ 项目（[`github.com/opentracing-contrib`](https://github.com/opentracing-contrib)）提供的第三方检测。\n\
    \n显式检测可以通过三种方式完成：\n\n*   在**上下文和依赖注入**（**CDI**）Bean 上添加 `@Traced` 注解。\n*   注入追踪器并手动创建跨度。\n\
    *   初始化第三方检测。外部检测的初始化取决于其自身的初始化要求。MicroProfile 只需提供一个追踪器实例，这在前一点中已经涵盖。\n\n现在让我们详细讨论这些内容。\n\
    \n# @Traced 注解\n\nMicroProfile OpenTracing 定义了一个 `@Traced` 注解，可用于在 CDI Bean 上启用追踪，或在自动追踪的接口上禁用追踪。该注解还可用于覆盖其他自动追踪组件（JAX-RS\
    \ 端点）上的操作名称。\n\n以下代码示例展示了如何使用 `@Traced` 注解在 CDI Bean 上启用追踪。`(1)` 为 Bean 定义的所有方法启用追踪。`(2)`\
    \ 将默认操作名称（`package.className.method`）覆盖为 `get_all_users`。`(3)` 禁用了 health 方法的追踪：\n\
    \n```\n@Traced (1)@ApplicationScopedpublic class Service {   @Traced(operationName\
    \ = \"get_all_users\") (2)   public void getUsers() {        // 业务代码   } @Traced(false)\
    \ (3) ...\n```\n\n# 追踪器注入\n\n应用程序可以注入一个 `io.opentracing.Tracer` Bean，它暴露了完整的 OpenTracing\
    \ API。这允许应用程序开发者利用更高级的用例，例如向当前活跃的跨度添加元数据、手动创建跨度、使用 baggage 进行上下文传播，或初始化额外的第三方检测。\n\
    \n以下代码展示了如何使用追踪器将数据附加到当前活跃的跨度 `(1)`：\n\n```\n@Path(\"/\")\npublic class Service\
    \ {\n    @Inject\n    private Tracer tracer;\n\n    @GET\n    @Path(\"\")\n  \
    \  @Produces(MediaType.TEXT_PLAIN)\n    public String greeting() {\n       tracer.activeSpan()\n\
    \           .setTag(\"greeting\", \"hello\"); (1)\n       return \"hello\";\n\
    \   }\n}\n```\n\n这对于向跨度添加业务相关数据非常有用，也可用于记录异常或任何其他性能分析信息。\n\n# 使用 Jaeger 进行追踪\n\
    \n到目前为止，我们只讨论了检测的不同方面。然而，要运行完整的追踪基础设施，我们需要一个追踪后端。在本节中，我们将使用 Jaeger（[`www.jaegertracing.io/`](https://www.jaegertracing.io/)）来演示收集到的追踪数据如何在追踪系统中呈现。我们选择\
    \ Jaeger 是因为 Thorntail 提供了与 Jaeger 的直接集成。其他供应商可以提供与其他系统的集成，例如 Zipkin 和 Instana。几乎每个追踪系统都提供追踪的甘特图样式视图（或时间线）。对于追踪新手来说，这个视图可能令人不知所措，但它是在分布式系统中系统分析调用的绝佳工具。\n\
    \n以下截图展示了...\n\n# 总结\n\n在本章中，我们学习了服务器和应用程序的可观测性。\n\n指标（或遥测）有助于精确定位服务器或应用程序的性能特征。MicroProfile\
    \ 通过 Metrics 规范提供了一种以标准化方式导出指标的方法。应用程序编写者可以使用 MicroProfile Metrics 通过注解或调用 Metrics\
    \ API，以声明方式将其数据暴露给监控客户端。\n\n本章进一步解释了 MicroProfile 中的 OpenTracing 集成如何为通过系统的每个单独事务提供端到端视图。我们介绍了配置属性，展示了\
    \ JAX-RS 的追踪，并最终在 Jaeger 系统中研究了数据。\n\n在下一章中，我们将学习如何通过 OpenAPI 记录（REST）API，并通过类型安全的\
    \ REST 客户端调用这些 API。\n\n# 问题\n\n1.  分布式追踪和指标之间的区别是什么？\n2.  分布式追踪系统通常提供哪些功能？\n3.\
    \  MicroProfile OpenTracing 中系统的哪些部分会被自动追踪？\n4.  MicroProfile OpenTracing 为每个\
    \ REST 请求添加了哪些标签？\n5.  如何向业务代码添加显式检测？\n6.  Metrics 中的作用域是什么？其基本原理是什么？\n7.  什么决定了向\
    \ Metrics API 发出的 REST 请求的输出格式？\n8.  在用户应用程序中，有哪些方式可以导出指标？\n"
- fmt: "# MicroProfile OpenAPI and Type-Safe REST Client\n\nEclipse MicroProfile has\
    \ a rich set of specifications for Java microservices. Two of these, Eclipse MicroProfile\
    \ OpenAPI and Eclipse MicroProfile REST Client, help with the API documentation\
    \ for your microservices and provide an API for type-safe invocation on REST endpoints,\
    \ respectively. OpenAPI simplifies the documentation for microservice endpoints\
    \ and makes this metadata available for perusal by third-party developers. A type-safe\
    \ REST client simplifies the marshalling and unmarshalling of objects to HTTP\
    \ or JSON.\n\nThe following topics will be covered in this chapter:\n\n- The capabilities\
    \ offered by each of these specifications\n- Simple code examples of some of these\
    \ capabilities\n- How to obtain further information about each of these specifications\n\
    \n## Introduction to MicroProfile OpenAPI and its capabilities\n\nThe mobile force\
    \ that fuels the digital economy led to the need for businesses to establish an\
    \ omni-channel approach to development in order to optimize costs, increase efficiencies,\
    \ and improve customer experience. A facilitator of this approach was APIs, which\
    \ led to the API economy and concepts such as API-led or API-first development\
    \ practices. In addition, the microservices architecture has become the architecture\
    \ of choice for modern development. API-based (that is, RESTful) communication\
    \ among microservices has been adopted as the *de facto* standard because it is\
    \ a good fit for the *smart endpoints and dumb pipes*, *decentralized governance*,\
    \ and *decentralized data management* characteristics of microservices.\n\nHowever,\
    \ as the number of microservices increases in a microservices architecture, their\
    \ management can become unwieldy. However, you can manage your microservices via\
    \ their APIs. You can apply management, security, load balancing, and throttling\
    \ policies to the APIs that are fronting your microservices.\n\nEclipse MicroProfile\
    \ OpenAPI provides Java interfaces to developers for generating OpenAPI v3 documents\
    \ from their Java RESTful Web Services (JAX-RS) applications. The specification\
    \ requires that a fully processed OpenAPI document be available at the root URL,\
    \ `/openapi`, as an HTTP `GET` operation, as follows:\n\n```\nGET http://myHost:myPort/openapi\n\
    ```\n\nThe required protocol is `http`. However, implementors of the specification\
    \ are strongly encouraged to also support the `https` protocol for secure connectivity\
    \ to the OpenAPI endpoint.\n\nThere are three sources from which the OpenAPI document\
    \ is created. These three sources (described in later sections in this chapter)\
    \ are as follows:\n\n- Generated by processing the JAX-RS annotations (and optional\
    \ OpenAPI annotations) found in the application\n- Programmatically built by an\
    \ application by providing a Java class that implements `OasModelReader`\n- A\
    \ static OpenAPI document included in application deployment\n\nThese three sources\
    \ (any combination) are combined to produce a single OpenAPI document, which can\
    \ be filtered (by providing a Java class that implements the `OasFilter` interface)\
    \ and then served at the preceding `/openapi` endpoint.\n\n## Configuration\n\n\
    The MicroProfile OpenAPI specification makes use of the MicroProfile configuration\
    \ specification to configure its parameters and values. For example, for injecting\
    \ configuration values, MicroProfile OpenAPI can use the default and custom `ConfigSources`.\n\
    \nFor more information on `ConfigSources`, you can visit [https://github.com/eclipse/microprofile-config/blob/master/spec/src/main/asciidoc/configsources.asciidoc](https://github.com/eclipse/microprofile-config/blob/master/spec/src/main/asciidoc/configsources.asciidoc).\n\
    \nThere are many configurable items. The following table contains a subset of\
    \ them:\n\n| **Configuration item** | **Description** |\n| --- | --- |\n| `mp.openapi.scan.di\
    \ sable` | Configuration property to disable annotation scanning. The default\
    \ value is `false`. |\n| `mp.openapi.servers` | Configuration property to specify\
    \ the list of global servers that ... |\n\n## Generating the OpenAPI document\n\
    \nAs already described, the MicroProfile OpenAPI specification requires that an\
    \ OpenAPI document be generated from a combination of three sources.\n\nYou then\
    \ have a number of choices:\n\n- Extend the OpenAPI document generated by the\
    \ JAX-RS annotations using the MicroProfile OpenAPI annotations.\n- Leverage the\
    \ initial output from `/openapi`, which you can use as a reference to start documenting\
    \ your APIs. In this case, you can write static OpenAPI files (described in a\
    \ later section in this chapter) before any code is written, which is a usual\
    \ approach adopted by organizations to lock-in the contract of the API, that is,\
    \ it is an API-first development practice.\n- Bootstrap or complete the OpenAPI\
    \ model tree by coding using the programming model, covered later in this chapter.\n\
    \nAdditionally, you can use a filter to update the OpenAPI model after it has\
    \ been built.\n\n## MicroProfile OpenAPI annotations\n\nProbably the most common\
    \ source of OpenAPI information is the set of annotations that make up the definition\
    \ of a standard JAX-RS application. These annotations, along with additional (optional)\
    \ annotations defined by the MicroProfile OpenAPI specification, can be scanned\
    \ and processed by the MicroProfile platform to produce an OpenAPI document.\n\
    \nThe MP OpenAPI specification requires the generation of a valid OpenAPI document\
    \ from pure JAX-RS 2.0 applications. If you are new to OpenAPI, you can simply\
    \ deploy your existing JAX-RS application to a MicroProfile OpenAPI runtime and\
    \ check out the output from `/openapi`.\n\nTo fill out additional details of the\
    \ generated OpenAPI document, you may further annotate your ...\n\n## Usage examples\n\
    \nSome usage examples of MicroProfile OpenAPI annotations are as follows:\n\n\
    Example 1 – Simple operation description (abbreviated):\n\n```\n@GET\n@Path(\"\
    /findByMake\")\n@Operation(summary = \"Finds cars by make\",\n           description\
    \ = \"Find cars by their manufacturer\")\npublic Response findCarsByMake(...)\n\
    { ... }\n```\n\nThe following is the output for example 1:\n\n```\n/car/findByMake:\n\
    \  get:\n    summary: Finds cars by make\n    description: Find cars by their\
    \ manufacturer\n```\n\nExample 2 – Operation with different responses (abbreviated):\n\
    \n```\n@GET\n@Path(\"/{name}\")\n@Operation(summary = \"Get customer by name\"\
    )\n  @APIResponse(description = \"The customer\",\n             content = @Content(mediaType\
    \ = \"application/json\",\n                                schema = @Schema(implementation\
    \ = Customer.class))),\n@APIResponse(responseCode = \"400\", description = \"\
    Customer not found\")\npublic Response getCustomerByName(\n        @Parameter(description\
    \ = \"The name of the customer to be fetched\", required = true) @PathParam(\"\
    name\") String name)\n\n{...}\n```\n\nThe following is the output for example\
    \ 2:\n\n```\n/customer/{name}:\n    get:\n       summary: Get customer by name\n\
    \       operationId: getCutomerByName\n       parameters:\n       - name: name\n\
    \         in: path\n         description: 'The name of the customer to be fetched'\n\
    \         required: true\n         schema:\n           type: string\n       responses:\n\
    \         default:\n           description: The customer\n           content:\n\
    \             application/json:\n               schema:\n                 $ref:\
    \ '#/components/schemas/Customer'\n         400:\n           description: Customer\
    \ not found\n```\n\nFor more examples, please refer to the MicroProfile OpenAPI\
    \ specification wiki at [https://github.com/eclipse/microprofile-open-api/wiki](https://github.com/eclipse/microprofile-open-api/wiki)."
