    \ of the standard `iss` claim as its default `JsonString` type\n5.  Injection\
    \ of a non-standard `customString` claim as a `JsonString` type\n6.  Injection\
    \ of a non-standard `customInteger` claim as a `JsonNumber` type\n7.  Injection\
    \ of a non-standard `customDouble` claim as a `JsonNumber` type\n8.  Injection\
    \ of a non-standard `customObject` claim as a `JsonString` type\n\n# Configuring\
    \ authentication of JWTs\n\nTo accept a JWT as representing an identity that should\
    \ be authenticated and therefore trusted, we need to configure the MP-JWT feature\
