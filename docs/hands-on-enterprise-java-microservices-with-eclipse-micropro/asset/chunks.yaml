    \ keep in mind that these annotations are interceptors binding and hence are only\
    \ usable on CDI beans. So, be careful to define your class as CDI beans before\
    \ applying Fault Tolerance annotations on them or their methods.\n\nIn the following\
    \ sections, you'll find usage examples for each Fault Tolerance annotation.\n\n\
    # The @Asynchronous policy\n\nMaking an operation asynchronous is as simple as\
    \ the following:\n\n```\n@Asynchronous\npublic Future<Connection> service() throws\
    \ InterruptedException {\n  Connection conn = new Connection() {\n    {\n    \
    \  Thread.sleep(1000);\n    }\n\n    @Override\n    public String getData() {\n\
    \      return \"service DATA\";\n    }\n };\n return CompletableFuture.completedFuture(conn);\n\
    }\n```\n\nThe only constraint is to have the `@Asynchronous` method return `Future`\
    \ or `CompletionStage`; otherwise, the implementation should throw an exception.\n\
    \n# The @Retry policy\n\nShould the operation fail, you can apply the retry policy\
    \ to have the operation invoked again. The `@Retry` annotation can be used on\
    \ a class or method level like this:\n\n```\n@Retry(maxRetries = 5, maxDuration=\
    \ 1000, retryOn = {IOException.class})public void operationToRetry() {  ...}\n\
    ```\n\nIn the previous example, the operation should be retried a maximum of five\
    \ times only on `IOException`. If the total duration of all retries lasts more\
    \ than 1,000 ms, the operation will be aborted.\n\n# The @Fallback policy\n\n\
    The `@Fallback` annotation can only be applied on a method; annotating a class\
    \ will give an unexpected result:\n\n```\n@Retry(maxRetries = 2)\n@Fallback(StringFallbackHandler.class)\n\
    public String shouldFallback() {\n  ...\n}\n```\n\nThe fallback method is called\
    \ after the number of retries is reached. In the previous example, the method\
    \ will be retried twice in case of an error, and then the fallback will be used\
    \ to invoke another piece of code—in this case, the following `StringFallbackHandler`\
    \ class:\n\n```\nimport javax.enterprise.context.ApplicationScoped;\n\nimport\
    \ org.eclipse.microprofile.config.inject.ConfigProperty;\nimport org.eclipse.microprofile.faulttolerance.ExecutionContext;\n\
    import org.eclipse.microprofile.faulttolerance.FallbackHandler;\n\n@ApplicationScoped\n\
    public class StringFallbackHandler implements FallbackHandler<String> {\n    @ConfigProperty(name=\"\
    app1.requestFallbackReply\", defaultValue = \"Unconfigured Default Reply\")\n\
    \    private String replyString;\n\n    @Override\n    public String handle(ExecutionContext\
    \ ec) {\n        return replyString;\n    }\n}\n```\n\nFallback code can be defined\
    \ by a class implementing the `FallbackHandler` interface (see the previous code)\
    \ or by a method in the current bean. In the `StringFallbackHandler` code, a MicroProfile\
    \ Config property named `app1.requestFallbackReply` is used to externalize the\
    \ application's fallback string value.\n\n# The @Timeout policy\n\nThe `@Timeout`\
    \ annotation could be applied to a class or method to make sure that an operation\
    \ doesn't last forever:\n\n```\n@Timeout(200)public void operationCouldTimeout()\
    \ {  ...}\n```\n\nIn the preceding example, the operation will be stopped should\
    \ it last more than 200 ms.\n\n# The @CircuitBreaker policy\n\nThe `@CircuitBreaker`\
    \ annotation can be applied to a class or method. The circuit breaker pattern\
    \ was introduced by Martin Fowler to protect the execution of an operation by\
    \ making it fail fast in case of a dysfunction:\n\n```\n@CircuitBreaker(requestVolumeThreshold\
    \ = 4, failureRatio=0.75, delay = 1000)\npublic void operationCouldBeShortCircuited(){\n\
    \  ...\n}\n```\n\nIn the previous example, the method applies the `CircuitBreaker`\
    \ policy. The circuit will be opened if three (*4 x 0.75*) failures occur among\
    \ the rolling window of four consecutive invocations. The circuit will stay open\
    \ for 1,000 ms and then be back to half-open. After a successful invocation, the\
    \ circuit will be back to closed again.\n\n# The @Bulkhead policy\n\nThe `@Bulkhead`\
    \ annotation can also be applied to a class or method to enforce the bulkhead\
    \ policy. This pattern isolates failures in the current operation to preserve\
    \ the execution of other operations. The implementation does this by limiting\
    \ the number of concurrent invocations on a given method:\n\n```\n@Bulkhead(4)public\
    \ void bulkheadedOperation() {  ...}\n```\n\nIn the previous code, this method\
    \ only supports four invocations at the same time. Should more than four simultaneous\
    \ requests come into the `bulkheadedOperation` method, the system will hold the\
    \ fifth and later requests until one of the four active invocations completes.\
    \ The bulkhead annotation can also be used with `@Asynchronous` to limit the thread\
    \ number in an asynchronous ..."
  trans: "\n# 理解 Eclipse MicroProfile 容错机制\n\n容错机制提供了一系列工具，通过增强代码的韧性来防止其失效。这些工具大多源于优秀的开发实践（例如重试或降级）或知名的开发模式（例如断路器或隔板）。\n\
    \n容错机制基于 CDI，更准确地说，是基于 CDI 拦截器实现。它还依赖 MicroProfile Config 规范，以便为容错策略提供外部配置。\n\n\
    该规范的主要思想是将业务逻辑与容错样板代码解耦。为实现这一目标，规范定义了拦截器绑定注解，用于在方法执行或类上应用容错策略（在这种情况下，该类的所有方法都应用相同的策略）。\n\
    \n容错规范中包含的策略如下：\n\n*   **超时（Timeout）**：通过 `@Timeout` 注解应用。它为当前操作添加一个超时时间。\n* \
    \  **重试（Retry）**：通过 `@Retry` 注解应用。它为当前操作添加重试行为，并允许对其进行配置。\n*   **降级（Fallback）**：通过\
    \ `@Fallback` 注解应用。它定义了当前操作失败时要执行的代码。\n*   **隔板（Bulkhead）**：通过 `@Bulkhead` 注解应用。它将当前操作中的故障隔离开来，以保护其他操作的执行。\n\
    *   **断路器（Circuit Breaker）**：通过 `@CircuitBreaker` 注解应用。它提供自动快速失败执行，以防止系统过载。\n\
    *   **异步（Asynchronous）**：通过 `@Asynchronous` 注解应用。它使当前操作变为异步（即代码将被异步调用）。\n\n应用这些策略中的一个或多个，只需在你希望启用这些策略的方法（或类）上添加所需的注解即可。因此，使用容错机制相当简单。但这种简单性并不妨碍其灵活性，这要归功于每种策略提供的所有可配置参数。\n\
    \n目前，以下厂商提供了容错规范的实现：\n\n*   Red Hat 在 Thorntail 和 Quarkus 中\n*   IBM 在 Open Liberty\
    \ 中\n*   Payara 在 Payara Server 中\n*   Apache Safeguard 用于 Hammock 和 TomEE\n*\
    \   KumuluzEE 用于 KumuluzEE 框架\n\n所有这些实现都支持容错机制，因此也支持下一节中描述的相同功能集。\n\n# MicroProfile\
    \ 容错机制实战\n\n正如我们刚才讨论的，容错规范提供了一组注解，你需要将它们应用于类或方法上，以强制执行容错策略。话虽如此，你必须记住这些注解是拦截器绑定，因此只能在\
    \ CDI Bean 上使用。所以，在将容错注解应用于类或其方法之前，请务必将你的类定义为 CDI Bean。\n\n在以下各节中，你将找到每个容错注解的使用示例。\n\
    \n# @Asynchronous 策略\n\n使操作异步化非常简单，如下所示：\n\n```\n@Asynchronous\npublic Future<Connection>\
    \ service() throws InterruptedException {\n  Connection conn = new Connection()\
    \ {\n    {\n      Thread.sleep(1000);\n    }\n\n    @Override\n    public String\
    \ getData() {\n      return \"service DATA\";\n    }\n };\n return CompletableFuture.completedFuture(conn);\n\
    }\n```\n\n唯一的约束是 `@Asynchronous` 方法必须返回 `Future` 或 `CompletionStage`；否则，实现应抛出异常。\n\
    \n# @Retry 策略\n\n如果操作失败，你可以应用重试策略来再次调用该操作。`@Retry` 注解可以在类或方法级别使用，如下所示：\n\n```\n\
    @Retry(maxRetries = 5, maxDuration= 1000, retryOn = {IOException.class})public\
    \ void operationToRetry() {  ...}\n```\n\n在上面的示例中，该操作最多重试五次，且仅在发生 `IOException`\
    \ 时重试。如果所有重试的总持续时间超过 1000 毫秒，该操作将被中止。\n\n# @Fallback 策略\n\n`@Fallback` 注解只能应用于方法；注解类将产生意外结果：\n\
    \n```\n@Retry(maxRetries = 2)\n@Fallback(StringFallbackHandler.class)\npublic\
    \ String shouldFallback() {\n  ...\n}\n```\n\n降级方法在达到重试次数后被调用。在上面的示例中，如果发生错误，该方法将被重试两次，然后使用降级逻辑来调用另一段代码——在本例中，是下面的\
    \ `StringFallbackHandler` 类：\n\n```\nimport javax.enterprise.context.ApplicationScoped;\n\
    \nimport org.eclipse.microprofile.config.inject.ConfigProperty;\nimport org.eclipse.microprofile.faulttolerance.ExecutionContext;\n\
    import org.eclipse.microprofile.faulttolerance.FallbackHandler;\n\n@ApplicationScoped\n\
    public class StringFallbackHandler implements FallbackHandler<String> {\n    @ConfigProperty(name=\"\
    app1.requestFallbackReply\", defaultValue = \"Unconfigured Default Reply\")\n\
    \    private String replyString;\n\n    @Override\n    public String handle(ExecutionContext\
    \ ec) {\n        return replyString;\n    }\n}\n```\n\n降级代码可以通过实现 `FallbackHandler`\
    \ 接口的类（参见前面的代码）或当前 Bean 中的一个方法来定义。在 `StringFallbackHandler` 代码中，使用了一个名为 `app1.requestFallbackReply`\
    \ 的 MicroProfile Config 属性来外部化应用程序的降级字符串值。\n\n# @Timeout 策略\n\n`@Timeout` 注解可以应用于类或方法，以确保操作不会无限期持续：\n\
    \n```\n@Timeout(200)public void operationCouldTimeout() {  ...}\n```\n\n在前面的示例中，如果操作持续时间超过\
    \ 200 毫秒，它将被停止。\n\n# @CircuitBreaker 策略\n\n`@CircuitBreaker` 注解可以应用于类或方法。断路器模式由\
    \ Martin Fowler 引入，用于保护操作的执行，使其在功能异常时快速失败：\n\n```\n@CircuitBreaker(requestVolumeThreshold\
    \ = 4, failureRatio=0.75, delay = 1000)\npublic void operationCouldBeShortCircuited(){\n\
    \  ...\n}\n```\n\n在上面的示例中，该方法应用了 `CircuitBreaker` 策略。如果在连续四次调用的滚动窗口中发生三次（*4 x\
    \ 0.75*）失败，断路器将打开。断路器将保持打开状态 1000 毫秒，然后恢复到半开状态。成功调用一次后，断路器将再次恢复到关闭状态。\n\n# @Bulkhead\
    \ 策略\n\n`@Bulkhead` 注解也可以应用于类或方法，以强制执行隔板策略。此模式将当前操作中的故障隔离开来，以保护其他操作的执行。实现通过限制给定方法上的并发调用数量来做到这一点：\n\
    \n```\n@Bulkhead(4)public void bulkheadedOperation() {  ...}\n```\n\n在上面的代码中，此方法同时只支持四次调用。如果\
    \ `bulkheadedOperation` 方法同时收到超过四个请求，系统将保持第五个及之后的请求，直到四个活动调用中的一个完成。隔板注解也可以与 `@Asynchronous`\
    \ 一起使用，以限制异步...\n"
- fmt: '# Tolerance with MicroProfile Config


    As we saw in the previous sections, Fault Tolerance policies are applied by using
    annotations. For most use cases, this is enough, but for others, this approach
    may not be satisfactory because configuration is done at the source code level.


    That''s the reason why the parameters of MicroProfile Fault Tolerance annotations
    can be overridden using MicroProfile Config.


    The annotation parameters can be overwritten via config properties using the following
    naming convention: `<classname>/<methodname>/<annotation>/<parameter>`.


    To override `maxDuration` for `@Retry` on the `doSomething` method in the `MyService`
    class, set the config property like this:


    ```

    org.example.microservice.MyService/doSomething/Retry/maxDuration=3000

    ```


    If the parameters for a particular annotation need to be configured with the same
    value for a particular class, use the `<classname>/<annotation>/<parameter>` config
    property for configuration.


    For instance, use the following config property to override all `maxRetries` for
    `@Retry` specified on the `MyService` class to 100:


    ```

    org.example.microservice.MyService/Retry/maxRetries=100

    ```


    Sometimes, the parameters need to be configured with the same value for the whole
    microservice (that is, all occurrences of the annotation in the deployment).


    In this circumstance, the `<annotation>/<parameter>` config property overrides
    the corresponding parameter value for the specified annotation. For instance,
    to override all `maxRetries` for all of `@Retry` to be 30, specify the following
    config property:


    ```

    Retry/maxRetries=30

    ```


    This brings us to the end of discussion on Fault Tolerance in MicroProfile.


    # Summary


    In this chapter, we learned how to use MicroProfile Config to configure MicroProfile
    applications and MicroProfile Fault Tolerance to make them more resilient.


    In MicroProfile Config, the sources of the configuration can be many; some values
    come from properties files and others from system properties or environment variables,
    but they are all accessed consistently from the Java application. The values will
    likely differ according to the deployment environment (for example, testing and
    production) but that is transparent in the application code.


    MicroProfile Fault Tolerance helps to prevent failure in applications by applying
    specific policies in the code. It comes with default behavior but can be configured
    thanks to MicroProfile ...


    # Questions


    1.  What are the default sources of configuration properties supported by MicroProfile
    Config?

    2.  What can you do if you need to integrate another source of configuration properties?

    3.  Are only the string type of properties supported?

    4.  Does injecting a configuration property into your code force you to provide
    a value for that property?

    5.  Suppose you have complex property types. Is there a way to integrate them
    into MicroProfile Config?

    6.  What happens when a Fault Tolerance annotation is applied to a class?

    7.  True or false: there are at least 10 different Fault Tolerance policies?

    8.  Does a `@Retry` policy require a retry on all failures?

    9.  Are we stuck with the Fault Tolerance annotation setting that is used in the
    application code?


    # Further reading


    Additional details for the MicroProfile Config feature can be found in the MicroProfile
    Config specification at [https://github.com/eclipse/microprofile-config/releases](https://github.com/eclipse/microprofile-config/releases).
    Additional details for the MicroProfile Fault Tolerance feature can be found in
    the MicroProfile Config specification at [https://github.com/eclipse/microprofile-config/releases](https://github.com/eclipse/microprofile-fault-tolerance/releases).


    # MicroProfile Health Check and JWT Propagation


    In this chapter, we will introduce the MicroProfile Health Check and **JSON Web
    Token** (**JWT**) Propagation projects. The Health Check project is concerned
    with exposing the application-defined health to the outside world, and JWT Propagation
    is concerned with defining an interoperable security token and use of that token
    in an application. In this chapter, you will learn the concerns that these specifications
    address, their constructs, and how to use them in your application. The code snippets
    throughout this chapter are for reference only. If you would like a working code
    version of this specification, please refer to [Chapter 8](#5535a9c6-c887-40a5-95cd-c8b51ef75bf1.xhtml),
    *A Working Eclipse MicroProfile Code Sample*.


    We will cover the following topics:


    *   What a health check is

    *   How MicroProfile Health Check exposes the health check endpoint and the format
    of a query to that endpoint

    *   How to write a MicroProfile Health Check for your application

    *   The required format for the tokens in MicroProfile JWT Propagation

    *   How we can leverage MicroProfile JWT Propagation for security decisions


    # Technical requirements


    To build and run the samples in this chapter, you need Maven 3.5+ and a Java 8
    JDK. The code for this chapter can be found at [https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-healthcheck](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-healthcheck)
    and [https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation)
    for the MicroProfile Health Check and MicroProfile Propagation JWT sections, respectively.


    # Understanding health checks and how MicroProfile handles them


    In cloud-native architectures, health checks are used to determine whether a computing
    node is alive and ready to perform work. The concept of readiness describes the
    state when containers start up or roll over (that is, redeployment). During this
    time, the cloud platform needs to ensure that no network traffic is routed to
    that instance before it is ready to perform work.


    Liveness, on the other hand, describes the state of a running container; that
    is, can it still respond to requests? If either the liveness or readiness states
    are seen as invalid, the computing node will be discarded (terminated or shut
    down) and eventually replaced by another, healthy, instance.


    Health checks are an essential contract with the orchestration framework and scheduler
    of the cloud platform. The check procedures are provided by the application developer
    and the platform uses these to continuously ensure the availability of your application
    or service.


    MicroProfile Health Check 1.0 (MP-HC) supports a single health check endpoint
    that can be utilized for either a liveness or readiness check. MicroProfile Health
    Check 2.0 plans to add support for multiple endpoints to allow an application
    to define both liveness and readiness probes.


    The MP-HC specification details two elements: a protocol along with a response
    wire format part and a Java API for defining the response content.


    The architecture of the MP-HC feature is modeled as an application that consists
    of zero or more health check procedures that are logically linked together with
    `AND` to derive the overall health check status. A procedure represents an application-defined
    check of a required condition that has a name, state, and, optionally, data about
    the check.'
