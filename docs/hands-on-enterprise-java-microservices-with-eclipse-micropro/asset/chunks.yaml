    \ the configuration property is not found in the underlying `Config`:\n\n```\n\
    @Inject\n@ConfigProperty(name=\"my.url\", defaultValue=\"http://localhost/\")\n\
    private URL myURL;\n```\n\nIf `defaultValue` is not set and no property is found,\
    \ the application will throw `DeploymentException` as it cannot be properly configured.\n\
    \nIt is possible to use `Optional` if a configuration property might not be present,\
    \ as shown in the following code block:\n\n```\n@Inject\n@ConfigProperty(name=\"\
    my.url\")\nprivate Optional<URL> someUrl; // will be set to Optional.empty if\
    \ the\n                               // property `my.url` cannot be found\n```\n\
    \nAfter reading the configuration, we need to provide source configuration sources,\
    \ which will be covered in the next section.\n\n# Providing sources of configuration\n\
    \nThe source of a configuration is represented by the `ConfigSource` interface.\
    \ You do not need to implement this interface unless you want to provide a source\
    \ of configurations that are not available by the MicroProfile implementation\
    \ you use in your application.\n\nIf a property is found in multiple config sources,\
    \ `Config` will return the value from the `ConfigSource` interface with the highest\
    \ `ordinal` value.\n\nOrdering `ConfigSource` is important as users can provide\
    \ custom `ConfigSource` interfaces in addition to the default ones provided by\
    \ the MicroProfile Config implementation.\n\n# Default ConfigSources\n\nBy default,\
    \ a MicroProfile Config implementation must provide three sources of configuration:\n\
    \n*   System properties from the Java virtual machine (with an ordinal of `400`)\n\
    *   Environment variables (with an ordinal of `300`)\n*   Properties stored in\
    \ `META-INF/microprofile-config.properties` (with an ordinal of `100`)\n\nThe ordinal\
    \ value of a config source determines the precedence of the config source. In\
    \ particular, if a property is defined both in the system properties and the environment\
    \ variables, the value will be taken from the system properties (which has a higher\
    \ ordinal than the environment variables).\n\nThere are no restrictions on the\
    \ names of properties. However, some operating systems can impose some restrictions\
    \ on the name of the environment variables (for example, `\".\"` is not allowed\
    \ by most Unix shells). If you have a property that could be configured from the\
    \ environment variables, you have to name your property accordingly.\n\nFor example,\
    \ the property name `my_url` can be used by an environment variable while `my.url`\
    \ cannot.\n\n**New in MicroProfile Config 1.3** MicroProfile Config 1.3 introduces\
    \ a mapping rule from the config property name to the environment variable. This\
    \ rule searches three environment variable variants for each property name:\n\n\
    *   Exact match\n*   Replace any non-alphanumeric character with `_`\n*   Replace\
    \ any non-alphanumeric character with `_` and use uppercase\n\nThis means that,\
    \ in the Java application, we can have a property named `app.auth.url` and use\
    \ the `APP_AUTH_URL` environment variable to configure it.\n\nLet's move on to\
    \ the other type of configuration source.\n\n# Custom ConfigSources implementations\n\
    \nIt is possible to provide additional sources of configuration in your application\
    \ that will be automatically added by the MicroProfile Config implementation.\n\
    \nYou need to define an implementation of `org.eclipse.microprofile.config.spi.ConfigSource`\
    \ and add a Java `ServiceLoader` configuration for it, and put that file in your\
    \ application archive as `META-INF/services/``org.eclipse.microprofile.config.spi.ConfigSource`.\
    \ For your reference, here is an example of the definition of an implementation\
    \ of an environment `ConfigSource`:\n\n```\npackage io.packt.sample.config;import\
    \ java.io.Serializable;import java.util.Collections;import java.util.Map;import\
    \ org.eclipse.microprofile.config.spi.ConfigSource;public class EnvConfigSource\
    \ ...\n```\n\n# Using converters for high-level configuration\n\nMicroProfile\
    \ Config will read Java `String` objects from its `ConfigSource`. However, it\
    \ provides facilities to *convert* these `String` objects into more specific types\
    \ in your application.\n\nFor example, the `myUrl` field we described previously\
    \ is a `URL` object. The corresponding property, `my.url`, is read as a `String` object\
    \ and then converted into a `URL` object before it is injected.\n\nIf the application\
    \ uses the `Config` object, the MicroProfile Config implementation will also convert\
    \ the `String` object into the type passed as the second argument of the `getValue`\
    \ and `getOptionalValue` methods. This conversion can be done using different\
    \ converter types: built-in, automatic, and custom. We will talk about them in\
    \ detail now.\n\n# Built-in converters\n\nThe MicroProfile Config implementation\
    \ provides built-in converters for the primitive types (`boolean`, `int`, `long`,\
    \ `byte`, `float`, and `double`) and their corresponding Java types (for example,\
    \ `Integer`).\n\nIt also provides support for arrays in the property value using\
    \ the `\",\"` as the item separator. If the `\",\"` must be part of an item, it\
    \ must be escaped with a backslash `\"\\\"`:\n\n```\nprivate String[] pets = config.getValue(\"\
    myPets\", String[].class)\n```\n\nIf the value of the `myPets` property is `dog,cat,dog\\\
    \\,cat`, the elements of the array stored in `pets` would be `{\"dog\", \"cat\"\
    , \"dog,cat\"}`.\n\n# Automatic converters\n\nMicroProfile Config also defines\
    \ *automatic converters*. If a converter is not known for a given Java type, it\
    \ will attempt to convert a `String` object into it using any one of the three\
    \ different approaches:\n\n*   The Java type has a public constructor with a `String`\
    \ parameter.\n*   It has a `public static valueOf(String)` method.\n*   It has\
    \ a `public static parse(String)` method.\n\nThat's how the `my.url` property\
    \ was converted from `String` into `URL` since the `java.net.URL` type has the `public\
    \ URL(String)` constructor.\n\n# Custom converters\n\nIf your application defines\
    \ Java types that do not provide any of these three cases covered by the automatic\
    \ converters, MicroProfile Config can still provide conversion using custom converters\
    \ that extend the `org.eclipse.microprofile.config.spi.Converter` interface defined\
    \ in the following:\n\n```\npublic interface Converter<T> {\n    /**\n     * Configure\
    \ the string value to a specified type\n     * @param value the string representation\
    \ of a property value.\n     * @return the converted value or null\n     *\n \
    \    * @throws IllegalArgumentException if the value cannot be converted to  \
    \      the specified type.\n     */\n    T convert(String value);\n```\n\nYou\
    \ have to write an implementation of `org.eclipse.microprofile.config.spi.Converter`,\
    \ then add its name to the `/META-INF/services/org.eclipse.microprofile.config.spi.Converter\
    \ ...`"
  trans: "\n# Config 对象\n\n`org.eclipse.microprofile.config.Config` 接口是在 Java 应用程序中检索配置的入口点。\n\
    \n有两种方式可以获取 `Config` 实例：\n\n1.  第一种（也是推荐的方式）是使用 CDI 将其注入到代码中：\n\n```\n@Inject\n\
    private Config config;\n```\n\n2.  第二种方式是调用静态方法 `org.eclipse.microprofile.config.ConfigProvider#getConfig()`\
    \ 来获取 `Config` 实例：\n\n```\nConfig config = ConfigProvider.getConfig();\n```\n\n\
    `Config` 接口提供了两种检索属性的方法：\n\n*   `getValue(String propertyName, Class propertyType)`：如果配置中不存在该属性，此方法会抛出运行时异常。此方法仅应用于**强制**配置项……\n\
    \n# @ConfigProperty 注解\n\n`@ConfigProperty` 注解可用于通过 CDI 将配置值注入 Java 字段或方法参数，如下所示：\n\
    \n```\n@Inject\n@ConfigProperty(name=\"my.url\")\nprivate URL myURL;\n```\n\n\
    `@ConfigProperty` 注解可以包含 `defaultValue`，当在底层 `Config` 中未找到配置属性时，将使用该默认值来配置字段：\n\
    \n```\n@Inject\n@ConfigProperty(name=\"my.url\", defaultValue=\"http://localhost/\"\
    )\nprivate URL myURL;\n```\n\n如果未设置 `defaultValue` 且未找到任何属性，应用程序将抛出 `DeploymentException`，因为它无法被正确配置。\n\
    \n如果某个配置属性可能不存在，可以使用 `Optional`，如下代码块所示：\n\n```\n@Inject\n@ConfigProperty(name=\"\
    my.url\")\nprivate Optional<URL> someUrl; // 如果找不到属性 `my.url`，则会被设置为 Optional.empty\n\
    ```\n\n读取配置后，我们需要提供配置源，这将在下一节中介绍。\n\n# 提供配置源\n\n配置源由 `ConfigSource` 接口表示。除非您想提供应用程序中使用的\
    \ MicroProfile 实现所不提供的配置源，否则无需实现此接口。\n\n如果在多个配置源中找到某个属性，`Config` 将返回具有最高 `ordinal`\
    \ 值的 `ConfigSource` 接口中的值。\n\n对 `ConfigSource` 进行排序很重要，因为除了 MicroProfile Config\
    \ 实现提供的默认 `ConfigSource` 接口之外，用户还可以提供自定义的 `ConfigSource` 接口。\n\n# 默认 ConfigSource\n\
    \n默认情况下，MicroProfile Config 实现必须提供三个配置源：\n\n*   Java 虚拟机中的系统属性（序数为 `400`）\n* \
    \  环境变量（序数为 `300`）\n*   存储在 `META-INF/microprofile-config.properties` 中的属性（序数为\
    \ `100`）\n\n配置源的序数值决定了配置源的优先级。特别是，如果一个属性同时在系统属性和环境变量中定义，则该值将从系统属性中获取（其序数高于环境变量）。\n\
    \n对属性名称没有限制。但是，某些操作系统可能会对环境变量的名称施加一些限制（例如，大多数 Unix shell 不允许使用 `\".\"`）。如果您有一个可能通过环境变量配置的属性，则必须相应地命名您的属性。\n\
    \n例如，属性名称 `my_url` 可以被环境变量使用，而 `my.url` 则不能。\n\n**MicroProfile Config 1.3 中的新特性**\
    \ MicroProfile Config 1.3 引入了从配置属性名称到环境变量的映射规则。此规则为每个属性名称搜索三种环境变量变体：\n\n*   精确匹配\n\
    *   将所有非字母数字字符替换为 `_`\n*   将所有非字母数字字符替换为 `_` 并使用大写\n\n这意味着，在 Java 应用程序中，我们可以有一个名为\
    \ `app.auth.url` 的属性，并使用 `APP_AUTH_URL` 环境变量来配置它。\n\n让我们继续讨论另一种类型的配置源。\n\n# 自定义\
    \ ConfigSource 实现\n\n可以在您的应用程序中提供额外的配置源，这些配置源将由 MicroProfile Config 实现自动添加。\n\n\
    您需要定义一个 `org.eclipse.microprofile.config.spi.ConfigSource` 的实现，并为其添加一个 Java `ServiceLoader`\
    \ 配置，然后将该文件作为 `META-INF/services/``org.eclipse.microprofile.config.spi.ConfigSource`\
    \ 放入您的应用程序归档文件中。供您参考，以下是一个环境 `ConfigSource` 实现的定义示例：\n\n```\npackage io.packt.sample.config;import\
    \ java.io.Serializable;import java.util.Collections;import java.util.Map;import\
    \ org.eclipse.microprofile.config.spi.ConfigSource;public class EnvConfigSource\
    \ ...\n```\n\n# 使用转换器进行高级配置\n\nMicroProfile Config 将从其 `ConfigSource` 中读取 Java\
    \ `String` 对象。但是，它提供了将 `String` 对象*转换*为应用程序中更具体类型的工具。\n\n例如，我们之前描述的 `myUrl` 字段是一个\
    \ `URL` 对象。相应的属性 `my.url` 被读取为 `String` 对象，然后在注入之前转换为 `URL` 对象。\n\n如果应用程序使用 `Config`\
    \ 对象，MicroProfile Config 实现也会将 `String` 对象转换为作为 `getValue` 和 `getOptionalValue`\
    \ 方法第二个参数传入的类型。这种转换可以使用不同的转换器类型完成：内置转换器、自动转换器和自定义转换器。我们现在将详细讨论它们。\n\n# 内置转换器\n\
    \nMicroProfile Config 实现为原始类型（`boolean`、`int`、`long`、`byte`、`float` 和 `double`）及其对应的\
    \ Java 类型（例如 `Integer`）提供了内置转换器。\n\n它还支持在属性值中使用 `\",\"` 作为项目分隔符的数组。如果 `\",\"`\
    \ 必须是项目的一部分，则必须使用反斜杠 `\"\\\"` 进行转义：\n\n```\nprivate String[] pets = config.getValue(\"\
    myPets\", String[].class)\n```\n\n如果 `myPets` 属性的值是 `dog,cat,dog\\\\,cat`，则存储在\
    \ `pets` 中的数组元素将是 `{\"dog\", \"cat\", \"dog,cat\"}`。\n\n# 自动转换器\n\nMicroProfile\
    \ Config 还定义了*自动转换器*。如果对于给定的 Java 类型没有已知的转换器，它将尝试使用以下三种不同方法之一将 `String` 对象转换为该类型：\n\
    \n*   Java 类型具有一个接受 `String` 参数的公共构造函数。\n*   它有一个 `public static valueOf(String)`\
    \ 方法。\n*   它有一个 `public static parse(String)` 方法。\n\n这就是 `my.url` 属性从 `String`\
    \ 转换为 `URL` 的方式，因为 `java.net.URL` 类型具有 `public URL(String)` 构造函数。\n\n# 自定义转换器\n\
    \n如果您的应用程序定义的 Java 类型不提供自动转换器所涵盖的这三种情况中的任何一种，MicroProfile Config 仍然可以使用扩展了 `org.eclipse.microprofile.config.spi.Converter`\
    \ 接口的自定义转换器来提供转换，该接口定义如下：\n\n```\npublic interface Converter<T> {\n    /**\n \
    \    * 将字符串值配置为指定类型\n     * @param value 属性值的字符串表示形式。\n     * @return 转换后的值或 null\n\
    \     *\n     * @throws IllegalArgumentException 如果无法将值转换为指定类型。\n     */\n   \
    \ T convert(String value);\n```\n\n您必须编写一个 `org.eclipse.microprofile.config.spi.Converter`\
    \ 的实现，然后将其名称添加到 `/META-INF/services/org.eclipse.microprofile.config.spi.Converter\
    \ ...`\n"
- fmt: "# Understanding Eclipse MicroProfile Fault Tolerance\n\nFault Tolerance provides\
    \ a collection of tools that prevent code from failing by making it more resilient.\
    \ Most of these tools are inspired by development good practices (such as retry\
    \ or fallback) or well-known development patterns (such as circuit breaker or\
    \ bulkhead).\n\nFault Tolerance is based on CDI and, more precisely, on the CDI\
    \ interceptor implementation. It also relies on the MicroProfile Config specification\
    \ to allow external configuration for Fault Tolerance policies.\n\nThe main idea\
    \ of the specification is to decouple business logic from Fault Tolerance boilerplate\
    \ code. To achieve that, the specification defines interceptor-binding annotations\
    \ to apply Fault Tolerance policies on a method execution or on a class (in that\
    \ case, all class methods have the same policy).\n\nPolicies included in the Fault\
    \ Tolerance specification are the following:\n\n- **Timeout**: This is applied\
    \ with the `@Timeout` annotation. It adds a timeout to the current operation.\n\
    - **Retry**: This is applied with the `@Retry` annotation. It adds retry behavior\
    \ and allows its configuration on the current operation.\n- **Fallback**: This\
    \ is applied with the `@Fallback` annotation. It defines the code to execute,\
    \ should the current operation fail.\n- **Bulkhead**: This is applied with the\
    \ `@Bulkhead` annotation. It isolates failures in the current operation to preserve\
    \ the execution of other operations.\n- **Circuit Breaker**: This is applied with\
    \ the `@CircuitBreaker` annotation. It provides an automatic fast failing execution\
    \ to prevent overloading the system.\n- **Asynchronous**: This is applied with\
    \ the `@Asynchronous` annotation. It makes the current operation asynchronous\
    \ (that is, code will be invoked asynchronously).\n\nApplying one or more of these\
    \ policies is as easy as adding the required annotations on the method (or the\
    \ class) for which you'd like to have these policies enabled. So, using Fault\
    \ Tolerance is rather simple. But this simplicity doesn't prevent flexibility,\
    \ thanks to all of the configuration parameters available for each policy.\n\n\
    Right now, the following vendors provide an implementation for the Fault Tolerance\
    \ specification:\n\n- Red Hat in Thorntail and Quarkus\n- IBM in Open Liberty\n\
    - Payara in Payara Server\n- Apache Safeguard for Hammock and TomEE\n- KumuluzEE\
    \ for KumuluzEE framework\n\nAll of these implementations support Fault Tolerance\
    \ and hence support the same set of features that are described in the next section.\n\
    \n# MicroProfile Fault Tolerance in action\n\nAs we just discussed, the Fault\
    \ Tolerance specification provides a set of annotations that you have to apply\
    \ on a class or method to enforce Fault Tolerance policies. That being said, you\
    \ have to keep in mind that these annotations are interceptors binding and hence\
    \ are only usable on CDI beans. So, be careful to define your class as CDI beans\
    \ before applying Fault Tolerance annotations on them or their methods.\n\nIn\
    \ the following sections, you'll find usage examples for each Fault Tolerance\
    \ annotation.\n\n# The @Asynchronous policy\n\nMaking an operation asynchronous\
    \ is as simple as the following:\n\n```\n@Asynchronous\npublic Future<Connection>\
    \ service() throws InterruptedException {\n  Connection conn = new Connection()\
    \ {\n    {\n      Thread.sleep(1000);\n    }\n\n    @Override\n    public String\
    \ getData() {\n      return \"service DATA\";\n    }\n };\n return CompletableFuture.completedFuture(conn);\n\
    }\n```\n\nThe only constraint is to have the `@Asynchronous` method return `Future`\
    \ or `CompletionStage`; otherwise, the implementation should throw an exception.\n\
    \n# The @Retry policy\n\nShould the operation fail, you can apply the retry policy\
    \ to have the operation invoked again. The `@Retry` annotation can be used on\
    \ a class or method level like this:\n\n```\n@Retry(maxRetries = 5, maxDuration=\
    \ 1000, retryOn = {IOException.class})\npublic void operationToRetry() {\n  ...\n\
    }\n```\n\nIn the previous example, the operation should be retried a maximum of\
    \ five times only on `IOException`. If the total duration of all retries lasts\
    \ more than 1,000 ms, the operation will be aborted.\n\n# The @Fallback policy\n\
    \nThe `@Fallback` annotation can only be applied on a method; annotating a class\
    \ will give an unexpected result:\n\n```\n@Retry(maxRetries = 2)\n@Fallback(StringFallbackHandler.class)\n\
    public String shouldFallback() {\n  ...\n}\n```\n\nThe fallback method is called\
    \ after the number of retries is reached. In the previous example, the method\
    \ will be retried twice in case of an error, and then the fallback will be used\
    \ to invoke another piece of code—in this case, the following `StringFallbackHandler`\
    \ class:\n\n```\nimport javax.enterprise.context.ApplicationScoped;\n\nimport\
    \ org.eclipse.microprofile.config.inject.ConfigProperty;\nimport org.eclipse.microprofile.faulttolerance.ExecutionContext;\n\
    import org.eclipse.microprofile.faulttolerance.FallbackHandler;\n\n@ApplicationScoped\n\
    public class StringFallbackHandler implements FallbackHandler<String> {\n    @ConfigProperty(name=\"\
    app1.requestFallbackReply\", defaultValue = \"Unconfigured Default Reply\")\n\
    \    private String replyString;\n\n    @Override\n    public String handle(ExecutionContext\
    \ ec) {\n        return replyString;\n    }\n}\n```\n\nFallback code can be defined\
    \ by a class implementing the `FallbackHandler` interface (see the previous code)\
    \ or by a method in the current bean. In the `StringFallbackHandler` code, a MicroProfile\
    \ Config property named `app1.requestFallbackReply` is used to externalize the\
    \ application's fallback string value.\n\n# The @Timeout policy\n\nThe `@Timeout`\
    \ annotation could be applied to a class or method to make sure that an operation\
    \ doesn't last forever:\n\n```\n@Timeout(200)\npublic void operationCouldTimeout()\
    \ {\n  ...\n}\n```\n\nIn the preceding example, the operation will be stopped\
    \ should it last more than 200 ms.\n\n# The @CircuitBreaker policy\n\nThe `@CircuitBreaker`\
    \ annotation can be applied to a class or method. The circuit breaker pattern\
    \ was introduced by Martin Fowler to protect the execution of an operation by\
    \ making it fail fast in case of a dysfunction:\n\n```\n@CircuitBreaker(requestVolumeThreshold\
    \ = 4, failureRatio=0.75, delay = 1000)\npublic void operationCouldBeShortCircuited(){\n\
    \  ...\n}\n```\n\nIn the previous example, the method applies the `CircuitBreaker`\
    \ policy. The circuit will be opened if three (*4 x 0.75*) failures occur among\
    \ the rolling window of four consecutive invocations. The circuit will stay open\
    \ for 1,000 ms and then be back to half-open. After a successful invocation, the\
    \ circuit will be back to closed again.\n\n# The @Bulkhead policy\n\nThe `@Bulkhead`\
    \ annotation can also be applied to a class or method to enforce the bulkhead\
    \ policy. This pattern isolates failures in the current operation to preserve\
    \ the execution of other operations. The implementation does this by limiting\
    \ the number of concurrent invocations on a given method:\n\n```\n@Bulkhead(4)\n\
    public void bulkheadedOperation() {\n  ...\n}\n```\n\nIn the previous code, this\
    \ method only supports four invocations at the same time. Should more than four\
    \ simultaneous requests come into the `bulkheadedOperation` method, the system\
    \ will hold the fifth and later requests until one of the four active invocations\
    \ completes. The bulkhead annotation can also be used with `@Asynchronous` to\
    \ limit the thread number in an asynchronous ..."
