- fmt: "# Section 1: MicroProfile in the Digital Economy\n\nIn this section, you will\
    \ learn why microservices are important in the digital economy and how MicroProfile\
    \ addresses the need for enterprise Java microservices. In addition, you will\
    \ also learn about the sub-projects that currently make up MicroProfile, its value\
    \ proposition to organizations and developers, and its current processes and governance\
    \ (that is, how things get done).\n\nThis section contains the following chapters:\n\
    \n- [Chapter 1](#96308ec7-7393-41b7-a17c-43c15d409f40.xhtml), *Introduction to\
    \ Eclipse MicroProfile*\n- [Chapter 2](#0f9d569f-1ffb-4662-8cea-c8b230a4d627.xhtml),\
    \ *Governance and Contributions*\n\n## Introduction to Eclipse MicroProfile\n\n\
    Eclipse MicroProfile is a set of specifications for microservices written in the\
    \ Java language. It is a project that is community-driven with many implementations\
    \ in the market. The project, first announced in June 2016, continues to develop\
    \ a set of common **Application Programming Interfaces** (**APIs**) for implementing\
    \ Java microservices suitable for modern application development techniques, architectures,\
    \ and environments. In this chapter, you will learn about the origin and importance\
    \ of Eclipse MicroProfile.\n\nThe following topics will be covered in this chapter:\n\
    \n- Enterprise Java microservices\n- Forces that fuel the digital economy and\
    \ the need for multi-speed IT\n- Introducing Eclipse MicroProfile\n- MicroProfile\
    \ ...\n\n### Enterprise Java microservices\n\nApplication development no longer\
    \ consists of using a single high-level programming language that runs on your\
    \ favorite operating system. Nowadays, there are a myriad of languages, specifications,\
    \ frameworks, proprietary and open source software and tools, underlying deployment\
    \ infrastructures, and development methodologies that programmers need to learn\
    \ to develop modern applications. Development at IT organizations has become polyglot,\
    \ that is, multiple programming languages are used depending on the needs of specific\
    \ projects. In this age of the cloud, containers, microservices, reactive programming,\
    \ 12-factor applications, serverless, MINI services, polyglot environments, and\
    \ so on, developers now have the option to choose the right tool for their task,\
    \ making them more effective and productive.\n\nWith the recent move of Java EE\
    \ to the Eclipse Foundation under the new name of Jakarta EE, MicroProfile will\
    \ play a very important role in the future of Enterprise Java because of its synergy\
    \ with Jakarta EE and the potential ways it can influence it.\n\nThe advent of\
    \ the cloud and mobile, along with the acceleration of open and the **Internet\
    \ of Things** (**IoT**) have brought about the digital economy. While this has\
    \ opened up new markets, it has also imposed new demands on businesses and their\
    \ IT organizations, which are now required to not only support and maintain traditional\
    \ workloads but also deliver new applications at a faster pace.\n\nMany technologies,\
    \ languages, architectures, and frameworks have become popular within organizations\
    \ in an attempt to tackle these new demands. One of these is microservices, specifically,\
    \ Enterprise Java microservices, since Java is still one of the most popular languages\
    \ in IT companies. But what is an Enterprise Java microservice?\n\nAn Enterprise\
    \ Java microservice has the following features:\n\n- It is written using the Java\
    \ language.\n- It can use any Java framework.\n- It can use any Java API.\n- It\
    \ must be enterprise-grade; that is, reliable, available, scalable, secure, robust,\
    \ and performant.\n- It must fulfill the characteristics of microservice architectures\
    \ as listed at [https://martinfowler.com/microservices/](https://martinfowler.com/microservices/),\
    \ which are as follows:\n    - Componentization via services\n    - Organized\
    \ around business capabilities\n    - Products not projects\n    - Smart endpoints\
    \ and dumb pipes\n    - Decentralized governance\n    - Decentralized data management\n\
    \    - Infrastructure automation\n    - Design for failure\n    - Evolutionary\
    \ design\n\n### Forces that fuel the digital economy\n\nThe terms **digital economy**\
    \ and **digital transformation** describe the convergence of four different forces\
    \ that are changing the needs of businesses: mobile, cloud, IoT, and open source:\n\
    \n![](Images/0c47035f-e6df-4c8c-be4d-0c7bb3f2227c.png)\n\nBefore the internet,\
    \ organizations required brick-and-mortar stores or phone lines to conduct their\
    \ businesses. The advent and accessibility of the internet created a **critical\
    \ category-formation time** opportunity for organizations. Businesses started\
    \ to use the internet mainly as a storefront or display in order to drive people\
    \ to their brick-and-mortar stores. It was also used for advertising purposes.\n\
    \nSoon after this, businesses ...\n\n### Multi-speed IT\n\nImplementing and delivering\
    \ applications as fast as possible is not a new requirement. In fact, since the\
    \ invention of the first computer, increasing efficiency has always been in the\
    \ minds of computer scientists. High-level programming languages, encapsulation,\
    \ reusability, inheritance, event-driven design, SOA, microservices, machine learning,\
    \ and AI, are all concepts that address the challenge of doing things faster.\
    \ With each wave of new technology, the gearbox adds a new speed requirement to\
    \ the evolution of how we develop and deliver software. The digital economy has\
    \ added another high-speed gear to the gearbox.\n\nBusinesses need to adapt to\
    \ the new demands of the digital economy. Not only do they have to create, run,\
    \ and support traditional-style applications, but also applications that conform\
    \ to the new demands of the digital economy. They have to support both waterfall\
    \ and DevOps processes, hybrid cloud infrastructures, and SOA and microservice\
    \ architectures.\n\nThis imposes many challenges on IT organizations, whose processes,\
    \ people, and technology have all been geared toward the implementation, delivery,\
    \ and maintenance of traditional-style applications. Many organizations have already\
    \ embarked on, or are starting, their journey of digital transformation, which\
    \ addresses the challenges of the digital economy. This journey includes changes\
    \ in technologies, frameworks, languages, and processes for the development, delivery,\
    \ integration, and maintenance of applications.\n\nWhether you call it bimodal\
    \ IT ([https://www.gartner.com/it-glossary/bimodal](https://www.gartner.com/it-glossary/bimodal))\
    \ or a business technology strategy ([https://go.forrester.com/wp-content/uploads/Forrester-False-Promise-of-Bimodal-IT.pdf](https://go.forrester.com/wp-content/uploads/Forrester-False-Promise-of-Bimodal-IT.pdf)),\
    \ the fact is that IT needs to deliver faster than ever before on the needs of\
    \ the business, for both existing and new applications. This means IT needs to\
    \ also speed up the maintenance and delivery of existing applications while exclusively\
    \ adopting Agile methodologies for new applications. This does not preclude, however,\
    \ the need to still use different development processes, release cycles, and support\
    \ timelines to handle existing applications versus new applications, which is\
    \ effectively the multi-speed nature of IT.\n\n### Introducing Eclipse MicroProfile\n\
    \nJava EE has been an extremely successful platform. The **Java Community Process**\
    \ (**JCP**) has been the steward of over 20 compatible implementations during\
    \ its nearly 20-year history, resulting in a $4 billion industry. However, the\
    \ management of Java EE by Oracle (unintentional or not) of Java EE (unintentional\
    \ or not) stalled innovations, and while other standards have developed, the Java\
    \ community worldwide and CIOs at all major enterprises desired an open standard\
    \ for Java within their enterprise.\n\nIn its early stages, J2EE grew somewhat\
    \ quickly from J2EE 1.2 up to J2EE 1.4, as the platform needed to address the\
    \ immediate requirements of the enterprise. Beginning with Java EE 5 in May 2006,\
    \ the pace began to ..."
