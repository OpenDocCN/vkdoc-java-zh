    \ hybrid and multi-cloud applications so that you can deliver value to your business\
    \ faster.\n\n# Questions\n\n1.  How does `Eclipse MicroProfile` facilitate cloud-native\
    \ application development?\n2.  What are the two complementary concerns of cloud-native\
    \ application development? How does `Eclipse MicroProfile` fit into these concerns?\n\
