    kind: VirtualService\nmetadata:\n  name: fault-injection-service\nspec:\n  hosts:\n\
    \  - myTarget\n  http:\n  - route:\n    - destination:\n      host: myTarget\n\
    \    fault:\n      abort:\n        httpStatus: 404\n        percent: 20\n    \
    \ delay:\n       percent: 50\n       fixedDelay: 200ms\n```\n\nIstio will hear\
    \ for calls to the destination host, `myTarget`, and send a 404 response for 20%\
    \ of the calls instead of the real response code. On top of this, it will delay\
    \ every other response by 200 milliseconds.\n\n# Conclusion\n\nMicroProfile defines\
    \ primitives in the area of fault tolerance that can also be provided by other\
    \ means, such as in a service mesh. If this is the case for you, you have to consider\
    \ which one to activate. Activating both may result in unexpected behavior."
  trans: "\n# 在多云部署中使用 MicroProfile OpenTracing 时面临的挑战\n\n在多云环境中进行分布式追踪可能颇具挑战性。我们希望实现与单一云环境相同的目标，即可视化与请求关联的端到端追踪，该请求会穿越每个云内部及跨云的各项服务，但在处理不同的上下文传播格式以及各云以不同格式存储追踪数据时，可能会遇到复杂情况。\n\
    \n第一个挑战是确保追踪能够跨越不同的云环境持续进行。这之所以成为问题，是因为在撰写本书时，尚未有一种广泛采用或标准化的追踪上下文格式。通常，每个追踪系统使用不同的标头和格式来传播追踪上下文。例如，Zipkin\
    \ 使用 B3 传播，Jaeger 使用 `ber-trace-id` 标头，Amazon X-Ray 使用 `X-Amzn-Trace-Id`，而 Google\
    \ 使用 `X-Cloud-Trace-Context`。因此，如果请求需要在异构追踪系统间进行追踪，那么每次离开或进入不同环境时，都必须转换追踪上下文。这通常可以通过配置一个带有自定义注入器或提取器实现的追踪器来完成。然而，这目前超出了\
    \ MicroProfile OpenTracing 项目的范围。未来，追踪上下文格式可能会在 W3C 追踪上下文项目（[`www.w3.org/TR/trace-context/`](https://www.w3.org/TR/trace-context/)）下实现标准化。\n\
    \n第二个挑战，即使在同构的追踪环境中，也是可视化来自多云环境的追踪数据。这可能成为问题，因为每个云中的追踪数据可能存储在不同的数据库中，或采用不同的格式。这可以通过将数据复制到单一统一存储，或在系统之间按需发送缺失的追踪数据并进行适当的数据格式调整来克服。\n\
    \n接下来，我们将讨论在服务网格（如 Istio）中使用 Eclipse MicroProfile 的挑战。\n\n# 在服务网格中使用 Eclipse MicroProfile\
    \ 时的注意事项\n\n诸如 Istio 或 LinkerD 之类的服务网格，在 Kubernetes 之上的平台层面提供服务，涵盖服务发现、路由和容错等领域。其中一些服务也可以在\
    \ MicroProfile 中找到。当你将 MicroProfile 应用程序部署到这样的服务网格中时，需要考虑是使用 MicroProfile 的版本还是网格的版本。\n\
    \n这里最可能受影响的 MicroProfile 特性是容错，尤其是重试逻辑。\n\n# 重试\n\n容错中的重试功能允许你在首次请求失败时，重试向另一个服务发送请求（更多信息请参见第\
    \ 3 章，*MicroProfile 配置与容错*）。现在，假设你有以下代码：\n\n```\n@Retry (maxRetries = 3)\nvoid\
    \ aMethod() {\n    callBackend();\n}\n```\n\n尽管这告诉 Istio 重试 5 次，但在 `aMethod` 最终以错误结束之前，你可能会得到\
    \ 15 次重试（Istio 会在你的代码中的 3 次重试中，每次重试 5 次，然后才返回错误）。你可以考虑在代码中关闭重试，因为 Istio 中的重试次数可以在运行时动态更改，无需重启\
    \ Pod。\n\n# 回退\n\n另一方面，当所有重试都失败时，Istio 并没有回退策略——它无法让 Istio 调用工作负载的另一个版本。当你用 `@Fallback`\
    \ 注解修饰上述代码时，可以在原始调用失败时执行另一个操作：\n\n```\n@Fallback(fallbackMethod = \"fallbackForA\"\
    )@Retry (maxRetries = 3)string aMethod() {   callBackend();}void String fallbackForA()\
    \ {    return \"A cached string\";}\n```\n\n在这种情况下，一旦 Istio 的重试次数乘以 MicroProfile\
    \ 的重试次数全部用尽，就会调用 `fallbackForA` 回退方法。如果你从前面的示例中移除 `@Retry` 注解，那么当 Istio 的重试用尽时，就会调用回退方法。……\n\
    \n# 服务网格中的故障注入\n\nIstio 允许你相当轻松地向结果中注入故障。这起初听起来适得其反，但却是测试容错处理是否正确的一种非常好的方法。以下\
    \ Istio 的 `VirtualService` 定义了这样的故障注入：\n\n```\napiVersion: networking.istio.io/v1alpha3\n\
    kind: VirtualService\nmetadata:\n  name: fault-injection-service\nspec:\n  hosts:\n\
    \  - myTarget\n  http:\n  - route:\n    - destination:\n      host: myTarget\n\
    \    fault:\n      abort:\n        httpStatus: 404\n        percent: 20\n    \
    \ delay:\n       percent: 50\n       fixedDelay: 200ms\n```\n\nIstio 会监听对目标主机\
    \ `myTarget` 的调用，并对 20% 的调用发送 404 响应，而不是真实的响应码。除此之外，它还会将其他每个响应延迟 200 毫秒。\n\n#\
    \ 结论\n\nMicroProfile 定义了容错领域的基本功能，这些功能也可以通过其他方式提供，例如在服务网格中。如果你遇到这种情况，就必须考虑激活哪一个。同时激活两者可能会导致意外行为。\n"
- fmt: "# Summary\n\nIn this chapter, you have learned how `Eclipse MicroProfile`\
    \ facilitates cloud-native application development, regardless of whether it is\
    \ a hybrid cloud or multi-cloud application. We also discussed the relationship\
    \ between microservices, cloud-native development, and container-native development,\
    \ and how microservices running on containers are an ideal option for cloud-native\
    \ development. You also learned how `Eclipse MicroProfile` relates to the 12-factor\
    \ app, as well as serverless and `FaaS` environments.\n\nWe covered the eight\
    \ steps to guide your journey into cloud-native applications and how `Eclipse\
    \ MicroProfile` can help at each step. In addition, we discussed what you need\
    \ to consider when using `Eclipse MicroProfile` for applications that span across\
    \ clouds, when to run `Eclipse MicroProfile` on bare-metal machines versus VMs\
    \ versus containers, what to consider when running `Eclipse MicroProfile` microservices\
    \ in hybrid cloud applications, the challenges to be aware of when running `Eclipse\
    \ MicroProfile OpenTracing` in a multi-cloud deployment, and finally what to consider\
    \ when using `Eclipse MicroProfile` in a service mesh.\n\nThroughout this book,\
    \ we've covered the origins of `MicroProfile`, a specification for Java microservices,\
    \ and the history behind how it came into being. We introduced the open source\
    \ project, its mission, governance, benefits, how to contribute to it, and the\
    \ life cycle of its sub-projects. We then delved into each of the `MicroProfile`\
    \ APIs/sub-projects that make up the umbrella/platform release, as well as the\
    \ sub-projects outside the umbrella release.\n\nWe also covered the current implementations\
    \ of `MicroProfile` in the market, including `Quarkus`, and showed you how to\
    \ \"quark\" a generated `MicroProfile` project by the `MicroProfile Starter`.\
    \ We discussed the Conference Application, a community sample project that demonstrates\
    \ the interoperability of `MicroProfile` across different vendor implementations.\
    \ We also provided code examples throughout for reference and discussion purposes,\
    \ and also provided a fully working project with source code that implemented\
    \ all the `MicroProfile` APIs that you can freely access, download, compile, and\
    \ reuse in your development efforts and to get jump-started with `MicroProfile`.\
    \ Later, we discussed the reactive functionality offered by `MicroProfile` and\
    \ its future developments, such as sub-projects in the pipeline and in the `MicroProfile`\
    \ sandbox, as well as its likely future relationship with `Jakarta EE`.\n\nLastly,\
    \ we went over how `MicroProfile`-based applications and microservices are a good\
    \ fit for implementing solutions in containers, the cloud, and serverless/`FaaS`\
    \ deployments. Whether you are new to Java microservices or an experienced Java\
