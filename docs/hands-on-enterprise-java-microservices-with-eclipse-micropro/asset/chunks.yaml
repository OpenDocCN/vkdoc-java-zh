  trans: "\n# 健康检查协议与线路格式\n\nMP-HC 规范定义了支持对逻辑上的 `/health` REST 端点发起 HTTP GET 请求的要求，该端点可能返回以下任一状态码来表示端点状态：\n\
    \n*   `200`：端点正常运行且健康。\n*   `500`：端点因未知错误而不健康。\n*   `503`：端点已宕机，无法响应请求。\n\n请注意，许多云环境仅将请求返回码视为成功或失败，因此可能无法区分\
    \ `500` 和 `503` 状态码。\n\n`/health` 请求的负载必须是一个 JSON 对象，该对象需符合下面给出的模式（有关 JSON 模式语法的更多信息，请参见\
    \ [`jsonschema.net/#/`](http://jsonschema.net/#/)）。\n\n以下是 ...\n\n# 健康检查 Java\
    \ API\n\n大部分基础工作由实现 MP-HC 规范的应用程序框架完成。您的任务是，通过微服务使用 MP-HC API 定义的健康检查流程，来决定如何确定存活状态或就绪状态。\n\
    \n为此，您需要实现一个健康检查流程，即通过使用标记了 `Health` 注解的 Bean 来实现一个或多个 `HealthCheck` 接口的实例。\n\n\
    `HealthCheck` 接口在以下代码块中提供：\n\n```\npackage org.eclipse.microprofile.health;\n\n\
    @FunctionalInterface\npublic interface HealthCheck {\n  HealthCheckResponse call();\n\
    }\n```\n\n`Health` 注解的代码在以下代码块中提供：\n\n```\npackage org.eclipse.microprofile.health;\n\
    \nimport javax.inject.Qualifier;\nimport java.lang.annotation.Documented;\nimport\
    \ java.lang.annotation.Retention;\nimport java.lang.annotation.RetentionPolicy;\n\
    \n@Qualifier\n@Documented\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface\
    \ Health {\n}\n```\n\n以下示例展示了一个假设的磁盘空间检查的 `HealthCheck` 实现。请注意，该检查将当前可用空间作为响应数据的一部分包含在内。`HealthCheckResponse`\
    \ 类支持使用构建器接口来填充响应对象。\n\n以下是一个假设的磁盘空间 `HealthCheck` 流程实现：\n\n```\nimport javax.enterprise.context.ApplicationScoped;\n\
    import org.eclipse.microprofile.health.Health;\nimport org.eclipse.microprofile.health.HealthCheck;\n\
    import org.eclipse.microprofile.health.HealthCheckResponse;\n\n@Health\n@ApplicationScoped\n\
    public class CheckDiskspace implements HealthCheck {\n  @Override\n  public HealthCheckResponse\
    \ call() {\n      return HealthCheckResponse.named(\"diskspace\")\n          \
    \    .withData(\"free\", \"780mb\")\n              .up()\n              .build();\n\
    \  }\n}\n```\n\n在此示例中，我们创建了一个名为 `diskspace` 的健康响应，其状态为 `up`，并包含名为 `free`、字符串值为\
    \ `780mb` 的自定义数据。\n\n另一个代表某个服务端点的健康检查示例如下所示。\n\n一个假设的服务 `HealthCheck` 流程实现如下所示：\n\
    \n```\npackage io.packt.hc.rest;\n//ServiceCheck example\n\nimport javax.enterprise.context.ApplicationScoped;\n\
    import org.eclipse.microprofile.health.Health;\nimport org.eclipse.microprofile.health.HealthCheck;\n\
    import org.eclipse.microprofile.health.HealthCheckResponse;\n\n@Health\n@ApplicationScoped\n\
    public class ServiceCheck implements HealthCheck {\n public HealthCheckResponse\
    \ call() {\n return HealthCheckResponse.named(\"service-check\")\n .withData(\"\
    port\", 12345)\n .withData(\"isSecure\", true)\n .withData(\"hostname\", \"service.jboss.com\"\
    )\n .up()\n .build();\n }\n}\n```\n\n在此示例中，我们创建了一个名为 `service-check` 的健康响应，其状态为\
    \ `up`，并包含以下附加数据：\n\n*   一个 `port` 项，整数值为 `12345`\n*   一个 `isSecure` 项，布尔值为 `true`\n\
    *   一个 `hostname` 项，字符串值为 `service.jboss.com`\n\n由 CDI 管理的健康检查会被应用程序运行时自动发现并注册。运行时自动暴露一个\
    \ HTTP 端点 `/health`，云平台通过该端点来探查您的应用程序以确定其状态。您可以通过构建 `Chapter04-healthcheck` 应用程序并运行它来测试这一点。您将看到以下输出：\n\
    \n```\nScotts-iMacPro:hc starksm$ mvn package\n[INFO] Scanning for projects…\n\
    ...\nResolving 144 out of 420 artifacts\n\n[INFO] Repackaging .war: /Users/starksm/Dev/JBoss/Microprofile/PacktBook/Chapter04-metricsandhc/hc/target/health-check.war\n\
    \n[INFO] Repackaged .war: /Users/starksm/Dev/JBoss/Microprofile/PacktBook/Chapter04-metricsandhc/hc/target/health-check.war\n\
    \n[INFO] -----------------------------------------------------------------------\n\
    \n[INFO] BUILD SUCCESS\n\n[INFO] -----------------------------------------------------------------------\n\
    \n[INFO] Total time:  7.660 s\n\n[INFO] Finished at: 2019-04-16T21:55:14-07:00\n\
    \n[INFO] -----------------------------------------------------------------------\n\
    \nScotts-iMacPro:hc starksm$ java -jar target/health-check-thorntail.jar\n\n2019-04-16\
    \ 21:57:03,305 INFO  [org.wildfly.swarm] (main) THORN0013: Installed fraction:\
    \ MicroProfile Fault Tolerance - STABLE          io.thorntail:microprofile-fault-tolerance:2.4.0.Final\n\
    \n…\n\n2019-04-16 21:57:07,449 INFO  [org.jboss.as.server] (main) WFLYSRV0010:\
    \ Deployed \"health-check.war\" (runtime-name : \"health-check.war\")\n\n2019-04-16\
    \ 21:57:07,453 INFO  [org.wildfly.swarm] (main) THORN99999: Thorntail is Ready\n\
    ```\n\n服务器启动后，通过查询健康端点来测试健康检查：\n\n```\nScotts-iMacPro:Microprofile starksm$ curl\
    \ -s http://localhost:8080/health | jq\n{\n \"outcome\": \"UP\",\n \"checks\"\
    : [\n   {\n     \"name\": \"service-check\",\n     \"state\": \"UP\",\n     \"\
    data\": {\n       \"hostname\": \"service.jboss.com\",\n       \"port\": 12345,\n\
    \       \"isSecure\": true\n     }\n   },\n   {\n     \"name\": \"diskspace\"\
    ,\n     \"state\": \"UP\",\n     \"data\": {\n       \"free\": \"780mb\"\n   \
    \  }\n   }\n ]\n}\n```\n\n这表明整体健康状态为 `UP`。整体状态是应用程序中所有健康检查流程的逻辑 `OR` 结果。在此例中，它是我们看到的两个健康检查流程（`diskspace`\
    \ 和 `service-check`）的逻辑 `AND` 结果。\n\n# 与云平台集成\n\n大多数云平台同时支持基于 TCP 和 HTTP 的检查。要将健康检查与您选择的云平台集成，您需要配置云部署，使其指向托管您应用程序的节点上的\
    \ HTTP 入口点 `/health`。\n\n云平台将在 HTTP 入口点上调用 `GET` 查询；所有已注册的检查都将被执行，各个检查的总和决定了最终结果。\n\
    \n通常，云平台会忽略响应负载，仅查看 HTTP 状态码来确定您应用程序的存活状态或就绪状态。成功的结果 `UP` 将映射为 `200`，而 `DOWN`\
    \ 将映射为 `503`。\n"
- fmt: "# Human operators\n\nThe primary use case for the JSON response payload is\
    \ to provide a way for operators to investigate the application state. To support\
    \ this, health checks allow for additional data to be attached to a health check\
    \ response as we have seen in the `CheckDiskspace` and `ServiceCheck` examples.\
    \ Consider the following fragment:\n\n```\n[...]\nreturn HealthCheckResponse\n\
    \           .named(\"memory-check\")\n           .withData(\"free-heap\", \"64mb\"\
    )\n           .up()\n           .build();\n[...]\n```\n\nHere, the additional\
    \ information about `free-heap` is provided and will become part of the response\
    \ payload, as shown in this response fragment. The JSON response fragment showing\
    \ `memory-check` procedure content is as follows:\n\n```\n{\n...\n   \"checks\"\
    : [\n       {\n           \"name\": \"memory-check\",\n           \"state\": \"\
    UP\",\n           \"data\": {\n               \"free-heap\": \"64mb\"\n      \
    \     }\n       }\n   ],\n   \"outcome\": \"UP\"\n}\n```\n\nHere, we see the `memory-check`\
    \ procedure with its `UP` state and additional `free-heap` data item of the string\
    \ type with the value of `64mb`.\n\n**Eclipse resources/GitHub coordinates for\
    \ MP-Health**: The MP-Health project source code can be found at [https://github.com/eclipse/microprofile-health](https://github.com/eclipse/microprofile-health).\n\
    \n# Changes in Health Check response messages\n\nMicroProfile Health Check 3.0\
    \ introduced changes to the message format of health check JSON responses. Specifically,\
    \ the field's `outcome` and `state` have been replaced by the field `status`.\n\
    \nIn addition, the `@Health` qualifier was deprecated in the Health Check 3.0\
    \ release, while the `@Liveness` and `@Readiness` qualifiers were introduced.\
    \ For the two qualifiers, the `/health/live` and `/health/ready` endpoints were\
    \ also introduced to call all the liveliness and readiness procedures, respectively.\
    \ Lastly, for backward compatibility, `/health` endpoint now calls all the procedures\
    \ that have `@Health`, `@Liveness`, or `@Readiness` qualifiers.\n\nIt's time to\
    \ discuss JWT Propagation now.\n\n# Using JSON Web Token Propagation in MicroProfile\n\
    \nA **JSON Web Token** (**JWT**) is a common format for carrying security information\
    \ that is used by many different web-based security protocols. However, there\
    \ is a lack of standardization around exactly what the contents of the JWT are\
    \ and what security algorithms are used with signed JWTs. The **MicroProfile JWT**\
    \ (**MP-JWT**) Propagation project specification looked at the **OpenID Connect**\
    \ (**OIDC**)-based ([http://openid.net/connect/](http://openid.net/connect/))\
    \ JWT ([https://tools.ietf.org/html/rfc7519](https://tools.ietf.org/html/rfc7519))\
    \ specifications and built upon those to define a set of requirements to promote\
    \ interoperability of JWTs for use in MicroProfile-based microservices, along\
    \ with APIs to access information from the JWTs.\n\nFor a description of how OIDC\
    \ and JWT work, including how an application/microservice intercepts bearer tokens,\
    \ please refer to the *Basic Client Implementer's Guide* at [http://openid.net/connect/](http://openid.net/connect/).\n\
    \nIn this section, you will learn about the following:\n\n* The claims and signature\
    \ algorithms from OIDC and JWT specifications that were required for interoperability\n\
    * Using JWTs for **Role-Based Access Control** (**RBAC**) of microservice endpoints\n\
    * How to use the MP-JWT APIs to access a JWT and its claim values\n\n# Recommendations\
    \ for interoperability\n\nThe maximum utility of MP-JWT as a token format depends\
    \ on the agreement between both identity providers and service providers. This\
    \ means identity providers—responsible for issuing tokens—should be able to issue\
    \ tokens using the MP-JWT format in a way that service providers can understand\
    \ to inspect the token and gather information about a subject. The primary goals\
    \ for MP-JWT are as follows:\n\n* It should be usable as an authentication token.\n\
    * It should be usable as an authorization token that contains application-level\
    \ roles indirectly granted via a group's claim.\n* It can support additional standard\
    \ claims described in IANA JWT Assignments ([https://www.iana.org/assignments/jwt/jwt.xhtml](https://www.iana.org/assignments/jwt/jwt.xhtml)),\
    \ as well as non-standard ...\n\n# Required MP-JWT claims\n\nThe required set\
    \ of MP-JWT claims for which an implementation needs to provide support contains\
    \ the following:\n\n* `typ`: This header parameter identifies the token type and\
    \ is required to be `JWT`.\n* `alg`: This header algorithm was used to sign the\
    \ JWT and must be specified as `RS256`.\n* `kid`: This header parameter provides\
    \ a hint about which public key was used to sign the JWT.\n* `iss`: This is the\
    \ issuer and signer of the token.\n* `sub`: This identifies the subject of the\
    \ JWT.\n* `exp`: This identifies the expiration time on, or after, which the JWT\
    \ MUST NOT be accepted for processing.\n* `iat`: This identifies the time at which\
    \ the JWT was issued and can be used to determine the age of the JWT.\n* `jti`:\
    \ This provides a unique identifier for the JWT.\n* `upn`: This MP-JWT custom\
    \ claim is the preferred way to specify a user principal name.\n* `groups`: This\
    \ MP-JWT custom claim is the list of group or role names assigned to the JWT principal.\n\
    \n`NumericDate` used by `exp`, `iat`, and other date-related claims is a JSON\
    \ numeric value representing the number of seconds from `1970-01-01T00:00:00Z`\
    \ UTC until the specified UTC date/time, ignoring leap seconds. Additionally,\
    \ more details about the standard claims may be found in the MP-JWT specification\
    \ ([https://github.com/eclipse/microprofile-jwt-auth/releases/tag/1.1.1](https://github.com/eclipse/microprofile-jwt-auth/releases/tag/1.1.1))\
    \ and the JSON Web Token RFC ([https://tools.ietf.org/html/rfc7519](https://tools.ietf.org/html/rfc7519)).\n\
    \nAn example basic MP-JWT in JSON would be a sample header and payload of an MP-JWT\
    \ compatible JWT, as shown here:\n\n```\n{\n    \"typ\": \"JWT\",\n    \"alg\"\
    : \"RS256\",\n    \"kid\": \"abc-1234567890\"\n}\n{\n    \"iss\": \"https://server.example.com\"\
    ,\n    \"jti\": \"a-123\",\n    \"exp\": 1311281970,\n    \"iat\": 1311280970,\n\
    \    \"sub\": \"24400320\",\n    \"upn\": \"jdoe@server.example.com\",\n    \"\
    groups\": [\"red-group\", \"green-group\", \"admin-group\", \"admin\"],\n}\n{\n\
    *** base64 signature not shown ***\n}\n```\n\nThis example shows the header with\
    \ `typ=JWT`, `alg=RS256`, and `kid=abc-1234567890`. The body includes the `iss`,\
    \ `jti`, `exp`, `iat`, `sub`, `upn`, and `groups` claims.\n\n# The high-level\
    \ description of the MP-JWT API\n\nThe MP-JWT project introduces the following\
    \ API interfaces and classes under the `org.eclipse.microprofile.jwt` package\
    \ namespace:\n\n* `JsonWebToken`: This is a `java.security.Principal` interface\
    \ extension that makes the set of required claims available via get-style accessors,\
    \ along with general access to any claim in the JWT.\n* `Claims`: This is an enumeration\
    \ utility class that encapsulates all of the standard JWT-related claims along\
    \ with a description and the required Java type for the claim as returned from\
    \ the `JsonWebToken#getClaim(String)` method.\n* `Claim`: This is a qualifier\
    \ annotation used to signify an injection point for `ClaimValue`.\n* `ClaimValue<T>`:\
    \ This is a `java.security.Principal` interface extension ...\n\n# Sample code\
    \ that uses MP-JWT\n\nThe basic usage of the MP-JWT API is to inject `JsonWebToken`,\
    \ its `ClaimValue`, or both. In this section, we present snippets of typical usage.\
    \ This book's code for this section is available at [https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation)."
