  trans: "\n# 指标选项卡\n\n指标选项卡显示以下包含三个链接的视图：\n\n![](img/18e4884e-02d6-4796-ac68-4c560d3d8e7e.png)\n\
    \n第一个链接访问 `io.packt.sample.metric.MetricController` 类中的以下端点：\n\n```\n@Path(\"\
    timed\")\n@Timed(name = \"timed-request\")\n@GET\n@Produces(MediaType.TEXT_PLAIN)\n\
    public String timedRequest() {\n    long start = System.currentTimeMillis();\n\
    \    // 演示用途，非生产风格\n    int wait = new Random().nextInt(1000);\n    try {\n  \
    \      Thread.sleep(wait);\n    } catch (InterruptedException e) {\n        //\
    \ 演示用途\n        e.printStackTrace();\n    }\n    long end = System.currentTimeMillis();\n\
    \    long delay = end - start;\n\n    doIncrement();\n    long count = getCustomerCount();\n\
    \    return String.format(\"MetricController#timedRequest, delay[0-1000]=%d, \n\
    \    count=%d\", delay, count);\n}\n```\n\n这使用 `@Timed(name = \"timed-request\"\
    )` 注解来标注 `timed` 路径端点。该方法使用 0-1000 毫秒之间的随机延迟来生成响应时间的分布。下一个链接是直接指向 `timedRequest()`\
    \ 方法应用级指标的链接。MP-Metrics 规范将路径定义为 `metrics/application/io.packt.sample.metric.MetricController.timed-request`。在多次访问第一个链接以生成一系列响应时间后，访问第二个链接来检索\
    \ `timedRequest()` 方法的指标，将显示类似以下内容：\n\n```\n# TYPE application:io_packt_sample_metric_metric_controller_timed_request_rate_per_second\
    \ gauge\napplication:io_packt_sample_metric_metric_controller_timed_request_rate_per_second\
    \ 0.4434851530761856\n# TYPE application:io_packt_sample_metric_metric_controller_timed_request_one_min_rate_per_second\
    \ gauge\napplication:io_packt_sample_metric_metric_controller_timed_request_one_min_rate_per_second\
    \ 0.552026648777594\n...\n# TYPE application:io_packt_sample_metric_metric_controller_timed_request_seconds\
    \ summary\napplication:io_packt_sample_metric_metric_controller_timed_request_seconds_count\
    \ 6.0\napplication:io_packt_sample_metric_metric_controller_timed_request_seconds{quantile=\"\
    0.5\"} 0.923901552\n...\napplication:io_packt_sample_metric_metric_controller_timed_request_seconds{quantile=\"\
    0.999\"} 0.970502841\n```\n\n这是 `@Timed` 风格的指标所生成的信息范围。最后一个链接访问 `metrics` 端点，该端点返回镜像中所有可用的指标。\n\
    \n# OpenTracing 选项卡\n\nOpenTracing 选项卡显示以下包含两个链接的视图：\n\n![](img/fdac27b8-b33b-4f90-aa6f-b0a3d6863ff4.png)\n\
    \n第一个链接访问以下 `io.packt.sample.tracing.TracedEndpoint` 方法：\n\n```\n@GET@Path(\"\
    /randomDelay\")@Produces(MediaType.TEXT_PLAIN)@Traced(operationName = \"TracedEndpoint#demoRandomDelay\"\
    )public String randomDelay() {    long start = System.currentTimeMillis();   \
    \ // 0-5 秒随机休眠    long sleep = Math.round(Math.random() * 5000);    try {    \
    \    Thread.sleep(sleep);    } catch (InterruptedException e) {        e.printStackTrace();\
    \    }    long end = System.currentTimeMillis();    return String.format(\"TracedEndpoint.randomDelay[0-5000],\
    \ elapsed=%d\",     (end - start));}\n```\n\n该方法...\n\n# OpenAPI 选项卡\n\nOpenAPI\
    \ 选项卡视图包含两个链接，如下图所示：\n\n![](img/1313c2c2-2ebb-4ca9-81b5-0a8cbcdf3c96.png)\n\n\
    第一个链接生成一个 OpenAPI 文档，这是一个包含应用程序中所有端点描述的 YAML 文件。该文件可以输入到其他能够消费 OpenAPI 格式的程序或应用程序中。第二个链接是此类应用程序的一个示例，即\
    \ Swagger UI。打开该链接将弹出一个类似于以下内容的新窗口：\n\n![](img/176d8da0-5532-4a16-aac2-fd92224543d4.png)\n\
    \n示例应用程序的此视图中有三个部分。第一部分是通过 OpenAPI 注解在 JAX-RS 应用程序 bean 上指定的信息，如以下代码片段所示：\n\n\
    ```\n@ApplicationPath(\"/demo1\")\n@LoginConfig(authMethod = \"MP-JWT\", realmName\
    \ = \"quarkus-quickstart\")\n@OpenAPIDefinition(\n    info = @Info(\n        title\
    \ = \"Quarkus MicroProfile 2.2 Extensions Demo\",\n        version = \"1.0\",\n\
    \        contact = @Contact(\n            name = \"QUARKUS - COMMUNITY\",\n  \
    \          url = \"https://quarkus.io/community/\",\n            email = \"quarkus-dev+subscribe@googlegroups.com\"\
    ),\n        license = @License(\n            name = \"Apache 2.0\",\n        \
    \    url = \"http://www.apache.org/licenses/LICENSE-2.0.html\")\n    ),\n    servers\
    \ = {\n        @Server(url = \"http://localhost:8080/\", description = \"demo1\
    \ host\"),\n        @Server(url = \"http://localhost:8081/\", description = \"\
    demo2 host\")\n    },\n    externalDocs = @ExternalDocumentation(url=\"http://microprofile.io\"\
    , description = \n    \"Eclipse MicroProfile Homepage\")\n)\npublic class DemoRestApplication\
    \ extends Application {\n...\n```\n\n将此信息与 Swagger UI 中显示的信息进行比较，可以看到 `@OpenAPIDefinition`\
    \ 注解中的所有信息都已整合到 UI 的顶部区域。Swagger UI 中带有 `time` 和 `default` 子标题的下一个部分对应于从应用程序 REST\
    \ 端点获取的操作信息。`default` 部分对应于未包含任何 OpenAPI 规范注解的端点。存在一种默认行为，即为应用程序中找到的任何 JAX-RS\
    \ 端点创建 OpenAPI 端点定义。\n\n`time` 部分对应于以下 `io.packt.sample.restclient.TimeService`\
    \ 端点代码片段，该代码片段包含了 `@Tag`、`@ExternalDocumentation` 和 `@Operation` 这些 MP-OpenAPI\
    \ 注解：\n\n```\n@GET\n@Path(\"/now\")\n@Produces(MediaType.APPLICATION_JSON)\n@Tag(name\
    \ = \"time\", description = \"time service methods\")\n@ExternalDocumentation(description\
    \ = \"Basic World Clock API Home.\",\n    url = \"http://worldclockapi.com/\"\
    )\n@Operation(summary = \"Queries the WorldClockApi using the MP-RestClient\"\
    ,\n    description = \"Uses the WorldClockApi type proxy injected by the \n  \
    \  MP-RestClient to access the worldclockapi.com service\")\npublic Now utc()\
    \ {\n    return clockApi.utc();\n}\n```\n\n如果你展开 time 部分下的第一个操作，你将获得如下视图：\n\n\
    ![](img/6b5ab70d-40c6-4a23-9cd7-6fbee406239b.png)\n\n你可以看到 `@Tag` 定义了 time 部分及其描述，而\
    \ `@Operation` 注解则扩充了操作摘要和描述部分。这展示了如何使用 MP-OAPI 注解和像 Swagger UI 这样支持 OpenAPI 的应用程序，为你的端点消费者提供更多信息。\n\
    \n# KeyCloak 选项卡\n\n接下来我们将跳到 KeyCloak 选项卡，因为 RestClient 和 JWT 选项卡包含需要 JWT 才能访问端点的安全调用。当你第一次访问\
    \ KeyCloak 选项卡时，它应该看起来像下面这样：\n\n![](img/75d20658-d086-43be-8eef-324fcae0bea6.png)\n\
    \n它不会显示任何令牌信息，并且刷新复选框正下方的状态行应指示（未认证）。点击绿色的登录按钮，将弹出以下登录界面：\n\n![](img/fc49cde6-aa33-4c09-8c30-6beca3e6a967.png)\n\
    \n在用户名和密码字段中分别输入以下内容：\n\n*   `packt-mp-book`\n*   `password`\n\n这...\n"
- fmt: "# The JWT tab\n\nAfter clicking on the JWT tab, you should see a view similar\
    \ to the following with two endpoint links:\n\n![](Images/d7875e8b-4474-48c4-b850-279881c58802.png)\n\
    \nThe first link makes a request to an unsecured endpoint that will print the\
    \ name from the JWT along with the `upn` claim if it exists.\n\nHowever, since\
    \ the web frontend is not providing a JWT for this request, the following will\
    \ be displayed in the output section:\n\n```\nHello[open] user=anonymous, upn=no-upn\n\
    ```\n\nClicking on the second link accesses a secured version of the endpoint\
    \ that has this code fragment:\n\n```\npublic class JwtEndpoint {\n    @Inject\n\
    \    private JsonWebToken jwt;\n    @Inject\n    @Claim(standard = Claims.raw_token)\n\
    \    private ClaimValue<String> jwtString;\n    @Inject\n    @Claim(standard =\
    \ Claims.upn)\n    private ClaimValue<String> upn;\n    @Context\n    private\
    \ SecurityContext context;\n...\n    @GET\n    @Path(\"/secureHello\")\n    @Produces(MediaType.TEXT_PLAIN)\n\
    \    @RolesAllowed(\"user\") // 1\n    public String secureHello() {\n       \
    \ String user = jwt == null ? \"anonymous\" : jwt.getName(); // 2\n        String\
    \ scheme = context.getAuthenticationScheme(); // 3\n        boolean isUserInRole\
    \ = context.isUserInRole(\"PacktMPUser\"); // 4\n        return String.format(\"\
    Hello[secure] user=%s, upn=%s, scheme=%s, \n        isUserInRole(PacktMPUser)=%s\"\
    , user, upn.getValue(), \n        scheme, isUserInRole);\n    }\n```\n\nLet's\
    \ discuss the important lines:\n\n1.  The `@RolesAllowed(\"user\")` annotation\
    \ indicates that the endpoint is secured and that the caller needs the `user`\
    \ role. The JWT `groups` claim we saw earlier had this role.\n2.  The user is\
    \ taken from the JWT via the `getName()` method. As explained in the MP-JWT chapter,\
    \ this maps to the `upn` claim in the JWT.\n3.  The current security authentication\
    \ scheme is obtained from the injected `SecurityContext`.\n4.  A programmatic\
    \ security check of whether the caller has the `PacktMPUser` role is made. The\
    \ check will return true as the JWT `groups` claim we saw earlier had this role.\n\
    \nThis information is combined into a string that is the return value of the `secureHello`\
    \ method. Clicking on the `demo1/jwt/secureHello` link button produces the following\
    \ output string in the response area:\n\n```\nHello[secure] user=packt-mp-book,\
    \ upn=packt-mp-book, scheme=MP-JWT, isUserInRole(PacktMPUser)=true\n```\n\nBy\
    \ using the combination of `@RolesAllowed` annotations and integration with the\
    \ MP-JWT feature, we can see how we can both secure access to our microservice\
    \ endpoints as well as introduce application behaviors based on content in the\
    \ authenticated JWT. Next, let's return to the RestClient tab.\n\n# The RestClient\
    \ tab\n\nThe RestClient tab contains three links, as shown in this view:\n\n![](Images/994277da-2795-4b3f-99c0-783f2ae4b6f6.png)\n\
    \nThe links correspond to endpoints that make use of an external world clock public\
    \ endpoint that returns information about the current time when accessed. The\
    \ following MP-RC interface has been created to encapsulate the external endpoint:\n\
    \n```\n@RegisterRestClient(baseUri = WorldClockApi.BASE_URL)public interface WorldClockApi\
    \ {    static final String BASE_URL = \"http://worldclockapi.com/api/json\"; \
    \   @GET    @Path(\"/utc/now\")    @Produces(MediaType.APPLICATION_JSON)    Now\
    \ utc();    @GET    @Path(\"{tz}/now\")    @Produces(MediaType.APPLICATION_JSON)\
    \    Now tz(@PathParam(\"tz\") String tz);}\n```\n\n# Summary\n\nThis chapter\
    \ has walked us through a sample service mesh composed of a web application, two\
    \ microservice images using MP features in a new Quarkus implementation, an external\
    \ web service, and two Docker-based services. This showed the interplay between\
    \ the various MP features and external services you will find in cloud environments,\
    \ along with integration with web services external to the local mesh environment.\
    \ This should give you a feeling of the steps involved when composing microservices\
    \ using the MicroProfile APIs and implementations.\n\nIn the next chapter, we\
    \ will take a look at MicroProfile specifications that are under development to\
    \ have an idea of what directions are being explored. While these specifications\
    \ are currently outside of the MicroProfile core feature set, they are candidates\
    \ for future inclusion, and looking at them will give us an idea of where MicroProfile\
    \ may be headed.\n\n# Questions\n\n1.  Do the MP-Config settings affect application\
    \ code, MP feature code, or both?\n2.  Were you able to update `health.pathToMonitor`\
    \ to a valid path and see an updated health status reply?\n3.  What does the `Svcs2`\
    \ health status link (`http://localhost:8082/health`) on the Health tab show as\
    \ its output? If you stop the KeyCloak Docker image and click on the link again,\
    \ does the output change?\n4.  What happens if you select the `MetricController.timed-request`\
    \ link (`http://localhost:8080/metrics/application/io.packt.sample.metric.MetricController.timed-request`)\
    \ in the Metrics tab without first hitting the `Timed` endpoint link (`http://localhost:8080/demo1/metric/timed`)\
    \ at least once?\n5.  Go to the RestClient tab and hit the link, making sure you\
    \ have a valid ...\n\n# Further reading\n\nGoing over the code, trying changes,\
    \ and then interacting with the updated code is a good way to understand more\
    \ of the details behind the sample services. The Quarkus MicroProfile implementation\
    \ supports live reload features that allow you to make changes without having\
    \ to rebuild. For more information on this topic, see Maven Tooling ([https://quarkus.io/guides/maven-tooling.html](https://quarkus.io/guides/maven-tooling.html))\
    \ on the Quarkus site.\n\n# Section 5: A Peek into the Future\n\nThis section\
    \ covers existing projects that are outside the umbrella, such as candidate APIs,\
    \ and discusses how MicroProfile fits into multi-cloud environments.\n\nThis section\
    \ contains the following chapters:\n\n*   [Chapter 9](#2bf742ea-ed02-4f2b-8e91-f7ae4c200e6f.xhtml),\
    \ *Reactive Programming and Future Developments*\n*   [Chapter 10](#6641f316-51af-43d0-9649-78888dad5f90.xhtml),\
    \ *MicroProfile in Multi-Cloud Environments*\n\n# Reactive Programming and Future\
    \ Developments\n\nEvent-driven architectures have been around for a long time,\
    \ and asynchronous method invocations, message-driven beans, event control logic,\
    \ and so on are constructs that developers are familiar with. However, with the\
    \ popularity and adoption of cloud resources and on-demand scalability, organizations\
    \ have a renewed interest in reactive programming approaches that can exploit\
    \ serverless and function as service-type environments. Eclipse MicroProfile also\
    \ includes specifications related to reactive programming in projects that currently\
    \ live outside the Eclipse MicroProfile umbrella/platform release.\n\nIn addition\
    \ to these, there are also projects in the Eclipse MicroProfile sandbox that the\
    \ community is currently discussing, implementing, and evaluating to decide whether\
    \ or not they should be promoted to official MicroProfile projects. This chapter\
    \ will help you learn about the current MicroProfile specifications related to\
    \ reactive programming as well as give you a glimpse into what is already in motion\
    \ and what is upcoming in relation to the projects that sit outside the umbrella/platform\
    \ release and in the MicroProfile sandbox. The following topics will be covered\
    \ in this chapter:\n\n*   An overview of what reactive messaging is\n*   An explanation\
    \ of the reactive messaging architecture within Eclipse MicroProfile\n*   A description\
    \ of the Eclipse MicroProfile specifications related to reactive programming\n\
    *   Examples of how to use the reactive message specification of Eclipse MicroProfile\n\
    *   An overview of MicroProfile projects/specifications that sit outside the umbrella\
    \ or platform release\n*   A description of projects that sit within the Eclipse\
    \ MicroProfile sandbox\n*   An insight into the current relationship between Eclipse\
    \ MicroProfile and Jakarta EE and an analysis of their possible futures"
