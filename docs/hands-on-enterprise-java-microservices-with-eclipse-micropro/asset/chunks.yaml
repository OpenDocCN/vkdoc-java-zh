  trans: "\n# 人工操作员\n\nJSON 响应负载的主要用途是为操作员提供一种检查应用程序状态的方式。为此，健康检查允许将附加数据附加到健康检查响应中，正如我们在\
    \ `CheckDiskspace` 和 `ServiceCheck` 示例中所见。请考虑以下片段：\n\n```\n[...]\nreturn HealthCheckResponse\n\
    \           .named(\"memory-check\")\n           .withData(\"free-heap\", \"64mb\"\
    )\n           .up()\n           .build();\n[...]\n```\n\n此处提供了关于 `free-heap` 的附加信息，并将成为响应负载的一部分，如下面的响应片段所示。显示\
    \ `memory-check` 过程内容的 JSON 响应片段如下：\n\n```\n{\n...\n   \"checks\": [\n       {\n\
    \           \"name\": \"memory-check\",\n           \"state\": \"UP\",\n     \
    \      \"data\": {\n               \"free-heap\": \"64mb\"\n           }\n   \
    \    }\n   ],\n   \"outcome\": \"UP\"\n}\n```\n\n在这里，我们看到了 `memory-check` 过程，其状态为\
    \ `UP`，以及一个值为 `64mb` 的字符串类型附加数据项 `free-heap`。\n\n**MP-Health 的 Eclipse 资源/GitHub\
    \ 坐标**：\nMP-Health 项目的源代码可以在 [`github.com/eclipse/microprofile-health`](https://github.com/eclipse/microprofile-health)\
    \ 找到。\n\n# 健康检查响应消息的变更\n\nMicroProfile Health Check 3.0 引入了对健康检查 JSON 响应消息格式的更改。具体来说，字段\
    \ `outcome` 和 `state` 已被字段 `status` 取代。\n\n此外，`@Health` 限定符在 Health Check 3.0\
    \ 版本中已被弃用，同时引入了 `@Liveness` 和 `@Readiness` 限定符。对于这两个限定符，还引入了 `/health/live` 和\
    \ `/health/ready` 端点，分别用于调用所有存活性和就绪性过程。最后，为了向后兼容，`/health` 端点现在会调用所有带有 `@Health`、`@Liveness`\
    \ 或 `@Readiness` 限定符的过程。\n\n现在是时候讨论 JWT 传播了。\n\n# 在 MicroProfile 中使用 JSON Web\
    \ Token 传播\n\n**JSON Web Token**（**JWT**）是一种承载安全信息的通用格式，被许多不同的基于 Web 的安全协议所使用。然而，关于\
    \ JWT 的具体内容以及签名 JWT 所使用的安全算法，缺乏标准化。**MicroProfile JWT**（**MP-JWT**）传播项目规范研究了基于\
    \ **OpenID Connect**（**OIDC**）的 JWT 规范（[`openid.net/connect/`](http://openid.net/connect/)）（[`tools.ietf.org/html/rfc7519`](https://tools.ietf.org/html/rfc7519)），并在此基础上定义了一套需求，以促进\
    \ JWT 在基于 MicroProfile 的微服务中的互操作性，同时提供了从 JWT 访问信息的 API。\n\n关于 OIDC 和 JWT 如何工作，包括应用程序/微服务如何拦截\
    \ bearer 令牌的描述，请参考 [`openid.net/connect/`](http://openid.net/connect/) 上的 *Basic\
    \ Client Implementer's Guide*。\n\n在本节中，您将了解以下内容：\n\n*   OIDC 和 JWT 规范中为实现互操作性所需的声明和签名算法\n\
    *   使用 JWT 对微服务端点进行**基于角色的访问控制**（**RBAC**）\n*   如何使用 MP-JWT API 访问 JWT 及其声明值\n\
    \n# 互操作性建议\n\nMP-JWT 作为令牌格式的最大效用取决于身份提供商和服务提供商之间的协议。这意味着负责颁发令牌的身份提供商应能够使用 MP-JWT\
    \ 格式颁发令牌，以便服务提供商能够理解并检查令牌，从而收集关于主体的信息。MP-JWT 的主要目标如下：\n\n*   它应可用作身份验证令牌。\n* \
    \  它应可用作授权令牌，其中包含通过组声明间接授予的应用程序级角色。\n*   它可以支持 IANA JWT 分配（[`www.iana.org/assignments/jwt/jwt.xhtml`](https://www.iana.org/assignments/jwt/jwt.xhtml)）中描述的其他标准声明，以及非标准声明...\n\
    \n# 必需的 MP-JWT 声明\n\n实现需要支持的必需 MP-JWT 声明集包括以下内容：\n\n*   `typ`：此头部参数标识令牌类型，必须为\
    \ `JWT`。\n*   `alg`：此头部算法用于签名 JWT，必须指定为 `RS256`。\n*   `kid`：此头部参数提示用于签名 JWT 的公钥。\n\
    *   `iss`：令牌的颁发者和签名者。\n*   `sub`：标识 JWT 的主体。\n*   `exp`：标识过期时间，在此时间或之后，JWT 不得被接受处理。\n\
    *   `iat`：标识 JWT 的颁发时间，可用于确定 JWT 的时效。\n*   `jti`：为 JWT 提供唯一标识符。\n*   `upn`：此 MP-JWT\
    \ 自定义声明是指定用户主体名称的首选方式。\n*   `groups`：此 MP-JWT 自定义声明是分配给 JWT 主体的组或角色名称列表。\n\n`exp`、`iat`\
    \ 和其他与日期相关的声明所使用的 `NumericDate` 是一个 JSON 数值，表示从 `1970-01-01T00:00:00Z` UTC 到指定\
    \ UTC 日期/时间的秒数，忽略闰秒。此外，关于标准声明的更多详细信息可以在 MP-JWT 规范（[`github.com/eclipse/microprofile-jwt-auth/releases/tag/1.1.1`](https://github.com/eclipse/microprofile-jwt-auth/releases/tag/1.1.1)）和\
    \ JSON Web Token RFC（[`tools.ietf.org/html/rfc7519`](https://tools.ietf.org/html/rfc7519)）中找到。\n\
    \n一个 JSON 格式的基本 MP-JWT 示例，即 MP-JWT 兼容 JWT 的示例头部和负载，如下所示：\n\n```\n{\n    \"typ\"\
    : \"JWT\",\n    \"alg\": \"RS256\",\n    \"kid\": \"abc-1234567890\"\n}\n{\n \
    \   \"iss\": \"https://server.example.com\",\n    \"jti\": \"a-123\",\n    \"\
    exp\": 1311281970,\n    \"iat\": 1311280970,\n    \"sub\": \"24400320\",\n   \
    \ \"upn\": \"jdoe@server.example.com\",\n    \"groups\": [\"red-group\", \"green-group\"\
    , \"admin-group\", \"admin\"],\n}\n{\n*** base64 signature not shown ***\n}\n\
    ```\n\n此示例显示了头部，其中包含 `typ=JWT`、`alg=RS256` 和 `kid=abc-1234567890`。主体包含 `iss`、`jti`、`exp`、`iat`、`sub`、`upn`\
    \ 和 `groups` 声明。\n\n# MP-JWT API 的高级描述\n\nMP-JWT 项目在 `org.eclipse.microprofile.jwt`\
    \ 包命名空间下引入了以下 API 接口和类：\n\n*   `JsonWebToken`：这是一个 `java.security.Principal` 接口扩展，通过\
    \ get 风格的访问器提供对必需声明集的访问，以及对 JWT 中任何声明的通用访问。\n*   `Claims`：这是一个枚举工具类，封装了所有标准的 JWT\
    \ 相关声明，以及从 `JsonWebToken#getClaim(String)` 方法返回的声明的描述和所需的 Java 类型。\n*   `Claim`：这是一个限定符注解，用于表示\
    \ `ClaimValue` 的注入点。\n*   `ClaimValue<T>`：这是一个 `java.security.Principal` 接口扩展...\n\
    \n# 使用 MP-JWT 的示例代码\n\nMP-JWT API 的基本用法是注入 `JsonWebToken`、其 `ClaimValue`，或两者都注入。在本节中，我们展示典型用法的代码片段。本书本节的相关代码可在\
    \ [`github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation`](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation)\
    \ 找到。\n"
- fmt: "# Injection of JsonWebToken information\n\nThe following code sample illustrates\
    \ access of the incoming MP-JWT token as `JsonWebToken`, the raw JWT token string,\
    \ the `upn` claim, and integration with JAX-RS `SecurityContext`:\n\n```\npackage\
    \ io.pckt.jwt.rest;\n\nimport javax.annotation.security.DenyAll;\nimport javax.annotation.security.PermitAll;\n\
    import javax.annotation.security.RolesAllowed;\nimport javax.inject.Inject;\n\
    import javax.ws.rs.GET;\nimport javax.ws.rs.Path;\nimport javax.ws.rs.Produces;\n\
    import javax.ws.rs.core.Context;\nimport javax.ws.rs.core.MediaType;\nimport javax.ws.rs.core.SecurityContext;\n\
    \nimport org.eclipse.microprofile.jwt.Claim;\nimport org.eclipse.microprofile.jwt.Claims;\n\
    import org.eclipse.microprofile.jwt.JsonWebToken;\n\n@Path(\"/jwt\")\n@DenyAll\
    \ //1\npublic class ...\n```\n\n# Injection of JWT claim values\n\nThe code snippet\
    \ in this section illustrates the injection of individual JWT claim values. There\
    \ are several different formats we can use for the injected value. Standard claims\
    \ support the object subtypes defined in the `Claim#getType` field and `JsonValue`\
    \ subtypes. Custom claim types only support the injection of the `JsonValue` subtypes.\n\
    \nThe following code example illustrates injection of the standard `groups` and\
    \ `iss` claims, along with `customString`, `customInteger`, `customDouble`, and\
    \ `customObject` custom claims:\n\n```\npackage io.pckt.jwt.rest;\n\nimport java.util.Set;\n\
    import javax.annotation.security.DenyAll;\nimport javax.annotation.security.RolesAllowed;\n\
    import javax.inject.Inject;\nimport javax.json.JsonArray;\nimport javax.json.JsonNumber;\n\
    import javax.json.JsonObject;\nimport javax.json.JsonString;\nimport javax.ws.rs.GET;\n\
    import javax.ws.rs.Path;\n\nimport org.eclipse.microprofile.jwt.Claim;\nimport\
    \ org.eclipse.microprofile.jwt.Claims;\n\n@Path(\"/jwt\")\n@DenyAll\npublic class\
    \ InjectionExampleEndpoint {\n    @Inject\n    @Claim(standard = Claims.groups)\n\
    \    Set<String> rolesSet; // 1\n    @Inject\n    @Claim(standard = Claims.iss)\n\
    \    String issuer; // 2\n\n    @Inject\n    @Claim(standard = Claims.groups)\n\
    \    JsonArray rolesAsJson; // 3\n    @Inject\n    @Claim(standard = Claims.iss)\n\
    \    JsonString issuerAsJson; // 4\n    // Custom claims as JsonValue types\n\
    \    @Inject\n    @Claim(\"customString\")\n    JsonString customString; // 5\n\
    \    @Inject\n    @Claim(\"customInteger\")\n    JsonNumber customInteger; //\
    \ 6\n    @Inject\n    @Claim(\"customDouble\")\n    JsonNumber customDouble; //\
    \ 7\n    @Inject\n    @Claim(\"customObject\")\n    JsonObject customObject; //\
    \ 8\n\n    @GET\n    @Path(\"/printClaims\")\n    @RolesAllowed(\"Tester\")\n\
    \    public String printClaims() {\n        return String.format(\"rolesSet=%s\\\
    n\");\n    }\n}\n```\n\nThe eight commented injections are as follows:\n\n1. \
    \ Injection of the standard `groups` claim as its default `Set<String>` type\n\
    2.  Injection of the standard `iss` claim as its default `String` type\n3.  Injection\
    \ of the standard `groups` claim as its default `JsonArray` type\n4.  Injection\
    \ of the standard `iss` claim as its default `JsonString` type\n5.  Injection\
    \ of a non-standard `customString` claim as a `JsonString` type\n6.  Injection\
    \ of a non-standard `customInteger` claim as a `JsonNumber` type\n7.  Injection\
    \ of a non-standard `customDouble` claim as a `JsonNumber` type\n8.  Injection\
    \ of a non-standard `customObject` claim as a `JsonString` type\n\n# Configuring\
    \ authentication of JWTs\n\nTo accept a JWT as representing an identity that should\
    \ be authenticated and therefore trusted, we need to configure the MP-JWT feature\
    \ with the information to verify who signed and who issued the JWT. This is done\
    \ via MP-Config properties:\n\n*   `mp.jwt.verify.publickey`: This provides the\
    \ embedded key material of the public key for the MP-JWT signer, typically in\
    \ PKCS8 PEM format.\n*   `mp.jwt.verify.issuer`: This specifies the expected value\
    \ of the `iss` claim found in the JWT.\n\nAn example `microprofile-configuration.properties`\
    \ file for this book is as follows:\n\n```\n# MP-JWT Config\nmp.jwt.verify.\
    \ ...\n```"
