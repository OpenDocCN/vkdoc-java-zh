    \n# 总结\n\n在本章中，我们了解了 Eclipse MicroProfile 项目的轻量级治理流程、其快速的创新方法，以及如何使用沙箱来促进协作并鼓励代码开发和文档编写。我们还了解了其子项目、这些子项目的领导者，以及它们如何作为独立版本或作为\
    \ Eclipse MicroProfile 伞式版本的一部分发布。\n\n此外，您还了解了 MicroProfile Starter，这是一个 Maven\
    \ 项目生成工具，它提供代码示例，以便开发人员可以快速启动他们的 MicroProfile 应用程序。最后，我们初步了解了如何使用 Eclipse MicroProfile\
    \ Config 结构轻松修改应用程序的属性，...\n\n# 问题\n\n1.  MicroProfile 社区的主要沟通方式是什么？\n2.  每两周一次的\
    \ MicroProfile Hangout 电话会议的目标是什么？\n3.  子项目（MicroProfile 规范）负责人的角色是什么？\n4.  新的\
    \ MicroProfile 规范提案遵循什么流程？\n5.  MicroProfile 项目遵循的发布计划是什么？\n6.  MicroProfile 沙箱的目标是什么？\n\
    7.  在伞式/平台 MicroProfile 版本内发布的项目与在其外发布的项目有什么区别？\n8.  什么是 MicroProfile Starter，它提供了哪些好处？\n\
    \n# 第二部分：MicroProfile 的当前能力\n\n本节将介绍该项目及其子项目的能力，并附有代码示例。\n\n本节包含以下章节：\n\n*   第\
    \ 3 章，*MicroProfile Config 与容错*\n*   第 4 章，*MicroProfile 健康检查与 JWT 传播*\n*   第\
    \ 5 章，*MicroProfile 指标与 OpenTracing*\n*   第 6 章，*MicroProfile OpenAPI 与类型安全 REST\
    \ 客户端*\n\n# MicroProfile Config 与容错\n\n在本章中，我们将首先介绍 MicroProfile Config，因为它是配置其他\
    \ MicroProfile 功能以及应用程序级配置的基础。MicroProfile Config 规范提供了一种通用方法来检索来自各种来源（属性文件、系统属性、环境变量、数据库等）的配置。\n\
    \n我们将涵盖的主题包括：\n\n*   从应用程序读取配置\n*   为应用程序提供额外的配置源\n*   提供从纯配置到应用程序特定对象的转换\n\n\
    # 理解 Eclipse MicroProfile Config\n\n每个应用程序都需要一些外部配置来使其行为适应其运行的运行时平台。这可能包括应用程序必须连接的\
    \ HTTP 端点，或某些内部结构的大小。\n\n这些配置参数也可以来自不同的来源：\n\n*   来自云原生环境中的操作系统或容器（通过使用环境变量）\n\
    *   来自 Java 虚拟机（使用系统属性）\n*   来自某些外部配置文件（例如 Java 属性文件）\n*   来自其他位置（LDAP 服务器、数据库、键值存储等）\n\
    \n一方面，这些配置参数来自许多不同的来源。另一方面...\n\n# 从 MicroProfile Config API 读取配置\n\nMicroProfile\
    \ Config 规范定义了两个对象来读取配置参数的值：\n\n*   `Config`对象，用于以编程方式访问配置值\n*   `@ConfigProperty`注解，用于使用**上下文与依赖注入**（**CDI**）注入配置值\n\
    \n让我们详细讨论它们。\n"
- fmt: "# The Config object\n\nThe `org.eclipse.microprofile.config.Config` interface\
    \ is the entry point to retrieve configuration in a Java application.\n\nThere\
    \ are two ways to get an instance of `Config`:\n\n1. The first (and preferred)\
    \ way is to use CDI to inject it into the code:\n\n```\n@Inject\nprivate Config\
    \ config;\n```\n\n2. The second way is to call the static method, `org.eclipse.microprofile.config.ConfigProvider#getConfig()`,\
    \ to obtain an instance of `Config`:\n\n```\nConfig config = ConfigProvider.getConfig();\n\
    ```\n\nThe `Config` interface provides two methods to retrieve properties:\n\n\
    - `getValue(String propertyName, Class propertyType)`: This method throws a runtime\
    \ exception if the property is not present in the configuration. This method must\
    \ be used only for **mandatory** configuration ...\n\n# The @ConfigProperty annotation\n\
    \nThe `@ConfigProperty` annotation can be used to inject configuration values\
    \ in Java fields or method parameters using CDI, as shown:\n\n```\n@Inject\n@ConfigProperty(name=\"\
    my.url\")\nprivate URL myURL;\n```\n\nThe `@ConfigProperty` annotation can have\
    \ `defaultValue`, which is used to configure the field if the configuration property\
    \ is not found in the underlying `Config`:\n\n```\n@Inject\n@ConfigProperty(name=\"\
    my.url\", defaultValue=\"http://localhost/\")\nprivate URL myURL;\n```\n\nIf `defaultValue`\
    \ is not set and no property is found, the application will throw `DeploymentException`\
    \ as it cannot be properly configured.\n\nIt is possible to use `Optional` if\
    \ a configuration property might not be present, as shown in the following code\
    \ block:\n\n```\n@Inject\n@ConfigProperty(name=\"my.url\")\nprivate Optional<URL>\
    \ someUrl; // will be set to Optional.empty if the\n                         \
    \      // property `my.url` cannot be found\n```\n\nAfter reading the configuration,\
    \ we need to provide source configuration sources, which will be covered in the\
    \ next section.\n\n# Providing sources of configuration\n\nThe source of a configuration\
    \ is represented by the `ConfigSource` interface. You do not need to implement\
    \ this interface unless you want to provide a source of configurations that are\
    \ not available by the MicroProfile implementation you use in your application.\n\
    \nIf a property is found in multiple config sources, `Config` will return the\
    \ value from the `ConfigSource` interface with the highest `ordinal` value.\n\n\
    Ordering `ConfigSource` is important as users can provide custom `ConfigSource`\
    \ interfaces in addition to the default ones provided by the MicroProfile Config\
    \ implementation.\n\n# Default ConfigSources\n\nBy default, a MicroProfile Config\
    \ implementation must provide three sources of configuration:\n\n- System properties\
    \ from the Java virtual machine (with an ordinal of `400`)\n- Environment variables\
    \ (with an ordinal of `300`)\n- Properties stored in `META-INF/microprofile-config.properties`\
    \ (with an ordinal of `100`)\n\nThe ordinal value of a config source determines\
    \ the precedence of the config source. In particular, if a property is defined\
    \ both in the system properties and the environment variables, the value will\
    \ be taken from the system properties (which has a higher ordinal than the environment\
    \ variables).\n\nThere are no restrictions on the names of properties. However,\
    \ some operating systems can impose some restrictions on the name of the environment\
    \ variables (for example, `\".\"` is not allowed by most Unix shells). If you\
    \ have a property that could be configured from the environment variables, you\
    \ have to name your property accordingly.\n\nFor example, the property name `my_url`\
    \ can be used by an environment variable while `my.url` cannot.\n\n**New in MicroProfile\
    \ Config 1.3** MicroProfile Config 1.3 introduces a mapping rule from the config\
    \ property name to the environment variable. This rule searches three environment\
    \ variable variants for each property name:\n\n- Exact match\n- Replace any non-alphanumeric\
    \ character with `_`\n- Replace any non-alphanumeric character with `_` and use\
    \ uppercase\n\nThis means that, in the Java application, we can have a property\
    \ named `app.auth.url` and use the `APP_AUTH_URL` environment variable to configure\
    \ it.\n\nLet's move on to the other type of configuration source.\n\n# Custom\
    \ ConfigSources implementations\n\nIt is possible to provide additional sources\
    \ of configuration in your application that will be automatically added by the\
    \ MicroProfile Config implementation.\n\nYou need to define an implementation\
    \ of `org.eclipse.microprofile.config.spi.ConfigSource` and add a Java `ServiceLoader`\
    \ configuration for it, and put that file in your application archive as `META-INF/services/org.eclipse.microprofile.config.spi.ConfigSource`.\
    \ For your reference, here is an example of the definition of an implementation\
    \ of an environment `ConfigSource`:\n\n```\npackage io.packt.sample.config;\n\n\
    import java.io.Serializable;\nimport java.util.Collections;\nimport java.util.Map;\n\
    \nimport org.eclipse.microprofile.config.spi.ConfigSource;\n\npublic class EnvConfigSource\
    \ ...\n```\n\n# Using converters for high-level configuration\n\nMicroProfile\
    \ Config will read Java `String` objects from its `ConfigSource`. However, it\
    \ provides facilities to *convert* these `String` objects into more specific types\
    \ in your application.\n\nFor example, the `myUrl` field we described previously\
    \ is a `URL` object. The corresponding property, `my.url`, is read as a `String`\
    \ object and then converted into a `URL` object before it is injected.\n\nIf the\
    \ application uses the `Config` object, the MicroProfile Config implementation\
    \ will also convert the `String` object into the type passed as the second argument\
    \ of the `getValue` and `getOptionalValue` methods. This conversion can be done\
    \ using different converter types: built-in, automatic, and custom. We will talk\
    \ about them in detail now.\n\n# Built-in converters\n\nThe MicroProfile Config\
    \ implementation provides built-in converters for the primitive types (`boolean`,\
    \ `int`, `long`, `byte`, `float`, and `double`) and their corresponding Java types\
    \ (for example, `Integer`).\n\nIt also provides support for arrays in the property\
    \ value using the `\",\"` as the item separator. If the `\",\"` must be part of\
    \ an item, it must be escaped with a backslash `\"\\\"`:\n\n```\nprivate String[]\
    \ pets = config.getValue(\"myPets\", String[].class)\n```\n\nIf the value of the\
    \ `myPets` property is `dog,cat,dog\\\\,cat`, the elements of the array stored\
    \ in `pets` would be `{\"dog\", \"cat\", \"dog,cat\"}`.\n\n# Automatic converters\n\
    \nMicroProfile Config also defines *automatic converters*. If a converter is not\
    \ known for a given Java type, it will attempt to convert a `String` object into\
    \ it using any one of the three different approaches:\n\n- The Java type has a\
    \ public constructor with a `String` parameter.\n- It has a `public static valueOf(String)`\
    \ method.\n- It has a `public static parse(String)` method.\n\nThat's how the\
    \ `my.url` property was converted from `String` into `URL` since the `java.net.URL`\
    \ type has the `public URL(String)` constructor.\n\n# Custom converters\n\nIf\
    \ your application defines Java types that do not provide any of these three cases\
    \ covered by the automatic converters, MicroProfile Config can still provide conversion\
    \ using custom converters that extend the `org.eclipse.microprofile.config.spi.Converter`\
    \ interface defined in the following:\n\n```\npublic interface Converter<T> {\n\
    \    /**\n     * Configure the string value to a specified type\n     * @param\
    \ value the string representation of a property value.\n     * @return the converted\
    \ value or null\n     *\n     * @throws IllegalArgumentException if the value\
    \ cannot be converted to        the specified type.\n     */\n    T convert(String\
    \ value);\n```\n\nYou have to write an implementation of `org.eclipse.microprofile.config.spi.Converter`,\
    \ then add its name to the `/META-INF/services/org.eclipse.microprofile.config.spi.Converter\
    \ ...`"
