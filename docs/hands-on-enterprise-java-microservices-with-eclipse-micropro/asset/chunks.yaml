    \ cloud, IoT, and open source:\n\n![](Images/0c47035f-e6df-4c8c-be4d-0c7bb3f2227c.png)\n\
    \nBefore the internet, organizations required brick-and-mortar stores or phone\
    \ lines to conduct their businesses. The advent and accessibility of the internet\
    \ created a **critical category-formation time** opportunity for organizations.\
    \ Businesses started to use the internet mainly as a storefront or display in\
    \ order to drive people to their brick-and-mortar stores. It was also used for\
    \ advertising purposes.\n\nSoon after this, businesses ...\n\n# Multi-speed IT\n\
    \nImplementing and delivering applications as fast as possible is not a new requirement.\
    \ In fact, since the invention of the first computer, increasing efficiency has\
    \ always been in the minds of computer scientists. High-level programming languages,\
    \ encapsulation, reusability, inheritance, event-driven design, SOA, microservices,\
    \ machine learning, and AI, are all concepts that address the challenge of doing\
    \ things faster. With each wave of new technology, the gearbox adds a new speed\
    \ requirement to the evolution of how we develop and deliver software. The digital\
    \ economy has added another high-speed gear to the gearbox.\n\nBusinesses need\
    \ to adapt to the new demands of the digital economy. Not only do they have to\
    \ create, run, and support traditional-style applications, but also applications\
    \ that conform to the new demands of the digital economy. They have to support\
    \ both waterfall and DevOps processes, hybrid cloud infrastructures, and SOA and\
    \ microservice architectures.\n\nThis imposes many challenges on IT organizations,\
    \ whose processes, people, and technology have all been geared toward the implementation,\
    \ delivery, and maintenance of traditional-style applications. Many organizations\
    \ have already embarked on, or are starting, their journey of digital transformation,\
    \ which addresses the challenges of the digital economy. This journey includes\
    \ changes in technologies, frameworks, languages, and processes for the development,\
    \ delivery, integration, and maintenance of applications.\n\nWhether you call\
    \ it bimodal IT ([https://www.gartner.com/it-glossary/bimodal](https://www.gartner.com/it-glossary/bimodal))\
    \ or a business technology strategy ([https://go.forrester.com/wp-content/uploads/Forrester-False-Promise-of-Bimodal-IT.pdf](https://go.forrester.com/wp-content/uploads/Forrester-False-Promise-of-Bimodal-IT.pdf)),\
    \ the fact is that IT needs to deliver faster than ever before on the needs of\
    \ the business, for both existing and new applications. This means IT needs to\
    \ also speed up the maintenance and delivery of existing applications while exclusively\
    \ adopting Agile methodologies for new applications. This does not preclude, however,\
    \ the need to still use different development processes, release cycles, and support\
    \ timelines to handle existing applications versus new applications, which is\
    \ effectively the multi-speed nature of IT.\n\n# Introducing Eclipse MicroProfile\n\
    \nJava EE has been an extremely successful platform. The **Java Community Process**\
    \ (**JCP**) has been the steward of over 20 compatible implementations during\
    \ its nearly 20-year history, resulting in a $4 billion industry. However, the\
    \ management of Java EE by Oracle (unintentional or not) of Java EE (unintentional\
    \ or not) stalled innovations, and while other standards have developed, the Java\
    \ community worldwide and CIOs at all major enterprises desired an open standard\
    \ for Java within their enterprise.\n\nIn its early stages, J2EE grew somewhat\
    \ quickly from J2EE 1.2 up to J2EE 1.4, as the platform needed to address the\
    \ immediate requirements of the enterprise. Beginning with Java EE 5 in May 2006,\
    \ the pace began to ..."
  trans: "\n# 第一部分：数字经济中的 MicroProfile\n\n在本部分中，你将了解微服务在数字经济中的重要性，以及 MicroProfile\
    \ 如何满足企业级 Java 微服务的需求。此外，你还将了解当前构成 MicroProfile 的子项目、它对组织和开发者的价值主张，以及其当前的流程和治理（即如何推进工作）。\n\
    \n本部分包含以下章节：\n\n*   第 1 章，*Eclipse MicroProfile 简介*\n*   第 2 章，*治理与贡献*\n\n# Eclipse\
    \ MicroProfile 简介\n\nEclipse MicroProfile 是一套用 Java 语言编写的微服务规范。它是一个由社区驱动、市场上有多种实现的项目。该项目于\
    \ 2016 年 6 月首次宣布，持续开发一套通用的**应用程序编程接口**（**API**），用于实现适用于现代应用开发技术、架构和环境的 Java 微服务。在本章中，你将了解\
    \ Eclipse MicroProfile 的起源和重要性。\n\n本章将涵盖以下主题：\n\n*   企业级 Java 微服务\n*   推动数字经济的驱动力与多速\
    \ IT 的需求\n*   Eclipse MicroProfile 介绍\n*   MicroProfile ...\n\n# 企业级 Java 微服务\n\
    \n应用开发不再仅仅是在你喜欢的操作系统上使用单一的高级编程语言。如今，程序员需要学习大量的语言、规范、框架、专有和开源软件及工具、底层部署基础设施以及开发方法，才能开发现代应用。IT\
    \ 组织的开发已变得多语言化，即根据特定项目的需求使用多种编程语言。在这个云、容器、微服务、响应式编程、12 要素应用、无服务器、MINI 服务、多语言环境等并存的时代，开发者现在可以选择适合其任务的工具，从而变得更高效、更有生产力。\n\
    \n随着 Java EE 近期以新名称 Jakarta EE 迁移到 Eclipse 基金会，MicroProfile 将在企业级 Java 的未来中扮演非常重要的角色，因为它与\
    \ Jakarta EE 具有协同作用，并有可能以多种方式影响它。\n\n云和移动技术的出现，以及开放和**物联网**（**IoT**）的加速发展，催生了数字经济。虽然这开辟了新的市场，但也给企业及其\
    \ IT 组织带来了新的要求，它们现在不仅要支持和维护传统工作负载，还要以更快的速度交付新应用。\n\n为了应对这些新需求，许多技术、语言、架构和框架在企业中变得流行起来。其中之一就是微服务，特别是企业级\
    \ Java 微服务，因为 Java 仍然是 IT 公司中最流行的语言之一。但什么是企业级 Java 微服务呢？\n\n企业级 Java 微服务具有以下特征：\n\
    \n*   使用 Java 语言编写。\n*   可以使用任何 Java 框架。\n*   可以使用任何 Java API。\n*   必须达到企业级标准，即可靠、可用、可扩展、安全、健壮且高性能。\n\
    *   必须满足 [`martinfowler.com/microservices/`](https://martinfowler.com/microservices/)\
    \ 中列出的微服务架构特征，具体如下：\n    *   通过服务实现组件化\n    *   围绕业务能力组织\n    *   产品而非项目\n   \
    \ *   智能端点与哑管道\n    *   去中心化治理\n    *   去中心化数据管理\n    *   基础设施自动化\n    *   为故障而设计\n\
    \    *   演进式设计\n\n# 推动数字经济的驱动力\n\n**数字经济**和**数字化转型**这两个术语描述了四种正在改变企业需求的驱动力汇聚在一起：移动、云、物联网和开源：\n\
    \n![](img/0c47035f-e6df-4c8c-be4d-0c7bb3f2227c.png)\n\n在互联网出现之前，企业需要实体店或电话线来开展业务。互联网的出现和普及为企业创造了**关键品类形成期**的机会。企业开始主要将互联网用作店面或展示窗口，以吸引人们前往其实体店。互联网也被用于广告目的。\n\
    \n此后不久，企业...\n\n# 多速 IT\n\n尽可能快地实现和交付应用并非新要求。事实上，自第一台计算机发明以来，提高效率一直是计算机科学家们思考的问题。高级编程语言、封装、可重用性、继承、事件驱动设计、SOA、微服务、机器学习和人工智能，这些都是为了应对更快完成任务这一挑战而提出的概念。随着每一波新技术的浪潮，变速箱都为软件开发和交付方式的演进增加了一个新的速度要求。数字经济又为变速箱增加了一个高速档位。\n\
    \n企业需要适应数字经济的新需求。它们不仅要创建、运行和支持传统类型的应用，还要创建符合数字经济新需求的应用。它们必须同时支持瀑布式和 DevOps 流程、混合云基础设施以及\
    \ SOA 和微服务架构。\n\n这给 IT 组织带来了许多挑战，因为其流程、人员和技术都一直面向传统类型应用的实现、交付和维护。许多组织已经踏上或正在开始其数字化转型之旅，以应对数字经济的挑战。这一旅程包括在应用的开发、交付、集成和维护方面，对技术、框架、语言和流程进行变革。\n\
    \n无论你称之为双模 IT（[`www.gartner.com/it-glossary/bimodal`](https://www.gartner.com/it-glossary/bimodal)）还是业务技术战略（[`go.forrester.com/wp-content/uploads/Forrester-False-Promise-of-Bimodal-IT.pdf`](https://go.forrester.com/wp-content/uploads/Forrester-False-Promise-of-Bimodal-IT.pdf)），事实是，IT\
    \ 需要比以往任何时候都更快地满足业务需求，无论是现有应用还是新应用。这意味着 IT 还需要加快现有应用的维护和交付，同时专门为新应用采用敏捷方法论。然而，这并不排除在处理现有应用与新应用时，仍然需要使用不同的开发流程、发布周期和支持时间线，这实际上就是\
    \ IT 的多速特性。\n\n# Eclipse MicroProfile 介绍\n\nJava EE 一直是一个极其成功的平台。**Java 社区流程**（**JCP**）在其近\
    \ 20 年的历史中管理了超过 20 个兼容实现，造就了一个价值 40 亿美元的产业。然而，Oracle 对 Java EE 的管理（无论有意与否）阻碍了创新，尽管其他标准已经发展起来，但全球\
    \ Java 社区和所有主要企业的 CIO 都渴望在企业内部拥有一个开放的 Java 标准。\n\n在其早期阶段，J2EE 从 J2EE 1.2 到 J2EE\
    \ 1.4 的发展速度相对较快，因为该平台需要满足企业的即时需求。从 2006 年 5 月的 Java EE 5 开始，发展速度开始...\n"
- fmt: '# MicroProfile value proposition


    For customers who trust Enterprise Java to run their production workloads, Eclipse
    MicroProfile provides customers with a vendor-neutral specification for Enterprise
    Java microservices. Eclipse MicroProfile enables them to better fulfill the needs
    of the business via improved agility and scalability, faster time-to-market, higher
    development productivity, easier debugging and maintenance, and continuous integration
    and continuous deployment.


    The benefits customers get by using Eclipse MicroProfile are the same benefits
    gained by using microservices. In general, according to Martin Fowler, a respected
    software developer, author, and speaker, microservices provide the following benefits
    ([https://martinfowler.com/articles/microservice-trade-offs.html](https://martinfowler.com/articles/microservice-trade-offs.html)):


    * **Strong module boundaries**: Microservices reinforce modular structure, which
    is particularly important for larger teams.

    * **Independent deployment**: Simple services are easier to deploy and, since
    they are autonomous, they are less likely to cause system failures when things
    go wrong.

    * **Technology diversity**: With microservices, you can mix multiple languages,
    development frameworks, and data storage technologies.


    In addition to the general benefits of microservices, Eclipse MicroProfile specifically
    provides the following:


    * **The benefits of community collaboration**: Eclipse MicroProfile is an open
    source project run by the community. No single vendor controls or determines the
    evolution and maturation of the specification.

    * **Freedom of choice of implementation**: Many vendors have implemented Eclipse
    MicroProfile as part of their software stacks and customers have the option to
    select whichever implementation is the most appropriate for their environment.

    * **Faster evolution**: Since Eclipse MicroProfile is an innovation project, new
    and improved functionality is delivered frequently in time-boxed releases. This
    allows developers and customers to have these at their fingertips and start leveraging
    updates in their projects sooner rather than later.

    * **Based on decades of experience**: Not only do the specification''s subject-matter
    experts bring with them a vast wealth of experience, expertise, and knowledge,
    but Eclipse MicroProfile also leverages market-tested and production-proven capabilities
    in the Java EE APIs that it builds upon, offering maturity to developers.

    * **Familiarity with Enterprise Java**: Eclipse MicroProfile builds upon familiar
    Enterprise Java constructs, making it easy for Enterprise Java developers to adopt.

    * **No retraining needed**: Your existing Enterprise Java developers will find
    Eclipse MicroProfile to be a natural progression of their expertise. There is
    little to no learning curve. They will be able to leverage their skills.

    * **Interoperability**: The different MicroProfile implementations are interoperable,
    with each one providing users with the freedom to select one, or combine many,
    MicroProfile implementations in an application.

    * **Multiple ways to use the APIs**: Eclipse MicroProfile APIs provide easy-to-use
    interfaces, such as CDI-based, programmatic, command-line, and file-based (configuration-based)
    interfaces.

    * **A thorough set of artifacts**: Each API includes a `Test Compatibility Kit`
    (`TCK`), `Javadoc`, PDF document for download, API Maven artifact coordinates,
    Git tags, and downloads (specification and source code).

    * Many other benefits that are particular to each API. These are discussed in
    each Eclipse MicroProfile sub-project section throughout this book.


    # Summary


    In this chapter, we have discussed the new trends in software development, consisting
    of polyglot deployments using new approaches, such as microservices, containers,
    mobile, and Internet-of-Things (IoT) running on-premises and in the cloud; and
    in hybrid or multi-cloud environments. These trends required the evolution of
    Enterprise Java in the microservices world, which is what MicroProfile addresses.
    The four forces that fuel the digital economy, namely, cloud, mobile, IoT, and
    open source, have contributed to the need for organizations to have multi-speed
    IT departments, which are necessary to maintain and evolve their existing applications
    as well as to take advantage of new technological trends to develop new applications
    that ...


    # Questions


    1. What is an Enterprise Java microservice?

    2. What are the four forces that fuel the digital economy?

    3. Why are IT organizations having to develop and maintain applications at different
    speeds? What is multi-speed IT?

    4. Why are Java and Java EE still important to organizations?

    5. What was one of the key reasons that caused MicroProfile to come into existence?

    6. What are the APIs/specifications that are part of the MicroProfile umbrella/platform
    release?

    7. What release of MicroProfile introduced the first revolutionary changes?

    8. Why is MicroProfile valuable to organizations?


    # Governance and Contributions


    Eclipse MicroProfile is governed by community members. In other words, it is not
    governed by a single vendor. In addition, it receives contributions from developers
    and subject-matter experts across a spectrum of organizations, corporations, and
    individual contributors. The project is characterized by its innovation, speed,
    and agility via light processes and governance. The topics in this chapter will
    help you to understand the governance of the MicroProfile project, and you will
    discover how you can contribute to the MicroProfile project too.


    The following topics will be covered in this chapter:


    * How the Eclipse MicroProfile project is governed

    * How the community collaborates and contributes to its constant innovation ...'
