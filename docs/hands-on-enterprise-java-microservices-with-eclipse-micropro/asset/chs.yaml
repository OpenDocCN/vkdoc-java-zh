- "# 注入 JWT 声明值\n\n本节中的代码片段演示了如何注入单个 JWT 声明值。对于注入的值，我们可以使用几种不同的格式。标准声明支持 `Claim#getType`\
  \ 字段和 `JsonValue` 子类型中定义的对象子类型。自定义声明类型仅支持注入 `JsonValue` 子类型。\n\n以下代码示例演示了如何注入标准的\
  \ `groups` 和 `iss` 声明，以及 `customString`、`customInteger`、`customDouble` 和 `customObject`\
  \ 自定义声明：\n\n```\npackage io.pckt.jwt.rest;\n\nimport java.util.Set;\nimport javax.annotation.security.DenyAll;\n\
  import javax.annotation.security.RolesAllowed;\nimport javax.inject.Inject;\nimport\
  \ javax.json.JsonArray;\nimport javax.json.JsonNumber;\nimport javax.json.JsonObject;\n\
  import javax.json.JsonString;\nimport javax.ws.rs.GET;\nimport javax.ws.rs.Path;\n\
  \nimport org.eclipse.microprofile.jwt.Claim;\nimport org.eclipse.microprofile.jwt.Claims;\n\
  \n@Path(\"/jwt\")\n@DenyAll\npublic class InjectionExampleEndpoint {\n    @Inject\n\
  \    @Claim(standard = Claims.groups)\n    Set<String> rolesSet; // 1\n    @Inject\n\
  \    @Claim(standard = Claims.iss)\n    String issuer; // 2\n\n    @Inject\n   \
  \ @Claim(standard = Claims.groups)\n    JsonArray rolesAsJson; // 3\n    @Inject\n\
  \    @Claim(standard = Claims.iss)\n    JsonString issuerAsJson; // 4\n    // 作为\
  \ JsonValue 类型的自定义声明\n    @Inject\n    @Claim(\"customString\")\n    JsonString\
  \ customString; // 5\n    @Inject\n    @Claim(\"customInteger\")\n    JsonNumber\
  \ customInteger; // 6\n    @Inject\n    @Claim(\"customDouble\")\n    JsonNumber\
  \ customDouble; // 7\n    @Inject\n    @Claim(\"customObject\")\n    JsonObject\
  \ customObject; // 8\n\n    @GET\n    @Path(\"/printClaims\")\n    @RolesAllowed(\"\
  Tester\")\n    public String printClaims() {\n        return String.format(\"rolesSet=%s\\\
  n\");\n    }\n}\n```\n\n这八处带注释的注入如下所示：\n\n1.  将标准 `groups` 声明作为其默认的 `Set<String>`\
  \ 类型注入\n2.  将标准 `iss` 声明作为其默认的 String 类型注入\n3.  将标准 `groups` 声明作为其默认的 `JsonArray`\
  \ 类型注入\n4.  将标准 `iss` 声明作为其默认的 `JsonString` 类型注入\n5.  将非标准 `customString` 声明作为 `JsonString`\
  \ 类型注入\n6.  将非标准 `customInteger` 声明作为 `JsonNumber` 类型注入\n7.  将非标准 `customDouble`\
  \ 声明作为 `JsonNumber` 类型注入\n8.  将非标准 `customObject` 声明作为 `JsonString` 类型注入\n\n"
- '# 配置 JWT 的身份验证


  要接受 JWT 作为应被认证并因此受信任的身份标识，我们需要配置 MP-JWT 功能，提供用于验证 JWT 签名者和签发者的信息。这通过 MP-Config 属性完成：


  *   `mp.jwt.verify.publickey`：提供 MP-JWT 签名者公钥的内嵌密钥材料，通常采用 PKCS8 PEM 格式。

  *   `mp.jwt.verify.issuer`：指定 JWT 中 `iss` 声明的预期值。


  本书的一个示例 `microprofile-configuration.properties` 文件如下：


  ```

  # MP-JWT Configmp.jwt.verify.
  ...

  ```




