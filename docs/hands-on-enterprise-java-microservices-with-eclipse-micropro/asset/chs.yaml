- '# MicroProfile 未来发展


  如第 2 章*治理与贡献*所述，提交给 Eclipse MicroProfile 项目的新想法首先会在 MicroProfile 沙箱中尝试，遵循实现优先的创新方法。沙箱演练为实施者和社区提供了讨论、分析和评估这个新想法如何融入
  MicroProfile 项目的机会。如果在沙箱演练结束时，社区认为这个新想法值得添加到项目中，则会为其创建一个特定的 MicroProfile 子项目。该子项目必须至少发布一个版本，才能被考虑添加到
  MicroProfile 平台版本中。从高层级来看，这就是新想法和未来发展在 MicroProfile 项目下遵循的流程。


  在接下来的几节中，我们将讨论两类项目：一类是目前属于 MicroProfile 子项目但位于 MicroProfile 平台版本之外的项目（可以将其视为已从 MicroProfile
  沙箱毕业的项目），另一类是仍处于 MicroProfile 沙箱中的项目。最后，我们将讨论 Eclipse MicroProfile 与 Jakarta EE
  之间的当前关系，以及它们的路线图是否可能交汇。


  '
- '# 平台版本之外的项目


  在本节中，我们将介绍在撰写本文时位于 Eclipse MicroProfile 平台版本之外的项目。这些项目如下：


  *   响应式流操作符

  *   响应式消息传递

  *   长时间运行操作

  *   上下文传播

  *   GraphQL


  响应式流操作符和响应式消息传递项目已在本章前面的部分讨论过，因此在本节中，我们将仅介绍长时间运行操作、上下文传播和 GraphQL。


  '
- '# 长时间运行操作


  在松散耦合的服务环境中，**长时间运行操作**（**LRA**）规范背后的动机是，通过由对多个微服务的调用组成的业务流程提供一致的结果，而无需锁定数据。理解 LRA
  的一种方式是将其视为*微服务的事务*。需要 LRA 的场景示例包括：


  *   在线订购一本书需要从库存中扣减一本书、处理付款，最后发货。所有这些任务都需要原子性地发生，换句话说，它们需要一起处理，如果任何任务失败，则所有任务都必须撤销。

  *   预订航班需要从飞机的可用座位列表中移除一个座位、为旅客选择和分配特定座位、处理付款以及创建记录定位码。同样，所有这些任务都必须在同一个长时间运行操作内完成。


  上述示例不仅需要原子性地发生，而且即使其中间步骤有任何失败，它们也必须生成一个数据一致的结果。


  MicroProfile LRA 当前提出的解决方案灵感来源于 *OASIS Web 服务复合应用程序框架技术委员会*（[`www.oasis-open.org/committees/tc_home.php?wg_abbrev=ws-caf`](https://www.oasis-open.org/committees/tc_home.php?wg_abbrev=ws-caf)），即
  *Web 服务**长时间运行操作事务模型*（[`www.oasis-open.org/committees/document.php?document_id=12794`](https://www.oasis-open.org/committees/document.php?document_id=12794)），但已进行更新以更适合在基于微服务的架构中使用。


  有关 MicroProfile LRA 规范的更多信息，请参阅 [`github.com/eclipse/microprofile-lra/blob/master/spec/src/main/asciidoc/microprofile-lra-spec.adoc`](https://github.com/eclipse/microprofile-lra/blob/master/spec/src/main/asciidoc/microprofile-lra-spec.adoc)。


  MicroProfile 长时间运行操作规范模型包括三个主要实体：补偿器、逻辑协调器和客户端。客户端可以通过两种不同的方式显式启动一个新的 LRA：


  *   通过注解，或

  *   通过 API 调用


  任何一种方式都会创建一个新的 LRA。如果某个服务执行了可能需要稍后撤销的操作，则客户端需要向 LRA 注册一个补偿器。如果客户端选择关闭或取消 LRA，补偿器将撤销该服务在
  LRA 范围内执行的工作，或补偿任何未完成的工作。


  以下是全局范围内一些主要的 LRA 注解：


  *   `@LRA` 控制 LRA 的生命周期。

  *   `@Compensate` 指示如果 LRA 被取消，则应调用该方法。

  *   `@Complete` 指示如果 LRA 被关闭，则应调用该方法。

  *   `@Forget` 指示该方法可以释放为此 LRA 分配的任何资源。

  *   `@Leave` 指示此类不再对此 LRA 感兴趣。

  *   `@Status` 在调用带注解的方法时报告状态。


  您可以将这些注解与 JAX-RS 和非 JAX-RS 方法一起使用。此外，本规范支持 JAX-RS 的异步和响应式特性、LRA 嵌套以及超时。最后，值得一提的是，LRA
  规范通过对参与协议的实体施加某些要求来确保原子性和最终一致性。作为一个 MicroProfile 项目，MicroProfile LRA 规范在撰写本文时处于提议或草案状态。


  '
- '# 上下文传播


  MicroProfile 上下文传播规范的目标是在非线程关联的工作单元之间传播上下文。在响应式模型中，逻辑的执行被拆分为多个工作单元，这些工作单元链接在一起以组装成一个响应式管道。每个工作单元都在一个上下文中执行，该上下文通常是不可预测的，并且取决于所使用的特定响应式引擎。某些单元可能使用等待完成的线程的上下文运行，或者使用已完成并触发依赖单元的先前单元的上下文运行，或者根本没有上下文。MicroProfile
  上下文传播规范使得线程上下文传播能够以类型安全的方式轻松完成，从而减少样板代码……




  '
- '# GraphQL


  GraphQL 是一种用于 API 的开源数据查询与操作语言，也是一个利用现有数据完成查询的运行时。它能够解析来自客户端的字符串，并以可理解、可预测且预定义的方式返回数据。GraphQL
  是 REST 的一种替代方案，但并非必然取代后者。MicroProfile GraphQL 规范的目标是提供一组 API，使开发者能够用 Java 快速开发可移植的基于
  GraphQL 的应用程序。作为 MicroProfile 项目的一部分，在撰写本文时，MicroProfile GraphQL 规范仍处于提议或草案阶段。


  GraphQL 基于 Facebook 的一项规范。有关更多信息，请参阅 `https://graphql.github.io/graphql-spec`。关于
  GraphQL 的更全面概述，可访问 [`graphql.org/`](https://graphql.org/)。


  GraphQL 与 REST 有许多相似之处，两者都广泛用于现代基于微服务的应用程序中。


  '
- '# GraphQL 与 REST 的区别


  以下是 GraphQL 相较于 REST 的主要区别特征：


  *   **模式驱动**：模式充当服务器与其客户端之间的契约。

  *   **单一 HTTP 端点**：通过查询语言实现单一端点以及对数据和操作的访问。

  *   **灵活的数据检索**：允许客户端以精细的粒度选择响应中的数据，从而避免数据获取过多或不足。

  *   **减少服务器请求**：该语言允许客户端将预期数据聚合到单个请求中。

  *   **更易管理的版本控制**：支持在弃用旧数据的同时创建新数据。

  *   **部分结果**：结果由数据和错误组成。客户端负责...


  '
- '# GraphQL 与数据库


  GraphQL 并非数据库技术。相反，它是一种用于 API 的数据查询与操作工具，并且与任何数据库或存储技术无关。然而，它可以部署在任何后端之前，并能够通过单个
  API 聚合来自多个后端数据源的数据。


  '
- '# 沙箱中的项目


  MicroProfile 项目沙箱是社区成员通过尝试实现某些特性和功能来提出想法的地方，旨在从社区成员那里获取反馈、讨论和评估，以决定该想法是否应成为 MicroProfile
  项目的新 API/规范。


  MicroProfile 沙箱位于 [`github.com/eclipse/microprofile-sandbox`](https://github.com/eclipse/microprofile-sandbox)。


  过去从沙箱毕业并成为官方 MicroProfile 项目的提案包括 GraphQL 和 Reactive Streams Operators。在撰写本文时，沙箱中只有一个提案项目：Boost。


  '
- '# MicroProfile Boost


  在撰写本文时，MicroProfile Boost 正在 MicroProfile 沙箱中接受社区评估。Boost 是一个 Maven 插件，用于增强 MicroProfile
  应用程序的构建。


  有关 Boost 的更多信息，请访问 [`github.com/eclipse/microprofile-sandbox/tree/master/proposals/boost`](https://github.com/eclipse/microprofile-sandbox/tree/master/proposals/boost)。


  Boost 为 MicroProfile API（例如用于 MicroProfile Config 的 `mpConfig`）以及 Java EE API 定义了
  Maven 依赖项，这些依赖项被称为 **boosters**。此外，它还为实现不同 MicroProfile API 的运行时（例如 `openliberty`）定义了依赖项。另一个由
  Boost 定义的、指定为 BOM（物料清单）的 Maven 依赖项，指明了在 Maven 构建中针对 MicroProfile API 应使用的 MicroProfile
  总括项目的版本。BOM 的内容由插件管理。作为 Boost 的用户，您可以将这些依赖项包含在您的 `pom.xml` 文件中，以简化 MicroProfile
  应用程序的构建过程。


