- '# 第二部分：MicroProfile 的当前能力


  本节将介绍该项目及其子项目的能力，并附有代码示例。


  本节包含以下章节：


  *   第 3 章，*MicroProfile Config 与容错*

  *   第 4 章，*MicroProfile 健康检查与 JWT 传播*

  *   第 5 章，*MicroProfile 指标与 OpenTracing*

  *   第 6 章，*MicroProfile OpenAPI 与类型安全 REST 客户端*


  '
- '# MicroProfile Config 与容错


  在本章中，我们将首先介绍 MicroProfile Config，因为它是配置其他 MicroProfile 功能以及应用程序级配置的基础。MicroProfile
  Config 规范提供了一种通用方法来检索来自各种来源（属性文件、系统属性、环境变量、数据库等）的配置。


  我们将涵盖的主题包括：


  *   从应用程序读取配置

  *   为应用程序提供额外的配置源

  *   提供从纯配置到应用程序特定对象的转换


  '
- '# 理解 Eclipse MicroProfile Config


  每个应用程序都需要一些外部配置来使其行为适应其运行的运行时平台。这可能包括应用程序必须连接的 HTTP 端点，或某些内部结构的大小。


  这些配置参数也可以来自不同的来源：


  *   来自云原生环境中的操作系统或容器（通过使用环境变量）

  *   来自 Java 虚拟机（使用系统属性）

  *   来自某些外部配置文件（例如 Java 属性文件）

  *   来自其他位置（LDAP 服务器、数据库、键值存储等）


  一方面，这些配置参数来自许多不同的来源。另一方面...


  '
- '# 从 MicroProfile Config API 读取配置


  MicroProfile Config 规范定义了两个对象来读取配置参数的值：


  *   `Config`对象，用于以编程方式访问配置值

  *   `@ConfigProperty`注解，用于使用**上下文与依赖注入**（**CDI**）注入配置值


  让我们详细讨论它们。




  '
- '# Config 对象


  `org.eclipse.microprofile.config.Config` 接口是在 Java 应用程序中检索配置的入口点。


  有两种方式可以获取 `Config` 实例：


  1.  第一种（也是推荐的方式）是使用 CDI 将其注入到代码中：


  ```

  @Inject

  private Config config;

  ```


  2.  第二种方式是调用静态方法 `org.eclipse.microprofile.config.ConfigProvider#getConfig()` 来获取
  `Config` 实例：


  ```

  Config config = ConfigProvider.getConfig();

  ```


  `Config` 接口提供了两种检索属性的方法：


  *   `getValue(String propertyName, Class propertyType)`：如果配置中不存在该属性，此方法会抛出运行时异常。此方法仅应用于**强制**配置项……


  '
- '# @ConfigProperty 注解


  `@ConfigProperty` 注解可用于通过 CDI 将配置值注入 Java 字段或方法参数，如下所示：


  ```

  @Inject

  @ConfigProperty(name="my.url")

  private URL myURL;

  ```


  `@ConfigProperty` 注解可以包含 `defaultValue`，当在底层 `Config` 中未找到配置属性时，将使用该默认值来配置字段：


  ```

  @Inject

  @ConfigProperty(name="my.url", defaultValue="http://localhost/")

  private URL myURL;

  ```


  如果未设置 `defaultValue` 且未找到任何属性，应用程序将抛出 `DeploymentException`，因为它无法被正确配置。


  如果某个配置属性可能不存在，可以使用 `Optional`，如下代码块所示：


  ```

  @Inject

  @ConfigProperty(name="my.url")

  private Optional<URL> someUrl; // 如果找不到属性 `my.url`，则会被设置为 Optional.empty

  ```


  读取配置后，我们需要提供配置源，这将在下一节中介绍。


  '
- '# 提供配置源


  配置源由 `ConfigSource` 接口表示。除非您想提供应用程序中使用的 MicroProfile 实现所不提供的配置源，否则无需实现此接口。


  如果在多个配置源中找到某个属性，`Config` 将返回具有最高 `ordinal` 值的 `ConfigSource` 接口中的值。


  对 `ConfigSource` 进行排序很重要，因为除了 MicroProfile Config 实现提供的默认 `ConfigSource` 接口之外，用户还可以提供自定义的
  `ConfigSource` 接口。


  '
- '# 默认 ConfigSource


  默认情况下，MicroProfile Config 实现必须提供三个配置源：


  *   Java 虚拟机中的系统属性（序数为 `400`）

  *   环境变量（序数为 `300`）

  *   存储在 `META-INF/microprofile-config.properties` 中的属性（序数为 `100`）


  配置源的序数值决定了配置源的优先级。特别是，如果一个属性同时在系统属性和环境变量中定义，则该值将从系统属性中获取（其序数高于环境变量）。


  对属性名称没有限制。但是，某些操作系统可能会对环境变量的名称施加一些限制（例如，大多数 Unix shell 不允许使用 `"."`）。如果您有一个可能通过环境变量配置的属性，则必须相应地命名您的属性。


  例如，属性名称 `my_url` 可以被环境变量使用，而 `my.url` 则不能。


  **MicroProfile Config 1.3 中的新特性** MicroProfile Config 1.3 引入了从配置属性名称到环境变量的映射规则。此规则为每个属性名称搜索三种环境变量变体：


  *   精确匹配

  *   将所有非字母数字字符替换为 `_`

  *   将所有非字母数字字符替换为 `_` 并使用大写


  这意味着，在 Java 应用程序中，我们可以有一个名为 `app.auth.url` 的属性，并使用 `APP_AUTH_URL` 环境变量来配置它。


  让我们继续讨论另一种类型的配置源。


  '
- '# 自定义 ConfigSource 实现


  可以在您的应用程序中提供额外的配置源，这些配置源将由 MicroProfile Config 实现自动添加。


  您需要定义一个 `org.eclipse.microprofile.config.spi.ConfigSource` 的实现，并为其添加一个 Java `ServiceLoader`
  配置，然后将该文件作为 `META-INF/services/``org.eclipse.microprofile.config.spi.ConfigSource`
  放入您的应用程序归档文件中。供您参考，以下是一个环境 `ConfigSource` 实现的定义示例：


  ```

  package io.packt.sample.config;import java.io.Serializable;import java.util.Collections;import
  java.util.Map;import org.eclipse.microprofile.config.spi.ConfigSource;public class
  EnvConfigSource ...

  ```


  '
- '# 使用转换器进行高级配置


  MicroProfile Config 将从其 `ConfigSource` 中读取 Java `String` 对象。但是，它提供了将 `String` 对象*转换*为应用程序中更具体类型的工具。


  例如，我们之前描述的 `myUrl` 字段是一个 `URL` 对象。相应的属性 `my.url` 被读取为 `String` 对象，然后在注入之前转换为 `URL`
  对象。


  如果应用程序使用 `Config` 对象，MicroProfile Config 实现也会将 `String` 对象转换为作为 `getValue` 和 `getOptionalValue`
  方法第二个参数传入的类型。这种转换可以使用不同的转换器类型完成：内置转换器、自动转换器和自定义转换器。我们现在将详细讨论它们。


  '
- '# 内置转换器


  MicroProfile Config 实现为原始类型（`boolean`、`int`、`long`、`byte`、`float` 和 `double`）及其对应的
  Java 类型（例如 `Integer`）提供了内置转换器。


  它还支持在属性值中使用 `","` 作为项目分隔符的数组。如果 `","` 必须是项目的一部分，则必须使用反斜杠 `"\"` 进行转义：


  ```

  private String[] pets = config.getValue("myPets", String[].class)

  ```


  如果 `myPets` 属性的值是 `dog,cat,dog\\,cat`，则存储在 `pets` 中的数组元素将是 `{"dog", "cat", "dog,cat"}`。


  '
- '# 自动转换器


  MicroProfile Config 还定义了*自动转换器*。如果对于给定的 Java 类型没有已知的转换器，它将尝试使用以下三种不同方法之一将 `String`
  对象转换为该类型：


  *   Java 类型具有一个接受 `String` 参数的公共构造函数。

  *   它有一个 `public static valueOf(String)` 方法。

  *   它有一个 `public static parse(String)` 方法。


  这就是 `my.url` 属性从 `String` 转换为 `URL` 的方式，因为 `java.net.URL` 类型具有 `public URL(String)`
  构造函数。


  '
- "# 自定义转换器\n\n如果您的应用程序定义的 Java 类型不提供自动转换器所涵盖的这三种情况中的任何一种，MicroProfile Config 仍然可以使用扩展了\
  \ `org.eclipse.microprofile.config.spi.Converter` 接口的自定义转换器来提供转换，该接口定义如下：\n\n```\n\
  public interface Converter<T> {\n    /**\n     * 将字符串值配置为指定类型\n     * @param value\
  \ 属性值的字符串表示形式。\n     * @return 转换后的值或 null\n     *\n     * @throws IllegalArgumentException\
  \ 如果无法将值转换为指定类型。\n     */\n    T convert(String value);\n```\n\n您必须编写一个 `org.eclipse.microprofile.config.spi.Converter`\
  \ 的实现，然后将其名称添加到 `/META-INF/services/org.eclipse.microprofile.config.spi.Converter\
  \ ...`\n\n\n\n"
- '# 理解 Eclipse MicroProfile 容错机制


  容错机制提供了一系列工具，通过增强代码的韧性来防止其失效。这些工具大多源于优秀的开发实践（例如重试或降级）或知名的开发模式（例如断路器或隔板）。


  容错机制基于 CDI，更准确地说，是基于 CDI 拦截器实现。它还依赖 MicroProfile Config 规范，以便为容错策略提供外部配置。


  该规范的主要思想是将业务逻辑与容错样板代码解耦。为实现这一目标，规范定义了拦截器绑定注解，用于在方法执行或类上应用容错策略（在这种情况下，该类的所有方法都应用相同的策略）。


  容错规范中包含的策略如下：


  *   **超时（Timeout）**：通过 `@Timeout` 注解应用。它为当前操作添加一个超时时间。

  *   **重试（Retry）**：通过 `@Retry` 注解应用。它为当前操作添加重试行为，并允许对其进行配置。

  *   **降级（Fallback）**：通过 `@Fallback` 注解应用。它定义了当前操作失败时要执行的代码。

  *   **隔板（Bulkhead）**：通过 `@Bulkhead` 注解应用。它将当前操作中的故障隔离开来，以保护其他操作的执行。

  *   **断路器（Circuit Breaker）**：通过 `@CircuitBreaker` 注解应用。它提供自动快速失败执行，以防止系统过载。

  *   **异步（Asynchronous）**：通过 `@Asynchronous` 注解应用。它使当前操作变为异步（即代码将被异步调用）。


  应用这些策略中的一个或多个，只需在你希望启用这些策略的方法（或类）上添加所需的注解即可。因此，使用容错机制相当简单。但这种简单性并不妨碍其灵活性，这要归功于每种策略提供的所有可配置参数。


  目前，以下厂商提供了容错规范的实现：


  *   Red Hat 在 Thorntail 和 Quarkus 中

  *   IBM 在 Open Liberty 中

  *   Payara 在 Payara Server 中

  *   Apache Safeguard 用于 Hammock 和 TomEE

  *   KumuluzEE 用于 KumuluzEE 框架


  所有这些实现都支持容错机制，因此也支持下一节中描述的相同功能集。


  '
- '# MicroProfile 容错机制实战


  正如我们刚才讨论的，容错规范提供了一组注解，你需要将它们应用于类或方法上，以强制执行容错策略。话虽如此，你必须记住这些注解是拦截器绑定，因此只能在 CDI Bean
  上使用。所以，在将容错注解应用于类或其方法之前，请务必将你的类定义为 CDI Bean。


  在以下各节中，你将找到每个容错注解的使用示例。


  '
- "# @Asynchronous 策略\n\n使操作异步化非常简单，如下所示：\n\n```\n@Asynchronous\npublic Future<Connection>\
  \ service() throws InterruptedException {\n  Connection conn = new Connection()\
  \ {\n    {\n      Thread.sleep(1000);\n    }\n\n    @Override\n    public String\
  \ getData() {\n      return \"service DATA\";\n    }\n };\n return CompletableFuture.completedFuture(conn);\n\
  }\n```\n\n唯一的约束是 `@Asynchronous` 方法必须返回 `Future` 或 `CompletionStage`；否则，实现应抛出异常。\n\
  \n"
- '# @Retry 策略


  如果操作失败，你可以应用重试策略来再次调用该操作。`@Retry` 注解可以在类或方法级别使用，如下所示：


  ```

  @Retry(maxRetries = 5, maxDuration= 1000, retryOn = {IOException.class})public void
  operationToRetry() {  ...}

  ```


  在上面的示例中，该操作最多重试五次，且仅在发生 `IOException` 时重试。如果所有重试的总持续时间超过 1000 毫秒，该操作将被中止。


  '
- "# @Fallback 策略\n\n`@Fallback` 注解只能应用于方法；注解类将产生意外结果：\n\n```\n@Retry(maxRetries =\
  \ 2)\n@Fallback(StringFallbackHandler.class)\npublic String shouldFallback() {\n\
  \  ...\n}\n```\n\n降级方法在达到重试次数后被调用。在上面的示例中，如果发生错误，该方法将被重试两次，然后使用降级逻辑来调用另一段代码——在本例中，是下面的\
  \ `StringFallbackHandler` 类：\n\n```\nimport javax.enterprise.context.ApplicationScoped;\n\
  \nimport org.eclipse.microprofile.config.inject.ConfigProperty;\nimport org.eclipse.microprofile.faulttolerance.ExecutionContext;\n\
  import org.eclipse.microprofile.faulttolerance.FallbackHandler;\n\n@ApplicationScoped\n\
  public class StringFallbackHandler implements FallbackHandler<String> {\n    @ConfigProperty(name=\"\
  app1.requestFallbackReply\", defaultValue = \"Unconfigured Default Reply\")\n  \
  \  private String replyString;\n\n    @Override\n    public String handle(ExecutionContext\
  \ ec) {\n        return replyString;\n    }\n}\n```\n\n降级代码可以通过实现 `FallbackHandler`\
  \ 接口的类（参见前面的代码）或当前 Bean 中的一个方法来定义。在 `StringFallbackHandler` 代码中，使用了一个名为 `app1.requestFallbackReply`\
  \ 的 MicroProfile Config 属性来外部化应用程序的降级字符串值。\n\n"
- '# @Timeout 策略


  `@Timeout` 注解可以应用于类或方法，以确保操作不会无限期持续：


  ```

  @Timeout(200)public void operationCouldTimeout() {  ...}

  ```


  在前面的示例中，如果操作持续时间超过 200 毫秒，它将被停止。


  '
- "# @CircuitBreaker 策略\n\n`@CircuitBreaker` 注解可以应用于类或方法。断路器模式由 Martin Fowler 引入，用于保护操作的执行，使其在功能异常时快速失败：\n\
  \n```\n@CircuitBreaker(requestVolumeThreshold = 4, failureRatio=0.75, delay = 1000)\n\
  public void operationCouldBeShortCircuited(){\n  ...\n}\n```\n\n在上面的示例中，该方法应用了 `CircuitBreaker`\
  \ 策略。如果在连续四次调用的滚动窗口中发生三次（*4 x 0.75*）失败，断路器将打开。断路器将保持打开状态 1000 毫秒，然后恢复到半开状态。成功调用一次后，断路器将再次恢复到关闭状态。\n\
  \n"
- '# @Bulkhead 策略


  `@Bulkhead` 注解也可以应用于类或方法，以强制执行隔板策略。此模式将当前操作中的故障隔离开来，以保护其他操作的执行。实现通过限制给定方法上的并发调用数量来做到这一点：


  ```

  @Bulkhead(4)public void bulkheadedOperation() {  ...}

  ```


  在上面的代码中，此方法同时只支持四次调用。如果 `bulkheadedOperation` 方法同时收到超过四个请求，系统将保持第五个及之后的请求，直到四个活动调用中的一个完成。隔板注解也可以与
  `@Asynchronous` 一起使用，以限制异步...




  '
- '# 使用 MicroProfile Config 实现容错


  正如我们在前几节中所见，容错策略是通过使用注解来应用的。对于大多数用例来说，这已经足够了，但对于其他用例，这种方法可能并不令人满意，因为配置是在源代码级别完成的。


  这就是为什么 MicroProfile 容错注解的参数可以使用 MicroProfile Config 进行覆盖的原因。


  注解参数可以通过配置属性进行覆盖，使用以下命名约定：`<类名>/<方法名>/<注解>/<参数>`。


  要覆盖 `MyService` 类中 `doSomething` 方法上 `@Retry` 的 `maxDuration`，请按如下方式设置配置属性：


  ```

  org.example.microservice.MyService/doSomething/Retry/maxDuration=3000

  ```


  如果特定注解的参数需要为特定类配置相同的值，请使用 `<类名>/<注解>/<参数>` 配置属性进行配置。


  例如，使用以下配置属性将 `MyService` 类上指定的所有 `@Retry` 的 `maxRetries` 覆盖为 100：


  ```

  org.example.microservice.MyService/Retry/maxRetries=100

  ```


  有时，需要为整个微服务（即部署中该注解的所有出现位置）配置相同的参数值。


  在这种情况下，`<注解>/<参数>` 配置属性会覆盖指定注解的相应参数值。例如，要将所有 `@Retry` 的所有 `maxRetries` 覆盖为 30，请指定以下配置属性：


  ```

  Retry/maxRetries=30

  ```


  至此，我们关于 MicroProfile 中容错机制的讨论就结束了。


  '
- '# 总结


  在本章中，我们学习了如何使用 MicroProfile Config 来配置 MicroProfile 应用程序，以及如何使用 MicroProfile 容错机制来使它们更具弹性。


  在 MicroProfile Config 中，配置的来源可以有很多；一些值来自属性文件，另一些来自系统属性或环境变量，但它们都可以从 Java 应用程序中一致地访问。这些值可能会根据部署环境（例如，测试和生产环境）而有所不同，但这在应用程序代码中是透明的。


  MicroProfile 容错机制通过在代码中应用特定策略来帮助防止应用程序故障。它带有默认行为，但可以通过 MicroProfile Config 进行配置……


  '
