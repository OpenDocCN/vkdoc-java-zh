- '# 第 3 部分：MicroProfile 实现与路线图


  本节将介绍当前市场上的实现以及未来项目的可能路线图。


  本节包含以下章节：


  *   第 7 章，*MicroProfile 实现、Quarkus 以及通过会议应用实现互操作性*


  '
- '# MicroProfile 实现、Quarkus 以及通过会议应用实现互操作性


  Eclipse MicroProfile 的优势之一在于它提供了一个规范，允许许多实现彼此互操作。这一优势鼓励了许多供应商和社区团体将 Eclipse MicroProfile
  规范实现为开源实现。目前市场上有八个 Eclipse MicroProfile 实现，第九个实现 Quarkus 也已加入。


  本章将涵盖以下主题：


  *   描述八个 Eclipse MicroProfile 实现以及如何获取每个实现的更多信息

  *   如何为这些实现中的每一个生成 Eclipse MicroProfile 示例代码……


  '
- '# 当前的 MicroProfile 实现


  在撰写本文时，共有八个 Eclipse MicroProfile 实现，全部都是开源的。以下是这些实现的表格：


  | **开源项目基础** | **项目地址** | **支持供应商** |

  | Thorntail ([`thorntail.io/`](http://thorntail.io/)) | [`github.com/thorntail/thorntail`](https://github.com/thorntail/thorntail)
  | Red Hat |

  | Open Liberty ([`openliberty.io/`](https://openliberty.io/)) | [`github.com/openliberty`](https://github.com/openliberty)
  | IBM |

  | Apache TomEE ([`tomee.apache.org/`](http://tomee.apache.org/)) | [`github.com/apache/tomee`](https://github.com/apache/tomee)
  | Tomitribe |

  | Payara Micro ([`www.payara.fish/payara_micro`](https://www.payara.fish/payara_micro))
  | [`github.com/payara/Payara`](https://github.com/payara/Payara) | Payara Services
  Ltd. |

  | Hammock ([`hammock-project.github.io/`](https://hammock-project.github.io/)) |
  [`github.com/hammock-project`](https://github.com/hammock-project) | Hammock |

  | KumuluzEE ([`ee.kumuluz.com/`](https://ee.kumuluz.com/)) | [`github.com/kumuluz`](https://github.com/kumuluz)
  | KumuluzEE |

  | Launcher ([`github.com/fujitsu/launcher`](https://github.com/fujitsu/launcher))
  | [`github.com/fujitsu/launcher`](https://github.com/fujitsu/launcher) | Fujitsu
  |

  | Helidon ([`helidon.io/#`](https://helidon.io/#)) | [`github.com/oracle/helidon`](https://github.com/oracle/helidon)
  | Oracle |


  其中一些实现基于*应用服务器*，例如 Payara 和 Open Liberty，而另一些则基于*应用组装器*，后者仅包含应用程序所需的功能，无需启动并运行应用服务器，并且通常生成可执行的
  JAR。然而，基于应用服务器的实现也能够生成可执行的 JAR。


  应用组装器可以生成一个 *uberjar*（一个自包含的可运行 JAR 文件），或者一个*应用 jar*，其运行时依赖项位于子目录中，例如，一个附带的 `lib`
  或 `libs` 子目录。


  通过了整个伞式版本或特定版本 MicroProfile API 的 MicroProfile **测试兼容性套件**（**TCK**）的 Eclipse MicroProfile
  实现，会列在 [`wiki.eclipse.org/MicroProfile/Implementation`](https://wiki.eclipse.org/MicroProfile/Implementation)
  上。目前，列入此列表采用诚信制度，因为它不需要提供 TCK 结果的证明；只需要发布者声明其实现已通过 TCK。


  该项目还有一个站点，组织/团体可以在 MicroProfile 生产部署列表中自行添加。此列表可在 [`wiki.eclipse.org/MicroProfile/Adoptions`](https://wiki.eclipse.org/MicroProfile/Adoptions)
  找到。


  在接下来的章节中，我们将简要介绍这些实现以及如何获取每个实现的更多信息。




  '
- '# Thorntail


  Red Hat 是开源项目 Thorntail 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Thorntail 是一个应用程序组装器，它只打包应用程序所需的服务器运行时组件，并创建一个可运行的
  JAR（即 uberjar），你可以通过执行以下命令来运行它：


  ```

  $ java -jar <可执行 JAR 文件>

  ```


  Thorntail 不仅兼容 MicroProfile，还可以在你的应用程序中包含 MicroProfile 之外的功能。它引入了“分片”（fraction）的概念，分片是一个特定的库，包含你想要集成到应用程序中的功能。分片作为依赖项被包含在你的应用程序的
  Maven POM 文件中。除了 MicroProfile 之外...


  '
- '# Open Liberty


  IBM 是开源项目 Open Liberty 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Open Liberty 是 IBM WebSphere
  Liberty 应用服务器的上游开源项目。Open Liberty 是一个能够生成 uberjar 的应用服务器，该 uberjar 包含你的应用程序以及内嵌的
  Open Liberty 服务器。要运行这个 uberjar，你需要输入以下命令：


  ```

  $ java -jar <可执行 JAR 文件>

  ```


  此命令会将 JAR 文件解压到你的用户临时目录中，然后从该目录执行应用程序。


  请确保 JAR 文件的路径中没有空格，否则启动过程将失败。


  生成的 uberjar 只能包含 `server.xml` 文件中定义的功能所对应的应用服务器功能子集。要使用这组最小功能构建 uberjar，你需要在运行 Maven
  时使用 `minify-runnable-package` 配置文件。


  Open Liberty 的文档非常详尽，包含了丰富的指南和参考文档。


  你可以在 [`openliberty.io/docs/`](https://openliberty.io/docs/) 找到 Open Liberty 的文档。


  在他们的文档中，有一个专门介绍 MicroProfile 指南的部分，提供了文档完善的教程。


  '
- '# Apache TomEE


  Tomitribe 是开源项目 TomEE 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Apache TomEE 是在 Apache
  Tomcat 的基础上添加了 Java EE 功能而构建的。TomEE 通过了 Java EE 6 Web Profile 认证。正如其 GitHub 描述的那样，*Apache
  TomEE 是一个轻量级但功能强大的 JavaEE 应用服务器，拥有丰富的工具集*。你可以下载几个不同版本的 TomEE；例如，TomEE、TomEE+ 和 TomEE
  WebApp，但我们感兴趣的是 TomEE MicroProfile。对于 MicroProfile，TomEE 会为你的微服务生成一个 uberjar，你可以按如下方式运行它：


  ```

  $ java -jar <可执行 JAR 文件>

  ```


  尽管 TomEE MicroProfile 的文档很少，但有一套详尽的...


  '
- '# Payara Micro


  Payara 是开源项目 Payara Micro 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Payara Server 基于开源应用服务器
  GlassFish。Payara Micro 基于 Payara Server，但它是其精简版。正如其网站所述，*Payara Micro 是 Payara Server
  的微服务就绪版本*。


  Payara Micro 的工作方式是：先启动一个 Payara Micro 实例，然后将你的 MicroProfile 微服务作为 WAR 文件部署到该实例上。例如，要启动一个
  Payara Micro 实例，你需要输入以下命令：


  ```

  $ java -jar payara-micro.jar

  ```


  要启动一个 Payara Micro 实例并将你的应用程序部署到其上，你需要输入以下命令：


  ```

  $ java -jar payara-micro.jar --deploy <WAR 文件>

  ```


  Payara Micro 支持 Java EE 应用程序部署，并且与 Eclipse MicroProfile 兼容。


  关于 Payara Micro 的文档，请参考 [`docs.payara.fish/documentation/payara-micro/payara-micro.html`](https://docs.payara.fish/documentation/payara-micro/payara-micro.html)。


  最后，Payara Micro 通过使用第三方内存数据网格产品支持自动集群。


  '
- '# Hammock


  John Ament 是开源项目 Hammock 的赞助商，该项目实现了 Eclipse MicroProfile 规范。与 Thorntail 类似，Hammock
  是一个生成 uberjar 的应用程序组装器。要运行 uberjar，你需要输入以下命令：


  ```

  $ java -jar <可执行 JAR 文件>

  ```


  Hammock 是一个用于构建应用程序的、有主见的微服务框架。它是一个基于 CDI 的框架，意味着它运行在一个 CDI 容器上，容器内运行着基于 CDI 的 Bean。它支持两种
  CDI 实现（JBoss Weld 和 Apache OpenWebBeans）、三种 JAX-RS 实现（Apache CXF、Jersey 和 JBoss
  RestEasy）以及三种不同的 Servlet 容器（Apache Tomcat、JBoss Undertow 和 Eclipse Jetty）。除此之外，Hammock
  还...


  '
- '# KumuluzEE


  Sunesis 是开源项目 KumuluzEE 的赞助商，该项目实现了 Eclipse MicroProfile 规范。KumuluzEE 将自己定义为一个使用
  Java 和 Java EE 技术的轻量级微服务框架，并且是符合 Eclipse MicroProfile 规范的实现。KumuluzEE 允许你仅使用所需的组件来引导一个
  Java EE 应用程序，并且它还支持将微服务打包并运行为 uberjar。就像其他支持 uberjar 的实现一样，你可以通过输入以下命令来运行你的微服务：


  ```

  $ java -jar <可执行 JAR 文件>

  ```


  KumuluzEE 还提供了一个 POM 生成器，它可以创建一个 `pom.xml` 文件，其中包含你计划开发的微服务所需选择的选项和功能。POM 生成器提供了一个清晰有序的列表，列出了
  KumuluzEE 支持的配置文件、组件和项目，你可以选择将其包含在 `pom.xml` 文件中。


  KumuluzEE 为不同的 MicroProfile API 提供了少量示例。


  关于 KumuluzEE 实现 Eclipse MicroProfile 的文档，请参考 [`ee.kumuluz.com/microprofile`](https://ee.kumuluz.com/microprofile)。


  最后，KumuluzEE 在 [`ee.kumuluz.com/tutorials/`](https://ee.kumuluz.com/tutorials/)
  提供了一些有趣的教程。


  '
- '# Launcher


  富士通是开源项目 Launcher 的赞助商，该项目实现了 Eclipse MicroProfile 规范。Launcher 利用了内嵌的 GlassFish
  服务器和 Apache Geronimo MicroProfile API 实现。你可以将微服务作为 WAR 文件运行，如下所示：


  ```

  $ java -jar launcher-1.0.jar --deploy my-app.war

  ```


  此外，Launcher 可以创建 uberjar。要将微服务创建并运行为 uberjar，首先需要生成 uberjar，然后使用 `java -jar` 调用它，如下所示：


  ```

  $ java -jar launcher-1.0.jar --deploy my-app.war --generate my-uber.jar$ java -jar
  my-uber.jar

  ```


  Launcher 的文档非常稀少且有限。你可以在 [`github.com/fujitsu/launcher/blob/master/doc/Usage.adoc
  ...`](https://github.com/fujitsu/launcher/blob/master/doc/Usage.adoc) 找到关于 Launcher
  的使用信息。




