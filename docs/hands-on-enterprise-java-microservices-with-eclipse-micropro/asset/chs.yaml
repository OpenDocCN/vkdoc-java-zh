- '# 运行示例应用


  示例应用设计为从四个不同的 Shell 中运行，因此我们将它们组织成四个 Shell 窗口，如下所示：


  | Docker Shell | Web Shell |

  | Svcs1 Shell | Svcs2 Shell |


  在每个 Shell 中，按照后续相应章节中概述的命令运行。


