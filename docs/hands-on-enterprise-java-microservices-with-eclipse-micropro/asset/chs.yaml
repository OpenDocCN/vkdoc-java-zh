- '# 第一部分：数字经济中的 MicroProfile


  在本部分中，你将了解微服务在数字经济中的重要性，以及 MicroProfile 如何满足企业级 Java 微服务的需求。此外，你还将了解当前构成 MicroProfile
  的子项目、它对组织和开发者的价值主张，以及其当前的流程和治理（即如何推进工作）。


  本部分包含以下章节：


