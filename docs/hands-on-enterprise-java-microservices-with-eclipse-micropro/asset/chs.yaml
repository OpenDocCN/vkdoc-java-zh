- '# 响应式编程与未来发展


  事件驱动架构已经存在了很长时间，异步方法调用、消息驱动 Bean、事件控制逻辑等结构是开发人员熟悉的。然而，随着云资源的普及和按需可扩展性的采用，组织对能够利用无服务器和函数即服务类型环境的响应式编程方法重新产生了兴趣。Eclipse
  MicroProfile 还包括与响应式编程相关的规范，这些规范目前位于 Eclipse MicroProfile 伞形/平台版本之外。


  除此之外，Eclipse MicroProfile 沙盒中还有一些项目，社区正在讨论、实施和评估这些项目，以决定是否应将它们提升为正式的 MicroProfile
  项目。本章将帮助您了解当前与响应式编程相关的 MicroProfile 规范，并让您一窥伞形/平台版本之外以及 MicroProfile 沙盒中的项目已经启动和即将到来的内容。本章将涵盖以下主题：


  *   响应式消息传递概述

  *   Eclipse MicroProfile 中响应式消息传递架构的解释

  *   与响应式编程相关的 Eclipse MicroProfile 规范描述

  *   如何使用 Eclipse MicroProfile 响应式消息规范的示例

  *   伞形或平台版本之外的 MicroProfile 项目/规范概述

  *   Eclipse MicroProfile 沙盒内项目的描述

  *   对 Eclipse MicroProfile 与 Jakarta EE 当前关系的见解及其可能的未来分析




  '
- '# Eclipse MicroProfile 中的响应式编程工作


  在撰写本文时，属于 Eclipse MicroProfile 的响应式相关规范包括响应式流操作符、响应式消息传递和上下文传播。MicroProfile 社区内的响应式工作仍在不断发展，未来可能会出现新的规范，以及现有响应式相关规范的新版本。


  '
- '# 响应式消息传递概述


  [响应式宣言](https://www.reactivemanifesto.org/)定义了响应式系统的特征，包括用于构建弹性、可恢复系统的异步消息传递核心。这通常通过如下所示的图表来说明：


  ![](img/a5e7920f-3372-4247-a4d6-a9e52c974d3f.png)


  其理念是，通过**异步**消息进行交互能够促进可恢复性、弹性，进而提升响应能力。


  **MicroProfile 响应式消息传递**（**MP-RM**）规范旨在通过事件驱动的微服务，使基于微服务的应用具备响应式系统的特征。该规范侧重于通用性，适用于构建不同类型的架构和应用。


  可以使用响应式消息传递来实现与不同服务和资源的异步交互。通常，异步数据库驱动程序可以与响应式消息传递结合使用，以非阻塞和异步的方式读写数据存储。


  在构建微服务时，**命令查询职责分离**（**CQRS**）和事件溯源模式为微服务之间的数据共享提供了解决方案（[`martinfowler.com/bliki/CQRS.html`](https://martinfowler.com/bliki/CQRS.html)）。响应式消息传递也可以作为
  CQRS 和事件溯源机制的基础，因为这些模式将消息传递作为核心通信模式。


  '
- '# MicroProfile 响应式消息传递架构


  使用响应式消息传递的应用由 CDI Bean 组成，这些 Bean 消费、生产和处理消息。消息可以是应用内部的，也可以通过外部消息代理发送和接收，如下图所示：


  ![](img/8aec63b4-925c-414e-97b0-409c29421e65.png)


  此图显示了一个 Kafka 主题将消息发布到第一个 Bean，该 Bean 进行一些处理后将其发布到第二个 Bean，第二个 Bean 进行自己的处理/过滤，最后将消息作为
  AMQP 主题发布。


  正如我们将在研究 MP-RM 示例时看到的那样，应用 Bean 包含带有 `@Incoming` 和/或 `@Outgoing ...` 注解的方法。


  '
- '# 消息形态


  MP-RM 规范定义了许多受支持的签名类型，Bean 可以使用这些类型来定义发布和订阅行为。这些签名依赖于以下几个关键类型：


  *   `org.reactivestreams.Publisher`：响应式流 `Publisher<T>` 是潜在无限数量有序元素的提供者，根据从其链接订阅者收到的需求发布这些元素。

  *   `org.reactivestreams.Subscriber`：响应式流 `Subscriber<T>` 接口，用于向 `Publisher` 发出需求信号。它提供订阅信息事件、零个或多个数据事件以及错误和完成事件。

  *   `org.reactivestreams.Processor`：此响应式流 `Processor<T,R>` 接口简单地同时扩展了 `Subscriber<T>`
  和 `Publisher<R>`。

  *   `org.eclipse.microprofile.reactive.streams.operators.PublisherBuilder`：MP 响应式流操作符
  `PublisherBuilder` 接口允许你从各种来源构建响应式流 `Publisher`，并应用操作来转换/过滤最终发布的消息。

  *   `org.eclipse.microprofile.reactive.streams.operators.ProcessorBuilder`：MP 响应式流操作符
  `ProcessorBuilder` 接口允许你从各种来源构建响应式流 `Processor`，并应用操作来转换/过滤最终发布的消息。

  *   `org.eclipse.microprofile.reactive.streams.operators.SubscriberBuilder`：MP 响应式流操作符
  `ProcessorBuilder` 接口允许你从各种来源构建响应式流 `Subscriber`，并应用操作来转换/过滤最终发布的消息。

  *   `java.util.concurrent.CompletionStage`：此 JDK 并发 `util` 包接口定义了一个通常是异步的计算阶段，并计算一个动作或值。`CompletionStage`
  可以组合，以便可以执行一个阶段图来产生最终结果。

  *   `org.eclipse.microprofile.reactive.messaging.Message<T>`：一个 MP-RM 接口，它提供了对类型
  `T` 的负载的包装，以及一个用于确认收到消息的 `ack` 方法。


  定义了这些类型后，我们可以查看各种类型的方法，这些方法通过将消息推送到 MP-RM 支持的传出通道来生成数据。发布者方法类型的方法都带有 `@Outgoing("channel-name")`
  注解，并支持以下签名：


  *   `Publisher<Message<T>> method()`

  *   `Publisher<T> method()`

  *   `PublisherBuilder<Message<T>> method()`

  *   `PublisherBuilder<T> method()`

  *   `T method()`

  *   `CompletionStage<T> method()`


  消费者方法都带有 `@Incoming("channel-name")` 注解，并支持以下签名：


  *   `Subscriber<Message<T>> method()`

  *   `Subscriber<T> method()`

  *   `SubscriberBuilder<Message<T>>`

  *   `SubscriberBuilder<T>`

  *   `void method(Message<T> payload)`

  *   `void method(T payload)`

  *   `CompletionStage<?> method(Message<T> payload)`

  *   `CompletionStage<?> method(T payload)`


  同时消费和生产数据的方法称为处理器，它们将同时带有 `@Incoming("channel-in")` 和 `@Outgoing("channel-out")`
  注解。支持的签名如下：


  *   `Processor<Message<I>, Message<O>> method()`

  *   `Processor<I, O> method();`

  *   `ProcessorBuilder<Message<I>, Message<O>>method()`

  *   `ProcessorBuilder<I, O> method();`

  *   `Publisher<Message<O>> method(Message<I> msg)`

  *   `Publisher<O> method(I payload)`

  *   `PublisherBuilder<Message<O>> method(Message<I> msg)`

  *   `PublisherBuilder<O> method(I payload)`

  *   `Message<O> method(Message<I> msg)`

  *   `O method(I payload)`

  *   `CompletionStage<Message<O>> method(Message<I> msg)`

  *   `CompletionStage<O> method(I payload)`

  *   `Publisher<Message<O>> method(Publisher<Message<I>> pub)`

  *   `PublisherBuilder<Message<O>> method(PublisherBuilder<Message<I>> pub)`

  *   `Publisher<O> method(Publisher<I> pub)`

  *   `PublisherBuilder<O> method(PublisherBuilder<I> pub)`


  现在，我们将看一些使用具有这些签名的 Bean 来构建消息处理链的示例。


  '
- '# MicroProfile 响应式流操作符


  响应式流不仅仅需要将发布者连接到订阅者。通常，需要以某种方式操作流，例如应用包括 `map`、`filter` 和 `flatMap` 的操作。响应式流和 JDK
  都没有提供执行这些操作的 API。由于用户不应自行实现响应式流，这意味着目前执行这些操作的唯一方法是依赖提供操作符的第三方库，例如 Akka Streams、RxJava
  或 Reactor。


  MicroProfile 响应式流操作符 API 旨在填补这一空白，以便 MicroProfile 应用开发者无需引入第三方依赖即可操作响应式流。...




