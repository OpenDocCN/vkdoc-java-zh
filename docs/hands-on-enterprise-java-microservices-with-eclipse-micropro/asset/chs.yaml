- '# Helidon


  Oracle 公司是开源 Helidon 项目的赞助商，该项目实现了 Eclipse MicroProfile 规范。Helidon 是一组 Java 库，使开发者能够编写微服务。它利用了
  Netty（一个非阻塞 I/O 客户端服务器框架）。Helidon 是一个应用程序组装器，因为它会生成应用程序 JAR。构建好应用程序 JAR 后，你可以使用以下命令执行它：


  ```

  $ java -jar <可执行 JAR 文件>

  ```


  Helidon 有两种版本：SE 和 MP。Helidon SE 是所有 Helidon 库提供的函数式编程风格，它提供了一个名为 MicroFramework
  的微服务框架。Helidon MP 实现了微服务的 MicroProfile 规范，并且构建在 Helidon 库之上。虽然没有示例项目生成器工具，但 Helidon
  提供了丰富且详尽的文档手册。


  Helidon 的文档可以在 [`helidon.io/docs/latest/#/about/01_overview`](https://helidon.io/docs/latest/#/about/01_overview)
  找到。


  Helidon SE 提供了一个 WebServer，这是一个用于创建 Web 应用程序的异步和响应式 API。Helidon MP 提供了一个封装了 Helidon
  WebServer 的 MicroProfile 服务器实现。


  '
- '# 为当前实现生成示例代码


  如前几节所述，大多数 MicroProfile 实现并不提供自己的示例项目生成器。相反，它们只提供文档。这时，MicroProfile Starter 就派上用场了！


  MicroProfile Starter 由 MicroProfile 社区赞助，是一个为所有已通过 MicroProfile TCK 的 MicroProfile
  实现生成 MicroProfile 规范示例项目和源代码的工具。在第 2 章，*治理与贡献*中，我们带你了解了 MicroProfile Starter。为避免重复，我们只想指出，你可以通过下拉菜单选择
  MicroProfile 版本，如下所示：...


  '
- '# 其他实现 MicroProfile 的项目


  SmallRye 是一个开源项目，它开发了任何供应商或项目都可以使用的 Eclipse MicroProfile 实现。这是一项社区工作，欢迎所有人参与并为 SmallRye
  做出贡献，[`smallrye.io`](https://smallrye.io)。例如，社区最近将 Extensions for MicroProfile 项目贡献给了
  SmallRye，从而通过为 Config Sources、OpenAPI、Health、JAX-RS 和 REST Client 提供扩展来丰富其功能。


  Extensions for MicroProfile 项目网站是 [`www.microprofile-ext.org`](https://www.microprofile-ext.org)，其
  GitHub 仓库是 [`github.com/microprofile-extensions`](https://github.com/microprofile-extensions)。


  SmallRye 的实现已经过 Eclipse MicroProfile TCK 的测试并已通过。


  使用 SmallRye 的开源项目包括 Thorntail ([`thorntail.io`](https://thorntail.io))、WildFly ([`wildfly.org`](https://wildfly.org))
  和 Quarkus ([`quarkus.io`](https://quarkus.io))。


  '
- '# Quarkus


  开源项目 Quarkus 于 2019 年首次亮相。Quarkus 是一个 Kubernetes 原生 Java 栈，可以编译为原生机器语言或构建到 HotSpot
  (OpenJDK)。使用 Quarkus 时，你的应用程序消耗的内存非常少，性能出色，能够处理高吞吐量的调用，并且启动时间非常快（即，启动加上首次响应时间），这使得
  Quarkus 成为容器以及云原生和无服务器部署的绝佳运行时。Quarkus 还提供了一个扩展框架，允许对库和项目进行 *quarking*，使它们能够与 Quarkus
  无缝协作。


  Quarkus 的使命是将你的整个应用程序及其使用的库转换为最优化的...


  '
- "# 如何 quark 一个生成的 MicroProfile 项目\n\n在我们开始介绍如何 *quark* 一个由 MicroProfile Starter\
  \ 生成的 MicroProfile 项目的步骤之前，我们首先需要确保在你的环境中安装、定义并配置了 `GRAALVM_HOME`。为此，请遵循以下步骤：\n\n\
  1.  访问 `https://github.com/oracle/graal/releases` 并为你的操作系统下载最新版本的 GraalVM。\n\n2.\
  \  将下载的文件解压到你选择的子目录中。顺便说一下，解压会为 GraalVM 创建一个子目录，例如 `/Users/[你的主目录]/graalvm-ce-1.0.0-rc13`：\n\
  \n```\n$ cd $HOME\n$ tar -xzf graalvm-ce-1.0.0-rc16-macos-amd64.tar.gz\n```\n\n\
  3.  打开一个终端窗口，创建一个名为 `GRAALVM_HOME` 的环境变量，例如：\n\n```\n$ export GRAALVM_HOME=/Users/[你的主目录]/graalvm-ce-1.0.0-rc13/Contents/Home\n\
  ```\n\n现在我们已经安装了 GraalVM，我们可以继续介绍如何使用 MicroProfile Starter 来 *quark* 一个生成的 MicroProfile\
  \ 项目的步骤：\n\n1.  首先，将浏览器指向 [`start.microprofile.io`](https://start.microprofile.io)，然后选择\
  \ Thorntail 作为 MicroProfile 服务器。\n\n你也可以利用以下步骤来 *quark* 任何现有的 Java 应用程序。\n\n如果你不记得如何操作，请转到第\
  \ 2 章，*治理与贡献*，并按照 *MicroProfile Starter 快速浏览* 部分中的说明操作，直到第 5 步，此时 `demo.zip` 文件会下载到你本地的\
  \ `Downloads` 目录。\n\n2.  使用你喜欢的解压工具，展开 MicroProfile Starter 在你本地 `Downloads` 目录下生成的\
  \ `demo.zip` 文件。如果你的 `demo.zip` 文件没有自动展开，以下是执行此操作的命令（假设是 Linux；对于 Windows，请使用等效命令）：\n\
  \n```\n$ cd $HOME/Downloads\n$ unzip demo.zip\n```\n\n这将创建一个 `demo` 子目录，其下包含一个完整的目录树结构，其中包含使用\
  \ Maven 构建和运行 Thorntail 示例 MicroProfile 项目所需的所有源文件。\n\n3.  与其在 `demo` 子目录中进行更改，不如在\
  \ `demo` 子目录旁边创建第二个名为 `Qproj4MP` 的目录，如下所示：\n\n```\n$ mkdir $HOME/Downloads/Qproj4MP\n\
  ```\n\n这应该在 `Downloads` 目录中，与你现有的 `demo` 子目录同级，创建一个名为 `Qproj4MP` 的子目录。\n\n4.  将你的目录更改为\
  \ `Qproj4MP`，并通过输入以下命令创建一个空的 Quarkus 项目：\n\n```\n$ cd $HOME/Downloads/Qproj4MP\n\
  $ mvn io.quarkus:quarkus-maven-plugin:0.12.0:create \\\n -DprojectGroupId=com.example\
  \ \\\n -DprojectArtifactId=demo \\\n -Dextensions=\"smallrye-health, smallrye-metrics,\
  \ smallrye-openapi, smallrye-fault-tolerance, smallrye-jwt, resteasy, resteasy-jsonb,\
  \ arc\"\n```\n\n5.  在 `Qproj4MP` 目录中，删除 `src` 子目录，并通过输入以下命令将其替换为 Thorntail 示例 MicroProfile\
  \ 项目中的 `src` 子目录：\n\n```\n$ cd $HOME/Downloads/Qproj4MP  # 确保你在 Qproj4MP 子目录中\n\
  $ rm -rf ./src\n$ cp -pR $HOME/Downloads/demo/src .\n```\n\n6.  Quarkus 和 Thorntail\
  \ 对某些配置和 Web 应用相关文件应放置的位置有不同的期望。因此，为了让 Quarkus 满意，让我们通过输入以下命令来复制一些文件：\n\n```\n$\
  \ cd $HOME/Downloads/Qproj4MP # 确保你在 Qproj4MP 子目录中\n$ mkdir src/main/resources/META-INF/resources\n\
  $ cp /Users/csaavedr/Downloads/demo/src/main/webapp/index.html src/main/resources/META-INF/resources\n\
  $ cp -p src/main/resources/META-INF/microprofile-config.properties src/main/resources/application.properties\n\
  ```\n\n我们本可以将这些文件从其原始位置移动过来，但在此示例中我们选择只复制它们。\n\n\n\n7.  由 MicroProfile Starter 生成的\
  \ Thorntail 示例 MicroProfile 项目，其 `src` 子目录内容已复制到 `Qproj4MP` 中，该项目使用了一个名为 `bouncycastle`\
  \ 的安全库。原因是生成的代码包含一个 MicroProfile JWT 传播规范的示例，该规范允许你在微服务之间传播安全信息。因此，我们还需要在 Quarkus\
  \ 项目的 POM 文件中添加两个依赖项，一个用于 `bouncycastle`，另一个用于 `nimbusds`。\n\n在 MicroProfile Starter\
  \ 的下一个 sprint 版本中，`bouncycastle` 依赖项将从 Thorntail 服务器代码生成中移除。\n\n要添加这些依赖项，请编辑 `$HOME/Downloads/Qproj4MP`\
  \ 目录下的 `pom.xml` 文件，并在 `<dependencies>` 部分输入以下代码块：\n\n```\n <dependency>\n <groupId>org.bouncycastle</groupId>\n\
  \ <artifactId>bcpkix-jdk15on</artifactId>\n <version>1.53</version>\n <scope>test</scope>\n\
  \ </dependency>\n <dependency>\n <groupId>com.nimbusds</groupId>\n <artifactId>nimbus-jose-jwt</artifactId>\n\
  \ <version>6.7</version>\n <scope>test</scope>\n </dependency>\n```\n\n现在，我们已经准备好编译这个“Quarkus\
  \ 化”的 MicroProfile 项目了。\n\n8.  除了支持构建在 OpenJDK 上运行的 Java 项目外，Quarkus 还支持将 Java 项目一直编译到机器码。输入以下命令，将“Quarkus\
  \ 化”的示例项目编译为原生代码：\n\n```\n$ cd $HOME/Downloads/Qproj4MP # 确保你在 Qproj4MP 子目录中\n$\
  \ ./mvnw package -Pnative\n```\n\n9.  要运行该应用程序，请输入以下命令：\n\n```\n$./target/demo-1.0-SNAPSHOT-runner\n\
  ```\n\n要测试该应用程序，请按照第 2 章（*治理与贡献*）中 *MicroProfile Starter 快速入门* 部分从第 10 步开始的说明进行操作。\n\
  \n10.  如果你想在开发模式下运行这个“Quarkus 化”的项目，请先停止正在运行的进程，然后输入以下命令：\n\n```\n$ cd $HOME/Downloads/Qproj4MP\
  \ # 确保你在 Qproj4MP 子目录中\n$ ./mvnw compile quarkus:dev\n```\n\n此时，你可以使用你选择的 IDE（例如\
  \ Visual Studio Code 或 Eclipse IDE）打开该项目，并开始修改源代码。Quarkus 支持热重载，这意味着，一旦你对源代码进行了任何更改，Quarkus\
  \ 就会在后台重建并重新部署你的应用程序，以便你可以立即查看并测试更改的效果。此外，如果你在源代码中犯了语法错误，Quarkus 会将有意义的错误信息传播到 Web\
  \ 应用程序，以帮助你修复错误，从而提高你的工作效率。\n\n11.  如果你想生成一个可执行的应用程序 JAR，请输入以下命令：\n\n```\n$ cd $HOME/Downloads/Qproj4MP\
  \ # 确保你在 Qproj4MP 子目录中\n$ ./mvn clean package\n```\n\n12.  要运行可执行的应用程序 JAR，请输入以下命令：\n\
  \n```\n$ java -jar target/demo-1.0-SNAPSHOT-runner.jar\n```\n\n在应用程序 JAR 旁边会创建一个\
  \ `lib` 目录，其中包含运行所需的库文件。\n\n我们已经向你展示了“Quarkus 化”一个由 MicroProfile Starter 生成的 MicroProfile\
  \ 项目的步骤。虽然这些步骤适用于一个特定的生成项目，但你可以使用相同的指令来“Quarkus 化”一个现有的 Java 应用程序或微服务，以便利用 Quarkus\
  \ 提供的优势，例如低内存消耗、快速启动时间，以及将 Java 代码编译为原生代码，从而使其能够在容器、云和函数即服务环境中高效运行。无论你使用哪种 MicroProfile\
  \ 实现，MicroProfile 为最终用户提供的一个巨大好处是互操作性。这意味着你可以使用不同 MicroProfile 实现的微服务来设计应用程序，这正是下一节的主题。\n\
  \n"
- '# MicroProfile 互操作性 – 会议应用程序


  **会议应用程序** 首次于 2016 年 11 月在比利时 Devoxx 大会上展示（[`www.youtube.com/watch?v=iG-XvoIfKtg`](https://www.youtube.com/watch?v=iG-XvoIfKtg)），是一个
  MicroProfile 演示，展示了不同 MicroProfile 供应商实现的集成和互操作性。这很重要，因为它展示了规范中实现与接口的分离，提供了一个平台，允许供应商开发并提供他们自己的实现，这些实现可以与其他竞争性实现共存。所有实现共有的公共接口也为最终用户提供了灵活性和选择权，可以使用任何
  MicroProfile 实现……


  '
- '# 总结


  在本章中，我们了解了市场上目前存在的开源 MicroProfile 实现，它们属于哪种类型，如何获取关于每种实现的更多信息，以及如何使用 MicroProfile
  Starter 为这些实现生成示例代码。我们还介绍了最新的 MicroProfile 实现新成员 Quarkus，它在解释模式和编译模式下显著改善了 Java
  的启动时间和内存消耗，进一步改进了用于云原生微服务和无服务器环境的 MicroProfile。你还了解了会议应用程序，它展示了 MicroProfile 在不同实现之间的互操作性。


  作为 Eclipse MicroProfile 的使用者，并且由于其跨实现互操作性的特性，你可以自由选择最适合你组织或最符合你环境的实现，最终让你能够为正确的任务选择正确的工具。此外，你无需为了获得商业支持的
  Eclipse MicroProfile 版本而局限于单一供应商，因此，你有优势根据自己的条件进行协商，并从不同供应商提供的丰富 MicroProfile 功能集中进行选择。


  在下一章中，我们将介绍一个涵盖所有 MicroProfile API 的完整代码示例。


  '
