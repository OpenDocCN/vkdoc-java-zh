- '# 一个可运行的 Eclipse MicroProfile 代码示例


  在本章中，我们将讨论一个示例应用程序，该应用程序使用了本书前面介绍的各种 MicroProfile 功能。我们在本章中将使用的 MicroProfile 运行时是
  Quarkus 运行时，这是一个为 GraalVM 和 OpenJDK HotSpot 量身定制的 Kubernetes 原生 Java 栈，由精选的 Java
  库和标准构建而成。我们将涵盖的关键主题包括：


  *   使用配置来控制应用程序和 MicroProfile 容器的行为

  *   实际的健康检查

  *   使用外部 JWT 安全提供程序保护应用程序

  *   集成并查看 Jaeger 实例的跟踪信息

  *   使用 Swagger 检查微服务端点信息

  *   查看单个……




  '
- '# 技术要求


  本章需要以下环境：


  *   一个集成开发环境（IDE）

  *   已安装 JDK 1.8+，并正确配置了 `JAVA_HOME`

  *   Apache Maven 3.5.3+

  *   一个正在运行的 Docker 环境


  本章的代码可在以下地址找到：[`github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter08-mpcodesample`](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter08-mpcodesample)


  本章的示例可以使用 Quarkus 集成的 GraalVM ([`github.com/oracle/graal/releases/tag/vm-1.0.0-rc16`](https://github.com/oracle/graal/releases/tag/vm-1.0.0-rc16))
  编译成本地二进制文件。这需要额外安装 1.0-RC16 版本的 Graal VM 和一个可用的 C 语言开发环境。关于生成本地镜像的详细要求，请参考 [`quarkus.io/guides/building-native-image-guide`](https://quarkus.io/guides/building-native-image-guide)。


  '
