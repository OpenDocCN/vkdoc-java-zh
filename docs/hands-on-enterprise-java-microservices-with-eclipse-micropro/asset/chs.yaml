- '# 前言


  本书将帮助你了解 Eclipse MicroProfile，这是一个始于 2016 年的企业级 Java 微服务开源规范，涵盖其背景和历史、对组织和企业的价值主张、社区治理、当前的
  Eclipse MicroProfile 子项目（随着开源项目的发展，更多子项目正在添加中）、其实现及其互操作性。本书还将展望 Eclipse MicroProfile
  的未来方向，提供一个在 Red Hat 的 Eclipse MicroProfile 实现（Thorntail，Red Hat Runtimes 提供的运行时之一）中的示例应用，以及关于在混合云和多云环境中运行
  Eclipse MicroProfile 的指导和建议。本书将采用循序渐进的方法，帮助你理解 Eclipse MicroProfile 项目及其在市场上的实现。


