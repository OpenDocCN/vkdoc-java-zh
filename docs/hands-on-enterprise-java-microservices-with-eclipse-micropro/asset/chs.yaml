  \ MicroProfile 的不同功能。\n\n6.  切换到解压 demo 项目的目录。在我的例子中，它位于我的 `Downloads` 目录中：\n\n\
  ```\n$ cd Downloads/demo\n```\n\n7.  输入以下命令编译生成的示例代码：\n\n```\n$ mvn clean package\n\
  ```\n\n8.  运行微服务：\n\n```\n$ java -jar target/demo-thorntail.jar\n```\n\n9.  几秒钟后，你将看到以下消息：\n\
  \n```\n$ INFO  [org.wildfly.swarm] (main) WFSWARM99999: Thorntail is Ready\n```\n\
  \n这表明微服务已启动并正在运行。\n\n10. 打开你喜欢的 Web 浏览器，并将其指向 `http://localhost:8080/index.html`。\n\
  \n这将打开示例 Web 应用程序，如下所示：\n\n![](img/37b7bd6b-1714-437d-aacf-8dd2123ff8cd.png)\n\n\
  11. 要查看 MicroProfile Config 的功能，请点击 **注入的配置值**。将打开一个窗口选项卡，显示如下内容：\n\n![](img/7bf94342-0d9e-43ad-8c5e-0cf0bc67be4a.png)\n\
  \n12. 同样，如果你点击 **通过查找获取配置值**，将显示另一个窗口选项卡，如下所示：\n\n![](img/d58d0ff0-17c1-4cf7-8a1c-647dfc6f5e2a.png)\n\
  \n我们之前看到的参数值的*注入值*和*查找值*定义在 `./demo/src/main/resources/META-INF/microprofile-config.properties`\
  \ 文件中，如下所示：\n\n```\n$ cat ./src/main/resources/META-INF/microprofile-config.properties\n\
  injected.value=Injected value\nvalue=lookup value\n```\n\n\n\n13.  假设你需要在开发环境和系统测试环境中为`value`参数使用不同的值。你可以通过在启动微服务时在命令行中传递参数来实现，如下所示（请确保先在终端窗口中按*Ctrl*\
  \ + *C*退出正在运行的应用程序）：\n\n```\n$ java -jar target/demo-thorntail.jar -Dvalue=hola\n\
  ```\n\n14.  现在，当你点击“通过查找配置值”时，会显示另一个窗口标签页：\n\n![](img/faf2d928-0fb2-49ef-82bc-9a67409b6aa6.png)\n\
  \n请注意，执行此逻辑的源代码位于生成的`./src/main/java/com/example/demo/config/ConfigTestController.java`文件中。\n\
  \n15.  要查看 MicroProfile 容错（Fault Tolerance）的功能，请点击“超时后的回退（Fallback after timeout）”。将打开一个窗口标签页，显示如下内容：\n\
  \n![](img/dc1dcb42-0d68-4030-b163-186cae70d6bd.png)\n\n有关 MicroProfile Config API\
  \ 的更多信息，请参阅其文档（[`github.com/eclipse/microprofile-config/releases/download/1.3/microprofile-config-spec-1.3.pdf`](https://github.com/eclipse/microprofile-config/releases/download/1.3/microprofile-config-spec-1.3.pdf)）。\n\
  \n示例代码正在结合`@Timeout`使用`@Fallback`注解。以下是示例代码：\n\n```\n@Fallback(fallbackMethod =\
  \ \"fallback\") // 回退处理器\n   @Timeout(500)\n   @GET\n   public String checkTimeout()\
  \ {\n     try {\n       Thread.sleep(700L);\n     } catch (InterruptedException\
  \ e) {\n       //\n     }\n     return \"Never from normal processing\";\n   }\n\
  \   public String fallback() {\n   return \"Fallback answer due to timeout\";\n\
  \   }\n```\n\n`@Timeout`注解指定，如果方法执行时间超过 500 毫秒，则应抛出超时异常。此注解可以与`@Fallback`一起使用，在本例中，当发生超时异常时，会调用名为`fallback`的回退处理器。在前面生成的示例代码中，超时异常总是会发生，因为该方法正在执行——即休眠\
  \ 700 毫秒，这超过了 500 毫秒。\n\n请注意，执行此逻辑的源代码位于生成的`./src/main/java/com/example/demo/resilient/ResilienceController.java`文件中。\n\
  \n有关 MicroProfile 容错 API 的更多信息，请参阅其文档（[`github.com/eclipse/microprofile-opentracing/releases/download/1.2/microprofile-opentracing-spec-1.2.pdf`](https://github.com/eclipse/microprofile-opentracing/releases/download/1.2/microprofile-opentracing-spec-1.2.pdf)）。\n\
  \nMicroProfile 社区欢迎您对 MicroProfile Starter 项目的持续发展提供反馈、协作或贡献。要提供反馈，您需要点击 MicroProfile\
  \ Starter“Beta 版”（[`start.microprofile.io/`](https://start.microprofile.io/)）登陆页面右上角的“提供反馈（Give\
  \ Feedback）”按钮并创建一个问题。\n\nMicroProfile Starter 项目将请求的项目和修复内容分组并按里程碑确定优先级，目标是持续发布。MicroProfile\
  \ Starter 工作组定期举行会议，如果您希望利用您的开发技能帮助该项目，请发送电子邮件至`microprofile@googlegroups.com`或加入其\
  \ Gitter 频道（[`gitter.im/eclipse/microprofile-starter`](https://gitter.im/eclipse/microprofile-starter)）的讨论。项目信息（包括其源代码的位置）可在[`wiki.eclipse.org/MicroProfile/StarterPage`](https://wiki.eclipse.org/MicroProfile/StarterPage)找到。\n\
  \n"
- '# 总结


  在本章中，我们了解了 Eclipse MicroProfile 项目的轻量级治理流程、其快速的创新方法，以及如何使用沙箱来促进协作并鼓励代码开发和文档编写。我们还了解了其子项目、这些子项目的领导者，以及它们如何作为独立版本或作为
  Eclipse MicroProfile 伞式版本的一部分发布。


  此外，您还了解了 MicroProfile Starter，这是一个 Maven 项目生成工具，它提供代码示例，以便开发人员可以快速启动他们的 MicroProfile
  应用程序。最后，我们初步了解了如何使用 Eclipse MicroProfile Config 结构轻松修改应用程序的属性，...


  '
