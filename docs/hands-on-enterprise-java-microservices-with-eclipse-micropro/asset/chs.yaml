- '# MicroProfile OpenAPI 与类型安全 REST 客户端


  Eclipse MicroProfile 为 Java 微服务提供了一套丰富的规范。其中，Eclipse MicroProfile OpenAPI 和 Eclipse
  MicroProfile REST Client 分别用于帮助编写微服务的 API 文档，并提供在 REST 端点上进行类型安全调用的 API。OpenAPI
  简化了微服务端点的文档编写，并使这些元数据可供第三方开发者查阅。类型安全的 REST 客户端则简化了对象与 HTTP 或 JSON 之间的序列化与反序列化。


  本章将涵盖以下主题：


  *   每个规范所提供的功能

  *   部分功能的简单代码示例

  *   如何获取关于每个规范的更多信息


  '
- '# MicroProfile OpenAPI 及其功能简介


  推动数字经济的移动力量促使企业需要建立全渠道的开发方法，以优化成本、提高效率并改善客户体验。这种方法的推动者是 API，它催生了 API 经济以及诸如 API
  主导或 API 优先的开发实践等概念。此外，微服务架构已成为现代开发的首选架构。微服务之间基于 API（即 RESTful）的通信已被采纳为*事实上的*标准，因为它非常适合微服务的*智能端点与哑管道*、*去中心化治理*以及*去中心化数据管理*等特性。


  然而，随着微服务架构中微服务数量的增加，其管理可能会变得棘手。不过，你可以通过微服务的 API 来管理它们。你可以将管理、安全、负载均衡和限流策略应用于微服务前端的
  API。


  Eclipse MicroProfile OpenAPI 为开发者提供了 Java 接口，用于从其 Java RESTful Web 服务（JAX-RS）应用程序生成
  OpenAPI v3 文档。该规范要求，一个经过完整处理的 OpenAPI 文档必须能够通过 HTTP `GET` 操作在根 URL `/openapi` 上获取，如下所示：


  ```

  GET http://myHost:myPort/openapi

  ```


  所需的协议是 `http`。然而，强烈建议规范的实现者也支持 `https` 协议，以便安全地连接到 OpenAPI 端点。


  OpenAPI 文档的创建有三个来源。这三个来源（将在本章后续章节中描述）如下：


  *   通过处理应用程序中的 JAX-RS 注解（以及可选的 OpenAPI 注解）生成

  *   由应用程序通过提供一个实现 `OasModelReader` 的 Java 类以编程方式构建

  *   包含在应用程序部署中的静态 OpenAPI 文档


  这三个来源（任意组合）会被合并以生成一个单一的 OpenAPI 文档，该文档可以被过滤（通过提供一个实现 `OasFilter` 接口的 Java 类），然后通过前述的
  `/openapi` 端点提供服务。


  '
- '# 配置


  MicroProfile OpenAPI 规范利用 MicroProfile 配置规范来配置其参数和值。例如，为了注入配置值，MicroProfile OpenAPI
  可以使用默认和自定义的 ConfigSource。


  有关 ConfigSource 的更多信息，可以访问 [`github.com/eclipse/microprofile-config/blob/master/spec/src/main/asciidoc/configsources.asciidoc`](https://github.com/eclipse/microprofile-config/blob/master/spec/src/main/asciidoc/configsources.asciidoc)。


  有许多可配置项。下表包含了其中一部分：


  | **配置项** | **描述** |

  | --- | --- |

  | `mp.openapi.scan.di sable` | 用于禁用注解扫描的配置属性。默认值为 `false`。 |

  | `mp.openapi.servers` | 用于指定全局服务器列表的配置属性，这些服务器... |


  '
- '# 生成 OpenAPI 文档


  如前所述，MicroProfile OpenAPI 规范要求从三个来源的组合中生成一个 OpenAPI 文档。


  然后，你有多种选择：


  *   使用 MicroProfile OpenAPI 注解扩展由 JAX-RS 注解生成的 OpenAPI 文档。

  *   利用 `/openapi` 的初始输出，将其作为开始记录 API 的参考。在这种情况下，你可以在编写任何代码之前编写静态 OpenAPI 文件（本章后续部分将描述），这是组织锁定
  API 契约的常用方法，即 API 优先的开发实践。

  *   通过使用编程模型进行编码来引导或完成 OpenAPI 模型树，这将在本章后面介绍。


  此外，你可以在 OpenAPI 模型构建完成后使用过滤器对其进行更新。


  '
- '# MicroProfile OpenAPI 注解


  OpenAPI 信息最常见的来源可能是构成标准 JAX-RS 应用程序定义的一组注解。这些注解，连同 MicroProfile OpenAPI 规范定义的额外（可选）注解，可以被
  MicroProfile 平台扫描和处理，以生成 OpenAPI 文档。


  MP OpenAPI 规范要求能够从纯 JAX-RS 2.0 应用程序生成有效的 OpenAPI 文档。如果你是 OpenAPI 新手，可以简单地将现有的 JAX-RS
  应用程序部署到 MicroProfile OpenAPI 运行时，并查看 `/openapi` 的输出。


  为了填充生成的 OpenAPI 文档的更多细节，你可以进一步注解你的...


  '
- "# 使用示例\n\n以下是一些 MicroProfile OpenAPI 注解的使用示例：\n\n示例 1 – 简单的操作描述（缩写）：\n\n```\n@GET\n\
  @Path(\"/findByMake\")\n@Operation(summary = \"Finds cars by make\",\n         \
  \  description = \"Find cars by their manufacturer\")\npublic Response findCarsByMake(...)\n\
  { ... }\n```\n\n以下是示例 1 的输出：\n\n```\n/car/findByMake:\n  get:\n    summary: Finds\
  \ cars by make\n    description: Find cars by their manufacturer\n```\n\n示例 2 –\
  \ 具有不同响应的操作（缩写）：\n\n```\n@GET\n@Path(\"/{name}\")\n@Operation(summary = \"Get customer\
  \ by name\")\n  @APIResponse(description = \"The customer\",\n             content\
  \ = @Content(mediaType = \"application/json\",\n                               \
  \ schema = @Schema(implementation = Customer.class))),\n@APIResponse(responseCode\
  \ = \"400\", description = \"Customer not found\")\npublic Response getCustomerByName(\n\
  \        @Parameter(description = \"The name of the customer to be fetched\", required\
  \ = true) @PathParam(\"name\") String name)\n\n{...}\n```\n\n以下是示例 2 的输出：\n\n```\n\
  /customer/{name}:\n    get:\n       summary: Get customer by name\n       operationId:\
  \ getCutomerByName\n       parameters:\n       - name: name\n         in: path\n\
  \         description: 'The name of the customer to be fetched'\n         required:\
  \ true\n         schema:\n           type: string\n       responses:\n         default:\n\
  \           description: The customer\n           content:\n             application/json:\n\
  \               schema:\n                 $ref: '#/components/schemas/Customer'\n\
  \         400:\n           description: Customer not found\n```\n\n更多示例，请参考 MicroProfile\
  \ OpenAPI 规范维基页面：[`github.com/eclipse/microprofile-open-api/wiki`](https://github.com/eclipse/microprofile-open-api/wiki)。\n\
  \n\n\n"
- '# 静态 OpenAPI 文件


  如本章前面所述，静态 OpenAPI 文件是创建 OpenAPI 文档的三个来源之一。下面，我们将简要介绍如何生成此类文件以及如何将其包含在部署中。许多组织采用
  API 优先的开发实践，这意味着甚至在实现任何代码之前，就需要定义静态 OpenAPI 文件。


  首先，你可以使用开源编辑器（如 Swagger Editor ([`editor.swagger.io`](https://editor.swagger.io))）创建
  OpenAPI 文档。以下截图展示了这一点：


  ![](img/db11ee83-6eab-4cfd-a4c1-089959d1e197.png)


  使用此编辑器，你可以从示例开始...


