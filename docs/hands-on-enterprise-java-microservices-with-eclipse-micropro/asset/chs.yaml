- '# 在多云环境中使用 MicroProfile


  微服务和微服务架构是云和多云环境（包括混合云部署）的理想开发方法，在这种环境中，您的应用程序既包含本地逻辑，也包含在云中运行的逻辑。Eclipse MicroProfile
  是一个优化 Java 以适应微服务架构的规范，因此提供了相应的构造，使您能够用 Java 和云实现微服务。这些主题将帮助您理解为什么 Eclipse MicroProfile
  是开发混合云和多云环境应用程序的理想选择，以及在这些类型的部署中使用它时必须考虑哪些因素。


  在本章中，我们将讨论以下内容...




  '
- '# 使用 Eclipse MicroProfile 进行云原生应用开发


  什么是云原生应用？通常，**云原生**的定义包含以下特征：


  *   设计为松散耦合的服务，例如微服务

  *   通过语言无关的通信协议进行交互的松散耦合服务，这使得微服务可以用不同的编程语言和框架来实现

  *   轻量级容器，可按需或根据资源利用率指标进行弹性伸缩

  *   通过敏捷 DevOps 流程进行管理，云原生应用的每个微服务都经历独立的生命周期，该生命周期通过使用**持续集成/持续交付**（**CI/CD**）管道的敏捷流程进行管理


  然而，Eclipse MicroProfile 的目标是为微服务架构优化 Java，那么它是否适合云原生应用开发呢？容器原生开发又如何？微服务、云原生开发和容器原生开发之间是什么关系？它们有何不同或相似之处？让我们一探究竟！


  '
- '# 微服务与云原生与容器原生


  首先，让我们从应用开发的角度来区分这三个术语之间的差异。正如我们在第 1 章《Eclipse MicroProfile 简介》中讨论的那样，企业级 Java 微服务具有以下特征：


  *   它是使用 Java 语言编写的微服务。

  *   它可以使用任何 Java 框架。

  *   它可以使用任何 Java API。


  *   它必须达到企业级标准，这意味着它必须具有高可靠性、可用性、可扩展性、安全性、健壮性和性能。

  *   它必须满足微服务的所有特征，这些特征列于 [`martinfowler.com/microservices/`](https://martinfowler.com/microservices/)。


  根据其定义，微服务并未规定底层技术的具体细节……


  '
- '# 那十二要素应用呢？


  与微服务和微服务架构的定义一样，十二要素应用并未规定底层技术，例如编程语言、数据库、缓存等，或用于实现它们的框架。十二要素应用是一种用于实现应用的方法论。这十二个要素如下：


  *   一份在版本控制中追踪的基准代码，多次部署

  *   显式声明并隔离依赖关系

  *   在环境中存储配置

  *   将后端服务视为附加资源

  *   严格分离构建和运行阶段

  *   将一个或多个无状态进程的形式执行应用

  *   通过端口绑定导出服务

  *   通过进程模型进行横向扩展

  *   通过快速启动和优雅关闭最大化健壮性

  *   尽可能保持开发、预发布和生产环境相似

  *   将日志视为事件流

  *   将管理/管理任务作为一次性进程运行


  使用此方法论实现应用有助于我们实现以下目标：


  *   最小化新加入项目的开发人员的时间和成本

  *   提供执行环境之间的可移植性


  *   轻松将应用部署到云平台

  *   最小化开发与生产环境之间的差异

  *   无需更改即可进行扩展


  您可以在 [`12factor.net`](https://12factor.net) 阅读关于这十二个要素的全部内容。


  十二要素应用是开发人员在设计和实现微服务及应用时可以遵循的一种方法论，与用于实现它们的编程语言或框架无关。开发人员可以使用 Eclipse MicroProfile
  作为框架，通过十二要素应用来实现微服务。十二要素应用和 Eclipse MicroProfile 并非互斥，而是相辅相成。


  但是，除了十二要素应用之外，还有其他设计和实现应用的方法论吗？无服务器和**函数即服务**（**FaaS**）技术又如何？Eclipse MicroProfile
  如何融入这些较新的云原生技术？


  '
- '# 那无服务器和 FaaS 呢？


  无服务器和 FaaS 云原生技术在市场上一直保持着稳定的兴趣和增长，所有主要云提供商（即 AWS Lambda、Azure Functions、Oracle Functions
  和 Google Cloud Functions）提供的服务都证明了这一点。在一个组织越来越多地使用云进行开发和生产工作负载的时代，计算和内存成本是需要跟踪和监控的运营支出，FaaS
  之所以有吸引力，是因为它将计算和内存管理从用户那里抽象出来，使用户能够专注于开发业务逻辑，从而比以往任何时候都更高效。


  使用 FaaS，开发人员无需设置虚拟机和内存……


  '
- '# 云原生应用开发


  云原生应用开发有两个互补的方面或组成部分：应用服务和基础设施服务。应用服务加速云原生应用业务逻辑的开发，而基础设施服务则加速其交付和部署。这两个方面是互补的，并且是云原生应用开发不可或缺的组成部分。两者缺一不可。它们本质上是云原生应用开发的阴阳两面，如下图所示：


  ![](img/5396deb8-7e59-4be5-9b20-a31287abeed3.png)


  正如我们在本章前面提到的，云原生应用开发是一种构建和运行应用的方法，它充分利用了云计算模型，该模型基于四个关键原则：


  *   基于服务的架构（迷你服务、微服务、SOA 服务等）

  *   用于服务间通信的 API 驱动方法

  *   基于容器的基础设施

  *   DevOps 流程


  下图描绘了云原生应用开发的四个关键原则：


  ![](img/5994cf8f-77e2-4906-b576-0a8742fe81b5.png)


  如上图所示，架构和通信方面与云原生应用的开发关注点相关，而基础设施和流程方面则与其交付/部署相关。


  正在采用云原生应用开发的组织可以从八个步骤中受益，如电子书《通往云原生应用之路：**指导您旅程的 8 个步骤**》所述。


  要获取电子书《通往云原生应用之路：**指导您旅程的 8 个步骤**》，请参考 [`www.redhat.com/en/resources/path-to-cloud-native-applications-ebook`](https://www.redhat.com/en/resources/path-to-cloud-native-applications-ebook)。让我们讨论一下
  Eclipse MicroProfile 如何在这八个步骤中发挥作用：




  1.  **发展 DevOps 文化与实践**：“*通过拥抱 DevOps 的原则和文化价值观，并围绕这些价值观组织你的团队，来利用新技术、更快速的方法以及更紧密的协作。*”尽管这是一个与组织和流程相关的步骤，但
  Eclipse MicroProfile 作为微服务规范，非常适合这种文化与流程的适配，因为微服务因其特性，能够紧密支持 DevOps 流程。

  2.  **使用快速单体加速现有应用**：“*通过迁移到现代化的、基于容器的平台来加速现有应用——并将单体应用拆分为微服务或迷你服务，以获得额外的效率提升。*”在将单体应用拆分为微服务时，Eclipse
  MicroProfile 能提供巨大帮助。当你在单体应用中识别出限界上下文时，可以考虑使用 Eclipse MicroProfile 来实现每个微服务，这些微服务负责实现每个限界上下文的逻辑。

  3.  **使用应用服务加速开发**：“*通过可重用性加速软件开发。云原生应用服务是开箱即用的开发者工具。然而，这些可重用组件必须经过优化并集成到底层云原生基础设施中，才能最大化其效益。*”**内存数据网格**和消息代理是能够加速业务逻辑开发的应用服务。使用
  Eclipse MicroProfile 开发的微服务，可以通过在其方法体内调用这些应用服务来利用它们。Eclipse MicroProfile 在集成应用服务（如内存数据网格或消息代理）时，不会施加任何限制。

  4.  **为正确的任务选择正确的工具**：“*使用一个支持框架、语言和架构最佳组合的、基于容器的应用平台——并且该平台可以根据你的特定业务应用需求进行定制。*”Eclipse
  MicroProfile 是开发者在为正确任务选择正确工具时可以使用的一个工具。例如，红帽应用运行时是一系列运行时和工具的集合，其中包括 Eclipse MicroProfile、Node.js、Spring
  Boot 和 Vertex。

  5.  **为开发者提供自助式、按需的基础设施**：“*使用容器和容器编排技术来简化对底层基础设施的访问，赋予 IT 运维团队控制权和可见性，并在各种基础设施环境（如数据中心、私有云和公有云）中提供强大的应用生命周期管理。*”你使用
  Eclipse MicroProfile 开发的微服务可以部署到一个或多个容器中。通过轻松管理这些容器以及运行在其上的微服务架构，你可以加速开发周期，从而更快地为业务交付价值。

  6.  **自动化 IT 以加速应用交付**：“*创建自动化沙盒以学习自动化语言和流程，跨组织建立协作对话以定义服务需求，创建自助服务目录以赋能用户并加速交付，并使用计量、监控和计费策略及流程。*”Eclipse
  MicroProfile 提供了指标、容错和健康检查等功能，所有这些都可以作为 IT 自动化流程的输入。

  7.  **实施持续交付和高级部署技术**：“*通过自动化交付、CI/CD 流水线、滚动蓝绿部署和金丝雀部署以及 A/B 测试，加速云原生应用的交付。*”将微服务与
  CI/CD 结合使用可以促进高级部署技术。例如，你可以引入一个基于 MicroProfile 的、带有新功能的微服务，作为蓝绿部署或金丝雀部署的一部分投入生产，一旦证明新功能按预期工作，就将所有流量切换到该服务。

  8.  **发展更模块化的架构**：“*选择一种适合你特定需求的模块化设计，可以使用微服务、单体优先方法、迷你服务或它们的组合。*”对于这一步，你可以使用 Eclipse
  MicroProfile 为新应用开发微服务，或者在将单体应用中的特定限界上下文拆分为微服务时使用它。


  现在我们已经讨论了 Eclipse MicroProfile 如何促进云原生应用开发，以及它如何在八个步骤中的每一步提供帮助，以指导你踏上云原生应用之旅，接下来让我们转向跨云运行基于
  MicroProfile 的应用这一主题。


  '
- '# 跨云开发和运行 MicroProfile 应用


  MicroProfile 提供了哪些功能来支持跨云开发？微服务和对基于 HTTP REST API 的、与语言无关的通信的支持，是它所支持的两个主要特性。此外，MicroProfile
  Config 支持集成定义与云环境集成的云环境变量。MicroProfile Health Check 支持与云环境健康检查的集成。MicroProfile Metrics
  和 MicroProfile OpenTracing 支持与 DevOps 监控任务的集成。最后，MicroProfile 容错支持独立微服务之间的回退和恢复行为。


  Eclipse MicroProfile ...


  '
- '# 裸机、虚拟机与容器


  决定是在裸机、虚拟机还是容器上运行基于 MicroProfile 的微服务或应用，取决于你应用的具体需求。事实上，底层云计算资源类型的确定完全取决于你的应用需求，而不是用于其开发的框架，即
  Eclipse MicroProfile。例如，如果你的应用或微服务需要实时或近实时的响应时间，那么你很可能倾向于选择裸机或容器（在裸机上运行）部署。这个决定与你用来编写业务逻辑的框架无关，无论它是
  Eclipse MicroProfile 还是其他框架。


  由于 Eclipse MicroProfile 支持微服务和基于 HTTP REST 的、与语言无关的通信，你的微服务间通信不会受到微服务运行的底层计算类型的影响；例如，你可以让一个运行在虚拟机上的微服务通过
  REST 与另一个运行在裸机上的微服务进行通信。但是，如果你的应用由一部分运行在本地的微服务和另一部分运行在云上的微服务组成（也称为混合云应用），该怎么办？你需要考虑哪些因素？


  '
- '# 在混合云部署中使用 MicroProfile 时的注意事项


  混合云应用包含本地逻辑和云端逻辑。换句话说，如果你的部分应用逻辑在本地运行，部分在云端运行，那么你实际上就拥有了一个混合云应用。在这种类型的部署中使用 Eclipse
  MicroProfile 时，你需要考虑以下几点：


  *   需要使用云环境支持的任何 DNS 支持来配置云环境和本地环境之间的通信路由

  *   配置 MicroProfile OpenTracing 以支持跨云环境捕获追踪信息

  *   监控跨云的、分散的 MicroProfile Metrics 信息...




  '
- '# 在多云部署中使用 MicroProfile OpenTracing 时面临的挑战


  在多云环境中进行分布式追踪可能颇具挑战性。我们希望实现与单一云环境相同的目标，即可视化与请求关联的端到端追踪，该请求会穿越每个云内部及跨云的各项服务，但在处理不同的上下文传播格式以及各云以不同格式存储追踪数据时，可能会遇到复杂情况。


  第一个挑战是确保追踪能够跨越不同的云环境持续进行。这之所以成为问题，是因为在撰写本书时，尚未有一种广泛采用或标准化的追踪上下文格式。通常，每个追踪系统使用不同的标头和格式来传播追踪上下文。例如，Zipkin
  使用 B3 传播，Jaeger 使用 `ber-trace-id` 标头，Amazon X-Ray 使用 `X-Amzn-Trace-Id`，而 Google
  使用 `X-Cloud-Trace-Context`。因此，如果请求需要在异构追踪系统间进行追踪，那么每次离开或进入不同环境时，都必须转换追踪上下文。这通常可以通过配置一个带有自定义注入器或提取器实现的追踪器来完成。然而，这目前超出了
  MicroProfile OpenTracing 项目的范围。未来，追踪上下文格式可能会在 W3C 追踪上下文项目（[`www.w3.org/TR/trace-context/`](https://www.w3.org/TR/trace-context/)）下实现标准化。


  第二个挑战，即使在同构的追踪环境中，也是可视化来自多云环境的追踪数据。这可能成为问题，因为每个云中的追踪数据可能存储在不同的数据库中，或采用不同的格式。这可以通过将数据复制到单一统一存储，或在系统之间按需发送缺失的追踪数据并进行适当的数据格式调整来克服。


  接下来，我们将讨论在服务网格（如 Istio）中使用 Eclipse MicroProfile 的挑战。


  '
- '# 在服务网格中使用 Eclipse MicroProfile 时的注意事项


  诸如 Istio 或 LinkerD 之类的服务网格，在 Kubernetes 之上的平台层面提供服务，涵盖服务发现、路由和容错等领域。其中一些服务也可以在 MicroProfile
  中找到。当你将 MicroProfile 应用程序部署到这样的服务网格中时，需要考虑是使用 MicroProfile 的版本还是网格的版本。


  这里最可能受影响的 MicroProfile 特性是容错，尤其是重试逻辑。


  '
- "# 重试\n\n容错中的重试功能允许你在首次请求失败时，重试向另一个服务发送请求（更多信息请参见第 3 章，*MicroProfile 配置与容错*）。现在，假设你有以下代码：\n\
  \n```\n@Retry (maxRetries = 3)\nvoid aMethod() {\n    callBackend();\n}\n```\n\n\
  尽管这告诉 Istio 重试 5 次，但在 `aMethod` 最终以错误结束之前，你可能会得到 15 次重试（Istio 会在你的代码中的 3 次重试中，每次重试\
  \ 5 次，然后才返回错误）。你可以考虑在代码中关闭重试，因为 Istio 中的重试次数可以在运行时动态更改，无需重启 Pod。\n\n"
- '# 回退


  另一方面，当所有重试都失败时，Istio 并没有回退策略——它无法让 Istio 调用工作负载的另一个版本。当你用 `@Fallback` 注解修饰上述代码时，可以在原始调用失败时执行另一个操作：


  ```

  @Fallback(fallbackMethod = "fallbackForA")@Retry (maxRetries = 3)string aMethod()
  {   callBackend();}void String fallbackForA() {    return "A cached string";}

  ```


  在这种情况下，一旦 Istio 的重试次数乘以 MicroProfile 的重试次数全部用尽，就会调用 `fallbackForA` 回退方法。如果你从前面的示例中移除
  `@Retry` 注解，那么当 Istio 的重试用尽时，就会调用回退方法。……


  '
- "# 服务网格中的故障注入\n\nIstio 允许你相当轻松地向结果中注入故障。这起初听起来适得其反，但却是测试容错处理是否正确的一种非常好的方法。以下 Istio\
  \ 的 `VirtualService` 定义了这样的故障注入：\n\n```\napiVersion: networking.istio.io/v1alpha3\n\
  kind: VirtualService\nmetadata:\n  name: fault-injection-service\nspec:\n  hosts:\n\
  \  - myTarget\n  http:\n  - route:\n    - destination:\n      host: myTarget\n \
  \   fault:\n      abort:\n        httpStatus: 404\n        percent: 20\n     delay:\n\
  \       percent: 50\n       fixedDelay: 200ms\n```\n\nIstio 会监听对目标主机 `myTarget`\
  \ 的调用，并对 20% 的调用发送 404 响应，而不是真实的响应码。除此之外，它还会将其他每个响应延迟 200 毫秒。\n\n"
- '# 结论


  MicroProfile 定义了容错领域的基本功能，这些功能也可以通过其他方式提供，例如在服务网格中。如果你遇到这种情况，就必须考虑激活哪一个。同时激活两者可能会导致意外行为。




  '
- '# 总结


  在本章中，你学习了 Eclipse MicroProfile 如何促进云原生应用开发，无论其是混合云还是多云应用。我们还讨论了微服务、云原生开发和容器原生开发之间的关系，以及运行在容器上的微服务如何成为云原生开发的理想选择。你还了解了
  Eclipse MicroProfile 与 12 要素应用以及无服务器和 FaaS 环境的关系。


  我们涵盖了引导你进入云原生应用之旅的八个步骤，以及 Eclipse MicroProfile 如何在每个步骤中提供帮助。此外，我们还讨论了在跨云应用中使用 Eclipse
  MicroProfile 时需要考虑的事项，何时在裸机、虚拟机与容器上运行 Eclipse MicroProfile，在混合云应用中运行 Eclipse MicroProfile
  微服务时需要考虑的事项，在多云部署中运行 Eclipse MicroProfile OpenTracing 时需要注意的挑战，以及最后在服务网格中使用 Eclipse
  MicroProfile 时需要考虑的事项。


  在本书中，我们介绍了 MicroProfile（一个 Java 微服务规范）的起源及其诞生的历史背景。我们介绍了这个开源项目，包括其使命、治理、优势、如何为其做出贡献，以及其子项目的生命周期。然后，我们深入探讨了构成伞式/平台发布的每个
  MicroProfile API/子项目，以及伞式发布之外的子项目。


  我们还介绍了市场上 MicroProfile 的当前实现，包括 Quarkus，并向你展示了如何“quark”一个由 MicroProfile Starter
  生成的 MicroProfile 项目。我们讨论了 Conference Application，这是一个社区示例项目，展示了 MicroProfile 在不同供应商实现之间的互操作性。我们还提供了贯穿全文的代码示例以供参考和讨论，并提供了一个包含源代码的完整工作项目，该项目实现了所有
  MicroProfile API，你可以自由访问、下载、编译并在开发工作中重用，从而快速上手 MicroProfile。随后，我们讨论了 MicroProfile
  提供的响应式功能及其未来发展，例如正在开发中的子项目和 MicroProfile 沙箱中的项目，以及其未来与 Jakarta EE 可能的关系。


  最后，我们回顾了基于 MicroProfile 的应用和微服务如何非常适合在容器、云和无服务器/FaaS 部署中实现解决方案。无论你是 Java 微服务的新手还是经验丰富的
  Java 开发者，你都可以利用从本书中获得的所有知识，开始开发基于这一新颖且由社区驱动的规范的微服务，以创建可观察、可扩展、安全且高可用的混合云和多云应用，从而更快地为你的业务创造价值。


