- '# Eclipse MicroProfile 简介


  Eclipse MicroProfile 是一套用 Java 语言编写的微服务规范。它是一个由社区驱动、市场上有多种实现的项目。该项目于 2016 年 6 月首次宣布，持续开发一套通用的**应用程序编程接口**（**API**），用于实现适用于现代应用开发技术、架构和环境的
  Java 微服务。在本章中，你将了解 Eclipse MicroProfile 的起源和重要性。


  本章将涵盖以下主题：


  *   企业级 Java 微服务

  *   推动数字经济的驱动力与多速 IT 的需求

  *   Eclipse MicroProfile 介绍

  *   MicroProfile ...


  '
- "# 企业级 Java 微服务\n\n应用开发不再仅仅是在你喜欢的操作系统上使用单一的高级编程语言。如今，程序员需要学习大量的语言、规范、框架、专有和开源软件及工具、底层部署基础设施以及开发方法，才能开发现代应用。IT\
  \ 组织的开发已变得多语言化，即根据特定项目的需求使用多种编程语言。在这个云、容器、微服务、响应式编程、12 要素应用、无服务器、MINI 服务、多语言环境等并存的时代，开发者现在可以选择适合其任务的工具，从而变得更高效、更有生产力。\n\
  \n随着 Java EE 近期以新名称 Jakarta EE 迁移到 Eclipse 基金会，MicroProfile 将在企业级 Java 的未来中扮演非常重要的角色，因为它与\
  \ Jakarta EE 具有协同作用，并有可能以多种方式影响它。\n\n云和移动技术的出现，以及开放和**物联网**（**IoT**）的加速发展，催生了数字经济。虽然这开辟了新的市场，但也给企业及其\
  \ IT 组织带来了新的要求，它们现在不仅要支持和维护传统工作负载，还要以更快的速度交付新应用。\n\n为了应对这些新需求，许多技术、语言、架构和框架在企业中变得流行起来。其中之一就是微服务，特别是企业级\
  \ Java 微服务，因为 Java 仍然是 IT 公司中最流行的语言之一。但什么是企业级 Java 微服务呢？\n\n企业级 Java 微服务具有以下特征：\n\
  \n*   使用 Java 语言编写。\n*   可以使用任何 Java 框架。\n*   可以使用任何 Java API。\n*   必须达到企业级标准，即可靠、可用、可扩展、安全、健壮且高性能。\n\
  *   必须满足 [`martinfowler.com/microservices/`](https://martinfowler.com/microservices/)\
  \ 中列出的微服务架构特征，具体如下：\n    *   通过服务实现组件化\n    *   围绕业务能力组织\n    *   产品而非项目\n    *\
  \   智能端点与哑管道\n    *   去中心化治理\n    *   去中心化数据管理\n    *   基础设施自动化\n    *   为故障而设计\n\
  \    *   演进式设计\n\n"
- '# 推动数字经济的驱动力


  **数字经济**和**数字化转型**这两个术语描述了四种正在改变企业需求的驱动力汇聚在一起：移动、云、物联网和开源：


  ![](img/0c47035f-e6df-4c8c-be4d-0c7bb3f2227c.png)


  在互联网出现之前，企业需要实体店或电话线来开展业务。互联网的出现和普及为企业创造了**关键品类形成期**的机会。企业开始主要将互联网用作店面或展示窗口，以吸引人们前往其实体店。互联网也被用于广告目的。


  此后不久，企业...


  '
- '# 多速 IT


  尽可能快地实现和交付应用并非新要求。事实上，自第一台计算机发明以来，提高效率一直是计算机科学家们思考的问题。高级编程语言、封装、可重用性、继承、事件驱动设计、SOA、微服务、机器学习和人工智能，这些都是为了应对更快完成任务这一挑战而提出的概念。随着每一波新技术的浪潮，变速箱都为软件开发和交付方式的演进增加了一个新的速度要求。数字经济又为变速箱增加了一个高速档位。


  企业需要适应数字经济的新需求。它们不仅要创建、运行和支持传统类型的应用，还要创建符合数字经济新需求的应用。它们必须同时支持瀑布式和 DevOps 流程、混合云基础设施以及
  SOA 和微服务架构。


  这给 IT 组织带来了许多挑战，因为其流程、人员和技术都一直面向传统类型应用的实现、交付和维护。许多组织已经踏上或正在开始其数字化转型之旅，以应对数字经济的挑战。这一旅程包括在应用的开发、交付、集成和维护方面，对技术、框架、语言和流程进行变革。


  无论你称之为双模 IT（[`www.gartner.com/it-glossary/bimodal`](https://www.gartner.com/it-glossary/bimodal)）还是业务技术战略（[`go.forrester.com/wp-content/uploads/Forrester-False-Promise-of-Bimodal-IT.pdf`](https://go.forrester.com/wp-content/uploads/Forrester-False-Promise-of-Bimodal-IT.pdf)），事实是，IT
  需要比以往任何时候都更快地满足业务需求，无论是现有应用还是新应用。这意味着 IT 还需要加快现有应用的维护和交付，同时专门为新应用采用敏捷方法论。然而，这并不排除在处理现有应用与新应用时，仍然需要使用不同的开发流程、发布周期和支持时间线，这实际上就是
  IT 的多速特性。


  '
- '# Eclipse MicroProfile 介绍


  Java EE 一直是一个极其成功的平台。**Java 社区流程**（**JCP**）在其近 20 年的历史中管理了超过 20 个兼容实现，造就了一个价值 40
  亿美元的产业。然而，Oracle 对 Java EE 的管理（无论有意与否）阻碍了创新，尽管其他标准已经发展起来，但全球 Java 社区和所有主要企业的 CIO
  都渴望在企业内部拥有一个开放的 Java 标准。


  在其早期阶段，J2EE 从 J2EE 1.2 到 J2EE 1.4 的发展速度相对较快，因为该平台需要满足企业的即时需求。从 2006 年 5 月的 Java
  EE 5 开始，发展速度开始...




  '
- '# MicroProfile 价值主张


  对于信赖企业级 Java 来运行其生产工作负载的客户而言，Eclipse MicroProfile 提供了一套**供应商中立**的企业级 Java 微服务规范。它使客户能够通过更高的敏捷性和可扩展性、更快的上市时间、更高的开发效率、更轻松的调试和维护，以及持续集成与持续部署，更好地满足业务需求。


  客户使用 Eclipse MicroProfile 所获得的好处，与使用微服务本身带来的好处是一致的。总体而言，根据备受尊敬的软件开发者、作家和演讲者 Martin
  Fowler 的观点，微服务提供了以下好处（[`martinfowler.com/articles/microservice-trade-offs.html`](https://martinfowler.com/articles/microservice-trade-offs.html)）：


  *   **强模块边界**：微服务强化了模块化结构，这对于较大的团队尤其重要。

  *   **独立部署**：简单的服务更容易部署，并且由于它们是自治的，当出现问题时，它们不太可能导致系统故障。

  *   **技术多样性**：使用微服务，您可以混合使用多种语言、开发框架和数据存储技术。


  除了微服务的通用好处之外，Eclipse MicroProfile 还特别提供了以下优势：


  *   **社区协作的好处**：Eclipse MicroProfile 是一个由社区运营的开源项目。没有任何单一供应商控制或决定该规范的演进和成熟。

  *   **实现选择的自由**：许多供应商已将 Eclipse MicroProfile 作为其软件栈的一部分来实现，客户可以选择最适合其环境的实现。

  *   **更快的演进**：由于 Eclipse MicroProfile 是一个创新项目，新的和改进的功能会通过限时发布的版本频繁交付。这使得开发者和客户能够随时掌握这些功能，并尽早开始在其项目中利用这些更新。

  *   **基于数十年的经验**：不仅该规范的领域专家带来了丰富的经验、专业知识和智慧，而且 Eclipse MicroProfile 还利用了其构建所基于的
  Java EE API 中经过市场检验和生产验证的能力，为开发者提供了成熟度。

  *   **对企业级 Java 的熟悉性**：Eclipse MicroProfile 建立在熟悉的企业级 Java 结构之上，使企业级 Java 开发者易于采用。

  *   **无需重新培训**：您现有的企业级 Java 开发者会发现 Eclipse MicroProfile 是他们专业知识的自然延伸。几乎没有学习曲线。他们将能够利用自己的技能。

  *   **互操作性**：不同的 MicroProfile 实现之间可以互操作，每个实现都为用户提供了自由，可以在一个应用程序中选择一个或组合多个 MicroProfile
  实现。

  *   **多种使用 API 的方式**：Eclipse MicroProfile API 提供了易于使用的接口，例如基于 CDI 的接口、编程式接口、命令行接口和基于文件（基于配置）的接口。

  *   **一套完整的工件**：每个 API 都包含一个**测试兼容性工具包**（**TCK**）、Javadoc、可供下载的 PDF 文档、API Maven
  工件坐标、Git 标签以及下载文件（规范和源代码）。

  *   许多其他特定于每个 API 的好处。这些将在本书的每个 Eclipse MicroProfile 子项目章节中讨论。


  '
- '# 总结


  在本章中，我们讨论了软件开发的新趋势，包括使用新方法（例如微服务、容器、移动和物联网 (IoT)）的多语言部署，这些方法运行在本地和云端，以及混合或多云环境中。这些趋势要求企业级
  Java 在微服务世界中演进，而这正是 MicroProfile 所要解决的问题。推动数字经济的四大力量，即云、移动、物联网和开源，促使组织需要拥有多速 IT
  部门，这对于维护和演进其现有应用程序，以及利用新技术趋势开发新应用程序是必要的……


  '
- '# 问题


  1.  什么是企业级 Java 微服务？

  2.  推动数字经济的四大力量是什么？

  3.  为什么 IT 组织必须以不同的速度开发和维护应用程序？什么是多速 IT？

  4.  为什么 Java 和 Java EE 对组织仍然重要？

  5.  导致 MicroProfile 诞生的关键原因之一是什么？

  6.  哪些 API/规范是 MicroProfile 伞式/平台版本的一部分？

  7.  哪个 MicroProfile 版本引入了第一次革命性的变化？

  8.  为什么 MicroProfile 对组织有价值？


  '
- '# 治理与贡献


  Eclipse MicroProfile 由社区成员治理。换句话说，它不是由单一供应商治理的。此外，它接收来自各种组织、公司和独立贡献者的开发者和领域专家的贡献。该项目的特点是通过轻量级流程和治理实现创新、速度和敏捷性。本章中的主题将帮助您理解
  MicroProfile 项目的治理，并且您将发现如何为 MicroProfile 项目做出贡献。


  本章将涵盖以下主题：


  *   Eclipse MicroProfile 项目是如何治理的

  *   社区如何协作并为其持续创新做出贡献……




  '
- '# 当前 Eclipse MicroProfile 治理


  Eclipse MicroProfile 在运营和决策过程中保持透明，其设计宗旨是极为轻量化。治理的重点在于以协作方式创建、创新和演进规范。


  首先，Eclipse MicroProfile 是一个 Eclipse 项目，因此遵循 Eclipse 的流程。这包括提交者审批、项目发布、知识产权保护、许可审查流程等。然而，Eclipse
  基金会足够灵活，允许像 MicroProfile 这样的项目提供一些额外的轻量级流程，使多个规范能够并行推进，同时通过跨规范沟通和对齐的方式协同发展。


  其中一个轻量级流程是 Eclipse MicroProfile 双周 Hangout 会议/电话会议（会议网址为 [`eclipse.zoom.us/j/949859967`](https://eclipse.zoom.us/j/949859967)，其录制视频可在
  Eclipse MicroProfile YouTube 频道 [`www.youtube.com/channel/UC_Uqc8MYFDoCItFIGheMD_w`](https://www.youtube.com/channel/UC_Uqc8MYFDoCItFIGheMD_w)
  上找到）。该会议向社区所有人开放，作为一个论坛，讨论与会者提出的议题并做出决策，内容涵盖子项目状态、发布内容、发布日期以及子项目创建审批等。需要注意的是，MicroProfile
  并非标准组织，尽管它看起来可能像。MicroProfile 由社区创建，服务于社区，其发展速度由社区决定，因为它在不同的子项目中进行创新。MicroProfile
  定义的规范鼓励多种实现，这与标准组织非常相似。然而，MicroProfile 实际上是一个快速演进的开源项目，其源代码就是规范。


  社区沟通、讨论和辩论的主要方式是 Eclipse MicroProfile Google Group（[`groups.google.com/forum/#!forum/microprofile`](https://groups.google.com/forum/#!forum/microprofile)）。您可以使用您喜欢的网络浏览器在
  Google Group 中阅读、发布、回答或发起与任何 MicroProfile 相关主题的论坛消息。您也可以使用该 Group 的电子邮件发起新的论坛消息。任何人都可以发起新的论坛主题来讨论议题，例如可能添加到
  MicroProfile 的新功能。当社区在论坛和/或 MicroProfile Hangout 会议上对某个新想法进行充分讨论，并确定值得进一步探讨后，社区会决定为该新想法创建一个工作组，并指定一位或多位负责人（通常是该主题领域的专家）作为推动者。


  需要注意的一个重要方面是，工作组（或子项目）的负责人并非单方面决定或确定规范的演进方向或包含哪些功能。对于与其规范相关的决策，他们没有否决权或最终决定权。通过分享想法、专业知识、过往经验、对现有技术的分析以及最佳实践，工作组将提出他们所能做到的最佳提案。此外，所有未解决的问题都需要由社区讨论，并在必要时提交至双周
  Hangout 会议/电话会议进行进一步辩论。通过讨论、协作和社区反馈，分析多种观点，使最佳方案脱颖而出。工作组将建立每周或双周的定期会议，并记录在 MicroProfile
  Google 日历（[`calendar.google.com/calendar/embed?src=gbnbc373ga40n0tvbl88nkc3r4%40group.calendar.google.com`](https://calendar.google.com/calendar/embed?src=gbnbc373ga40n0tvbl88nkc3r4%40group.calendar.google.com)）中。该日历包含所有
  MicroProfile Hangout 会议、MicroProfile 子项目会议以及 MicroProfile 发布日期的信息。


  虽然任何人都可以参加这些会议，但通常有一批核心人员作为主题专家参与其中。经过几次会议后，工作组将决定是否应将新功能提交至 MicroProfile Hangout
  会议，以讨论其成为 MicroProfile 子项目的提案。


  在 MicroProfile Hangout 会议上，子项目提案可能会被拒绝或接受。需要说明的是，当子项目提案提交至 MicroProfile Hangout
  会议时，关于其是否应推进的大部分讨论实际上已经完成，因此会议做出的决定对子项目工作组来说应该并不意外。拒绝一个子项目并不意味着它不能满足特定的开发需求，而是确认其目标与推进
  MicroProfile 规范（其目标是优化面向微服务架构的企业 Java）不太契合。


  例如，如果一个子项目提案解决的需求与微服务无关，那么该提案很可能不会作为 MicroProfile 子项目推进。接受一个子项目意味着它有效地满足了某种需求，丰富了规范，有助于实现其优化面向微服务架构的企业
  Java 的目标。正是在这一刻，子项目成为官方的 MicroProfile API。一旦子项目成为 MicroProfile API，就需要决定它是作为伞形项目之外的独立子项目，还是作为包含在伞形
  MicroProfile 发布中的子项目。此过程的高级流程图如下：


  ![](img/d7bcf79a-8471-4789-b9ed-0dd423e92624.png)


  在撰写本书时，以下是 Eclipse MicroProfile API/子项目（列出了项目负责人）：


  | **MicroProfile API/子项目名称** | **子项目负责人** |

  | MicroProfile 项目负责人 | John Clingan 和 Kevin Sutter |

  | Config | Emily Jiang 和 Mark Struberg |

  | Fault Tolerance | Emily Jiang |

  | Health Check | Antoine Sabot-Durand |

  | JWT Propagation | Scott Stark |

  | Metrics | Heiko Rupp |

  | OpenAPI | Arthur De Magalhaes |

  | OpenTracing | Pavol Loffay |

  | Rest Client | John D. Ament 和 Andy McCright |


  Eclipse MicroProfile 遵循一个有时间限制的快速增量发布计划，该计划是公开的，列在 Eclipse 基金会 MicroProfile 项目页面（[`projects.eclipse.org/projects/technology.microprofile`](https://projects.eclipse.org/projects/technology.microprofile)）上。主要的
  Eclipse MicroProfile 版本，例如从 1.x 到 2.x，包含可能引入破坏性变更的 MicroProfile API 重大更新。次要版本，即小版本，包含小的
  API 更新或在预定发布日期前完成的新 API。目前，MicroProfile 社区的次要和/或主要版本的发布窗口期是每年的二月、六月和十一月。


  '
- '# 开放贡献的沙盒方法


  为潜在的 MicroProfile 子项目创建工作组时，也可能分配一个沙盒，这是 MicroProfile 社区提供的另一个用于尝试新想法的资源。沙盒仓库是一个位于
  [`github.com/eclipse/microprofile-sandbox`](https://github.com/eclipse/microprofile-sandbox)
  的 GitHub 仓库，用于孵化最终将转变为新规范独立仓库的想法和代码示例。任何人都可以发起拉取请求，并使用沙盒来试验新想法、共享代码和文档，这些内容可作为社区
  Google Group、MicroProfile Hangout 会议或工作组会议讨论的一部分。请保持您的拉取请求开放...




  '
- '# 伞式发布与伞外项目


  Eclipse MicroProfile 由一组规范组成，每个规范都有特定的关注点。例如，Eclipse MicroProfile Config 规范涵盖了与微服务参数配置相关的所有内容。某个版本的规范可以作为
  Eclipse MicroProfile 伞式发布的一部分被包含在内，也可以在伞外发布。具体来说，最新的 Eclipse MicroProfile 2.2 伞式发布于
  2019 年 2 月 12 日发布，包含了以下规范：


  *   Eclipse MicroProfile Open Tracing 1.3

  *   Eclipse MicroProfile Open API 1.1

  *   Eclipse MicroProfile Rest Client 1.2

  *   Eclipse MicroProfile Fault Tolerance 2.0

  *   Eclipse MicroProfile Config 1.3

  *   Eclipse MicroProfile Metrics 1.1

  *   Eclipse MicroProfile JWT Propagation 1.1

  *   Eclipse MicroProfile Health Check 1.0

  *   CDI 2.0

  *   JSON-P 1.1

  *   JAX-RS 2.1

  *   JSON-B 1.0


  然而，Eclipse MicroProfile 也有其他在伞式发布之外发布的规范。例如，我们将在第 9 章*响应式编程与未来发展*中介绍的 Eclipse MicroProfile
  Reactive Streams Operators 1.0，就是一个最近在伞外发布的规范。那么，为什么 MicroProfile 允许在伞外发布规范呢？原因在于，先在伞外发布，可以让社区和最终用户有机会使用和测试新技术，从而在实际应用中验证它，之后再考虑将其纳入伞式发布。


  '
- '# MicroProfile Starter


  MicroProfile Starter 是一个示例源代码生成器，其目标是通过在 Maven 项目中生成可工作的示例代码，帮助开发者快速上手使用和利用社区驱动的企业级
  Java 微服务开源规范 Eclipse MicroProfile 的功能。


  自 2016 年中该项目创建以来，MicroProfile Starter 的想法就已存在，并在 2016 年 Devoxx BE（2016 年 11 月 7
  日那周）上进行了公开讨论。在可用的前两周内，世界各地的开发者通过 MicroProfile Starter 项目创建了超过 1200 个项目，这很好地积极表明了其在全球范围内的采用情况。


  '
- "# MicroProfile Starter 快速导览\n\n让我们快速浏览一下 MicroProfile Starter：\n\n1.  当你访问 **MicroProfile\
  \ Starter \"Beta\"** 页面 [`start.microprofile.io/`](https://start.microprofile.io/)\
  \ 时，你将看到以下登录页面：\n\n![](img/5bc19663-c627-42b8-a08a-350ce79a877c.png)\n\n你可以接受 Maven\
  \ 相关参数（[`maven.apache.org/guides/mini/guide-naming-conventions.html`](https://maven.apache.org/guides/mini/guide-naming-conventions.html)）`groupId`\
  \ 和 `artifactId` 的默认值，或者根据自己的喜好更改它们。`groupId` 参数用于在所有项目中唯一标识你的项目，而 `artifactId`\
  \ 是不带 MicroProfile 版本号的 JAR 文件名。在本导览中，请接受所有默认值。\n\n2.  接下来，从下拉列表中选择 **MicroProfile\
  \ 版本**：\n\n![](img/1331ec98-e279-496c-ac0a-801886cbfb85.png)\n\n在本导览中，请选择 MicroProfile\
  \ 版本 MP 2.1。请注意，根据你选择的 MicroProfile 版本，**示例规范**部分列出的规范数量会有所不同。这个数量取决于每个 MicroProfile\
  \ 伞式发布中包含的 API 数量。要了解每个版本包含了哪些 API，请参考 MicroProfile 社区演示文稿（[`docs.google.com/presentation/d/1BYfVqnBIffh-QDIrPyromwc9YSwIbsawGUECSsrSQB0/edit#slide=id.g4ef35057a0_6_205`](https://docs.google.com/presentation/d/1BYfVqnBIffh-QDIrPyromwc9YSwIbsawGUECSsrSQB0/edit#slide=id.g4ef35057a0_6_205)）。\n\
  \n3.  然后，从下拉列表中选择 **MicroProfile 服务器**：\n\n![](img/c101fb03-4a50-4586-898c-c49210885448.png)\n\
  \n在本导览中，请选择 Thorntail V2，这是 Red Hat 用于实现 Eclipse MicroProfile 规范的开源项目。\n\n4.  保持所有**示例规范**复选框处于选中状态（即，不要取消选中任何复选框）：\n\
  \n![](img/c64b1d4b-bb8c-46bd-a45e-9a4cd9dad36e.png)\n\n这将为 MicroProfile 2.1 版本中包含的所有\
  \ API 生成示例工作代码。\n\n5.  使用 MicroProfile Starter 生成示例源代码过程的最后一步是点击 **下载** 按钮，这将创建一个\
  \ ZIP 归档文件。确保将 `demo.zip` 文件保存到本地驱动器。然后，在本地驱动器中解压 `demo.zip`。其内容应如下所示：\n\n![](img/560eb505-0fe8-43ce-994c-84a6db717b1f.png)\n\
