- "# JWT 选项卡\n\n点击 JWT 选项卡后，您应该会看到类似下图的视图，其中包含两个端点链接：\n\n![](img/d7875e8b-4474-48c4-b850-279881c58802.png)\n\
  \n第一个链接会向一个未受保护的端点发起请求，该端点会从 JWT 中打印名称，如果存在 `upn` 声明，也会一并打印。\n\n但是，由于 Web 前端未为此请求提供\
  \ JWT，输出部分将显示以下内容：\n\n```\nHello[open] user=anonymous, upn=no-upn\n```\n\n点击第二个链接将访问该端点的安全版本，其中包含以下代码片段：\n\
  \n```\npublic class JwtEndpoint {\n    @Inject\n    private JsonWebToken jwt;\n\
  \    @Inject\n    @Claim(standard = Claims.raw_token)\n    private ClaimValue<String>\
  \ jwtString;\n    @Inject\n    @Claim(standard = Claims.upn)\n    private ClaimValue<String>\
  \ upn;\n    @Context\n    private SecurityContext context;\n...\n    @GET\n    @Path(\"\
  /secureHello\")\n    @Produces(MediaType.TEXT_PLAIN)\n    @RolesAllowed(\"user\"\
  ) // 1\n    public String secureHello() {\n        String user = jwt == null ? \"\
  anonymous\" : jwt.getName(); // 2\n        String scheme = context.getAuthenticationScheme();\
  \ // 3\n        boolean isUserInRole = context.isUserInRole(\"PacktMPUser\"); //\
  \ 4\n        return String.format(\"Hello[secure] user=%s, upn=%s, scheme=%s, \n\
  \        isUserInRole(PacktMPUser)=%s\", user, upn.getValue(), \n        scheme,\
  \ isUserInRole);\n    }\n```\n\n我们来讨论一下重要的几行：\n\n1.  `@RolesAllowed(\"user\")` 注解表明该端点是受保护的，并且调用者需要拥有\
  \ `user` 角色。我们之前看到的 JWT `groups` 声明中包含此角色。\n2.  通过 `getName()` 方法从 JWT 中获取用户。如 MP-JWT\
  \ 章节所述，这映射到 JWT 中的 `upn` 声明。\n3.  从注入的 `SecurityContext` 中获取当前的安全认证方案。\n4.  进行程序化安全检查，判断调用者是否拥有\
  \ `PacktMPUser` 角色。该检查将返回 true，因为我们之前看到的 JWT groups 声明中包含此角色。\n\n这些信息被组合成一个字符串，作为\
  \ `secureHello` 方法的返回值。点击 demo1/jwt/secureHello 链接按钮后，响应区域将生成以下输出字符串：\n\n```\nHello[secure]\
  \ user=packt-mp-book, upn=packt-mp-book, scheme=MP-JWT, isUserInRole(PacktMPUser)=true\n\
  ```\n\n通过结合使用 `@RolesAllowed` 注解和与 MP-JWT 功能的集成，我们可以看到如何保护微服务端点的访问，以及如何根据经过身份验证的\
  \ JWT 中的内容引入应用程序行为。接下来，让我们回到 RestClient 选项卡。\n\n"
