- "# 编程模型\n\n你可以通过使用 MicroProfile OpenAPI 编程模型，借助 Java POJO（普通旧式 Java 对象）提供 OpenAPI\
  \ 元素。完整的模型集在 `org.eclipse.microprofile.openapi.models` 包中描述。你可以在 [`github.com/eclipse/microprofile-open-api/tree/master/api/src/main/java/org/eclipse/microprofile/openapi/models`](https://github.com/eclipse/microprofile-open-api/tree/master/api/src/main/java/org/eclipse/microprofile/openapi/models)\
  \ 阅读更多相关信息。\n\n你可以使用 `OASFactory` 创建 OpenAPI 树。请参考以下代码块作为示例：\n\n```\nOASFactory.createObject(Info.class).title(\"\
  Weather\")\n          .description(\"Weather APIs\").version(\"1.0.0\");\n```\n\n\
  要引导 OpenAPI 模型树，你可以使用 `OASModelReader` 接口。然后，你可以创建此接口的实现，并使用 `mp.openapi.model.reader`\
  \ 配置键进行注册。\n\n以下是在 `META-INF/microprofile-config.properties` 中其定义的大致示例：\n\n```\n\
  mp.openapi.model.reader=com.mypackage.MyModelReader\n```\n\n与静态文件类似，模型读取器可用于提供完整或部分的模型树。要提供完整的\
  \ OpenAPI 模型树，应将 `mp.openapi.scan.disable` 配置设置为 `true`。否则，将假定为部分模型。\n\n"
- '# 使用过滤器进行更新


  要更新或移除 OpenAPI 文档的某些元素和字段，你可以使用过滤器。`OASFilter` ([`github.com/eclipse/microprofile-open-api/blob/master/api/src/main/java/org/eclipse/microprofile/openapi/OASFilter.java`](https://github.com/eclipse/microprofile-open-api/blob/master/api/src/main/java/org/eclipse/microprofile/openapi/OASFilter.java))
  接口允许你接收各种 OpenAPI 元素的回调。它允许你覆盖你关心的方法。你可以创建此接口的实现，并使用 `mp.openapi.filter` 配置键进行注册。


  以下是在 `META-INF/microprofile-config.properties` 中其定义的大致示例：


  ```

  mp.openapi.filter=com.mypackage.MyFilter

  ```


  注册的过滤器会为每个模型元素调用一次。例如，`filterPathItem` 方法用于...


  '
- '# MicroProfile REST 客户端及其功能简介


  **MicroProfile REST 客户端**（**MP-RC**）提供了一种用于对 REST 端点进行类型安全调用的 API。应用程序可以使用它来对其他服务执行远程调用。


  它利用 Java 接口上的 JAX-RS 注解来描述与远程服务的实际契约。然后，这些接口用于创建客户端代理，这些代理隐藏了底层 HTTP 通信的许多细节。


  MP-RC 规范定义了在 Java 接口上利用 JAX-RS 注解的要求，以及用于增强行为的 MP-RC 特定注解，包括如何传播传入请求头、如何使用提供程序增强
  JAX-RS 行为、异常映射、CDI 支持以及与其他 MicroProfile 规范的集成。我们将从定义类型安全端点接口开始，更详细地了解 MP-RC。


  '
- '# 定义端点接口


  要为端点定义类型安全接口，我们创建一个 Java 接口，该接口利用 JAX-RS 注解将接口方法映射到它们代理的 REST 端点。以下 `WorldClockApi`
  接口展示了一个基本示例：


  ```

  package io.pckt.restc.contract;import javax.ws.rs.GET;import javax.ws.rs.Path;import
  javax.ws.rs.PathParam;import javax.ws.rs.Produces;import javax.ws.rs.core.MediaType;@Path("/api/json")public
  interface WorldClockApi { static final String BASE_URL = "http://worldclockapi.com/api/json";
  @GET @Path("/utc/now") @Produces(MediaType.APPLICATION_JSON) Now utc(); @GET @Path("{tz}/now")
  @Produces(MediaType.APPLICATION_JSON) Now tz(@PathParam("tz") String tz);}public
  class Now ...

  ```


  '
- "# MicroProfile REST 客户端编程式 API 使用\n\nMP-RC 支持编程式查找和 CDI 注入两种使用方式。以下 `WorldClockUser.java`\
  \ 列出了一个 REST 服务使用 `org.eclipse.microprofile.rest.client.RestClientBuilder` 为 `WorldClockApi`\
  \ 接口创建类型安全客户端的示例：\n\n```\npackage io.pckt.restc.contract;\n\nimport javax.ws.rs.GET;\n\
  import javax.ws.rs.Path;\nimport javax.ws.rs.PathParam;\nimport javax.ws.rs.Produces;\n\
  import javax.ws.rs.core.MediaType;\n\n@Path(\"/api\")\n@ApplicationScoped\npublic\
  \ class WorldClockUser {\n @GET\n @Path(\"/now-utc\")\n @Produces(MediaType.TEXT_PLAIN)\n\
  \ public String getCurrentDateTime() {\n WorldClockApi remoteApi = RestClientBuilder.newBuilder()\n\
  \ .baseUri(URI.create(WorldClockApi.BASE_URL))\n .build(WorldClockApi.class);\n\
  \ Now now = remoteApi.utc();\n return now.getCurrentDateTime();\n }\n}\n```\n\n\
  `baseUri()` 方法用于指定服务器 URI，`WorldClockApi` 方法路径将根据该 URI 进行解析。`build()` 方法接收要构建的类型安全客户端的\
  \ Java 接口。其他 `RestClientBuilder` 方法包括：\n\n*   `baseUrl(URL)`：类似于 `baseUri`，但接受 `java.net.URL`\
  \ 类型。\n*   `connectTimeout(long timeout, TimeUnit unit)`：等待连接到远程服务器的时间。值为 0 表示无限期等待。\n\
  *   `readTimeout(long timeout, TimeUnit unit)`：等待读取远程服务器连接的时间。值为 0 表示无限期等待。\n* \
  \  `executorService(ExecutorService executor)`：用于异步请求。我们将在异步部分再次讨论这一点。\n\n"
- '# MicroProfile REST 客户端 CDI 使用


  MP-RC 类型安全接口可以作为 CDI Bean 注入。运行时必须为每个使用 `@RegisterRestClient` 注解的接口创建一个 CDI Bean。注入的
  CDI 客户端 Bean 将包含一个限定符 `@RestClient`，以区分其作为 MP-RC 注入点的用途。以下对 `WorldClockApi` 接口的更新说明了
  `@RegisterRestClient` 注解的使用：


  ```

  import javax.ws.rs.GET;import javax.ws.rs.Path;import javax.ws.rs.PathParam;import
  javax.ws.rs.Produces;import javax.ws.rs.core.MediaType;import org.eclipse.microprofile.rest.client.inject.RegisterRestClient;@Path("/api/json")@RegisterRestClient()public
  interface WorldClockApi { static final String BASE_URL = "http://worldclockapi.com/api/json";
  ...

  ```




  '
- '# MicroProfile Config 集成


  对于 CDI 定义的接口，可以使用 MicroProfile Config 属性来定义通过 `RestClientBuilder` API 可用的额外行为。以我们的
  `io.pckt.restc.contract.WorldClockApi` 接口为例，以下 MicroProfile Config 属性可用于控制生成的代理行为：


  *   `io.pckt.restc.contract.WorldClockApi/mp-rest/url`：此服务使用的基础 URL，相当于 `RestClientBuilder#baseUrl`
  方法。

  *   `io.pckt.restc.contract.WorldClockApi/mp-rest/scope`：用于注入的 CDI 作用域的完全限定类名；默认为
  `javax.enterprise.context.Dependent`。

  *   `io.pckt.restc.contract.WorldClockApi/mp-rest/providers`：要包含在客户端中的提供者完全限定类名的逗号分隔列表，相当于
  `RestClientBuilder#register` 方法或 `@RegisterProvider` 注解。

  *   `io.pckt.restc.contract.WorldClockApi/mp-rest/providers/com.mycompany.MyProvider/priority`：这将覆盖此接口的
  `com.mycompany.MyProvider` 提供者的优先级。

  *   `io.pckt.restc.contract.WorldClockApi/mp-rest/connectTimeout`：等待连接到远程端点的超时时间，以毫秒为单位。

  *   `io.pckt.restc.contract.WorldClockApi/mp-rest/readTimeout`：等待远程端点响应的超时时间，以毫秒为单位。


  '
- '# 简化配置键


  由于 CDI 接口的默认 MP Config 属性名称因包含接口包名而可能相当长，MP-RC 规范支持使用 `@RegisterRestClient` 注解的
  `configKey` 属性来简化属性名称前缀：


  ```

  @Path("/api/json")@RegisterRestClient(baseUri = WorldClockApi.BASE_URL, configKey
  = "worldClock")public interface WorldClockApi { static final String BASE_URL = "http://worldclockapi.com/api/json";...}

  ```


  使用 `worldClock` 这个 configKey，之前的属性列表简化为以下内容：


  *   `worldClock/mp-rest/url`

  *   `worldClock/mp-rest/uri`

  *   `worldClock/mp-rest/scope`

  *   `worldClock/mp-rest/providers`

  *   `worldClock/mp-rest/providers/com.mycompany.MyProvider/priority ...`


  '
- "# 处理客户端标头\n\n假设您想要在 HTTP 授权标头中指定凭据以访问安全的远程服务，但又不希望在客户端接口方法中包含一个字符串 `authHeader`\
  \ 参数。MP-RC 的 `@ClientHeaderParam` 注解可用于指定应发送的 HTTP 标头，而无需更改客户端接口方法签名。\n\n以下示例说明了\
  \ `@ClientHeaderParam` 注解的两种用法，用于在 `WorldClockApi` 接口的变体中提供 `User-Agent` HTTP 标头：\n\
  \n```\nWorldClockApiWithHeaders.java\npublic interface WorldClockApiWithHeaders\
  \ {\n static final String BASE_URL = \"http://worldclockapi.com/api/json\";\n\n\
  \ default String lookupUserAgent() {\n Config config = ConfigProvider.getConfig();\n\
  \ String userAgent = config.getValue(\"WorldClockApi.userAgent\", String.class);\n\
  \ if(userAgent == null) {\n userAgent = \"MicroProfile REST Client 1.2\";\n }\n\
  \ return userAgent;\n }\n\n @GET\n @Path(\"/utc/now\")\n @Produces(MediaType.APPLICATION_JSON)\n\
  \ @ClientHeaderParam(name = \"User-Agent\", value = \"{lookupUserAgent}\")\n Now\
  \ utc();\n\n @GET\n @Path(\"{tz}/now\")\n @Produces(MediaType.APPLICATION_JSON)\n\
  \ @ClientHeaderParam(name = \"User-Agent\", value = \"MicroProfile REST Client 1.2\"\
  )\n Now tz(@PathParam(\"tz\") String tz);\n} \n```\n\n也可以使用 `ClientHeadersFactory`\
  \ 实现来批量添加或传播标头：\n\n```\npackage org.eclipse.microprofile.rest.client.ext;\n\npublic\
  \ interface ClientHeadersFactory {\n MultivaluedMap<String, String> update(\n  \
  \  MultivaluedMap<String, String> incomingHeaders,\n    MultivaluedMap<String, String>\
  \ clientOutgoingHeaders);\n}\n```\n\n在前面的代码片段中，`incomingHeaders` 和 `clientOutgoingHeaders`\
  \ 参数的用途如下：\n\n*   `incomingHeaders`：表示入站请求的标头映射\n*   `clientOutgoingHeaders`：表示在客户端接口上指定的标头值的只读映射，是来自\
  \ `@ClientHeaderParam`、`@HeaderParam` 等的标头值的并集\n\n`update` 方法应返回一个 `MultivaluedMap`，其中包含要与\
  \ `clientOutgoingHeaders` 映射合并的标头，以形成将发送到出站请求的完整标头映射。诸如过滤器、拦截器和消息体写入器之类的提供者仍然可以在发送\
  \ HTTP 请求之前修改最终的标头映射。\n\n要启用 `ClientHeadersFactory`，客户端接口必须使用 `@RegisterClientHeaders`\
  \ 注解进行注解。如果此注解指定了一个值，则客户端实现必须调用指定 `ClientHeadersFactory` 实现类的实例。如果未指定值，则客户端实现必须调用\
  \ `DefaultClientHeadersFactoryImpl`。此默认工厂会将指定的标头从入站 JAX-RS 请求传播到出站请求——这些标头使用 MicroProfile\
  \ Config 属性 `org.eclipse.microprofile.rest.client.propagateHeaders` 以逗号分隔的列表指定。\n\
  \n"
- '# 高级用法的提供者注册


  `RestClientBuilder` 接口扩展了 JAX-RS 的 `Configurable` 接口，允许用户在构建时注册自定义提供者。所支持的提供者的行为由
  JAX-RS 客户端 API 规范定义。MP-RC 实现将支持来自 JAX-RS 的 `ClientResponseFilter`、`ClientRequestFilter`、`MessageBodyReader`、`MessageBodyWriter`、`ParamConverter`、`ReaderInterceptor`
  和 `WriterInterceptor`。


  对于在其 `filter` 方法中具有 `ClientRequestContext` 参数的 `ClientResponseFilter` 和 `ClientRequestFilter`
  接口，MP-RC 实现会添加一个 `org.eclipse.microprofile.rest.client.invokedMethod` 属性，其值为 `java.lang.reflect.Method`
  对象……


  '
- '# 提供者优先级


  提供者可以通过注解和 `RestClientBuilder` 进行注册。通过构建器注册的提供者将优先于 `@RegisterProvider` 注解。`@RegisterProvider`
  注解的优先级值优先于类上的任何 `@javax.annotation.Priority` 注解。当使用 `RestClientBuilder` 接口上的 register
  方法时，可以覆盖提供者优先级，因为它允许设置优先级。


  '
- '# 功能注册


  如果注册的提供者类型是 JAX-RS `Feature`，则该 `Feature` 设置的优先级也将成为构建器的一部分。实现会维护已注册提供者的整体优先级，无论它们是如何注册的。`Feature`
  将用于在运行时注册额外的提供者，并且可以通过 `@RegisterProvider`、配置或 `RestClientBuilder` 进行注册。`Feature`
  将立即执行。因此，其优先级不被考虑（功能总是被执行）。


  '
- "# 默认提供者\n\nMP-RC 实现必须提供一组最低限度的提供者，包括以下内容：\n\n*   `*/json` 类型：\n    *   JSON-P，`javax.json.JsonValue`\n\
  \    *   JSON-B，`javax.json.bind`\n*   `*` 类型：\n    *   `byte[]`\n    *   `java.lang.String`\n\
  \    *   `java.io.InputStream`\n    *   `java.io.Reader`\n*   `text/plain` 类型：\n\
  \    *   `java.lang.Number 及其子类型`\n    *   `int, long, float 和 double`\n    *  \
  \ `java.lang.Character 和 char`\n    *   `java.lang.Boolean 和 boolean`\n\n\n\n"
- '# 异常映射


  MP-RC 通过 `org.eclipse.microprofile.rest.client.ext.ResponseExceptionMapper` 接口支持将调用响应映射为异常：


  ```

  import javax.annotation.Priority;import javax.ws.rs.Priorities;import javax.ws.rs.core.MultivaluedMap;import
  javax.ws.rs.core.Response;import java.util.Optional;public interface ResponseExceptionMapper<T
  extends Throwable> {    int DEFAULT_PRIORITY = Priorities.USER;    T toThrowable(Response
  response);    default boolean handles(int status, MultivaluedMap<String, Object>
  headers) {        return status >= 400;    }    default int getPriority() {        return
  Optional.ofNullable(getClass().getAnnotation(Priority.class))            .map(Priority::value)            .orElse(DEFAULT_PRIORITY);    }}

  ```


  请考虑以下内容……


  '
- '# 默认异常映射


  每个实现都提供了一个默认的 `ResponseExceptionMapper` 实现，当响应状态码 >= 400 时，该实现会将响应映射并调用为 `javax.ws.rs.WebApplicationException`。其优先级为
  `Integer.MAX_VALUE`，旨在作为遇到错误时的回退机制。此映射器默认会注册到所有客户端接口，但可以通过将 MP Config 属性 `microprofile.rest.client.disable.default.mapper`
  设置为 `true` 来禁用。也可以在构建客户端时，通过使用相同的属性来按客户端禁用：


  ```

  RestClientBuilder.newBuilder().property("microprofile.rest.client.disable.default.mapper",true)

  ```


  '
- '# 异步支持


  MP-RC 支持异步方法调用。当客户端接口方法的返回类型为 `java.util.concurrent.CompletionStage<?>` 类型时，该方法即为异步方法。`WorldClockApi`
  接口的一个声明了异步方法的替代版本（称为 `WorldClockApiAsync.java`）如下所示：


  ```

  import java.util.concurrent.CompletionStage;import javax.ws.rs.GET;import javax.ws.rs.Path;import
  javax.ws.rs.PathParam;import javax.ws.rs.Produces;import javax.ws.rs.core.MediaType;@Path("/api/json")public
  interface WorldClockApiAsync { String BASE_URL = "http://worldclockapi.com/api/json";
  @GET @Path("/utc/now") @Produces(MediaType.APPLICATION_JSON) CompletionStage<Now>
  utc(); @GET @Path("{tz}/now") @Produces(MediaType.APPLICATION_JSON) ...

  ```


  '
- '# 总结


  在本章中，我们学习了两个 Eclipse MicroProfile 规范，即 Eclipse MicroProfile OpenAPI 和 Eclipse MicroProfile
  REST Client。前者提供了为微服务生成符合 OpenAPI 规范的文档的规范，后者则提供了以类型安全的方式调用 REST 端点的规范。在本章中，我们介绍了这些规范的具体功能，提供了一些示例代码，并提供了如何获取这些规范更多信息的指引。您已经了解了
  Eclipse MicroProfile OpenAPI 和 Eclipse MicroProfile REST Client 规范的特性和功能，如何使用它们的注解和编程接口，以及如何将它们集成到您的应用程序中。


  在下一章中，我们将讨论并深入探讨当前市场上存在的 Eclipse MicroProfile 开源实现。


  '
