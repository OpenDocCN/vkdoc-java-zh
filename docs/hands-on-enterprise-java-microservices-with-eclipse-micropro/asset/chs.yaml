- '# MicroProfile Metrics 和 OpenTracing


  一旦开发人员编写了代码并将其投入生产，就需要观察代码正在做什么、性能如何以及正在使用哪些资源。MicroProfile 创建了两个规范来处理这些问题：Metrics
  和（与）OpenTracing（的集成）。


  从 Metrics 部分开始，我们将讨论以下主题：


  *   规范背后的基本原理

  *   已启用服务器上指标的展示格式

  *   从应用程序内部提供指标

  *   使用 Prometheus（一种云原生时序数据库）检索和分析指标数据


  在 OpenTracing 部分，我们将讨论以下内容：


  *   追踪领域简介

  *   配置属性 ...


  '
- '# MicroProfile Metrics


  MicroProfile Metrics 公开了运行中服务器的指标数据（通常称为**遥测**），例如 CPU 和内存使用情况以及线程数。这些数据通常被输入到图表系统中，以可视化指标随时间的变化或用于容量规划目的；当然，当数值超出预定义的阈值范围时，它们也用于通知
  DevOps 人员。


  Java 虚拟机长期以来一直通过 MBean 和 MBeanServer 提供一种公开数据的方式。Java SE 6 为所有虚拟机引入了一种（基于 RMI 的）远程协议，定义了如何从远程进程访问
  MBean Server。处理此协议很困难，并且不适合当今基于 HTTP 的交互。


  另一个痛点是，许多全球现有的服务器以不同的名称公开不同的属性。因此，设置对不同类型服务器的监控并不容易。


  MicroProfile 创建了一个监控规范，通过一个基于 HTTP 的 API（允许监控代理访问）和一个 Java API（允许在一组服务器和 JVM 指标之上导出特定于应用程序的指标）来解决这两个问题。


  MicroProfile Metrics 正在开发规范的 2.x 版本，该版本对 1.x 有一些重大更改。以下部分讨论 1.x——2.0 中的更改在 *MP-Metrics
  2.0 中的新特性* 部分中讨论。


  该规范为指标定义了三个范围：


  *   **基础**：这些是每个合规供应商都必须支持的指标，主要是 JVM 统计数据。

  *   **供应商**：可选的供应商特定指标，不可移植。

  *   **应用程序**：来自已部署应用程序的可选指标。Java API 将在*提供特定于应用程序的指标*部分中展示。


  MicroProfile Metrics 解决的经典 JMX 方法的另一个问题是缺乏关于指标语义的元数据信息。


  '
- '# 元数据


  元数据是 MicroProfile Metrics 中非常重要的一部分。虽然可以公开一个值为 `142` 的指标 `foo`，但它不是自描述的。看到该指标的操作员无法判断这是什么、单位是什么，以及
  `142` 是否是一个好值。


  元数据用于提供单位以及指标的描述，这样前面的内容现在可以是 `foo: runtime; 142` 秒。这现在允许在显示时正确缩放为*两分二十二秒*。并且收到与此指标相关警报的用户可以理解它指的是某个运行时计时。


  '
- "# 从服务器检索指标\n\n默认情况下，MicroProfile Metrics 通过 REST 接口在 `/metrics` 上下文根下公开指标。您可以在\
  \ [`github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter05-metrics`](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter05-metrics)\
  \ 找到代码。按照 `README.md` 文件构建代码、运行它，并使用浏览器多次访问 [`localhost:8080/book-metrics/hello`](http://localhost:8080/book-metrics/hello)\
  \ 和 [`localhost:8080/book-metrics`](http://localhost:8080/book-metrics) 端点以生成一些数据。\n\
  \n从 MicroProfile 1.3/2.0 开始，规范中没有关于保护该端点的内容。因此，这留给各个实现自行处理。\n\n使用此 REST 接口，可以轻松检索数据，例如，通过以下\
  \ `curl` 命令：\n\n```\n$ curl http://localhost:8080/metrics\n```\n\n此命令以 Prometheus\
  \ 文本格式（缩写）显示 Metrics 1.x 输出：\n\n```\n# TYPE base:classloader_total_loaded_class_count\
  \ counter\nbase:classloader_total_loaded_class_count 13752.0 \n# TYPE base:cpu_system_load_average\
  \ gauge\nbase:cpu_system_load_average 2.796875\n# TYPE base:thread_count counter\n\
  base:thread_count 76.0\n# TYPE vendor:memory_pool_metaspace_usage_max_bytes gauge\n\
  vendor:memory_pool_metaspace_usage_max_bytes 7.0916056E7\n# TYPE application:hello_time_rate_per_second\
  \ gauge\napplication:hello_time_rate_per_second{app=\"shop\",type=\"timer\"} \n\
  3.169298061424996E-10\n# TYPE application:hello_time_one_min_rate_per_second gauge\n\
  application:hello_time_one_min_rate_per_second{app=\"shop\",type=\"timer\"} 0.0\n\
  [...]\n```\n\n如果您不提供媒体类型，默认输出格式是 Prometheus 文本格式（也可以在浏览器中很好地呈现）。Prometheus 格式在 `#\
  \ TYPE` 和 `# HELP` 行中向值公开了额外的元数据。您还可以在前面的示例中看到范围（base、vendor 和 application）是如何添加到实际指标名称之前的。\n\
  \n或者，可以通过提供 `HAccept` 标头以 JSON 格式检索数据（同样缩写）：\n\n```\n$ curl -HAccept:application/json\
  \ http://localhost:8080/metrics\n```\n\n此命令产生以下输出：\n\n```\n{\n \"application\" :\n\
  \  {\n    \"helloTime\" : {\n        \"p50\": 1.4884994E7,\n     [...]\n       \"\
  count\": 1,\n       \"meanRate\": 0.06189342578194245\n     },\n    \"getCounted\"\
  \ : 1\n  },\n  \"base\" :\n  {\n    \"classloader.totalLoadedClass.count\" : 13970,\n\
  \    \"cpu.systemLoadAverage\" : 2.572265625,\n    \"gc.PS Scavenge.time\" : 290\n\
  \  },\n  \"vendor\" :\n  {\n    \"test\" : 271,\n    \"memoryPool.Metaspace.usage.max\"\
  \ : 72016928,\n }\n```\n\n在这种情况下，公开的是纯数据；范围构成顶层，相应的指标嵌套在其中。可以通过 HTTP `XOPTIONS`\
  \ 调用检索匹配的元数据：\n\n```\n$ curl XOPTIONS -HAccept:application/json http://localhost:8080/metrics\n\
  ```\n\n输出现在包含作为映射的元数据：\n\n```\n{\n\"application\" : {\n \"helloTime\": {\n \"unit\"\
  : \"nanoseconds\",\n \"type\": \"timer\",\n \"description\": \"Timing of the Hello\
  \ call\",\n \"tags\": \"app=shop,type=timer\",\n \"displayName\": \"helloTime\"\n\
  \ }\n}\n[...]\n```\n\n现在我们已经了解了如何检索不同类型的数据和元数据，我们将快速了解一下如何将检索限制到特定范围。\n\n\n\n"
- '# 访问特定作用域


  通过在路径后附加作用域名称，也可以仅检索单个作用域的数据。在以下示例中，我们仅检索基础作用域的指标：


  ```

  $ curl http://localhost:8080/metrics/base

  ```


  现在，这仅显示基础作用域的指标：


  ```

  # TYPE base:classloader_total_loaded_class_count counterbase:classloader_total_loaded_class_count
  13973.0# TYPE base:cpu_system_load_average gaugebase:cpu_system_load_average 1.92236328125

  ```


  在本节中，我们了解了如何从启用了 MicroProfile Metrics 的服务器检索指标。基础作用域和供应商作用域中的指标由服务器预定义。应用程序作用域中的指标可以由用户定义，我们将在下一节中探讨这一点。……


  '
- "# 提供特定于应用程序的指标\n\n应用程序可以选择通过 CDI 编程模型公开指标数据。此模型受 DropWizard Metrics 启发，以便更容易地将应用程序迁移到\
  \ MP-Metrics。它还使用了 DropWizard Metrics 中的注解，这些注解已得到增强以支持元数据。\n\n让我们从一个示例开始，定义一个计数器，然后在代码中递增它：\n\
  \n```\n@Inject\n@Metric(absolute = true, description = \"# calls to /health\")\n\
  Counter hCount; // 这是计数器\n\n@GET\n@Path(\"/health\")\npublic Response getHealth()\
  \ throws Exception {\n    hCount.inc(); // 它在应用程序中被增加\n    [...]\n}\n```\n\n在此示例中，我们通过将计数器注入到\
  \ `hCount` 变量中来注册它：\n\n`@Metric` 注解提供了额外信息，例如描述，并且还指示名称是变量名，不包含额外的包（`absolute=true`）。\n\
  \n在以下示例中，我们让实现为我们执行计数。这实现了计算方法或 REST 端点调用次数的常见用例：\n\n```\n@Counted(absolute=true,\n\
  \        description=\"# calls to getCounted\",\n        monotonic=true)\n@GET\n\
  @Path(\"/c\")\npublic String getCounted() {\n    return \"Counted called\";\n}\n\
  ```\n\n`@Counted` 的 `monotonic` 属性表示持续增加计数器，否则在离开方法时计数器会减少。\n\n"
- '# 更多指标类型


  计数器只是可以公开的指标类型之一，通常需要更复杂的类型，例如，记录方法调用持续时间的分布。


  让我们快速了解一下这些类型。它们大多遵循 `@Counted` 的模式。


  '
- "# 仪表\n\n仪表是一种其值可以任意上下波动的指标。仪表始终由一个提供其值的方法支持：\n\n```\n@Gauge\nint provideGaugeValue()\
  \ {\n  return 42;  // 仪表的值始终是 42\n}\n```\n\n与其他所有值一样，仪表的值是在客户端请求值时计算的。这要求仪表方法的实现非常快速，以免阻塞调用方。\n\
  \n"
- '# 计量器


  计量器测量被装饰方法随时间被调用的速率。对于 JAX-RS 端点，这将是每秒的请求数。计量器可以通过注解声明：


  ```

  @GET@Path("/m")@Metered(absolute = true)public String getMetered() {  return "Metered
  called";}

  ```


  当客户端从计量器请求数据时，服务器提供平均速率，以及一分钟、五分钟和十五分钟的移动平均值。后者可能对一些读者来说很熟悉，类似于 Unix/Linux 的 `uptime`
  命令。


  '
- "# 直方图\n\n直方图是一种对数据分布进行采样的指标类型。它主要用于记录执行被装饰方法所花费时间的分布。与其他类型不同，直方图不能通过专用注解声明，但例如计时器包含直方图数据。要单独使用直方图，您需要在代码中注册并更新它：\n\
  \n```\n// 注册直方图\n@Inject\n@Metric(absolute = true)\nprivate Histogram aHistogram;\n\
  \n// 使用 0 到 10 之间的值更新\n@GET\n@Path(\"/h\")\npublic String getHistogram() {\n  aHistogram.update((int)\
  \ (Math.random() * 10.0));\n  return \"Histogram called\";\n}\n```\n\n这种在代码中使用指标的方式也适用于其他类型。\n\
  \n"
- '# 计时器


  计时器基本上是直方图和计量器的组合，并且同样可以通过注解声明：


  ```

  @GET@Path("/hello")@Timed(name="helloTime", absolute = true,        description
  = "Timing of the Hello call",       tags={"type=timer","app=shop"})public String
  getHelloTimed() {  try {    Thread.sleep((long) (Math.random()*200.0));  } catch
  (InterruptedException e) {     // 我们不在乎睡眠是否被中断。  }  return "Hello World";}

  ```


  此示例中的代码会等待一小段随机时间，以使输出更有趣一些。


  '
- '# 标签


  标签或标记是一种额外组织信息的方式。它们随着 Docker 和 Kubernetes 而流行起来。在 MicroProfile Metrics 1.x 中，它们被直接转发到输出，无需进一步处理，并且不用于区分指标。MicroProfile
  Metrics 支持服务器范围的和每个指标的标签，这些标签会在输出中合并在一起。


  '
- '# 服务器范围的标签


  服务器范围的标签通过环境变量 `MP_METRICS_TAGS` 设置，如下所示：


  ```

  export MP_METRICS_TAGS=app=myShopjava -jar target/metrics-thorntail.jar

  ```


  这些标签将被添加到服务器中定义的所有指标，并添加到相应的输出格式中。


  因此，给定上述命令，一个计数器 `@Counted(absolute=true) int myCount;` 在 Prometheus 中最终会如下所示：


  ```

  # TYPE application:my_count counterapplication:my_count{app="myShop"} 0

  ```


  '
- "# 每个指标的标签\n\n标签也可以基于每个指标提供：\n\n```\n@Counted(tags=[\"version=v1\",\"commit=abcde\"\
  ])\nvoid doSomething() {\n  [...]\n}\n```\n\n此示例在名为 `doSomething` 的指标上定义了两个标签：`version=v1`\
  \ 和 `commit=abcde`。这些标签将与全局标签合并以用于输出。结合前面的全局标签，输出中将有三个标签。\n\n在本节中，我们了解了如何向指标添加标签以提供额外的元数据。这些标签可以是全局的，适用于服务器公开的所有指标，也可以是特定于应用程序的，适用于单个指标。\n\
  \n"
- '# 使用 Prometheus 检索指标


  现在我们已经了解了公开了哪些指标以及如何定义我们自己的指标，让我们看看如何将它们收集到**时序数据库**（**TSDB**）中。为此，我们使用 Prometheus，这是一个
  CNCF（[`www.cncf.io/`](https://www.cncf.io/)）项目，已在云原生世界中得到广泛采用。


  您可以从 [`prometheus.io`](https://prometheus.io/) 下载 Prometheus，或者在 macOS 上通过 `brew
  install prometheus` 安装。


  下载 Prometheus 后，我们需要一个配置文件来定义要抓取的目标，然后才能启动服务器。出于我们的目的，我们将使用以下简单的文件：


  ```

  .Prometheus configuration for a Thorntail Server, prom.ymlscrape_configs:# Configuration
  to poll from Thorntail- job_name: ''thorntail'' ...

  ```


  '
- '# MP-Metrics 2.0 中的新特性


  注意：当您阅读本文时，MicroProfile Metrics 2.0 可能尚未发布，并且内容可能因早期用户/实施者的反馈而略有变化。




  '
- '# 计数器的变革——引入 ConcurrentGauge


  Metrics 1.x 中的计数器具有两个功能：


  *   提供并发调用次数的度量

  *   作为一个可以累计到已提交事务数量的指标，例如


  不幸的是，第一种方式是使用注解时未指定 `monotonic` 关键字的默认行为，这出乎意料且让许多用户感到困惑。第二种方式也存在问题，因为计数器的值可以随意减少，这违反了计数器是单调递增指标的理解。


  因此，Metrics 工作组决定改变计数器的行为，使其仅作为单调递增的指标工作，并将...


  '
- "# 标签\n\n标签现在也用于区分具有相同名称和类型但标签不同的指标。它们可用于在 REST 端点上支持多个 `result_code` 指标，以统计（不）成功调用的次数：\n\
  \n```\n@Inject\n@Metric(tags=\"{code,200}\", name=\"result_code\")\nCounter result_code_200k;\n\
  \n@Inject\n@Metric(tags=\"{code,500}\", name=\"result_code\")\nCounter result_code_500;\n\
  \n@GET\n@Path(\"/\")\npublic String getData(String someParam) {\n\n String result\
  \ = getSomeData(someParam);\n if (result == null ) {\n   result_code_500.inc();\n\
  \ } else {\n   result_code_200.inc();\n }\n return result;\n}\n```\n\n在底层，指标不再仅通过名称和类型来标识，还通过它们的标签来标识。为此，引入了新的\
  \ `MetricID` 来承载名称和标签。\n\n"
- '# 数据输出格式的变化


  MicroProfile Metrics 2.0 中多标签指标的引入，要求改变提供给客户端的指标数据格式。


  Prometheus 格式也存在一些不一致之处，因此我们决定以有时不兼容的方式改进这些格式：


  *   作用域和指标名称之间的冒号（:）分隔符已改为下划线（_）。

  *   Prometheus 输出格式不再要求将驼峰式命名转换为蛇形命名。

  *   垃圾收集器的基本指标格式已更改，现在为各种垃圾收集器使用标签。


  请查阅 MicroProfile 2.0 规范中的发布说明，网址为 [`github.com/eclipse/microprofile-metrics/releases/tag/2.0
  ...`](https://github.com/eclipse/microprofile-metrics/releases/tag/2.0)


  '
- '# MicroProfile OpenTracing


  在现代微服务世界中，单个请求可能穿越运行在不同机器、数据中心甚至地理区域上的多个进程。


  此类系统的可观测性是一项具有挑战性的任务，但如果做得好，它允许我们*讲述*每个单独请求的故事，而不是从指标和日志等信号中推导出的系统整体状态。在本章中，我们将向您介绍分布式追踪，并解释
  OpenTracing 及其在 MicroProfile OpenTracing 1.3 中的集成。


  在上一节中，我们了解了指标以及它们如何观测应用程序或每个单独的组件。这些信息无疑非常有价值，并提供了系统的宏观视图，但同时，它对于穿越多个组件的每个单独请求几乎没有任何说明。分布式追踪展示了请求端到端发生情况的微观视图，以便我们可以追溯性地理解应用程序中每个单独组件的行为。


  分布式追踪是基于动作的；换句话说，它记录系统中与某个动作相关的所有内容。例如，它捕获请求的详细信息以及所有因果相关的活动。我们不会详细讨论这种追踪的工作原理，但简而言之，我们可以说明以下几点：


  *   追踪基础设施将上下文元数据附加到每个请求，通常是一组唯一的 ID——`traceId`、`spanId` 和 `parentId`。

  *   检测层记录性能分析数据，并在进程内部和进程之间传播元数据。

  *   捕获的性能分析数据包含元数据和对先前事件的因果引用。


  基于捕获的数据，分布式追踪系统通常提供以下功能：


  *   根因分析

  *   延迟优化——关键路径分析

  *   分布式上下文传播——行李

  *   上下文日志记录

  *   服务依赖关系分析


  在我们深入探讨 MicroProfile OpenTracing 之前，让我们简要地看一下 OpenTracing，以便更好地理解该 API 提供了什么。


  '
- '# OpenTracing 项目


  OpenTracing 项目 ([`opentracing.io`](https://opentracing.io/)) 提供了一个供应商中立的规范 [(https://github.com/opentracing/specification)](https://github.com/opentracing/specification)
  和用于描述分布式事务的多语言 API。供应商中立性很重要，因为在大型组织中启用分布式追踪时，代码检测是最耗时且最具挑战性的任务。我们想强调，OpenTracing
  只是一个 API。实际部署将需要一个插入式的追踪器实现，该实现在被监控的进程内运行，并将数据发送到追踪系统。


  从 API 的角度来看，有三个关键概念：Tracer、Span 和 SpanContext。Tracer 是应用程序可用的单例对象，可用于建模...


  '
- '# 配置属性


  OpenTracing 是供应商中立的，因此可以与任何使用此 API 的供应商的追踪实现一起工作。每个追踪器实现都将以不同的方式进行配置。因此，配置超出了 MicroProfile
  OpenTracing 规范的范围。然而，该规范本身公开了一些配置属性，用于调整追踪范围或生成的数据。该配置利用 MicroProfile Config 规范为所有支持的配置选项提供一致的方法。


  目前，该规范公开了以下内容：


  *   `mp.opentracing.server.skip-pattern`：一个跳过模式，用于避免追踪选定的 REST 端点。

  *   `mp.opentracing.server.operation-name-provider`：这指定了服务器跨度（span）的操作名称提供者。可能的值为
  `http-path` 和 `class-method`。默认值为 `class-method`，它完全使用限定类名与方法名连接；例如，`GET:org.eclipse.Service.get`。`http-path`
  使用 `@Path` 注解的值作为操作名称。


  '
- '# 自动检测


  这里的动机是让追踪自动捕获所有关键的性能信息，并自动在运行时之间传播追踪上下文。第二部分尤其关键，因为它确保追踪不会中断，并且我们能够调查端到端的调用。为了成功追踪，运行时之间的每种通信技术都必须被检测。在
  MicroProfile 的情况下，它是 JAX-RS 和 MicroProfile Rest Client。




  '
- "# JAX-RS\n\nMicroProfile OpenTracing 会自动追踪所有入站 JAX-RS 端点。然而，JAX-RS 客户端侧的处理更为复杂，需要调用注册\
  \ API `org.eclipse.microprofile.opentracing.ClientTracingRegistrar.configure(ClientBuilder\
  \ clientBuilder)` 来添加追踪能力。MicroProfile 实现可以全局地为所有客户端接口启用追踪；但为了更好的可移植性，建议使用注册 API。\n\
  \n默认的追踪行为可以通过禁用特定请求的追踪或更改生成的服务端跨度操作名称来修改。更多信息，请参考本章后面的*配置属性*部分。检测层会自动将以下请求范围的信息添加到每个跨度中：\n\
  \n*   `http.method`：请求的 HTTP 方法。\n*   `http.status_code`：请求的状态码。\n*   `http.url`：请求的\
  \ URL。\n*   `component`：被检测组件的名称，即 `jaxrs`。\n*   `span.kind`：客户端或服务端。\n*   `error`\
  \ – `true` 或 `false`。此为可选字段，如果存在，检测层还会将异常作为 `error.object` 添加到跨度日志中。\n\n所有这些标签都可以通过追踪系统用户界面来查询数据，或者用于许多追踪系统提供的数据分析任务。可以通过注入的追踪器实例将额外的元数据添加到当前活跃的跨度中。这可以在过滤器中全局执行，也可以在\
  \ REST 处理器中局部执行，如下面的代码示例所示，通过向服务端跨度添加用户代理标头（1）：\n\n```\n@Path(\"/\")\npublic class\
  \ JaxRsService {\n   @Inject\n   private io.opentracing.Tracer tracer;\n\n   @GET\n\
  \   @Path(\"/hello\")\n   @Traced(operationName=\"greeting\") (2)\n   public String\
  \ hello(@HeaderParam(\"user-agent\") String userAgent) {\n       tracer.activeSpan().setTag(\"\
  user-agent\", userAgent); (1)\n   }\n}\n```\n\n默认情况下，服务端跨度的操作名称为 `http_method:package.className.method`。但是，可以通过使用\
  \ `@Traced` 注解（2）在本地更改此设置，或者通过配置属性（请参阅配置部分）进行全局更改。\n\n"
- '# MicroProfile Rest Client


  如前一节所述，默认情况下，所有 REST 客户端接口都会自动被追踪，无需额外配置。可以通过将 `@Traced` 注解应用于接口或方法来更改此行为以禁用追踪。当应用于接口时，所有方法都将跳过追踪。请注意，追踪上下文不会被传播。因此，如果请求继续到已检测的运行时，则会启动一个新的追踪。


  '
- '# 显式检测


  有时，自动检测无法捕获所有关键的时间信息，因此需要额外的追踪点。例如，我们可能希望追踪业务层的调用，或初始化 OpenTracing 项目（[`github.com/opentracing-contrib`](https://github.com/opentracing-contrib)）提供的第三方检测。


  显式检测可以通过三种方式完成：


  *   在**上下文和依赖注入**（**CDI**）Bean 上添加 `@Traced` 注解。

  *   注入追踪器并手动创建跨度。

  *   初始化第三方检测。外部检测的初始化取决于其自身的初始化要求。MicroProfile 只需提供一个追踪器实例，这在前一点中已经涵盖。


  现在让我们详细讨论这些内容。


  '
- '# @Traced 注解


  MicroProfile OpenTracing 定义了一个 `@Traced` 注解，可用于在 CDI Bean 上启用追踪，或在自动追踪的接口上禁用追踪。该注解还可用于覆盖其他自动追踪组件（JAX-RS
  端点）上的操作名称。


  以下代码示例展示了如何使用 `@Traced` 注解在 CDI Bean 上启用追踪。`(1)` 为 Bean 定义的所有方法启用追踪。`(2)` 将默认操作名称（`package.className.method`）覆盖为
  `get_all_users`。`(3)` 禁用了 health 方法的追踪：


  ```

  @Traced (1)@ApplicationScopedpublic class Service {   @Traced(operationName = "get_all_users")
  (2)   public void getUsers() {        // 业务代码   } @Traced(false) (3) ...

  ```


  '
- "# 追踪器注入\n\n应用程序可以注入一个 `io.opentracing.Tracer` Bean，它暴露了完整的 OpenTracing API。这允许应用程序开发者利用更高级的用例，例如向当前活跃的跨度添加元数据、手动创建跨度、使用\
  \ baggage 进行上下文传播，或初始化额外的第三方检测。\n\n以下代码展示了如何使用追踪器将数据附加到当前活跃的跨度 `(1)`：\n\n```\n@Path(\"\
  /\")\npublic class Service {\n    @Inject\n    private Tracer tracer;\n\n    @GET\n\
  \    @Path(\"\")\n    @Produces(MediaType.TEXT_PLAIN)\n    public String greeting()\
  \ {\n       tracer.activeSpan()\n           .setTag(\"greeting\", \"hello\"); (1)\n\
  \       return \"hello\";\n   }\n}\n```\n\n这对于向跨度添加业务相关数据非常有用，也可用于记录异常或任何其他性能分析信息。\n\
  \n"
