- '# 总结


  在本章中，我们学习了 MicroProfile Health Check 和 JWT Propagation 项目。你现在应该理解了什么是健康检查，以及如何添加特定于应用程序的检查（称为过程）。这些检查允许你的微服务在云环境中描述其非平凡的健康需求。你还应该理解如何使用
  JWT 在微服务之上提供认证和授权能力，以控制对端点的访问。你还应该理解如何使用 JWT 中的内容以特定于用户的方式增强你的微服务。


  下一章将介绍 MicroProfile Metrics 和 OpenTracing 特性。这些特性允许你的微服务提供额外的信息……




