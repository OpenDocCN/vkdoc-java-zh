- '# MicroProfile 健康检查和 JWT 传播


  在本章中，我们将介绍 MicroProfile 健康检查和 **JSON Web 令牌**（**JWT**）传播项目。健康检查项目关注于将应用程序定义的运行状况暴露给外部世界，而
  JWT 传播则关注于定义一种可互操作的安全令牌以及在应用程序中使用该令牌。在本章中，你将了解这些规范所解决的问题、它们的结构以及如何在你的应用程序中使用它们。本章中的代码片段仅供参考。如果你想要该规范的工作代码版本，请参阅第
  8 章，*一个可运行的 Eclipse MicroProfile 代码示例*。


  我们将涵盖以下主题：


  *   什么是健康检查

  *   MicroProfile 健康检查如何暴露健康检查端点以及对该端点的查询格式

  *   如何为你的应用程序编写 MicroProfile 健康检查

  *   MicroProfile JWT 传播中令牌所需的格式

  *   我们如何利用 MicroProfile JWT 传播进行安全决策


  '
- '# 技术要求


  要构建和运行本章中的示例，你需要 Maven 3.5+ 和 Java 8 JDK。本章的代码可以在 [`github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-healthcheck`](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-healthcheck)
  和 [`github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation`](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation)
  找到，分别对应 MicroProfile 健康检查和 MicroProfile JWT 传播部分。


  '
- '# 理解健康检查以及 MicroProfile 如何处理它们


  在云原生架构中，健康检查用于确定计算节点是否存活并准备好执行工作。就绪状态描述了容器启动或滚动更新（即重新部署）时的状态。在此期间，云平台需要确保在该实例准备好执行工作之前，没有网络流量被路由到该实例。


  另一方面，存活状态描述了正在运行的容器的状态；也就是说，它是否仍然能够响应请求？如果存活状态或就绪状态被视为无效，计算节点将被丢弃（终止或关闭），并最终被另一个健康的实例替换。


  健康检查是与云平台的编排框架和调度程序的基本契约。检查过程由应用程序开发人员提供，平台使用这些过程来持续确保你的应用程序或服务的可用性。


  MicroProfile 健康检查 1.0（MP-HC）支持一个可用于存活检查或就绪检查的单一健康检查端点。MicroProfile 健康检查 2.0 计划增加对多个端点的支持，以允许应用程序定义存活探针和就绪探针。


  MP-HC 规范详细说明了两个元素：一个协议及其响应有线格式部分，以及一个用于定义响应内容的 Java API。


  MP-HC 功能的架构被建模为一个应用程序，该应用程序由零个或多个健康检查过程组成，这些过程通过逻辑上的 `AND` 连接起来，以推导出整体健康检查状态。一个过程代表一个应用程序定义的对所需条件的检查，它具有名称、状态以及可选的检查数据。




  '
- '# 健康检查协议与线路格式


  MP-HC 规范定义了支持对逻辑上的 `/health` REST 端点发起 HTTP GET 请求的要求，该端点可能返回以下任一状态码来表示端点状态：


  *   `200`：端点正常运行且健康。

  *   `500`：端点因未知错误而不健康。

  *   `503`：端点已宕机，无法响应请求。


  请注意，许多云环境仅将请求返回码视为成功或失败，因此可能无法区分 `500` 和 `503` 状态码。


  `/health` 请求的负载必须是一个 JSON 对象，该对象需符合下面给出的模式（有关 JSON 模式语法的更多信息，请参见 [`jsonschema.net/#/`](http://jsonschema.net/#/)）。


  以下是 ...


  '
- "# 健康检查 Java API\n\n大部分基础工作由实现 MP-HC 规范的应用程序框架完成。您的任务是，通过微服务使用 MP-HC API 定义的健康检查流程，来决定如何确定存活状态或就绪状态。\n\
  \n为此，您需要实现一个健康检查流程，即通过使用标记了 `Health` 注解的 Bean 来实现一个或多个 `HealthCheck` 接口的实例。\n\n\
  `HealthCheck` 接口在以下代码块中提供：\n\n```\npackage org.eclipse.microprofile.health;\n\n\
  @FunctionalInterface\npublic interface HealthCheck {\n  HealthCheckResponse call();\n\
  }\n```\n\n`Health` 注解的代码在以下代码块中提供：\n\n```\npackage org.eclipse.microprofile.health;\n\
  \nimport javax.inject.Qualifier;\nimport java.lang.annotation.Documented;\nimport\
  \ java.lang.annotation.Retention;\nimport java.lang.annotation.RetentionPolicy;\n\
  \n@Qualifier\n@Documented\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface\
  \ Health {\n}\n```\n\n以下示例展示了一个假设的磁盘空间检查的 `HealthCheck` 实现。请注意，该检查将当前可用空间作为响应数据的一部分包含在内。`HealthCheckResponse`\
  \ 类支持使用构建器接口来填充响应对象。\n\n以下是一个假设的磁盘空间 `HealthCheck` 流程实现：\n\n```\nimport javax.enterprise.context.ApplicationScoped;\n\
  import org.eclipse.microprofile.health.Health;\nimport org.eclipse.microprofile.health.HealthCheck;\n\
  import org.eclipse.microprofile.health.HealthCheckResponse;\n\n@Health\n@ApplicationScoped\n\
  public class CheckDiskspace implements HealthCheck {\n  @Override\n  public HealthCheckResponse\
  \ call() {\n      return HealthCheckResponse.named(\"diskspace\")\n            \
  \  .withData(\"free\", \"780mb\")\n              .up()\n              .build();\n\
  \  }\n}\n```\n\n在此示例中，我们创建了一个名为 `diskspace` 的健康响应，其状态为 `up`，并包含名为 `free`、字符串值为 `780mb`\
  \ 的自定义数据。\n\n另一个代表某个服务端点的健康检查示例如下所示。\n\n一个假设的服务 `HealthCheck` 流程实现如下所示：\n\n```\n\
  package io.packt.hc.rest;\n//ServiceCheck example\n\nimport javax.enterprise.context.ApplicationScoped;\n\
  import org.eclipse.microprofile.health.Health;\nimport org.eclipse.microprofile.health.HealthCheck;\n\
  import org.eclipse.microprofile.health.HealthCheckResponse;\n\n@Health\n@ApplicationScoped\n\
  public class ServiceCheck implements HealthCheck {\n public HealthCheckResponse\
  \ call() {\n return HealthCheckResponse.named(\"service-check\")\n .withData(\"\
  port\", 12345)\n .withData(\"isSecure\", true)\n .withData(\"hostname\", \"service.jboss.com\"\
  )\n .up()\n .build();\n }\n}\n```\n\n在此示例中，我们创建了一个名为 `service-check` 的健康响应，其状态为\
  \ `up`，并包含以下附加数据：\n\n*   一个 `port` 项，整数值为 `12345`\n*   一个 `isSecure` 项，布尔值为 `true`\n\
  *   一个 `hostname` 项，字符串值为 `service.jboss.com`\n\n由 CDI 管理的健康检查会被应用程序运行时自动发现并注册。运行时自动暴露一个\
  \ HTTP 端点 `/health`，云平台通过该端点来探查您的应用程序以确定其状态。您可以通过构建 `Chapter04-healthcheck` 应用程序并运行它来测试这一点。您将看到以下输出：\n\
  \n```\nScotts-iMacPro:hc starksm$ mvn package\n[INFO] Scanning for projects…\n...\n\
  Resolving 144 out of 420 artifacts\n\n[INFO] Repackaging .war: /Users/starksm/Dev/JBoss/Microprofile/PacktBook/Chapter04-metricsandhc/hc/target/health-check.war\n\
  \n[INFO] Repackaged .war: /Users/starksm/Dev/JBoss/Microprofile/PacktBook/Chapter04-metricsandhc/hc/target/health-check.war\n\
  \n[INFO] -----------------------------------------------------------------------\n\
  \n[INFO] BUILD SUCCESS\n\n[INFO] -----------------------------------------------------------------------\n\
  \n[INFO] Total time:  7.660 s\n\n[INFO] Finished at: 2019-04-16T21:55:14-07:00\n\
  \n[INFO] -----------------------------------------------------------------------\n\
  \nScotts-iMacPro:hc starksm$ java -jar target/health-check-thorntail.jar\n\n2019-04-16\
  \ 21:57:03,305 INFO  [org.wildfly.swarm] (main) THORN0013: Installed fraction: MicroProfile\
  \ Fault Tolerance - STABLE          io.thorntail:microprofile-fault-tolerance:2.4.0.Final\n\
  \n…\n\n2019-04-16 21:57:07,449 INFO  [org.jboss.as.server] (main) WFLYSRV0010: Deployed\
  \ \"health-check.war\" (runtime-name : \"health-check.war\")\n\n2019-04-16 21:57:07,453\
  \ INFO  [org.wildfly.swarm] (main) THORN99999: Thorntail is Ready\n```\n\n服务器启动后，通过查询健康端点来测试健康检查：\n\
  \n```\nScotts-iMacPro:Microprofile starksm$ curl -s http://localhost:8080/health\
  \ | jq\n{\n \"outcome\": \"UP\",\n \"checks\": [\n   {\n     \"name\": \"service-check\"\
  ,\n     \"state\": \"UP\",\n     \"data\": {\n       \"hostname\": \"service.jboss.com\"\
  ,\n       \"port\": 12345,\n       \"isSecure\": true\n     }\n   },\n   {\n   \
  \  \"name\": \"diskspace\",\n     \"state\": \"UP\",\n     \"data\": {\n       \"\
  free\": \"780mb\"\n     }\n   }\n ]\n}\n```\n\n这表明整体健康状态为 `UP`。整体状态是应用程序中所有健康检查流程的逻辑\
  \ `OR` 结果。在此例中，它是我们看到的两个健康检查流程（`diskspace` 和 `service-check`）的逻辑 `AND` 结果。\n\n"
- '# 与云平台集成


  大多数云平台同时支持基于 TCP 和 HTTP 的检查。要将健康检查与您选择的云平台集成，您需要配置云部署，使其指向托管您应用程序的节点上的 HTTP 入口点
  `/health`。


  云平台将在 HTTP 入口点上调用 `GET` 查询；所有已注册的检查都将被执行，各个检查的总和决定了最终结果。


  通常，云平台会忽略响应负载，仅查看 HTTP 状态码来确定您应用程序的存活状态或就绪状态。成功的结果 `UP` 将映射为 `200`，而 `DOWN` 将映射为
  `503`。




  '
- "# 人工操作员\n\nJSON 响应负载的主要用途是为操作员提供一种检查应用程序状态的方式。为此，健康检查允许将附加数据附加到健康检查响应中，正如我们在 `CheckDiskspace`\
  \ 和 `ServiceCheck` 示例中所见。请考虑以下片段：\n\n```\n[...]\nreturn HealthCheckResponse\n  \
  \         .named(\"memory-check\")\n           .withData(\"free-heap\", \"64mb\"\
  )\n           .up()\n           .build();\n[...]\n```\n\n此处提供了关于 `free-heap` 的附加信息，并将成为响应负载的一部分，如下面的响应片段所示。显示\
  \ `memory-check` 过程内容的 JSON 响应片段如下：\n\n```\n{\n...\n   \"checks\": [\n       {\n\
  \           \"name\": \"memory-check\",\n           \"state\": \"UP\",\n       \
  \    \"data\": {\n               \"free-heap\": \"64mb\"\n           }\n       }\n\
  \   ],\n   \"outcome\": \"UP\"\n}\n```\n\n在这里，我们看到了 `memory-check` 过程，其状态为 `UP`，以及一个值为\
  \ `64mb` 的字符串类型附加数据项 `free-heap`。\n\n**MP-Health 的 Eclipse 资源/GitHub 坐标**：\nMP-Health\
  \ 项目的源代码可以在 [`github.com/eclipse/microprofile-health`](https://github.com/eclipse/microprofile-health)\
  \ 找到。\n\n"
- '# 健康检查响应消息的变更


  MicroProfile Health Check 3.0 引入了对健康检查 JSON 响应消息格式的更改。具体来说，字段 `outcome` 和 `state`
  已被字段 `status` 取代。


  此外，`@Health` 限定符在 Health Check 3.0 版本中已被弃用，同时引入了 `@Liveness` 和 `@Readiness` 限定符。对于这两个限定符，还引入了
  `/health/live` 和 `/health/ready` 端点，分别用于调用所有存活性和就绪性过程。最后，为了向后兼容，`/health` 端点现在会调用所有带有
  `@Health`、`@Liveness` 或 `@Readiness` 限定符的过程。


  现在是时候讨论 JWT 传播了。


  '
- '# 在 MicroProfile 中使用 JSON Web Token 传播


  **JSON Web Token**（**JWT**）是一种承载安全信息的通用格式，被许多不同的基于 Web 的安全协议所使用。然而，关于 JWT 的具体内容以及签名
  JWT 所使用的安全算法，缺乏标准化。**MicroProfile JWT**（**MP-JWT**）传播项目规范研究了基于 **OpenID Connect**（**OIDC**）的
  JWT 规范（[`openid.net/connect/`](http://openid.net/connect/)）（[`tools.ietf.org/html/rfc7519`](https://tools.ietf.org/html/rfc7519)），并在此基础上定义了一套需求，以促进
  JWT 在基于 MicroProfile 的微服务中的互操作性，同时提供了从 JWT 访问信息的 API。


  关于 OIDC 和 JWT 如何工作，包括应用程序/微服务如何拦截 bearer 令牌的描述，请参考 [`openid.net/connect/`](http://openid.net/connect/)
  上的 *Basic Client Implementer''s Guide*。


  在本节中，您将了解以下内容：


  *   OIDC 和 JWT 规范中为实现互操作性所需的声明和签名算法

  *   使用 JWT 对微服务端点进行**基于角色的访问控制**（**RBAC**）

  *   如何使用 MP-JWT API 访问 JWT 及其声明值


  '
- '# 互操作性建议


  MP-JWT 作为令牌格式的最大效用取决于身份提供商和服务提供商之间的协议。这意味着负责颁发令牌的身份提供商应能够使用 MP-JWT 格式颁发令牌，以便服务提供商能够理解并检查令牌，从而收集关于主体的信息。MP-JWT
  的主要目标如下：


  *   它应可用作身份验证令牌。

  *   它应可用作授权令牌，其中包含通过组声明间接授予的应用程序级角色。

  *   它可以支持 IANA JWT 分配（[`www.iana.org/assignments/jwt/jwt.xhtml`](https://www.iana.org/assignments/jwt/jwt.xhtml)）中描述的其他标准声明，以及非标准声明...


  '
- "# 必需的 MP-JWT 声明\n\n实现需要支持的必需 MP-JWT 声明集包括以下内容：\n\n*   `typ`：此头部参数标识令牌类型，必须为 `JWT`。\n\
  *   `alg`：此头部算法用于签名 JWT，必须指定为 `RS256`。\n*   `kid`：此头部参数提示用于签名 JWT 的公钥。\n*   `iss`：令牌的颁发者和签名者。\n\
  *   `sub`：标识 JWT 的主体。\n*   `exp`：标识过期时间，在此时间或之后，JWT 不得被接受处理。\n*   `iat`：标识 JWT 的颁发时间，可用于确定\
  \ JWT 的时效。\n*   `jti`：为 JWT 提供唯一标识符。\n*   `upn`：此 MP-JWT 自定义声明是指定用户主体名称的首选方式。\n\
  *   `groups`：此 MP-JWT 自定义声明是分配给 JWT 主体的组或角色名称列表。\n\n`exp`、`iat` 和其他与日期相关的声明所使用的\
  \ `NumericDate` 是一个 JSON 数值，表示从 `1970-01-01T00:00:00Z` UTC 到指定 UTC 日期/时间的秒数，忽略闰秒。此外，关于标准声明的更多详细信息可以在\
  \ MP-JWT 规范（[`github.com/eclipse/microprofile-jwt-auth/releases/tag/1.1.1`](https://github.com/eclipse/microprofile-jwt-auth/releases/tag/1.1.1)）和\
  \ JSON Web Token RFC（[`tools.ietf.org/html/rfc7519`](https://tools.ietf.org/html/rfc7519)）中找到。\n\
  \n一个 JSON 格式的基本 MP-JWT 示例，即 MP-JWT 兼容 JWT 的示例头部和负载，如下所示：\n\n```\n{\n    \"typ\"\
  : \"JWT\",\n    \"alg\": \"RS256\",\n    \"kid\": \"abc-1234567890\"\n}\n{\n   \
  \ \"iss\": \"https://server.example.com\",\n    \"jti\": \"a-123\",\n    \"exp\"\
  : 1311281970,\n    \"iat\": 1311280970,\n    \"sub\": \"24400320\",\n    \"upn\"\
  : \"jdoe@server.example.com\",\n    \"groups\": [\"red-group\", \"green-group\"\
  , \"admin-group\", \"admin\"],\n}\n{\n*** base64 signature not shown ***\n}\n```\n\
  \n此示例显示了头部，其中包含 `typ=JWT`、`alg=RS256` 和 `kid=abc-1234567890`。主体包含 `iss`、`jti`、`exp`、`iat`、`sub`、`upn`\
  \ 和 `groups` 声明。\n\n"
- '# MP-JWT API 的高级描述


  MP-JWT 项目在 `org.eclipse.microprofile.jwt` 包命名空间下引入了以下 API 接口和类：


  *   `JsonWebToken`：这是一个 `java.security.Principal` 接口扩展，通过 get 风格的访问器提供对必需声明集的访问，以及对
  JWT 中任何声明的通用访问。

  *   `Claims`：这是一个枚举工具类，封装了所有标准的 JWT 相关声明，以及从 `JsonWebToken#getClaim(String)` 方法返回的声明的描述和所需的
  Java 类型。

  *   `Claim`：这是一个限定符注解，用于表示 `ClaimValue` 的注入点。

  *   `ClaimValue<T>`：这是一个 `java.security.Principal` 接口扩展...


  '
- '# 使用 MP-JWT 的示例代码


  MP-JWT API 的基本用法是注入 `JsonWebToken`、其 `ClaimValue`，或两者都注入。在本节中，我们展示典型用法的代码片段。本书本节的相关代码可在
  [`github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation`](https://github.com/PacktPublishing/Hands-On-Enterprise-Java-Microservices-with-Eclipse-MicroProfile/tree/master/Chapter04-jwtpropagation)
  找到。




  '
- '# 注入 JsonWebToken 信息


  以下代码示例演示了如何将传入的 MP-JWT 令牌作为 `JsonWebToken` 进行访问、获取原始 JWT 令牌字符串、`upn` 声明，以及与 JAX-RS
  `SecurityContext` 的集成：


  ```

  package io.pckt.jwt.rest;import javax.annotation.security.DenyAll;import javax.annotation.security.PermitAll;import
  javax.annotation.security.RolesAllowed;import javax.inject.Inject;import javax.ws.rs.GET;import
  javax.ws.rs.Path;import javax.ws.rs.Produces;import javax.ws.rs.core.Context;import
