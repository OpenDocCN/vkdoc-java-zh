    ### Testing the Microservice Containers


    Since the microservices and database containers are up and running, you can access
    the Product Web microservice. However, as mentioned in Appendix E, you must get
    the minikube IP first. See Listing [8-49](#619782_1_En_8_Chapter.xhtml#PC52).


