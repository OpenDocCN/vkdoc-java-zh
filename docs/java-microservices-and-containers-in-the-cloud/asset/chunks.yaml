    的独立应用程序变得简单直接。Spring Boot 遵循了开发者在以往使用 Spring 及其他第三方库时所利用的许多约定和用法模式。因此，大多数 Spring
    Boot 应用程序只需要极少的 Spring 配置。再次强调，本章的目的并非详细讲解 Spring Boot，这超出了本章的范围。已经熟悉 Java 或 Spring
    的读者，访问 Spring Boot 主页即可轻松上手。


    ### 设计你的第一个六边形微服务


    本节从图 1-13 中六边形微服务视图的精简版本开始。该视图也显示在图 1-15 中。


    ![](img/619782_1_En_1_Fig15_HTML.jpg)


