- fmt: '### Build and Run the Microservice


    The `ch06\ch06-03` folder contains the Maven scripts required to build the examples.
    First, you need to bring up the Kafka broker. Refer to Appendix D to learn how
    to set up Kafka server and bring it up. You need to execute the commands in Listing
    [6-41](#619782_1_En_6_Chapter.xhtml#PC42) to bring up Kafka from the Kafka installation
    location.


