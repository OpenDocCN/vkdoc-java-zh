- fmt: '### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch06\ch06-03` folder, which
    was explained in detail. The additional wiring plugs in an aggregator between
    the two microservices and the mechanism used to relay the single request from
    the Product Web microservice to more than one (instance of the) provider microservice,
    which you will see in the code in this section.


    Spring Kafka provides `AggregatingReplyingKafkaTemplate`, a replying template
    that aggregates multiple replies with the same correlation ID. `AggregatingReplyingKafkaTemplate`
    is a listener that handles a batch of incoming Kafka messages. The list of batch
    messages is created from the consumer records object returned by a poll. `AggregatingReplyingKafkaTemplate`
    extends the behavior of `ReplyingKafkaTemplate<K,V,R>` from Spring, which extends
    the behavior of `KafkaTemplate` to provide request-reply semantics. You saw this
    in detail in Chapter [4](#619782_1_En_4_Chapter.xhtml), so I only explain the
    additional features of `AggregatingReplyingKafkaTemplate`, as configured in Listing
    [6-38](#619782_1_En_6_Chapter.xhtml#PC38).


    ```

    import org.springframework.kafka.requestreply.AggregatingReplyingKafkaTemplate;

    @Configuration

    public class KafkaConfig {

    @Value("${product.topic.reply.numProviders}")

    private int numProviders;

    @Value("${product.topic.reply.aggregatingTimeout}")

    private long aggregatingTimeout;

    @Bean

    public AggregatingReplyingKafkaTemplate replyKafkaTemplate(ProducerFactory pf,

    KafkaMessageListenerContainer>>

    replyContainer){

    AggregatingReplyingKafkaTemplate replyTemplate =

    new AggregatingReplyingKafkaTemplate(pf,

    replyContainer,(list, timeout) -> {

    LOGGER.debug("list.size() : {}; timeout : {}",

    list.size(), timeout);

    return (list.size() == numProviders) ||

    (timeout);

    });

    replyTemplate.setReturnPartialOnTimeout(true);

    replyTemplate.setSharedReplyTopic(true);

    replyTemplate.setDefaultReplyTimeout(

    java.time.Duration.ofSeconds(aggregatingTimeout));

    return replyTemplate;

    }

    @Bean

    public KafkaMessageListenerContainer>>

    replyContainer(ConsumerFactory>> cf){

    ContainerProperties containerProperties =

    new ContainerProperties(requestReplyTopic);

    containerProperties.setAckMode(AckMode.MANUAL);

    return new KafkaMessageListenerContainer>>(cf, containerProperties);

    }

    }

    Listing 6-38

    The Product Web Kafka Configuration (ch06\ch06-03\02-ProductWeb\src\main\java\com\acme\ecom\product\KafkaConfig.java)

    ```


    The `replyContainer` bean creates properties for a container that will subscribe
    to the specified topic—`requestReplyTopic` in this case. You can configure this
    listener container to consume more than one topic. The replies must then contain
    the correlation ID header (used to aggregate). The framework will create a container
    that subscribes to all topics matching the specified pattern to get dynamically
    assigned partitions.


    Using the `replyContainer`, you configure an `AggregatingReplyingKafkaTemplate`,
    specifying that you expect a collection of `ConsumerRecord`-containing `Products`.
    Then you set `replyTemplate.setReturnPartialOnTimeout(true)`, which simply means
    that the template will consult the release strategy upon timeout. The template
    does this with the timeout argument set to `true`, to tell the strategy it’s a
    timeout rather than a delivery call. When it’s set to `true`, it releases a partial
    result. You can also take many actions and look at (and possibly modify) the list
    to decide whether you want to release or discard.


    In this case, you run the following test:


    ```

    return (list.size() == numProviders) || (timeout);

    ```


    One more parameter (`numProviders`) is configured in this example. You set `numProviders`
    (in this case, in `application.properties`) to `3`, as shown in Listing [6-39](#619782_1_En_6_Chapter.xhtml#PC40).
    This is because you have three instances of the Product Server microservice. Once
    you receive response messages from the three Product Server microservice instances,
    you no longer want to wait for more responses.


    By specifying `replyTemplate.setSharedReplyTopic(true)`, you indicate that multiple
    templates are using the same topic for replies. This simply changes logs for unexpected
    replies to debug instead of error.


    The `replyTemplate.setDefaultReplyTimeout()` will set a timeout to check this
    release strategy in this example.


    ```

    product.topic.reply.numProviders: 3

    product.topic.reply.aggregatingTimeout: 6

    Listing 6-39

    The Product Web Kafka Configuration (ch06\ch06-03\02-ProductWeb\src\main\resources\application.properties)

    ```


    You can tweak this value by changing the value for `aggregatingTimeout` in `application.properties`
    of the Product Web microservice to test different scenarios. Listing [6-40](#619782_1_En_6_Chapter.xhtml#PC41)
    shows the dynamics of the aggregator code.


    ```

    @RestController

    public class ProductRestController{

    @Autowired

    AggregatingReplyingKafkaTemplate

    kafkaTemplate;

    @Value("${kafka.topic.request-topic}")

    private String requestTopic;

    @Value("${kafka.topic.requestreply-topic}")

    private String requestReplyTopic;

    @RequestMapping(value = "/productsweb", method =

    RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity> getAllProducts()

    throws InterruptedException,

    ExecutionException, TimeoutException {

    ProducerRecord record =

    new ProducerRecord(

    requestTopic, "All");

    record.headers().add(new RecordHeader(

    KafkaHeaders.REPLY_TOPIC,

    requestReplyTopic.getBytes()));

    RequestReplyFuture>>

    sendAndReceive =

    kafkaTemplate.sendAndReceive(record);

    SendResult sendResult =

    sendAndReceive.getSendFuture().get();

    sendResult.getProducerRecord().headers().forEach(

    header -> LOGGER.trace(header.key() + ":" +

    header.value().toString()));

    sendAndReceive.getSendFuture().get(30,

    TimeUnit.SECONDS);

    ConsumerRecord>>

    consumerRecords = sendAndReceive.get();

    Collection> consumerRecord =

    consumerRecords.value();

    List products =new ArrayList();

    for(ConsumerRecord

    temp:consumerRecord) {

    products.addAll(temp.value().getProducts());

    }

    return new ResponseEntity(products, HttpStatus.OK);

    }

    }

    Listing 6-40

    The Product Web REST Controller (ch06\ch06-03\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    For an explanation of the code in Listing [6-40](#619782_1_En_6_Chapter.xhtml#PC41),
    see the section titled “Sync over Async Microservices” in Chapter [4](#619782_1_En_4_Chapter.xhtml).
    Here, I explain only the new code for fulfilling the aggregation. `sendAndReceive`
    sends the request and `AggregatingReplyingKafkaTemplate` receives a `ConsumerRecord`,
    which by itself is a `Collection` of `ConsumerRecord`s containing a `Collection`
    of `Product`s retrieved from each instance of the Product Server microservice
    (a `Collection` of `Collection`)!


    You can disassemble the `ConsumerRecord` of `Collection` of `ConsumerRecord` of
    `Collection` of `Product`s, flatten it, and aggregate it into a single `ArrayList`
    and return. Note that you are not doing any filtering, de-duplication, or any
    such transformations here. However, you are free to do any further processing
    based on your requirements.'
