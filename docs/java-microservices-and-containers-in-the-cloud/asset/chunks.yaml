    Similar to `ReplyingKafkaTemplate`, `CompletableFutureReplyingKafkaOperations<K,
    V, R>` offers a Return or Reply object once the message is consumed by the Kafka
    listener from the provider or producer side. The type parameters represent:


    *   K – Key type


    *   V – Outbound data type


    *   R – Reply data type


    Next, we introduce a Boolean flag `pinnedToPartition`, intended to demonstrate
    the various test cases. This flag can be configured in the `application.yml` configuration
    file for the Product Web microservice. See Listing [5-7](#619782_1_En_5_Chapter.xhtml#PC9).


    ```

    server:

    port: 8080

    spring:

    application:

    name: product-web

    autoconfigure:

    exclude: org.springframework.boot.autoconfigure.kafka.

    KafkaAutoConfiguration

    kafka:

    bootstrap-servers: localhost:9092

    consumer:

    auto-offset-reset: earliest

    group-id: product-web

    kafka:

    topic:

    product:

    request: product-req-topic

    pinnedToPartition: true

    reply: product-req-reply-topic

    request-reply:

    timeout-ms: 60000

    product:

    topic:

    request:

    numPartitions: 2

    Listing 5-7

    Configuration for the Product Web Microservice (ch05\ch05-01\02-ProductWeb\src\main\resources\application.yml)

    ```


    If `pinnedToPartition` is configured with `false`, the sender microservices are
    intended to send request messages to receiver microservices in a random, load
    balanced manner, as shown here:


    ```

    completableFuture =  replyingKafkaTemplate.requestReply(requestTopic, REQUEST_PAYLOAD);

    ```


    Instead, if `pinnedToPartition` is configured with `true`, the sender microservices
    are intended to send request messages to receiver microservices in a fixed or
    pinned manner, as shown here:


    ```

    completableFuture =  replyingKafkaTemplate.requestReply(requestTopic, appName,

    REQUEST_PAYLOAD);

    ```


    As you saw in Chapter [4](#619782_1_En_4_Chapter.xhtml), the producer chooses
    which partition to use. If you specify the partition parameter, it will be used,
    and the key will be “ignored” even though the key will still be written into the
    topic. Routing of messages to partitions doesn’t have to be key-based. You can
    explicitly specify a partition when creating a `ProducerRecord` too. When `pinnedToPartition`
    is configured with `true`, the underlying utility library uses the overloaded
    version of `requestReply(String topic, K key, V value)` so that a value for the
    key can be specified, as shown in Listing [5-8](#619782_1_En_5_Chapter.xhtml#PC12).'
