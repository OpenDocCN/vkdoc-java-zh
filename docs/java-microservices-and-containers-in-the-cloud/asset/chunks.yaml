- fmt: '### XML-RPC and SOAP


    `XML-RPC` and `SOAP` have been the cornerstone of remote service invocation using
    web services for more than a decade. A web service is described by a `WSDL` (Web
    Services Description Language) document, which acts as the contract between the
    service provider and service consumer. A `WSDL` document describes how the web
    service is bound to a messaging protocol—in the case of the web services, the
    `SOAP` protocol.


    A `WSDL` `SOAP` binding can be either an `RPC`-oriented binding or a document-oriented
    binding.


    - **RPC-oriented style:** Web services that use the `RPC` (Remote Procedure Call)-oriented
    style are interface-driven. Here the client applications invoke a web service
    method (call a remote procedure) by sending parameter values of the request and
    receiving parameter values of the response. The body of the `SOAP` request includes
    a wrapper `XML` element for this method. The parameters of this method are embedded
    as child elements inside this wrapper element.

    - **Document-oriented style:** Web services that use the document-oriented style
    are document (more precisely, `XML` document) driven. Here, the client applications
    send parameters to the web service as `XML` documents, instead of as discrete
    sets of parameter values. The body of the `SOAP` request and response messages
    contain one or more `XML` documents. The document-oriented style is flatter than
    the `RPC`-oriented style and does not require the use of wrapper elements.


    ### REST and JSON-RPC


    In the recent past, whenever somebody wanted to start building an `HTTP` API,
    they pretty much exclusively used `REST` as the de facto architectural style,
    over alternative approaches such as `XML-RPC` and `SOAP`. `REST` specifies a client-server
    relationship, where server-side data is made available through representations
    of data in simple formats, often `JSON` and `XML`. These representations for resources
    or collections of resources are then potentially modifiable, with actions or more
    precisely with `HTTP` actions. Relationships between data are made discoverable
    via a method known as *hypermedia*. Hypermedia is fundamental to `REST` and is
    essentially just the concept of providing links to other resources. In the section
    titled “HATEOAS and HAL” in Chapter [2](#619782_1_En_2_Chapter.xhtml), you have
    learned about this.


    `JSON-RPC` is a remote procedure call protocol encoded in `JSON`. It is like the
    `XML-RPC` protocol, defining only a few data types and commands. `JSON-RPC` allows
    for notifications (data sent to the server that does not require a response) and
    for multiple calls to be sent to the server, which may be answered asynchronously.


    ### RPC vs. Messaging


    The fundamental difference between these two protocols is that an `RPC` framework
    is synchronous. You make a call, and you aren’t done until you receive the response.
    Messaging on the other hand is asynchronous. You send the message, and either
    you don’t expect a response, or you don’t know when it will come back, if at all!


    If your caller needs information from a response from the service(s) you are requesting
    or calling, you should use an `RPC`, because you can’t return to your caller until
    you have the information you need from the provider. If your caller doesn’t need
    information from a downstream service, you can use messaging. Fire your message
    and forget it, since you are not expecting (rather, cannot expect) to receive
    a response.


    ### RPC Style Messaging


    As described, a messaging paradigm tries to enforce a fire-and-forget messaging
    style, but it is possible to use properly designed message queues to perform and
    mimic `RPC`, as explained in Chapter [5](#619782_1_En_5_Chapter.xhtml). Figure
    [5-7](#619782_1_En_5_Chapter.xhtml#Fig7) in Chapter [5](#619782_1_En_5_Chapter.xhtml)
    depicts different reply channels for microservice communications, whereas Figure
    [5-8](#619782_1_En_5_Chapter.xhtml#Fig8) depicts different reply partitions for
    microservices communicating with each other. In both scenarios, you can simulate
    synchronous style request-responses between participating microservices across
    messaging channels.


    Unlike with the `XML-RPC` or `SOAP` scenario, when microservices communicate over
    plain messaging channels, they are not hard bound to a strict message invocation
    schema—a `WSDL` kind of mechanism which acts as the contract between the service
    provider and service consumer is missing. Hence, you need to weave a mechanism
    to specify “what action to perform.” `HTTP` provides standard verbs to provide
    semantic meaning for the intention of the action being taken.


    ### HTTP Methods for CRUD on Resources


    `RPC`-based APIs are great for actions (that is, procedures or commands), whereas
    `REST`-based APIs are great for modeling your domain (that is, resources or entities),
    making `CRUD` (create, read, update, delete) available for all your data. `REST`
    uses `HTTP` methods such as `GET`, `POST`, `PUT`, `DELETE`, `OPTIONS` and, hopefully,
    `PATCH`, to provide semantic meaning for the intention of the action being taken.


    The main methods in `HTTP` you can leverage for implementing `REST` are listed
    here:


    - **GET:** `GET` is the simplest `HTTP` operation and its intention is to retrieve
    a resource from the server. `200 OK` is the status code for a successful operation.
    All `GET` operations should be *idempotent*, which means regardless of how many
    times you repeat the operation with the same parameters, there should not be any
    change in state for the resource.

    - **POST:** `HTTP POST` provides an option for clients to send information to
    the server. `POST` is recommended for creating a new resource (even though it
    can also update an existing resource).

    - **PUT:** `HTTP PUT` also provides an option for clients to send information
    to the server; however, the usage semantics of `PUT` are slightly different from
    that of `POST`, as per `HTTP`. Using `PUT`, you can send a “new object” to the
    server to be placed at a location in the server represented by the `URI`, so the
    intent should be to replace the resource with a new one. A `PUT` request is idempotent
    as far as a single client is concerned. If only a subset of data elements is provided
    in a `PUT` request, the rest will be replaced with empty or null.

    - **DELETE:** `DELETE` allows clients to remove a resource from the server. The
    `URI` identifies the resource to be deleted. The resource may not have to be removed
    immediately; instead, it can be done by an asynchronous or long-running operation
    behind the scenes.


    `REST` is not only `CRUD`, but things are done through mainly `CRUD`-based operations.


    `RPC`, however, does not strictly follow standard `HTTP` verbs. Most use only
    `GET` and `POST`, with `GET` being used to retrieve information and `POST` being
    used for everything else. It is common to see `RPC` APIs using something like
    `POST /deleteBar`, with a body of `{ "id": 10 }`, instead of the `REST` approach,
    which would be `DELETE /bars/10`.


    `JSON` (JavaScript Object Notation) is an open standard file format and data interchange
    format that uses human-readable text to store and transmit data objects consisting
    of attribute–value pairs and arrays (or other serializable values). If you want
    to continue using this format, instead of sync style `HTTP` transport, you can
    use async style messaging transport. But when you don’t use standard `HTTP`, you
    miss the opportunity to use standard `HTTP` verbs and any of their associated
    advantages.


    The next section looks at two examples demonstrating a few of these discussion
    items. Specifically, we will adhere to `REST` for the end point APIs and we will
    attempt to stick to `JSON` for inter-microservice communication over `Kafka`.'
