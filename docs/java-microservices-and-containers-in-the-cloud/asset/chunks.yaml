    build: ./01-ProductServer

    ```


    Listing [9-5](#619782_1_En_9_Chapter.xhtml#PC7) shows this file.


    ```

    FROM maven:3.6.1-jdk-8-slim AS build

    RUN mkdir -p /workspace

    WORKDIR /workspace

    COPY pom.xml /workspace

    COPY src /workspace/src

    RUN mvn -f pom.xml clean package

    FROM openjdk:8-alpine

    COPY --from=build /workspace/target/*.jar app.jar

    EXPOSE 8081

    ENTRYPOINT ["java","-jar","app.jar"]

    Listing 9-5

    The Dockerfile (ch09\ch09-01\01-ProductServer\Dockerfile)

    ```


    A multi-stage build file is used here. With multi-stage builds, you can use multiple
    `FROM` statements in your Dockerfile. Each `FROM` instruction can use a different
    base, and each begins a new stage of the build. You can selectively copy artifacts
    from one stage to another.


    You can name your stages by adding an `AS <NAME>` to the `FROM` instruction. The
    name `build` is used in this example. This name can be used in the second stage
    in the `COPY` instruction. This means that even if the instructions in your Dockerfile
    are reordered later, the `COPY` doesn’t break.'
  trans: '

    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
    `ch09\ch09-01` 文件夹中。本示例中的大部分源代码与 `ch03\ch03-01` 类似，后者已在第 3 章“使用 PostgreSQL 和 RestTemplate
    的微服务”一节以及第 8 章“容器中的微服务和 PostgreSQL”一节中详细解释。你在上一章中已经看到了这些使用 PostgreSQL 数据库的多个交互微服务的部署模式，因此本节将专门研究如何使用
    Docker Compose 来组合它们。


    从容器化的微服务连接到容器化的 PostgreSQL 服务器相当直接，因此在单独运行容器时几乎不需要做任何更改。下一节将探讨这些更改。


    列表 9-3 展示了本示例的源代码组织结构。


    ```

    ch09-01

    ├── 01-ProductServer

    │   ├── Dockerfile

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── 02-ProductWeb

    │   ├── Dockerfile

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── README.txt

    ├── clean.sh

    ├── docker-compose.yml

    ├── makeandrun.sh

    └── pom.xml

    列表 9-3

    示例 09-01 源代码组织结构

    ```


    `ch09-01` 文件夹内示例的源代码组织结构的简洁表示如列表 9-3 所示。这里值得关注的是 `docker-compose.yml` 以及放置在两个项目文件夹内的
    Dockerfile。


    ```

    version: "3"

    services:

    db:

    image: "postgres:9.6-alpine"

    container_name: postgres-docker

    volumes:

    - product-data:/var/lib/postgresql/data

    ports:

    - 5432:5432

    environment:

    - POSTGRES_DB=productdb

    - POSTGRES_USER=postgres

    - POSTGRES_PASSWORD=postgre

    networks:

    - ecom-network

    server:

    build: ./01-ProductServer

    image: ecom/product-server

    container_name: product-server

    ports:

    - "8081:8081"

    depends_on:

    - "db"

    environment:

    - DB_SERVER=postgres-docker:5432

    - POSTGRES_DB=productdb

    - POSTGRES_USER=postgres

    - POSTGRES_PASSWORD=postgre

    networks:

    - ecom-network

    web:

    build: ./02-ProductWeb

    image: ecom/product-web

    container_name: product-web

    depends_on:

    - "server"

    ports:

    - "8080:8080"

    environment:

    - acme.PRODUCT_SERVICE_URL=http://product-server:8081/products

    networks:

    - ecom-network

    volumes:

    product-data:

    networks:

    ecom-network:

    列表 9-4

    Docker Compose YAML 文件 (ch09\ch09-01\docker-compose.yml)

    ```


    这里定义了三个服务，每个服务都是应用程序内计算资源的抽象定义，可以独立于其他组件进行扩展/替换。每个服务都由一个容器支持，并由平台根据复制要求和放置约束来运行。这些由容器支持的每个服务都由一个
    Docker 镜像和一组运行时参数定义。一个服务内的所有容器都使用这些参数以相同方式创建。


    你需要通过读取其 Dockerfile 从源代码构建服务器和 Web 的镜像。你可以使用 `build` 关键字，并将 Dockerfile 的路径作为值传递。当你指定
    `./01-ProductServer` 和 `./02-ProductWeb` 时，你是在说明相对于当前目录（即 `docker-compose.yml`
    所在的位置），再进入这些提到的文件夹中的每一个以找到相应的 Dockerfile。


    当服务所需的镜像（如 `db` 的情况）已经（由你或其他人）发布到 Docker Hub 或其他 Docker 注册表中时，可以通过 `image` 属性来调用它，指定镜像名称和标签。但是，当你能够像
    `server` 和 `web` 的情况那样，将镜像名称与 `build` 属性结合使用时，你可以命名该镜像，使其对其他服务可用。


    要从主机访问容器，必须通过 `ports` 关键字声明性地暴露服务的端口，就像你对 `web` 使用 `8080`、对 `server` 使用 `8081`、对
    `db` 使用 `5432` 一样。如果需要，这也允许你选择在主机上以不同的方式暴露端口。


    这三个容器——`web`、`server` 和 `db`——在由 Docker Compose 隐式创建或通过配置创建的网络中相互通信，就像你在示例中所做的那样。如果你已通过
    `expose` 关键字使端口可访问，则同一网络上的服务只需通过容器名称和端口（例如 `product-server:8081`）引用另一个服务即可与之通信。


    Docker 管理匿名卷和命名卷，自动将它们挂载到主机上自生成的目录中。`product-data` 是一个命名卷，可供 `db` 服务访问。`/var/lib/postgresql/data`
    是它映射到的路径，该路径将由 `postgres-docker` 容器使用。


    你可能还需要在这些服务之间创建依赖链，以便某些服务在其他服务之前加载（并在之后卸载）。你可以通过 `depends_on` 关键字实现此结果。你希望 `db`
    在加载 `server` 之前加载，因为你在 `server` 中有初始化脚本，将初始加载数据插入到 `db` 中。


    在 Compose 中提供所需的环境变量很容易。你可以定义静态和动态环境变量，后者使用 `${}` 表示法。例如：`DB_SERVER=postgres-docker:5432`。


    如前所述，相对于当前目录（`docker-compose.yml` 所在的位置），Dockerfile 位于此处：


    ```

    build: ./01-ProductServer

    ```


    列表 9-5 显示了此文件。


    ```

    FROM maven:3.6.1-jdk-8-slim AS build

    RUN mkdir -p /workspace

    WORKDIR /workspace

    COPY pom.xml /workspace

    COPY src /workspace/src

    RUN mvn -f pom.xml clean package

    FROM openjdk:8-alpine

    COPY --from=build /workspace/target/*.jar app.jar

    EXPOSE 8081

    ENTRYPOINT ["java","-jar","app.jar"]

    列表 9-5

    Dockerfile (ch09\ch09-01\01-ProductServer\Dockerfile)

    ```


    这里使用了多阶段构建文件。使用多阶段构建，你可以在 Dockerfile 中使用多个 `FROM` 语句。每个 `FROM` 指令可以使用不同的基础镜像，并且每个指令都开始一个新的构建阶段。你可以选择性地将工件从一个阶段复制到另一个阶段。


    你可以通过在 `FROM` 指令中添加 `AS <NAME>` 来命名你的阶段。本示例中使用了名称 `build`。此名称可以在第二阶段的 `COPY` 指令中使用。这意味着即使稍后重新排列
    Dockerfile 中的指令，`COPY` 也不会中断。

    '
