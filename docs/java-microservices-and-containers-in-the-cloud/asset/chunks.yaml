    of this will be lost when you stop the Minikube. Optionally, you can create a
    new folder, which is explained as the first step in next section. If you are using
    Docker in a host machine, you can manually create this folder too, but in the
    host machine.'
  trans: '

    ### 测试微服务容器


    由于微服务和数据库容器现已启动并运行，您可以访问 Product Web 微服务。但是，如附录 E 所述，您需要先获取 Minikube IP。请参见清单
    9-10。


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:ch07-02 binil$

    清单 9-10

    查找 Minikube IP

    ```


    现在，您可以使用浏览器，通过由 Minikube IP 构成的 URL 来访问 Product Web 微服务。


    `http://192.168.64.5:8080/product.html`


    请参考第 1 章中标题为“使用 UI 测试微服务”的部分来测试 Product Web 微服务容器。


    在测试微服务时，请持续观察日志窗口。要确定容器 ID 并持续观察日志窗口，请参考第 8 章。


    完成微服务测试后，您可以停止并移除微服务容器，并清理环境。要停止容器，请使用以下命令：


    ```

