    ### 理解源代码


    本书的源代码可通过图书产品页面上的 GitHub 获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
    `ch09\ch09-03` 文件夹中，如代码清单 9-20 所示。本示例中的大部分源代码与 `ch03\ch03-01` 类似，后者已在第 3 章“使用
    PostgreSQL 和 RestTemplate 的微服务”一节中详细解释。在第 6 章“基于 PostgreSQL 的 Kafka 上的 CRUD 微服务”一节中，你已经看到了
    Product Web 微服务和 Product Server 微服务通过 Kafka 消息通道进行通信所需的代码，因此此处不再重复这些细节。此外，你还在“使用
    PostgreSQL 容器组合微服务”一节中看到了基于 Docker Compose 部署的图 9-3 主要部分的拓扑结构。本节将探讨 Kafka 容器及其与其他微服务一起使用
    Docker Compose 工具的部署。


    代码清单 9-20 展示了本示例的源代码组织结构。


    ```

    ch09-03

