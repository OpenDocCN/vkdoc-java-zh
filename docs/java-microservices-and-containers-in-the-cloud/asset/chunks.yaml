- fmt: 'Using separate topics for different sender microservices is clearly not very
    flexible, as mentioned. The configuration and the programming needed is extensive,
    and the APIs are low level. Moreover, when you need to dynamically scale the number
    of sender microservices, this way of static configuration is not what you need.
    Hence, you can use the `PartitionAwareReplyingKafkaTemplate<K, V, R>` utility,
    which extends `ReplyingKafkaTemplate<K, V, R>`. It also implements `PartitionAwareReplyingKafkaOperations<K,
    V, R>`. Subsequently, `CompletableFutureReplyingKafkaTemplate<K, V, R>` extends
    `PartitionAwareReplyingKafkaTemplate<K, V, R>`.


    You can enhance the Return Address pattern by passing the partition along with
    the Reply topic. The Reply topic is wired into the `RequestReplyTemplate`, and
    hence needn’t be present in the API. For the partition info, you retrieve which
    partition(s) the reply topic listener has been assigned and pass that partition
    along automatically. This eliminates the need for the client to care about these
    headers. As mentioned earlier, Bjorn Beskow from Callista Enterprise placed this
    utility library on the Internet to do this, and it’s used in Listing [5-5](#619782_1_En_5_Chapter.xhtml#PC7).


    ```

    public class PartitionAwareReplyingKafkaTemplate

    extends ReplyingKafkaTemplate {

    public PartitionAwareReplyingKafkaTemplate(

    ProducerFactory producerFactory,

    GenericMessageListenerContainer

    replyContainer) {

    super(producerFactory, replyContainer);

    }

    private TopicPartition

    getFirstAssignedReplyTopicPartition() {

    if (getAssignedReplyTopicPartitions() != null &&

    getAssignedReplyTopicPartitions().iterator().

    hasNext()) {

    TopicPartition replyPartition =

    getAssignedReplyTopicPartitions().iterator().

    next();

    if (this.logger.isDebugEnabled()) {

    this.logger.debug("Using partition " +

    replyPartition.partition());

    }

    return replyPartition;

    } else {

    throw new KafkaException("Illegal state: No reply

    partition is assigned to this instance");

    }

    }

    protected RequestReplyFuture doSendAndReceive(

    ProducerRecord record) {

    TopicPartition replyPartition =

    getFirstAssignedReplyTopicPartition();

    record.headers()

    .add(new RecordHeader(KafkaHeaders.REPLY_TOPIC,

    replyPartition.topic().getBytes()))

    .add(new RecordHeader(

    KafkaHeaders.REPLY_PARTITION,

    intToBytesBigEndian(

    replyPartition.partition())));

    return super.sendAndReceive(record);

    }

    }

    Listing 5-5

    Encapsulating Partition Info in Kafka Message Exchange (ch05\ch05-01\kafka-request-reply-util\src\main\java\se\callista\blog\synch_kafka\request_reply_util\PartitionAwareReplyingKafkaTemplate.java)

    ```


    Listing [5-5](#619782_1_En_5_Chapter.xhtml#PC7) is slightly non-trivial, so I
    attempt to explain it with the help of Figure [5-10](#619782_1_En_5_Chapter.xhtml#Fig10),
    which depicts the complete abstraction provided by `CompletableFutureReplyingKafkaTemplate`.


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig10_HTML.jpg)


    A diagram presents a request-reply interaction in a kafka-based event-driven microservice
    architecture for a product web microservice and a product server microservice.
    It illustrates how a user interacts with the system and how the request and reply
    are processed through the kafka template.


    Figure 5-10


    CompletableFutureReplyingKafkaTemplate abstraction


    The labelled steps are in sequence in Figure [5-10](#619782_1_En_5_Chapter.xhtml#Fig10),
    so you can simply follow those steps to understand the explanation provided earlier.


    Next, we will look at the REST controller for the Product Web microservice. This
    is shown in Listing [5-6](#619782_1_En_5_Chapter.xhtml#PC8).


    ```

    @CrossOrigin

    @RestController

    public class ProductRestController{

    private static final String REQUEST_PAYLOAD = "All";

    //Get All Data

    @Value("${spring.application.name:product-web}")

    private String appName;

    @Value("${kafka.topic.product.pinnedToPartition:false}")

    private boolean pinnedToPartition;

    @Value("${kafka.topic.product.request}")

    private String requestTopic;

    @Autowired

    private CompletableFutureReplyingKafkaOperations replyingKafkaTemplate;

    @RequestMapping(value = "/productsweb", method =

    RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public DeferredResult  getAllProducts()

    throws InterruptedException, ExecutionException {

    DeferredResult deferredResult =

    new DeferredResult();

    CompletableFuture completableFuture =  null;

    if(pinnedToPartition){

    completableFuture =  replyingKafkaTemplate.

    requestReply(requestTopic,

    appName, REQUEST_PAYLOAD);

    }

    else{

    completableFuture =  replyingKafkaTemplate.

    requestReply(requestTopic, REQUEST_PAYLOAD);

    }

    completableFuture.thenAccept(products ->

    deferredResult.setResult(products))

    .exceptionally(ex -> {

    LOGGER.error(ex.getMessage());

    return null;

    });

    return deferredResult;

    }

    }

    Listing 5-6

    REST Controller for the Product Web Microservice (ch05\ch05-01\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    Similar to `ReplyingKafkaTemplate`, `CompletableFutureReplyingKafkaOperations<K,
    V, R>` offers a Return or Reply object once the message is consumed by the Kafka
    listener from the provider or producer side. The type parameters represent:


    *   K – Key type

    *   V – Outbound data type

    *   R – Reply data type


    Next, we introduce a Boolean flag `pinnedToPartition`, intended to demonstrate
    the various test cases. This flag can be configured in the `application.yml` configuration
    file for the Product Web microservice. See Listing [5-7](#619782_1_En_5_Chapter.xhtml#PC9).


    ```

    server:

    port: 8080

    spring:

    application:

    name: product-web

    autoconfigure:

    exclude: org.springframework.boot.autoconfigure.kafka.

    KafkaAutoConfiguration

    kafka:

    bootstrap-servers: localhost:9092

    consumer:

    auto-offset-reset: earliest

    group-id: product-web

    kafka:

    topic:

    product:

    request: product-req-topic

    pinnedToPartition: true

    reply: product-req-reply-topic

    request-reply:

    timeout-ms: 60000

    product:

    topic:

    request:

    numPartitions: 2

    Listing 5-7

    Configuration for the Product Web Microservice (ch05\ch05-01\02-ProductWeb\src\main\resources\application.yml)

    ```


    If `pinnedToPartition` is configured with `false`, the sender microservices are
    intended to send request messages to receiver microservices in a random, load
    balanced manner, as shown here:


    ```

    completableFuture =  replyingKafkaTemplate.requestReply(requestTopic, REQUEST_PAYLOAD);

    ```


    Instead, if `pinnedToPartition` is configured with `true`, the sender microservices
    are intended to send request messages to receiver microservices in a fixed or
    pinned manner, as shown here:


    ```

    completableFuture =  replyingKafkaTemplate.requestReply(requestTopic, appName,

    REQUEST_PAYLOAD);

    ```


    As you saw in Chapter [4](#619782_1_En_4_Chapter.xhtml), the producer chooses
    which partition to use. If you specify the partition parameter, it will be used,
    and the key will be “ignored” even though the key will still be written into the
    topic. Routing of messages to partitions doesn’t have to be key-based. You can
    explicitly specify a partition when creating a `ProducerRecord` too. When `pinnedToPartition`
    is configured with `true`, the underlying utility library uses the overloaded
    version of `requestReply(String topic, K key, V value)` so that a value for the
    key can be specified, as shown in Listing [5-8](#619782_1_En_5_Chapter.xhtml#PC12).'
