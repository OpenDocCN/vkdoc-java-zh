  trans: '

    ### 公有云


    大约在 2000 年，亚马逊创建了名为亚马逊云服务（AWS）的子公司，不久后便推出了简单存储服务（S3）和弹性计算云（EC2）。由此，企业无需购买、拥有和维护物理数据中心和服务器，即可按需从
    AWS 获取计算能力、存储和数据库等技术服务。


    不久之后，许多其他厂商也提供了类似的云计算服务。参见图 14-1。


    ![](img/619782_1_En_14_Fig1_HTML.jpg)


    一张示意图，云朵中包含了 Microsoft Azure、阿里云、Google Cloud Platform、AWS 和 Oracle Cloud Infrastructure
    的标识。


    图 14-1


    主要云服务提供商


    云计算的一些优势值得一提：


    *   **敏捷性**：云计算缩短了硬件和软件采购的漫长周期，以及随之而来的配置和测试的进一步延迟，因为企业甚至个人开发者都可以在需要资源的瞬间将其启动。


    *   **弹性**：无需为了每年仅几小时或几天的季节性高峰而过度配置或额外配置资源，因为云计算允许您根据可扩展性需求的变化随时增加或减少资源。这就像货架上没有“死库存”一样。


    *   **成本节约**：在 IT 基础设施和中间件上的前期投资减少，因此您的资本支出大大降低。由于云提供商大规模运营，他们实现了规模经济，其中一部分效益也可以惠及云用户。


    云正在迅速成为 IT 基础设施服务的事实标准。图 14-1 展示了几家云服务提供商；行业内还有更多。


    ### 云部署模式


    谁拥有云计算服务以及如何向客户提供服务，存在差异。基于此，云部署模式分为三种或更多。


    #### 公有云


    *公有云*是一种订阅服务，面向所有希望从其云提供商获得类似服务的客户。参见图 14-2。


    ![](img/619782_1_En_14_Fig2_HTML.jpg)


    一张示意图，将云和块重叠，展示了带有 Microsoft Azure 的公有云、带有 Google Cloud Platform 和 AWS 的多云、带有
    AWS 和机架的混合云，以及带有机架和大型机的企业及本地数据中心。


    图 14-2


    公有云 vs. 私有云 vs. 混合云 vs. 多云


    公有云服务通过互联网提供，因此任何消费者都可以订阅该服务。


    #### 私有云


    *私有云*是仅为单个组织运营的基础设施。它可以由组织自己的 IT 部门内部管理，也可以由第三方管理，并在内部或外部托管。


    #### 混合云


    *混合云*服务由来自不同服务提供商的私有云、公有云和社区云服务的某种组合构成。一些组织使用公有云计算资源来满足私有云无法满足的临时高容量需求。这种能力使混合云能够利用云爆发在不同云之间进行扩展。


    #### 多云


    *多云*在单一但异构的架构中利用来自多个提供商的计算服务，以减少对单一供应商的依赖。其原因可能是通过选择来增加灵活性，从而不依赖于单一供应商，或者是为了减轻灾难影响等。


    虽然数据一致性和同步是需要关注的问题，但与纯粹的私有或公有模式相比，管理混合云和多云模式涉及更多的复杂性。即使使用单一提供商，以无差错的方式处理这些方面也并非易事。这是一个更大的话题，涉及许多技术复杂性，可能成为未来另一本书的主题。


    ### 分布式计算


    云服务模型基于用户对资源利用方式的控制程度。图 14-3 展示了不同的模型。


    ![](img/619782_1_En_14_Fig3_HTML.jpg)


    四个框图分别展示了传统、IaaS、PaaS 和 SaaS 模式，以及它们各自的数据、应用程序、中间件或运行时、操作系统、虚拟化、计算、网络和存储，以及私有、公有、混合和多云分类。传统模式中所有服务均由客户管理，而其余模式中由服务提供商管理的服务数量逐渐增加。


    图 14-3


    云服务模型（改编自《实用微服务架构模式》，ISBN-13: 978-1484245002）


    通常，云架构可以映射到云服务模型。在传统服务模型中，用户或企业自身负责管理整个堆栈（例如，硬件、数据中心设施、软件和数据），而在云服务模型中，情况则有所不同，具体如下：


    *   **基础设施即服务 (IaaS)**：在 IaaS 服务模型中，用户仅请求计算能力、存储、网络及其相关资源，并按使用量付费。


    *   **平台即服务 (PaaS)**：在 PaaS 模型中，用户无法控制底层基础设施，如 CPU、网络和存储，因为这些资源在平台之下被抽象化了。相反，它允许应用开发平台使用云中托管的受支持编程语言和相关工具创建应用程序，并通过接口（主要是浏览器）进行访问。很多时候，应用程序运行时和中间件也由云服务提供商提供，用户仅负责开发、安装、管理和操作软件应用程序及其数据。


    *   **软件即服务 (SaaS)**：这是一种“无需操心一切”的模式，用户甚至不拥有、管理或操作应用程序。应用程序在云基础设施上运行，可从各种客户端设备访问。提供有限的用户配置。有时，同一个应用程序实例服务于多个企业（租户）的最终用户；此类应用程序称为多租户应用程序。^(⁶)


    本书中的示例涵盖了 IaaS 和 PaaS。


    ## 亚马逊云服务 (AWS)


    亚马逊云服务 (AWS) 在计算、存储和网络的不同抽象层级上提供公有云服务。AWS 基础设施分布在全球各地，AWS 网站提供了其数据中心全球分布的概览。参见图
    14-4。


    ![](img/619782_1_En_14_Fig4_HTML.jpg)


    一张世界地图，用颜色渐变的圆圈标记了各大洲的数据中心位置。


    图 14-4


    AWS 数据中心位置（来源：[`https://aws.amazon.com/about-aws/global-infrastructure/`](https://aws.amazon.com/about-aws/global-infrastructure/)）


    这些服务可以通过机器使用 HTTP 协议进行访问。用户也可以通过 AWS 命令终端或 Web 用户界面访问 AWS 服务。


    下一节将介绍下一节示例中使用的一些 AWS 服务。


    ### VPC


    虚拟私有云 (VPC) 是专用于您的 AWS 账户的虚拟网络。它在逻辑上与 AWS 云中的其他虚拟网络隔离。您可以为 VPC 指定 IP 地址范围、添加子网、添加网关以及关联安全组。

    '
- fmt: '### Subnet


    A *subnet* is a range of IP addresses in your VPC. You can create AWS resources,
    such as EC2 instances, in specific subnets. When you create a subnet, you specify
    its IP addresses, depending on the configuration of the VPC. The IPv4 subnet has
    an IPv4 CIDR block, but does not have an IPv6 CIDR block. Similarly, an IPv6 subnet
    has an IPv6 CIDR block, but does not have an IPv4 CIDR block. Dual stack subnets
    have both blocks.


    There are two subnet types:


    - **Public subnets**: Have a direct route to an Internet gateway. Resources in
    a public subnet can access the public Internet.

    - **Private subnets**: Do not have a direct route to an Internet gateway. Resources
    in a private subnet require a NAT device to access the public Internet.


    ### Public Proxy Subnet


    If the EC2 instance running in a subnet needs to be reachable via the Internet,
    you can create a proxy subnet. Use these steps to do so:


    1. Create a subnet spanning a subsection of the IP address range assigned to the
    VPC.

    2. Create a route table and attach it to the subnet.

    3. Add the `0.0.0.0/0` route pointing the Internet gateway to the route table.


    ### NAT Gateway


    A NAT gateway is a Network Address Translation (NAT) service. You can use a NAT
    gateway so that instances in a private subnet can connect to services outside
    your VPC, but external services cannot initiate a connection with those instances.


    ### EC2


    Amazon EC2 is a web service that provides secure, resizable compute capacity in
    the cloud. You will use the T2 instance in a later example. T2 instances are a
    low-cost, general-purpose instance types that provide a baseline level of CPU
    performance with the ability to burst above the baseline when needed. T2 instances
    are one of the lowest-cost Amazon EC2 instance options and are ideal for a variety
    of general-purpose applications like microservices.


    ### Route Tables


    A route table contains a set of rules, called *routes*, that determine where network
    traffic from your subnet or gateway is directed.


    The *Main* route table automatically comes with your VPC, and it is an implicit
    route table. It controls the routing for all subnets that are not explicitly associated
    with any other route table.


    Each subnet in your VPC must be associated with a route table, which controls
    the routing for the subnet (the subnet route table).


    ### Internet Gateway


    An Internet Gateway (IGW) enables your instances to connect to the Internet through
    the Amazon EC2 network edge. The IGW will translate the public IP addresses of
    your virtual machines to their private IP addresses using network address translation
    (NAT). All public IP addresses used in the VPC are controlled by this IGW.


    These AWS services are just representative, not exhaustive. Detailed discussions
    on these or discussions on more services are beyond the scope of this book.


    ## Infrastructure as Code (IaC)


    Infrastructure as Code (IaC) is where you write and execute code to define, deploy,
    update, and destroy your infrastructure. Typically, you have been automating infrastructure
    management using ad hoc scripts, such as `.sh` bash scripts. Such ad hoc scripts
    provide a general-purpose tool-based approach, so you need to write complete custom
    code for every task. But specific and purpose-built tools for IaC provide concise
    APIs for accomplishing complicated tasks, thus enforcing a particular structure
    for your code. Ad hoc scripts are great for small, one-off tasks but when it comes
    to infrastructures involving multiple moving parts, especially when you want to
    take care of a number of microservices, bash scripts become a mess of unmaintainable
    spaghetti. This is where the IaC tools come to your help.


    Let’s look at a few benefits of IaC:


    - **Self-service**: Since you are reading this book, most probably your role in
    your daily job is that of an application developer, not a system administrator.
    However, there could be times when you need to have an infrastructure to deploy
    and test your application components. In my years of experience, I have seen a
    few system administrators serving the entire big team or the entire organization.
    Then how do you, as a developer, get an infrastructure in time? If your infrastructure
    is defined in code, the infrastructure deployment process can be automated, and
    you can kick off your own deployments to provision the infrastructure whenever
    necessary.

    - **Version control**: When you have your infrastructure provisioning as code,
    you can store the IaC in version control so that the entire history of your infrastructure
    is captured in the commit log. This means, when problems occur and you suspect
    this is due to changes in your infrastructure, you can simply revert to your previous,
    known-good version of your provisioning code.


    The next section looks at one of the tools in the IaC space—Terraform.


    ### Terraform


    Terraform is an open source IaC tool created by HashiCorp. Terraform is written
    in the Go language. Terraform can use the authentication mechanism you’re already
    using with cloud service providers like AWS, Azure, Google Cloud, and so on, and
    then make API calls. You need to create Terraform configurations, which are text
    files that specify the infrastructure you want to create.


    You can define your entire infrastructure, starting with Internet gateways, load
    balancers, VPCs, subnets, servers, and so on. You do this in Terraform configurations
    and commit those files to a version control system. You can then run `terraform
    apply` to create your infrastructure on the target cloud. When you need to make
    some changes to your infrastructure, you make those changes in the Terraform configuration
    files, validate those changes through code reviews and tests, commit the updated
    code to version control, and then run the `terraform apply` command again. One
    aspect to note is that there is no straight way to deploy the same infrastructure
    in a different cloud provider using the same Terraform configuration, because
    the cloud providers don’t offer the same types of infrastructure.


    That’s a quick introduction to public cloud and IaC. The next section puts these
    learnings into some code.


    ## Setting Up AWS EC2 Using Terraform


    In this section, you use Terraform to create an EC2 compute infrastructure in
    AWS. I assume that you already have the following prerequisites in your development
    machine:


    - An AWS account that you know how to manage using the AWS web console

    - An AWS CLI (Command Line Interface) and terminal with secret keys to access
    the AWS account (optional)

    - A key pair to access your EC2 instances

    - Terraform


    I don’t intend to cover those aspects in this book. If you aren’t familiar with
    these steps, refer to an appropriate book.^([⁷](#fn7)) Appendix F also provides
    some guidance in using a few of these tools.


    The next sections use a few of the AWS infrastructure components already discussed
    for this demonstration.


    ### Design a Mini Data Center in the Cloud


    You will have a very minimal Compute module in AWS Cloud. Even though the intention
    is to set up a minimal Compute infrastructure, note that you need a full set of
    Compute and Network infrastructures for this, which is not trivial. Thanks to
    Terraform, it will make even such non-trivial tasks accessible to developers like
    you and me. Figure [14-5](#619782_1_En_14_Chapter.xhtml#Fig5) shows the targeted
    Compute module in AWS Cloud.


    ![](images/619782_1_En_14_Chapter/619782_1_En_14_Fig5_HTML.jpg)


    A layered block diagram has the following flow, internet, internet gateway under
    AWS cloud and region, router and route table under VPC, and security group of
    EC2 and T2 under subnet from the outermost to the innermost layer.


    **Figure 14-5** A mini data center in AWS Cloud


    The next section gets into the code. It starts by investigating the project structure.'
