    ```\n\n`plan` 命令让您在进行任何更改之前查看 Terraform 将要执行的操作，如清单 15-10 所示。\n\n```\n(base) binildass-MacBook-Pro:ch15-01\
    \ binil$ terraform plan\n清单 15-10\nTerraform plan\n```\n\n`apply` 命令会显示相同的计划输出，并要求您确认是否要继续执行此计划，如清单\
    \ 15-11 所示。\n\n```\n(base) binildass-MacBook-Pro:001-aws-eks-tf binil$ terraform\
    \ apply\naws_eks_node_group.demo: Creation complete after 2m12s [id=bdca-tf-eks-01:demo]\n\
    Apply complete! Resources: 18 added, 0 changed, 0 destroyed.\nOutputs:\nconfig_map_aws_auth\
    \ = <<EOT\napiVersion: v1\nkind: ConfigMap\n...\nEOT\n(base) binildass-MacBook-Pro:001-aws-eks-tf\
    \ binil$\n清单 15-11\nTerraform apply\n```\n\n现在，您可以应用前面步骤 3 和 4 中提到的命令（为 EKS 配置\
