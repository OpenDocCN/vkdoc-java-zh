    \ and the Environment\n```\n\nThis completes the last example in this chapter.\n\
    \n## Summary\n\nThe last chapter introduced Kubernetes and the familiar microservices\
    \ example interacting with an SQL and a NoSQL database. The current chapter is\
    \ an extension of that, where you looked at Kafka in Kubernetes. You also learned\
    \ that all the design primitives—including the correlation between multiple instances\
    \ of the consumer and provider microservices—all work in the Kubernetes toolset\
    \ as expected. Finally, you learned about Ingress, which can expose multiple services\
    \ through a single IP address, giving you a practical and economic means of exposing\
    \ multiple services to the external world. The next step is to look at a few more\
    \ tools that can help you further reduce and manage complexity in a production\
    \ scenario of microservices, where you have more than a dozen of them. This is\
    \ the topic of the next chapter.\n\n# 12. Automating Kubernetes Deployment and\
    \ Helm\n\nThe journey from monoliths to microservices includes objectives like\
    \ selective scalability, parallel release, and so on. However, as you create more\
    \ microservices and your application grows, it becomes increasingly difficult\
    \ to manage. Kubernetes simplifies the process by grouping multiple microservices\
    \ into a single deployment. Managing Kubernetes applications across the development\
    \ lifecycle brings its own set of challenges, including version management, configuring\
    \ environment variables, resource allocation, updating, and rollbacks. Helm provides\
    \ one of the most appropriate solutions to this problem, making deployments more\
    \ consistent, repeatable, and reliable. This chapter looks again at the need for\
    \ automation and as a part of that it introduces Helm with the help of the multi-microservices\
    \ example.\n\nThe objective here is to understand the automation steps and then\
    \ introduce Helm. To start, I strip down the example application to a bare minimum\
    \ so that you can concentrate just on the application automation aspects. Once\
    \ I introduce Helm, I bring back the same multi-microservices example and show\
    \ you how Helm makes sense when the microservices complexity increases.\n\nThe\
    \ following concepts are covered in this chapter:\n\n- Reintroducing the Hello\
    \ World Spring Boot microservices\n- Automating Docker interactions\n- Automating\
    \ Kubernetes interactions\n- Introducing Helm\n- Using Helm to deploy a multi-microservice\n\
    - Using Helmfile to deploy a multi-microservice\n\nLet’s start by reintroducing\
    \ the “Hello World” microservice example."
