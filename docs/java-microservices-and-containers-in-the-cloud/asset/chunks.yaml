    ## 使用 MongoDB 容器编排微服务


    此示例再次复用了第 3 章中标题为“使用 MongoDB 和 CrudRepository 的微服务”部分的微服务。它使用了相同的两个微服务——一个消费者和一个提供者微服务，它们通过
    REST 协议相互通信。提供者微服务还与 MongoDB 进行交互。第 8 章展示了一个与 MongoDB 数据库交互的完整微服务示例，所有组件都在 Docker
    容器中。整体设计请参考第 2 章中的图 2-1。在本节中，您将修改该示例，使其使用 Docker Compose 完全部署在容器基础设施中。


    ### 编排容器拓扑


    对于此编排，您需要一个完整的基于容器的部署拓扑，如图 9-2 所示。Product Web 和 Product Server 微服务被容器化，Product
    Server 微服务将连接到一个同样部署在容器内的 MongoDB 数据库。


    ![](img/619782_1_En_9_Fig2_HTML.jpg)


    该图展示了微服务容器。它包括 Product Web 微服务、Product Server 微服务、容器引擎、主机操作系统和硬件。


    图 9-2


    编排微服务容器


    同样，Product Web 和 Product Server 容器提供业务服务，而 PostgreSQL 容器则提供用于持久化状态的应用程序服务。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。此示例的代码组织在
    `ch09\ch09-02` 文件夹内。此示例中的大部分源代码与 `ch03\ch03-02` 类似，后者已在第 3 章“使用 MongoDB 和 CrudRepository
    的微服务”部分以及第 8 章“使用文件挂载的微服务和 MongoDB 容器”部分详细解释过。您在上一章中已经看到了这些多个相互交互的微服务的基于容器的部署模式，因此本节将专门研究如何使用
    Docker Compose 编排它们。


    让我们从查看 `docker-compose.yml` 文件开始。描述 `web` 服务的部分与清单 9-4 中的相同，因此此处不再重复。其余配置如清单 9-14
    所示。


    ```

    version: "3"

    services:

    db:

    image: mongo:3.6

    container_name: mongo

    ports:

    - "27017:27017"

    volumes:

    - "db-data:/data/db"

    networks:

    - ecom-network

    server:

    build: ./01-ProductServer

    image: ecom/product-server

    container_name: product-server

    ports:

    - "8081:8081"

    depends_on:

    - "db"

    networks:

    - ecom-network

    environment:

    - spring.data.mongodb.uri=mongodb://192.168.64.5:27017/test

    web:

    ...

    volumes:

    db-data:

    driver: local

    driver_opts:

    o: bind

    type: none

    device: /home/docker/binil/mongodata

    networks:

    ecom-network:

    清单 9-14

    Docker Compose YAML 文件 (ch09\ch09-02\docker-compose.yml)

    ```


    此处所有部分都在前面的示例中展示并解释过。请注意，此示例使用了一个命名卷 `db-data`，它使用了主机上的一个挂载文件夹。您可以复用为第 8 章示例创建的文件夹。该文件夹会在
    Minikube VM 中自动创建，因为我在第 8 章的示例中使用了 Minikube 中的 Docker。如果您在创建此文件夹时遇到困难，一个简单的技巧是执行第
    8 章的示例，并且在不重启 Minikube 的情况下尝试构建此示例。请记住，当您停止 Minikube 时，所有这些都将丢失。或者，您可以创建一个新文件夹，这将在下一节的第一步中解释。如果您在主机上使用
    Docker，也可以手动创建此文件夹，但需要在主机上进行。

