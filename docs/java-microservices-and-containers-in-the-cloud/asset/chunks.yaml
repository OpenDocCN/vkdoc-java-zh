    Releasing AWS Resources\n```"
  trans: "\n### 在 AWS 中构建并启动您的 EKS 集群\n\n要在 AWS 中创建一个 EKS 集群，您需要进入根文件夹 `ch15\\ch15-01`，并首先运行\
    \ `terraform init` 命令。参见清单 15-8。\n\n```\n(base) binildass-MacBook-Pro:ch15-01\
    \ binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch15/ch15-01\n\
    (base) binildass-MacBook-Pro:ch15-01 binil$ terraform init\nInitializing the backend...\n\
    ...\n(base) binildass-MacBook-Pro:ch15-01 binil$\n清单 15-8\nTerraform init\n```\n\
    \n然后，您需要对代码进行完整性检查。参见清单 15-9。\n\n```\n(base) binildass-MacBook-Pro:ch15-01 binil$\
    \ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch15/ch15-01\n(base)\
    \ binildass-MacBook-Pro:ch15-01 binil$ terraform validate\nSuccess! The configuration\
