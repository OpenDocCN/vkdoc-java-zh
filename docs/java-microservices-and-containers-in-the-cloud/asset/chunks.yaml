  trans: '

    ### 使用 Docker Compose 运行容器


    `ch09\ch09-03` 文件夹包含构建和运行示例所需的脚本。第一步是启动一个 Minikube 单节点 Kubernetes 集群，以便启动 Docker
    守护进程。有关容器命令的快速参考，请参阅附录 E。


    假设 Minikube 单节点 Kubernetes 集群已启动并运行，清单 9-23 中的简单脚本包含一个命令，用于构建并运行包含所有已定义容器的完整应用程序。


    ```

