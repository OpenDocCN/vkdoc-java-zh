    ```

    kubectl apply -f https://raw.githubusercontent.com/scriptcamp/minikube/main/nginx.yaml

    ```


    这是声明式管理，你只需指定所需的结果，而不是实现该结果所需的各个步骤。此命令通过文件名或标准输入将配置应用于资源。必须指定资源名称。接受 JSON 和 YAML
    格式。


    然而，清单 10-18 使用了 `kubectl create`。这是一种命令式的指定方式，意味着你给出一系列指令或步骤来达到目标。你指定要达到目标的内容和方式。`kubectl
    create` 命令也从文件或标准输入创建资源。接受 JSON 和 YAML 格式。


