    在此示例中，你打算进行的任何自动化（仅镜像创建）已经完成，因此你可以手动执行其余阶段。


    现在将镜像推送到 Docker 公共注册表。由于我的 Docker 注册表中已有该镜像，我首先从终端将其删除。为此，我将获取一个令牌。参见清单 12-10。


    ```

    (base) binildass-MacBook-Pro:~ binil$ HUB_TOKEN=$(curl -s -H "Content-Type: application/json"
    -X POST -d ''{"username": "binildas" , "password": "********" }'' https://hub.docker.com/v2/users/login/
