    ### 理解源代码


    本节假设你已在 Minikube 中启用了 Ingress，并按照第 11 章第三个示例中的说明，将所需的主机名添加到了主机文件中。


    本示例从逐个创建 Helm Chart 开始。在此过程中，你还会看到如何利用适用于多个组件的公共 Chart。我假设你有一个名为 `ch12/ch12-06`
    的项目根文件夹，该文件夹目前只包含 `README.txt` 文件。更准确的做法是，从本书的源代码下载中复制章节代码，然后删除当前未明确提及的任何文件和文件夹。当然，在创建完
    Chart 后，再从本书的代码中将所需的其他文件复制到你的项目根目录中。

