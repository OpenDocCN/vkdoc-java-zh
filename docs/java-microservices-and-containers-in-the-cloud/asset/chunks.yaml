    README.txt      postgres

    (base) binildass-MacBook-Pro:ch12-06 binil$ rm -r ./postgres/templates/*

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./postgres/templates/deployment.yaml

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./postgres/templates/pcv.yaml

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./postgres/templates/service.yaml

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./postgres/templates/config.yaml

    (base) binildass-MacBook-Pro:ch12-06 binil$

    清单 12-50

    创建 PostgreSQL Helm Chart

    ```


    你需要删除 `./postgres/template` 文件夹中生成的所有文件。然后，在 `./postgres/template` 文件夹中创建四个新文件——`deployment.yaml`、`pcv.yaml`、`service.yaml`
    和 `config.yaml`。你将使用本书代码中的文件内容来填充这些新文件。


    将 `BookCode/ch12/ch12-06/postgres/templates/*` 中相应文件的内容复制到这四个文件中。


    清单 12-51 展示了这些文件的部分内容。


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: {{ .Values.postgres.name }}

    labels:

    app: {{ .Values.postgres.name }}

    group: {{ .Values.postgres.group }}

    spec:

    replicas: {{ .Values.replicaCount }}

    selector:

    matchLabels:

    app: {{ .Values.postgres.name }}

    ...

    清单 12-51

    Postgres Deployment YAML 文件 (ch12/ch12-06/postgres/templates/deployment.yaml)

    ```


    这些基于 Go 模板的占位符引用了 `values.yaml` 文件中的值。`values.yaml` 文件应位于 Chart 的根文件夹中。为了更清晰地说明，以
    `deployment.yaml` 中的占位符 `{{ .Values.postgres.name }}` 为例，它将被清单 12-52 中的值填充。


    ```

    postgres:

    name: postgres

    现在将 BookCode/ch12/ch12-06/postgres/values.yaml 的内容复制到你项目文件夹中的 ./postgres/values.yaml
    文件

    清单 12-51\. Postgres 的 values YAML 文件 (ch12/ch12-06/postgres/values.yaml)

    replicaCount: 1

    postgres:

    name: postgres

    group: db

    container:

    image: postgres:9.6-alpine

    port: 5432

    service:

    type: ClusterIP

    port: 5432

    volume:

    name: postgres-storage

    kind: PersistentVolumeClaim

    mountPath: /var/lib/postgresql/data

    pvc:

    name: postgres-persistent-volume-claim

    accessMode: ReadWriteOnce

    storage: 4Gi

    config:

    name: postgres-config

    data:

    - key: key

    value: value

    清单 12-52

    Postgres 的 Values YAML 文件 (ch12/ch12-06/postgre/values.yaml)

    ```


    现在，我们来详细研究另一个文件，其余文件将遵循相同的模式。接下来要研究的模板是你需要为 `ClusterIP` 创建的，它允许集群内的其他 Pod 访问带有
    `postgres` 标签的 Pod。这就是 `./postgres/template/service.yaml` 文件，如清单 12-53 所示。


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: {{ .Values.postgres.name }}

    labels:

    group: {{ .Values.postgres.group }}

    spec:

    type: {{ .Values.postgres.service.type }}

    selector:

    app: {{ .Values.postgres.name }}

    ports:

    - port: {{ .Values.postgres.service.port }}

    targetPort: {{ .Values.postgres.container.port }}

    清单 12-53

    Postgres Service YAML 文件 (ch12/ch12-06/postgres/service.yaml)

    ```


    同样，以 `{{ .Values.postgres.service.port }}` 为例，它的值将来自 `./postgres/values.yaml`
    文件的叶子节点：


    ```

    postgres:

    service:

    port: 5432

    ```


    同样的解释也适用于 `./postgres/pvc.yaml` 和 `./postgres/config.yaml` 文件。


    你可以更新 `./Chart.yaml` 文件中的元数据，本章前面的示例中已经对此进行了描述。如果你有疑问，只需将 `BookCode/ch12/ch12-06/Chart.yaml`
    的内容复制到你项目文件夹中的 `./Chart.yaml` 文件即可。


    作为 `postgres` Chart 的最后一步，你需要创建另一个文件来保存一些 PostgreSQL 特定的值。将该文件添加到 `postgres` Chart
    文件夹之外。


    ```

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./acme-postgres.yaml

    ```


    使用 `acme postgres` 特定的值更新此文件。


    然后将 `BookCode/ch12/ch12-06/acme-postgres.yaml` 的内容复制到 `./acme-postgres.yaml`。


    为了确保一切正确，你可能需要执行清单 12-54 中所示的健全性检查命令。


    ```

    /Users/binil/binil/code/mac/mybooks/docker-04/ch12/ch12-06

    (base) binildass-MacBook-Pro:ch12-06 binil$ helm template postgres

    (base) binildass-MacBook-Pro:ch12-06 binil$ helm lint postgres

    (base) binildass-MacBook-Pro:ch12-06 binil$ helm install postgres --debug --dry-run
    postgres

    清单 12-54

    对 Helm 文件进行健全性检查

    ```


    #### 微服务和 Adminer 的通用 Chart


    本节将演示 Helm 的另一个优势——使用通用 Chart（称为模板 Chart），它可以用于多个发布版本。在本例中，你将把它用作 Product Web
    和 Product Server 微服务以及 Adminer 应用的通用模板。你需要创建一个名为 `app` 的新 Helm Chart，并重复创建 `postgres`
    Helm Chart 的步骤，如清单 12-55 所示。


    ```

