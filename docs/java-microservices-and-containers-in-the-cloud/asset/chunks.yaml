    \ kubectl describe svc product-web\nName:                     product-web\nNamespace:\
    \                default\nLabels:                   \nAnnotations:           \
    \   \nSelector:                 app=product-web\nType:                     LoadBalancer\n\
    IP Family Policy:         SingleStack\nIP Families:              IPv4\nIP:   \
    \                    10.98.43.63\nIPs:                      10.98.43.63\nPort:\
    \                       8080/TCP\nTargetPort:               8080/TCP\nNodePort:\
