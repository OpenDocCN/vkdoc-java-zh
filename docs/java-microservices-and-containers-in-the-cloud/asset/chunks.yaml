    ### 测试微服务


    微服务启动后，你可以通过浏览器访问此 URL 来访问 Web 应用程序：


    `http://127.0.0.1:8080/`


    或者，你也可以使用 cURL 访问微服务，如清单 12-5 所示。


    ```

    (base) binildass-MacBook-Pro:~ binil$ curl http://127.0.0.1:8080/

    Hello Docker World : 1

    (base) binildass-MacBook-Pro:~ binil$

    清单 12-5

    使用 cURL 测试微服务


    在接下来的三个示例中，你将提高此微服务基于容器的部署的构建和打包自动化水平。之后，我将介绍 Helm。


    ## 自动化 Docker 构建


    在本节中，你将把示例容器化并部署到 Docker 中。本节使用 `dockerfile-maven-plugin` 将 Maven 与 Docker 集成。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。此示例的源代码组织在
    `ch12\ch12-02` 文件夹内。


    你有一个唯一的应用程序组件，即 `Application.java` 类，它是一个 REST 控制器。额外的代码告诉 Maven 脚本使用 `dockerfile-maven-plugin`。见清单
    12-6。


    ```

    ...


    ...


    com.spotify


    dockerfile-maven-plugin


    1.4.13


    ${docker.image.prefix}/

    ${project.artifactId}


    清单 12-6

    Spotify Maven 插件 (ch12/ch12-02/pom.xml)

    ```


    Spotify Maven 插件会使用你的 Dockerfile 为你运行 Docker 命令，就像你在命令终端上操作一样。你可以用它来自动化 Docker
    构建。对于 Docker 镜像标签等，有一些配置选项，但它将应用程序中的 Docker 知识集中在一个 Dockerfile 中，这是许多人喜欢的方式。

