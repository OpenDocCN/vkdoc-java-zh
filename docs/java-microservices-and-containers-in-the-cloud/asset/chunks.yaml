    Listing 9-37

    Stopping Microservice Containers and Cleaning the Environment

    ```


    You can also watch the logs in the server side console while executing the `clean.sh`
    script.


    ## Summary


    Chapter [7](#619782_1_En_7_Chapter.xhtml) introduced Docker containers and Chapter
    [8](#619782_1_En_8_Chapter.xhtml) explained how Docker containers can be used
    to better manage microservice applications. Tools like Docker Compose and Kubernetes
    help you further when you have more than a handful of microservices as a part
    of your aggregate application. This chapter showed how Docker Compose helps you
    when you have many business microservices, application services, and infrastructure
    services. Many of these services can be deployed as separate containers and this
    is where Docker Compose helps you manage their dependencies and lifecycles during
    deployment and operations. You don’t need to stop with Docker; you can also consider
    full-fledged container orchestration tools including but not limited to Kubernetes.
    You’ll do that in the next chapter.'
