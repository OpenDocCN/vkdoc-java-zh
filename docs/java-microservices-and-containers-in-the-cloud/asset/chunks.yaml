- fmt: '### Deploy Webapp Using Maven Container


    You can simply add your application build to Tomcat’s `webapps` directory (in
    the case of the official Docker image, that is `/usr/local/tomcat/webapps`) to
    deploy your app. Based on the build name added to the `webapps` directory, Tomcat
    maps this application to a specific route. If you were to add `ProductWeb.war`
    to `webapps` as `product-web.war`, you could access it on `/product-web` path
    for the Tomcat URL. If you want to deploy your application without any extra paths,
    you have to use an artefact named `ROOT`. See Listing [7-16](#619782_1_En_7_Chapter.xhtml#PC17).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run -it -p 8080:8080 -v $(pwd)/ProductWeb/target/ProductWeb.war:/usr/local/tomcat/webapps/productapp.war
    tomcat

    Using CATALINA_BASE:   /usr/local/tomcat

    Using CATALINA_HOME:   /usr/local/tomcat

    Using CATALINA_TMPDIR: /usr/local/tomcat/temp

    Using JRE_HOME:        /usr/local/openjdk-11

    Using CLASSPATH:       /usr/local/tomcat/bin/bootstrap.jar:/usr/local/tomcat/bin/tomcat-juli.jar

    Using CATALINA_OPTS:

    ...

    26-May-2022 17:41:34.052 INFO [main] org.apache.catalina.startup.HostConfig.deployWAR
    Deploying web application archive [/usr/local/tomcat/webapps/productapp.war]

    26-May-2022 17:41:34.307 INFO [main] org.apache.catalina.startup.HostConfig.deployWAR
    Deployment of web application archive [/usr/local/tomcat/webapps/productapp.war]
    has finished in [255] ms

    26-May-2022 17:41:34.310 INFO [main] org.apache.coyote.AbstractProtocol.start
    Starting ProtocolHandler ["http-nio-8080"]

    26-May-2022 17:41:34.329 INFO [main] org.apache.catalina.startup.Catalina.start
    Server startup in [339] milliseconds

    Listing 7-16

    Deploy Web App Project Using Maven Container

    ```


    In the previous section, you saw how to run a Tomcat container. Let’s repeat that
    here again as in Listing [7-16](#619782_1_En_7_Chapter.xhtml#PC17). Note that
    the Tomcat image is not downloaded this time, since it’s already downloaded, as
    in Listing [7-5](#619782_1_En_7_Chapter.xhtml#PC6). You can go to `/productapp`
    on port 8080 for your Docker environment and see the output of your web application
    using a browser, as shown in Figure [7-16](#619782_1_En_7_Chapter.xhtml#Fig16).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig16_HTML.jpg)


    A screenshot of a web browser window featuring a 404 error message. The text Hello
    World is given on the page.


    Figure 7-16


    Access a web app in the Tomcat container


    Note that `192.168.64.5` is the IP for the Minikube. You can also access the application
    using `cURL`, as in Listing [7-17](#619782_1_En_7_Chapter.xhtml#PC18).


    ```

    (base) binildass-MacBook-Pro:~ binil$ curl http://192.168.64.5:8080/productapp/


    Hello World!


    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-17

    Access Web App in Tomcat Using cURL

    ```


    Once that’s done, you can stop the Tomcat container using the code in Listing
    [7-18](#619782_1_En_7_Chapter.xhtml#PC19).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker ps

    CONTAINER ID   IMAGE    COMMAND             CREATED         STATUS         PORTS                           NAMES

    a198aabd9464   tomcat  "catalina.sh run"   8 minutes ago   Up 8 minutes   0.0.0.0:8080->8080/tcp   happy_gould

    ..

    (base) binildass-MacBook-Pro:~ binil$ docker stop a198

    a198

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-18

    Stopping Tomcat Container

    ```


    That was a simple example to demonstrate how you can build, package, deploy, and
    run a Java application without even having Java installed on your host machine!
    The next section moves to the next concept—Docker Compose.


    ## Build and Run Java App with Docker Compose


    The objective here is to compile, package, deploy, and run a Java app using Docker
    Compose. I include more details and examples of Docker Compose in a later chapter.
    Let’s just run this example for the completion of our discussion.


    ### Using Docker Compose


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch07\ch07-01` folder. Refer
    to Appendix E on Docker to make sure you have installed Docker Compose. Docker
    Compose uses the file shown in Listing [7-19](#619782_1_En_7_Chapter.xhtml#PC20).


    ```

    version: ''2''

    services:

    web:

    image: tomcat

    ports:

    - "8080:8080"

    volumes:

    - ./ProductWeb/target/ProductWeb.war:

    /usr/local/tomcat/webapps/ROOT.war

    - ./ProductWeb/target/ProductWeb:

    /usr/local/tomcat/webapps/ROOT

    Listing 7-19

    Docker Compose YML File

    ```


    If you want to deploy your application without any extra paths, you have to place
    an artifact named `ROOT`. That is done by the directory mounting in Listing [7-19](#619782_1_En_7_Chapter.xhtml#PC20).
    Then you run Docker to package, as in an earlier example, and subsequently `run
    docker-compose`, both commands in one go. `docker-compose` will fetch the `docker-compose.yml`,
    as shown in Listing [7-20](#619782_1_En_7_Chapter.xhtml#PC21).


    ```

    (base) binildass-MacBook-Pro:ch07-01 binil$ docker run --rm -it -v $(pwd)/ProductWeb:/ProductWebDockerHost
    -w /ProductWebDockerHost maven:3.8.5-jdk-11 mvn package && docker-compose up

