    This example reuses the deployment schema defined in the first example in this
    chapter. However, there is a change—you will use volume mount here. See Figure
    [8-9](#619782_1_En_8_Chapter.xhtml#Fig9).


    ![](images/619782_1_En_8_Chapter/619782_1_En_8_Fig9_HTML.jpg)


    A diagram illustrates the container deployment topology for microservice. It includes
    user, browser, container engine, host OS, and hardware.


    **Figure 8-9** Container deployment topology for microservice


    This example uses the `-v` options so that the directory on the host operating
    system will be available for the container in this modified example. The volume
    created in this manner is a kind of mapped directory. This mapped directory will
    be available for the container and it is also available from the host operating
    system. Any files already in the mapped directory will also be available inside
    the container; they will not be deleted during the mapping step. Referring to
    the numbered labels in Figure [8-9](#619782_1_En_8_Chapter.xhtml#Fig9), you may
    note these aspects:


    - Since you have mapped the volume using the `-v` option, the persistence-related
    commands from the Mongo container are delegated to the filesystem abstraction.

    - The filesystem abstraction of the operating system can organize the Mongo database’s
    data into files, directories, and other related constructs.

    - At the hardware layer, a storage device is used to retain digital data, which
    could be a magnetic disk, a semiconductor device, and so on.


    Since this example uses a persistence mechanism outside the container, you must
    also verify that the data persisted to the storage has the capability to overcome
    container lifecycle.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch08\ch08-05` folder. Much
    of the source code in this example is similar to `ch03\ch03-02`, which was explained
    in detail in Chapter [3](#619782_1_En_3_Chapter.xhtml). Also, the source code
    for this example is like the first two examples in this chapter. Compared to the
    second example in this chapter, the change is that you will use the `-v` options
    so that the directory on the host operating system will be available for the container.


