    Once the microservice is up, you can access the web application using your browser
    and pointing to `http://localhost:8080/product.html` (see Figure [1-17](#619782_1_En_1_Chapter.xhtml#Fig17)).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig17_HTML.jpg)


