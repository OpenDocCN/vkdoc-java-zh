    The table includes columns for ID, name, code, title, price, and actions. Users
    can add new products, edit existing ones, or delete them.


    **Figure 1-17** Accessing the microservice using a browser


    Typing this URL using the browser will render the UI app that’s packaged inside
    the `resources` folder inside the project. From the browser UI, you can add a
    new product by clicking the **Add New Product** button and entering the details
    (see Figure [1-18](#619782_1_En_1_Chapter.xhtml#Fig18)).


