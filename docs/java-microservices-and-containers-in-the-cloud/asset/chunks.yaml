- fmt: '# 10. Microservices with Kubernetes


    Chapter [1](#619782_1_En_1_Chapter.xhtml) discussed various levels of service
    granularity. As you keep splitting services into finer services, you are in fact
    increasing the number of moving parts in your architecture. This kind of divide-and-conquer
    approach in splitting to finer services is attempting to decrease the risk of
    an individual service failure bringing down your entire application. But on the
    other hand, as you increase the number of moving parts, you also increase the
    number of links between these moving parts, thus increasing the blast area prone
    to failures.


    Monolithic applications consist of components and modules that are all tightly
    coupled and must be developed, deployed, operated, and managed as one entity,
    because they all run as a single process. Running a monolithic application usually
    requires one or a few powerful servers that can provide enough resources to run
    the application. When the load on the application increases, you can *vertically*
    scale (by increasing hardware specs) or *horizontally* scale (by introducing more
    replicas of the process) the application.


    When you move from monolithic to microservices, most of these scaling principles
    are applicable, but since you have increased the number of moving parts, the overall
    complexity also increases many fold. In fact, the degree of complexity keeps increasing
    more than proportional to the new elements. You might have seen this in the chapters
    on Docker, where I talked about images and containers, which are over and above
    the classical existing `.jar` formatted artifacts. You need a toolset and an ecosystem
    to better manage your application binaries in their static form (`.jar` and images)
    and in their dynamic form (containers). This topic is covered in this chapter.


    The following concepts are covered in this chapter.


    * Introduction to the Kubernetes architecture

    * Selected Kubernetes deployment aspects

    * Traffic and state management in Kubernetes

    * Composing microservices and database containers together in Kubernetes

    * Demonstrating Full CRUD functionality across the containers composed in Kubernetes


    ## The World of Kubernetes


    The act of splitting monolithic applications into finer, independently deployable
    components called microservices, packaging them as container images, and instantiating
    them into containers is the way forward. Each microservice is packaged into an
    image and runs as an independent process in the container. Each microservice communicates
    with other microservices through well-defined interfaces (APIs).


    Figure [10-1](#619782_1_En_10_Chapter.xhtml#Fig1) shows the different modes of
    virtualizations and application deployments from Chapter [7](#619782_1_En_7_Chapter.xhtml).
    In the containerized mode, the business applications are instantiated as containers
    over a container runtime. Docker is the container runtime used in this book. In
    a microservices-based architecture, you have many containers. To be specific,
    you may have one or more containers from the same Docker image or from different
    Docker images. When you have many such containers, this is where you need a container
    management tool or a container orchestration tool like Kubernetes.


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig1_HTML.jpg)


    A diagram illustrates the evolution of containerization technologies from traditional
    monolithic applications to kubernetes-based orchestration. It highlights the increased
    efficiency, scalability, and portability offered by containerization through hardware
    like CPU, disk, memory, and network.


    Figure 10-1


    The Kubernetes ecosystem


    Running containers is like running processes, which require their own housekeeping
    to be performed. Starting and stopping your containerized applications, rolling
    out updates, maintaining service levels, scaling containers to meet varying loads,
    securing access, and so on, are just a few of the many such housekeeping jobs
    to be performed. This section looks at how Kubernetes helps in this regard.


    ## Kubernetes Architecture


    Kubernetes is a container orchestrator. It manages running containers. A Kubernetes
    architecture is composed of multiple nodes, which are classified into master nodes
    and worker nodes. The master nodes host the Kubernetes Control Plane, whereas
    the worker nodes host your actual container applications.


    You can investigate these nodes with the help of Figure [10-2](#619782_1_En_10_Chapter.xhtml#Fig2).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig2_HTML.jpg)


    An architecture comprises a control plane with multiple master nodes and worker
    nodes. It includes API server, controller-manager, and scheduler. Worker nodes
    run `kubelet`, `kube-proxy`, and container runtime. A load balancer and HA proxy
    and `keepalived` are for service discovery and load balancing.


    Figure 10-2


    The Kubernetes architecture


    The next section looks at the Kubernetes architecture at a high level.


    ### The Control Plane


    The master node hosts the Kubernetes Control Plane; it also controls and manages
    the Kubernetes system. The components of the Kubernetes Control Plane are listed
    here:


    * The Kubernetes API server: The developer and the other components of the Kubernetes
    Control Plane communicate with the Control Plane using the Kubernetes API Server.

    * The Scheduler: Schedules the jobs or workloads into the worker nodes of your
    Kubernetes cluster.

    * The Control Manager: Performs Kubernetes cluster-level functions, such as replicating
    instances, keeping track of worker nodes, and so on.

    * `etcd`: A reliable, distributed, and persistent data store that stores the cluster
    configurations.


    ### The Node


    The nodes, or the worker nodes, run your containerized applications. The major
    components are listed here:


    * Container runtime: Runs your containers. Docker, `rkt`, and so on, are different
    container runtimes.

    * The Kubelet: Talks to the API server of the Control Plane and manages containers
    on the respective nodes.

    * The `kube-proxy`: Otherwise known as the Kubernetes Service Proxy, this load
    balances network traffic between application components.


    Figure [10-2](#619782_1_En_10_Chapter.xhtml#Fig2) depicts the Control Plane and
    the worker nodes. When you set up a Kubernetes cluster on-premises for a production
    environment, it is recommended that you deploy it in high availability (HA) mode.
    High availability means installing Kubernetes master or Control Plane in HA mode,
    as shown in Figure [10-2](#619782_1_En_10_Chapter.xhtml#Fig2).


    ## Kubernetes Deployment


    You use different kinds of API objects to deploy workloads in Kubernetes. This
    section briefly looks into a few of them.


    ### Containers


    In the previous two chapters on Docker, you learned how a container works. When
    it comes to Kubernetes, you use those same containers as the basic unit of work.
    Any workload or application that runs in Kubernetes, must run inside a container.
    This container could be a Docker container, a `rkt` container, or a virtual machine
    (VM) managed by Virtlet.


    When containers are orchestrated using Kubernetes, Kubernetes needs additional
    information for container management, such as a restart policy, a liveness probe,
    and so on. Kubernetes architecture abstracts for such additional requirements
    into what is called a *pod*.'
