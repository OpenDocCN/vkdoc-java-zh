  trans: '

    # 7. 初识 Docker


    资源和时间的共享并非新鲜事物，普遍认为其起源于 20 世纪 60 年代末至 70 年代初的 IBM 大型机时代。虚拟化技术使得组织和个人无需拥有计算机资源即可使用它。单个服务器的容量如此之大，以至于绝大多数通用型工作负载几乎无法有效利用它，因此让大量应用程序和用户共享使用是合理的。其目标是提高用户及其共享的昂贵计算机资源的效率，这为虚拟化铺平了道路。


    容器是操作系统虚拟化的一种形式。容器没有或只有精简的操作系统镜像，但会大量利用宿主操作系统。一系列特性使得容器颇具吸引力，尤其是在部署基于微服务的应用程序时，本章将对此进行探讨。


    本章涵盖以下主题：


    *   虚拟化概述

    *   容器简介

    *   Docker 详解

    *   无需本地 Java 环境即可编译、打包和运行 Java 应用

    *   运行你的第一个 Java 容器


    ## 不同类型的虚拟化


    本讨论从传统的应用部署模式开始，然后过渡到各种虚拟化方式，以便你能够体会到容器相较于其他虚拟化方法所提供的一些优势。


    ![](img/619782_1_En_7_Fig1_HTML.jpg)


    三张框图比较了三种类型的虚拟化。传统虚拟化只有一个应用程序，而虚拟机拥有客户操作系统和虚拟机，容器则拥有极简的客户操作系统和一个容器框。每种方式都包含硬件和应用程序。


    图 7-1


    传统方式 vs. 虚拟机 vs. 容器


    参考图 7-1，首先考虑不同的虚拟化和应用部署模式。


    ### 传统部署


    在传统或经典的应用部署模式中，组织使用物理服务器。每当业务需要新应用时，IT 部门就会购买一台新服务器。由于很多时候没人知道新应用的性能需求，并且为了给未来业务量的增长留出足够的空间，IT
    部门往往会过度采购。他们通过猜测来决定要购买的服务器型号和规格。


    配置应用软件的典型生命周期流程如下：


    1.  在数据中心准备好物理服务器。

    2.  安装或使用现有的操作系统。

    3.  安装应用软件所需的任何额外工具。

    4.  安装软件所需的任何依赖项。

    5.  运行你的软件。

    6.  停用你的应用。

    7.  重新利用或回收服务器硬件。


    更好地利用资本支出的方式是使用虚拟化，接下来将对此进行讨论。


    ### 虚拟化


    当 VMware 公司引入虚拟机（VM）概念时，IT 部门不再需要每次需要新应用时就采购一台新的、性能过剩的服务器。相反，IT 部门可以在现有闲置且有富余容量的服务器上运行新应用。虚拟化允许
    IT 部门在单个物理服务器上运行多个虚拟机。每个虚拟机都包含一个完整的操作系统副本、应用程序、必要的二进制文件和库。


    虚拟化堆栈中的核心组件是*虚拟机监控器*，也称为虚拟机监视器（VMM）。它在宿主机上创建一个虚拟平台，在此平台之上可以执行和监控多个客户操作系统。这些多个操作系统可以是同一操作系统的不同实例，也可以是不同的操作系统。它们共享由同一台宿主机提供的硬件资源。虚拟机监控器有以下分类：


    *   **类型 1，原生型或裸机型：** 原生型虚拟机监控器直接运行在宿主机硬件上，以控制硬件并监控客户操作系统。因此，客户操作系统运行在虚拟机监控器之上的一个独立层级。例如：Oracle
    VM、Microsoft Hyper-V、VMWare ESX 和 Xen。

    *   **类型 2，托管型：** 托管型虚拟机监控器运行在传统操作系统内。托管型虚拟机监控器在宿主操作系统之上增加了一个独立的软件层，而客户操作系统则成为硬件之上的第三个软件层级。例如：Oracle
    VM VirtualBox、VMWare Server 和 Workstation、Microsoft Virtual PC、KVM、QEMU 和 Parallels。


    每个虚拟机都需要自己专用的操作系统（OS）这一事实是一个主要缺陷。每个操作系统都会消耗 CPU、RAM 和其他资源。每个操作系统都需要许可、打补丁和监控。还有其他挑战，这里列举几个：


    *   操作系统镜像很庞大——以 GB 计。

    *   启动过程缓慢。

    *   应用程序不可移植。

    *   启动一个虚拟机可能需要 1-2 分钟。


    Docker 容器于 2013 年推出，旨在解决这些缺点。


    ### 容器


    容器使用操作系统级虚拟化。它们不需要自己完整的操作系统。相反，单个宿主机上的所有容器共享宿主机的操作系统。这释放了大量的系统资源，包括 CPU、RAM 和存储。它还降低了潜在的许可成本，并减少了操作系统打补丁和其他维护的开销。在操作系统层进行的容器抽象将代码和依赖项打包在一起。


    容器启动速度快且具有超强可移植性。容器非常轻量，可以在几秒或几毫秒内启动。容器工作负载可以快速轻松地从笔记本电脑迁移到云端，然后再迁移到数据中心的虚拟机或裸机服务器上。


    ## 容器详解


    理解容器对于理解本章的其余内容至关重要，因此本节专门介绍容器。

    '
- fmt: '### History of Containers


    Let’s consider a brief history of containers. Around 2000, Jails, an early implementation
    of container technology, was added to FreeBSD. The next year, the Linux VServer
    project made running several general-purpose Linux servers on a single box a reality.
    This separated the userspace environment into distinct units—called Virtual Private
    Servers—so that each VPS looked and felt like a real server to the processes contained
    within. In 2006, the “Generic Process Containers” was put forward. This was renamed
    Cgroups (Control Groups) and it allowed processes to be grouped together and ensured
    that each group got a share of memory, CPU, and disk I/O while at the same time
    preventing any one container from monopolizing any of these resources. Adding
    to this is the notion of Kernel namespaces, which separated it from user namespaces.
    User namespaces allow a process to have its own set of users and allow a process
    to have root privileges inside a container, but not outside. In 2008, IBM created
    the Linux Containers Project (LXC). LXC 1.0 was released in 2014. SELinux and
    Seccomp are two new features:


    - **Seccomp:** Seccomp is a Linux kernel feature for limiting the system calls
    that a task can use. This allows an underutilized CPU to be rented out to untrusted
    guests without fearing they will abuse other resources, which is a good fit for
    container use case.

    - **SELinux:** SELinux has an access control schema for “labeling processes, files,
    and devices and at defining rules on how labeled processes interact with labeled
    processes, files, and devices.” Linux containers, as a group of processes, are
    a good match for hardening with SELinux, another idea that maps to the container
    use case.


    Docker built on all of these features incrementally and wrapped the LXC userspace
    tools to make them even easier for developers to use. In June 2015, Docker the
    company open sourced Docker to OCI (Open Container Initiative) under the auspices
    of the Linux Foundation. Docker initially used the LXC driver, then moved to `libcontainer`,
    which is now renamed `runc`.


    ### Container Internals


    The namespace is a Kernel level feature. This function of the OS allows global
    resources, like network and disks among processes, to be shared. When global resources
    were wrapped in namespaces, they become visible only to those processes that run
    in the same namespace. For example, when you get a portion of disk and put it
    in one namespace, processes running in another namespace can’t see or access it.
    Similarly, processes in one namespace can’t access anything in memory that is
    allocated to another namespace, and so on. Of course, processes in namespace A
    can’t see or talk to processes in namespace B. This way, global resources can
    be virtualized and isolated. Docker works in this manner—each Docker container
    runs in its own namespace but uses the same kernel as all the other containers.
    The isolation happens because the kernel knows the namespace that was assigned
    to the process. During an API call, it makes sure that the process can only access
    resources in its own namespace.


    ### Virtualization vs. Containerization


    Having looked at the different levels of virtualization options, this section
    investigates the underlying details. See Figure [7-2](#619782_1_En_7_Chapter.xhtml#Fig2).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig2_HTML.jpg)


    2 block diagrams compare virtual machines and containers. Virtual machines have
    a guest operating system. Containers have a minimal guest operating system. Both
    have bins, libraries, and an application. Virtual machine runs on a hypervisor,
    while container runs on an engine.


    Figure 7-2


    VMs vs. containers


    Figure [7-2](#619782_1_En_7_Chapter.xhtml#Fig2) compares and contrasts the similarities
    and differences between virtualization and containerization. This discussion is
    limited to Type 2 virtualization, which gives more contrast compared to containerization,
    even though almost all the aspects are applicable to Type 1 virtualization also.


    In this case of virtualization, the VM manager takes over the CPU ring 0 (which
    is also called the “root mode” in newer CPUs) and intercepts all privileged calls
    made by the guest OS to create the illusion that the guest OS has its own hardware.
    Virtualization thus allows you to run two completely different OSes on the same
    (single) underlying hardware. Each guest OS goes through the processes of bootstrapping,
    kernel loading, and so on. The guest OS can’t get full access to either the host
    OS or to other guest OSs and hence can’t mess things up. This provides tighter
    security.


    You may now be able to appreciate that while you could run multiple OS in virtualized
    hardware, you can’t run completely different OSes in containers like in virtualization.
    However, you can run different distros of Linux because they all share the same
    kernel. This means, since containers share the same kernel as the host, you can
    run an Arch image on an Ubuntu host.


    A system call (commonly abbreviated as `syscall`) is the programmatic way in which
    a program requests services from the kernel of the operating system on which it
    is executed. This may include hardware-related services (for example, accessing
    a hard disk drive or accessing the device’s I\O ports), creation and execution
    of new processes, and communication with integral kernel services such as process
    scheduling. `syscalls` provide an essential interface between a process and the
    operating system. Containers have access to the kernel of the host. Since the
    kernel is the only part that communicates with the hardware, as long as your OS
    uses the good `syscall`, you can run any Linux distribution inside your container.
    For the same the reason, you can’t use Windows inside a container since it’s not
    using the same `syscall`.


    ## Docker Concepts


    This section talks about Docker concepts and Docker containers.


    ### Layered Filesystems


    Docker is based on `aufs` (short for `advanced multi-layered unification filesystem`),
    which implements Unionfs, a union mount for Linux filesystems. Unionfs is a filesystem
    service for Linux, FreeBSD, and NetBSD which implements a union mount for other
    filesystems. It allows files and directories of separate filesystems, known as
    `branches`, to be transparently overlaid, forming a single coherent filesystem.
    Several Linux distributions have chosen `aufs` as a replacement for UnionFS.


    A `union mount` is a mount that allows several filesystems to be mounted at one
    time and appear as one filesystem. The union mount overlays the filesystems on
    top of one another so that the resulting filesystem may contain files and subdirectories
    from any or all of the underlying filesystems. In Docker vocabulary, each of these
    filesystems is called an `image`.'
