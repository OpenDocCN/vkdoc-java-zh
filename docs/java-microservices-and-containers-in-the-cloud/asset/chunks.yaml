- fmt: '### Testing the Microservices


    In order to test these microservices, refer to the “Testing Parallel Request Processing”
    section in Chapter [5](#619782_1_En_5_Chapter.xhtml). Alternatively, you can use
    the following section.


    There is more than one way to test these microservices. One way is to use three
    browser instances and point to the URLs in Listing [6-17](#619782_1_En_6_Chapter.xhtml#PC17)
    to test the microservices.


    ```

    http://localhost:8080/product.html

    http://localhost:8081/product.html

    http://localhost:8082/product.html

    Listing 6-17

    Testing the Microservice Using Browsers

    ```


    Follow the detailed instructions described in the section titled “Test the Microservice
    Using UI” in Chapter [1](#619782_1_En_1_Chapter.xhtml) to test the CRUD operations.


    Alternatively, you can now take three (or even more) separate terminals to run
    `cURL` client commands concurrently. Listing [6-17](#619782_1_En_6_Chapter.xhtml#PC17)
    shows `cURL` clients sending requests to the Product Web microservice.


    ```

    binildass-MacBook-Pro:~ binil$ curl http://localhost:8080/productsweb

    binildass-MacBook-Pro:~ binil$ curl http://localhost:8081/productsweb

    binildass-MacBook-Pro:~ binil$ curl http://localhost:8082/productsweb

    Listing 6-18

    cURL Clients that Fire Requests to the Product Web Microservice at Different Ports

    ```


    You can also endurance-test the microservices by keeping the `cURL` clients firing
    continuously, as shown in Listings [6-19](#619782_1_En_6_Chapter.xhtml#PC19) through
    [6-21](#619782_1_En_6_Chapter.xhtml#PC21).


    ```

    (base) binildass-MacBook-Pro:02-ProductWeb binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch06/ch06-01/02-ProductWeb

    (base) binildass-MacBook-Pro:02-ProductWeb binil$ sh loopcurl3.sh

    ...

