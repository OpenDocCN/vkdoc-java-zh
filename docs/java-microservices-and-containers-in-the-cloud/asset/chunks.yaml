    view that is more relevant to the application architect, hence I have shown that
    in the figure. That is why even though Product Server and MongoDB are deployed
    as two separate containers, I have logically grouped them together to represent
    the single Product Server microservice. This specific instance of MongoDB is wholly
    owned by the Product Server microservice, and entities outside the Product Server
    microservice may not be concerned about this MongoDB instance for any reason.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch08\ch08-01` folder. The source
    code in this example is similar to `ch03\ch03-02`, which was explained in detail
    in Chapter [3](#619782_1_En_3_Chapter.xhtml). What you need to understand more
    is the deployment schema, which is covered in the next section.'
