- fmt: '# Ingress Routing of Microservices


    Through the previous chapters and the previous examples in this chapter, you have
    seen how a typical deployment can be done in Kubernetes with multiple business,
    application, and infrastructure services. This section shows you how to tweak
    the same set of microservices in the second example in Chapter [10](#619782_1_En_10_Chapter.xhtml)
    to plug in an Ingress in the front to route external requests. A consumer and
    provider microservice communicate with each other. The provider microservice stores
    the entity in a PostgreSQL database. The request from the browser is intercepted
    by the Ingress. As seen in Chapter [10](#619782_1_En_10_Chapter.xhtml), an Ingress
    can expose multiple services through a single IP address.


    Even though this example is included in this chapter and is titled Message Oriented
    Microservices as a final example, I have purposefully eliminated the messaging
    bridge between the microservices. This is to make the example lighter so that
    I can introduce a few other new components and keep the overall complexity of
    the example well within limits.


    ## Design Ingress Routing Topology


    The Product Web and Product Server microservices are both containerized, and the
    Product Server microservice will connect to a PostgreSQL database deployed within
    a container. All these containers will reside in Kubernetes. Ingress becomes an
    additional component for routing and the Adminer UI component manages the PostgreSQL
    database. See Figure [11-3](#619782_1_En_11_Chapter.xhtml#Fig3).


    ![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig3_HTML.jpg)


    A 3 D model diagram of the user connected to the browser, ingress infrastructure
    service, product web mu S, product server mu S, container engine with functions,
    host O S, and hardware. Product web includes a business service, and product server
    includes a business service and 2 application services.


    Figure 11-3


    Ingress routing topology for microservices


    ## Environment Configurations


    To make the URLs (`http://products.acme.test` and `http://adminer.acme.test`)
    work, you need to edit the host files in your host machine.


    Every website connected to the Internet has a unique numeric address that tells
    all the other devices where it is—its TCP/IP address. The Domain Name System (DNS)
    translates those numeric addresses into something more recognizable and memorable
    to humans, such as `www.acme.com`. The first time you type a web address like
    `www.acme.com`, your machine pings a DNS server—typically one automatically configured
    for you by your ISP (Internet Service Provider). This will resolve the TCP/IP
    address of the server you’re trying to connect to. Your browser builds up a hidden
    cache file to remember those details when you visit the site again.


    As specified, this example adds the names to the host files, as shown in Listing
    [11-31](#619782_1_En_11_Chapter.xhtml#PC31).


    ```

    (base) binildass-MacBook-Pro:ch11-03 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:~ binil$ sudo nano /etc/hosts

    192.168.64.5  adminer.acme.com

    192.168.64.5  products.acme.com

    (base) binildass-MacBook-Pro:~ binil$ ^O (To Save)

    (base) binildass-MacBook-Pro:~ binil$ ^X (To Exit)

    (base) binildass-MacBook-Pro:~ sudo killall -HUP mDNSResponder

    Listing 11-31

    Adding Hostnames to the etc Hosts File

    ```


    Listing [11-31](#619782_1_En_11_Chapter.xhtml#PC31) shows how I add the two new
    lines to add two new hostnames to my machine. This will map your localhost (Minikube)
    IP address to both hostnames and make them accessible.


    Figure [11-4](#619782_1_En_11_Chapter.xhtml#Fig4) shows how I edited this file.


    ![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig4_HTML.jpg)


    A cropped screenshot of the binil sudo 80 x 5 window. It has 2 commands that read
    base within parentheses binil d a s s-MacBook-Pro colon tilde binil dollar sign
    sudo nano slash e t c slash hosts and password.


    Figure 11-4


    Editing the host files


    Figure [11-5](#619782_1_En_11_Chapter.xhtml#Fig5) shows how I added the two hostnames
    in my machine.


    ![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig5_HTML.jpg)


    A screenshot of the binil pico sudo 80 x 20 window. It has the U W pico 5.09 file
    colon slash e t c slash hosts data that read host database, localhost is used
    to configure the loopback interface, when the system is booting do not change
    this entry, added by docker desktop, and others with localhost, broadcasthost,
    and other addresses.


    Figure 11-5


    Adding hostnames


    Once you’re done, hold down the Control and O keys to save the file, and then
    Control and X to exit. Subsequently in a command line, type `sudo killall -HUP
    mDNSResponder` and then press Return. That will flush your DNS cache, so it isn’t
    confused by any changes you made to the Hosts file.'
