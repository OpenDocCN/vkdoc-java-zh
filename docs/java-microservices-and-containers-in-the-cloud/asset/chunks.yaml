    \ 19:14:27 | Product Web | 106 | `ForkJoinPool.commonPool-worker-1` | Product\
    \ Server finishes sleep, Exits |\n\nA few aspects of interest are listed here:\n\
    \n- As the first step (Sl. No. 1), the worker thread in the Product Web microservice\
    \ (`http-nio-8080-exec-5`) invokes the Product Server microservice.\n  - Since\
    \ this invocation is asynchronous (`sendAndReceive.getSendFuture()` is async),\
    \ the worker thread will not wait for a response from the Product Server microservice.\n\
    \  - In Steps 4 and 6, the worker thread in the Product Web microservice exits.\n\
    - As a result of invocation in Step 1, the Product Server microservice gets the\
    \ hit more or less at the same time as shown in Step 2.\n  - The Product Server\
    \ microservice then goes to sleep for six seconds.\n  - While the Product Server\
    \ microservice sleeps, the invoker worker thread in the Product Web microservice\
    \ doesn’t wait. Instead, it exits in Steps 4 and 6.\n- In parallel, as shown in\
    \ Step 5, the `sendAndReceive.get()` method for the response is blocked, but this\
    \ is in a newly pooled thread.\n- After the six seconds of sleep, the Product\
    \ Server microservice completes its sleep in Step 7. The newly pooled thread of\
    \ the Product Web microservice receives the response in Step 8.\n- In Step 9,\
    \ this pooled thread of Product Web microservice starts two seconds of sleep.\
    \ The rest of the steps are not that important, so you can ignore them.\n\nYou\
    \ have not only seen sync style over async channel, but also learned how to release\
    \ the main worker thread and leverage a pooled thread to continue the processing\
    \ when the response is available in the message channel.\n\nYou also learned about\
    \ another aspect. You might have observed with patience that the browser rendered\
    \ the data only eventually, after a few seconds of delay, due to the sleep delays\
    \ you provisioned in both microservices. The interesting fact is the HTTP worker\
    \ thread that was serving the socket connection from the browser also doesn’t\
    \ wait. Instead, when the response from the Product Web microservice is available\
    \ in the HTTP channel, a pooled thread from the HTTP server is attached in order\
    \ to stream this response back to the browser. This is done under the hood by\
    \ `DeferredResult`."
