    *   [`http://products.acme.test`](http://products.acme.test)：用户可与 Product Web
    微服务交互


    *   [`http://adminer.acme.test`](http://adminer.acme.test)：用户可与 PostgreSQL 数据库交互


    与第 10 章中的代码清单 10-41 相比，代码清单 11-32 中新增了两个部署：Ingress 和 Adminer。让我们逐一研究这些新部署。请参见代码清单
    11-33。


    ```

    apiVersion: networking.k8s.io/v1

    kind: Ingress

    metadata:

    name: ingress-service

    annotations:

    kubernetes.io/ingress.class: nginx

