    ## 容器中的微服务与 PostgreSQL


    您已经了解到，将有状态的应用（包括数据库）部署在 Docker 容器之外是更好的做法，因为容器在设计上更擅长处理无状态操作。然而，在某些用例中，您可能希望将数据库放在容器中，例如在快速测试的场景下。在本节中，您将学习如何修改上一节的示例，使其完全部署在容器基础设施中。


    ### 设计容器拓扑


    对于当前设计，您需要对图 8-1 所示的基于容器的部署拓扑进行微调，并将 MongoDB 替换为 PostgreSQL。如图 8-7 所示。Product
    Web 和 Product Server 微服务被容器化，而 Product Server 微服务将连接到一个同样以容器形式部署的 PostgreSQL 数据库。


    ![](img/619782_1_En_8_Fig7_HTML.jpg)


    一张图表展示了微服务的容器部署拓扑。它包括用户、浏览器、容器引擎、主机操作系统和硬件。


    图 8-7


    微服务的容器部署拓扑


    在此，Product Web 和 Product Server 容器提供业务服务，而 PostgreSQL 容器则提供用于持久化状态的应用程序服务。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
    `ch08\ch08-04` 文件夹内。此示例中的源代码与第 3 章“使用 PostgreSQL 和 RestTemplate 的微服务”一节中详细解释的
    `ch03\ch03-01` 非常相似。您也在上一个示例中看到了使用 PostgreSQL 数据库的多个交互微服务的部署模式。本节将专门探讨如何连接到容器化的
    PostgreSQL 数据库。


    从容器化的微服务连接到容器化的 PostgreSQL 服务器相当直接，因此在单独运行容器时几乎不需要做任何更改。您将在下一节中了解这一点。

    '
- fmt: '### Run Containers Using Dockerfiles


    The `ch08\ch08-04` folder contains the Maven scripts required to build the examples.
    As a first step, you need to bring up the PostgreSQL server. The `Dockerfile`
    for this example is the same `Dockerfile` used in the previous three examples,
    and it is shown in Listing [8-5](#619782_1_En_8_Chapter.xhtml#PC6).


    Next, build the microservices and the Docker images and then run the containers.
    You will modify the scripts in the previous example in this chapter. Listing [8-33](#619782_1_En_8_Chapter.xhtml#PC34)
    organizes the commands into a single script.


    ```

    mvn -Dmaven.test.skip=true clean package

    docker build  --build-arg JAR_FILE=01-ProductServer/target/*.jar -t ecom/product-server
    .

    docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t ecom/product-web
    .

    docker network create ecom-network

    docker run -d --net=ecom-network --name postgres-docker -e POSTGRES_DB=productdb
    -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgre -p 5432:5432 -d postgres:15.3-alpine3.18

    docker run -d -p 8081:8081 --net=ecom-network --name product-server -e DB_SERVER=postgres-docker:5432
    -e POSTGRES_DB=productdb -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgre
    ecom/product-server

    docker run -d -p 8080:8080 --net=ecom-network --name product-web -e acme.PRODUCT_SERVICE_URL=http://product-server:8081/products
    ecom/product-web

