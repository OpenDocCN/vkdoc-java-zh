    (base) binildass-MacBook-Pro:~ binil$

    清单 10-36

    再次列出 Kubernetes Pod

    ```


    当你删除 StatefulSet 时，它会被重新创建，因为你在清单 10-10 的 `mongo-deployment.yml` 中指定了 `replicas:
    1`，这正是你向 Kubernetes 提出的请求。Pod 被赋予了与之前相同的名称，因为它是一个 StatefulSet。


    在你的宿主机的一个普通命令窗口中，你可以尝试在 Product Web 容器内运行命令。请参见清单 10-37。


