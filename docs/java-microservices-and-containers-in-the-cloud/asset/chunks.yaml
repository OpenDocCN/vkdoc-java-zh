    ## Kubernetes 中的微服务与 PostgreSQL


    第 8 章展示了一个与 PostgreSQL 数据库交互的完整微服务示例，所有组件均运行在 Docker 容器中。在第 9 章中，你修改了该示例，使其能够通过
    Docker Compose 完全部署在容器基础设施中。现在，本节将在 Kubernetes 中部署相同的示例。


    ### 设计微服务部署拓扑


    Product Web 和 Product Server 微服务已容器化，Product Server 微服务将连接到一个同样部署在容器内的 PostgreSQL
    数据库。所有这些容器现在都将在 Kubernetes 中运行。请参见图 10-12。


    ![](img/619782_1_En_10_Fig12_HTML.jpg)


    该图展示了用户如何通过浏览器与系统交互，浏览器向 product web 微服务发送请求。该微服务由多个 product-web Pod 组成，这些 Pod
    与 product server 微服务通信，而 product server 微服务则使用一个 PostgreSQL 数据库，该数据库部署在由 minikube
    和 docker 管理的 Kubernetes 集群上。


    图 10-12


    基于 Kubernetes 的微服务部署拓扑


    在此架构中，Product Web 和 Product Server 容器提供业务服务，而 PostgreSQL 容器则提供用于持久化状态的应用程序服务。


