    \ INFO  StartupInfoLogger.logStarted:57 - Started EcomProductMicroservice...\n\
    ...\n清单 10-27\n查看产品 Web 微服务终端日志\n```\n\n```\n(base) binildass-MacBook-Pro:~ binil$\
    \ kubectl --tail 15 logs -f product-server-6fb88b6849-q2pfx\n/\\\\ / ___'_ __\
    \ _ _(_)_ __  __ _ \\ \\ \\ \\\n( ( )\\___ | '_ | '_| | '_ \\/ _` | \\ \\ \\ \\\
    \n\\\\/  ___)| |_)| | | | | || (_| |  ) ) ) )\n'  |____| .__|_| |_|_| |_\\__,\
    \ | / / / /\n=========|_|==============|___/=/_/_/_/\n:: Spring Boot ::      \
    \          (v3.2.0)\n...\n2023-05-25 13:48:21 INFO  InitializationComponent.init:47\
    \ - Start...\n2023-05-25 13:48:21 DEBUG InitializationComponent.init:51 - Deleting\
    \ all existing data...\n2023-05-25 13:48:22 DEBUG InitializationComponent.init:56\
    \ - Creating initial data...\n2023-05-25 13:48:22 INFO  InitializationComponent.init:105\
    \ - End\n2023-05-25 13:48:23 INFO  StartupInfoLogger.logStarted:57 - Started EcomProductMicroservice...\n\
    ...\n清单 10-26\n查看产品服务器微服务终端日志\n```\n\n现在你可以开始测试微服务了。\n\n### 测试微服务 Pod\n\n当所有三个\
    \ Pod 都启动并运行后，你就可以访问 Product Web 微服务了。为此，如附录 E 所述，你必须先获取 Minikube IP。参见清单 10-28。\n\
    \n```\n(base) binildass-MacBook-Pro:ch07-02 binil$ minikube ip\n192.168.64.5\n\
    (base) binildass-MacBook-Pro:ch07-02 binil$\n清单 10-28\n查找 Minikube IP\n```\n\n\
    现在，你可以使用由 Minikube IP 构成的 URL，通过浏览器访问 Product Web 微服务。\n\n`http://192.168.64.5:8080/product.html`\n\
    \n请参考第 1 章中“使用 UI 测试微服务”一节来测试 Product Web 微服务容器。\n\n在测试微服务时，请持续观察清单 10-26 和 10-27\
    \ 中的日志窗口。\n"
- fmt: '### Accessing Kubernetes Deployments


    Let’s continue the testing, with respect to the information related to the Kubernetes
    services in Listing [10-23](#619782_1_En_10_Chapter.xhtml#PC25). You will first
    `cURL` from a terminal in the host machine to the URL that you tested in the previous
    section. See Listing [10-29](#619782_1_En_10_Chapter.xhtml#PC31).


    ```

    (base) binildass-MacBook-Pro:~ binil$ curl http://192.168.64.6:30503/productsweb

    [{"productId":"646ef0a55a32df351bf88d09","name":"Kamsung ...

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-29

    cURL with Minikube IP Based Address

    ```


    You will be able to access the Product Web microservice and retrieve information.


    Now try with the URL formed out of the Cluster IP, as shown in Listing [10-30](#619782_1_En_10_Chapter.xhtml#PC32).


    ```

    (base) binildass-MacBook-Pro:~ binil$ curl http://10.98.43.63:30503/productsweb

    curl: (7) Failed to connect to 10.109.140.135 port 30012: Connection refused

    (base) binildass-MacBook-Pro:~ binil$ curl http://10.98.43.63:8080/productsweb

    curl: (7) Failed to connect to 10.109.140.135 port 30012: Connection refused

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-30

    Accessing Product Web Using cURL with Cluster IP Based URL from Host

    ```


    Cluster IP provides access only inside the Kubernetes Cluster. Other apps inside
    your cluster can access, but there is no external access to the service, so the
    `cURL` command failed.


    Now try to access the service from within the Minikube host, as shown in Listing
    [10-31](#619782_1_En_10_Chapter.xhtml#PC33).


    ```

    (base) binildass-MacBook-Pro:~ binil$ minikube ssh

    _             _

    _         _ ( )           ( )

    ___ ___  (_)  ___  (_)| |/'')  _   _ | |_      __

    /'' _ ` _ `\| |/'' _ `\| || , <  ( ) ( )| ''_`\  /''__`\

    | ( ) ( ) || || ( ) || || |\`\ | (_) || |_) )(  ___/

    (_) (_) (_)(_)(_) (_)(_)(_) (_)`\___/''(_,__/''`\____)

    $ curl http:// 10.98.43.63:30503/productsweb

    curl: (7) Failed to connect to 10.109.140.135 port 30012 after 10 ms: Connection
    refused

    $ curl http:// 10.98.43.63:8080/productsweb

    [{"productId":"646ef0a55a32df351bf88d09","name":"Kamsung ...

    Listing 10-31

    Accessing Product Web Using cURL with Cluster IP Based URL from Inside Minikube

    ```


    From within the Minikube host, the command succeeded because Cluster IP provides
    access to other apps from inside the Kubernetes Cluster.


    Now try to access the Product Server microservice. You already provided a `NodePort`
    type for the service. You should therefore be able to access it from outside the
    Kubernetes cluster—that is, from the host machine. See Listing [10-32](#619782_1_En_10_Chapter.xhtml#PC34).


    ```

    (base) binildass-MacBook-Pro:~ binil$ curl http://192.168.64.6:30002/products

    [{"productId":"646ef0a55a32df351bf88d09","name":"Kamsung ...

    binildass-MacBook-Pro:~ binil$

    Listing 10-32

    Accessing Product Server Using cURL with Node Port IP Based URL from Host

    ```


    You can access the service since the cluster node opens a port on the node itself
    (hence the name `NodePort`) and redirects traffic received on that port to the
    respective service.


    You may delete a pod if you want. By deleting a pod, you’re instructing Kubernetes
    to terminate all the containers that are part of that pod. Listing [10-33](#619782_1_En_10_Chapter.xhtml#PC35)
    shows how to delete the Product Web pod.


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl delete po product-web-5dfc886d6d-8cl7t

    pod "product-web-5dfc886d6d-8cl7t" deleted

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-33

    Deleting a Kubernetes Pod

    ```


    Once the Product Web pod has been deleted, you can again list pods to see their
    statuses, as shown in Listing [10-34](#619782_1_En_10_Chapter.xhtml#PC36).


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl get pods

    NAME                            READY STATUS    RESTARTS AGE

    mongo-cluster-0                 1/1   Running   0        28m

    product-server-6fb88b6849-q2pfx 1/1   Running   0        28m

    product-web-5dfc886d6d-c2cps    1/1   Running   0        42s

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-34

    Listing the Kubernetes Pods Again

    ```


    Interestingly, you can see that the Product Web pod is not deleted. Truly speaking,
    it has been deleted, but then was re-created, since that is what you requested
    to Kubernetes when you mentioned the `replicas: 1` in `product-web-deployment.yml`
    in Listing [10-6](#619782_1_En_10_Chapter.xhtml#PC7). Note that pod has a new
    name, since it’s not a stateful set.


    Let’s now delete a stateful set and see what happens. See Listing [10-35](#619782_1_En_10_Chapter.xhtml#PC37).


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl delete po mongo-cluster-0

    pod "mongo-cluster-0" deleted

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-35

    Deleting a Kubernetes Stateful Set

    ```


    Once the Stateful set has been deleted, you can list the pods again to see their
    statuses (see Listing [10-36](#619782_1_En_10_Chapter.xhtml#PC38)).


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl get pods

    NAME                            READY STATUS    RESTARTS AGE

    mongo-cluster-0                 1/1   Running   0        3s

    product-server-6fb88b6849-q2pfx 1/1   Running   0        29m

    product-web-5dfc886d6d-c2cps    1/1   Running   0        116s

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-36

    Listing the Kubernetes Pods One More Time

    ```


    When you delete the stateful set, it will be re-created, since that is what you
    requested to Kubernetes when you mentioned `replicas: 1` in `mongo-deployment.yml`
    in Listing [10-10](#619782_1_En_10_Chapter.xhtml#PC11). The pod has been given
    the same name as before, since it’s a stateful set.


    From an ordinary command window in your host machine, you can experiment with
    running commands in your Product Web container. See Listing [10-37](#619782_1_En_10_Chapter.xhtml#PC39).


    ```

    (base) binildass-MacBook-Pro:ch10-01 binil$ kubectl exec -it product-web-5dfc886d6d-c2cps
    -- ps

    PID   USER     TIME  COMMAND

    1 root      0:17 java -jar /ecom.jar

    125 root      0:00 ps

    (base) binildass-MacBook-Pro:ch10-01 binil$ kubectl exec -it product-web-5dfc886d6d-c2cps
    -- ls

    bin       etc       media     proc      sbin      tmp

    dev       home      mnt       root      srv       usr

    ecom.jar  lib       opt       run       sys       var

    (base) binildass-MacBook-Pro:ch10-01 binil$

    Listing 10-37

    Running Commands from within the Kubernetes Container

    ```


    You can even use the Bourne Shell (or `sh`) to attach your shell console (in your
    host machine) to the shell in the running container, whereby you can interact
