- fmt: '### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch09\ch09-03` folder, as shown
    in Listing [9-20](#619782_1_En_9_Chapter.xhtml#PC26). Much of the source code
    in this example is similar to `ch03\ch03-01`, which was explained in detail in
    Chapter [3](#619782_1_En_3_Chapter.xhtml), in the section titled “Microservices
    Using PostgreSQL and RestTemplate.” In the section titled “CRUD Microservices
    over Kafka on PostgreSQL” in Chapter [6](#619782_1_En_6_Chapter.xhtml), you saw
    the code required for the Product Web microservice and the Product Server microservice
    to communicate with each other over the Kafka messaging channel, so those details
    are not covered again here. Further, you also saw the Docker Compose-based deployment
    of the topology of a major portion of Figure [9-3](#619782_1_En_9_Chapter.xhtml#Fig3)
    in the section titled “Composing Microservice with PostgreSQL Containers.” This
    section explores the Kafka container and its deployment with the other microservices
    using the Docker Compose tool.


    Listing [9-20](#619782_1_En_9_Chapter.xhtml#PC26) shows the source code organization
    for this example.


    ```

    ch09-03

    ├── 01-ProductServer

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── 02-ProductWeb

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── kafka-request-reply-util

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── README.txt

    ├── clean.sh

    ├── docker-compose.yml

    ├── makeandrun.sh

    ├── pom.xml

    ├── server.Dockerfile

    └── web.Dockerfile

    Listing 9-20

    Example 09-03 Source Code Organization

    ```


    A concise representation of the source code organization for the example inside
    the `ch09-03` folder is shown in Listing [9-20](#619782_1_En_9_Chapter.xhtml#PC26).
    `docker-compose.yml`, `server.Dockerfile`, and `web.Dockerfile` are all placed
    in the parent folder, and they are referred appropriately from the `docker-compose.yml`
    file in Listing [9-21](#619782_1_En_9_Chapter.xhtml#PC27).


    ```

    version: "3"

    services:

    zookeeper:

    image: bitnami/zookeeper:latest

    container_name: zookeeper

    ports:

    - ''2181:2181''

    networks:

    - ecom-network

    environment:

    - ALLOW_ANONYMOUS_LOGIN=yes

    kafka:

    image: bitnami/kafka:latest

    container_name: kafka

    ports:

    - ''9092:9092''

    networks:

    - ecom-network

    environment:

    - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181

    - ALLOW_PLAINTEXT_LISTENER=yes

    depends_on:

    - zookeeper

    db:

    image: "postgres:9.6-alpine"

    container_name: postgres-docker

    volumes:

    - product-data:/var/lib/postgresql/data

    ports:

    - 5432:5432

    environment:

    - POSTGRES_DB=productdb

    - POSTGRES_USER=postgres

    - POSTGRES_PASSWORD=postgre

    networks:

    - ecom-network

    server:

    build:

    context: .

    dockerfile: server.Dockerfile

    image: ecom/product-server

    container_name: product-server

    ports:

    - "8081:8081"

    depends_on:

    - "db"

    environment:

    - DB_SERVER=postgres-docker:5432

    - POSTGRES_DB=productdb

    - POSTGRES_USER=postgres

    - POSTGRES_PASSWORD=postgre

    - spring.kafka.bootstrap-servers=kafka:9092

    networks:

    - ecom-network

    web:

    build:

    context: .

    dockerfile: web.Dockerfile

    image: ecom/product-web

    container_name: product-web

    depends_on:

    - "server"

    ports:

    - "8080:8080"

    environment:

    - spring.kafka.bootstrap-servers=kafka:9092

    networks:

    - ecom-network

    volumes:

    product-data:

    networks:

    ecom-network:

    Listing 9-21

    The Docker Compose YAML File (ch09\ch09-03\docker-compose.yml)

    ```


    For the server and the web service, the build scripts `server.Dockerfile` and
    `web.Dockerfile` are referred from the current context of the `docker-compose.yml`,
    including the relative file paths, so Docker Compose will find these files appropriately
    during the build. The rest of the aspects of `db`, `web`, and `server` were explained
    in the first example in this chapter. `zookeeper` and `kafka` are the two new
    containers being configured here, and those configurations are self-explanatory.


    As explained earlier, relative to the current directory (where the `docker-compose.yml`
    is located), the Dockerfile called `server.Dockerfile` is found here:


    ```

    build:

    context: .

    dockerfile: server.Dockerfile

    ```


    You can now investigate this file, as shown in Listing [9-22](#619782_1_En_9_Chapter.xhtml#PC29).


    ```

    FROM maven:3.6.1-jdk-8-slim AS prebuild

    RUN mkdir -p /workspace

    WORKDIR /workspace

    COPY ./kafka-request-reply-util .

    RUN mvn clean install

    FROM maven:3.6.1-jdk-8-slim AS build

    COPY --from=prebuild /root/.m2 /root/.m2

    COPY ./01-ProductServer .

    RUN mvn clean package

    FROM openjdk:8-alpine

    COPY --from=build ./target/*.jar app.jar

    EXPOSE 8081

    ENTRYPOINT ["java","-jar","app.jar"]

    Listing 9-22

    The Dockerfile (ch09\ch09-03 \server.Dockerfile)

    ```


    This is a three-stage build. In the first stage, you build the `kafka-request-reply-util`,
    and in the second stage, you use that `.jar` dependency for the Maven build for
    the Product Server microservice. In the third stage, you use the `.jar` of the
    Product Server microservice to build the Docker image. This image is named based
    on the `docker-compose.yml` file in Listing [9-21](#619782_1_En_9_Chapter.xhtml#PC27),
    under the `server` service, and the respective container is run.


    A similar explanation holds true for the `web.Dockerfile` file of the Product
    Web microservice, so it’s not repeated here.'
