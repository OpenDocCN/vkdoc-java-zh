  trans: '

    产品服务器微服务无需被任何外部客户端访问，因此我省略了你在产品 Web 微服务的清单 10-7 中看到的 `LoadBalancer` 类型的服务定义。`ClusterIP`
    本来已经足够，但这里额外定义了一个 `NodePort`，其优势我将在“测试微服务”一节中解释。


    图 10-11 中的第三个组件是 MongoDB。清单 10-10 展示了 MongoDB 的 Pod 定义。


    ```

    apiVersion: apps/v1

    kind: StatefulSet

    metadata:

    name: mongo-cluster

    labels:

    app: mongo

    spec:

    replicas: 1

    serviceName: "mongo"

    selector:

    matchLabels:

    app: mongo

    template:

    metadata:

    labels:

    app: mongo

    annotations:

    sidecar.istio.io/inject: "false"

    spec:

    volumes:

    - name: data-db

    persistentVolumeClaim:

    claimName: mongo-data-db

    terminationGracePeriodSeconds: 10

    containers:

    - name: mongo

    image: mongo:4.2.24

    volumeMounts:

    - mountPath: /data/db

    name: data-db

    readOnly: false

    ports:

    - containerPort: 27017

    清单 10-10

    MongoDB 服务器的 Pod 定义 YAML 文件 (ch10\ch10-01\mongo-deployment.yml)

    ```


    此示例指定使用 `mongo:4.2.24` 作为创建 Pod 所基于的镜像。请注意，该 Pod 被定义为 `StatefulSet`。Mongo Pod
    必须管理 MongoDB 中的数据或状态，因此你需要一个有状态集。它还定义了一个 `persistentVolumeClaim`——`mongo-data-db`。下一节将介绍此
    PVC 的描述。


    ```

    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: mongo-data-db

    spec:

    storageClassName: manual

    accessModes:

    - ReadWriteOnce

    resources:

    requests:

    storage: 3Gi

    清单 10-11

    MongoDB 的持久卷声明定义 (ch10\ch10-01\mongo-volume-claim.yml)

    ```


    现在你创建 `PersistentVolumeClaim`。MongoDB Pod 使用 `PersistentVolumeClaim` 来请求物理存储。你请求至少
    3GB 的卷，以便它可以为至少一个节点提供读写访问。执行下一节中的脚本后，你可以检查 `PersistentVolumeClaim`，如清单 10-12 所示。


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl get pvc mongo-data-db

    NAME            STATUS   VOLUME          CAPACITY   ACCESS MODES   STORAGECLASS   AGE

    mongo-data-db   Bound    mongo-data-db   10Gi       RWO            manual         2m32s

    (base) binildass-MacBook-Pro:~ binil$

    清单 10-12

    列出持久卷声明的详细信息

    ```


    一旦你创建了 `PersistentVolumeClaim`，Kubernetes 控制平面就会寻找一个满足该声明要求的 `PersistentVolume`。参见清单
    10-13。


    ```

    apiVersion: v1

    kind: PersistentVolume

    metadata:

    name: mongo-data-db

    labels:

    type: local

    spec:

    storageClassName: manual

    capacity:

    storage: 10Gi

    accessModes:

    - ReadWriteOnce

    hostPath:

    path: "/home/docker/binil/mongodata"

    清单 10-13

    MongoDB 的持久卷定义 (ch10\ch10-01\mongo-volume.yml)

    ```


    这样，控制平面就能通过 `storageClassName` 找到具有相同存储类的这个 `PersistentVolume`，从而将声明绑定到该卷。执行下一节中的脚本后，你可以检查
    `PersistentVolume`，如清单 10-14 所示。


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl get pv mongo-data-db

    NAME          CAPACITY ACCESS MODES RECLAIM STATUS CLAIM         STORAGECLASS              AGE

    mongo-data-db 10Gi     RWO          Retain  Bound  mongo-data-db manual      44s

    (base) binildass-MacBook-Pro:~ binil$

    清单 10-14

    列出持久卷的详细信息

    ```


    就 Kubernetes 所知，`mongo-data-db` PV 只是某个位置的存储块，其生命周期独立于使用它的 Pod。因此，即使 Pod 消失——比如它崩溃了，或达到内存限制并因内存不足错误而被杀死——存储仍然存在，随时准备在
    MongoDB Pod 重新生成时被其使用。所以，无论 Pod 发生什么（某种程度上），这个持久卷都会持久存在，因为 `RECLAIM` 策略是 `Retain`，正如你在清单
    10-14 中看到的那样。当 PVC 被删除时，Kubernetes 将根据 PV 的 `RECLAIM` 策略来处理该 PV。


    最后剩下的方面是定义 MongoDB 服务，这在清单 10-15 中完成。


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: mongo

    spec:

    selector:

    app: mongo

    ports:

    - protocol: TCP

    port: 27017

    targetPort: 27017


    apiVersion: v1

    kind: Service

    metadata:

    name: mongo-nodeport

    spec:

    selector:

    app: mongo

    ports:

    - nodePort: 30001

    port: 27017

    targetPort: 27017

    type: NodePort

    清单 10-15

    MongoDB 服务的描述 (ch10\ch10-01\mongo-service.yml)

    ```


    与清单 10-9 中的产品服务器服务描述一样，`ClusterIP` 本来已经足够，但此示例额外定义了一个 `NodePort`，其优势我将在“测试微服务”一节中解释。

