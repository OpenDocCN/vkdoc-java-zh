    Listing [6-48](#619782_1_En_6_Chapter.xhtml#PC51) shows what is happening when
    the template is consulting the release strategy upon timeout. The first two lines
    correspond to when responses are received from the two instances of the `Product
    Web` microservice within the timeout limit. The third line corresponds to when
    the template does this with the timeout argument `set to true`, to tell the strategy
    it’s a timeout rather than a delivery call, so it will not wait for any more responses.


    This aggregated response is shown in Figure [6-6](#619782_1_En_6_Chapter.xhtml#Fig6).


    In real life, you may not statically configure `product.topic.reply.numProviders`,
    as is done in Listing [6-39](#619782_1_En_6_Chapter.xhtml#PC40). Instead, you
    have to dynamically form the value of `numProviders` based on the minimum number
    of service providers you expect until there’s a timeout. The typical production
    design is shown in Figure [6-7](#619782_1_En_6_Chapter.xhtml#Fig7), where the
    travel agent or travel aggregator has contracts with multiple air, hotel, cab,
    and other ancillary service providers. Travel search parameters are relayed to
    all or preferred inventory providers and the responses from all or many of these
    preferred providers are aggregated. Filtering, de-duplication, or any transformations
    can be applied and the result set sorted again, based on a similar set of rules
    and responses sent to the `Booking Service` provider Web microservice.


