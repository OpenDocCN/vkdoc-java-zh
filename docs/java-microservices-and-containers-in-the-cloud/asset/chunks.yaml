  trans: '

    ### 使用 Dockerfile 运行容器


    `ch08\ch08-04` 文件夹包含构建示例所需的 Maven 脚本。第一步，你需要启动 PostgreSQL 服务器。本例使用的 `Dockerfile`
    与前三个示例中的 `Dockerfile` 相同，如代码清单 8-5 所示。


    接下来，构建微服务和 Docker 镜像，然后运行容器。你将修改本章上一个示例中的脚本。代码清单 8-33 将这些命令组织成一个脚本。


    ```

    mvn -Dmaven.test.skip=true clean package

    docker build  --build-arg JAR_FILE=01-ProductServer/target/*.jar -t ecom/product-server
    .

    docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t ecom/product-web
    .

    docker network create ecom-network

    docker run -d --net=ecom-network --name postgres-docker -e POSTGRES_DB=productdb
    -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgre -p 5432:5432 -d postgres:15.3-alpine3.18

    docker run -d -p 8081:8081 --net=ecom-network --name product-server -e DB_SERVER=postgres-docker:5432
    -e POSTGRES_DB=productdb -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgre
    ecom/product-server

    docker run -d -p 8080:8080 --net=ecom-network --name product-web -e acme.PRODUCT_SERVICE_URL=http://product-server:8081/products
    ecom/product-web

    代码清单 8-33

    构建并运行微服务 Docker 容器的脚本 (ch08\ch08-04\makeandrun.sh)

    ```


    本节仅解释 PostgreSQL 服务器的 Docker Run 命令，因为其余命令已解释过。


    ```

    docker run -d --net=ecom-network --name postgres-docker -e POSTGRES_DB=productdb
    -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgre -p 5432:5432 -d postgres:9.6-alpine

    ```


    其作用如下：


    *   第一行从 Docker Hub 拉取 Postgres Docker 镜像。


    *   然后设置 `POSTGRES_DB`，这是一个可选的环境变量，用于为镜像启动时创建的默认数据库定义不同的名称。如果未指定，将使用 `POSTGRES_USER`
    的值。


    *   接着设置 `POSTGRES_USER`，这是一个可选的环境变量，与 `POSTGRES_PASSWORD` 结合使用，用于设置用户及其密码。此变量将创建具有超级用户权限的指定用户，以及一个同名的数据库（我已覆盖该名称）。如果未指定，将使用默认用户
    `postgres`。


    *   然后设置 `POSTGRES_PASSWORD`，这是使用 PostgreSQL 镜像所必需的环境变量。它不能为空或未定义。此环境变量设置 PostgreSQL
    的超级用户密码。默认超级用户由 `POSTGRES_USER` 环境变量定义。


    *   它将 Docker 容器命名为（`--name`）`postgres-docker`。


    *   它将容器的内部 `5432` 端口映射到外部 `5432` 端口，以便你可以从外部访问。


    *   然后它允许在后台运行 Docker 容器（`-d`）。


    如果你想使用 GUI 应用程序（如 pgAdmin、psql 等）进入数据库，现在应该可以做到了。


