- fmt: '### Centralized Computing


    Compared to minicomputers or personal computers, which are common and commoditized
    today, mainframes have more processing power. Early versions of mainframe computers
    had a large cabinet, called a `main frame`, which housed the central processing
    unit and main memory. Mainframe computers are characterized by interactive user
    terminals operating as timesharing computers, supporting hundreds of users simultaneously
    along with batch processing. Mainframes are used for business transaction processing,
    like airline reservation, banking, and so on. A transaction encompasses a set
    of operations including disk I/O, operating system calls, and other forms of data
    transfer from one subsystem to another, as shown in Figure [1-1](#619782_1_En_1_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig1_HTML.jpg)


    An architecture of a mainframe. The system is connected to terminals for user
    interaction. An airline mainframe has availability, booking, and inventory control.
    Data is stored in separate databases with service granularity and compute nodes.
    It defines the connectivity by a star network of nodes.


    Figure 1-1


    Centralized computing


    As depicted, mainframes are centralized computers operating in timesharing mode,
    supporting hundreds of users simultaneously along with batch processing. Users
    access mainframes through keyboard/typewriter terminals and specialized text terminal
    CRT displays with integral keyboards. `Green screen` is the common name for those
    monochrome monitors used for user access, since they traditionally used a green
    “P1” phosphor screen.^([¹](#fn1))


    Transaction processing or `batch processing` was offered as a service by the central
    mainframe system, so this architecture is best categorized under the `centralized
    computing paradigm`, where a central computer makes all the decisions regarding
    the successful completion of the business transaction, end to end.


    ### Distributed Computing


    Next came the `distributed computing` paradigm, where the different components
    of the compute system were located on different networked computers, and they
    communicated and coordinated their actions by passing messages to one another.
    While doing so, typically, one of the nodes or computers acted as a coordinator
    for the business transaction—it coordinated (or orchestrates) elementary computing
    components of the overall business transaction on different networked computers
    and decided on the success or failure of the transaction.


    Distributed computing comes in different variants. The major ones are listed here:


    - `Client–server`: In a client-server architecture, clients request and receives
    data from the servers and display it to the users. The client machine hosts most
    of the rules and validations required for the business logic to complete. Thick
    clients are characteristic of this architecture, and client-binary distribution
    is a hassle here.

    - `Three-tier`: A three-tier architectures move the client intelligence to a middle
    tier so that stateless and thin clients can be used. This simplifies application
    deployment to a single middleware server, and client binary distribution is zero
    or minimal. Most web applications are three-tier.

    - `n-tier`: An N-tier architecture, also known as a multi-tier architecture, is
    a software engineering design pattern that separates an application into logical
    layers and physical tiers. Each layer has a specific responsibility and functionality,
    and the tiers are usually separated by physical or logical boundaries, such as
    different servers, processes, or networks.

    - `Peer-to-peer`: In this architecture, there are no particular machines that
    provide a service or manage the network resources. Instead all responsibilities
    are uniformly divided among all the machines, known as peers. Each peer can serve
    as a client and as a server. Examples of this architecture include BitTorrent.
    The bitcoin network is also a kind of peer to peer, but bitcoin network fits more
    into another computing paradigm called `decentralized architecture`, which is
    explained shortly.

    - `Microservices`: Microservices are a kind of distributed architecture where
    functional units are identified as the basis for distribution. Because of that,
    more than one microservice is needed in many cases to complete a single business
    transaction. Microservices with additional design capabilities can be classified
    into another class of computing paradigm, called `decentralized`, which is discussed
    later in this chapter.


    Figure [1-2](#619782_1_En_1_Chapter.xhtml#Fig2) represents a distributed architecture.
    Here, the client, business, and database processes are separated by the network.


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig2_HTML.jpg)


    An illustration of a distinct pattern of network with nodes of service granularity
    and artifact packaging along with its distributed architecture. It has a browser
    with compute nodes responsible for availability, booking, or inventory control.
    Data is stored in separate databases for each process.


    Figure 1-2


    Distributed computing


    In Figure [1-2](#619782_1_En_1_Chapter.xhtml#Fig2), a single middle tier server
    is shown. This server is composed of a set of business modules:


    - `Availability`: A module that helps to plan a flight, during which a traveler
    can enter the travel dates and destinations and get a list of all available flights
    from different airlines, through what is called an Internet Booking Engine (IBE).
    The traveler can browse through this list, compare the prices, and then decide
    which one to book.

    - `Booking`: The booking module helps the traveler book a flight and create a
    Passenger Name Record (PNR) for travel in the shortlisted flight.

    - `Inventory`: When a booking is completed for seats in a flight, the seat inventory
    should be reduced in the Inventory module.


    In some cases, the middle tier server will also connect to other third-party systems
    like a Global Distribution System (GDS) such as Amadeus or Sabre, thus exhibiting
    the distributed computing paradigm in the truest sense. This is depicted in the
    distributed mesh notation in Figure [1-2](#619782_1_En_1_Chapter.xhtml#Fig2).'
  raw: '### Centralized Computing


    Compared to minicomputers or personal computers, which are common and commoditized
    today, mainframes have more processing power. Early versions of mainframe computers
    had a large cabinet, called a *main frame,* which housed the central processing
    unit and main memory. Mainframe computers are characterized by interactive user
    terminals operating as timesharing computers, supporting hundreds of users simultaneously
    along with batch processing. Mainframes are used for business transaction processing,
    like airline reservation, banking, and so on. A transaction encompasses a set
    of operations including disk I/O, operating system calls, and other forms of data
    transfer from one subsystem to another, as shown in Figure [1-1](#619782_1_En_1_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig1_HTML.jpg)


    An architecture of a mainframe. The system is connected to terminals for user
    interaction. An airline mainframe has availability, booking, and inventory control.
    Data is stored in separate databases with service granularity and compute nodes.
    It defines the connectivity by a star network of nodes.


    Figure 1-1


    Centralized computing


    As depicted, mainframes are centralized computers operating in timesharing mode,
    supporting hundreds of users simultaneously along with batch processing. Users
    access mainframes through keyboard/typewriter terminals and specialized text terminal
    CRT displays with integral keyboards. *Green screen* is the common name for those
    monochrome monitors used for user access, since they traditionally used a green
    “P1” phosphor screen.^([¹](#fn1))


    Transaction processing or *batch processing* was offered as a service by the central
    mainframe system, so this architecture is best categorized under the *centralized
    computing paradigm*, where a central computer makes all the decisions regarding
    the successful completion of the business transaction, end to end.


    ### Distributed Computing


    Next came the *distributed computing* paradigm, where the different components
    of the compute system were located on different networked computers, and they
    communicated and coordinated their actions by passing messages to one another.
    While doing so, typically, one of the nodes or computers acted as a coordinator
    for the business transaction—it coordinated (or orchestrates) elementary computing
    components of the overall business transaction on different networked computers
    and decided on the success or failure of the transaction.


    Distributed computing comes in different variants. The major ones are listed here:


    *   *Client–server*: In a client-server architecture, clients request and receives
    data from the servers and display it to the users. The client machine hosts most
    of the rules and validations required for the business logic to complete. Thick
    clients are characteristic of this architecture, and client-binary distribution
    is a hassle here


    *   *Three-tier*: A three-tier architectures move the client intelligence to a
    middle tier so that stateless and thin clients can be used. This simplifies application
    deployment to a single middleware server, and client binary distribution is zero
    or minimal. Most web applications are three-tier.


    *   *n-tier*: An N-tier architecture, also known as a multi-tier architecture,
    is a software engineering design pattern that separates an application into logical
    layers and physical tiers. Each layer has a specific responsibility and functionality,
    and the tiers are usually separated by physical or logical boundaries, such as
    different servers, processes, or networks.


    *   *Peer-to-peer*: In this architecture, there are no particular machines that
    provide a service or manage the network resources. Instead all responsibilities
    are uniformly divided among all the machines, known as peers. Each peer can serve
    as a client and as a server. Examples of this architecture include BitTorrent.
    The bitcoin network is also a kind of peer to peer, but bitcoin network fits more
    into another computing paradigm called *decentralized architecture,* which is
    explained shortly.


    *   *Microservices*: Microservices are a kind of distributed architecture where
    functional units are identified as the basis for distribution. Because of that,
    more than one microservice is needed in many cases to complete a single business
    transaction. Microservices with additional design capabilities can be classified
    into another class of computing paradigm, called *decentralized*, which is discussed
    later in this chapter.


    Figure [1-2](#619782_1_En_1_Chapter.xhtml#Fig2) represents a distributed architecture.
    Here, the client, business, and database processes are separated by the network.


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig2_HTML.jpg)


    An illustration of a distinct pattern of network with nodes of service granularity
    and artifact packaging along with its distributed architecture. It has a browser
    with compute nodes responsible for availability, booking, or inventory control.
    Data is stored in separate databases for each process.


    Figure 1-2


    Distributed computing


    In Figure [1-2](#619782_1_En_1_Chapter.xhtml#Fig2), a single middle tier server
    is shown. This server is composed of a set of business modules:


    *   *Availability*: A module that helps to plan a flight, during which a traveler
    can enter the travel dates and destinations and get a list of all available flights
    from different airlines, through what is called an Internet Booking Engine (IBE).
    The traveler can browse through this list, compare the prices, and then decide
    which one to book.


    *   *Booking*: The booking module helps the traveler book a flight and create
    a Passenger Name Record (PNR) for travel in the shortlisted flight.


    *   *Inventory*: When a booking is completed for seats in a flight, the seat inventory
    should be reduced in the Inventory module.


    In some cases, the middle tier server will also connect to other third-party systems
    like a Global Distribution System (GDS) such as Amadeus or Sabre, thus exhibiting
    the distributed computing paradigm in the truest sense. This is depicted in the
    distributed mesh notation in Figure [1-2](#619782_1_En_1_Chapter.xhtml#Fig2).'
  trans: '

    ### 集中式计算


    与如今常见且商品化的小型计算机或个人计算机相比，大型机拥有更强大的处理能力。早期版本的大型计算机有一个被称为*主机柜*的大型机箱，其中容纳了中央处理器和主存储器。大型计算机的特点是作为分时计算机运行的交互式用户终端，同时支持数百名用户和批处理。大型机用于商业事务处理，例如航空预订、银行业务等。一个事务包含一系列操作，包括磁盘
    I/O、操作系统调用以及其他形式的数据从一个子系统到另一个子系统的传输，如图 1-1 所示。


    ![](img/619782_1_En_1_Fig1_HTML.jpg)


    大型机的架构。系统连接到终端以供用户交互。航空大型机具有可用性、预订和库存控制功能。数据存储在具有服务粒度和计算节点的独立数据库中。它通过星形节点网络定义了连接方式。


    图 1-1


    集中式计算


    如图所示，大型机是以分时模式运行的集中式计算机，同时支持数百名用户和批处理。用户通过键盘/打字机终端以及带有集成键盘的专用文本终端 CRT 显示器来访问大型机。*绿屏*是用于用户访问的单色显示器的通用名称，因为它们传统上使用绿色的“P1”荧光屏。^(¹)


    事务处理或*批处理*是由中央大型机系统作为服务提供的，因此这种架构最好归类于*集中式计算范式*，其中中央计算机从头到尾做出关于业务事务成功完成的所有决策。


    ### 分布式计算


    接下来是*分布式计算*范式，其中计算系统的不同组件位于不同的联网计算机上，它们通过相互传递消息来进行通信和协调行动。在此过程中，通常有一个节点或计算机充当业务事务的协调者——它协调（或编排）不同联网计算机上整个业务事务的基本计算组件，并决定事务的成功或失败。


    分布式计算有多种变体。主要列举如下：


    *   *客户端-服务器*：在客户端-服务器架构中，客户端从服务器请求和接收数据，并将其显示给用户。客户端机器托管了完成业务逻辑所需的大部分规则和验证。胖客户端是这种架构的特征，而客户端二进制文件的分发在此是一个麻烦事。


    *   *三层架构*：三层架构将客户端智能迁移到中间层，以便可以使用无状态和瘦客户端。这简化了应用程序到单个中间件服务器的部署，并且客户端二进制文件的分发为零或最小化。大多数
    Web 应用程序都是三层架构。


    *   *N 层架构*：N 层架构，也称为多层架构，是一种软件工程设计模式，它将应用程序分离为逻辑层和物理层。每一层都有特定的职责和功能，并且各层通常由物理或逻辑边界（例如不同的服务器、进程或网络）分隔。


    *   *点对点*：在这种架构中，没有特定的机器提供服务或管理网络资源。相反，所有职责均匀地分配给所有机器，称为对等点。每个对等点既可以充当客户端，也可以充当服务器。这种架构的例子包括
    BitTorrent。比特币网络也是一种点对点网络，但比特币网络更符合另一种称为*去中心化架构*的计算范式，稍后将对此进行解释。


    *   *微服务*：微服务是一种分布式架构，其中功能单元被识别为分布的基础。因此，在许多情况下，需要多个微服务才能完成单个业务事务。具有额外设计能力的微服务可以归类为另一种计算范式，称为*去中心化*，本章稍后将对此进行讨论。


    图 1-2 展示了一种分布式架构。在这里，客户端、业务和数据库进程通过网络分隔开来。


    ![](img/619782_1_En_1_Fig2_HTML.jpg)


    一种具有服务粒度和工件打包的节点网络及其分布式架构的独特模式示意图。它有一个浏览器，其计算节点负责可用性、预订或库存控制。数据为每个进程存储在单独的数据库中。


    图 1-2


    分布式计算


    在图 1-2 中，显示了一个单一的中间层服务器。该服务器由一组业务模块组成：


    *   *可用性*：一个帮助规划航班的模块，旅客可以在此输入旅行日期和目的地，并通过所谓的互联网预订引擎（IBE）获取来自不同航空公司的所有可用航班列表。旅客可以浏览此列表，比较价格，然后决定预订哪一个。


    *   *预订*：预订模块帮助旅客预订航班，并为入围航班上的旅行创建旅客姓名记录（PNR）。


    *   *库存*：当航班座位预订完成时，库存模块中的座位库存应相应减少。


    在某些情况下，中间层服务器还会连接到其他第三方系统，例如 Amadeus 或 Sabre 等全球分销系统（GDS），从而真正体现了分布式计算范式。这在图 1-2
    的分布式网状表示中有所描绘。

    '
- fmt: '### Decentralized Computing


    In decentralized computing, application services are carried out by individual
    computing devices or nodes on a distributed network, with no central location.
    This approach to software development (and distribution) affords developers great
    flexibility and savings, since they don’t have to create a central control point.
    `Bitcoin`, `Ethereum`, and `Uniswap` are a few protocols that use decentralized
    computing.


    Figure [1-3](#619782_1_En_1_Chapter.xhtml#Fig3) depicts a microservices architecture,
    which is obviously distributed. Different components of the end-to-end business
    transactions could also be spread across different components, so in a way this
    is decentralized.


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig3_HTML.jpg)


    An illustration of a network with nodes connected in star-like branches with service
    granularity and artifact packaging along with its distributed and decentralized
    architecture. It has compute nodes responsible for availability, booking, or inventory
    control. The system is connected to mobile apps.


    **Figure 1-3** Decentralized computing


    I do not discuss the intricacies of why Figure [1-3](#619782_1_En_1_Chapter.xhtml#Fig3)
    depicts a microservices architecture, since I assume readers are familiar with
    those basics. Here are a few of the characteristics of this architecture:


    - **Distributed**: The business application is divided and distributed based on
    functionality (airline shopping, booking, and inventory management are the functionalities).

    - **Independent**: Each of the microservices can be developed and deployed independent
    of the others (provided you maintain API compatibility for inter-microservices
    communication).

    - **Availability**: If one of the microservices is not running, users can still
    get functionality from the application through other microservices that are running
    (if Booking is down, a user can still do some shopping).


    Thus, in a way, a microservices architecture with the appropriate design primitives
    can also function as a decentralized application (even though the nomenclature
    of decentralized is more applicable to applications involving blockchains).


    ## Eventually Consistent Software Systems


    It’s important to understand the distributed nature of services in a microservices
    style of architecture. This section explains what this is and how it’s different
    from other more familiar counterpart architectures.


    ### Atomic Consistency


    Figure [1-4](#619782_1_En_1_Chapter.xhtml#Fig4) is the distributed architecture
    shown in Figure [1-2](#619782_1_En_1_Chapter.xhtml#Fig2), but here a user is booking
    a flight.


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig4_HTML.jpg)


    An architecture of ACID transactions. The user accesses the browser which comprises
    compute nodes for availability, booking, inventory control, services, and ORM.
    Data is stored in separate databases for each process with service granularity
    and artifact packaging.


    **Figure 1-4** ACID transactions


    Referring to Figure [1-4](#619782_1_En_1_Chapter.xhtml#Fig4), a typical flight
    booking business transaction happens like this:


    1. The browser sends the user transaction to the business tier server.

    2. Since the transaction is a flight booking, it is intercepted by the Booking
    module. Before you perform the booking, the booking module sends an update inventory
    request to the Inventory module to reduce the seat inventory, after starting an
    ACID^([²](#fn2)) transaction.

    3. Within the previously started ACID transaction, the Inventory module updates
    the inventory database table.

    4. If the inventory update is successful, the booking module will create a booking
    in its database table, within the same transaction context.


    If the booking and the inventory tables are in the same database, and if the booking
    and the inventory components are two modules in the same middle tier server, the
    transaction is a local transaction. That means the two table updates will either
    be successful or rolled back in an atomic (ACID) manner.


    ### Eventual Consistency


    This section considers the same flight booking scenario in a microservices architecture,
    where the processing is distributed. See Figure [1-5](#619782_1_En_1_Chapter.xhtml#Fig5).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig5_HTML.jpg)


    A distributed and decentralized architecture with service granularity and artifact
    packaging. It includes multiple compute nodes for availability, booking, or inventory
    control. Data is stored in separate databases for each process. It is connected
    to a mobile app for user interaction.


    **Figure 1-5** Inter-microservice transactions


    The same flight booking business transaction scenario now happens like this:


    1. The Booking app will send the user transaction to the business tier server.

    2. Since the transaction is booking a flight, it is intercepted by the booking
    microservice. Before you perform the booking, the booking microservice sends an
    update inventory request to the inventory microservice to reduce the seat inventory.
    However, you can’t start a global transaction and send the update inventory request
    in the same global transaction. This is because the update inventory request is
    typically a synchronous REST invocation, and distributed transactions across microservices
    are not encouraged. Without a distributed transaction context, a success or a
    failure for the update inventory request is received by the booking microservice.

    3. The Inventory module updates the inventory database table and sends a success
    or a failure.

    4. If the inventory update is successful, the booking microservices will create
    a booking in its database table and send back a success message to the end user.


    Here, there is a catch. If by chance the attempt to update the inventory database
    table is successful, but the booking microservices fails to create a booking in
    the booking database table, there is an issue in the consistency in data across
    these two tables. You need manual intervention to correct this and bring these
    two microservices back to eventually consistent.'
