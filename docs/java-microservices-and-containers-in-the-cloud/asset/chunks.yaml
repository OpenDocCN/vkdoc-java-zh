    ## Microservices Using MongoDB and CrudRepository


    This example tweaks the first example of microservices you saw in Chapter [2](#619782_1_En_2_Chapter.xhtml)
    to connect to a MongoDB, using the `CrudRepository` instead of the `MongoRepository`.
    You have the same two microservices—a consumer and a provider microservice—communicating
    with each other using the REST protocol. The provider microservice also interacts
    with a MongoDB. Refer to Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter
    [2](#619782_1_En_2_Chapter.xhtml) for the overall design.


    ### Hexagonal Architecture Revisited


    I reused the hexagonal microservice view shown in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1)
    in Chapter [2](#619782_1_En_2_Chapter.xhtml). However, you will be using `CrudRepository`
    instead of `MongoRepository`. I want to demonstrate how a generic port (the driven
    port with `CrudRepository` in this case) can be “adapted using suitable adaptors”
    to connect to different kinds of databases—more specifically to a MongoDB database
    in this example.


    Further, I introduced the `ProductOR` entity in the last example. The reason for
    this is that I want to demonstrate that while using the ports and adapters architecture,
    you can reuse the core entities and business services to the maximum. In other
    words, I want to demonstrate that you will retain and reuse a `Product` entity
    from the last example in this example too, which will assert the capability to
    plug in different driven adapters at runtime.'
