    (base) binildass-MacBook-Pro:ch07-02 binil$

    Listing 9-17

    Finding Minikube IP

    ```


    You can now access the Product Web microservice using a browser with the URL formed
    with the Minikube IP.


    `http://192.168.64.5:8080/product.html`


    Refer to the section titled “Test the Microservice Using UI” in Chapter [1](#619782_1_En_1_Chapter.xhtml)
    to test the Product Web microservice container.


    While you test the microservices, keep watching the log windows. To determine
    the container IDs and keep watching the log windows, refer to Chapter [8](#619782_1_En_8_Chapter.xhtml).


    Once you complete testing the microservices, you can then stop and remove the
    microservice containers and clean the environment. To stop the containers you
    need to use this command:


    ```

    docker-compose down

    ```


    It’s included in the script in Listing [9-18](#619782_1_En_9_Chapter.xhtml#PC24).


    ```

    docker-compose down

    docker rmi -f ecom/product-web

    docker rmi -f ecom/product-server

    Listing 9-18

    The Script to Bring Down Microservices Docker Containers (ch09\ch09-02\clean.sh)

    ```


    You can execute this script to stop and remove the microservice containers and
    clean the environment, as shown in Listing [9-19](#619782_1_En_9_Chapter.xhtml#PC25).


    ```

    (base) binildass-MacBook-Pro:ch09-02 binil$ sh clean.sh

    [+] Running 3/3

    [+] Running 4/4oduct-web         Removed

    ⠿ Container product-web         Removed

    ⠿ Container product-server      Removed

    ⠿ Container mongo               Removed

    ⠿ Network ch09-02_ecom-network  Removed

    Untagged: ecom/product-web:latest

    Deleted: sha256:dc88e223b86907868d6e9ed2bd9837295b26afed551f37f...

    Untagged: ecom/product-server:latest

    Deleted: sha256:d1ec2ce63b03cb6df7eaeee522fe271c0ac24d76b8f47be...

    (base) binildass-MacBook-Pro:ch09-02 binil$

    Listing 9-19

    Stopping Microservice Containers and Cleaning the Environment

    ```


    This completes the example.


    At this point, you have seen two examples using Docker Compose. These are real
    improvements over similar examples in Chapter [8](#619782_1_En_8_Chapter.xhtml)
    in terms of management of containers.


    Having added this improvisation into your toolkit, it’s time now to investigate
    more complex scenarios including more containers. In the next section, you add
    the Kafka broker to the container composition.


    ## Composing Microservice with PostgreSQL and Kafka


    In Chapter [8](#619782_1_En_8_Chapter.xhtml), in the section titled “Microservice
    and PostgreSQL in Container,” you saw a full-fledged microservice example interaction
    with a PostgreSQL database, all in Docker containers. This section shows you how
    to modify that example so those containers can talk to each other using a messaging
    middleware, Kafka. You will also make the changes required to fully deploy all
    services within a container infrastructure using Docker Compose.


    ### Composing the Container Topology


    For the current design, you need a complete container-based deployment topology,
    as shown in Figure [9-3](#619782_1_En_9_Chapter.xhtml#Fig3). The Product Web and
    Product Server microservices are containerized, and the Product Server microservice
    will connect to a PostgreSQL database, again deployed within a container. All
    communications between the Product Web microservice and the Product Server microservice
    are through Kafka.


    ![](images/619782_1_En_9_Chapter/619782_1_En_9_Fig3_HTML.jpg)


    A diagram illustrates the microservice containers. It includes products web mu
    S, product server mu S, container engine, host O S, and hardware.


    Figure 9-3


    Composing microservice containers


    Here, the Product Web and Product Server containers provide business services,
    whereas the Mongo container provides application services for persisting state.
    Kafka containers provide infrastructure services, so they are not shown as part
    of any specific (business) microservice.'
