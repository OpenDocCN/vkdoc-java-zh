- fmt: '### Pods


    `Pods` are the smallest deployable unit in `Kubernetes`. A `pod` will contain
    a container but can run multiple containers (meaning multiple applications) within
    it too. A `pod` is a wrapper on top of one or more running containers. Using `pods`,
    `Kubernetes` controls, monitors, and operates the containers.


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig3_HTML.jpg)


    A diagram illustrates the `Kubernetes` deployment resource. `Deployment` consists
    of a `ReplicaSet`, which manages a set of `pods`. Each `pod` contains one or more
    containers. A volume can be shared among containers within a `pod`. `Deployments`
    provide mechanisms for updates, rollbacks, and self-healing.


    **Figure 10-3** Kubernetes deployment


    Containers in a `pod` run on a “logical host,” since they lie in the same node
    (i.e., they use the same network namespace and the same `IPC` namespace). They
    can also use shared volumes, as depicted in Figure [10-3](#619782_1_En_10_Chapter.xhtml#Fig3).


    When an application requires more than one container running on the same host,
    and when those containers need to efficiently communicate ensuring data locality,
    they can be in the same `pod`. This provides process isolation; it’s easier to
    troubleshoot the container because logs from different processes are not mixed.


    ### ReplicaSets


    `Kubernetes` allows you to imperatively or declaratively define and create a `ReplicaSet`.
    A `ReplicaSet` is a set of replicas (`pods`) maintained with their revision history.
    A `ReplicaSet`’s job is to constantly monitor the list of running `pods` and make
    sure the running number of `pods` of a certain specification always match the
    desired number. Thus, a `ReplicaSet` is used to define and manage a collection
    of identical `pods` that are running on different cluster nodes. A `ReplicaSet`
    defines which container images are used by the containers running inside a `pod`
    and how many instances of the `pod` will run in the cluster, among other things.


    ### Deployment


    `Deployment` is a higher-level resource meant for deploying applications and updating
    them declaratively. When you create a `Deployment`, one or more `ReplicaSet` resources
    are created underneath. When using a `Deployment`, the actual `pods` are created
    and managed by the `Deployment`’s `ReplicaSets`, not by the `Deployment` directly.
    See Figure [10-4](#619782_1_En_10_Chapter.xhtml#Fig4).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig4_HTML.jpg)


    A tree diagram illustrates `Kubernetes` deployment resources. A `deployment` consists
    of multiple `replica sets`, each of which manages a set of `pods`. Each `pod`
    has a container. `Pods` are scheduled to run on nodes.


    **Figure 10-4** Kubernetes deployment across nodes


    ## Accessing Kubernetes Services


    Having looked at the deployment schema adopted with `Kubernetes`, this section
    looks at the access mechanism for accessing the workloads deployed in `Kubernetes`.


    ### Accessing Kubernetes Deployments


    In `Kubernetes`, `pods` are created and destroyed to match the desired state of
    your cluster, as specified in your deployment descriptor. `Pods` are temporary
    resources. When you use a `Deployment` to run your `Kubernetes` application, it
    can create and destroy `pods` on the fly. When `pods` are created, each `pod`
    gets its own `IP` address. When you use a `Deployment`, the set of `pods` running
    in one moment in time can be different than the set of `pods` running the same
    application a moment later.


    Upon creation, `pods` are assigned an `IP` address. These `IP` addresses are visible
    in the cluster, which allows access from within the cluster. Other `pods` in the
    cluster can access that `IP` address and inter-pod communication can happen. When
    a `pod` dies, a new `pod` will be created that comes into service with a new `IP`
    address and anything trying to communicate with the dead `pod` somehow needs to
    know about this new address. `Kubernetes` provides a “service,” which is an abstract
    way to expose an application running on a set of `pods` as a network service.


    ### Kubernetes Service


    The `pods` you saw earlier from the `Deployment` object can be killed or scaled
    up and down, so you can’t rely on their `IP` addresses because they are not persistent.
    Once a `pod` is defined, it will exhibit the following essential but not so straight
    characteristics:


    *   **Pods are ephemeral**: `Pods` are like “tellers in a bank” in the sense that
    you are not served by the same teller (person) every time. Similarly `pods` can
    come and go. During scale up or scale down, `pods` may come and go, and if a crash
    occurs, `pods` might go and may be re-created.


    *   **Post create IP**: `Kubernetes` assigns an `IP` address to a `pod` after
    the `pod` has been scheduled and started. So clients can’t know the `IP` address
    of the `pod` upfront.


    *   **Dynamic IP list**: Scaling out means more than one `pod` of the same type
    may provide the same service. Each of these (dynamic) `pods` has its own `IP`
    address and it may not be practical for clients to bind to a dynamic list of `IPs`
    easily. Rather, all these `pods` should be accessible through a single address.


    To solve these problems, a service gives those `pods` a stable `IP`. In a more
    general sense, a *service* is an abstraction that defines a logical set of `pods`
    and a policy by which you have access to them. When a service is created, it publishes
    its own virtual address as an environment variable to every `pod`. Services not
    only abstract access to `pods`, but they can also abstract access to `DBs`, external
    hosts, or even other services. A `Kubernetes` service is a resource you create
    to make a single, stable entry point to a group of `pods` providing the same service.
    Each service is an `IP` address and port combination that don’t change during
    the lifetime of the service. As shown in Figure [10-5](#619782_1_En_10_Chapter.xhtml#Fig5),
    a `Kubernetes` service can be backed by a single `pod` or many replicas of the
    same `pod`. External clients can reach any of the `pods` of the same service by
    a single service name. Similarly, a frontend `pod` or, for that matter a frontend
    service, can also reach any of the `pods` of the same backend service by a single
    service name. Figure [10-5](#619782_1_En_10_Chapter.xhtml#Fig5) shows two services—`product-web`
    and `product-server`.


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig5_HTML.jpg)


    A diagram illustrates an architecture for an e-commerce product web service. A
    user interacts with a browser, which sends requests to a product web microservice
    which consists of multiple `product-web` `pods` that communicate with a product
    server microservice with multiple `product-server` `pods`.


    **Figure 10-5** Kubernetes services


    Here, the browser or the client device should know the service (name) of the frontend
    microservice—the Product Web microservice. In a similar manner, the frontend microservice
    should know the service (name) of the backend microservice—the Product Server
    microservice.


    ## Traffic Routing to Kubernetes


    There are different ways to get external traffic into your `Kubernetes` cluster.
    This section looks at how each of them works.'
