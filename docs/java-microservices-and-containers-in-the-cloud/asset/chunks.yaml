    mu S、product server mu S 和硬件。


    图 9-4


    编排微服务容器


    这里，Product Web 和 Product Server 容器提供业务服务，而 Mongo 容器提供用于持久化状态的应用程序服务。Kafka 容器提供基础设施服务，因此它们不作为任何特定（业务）微服务的一部分显示。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
    `ch09\ch09-04` 文件夹内，代码结构如清单 9-20 所示。本示例中的大部分源代码与 `ch03\ch03-02` 类似，后者已在第 3 章的“使用
    MongoDB 和 CrudRepository 的微服务”一节中详细解释过。在第 6 章的“基于 MongoDB 的 Kafka 上的 CRUD 微服务”一节中，你已经看到了
    Product Web 和 Product Server 微服务通过 Kafka 消息通道相互通信所需的代码，因此这里不再重复这些细节。此外，在第 6 章的“使用
    MongoDB 容器编排微服务”一节中，你已经看到了基于 Docker Compose 部署图 9-4 主要部分拓扑的内容。


    `docker-compose.yml` 文件的大部分内容与清单 9-21 所示类似。清单 9-32 仅显示了变更部分。


    ```

    version: "3"

    services:

    ...

    db:

    image: mongo:3.6

    container_name: mongo

    ports:

    - "27017:27017"

    networks:

    - ecom-network

    ...

    清单 9-32

    Docker Compose YAML 文件 (ch09\ch09-04\docker-compose.yml)

    ```


    实际上，本例中清单 9-32 的 MongoDB 配置变得更简单了。


    微服务的 Dockerfile 与之前清单 9-22 中的示例类似。它同样被配置为三阶段构建。

