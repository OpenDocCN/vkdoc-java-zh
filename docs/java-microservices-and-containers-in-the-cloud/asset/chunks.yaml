    \ Registry`有助于在不同开发环境和运行时之间轻松共享`Docker`镜像。一旦构建了镜像，您可以在构建它的计算机上运行它，也可以将镜像推送（上传）到注册表，然后拉取（下载）到同一台计算机或另一台计算机上运行。\n\
    \n![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig13_HTML.jpg)\n\n从开发者网络到生产环境的`Docker`镜像流程图。开发者网络从互联网云中的`Docker`公共注册表和`Docker`私有注册表拉取和推送镜像。开发机、预发布环境和生产环境从`Docker`私有注册表拉取镜像。\n\
    \n**图 7-13**  \n**Docker Registry**\n\n`Docker Hub`是公共注册表的一个例子。私有注册表可以通过多种方式设置，例如在`JFrog\
    \ Bintray`上设置私有`Docker Registry`。还有远程仓库，它们充当远程站点（如`Docker Hub`或`JFrog Bintray`）管理的`Docker\
    \ Registry`的缓存代理。镜像根据控制缓存和代理行为的各种配置参数，在远程`Docker Registry`中存储和更新。\n\n像`JFrog Artifactory`这样的开发环境工具可以充当开发机器和远程`Docker\
    \ Registry`之间的中介。由于它们完全实现了`Docker Registry API`规范，因此它们可以充当任何公共或私有`Docker Registry`（如`Docker\
    \ Hub`、`JFrog Bintray`或其他私有`Docker Registry`）的代理。当开发机器首次请求镜像时，镜像会被下载，同时`Artifactory`可以将其存储在本地缓存中。在收到后续对该镜像的请求时，`Artifactory`会对其进行智能校验和搜索，如果镜像已下载并存在于本地缓存中，则提供本地缓存的副本。这样，每个镜像只下载一次，并且组织内的所有其他开发人员都可以在本地使用。这不仅减少了网络流量，还能有效屏蔽网络和其他远程`Docker\
    \ Registry`的问题，从而为您提供对（远程）`Docker`镜像的一致、可靠且持续的访问。\n\n## Hello World Tomcat in\
    \ Docker\n\n我相信您已经阅读了足够多的理论，因此本节将通过实践帮助您学习。在本节中，您将学习运行一个“Docker Hello World”程序。\n\
    \n我假设您的宿主机上已经运行了`Docker Daemon`。如果没有，请参考附录E在您的Mac机器上（无需`Docker Desktop`）设置`Docker\
    \ Daemon`。如果您机器上的任何操作系统安装了`Docker Desktop`，那也可以。\n\n### Run Tomcat Container\n\
    \n第一步是启动`Minikube`单节点`Kubernetes`集群，以便启动`Docker Daemon`（见清单[7-1](#619782_1_En_7_Chapter.xhtml#PC1)）。有关容器命令的快速参考，请参阅附录E。\n\
    \n```\n(base) binildass-MacBook-Pro:~ binil$ pwd\n/Users/binil\n(base) binildass-MacBook-Pro:~\
    \ binil$ minikube start\nminikube v1.25.2 on Darwin 12.4\n...\nDone! kubectl is\
    \ now configured to use \"minikube\" cluster and \"default\" namespace by default\n\
    (base) binildass-MacBook-Pro:~ binil$\nListing 7-1\nStarting Minikube\n```\n\n\
    接下来，在工作终端中设置`Minikube`环境变量，如清单[7-2](#619782_1_En_7_Chapter.xhtml#PC2)所示。\n\n```\n\
    (base) binildass-MacBook-Pro:~ binil$ eval $(minikube docker-env)\n(base) binildass-MacBook-Pro:~\
    \ binil$\nListing 7-2\nSetting Minikube Environment in Terminal\n```\n\n这将`Docker`客户端指向`Minikube`的`Docker`环境，因为您正在使用`Minikube`虚拟机中的`Docker\
    \ Daemon`。本书中的大多数`Docker`示例都使用此设置。`minikube docker-env`命令返回一组`Bash`环境变量导出，用于配置本地宿主机环境以重用`Minikube`实例内的`Docker\
    \ Daemon`。通过`eval`传递此输出会使`bash`评估这些导出的变量并使它们生效。这将使用`Minikube`的`Docker`实例构建`Docker`镜像，然后将镜像推送到`Minikube`的`Docker\
    \ Registry`。它还会在`Minikube`中设置您的部署以使用此镜像。因此，这些变量将帮助您的`Docker CLI`（您在其中编写`Docker`命令）与`Minikube`创建的虚拟机中的`Docker\
    \ Daemon`建立连接。\n\n相反，如果您使用的是`Docker Desktop`或类似安装中的`Docker Daemon`，则无需设置此环境配置。\n\
    \n要列出系统上所有正在运行或已停止的容器，请执行清单[7-3](#619782_1_En_7_Chapter.xhtml#PC3)中所示的`docker\
    \ ps`命令。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ docker ps\nCONTAINER ID\
