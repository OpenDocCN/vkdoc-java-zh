    ### 使用 Docker Compose 运行容器


    `ch09\ch09-02` 文件夹包含构建和运行示例所需的脚本。第一步是启动一个 Minikube 单节点 Kubernetes 集群，以便启动 Docker
    守护进程。有关容器命令的快速参考，请参阅附录 E。


    假设 Minikube 单节点 Kubernetes 集群已启动并正在运行，下一步需要为你在清单 9-14 的 `docker-compose.yml` 中配置的
    Mongo 数据创建这个新文件夹。此操作在清单 9-15 中完成。


    ```

    (base) binildass-MacBook-Pro:mongodata binil$ minikube ssh

    _             _

    _         _ ( )           ( )

    ___ ___  (_)  ___  (_)| |/'')  _   _ | |_      __

    /'' _ ` _ `\| |/'' _ `\| || , <  ( ) ( )| ''_`\  /''__`\

    | ( ) ( ) || || ( ) || || |\`\ | (_) || |_) )(  ___/

    (_) (_) (_)(_)(_) (_)(_)(_) (_)`\___/''(_,__/''`\____)

    $ pwd

