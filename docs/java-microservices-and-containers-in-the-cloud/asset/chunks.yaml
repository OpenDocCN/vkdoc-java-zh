    can add new products, edit existing ones, or delete them. It lists kamsung D 3,
    lokia pomia, and mapple k phone under the name.


    **Figure 1-21** Listing the updated product


    The changes made to the product are listed in the refreshed screen, as shown in
    Figure [1-21](#619782_1_En_1_Chapter.xhtml#Fig21).


