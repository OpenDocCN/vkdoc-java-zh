    ## Summary


    From the starting chapter of this book up to the previous chapter, you have traveled
    from the simplest of microservices to Docker containers and Kubernetes. You have
    seen multiple, non-trivial design patterns, including NoSQL and messaging brokers.
    In this chapter, you used IaC to provision an EC2 in AWS Cloud. You also deployed
    the microservice example from the first chapter in the EC2 and accessed it from
    your host machine through the Internet. This is a good start, and you can now
    try to deploy many of these examples from other chapters in the cloud. What is
    left is Containers and Orchestration in the cloud, which is covered in the next
    chapter.


