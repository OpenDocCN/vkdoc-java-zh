  raw: '### Persistent Volume Claim


    A *persistent volume claim* (PVC) is a declaration by the pod for a need for storage
    that can at some point in the lifecycle of the pod become available or satisfied.
    A persistent volume claim promises that it will at some point “translate” into
    some platform specific storage volume that your application will be able to use,
    with one of defined characteristics, such as class, size, and access mode (`ROX`:
    ReadOnlyMany, `RWO`: ReadWriteOnce, and `RWX`: ReadWriteMany).


    In this manner you can abstract linking of a particular storage implementation
    away from your pods/deployments. Your application in typical cases specify something
    like “I need persistent storage of default class and size Y.” Later, during the
    time when the “promise” is fulfilled at runtime, you can link an EBS device, an
    EFS store, and so on, and your core manifests are the same in both cases.


    ### Persistent Volume


    A *persistent volume* (PV) is a piece of storage in the Kubernetes cluster that
    has been provisioned by the server/storage/cluster administrator or dynamically
    provisioned using some storage classes. It is a resource in the cluster just like
    a node. So, the persistent volume is the actual product or options that you get
    back from Kubernetes that you asked for. If Kubernetes does not have what you
    asked for, it will try to create it on the fly for you.


    In the section illustrating the first example in this chapter, especially in Listings
    [10-11](#619782_1_En_10_Chapter.xhtml#PC12) through [10-14](#619782_1_En_10_Chapter.xhtml#PC15),
    you will come across how all these concepts of state management are affected with
    running examples.


    ## Kubernetes Clusters


    As you have seen, a Kubernetes cluster is a set of nodes that run containerized
    applications. Kubernetes clusters allow containers to run across multiple machines
    and environments—virtual, physical, cloud-based, or on-premises. Creating a Kubernetes
    cluster from scratch is a non-trivial task. Adding to the complexity, there are
    multiple options and tools to select from.


    As an easier path, there is Minikube, which is a local Kubernetes tool, focusing
    on making it easy to learn and develop for Kubernetes. You do need other and better
    options to run production workloads.


    ### Minikube


    As stated, Minikube is local Kubernetes. It is rather easy to set up a single-node,
    local Kubernetes using Minikube. Moreover, a local Kubernetes will also speed
    up the cycle time of code, test, deploy, and debug cycle on the developer machine
    before you commit changes to your teams environment. Minikube will also enable
    developers to develop and test containerized applications in Windows and Mac environments,
    which are the preferred development machine OSes among application developers.


    Appendix E on container tools provides detailed instructions to install and bring
    up Minikube in a Mac environment.


    The next section gets into some code. You will deploy the first application into
    a Minikube-based local Kubernetes cluster.


    ## Microservices and MongoDB in Kubernetes


    This example reuses the microservices from the section titled “Microservices Using
    MongoDB and CrudRepository” in Chapter [3](#619782_1_En_3_Chapter.xhtml). It uses
    the same two microservices—a consumer and a provider microservice communicating
    with each other using the REST protocol. The provider microservice also interacts
    with a MongoDB. You will use volumes to persist the Mongo database data. Refer
    to Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter [2](#619782_1_En_2_Chapter.xhtml)
    for the overall design.


    ### Design Microservices Deployment Topology


