    清单 3-29

    根查询解析器 (/ch03/ch03-03/02-ProductWeb/src/main/java/com/acme/ecom/product/controller/
    ProductGraphQLController.java)

    ```


    如你所见，我定义了 `products` 方法，用于处理之前定义的 schema 中 `Products` 字段的任何 GraphQL 查询。该方法还应包含带有
    `@Argument` 注解的参数，这些参数与 schema 中的相关参数对应。该方法必须为 GraphQL schema 中的类型返回正确的返回类型。你可以使用任何简单类型，如
    `Int`、`String`、`List` 等，并对应 Java 中的等效类型，GraphQL 运行时会自动映射它们。


    GraphQL 服务器中的任何复杂类型都由对应的 Java Bean 表示。同一个 Java 类将始终表示同一个 GraphQL 类型。Java Bean
    中任何未映射到 GraphQL schema 的字段或方法都会被静默忽略，不会引发任何问题。在本例中，`Product` 和 `ProductCategory`
    的加载都较为复杂。因此，`@SchemaMapping` 注解将处理方法映射到 schema 中同名的字段，并将其用作该字段的 `DataFetcher`，如清单
    3-30 所示。


    ```

    @Controller

    public class ProductGraphQLController {

    @SchemaMapping

    public ProductCategory productCategory(Product product) {

    return productCategoryDao.getProductCategory(

    product.getCategory());

    }

    @SchemaMapping

    public List products(

    ProductCategory productCategory) {

    return productDao.getProductsForCategory(

    productCategory.getName());

    }

    }

    清单 3-30

    根查询解析器 (/ch03/ch03-03/02-ProductWeb/src/main/java/com/acme/ecom/product/controller/
    ProductGraphQLController.java)

    ```


    如果客户端没有显式请求某个字段，GraphQL 服务器就不会执行检索该字段的工作。在这种情况下，如果客户端检索产品时没有请求 `ProductCategory`
    字段，那么 `productCategory()` 方法就不会被执行，`productCategoryDao` 的调用也不会发生。


    清单 3-31 展示了 Data Fetcher 类。


    ```

    public class ProductDao {

    @Autowired

    private ProductBusinessService productBusinessService;

    public List getProducts(int count, int offset) {

    List productList =

    productBusinessService.getAllProducts();

    return productList.stream().skip(offset).

    limit(count).collect(Collectors.toList());

    }

    }

    清单 3-31

    产品 Data Fetcher (/ch03/ch03-03/02-ProductWeb/src/main/java/com/acme/ecom/product/graphql/
    ProductDAO.java)

    ```


    这个 Data Fetcher 将调用委托给你已经见过的产品业务服务。稍后你会看到，无论客户端请求通过哪个端口到达服务器，这个产品业务服务的实例都会被池化或重用。


    一旦定义了基于 GraphQL 的抽象端口，Spring Boot GraphQL Starter 提供了一种优雅的方式来启动 GraphQL 服务器，只需在
    `pom.xml` 中定义相应的依赖即可，如清单 3-32 所示。


    ```


    org.springframework.boot

    spring-boot-starter-graphql


    org.springframework.boot

    spring-boot-starter-web


    清单 3-32

    产品 Web 微服务 Maven 依赖 (ch03\ch03-03\02-ProductWeb\pom.xml)

    ```


    GraphQL 与传输协议无关。因此，我在这个配置中包含了 Web Starter。这将通过 Spring MVC 在默认的 `/graphql` 端点上通过
    HTTP 暴露 GraphQL API。


    GraphQL 还有一个很好的配套 UI 工具，叫做 GraphiQL。这个 UI 可以与任何兼容 GraphQL 的服务器通信，并对其执行查询和变更操作。参见图
    3-3。


    ![](img/619782_1_En_3_Fig3_HTML.jpg)


    GraphiQL 浏览器标签页的截图，顶部有一个包含播放、美化、历史和文档按钮的工具栏，下方是 28 行代码。它显示了欢迎消息，随后是 GraphiQL 的描述，以及一个包含字段和子字段函数及键盘快捷键的查询示例。


    图 3-3


    GraphiQL 查询浏览器


    最后，你需要配置产品 Web 微服务，如清单 3-33 所示。


    ```

    spring:

    application:

    name: product-web

    graphql:

    graphiql:

    enabled: true

    server:

    port: 8080

    acme:

    PRODUCT_SERVICE_URL: http://localhost:8081/products

    PRODUCT_CATEGORY_URL: http://localhost:8081/category

    PRODUCT_SERVICE_BY_CAT_URL: http://localhost:8081/productsbycat

    清单 3-33

    产品 Web 微服务配置 (ch03\ch03-03\02-ProductWeb\src\main\resources\application.yml)

    ```


    这里的大部分配置都很简单。你需要特别关注的是 GraphQL 的配套工具 GraphiQL。这个 UI 工具可以与任何 GraphQL 服务器通信，有助于针对
    GraphQL API 进行开发和消费。Spring GraphQL 自带一个默认的 GraphQL 页面，暴露在 `/graphiql` 端点上。该端点默认是禁用的，但可以通过启用
    `spring.graphql.graphiql.enabled` 属性来开启，清单 3-33 中正是这样做的。这是一种快速而简洁的浏览器内编写和测试查询的方式，尤其在开发和测试阶段非常有用。

