- fmt: '# 7. Introducing Docker


    Resource and time sharing are not new and were generally believed to originate
    in the IBM mainframe days of the late 1960s and early 1970s. Virtualization was
    made possible for organizations and individuals to use a computer resource without
    owning one. The capacity of a single server is so large that it is almost impossible
    for the majority of general-purpose workloads to effectively use it, so shared
    use among a large group of applications and users makes sense. The goal was to
    increase the efficiency of the users and the expensive computer resources they
    shared and this paved the road to virtualization.


    Containers are a form of operating system virtualization. Containers have no or
    lean operating system images, but greatly utilize the host operating system. A
    set of characteristics make containers attractive, especially in deploying microservice-based
    applications, and they are explored in this chapter.


    The following topics are covered in this chapter:


    - Virtualization in general

    - Introduction to containers

    - Docker in detail

    - Compiling, packaging, and running a Java app without a local Java Installation

    - Running your first Java container


    ## Different Types of Virtualization


    This discussion begins with the traditional mode of application deployment and
    then moves to various ways of virtualization so that you can appreciate some of
    the advantages containers offer as compared to peer methods of virtualizations.


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig1_HTML.jpg)


    3 block diagrams compare 3 types of virtualization. Traditional virtualization
    has a single application, while virtual machines have a guest operating system
    and a virtual machine, and containers have a minimal guest operating system and
    a container box. Each has hardware and application.


    Figure 7-1


    Traditional vs. VMs vs. containers


    Referring to Figure [7-1](#619782_1_En_7_Chapter.xhtml#Fig1), first consider the
    different modes of virtualizations and application deployment.


    ### Traditional Deployment


    In the traditional or classical mode of application deployment, organizations
    used physical servers. Every time the business needed a new application, the IT
    department would buy a new server. Since many times nobody knew the performance
    requirements of the new application, and to provide enough headroom for future
    business volume growth, the IT department would over-purchase. They used guesswork
    to determine the model and size of the server to buy.


    The typical lifecycle of provisioning application software flows like this:


    1. Get the physical servers ready in the data center.

    2. Install or use an existing operating system.

    3. Install any additional tools needed by your application software.

    4. Install any dependencies for your software.

    5. Run your software.

    6. Retire your application.

    7. Repurpose or recycle server hardware.


    A much better way to utilize capital expenses is to use virtualization, which
    is discussed next.


    ### Virtualization


    When VMware, Inc. brought the Virtual Machine (VM) concept, IT departments no
    longer needed to procure a new, oversized server every time they needed a new
    application. Instead, IT could run new apps on existing servers that were sitting
    around with spare capacity. Virtualization allows IT to run multiple VMs on a
    single physical server. Each VM includes a full copy of an operating system, the
    application, necessary binaries, and libraries.


    The essential component in the virtualization stack is the *hypervisor*, also
    called the Virtual Machine Monitor (VMM). It creates a virtual platform on the
    host computer, on top of which multiple guest operating systems are executed and
    monitored. These multiple operating systems are either different instances of
    the same operating system, or different operating systems. They share the hardware
    resources offered by the same, single host. Hypervisors have classifications:


    - **Type 1, native or bare metal:** Native hypervisors run directly on the host’s
    hardware to control the hardware, and to monitor the guest OS. Consequently, the
    guest OS runs on a separate level above the hypervisor. Examples: Oracle VM, Microsoft
    Hyper-V, VMWare ESX, and Xen.

    - **Type 2, hosted:** Hosted hypervisors run within a traditional OS. Hosted hypervisors
    add a distinct software layer to top of the host OS, and the guest OS becomes
    a third software level above the hardware. Examples: Oracle VM VirtualBox, VMWare
    Server and Workstation, Microsoft Virtual PC, KVM, QEMU, and Parallels.


    The fact that every VM requires its own dedicated operating system (OS) is a major
    flaw. Every OS consumes CPU, RAM, and other resources. Every OS needs licensing,
    patching, and monitoring. There are other challenges too, a few of which are listed
    here:


    - Operating system images are heavyweight—in the GBs.

    - It is a slow-to-boot-up process.

    - The applications are not portable.

    - Spinning up a virtual machine may take 1–2 minutes.


    Docker Container was introduced in 2013 to address these drawbacks.


    ### Containers


    Containers use OS level virtualization. They do not require their own full-blown
    OS. Instead, all containers on a single host share the host’s OS. This frees up
    huge amounts of system resources, including CPU, RAM, and storage. It also reduces
    potential licensing costs and reduces the overhead of OS patching and other maintenance.
    Container abstraction at the OS layer packages code and dependencies together.


    Containers are also fast to start and ultra-portable. Containers are very lightweight
    and can spin up in a few seconds or milliseconds. Container workloads can be moved
    from laptops to the cloud, and then to VMs or bare metal in your data center quickly
    and easily.


    ## Containers in Detail


    Understanding containers is essential for understanding the rest of this chapter,
    hence this section is devoted to containers.'
  raw: '# 7. Introducing Docker


    Resource and time sharing are not new and were generally believed to originate
    in the IBM mainframe days of the late 1960s and early 1970s. Virtualization was
    made possible for organizations and individuals to use a computer resource without
    owning one. The capacity of a single server is so large that it is almost impossible
    for the majority of general-purpose workloads to effectively use it, so shared
    use among a large group of applications and users makes sense. The goal was to
    increase the efficiency of the users and the expensive computer resources they
    shared and this paved the road to virtualization.


    Containers are a form of operating system virtualization. Containers have no or
    lean operating system images, but greatly utilize the host operating system. A
    set of characteristics make containers attractive, especially in deploying microservice-based
    applications, and they are explored in this chapter.


    The following topics are covered in this chapter:


    *   Virtualization in general


    *   Introduction to containers


    *   Docker in detail


    *   Compiling, packaging, and running a Java app without a local Java Installation


    *   Running your first Java container


    ## Different Types of Virtualization


    This discussion begins with the traditional mode of application deployment and
    then moves to various ways of virtualization so that you can appreciate some of
    the advantages containers offer as compared to peer methods of virtualizations.


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig1_HTML.jpg)


    3 block diagrams compare 3 types of virtualization. Traditional virtualization
    has a single application, while virtual machines have a guest operating system
    and a virtual machine, and containers have a minimal guest operating system and
    a container box. Each has hardware and application.


    Figure 7-1


    Traditional vs. VMs vs. containers


    Referring to Figure [7-1](#619782_1_En_7_Chapter.xhtml#Fig1), first consider the
    different modes of virtualizations and application deployment.


    ### Traditional Deployment


    In the traditional or classical mode of application deployment, organizations
    used physical servers. Every time the business needed a new application, the IT
    department would buy a new server. Since many times nobody knew the performance
    requirements of the new application, and to provide enough headroom for future
    business volume growth, the IT department would over-purchase. They used guesswork
    to determine the model and size of the server to buy.


    The typical lifecycle of provisioning application software flows like this:


    1.  Get the physical servers ready in the data center.


    2.  Install or use an existing operating system.


    3.  Install any additional tools needed by your application software.


    4.  Install any dependencies for your software.


    5.  Run your software.


    6.  Retire your application.


    7.  Repurpose or recycle server hardware.


    A much better way to utilize capital expenses is to use virtualization, which
    is discussed next.


    ### Virtualization


    When VMware, Inc. brought the Virtual Machine (VM) concept, IT departments no
    longer needed to procure a new, oversized server every time they needed a new
    application. Instead, IT could run new apps on existing servers that were sitting
    around with spare capacity. Virtualization allows IT to run multiple VMs on a
    single physical server. Each VM includes a full copy of an operating system, the
    application, necessary binaries, and libraries.


    The essential component in the virtualization stack is the *hypervisor*, also
