    ## 使用 Docker Compose 构建和运行 Java 应用


    此处的目标是使用 Docker Compose 编译、打包、部署和运行 Java 应用。我将在后续章节中提供更多关于 Docker Compose 的详细信息和示例。这里仅运行此示例以完成我们的讨论。


    ### 使用 Docker Compose


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。此示例的代码位于
    `ch07\ch07-01` 文件夹中。请参考附录 E 关于 Docker 的内容，确保你已安装 Docker Compose。Docker Compose
    使用清单 7-19 所示的文件。


    ```

    version: ''2''

    services:

    web:

    image: tomcat

    ports:

    - "8080:8080"

    volumes:

    - ./ProductWeb/target/ProductWeb.war:

    /usr/local/tomcat/webapps/ROOT.war

    - ./ProductWeb/target/ProductWeb:

    /usr/local/tomcat/webapps/ROOT

    清单 7-19

    Docker Compose YML 文件

    ```


    如果你想在没有任何额外路径的情况下部署应用，则必须放置一个名为 `ROOT` 的构件。这通过清单 7-19 中的目录挂载实现。然后，你像之前的示例一样运行
    Docker 进行打包，随后运行 `docker-compose`，这两个命令一次性执行。`docker-compose` 将获取 `docker-compose.yml`，如清单
    7-20 所示。


    ```

