- fmt: "### Testing the Microservices\n\nOnce the microservice is up, you can access\
    \ the web application using your browser and pointing to the URL, which you will\
    \ discover in Listing [13-7](#619782_1_En_13_Chapter.xhtml#PC8).\n\n```\n(base)\
    \ binildass-MacBook-Pro:~ binil$ minikube service springboothelm --url\nhttp://192.168.64.6:31831\n\
    (base) binildass-MacBook-Pro:~ binil$\nListing 13-7\nFinding the Service URL\n\
    ```\n\nYou can test using this URL in a browser or by using `cURL`, as shown in\
    \ Listing [13-8](#619782_1_En_13_Chapter.xhtml#PC9).\n\n```\n(base) binildass-MacBook-Pro:~\
    \ binil$ curl http://192.168.64.6:31831\nHello Docker World : Counted 1 times\
    \ by App Version: 1\n(base) binildass-MacBook-Pro:~ binil$\nListing 13-8\nTesting\
    \ the Microservice Using cURL\n```\n\nThe corresponding logs will also be visible\
    \ in the microservice terminal window, as shown in Listing [13-9](#619782_1_En_13_Chapter.xhtml#PC10).\n\
    \n```\n[springboothelm]\n[springboothelm]   .   ____          _            __\
    \ _ _\n[springboothelm]  /\\\\ / ___'_ __ _ _(_)_ __  __ _ \\ \\ \\ \\\n[springboothelm]\
    \ ( ( )\\___ | '_ | '_| | '_ \\/ _` | \\ \\ \\ \\\n[springboothelm]  \\\\/  ___)|\
    \ |_)| | | | | || (_| |  ) ) ) )\n[springboothelm]   '  |____| .__|_| |_|_| |_\\\
    __, | / / / /\n[springboothelm]  =========|_|==============|___/=/_/_/_/\n[springboothelm]\
    \  :: Spring Boot ::                (v3.2.0)\n[springboothelm]\n...\n[springboothelm]\
    \ 2023-06-01 12:55:42 INFO  StartupInfoLogger.logStarted:57 - Started Application\
    \ ...\n[springboothelm] 2023-06-01 12:55:42 INFO  Application.main:51 - Started...\n\
    ...\n[springboothelm] 2023-06-01 12:59:50 INFO  Application.home:41 - Start\n\
    [springboothelm] 2023-06-01 12:59:50 DEBUG Application.home:43 - Inside hello.Application.home()\
    \ : Counted 1 times by App Version: 1\n[springboothelm] 2023-06-01 12:59:50 INFO\
    \  Application.home:44 - Returning...\n...\nListing 13-9\nMicroservice Terminal\
    \ Window Logs\n```\n\nYou will now make some changes to the source code of the\
    \ project. While making the change, keep watching the terminal window. Make this\
    \ change (see Listing [13-10](#619782_1_En_13_Chapter.xhtml#PC12)):\n\n```\n[springboothelm]\n\
    [springboothelm]   .   ____          _            __ _ _\n[springboothelm]  /\\\
    \\ / ___'_ __ _ _(_)_ __  __ _ \\ \\ \\ \\\n[springboothelm] ( ( )\\___ | '_ |\
    \ '_| | '_ \\/ _` | \\ \\ \\ \\\n[springboothelm]  \\\\/  ___)| |_)| | | | | ||\
    \ (_| |  ) ) ) )\n[springboothelm]   '  |____| .__|_| |_|_| |_\\__, | / / / /\n\
    [springboothelm]  =========|_|==============|___/=/_/_/_/\n[springboothelm]  ::\
    \ Spring Boot ::                (v3.0.6)\n[springboothelm]\n...\n[springboothelm]\
    \ 2023-06-01 13:01:23 INFO  Application.main:51 - Started...\nListing 13-10\n\
    Microservice Terminal Window Logs on Redeployment\n```\n\n```\nprivate static\
    \ String appVersion = \"2\";\n```\n\nAny small change will be picked up and Skaffold\
    \ and will automatically trigger a new build of the Docker image, create a new\
    \ pod, and redeploy the application.\n\nYou can test the application again using\
    \ `cURL`, as in Listing [13-11](#619782_1_En_13_Chapter.xhtml#PC13).\n\n```\n\
    (base) binildass-MacBook-Pro:~ binil$ curl http://192.168.64.6:31831\nHello Docker\
    \ World : Counted 1 times by App Version: 2\n(base) binildass-MacBook-Pro:~ binil$\n\
    Listing 13-11\nTesting the Microservice Using cURL\n```\n\nThe corresponding logs\
    \ are also visible in the terminal window, as shown in Listing [13-12](#619782_1_En_13_Chapter.xhtml#PC14).\n\
    \n```\n[springboothelm]\n[springboothelm]   .   ____          _            __\
    \ _ _\n[springboothelm]  /\\\\ / ___'_ __ _ _(_)_ __  __ _ \\ \\ \\ \\\n[springboothelm]\
    \ ( ( )\\___ | '_ | '_| | '_ \\/ _` | \\ \\ \\ \\\n[springboothelm]  \\\\/  ___)|\
    \ |_)| | | | | || (_| |  ) ) ) )\n[springboothelm]   '  |____| .__|_| |_|_| |_\\\
    __, | / / / /\n[springboothelm]  =========|_|==============|___/=/_/_/_/\n[springboothelm]\
    \  :: Spring Boot ::                (v3.0.6)\n[springboothelm]\n...\n[springboothelm]\
    \ 2023-06-01 13:01:23 INFO  Application.main:51 - Started...\n[springboothelm]\
    \ 2023-06-01 13:04:58 INFO  Application.home:41 - Start\n[springboothelm] 2023-06-01\
    \ 13:04:58 DEBUG Application.home:43 - Inside hello.Application.home() : Counted\
    \ 1 times by App Version: 2\n[springboothelm] 2023-06-01 13:04:58 INFO  Application.home:44\
    \ - Returning...\nListing 13-12\nMicroservice Terminal Window Logs After Redeployment\n\
    ```\n\nYou can clearly view the change you have made in the source code (`appVersion\
    \ = \"2\"`). Even the `private static volatile long times = 0L` counter has been\
    \ reset since the class binaries have been reloaded by the new container. See\
    \ Listing [13-13](#619782_1_En_13_Chapter.xhtml#PC15).\n\nYou can stop the application\
    \ by typing `Ctrl+C` in the terminal window.\n\n```\n^CCleaning up...\n...\nDEBU[0972]\
    \ Running command: [kubectl --context minikube delete --ignore-not-found=true\
    \ -f -]\n- deployment.apps \"springboothelm\" deleted\n- service \"springboothelm\"\
    \ deleted\nINFO[0972] Cleanup complete in 273.772602ms\n(base) binildass-MacBook-Pro:ch13-01\
    \ binil$\nListing 13-13\nTerminating the Microservice Application\n```\n\nThis\
    \ completes the simple CI/CD pipeline example for microservices.\n\n## Summary\n\
    \nFaster release cycles are one of the major promises of microservices architectures.\
    \ However, without a good CI/CD process, you won’t achieve the agility that microservices\
    \ promise.\n\n> *“We try to create teams that are no larger than can be fed by\
    \ two pizzas. We call that the two-pizza team rule.”*\n> \n> —Bezos\n\nWhen this\
    \ becomes the norm, it is more important to have a strong CI/CD process, since\
    \ you will have multiple teams working in their own separate repositories of microservices.\
    \ You have seen an example demonstrating these concepts. Although the example\
    \ and pipeline are simple, they served the purpose of introducing the concepts.\
    \ Having looked at different aspects of microservices and containers, you are\
    \ now ready to get into the public cloud, which you will do in the next chapter.\n\
    \n# Microservices in AWS Elastic Compute Cloud\n\nIn a manufacturing enterprise,\
    \ dead stock refers to products that are not selling and are no longer in production,\
    \ but remain on the shelf. Similarly, obsolete stock refers to products that are\
    \ no longer being sold and are discontinued, and often cannot be used or sold\
    \ anymore. The IT industry is also not shielded from similar obsoleteness. Compute,\
    \ network, and storage devices may become obsolete or useless, and the investment\
    \ done on this in the past may become unprotected. Cloud computing attempts to\
    \ address this obsoleteness to some extent as one of its objectives.\n\nThis chapter\
    \ introduces the notion of a public cloud and explains how to deploy microservices\
    \ in the public cloud.\n\nThe following concepts are covered in this chapter:\n\
    \n*   Introduction to cloud computing\n*   Introduction to Amazon Web Services\
    \ (AWS)\n*   Introduction to Terraform\n*   Provisioning an EC2 in AWS Cloud\n\
    *   Deploying a microservice example in AWS Cloud\n\n## Cloud Computing\n\nCloud\
    \ computing is the on-demand availability of computer system resources as network\
    \ accessible services—especially computing power, storage, and networking resources—without\
    \ direct, active management by the user enterprise. Clouds often have such functions\
    \ distributed over multiple locations of geography, each of which is a *data center*.\
    \ Cloud computing relies on sharing these resources to achieve coherence and typically\
    \ uses a pay-per-usage model, which can help in reducing capital expenses of the\
    \ user enterprise."
