- fmt: '### Code Organization


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized as shown in Listing [14-1](#619782_1_En_14_Chapter.xhtml#PC1),
    inside the `ch14\ch14-01` folder.


    ```

    ./ch14-01/

    ├── README.txt

    ├── connections.tf

    ├── gateways.tf

    ├── network.tf

    ├── security.tf

    ├── servers.tf

    ├── subnets.tf

    └── variables.tf

    Listing 14-1

    Terraform EC2 Project Source Code Organization

    ```


    You can guess what many of these Terraform files are intended to do from the name
    of the files, but the next section also covers them.


    ### Understanding the Source Code


    This section starts from the first step of selecting which cloud provider to use
    and in which geography. See Listing [14-2](#619782_1_En_14_Chapter.xhtml#PC2).


    ```

    provider "aws" {

    region = "ap-southeast-1"

    }

    Listing 14-2

    AWS Region Configuration (ch14/ch14-01/connections.tf)

    ```


    As mentioned, Terraform helps you manage IT infrastructure across a variety of
    public cloud providers (e.g., Amazon Web Services, Microsoft Azure, DigitalOcean)
    and private cloud and virtualization platforms (e.g., OpenStack, VMware). In this
    example, it intends to use `aws` as the cloud provider. I am using `ap-southeast-1`,
    which is the Singapore region. You can use whichever region you prefer.


    The next step is to define the VPC, as shown in Listing [14-3](#619782_1_En_14_Chapter.xhtml#PC3).


    ```

    resource "aws_vpc" "test-env" {

    cidr_block = "10.0.0.0/16"

    enable_dns_hostnames = true

    enable_dns_support = true

    tags = {

    Name = "bdca-Instance-03"

    }

    }

    resource "aws_eip" "ip-test-env" {

    instance = "${aws_instance.test-ec2-instance.id}"

    domain   = "vpc"

    }

    Listing 14-3

    AWS VPC Configuration (ch14/ch14-01/network.tf)

    ```


    Amazon Virtual Private Cloud (Amazon VPC) allows you to launch AWS resources in
    a logically isolated virtual network. Your AWS account includes a default VPC
    in each AWS region. Your default VPCs are configured so that you can immediately
    start launching and connecting to EC2 instances; however, in the example you will
    be creating your own VPC called `test-env`.


    While creating a VPC in AWS, the CIDR block is used to configure the expanse of
    your network. The IP CIDR block gives the range of IP addresses to be allocated
    to this VPC. It has the format `10.0.0.0/16`. The number after the slash `/`,
    `16` denotes that any IP address in the range of this CIDR block must consist
    of the first 16 bits exactly.


    * Since the first 16 bits must remain unchanged, it still has remained with 16
    bits to take any value.

    * To understand this further, you can calculate the range of IP addresses in the
    provided CIDR block `10.0.0.0/16`.


    Remaining bits = 32 - the number after the `/` in the `cidr` prefix


    ```

    = 32 - 16

    = 16

    ```


    The total number of IP addresses in the `cidr` block:


    ```

    = 2 ^ remaining bits

    = 2 ^ 16

    = 65536

    ```


    This calculation is just for your information; a detailed discussion is beyond
    the scope of this book.


    The tag called `Name = "bdca-Instance-03"` is added so you can identify the VPC.


    Elastic IP is a static public IPv4 address, which is not free. You can attach
    an Elastic IP to the `aws_instance.test-ec2-instance.id` instance, which you will
    see subsequently.


    Next, you create a subnet. See Listing [14-4](#619782_1_En_14_Chapter.xhtml#PC6).


    ```

    resource "aws_subnet" "subnet-uno" {

    cidr_block = "${cidrsubnet(aws_vpc.test-env.cidr_block, 3, 1)}"

    vpc_id = "${aws_vpc.test-env.id}"

    availability_zone = "ap-southeast-1a"

    }

    resource "aws_route_table" "route-table-test-env" {

    vpc_id = "${aws_vpc.test-env.id}"

    route {

    cidr_block = "0.0.0.0/0"

    gateway_id = "${aws_internet_gateway.test-env-gw.id}"

    }

    tags = {

    Name = "test-env-route-table"

    }

    }

    resource "aws_route_table_association" "subnet-association" {

    subnet_id      = "${aws_subnet.subnet-uno.id}"

    route_table_id = "${aws_route_table.route-table-test-env.id}"

    }

    Listing 14-4

    AWS Subnet Configuration (ch14/ch14-01/subnets.tf)

    ```


    This subnet part also introduces an important feature in Terraform, showing how
    it references other existing resources by name. Note how the `vpc_id` is defined.
    It refers to an existing resources attribute (the `id`), referencing its full
    terraform name `aws_vpc.test-env.id`, which was defined in the previous step.


    To calculate the subnet address in a given IP network address prefix, you must
    use the `cidrsubnet` function provided by Terraform, which requires three arguments:


    * CIDR prefix: This should be in a CIDR notation, as defined in RFC 4632 Section
    3.1, and here you refer to the CIDR of the VPC of which the subnet should be part.'
