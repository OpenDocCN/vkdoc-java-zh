    *To Sowmya Hubert, Ann S. Binil, and Ria S. Binil*


    Introduction


    Microservices promise the holy grail: concurrent releases and selective scalability.
    How can you do that in a cloud-native manner? Can microservices do away with synchronous
    RPC and adopt asynchronous, message-based interactions? When you do that, how
    do you guarantee user experience with the same synchronous mode of interaction?
    In this book, you will learn about these non-trivial patterns and practices, all
    with production grade example code that you can use as templates to start your
    own work.


    With 25 years of experience, I teach you the otherwise hard-to-understand hexagonal
    and onion architectures and demonstrate them with concrete samples in Spring Boot.
    If you know enough Java and Spring, you can learn basic to advanced concepts,
    including replicating instances of the same microservice and correlating request
    and responses from concurrent users to the same instance, in RPC and in messaging
    styles. You will learn to do this in standalone Java processes, in Docker containers,
    in Kubernetes, and in AWS Cloud using the Elastic Kubernetes Service (EKS).


    What’s inside:


    *   Build a simple microservice in Spring Boot


    *   Learn about HATEOAS, hexagonal, and onion architectures, with code example


    *   Build multiple microservices interacting over RPC and messaging


    *   Use asynchronous patterns at every tier, yet corelate concurrent user requests
    to the same instance or to different instances


    *   Learn about CI and CD and Helm packaging, with code examples


    *   Build Docker packages and deploy them to Kubernetes


    *   Deploy microservices to AWS EC2 and EKS


    Spring Boot helps developers create applications that just run. When minimal configuration
    is required to create an application, even novice Java developers can do it. There
    is no reason why this simplicity should constrain developers in addressing complex
    enterprise requirements, and that is where microservice architecture using Spring
    Boot helps. In addition to rapidly deploying, patching, or scaling applications,
    containers provide solutions that can also support agile and DevOps efforts to
    accelerate development, test, and production cycles. The cloud helps companies
    scale and adapt at speed, accelerate innovation, and drive business agility, without
    heavy upfront IT investment. What if you could equip even a novice developer with
    all that is required to help enterprises do all these? This book just does that,
    and more.


    Acknowledgments


    A big thanks to Apress Media for having trust in me and giving me the opportunity
    to write this book. Nirmal Selvaraj, Dulcy Nirmala and Divya Modi have been very
    helpful in making the process seamless.


    The tech-friendly workplace at IBS Software has been a boon to me. Many thanks
    to Mr. V. K. Mathews, founder and executive chairman, IBS Group, for providing
    consistent motivation throughout my career. I also want to thank Mr. Arun Hrishikesan,
    Senior VP at Innovation Ecosystem, IBS, for his constant motivation and support,
    especially in providing his broader views on technology areas, which influenced
    the content and style of this book to a great extent. Thanks also to Christopher
    Branagan, CTO, IBS, for his many years of mentoring.


    I also want to thank Arun Prasanth from IBS for discussing aspects of this book
    with me.


    Thanks to my wife, Sowmya Hubert, and my daughters, Ann S. Binil and Ria S. Binil,
    who sacrificed so much. A huge thanks is due to my father, Christudas Y., and
    my mother, Azhakamma J., for their selfless support, which helped me get where
    I am today. Also, a note of thanks to my in-laws, Hubert Daniel and Pamala Percis.
    Finally, thanks to my sister, Dr. Binitha, her husband, Dr. Segin Chandran, and
    their daughter, Aardra B. S.


    About the Author About the Technical Reviewer


    # 1. Microservices for the Enterprise


    It has been more than a decade since the original ideas and variants of microservices
    were discussed and considered. Today, this architectural style is the norm, not
    the exception. Its tools and frameworks have matured enough and the architecture
    principles have been tested and proven, both on-premises and on the cloud. There
    is sufficient clarity on how this software architecture distinguishes itself from
    its predecessors, so this chapter discusses only a few key points that have not
    been discussed elsewhere.


    This chapter starts by looking at an overview of the computing paradigm and explaining
    where the current trends of microservices fit in. You will learn that microservices
    is yet another form of distributed computing, but the true benefits of microservices
    are reaped when you provide a decentralized capability in business transaction
    processing for the microservices components. Decentralization brings autonomy
    to peer microservices, which brings a distinguishable feature to the business
    transactions, called *eventual consistency.* Eventually consistent systems are
    more fault tolerant and provide reliability to end-to-end business transactions,
    which happen over the otherwise relatively less stable HTTP-based transport protocol.
    The chapter next looks at the boundaries between microservices and “not so micro”
    services, covered in the service granularity discussion. Before I close this chapter,
    I also introduce the notion of the *hexagonal architecture* with an example. There
    are more examples of the hexagonal architecture in Chapter [2](#619782_1_En_2_Chapter.xhtml)
    as well.


    This chapter covers the following topics:


    *   Different computing architecture paradigms


    *   Eventually consistent software systems


    *   Service granularity


    *   The hexagonal architecture metaphor


    *   Your first Java microservice in code


    ## Computing Architecture Paradigms


    It’s important to understand the distributed nature of services in a microservices
    style of architecture, so this section explains what this architecture is and
    how it differentiates itself from other more familiar counterparts.'
