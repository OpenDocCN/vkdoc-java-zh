    investigate that next and corelate the concept to your enterprise microservices
    using messaging infrastructure.


    ### SEDA Architecture


    In SEDA, applications consist of a network of event-driven stages connected by
    explicit queues. This architecture allows services to be well-conditioned to load,
    preventing resources from being overcommitted when demand exceeds service capacity.
    SEDA uses a set of dynamic resource controllers to keep stages within their operating
    regime, despite large fluctuations in load. This is explained in the paper titled
    “SEDA: An Architecture for Well-Conditioned, Scalable Internet Services” by Matt
    Welsh, David Culler, and Eric Brewer. The architecture is shown in Figure [4-9](#619782_1_En_4_Chapter.xhtml#Fig9),
    adapted from this paper.


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig9_HTML.jpg)


    A diagram of the event queue and handlers for outgoing events. The event handlers
    consist of thread pools and are connected to controllers.


    Figure 4-9


    A SEDA stage


    A stage consists of an incoming event queue, a thread pool, and an application-supplied
    event handler. The stage’s operation is managed by the controller, which adjusts
    resource allocations and scheduling dynamically. Many such stages can be chained
    together to create a loosely coupled, end-to-end application continuum.


    ### Microservices Architecture as a Network of Stages


    A microservices-based architecture can be designed as a network of stages, interconnected
    by event queues. Each microservice can be envisioned as a stage. These event queues
    are finite; that is, an enqueue operation may fail if the queue wants to reject
    new entries, say, because it reached a threshold. Caller microservices can use
    backpressure (by blocking on a full queue) or load shedding (by dropping events)
    when enqueue operations fail. Alternately, the microservices can take some service-specific
    action, such as sending an error to the user, or performing an alternate function,
    such as invoking a Hystrix callback, and so on.


    What if you attempt to represent inter-microservice interaction using a SEDA style?
    See Figure [4-10](#619782_1_En_4_Chapter.xhtml#Fig10).


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig10_HTML.jpg)


    A diagram of async microservices with 2 blocks of requester and responsive microservices.
    A user sends a command to the microservice and gets a response.


    Figure 4-10


    Async based microservices architecture as a network of stages


    Introducing queues between two microservices in this manner will provide isolation,
    modularity, and independent load management, but may increase latency. Further,
    if the provider microservice is not up and running, the promise the consumer microservice
    can provide to the end user may have to be fulfilled later (or eventually), which
    will lead to a different user experience from that of the traditional means of
    executing use cases.


    Note the blocking manner by which the Product Web microservice has been executing
    its request it received from the browser. Typical containers in application servers
    like in Apache Tomcat normally use a server thread per client request. Under increased
    load conditions, this necessitates that containers have many threads to serve
    all the client requests. This limits scalability, which can arise due to running
    out of memory or exhausting the pool of container threads. Java EE has added asynchronous
    processing support for servlets and filters from the Servlet 3.0 spec onwards.


    The next section shows you how you can leverage this to isolate resources from
    undue blocking with the help of an example.'
