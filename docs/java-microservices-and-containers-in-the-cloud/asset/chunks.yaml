    ### Run Microservices in Kubernetes


    The `ch11\ch11-01` folder contains the scripts required to build and run the examples.
    The first step is to start a Minikube single-node Kubernetes cluster (see Listing
    [11-8](#619782_1_En_11_Chapter.xhtml#PC8)). Refer to Appendix E for a quick reference
    to Kubernetes setup and commands.


    ```

    (base) binildass-MacBook-Pro:~ binil$ minikube start

    minikube v1.25.2 on Darwin 12.4

    ...

    Done! kubectl is now configured to use "minikube" cluster and "default" namespace
    by default

    (base) binildass-MacBook-Pro:~ binil$

    Listing 11-8

    Starting Minikube

    ```


    Set the Minikube environment variables in your work terminal.


    Note


    The examples in this chapter assume that the previous two steps connected to the
    Docker daemon have been executed if you are using the Minikube single-node Kubernetes
    cluster.


