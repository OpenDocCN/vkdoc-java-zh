- fmt: '```java

    public class ProductRestController{

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity getProduct(@PathVariable(

    "productId") String productId) {

    Product product = inMemoryDB.getProduct(productId);

    if (product == null) {

    return new ResponseEntity(

    HttpStatus.NOT_FOUND);

    }

    return new ResponseEntity(product,

    HttpStatus.OK);

    }

    @RequestMapping(value = "/productsweb",

    method = RequestMethod.POST,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity addProduct(

    @RequestBody Product product) {

    Product productFound = inMemoryDB.getProduct(

    product.getProductId());

    if (null != productFound) {

    return new ResponseEntity(

    HttpStatus.CONFLICT);

    }

    inMemoryDB.addProduct(product);

    return new ResponseEntity(product,

    HttpStatus.OK);

    }

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.DELETE,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity deleteProduct(

    @PathVariable("productId")String productId) {

    Product productFound = inMemoryDB.getProduct(

    productId);

    if (productFound == null) {

    return new ResponseEntity(

    HttpStatus.NOT_FOUND);

    }

    inMemoryDB.deleteProduct(productId);

    return new ResponseEntity(

    HttpStatus.NO_CONTENT);

    }

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.PUT,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity updateProduct(

    @PathVariable("productId")String productId,

    @RequestBody Product product) {

    Product currentProduct = inMemoryDB.getProduct(

    productId);

    if (currentProduct == null) {

    return new ResponseEntity(

    HttpStatus.NOT_FOUND);

    }

    currentProduct.setName(product.getName());

    currentProduct.setCode(product.getCode());

    currentProduct.setTitle(product.getTitle());

    currentProduct.setPrice(product.getPrice());

    Product newProduct = inMemoryDB.updateProduct(

    currentProduct);

    return new ResponseEntity(newProduct,

    HttpStatus.OK);

    }

    }

    Listing 1-4

    REST Based HTTP Port for getAllProducts (ch01\ch01-01\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    Here, given a `productId`, the `getProduct` method will retrieve the details of
    a specific product. `addProduct` will create a new product and `deleteProduct`
    will remove a product from the in-memory DB. `updateProduct` will update a product
    with a new set of values.


    ### Build and Run the Code


    The `ch01\ch01-01` folder contains the Maven scripts required to build and run
    the examples. This example is the simplest microservice anyone could think of,
    since there are no dependencies to external resources like databases or message
    queues. It’s still a fully functional microservice demonstrating the complete
