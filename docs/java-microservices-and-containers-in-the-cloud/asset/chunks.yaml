    3-24 所示，位于 `ch03\ch03-03` 文件夹内。这遵循标准的 Maven 结构，因此 `pom.xml` 位于目录的根目录。仅展示了产品 Web
    微服务相关部分的代码组织，因为产品服务器微服务与你之前看到的类似。


