- fmt: '### Run Containers Using Docker Compose


    The `ch09\ch09-02` folder contains the scripts required to build and run the examples.
    The first step is to start a Minikube single-node Kubernetes cluster so that you
    have a Docker Daemon up. Refer to Appendix E for a quick reference to the container
    commands.


    Assuming the Minikube single-node Kubernetes cluster is up and running, as a next
    step, you need to create this new folder for the Mongo data you configured in
    `docker-compose.yml` in Listing [9-14](#619782_1_En_9_Chapter.xhtml#PC19). This
    is done in Listing [9-15](#619782_1_En_9_Chapter.xhtml#PC20).


