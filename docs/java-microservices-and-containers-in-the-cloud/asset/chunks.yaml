    ## Microservice and MongoDB Containers Using Links


    This example reuses the microservices from the section titled “Microservices Using
    MongoDB and CrudRepository” in Chapter [3](#619782_1_En_3_Chapter.xhtml). It uses
    the same two microservices—a consumer and a provider microservice communicating
    each other using the REST protocol. The provider microservice also interacts with
    a MongoDB. Refer to Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter
    [2](#619782_1_En_2_Chapter.xhtml) for the overall design.


    ### Designing the Container Topology


    From this design in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter
    [2](#619782_1_En_2_Chapter.xhtml), you also need to define a container-based deployment
    topology. This is shown in Figure [8-1](#619782_1_En_8_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_8_Chapter/619782_1_En_8_Fig1_HTML.jpg)


    A diagram illustrates the microservices container topology. It includes user,
    browser, container engine, host OS, and hardware.


    **Figure 8-1** Microservices container topology design


    A consumer and a provider microservice communicate with each other using the REST
    protocol. Product Web microservice is the consumer microservice, which will be
    deployed as a single container. The provider microservice also interacts with
    a NoSQL database, MongoDB. Therefore, the deployment involves two containers—one
    for the Product Server component and the other for the MongoDB component. Here,
    the Product Web and Product Server containers provide business services, whereas
    the Mongo container provides application services for persisting data.


    Also note another aspect in Figure [8-1](#619782_1_En_8_Chapter.xhtml#Fig1). The
    Product Server and MongoDB containers are grouped together and are so called as
    a single microservice, the Product Server microservice. This follows the standard
    conventions of microservices, where you define that a microservice is a self-contained
    unit owning its own data.


    Also note two kinds of interactions with the user doing with the deployment:


    *   The command-line interface, or CLI, runs in what is called userspace memory,
    as a deployment management interface. This program runs just like other programs
    that run on top of the operating system. Programs running in the userspace can’t
    modify kernel space memory. The operating system is the interface between the
    user programs and the hardware that the computer is running on.


    *   The user uses a browser to access the business functionality from the business
    services


    Docker Engine and Docker CLI are two programs running in the userspace when you
    run Docker. Figure [8-1](#619782_1_En_8_Chapter.xhtml#Fig1) shows three containers
    running. Each container is running as a child process of the Docker engine, wrapped
    with a container, and the delegate process is running in its own memory subspace
    of the userspace. Programs running inside a container cannot access memory and
    resources scoped by the neighbor container.


    Further, in a way Figure [8-1](#619782_1_En_8_Chapter.xhtml#Fig1) represents a
    logical view of microservices deployment too. While at an infrastructure architecture
    level the container deployment makes more sense, it’s the microservice architecture
    view that is more relevant to the application architect, hence I have shown that
    in the figure. That is why even though Product Server and MongoDB are deployed
    as two separate containers, I have logically grouped them together to represent
    the single Product Server microservice. This specific instance of MongoDB is wholly
    owned by the Product Server microservice, and entities outside the Product Server
    microservice may not be concerned about this MongoDB instance for any reason.


