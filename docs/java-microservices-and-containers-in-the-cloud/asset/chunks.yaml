  raw: '### Designing Helm-Based Deployment Topology


    This example follows the deployment topology from Figure [11-3](#619782_1_En_11_Chapter.xhtml#Fig3) in
    Chapter [11](#619782_1_En_11_Chapter.xhtml). The Product Web and Product Server
    microservices are containerized, and the Product Server microservice will connect
    to a PostgreSQL database, again deployed within a container. All these containers
    will now be inside Kubernetes. Ingress is an additional component for routing
    and an Adminer UI component manages the PostgreSQL DB. See Figure [12-3](#619782_1_En_12_Chapter.xhtml#Fig3).


    ![](images/619782_1_En_12_Chapter/619782_1_En_12_Fig3_HTML.jpg)


    A diagram illustrates the deployment topology. It includes user, browser, helm
    client, Kubernetes cluster, host O S, and hardware.


    Figure 12-3


    Deployment topology for microservices


    The next sections look at the code for this deployment.


    ### Code Organization


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized inside the `ch12\ch12-06` folder.


    Before you get into the source code for this example, take another look at the
    source code organization of the similar example (`ch11\ch11-03`) from Listing
    [11-32](#619782_1_En_11_Chapter.xhtml#PC32) in Chapter [11](#619782_1_En_11_Chapter.xhtml).
    It’s shown again in Listing [12-48](#619782_1_En_12_Chapter.xhtml#PC51).


    ```

    ./ch11-03/

    ├── 01-ProductServer

    │   ├── make.sh

    │   ├── pom.xml

    │   └── src

    │       └── main

    ├── 02-ProductWeb

    │   ├── make.sh

    │   ├── pom.xml

    │   └── src

    │       └── main

    ├── Dockerfile

    ├── README.txt

    ├── adminer-deployment.yaml

    ├── adminer-svc.yaml

    ├── clean.sh

    ├── ingress-controller.yaml

    ├── makeandrun.sh

    ├── pom.xml

    ├── postgres-config.yml

    ├── postgres-deployment.yml

    ├── postgres-pvc.yml

    ├── postgres-svc.yml

    ├── product-server-deployment.yml

    ├── product-server-service.yml

    ├── product-web-deployment.yml

    └── product-web-service.yml

    Listing 12-48

    Example 11-03 Source Code Organization

    ```


    For two business services, you can see how many YAML files are required. A little
    consolidation can be done, say by merging the deployment and service definitions
    of Product Server microservice into a single YAML file, and so on. But it still
    doesn’t fix another problem, the problem of duplication. How do you avoid copy-pasting
    major file content just to replace a couple of values? It would be nice if there
    was a way to define a template for both business objects (the Product Server and
    Product Web microservices) and then inject values into specific fields. Helm can
    help you in this regard.


    The source code for this example is organized as shown in Listing [12-49](#619782_1_En_12_Chapter.xhtml#PC52),
    inside the `ch12\ch12-06` folder. This is the same example you saw in Chapter
    [11](#619782_1_En_11_Chapter.xhtml). You will now use Helm for deployment.


    ```

