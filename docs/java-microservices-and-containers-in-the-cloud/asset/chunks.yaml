    ## 总结


    在本章中，我有意避免定义微服务，因为业界存在许多定义和观点。相反，我尝试从一些不太常见的角度来审视微服务，以期理解它们如何融入更大的计算范式。本章还探讨了这些显著特性如何有助于提供卓越的业务交易执行能力。我还尝试通过示例展示六边形架构是什么。我将在接下来的两章中继续讨论，并提供更多示例，以便你能够清楚地理解，如果采用六边形架构的原则，你的微服务将具备的设计结构和质量。


