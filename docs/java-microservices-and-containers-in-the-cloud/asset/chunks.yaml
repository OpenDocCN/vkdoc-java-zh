- fmt: "### The Ports and Adapter Architecture\n\nThe ports and adapter architecture\
    \ was mentioned by Alistair Cockburn on his blog in 2005. It reads as follows:\n\
    \n“Allow an application to equally be driven by users, programs, automated test\
    \ or batch scripts, and to be developed and tested in isolation from its eventual\
    \ runtime devices and databases.”\n\nTo explain further, think about an application\
    \ as the central artefact of a system, where all input reaches and all output\
    \ leaves the application through a port(s) that isolates the application from\
    \ all kinds of external tools, technologies, and delivery mechanisms. The application\
    \ should have no knowledge of who/what is sending input or receiving output. This\
    \ is intended to protect the applications against the evolution of technology\
    \ and business requirements, since such an evolution can make applications obsolete\
    \ shortly after they are developed.\n\nTo understand the ports and adapters architecture,\
    \ first turn the layered architecture from the typical North-South orientation\
    \ to an East-West orientation, as shown in Figure [1-12](#619782_1_En_1_Chapter.xhtml#Fig12).\n\
    \n![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig12_HTML.jpg)\n\nA process\
    \ flow defines how the end user interacts with the booking app on their mobile\
    \ device. The app communicates with the presentation, business, and data layers.\
    \ The presentation layer handles the user interface, the business layer processes\
    \ the data, and the data is stored in a database.\n\nFigure 1-12\n\nThe layered\
    \ architecture, orientation changed\n\nFigure [1-12](#619782_1_En_1_Chapter.xhtml#Fig12)\
    \ shows the typical application flow, which starts from the code in the user interface,\
    \ through the application core to the infrastructure code, back to the application\
    \ core, finally delivering a response to the user interface.\n\nThe ports and\
    \ adapters architecture solves the problem of safeguarding and reusing the inner\
    \ layers (business layer) by using an abstraction layer, implemented as a port\
    \ and an adapter.\n\n- **Ports**: A port is a consumer-agnostic entry and exit\
    \ point to/from the application. In Java, it is a Java interface. Or in more abstract\
    \ terms, it could be an HTTP REST interface or a JMS or AMQP messaging interface.\n\
    - **Adapter**: An adapter class implements an interface known to its clients and\
    \ provides access to an instance of a class not known to its clients. An adapter\
    \ object provides the functionality promised by an interface without having to\
    \ assume what class is used to implement that interface.\n\nThe ports and adapters\
    \ architecture explicitly identifies three fundamental blocks of code in a system:\n\
    \n1. **Interface**: Code that makes it possible to run a user interface, regardless\
    \ of the type of user interface it might be.\n2. **Business**: The business logic\
    \ code, or application core, which is used by the user interface to make things\
    \ happen.\n3. **Infrastructure**: The infrastructure code that connects the application\
    \ core to tools like a database, a message queue, or a third-party API.\n\nIn\
    \ the current orientation in Figure [1-12](#619782_1_En_1_Chapter.xhtml#Fig12),\
    \ the adapters on the left side, representing the UI, are called the **primary**\
    \ or **driving** adapters because they initiate an action on the application.\
    \ The adapters on the right side, representing the connections to the backend\
    \ resources, are called the **secondary** or **driven** adapters because they\
    \ always react to an action of a primary adapter.\n\nThe primary or driving adapters\
    \ provide services (to the user interface), whereas the secondary or driven adapters\
    \ consume services (from the infrastructure). Hence on the left side, both the\
    \ port and its concrete implementation (the use case) belong inside the application.\
    \ On the right side, the port belongs inside the application, but its concrete\
    \ implementation belongs outside. It wraps around some external infrastructure\
    \ from some provider.\n\n### Hexagonal Architecture\n\nFigure [1-12](#619782_1_En_1_Chapter.xhtml#Fig12)\
    \ shows two sides—one side an entry to the application using the user interface\
    \ and the other side an exit from the application into an infrastructure. Thus,\
    \ although there are two symmetrical sides (left and right) of the application,\
    \ each side can have several entry/exit points. For example, an API (say REST\
    \ API) and a Graphical User Interface (GUI) can be two different entry/exit points\
    \ on the left side of the application, while a database and a message queue can\
    \ be two different entry/exit points on the right side of the application. To\
    \ represent that this application can have multiple entry/exit points, you draw\
    \ the application diagram with several sides. The diagram could have been any\
    \ polygon with several sides, but the choice turned out to be a hexagon, hence\
    \ the name hexagonal architecture.\n\n### Microservice Metamodel\n\nI can now\
    \ extend the notion of the hexagonal architecture to a microservice, since many\
    \ of the aspects discussed in the ports and adapters section make sense in the\
    \ context of a microservice. This is shown in Figure [1-13](#619782_1_En_1_Chapter.xhtml#Fig13).\n\
    \n![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig13_HTML.jpg)\n\nA process\
    \ flow defines how the commands, queries, and events are processed through REST\
    \ API, controller, message listener, service, process, aggregate, client, and\
    \ store. The system handles both incoming and outgoing commands and interacts\
    \ with a user interface and infrastructure components.\n\nFigure 1-13\n\nThe microservices\
    \ metamodel\n\nYou can now compare the microservice metamodel shown in Figure\
    \ [1-13](#619782_1_En_1_Chapter.xhtml#Fig13) to that of a Java Spring-based microservice\
    \ with the following components:\n\n![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig14_HTML.jpg)\n\
    \nA diagram illustrates microservices composed of an aggregate that implements\
    \ a process. The process is further divided into smaller aggregates. Each represents\
    \ a specific unit of work. The service interacts with an interface.\n\nFigure\
    \ 1-14\n\nProcess vs. service relationship\n\n- **REST controller**: An HTTP-based\
    \ REST based controller class, annotated with `@RestController`.\n- **POJO service**:\
    \ The core business logic. This class should be shielded from any entry/exit changes\
    \ to facilitate reuse.\n- **ORM repository**: An ORM repository class handling\
    \ persistence logic to a database.\n- **Aggregate entity**: Domain entity based\
    \ on the domain model, which is reusable.\n- **Data store**: The infrastructure’s\
    \ persistent storage.\n- **Message listener**: A JMS or an AMQP-based controller\
    \ class.\n- **Client program**: Program that will use ports to exit to other kinds\
    \ of infrastructure.\n- **Process**: A complex business modeling would call for\
    \ a process modeling, which is optional. If a process modelling is involved, the\
    \ abstract metamodel relationship between a process and service is as shown in\
    \ Figure [1-14](#619782_1_En_1_Chapter.xhtml#Fig14).\n  - A service exposes a\
    \ service interface.\n  - A service can be an aggregate of other services.\n \
    \ - A process aggregates and orchestrates many services, or even other processes.\n\
    \  - A process also exposes a service interface.\n\nSubsequent discussions follow\
    \ the microservices metamodel shown in Figure [1-13](#619782_1_En_1_Chapter.xhtml#Fig13)\
    \ to represent many of the upcoming scenarios.\n\n## Your First Java Microservice\n\
    \nI am sure you have had enough theory, so it’s time to build your first microservice\
    \ in Java.\n\nThis example uses Spring Boot to build the Java microservices. The\
    \ project codebase can be imported into any of your favorite IDEs, but they could\
    \ also be built and run without an IDE and with the help of commands in a Windows\
    \ or Mac terminal. Subsequent chapters use a similar approach, since discussion\
    \ on which IDE to use and how to use a specific IDE is beyond the scope of this\
    \ book. I assume you are either already familiar with those steps or can refer\
    \ to an introductory Java or JEE book."
  raw: '### The Ports and Adapter Architecture


    The ports and adapter architecture was mentioned by Alistair Cockburn on his blog
    in 2005\. It reads as follows:


    “Allow an application to equally be driven by users, programs, automated test
    or batch scripts, and to be developed and tested in isolation from its eventual
    runtime devices and databases.”


    To explain further, think about an application as the central artefact of a system,
    where all input reaches and all output leaves the application through a port(s)
    that isolates the application from all kinds of external tools, technologies,
    and delivery mechanisms. The application should have no knowledge of who/what
    is sending input or receiving output. This is intended to protect the applications
    against the evolution of technology and business requirements, since such an evolution
    can make applications obsolete shortly after they are developed.


    To understand the ports and adapters architecture, first turn the layered architecture
    from the typical North-South orientation to an East-West orientation, as shown
    in Figure [1-12](#619782_1_En_1_Chapter.xhtml#Fig12).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig12_HTML.jpg)


    A process flow defines how the end user interacts with the booking app on their
    mobile device. The app communicates with the presentation, business, and data
    layers. The presentation layer handles the user interface, the business layer
    processes the data, and the data is stored in a database.


    Figure 1-12


    The layered architecture, orientation changed


    Figure [1-12](#619782_1_En_1_Chapter.xhtml#Fig12) shows the typical application
    flow, which starts from the code in the user interface, through the application
    core to the infrastructure code, back to the application core, finally delivering
    a response to the user interface.


    The ports and adapters architecture solves the problem of safeguarding and reusing
    the inner layers (business layer) by using an abstraction layer, implemented as
    a port and an adapter.


    *   *Ports*: A port is a consumer-agnostic entry and exit point to/from the application.
    In Java, it is a Java interface. Or in more abstract terms, it could be an HTTP
    REST interface or a JMS or AMQP messaging interface.


    *   *Adapter*: An adapter class implements an interface known to its clients and
    provides access to an instance of a class not known to its clients. An adapter
    object provides the functionality promised by an interface without having to assume
    what class is used to implement that interface.


    The ports and adapters architecture explicitly identifies three fundamental blocks
    of code in a system:


    1.  *Interface*: Code that makes it possible to run a user interface, regardless
    of the type of user interface it might be.


    2.  *Business*: The business logic code, or application core, which is used by
    the user interface to make things happen.


    3.  *Infrastructure*: The infrastructure code that connects the application core
    to tools like a database, a message queue, or a third-party API.


    In the current orientation in Figure [1-12](#619782_1_En_1_Chapter.xhtml#Fig12),
    the adapters on the left side, representing the UI, are called the *primary* or
    *driving* adapters because they initiate an action on the application. The adapters
    on the right side, representing the connections to the backend resources, are
    called the *secondary* or *driven* adapters because they always react to an action
    of a primary adapter.


    The primary or driving adapters provide services (to the user interface), whereas
    the secondary or driven adapters consume services (from the infrastructure). Hence
    on the left side, both the port and its concrete implementation (the use case)
    belong inside the application. On the right side, the port belongs inside the
    application, but its concrete implementation belongs outside. It wraps around
    some external infrastructure from some provider.


    ### Hexagonal Architecture


    Figure [1-12](#619782_1_En_1_Chapter.xhtml#Fig12) shows two sides—one side an
    entry to the application using the user interface and the other side an exit from
    the application into an infrastructure. Thus, although there are two symmetrical
    sides (left and right) of the application, each side can have several entry/exit
    points. For example, an API (say REST API) and a Graphical User Interface (GUI)
    can be two different entry/exit points on the left side of the application, while
    a database and a message queue can be two different entry/exit points on the right
    side of the application. To represent that this application can have multiple
    entry/exit points, you draw the application diagram with several sides. The diagram
    could have been any polygon with several sides, but the choice turned out to be
    a hexagon, hence the name hexagonal architecture.


    ### Microservice Metamodel


    I can now extend the notion of the hexagonal architecture to a microservice, since
    many of the aspects discussed in the ports and adapters section make sense in
    the context of a microservice. This is shown in Figure [1-13](#619782_1_En_1_Chapter.xhtml#Fig13).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig13_HTML.jpg)


    A process flow defines how the commands, queries, and events are processed through
    REST A P I, controller, message listener, service, process, aggregate, client,
    and store. The system handles both incoming and outgoing commands and interacts
    with a user interface and infrastructure components.


    Figure 1-13


    The microservices metamodel


    You can now compare the microservice metamodel shown in Figure [1-13](#619782_1_En_1_Chapter.xhtml#Fig13)
    to that of a Java Spring-based microservice with the following components:


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig14_HTML.jpg)


    A diagram illustrates microservices composed of an aggregate that implements a
    process. The process is further divided into smaller aggregates. Each represents
    a specific unit of work. The service interacts with an interface.


    Figure 1-14


    Process vs. service relationship


    *   *REST controller*: An HTTP-based REST based controller class, annotated with
    `@RestController`.


    *   *POJO service*: The core business logic. This class should be shielded from
    any entry/exit changes to facilitate reuse.


    *   *ORM repository*: An ORM repository class handling persistence logic to a
    database.


    *   *Aggregate entity*: Domain entity based on the domain model, which is reusable.


    *   *Data store*: The infrastructure’s persistent storage.


    *   *Message listener*: A JMS or an AMQP-based controller class.


    *   *Client program*: Program that will use ports to exit to other kinds of infrastructure.


    *   *Process*: A complex business modeling would call for a process modeling,
    which is optional. If a process modelling is involved, the abstract metamodel
    relationship between a process and service is as shown in Figure [1-14](#619782_1_En_1_Chapter.xhtml#Fig14).


    *   A service exposes a service interface.


    *   A service can be an aggregate of other services.


    *   A process aggregates and orchestrates many services, or even other processes.


    *   A process also exposes a service interface.


    Subsequent discussions follow the microservices metamodel shown in Figure [1-13](#619782_1_En_1_Chapter.xhtml#Fig13)
    to represent many of the upcoming scenarios.


    ## Your First Java Microservice


    I am sure you have had enough theory, so it’s time to build your first microservice
    in Java.


    This example uses Spring Boot to build the Java microservices. The project codebase
    can be imported into any of your favorite IDEs, but they could also be built and
    run without an IDE and with the help of commands in a Windows or Mac terminal.
    Subsequent chapters use a similar approach, since discussion on which IDE to use
    and how to use a specific IDE is beyond the scope of this book. I assume you are
    either already familiar with those steps or can refer to an introductory Java
    or JEE book.'
  trans: "\n### 端口与适配器架构\n\n端口与适配器架构由 Alistair Cockburn 于 2005 年在其博客中提出。其描述如下：\n\n\
    “允许应用程序同等地由用户、程序、自动化测试或批处理脚本驱动，并且能够在与最终运行时设备和数据库隔离的环境中进行开发和测试。”\n\n进一步解释，将应用程序视为系统的核心工件，所有输入和输出都通过一个或多个端口进出应用程序，这些端口将应用程序与各种外部工具、技术和交付机制隔离开来。应用程序不应知晓是谁/什么在发送输入或接收输出。这样做的目的是保护应用程序免受技术演进和业务需求变化的影响，因为这种演进可能会使应用程序在开发后不久就变得过时。\n\
    \n要理解端口与适配器架构，首先将分层架构从典型的南北方向转变为东西方向，如图 1-12 所示。\n\n![](img/619782_1_En_1_Fig12_HTML.jpg)\n\
    \n一个流程定义了最终用户如何在其移动设备上与预订应用进行交互。该应用与表示层、业务层和数据层进行通信。表示层处理用户界面，业务层处理数据，数据则存储在数据库中。\n\
    \n图 1-12\n\n分层架构，方向已改变\n\n图 1-12 展示了典型的应用程序流程，该流程从用户界面中的代码开始，经过应用程序核心到达基础设施代码，再返回应用程序核心，最终向用户界面发送响应。\n\
    \n端口与适配器架构通过使用一个抽象层（以端口和适配器的形式实现）来解决保护和重用内层（业务层）的问题。\n\n*   *端口*：端口是进入/离开应用程序的、与消费者无关的入口和出口点。在\
    \ Java 中，它是一个 Java 接口。或者用更抽象的术语来说，它可以是一个 HTTP REST 接口，或者是一个 JMS 或 AMQP 消息传递接口。\n\
    \n*   *适配器*：适配器类实现了一个其客户端已知的接口，并提供对客户端未知类实例的访问。适配器对象提供了接口所承诺的功能，而无需假设使用哪个类来实现该接口。\n\
    \n端口与适配器架构明确地标识了系统中三个基本的代码块：\n\n1.  *接口*：使运行用户界面成为可能的代码，无论其用户界面类型如何。\n\n2.  *业务*：业务逻辑代码，或称应用程序核心，用户界面通过它来驱动事务发生。\n\
    \n3.  *基础设施*：将应用程序核心连接到数据库、消息队列或第三方 API 等工具的基础设施代码。\n\n在图 1-12 当前的方位中，左侧代表 UI\
    \ 的适配器被称为*主*适配器或*驱动*适配器，因为它们发起对应用程序的操作。右侧代表与后端资源连接的适配器被称为*次*适配器或*被驱动*适配器，因为它们总是响应主适配器的操作。\n\
    \n主适配器或驱动适配器提供服务（给用户界面），而次适配器或被驱动适配器则消费服务（来自基础设施）。因此，在左侧，端口及其具体实现（用例）都属于应用程序内部。在右侧，端口属于应用程序内部，但其具体实现则属于外部。它包裹着来自某个提供者的外部基础设施。\n\
    \n### 六边形架构\n\n图 1-12 展示了两侧——一侧是使用用户界面进入应用程序的入口，另一侧是离开应用程序进入基础设施的出口。因此，尽管应用程序有两个对称的侧（左侧和右侧），但每一侧都可以有多个入口/出口点。例如，一个\
    \ API（比如 REST API）和一个图形用户界面（GUI）可以是应用程序左侧的两个不同入口/出口点，而一个数据库和一个消息队列可以是应用程序右侧的两个不同入口/出口点。为了表示该应用程序可以有多个入口/出口点，你可以绘制一个具有多个边的应用程序图。这个图可以是任何多边形，但最终选择的是六边形，因此得名六边形架构。\n\
    \n### 微服务元模型\n\n现在，我可以将六边形架构的概念扩展到微服务，因为端口与适配器部分讨论的许多方面在微服务的上下文中都是有意义的。如图 1-13\
    \ 所示。\n\n![](img/619782_1_En_1_Fig13_HTML.jpg)\n\n一个流程定义了命令、查询和事件如何通过 REST API、控制器、消息监听器、服务、流程、聚合、客户端和存储进行处理。该系统处理传入和传出的命令，并与用户界面和基础设施组件进行交互。\n\
    \n图 1-13\n\n微服务元模型\n\n现在，你可以将图 1-13 中所示的微服务元模型与基于 Java Spring 的微服务进行比较，后者包含以下组件：\n\
    \n![](img/619782_1_En_1_Fig14_HTML.jpg)\n\n一个图表说明了微服务由实现流程的聚合组成。该流程进一步细分为更小的聚合。每个聚合代表一个特定的工作单元。服务与接口交互。\n\
    \n图 1-14\n\n流程与服务的关系\n\n*   *REST 控制器*：一个基于 HTTP 的 REST 控制器类，使用 `@RestController`\
    \ 注解。\n*   *POJO 服务*：核心业务逻辑。此类应屏蔽任何入口/出口变更，以促进重用。\n*   *ORM 仓库*：处理数据库持久化逻辑的 ORM\
    \ 仓库类。\n*   *聚合实体*：基于领域模型的领域实体，可重用。\n*   *数据存储*：基础设施的持久化存储。\n*   *消息监听器*：一个基于\
    \ JMS 或 AMQP 的控制器类。\n*   *客户端程序*：将使用端口退出到其他类型基础设施的程序。\n*   *流程*：复杂的业务建模需要流程建模，这是可选的。如果涉及流程建模，流程与服务之间的抽象元模型关系如图\
    \ 1-14 所示。\n    *   服务暴露一个服务接口。\n    *   一个服务可以是其他服务的聚合。\n    *   一个流程聚合和编排许多服务，甚至其他流程。\n\
    \    *   一个流程也暴露一个服务接口。\n\n后续的讨论将遵循图 1-13 中所示的微服务元模型来表示许多即将出现的场景。\n\n## 你的第一个\
    \ Java 微服务\n\n我相信你已经了解了足够的理论，现在是时候构建你的第一个 Java 微服务了。\n\n此示例使用 Spring Boot 来构建\
    \ Java 微服务。项目代码库可以导入到你喜欢的任何 IDE 中，但也可以在 Windows 或 Mac 终端中通过命令无需 IDE 即可构建和运行。后续章节将采用类似的方法，因为关于使用哪个\
    \ IDE 以及如何使用特定 IDE 的讨论超出了本书的范围。我假设你已经熟悉这些步骤，或者可以参考一本 Java 或 JEE 入门书籍。\n"
- fmt: '### Spring Boot


    Spring Boot uses an opinionated view of the Spring platform and many third-party
    Java libraries so that it is straightforward to create standalone, production-grade,
    Spring-based applications that you can “just run.” Spring Boot follows many conventions
    and usage patterns followed by developers, which they have been leveraging while
    using Spring and other third-party libraries. Therefore, most Spring Boot applications
    need very little Spring configuration. Again, the intention is not to cover Spring
    Boot in detail; that is outside the scope of this chapter. Readers already familiar
    with Java or Spring should have no problem getting started by visiting the Spring
    Boot home page.


    ### Design Your First Hexagonal Microservice


    This section starts with a trimmed-down version of the hexagonal microservice
    view shown in Figure [1-13](#619782_1_En_1_Chapter.xhtml#Fig13). The same is shown
    in Figure [1-15](#619782_1_En_1_Chapter.xhtml#Fig15).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig15_HTML.jpg)


    A diagram illustrates how an end user interacts with a browser, which sends requests
    to a REST API. The REST API then interacts with a product rest controller and
    a product component. The product component accesses data from an in-memory DB,
    which is part of the `ecom-product-web-microservice`.


    Figure 1-15: Product web microservice


    Consider Figure [1-15](#619782_1_En_1_Chapter.xhtml#Fig15) using the language
    of ports and adapters. An HTTP port is used, which is nothing more than a specification
    of how the user’s browser can use the application core. This port (interface)
    belongs inside the business logic as a REST controller. The `Product` entity fulfills
    the application core. See Figure [1-16](#619782_1_En_1_Chapter.xhtml#Fig16).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig16_HTML.jpg)


    A diagram illustrates the relationship between two entities. `ProductCategory`
    and `Product`. `ProductCategory` has an `id`, `name`, `title`, `description`,
    and `imageUrl`. `Product` has a `productId`, `name`, `code`, `title`, and `price`.
    A dashed arrow connects the products to the product category.


    Figure 1-16: Product web microservice core entities


