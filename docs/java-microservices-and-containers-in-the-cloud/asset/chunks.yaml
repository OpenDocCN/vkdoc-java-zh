- fmt: '### Run Containers Using Docker Compose


    The `ch09\ch09-04` folder contains the scripts required to build and run these
    examples. The first step is to start a Minikube single-node Kubernetes cluster
    so that you have a Docker Daemon up. Refer to Appendix E for a quick reference
    to the container commands.


    Assuming the Minikube single-node Kubernetes cluster is up and running, Listing
    [9-33](#619782_1_En_9_Chapter.xhtml#PC40) shows the simple script that contains
    a single command to build and run the complete application with all the defined
    containers.


    ```

    docker-compose up

    Listing 9-33

    The Script to Build and Run Microservices Docker Containers (ch09\ch09-04\makeandrun.sh)

    ```


    Listing [9-34](#619782_1_En_9_Chapter.xhtml#PC41) builds the microservices and
    the Docker images and then runs the containers.


