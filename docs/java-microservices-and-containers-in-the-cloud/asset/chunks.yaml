    ## Helmfile Packaging Multi-Microservices


    In the last example, you used Helm to package and deploy the multi-microservices
    project. There you defined a generic Helm chart (template) and reused it across
    multiple microservices only by injecting specific values into the template. In
    that example, even though you used a single script called `run.sh`, to install
    or update a chart in a cluster, you need to run a specific imperative command.
    In other words, to change the state of a cluster, you need to run a command that
    is specific for a given deployment. Helm doesn’t have the feature to install,
    update, or roll back all applications from an entire cluster with a single command.


    Helmfile will help you here, because it allows you to declare a definition of
    an entire Kubernetes cluster in a single YAML file and bundle multiple Helm releases
    (installation of Helm charts). It releases them depending on the type of environment
    (develop, test, production) on which you want to deploy your applications.


    Let’s deploy the example you released using Helm in the previous section, but
    this time using Helmfile.'
