    metadata:

    labels:

    app: postgres

    type: db

    spec:

    volumes:

    - name: postgres-storage

    persistentVolumeClaim:

    claimName: postgres-persistent-volume-claim

    containers:

    - name: postgres

    image: postgres:15.3-alpine3.18

    ports:

    - containerPort: 5432

    envFrom:

    - configMapRef:

    name: postgres-config

    volumeMounts:

    - name: postgres-storage

    mountPath: /var/lib/postgresql/data

    Listing 10-44

    Pod Description for the PostgreSQL Database (ch10\ch10-02\postgres-deployment.yml)

    ```


    Note that the PostgreSQL pod is referring to the same `ConfigMap` the Product
    Server microservice referred to. In this manner, using the same credentials the
    PostgreSQL DB container has been instantiated with, the Product Server Microservice
    can connect to that database.


    Next, inspect the `persistentVolumeClaim`, as shown in Listing [10-45](#619782_1_En_10_Chapter.xhtml#PC47).


    ```

    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: postgres-persistent-volume-claim

    spec:

    accessModes:

    - ReadWriteOnce

    resources:

    requests:

    storage: 4Gi

    Listing 10-45

    Description for the persistentVolumeClaim for the PostgreSQL Database (ch10\ch10-02\postgres-pvc.yml)

    ```


    The last file you will inspect is the service definition for the PostgreSQL database,
    as shown in Listing [10-46](#619782_1_En_10_Chapter.xhtml#PC48).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: postgres

    labels:

    group: db

    spec:

    type: ClusterIP

    selector:

    app: postgres

    ports:

    - port: 5432

    targetPort: 5432

    Listing 10-46

    Description for the PostgreSQL Database Service (ch10\ch10-02\postgres-svc.yml)

    ```


    Only the Product Server microservice will access the PostgreSQL database from
    within the Kubernetes VM, so you only need a `ClusterIP`.


    ### Run Microservices in Kubernetes


    The `ch10\ch10-02` folder contains the scripts required to build and run these
    examples. The first step is to start a Minikube single-node Kubernetes cluster.
    Refer to Appendix E for a quick reference to the Kubernetes setup and commands.
    Subsequently, you also need to set the Minikube environment variables in your
    work terminal.


    Assuming that your single-node Kubernetes cluster Minikube is up and running,
    the simple script called `makeandrun.sh` contains all the commands needed to build
    and run the complete application with all the deployment descriptors, as shown
    in Listing [10-47](#619782_1_En_10_Chapter.xhtml#PC49).


    ```

    mvn -Dmaven.test.skip=true clean package

    docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t ecom/product-web
    .

    docker build  --build-arg JAR_FILE=01-ProductServer/target/*.jar -t ecom/product-server
    .

    kubectl create -f postgres-config.yml

    kubectl create -f postgres-pvc.yml

    kubectl create -f postgres-deployment.yml

    kubectl create -f postgres-svc.yml

    kubectl create -f product-server-deployment.yml

    kubectl create -f product-server-service.yml

    kubectl create -f product-web-deployment.yml

    kubectl create -f product-web-service.yml

    minikube service product-web --url

    sleep 3

    kubectl get pods

    kubectl get services

    Listing 10-47

    The Script to Build and Run Microservices in Kubernetes (ch10\ch10-02\makeandrun.sh)

    ```


    You can now execute this script, as shown in Listing [10-48](#619782_1_En_10_Chapter.xhtml#PC50).


    ```

