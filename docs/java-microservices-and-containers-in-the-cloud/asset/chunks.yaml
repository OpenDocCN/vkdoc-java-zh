- fmt: '### Docker Hub Registry and Repository


    As described previously, the component in Docker’s distribution system is the
    registry. Images that you build can be pushed and stored in a remote registry
    for others to use. The Docker Hub is an example of the publicly available registry.
    It is free and serves a huge, constantly growing collection of existing images.
    See Figure [7-18](#619782_1_En_7_Chapter.xhtml#Fig18).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig18_HTML.jpg)


    A screenshot of a web page with the Docker Hub Registry. The page has a search
    bar, a list of repositories, and a button to create a new repository.


    Figure 7-18


    Docker Hub Registry


    Figure [7-18](#619782_1_En_7_Chapter.xhtml#Fig18) shows the Docker Hub registry
    login interface and many image repositories in it. The repository is a collection
    (namespace) of related images, which provides different versions of the same application
    or service. It’s a collection of different Docker images with the same name and
    different tags. `product-web` is one such repository that I pushed as a result
    of the `jib build` command in Listing [7-25](#619782_1_En_7_Chapter.xhtml#PC28).
    Since the app is named `product-web` and my username (or namespace) for the registry
    is `binildas`, this image is placed in the `binildas/product-web` repository.
    See Figure [7-19](#619782_1_En_7_Chapter.xhtml#Fig19).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig19_HTML.jpg)


    A screenshot of a web page of a Docker repository named binildas slash product
    hyphen web. The repository does not have a description. The last push was 4 months
    ago with a public view button. It lists the docker commands and tags and scans
    details.


    Figure 7-19


    Docker repository


    You can select a specific tag of a repository and delete it. See Figure [7-20](#619782_1_En_7_Chapter.xhtml#Fig20).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig20_HTML.jpg)


    A screenshot of a web page reading a list of tags in a Docker repository. It lists
    the tag name, last time the tag was pushed, digest, operating system and architecture,
    last time the tag was pulled, and compressed size of the tag. A checkbox is next
    to each tag, and a delete button is at the top.


    Figure 7-20


    Deleting a Docker Repository


    ### Pull Image and Run Container


    The next step is to start the Minikube single-node Kubernetes cluster so that
    you have a Docker Daemon up. See Listing [7-26](#619782_1_En_7_Chapter.xhtml#PC29).


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ minikube start

    ...

    (base) binildass-MacBook-Pro:ch07-02 binil$

    Listing 7-26

    Start Minikube

    ```


    Next, set the Minikube environment variables in your terminal, as shown in Listing
    [7-27](#619782_1_En_7_Chapter.xhtml#PC30).


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/ch07/ch07-02

    (base) binildass-MacBook-Pro:ch07-02 binil$ eval $(minikube docker-env)

    (base) binildass-MacBook-Pro:ch07-02 binil$

    Listing 7-27

    Setting Minikube Environment

    ```


    Next, we will run the Product Web microservice in Docker.


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ docker run -it -p 8080:8080 binildas/product-web

