- fmt: '### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch09\ch09-01` folder. Much
    of the source code in this example is similar to `ch03\ch03-01`, which was explained
    in detail in Chapter 3 in the section titled “Microservices Using PostgreSQL and
    RestTemplate” and in Chapter 8 in the section titled “Microservice and PostgreSQL
    in Container.” You saw the deployment schema of these multiple interacting microservices
    using a PostgreSQL database in the previous chapter, so this section looks specifically
    into composing them using Docker Compose.


    Connecting from a containerized microservice to a containerized PostgreSQL server
    is rather straightforward, so there are very few changes to be made when running
    the containers alone. The next section investigates those changes.


    Listing 9-3 shows the source code organization for this example.


    ```

    ch09-01

    ├── 01-ProductServer

    │   ├── Dockerfile

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── 02-ProductWeb

    │   ├── Dockerfile

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── README.txt

    ├── clean.sh

    ├── docker-compose.yml

    ├── makeandrun.sh

    └── pom.xml

    Listing 9-3

    Example 09-01 Source Code Organization

    ```


    A concise representation of the source code organization for the example inside
    the `ch09-01` folder is shown in Listing 9-3. Of interest here are `docker-compose.yml`
    and the `Dockerfile` placed inside the two project folders.


    ```

    version: "3"

    services:

    db:

    image: "postgres:9.6-alpine"

    container_name: postgres-docker

    volumes:

    - product-data:/var/lib/postgresql/data

    ports:

    - 5432:5432

    environment:

    - POSTGRES_DB=productdb

    - POSTGRES_USER=postgres

    - POSTGRES_PASSWORD=postgre

    networks:

    - ecom-network

    server:

    build: ./01-ProductServer

    image: ecom/product-server

    container_name: product-server

    ports:

    - "8081:8081"

    depends_on:

    - "db"

    environment:

    - DB_SERVER=postgres-docker:5432

    - POSTGRES_DB=productdb

    - POSTGRES_USER=postgres

    - POSTGRES_PASSWORD=postgre

    networks:

    - ecom-network

    web:

    build: ./02-ProductWeb

    image: ecom/product-web

    container_name: product-web

    depends_on:

    - "server"

    ports:

    - "8080:8080"

    environment:

    - acme.PRODUCT_SERVICE_URL=http://product-server:8081/products

    networks:

    - ecom-network

    volumes:

    product-data:

    networks:

    ecom-network:

    Listing 9-4

    The Docker Compose YAML File (ch09\ch09-01\docker-compose.yml)

    ```


    There are three services defined here, each one an abstract definition of a computing
    resource within an application that can be scaled/replaced independent of other
    components. Each service is backed by a container and run by the platform according
    to the replication requirements and placement constraints. Each of these services
    backed by containers are defined by a Docker image and a set of runtime arguments.
    All containers within a service are identically created with these arguments.


    You need to build an image of the server and the web from the source code by reading
    its `Dockerfile`. You can use the `build` keyword, passing the path to the `Dockerfile`
    as the value. When you specify `./01-ProductServer` and `./02-ProductWeb`, you
    mention that relative to the current directory (where you have the `docker-compose.yml`),
    go in one more folder into each of these mentioned folders to find the corresponding
    `Dockerfile`.


    When the image you need for the service (as in the case of `db`) has already been
    published (by you or by others) in Docker Hub or another Docker Registry, it’s
    called using the `image` attribute, by specifying the image name and tag. But
    when you can specify the image name in conjunction with the `build` attribute,
    as in the case of server and web, you name the image, making it available to other
    services.


    To reach a container from the host, the ports of the services must be exposed
    declaratively through the `ports` keyword, as if you were using `8080` for `web`,
    `8081` for `server` and `5432` for `db`. This also allows you to choose to expose
    the port differently in the host, if required.


    The three containers—`web`, `server`, and `db`—communicate between themselves
    in networks created implicitly or through configurations by Docker Compose, as
    you do in the example. A service can communicate with another service on the same
    network by simply referencing it by container name and port (for example, `product-server:8081`),
    if you’ve made the port accessible through the `expose` keyword.


    Docker manages both anonymous and named volumes, automatically mounting them in
    self-generated directories in the host. `product-data` is a named volume accessible
    to the `db` service. `/var/lib/postgresql/data` is the path it’s mapped to, which
    will be used by the `postgres-docker` container.


    You might also need to create a dependency chain between these services, so that
    some services are loaded before (and unloaded after) the other ones. You can achieve
    this result through the `depends_on` keyword. You want the `db` to be loaded before
    you load the `server` because you have the initialization script in `server`,
    inserting the initial load data to the `db`.


    Providing the required environment variables is easy in Compose. You can define
    static and dynamic environment variables, the latter with the `${}` notation.
    For example: `DB_SERVER=postgres-docker:5432`.


    As explained, relative to the current directory (where the `docker-compose.yml`
    is located), the `Dockerfile` is found here:


    ```

    build: ./01-ProductServer

    ```


    Listing 9-5 shows this file.


    ```

    FROM maven:3.6.1-jdk-8-slim AS build

    RUN mkdir -p /workspace

    WORKDIR /workspace

    COPY pom.xml /workspace

    COPY src /workspace/src

    RUN mvn -f pom.xml clean package

    FROM openjdk:8-alpine

    COPY --from=build /workspace/target/*.jar app.jar

    EXPOSE 8081

    ENTRYPOINT ["java","-jar","app.jar"]

    Listing 9-5

    The Dockerfile (ch09\ch09-01\01-ProductServer\Dockerfile)

    ```


    A multi-stage build file is used here. With multi-stage builds, you can use multiple
    `FROM` statements in your `Dockerfile`. Each `FROM` instruction can use a different
    base, and each begins a new stage of the build. You can selectively copy artifacts
    from one stage to another.


    You can name your stages by adding an `AS <NAME>` to the `FROM` instruction. The
    name `build` is used in this example. This name can be used in the second stage
    in the `COPY` instruction. This means that even if the instructions in your `Dockerfile`
    are reordered later, the `COPY` doesn’t break.'
