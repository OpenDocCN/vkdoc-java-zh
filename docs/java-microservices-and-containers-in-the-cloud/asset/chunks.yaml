    Default locale: en_US, platform encoding: UTF-8

    OS name: "linux", version: "4.19.202", arch: "amd64", family: "unix"

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-11

    Running Maven Container

    ```


    Listing [7-11](#619782_1_En_7_Chapter.xhtml#PC12) creates a Maven container and
    runs the `maven` command in it. The `--rm` parameter will remove the container
    once the command has been completed.


    ### Creating a Maven Archetype


    In this section, you create a new web application project Product Web of type
    `maven-archetype-webapp`. See Listing [7-12](#619782_1_En_7_Chapter.xhtml#PC13).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run --rm -it -v $(pwd):/workfolder
    -w /workfolder maven mvn archetype:generate -DgroupId=com.acme.ecom.product -DartifactId=ProductWeb
    -DarchetypeArtifactId=maven-archetype-webapp -DinteractiveMode=false

    [INFO] Scanning for projects...

    Downloaded from central: ...

    ...

    [INFO] ---------------------------------------------------

    [INFO] Using following parameters for creating project from Old (1.x) Archetype:
    maven-archetype-webapp:1.0

    [INFO] ---------------------------------------------------

    [INFO] Parameter: basedir, Value: /workfolder

    [INFO] Parameter: package, Value: com.acme.ecom.product

    [INFO] Parameter: groupId, Value: com.acme.ecom.product

    [INFO] Parameter: artifactId, Value: ProductWeb

    [INFO] Parameter: packageName, Value: com.acme.ecom.product

    [INFO] Parameter: version, Value: 1.0-SNAPSHOT

    [INFO] project created from Old (1.x) Archetype in dir: /workfolder/ProductWeb

    [INFO] ---------------------------------------------------

    [INFO] BUILD SUCCESS

    [INFO] ----------------------------------------------------

    [INFO] Total time:  02:02 min

    [INFO] Finished at: 2022-05-26T14:53:54Z

    [INFO] ---------------------------------------------------

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-12

    Creating maven-archetype-webapp with the Maven Container

    ```


    `-v $(pwd):/workfolder` mounts the current directory as `/workfolder` in the container.
    `-w /workfolder` changes the current working directory for the container to `/workfolder`.
    When you run the `-DartifactId=ProductWeb` command, you will have a new project
    with a new directory called `ProductWeb`, which is created in the mounted volume.
    It’s preserved after you destroy the container, since the mounted directory is
    not within the container but actually refers to a folder in the host machine.


    There is a catch here. If you are using Docker Desktop or a similar Docker Daemon,
    you will find the newly project created in the `ProductWeb` folder in the host
    machine. However, this example uses a Docker Daemon inside Minikube, so to see
    the newly created project, you need to look inside the virtual machine hosting
    minikube. See Listing [7-13](#619782_1_En_7_Chapter.xhtml#PC14).


    ```

    (base) binildass-MacBook-Pro:~ binil$ pwd

    /Users/binil

    (base) binildass-MacBook-Pro:~ binil$ minikube ssh

    _             _

