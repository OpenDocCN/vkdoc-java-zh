    完成此示例中的测试用例后，你可以继续下一个示例，该示例旨在演示六边形架构的众多强大灵活性之一——即插即用。


    ## 使用 MongoDB 和 CrudRepository 的微服务


    本示例对你在第 2 章中看到的第一个微服务示例进行了调整，使其连接到 MongoDB，并使用 `CrudRepository` 代替 `MongoRepository`。你拥有相同的两个微服务——一个消费者微服务和一个提供者微服务——它们通过
    REST 协议相互通信。提供者微服务还与 MongoDB 进行交互。整体设计请参考第 2 章中的图 2-1。


    ### 重温六边形架构


    我复用了第 2 章图 2-1 中所示的六边形微服务视图。但是，你将使用 `CrudRepository` 而不是 `MongoRepository`。我想演示一个通用端口（本例中为带有
    `CrudRepository` 的被驱动端口）如何能够“使用合适的适配器进行适配”，以连接到不同类型的数据库——更具体地说，在本示例中连接到 MongoDB
    数据库。


    此外，我在上一个示例中引入了 `ProductOR` 实体。这样做的原因是我想演示，在使用端口和适配器架构时，你可以最大限度地重用核心实体和业务服务。换句话说，我想演示你将保留并重用上一个示例中的
    `Product` 实体，这将验证在运行时插入不同被驱动适配器的能力。

