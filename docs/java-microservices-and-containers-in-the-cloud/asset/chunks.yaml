- fmt: '### Eventually Consistent, Decentralized Systems


    I have initiated a discussion on how to make microservices eventually consistent.
    I have also discussed how to deal with the scenario when the `update inventory`
    database table is successful, but the `booking` microservices fails to create
    a booking in the `booking` database table. Now consider the converse scenario—what
    if the `inventory` microservice is not running and the `booking` microservices
    cannot complete the booking? This scenario occurs when the synchronous style REST
    invocation from the `booking` microservices to the `inventory` microservice cannot
    complete, so the booking creation will also fail.


    Figure [1-6](#619782_1_En_1_Chapter.xhtml#Fig6) shows an improvisation over the
    architecture shown in Figure [1-5](#619782_1_En_1_Chapter.xhtml#Fig5), by plugging
    in an event based channel.


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig6_HTML.jpg)


    An illustration of a decentralized architecture with service granularity, artifact
    packaging, and an event channel. It has multiple compute nodes for availability,
    booking, or inventory control. Data is stored in separate databases. The system
    is connected to a mobile app for user interaction.


    Figure 1-6


    Decentralized microservices


    Here, the microservices are not tightly coupled. Instead, you can use a loosely
    coupled JMS or AMQP style messaging protocol. The sequence of the flight booking
    business transaction could then be as follows:


    1.  The browser sends the user transaction to the business tier server.

    2.  Since the transaction is a flight booking, it is intercepted by the `booking`
    microservice. Before you perform the booking, the `Booking` module sends a “flight
    booked” message to the messaging channel.

    3.  The `booking` microservice will create a booking in its database table and
    provide the response to the end user.

    4.  The “flight booked” message will be picked up by any other interested microservices—the
    `inventory` microservice in this case.

    5.  The `inventory` microservices update the `inventory` database table and optionally
    sends a success or failure message to the messaging channel.


    It is possible to improve the reliability of this business transaction by keeping
    Steps 2 and 3 in the scope of a transaction. Regardless of that, one notable change
    in the design is that the business transaction is spanned across multiple microservices,
    and the successful completion of the transaction is determined by the overall
    completion of transactions by these different microservices, eventually. No single
    microservice is solely responsible for controlling the complete end-to-end flow.
    Instead, each microservice performs its own part, thus making the architecture
    truly decentralized.


    Note that this discussion assumed that enough inventory exists. There can be more
    complex scenarios in which inventory is limited, but this is beyond the scope
    here.


    ## Service Granularity


    A proper appreciation of the different levels of granularity for a services architecture
    will help you understand their possibilities and limitations, so this section
    looks at these service granularities.


    ### Monolith


    Figure [1-7](#619782_1_En_1_Chapter.xhtml#Fig7) illustrates a typical monolith
    architecture. In this architecture, the functional modules are only logically
    separated, but they are all physically packaged into a single `.ear` (enterprise
    archive) archive.


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig7_HTML.jpg)


    An architecture consists of four processes. Availability, checkout, booking, and
    inventory control with data stored in separate databases with the concept of service
    granularity and artifact packaging. The system is connected to a component named
    the central airline dot ear.


    Figure 1-7


    A monolith architecture


    Many times, a monolith architecture communicates with a database in a different
    node, and all the functional modules are coupled tightly to this single database.


    ### Macroservice


    The macroservice architecture shown in Figure [1-8](#619782_1_En_1_Chapter.xhtml#Fig8)
    is a packaging improvement over the monolith architecture.


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig8_HTML.jpg)


    An architecture consists of 4 processes. Availability, checkout, booking, and
    inventory control with data stored in separate databases with the concept of service
    granularity and artifact packaging in airline macro services. The system is connected
    to a component named the central airline dot ear.


    Figure 1-8


    A macroservice architecture


    In the macroservice architecture, different functional modules are packaged separately,
    into separate `.jar`s (Java archives). The deployment schema of a macroservice
    architecture is similar to that of a monolith. All of the Java archives are placed
    in a single `.ear` or `.war` (web archive) and then deployed in a single node.


    ### Mini Service


    A mini service architecture is a genuine attempt to improvise over a monolith
    or macroservice. Figure [1-9](#619782_1_En_1_Chapter.xhtml#Fig9) depicts a mini
    service architecture.


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig9_HTML.jpg)


    An illustration of an airline reservation system. It has different components
    with compute nodes, service granularity, and artifact packaging. `Availability.jar`
    and `checkout.jar` in `shopping.war`, and `booking.jar` and `inventory.jar` in
    `booking.war`. Data are stored in separate databases.


    Figure 1-9


    A mini service architecture


    As shown in Figure [1-9](#619782_1_En_1_Chapter.xhtml#Fig9), a mini service architecture
    will also package modules into separate archives, similar to a macroservice architecture.
    Further, some of these archives can also be packaged into separate deployable
    archives. However, in many cases, these deployment archives are deployed in the
    same node due to architectural constraints like dependent libraries, communication
    modes, and so on.


    ### Microservices


    The microservice architecture attempts to provide complete flexibility in terms
    of development, deployment, and release, as shown in Figure [1-10](#619782_1_En_1_Chapter.xhtml#Fig10).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig10_HTML.jpg)


    An illustration of an airline reservation system. It has different components
    with compute nodes, service granularity, and artifact packaging. Individual databases
    for availability, checkout, booking, and inventory. Each database performs processes,
    services, and inventory.


    Figure 1-10


    A microservice architecture


    One notable advantage of the microservices architecture is that it promotes polyglot
    technologies. This gives each microservice the flexibility to adopt its own implementation
    technology and architecture, yet still exposing and interacting with peer microservices
    using standard protocols.


    ## The Hexagonal Architecture Metaphor


    When learning about loosely coupled systems, especially in the context of microservices,
    it’s helpful to discuss the *hexagonal architecture*. I do that in this section.


    To understand this metaphor, I start the discussion with the typical layered architecture.


    ### Layered Architecture


    A layered architecture refers to the typical software architecture organization
    that’s followed to separate concerns, mainly those of communication, as shown
    in Figure [1-11](#619782_1_En_1_Chapter.xhtml#Fig11).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig11_HTML.jpg)


    An illustration represents a layered architecture with three layers. End-user,
    presentation, business, and data. The end user is depicted as a stick figure that
    interacts with the presentation layer. The presentation layer sits above the business
    layer, which in turn sits above the data layer.


    Figure 1-11


    Layered architecture


    In the layered architecture in Figure [1-11](#619782_1_En_1_Chapter.xhtml#Fig11),
    the top and bottom layers are simply entry/exit points to/from the application.'
