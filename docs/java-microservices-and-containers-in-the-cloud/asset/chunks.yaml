    \ .btn i {\n.table-title .btn span {\n.modal .modal-title {\n\ndata-toggle=\"\
    tooltip\" title=\"Edit\">&#xE254; &#xE872;\nProduct Details\n\nDelete Product\n\
    (base) binildass-MBP:ch15-01 binil$\nListing 15-17\nTesting the Service in EKS\
    \ Using cURL\n```\n\nNote\n\nDo not forget to release the AWS resources once your\
    \ testing is finished, because unreleased resources might drain your credit card!\n\
    \nOnce the testing is complete, you can destroy the cloud infrastructure using\
    \ the `terraform destroy` command, as in Listing [15-18](#619782_1_En_15_Chapter.xhtml#PC19).\n\
    \n```\n(base) binildass-MacBook-Pro:ch15-01 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch15/ch15-01\n\
