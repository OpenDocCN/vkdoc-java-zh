    ### 测试微服务容器


    微服务启动并运行后，即可访问 Product Web 微服务。但如附录 E 所述，您需要先获取 Minikube 的 IP 地址。请参见清单 8-10。


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:ch07-02 binil$

    清单 8-10

    查找 Minikube IP

    ```


