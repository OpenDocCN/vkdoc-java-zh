    { "_id" : ObjectId("61a5e3bc80e0e72c72097307"), "name" : "Mapple Mobile", "code"
    : "MAPPLE-EPHONE", "title" : "Mapple 7 inch, purple, 14px ....", "price" : 8000,
    "category" : "Mobile", "_class" : "com.acme.ecom.product.model.ProductOR" }

    { "_id" : ObjectId("61a5e3bc80e0e72c72097308"), "name" : "Mapple Tablet", "code"
    : "MAPPLE-PAD", "title" : "Mapple 11 inch , grey, 140px ....", "price" : 19000,
    "category" : "Tablet", "_class" : "com.acme.ecom.product.model.ProductOR" }

    >

    Listing 3-22

    Inspect MongoDB Server Using a Mongo Shell

    ```


    When all is set, you can access the web application using your browser. Point
    to this URL:


    `http://localhost:8080/product.html`


    To test the CRUD operations, follow the instructions described in the subsection,
    “Test the Microservices Using UI” in the last section of Chapter [1](#619782_1_En_1_Chapter.xhtml),
    titled “Your First Java Microservice.”


    It’s now time to consolidate your learning so far and introduce the next concept,
    the Onion architecture.


    ## The Onion Architecture


    The layering principle enables software architects to separate concerns. Software
    architects have been successfully building layered software architectures for
    decades, and today these layered principles have gained traction with the widespread
    adoption of the microservices architecture. Let’s look at what layering has to
    do with onions.


    ### Onion Architecture Design


    In the ports and adapters architecture explained in the previous chapters, you
    learned about defining abstract ports and adapters that shield the core business
    services and entities from the context and intent of the software. In other words,
    these ports and adapters isolate the software application core from the infrastructure
    and peripheral concerns by writing adapter code so that the infrastructure and
    peripheral code does not leak into the application core. The Onion architecture
    depicts enterprise applications with multiple layers, and some of these layers
    in the business logic might be recognizable from the principles of domain driven
    design. A typical Onion architecture is depicted in Figure [3-1](#619782_1_En_3_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_3_Chapter/619782_1_En_3_Fig1_HTML.jpg)


    A model diagram has a 4-layer concentric circle with entities, domain services,
    application services, and infrastructure layer dependency from the innermost to
    the outermost layer. The layers include model aggregates, progress, business service,
    controller, message listener, client, and browser and store with driver ports.


    Figure 3-1


    Onion architecture


    Referring to Figure [3-1](#619782_1_En_3_Chapter.xhtml#Fig1), the two core principles
    in software architecture are:


    *   Outer layers depend on inner layers

    *   Outer layers are transparent to inner layers


    Referring to Figure [3-1](#619782_1_En_3_Chapter.xhtml#Fig1), the direction of
    coupling of layers is toward the center, providing you with an independent object
    model (domain model), which in its core depends on nothing. This inner layer contains
    the data and the logic to manipulate data that is specific to the domain of the
    application itself.


    Many times, you’ll also encounter logic that involves multiple entities, and such
    domain logic may not belong to a specific entity. Such logic could also be reused,
    so that calls for another layer, called the Business Services layer. These Business
    services—aka domain services—have the role of receiving a set of entities and
    performing some business logic on them. Such domain services could aggregate more
    domain services and business entities too (refer to Figure [1-14](#619782_1_En_1_Chapter.xhtml#Fig14)
    in Chapter [1](#619782_1_En_1_Chapter.xhtml)).


    ### Onion vs. Hexagonal Architecture


    The ports and adapters defined in the hexagonal architecture are a means to isolate
    the software application core from the infrastructure and peripheral concerns.
    These peripherals could be a user interface, whatever type of user interface it
    might be, like a browser, a mobile device, a scanner, and so on. Similarly, infrastructure
    code could connect the application core to tools like a database, a third-party
    system, a printer, and so on. The infrastructure layer, which becomes the outermost
    onion ring, depicts this in the Onion architecture in Figure [3-1](#619782_1_En_3_Chapter.xhtml#Fig1).
    You can also visualize them as being placed in the boundary of the hexagon, as
    abstract ports and adapters.


    These ports and adapters are connected to the inner layers through what we call
    *application services*. These are technical services handling protocol and format
    transformations and optimizations. For example, a REST controller is an application
    service exposing entities as JSON through an HTTP transport. Similarly, persistence
    abstractions to a specific type of database could be done using a repository interface,
    as you saw in the first two examples in this chapter, which again are kinds of
    application services. Thus, this second layer of the onion are the inner, reusable
    layers.


    Having discussed enough theory, let’s look at some practical examples. If you
    turn back to the two previous examples in this chapter, you can visualize how
    the domain entities (`Product`) are reused across different persistence abstractions
    across a PostgreSQL and a MongoDB database, which are driven interfaces. I will
    now extend the same example further to demonstrate how ports can be defined to
    allow multiple driver abstractions. To be more specific, you have seen how a REST
    interface to the microservices provides fine abstractions as driver ports. I will
    plug in another port, one using a GraphQL technology, to the same microservices
    in the outermost ring of the onion so that inner rings of the same onion can be
    reused.


    ## GraphQL


    GraphQL is an open-source data query and manipulation language for APIs, and a
    runtime for fulfilling queries with existing data. GraphQL was developed internally
    by Facebook in 2012. The GraphQL project was later moved from Facebook to the
    newly established GraphQL Foundation, hosted by the non-profit Linux Foundation.
    I will quickly go through GraphQL so you can appreciate the next example in this
    chapter.'
