    filesystems. It allows files and directories of separate filesystems, known as
    *branches*, to be transparently overlaid, forming a single coherent filesystem.
    Several Linux distributions have chosen aufs as a replacement for UnionFS.


    A *union mount* is a mount that allows several filesystems to be mounted at one
    time and appear as one filesystem. The union mount overlays the filesystems on
    top of one another so that the resulting filesystem may contain files and subdirectories
    from any or all of the underlying filesystems. In Docker vocabulary, each of these
    filesystems is called an *image*.'
  trans: '

    ### 容器发展简史


    让我们简要回顾一下容器的发展史。大约在 2000 年，FreeBSD 系统中加入了 Jails，这是容器技术的早期实现。次年，Linux VServer 项目实现了在单台服务器上运行多个通用
    Linux 服务器的功能。它将用户空间环境划分为不同的单元——称为虚拟专用服务器——使得每个 VPS 对其内部运行的进程而言，看起来和感觉上都像一台真正的服务器。2006
    年，“通用进程容器”被提出。该技术后来更名为 Cgroups（控制组），它允许将进程分组，并确保每个组获得相应的内存、CPU 和磁盘 I/O 资源份额，同时防止任何一个容器独占这些资源。与此相辅相成的是内核命名空间的概念，它将进程与用户命名空间分离开来。用户命名空间允许进程拥有自己独立的用户集，并允许进程在容器内部拥有
    root 权限，但在容器外部则没有。2008 年，IBM 创建了 Linux 容器项目（LXC）。LXC 1.0 于 2014 年发布。SELinux 和
    Seccomp 是两个新特性：


    *   **Seccomp：** Seccomp 是一个 Linux 内核特性，用于限制任务可以使用的系统调用。这使得可以将利用率不高的 CPU 租借给不受信任的客户，而无需担心他们会滥用其他资源，这非常适合容器的使用场景。


    *   **SELinux：** SELinux 提供了一种访问控制方案，用于“标记进程、文件和设备，并定义被标记的进程如何与被标记的进程、文件和设备交互的规则”。Linux
    容器作为一组进程，非常适合使用 SELinux 进行加固，这是另一个映射到容器使用场景的理念。


    Docker 逐步构建在这些特性之上，并封装了 LXC 的用户空间工具，使开发者使用起来更加便捷。2015 年 6 月，Docker 公司在 Linux 基金会的支持下，将
    Docker 开源给了 OCI（开放容器倡议）。Docker 最初使用 LXC 驱动，后来转向了 `libcontainer`，后者现已更名为 `runc`。


    ### 容器内部原理


    命名空间是一个内核级别的特性。操作系统的这一功能允许在进程之间共享全局资源，如网络和磁盘。当全局资源被封装在命名空间中时，它们仅对运行在同一命名空间内的进程可见。例如，当你获取一部分磁盘并将其放入一个命名空间时，运行在另一个命名空间中的进程无法看到或访问它。类似地，一个命名空间中的进程无法访问分配给另一个命名空间的任何内存内容，以此类推。当然，命名空间
    A 中的进程无法看到或与命名空间 B 中的进程通信。通过这种方式，全局资源可以被虚拟化和隔离。Docker 正是以这种方式工作的——每个 Docker 容器都在自己的命名空间中运行，但与其他所有容器共享同一个内核。这种隔离之所以能实现，是因为内核知道分配给该进程的命名空间。在进行
    API 调用时，内核会确保该进程只能访问其自身命名空间内的资源。


    ### 虚拟化 vs. 容器化


    在了解了不同层次的虚拟化选项之后，本节将探讨其底层细节。参见图 7-2。


    ![](img/619782_1_En_7_Fig2_HTML.jpg)


    两张框图对比了虚拟机和容器。虚拟机拥有客户操作系统。容器拥有一个极简的客户操作系统。两者都包含二进制文件、库和应用程序。虚拟机运行在虚拟机监控器上，而容器运行在引擎上。


    图 7-2


    虚拟机 vs. 容器


    图 7-2 对比了虚拟化与容器化之间的异同。这里的讨论限于类型 2 虚拟化，它与容器化相比差异更明显，尽管几乎所有方面也适用于类型 1 虚拟化。


    在虚拟化的情况下，虚拟机管理器接管了 CPU 的 ring 0（在较新的 CPU 中也称为“根模式”），并拦截客户操作系统发出的所有特权调用，以营造出客户操作系统拥有自己硬件的假象。因此，虚拟化允许你在同一（单）个底层硬件上运行两个完全不同的操作系统。每个客户操作系统都要经历引导、内核加载等过程。客户操作系统无法完全访问主机操作系统或其他客户操作系统，因此不会造成混乱。这提供了更严格的安全性。


    现在你可能能够理解，虽然你可以在虚拟化硬件上运行多个操作系统，但你不能像在虚拟化中那样在容器中运行完全不同的操作系统。然而，你可以运行不同的 Linux 发行版，因为它们都共享同一个内核。这意味着，由于容器与主机共享同一个内核，你可以在
    Ubuntu 主机上运行 Arch 镜像。


    系统调用（通常缩写为 *syscall*）是程序向其执行所在的操作系统内核请求服务的编程方式。这可能包括与硬件相关的服务（例如，访问硬盘驱动器或访问设备的
    I/O 端口）、创建和执行新进程，以及与进程调度等内核核心服务进行通信。系统调用提供了进程与操作系统之间的基本接口。容器可以访问主机的内核。由于内核是与硬件通信的唯一部分，只要你的操作系统使用正确的系统调用，你就可以在容器内运行任何
    Linux 发行版。出于同样的原因，你不能在容器内运行 Windows，因为它不使用相同的系统调用。


    ## Docker 概念


    本节讨论 Docker 概念和 Docker 容器。


    ### 分层文件系统


    Docker 基于 *aufs*（*advanced multi-layered unification filesystem* 的缩写），它实现了 Unionfs，一种用于
    Linux 文件系统的联合挂载。Unionfs 是一种用于 Linux、FreeBSD 和 NetBSD 的文件系统服务，它为其他文件系统实现了联合挂载。它允许将来自不同文件系统（称为
    *分支*）的文件和目录透明地叠加在一起，形成一个单一、连贯的文件系统。一些 Linux 发行版已选择 aufs 作为 UnionFS 的替代品。


    *联合挂载* 是一种允许同时挂载多个文件系统并使它们看起来像一个文件系统的挂载方式。联合挂载将文件系统层层叠加，使得最终的文件系统可能包含来自任何一个或所有底层文件系统的文件和子目录。用
    Docker 的术语来说，这些文件系统中的每一个都被称为一个 *镜像*。

