    ## Composing Microservice with MongoDB Containers


    This example again reuses the microservices from the section titled “Microservices
    Using MongoDB with CrudRepository” in Chapter [3](#619782_1_En_3_Chapter.xhtml).
    It uses the same two microservices—a consumer and a provider microservice communicating
    with each other using the REST protocol. The provider microservice also interacts
    with a MongoDB. Chapter [8](#619782_1_En_8_Chapter.xhtml) showed a full-fledged
    microservice example interacting with a MongoDB database, all in Docker containers.
    Refer to Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter [2](#619782_1_En_2_Chapter.xhtml)
    for the overall design. In this section, you modify that example to be fully deployed
    within a container infrastructure using Docker Compose.


    ### Composing the Container Topology


    For this composition, you need a complete container-based deployment topology,
    as shown in Figure [9-2](#619782_1_En_9_Chapter.xhtml#Fig2). The Product Web and
    Product Server microservices are containerized, and the Product Server microservice
    will connect to a MongoDB database, again deployed within a container.


    ![](images/619782_1_En_9_Chapter/619782_1_En_9_Fig2_HTML.jpg)


    A diagram illustrates the microservice containers. It includes products web mu
    S, product server mu S, container engine, host O S, and hardware.


    Figure 9-2


    Composing microservice containers


    Here also, the Product Web and Product Server containers provide business services,
    whereas the PostgreSQL container provides application services for persisting
    state.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch09\ch09-02` folder. Much
    of the source code in this example is similar to `ch03\ch03-02`, which was explained
    in detail in Chapter [3](#619782_1_En_3_Chapter.xhtml), in the section titled
    “Microservices Using MongoDB and CrudRepository,” and in Chapter [8](#619782_1_En_8_Chapter.xhtml),
    in the section titled “Microservice and MongoDB Containers Using File Mount.”
    You saw the container-based deployment schema of these multiple interacting microservices
    in the previous chapter, so this section looks specifically into composing them
    using Docker Compose.


    Let’s start by looking at the `docker-compose.yml` file. The section describing
    the `web` service is the same as the one in Listing [9-4](#619782_1_En_9_Chapter.xhtml#PC5),
    so it’s not repeated here. The rest of the configuration is shown in Listing [9-14](#619782_1_En_9_Chapter.xhtml#PC19).


    ```

    version: "3"

    services:

    db:

    image: mongo:3.6

    container_name: mongo

    ports:

    - "27017:27017"

    volumes:

    - "db-data:/data/db"

    networks:

    - ecom-network

    server:

    build: ./01-ProductServer

    image: ecom/product-server

    container_name: product-server

    ports:

    - "8081:8081"

    depends_on:

    - "db"

    networks:

    - ecom-network

    environment:

    - spring.data.mongodb.uri=mongodb://192.168.64.5:27017/test

    web:

    ...

    volumes:

    db-data:

    driver: local

    driver_opts:

    o: bind

    type: none

    device: /home/docker/binil/mongodata

    networks:

    ecom-network:

    Listing 9-14

    The Docker Compose YAML File (ch09\ch09-02\docker-compose.yml)

    ```


    All the sections here are shown in the previous example and have been explained.
    Note that this example uses a named volume `db-data`, which uses a mounted folder
    from the host. You can reuse the folder created for the example in Chapter [8](#619782_1_En_8_Chapter.xhtml).
    The folder is auto-created in the Minikube VM, since I use Docker in Minikube
    in the example in Chapter [8](#619782_1_En_8_Chapter.xhtml). If you have difficulty
    in creating this folder, one easy hack is to execute the example in Chapter [8](#619782_1_En_8_Chapter.xhtml)
    and, without restarting the Minikube, try building this example. Remember, all
    of this will be lost when you stop the Minikube. Optionally, you can create a
    new folder, which is explained as the first step in next section. If you are using
    Docker in a host machine, you can manually create this folder too, but in the
    host machine.'
