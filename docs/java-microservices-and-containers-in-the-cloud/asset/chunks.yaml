    ├── product-web-deployment.yml

    └── product-web-service.yml

    清单 12-48

    示例 11-03 源代码组织结构

    ```


    对于两个业务服务，你可以看到需要多少个 YAML 文件。可以进行一些整合，例如将 Product Server 微服务的部署和服务定义合并到一个 YAML
    文件中，等等。但这仍然无法解决另一个问题——重复问题。如何避免复制粘贴主要文件内容，仅仅为了替换几个值？如果能够为两个业务对象（Product Server
    和 Product Web 微服务）定义一个模板，然后将值注入到特定字段中，那就太好了。Helm 在这方面可以帮到你。


    本示例的源代码组织结构如清单 12-49 所示，位于 `ch12\ch12-06` 文件夹中。这与你在第 11 章中看到的示例相同。现在你将使用 Helm
