    ## 总结


    从第 1 章中最简单的微服务开始，你已经走过了很长的路，理解了多种微服务架构变体。你已经尝试并测试了许多并发和集成模式，使用了熟悉的 SQL 和 NoSQL
    数据库。这些章节中的示例可以提取出来作为模板，并根据你的日常生产用例进行修改。现在，你已经为开始下一段旅程——容器化——做好了准备，这将在下一章中介绍。


