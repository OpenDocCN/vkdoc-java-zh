    ## Summary


    Containers are great at packaging, shipping, and getting the code executed from
    a target environment without having to set many application-specific settings
    on the target machine. You can treat a container as a black box. To demonstrate
    that, this chapter included examples of building, packaging, and executing Java
    code without a local Java SDK, but with just a Maven in a container! You also
    learned about various ways to handle containers in order to interact with simple
    microservices. You are now in a better position to appreciate what a container
    is. The next chapter covers more serious microservices, also using containers.


    # 8. Microservice Containers


    The initial chapters introduced microservices, which are self-contained, independent
    application units, each fulfilling related business functionalities from a specific
    domain. Each of them, or a collection of them together, can be considered an application
    in its own. In a multi-microservice application, you create many microservices
    for your app. What if you decide to build several microservices with different
    technology stacks? Your team will soon be in trouble, as developers have to manage
    even more environments than they would have been dealing with in a classical monolithic
    application development scenario. With Docker, it’s possible to manage, deploy,
    and even reduce performance overhead of hundreds if not thousands of microservices
    on the same server. Docker containers require fewer computing resources than virtual
    machines, and containers also provide required isolation so that disparate technologies
    can coexist, side by side. Thus, containers are a natural fit with microservices.


    Chapter [7](#619782_1_En_7_Chapter.xhtml) introduced how to run application containers
    using Docker images. This chapter continues that discussion, but with microservices
    examples that reflect real-life scenarios. Multiple microservices will interact,
    which means they need to communicate with each other. This chapter covers the
    following concepts:


    *   Microservice containers connecting with each other


    *   Microservice containers connecting to a PostgreSQL database on a host machine


    *   Microservice containers connecting to PostgreSQL in a container


    *   Microservice containers connecting to MongoDB in a container


    To understand inter-container communications, you need to understand the networking
    options between containers, which is covered next.


    ## Container Networking


    Docker provides different ways to configure networking so that your containers
    can communicate with the outside world, whether with another server or with another
    Docker container. The next section briefly looks at these options.


    ### Links


    When you install Docker, Docker defaults to a bridge network that is created automatically.
    Docker’s networking subsystem is pluggable, using drivers. Before Docker introduced
    the networking feature, the Docker link feature enabled containers to discover
    each other and securely transfer information about one container to another. With
    the introduction of the Docker networking feature, you can still create links,
    but they behave differently compared to the default bridge network and the other
    user-defined networks. Even though the link option works, it is a legacy feature.
    The first example uses links; however, this feature may eventually be removed
    so you are advised to use other options (network) for this functionality. One
    feature that user-defined networks do not support, which you can do with a link
    today, is share environment variables between containers. But volumes provide
    better options to share environment variables between containers in a more controlled
    way.


    ### Networks


    There are multiple types of networks. I only mention them here because detailed
    explanations are beyond the scope of this book.


    *   Bridge networks are best when you need multiple containers to communicate
    on the same Docker host.


    *   Host networks are best when the network stack should not be isolated from
    the Docker host, but you want other aspects of the container to be isolated.


    *   Overlay networks are best when you need containers running on different Docker
    hosts to communicate, or when multiple applications work together using swarm
    services.


    *   Macvlan networks are best when you are migrating from a VM setup or need your
    containers to look like physical hosts on your network, each with a unique MAC
    address.


    *   Third-party network plugins allow you to integrate Docker with specialized
    network stacks.


    You will look at working code soon so that you can learn by doing.


    Since you will be looking at multiple scenarios of container communications in
    this chapter, it makes sense to also understand how to inspect container logs,
    which is covered next.


    ## Container Logs


    You learned that Docker is an operating system-level virtualization platform and
    hence it allows you to run multiple applications containers in the same host at
    the same time. It facilitates the separation of applications and infrastructure,
    but when you have many applications in the same infrastructure, you need a way
    to troubleshoot when things don’t go as intended. Docker Logs helps you here.'
