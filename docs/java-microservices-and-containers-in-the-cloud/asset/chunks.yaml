- fmt: '### Understanding the Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized inside the `ch05\ch05-02` folder.
    This code is the same as the first example in this chapter, but it’s configured
    differently. This section looks at the changes in the consumer microservice—the
    Product Web microservice.


    The main parts of the Product Web microservice configuration are shown in Listing
    [5-25](#619782_1_En_5_Chapter.xhtml#PC33).


    ```

    server:

    port: 8080

    spring:

    ...

    kafka:

    bootstrap-servers: localhost:9092

    consumer:

    auto-offset-reset: earliest

    group-id: product-web

    kafka:

    topic:

    product:

    request: product-req-topic

    pinnedToPartition: false

    reply: product-req-reply-topic

    request-reply:

    timeout-ms: 60000

    product:

    topic:

    request:

    numPartitions: 3

    Listing 5-25

    Configuration for the Product Web Microservice (ch05\ch05-02\02-ProductWeb\src\main\resources\application.yml)

    ```


    The `pinnedToPartition` is configured with `false`, since you leave the assignment
    of Product Web microservice instances to the available partitions in the underlying
    library.


    You can configure values for the `appName` through the `run` scripts in the root
    folder of the Product Web microservice:


    ```

    -Dspring.application.name=product-web-1

    -Dspring.application.name=product-web-2

    -Dspring.application.name=product-web-3

    ```


    Since the `pinnedToPartition` is configured with `false`, you are not leveraging
    the `appName` for any partition stickiness, so it doesn’t matter whether you configure
    the same values or different values for the `spring.application.name`.


    In Listing [5-25](#619782_1_En_5_Chapter.xhtml#PC33), you may notice the configuration
    `numPartitions: 3`. The number is arbitrary, but it should be more than the number
    of (instances of) requester microservices, since otherwise the system will throw
    errors. The number of instances for the Product Server microservices is also three.


    ### Build and Run the Microservice Parallel Processing


    The `ch05\ch05-02` folder contains the Maven scripts required to build the examples.
    As a first step, you need to bring up the Kafka broker. Refer to Appendix D to
    learn how to set up Kafka server and bring it up. Subsequently, you also need
    to build and install the utility library from Callista Enterprise, as mentioned
    in the previous example in this chapter.


    Next, take six command terminals—three for the Product Server and three for the
    Product Web microservice—and change the directory to the top-level folder of both
    microservices.


    Build the Product Server microservice using the `make.sh` scripts, as shown in
    Listing [5-26](#619782_1_En_5_Chapter.xhtml#PC35).


    ```

    binildass-MacBook-Pro:01-ProductServer binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch05/ch05-02/01-ProductServer

    binildass-MacBook-Pro:01-ProductServer binil$ sh make.sh

    [INFO] Scanning for projects...

    [INFO]

    ...

    Listing 5-26

    Commands to Build the Product Server Microservice

    ```


    Next, build the Product Web microservice, as shown in Listing [5-27](#619782_1_En_5_Chapter.xhtml#PC36).


    ```

    binildass-MacBook-Pro:01-ProductServer binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch05/ch05-02/02-ProductWeb

