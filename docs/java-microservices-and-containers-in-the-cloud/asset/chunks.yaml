- fmt: '### Dockerizing the Microservice Using Jib


    `Jib` is an open-source Java tool maintained by Google for building Docker images
    of Java-based applications. `Jib` simplifies containerization, since with it,
    you don’t need to write a `Dockerfile` (you will learn what a `Dockerfile` is
    in the next section), which you saw in the previous example. Moreover, you don’t
    even have to have Docker installed to create and publish Docker Images. Google
    publishes `Jib` as both a Maven and a Gradle plugin—you use Maven here.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch07\ch07-02` folder. Much
    of the source code in this example is similar to that in `ch01\ch01-01`. This
    section does not discuss the code of the microservice since it’s described in
    Chapter [1](#619782_1_En_1_Chapter.xhtml), but it does look into the deployment
    aspects. `Jib` will catch any changes you make to the source code of your application
    each time you build. This saves you separate Docker build/push commands and simplifies
    adding this to a CI pipeline, but I do not expand on those aspects. You also need
    to set yourself up locally to authenticate with the Docker repository you want
    to deploy to. This is done in the Maven `settings.xml` file, as shown in Listing
    [7-22](#619782_1_En_7_Chapter.xhtml#PC23).


    ```

    (base) binildass-MacBook-Pro:~ binil$ vi /Users/binil/.m2/settings.xml

    ...


    registry.hub.docker.com

    binildas

    ********


    ...

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-22

    Maven Settings File

    ```


    As you might have guessed, I created an account in the Docker Hub public repository,
    whose credentials I configured in Listing [7-22](#619782_1_En_7_Chapter.xhtml#PC23).
    Further, the Maven plugin configuration is shown in Listing [7-23](#619782_1_En_7_Chapter.xhtml#PC24).


    ```

    com.google.cloud.tools

    jib-maven-plugin

    3.4.1


    Listing 7-23

    The Maven Module Configurations (ch07\ch07-02\pom.xml)

    ```


    `Jib` makes a number of reasonable guesses about what you want, like the `FROM`
    and the `ENTRYPOINT` (which you look at next section). Spring Boot exposes port
    `8080` by default, but if you want to make your application run on port `8081`
    and make it exposable through a container, you can do this by configuring `jib`
    and making appropriate changes in Boot. Further, you can use `Jib` to make it
    exposable in the image. Also, by default, `Jib` uses the distro-less Java image.
    If you want to run the application on a different base image, such as `alpine-java`,
    you can configure it in a similar way. This section does not go into any of these
    options, but shows the Docker Hub configuration alone, as in Listing [7-24](#619782_1_En_7_Chapter.xhtml#PC25).


    ```

    org.springframework.boot


    spring-boot-maven-plugin


    com.google.cloud.tools

    jib-maven-plugin

    3.2.0


    registry.hub.docker.com/binildas/product-web


    Listing 7-24

    The Maven Build Configurations (ch07\ch07-02\02-ProductWeb\pom.xml)

    ```


    ### Build and Push Images to Docker Hub


    The `ch07\ch07-02` folder contains the Maven scripts required to build, containerize,
    and push an image to Docker Hub.


    With the `Jib` plugin, you can use your local Docker instance to build the image
    from the configuration using this command:


    ```

    mvn compile jib:dockerBuild

    ```


    However, you can even build your image without the locally running Docker:


    ```

    mvn compile jib:build

    ```


    This is shown in Listing [7-25](#619782_1_En_7_Chapter.xhtml#PC28).


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/ch07/ch07-02

    (base) binildass-MacBook-Pro:ch07-02 binil$ mvn compile jib:build

