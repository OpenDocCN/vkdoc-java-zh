    public class Application {

    private static final Logger LOGGER =

    LoggerFactory.getLogger(Application.class);

    private static volatile long times = 0L;

    private static String appVersion = "1";

    @RequestMapping("/")

    public String home() {

    LOGGER.info("Start");

    ++times;

    LOGGER.debug("Inside hello.Application.home() :

    Counted {} times by App Version: {}", times,

    appVersion);

    LOGGER.info("Returning...");

    return "Hello Docker World : Counted " + times +

    " times by App Version: " + appVersion;

    }

    public static void main(String[] args) {

    SpringApplication.run(Application.class, args);

    LOGGER.info("Started...");

    }

    }

    清单 13-3

    Application REST 控制器 (ch13/ch13-01/src/main/java/com/acme/ecom/product\Application.java)

    ```


    在清单 13-3 的 Java 类文件中引入了一个 `appVersion` 字段。你将修改此字段以了解 Skaffold 的 CI/CD 功能。


    接下来，查看 Skaffold 描述符，如清单 13-4 所示。


    ```

    apiVersion: skaffold/v1beta4

    kind: Config

    build:

    local:

    push: false

    artifacts:

    - image: binildas/spring-boot-docker-k8s-helm

    # jibGradle: {}

    jibMaven: {}

    deploy:

    kubectl:

    manifests:

    - k8s/*.yml

    清单 13-4

    Skaffold 描述符 (ch13/ch13-01/skaffold.yaml)

    ```


    这里解释几个描述符字段：


    *   `build.local.push`: False 强制 Skaffold 使用 `jibDockerBuild`。


    *   `build.artifacts` 是你要构建的镜像列表。


    *   `build.artifacts.jibMaven` 配置 Skaffold 在镜像构建阶段使用 `jib`，类型为 `maven`，因为你使用 Maven
    作为构建工具。


    *   `deploy.kubectl.manifests` 设置存放 Kubernetes 清单文件的文件夹名称。如果省略此属性，默认目录名称为 `k8s`。


    你在这个开发环境中几乎完成了 CI/CD 管道的设置。


    ### 构建并运行微服务


    `ch13\ch13-01` 文件夹包含构建和运行示例所需的 Maven 脚本。你将使用 `mvn clean compile jib:build` 命令进行构建，如清单
    13-5 所示。


    ```

