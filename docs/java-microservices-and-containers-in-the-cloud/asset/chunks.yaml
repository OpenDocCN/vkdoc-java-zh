    This completes the first example. This example has attempted to demonstrate many
    of the concepts covered in the book so far. For the completeness of this discussion,
    the next section covers a PostgreSQL version of this example.


    ## CRUD Microservices Over Kafka on PostgreSQL


    This example tweaks the same set of microservices you saw in the previous section.
    A consumer and provider microservice communicate with each other using Kafka as
    the messaging channel. The provider microservice stores the entity in a PostgreSQL
    database instead of in MongoDB. When the browser sends a request to the first
    (consumer) microservice, it uses async HTTP. Even though the code uses async HTTP,
    it emulates a sync-style user experience at the browser level.


    As with the previous example, this example aims to demonstrate multiple instances
    of the consumer and provider microservices and uses multiple clients while testing
    this service.


    ### Design CRUD Over Async Channel on PostgreSQL


    This example uses the modified version of the hexagonal microservice view shown
    in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter [2](#619782_1_En_2_Chapter.xhtml),
    which was revisited in Chapter [5](#619782_1_En_5_Chapter.xhtml) and tweaked slightly
    in the previous example. Here, both microservices communicate through an async
    channel. The example uses Apache Kafka as the messaging channel, which is inherently
    asynchronous.


    ![](images/619782_1_En_6_Chapter/619782_1_En_6_Fig3_HTML.jpg)


    A microservice design starts with the user, followed by browser, rest A P I, product
    web microservice instances, and product server microservice instances.


    Figure 6-3


    Microservice design over async channel using partitions


    The noticeable change from the previous example is that the provider microservice
    stores the entity in a PostgreSQL database instead of using a MongoDB database.
    This change is marked in Figure [6-3](#619782_1_En_6_Chapter.xhtml#Fig3).


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch06\ch06-02` folder.


    The only change in the code from the previous example is that the provider microservice
    stores the entity in a PostgreSQL database instead of using a MongoDB database.
    The code needed for the provider microservice to store the entity in a PostgreSQL
    database and perform complete CRUD operations is described in detail in the section
    titled “Understanding the Code” in the first example in Chapter [3](#619782_1_En_3_Chapter.xhtml).
    You are directed to refer to that section for explanations.'
