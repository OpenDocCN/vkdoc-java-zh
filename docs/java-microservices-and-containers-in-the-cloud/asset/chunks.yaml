    # 9. 编排多服务容器


    随着微服务应用发展到包含多个服务时，我们通常需要某种方式来定义这些服务之间的相互依赖和互联选项。同时，我们也需要一种优雅的方式来管理这些服务。像 Docker
    Compose 和 Kubernetes 这样的工具已迅速成为满足这类需求的常见选择。本章将介绍 Docker Compose，下一章则会介绍 Kubernetes。


    Docker Compose 用于轻松定义和运行多容器的 Docker 应用或微服务。在前两章中，你已经学习了如何有效利用 Docker 将应用容器化。对于微服务而言，任何简单的应用都可能包含十几个微服务，这比传统的单个
    `.ear` 或单个 `.jar` 这类单体部署要多得多。借助 Docker Compose，你可以使用一个 YAML 文件来配置微服务应用的服务。然后，只需一条命令，就能从
    YAML 配置中创建并启动所有服务。本章涵盖以下概念。


    *   Docker Compose 快速入门


    *   将微服务和数据库容器编排在一起


    *   向编排中添加消息代理容器


    *   演示跨编排容器的完整 CRUD 功能


    如前所述，目标是逐步增加复杂度来讲解和演示各个方面。因此，代码示例将从上一章结束的地方开始。最好在阅读本章之前先阅读第 8 章，这样你就能熟悉运行容器基础设施的基础知识。如果你想直接开始本章内容，本章也提供了分步说明。


    ## 介绍 Docker Compose


    如前所述，使用 Docker 进行容器化时，管理许多不同的容器很快就会变得繁琐。Docker Compose 是一个帮助你克服这个问题并同时处理多个容器的工具。


    使用 Docker Compose 进行打包和部署管理基本上是一个三步过程：


    1.  使用 Dockerfile 定义应用的环境，以便它可以在任何地方重现。


    2.  在 `docker-compose.yml` 中定义组成应用的服务，以便它们可以在隔离的环境中一起运行。


    3.  作为最后一步，运行 `docker compose up`，此命令将启动并运行你的整个应用。


    下一节将深入探讨这个编排文件的结构。


    ### Docker Compose YAML


    在 Docker Compose 中，你在一个 `docker-compose.yml` 配置文件中声明规则。这些 YAML 规则既易于人类阅读，又针对机器进行了优化，因此足以让你声明多个容器的相互依赖关系。这有助于你在单个应用的部署场景中管理多个微服务。


    在 Docker Compose YAML 文件中，你需要指定 Compose 文件格式的版本、至少一个服务，以及可选的卷和网络。通用格式如清单 9-1 所示。


    ```

    version: "3"

    services:

    ...

    ...

    volumes:

    ...

    networks:

    ...

    清单 9-1

    Docker Compose YAML 格式

    ```


    如前几章所述，卷是主机计算机上磁盘空间的物理区域，在主机和容器之间，甚至在容器之间共享。换句话说，卷是主机中的一个共享目录，可以被有权访问的容器看到。


    网络定义了容器之间以及容器与主机之间的通信路径和规则。共享或公共的网络区域将使容器的服务能够相互发现，而私有区域则会将它们隔离到虚拟沙箱中。


    服务通常是相关容器服务的逻辑分组。例如，可以声明一个具有不同层的 Web 应用，如清单 9-2 所示。


    ```

    services:

    app:

    image: my-js-app

    ...

    backend:

    image: my-boot-app

    ...

    db:

    image: mongo

    ...

    清单 9-2

    Docker Compose 编排典型的三层服务


    Docker Compose 中还有更多可用的结构，按照本书的主题，你将通过实践来学习。


    ### Docker Compose 使用场景


    尽管有更多工具可用于管理容器化应用，但 Docker Compose 在以下几种场景中仍有其用途，例如：


    *   **开发环境**：Docker Compose 的最佳用例之一是帮助开发者“快速上手”，这对于项目的新成员非常有用。Docker Compose 可以将多页的“开发者入门指南”简化为一个机器可读的
    Compose 文件和几个命令，任何人都可以通过一个按钮启动。Docker Compose 文件提供了一种方式来记录和配置应用的所有服务依赖项（数据库、消息队列、缓存、Web
    服务 API、表示层应用等）。使用 Compose 命令行工具，你可以通过一个 `docker-compose up` 命令为每个依赖项创建并启动一个或多个容器。


    *   **自动化测试环境**：测试自动化是任何持续部署或持续集成流程的重要组成部分，Docker Compose 提供了一种便捷的方式来创建和销毁为你的测试套件自定义定义的测试环境。


    你可以通过 Compose 文件中的几个命令来创建和销毁这些环境：


    ```

    docker-compose up

    ./run_your tests

    docker-compose down

    ```


    如前所述，你将通过实践来获得最佳学习效果，所以让我们直接进入具体的编码示例。


    ## 使用 PostgreSQL 容器编排微服务


    第 8 章解释了为什么最好将包括数据库在内的状态处理应用部署在 Docker 容器之外，因为容器被设计为在无状态操作中更高效。但在某些用例中，你可能仍然希望将数据库放在容器内，例如在快速测试的情况下。在第
    8 章中，你看到了一个完整的微服务与 PostgreSQL 数据库交互的示例，所有内容都在 Docker 容器中。请参考第 2 章的图 2-1 了解其整体设计。在本节中，你将修改该示例，使其使用
    Docker Compose 完全部署在容器基础设施中。


    ### 编排容器拓扑


    对于此编排，你需要一个完整的基于容器的部署拓扑，如图 9-1 所示。Product Web 和 Product Server 微服务都已容器化，而 Product
    Server 微服务将连接到同样部署在容器内的 PostgreSQL 数据库。


    ![](img/619782_1_En_9_Fig1_HTML.jpg)


    此图展示了完整的基于容器的部署。它从用户开始，依次是浏览器、命令行、Docker CLI、Docker 守护进程、容器引擎、主机操作系统和硬件。


    图 9-1


    编排微服务容器


    在这里，Product Web 和 Product Server 容器提供业务服务，而 PostgreSQL 容器则提供用于持久化状态的应用程序服务。

