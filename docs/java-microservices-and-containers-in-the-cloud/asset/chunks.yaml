    ### 测试微服务


    首先需要找到 Minikube 的 IP 地址，如清单 12-6 所示。微服务启动后，你可以通过浏览器访问以下 URL 来使用 Web 应用程序：


    `http://192.168.64.6:8080/`


    或者，你也可以使用 cURL 来访问微服务，如清单 12-5 所示。

