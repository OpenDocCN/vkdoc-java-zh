- fmt: "### Build and Spin Your EKS Cluster in AWS\n\nTo form an EKS cluster in AWS,\
    \ you need to go to the root folder `ch15\\ch15-01` and run the `terraform init`\
    \ command first. See Listing [15-8](#619782_1_En_15_Chapter.xhtml#PC8).\n\n```\n\
    (base) binildass-MacBook-Pro:ch15-01 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch15/ch15-01\n\
    (base) binildass-MacBook-Pro:ch15-01 binil$ terraform init\nInitializing the backend...\n\
    ...\n(base) binildass-MacBook-Pro:ch15-01 binil$\nListing 15-8\nTerraform init\n\
    ```\n\nYou then sanity check your code. See Listing [15-9](#619782_1_En_15_Chapter.xhtml#PC9).\n\
    \n```\n(base) binildass-MacBook-Pro:ch15-01 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch15/ch15-01\n\
    (base) binildass-MacBook-Pro:ch15-01 binil$ terraform validate\nSuccess! The configuration\
    \ is valid.\n(base) binildass-MacBook-Pro:ch15-01 binil$\nListing 15-9\nTerraform\
    \ validate\n```\n\nThe `plan` command lets you see what Terraform will do before\
    \ making any changes, as shown in Listing [15-10](#619782_1_En_15_Chapter.xhtml#PC10).\n\
    \n```\n(base) binildass-MacBook-Pro:ch15-01 binil$ terraform plan\nListing 15-10\n\
    Terraform plan\n```\n\nThe `apply` command shows you the same plan output and\
    \ asks you to confirm whether you want to proceed with this plan, as shown in\
    \ Listing [15-11](#619782_1_En_15_Chapter.xhtml#PC11).\n\n```\n(base) binildass-MacBook-Pro:001-aws-eks-tf\
    \ binil$ terraform apply\naws_eks_node_group.demo: Creation complete after 2m12s\
    \ [id=bdca-tf-eks-01:demo]\nApply complete! Resources: 18 added, 0 changed, 0\
    \ destroyed.\nOutputs:\nconfig_map_aws_auth = <<EOT\napiVersion: v1\nkind: ConfigMap\n\
    ...\nEOT\n(base) binildass-MacBook-Pro:001-aws-eks-tf binil$\nListing 15-11\n\
    Terraform apply\n```\n\nYou can now apply the commands mentioned previously in\
    \ Steps 3 and 4 (configure `kubectl` for EKS and Join the worker nodes to Kubernetes\
    \ cluster). Then watch the status of your nodes and wait for them to reach the\
    \ `Ready` status. Refer to Appendix F for more information.\n\n## Deploying Containers\
    \ in AWS EKS\n\nThis example uses a relatively simple microservice you have seen\
    \ in this book, from `ch01/ch01-01/`. I assume that you have executed the required\
    \ commands, in Listings [7-41](#619782_1_En_7_Chapter.xhtml#PC41) through [7-43](#619782_1_En_7_Chapter.xhtml#PC43)\
    \ in Chapter [7](#619782_1_En_7_Chapter.xhtml), and that you already have the\
    \ `binildas/product-web` image in the public Docker Hub.\n\nYou will use this\
    \ image in Docker Hub and deploy it to the AWS EKS.\n\n> **Note**  \n> This example\
    \ assumes that `kubectl` is configured for the EKS cluster.\n\nYou might have\
    \ noticed that `product-deployment.yaml` and `product-service.yaml` are already\
    \ in the EKS terraform project root folder `ch15/ch15-01/`. They are shown in\
    \ Listings [15-12](#619782_1_En_15_Chapter.xhtml#PC12) and [15-13](#619782_1_En_15_Chapter.xhtml#PC13).\n\
    \n```\napiVersion: v1\nkind: Service\nmetadata:\nname: product-service-loadbalancer\n\
    spec:\ntype: LoadBalancer\nselector:\napp: product\nports:\n- protocol: TCP\n\
    port: 8080\ntargetPort: 8080\nListing 15-13\nProduct Web Microservice Service\
    \ Description (ch15/ch15-01/product-service.yaml)\n```\n\n```\napiVersion: apps/v1\n\
    kind: Deployment\nmetadata:\nname: product-deployment\nlabels:\napp: product\n\
    spec:\nreplicas: 1\nselector:\nmatchLabels:\napp: product\ntemplate:\nmetadata:\n\
    labels:\napp: product\nspec:\ncontainers:\n- name: product\nimage: binildas/product-web\n\
    ports:\n- containerPort: 8080\nListing 15-12\nProduct Web Microservice Deployment\
    \ Description (ch15/ch15-01/product-deployment.yaml)\n```\n\nYou can now deploy\
    \ the specified microservice, as shown in Listing [15-14](#619782_1_En_15_Chapter.xhtml#PC14).\n\
    \n```\n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l 'app=nginx' -o\
    \ wide | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNo resources found in\
    \ default namespace.\n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l\
    \ 'app=product' -o wide | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNo resources\
    \ found in default namespace.\n(base) binildass-MBP:ch15-01 binil$ kubectl apply\
    \ -f product-deployment.yaml\ndeployment.apps/product-deployment created\n(base)\
    \ binildass-MBP:ch15-01 binil$ kubectl get pods -l 'app=product' -o wide | awk\
    \ {'print $1\" \" $3 \" \" $6'} | column -t\nNAME                            \
    \    STATUS             IP\nproduct-deployment-84b9777c5-9kpz8  ContainerCreating\
    \  \n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l 'app=product' -o\
    \ wide | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNAME                 \
    \               STATUS   IP\nproduct-deployment-84b9777c5-9kpz8  Running  10.0.0.180\n\
    (base) binildass-MBP:ch15-01 binil$\nListing 15-14\nDeploying a Product Web Microservice\
    \ Image into EKS (ch15/ch15-01/product-deployment.yaml)\n```\n\nAs shown in Listing\
    \ [15-14](#619782_1_En_15_Chapter.xhtml#PC14), you first assert that you don’t\
    \ have any valid deployments in your newly formed EKS and subsequently deploy\
    \ the new container. Once the deployment is ready, you can then deploy the service\
    \ definition. See Listing [15-15](#619782_1_En_15_Chapter.xhtml#PC15).\n\n```\n\
    (base) binildass-MBP:ch15-01 binil$ kubectl get svc\nNAME         TYPE       \
    \ CLUSTER-IP   EXTERNAL-IP   PORT(S)   AGE\nkubernetes   ClusterIP   172.20.0.1\
    \           443/TCP   11m\n(base) binildass-MBP:ch15-01 binil$ kubectl create\
    \ -f product-service.yaml\nservice/product-service-loadbalancer created\n(base)\
    \ binildass-MBP:ch15-01 binil$ kubectl get svc\nNAME                         \
    \  TYPE           CLUSTER-IP      EXTERNAL-IP           PORT(S)          AGE\n\
    kubernetes                     ClusterIP      172.20.0.1                     \
    \ 443/TCP          12m\nproduct-service-loadbalancer   LoadBalancer   172.20.15.199\
    \   a2473f05176a6444bb676cf3927fd363-1434093128.ap-southeast-1.elb.amazonaws.com\
    \         8080:32087/TCP   49s\n(base) binildass-MBP:ch15-01 binil$\nListing 15-15\n\
    Exposing Product Web Microservice Service in EKS (ch15/ch15-01/product-service.yaml)\n\
    ```\n\nOnce all is set, you are ready to test the example. You can also view the\
    \ EKS console using the appropriate URL formation, which in my case is as follows:\n\
    \n```\nhttps://ap-southeast-1.console.aws.amazon.com/eks/home?region=ap-southeast-1#/clusters\n\
    ```\n\n### Testing the Microservice in EKS\n\nOnce the microservice is up in the\
    \ EKS cluster in the AWS Cloud, you can access the web application by using your\
    \ browser. Point to the application URL, which you can determine from the AWS\
    \ UI console.\n\nYou can test the microservice using the URL in Listing [15-16](#619782_1_En_15_Chapter.xhtml#PC17)\
