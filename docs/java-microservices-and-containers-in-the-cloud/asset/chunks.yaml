    ## 在 k8s 中通过 Kafka 与 MongoDB 实现微服务


    在此示例中，你将调整第 6 章“基于 MongoDB 的 Kafka CRUD 微服务”一节以及第 9 章“使用 MongoDB 容器组合微服务”一节中的同一组微服务。一个消费者微服务和一个提供者微服务使用
    Kafka 作为消息通道进行通信。提供者微服务将实体存储在 MongoDB 数据库中。当浏览器向第一个（消费者）微服务发送请求时，它使用异步 HTTP。尽管使用了异步
    HTTP，但该示例在浏览器层面模拟了同步风格的用户体验。


    本节将通过消费者和提供者微服务的多个实例来演示此示例，并且在测试服务时你还会使用多个客户端。


    ### 设计微服务编排拓扑


    此示例使用了第 9 章图 9-4 中所示六边形微服务视图的修改版本。微服务通过异步通道进行通信。Apache Kafka 本质上是异步的，被用作消息通道。请参见图
    11-2。


    ![](img/619782_1_En_11_Fig2_HTML.jpg)


    一个 3D 模型图，展示了连接到浏览器的用户、Product Web 微服务、带有事件队列和分区 1 与 2 的 Kafka 基础设施服务、Product
    Server 微服务、容器引擎、主机操作系统和硬件。Product Web 包含 3 个业务服务，Product Server 包含 3 个业务服务和 1
    个应用服务。


    图 11-2


    微服务的 Kubernetes 编排拓扑


