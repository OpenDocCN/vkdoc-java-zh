- fmt: '### Microservices Are Autonomous


    You know that microservices communicate each other, since a single microservice
    alone may not be sufficient to fulfill an end-to-end business use case. At the
    same time, one of the goals of the microservices architecture is that each microservice
    is autonomous and is available to the client consumer, even when the other microservices
    that are part of the end-to-end application flow are down or unhealthy. This is
    in addition to the basic principle that a microservice owns and encapsulates its
    own data.


    When microservices communicate using REST in the typical synchronous style, they
    are said to be communicating in a point-to-point fashion. Thus, an HTTP transport
    is a point-to-point channel, which ensures that only one receiver will receive
    a particular message (see Figure [4-1](#619782_1_En_4_Chapter.xhtml#Fig1)).


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig1_HTML.jpg)


    A diagram of a Point-to-point communication system. It depicts a sender on the
    left, that sends a request to a receiver.


    **Figure 4-1** Point-to-point communication


    Figure [4-1](#619782_1_En_4_Chapter.xhtml#Fig1) represents an Order microservice.
    The order is created and then sent to the Dispatch microservice. When you make
    a call from the Order microservice to the Dispatch microservices (such as performing
    an HTTP request for a dispatch order event), this call chain can provide a response
    to a client application. This architecture won’t be resilient enough when some
    of these microservices fail. To rephrase, if the provider microservice cannot
    respond within SLA, the consumer microservice will receive an error.


    ### Microservices Are Evolutionary


    A better alternative is to employ loose coupling between microservices. You can
    substitute the HTTP channel with a messaging channel. Here again, the message
    queue is point-to-point, so you need to use message topics, which are one-to-many.
    Topics provide Publish-Subscribe semantics, which deliver a copy of a particular
    event to each subscribed receiver.


    In a Publish-Subscribe channel, one input channel splits into multiple output
    channels, one for each subscriber microservice. When an event is published into
    the channel, the Publish-Subscribe channel delivers a copy of the message to be
    delivered to each of the output channels. Each output channel has only one subscriber
    microservice, which is only allowed to consume a message once. In this way, each
    subscriber only gets the message once; consumed copies disappear from their channels.
    See Figure [4-2](#619782_1_En_4_Chapter.xhtml#Fig2).


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig2_HTML.jpg)


    A flow diagram of a publish-subscribe channel. It starts with an order delivered
    by the publisher to the subscriber. The subscriber is dispatched to and notified.


    **Figure 4-2** Publish-subscribe channel


    This Publish-Subscribe channel not only brings more autonomy to individual microservices,
    but it also allows the microservices application to evolve at its own pace over
    time. In other words, as you can see in Figure [4-2](#619782_1_En_4_Chapter.xhtml#Fig2),
    when the microservices application grows over time and you need to add more microservices,
    you don’t need to disturb the existing architecture; you don’t even need to restart
    the existing application deployment!


    ### The Honeycomb Analogy


    The discussions so far bring us to the analogy of a honeycomb for the microservices
    architecture. The microservices application architecture starts to grow from the
    first, single microservice to many more microservices, just like a honeycomb is
    built (see Figure [4-3](#619782_1_En_4_Chapter.xhtml#Fig3)).


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig3_HTML.jpg)


    A flow diagram of honeycomb structures resembling a microservice. It starts with
    a single hexagonal structure and ends with 6 hexagons of a honeycomb structure.


    **Figure 4-3** Microservices honeycomb analogy


    The next section looks at the messaging infrastructure as a medium for inter-microservice
    communication.


    ## Async, Still Request-Reply


    I purposefully omitted another important aspect in the previous section, which
    is the need to have Request Reply semantics for typical inter-microservices communication.
    Messaging channels are asynchronous, rather typically one way, or request alone.
    How do you then get the corresponding reply? This section discusses this issue.


    ### Async Request


    HTTP channels are not only synchronous, but they also provide a mechanism for
    the sender to receive a reply or response. However, as discussed, to realize the
    full benefits of a message-based architecture, the event delegation mechanism
    must be inherently asynchronous. There may however be many use cases where a synchronous
    styled request-reply semantic is still needed. The challenge is then to mimic
    request-reply semantics over message channels, which are otherwise one-way channels.


    ### Async Request-Reply


    When an application sends a message, how can it get a corresponding response from
    the receiver through messaging channels? The Request-Reply Enterprise Integration
    pattern provides a proven mechanism for synchronous styled message exchange over
    asynchronous channels (see Figure [4-4](#619782_1_En_4_Chapter.xhtml#Fig4)).


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig4_HTML.jpg)


    A flow diagram of a request-reply. A sender dispatched an order at the request
    of a receiver. A synchronous message is depicted.


    **Figure 4-4** Request reply over async


    The solution is to send a pair of request-reply messages, each on its own channel.
    However, there is a problem. A service provider or a receiver (or a server role
    microservice) can accept requests in a well-known channel that it can advertise.
    But what about a client’s channel address? Multiple clients can connect to the
    same microservice process in the server role, and it’s not possible for the server
    to know or remember the reply channel, since clients come and go, and many more
    new clients might appear in the future. Instead, one proven way is for the request
    message to contain a return address that indicates where to send the reply message
    (see Figure [4-5](#619782_1_En_4_Chapter.xhtml#Fig5)).


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig5_HTML.jpg)


    A diagram of a return address pattern. It starts with 2 requestors that send requests
    and receive replies from a replier through different channels.


    **Figure 4-5** Return address pattern


    By attaching the return address along with the request, the replier does not need
    to know or remember where to send the reply. It can just inspect and infer that
    from the request. If different messages to the same replier require replies to
    different places, the replier can infer where to send the corresponding reply
    for each request. This encapsulates the knowledge of what channels to use for
    requests and replies within the requestor, so those decisions do not have to be
    hard-coded within the replier. A return address is placed in the header of a message
    because it’s not part of the data being transmitted, and the message transport
    infrastructure doesn’t need to inspect the payload.


    The next section demonstrates this process in code.


    ## Sync Over Async Microservices


    In this example, you will tweak the same set of microservices you saw earlier.
    A consumer and a provider microservice will communicate with each other using
    a messaging channel. The provider microservice stores the entity in an in-memory
    database, to keep the example simple.'
