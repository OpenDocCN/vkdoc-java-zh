    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码位于
    `ch08\ch08-03` 文件夹中。本示例中的大部分源代码与 `ch03\ch03-01` 中的代码类似，后者已在第 3 章的“使用 PostgreSQL
    和 RestTemplate 的微服务”一节中详细解释过。在前两个示例中，你已经看到了多个相互交互的微服务的部署架构，因此，本示例的重点是连接到非容器化的数据库。


    ### 容器与主机配置中的 PostgreSQL


    由于 Postgres 数据库运行在主机系统上，你需要允许运行 Product Server 微服务的 Docker 容器连接到本地 PostgreSQL
    数据库。假设你不想让容器与主机共享网络（在运行容器时使用 `--network` host 参数），则需要配置数据库和容器以进行通信。


    请参考附录 C 中关于 PostgreSQL 的以下章节：


    *   为远程客户端开放 PostgreSQL 服务器

    *   在主机上为 Docker 客户端开放 PostgreSQL


    这些配置应该足以让运行在主机系统上的 Postgres 数据库与容器化应用协同工作。


    ### 使用 Dockerfile 运行容器


    `ch08\ch08-03` 文件夹包含构建示例所需的 Maven 脚本。第一步，你需要启动 PostgreSQL 服务器。本示例假设你已经有一个正在运行的
    PostgreSQL 服务器，并且已按前述方式进行了配置。你需要执行清单 8-23 中的以下命令来启动 PostgreSQL。


    ```

    binildass-MacBook-Pro:~ binil$ pg_ctl -D /Library/PostgreSQL/12/data start

    清单 8-23

    启动 PostgreSQL 服务器

    ```


    如果你已经按照上一节的要求，完成了让运行在主机系统上的 Postgres 数据库与容器化应用协同工作所需的配置，那么现在你需要告诉容器主机的 IP 地址。你可以使用
    `--add-host` 选项传递主机的 IP，这在清单 8-25 中完成。在这种情况下，`host` 是主机机器的名称，它将被添加到容器的 `/etc/hosts`
    文件中。在 Docker 容器内部，你可以使用名称 `host` 来连接到主机系统。你需要知道运行 PostgreSQL 的主机的 IP，你可以在清单 8-24
    中找到它。


    ```

    binildass-MacBook-Pro:~ binil$ ipconfig getifaddr en0

    192.168.29.96

    binildass-MacBook-Pro:~ binil$

    清单 8-24

    查找 PostgreSQL 主机机器的 IP

    ```


    本示例中的 `Dockerfile` 与上一个示例中使用的 `Dockerfile` 相同，如清单 8-5 所示。


    接下来，构建微服务和 Docker 镜像，然后运行容器。你将修改本章上一个示例中的脚本。清单 8-25 将这些命令组织成一个脚本。


    ```

    mvn -Dmaven.test.skip=true clean package

    docker build  --build-arg JAR_FILE=01-ProductServer/target/*.jar -t ecom/product-server
    .

    docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t ecom/product-web
    .

    docker network create ecom-network

    docker run -d -p 8081:8081 --net=ecom-network --add-host=host:192.168.29.96 --name
    product-server -e DB_SERVER=host:5432 -e POSTGRES_DB=productdb -e POSTGRES_USER=postgres
    -e POSTGRES_PASSWORD=postgre ecom/product-server

    docker run -d -p 8080:8080 --net=ecom-network --name product-web -e acme.PRODUCT_SERVICE_URL=http://product-server:8081/products
    ecom/product-web

    清单 8-25

    构建并运行微服务 Docker 容器的脚本 (ch08\ch08-03\makeandrun.sh)

    ```


    要构建微服务和 Docker 镜像，然后运行容器，你需要执行清单 8-25 中的脚本，如清单 8-26 所示。


    ```

    (base) binildass-MacBook-Pro:ch08-03 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch08/ch08-03

    (base) binildass-MacBook-Pro:ch08-03 binil$ eval $(minikube docker-env)

    (base) binildass-MacBook-Pro:ch08-03 binil$ sh makeandrun.sh

    [INFO] Scanning for projects...

