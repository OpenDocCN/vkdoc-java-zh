    ## Summary


    I started this chapter by looking into how the pluggable nature of ports and adaptors
    comes into play in enterprise applications by showcasing the plugging in of a
    `MongoDB` in place of `PostgreSQL`. This plugin is a key characteristic of the
    hexagonal architecture. Next, you looked at the complementary nature of the hexagonal
    architecture and the Onion architecture. I demonstrated once again a flexible
    way of adding more ports in a hexagonal architecture so that the core of the application
    remains undisturbed. Equally important is the layered notion in the Onion architecture,
    where the outer layers depend on the inner layers, and as you move more and more
    toward the inner layers, you explore the core of the business domain where reusability
    of the core is a desirable objective. You should now have a solid understanding
    of the options available in the Microservices Architecture paradigm. You are now
    equipped to learn about the next-level concepts of events and messaging in microservices,
    which are covered in Chapter [4](#619782_1_En_4_Chapter.xhtml).


    # 4. Message Oriented Microservices


    In the previous chapters of this book, you saw microservices interacting with
    each other and human actors (end users) interacting with the edge microservice
    using a client device (a browser). Because microservices are “micro” in nature,
    multiple microservices must often communicate with each other to meet useful business
    functionalities. These inter-microservices communications can be within a business
    domain or across business domains.


    Microservices are distributed parts of an application that run on multiple processes
    or services, sometimes even across multiple servers or hosts or even across multiple
    geographies. Each service instance is typically a computer process. Therefore,
    inter-microservice communications happen using an inter-process communication
    (IPC) protocol such as `HTTP` or `AMQP`, or using a binary protocol like `TCP`,
    depending on the nature of these microservices.


    Inter-microservice communication using `REST` is simple and straightforward. `REST`
    in its simplest form is synchronous, in that the client sends a request and waits
    for a response from the service. Hence the client code or the client-side thread
    can only continue its task when it receives the `HTTP` response from the server.
    While this is okay, there are alternate paradigms that you can use to achieve
    inter-microservice communication, but in a more flexible and scalable manner.
    This chapter introduces message-oriented microservices, whereby microservices
    can communicate over messaging backbones.


    This chapter covers the following concepts:


    *   Characteristics of microservices

    *   `REST`-based request-response style inter-microservices communication

    *   The need for a flexible schema for inter-microservices communication

    *   Introduction to messaging channels

    *   Inter-microservices communication using messaging channels

    *   Bringing flexibility to the request-response style interaction of a web browser


    ## Characteristics of Microservices


    This section starts by looking at typical characteristics of a microservice application,
    which will help you understand the need for a new paradigm for inter-microservice
    communication.'
