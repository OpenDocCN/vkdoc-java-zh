  raw: '### Docker Registry


    The Docker Registry is a repository that stores your Docker images (see Figure
    [7-13](#619782_1_En_7_Chapter.xhtml#Fig13)). It can be private or public, and
    it can be local or remote. A Docker Registry facilitates easy sharing of Docker
    images between different development environments and runtimes. Once you have
    built your image, you can either run it on the computer you’ve built it on, or
    you can push (upload) the image to a registry and subsequently pull (download)
    it to the same computer or to another computer and run it there.


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig13_HTML.jpg)


    A flow diagram of docker images from a developer network to a production environment.
    The developer network pulls and pushes images to a docker public registry and
    a docker private registry in an internet cloud. Dev machine, staging, and production
    environments pull from the docker private registry.


    Figure 7-13


    The Docker Registry


    Docker Hub is an example of a public registry. Private registries can be set up
    using many methods, like a private Docker Registry on JFrog Bintray. There are
    also remote repositories, which serve as caching proxies for a Docker Registry
    managed at a remote site such as Docker Hub or JFrog Bintray. Images are stored
    and updated in remote Docker Registries according to various configuration parameters
    that control the caching and proxying behavior.


    Development environment tools like JFrog Artifactory can act as intermediaries
    between developer machines and remote Docker Registries. Since they fully implement
    the Docker Registry API specification, they can act as proxies to any public or
    private Docker Registry such as Docker Hub, JFrog Bintray, or other private Docker
    Registries. When an image is first requested by a developer machine, it is downloaded,
    and while doing this, Artifactory can store it in a local cache. Upon receiving
    subsequent requests for the image, Artifactory conducts a smart checksum search
    for it, and if the image has already been downloaded and is available in the local
    cache, the locally cached copy is provided. In this manner, each image is only
    downloaded once and is locally available to all other developers in the organization.
    This not only reduces network traffic but also effectively screens you from any
    issues with the network and other remote Docker Registries, thus providing you
    with a consistent, reliable, and continuous access to (remote) Docker images.


    ## Hello World Tomcat in Docker


    I’m sure you’ve read enough theory, so this section helps you learn by doing things.
    You will learn to run a “Docker Hello World” program in this section.


    I assume that you have Docker Daemon running on your host. If not, refer to Appendix
    E to set up a Docker Daemon on your Mac machine (without Docker Desktop). If you
    have Docker Desktop on any of the OSes on your machine, that will also do.


    ### Run Tomcat Container


    The first step is to start the Minikube single-node Kubernetes cluster so that
    you have a Docker Daemon up (see Listing [7-1](#619782_1_En_7_Chapter.xhtml#PC1)).
    Refer to Appendix E for a quick reference to the container commands.


    ```

    (base) binildass-MacBook-Pro:~ binil$ pwd

    /Users/binil

    (base) binildass-MacBook-Pro:~ binil$ minikube start

    minikube v1.25.2 on Darwin 12.4

    ...

    Done! kubectl is now configured to use "minikube" cluster and "default" namespace
    by default

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-1

    Starting Minikube

    ```


    Next, set the Minikube environment variables in your work terminal as shown in
    Listing [7-2](#619782_1_En_7_Chapter.xhtml#PC2).


    ```

    (base) binildass-MacBook-Pro:~ binil$ eval $(minikube docker-env)

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-2

    Setting Minikube Environment in Terminal

    ```


    This points the Docker client toward Minikube’s Docker environment since you are
    using the Docker Daemon in the Minikube VM. This setup is used for most of the
    Docker examples in this book. The `minikube docker-env` command returns a set
    of Bash environment variable exports to configure your local host environment
    to reuse the Docker Daemon inside the Minikube instance. Passing this output through
    `eval` causes `bash` to evaluate these exported variables and put them into effect.
    This will build the Docker image using Minikube’s Docker instance and then push
    the image to Minikube’s Docker Registry. It will also set up your deployment in
    Minikube to use this image. These variables will thus help your Docker CLI (where
    you write Docker commands) connect with the Docker Daemon in the VM created by
    the Minikube.


    Instead, if you are using Docker Daemon from the Docker Desktop or a similar installation,
    you don’t need to set up this environment configuration.


    To list all the containers you have on your system, either running or stopped,
    execute the `docker ps` command shown in Listing [7-3](#619782_1_En_7_Chapter.xhtml#PC3).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker ps

    CONTAINER ID  IMAGE         COMMAND                   CREATED        STATUS        PORTS   NAMES

    24eea7cbd5b2  e1482a24335a  "/dashboard --insecu..."  5 minutes ago  Up 5 minutes          k8s_kubernetes-

    c091fe0efebc  6e38f40d628d  "/storage-provisioner"    5 minutes ago  Up 5 minutes          k8s_storage-

    ...

    (base) binildass-MacBook-Pro:~ binil$ docker ps

    Listing 7-3

    Listing Docker Containers

    ```


    The Docker client will list a table containing container IDs (a unique ID that
    you can use to refer to the container in other commands), creation date, the command
    used to start a container, status, exposed ports, and a name. The name can be
    assigned by you or Docker can pick an arbitrary name.


    Next, you can run a container. To run a container, use this `docker run` command:


    ```

    docker run [OPTIONS] IMAGE [COMMAND] [ARG...]

    ```


    Listing [7-4](#619782_1_En_7_Chapter.xhtml#PC5) shows the code to bring up a Tomcat
    container.


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run -it -p 8080:8080 tomcat

    Unable to find image ''tomcat:latest'' locally

    latest: Pulling from library/tomcat

    67e8aa6c8bbc: Downloading [========>                                  ]  9.653MB/54.95MB

    627e6c1e1055: Download complete

    0670968926f6: Downloading [=====================================>     ]  8.059MB/10.88MB

    5a8b0e20be4b: Downloading [==>                                        ]  3.226MB/54.58MB

    7a93fb438607: Waiting

    400f1e54bef0: Waiting

    f0b65b53f1a4: Waiting

    dc9d1a029c69: Waiting

    42a9874765c5: Waiting

    52140cf8a5cf: Waiting

    Listing 7-4

    Tomcat Container Starting Up

    ```'
