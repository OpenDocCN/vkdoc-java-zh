    The Root Query Resolver (/ch03/ch03-03/02-ProductWeb/src/main/java/com/acme/ecom/product/controller/
    ProductGraphQLController.java)

    ```


    If the client doesn’t request a field explicitly, the GraphQL Server won’t do
    the work to retrieve it. In this case, if the client retrieves a product and doesn’t
    ask for the `ProductCategory` field, the `productCategory()` method won’t be executed,
    and the `productCategoryDao` call won’t be made.


    Listing [3-31](#619782_1_En_3_Chapter.xhtml#PC32) shows the Data Fetcher class.


    ```

    public class ProductDao {

    @Autowired

    private ProductBusinessService productBusinessService;

    public List getProducts(int count, int offset) {

    List productList =

    productBusinessService.getAllProducts();

    return productList.stream().skip(offset).

    limit(count).collect(Collectors.toList());

    }

    }

    Listing 3-31

    Product Data Fetcher (/ch03/ch03-03/02-ProductWeb/src/main/java/com/acme/ecom/product/graphql/
    ProductDAO.java)

    ```


    This Data Fetcher delegates calls to the product business service you have already
    seen. You will later see that the instances of this product business service are
    pooled or reused regardless of through which port the client request is reaching
    the server.


    Once you have defined the abstract GraphQL based port, Spring Boot GraphQL Starter
    offers an elegant way to get a GraphQL server running, by defining the respective
    dependencies in `pom.xml`, as shown in Listing [3-32](#619782_1_En_3_Chapter.xhtml#PC33).


    ```


    org.springframework.boot

    spring-boot-starter-graphql


    org.springframework.boot

    spring-boot-starter-web


    Listing 3-32

    The Product Web Microservice Maven Dependency (ch03\ch03-03\02-ProductWeb\pom.xml)

    ```


    GraphQL is transport-agnostic. Hence I’ve included the web starter in this config.
    This will expose the GraphQL API over HTTP using Spring MVC on the default `/graphql`
    endpoint.


    GraphQL also has a nice companion UI tool called GraphiQL. This UI can communicate
    with any GraphQL-compliant server and execute queries and mutations against it.
    See Figure [3-3](#619782_1_En_3_Chapter.xhtml#Fig3).


    ![](images/619782_1_En_3_Chapter/619782_1_En_3_Fig3_HTML.jpg)


    A screenshot of the Graphi Q L browser tab has a toolbar with the play, prettify,
    history, and docs buttons at the top followed by a 28-line code below. It gives
    the welcome message followed by a description of Graphi Q L and an example of
    a query with field and subfield functions along with the keyboard shortcuts.


    Figure 3-3


    GraphiQL query browser


    Lastly, you need to configure the Product Web microservice, as shown in Listing
    [3-33](#619782_1_En_3_Chapter.xhtml#PC34).


    ```

    spring:

    application:

    name: product-web

    graphql:

    graphiql:

    enabled: true

    server:

    port: 8080

    acme:

    PRODUCT_SERVICE_URL: http://localhost:8081/products

    PRODUCT_CATEGORY_URL: http://localhost:8081/category

    PRODUCT_SERVICE_BY_CAT_URL: http://localhost:8081/productsbycat

    Listing 3-33

    The Product Web Microservice Configuration (ch03\ch03-03\02-ProductWeb\src\main\resources\application.yml)

    ```


    Most of these configurations here are trivial. What you need to look explicitly
    at is the GraphQL’s companion tool, GraphiQL. This UI tool can communicate with
    any GraphQL Server and helps to develop and consume against a GraphQL API. Spring
    GraphQL comes with a default GraphQL page that is exposed at the `/graphiql` endpoint.
    This endpoint is disabled by default, but it can be turned on by enabling the
    `spring.graphql.graphiql.enabled` property, which is done in Listing [3-33](#619782_1_En_3_Chapter.xhtml#PC34).
    This works as a quick but neat in-browser way to write and test queries, particularly
    during development and testing.'
