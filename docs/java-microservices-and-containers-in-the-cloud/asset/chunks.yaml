    [9](#619782_1_En_9_Chapter.xhtml), shown in Figure [9-2](#619782_1_En_2_Chapter.xhtml#Fig2).
    The one change is that this example uses Kubernetes.


    The deployment topology of the microservices is shown in Figure [10-11](#619782_1_En_10_Chapter.xhtml#Fig11).


