- fmt: '### Understanding the Code


    Let’s look at the provider microservice—the Product Server microservice—first.
    Listing [2-2](#619782_1_En_2_Chapter.xhtml#PC2) starts with the REST-capable HTTP
    port, using a Spring `RestController`.


    ```java

    @RestController

    public class ProductRestController {

    @Autowired

    private ProductRepository productRepository;

    @RequestMapping(value = "/products",

    method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity> getAllProducts() {

    List products = productRepository.findAll();

    if(products.isEmpty()){

    return new ResponseEntity>(

    HttpStatus.NOT_FOUND);

    }

    List list = new ArrayList ();

    for(Product product:products){

    list.add(product);

    }

    list.forEach(item->LOGGER.debug(item.toString()));

    return new ResponseEntity>(list,

    HttpStatus.OK);

    }

    }

    ```


    `getAllProducts` is a Java method that will return a list of all products in the
    MongoDB database, defined through an abstract protocol and the format of delivery
    declared in the HTTP-based REST port. A concrete implementation of this port is
    then injected (or used to intercept) by Spring and used in the Controller edge
    in the runtime. They translate the JSON formatted Request data payload from the
    HTTP delivery channel into a `getAllProducts` method call in the application core.
    To retrieve the products, `getAllProducts` delegates calls to the driven port,
    `ProductRepository`.


    The remainder of the implementation of the REST controller in the Product Server
    microservice is very similar to the code in Listing 1-4 in Chapter [1](#619782_1_En_1_Chapter.xhtml)
    (with the single exception that instead of the in-memory database, the `ProductRepository`
    port is used to interact with a MongoDB repository), so I do not repeat the full
    code here.


    This example introduces the abstract port to interact with the MongoDB, as shown
    in Listing [2-3](#619782_1_En_2_Chapter.xhtml#PC3).


    ```java

    @RepositoryRestResource(collectionResourceRel = "productdata", path = "productdata")

    public interface ProductRepository extends

    MongoRepository  {

    public List findByCode(

    @Param("code") String  code);

    }

    ```


    Since this port extends `MongoRepository`, all of the default CRUD method declarations
    are inherited by default. Therefore, you need to only declare the custom methods—`findByCode`
    in this example.


    The code for the main class of the Product Server microservice is shown in Listing
    [2-4](#619782_1_En_2_Chapter.xhtml#PC4).


    ```java

    @SpringBootApplication

    public class EcomProductMicroserviceApplication {

    public static void main(String[] args) {

    SpringApplication.run(

    EcomProductMicroserviceApplication.class, args);

    }

    }

    ```


    Listing [2-5](#619782_1_En_2_Chapter.xhtml#PC5) shows the Product Server microservice
    configuration file.


    ```properties

    spring.data.mongodb.uri=mongodb://localhost:27017/test

    server.port=8081

    spring.application.name = product-server

    ```


    This URL points to the MongoDB database.


    Next, you will look at the consumer microservice, that is, the Product Web microservice.
    Listing [2-6](#619782_1_En_2_Chapter.xhtml#PC6) shows the REST-capable HTTP port,
    using a Spring `RestController`.


    ```java

    @RestController

    public class ProductRestController{

    @Value("${acme.PRODUCT_SERVICE_URL}")

    private String PRODUCT_SERVICE_URL;

    @Autowired

    private RestTemplate restTemplate;

    @RequestMapping(value = "/productsweb",

    method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity> getAllProducts() {

    ParameterizedTypeReference>

    responseTypeRef = new ParameterizedTypeReference>() {};

    ResponseEntity> entity =

    restTemplate.exchange(PRODUCT_SERVICE_URL,

    HttpMethod.GET, (HttpEntity) null,

    responseTypeRef);

    List productList = entity.getBody();

    return new ResponseEntity>(productList,

    HttpStatus.OK);

    }

    }

    ```


    The value for `PRODUCT_SERVICE_URL` is configured in `application.properties`
    to point to the URL for the provider microservice, as follows:


    ```properties

    acme.PRODUCT_SERVICE_URL = http://localhost:8081/products

    ```


    The adapter to realize the inter-microservice communication is defined in the
    Product Web microservice by defining the `RestTemplate` configured in Spring in
    the configuration class, as shown in Listing [2-7](#619782_1_En_2_Chapter.xhtml#PC8).


    ```java

    @Bean

    RestTemplate restTemplate() {

    ObjectMapper mapper = new ObjectMapper();

    mapper.configure(

    DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES,

    false);

    MappingJackson2HttpMessageConverter converter =

    new MappingJackson2HttpMessageConverter();

    converter.setSupportedMediaTypes(

    MediaType.parseMediaTypes("application/json"));

    converter.setObjectMapper(mapper);

    return new RestTemplate(Arrays.asList(converter));

    }

    }

    ```


    From now on, whenever the Product Web microservice needs to communicate to the
    external API of the Product Server microservice, you need an object that implements
    the `RestTemplate` interface that you defined, and Spring provides you with that.


    The rest of the implementation of the Product Web microservice REST controller
    is shown in Listing [2-8](#619782_1_En_2_Chapter.xhtml#PC9).


    ```java

    public class ProductRestController{

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity getProduct(@PathVariable(

    "productId") String productId) {

    String uri = PRODUCT_SERVICE_URL + "/" + productId;

    Product product = restTemplate.getForObject(uri,

    Product.class);

    return new ResponseEntity(product,

    HttpStatus.OK);

    }

    @RequestMapping(value = "/productsweb",

    method = RequestMethod.POST,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity addProduct(

    @RequestBody Product product) {

    Product productNew = restTemplate.postForObject(

    PRODUCT_SERVICE_URL,

    product, Product.class);

    return new ResponseEntity(product,

    HttpStatus.OK);

    }

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.DELETE,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity deleteProduct(

    @PathVariable("productId")String productId) {

    restTemplate.delete(PRODUCT_SERVICE_URL + "/" +

    productId);

    return new ResponseEntity(

    HttpStatus.NO_CONTENT);

    }

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.PUT,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity updateProduct(

    @PathVariable("productId")String productId,

    @RequestBody Product product) {

    String uri = PRODUCT_SERVICE_URL + "/" + productId;

    restTemplate.put(uri, product, Product.class);

    Product updatedProduct = restTemplate.getForObject(

    uri, Product.class);

    return new ResponseEntity(updatedProduct,

    HttpStatus.OK);

    }

    }

    ```


    Given a `productId`, the `getProduct` method will retrieve the details of a specific
    product. `addProduct` will create a new product and `deleteProduct` will remove
    a product from the MongoDB database. `updateProduct` will update a product with
    a new set of values.'
