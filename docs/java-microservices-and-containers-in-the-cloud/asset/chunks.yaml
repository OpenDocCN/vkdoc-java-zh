    Cluster IP 仅提供 Kubernetes 集群内部的访问。集群内的其他应用可以访问，但该服务没有外部访问权限，因此 `cURL` 命令失败了。


    现在，尝试从 Minikube 主机内部访问该服务，如清单 10-31 所示。


    ```

    (base) binildass-MacBook-Pro:~ binil$ minikube ssh

