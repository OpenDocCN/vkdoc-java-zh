    ```


    **Listing 11-1** Example 11-01 Source Code Organization


    As you can verify from Listing [11-1](#619782_1_En_11_Chapter.xhtml#PC1), all
    the descriptors are familiar except for `kafka*.yml`. Listing [11-2](#619782_1_En_11_Chapter.xhtml#PC2)
    shows these new descriptors.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: zookeeper-deployment

    spec:

    replicas: 1

    selector:

    matchLabels:

    component: zookeeper

    template:

    metadata:

    labels:

    component: zookeeper

    spec:

    containers:

    - name: zookeeper

    image: digitalwonderland/zookeeper

    ports:

    - containerPort: 2181

    ```


    **Listing 11-2** The Zookeeper Deployment YAML File (`ch11\ch11-01\kafka-deployment.yml`)


    Listing [11-2](#619782_1_En_11_Chapter.xhtml#PC2) uses `digitalwonderland/zookeeper`
    as the zookeeper image. The rest of the lines are self-explanatory. Listing [11-3](#619782_1_En_11_Chapter.xhtml#PC3)
    investigates the Kafka descriptors.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: kafka-1-deployment

    spec:

    replicas: 1

    selector:

    matchLabels:

    component: kafka-1

    template:

    metadata:

    labels:

    component: kafka-1

    spec:

    containers:

    - name: kafka-1

    image: pharosproduction/kafka_k8s:v1

    resources:

    requests:

    memory: "256Mi"

    cpu: "250m"

    limits:

    memory: "512Mi"

    cpu: "500m"

    ports:

    - containerPort: 9092

    env:

    - name: MY_POD_IP

    valueFrom:

    fieldRef:

    fieldPath: status.podIP

    - name: KAFKA_ADVERTISED_PORT

    value: "9092"

    - name: KAFKA_ZOOKEEPER_CONNECT

    value: zookeeper-ip-service:2181

    - name: KAFKA_ADVERTISED_HOST_NAME

    value: $(MY_POD_IP)

    - name: KAFKA_BROKER_ID

    value: "1"

    ```


    **Listing 11-3** The Kafka Deployment YAML File (`ch11\ch11-01\kafka-deployment.yml`)


    The `pharosproduction/kafka_k8s:v1` image is used for the Kafka server. You can
    see that the `kafka` deployment refers to the `zookeeper-ip-service`, the service
    name for the zookeeper service that’s configured in Listing [11-4](#619782_1_En_11_Chapter.xhtml#PC4).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: zookeeper-ip-service

    spec:

    type: ClusterIP

    selector:

    component: zookeeper

    ports:

    - name: zookeeper

    port: 2181

    targetPort: 2181

    type: NodePort

    ```


    **Listing 11-4** The Zookeeper Service YAML File (`ch11\ch11-01\kafka-svct.yml`)'
