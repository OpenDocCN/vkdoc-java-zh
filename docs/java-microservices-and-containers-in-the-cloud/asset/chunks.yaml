    ## SEDA 与微服务


    在讨论并执行了关于如何通过异步消息传递骨干网进行微服务间通信的示例之后，现在是时候了解你所追求的更宏大的图景了。SEDA（分阶段事件驱动架构）概念用于使服务能够良好地适应负载，防止在需求超过服务容量时资源过度提交。接下来你将对此进行研究，并将该概念与你使用消息传递基础设施的企业微服务相关联。


    ### SEDA 架构


    在 SEDA 中，应用程序由通过显式队列连接的事件驱动阶段网络组成。这种架构允许服务良好地适应负载，防止在需求超过服务容量时资源过度提交。SEDA 使用一组动态资源控制器来使阶段保持在其运行范围内，即使在负载大幅波动的情况下也是如此。这在
    Matt Welsh、David Culler 和 Eric Brewer 撰写的论文《SEDA：一种用于良好适应、可扩展互联网服务的架构》中有所解释。该架构如图
    4-9 所示，改编自该论文。


    ![](img/619782_1_En_4_Fig9_HTML.jpg)


    事件队列和传出事件处理程序的示意图。事件处理程序由线程池组成，并与控制器相连。


    图 4-9


    一个 SEDA 阶段


    一个阶段由传入事件队列、线程池和应用程序提供的事件处理程序组成。阶段的操作由控制器管理，控制器动态调整资源分配和调度。许多这样的阶段可以链接在一起，形成一个松散耦合的端到端应用程序连续体。


    ### 作为阶段网络的微服务架构


    基于微服务的架构可以设计为由事件队列互连的阶段网络。每个微服务都可以被设想为一个阶段。这些事件队列是有限的；也就是说，如果队列想要拒绝新条目（例如，因为它达到了阈值），入队操作可能会失败。当入队操作失败时，调用方微服务可以使用背压（通过阻塞在满队列上）或负载削减（通过丢弃事件）。或者，微服务可以采取一些特定于服务的操作，例如向用户发送错误，或执行替代功能，例如调用
    Hystrix 回调等。


    如果尝试使用 SEDA 风格来表示微服务间交互会怎样？见图 4-10。


    ![](img/619782_1_En_4_Fig10_HTML.jpg)


    具有请求方和响应方微服务两个模块的异步微服务示意图。用户向微服务发送命令并获取响应。


    图 4-10


    作为阶段网络的基于异步的微服务架构


    以这种方式在两个微服务之间引入队列将提供隔离性、模块化和独立的负载管理，但可能会增加延迟。此外，如果提供方微服务未启动并运行，消费方微服务可以向最终用户提供的承诺可能必须稍后（或最终）才能兑现，这将导致与执行用例的传统方式不同的用户体验。


    请注意 Product Web 微服务处理从浏览器接收到的请求的阻塞方式。像 Apache Tomcat 这样的应用服务器中的典型容器通常为每个客户端请求使用一个服务器线程。在负载增加的情况下，这要求容器拥有许多线程来服务所有客户端请求。这限制了可伸缩性，可能由于内存耗尽或容器线程池耗尽而导致。从
    Servlet 3.0 规范开始，Java EE 为 Servlet 和过滤器增加了异步处理支持。


    下一节将通过一个示例向你展示如何利用这一点来隔离资源，避免不必要的阻塞。

