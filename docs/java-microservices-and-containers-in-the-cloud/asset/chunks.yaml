- fmt: '# Async HTTP on Sync over Async Microservices


    In this example, you will tweak the same previous set of microservices used in
    this chapter. A consumer and a provider microservice will communicate with each
    other using a messaging channel. The provider microservice stores the entity in
    an in-memory database, to keep the example simple. Moreover, when the browser
    sends a request to the first (consumer) microservice, the example will use async
    HTTP instead of sync HTTP.


    ## Understanding the Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized inside the `ch04\ch04-02` folder.
    Listing [4-10](#619782_1_En_4_Chapter.xhtml#PC10) looks at the changes in the
    consumer microservice—that is, the Product Web microservice—first.


    ```

    public class ProductRestController{

    @RequestMapping(value = "/productsweb", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public DeferredResult  getAllProducts()

    throws InterruptedException, ExecutionException {

    LOGGER.info("Start");

    LOGGER.debug("Thread : " + Thread.currentThread());

    DeferredResult deferredResult =

    new DeferredResult();

    ProducerRecord record =

    new ProducerRecord(

    requestTopic, "All");

    record.headers().add(new RecordHeader(

    KafkaHeaders.REPLY_TOPIC,

    requestReplyTopic.getBytes()));

    record.headers().forEach(header ->

    LOGGER.debug(header.key() + ":" +

    header.value().toString()));

    RequestReplyFuture

    sendAndReceive =

    replyingKafkaTemplate.sendAndReceive(record);

    SendResult sendResult =

    sendAndReceive.getSendFuture().get();

    LOGGER.debug("Request success -> " + sendResult);

    sendResult.getProducerRecord().headers().forEach(

    header -> LOGGER.debug(header.key() + " : " +

    new String(header.value())));

    sendAndReceive.addCallback(

    new ListenableFutureCallback>() {

    @Override

    public void onFailure(Throwable ex) {

    LOGGER.debug(Thread.currentThread().

    toString());

    LOGGER.error(ex.getMessage());

    }

    @Override

    public void onSuccess(ConsumerRecord consumerRecord) {

    long secondsToSleep = 2;

    LOGGER.debug("Starting to Sleep Seconds :

    " + secondsToSleep);

    try{

    Thread.sleep(1000 * secondsToSleep);

    }

    catch(Exception e) {

    //Logger.error("Error : " + e);

    }

    LOGGER.debug("Awakening from Sleep...");

    LOGGER.debug(Thread.currentThread().

    toString());

    deferredResult.setResult(

    consumerRecord.value());

    }

    }

    );

    LOGGER.debug("Thread : " + Thread.currentThread());

    LOGGER.info("Ending...");

    return deferredResult;

    }

    }

    Listing 4-10

    Product Web Microservice REST Controller (ch04\ch04-02\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    As you can see, the `getAllProducts` method in the REST controller is asynchronous.
    This means that the HTTP main thread that initiated to serve the `getAllProducts`
    needn’t be blocked until the method is completed. There is also a sleep of two
    seconds so that you can visualize these methods in the command terminal.


    A six-second sleep is also included in the Product Server microservice, as shown
    in Listing [4-11](#619782_1_En_4_Chapter.xhtml#PC11).


    ```

    public class ProductListener {

    @KafkaListener(topics = "${kafka.topic.request-topic}")

    @SendTo

    public Products listenConsumerRecord(ConsumerRecord record){

    long secondsToSleep = 6;

    LOGGER.info("Start");

    //print all headers

    record.headers().forEach(header ->

    LOGGER.debug(header.key() + ":" +

    new String(header.value())));

    String brand = record.key();

    String request = record.value();

    LOGGER.debug("Listen; brand : " + brand);

    LOGGER.debug("Listen; request : " + request);

    List productList = getAllTheProducts();

    Products products = new Products();

    products.setProducts(productList);

    LOGGER.debug("Starting to Sleep Seconds : " +

    secondsToSleep);

    try{

    Thread.sleep(1000 * secondsToSleep);

    }

    catch(Exception e) {

    LOGGER.error("Error : " + e);

    }

    LOGGER.debug("Awakening from Sleep...");

    LOGGER.info("Ending...");

    return products;

    }

    }

    Listing 4-11

    Product Server Microservice Message Listener ch04\ch04-02\01-ProductServer\src\main\java\com\acme\ecom\product\kafka\client\ProductListener.java)

    ```


    This sleep delay of six seconds enables the caller (Product Web) microservice
    to feel the delay. Hence the HTTP main thread `Thread[http-nio-8080-exec-5,5,main]`
    in the Product Web microservice that initiated to serve the `getAllProducts` from
    the caller microservice is taken away from the service for this request. Another
    thread `Thread[ForkJoinPool.commonPool-worker-1,5,main]` completes the request
    later, as explained in the next section and shown in Listing [4-14](#619782_1_En_4_Chapter.xhtml#PC14).


