    首先，您需要将 `Chart.yaml` 中的版本号从 `0.1.0` 更新为 `0.1.1`。


    接下来，将 `values.yaml` 中的 `replicaCount` 从 `1` 更新为 `2`。


    现在，您可以准备升级 Release 了，如清单 12-39 所示。


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

