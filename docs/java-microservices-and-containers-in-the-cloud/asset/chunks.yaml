  trans: '

    ### 构建并运行微服务


    `ch06\ch06-03` 文件夹包含构建示例所需的 Maven 脚本。首先，你需要启动 Kafka 代理。请参考附录 D 了解如何设置并启动 Kafka
    服务器。你需要执行清单 6-41 中的命令，从 Kafka 安装位置启动 Kafka。


    ```

    bin/zookeeper-server-start.sh config/zookeeper.properties

    bin/kafka-server-start.sh config/server.properties

    清单 6-41

    启动 Kafka 代理的命令

    ```


    接下来，使用两个命令终端，并将目录切换到两个微服务的顶层文件夹。然后，使用 `make.sh` 脚本构建 Product Server 微服务，如清单 6-42
    所示。


    ```

    (base) binildass-MacBook-Pro:01-ProductServer binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch06/ch06-03/01-ProductServer

    (base) binildass-MacBook-Pro:01-ProductServer binil$ sh make.sh

    [INFO] Scanning for projects...

    [INFO]

    ...

    清单 6-42

    构建 Product Server 微服务的命令

    ```


    接下来，构建 Product Web 微服务，如清单 6-43 所示。


    ```

    (base) binildass-MacBook-Pro:02-ProductWeb binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch06/ch06-03/02-ProductWeb

    (base) binildass-MacBook-Pro:02-ProductWeb binil$ sh make.sh

    [INFO] Scanning for projects...

    [INFO]

    ...

    清单 6-43

    构建 Product Web 微服务的命令


    你将使用三个 Product Server 微服务实例和一个 Product Web 微服务实例来测试此示例。


    清单 6-44 展示了如何启动 Product Server 微服务的第一个实例。


    ```

    (base) binildass-MacBook-Pro:01-ProductServer binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch06/ch06-03/01-ProductServer

    (base) binildass-MacBook-Pro:01-ProductServer binil$ java -jar -Dserver.port=8081
    -Dspring.kafka.consumer.group-id=product-server1 -Dcom.acme.ecom.product.kafka.client.productlistener.sleeptimeout=2
    ./target/Ecom-Product-Server-Microservice-0.0.1-SNAPSHOT.jar

    ...

    清单 6-44

    运行 Product Server 微服务实例 1 的命令

    ```


    接下来，启动 Product Server 微服务的第二个实例，如清单 6-45 所示。


    ```

    (base) binildass-MacBook-Pro:01-ProductServer binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch06/ch06-03/01-ProductServer

    (base) binildass-MacBook-Pro:01-ProductServer binil$ java -jar -Dserver.port=8082
    -Dspring.kafka.consumer.group-id=product-server2 -Dcom.acme.ecom.product.kafka.client.productlistener.sleeptimeout=10
    ./target/Ecom-Product-Server-Microservice-0.0.1-SNAPSHOT.jar

    清单 6-45

    运行 Product Server 微服务实例 2 的命令

    ```


    最后，启动 Product Server 微服务的第三个实例，如清单 6-46 所示。


    ```

    (base) binildass-MacBook-Pro:01-ProductServer binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch06/ch06-03/01-ProductServer

    (base) binildass-MacBook-Pro:01-ProductServer binil$ java -jar -Dserver.port=8083
    -Dspring.kafka.consumer.group-id=product-server3 -Dcom.acme.ecom.product.kafka.client.productlistener.sleeptimeout=3
    ./target/Ecom-Product-Server-Microservice-0.0.1-SNAPSHOT.jar

    ...

    清单 6-46

    运行 Product Server 微服务实例 3 的命令

    ```


    请注意清单 6-44 到 6-46 中的一个方面：环境变量 `spring.kafka.consumer.group-id` 传递的值。该示例为此配置了不同的值，以便消息消费者（或提供者微服务）位于不同的组（`group.id`）中。如果它们都在同一个组中，则只有一个会消费请求。通过将
    Product Server 微服务的所有三个实例指定到不同的消费者组，它们都将消费相同的请求消息。


    接下来，运行 Product Web 微服务实例，如清单 6-47 所示。


    ```

    (base) binildass-MacBook-Pro:02-ProductWeb binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch06/ch06-03/02-ProductWeb

    (base) binildass-MacBook-Pro:02-ProductWeb binil$ sh run.sh

