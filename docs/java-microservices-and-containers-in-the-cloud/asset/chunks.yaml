    一个*持久卷声明*（PVC）是 Pod 对存储需求的声明，该需求在 Pod 生命周期的某个时刻可能变得可用或得到满足。持久卷声明承诺，它将在某个时刻“转换”为特定于平台的存储卷，你的应用程序将能够使用该卷，并具有已定义的特性，例如类别、大小和访问模式（`ROX`：ReadOnlyMany，`RWO`：ReadWriteOnce，以及`RWX`：ReadWriteMany）。


    通过这种方式，你可以将特定存储实现的链接从 Pod/部署中抽象出来。在典型情况下，你的应用程序会指定类似“我需要默认类别和大小为 Y 的持久存储”的内容。随后，当“承诺”在运行时得到履行时，你可以链接一个
    EBS 设备、一个 EFS 存储等，而你的核心清单在这两种情况下是相同的。


