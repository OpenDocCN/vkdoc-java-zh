    ## 摘要


    在第 1 章中，你已经看到了六边形架构的示例。本章延续了这一讨论，并提供了更复杂的微服务示例。你还看到了更多关于端口和适配器的示例。现在，你应该能够将这些概念与你用于在边缘暴露服务的众多接口，以及你用于从（微服务的）边缘调用其他服务的众多接口联系起来。六边形架构提供的这种端口和适配器的概念，也是思考微服务间松耦合交互方式的一个绝佳途径。你看到了`Feign`客户端如何以一种巧妙的方式，用极少的特定应用代码来实现这一点。为了完成关于灵活性和松耦合的讨论，本章还涵盖了
    HATEOAS。下一章将转向基于组件的架构中更有趣的方面。


    # 3. 洋葱架构与六边形架构实践


    第 1 章介绍了六边形架构。你还在第 1 章和第 3 章中看到了一些示例，这些示例解释了像 Spring 和 Spring Boot 这样的轻量级容器如何实现抽象端口的概念，以在运行时提供按需适配器。本章通过引入洋葱架构，并辅以更精确和具体的示例，对这些概念进行了扩展。


    本章涵盖以下概念：


    *   使用 Spring Boot 和 PostgreSQL 扩展微服务中六边形架构的概念。


    *   通过用 MongoDB 替换 PostgreSQL，演示六边形架构的实际应用。


    *   介绍洋葱架构的概念。


    *   引入 GraphQL 作为一种技术手段来演示洋葱架构。


    *   通过示例演示六边形架构与洋葱架构的互补性质。


    ## 使用 PostgreSQL 和 RestTemplate 的微服务


    在本节中，你将调整在第 2 章中看到的第一个微服务示例，但将其连接到 PostgreSQL 数据库而不是 MongoDB。你将拥有相同的两个微服务——一个消费者微服务和一个提供者微服务——它们使用
    REST 协议相互通信。提供者微服务也与 PostgreSQL 交互，而不是 MongoDB。整体设计请参考第 2 章中的图 2-1。


    ### 设计微服务


    你将重用第 2 章图 2-1 中所示的六边形微服务视图。此设计存在以下几个差异：


    *   Product Server 微服务连接到一个 PostgreSQL 数据库。


    *   你将使用 Liquibase 来初始化 PostgreSQL 数据库。


    *   由于使用了 Lombok 库，`Product`实体更加简洁。


    *   你将使用独立的实体模型——用于 Repository 交互的`ProductOR`和用于 REST 接口的`Product`。


    *   你将使用`mapstruct`库在`ProductOR`和`Product`结构之间转换实体。


    ### 理解代码


    本书的源代码可通过本书的产品页面在 GitHub 上获取，网址为[`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码组织在`ch03\ch03-01`文件夹内。你将首先查看提供者微服务——即
    Product Server 微服务。清单 3-1 显示了用于与 PostgreSQL 交互的已更改的仓库。


    ```

    @RepositoryRestResource(collectionResourceRel = "productdata",

    path = "productdata")

    public interface ProductRepository extends

    CrudRepository {

    public List findByCode(@Param("code")

    String  code);

    }

    清单 3-1

    Product Server 微服务与 PostgreSQL 交互的抽象端口 (ch03\ch03-02\01-ProductServer\src\main\java\com\acme\ecom\product\repository\ProductRepository.java)

    ```


    这个端口（接口）提供了对仓库（本例中为 PostgreSQL）的通用 CRUD 操作。请注意，第 2 章中的所有示例中，`MongoRepository`都与
    MongoDB 交互。然而，本示例选择了更通用的`CrudRepository`类型，而不是`MongoRepository`。这样做是有原因的。我想演示一个通用端口（带有`CrudRepository`的受驱端口）如何适配连接到不同类型的数据库——更具体地说，在本示例中连接到
    PostgreSQL 数据库，在下一个示例中连接到 MongoDB 数据库。


    `CrudRepository`是 Spring Data 的一个接口，用于对特定类型的仓库执行通用 CRUD 操作。它提供了几个开箱即用的方法来与数据库交互。此端口的特定适配器（即
    PostgreSQL 数据库的适配器）由 Spring 根据`pom.xml`中的配置提供（参见清单 3-2）。


    ```


    org.postgresql

    postgresql

    42.2.19

    runtime


    清单 3-2

    Product Server 微服务的适配器提示 (ch03\ch03-02\01-ProductServer\ pom.xml)

    ```


    清单 3-3 展示了支持 REST 的 HTTP 端口，它使用了 Spring 的`RestController`。


    ```

    @RestController

    public class ProductRestController {

    @Autowired

    private ProductRepository productRepository;

    @Autowired

    private ProductMapper mapper;

    @ApiOperation(value="查看所有产品列表",

    response = Product.class,

    responseContainer = "List")

    @RequestMapping(value = "/products",

    method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity> getAllProducts() {

    Iterable iterable =

    productRepository.findAll();

    List list = new ArrayList ();

    for(ProductOR productOR:iterable){

    list.add(mapper.entityToApi(productOR));

    }

    if(list.size() == 0){

    return new ResponseEntity>(

    HttpStatus.NOT_FOUND);

    }

    return new ResponseEntity>(list,

    HttpStatus.OK);

    }

    }

    清单 3-3

    用于 getAllProducts Product Server 的基于 REST 的 HTTP 端口 (ch03\ch03-02\01-ProductServer\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    REST 控制器具有 CRUD 方法，用于同步`Product`实体的状态与 PostgreSQL 数据库中的状态。`getAllProducts`是一个
    Java 方法，它返回 PostgreSQL 数据库中所有产品的列表，该列表通过基于 HTTP 的 REST 端口中声明的抽象协议和交付格式来定义。然后，Spring
    会注入（或用于拦截）此端口的一个具体实现，并在运行时在控制器中使用。它们将来自 HTTP 交付通道的 JSON 格式请求数据负载转换为应用程序核心中的`getAllProducts`方法调用。为了检索实际的产品实体，`getAllProducts`将调用委托给受驱端口`ProductRepository`。


    这里我需要讨论两个新的实用程序库。第一个是`ProductMapper`，如清单 3-4 所示。

