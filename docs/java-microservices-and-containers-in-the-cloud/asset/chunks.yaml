- fmt: '### Understanding the Code


    This section looks at the changes in the provider microservice—that is, the Product
    Server microservice—first.


    Much of the REST controller’s implementation in the Product Server microservice
    is similar to the code in Listing [1-4](#619782_1_En_1_Chapter.xhtml#PC4) in Chapter
    [1](#619782_1_En_1_Chapter.xhtml) (with the exception that instead of the in-memory
    database, the `ProductRepository` and `ProductCategoryRepository` ports are used
    to interact with a MongoDB repository), hence I do not repeat the full code here.
    However, I introduced two new methods for `ProductRestController`, as shown in
    Listing [3-25](#619782_1_En_3_Chapter.xhtml#PC26).


    ```java

    @RestController

    public class ProductRestController {

    @Autowired

    private ProductRepository productRepository;

    @Autowired

    private ProductCategoryRepository

    productCategoryRepository;

    @RequestMapping(value =

    "/productsbycat/{productcategoryname}",

    method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity>

    getProductsByCategory(

    @PathVariable("productcategoryname") String

    productCategoryName) {

    List productORs =

    productRepository.findByCategory(

    productCategoryName);

    if(productORs.isEmpty()){

    return new ResponseEntity>(HttpStatus.NOT_FOUND);

    }

    List list = new ArrayList ();

    for(ProductOR productOR:productORs){

    list.add(productMapper.entityToApi(productOR));

    }

    return new ResponseEntity>(list, HttpStatus.OK);

    }

    @RequestMapping(value =

    "/category/{category}", method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity getCategory(

    @PathVariable("category") String category) {

    List productCategoryORs =

    productCategoryRepository.findByName(category);

    if(productCategoryORs.isEmpty()){

    return new ResponseEntity(

    HttpStatus.NOT_FOUND);

    }

    ProductCategoryOR firstProductCategoryOR =

    productCategoryORs.iterator().next();

    return new ResponseEntity(

    productCategoryMapper.entityToApi(

    firstProductCategoryOR), HttpStatus.OK);

    }

    }

    Listing 3-25

    REST Based HTTP Port for Product Category Based Queries in Product Server (ch03\ch03-03\01-ProductServer\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    These two new methods use their respective repositories to retrieve corresponding
    entities, which will be utilized by the GraphQL implementation, which I explain
    soon.


    Listing [3-26](#619782_1_En_3_Chapter.xhtml#PC27) looks at the consumer microservice—the
    Product Web microservice. This starts with the REST capable HTTP port, using a
    Spring `RestController`.


    ```java

    @CrossOrigin

    @RestController

    public class ProductRestController{

    @Autowired

    private ProductBusinessService productBusinessService;

    @RequestMapping(value = "/productsweb",

    method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity> getAllProducts() {

    List productList =

    productBusinessService.getAllProducts();

    return new ResponseEntity>(productList, HttpStatus.OK);

    }

    }

    Listing 3-26

    REST Based HTTP Port for getAllProducts Product Web (ch03\ch03-03\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    The notable aspect in the Product Web microservice is that it delegates all calls
    to a `ProductBusinessService`. Here, the `ProductRestController` is an application
    service class, whereas the `ProductBusinessService` is a business service class.
    The rest of the methods in the `ProductRestController` are not repeated here for
    brevity. Listing [3-27](#619782_1_En_3_Chapter.xhtml#PC28) inspects the business
    service class.


    ```java

    @Service

    public class ProductBusinessService{

    @Value("${acme.PRODUCT_SERVICE_BY_CAT_URL}")

    private String PRODUCT_SERVICE_BY_CAT_URL;

    @Value("${acme.PRODUCT_CATEGORY_URL}")

    private String PRODUCT_CATEGORY_URL;

    @Autowired

    private RestTemplate restTemplate;

    public List getProductsForCategory(String name) {

    ParameterizedTypeReference>

    responseTypeRef = new ParameterizedTypeReference>() {};

    ResponseEntity> entity =

    restTemplate.exchange(

    PRODUCT_SERVICE_BY_CAT_URL + "/" + name,

    HttpMethod.GET, (HttpEntity) null,

    responseTypeRef);

    List productList = entity.getBody();

    return productList;

    }

    public ProductCategory getProductCategory(

    String productCategoryName) {

    String uri = PRODUCT_CATEGORY_URL + "/" +

    productCategoryName;

    ProductCategory productCategory =

    restTemplate.getForObject(uri,

    ProductCategory.class);

    return productCategory;

    }

    }

    Listing 3-27

    The Product Business Service (ch03\ch03-03\02-ProductWeb\src\main\java\com\acme\ecom\product\service\
    ProductBusinessService.java)

    ```


    `@Service` annotates classes at the service layer, which are special cases of
    `@Component`. You may mark the beans with `@Service` to indicate that they’re
    holding the business logic. The typical implementation pattern within the product
