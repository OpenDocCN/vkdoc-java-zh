    ## Automating Docker Push


    This example shows how to automate the Docker push of images too, which is one
    step more than the previous example.


    The example uses Google’s `jib-maven-plugin` to integrate Maven with Docker.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized inside the `ch12\ch12-03` folder.


    The single application component is the `Application.java` class, which is a REST
    controller. You have already seen this level of automation in the second example
    in Chapter [7](#619782_1_En_7_Chapter.xhtml), but you will do this in the current
    example too for the sake of completeness. Also, you are doing more configurations
    to the `jib` plugin, so the Maven configurations are shown in Listing [12-18](#619782_1_En_12_Chapter.xhtml#PC19).


    ```

    ...


    org.springframework.boot


    spring-boot-maven-plugin


    com.google.cloud.tools


    jib-maven-plugin


    3.3.2


    binildas/${project.artifactId}


    USE_CURRENT_TIMESTAMP


    Listing 12-18

    Maven pom xml (ch12/ch12-03/pom.xml)

    ```


    Refer to the second example in Chapter [7](#619782_1_En_7_Chapter.xhtml), where
    it explains how to configure the Maven settings configuration file, and so on,
    for the Docker Hub credential setting in Listing 7-22. This chapter goes straight
    to building and pushing the image.


