    HATEOAS Variant of Product Entity (ch02\ch02-03\02-ProductWeb\src\main\java\com\acme\ecom\product\hateoas\model\Product.java)

    ```


    The `Product` extends from the `RepresentationModel` class to inherit the `add()`
    method. Once you create a link, you can easily set that value to the resource
    representation without adding any new fields to it.


    Next, let’s look at the Controller class methods. The code in Listing [2-25](#619782_1_En_2_Chapter.xhtml#PC26)
    shows how to build HATEOAS hyperlinks based on the `getProduct()` method of the
    `ProductRestController.`


    ```

    public class ProductRestController{

    private static final Logger LOGGER = LoggerFactory.getLogger(ProductRestController.class);

    @Value("${acme.PRODUCT_SERVICE_URL}")

    private String PRODUCT_SERVICE_URL;

    @Autowired

    public RestTemplate restTemplate;

    @Autowired

    private ModelMapper modelMapper;

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity

    getProduct(@PathVariable("productId")

    String productId) {

    String uri = PRODUCT_SERVICE_URL + "/" + productId;

    com.acme.ecom.product.model.Product productRetreived =

    restTemplate.getForObject(uri,

    com.acme.ecom.product.model.Product.class);

    com.acme.ecom.product.hateoas.model.Product

    productHateoas = convertEntityToHateoasEntity(

    productRetreived);

    productHateoas.add(linkTo(methodOn(

    ProductRestController.class).getProduct(

    productHateoas.getProductId())).withSelfRel());

    return new ResponseEntity(

    productHateoas, HttpStatus.OK);

    }

    private com.acme.ecom.product.hateoas.model.Product

    convertEntityToHateoasEntity(

    com.acme.ecom.product.model.Product product){

    return  modelMapper.map(

    product,

    com.acme.ecom.product.hateoas.

    model.Product.class);

    }

    }

    Listing 2-25

    HATEOAS REST Controller (ch02\ch02-03\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    `WebMvcLinkBuilder` offers great support for Spring MVC controllers. The `methodOn()`
    obtains the method mapping by making dummy invocations of the target method on
    the proxy controller and sets the `productId` as the path variable of the URI.


    `WebMvcLinkBuilder` also simplifies building URIs by avoiding hard-coding the
    links. The code in Listing [2-25](#619782_1_En_2_Chapter.xhtml#PC26) shows how
    to build the product self-link using the `WebMvcLinkBuilder` class.


    You use the `ModelMapper` to implicitly map a HATEOAS `Product` instance to a
    non-HATEOAS `Product` API instance. When the map method is called, the source
    and target types are analyzed to determine which properties implicitly match.
    Data is then mapped according to these matches. Even when the source and target
    objects and their properties are different, `ModelMapper` can do its best to determine
    reasonable matches between properties if a configured matching strategy exists.


    Again, for brevity, I do not list the rest of the methods for the `ProductRestController`.
    You can refer to them in the code repository.


