- fmt: '# Summary


    The objective of this chapter was to introduce events and inter-microservice communication
    through message channels. You learned how to do this effectively. By using the
    return address pattern, you can weave the correlated request and response interactions
    together to provide synchronous user experiences over the asynchronous channels.
    You also learned about effective programming practices, which enable you to avoid
    tying up resources unless otherwise absolutely required.


    By leveraging the Servlet 3 spec of utilizing Async processing at the HTTP level,
    you also attempted to better manage the HTTP worker threads from a dedicated pool,
    which can become exhausted otherwise. Incrementing the HTTP thread pool size to
    a number larger than the optimum will also lead to system resources exhaustion,
    acting against scalability. An asynchronous servlet enables your application to
    process incoming requests in an asynchronous manner. A given HTTP worker thread
    handles an incoming request, and instead of processing the actual workload, it
    passes the request to another background—a pooled thread—which in turn is responsible
    for processing the workload and sending the response back to the client. The initial
    HTTP worker thread can return to the HTTP thread pool as soon as it passes the
    workload to the background thread, so it becomes available to process more requests
    from the socket. All of these concepts were demonstrated in the code, but you
    are not equipped enough yet. What will happen when concurrent requests arrive
    at the same topic to be consumed by multiple instances of the same type of microservice?
    The next chapter opens Pandora’s box.


    Footnotes [1](#619782_1_En_4_Chapter.xhtml#Fn1_source) [2](#619782_1_En_4_Chapter.xhtml#Fn2_source)


    # 5. Microservices Integration in Practice


    You have seen how messaging middleware can play a key role in providing a bridge
    for microservices to communicate to each other in a loosely coupled manner. You
    have seen a few hands-on examples. Some engineers are still skeptical about whether
    they can use events and event paradigms for inter-microservices communication
    in comparison to the manner they use synchronous REST style. This chapter throws
    some light onto some of these issues. This chapter is hands on. It’s best if you
    read Chapter [4](#619782_1_En_4_Chapter.xhtml) before this chapter, so that you
    understand the basics of running examples over the event infrastructure. Although,
    the chapter does provide step-by-step instructions if you want to start with this
    chapter.


    The following topics are covered in this chapter:


    - Scalability schema in the context of microservices

    - The sync over async challenge

    - Types of microservices vs. instances of the same types of microservice

    - Sequential microservice consumers

    - Parallel microservice consumers


    ## Microservices Scalability in the Cloud


    Thinking in terms of production quality and scalability is indispensable in microservices
    architecture for today’s operations, especially when public cloud is the norm.
    There needs to be a paradigm shift in your mindset on how to scale services when
    you move from the monolith to the microservices architecture. This section quickly
    reviews some of these aspects, which sets the stage for further discussions and
    examples in this chapter.


    ### Vertical Scalability


    Vertical scalability has been practiced traditionally, especially during the monolith
    architecture days when developers used to increase the core or CPU of the machines
    hosting the applications. See Figure [5-1](#619782_1_En_5_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig1_HTML.jpg)


    A diagram presents three transformations of microchips. The first microchip is
    blank. The second microchip contains the number 8. The third microchip features
    a lightning symbol.


    Figure 5-1 Vertical scalability


    Vertically scaling the application is comparatively straightforward, since it
    doesn’t disrupt existing deployment topology. A “lift and shift” of the existing
    process to a different host machine with more compute power is a straightforward
    step. However, to scale applications beyond that limit, vertical scalability doesn’t
    help, since you will be limited by the comparatively slow rate of advancements
    happening in the chip and memory technologies.


    ### Horizontal Scalability


    Horizontally scaling (see Figure [5-2](#619782_1_En_5_Chapter.xhtml#Fig2)) is
    orthogonal to vertical scaling in that, instead of increasing the capacity of
    the existing compute or memory modules, you improve the overall compute and/or
    memory by incorporating more modules.


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig2_HTML.jpg)


    A diagram depicts three microchips connected to a central horizontal bus line.
    Each microchip is blank.


    Figure 5-2 Horizontal scalability


    ### Microservices Scalability


    Typically, microservices represents a functional domain or a portion of a functional
    domain. Just like any application, microservices applications also grow over time.
    A balance between the size of a single microservice and the number of these microservices
    is required to affect an efficient operational schema.


    Just like with vertical scalability, it’s possible to add more functionality to
    the existing microservice, as shown in Figure [5-3](#619782_1_En_5_Chapter.xhtml#Fig3).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig3_HTML.jpg)


    An illustration depicts a small hexagon-shaped structure on the left, which is
    converted to a larger hexagon on the right. A larger hexagon is subdivided into
    smaller hexagonal sections.


    Figure 5-3 Microservices vertical growth


    Endlessly adding more and more functionality to an existing microservice will
    transition microservices back to a monolith system. Instead, more microservice
    types can be added, as shown in Figure [5-4](#619782_1_En_5_Chapter.xhtml#Fig4).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig4_HTML.jpg)


    A diagram presents a bus topology, with three hexagonal shapes labeled mu S A,
    mu S B, and mu S C. Mu S A is connected to the left side of the bus. Mu S B is
    connected to the top of the bus. Mu S C is connected to the right side of the
    bus.


    Figure 5-4 Microservices horizontal growth


    When you want to address scalability in operations, you also need to address the
    growing volumes of traffic. This necessitates cloning multiple instances of the
    microservice and routing traffic in a load-balanced manner, as shown in Figure
    [5-5](#619782_1_En_5_Chapter.xhtml#Fig5).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig5_HTML.jpg)


    A diagram presents a bus topology, with three hexagonal shapes labeled as mu S
    A, mu S B, and mu S C. Mu S A is connected to the left side of the bus. Mu S B
    is connected to the top of the bus. Mu S C is connected to the right side of the
    bus. Each hexagon includes multiple sections.


    Figure 5-5 Microservices scale out


    Routing requests to different types of microservices and distributing the load
    to multiple instances of the same type of microservice is straightforward in a
    typical HTTP-based transport, but it’s non-trivial over message-based infrastructure.
    Let’s investigate that next.


    ## Sync over Async Dynamics


    The messaging style of communication is inherently asynchronous, and messaging
    channels are one way. Both properties, when combined, bring a set of complexities
    for the developers to handle, especially if they have to mimic synchronous style,
    inter-microservice communication over asynchronous natured event channels.'
