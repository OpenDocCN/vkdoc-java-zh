    Since both microservices are up and running, you can access the Product Web microservice.
    However, as mentioned in Appendix E, you must get the Minikube IP first. See Listing
    [8-30](#619782_1_En_8_Chapter.xhtml#PC31).


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:ch07-02 binil$

    Listing 8-30

    Finding Minikube IP

    ```


    You can now access the Product Web microservice using a browser with the URL formed
    with the Minikube IP (see Figure [8-3](#619782_1_En_8_Chapter.xhtml#Fig3)).


    `http://192.168.64.5:8080/product.html`


    ![](images/619782_1_En_8_Chapter/619782_1_En_8_Fig3_HTML.jpg)


    A screenshot titled manage products has the following options. Id. Name. Code.
    Title. Price. Actions.


    Figure 8-3


    Accessing the microservices container using a browser


    Refer to the section titled “Test the Microservice Using UI” in Chapter [1](#619782_1_En_1_Chapter.xhtml)
    to test the Product Web microservice container. While you test the microservices,
    keep watching the log windows.


    You can add a new product to the application for testing, as shown in Figure [8-4](#619782_1_En_8_Chapter.xhtml#Fig4).


    ![](images/619782_1_En_8_Chapter/619782_1_En_8_Fig4_HTML.jpg)


    A screenshot titled product details has the following fields. Id. Name. Code.
    Title. Price.


    Figure 8-4


    Adding a new product to test the microservice


    Refresh your browser to view the newly added product, as shown in Figure [8-5](#619782_1_En_8_Chapter.xhtml#Fig5).


    ![](images/619782_1_En_8_Chapter/619782_1_En_8_Fig5_HTML.jpg)


    A screenshot titled manage products has the following fields. It includes Id,
    name, code, title, price, and actions.


    Figure 8-5


    Refreshing the browser to view the newly added product


    To make sure everything went as expected and your Product Server microservice
    has in fact persisted the data to the PostgreSQL database in the host machine,
    you can now inspect the PostgreSQL database. Refer to the section titled “Create
    Database in PostgreSQL Using pgAdmin” in Appendix C on how to use `pgAdmin` to
    interact with a PostgreSQL database. You can see this in Figure [8-6](#619782_1_En_8_Chapter.xhtml#Fig6).


    ![](images/619782_1_En_8_Chapter/619782_1_En_8_Fig6_HTML.jpg)


    A screenshot titled admin has the following folders. Language. Schemas. Public.
    Product. The product folder is selected.


    Figure 8-6


    Viewing the newly added product using pgAdmin


    Once you complete the testing process, you can stop and remove the microservice
    containers and clean the environment. The environment cleanup is automated in
    a script, as shown in Listing [8-31](#619782_1_En_8_Chapter.xhtml#PC32).


    ```

    mvn -Dmaven.test.skip=true clean

    docker stop product-web

    docker stop product-server

    docker rm product-web

    docker rm product-server

    docker rmi -f ecom/product-web

    docker rmi -f ecom/product-server

    docker network rm ecom-network

    Listing 8-31

    Script Automating the Environment Cleanup (ch08\ch08-03\clean.sh)

    ```


    You can execute this script to stop and remove the microservice containers and
    clean the environment. See Listing [8-32](#619782_1_En_8_Chapter.xhtml#PC33).


    ```

    (base) binildass-MacBook-Pro:ch08-03 binil$ sh clean.sh

    [INFO] Scanning for projects...

    ...

    product-web

    product-server

    product-web

    product-server

    Untagged: ecom/product-web:latest

    ...

    Untagged: ecom/product-server:latest

    ...

    ecom-network

    (base) binildass-MacBook-Pro:ch08-03 binil$

    Listing 8-32

    Stopping Microservice Containers and Cleaning the Environment

    ```


    ## Microservice and PostgreSQL in Container


    You learned why it’s better to state-handle applications, including databases,
    to be deployed outside a Docker container, since containers are designed to be
    more efficient in stateless kind of operations. However, there are use cases where
    you might like to have your database in a container, such as in cases of rapid
    testing. In this section, you learn how to modify the example from the previous
    section to be fully deployed within a container infrastructure.


    ### Designing the Container Topology


    For the current design, you need to slightly tweak the container-based deployment
    topology shown in Figure [8-1](#619782_1_En_8_Chapter.xhtml#Fig1) and replace
    MongoDB with PostgreSQL. This is shown in Figure [8-7](#619782_1_En_8_Chapter.xhtml#Fig7).
    The Product Web and Product Server microservices are containerized, and the Product
    Server microservice will connect to a PostgreSQL database, again deployed as a
    container.


    ![](images/619782_1_En_8_Chapter/619782_1_En_8_Fig7_HTML.jpg)


    A diagram illustrates the container deployment topology for microservices. It
    includes user, browser, container engine, host O S, and hardware.


    Figure 8-7


    Container deployment topology for microservices


    Here again, the Product Web and Product Server containers provide business services,
    whereas the PostgreSQL container provides application services for persisting
    state.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch08\ch08-04` folder. The source
    code in this example is very similar to `ch03\ch03-01`, which was explained in
    detail in Chapter [3](#619782_1_En_3_Chapter.xhtml), in the section titled “Microservices
    Using PostgreSQL and RestTemplate.” You also saw the deployment schema of multiple
    interacting microservices using a PostgreSQL database in the previous example.
    This section looks specifically into connecting to a containerized PostgreSQL
    database alone.


    Connecting from a containerized microservice to a containerized PostgreSQL server
    is rather straightforward, so there is very little change to be made while running
    the containers alone. You will learn about that in the next section.'
