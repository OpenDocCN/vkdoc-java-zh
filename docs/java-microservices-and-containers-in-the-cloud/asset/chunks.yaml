    [8-2](#619782_1_En_8_Chapter.xhtml#Fig2):


    1.  The Product Web microservice connects to the Product Server microservice using
    networks between containers.


    2.  To connect to the PostgreSQL database, it is not enough that the Product Server
    microservice uses container networking alone, instead you need to explicitly tell
    the Product Server microservice container about the IP details of the host machine
    where you are running PostgreSQL database.


    3.  The PostgreSQL database is not containerized, so it doesn’t use any kind of
    virtualization. Instead, PostgreSQL is running directly on the host OS.


    4.  PostgreSQL directly uses the host machine resources, especially for the data
    storage requirements.


    5.  The Product Server microservice is not a physical organization; it’s a virtual
    grouping of the Product Server microservice container and the PostgreSQL database
    in the host machine together.


    Let’s now look at why you need this kind of deployment architecture.


    Orchestration tools like Docker are created with the assumption that they are
    stateless, which means that they should not save any data during the run. If containers
    are stateful they might end up having several containers of a certain type act
    differently even if they are instantiated from the same image. However, databases
    store state, so they are stateful. Because of this, a deployment architecture
    like the one shown in Figure [8-2](#619782_1_En_8_Chapter.xhtml#Fig2) could work.
    Of course, for production purposes, this single database instance (or cluster)
    will be instead in a public cloud, perhaps as a DBaaS (Database as a Service)
    instead of the local host machine (assuming that you are using a cloud-based deployment).'
