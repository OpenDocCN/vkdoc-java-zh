    Once the containers are up and running, you can test the application.


    ### Testing the Microservice Containers


    Since the microservices and database containers are up and running now, you can
    access the Product Web microservice. However, as mentioned in Appendix E, you
    must get the Minikube IP first. See Listing [9-17](#619782_1_En_9_Chapter.xhtml#PC22).


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ minikube ip

