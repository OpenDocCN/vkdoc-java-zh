    ### 在 Kubernetes 中运行微服务


    `ch10\ch10-02` 文件夹包含构建和运行这些示例所需的脚本。第一步是启动一个 Minikube 单节点 Kubernetes 集群。有关 Kubernetes
    设置和命令的快速参考，请参阅附录 E。随后，您还需要在工作终端中设置 Minikube 环境变量。


    假设您的单节点 Kubernetes 集群 Minikube 已启动并正在运行，名为 `makeandrun.sh` 的简单脚本包含了使用所有部署描述符构建和运行完整应用程序所需的所有命令，如清单
    10-47 所示。


    ```

    mvn -Dmaven.test.skip=true clean package

