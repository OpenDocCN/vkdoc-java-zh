    有了这个简单的介绍，接下来我们进入代码部分。


    ## 使用链接的微服务与 MongoDB 容器


    本示例复用了第 3 章中“使用 MongoDB 和 CrudRepository 的微服务”一节中的微服务。它使用了相同的两个微服务——一个消费者微服务和一个提供者微服务，它们通过
    REST 协议相互通信。提供者微服务还与 MongoDB 进行交互。整体设计请参考第 2 章的图 2-1。


    ### 设计容器拓扑


    根据第 2 章图 2-1 中的设计，你还需要定义基于容器的部署拓扑。如图 8-1 所示。


    ![](img/619782_1_En_8_Fig1_HTML.jpg)


    该图展示了微服务容器拓扑。它包括用户、浏览器、容器引擎、主机操作系统和硬件。


    图 8-1


    微服务容器拓扑设计


    一个消费者微服务和一个提供者微服务通过 REST 协议相互通信。产品 Web 微服务是消费者微服务，它将作为单个容器部署。提供者微服务还与 NoSQL 数据库
    MongoDB 进行交互。因此，部署涉及两个容器——一个用于产品服务器组件，另一个用于 MongoDB 组件。在这里，产品 Web 和产品服务器容器提供业务服务，而
    Mongo 容器则提供用于持久化数据的应用服务。


    另外，请注意图 8-1 中的另一个方面。产品服务器和 MongoDB 容器被组合在一起，称为单个微服务，即产品服务器微服务。这遵循了微服务的标准约定，即微服务是一个自包含的单元，拥有自己的数据。


    还要注意用户与部署进行交互的两种方式：


    *   命令行界面（CLI）作为部署管理接口，在所谓的用户空间内存中运行。该程序就像其他运行在操作系统之上的程序一样运行。在用户空间中运行的程序无法修改内核空间内存。操作系统是用户程序与计算机硬件之间的接口。


    *   用户使用浏览器从业务服务访问业务功能


    当你运行 Docker 时，Docker 引擎和 Docker CLI 是两个在用户空间中运行的程序。图 8-1 显示了三个正在运行的容器。每个容器都作为
    Docker 引擎的子进程运行，并被容器封装，委托进程在其自身的用户空间内存子空间中运行。在容器内运行的程序无法访问相邻容器所限定的内存和资源。


    此外，从某种意义上说，图 8-1 也代表了微服务部署的逻辑视图。虽然在基础设施架构层面，容器部署更有意义，但微服务架构视图对应用架构师更为相关，因此我在图中展示了这一点。这就是为什么即使产品服务器和
    MongoDB 作为两个独立的容器部署，我仍然在逻辑上将它们组合在一起，以表示单个产品服务器微服务。这个特定的 MongoDB 实例完全归产品服务器微服务所有，产品服务器微服务之外的实体可能无需关心此
    MongoDB 实例。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
    `ch08\ch08-01` 文件夹中。本示例中的源代码与第 3 章中详细解释的 `ch03\ch03-02` 类似。你需要进一步理解的是部署模式，这将在下一节中介绍。

