    \  Up 5 minutes          k8s_kubernetes-\nc091fe0efebc  6e38f40d628d  \"/storage-provisioner\"\
    \    5 minutes ago  Up 5 minutes          k8s_storage-\n...\n(base) binildass-MacBook-Pro:~\
    \ binil$ docker ps\nListing 7-3\nListing Docker Containers\n```\n\n`Docker`客户端将列出一个表格，其中包含容器ID（一个唯一ID，您可以在其他命令中使用它来引用容器）、创建日期、用于启动容器的命令、状态、暴露的端口和名称。名称可以由您分配，也可以由`Docker`任意选择。\n\
    \n接下来，您可以运行一个容器。要运行容器，请使用此`docker run`命令：\n\n```\ndocker run [OPTIONS] IMAGE [COMMAND]\
    \ [ARG...]\n```\n\n清单[7-4](#619782_1_En_7_Chapter.xhtml#PC5)显示了启动`Tomcat`容器的代码。\n\
    \n```\n(base) binildass-MacBook-Pro:~ binil$ docker run -it -p 8080:8080 tomcat\n\
