  trans: '

    # 10. 使用 Kubernetes 的微服务


    第 1 章讨论了不同级别的服务粒度。当你不断将服务拆分为更细粒度的服务时，实际上是在增加架构中活动部件的数量。这种将服务拆分为更细粒度服务的分而治之方法，旨在降低单个服务故障导致整个应用程序崩溃的风险。但另一方面，随着活动部件数量的增加，这些部件之间的连接数量也随之增加，从而扩大了容易发生故障的波及范围。


    单体应用由紧密耦合的组件和模块组成，必须作为一个整体进行开发、部署、运维和管理，因为它们都作为单个进程运行。运行单体应用通常需要一个或几个能够提供足够资源来运行应用的强大服务器。当应用负载增加时，你可以进行*垂直*扩展（通过提高硬件规格）或*水平*扩展（通过引入更多进程副本）。


    当你从单体架构迁移到微服务架构时，这些扩展原则大多仍然适用，但由于活动部件数量增加，整体复杂性也成倍增长。事实上，复杂度的增长速度往往超过新增元素的比例。你可能在关于
    Docker 的章节中已经看到过这一点，我在那里讨论了镜像和容器，它们超越了传统的 `.jar` 格式制品。你需要一套工具集和生态系统来更好地管理你的应用二进制文件，无论是静态形式（`.jar`
    和镜像）还是动态形式（容器）。本章将涵盖这一主题。


    本章涵盖以下概念。


    *   Kubernetes 架构简介


    *   选定的 Kubernetes 部署方面


    *   Kubernetes 中的流量和状态管理


    *   在 Kubernetes 中将微服务和数据库容器组合在一起


    *   演示跨 Kubernetes 中组合的容器的完整 CRUD 功能


    ## Kubernetes 的世界


    将单体应用拆分为更细粒度、可独立部署的组件（称为微服务），将它们打包为容器镜像，并实例化为容器，这是未来的发展方向。每个微服务被打包成一个镜像，并在容器中作为独立进程运行。每个微服务通过定义良好的接口（API）与其他微服务通信。


    图 10-1 展示了第 7 章中不同的虚拟化和应用部署模式。在容器化模式下，业务应用在容器运行时之上被实例化为容器。本书使用的容器运行时是 Docker。在基于微服务的架构中，你会拥有许多容器。具体来说，你可能拥有来自同一个
    Docker 镜像或不同 Docker 镜像的一个或多个容器。当你拥有如此多的容器时，就需要一个容器管理工具或容器编排工具，例如 Kubernetes。


    ![](img/619782_1_En_10_Fig1_HTML.jpg)


    一张图表展示了从传统单体应用到基于 Kubernetes 编排的容器化技术的演进过程。它强调了容器化通过 CPU、磁盘、内存和网络等硬件带来的更高效率、可扩展性和可移植性。


    图 10-1


    Kubernetes 生态系统


    运行容器就像运行进程一样，需要执行其自身的维护工作。启动和停止容器化应用、推出更新、维护服务级别、扩展容器以满足变化的负载、保护访问安全等等，只是众多需要执行的维护工作中的一小部分。本节将探讨
    Kubernetes 如何在这方面提供帮助。


    ## Kubernetes 架构


    Kubernetes 是一个容器编排器。它管理正在运行的容器。Kubernetes 架构由多个节点组成，这些节点分为主节点和工作节点。主节点托管 Kubernetes
    控制平面，而工作节点托管你的实际容器应用。


    你可以借助图 10-2 来了解这些节点。


    ![](img/619782_1_En_10_Fig2_HTML.jpg)


    一个架构包含一个控制平面，其中有多个主节点和工作节点。它包括 API 服务器、控制器管理器和调度器。工作节点运行 kubelet、kube-proxy 和容器运行时。负载均衡器、HAProxy
    和 Keepalived 用于服务发现和负载均衡。


    图 10-2


    Kubernetes 架构


    下一节将从高层次审视 Kubernetes 架构。


    ### 控制平面


    主节点托管 Kubernetes 控制平面；它还控制和管理 Kubernetes 系统。Kubernetes 控制平面的组件如下所列：


    *   Kubernetes API 服务器：开发者和 Kubernetes 控制平面的其他组件使用 Kubernetes API 服务器与控制平面通信。


    *   调度器：将作业或工作负载调度到你的 Kubernetes 集群的工作节点上。


    *   控制器管理器：执行 Kubernetes 集群级别的功能，例如复制实例、跟踪工作节点等。


    *   etcd：一个可靠、分布式且持久的数据存储，用于存储集群配置。


    ### 节点


    节点，或称工作节点，运行你的容器化应用。主要组件如下所列：


    *   容器运行时：运行你的容器。Docker、rkt 等是不同的容器运行时。


    *   Kubelet：与控制平面的 API 服务器通信，并管理各自节点上的容器。


    *   kube-proxy：也称为 Kubernetes 服务代理，它在应用组件之间对网络流量进行负载均衡。


    图 10-2 描绘了控制平面和工作节点。当你在本地为生产环境设置 Kubernetes 集群时，建议以高可用性（HA）模式进行部署。高可用性意味着以 HA
    模式安装 Kubernetes 主节点或控制平面，如图 10-2 所示。


    ## Kubernetes 部署


    你使用不同类型的 API 对象在 Kubernetes 中部署工作负载。本节将简要介绍其中几种。


    ### 容器


    在前两章关于 Docker 的内容中，你了解了容器的工作原理。在 Kubernetes 中，你将使用这些相同的容器作为基本工作单元。任何在 Kubernetes
    中运行的工作负载或应用，都必须在容器内运行。这个容器可以是 Docker 容器、rkt 容器，或者由 Virtlet 管理的虚拟机（VM）。


    当使用 Kubernetes 编排容器时，Kubernetes 需要额外的信息来进行容器管理，例如重启策略、存活探针等。Kubernetes 架构将这些额外需求抽象为所谓的
    *Pod*。

