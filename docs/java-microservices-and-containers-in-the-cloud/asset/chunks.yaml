- fmt: '### Helm Chart for PostgreSQL


    You’ll start by creating the first chart, the chart for PostgreSQL database. See
    Listing [12-50](#619782_1_En_12_Chapter.xhtml#PC53).


    ```

    (base) binildass-MacBook-Pro:ch12-06 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/ch12/ch12-06

    (base) binildass-MacBook-Pro:ch12-06 binil$ ls

    README.txt

    (base) binildass-MacBook-Pro:ch12-06 binil$ helm create postgres

    Creating postgres

    (base) binildass-MacBook-Pro:ch12-06 binil$ ls

    README.txt      postgres

    (base) binildass-MacBook-Pro:ch12-06 binil$ rm -r ./postgres/templates/*

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./postgres/templates/deployment.yaml

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./postgres/templates/pcv.yaml

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./postgres/templates/service.yaml

    (base) binildass-MacBook-Pro:ch12-06 binil$ touch ./postgres/templates/config.yaml

    (base) binildass-MacBook-Pro:ch12-06 binil$

    Listing 12-50

    Creating a PostgreSQL Helm Chart

    ```


    You delete all of those files generated in the `./postgres/template` folder. Then
    you create four new files inside the `./postgres/template` folder—`deployment.yaml`,
    `pcv.yaml`, `service.yaml`, and `config.yaml`. You will fill these new files with
    the files from the book’s code.


    Copy the contents from the respective files in `BookCode/ch12/ch12-06/postgres/templates/*`
    to the four files.


    Listing [12-51](#619782_1_En_12_Chapter.xhtml#PC54) investigates selected portions
    of these files.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: {{ .Values.postgres.name }}

    labels:

    app: {{ .Values.postgres.name }}

    group: {{ .Values.postgres.group }}

    spec:

    replicas: {{ .Values.replicaCount }}

    selector:

    matchLabels:

    app: {{ .Values.postgres.name }}

    ...

    Listing 12-51

    The Postgres Deployment YAML File (ch12/ch12-06/postgres/templates/deployment.yaml)

    ```


    The Go template-based placeholders are referring to values located in the `values.yaml`
    file. The `values.yaml` files should be in the root folder of the chart. To make
    it clear with an example, the placeholder `{{ .Values.postgres.name }}` in `deployment.yaml`
    will be filled with the value in Listing [12-52](#619782_1_En_12_Chapter.xhtml#PC55).


    ```

    postgres:

    name: postgres

    Now Copy contents from BookCode/ch12/ch12-06/postgres/values.yaml to the file
    in your project folder ./postgres/values.yaml

    Listing 12-51\. The postgres values YAML file (ch12/ch12-06/postgres/values.yaml)

    replicaCount: 1

    postgres:

    name: postgres

    group: db

    container:

    image: postgres:9.6-alpine

    port: 5432

    service:

    type: ClusterIP

    port: 5432

    volume:

    name: postgres-storage

    kind: PersistentVolumeClaim

    mountPath: /var/lib/postgresql/data

    pvc:

    name: postgres-persistent-volume-claim

    accessMode: ReadWriteOnce

    storage: 4Gi

    config:

    name: postgres-config

    data:

    - key: key

    value: value

    Listing 12-52

    The Postgres Values YAML File (ch12/ch12-06/postgre/values.yaml)

    ```


    Let’s now investigate one more file in detail, and the rest of the files will
    follow the same pattern. The next file to investigate is the template that you
    need to create for `ClusterIP`, which is required to allow other pods inside the
    cluster to access the pod with `postgres`. This is the `./postgres/template/service.yaml`
    file, as shown in Listing [12-53](#619782_1_En_12_Chapter.xhtml#PC56).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: {{ .Values.postgres.name }}

    labels:

    group: {{ .Values.postgres.group }}

    spec:

    type: {{ .Values.postgres.service.type }}

    selector:

    app: {{ .Values.postgres.name }}

    ports:

    - port: {{ .Values.postgres.service.port }}

    targetPort: {{ .Values.postgres.container.port }}

    Listing 12-53

    The Postgres Service YAML File (ch12/ch12-06/postgres/service.yaml)

    ```


    Here again, if you take `{{ .Values.postgres.service.port }}` for example, its
    value will come from the leaf of the `./postgres/values.yaml` file:


    ```

    postgres:

