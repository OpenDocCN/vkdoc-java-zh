    The table includes columns for ID, name, code, title, price, and actions. Users
    can add new products, edit existing ones, or delete them. It lists kamsung D 3,
    lokia pomia, and mapple k phone under the name.


    **Figure 1-19** Listing the newly added product


    You can now attempt to edit (update) the newly added product by clicking the **Edit**
    icon on the right side of each listed product entry. See Figure [1-20](#619782_1_En_1_Chapter.xhtml#Fig20).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig20_HTML.jpg)


    A screenshot of a pane titled product details. The form fields include ID, name,
    code, title, and price. The current values for the product with ID 3 are displayed
    in the fields. There are buttons for cancel and submit at the bottom right.


    **Figure 1-20** Update the product


    As shown in Figure [1-20](#619782_1_En_1_Chapter.xhtml#Fig20), without changing
    the product ID, make some valid changes to some of the fields—price in this example.
    Clicking the **Submit** button to have the changes take effect. See Figure [1-21](#619782_1_En_1_Chapter.xhtml#Fig21).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig21_HTML.jpg)


