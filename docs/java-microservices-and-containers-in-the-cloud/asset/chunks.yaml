    在清单 [7-28 的步骤中，我使用 Jib 构建，因此直接将 Product Web 微服务镜像推送到了 Docker Hub。本地注册表中没有该镜像的任何痕迹。那么，为什么当我在清单
    7-28 中尝试在 Docker 中运行 Product Web 微服务时，它首先将镜像拉取到本地注册表，然后才启动容器呢？现在你可以检查 Docker 注册表，会发现该镜像已从
    Docker Hub 拉取并可在本地注册表中使用。见清单 7-29。


    ```

    (base) binildass-MacBook-Pro:ch07-02 binil$ docker images

    REPOSITORY            TAG     IMAGE ID       CREATED        SIZE

    ...

