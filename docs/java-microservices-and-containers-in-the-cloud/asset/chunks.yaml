    # 11. 基于消息的 Kubernetes 微服务


    在第 10 章中，你学习了 Kubernetes 如何进行容器编排，这极大地提升了微服务运行的可管理性。随着微服务数量的增加，这一点变得更为重要。你还了解了
    Kubernetes 的一些弹性特性，并通过示例看到，当你删除一个现有 Pod 时，Pod 是如何被重新创建的。你还了解了 Pod 重新创建后状态是如何恢复的。


    可扩展性和弹性是每个生产级应用程序都应具备的两个理想特性。当你试图提升这两个特性时，会使运行环境变得更加混乱。对于微服务架构来说尤其如此，因为你需要管理更多类型的服务，以及每种类型服务的更多数量。


    在第 6 章中，你学习了消费者和提供者微服务如何使用 Kafka 作为消息通道进行通信。提供者微服务将实体存储在数据库中。在第 9 章中，你修改了这些相同的示例，利用容器化作为运行时选项。在本章中，你将重新审视它们，并使用
    Kubernetes 进行部署。


    本章是第 10 章的延续，因此完全是动手实践，涵盖以下三个场景：


    *   通过 Kafka 通信并与 PostgreSQL 交互的微服务

    *   通过 Kafka 通信并与 MongoDB 交互的微服务

    *   使用 Ingress 访问协调微服务


    下一节将直接进入这些示例。


    ## 在 k8s 中通过 Kafka 与 PostgreSQL 结合的微服务


    本示例调整了第 6 章“基于 PostgreSQL 的 Kafka CRUD 微服务”一节以及第 9 章“使用 PostgreSQL 容器组合微服务”一节中的同一组微服务。消费者和提供者微服务使用
    Kafka 作为消息通道进行通信。提供者微服务将实体存储在 PostgreSQL 数据库中。当浏览器向第一个（消费者）微服务发送请求时，它使用异步 HTTP。尽管使用了异步
    HTTP，但该示例在客户端设备（本例中为浏览器）层面模拟了同步风格的用户体验。


    该示例还包含消费者和提供者微服务的多个实例，并在测试服务时使用多个客户端。


    ### 设计微服务编排拓扑


    本示例使用了第 9 章中图 9-3 所示六边形微服务视图的修改版本。两个微服务通过异步通道进行通信。Apache Kafka 是消息通道，它本质上是异步的。这个修改后的设计如图
    11-1 所示。


    ![](img/619782_1_En_11_Fig1_HTML.jpg)


    一个 3D 模型图，展示了连接到浏览器的用户、Product Web 微服务、带有事件队列和分区 1 和 2 的 Kafka 基础设施服务、Product
    Server 微服务、带有功能的容器引擎、主机操作系统以及带有 CPU、磁盘等的硬件。Product Web 包含 3 个业务服务，Product Server
    包含 3 个业务服务和 1 个应用服务。


    图 11-1


    微服务的 Kubernetes 编排拓扑


    在这里，Product Web 和 Product Server 容器提供业务服务，而 Mongo 容器提供应用服务以持久化状态。Kafka 容器提供基础设施服务，因此它不作为任何特定（业务）微服务的一部分显示。


    你在图 11-1 中需要注意的另一个方面是，你有 Product Web 和 Product Server 微服务的多个实例。这将帮助你像在第 6 章中那样，实验粘性和负载均衡场景。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码组织在
    `ch11\ch11-01` 文件夹内。本示例中的大部分源代码与 `ch09\ch09-03` 类似，我在第 9 章中已详细解释过。在第 9 章的示例中，部署架构类似，但它使用的是
    Docker Compose 而不是 Kubernetes。在第二个示例——`ch10\ch10-02`——中，你在第 10 章中还了解了基于 Kubernetes
    的两个微服务和 PostgreSQL 的部署。剩下的就是单独部署 Kafka 到 Kubernetes。


