- fmt: "# Summary\n\nIn Chapter 1, you saw examples of the hexagonal architecture.\
    \ This chapter continued that discussion, with more complex microservice examples.\
    \ You also saw more examples of ports and adapters. By now, you should be able\
    \ to relate these concepts to the many interfaces you use to expose services at\
    \ the edge as well as many other interfaces you use to invoke other services from\
    \ the edge (of microservices). This notion of ports and adapters provided by the\
    \ hexagonal architecture is a great way to think the loosely coupled way of inter-microservice\
    \ interactions too. You saw how a `Feign` client provides for that in a smart\
    \ manner with very little application-specific code. To complete this discussion\
    \ on flexibility and loose coupling, the chapter also covered HATEOAS. The next\
    \ chapter moves on to more interesting aspects in component-based architectures\n\
    \n# 3. Onion and Hexagonal Architecture in Practice\n\nChapter 1 introduced the\
    \ hexagonal architecture. You also saw a few examples in Chapter 1 and 3 that\
    \ explained how the concepts of abstract ports are realized by lightweight containers\
    \ like Spring and Spring Boot to provide on-demand adapters at runtime. This chapter\
    \ expands on those concepts by introducing the Onion architecture, with more precise\
    \ and concrete examples.\n\nThis chapter covers the following concepts:\n\n- Extends\
    \ the notion of hexagonal architecture in microservices using Spring Boot and\
    \ PostgreSQL.\n- Demonstrates hexagonal architecture in action, by plugging in\
    \ MongoDB in place of PostgreSQL.\n- Introduces the concept of the Onion architecture.\n\
    - Introduces GraphQL as a technology means to demonstrate the Onion architecture.\n\
    - Demonstrates with example the complementary nature of the Hexagonal and Onion\
    \ architectures.\n\n## Microservices Using PostgreSQL and RestTemplate\n\nIn this\
    \ section, you will tweak the first example of microservices you saw in Chapter\
    \ 2, but to connect to a PostgreSQL database instead of MongoDB. You will have\
    \ the same two microservices—a consumer and a provider microservice—communicating\
    \ with each other using the REST protocol. The provider microservice also interacts\
    \ with a PostgreSQL, instead of the MongoDB. Refer to Figure 2-1 in Chapter 2\
    \ for the overall design.\n\n### Design the Microservice\n\nYou will reuse the\
    \ hexagonal microservice view shown in Figure 2-1 in Chapter 2. There are a few\
    \ differences with this design, as follows:\n\n- The Product Server microservice\
    \ connects to a PostgreSQL database.\n- You’ll use Liquibase to initialize the\
    \ PostgreSQL database.\n- The `Product` entity is less verbose due to the use\
    \ of the Lombok library.\n- You’ll use separate entity models—the `ProductOR`\
    \ for the Repository interactions and the `Product` for the REST interface.\n\
    - You’ll use the `mapstruct` library to transform entities between the `ProductOR`\
    \ and `Product` structures.\n\n### Understanding the Code\n\nThe source code for\
    \ this book is available on GitHub via the book’s product page, located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).\
    \ The source code for this example is organized inside the `ch03\\ch03-01` folder.\
    \ You will look at the provider microservice—that is, the Product Server microservice—first.\
    \ Listing 3-1 shows the changed repository used to interact with the PostgreSQL.\n\
    \n```\n@RepositoryRestResource(collectionResourceRel = \"productdata\",\npath\
    \ = \"productdata\")\npublic interface ProductRepository extends\nCrudRepository\
    \ {\npublic List findByCode(@Param(\"code\")\nString  code);\n}\nListing 3-1\n\
    The Abstract Port for Product Server Microservice to Interact with PostgreSQL\
    \ (ch03\\ch03-02\\01-ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\\
    repository\\ProductRepository.java)\n```\n\nThis port (interface) provides for\
    \ generic CRUD operations on a repository, a PostgreSQL in this case. Note that\
    \ `MongoRepository` interacts with MongoDB for all the examples in Chapter 2.\
    \ However, this example opts for a more generic type of `MongoRepository` in the\
    \ way of `CrudRepository`. There is a reason for doing this. I want to demonstrate\
    \ how a generic port (the driven port with `CrudRepository`) can be adapted to\
    \ connect to different kinds of databases—more specifically to a PostgreSQL database\
    \ in this example and to a MongoDB database in the next example.\n\n`CrudRepository`\
    \ is a Spring Data interface for generic CRUD operations on a repository of a\
    \ specific type. It provides several methods out-of-the-box to interact with a\
    \ database. The specific adapter for this port, an adapter to a PostgreSQL database,\
    \ is provided by Spring based on the configuration in `pom.xml` (see Listing 3-2).\n\
    \n```\n<dependency>\n    <groupId>org.postgresql</groupId>\n    <artifactId>postgresql</artifactId>\n\
    \    <version>42.2.19</version>\n    <scope>runtime</scope>\n</dependency>\nListing\
    \ 3-2\nThe Adapter Hint to Product Server Microservice (ch03\\ch03-02\\01-ProductServer\\\
    \ pom.xml)\n```\n\nListing 3-3 shows the REST-capable HTTP port, using a Spring\
    \ `RestController`.\n\n```\n@RestController\npublic class ProductRestController\
    \ {\n    @Autowired\n    private ProductRepository productRepository;\n    @Autowired\n\
    \    private ProductMapper mapper;\n\n    @ApiOperation(value=\"View a list of\
    \ all products\",\n                  response = Product.class,\n             \
    \     responseContainer = \"List\")\n    @RequestMapping(value = \"/products\"\
    ,\n                    method = RequestMethod.GET,\n                    produces\
    \ = {MediaType.APPLICATION_JSON_VALUE})\n    public ResponseEntity> getAllProducts()\
    \ {\n        Iterable iterable =\n            productRepository.findAll();\n \
    \       List list = new ArrayList ();\n        for(ProductOR productOR:iterable){\n\
    \            list.add(mapper.entityToApi(productOR));\n        }\n        if(list.size()\
    \ == 0){\n            return new ResponseEntity>(\n                HttpStatus.NOT_FOUND);\n\
    \        }\n        return new ResponseEntity>(list,\n            HttpStatus.OK);\n\
    \    }\n}\nListing 3-3\nREST Based HTTP Port for getAllProducts Product Server\
    \ (ch03\\ch03-02\\01-ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\\
    controller\\ProductRestController.java)\n```\n\nThe REST controller has CRUD methods\
    \ that synchronize the state of the `Product` entity with those in the PostgreSQL\
    \ database. The `getAllProducts` is a Java method that returns a list of all products\
    \ in the PostgreSQL database, defined through an abstract protocol and format\
    \ of delivery declared in the HTTP-based REST port. A concrete implementation\
    \ of this port is then injected (or used to intercept) by Spring and used in the\
    \ controller in the runtime. They translate the JSON formatted Request data payload\
    \ from the HTTP delivery channel into a `getAllProducts` method call in the application\
    \ core. To retrieve the actual product entities, the `getAllProducts` delegates\
    \ call to the driven port, `ProductRepository`.\n\nThere are two new utility libraries\
    \ I need to discuss here. The first one is `ProductMapper`, shown in Listing 3-4."
  raw: '## Summary


    In Chapter [1](#619782_1_En_1_Chapter.xhtml), you saw examples of the hexagonal
    architecture. This chapter continued that discussion, with more complex microservice
    examples. You also saw more examples of ports and adapters. By now, you should
    be able to relate these concepts to the many interfaces you use to expose services
    at the edge as well as many other interfaces you use to invoke other services
    from the edge (of microservices). This notion of ports and adapters provided by
    the hexagonal architecture is a great way to think the loosely coupled way of
    inter-microservice interactions too. You saw how a `Feign` client provides for
    that in a smart manner with very little application-specific code. To complete
    this discussion on flexibility and loose coupling, the chapter also covered HATEOAS.
    The next chapter moves on to more interesting aspects in component-based architectures


    # 3. Onion and Hexagonal Architecture in Practice


    Chapter [1](#619782_1_En_1_Chapter.xhtml) introduced the hexagonal architecture.
    You also saw a few examples in Chapter [1](#619782_1_En_1_Chapter.xhtml) and [3](#619782_1_En_3_Chapter.xhtml)
    that explained how the concepts of abstract ports are realized by lightweight
    containers like Spring and Spring Boot to provide on-demand adapters at runtime.
    This chapter expands on those concepts by introducing the Onion architecture,
    with more precise and concrete examples.


    This chapter covers the following concepts:


    *   Extends the notion of hexagonal architecture in microservices using Spring
    Boot and PostgreSQL.


    *   Demonstrates hexagonal architecture in action, by plugging in MongoDB in place
    of PostgreSQL.


    *   Introduces the concept of the Onion architecture.


    *   Introduces GraphQL as a technology means to demonstrate the Onion architecture.


    *   Demonstrates with example the complementary nature of the Hexagonal and Onion
    architectures.


    ## Microservices Using PostgreSQL and RestTemplate


    In this section, you will tweak the first example of microservices you saw in
    Chapter [2](#619782_1_En_2_Chapter.xhtml), but to connect to a PostgreSQL database
    instead of MongoDB. You will have the same two microservices—a consumer and a
    provider microservice—communicating with each other using the REST protocol. The
    provider microservice also interacts with a PostgreSQL, instead of the MongoDB.
    Refer to Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter [2](#619782_1_En_2_Chapter.xhtml)
    for the overall design.


    ### Design the Microservice


    You will reuse the hexagonal microservice view shown in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in
    Chapter [2](#619782_1_En_2_Chapter.xhtml). There are a few differences with this
    design, as follows:


    *   The Product Server microservice connects to a PostgreSQL database.


    *   You’ll use Liquibase to initialize the PostgreSQL database.


    *   The `Product` entity is less verbose due to the use of the Lombok library.


    *   You’ll use separate entity models—the `ProductOR` for the Repository interactions
    and the `Product` for the REST interface.


    *   You’ll use the `mapstruct` library to transform entities between the `ProductOR`
    and `Product` structures.


    ### Understanding the Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized inside the `ch03\ch03-01` folder.
    You will look at the provider microservice—that is, the Product Server microservice—first.
