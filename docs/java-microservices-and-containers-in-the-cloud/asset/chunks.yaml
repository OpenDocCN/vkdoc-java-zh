    ## Microservices and PostgreSQL in Kubernetes


    Chapter [8](#619782_1_En_8_Chapter.xhtml) showed a full-fledged microservice example
    interaction with a PostgreSQL database, all in Docker containers. In Chapter [9](#619782_1_En_9_Chapter.xhtml),
    you modified that example to be fully deployed within a container infrastructure
    using Docker Compose. This section now deploys the same example in Kubernetes.


    ### Design Microservices Deployment Topology


    The Product Web and Product Server microservices are containerized, and the Product
    Server microservice will connect to a PostgreSQL database, again deployed within
    a container. All these containers will now run in Kubernetes. See Figure [10-12](#619782_1_En_10_Chapter.xhtml#Fig12).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig12_HTML.jpg)


    A diagram illustrates how a user interacts with a browser, which sends requests
    to a product web microservice. It comprises multiple product-web pods that communicate
    with a product server microservice, which utilizes a post g r e S Q L database,
    deployed on a kubernetes cluster by minikube and docker.


    Figure 10-12


    Kubernetes based deployment topology for microservices


    Here, the Product Web and Product Server containers provide business services,
    whereas the PostgreSQL container provides application services for persisting
    state.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for the example is organized inside the `ch10\ch10-02` folder.
    Much of the source code in this example is similar to `ch03\ch03-01`, which was
    explained in detail in Chapter [3](#619782_1_En_3_Chapter.xhtml), in the section
    titled “Microservices Using PostgreSQL and RestTemplate.” You also saw Docker-based
    deployment of the topology in Figure [8-7](#619782_1_En_8_Chapter.xhtml#Fig7),
    in the section titled “Microservice and PostgreSQL in Container” in Chapter [8](#619782_1_En_8_Chapter.xhtml)
    and subsequently in the Docker Compose-based deployment of the topology in Figure
    [9-1](#619782_1_En_9_Chapter.xhtml#Fig1), in the section titled “Composing Microservice
    with PostgreSQL Containers” in Chapter [9](#619782_1_En_9_Chapter.xhtml). That
    means you can straight away get into the Kubernetes-specific aspects.


    A summarized representation of the source code organization for the example inside
    the `ch10-02` folder is shown in Listing [10-41](#619782_1_En_10_Chapter.xhtml#PC43).


    ```

    ./ch10-02/

    ├── 01-ProductServer

    │   ├── pom.xml

