    When an application requires more than one container running on the same host,
    and when those containers need to efficiently communicate ensuring data locality,
    they can be in the same pod. This provides process isolation; it’s easier to troubleshoot
    the container because logs from different processes are not mixed.


    ### ReplicaSets


    Kubernetes allows you to imperatively or declaratively define and create a *ReplicaSet*.
    A ReplicaSet is a set of replicas (pods) maintained with their revision history.
    A ReplicaSet’s job is to constantly monitor the list of running pods and make
    sure the running number of pods of a certain specification always match the desired
    number. Thus, a ReplicaSet is used to define and manage a collection of identical
    pods that are running on different cluster nodes. A ReplicaSet defines which container
    images are used by the containers running inside a pod and how many instances
    of the pod will run in the cluster, among other things.


    ### Deployment


    Deployment is a higher-level resource meant for deploying applications and updating
    them declaratively. When you create a Deployment, one or more ReplicaSet resources
    are created underneath. When using a Deployment, the actual pods are created and
    managed by the Deployment’s ReplicaSets, not by the Deployment directly. See Figure
    [10-4](#619782_1_En_10_Chapter.xhtml#Fig4).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig4_HTML.jpg)


    A tree diagram illustrates kubernetes deployment resources. A deployment consists
    of multiple replica sets, each of which manages a set of pods. Each pod has a
    container. Pods are scheduled to run on nodes.


    Figure 10-4


    Kubernetes deployment across nodes


    ## Accessing Kubernetes Services


    Having looked at the deployment schema adopted with Kubernetes, this section looks
    at the access mechanism for accessing the workloads deployed in Kubernetes.


    ### Accessing Kubernetes Deployments


    In Kubernetes, pods are created and destroyed to match the desired state of your
    cluster, as specified in your deployment descriptor. Pods are temporary resources.
    When you use a Deployment to run your Kubernetes application, it can create and
    destroy pods on the fly. When pods are created, each pod gets its own IP address.
    When you use a Deployment, the set of pods running in one moment in time can be
    different than the set of pods running the same application a moment later.


    Upon creation, pods are assigned an IP address. These IP addresses are visible
    in the cluster, which allows access from within the cluster. Other pods in the
    cluster can access that IP address and inter-pod communication can happen. When
    a pod dies, a new pod will be created that comes into service with a new IP address
    and anything trying to communicate with the dead pod somehow needs to know about
    this new address. Kubernetes provides a “service,” which is an abstract way to
    expose an application running on a set of pods as a network service.


    ### Kubernetes Service


    The pods you saw earlier from the Deployment object can be killed or scaled up
    and down, so you can’t rely on their IP addresses because they are not persistent.
    Once a pod is defined, it will exhibit the following essential but not so straight
    characteristics:


    *   Pods are ephemeral: Pods are like “tellers in a bank” in the sense that you
    are not served by the same teller (person) every time. Similarly pods can come
    and go. During scale up or scale down, pods may come and go, and if a crash occurs,
    pods might go and may be re-created.


    *   Post create IP: Kubernetes assigns an IP address to a pod after the pod has
    been scheduled and started. So clients can’t know the IP address of the pod upfront.


    *   Dynamic IP list: Scaling out means more than one pod of the same type may
    provide the same service. Each of these (dynamic) pods has its own IP address
    and it may not be practical for clients to bind to a dynamic list of IPs easily.
    Rather, all these pods should be accessible through a single address.


    To solve these problems, a service gives those pods a stable IP. In a more general
    sense, a *service* is an abstraction that defines a logical set of pods and a
    policy by which you have access to them. When a service is created, it publishes
    its own virtual address as an environment variable to every pod. Services not
    only abstract access to pods, but they can also abstract access to DBs, external
    hosts, or even other services. A Kubernetes service is a resource you create to
    make a single, stable entry point to a group of pods providing the same service.
    Each service is an IP address and port combination that don’t change during the
    lifetime of the service. As shown in Figure [10-5](#619782_1_En_10_Chapter.xhtml#Fig5),
    a Kubernetes service can be backed by a single pod or many replicas of the same
    pod. External clients can reach any of the pods of the same service by a single
    service name. Similarly, a frontend pod or, for that matter a frontend service,
    can also reach any of the pods of the same backend service by a single service
    name. Figure [10-5](#619782_1_En_10_Chapter.xhtml#Fig5) shows two services—`product-web`
    and `product-server`.


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig5_HTML.jpg)


    A diagram illustrates an architecture for an e-commerce product web service. A
    user interacts with a browser, which sends requests to a product web microservice
    which consists of multiple product-web pods that communicate with a product server
    microservice with multiple product-server pods.


    Figure 10-5


    Kubernetes services


    Here, the browser or the client device should know the service (name) of the frontend
    microservice—the Product Web microservice. In a similar manner, the frontend microservice
    should know the service (name) of the backend microservice—the Product Server
    microservice.


    ## Traffic Routing to Kubernetes


    There are different ways to get external traffic into your Kubernetes cluster.
    This section looks at how each of them works.'
  trans: '

    ### Pods


    Pod 是 Kubernetes 中最小的可部署单元。一个 Pod 包含一个容器，但也可以在其中运行多个容器（即多个应用程序）。Pod 是对一个或多个正在运行的容器的封装。Kubernetes
    通过 Pod 来控制、监控和操作这些容器。


    ![](img/619782_1_En_10_Fig3_HTML.jpg)


    该图展示了 Kubernetes 的部署资源。部署由一个副本集组成，该副本集管理一组 Pod。每个 Pod 包含一个或多个容器。一个卷可以在 Pod 内的容器之间共享。部署提供了更新、回滚和自愈的机制。


    图 10-3


    Kubernetes 部署


    Pod 中的容器运行在“逻辑主机”上，因为它们位于同一个节点（即它们使用相同的网络命名空间和相同的 IPC 命名空间）。它们还可以使用共享卷，如图 10-3
    所示。


    当一个应用程序需要多个容器在同一主机上运行，并且这些容器需要高效通信以确保数据本地性时，它们可以位于同一个 Pod 中。这提供了进程隔离；由于不同进程的日志不会混合，因此更容易对容器进行故障排查。


    ### ReplicaSets


    Kubernetes 允许您以命令式或声明式的方式定义和创建 *ReplicaSet*。ReplicaSet 是一组带有修订历史记录的副本（Pod）。ReplicaSet
    的工作是持续监控正在运行的 Pod 列表，并确保特定规格的 Pod 运行数量始终与期望数量匹配。因此，ReplicaSet 用于定义和管理一组运行在不同集群节点上的相同
    Pod。ReplicaSet 定义了 Pod 内运行的容器所使用的容器镜像、将在集群中运行的 Pod 实例数量以及其他配置。


    ### Deployment


    Deployment 是一种更高级别的资源，用于部署应用程序并以声明式方式进行更新。当您创建一个 Deployment 时，会在其下创建一个或多个 ReplicaSet
    资源。使用 Deployment 时，实际的 Pod 是由 Deployment 的 ReplicaSet 创建和管理的，而不是由 Deployment 直接管理。参见图
    10-4。


    ![](img/619782_1_En_10_Fig4_HTML.jpg)


    该树状图展示了 Kubernetes 部署资源。一个部署由多个副本集组成，每个副本集管理一组 Pod。每个 Pod 包含一个容器。Pod 被调度到节点上运行。


    图 10-4


    跨节点的 Kubernetes 部署


    ## 访问 Kubernetes 服务


    在了解了 Kubernetes 采用的部署模式后，本节将探讨访问部署在 Kubernetes 中的工作负载的机制。


    ### 访问 Kubernetes 部署


    在 Kubernetes 中，Pod 会被创建和销毁，以匹配您在部署描述符中指定的集群期望状态。Pod 是临时资源。当您使用 Deployment 运行 Kubernetes
    应用程序时，它可以动态创建和销毁 Pod。当 Pod 被创建时，每个 Pod 都会获得自己的 IP 地址。当您使用 Deployment 时，某一时刻正在运行的
    Pod 集合可能与稍后运行同一应用程序的 Pod 集合不同。


    创建后，Pod 会被分配一个 IP 地址。这些 IP 地址在集群内可见，允许从集群内部进行访问。集群中的其他 Pod 可以访问该 IP 地址，从而实现 Pod
    间通信。当一个 Pod 终止时，会创建一个新的 Pod，该 Pod 会以新的 IP 地址提供服务，任何试图与已终止 Pod 通信的实体都需要知道这个新地址。Kubernetes
    提供了一种“服务”，这是一种将运行在一组 Pod 上的应用程序作为网络服务暴露的抽象方式。


    ### Kubernetes 服务


    您之前从 Deployment 对象中看到的 Pod 可能会被终止或进行扩缩容，因此您不能依赖它们的 IP 地址，因为它们不是持久的。一旦定义了 Pod，它将表现出以下基本但并非直接的特征：


    *   Pod 是短暂的：Pod 就像“银行柜员”，您每次不会由同一位柜员（人）服务。类似地，Pod 可以随时出现和消失。在扩缩容期间，Pod 可能会增加或减少，如果发生崩溃，Pod
    可能会消失并可能被重新创建。


    *   创建后分配 IP：Kubernetes 在 Pod 被调度并启动后为其分配 IP 地址。因此，客户端无法预先知道 Pod 的 IP 地址。


    *   动态 IP 列表：横向扩展意味着多个相同类型的 Pod 可能提供相同的服务。这些（动态）Pod 各自拥有自己的 IP 地址，客户端要轻松绑定到动态
    IP 列表可能并不实际。相反，所有这些 Pod 应该可以通过一个单一地址访问。


    为了解决这些问题，服务为这些 Pod 提供了一个稳定的 IP。从更一般的意义上说，*服务*是一种抽象，它定义了一组逻辑 Pod 以及访问它们的策略。当创建一个服务时，它会将自己的虚拟地址作为环境变量发布给每个
    Pod。服务不仅抽象了对 Pod 的访问，还可以抽象对数据库、外部主机甚至其他服务的访问。Kubernetes 服务是一种您创建的资源，用于为提供相同服务的一组
    Pod 创建一个单一的、稳定的入口点。每个服务都是一个 IP 地址和端口的组合，在服务的整个生命周期内不会改变。如图 10-5 所示，一个 Kubernetes
    服务可以由单个 Pod 或多个相同 Pod 的副本支持。外部客户端可以通过一个单一的服务名称访问同一服务的任何 Pod。类似地，前端 Pod 或前端服务也可以通过一个单一的服务名称访问同一后端服务的任何
    Pod。图 10-5 展示了两个服务——`product-web` 和 `product-server`。


    ![](img/619782_1_En_10_Fig5_HTML.jpg)


    该图展示了一个电子商务产品 Web 服务的架构。用户与浏览器交互，浏览器向产品 Web 微服务发送请求，该微服务由多个 product-web Pod 组成，这些
    Pod 与具有多个 product-server Pod 的产品服务器微服务通信。


    图 10-5


    Kubernetes 服务


    在这里，浏览器或客户端设备应该知道前端微服务——产品 Web 微服务的服务（名称）。类似地，前端微服务应该知道后端微服务——产品服务器微服务的服务（名称）。


    ## 流量路由到 Kubernetes


    有多种方法可以将外部流量引入您的 Kubernetes 集群。本节将介绍每种方法的工作原理。

