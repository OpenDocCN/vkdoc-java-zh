  trans: '

    ### 代码组织


    本书的源代码可通过图书产品页面上的 GitHub 获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码组织方式如代码清单
    14-1 所示，位于 `ch14\ch14-01` 文件夹内。


    ```

    ./ch14-01/

    ├── README.txt

    ├── connections.tf

    ├── gateways.tf

    ├── network.tf

    ├── security.tf

    ├── servers.tf

    ├── subnets.tf

    └── variables.tf

    代码清单 14-1

    Terraform EC2 项目源代码组织

    ```


    从文件名可以推测出许多 Terraform 文件的用途，但下一节也会对其进行介绍。


    ### 理解源代码


    本节从选择云提供商及其地理区域的第一步开始。请参见代码清单 14-2。


    ```

    provider "aws" {

    region = "ap-southeast-1"

    }

    代码清单 14-2

    AWS 区域配置 (ch14/ch14-01/connections.tf)

    ```


    如前所述，Terraform 可帮助您管理跨多种公有云提供商（例如 Amazon Web Services、Microsoft Azure、DigitalOcean）以及私有云和虚拟化平台（例如
    OpenStack、VMware）的 IT 基础设施。在本示例中，它打算使用 `aws` 作为云提供商。我使用的是 `ap-southeast-1`，即新加坡区域。您可以使用任何您偏好的区域。


    下一步是定义 VPC，如代码清单 14-3 所示。


    ```

    resource "aws_vpc" "test-env" {

    cidr_block = "10.0.0.0/16"

    enable_dns_hostnames = true

    enable_dns_support = true

    tags = {

    Name = "bdca-Instance-03"

    }

    }

    resource "aws_eip" "ip-test-env" {

    instance = "${aws_instance.test-ec2-instance.id}"

    domain   = "vpc"

    }

    代码清单 14-3

    AWS VPC 配置 (ch14/ch14-01/network.tf)

    ```


    Amazon Virtual Private Cloud（Amazon VPC）允许您在逻辑隔离的虚拟网络中启动 AWS 资源。您的 AWS 账户在每个 AWS
    区域都包含一个默认 VPC。默认 VPC 已配置好，以便您可以立即开始启动并连接到 EC2 实例；但是，在本示例中，您将创建自己的 VPC，名为 `test-env`。


    在 AWS 中创建 VPC 时，CIDR 块用于配置网络的扩展范围。IP CIDR 块给出了要分配给此 VPC 的 IP 地址范围。其格式为 `10.0.0.0/16`。斜杠
    `/` 后的数字 `16` 表示此 CIDR 块范围内的任何 IP 地址必须恰好由前 16 位组成。


    *   由于前 16 位必须保持不变，因此仍有 16 位可以取任意值。


    *   为了进一步理解这一点，您可以计算给定 CIDR 块 `10.0.0.0/16` 中的 IP 地址范围。


    剩余位数 = 32 - `cidr` 前缀中 `/` 后的数字


    ```

    = 32 - 16

    = 16

    ```


    `cidr` 块中的 IP 地址总数：


    ```

    = 2 ^ 剩余位数

    = 2 ^ 16

    = 65536

    ```


    此计算仅供参考；详细讨论超出了本书的范围。


    添加了名为 `Name = "bdca-Instance-03"` 的标签，以便您可以识别该 VPC。


    弹性 IP 是一个静态公有 IPv4 地址，并非免费。您可以将弹性 IP 附加到 `aws_instance.test-ec2-instance.id` 实例上，稍后您将看到该实例。


    接下来，创建一个子网。请参见代码清单 14-4。


    ```

    resource "aws_subnet" "subnet-uno" {

    cidr_block = "${cidrsubnet(aws_vpc.test-env.cidr_block, 3, 1)}"

    vpc_id = "${aws_vpc.test-env.id}"

    availability_zone = "ap-southeast-1a"

    }

    resource "aws_route_table" "route-table-test-env" {

    vpc_id = "${aws_vpc.test-env.id}"

    route {

    cidr_block = "0.0.0.0/0"

    gateway_id = "${aws_internet_gateway.test-env-gw.id}"

    }

    tags = {

    Name = "test-env-route-table"

    }

    }

    resource "aws_route_table_association" "subnet-association" {

    subnet_id      = "${aws_subnet.subnet-uno.id}"

    route_table_id = "${aws_route_table.route-table-test-env.id}"

    }

    代码清单 14-4

    AWS 子网配置 (ch14/ch14-01/subnets.tf)

    ```


    子网部分还介绍了 Terraform 的一个重要特性，展示了它如何通过名称引用其他现有资源。请注意 `vpc_id` 是如何定义的。它引用了一个现有资源的属性（`id`），引用了其完整的
    Terraform 名称 `aws_vpc.test-env.id`，该名称是在上一步中定义的。


    要计算给定 IP 网络地址前缀中的子网地址，必须使用 Terraform 提供的 `cidrsubnet` 函数，该函数需要三个参数：


    *   CIDR 前缀：应采用 CIDR 表示法，如 RFC 4632 第 3.1 节所定义，此处您引用的是子网所属 VPC 的 CIDR。

    '
- fmt: '*   `newbits`: The CIDR prefix will get extended by this many bits. If the
    CIDR prefix ends with `/16` and the `newbits` provided is `4`, the CIDR prefix
    is extended to `/20`. (Adding four bits to the 16 bits provided in the CIDR prefix.)

    *   `netnum`: Used to populate the additional bits in the prefix. This whole number
    value cannot contain bits greater than the `newbits` provided.


    To know what value it will finally have, you can use the Terraform console utility.
    From your development machine terminal, first connect to the Terraform console,
    and then execute the function, as shown in Listing [14-5](#619782_1_En_14_Chapter.xhtml#PC7).


    ```

    (base) binildass-MacBook-Pro:~ binil$ terraform console

    > cidrsubnet("10.0.0.0/16", 3, 1)

    "10.0.32.0/19"

    >

    Listing 14-5

    Terraform cidrsubnet Function

    ```


    Let’s investigate the routing next.


    Terraform currently provides both a standalone route resource and a route table
    resource with routes defined inline. You cannot use both methods for the same
    table. In other words, if you create routes in the `aws_route_table`, you cannot
    associate routes created with `aws_route`.


    `aws_route_table_association` ties the routing table to your subnet.


    The resource `aws_route_table route-table-test-env` block creates a new route
    table in the VPC specified by the `vpc_id` attribute `aws_vpc.test-env.id`. It
    also defines a route that sends all traffic with destination CIDR `0.0.0.0/0`
    to the Internet gateway specified by the `gateway_id = "${aws_internet_gateway.test-env-gw.id}"`
    attribute. The `tags` attribute sets a `test-env-route-table` name for the route
    table for easy identification.


    The `aws_route_table_association` block associates the newly created route table
    with a `subnet_id = "${aws_subnet.subnet-uno.id}"` subnet. The `route_table_id`
    attribute refers to the ID of the route table created in the previous block.


    Listing [14-6](#619782_1_En_14_Chapter.xhtml#PC8) looks at the `test-env-gw` referred
    to in the previous route.


    ```

    resource "aws_internet_gateway" "test-env-gw" {

    vpc_id = "${aws_vpc.test-env.id}"

    tags = {

    Name = "test-env-gw"

    }

    }

    Listing 14-6

    AWS Internet Gateway Configuration (ch14/ch14-01/gateways.tf)

    ```


    Attaching this Internet gateway will allow public traffic to come through to the
    subnet.


    AWS by default will allow all traffic outside, but when you use Terraform, this
    is disabled and therefore has to be explicitly stated to allow traffic. To do
    that, you need to first create a security group to suit your needs. See Listing
    [14-7](#619782_1_En_14_Chapter.xhtml#PC9).


    ```

    resource "aws_security_group" "ingress-all-test" {

    name = "allow-all-sg"

    vpc_id = "${aws_vpc.test-env.id}"

    ingress {

    cidr_blocks = [

    "0.0.0.0/0"

    ]

    from_port = 22

    to_port = 22

    protocol = "tcp"

    }

    ingress {

    cidr_blocks = [

    "0.0.0.0/0"

    ]

    from_port = 8080

    to_port = 8080

    protocol = "tcp"

    }

    egress {

    from_port = 0

    to_port = 0

    protocol = "-1"

    cidr_blocks = ["0.0.0.0/0"]

    }

    }

    Listing 14-7

    AWS Security Group Configuration (ch14/ch14-01/security.tf)

    ```


    When you create VPC, it automatically comes with a default security group. Each
    EC2 instance that you launch in your VPC is automatically associated with the
    default security group if you don’t specify a different security group when you
    launch the instance.


    A security group acts as a virtual firewall for your instance to control inbound
    and outbound traffic. Security groups act at the instance level, not at the subnet
    level. Therefore, each instance in a subnet in your VPC can be assigned to a different
    set of security groups. If you don’t specify a particular group at launch time,
    the instance is automatically assigned to the default security group for the VPC.


    For each security group, you add rules that control the inbound traffic to instances,
    and a separate set of rules that control the outbound traffic. The default route
    in Internet Protocol Version 4 (IPv4) is designated as the zero-address `0.0.0.0/0`
    in CIDR notation, often called the *quad-zero route*. The subnet mask is given
    as `/0`, which effectively specifies all networks. `0.0.0.0/0,::/0`. This means
    the source can be any IP address, from any system request. `0.0.0.0/0` represents
    IPv4 and `::/0` represents IPv6.


    The `ingress-all-test` you defined allows anyone to connect through port 22. It
    will also forward all traffic without restriction. Using `vpc_id = "${aws_vpc.test-env.id}"`
    you can attach it to the VPC you created. The `ingress` block describes how incoming
    traffic will be treated. This example defined a rule to accept connections from
    all IPs on port `22`. The `egress` block defines the rule for outgoing traffic
    and this example defined it to allow all.


    As a final step, you need to define EC2 instances, which are the actual compute
    module where you want the AWS Cloud to expend computing to crunch the workload.
    See Listing [14-8](#619782_1_En_14_Chapter.xhtml#PC10).


    ```

    resource "aws_instance" "test-ec2-instance" {

    ami = "${var.ami_id}"

    instance_type = "t2.micro"

    key_name = "${var.ami_key_pair_name}"

    security_groups = ["${aws_security_group.ingress-all-test.id}"]

    tags = {

    Name = "${var.ami_name}"

    }

    subnet_id = "${aws_subnet.subnet-uno.id}"

    }

    Listing 14-8

    AWS EC2 Configuration (ch14/ch14-01/servers.tf)

    ```


    This code requests an AWS instance of `t2.micro`. You then do the security group
    and subnet associations. One thing you want to note is that we are using variables
    in three places—for `ami_id`, `ami_key_pair_name`, and `ami_name`. The values
    come from a few variables defined in another file. See Listing [14-9](#619782_1_En_14_Chapter.xhtml#PC11).


    ```

    variable "ami_name" {}

    variable "ami_id" {}

    variable "ami_key_pair_name" {}

    Listing 14-9

    Terraform Variables Configuration (ch14/ch14-01/variables.tf)

    ```


    These variables are defined for convenience so that the entire Terraform plan
    can be used as a template to launch multiple instances if required, providing
    the option for those variables to take different values. Since you keep the variables
    empty as shown, Terraform will prompt for them to be given in the terminal as
    input during Terraform plan execution. The `ami_name` variable will be used as
    a tag and the `ami_id` variable is used to find the instance to be launched.


    You now have almost everything completed, so it’s time to spin up the servers
    in the cloud.'
  raw: '*   `newbits`: The CIDR prefix will get extended by this many bits. If the
    CIDR prefix ends with `/16` and the `newbits` provided is `4`, the CIDR prefix
    is extended to `/20`. (Adding four bits to the 16 bits provided in the CIDR prefix.)


    *   `netnum`: Used to populate the additional bits in the prefix. This whole number
    value cannot contain bits greater than the `newbits` provided.


    To know what value it will finally have, you can use the Terraform console utility.
    From your development machine terminal, first connect to the Terraform console,
    and then execute the function, as shown in Listing [14-5](#619782_1_En_14_Chapter.xhtml#PC7).


    ```

    (base) binildass-MacBook-Pro:~ binil$ terraform console

    > cidrsubnet("10.0.0.0/16", 3, 1)

    "10.0.32.0/19"

    >

    Listing 14-5

    Terraform cidrsubnet Function

    ```


    Let’s investigate the routing next.


    Terraform currently provides both a standalone route resource and a route table
    resource with routes defined inline. You cannot use both methods for the same
    table. In other words, if you create routes in the `aws_route_table`, you cannot
    associate routes created with `aws_route.`


    `aws_route_table_association` ties the routing table to your subnet.


    The resource `aws_route_table route-table-test-env` block creates a new route
    table in the VPC specified by the `vpc_id` attribute `aws_vpc.test-env.id`. It
    also defines a route that sends all traffic with destination CIDR `0.0.0.0/0`
    to the Internet gateway specified by the `gateway_id = "${aws_internet_gateway.test-env-gw.id}`
    attribute. The `tags` attribute sets a `test-env-route-table` name for the route
    table for easy identification.


    The `aws_route_table_association` block associates the newly created route table
    with a `subnet_id = "${aws_subnet.subnet-uno.id}"` subnet. The `route_table_id`
    attribute refers to the ID of the route table created in the previous block.


    Listing [14-6](#619782_1_En_14_Chapter.xhtml#PC8) looks at the `test-env-gw` referred
    to in the previous route.


    ```

    resource "aws_internet_gateway" "test-env-gw" {

    vpc_id = "${aws_vpc.test-env.id}"

    tags = {

    Name = "test-env-gw"

    }

    }

    Listing 14-6

    AWS Internet Gateway Configuration (ch14/ch14-01/gateways.tf)

    ```


    Attaching this Internet gateway will allow public traffic to come through to the
    subnet.


    AWS by default will allow all traffic outside, but when you use Terraform, this
    is disabled and therefore has to be explicitly stated to allow traffic. To do
    that, you need to first create a security group to suit your needs. See Listing
    [14-7](#619782_1_En_14_Chapter.xhtml#PC9).


    ```

    resource "aws_security_group" "ingress-all-test" {

    name = "allow-all-sg"

    vpc_id = "${aws_vpc.test-env.id}"

    ingress {

    cidr_blocks = [

    "0.0.0.0/0"

    ]

    from_port = 22

    to_port = 22

    protocol = "tcp"

    }

    ingress {

    cidr_blocks = [

    "0.0.0.0/0"

    ]

    from_port = 8080

    to_port = 8080

    protocol = "tcp"

    }

    egress {

    from_port = 0

    to_port = 0

    protocol = "-1"

    cidr_blocks = ["0.0.0.0/0"]

    }

    }

    Listing 14-7

    AWS Security Group Configuration (ch14/ch14-01/security.tf)

    ```


    When you create VPC, it automatically comes with a default security group. Each
    EC2 instance that you launch in your VPC is automatically associated with the
    default security group if you don’t specify a different security group when you
    launch the instance.


    A security group acts as a virtual firewall for your instance to control inbound
    and outbound traffic. Security groups act at the instance level, not at the subnet
    level. Therefore, each instance in a subnet in your VPC can be assigned to a different
    set of security groups. If you don’t specify a particular group at launch time,
    the instance is automatically assigned to the default security group for the VPC.


    For each security group, you add rules that control the inbound traffic to instances,
    and a separate set of rules that control the outbound traffic. The default route
    in Internet Protocol Version 4 (IPv4) is designated as the zero-address `0.0.0.0/0`
    in CIDR notation, often called the *quad-zero route**.* The subnet mask is given
    as `/0`, which effectively specifies all networks. `0.0.0.0/0,::/0`. This means
    the source can be any IP address, from any system request. `0.0.0.0/0` represents
    IPv4 and `::/0` represents IPv6.


    The `ingress-all-test` you defined allows anyone to connect through port 22\.
    It will also forward all traffic without restriction. Using `vpc_id = "${aws_vpc.test-env.id}"`
    you can attach it to the VPC you created. The `ingress` block describes how incoming
    traffic will be treated. This example defined a rule to accept connections from
    all IPs on port `22`. The `egress` block defines the rule for outgoing traffic
    and this example defined it to allow all.


    As a final step, you need to define EC2 instances, which are the actual compute
    module where you want the AWS Cloud to expend computing to crunch the workload.
    See Listing [14-8](#619782_1_En_14_Chapter.xhtml#PC10).


    ```

    resource "aws_instance" "test-ec2-instance" {

    ami = "${var.ami_id}"

    instance_type = "t2.micro"

    key_name = "${var.ami_key_pair_name}"

    security_groups = ["${aws_security_group.ingress-all-test.id}"]

    tags = {

    Name = "${var.ami_name}"

    }

    subnet_id = "${aws_subnet.subnet-uno.id}"

    }

    Listing 14-8

    AWS EC2 Configuration (ch14/ch14-01/servers.tf)

    ```


    This code requests an AWS instance of `t2.micro`. You then do the security group
    and subnet associations. One thing you want to note is that we are using variables
    in three places—for `ami_id`, `ami_key_pair_name`, and `ami_name`. The values
    come from a few variables defined in another file. See Listing [14-9](#619782_1_En_14_Chapter.xhtml#PC11).


    ```

    variable "ami_name" {}

    variable "ami_id" {}

    variable "ami_key_pair_name" {}

    Listing 14-9

    Terraform Variables Configuration (ch14/ch14-01/variables.tf)

    ```


    These variables are defined for convenience so that the entire Terraform plan
    can be used as a template to launch multiple instances if required, providing
    the option for those variables to take different values. Since you keep the variables
    empty as shown, Terraform will prompt for them to be given in the terminal as
    input during Terraform plan execution. The `ami_name` variable will be used as
    a tag and the `ami_id` variable is used to find the instance to be launched.


    You now have almost everything completed, so it’s time to spin up the servers
    in the cloud.'
  trans: '

    *   `newbits`：CIDR 前缀将按此位数进行扩展。如果 CIDR 前缀以 `/16` 结尾，且提供的 `newbits` 为 `4`，则 CIDR
    前缀将扩展为 `/20`。（在 CIDR 前缀提供的 16 位基础上增加四位。）


    *   `netnum`：用于填充前缀中的额外位。此整数值不能包含大于所提供 `newbits` 的位。


    要了解其最终值，可以使用 Terraform 控制台工具。从您的开发机器终端，首先连接到 Terraform 控制台，然后执行该函数，如清单 14-5 所示。


    ```

    (base) binildass-MacBook-Pro:~ binil$ terraform console

    > cidrsubnet("10.0.0.0/16", 3, 1)

    "10.0.32.0/19"

    >

    清单 14-5

    Terraform cidrsubnet 函数

    ```


    接下来，让我们研究一下路由。


    Terraform 目前既提供独立的路由资源，也提供内联定义路由的路由表资源。您不能对同一个表同时使用这两种方法。换句话说，如果您在 `aws_route_table`
    中创建了路由，则无法关联使用 `aws_route` 创建的路由。


    `aws_route_table_association` 将路由表与您的子网绑定。


    `aws_route_table route-table-test-env` 资源块在由 `vpc_id` 属性 `aws_vpc.test-env.id`
    指定的 VPC 中创建一个新的路由表。它还定义了一条路由，将所有目标 CIDR 为 `0.0.0.0/0` 的流量发送到由 `gateway_id = "${aws_internet_gateway.test-env-gw.id}`
    属性指定的互联网网关。`tags` 属性为路由表设置了一个 `test-env-route-table` 名称，以便于识别。


    `aws_route_table_association` 块将新创建的路由表与 `subnet_id = "${aws_subnet.subnet-uno.id}"`
    子网关联。`route_table_id` 属性引用了前一个块中创建的路由表的 ID。


    清单 14-6 展示了前一个路由中引用的 `test-env-gw`。


    ```

    resource "aws_internet_gateway" "test-env-gw" {

    vpc_id = "${aws_vpc.test-env.id}"

    tags = {

    Name = "test-env-gw"

    }

    }

    清单 14-6

    AWS 互联网网关配置 (ch14/ch14-01/gateways.tf)

    ```


    附加此互联网网关将允许公共流量进入子网。


    AWS 默认允许所有外部流量，但使用 Terraform 时，此功能被禁用，因此必须显式声明以允许流量。为此，您需要首先创建一个符合需求的安全组。请参见清单
    14-7。


    ```

    resource "aws_security_group" "ingress-all-test" {

    name = "allow-all-sg"

    vpc_id = "${aws_vpc.test-env.id}"

    ingress {

    cidr_blocks = [

    "0.0.0.0/0"

    ]

    from_port = 22

    to_port = 22

    protocol = "tcp"

    }

    ingress {

    cidr_blocks = [

    "0.0.0.0/0"

    ]

    from_port = 8080

    to_port = 8080

    protocol = "tcp"

    }

    egress {

    from_port = 0

    to_port = 0

    protocol = "-1"

    cidr_blocks = ["0.0.0.0/0"]

    }

    }

    清单 14-7

    AWS 安全组配置 (ch14/ch14-01/security.tf)

    ```


    创建 VPC 时，它会自动附带一个默认安全组。如果您在启动实例时未指定其他安全组，则在 VPC 中启动的每个 EC2 实例都会自动与默认安全组关联。


    安全组充当实例的虚拟防火墙，用于控制入站和出站流量。安全组在实例级别（而非子网级别）起作用。因此，VPC 子网中的每个实例都可以被分配到不同的安全组集合。如果在启动时未指定特定组，实例将自动分配到
    VPC 的默认安全组。


    对于每个安全组，您可以添加规则来控制发往实例的入站流量，以及一组单独的规则来控制出站流量。互联网协议第 4 版（IPv4）中的默认路由在 CIDR 表示法中指定为零地址
    `0.0.0.0/0`，通常称为*四零路由*。子网掩码为 `/0`，这实际上指定了所有网络。`0.0.0.0/0,::/0`。这意味着源可以是任何 IP 地址，来自任何系统请求。`0.0.0.0/0`
    代表 IPv4，`::/0` 代表 IPv6。


    您定义的 `ingress-all-test` 允许任何人通过端口 22 进行连接。它还将无限制地转发所有流量。使用 `vpc_id = "${aws_vpc.test-env.id}"`
    可以将其附加到您创建的 VPC。`ingress` 块描述了入站流量将如何处理。此示例定义了一条规则，接受来自所有 IP 地址在端口 `22` 上的连接。`egress`
    块定义了出站流量的规则，此示例将其定义为允许所有流量。


    作为最后一步，您需要定义 EC2 实例，这是实际的计算模块，您希望 AWS 云在此处进行计算以处理工作负载。请参见清单 14-8。


    ```

    resource "aws_instance" "test-ec2-instance" {

    ami = "${var.ami_id}"

    instance_type = "t2.micro"

    key_name = "${var.ami_key_pair_name}"

    security_groups = ["${aws_security_group.ingress-all-test.id}"]

    tags = {

    Name = "${var.ami_name}"

    }

    subnet_id = "${aws_subnet.subnet-uno.id}"

    }

    清单 14-8

    AWS EC2 配置 (ch14/ch14-01/servers.tf)

    ```


    此代码请求一个 `t2.micro` 类型的 AWS 实例。然后进行安全组和子网的关联。需要注意的一点是，我们在三个地方使用了变量——用于 `ami_id`、`ami_key_pair_name`
    和 `ami_name`。这些值来自另一个文件中定义的几个变量。请参见清单 14-9。


    ```

    variable "ami_name" {}

    variable "ami_id" {}

    variable "ami_key_pair_name" {}

    清单 14-9

    Terraform 变量配置 (ch14/ch14-01/variables.tf)

    ```


    定义这些变量是为了方便，以便整个 Terraform 计划可以用作模板，在需要时启动多个实例，并为这些变量提供采用不同值的选项。由于您将变量保留为空（如图所示），Terraform
    将在执行计划期间提示您在终端中输入这些变量。`ami_name` 变量将用作标签，`ami_id` 变量用于查找要启动的实例。


    现在，您几乎已经完成了所有工作，是时候在云中启动服务器了。

