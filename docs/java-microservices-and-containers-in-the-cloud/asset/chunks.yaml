  trans: "\n### 测试微服务 Pod\n\n当 Pod 启动并运行后，你就可以访问 Product Web 微服务了。不过，如附录 E 所述，你必须先获取\
    \ Minikube 的 IP 地址。请参见清单 10-49。\n\n```\n(base) binildass-MacBook-Pro:ch07-02 binil$\
    \ minikube ip\n192.168.64.6\n(base) binildass-MacBook-Pro:ch07-02 binil$\n清单 10-49\n\
    查找 Minikube IP\n```\n\n现在，你可以使用浏览器，通过 Minikube IP 构成的 URL 来访问 Product Web 微服务。\n\
    \n`http://192.168.64.5:8080/product.html`\n\n请参考第 1 章中“使用 UI 测试微服务”一节，来测试 Product\
    \ Web 微服务容器。\n\n在测试微服务时，请持续观察日志窗口，正如本章前面示例中清单 10-26 和 10-27 所描述的那样。\n\n现在，我们将更深入地了解一下\
    \ PostgreSQL 数据库。清单 10-50 声明了一个持久卷声明。\n\n```\n(base) binildass-MacBook-Pro:~ binil$\
    \ kubectl get persistentvolumeclaims\nNAME                               STATUS\
    \   VOLUME                                     CAPACITY   ACCESS MODES   STORAGECLASS\
    \   AGE\npostgres-persistent-volume-claim   Bound    pvc-2c90c05e-c233-44d4-8adb-5595da8edc3e\
    \   4Gi        RWO            standard       71s\n(base) binildass-MacBook-Pro:~\
    \ binil$\n清单 10-50\n描述 PVC\n```\n\n请注意，PVC 的状态为 `Bound`，并且它指明了绑定了哪个 `VOLUME`。它们具有设定的容量\
    \ `4Gi`（这是在清单 10-45 的 `yaml` 文件中请求的），并且具有指定的访问模式 `RWO`（一次读写），这意味着一次只能有一个 Pod 使用该卷。\n\
    \n即使你没有设置存储类，它也会被默认设置。这是由 Kubernetes 集群中运行的 `AdmissionController` 完成的，它会拦截你对 Kubernetes\
    \ API 服务器的请求并修改传入的对象。如果你指定了存储类，准入控制器就不会注入这个类。\n\n但是，这个存储类是谁创建的呢？你可以在清单 10-51 中检查该存储类。\n\
    \n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl describe storageclass standard\n\
    Name:            standard\nIsDefaultClass:  Yes\n...\nProvisioner:           k8s.io/minikube-hostpath\n\
    Parameters:            \nAllowVolumeExpansion:  \nMountOptions:          \nReclaimPolicy:\
    \         Delete\nVolumeBindingMode:     Immediate\nEvents:                \n\
    (base) binildass-MacBook-Pro:~ binil$\n清单 10-51\n描述存储类\n\n当你启动 Minikube 时，`StorageClass`\
    \ 就会为你创建。它是在你的 Minikube 安装过程中自动引导的。你可以读取其内容。你也可以在 Kubernetes 内部使用 `kubectl edit\
    \ sc standard` 来修改它。\n\n由于你有一个带有供应器的默认存储类，因此无需担心显式创建持久卷。相反，供应器会根据持久卷声明来负责创建这些卷。这就是为什么与上一个示例不同，这里没有显式配置\
    \ PV 的原因。清单 10-52 显示了 PV。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl\
    \ get persistentvolumes\nNAME                                       CAPACITY \
    \  ACCESS MODES   RECLAIM POLICY   STATUS   CLAIM                            \
    \          STORAGECLASS   REASON   AGE\npvc-2c90c05e-c233-44d4-8adb-5595da8edc3e\
    \   4Gi        RWO            Delete           Bound    default/postgres-persistent-volume-claim\
    \   standard                2m33s\n(base) binildass-MacBook-Pro:~ binil$\n清单 10-52\n\
    列出持久卷\n\n请注意，容量和访问模式与 `PersistentVolumeClaim` 相匹配。同时也要注意，`PersistentVolumes` 指向了已声明它的\
    \ PVC，就像 PVC 指向它们已声明的 `PersistentVolumes` 一样。\n\n在停止 Pod 和服务之前，请阅读下一节。\n\n## Kubernetes\
    \ Pod 的弹性\n\n在本章的第一个示例中，你看到当一个 Pod 被杀死时，默认情况下会有一个新的 Pod 被重新创建。你还看到，对于有状态集，当 Pod\
    \ 被重新创建时，Pod 的名称会被保留。\n\n这展示了不同类型 Pod 和部署的弹性。\n\n在接下来的几节中，你将使用 PostgreSQL Pod\
    \ 进行更多实验。\n"
- fmt: "### State Retention\n\nFirst list the existing pods, as shown in Listing [10-53](#619782_1_En_10_Chapter.xhtml#PC55).\n\
    \n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl get pods\nNAME          \
    \                 READY STATUS  RESTARTS AGE\npostgres-89dbf9fd9-f5bmc       1/1\
    \   Running 0        37m\nproduct-server-85d84cf89-kxvfw 1/1   Running 0     \
    \   37m\nproduct-web-69b5948fb9-brdnf   1/1   Running 0        37m\n(base) binildass-MacBook-Pro:~\
    \ binil$\nListing 10-53\nListing the Kubernetes Pods\n```\n\nIn Listing [10-54](#619782_1_En_10_Chapter.xhtml#PC56),\
    \ you can see that the PostgreSQL pod is not defined as a stateful set, but as\
    \ a deployment. Keeping that in mind, you can delete the pod.\n\n```\n(base) binildass-MacBook-Pro:~\
    \ binil$ kubectl delete po postgres-89dbf9fd9-f5bmc\npod \"postgres-89dbf9fd9-f5bmc\"\
    \ deleted\n(base) binildass-MacBook-Pro:~ binil$\nListing 10-54\nDeleting the\
    \ PostgreSQL Pod\n```\n\nNow list the remaining pods again, as shown in Listing\
    \ [10-55](#619782_1_En_10_Chapter.xhtml#PC57).\n\n```\n(base) binildass-MacBook-Pro:~\
    \ binil$ kubectl get pods\nNAME                           READY STATUS  RESTARTS\
    \ AGE\npostgres-89dbf9fd9-4r5wk       1/1   Running 0        9s\nproduct-server-85d84cf89-kxvfw\
    \ 1/1   Running 0        38m\nproduct-web-69b5948fb9-brdnf   1/1   Running 0 \
    \       38m\n(base) binildass-MacBook-Pro:~ binil$\nListing 10-55\nListing the\
    \ Kubernetes Pods Again\n```\n\nNote that the PostgreSQL database pod has been\
    \ re-created, but with a different name. What will happen to the state of the\
    \ deleted pod?\n\nTo answer this question, test the Product Web microservice using\
    \ the same URL so that the request will hit through the earlier existing Product\
    \ Server and Product Web microservice pods.\n\n`http://192.168.64.6:30263/product.html`\n\
    \nTo your surprise, you may see that the previous state is maintained. By state,\
    \ I mean, when you initialized the Product Server microservice, you inserted a\
    \ few database rows, and those are retained!\n\nYou need to explore further. To\
    \ do that, check out Listing [10-56](#619782_1_En_10_Chapter.xhtml#PC58), which\
    \ inspects the association between pods, PVCs, and PVs.\n\n```\n(base) binildass-MacBook-Pro:~\
    \ binil$ kubectl get pods --all-namespaces -o=json | jq -c '.items[] | {name:\
    \ .metadata.name, namespace: .metadata.namespace, claimName: .spec |  select(\
    \ has (\"volumes\") ).volumes[] | select( has (\"persistentVolumeClaim\") ).persistentVolumeClaim.claimName\
    \ }'\n{\"name\":\"postgres-89dbf9fd9-4r5wk\",\"namespace\":\"default\",\"claimName\"\
    :\"postgres-persistent-volume-claim\"}\n(base) binildass-MacBook-Pro:~ binil$\n\
    Listing 10-56\nAssociation Between Pods and PVCs\n```\n\nThis listing shows the\
    \ association between the PostgreSQL pod and its PVC. You can also see the association\
    \ between the PVC and PV, shown in Listing [10-57](#619782_1_En_10_Chapter.xhtml#PC59).\n\
    \n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl get pvc --all-namespaces\
    \ -o json | jq -j '.items[] | \"\\(.metadata.namespace), \\(.metadata.name), \\\
    (.spec.volumeName)\\n\"'\ndefault, postgres-persistent-volume-claim, pvc-2c90c05e-c233-44d4-8adb-5595da8edc3e\n\
    (base) binildass-MacBook-Pro:~ binil$\nListing 10-57\nAssociation Between PV and\
    \ PVC\n```\n\nTo understand this, note what the Kubernetes documentation says:\n\
    \n> *A user creates, or in the case of dynamic provisioning, has already created,\
    \ a PersistentVolumeClaim with a specific amount of storage requested and with\
    \ certain access modes. A control loop in the master watches for new PVCs, finds\
    \ a matching PV (if possible), and binds them together. If a PV was dynamically\
    \ provisioned for a new PVC, the loop will always bind that PV to the PVC. Otherwise,\
    \ the user will always get at least what they asked for, but the volume may be\
    \ in excess of what was requested. Once bound, PersistentVolumeClaim binds are\
    \ exclusive, regardless of how they were bound. A PVC to PV binding is a one-to-one\
    \ mapping, using a ClaimRef which is a bidirectional binding between the PersistentVolume\
    \ and the PersistentVolumeClaim.*\n> \n> —Kubernetes\n\nThis explains the behavior\
    \ you saw earlier to some extent. Further details are beyond the scope of this\
    \ discussion and you are advised to refer to the Kubernetes documentation.\n\n\
    Once you are done testing, you can stop and remove the microservice containers\
    \ and clean the environment by using the `clean.sh` script shown in Listing [10-58](#619782_1_En_10_Chapter.xhtml#PC60).\n\
    \n```\nmvn -Dmaven.test.skip=true clean\nkubectl delete -f product-web-service.yml\n\
    kubectl delete -f product-web-deployment.yml\nkubectl delete -f product-server-service.yml\n\
    kubectl delete -f product-server-deployment.yml\nkubectl delete -f postgres-svc.yml\n\
    kubectl delete -f postgres-deployment.yml\nkubectl delete -f postgres-pvc.yml\n\
    kubectl delete -f postgres-config.yml\ndocker rmi -f ecom/product-web\ndocker\
    \ rmi -f ecom/product-server\nListing 10-58\nThe Script to Bring Down Microservices\
    \ Kubernetes Pods (ch10\\ch10-02\\clean.sh)\n```\n\nYou can execute this script\
    \ to stop and remove the microservice pods and clean the environment, as shown\
    \ in Listing [10-59](#619782_1_En_10_Chapter.xhtml#PC61), just like the way you\
    \ cleaned up your environment in Listing [10-40](#619782_1_En_10_Chapter.xhtml#PC42).\n\
    \n```\n((base) binildass-MacBook-Pro:ch10-02 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch10/ch10-02\n\
    (base) binildass-MacBook-Pro:ch10-02 binil$ eval $(minikube docker-env)\n(base)\
    \ binildass-MacBook-Pro:ch10-02 binil$ sh clean.sh\n...\nListing 10-59\nStopping\
    \ Microservice Pods and Cleaning the Environment\n```\n\n## Summary\n\nYou started\
    \ your journey into containers in Chapters [7](#619782_1_En_7_Chapter.xhtml) and\
    \ [8](#619782_1_En_8_Chapter.xhtml), and in Chapter [9](#619782_1_En_9_Chapter.xhtml),\
    \ you extended that learning to use Docker Compose to compose multiple microservice\
    \ and database containers. During the start of this chapter, you learned that\
    \ when you move from monolithic to microservices, you increase the number of moving\
    \ parts, and so the overall complexity also increases. This is where better container\
    \ management tools like Kubernetes pay off. This chapter included a quick introduction\
    \ to Kubernetes and introduced the familiar microservices example interacting\
    \ with both an SQL and a NoSQL database within the Kubernetes toolset. You are\
    \ not finished yet, since you have yet to investigate integrating message brokers\
    \ into your Kubernetes ecosystem. This is covered in Chapter [11](#619782_1_En_11_Chapter.xhtml)."
