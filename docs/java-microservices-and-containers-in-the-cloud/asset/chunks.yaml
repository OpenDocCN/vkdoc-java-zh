- fmt: '### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch08\ch08-03` folder. Much
    of the source code in this example is similar to that in `ch03\ch03-01`, which
    was explained in detail in Chapter [3](#619782_1_En_3_Chapter.xhtml), in the section
    titled “Microservices Using PostgreSQL and RestTemplate.” You saw the deployment
    schema of multiple interacting microservices in the previous two examples, so,
    in this example, emphasis is on connecting to a non-containerized database.


    ### Container to PostgreSQL in Host Configuration


    Since the Postgres database is running on the host system, you need to allow the
    Docker container running the Product Server microservice to connect to a local
    PostgreSQL database. Assuming you don’t want the container to share the network
    with the host (using `--network host` parameter while running it), the database
    and the container need to be configured to communicate.


    Refer to these sections in Appendix C on PostgreSQL:


    - Opening a PostgreSQL server for remote clients

    - Opening PostgreSQL on a host machine for Docker clients


    Those configurations should be enough to create a Postgres database running on
    a host system work with a containerized app.


    ### Run Containers Using Dockerfiles


    The `ch08\ch08-03` folder contains the Maven scripts required to build the examples.
    As a first step, you need to bring up the PostgreSQL server. This example assumes
    you already have a PostgreSQL server running, and you have configured it as mentioned
    previously. You need to execute the following commands in Listing [8-23](#619782_1_En_8_Chapter.xhtml#PC24)
    to bring up PostgreSQL.


    ```

    binildass-MacBook-Pro:~ binil$ pg_ctl -D /Library/PostgreSQL/12/data start

    Listing 8-23

    Bringing Up the PostgreSQL Server

    ```


    If you have already made the configurations required for the Postgres database
    running on a host system work with a containerized app in the previous section,
    you now need to tell the container about the host’s IP address. You can pass the
    host’s IP using the `--add-host` option, which is done in Listing [8-25](#619782_1_En_8_Chapter.xhtml#PC26).
    In this case, the host is a name of the host machine, and it will be added to
    the container’s `/etc/hosts` file. Inside the Docker container, you can use the
    name `host` to connect to the host system. You need to have the IP of the host
    where PostgreSQL is running, which you find in Listing [8-24](#619782_1_En_8_Chapter.xhtml#PC25).


    ```

    binildass-MacBook-Pro:~ binil$ ipconfig getifaddr en0

    192.168.29.96

    binildass-MacBook-Pro:~ binil$

    Listing 8-24

    Finding the IP of PostgreSQL Host Machine

    ```


    The `Dockerfile` in this example is the same `Dockerfile` used in the previous
    example, which is shown in Listing [8-5](#619782_1_En_8_Chapter.xhtml#PC6).


    Next, build the microservices and Docker images and then run the containers. You
    will modify the scripts in the previous example in this chapter. Listing [8-25](#619782_1_En_8_Chapter.xhtml#PC26)
    organizes the commands into a single script.


    ```

    mvn -Dmaven.test.skip=true clean package

    docker build  --build-arg JAR_FILE=01-ProductServer/target/*.jar -t ecom/product-server
    .

    docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t ecom/product-web
    .

    docker network create ecom-network

    docker run -d -p 8081:8081 --net=ecom-network --add-host=host:192.168.29.96 --name
    product-server -e DB_SERVER=host:5432 -e POSTGRES_DB=productdb -e POSTGRES_USER=postgres
    -e POSTGRES_PASSWORD=postgre ecom/product-server

    docker run -d -p 8080:8080 --net=ecom-network --name product-web -e acme.PRODUCT_SERVICE_URL=http://product-server:8081/products
    ecom/product-web

    Listing 8-25

    Script to Build and Run Microservices Docker Containers (ch08\ch08-03\makeandrun.sh)

    ```


    To build the microservices and the Docker images and then run the containers,
    you need to execute the script in Listing [8-25](#619782_1_En_8_Chapter.xhtml#PC26),
    as shown in Listing [8-26](#619782_1_En_8_Chapter.xhtml#PC27).


    ```

    (base) binildass-MacBook-Pro:ch08-03 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch08/ch08-03

    (base) binildass-MacBook-Pro:ch08-03 binil$ eval $(minikube docker-env)

    (base) binildass-MacBook-Pro:ch08-03 binil$ sh makeandrun.sh

