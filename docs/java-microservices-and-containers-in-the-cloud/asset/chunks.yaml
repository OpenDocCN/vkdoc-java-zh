    ## 总结


    每一个终点都是新的起点。你已读完本书，但你的微服务和云原生之旅才刚刚启程。我为你揭开了架构选择中的几个迷思，并深入探讨了许多细节。从第 1 章最简单的微服务示例开始，到第
