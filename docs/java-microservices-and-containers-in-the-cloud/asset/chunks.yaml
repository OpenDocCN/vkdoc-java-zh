    你可以简单地将应用程序构建产物添加到 Tomcat 的 `webapps` 目录（对于官方 Docker 镜像，该目录为 `/usr/local/tomcat/webapps`）来部署应用。根据添加到
    `webapps` 目录的构建产物名称，Tomcat 会将此应用映射到特定的路由。如果你将 `ProductWeb.war` 以 `product-web.war`
    的名称添加到 `webapps`，则可以通过 Tomcat URL 的 `/product-web` 路径访问它。如果你想在没有任何额外路径的情况下部署应用，则必须使用名为
    `ROOT` 的构件。参见清单 7-16。


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run -it -p 8080:8080 -v $(pwd)/ProductWeb/target/ProductWeb.war:/usr/local/tomcat/webapps/productapp.war
    tomcat

    Using CATALINA_BASE:   /usr/local/tomcat

    Using CATALINA_HOME:   /usr/local/tomcat

    Using CATALINA_TMPDIR: /usr/local/tomcat/temp

