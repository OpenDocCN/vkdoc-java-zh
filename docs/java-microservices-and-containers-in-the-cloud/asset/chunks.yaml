    ## 使用 Spring Cloud 的微服务


    Spring Cloud 构建于 Spring Boot 之上。Spring Cloud 提供了分布式微服务生态系统中的许多常见模式，可以帮助你将核心服务集成为一组松散耦合的服务。Spring
    Cloud 还提供了许多强大的工具，可以增强 Spring Boot 应用程序的行为以实现这些模式。本节将通过代码介绍其中一种模式，以便你了解其带来的好处。


    ### 设计微服务


    本节对之前的微服务示例稍作修改，以引入 Spring Cloud。


    ![](img/619782_1_En_2_Fig2_HTML.jpg)


    一个模型图将最终用户和浏览器通过传入命令、REST API、产品 REST 控制器、产品服务代理、产品服务以及带有 Feign 客户端的传出命令连接到 product-web-microservice，并通过传入命令、REST
    API、控制器、产品仓库、产品实体和 MongoDB 连接到 product-service-microservice。


    图 2-2

    使用 Spring Cloud Feign 客户端的微服务设计


    如之前的示例所述，在图 2-2 所示的两个微服务中，你在 REST 接口处使用 HTTP 端口，这些端口指定了用户浏览器或其他 HTTP 客户端如何使用应用程序核心。这些端口（接口）作为
    REST 控制器属于各自微服务的业务逻辑内部。来自浏览器的请求将命中 Product Web 微服务，即消费者微服务。Product Web 微服务不执行任何业务逻辑；相反，它将调用委托给
    Product Server 微服务，即提供者微服务。


    Product Web 微服务中的 `FeignClient` 端口是另一个端口，它同样只是应用程序核心如何使用它的规范。一个实现了 `FeignClient`
    端口的具体驱动适配器由 Spring Cloud 注入到应用程序核心中，无论该端口在何处被需要（通过类型提示）。


    `Product` 实体实现了 Product Server 微服务中的应用程序核心。


    Product Server 微服务中的其余端口和适配器的功能与之前的示例完全相同。

    '
- fmt: '### Understanding the Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized inside the `ch02\ch02-02` folder.
    The source code is similar to the previous example. The `Product Server` microservice
    is similar; however, there are a few changes in the `Product Web` microservices,
    which you look at here. Instead of the `RestTemplate`, this example uses `FeignClient`.
    Listing [2-14](#619782_1_En_2_Chapter.xhtml#PC15) shows how to specify `FeignClient`.


    ```

    public interface ProductService {

    @RequestMapping(value = "/products",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity>>

    getAllProducts();

    @RequestMapping(value = "/products/{productId}",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> getProduct(

    @PathVariable("productId") String productId);

    @RequestMapping(value = "/products",

    method = RequestMethod.POST,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> addProduct(

    @RequestBody Product product);

    @RequestMapping(value = "/products/{productId}",

    method = RequestMethod.DELETE,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> deleteProduct(

    @PathVariable("productId") String productId);

    @RequestMapping(value = "/products/{productId}",

    method = RequestMethod.PUT,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> updateProduct(

    @PathVariable("productId") String productId ,

    @RequestBody Product product);

    }

    Listing 2-14

    The Service Interface for the Product Server Microservice (ch02\ch02-02\02-ProductWeb\src\main\java\com\acme\ecom\product\api\ProductService.java)

    ```


    The first thing you’ll do here is define a service interface, as shown in Listing
    [2-14](#619782_1_En_2_Chapter.xhtml#PC15). Based on this service interface, you
    can declare an abstract `FeignClient`, which is a declarative web service client.
    The nice thing about using `Feign` is that you don’t have to write any code for
    calling the service, other than an interface definition, as shown in Listing [2-15](#619782_1_En_2_Chapter.xhtml#PC16).


    ```

    @FeignClient(name="the-name", url = "http://localhost:8081")

    public interface ProductServiceProxy extends ProductService{

    }

    Listing 2-15

    The Feign Client Interface for the Product Server Microservice (ch02\ch02-02\02-ProductWeb\src\main\java\com\acme\ecom\product\client\ProductServiceProxy.java)

    ```


    A name must be specified for all clients, which is the name of the service with
    the optional protocol prefix.


    You then declare this `FeignClient` in `pom.xml`, as shown in Listing [2-16](#619782_1_En_2_Chapter.xhtml#PC17).


    ```

    org.springframework.cloud

    spring-cloud-starter-openfeign

    4.1.0

    Listing 2-16

    The Feign Client Dependency in Maven (ch02\ch02-02\02-ProductWeb\pom.xml)

    ```


    You can use application properties to configure `Feign` clients; however, I am
    keeping this example simple, without configuring the `Feign` client with such
    details. See Listing [2-17](#619782_1_En_2_Chapter.xhtml#PC18).


    ```

    feign:

    client:

    config:

    default:

    connectTimeout: 5000

    readTimeout: 5000

    loggerLevel: basic

    Listing 2-17

    The Ribbon Configuration (ch02\ch02-02\02-ProductWeb\src\main\resources\application.properties)

    ```


    ### Build and Run the Microservice


    The `ch02\ch02-02` folder contains the Maven scripts required to build the examples.
    As a first step, you need to bring up the MongoDB server. Refer to Appendix B
    to learn how to set up a MongoDB server and bring it up. You need to execute the
    commands shown in Listing [2-18](#619782_1_En_2_Chapter.xhtml#PC19) to bring MongoDB
    up.


    ```

    (base) binildass-MBP:bin binil$ pwd

    /Users/binil/Applns/mongodb/mongodb-macos-x86_64-4.2.8/bin

    (base) binildass-MBP:bin binil$ mongod --dbpath /usr/local/var/mongodb --logpath
    /usr/local/var/log/mongodb/mongo.log

    Listing 2-18

    Bringing Up the MongoDB Server

    ```


    Next, take two command terminals and change the directory to the top-level folder
    of both microservices. Then, build and run the `Product Server` microservice using
    the `make.sh` and the `run.sh` scripts, as shown in Listing [2-19](#619782_1_En_2_Chapter.xhtml#PC20).


    ```

    (base) binildass-MacBook-Pro:01-ProductServer binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch02/ch02-02/01-ProductServer

    (base) binildass-MacBook-Pro:01-ProductServer binil$ sh make.sh

    [INFO] Scanning for projects...

    [INFO]

    ...

    2023-12-20 09:28:00 INFO  InitializationComp.init:45 - Start

    2023-12-20 09:28:01 INFO  InitializationComp.init:67 - End

    2023-12-20 09:28:01 INFO  Start.log:56 - Started EcomProd...

    Listing 2-19

    Build and Run Product Server Microservice Using Scripts

    ```


    As a next step, build and run the `Product Web` microservice, as shown in Listing
    [2-20](#619782_1_En_2_Chapter.xhtml#PC21).


    ```

    (base) binildass-MacBook-Pro:02-ProductWeb binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch02/ch02-02/02-ProductWeb

    (base) binildass-MacBook-Pro:02-ProductWeb binil$ sh make.sh

    [INFO] Scanning for projects...

    ...

    2023-12-20 09:32:00 INFO  InitComponent.init:37 - Start

    2023-12-20 09:32:00 DEBUG InitComponent.init:39 - Do Nothing.

    2023-12-20 09:32:00 INFO  InitComponent.init:41 - End

    2023-12-2009:32:00 INFO Start.log:56 - Started EcomProduct...

    Listing 2-20

    Build and Run Product Web Microservice Using Scripts

    ```


    Now that both microservices are up and running, you can now test the microservices.


    ### Testing the Microservices


    Once both microservices are up and running, you can access the web application
    using your browser. Point to this URL:


    `http://localhost:8080/product.html`


    To test the CRUD operations, follow the instructions described in the subsection,
    “Test the Microservices Using UI” in the last section of Chapter [1](#619782_1_En_1_Chapter.xhtml),
    titled “Your First Java Microservice.”


    Now that you have experienced the flavor of Spring Boot and Spring Cloud, the
    next section looks at one more important concept in REST-based microservices—HATEOAS
    and HAL.


    ## HATEOAS and HAL


    Hypermedia as the Engine of Application State (HATEOAS) is a constraint of the
    REST application architecture, which decouples the client from the server. Such
    a decoupling enables server functionality to evolve independently. The following
    section investigates this more, again with working examples.'
