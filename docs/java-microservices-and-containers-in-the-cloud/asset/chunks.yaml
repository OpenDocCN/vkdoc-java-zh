    (base) binildass-MacBook-Pro:ch07-02 binil$

    清单 7-29

    检查本地 Docker 注册表

    ```


    忽略镜像创建时间为“52 years ago”的标签，我不确定为什么会这样显示。一旦容器运行起来，你可以列出正在运行的容器，如清单 7-30 所示。

