  trans: '

    ### 子网


    *子网*是您 VPC 中的一个 IP 地址范围。您可以在特定子网中创建 AWS 资源，例如 EC2 实例。创建子网时，您需要根据 VPC 的配置指定其 IP
    地址。IPv4 子网拥有一个 IPv4 CIDR 块，但没有 IPv6 CIDR 块。同样，IPv6 子网拥有一个 IPv6 CIDR 块，但没有 IPv4
    CIDR 块。双栈子网则同时拥有这两种块。


    子网有两种类型：


    *   **公有子网**：具有通往互联网网关的直接路由。公有子网中的资源可以访问公共互联网。


    *   **私有子网**：没有通往互联网网关的直接路由。私有子网中的资源需要 NAT 设备才能访问公共互联网。


    ### 公共代理子网


    如果运行在子网中的 EC2 实例需要通过互联网访问，您可以创建一个代理子网。请按照以下步骤操作：


    1.  创建一个子网，其 IP 地址范围是分配给 VPC 的 IP 地址范围的一部分。


    2.  创建一个路由表并将其附加到该子网。


    3.  添加一条指向互联网网关的 `0.0.0.0/0` 路由到该路由表。


    ### NAT 网关


    NAT 网关是一种网络地址转换（NAT）服务。您可以使用 NAT 网关，以便私有子网中的实例可以连接到 VPC 外部的服务，但外部服务无法主动与这些实例建立连接。


    ### EC2


    Amazon EC2 是一项 Web 服务，可在云中提供安全、可调整大小的计算容量。您将在后面的示例中使用 T2 实例。T2 实例是一种低成本、通用型实例类型，可提供基准
    CPU 性能，并能在需要时提升至基准以上。T2 实例是成本最低的 Amazon EC2 实例选项之一，非常适合微服务等各种通用型应用。


    ### 路由表


    路由表包含一组称为*路由*的规则，用于确定来自您的子网或网关的网络流量去向。


    *主*路由表随您的 VPC 自动创建，它是一个隐式路由表。它控制所有未显式关联到其他路由表的子网的路由。


    VPC 中的每个子网都必须关联一个路由表，该路由表控制该子网的路由（即子网路由表）。


    ### 互联网网关


    互联网网关（IGW）使您的实例能够通过 Amazon EC2 网络边缘连接到互联网。IGW 将使用网络地址转换（NAT）将您虚拟机的公有 IP 地址转换为其私有
    IP 地址。VPC 中使用的所有公有 IP 地址均由该 IGW 控制。


    这些 AWS 服务仅为代表性示例，并非详尽无遗。对这些服务或更多服务的详细讨论超出了本书的范围。


    ## 基础设施即代码（IaC）


    基础设施即代码（IaC）是指您编写并执行代码来定义、部署、更新和销毁您的基础设施。通常，您一直使用临时脚本（例如 `.sh` bash 脚本）来自动化基础设施管理。这种临时脚本提供了一种基于通用工具的方法，因此您需要为每个任务编写完整的自定义代码。而专为
    IaC 设计的特定工具则为完成复杂任务提供了简洁的 API，从而为您的代码强制执行特定的结构。临时脚本非常适合小型的、一次性的任务，但当涉及到包含多个动态组件的基础设施时，尤其是当您需要管理大量微服务时，bash
    脚本就会变成一团难以维护的意大利面条式代码。这时，IaC 工具就能为您提供帮助。


    让我们看看 IaC 的一些好处：


    *   **自助服务**：既然您在阅读本书，那么您在日常工作中的角色很可能是一名应用程序开发人员，而不是系统管理员。然而，有时您可能需要一个基础设施来部署和测试您的应用程序组件。根据我多年的经验，我见过少数系统管理员服务于整个大团队或整个组织。那么，作为一名开发人员，您如何及时获得一个基础设施呢？如果您的基础设施是用代码定义的，那么基础设施的部署过程就可以自动化，您可以在需要时自行启动部署来配置基础设施。


    *   **版本控制**：当您将基础设施配置作为代码时，您可以将 IaC 存储在版本控制系统中，这样您基础设施的整个历史记录都会被捕获在提交日志中。这意味着，当出现问题并且您怀疑是由于基础设施的更改导致时，您可以简单地回滚到之前已知良好的配置代码版本。


    下一节将介绍 IaC 领域的一个工具——Terraform。


    ### Terraform


    Terraform 是由 HashiCorp 创建的一个开源 IaC 工具。Terraform 使用 Go 语言编写。Terraform 可以使用您已经在
    AWS、Azure、Google Cloud 等云服务提供商中使用的身份验证机制，然后进行 API 调用。您需要创建 Terraform 配置文件，这些文件是用于指定您想要创建的基础设施的文本文件。


    您可以定义您的整个基础设施，从互联网网关、负载均衡器、VPC、子网、服务器等等开始。您在 Terraform 配置文件中完成这些定义，并将这些文件提交到版本控制系统。然后，您可以运行
    `terraform apply` 在目标云上创建您的基础设施。当您需要对基础设施进行一些更改时，您在 Terraform 配置文件中进行这些更改，通过代码审查和测试来验证这些更改，将更新后的代码提交到版本控制，然后再次运行
    `terraform apply` 命令。需要注意的一点是，没有直接的方法可以使用相同的 Terraform 配置在不同的云提供商上部署相同的基础设施，因为云提供商不提供相同类型的基础设施。


    以上就是对公有云和 IaC 的简要介绍。下一节将把这些知识付诸实践。


    ## 使用 Terraform 设置 AWS EC2


    在本节中，您将使用 Terraform 在 AWS 中创建一个 EC2 计算基础设施。我假设您的开发机器上已经具备以下先决条件：


    *   一个您知道如何使用 AWS Web 控制台管理的 AWS 账户


    *   一个 AWS CLI（命令行界面）以及带有访问 AWS 账户密钥的终端（可选）


    *   一个用于访问您的 EC2 实例的密钥对


    *   Terraform


    我无意在本书中涵盖这些方面。如果您不熟悉这些步骤，请参考相关书籍。^(⁷) 附录 F 也为使用其中一些工具提供了一些指导。


    接下来的几节将使用已经讨论过的一些 AWS 基础设施组件进行演示。


    ### 在云中设计一个微型数据中心


    您将在 AWS 云中拥有一个非常精简的计算模块。尽管目标是建立一个最小的计算基础设施，但请注意，为此您需要一整套计算和网络基础设施，这并非易事。多亏了 Terraform，它甚至能让像你我这样的开发人员也能完成如此复杂的任务。图
    14-5 展示了 AWS 云中的目标计算模块。


    ![](img/619782_1_En_14_Fig5_HTML.jpg)


    一个分层块状图展示了以下流程，从最外层到最内层依次为：互联网、AWS 云和区域下的互联网网关、VPC 下的路由器和路由表、子网下的 EC2 和 T2 的安全组。


    图 14-5


    AWS 云中的微型数据中心


    下一节将进入代码部分。首先从研究项目结构开始。

