    entity name defaults to the name of the class. You can change its name using the
    `name` element `@Entity(name="product")`. In some cases, the name of the table
    in the database and the name of the entity will not be the same. In these cases,
    you can specify the table name using the `@Table` annotation.


    Each JPA entity must have a primary key that uniquely identifies it. The `@Id`
    annotation defines the primary key. You can generate the identifiers in multiple
    ways, specified by the `@GeneratedValue` annotation. You can choose from four
    ID-generation strategies with the strategy element. The value can be `AUTO`, `TABLE,
    SEQUENCE`, or `IDENTITY`.


    You can also use the `@Column` annotation to mention the details of a column in
    the table. The `@Column` annotation has many elements, including `name`, `length`,
    `nullable`, and `unique`.


    There is another reason to introduce the `ProductOR` entity. I want to demonstrate
    that while using the ports and adapters architecture, you can reuse the core entities
    and core business services to the maximum. In other words, I want to demonstrate
    that `Product` entity used in this example is reused in the next example too,
    which will assert the capability to plugging in different driven adapters at runtime,
    still reusing the core. To do that, the `ProductOR` entity will take care of all
    adapter (database) specific details.


