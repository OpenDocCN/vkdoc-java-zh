    '
- fmt: "```bash\n(base) binildass-MacBook-Pro:~ binil$ kubectl exec product-web-5dfc886d6d-8cl7t\
    \ env\n...\nacme.PRODUCT_SERVICE_URL=http://product-server:8081/products\nListing\
    \ 10-22\nListing the Environment Variables for Product Web Microservice\n```\n\
    \nThe command in Listing [10-22](#619782_1_En_10_Chapter.xhtml#PC24) will spit\
    \ out all the environment variables that you configured in Listing [10-6](#619782_1_En_10_Chapter.xhtml#PC7).\n\
    \nNext, list the Kubernetes services, as shown in Listing [10-23](#619782_1_En_10_Chapter.xhtml#PC25).\n\
    \n```bash\n(base) binildass-MacBook-Pro:~ binil$ kubectl get svc\nNAME       \
    \       TYPE         CLUSTER-IP     PORT(S)\nkubernetes        ClusterIP    10.96.0.1\
    \      443/TCP\nmongo             ClusterIP    10.98.30.13    27017/TCP\nmongo-nodeport\
    \    NodePort     10.110.211.153 27017:30001/TCP\nproduct-server    ClusterIP\
    \    10.102.46.205  8081/TCP\nproduct-server-np NodePort     10.109.197.184 8081:30002/TCP\n\
    product-web       LoadBalancer 10.98.43.63    8080:30503/TCP\n(base) binildass-MacBook-Pro:~\
    \ binil$\nListing 10-23\nListing the Kubernetes Services\n```\n\n**Note:** I have\
    \ abbreviated `product-server-nodeport` to `product-server-np` in Listing [10-23](#619782_1_En_10_Chapter.xhtml#PC25)\
    \ for formatting convenience.\n\nListing [10-24](#619782_1_En_10_Chapter.xhtml#PC26)\
    \ examines one of the services from Listing [10-23](#619782_1_En_10_Chapter.xhtml#PC25)\
    \ in more detail.\n\n```bash\n(base) binildass-MacBook-Pro:~ binil$ kubectl describe\
    \ svc product-web\nName:                     product-web\nNamespace:         \
    \       default\nLabels:                   \nAnnotations:              \nSelector:\
    \                 app=product-web\nType:                     LoadBalancer\nIP\
    \ Family Policy:         SingleStack\nIP Families:              IPv4\nIP:    \
    \                   10.98.43.63\nIPs:                      10.98.43.63\nPort:\
    \                       8080/TCP\nTargetPort:               8080/TCP\nNodePort:\
    \                   30503/TCP\nEndpoints:                10.244.1.104:8080\nSession\
    \ Affinity:         None\nExternal Traffic Policy:  Cluster\nEvents:         \
    \          \n(base) binildass-MacBook-Pro:~ binil$\nListing 10-24\nDescribing\
    \ the Kubernetes Service\n```\n\nAs you can see, services use an `Endpoints` resource\
    \ to link to a pod. An `Endpoints` is a comma-separated list of IP addresses and\
    \ ports exposing a service. The `Endpoints` resource is like any other Kubernetes\
    \ resource, so you can display its basic info with the `kubectl` command, as shown\
    \ in Listing [10-25](#619782_1_En_10_Chapter.xhtml#PC27).\n\n```bash\n(base) binildass-MacBook-Pro:~\
    \ binil$ kubectl get endpoints product-web\nNAME          ENDPOINTS          \
    \ AGE\nproduct-web   10.244.1.104:8080   13m\n(base) binildass-MacBook-Pro:~ binil$\n\
    Listing 10-25\nDescribing the Kubernetes Service Endpoint\n```\n\nBefore you attempt\
    \ to test these services, it will help you to keep watching the terminal logs\
    \ for the Product Server and Product Web microservices. You can view the logs\
