    ## 微服务的入站路由


    通过前几章以及本章前面的示例，你已经了解了如何在 Kubernetes 中通过多个业务、应用和基础设施服务完成典型的部署。本节将向你展示如何调整第 10 章第二个示例中的同一组微服务，在前端接入一个
    Ingress 来路由外部请求。一个消费者微服务和一个提供者微服务相互通信。提供者微服务将实体存储在 PostgreSQL 数据库中。来自浏览器的请求由 Ingress
    拦截。如第 10 章所述，Ingress 可以通过单个 IP 地址暴露多个服务。


    尽管这个示例包含在本章中，并且标题为“面向消息的微服务”作为最后一个示例，但我有意去掉了微服务之间的消息桥接。这是为了让示例更轻量，以便我可以引入一些其他新组件，并将示例的整体复杂性控制在合理范围内。


    ### 设计 Ingress 路由拓扑


    Product Web 和 Product Server 微服务均已容器化，Product Server 微服务将连接到部署在容器内的 PostgreSQL
    数据库。所有这些容器都将驻留在 Kubernetes 中。Ingress 成为路由的附加组件，而 Adminer UI 组件则用于管理 PostgreSQL
    数据库。参见图 11-3。


    ![](img/619782_1_En_11_Fig3_HTML.jpg)


    一个 3D 模型图，展示了连接到浏览器的用户、Ingress 基础设施服务、Product Web 微服务、Product Server 微服务、带功能的容器引擎、主机操作系统和硬件。Product
    Web 包含一个业务服务，Product Server 包含一个业务服务和两个应用服务。


    图 11-3


    微服务的 Ingress 路由拓扑


    ### 环境配置


    要使 URL（[`http://products.acme.test`](http://products.acme.test) 和 [`http://adminer.acme.test`](http://adminer.acme.test)）生效，你需要编辑主机上的
    hosts 文件。


    每个连接到互联网的网站都有一个唯一的数字地址，用于告知所有其他设备其位置——即其 TCP/IP 地址。域名系统（DNS）将这些数字地址转换为人类更容易识别和记忆的形式，例如
    [`www.acme.com`](http://www.acme.com)。当你第一次输入像 [`www.acme.com`](http://www.acme.com)
    这样的网址时，你的机器会向一个 DNS 服务器发送请求——通常是由你的 ISP（互联网服务提供商）自动配置的。这将解析你要连接的服务器对应的 TCP/IP
    地址。你的浏览器会建立一个隐藏的缓存文件，以便在你再次访问该网站时记住这些细节。


    如前所述，本示例将名称添加到 hosts 文件中，如代码清单 11-31 所示。


    ```

    (base) binildass-MacBook-Pro:ch11-03 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:~ binil$ sudo nano /etc/hosts

    192.168.64.5  adminer.acme.com

    192.168.64.5  products.acme.com

    (base) binildass-MacBook-Pro:~ binil$ ^O (保存)

    (base) binildass-MacBook-Pro:~ binil$ ^X (退出)

    (base) binildass-MacBook-Pro:~ sudo killall -HUP mDNSResponder

    代码清单 11-31

    将主机名添加到 etc Hosts 文件

    ```


    代码清单 11-31 展示了如何添加两行新内容，将两个新主机名添加到我的机器上。这会将你的本地主机（Minikube）IP 地址映射到这两个主机名，并使它们可访问。


    图 11-4 展示了我是如何编辑这个文件的。


    ![](img/619782_1_En_11_Fig4_HTML.jpg)


    一个裁剪后的截图，显示 binil sudo 80 x 5 窗口。其中包含两条命令，内容为 base（括号内）binil d a s s-MacBook-Pro
    冒号波浪线 binil 美元符号 sudo nano 斜杠 e t c 斜杠 hosts 和密码。


    图 11-4


    编辑 hosts 文件


    图 11-5 展示了我是如何在我的机器上添加这两个主机名的。


    ![](img/619782_1_En_11_Fig5_HTML.jpg)


    一个 binil pico sudo 80 x 20 窗口的截图。其中包含 U W pico 5.09 文件：斜杠 e t c 斜杠 hosts 数据，内容为：主机数据库，localhost
    用于配置回环接口，系统启动时请勿更改此条目，由 Docker Desktop 添加，以及其他内容，包括 localhost、broadcasthost 和其他地址。


    图 11-5


    添加主机名


    完成后，按住 Control 和 O 键保存文件，然后按 Control 和 X 退出。随后在命令行中，输入 `sudo killall -HUP mDNSResponder`，然后按回车键。这将刷新你的
    DNS 缓存，以免因对 Hosts 文件所做的任何更改而导致混淆。

