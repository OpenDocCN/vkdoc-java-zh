    ```


    有趣的是，你会发现 Product Web Pod 并没有被删除。准确地说，它确实被删除了，但随后又被重新创建了，因为你在清单 10-6 的 `product-web-deployment.yml`
    中指定了 `replicas: 1`，这正是你向 Kubernetes 提出的请求。请注意，Pod 有了一个新名称，因为它不是一个 StatefulSet。


    现在，让我们删除一个 StatefulSet 看看会发生什么。请参见清单 10-35。


