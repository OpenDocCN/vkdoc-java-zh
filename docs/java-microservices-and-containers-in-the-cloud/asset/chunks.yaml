    ```


    微服务实例的消息处理模式是并发处理消息，并且可能乱序处理，如图 5-15 所示。


    ![](img/619782_1_En_5_Fig15_HTML.jpg)


    该图说明了使用类似 Kafka 的系统，在提供者微服务实例之间通过请求主题和回复主题实现的请求-回复模型。请求主题有多个分区，请求被放置到特定的分区中。


    图 5-15


    微服务消费者与分区分配


    当微服务启动并运行后，您也可以通过浏览器访问 Web 应用程序，指向以下 URL：


    `http://localhost:8080/product.html`


    `http://localhost:8081/product.html`


    `http://localhost:8082/product.html`


    您可能需要在浏览器控制台稍等片刻，因为由于微服务中配置的睡眠延迟，浏览器最终才会渲染数据。


    ## 总结


    使用面向消息的微服务的事件驱动架构的一个主要好处是，将事件生产者微服务与事件消费者微服务解耦，从而允许系统更加灵活和可演进。依赖同步的请求-回复语义则恰恰相反，生产者和消费者微服务紧密耦合。这仅应在必要时使用。如果需要同步的请求-回复，基于
    HTTP 的协议比使用像 Apache Kafka 这样的异步通道更简单、更直接、更高效。话虽如此，在某些场景下，使用同步风格的请求-回复可能是有意义的。您可能需要根据手头的任务，明智地从可用的选项组合中进行选择。本章中的示例演示了通过消息通道检索
    Product 实体集合的过程。您现在可能会自然地想到，本章中解释的微服务间交互风格是否可以在实际生活中用于覆盖完整的业务用例，而这正是第 6 章将要介绍的内容。


    # 6. 生产级面向消息的微服务


    第 4 章解释了消息中间件如何在为微服务提供松散耦合的通信桥梁方面发挥关键作用。消息通道通常以异步交互风格为特征，但第 4 章和第 5 章试图展示即使在异步消息通道上，也可以实现同步的用户体验。这是提供信心的第一步，即可以利用松散耦合的、基于消息的微服务交互来实现您的许多（如果不是全部）功能用例。如第
    5 章所述，许多工程师仍然对是否可以使用事件和事件范式以同步方式进行微服务间通信以实现完整的数据管理范式持怀疑态度。本章旨在解决这种怀疑。


    本章完全以实践为主，并附有示例。需要您对第 5 章中的示例有概览和实际操作经验，才能快速理解本章中增强的示例。


    本章涵盖以下概念：


    *   消息交换的协议和消息格式


    *   使用 Kafka 作为中间件，在微服务之间实现完整的 CRUD（创建、读取、更新、删除）功能


    *   使用 MongoDB 和 PostgreSQL DB 实现 CRUD


    *   快速了解一些集成模式


    ## 微服务间线路级选项


    当我们谈论面向消息的微服务时，有利有弊。其中一个主要方面涉及微服务间通信格式的选项。让我们在下一节中探讨这些内容。

