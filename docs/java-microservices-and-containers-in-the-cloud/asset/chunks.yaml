    \ Object\n```\n\nAs you can see, the routes you specified while creating the `Ingress`\
    \ Kubernetes objects are configured successfully. Let’s now attempt to access\
    \ those routes.\n\nYou are now ready to test the microservices.\n\n### Testing\
    \ the Microservice Pods\n\nYou can access the Product Web microservice using the\
    \ hostname you configured (see Figure [11-6](#619782_1_En_11_Chapter.xhtml#Fig6)).\n\
    \n[`http://products.acme.test/product.html`](http://products.acme.test/product.html)\n\
    \n![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig6_HTML.jpg)\n\nA screenshot\
    \ of the bootstrap C R U D data table browser tab. It has a table of manage products\
    \ with the add new product button at the top. The table has columns of i d, name,\
    \ code, title, price, and actions with 2 rows of data.\n\nFigure 11-6\n\nAccessing\
    \ the Product Web microservice using the hostname\n\nNote the URL address in Figure\
    \ [11-6](#619782_1_En_11_Chapter.xhtml#Fig6). Refer to the section titled “Test\
    \ the Microservice Using UI” in Chapter [1](#619782_1_En_1_Chapter.xhtml) to test\
    \ the Product Web microservice container. While you test the microservices, you\
    \ can keep watching the log windows of the Product Web and Product Server microservices.\n\
    \nRecall that you also configured the Adminer UI. You can now attempt to access\
    \ the PostgreSQL database through the Adminer UI. Use the second URL for that:\
    \ [`http://adminer.acme.test`](http://adminer.acme.test).\n\n![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig7_HTML.jpg)\n\
    \nA screenshot of the login admirer browser tab. It has the login section on the\
    \ right with the admirer version and language on the left. The login section has\
    \ the system dropdown menu, server, username, password, and database input boxes,\
    \ and the login button with a permanent login checkbox.\n\nFigure 11-7\n\nAccessing\
    \ the PostgreSQL database using the Adminer UI\n\nNote the URL address in Figure\
    \ [11-7](#619782_1_En_11_Chapter.xhtml#Fig7). It provides the credentials configured\
    \ in `postgres-config.yml`. If you can successfully log in, you can view the tables\
    \ that the Product Server microservice initialized. See Figure [11-8](#619782_1_En_11_Chapter.xhtml#Fig8).\n\
    \n![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig8_HTML.jpg)\n\nA screenshot\
    \ of the schema public browser tab. It has the schema public section on the right\
    \ with the admirer version, language, and 2 dropdown menus with various options\
    \ on the left. The schema section has the tables and views section with a search\
    \ bar and a table with 8 columns and 3 rows with checkboxes and others.\n\nFigure\
    \ 11-8\n\nAdminer UI displaying the new tables\n\nOnce you test all the microservices\
    \ from this example, you can stop and remove the microservice containers and clean\
    \ the environment, as shown in Listing [11-38](#619782_1_En_11_Chapter.xhtml#PC38).\n\
    \n```\n(base) binildass-MacBook-Pro:ch11-03 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch11/ch11-03\n\
    (base) binildass-MacBook-Pro:ch11-03 binil$ eval $(minikube docker-env)\n(base)\
