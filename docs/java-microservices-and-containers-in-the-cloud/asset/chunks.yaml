    While sending the request message to retrieve all the products from the Product
    Server microservice, you specify the operation as `Products.RETREIVE_ALL`. Even
    though you send an empty `Products` collection `productsRequest` along with the
    request, it’s not relevant or used here. However, for a few other methods, you
    could use this same `productsRequest` collection to send request parameters. You
    then use `CompletableFutureReplyingKafkaOperations`, which was configured in the
    previous step to send the request message and to receive its corresponding response
    message in a synchronous style, even though the underlying request and response
    message semantics are two separate asynchronous messages.


    Note


    A detailed explanation of `CompletableFutureReplyingKafkaOperations` and its usage
    pattern appears in Chapter [5](#619782_1_En_5_Chapter.xhtml).


    On the Product Server microservice side, you must also configure and specify the
    `Products` container class as passing to and from the wire, as shown in Listing
    [6-4](#619782_1_En_6_Chapter.xhtml#PC4).


    ```

    @Configuration

    @EnableKafka

    public class KafkaConfig {

    @Bean

    public ConsumerFactory

    requestConsumerFactory() {

    JsonDeserializer jsonDeserializer =

    new JsonDeserializer();

    jsonDeserializer.addTrustedPackages(Products.class.

    getPackage().getName());

    return new DefaultKafkaConsumerFactory(

    consumerConfigs(), new StringDeserializer(),

    jsonDeserializer);

    }

    @Bean

    public KafkaListenerContainerFactory> requestReplyListenerContainerFactory(){

    ConcurrentKafkaListenerContainerFactory factory =

    new ConcurrentKafkaListenerContainerFactory();

    factory.setConsumerFactory(requestConsumerFactory());

    factory.setReplyTemplate(replyTemplate());

    return factory;

    }

    }

    Listing 6-4

    Kafka Configuration for Product Server Microservice (ch06\ch06-01\01-ProductServer\src\main\java\com\acme\ecom\product\KafkaConfig.java)

    ```


    The `ProductListener` is the message listener at the Product Server microservice.
    `ProductListener` first resolves which operation to perform by inspecting the
    `operation` attribute and invoking the respective method. See Listing [6-5](#619782_1_En_6_Chapter.xhtml#PC5).


    ```

    @Component

    public class ProductListener {

    @Autowired

    private ProductRepository productRepository;

    @KafkaListener(topics = "${kafka.topic.product.request}",

    containerFactory =

    "requestReplyListenerContainerFactory")

    @SendTo

    public Products listenWithHeaders(

    ConsumerRecord record){

    Products productsRequest = record.value();

    Products productsResponse = resolveAndExecute(

    productsRequest);

    return productsResponse;

    }

    private Products resolveAndExecute(Products products) {

    Products productsToReturn = null;

    if(products.getOperation().equals(

    Products.RETREIVE_DETAILS)){

    productsToReturn = getProduct(products);

    }

    else if(products.getOperation().equals(

    Products.RETREIVE_ALL)){

    productsToReturn = getAllProducts(products);

    }

    else if(products.getOperation().equals(

    Products.CREATE)){

    productsToReturn = createProduct(products);

    }

    else if(products.getOperation().equals(

    Products.UPDATE)){

    productsToReturn = updateProduct(products);

    }

    else if(products.getOperation().equals(

    Products.DELETE)){

    productsToReturn = deleteProduct(products);

    }

    else {

    LOGGER.debug("Inside else. Undefined Operation!");

    }

    return productsToReturn;

    }

    private Products getAllProducts(Products products) {

    Products productsToReturn = new Products();

    List productListToReturn =

    productRepository.findAll();

    productsToReturn.setOperation(Products.SUCCESS);

    productsToReturn.setProducts(productListToReturn);

    return productsToReturn;

    }

    //other code goes here

    }

    Listing 6-5

    Kafka Listener for Product Server Microservice (ch06\ch06-01\01-ProductServer\src\main\java\com\acme\ecom\product\kafka\client\ProductListener.java)

