    When all is set, you can access the web application using cURL clients.


    To test the processing of requests in parallel, you need to configure the `pinnedToPartition`
    with a `false` value, which is done in Listing [5-25](#619782_1_En_5_Chapter.xhtml#PC33).


    For testing, the intention is to fire more than one request to the Product Web
    microservices concurrently. You can now use three separate terminals to run cURL
    client commands concurrently (more or less), as shown in Listings [5-34](#619782_1_En_5_Chapter.xhtml#PC43)
    through [5-36](#619782_1_En_5_Chapter.xhtml#PC45).


    ```

    binildass-MacBook-Pro:02-ProductWeb binil$ sh curlrun3.sh

