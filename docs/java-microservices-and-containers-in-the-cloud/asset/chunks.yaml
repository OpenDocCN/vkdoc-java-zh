    (base) binildass-MacBook-Pro:~ binil$\n清单 10-23\n列出 Kubernetes 服务\n```\n\n注意\n\
    \n为方便格式化，我在清单 10-23 中将 `product-server-nodeport` 缩写为 `product-server-np`。\n\n\
