    (base) binildass-MacBook-Pro:ch07-02 binil$ docker ps

    CONTAINER ID   IMAGE                  COMMAND                   CREATED        STATUS        PORTS                    NAMES

    e95b2b5eb64e   binildas/product-web   "java -cp /app/resou..."  6 minutes ago  Up
    6 minutes  0.0.0.0:8080->8080/tcp   loving_williams

    ...

    (base) binildass-MacBook-Pro:ch07-02 binil$

    Listing 7-30

    List the Running Containers

    ```


    To access the Product Web microservice, as mentioned in Appendix E, you have to
    get the minikube IP first, which is done in Listing [7-31](#619782_1_En_7_Chapter.xhtml#PC34).


    ```bash

    (base) binildass-MacBook-Pro:ch07-02 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:ch07-02 binil$

    Listing 7-31

    Finding Minikube IP

    ```


    You can now access the Product Web microservice using your browser with the URL
    formed with the Minikube IP. See Figure [7-21](#619782_1_En_7_Chapter.xhtml#Fig21).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig21_HTML.jpg)


    A screenshot of a web page with a table named manage products with a button to
    add new products. The table has columns for I D, name, code, title, price, and
    actions. There are two rows in the table, each with a pencil and trash can icon
    in the actions column.


    Figure 7-21


    Testing Product Web microservice container


    Refer to the section titled “Test the Microservice using UI” in Chapter [1](#619782_1_En_1_Chapter.xhtml)
    to test the Product Web microservice container.


    You can now stop the Product Web microservice container, as shown in Listing [7-32](#619782_1_En_7_Chapter.xhtml#PC35).


    ```bash

    (base) binildass-MacBook-Pro:ch07-02 binil$ docker stop e95b

    e95b

    (base) binildass-MacBook-Pro:ch07-02 binil$

    Listing 7-32

    Stopping Product Web Microservice Container

    ```


    Note that `e95b` are the first four characters of the ID of the Product Web Microservice
    container shown in Listing [7-30](#619782_1_En_7_Chapter.xhtml#PC33).


    You can now remove the Product Web microservice container, as shown in Listing
    [7-33](#619782_1_En_7_Chapter.xhtml#PC36).


    ```bash

    (base) binildass-MacBook-Pro:ch07-02 binil$ docker rm e95b

    e95b

    (base) binildass-MacBook-Pro:ch07-02 binil$

    Listing 7-33

    Removing Product Web Microservice Container

    ```


    You can also remove the Product Web Microservice image from the local Docker Registry,
    as shown in Listing 7-34.


    ```bash

    (base) binildass-MacBook-Pro:ch07-02 binil$ docker rmi b547

    Untagged: binildas/product-web:latest

    Untagged: binildas/product-web@sha256:56254d5a6e84cbe625013d245d8fa7dfe157722d0a6dd50d434f8e63dfc339ad

    Deleted: sha256:b547edfdc0be94d5a44b168ff13f515aa916d63534a2d6075e000ab829a363e8

