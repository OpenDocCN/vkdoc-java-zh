    使用脚本构建并运行 Product Web 微服务

    ```


    现在两个微服务都已启动并运行，你可以测试它们了。


    ### 测试微服务


    一旦两个微服务都启动并运行，你就可以通过浏览器访问 Web 应用程序。指向以下 URL：


    `http://localhost:8080/product.html`


    要测试 CRUD 操作，请按照第 1 章最后一节“你的第一个 Java 微服务”中“使用 UI 测试微服务”小节的说明进行操作。


    现在你已经体验了 Spring Boot 和 Spring Cloud 的特性，下一节将介绍基于 REST 的微服务中另一个重要概念——HATEOAS 和
    HAL。


    ## HATEOAS 和 HAL


    超媒体作为应用状态的引擎（HATEOAS）是 REST 应用架构的一个约束，它将客户端与服务器解耦。这种解耦使得服务器功能能够独立演进。下一节将通过实际示例进一步探讨这一点。

    '
- fmt: "### HATEOAS Explained\n\n`HATEOAS` advocates a user agent that implements\
    \ HTTP to make an HTTP request of a REST API through a simple URL. Once bootstrapped,\
    \ all subsequent requests the user agent may make are discovered inside the responses\
    \ to each request. The media types used for these representations, and the link\
    \ relations each response may contain, are standardized. The client transitions\
    \ through the application states by selecting from the links within a representation\
    \ or by manipulating the representation in other ways afforded by its media type.\
    \ In other words, the resources available and the actions applicable to these\
    \ resources are discovered, and subsequent transitions are orchestrated accordingly.\
    \ In this way, RESTful interaction is driven by hypermedia, rather than out-of-band\
    \ information.\n\nAs an example, the `GET` request in Listing [2-21](#619782_1_En_2_Chapter.xhtml#PC22)\
    \ fetches a product resource, requesting details in a JSON representation.\n\n\
    ```\nGET /productdata/61a7a51467964f330f6560fa HTTP/1.1\nHost: ecom.acme.com\n\
    {\n\"productId\" : \"61a7a51467964f330f6560fa\",\n\"name\" : \"Lokia Pomia\",\n\
    \"code\" : \"LOKIA-POMIA\",\n\"title\" : \"Lokia 12 inch , white , 14px ....\"\
    ,\n\"price\" : 9000.0,\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8081/productdata/61\"\
    \n},\n\"product\" : {\n\"href\" : \"http://localhost:8081/productdata/61\"\n}\n\
    \"buy\" : \" http://localhost:8081/productdata/61/buy\"\n}\n}\nListing 2-21\n\
    HATEOAS Response Format\n```\n\nThe response contains the follow-up link to buy\
    \ the product. Later, when the stock of this product SKU is zero, the “Buy” link\
    \ may not be available, or to rephrase, in its current state, the Buy link is\
    \ not available. Hence, the term Engine of Application State. The possible actions\
    \ vary as the state of the resource varies.\n\n`HATEOS` thus provides context-driven\
    \ responses using hypermedia controls, which indicate which operations are possible,\
    \ or for that matter not possible, based on the presence or absence of these links.\
    \ This helps avoid transporting state-related fields between servers and clients.\n\
    \n### HAL Explained\n\nHypertext Application Language (HAL) is an Internet standard\
    \ (a “work in progress”) convention for defining hypermedia such as links to external\
    \ resources within JSON or XML data. HAL is structured to represent elements based\
    \ on the concepts of Resources and Links. Resources consist of URI links, embedded\
    \ resources, your standard JSON or XML data, and non-URI links. Links have a target\
    \ URI, the name of the link (referred to as `rel`), and optional properties designed\
    \ to be mindful of deprecation and content negotiation.\n\nTo summarize, the HAL\
    \ model revolves around two simple concepts.\n\n*   Resources, which contain:\n\
    \    *   Links to relevant URIs\n    *   Embedded resources\n    *   State\n*\
