- fmt: '### Testing the Microservice


    When all is set, you can access the web application using your browser and pointing
    to this URL (see Figure [6-6](#619782_1_En_6_Chapter.xhtml#Fig6)):


    `http://localhost:8080/product.html`


    ![](images/619782_1_En_6_Chapter/619782_1_En_6_Fig6_HTML.jpg)


    A screenshot contains the following providers: Kamsung, Lokia, Kamsung, Lokia
    Pomia.


    **Figure 6-6** Testing the microservices, showing results from two of the three
    service providers


    As described, the example uses three instances of the `Product Server` microservice
    instead of three different microservice types, so all of them will reply with
    the same response. But in Listing [6-45](#619782_1_En_6_Chapter.xhtml#PC46), there
    is a delay called `sleeptimeout=10` for one of the `Product Server` microservices.
    Listing [6-39](#619782_1_En_6_Chapter.xhtml#PC40) shows `aggregatingTimeout: 6`
    for the `Product Web` microservice, so the `AggregatingReplyingKafkaTemplate`
    of the `Product Web` microservice will not wait for the response from this instance
    of the `Product Server` microservice.


    Since you are not doing any filtering, de-duplication, or any such transformation,
    you’ll see duplicated line items from the responses of two instances of the `Product
    Server` microservices.


    Listing [6-48](#619782_1_En_6_Chapter.xhtml#PC51) shows the logging by the `AggregatingReplyingKafkaTemplate`
    on the `Product Web` microservice.


    ```

    list.size() : 1; timeout : false

    list.size() : 2; timeout : false

    list.size() : 2; timeout : true

