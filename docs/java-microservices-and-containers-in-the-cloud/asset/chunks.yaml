    pathType: Prefix

    backend:

    service:

    name: adminer

    port:

    number: 8080

    - host: "products.acme.test"

    http:

    paths:

    - path: /

    pathType: Prefix

    backend:

    service:

    name: product-web

    port:

    number: 8080

    代码清单 11-33

    Ingress 的 Pod 定义 YAML 文件 (ch11\ch11-03\ingress-controller.yml)

    ```


    首先，指定要创建的 Kubernetes 对象的类型，即 Ingress。接着是包含对象名称的元数据（与往常一样）和一个名为 `annotations` 的新部分。你可以配置
    Ingress 的行为。本示例使用了最简单的配置，但还有更多可能性。`spec` 部分包含了第一条规则——所有来自 `adminer.acme.test`
    主机的请求都将路由到名为 `adminer` 的 `ClusterIP`，而来自 `products.acme.test` 主机的请求则路由到名为 `product-web`
    的 `ClusterIP`。


    下一个组件是 Adminer UI，它是 PostgreSQL 数据库的一个 UI 界面。请参见代码清单 11-34。


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: adminer

    labels:

    app: adminer

    group: db

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: adminer

    template:

    metadata:

    labels:

    app: adminer

    group: db

    spec:

    containers:

    - name: adminer

    image: adminer:4.8.1-standalone

    ports:

    - containerPort: 8080

    imagePullPolicy: IfNotPresent

    env:

    - name: ADMINER_DESIGN

    value: pepa-linha

    - name: ADMINER_DEFAULT_SERVER

    value: postgres

    代码清单 11-34

    Adminer 的 Pod 定义 YAML 文件 (ch11\ch11-03\adminer-deployment.yml)

    ```


    初始部分负责定义正在创建的对象类型（`apiVersion, kind`），随后是一些元数据，包括 `name`、`labels` 和 `app group`（`metadata`）。然后，它提到了容器要使用的
    `image` 以及一些其他环境变量。它还定义了一个 Adminer 服务。请参见代码清单 11-35。


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: adminer

    labels:

    group: db

    spec:

    type: ClusterIP

    selector:

    app: adminer

    ports:

    - port: 8080

    targetPort: 8080

    代码清单 11-35

    Adminer 的服务定义 YAML 文件 (ch11\ch11-03\adminer-svc.yml)

    ```


    ### 在 Kubernetes 中运行 Ingress 和微服务


