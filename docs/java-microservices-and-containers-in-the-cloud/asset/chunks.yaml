    ```


    对于 server 和 web 服务，构建脚本 `server.Dockerfile` 和 `web.Dockerfile` 是从 `docker-compose.yml`
    的当前上下文中引用的，包括相对文件路径，因此 Docker Compose 在构建过程中会正确找到这些文件。`db`、`web` 和 `server` 的其他方面已在本章的第一个示例中解释过。`zookeeper`
    和 `kafka` 是此处配置的两个新容器，这些配置不言自明。


    如前所述，相对于当前目录（`docker-compose.yml` 所在的位置），名为 `server.Dockerfile` 的 Dockerfile 位于此处：


    ```

    build:

    context: .

    dockerfile: server.Dockerfile

    ```


    你现在可以研究这个文件，如代码清单 9-22 所示。


    ```

    FROM maven:3.6.1-jdk-8-slim AS prebuild

    RUN mkdir -p /workspace

    WORKDIR /workspace

    COPY ./kafka-request-reply-util .

    RUN mvn clean install

    FROM maven:3.6.1-jdk-8-slim AS build

    COPY --from=prebuild /root/.m2 /root/.m2

    COPY ./01-ProductServer .

    RUN mvn clean package

    FROM openjdk:8-alpine

    COPY --from=build ./target/*.jar app.jar

    EXPOSE 8081

    ENTRYPOINT ["java","-jar","app.jar"]

    代码清单 9-22

    Dockerfile (ch09\ch09-03 \server.Dockerfile)

    ```


    这是一个三阶段构建。在第一阶段，你构建 `kafka-request-reply-util`；在第二阶段，你使用该 `.jar` 依赖项进行 Product
    Server 微服务的 Maven 构建；在第三阶段，你使用 Product Server 微服务的 `.jar` 来构建 Docker 镜像。该镜像根据代码清单
    9-21 中 `docker-compose.yml` 文件下的 `server` 服务命名，并运行相应的容器。


    Product Web 微服务的 `web.Dockerfile` 文件也有类似的解释，因此此处不再重复。

    '
