    service/myfirstspringboot-springboothelm   LoadBalancer   10.103.65.93        8080:31530/TCP   8m2s

    NAME                                               READY   UP-TO-DATE   AVAILABLE   AGE

    deployment.apps/myfirstspringboot-springboothelm   2/2     2            2           8m2s

