    Hyper-V, VMWare ESX, and Xen.


    *   **Type 2, hosted:** Hosted hypervisors run within a traditional OS. Hosted
    hypervisors add a distinct software layer to top of the host OS, and the guest
    OS becomes a third software level above the hardware. Examples: Oracle VM VirtualBox,
    VMWare Server and Workstation, Microsoft Virtual PC, KVM, QEMU, and Parallels.


    The fact that every VM requires its own dedicated operating system (OS) is a major
    flaw. Every OS consumes CPU, RAM, and other resources. Every OS needs licensing,
