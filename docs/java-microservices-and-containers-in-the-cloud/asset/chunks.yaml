    ## 基于 PostgreSQL 的 Kafka CRUD 微服务


    本示例对上一节中看到的同一组微服务进行了调整。一个消费者微服务和一个提供者微服务使用 Kafka 作为消息通道进行通信。提供者微服务将实体存储在 PostgreSQL
    数据库中，而不是 MongoDB 中。当浏览器向第一个（消费者）微服务发送请求时，它使用异步 HTTP。尽管代码使用了异步 HTTP，但它在浏览器层面模拟了同步风格的用户体验。


    与上一个示例一样，本示例旨在演示消费者和提供者微服务的多个实例，并在测试该服务时使用多个客户端。


    ### 在 PostgreSQL 上设计基于异步通道的 CRUD


    本示例使用了第 2 章中图 2-1 所示的六边形微服务视图的修改版本，该视图在第 5 章中重新讨论过，并在上一个示例中稍作调整。在这里，两个微服务通过异步通道进行通信。该示例使用
    Apache Kafka 作为消息通道，这本质上是异步的。


    ![](img/619782_1_En_6_Fig3_HTML.jpg)


    微服务设计从用户开始，然后是浏览器、REST API、Product Web 微服务实例和 Product Server 微服务实例。


    图 6-3

    使用分区在异步通道上的微服务设计


    与上一个示例相比，一个显著的变化是提供者微服务将实体存储在 PostgreSQL 数据库中，而不是使用 MongoDB 数据库。此更改已在图 6-3 中标记。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为[`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在`ch06\ch06-02`文件夹内。


    与上一个示例相比，代码的唯一变化是提供者微服务将实体存储在 PostgreSQL 数据库中，而不是使用 MongoDB 数据库。提供者微服务将实体存储在 PostgreSQL
    数据库中并执行完整 CRUD 操作所需的代码，在第 3 章第一个示例的“理解代码”一节中有详细描述。请参考该节以获取解释。

