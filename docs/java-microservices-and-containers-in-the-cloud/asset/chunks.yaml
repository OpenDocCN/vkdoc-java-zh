    \ binildass-MacBook-Pro:ch12-04 binil$ sh make.sh\n[INFO] Scanning for projects...\n\
    [INFO]\n...\n代码清单 12-22\n使用脚本构建微服务\n```\n\n下一步你可以运行微服务。名为 `run.sh` 的单个脚本整合了所有命令，如代码清单\
    \ 12-23 所示。\n\n```\neval $(minikube docker-env)\nkubectl create -f ./k8s/deployment.yml\n\
    kubectl create -f ./k8s/service.yml\nminikube service springboothelm --url\nsleep\
    \ 3\nkubectl get pods\nkubectl get services\n代码清单 12-23\n用于运行微服务容器的脚本 (ch12/ch12-04/run.sh)\n\
    ```\n\n现在你可以执行此脚本，如代码清单 12-24 所示。\n\n```\n(base) binildass-MacBook-Pro:ch12-04\
    \ binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-04\n\
    (base) binildass-MacBook-Pro:ch12-04 binil$ eval $(minikube docker-env)clear\n\
    (base) binildass-MacBook-Pro:ch12-04 binil$ sh run.sh\ndeployment.apps/springboothelm\
    \ created\nservice/springboothelm created\nhttp://192.168.64.6:30048\n...\n代码清单\
    \ 12-24\n使用脚本运行微服务容器\n```\n\n一旦服务启动并运行，你就可以测试该示例。\n\n### 测试微服务\n\n首先需要找到 Minikube\
    \ 的 IP 地址，如代码清单 12-16 所示。然后，你可以使用浏览器访问该 Web 应用程序，指向此 URL：\n\n`http://192.168.64.6:8080/`\n\
    \n或者，你也可以使用 cURL 来访问微服务，如代码清单 12-5 所示。\n\n## Helm\n\n在前一个示例以及前两章的许多其他示例中，你看到了用于\
    \ Kubernetes 部署的 YAML 文件。当微服务数量增加，并且部署环境数量增加时，你将不得不处理许多 YAML 文件。例如，我目前所在的组织销售用于航空公司乘客预订服务和航空公司货运预订服务以及其他服务的\
    \ SaaS 服务。我们需要一个能够在第 4 级 SaaS 成熟度下运行的核心产品，这意味着同一个实例应在功能上适应多家航空公司（称为租户）的需求。同时，这些产品需要部署在多个环境中，例如开发、测试、预发布等。Helm\
    \ 是一个便捷的工具，它维护一个包含版本信息的单一部署 YAML 文件。这个文件让你能够通过几个命令来设置和管理一个非常大的 Kubernetes 集群。\n\
    \n### 什么是 Helm？\n\nHelm 是 Kubernetes 的包管理器。它有助于在 Kubernetes 集群中安装、升级、卸载和回滚工作负载。类似于\
    \ yum 和 apt（它们是 Linux 发行版中流行的包管理器），Helm 将部署视为安装在 Kubernetes 平台上的应用程序。\n\nHelm\
    \ 要求你将 Kubernetes 清单文件存储在一个特定的文件夹结构中。这个文件夹结构被视为一个包。Helm 包被称为 *charts*。Helm charts\
    \ 可以嵌套，以帮助使用单个分层文件夹结构安装多个应用程序。为了方便管理 chart 以及同一 Helm chart 的多个版本，这些文件夹也可以归档并存储在仓库中。\n\
    \n### Helm 术语\n\nHelm 使用了三个你需要熟悉的主要概念：\n\n*   Chart：如前所述，chart 包含 Kubernetes 部署所需的所有内容，以及一些\
    \ Helm 特定的文件，并遵循特定的文件夹结构。这包括用于部署、服务、密钥和配置映射的所有 YAML 配置文件，这些文件定义了应用程序的部署状态。\n\n\
    *   Config：这包括一个或多个 YAML 文件，其中包含部署 Kubernetes 应用程序所需的配置信息。Kubernetes 集群中的资源将根据这些值进行部署。\n\
    \n*   Release：chart 的一个运行实例称为 release。当你运行 `helm install` 命令时，它会拉取 config，与 chart\
    \ 文件合并，并部署所有 Kubernetes 资源。一个 chart 可以有多个 release。\n\n掌握了这些基本概念后，下一节将介绍 Helm 的架构。\n\
    \n### 客户端-服务器 Helm 架构\n\nHelm Kubernetes 有两个主要组件——客户端（CLI）和服务器（Tiller）。Helm 采用客户端-服务器模型工作，如图\
    \ 12-2 所示。\n\n![](img/619782_1_En_12_Fig2_HTML.jpg)\n\nHelm 架构包含以下组件：用户、Helm 客户端、Kubernetes\
    \ 集群。\n\n图 12-2\nHelm 架构\n\n本节将探讨 Helm 架构的两个主要组件：\n\n*   Tiller：Tiller 是安装在 Kubernetes\
    \ 集群中的服务器，Helm 通过此组件管理 Kubernetes 应用程序。Tiller 与 Kubernetes API 服务器交互，以执行应用程序的\
    \ release 操作——安装、升级、查询和删除 Kubernetes 资源。为了快速开发，它也可以在本地运行，并配置为与远程 Kubernetes 集群通信。\n\
    \n*   客户端（CLI）：与任何客户端-服务器模型类似，Helm 客户端位于用户的本地工作站上，而 Tiller 服务器位于 Kubernetes 集群上以执行所需操作。你可以将\
    \ CLI 视为用于推送所需资源的工具。Tiller 在 Kubernetes 集群内部运行，并管理（创建/更新/删除）Helm chart 的资源。\n\n\
    \    **注意** 在 Helm 2（Helm v2.16.7）之后，Tiller 服务器已被弃用。但这不影响本书中的示例。\n\n有了这些背景知识，下一节将解释\
    \ Helm 的工作原理。\n"
