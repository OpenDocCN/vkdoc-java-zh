    ecom-product-web-microservice 的一部分）访问数据。


    图 1-15


    产品 Web 微服务


    考虑使用端口和适配器的语言来描述图 1-15。这里使用了一个 HTTP 端口，它不过是一个关于用户浏览器如何使用应用程序核心的规范。这个端口（接口）作为 REST
    控制器属于业务逻辑内部。`Product` 实体实现了应用程序核心。见图 1-16。


    ![](img/619782_1_En_1_Fig16_HTML.jpg)


    该图说明了两个实体之间的关系：产品类别和产品。产品类别具有 id、名称、标题、描述和图片 URL。产品具有产品 id、名称、代码、标题和价格。一条虚线箭头将产品连接到产品类别。


