    *   K – 键类型


    *   V – 出站数据类型


    *   R – 回复数据类型


    当你有多个发送者微服务实例时，必须确保响应被发送到正确的发送者微服务实例。Spring Kafka 文档建议每个发送者微服务使用一个唯一的主题，或者在请求中发送一个额外的
