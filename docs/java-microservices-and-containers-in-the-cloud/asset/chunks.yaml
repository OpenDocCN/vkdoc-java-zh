    接下来的三个示例将提高构建和打包的自动化程度。


    ## 自动化 Docker 推送


    本示例展示了如何进一步自动化 Docker 镜像的推送，比上一个示例更进一步。


    该示例使用 Google 的 `jib-maven-plugin` 将 Maven 与 Docker 集成。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码位于
    `ch12\ch12-03` 文件夹中。


    唯一的应用组件是 `Application.java` 类，它是一个 REST 控制器。你在第 7 章的第二个示例中已经见过这种自动化程度，但为了完整性，在当前示例中也会重复。此外，你还会对
    `jib` 插件进行更多配置，因此 Maven 配置如清单 12-18 所示。


    ```

    ...


    org.springframework.boot


    spring-boot-maven-plugin


    com.google.cloud.tools


    jib-maven-plugin


    3.3.2


    binildas/${project.artifactId}


    USE_CURRENT_TIMESTAMP


    清单 12-18

    Maven pom.xml (ch12/ch12-03/pom.xml)

    ```


    请参考第 7 章的第二个示例，其中解释了如何配置 Maven 设置配置文件等，以及清单 7-22 中的 Docker Hub 凭据设置。本章将直接进行镜像的构建和推送。


    ### 构建并运行微服务


    `ch12\ch12-03` 文件夹包含构建和运行示例所需的 Maven 脚本。使用 `mvn clean compile jib:build` 命令来构建示例，如清单
    12-19 所示。


