- fmt: '### Run Microservices in Kubernetes


    The `ch10\ch10-01` folder contains the scripts required to build and run the examples.
    The first step is to start a Minikube single-node Kubernetes cluster. Refer to
    Appendix E for a quick reference to the Kubernetes setup and commands. See Listing
    [10-16](#619782_1_En_10_Chapter.xhtml#PC17).


    ```

    (base) binildass-MacBook-Pro:~ binil$ pwd

    /Users/binil

    (base) binildass-MacBook-Pro:~ binil$ minikube start

    minikube v1.25.2 on Darwin 12.4

    ...

    Done! kubectl is now configured to use "minikube" cluster and "default" namespace
    by default

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-16

    Starting Minikube

    ```


    You must also set the Minikube environment variables in your work terminal.


    **Note**


    For all the examples in this chapter, I assume that the previous two steps connected
    to the Docker Daemon have been executed if you are using the Minikube single-node
    Kubernetes cluster.


    As the next step, you need to create this new folder for Mongo data you configured
    in `mongo-volume.yml`. See Listing [10-17](#619782_1_En_10_Chapter.xhtml#PC18).


    ```

    (base) binildass-MacBook-Pro:mongodata binil$ minikube ssh

    _             _

    _         _ ( )           ( )

    ___ ___  (_)  ___  (_)| |/'')  _   _ | |_      __

    /'' _ ` _ `\| |/'' _ `\| || , <  ( ) ( )| ''_`\  /''__`\

    | ( ) ( ) || || ( ) || || |\`\ | (_) || |_) )(  ___/

    (_) (_) (_)(_)(_) (_)(_)(_) (_)`\___/''(_,__/''`\____)

    $ pwd

    /home/docker

    $ cd /home/docker

    $ mkdir -p binil/mongodata

    $ ls

    binil

    $ cd binil/mongodata/

    $ ls

    $ pwd

    /home/docker/binil/mongodata

    $ ls

    $

    Listing 10-17

    Creating a Local Folder Acting as Volume Mount for Mongo Data

    ```


    The simple script called `makeandrun.sh` contains a single command to build and
    run the complete application with all the defined deployments, and it is shown
    in Listing [10-18](#619782_1_En_10_Chapter.xhtml#PC19).


    ```

    mvn -Dmaven.test.skip=true clean package

    docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t ecom/product-web
    .

    docker build  --build-arg JAR_FILE=01-ProductServer/target/*.jar -t ecom/product-server
    .

    # docker network create ecom-network

    # docker pull mongo:4.2.24

    kubectl create -f mongo-volume.yml

    kubectl create -f mongo-volume-claim.yml

    kubectl create -f mongo-deployment.yml

    kubectl create -f mongo-service.yml

    kubectl create -f product-server-deployment.yml

    kubectl create -f product-server-service.yml

    kubectl create -f product-web-deployment.yml

    kubectl create -f product-web-service.yml

    minikube service product-web --url

    sleep 3

    kubectl get pods

    kubectl get services

    Listing 10-18

    The Script to Build and Run Microservices in Kubernetes (ch10\ch10-01\makeandrun.sh)

    ```


    In Appendix E, you might have noticed that I used this command from Listing E-22:


    ```

    kubectl apply -f https://raw.githubusercontent.com/scriptcamp/minikube/main/nginx.yaml

    ```


    This is declarative management, whereby you specify the required outcome, not
    the individual steps needed to achieve that outcome. This command applies a configuration
    to a resource by filename or stdin. The resource name must be specified. JSON
    and YAML formats are accepted.


    However, Listing [10-18](#619782_1_En_10_Chapter.xhtml#PC19) uses `kubectl create`.
    This is an imperative way of specification, meaning that you give a series of
    instructions or steps to reach the goal. You specify what and how you should reach
    the goal. The `kubectl create` command also creates a resource from a file or
    from stdin. JSON and YAML formats are accepted.


    You can now execute the script shown in Listing [10-19](#619782_1_En_10_Chapter.xhtml#PC21).


    ```

    (base) binildass-MacBook-Pro:ch10-01 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch10/ch10-01

    (base) binildass-MacBook-Pro:ch10-01 binil$ eval $(minikube docker-env)

    (base) binildass-MacBook-Pro:ch10-01 binil$ sh makeandrun.sh

    [INFO] Scanning for projects...

    [INFO] --------------------------------------------------------

    [INFO] Reactor Build Order:

    [INFO]

    [INFO] Ecom-Product-Server-Microservice    [jar]

    [INFO] Ecom-Product-Web-Microservice       [jar]

    [INFO] Ecom                                [pom]

    [INFO]

    ...

    [INFO]

