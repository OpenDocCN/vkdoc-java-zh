    ## Microservice and MongoDB Containers Using a Network


    In this section, you are going to reuse the same microservices visited in the
    section titled “Microservices Using MongoDB and CrudRepository” in Chapter [3](#619782_1_En_3_Chapter.xhtml),
    which you ran in the previous section of this chapter. You will have the same
    two microservices—a consumer and a provider microservice communicating each other
    using the REST protocol. The provider microservice also interacts with a MongoDB.
    Refer to Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter [2](#619782_1_En_2_Chapter.xhtml)
    for the overall design.


    ### Designing the Container Topology


    You reuse the deployment schema defined in the previous example in this chapter,
    as shown in Figure [8-1](#619782_1_En_8_Chapter.xhtml#Fig1). The only change is
    that you will replace `link` with `net` for the network connectivity option between
    the containers.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch08\ch08-02` folder. The source
    code in this example is very similar to `ch03\ch03-02`, which I explained in detail
    in Chapter [3](#619782_1_En_3_Chapter.xhtml), and which you deployed in the previous
    example of this chapter.


    ### Run Containers Using Dockerfiles


    You will modify the scripts alone in the previous example in this chapter. Listing
    [8-13](#619782_1_En_8_Chapter.xhtml#PC14) shows the commands organized into a
    single script.


    ```

    mvn -Dmaven.test.skip=true clean package

    docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t ecom/product-web
    .

    docker build  --build-arg JAR_FILE=01-ProductServer/target/*.jar -t ecom/product-server
    .

    docker network create ecom-network

    docker pull mongo:3.6

    docker run -d -it -p 27017:27017 --name mongo  --net=ecom-network  mongo:3.6

    docker run -d -p 8081:8081  --net=ecom-network --name product-server ecom/product-server

    docker run -d -p 8080:8080  --net=ecom-network --name product-web ecom/product-web

    Listing 8-13

    Script to Build and Run Microservices Docker Containers (ch08\ch08-02\makeandrun.sh)

    ```


    Note the network creation command. This is the simplest form of the `create network`
    command, and yet it will probably be the one you will use most often. It takes
    a default driver (you haven’t specified a driver, hence the default one will be
    used, which is `bridge`). When you create the network, an ID is created. You can
    later use this identifier to refer to this network when connecting containers
    to it or when inspecting the network’s properties.


    The `Dockerfile` for this example is the same `Dockerfile` you used in the previous
    example, which is shown in Listing [8-5](#619782_1_En_8_Chapter.xhtml#PC6).


    Listing [8-14](#619782_1_En_8_Chapter.xhtml#PC15) builds the microservices and
    docker images and then runs the containers.


    ```

    (base) binildass-MacBook-Pro:ch08-02 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch08/ch08-02

    (base) binildass-MacBook-Pro:ch08-02 binil$ eval $(minikube docker-env)

    (base) binildass-MacBook-Pro:ch08-02 binil$ sh makeandrun.sh

    [INFO] Scanning for projects...

    ...

    a9f5da94581b4f3a492938734edca433c1fc6afbe954ad4e28ead4621dd

    d762e59b315dfece79e7b98deb6b01796a9210b9536ede1f36a98af67af

    b51443e6a5d0cfcc16efc54e52858353ce5aa0ada1a23012dc88dfa49f0

    (base) binildass-MacBook-Pro:ch08-02 binil$

    Listing 8-14

    Executing the Script to Build and Run the Microservices

    ```


    You need to newly create the `ecom-network` in Listing [8-13](#619782_1_En_8_Chapter.xhtml#PC14),
    so you need to view the creation status. See Listing [8-15](#619782_1_En_8_Chapter.xhtml#PC16).


    ```

    (base) binildass-MacBook-Pro:ch08-02 binil$ docker network ls

    NETWORK ID     NAME              DRIVER    SCOPE

    435b063e810b   bridge            bridge    local

    129e1b5f4de5   ecom-network      bridge    local

    28731f4db9e0   host              host      local

    2480825a3deb   none              null      local

    (base) binildass-MacBook-Pro:ch08-02 binil$

    Listing 8-15

    Listing the Docker Networks

    ```


    The `network ls` command simply lists networks available for your containers.
    It will output the network identifier, its name, the driver being used, and a
    scope of the network.


    To list all the containers you have on your system, execute the `docker ps` command.
    See Listing [8-16](#619782_1_En_8_Chapter.xhtml#PC17).


    ```

    (base) binildass-MacBook-Pro:ch08-02 binil$ docker ps

    CONTAINER ID   IMAGE   COMMAND    CREATED      STATUS    PORTS        NAMES

    b51443e6a5d0   ecom/product-web       "java -jar /ecom.jar"   3 minutes ago   Up
    3 minutes   0.0.0.0:8080->8080/tcp   roduct-web

    d762e59b315d   ecom/product-server    "java -jar /ecom.jar"    3 minutes ago   Up
    3 minutes   0.0.0.0:8081->8081/tcp   t-server

    a9f5da94581b   mongo:3.6   "docker-entrypoint.s..."   3 minutes ago   Up 3 minutes   0.0.0.0:27017->27017/tcp   mongo

    ...

    (base) binildass-MacBook-Pro:ch08-01 binil$

    Listing 8-16

    Listing the Docker Containers

    ```


    You can now list the details of the `ecom-network` you previously created, as
    shown in Listing [8-17](#619782_1_En_8_Chapter.xhtml#PC18).'
