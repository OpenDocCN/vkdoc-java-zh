  trans: '

    ### GraphQL 详解


    GraphQL 允许客户端精确请求所需数据，不多不少，从而让 API 更易于随时间演进。它让客户端能够定义所需数据的结构，服务器则返回相同结构的数据，因此避免了返回过量的数据。这在移动设备、物联网等低配置设备上非常受欢迎。它允许客户端在单个请求中导航到子资源，从而在单个请求中实现多个查询。


    GraphQL 使用命名查询和变更的概念，而非标准强制的一组操作。这有助于将控制权交给合适的人：API 开发者指定可能执行的操作，API 消费者指定所需的内容。清单
    3-23 展示了一个查询示例。


    ```

    query {

    products(count: 10, offset: 0) {

    productId

    code

    productCategory {

    id

    name

    title

    }

    }

    }

    清单 3-23

    一个 GraphQL 查询

    ```


    此 GraphQL 查询旨在完成以下操作：


    *   请求最近添加的十个产品

    *   对于每个产品，请求其 `productId` 和 `code`

    *   对于每个产品请求，请求其 `productCategory`，返回对应产品类别的 `id`、`name` 和 `title`


    在传统的 REST API 中，这要么需要 11 个请求——一个用于初始产品查询，十个用于对应的 `productCategory`——要么需要将 `productCategory`
    的详细信息与帖子详细信息一起包含，从而导致负载过大。


    ## 洋葱架构微服务示例


    本示例对之前的微服务示例进行了调整。它使用了相同的两个微服务——一个消费者微服务和一个提供者微服务——通过 REST 协议相互通信。提供者微服务还与 MongoDB
    进行交互。消费者微服务额外暴露了一个基于 GraphQL 的端口。


    ### 微服务的洋葱设计


    如果将第 2 章图 2-1 中所示的六边形微服务视图叠加到本章图 3-1 的洋葱架构视图上，就会得到图 3-2。


    ![](img/619782_1_En_3_Fig2_HTML.jpg)


    一个产品-网络-微服务的模型图，将最终用户连接到四层同心圆，包括实体、领域服务、应用服务和基础设施层依赖及其各自的微服务。它最终指向产品服务器微服务下的产品
    REST 控制器、产品实体和 MongoDB。


    图 3-2

    消费者和提供者微服务的洋葱架构


    在图 3-2 所示的两个微服务中，你都在 REST 接口处使用了 HTTP 端口，这些端口指定了用户浏览器或其他 HTTP 客户端如何使用应用核心。对于产品
    Web 微服务，你额外指定了一个基于 GraphQL 的端口。你还可以定义一个业务服务，旨在演示来自内层的业务服务实例如何被洋葱架构的外层重用，就像它们重用业务实体类一样。


    ### 代码组织


