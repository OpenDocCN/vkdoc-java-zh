  raw: "### HATEOAS Explained\n\nHATEOAS advocates a user agent that implements HTTP\
    \ to make an HTTP request of a REST API through a simple URL. Once bootstrapped,\
    \ all subsequent requests the user agent may make are discovered inside the responses\
    \ to each request. The media types used for these representations, and the link\
    \ relations each response may contain, are standardized. The client transitions\
    \ through the application states by selecting from the links within a representation\
    \ or by manipulating the representation in other ways afforded by its media type.\
    \ In other words, the resources available and the actions applicable to these\
    \ resources are discovered, and subsequent transitions are orchestrated accordingly.\
    \ In this way, RESTful interaction is driven by hypermedia, rather than out-of-band\
    \ information.\n\nAs an example, the GET request in Listing [2-21](#619782_1_En_2_Chapter.xhtml#PC22)\
    \ fetches a product resource, requesting details in a JSON representation.\n\n\
    ```\nGET /productdata/61a7a51467964f330f6560fa HTTP/1.1\nHost: ecom.acme.com\n\
    {\n\"productId\" : \"61a7a51467964f330f6560fa\",\n\"name\" : \"Lokia Pomia\",\n\
    \"code\" : \"LOKIA-POMIA\",\n\"title\" : \"Lokia 12 inch , white , 14px ....\"\
    ,\n\"price\" : 9000.0,\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8081/productdata/61\"\
    \n},\n\"product\" : {\n\"href\" : \"http://localhost:8081/productdata/61\"\n}\n\
    \"buy\" : \" http://localhost:8081/productdata/61/buy\"\n}\n}\nListing 2-21\n\
    HATEOAS Response Format\n```\n\nThe response contains the follow-up link to buy\
    \ the product. Later, when the stock of this product SKU is zero, the “Buy” link\
    \ may not be available, or to rephrase, in its current state, the Buy link is\
    \ not available. Hence, the term Engine of Application State. The possible actions\
    \ vary as the state of the resource varies.\n\nHATEOS thus provides context-driven\
    \ responses using hypermedia controls, which indicate which operations are possible,\
    \ or for that matter not possible, based on the presence or absence of these links.\
    \ This helps avoid transporting state-related fields between servers and clients.\n\
    \n### HAL Explained\n\nHypertext Application Language (HAL) is an Internet standard\
    \ (a “work in progress”) convention for defining hypermedia such as links to external\
    \ resources within JSON or XML data. HAL is structured to represent elements based\
    \ on the concepts of Resources and Links. Resources consist of URI links, embedded\
    \ resources, your standard JSON or XML data, and non-URI links. Links have a target\
    \ URI, the name of the link (referred to as `rel`), and optional properties designed\
    \ to be mindful of deprecation and content negotiation.\n\nTo summarize, the HAL\
    \ model revolves around two simple concepts.\n\n*   Resources, which contain:\n\
    \    *   Links to relevant URIs\n\n    *   Embedded resources\n\n    *   State\n\
    \n*   Links:\n    *   A target URI\n\n    *   A relation, or rel, to the link\n\
    \n    *   A few other optional properties to help with depreciation, content negotiation,\
    \ and so on\n\nWith that little introduction, you can now get into the action\
    \ with some code.\n\n## Microservices Using HATEAOS and HAL\n\nThis section uses\
    \ a working example to show how things fit together. You will modify the microservices\
    \ example to demonstrate both HATEOAS and HAL.\n\n### Design the Microservices\n\
    \nThis example reuses the hexagonal microservice view shown in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1)\
    \ and described earlier. A few of the differences are as follows:\n\n*   The Product\
    \ Web microservice will be enhanced to exhibit HATEOAS capability.\n\n*   The\
    \ Product Server microservice will be enhanced to demonstrate HAL.\n\nYou will\
    \ be leveraging the Spring HATEOAS project for creating hypermedia-driven REST\
    \ web services. The intention is to easily create REST representations that follow\
    \ the principle of HATEOAS so the API can guide the client through the application\
    \ by returning relevant information about the next potential steps, along with\
    \ each response.\n\n### Code Organization\n\nThe source code for this book is\
    \ available on GitHub via the book’s product page, located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)..\
    \ The code for this example is organized as shown in Listing [2-22](#619782_1_En_2_Chapter.xhtml#PC23),\
    \ inside the `ch02\\ch02-03` folder. This follows the standard Maven structure,\
    \ so `pom.xml` is in the root of the directory. Code organization for the relevant\
    \ portion of the Product Web microservice alone is shown, since you already saw\
    \ the Product Server microservice code.\n\n```\n.\n├── 01-ProductServer\n│   ├──\
    \ ...\n├── 02-ProductWeb\n│   ├── pom.xml\n│   └── src\n│       └── main\n│  \
    \         ├── java\n│           │   └── com\n│           │       └── acme\n│ \
    \          │           └── ecom\n│           │               └── product\n│  \
    \         │                   ├── EcomProdWebMicroApp.java\n│           │    \
    \               ├── InitComponent.java\n│           │                   ├── controller\n\
    │           │                   │   └── ProdController.java\n│           │   \
    \                ├── hateoas\n│           │                   │   └── model\n\
    │           │                   │       └── Product.java\n│           │      \
    \             └── model\n│           │                       └── Product.java\n\
    │           └── resources\n└── pom.xml\nListing 2-22\nSpring Boot Source Code\
    \ Organization\n```\n\nOne difference you want to note is the `hateoas` subfolder\
    \ in the `Product` entity model. I will explain the reason for this folder in\
    \ the next section."
  trans: "\n### HATEOAS 详解\n\nHATEOAS 倡导用户代理通过实现 HTTP 协议，使用一个简单的 URL 向 REST API 发起\
    \ HTTP 请求。一旦启动，用户代理可能发出的所有后续请求，都会在每个请求的响应中被发现。用于这些表示的媒体类型，以及每个响应可能包含的链接关系，都是标准化的。客户端通过选择表示中的链接，或通过其媒体类型提供的其他方式操作表示，从而在应用状态间进行转换。换句话说，可用的资源以及适用于这些资源的操作都是被发现的，后续的状态转换也据此进行编排。这样，RESTful\
    \ 交互便由超媒体驱动，而非带外信息。\n\n例如，清单 2-21 中的 GET 请求获取了一个产品资源，并以 JSON 表示形式请求详细信息。\n\n```\n\
    GET /productdata/61a7a51467964f330f6560fa HTTP/1.1\nHost: ecom.acme.com\n{\n\"\
    productId\" : \"61a7a51467964f330f6560fa\",\n\"name\" : \"Lokia Pomia\",\n\"code\"\
    \ : \"LOKIA-POMIA\",\n\"title\" : \"Lokia 12 inch , white , 14px ....\",\n\"price\"\
    \ : 9000.0,\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8081/productdata/61\"\
    \n},\n\"product\" : {\n\"href\" : \"http://localhost:8081/productdata/61\"\n}\n\
    \"buy\" : \" http://localhost:8081/productdata/61/buy\"\n}\n}\n清单 2-21\nHATEOAS\
    \ 响应格式\n```\n\n该响应包含购买产品的后续链接。之后，当该产品 SKU 的库存为零时，“购买”链接可能不可用，或者换句话说，在其当前状态下，购买链接不可用。因此，就有了“应用状态引擎”这个术语。随着资源状态的变化，可能的操作也会发生变化。\n\
    \n因此，HATEOAS 使用超媒体控制提供上下文驱动的响应，这些控制根据这些链接的存在与否，指示哪些操作是可能的，或者就此而言，哪些操作是不可能的。这有助于避免在服务器和客户端之间传输与状态相关的字段。\n\
    \n### HAL 详解\n\n超文本应用语言（HAL）是一种互联网标准（“进行中的工作”），用于定义超媒体，例如 JSON 或 XML 数据中指向外部资源的链接。HAL\
    \ 的结构基于资源和链接的概念来表示元素。资源由 URI 链接、嵌入式资源、标准的 JSON 或 XML 数据以及非 URI 链接组成。链接具有目标 URI、链接名称（称为\
    \ `rel`），以及旨在考虑弃用和内容协商的可选属性。\n\n总而言之，HAL 模型围绕两个简单的概念展开。\n\n*   资源，包含：\n    * \
    \  指向相关 URI 的链接\n\n    *   嵌入式资源\n\n    *   状态\n\n*   链接：\n    *   一个目标 URI\n\n\
    \    *   与链接的关系，即 rel\n\n    *   一些其他可选属性，用于帮助处理弃用、内容协商等\n\n有了这个简短的介绍，你现在就可以通过一些代码进入实际操作了。\n\
    \n## 使用 HATEOAS 和 HAL 的微服务\n\n本节使用一个实际示例来展示各个部分如何协同工作。你将修改微服务示例，以演示 HATEOAS 和\
    \ HAL。\n\n### 设计微服务\n\n本示例复用了图 2-1 中所示并先前描述的六边形微服务视图。一些不同之处如下：\n\n*   产品 Web 微服务将得到增强，以展示\
    \ HATEOAS 能力。\n\n*   产品服务器微服务将得到增强，以演示 HAL。\n\n你将利用 Spring HATEOAS 项目来创建超媒体驱动的\
    \ REST Web 服务。其目的是轻松创建遵循 HATEOAS 原则的 REST 表示，以便 API 能够通过返回关于下一步潜在步骤的相关信息，以及每个响应，来引导客户端遍历应用。\n\
    \n### 代码组织\n\n本书的源代码可通过本书的产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织如清单\
    \ 2-22 所示，位于 `ch02\\ch02-03` 文件夹内。这遵循标准的 Maven 结构，因此 `pom.xml` 位于目录的根目录。仅显示了产品\
    \ Web 微服务相关部分的代码组织，因为你已经看到了产品服务器微服务的代码。\n\n```\n.\n├── 01-ProductServer\n│   ├──\
    \ ...\n├── 02-ProductWeb\n│   ├── pom.xml\n│   └── src\n│       └── main\n│  \
    \         ├── java\n│           │   └── com\n│           │       └── acme\n│ \
    \          │           └── ecom\n│           │               └── product\n│  \
    \         │                   ├── EcomProdWebMicroApp.java\n│           │    \
    \               ├── InitComponent.java\n│           │                   ├── controller\n\
    │           │                   │   └── ProdController.java\n│           │   \
    \                ├── hateoas\n│           │                   │   └── model\n\
    │           │                   │       └── Product.java\n│           │      \
    \             └── model\n│           │                       └── Product.java\n\
    │           └── resources\n└── pom.xml\n清单 2-22\nSpring Boot 源代码组织\n```\n\n你需要注意的一个区别是\
    \ `Product` 实体模型中的 `hateoas` 子文件夹。我将在下一节解释这个文件夹存在的原因。\n"
- fmt: '### Understanding the Code


    Let’s look at the changes in the provider microservice—the Product Server microservice—first.


    Much of the implementation of the REST controller in the Product Server microservice
    is similar to the code in Listings 1-3 and 1-4 in Chapter [1](#619782_1_En_1_Chapter.xhtml),
    with the exception that instead of the in-memory database, the `ProductRepository`
    and `ProductCategoryRepository` ports are used to interact with a MongoDB repository,
    so I do not repeat the full code here. However, this example does introduce a
    HAL browser. The HAL browser was created by the same person who developed HAL
    and it provides an in-browser GUI to traverse your REST API. It is easy to integrate
    a HAL browser into your Maven project by adding the relevant dependency—see Listing
    [2-23](#619782_1_En_2_Chapter.xhtml#PC24).


    ```

    org.springframework.data

    spring-data-rest-hal-explorer


    Listing 2-23

    HAL Browser Dependency in Maven (ch02\ch02-03\01-ProductServer\pom.xml)

    ```


    There are a few changes in the Product Web microservice, and I will discuss them.
    Listing [2-24](#619782_1_En_2_Chapter.xhtml#PC25) shows the HATEOAS variant of
    the `Product` entity.


    ```

    public class Product extends RepresentationModel {

    private String productId;

    private String name;

    private String code;;

    private String title;

    private Double price;

    }

    Listing 2-24

    HATEOAS Variant of Product Entity (ch02\ch02-03\02-ProductWeb\src\main\java\com\acme\ecom\product\hateoas\model\Product.java)

    ```


    The `Product` extends from the `RepresentationModel` class to inherit the `add()`
    method. Once you create a link, you can easily set that value to the resource
    representation without adding any new fields to it.


    Next, let’s look at the Controller class methods. The code in Listing [2-25](#619782_1_En_2_Chapter.xhtml#PC26)
    shows how to build HATEOAS hyperlinks based on the `getProduct()` method of the
    `ProductRestController`.


    ```

    public class ProductRestController{

    private static final Logger LOGGER = LoggerFactory.getLogger(ProductRestController.class);

    @Value("${acme.PRODUCT_SERVICE_URL}")

    private String PRODUCT_SERVICE_URL;

    @Autowired

    public RestTemplate restTemplate;

    @Autowired

    private ModelMapper modelMapper;

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity

    getProduct(@PathVariable("productId")

    String productId) {

    String uri = PRODUCT_SERVICE_URL + "/" + productId;

    com.acme.ecom.product.model.Product productRetreived =

    restTemplate.getForObject(uri,

    com.acme.ecom.product.model.Product.class);

    com.acme.ecom.product.hateoas.model.Product

    productHateoas = convertEntityToHateoasEntity(

    productRetreived);

    productHateoas.add(linkTo(methodOn(

    ProductRestController.class).getProduct(

    productHateoas.getProductId())).withSelfRel());

    return new ResponseEntity(

    productHateoas, HttpStatus.OK);

    }

    private com.acme.ecom.product.hateoas.model.Product

    convertEntityToHateoasEntity(

    com.acme.ecom.product.model.Product product){

    return  modelMapper.map(

    product,

    com.acme.ecom.product.hateoas.

    model.Product.class);

    }

    }

    Listing 2-25

    HATEOAS REST Controller (ch02\ch02-03\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    `WebMvcLinkBuilder` offers great support for Spring MVC controllers. The `methodOn()`
    obtains the method mapping by making dummy invocations of the target method on
    the proxy controller and sets the `productId` as the path variable of the URI.


    `WebMvcLinkBuilder` also simplifies building URIs by avoiding hard-coding the
    links. The code in Listing [2-25](#619782_1_En_2_Chapter.xhtml#PC26) shows how
    to build the product self-link using the `WebMvcLinkBuilder` class.


    You use the `ModelMapper` to implicitly map a HATEOAS `Product` instance to a
    non-HATEOAS `Product` API instance. When the map method is called, the source
    and target types are analyzed to determine which properties implicitly match.
    Data is then mapped according to these matches. Even when the source and target
    objects and their properties are different, `ModelMapper` can do its best to determine
    reasonable matches between properties if a configured matching strategy exists.


    Again, for brevity, I do not list the rest of the methods for the `ProductRestController`.
    You can refer to them in the code repository.


    ### Build and Run the Microservice


    The `ch02\ch02-03` folder contains the Maven scripts required to build the examples.
    As a first step, you need to bring up the MongoDB server. Refer to Appendix B
    to learn how to set up MongoDB server and bring it up. You need to execute the
    commands shown in Listing [2-26](#619782_1_En_2_Chapter.xhtml#PC27) to bring up
    MongoDB.


    ```

    (base) binildass-MBP:bin binil$ pwd

    /Users/binil/Applns/mongodb/mongodb-macos-x86_64-4.2.8/bin

    (base) binildass-MBP:bin binil$ mongod --dbpath /usr/local/var/mongodb --logpath
    /usr/local/var/log/mongodb/mongo.log

    Listing 2-26

    Bringing up the MongoDB Server

    ```


    Next, take two command terminals and change the directory to the top-level folder
    of both microservices. Build and run the Product Server microservice using the
    `make.sh` and the `run.sh` scripts, as shown in Listing [2-27](#619782_1_En_2_Chapter.xhtml#PC28).


    ```

    (base) binildass-MBP:01-ProductServer binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch02/ch02-03/01-ProductServer

    (base) binildass-MBP:01-ProductServer binil$ sh make.sh

    [INFO] Scanning for projects...

    [INFO]

    ...

    2023-12-20 10:33:45 INFO  InitComponent.init:42 - Start

    2023-12-20 10:33:45 INFO  InitComponent.init:62 - End

    2023-12-20 10:33:45 INFO  Start.log:56 - Started EcomProd...

    Listing 2-27

    Build and Run Product Server Microservice Using Scripts

    ```


    Next, build and run the Product Web microservice, as shown in Listing [2-28](#619782_1_En_2_Chapter.xhtml#PC29).


    ```

    (base) binildass-MBP:02-ProductWeb binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-03/ch02/ch02-03/02-ProductWeb

    (base) binildass-MBP:02-ProductWeb binil$ sh make.sh

    [INFO] Scanning for projects...

    [INFO]

    ...

    2023-12-20 10:36:29 INFO  InitComponent.init:37 - Start

    2023-12-20 10:36:29 DEBUG InitComponent.init:39 - Do Nothing

    2023-12-20 10:36:29 INFO  InitComponent.init:41 - End

    2023-12-20 10:36:29 INFO  Start.log:56 - Started EcomProd...

    Listing 2-28

    Build and Run Product Web Microservice Using Scripts

    ```


    Now that the microservices are up and running, you can test the microservices.


    ### Testing the Microservice


    Once both microservices are up and running, you can access the web application
    using your browser and pointing to this URL:


    `http://localhost:8080/product.html`


    To test the CRUD operations, follow the instructions described in the subsection,
    “Test the Microservices Using UI” in the last section of Chapter [1](#619782_1_En_1_Chapter.xhtml),
    titled “Your First Java Microservice.”


    Recall that you enabled the HAL browser, so Spring will auto-configure the browser
    and make it available via the default endpoint (see Figure [2-3](#619782_1_En_2_Chapter.xhtml#Fig3)).
    You can access the HAL browser at:


    `http://localhost:8081/`


    ![](images/619782_1_En_2_Chapter/619782_1_En_2_Fig3_HTML.jpg)


    A screenshot of the HAL explorer window. It has the edit headers bar with the
    go button and the links table with 5 columns of relation, name, title, H T T P,
    and doc, and 2 rows of data on the left, and the response status, response headers,
    and response body sections with their respective data and codes on the right.


    Figure 2-3


    The HAL browser


    You can now try the various options with the HAL browser.'
