    ### 理解代码


    首先，让我们看看提供者微服务——即 Product Server 微服务——中的变化。


    Product Server 微服务中 REST 控制器的大部分实现与第 1 章中的清单 1-3 和 1-4 中的代码类似，不同之处在于，它不再使用内存数据库，而是通过
    `ProductRepository` 和 `ProductCategoryRepository` 端口与 MongoDB 仓库进行交互，因此此处不再重复完整代码。不过，这个示例确实引入了一个
    HAL 浏览器。HAL 浏览器由开发 HAL 的同一位作者创建，它提供了一个浏览器内的图形用户界面，用于浏览你的 REST API。通过添加相关依赖，可以轻松地将
    HAL 浏览器集成到你的 Maven 项目中——参见清单 2-23。


    ```

