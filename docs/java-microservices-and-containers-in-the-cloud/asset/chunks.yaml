- fmt: '# Summary


    Every end is a new beginning. You have reached the end of this book; however,
    you have just started your microservices and cloud journey. I demystified a few
    dilemmas around architecture choices and investigated many details. You started
    with the simplest microservice example in Chapter `[1](#619782_1_En_1_Chapter.xhtml)`,
    and as you pause your journey in Chapter `[15](#619782_1_En_15_Chapter.xhtml)`,
    you have even deployed this microservice container to `EKS` in the cloud.


    I hope you have enjoyed many parts of this book in the same way I have enjoyed
    getting into the intricacies of the code to explain them. I have tried to balance
    theory with code to give you a hands-on feel of almost all the concepts explained.
    Frameworks will come and go, and specifications will keep evolving, since “change
    is the only constant thing.” However, the architectural foundations discussed
    throughout the book will still be relevant and valid—at least that is what I have
    experienced in my 25-plus years in IT. Keep moving and keep a fast pace.'
