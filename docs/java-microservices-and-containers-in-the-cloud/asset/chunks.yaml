    \ binil$\n代码清单 13-13\n终止微服务应用程序\n```\n\n至此，微服务的简单 CI/CD 管道示例就完成了。\n\n## 总结\n\n\
    更快的发布周期是微服务架构的主要优势之一。然而，如果没有良好的 CI/CD 流程，你将无法实现微服务所承诺的敏捷性。\n\n> *“我们努力创建不超过两个比萨饼就能喂饱的团队。我们称之为‘两个比萨饼团队规则’。”*\n\
    > \n> ——贝佐斯\n\n当这成为常态时，拥有强大的 CI/CD 流程就变得更加重要，因为你将有多个团队在各自独立的微服务仓库中工作。你已经看到了一个演示这些概念的示例。尽管示例和管道很简单，但它们达到了介绍这些概念的目的。在了解了微服务和容器的不同方面之后，你现在已经准备好进入公有云领域，这将在下一章中进行。\n\
    \n# 14. AWS Elastic Compute Cloud 中的微服务\n\n在制造业企业中，滞销品是指那些不再销售且已停产，但仍留在货架上的产品。同样，过时品是指那些不再销售且已停产，并且通常无法再使用或销售的产品。IT\
    \ 行业也无法避免类似的过时问题。计算、网络和存储设备可能会变得过时或无用，过去在这些设备上的投资可能无法得到保护。云计算试图在一定程度上解决这种过时问题，并将其作为目标之一。\n\
    \n本章介绍公有云的概念，并解释如何在公有云中部署微服务。\n\n本章涵盖以下概念：\n\n*   云计算简介\n\n*   Amazon Web Services\
    \ (AWS) 简介\n\n*   Terraform 简介\n\n*   在 AWS 云中配置 EC2\n\n*   在 AWS 云中部署微服务示例\n\n\
    ## 云计算\n\n云计算是指按需提供计算机系统资源作为可通过网络访问的服务——尤其是计算能力、存储和网络资源——而无需用户企业进行直接、主动的管理。云通常将这些功能分布到多个地理位置，每个位置都是一个*数据中心*。云计算依赖于共享这些资源来实现一致性，并且通常采用按使用量付费的模式，这有助于降低用户企业的资本支出。\n"
- fmt: '### Public Clouds


    Around the year 2000, Amazon created the subsidiary called Amazon Web Services
    (AWS) and before too long they introduced Simple Storage Service (S3) and Elastic
    Compute Cloud (EC2). With this, instead of buying, owning, and maintaining physical
    data centers and servers, enterprises could access technology services, such as
    computing power, storage, and databases, on an as-needed basis from AWS.


    Before too long, many other players also offered similar cloud computing services.
    See Figure [14-1](#619782_1_En_14_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_14_Chapter/619782_1_En_14_Fig1_HTML.jpg)


    A diagram has logos of Microsoft Azure, Alibaba Cloud, Google Cloud Platform,
    AWS, and Oracle Cloud Infrastructure in a cloud.


    Figure 14-1


    Major cloud service providers


    A few of the advantages of cloud computing are worth mentioning:


    - **Agility**: The long cycles of hardware and software purchasing followed by
    further delays of provisioning and testing are cut short by cloud computing, since
    an enterprise or even an individual developer can spin up resources the instance
    they need them.

    - **Elasticity**: Over-provisioning or extra provisioning for just a few hours
    or days of seasonal peak in a year is not required since cloud computing allows
    you to add or reduce resources as and when your scalability needs change. This
    is like having zero “dead inventory” on the shelf.

    - **Cost savings**: There is less upfront investment in IT infrastructure and
    middleware, so your Capex is greatly reduced. Since cloud providers operate at
    huge volumes, they achieve economies of scale, a part of which could also be extended
    to cloud users.


    Cloud is fast becoming the de facto mode of IT infrastructure services. Figure
    [14-1](#619782_1_En_14_Chapter.xhtml#Fig1) shows a few of the cloud service providers;
    there are many more in the industry.


    ### Cloud Deployment Models


    There are differences in who owns the cloud computing service and how the service
    is offered to its customers. Based on that, the Cloud Deployment models are classified
    into three or more.


    #### Public Cloud


    A *public cloud* is a subscription service that is offered to all customers who
    want similar services from their cloud provider. See Figure [14-2](#619782_1_En_14_Chapter.xhtml#Fig2).


    ![](images/619782_1_En_14_Chapter/619782_1_En_14_Fig2_HTML.jpg)


    An illustration overlaps the clouds and blocks of public cloud with Microsoft
    Azure, multi-cloud with Google Cloud Platform and AWS, hybrid cloud with AWS and
    rack, enterprise, and on-premises data center with rack and mainframe.


    Figure 14-2


    Public vs. private vs. hybrid vs. multi-cloud


    Public cloud services are offered over the Internet so that any consumer can subscribe
    to the service.


    #### Private Cloud


    A *private cloud* is infrastructure operated solely for a single organization.
    It can be managed internally by the organization’s own IT or by a third party
    and hosted internally or externally.


    #### Hybrid Cloud


    A *hybrid cloud* service is composed of some combination of private, public, and
    community cloud services, from different service providers. Some organizations
    use public cloud computing resources to meet temporary high-capacity needs that
    cannot be met by the private cloud. This capability enables hybrid clouds to employ
    cloud bursting for scaling across clouds.


    #### Multi-Cloud


    A *multi-cloud* leverages computing services from multiple providers in a single
    but heterogeneous architecture to reduce reliance on single vendors. The reason
    might be to increase flexibility through choice so that you are not dependent
    on a single provider, to mitigate against disasters, and so on.


    While data consistency and synchronization are aspects to be taken care of, managing
    hybrid and multi-cloud modes involves more complexities compared to pure private
    or public modes. Even with single providers, taking care of those aspects in an
    errorless manner is a non-trivial task. That is a bigger topic with many technical
    complexities involved, and could be the subject matter for another book in the
    future.


    ### Distributed Computing


    The cloud service model is based on the kind of control users have over how the
    resources are utilized. Figure [14-3](#619782_1_En_14_Chapter.xhtml#Fig3) shows
    the different models.


    ![](images/619782_1_En_14_Chapter/619782_1_En_14_Fig3_HTML.jpg)


    4 block diagrams of traditional, IaaS, PaaS, and SaaS with their respective data,
    applications, middleware or runtime, OS, virtualization, compute, network, and
    storage, and private, public, hybrid, and multi classifications. Traditional has
    all the services customer-managed, while the rest have an increasing number of
    services service provider-managed.


    Figure 14-3


    Cloud service models (adapted from “Practical Microservices Architectural Patterns,”
    ISBN-13: 978-1484245002)


    Typically, the cloud architecture can be mapped to the cloud service model. In
    the traditional service model, the user, or the enterprise itself, is responsible
    for managing the whole stack (e.g., the hardware, data center facilities, software,
    and data), whereas in the cloud service model it varies as follows:


    - **Infrastructure as a Service (IaaS)**: In the IaaS service model, the users
    request compute power, storage, network, and their associated resources alone
    and pay for what they use.

    - **Platform as a Service (PaaS)**: In the PaaS model, the users have no control
    over the underlying infrastructure, such as CPU, network, and storage, as they
    are abstracted away, below the platform. Instead, it allows application development
    platforms the creation of applications with supported programming languages and
    related tools hosted in the cloud and accessed through an interface, mainly a
    browser. Many times, the application runtime and middleware are also provided
    by the CSP, and the user develops, installs, manages, and operates the software
    application alone and its data.

    - **Software as a Service (SaaS)**: This is the “forget everything” model, where
    the user doesn’t even own, manage, or operate the application. Applications are
    run on the cloud infrastructure and are accessible from various client devices.
    Limited user-configurations are available. Sometimes the same application instance
    serves the end users of more than one enterprise (tenant); such applications are
    called multi-tenant.^([⁶](#fn6))


    IaaS and PaaS are both covered in the examples in this book.


    ## Amazon Web Services (AWS)


    Amazon Web Services (AWS) offers public cloud services over different levels of
    abstractions of compute, storage, and networking. AWS infrastructure is distributed
    globally, and the AWS website provides a glimpse of the global distribution of
    its data centers. See Figure [14-4](#619782_1_En_14_Chapter.xhtml#Fig4).


    ![](images/619782_1_En_14_Chapter/619782_1_En_14_Fig4_HTML.jpg)


    A world map marks the data center locations as color gradient circles throughout
    the continents.


    Figure 14-4


    AWS data center locations (Source: [`https://aws.amazon.com/about-aws/global-infrastructure/`](https://aws.amazon.com/about-aws/global-infrastructure/))


    These services can be accessed by machines using HTTP protocols. Users can also
    access AWS services through the AWS command terminal or through the web UI.


    The next section looks at a few of the AWS services used in the example in the
    next section.


    ### VPC


    A Virtual Private Cloud (VPC) is a virtual network dedicated to your AWS account.
    It is logically isolated from other virtual networks in AWS Cloud. You can specify
    an IP address range for the VPC, add subnets, add gateways, and associate security
    groups.'
