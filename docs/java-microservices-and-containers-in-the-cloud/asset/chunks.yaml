  trans: '

    ### 理解源代码


    本书的源代码可通过图书产品页面上的 GitHub 获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。示例的源代码组织在
    `ch10\ch10-01` 文件夹内。本示例中的大部分源代码与 `ch03\ch03-02` 类似，后者已在第 3 章“使用 MongoDB 和 CrudRepository
    的微服务”一节中详细解释过。你还在第 8 章“使用文件挂载的微服务和 MongoDB 容器”一节的图 8-9 中看到了基于 Docker 的拓扑部署。基于
    Docker Compose 的拓扑部署也在第 9 章“组合微服务与 MongoDB 容器”一节的图 9-2 中展示过。基于这些原因，本节将直接进入 Kubernetes
    相关的特定方面。


    `ch10-01` 文件夹内示例源代码组织的概要表示如代码清单 10-5 所示。


    ```

    ./ch10-01/

    ├── 01-ProductServer

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── 02-ProductWeb

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── Dockerfile

    ├── README.txt

    ├── clean.sh

    ├── makeandrun.sh

    ├── mongo-deployment.yml

    ├── mongo-service.yml

    ├── mongo-volume-claim.yml

    ├── mongo-volume.yml

    ├── pom.xml

    ├── product-server-deployment.yml

    ├── product-server-service.yml

    ├── product-web-deployment.yml

    └── product-web-service.yml

    代码清单 10-5

    示例 10-01 源代码组织

    ```


    这个 Dockerfile 与第 7 章“使用 Dockerfile 构建微服务”一节中的类似，因此这里不再重复解释。此外还有一组 `.yml` 文件。


    创建 Kubernetes 资源是通过向 Kubernetes 的 REST 端点提交 JSON 或 YAML 清单来完成的。这有助于对这些资源定义进行版本控制。


    我研究的第一个资源是 Pod，它是一个容器组。它代表了 Kubernetes 中的基本构建块。你总是在 Pod 上部署和操作容器。Pod 通常只包含单个容器，但如果你认为有紧密相关的容器，也可以在
    Pod 中包含多个容器。Sidecar 容器就是这样一个例子，其中日志和数据变更监视器可以与主容器位于同一个 Pod 中。


    因此，尽管你可以将多层应用程序（例如 `ProductWeb` 和 `ProductServer`）托管在单个 Pod 中，但推荐的方式是为每一层使用单独的
    Pod。原因很简单——你可以独立地扩展各层，并将它们分布到集群中。参见代码清单 10-6。


    ```


    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: product-web

    labels:

    app: product-web

    group: frontend

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: product-web

    template:

    metadata:

    labels:

    app: product-web

    spec:

    containers:

    - name: product-web

    image: ecom/product-web

    ports:

    - containerPort: 8080

    imagePullPolicy: Never

    env:

    - name: acme.PRODUCT_SERVICE_URL

    value: http://product-server:8081/products

    代码清单 10-6

    Product Web 的 Pod 定义 YAML 文件 (ch10\ch10-01\product-web-deployment.yml)

    ```


    在代码清单 10-6 的 Pod 定义中，第一行是分隔符，它是可选的。如果你试图在单个文件中定义多个结构，则需要分隔符。`metadata` 包含关于 Kubernetes
    Pod 的名称、命名空间、标签和其他信息。


    代码清单 10-6 展示了 Product Web 微服务的 Pod 描述符。这里，`Spec` 包含了 Kubernetes Pod 内容的实际描述，例如
    Pod 的容器、副本数量、镜像、卷和其他数据。


    请注意 `containerPort: 8080`。即使你不分配端口，客户端仍然可以连接到 Pod。如果应用程序绑定到 `127.0.0.1`，它将有效地阻止流量进入
    Pod，而 `0.0.0.0` 则允许流量通过所有接口进入 Pod，即使该端口没有在 Pod 规范中显式列出。但是，如果你显式地定义端口，那么使用你集群的每个人都可以快速看到每个
    Pod 暴露了哪些端口。显式定义端口还允许你为每个端口分配一个名称，这很方便。


    Product Web 微服务依赖于环境变量 `acme.PRODUCT_SERVICE_URL` 的适当值，你将其值设置为所依赖的 Product Server
    微服务的服务 URL，你将在代码清单 10-9 中看到这一点。


    与你创建 Pod 的方式相同，创建 Kubernetes 服务的最简单方法是向 Kubernetes 的 REST 端点提交 JSON 或 YAML 清单，如代码清单
    10-7 中 Product Web 微服务的 Kubernetes 服务所示。


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: product-web

    spec:

    selector:

    app: product-web

    ports:

    - protocol: TCP

    port: 8080

    targetPort: 8080

    type: LoadBalancer

    代码清单 10-7

    Product Web 的服务定义 YAML 文件 (ch10\ch10-01\product-web-service.yml)

    ```


    在代码清单 10-7 中，服务有一个名称 `product-web`。`port` 指的是该服务将在哪个端口上可用，而 `targetPort` 是请求将被转发到的容器端口，以便提供服务。因此，总结一下，你正在定义一个名为
    `product-web` 的服务，它将接受端口 `80` 上的请求，并将每个请求路由到与标签选择器 `app=product-web` 匹配的某个 Pod
    的端口 `8080`。你还可以看到定义了一个 `LoadBalancer`，以便于访问服务。


    代码清单 10-8 展示了 Product Server 微服务的 Pod 描述。


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: product-server

    labels:

    app: product-server

    group: backend

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: product-server

    template:

    metadata:

    labels:

    app: product-server

    spec:

    containers:

    - name: product-server

    image: ecom/product-server

    ports:

    - containerPort: 8081

    imagePullPolicy: Never

    env:

    - name: spring.data.mongodb.uri

    value: mongodb://mongo:27017/test

    代码清单 10-8

    Product Server 的 Pod 定义 YAML 文件 (ch10\ch10-01\product-server-deployment.yml)

    ```


    这里一个值得注意的方面是，Product Server 微服务依赖于环境变量 `spring.data.mongodb.uri` 的适当值，其值被设置为所依赖的
    MongoDB 的服务 URL，你将在代码清单 10-15 中看到这一点。


    代码清单 10-9 展示了 Product Server 微服务的服务描述。


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: product-server

    spec:

    selector:

    app: product-server

    ports:

    - protocol: TCP

    port: 8081

    targetPort: 8081


    apiVersion: v1

    kind: Service

    metadata:

    name: product-server-nodeport

    spec:

    selector:

    app: product-server

    ports:

    - nodePort: 30002

    port: 8081

    targetPort: 8081

    type: NodePort

