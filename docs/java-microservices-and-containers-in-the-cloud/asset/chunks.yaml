    │   └── src

    │       └── ...

    ├── Dockerfile

    ├── README.txt

    ├── clean.sh

    ├── makeandrun.sh

    ├── pom.xml

    ├── postgres-config.yml

    ├── postgres-deployment.yml

    ├── postgres-pvc.yml

    ├── postgres-svc.yml

