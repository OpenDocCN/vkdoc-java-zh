    \ Adminer 版本和语言。登录区域包含系统下拉菜单、服务器、用户名、密码和数据库输入框，以及带有“永久登录”复选框的登录按钮。\n\n图 11-7\n\
    \n使用 Adminer UI 访问 PostgreSQL 数据库\n\n注意图 11-7 中的 URL 地址。它提供了在 `postgres-config.yml`\
    \ 中配置的凭据。如果成功登录，你可以查看 Product Server 微服务初始化的表。参见图 11-8。\n\n![](img/619782_1_En_11_Fig8_HTML.jpg)\n\
    \n一个 schema public 浏览器标签页的截图。右侧是 schema public 区域，左侧是 Adminer 版本、语言以及两个包含各种选项的下拉菜单。schema\
    \ 区域包含表和视图部分，带有一个搜索栏和一个包含 8 列 3 行（含复选框等）的表格。\n\n图 11-8\n\nAdminer UI 显示新创建的表\n\
    \n完成本例中所有微服务的测试后，你可以停止并移除微服务容器并清理环境，如清单 11-38 所示。\n\n```\n(base) binildass-MacBook-Pro:ch11-03\
    \ binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch11/ch11-03\n\
    (base) binildass-MacBook-Pro:ch11-03 binil$ eval $(minikube docker-env)\n(base)\
    \ binildass-MacBook-Pro:ch11-03 binil$ sh clean.sh\n[INFO] Scanning for projects...\n\
    [INFO] -----------------------------------------------------\n[INFO] Reactor Build\
    \ Order:\n[INFO]\n[INFO] Ecom-Product-Server-Microservice                 [jar]\n\
    [INFO] Ecom-Product-Web-Microservice                    [jar]\n[INFO] Ecom   \
    \                                          [pom]\n[INFO]\n...\n[INFO]\n[INFO]\
    \ Ecom-Product-Server-Microservice . SUCCESS [  0.114 s]\n[INFO] Ecom-Product-Web-Microservice\
    \ .... SUCCESS [  0.009 s]\n[INFO] Ecom ............................. SUCCESS\
    \ [  0.036 s]\n[INFO] -----------------------------------------------------\n\
    [INFO] BUILD SUCCESS\n[INFO] -----------------------------------------------------\n\
    [INFO] Total time:  0.384 s\n[INFO] Finished at: 2023-05-28T22:46:54+05:30\n[INFO]\
    \ -----------------------------------------------------\nservice \"product-web\"\
    \ deleted\ndeployment.apps \"product-web\" deleted\nservice \"product-server\"\
    \ deleted\ndeployment.apps \"product-server\" deleted\nservice \"adminer\" deleted\n\
    deployment.apps \"adminer\" deleted\nservice \"postgres\" deleted\ndeployment.apps\
    \ \"postgres\" deleted\npersistentvolumeclaim \"postgres-persistent-volume-claim\"\
    \ deleted\nconfigmap \"postgres-config\" deleted\ningress.networking.k8s.io \"\
    ingress-service\" deleted\nUntagged: ecom/product-web:latest\nUntagged: ecom/product-server:latest\n\
    (base) binildass-MacBook-Pro:ch11-03 binil$\n清单 11-38\n清理项目与环境\n```\n\n至此，本章的最后一个示例完成。\n\
    \n## 总结\n\n上一章介绍了 Kubernetes 以及一个与 SQL 和 NoSQL 数据库交互的熟悉微服务示例。本章是上一章的延伸，你在其中了解了\
    \ Kubernetes 中的 Kafka。你还了解到，所有设计原语——包括消费者和提供者微服务多个实例之间的关联——都能在 Kubernetes 工具集中按预期工作。最后，你学习了\
    \ Ingress，它可以通过单个 IP 地址暴露多个服务，为你提供一种实用且经济的方式将多个服务暴露给外部世界。下一步是了解一些其他工具，这些工具可以帮助你在拥有十几个微服务的生产场景中进一步减少和管理复杂性。这是下一章的主题。\n\
    \n# 12. 自动化 Kubernetes 部署与 Helm\n\n从单体架构到微服务的旅程包括选择性扩展、并行发布等目标。然而，随着你创建更多微服务并且应用程序不断增长，管理变得越来越困难。Kubernetes\
    \ 通过将多个微服务分组到单个部署中来简化这一过程。在开发生命周期中管理 Kubernetes 应用程序会带来一系列挑战，包括版本管理、配置环境变量、资源分配、更新和回滚。Helm\
    \ 为此问题提供了最合适的解决方案之一，使部署更加一致、可重复且可靠。本章再次审视自动化的必要性，并作为其中的一部分，借助多微服务示例介绍 Helm。\n\n\
    此处的目标是理解自动化步骤，然后介绍 Helm。首先，我将示例应用程序精简到最低限度，以便你可以专注于应用程序自动化方面。在介绍 Helm 之后，我会重新引入相同的多微服务示例，并向你展示当微服务复杂性增加时，Helm\
    \ 如何发挥作用。\n\n本章涵盖以下概念：\n\n*   重新介绍 Hello World Spring Boot 微服务\n\n*   自动化 Docker\
    \ 交互\n\n*   自动化 Kubernetes 交互\n\n*   介绍 Helm\n\n*   使用 Helm 部署多微服务\n\n*   使用 Helmfile\
    \ 部署多微服务\n\n让我们从重新介绍“Hello World”微服务示例开始。\n"
