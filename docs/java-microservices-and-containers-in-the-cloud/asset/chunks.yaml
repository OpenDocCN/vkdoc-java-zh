    ## Microservices Over Kafka with MongoDB in k8s


    In this example, you will tweak the same set of microservices from Chapter [6](#619782_1_En_6_Chapter.xhtml)
    in the section titled “CRUD Microservices over Kafka on MongoDB” and in Chapter
    [9](#619782_1_En_9_Chapter.xhtml) in the section titled “Composing Microservice
    with MongoDB Containers.” A consumer and a provider microservice communicate with
    each other using Kafka as the messaging channel. The provider microservice stores
    the entity in a MongoDB database. When the browser sends a request to the first
    (consumer) microservice, it uses async HTTP. Even though it uses async HTTP, the
    example emulates a sync-style user experience at the browser level.


    This section demonstrates this example with multiple instances of the consumer
    and provider microservices, and you will also use multiple clients while testing
    the service.


    ### Design the Microservices Orchestration Topology


    This example uses a modified version of the hexagonal microservice view shown
    in Figure [9-4](#619782_1_En_9_Chapter.xhtml#Fig4) in Chapter [9](#619782_1_En_9_Chapter.xhtml).
    The microservices communicate through an async channel. Apache Kafka, which is
    inherently asynchronous, is used as the messaging channel. See Figure [11-2](#619782_1_En_11_Chapter.xhtml#Fig2).


    ![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig2_HTML.jpg)


    A 3 D model diagram of the user connected to the browser, product web mu S, Kafka
    infrastructure service with event queue and partitions 1 and 2, product server
    mu S, container engine, host O S, and hardware. Product web includes 3 business
    services, and product server includes 3 business services and 1 application service.


    Figure 11-2


    Kubernetes orchestration topology for microservice


    The deployment architecture is very similar to the previous example in this chapter.
    The only difference is that this example deploys a MongoDB container in Kubernetes.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized inside the `ch11\ch11-02` folder.


    A summarized representation of the source code organization for the example inside
    the `ch11-02` folder is shown in Listing [11-24](#619782_1_En_11_Chapter.xhtml#PC24).


