    ## 总结


    容器非常擅长打包、分发以及在目标环境中执行代码，而无需在目标机器上设置许多特定于应用程序的配置。你可以将容器视为一个黑盒。为了证明这一点，本章包含了在没有本地
    Java SDK 的情况下，仅使用容器中的 Maven 来构建、打包和执行 Java 代码的示例！你还学习了处理容器以与简单微服务交互的各种方法。现在，你能够更好地理解容器是什么。下一章将介绍更复杂的微服务，同样会使用容器。


    # 8. 微服务容器


    前面的章节介绍了微服务，它们是自包含、独立的应用程序单元，每个单元都履行来自特定领域的相关业务功能。每个微服务，或者它们的集合，本身都可以被视为一个应用程序。在一个多微服务应用程序中，你会为你的应用创建许多微服务。如果你决定使用不同的技术栈来构建多个微服务，那该怎么办？你的团队很快就会陷入困境，因为开发人员需要管理的环境甚至比他们在传统的单体应用开发场景中还要多。使用
    Docker，可以在同一台服务器上管理、部署甚至减少数百甚至数千个微服务的性能开销。Docker 容器比虚拟机需要更少的计算资源，并且容器还提供了所需的隔离性，使得不同的技术可以并存。因此，容器与微服务是天然契合的。


    第 7 章介绍了如何使用 Docker 镜像运行应用程序容器。本章将继续讨论这一话题，但会使用反映真实场景的微服务示例。多个微服务将进行交互，这意味着它们需要相互通信。本章涵盖以下概念：


    *   微服务容器之间的相互连接


    *   微服务容器连接到主机上的 PostgreSQL 数据库


    *   微服务容器连接到容器中的 PostgreSQL


    *   微服务容器连接到容器中的 MongoDB


    要理解容器间的通信，你需要了解容器之间的网络选项，接下来将对此进行介绍。


    ## 容器网络


    Docker 提供了不同的网络配置方式，以便你的容器可以与外界通信，无论是与另一台服务器还是与另一个 Docker 容器。下一节将简要介绍这些选项。


    ### 链接


    当你安装 Docker 时，Docker 默认使用一个自动创建的桥接网络。Docker 的网络子系统是可插拔的，使用驱动程序。在 Docker 引入网络功能之前，Docker
    的链接功能使容器能够相互发现，并安全地将一个容器的信息传递给另一个容器。随着 Docker 网络功能的引入，你仍然可以创建链接，但它们与默认的桥接网络和其他用户定义的网络相比，行为有所不同。尽管链接选项仍然有效，但它是一个遗留功能。第一个示例使用了链接；然而，此功能最终可能会被移除，因此建议你使用其他选项（网络）来实现此功能。用户定义的网络不支持的一个功能是，你可以通过链接在容器之间共享环境变量。但卷提供了更好的选项，可以以更可控的方式在容器之间共享环境变量。


    ### 网络


    有多种类型的网络。我在这里只提及它们，因为详细的解释超出了本书的范围。


    *   当你需要在同一 Docker 主机上让多个容器通信时，桥接网络是最佳选择。


    *   当网络堆栈不应与 Docker 主机隔离，但你希望容器的其他方面被隔离时，主机网络是最佳选择。


    *   当你需要运行在不同 Docker 主机上的容器进行通信，或者多个应用程序使用 Swarm 服务协同工作时，覆盖网络是最佳选择。


    *   当你从虚拟机设置迁移，或者需要你的容器看起来像网络上的物理主机（每个主机都有唯一的 MAC 地址）时，Macvlan 网络是最佳选择。


    *   第三方网络插件允许你将 Docker 与专门的网络堆栈集成。


    你很快就会看到可运行的代码，以便通过实践来学习。


    由于本章将探讨容器通信的多种场景，因此了解如何检查容器日志也很有意义，接下来将对此进行介绍。


    ## 容器日志


    你已经了解到 Docker 是一个操作系统级别的虚拟化平台，因此它允许你在同一台主机上同时运行多个应用程序容器。它有助于分离应用程序和基础设施，但是当你在同一基础设施中拥有许多应用程序时，当事情不如预期时，你需要一种方法来进行故障排除。Docker
    日志在这里可以帮助你。'
