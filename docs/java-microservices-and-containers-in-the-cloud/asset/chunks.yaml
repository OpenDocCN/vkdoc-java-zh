    此构建会将镜像推送到 Docker Hub。当你执行 Skaffold 的 `dev` 模式时，它会构建应用程序、创建镜像、部署到你的本地集群，并持续监控你的源代码以查看是否有更改。当有更改时，它会在代码更改后重复相同的流程，以便你拥有用于测试和调试的全新部署。


    在触发任何代码更改之前，首先作为下一步运行微服务。请注意，你将使用 `skaffold` 命令来运行微服务。参见清单 13-6。


