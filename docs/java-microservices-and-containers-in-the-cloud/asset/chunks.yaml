    Listing 8-42

    Stopping Microservice Containers and Cleaning the Environment

    ```


    You have now seen many examples exploring different scenarios of using containers
    with SQL and No SQL databases. Next, the chapter extends this learning to one
    more aspect—container storage.


    ## Container Storage


    Chapter [7](#619782_1_En_7_Chapter.xhtml) explained that the Docker container
    filesystem is predominantly read-only and is a kind of temporary by default. When
    you start up a Docker image by running the container, you’re placing a read-write
    layer on top of the lower layer file stack. You can create, modify, and delete
    files as you wish. Only when you commit the changes back into the image do they
    become persisted. This is not very convenient when it comes to storing and retrieving
    data, which is supposed to be non-volatile. A better option is to separate the
    container lifecycle from the data it manages. You can keep these separate, so
    that the data managed (or being used) by your application is not destroyed or
    tied to the container lifecycle and can thus be reused.


    Separating long-lived data from containers is done via volumes, which this section
    investigates. Volumes are not part of the union filesystem, and so the write operations
    are instant and as fast as possible and there is no need to commit any changes.
    Since volumes live outside of the union filesystem, they exist as normal directories
    and files on the host filesystem.


    ### Volumes


    Volumes are the preferred mechanism for persisting data generated by and used
    by Docker containers. Volumes are better than a container’s writable layer in
    persisting long-term data. Volumes do not increase the size of the containers
    using them, and the volume’s contents exist outside the lifecycle of a given container.


    There are two ways to create volumes:


    *   Specify the `-v` option when running an image.

    *   Use the command to create a volume prior to starting a container.


    Let’s look at the first option here, which you will also use in the next example.


    ```

    docker run  -d -it -p 27017:27017 --name mongo  --net=ecom-network -v /Users/binil/dockerbook/ch08-05/mongodata:/data/db  mongo:3.6

    ```


    You can create a volume using the `-v` switch and instruct Docker that the host
    directory `/Users/binil/dockerbook/ch08-05/mongodata` should be mapped into the
    `/data/db` directory in the running Mongo container.


    Let’s straight look into an example.


    ## Microservice and MongoDB Containers Using File Mount


    This example reuses the same microservices from the section titled “Microservices
    using MongoDB and CrudRepository” in Chapter [3](#619782_1_En_3_Chapter.xhtml).
    The same two microservices are used—a consumer and a provider microservice communicating
    each other using the REST protocol. The provider microservice also interacts with
    a MongoDB. Different from the first two MongoDB examples in this chapter, this
    example uses volumes to persist the Mongo database data. Refer to Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1)
    in Chapter [2](#619782_1_En_2_Chapter.xhtml) for the overall design.'
