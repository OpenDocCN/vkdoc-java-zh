    ## 在宿主机上使用 PostgreSQL 的微服务容器


    此示例复用了第 3 章中“使用 PostgreSQL 和 RestTemplate 的微服务”一节中的微服务。它包括相同的两个微服务——一个消费者和一个提供者微服务，它们使用
    REST 协议相互通信。此示例中的提供者微服务与 PostgreSQL 数据库交互。请参考第 2 章中的图 2-1 了解整体设计，但此示例使用的是 PostgreSQL
    数据库。


    ### 设计容器拓扑


    对于这个新设计，你需要对图 8-1 中基于容器的部署拓扑进行略微调整。如图 8-2 所示。产品 Web 和产品服务器微服务被容器化，但此处的计划是使用运行在
    Docker 容器之外、直接位于宿主机操作系统上的 PostgreSQL 数据库。


    ![](img/619782_1_En_8_Fig2_HTML.jpg)


    微服务容器拓扑设计。包括用户、浏览器、容器引擎、宿主机操作系统和硬件。


    图 8-2


    微服务容器拓扑设计


    关于图 8-2 中的编号标签，有几点需要注意：


    1.  产品 Web 微服务通过容器间的网络连接到产品服务器微服务。


    2.  要连接到 PostgreSQL 数据库，仅靠产品服务器微服务使用容器网络是不够的，你需要明确告知产品服务器微服务容器运行 PostgreSQL 数据库的宿主机的
    IP 详情。


    3.  PostgreSQL 数据库未被容器化，因此它不使用任何形式的虚拟化。相反，PostgreSQL 直接运行在宿主机操作系统上。


    4.  PostgreSQL 直接使用宿主机资源，特别是用于数据存储需求。


    5.  产品服务器微服务不是一个物理组织；它是产品服务器微服务容器与宿主机上 PostgreSQL 数据库的虚拟分组。


    现在让我们看看为什么需要这种部署架构。


    像 Docker 这样的编排工具在创建时假设它们是无状态的，这意味着它们在运行期间不应保存任何数据。如果容器是有状态的，那么即使它们是从同一个镜像实例化出来的，也可能导致某些类型的多个容器行为不同。然而，数据库存储状态，因此它们是有状态的。因此，像图
    8-2 所示的部署架构是可行的。当然，对于生产环境，这个单一的数据库实例（或集群）将位于公有云中，可能作为 DBaaS（数据库即服务），而不是本地宿主机（假设你使用的是基于云的部署）。

