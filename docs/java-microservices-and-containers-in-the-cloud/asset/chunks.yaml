- fmt: "# Load Testing the Microservice Pods\n\nI have provided a few scripts to help\
    \ you load test the microservices and see how the load is evenly distributed from\
    \ the Product Web to the Product Server through the Kafka messaging channel. See\
    \ Listing [11-19](#619782_1_En_11_Chapter.xhtml#PC19).\n\n```\n./02-ProductWeb/\n\
    ├── pingrun1.sh\n├── pingrun2.sh\n├── pingrun3.sh\n├── pom.xml\n└── src\n    └──\
    \ ...\nListing 11-19\nLoad Testing Scripts\n```\n\nTo load test, first open each\
    \ of these scripts and tweak the URL to point to the Product Web microservice.\
    \ Subsequently, you can open three different terminals and execute these scripts\
    \ concurrently to fire cURL requests. See Listings [11-20](#619782_1_En_11_Chapter.xhtml#PC20)\
    \ through [11-22](#619782_1_En_11_Chapter.xhtml#PC22).\n\n```\n(base) binildass-MacBook-Pro:02-ProductWeb\
    \ binil$ sh pingrun3.sh\n...\nListing 11-22\nFiring Requests to Product Web Microservice\
    \ from Terminal 3\n```\n\n```\n(base) binildass-MacBook-Pro:02-ProductWeb binil$\
    \ sh pingrun2.sh\n...\nListing 11-21\nFiring Requests to Product Web Microservice\
    \ from Terminal 2\n```\n\n```\n(base) binildass-MacBook-Pro:02-ProductWeb binil$\
    \ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/ch11/ch11-01/02-ProductWeb\n\
    (base) binildass-MacBook-Pro:02-ProductWeb binil$ sh pingrun1.sh\n...\nListing\
    \ 11-20\nFiring Requests to Product Web Microservice from Terminal 1\n```\n\n\
    The contents of all three scripts are the same, so you can alternatively execute\
    \ the same script in three different terminals!\n\nOnce you complete testing the\
    \ microservices in this example, you can stop and remove the microservice containers\
    \ and clean the environment. See Listing [11-23](#619782_1_En_11_Chapter.xhtml#PC23).\n\
    \n```\n(base) binildass-MacBook-Pro:ch10-03 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch11/ch11-01\n\
    (base) binildass-MacBook-Pro:ch10-03 binil$ eval $(minikube docker-env)\n(base)\
    \ binildass-MacBook-Pro:ch10-03 binil$ sh clean.sh\n[INFO] Scanning for projects...\n\
    [INFO] --------------------------------------\n[INFO] Reactor Build Order:\n[INFO]\n\
    [INFO] Kafka Request Reply utility        [jar]\n[INFO] Ecom-Product-Server-Microservice\
    \   [jar]\n[INFO] Ecom-Product-Web-Microservice      [jar]\n[INFO] Ecom      \
    \                         [pom]\n[INFO]\n...\nservice \"product-web\" deleted\n\
    deployment.apps \"product-web\" deleted\nservice \"product-server\" deleted\n\
    service \"product-server-nodeport\" deleted\ndeployment.apps \"product-server\"\
    \ deleted\nservice \"postgres\" deleted\ndeployment.apps \"postgres\" deleted\n\
    persistentvolumeclaim \"postgres-persistent-volume-claim\" deleted\nconfigmap\
    \ \"postgres-config\" deleted\nservice \"zookeeper-ip-service\" deleted\nservice\
    \ \"kafka-1-ip-service\" deleted\ndeployment.apps \"zookeeper-deployment\" deleted\n\
    deployment.apps \"kafka-1-deployment\" deleted\nUntagged: ecom/product-web:latest\n\
    Untagged: ecom/product-server:latest\n(base) binildass-MacBook-Pro:ch11-01 binil$\n\
    Listing 11-23\nCleaning the Project and the Environment\n```\n\nThis completes\
    \ the first example.\n\n## Microservices Over Kafka with MongoDB in k8s\n\nIn\
    \ this example, you will tweak the same set of microservices from Chapter [6](#619782_1_En_6_Chapter.xhtml)\
    \ in the section titled “CRUD Microservices over Kafka on MongoDB” and in Chapter\
    \ [9](#619782_1_En_9_Chapter.xhtml) in the section titled “Composing Microservice\
    \ with MongoDB Containers.” A consumer and a provider microservice communicate\
    \ with each other using Kafka as the messaging channel. The provider microservice\
    \ stores the entity in a MongoDB database. When the browser sends a request to\
    \ the first (consumer) microservice, it uses async HTTP. Even though it uses async\
    \ HTTP, the example emulates a sync-style user experience at the browser level.\n\
    \nThis section demonstrates this example with multiple instances of the consumer\
    \ and provider microservices, and you will also use multiple clients while testing\
    \ the service.\n\n### Design the Microservices Orchestration Topology\n\nThis\
    \ example uses a modified version of the hexagonal microservice view shown in\
    \ Figure [9-4](#619782_1_En_9_Chapter.xhtml#Fig4) in Chapter [9](#619782_1_En_9_Chapter.xhtml).\
    \ The microservices communicate through an async channel. Apache Kafka, which\
    \ is inherently asynchronous, is used as the messaging channel. See Figure [11-2](#619782_1_En_11_Chapter.xhtml#Fig2).\n\
    \n![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig2_HTML.jpg)\n\nA 3 D model\
    \ diagram of the user connected to the browser, product web mu S, Kafka infrastructure\
    \ service with event queue and partitions 1 and 2, product server mu S, container\
    \ engine, host O S, and hardware. Product web includes 3 business services, and\
    \ product server includes 3 business services and 1 application service.\n\n**Figure\
    \ 11-2**  \nKubernetes orchestration topology for microservice\n\nThe deployment\
    \ architecture is very similar to the previous example in this chapter. The only\
    \ difference is that this example deploys a MongoDB container in Kubernetes.\n\
    \n### Understanding the Source Code\n\nThe source code for this book is available\
    \ on GitHub via the book’s product page, located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).\
    \ The source code for this example is organized inside the `ch11\\ch11-02` folder.\n\
    \nA summarized representation of the source code organization for the example\
    \ inside the `ch11-02` folder is shown in Listing [11-24](#619782_1_En_11_Chapter.xhtml#PC24).\n\
    \n```\nch11-02/\n├── 01-ProductServer\n│   ├── pom.xml\n│   └── src\n│       └──\
    \ ...\n├── 02-ProductWeb\n│   ├── pingrun1.sh\n│   ├── pingrun2.sh\n│   ├── pingrun3.sh\n\
    │   ├── pom.xml\n│   └── src\n│       └── ...\n├── Dockerfile\n├── README.txt\n\
    ├── clean.sh\n├── kafka-deployment.yml\n├── kafka-request-reply-util\n│   ├──\
    \ pom.xml\n│   └── src\n│       └── ...\n├── kafka-svc.yml\n├── makeandrun.sh\n\
    ├── mongo-deployment.yml\n├── mongo-service.yml\n├── mongo-volume-claim.yml\n\
    ├── mongo-volume.yml\n├── pom.xml\n├── product-server-deployment.yml\n├── product-server-service.yml\n\
    ├── product-web-deployment.yml\n└── product-web-service.yml\nListing 11-24\nExample\
    \ 11-02 Source Code Organization\n```\n\nThe source code in this example is similar\
    \ to `ch09\\ch09-04`, which I explained in detail in Chapter [9](#619782_1_En_9_Chapter.xhtml).\
    \ In this example from Chapter [9](#619782_1_En_9_Chapter.xhtml), the deployment\
    \ architecture is similar, but it used Docker Compose instead of Kubernetes. In\
    \ the first example in Chapter [10](#619782_1_En_10_Chapter.xhtml) (`ch10\\ch10-01`),\
    \ you also looked at the Kubernetes-based deployment of the two microservices\
    \ and PostgreSQL, and in the previous example in this chapter, you also saw the\
    \ Kubernetes deployment of Kafka. You should therefore be familiar with all the\
    \ deployment descriptors in Listing [11-24](#619782_1_En_11_Chapter.xhtml#PC24),\
    \ so I move to the next steps in executing the example."
