    API 服务器端口。


    ### 节点端口


    当您将服务暴露为 NodePort 服务时，每个集群节点都会在自身节点上打开一个端口（因此得名），并将该端口接收到的流量重定向到相应的服务。该服务不仅可以通过内部集群
    IP 和端口访问，还可以通过所有节点或虚拟机上的专用端口访问。


