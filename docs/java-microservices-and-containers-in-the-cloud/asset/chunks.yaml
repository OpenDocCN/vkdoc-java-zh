    The cluster in Amazon EKS can be configured in Terraform with the resource name
    `aws_eks_cluster`. See Listing [15-6](#619782_1_En_15_Chapter.xhtml#PC6).


    ```

    resource "aws_iam_role" "demo-cluster" {

    name = "terraform-eks-demo-cluster"

    assume_role_policy = <<POLICY

    {

    "Version": "2012-10-17",

    "Statement": [

    {

    "Effect": "Allow",

    "Principal": {

    "Service": "eks.amazonaws.com"

    },

    "Action": "sts:AssumeRole"

    }

    ]

    }

    POLICY

    }

    resource "aws_iam_role_policy_attachment" "demo-cluster-AmazonEKSClusterPolicy"
    {

    policy_arn = "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"

    role       = aws_iam_role.demo-cluster.name

    }

    resource "aws_iam_role_policy_attachment" "demo-cluster-AmazonEKSVPCResourceController"
    {

    policy_arn = "arn:aws:iam::aws:policy/AmazonEKSVPCResourceController"

    role       = aws_iam_role.demo-cluster.name

    }

    resource "aws_security_group" "demo-cluster" {

    name        = "terraform-eks-demo-cluster"

    description = "Cluster communication with worker nodes"

    vpc_id      = aws_vpc.demo.id

    egress {

    from_port   = 0

    to_port     = 0

    protocol    = "-1"

    cidr_blocks = ["0.0.0.0/0"]

    }

    tags = {

    Name = "terraform-eks-demo"

    }

    }

    resource "aws_security_group_rule" "demo-cluster-ingress-workstation-https" {

    cidr_blocks       = [local.workstation-external-cidr]

    description       = "Allow workstation to communicate with cluster API Server"

    from_port         = 443

    protocol          = "tcp"

    security_group_id = aws_security_group.demo-cluster.id

    to_port           = 443

    type              = "ingress"

    }

    resource "aws_eks_cluster" "demo" {

    name     = var.cluster-name

    role_arn = aws_iam_role.demo-cluster.arn

    vpc_config {

    security_group_ids = [aws_security_group.demo-cluster.id]

    subnet_ids         = aws_subnet.demo[*].id

    }

    depends_on = [

    aws_iam_role_policy_attachment.demo-cluster-AmazonEKSClusterPolicy,

    aws_iam_role_policy_attachment.demo-cluster-AmazonEKSVPCResourceController,

    ]

    }

    Listing 15-6

    Terraform EKS Cluster Configuration (ch15/ch15-01/eks-cluster.tf)

    ```


    The security group of worker nodes and the security group that handles the communication
    of the worker nodes with the control plane have been constructed in a way to avoid
    communication via the privileged ports in the worker nodes.


    You need a few operator-managed resources beforehand so that Kubernetes can properly
    manage other AWS services and allow inbound networking communication from your
    local workstation (if desired) and worker nodes.


    `aws_iam_role` and `aws_iam_role_policy_attachment` are required to allow the
    EKS service to manage or retrieve data from other AWS services.


    `aws_security_group` controls networking access to the Kubernetes masters. You
    then configure this with an `ingress` rule to allow traffic from the worker nodes.
    In both `egress` and `ingress`, you specify the protocol. Here, the IP protocol
    name (`tcp`, `udp`, `icmp`) or number for the protocol can be used. When you specify
    -`1` in the `egress`, or when you specify a protocol number other than `tcp`,
    `udp`, `icmp`, or `58` (ICMPv6), traffic on all ports is allowed, regardless of
    any ports you specify. For `tcp`, `udp`, and `icmp`, you must specify a port range.
    For protocol `58` (ICMPv6), you can optionally specify a port range. If you don’t
    specify anything, traffic of all types and codes is allowed.


    `aws_security_group_rule` allows the worker nodes networking access to the EKS
    master cluster.


    Next is the worker nodes configuration. AWS EKS does not currently provide managed
    resources for running worker nodes. Hence, you need to create a few operator-managed
    resources so that Kubernetes can properly manage other AWS services, networking
    access, and so on.


    ```

    resource "aws_iam_role" "demo-node" {

    name = "terraform-eks-demo-node"

    assume_role_policy = <<POLICY

    {

    "Version": "2012-10-17",

    "Statement": [

    {

    "Effect": "Allow",

    "Principal": {

    "Service": "ec2.amazonaws.com"

    },

    "Action": "sts:AssumeRole"

    }

    ]

    }

    POLICY

    }

    resource "aws_iam_role_policy_attachment" "demo-node-AmazonEKSWorkerNodePolicy"
    {

    policy_arn = "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"

    role       = aws_iam_role.demo-node.name

    }

    resource "aws_iam_role_policy_attachment" "demo-node-AmazonEKS_CNI_Policy" {

    policy_arn = "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"

    role       = aws_iam_role.demo-node.name

    }

    resource "aws_iam_role_policy_attachment" "demo-node-AmazonEC2ContainerRegistryReadOnly"
    {

    policy_arn = "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"

    role       = aws_iam_role.demo-node.name

    }

    resource "aws_eks_node_group" "demo" {

    cluster_name    = aws_eks_cluster.demo.name

    node_group_name = "demo"

    node_role_arn   = aws_iam_role.demo-node.arn

    subnet_ids      = aws_subnet.demo[*].id

    scaling_config {

    desired_size = 1

    max_size     = 1

    min_size     = 1

    }

    depends_on = [

    aws_iam_role_policy_attachment.demo-node-AmazonEKSWorkerNodePolicy,

    aws_iam_role_policy_attachment.demo-node-AmazonEKS_CNI_Policy,

    aws_iam_role_policy_attachment.demo-node-AmazonEC2ContainerRegistryReadOnly,

    ]

    }

    Listing 15-7

    Terraform EKS Worker Configuration (ch15/ch15-01/eks-worker-nodes.tf)

    ```


    As stated earlier, you are running with a minimal number in the scaling configuration
    even though in production deployments you may want to have three or more nodes
    for high availability. The `aws_eks_node_group` resource will manages an EKS node
    group, which can provision and optionally update an auto-scaling group of Kubernetes
    worker nodes compatible with EKS.


    The `aws_iam_role` and policy will allow the worker nodes to manage or retrieve
    data from other AWS services. It is used by Kubernetes to allow worker nodes to
    join the cluster.


    ### Setups Required to Operate an EKS Cluster


    There are a few setups that come in handy when managing and operating an EKS.
    I list them here. You may also refer to Appendix F to see a few of these setups
    in detail.


    You are advised to do the following:


    1.  Install AWS CLI.


    2.  Install AWS IAM Authenticator.


    3.  Configure `kunectl` for EKS.


    4.  Join the worker nodes to the Kubernetes cluster.


    Start by completing the first two steps. Subsequently you may complete the next
    subsection titled “Build and Spin Your EKS Cluster in AWS,” and once the EKS cluster
    is formed, you can execute the last two steps.'
