    Product Web 微服务的 Kafka 配置 (ch06\ch06-01\02-ProductWeb\src\main\java\com\acme\ecom\product\KafkaConfig.java)

    ```


    这段代码配置了 `CompletableFutureReplyingKafkaTemplate`，指定将 `Products` 作为请求发送，并期望将 `Products`
    作为响应返回。

