    \n## 在 AWS EKS 中部署容器\n\n本示例使用了您在本书中见过的、来自 `ch01/ch01-01/` 的一个相对简单的微服务。我假设您已经执行了第\
    \ 7 章中清单 7-41 到 7-43 所需的命令，并且您已经在公共 Docker Hub 中拥有了 `binildas/product-web` 镜像。\n\
    \n您将使用 Docker Hub 中的这个镜像，并将其部署到 AWS EKS。\n\n注意\n\n本示例假设 `kubectl` 已为 EKS 集群配置完毕。\n\
    \n您可能已经注意到，`product-deployment.yaml` 和 `product-service.yaml` 文件已经位于 EKS terraform\
    \ 项目的根文件夹 `ch15/ch15-01/` 中。它们分别显示在清单 15-12 和 15-13 中。\n\n```\napiVersion: v1\n\
    kind: Service\nmetadata:\nname: product-service-loadbalancer\nspec:\ntype: LoadBalancer\n\
    selector:\napp: product\nports:\n- protocol: TCP\nport: 8080\ntargetPort: 8080\n\
    清单 15-13\n产品 Web 微服务服务描述 (ch15/ch15-01/product-service.yaml)\n```\n\n```\napiVersion:\
    \ apps/v1\nkind: Deployment\nmetadata:\nname: product-deployment\nlabels:\napp:\
    \ product\nspec:\nreplicas: 1\nselector:\nmatchLabels:\napp: product\ntemplate:\n\
    metadata:\nlabels:\napp: product\nspec:\ncontainers:\n- name: product\nimage:\
    \ binildas/product-web\nports:\n- containerPort: 8080\n清单 15-12\n产品 Web 微服务部署描述\
    \ (ch15/ch15-01/product-deployment.yaml)\n```\n\n现在，您可以部署指定的微服务，如清单 15-14 所示。\n\
    \n```\n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l 'app=nginx' -o\
    \ wide | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNo resources found in\
    \ default namespace.\n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l\
    \ 'app=product' -o wide | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNo resources\
    \ found in default namespace.\n(base) binildass-MBP:ch15-01 binil$ kubectl apply\
    \ -f product-deployment.yaml\ndeployment.apps/product-deployment created\n(base)\
    \ binildass-MBP:ch15-01 binil$ kubectl get pods -l 'app=product' -o wide | awk\
    \ {'print $1\" \" $3 \" \" $6'} | column -t\nNAME                            \
    \    STATUS             IP\nproduct-deployment-84b9777c5-9kpz8  ContainerCreating\
    \  \n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l 'app=product' -o\
    \ wide | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNAME                 \
    \               STATUS   IP\nproduct-deployment-84b9777c5-9kpz8  Running  10.0.0.180\n\
    (base) binildass-MBP:ch15-01 binil$\n清单 15-14\n将产品 Web 微服务镜像部署到 EKS (ch15/ch15-01/product-deployment.yaml)\n\
    ```\n\n如清单 15-14 所示，您首先确认新创建的 EKS 集群中没有有效的部署，然后部署新的容器。部署就绪后，您可以部署服务定义。参见清单 15-15。\n\
    \n```\n(base) binildass-MBP:ch15-01 binil$ kubectl get svc\nNAME         TYPE\
    \        CLUSTER-IP   EXTERNAL-IP   PORT(S)   AGE\nkubernetes   ClusterIP   172.20.0.1\
    \           443/TCP   11m\n(base) binildass-MBP:ch15-01 binil$ kubectl create\
    \ -f product-service.yaml\nservice/product-service-loadbalancer created\n(base)\
    \ binildass-MBP:ch15-01 binil$ kubectl get svc\nNAME                         \
    \  TYPE           CLUSTER-IP      EXTERNAL-IP           PORT(S)          AGE\n\
    kubernetes                     ClusterIP      172.20.0.1                     \
    \ 443/TCP          12m\nproduct-service-loadbalancer   LoadBalancer   172.20.15.199\
    \   a2473f05176a6444bb676cf3927fd363-1434093128.ap-southeast-1.elb.amazonaws.com\
    \         8080:32087/TCP   49s\n(base) binildass-MBP:ch15-01 binil$\n清单 15-15\n\
    在 EKS 中暴露产品 Web 微服务 (ch15/ch15-01/product-service.yaml)\n```\n\n一切就绪后，您就可以测试示例了。您还可以使用适当的\
    \ URL 格式查看 EKS 控制台，在我的例子中如下所示：\n\n```\nhttps://ap-southeast-1.console.aws.amazon.com/eks/home?region=ap-southeast-1#/clusters\n\
    ```\n\n### 在 EKS 中测试微服务\n\n一旦微服务在 AWS 云的 EKS 集群中启动并运行，您就可以通过浏览器访问 Web 应用程序。指向应用程序\
    \ URL，您可以从 AWS UI 控制台确定该 URL。\n\n您可以在浏览器中使用清单 15-16 中的 URL 测试微服务。\n\n```\nhttp://a2473f05176a6444bb676cf3927fd363-1434093128.ap-southeast-1.elb.amazonaws.com:8080/product.html\n\
    清单 15-16\n使用浏览器测试 EKS 中的服务\n```\n\n您也可以使用 cURL 测试该服务，如清单 15-17 所示。\n\n```\n(base)\
    \ binildass-MBP:ch15-01 binil$ curl -silent http://a2473f05176a6444bb676cf3927fd363-1434093128.ap-southeast-1.elb.amazonaws.com:8080/product.html\
    \ | grep title\nBootstrap CRUD Data Table for Database with Modal Form\n.table-title\
    \ {\n.table-title h2 {\n.table-title .btn-group {\n.table-title .btn {\n.table-title\
    \ .btn i {\n.table-title .btn span {\n.modal .modal-title {\n\ndata-toggle=\"\
    tooltip\" title=\"Edit\">&#xE254; &#xE872;\nProduct Details\n\nDelete Product\n\
    (base) binildass-MBP:ch15-01 binil$\n清单 15-17\n使用 cURL 测试 EKS 中的服务\n```\n\n注意\n\
    \n测试完成后，请不要忘记释放 AWS 资源，因为未释放的资源可能会耗尽您的信用卡额度！\n\n测试完成后，您可以使用 `terraform destroy`\
    \ 命令销毁云基础设施，如清单 15-18 所示。\n\n```\n(base) binildass-MacBook-Pro:ch15-01 binil$\
    \ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch15/ch15-01\n(base)\
    \ binildass-MacBook-Pro:ch15-01 binil$ terraform destroy\n...\n清单 15-18\n释放 AWS\
