    代码清单 3-27

    产品业务服务 (ch03\ch03-03\02-ProductWeb\src\main\java\com\acme\ecom\product\service\
    ProductBusinessService.java)

    ```


    `@Service` 用于注解服务层的类，这些类是 `@Component` 的特殊情况。你可以用 `@Service` 标记 Bean，以表明它们承载着业务逻辑。产品业务服务中的典型实现模式如代码清单
    3-27 所示。你可以看到，调用被定向到 Product Server 微服务中的相应方法。


    现在，你已经来到了 GraphQL 实现部分。GraphQL 应该有一个描述 API 的模式。你需要将这些 `.graphqls` 或 `.gqls` 模式文件放在
    `src/main/resources/graphql/**` 位置下，这样 Spring Boot 就能自动拾取它们。参见代码清单 3-28。


    ```

    type Product {

    productId: ID!

    name: String!

    code: String!

    title: String!

    price: Float!

    productCategory: ProductCategory!

    }

    type ProductCategory {

    id: ID!

    name: String!

    title: String!

    description: String!

    imgUrl: String!

    products: [Product]!

    }

    # The Root Query for the application

    type Query {

    products(count: Int, offset: Int): [Product]!

    }

    # The Root Mutation for the application

    type Mutation {

    writeProduct(name: String!, code: String!, title: String!, price: Float!, category:
    String!) : Product!

    }

    代码清单 3-28

    产品 GraphQL 模式 (ch03\ch03-03\02-ProductWeb\src\main\resources\graphql\schema.graphqls)

    ```


    这个模式由类型定义组成。每个类型都有一个或多个字段，每个字段接受零个或多个参数并返回一个特定类型。某些名称末尾的 `!` 表示它们是**非空类型**。该图展示了这些字段相互嵌套的方式。


    代码清单 3-28 中的 GraphQL 模式是针对 Product 定义的，描述了一个产品、一个产品类别，以及一个用于获取最近添加产品的根查询。必须恰好有一个根查询，并且最多有一个根变更。根查询需要在
    Spring 上下文中定义特殊的 Bean 来处理该根查询中的各个字段。


    接下来，你需要解析根查询。如前所述，它需要有特殊注解的方法来处理各个字段。你可以通过使用 `@QueryMapping` 注解来注解处理程序方法，然后将它们放置在应用中的标准
    `@Controller` 组件内来实现这一点。这会将注解过的类注册为 GraphQL 应用中的数据获取组件，如代码清单 3-29 所示。

