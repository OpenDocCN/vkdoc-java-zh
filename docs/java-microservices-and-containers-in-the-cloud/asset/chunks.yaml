    ```


    This section explains the Docker Run command for PostgreSQL server alone, since
    the rest of the commands have been explained.


    ```

    docker run -d --net=ecom-network --name postgres-docker -e POSTGRES_DB=productdb
    -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgre -p 5432:5432 -d postgres:9.6-alpine

    ```


    Here is what this does:


    - This first line pulls the Postgres Docker image from Docker Hub.

    - It then sets `POSTGRES_DB`, which is an optional environment variable used to
    define a different name for the default database that is created when the image
    starts. If it is not specified, the value of `POSTGRES_USER` will be used.

    - It then sets the `POSTGRES_USER`, which is an optional environment variable
    used in conjunction with `POSTGRES_PASSWORD` to set a user and its password. This
    variable will create the specified user with superuser power and a database with
    the same name (which I have overridden). If it is not specified, the default user
    of `postgres` will be used.

    - It then sets the `POSTGRES_PASSWORD`, which is an environment variable required
    for you to use the PostgreSQL image. It must not be empty or undefined. This environment
    variable sets the superuser password for PostgreSQL. The default superuser is
    defined by the `POSTGRES_USER` environment variable.

    - It then names (`--name`) the Docker container to be `postgres-docker`.

    - It maps the container’s internal `5432` port to external `5432` port, so you’ll
    be able to enter it from outside.

    - It then enables to run the Docker container in the background (`-d`).


    If you want to enter into the database using a GUI application (like pgAdmin,
    psql, or so), you should now be able to do so.


