    As shown in Figure [1-20](#619782_1_En_1_Chapter.xhtml#Fig20), without changing
    the product ID, make some valid changes to some of the fields—price in this example.
    Clicking the Submit button to have the changes take effect. See Figure [1-21](#619782_1_En_1_Chapter.xhtml#Fig21).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig21_HTML.jpg)


    A screenshot of a web page displays a bootstrap C R U D data table for managing
    products. The table includes columns for I D, name, code, title, price, and actions.
    Users can add new products, edit existing ones, or delete them. It lists kamsung
    D 3, lokia pomia, and mapple k phone under the name.


    Figure 1-21


    Listing the updated product


    The changes made to the product are listed in the refreshed screen, as shown in
    Figure [1-21](#619782_1_En_1_Chapter.xhtml#Fig21).


    Last but not the least, you might also want to test the Delete functionality,
    which you can do by clicking the Delete icon on the far right side of each product
    and then confirming your action. See Figure [1-22](#619782_1_En_1_Chapter.xhtml#Fig22).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig22_HTML.jpg)


    A screenshot of a confirmation dialog box that asks the user if they are sure
    they want to delete a product. The cancel and delete buttons are at the bottom
    right.


    Figure 1-22


    Confirming Delete


    ### Test the Microservice Using cURL


    You may also want to use cURL or Postman to test all the methods implemented in
    the microservice. Refer to Appendix A for detailed instructions.


    ## Summary


    In this chapter, I purposefully tried to avoid defining microservices, since many
    definitions and viewpoints exist in the industry. Instead, I attempted to look
    at microservices from some less common perspectives with a view to understand
    how they fit into the bigger computing paradigm. This chapter also considered
    how the distinguishing features help provide superior capabilities in executing
    business transactions. I also attempted to show, with examples, what a hexagonal
    architecture is. I continue this discussion in the next two chapters, with more
    examples, so that you can clearly appreciate the design structure and qualities
    your microservices will have if you adopt the principles of a hexagonal architecture.


    Footnotes [1](#619782_1_En_1_Chapter.xhtml#Fn1_source)   [2](#619782_1_En_1_Chapter.xhtml#Fn2_source)


    # 2. More Hands-on Microservices


    You coded your first and simplest microservice in the last chapter. That example
    used a simple data structure as an in-memory database. This chapter extends that
    example by creating a few more microservices, each one in increasing order of
    complexity. This will enable you to build on your prior learnings. You will interact
    with a few real databases and firm up your knowledge of the ports and adapters
    architecture introduced in Chapter [1](#619782_1_En_1_Chapter.xhtml).


    This chapter is fully hands-on, but the examples are still simple, so you don’t
    have to understand complex business or entity relationships. Instead, the examples
    emphasize on learning technologies and architecture variations.


    This chapter covers the following concepts, each with running examples:


    *   First, you will enhance the microservice example from the previous chapter
    to interact with a MongoDB.


    *   I introduce the Spring Cloud next.


    *   I move on to a discussion of HAL and HATEOAS.


    *   As a final example, you will implement a HATEOAS-based microservice using
    Spring Boot.


    ## Microservices Using MongoDB and RestTemplate


    As mentioned, you will enhance the microservice you created in the last chapter.
    You will have two microservices—a consumer and a provider microservice—communicating
    each other using the REST protocol. The provider microservice also interacts with
    a NoSQL database, MongoDB.'
