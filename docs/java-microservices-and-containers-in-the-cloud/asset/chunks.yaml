- fmt: "## Automating Kubernetes Deployment\n\nHaving seen the different build automations\
    \ for Docker, you automate the Kubernetes deployment in this example. In fact,\
    \ you have been using automation for Kubernetes deployment in many of the examples\
    \ in the previous chapters, especially in Chapters [10](#619782_1_En_10_Chapter.xhtml)\
    \ and [11](#619782_1_En_11_Chapter.xhtml). Therefore, I do not explain every detail\
    \ again; instead just explaining how to build and run the code. The Spotify Maven\
    \ plugin is used for the automation, the details of which you learned in the second\
    \ example in this chapter.\n\n### Code Organization\n\nThe source code for this\
    \ book is available on GitHub via the book’s product page, located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).\
    \ The source code for this example is organized as shown in Listing [12-21](#619782_1_En_12_Chapter.xhtml#PC22),\
    \ inside the `ch12\\ch12-04` folder.\n\n```\n./ch12-04/\n├── Dockerfile\n├── README.txt\n\
    ├── clean.sh\n├── k8s\n│   ├── deployment.yml\n│   └── service.yml\n├── make.sh\n\
    ├── pom.xml\n├── run.sh\n└── src\n└── main\n├── java\n│   └── com\n│       └──\
    \ acme\n│           └── ecom\n│               └── product\n│                 \
    \  └── Application.java\n└── resources\n├── application.yml\n└── log4j2-spring.xml\n\
    Listing 12-21\nSpring Boot Microservices Source Code Organization\n```\n\nThis\
    \ follows the standard Maven structure so that the `pom.xml` file is in the root\
    \ directory.\n\nIn Chapters [10](#619782_1_En_10_Chapter.xhtml) and [11](#619782_1_En_11_Chapter.xhtml),\
    \ you learned about the Kubernetes deployment descriptors, so I do not explain\
    \ them here. Instead, you’ll build and run the example.\n\n### Build and Run the\
    \ Microservice\n\nThe `ch12\\ch12-04` folder contains the Maven scripts required\
    \ to build and run these examples. The `mvn clean package dockerfile:build` command\
    \ is used to build the example, as shown in Listing [12-22](#619782_1_En_12_Chapter.xhtml#PC23).\n\
    \n```\n(base) binildass-MacBook-Pro:ch12-04 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-04\n\
    (base) binildass-MacBook-Pro:ch12-04 binil$ eval $(minikube docker-env)clear\n\
    (base) binildass-MacBook-Pro:ch12-04 binil$ sh make.sh\n[INFO] Scanning for projects...\n\
    [INFO]\n...\nListing 12-22\nBuilding the Microservice Using Scripts\n```\n\nYou\
    \ can run the microservice as the next step. The single script called `run.sh`\
    \ consolidates all the commands, as shown in Listing [12-23](#619782_1_En_12_Chapter.xhtml#PC24).\n\
    \n```\neval $(minikube docker-env)\nkubectl create -f ./k8s/deployment.yml\nkubectl\
    \ create -f ./k8s/service.yml\nminikube service springboothelm --url\nsleep 3\n\
    kubectl get pods\nkubectl get services\nListing 12-23\nScript for Running the\
    \ Microservice Containers (ch12/ch12-04/run.sh)\n```\n\nYou can now execute this\
    \ script, as shown in Listing [12-24](#619782_1_En_12_Chapter.xhtml#PC25).\n\n\
    ```\n(base) binildass-MacBook-Pro:ch12-04 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-04\n\
    (base) binildass-MacBook-Pro:ch12-04 binil$ eval $(minikube docker-env)clear\n\
    (base) binildass-MacBook-Pro:ch12-04 binil$ sh run.sh\ndeployment.apps/springboothelm\
    \ created\nservice/springboothelm created\nhttp://192.168.64.6:30048\n...\nListing\
    \ 12-24\nRunning the Microservice Containers Using Scripts\n```\n\nOnce the services\
    \ are up and running, you can test the example.\n\n### Testing the Microservice\n\
    \nYou need to find the Minikube IP first, as shown in Listing [12-16](#619782_1_En_12_Chapter.xhtml#PC17).\
    \ You can then access the web application by using your browser and pointing to\
    \ this URL:\n\n`http://192.168.64.6:8080/`\n\nYou can alternatively use cURL to\
    \ access the microservice, as shown in Listing [12-5](#619782_1_En_12_Chapter.xhtml#PC5).\n\
    \n## Helm\n\nIn the previous example and in many other examples in the previous\
    \ two chapters, you saw YAML files used for Kubernetes deployments. When the number\
    \ of microservices increases and when the number of deployment environments increases,\
    \ you have to deal with many YAML files. For example, my current organization\
    \ sells SaaS services for airline passenger reservation services and airline cargo\
    \ reservation services, along with other services. We need to have a core product\
    \ that can operate at Level 4 SaaS maturity, which means the same instance should\
    \ functionally adapt to the requirements of multiple airlines (called tenants).\
    \ At the same time, these products need to be deployed in multiple environments,\
    \ like Development, Testing, Staging, and so on. Helm is a handy tool that maintains\
    \ a single deployment YAML file with version information. This file lets you set\
    \ up and manage a very large Kubernetes cluster with a few commands.\n\n### What\
    \ Is Helm?\n\nHelm is a package manager for Kubernetes. It helps in installing,\
    \ upgrading, uninstalling, and rolling back workloads in a Kubernetes cluster.\
    \ Like `yum` and `apt`, which are popular package managers for Linux distributions,\
    \ Helm treats the deployments as applications being installed on a Kubernetes\
    \ platform.\n\nHelm needs you to store your Kubernetes manifest files in a specific\
    \ folder structure. This folder structure is treated as one package. Helm packages\
    \ are called *charts*. Helm charts can be nested to help install multiple applications\
    \ using a single hierarchical folder structure. For convenience in managing the\
    \ chart as well as several versions of the same Helm chart, these folders can\
    \ also be archived and stored in a repository.\n\n### Helm Nomenclature\n\nHelm\
    \ uses three main concepts that you need to be familiar with:\n\n*   Chart: As\
    \ explained, a chart contains all that is required for a Kubernetes deployment\
    \ along with a few Helm-specific files in a certain folder structure. This includes\
    \ all the YAML configuration files for deployments, services, secrets, and config\
    \ maps that define the deployed state of your application.\n\n*   Config: This\
    \ includes one or more YAML files that have the required configuration information\
    \ for deploying a Kubernetes application. Resources in the Kubernetes cluster\
    \ are deployed based on these values.\n\n*   Release: A running instance of a\
    \ chart is called a release. When you run the `helm install` command, it pulls\
    \ the config, merges with the chart files, and deploys all the Kubernetes resources.\
    \ One chart can have multiple releases.\n\nWith these basic constructs under your\
    \ belt, the next section looks at the Helm architecture.\n\n### Client-Server\
    \ Helm Architecture\n\nHelm Kubernetes has two main components—the client (CLI)\
    \ and the server (Tiller). Helm works on a client-server model, as shown in Figure\
    \ [12-2](#619782_1_En_12_Chapter.xhtml#Fig2).\n\n![](images/619782_1_En_12_Chapter/619782_1_En_12_Fig2_HTML.jpg)\n\
    \nA helm architecture has the following components. User. Helm client. Kubernetes\
    \ Cluster.\n\nFigure 12-2\n\nHelm architecture\n\nThis section investigates the\
    \ two main components of the Helm architecture:\n\n*   Tiller: Tiller is a server\
    \ installed in the Kubernetes cluster and Helm manages Kubernetes applications\
    \ through this component. Tiller interacts with the Kubernetes API server for\
    \ application release operations—install, upgrade, query, and remove Kubernetes\
    \ resources. For quick development purposes, it can also be run locally and configured\
    \ to talk to a remote Kubernetes cluster.\n\n*   Client (CLI): Similar to any\
    \ client-server model, the Helm client lives on the local workstation of the user\
    \ and the Tiller server on the Kubernetes cluster to execute what is needed. You\
    \ can think of CLI as used to push the resources you need. Tiller runs inside\
    \ the Kubernetes cluster and manages (creating/updating/deleting) the resources\
    \ of the Helm charts.\n\n    **Note** Subsequent to Helm 2 (Helm v2.16.7), the\
    \ Tiller server is deprecated. However, that does not affect the examples in this\
    \ book.\n\nWith this background, the next section explains how Helm works."
