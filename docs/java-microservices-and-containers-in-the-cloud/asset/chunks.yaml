  trans: "\n## 自动化 Kubernetes 部署\n\n在了解了 Docker 的不同构建自动化方式后，本示例中你将自动化 Kubernetes 的部署。事实上，在前几章的许多示例中，你已经使用了\
    \ Kubernetes 部署的自动化，特别是在第 10 章和第 11 章中。因此，我不再逐一解释每个细节，而是仅说明如何构建和运行代码。自动化使用了 Spotify\
    \ Maven 插件，你已在本章的第二个示例中了解了其详细信息。\n\n### 代码组织\n\n本书的源代码可通过图书产品页面上的 GitHub 获取，网址为\
    \ [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码组织如代码清单\
    \ 12-21 所示，位于 `ch12\\ch12-04` 文件夹内。\n\n```\n./ch12-04/\n├── Dockerfile\n├── README.txt\n\
    ├── clean.sh\n├── k8s\n│   ├── deployment.yml\n│   └── service.yml\n├── make.sh\n\
    ├── pom.xml\n├── run.sh\n└── src\n└── main\n├── java\n│   └── com\n│       └──\
    \ acme\n│           └── ecom\n│               └── product\n│                 \
    \  └── Application.java\n└── resources\n├── application.yml\n└── log4j2-spring.xml\n\
    代码清单 12-21\nSpring Boot 微服务源代码组织\n```\n\n这遵循标准的 Maven 结构，因此 `pom.xml` 文件位于根目录中。\n\
    \n在第 10 章和第 11 章中，你已经了解了 Kubernetes 部署描述符，因此这里不再赘述。相反，你将构建并运行该示例。\n\n### 构建并运行微服务\n\
    \n`ch12\\ch12-04` 文件夹包含构建和运行这些示例所需的 Maven 脚本。使用 `mvn clean package dockerfile:build`\
    \ 命令来构建示例，如代码清单 12-22 所示。\n\n```\n(base) binildass-MacBook-Pro:ch12-04 binil$\
