    [INFO] ---------------------------------------------------

    [INFO] BUILD SUCCESS

    [INFO] --------------------------------------------------

    [INFO] Total time:  02:07 min

    [INFO] Finished at: 2022-05-26T17:17:19Z

    [INFO] --------------------------------------------------

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-14

    Build and Package Web App Using Maven Container

    ```


    Here, `-v $(pwd)/ProductWeb:/DockerHostProductWeb` will mount the `/Users/binil/binil/code/mac/mybooks/docker-03/ch07/ch07-01/ProductWeb`
    path as `DockerHostProductWeb` for the container. `-w /DockerHostProductWeb` will
    set `DockerHostProductWeb` as the current working directory, and the Maven container
    executes the command. The command will create a directory called `target` in the
    location of your project (inside `/Users/binil/binil/code/mac/mybooks/docker-03/ch07/ch07-01/ProductWeb`
    in Minikube VM) and it should contain your build. Since you set the artifact ID
    to be `ProductWeb`, it should look something like Listing [7-15](#619782_1_En_7_Chapter.xhtml#PC16).


    ```

