    (base) binildass-MacBook-Pro:~ binil$

    代码清单 7-11

    运行 Maven 容器

    ```


    代码清单 7-11 创建了一个 Maven 容器并在其中运行了 `maven` 命令。参数 `--rm` 会在命令执行完毕后移除该容器。


    ### 创建 Maven 原型


    在本节中，你将创建一个类型为 `maven-``archetype-webapp` 的新 Web 应用程序项目 Product Web。请参见代码清单 7-12。


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run --rm -it -v $(pwd):/workfolder
    -w /workfolder maven mvn archetype:generate -DgroupId=com.acme.ecom.product -DartifactId=ProductWeb
    -DarchetypeArtifactId=maven-archetype-webapp -DinteractiveMode=false

    [INFO] Scanning for projects...

