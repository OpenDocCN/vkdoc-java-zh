- fmt: '### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for the example is organized inside the `ch10\ch10-01` folder.
    Much of the source code in this example is similar to `ch03\ch03-02`, which was
    explained in detail in Chapter [3](#619782_1_En_3_Chapter.xhtml), in the section
    titled “Microservices Using MongoDB and CrudRepository.” You also saw the Docker-based
    deployment of the topology in Figure [8-9](#619782_1_En_8_Chapter.xhtml#Fig9),
    in the section titled “Microservice and MongoDB Containers Using File Mount” in
    Chapter [8](#619782_1_En_8_Chapter.xhtml). The Docker Compose-based deployment
    of the topology was also shown in Figure [9-2](#619782_1_En_9_Chapter.xhtml#Fig2),
    in the section titled “Composing Microservice with MongoDB Containers” in Chapter
    [9](#619782_1_En_9_Chapter.xhtml). For those reasons, this section gets right
    into the Kubernetes-specific aspects.


    A summarized representation of the source code organization for the example inside
    the `ch10-01` folder is shown in Listing [10-5](#619782_1_En_10_Chapter.xhtml#PC6).


    ```

    ./ch10-01/

    ├── 01-ProductServer

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── 02-ProductWeb

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── Dockerfile

    ├── README.txt

    ├── clean.sh

    ├── makeandrun.sh

    ├── mongo-deployment.yml

    ├── mongo-service.yml

    ├── mongo-volume-claim.yml

    ├── mongo-volume.yml

    ├── pom.xml

    ├── product-server-deployment.yml

    ├── product-server-service.yml

    ├── product-web-deployment.yml

    └── product-web-service.yml

    Listing 10-5

    Example 10-01 Source Code Organization

    ```


    This `Dockerfile` is like the one from the section titled “Build Microservice
    Using Dockerfile” of Chapter [7](#619782_1_En_7_Chapter.xhtml), so I do not repeat
    the explanation here. There are a set of `.yml` files as well.


    Creating the Kubernetes resources is done by posting a JSON or YAML manifest to
    the Kubernetes’s REST endpoint. This helps to version-control these resource definitions.


    The first resource I investigate is a pod, which is a collocated group of containers.
    It represents the basic building block in Kubernetes. You always deploy and operate
    on a pod of containers. It’s very common for pods to contain only a single container,
    but if you think you have closely related containers, you may have more than one
    container in a pod. Sidecar containers are one such example, where a log and a
    data change watcher can be in the same pod of the main container.


    Subsequently, even though you can host a multi-tier application (such as `ProductWeb`
    and `ProductServer`) in a single pod, the recommended way is to use separate pods
    for each tier. The reason for that is simple—you can scale out tiers independently
    and distribute them across clusters. See Listing [10-6](#619782_1_En_10_Chapter.xhtml#PC7).


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: product-web

    labels:

    app: product-web

    group: frontend

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: product-web

    template:

    metadata:

    labels:

    app: product-web

    spec:

    containers:

    - name: product-web

    image: ecom/product-web

    ports:

    - containerPort: 8080

    imagePullPolicy: Never

    env:

    - name: acme.PRODUCT_SERVICE_URL

    value: http://product-server:8081/products

    Listing 10-6

    The Pod Definition YAML File for Product Web (ch10\ch10-01\product-web-deployment.yml)

    ```


    In the pod definition in Listing [10-6](#619782_1_En_10_Chapter.xhtml#PC7), the
    first line is a separator, and it is optional. If you’re trying to define multiple
    structures in a single file, the separator is required. The metadata contains
    the name, namespace, labels, and other information about the Kubernetes pod.


    Listing [10-6](#619782_1_En_10_Chapter.xhtml#PC7) shows the pod descriptor for
    the Product Web microservice. Here, `Spec` includes the actual description of
    the Kubernetes pod’s contents, such as the pod’s containers, number of replicas,
    the image, volumes, and other data.


    Note the `containerPort: 8080`. Even if you don’t assign a port, clients can still
    connect to the pod. If the app binds to `127.0.0.1`, it will effectively prevent
    traffic to the pod, whereas `0.0.0.0` allows traffic to the pod on all interfaces,
    even if the port isn’t listed in the pod spec explicitly. But if you define the
    ports explicitly, everyone using your cluster can quickly see which ports each
    pod exposes. Explicitly defining ports also allows you to assign a name to each
    port, which can be handy.


    The Product Web microservice is dependent on the appropriate value for an environment
    variable `acme.PRODUCT_SERVICE_URL`, whose value you set as the service URL for
    the dependent Product Server microservice, which you will see in Listing [10-9](#619782_1_En_10_Chapter.xhtml#PC10).


    In the same manner you created a pod, the easiest way to create a Kubernetes service
    is to post a JSON or YAML manifest to the Kubernetes’s REST endpoint, as shown
    by the Kubernetes service of the Product Web microservice in Listing [10-7](#619782_1_En_10_Chapter.xhtml#PC8).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: product-web

    spec:

    selector:

    app: product-web

    ports:

    - protocol: TCP

    port: 8080

    targetPort: 8080

    type: LoadBalancer

    Listing 10-7

    The Service Definition YAML File for Product Web (ch10\ch10-01\product-web-service.yml)

    ```


    In Listing [10-7](#619782_1_En_10_Chapter.xhtml#PC8), the service has a name,
    `product-web`. The `port` refers to which port this service will be available
    on and the `targetPort` is the container port to which the request will be forwarded,
    to avail the service. So, to summarize, you’re defining a service called `product-web`,
    which will accept requests on port `80` and route each request to port `8080`
    of one of the pods matching the `app=product-web` label selector. You can also
    see that a `LoadBalancer` is defined for easy access to the services.


    Listing [10-8](#619782_1_En_10_Chapter.xhtml#PC9) shows the pod description for
    the Product Server microservice.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: product-server

    labels:

    app: product-server

    group: backend

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: product-server

    template:

    metadata:

    labels:

    app: product-server

    spec:

    containers:

    - name: product-server

    image: ecom/product-server

    ports:

    - containerPort: 8081

    imagePullPolicy: Never

    env:

    - name: spring.data.mongodb.uri

    value: mongodb://mongo:27017/test

    Listing 10-8

    The Pod Definition YAML File for Product Server (ch10\ch10-01\product-server-deployment.yml)

    ```


    One notable aspect here is that the Product Server microservice is dependent on
    the appropriate value for an environment variable `spring.data.mongodb.uri`, whose
    value is set as the service URL for the dependent Mongo DB, which you will see
    in Listing [10-15](#619782_1_En_10_Chapter.xhtml#PC16).


    Listing [10-9](#619782_1_En_10_Chapter.xhtml#PC10) shows the service description
    for the Product Server microservice.


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: product-server

    spec:

    selector:

    app: product-server

    ports:

    - protocol: TCP

    port: 8081

    targetPort: 8081


    apiVersion: v1

    kind: Service

    metadata:

    name: product-server-nodeport

    spec:

    selector:

    app: product-server

    ports:

    - nodePort: 30002

    port: 8081

    targetPort: 8081

    type: NodePort

    Listing 10-9

    The Service Definition YAML File for Product Server (ch10\ch10-01\product-server-service.yml)

    ```'
