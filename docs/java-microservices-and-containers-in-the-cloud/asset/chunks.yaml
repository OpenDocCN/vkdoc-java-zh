    清单 12-46

    验证 Helm 安装

    ```


    希望您喜欢您的第一次 Helm 练习。在下一节中，您将使用 Helm 发布多微服务示例。


    ## 使用 Helm 打包多微服务


    在前面的章节中，您学习了 Helm 如何实现在 Kubernetes 中打包和部署微服务。然而，那个示例还不够复杂，不足以让您体会到 Helm 的真正优势。本节将向您展示如何使用
    Helm 来打包和部署您的多微服务项目。

