  trans: '

    ### 使用 Jib 将微服务容器化


    Jib 是谷歌维护的一款开源 Java 工具，用于构建基于 Java 的应用程序的 Docker 镜像。Jib 简化了容器化过程，因为使用它时，你无需编写
    Dockerfile（你将在下一节了解什么是 Dockerfile），而你在之前的示例中已经看到了这一点。此外，你甚至不需要安装 Docker 就能创建和发布
    Docker 镜像。谷歌将 Jib 作为 Maven 和 Gradle 插件发布——这里你使用的是 Maven。


    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
    `ch07\ch07-02` 文件夹内。本示例中的大部分源代码与 `ch01\ch01-01` 中的类似。本节不讨论微服务的代码，因为这部分内容已在第 1
    章中描述过，但本节会探讨部署方面的问题。每次构建时，Jib 都会捕获你对应用程序源代码所做的任何更改。这省去了你单独执行 Docker 构建/推送命令的步骤，并简化了将其添加到
    CI 流水线的过程，但我不对这些方面进行展开。你还需要在本地进行设置，以对你想要部署到的 Docker 仓库进行身份验证。这通过 Maven 的 `settings.xml`
    文件完成，如代码清单 7-22 所示。


    ```

    (base) binildass-MacBook-Pro:~ binil$ vi /Users/binil/.m2/settings.xml

    ...


    registry.hub.docker.com

    binildas

    ********


    ...

    (base) binildass-MacBook-Pro:~ binil$

    代码清单 7-22

    Maven 设置文件

    ```


    你可能已经猜到，我在 Docker Hub 公共仓库中创建了一个账户，并在代码清单 7-22 中配置了其凭据。此外，Maven 插件的配置如代码清单 7-23
    所示。


    ```


    com.google.cloud.tools

    jib-maven-plugin

    3.4.1


    代码清单 7-23

    Maven 模块配置 (ch07\ch07-02\pom.xml)

    ```


    Jib 会对你的需求做出许多合理的猜测，例如 `FROM` 和 `ENTRYPOINT`（你将在下一节了解这些内容）。Spring Boot 默认暴露 8080
    端口，但如果你希望应用程序在 8081 端口上运行，并使其可通过容器暴露，你可以通过配置 Jib 并在 Boot 中进行相应更改来实现。此外，你可以使用 Jib
    使其在镜像中可暴露。另外，默认情况下，Jib 使用精简版 Java 镜像。如果你希望在不同的基础镜像上运行应用程序，例如 `alpine-java`，你可以以类似的方式进行配置。本节不深入探讨这些选项，仅展示
    Docker Hub 的配置，如代码清单 7-24 所示。


    ```


    org.springframework.boot


    spring-boot-maven-plugin


    com.google.cloud.tools

    jib-maven-plugin

    3.2.0


    registry.hub.docker.com/binildas/product-web


    代码清单 7-24

    Maven 构建配置 (ch07\ch07-02\02-ProductWeb\pom.xml)

    ```


    ### 构建镜像并推送到 Docker Hub


    `ch07\ch07-02` 文件夹包含构建、容器化以及将镜像推送到 Docker Hub 所需的 Maven 脚本。


    使用 Jib 插件，你可以通过以下命令，利用本地 Docker 实例根据配置构建镜像：


    ```

    mvn compile jib:dockerBuild

    ```


    然而，你甚至可以在没有本地运行 Docker 的情况下构建镜像：


    ```

    mvn compile jib:build

    ```


    这如代码清单 7-25 所示。


    ```

