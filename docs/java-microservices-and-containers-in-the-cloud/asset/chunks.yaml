  trans: '

    ### 最终一致性，去中心化系统


    我已经发起了一场关于如何让微服务实现最终一致性的讨论。我还讨论了当更新库存数据库表成功，但预订微服务在预订数据库表中创建预订失败时的处理场景。现在考虑相反的场景——如果库存微服务没有运行，预订微服务无法完成预订，会发生什么？当从预订微服务到库存微服务的同步风格
    REST 调用无法完成时，就会出现这种场景，因此预订创建也会失败。


    图 1-6 展示了在图 1-5 所示架构基础上的改进，通过插入一个基于事件的通道来实现。


    ![](img/619782_1_En_1_Fig6_HTML.jpg)


    一幅去中心化架构的示意图，展示了服务粒度、工件打包和事件通道。它包含多个用于可用性、预订或库存控制的计算节点。数据存储在独立的数据库中。该系统连接到一个用于用户交互的移动应用。


    图 1-6


    去中心化微服务


    在这里，微服务之间并非紧密耦合。相反，你可以使用松散耦合的 JMS 或 AMQP 风格的消息传递协议。那么，航班预订业务事务的序列可能如下：


    1.  浏览器将用户事务发送到业务层服务器。


    2.  由于该事务是航班预订，因此被预订微服务拦截。在执行预订之前，预订模块向消息通道发送一条“航班已预订”消息。


    3.  预订微服务将在其数据库表中创建一条预订记录，并向最终用户提供响应。


    4.  “航班已预订”消息将被任何其他感兴趣的微服务（本例中为库存微服务）接收。


    5.  库存微服务更新库存数据库表，并可选地向消息通道发送成功或失败消息。


    通过将步骤 2 和步骤 3 保持在事务范围内，可以提高此业务事务的可靠性。尽管如此，设计中一个显著的变化是，业务事务跨越了多个微服务，并且事务的成功完成最终取决于这些不同微服务各自事务的整体完成情况。没有一个单一的微服务完全负责控制完整的端到端流程。相反，每个微服务执行自己的部分，从而使架构真正实现去中心化。


    请注意，此讨论假设存在足够的库存。可能存在更复杂的场景，例如库存有限，但这超出了本文的讨论范围。


    ## 服务粒度


    正确理解服务架构的不同粒度级别将有助于理解它们的可能性和局限性，因此本节将探讨这些服务粒度。


    ### 单体架构


    图 1-7 展示了一个典型的单体架构。在这种架构中，功能模块仅在逻辑上分离，但它们在物理上都打包到一个单一的 `.ear`（企业归档）文件中。


    ![](img/619782_1_En_1_Fig7_HTML.jpg)


    一个由四个进程组成的架构。可用性、结账、预订和库存控制，数据存储在独立的数据库中，体现了服务粒度和工件打包的概念。该系统连接到一个名为 central airline
    dot ear 的组件。


    图 1-7


    单体架构


    很多时候，单体架构与不同节点上的数据库通信，并且所有功能模块都紧密耦合到这个单一的数据库上。


    ### 宏服务架构


    图 1-8 所示的宏服务架构是对单体架构在打包方面的改进。


    ![](img/619782_1_En_1_Fig8_HTML.jpg)


    一个由 4 个进程组成的架构。可用性、结账、预订和库存控制，数据存储在独立的数据库中，体现了服务粒度和工件打包的概念，位于 airline macro services
    中。该系统连接到一个名为 central airline dot ear 的组件。


    图 1-8


    宏服务架构


    在宏服务架构中，不同的功能模块被打包到独立的 `.jar`（Java 归档）文件中。宏服务架构的部署模式与单体架构类似。所有 Java 归档文件都放置在一个单一的
    `.ear` 或 `.war`（Web 归档）文件中，然后部署在单个节点上。


    ### 迷你服务


    迷你服务架构是对单体或宏服务进行改进的一次真正尝试。图 1-9 描绘了一个迷你服务架构。


    ![](img/619782_1_En_1_Fig9_HTML.jpg)


    一个航空预订系统的示意图。它具有不同的组件，包括计算节点、服务粒度和工件打包。shopping dot war 中包含 availability jar 和
    checkout jar，booking dot war 中包含 booking jar 和 inventory jar。数据存储在独立的数据库中。


    图 1-9


    迷你服务架构


    如图 1-9 所示，迷你服务架构也会将模块打包到独立的归档文件中，类似于宏服务架构。此外，其中一些归档文件还可以被打包到独立的可部署归档文件中。然而，在许多情况下，由于依赖库、通信模式等架构约束，这些部署归档文件被部署在同一个节点上。


    ### 微服务


    微服务架构试图在开发、部署和发布方面提供完全的灵活性，如图 1-10 所示。


    ![](img/619782_1_En_1_Fig10_HTML.jpg)


    一个航空预订系统的示意图。它具有不同的组件，包括计算节点、服务粒度和工件打包。为可用性、结账、预订和库存分别设置了独立的数据库。每个数据库执行进程、服务和库存管理。


    图 1-10


    微服务架构


    微服务架构的一个显著优势是它促进了多语言技术的使用。这赋予了每个微服务采用自身实现技术和架构的灵活性，同时仍然使用标准协议与对等微服务进行交互和暴露接口。


    ## 六边形架构隐喻


    在学习松散耦合系统时，尤其是在微服务的背景下，讨论*六边形架构*是很有帮助的。我将在本节中进行讨论。


    为了理解这个隐喻，我从典型的层次架构开始讨论。


    ### 层次架构


    层次架构指的是为了分离关注点（主要是通信方面的关注点）而遵循的典型软件架构组织方式，如图 1-11 所示。


    ![](img/619782_1_En_1_Fig11_HTML.jpg)


    一个表示具有三个层次（最终用户、表示层、业务层和数据层）的层次架构的示意图。最终用户被描绘成一个与表示层交互的火柴人。表示层位于业务层之上，业务层又位于数据层之上。


    图 1-11


    层次架构


    在图 1-11 所示的层次架构中，顶层和底层仅仅是应用程序的入口/出口点。

