    code, title, and price. The current values for the product with ID 3 are displayed
    in the fields. There are buttons for cancel and submit at the bottom right.


    **Figure 1-18** Adding a new product


    Input some meaningful values for all the fields in the UI and click the **Submit**
    button, which will ask the microservice to create a new product in the in-memory
    DB. The newly added product will also be listed in the refreshed screen, as shown
    in Figure [1-19](#619782_1_En_1_Chapter.xhtml#Fig19).


    ![](images/619782_1_En_1_Chapter/619782_1_En_1_Fig19_HTML.jpg)


