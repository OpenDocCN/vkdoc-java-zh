    │   └── src

    │       └── ...

    ├── 02-ProductWeb

    │   ├── Dockerfile

    │   ├── pom.xml

    │   └── src

    │       └── ...

    ├── Dockerfile

    ├── README.txt

    ├── acme-postgres.yaml

    ├── acme-product-server.yaml

    ├── acme-product-web.yaml

    ├── adminer.yaml

    ├── app

    │   ├── Chart.yaml

    │   ├── charts

    │   ├── templates

    │   │   ├── deployment.yaml

    │   │   └── service.yaml

    │   └── values.yaml

    ├── clean.sh

    ├── ingress

    │   ├── Chart.lock

    │   ├── Chart.yaml

    │   ├── charts

    │   │   └── nginx-ingress-1.36.0.tgz

    │   ├── templates

    │   │   └── ingress.yaml

    │   └── values.yaml

    ├── ingress.yaml

    ├── make.sh

    ├── pom.xml

    ├── postgres

    │   ├── Chart.yaml

    │   ├── charts

    │   ├── templates

    │   │   ├── config.yaml

    │   │   ├── deployment.yaml

    │   │   ├── pcv.yaml

    │   │   └── service.yaml

    │   └── values.yaml

    └── run.sh

    Listing 12-49

    Example 12-06 Source Code Organization

    ```


    You can see that the number of YAML configuration files at the top level of the
    project root folder has been reduced. There are more subfolders and many new files
    inside them, but I promise, it’s not going to be too bad.


    ### Understanding the Source Code


    This section assumes that you have enabled Ingress in Minikube and added the required
    hostnames to your host files, as mentioned in the third example in Chapter [11](#619782_1_En_11_Chapter.xhtml).


    This example starts by creating the Helm charts one by one. In the process, you
    also see how charts common for more than one component can be useful. I assume
    that you have a project root folder called `ch12/ch12-06`, which currently has
    only the `README.txt` file in it. Rather, copy the chapter code from the book’s
    source code download and delete any files and folders not mentioned explicitly
    right now. Of course, after creating the charts, copy any other files required
    from the book’s code to your project root.'
