- fmt: '### DevOps


    `DevOps` is a methodology from the software development industry. Used as a set
    of practices and tools, `DevOps` is intended to integrate and automate the work
    of software development (`Dev`) and IT operations (`Ops`) as a means for improving
    and shortening the software development lifecycle. Microservices-based architecture
    is intended to increase delivery speed, and to enable releases of parts of an
    app independent of other parts. Microservices are smaller in size, which allows
    the architecture of an individual service to emerge through continuous refactoring.
    Shared repositories and artefacts, which are version controlled, are the essence
    of `DevOps` practices, and the roles of `Dev` and `Ops` personnel are converging
    into a single pipeline of stages. Each stage identifies the discrete steps of
    the `Dev` and `Ops` processes with a blurred boundary between the `Dev` and `Ops`.
    If you look at the typical stages in a release process, these concepts will become
    clearer. See Figure [13-1](#619782_1_En_13_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_13_Chapter/619782_1_En_13_Fig1_HTML.jpg)


    A flow diagram has the following flow, microservice dev team 1 to n, version control
    or branch management, build, package, and test under build pipeline and continuous
    integration, package with instructions, operations team, auto scripts, test environment,
    and acceptance and auto acceptance test under release pipeline and continuous
    delivery and deployment, and release to global.


    **Figure 13-1**


    ### CI and CD


    `CI/CD` stands for Continuous Integration and Continuous Delivery (or Continuous
    Deployment). This chapter investigates each component.


    ### Continuous Integration (CI)


    *Continuous Integration* defines how developers integrate code using a shared
    repository, multiple times a day with the help of automation. New code changes
    are regularly built, tested, and merged to a shared repository.


    ### Continuous Delivery (CD)


    *Continuous Delivery* is about automatically releasing software to the test or
    production environment. Continuous Delivery usually means a developer’s changes
    to an app are automatically bug tested and uploaded to a repository (like `GitHub`
    or a container registry like `Docker Hub`), where they can then be deployed to
    a live production environment by the operations team.


    ### Continuous Deployment (CD)


    *Continuous Deployment* is about releasing software to production automatically,
    without human intervention. It addresses the problem of overloading operations
    teams with manual processes of testing and pushing buttons, which slow down app
    delivery. Continuous Deployment builds over the benefits of Continuous Delivery
    by automating the next stage in the pipeline, as shown in Figure [13-1](#619782_1_En_13_Chapter.xhtml#Fig1).


    The following section investigates these aspects in the context of a tool, `Skaffold`.


    ## Google Skaffold


    `Skaffold` is an open-source command-line tool that facilitates developer productivity
    by orchestrating Continuous Development, Continuous Integration (CI), and Continuous
    Delivery (CD). It handles the workflow for building, pushing, and deploying your
    application and you can use it to easily configure a local development workspace.
    Due to how easy it is to set up, this chapter uses `Skaffold` to show a few of
    the aspects of `CI/CD` in the microservice example.


    ### Skaffold Workflow


    `Skaffold` provides a single, simple command that will simplify your development
    workflow by organizing common development stages. Here’s a typical workflow when
    you execute the `Skaffold dev` command:


    - Collects and watches your source code for changes.

    - Syncs files directly to pods if the user marks them as able to be synced.

    - Builds artifacts from the source.

    - Tests the built artifacts using `container-structure-tests` or custom scripts.

    - Tags the artifacts.

    - Pushes the artifacts.

    - Deploys the artifacts.

    - Monitors the deployed artifacts.

    - Cleans up the deployed artifacts on exit (`Ctrl+C`).


    `Skaffold` is flexible so that if you are coding on a local machine, you can configure
    it to build artifacts with your local `Docker` daemon and deploy them to `Minikube`
    using `kubectl`, which is what you will do next in the example. In production,
    you can switch to your production profile and start building with different profiles
    and then deploy with `Helm`.


    ## CI and CD Example for Microservices


    You will use `Skaffold` to enable `CI/CD` to the example in the previous chapter.
    This example assumes that `Skaffold` is already installed in your machine. On
    the Mac, you can install it using `brew`:


    ```

    brew skaffold

    ```


    This section starts by investigating the project structure.


    ### Code Organization


    The source code for this book is available on `GitHub` via the book’s product
    page, located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized as shown in Listing [13-1](#619782_1_En_13_Chapter.xhtml#PC2),
    inside the `ch13\ch13-01` folder.


    ```

    ./ch13-01/

    ├── README.txt

    ├── build.sh

    ├── clean.sh

    ├── k8s

    │   ├── deployment.yml

    │   └── service.yml

    ├── make.sh

    ├── pom.xml

    ├── run.sh

    ├── skaffold.yaml

    └── src

    └── main

    ├── java

    │   └── com

    │       └── acme

    │           └── ecom

    │               └── product

    │                   └── Application.java

    └── resources

    ├── application.yml

    └── log4j2-spring.xml

    9 directories, 12 files

    binildass-MacBook-Pro:ch13 binil$

    ```


    **Listing 13-1** Spring Boot Microservices Source Code Organization


    Since you are using Google `jib-maven-plugin` to automate the Docker image creation,
    `Docker` daemon does not have to be running on your local machine, nor do you
    need a `Docker` file for your Spring Boot application.'
