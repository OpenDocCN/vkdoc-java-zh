    that all HTTP requests in which the `adminer.acme.test` host is requested will
    be sent to the adminer service on port `8080`.


    ## State Management


    When you look at pods and deployments in detail, you know that Kubernetes pods
    are to be designed for scaling out, even elastically. There is a downside to scaling
    architectures.


    ### Scale Out vs. State Management


    Although it is desirable to have elastic scale out architectures, state management
    poses issues. If the components are to be truly stateless, they are to be like
    “tellers in a bank” in the sense that you are not served by the same teller (person)
    every time. Similarly, every subsequent transaction could be served by any other
    instance of the similar component. This means, except your client device and your
    persistent store, every other intermediate component must be stateless. You cannot
    avoid state in the client tier, since then you cannot do any personalization,
    which will inhibit user experience. Similarly, for non-trivial applications, some
    kind of state has to be managed and you would typically do that in some kind of
    database.


    ### StatefulSets


    To solve the issue of state management, a *StatefulSet* represents a set of pods
    that are unique, persistent, and have a stable pod name (see Figure [10-10](#619782_1_En_10_Chapter.xhtml#Fig10)).
    In the case of the non-stateful DeploymentSet, whenever you deploy a pod, upon
    every deployment or restart you will get a different pod name—something like `product-server-6fb88b6849-6mrf5`
    or `product-web-5dfc886d6d-zvm8p`. In such cases, the pod name will change when
    it restarts. And on the next restart, it could be anything, like `product-web-5dfc886d6d-4qw45`
    or `product-server-6fb88b6849-dwkcf`. If you want a stable pod name, a StatefulSet
    can be used. Then, even when the deployment restarts, you will get the same pod
    name (such as `mongo-cluster-0`).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig10_HTML.jpg)


    A diagram illustrates how a user interacts with a laptop, which sends requests
    to the persistence service. The service consists of multiple persistent pods that
    utilize persistent volume claims to access persistent volumes on underlying nodes.
    The P Vs are provisioned based on a storage class.


    Figure 10-10


    Kubernetes stateful sets'
