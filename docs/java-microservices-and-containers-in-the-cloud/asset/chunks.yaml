- fmt: '`stdin`、`stdout`和`ttys`是相关的概念，理解它们会对你有所帮助。`stdin`和`stdout`是进程的输入和输出流。伪终端（也称为`tty`或`pts`）将用户的“终端”与`stdin`和`stdout`流连接起来，通常（但不一定）通过`bash`等shell实现。这里的“终端”一词之所以加引号，是因为我们今天实际上不再使用传统意义上的终端。


    如清单[7-4](#619782_1_En_7_Chapter.xhtml#PC5)所示，当以交互模式运行进程时（例如启动`bash` shell），你通常会同时使用`-t`和`-i`选项。对于shell而言，你的目的是发出命令并读取输出。


    在Docker中，`-i`或`--interactive`（用于保持`STDIN`流打开，即使未连接）和`-t`或`-tty`（用于附加伪`tty`）开关通常一起使用，即`-it`，这将帮助你为容器中运行的进程分配一个伪`-tty`控制台。


    `-it`组合会在容器启动后将命令行附加到容器。这样，你就可以在shell控制台中查看正在运行的容器内部情况，并在需要时与容器进行交互。


    当执行清单[7-4](#619782_1_En_7_Chapter.xhtml#PC5)中的命令时，Docker会判断该镜像是否存在于你的本地机器上。如果不存在，则会从远程仓库拉取该镜像。Docker引擎使用该镜像，并在镜像层栈的顶部添加一个可写层。随后，它会初始化镜像的名称、ID以及资源限制（如CPU和内存）。在此阶段，Docker还会通过从IP池中查找并附加一个可用的IP地址来设置容器的IP地址。执行的最后一步是实际命令，该命令作为`docker
    run`命令的最后一个参数传入。参见清单[7-5](#619782_1_En_7_Chapter.xhtml#PC6)。


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run -it -p 8080:8080 tomcat

    Unable to find image ''tomcat:latest'' locally

    latest: Pulling from library/tomcat

    67e8aa6c8bbc: Pull complete

    627e6c1e1055: Pull complete

    0670968926f6: Pull complete

    5a8b0e20be4b: Pull complete

    7a93fb438607: Pull complete

    400f1e54bef0: Pull complete

    f0b65b53f1a4: Pull complete

    dc9d1a029c69: Pull complete

    42a9874765c5: Pull complete

    52140cf8a5cf: Pull complete

    Digest: sha256:fe703c02e16ea7d3e8d7bdf5a0c03957f2d4a313cfa9ae44878a3ad12e633ccf

    Status: Downloaded newer image for tomcat:latest

    Using CATALINA_BASE:   /usr/local/tomcat

    Using CATALINA_HOME:   /usr/local/tomcat

    Using CATALINA_TMPDIR: /usr/local/tomcat/temp

    Using JRE_HOME:        /usr/local/openjdk-11

    Using CLASSPATH:       /usr/local/tomcat/bin/bootstrap.jar:/usr/local/tomcat/bin/tomcat-juli.jar

    Using CATALINA_OPTS:

    ...

    26-May-2022 14:33:47.952 INFO [main] org.apache.catalina.startup.Catalina.start
    Server startup in [100] milliseconds

    Listing 7-5

    Tomcat Container Running

    ```


    清单[7-5](#619782_1_En_7_Chapter.xhtml#PC6)展示了一个正在运行的Tomcat容器。由于使用了`-it`选项，Docker会捕获并提供容器输出，该输出会显示在控制台中。当你运行此命令时，Docker会从托管在Docker
    Hub上的Tomcat公共仓库安装`tomcat:latest`并运行该软件。在Docker安装并启动Tomcat后，终端会写入一行看似随机的字符。这串字符是刚刚为运行Tomcat而创建的容器的唯一标识符。每次调用`docker
    run`命令并创建一个新容器时，这个新创建的容器都会获得一个类似的唯一标识符。


    现在，你可以再次列出Docker容器，如清单[7-6](#619782_1_En_7_Chapter.xhtml#PC7)所示。


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker ps

    CONTAINER ID  IMAGE   COMMAND  CREATED  STATUS  PORTS   NAMES

    5b621bcd9dd1  tomcat  "catalina.sh run"  About a minute ago   Up About a minute   0.0.0.0:8080->8080/tcp   priceless_chebyshev

    ...

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-6

    Listing Docker Containers

    ```


    你可以看到刚刚启动的Tomcat容器以及其他容器。要访问Tomcat，如附录E所述，你必须先获取`minikube`的IP地址。参见清单[7-7](#619782_1_En_7_Chapter.xhtml#PC8)。


    ```

    (base) binildass-MacBook-Pro:ch07-01 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:ch07-01 binil$

    Listing 7-7

    Finding Minikube IP

    ```


    现在，你可以使用`curl`命令访问Tomcat，如清单[7-8](#619782_1_En_7_Chapter.xhtml#PC9)所示。


    ```

    (base) binildass-MacBook-Pro:ch07-01 binil$ curl http://192.168.64.5:8080

    HTTP Status 404 – Not Found...

    (base) binildass-MacBook-Pro:ch07-01 binil$

    Listing 7-8

    Accessing Tomcat Container

    ```


    你也可以使用浏览器，如图[7-14](#619782_1_En_7_Chapter.xhtml#Fig14)所示。


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig14_HTML.jpg)


    一个网页浏览器窗口的截图，显示了一个404未找到错误消息。该消息以粗体文本显示。网址是192.168.64.5。浏览器不安全。


    Figure 7-14


    Accessing “No Web App” in a Tomcat container


    当你看到`404`错误时，可能会认为在安装Docker镜像时犯了错误。但这并非错误，出于Docker社区提出的安全考虑，它被设计成这样的行为。你可以在Docker
    Hub的Tomcat镜像官方文档中找到此安全信息。参见图[7-15](#619782_1_En_7_Chapter.xhtml#Fig15)。


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig15_HTML.jpg)


    一个网页截图，内容是关于如何使用Docker Tomcat镜像的说明。它解释了出于安全原因，Web应用程序默认未启用，并且位于镜像内的一个文件夹中，提供了如何运行Tomcat服务器并在浏览器中测试它的说明。


    Figure 7-15


    Docker Tomcat notice


    你可以使用清单[7-9](#619782_1_En_7_Chapter.xhtml#PC10)中的代码停止Tomcat容器。


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker stop 5b62

    5b62

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-9

    Stopping Tomcat Container

    ```


    请注意，`5b62`是清单[7-6](#619782_1_En_7_Chapter.xhtml#PC7)中容器ID的前四个字符。此容器在停止时，将保留所有设置和文件系统更改（在可写的顶层）。容器中运行的所有进程都将停止，并且你将丢失内存中的所有内容。如果你现在尝试使用`curl`命令访问Tomcat，将会得到清单[7-10](#619782_1_En_7_Chapter.xhtml#PC11)中所示的响应。


    ```

    (base) binildass-MacBook-Pro:~ binil$ curl http://192.168.64.5:8080

    curl: (7) Failed to connect to 192.168.64.5 port 8080: Connection refused

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-10

    Attempt to Access Tomcat Container

    ```


    ## Build and Run Java App without Java


    本节的目标是在没有Java SDK或Java运行时的开发机器上编译、打包、部署和运行一个Java应用程序。如何做到这一点？你可能已经猜到了，因为你正在学习使用Docker，对吧？使用Docker！'
  raw: 'The `stdin`, `stdout`, and `ttys` are related concepts and an understanding
    will help you. `stdin` and `stdout` are the input and output streams of a process.
    A pseudo-terminal (also known as a `tty` or a `pts`) connects a user’s “terminal”
    with the `stdin` and `stdout` stream, commonly (but not necessarily) through a
    shell such as `bash`. The word “terminal” is used in quotes since we really don’t
    use a terminal in the same sense today.


    As seen in Listing [7-4](#619782_1_En_7_Chapter.xhtml#PC5), you’ll often use `-t`
    and `-i` together when you run processes in interactive mode, such as when starting
    a bash shell. In the case of the shell, your intention is to issue commands and
    read the output.


    In Docker, the `-i` or `--interactive` (for keeping STDIN stream open, even if
    not attached) and `-t` or `-tty` (for attaching a pseudo-`tty`) switches are commonly
    used together as `-it`, which will help you allocate a pseudo `-tty` console for
    the process running in the container.


    The `-it` combination will attach the command line to the container after it starts.
    This way you can see what’s going on in the running container in your shell console
    and interact with the container, if needed.


    When the command in Listing [7-4](#619782_1_En_7_Chapter.xhtml#PC5) is executed,
    Docker will determine if the image is available on your local machine. If it’s
    not, the image will be pulled from the remote repository. The Docker engine uses
    the image and adds a writable layer on top of the image’s layers stack. Subsequently,
    it initializes the image’s name, ID, and resource limits, such as CPU and memory.
    In this phase, Docker will also set up the container’s IP address by finding and
    attaching an available IP address from an IP pool. The last step of the execution
    is the actual command, passed as the last parameter of the `docker run` command.
    See Listing [7-5](#619782_1_En_7_Chapter.xhtml#PC6).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run -it -p 8080:8080 tomcat

    Unable to find image ''tomcat:latest'' locally

    latest: Pulling from library/tomcat

    67e8aa6c8bbc: Pull complete

    627e6c1e1055: Pull complete

    0670968926f6: Pull complete

    5a8b0e20be4b: Pull complete

    7a93fb438607: Pull complete

    400f1e54bef0: Pull complete

    f0b65b53f1a4: Pull complete

    dc9d1a029c69: Pull complete

    42a9874765c5: Pull complete

    52140cf8a5cf: Pull complete

    Digest: sha256:fe703c02e16ea7d3e8d7bdf5a0c03957f2d4a313cfa9ae44878a3ad12e633ccf

    Status: Downloaded newer image for tomcat:latest

    Using CATALINA_BASE:   /usr/local/tomcat

    Using CATALINA_HOME:   /usr/local/tomcat

    Using CATALINA_TMPDIR: /usr/local/tomcat/temp

    Using JRE_HOME:        /usr/local/openjdk-11

    Using CLASSPATH:       /usr/local/tomcat/bin/bootstrap.jar:/usr/local/tomcat/bin/tomcat-juli.jar

    Using CATALINA_OPTS:

    ...

    26-May-2022 14:33:47.952 INFO [main] org.apache.catalina.startup.Catalina.start
    Server startup in [100] milliseconds

    Listing 7-5

    Tomcat Container Running

    ```


    Listing [7-5](#619782_1_En_7_Chapter.xhtml#PC6) shows a Tomcat container running.
    Since the `-it` option has been used, Docker will capture and provide the container
    output, which is displayed in the console. When you run this command, Docker will
    install `tomcat:latest` from the Tomcat public repository hosted on Docker Hub
    and run the software. After Docker has installed and started running Tomcat, one
    line of seemingly random characters will be written to the terminal. This blob
    of characters is a unique identifier of the container that was just created to
    run Tomcat. Every time you invoke the `docker run` command and create a new container,
    that newly created container will get a unique identifier like this.


    You can now list the Docker containers again, as shown in Listing [7-6](#619782_1_En_7_Chapter.xhtml#PC7).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker ps

    CONTAINER ID  IMAGE   COMMAND  CREATED  STATUS  PORTS   NAMES

    5b621bcd9dd1  tomcat  "catalina.sh run"  About a minute ago   Up About a minute   0.0.0.0:8080->8080/tcp   priceless_chebyshev

    ...

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-6

    Listing Docker Containers

    ```


    You can see the Tomcat container which you just started, along with other containers.
    To access Tomcat, as mentioned in Appendix E, you must get the minikube IP first.
    See Listing [7-7](#619782_1_En_7_Chapter.xhtml#PC8).


    ```

    (base) binildass-MacBook-Pro:ch07-01 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:ch07-01 binil$

    Listing 7-7

    Finding Minikube IP

    ```


    You can now access the Tomcat using the `curl` command, as shown in Listing [7-8](#619782_1_En_7_Chapter.xhtml#PC9).


    ```

    (base) binildass-MacBook-Pro:ch07-01 binil$ curl http://192.168.64.5:8080

    HTTP Status 404 – Not Found...

    (base) binildass-MacBook-Pro:ch07-01 binil$

    Listing 7-8

    Accessing Tomcat Container

    ```


    You may also use a browser, as shown in Figure [7-14](#619782_1_En_7_Chapter.xhtml#Fig14).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig14_HTML.jpg)


    A screenshot of the web browser window featuring a 404 not found error message.
    The message is provided in bold text. The web address is 192.168.64.5\. The browser
    is not secure.


    Figure 7-14


    Accessing “No Web App” in a Tomcat container


    You might think that you made a mistake while installing the Docker image when
    you see the `404` error. But this is not an error and it was designed to behave
    like this due to security concerns raised by the Docker community. You can find
    this security information on the Tomcat image official documentation in Docker
    Hub. See Figure [7-15](#619782_1_En_7_Chapter.xhtml#Fig15).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig15_HTML.jpg)


    A screenshot of a web page reads instructions on how to use the docker Tomcat
    image. It explains that web applications are not enabled by default for security
    reasons, and are available in a folder within the image, provides instructions
    on how to run the Tomcat server, and test it in a browser.


    Figure 7-15


    Docker Tomcat notice


    You can stop the Tomcat container by using the code in Listing [7-9](#619782_1_En_7_Chapter.xhtml#PC10).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker stop 5b62

    5b62

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-9

    Stopping Tomcat Container

    ```


    Note that `5b62` are the first four characters of the container ID in Listing
    [7-6](#619782_1_En_7_Chapter.xhtml#PC7). This container, when stopped, will retain
    all settings and filesystem changes (in the top layer that is writeable). All
    processes running in the container will be stopped and you will lose everything
    in memory. If you now attempted to access the Tomcat using the `curl` command,
    you would get the response shown in Listing [7-10](#619782_1_En_7_Chapter.xhtml#PC11).


    ```

    (base) binildass-MacBook-Pro:~ binil$ curl http://192.168.64.5:8080

    curl: (7) Failed to connect to 192.168.64.5 port 8080: Connection refused

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-10

    Attempt to Access Tomcat Container

    ```


    ## Build and Run Java App without Java


    The aim of this section is to compile, package, deploy, and run a Java app without
    a Java SDK or Java runtime in your development machine. How do you do that? You
    might have already guessed, since you are learning to use Docker, right? Use Docker!'
