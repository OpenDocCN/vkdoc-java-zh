    ### 测试微服务


    当两个微服务都启动并运行后，你可以使用 Mongo 终端检查 MongoDB 服务器，以确保产品服务器微服务在启动时向 MongoDB 服务器插入了若干产品。参见清单
    3-22。


    ```

    > db.productOR.find()

    { "_id" : ObjectId("61a5e3bc80e0e72c72097305"), "name" : "Kamsung Mobile", "code"
    : "KAMSUNG-TRIOS", "title" : "Tablet Trios 12 inch , black , 12 px ....", "price"
    : 12000, "category" : "Mobile", "_class" : "com.acme.ecom.product.model.ProductOR"
    }

    { "_id" : ObjectId("61a5e3bc80e0e72c72097306"), "name" : "Lokia Mobile", "code"
    : "LOKIA-POMIA", "title" : "Lokia 12 inch , white , 14px ....", "price" : 9000,
    "category" : "Mobile", "_class" : "com.acme.ecom.product.model.ProductOR" }

    { "_id" : ObjectId("61a5e3bc80e0e72c72097307"), "name" : "Mapple Mobile", "code"
    : "MAPPLE-EPHONE", "title" : "Mapple 7 inch, purple, 14px ....", "price" : 8000,
    "category" : "Mobile", "_class" : "com.acme.ecom.product.model.ProductOR" }

    { "_id" : ObjectId("61a5e3bc80e0e72c72097308"), "name" : "Mapple Tablet", "code"
    : "MAPPLE-PAD", "title" : "Mapple 11 inch , grey, 140px ....", "price" : 19000,
    "category" : "Tablet", "_class" : "com.acme.ecom.product.model.ProductOR" }

    >

    清单 3-22

    使用 Mongo Shell 检查 MongoDB 服务器

    ```


    一切就绪后，你可以通过浏览器访问 Web 应用程序。指向以下 URL：


    `http://localhost:8080/product.html`


    要测试 CRUD 操作，请按照第 1 章最后一节“你的第一个 Java 微服务”中“使用 UI 测试微服务”小节描述的说明进行操作。


    现在是时候巩固你目前所学的内容，并介绍下一个概念——洋葱架构了。


    ## 洋葱架构


    分层原则使软件架构师能够分离关注点。几十年来，软件架构师一直成功地构建分层软件架构，而如今，随着微服务架构的广泛采用，这些分层原则已获得广泛认可。让我们看看分层与洋葱有什么关系。


    ### 洋葱架构设计


    在前几章解释的端口与适配器架构中，你学习了如何定义抽象的端口和适配器，这些端口和适配器将核心业务服务和实体与软件的上下文和意图隔离开来。换句话说，这些端口和适配器通过编写适配器代码，将软件应用核心与基础设施和外围关注点隔离开来，从而防止基础设施和外围代码泄漏到应用核心中。洋葱架构描绘了具有多层结构的企业应用，其中业务逻辑中的某些层可能可以通过领域驱动设计的原则来识别。典型的洋葱架构如图
    3-1 所示。


    ![](img/619782_1_En_3_Fig1_HTML.jpg)


    一个模型图展示了四层同心圆，从最内层到最外层依次是实体、领域服务、应用服务和基础设施层依赖。这些层包括模型聚合、进度、业务服务、控制器、消息监听器、客户端、浏览器和带有驱动端口的存储。


    图 3-1

    洋葱架构


    参考图 3-1，软件架构中的两个核心原则是：


    *   外层依赖于内层

    *   外层对内层是透明的


    参考图 3-1，各层之间的耦合方向指向中心，为你提供了一个独立的对象模型（领域模型），其核心不依赖于任何东西。这个内层包含特定于应用本身领域的数据和操作数据的逻辑。


    很多时候，你还会遇到涉及多个实体的逻辑，而这种领域逻辑可能不属于某个特定实体。这种逻辑也可以被重用，因此需要另一个层，称为业务服务层。这些业务服务（也称为领域服务）的作用是接收一组实体，并对它们执行一些业务逻辑。这样的领域服务也可以聚合更多的领域服务和业务实体（参见第
    1 章的图 1-14）。


    ### 洋葱架构与六边形架构对比


    六边形架构中定义的端口和适配器是一种将软件应用核心与基础设施和外围关注点隔离开来的手段。这些外围设备可以是用户界面，无论是什么类型的用户界面，比如浏览器、移动设备、扫描仪等。类似地，基础设施代码可以将应用核心连接到数据库、第三方系统、打印机等工具。基础设施层成为最外层的洋葱环，这在图
    3-1 的洋葱架构中有所体现。你也可以将它们视为放置在六边形的边界上，作为抽象的端口和适配器。


    这些端口和适配器通过我们称之为*应用服务*的东西连接到内层。这些是处理协议和格式转换及优化的技术服务。例如，REST 控制器是一种应用服务，通过 HTTP
    传输将实体以 JSON 格式暴露出来。类似地，对特定类型数据库的持久化抽象可以通过仓库接口完成，正如你在本章前两个示例中看到的那样，这些同样属于应用服务。因此，洋葱的第二层是可重用的内层。


    讨论了足够多的理论之后，让我们看一些实际的例子。如果你回顾本章前面的两个示例，你可以看到领域实体（`Product`）是如何在 PostgreSQL 和 MongoDB
    数据库的不同持久化抽象之间被重用的，这些是驱动接口。我现在将进一步扩展同一个示例，以演示如何定义端口以允许多种驱动抽象。更具体地说，你已经看到了微服务的 REST
    接口如何作为驱动端口提供精细的抽象。我将在同一个微服务的洋葱最外层插入另一个端口，一个使用 GraphQL 技术的端口，以便同一个洋葱的内层可以被重用。


    ## GraphQL


    GraphQL 是一种用于 API 的开源数据查询和操作语言，以及一个使用现有数据执行查询的运行时。GraphQL 由 Facebook 于 2012 年内部开发。GraphQL
    项目后来从 Facebook 转移到新成立的 GraphQL 基金会，由非营利性的 Linux 基金会托管。我将快速介绍 GraphQL，以便你能够理解本章的下一个示例。

    '
- fmt: '### GraphQL Explained


    GraphQL enables clients to ask for exactly what they need and nothing more, thus
    making it easier to evolve APIs over time. It allows clients to define the structure
    of the required data, and the same structure of the data is returned from the
    server, therefore preventing excessively large amounts of data from being returned.
    It is highly desirable in low profile devices like mobiles, IOT, and so on. It
    allows the client to navigate to child resources in a single request, and thus
    enables multiple queries in a single request.


    GraphQL uses the notion of named queries and mutations instead of a standard mandatory
    set of actions. This helps to put the control where it belongs, with the API developer
    on specifying what is possible, and with the API consumer on what is desired.
    Listing [3-23](#619782_1_En_3_Chapter.xhtml#PC23) shows an example query.


    ```

    query {

    products(count: 10, offset: 0) {

    productId

    code

    productCategory {

    id

    name

    title

    }

    }

    }

    Listing 3-23

    A GraphQL Query

    ```


    This GraphQL query is intended to do the following:


    *   Request the ten most recently added products

    *   For each product, request the `productId` and `code`

    *   For each product request, its `productCategory`, returning the `id`, `name`,
    and `title` of the corresponding product category


    In a traditional REST API, this either requires 11 requests—one for the initial
    products query and ten for their corresponding `productCategory`—or it needs to
    include the `productCategory` details along with the post details, making the
    payload large.


    ## Onion Architecture Microservice Example


    This example tweaks the previous example of microservices. It uses the same two
    microservices—a consumer and a provider microservice—communicating with each other
    using the REST protocol. The provider microservice also interacts with a MongoDB.
    The consumer microservice exposes an additional port based on GraphQL.


    ### Onion Design for the Microservice


    If you superimpose the hexagonal microservice view shown in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1)
    in Chapter [2](#619782_1_En_2_Chapter.xhtml) on to the Onion architecture view
    in Figure [3-1](#619782_1_En_3_Chapter.xhtml#Fig1) in this chapter, you get Figure
    [3-2](#619782_1_En_3_Chapter.xhtml#Fig2).


    ![](images/619782_1_En_3_Chapter/619782_1_En_3_Fig2_HTML.jpg)


    A model diagram of `product-web-microservice` connects the end user to the 4-layer
    concentric circle with entities, domain services, application services, and infrastructure
    layer dependency and their respective microservices. It leads to `product rest
    controller`, `product entity`, and `mongo D B` under `product-server-microservice`.


    Figure 3-2


    Onion architecture for the Consumer and Provider microservices


    In both microservices shown in Figure [3-2](#619782_1_En_3_Chapter.xhtml#Fig2),
    you use HTTP ports at the REST interfaces, which specify how a user’s browser
    or some other HTTP client can use the application core. For the Product Web microservice,
    you specify an additional port based on GraphQL. You can also define a business
    service intended to demonstrate that the business service instances from the inner
    layers are reused by the outer layers of the Onion architecture, just like how
    they reuse the business entity classes.


