    Chapter 7 introduced how to build Docker images of microservices. This section
    extends that knowledge by building multiple microservice images.


    The first step is to start Minikube single-node Kubernetes cluster so that you
    have a Docker Daemon up. Refer to Appendix E for a quick reference to the container
    commands.


    ```

    (base) binildass-MacBook-Pro:~ binil$ minikube start

    (base) binildass-MacBook-Pro:~ binil$ eval $(minikube docker-env)

    ```


    **Note:** For all the examples in this chapter, I assume the previous two steps
    that connect to the Docker Daemon to be executed if you are using the Minikube
    single-node Kubernetes cluster.


    Listing 8-4 shows the commands organized into a single utility script.


    ```

    mvn -Dmaven.test.skip=true clean package

    docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t ecom/product-web
    .

    docker build  --build-arg JAR_FILE=01-ProductServer/target/*.jar -t ecom/product-server
    .

    docker run -d -it -p 27017:27017 --name mongo mongo:3.6

    docker run -d -p 8081:8081  --link mongo:mongo --name product-server ecom/product-server

    docker run -d -p 8080:8080  --link product-server:product-server --name product-web
    ecom/product-web

    Listing 8-4

    Script to Build and Run Microservices Docker Containers (ch08\ch08-01\makeandrun.sh)

    ```


    The first line builds both microservices and packages them into `.jar` files,
    one by one. The second and third lines build Docker images using the `.jar` files.
    This build utilizes the Dockerfile you saw in Listing 7-35 in Chapter 7, which
    is reproduced here in Listing 8-5.


    ```

    FROM openjdk:8-jdk-alpine

    VOLUME /tmp

    ARG JAR_FILE

    COPY ${JAR_FILE} ecom.jar

    ENTRYPOINT ["java","-jar","/ecom.jar"]

    Listing 8-5

    The Dockerfile (ch08\ch08-01\Dockerfile)

    ```


    The Dockerfile is template-enabled, so that the actual value of the `.jar` file
    can be parameterized along with the `build` command. See Listing 8-6.


