    Attaching to ch07-01-web-1

    ...

    ch07-01-web-1  | 26-May-2022 18:04:40.683 INFO [main] org.apache.catalina.startup.HostConfig.deployWAR
    Deploying web application archive [/usr/local/tomcat/webapps/ROOT.war]

    ch07-01-web-1  | 26-May-2022 18:04:41.016 INFO [main] org.apache.catalina.startup.HostConfig.deployWAR
