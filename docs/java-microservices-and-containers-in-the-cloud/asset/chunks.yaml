    停止微服务容器并清理环境

    ```


    您还可以在执行 `clean.sh` 脚本时，在服务器端控制台中观察日志。


    ## 总结


    第 7 章介绍了 Docker 容器，第 8 章解释了如何使用 Docker 容器更好地管理微服务应用程序。当您的聚合应用程序中包含多个微服务时，像 Docker
    Compose 和 Kubernetes 这样的工具可以为您提供进一步的帮助。本章展示了当您拥有许多业务微服务、应用程序服务和基础设施服务时，Docker
    Compose 如何为您提供帮助。这些服务中的许多都可以作为单独的容器部署，而 Docker Compose 正是在部署和运维期间帮助您管理它们的依赖关系和生命周期的工具。您不必止步于
    Docker；您还可以考虑使用功能完备的容器编排工具，包括但不限于 Kubernetes。您将在下一章中实践这一点。

