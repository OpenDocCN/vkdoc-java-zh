- fmt: '### Build and Run the Microservice


    The `ch06\ch06-01` folder contains the Maven scripts required to build the examples.
    As a first step, you need to bring up the Kafka broker. Refer to Appendix D to
    learn how to set up a Kafka server and bring it up. You need to execute the commands
    in Listing [6-6](#619782_1_En_6_Chapter.xhtml#PC6) to bring up Kafka from the
    Kafka installation location.


    ```

    bin/zookeeper-server-start.sh config/zookeeper.properties

    bin/kafka-server-start.sh config/server.properties

    Listing 6-6

    Commands to Bring Up Kafka Broker

    ```


    As a next step, you need to bring up the MongoDB server. Refer to Appendix B to
    learn how to set up a MongoDB server and bring it up. You need to execute the
    commands in Listing [6-7](#619782_1_En_6_Chapter.xhtml#PC7) to bring up MongoDB.


