  raw: '### Understanding the Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for the example is organized inside the `ch05\ch05-01` folder.
    This section looks at the changes in the consumer microservice—that is, the Product
    Web microservice, first.


    As explained earlier, using separate topics for different clients is not an elegant
    solution, since you should leverage the `REPLY_PARTITION` explicitly. The consumer
    microservice in that case will need to know which partition it is assigned to.
    Explicit configuration to select a specific partition can be provided as follows:


    ```

    @Value("${kafka.topic.product.reply.partition}")

    private int replyPartition;

    ```


    As shown in Listing [4-2](#619782_1_En_4_Chapter.xhtml#PC2) in Chapter [4](#619782_1_En_4_Chapter.xhtml),
    you now need to set the parameters explicitly, like those in Listing [5-1](#619782_1_En_5_Chapter.xhtml#PC2).


    ```

    productRecord.headers().add(new RecordHeader(

    KafkaHeaders.REPLY_TOPIC, requestReplyTopic.getBytes()));

    productRecord.headers().add(new RecordHeader(

    KafkaHeaders.REPLY_PARTITION,

    intToBytesBigEndian(replyPartition)));

    RequestReplyFuture sendAndReceive =

    requestReplyKafkaTemplate.sendAndReceive(

    productRecord);

    ...

    Listing 5-1

    Static Configuration of Reply Topic and Partition

    ```


    However, this kind of static configuration will not help you in cases of dynamic
    horizontal scaling (adding more instances of the same microservice), so you would
    need a schema to address this.


    Bjorn Beskow from Callista Enterprise wrote a nice blog and provided a utility
    library on the Internet to do this, hence you will utilize that for this example.
    The requirement is to dynamically manage the Reply topic and the Reply partition
    required to implement the Return Address pattern, and this library does exactly
    that. The Reply topic needs to be wired into `RequestReplyTemplate`, so you don’t
    need to handle it through the API while sending the record. For the Reply partition,
    you retrieve the partition(s) on which the reply topic listener has been assigned
    and pass that partition info. The utility library is available in this source
    code subfolder:


    ```

    ch05\ch05-01\kafka-request-reply-util

    ```


    A detailed explanation of the implementation of this utility is beyond the scope
    of this book. You are directed to refer to the blog for more information. Instead,
    this section looks at how to use this utility and implement the functionality.
    Listing [5-2](#619782_1_En_5_Chapter.xhtml#PC4) shows the configurations to use
    the utility library.


    ```

    import se.callista.blog.synch_kafka.request_reply_util.

    CompletableFutureReplyingKafkaOperations;

    import se.callista.blog.synch_kafka.request_reply_util.

    CompletableFutureReplyingKafkaTemplate;

    @Configuration

    public class KafkaConfig {

    @Value("${spring.kafka.bootstrap-servers}")

    private String bootstrapServers;

    @Value("${spring.kafka.consumer.group-id}")

    private String groupId;

    @Value("${kafka.topic.product.request}")

    private String requestTopic;

    @Value("${product.topic.request.numPartitions}")

    private int numPartitions;

    @Value("${kafka.topic.product.reply}")

    private String replyTopic;

    @Value("${kafka.request-reply.timeout-ms}")

    private Long replyTimeout;

    @Bean

    public CompletableFutureReplyingKafkaOperations replyKafkaTemplate() {

    CompletableFutureReplyingKafkaTemplate requestReplyKafkaTemplate =

    new CompletableFutureReplyingKafkaTemplate(

    requestProducerFactory(),

    replyListenerContainer());

    requestReplyKafkaTemplate.setDefaultTopic(

    requestTopic);

    requestReplyKafkaTemplate.setDefaultReplyTimeout(

    Duration.of(replyTimeout, ChronoUnit.MILLIS));

    return requestReplyKafkaTemplate;

    }

    @Bean

    public NewTopic replyTopic() {

    Map configs = new HashMap();

    configs.put("retention.ms", replyTimeout.toString());

    return new NewTopic(replyTopic, numPartitions,

    (short) 1).configs(configs);

    }

    }

    Listing 5-2

    Kafka Configuration for the Product Web Microservice (ch05\ch05-01\02-ProductWeb\src\main\java\com\acme\ecom\product\KafkaConfig.java)

    ```


    As you saw in Chapter [4](#619782_1_En_4_Chapter.xhtml), `ReplyingKafkaTemplate
    <K, V, R>` offers a Return object or a Reply object once the message is consumed
    by the Kafka listener from the provider or producer side. The type parameters
    represent:


    *   K – Key type


    *   V – Outbound data type


    *   R – Reply data type


    When you have multiple sender microservices instances, you must make sure that
    the response is sent to the correct sender microservices instance. The Spring
    Kafka documentation suggests that each sender microservices use a unique topic,
    or that an additional `KafkaHeaders.REPLY_PARTITION` header value be sent with
    the request. Topics are administered objects. You can also set the `REPLY_PARTITION`
    explicitly. The `REPLY_PARTITION` header denotes a partition number on which to
    send the reply. The sender microservices will then need to know which partition
    it is assigned to. The documentation suggests using explicit configuration to
    select a specific partition. Listing [5-3](#619782_1_En_5_Chapter.xhtml#PC5) shows
    one possible configuration.


    ```

    @Configuration

    public class KafkaConfig {

    @Value("${kafka.topic.product.reply}")

    private String replyTopic;

    @Value("${kafka.topic.product.reply.partition}")

    private int replyPartition;

    @Bean

    public KafkaMessageListenerContainer replyListenerContainer() {

    ContainerProperties containerProperties =

    new ContainerProperties(replyTopic);

    TopicPartitionInitialOffset initialOffset =

    new TopicPartitionInitialOffset(replyTopic,

    replyPartition);

    return new KafkaMessageListenerContainer(

    replyConsumerFactory(),

    containerProperties, initialOffset);

    }

    Listing 5-3

    Kafka Configuration for the Product Web Microservice, Specifying Partition

    ```


    An additional `KafkaHeaders.REPLY_PARTITION` header value can be sent with the
    request, which is a four-byte field containing a BIG-ENDIAN representation of
    the partition integer, as shown in Listing [5-4](#619782_1_En_5_Chapter.xhtml#PC6).


    ```

    record.headers().add(new RecordHeader(KafkaHeaders.REPLY_TOPIC,

    requestReplyTopic.getBytes()));

    record.headers().add(new RecordHeader(KafkaHeaders.REPLY_PARTITION,

    intToBytesBigEndian(replyPartition)));

    RequestReplyFuture sendAndReceive =

    requestReplyKafkaTemplate.sendAndReceive(record);

