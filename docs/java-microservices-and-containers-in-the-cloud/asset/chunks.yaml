    `-v $(pwd):/workfolder` 将当前目录挂载为容器中的 `/workfolder`。`-w /workfolder` 将容器当前工作目录更改为
    `/workfolder`。当你运行 `-DartifactId= ProductWeb` 命令时，你将获得一个包含名为 `ProductWeb` 新目录的新项目，该目录创建于挂载卷中。即使销毁容器，它也会被保留，因为挂载的目录并不在容器内部，而是实际指向宿主机上的一个文件夹。


    这里有一个注意事项。如果你使用的是 Docker Desktop 或类似的 Docker 守护进程，你会在宿主机的 `ProductWeb` 文件夹中找到新创建的项目。但是，本示例使用的是
    Minikube 内部的 Docker 守护进程，因此要查看新创建的项目，你需要查看托管 minikube 的虚拟机内部。请参见代码清单 7-13。


