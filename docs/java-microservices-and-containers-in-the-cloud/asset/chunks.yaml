    (base) binildass-MacBook-Pro:ch14-01-temp binil$

    Listing 14-10

    Terraform init

    ```


    The Terraform binary installed in your machine only contains the basic functionality
    for Terraform; it does not come with the code for any of the providers (e.g.,
    the AWS Provider, Azure provider, GCP provider, etc.). When you use Terraform
    the first time, you need to run `terraform init` to tell Terraform to inspect
    the code, determine which providers you’re using, and download the code for them—in
    this case, it is AWS. This provider code is downloaded into a `terraform` folder,
    which is Terraform’s scratch directory. Terraform will also record information
    about the provider code it downloaded into a `.terraform.lock.hcl` file.


    You can now sanity check your code, as shown in Listing [14-11](#619782_1_En_14_Chapter.xhtml#PC13).


    ```

    (base) binildass-MacBook-Pro:ch14-01 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch14/ch14-01

    (base) binildass-MacBook-Pro:ch14-01-temp binil$ terraform validate

