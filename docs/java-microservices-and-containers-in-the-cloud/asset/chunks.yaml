    ### 理解代码


    本书的源代码可通过图书产品页面上的 GitHub 链接获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码位于
    `ch02\ch02-02` 文件夹中。该源代码与上一个示例类似。Product Server 微服务也类似；不过，Product Web 微服务有一些变化，我们在此进行说明。本示例使用
    `FeignClient` 代替了 `RestTemplate`。清单 2-14 展示了如何指定 `FeignClient`。


    ```

    public interface ProductService {

    @RequestMapping(value = "/products",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity>>

    getAllProducts();

    @RequestMapping(value = "/products/{productId}",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> getProduct(

    @PathVariable("productId") String productId);

    @RequestMapping(value = "/products",

    method = RequestMethod.POST,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> addProduct(

    @RequestBody Product product);

    @RequestMapping(value = "/products/{productId}",

    method = RequestMethod.DELETE,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> deleteProduct(

    @PathVariable("productId") String productId);

    @RequestMapping(value = "/products/{productId}",

    method = RequestMethod.PUT,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> updateProduct(

    @PathVariable("productId") String productId ,

    @RequestBody Product product);

    }

    清单 2-14

    Product Server 微服务的服务接口 (ch02\ch02-02\02-ProductWeb\src\main\java\com\acme\ecom\product\api\ProductService.java)

    ```


    首先，你需要定义一个服务接口，如清单 2-14 所示。基于此服务接口，你可以声明一个抽象的 `FeignClient`，它是一种声明式的 Web 服务客户端。使用
    `Feign` 的好处在于，除了定义接口之外，你无需编写任何调用服务的代码，如清单 2-15 所示。


    ```

    @FeignClient(name="the-name", url = "http://localhost:8081")

    public interface ProductServiceProxy extends ProductService{

    }

    清单 2-15

    Product Server 微服务的 Feign 客户端接口 (ch02\ch02-02\02-ProductWeb\src\main\java\com\acme\ecom\product\client\ProductServiceProxy.java)

    ```


    必须为所有客户端指定一个名称，该名称是服务的名称，可以带有可选的协议前缀。


    然后，你在 `pom.xml` 中声明这个 `FeignClient`，如清单 2-16 所示。


    ```


    org.springframework.cloud


    spring-cloud-starter-openfeign


    4.1.0


    清单 2-16

    Maven 中的 Feign 客户端依赖 (ch02\ch02-02\02-ProductWeb\pom.xml)

    ```


    你可以使用应用程序属性来配置 `Feign` 客户端；不过，为了简化示例，我没有用这些细节来配置 `Feign` 客户端。请参见清单 2-17。


    ```

    feign:

    client:

    config:

    default:

    connectTimeout: 5000

    readTimeout: 5000

    loggerLevel: basic

    清单 2-17

    Ribbon 配置 (ch02\ch02-02\02-ProductWeb\src\main\resources\application.properties)

    ```


    ### 构建并运行微服务


    `ch02\ch02-02` 文件夹包含构建示例所需的 Maven 脚本。第一步，你需要启动 MongoDB 服务器。请参考附录 B 了解如何设置并启动 MongoDB
    服务器。你需要执行清单 2-18 中所示的命令来启动 MongoDB。


    ```

    (base) binildass-MBP:bin binil$ pwd

    /Users/binil/Applns/mongodb/mongodb-macos-x86_64-4.2.8/bin

    (base) binildass-MBP:bin binil$ mongod --dbpath /usr/local/var/mongodb --logpath
    /usr/local/var/log/mongodb/mongo.log

    清单 2-18

    启动 MongoDB 服务器

