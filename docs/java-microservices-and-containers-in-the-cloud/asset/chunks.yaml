    ## Microservices Parallel Processing


    This slightly altered example leverages the same set of microservices in Chapter
    [4](#619782_1_En_4_Chapter.xhtml), which are tweaked to demonstrate the sequential
    processing in the just previous sample. A consumer and a provider microservice
    communicate with each other using a messaging channel. The provider microservice
    stores the entity in an in-memory database, to keep the example simple. Moreover,
    when the browser sends requests to the first (consumer) microservice, the example
    uses async HTTP.


    The objective here is to demonstrate that when the same kind of requests from
    different users or microservice consumers reaches a cluster of instances of a
    single type of provider microservice, the requests can also be serviced in parallel
    to improve system scalability.


    ### Design Parallel Processing Microservices


    Figure [5-13](#619782_1_En_5_Chapter.xhtml#Fig13) shows a modified version of
    the Hexagonal microservice view shown in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1)
    in Chapter [2](#619782_1_En_2_Chapter.xhtml). This allows both microservices to
    communicate through an async channel. Apache Kafka is again used as the messaging
    channel, which is inherently asynchronous.


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig13_HTML.jpg)


    A diagram illustrates an event-driven microservice architecture that involves
    product web microservice instances and product server microservice instances,
    connected via an event queue. The event queue is processed between many to many
    or any to any channels.


    **Figure 5-13** Microservice instances load balanced to many topic partitions


    The more partitions a topic has, the higher the concurrency you can achieve and
    therefore the higher the potential throughput. In Kafka, each partition must be
    allocated to only one consumer. So, you can have a maximum of one consumer per
    partition. This means that you can only have as many consumers (in a single consumer
    group) as there are partitions for a topic, but you may have fewer. If there are
    fewer consumers than partitions, consumers may process records from one or more
    partitions. To summarize, the maximum throughput will be achieved when you have
    one consumer per partition, or when you have as many consumers as there are partitions.


    ### Parallelism and Thread Safety


    Figure [5-14](#619782_1_En_5_Chapter.xhtml#Fig14) portrays the discussions in
    the previous section. You have seen that you can only have as many consumers (in
    a single consumer group) as there are partitions for a topic. If you have more
    consumers than the number of partitions, extra consumers may not be assigned with
    a partition.


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig14_HTML.jpg)


    A diagram depicts two topologies, not a feasible and a feasible. On the left,
    the partitions are processed through the event queue with many consumers followed
    by message listeners. On the right, the partitions are processed through the event
    queue with the same consumer followed by listeners.


    **Figure 5-14** Microservice consumers vs. partition assignment


    Kafka producers are thread-safe and can be shared among multiple threads. However,
    Kafka consumers are not thread-safe by design. Hence, you can’t share the same
    consumer instance among multiple threads. The default Kafka consumer is single-threaded,
    so it can only process records sequentially, as you saw in the example in the
    previous section. So, how can you increase parallelism?


    Because single-threaded consumers can’t concurrently process regardless of being
    assigned to multiple partitions, the straightforward solution is to increase the
    number of partitions and consumers simultaneously, which is what you will attempt
    in this section. However, this design has its own caveats, since for high-transactional
    systems it is not feasible to have too many consumers, requiring as many partitions
    to support as there are consumers, potentially millions. In such scenarios, you
    need to adopt a heterogenous strategy of decoupling the consumption and acknowledgment
    of messages from time-consuming message processing, which is not in the scope
    of this demonstration.'
