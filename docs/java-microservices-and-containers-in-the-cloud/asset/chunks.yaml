- fmt: '### Testing Sequential Request Processing


    When all is set, you can access the web application using `cURL` clients.


    To test the processing of requests in sequential order within a single partition,
    you need to configure the `pinnedToPartition` with a `true` value, which is shown
    in Listing [5-7](#619782_1_En_5_Chapter.xhtml#PC9).


    For testing, the intention is to fire more than one request to the Product Web
    microservices instance concurrently. Since you have pinned requests from the Product
    Web microservices to the same partition, you know the request messages will be
    picked up by a single instance of the Product Server microservice.


    You can now use two separate terminals to run `cURL` client commands concurrently
    (more or less), as shown in Listings [5-20](#619782_1_En_5_Chapter.xhtml#PC25)
    and [5-21](#619782_1_En_5_Chapter.xhtml#PC26).


    ```

    binildass-MacBook-Pro:02-ProductWeb binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch05/ch05-01/02-ProductWeb

    binildass-MacBook-Pro:02-ProductWeb binil$ sh curlrun2.sh

    Firing http://127.0.0.1:8081/productsweb and waiting...


    Current date: Wed Feb 28 17:52:23 IST 2024

    ==========================================

    {"products":[{"productId":"1","name":"Kamsung ...


    Current date: Wed Feb 28 17:52:35 IST 2024

    ==========================================

    Response from http://127.0.0.1:8081/productsweb received.

    binildass-MacBook-Pro:02-ProductWeb binil$

    Listing 5-21

    Commands to Test Using cURL: Client 2

    ```


    ```

    binildass-MacBook-Pro:02-ProductWeb binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch05/ch05-01/02-ProductWeb

    binildass-MacBook-Pro:02-ProductWeb binil$ sh curlrun1.sh

    Firing http://127.0.0.1:8080/productsweb and waiting...


    Current date: Wed Feb 28 17:52:23 IST 2024

    ==========================================

    {"products":[{"productId":"1","name":"Kamsung ...


    Current date: Wed Feb 28 17:52:29 IST 2024

    ==========================================

    Response from http://127.0.0.1:8080/productsweb received.

    binildass-MacBook-Pro:02-ProductWeb binil$

    Listing 5-20

    Commands to Test Using cURL: Client 1

    ```


    Listings [5-20](#619782_1_En_5_Chapter.xhtml#PC25) and [5-21](#619782_1_En_5_Chapter.xhtml#PC26)
    show that you can send requests from clients more or less concurrently (at time
    `17:52:23`). Listings [5-18](#619782_1_En_5_Chapter.xhtml#PC23) and [5-19](#619782_1_En_5_Chapter.xhtml#PC24)
    further show that the same instance of the Product Web microservice has also attempted
    to relay these requests to the Product Server microservice more or less concurrently:


    ```

    2024-02-28 17:52:23 DEBUG LogAccessor.debug:313 - Sending: ProducerRecord(topic=product-req-topic...

    2024-02-28 17:52:23 DEBUG LogAccessor.debug:313 - Sending: ProducerRecord(topic=product-req-topic...

    ```


    However, careful observation of Listing [5-17](#619782_1_En_5_Chapter.xhtml#PC22)
    will reveal that the Product Server microservice performs computation against
    the messages received sequentially, which is the order in which messages arrive
    at the Product Server microservice:


    ```

    ...

    2024-02-28 17:52:23 INFO  ProductListener.listenWithHeaders:57 – Start

    ...

    2024-02-28 17:52:29 INFO  ProductListener.listenWithHeaders:80 - Ending...

    2024-02-28 17:52:29 INFO  ProductListener.listenWithHeaders:57 – Start

    ...

    2024-02-28 17:52:35 INFO  ProductListener.listenWithHeaders:80 - Ending...

    ```


    When you bring up more instances of the Product Web microservice, if you want
    to make sure they are all pinned to the same Topic partition, you need to tweak
    the default values for the `appName` configured through the run scripts in the
    root folder of the Product Web microservice. The default values are as follows:


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig11_HTML.jpg)


    A diagram presents an event-driven architecture for communication between product
    web microservice instances and product server microservice instances, utilizing
    an event queue with multiple partitions for scalability. Each partition includes
    an event queue.


    Figure 5-11


    Microservice instances pinned to the same message topic partition


    ```

    -Dspring.application.name=product-web-1

    -Dspring.application.name=product-web-1

    ```


    In doing so, as shown in Figure [5-11](#619782_1_En_5_Chapter.xhtml#Fig11), messages
    from all the instances of the Product Web microservice can be pinned to be delivered
    to the same partition, say Partition 1 (shown with a tick mark). Consequently,
    messages from all the instances of the Product Web microservice can be served
    by a single instance of the Product Server microservice.


    The message processing schema of the (Product Server) microservice instance processing
    messages in sequence, and hence in order, is shown in Figure [5-12](#619782_1_En_5_Chapter.xhtml#Fig12).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig12_HTML.jpg)


    A diagram presents a request-to-reply communication model between a request topic
    and a reply topic, facilitated by a provider microservice instance that processes
    messages across partitions. The partitions from the request topic are transferred
    to the reply topic.


    Figure 5-12


    Microservice processing requests in sequence


    Before I conclude, the next section inspects the assignment of partitions that
    were configured in Listings [5-7](#619782_1_En_5_Chapter.xhtml#PC9) and [5-10](#619782_1_En_5_Chapter.xhtml#PC15).'
