  trans: '

    ### 理解源代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
    `ch06\ch06-03` 文件夹中，该文件夹已详细说明。额外的连接部分在两个微服务之间插入了一个聚合器，以及用于将来自 Product Web 微服务的单个请求中继到多个（实例的）提供者微服务的机制，你将在本节代码中看到这一点。


    Spring Kafka 提供了 `AggregatingReplyingKafkaTemplate`，这是一个回复模板，用于聚合具有相同关联 ID 的多个回复。`AggregatingReplyingKafkaTemplate`
    是一个监听器，用于处理一批传入的 Kafka 消息。这批消息列表由轮询返回的消费者记录对象创建。`AggregatingReplyingKafkaTemplate`
    扩展了 Spring 中 `ReplyingKafkaTemplate<K,V,R>` 的行为，而后者又扩展了 `KafkaTemplate` 的行为，以提供请求-回复语义。你在第
    4 章中已详细了解过，因此这里仅解释 `AggregatingReplyingKafkaTemplate` 的额外特性，如代码清单 6-38 中所配置。


    ```

    import org.springframework.kafka.requestreply.AggregatingReplyingKafkaTemplate;

    @Configuration

    public class KafkaConfig {

    @Value("${product.topic.reply.numProviders}")

    private int numProviders;

    @Value("${product.topic.reply.aggregatingTimeout}")

    private long aggregatingTimeout;

    @Bean

    public AggregatingReplyingKafkaTemplate replyKafkaTemplate(ProducerFactory pf,

    KafkaMessageListenerContainer>>

    replyContainer){

    AggregatingReplyingKafkaTemplate replyTemplate =

    new AggregatingReplyingKafkaTemplate(pf,

    replyContainer,(list, timeout) -> {

    LOGGER.debug("list.size() : {}; timeout : {}",

    list.size(), timeout);

    return (list.size() == numProviders) ||

    (timeout);

    });

    replyTemplate.setReturnPartialOnTimeout(true);

    replyTemplate.setSharedReplyTopic(true);

    replyTemplate.setDefaultReplyTimeout(

    java.time.Duration.ofSeconds(aggregatingTimeout));

    return replyTemplate;

    }

    @Bean

    public KafkaMessageListenerContainer>>

    replyContainer(ConsumerFactory>> cf){

    ContainerProperties containerProperties =

    new ContainerProperties(requestReplyTopic);

    containerProperties.setAckMode(AckMode.MANUAL);

    return new KafkaMessageListenerContainer>>(cf, containerProperties);

    }

    }

    代码清单 6-38

    Product Web Kafka 配置 (ch06\ch06-03\02-ProductWeb\src\main\java\com\acme\ecom\product\KafkaConfig.java)

    ```


    `replyContainer` bean 为一个容器创建属性，该容器将订阅指定的主题——本例中为 `requestReplyTopic`。你可以配置此监听器容器以消费多个主题。回复必须包含关联
    ID 标头（用于聚合）。框架将创建一个容器，订阅所有与指定模式匹配的主题，以动态获取分区。


    使用 `replyContainer`，你配置了一个 `AggregatingReplyingKafkaTemplate`，指定你期望得到一个包含 `Product`
    的 `ConsumerRecord` 集合。然后你设置 `replyTemplate.setReturnPartialOnTimeout(true)`，这仅仅意味着模板在超时时会咨询释放策略。模板通过将超时参数设置为
    `true` 来实现这一点，以告知策略这是超时而非投递调用。当设置为 `true` 时，它会释放部分结果。你还可以执行许多操作，并查看（可能修改）列表以决定是释放还是丢弃。


    在本例中，你运行以下测试：


    ```

    return (list.size() == numProviders) || (timeout);

    ```


    本示例中还配置了一个参数（`numProviders`）。你将 `numProviders`（本例中在 `application.properties` 中）设置为
    `3`，如代码清单 6-39 所示。这是因为你有三个 Product Server 微服务实例。一旦你从这三个 Product Server 微服务实例接收到响应消息，你就不再需要等待更多响应。


    通过指定 `replyTemplate.setSharedReplyTopic(true)`，你表明多个模板正在使用相同的主题进行回复。这仅会将意外回复的日志从错误级别更改为调试级别。


    `replyTemplate.setDefaultReplyTimeout()` 将设置一个超时时间，用于在本示例中检查此释放策略。


    ```

    product.topic.reply.numProviders: 3

    product.topic.reply.aggregatingTimeout: 6

    代码清单 6-39

    Product Web Kafka 配置 (ch06\ch06-03\02-ProductWeb\src\main\resources\application.properties)

    ```


    你可以通过更改 Product Web 微服务的 `application.properties` 中 `aggregatingTimeout` 的值来调整此参数，以测试不同场景。代码清单
    6-40 展示了聚合器代码的动态过程。


    ```

    @RestController

    public class ProductRestController{

    @Autowired

    AggregatingReplyingKafkaTemplate

    kafkaTemplate;

    @Value("${kafka.topic.request-topic}")

    private String requestTopic;

    @Value("${kafka.topic.requestreply-topic}")

    private String requestReplyTopic;

    @RequestMapping(value = "/productsweb", method =

    RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity> getAllProducts()

    throws InterruptedException,

    ExecutionException, TimeoutException {

    ProducerRecord record =

    new ProducerRecord(

    requestTopic, "All");

    record.headers().add(new RecordHeader(

    KafkaHeaders.REPLY_TOPIC,

    requestReplyTopic.getBytes()));

    RequestReplyFuture>>

    sendAndReceive =

    kafkaTemplate.sendAndReceive(record);

    SendResult sendResult =

    sendAndReceive.getSendFuture().get();

    sendResult.getProducerRecord().headers().forEach(

    header -> LOGGER.trace(header.key() + ":" +

    header.value().toString()));

    sendAndReceive.getSendFuture().get(30,

    TimeUnit.SECONDS);

    ConsumerRecord>>

    consumerRecords = sendAndReceive.get();

    Collection> consumerRecord =

    consumerRecords.value();

    List products =new ArrayList();

    for(ConsumerRecord

    temp:consumerRecord) {

    products.addAll(temp.value().getProducts());

    }

    return new ResponseEntity(products, HttpStatus.OK);

    }

    }

    代码清单 6-40

    Product Web REST 控制器 (ch06\ch06-03\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    关于代码清单 6-40 中代码的解释，请参见第 4 章中“同步与异步微服务”一节。这里仅解释用于实现聚合的新代码。`sendAndReceive` 发送请求，`AggregatingReplyingKafkaTemplate`
    接收一个 `ConsumerRecord`，它本身是一个包含 `ConsumerRecord` 的 `Collection`，而这些 `ConsumerRecord`
    又包含从每个 Product Server 微服务实例检索到的 `Product` 的 `Collection`（即 `Collection` 的 `Collection`）！


    你可以拆解这个 `ConsumerRecord`（即 `Collection` 的 `ConsumerRecord` 的 `Collection` 的 `Product`），将其展平，并聚合到一个单一的
    `ArrayList` 中返回。请注意，这里你没有进行任何过滤、去重或类似的转换。不过，你可以根据需求自由地进行任何进一步的处理。

