    and it is shown in Listing [8-5](#619782_1_En_8_Chapter.xhtml#PC6).


    Next, build the microservices and the docker images and then run the containers.
    You need to modify the scripts from the previous example. Listing [8-43](#619782_1_En_8_Chapter.xhtml#PC46)
    shows the commands organized into a single script.


    ```

