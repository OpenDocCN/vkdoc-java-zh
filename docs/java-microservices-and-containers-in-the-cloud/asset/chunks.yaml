- fmt: '### Design the Microservices


    This example uses the hexagonal microservice design depicted in Figure [1-13](#619782_1_En_1_Chapter.xhtml#Fig13)
    in Chapter [1](#619782_1_En_1_Chapter.xhtml). This is shown again in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_2_Chapter/619782_1_En_2_Fig1_HTML.jpg)


    A model diagram connects the end user and browser to `product-web-microservice`
    via incoming command or query, REST API, `product` REST controller, and outgoing
    command or query with `RestTemplate`, and `product-service-microservice` via incoming
    command or query, REST API, controller, `product` repository, `product` entity,
    and MongoDB.


    **Figure 2-1** Consumer and provider microservice design


    Both of the microservices shown in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1)
    use HTTP ports at the REST interfaces, which are specification of how a user’s
    browser or some other HTTP client can use the application core. These ports (interfaces)
    belong inside the business logic of the respective microservices as REST controllers.
    An adapter is provided by Spring runtime, which provides the functionality promised
    by the REST interface. A request from the browser will hit the `Product Web` microservice,
    which is the consumer microservice. The `Product Web` microservice doesn’t perform
    any business logic; instead, it delegates the calls to the `Product Server` microservice,
    which is the provider microservice. The objective of keeping the `Product Web`
    microservice simple is to demonstrate how to initiate inter-microservice communication
    so that you can use and extend this template for real-world cases.


    The `RestTemplate` in the `Product Web` microservice is another port, which again
    is nothing more than a specification on how it is used by the application core.
    A concrete-driven adapter that implements the `RestTemplate` port is injected
    into the application core by Spring wherever and whenever the port is required
    (type-hinted).


    The `Product` entity fulfills the application core in the `Product Server` microservice.
    Here again, I avoided the typical layering of service and component stereotype
    classes to keep the overall complexity of the example simple.


    `ProductRepository` is the third port used by the `Product Server` microservice.
    The purpose of the `Product Server` microservice is to persist data. So you create
    a persistence interface that meets its needs, with methods to do CRUD operations
    in a NoSQL collection using the ID of the entity. At that point, whenever and
    wherever the application needs to execute CRUD operations, the application core
    will need an object that implements the persistence interface that you defined,
    which is supplied by Spring runtime.


