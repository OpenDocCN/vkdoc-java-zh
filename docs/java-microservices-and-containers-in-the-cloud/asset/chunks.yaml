    ### 设计微服务


    本示例采用了图 1-13（位于第 1 章）中描绘的六边形微服务设计。该设计在图 2-1 中再次展示。


    ![](img/619782_1_En_2_Fig1_HTML.jpg)


    模型图将终端用户和浏览器通过传入命令或查询、REST API、产品 REST 控制器、以及带有 REST 模板的传出命令或查询连接到产品 Web 微服务，并通过传入命令或查询、REST
    API、控制器、产品仓库、产品实体和 Mongo DB 连接到产品服务微服务。


    图 2-1


    消费者与提供者微服务设计


    图 2-1 中展示的两个微服务都在 REST 接口处使用了 HTTP 端口，这些端口规定了用户浏览器或其他 HTTP 客户端如何使用应用核心。这些端口（接口）作为
    REST 控制器，属于各自微服务的业务逻辑内部。Spring 运行时提供了一个适配器，该适配器实现了 REST 接口所承诺的功能。来自浏览器的请求将命中作为消费者微服务的
    Product Web 微服务。Product Web 微服务不执行任何业务逻辑；相反，它将调用委托给作为提供者微服务的 Product Server 微服务。保持
    Product Web 微服务简单的目的是演示如何启动微服务间的通信，以便您可以在实际场景中使用和扩展此模板。


    Product Web 微服务中的`RestTemplate`是另一个端口，它同样只是应用核心如何使用它的一个规范。一个实现了`RestTemplate`端口的具体驱动适配器，会在任何需要该端口的地方（通过类型提示）由
    Spring 注入到应用核心中。


    `Product`实体在 Product Server 微服务中实现了应用核心。同样，我避免了典型的分层服务和组件构造型类，以保持示例的整体复杂性简单。


    `ProductRepository`是 Product Server 微服务使用的第三个端口。Product Server 微服务的目的是持久化数据。因此，您需要创建一个满足其需求的持久化接口，其中包含使用实体
    ID 在 NoSQL 集合中执行 CRUD 操作的方法。此时，无论何时何地，只要应用程序需要执行 CRUD 操作，应用核心就需要一个实现了您定义的持久化接口的对象，该对象由
    Spring 运行时提供。


    ### 代码组织


    本书的源代码可通过本书的产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。示例代码的组织方式如代码清单
    2-1 所示，位于 `ch02\ch02-01` 文件夹内。这遵循标准的 Maven 结构，因此 `pom.xml` 位于目录的根目录。


    ```

    ├── 01-ProductServer

    │   ├── pom.xml

    │   └── src

    │       └── main

    │           ├── java

    │           │   └── com

    │           │       └── acme

    │           │           └── ecom

    │           │               └── product

    │           │                   ├── EcomProductMicroApp.java

    │           │                   ├── InitComponent.java

    │           │                   ├── controller

    │           │                   │   └── ProdRestControl.java

    │           │                   ├── model

    │           │                   │   └── Product.java

    │           │                   └── repository

    │           │                       ├── ProductRepository.java

    │           │                       └── ProdRepConfig.java

