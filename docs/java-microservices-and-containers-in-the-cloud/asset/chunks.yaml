    The `plan` command lets you see what Terraform will do before making any changes.
    Next, you can validate the Terraform plan, as shown in Listing [14-12](#619782_1_En_14_Chapter.xhtml#PC14).


    ```

    (base) binildass-MacBook-Pro:ch14-01-temp binil$ terraform plan

    var.ami_id

    Enter a value: ami-061058b2c8f7fb264

    var.ami_key_pair_name

    Enter a value: bdca-key-01

    var.ami_name

    Enter a value: bdca-Instance-03

    ...

    Listing 14-12

    Terraform Plan

    ```


    This is a nice way to sanity-check your code before attempting to create the actual
    infrastructure. Next you can go about applying the scripts. The `apply` command
    shows you the same plan output and asks you to confirm whether you want to proceed
    with this plan. See Listing [14-13](#619782_1_En_14_Chapter.xhtml#PC15).


    ```

    (base) binildass-MacBook-Pro:005-aws-ec2-ssh binil$ terraform apply

    var.ami_id

    Enter a value: ami-061058b2c8f7fb264

