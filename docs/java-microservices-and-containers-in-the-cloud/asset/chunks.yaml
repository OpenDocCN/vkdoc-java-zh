    As in Listing [8-40](#619782_1_En_8_Chapter.xhtml#PC42), you can verify that the
    newly inserted product through the Product Web microservice web app is safely
    persisted in the PostgreSQL database inside the container. Once you complete testing
    the microservices, you can then stop and remove the microservice containers and
    clean the environment using the script shown in Listing [8-41](#619782_1_En_8_Chapter.xhtml#PC43).


    ```

