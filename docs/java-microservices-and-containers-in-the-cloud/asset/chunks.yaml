    NAME                        DESIRED   CURRENT   READY   AGE

    replicaset.apps/myfirstspringboot-springboothelm-5575ff4d84   1         1         1       10m

    (base) binildass-MacBook-Pro:~ binil$

    Listing 12-44

    Verify the Helm-Based Deployment in Kubernetes

    ```


    As a last step, you can also delete the release, as shown in Listing [12-45](#619782_1_En_12_Chapter.xhtml#PC48).


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm delete myfirstspringboot

    release "myfirstspringboot" uninstalled

    (base) binildass-MacBook-Pro:ch12-05 binil$

    Listing 12-45

    Deleting a Helm Release

    ```


    You can then verify that it was deleted, as shown in Listings [12-46](#619782_1_En_12_Chapter.xhtml#PC49)
    and [12-47](#619782_1_En_12_Chapter.xhtml#PC50).


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl get all

    NAME                 TYPE        CLUSTER-IP   EXTERNAL-IP  PORT(S)  AGE

    service/kubernetes   ClusterIP   10.96.0.1           443/TCP  12d

    (base) binildass-MacBook-Pro:~ binil$

    Listing 12-47

    Verify the Helm-Based Deployment in Kubernetes

    ```


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm list -a

    NAME      NAMESPACE      REVISION      UPDATED      STATUS      CHART      APP
    VERSION

    (base) binildass-MacBook-Pro:ch12-05 binil$

    Listing 12-46

    Verify the Helm Installation

    ```


    I hope you enjoyed your first Helming exercise. In the next section, you will
    Helm-release the multi-microservice example.


    ## Helm-Packaging Multi-Microservices


    You learned how Helm can enable the packaging and deployment of microservices
    in Kubernetes in the previous sections. However, that example is not complex enough
    to enable you to appreciate the true benefits of Helm. This section shows you
    how to use Helm to package and deploy your multi-microservices projects.'
