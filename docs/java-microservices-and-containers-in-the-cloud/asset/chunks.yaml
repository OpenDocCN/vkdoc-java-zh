    Server startup in [100] milliseconds

    清单 7-5

    Tomcat 容器正在运行

    ```


    清单 7-5 展示了一个正在运行的 Tomcat 容器。由于使用了`-it`选项，Docker 会捕获并提供容器输出，这些输出会显示在控制台中。当你运行此命令时，Docker
    会从托管在 Docker Hub 上的 Tomcat 公共仓库安装`tomcat:latest`并运行该软件。在 Docker 安装并启动 Tomcat 后，终端上会写入一行看似随机的字符。这串字符是刚刚为运行
    Tomcat 而创建的容器的唯一标识符。每次调用`docker run`命令并创建一个新容器时，这个新创建的容器都会获得一个类似的唯一标识符。


    现在，你可以再次列出 Docker 容器，如清单 7-6 所示。


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker ps

    CONTAINER ID  IMAGE   COMMAND  CREATED  STATUS  PORTS   NAMES

    5b621bcd9dd1  tomcat  "catalina.sh run"  About a minute ago   Up About a minute   0.0.0.0:8080->8080/tcp   priceless_chebyshev

    ...

    (base) binildass-MacBook-Pro:~ binil$

    清单 7-6

    列出 Docker 容器

    ```


    你可以看到刚刚启动的 Tomcat 容器，以及其他容器。要访问 Tomcat，如附录 E 所述，你必须先获取 minikube 的 IP 地址。参见清单 7-7。


    ```

    (base) binildass-MacBook-Pro:ch07-01 binil$ minikube ip

    192.168.64.5

    (base) binildass-MacBook-Pro:ch07-01 binil$

    清单 7-7

    查找 Minikube IP

    ```


    现在，你可以使用`curl`命令访问 Tomcat，如清单 7-8 所示。


    ```

    (base) binildass-MacBook-Pro:ch07-01 binil$ curl http://192.168.64.5:8080

    HTTP Status 404 – Not Found...

    (base) binildass-MacBook-Pro:ch07-01 binil$

    清单 7-8

    访问 Tomcat 容器

    ```


    你也可以使用浏览器，如图 7-14 所示。


    ![](img/619782_1_En_7_Fig14_HTML.jpg)


    一个网页浏览器窗口的截图，显示了一个 404 未找到错误信息。该信息以粗体文本显示。网址是 192.168.64.5。该浏览器连接不安全。


    图 7-14


    在 Tomcat 容器中访问“无 Web 应用”


    当你看到`404`错误时，可能会认为在安装 Docker 镜像时犯了错误。但这并非错误，而是出于 Docker 社区提出的安全考虑，设计上如此表现。你可以在
    Docker Hub 上 Tomcat 镜像的官方文档中找到此安全信息。参见图 7-15。


    ![](img/619782_1_En_7_Fig15_HTML.jpg)


    一个网页截图，内容是关于如何使用 Docker Tomcat 镜像的说明。它解释了出于安全原因，Web 应用默认未启用，并且这些应用位于镜像内的一个文件夹中，同时提供了如何运行
    Tomcat 服务器并在浏览器中测试的说明。


    图 7-15


    Docker Tomcat 通知


    你可以使用清单 7-9 中的代码停止 Tomcat 容器。


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker stop 5b62

    5b62

    (base) binildass-MacBook-Pro:~ binil$

    清单 7-9

    停止 Tomcat 容器


    请注意，`5b62`是清单 7-6 中容器 ID 的前四个字符。此容器在停止时，将保留所有设置和文件系统更改（位于可写的顶层）。容器中运行的所有进程都将停止，并且你将丢失内存中的所有内容。如果你现在尝试使用`curl`命令访问
    Tomcat，将会得到清单 7-10 所示的响应。


    ```

    (base) binildass-MacBook-Pro:~ binil$ curl http://192.168.64.5:8080

    curl: (7) Failed to connect to 192.168.64.5 port 8080: Connection refused

    (base) binildass-MacBook-Pro:~ binil$

    清单 7-10

    尝试访问 Tomcat 容器

    ```


    ## 无需 Java 即可构建和运行 Java 应用


    本节的目标是在没有 Java SDK 或 Java 运行时的开发机器上编译、打包、部署和运行一个 Java 应用。如何做到这一点？你可能已经猜到了，因为你正在学习使用
    Docker，对吧？使用 Docker！

    '
- fmt: '### Using a Maven Container


    You can run the official Maven Docker image as a container and further compile,
    package, and deploy a Java application. Let’s see how to use that here. First,
    set the Minikube environment variables in your terminal as mentioned in Listing
    [7-2](#619782_1_En_7_Chapter.xhtml#PC2). Next, run Docker, as shown in Listing
    [7-11](#619782_1_En_7_Chapter.xhtml#PC12).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run --rm -it maven mvn --version

    Unable to find image ''maven:latest'' locally

    latest: Pulling from library/maven

    d5fd17ec1767: Pull complete

    ...

    Status: Downloaded newer image for maven:latest

    Apache Maven 3.8.5 (3599d3414f046de2324203b78ddcf9b5e4388aa0)

