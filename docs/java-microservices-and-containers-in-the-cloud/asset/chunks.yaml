- fmt: '# 9. Composing Multi-Service Containers


    As microservices applications grow beyond a handful of services, we often need
    some way to define inter-dependency and inter-connectivity options between these
    services. We also need an elegant way to manage these services. Tools like Docker
    Compose and Kubernetes have quickly become commonplace for these types of requirements.
    This chapter looks at Docker Compose, followed by Kubernetes in the next chapter.


    Docker Compose is used for easily defining and running multi-container Docker
    applications or microservices. In the previous two chapters, you learned how to
    effectively utilize Docker to containerize applications. When it comes to microservices,
    any trivial application will have more than a dozen microservices, which is many
    more compared to the classical single `.ear` or single `.jar` kind of monolith
    deployments. With Docker Compose, you can use a single YAML file to configure
    your microservice application’s services. Then, with a single command, you create
    and start all the services from your YAML configuration. The following concepts
    are covered in this chapter.


    - A quick introduction to Docker Compose

    - Composing microservices and database containers together

    - Adding message broker containers to the composition

    - Demonstrating Full CRUD functionality across composed containers


    As has been mentioned, the objective is to explain and demonstrate aspects in
    gradually increasing levels of complexity. So, the code examples start from where
    the last chapter stopped. It’s best to read Chapter [8](#619782_1_En_8_Chapter.xhtml)
    before you read this chapter, so that you are acquitted with the basics of running
    container infrastructure. This chapter provides step-by-step instructions if you
    want to start straight into this chapter.


    ## Introducing Docker Compose


    As explained, when using Docker for containerization, managing many different
    containers can quickly become cumbersome. Docker Compose is a tool that helps
    you overcome this problem and handle multiple containers at once.


    Using Docker Compose for packaging and deployment management is basically a three-step
    process:


    1. You define your application’s environment with a Dockerfile so that it can
    be reproduced anywhere.

    2. You define the services that make up your application in `docker-compose.yml`
    so that they can be run together in an isolated environment.

    3. As the final step, you run `docker compose up`, and this command starts and
    runs your entire app.


    The next section delves into how this compose file looks.


    ### Docker Compose YAML


    In Docker Compose, you declare rules declared within a single `docker-compose.yml`
    configuration file. These YAML rules are both human-readable and machine-optimized,
    and hence verbal enough for you to declare the interdependencies of multiple containers.
    This helps you manage multiple microservices in a single application’s deployment
    landscape.


    In a Docker Compose YAML file, you need to specify the version of the Compose
    file format, at least one service, and optionally volumes and networks. The general
    format is shown in Listing [9-1](#619782_1_En_9_Chapter.xhtml#PC1).


    ```

    version: "3"

    services:

    ...

    ...

    volumes:

    ...

    networks:

    ...

    Listing 9-1

    Docker Compose YAML Format

    ```


    Volumes, as explained in the previous chapters, are physical areas of disk space
    in the host computer shared between the host and a container, or even between
    containers. In other words, a volume is a shared directory in the host, visible
    from containers that have access.


    Networks define the communication path and rules between containers, and between
    a container and the host. Shared or common network zones will make containers’
    services discoverable by each other, while private zones will segregate them into
    virtual sandboxes.


    Services are typically logical groupings of related container services. As an
    example, a web application with different tiers could be declared, as shown in
    Listing [9-2](#619782_1_En_9_Chapter.xhtml#PC2).


    ```

    services:

    app:

    image: my-js-app

    ...

    backend:

    image: my-boot-app

    ...

    db:

    image: mongo

    ...

    Listing 9-2

    Docker Composing Typical 3 Tier Service

    ```


    There are many more constructs available in Docker Compose, and in line with the
    theme of this book, you will learn by doing things.


    ### Docker Compose Use Cases


    Even though there are more tools available for managing containerized applications,
    Docker Compose has its use in a few scenarios, such as:


    - **Developer environment**: One of the best use cases for Docker Compose is in
    enabling developers to “getting started,” which is highly useful for new entrants
    to a project. Docker Compose can reduce a multi-page “developer getting started
    guide” into a single machine-readable Compose file and a few commands that anyone
    can bring up using a single button. The Docker Compose file provides a way to
    document and configure all the application’s service dependencies (databases,
    message queues, caches, web service APIs, presentation apps, etc.). Using the
    Compose command-line tool, you can create and start one or more containers for
    each dependency with a single `docker-compose up` command.


    - **Automating test environments**: Test automation is an essential part of any
    Continuous Deployment or Continuous Integration process and Docker Compose provides
    a convenient way to create and destroy testing environments custom defined for
    your test suite.


    You can create and destroy these environments in a few commands within a Compose
    file:


    ```

    docker-compose up

    ./run_your tests

    docker-compose down

    ```


    As mentioned, you will learn best by doing things, so let’s jump straight to concrete
    coding examples.


    ## Composing Microservice with PostgreSQL Containers


    Chapter [8](#619782_1_En_8_Chapter.xhtml) explained why it’s better to deploy
    state-handling applications including databases outside Docker container, since
    containers are designed to be more efficient in stateless kinds of operations.
    There can still be use cases where you’d want your database within a container,
    such as in cases of rapid testing. In Chapter [8](#619782_1_En_8_Chapter.xhtml),
    you saw a full-fledged microservice interaction with a PostgreSQL database, all
    in Docker containers. Refer to Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1)
    in Chapter [2](#619782_1_En_2_Chapter.xhtml) for the overall design of it. In
    this section, you will modify that example to be fully deployed within a container
    infrastructure using Docker Compose.


    ### Composing the Container Topology


    For this composition, you need a complete container-based deployment topology,
    as shown in Figure [9-1](#619782_1_En_9_Chapter.xhtml#Fig1). The Product Web and
    Product Server microservices are both containerized, and the Product Server microservice
    will connect to a PostgreSQL database, again deployed within a container.


    ![](images/619782_1_En_9_Chapter/619782_1_En_9_Fig1_HTML.jpg)


    A diagram illustrates the complete container-based deployment. It starts with
    user, followed by browser, command line, docker CLI, docker daemon, container
    engine, host OS, and hardware.


    Figure 9-1


    Composing microservice containers


    Here, the Product Web and Product Server containers provide business services,
    whereas the PostgreSQL container provides application services for persisting
    state.'
