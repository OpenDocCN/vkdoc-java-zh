    ```


    There are two presentation services or UI services in this project:


    *   [`http://products.acme.test`](http://products.acme.test): The user can interact
    with the Product Web microservice

    *   [`http://adminer.acme.test`](http://adminer.acme.test): The user can interact
    with the PostgreSQL database


    `Ingress` and the `Adminer` are the two new deployments in Listing [11-32](#619782_1_En_11_Chapter.xhtml#PC32),
    compared to those in Listing 10-41 in Chapter [10](#619782_1_En_10_Chapter.xhtml).
    Let’s investigate these new deployments one by one. See Listing [11-33](#619782_1_En_11_Chapter.xhtml#PC33).


    ```

    apiVersion: networking.k8s.io/v1

    kind: Ingress

    metadata:

    name: ingress-service

    annotations:

    kubernetes.io/ingress.class: nginx

    spec:

    rules:

    - host: "adminer.acme.test"

    http:

    paths:

    - path: /

    pathType: Prefix

    backend:

    service:

    name: adminer

    port:

    number: 8080

    - host: "products.acme.test"

    http:

    paths:

    - path: /

    pathType: Prefix

    backend:

    service:

    name: product-web

    port:

    number: 8080

    Listing 11-33

    The Pod Definition YAML File for Ingress (ch11\ch11-03\ingress-controller.yml)

    ```


    First, you specify the `kind` of the Kubernetes object you want to create, which
    is `Ingress`. It’s followed by `metadata` with the name of the object as usual
    and a new section, called `annotations`. You can configure the behavior of the
    `Ingress`. This example uses the simplest one, but there are many more possibilities.
    The `spec` section includes the first rule—that all requests from the `adminer.acme.test`
    host be routed to the `ClusterIP` with a name (`adminer`) and the requests from
    the `products.acme.test` host be routed to the `ClusterIP` with a name (`product-web`).


    The next component is the `Adminer` UI, which is a UI to the PostgreSQL database.
    See Listing [11-34](#619782_1_En_11_Chapter.xhtml#PC34).


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: adminer

    labels:

    app: adminer

    group: db

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: adminer

    template:

    metadata:

    labels:

    app: adminer

    group: db

    spec:

    containers:

    - name: adminer

    image: adminer:4.8.1-standalone

    ports:

    - containerPort: 8080

    imagePullPolicy: IfNotPresent

    env:

    - name: ADMINER_DESIGN

    value: pepa-linha

    - name: ADMINER_DEFAULT_SERVER

    value: postgres

    Listing 11-34

    The Pod Definition YAML File for Adminer (ch11\ch11-03\adminer-deployment.yml)

    ```


    The initial section is responsible for defining what kind of object you’re creating
    (`apiVersion`, `kind`) followed by some metadata, including `name`, `labels`,
    and `app group` (`metadata`). It then mentions the `image` to use for the container
    and a few other environment variables. It also defines an `Adminer` service. See
    Listing [11-35](#619782_1_En_11_Chapter.xhtml#PC35).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: adminer

    labels:

    group: db

    spec:

    type: ClusterIP

    selector:

    app: adminer

    ports:

    - port: 8080

    targetPort: 8080

    Listing 11-35

    The Service Definition YAML File for Adminer (ch11\ch11-03\adminer-svc.yml)

    ```


