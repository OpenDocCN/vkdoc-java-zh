    ## Composing Microservices with MongoDB and Kafka


    Here again this example reuses the microservices from the section titled “Microservices
    Using MongoDB with CrudRepository” in Chapter [3](#619782_1_En_3_Chapter.xhtml).


    This example uses the same two microservices—a consumer and a provider microservice.
    However, they communicate with each other using a Kafka messaging channel.


    ### Composing the Container Topology


    For this current design, you need a complete container-based deployment topology,
    as shown in Figure [9-4](#619782_1_En_9_Chapter.xhtml#Fig4). The Product Web and
    Product Server microservices are containerized, and the Product Server microservice
    will connect to a MongoDB database, again deployed within a container. All communications
    between the Product Web microservice and the Product Server microservice are through
    Kafka.


    ![](images/619782_1_En_9_Chapter/619782_1_En_9_Fig4_HTML.jpg)


    A diagram illustrates the microservice containers. It includes products web mu
    S, product server mu S, container engine, host O S, product web mu S, product
    server mu S, and hardware.


    Figure 9-4


    Composing microservice containers


    Here, the Product Web and Product Server containers provide business services,
    whereas the Mongo container provides application services for persisting state.
    Kafka containers provide infrastructure services, so they are not shown as part
    of any specific (business) microservice.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch09\ch09-04` folder and the
    code organization is shown in Listing [9-20](#619782_1_En_9_Chapter.xhtml#PC26).
    Much of the source code in this example is similar to `ch03\ch03-02`, which was
    explained in detail in Chapter [3](#619782_1_En_3_Chapter.xhtml), in the section
    titled “Microservices Using MongoDB and CrudRepository.” In the section titled
    “CRUD Microservices over Kafka on MongoDB” in Chapter [6](#619782_1_En_6_Chapter.xhtml),
    you saw the code required for the Product Web and Product Server microservices
    to communicate with each other over the Kafka messaging channel, so those details
    are not covered again here. Further, you also saw Docker Compose-based deployment
    of the topology of a major portion of Figure [9-4](#619782_1_En_9_Chapter.xhtml#Fig4)
    in the section titled “Composing Microservice with MongoDB Containers.”


    A major part of the `docker-compose.yml` file is similar to the one shown in Listing
    [9-21](#619782_1_En_9_Chapter.xhtml#PC27). Listing [9-32](#619782_1_En_9_Chapter.xhtml#PC39)
    shows only the changes.


    ```

    version: "3"

    services:

    ...

    db:

    image: mongo:3.6

    container_name: mongo

    ports:

    - "27017:27017"

    networks:

    - ecom-network

    ...

    Listing 9-32

    The Docker Compose YAML File (ch09\ch09-04\docker-compose.yml)

    ```


    In fact, the MongoDB configuration in Listing [9-32](#619782_1_En_9_Chapter.xhtml#PC39)
    has become simpler in this case.


    The Dockerfile for the microservices is similar to the previous example in Listing
    [9-22](#619782_1_En_9_Chapter.xhtml#PC29). This too is configured as a three-stage
    build.'
