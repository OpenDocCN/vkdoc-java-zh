  trans: '

    ### 微服务是自治的


    您知道微服务之间会相互通信，因为单个微服务可能不足以完成端到端的业务用例。同时，微服务架构的目标之一是每个微服务都是自治的，并且对客户端消费者可用，即使构成端到端应用流程的其他微服务宕机或不健康也是如此。这超越了微服务拥有并封装自身数据这一基本原则。


    当微服务使用典型的同步风格 REST 进行通信时，它们被称为以点对点的方式进行通信。因此，HTTP 传输是一个点对点通道，它确保只有一个接收者会收到特定的消息（见图
    4-1）。


    ![](img/619782_1_En_4_Fig1_HTML.jpg)


    一个点对点通信系统的示意图。它描绘了左侧的一个发送者，向一个接收者发送请求。


    图 4-1

    点对点通信


    图 4-1 展示了一个订单微服务。订单被创建，然后发送到调度微服务。当您从订单微服务调用调度微服务时（例如，为调度订单事件执行 HTTP 请求），这个调用链可以向客户端应用程序提供响应。当这些微服务中的某些发生故障时，这种架构的弹性将不足。换句话说，如果提供者微服务无法在
    SLA 内响应，消费者微服务将收到一个错误。


    ### 微服务是演进的


    一个更好的替代方案是在微服务之间采用松耦合。您可以用消息通道替代 HTTP 通道。同样，消息队列是点对点的，因此您需要使用消息主题，它是一对多的。主题提供了发布-订阅语义，它会将特定事件的副本传递给每个订阅的接收者。


    在发布-订阅通道中，一个输入通道分成多个输出通道，每个输出通道对应一个订阅者微服务。当一个事件被发布到通道中时，发布-订阅通道会将消息的副本传递给每个输出通道。每个输出通道只有一个订阅者微服务，该服务只允许消费一次消息。这样，每个订阅者只会收到一次消息；消费过的副本会从它们的通道中消失。见图
    4-2。


    ![](img/619782_1_En_4_Fig2_HTML.jpg)


    一个发布-订阅通道的流程图。它从发布者向订阅者交付订单开始。订阅者被调度并收到通知。


    图 4-2

    发布-订阅通道


    这种发布-订阅通道不仅为单个微服务带来了更多的自治性，还允许微服务应用随着时间的推移按自己的节奏演进。换句话说，如图 4-2 所示，当微服务应用随时间增长，您需要添加更多微服务时，无需干扰现有架构；甚至无需重启现有的应用部署！


    ### 蜂巢类比


    到目前为止的讨论让我们想到了微服务架构的蜂巢类比。微服务应用架构从第一个、单个微服务开始，逐渐增长到更多的微服务，就像建造蜂巢一样（见图 4-3）。


    ![](img/619782_1_En_4_Fig3_HTML.jpg)


    一个类似微服务的蜂巢结构流程图。它从一个六边形结构开始，最终形成蜂巢结构的 6 个六边形。


    图 4-3

    微服务蜂巢类比


    下一节将探讨消息基础设施作为微服务间通信的媒介。


    ## 异步，仍是请求-回复


    我在上一节中故意省略了另一个重要方面，即典型的微服务间通信需要请求-回复语义。消息通道是异步的，通常是单向的，或者仅仅是请求。那么，您如何获得相应的回复呢？本节将讨论这个问题。


    ### 异步请求


    HTTP 通道不仅是同步的，而且还为发送者提供了一种接收回复或响应的机制。然而，如前所述，要充分发挥基于消息的架构的优势，事件委托机制必须是天生异步的。然而，可能有许多用例仍然需要同步风格的请求-回复语义。挑战在于如何在本质上是单向通道的消息通道上模拟请求-回复语义。


    ### 异步请求-回复


    当应用程序发送消息时，它如何通过消息通道从接收者那里获得相应的响应？请求-回复企业集成模式提供了一种经过验证的机制，用于在异步通道上进行同步风格的消息交换（见图
    4-4）。


    ![](img/619782_1_En_4_Fig4_HTML.jpg)


    一个请求-回复的流程图。发送者应接收者的请求调度了一个订单。图中描绘了一条同步消息。


    图 4-4

    通过异步实现请求-回复


    解决方案是发送一对请求-回复消息，每条消息都在自己的通道上。但有一个问题。服务提供者或接收者（或服务器角色微服务）可以在其公布的知名通道上接受请求。但是客户端的通道地址呢？多个客户端可以连接到同一个服务器角色的微服务进程，服务器不可能知道或记住回复通道，因为客户端来来去去，未来还可能出现更多的新客户端。相反，一种经过验证的方法是让请求消息包含一个返回地址，指示将回复消息发送到哪里（见图
    4-5）。


    ![](img/619782_1_En_4_Fig5_HTML.jpg)


    一个返回地址模式的示意图。它从两个请求者开始，它们通过不同的通道向一个回复者发送请求并接收回复。


    图 4-5

    返回地址模式


    通过将返回地址附加到请求中，回复者无需知道或记住将回复发送到哪里。它只需检查并从请求中推断出来。如果发送给同一个回复者的不同消息需要回复到不同的地方，回复者可以推断出每个请求对应的回复应发送到哪里。这将使用哪些通道进行请求和回复的知识封装在请求者内部，因此这些决策不必硬编码在回复者中。返回地址被放置在消息的头部，因为它不是正在传输的数据的一部分，并且消息传输基础设施无需检查有效载荷。


    下一节将用代码演示这个过程。


    ## 微服务上的同步与异步


    在此示例中，您将调整之前看到的同一组微服务。一个消费者微服务和一个提供者微服务将使用消息通道相互通信。为简化示例，提供者微服务将实体存储在内存数据库中。

    '
- fmt: '### Design Microservices Over Async Channel


    This example slightly modifies the hexagonal microservice view shown in Figure
    [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter [2](#619782_1_En_2_Chapter.xhtml)
    so that both microservices communicate through an async messaging channel instead
    of the HTTP channel. Apache Kafka is used as the messaging channel, which is inherently
    asynchronous. Remember, the objective is to simulate synchronous styled communication
    over the Kafka-based async channel. See Figure [4-6](#619782_1_En_4_Chapter.xhtml#Fig6).


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig6_HTML.jpg)


    A flow diagram of communication of microservices. It starts with the incoming
    command, Rest API, entity, request channel, and the final entity.


    **Figure 4-6** Microservices communicate over async channel


    The end user request from the browser will reach the Product Web microservice
    first. The Product Web microservice will delegate the request to the Product Server
    microservice, but through a message channel. The Product Server microservice could
    automatically know which channel to send replies to the Product Web microservice,
    but as discussed earlier, hard-coded assumptions make the software less flexible
    and more difficult to maintain. In this case, a single Product Server microservice
    instance could be processing calls from several different requestor types and/or
    even from multiple instances of the same requestor type, so the reply channel
    is not the same for every message. It depends on which requestor sent that request
    message. You can use the return address pattern in this case.


    Note that the Product Server microservice in this example is using a messaging
    port, in contrast to the HTTP port used in previous examples. This further validates
    the aspect of how different ports and adapters in the hexagonal architecture can
    be plugged in easily, as and when required.


    ### Understanding the Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch04\ch04-01` folder. This
    section looks at the changes in the consumer microservice—that is, the Product
    Web microservice—first.


    The core component used is the `ReplyingKafkaTemplate<K,V,R>` from Spring, which
    extends the behavior of a `KafkaTemplate` to provide request-reply semantics.
    To set this up, you need a producer (`ProducerFactory`) and a `KafkaMessageListenerContainer`.
    Listing [4-1](#619782_1_En_4_Chapter.xhtml#PC1) shows how to do this using a Kafka
    `Configuration` class.


    ```java

    @Configuration

    public class KafkaConfig {

    @Bean

    public Map producerConfigs() {

    // config values goes here

    }

    @Bean

    public Map consumerConfigs() {

    // config values goes here

    }

    @Bean

    public ProducerFactory producerFactory() {

    return new DefaultKafkaProducerFactory(

    producerConfigs());

    }

    @Bean

    public KafkaTemplate kafkaTemplate() {

    return new KafkaTemplate(producerFactory());

    }

    @Bean

    public ReplyingKafkaTemplate

    replyKafkaTemplate(ProducerFactory pf, KafkaMessageListenerContainer container){

    return new ReplyingKafkaTemplate(pf, container);

    }

    @Bean

    public KafkaMessageListenerContainer

    replyContainer(

    ConsumerFactory cf) {

    ContainerProperties containerProperties =

    new ContainerProperties(requestReplyTopic);

    return new KafkaMessageListenerContainer(cf,

    containerProperties);

    }

    @Bean

    public ConsumerFactory

    consumerFactory() {

    return new DefaultKafkaConsumerFactory(

    consumerConfigs(),

    new StringDeserializer(),new JsonDeserializer(

    Products.class));

    }

    @Bean

    public KafkaListenerContainerFactory>

    kafkaListenerContainerFactory() {

    ConcurrentKafkaListenerContainerFactory factory =

    new ConcurrentKafkaListenerContainerFactory();

    factory.setConsumerFactory(consumerFactory());

    factory.setReplyTemplate(kafkaTemplate());

    return factory;

    }

    @Bean

    public KafkaAdmin admin() {

    Map configs = new HashMap();

    configs.put(ConsumerConfig.BOOTSTRAP_SERVERS_CONFIG,

    bootstrapServers);

    return new KafkaAdmin(configs);

    }

    @Bean

    public NewTopic requestTopic() {

    Map configs = new HashMap();

    configs.put("retention.ms", replyTimeout.toString());

    return new NewTopic(requestReplyTopic, 2, (short) 1).

    configs(configs);

    }

    }

    ```


    **Listing 4-1** Kafka Configuration for Message Producer (`ch04\ch04-01\02-ProductWeb\src\main\java\com\acme\ecom\product\KafkaConfig.java`)


    To understand the event transport mechanics, consider how a typical event (aka,
    a message) will look:


    - Event key: “Ria”

    - Event value: “Made a payment of $300 to Ann”

    - Event timestamp: “Sep. 25, 2021 at 3:06 p.m.”


    There is an originator for an event, and events are typically time series data.
    If you look at the template for sending an event, the `ReplyingKafkaTemplate <K,
    V, R>` offers a return object or a reply object once the message is consumed by
    the Kafka listener from the provider or producer side. The type parameters represent:


    - `K` – The key type

    - `V` – The outbound data type

    - `R` – The reply data type


    Here, the event timestamp shown in the example event could be an optional metadata
    header. Keys are used to determine the partition in a log in the messaging infrastructure
    to which a message is appended. Value is the actual payload of the message. When
    a new event is published to a topic, it is appended to one of the topic’s partitions.
    Events with the same event key (e.g., a Customer ID or Account ID) are written
    to the same partition, and Kafka guarantees that any consumer of a given topic-partition
    will always read that partition’s events in the same order as they were written.


    The key and/or value can be null, too. If the key is null, then a random partition
    will be selected. If the value is null, it can have special “delete” semantics
    if you enabled the log-compaction policy instead of the log-retention policy for
    a topic.'
