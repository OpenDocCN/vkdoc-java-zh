    To understand this concept, recall the first example in Chapter [11](#619782_1_En_11_Chapter.xhtml).
    In the Product Server microservice, you defined three replicas for the server
    instance, as shown in Listing [12-25](#619782_1_En_12_Chapter.xhtml#PC26).


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: product-server

    ...

    spec:

    replicas: 3

    ...

    template:

    ...

    spec:

    containers:

    - name: product-server

    ...

    env:

    - name: DB_SERVER

    value: postgres

    - name: spring.kafka.bootstrap-servers

    value: kafka-1-ip-service:9092

    Listing 12-25

    The Product Server Pod YAML File (ch11\ch11-01\product-server-deployment.yml)

    ```


    Suppose that you need only one instance in staging. To do this, you need to update
    the `replica` value in the descriptor and deploy it in Kubernetes. A better approach
    is to use Helm so you can parameterize the fields depending on the environment.
    In this example, instead of using a static value for replicas, you can use the
    value for these fields from another file. This file is called `values.yaml`. In
    this manner, Helm helps you separate the configurable field value from the actual
    YAML descriptors.


    In the next section, you’ll learn more by doing.


    ## Helm Package Microservice


    This section shows you how to Helm-enable the previous example in this chapter.
    As mentioned in Appendix E, I assume that you have installed Helm on your machine.


    ### Code Organization


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for the example is organized as shown in Listing [12-25](#619782_1_En_12_Chapter.xhtml#PC26),
    inside the `ch12\ch12-05` folder. This follows the standard Maven structure so
    that the `pom.xml` file is in the root directory. This also contains a new folder
    called `springboothelm`, with many files inside it, as shown in Listing [12-26](#619782_1_En_12_Chapter.xhtml#PC27).


    ```

    ./ch12-05/

    ├── README.txt

    ├── clean.sh

    ├── make.sh

    ├── pom.xml

    ├── springboothelm

    │   ├── Chart.yaml

    │   ├── charts

    │   ├── templates

    │   │   ├── NOTES.txt

    │   │   ├── _helpers.tpl

    │   │   ├── deployment.yaml

    │   │   ├── ingress.yaml

    │   │   ├── service.yaml

    │   │   ├── serviceaccount.yaml

    │   │   └── tests

    │   │       └── test-connection.yaml

    │   └── values.yaml

    └── src

    └── main

    ├── java

    │   └── com

    │       └── acme

    │           └── ecom

    │               └── product

    │                   └── Application.java

    └── resources

    ├── application.yml

    └── log4j2-spring.xml

    Listing 12-26

    Spring Boot Microservices Source Code Organization

    ```


    Don’t panic; you don’t need to hand-create all these files. Instead, you can auto-generate
    many of them.


    ### Creating Your First Helm Chart


    Before you start creating your first Helm chart, make sure Minikube is running
    as mentioned in Listing [12-7](#619782_1_En_12_Chapter.xhtml#PC7), since you need
    to have a Kubernetes cluster.


    Next, from the source code downloaded for this example (`ch12\ch12-05`), delete
    the `springboothelm` folder. Then, from the root of the project folder, create
    your first Helm chart. See Listing [12-27](#619782_1_En_12_Chapter.xhtml#PC28).


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-05

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm create springboothelm

    Creating springboothelm

    (base) binildass-MacBook-Pro:ch12-05 binil$ tree ./springboothelm/

    ./springboothelm/

    ├── Chart.yaml

    ├── charts

    ├── templates

    │   ├── NOTES.txt

    │   ├── _helpers.tpl

    │   ├── deployment.yaml

    │   ├── hpa.yaml

    │   ├── ingress.yaml

    │   ├── service.yaml

    │   ├── serviceaccount.yaml

    │   └── tests

    │       └── test-connection.yaml

    └── values.yaml

    3 directories, 10 files

    (base) binildass-MacBook-Pro:ch12-05 binil$

    Listing 12-27

    Creating Your First Helm Chart

    ```


    Let’s look at `Chart.yaml` first. This file contains all the metadata about the
    Helm chart example. See Listing [12-28](#619782_1_En_12_Chapter.xhtml#PC29).


    ```

    apiVersion: v2

    name: springboothelm

    description: A Helm chart for Kubernetes

    type: application

    version: 0.1.0

    appVersion: "1.16.0"

    Listing 12-28

    The Chart YAML File (ch12/ch12-05/springboothelm\Chart.yaml)

    ```


    The `apiVersion`, `name`, and `version` fields are mandatory. There are no strict
    rules for the `apiVersion`. Each chart should have its own version number and
    it should follow the Semantic Versioning 2.0.


    Listing [12-29](#619782_1_En_12_Chapter.xhtml#PC30) shows the `values.yaml` file.


    ```

    # Default values for springboothelm.

    # This is a YAML-formatted file.

    # Declare variables to be passed into your templates.

    replicaCount: 1

    image:

    repository: binildas/spring-boot-docker-k8s-helm

    pullPolicy: IfNotPresent

    imagePullSecrets: []

    nameOverride: ""

    fullnameOverride: ""

    ...

    Listing 12-29

    The Values YAML File (ch12/ch12-05/springboothelm/values.yaml)

    ```


    This file is quite verbose, but luckily you don’t need to manage all its contents.
    For the purposes here, you just need to update two lines:


    ```

    repository: binildas/spring-boot-docker-k8s-helm

    port: 8080

    ```


    The next configuration you need to update is `deployment.yaml`. As the name suggests,
    it is used for deployment purposes. Listing [12-30](#619782_1_En_12_Chapter.xhtml#PC32)
    shows the `deployment.yaml` file.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: {{ include "springboothelm.fullname" . }}

    labels:

    {{- include "springboothelm.labels" . | nindent 4 }}

    spec:

    replicas: {{ .Values.replicaCount }}

    selector:

    matchLabels:

    {{- include "springboothelm.selectorLabels" . | nindent 6 }}

    ...

    Listing 12-30

    The Deployment YAML File (ch12/ch12-05/springboothelm/templates/deployment.yaml)

    ```


    This file is also quite verbose, but luckily you don’t need to manage all its
    contents either. For the purposes here, you just need to update one line:


    ```

    containerPort: 8080

    ```


    You need to do this because you need to deploy the Spring Boot application on
    port `8080`.


    The `service.yaml` file is used to expose the Kubernetes `springboothelm` deployment
    as service. You don’t need to make any changes to the `service.yaml` file.


    ### Confirming Helm Chart Accuracy


    You are almost ready with your first Helm chart for your Spring Boot application.
    It’s smart to check the `service.yaml` and `deployment.yaml` files to confirm
    everything looks fine. For that, you should get out from the `springboothelm`
    directory (on the project root folder), and then execute the command in Listing
    [12-31](#619782_1_En_12_Chapter.xhtml#PC34).


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-05

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm template springboothelm

    Listing 12-31

    Template Helm Chart

    ```


    Running this command will return the `service.yaml`, `deployment.yaml`, and `test-connection.yaml`
    files with actual values so that you can verify whether all is right.


    As an optional step, there is one more sanitary command provided by Helm, called
    `lint`, which you can use to identify possible issues in advance. See Listing
    [12-32](#619782_1_En_12_Chapter.xhtml#PC35).


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-05

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm lint springboothelm

    ==> Linting springboothelm

    [INFO] Chart.yaml: icon is recommended

    1 chart(s) linted, 0 chart(s) failed

    Listing 12-32

    Use lint on the Helm Chart

    ```


    You can also use the following `-dry-run` command to verify your Spring Boot Helm
    chart. See Listing [12-33](#619782_1_En_12_Chapter.xhtml#PC36).


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-05

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm install springboothelm --debug
    --dry-run springboothelm

    ...

    Listing 12-33

    Dry Run of the Helm Chart

    ```


    If there is something wrong with your Helm chart configuration, this check will
    prompt you about it immediately.'
