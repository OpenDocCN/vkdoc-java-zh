    ## Summary


    One major benefit of an event-driven architecture using a message-oriented microservice
    is decoupling the event producer microservice from the event consumer microservice,
    allowing for more flexible and evolvable systems. Relying on a synchronous Request-Reply
    semantics is the exact opposite, where the producer and consumer microservices
    are tightly coupled. This should only be used when needed. If synchronous Request-Reply
    is required, an HTTP-based protocol is much simpler, more straightforward, and
    more efficient than using an asynchronous channel like Apache Kafka. Having said
    this, there may be scenarios when using synchronous styled Request-Reply makes
    sense. You might need to wisely choose from the combination of available choices
    for the job at hand. The examples in this chapter have demonstrated the retrieval
    of a collection of Product entities over a messaging channel. You might now naturally
    think about whether the style of inter-microservice interactions explained in
    this chapter could be used in real life to cover full-fledged business use cases,
    and this is what Chapter [6](#619782_1_En_6_Chapter.xhtml) covers.


    # 6. Production Grade Message Oriented Microservices


    Chapter [4](#619782_1_En_4_Chapter.xhtml) explained how messaging middleware can
    play a key role in providing a bridge for microservices to communicate with each
    other in a loosely coupled manner. Messaging channels are typically characterized
    by the asynchronous style of interaction, but Chapters [4](#619782_1_En_4_Chapter.xhtml)
    and [5](#619782_1_En_5_Chapter.xhtml) attempted to show how a synchronous user
    experience can be attained, even over asynchronous messaging channels. This is
    the first step in providing confidence that loosely coupled, messaging-based microservice
    interactions can be leveraged to implement many, if not all, your functional use
    cases. As mentioned in Chapter [5](#619782_1_En_5_Chapter.xhtml), many engineers
    are still skeptical on whether they can use events and the event paradigm for
    inter-microservices communication in a synchronous manner to implement a full
    data management paradigm. This chapter attempts to address that skepticism.


    This chapter is fully hands on, with examples. An overview and working experience
    with the examples in Chapter [5](#619782_1_En_5_Chapter.xhtml) is required for
    you to quickly understand the enhanced examples in this chapter.


    This chapter covers the following concepts:


    *   Protocols and message formats for message exchange

    *   Full CRUD (create, read, update, delete) functionality across microservices
    using Kafka in between

