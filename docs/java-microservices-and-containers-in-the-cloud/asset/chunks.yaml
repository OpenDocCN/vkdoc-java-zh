    `ProductRestController` 是主要适配器或驱动适配器，它封装了一个 HTTP 端口。你使用它来告诉应用程序核心该做什么。它将来自交付机制（本例中为浏览器请求）的任何内容转换为应用程序核心中的方法调用。


