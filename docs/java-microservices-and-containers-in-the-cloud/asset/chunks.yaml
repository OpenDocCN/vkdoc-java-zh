    ## Build a Microservice Using a Dockerfile


    This section explains how to deploy a microservice using a Dockerfile. It uses
    the same microservice deployed in the section titled “Your First Java Microservice”
    in Chapter [1](#619782_1_En_1_Chapter.xhtml).


    ### Dockerfiles


    A *Dockerfile* is a recipe using a plain text file to build a Docker Image. Each
    Dockerfile specifies a base image that the Docker engine will use to build upon.
    The Dockerfile then contains a series of instructions on how to build the image.
    You instruct Docker to create a Docker image based on the Dockerfile. The `docker
    build` command runs within a build context. The build’s context has the files
    at a specified location, which can be a `PATH` or an `URL`. The `PATH` is a directory
    in your local filesystem and the `URL` is a Git repository location. The context
    is processed recursively. `PATH` also includes any subdirectories. The URL will
    include the repository and its submodules.


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch07\ch07-03` folder. Much
    of the source code in this example is similar to the code in `ch01\ch01-01`. Hence,
    this section does not review the microservice code. It looks at several deployment
    aspects, especially those using the Dockerfile. See Listing [7-35](#619782_1_En_7_Chapter.xhtml#PC38).


    ```dockerfile

    FROM openjdk:8-jdk-alpine

    VOLUME /tmp

    ARG JAR_FILE

    COPY ${JAR_FILE} ecom.jar

    ENTRYPOINT ["java","-jar","/ecom.jar"]

    Listing 7-35

    The Dockerfile (ch07\ch07-03\Dockerfile)

    ```


    This Dockerfile contains the following information:


    *   `FROM`: As the base for this image, you’ll take the Java-enabled Alpine Linux
    by `openjdk`, an official repository containing an open-source implementation
    of the Java platform, Standard Edition.


    *   `VOLUME`: This points to `/tmp`, because that is where the Spring Boot application
    creates working directories by default. The effect is to create a temporary file
    on your host under `/var/lib/docker` and link it to the container under `/tmp`.
    This is essential when running the container as a non-root user.


    *   `ARG`: This is also known as a build-time variable. They are only available
    from the moment they are “announced” in the Dockerfile with an `ARG` instruction
    until the moment the image is built. Running containers can’t access values of
    `ARG` variables.


    *   `COPY`: Docker copies the Jar file into the image.


    *   `ENTRYPOINT`: This will be the executable to start when the container is booting.
    Defined as `JSON-Array` since you’ll use an `ENTRYPOINT` in combination with a
    `CMD` for some application arguments.


