  trans: "\n### 状态保持\n\n首先列出现有的 Pod，如代码清单 10-53 所示。\n\n```\n(base) binildass-MacBook-Pro:~\
    \ binil$ kubectl get pods\nNAME                           READY STATUS  RESTARTS\
    \ AGE\npostgres-89dbf9fd9-f5bmc       1/1   Running 0        37m\nproduct-server-85d84cf89-kxvfw\
    \ 1/1   Running 0        37m\nproduct-web-69b5948fb9-brdnf   1/1   Running 0 \
    \       37m\n(base) binildass-MacBook-Pro:~ binil$\n代码清单 10-53\n列出 Kubernetes\
    \ Pod\n```\n\n在代码清单 10-54 中，你可以看到 PostgreSQL Pod 并非定义为 StatefulSet，而是定义为 Deployment。记住这一点，你可以删除该\
    \ Pod。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl delete po postgres-89dbf9fd9-f5bmc\n\
    pod \"postgres-89dbf9fd9-f5bmc\" deleted\n(base) binildass-MacBook-Pro:~ binil$\n\
    代码清单 10-54\n删除 PostgreSQL Pod\n```\n\n现在再次列出剩余的 Pod，如代码清单 10-55 所示。\n\n```\n(base)\
    \ binildass-MacBook-Pro:~ binil$ kubectl get pods\nNAME                      \
    \     READY STATUS  RESTARTS AGE\npostgres-89dbf9fd9-4r5wk       1/1   Running\
    \ 0        9s\nproduct-server-85d84cf89-kxvfw 1/1   Running 0        38m\nproduct-web-69b5948fb9-brdnf\
    \   1/1   Running 0        38m\n(base) binildass-MacBook-Pro:~ binil$\n代码清单 10-55\n\
    再次列出 Kubernetes Pod\n```\n\n请注意，PostgreSQL 数据库 Pod 已被重新创建，但名称不同。被删除的 Pod 的状态会发生什么变化？\n\
    \n为了回答这个问题，使用相同的 URL 测试 Product Web 微服务，以便请求将命中之前存在的 Product Server 和 Product\
    \ Web 微服务 Pod。\n\n`http://192.168.64.6:30263/product.html`\n\n令你惊讶的是，你可能会发现之前的状态得以保持。这里所说的状态是指，当你初始化\
    \ Product Server 微服务时，你插入了几行数据库记录，而这些记录被保留了下来！\n\n你需要进一步探索。为此，请查看代码清单 10-56，它检查了\
    \ Pod、PVC 和 PV 之间的关联。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl get\
    \ pods --all-namespaces -o=json | jq -c '.items[] | {name: .metadata.name, namespace:\
    \ .metadata.namespace, claimName: .spec |  select( has (\"volumes\") ).volumes[]\
    \ | select( has (\"persistentVolumeClaim\") ).persistentVolumeClaim.claimName\
    \ }'\n{\"name\":\"postgres-89dbf9fd9-4r5wk\",\"namespace\":\"default\",\"claimName\"\
    :\"postgres-persistent-volume-claim\"}\n(base) binildass-MacBook-Pro:~ binil$\n\
    代码清单 10-56\nPod 与 PVC 之间的关联\n\n此清单显示了 PostgreSQL Pod 与其 PVC 之间的关联。你还可以看到 PVC 与\
    \ PV 之间的关联，如代码清单 10-57 所示。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl\
    \ get pvc --all-namespaces -o json | jq -j '.items[] | \"\\(.metadata.namespace),\
    \ \\(.metadata.name), \\(.spec.volumeName)\\n\"'\ndefault, postgres-persistent-volume-claim,\
    \ pvc-2c90c05e-c233-44d4-8adb-5595da8edc3e\n(base) binildass-MacBook-Pro:~ binil$\n\
    代码清单 10-57\nPV 与 PVC 之间的关联\n```\n\n为了理解这一点，请注意 Kubernetes 文档中的说明：\n\n> *用户创建一个\
    \ PersistentVolumeClaim（或者在动态配置的情况下，已经创建了一个），其中请求了特定数量的存储和特定的访问模式。主节点中的一个控制循环会监视新的\
    \ PVC，找到匹配的 PV（如果可能），并将它们绑定在一起。如果为新的 PVC 动态配置了 PV，则该循环将始终将该 PV 绑定到该 PVC。否则，用户将始终至少获得他们所请求的内容，但卷可能会超出请求量。一旦绑定，PersistentVolumeClaim\
    \ 的绑定是排他性的，无论它们是如何绑定的。PVC 到 PV 的绑定是一对一的映射，使用 ClaimRef，它是 PersistentVolume 和 PersistentVolumeClaim\
    \ 之间的双向绑定。*\n> \n> —Kubernetes\n\n这在某种程度上解释了你之前看到的行为。进一步的细节超出了本讨论的范围，建议你参考 Kubernetes\
    \ 文档。\n\n测试完成后，你可以停止并移除微服务容器，并使用代码清单 10-58 中所示的 `clean.sh` 脚本来清理环境。\n\n```\nmvn\
    \ -Dmaven.test.skip=true clean\nkubectl delete -f product-web-service.yml\nkubectl\
    \ delete -f product-web-deployment.yml\nkubectl delete -f product-server-service.yml\n\
    kubectl delete -f product-server-deployment.yml\nkubectl delete -f postgres-svc.yml\n\
    kubectl delete -f postgres-deployment.yml\nkubectl delete -f postgres-pvc.yml\n\
    kubectl delete -f postgres-config.yml\ndocker rmi -f ecom/product-web\ndocker\
    \ rmi -f ecom/product-server\n代码清单 10-58\n用于关闭微服务 Kubernetes Pod 的脚本 (ch10\\ch10-02\\\
    clean.sh)\n```\n\n你可以执行此脚本来停止并移除微服务 Pod 并清理环境，如代码清单 10-59 所示，就像你在代码清单 10-40 中清理环境的方式一样。\n\
    \n```\n((base) binildass-MacBook-Pro:ch10-02 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch10/ch10-02\n\
    (base) binildass-MacBook-Pro:ch10-02 binil$ eval $(minikube docker-env)\n(base)\
    \ binildass-MacBook-Pro:ch10-02 binil$ sh clean.sh\n...\n代码清单 10-59\n停止微服务 Pod\
    \ 并清理环境\n```\n\n## 总结\n\n你在第 7 章和第 8 章开始了容器之旅，并在第 9 章中扩展了学习内容，使用 Docker Compose\
    \ 来编排多个微服务和数据库容器。在本章开始时，你了解到当从单体架构迁移到微服务架构时，活动部件的数量会增加，因此整体复杂性也会增加。这正是像 Kubernetes\
    \ 这样更好的容器管理工具发挥价值的地方。本章快速介绍了 Kubernetes，并介绍了在 Kubernetes 工具集内与 SQL 和 NoSQL 数据库交互的熟悉微服务示例。你的学习尚未结束，因为你还需要研究如何将消息代理集成到你的\
    \ Kubernetes 生态系统中。这将在第 11 章中介绍。\n"
- fmt: '# 11. Message Oriented Microservices in Kubernetes


    In Chapter [10](#619782_1_En_10_Chapter.xhtml), you learned how Kubernetes does
    container orchestration, which greatly improves the manageability of operating
    microservices. This is even more important as the number of microservices goes
    up. You also saw some resiliency aspects of Kubernetes and through the examples
    you saw how a pod is re-created when you delete an existing pod. You also saw
    how a state is restored after re-creating a pod.


    Scalability and resiliency are two desirable qualities for every production-grade
    application. When you attempt to improve these two qualities, you make the operating
    environment more chaotic. This is true for a microservices architecture, since
    you need to manage more types of services and a greater number of each type of
    service.


    In Chapter [6](#619782_1_En_6_Chapter.xhtml), you learned about a consumer and
    provider microservice communicating with each other using Kafka as the messaging
    channel. The provider microservice stores the entity in a database. In Chapter
    [9](#619782_1_En_9_Chapter.xhtml), you modified those same examples, leveraging
    containerization as a runtime option. In this chapter, you will revisit them and
    use Kubernetes for deployment.


    This chapter is a continuation of Chapter [10](#619782_1_En_10_Chapter.xhtml),
    so it’s fully hands on and covers the following three scenarios:


    - Microservices communicating over Kafka and interacting with PostgreSQL

    - Microservices communicating over Kafka and interacting with MongoDB

    - Using Ingress to access coordinating microservices


    The following section gets straight into those examples.


    ## Microservices Over Kafka with PostgreSQL in k8s


    This example tweaks the same set of microservices from Chapter [6](#619782_1_En_6_Chapter.xhtml)
    in the section titled “CRUD Microservices over Kafka on PostgreSQL” and from Chapter
    [9](#619782_1_En_9_Chapter.xhtml) in the section titled “Composing Microservice
    with PostgreSQL Containers.” A consumer and provider microservice communicate
    with each other using Kafka as the messaging channel. The provider microservice
    stores the entity in a PostgreSQL database. When the browser sends a request to
    the first (consumer) microservice, it uses async HTTP. Even though it uses async
    HTTP, the example emulates a sync-style user experience at the client device level,
    a browser in this case.


    The example also contains multiple instances of the consumer and provider microservices
    and uses multiple clients while testing the service.


    ### Design the Microservices Orchestration Topology


    This example uses a modified version of the hexagonal microservice view shown
    in Figure [9-3](#619782_1_En_9_Chapter.xhtml#Fig3) in Chapter [9](#619782_1_En_9_Chapter.xhtml).
    Both microservices communicate through an async channel. Apache Kafka is the messaging
    channel, which is inherently asynchronous. This modified design is shown in Figure
    [11-1](#619782_1_En_11_Chapter.xhtml#Fig1).


    ![](images/619782_1_En_11_Chapter/619782_1_En_11_Fig1_HTML.jpg)


    A 3 D model diagram of the user connected to the browser, product web mu S, Kafka
    infrastructure service with event queue and partitions 1 and 2, product server
    mu S, container engine with functions, host O S, and hardware with C P U, disk,
    and others. Product web includes 3 business services, and product server includes
    3 business services and 1 application service.


    **Figure 11-1** Kubernetes orchestration topology for microservices


    Here, the Product Web and Product Server containers provide business services,
    whereas the Mongo container provides application services to persist the state.
    The Kafka container provides infrastructure services, so it’s not shown as a part
    of any specific (business) microservice.


    Another aspect you need to note in Figure [11-1](#619782_1_En_11_Chapter.xhtml#Fig1)
    is that you have multiple instances of the Product Web and Product Server microservices.
    This will help you experiment with sticky and load-balanced scenarios, like you
    did in Chapter [6](#619782_1_En_6_Chapter.xhtml).


    ### Understanding the Source Code


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized inside the `ch11\ch11-01` folder.
    Much of the source code in this example is like `ch09\ch09-03`, which I explained
    in detail in Chapter [9](#619782_1_En_9_Chapter.xhtml). In the example in Chapter
    [9](#619782_1_En_9_Chapter.xhtml), the deployment architecture is similar, but
    it used Docker Compose instead of Kubernetes. In the second example—`ch10\ch10-02`—in
    Chapter [10](#619782_1_En_10_Chapter.xhtml), you also looked at the Kubernetes-based
    deployment of the two microservices and PostgreSQL. What’s left is the Kubernetes
    deployment of Kafka alone.


