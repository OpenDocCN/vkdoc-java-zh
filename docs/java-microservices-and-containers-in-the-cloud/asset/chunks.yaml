  trans: '

    ### Docker 镜像


    Docker 镜像由相互叠加的文件系统组成，如图 7-3 所示。


    ![](img/619782_1_En_7_Fig3_HTML.jpg)


    一个三层长方体的 3D 模型。底层标记为内核。中间层标记为 cgroups、命名空间和设备映射器。顶层标记为 bootfs。


    图 7-3


    Docker bootfs


    镜像的底层是一个引导文件系统 bootfs，它类似于典型的 Linux/UNIX 引导文件系统。当容器启动时，它会被移入内存，并且引导文件系统会被卸载，以释放
    initrd 磁盘镜像占用的 RAM。到目前为止，这类似于典型的 Linux 虚拟化堆栈。Docker 用户可能永远不会与引导文件系统交互。


    在引导文件系统之上，Docker 叠加了一个根文件系统 rootfs。这个 rootfs 可以是一个或多个操作系统（例如，Debian 或 Ubuntu）。参见图
    7-4。


    ![](img/619782_1_En_7_Fig4_HTML.jpg)


    Docker 镜像层的两个示意图。镜像 1 包含一个带有内核、Emacs 和 Apache 的 Debian 操作系统。镜像 2 包含一个带有内核的 BusyBox
    操作系统。


    图 7-4


    Docker 镜像


    在传统的 Linux 启动中，根文件系统以只读方式挂载，然后在启动完成并执行完整性检查后切换为读写模式。在 Docker 世界中，根文件系统保持只读模式，并且
    Docker 利用联合挂载在根文件系统之上添加更多的只读文件系统。


    Docker 将操作系统的公共部分组织为只读。任何公共部分都在你的所有容器之间共享。参见图 7-5。


    ![](img/619782_1_En_7_Fig5_HTML.jpg)


    两个长方体相互堆叠的 3D 示意图。顶部标记为镜像 1，底部标记为镜像 2。顶部被分为四层，标记为内核、Debian、emacs 和 Apache。底部被分为两层，标记为
    BusyBox 和内核。


    图 7-5


    Docker 镜像共享层


    共享这些公共部分提供了存储和运行时效率。为了说明清楚，如果你有一个 1GB 的容器镜像并使用传统的虚拟机方法，你将需要 1GB 乘以你想要的虚拟机数量。由于
    Docker 在所有容器之间共享这 1GB 的大部分内容，如果你有 1000 个容器，你可能仍然只需要略多于 1GB 的空间来容纳所有这些容器（假设它们都运行相同的操作系统镜像）。


    Docker 镜像是相互叠加的。顶部的镜像是父镜像；你可以从一个层遍历到其父层，依此类推，直到到达镜像堆栈的底部，底部的镜像称为基础镜像。参见图 7-6。


    ![](img/619782_1_En_7_Fig6_HTML.jpg)


    一个容器 X 的流程示意图，包含一个写入层和四个层。这些层通过数据和元数据连接到写入层。每个层都有一个层 ID、元数据、数据和父数据。


    图 7-6


    Docker 镜像的结构剖析


    ### Docker 镜像与容器


    Docker 镜像是用于构建容器的只读模板。容器是从这些模板创建的已部署实例。镜像和容器密切相关，并且对于驱动 Docker 软件平台至关重要。


    当从镜像启动一个容器时，Docker 会在顶部挂载一个读写文件系统。在这个读写层中，你希望 Docker 容器运行的任何进程都将在此执行。图 7-6 到 7-8
    展示了这个过程。


    ![](img/619782_1_En_7_Fig7_HTML.jpg)


    两个长方体相互堆叠的 3D 示意图。顶部标记为容器 1，底部标记为容器 2。顶部被分为四层，标记为内核、Debian、emacs 和 Apache。底部被分为两层，标记为
    BusyBox 和内核。


    图 7-7


    Docker 容器共享镜像层


    即使容器共享相同的镜像（层），一旦它们从其镜像模板实例化，它们就是分离且隔离的，如图 7-8 所示。


    ![](img/619782_1_En_7_Fig8_HTML.jpg)


    Docker 容器的两个 3D 示意图。容器 1 有 3 层，底层是内核，中间层是 Apache、emacs、Debian 和内核，顶层是一个可写层。容器
    2 有 2 层，底层是内核，顶层是可写层。


    图 7-8


    Docker 容器隔离


    当容器启动时，初始的读写层是空的。随着变化的发生，这些变化会被应用到该读写层，如图 7-9 所示。


    ![](img/619782_1_En_7_Fig9_HTML.jpg)


    一个具有多个层的容器的 3D 示意图。顶层标记为可写层。其下方是标记为 Apache、emacs 和 Debian 的层。在这些层下方是标记为 cgroups、命名空间、设备映射器、内核和
    bootfs 的层。


    图 7-9


    Docker 容器写入层


    为了说明清楚，如果你想更改一个文件，该文件将从下方的只读层复制到读写层。该文件的只读版本仍然存在，但会被其上方的覆盖层隐藏在该副本之下。参见图 7-10。


    ![](img/619782_1_En_7_Fig10_HTML.jpg)


    一个容器的阵列示意图。这些层相互堆叠。从底部开始，基础层、层 1、层 2、层 3 和写入层（即层 4）。每个层包含文件 A、B、C、D 和 E。一个带箭头的虚线将基础层中的文件
    D 连接到层 3 中的文件 D。


    图 7-10


    Docker 容器写入的过程


    每个容器都可以将其自身的更改应用到其容器读写层，因为它们是隔离的。参见图 7-11。


    ![](img/619782_1_En_7_Fig11_HTML.jpg)


    一个流程示意图，定义了 Docker 容器写时复制的过程。容器 1、2 和 3 都有一个读写层。这些容器相互堆叠，基础层位于底部。基础层是只读的，每个容器可以将其更改应用到其容器读写层。


    图 7-11


    Docker 容器写时复制的过程


    这种模式传统上称为“写时复制”，是使 Docker 如此强大的特性之一。每个只读镜像层都是只读的——这些镜像永远不会改变。当创建一个容器时，Docker 从镜像堆栈构建，并在顶部添加读写层。图
    7-11 展示了向容器添加数据的过程。一旦你做出更改并使用 Docker 提交它们，Docker 就会创建一个新的镜像。该镜像仅包含与基础镜像的差异。当你想要运行这个新镜像时，你可以对该容器进行更改，如图
    7-12 所示。


    ![](img/619782_1_En_7_Fig12_HTML.jpg)


    一个容器 Y 的流程示意图，各层相互堆叠。从底部开始，基础层、层 1、层 2、层 3 和层 4，以及写入层（即层 5）。每个层都有层 ID、元数据、数据和父层。从基础层到层
    3 创建镜像 X，从基础层到层 4 创建镜像 Y。


    图 7-12


    Docker 容器提交的过程

