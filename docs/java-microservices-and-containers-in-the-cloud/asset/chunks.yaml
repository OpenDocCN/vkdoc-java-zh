    Listing 3-1

    The Abstract Port for Product Server Microservice to Interact with PostgreSQL
    (ch03\ch03-02\01-ProductServer\src\main\java\com\acme\ecom\product\repository\ProductRepository.java)

    ```


    This port (interface) provides for generic CRUD operations on a repository, a
    PostgreSQL in this case. Note that `MongoRepository` interacts with MongoDB for
    all the examples in Chapter [2](#619782_1_En_2_Chapter.xhtml). However, this example
    opts for a more generic type of `MongoRepository` in the way of `CrudRepository`
    . There is a reason for doing this. I want to demonstrate how a generic port (the
    driven port with `CrudRepository`) can be adapted to connect to different kinds
    of databases—more specifically to a PostgreSQL database in this example and to
    a MongoDB database in the next example.


    `CrudRepository` is a Spring Data interface for generic CRUD operations on a repository
    of a specific type. It provides several methods out-of-the-box to interact with
    a database. The specific adapter for this port, an adapter to a PostgreSQL database,
    is provided by Spring based on the configuration in `pom.xml` (see Listing [3-2](#619782_1_En_3_Chapter.xhtml#PC2)).


    ```


    org.postgresql

    postgresql

    42.2.19

    runtime


    Listing 3-2

    The Adapter Hint to Product Server Microservice (ch03\ch03-02\01-ProductServer\
    pom.xml)

    ```


    Listing [3-3](#619782_1_En_3_Chapter.xhtml#PC3) shows the REST-capable HTTP port,
    using a Spring `RestController`.


    ```

    @RestController

    public class ProductRestController {

    @Autowired

    private ProductRepository productRepository;

    @Autowired

    private ProductMapper mapper;

    @ApiOperation(value="View a list of all products",

    response = Product.class,

    responseContainer = "List")

    @RequestMapping(value = "/products",

    method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity> getAllProducts() {

    Iterable iterable =

    productRepository.findAll();

    List list = new ArrayList ();

    for(ProductOR productOR:iterable){

    list.add(mapper.entityToApi(productOR));

    }

    if(list.size() == 0){

    return new ResponseEntity>(

    HttpStatus.NOT_FOUND);

    }

    return new ResponseEntity>(list,

    HttpStatus.OK);

    }

    }

    Listing 3-3

    REST Based HTTP Port for getAllProducts Product Server (ch03\ch03-02\01-ProductServer\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    The REST controller has CRUD methods that synchronize the state of the `Product`
    entity with those in the PostgreSQL database. The `getAllProducts` is a Java method
    that returns a list of all products in the PostgreSQL database, defined through
    an abstract protocol and format of delivery declared in the HTTP-based REST port.
    A concrete implementation of this port is then injected (or used to intercept)
    by Spring and used in the controller in the runtime. They translate the JSON formatted
    Request data payload from the HTTP delivery channel into a `getAllProducts` method
    call in the application core. To retrieve the actual product entities, the `getAllProducts`
    delegates call to the driven port, `ProductRepository`.


    There are two new utility libraries I need to discuss here. The first one is `ProductMapper`,
    shown in Listing [3-4](#619782_1_En_3_Chapter.xhtml#PC4).'
