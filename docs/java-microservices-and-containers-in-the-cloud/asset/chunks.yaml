    This completes the second example, using PostgreSQL.


    Before I close this chapter, the next section quickly explains an important concept
    called *integration patterns*. They show how such standard and defined patterns
    provide value to architectures involving Message Oriented Middleware (MOM).


    ## Aggregating Responses from Multiple Microservices


    All through the previous chapters and the previous sections in this chapter, you
    have seen different combinations in which you can mix and match the transport
    connectivity options between microservices to simulate different message exchange
    patterns. To complete this discussion, this section looks at an integration pattern
    called an *aggregator*. You can use this pattern to aggregate responses from multiple
    microservices.


    ### Aggregator Integration Pattern


    Let’s first look at what an aggregator pattern is. An *aggregator* is a stateful
    filter used to collect and store individual messages until a complete set of related
    messages has been received. The aggregator can then filter, compose, and publish
    a single message distilled from the individual messages. See Figure [6-4](#619782_1_En_6_Chapter.xhtml#Fig4).


    ![](images/619782_1_En_6_Chapter/619782_1_En_6_Fig4_HTML.jpg)


    A diagram illustrates the aggregator integration pattern. Books are ordered by
    the users to the publishers, which is then requested and replied, and the response
    are made by aggregator integration.


    Figure 6-4


    Aggregator integration pattern


    Figure [6-4](#619782_1_En_6_Chapter.xhtml#Fig4) depicts a typical travel booking
    scenario done by travel agents. The Booking Order microservice is used by the
    travel agent to fulfill the booking request on behalf of a traveler. The Booking
    Order microservice can also be used by a traveler directly through the web or
    mobile apps. Assuming the booking has to be done for a combined itinerary involving
    hotel accommodations, air travel, and airport drop-off and pickup, these individual
    fulfillment inventory items will be owned by different third-party providers—a
    Hotel microservice, an Air microservice, and a Cab microservice, in this case.
    These different inventory owner microservices will pick up the booking request
    and try to fulfill the respective booking component and send a response message
    back to the reply queue. Now comes the part of the aggregator.


    The aggregator, being a stateful filter, can wait for multiple replies until a
    timeout. The aggregator can then compose from the individual response messages
    and publish a single message to the Booking Order microservice.


    The next section looks at some working code to show this pattern.


    ### Design the Microservice Aggregator


    This example uses the now-familiar Product Web and Product Server microservices
    domain. As shown in Figure [6-5](#619782_1_En_6_Chapter.xhtml#Fig5), users interact
    with the Product Web microservice from a browser. The Product Web microservice
    in turn invokes the Product Server microservice. The Product Server microservice
    retrieves data from a database, from an in-memory database in this example, and
    sends the response.


    Inter-microservice communication happens over a messaging channel.


    Moreover, the request message is relayed to more than one service provider. The
    objective is to enable the Product Web microservice to relay requests to more
    than one service provider and receive responses from all or many of these service
    providers. The Product Web microservice acts as an aggregator and stores individual
    messages until a complete set of related messages has been received. The aggregator
    can then filter, compose, and publish a single message distilled from the individual
    messages to the browser. See Figure [6-5](#619782_1_En_6_Chapter.xhtml#Fig5).


    ![](images/619782_1_En_6_Chapter/619782_1_En_6_Fig5_HTML.jpg)


    A diagram illustrates the microservices aggregator. Users interact with the product
    web microservice from the browser. The service retrieves data from the database,
    and sends the response.


    Figure 6-5


    Microservices aggregator


    To keep the complexity of the example under control, it does not use different
    kinds of provider microservices. Instead, the example uses different instances
    of the same kind of microservice. However, note that nothing prevents you from
    having different kinds of provider microservices responding to the same request
    message.'
