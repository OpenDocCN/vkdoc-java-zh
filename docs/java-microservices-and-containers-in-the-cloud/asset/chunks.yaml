    `getAllProducts` 是一个 Java 方法，它将返回数据库中所有产品的列表，该方法通过基于 HTTP 的 REST 端口中声明的抽象协议和交付格式来定义。然后，Spring
    会注入（或用于拦截）该端口的具体实现，并在运行时在控制器中使用。它们将来自 HTTP 交付通道的 JSON 格式数据负载转换为应用程序核心中的 `getAllProducts`
    方法调用。为了检索产品，`getAllProducts` 将调用委托给 `InMemoryDB` 类。


