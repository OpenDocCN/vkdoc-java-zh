    ### Accessing Your EC2 in AWS Cloud Using SSH


    Once your Compute infrastructure is created in AWS, you can access it using SSH.
    You can log in to the AWS console and inspect the newly created EC2 instance and
    get the public IP of it. Further, this example assumes that you have created a
    key pair in the Amazon EC2 console for the region where you plan to receive data.


    If you plan to use an SSH client on a macOS or Linux computer to connect to your
    cloud instance, use the commands in Listing [14-14](#619782_1_En_14_Chapter.xhtml#PC16)
    to set the permissions of your private key file and then `ssh` to the instance.


    ```

    (base) binildass-MacBook-Pro:AWS binil$ ls

    BDCA-01.pem    bdca-key-01.pem

    (base) binildass-MacBook-Pro:AWS binil$ chmod 600 ./bdca-key-01.pem

    (base) binildass-MacBook-Pro:001-aws-ec2-ssh-http binil$ ssh -i "/Users/binil/AWS/bdca-key-01.pem"
    ubuntu@ec2-13-228-93-93.ap-southeast-1.compute.amazonaws.com

    The authenticity of host ''ec2-13-228-93-93.ap-southeast-1.compute.amazonaws.com
    (13.228.93.93)'' can''t be established.

    ECDSA key fingerprint is SHA256:TK4sg3Pw8w1crRgI/KebZJ///AavY8uSnKwZmFzqTJw.

    Are you sure you want to continue connecting (yes/no)? yes

    Warning: Permanently added ''ec2-13-228-93-93.ap-southeast-1.compute.amazonaws.com,13.228.93.93''
    (ECDSA) to the list of known hosts.

    Welcome to Ubuntu 16.04.4 LTS (GNU/Linux 4.4.0-1114-aws x86_64)

    ...

    ubuntu@ip-10-0-53-123:~$

    Listing 14-14

    Accessing AWS Cloud EC2 Using SSH

    ```


    You can next inspect if you have Java runtime in your EC2 instance, as shown in
    Listing [14-15](#619782_1_En_14_Chapter.xhtml#PC17).


    ```

    ubuntu@ip-10-0-53-123:~$ java -version

    java version "1.8.0_161"

    Java(TM) SE Runtime Environment (build 1.8.0_161-b12)

    Java HotSpot(TM) 64-Bit Server VM (build 25.161-b12, mixed mode)

    ubuntu@ip-10-0-53-123:~$ pwd

    /home/ubuntu

    ubuntu@ip-10-0-53-123:~$ ls

    Nessus-7.0.2-ubuntu1110_amd64.deb

    ubuntu@ip-10-0-53-123:~$

    ...

    Listing 14-15

    Verifying Java Runtime in Your AWS Cloud EC2

    ```


    ### Installing JRE in AWS EC2


    If you don’t have Java by default, you can install it. Before that, update the
    software. Use the `sudo apt update` command, which is a Linux/Debian system administration
    command that updates the list of available packages and their versions stored
    in the system’s package index. See Listing [14-16](#619782_1_En_14_Chapter.xhtml#PC18).


    ```

    ubuntu@ip-10-0-53-123:~$ sudo apt update

    ...

    Listing 14-16

    Updating AWS Cloud EC2 packages

    ```


    Then install Java, as shown in Listing [14-17](#619782_1_En_14_Chapter.xhtml#PC19).


    ```

    ubuntu@ip-10-0-53-123:~$ java -version

    Command ‘Java’ not found, but can be installed with:

    sudo apt install openjdk-11-jre-headless

    sudo apt install default-jre

    sudo apt install openjdk-17-jre-headless

    sudo apt install openjdk-18-jre-headless

    sudo apt install openjdk-19-jre-headless

    sudo apt install openjdk-8-jre-headless

    ubuntu@ip-10-0-53-123:~$ sudo apt install openjdk-17-jre-headless

    ...

    Listing 14-17

    Installing JRE in AWS Cloud EC2

    ```


    Now that you have successfully accessed the new server that you provisioned and
    set up with JRE in AWS Cloud, you can deploy your microservice in the cloud.


    ## Deploying Microservice in AWS EC2


    This example uses the simplest microservice in this book, found in `ch01/ch01-01/`.
    Assuming that you built the microservice as shown in Listing [14-18](#619782_1_En_14_Chapter.xhtml#PC20)
    and the `.jar` file `Ecom-Product-Web-Microservice-0.0.1-SNAPSHOT.jar` is available
    in the `ch01/ch01-01/target` folder, you need to first upload this `.jar` file
    to the EC2 in AWS Cloud using the `secure copy` command.


    ```

    mvn -Dmaven.test.skip=true clean package

    java -jar -Dserver.port=8080 ./02-ProductWeb/target/Ecom-Product-Web-Microservice-0.0.1-SNAPSHOT.jar

    Listing 14-18

    Commands to Build the Microservice (from Listing 1-5)

    ```


    The next step is to copy the `.jar` file to the cloud.'
