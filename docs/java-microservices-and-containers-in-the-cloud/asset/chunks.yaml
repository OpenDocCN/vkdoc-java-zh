    ```\n\n如你所见，服务使用 `Endpoints` 资源来链接到 Pod。`Endpoints` 是一个以逗号分隔的 IP 地址和端口列表，用于暴露服务。`Endpoints`\
    \ 资源与任何其他 Kubernetes 资源一样，因此你可以使用 `kubectl` 命令显示其基本信息，如清单 10-25 所示。\n\n```\n(base)\
