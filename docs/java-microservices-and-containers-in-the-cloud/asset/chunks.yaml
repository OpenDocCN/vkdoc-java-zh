- fmt: '### Publisher Subscriber Combinations


    Chapter [4](#619782_1_En_4_Chapter.xhtml) briefly described the return address
    pattern in Figure [4-5](#619782_1_En_4_Chapter.xhtml#Fig5). When microservices
    communicate, the same microservice can send messages to different microservices,
    and different microservices can send messages to the same microservice. We can
    generalize this communication pattern, as shown in Figure [5-6](#619782_1_En_5_Chapter.xhtml#Fig6).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig6_HTML.jpg)


    A diagram presents how two publishers labeled `order muS` and `loyalty muS`, emit
    events into a central message bus. The events are distributed to multiple subscribers,
    with `shipping muS`, `dispatch muS`, and `notification muS`.


    **Figure 5-6** Different kinds of microservices communicating


    Referring again to Figure [4-5](#619782_1_En_4_Chapter.xhtml#Fig5) in Chapter
    [4](#619782_1_En_4_Chapter.xhtml), each publisher microservice can have its own
    return address and, in that manner, response messages can be directed to the corresponding
    sender.


    ### Publisher Subscriber Instance Combinations


    When you want to scale out microservices, this introduces more complexity if you
    need to send synchronous styled communications over an async channel.


    If you have multiple instances of the same microservice, you must make sure that
    the reply is sent to the correct microservice instance. The Spring Kafka documentation
    suggests that each consumer use a unique reply topic so that reply messages are
    not interchanged.


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig7_HTML.jpg)


    A diagram represents a request-reply interaction model between microservices.
    It involves multiple requestor and replier components communicating via various
    channels. These channels correspond to the instances of the requestor that initiated
    the original request.


    **Figure 5-7** Different reply channels


    Figure [5-7](#619782_1_En_5_Chapter.xhtml#Fig7) depicts each consumer using a
    unique reply topic so that reply messages are not interchanged across consumers.
    A particular request thread from a specific requestor instance receives the response
    corresponding to the right request. The solution works, but it’s not elegant.
    Topics are managed objects, and they need housekeeping. Even if the housekeeping
    could be automated (like with dynamic queues), it’s not nice to have tens of hundreds
    of topics just like that.


    A better solution is to leverage partitions of *topics*, a feature provided by
    Kafka. As suggested by the Spring Kafka documentation, each consumer can use an
    additional `KafkaHeaders.REPLY_PARTITION` header value, which is sent with the
    request. It’s a four-byte field containing a BIG-ENDIAN representation of the
    partition integer.


    The schema can be represented as shown in Figure [5-8](#619782_1_En_5_Chapter.xhtml#Fig8).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig8_HTML.jpg)


    A diagram presents the request-reply interaction model between microservices,
    with the concept of partitions and queues in the reply mechanism. Two requestor
    microservices send requests through channels. The channel is connected to a queue
    mechanism, which splits into partitions 1 and 2.


    **Figure 5-8** Different reply partitions


    Kafka partitions are the main concurrency mechanism in Kafka. A topic is divided
    into one or more partitions, enabling producer and consumer loads to be scaled.
    The consumers are shared evenly across the partitions, allowing for the consumer
    load to be linearly scaled by increasing both consumers and partitions. You can
    use this feature for the reply address.


    The next section illustrates these topics with code.


    ## Microservices Sequential Processing


    In this example, you see how to tweak the same set of microservices shown in Chapter
    [4](#619782_1_En_4_Chapter.xhtml). A consumer and a provider microservice communicate
    with each other using a messaging channel. The provider microservice stores the
    entity in an in-memory database, to keep the example simple. Moreover, when the
    browser sends the request to the first (consumer) microservice, it uses async
    HTTP.


    The complexity of this example compared to the example in Chapter [4](#619782_1_En_4_Chapter.xhtml)
    is that this example uses multiple instances of consumer and provider microservices
    and multiple clients while testing the service. When the same kinds of requests
    from different users reach the single instance of the (message consumer) microservice,
    the requests are serviced one by one, in sequence.


    ### Design Sequential Processing Microservices


    I slightly modify the hexagonal microservice view shown in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1)
    in Chapter [2](#619782_1_En_2_Chapter.xhtml) so that both microservices communicate
    through an async channel. This example uses Apache Kafka as the messaging channel,
    which is inherently asynchronous. Remember, the objective is to mimic synchronous
    styled communication over the Kafka-based async channel, as well as demonstrate
    that multiple consumer types or multiple instances of the same consumer type can
    connect to one or more instances of the provider microservice and still get the
    responses corresponding to the respective request alone. See Figure [5-9](#619782_1_En_5_Chapter.xhtml#Fig9).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig9_HTML.jpg)


    A diagram presents an event-driven microservice architecture that involves two
    primary components, `product web` microservice instances and `product server`
    microservice instances. The communication occurs through many to many or any to
    any channels with the event queue.


    **Figure 5-9** Microservice design over async channel using partitions


    A few observations to note are as follows:


    *   There are multiple instances of the Product Web (Request Consumer) microservice
    provisioned. If this schema works, it should work for different types of microservices
    too.

    *   There are multiple instances of the Product Server (Request Provider) microservice
    provisioned. Hence, events can be picked up for processing by any instance in
    a round robin manner.

    *   Even though the Product Web is the Request Consumer and the Product Server
    is the Request Provider from the Service Consumer and Service Provider perspective,
    they are both playing the role of Message Sender and Message Consumer at the same
    time over the Kafka topics.

    *   Figure [5-9](#619782_1_En_5_Chapter.xhtml#Fig9) shows instances of the Product
    Server microservice listening to different topics, even though in this example,
    it listens to the same topic but leverages different partitions.'
