    ## 总结


    从本书的开篇章节到上一章，你已经从最简单的微服务一路学习到了 Docker 容器和 Kubernetes。你看到了多种重要的设计模式，包括 NoSQL 和消息代理。在本章中，你使用
    IaC 在 AWS 云中配置了一个 EC2 实例。你还将第一章中的微服务示例部署到了该 EC2 实例中，并通过互联网从你的主机访问了它。这是一个良好的开端，现在你可以尝试将其他章节中的许多示例部署到云端。剩下的内容是在云端使用容器和编排，这将在下一章中介绍。


    脚注 1   2


    # 15. AWS Elastic Kubernetes Service 中的微服务


    在上一章中，你学习了如何使用 IaC 工具 Terraform 在 AWS 中创建最小的计算基础设施。在本章中，你将通过使用相同的工具集搭建基于 Kubernetes
    的基础设施来扩展该知识。你已经看到，基于 Minikube 的单节点 Kubernetes 如何使你能够运行本书中截至上一章的所有示例。现在，你将尝试将这些微服务部署到
    AWS 云上基于多节点 Kubernetes 的基础设施中。


    本章涵盖以下概念：


    *   Elastic Kubernetes Service (EKS)


    *   使用 Terraform 设置 AWS EKS


    *   在 AWS EKS 中运行微服务容器


    ## Amazon Elastic Kubernetes Service


    Amazon Elastic Kubernetes Service (Amazon EKS) 跨可用区运行 Kubernetes 管理基础设施。在任何标准
    Kubernetes 环境中运行的应用程序都完全兼容，并且可以迁移到 Amazon EKS，因此本章将演示如何在 Minikube 中部署的微服务部署到 AWS
    的 EKS 中。


    Amazon EKS 集群由两个主要组件组成——EKS 控制平面和 EKS 工作节点。


    ### EKS 控制平面


    EKS 控制平面由运行 Kubernetes 软件（例如 etcd 和 Kubernetes API 服务器）的节点组成。（有关这些组件的概述，请参阅第 10
    章。）控制平面在由 AWS 管理的账户中运行，Kubernetes API 通过与你集群关联的 Amazon EKS 端点暴露。每个 Amazon EKS
    集群控制平面在其自己的一组 Amazon EC2 实例上运行。这些控制平面节点也跨多个可用区进行配置，并由 Elastic Load Balancing Network
    Load Balancer 作为前端。Amazon EKS 还会在你的 VPC 子网中配置弹性网络接口，以提供从控制平面实例到节点的连接。


    ### EKS 工作节点


    EKS 工作节点是 Kubernetes 集群的一部分，用户的工作负载在此处处理。Amazon EKS 工作节点在你的 AWS 账户中创建，它们会与在 AWS
    托管账户中运行的集群控制平面实例建立连接。Amazon EKS 工作节点会在控制平面中注册。


    在撰写本文时，引入了一个名为 Amazon EKS Blueprints 的相关解决方案。不过，Amazon EKS 仍然可以正常工作。

