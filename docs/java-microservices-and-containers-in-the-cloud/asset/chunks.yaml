- fmt: '### Docker Images


    A Docker image is made up of filesystems layered over each other, as shown in
    Figure [7-3](#619782_1_En_7_Chapter.xhtml#Fig3).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig3_HTML.jpg)


    A 3-D model of a cuboid with three layers. The bottom layer is labeled Kernel.
    The center layer is labeled c groups, namespaces, and device mappers. The top
    layer is labeled boot f s.


    Figure 7-3


    **Docker bootfs**


    At the base of the image is a boot filesystem, `bootfs`, which resembles the typical
    Linux/UNIX boot filesystem. When a container is booted, it is moved into memory,
    and the boot filesystem is unmounted to free up the RAM used by the `initrd` disk
    image. This is like a typical Linux virtualization stack so far. A Docker user
    may never interact with the boot filesystem.


    On top of the boot filesystem, Docker layers a root filesystem, `rootfs`. This
    `rootfs` can be one or more operating systems (e.g., a Debian or Ubuntu). See
    Figure [7-4](#619782_1_En_7_Chapter.xhtml#Fig4).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig4_HTML.jpg)


    Two schematics of the layers of docker images. Image 1 has a Debian operating
    system with a kernel, Emacs, and Apache. Image 2 has a BusyBox operating system
    with a kernel.


    Figure 7-4


    **Docker images**


    In traditional Linux boot, the root filesystem is mounted read-only and then switched
    to read-write after the boot is finished and an integrity check is conducted.
    In the Docker world, the root filesystem stays in read-only mode, and Docker leverages
    union mount to add more read-only filesystems over the root filesystem.


    Docker organizes the common parts of the operating system as read-only. Any common
    parts are shared among all of your containers. See Figure [7-5](#619782_1_En_7_Chapter.xhtml#Fig5).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig5_HTML.jpg)


    A 3-D diagram of two rectangular prisms stacked on top of each other. The top
    is labeled image 1 and the bottom is labeled image 2. The top is divided into
    four layers, labeled Kernel, Debian, emacs, and Apache. The bottom is divided
    into two layers, labeled BusyBox and Kernel.


    Figure 7-5


    **Docker images sharing layers**


    Sharing these common parts provides storage and runtime efficiency. To make it
    clear, if you have a 1GB container image and use a traditional VM method, you
    will need 1GB times the number of VMs you want. Since Docker shares the bulk of
    the 1GB between all the containers, if you have 1,000 containers, you still might
    only need a little over 1GB of space for all these containers (assuming they are
    all running the same OS image).


    Docker images are layered on top of one another. The image on the top is the parent
    image; you can traverse from one layer to its parent and so on until you reach
    the bottom of the image stack, where the final image is called the base image.
    See Figure [7-6](#619782_1_En_7_Chapter.xhtml#Fig6).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig6_HTML.jpg)


    A process flow diagram of a container X with a write layer and four layers. The
    layers are connected to the write layer through the data and metadata. Each has
    a layer I D, metadata, data, and parent data.


    Figure 7-6


    **Anatomy of a Docker image**


    ### Docker Images vs. Containers


    Docker images are read-only templates used to build containers. Containers are
    deployed instances created from those templates. Images and containers are closely
    related and are essential in powering the Docker software platform.


    When a container is launched from an image, Docker mounts a read-write filesystem
    on the top. In this read-write layer, whatever processes you want the Docker container
    to run will execute. Figures [7-6](#619782_1_En_7_Chapter.xhtml#Fig6) through
    [7-8](#619782_1_En_7_Chapter.xhtml#Fig8) represents this process.


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig7_HTML.jpg)


    A 3-D diagram of two rectangular prisms stacked on top of each other. The top
    is labeled Container 1 and the bottom is labeled Container 2. The top is divided
    into four layers, labeled Kernel, Debian, emacs, and Apache. The bottom is divided
    into two layers, labeled BusyBox and Kernel.


    Figure 7-7


    **Docker containers sharing image layers**


    Even if containers share the same images (layers), once they are instantiated
    from their image templates, they are separate and isolated, as shown in Figure
    [7-8](#619782_1_En_7_Chapter.xhtml#Fig8).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig8_HTML.jpg)


    2 3-D diagrams of Docker containers. Container 1 has 3 layers, the bottom layer
    is the kernel, the middle layer is the Apache, emacs, Debian, and kernel, and
    the top layer is a writable layer. Container 2 has 2 layers, the bottom layer
    is the kernel, and the top layer is the writable layer.


    Figure 7-8


    **Docker container isolation**


    When a container starts, the initial read-write layer is empty. As changes occur,
    they are applied to this read-write layer, as shown in Figure [7-9](#619782_1_En_7_Chapter.xhtml#Fig9).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig9_HTML.jpg)


    A 3-D diagram of a container with layers. The top layer is labeled the writable
    layer. Below that are layers labeled Apache, emacs, and Debian. Below those layers
    are layers labeled c groups, namespaces, device mappers, Kernel, and boot f s.


    Figure 7-9


    **Docker container write layer**


    To make it clear, if you want to change a file, that file will be copied from
    the read-only layer below into the read-write layer. The read-only version of
    the file will still exist, but it will be hidden underneath the copy by the overlays
    above it. See Figure [7-10](#619782_1_En_7_Chapter.xhtml#Fig10).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig10_HTML.jpg)


    An array diagram of a container. The layers are stacked on top of each other.
    From the bottom, the base layer, layer 1, layer 2, layer 3, and the write layer,
    which is layer 4. Each layer contains files A, B, C, D, and E. A dotted double-headed
    arrow connects file D in the base layer to file D in layer 3.


    Figure 7-10


    **The process of a Docker container write**


    Each container can apply its own changes to its container read-write layer because
    they are isolated. See Figure [7-11](#619782_1_En_7_Chapter.xhtml#Fig11).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig11_HTML.jpg)


    A process diagram defines the process of a docker container copy on write. Containers
    1, 2, and 3 have a read-write layer. The containers are stacked on top of each
    other, with the base layer at the bottom. The base layer is read-only, and each
    container can apply its changes to its container read-write layer.


    Figure 7-11


    **The process of a Docker container copy on write**


    This pattern is traditionally called “copy on write” and is one of the features
    that makes Docker so powerful. Each read-only image layer is read-only—these images
    never change. When a container is created, Docker builds from the stack of images
    and adds the read-write layer on top. Figure [7-11](#619782_1_En_7_Chapter.xhtml#Fig11)
    shows the process of adding data to a container. Once you make your changes and
    commit them using Docker, Docker creates a new image. This image contains only
    the differences from the base. When you want to run this new image, you can make
    changes to that container, as represented in Figure [7-12](#619782_1_En_7_Chapter.xhtml#Fig12).


    ![](images/619782_1_En_7_Chapter/619782_1_En_7_Fig12_HTML.jpg)


    A process diagram of a container Y with layers stacked on top of each other. From
    the bottom, the base layer, layer 1, layer 2, layer 3, and layer 4, and the write
    layer, which is layer 5. Each has layer I D, metadata, data, and a parent. base
    layer to layer 3 creates image X and base to layer 4 create image Y.


    Figure 7-12


    **The process of a Docker container commit**'
