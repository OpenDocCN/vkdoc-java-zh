  trans: '

    ### 基于异步通道设计微服务


    本示例对第 2 章图 2-1 中展示的六边形微服务视图进行了细微调整，使两个微服务通过异步消息通道而非 HTTP 通道进行通信。Apache Kafka 被用作消息通道，它本质上是异步的。请记住，目标是在基于
    Kafka 的异步通道上模拟同步风格的通信。参见图 4-6。


    ![](img/619782_1_En_4_Fig6_HTML.jpg)


    微服务通信流程图。流程始于传入的命令、REST API、实体、请求通道以及最终实体。


    图 4-6


    微服务通过异步通道通信


    来自浏览器的最终用户请求将首先到达 Product Web 微服务。Product Web 微服务将通过消息通道将请求委托给 Product Server
    微服务。Product Server 微服务可以自动知道应向哪个通道向 Product Web 微服务发送回复，但如前所述，硬编码的假设会降低软件的灵活性并增加维护难度。在这种情况下，单个
    Product Server 微服务实例可能正在处理来自多个不同请求者类型，甚至来自同一请求者类型的多个实例的调用，因此回复通道并非对每条消息都相同。它取决于发送该请求消息的请求者。在这种情况下，你可以使用返回地址模式。


    请注意，此示例中的 Product Server 微服务使用的是消息端口，这与之前示例中使用的 HTTP 端口不同。这进一步验证了六边形架构中不同的端口和适配器如何能够根据需要轻松地插入。


    ### 理解代码


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
    `ch04\ch04-01` 文件夹内。本节首先查看消费者微服务（即 Product Web 微服务）中的变更。


    使用的核心组件是 Spring 中的 `ReplyingKafkaTemplate<K,V,R>`，它扩展了 `KafkaTemplate` 的行为，以提供请求-回复语义。要设置此组件，你需要一个生产者（`ProducerFactory`）和一个
    `KafkaMessageListenerContainer`。清单 4-1 展示了如何使用 Kafka `Configuration` 类来实现这一点。


    ```

    @Configuration

    public class KafkaConfig {

    @Bean

    public Map producerConfigs() {

    // 配置值写在这里

    }

    @Bean

    public Map consumerConfigs() {

    // 配置值写在这里

    }

    @Bean

    public ProducerFactory producerFactory() {

    return new DefaultKafkaProducerFactory(

    producerConfigs());

    }

    @Bean

    public KafkaTemplate kafkaTemplate() {

    return new KafkaTemplate(producerFactory());

    }

    @Bean

    public ReplyingKafkaTemplate

    replyKafkaTemplate(ProducerFactory pf, KafkaMessageListenerContainer container){

    return new ReplyingKafkaTemplate(pf, container);

    }

    @Bean

    public KafkaMessageListenerContainer

    replyContainer(

    ConsumerFactory cf) {

    ContainerProperties containerProperties =

    new ContainerProperties(requestReplyTopic);

    return new KafkaMessageListenerContainer(cf,

    containerProperties);

    }

    @Bean

    public ConsumerFactory

    consumerFactory() {

    return new DefaultKafkaConsumerFactory(

    consumerConfigs(),

    new StringDeserializer(),new JsonDeserializer(

    Products.class));

    }

    @Bean

    public KafkaListenerContainerFactory>

    kafkaListenerContainerFactory() {

    ConcurrentKafkaListenerContainerFactory factory =

    new ConcurrentKafkaListenerContainerFactory();

    factory.setConsumerFactory(consumerFactory());

    factory.setReplyTemplate(kafkaTemplate());

    return factory;

    }

    @Bean

    public KafkaAdmin admin() {

    Map configs = new HashMap();

    configs.put(ConsumerConfig.BOOTSTRAP_SERVERS_CONFIG,

    bootstrapServers);

    return new KafkaAdmin(configs);

    }

    @Bean

    public NewTopic requestTopic() {

    Map configs = new HashMap();

    configs.put("retention.ms", replyTimeout.toString());

    return new NewTopic(requestReplyTopic, 2, (short) 1).

    configs(configs);

    }

    }

    清单 4-1

    消息生产者的 Kafka 配置 (ch04\ch04-01\02-ProductWeb\src\main\java\com\acme\ecom\product\KafkaConfig.java)

    ```


    为了理解事件传输机制，请考虑一个典型事件（也称为消息）的外观：


    *   事件键：“Ria”


    *   事件值：“向 Ann 支付了 300 美元”


    *   事件时间戳：“2021 年 9 月 25 日下午 3:06”


    每个事件都有一个发起者，并且事件通常是时间序列数据。如果你查看发送事件的模板，`ReplyingKafkaTemplate <K, V, R>` 在消息被提供者或生产者端的
    Kafka 监听器消费后，会提供一个返回对象或回复对象。类型参数表示：


    *   `K` – 键类型


    *   `V` – 出站数据类型


    *   `R` – 回复数据类型


    此处，示例事件中显示的事件时间戳可以是一个可选的元数据标头。键用于确定消息被追加到消息基础设施日志中的哪个分区。值是消息的实际负载。当新事件发布到主题时，它会被追加到该主题的某个分区中。具有相同事件键（例如，客户
    ID 或账户 ID）的事件会被写入同一分区，并且 Kafka 保证给定主题-分区的任何消费者将始终按照写入顺序读取该分区的事件。


    键和/或值也可以为 null。如果键为 null，则会随机选择一个分区。如果值为 null，并且你为主题启用了日志压缩策略而非日志保留策略，则它可以具有特殊的“删除”语义。

    '
- fmt: 'Using the key to direct to a partition is the default strategy of the producer.
    Specifying the key so that all events on the same key go to the same partition
    is important for proper ordering of message processing, if you have multiple consumers
    in a consumer group^([³](#fn3)) on a topic. Without a key, two messages on the
    same key could go to different partitions and be processed by different consumers
    in the group, out of order.


    Ultimately, the producer chooses which partition to use. If you specify the `partition`
    parameter, it will be used, and the key will be “ignored” even though it’s still
    written into the topic. This allows you to have a customized partitioning even
    if you have keys. In other words, the order guarantees come not from the key but
    from messages being in the same partition. To restate, the routing of messages
    to partitions doesn’t have to be key-based. You can explicitly specify a partition
    when creating a `ProducerRecord`.


    This example defines the bean as `ReplyingKafkaTemplate<String, String, Products>`,
    where you will send a `String` type request to Kafka and then get the `Products`
    type object as the reply data type. You will create the `Products` and the included
    DTO classes in the next section. To summarize, you set up a `ReplyingKafkaTemplate`
    that sends request messages with `String` keys and receives reply messages with
    `String` keys. The `ReplyingKafkaTemplate` needs to be backed by a `Request ProducerFactory`,
    a `ReplyConsumerFactory`, and a `MessageListenerContainer`, with corresponding
    consumer and producer configs, which was done in the `KafkaAdmin` in Listing [4-1](#619782_1_En_4_Chapter.xhtml#PC1).


    When you define a `KafkaAdmin` bean in the application context, it can automatically
    add topics to the broker. To do that, you need to add a `NewTopic @Bean` for each
    topic to the application context.


    The `ContainerProperties` contains runtime properties for a listener container.
    Even though you specify the reply address using `requestReplyTopic`, you will
    later see that this example explicitly sets the return address while sending the
    message. It creates a single-threaded message listener container using the Java
    consumer.


    The REST controller class, which is used in `ReplyingKafkaTemplate`, is configured
    in `KafkaAdmin` in Listing [4-2](#619782_1_En_4_Chapter.xhtml#PC2).


    ```

    @RestController

    public class ProductRestController{

    @Autowired

    ReplyingKafkaTemplate kafkaTemplate;

    @Value("${kafka.topic.request-topic}")

    private String requestTopic;

    @Value("${kafka.topic.requestreply-topic}")

    private String requestReplyTopic;

    @RequestMapping(value = "/productsweb",

    method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity>>

    getAllProducts() throws InterruptedException,

    ExecutionException {

    ProducerRecord record =

    new ProducerRecord(requestTopic, "All");

    record.headers().add(new RecordHeader(

    KafkaHeaders.REPLY_TOPIC,

    requestReplyTopic.getBytes()));

    RequestReplyFuture

    sendAndReceive =

    kafkaTemplate.sendAndReceive(record);

    ConsumerRecord consumerRecord =

    sendAndReceive.get();

    return new ResponseEntity(consumerRecord.value().

    getProducts(), HttpStatus.OK);

    }

    }

    Listing 4-2

    Kafka Configuration for Message Producer (ch04\ch04-01\02-ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    The REST controller receives the requests from the client device, the browser
    in this case. Inside the controller, the `requestReplyKafkaTemplate` generates
    and sets a `KafkaHeaders.CORRELATION_ID` header. The `CorrelationId` should be
    consumed by the provider microservice and return the same in the header. You need
    to set the `KafkaHeaders.REPLY_TOPIC` header on the request explicitly, even though
    the same reply topic was redundantly wired into the `replyListenerContainer` in
    the `KafkaConfig` earlier.


    The `sendAndReceive` method of `ReplyingKafkaTemplate` sends a request and receives
    a reply with the default timeout. It gives you a `RequestReplyFuture`, on which
    you can call the `get`, which will wait if necessary for the computation to complete
    and then retrieve its result. `Products` in this case.


    Next, look at the `Products` class. See Listing [4-3](#619782_1_En_4_Chapter.xhtml#PC3).


    ```

    public class Products {

    private List products;

    public List getProducts() {

    return products;

    }

    public void setProducts(List products) {

    this.products = products;

    }

    }

    Listing 4-3

    The Container Class to Return Collection of Product Entities (ch04\ch04-01\02-ProductWeb\src\main\java\com\acme\ecom\product\model\Products.java)

    ```


    `Products` is just a container wrapper that holds a collection of `Product` instances.


    The Product Web microservices configuration is shown in Listing [4-4](#619782_1_En_4_Chapter.xhtml#PC4),
    where the `requestreply-topic` refers to the topic to which the provider is supposed
    to send the response.


    ```

    server.port=8080

    spring.kafka.bootstrap-servers: localhost:9092

    spring.kafka.consumer.auto-offset-reset: earliest

    spring.kafka.consumer.group-id: product-web

    kafka.topic.requestreply-topic: product-req-reply-topic

    kafka.topic.request-topic=product-req-topic

    kafka.request-reply.timeout-ms: 20000

    Listing 4-4

    The Product Web Microservices Configuration (ch04\ch04-01\02-ProductWeb\src\main\resources\application.properties)

    ```


    On the Product Server microservice side, a regular `KafkaListener` is listening
    on the request topic. See Listing [4-5](#619782_1_En_4_Chapter.xhtml#PC5).


    ```

    @Component

    public class ProductListener {

    @KafkaListener(topics = "${kafka.topic.request-topic}")

    @SendTo

    public Products listen(String request) {

    List productList = getAllTheProducts();

    Products products = new Products();

    products.setProducts(productList);

    return products;

    }

    }

    Listing 4-5

    The Product Web Microservices Configuration (ch04\ch04-01\01-ProductServer\src\main\java\com\acme\ecom\product\kafka\client\ProductListener.java)

    ```


    This listener is decorated with an additional `@SendTo` annotation, to provide
    the reply message. The `Product` instances retrieved by the `getAllTheProducts()`
    method and returned by the `listener` method is automatically wrapped into a reply
    message. The `CORRELATION_ID` is added, and the reply is posted on the topic specified
    by the `REPLY_TOPIC`. The `@KafkaListener` is used to subscribe to the request
    Kafka topic. Using the annotation, the `@SendTo` annotation enables the `listener`
    method to send a response to another reply topic. Figure [4-7](#619782_1_En_4_Chapter.xhtml#Fig7)
    illustrates the dynamics of these interactions and is marked with labels in the
    order of event flow.


    ![](images/619782_1_En_4_Chapter/619782_1_En_4_Fig7_HTML.jpg)


    A flow diagram of the Kafka template reply. It consists of 2 blocks of product
    web and server microservices. The replying Kafka template consists of a Kafka
    producer and reply container.


    **Figure 4-7** Replying Kafka template


    You have a `KafkaConfig` for the provider microservice too, but it’s simple and
    straightforward compared to the consumer microservice, so it’s not listed here.'
