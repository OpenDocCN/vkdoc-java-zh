    如前所述，Minikube 是本地 Kubernetes。使用 Minikube 设置一个单节点的本地 Kubernetes 相当容易。此外，本地 Kubernetes
    还能在你将更改提交到团队环境之前，加速开发机器上的代码编写、测试、部署和调试循环周期。Minikube 还能让开发者在 Windows 和 Mac 环境中开发和测试容器化应用程序，而这两种操作系统是应用程序开发者偏爱的开发机器操作系统。


    附录 E 关于容器工具的部分提供了在 Mac 环境中安装和启动 Minikube 的详细说明。


    下一节将涉及一些代码。你将把第一个应用程序部署到基于 Minikube 的本地 Kubernetes 集群中。


    ## Kubernetes 中的微服务和 MongoDB


    本示例复用了第 3 章中“使用 MongoDB 和 CrudRepository 的微服务”一节中的微服务。它使用了相同的两个微服务——一个消费者微服务和一个提供者微服务，它们通过
    REST 协议相互通信。提供者微服务还与 MongoDB 进行交互。你将使用卷来持久化 MongoDB 数据库数据。整体设计请参考第 2 章中的图 2-1。


    ### 设计微服务部署拓扑


    本示例复用了第 9 章第二个示例中定义的部署模式，如图 9-2 所示。一个变化是，本示例使用了 Kubernetes。


    微服务的部署拓扑如图 10-11 所示。


    ![](img/619782_1_En_10_Fig11_HTML.jpg)


    一张图表展示了用户如何与浏览器交互，浏览器向产品 Web 微服务发送请求。该微服务有多个 product-web Pod，它们与产品服务器微服务通信。它利用了一个
    MongoDB，该 MongoDB 由 Minikube 和 Docker 部署在 Kubernetes 集群上。


    图 10-11


    基于 Kubernetes 的微服务部署拓扑


    在这里，Product Web 和 Product Server 容器提供业务服务，而 Mongo 容器则提供用于持久化状态的应用程序服务。

