    }

    代码清单 3-6

    Product 实体 (ch03\ch03-02\01-ProductServer\src\main\java\com\acme\ecom\product\model\Product.java)

    ```


    Project Lombok 的 `@Builder` 是一种有用的机制，无需编写样板代码即可使用构建器模式。您可以将此注解应用于类或方法。


    `@Data` 是一个便捷的快捷注解，它将 `@ToString`、`@EqualsAndHashCode`、`@Getter`/`@Setter` 和 `@RequiredArgsConstructor`
    的功能捆绑在一起。也就是说，`@Data` 会生成通常与普通 Java 对象（POJO）和 Bean 相关的所有样板代码，主要包括所有字段的 getter、所有非
    final 字段的 setter，以及涉及类字段的适当的 `toString`、equals 和 `hashCode` 实现，还有一个初始化所有 final
    字段以及所有没有初始化器且已用 `@NonNull` 标记的非 final 字段的构造函数，以确保该字段永远不会为 null。


    代码清单 3-7 显示了 Product Server 微服务的 `ProductRepository` 用于将数据持久化到 PostgreSQL 数据库的
    `ProductOR` 实体类。


    ```

    import javax.persistence.Id;

    @Data

    @NoArgsConstructor

    @Entity

    @Table(name ="product")

    public class ProductOR{

    @GeneratedValue(strategy = GenerationType.IDENTITY)

    @Id

    @Column(name = "productid")

    private Long productId;

    @Column(name = "prodname")

    private String name;

    @Column(name = "code")

    private String code;;

    @Column(name = "title")

    private String title;

    @Column(name = "price")

    private Double price;

    }

    代码清单 3-7

    ProductOR 实体 (ch03\ch03-02\01-ProductServer\src\main\java\com\acme\ecom\product\model\ProductOR.java)

    ```


    您使用 JPA 进行持久化。JPA 中的实体不过是使用 `@Entity` 注解的 POJO，表示可以持久化到数据库的数据。一个实体代表存储在数据库中的一个表。实体的每个实例代表表中的一行。您必须在类级别指定
    `@Entity` 注解。您还必须确保实体有一个无参构造函数和一个主键。实体名称默认为类的名称。您可以使用 `name` 元素 `@Entity(name="product")`
    更改其名称。在某些情况下，数据库中的表名和实体名会不同。在这些情况下，您可以使用 `@Table` 注解指定表名。


    每个 JPA 实体都必须有一个唯一标识它的主键。`@Id` 注解定义了主键。您可以通过多种方式生成标识符，由 `@GeneratedValue` 注解指定。您可以通过
    strategy 元素从四种 ID 生成策略中进行选择。该值可以是 `AUTO`、`TABLE`、`SEQUENCE` 或 `IDENTITY`。


    您还可以使用 `@Column` 注解来提及表中列的详细信息。`@Column` 注解有许多元素，包括 `name`、`length`、`nullable`
    和 `unique`。


    引入 `ProductOR` 实体还有另一个原因。我想演示在使用端口和适配器架构时，您可以最大限度地重用核心实体和核心业务服务。换句话说，我想演示此示例中使用的
    `Product` 实体也会在下一个示例中重用，这将验证在运行时插入不同驱动适配器同时仍重用核心的能力。为此，`ProductOR` 实体将处理所有适配器（数据库）特定的细节。


