    ### HTTP Methods for CRUD on Resources


    RPC-based APIs are great for actions (that is, procedures or commands), whereas
    REST-based APIs are great for modeling your domain (that is, resources or entities),
    making CRUD (create, read, update, delete) available for all your data. REST uses
    HTTP methods such as GET, POST, PUT, DELETE, OPTIONS and, hopefully, PATCH, to
    provide semantic meaning for the intention of the action being taken.


    The main methods in HTTP you can leverage for implementing REST are listed here:


    *   GET: GET is the simplest HTTP operation and its intention is to retrieve a
    resource from the server. 200 OK is the status code for a successful operation.
    All GET operations should be *idempotent*, which means regardless of how many
    times you repeat the operation with the same parameters, there should not be any
    change in state for the resource.


    *   POST: HTTP POST provides an option for clients to send information to the
    server. POST is recommended for creating a new resource (even though it can also
    update an existing resource).


    *   PUT:^([⁵](#fn5)) HTTP PUT also provides an option for clients to send information
    to the server; however, the usage semantics of PUT are slightly different from
    that of POST, as per HTTP. Using PUT, you can send a “new object” to the server
    to be placed at a location in the server represented by the URI, so the intent
    should be to replace the resource with a new one. A PUT request is idempotent
    as far as a single client is concerned. If only a subset of data elements is provided
    in a PUT request, the rest will be replaced with empty or null.


    *   DELETE: DELETE allows clients to remove a resource from the server. The URI
    identifies the resource to be deleted. The resource may not have to be removed
    immediately; instead, it can be done by an asynchronous or long-running operation
    behind the scenes.


    REST is not only CRUD, but things are done through mainly CRUD-based operations.


    RPC, however, does not strictly follow standard HTTP verbs. Most use only GET
    and POST, with GET being used to retrieve information and POST being used for
    everything else. It is common to see RPC APIs using something like POST `/deleteBar`,
    with a body of `{ "id": 10 }`, instead of the REST approach, which would be DELETE
    `/bars/10`.


    JSON (JavaScript Object Notation) is an open standard file format and data interchange
    format that uses human-readable text to store and transmit data objects consisting
    of attribute–value pairs and arrays (or other serializable values). If you want
    to continue using this format, instead of sync style HTTP transport, you can use
    async style messaging transport. But when you don’t use standard HTTP, you miss
    the opportunity to use standard HTTP verbs and any of their associated advantages.


    The next section looks at two examples demonstrating a few of these discission
    items. Specifically, we will adhere to REST for the end point APIs and we will
    attempt to stick to JSON for inter-microservice communication over Kafka.'
  trans: '

    ### XML-RPC 与 SOAP


    十多年来，XML-RPC 和 SOAP 一直是使用 Web 服务进行远程服务调用的基石。Web 服务由 WSDL（Web 服务描述语言）文档描述，该文档充当服务提供者与服务消费者之间的契约。WSDL
    文档描述了 Web 服务如何绑定到消息传递协议——对于 Web 服务而言，即 SOAP 协议。


    WSDL SOAP 绑定可以是面向 RPC 的绑定，也可以是面向文档的绑定。


    *   **面向 RPC 的风格：** 使用面向 RPC（远程过程调用）风格的 Web 服务是接口驱动的。在此，客户端应用程序通过发送请求的参数值并接收响应的参数值来调用
    Web 服务方法（调用远程过程）。SOAP 请求的正文包含一个用于此方法的包装 XML 元素。该方法的参数作为子元素嵌入在此包装元素内。


    *   **面向文档的风格：** 使用面向文档风格的 Web 服务是文档（更准确地说是 XML 文档）驱动的。在此，客户端应用程序将参数作为 XML 文档发送给
    Web 服务，而不是作为离散的参数值集合。SOAP 请求和响应消息的正文包含一个或多个 XML 文档。面向文档的风格比面向 RPC 的风格更扁平，并且不需要使用包装元素。


    ### REST 与 JSON-RPC


    在最近一段时间，每当有人想要开始构建 HTTP API 时，他们几乎都专门使用 REST 作为事实上的架构风格，而不是 XML-RPC 和 SOAP 等替代方法。REST
    指定了一种客户端-服务器关系，其中服务器端数据通过简单格式（通常是 JSON 和 XML）的数据表示形式提供。这些用于资源或资源集合的表示形式随后可以通过操作（更准确地说是
    HTTP 操作）进行修改。数据之间的关系通过一种称为*超媒体*的方法变得可发现。超媒体是 REST 的基础，本质上就是提供指向其他资源的链接的概念。在第 2
    章标题为“HATEOAS 和 HAL”的部分中，您已经了解了这一点。


    JSON-RPC 是一种用 JSON 编码的远程过程调用协议。它类似于 XML-RPC 协议，只定义了少数数据类型和命令。JSON-RPC 允许通知（发送到服务器但不需要响应的数据）以及向服务器发送多个调用，这些调用可以异步应答。


    ### RPC 与消息传递


    这两种协议的根本区别在于 RPC 框架是同步的。您发起一个调用，在收到响应之前，该调用不会完成。另一方面，消息传递是异步的。您发送消息，要么不期望得到响应，要么不知道响应何时会返回（如果真有响应的话）！


    如果您的调用者需要从您正在请求或调用的服务的响应中获取信息，那么您应该使用 RPC，因为在从提供者那里获得所需信息之前，您无法返回给调用者。如果您的调用者不需要来自下游服务的信息，您可以使用消息传递。发送消息后即可忘记它，因为您不期望（更确切地说，是无法期望）收到响应。


    ### RPC 风格的消息传递


    如前所述，消息传递范式试图强制执行一种“发送即忘”的消息传递风格，但可以使用设计得当的消息队列来执行和模拟 RPC，如第 5 章所述。第 5 章中的图 5-7
    描述了微服务通信的不同回复通道，而图 5-8 描述了相互通信的微服务的不同回复分区。在这两种场景中，您都可以在消息传递通道上模拟参与微服务之间的同步风格请求-响应。


    与 XML-RPC 或 SOAP 场景不同，当微服务通过普通消息传递通道进行通信时，它们不会严格绑定到严格的消息调用模式——缺少一种充当服务提供者与服务消费者之间契约的
    WSDL 类机制。因此，您需要编织一种机制来指定“要执行什么操作”。HTTP 提供了标准动词来为正在执行的操作意图提供语义含义。


    ### 用于资源 CRUD 的 HTTP 方法


    基于 RPC 的 API 非常适合操作（即过程或命令），而基于 REST 的 API 非常适合对您的领域（即资源或实体）进行建模，为您的所有数据提供 CRUD（创建、读取、更新、删除）功能。REST
    使用 HTTP 方法，例如 GET、POST、PUT、DELETE、OPTIONS 以及（希望如此）PATCH，来为正在执行的操作意图提供语义含义。


    您可以利用来实现 REST 的 HTTP 主要方法如下：


    *   **GET：** GET 是最简单的 HTTP 操作，其意图是从服务器检索资源。200 OK 是成功操作的状态码。所有 GET 操作都应该是*幂等*的，这意味着无论您使用相同参数重复操作多少次，资源的状态都不应发生任何变化。


    *   **POST：** HTTP POST 为客户端提供了一种向服务器发送信息的选项。建议将 POST 用于创建新资源（尽管它也可以更新现有资源）。


    *   **PUT：**^(⁵) HTTP PUT 也为客户端提供了一种向服务器发送信息的选项；但是，根据 HTTP 规范，PUT 的使用语义与 POST
    略有不同。使用 PUT，您可以向服务器发送一个“新对象”，将其放置在由 URI 表示的服务器上的某个位置，因此其意图应该是用新资源替换现有资源。就单个客户端而言，PUT
    请求是幂等的。如果在 PUT 请求中只提供了数据元素的子集，其余部分将被替换为空或 null。


    *   **DELETE：** DELETE 允许客户端从服务器删除资源。URI 标识要删除的资源。资源可能不必立即删除；相反，可以通过后台的异步或长时间运行的操作来完成。


    REST 不仅仅是 CRUD，但事情主要通过基于 CRUD 的操作来完成。


    然而，RPC 并不严格遵循标准的 HTTP 动词。大多数只使用 GET 和 POST，其中 GET 用于检索信息，POST 用于其他所有事情。常见的做法是看到
    RPC API 使用类似 `POST /deleteBar` 的方式，并带有 `{ "id": 10 }` 的请求体，而不是 REST 方法，后者会是 `DELETE
    /bars/10`。


    JSON（JavaScript 对象表示法）是一种开放标准的文件格式和数据交换格式，它使用人类可读的文本来存储和传输由属性-值对和数组（或其他可序列化值）组成的数据对象。如果您想继续使用这种格式，而不是同步风格的
    HTTP 传输，您可以使用异步风格的消息传递传输。但是，当您不使用标准 HTTP 时，您就失去了使用标准 HTTP 动词及其任何相关优势的机会。


    下一节将看两个示例，演示其中的一些讨论要点。具体来说，我们将为端点 API 坚持使用 REST，并尝试在通过 Kafka 进行的微服务间通信中坚持使用 JSON。

    '
- fmt: '# CRUD Microservices Over Kafka on MongoDB


    This example tweaks the same set of microservices in Chapter [5](#619782_1_En_5_Chapter.xhtml).
    A consumer and a provider microservice communicate with each other using Kafka
    as the messaging channel. The provider microservice stores the entity in a MongoDB
    database. Moreover, when the browser sends the request to the first (consumer)
    microservice, it uses async HTTP. Even though it uses async HTTP, the example
    emulates a sync-style user experience at the browser level.


    As with the example in Chapter [5](#619782_1_En_5_Chapter.xhtml), this example
    is demonstrated with multiple instances of the consumer and provider microservices,
    and it uses multiple clients while testing the service.


    This example introduces a new functional feature. It emulates a full CRUD (Create,
    Read, Update and Delete) feature through the microservice interactions, using
    Kafka as the messaging channel.


    ## Design CRUD Over Async Channel on MongoDB


    This example uses the modified version of the hexagonal microservice view shown
    in Figure [2-1](#619782_1_En_2_Chapter.xhtml#Fig1) in Chapter [2](#619782_1_En_2_Chapter.xhtml),
    which you also visited in Chapter [5](#619782_1_En_5_Chapter.xhtml), so that both
    microservices communicate through an async channel. Apache Kafka is used as the
    messaging channel, which is inherently asynchronous. The objectives of this example
    are multifold:


    ![](images/619782_1_En_6_Chapter/619782_1_En_6_Fig1_HTML.jpg)


    A microservice design has the following components. User. Browser. REST A P I.
    Product web microservice instances. Product server microservice instances.


    **Figure 6-1** Microservice design over async channel using partitions


    - To invoke synchronous-style communication over the Kafka-based async channel.

    - To demonstrate that multiple consumer types or multiple instances of the same
    consumer type can connect to one or more instances of the provider microservice
    and still receive the right responses corresponding to the respective request
    alone.

    - To demonstrate that the full set of CRUD actions can be orchestrated over the
    async channel.

    - To provide a sync-style experience to the users at the browser end, even though
    the example uses async HTTP.

    - To demonstrate that the browser can consume from fully compliant HATEOAS interfaces.


    As shown in Figure [6-1](#619782_1_En_6_Chapter.xhtml#Fig1), this example will
    leverage Kafka partitions as the main concurrency mechanism in the async channel
    between the microservices. This async topic is divided into one or more partitions,
    five in this case, enabling the producer and consumer loads to be scaled. The
    consumers are shared evenly across the partitions, allowing for the consumer load
    to be linearly scaled by increasing the provider instances and their provisioned
    partitions.


    ## Understanding the Source Code


    The source code for this book is available on GitHub via the book''s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The code for this example is organized inside the `ch06\ch06-01` folder. Much
    of the source code for this example is similar to that in `ch05\ch05-01`. I explained
    in detail how to set up consumer and provider microservices that communicate with
    each other using a messaging channel. This section covers only the changes.


    The main class to inspect is a new container class for the `Product` entity (see
    Listing [6-1](#619782_1_En_6_Chapter.xhtml#PC1)), which has the following functions:


    - Acts as a container to transport collections of resources between microservices

    - Acts as a schema specification


    ```

    public class Products {

    public static final String CREATE = "Create";

    public static final String DELETE = "Delete";

    public static final String DELETE_ALL = "Delete_All";

    public static final String UPDATE = "Update";

    public static final String RETREIVE_ALL = "Retreive_All";

    public static final String RETREIVE_DETAILS =

    "Retreive_Details";

    public static final String SUCCESS = "Success";

    public static final String FAILURE = "Failure";

    private String operation;

    private List products;

    public String getOperation() {

    return operation;

    }

    public void setOperation(String operation) {

    this.operation = operation;

    }

    public List getProducts() {

    return products;

    }

    public void setProducts(List products) {

    this.products = products;

    }

    }

    ```


    **Listing 6-1** The Container Class for Product Entity (`ch06\ch06-01\02-ProductWeb\src\main\java\com\acme\ecom\product\model\Products.java`)


    The `Products` class lists counterparts for CRUD HTTP verbs as constant literals.
    The `attribute` operation is used to specify the action intended to be performed
    during the request phase. In the response phase, the same operation specifies
    the outcome of the request processing as "Success" or "Failure". Next, the `products`
    collection may contain one or more `Product` entity. In the request phase, the
    `products` attribute contains one `Product` entity, whose attribute values correspond
    to the parameters of the operation to be performed. In the response phase of the
    operation, the same `products` collection may contain one or more `Product` entities
    corresponding to the response of the performed operation.


    This method of piggybacking the request and response parameters and operations
    as payload is not the best, most elegant way, but it does the job.


    Listing [6-2](#619782_1_En_6_Chapter.xhtml#PC2) shows the configuration class
    used by the Product Web microservice.


    ```

    @Configuration

    public class KafkaConfig {

    @Bean

    public CompletableFutureReplyingKafkaOperations replyKafkaTemplate() {

    CompletableFutureReplyingKafkaTemplate

    requestReplyKafkaTemplate = new

    CompletableFutureReplyingKafkaTemplate(

    requestProducerFactory(),

    replyListenerContainer());

    requestReplyKafkaTemplate.setDefaultTopic(

    requestTopic);

    requestReplyKafkaTemplate.setDefaultReplyTimeout(

    Duration.of(replyTimeout, ChronoUnit.MILLIS));

    return requestReplyKafkaTemplate;

    }

    @Bean

    public ConsumerFactory

    replyConsumerFactory() {

    JsonDeserializer jsonDeserializer =

    new JsonDeserializer();

    jsonDeserializer.addTrustedPackages(

    Products.class.getPackage().getName());

    return new DefaultKafkaConsumerFactory(

    consumerConfigs(), new StringDeserializer(),

    jsonDeserializer);

    }

    @Bean

    public KafkaMessageListenerContainer

    replyListenerContainer() {

    ContainerProperties containerProperties =

    new ContainerProperties(replyTopic);

    return new KafkaMessageListenerContainer(

    replyConsumerFactory(), containerProperties);

    }

    }

    ```


    **Listing 6-2** Kafka Configuration for Product Web Microservice (`ch06\ch06-01\02-ProductWeb\src\main\java\com\acme\ecom\product\KafkaConfig.java`)


    This code configures `CompletableFutureReplyingKafkaTemplate`, specifying that
    `Products` is sent as the request and `Products` is expected as the response.'
