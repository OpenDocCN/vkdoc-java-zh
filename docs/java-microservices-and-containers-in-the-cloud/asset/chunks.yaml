  trans: '

    ### Helm 的工作原理


    要理解这个概念，请回顾第 11 章的第一个示例。在 Product Server 微服务中，你为服务器实例定义了三个副本，如代码清单 12-25 所示。


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: product-server

    ...

    spec:

    replicas: 3

    ...

    template:

    ...

    spec:

    containers:

    - name: product-server

    ...

    env:

    - name: DB_SERVER

    value: postgres

    - name: spring.kafka.bootstrap-servers

    value: kafka-1-ip-service:9092

    代码清单 12-25

    Product Server Pod YAML 文件 (ch11\ch11-01\product-server-deployment.yml)

    ```


    假设在预发布环境中你只需要一个实例。为此，你需要更新描述文件中的 `replica` 值，并将其部署到 Kubernetes 中。更好的方法是使用 Helm，这样你就可以根据环境对字段进行参数化。在这个例子中，你可以使用另一个文件中的值来代替副本的静态值。这个文件叫做
    `values.yaml`。通过这种方式，Helm 帮助你从实际的 YAML 描述文件中分离出可配置的字段值。


    在下一节中，你将通过实践学到更多。


    ## Helm 打包微服务


    本节将向你展示如何为本章前面的示例启用 Helm。如附录 E 所述，我假设你已经在机器上安装了 Helm。


    ### 代码组织


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。示例的源代码组织如代码清单
    12-25 所示，位于 `ch12\ch12-05` 文件夹内。这遵循标准的 Maven 结构，因此 `pom.xml` 文件位于根目录。其中还包含一个名为
    `springboothelm` 的新文件夹，里面有许多文件，如代码清单 12-26 所示。


    ```

    ./ch12-05/

    ├── README.txt

    ├── clean.sh

    ├── make.sh

    ├── pom.xml

    ├── springboothelm

    │   ├── Chart.yaml

    │   ├── charts

    │   ├── templates

    │   │   ├── NOTES.txt

    │   │   ├── _helpers.tpl

    │   │   ├── deployment.yaml

    │   │   ├── ingress.yaml

    │   │   ├── service.yaml

    │   │   ├── serviceaccount.yaml

    │   │   └── tests

    │   │       └── test-connection.yaml

    │   └── values.yaml

    └── src

    └── main

    ├── java

    │   └── com

    │       └── acme

    │           └── ecom

    │               └── product

    │                   └── Application.java

    └── resources

    ├── application.yml

    └── log4j2-spring.xml

    代码清单 12-26

    Spring Boot 微服务源代码组织

    ```


    别慌；你不需要手动创建所有这些文件。相反，你可以自动生成其中的许多文件。


    ### 创建你的第一个 Helm Chart


    在开始创建你的第一个 Helm Chart 之前，请确保 Minikube 正在运行，如代码清单 12-7 所述，因为你需要有一个 Kubernetes 集群。


    接下来，从为此示例下载的源代码（`ch12\ch12-05`）中，删除 `springboothelm` 文件夹。然后，从项目文件夹的根目录，创建你的第一个
    Helm Chart。参见代码清单 12-27。


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-05

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm create springboothelm

    Creating springboothelm

    (base) binildass-MacBook-Pro:ch12-05 binil$ tree ./springboothelm/

    ./springboothelm/

    ├── Chart.yaml

    ├── charts

    ├── templates

    │   ├── NOTES.txt

    │   ├── _helpers.tpl

    │   ├── deployment.yaml

    │   ├── hpa.yaml

    │   ├── ingress.yaml

    │   ├── service.yaml

    │   ├── serviceaccount.yaml

    │   └── tests

    │       └── test-connection.yaml

    └── values.yaml

    3 directories, 10 files

    (base) binildass-MacBook-Pro:ch12-05 binil$

    代码清单 12-27

    创建你的第一个 Helm Chart

    ```


    我们先来看一下 `Chart.yaml`。这个文件包含了关于 Helm Chart 示例的所有元数据。参见代码清单 12-28。


    ```

    apiVersion: v2

    name: springboothelm

    description: A Helm chart for Kubernetes

    type: application

    version: 0.1.0

    appVersion: "1.16.0"

    代码清单 12-28

    Chart YAML 文件 (ch12/ch12-05/springboothelm\Chart.yaml)

    ```


    `apiVersion`、`name` 和 `version` 字段是必填的。对于 `apiVersion` 没有严格的规则。每个 Chart 都应该有自己的版本号，并且应该遵循语义化版本
    2.0。


    代码清单 12-29 展示了 `values.yaml` 文件。


    ```

    # Default values for springboothelm.

    # This is a YAML-formatted file.

    # Declare variables to be passed into your templates.

    replicaCount: 1

    image:

    repository: binildas/spring-boot-docker-k8s-helm

    pullPolicy: IfNotPresent

    imagePullSecrets: []

    nameOverride: ""

    fullnameOverride: ""

    ...

    代码清单 12-29

    Values YAML 文件 (ch12/ch12-05/springboothelm/values.yaml)

    ```


    这个文件相当冗长，但幸运的是你不需要管理它的所有内容。就此处而言，你只需要更新两行：


    ```

    repository: binildas/spring-boot-docker-k8s-helm

    port: 8080

    ```


    接下来需要更新的配置是 `deployment.yaml`。顾名思义，它用于部署目的。代码清单 12-30 展示了 `deployment.yaml` 文件。


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: {{ include "springboothelm.fullname" . }}

    labels:

    {{- include "springboothelm.labels" . | nindent 4 }}

    spec:

    replicas: {{ .Values.replicaCount }}

    selector:

    matchLabels:

    {{- include "springboothelm.selectorLabels" . | nindent 6 }}

    ...

    代码清单 12-30

    Deployment YAML 文件 (ch12/ch12-05/springboothelm/templates/deployment.yaml)

    ```


    这个文件也相当冗长，但幸运的是你也不需要管理它的所有内容。就此处而言，你只需要更新一行：


    ```

    containerPort: 8080

    ```


    你需要这样做，因为你需要将 Spring Boot 应用程序部署在端口 `8080` 上。


    `service.yaml` 文件用于将 Kubernetes 的 `springboothelm` 部署暴露为服务。你不需要对 `service.yaml`
    文件做任何更改。


    ### 确认 Helm Chart 的准确性


    你的 Spring Boot 应用程序的第一个 Helm Chart 已经基本准备就绪。检查 `service.yaml` 和 `deployment.yaml`
    文件以确认一切正常是明智的做法。为此，你应该退出 `springboothelm` 目录（回到项目根文件夹），然后执行代码清单 12-31 中的命令。


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-05

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm template springboothelm

    代码清单 12-31

    模板化 Helm Chart

    ```


    运行此命令将返回带有实际值的 `service.yaml`、`deployment.yaml` 和 `test-connection.yaml` 文件，以便你可以验证一切是否正确。


    作为一个可选步骤，Helm 还提供了一个名为 `lint` 的检查命令，你可以用它来提前识别可能的问题。参见代码清单 12-32。


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-05

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm lint springboothelm

    ==> Linting springboothelm

    [INFO] Chart.yaml: icon is recommended

    1 chart(s) linted, 0 chart(s) failed

    代码清单 12-32

    对 Helm Chart 使用 lint 命令

    ```


    你也可以使用以下 `-dry-run` 命令来验证你的 Spring Boot Helm Chart。参见代码清单 12-33。


    ```

    (base) binildass-MacBook-Pro:ch12-05 binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch12/ch12-05

    (base) binildass-MacBook-Pro:ch12-05 binil$ helm install springboothelm --debug
    --dry-run springboothelm

    ...

    代码清单 12-33

    Helm Chart 的试运行

    ```


    如果你的 Helm Chart 配置有任何问题，此检查会立即提示你。

