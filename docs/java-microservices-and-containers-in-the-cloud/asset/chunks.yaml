    ## 使用 MongoDB 和 Kafka 编排微服务


    这里，本示例再次复用了第 3 章中“使用 MongoDB 与 CrudRepository 的微服务”一节中的微服务。


    本示例使用相同的两个微服务——一个消费者微服务和一个提供者微服务。不过，它们通过 Kafka 消息通道进行通信。


    ### 编排容器拓扑


    对于当前的设计，你需要一个完整的基于容器的部署拓扑，如图 9-4 所示。Product Web 和 Product Server 微服务被容器化，而 Product
    Server 微服务将连接到一个同样部署在容器内的 MongoDB 数据库。Product Web 微服务和 Product Server 微服务之间的所有通信都通过
    Kafka 进行。


    ![](img/619782_1_En_9_Fig4_HTML.jpg)


