    当您通过执行 `mvn clean install` 触发 `MapStruct` 处理时，它将在 `/target/generated-sources/annotations/`
    目录下生成实现类。


    Product Server 微服务中 REST 控制器的其余实现与第 1 章中的代码清单 1-4 非常相似（唯一的区别是，此处使用 `ProductRepository`
    端口与 PostgreSQL 存储库交互，而非内存数据库），因此此处不再重复完整代码。


    现在让我们来看实体类。Product Server 微服务 API 中暴露的 `Product` 实体类如代码清单 3-6 所示。


    ```

    @Builder

    @Data

    @NoArgsConstructor

    @AllArgsConstructor

    public class Product{

    @ApiModelProperty(position = 1)

    private String productId;

    @ApiModelProperty(position = 2)

    private String name;

    @ApiModelProperty(position = 3)

    private String code;;

    @ApiModelProperty(position = 4)

