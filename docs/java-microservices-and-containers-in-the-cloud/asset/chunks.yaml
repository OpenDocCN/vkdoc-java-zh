    # 15. Microservices in AWS Elastic Kubernetes Service


    You learned in the previous chapter how to create a minimal compute infrastructure
    in AWS using the IaC tool Terraform. In this chapter, you extend that knowledge
    by setting up a Kubernetes-based infrastructure using the same toolset. You have
    already seen how a single-node Kubernetes based on Minikube enables you to run
    all the examples in this book up to the previous chapter. Now you will attempt
    to deploy those microservices in a multi-node Kubernetes-based infrastructure
    on the AWS cloud.


    This chapter covers the following concepts:


    - Elastic Kubernetes Service (EKS)

    - Setting up an AWS EKS using Terraform

    - Running microservice containers in AWS EKS


    ## The Amazon Elastic Kubernetes Service


    Amazon Elastic Kubernetes Service (Amazon EKS) runs the Kubernetes management
    infrastructure across Availability Zones. Applications running on any standard
    Kubernetes environment are fully compatible and can be migrated to Amazon EKS,
    so this chapter demonstrates how the microservices you deployed in Minikube can
    be deployed in EKS in AWS.


    Amazon EKS cluster consists of two primary components—the EKS control plane and
    the EKS worker nodes.


    ### EKS Control Plane


    The EKS control plane consists of nodes that run the Kubernetes software, such
    as `etcd` and the Kubernetes API server. (Refer to Chapter [10](#619782_1_En_10_Chapter.xhtml)
    for an overview of these components.) The control plane runs in an account managed
    by AWS, and the Kubernetes API is exposed via the Amazon EKS endpoint associated
    with your cluster. Each Amazon EKS cluster control plane runs on its own set of
    Amazon EC2 instances. These control plane nodes are also provisioned across multiple
    Availability Zones and fronted by an Elastic Load Balancing Network Load Balancer.
    Amazon EKS also provisions elastic network interfaces in your VPC subnets to provide
    connectivity from the control plane instances to the nodes.


    ### EKS Worker Nodes


    EKS worker nodes are part of the Kubernetes cluster, where the user’s workload
    is processed. Amazon EKS worker nodes are created in your AWS account, and they
    establish a connection to your cluster’s control plane instance running in an
    AWS managed account. Amazon EKS worker nodes are registered with the control plane.


    As of this writing, a related solution called Amazon EKS Blueprints was introduced.
    However, Amazon EKS still works.'
