    $ cd /Users/binil/binil/code/mac/mybooks/docker-03/ch07/ch07-01

    $ ls

    ProductWeb

    $ cd ProductWeb/

    $ ls

    pom.xml  src

    $

    (base) binildass-MacBook-Pro:~ binil$ tree ProductWeb/

    ProductWeb/

    ├── pom.xml

    └── src

    └── main

    ├── resources

    └── webapp

    ├── WEB-INF

    │   └── web.xml

    └── index.jsp

    5 directories, 3 files

    (base) binildass-MacBook-Pro:~ binil$

    Listing 7-13

    Log in to Minikube VM

    ```


    Inside the Minikube host, this is inside the `/Users/binil/binil/code/mac/mybooks/docker-03/ch07/ch07-01`
    folder, since that’s where the current working folder is (assuming that is your
    working folder). You might have to tweak it according to the path in your machine,
    since this example can be built and run from any folder.


    ### Build and Package Using Maven Container


    Here, you don’t make any changes to the Maven web app project. You see how to
    build and package it. In a terminal where you set the Minikube environment variables,
    as mentioned in Listing [7-2](#619782_1_En_7_Chapter.xhtml#PC2), you can run Docker
    again, as shown in Listing [7-14](#619782_1_En_7_Chapter.xhtml#PC15).


    ```

    (base) binildass-MacBook-Pro:~ binil$ docker run --rm -it -v $(pwd)/ProductWeb:/DockerHostProductWeb
    -w /DockerHostProductWeb maven:3.8.5-jdk-11 mvn clean package

    [INFO] Scanning for projects...

    [INFO]

    [INFO] -------------

    [INFO] Building ProductWeb Maven Webapp 1.0-SNAPSHOT

