    关于作者 关于技术审校


    # 1. 面向企业的微服务


    自微服务的原始理念及其变体被讨论和考虑以来，已过去十多年。如今，这种架构风格已成为常态，而非例外。其工具和框架已足够成熟，架构原则也已在本地环境和云环境中得到验证和证明。对于这种软件架构如何区别于其前身，已有足够清晰的认识，因此本章仅讨论一些在其他地方未被提及的关键点。


    本章首先概述计算范式，并解释当前微服务趋势的定位。你将了解到，微服务是分布式计算的另一种形式，但微服务的真正优势在于为微服务组件提供去中心化的业务事务处理能力。去中心化带来了对等微服务之间的自治性，从而为业务事务引入了一个显著特征，称为*最终一致性*。最终一致的系统具有更强的容错性，并为端到端业务事务提供可靠性，这些事务通常发生在相对不稳定的基于
    HTTP 的传输协议上。接下来，本章将探讨微服务与“非微服务”之间的边界，这部分内容涵盖在服务粒度讨论中。在结束本章之前，我还会通过一个示例介绍*六边形架构*的概念。第
    2 章中还有更多关于六边形架构的示例。


    本章涵盖以下主题：


    *   不同的计算架构范式

    *   最终一致的软件系统

    *   服务粒度

    *   六边形架构隐喻

    *   你的第一个 Java 微服务代码


    ## 计算架构范式


    理解微服务架构风格中服务的分布式特性至关重要，因此本节将解释这种架构是什么，以及它如何区别于其他更熟悉的架构。

