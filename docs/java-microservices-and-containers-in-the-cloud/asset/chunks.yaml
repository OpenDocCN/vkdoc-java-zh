- fmt: '### Cluster IP


    As the name implies, this provides access only inside the Kubernetes cluster.
    Other apps inside your cluster can access this, but there is no external access
    to the service. `ClusterIP` is described in Listing [10-1](#619782_1_En_10_Chapter.xhtml#PC1).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: product-web

    spec:

    selector:

    app: product-web

    type: ClusterIP

    ports:

    - name: http

    port: 80

    targetPort: 80

    protocol: TCP

    Listing 10-1

    The ClusterIP Definition

    ```


    You might now wonder how you access the service externally? The answer is to use
    a Kubernetes proxy, as shown in Figure [10-6](#619782_1_En_10_Chapter.xhtml#Fig6).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig6_HTML.jpg)


    A diagram illustrates how a user interacts with a browser, which sends requests
    to a proxy server. The proxy server then forwards the requests to a kubernetes
    cluster running a product web microservice. The microservice consists of multiple
    product-web pods that handle the requests.


    Figure 10-6


    Kubernetes proxy to ClusterIP


    You can start a Kubernetes proxy with this command:


    ```

    (base) binildass-MacBook-Pro:ch10-01 binil$ kubectl proxy --port=8080

    ```


    This will create a proxy server or application-level gateway between the localhost
    and the Kubernetes API server. All incoming data enters through one port and is
    forwarded to the remote Kubernetes API server port.


    ### NodePorts


    When you expose the service as a `NodePort` service, each cluster node opens a
    port on the node itself (hence the name) and redirects traffic received on that
    port to the respective service. The service is not only accessible at the internal
    cluster IP and port, but also through a dedicated port on all nodes or virtual
    machines.


    A `NodePort` is thus the most primitive way to get external traffic directly to
    your service. The definition of a `NodePort` is shown in Listing [10-2](#619782_1_En_10_Chapter.xhtml#PC3).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: product-server-nodeport

    spec:

    selector:

    app: product-server

    ports:

    - nodePort: 30002

    port: 8081

    targetPort: 8081

    type: NodePort

    Listing 10-2

    The NodePort Definition

    ```


    In Listing [10-2](#619782_1_En_10_Chapter.xhtml#PC3), `30002` is specified as
    the `nodePort`. You can only use ports `30000` to `32767`, and if it’s not specified,
    a random port is used.


    As shown in Figure [10-7](#619782_1_En_10_Chapter.xhtml#Fig7), since a service
    spans across nodes, a connection received on a port of the first node might be
    forwarded either to the pod running on the same first node or to one of the pods
    running on the other nodes.


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig7_HTML.jpg)


    A diagram illustrates how a user interacts with a browser, which sends requests
    to a load balancer that distributes traffic among multiple product-web pods within
    a kubernetes cluster. The pods run on virtual machines and communicate with each
    other on port `30000`.


    Figure 10-7


    Node port in Kubernetes


    ### Load Balancer


    Using a load balancer, you can expose services to the Internet. This makes the
    service accessible through a dedicated load balancer, provisioned from the cloud
    infrastructure that Kubernetes is running on. See Listing [10-3](#619782_1_En_10_Chapter.xhtml#PC4).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: product-web

    spec:

    selector:

    app: product-web

    type: LoadBalancer

    ports:

    - port: 8765

    targetPort: 80

    Listing 10-3

    The LoadBalancer Definition

    ```


    When you use a load balancer, there is no routing or filtering, and all the traffic
    you specify will be forwarded to the service, as shown in Figure [10-8](#619782_1_En_10_Chapter.xhtml#Fig8).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig8_HTML.jpg)


    A diagram illustrates how a user interacts with a browser, which sends requests
    to a load balancer that distributes traffic to the product-web micro pods within
    a kubernetes cluster. The product-web has several product-web pods.


    Figure 10-8


    Load balancer in Kubernetes


    The downside of the load balancer is that each service you expose will get its
    own IP address, and you must pay for one load balancer each for all services exposed.


    ### Ingress


    An *ingress* can expose multiple services through a single IP address. Ingress
    operates at the HTTP level (network layer 7), so it’s cost efficient. There are
    many kinds of ingress with different capabilities. See Figure [10-9](#619782_1_En_10_Chapter.xhtml#Fig9).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig9_HTML.jpg)


    A diagram illustrates how a user interacts with a browser, which sends requests
    to a load balancer that distributes traffic among multiple product-web and stock-web
    pods within a kubernetes cluster. The pods communicate with each other using an
    ingress controller.


    Figure 10-9


    Ingress in Kubernetes


    Listing [10-4](#619782_1_En_10_Chapter.xhtml#PC5) defines an ingress with two
    rules.


    ```

    apiVersion: networking.k8s.io/v1

    kind: Ingress

    metadata:

    name: ingress-service

    annotations:

    kubernetes.io/ingress.class: nginx

    spec:

    rules:

    - host: "adminer.acme.test"

    http:

    paths:

    - path: /

    pathType: Prefix

    backend:

    service:

    name: adminer

    port:

    number: 8080

    - host: "products.acme.test"

    http:

    paths:

    - path: /

    pathType: Prefix

    backend:

    service:

    name: product-web

    port:

    number: 8080

    Listing 10-4

    The Ingress Definition

    ```


    The rules in Listing [10-4](#619782_1_En_10_Chapter.xhtml#PC5) ensure that all
    HTTP requests received by the Ingress controller, in which the `products.acme.test`
    host is requested, will be sent to the `product-web` service on port `8080` and
    that all HTTP requests in which the `adminer.acme.test` host is requested will
    be sent to the adminer service on port `8080`.


    ## State Management


    When you look at pods and deployments in detail, you know that Kubernetes pods
    are to be designed for scaling out, even elastically. There is a downside to scaling
    architectures.


    ### Scale Out vs. State Management


    Although it is desirable to have elastic scale out architectures, state management
    poses issues. If the components are to be truly stateless, they are to be like
    “tellers in a bank” in the sense that you are not served by the same teller (person)
    every time. Similarly, every subsequent transaction could be served by any other
    instance of the similar component. This means, except your client device and your
    persistent store, every other intermediate component must be stateless. You cannot
    avoid state in the client tier, since then you cannot do any personalization,
    which will inhibit user experience. Similarly, for non-trivial applications, some
    kind of state has to be managed and you would typically do that in some kind of
    database.


    ### StatefulSets


    To solve the issue of state management, a *StatefulSet* represents a set of pods
    that are unique, persistent, and have a stable pod name (see Figure [10-10](#619782_1_En_10_Chapter.xhtml#Fig10)).
    In the case of the non-stateful `DeploymentSet`, whenever you deploy a pod, upon
    every deployment or restart you will get a different pod name—something like `product-server-6fb88b6849-6mrf5`
    or `product-web-5dfc886d6d-zvm8p`. In such cases, the pod name will change when
    it restarts. And on the next restart, it could be anything, like `product-web-5dfc886d6d-4qw45`
    or `product-server-6fb88b6849-dwkcf`. If you want a stable pod name, a `StatefulSet`
    can be used. Then, even when the deployment restarts, you will get the same pod
    name (such as `mongo-cluster-0`).


    ![](images/619782_1_En_10_Chapter/619782_1_En_10_Fig10_HTML.jpg)


    A diagram illustrates how a user interacts with a laptop, which sends requests
    to the persistence service. The service consists of multiple persistent pods that
    utilize persistent volume claims to access persistent volumes on underlying nodes.
    The PVs are provisioned based on a storage class.


    Figure 10-10


    Kubernetes stateful sets'
