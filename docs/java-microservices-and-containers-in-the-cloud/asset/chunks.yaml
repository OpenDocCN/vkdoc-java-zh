    ### 设计基于 Helm 的部署拓扑


    本示例遵循第 11 章中图 11-3 的部署拓扑。Product Web 和 Product Server 微服务均已容器化，Product Server
    微服务将连接到一个同样部署在容器内的 PostgreSQL 数据库。所有这些容器现在都将运行在 Kubernetes 内部。Ingress 是用于路由的附加组件，而
    Adminer UI 组件则用于管理 PostgreSQL 数据库。请参见图 12-3。


    ![](img/619782_1_En_12_Fig3_HTML.jpg)


    该图展示了部署拓扑，包括用户、浏览器、Helm 客户端、Kubernetes 集群、主机操作系统和硬件。


    图 12-3

    微服务的部署拓扑


    接下来的章节将介绍此部署的代码。


    ### 代码组织


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码位于
    `ch12\ch12-06` 文件夹中。


    在深入了解本示例的源代码之前，请先回顾一下第 11 章中清单 11-32 所示的类似示例（`ch11\ch11-03`）的源代码组织结构。该结构在清单 12-48
    中再次展示。


    ```

    ./ch11-03/

    ├── 01-ProductServer

    │   ├── make.sh

    │   ├── pom.xml

    │   └── src

    │       └── main

    ├── 02-ProductWeb

    │   ├── make.sh

    │   ├── pom.xml

    │   └── src

    │       └── main

    ├── Dockerfile

    ├── README.txt

    ├── adminer-deployment.yaml

    ├── adminer-svc.yaml

