    Even though the intention is to set up a minimal EKS infrastructure, note that
    you also need a full set of compute and network infrastructures for this, which
    is nontrivial. Thanks to Terraform, which makes even such nontrivial tasks accessible
    to developers like you and me, as you learned in the previous chapter.


    ![](images/619782_1_En_15_Chapter/619782_1_En_15_Fig1_HTML.jpg)


    A layered block diagram has the following flow, internet, internet gateway under
    A W S cloud and region, router and route table under V P C, security group of
    E C 2 and T 2 under Kubernetes server and subnet, and E K S connected to 3 availability
    zones with security group worker nodes under another subnet from the outermost
    to the innermost layer.


    Figure 15-1


    EKS cluster in an AWS cloud


    A typical EKS cluster is shown in Figure [15-1](#619782_1_En_15_Chapter.xhtml#Fig1).
    However, note that, for the Kubernetes server you could have redundancy by having
    multiple nodes. Even though the diagram depicts three nodes for the worker cluster,
    this example will be a customized one to keep the infrastructure simple.


    Let’s get into the code now. Let’s start by investigating the project structure.


    ### Code Organization


    The source code for this book is available on GitHub via the book’s product page,
    located at [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547).
    The source code for this example is organized as shown in Listing [15-1](#619782_1_En_15_Chapter.xhtml#PC1),
    inside the `ch15\ch15-01` folder.


    ```

    ./ch15-01/

    ├── README.txt

    ├── eks-cluster.tf

    ├── eks-worker-nodes.tf

    ├── outputs.tf

    ├── product-deployment.yaml

    ├── product-service.yaml

    ├── providers.tf

    ├── variables.tf

    ├── vpc.tf

    └── workstation-external-ip.tf

    Listing 15-1

    Terraform EKS Project Source Code Organization

    ```


    Chapter [14](#619782_1_En_14_Chapter.xhtml) showed the contents of a few of these
    files. In addition, you adapted a few new files from the EKS example provided
    on the Terraform website to create this demonstration. Let’s investigate the new
    aspects in this example.


    ### Understanding the Source Code


    Start with the first step of selecting which cloud provider you want to use. See
    Listing [15-2](#619782_1_En_15_Chapter.xhtml#PC2).


    ```

    terraform {

    required_version = ">= 0.12"

    }

    provider "aws" {

    region = var.aws_region

    }

    data "aws_availability_zones" "available" {}

    provider "http" {}

    Listing 15-2

    AWS Region Configuration (ch15/ch15-01/providers.tf)

    ```


    After specifying the Terraform version, you have to mention that you intend to
    use `aws` as the cloud provider. I am using `ap-southeast-1`, which is the Singapore
    region, but you may use whichever region you prefer.


    The Availability Zones data source allows access to the list of AWS Availability
    Zones that can be accessed by an AWS account in the region configured in the provider.


    The HTTP provider is used to interact with generic HTTP servers. It provides a
    data source that issues an HTTP request exposing the response headers and a body
    for use within a Terraform deployment. You use this HTTP provider to determine
    your own external IP gateway address (see Listing [15-3](#619782_1_En_15_Chapter.xhtml#PC3)).
    If you have that, you can configure inbound EC2 Security Group access to the Kubernetes
    cluster. You’ll do that in the next descriptor.


    ```

    data "http" "workstation-external-ip" {

    url = "http://ipv4.icanhazip.com"

    }

    locals {

    workstation-external-cidr = "${chomp(data.http.workstation-external-ip.body)}/32"

    }

    Listing 15-3

    Discover External IP Gateway Address (ch15/ch15-01/workstation-external-ip.tf)

    ```


    As you can guess, this example overrides in the runtime the value of `workstation-external-cidr`
    with the value of the external IP gateway address. Assuming you want the external
    IP gateway address, you’ll need to either determine it from the gateway device
    manually or ask an external service. [`icanhazip.com`](http://icanhazip.com) is
    one such service that can show your Internet-facing IPv4 and IPv6 addresses, among
    other things.


    There are a couple of ways to use this service:


    *   In a configuration file, point to `(http://)`[`ipv4.icanhazip.com`](http://ipv4.icanhazip.com)
    (or `ipv6` if you need that).


    *   In a script, get the address using curl like this: echo This external IP address
    is `$(curl -s` [`http://ipv4.icanhazip.com`](http://ipv4.icanhazip.com)`).`


    Before you proceed, you need to configure the `region = var.aws_region` in the
    `variables` configuration. See Listing [15-4](#619782_1_En_15_Chapter.xhtml#PC4).


    ```

    variable "aws_region" {

    default = "ap-southeast-1"

    }

    variable "cluster-name" {

    default = "bdca-tf-eks-01"

    type    = string

    }

    Listing 15-4

    Terraform Variables Configuration (ch15/ch15-01/variables.tf)

    ```


    That is self-explanatory.


    You started with the provider as AWS, now you’ll investigate the network infrastructure
    definitions. See Listing [15-5](#619782_1_En_15_Chapter.xhtml#PC5).


    ```

    resource "aws_vpc" "demo" {

    cidr_block = "10.0.0.0/16"

    tags = tomap(

    {"Name" = "terraform-eks-demo-node",

    "kubernetes.io/cluster/${var.cluster-name}" = "shared"}

    )

    }

    resource "aws_subnet" "demo" {

    count = 2

    availability_zone       = data.aws_availability_zones.available.names[count.index]

    cidr_block              = "10.0.${count.index}.0/24"

    map_public_ip_on_launch = true

    vpc_id                  = aws_vpc.demo.id

    tags = tomap(

    {"Name" = "terraform-eks-demo-node",

    "kubernetes.io/cluster/${var.cluster-name}" = "shared"}

    )

    }

    resource "aws_internet_gateway" "demo" {

    vpc_id = aws_vpc.demo.id

    tags = {

    Name = "terraform-eks-demo"

    }

    }

    resource "aws_route_table" "demo" {

    vpc_id = aws_vpc.demo.id

    route {

    cidr_block = "0.0.0.0/0"

    gateway_id = aws_internet_gateway.demo.id

    }

    }

    resource "aws_route_table_association" "demo" {

    count = 2

    subnet_id      = aws_subnet.demo.*.id[count.index]

    route_table_id = aws_route_table.demo.id

    }

    Listing 15-5

    Terraform EKS Network Infrastructure Configuration (ch15/ch15-01/vpc.tf)

    ```


    Refer to Chapter [14](#619782_1_En_14_Chapter.xhtml) for a detailed explanation
    of many of these configurations.'
  trans: '

    ## 使用 Terraform 搭建 AWS EKS


    本节将演示一个基于 AWS EKS 的微服务部署的实际案例。本章建立在你从第 14 章学到的 AWS 云基础知识之上，因此建议你在阅读本章之前先参考第 14
    章。本章还将利用 Terraform，以便你能够相对轻松地搭建基础设施并运行示例。如果你已经熟悉 AWS 云和 Terraform，可以直接阅读本章，无需回看第
    14 章。


    由于本示例使用 Terraform 在 AWS 中创建 EKS 计算基础设施，我假设你的开发机器上已具备以下先决条件：


    *   一个你知道如何使用 AWS Web 控制台进行管理的 AWS 账户

    *   已安装 AWS CLI（命令行界面），并且终端已配置好用于访问 AWS 账户的密钥

    *   用于访问 EC2 实例的密钥对

    *   已安装 Terraform


    本书不涵盖这些方面。如果你不熟悉这些步骤，建议参考相关书籍。^(⁸) 附录 F 也为使用其中一些工具提供了指导。


    ### 在 AWS 云中设计 EKS 拓扑


    你将在 AWS 云中拥有一个非常精简的 EKS 集群（见图 15-1）。尽管目标是搭建一个最小的 EKS 基础设施，但请注意，你仍然需要为此准备一套完整的计算和网络基础设施，这并非易事。多亏了
    Terraform，正如你在上一章所学到的，它使得像你我这样的开发者也能轻松完成这些复杂的任务。


    ![](img/619782_1_En_15_Fig1_HTML.jpg)


    一个分层框图具有以下流程：互联网、互联网网关（位于 AWS 云和区域下）、路由器和路由表（位于 VPC 下）、EC2 和 T2 的安全组（位于 Kubernetes
    服务器和子网下），以及连接到 3 个可用区的 EKS（带有安全组工作节点，位于另一个子网下），从最外层到最内层。


    图 15-1


    AWS 云中的 EKS 集群


    一个典型的 EKS 集群如图 15-1 所示。但是请注意，对于 Kubernetes 服务器，你可以通过拥有多个节点来实现冗余。尽管该图描绘了工作集群的三个节点，但本示例将进行定制以保持基础设施的简单性。


    现在让我们进入代码部分。首先从研究项目结构开始。


    ### 代码组织


    本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码组织如代码清单
    15-1 所示，位于 `ch15\ch15-01` 文件夹内。


    ```

    ./ch15-01/

    ├── README.txt

    ├── eks-cluster.tf

    ├── eks-worker-nodes.tf

    ├── outputs.tf

    ├── product-deployment.yaml

    ├── product-service.yaml

    ├── providers.tf

    ├── variables.tf

    ├── vpc.tf

    └── workstation-external-ip.tf

    代码清单 15-1

    Terraform EKS 项目源代码组织

    ```


    第 14 章展示了其中一些文件的内容。此外，你从 Terraform 网站提供的 EKS 示例中改编了几个新文件来创建此演示。让我们来研究本示例中的新内容。


    ### 理解源代码


    从选择要使用的云提供商的第一步开始。参见代码清单 15-2。


    ```

    terraform {

    required_version = ">= 0.12"

    }

    provider "aws" {

    region = var.aws_region

    }

    data "aws_availability_zones" "available" {}

    provider "http" {}

    代码清单 15-2

    AWS 区域配置 (ch15/ch15-01/providers.tf)

    ```


    在指定 Terraform 版本后，你必须说明你打算使用 `aws` 作为云提供商。我使用的是 `ap-southeast-1`，即新加坡区域，但你可以使用任何你偏好的区域。


    可用区数据源允许访问 AWS 可用区列表，这些可用区可由 AWS 账户在提供商配置的区域中访问。


    HTTP 提供商用于与通用 HTTP 服务器交互。它提供了一个数据源，该数据源发出 HTTP 请求，并公开响应头和响应体，供 Terraform 部署使用。你使用此
    HTTP 提供商来确定你自己的外部 IP 网关地址（参见代码清单 15-3）。如果你有了这个地址，就可以配置入站 EC2 安全组访问 Kubernetes
    集群。你将在下一个描述符中执行此操作。


    ```

    data "http" "workstation-external-ip" {

    url = "http://ipv4.icanhazip.com"

    }

    locals {

    workstation-external-cidr = "${chomp(data.http.workstation-external-ip.body)}/32"

    }

    代码清单 15-3

    发现外部 IP 网关地址 (ch15/ch15-01/workstation-external-ip.tf)

    ```


    正如你所猜测的，本示例在运行时用外部 IP 网关地址的值覆盖了 `workstation-external-cidr` 的值。假设你需要外部 IP 网关地址，你需要手动从网关设备确定它，或者向外部服务请求。[`icanhazip.com`](http://icanhazip.com)
    就是这样一个服务，它可以显示你的面向互联网的 IPv4 和 IPv6 地址等信息。


    有几种使用此服务的方法：


    *   在配置文件中，指向 `(http://)`[`ipv4.icanhazip.com`](http://ipv4.icanhazip.com)（如果需要，也可以是
    `ipv6`）。

    *   在脚本中，使用 curl 获取地址，如下所示：echo 此外部 IP 地址为 `$(curl -s` [`http://ipv4.icanhazip.com`](http://ipv4.icanhazip.com)`)。`


    在继续之前，你需要在 `variables` 配置中配置 `region = var.aws_region`。参见代码清单 15-4。


    ```

    variable "aws_region" {

    default = "ap-southeast-1"

    }

    variable "cluster-name" {

    default = "bdca-tf-eks-01"

    type    = string

    }

    代码清单 15-4

    Terraform 变量配置 (ch15/ch15-01/variables.tf)

    ```


    这无需解释。


    你从 AWS 提供商开始，现在将研究网络基础设施定义。参见代码清单 15-5。


    ```

    resource "aws_vpc" "demo" {

    cidr_block = "10.0.0.0/16"

    tags = tomap(

    {"Name" = "terraform-eks-demo-node",

    "kubernetes.io/cluster/${var.cluster-name}" = "shared"}

    )

    }

    resource "aws_subnet" "demo" {

    count = 2

    availability_zone       = data.aws_availability_zones.available.names[count.index]

    cidr_block              = "10.0.${count.index}.0/24"

    map_public_ip_on_launch = true

    vpc_id                  = aws_vpc.demo.id

    tags = tomap(

    {"Name" = "terraform-eks-demo-node",

    "kubernetes.io/cluster/${var.cluster-name}" = "shared"}

    )

    }

    resource "aws_internet_gateway" "demo" {

    vpc_id = aws_vpc.demo.id

    tags = {

    Name = "terraform-eks-demo"

    }

    }

    resource "aws_route_table" "demo" {

    vpc_id = aws_vpc.demo.id

    route {

    cidr_block = "0.0.0.0/0"

    gateway_id = aws_internet_gateway.demo.id

    }

    }

    resource "aws_route_table_association" "demo" {

    count = 2

    subnet_id      = aws_subnet.demo.*.id[count.index]

    route_table_id = aws_route_table.demo.id

    }

    代码清单 15-5

    Terraform EKS 网络基础设施配置 (ch15/ch15-01/vpc.tf)

    ```


    有关其中许多配置的详细说明，请参阅第 14 章。

