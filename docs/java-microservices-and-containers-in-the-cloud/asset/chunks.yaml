    ## Microservices Using Spring Cloud


    Spring Cloud is built over Spring Boot. Spring Cloud provides many common patterns
    in distributed, microservices ecosystems that can help you integrate the core
    services as a set of loosely coupled services. Spring Cloud also provides many
    powerful tools that enhance the behavior of Spring Boot applications to implement
    those patterns. This section looks at one such pattern with code so that you can
    appreciate the benefits it provides.


    ### Design the Microservices


    This section slightly modifies the previous microservice example to introduce
    Spring Cloud.


    ![](images/619782_1_En_2_Chapter/619782_1_En_2_Fig2_HTML.jpg)


    A model diagram connects the end user and browser to product-web-microservice
    via incoming command, rest A P I, product rest controller, product service proxy,
    product service, and outgoing command with feign client, and product-service-microservice
    via incoming command, rest A P I, controller, product repository, product entity,
    and Mongo D B.


    Figure 2-2


    Microservices design with Spring Cloud Feign client


    As explained in the previous example, in both microservices shown in Figure [2-2](#619782_1_En_2_Chapter.xhtml#Fig2),
    you use HTTP ports at the REST interfaces, which specify how a user’s browser
    or another HTTP client can use the application core. These ports (interfaces)
    belong inside the business logic of the respective microservices as REST controllers.
    Requests from the browser will hit the Product Web microservice, which is the
    consumer microservice. The Product Web microservice doesn’t perform any business
    logic; instead, it delegates calls to the Product Server microservice, the provider
    microservice.


    The `FeignClient` port in the Product Web microservice is another port, which
    again is nothing more than a specification of how it is used by the application
    core. A concrete driven adapter that implements the `FeignClient` port is injected
    into the application core by Spring Cloud wherever and wherever the port is required
    (type-hinted).


    The `Product` entity fulfills the application core in the Product Server microservice.


    The rest of the ports and adapters in the Product Server microservice function
    exactly similar as the previous example.'
