- fmt: 'There is no need for the `Product Server` microservice to be accessed by any
    external clients, so I omitted the `LoadBalancer` type of service definition,
    which you saw in Listing [10-7](#619782_1_En_10_Chapter.xhtml#PC8) for `Product
    Web` microservice. A `ClusterIP` would have been enough, but an additional `NodePort`
    was defined, the advantage of which I explain in the “Test the Microservices”
    section.


    The third component in Figure [10-11](#619782_1_En_10_Chapter.xhtml#Fig11) is
    the MongoDB. Listing [10-10](#619782_1_En_10_Chapter.xhtml#PC11) shows the pod
    definition for the MongoDB.


    ```

    apiVersion: apps/v1

    kind: StatefulSet

    metadata:

    name: mongo-cluster

    labels:

    app: mongo

    spec:

    replicas: 1

    serviceName: "mongo"

    selector:

    matchLabels:

    app: mongo

    template:

    metadata:

    labels:

    app: mongo

    annotations:

    sidecar.istio.io/inject: "false"

    spec:

    volumes:

    - name: data-db

    persistentVolumeClaim:

    claimName: mongo-data-db

    terminationGracePeriodSeconds: 10

    containers:

    - name: mongo

    image: mongo:4.2.24

    volumeMounts:

    - mountPath: /data/db

    name: data-db

    readOnly: false

    ports:

    - containerPort: 27017

    Listing 10-10

    The Pod Definition YAML File for MongoDB Server (ch10\ch10-01\mongo-deployment.yml)

    ```


    This example specifies using `mongo:4.2.24` as the image based on which the pod
    is created. Note that the pod is defined as a `StatefulSet`. The Mongo pod has
    to manage data or state in the MongoDB, so you need a stateful set. It also defines
    a `persistentVolumeClaim`—`mongo-data-db`. The next section looks at the description
    of this PVC.


    ```

    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: mongo-data-db

    spec:

    storageClassName: manual

    accessModes:

    - ReadWriteOnce

    resources:

    requests:

    storage: 3Gi

    Listing 10-11

    The Persistent Volume Claim Definition for MongoDB (ch10\ch10-01\mongo-volume-claim.yml)

    ```


    Now you create the `PersistentVolumeClaim`. The MongoDB pod uses `PersistentVolumeClaim`
    to request physical storage. You request a volume of at least 3GB, so it can provide
    read-write access for at least one node. Once you execute the scripts in the next
    section, you can inspect the `PersistentVolumeClaim`, as shown in Listing [10-12](#619782_1_En_10_Chapter.xhtml#PC13).


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl get pvc mongo-data-db

    NAME            STATUS   VOLUME          CAPACITY   ACCESS MODES   STORAGECLASS   AGE

    mongo-data-db   Bound    mongo-data-db   10Gi       RWO            manual         2m32s

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-12

    Listing the Details of the Persistent Volume Claim

    ```


    Once you create the `PersistentVolumeClaim`, the Kubernetes Control Plane looks
    for a `PersistentVolume` that satisfies the claim’s requirements. See Listing
    [10-13](#619782_1_En_10_Chapter.xhtml#PC14).


    ```

    apiVersion: v1

    kind: PersistentVolume

    metadata:

    name: mongo-data-db

    labels:

    type: local

    spec:

    storageClassName: manual

    capacity:

    storage: 10Gi

    accessModes:

    - ReadWriteOnce

    hostPath:

    path: "/home/docker/binil/mongodata"

    Listing 10-13

    The Persistent Volume Definition for MongoDB (ch10\ch10-01\mongo-volume.yml)

    ```


    With this, the Control Plane can find this `PersistentVolume` with the same storage
    class using the `storageClassName`, so it binds the claim to the volume. After
    you execute the scripts in the next section, you can inspect the `PersistentVolume`,
    as shown in Listing [10-14](#619782_1_En_10_Chapter.xhtml#PC15).


    ```

    (base) binildass-MacBook-Pro:~ binil$ kubectl get pv mongo-data-db

    NAME          CAPACITY ACCESS MODES RECLAIM STATUS CLAIM         STORAGECLASS              AGE

    mongo-data-db 10Gi     RWO          Retain  Bound  mongo-data-db manual      44s

    (base) binildass-MacBook-Pro:~ binil$

    Listing 10-14

    Listing the Details of the Persistent Volume

    ```


    As far as Kubernetes knows, `mongo-data-db` PV is just some piece of storage somewhere
    and its lifecycle is independent on the pod that’s using it. So, even if the pod
    goes away—say it crashes or hits a memory limit and is killed due to an Out of
    Memory error—the storage is still there, ready to be used by your MongoDB pod
    when it regenerates. So this persistent volume will persist no matter what happens
    with the pod (sort of), since the `RECLAIM` policy is `Retain`, as you can see
    in Listing [10-14](#619782_1_En_10_Chapter.xhtml#PC15). When the PVC is deleted,
    Kubernetes will handle the PV according to the `RECLAIM` policy of the PV.


    The last aspect left is defining the MongoDB service, which is done in Listing
    [10-15](#619782_1_En_10_Chapter.xhtml#PC16).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: mongo

    spec:

    selector:

    app: mongo

    ports:

    - protocol: TCP

    port: 27017

    targetPort: 27017


    apiVersion: v1

    kind: Service

    metadata:

    name: mongo-nodeport

    spec:

    selector:

    app: mongo

    ports:

    - nodePort: 30001

    port: 27017

    targetPort: 27017

    type: NodePort

    Listing 10-15

    The Description for MongoDB Service (ch10\ch10-01\mongo-service.yml)

    ```


    As with the `Product Server` Service description in Listing [10-9](#619782_1_En_10_Chapter.xhtml#PC10),
    a `ClusterIP` would have been enough, but this example defined an additional `NodePort`,
    the advantage of which I explain in the “Test the Microservices” section.'
