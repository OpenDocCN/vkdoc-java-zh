    Current date: Thu Feb 29 19:52:23 IST 2024

    ==========================================

    Response from http://127.0.0.1:8082/productsweb received.

    binildass-MacBook-Pro:02-ProductWeb binil$

    Listing 5-36

    Commands to Test Using cURL: Client 3

    ```


    ```

    binildass-MacBook-Pro:02-ProductWeb binil$ sh curlrun2.sh

    Firing http://127.0.0.1:8081/productsweb and waiting...


    Current date: Thu Feb 29 19:52:16 IST 2024

    ==========================================

    {"products":[{"productId":"1","name":"Kamsung...


    Current date: Thu Feb 29 19:52:23 IST 2024

    ==========================================

    Response from http://127.0.0.1:8081/productsweb received.

    binildass-MacBook-Pro:02-ProductWeb binil$

    Listing 5-35

    Commands to Test Using cURL: Client 2

    ```


    ```

    binildass-MacBook-Pro:02-ProductWeb binil$ pwd

    /Users/binil/binil/code/mac/mybooks/docker-04/Code/ch05/ch05-02/02-ProductWeb

    binildass-MacBook-Pro:02-ProductWeb binil$ sh curlrun1.sh

    Firing http://127.0.0.1:8080/productsweb and waiting...


    Current date: Thu Feb 29 19:52:16 IST 2024

    ==========================================

    {"products":[{"productId":"1","name":"Kamsung ...


    Current date: Thu Feb 29 19:52:22 IST 2024

    ==========================================

    Response from http://127.0.0.1:8080/productsweb received.

    binildass-MacBook-Pro:02-ProductWeb binil$

    Listing 5-34

    Commands to Test Using cURL: Client 1

    ```


    Careful observation of Listings [5-34](#619782_1_En_5_Chapter.xhtml#PC43) through
    [5-36](#619782_1_En_5_Chapter.xhtml#PC45) will show that the program can fire
    cURL clients more or less concurrently with the Product Web microservice instances.
    Subsequently, from Listings [5-31](#619782_1_En_5_Chapter.xhtml#PC40) through
    [5-33](#619782_1_En_5_Chapter.xhtml#PC42), it’s clear that the different Product
    Web microservice instances can also relay these requests more or less at the same
    time to different Product Server microservice instances in a load balanced manner.


    ```

    2024-02-29 19:52:16 INFO  ProductRestController.getAllProducts:69 – Start

    2024-02-29 19:52:16 INFO  ProductRestController.getAllProducts:69 - Start

    2024-02-29 19:52:17 INFO  ProductRestController.getAllProducts:69 - Start

    ```


    Next, observe the processing of requests in different instances of the Product
    Server microservice in Listings [5-28](#619782_1_En_5_Chapter.xhtml#PC37) through
    [5-30](#619782_1_En_5_Chapter.xhtml#PC39). They show that message processing happens
    more or less concurrently in a load balanced manner:


    ```

    2024-02-29 19:52:16 INFO  ProductListener.listenWithHeaders:57 - Start

    2024-02-29 19:52:17 INFO  ProductListener.listenWithHeaders:57 - Start

    2024-02-29 19:52:16 INFO  ProductListener.listenWithHeaders:57 - Start

    ```


    The message processing schema of the microservice instance is processing messages
    concurrently, and could be processing out of order, as shown in Figure [5-15](#619782_1_En_5_Chapter.xhtml#Fig15).


    ![](images/619782_1_En_5_Chapter/619782_1_En_5_Fig15_HTML.jpg)


    A diagram illustrates a request-reply model using a kafka-like system with request
    topics and replies topics across provider microservice instances. The request
    topic has multiple partitions, where requests are placed into specific partitions.


    Figure 5-15


    Microservice consumer vs. partition assignments


    When the microservices are up and running, you can also access the web application
    using your browser and pointing to the URL:


    `http://localhost:8080/product.html`


    `http://localhost:8081/product.html`


    `http://localhost:8082/product.html`


    You might have to wait at the browser console a bit, since the browser is rendered
    with the data only eventually, due to the sleep delays provisioned in the microservices.


    ## Summary


    One major benefit of an event-driven architecture using a message-oriented microservice
    is decoupling the event producer microservice from the event consumer microservice,
    allowing for more flexible and evolvable systems. Relying on a synchronous Request-Reply
    semantics is the exact opposite, where the producer and consumer microservices
    are tightly coupled. This should only be used when needed. If synchronous Request-Reply
    is required, an HTTP-based protocol is much simpler, more straightforward, and
    more efficient than using an asynchronous channel like Apache Kafka. Having said
    this, there may be scenarios when using synchronous styled Request-Reply makes
    sense. You might need to wisely choose from the combination of available choices
    for the job at hand. The examples in this chapter have demonstrated the retrieval
    of a collection of Product entities over a messaging channel. You might now naturally
    think about whether the style of inter-microservice interactions explained in
    this chapter could be used in real life to cover full-fledged business use cases,
    and this is what Chapter [6](#619782_1_En_6_Chapter.xhtml) covers.


    # 6. Production Grade Message Oriented Microservices


    Chapter [4](#619782_1_En_4_Chapter.xhtml) explained how messaging middleware can
    play a key role in providing a bridge for microservices to communicate with each
    other in a loosely coupled manner. Messaging channels are typically characterized
    by the asynchronous style of interaction, but Chapters [4](#619782_1_En_4_Chapter.xhtml)
    and [5](#619782_1_En_5_Chapter.xhtml) attempted to show how a synchronous user
    experience can be attained, even over asynchronous messaging channels. This is
    the first step in providing confidence that loosely coupled, messaging-based microservice
    interactions can be leveraged to implement many, if not all, your functional use
    cases. As mentioned in Chapter [5](#619782_1_En_5_Chapter.xhtml), many engineers
    are still skeptical on whether they can use events and the event paradigm for
    inter-microservices communication in a synchronous manner to implement a full
    data management paradigm. This chapter attempts to address that skepticism.


    This chapter is fully hands on, with examples. An overview and working experience
    with the examples in Chapter [5](#619782_1_En_5_Chapter.xhtml) is required for
    you to quickly understand the enhanced examples in this chapter.


    This chapter covers the following concepts:


    *   Protocols and message formats for message exchange


    *   Full CRUD (create, read, update, delete) functionality across microservices
    using Kafka in between


    *   CRUD using MongoDB and PostgreSQL DB


    *   A quick look at a few integration-patterns


    ## Inter-Microservices Wire Level Options


    There are pros and cons when we talk about message-oriented microservices. One
    of the main aspects relates to the inter-microservice communication format options.
    Let’s investigate those in the next section.'
