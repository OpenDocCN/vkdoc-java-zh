- fmt: "### Testing the Microservice Pods\n\nOnce the pods are up and running, you\
    \ can access the Product Web microservice. However, as mentioned in Appendix E,\
    \ you must get the Minikube IP first. See Listing [10-49](#619782_1_En_10_Chapter.xhtml#PC51).\n\
    \n```\n(base) binildass-MacBook-Pro:ch07-02 binil$ minikube ip\n192.168.64.6\n\
    (base) binildass-MacBook-Pro:ch07-02 binil$\nListing 10-49\nFinding Minikube IP\n\
    ```\n\nYou can now access the Product Web microservice using a browser with the\
    \ URL formed with the Minikube IP.\n\n`http://192.168.64.5:8080/product.html`\n\
    \nRefer to the section titled “Test the Microservice Using UI” in Chapter [1](#619782_1_En_1_Chapter.xhtml)\
    \ to test the Product Web microservice container.\n\nWhile you test the microservices,\
    \ keep watching the log windows, as was described in the previous example in this\
    \ chapter, in Listings [10-26](#619782_1_En_10_Chapter.xhtml#PC28) and [10-27](#619782_1_En_10_Chapter.xhtml#PC29).\n\
    \nNow you’ll look a little more into the PostgreSQL database. Listing [10-50](#619782_1_En_10_Chapter.xhtml#PC52)\
    \ declares a persistent volume claim.\n\n```\n(base) binildass-MacBook-Pro:~ binil$\
    \ kubectl get persistentvolumeclaims\nNAME                               STATUS\
    \   VOLUME                                     CAPACITY   ACCESS MODES   STORAGECLASS\
    \   AGE\npostgres-persistent-volume-claim   Bound    pvc-2c90c05e-c233-44d4-8adb-5595da8edc3e\
    \   4Gi        RWO            standard       71s\n(base) binildass-MacBook-Pro:~\
    \ binil$\nListing 10-50\nDescribing the PVC\n```\n\nNotice that the PVC has a\
    \ status of `Bound` and it tells you which `VOLUME` they are bound to. They have\
    \ a set capacity of `4Gi` (this was requested in the `yaml` file in Listing [10-45](#619782_1_En_10_Chapter.xhtml#PC47))\
    \ and they have a specified access mode of `RWO` (read-write once), meaning one\
    \ pod can use this volume at a time.\n\nEven though you didn’t set a storage class,\
    \ it was set by default. This is done by an `AdmissionController` that’s running\
    \ in the Kubernetes cluster, intercepting your requests to the Kubernetes API\
    \ server and modifying the incoming objects. If you had specified a storage class,\
    \ the admission controller would not have injected this class.\n\nBut then, who\
    \ created this storage class? You can inspect the storage class in Listing [10-51](#619782_1_En_10_Chapter.xhtml#PC53).\n\
    \n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl describe storageclass standard\n\
    Name:            standard\nIsDefaultClass:  Yes\n...\nProvisioner:           k8s.io/minikube-hostpath\n\
    Parameters:            \nAllowVolumeExpansion:  \nMountOptions:          \nReclaimPolicy:\
    \         Delete\nVolumeBindingMode:     Immediate\nEvents:                \n\
    (base) binildass-MacBook-Pro:~ binil$\nListing 10-51\nDescribing the Storage Class\n\
    ```\n\nWhen you started Minikube, the `StorageClass` is created for you. It’s\
    \ bootstrapped for you in your Minikube installation. You can read its contents.\
    \ You can modify it inside of Kubernetes, by using `kubectl edit sc standard`.\n\
    \nBecause you have a default storage class with a provisioner, you don’t have\
    \ to worry about creating a persistent volume explicitly. Instead, the provisioner\
    \ takes care of creating those volumes based on the persistent volume claims.\
    \ That is why a PV isn’t provisioned explicitly, unlike the last example. Listing\
    \ [10-52](#619782_1_En_10_Chapter.xhtml#PC54) shows the PV.\n\n```\n(base) binildass-MacBook-Pro:~\
    \ binil$ kubectl get persistentvolumes\nNAME                                 \
    \      CAPACITY   ACCESS MODES   RECLAIM POLICY   STATUS   CLAIM             \
    \                         STORAGECLASS   REASON   AGE\npvc-2c90c05e-c233-44d4-8adb-5595da8edc3e\
    \   4Gi        RWO            Delete           Bound    default/postgres-persistent-volume-claim\
    \   standard                2m33s\n(base) binildass-MacBook-Pro:~ binil$\nListing\
    \ 10-52\nListing the Persistent Volumes\n```\n\nNote that the Capacity and Access\
    \ Mode match the `PersistentVolumeClaim`. Also note that `PersistentVolumes` point\
    \ to the PVC that has claimed it, just like PVCs point to the `PersistentVolumes`\
    \ that they have claimed.\n\nBefore you stop the pods and services, read the next\
    \ section.\n\n## Resiliency of Kubernetes Pods\n\nIn the first example in this\
    \ chapter, you saw that when a pod is killed, a new pod is resurrected by default.\
    \ You also saw that for a stateful set, when the pod is re-created, the name of\
    \ the pod is retained.\n\nThis demonstrates the resiliency of different kinds\
    \ of pods and deployments.\n\nIn the following sections, you’ll perform a few\
    \ more experiments with the PostgreSQL pod."
