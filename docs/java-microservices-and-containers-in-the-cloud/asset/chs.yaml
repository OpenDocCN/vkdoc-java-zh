  \ group`（`metadata`）。然后，它提到了容器要使用的 `image` 以及一些其他环境变量。它还定义了一个 Adminer 服务。请参见代码清单\
  \ 11-35。\n\n```\napiVersion: v1\nkind: Service\nmetadata:\nname: adminer\nlabels:\n\
