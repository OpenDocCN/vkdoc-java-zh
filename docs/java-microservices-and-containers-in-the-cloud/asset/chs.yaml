  \ 方法是异步的。这意味着发起服务 `getAllProducts` 请求的 HTTP 主线程无需阻塞等待该方法完成。其中还包含两秒的休眠，以便你可以在命令终端中观察这些方法。\n\
  \nProduct Server 微服务中也包含六秒的休眠，如清单 4-11 所示。\n\n```\npublic class ProductListener\
  \ {\n@KafkaListener(topics = \"${kafka.topic.request-topic}\")\n@SendTo\npublic\
