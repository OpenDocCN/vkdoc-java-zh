  代码清单 15-1\nTerraform EKS 项目源代码组织\n```\n\n第 14 章展示了其中一些文件的内容。此外，你从 Terraform 网站提供的\
  \ EKS 示例中改编了几个新文件来创建此演示。让我们来研究本示例中的新内容。\n\n### 理解源代码\n\n从选择要使用的云提供商的第一步开始。参见代码清单\
  \ 15-2。\n\n```\nterraform {\nrequired_version = \">= 0.12\"\n}\nprovider \"aws\"\
  \ {\nregion = var.aws_region\n}\ndata \"aws_availability_zones\" \"available\" {}\n\
  provider \"http\" {}\n代码清单 15-2\nAWS 区域配置 (ch15/ch15-01/providers.tf)\n```\n\n在指定\
  \ Terraform 版本后，你必须说明你打算使用 `aws` 作为云提供商。我使用的是 `ap-southeast-1`，即新加坡区域，但你可以使用任何你偏好的区域。\n\
  \n可用区数据源允许访问 AWS 可用区列表，这些可用区可由 AWS 账户在提供商配置的区域中访问。\n\nHTTP 提供商用于与通用 HTTP 服务器交互。它提供了一个数据源，该数据源发出\
  \ HTTP 请求，并公开响应头和响应体，供 Terraform 部署使用。你使用此 HTTP 提供商来确定你自己的外部 IP 网关地址（参见代码清单 15-3）。如果你有了这个地址，就可以配置入站\
  \ EC2 安全组访问 Kubernetes 集群。你将在下一个描述符中执行此操作。\n\n```\ndata \"http\" \"workstation-external-ip\"\
  \ {\nurl = \"http://ipv4.icanhazip.com\"\n}\nlocals {\nworkstation-external-cidr\
  \ = \"${chomp(data.http.workstation-external-ip.body)}/32\"\n}\n代码清单 15-3\n发现外部\
  \ IP 网关地址 (ch15/ch15-01/workstation-external-ip.tf)\n```\n\n正如你所猜测的，本示例在运行时用外部 IP\
  \ 网关地址的值覆盖了 `workstation-external-cidr` 的值。假设你需要外部 IP 网关地址，你需要手动从网关设备确定它，或者向外部服务请求。[`icanhazip.com`](http://icanhazip.com)\
  \ 就是这样一个服务，它可以显示你的面向互联网的 IPv4 和 IPv6 地址等信息。\n\n有几种使用此服务的方法：\n\n*   在配置文件中，指向 `(http://)`[`ipv4.icanhazip.com`](http://ipv4.icanhazip.com)（如果需要，也可以是\
  \ `ipv6`）。\n*   在脚本中，使用 curl 获取地址，如下所示：echo 此外部 IP 地址为 `$(curl -s` [`http://ipv4.icanhazip.com`](http://ipv4.icanhazip.com)`)。`\n\
  \n在继续之前，你需要在 `variables` 配置中配置 `region = var.aws_region`。参见代码清单 15-4。\n\n```\nvariable\
  \ \"aws_region\" {\ndefault = \"ap-southeast-1\"\n}\nvariable \"cluster-name\" {\n\
  default = \"bdca-tf-eks-01\"\ntype    = string\n}\n代码清单 15-4\nTerraform 变量配置 (ch15/ch15-01/variables.tf)\n\
  ```\n\n这无需解释。\n\n你从 AWS 提供商开始，现在将研究网络基础设施定义。参见代码清单 15-5。\n\n```\nresource \"aws_vpc\"\
  \ \"demo\" {\ncidr_block = \"10.0.0.0/16\"\ntags = tomap(\n{\"Name\" = \"terraform-eks-demo-node\"\
  ,\n\"kubernetes.io/cluster/${var.cluster-name}\" = \"shared\"}\n)\n}\nresource \"\
  aws_subnet\" \"demo\" {\ncount = 2\navailability_zone       = data.aws_availability_zones.available.names[count.index]\n\
  cidr_block              = \"10.0.${count.index}.0/24\"\nmap_public_ip_on_launch\
  \ = true\nvpc_id                  = aws_vpc.demo.id\ntags = tomap(\n{\"Name\" =\
  \ \"terraform-eks-demo-node\",\n\"kubernetes.io/cluster/${var.cluster-name}\" =\
  \ \"shared\"}\n)\n}\nresource \"aws_internet_gateway\" \"demo\" {\nvpc_id = aws_vpc.demo.id\n\
  tags = {\nName = \"terraform-eks-demo\"\n}\n}\nresource \"aws_route_table\" \"demo\"\
  \ {\nvpc_id = aws_vpc.demo.id\nroute {\ncidr_block = \"0.0.0.0/0\"\ngateway_id =\
  \ aws_internet_gateway.demo.id\n}\n}\nresource \"aws_route_table_association\" \"\
  demo\" {\ncount = 2\nsubnet_id      = aws_subnet.demo.*.id[count.index]\nroute_table_id\
  \ = aws_route_table.demo.id\n}\n代码清单 15-5\nTerraform EKS 网络基础设施配置 (ch15/ch15-01/vpc.tf)\n\
  ```\n\n有关其中许多配置的详细说明，请参阅第 14 章。\n\n\n\n这里我将解释几个新的方面。\n\n此规范将创建一个 `10.0.0.0/16` 的\
  \ VPC、两个 `10.0.X.0/24` 的子网以及一个互联网网关，并设置子网路由，使外部流量通过该互联网网关进行路由。\n\n`count = 2` 是\
  \ Terraform 中的一个元参数。它可以与模块以及每种资源类型一起使用。`count` 元参数接受一个整数，并创建相应数量的资源或模块实例。每个实例都关联一个不同的基础设施对象，并且在应用配置时，每个实例都会被单独创建、更新或销毁。此处意图是创建两个子网。\n\
  \n在设置了 `count` 的块中，表达式中会提供一个额外的 `count` 对象，因此你可以修改每个实例的配置。该对象具有一个属性：\n\n*   `count.index`：与此实例对应的唯一索引号（从\
  \ `0` 开始）。\n\n你在 `aws_subnet demo` 资源和 `aws_route_table_association demo` 资源中使用了\
  \ `count = 2` 作为元参数。在第一种情况下，你使用 `count.index` 来指定 `cidr_block`；在第二种情况下，你使用 `count.index`\
  \ 来指定路由表关联的 `subnet_id`。\n\n接下来是集群和工作节点的规格说明。首先是集群描述。在 Terraform 中，Amazon EKS 的集群可以使用资源名称\
  \ `aws_eks_cluster` 进行配置。参见清单 15-6。\n\n```\nresource \"aws_iam_role\" \"demo-cluster\"\
  \ {\nname = \"terraform-eks-demo-cluster\"\nassume_role_policy = <<POLICY\n{\n\"\
  Version\": \"2012-10-17\",\n\"Statement\": [\n{\n\"Effect\": \"Allow\",\n\"Principal\"\
  : {\n\"Service\": \"eks.amazonaws.com\"\n},\n\"Action\": \"sts:AssumeRole\"\n}\n\
  ]\n}\nPOLICY\n}\nresource \"aws_iam_role_policy_attachment\" \"demo-cluster-AmazonEKSClusterPolicy\"\
  \ {\npolicy_arn = \"arn:aws:iam::aws:policy/AmazonEKSClusterPolicy\"\nrole     \
  \  = aws_iam_role.demo-cluster.name\n}\nresource \"aws_iam_role_policy_attachment\"\
  \ \"demo-cluster-AmazonEKSVPCResourceController\" {\npolicy_arn = \"arn:aws:iam::aws:policy/AmazonEKSVPCResourceController\"\
  \nrole       = aws_iam_role.demo-cluster.name\n}\nresource \"aws_security_group\"\
  \ \"demo-cluster\" {\nname        = \"terraform-eks-demo-cluster\"\ndescription\
  \ = \"Cluster communication with worker nodes\"\nvpc_id      = aws_vpc.demo.id\n\
  egress {\nfrom_port   = 0\nto_port     = 0\nprotocol    = \"-1\"\ncidr_blocks =\
  \ [\"0.0.0.0/0\"]\n}\ntags = {\nName = \"terraform-eks-demo\"\n}\n}\nresource \"\
  aws_security_group_rule\" \"demo-cluster-ingress-workstation-https\" {\ncidr_blocks\
  \       = [local.workstation-external-cidr]\ndescription       = \"Allow workstation\
  \ to communicate with cluster API Server\"\nfrom_port         = 443\nprotocol  \
  \        = \"tcp\"\nsecurity_group_id = aws_security_group.demo-cluster.id\nto_port\
  \           = 443\ntype              = \"ingress\"\n}\nresource \"aws_eks_cluster\"\
  \ \"demo\" {\nname     = var.cluster-name\nrole_arn = aws_iam_role.demo-cluster.arn\n\
  vpc_config {\nsecurity_group_ids = [aws_security_group.demo-cluster.id]\nsubnet_ids\
  \         = aws_subnet.demo[*].id\n}\ndepends_on = [\naws_iam_role_policy_attachment.demo-cluster-AmazonEKSClusterPolicy,\n\
  aws_iam_role_policy_attachment.demo-cluster-AmazonEKSVPCResourceController,\n]\n\
  }\n清单 15-6\nTerraform EKS 集群配置 (ch15/ch15-01/eks-cluster.tf)\n```\n\n工作节点的安全组以及处理工作节点与控制平面通信的安全组，其构建方式旨在避免通过工作节点中的特权端口进行通信。\n\
  \n你需要预先准备一些由操作者管理的资源，以便 Kubernetes 能够妥善管理其他 AWS 服务，并允许来自本地工作站（如果需要）和工作节点的入站网络通信。\n\
  \n需要 `aws_iam_role` 和 `aws_iam_role_policy_attachment` 来允许 EKS 服务管理或从其他 AWS 服务检索数据。\n\
  \n`aws_security_group` 控制对 Kubernetes 主节点的网络访问。然后，你通过一个 `ingress` 规则对其进行配置，以允许来自工作节点的流量。在\
  \ `egress` 和 `ingress` 中，你都需要指定协议。此处，可以使用 IP 协议名称（`tcp`、`udp`、`icmp`）或协议编号。当你在 `egress`\
  \ 中指定 `-1`，或者指定除 `tcp`、`udp`、`icmp` 或 `58`（ICMPv6）之外的协议编号时，无论你指定了哪些端口，所有端口的流量都将被允许。对于\
  \ `tcp`、`udp` 和 `icmp`，你必须指定一个端口范围。对于协议 `58`（ICMPv6），你可以选择指定一个端口范围。如果你不指定任何内容，则允许所有类型和代码的流量。\n\
  \n`aws_security_group_rule` 允许工作节点网络访问 EKS 主集群。\n\n接下来是工作节点的配置。AWS EKS 目前不提供用于运行工作节点的托管资源。因此，你需要创建一些由操作者管理的资源，以便\
  \ Kubernetes 能够妥善管理其他 AWS 服务、网络访问等。\n\n```\nresource \"aws_iam_role\" \"demo-node\"\
  \ {\nname = \"terraform-eks-demo-node\"\nassume_role_policy = <<POLICY\n{\n\"Version\"\
  : \"2012-10-17\",\n\"Statement\": [\n{\n\"Effect\": \"Allow\",\n\"Principal\": {\n\
  \"Service\": \"ec2.amazonaws.com\"\n},\n\"Action\": \"sts:AssumeRole\"\n}\n]\n}\n\
  POLICY\n}\nresource \"aws_iam_role_policy_attachment\" \"demo-node-AmazonEKSWorkerNodePolicy\"\
  \ {\npolicy_arn = \"arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy\"\nrole  \
  \     = aws_iam_role.demo-node.name\n}\nresource \"aws_iam_role_policy_attachment\"\
  \ \"demo-node-AmazonEKS_CNI_Policy\" {\npolicy_arn = \"arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy\"\
  \nrole       = aws_iam_role.demo-node.name\n}\nresource \"aws_iam_role_policy_attachment\"\
  \ \"demo-node-AmazonEC2ContainerRegistryReadOnly\" {\npolicy_arn = \"arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly\"\
  \nrole       = aws_iam_role.demo-node.name\n}\nresource \"aws_eks_node_group\" \"\
  demo\" {\ncluster_name    = aws_eks_cluster.demo.name\nnode_group_name = \"demo\"\
  \nnode_role_arn   = aws_iam_role.demo-node.arn\nsubnet_ids      = aws_subnet.demo[*].id\n\
  scaling_config {\ndesired_size = 1\nmax_size     = 1\nmin_size     = 1\n}\ndepends_on\
  \ = [\naws_iam_role_policy_attachment.demo-node-AmazonEKSWorkerNodePolicy,\naws_iam_role_policy_attachment.demo-node-AmazonEKS_CNI_Policy,\n\
  aws_iam_role_policy_attachment.demo-node-AmazonEC2ContainerRegistryReadOnly,\n]\n\
  }\n清单 15-7\nTerraform EKS 工作节点配置 (ch15/ch15-01/eks-worker-nodes.tf)\n```\n\n如前所述，你在此处使用最小数量的扩缩配置运行，尽管在生产部署中，你可能需要三个或更多节点以实现高可用性。`aws_eks_node_group`\
  \ 资源将管理一个 EKS 节点组，该节点组可以预置并可选择更新与 EKS 兼容的 Kubernetes 工作节点的自动扩缩组。\n\n`aws_iam_role`\
  \ 和策略将允许工作节点管理或从其他 AWS 服务检索数据。Kubernetes 使用它来允许工作节点加入集群。\n\n### 操作 EKS 集群所需的设置\n\
  \n在管理和操作 EKS 时，有一些设置会非常有用。我在此列出它们。你也可以参考附录 F 以详细了解其中一些设置。\n\n建议你执行以下操作：\n\n1.  安装\
  \ AWS CLI。\n\n2.  安装 AWS IAM Authenticator。\n\n3.  为 EKS 配置 `kubectl`。\n\n4.  将工作节点加入\
  \ Kubernetes 集群。\n\n首先完成前两个步骤。随后，你可以继续执行下一小节“在 AWS 中构建并启动你的 EKS 集群”，一旦 EKS 集群形成，你就可以执行最后两个步骤。\n\
  \n\n\n### 在 AWS 中构建并启动您的 EKS 集群\n\n要在 AWS 中创建一个 EKS 集群，您需要进入根文件夹 `ch15\\ch15-01`，并首先运行\
  \ `terraform init` 命令。参见清单 15-8。\n\n```\n(base) binildass-MacBook-Pro:ch15-01 binil$\
  \ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch15/ch15-01\n(base) binildass-MacBook-Pro:ch15-01\
  \ binil$ terraform init\nInitializing the backend...\n...\n(base) binildass-MacBook-Pro:ch15-01\
  \ binil$\n清单 15-8\nTerraform init\n```\n\n然后，您需要对代码进行完整性检查。参见清单 15-9。\n\n```\n(base)\
  \ binildass-MacBook-Pro:ch15-01 binil$ pwd\n/Users/binil/binil/code/mac/mybooks/docker-04/Code/ch15/ch15-01\n\
  (base) binildass-MacBook-Pro:ch15-01 binil$ terraform validate\nSuccess! The configuration\
  \ is valid.\n(base) binildass-MacBook-Pro:ch15-01 binil$\n清单 15-9\nTerraform validate\n\
  ```\n\n`plan` 命令让您在进行任何更改之前查看 Terraform 将要执行的操作，如清单 15-10 所示。\n\n```\n(base) binildass-MacBook-Pro:ch15-01\
  \ binil$ terraform plan\n清单 15-10\nTerraform plan\n```\n\n`apply` 命令会显示相同的计划输出，并要求您确认是否要继续执行此计划，如清单\
  \ 15-11 所示。\n\n```\n(base) binildass-MacBook-Pro:001-aws-eks-tf binil$ terraform\
  \ apply\naws_eks_node_group.demo: Creation complete after 2m12s [id=bdca-tf-eks-01:demo]\n\
  Apply complete! Resources: 18 added, 0 changed, 0 destroyed.\nOutputs:\nconfig_map_aws_auth\
  \ = <<EOT\napiVersion: v1\nkind: ConfigMap\n...\nEOT\n(base) binildass-MacBook-Pro:001-aws-eks-tf\
  \ binil$\n清单 15-11\nTerraform apply\n```\n\n现在，您可以应用前面步骤 3 和 4 中提到的命令（为 EKS 配置 kubectl\
  \ 并将工作节点加入 Kubernetes 集群）。然后，观察节点的状态，等待它们达到 **Ready** 状态。更多信息请参考附录 F。\n\n## 在 AWS\
  \ EKS 中部署容器\n\n本示例使用了您在本书中见过的、来自 `ch01/ch01-01/` 的一个相对简单的微服务。我假设您已经执行了第 7 章中清单 7-41\
  \ 到 7-43 所需的命令，并且您已经在公共 Docker Hub 中拥有了 `binildas/product-web` 镜像。\n\n您将使用 Docker\
  \ Hub 中的这个镜像，并将其部署到 AWS EKS。\n\n注意\n\n本示例假设 `kubectl` 已为 EKS 集群配置完毕。\n\n您可能已经注意到，`product-deployment.yaml`\
  \ 和 `product-service.yaml` 文件已经位于 EKS terraform 项目的根文件夹 `ch15/ch15-01/` 中。它们分别显示在清单\
  \ 15-12 和 15-13 中。\n\n```\napiVersion: v1\nkind: Service\nmetadata:\nname: product-service-loadbalancer\n\
  spec:\ntype: LoadBalancer\nselector:\napp: product\nports:\n- protocol: TCP\nport:\
  \ 8080\ntargetPort: 8080\n清单 15-13\n产品 Web 微服务服务描述 (ch15/ch15-01/product-service.yaml)\n\
  ```\n\n```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\nname: product-deployment\n\
  labels:\napp: product\nspec:\nreplicas: 1\nselector:\nmatchLabels:\napp: product\n\
  template:\nmetadata:\nlabels:\napp: product\nspec:\ncontainers:\n- name: product\n\
  image: binildas/product-web\nports:\n- containerPort: 8080\n清单 15-12\n产品 Web 微服务部署描述\
  \ (ch15/ch15-01/product-deployment.yaml)\n```\n\n现在，您可以部署指定的微服务，如清单 15-14 所示。\n\n\
  ```\n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l 'app=nginx' -o wide\
  \ | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNo resources found in default\
  \ namespace.\n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l 'app=product'\
  \ -o wide | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNo resources found in\
  \ default namespace.\n(base) binildass-MBP:ch15-01 binil$ kubectl apply -f product-deployment.yaml\n\
  deployment.apps/product-deployment created\n(base) binildass-MBP:ch15-01 binil$\
  \ kubectl get pods -l 'app=product' -o wide | awk {'print $1\" \" $3 \" \" $6'}\
  \ | column -t\nNAME                                STATUS             IP\nproduct-deployment-84b9777c5-9kpz8\
  \  ContainerCreating  \n(base) binildass-MBP:ch15-01 binil$ kubectl get pods -l\
  \ 'app=product' -o wide | awk {'print $1\" \" $3 \" \" $6'} | column -t\nNAME  \
  \                              STATUS   IP\nproduct-deployment-84b9777c5-9kpz8 \
  \ Running  10.0.0.180\n(base) binildass-MBP:ch15-01 binil$\n清单 15-14\n将产品 Web 微服务镜像部署到\
  \ EKS (ch15/ch15-01/product-deployment.yaml)\n```\n\n如清单 15-14 所示，您首先确认新创建的 EKS\
  \ 集群中没有有效的部署，然后部署新的容器。部署就绪后，您可以部署服务定义。参见清单 15-15。\n\n```\n(base) binildass-MBP:ch15-01\
  \ binil$ kubectl get svc\nNAME         TYPE        CLUSTER-IP   EXTERNAL-IP   PORT(S)\
