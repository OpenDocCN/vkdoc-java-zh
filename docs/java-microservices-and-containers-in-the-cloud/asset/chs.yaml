  至此，你在 Kubernetes 中的第一个微服务示例就完成了。\n\n## Kubernetes 中的微服务与 PostgreSQL\n\n第 8 章展示了一个与\
  \ PostgreSQL 数据库交互的完整微服务示例，所有组件均运行在 Docker 容器中。在第 9 章中，你修改了该示例，使其能够通过 Docker Compose\
  \ 完全部署在容器基础设施中。现在，本节将在 Kubernetes 中部署相同的示例。\n\n### 设计微服务部署拓扑\n\nProduct Web 和 Product\
  \ Server 微服务已容器化，Product Server 微服务将连接到一个同样部署在容器内的 PostgreSQL 数据库。所有这些容器现在都将在 Kubernetes\
  \ 中运行。请参见图 10-12。\n\n![](img/619782_1_En_10_Fig12_HTML.jpg)\n\n该图展示了用户如何通过浏览器与系统交互，浏览器向\
  \ product web 微服务发送请求。该微服务由多个 product-web Pod 组成，这些 Pod 与 product server 微服务通信，而\
  \ product server 微服务则使用一个 PostgreSQL 数据库，该数据库部署在由 minikube 和 docker 管理的 Kubernetes\
  \ 集群上。\n\n图 10-12\n\n基于 Kubernetes 的微服务部署拓扑\n\n在此架构中，Product Web 和 Product Server\
  \ 容器提供业务服务，而 PostgreSQL 容器则提供用于持久化状态的应用程序服务。\n\n### 理解源代码\n\n本书的源代码可通过图书产品页面在 GitHub\
  \ 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。示例的源代码组织在\
  \ `ch10\\ch10-02` 文件夹内。本示例中的大部分源代码与第 3 章“使用 PostgreSQL 和 RestTemplate 的微服务”一节中详细解释的\
  \ `ch03\\ch03-01` 类似。你还在第 8 章“容器中的微服务和 PostgreSQL”一节的图 8-7 中看到了基于 Docker 的拓扑部署，随后在第\
  \ 9 章“使用 PostgreSQL 容器编排微服务”一节的图 9-1 中看到了基于 Docker Compose 的拓扑部署。这意味着你可以直接进入 Kubernetes\
  \ 相关的特定部分。\n\n`ch10-02` 文件夹内示例源代码组织的概要表示如清单 10-41 所示。\n\n```\n./ch10-02/\n├── 01-ProductServer\n\
