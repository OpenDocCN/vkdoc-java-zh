  ## Helm\n\n在前一个示例以及前两章的许多其他示例中，你看到了用于 Kubernetes 部署的 YAML 文件。当微服务数量增加，并且部署环境数量增加时，你将不得不处理许多\
  \ YAML 文件。例如，我目前所在的组织销售用于航空公司乘客预订服务和航空公司货运预订服务以及其他服务的 SaaS 服务。我们需要一个能够在第 4 级 SaaS\
  \ 成熟度下运行的核心产品，这意味着同一个实例应在功能上适应多家航空公司（称为租户）的需求。同时，这些产品需要部署在多个环境中，例如开发、测试、预发布等。Helm\
  \ 是一个便捷的工具，它维护一个包含版本信息的单一部署 YAML 文件。这个文件让你能够通过几个命令来设置和管理一个非常大的 Kubernetes 集群。\n\n\
  ### 什么是 Helm？\n\nHelm 是 Kubernetes 的包管理器。它有助于在 Kubernetes 集群中安装、升级、卸载和回滚工作负载。类似于\
  \ yum 和 apt（它们是 Linux 发行版中流行的包管理器），Helm 将部署视为安装在 Kubernetes 平台上的应用程序。\n\nHelm 要求你将\
  \ Kubernetes 清单文件存储在一个特定的文件夹结构中。这个文件夹结构被视为一个包。Helm 包被称为 *charts*。Helm charts 可以嵌套，以帮助使用单个分层文件夹结构安装多个应用程序。为了方便管理\
  \ chart 以及同一 Helm chart 的多个版本，这些文件夹也可以归档并存储在仓库中。\n\n### Helm 术语\n\nHelm 使用了三个你需要熟悉的主要概念：\n\
  \n*   Chart：如前所述，chart 包含 Kubernetes 部署所需的所有内容，以及一些 Helm 特定的文件，并遵循特定的文件夹结构。这包括用于部署、服务、密钥和配置映射的所有\
  \ YAML 配置文件，这些文件定义了应用程序的部署状态。\n\n*   Config：这包括一个或多个 YAML 文件，其中包含部署 Kubernetes 应用程序所需的配置信息。Kubernetes\
  \ 集群中的资源将根据这些值进行部署。\n\n*   Release：chart 的一个运行实例称为 release。当你运行 `helm install` 命令时，它会拉取\
  \ config，与 chart 文件合并，并部署所有 Kubernetes 资源。一个 chart 可以有多个 release。\n\n掌握了这些基本概念后，下一节将介绍\
  \ Helm 的架构。\n\n### 客户端-服务器 Helm 架构\n\nHelm Kubernetes 有两个主要组件——客户端（CLI）和服务器（Tiller）。Helm\
  \ 采用客户端-服务器模型工作，如图 12-2 所示。\n\n![](img/619782_1_En_12_Fig2_HTML.jpg)\n\nHelm 架构包含以下组件：用户、Helm\
  \ 客户端、Kubernetes 集群。\n\n图 12-2\nHelm 架构\n\n本节将探讨 Helm 架构的两个主要组件：\n\n*   Tiller：Tiller\
  \ 是安装在 Kubernetes 集群中的服务器，Helm 通过此组件管理 Kubernetes 应用程序。Tiller 与 Kubernetes API 服务器交互，以执行应用程序的\
  \ release 操作——安装、升级、查询和删除 Kubernetes 资源。为了快速开发，它也可以在本地运行，并配置为与远程 Kubernetes 集群通信。\n\
  \n*   客户端（CLI）：与任何客户端-服务器模型类似，Helm 客户端位于用户的本地工作站上，而 Tiller 服务器位于 Kubernetes 集群上以执行所需操作。你可以将\
  \ CLI 视为用于推送所需资源的工具。Tiller 在 Kubernetes 集群内部运行，并管理（创建/更新/删除）Helm chart 的资源。\n\n\
  \    **注意** 在 Helm 2（Helm v2.16.7）之后，Tiller 服务器已被弃用。但这不影响本书中的示例。\n\n有了这些背景知识，下一节将解释\
  \ Helm 的工作原理。\n\n\n\n### Helm 的工作原理\n\n要理解这个概念，请回顾第 11 章的第一个示例。在 Product Server\
  \ 微服务中，你为服务器实例定义了三个副本，如代码清单 12-25 所示。\n\n```\napiVersion: apps/v1\nkind: Deployment\n\
  metadata:\nname: product-server\n...\nspec:\nreplicas: 3\n...\ntemplate:\n...\n\
  spec:\ncontainers:\n- name: product-server\n...\nenv:\n- name: DB_SERVER\nvalue:\
  \ postgres\n- name: spring.kafka.bootstrap-servers\nvalue: kafka-1-ip-service:9092\n\
  代码清单 12-25\nProduct Server Pod YAML 文件 (ch11\\ch11-01\\product-server-deployment.yml)\n\
  ```\n\n假设在预发布环境中你只需要一个实例。为此，你需要更新描述文件中的 `replica` 值，并将其部署到 Kubernetes 中。更好的方法是使用\
  \ Helm，这样你就可以根据环境对字段进行参数化。在这个例子中，你可以使用另一个文件中的值来代替副本的静态值。这个文件叫做 `values.yaml`。通过这种方式，Helm\
  \ 帮助你从实际的 YAML 描述文件中分离出可配置的字段值。\n\n在下一节中，你将通过实践学到更多。\n\n## Helm 打包微服务\n\n本节将向你展示如何为本章前面的示例启用\
  \ Helm。如附录 E 所述，我假设你已经在机器上安装了 Helm。\n\n### 代码组织\n\n本书的源代码可通过图书产品页面在 GitHub 上获取，网址为\
