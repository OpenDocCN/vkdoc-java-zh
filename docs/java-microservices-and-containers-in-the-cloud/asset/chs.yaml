  ## 总结


  第 7 章介绍了 Docker 容器，第 8 章解释了如何使用 Docker 容器更好地管理微服务应用程序。当您的聚合应用程序中包含多个微服务时，像 Docker
  Compose 和 Kubernetes 这样的工具可以为您提供进一步的帮助。本章展示了当您拥有许多业务微服务、应用程序服务和基础设施服务时，Docker Compose
  如何为您提供帮助。这些服务中的许多都可以作为单独的容器部署，而 Docker Compose 正是在部署和运维期间帮助您管理它们的依赖关系和生命周期的工具。您不必止步于
  Docker；您还可以考虑使用功能完备的容器编排工具，包括但不限于 Kubernetes。您将在下一章中实践这一点。




  # 10. 使用 Kubernetes 的微服务


  第 1 章讨论了不同级别的服务粒度。当你不断将服务拆分为更细粒度的服务时，实际上是在增加架构中活动部件的数量。这种将服务拆分为更细粒度服务的分而治之方法，旨在降低单个服务故障导致整个应用程序崩溃的风险。但另一方面，随着活动部件数量的增加，这些部件之间的连接数量也随之增加，从而扩大了容易发生故障的波及范围。


  单体应用由紧密耦合的组件和模块组成，必须作为一个整体进行开发、部署、运维和管理，因为它们都作为单个进程运行。运行单体应用通常需要一个或几个能够提供足够资源来运行应用的强大服务器。当应用负载增加时，你可以进行*垂直*扩展（通过提高硬件规格）或*水平*扩展（通过引入更多进程副本）。


  当你从单体架构迁移到微服务架构时，这些扩展原则大多仍然适用，但由于活动部件数量增加，整体复杂性也成倍增长。事实上，复杂度的增长速度往往超过新增元素的比例。你可能在关于
  Docker 的章节中已经看到过这一点，我在那里讨论了镜像和容器，它们超越了传统的 `.jar` 格式制品。你需要一套工具集和生态系统来更好地管理你的应用二进制文件，无论是静态形式（`.jar`
  和镜像）还是动态形式（容器）。本章将涵盖这一主题。


  本章涵盖以下概念。


  *   Kubernetes 架构简介


  *   选定的 Kubernetes 部署方面


  *   Kubernetes 中的流量和状态管理


  *   在 Kubernetes 中将微服务和数据库容器组合在一起


  *   演示跨 Kubernetes 中组合的容器的完整 CRUD 功能


  ## Kubernetes 的世界


  将单体应用拆分为更细粒度、可独立部署的组件（称为微服务），将它们打包为容器镜像，并实例化为容器，这是未来的发展方向。每个微服务被打包成一个镜像，并在容器中作为独立进程运行。每个微服务通过定义良好的接口（API）与其他微服务通信。


  图 10-1 展示了第 7 章中不同的虚拟化和应用部署模式。在容器化模式下，业务应用在容器运行时之上被实例化为容器。本书使用的容器运行时是 Docker。在基于微服务的架构中，你会拥有许多容器。具体来说，你可能拥有来自同一个
  Docker 镜像或不同 Docker 镜像的一个或多个容器。当你拥有如此多的容器时，就需要一个容器管理工具或容器编排工具，例如 Kubernetes。


  ![](img/619782_1_En_10_Fig1_HTML.jpg)


  一张图表展示了从传统单体应用到基于 Kubernetes 编排的容器化技术的演进过程。它强调了容器化通过 CPU、磁盘、内存和网络等硬件带来的更高效率、可扩展性和可移植性。


  图 10-1


  Kubernetes 生态系统


  运行容器就像运行进程一样，需要执行其自身的维护工作。启动和停止容器化应用、推出更新、维护服务级别、扩展容器以满足变化的负载、保护访问安全等等，只是众多需要执行的维护工作中的一小部分。本节将探讨
  Kubernetes 如何在这方面提供帮助。


  ## Kubernetes 架构


  Kubernetes 是一个容器编排器。它管理正在运行的容器。Kubernetes 架构由多个节点组成，这些节点分为主节点和工作节点。主节点托管 Kubernetes
  控制平面，而工作节点托管你的实际容器应用。


  你可以借助图 10-2 来了解这些节点。


  ![](img/619782_1_En_10_Fig2_HTML.jpg)


  一个架构包含一个控制平面，其中有多个主节点和工作节点。它包括 API 服务器、控制器管理器和调度器。工作节点运行 kubelet、kube-proxy 和容器运行时。负载均衡器、HAProxy
  和 Keepalived 用于服务发现和负载均衡。


  图 10-2


  Kubernetes 架构


  下一节将从高层次审视 Kubernetes 架构。


  ### 控制平面


  主节点托管 Kubernetes 控制平面；它还控制和管理 Kubernetes 系统。Kubernetes 控制平面的组件如下所列：


  *   Kubernetes API 服务器：开发者和 Kubernetes 控制平面的其他组件使用 Kubernetes API 服务器与控制平面通信。


  *   调度器：将作业或工作负载调度到你的 Kubernetes 集群的工作节点上。


  *   控制器管理器：执行 Kubernetes 集群级别的功能，例如复制实例、跟踪工作节点等。


  *   etcd：一个可靠、分布式且持久的数据存储，用于存储集群配置。


  ### 节点


  节点，或称工作节点，运行你的容器化应用。主要组件如下所列：


  *   容器运行时：运行你的容器。Docker、rkt 等是不同的容器运行时。


  *   Kubelet：与控制平面的 API 服务器通信，并管理各自节点上的容器。


  *   kube-proxy：也称为 Kubernetes 服务代理，它在应用组件之间对网络流量进行负载均衡。


  图 10-2 描绘了控制平面和工作节点。当你在本地为生产环境设置 Kubernetes 集群时，建议以高可用性（HA）模式进行部署。高可用性意味着以 HA 模式安装
  Kubernetes 主节点或控制平面，如图 10-2 所示。


  ## Kubernetes 部署


  你使用不同类型的 API 对象在 Kubernetes 中部署工作负载。本节将简要介绍其中几种。


  ### 容器


  在前两章关于 Docker 的内容中，你了解了容器的工作原理。在 Kubernetes 中，你将使用这些相同的容器作为基本工作单元。任何在 Kubernetes
  中运行的工作负载或应用，都必须在容器内运行。这个容器可以是 Docker 容器、rkt 容器，或者由 Virtlet 管理的虚拟机（VM）。


  当使用 Kubernetes 编排容器时，Kubernetes 需要额外的信息来进行容器管理，例如重启策略、存活探针等。Kubernetes 架构将这些额外需求抽象为所谓的
  *Pod*。




  ### Pods


  Pod 是 Kubernetes 中最小的可部署单元。一个 Pod 包含一个容器，但也可以在其中运行多个容器（即多个应用程序）。Pod 是对一个或多个正在运行的容器的封装。Kubernetes
  通过 Pod 来控制、监控和操作这些容器。


  ![](img/619782_1_En_10_Fig3_HTML.jpg)


  该图展示了 Kubernetes 的部署资源。部署由一个副本集组成，该副本集管理一组 Pod。每个 Pod 包含一个或多个容器。一个卷可以在 Pod 内的容器之间共享。部署提供了更新、回滚和自愈的机制。


  图 10-3


  Kubernetes 部署


  Pod 中的容器运行在“逻辑主机”上，因为它们位于同一个节点（即它们使用相同的网络命名空间和相同的 IPC 命名空间）。它们还可以使用共享卷，如图 10-3 所示。


  当一个应用程序需要多个容器在同一主机上运行，并且这些容器需要高效通信以确保数据本地性时，它们可以位于同一个 Pod 中。这提供了进程隔离；由于不同进程的日志不会混合，因此更容易对容器进行故障排查。


  ### ReplicaSets


  Kubernetes 允许您以命令式或声明式的方式定义和创建 *ReplicaSet*。ReplicaSet 是一组带有修订历史记录的副本（Pod）。ReplicaSet
  的工作是持续监控正在运行的 Pod 列表，并确保特定规格的 Pod 运行数量始终与期望数量匹配。因此，ReplicaSet 用于定义和管理一组运行在不同集群节点上的相同
  Pod。ReplicaSet 定义了 Pod 内运行的容器所使用的容器镜像、将在集群中运行的 Pod 实例数量以及其他配置。


  ### Deployment


  Deployment 是一种更高级别的资源，用于部署应用程序并以声明式方式进行更新。当您创建一个 Deployment 时，会在其下创建一个或多个 ReplicaSet
  资源。使用 Deployment 时，实际的 Pod 是由 Deployment 的 ReplicaSet 创建和管理的，而不是由 Deployment 直接管理。参见图
  10-4。


  ![](img/619782_1_En_10_Fig4_HTML.jpg)


  该树状图展示了 Kubernetes 部署资源。一个部署由多个副本集组成，每个副本集管理一组 Pod。每个 Pod 包含一个容器。Pod 被调度到节点上运行。


  图 10-4


  跨节点的 Kubernetes 部署


  ## 访问 Kubernetes 服务


  在了解了 Kubernetes 采用的部署模式后，本节将探讨访问部署在 Kubernetes 中的工作负载的机制。


  ### 访问 Kubernetes 部署


  在 Kubernetes 中，Pod 会被创建和销毁，以匹配您在部署描述符中指定的集群期望状态。Pod 是临时资源。当您使用 Deployment 运行 Kubernetes
  应用程序时，它可以动态创建和销毁 Pod。当 Pod 被创建时，每个 Pod 都会获得自己的 IP 地址。当您使用 Deployment 时，某一时刻正在运行的
  Pod 集合可能与稍后运行同一应用程序的 Pod 集合不同。


  创建后，Pod 会被分配一个 IP 地址。这些 IP 地址在集群内可见，允许从集群内部进行访问。集群中的其他 Pod 可以访问该 IP 地址，从而实现 Pod
  间通信。当一个 Pod 终止时，会创建一个新的 Pod，该 Pod 会以新的 IP 地址提供服务，任何试图与已终止 Pod 通信的实体都需要知道这个新地址。Kubernetes
  提供了一种“服务”，这是一种将运行在一组 Pod 上的应用程序作为网络服务暴露的抽象方式。


  ### Kubernetes 服务


  您之前从 Deployment 对象中看到的 Pod 可能会被终止或进行扩缩容，因此您不能依赖它们的 IP 地址，因为它们不是持久的。一旦定义了 Pod，它将表现出以下基本但并非直接的特征：


  *   Pod 是短暂的：Pod 就像“银行柜员”，您每次不会由同一位柜员（人）服务。类似地，Pod 可以随时出现和消失。在扩缩容期间，Pod 可能会增加或减少，如果发生崩溃，Pod
  可能会消失并可能被重新创建。


  *   创建后分配 IP：Kubernetes 在 Pod 被调度并启动后为其分配 IP 地址。因此，客户端无法预先知道 Pod 的 IP 地址。


  *   动态 IP 列表：横向扩展意味着多个相同类型的 Pod 可能提供相同的服务。这些（动态）Pod 各自拥有自己的 IP 地址，客户端要轻松绑定到动态 IP
  列表可能并不实际。相反，所有这些 Pod 应该可以通过一个单一地址访问。


  为了解决这些问题，服务为这些 Pod 提供了一个稳定的 IP。从更一般的意义上说，*服务*是一种抽象，它定义了一组逻辑 Pod 以及访问它们的策略。当创建一个服务时，它会将自己的虚拟地址作为环境变量发布给每个
  Pod。服务不仅抽象了对 Pod 的访问，还可以抽象对数据库、外部主机甚至其他服务的访问。Kubernetes 服务是一种您创建的资源，用于为提供相同服务的一组
  Pod 创建一个单一的、稳定的入口点。每个服务都是一个 IP 地址和端口的组合，在服务的整个生命周期内不会改变。如图 10-5 所示，一个 Kubernetes
  服务可以由单个 Pod 或多个相同 Pod 的副本支持。外部客户端可以通过一个单一的服务名称访问同一服务的任何 Pod。类似地，前端 Pod 或前端服务也可以通过一个单一的服务名称访问同一后端服务的任何
  Pod。图 10-5 展示了两个服务——`product-web` 和 `product-server`。


  ![](img/619782_1_En_10_Fig5_HTML.jpg)


  该图展示了一个电子商务产品 Web 服务的架构。用户与浏览器交互，浏览器向产品 Web 微服务发送请求，该微服务由多个 product-web Pod 组成，这些
  Pod 与具有多个 product-server Pod 的产品服务器微服务通信。


  图 10-5


  Kubernetes 服务


  在这里，浏览器或客户端设备应该知道前端微服务——产品 Web 微服务的服务（名称）。类似地，前端微服务应该知道后端微服务——产品服务器微服务的服务（名称）。


  ## 流量路由到 Kubernetes


  有多种方法可以将外部流量引入您的 Kubernetes 集群。本节将介绍每种方法的工作原理。




  ### 集群 IP


  顾名思义，集群 IP 仅在 Kubernetes 集群内部提供访问。集群内的其他应用可以访问它，但该服务无法从外部访问。集群 IP 的描述见代码清单 10-1。


  ```

  apiVersion: v1

  kind: Service

  metadata:

  name: product-web

  spec:

  selector:

  app: product-web

  type: ClusterIP

  ports:

  - name: http

  port: 80

  targetPort: 80

  protocol: TCP

  代码清单 10-1

  集群 IP 定义

  ```


  现在您可能会想，如何从外部访问该服务？答案是使用 Kubernetes 代理，如图 10-6 所示。


  ![](img/619782_1_En_10_Fig6_HTML.jpg)


  该图展示了用户如何与浏览器交互，浏览器向代理服务器发送请求。代理服务器随后将请求转发到运行着产品 Web 微服务的 Kubernetes 集群。该微服务由多个处理请求的
  product-web Pod 组成。


  图 10-6


  Kubernetes 代理到集群 IP


  您可以使用以下命令启动 Kubernetes 代理：


  ```

  (base) binildass-MacBook-Pro:ch10-01 binil$ kubectl proxy --port=8080

  ```


  这将在本地主机和 Kubernetes API 服务器之间创建一个代理服务器或应用层网关。所有传入数据通过一个端口进入，并被转发到远程的 Kubernetes
  API 服务器端口。


  ### 节点端口


  当您将服务暴露为 NodePort 服务时，每个集群节点都会在自身节点上打开一个端口（因此得名），并将该端口接收到的流量重定向到相应的服务。该服务不仅可以通过内部集群
  IP 和端口访问，还可以通过所有节点或虚拟机上的专用端口访问。


  因此，NodePort 是将外部流量直接引入服务的最原始方式。NodePort 的定义如代码清单 10-2 所示。


  ```

  apiVersion: v1

  kind: Service

  metadata:

  name: product-server-nodeport

  spec:

  selector:

  app: product-server

  ports:

  - nodePort: 30002

  port: 8081

  targetPort: 8081

  type: NodePort

  代码清单 10-2

  节点端口定义

  ```


  在代码清单 10-2 中，`30002` 被指定为 nodePort。您只能使用端口 `30000` 到 `32767`，如果未指定，则会使用一个随机端口。


  如图 10-7 所示，由于服务跨节点运行，在第一个节点的某个端口上收到的连接可能会被转发到运行在同一节点上的 Pod，或者转发到运行在其他节点上的某个 Pod。


  ![](img/619782_1_En_10_Fig7_HTML.jpg)


  该图展示了用户如何与浏览器交互，浏览器向负载均衡器发送请求，负载均衡器将流量分发到 Kubernetes 集群内的多个 product-web Pod。这些 Pod
  运行在虚拟机上，并通过端口 30000 相互通信。


  图 10-7


  Kubernetes 中的节点端口


  ### 负载均衡器


  使用负载均衡器，您可以将服务暴露到互联网。这使得服务可以通过一个专用的负载均衡器进行访问，该负载均衡器由 Kubernetes 运行的云基础设施提供。参见代码清单
  10-3。


  ```

  apiVersion: v1

  kind: Service

  metadata:

  name: product-web

  spec:

  selector:

  app: product-web

  type: LoadBalancer

  ports:

  - port: 8765

  targetPort: 80

  代码清单 10-3

  负载均衡器定义

  ```


  当您使用负载均衡器时，没有路由或过滤，您指定的所有流量都将被转发到服务，如图 10-8 所示。


  ![](img/619782_1_En_10_Fig8_HTML.jpg)


  该图展示了用户如何与浏览器交互，浏览器向负载均衡器发送请求，负载均衡器将流量分发到 Kubernetes 集群内的 product-web 微 Pod。product-web
  有多个 product-web Pod。


  图 10-8


  Kubernetes 中的负载均衡器


  负载均衡器的缺点是，您暴露的每个服务都会获得自己的 IP 地址，并且您必须为所有暴露的服务各支付一个负载均衡器的费用。


  ### 入口


  *入口*可以通过单个 IP 地址暴露多个服务。入口在 HTTP 层（网络层 7）运行，因此成本效益高。有许多不同类型的入口，具有不同的功能。参见图 10-9。


  ![](img/619782_1_En_10_Fig9_HTML.jpg)


