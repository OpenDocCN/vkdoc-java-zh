  \n你还了解了另一个方面。如果你有耐心，可能会注意到，由于你在两个微服务中设置的睡眠延迟，浏览器仅在几秒延迟后才最终渲染出数据。有趣的是，为浏览器提供套接字连接的\
  \ HTTP 工作线程也不会等待。相反，当 Product Web 微服务的响应在 HTTP 通道中可用时，HTTP 服务器会分配一个池化线程来将响应流式传输回浏览器。这是由\
  \ `DeferredResult` 在底层完成的。\n\n\n\n## 摘要\n\n本章的目标是介绍事件以及通过消息通道进行微服务间通信。你学习了如何有效地实现这一点。通过使用返回地址模式，你可以将相关的请求和响应交互编织在一起，从而在异步通道上提供同步的用户体验。你还学习了有效的编程实践，这些实践使你能够避免占用资源，除非绝对必要。\n\
  \n通过利用 Servlet 3 规范在 HTTP 层面使用异步处理，你还尝试更好地管理来自专用池的 HTTP 工作线程，否则这些线程可能会耗尽。将 HTTP\
  \ 线程池大小增加到超过最佳值的数量也会导致系统资源耗尽，不利于可扩展性。异步 Servlet 使你的应用程序能够以异步方式处理传入的请求。一个给定的 HTTP\
  \ 工作线程处理一个传入的请求，但它不是处理实际的工作负载，而是将请求传递给另一个后台线程（一个池化线程），该线程负责处理工作负载并将响应发送回客户端。一旦初始的\
  \ HTTP 工作线程将工作负载传递给后台线程，它就可以返回到 HTTP 线程池，从而可以处理来自套接字的更多请求。所有这些概念都在代码中得到了演示，但你还没有完全掌握。当并发请求到达同一个主题，并被同一类型微服务的多个实例消费时，会发生什么？下一章将打开潘多拉的魔盒。\n\
  \n脚注 1   2\n\n# 5. 微服务集成实践\n\n你已经看到消息中间件如何在提供桥梁方面发挥关键作用，使微服务能够以松散耦合的方式相互通信。你已经看到了一些动手实践的示例。一些工程师仍然怀疑，与使用同步\
  \ REST 风格的方式相比，他们是否可以使用事件和事件范式进行微服务间通信。本章将阐明其中一些问题。本章是实践性的。最好在阅读本章之前先阅读第 4 章，以便你理解在事件基础设施上运行示例的基础知识。不过，如果你想从本章开始，本章也提供了逐步指导。\n\
  \n本章涵盖以下主题：\n\n*   微服务上下文中的可扩展性模式\n\n*   异步之上的同步挑战\n\n*   微服务类型 vs. 同一类型微服务的实例\n\
  \n*   顺序微服务消费者\n\n*   并行微服务消费者\n\n## 云中的微服务可扩展性\n\n在当今的运营中，从生产质量和可扩展性的角度思考在微服务架构中是不可或缺的，尤其是在公有云成为常态的情况下。当你从单体架构迁移到微服务架构时，你的思维方式需要发生范式转变，以了解如何扩展服务。本节将快速回顾其中一些方面，为本章的进一步讨论和示例奠定基础。\n\
  \n### 垂直可扩展性\n\n垂直可扩展性历来被实践，尤其是在单体架构时代，开发人员通常增加托管应用程序的机器的核心或 CPU。见图 5-1。\n\n![](img/619782_1_En_5_Fig1_HTML.jpg)\n\
  \n一张图展示了微芯片的三种变换。第一个微芯片是空白的。第二个微芯片包含数字 8。第三个微芯片带有一个闪电符号。\n\n图 5-1\n\n垂直可扩展性\n\n\
  垂直扩展应用程序相对简单，因为它不会破坏现有的部署拓扑。将现有进程“直接迁移”到具有更强计算能力的另一台主机上是一个直接的步骤。然而，要将应用程序扩展到该限制之外，垂直可扩展性就无济于事了，因为你会受到芯片和内存技术相对缓慢的进步速度的限制。\n\
  \n### 水平可扩展性\n\n水平扩展（见图 5-2）与垂直扩展是正交的，它不是增加现有计算或内存模块的容量，而是通过整合更多模块来提高整体计算和/或内存能力。\n\
  \n![](img/619782_1_En_5_Fig2_HTML.jpg)\n\n一张图描绘了三个连接到中央水平总线上的微芯片。每个微芯片都是空白的。\n\n\
  图 5-2\n\n水平可扩展性\n\n### 微服务可扩展性\n\n通常，微服务代表一个功能域或一个功能域的一部分。就像任何应用程序一样，微服务应用程序也会随着时间的推移而增长。需要在单个微服务的大小和这些微服务的数量之间取得平衡，以实现高效的运营模式。\n\
  \n就像垂直可扩展性一样，可以向现有微服务添加更多功能，如图 5-3 所示。\n\n![](img/619782_1_En_5_Fig3_HTML.jpg)\n\
  \n一幅插图展示了左侧的一个小六边形结构，它被转换为右侧的一个更大的六边形。一个更大的六边形被细分为更小的六边形部分。\n\n图 5-3\n\n微服务垂直增长\n\
  \n无休止地向现有微服务添加越来越多的功能将使微服务退化为单体系统。相反，可以添加更多类型的微服务，如图 5-4 所示。\n\n![](img/619782_1_En_5_Fig4_HTML.jpg)\n\
  \n一张图展示了一个总线拓扑，有三个六边形形状，分别标记为 mu S A、mu S B 和 mu S C。mu S A 连接到总线的左侧。mu S B 连接到总线的顶部。mu\
  \ S C 连接到总线的右侧。\n\n图 5-4\n\n微服务水平增长\n\n当你想在运营中解决可扩展性问题时，还需要解决不断增长的流量问题。这需要克隆多个微服务实例，并以负载均衡的方式路由流量，如图\
  \ 5-5 所示。\n\n![](img/619782_1_En_5_Fig5_HTML.jpg)\n\n一张图展示了一个总线拓扑，有三个六边形形状，分别标记为\
  \ mu S A、mu S B 和 mu S C。mu S A 连接到总线的左侧。mu S B 连接到总线的顶部。mu S C 连接到总线的右侧。每个六边形包含多个部分。\n\
  \n图 5-5\n\n微服务横向扩展\n\n在典型的基于 HTTP 的传输中，将请求路由到不同类型的微服务并将负载分发到同一类型微服务的多个实例是直接的，但在基于消息的基础设施上则并非易事。接下来让我们探讨这一点。\n\
  \n## 异步之上的同步动态\n\n消息传递风格的通信本质上是异步的，并且消息通道是单向的。这两个属性结合在一起，给开发人员带来了一系列需要处理的复杂性，特别是当他们必须通过异步性质的事件通道来模拟同步风格的微服务间通信时。\n\
  \n\n\n### 发布者与订阅者的组合\n\n第 4 章在图 4-5 中简要描述了返回地址模式。当微服务通信时，同一个微服务可以向不同的微服务发送消息，而不同的微服务也可以向同一个微服务发送消息。我们可以将这种通信模式进行泛化，如图\
  \ 5-6 所示。\n\n![](img/619782_1_En_5_Fig6_HTML.jpg)\n\n该图展示了两个分别标记为“订单微服务”和“忠诚度微服务”的发布者，如何将事件发送到中央消息总线。这些事件随后被分发给多个订阅者，包括“物流微服务”、“调度微服务”和“通知微服务”。\n\
  \n图 5-6\n不同类型的微服务进行通信\n\n再次参考第 4 章的图 4-5，每个发布者微服务都可以拥有自己的返回地址，通过这种方式，响应消息可以被定向到对应的发送方。\n\
  \n### 发布者与订阅者实例的组合\n\n当你需要扩展微服务时，如果要在异步通道上发送同步风格的通信，这会引入更多的复杂性。\n\n如果你有同一个微服务的多个实例，必须确保回复被发送到正确的微服务实例。Spring\
  \ Kafka 文档建议每个消费者使用一个唯一的回复主题，这样回复消息就不会被混淆。\n\n![](img/619782_1_En_5_Fig7_HTML.jpg)\n\
  \n该图展示了微服务之间的请求-回复交互模型。它涉及多个请求方和回复方组件，通过多种通道进行通信。这些通道对应于发起原始请求的请求方实例。\n\n图 5-7\n\
  不同的回复通道\n\n图 5-7 描绘了每个消费者使用一个唯一的回复主题，这样回复消息就不会在消费者之间混淆。来自特定请求方实例的特定请求线程会接收到对应正确请求的响应。这个方案可行，但并不优雅。主题是托管对象，需要进行维护。即使维护工作可以自动化（例如使用动态队列），也不应该就这样创建成百上千个主题。\n\
  \n一个更好的解决方案是利用*主题*的分区功能，这是 Kafka 提供的一个特性。正如 Spring Kafka 文档所建议的，每个消费者可以使用一个额外的 `KafkaHeaders.REPLY_PARTITION`\
  \ 标头值，该值随请求一起发送。这是一个四字节字段，包含分区整数的 BIG-ENDIAN 表示。\n\n其模式可以如图 5-8 所示。\n\n![](img/619782_1_En_5_Fig8_HTML.jpg)\n\
  \n该图展示了微服务之间的请求-回复交互模型，其中包含了回复机制中的分区和队列概念。两个请求方微服务通过通道发送请求。该通道连接到一个队列机制，该机制将请求拆分为分区\
  \ 1 和分区 2。\n\n图 5-8\n不同的回复分区\n\nKafka 分区是 Kafka 中主要的并发机制。一个主题被划分为一个或多个分区，从而允许扩展生产者和消费者的负载。消费者在分区之间均匀分布，通过增加消费者和分区的数量，可以实现消费者负载的线性扩展。你可以利用这个特性来处理回复地址。\n\
  \n下一节将用代码说明这些主题。\n\n## 微服务顺序处理\n\n在本例中，你将看到如何调整第 4 章中展示的同一组微服务。一个消费者微服务和一个提供者微服务通过消息通道相互通信。为了保持示例简单，提供者微服务将实体存储在内存数据库中。此外，当浏览器向第一个（消费者）微服务发送请求时，它使用的是异步\
  \ HTTP。\n\n与第 4 章中的示例相比，本例的复杂性在于，在测试服务时，它使用了消费者和提供者微服务的多个实例以及多个客户端。当来自不同用户的同类请求到达（消息消费者）微服务的单个实例时，这些请求会按顺序逐一得到处理。\n\
  \n### 设计顺序处理微服务\n\n我对第 2 章图 2-1 中所示的六边形微服务视图进行了轻微修改，使两个微服务通过异步通道进行通信。本例使用 Apache\
  \ Kafka 作为消息通道，它本质上是异步的。请记住，目标是在基于 Kafka 的异步通道上模拟同步风格的通信，并演示多种消费者类型或同一消费者类型的多个实例可以连接到提供者微服务的一个或多个实例，并且仍然能单独获取到对应各自请求的响应。参见图\
  \ 5-9。\n\n![](img/619782_1_En_5_Fig9_HTML.jpg)\n\n该图展示了一种事件驱动的微服务架构，其中包含两个主要组件：产品\
  \ Web 微服务实例和产品服务器微服务实例。通信通过事件队列以多对多或任意对任意的方式进行。\n\n图 5-9\n利用分区在异步通道上的微服务设计\n\n需要注意以下几点：\n\
  \n*   这里配置了多个产品 Web（请求消费者）微服务实例。如果这种模式可行，那么它也应该适用于不同类型的微服务。\n\n*   这里配置了多个产品服务器（请求提供者）微服务实例。因此，事件可以被任何实例以轮询方式拾取处理。\n\
  \n*   尽管从服务消费者和服务提供者的角度来看，产品 Web 是请求消费者，产品服务器是请求提供者，但它们同时在 Kafka 主题上扮演着消息发送者和消息消费者的角色。\n\
  \n*   图 5-9 显示了产品服务器微服务的实例在监听不同的主题，尽管在本例中，它监听的是同一个主题，但利用了不同的分区。\n\n\n\n### 理解代码\n\
  \n本书的源代码可通过图书产品页面在 GitHub 上获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。示例的源代码组织在\
  \ `ch05\\ch05-01` 文件夹内。本节首先查看消费者微服务（即 Product Web 微服务）中的变更。\n\n如前所述，为不同客户端使用独立主题并非优雅的解决方案，因为你需要显式利用\
  \ `REPLY_PARTITION`。在这种情况下，消费者微服务需要知道它被分配到了哪个分区。可以通过如下方式提供显式配置以选择特定分区：\n\n```\n\
  @Value(\"${kafka.topic.product.reply.partition}\")\nprivate int replyPartition;\n\
  ```\n\n如第 4 章的列表 4-2 所示，现在需要像列表 5-1 那样显式设置参数。\n\n```\nproductRecord.headers().add(new\
  \ RecordHeader(\nKafkaHeaders.REPLY_TOPIC, requestReplyTopic.getBytes()));\nproductRecord.headers().add(new\
  \ RecordHeader(\nKafkaHeaders.REPLY_PARTITION,\nintToBytesBigEndian(replyPartition)));\n\
  RequestReplyFuture sendAndReceive =\nrequestReplyKafkaTemplate.sendAndReceive(\n\
  productRecord);\n...\n列表 5-1\n回复主题和分区的静态配置\n```\n\n然而，这种静态配置在动态水平扩展（增加同一微服务的更多实例）时无法提供帮助，因此你需要一种方案来解决这个问题。\n\
  \n来自 Callista Enterprise 的 Bjorn Beskow 撰写了一篇优秀的博客，并在互联网上提供了一个用于实现此功能的工具库，因此本示例将使用该库。需求是动态管理实现返回地址模式所需的回复主题和回复分区，而这个库正好实现了这一点。回复主题需要注入到\
  \ `RequestReplyTemplate` 中，这样在发送记录时就无需通过 API 处理它。对于回复分区，你需要检索回复主题监听器被分配到的分区，并传递该分区信息。该工具库位于以下源代码子文件夹中：\n\
  \n```\nch05\\ch05-01\\kafka-request-reply-util\n```\n\n对该工具库实现的详细解释超出了本书的范围。建议你参考相关博客以获取更多信息。相反，本节将探讨如何使用该工具库并实现相关功能。列表\
  \ 5-2 展示了使用该工具库的配置。\n\n```\nimport se.callista.blog.synch_kafka.request_reply_util.\n\
  CompletableFutureReplyingKafkaOperations;\nimport se.callista.blog.synch_kafka.request_reply_util.\n\
  CompletableFutureReplyingKafkaTemplate;\n@Configuration\npublic class KafkaConfig\
  \ {\n@Value(\"${spring.kafka.bootstrap-servers}\")\nprivate String bootstrapServers;\n\
  @Value(\"${spring.kafka.consumer.group-id}\")\nprivate String groupId;\n@Value(\"\
  ${kafka.topic.product.request}\")\nprivate String requestTopic;\n@Value(\"${product.topic.request.numPartitions}\"\
  )\nprivate int numPartitions;\n@Value(\"${kafka.topic.product.reply}\")\nprivate\
  \ String replyTopic;\n@Value(\"${kafka.request-reply.timeout-ms}\")\nprivate Long\
  \ replyTimeout;\n@Bean\npublic CompletableFutureReplyingKafkaOperations replyKafkaTemplate()\
  \ {\nCompletableFutureReplyingKafkaTemplate requestReplyKafkaTemplate =\nnew CompletableFutureReplyingKafkaTemplate(\n\
  requestProducerFactory(),\nreplyListenerContainer());\nrequestReplyKafkaTemplate.setDefaultTopic(\n\
  requestTopic);\nrequestReplyKafkaTemplate.setDefaultReplyTimeout(\nDuration.of(replyTimeout,\
  \ ChronoUnit.MILLIS));\nreturn requestReplyKafkaTemplate;\n}\n@Bean\npublic NewTopic\
  \ replyTopic() {\nMap configs = new HashMap();\nconfigs.put(\"retention.ms\", replyTimeout.toString());\n\
  return new NewTopic(replyTopic, numPartitions,\n(short) 1).configs(configs);\n}\n\
  }\n列表 5-2\nProduct Web 微服务的 Kafka 配置 (ch05\\ch05-01\\02-ProductWeb\\src\\main\\\
  java\\com\\acme\\ecom\\product\\KafkaConfig.java)\n```\n\n正如你在第 4 章中所见，一旦 Kafka\
  \ 监听器从提供者或生产者端消费了消息，`ReplyingKafkaTemplate <K, V, R>` 就会提供一个返回对象或回复对象。类型参数表示：\n\n\
  *   K – 键类型\n\n*   V – 出站数据类型\n\n*   R – 回复数据类型\n\n当你有多个发送者微服务实例时，必须确保响应被发送到正确的发送者微服务实例。Spring\
  \ Kafka 文档建议每个发送者微服务使用一个唯一的主题，或者在请求中发送一个额外的 `KafkaHeaders.REPLY_PARTITION` 标头值。主题是受管对象。你也可以显式设置\
  \ `REPLY_PARTITION`。`REPLY_PARTITION` 标头表示发送回复的分区编号。发送者微服务随后需要知道它被分配到了哪个分区。文档建议使用显式配置来选择特定分区。列表\
  \ 5-3 展示了一种可能的配置。\n\n```\n@Configuration\npublic class KafkaConfig {\n@Value(\"\
  ${kafka.topic.product.reply}\")\nprivate String replyTopic;\n@Value(\"${kafka.topic.product.reply.partition}\"\
  )\nprivate int replyPartition;\n@Bean\npublic KafkaMessageListenerContainer replyListenerContainer()\
  \ {\nContainerProperties containerProperties =\nnew ContainerProperties(replyTopic);\n\
  TopicPartitionInitialOffset initialOffset =\nnew TopicPartitionInitialOffset(replyTopic,\n\
  replyPartition);\nreturn new KafkaMessageListenerContainer(\nreplyConsumerFactory(),\n\
  containerProperties, initialOffset);\n}\n列表 5-3\n指定分区的 Product Web 微服务 Kafka 配置\n\
  ```\n\n可以在请求中发送一个额外的 `KafkaHeaders.REPLY_PARTITION` 标头值，这是一个四字节字段，包含分区整数的 BIG-ENDIAN\
  \ 表示，如列表 5-4 所示。\n\n```\nrecord.headers().add(new RecordHeader(KafkaHeaders.REPLY_TOPIC,\n\
  requestReplyTopic.getBytes()));\nrecord.headers().add(new RecordHeader(KafkaHeaders.REPLY_PARTITION,\n\
  intToBytesBigEndian(replyPartition)));\nRequestReplyFuture sendAndReceive =\nrequestReplyKafkaTemplate.sendAndReceive(record);\n\
  列表 5-4\n指定分区的 Product Web 微服务 Kafka 消息交换\n```\n\n\n\n如前所述，为不同的发送方微服务使用独立的主题显然不够灵活。所需的配置和编程工作量大，且\
  \ API 属于底层接口。此外，当需要动态扩展发送方微服务的数量时，这种静态配置方式并不适用。因此，你可以使用`PartitionAwareReplyingKafkaTemplate<K,\
  \ V, R>`工具类，它扩展了`ReplyingKafkaTemplate<K, V, R>`，并实现了`PartitionAwareReplyingKafkaOperations<K,\
  \ V, R>`。随后，`CompletableFutureReplyingKafkaTemplate<K, V, R>`又扩展了`PartitionAwareReplyingKafkaTemplate<K,\
  \ V, R>`。\n\n你可以通过将分区信息与回复主题一起传递来增强返回地址模式。回复主题已注入到`RequestReplyTemplate`中，因此无需出现在\
  \ API 中。对于分区信息，你可以检索回复主题监听器被分配了哪些分区，并自动传递该分区。这消除了客户端关心这些消息头的需要。如前所述，来自 Callista\
  \ Enterprise 的 Bjorn Beskow 已将此工具库发布到互联网上以实现此功能，并在代码清单 5-5 中使用。\n\n```\npublic class\
  \ PartitionAwareReplyingKafkaTemplate\nextends ReplyingKafkaTemplate {\npublic PartitionAwareReplyingKafkaTemplate(\n\
  ProducerFactory producerFactory,\nGenericMessageListenerContainer\nreplyContainer)\
  \ {\nsuper(producerFactory, replyContainer);\n}\nprivate TopicPartition\ngetFirstAssignedReplyTopicPartition()\
  \ {\nif (getAssignedReplyTopicPartitions() != null &&\ngetAssignedReplyTopicPartitions().iterator().\n\
  hasNext()) {\nTopicPartition replyPartition =\ngetAssignedReplyTopicPartitions().iterator().\n\
  next();\nif (this.logger.isDebugEnabled()) {\nthis.logger.debug(\"Using partition\
  \ \" +\nreplyPartition.partition());\n}\nreturn replyPartition;\n} else {\nthrow\
  \ new KafkaException(\"Illegal state: No reply\npartition is assigned to this instance\"\
  );\n}\n}\nprotected RequestReplyFuture doSendAndReceive(\nProducerRecord record)\
  \ {\nTopicPartition replyPartition =\ngetFirstAssignedReplyTopicPartition();\nrecord.headers()\n\
  .add(new RecordHeader(KafkaHeaders.REPLY_TOPIC,\nreplyPartition.topic().getBytes()))\n\
  .add(new RecordHeader(\nKafkaHeaders.REPLY_PARTITION,\nintToBytesBigEndian(\nreplyPartition.partition())));\n\
  return super.sendAndReceive(record);\n}\n}\n代码清单 5-5\n在 Kafka 消息交换中封装分区信息 (ch05\\\
  ch05-01\\kafka-request-reply-util\\src\\main\\java\\se\\callista\\blog\\synch_kafka\\\
  request_reply_util\\PartitionAwareReplyingKafkaTemplate.java)\n```\n\n代码清单 5-5 稍微有些复杂，因此我将借助图\
  \ 5-10 来解释它，该图展示了`CompletableFutureReplyingKafkaTemplate`提供的完整抽象。\n\n![](img/619782_1_En_5_Fig10_HTML.jpg)\n\
  \n该图展示了基于 Kafka 的事件驱动微服务架构中，产品 Web 微服务和产品服务器微服务之间的请求-回复交互。它说明了用户如何与系统交互，以及请求和回复如何通过\
  \ Kafka 模板进行处理。\n\n图 5-10\n\nCompletableFutureReplyingKafkaTemplate 抽象\n\n图 5-10\
  \ 中的标记步骤是按顺序进行的，因此你可以直接按照这些步骤来理解前面提供的解释。\n\n接下来，我们将查看 Product Web 微服务的 REST 控制器。如代码清单\
  \ 5-6 所示。\n\n```\n@CrossOrigin\n@RestController\npublic class ProductRestController{\n\
  private static final String REQUEST_PAYLOAD = \"All\";\n//获取所有数据\n@Value(\"${spring.application.name:product-web}\"\
  )\nprivate String appName;\n@Value(\"${kafka.topic.product.pinnedToPartition:false}\"\
  )\nprivate boolean pinnedToPartition;\n@Value(\"${kafka.topic.product.request}\"\
  )\nprivate String requestTopic;\n@Autowired\nprivate CompletableFutureReplyingKafkaOperations\
  \ replyingKafkaTemplate;\n@RequestMapping(value = \"/productsweb\", method =\nRequestMethod.GET,\n\
  produces = {MediaType.APPLICATION_JSON_VALUE})\npublic DeferredResult  getAllProducts()\n\
  throws InterruptedException, ExecutionException {\nDeferredResult deferredResult\
  \ =\nnew DeferredResult();\nCompletableFuture completableFuture =  null;\nif(pinnedToPartition){\n\
  completableFuture =  replyingKafkaTemplate.\nrequestReply(requestTopic,\nappName,\
  \ REQUEST_PAYLOAD);\n}\nelse{\ncompletableFuture =  replyingKafkaTemplate.\nrequestReply(requestTopic,\
  \ REQUEST_PAYLOAD);\n}\ncompletableFuture.thenAccept(products ->\ndeferredResult.setResult(products))\n\
  .exceptionally(ex -> {\nLOGGER.error(ex.getMessage());\nreturn null;\n});\nreturn\
  \ deferredResult;\n}\n}\n代码清单 5-6\nProduct Web 微服务的 REST 控制器 (ch05\\ch05-01\\02-ProductWeb\\\
  src\\main\\java\\com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n\
  ```\n\n与`ReplyingKafkaTemplate`类似，一旦 Kafka 监听器从提供方或生产方消费了消息，`CompletableFutureReplyingKafkaOperations<K,\
  \ V, R>`就会提供一个返回或回复对象。类型参数表示：\n\n*   K – 键类型\n*   V – 出站数据类型\n*   R – 回复数据类型\n\n\
  接下来，我们引入一个布尔标志`pinnedToPartition`，旨在演示各种测试用例。该标志可以在 Product Web 微服务的`application.yml`配置文件中进行配置。参见代码清单\
  \ 5-7。\n\n```\nserver:\nport: 8080\nspring:\napplication:\nname: product-web\nautoconfigure:\n\
  exclude: org.springframework.boot.autoconfigure.kafka.\nKafkaAutoConfiguration\n\
  kafka:\nbootstrap-servers: localhost:9092\nconsumer:\nauto-offset-reset: earliest\n\
  group-id: product-web\nkafka:\ntopic:\nproduct:\nrequest: product-req-topic\npinnedToPartition:\
  \ true\nreply: product-req-reply-topic\nrequest-reply:\ntimeout-ms: 60000\nproduct:\n\
  topic:\nrequest:\nnumPartitions: 2\n代码清单 5-7\nProduct Web 微服务的配置 (ch05\\ch05-01\\\
  02-ProductWeb\\src\\main\\resources\\application.yml)\n```\n\n如果`pinnedToPartition`配置为`false`，发送方微服务将以随机、负载均衡的方式向接收方微服务发送请求消息，如下所示：\n\
  \n```\ncompletableFuture =  replyingKafkaTemplate.requestReply(requestTopic, REQUEST_PAYLOAD);\n\
  ```\n\n相反，如果`pinnedToPartition`配置为`true`，发送方微服务将以固定或钉住的方式向接收方微服务发送请求消息，如下所示：\n\n\
  ```\ncompletableFuture =  replyingKafkaTemplate.requestReply(requestTopic, appName,\n\
  REQUEST_PAYLOAD);\n```\n\n正如你在第 4 章中所见，生产者选择使用哪个分区。如果你指定了分区参数，则会使用该参数，并且键将被“忽略”，尽管键仍然会被写入主题。消息到分区的路由不必基于键。你也可以在创建`ProducerRecord`时显式指定分区。当`pinnedToPartition`配置为`true`时，底层工具库使用`requestReply(String\
  \ topic, K key, V value)`的重载版本，以便可以指定键的值，如代码清单 5-8 所示。\n\n\n\n```\npackage se.callista.blog.synch_kafka.request_reply_util;\n\
  public class CompletableFutureReplyingKafkaTemplate\nextends PartitionAwareReplyingKafkaTemplate\n\
  implements CompletableFutureReplyingKafkaOperations {\n@Override\npublic CompletableFuture\
  \ requestReply(String topic,\nV value) {\nreturn adapt(sendAndReceive(topic, value));\n\
  }\n@Override\npublic CompletableFuture requestReply(String topic,\nK key, V value)\
  \ {\nreturn adapt(sendAndReceive(topic, key, value));\n}\n@Override\npublic CompletableFuture\
  \ requestReply(String topic,\nInteger partition, K key, V value) {\nreturn adapt(sendAndReceive(topic,\
  \ partition,\nkey, value));\n}\n}\n代码清单 5-8\nCompletableFutureReplyingKafkaTemplate\
  \ 工具类 (ch05\\ch05-01\\kafka-request-reply-util\\src\\main\\java\\se\\callista\\\
  blog\\synch_kafka\\request_reply_util\\CompletableFutureReplyingKafkaTemplate.java)\n\
  ```\n\n你可以通过在 Product Web 微服务根文件夹的运行脚本中为 `appName` 提供相同的值，来为键配置相同的值：\n\n```\n-Dspring.application.name=product-web-1\n\
  -Dspring.application.name=product-web-1\n```\n\n在代码清单 5-7 中，请注意配置 `numPartitions:\
  \ 2`。数字 2 是任意设定的，但它应该大于请求方微服务（实例）的数量，否则系统会抛出错误。此外，共享分区无法保证请求方微服务（实例）能收到对应的响应。\n\n\
  在 Product Server 微服务中，主要组件是 `ProductListener`，如代码清单 5-9 所示。\n\n```\n@Component\n\
  public class ProductListener {\n@KafkaListener(topics = \"${kafka.topic.product.request}\"\
  ,\ncontainerFactory =\n\"requestReplyListenerContainerFactory\")\n@SendTo\npublic\
  \ Products listenWithHeaders(\n@Payload String requestor,\n@Header(KafkaHeaders.REPLY_TOPIC)\n\
  String replyTopic,\n@Header(KafkaHeaders.REPLY_PARTITION)\nint replyPartitionId,\n\
  @Header(KafkaHeaders.RECEIVED_TOPIC)\nString receivedTopic,\n@Header(KafkaHeaders.RECEIVED_PARTITION_ID)\n\
  int receivedPartitionId,\n@Header(KafkaHeaders.CORRELATION_ID)\nString correlationId,\n\
  @Header(KafkaHeaders.OFFSET) String offset){\nLOGGER.info(\"开始\");\nLOGGER.debug(\"\
  监听；请求来自：\" + requestor);\nLOGGER.debug(\"监听；replyTopic：\" + replyTopic);\nLOGGER.debug(\"\
  监听；replyPartitionId：\" +\nreplyPartitionId);\nLOGGER.debug(\"监听；receivedTopic：\"\
  \ +\nreceivedTopic);\nLOGGER.debug(\"监听；receivedPartitionId：\" +\nreceivedPartitionId);\n\
  LOGGER.debug(\"监听；correlationId：\" +\ncorrelationId);\nLOGGER.debug(\"监听；offset：\"\
  \ + offset);\nList productList = getAllTheProducts();\nProducts products=new Products();\n\
  products.setProducts(productList);\nLOGGER.info(\"结束...\");\nreturn products;\n\
  }\n}\n代码清单 5-9\nProduct Server 消息监听器 (ch05\\ch05-01\\01-ProductServer\\src\\main\\\
  java\\com\\acme\\ecom\\product\\kafka\\client\\ProductListener.java)\n```\n\n`ProductListener`\
  \ 包含日志信息，这将帮助你调试标头和其他参数。它还会从内存数据库中获取 `Product` 实体集合，并将其返回到回复通道。\n\n其余代码与第 4 章的代码清单\
  \ 4-11 非常相似，因此此处不再重复。相反，代码清单 5-10 展示了 Product Server 微服务配置的一个片段。\n\n```\nproduct:\n\
  topic:\nrequest:\nnumPartitions: 3\n代码清单 5-10\nProduct Server 微服务的配置 (ch05\\ch05-01\\\
  01-ProductServer\\src\\main\\resources\\application.yml)\n```\n\n此示例使用 Product Server\
