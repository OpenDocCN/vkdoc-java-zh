  \n一旦两个微服务都启动并运行，你就可以通过浏览器访问 Web 应用程序。指向以下 URL：\n\n`http://localhost:8080/product.html`\n\
  \n要测试 CRUD 操作，请按照第 1 章最后一节“你的第一个 Java 微服务”中“使用 UI 测试微服务”小节的说明进行操作。\n\n现在你已经体验了 Spring\
  \ Boot 和 Spring Cloud 的特性，下一节将介绍基于 REST 的微服务中另一个重要概念——HATEOAS 和 HAL。\n\n## HATEOAS\
  \ 和 HAL\n\n超媒体作为应用状态的引擎（HATEOAS）是 REST 应用架构的一个约束，它将客户端与服务器解耦。这种解耦使得服务器功能能够独立演进。下一节将通过实际示例进一步探讨这一点。\n\
  \n\n\n### HATEOAS 详解\n\nHATEOAS 倡导用户代理通过实现 HTTP 协议，使用一个简单的 URL 向 REST API 发起 HTTP\
  \ 请求。一旦启动，用户代理可能发出的所有后续请求，都会在每个请求的响应中被发现。用于这些表示的媒体类型，以及每个响应可能包含的链接关系，都是标准化的。客户端通过选择表示中的链接，或通过其媒体类型提供的其他方式操作表示，从而在应用状态间进行转换。换句话说，可用的资源以及适用于这些资源的操作都是被发现的，后续的状态转换也据此进行编排。这样，RESTful\
  \ 交互便由超媒体驱动，而非带外信息。\n\n例如，清单 2-21 中的 GET 请求获取了一个产品资源，并以 JSON 表示形式请求详细信息。\n\n```\n\
  GET /productdata/61a7a51467964f330f6560fa HTTP/1.1\nHost: ecom.acme.com\n{\n\"productId\"\
  \ : \"61a7a51467964f330f6560fa\",\n\"name\" : \"Lokia Pomia\",\n\"code\" : \"LOKIA-POMIA\"\
  ,\n\"title\" : \"Lokia 12 inch , white , 14px ....\",\n\"price\" : 9000.0,\n\"_links\"\
  \ : {\n\"self\" : {\n\"href\" : \"http://localhost:8081/productdata/61\"\n},\n\"\
  product\" : {\n\"href\" : \"http://localhost:8081/productdata/61\"\n}\n\"buy\" :\
  \ \" http://localhost:8081/productdata/61/buy\"\n}\n}\n清单 2-21\nHATEOAS 响应格式\n```\n\
  \n该响应包含购买产品的后续链接。之后，当该产品 SKU 的库存为零时，“购买”链接可能不可用，或者换句话说，在其当前状态下，购买链接不可用。因此，就有了“应用状态引擎”这个术语。随着资源状态的变化，可能的操作也会发生变化。\n\
  \n因此，HATEOAS 使用超媒体控制提供上下文驱动的响应，这些控制根据这些链接的存在与否，指示哪些操作是可能的，或者就此而言，哪些操作是不可能的。这有助于避免在服务器和客户端之间传输与状态相关的字段。\n\
  \n### HAL 详解\n\n超文本应用语言（HAL）是一种互联网标准（“进行中的工作”），用于定义超媒体，例如 JSON 或 XML 数据中指向外部资源的链接。HAL\
  \ 的结构基于资源和链接的概念来表示元素。资源由 URI 链接、嵌入式资源、标准的 JSON 或 XML 数据以及非 URI 链接组成。链接具有目标 URI、链接名称（称为\
  \ `rel`），以及旨在考虑弃用和内容协商的可选属性。\n\n总而言之，HAL 模型围绕两个简单的概念展开。\n\n*   资源，包含：\n    *   指向相关\
  \ URI 的链接\n\n    *   嵌入式资源\n\n    *   状态\n\n*   链接：\n    *   一个目标 URI\n\n    * \
  \  与链接的关系，即 rel\n\n    *   一些其他可选属性，用于帮助处理弃用、内容协商等\n\n有了这个简短的介绍，你现在就可以通过一些代码进入实际操作了。\n\
  \n## 使用 HATEOAS 和 HAL 的微服务\n\n本节使用一个实际示例来展示各个部分如何协同工作。你将修改微服务示例，以演示 HATEOAS 和 HAL。\n\
