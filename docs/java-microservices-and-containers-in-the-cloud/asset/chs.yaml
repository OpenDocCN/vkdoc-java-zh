  ### Docker Hub 注册表与仓库


  如前所述，Docker 分发系统中的组件是注册表。你构建的镜像可以被推送并存储在远程注册表中，供他人使用。Docker Hub 就是一个公开注册表的例子。它是免费的，并且提供了海量且不断增长的现有镜像集合。见图
  7-18。


  ![](img/619782_1_En_7_Fig18_HTML.jpg)


  一张 Docker Hub 注册表网页的截图。页面包含一个搜索栏、一个仓库列表以及一个创建新仓库的按钮。


  图 7-18


  Docker Hub 注册表


  图 7-18 展示了 Docker Hub 注册表的登录界面及其中的许多镜像仓库。仓库是相关镜像的集合（命名空间），提供同一应用或服务的不同版本。它是具有相同名称和不同标签的多个
  Docker 镜像的集合。`product-web` 就是这样一个仓库，是我通过清单 7-25 中的 `jib build` 命令推送的。由于应用名为 `product-web`，而我在注册表中的用户名（或命名空间）是
  `binildas`，因此该镜像被放置在 `binildas/product-web` 仓库中。见图 7-19。


