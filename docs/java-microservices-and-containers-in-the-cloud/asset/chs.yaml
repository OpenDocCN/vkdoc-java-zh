  引言


  微服务承诺了终极目标：并发发布与选择性可扩展性。如何以云原生的方式实现这一点？微服务能否摒弃同步 RPC，转而采用基于消息的异步交互？当这样做时，如何通过同步交互模式保证用户体验？在本书中，你将学习这些非平凡的模式与实践，所有内容均附有生产级示例代码，可作为模板用于启动你自己的项目。


  凭借 25 年的经验，我将教你通常难以理解的六边形架构和洋葱架构，并通过 Spring Boot 中的具体示例进行演示。如果你具备足够的 Java 和 Spring
  知识，你将能够学习从基础到高级的概念，包括在 RPC 和消息传递风格中，复制同一微服务的实例，并将来自并发用户的请求与响应关联到同一实例。你将学习如何在独立 Java
  进程、Docker 容器、Kubernetes 以及使用弹性 Kubernetes 服务（EKS）的 AWS 云中实现这一点。


  本书内容涵盖：


  *   在 Spring Boot 中构建一个简单的微服务

  *   通过代码示例学习 HATEOAS、六边形架构和洋葱架构

  *   构建通过 RPC 和消息传递交互的多个微服务

  *   在每一层使用异步模式，同时将并发用户请求关联到同一实例或不同实例

  *   通过代码示例学习 CI/CD 和 Helm 打包

  *   构建 Docker 包并将其部署到 Kubernetes

  *   将微服务部署到 AWS EC2 和 EKS


  Spring Boot 帮助开发者创建“即运行”的应用程序。当创建应用程序只需极简配置时，即使是初级 Java 开发者也能胜任。这种简洁性不应限制开发者应对复杂企业需求的能力，这正是使用
  Spring Boot 的微服务架构的价值所在。除了快速部署、修补或扩展应用程序外，容器还提供了支持敏捷开发和 DevOps 实践的解决方案，以加速开发、测试和生产周期。云技术帮助公司快速扩展和适应、加速创新并提升业务敏捷性，而无需大量前期
  IT 投资。如果能让即使是初级开发者也能掌握帮助企业实现这一切所需的知识，那会怎样？本书正是为此而生，甚至更多。


