  \ URL：\n\n`http://localhost:8080/product.html`\n\n要测试 CRUD 操作，请按照第 1 章最后一节“你的第一个\
  \ Java 微服务”中“使用 UI 测试微服务”小节描述的说明进行操作。\n\n现在是时候巩固你目前所学的内容，并介绍下一个概念——洋葱架构了。\n\n##\
  \ 洋葱架构\n\n分层原则使软件架构师能够分离关注点。几十年来，软件架构师一直成功地构建分层软件架构，而如今，随着微服务架构的广泛采用，这些分层原则已获得广泛认可。让我们看看分层与洋葱有什么关系。\n\
  \n### 洋葱架构设计\n\n在前几章解释的端口与适配器架构中，你学习了如何定义抽象的端口和适配器，这些端口和适配器将核心业务服务和实体与软件的上下文和意图隔离开来。换句话说，这些端口和适配器通过编写适配器代码，将软件应用核心与基础设施和外围关注点隔离开来，从而防止基础设施和外围代码泄漏到应用核心中。洋葱架构描绘了具有多层结构的企业应用，其中业务逻辑中的某些层可能可以通过领域驱动设计的原则来识别。典型的洋葱架构如图\
  \ 3-1 所示。\n\n![](img/619782_1_En_3_Fig1_HTML.jpg)\n\n一个模型图展示了四层同心圆，从最内层到最外层依次是实体、领域服务、应用服务和基础设施层依赖。这些层包括模型聚合、进度、业务服务、控制器、消息监听器、客户端、浏览器和带有驱动端口的存储。\n\
  \n图 3-1\n洋葱架构\n\n参考图 3-1，软件架构中的两个核心原则是：\n\n*   外层依赖于内层\n*   外层对内层是透明的\n\n参考图 3-1，各层之间的耦合方向指向中心，为你提供了一个独立的对象模型（领域模型），其核心不依赖于任何东西。这个内层包含特定于应用本身领域的数据和操作数据的逻辑。\n\
  \n很多时候，你还会遇到涉及多个实体的逻辑，而这种领域逻辑可能不属于某个特定实体。这种逻辑也可以被重用，因此需要另一个层，称为业务服务层。这些业务服务（也称为领域服务）的作用是接收一组实体，并对它们执行一些业务逻辑。这样的领域服务也可以聚合更多的领域服务和业务实体（参见第\
  \ 1 章的图 1-14）。\n\n### 洋葱架构与六边形架构对比\n\n六边形架构中定义的端口和适配器是一种将软件应用核心与基础设施和外围关注点隔离开来的手段。这些外围设备可以是用户界面，无论是什么类型的用户界面，比如浏览器、移动设备、扫描仪等。类似地，基础设施代码可以将应用核心连接到数据库、第三方系统、打印机等工具。基础设施层成为最外层的洋葱环，这在图\
  \ 3-1 的洋葱架构中有所体现。你也可以将它们视为放置在六边形的边界上，作为抽象的端口和适配器。\n\n这些端口和适配器通过我们称之为*应用服务*的东西连接到内层。这些是处理协议和格式转换及优化的技术服务。例如，REST\
  \ 控制器是一种应用服务，通过 HTTP 传输将实体以 JSON 格式暴露出来。类似地，对特定类型数据库的持久化抽象可以通过仓库接口完成，正如你在本章前两个示例中看到的那样，这些同样属于应用服务。因此，洋葱的第二层是可重用的内层。\n\
  \n讨论了足够多的理论之后，让我们看一些实际的例子。如果你回顾本章前面的两个示例，你可以看到领域实体（`Product`）是如何在 PostgreSQL 和 MongoDB\
  \ 数据库的不同持久化抽象之间被重用的，这些是驱动接口。我现在将进一步扩展同一个示例，以演示如何定义端口以允许多种驱动抽象。更具体地说，你已经看到了微服务的 REST\
  \ 接口如何作为驱动端口提供精细的抽象。我将在同一个微服务的洋葱最外层插入另一个端口，一个使用 GraphQL 技术的端口，以便同一个洋葱的内层可以被重用。\n\
  \n## GraphQL\n\nGraphQL 是一种用于 API 的开源数据查询和操作语言，以及一个使用现有数据执行查询的运行时。GraphQL 由 Facebook\
  \ 于 2012 年内部开发。GraphQL 项目后来从 Facebook 转移到新成立的 GraphQL 基金会，由非营利性的 Linux 基金会托管。我将快速介绍\
  \ GraphQL，以便你能够理解本章的下一个示例。\n\n\n\n### GraphQL 详解\n\nGraphQL 允许客户端精确请求所需数据，不多不少，从而让\
  \ API 更易于随时间演进。它让客户端能够定义所需数据的结构，服务器则返回相同结构的数据，因此避免了返回过量的数据。这在移动设备、物联网等低配置设备上非常受欢迎。它允许客户端在单个请求中导航到子资源，从而在单个请求中实现多个查询。\n\
  \nGraphQL 使用命名查询和变更的概念，而非标准强制的一组操作。这有助于将控制权交给合适的人：API 开发者指定可能执行的操作，API 消费者指定所需的内容。清单\
  \ 3-23 展示了一个查询示例。\n\n```\nquery {\nproducts(count: 10, offset: 0) {\nproductId\n\
  code\nproductCategory {\nid\nname\ntitle\n}\n}\n}\n清单 3-23\n一个 GraphQL 查询\n```\n\
  \n此 GraphQL 查询旨在完成以下操作：\n\n*   请求最近添加的十个产品\n*   对于每个产品，请求其 `productId` 和 `code`\n\
  *   对于每个产品请求，请求其 `productCategory`，返回对应产品类别的 `id`、`name` 和 `title`\n\n在传统的 REST\
  \ API 中，这要么需要 11 个请求——一个用于初始产品查询，十个用于对应的 `productCategory`——要么需要将 `productCategory`\
  \ 的详细信息与帖子详细信息一起包含，从而导致负载过大。\n\n## 洋葱架构微服务示例\n\n本示例对之前的微服务示例进行了调整。它使用了相同的两个微服务——一个消费者微服务和一个提供者微服务——通过\
  \ REST 协议相互通信。提供者微服务还与 MongoDB 进行交互。消费者微服务额外暴露了一个基于 GraphQL 的端口。\n\n### 微服务的洋葱设计\n\
  \n如果将第 2 章图 2-1 中所示的六边形微服务视图叠加到本章图 3-1 的洋葱架构视图上，就会得到图 3-2。\n\n![](img/619782_1_En_3_Fig2_HTML.jpg)\n\
  \n一个产品-网络-微服务的模型图，将最终用户连接到四层同心圆，包括实体、领域服务、应用服务和基础设施层依赖及其各自的微服务。它最终指向产品服务器微服务下的产品\
  \ REST 控制器、产品实体和 MongoDB。\n\n图 3-2\n消费者和提供者微服务的洋葱架构\n\n在图 3-2 所示的两个微服务中，你都在 REST\
  \ 接口处使用了 HTTP 端口，这些端口指定了用户浏览器或其他 HTTP 客户端如何使用应用核心。对于产品 Web 微服务，你额外指定了一个基于 GraphQL\
  \ 的端口。你还可以定义一个业务服务，旨在演示来自内层的业务服务实例如何被洋葱架构的外层重用，就像它们重用业务实体类一样。\n\n### 代码组织\n\n本书的源代码可通过图书产品页面在\
