  ### 理解源代码


  本书的源代码可通过图书产品页面在 GitHub 上获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
  `ch09\ch09-01` 文件夹中。本示例中的大部分源代码与 `ch03\ch03-01` 类似，后者已在第 3 章“使用 PostgreSQL 和 RestTemplate
  的微服务”一节以及第 8 章“容器中的微服务和 PostgreSQL”一节中详细解释。你在上一章中已经看到了这些使用 PostgreSQL 数据库的多个交互微服务的部署模式，因此本节将专门研究如何使用
  Docker Compose 来组合它们。


  从容器化的微服务连接到容器化的 PostgreSQL 服务器相当直接，因此在单独运行容器时几乎不需要做任何更改。下一节将探讨这些更改。


  列表 9-3 展示了本示例的源代码组织结构。


  ```

  ch09-01

  ├── 01-ProductServer

  │   ├── Dockerfile

  │   ├── pom.xml

  │   └── src

  │       └── ...

  ├── 02-ProductWeb

  │   ├── Dockerfile

  │   ├── pom.xml

  │   └── src

  │       └── ...

  ├── README.txt

