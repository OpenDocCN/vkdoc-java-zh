  ## 使用 MongoDB 容器编排微服务


  此示例再次复用了第 3 章中标题为“使用 MongoDB 和 CrudRepository 的微服务”部分的微服务。它使用了相同的两个微服务——一个消费者和一个提供者微服务，它们通过
  REST 协议相互通信。提供者微服务还与 MongoDB 进行交互。第 8 章展示了一个与 MongoDB 数据库交互的完整微服务示例，所有组件都在 Docker
  容器中。整体设计请参考第 2 章中的图 2-1。在本节中，您将修改该示例，使其使用 Docker Compose 完全部署在容器基础设施中。


  ### 编排容器拓扑


  对于此编排，您需要一个完整的基于容器的部署拓扑，如图 9-2 所示。Product Web 和 Product Server 微服务被容器化，Product Server
  微服务将连接到一个同样部署在容器内的 MongoDB 数据库。


  ![](img/619782_1_En_9_Fig2_HTML.jpg)


  该图展示了微服务容器。它包括 Product Web 微服务、Product Server 微服务、容器引擎、主机操作系统和硬件。


  图 9-2


  编排微服务容器


  同样，Product Web 和 Product Server 容器提供业务服务，而 PostgreSQL 容器则提供用于持久化状态的应用程序服务。


