  \ HATEOAS。下一章将转向基于组件的架构中更有趣的方面。\n\n# 3. 洋葱架构与六边形架构实践\n\n第 1 章介绍了六边形架构。你还在第 1 章和第\
  \ 3 章中看到了一些示例，这些示例解释了像 Spring 和 Spring Boot 这样的轻量级容器如何实现抽象端口的概念，以在运行时提供按需适配器。本章通过引入洋葱架构，并辅以更精确和具体的示例，对这些概念进行了扩展。\n\
  \n本章涵盖以下概念：\n\n*   使用 Spring Boot 和 PostgreSQL 扩展微服务中六边形架构的概念。\n\n*   通过用 MongoDB\
  \ 替换 PostgreSQL，演示六边形架构的实际应用。\n\n*   介绍洋葱架构的概念。\n\n*   引入 GraphQL 作为一种技术手段来演示洋葱架构。\n\
  \n*   通过示例演示六边形架构与洋葱架构的互补性质。\n\n## 使用 PostgreSQL 和 RestTemplate 的微服务\n\n在本节中，你将调整在第\
  \ 2 章中看到的第一个微服务示例，但将其连接到 PostgreSQL 数据库而不是 MongoDB。你将拥有相同的两个微服务——一个消费者微服务和一个提供者微服务——它们使用\
  \ REST 协议相互通信。提供者微服务也与 PostgreSQL 交互，而不是 MongoDB。整体设计请参考第 2 章中的图 2-1。\n\n### 设计微服务\n\
  \n你将重用第 2 章图 2-1 中所示的六边形微服务视图。此设计存在以下几个差异：\n\n*   Product Server 微服务连接到一个 PostgreSQL\
  \ 数据库。\n\n*   你将使用 Liquibase 来初始化 PostgreSQL 数据库。\n\n*   由于使用了 Lombok 库，`Product`实体更加简洁。\n\
  \n*   你将使用独立的实体模型——用于 Repository 交互的`ProductOR`和用于 REST 接口的`Product`。\n\n*   你将使用`mapstruct`库在`ProductOR`和`Product`结构之间转换实体。\n\
  \n### 理解代码\n\n本书的源代码可通过本书的产品页面在 GitHub 上获取，网址为[`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的源代码组织在`ch03\\\
  ch03-01`文件夹内。你将首先查看提供者微服务——即 Product Server 微服务。清单 3-1 显示了用于与 PostgreSQL 交互的已更改的仓库。\n\
  \n```\n@RepositoryRestResource(collectionResourceRel = \"productdata\",\npath =\
  \ \"productdata\")\npublic interface ProductRepository extends\nCrudRepository {\n\
  public List findByCode(@Param(\"code\")\nString  code);\n}\n清单 3-1\nProduct Server\
  \ 微服务与 PostgreSQL 交互的抽象端口 (ch03\\ch03-02\\01-ProductServer\\src\\main\\java\\com\\\
  acme\\ecom\\product\\repository\\ProductRepository.java)\n```\n\n这个端口（接口）提供了对仓库（本例中为\
  \ PostgreSQL）的通用 CRUD 操作。请注意，第 2 章中的所有示例中，`MongoRepository`都与 MongoDB 交互。然而，本示例选择了更通用的`CrudRepository`类型，而不是`MongoRepository`。这样做是有原因的。我想演示一个通用端口（带有`CrudRepository`的受驱端口）如何适配连接到不同类型的数据库——更具体地说，在本示例中连接到\
  \ PostgreSQL 数据库，在下一个示例中连接到 MongoDB 数据库。\n\n`CrudRepository`是 Spring Data 的一个接口，用于对特定类型的仓库执行通用\
  \ CRUD 操作。它提供了几个开箱即用的方法来与数据库交互。此端口的特定适配器（即 PostgreSQL 数据库的适配器）由 Spring 根据`pom.xml`中的配置提供（参见清单\
  \ 3-2）。\n\n```\n\norg.postgresql\npostgresql\n42.2.19\nruntime\n\n清单 3-2\nProduct\
  \ Server 微服务的适配器提示 (ch03\\ch03-02\\01-ProductServer\\ pom.xml)\n```\n\n清单 3-3 展示了支持\
  \ REST 的 HTTP 端口，它使用了 Spring 的`RestController`。\n\n```\n@RestController\npublic\
  \ class ProductRestController {\n@Autowired\nprivate ProductRepository productRepository;\n\
  @Autowired\nprivate ProductMapper mapper;\n@ApiOperation(value=\"查看所有产品列表\",\nresponse\
  \ = Product.class,\nresponseContainer = \"List\")\n@RequestMapping(value = \"/products\"\
  ,\nmethod = RequestMethod.GET,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public ResponseEntity> getAllProducts() {\nIterable iterable =\nproductRepository.findAll();\n\
  List list = new ArrayList ();\nfor(ProductOR productOR:iterable){\nlist.add(mapper.entityToApi(productOR));\n\
  }\nif(list.size() == 0){\nreturn new ResponseEntity>(\nHttpStatus.NOT_FOUND);\n\
  }\nreturn new ResponseEntity>(list,\nHttpStatus.OK);\n}\n}\n清单 3-3\n用于 getAllProducts\
  \ Product Server 的基于 REST 的 HTTP 端口 (ch03\\ch03-02\\01-ProductServer\\src\\main\\\
  java\\com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n```\n\n\
  REST 控制器具有 CRUD 方法，用于同步`Product`实体的状态与 PostgreSQL 数据库中的状态。`getAllProducts`是一个 Java\
  \ 方法，它返回 PostgreSQL 数据库中所有产品的列表，该列表通过基于 HTTP 的 REST 端口中声明的抽象协议和交付格式来定义。然后，Spring\
  \ 会注入（或用于拦截）此端口的一个具体实现，并在运行时在控制器中使用。它们将来自 HTTP 交付通道的 JSON 格式请求数据负载转换为应用程序核心中的`getAllProducts`方法调用。为了检索实际的产品实体，`getAllProducts`将调用委托给受驱端口`ProductRepository`。\n\
  \n这里我需要讨论两个新的实用程序库。第一个是`ProductMapper`，如清单 3-4 所示。\n\n\n\n```\n@Mapper(componentModel\
  \ = \"spring\")\npublic interface ProductMapper {\nProduct entityToApi(ProductOR\
  \ entity);\nProductOR apiToEntity(Product api);\n}\n代码清单 3-4\n产品实体映射器 (ch03\\ch03-02\\\
  01-ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\controller\\ProductMapper.java)\n\
  ```\n\n该 API 包含在两个 Java Bean（此处为 `ProductOR` 和 `Product`）之间自动映射的函数。使用 `MapStruct`，您只需创建接口，该库就会在编译时根据\
  \ `pom.xml` 中的声明自动创建具体实现。请参见代码清单 3-5。\n\n```\n\norg.mapstruct\nmapstruct\n1.5.5.Final\n\
  \n代码清单 3-5\n在 ProductRestController 中配置映射器 (ch03\\ch03-02\\01-ProductServer\\pom.xml)\n\
  ```\n\n当您通过执行 `mvn clean install` 触发 `MapStruct` 处理时，它将在 `/target/generated-sources/annotations/`\
  \ 目录下生成实现类。\n\nProduct Server 微服务中 REST 控制器的其余实现与第 1 章中的代码清单 1-4 非常相似（唯一的区别是，此处使用\
  \ `ProductRepository` 端口与 PostgreSQL 存储库交互，而非内存数据库），因此此处不再重复完整代码。\n\n现在让我们来看实体类。Product\
  \ Server 微服务 API 中暴露的 `Product` 实体类如代码清单 3-6 所示。\n\n```\n@Builder\n@Data\n@NoArgsConstructor\n\
  @AllArgsConstructor\npublic class Product{\n@ApiModelProperty(position = 1)\nprivate\
  \ String productId;\n@ApiModelProperty(position = 2)\nprivate String name;\n@ApiModelProperty(position\
  \ = 3)\nprivate String code;;\n@ApiModelProperty(position = 4)\nprivate String title;\n\
  @ApiModelProperty(position = 5)\nprivate Double price;\n}\n代码清单 3-6\nProduct 实体\
  \ (ch03\\ch03-02\\01-ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\\
  model\\Product.java)\n```\n\nProject Lombok 的 `@Builder` 是一种有用的机制，无需编写样板代码即可使用构建器模式。您可以将此注解应用于类或方法。\n\
  \n`@Data` 是一个便捷的快捷注解，它将 `@ToString`、`@EqualsAndHashCode`、`@Getter`/`@Setter` 和 `@RequiredArgsConstructor`\
  \ 的功能捆绑在一起。也就是说，`@Data` 会生成通常与普通 Java 对象（POJO）和 Bean 相关的所有样板代码，主要包括所有字段的 getter、所有非\
  \ final 字段的 setter，以及涉及类字段的适当的 `toString`、equals 和 `hashCode` 实现，还有一个初始化所有 final\
  \ 字段以及所有没有初始化器且已用 `@NonNull` 标记的非 final 字段的构造函数，以确保该字段永远不会为 null。\n\n代码清单 3-7 显示了\
  \ Product Server 微服务的 `ProductRepository` 用于将数据持久化到 PostgreSQL 数据库的 `ProductOR`\
  \ 实体类。\n\n```\nimport javax.persistence.Id;\n@Data\n@NoArgsConstructor\n@Entity\n\
  @Table(name =\"product\")\npublic class ProductOR{\n@GeneratedValue(strategy = GenerationType.IDENTITY)\n\
  @Id\n@Column(name = \"productid\")\nprivate Long productId;\n@Column(name = \"prodname\"\
  )\nprivate String name;\n@Column(name = \"code\")\nprivate String code;;\n@Column(name\
  \ = \"title\")\nprivate String title;\n@Column(name = \"price\")\nprivate Double\
  \ price;\n}\n代码清单 3-7\nProductOR 实体 (ch03\\ch03-02\\01-ProductServer\\src\\main\\\
  java\\com\\acme\\ecom\\product\\model\\ProductOR.java)\n```\n\n您使用 JPA 进行持久化。JPA\
  \ 中的实体不过是使用 `@Entity` 注解的 POJO，表示可以持久化到数据库的数据。一个实体代表存储在数据库中的一个表。实体的每个实例代表表中的一行。您必须在类级别指定\
  \ `@Entity` 注解。您还必须确保实体有一个无参构造函数和一个主键。实体名称默认为类的名称。您可以使用 `name` 元素 `@Entity(name=\"\
  product\")` 更改其名称。在某些情况下，数据库中的表名和实体名会不同。在这些情况下，您可以使用 `@Table` 注解指定表名。\n\n每个 JPA\
  \ 实体都必须有一个唯一标识它的主键。`@Id` 注解定义了主键。您可以通过多种方式生成标识符，由 `@GeneratedValue` 注解指定。您可以通过 strategy\
  \ 元素从四种 ID 生成策略中进行选择。该值可以是 `AUTO`、`TABLE`、`SEQUENCE` 或 `IDENTITY`。\n\n您还可以使用 `@Column`\
  \ 注解来提及表中列的详细信息。`@Column` 注解有许多元素，包括 `name`、`length`、`nullable` 和 `unique`。\n\n\
  引入 `ProductOR` 实体还有另一个原因。我想演示在使用端口和适配器架构时，您可以最大限度地重用核心实体和核心业务服务。换句话说，我想演示此示例中使用的\
  \ `Product` 实体也会在下一个示例中重用，这将验证在运行时插入不同驱动适配器同时仍重用核心的能力。为此，`ProductOR` 实体将处理所有适配器（数据库）特定的细节。\n\
  \nJPA 依赖项在 Maven 配置中提及。请参见代码清单 3-8。\n\n```\n\norg.springframework.boot\nspring-boot-starter-data-jpa\n\
