  ## 使用 Docker 构建第一个 Java 微服务


  在本节中，你将研究如何使用 Docker 部署一个更正式的微服务。为此，你将使用在第 1 章“你的第一个 Java 微服务”一节中部署的同一个微服务。




  ### 使用 Jib 将微服务容器化


  Jib 是谷歌维护的一款开源 Java 工具，用于构建基于 Java 的应用程序的 Docker 镜像。Jib 简化了容器化过程，因为使用它时，你无需编写 Dockerfile（你将在下一节了解什么是
  Dockerfile），而你在之前的示例中已经看到了这一点。此外，你甚至不需要安装 Docker 就能创建和发布 Docker 镜像。谷歌将 Jib 作为 Maven
  和 Gradle 插件发布——这里你使用的是 Maven。


  ### 理解源代码


  本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
  `ch07\ch07-02` 文件夹内。本示例中的大部分源代码与 `ch01\ch01-01` 中的类似。本节不讨论微服务的代码，因为这部分内容已在第 1 章中描述过，但本节会探讨部署方面的问题。每次构建时，Jib
  都会捕获你对应用程序源代码所做的任何更改。这省去了你单独执行 Docker 构建/推送命令的步骤，并简化了将其添加到 CI 流水线的过程，但我不对这些方面进行展开。你还需要在本地进行设置，以对你想要部署到的
  Docker 仓库进行身份验证。这通过 Maven 的 `settings.xml` 文件完成，如代码清单 7-22 所示。


