  \   172.20.15.199   a2473f05176a6444bb676cf3927fd363-1434093128.ap-southeast-1.elb.amazonaws.com\
  \         8080:32087/TCP   49s\n(base) binildass-MBP:ch15-01 binil$\n清单 15-15\n\
  在 EKS 中暴露产品 Web 微服务 (ch15/ch15-01/product-service.yaml)\n```\n\n一切就绪后，您就可以测试示例了。您还可以使用适当的\
  \ URL 格式查看 EKS 控制台，在我的例子中如下所示：\n\n```\nhttps://ap-southeast-1.console.aws.amazon.com/eks/home?region=ap-southeast-1#/clusters\n\
  ```\n\n### 在 EKS 中测试微服务\n\n一旦微服务在 AWS 云的 EKS 集群中启动并运行，您就可以通过浏览器访问 Web 应用程序。指向应用程序\
  \ URL，您可以从 AWS UI 控制台确定该 URL。\n\n您可以在浏览器中使用清单 15-16 中的 URL 测试微服务。\n\n```\nhttp://a2473f05176a6444bb676cf3927fd363-1434093128.ap-southeast-1.elb.amazonaws.com:8080/product.html\n\
  清单 15-16\n使用浏览器测试 EKS 中的服务\n```\n\n您也可以使用 cURL 测试该服务，如清单 15-17 所示。\n\n```\n(base)\
  \ binildass-MBP:ch15-01 binil$ curl -silent http://a2473f05176a6444bb676cf3927fd363-1434093128.ap-southeast-1.elb.amazonaws.com:8080/product.html\
  \ | grep title\nBootstrap CRUD Data Table for Database with Modal Form\n.table-title\
  \ {\n.table-title h2 {\n.table-title .btn-group {\n.table-title .btn {\n.table-title\
