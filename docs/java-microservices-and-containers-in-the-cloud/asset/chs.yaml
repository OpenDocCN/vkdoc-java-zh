  \ 端口，使用 Spring 的 `RestController`，如代码清单 1-3 所示。\n\n```\n@RestController\npublic\
  \ class ProductRestController{\n@Autowired\nprivate InMemoryDB inMemoryDB;\n@RequestMapping(value\
  \ = \"/productsweb\",\nmethod = RequestMethod.GET,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public ResponseEntity> getAllProducts() {\nList products = inMemoryDB.getAllProducts();\n\
  if(products.isEmpty()){\nreturn new ResponseEntity>(\nHttpStatus.NOT_FOUND);\n}\n\
  List list = new ArrayList ();\nfor(Product product:products){\nlist.add(product);\n\
  }\nreturn new ResponseEntity>(list,\nHttpStatus.OK);\n}\n}\n代码清单 1-3\n用于 getAllProducts\
  \ 的基于 REST 的 HTTP 端口 (ch01\\ch01-01\\02-ProductWeb\\src\\main\\java\\com\\acme\\\
  ecom\\product\\controller\\ProductRestController.java)\n```\n\n`getAllProducts`\
  \ 是一个 Java 方法，它将返回数据库中所有产品的列表，该方法通过基于 HTTP 的 REST 端口中声明的抽象协议和交付格式来定义。然后，Spring 会注入（或用于拦截）该端口的具体实现，并在运行时在控制器中使用。它们将来自\
  \ HTTP 交付通道的 JSON 格式数据负载转换为应用程序核心中的 `getAllProducts` 方法调用。为了检索产品，`getAllProducts`\
  \ 将调用委托给 `InMemoryDB` 类。\n\nREST 控制器实现的其余部分如代码清单 1-4 所示。\n\n\n\n```\npublic class\
  \ ProductRestController{\n@RequestMapping(value = \"/productsweb/{productId}\",\n\
  method = RequestMethod.GET,\nproduces = MediaType.APPLICATION_JSON_VALUE)\npublic\
  \ ResponseEntity getProduct(@PathVariable(\n\"productId\") String productId) {\n\
  Product product = inMemoryDB.getProduct(productId);\nif (product == null) {\nreturn\
  \ new ResponseEntity(\nHttpStatus.NOT_FOUND);\n}\nreturn new ResponseEntity(product,\n\
  HttpStatus.OK);\n}\n@RequestMapping(value = \"/productsweb\",\nmethod = RequestMethod.POST,\n\
  produces = MediaType.APPLICATION_JSON_VALUE)\npublic ResponseEntity addProduct(\n\
  @RequestBody Product product) {\nProduct productFound = inMemoryDB.getProduct(\n\
  product.getProductId());\nif (null != productFound) {\nreturn new ResponseEntity(\n\
  HttpStatus.CONFLICT);\n}\ninMemoryDB.addProduct(product);\nreturn new ResponseEntity(product,\n\
  HttpStatus.OK);\n}\n@RequestMapping(value = \"/productsweb/{productId}\",\nmethod\
  \ = RequestMethod.DELETE,\nproduces = MediaType.APPLICATION_JSON_VALUE)\npublic\
  \ ResponseEntity deleteProduct(\n@PathVariable(\"productId\")String productId) {\n\
  Product productFound = inMemoryDB.getProduct(\nproductId);\nif (productFound ==\
  \ null) {\nreturn new ResponseEntity(\nHttpStatus.NOT_FOUND);\n}\ninMemoryDB.deleteProduct(productId);\n\
  return new ResponseEntity(\nHttpStatus.NO_CONTENT);\n}\n@RequestMapping(value =\
  \ \"/productsweb/{productId}\",\nmethod = RequestMethod.PUT,\nproduces = MediaType.APPLICATION_JSON_VALUE)\n\
  public ResponseEntity updateProduct(\n@PathVariable(\"productId\")String productId,\n\
  @RequestBody Product product) {\nProduct currentProduct = inMemoryDB.getProduct(\n\
  productId);\nif (currentProduct == null) {\nreturn new ResponseEntity(\nHttpStatus.NOT_FOUND);\n\
  }\ncurrentProduct.setName(product.getName());\ncurrentProduct.setCode(product.getCode());\n\
  currentProduct.setTitle(product.getTitle());\ncurrentProduct.setPrice(product.getPrice());\n\
  Product newProduct = inMemoryDB.updateProduct(\ncurrentProduct);\nreturn new ResponseEntity(newProduct,\n\
  HttpStatus.OK);\n}\n}\n清单 1-4\n基于 REST 的 HTTP 端口，用于 getAllProducts（ch01\\ch01-01\\\
  02-ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\controller\\ProductRestController.java）\n\
  ```\n\n这里，给定一个 `productId`，`getProduct` 方法将检索特定产品的详细信息。`addProduct` 将创建一个新产品，`deleteProduct`\
  \ 将从内存数据库中移除一个产品。`updateProduct` 将用一组新值更新一个产品。\n\n### 构建并运行代码\n\n`ch01\\ch01-01`\
