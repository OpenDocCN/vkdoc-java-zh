  ## 总结


  容器非常擅长打包、分发以及在目标环境中执行代码，而无需在目标机器上设置许多特定于应用程序的配置。你可以将容器视为一个黑盒。为了证明这一点，本章包含了在没有本地
  Java SDK 的情况下，仅使用容器中的 Maven 来构建、打包和执行 Java 代码的示例！你还学习了处理容器以与简单微服务交互的各种方法。现在，你能够更好地理解容器是什么。下一章将介绍更复杂的微服务，同样会使用容器。


  '
- '# 8. 微服务容器


  前面的章节介绍了微服务，它们是自包含、独立的应用程序单元，每个单元都履行来自特定领域的相关业务功能。每个微服务，或者它们的集合，本身都可以被视为一个应用程序。在一个多微服务应用程序中，你会为你的应用创建许多微服务。如果你决定使用不同的技术栈来构建多个微服务，那该怎么办？你的团队很快就会陷入困境，因为开发人员需要管理的环境甚至比他们在传统的单体应用开发场景中还要多。使用
  Docker，可以在同一台服务器上管理、部署甚至减少数百甚至数千个微服务的性能开销。Docker 容器比虚拟机需要更少的计算资源，并且容器还提供了所需的隔离性，使得不同的技术可以并存。因此，容器与微服务是天然契合的。


  第 7 章介绍了如何使用 Docker 镜像运行应用程序容器。本章将继续讨论这一话题，但会使用反映真实场景的微服务示例。多个微服务将进行交互，这意味着它们需要相互通信。本章涵盖以下概念：


  *   微服务容器之间的相互连接


  *   微服务容器连接到主机上的 PostgreSQL 数据库


  *   微服务容器连接到容器中的 PostgreSQL


  *   微服务容器连接到容器中的 MongoDB


  要理解容器间的通信，你需要了解容器之间的网络选项，接下来将对此进行介绍。


  ## 容器网络


  Docker 提供了不同的网络配置方式，以便你的容器可以与外界通信，无论是与另一台服务器还是与另一个 Docker 容器。下一节将简要介绍这些选项。


  ### 链接


  当你安装 Docker 时，Docker 默认使用一个自动创建的桥接网络。Docker 的网络子系统是可插拔的，使用驱动程序。在 Docker 引入网络功能之前，Docker
  的链接功能使容器能够相互发现，并安全地将一个容器的信息传递给另一个容器。随着 Docker 网络功能的引入，你仍然可以创建链接，但它们与默认的桥接网络和其他用户定义的网络相比，行为有所不同。尽管链接选项仍然有效，但它是一个遗留功能。第一个示例使用了链接；然而，此功能最终可能会被移除，因此建议你使用其他选项（网络）来实现此功能。用户定义的网络不支持的一个功能是，你可以通过链接在容器之间共享环境变量。但卷提供了更好的选项，可以以更可控的方式在容器之间共享环境变量。


  ### 网络


  有多种类型的网络。我在这里只提及它们，因为详细的解释超出了本书的范围。


  *   当你需要在同一 Docker 主机上让多个容器通信时，桥接网络是最佳选择。


  *   当网络堆栈不应与 Docker 主机隔离，但你希望容器的其他方面被隔离时，主机网络是最佳选择。


  *   当你需要运行在不同 Docker 主机上的容器进行通信，或者多个应用程序使用 Swarm 服务协同工作时，覆盖网络是最佳选择。


  *   当你从虚拟机设置迁移，或者需要你的容器看起来像网络上的物理主机（每个主机都有唯一的 MAC 地址）时，Macvlan 网络是最佳选择。


  *   第三方网络插件允许你将 Docker 与专门的网络堆栈集成。


  你很快就会看到可运行的代码，以便通过实践来学习。


  由于本章将探讨容器通信的多种场景，因此了解如何检查容器日志也很有意义，接下来将对此进行介绍。


  ## 容器日志


  你已经了解到 Docker 是一个操作系统级别的虚拟化平台，因此它允许你在同一台主机上同时运行多个应用程序容器。它有助于分离应用程序和基础设施，但是当你在同一基础设施中拥有许多应用程序时，当事情不如预期时，你需要一种方法来进行故障排除。Docker
  日志在这里可以帮助你。



  ### 控制台日志输出


  当你运行一个容器时，可以立即在控制台中看到 `STDOUT` 日志。你在第 7 章的清单 7-28 中看到过这一点，此处将其复制为清单 8-1。


  ```

  (base) binildass-MacBook-Pro:ch07-02 binil$ docker run -it -p 8080:8080 binildas/product-web

  ...

  f3636ebea575: Pull complete

  Digest: sha256:56254d5a6e84cbe625013d245d8fa7dfe157722d0a6dd50d434f8e63dfc339ad

  Status: Downloaded newer image for binildas/product-web:latest

  .   ____          _            __ _ _

  /\\ / ___''_ __ _ _(_)_ __  __ _ \ \ \ \

  ( ( )\___ | ''_ | ''_| | ''_ \/ _` | \ \ \ \

  \\/  ___)| |_)| | | | | || (_| |  ) ) ) )

  ''  |____| .__|_| |_|_| |_\__, | / / / /

  =========|_|==============|___/=/_/_/_/

  :: Spring Boot ::                (v3.2.0)

  2022-05-27 05:12:40 INFO  StartupInfoLogger.logStarting:55 - Starting EcomProductMicroserviceA...

  2022-05-27 05:12:40 DEBUG StartupInfoLogger.logStarting:56 - Running with Spring
  Boot ...

  清单 8-1

  使用 Docker 运行产品 Web 微服务

  ```


  此命令会像 Linux shell 的 `tail -f` 命令一样持续跟踪日志。在 Linux 中，使用 `--follow (-f)` 选项时，`tail`
  默认会跟踪文件描述符。


  从第 7 章的清单 7-30 中，你了解到容器 ID 是 `e95b2b5eb64e`。你可以使用这些 ID 来查看容器日志，如清单 8-2 所示。


  ```

  (base) binildass-MacBook-Pro:~ binil$ eval $(minikube docker-env)

  (base) binildass-MacBook-Pro:~ binil$ docker logs e95b2b5eb64e

  ...

  清单 8-2

  查看产品 Web 微服务容器日志

  ```


  在清单 8-2 中，日志将包含带有时间戳的输出流数据。但是，此命令不包含持续的日志输出。要查看容器的持续日志输出，你需要在 `docker logs` 命令中使用
  `–follow` 选项，如清单 8-3 所示。


  ```

  (base) binildass-MacBook-Pro:~ binil$ eval $(minikube docker-env)

  (base) binildass-MacBook-Pro:~ binil$ docker logs --follow e95b2b5eb64e

  ...

  清单 8-3

  持续查看产品 Web 微服务容器日志

  ```


  这个 `–follow` 选项是一个非常实用的 Docker 选项，因为它允许你监控容器的实时日志。


  有了这个简单的介绍，接下来我们进入代码部分。


  ## 使用链接的微服务与 MongoDB 容器


  本示例复用了第 3 章中“使用 MongoDB 和 CrudRepository 的微服务”一节中的微服务。它使用了相同的两个微服务——一个消费者微服务和一个提供者微服务，它们通过
  REST 协议相互通信。提供者微服务还与 MongoDB 进行交互。整体设计请参考第 2 章的图 2-1。


  ### 设计容器拓扑


  根据第 2 章图 2-1 中的设计，你还需要定义基于容器的部署拓扑。如图 8-1 所示。


  ![](img/619782_1_En_8_Fig1_HTML.jpg)


  该图展示了微服务容器拓扑。它包括用户、浏览器、容器引擎、主机操作系统和硬件。


  图 8-1


  微服务容器拓扑设计


  一个消费者微服务和一个提供者微服务通过 REST 协议相互通信。产品 Web 微服务是消费者微服务，它将作为单个容器部署。提供者微服务还与 NoSQL 数据库
  MongoDB 进行交互。因此，部署涉及两个容器——一个用于产品服务器组件，另一个用于 MongoDB 组件。在这里，产品 Web 和产品服务器容器提供业务服务，而
  Mongo 容器则提供用于持久化数据的应用服务。


  另外，请注意图 8-1 中的另一个方面。产品服务器和 MongoDB 容器被组合在一起，称为单个微服务，即产品服务器微服务。这遵循了微服务的标准约定，即微服务是一个自包含的单元，拥有自己的数据。


  还要注意用户与部署进行交互的两种方式：


  *   命令行界面（CLI）作为部署管理接口，在所谓的用户空间内存中运行。该程序就像其他运行在操作系统之上的程序一样运行。在用户空间中运行的程序无法修改内核空间内存。操作系统是用户程序与计算机硬件之间的接口。


  *   用户使用浏览器从业务服务访问业务功能


  当你运行 Docker 时，Docker 引擎和 Docker CLI 是两个在用户空间中运行的程序。图 8-1 显示了三个正在运行的容器。每个容器都作为 Docker
  引擎的子进程运行，并被容器封装，委托进程在其自身的用户空间内存子空间中运行。在容器内运行的程序无法访问相邻容器所限定的内存和资源。


  此外，从某种意义上说，图 8-1 也代表了微服务部署的逻辑视图。虽然在基础设施架构层面，容器部署更有意义，但微服务架构视图对应用架构师更为相关，因此我在图中展示了这一点。这就是为什么即使产品服务器和
  MongoDB 作为两个独立的容器部署，我仍然在逻辑上将它们组合在一起，以表示单个产品服务器微服务。这个特定的 MongoDB 实例完全归产品服务器微服务所有，产品服务器微服务之外的实体可能无需关心此
  MongoDB 实例。


