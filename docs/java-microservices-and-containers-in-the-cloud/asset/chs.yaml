  \n## 使用 Spring Cloud 的微服务\n\nSpring Cloud 构建于 Spring Boot 之上。Spring Cloud 提供了分布式微服务生态系统中的许多常见模式，可以帮助你将核心服务集成为一组松散耦合的服务。Spring\
  \ Cloud 还提供了许多强大的工具，可以增强 Spring Boot 应用程序的行为以实现这些模式。本节将通过代码介绍其中一种模式，以便你了解其带来的好处。\n\
  \n### 设计微服务\n\n本节对之前的微服务示例稍作修改，以引入 Spring Cloud。\n\n![](img/619782_1_En_2_Fig2_HTML.jpg)\n\
  \n一个模型图将最终用户和浏览器通过传入命令、REST API、产品 REST 控制器、产品服务代理、产品服务以及带有 Feign 客户端的传出命令连接到 product-web-microservice，并通过传入命令、REST\
  \ API、控制器、产品仓库、产品实体和 MongoDB 连接到 product-service-microservice。\n\n图 2-2\n使用 Spring\
  \ Cloud Feign 客户端的微服务设计\n\n如之前的示例所述，在图 2-2 所示的两个微服务中，你在 REST 接口处使用 HTTP 端口，这些端口指定了用户浏览器或其他\
  \ HTTP 客户端如何使用应用程序核心。这些端口（接口）作为 REST 控制器属于各自微服务的业务逻辑内部。来自浏览器的请求将命中 Product Web 微服务，即消费者微服务。Product\
  \ Web 微服务不执行任何业务逻辑；相反，它将调用委托给 Product Server 微服务，即提供者微服务。\n\nProduct Web 微服务中的 `FeignClient`\
  \ 端口是另一个端口，它同样只是应用程序核心如何使用它的规范。一个实现了 `FeignClient` 端口的具体驱动适配器由 Spring Cloud 注入到应用程序核心中，无论该端口在何处被需要（通过类型提示）。\n\
  \n`Product` 实体实现了 Product Server 微服务中的应用程序核心。\n\nProduct Server 微服务中的其余端口和适配器的功能与之前的示例完全相同。\n\
