  `stdin`、`stdout`和`ttys`是相互关联的概念，理解它们将对你有所帮助。`stdin`和`stdout`是进程的输入输出流。伪终端（也称为`tty`或`pts`）将用户的“终端”与`stdin`和`stdout`流连接起来，通常（但不一定）通过`bash`等
  shell 实现。这里的“终端”一词加了引号，因为如今我们使用的终端与过去的概念已大不相同。


  如清单 7-4 所示，当以交互模式运行进程时（例如启动 bash shell），你通常会同时使用`-t`和`-i`参数。对于 shell 而言，你的目的是发出命令并读取输出。


  在 Docker 中，`-i`或`--interactive`（用于保持 STDIN 流开启，即使未附加）和`-t`或`-tty`（用于附加伪`tty`）这两个开关通常组合使用为`-it`，这将帮助你为容器中运行的进程分配一个伪`-tty`控制台。


  `-it`组合会在容器启动后将命令行附加到容器上。这样，你就可以在 shell 控制台中查看运行中容器的情况，并在需要时与容器进行交互。


  执行清单 7-4 中的命令时，Docker 会判断该镜像是否存在于本地机器上。如果不存在，则会从远程仓库拉取该镜像。Docker 引擎使用该镜像，并在镜像层栈的顶部添加一个可写层。随后，它会初始化镜像的名称、ID
  以及资源限制（如 CPU 和内存）。在此阶段，Docker 还会通过从 IP 池中查找并附加一个可用的 IP 地址来设置容器的 IP 地址。执行的最后一步是实际命令，该命令作为`docker
  run`命令的最后一个参数传入。参见清单 7-5。


