  本示例使用了 `-v` 选项，以便在此修改后的示例中，主机操作系统上的目录可供容器使用。以这种方式创建的卷是一种映射目录。该映射目录将可供容器使用，并且也可以从主机操作系统访问。映射目录中已有的任何文件在容器内部同样可用；它们在映射步骤中不会被删除。参考图
  8-9 中的编号标签，您可能会注意到以下几点：


