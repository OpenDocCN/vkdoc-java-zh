  ## 使用 PostgreSQL 和 Kafka 组合微服务


  在第 8 章“容器中的微服务和 PostgreSQL”一节中，你看到了一个完整的微服务示例与 PostgreSQL 数据库的交互，所有内容都在 Docker 容器中。本节将向你展示如何修改该示例，以便这些容器可以使用消息中间件
  Kafka 相互通信。你还将进行必要的更改，以使用 Docker Compose 在容器基础设施中完全部署所有服务。


  ### 组合容器拓扑


  对于当前设计，你需要一个完整的基于容器的部署拓扑，如图 9-3 所示。Product Web 和 Product Server 微服务被容器化，Product
  Server 微服务将连接到同样部署在容器内的 PostgreSQL 数据库。Product Web 微服务和 Product Server 微服务之间的所有通信都通过
  Kafka 进行。


  ![](img/619782_1_En_9_Fig3_HTML.jpg)


  该图展示了微服务容器。它包括 products web mu S、product server mu S、容器引擎、主机 O S 和硬件。


  图 9-3


  组合微服务容器


  这里，Product Web 和 Product Server 容器提供业务服务，而 Mongo 容器提供用于持久化状态的应用程序服务。Kafka 容器提供基础设施服务，因此它们不作为任何特定（业务）微服务的一部分显示。




