  ## 总结


  Helm 通过使用名为 *Helm chart* 的打包格式自动化应用程序的分发，简化了 Kubernetes 中的应用程序开发过程。Helmfile 允许你在单个
  YAML 文件中声明整个 Kubernetes 集群的定义，并捆绑多个 Helm 发布版本。这些工具在安装、管理和更新数百个配置时非常方便，这在微服务环境中是常见流程。你看到的示例具有足够的复杂性，足以让你体会到它们的优势。到目前为止一切顺利。现在是不是也该研究一下容器和微服务环境下的
  CI（持续集成）和 CD（持续部署）了？这正是你将在下一章中要做的事情。


  # 13. 微服务容器的 CI/CD


  当微服务和部署环境的数量增加时，你必须处理许多 YAML 文件。在上一章中，你了解到 Helm 是一个方便的工具，它维护一个包含版本信息的单一部署 YAML 文件。这个文件让你能够通过几条命令设置和管理非常大的
  Kubernetes 集群。


  大量微服务带来的另一个问题是，如果你需要真正的并行性来提高发布速度，那么有多少个微服务，就可能有多少个团队在构建代码。一个应用程序是许多微服务的集合，代码变更必须定期构建、测试并合并到共享仓库中。一个应用程序可能有一个或多个仓库，例如每个微服务都有一个单独的仓库。当单个仓库中有许多分支时，这可能会导致构建周期中的合并冲突。如果有多个仓库，则在集成过程中可能会发生冲突。无论采用何种仓库策略，都必须有一个流程来最小化此类冲突并实现持续、无摩擦的发布。CI（持续集成）和
  CD（持续部署）旨在最小化这些问题。


  本章涵盖以下概念：


  *   CI 和 CD 简介


  *   演示简单 CI/CD 管道的示例


  ## CI 和 CD


  现代软件发布自动化的动机以及几种标准的 DevOps 实践——例如自动化构建和测试、持续集成（CI）和持续交付（CD）——都源于敏捷软件工程世界。




  ### DevOps


  DevOps 是软件开发行业的一种方法论。它作为一套实践和工具，旨在整合并自动化软件开发（Dev）与 IT 运维（Ops）的工作，以改进和缩短软件开发生命周期。基于微服务的架构旨在提高交付速度，并支持应用程序各部分独立于其他部分进行发布。微服务规模较小，这使得单个服务的架构能够通过持续重构逐步形成。共享的、受版本控制的仓库和制品是
  DevOps 实践的核心，而开发与运维人员的角色正逐渐融合为一个统一的流水线阶段。每个阶段都明确了开发与运维流程中的离散步骤，但两者之间的界限变得模糊。如果你观察发布流程中的典型阶段，这些概念就会更加清晰。见图
  13-1。


  ![](img/619782_1_En_13_Fig1_HTML.jpg)


  流程图包含以下流程：微服务开发团队 1 到 n，版本控制或分支管理，构建、打包和测试（位于构建流水线与持续集成下），带说明的包，运维团队，自动化脚本，测试环境，验收与自动化验收测试（位于发布流水线与持续交付和部署下），以及全局发布。


  图 13-1


  CI 与 CD


  CI/CD 代表持续集成与持续交付（或持续部署）。本章将探讨每个组成部分。


  ### 持续集成 (CI)


  *持续集成* 定义了开发人员如何借助自动化手段，每天多次使用共享仓库集成代码。新的代码变更会被定期构建、测试并合并到共享仓库中。


  ### 持续交付 (CD)


  *持续交付* 指的是自动将软件发布到测试或生产环境。持续交付通常意味着开发人员对应用的更改会自动进行错误测试并上传到仓库（如 GitHub 或 Docker Hub
  等容器注册中心），然后由运维团队将其部署到实际生产环境。


  ### 持续部署 (CD)


  *持续部署* 指的是在无需人工干预的情况下自动将软件发布到生产环境。它解决了因手动测试和点击操作而使运维团队负担过重、从而拖慢应用交付速度的问题。持续部署在持续交付优势的基础上，通过自动化流水线中的下一个阶段来进一步优化，如图
  13-1 所示。


  下一节将结合工具 Skaffold 来探讨这些方面。


  ## Google Skaffold


  Skaffold 是一个开源命令行工具，通过编排持续开发、持续集成 (CI) 和持续交付 (CD) 来提升开发人员生产力。它处理构建、推送和部署应用程序的工作流程，你可以用它轻松配置本地开发环境。由于其设置非常简单，本章将使用
  Skaffold 在微服务示例中展示 CI/CD 的若干方面。


  ### Skaffold 工作流程


  Skaffold 提供了一个单一、简单的命令，通过组织常见的开发阶段来简化你的开发工作流程。以下是执行 Skaffold `dev` 命令时的典型工作流程：


  *   收集并监控你的源代码以检测变更。

  *   如果用户将文件标记为可同步，则直接将文件同步到 Pod。

  *   从源代码构建制品。

  *   使用容器结构测试或自定义脚本测试构建好的制品。

  *   为制品打标签。

  *   推送制品。

  *   部署制品。

  *   监控已部署的制品。

  *   退出时（按 Ctrl+C）清理已部署的制品。


  Skaffold 非常灵活，因此如果你在本地机器上编码，可以配置它使用本地 Docker 守护进程构建制品，并通过 kubectl 部署到 Minikube，这正是你接下来在示例中要做的。在生产环境中，你可以切换到生产配置文件，使用不同的配置文件开始构建，然后使用
  Helm 进行部署。


