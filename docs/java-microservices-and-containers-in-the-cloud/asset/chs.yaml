  创建 Kubernetes 资源是通过向 Kubernetes 的 REST 端点提交 JSON 或 YAML 清单来完成的。这有助于对这些资源定义进行版本控制。


  我研究的第一个资源是 Pod，它是一个容器组。它代表了 Kubernetes 中的基本构建块。你总是在 Pod 上部署和操作容器。Pod 通常只包含单个容器，但如果你认为有紧密相关的容器，也可以在
  Pod 中包含多个容器。Sidecar 容器就是这样一个例子，其中日志和数据变更监视器可以与主容器位于同一个 Pod 中。


  因此，尽管你可以将多层应用程序（例如 `ProductWeb` 和 `ProductServer`）托管在单个 Pod 中，但推荐的方式是为每一层使用单独的 Pod。原因很简单——你可以独立地扩展各层，并将它们分布到集群中。参见代码清单
  10-6。


  ```


  apiVersion: apps/v1

  kind: Deployment

  metadata:

  name: product-web

  labels:

  app: product-web

  group: frontend

  spec:

  replicas: 1

  selector:

  matchLabels:

  app: product-web

  template:

  metadata:

  labels:

  app: product-web

  spec:

  containers:

  - name: product-web

  image: ecom/product-web

  ports:

  - containerPort: 8080

  imagePullPolicy: Never

  env:

  - name: acme.PRODUCT_SERVICE_URL

  value: http://product-server:8081/products

  代码清单 10-6

  Product Web 的 Pod 定义 YAML 文件 (ch10\ch10-01\product-web-deployment.yml)

  ```


  在代码清单 10-6 的 Pod 定义中，第一行是分隔符，它是可选的。如果你试图在单个文件中定义多个结构，则需要分隔符。`metadata` 包含关于 Kubernetes
  Pod 的名称、命名空间、标签和其他信息。


  代码清单 10-6 展示了 Product Web 微服务的 Pod 描述符。这里，`Spec` 包含了 Kubernetes Pod 内容的实际描述，例如 Pod
  的容器、副本数量、镜像、卷和其他数据。


  请注意 `containerPort: 8080`。即使你不分配端口，客户端仍然可以连接到 Pod。如果应用程序绑定到 `127.0.0.1`，它将有效地阻止流量进入
  Pod，而 `0.0.0.0` 则允许流量通过所有接口进入 Pod，即使该端口没有在 Pod 规范中显式列出。但是，如果你显式地定义端口，那么使用你集群的每个人都可以快速看到每个
  Pod 暴露了哪些端口。显式定义端口还允许你为每个端口分配一个名称，这很方便。


