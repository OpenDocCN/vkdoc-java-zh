- "# 2. 更多动手实践微服务\n\n你在上一章中编写了第一个也是最简单的微服务。该示例使用了一个简单的数据结构作为内存数据库。本章通过创建更多微服务来扩展该示例，每个微服务的复杂度依次递增。这将使你能够基于之前所学的内容进行构建。你将与一些真实的数据库进行交互，并巩固对第\
  \ 1 章介绍的端口和适配器架构的理解。\n\n本章完全是动手实践，但示例仍然很简单，因此你无需理解复杂的业务或实体关系。相反，示例侧重于学习技术和架构变体。\n\
  \n本章涵盖以下概念，每个概念都配有可运行的示例：\n\n*   首先，你将增强上一章的微服务示例，使其能够与 MongoDB 交互。\n\n*   接下来，我将介绍\
  \ Spring Cloud。\n\n*   然后，我将讨论 HAL 和 HATEOAS。\n\n*   作为最后一个示例，你将使用 Spring Boot 实现一个基于\
  \ HATEOAS 的微服务。\n\n## 使用 MongoDB 和 RestTemplate 的微服务\n\n如前所述，你将增强上一章创建的微服务。你将拥有两个微服务——一个消费者微服务和一个提供者微服务——它们使用\
  \ REST 协议相互通信。提供者微服务还与 NoSQL 数据库 MongoDB 进行交互。\n\n\n\n### 设计微服务\n\n本示例采用了图 1-13（位于第\
  \ 1 章）中描绘的六边形微服务设计。该设计在图 2-1 中再次展示。\n\n![](img/619782_1_En_2_Fig1_HTML.jpg)\n\n\
  模型图将终端用户和浏览器通过传入命令或查询、REST API、产品 REST 控制器、以及带有 REST 模板的传出命令或查询连接到产品 Web 微服务，并通过传入命令或查询、REST\
  \ API、控制器、产品仓库、产品实体和 Mongo DB 连接到产品服务微服务。\n\n图 2-1\n\n消费者与提供者微服务设计\n\n图 2-1 中展示的两个微服务都在\
  \ REST 接口处使用了 HTTP 端口，这些端口规定了用户浏览器或其他 HTTP 客户端如何使用应用核心。这些端口（接口）作为 REST 控制器，属于各自微服务的业务逻辑内部。Spring\
  \ 运行时提供了一个适配器，该适配器实现了 REST 接口所承诺的功能。来自浏览器的请求将命中作为消费者微服务的 Product Web 微服务。Product\
  \ Web 微服务不执行任何业务逻辑；相反，它将调用委托给作为提供者微服务的 Product Server 微服务。保持 Product Web 微服务简单的目的是演示如何启动微服务间的通信，以便您可以在实际场景中使用和扩展此模板。\n\
  \nProduct Web 微服务中的`RestTemplate`是另一个端口，它同样只是应用核心如何使用它的一个规范。一个实现了`RestTemplate`端口的具体驱动适配器，会在任何需要该端口的地方（通过类型提示）由\
  \ Spring 注入到应用核心中。\n\n`Product`实体在 Product Server 微服务中实现了应用核心。同样，我避免了典型的分层服务和组件构造型类，以保持示例的整体复杂性简单。\n\
  \n`ProductRepository`是 Product Server 微服务使用的第三个端口。Product Server 微服务的目的是持久化数据。因此，您需要创建一个满足其需求的持久化接口，其中包含使用实体\
  \ ID 在 NoSQL 集合中执行 CRUD 操作的方法。此时，无论何时何地，只要应用程序需要执行 CRUD 操作，应用核心就需要一个实现了您定义的持久化接口的对象，该对象由\
  \ Spring 运行时提供。\n\n### 代码组织\n\n本书的源代码可通过本书的产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。示例代码的组织方式如代码清单\
