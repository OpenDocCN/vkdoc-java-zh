  \n### 理解代码\n\n对于这第一个示例，我保持领域实体非常简单。该实体是一个典型的可以在电子商务网站上列出的产品。多个产品属于一个产品类别，因此在网站上，你可以首先展示产品类别，用户可以浏览产品类别以查看所选类别下的所有可用产品。让我们先看看这些实体，如代码清单\
