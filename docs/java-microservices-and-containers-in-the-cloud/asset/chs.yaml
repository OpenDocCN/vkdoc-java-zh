  \ URL 来使用该 Web 应用程序（见图 6-6）：\n\n`http://localhost:8080/product.html`\n\n![](img/619782_1_En_6_Fig6_HTML.jpg)\n\
  \n一张包含以下供应商的截图：Kamsung、Lokia、Kamsung、Lokia Pomia。\n\n图 6-6\n\n测试微服务，显示三个服务提供商中两个的返回结果\n\
  \n如前所述，该示例使用了三个 Product Server 微服务实例，而非三种不同类型的微服务，因此它们都会返回相同的响应。但在清单 6-45 中，其中一个\
  \ Product Server 微服务设置了名为 `sleeptimeout=10` 的延迟。清单 6-39 显示 Product Web 微服务的 `aggregatingTimeout:\
  \ 6`，因此 Product Web 微服务的 `AggregatingReplyingKafkaTemplate` 将不会等待来自该 Product Server\
  \ 微服务实例的响应。\n\n由于你没有进行任何过滤、去重或类似的转换操作，你会看到来自两个 Product Server 微服务实例的响应中出现重复的行项目。\n\
  \n清单 6-48 显示了 Product Web 微服务上 `AggregatingReplyingKafkaTemplate` 的日志记录。\n\n```\n\
  list.size() : 1; timeout : false\nlist.size() : 2; timeout : false\nlist.size()\
  \ : 2; timeout : true\n清单 6-48\n聚合器超时\n```\n\n清单 6-48 展示了模板在超时时咨询释放策略所发生的情况。前两行对应在超时限制内从两个\
  \ Product Web 微服务实例接收到响应的情况。第三行对应模板使用 `set to true` 的超时参数执行此操作，以告知策略这是超时而非投递调用，因此它不会等待更多响应。\n\
  \n此聚合响应如图 6-6 所示。\n\n在实际应用中，你可能不会像清单 6-39 那样静态配置 `product.topic.reply.numProviders`。相反，你需要根据在超时之前期望的最小服务提供商数量，动态地形成\
  \ `numProviders` 的值。典型的生成环境设计如图 6-7 所示，其中旅行代理或旅行聚合器与多个航空、酒店、出租车及其他辅助服务提供商签订了合同。旅行搜索参数被转发给所有或首选的库存提供商，来自所有或许多这些首选提供商的响应被聚合。可以应用过滤、去重或任何转换，然后根据一组类似的规则对结果集进行重新排序，并将响应发送给\
