  `--add-host` 选项传递主机的 IP，这在清单 8-25 中完成。在这种情况下，`host` 是主机机器的名称，它将被添加到容器的 `/etc/hosts`
  文件中。在 Docker 容器内部，你可以使用名称 `host` 来连接到主机系统。你需要知道运行 PostgreSQL 的主机的 IP，你可以在清单 8-24
