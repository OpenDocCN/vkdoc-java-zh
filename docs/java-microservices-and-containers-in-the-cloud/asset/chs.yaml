  ## 状态管理


  当您详细查看 Pod 和部署时，您会知道 Kubernetes Pod 是为横向扩展（甚至是弹性扩展）而设计的。扩展架构存在一个缺点。


  ### 横向扩展与状态管理


  尽管拥有弹性扩展架构是可取的，但状态管理会带来问题。如果组件是真正无状态的，那么它们应该像“银行柜员”一样，您每次都不会由同一个柜员（人）服务。类似地，每个后续事务可以由任何其他相同组件的实例来服务。这意味着，除了您的客户端设备和持久化存储之外，每个其他中间组件都必须是无状态的。您无法避免客户端层的状态，否则您将无法进行任何个性化设置，这会损害用户体验。同样，对于非平凡的应用，必须管理某种状态，并且您通常会在某种数据库中执行此操作。


  ### 有状态集


  为了解决状态管理问题，*StatefulSet* 代表一组唯一的、持久的、具有稳定 Pod 名称的 Pod（见图 10-10）。在无状态的 DeploymentSet
  的情况下，每当您部署一个 Pod，每次部署或重启时，您都会得到一个不同的 Pod 名称——类似于 `product-server-6fb88b6849-6mrf5`
  或 `product-web-5dfc886d6d-zvm8p`。在这种情况下，Pod 名称会在重启时改变。而在下一次重启时，它可能是任何名称，比如 `product-web-5dfc886d6d-4qw45`
  或 `product-server-6fb88b6849-dwkcf`。如果您想要一个稳定的 Pod 名称，可以使用 StatefulSet。这样，即使部署重启，您也会得到相同的
  Pod 名称（例如 `mongo-cluster-0`）。


  ![](img/619782_1_En_10_Fig10_HTML.jpg)


  该图展示了用户如何与笔记本电脑交互，笔记本电脑向持久化服务发送请求。该服务由多个持久化 Pod 组成，这些 Pod 利用持久卷声明来访问底层节点上的持久卷。持久卷基于存储类进行配置。


  图 10-10


  Kubernetes 有状态集




  ### 持久卷声明


  *持久卷声明*（PVC）是 Pod 对存储需求的一种声明，该需求在 Pod 生命周期的某个时刻可能变为可用或得到满足。持久卷声明承诺，它将在某个时刻“转化”为某种平台特定的存储卷，供你的应用程序使用，并具有已定义的特性，例如类别、大小和访问模式（`ROX`：只读多路，`RWO`：读写单路，以及
  `RWX`：读写多路）。


  通过这种方式，你可以将特定存储实现的链接从你的 Pod/部署中抽象出来。在典型情况下，你的应用程序会指定类似“我需要默认类别和 Y 大小的持久存储”这样的需求。随后，在运行时当这个“承诺”被兑现时，你可以链接一个
  EBS 设备、一个 EFS 存储等，而你的核心清单文件在两种情况下都是相同的。


  ### 持久卷


  *持久卷*（PV）是 Kubernetes 集群中的一块存储，它由服务器/存储/集群管理员预置，或通过某些存储类动态预置。它是集群中的一种资源，就像节点一样。因此，持久卷是你从
  Kubernetes 那里获得的、你所请求的实际产品或选项。如果 Kubernetes 没有你所请求的内容，它会尝试为你即时创建。


  在本章第一个示例的说明部分，特别是在代码清单 10-11 到 10-14 中，你将看到所有这些状态管理概念如何通过运行示例得以体现。


  ## Kubernetes 集群


  如你所见，Kubernetes 集群是一组运行容器化应用程序的节点。Kubernetes 集群允许容器跨多台机器和环境运行——包括虚拟环境、物理环境、基于云的环境或本地环境。从头开始创建一个
  Kubernetes 集群并非易事。更复杂的是，有多种选项和工具可供选择。


  作为一条更简单的路径，有 Minikube，它是一个本地 Kubernetes 工具，专注于让学习和开发 Kubernetes 变得容易。不过，运行生产工作负载时，你确实需要其他更好的选项。


  ### Minikube


  如前所述，Minikube 是本地 Kubernetes。使用 Minikube 设置一个单节点的本地 Kubernetes 相当容易。此外，本地 Kubernetes
  还能在你将更改提交到团队环境之前，加速开发机器上的代码编写、测试、部署和调试循环周期。Minikube 还能让开发者在 Windows 和 Mac 环境中开发和测试容器化应用程序，而这两种操作系统是应用程序开发者偏爱的开发机器操作系统。


  附录 E 关于容器工具的部分提供了在 Mac 环境中安装和启动 Minikube 的详细说明。


  下一节将涉及一些代码。你将把第一个应用程序部署到基于 Minikube 的本地 Kubernetes 集群中。


