  清单 3-24\nSpring Boot 源代码组织\n```\n\n我添加了以下新的文件夹和文件，接下来将进行说明：\n\n```\nch03\\ch03-03\\\
  02-ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\graphql\nch03\\ch03-03\\\
  02-ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\service\nch03\\ch03-03\\\
  02-ProductWeb\\src\\main\\resources\\graphql\\schema.graphqls\n```\n\n\n\n### 理解代码\n\
  \n本节首先查看提供者微服务（即 Product Server 微服务）中的变更。\n\nProduct Server 微服务中 REST 控制器的实现，大部分与第\
  \ 1 章中代码清单 1-4 的代码类似（区别在于，这里不再使用内存数据库，而是通过 `ProductRepository` 和 `ProductCategoryRepository`\
  \ 端口与 MongoDB 仓库交互），因此此处不再重复完整代码。不过，我为 `ProductRestController` 引入了两个新方法，如代码清单 3-25\
  \ 所示。\n\n```\n@RestController\npublic class ProductRestController {\n@Autowired\n\
  private ProductRepository productRepository;\n@Autowired\nprivate ProductCategoryRepository\n\
  productCategoryRepository;\n@RequestMapping(value =\n\"/productsbycat/{productcategoryname}\"\
  ,\nmethod = RequestMethod.GET,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public ResponseEntity>\ngetProductsByCategory(\n@PathVariable(\"productcategoryname\"\
  ) String\nproductCategoryName) {\nList productORs =\nproductRepository.findByCategory(\n\
  productCategoryName);\nif(productORs.isEmpty()){\nreturn new ResponseEntity>(HttpStatus.NOT_FOUND);\n\
  }\nList list = new ArrayList ();\nfor(ProductOR productOR:productORs){\nlist.add(productMapper.entityToApi(productOR));\n\
  }\nreturn new ResponseEntity>(list, HttpStatus.OK);\n}\n@RequestMapping(value =\n\
  \"/category/{category}\", method = RequestMethod.GET,\nproduces = MediaType.APPLICATION_JSON_VALUE)\n\
  public ResponseEntity getCategory(\n@PathVariable(\"category\") String category)\
  \ {\nList productCategoryORs =\nproductCategoryRepository.findByName(category);\n\
  if(productCategoryORs.isEmpty()){\nreturn new ResponseEntity(\nHttpStatus.NOT_FOUND);\n\
  }\nProductCategoryOR firstProductCategoryOR =\nproductCategoryORs.iterator().next();\n\
  return new ResponseEntity(\nproductCategoryMapper.entityToApi(\nfirstProductCategoryOR),\
  \ HttpStatus.OK);\n}\n}\n代码清单 3-25\nProduct Server 中基于 REST 的 HTTP 端口，用于基于产品类别的查询\
  \ (ch03\\ch03-03\\01-ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\\
  controller\\ProductRestController.java)\n```\n\n这两个新方法使用各自的仓库来检索相应的实体，这些实体将被 GraphQL\
  \ 实现所使用，我稍后会进行解释。\n\n代码清单 3-26 查看的是消费者微服务——Product Web 微服务。它从支持 REST 的 HTTP 端口开始，使用了\
  \ Spring 的 `RestController`。\n\n```\n@CrossOrigin\n@RestController\npublic class\
  \ ProductRestController{\n@Autowired\nprivate ProductBusinessService productBusinessService;\n\
  @RequestMapping(value = \"/productsweb\",\nmethod = RequestMethod.GET,\nproduces\
  \ = {MediaType.APPLICATION_JSON_VALUE})\npublic ResponseEntity> getAllProducts()\
  \ {\nList productList =\nproductBusinessService.getAllProducts();\nreturn new ResponseEntity>(productList,\
  \ HttpStatus.OK);\n}\n}\n代码清单 3-26\nProduct Web 中基于 REST 的 HTTP 端口，用于 getAllProducts\
  \ (ch03\\ch03-03\\02-ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\controller\\\
  ProductRestController.java)\n```\n\nProduct Web 微服务中值得注意的一点是，它将所有调用都委托给了 `ProductBusinessService`。在这里，`ProductRestController`\
  \ 是一个应用服务类，而 `ProductBusinessService` 是一个业务服务类。为简洁起见，此处不再重复 `ProductRestController`\
  \ 中的其余方法。代码清单 3-27 检查了业务服务类。\n\n```\n@Service\npublic class ProductBusinessService{\n\
  @Value(\"${acme.PRODUCT_SERVICE_BY_CAT_URL}\")\nprivate String PRODUCT_SERVICE_BY_CAT_URL;\n\
  @Value(\"${acme.PRODUCT_CATEGORY_URL}\")\nprivate String PRODUCT_CATEGORY_URL;\n\
  @Autowired\nprivate RestTemplate restTemplate;\npublic List getProductsForCategory(String\
  \ name) {\nParameterizedTypeReference>\nresponseTypeRef = new ParameterizedTypeReference>()\
  \ {};\nResponseEntity> entity =\nrestTemplate.exchange(\nPRODUCT_SERVICE_BY_CAT_URL\
  \ + \"/\" + name,\nHttpMethod.GET, (HttpEntity) null,\nresponseTypeRef);\nList productList\
  \ = entity.getBody();\nreturn productList;\n}\npublic ProductCategory getProductCategory(\n\
  String productCategoryName) {\nString uri = PRODUCT_CATEGORY_URL + \"/\" +\nproductCategoryName;\n\
  ProductCategory productCategory =\nrestTemplate.getForObject(uri,\nProductCategory.class);\n\
  return productCategory;\n}\n}\n代码清单 3-27\n产品业务服务 (ch03\\ch03-03\\02-ProductWeb\\\
  src\\main\\java\\com\\acme\\ecom\\product\\service\\ ProductBusinessService.java)\n\
  ```\n\n`@Service` 用于注解服务层的类，这些类是 `@Component` 的特殊情况。你可以用 `@Service` 标记 Bean，以表明它们承载着业务逻辑。产品业务服务中的典型实现模式如代码清单\
  \ 3-27 所示。你可以看到，调用被定向到 Product Server 微服务中的相应方法。\n\n现在，你已经来到了 GraphQL 实现部分。GraphQL\
  \ 应该有一个描述 API 的模式。你需要将这些 `.graphqls` 或 `.gqls` 模式文件放在 `src/main/resources/graphql/**`\
  \ 位置下，这样 Spring Boot 就能自动拾取它们。参见代码清单 3-28。\n\n```\ntype Product {\nproductId: ID!\n\
  name: String!\ncode: String!\ntitle: String!\nprice: Float!\nproductCategory: ProductCategory!\n\
  }\ntype ProductCategory {\nid: ID!\nname: String!\ntitle: String!\ndescription:\
  \ String!\nimgUrl: String!\nproducts: [Product]!\n}\n"
- '# The Root Query for the application

  type Query {

  products(count: Int, offset: Int): [Product]!

  }

  '
- "# The Root Mutation for the application\ntype Mutation {\nwriteProduct(name: String!,\
  \ code: String!, title: String!, price: Float!, category: String!) : Product!\n\
  }\n代码清单 3-28\n产品 GraphQL 模式 (ch03\\ch03-03\\02-ProductWeb\\src\\main\\resources\\\
  graphql\\schema.graphqls)\n```\n\n这个模式由类型定义组成。每个类型都有一个或多个字段，每个字段接受零个或多个参数并返回一个特定类型。某些名称末尾的\
  \ `!` 表示它们是**非空类型**。该图展示了这些字段相互嵌套的方式。\n\n代码清单 3-28 中的 GraphQL 模式是针对 Product 定义的，描述了一个产品、一个产品类别，以及一个用于获取最近添加产品的根查询。必须恰好有一个根查询，并且最多有一个根变更。根查询需要在\
  \ Spring 上下文中定义特殊的 Bean 来处理该根查询中的各个字段。\n\n接下来，你需要解析根查询。如前所述，它需要有特殊注解的方法来处理各个字段。你可以通过使用\
  \ `@QueryMapping` 注解来注解处理程序方法，然后将它们放置在应用中的标准 `@Controller` 组件内来实现这一点。这会将注解过的类注册为\
  \ GraphQL 应用中的数据获取组件，如代码清单 3-29 所示。\n\n\n\n```\n@Controller\npublic class ProductGraphQLController\
  \ {\nprivate ProductDao productDao;\nprivate ProductCategoryDao productCategoryDao;\n\
  public ProductGraphQLController(ProductDao productDao,\nProductCategoryDao productCategoryDao)\
  \ {\nthis.productDao = productDao;\nthis.productCategoryDao = productCategoryDao;\n\
  }\n@QueryMapping\npublic List products(@Argument int count,\n@Argument int offset)\
  \ {\nreturn productDao.getProducts(count, offset);\n}\n}\n清单 3-29\n根查询解析器 (/ch03/ch03-03/02-ProductWeb/src/main/java/com/acme/ecom/product/controller/\
  \ ProductGraphQLController.java)\n```\n\n如你所见，我定义了 `products` 方法，用于处理之前定义的 schema\
  \ 中 `Products` 字段的任何 GraphQL 查询。该方法还应包含带有 `@Argument` 注解的参数，这些参数与 schema 中的相关参数对应。该方法必须为\
  \ GraphQL schema 中的类型返回正确的返回类型。你可以使用任何简单类型，如 `Int`、`String`、`List` 等，并对应 Java 中的等效类型，GraphQL\
  \ 运行时会自动映射它们。\n\nGraphQL 服务器中的任何复杂类型都由对应的 Java Bean 表示。同一个 Java 类将始终表示同一个 GraphQL\
  \ 类型。Java Bean 中任何未映射到 GraphQL schema 的字段或方法都会被静默忽略，不会引发任何问题。在本例中，`Product` 和 `ProductCategory`\
  \ 的加载都较为复杂。因此，`@SchemaMapping` 注解将处理方法映射到 schema 中同名的字段，并将其用作该字段的 `DataFetcher`，如清单\
  \ 3-30 所示。\n\n```\n@Controller\npublic class ProductGraphQLController {\n@SchemaMapping\n\
  public ProductCategory productCategory(Product product) {\nreturn productCategoryDao.getProductCategory(\n\
  product.getCategory());\n}\n@SchemaMapping\npublic List products(\nProductCategory\
  \ productCategory) {\nreturn productDao.getProductsForCategory(\nproductCategory.getName());\n\
  }\n}\n清单 3-30\n根查询解析器 (/ch03/ch03-03/02-ProductWeb/src/main/java/com/acme/ecom/product/controller/\
  \ ProductGraphQLController.java)\n```\n\n如果客户端没有显式请求某个字段，GraphQL 服务器就不会执行检索该字段的工作。在这种情况下，如果客户端检索产品时没有请求\
  \ `ProductCategory` 字段，那么 `productCategory()` 方法就不会被执行，`productCategoryDao` 的调用也不会发生。\n\
  \n清单 3-31 展示了 Data Fetcher 类。\n\n```\npublic class ProductDao {\n@Autowired\nprivate\
  \ ProductBusinessService productBusinessService;\npublic List getProducts(int count,\
  \ int offset) {\nList productList =\nproductBusinessService.getAllProducts();\n\
  return productList.stream().skip(offset).\nlimit(count).collect(Collectors.toList());\n\
  }\n}\n清单 3-31\n产品 Data Fetcher (/ch03/ch03-03/02-ProductWeb/src/main/java/com/acme/ecom/product/graphql/\
  \ ProductDAO.java)\n```\n\n这个 Data Fetcher 将调用委托给你已经见过的产品业务服务。稍后你会看到，无论客户端请求通过哪个端口到达服务器，这个产品业务服务的实例都会被池化或重用。\n\
  \n一旦定义了基于 GraphQL 的抽象端口，Spring Boot GraphQL Starter 提供了一种优雅的方式来启动 GraphQL 服务器，只需在\
  \ `pom.xml` 中定义相应的依赖即可，如清单 3-32 所示。\n\n```\n\norg.springframework.boot\nspring-boot-starter-graphql\n\
  \norg.springframework.boot\nspring-boot-starter-web\n\n清单 3-32\n产品 Web 微服务 Maven\
