- '# 7. 初识 Docker


  资源和时间的共享并非新鲜事物，普遍认为其起源于 20 世纪 60 年代末至 70 年代初的 IBM 大型机时代。虚拟化技术使得组织和个人无需拥有计算机资源即可使用它。单个服务器的容量如此之大，以至于绝大多数通用型工作负载几乎无法有效利用它，因此让大量应用程序和用户共享使用是合理的。其目标是提高用户及其共享的昂贵计算机资源的效率，这为虚拟化铺平了道路。


  容器是操作系统虚拟化的一种形式。容器没有或只有精简的操作系统镜像，但会大量利用宿主操作系统。一系列特性使得容器颇具吸引力，尤其是在部署基于微服务的应用程序时，本章将对此进行探讨。


  本章涵盖以下主题：


  *   虚拟化概述

  *   容器简介

  *   Docker 详解

  *   无需本地 Java 环境即可编译、打包和运行 Java 应用

  *   运行你的第一个 Java 容器


  ## 不同类型的虚拟化


  本讨论从传统的应用部署模式开始，然后过渡到各种虚拟化方式，以便你能够体会到容器相较于其他虚拟化方法所提供的一些优势。


  ![](img/619782_1_En_7_Fig1_HTML.jpg)


  三张框图比较了三种类型的虚拟化。传统虚拟化只有一个应用程序，而虚拟机拥有客户操作系统和虚拟机，容器则拥有极简的客户操作系统和一个容器框。每种方式都包含硬件和应用程序。


  图 7-1


  传统方式 vs. 虚拟机 vs. 容器


  参考图 7-1，首先考虑不同的虚拟化和应用部署模式。


  ### 传统部署


  在传统或经典的应用部署模式中，组织使用物理服务器。每当业务需要新应用时，IT 部门就会购买一台新服务器。由于很多时候没人知道新应用的性能需求，并且为了给未来业务量的增长留出足够的空间，IT
  部门往往会过度采购。他们通过猜测来决定要购买的服务器型号和规格。


  配置应用软件的典型生命周期流程如下：


  1.  在数据中心准备好物理服务器。

  2.  安装或使用现有的操作系统。

  3.  安装应用软件所需的任何额外工具。

  4.  安装软件所需的任何依赖项。

  5.  运行你的软件。

  6.  停用你的应用。

  7.  重新利用或回收服务器硬件。


  更好地利用资本支出的方式是使用虚拟化，接下来将对此进行讨论。


  ### 虚拟化


  当 VMware 公司引入虚拟机（VM）概念时，IT 部门不再需要每次需要新应用时就采购一台新的、性能过剩的服务器。相反，IT 部门可以在现有闲置且有富余容量的服务器上运行新应用。虚拟化允许
  IT 部门在单个物理服务器上运行多个虚拟机。每个虚拟机都包含一个完整的操作系统副本、应用程序、必要的二进制文件和库。


  虚拟化堆栈中的核心组件是*虚拟机监控器*，也称为虚拟机监视器（VMM）。它在宿主机上创建一个虚拟平台，在此平台之上可以执行和监控多个客户操作系统。这些多个操作系统可以是同一操作系统的不同实例，也可以是不同的操作系统。它们共享由同一台宿主机提供的硬件资源。虚拟机监控器有以下分类：


  *   **类型 1，原生型或裸机型：** 原生型虚拟机监控器直接运行在宿主机硬件上，以控制硬件并监控客户操作系统。因此，客户操作系统运行在虚拟机监控器之上的一个独立层级。例如：Oracle
  VM、Microsoft Hyper-V、VMWare ESX 和 Xen。

  *   **类型 2，托管型：** 托管型虚拟机监控器运行在传统操作系统内。托管型虚拟机监控器在宿主操作系统之上增加了一个独立的软件层，而客户操作系统则成为硬件之上的第三个软件层级。例如：Oracle
  VM VirtualBox、VMWare Server 和 Workstation、Microsoft Virtual PC、KVM、QEMU 和 Parallels。


  每个虚拟机都需要自己专用的操作系统（OS）这一事实是一个主要缺陷。每个操作系统都会消耗 CPU、RAM 和其他资源。每个操作系统都需要许可、打补丁和监控。还有其他挑战，这里列举几个：


  *   操作系统镜像很庞大——以 GB 计。

  *   启动过程缓慢。

  *   应用程序不可移植。

  *   启动一个虚拟机可能需要 1-2 分钟。


  Docker 容器于 2013 年推出，旨在解决这些缺点。


  ### 容器


  容器使用操作系统级虚拟化。它们不需要自己完整的操作系统。相反，单个宿主机上的所有容器共享宿主机的操作系统。这释放了大量的系统资源，包括 CPU、RAM 和存储。它还降低了潜在的许可成本，并减少了操作系统打补丁和其他维护的开销。在操作系统层进行的容器抽象将代码和依赖项打包在一起。


  容器启动速度快且具有超强可移植性。容器非常轻量，可以在几秒或几毫秒内启动。容器工作负载可以快速轻松地从笔记本电脑迁移到云端，然后再迁移到数据中心的虚拟机或裸机服务器上。


  ## 容器详解


  理解容器对于理解本章的其余内容至关重要，因此本节专门介绍容器。




  ### 容器发展简史


  让我们简要回顾一下容器的发展史。大约在 2000 年，FreeBSD 系统中加入了 Jails，这是容器技术的早期实现。次年，Linux VServer 项目实现了在单台服务器上运行多个通用
  Linux 服务器的功能。它将用户空间环境划分为不同的单元——称为虚拟专用服务器——使得每个 VPS 对其内部运行的进程而言，看起来和感觉上都像一台真正的服务器。2006
  年，“通用进程容器”被提出。该技术后来更名为 Cgroups（控制组），它允许将进程分组，并确保每个组获得相应的内存、CPU 和磁盘 I/O 资源份额，同时防止任何一个容器独占这些资源。与此相辅相成的是内核命名空间的概念，它将进程与用户命名空间分离开来。用户命名空间允许进程拥有自己独立的用户集，并允许进程在容器内部拥有
  root 权限，但在容器外部则没有。2008 年，IBM 创建了 Linux 容器项目（LXC）。LXC 1.0 于 2014 年发布。SELinux 和 Seccomp
  是两个新特性：


  *   **Seccomp：** Seccomp 是一个 Linux 内核特性，用于限制任务可以使用的系统调用。这使得可以将利用率不高的 CPU 租借给不受信任的客户，而无需担心他们会滥用其他资源，这非常适合容器的使用场景。


  *   **SELinux：** SELinux 提供了一种访问控制方案，用于“标记进程、文件和设备，并定义被标记的进程如何与被标记的进程、文件和设备交互的规则”。Linux
  容器作为一组进程，非常适合使用 SELinux 进行加固，这是另一个映射到容器使用场景的理念。


  Docker 逐步构建在这些特性之上，并封装了 LXC 的用户空间工具，使开发者使用起来更加便捷。2015 年 6 月，Docker 公司在 Linux 基金会的支持下，将
  Docker 开源给了 OCI（开放容器倡议）。Docker 最初使用 LXC 驱动，后来转向了 `libcontainer`，后者现已更名为 `runc`。


  ### 容器内部原理


  命名空间是一个内核级别的特性。操作系统的这一功能允许在进程之间共享全局资源，如网络和磁盘。当全局资源被封装在命名空间中时，它们仅对运行在同一命名空间内的进程可见。例如，当你获取一部分磁盘并将其放入一个命名空间时，运行在另一个命名空间中的进程无法看到或访问它。类似地，一个命名空间中的进程无法访问分配给另一个命名空间的任何内存内容，以此类推。当然，命名空间
  A 中的进程无法看到或与命名空间 B 中的进程通信。通过这种方式，全局资源可以被虚拟化和隔离。Docker 正是以这种方式工作的——每个 Docker 容器都在自己的命名空间中运行，但与其他所有容器共享同一个内核。这种隔离之所以能实现，是因为内核知道分配给该进程的命名空间。在进行
  API 调用时，内核会确保该进程只能访问其自身命名空间内的资源。


  ### 虚拟化 vs. 容器化


  在了解了不同层次的虚拟化选项之后，本节将探讨其底层细节。参见图 7-2。


  ![](img/619782_1_En_7_Fig2_HTML.jpg)


  两张框图对比了虚拟机和容器。虚拟机拥有客户操作系统。容器拥有一个极简的客户操作系统。两者都包含二进制文件、库和应用程序。虚拟机运行在虚拟机监控器上，而容器运行在引擎上。


  图 7-2


  虚拟机 vs. 容器


  图 7-2 对比了虚拟化与容器化之间的异同。这里的讨论限于类型 2 虚拟化，它与容器化相比差异更明显，尽管几乎所有方面也适用于类型 1 虚拟化。


  在虚拟化的情况下，虚拟机管理器接管了 CPU 的 ring 0（在较新的 CPU 中也称为“根模式”），并拦截客户操作系统发出的所有特权调用，以营造出客户操作系统拥有自己硬件的假象。因此，虚拟化允许你在同一（单）个底层硬件上运行两个完全不同的操作系统。每个客户操作系统都要经历引导、内核加载等过程。客户操作系统无法完全访问主机操作系统或其他客户操作系统，因此不会造成混乱。这提供了更严格的安全性。


  现在你可能能够理解，虽然你可以在虚拟化硬件上运行多个操作系统，但你不能像在虚拟化中那样在容器中运行完全不同的操作系统。然而，你可以运行不同的 Linux 发行版，因为它们都共享同一个内核。这意味着，由于容器与主机共享同一个内核，你可以在
  Ubuntu 主机上运行 Arch 镜像。


  系统调用（通常缩写为 *syscall*）是程序向其执行所在的操作系统内核请求服务的编程方式。这可能包括与硬件相关的服务（例如，访问硬盘驱动器或访问设备的 I/O
  端口）、创建和执行新进程，以及与进程调度等内核核心服务进行通信。系统调用提供了进程与操作系统之间的基本接口。容器可以访问主机的内核。由于内核是与硬件通信的唯一部分，只要你的操作系统使用正确的系统调用，你就可以在容器内运行任何
  Linux 发行版。出于同样的原因，你不能在容器内运行 Windows，因为它不使用相同的系统调用。


  ## Docker 概念


  本节讨论 Docker 概念和 Docker 容器。


  ### 分层文件系统


  Docker 基于 *aufs*（*advanced multi-layered unification filesystem* 的缩写），它实现了 Unionfs，一种用于
  Linux 文件系统的联合挂载。Unionfs 是一种用于 Linux、FreeBSD 和 NetBSD 的文件系统服务，它为其他文件系统实现了联合挂载。它允许将来自不同文件系统（称为
  *分支*）的文件和目录透明地叠加在一起，形成一个单一、连贯的文件系统。一些 Linux 发行版已选择 aufs 作为 UnionFS 的替代品。


  *联合挂载* 是一种允许同时挂载多个文件系统并使它们看起来像一个文件系统的挂载方式。联合挂载将文件系统层层叠加，使得最终的文件系统可能包含来自任何一个或所有底层文件系统的文件和子目录。用
  Docker 的术语来说，这些文件系统中的每一个都被称为一个 *镜像*。




  ### Docker 镜像


  Docker 镜像由相互叠加的文件系统组成，如图 7-3 所示。


  ![](img/619782_1_En_7_Fig3_HTML.jpg)


  一个三层长方体的 3D 模型。底层标记为内核。中间层标记为 cgroups、命名空间和设备映射器。顶层标记为 bootfs。


  图 7-3


  Docker bootfs


  镜像的底层是一个引导文件系统 bootfs，它类似于典型的 Linux/UNIX 引导文件系统。当容器启动时，它会被移入内存，并且引导文件系统会被卸载，以释放
  initrd 磁盘镜像占用的 RAM。到目前为止，这类似于典型的 Linux 虚拟化堆栈。Docker 用户可能永远不会与引导文件系统交互。


  在引导文件系统之上，Docker 叠加了一个根文件系统 rootfs。这个 rootfs 可以是一个或多个操作系统（例如，Debian 或 Ubuntu）。参见图
  7-4。


  ![](img/619782_1_En_7_Fig4_HTML.jpg)


  Docker 镜像层的两个示意图。镜像 1 包含一个带有内核、Emacs 和 Apache 的 Debian 操作系统。镜像 2 包含一个带有内核的 BusyBox
  操作系统。


  图 7-4


  Docker 镜像


  在传统的 Linux 启动中，根文件系统以只读方式挂载，然后在启动完成并执行完整性检查后切换为读写模式。在 Docker 世界中，根文件系统保持只读模式，并且
  Docker 利用联合挂载在根文件系统之上添加更多的只读文件系统。


  Docker 将操作系统的公共部分组织为只读。任何公共部分都在你的所有容器之间共享。参见图 7-5。


  ![](img/619782_1_En_7_Fig5_HTML.jpg)


  两个长方体相互堆叠的 3D 示意图。顶部标记为镜像 1，底部标记为镜像 2。顶部被分为四层，标记为内核、Debian、emacs 和 Apache。底部被分为两层，标记为
  BusyBox 和内核。


  图 7-5


  Docker 镜像共享层


  共享这些公共部分提供了存储和运行时效率。为了说明清楚，如果你有一个 1GB 的容器镜像并使用传统的虚拟机方法，你将需要 1GB 乘以你想要的虚拟机数量。由于 Docker
  在所有容器之间共享这 1GB 的大部分内容，如果你有 1000 个容器，你可能仍然只需要略多于 1GB 的空间来容纳所有这些容器（假设它们都运行相同的操作系统镜像）。


  Docker 镜像是相互叠加的。顶部的镜像是父镜像；你可以从一个层遍历到其父层，依此类推，直到到达镜像堆栈的底部，底部的镜像称为基础镜像。参见图 7-6。


  ![](img/619782_1_En_7_Fig6_HTML.jpg)


  一个容器 X 的流程示意图，包含一个写入层和四个层。这些层通过数据和元数据连接到写入层。每个层都有一个层 ID、元数据、数据和父数据。


  图 7-6


  Docker 镜像的结构剖析


  ### Docker 镜像与容器


  Docker 镜像是用于构建容器的只读模板。容器是从这些模板创建的已部署实例。镜像和容器密切相关，并且对于驱动 Docker 软件平台至关重要。


  当从镜像启动一个容器时，Docker 会在顶部挂载一个读写文件系统。在这个读写层中，你希望 Docker 容器运行的任何进程都将在此执行。图 7-6 到 7-8
  展示了这个过程。


  ![](img/619782_1_En_7_Fig7_HTML.jpg)


  两个长方体相互堆叠的 3D 示意图。顶部标记为容器 1，底部标记为容器 2。顶部被分为四层，标记为内核、Debian、emacs 和 Apache。底部被分为两层，标记为
  BusyBox 和内核。


  图 7-7


  Docker 容器共享镜像层


  即使容器共享相同的镜像（层），一旦它们从其镜像模板实例化，它们就是分离且隔离的，如图 7-8 所示。


  ![](img/619782_1_En_7_Fig8_HTML.jpg)


  Docker 容器的两个 3D 示意图。容器 1 有 3 层，底层是内核，中间层是 Apache、emacs、Debian 和内核，顶层是一个可写层。容器 2
  有 2 层，底层是内核，顶层是可写层。


  图 7-8


  Docker 容器隔离


  当容器启动时，初始的读写层是空的。随着变化的发生，这些变化会被应用到该读写层，如图 7-9 所示。


  ![](img/619782_1_En_7_Fig9_HTML.jpg)


  一个具有多个层的容器的 3D 示意图。顶层标记为可写层。其下方是标记为 Apache、emacs 和 Debian 的层。在这些层下方是标记为 cgroups、命名空间、设备映射器、内核和
  bootfs 的层。


  图 7-9


  Docker 容器写入层


  为了说明清楚，如果你想更改一个文件，该文件将从下方的只读层复制到读写层。该文件的只读版本仍然存在，但会被其上方的覆盖层隐藏在该副本之下。参见图 7-10。


  ![](img/619782_1_En_7_Fig10_HTML.jpg)


  一个容器的阵列示意图。这些层相互堆叠。从底部开始，基础层、层 1、层 2、层 3 和写入层（即层 4）。每个层包含文件 A、B、C、D 和 E。一个带箭头的虚线将基础层中的文件
  D 连接到层 3 中的文件 D。


  图 7-10


  Docker 容器写入的过程


  每个容器都可以将其自身的更改应用到其容器读写层，因为它们是隔离的。参见图 7-11。


  ![](img/619782_1_En_7_Fig11_HTML.jpg)


  一个流程示意图，定义了 Docker 容器写时复制的过程。容器 1、2 和 3 都有一个读写层。这些容器相互堆叠，基础层位于底部。基础层是只读的，每个容器可以将其更改应用到其容器读写层。


  图 7-11


  Docker 容器写时复制的过程


  这种模式传统上称为“写时复制”，是使 Docker 如此强大的特性之一。每个只读镜像层都是只读的——这些镜像永远不会改变。当创建一个容器时，Docker 从镜像堆栈构建，并在顶部添加读写层。图
  7-11 展示了向容器添加数据的过程。一旦你做出更改并使用 Docker 提交它们，Docker 就会创建一个新的镜像。该镜像仅包含与基础镜像的差异。当你想要运行这个新镜像时，你可以对该容器进行更改，如图
  7-12 所示。


  ![](img/619782_1_En_7_Fig12_HTML.jpg)


  一个容器 Y 的流程示意图，各层相互堆叠。从底部开始，基础层、层 1、层 2、层 3 和层 4，以及写入层（即层 5）。每个层都有层 ID、元数据、数据和父层。从基础层到层
  3 创建镜像 X，从基础层到层 4 创建镜像 Y。


  图 7-12


  Docker 容器提交的过程




  ### Docker 注册表


  Docker 注册表是一个用于存储 Docker 镜像的仓库（见图 7-13）。它可以是私有的或公共的，也可以是本地的或远程的。Docker 注册表有助于在不同开发环境和运行时之间轻松共享
  Docker 镜像。构建好镜像后，你可以在构建它的计算机上直接运行，也可以将镜像推送（上传）到注册表，随后再拉取（下载）到同一台计算机或其他计算机上运行。


  ![](img/619782_1_En_7_Fig13_HTML.jpg)


  Docker 镜像从开发者网络到生产环境的流程图。开发者网络从互联网云中的 Docker 公共注册表和 Docker 私有注册表拉取和推送镜像。开发机、预发布环境和生产环境均从
  Docker 私有注册表拉取镜像。


  图 7-13


  Docker 注册表


  Docker Hub 是公共注册表的一个例子。私有注册表可以通过多种方式搭建，例如在 JFrog Bintray 上搭建私有 Docker 注册表。此外还有远程仓库，它们充当远程站点（如
  Docker Hub 或 JFrog Bintray）管理的 Docker 注册表的缓存代理。镜像根据控制缓存和代理行为的各种配置参数，在远程 Docker 注册表中进行存储和更新。


  像 JFrog Artifactory 这样的开发环境工具可以充当开发者机器与远程 Docker 注册表之间的中介。由于它们完全实现了 Docker 注册表 API
  规范，因此可以代理任何公共或私有 Docker 注册表，例如 Docker Hub、JFrog Bintray 或其他私有 Docker 注册表。当开发者机器首次请求某个镜像时，该镜像会被下载，同时
  Artifactory 会将其存储在本地缓存中。当收到后续对该镜像的请求时，Artifactory 会执行智能校验和搜索，如果该镜像已被下载并存在于本地缓存中，则会提供本地缓存的副本。通过这种方式，每个镜像仅被下载一次，并且组织内的所有其他开发者都可以在本地使用。这不仅减少了网络流量，还能有效屏蔽网络及其他远程
  Docker 注册表可能带来的问题，从而为你提供对（远程）Docker 镜像的一致、可靠且持续的访问。


