  \nAmazon Elastic Kubernetes Service (Amazon EKS) 跨可用区运行 Kubernetes 管理基础设施。在任何标准\
  \ Kubernetes 环境中运行的应用程序都完全兼容，并且可以迁移到 Amazon EKS，因此本章将演示如何在 Minikube 中部署的微服务部署到 AWS\
  \ 的 EKS 中。\n\nAmazon EKS 集群由两个主要组件组成——EKS 控制平面和 EKS 工作节点。\n\n### EKS 控制平面\n\nEKS\
  \ 控制平面由运行 Kubernetes 软件（例如 etcd 和 Kubernetes API 服务器）的节点组成。（有关这些组件的概述，请参阅第 10 章。）控制平面在由\
  \ AWS 管理的账户中运行，Kubernetes API 通过与你集群关联的 Amazon EKS 端点暴露。每个 Amazon EKS 集群控制平面在其自己的一组\
