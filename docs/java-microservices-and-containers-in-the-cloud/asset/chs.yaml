  \ 工作节点是 Kubernetes 集群的一部分，用户的工作负载在此处处理。Amazon EKS 工作节点在你的 AWS 账户中创建，它们会与在 AWS 托管账户中运行的集群控制平面实例建立连接。Amazon\
  \ EKS 工作节点会在控制平面中注册。\n\n在撰写本文时，引入了一个名为 Amazon EKS Blueprints 的相关解决方案。不过，Amazon EKS\
  \ 仍然可以正常工作。\n\n\n\n## 使用 Terraform 搭建 AWS EKS\n\n本节将演示一个基于 AWS EKS 的微服务部署的实际案例。本章建立在你从第\
