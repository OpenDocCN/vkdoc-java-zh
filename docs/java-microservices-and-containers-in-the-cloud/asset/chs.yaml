  Product Web 微服务中有一些变化，我将对此进行讨论。清单 2-24 展示了 `Product` 实体的 HATEOAS 变体。\n\n```\npublic\
  \ class Product extends RepresentationModel {\nprivate String productId;\nprivate\
  \ String name;\nprivate String code;;\nprivate String title;\nprivate Double price;\n\
  }\n清单 2-24\nProduct 实体的 HATEOAS 变体 (ch02\\ch02-03\\02-ProductWeb\\src\\main\\java\\\
  com\\acme\\ecom\\product\\hateoas\\model\\Product.java)\n```\n\n`Product` 类继承自 `RepresentationModel`\
  \ 类，以继承 `add()` 方法。一旦你创建了一个链接，就可以轻松地将该值设置到资源表示中，而无需向其添加任何新字段。\n\n接下来，让我们看看控制器类的方法。清单\
  \ 2-25 中的代码展示了如何基于 `ProductRestController` 的 `getProduct()` 方法构建 HATEOAS 超链接。\n\n\
  ```\npublic class ProductRestController{\nprivate static final Logger LOGGER = LoggerFactory.getLogger(ProductRestController.class);\n\
  @Value(\"${acme.PRODUCT_SERVICE_URL}\")\nprivate String PRODUCT_SERVICE_URL;\n@Autowired\n\
  public RestTemplate restTemplate;\n@Autowired\nprivate ModelMapper modelMapper;\n\
  @RequestMapping(value = \"/productsweb/{productId}\",\nmethod = RequestMethod.GET,\n\
  produces = MediaType.APPLICATION_JSON_VALUE)\npublic ResponseEntity\ngetProduct(@PathVariable(\"\
  productId\")\nString productId) {\nString uri = PRODUCT_SERVICE_URL + \"/\" + productId;\n\
  com.acme.ecom.product.model.Product productRetreived =\nrestTemplate.getForObject(uri,\n\
  com.acme.ecom.product.model.Product.class);\ncom.acme.ecom.product.hateoas.model.Product\n\
  productHateoas = convertEntityToHateoasEntity(\nproductRetreived);\nproductHateoas.add(linkTo(methodOn(\n\
  ProductRestController.class).getProduct(\nproductHateoas.getProductId())).withSelfRel());\n\
  return new ResponseEntity(\nproductHateoas, HttpStatus.OK);\n}\nprivate com.acme.ecom.product.hateoas.model.Product\n\
  convertEntityToHateoasEntity(\ncom.acme.ecom.product.model.Product product){\nreturn\
  \  modelMapper.map(\nproduct,\ncom.acme.ecom.product.hateoas.\nmodel.Product.class);\n\
  }\n}\n清单 2-25\nHATEOAS REST 控制器 (ch02\\ch02-03\\02-ProductWeb\\src\\main\\java\\\
  com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n```\n\n`WebMvcLinkBuilder`\
  \ 为 Spring MVC 控制器提供了出色的支持。`methodOn()` 方法通过对代理控制器上的目标方法进行虚拟调用来获取方法映射，并将 `productId`\
  \ 设置为 URI 的路径变量。\n\n`WebMvcLinkBuilder` 还通过避免硬编码链接来简化 URI 的构建。清单 2-25 中的代码展示了如何使用\
  \ `WebMvcLinkBuilder` 类构建产品的自链接。\n\n你使用 `ModelMapper` 将 HATEOAS 的 `Product` 实例隐式映射到非\
  \ HATEOAS 的 `Product` API 实例。当调用 map 方法时，会分析源类型和目标类型，以确定哪些属性隐式匹配。然后根据这些匹配项映射数据。即使源对象和目标对象及其属性不同，如果存在配置的匹配策略，`ModelMapper`\
  \ 也能尽力确定属性之间的合理匹配。\n\n同样，为简洁起见，我不再列出 `ProductRestController` 的其余方法。你可以在代码仓库中查阅它们。\n\
