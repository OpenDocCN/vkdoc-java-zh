  ## 使用 Helm 打包多微服务


  在前面的章节中，您学习了 Helm 如何实现在 Kubernetes 中打包和部署微服务。然而，那个示例还不够复杂，不足以让您体会到 Helm 的真正优势。本节将向您展示如何使用
  Helm 来打包和部署您的多微服务项目。




  ### 设计基于 Helm 的部署拓扑


  本示例遵循第 11 章中图 11-3 的部署拓扑。Product Web 和 Product Server 微服务均已容器化，Product Server 微服务将连接到一个同样部署在容器内的
  PostgreSQL 数据库。所有这些容器现在都将运行在 Kubernetes 内部。Ingress 是用于路由的附加组件，而 Adminer UI 组件则用于管理
  PostgreSQL 数据库。请参见图 12-3。


