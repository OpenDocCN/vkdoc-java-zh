  \ Kubernetes 中通过多个业务、应用和基础设施服务完成典型的部署。本节将向你展示如何调整第 10 章第二个示例中的同一组微服务，在前端接入一个 Ingress\
  \ 来路由外部请求。一个消费者微服务和一个提供者微服务相互通信。提供者微服务将实体存储在 PostgreSQL 数据库中。来自浏览器的请求由 Ingress 拦截。如第\
  \ 10 章所述，Ingress 可以通过单个 IP 地址暴露多个服务。\n\n尽管这个示例包含在本章中，并且标题为“面向消息的微服务”作为最后一个示例，但我有意去掉了微服务之间的消息桥接。这是为了让示例更轻量，以便我可以引入一些其他新组件，并将示例的整体复杂性控制在合理范围内。\n\
  \n### 设计 Ingress 路由拓扑\n\nProduct Web 和 Product Server 微服务均已容器化，Product Server 微服务将连接到部署在容器内的\
  \ PostgreSQL 数据库。所有这些容器都将驻留在 Kubernetes 中。Ingress 成为路由的附加组件，而 Adminer UI 组件则用于管理\
  \ PostgreSQL 数据库。参见图 11-3。\n\n![](img/619782_1_En_11_Fig3_HTML.jpg)\n\n一个 3D 模型图，展示了连接到浏览器的用户、Ingress\
  \ 基础设施服务、Product Web 微服务、Product Server 微服务、带功能的容器引擎、主机操作系统和硬件。Product Web 包含一个业务服务，Product\
  \ Server 包含一个业务服务和两个应用服务。\n\n图 11-3\n\n微服务的 Ingress 路由拓扑\n\n### 环境配置\n\n要使 URL（[`http://products.acme.test`](http://products.acme.test)\
  \ 和 [`http://adminer.acme.test`](http://adminer.acme.test)）生效，你需要编辑主机上的 hosts 文件。\n\
  \n每个连接到互联网的网站都有一个唯一的数字地址，用于告知所有其他设备其位置——即其 TCP/IP 地址。域名系统（DNS）将这些数字地址转换为人类更容易识别和记忆的形式，例如\
  \ [`www.acme.com`](http://www.acme.com)。当你第一次输入像 [`www.acme.com`](http://www.acme.com)\
  \ 这样的网址时，你的机器会向一个 DNS 服务器发送请求——通常是由你的 ISP（互联网服务提供商）自动配置的。这将解析你要连接的服务器对应的 TCP/IP\
  \ 地址。你的浏览器会建立一个隐藏的缓存文件，以便在你再次访问该网站时记住这些细节。\n\n如前所述，本示例将名称添加到 hosts 文件中，如代码清单 11-31\
  \ 所示。\n\n```\n(base) binildass-MacBook-Pro:ch11-03 binil$ minikube ip\n192.168.64.5\n\
  (base) binildass-MacBook-Pro:~ binil$ sudo nano /etc/hosts\n192.168.64.5  adminer.acme.com\n\
  192.168.64.5  products.acme.com\n(base) binildass-MacBook-Pro:~ binil$ ^O (保存)\n\
  (base) binildass-MacBook-Pro:~ binil$ ^X (退出)\n(base) binildass-MacBook-Pro:~ sudo\
  \ killall -HUP mDNSResponder\n代码清单 11-31\n将主机名添加到 etc Hosts 文件\n```\n\n代码清单 11-31\
  \ 展示了如何添加两行新内容，将两个新主机名添加到我的机器上。这会将你的本地主机（Minikube）IP 地址映射到这两个主机名，并使它们可访问。\n\n图 11-4\
  \ 展示了我是如何编辑这个文件的。\n\n![](img/619782_1_En_11_Fig4_HTML.jpg)\n\n一个裁剪后的截图，显示 binil\
  \ sudo 80 x 5 窗口。其中包含两条命令，内容为 base（括号内）binil d a s s-MacBook-Pro 冒号波浪线 binil 美元符号\
  \ sudo nano 斜杠 e t c 斜杠 hosts 和密码。\n\n图 11-4\n\n编辑 hosts 文件\n\n图 11-5 展示了我是如何在我的机器上添加这两个主机名的。\n\
