  \n## 使用 MongoDB 和 CrudRepository 的微服务\n\n本示例对你在第 2 章中看到的第一个微服务示例进行了调整，使其连接到 MongoDB，并使用\
  \ `CrudRepository` 代替 `MongoRepository`。你拥有相同的两个微服务——一个消费者微服务和一个提供者微服务——它们通过 REST\
  \ 协议相互通信。提供者微服务还与 MongoDB 进行交互。整体设计请参考第 2 章中的图 2-1。\n\n### 重温六边形架构\n\n我复用了第 2 章图\
  \ 2-1 中所示的六边形微服务视图。但是，你将使用 `CrudRepository` 而不是 `MongoRepository`。我想演示一个通用端口（本例中为带有\
  \ `CrudRepository` 的被驱动端口）如何能够“使用合适的适配器进行适配”，以连接到不同类型的数据库——更具体地说，在本示例中连接到 MongoDB\
  \ 数据库。\n\n此外，我在上一个示例中引入了 `ProductOR` 实体。这样做的原因是我想演示，在使用端口和适配器架构时，你可以最大限度地重用核心实体和业务服务。换句话说，我想演示你将保留并重用上一个示例中的\
  \ `Product` 实体，这将验证在运行时插入不同被驱动适配器的能力。\n\n\n\n### 理解代码\n\n本书的源代码可通过图书产品页面上的 GitHub\
  \ 获取，地址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码位于\
  \ `ch03\\ch03-02` 文件夹中。您将首先查看提供者微服务，即 Product Server 微服务。清单 3-16 从用于与 PostgreSQL\
  \ 交互的修改后的 Repository 开始。\n\n```\n@RepositoryRestResource(collectionResourceRel =\
  \ \"productdata\", path = \"productdata\")\npublic interface ProductRepository extends\n\
  CrudRepository {\npublic List findByCode(@Param(\"code\")\nString  code);\npublic\
  \ List findByCategory(@Param(\"category\")\nString  category);\n}\n清单 3-16\nProduct\
  \ Server 微服务与 MongoDB 交互的抽象端口 (ch03\\ch03-02\\01-ProductServer\\src\\main\\java\\\
  com\\acme\\ecom\\product\\repository\\ProductRepository.java)\n```\n\n本示例保留了 `CrudRepository`，用于对特定类型的仓库执行通用的\
  \ CRUD 操作。该端口的特定适配器（即 MongoDB 数据库的适配器）由 Spring 根据 `pom.xml` 中的配置提供；请参见清单 3-17。\n\
  \n```\n\norg.springframework.boot\nspring-boot-starter-data-mongodb\n\njavax.persistence\n\
  javax.persistence-api\n2.2\n\n清单 3-17\nProduct Server 微服务 Maven 文件 (ch03\\ch03-02\\\
  01-ProductServer\\pom.xml)\n```\n\n我还将持久化依赖项改为了仅保留其 API。\n\nProduct Server 微服务中\
  \ REST 控制器的其余实现与第 1 章中清单 1-4 的代码非常相似（唯一的区别是，这里使用 `ProductRepository` 端口与 MongoDB\
  \ 仓库交互，而不是使用内存数据库），因此此处不再重复完整代码。\n\n`Product` 实体类与之前的示例类似，如清单 3-6 所示。我保留了该类作为 API\
  \ 实体，因此有其对应的 `ProductOR` 来管理数据库交互。`ProductOR` 的代码与之前示例中清单 3-7 所示的代码非常相似，但存在细微差别，这些差别已被注释掉，并在清单\
