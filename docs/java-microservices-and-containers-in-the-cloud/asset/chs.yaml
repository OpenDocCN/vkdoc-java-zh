  \ HATEOAS 能力。\n\n*   产品服务器微服务将得到增强，以演示 HAL。\n\n你将利用 Spring HATEOAS 项目来创建超媒体驱动的 REST\
  \ Web 服务。其目的是轻松创建遵循 HATEOAS 原则的 REST 表示，以便 API 能够通过返回关于下一步潜在步骤的相关信息，以及每个响应，来引导客户端遍历应用。\n\
