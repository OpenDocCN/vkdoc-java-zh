  \n图 5-15\n\n微服务消费者与分区分配\n\n当微服务启动并运行后，您也可以通过浏览器访问 Web 应用程序，指向以下 URL：\n\n`http://localhost:8080/product.html`\n\
  \n`http://localhost:8081/product.html`\n\n`http://localhost:8082/product.html`\n\
  \n您可能需要在浏览器控制台稍等片刻，因为由于微服务中配置的睡眠延迟，浏览器最终才会渲染数据。\n\n## 总结\n\n使用面向消息的微服务的事件驱动架构的一个主要好处是，将事件生产者微服务与事件消费者微服务解耦，从而允许系统更加灵活和可演进。依赖同步的请求-回复语义则恰恰相反，生产者和消费者微服务紧密耦合。这仅应在必要时使用。如果需要同步的请求-回复，基于\
  \ HTTP 的协议比使用像 Apache Kafka 这样的异步通道更简单、更直接、更高效。话虽如此，在某些场景下，使用同步风格的请求-回复可能是有意义的。您可能需要根据手头的任务，明智地从可用的选项组合中进行选择。本章中的示例演示了通过消息通道检索\
  \ Product 实体集合的过程。您现在可能会自然地想到，本章中解释的微服务间交互风格是否可以在实际生活中用于覆盖完整的业务用例，而这正是第 6 章将要介绍的内容。\n\
  \n# 6. 生产级面向消息的微服务\n\n第 4 章解释了消息中间件如何在为微服务提供松散耦合的通信桥梁方面发挥关键作用。消息通道通常以异步交互风格为特征，但第\
  \ 4 章和第 5 章试图展示即使在异步消息通道上，也可以实现同步的用户体验。这是提供信心的第一步，即可以利用松散耦合的、基于消息的微服务交互来实现您的许多（如果不是全部）功能用例。如第\
  \ 5 章所述，许多工程师仍然对是否可以使用事件和事件范式以同步方式进行微服务间通信以实现完整的数据管理范式持怀疑态度。本章旨在解决这种怀疑。\n\n本章完全以实践为主，并附有示例。需要您对第\
  \ 5 章中的示例有概览和实际操作经验，才能快速理解本章中增强的示例。\n\n本章涵盖以下概念：\n\n*   消息交换的协议和消息格式\n\n*   使用 Kafka\
  \ 作为中间件，在微服务之间实现完整的 CRUD（创建、读取、更新、删除）功能\n\n*   使用 MongoDB 和 PostgreSQL DB 实现 CRUD\n\
  \n*   快速了解一些集成模式\n\n## 微服务间线路级选项\n\n当我们谈论面向消息的微服务时，有利有弊。其中一个主要方面涉及微服务间通信格式的选项。让我们在下一节中探讨这些内容。\n\
  \n\n\n### XML-RPC 与 SOAP\n\n十多年来，XML-RPC 和 SOAP 一直是使用 Web 服务进行远程服务调用的基石。Web 服务由\
  \ WSDL（Web 服务描述语言）文档描述，该文档充当服务提供者与服务消费者之间的契约。WSDL 文档描述了 Web 服务如何绑定到消息传递协议——对于 Web\
  \ 服务而言，即 SOAP 协议。\n\nWSDL SOAP 绑定可以是面向 RPC 的绑定，也可以是面向文档的绑定。\n\n*   **面向 RPC 的风格：**\
  \ 使用面向 RPC（远程过程调用）风格的 Web 服务是接口驱动的。在此，客户端应用程序通过发送请求的参数值并接收响应的参数值来调用 Web 服务方法（调用远程过程）。SOAP\
  \ 请求的正文包含一个用于此方法的包装 XML 元素。该方法的参数作为子元素嵌入在此包装元素内。\n\n*   **面向文档的风格：** 使用面向文档风格的 Web\
  \ 服务是文档（更准确地说是 XML 文档）驱动的。在此，客户端应用程序将参数作为 XML 文档发送给 Web 服务，而不是作为离散的参数值集合。SOAP 请求和响应消息的正文包含一个或多个\
  \ XML 文档。面向文档的风格比面向 RPC 的风格更扁平，并且不需要使用包装元素。\n\n### REST 与 JSON-RPC\n\n在最近一段时间，每当有人想要开始构建\
  \ HTTP API 时，他们几乎都专门使用 REST 作为事实上的架构风格，而不是 XML-RPC 和 SOAP 等替代方法。REST 指定了一种客户端-服务器关系，其中服务器端数据通过简单格式（通常是\
  \ JSON 和 XML）的数据表示形式提供。这些用于资源或资源集合的表示形式随后可以通过操作（更准确地说是 HTTP 操作）进行修改。数据之间的关系通过一种称为*超媒体*的方法变得可发现。超媒体是\
  \ REST 的基础，本质上就是提供指向其他资源的链接的概念。在第 2 章标题为“HATEOAS 和 HAL”的部分中，您已经了解了这一点。\n\nJSON-RPC\
  \ 是一种用 JSON 编码的远程过程调用协议。它类似于 XML-RPC 协议，只定义了少数数据类型和命令。JSON-RPC 允许通知（发送到服务器但不需要响应的数据）以及向服务器发送多个调用，这些调用可以异步应答。\n\
  \n### RPC 与消息传递\n\n这两种协议的根本区别在于 RPC 框架是同步的。您发起一个调用，在收到响应之前，该调用不会完成。另一方面，消息传递是异步的。您发送消息，要么不期望得到响应，要么不知道响应何时会返回（如果真有响应的话）！\n\
  \n如果您的调用者需要从您正在请求或调用的服务的响应中获取信息，那么您应该使用 RPC，因为在从提供者那里获得所需信息之前，您无法返回给调用者。如果您的调用者不需要来自下游服务的信息，您可以使用消息传递。发送消息后即可忘记它，因为您不期望（更确切地说，是无法期望）收到响应。\n\
  \n### RPC 风格的消息传递\n\n如前所述，消息传递范式试图强制执行一种“发送即忘”的消息传递风格，但可以使用设计得当的消息队列来执行和模拟 RPC，如第\
  \ 5 章所述。第 5 章中的图 5-7 描述了微服务通信的不同回复通道，而图 5-8 描述了相互通信的微服务的不同回复分区。在这两种场景中，您都可以在消息传递通道上模拟参与微服务之间的同步风格请求-响应。\n\
  \n与 XML-RPC 或 SOAP 场景不同，当微服务通过普通消息传递通道进行通信时，它们不会严格绑定到严格的消息调用模式——缺少一种充当服务提供者与服务消费者之间契约的\
  \ WSDL 类机制。因此，您需要编织一种机制来指定“要执行什么操作”。HTTP 提供了标准动词来为正在执行的操作意图提供语义含义。\n\n### 用于资源 CRUD\
  \ 的 HTTP 方法\n\n基于 RPC 的 API 非常适合操作（即过程或命令），而基于 REST 的 API 非常适合对您的领域（即资源或实体）进行建模，为您的所有数据提供\
  \ CRUD（创建、读取、更新、删除）功能。REST 使用 HTTP 方法，例如 GET、POST、PUT、DELETE、OPTIONS 以及（希望如此）PATCH，来为正在执行的操作意图提供语义含义。\n\
  \n您可以利用来实现 REST 的 HTTP 主要方法如下：\n\n*   **GET：** GET 是最简单的 HTTP 操作，其意图是从服务器检索资源。200\
  \ OK 是成功操作的状态码。所有 GET 操作都应该是*幂等*的，这意味着无论您使用相同参数重复操作多少次，资源的状态都不应发生任何变化。\n\n*   **POST：**\
  \ HTTP POST 为客户端提供了一种向服务器发送信息的选项。建议将 POST 用于创建新资源（尽管它也可以更新现有资源）。\n\n*   **PUT：**^(⁵)\
  \ HTTP PUT 也为客户端提供了一种向服务器发送信息的选项；但是，根据 HTTP 规范，PUT 的使用语义与 POST 略有不同。使用 PUT，您可以向服务器发送一个“新对象”，将其放置在由\
  \ URI 表示的服务器上的某个位置，因此其意图应该是用新资源替换现有资源。就单个客户端而言，PUT 请求是幂等的。如果在 PUT 请求中只提供了数据元素的子集，其余部分将被替换为空或\
  \ null。\n\n*   **DELETE：** DELETE 允许客户端从服务器删除资源。URI 标识要删除的资源。资源可能不必立即删除；相反，可以通过后台的异步或长时间运行的操作来完成。\n\
  \nREST 不仅仅是 CRUD，但事情主要通过基于 CRUD 的操作来完成。\n\n然而，RPC 并不严格遵循标准的 HTTP 动词。大多数只使用 GET 和\
  \ POST，其中 GET 用于检索信息，POST 用于其他所有事情。常见的做法是看到 RPC API 使用类似 `POST /deleteBar` 的方式，并带有\
  \ `{ \"id\": 10 }` 的请求体，而不是 REST 方法，后者会是 `DELETE /bars/10`。\n\nJSON（JavaScript 对象表示法）是一种开放标准的文件格式和数据交换格式，它使用人类可读的文本来存储和传输由属性-值对和数组（或其他可序列化值）组成的数据对象。如果您想继续使用这种格式，而不是同步风格的\
  \ HTTP 传输，您可以使用异步风格的消息传递传输。但是，当您不使用标准 HTTP 时，您就失去了使用标准 HTTP 动词及其任何相关优势的机会。\n\n下一节将看两个示例，演示其中的一些讨论要点。具体来说，我们将为端点\
  \ API 坚持使用 REST，并尝试在通过 Kafka 进行的微服务间通信中坚持使用 JSON。\n\n\n\n## 基于 MongoDB 的 Kafka 上的\
  \ CRUD 微服务\n\n本示例对第 5 章中的同一组微服务进行了调整。一个消费者微服务和一个提供者微服务使用 Kafka 作为消息通道进行通信。提供者微服务将实体存储在\
  \ MongoDB 数据库中。此外，当浏览器向第一个（消费者）微服务发送请求时，它使用异步 HTTP。尽管使用了异步 HTTP，但该示例在浏览器层面模拟了同步风格的用户体验。\n\
  \n与第 5 章中的示例一样，本示例通过消费者和提供者微服务的多个实例进行演示，并且在测试服务时使用了多个客户端。\n\n本示例引入了一个新的功能特性。它通过微服务交互，使用\
  \ Kafka 作为消息通道，模拟了完整的 CRUD（创建、读取、更新和删除）功能。\n\n### 在 MongoDB 上设计基于异步通道的 CRUD\n\n\
  本示例使用了第 2 章图 2-1 中所示六边形微服务视图的修改版本（您在第 5 章中也见过），以便两个微服务通过异步通道进行通信。Apache Kafka 被用作消息通道，它本质上是异步的。本示例的目标是多方面的：\n\
  \n![](img/619782_1_En_6_Fig1_HTML.jpg)\n\n微服务设计包含以下组件：用户、浏览器、REST API、产品 Web 微服务实例、产品服务器微服务实例。\n\
  \n图 6-1\n\n使用分区的异步通道上的微服务设计\n\n*   在基于 Kafka 的异步通道上调用同步风格的通信。\n*   演示多个消费者类型或同一消费者类型的多个实例可以连接到一个或多个提供者微服务实例，并且仍然只接收到与各自请求相对应的正确响应。\n\
  *   演示完整的 CRUD 操作集可以通过异步通道进行编排。\n*   在浏览器端为用户提供同步风格的体验，即使该示例使用了异步 HTTP。\n*   演示浏览器可以从完全符合\
  \ HATEOAS 的接口进行消费。\n\n如图 6-1 所示，本示例将利用 Kafka 分区作为微服务之间异步通道中的主要并发机制。这个异步主题被划分为一个或多个分区（本例中为五个），使得生产者和消费者的负载可以扩展。消费者在各个分区之间均匀分布，从而可以通过增加提供者实例及其配置的分区来线性扩展消费者负载。\n\
  \n### 理解源代码\n\n本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在\
  \ `ch06\\ch06-01` 文件夹内。本示例的大部分源代码与 `ch05\\ch05-01` 中的类似。我之前详细解释了如何设置使用消息通道相互通信的消费者和提供者微服务。本节仅介绍更改的部分。\n\
  \n需要检查的主类是 `Product` 实体的新容器类（参见代码清单 6-1），它具有以下功能：\n\n*   作为在微服务之间传输资源集合的容器\n*  \
  \ 作为模式规范\n\n```\npublic class Products {\npublic static final String CREATE = \"\
  Create\";\npublic static final String DELETE = \"Delete\";\npublic static final\
  \ String DELETE_ALL = \"Delete_All\";\npublic static final String UPDATE = \"Update\"\
  ;\npublic static final String RETREIVE_ALL = \"Retreive_All\";\npublic static final\
  \ String RETREIVE_DETAILS =\n\"Retreive_Details\";\npublic static final String SUCCESS\
  \ = \"Success\";\npublic static final String FAILURE = \"Failure\";\nprivate String\
  \ operation;\nprivate List products;\npublic String getOperation() {\nreturn operation;\n\
  }\npublic void setOperation(String operation) {\nthis.operation = operation;\n}\n\
  public List getProducts() {\nreturn products;\n}\npublic void setProducts(List products)\
  \ {\nthis.products = products;\n}\n}\n代码清单 6-1\nProduct 实体的容器类 (ch06\\ch06-01\\\
  02-ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\model\\Products.java)\n\
  ```\n\n`Products` 类将 CRUD HTTP 动词的对应项列为常量字面量。`operation` 属性用于指定在请求阶段要执行的操作。在响应阶段，相同的操作将请求处理的结果指定为“成功”或“失败”。接下来，`products`\
  \ 集合可能包含一个或多个 `Product` 实体。在请求阶段，`products` 属性包含一个 `Product` 实体，其属性值对应于要执行操作的参数。在操作的响应阶段，相同的\
  \ `products` 集合可能包含一个或多个 `Product` 实体，对应于所执行操作的响应。\n\n这种将请求和响应参数及操作作为有效载荷附带的方法并非最佳、最优雅的方式，但它能完成任务。\n\
  \n代码清单 6-2 显示了 Product Web 微服务使用的配置类。\n\n```\n@Configuration\npublic class KafkaConfig\
  \ {\n@Bean\npublic CompletableFutureReplyingKafkaOperations replyKafkaTemplate()\
  \ {\nCompletableFutureReplyingKafkaTemplate\nrequestReplyKafkaTemplate = new\nCompletableFutureReplyingKafkaTemplate(\n\
  requestProducerFactory(),\nreplyListenerContainer());\nrequestReplyKafkaTemplate.setDefaultTopic(\n\
  requestTopic);\nrequestReplyKafkaTemplate.setDefaultReplyTimeout(\nDuration.of(replyTimeout,\
  \ ChronoUnit.MILLIS));\nreturn requestReplyKafkaTemplate;\n}\n@Bean\npublic ConsumerFactory\n\
  replyConsumerFactory() {\nJsonDeserializer jsonDeserializer =\nnew JsonDeserializer();\n\
  jsonDeserializer.addTrustedPackages(\nProducts.class.getPackage().getName());\n\
  return new DefaultKafkaConsumerFactory(\nconsumerConfigs(), new StringDeserializer(),\n\
  jsonDeserializer);\n}\n@Bean\npublic KafkaMessageListenerContainer\nreplyListenerContainer()\
  \ {\nContainerProperties containerProperties =\nnew ContainerProperties(replyTopic);\n\
  return new KafkaMessageListenerContainer(\nreplyConsumerFactory(), containerProperties);\n\
  }\n}\n代码清单 6-2\nProduct Web 微服务的 Kafka 配置 (ch06\\ch06-01\\02-ProductWeb\\src\\main\\\
  java\\com\\acme\\ecom\\product\\KafkaConfig.java)\n```\n\n这段代码配置了 `CompletableFutureReplyingKafkaTemplate`，指定将\
  \ `Products` 作为请求发送，并期望将 `Products` 作为响应返回。\n\n\n\n清单 6-3 检查了 Product Web 控制器中的一个方法。其他方法以类似方式实现，为简洁起见，此处不再重复代码。\n\
  \n```\n@RestController\npublic class ProductRestController{\n@Autowired\nprivate\
  \ CompletableFutureReplyingKafkaOperations replyingKafkaTemplate;\n@RequestMapping(value\
  \ = \"/productsweb\",\nmethod = RequestMethod.GET,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public DeferredResult>>\ngetAllProducts(){\nDeferredResult>>\ndeferredResult = new\
  \ DeferredResult();\nProducts productsRequest = new Products();\nproductsRequest.setOperation(Products.RETREIVE_ALL);\n\
  CompletableFuture completableFuture =\nreplyingKafkaTemplate.requestReply(\nrequestTopic,\
  \ productsRequest);\ncompletableFuture.thenAccept(products -> {\nList\nproductList\
  \ = products.getProducts();\nCollectionModel result = CollectionModel.of(\nlist,\
  \ links);\ndeferredResult.setResult(new ResponseEntity>(result,\nHttpStatus.OK));\n\
  return deferredResult;\n}\n}\n清单 6-3\nProduct Web 微服务的 REST 控制器 (ch06\\ch06-01\\\
  02-ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n\
  ```\n\n在向 Product Server 微服务发送请求消息以检索所有产品时，你将操作指定为 `Products.RETREIVE_ALL`。即使你在请求中发送了一个空的\
  \ `Products` 集合 `productsRequest`，它在此处也不相关或未被使用。然而，对于其他一些方法，你可以使用同一个 `productsRequest`\
  \ 集合来发送请求参数。然后，你使用上一步配置的 `CompletableFutureReplyingKafkaOperations`，以同步风格发送请求消息并接收其对应的响应消息，尽管底层的请求和响应消息语义是两个独立的异步消息。\n\
  \n注意\n\n关于 `CompletableFutureReplyingKafkaOperations` 及其使用模式的详细说明，请参见第 5 章。\n\n\
  在 Product Server 微服务端，你还必须配置并指定 `Products` 容器类，以便在网络上传输，如清单 6-4 所示。\n\n```\n@Configuration\n\
  @EnableKafka\npublic class KafkaConfig {\n@Bean\npublic ConsumerFactory\nrequestConsumerFactory()\
  \ {\nJsonDeserializer jsonDeserializer =\nnew JsonDeserializer();\njsonDeserializer.addTrustedPackages(Products.class.\n\
  getPackage().getName());\nreturn new DefaultKafkaConsumerFactory(\nconsumerConfigs(),\
  \ new StringDeserializer(),\njsonDeserializer);\n}\n@Bean\npublic KafkaListenerContainerFactory>\
  \ requestReplyListenerContainerFactory(){\nConcurrentKafkaListenerContainerFactory\
  \ factory =\nnew ConcurrentKafkaListenerContainerFactory();\nfactory.setConsumerFactory(requestConsumerFactory());\n\
  factory.setReplyTemplate(replyTemplate());\nreturn factory;\n}\n}\n清单 6-4\nProduct\
  \ Server 微服务的 Kafka 配置 (ch06\\ch06-01\\01-ProductServer\\src\\main\\java\\com\\\
  acme\\ecom\\product\\KafkaConfig.java)\n```\n\n`ProductListener` 是 Product Server\
  \ 微服务的消息监听器。`ProductListener` 首先通过检查 `operation` 属性来解析要执行的操作，并调用相应的方法。参见清单 6-5。\n\
  \n```\n@Component\npublic class ProductListener {\n@Autowired\nprivate ProductRepository\
  \ productRepository;\n@KafkaListener(topics = \"${kafka.topic.product.request}\"\
  ,\ncontainerFactory =\n\"requestReplyListenerContainerFactory\")\n@SendTo\npublic\
  \ Products listenWithHeaders(\nConsumerRecord record){\nProducts productsRequest\
  \ = record.value();\nProducts productsResponse = resolveAndExecute(\nproductsRequest);\n\
  return productsResponse;\n}\nprivate Products resolveAndExecute(Products products)\
  \ {\nProducts productsToReturn = null;\nif(products.getOperation().equals(\nProducts.RETREIVE_DETAILS)){\n\
  productsToReturn = getProduct(products);\n}\nelse if(products.getOperation().equals(\n\
  Products.RETREIVE_ALL)){\nproductsToReturn = getAllProducts(products);\n}\nelse\
  \ if(products.getOperation().equals(\nProducts.CREATE)){\nproductsToReturn = createProduct(products);\n\
  }\nelse if(products.getOperation().equals(\nProducts.UPDATE)){\nproductsToReturn\
  \ = updateProduct(products);\n}\nelse if(products.getOperation().equals(\nProducts.DELETE)){\n\
  productsToReturn = deleteProduct(products);\n}\nelse {\nLOGGER.debug(\"Inside else.\
  \ Undefined Operation!\");\n}\nreturn productsToReturn;\n}\nprivate Products getAllProducts(Products\
  \ products) {\nProducts productsToReturn = new Products();\nList productListToReturn\
  \ =\nproductRepository.findAll();\nproductsToReturn.setOperation(Products.SUCCESS);\n\
  productsToReturn.setProducts(productListToReturn);\nreturn productsToReturn;\n}\n\
  //other code goes here\n}\n清单 6-5\nProduct Server 微服务的 Kafka 监听器 (ch06\\ch06-01\\\
  01-ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\kafka\\client\\ProductListener.java)\n\
  ```\n\n这里再次只展示了 `ProductListener` 中的一个方法，名为 `getAllProducts`。其他方法以类似方式实现，因此此处不再重复其代码。\n\
  \n还建议你参考第 3 章中“使用 MongoDB 和 CrudRepository 的微服务”一节中的第二个示例，该示例解释了 Product Server\
  \ 微服务如何连接到 MongoDB 以执行完整的 CRUD 操作集。\n\n\n\n### 构建并运行微服务\n\n`ch06\\ch06-01` 文件夹包含构建示例所需的\
  \ Maven 脚本。第一步，你需要启动 Kafka 代理。请参考附录 D 了解如何设置并启动 Kafka 服务器。你需要执行清单 6-6 中的命令，从 Kafka\
  \ 安装位置启动它。\n\n```\nbin/zookeeper-server-start.sh config/zookeeper.properties\nbin/kafka-server-start.sh\
