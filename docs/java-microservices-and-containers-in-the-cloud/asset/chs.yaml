  ## 使用 Dockerfile 构建微服务


  本节将解释如何使用 Dockerfile 部署微服务。它使用了第 1 章“您的第一个 Java 微服务”一节中部署的同一个微服务。


  ### Dockerfile


  *Dockerfile* 是一种使用纯文本文件来构建 Docker 镜像的配方。每个 Dockerfile 都指定了一个基础镜像，Docker 引擎将在此基础上进行构建。然后，Dockerfile
  包含一系列关于如何构建镜像的指令。您指示 Docker 根据 Dockerfile 创建一个 Docker 镜像。`docker build` 命令在构建上下文中运行。构建的上下文包含指定位置的文件，该位置可以是
  `PATH` 或 `URL`。`PATH` 是您本地文件系统中的一个目录，`URL` 是一个 Git 仓库位置。上下文会被递归处理。`PATH` 也包含任何子目录。`URL`
  将包含仓库及其子模块。


  ### 理解源代码


  本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在
  `ch07\ch07-03` 文件夹内。本示例中的大部分源代码与 `ch01\ch01-01` 中的代码类似。因此，本节不再审查微服务代码，而是着眼于几个部署方面，特别是使用
  Dockerfile 的部署。请参见清单 7-35。


  ```

  FROM openjdk:8-jdk-alpine

  VOLUME /tmp

  ARG JAR_FILE

  COPY ${JAR_FILE} ecom.jar

  ENTRYPOINT ["java","-jar","/ecom.jar"]

  清单 7-35

  Dockerfile (ch07\ch07-03\Dockerfile)

  ```


  此 Dockerfile 包含以下信息：


  *   `FROM`：作为此镜像的基础，您将使用 `openjdk` 提供的支持 Java 的 Alpine Linux，`openjdk` 是一个包含 Java
  平台标准版开源实现的官方仓库。


  *   `VOLUME`：指向 `/tmp`，因为这是 Spring Boot 应用程序默认创建工作目录的位置。其效果是在您的主机上的 `/var/lib/docker`
  下创建一个临时文件，并将其链接到容器内的 `/tmp` 下。当以非 root 用户身份运行容器时，这一点至关重要。


  *   `ARG`：这也被称为构建时变量。它们从在 Dockerfile 中使用 `ARG` 指令“声明”的那一刻起，直到镜像构建完成的那一刻才可用。正在运行的容器无法访问
  `ARG` 变量的值。


  *   `COPY`：Docker 将 Jar 文件复制到镜像中。


  *   `ENTRYPOINT`：这将是容器启动时要启动的可执行文件。定义为 `JSON-Array`，因为您将结合使用 `ENTRYPOINT` 和 `CMD`
  来处理某些应用程序参数。


  清单 7-36 中的单个脚本用于自动化此构建过程。


  ```

  mvn -Dmaven.test.skip=true clean package

  docker build  --build-arg JAR_FILE=02-ProductWeb/target/*.jar -t binildas/product-web
  .

  docker push binildas/product-web

  sleep 10

  docker rmi binildas/product-web

  sleep 10

  docker run -p 8080:8080  --name product-web binildas/product-web

  清单 7-36

  Docker 构建脚本 (ch07\ch07-03\makeandrun.sh)

  ```




