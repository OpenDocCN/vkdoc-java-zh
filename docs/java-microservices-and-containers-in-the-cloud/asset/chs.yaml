  ### 测试微服务 Pod\n\n当 Pod 启动并运行后，你就可以访问 Product Web 微服务了。不过，如附录 E 所述，你必须先获取 Minikube\
  \ 的 IP 地址。请参见清单 10-49。\n\n```\n(base) binildass-MacBook-Pro:ch07-02 binil$ minikube\
  \ ip\n192.168.64.6\n(base) binildass-MacBook-Pro:ch07-02 binil$\n清单 10-49\n查找 Minikube\
  \ IP\n```\n\n现在，你可以使用浏览器，通过 Minikube IP 构成的 URL 来访问 Product Web 微服务。\n\n`http://192.168.64.5:8080/product.html`\n\
  \n请参考第 1 章中“使用 UI 测试微服务”一节，来测试 Product Web 微服务容器。\n\n在测试微服务时，请持续观察日志窗口，正如本章前面示例中清单\
  \ 10-26 和 10-27 所描述的那样。\n\n现在，我们将更深入地了解一下 PostgreSQL 数据库。清单 10-50 声明了一个持久卷声明。\n\n\
  ```\n(base) binildass-MacBook-Pro:~ binil$ kubectl get persistentvolumeclaims\n\
  NAME                               STATUS   VOLUME                             \
  \        CAPACITY   ACCESS MODES   STORAGECLASS   AGE\npostgres-persistent-volume-claim\
  \   Bound    pvc-2c90c05e-c233-44d4-8adb-5595da8edc3e   4Gi        RWO         \
  \   standard       71s\n(base) binildass-MacBook-Pro:~ binil$\n清单 10-50\n描述 PVC\n\
  ```\n\n请注意，PVC 的状态为 `Bound`，并且它指明了绑定了哪个 `VOLUME`。它们具有设定的容量 `4Gi`（这是在清单 10-45 的 `yaml`\
  \ 文件中请求的），并且具有指定的访问模式 `RWO`（一次读写），这意味着一次只能有一个 Pod 使用该卷。\n\n即使你没有设置存储类，它也会被默认设置。这是由\
  \ Kubernetes 集群中运行的 `AdmissionController` 完成的，它会拦截你对 Kubernetes API 服务器的请求并修改传入的对象。如果你指定了存储类，准入控制器就不会注入这个类。\n\
  \n但是，这个存储类是谁创建的呢？你可以在清单 10-51 中检查该存储类。\n\n```\n(base) binildass-MacBook-Pro:~ binil$\
  \ kubectl describe storageclass standard\nName:            standard\nIsDefaultClass:\
  \  Yes\n...\nProvisioner:           k8s.io/minikube-hostpath\nParameters:      \
  \      \nAllowVolumeExpansion:  \nMountOptions:          \nReclaimPolicy:      \
  \   Delete\nVolumeBindingMode:     Immediate\nEvents:                \n(base) binildass-MacBook-Pro:~\
  \ binil$\n清单 10-51\n描述存储类\n\n当你启动 Minikube 时，`StorageClass` 就会为你创建。它是在你的 Minikube\
  \ 安装过程中自动引导的。你可以读取其内容。你也可以在 Kubernetes 内部使用 `kubectl edit sc standard` 来修改它。\n\n\
  由于你有一个带有供应器的默认存储类，因此无需担心显式创建持久卷。相反，供应器会根据持久卷声明来负责创建这些卷。这就是为什么与上一个示例不同，这里没有显式配置 PV\
  \ 的原因。清单 10-52 显示了 PV。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl get\
  \ persistentvolumes\nNAME                                       CAPACITY   ACCESS\
  \ MODES   RECLAIM POLICY   STATUS   CLAIM                                      STORAGECLASS\
  \   REASON   AGE\npvc-2c90c05e-c233-44d4-8adb-5595da8edc3e   4Gi        RWO    \
  \        Delete           Bound    default/postgres-persistent-volume-claim   standard\
  \                2m33s\n(base) binildass-MacBook-Pro:~ binil$\n清单 10-52\n列出持久卷\n\
  \n请注意，容量和访问模式与 `PersistentVolumeClaim` 相匹配。同时也要注意，`PersistentVolumes` 指向了已声明它的 PVC，就像\
  \ PVC 指向它们已声明的 `PersistentVolumes` 一样。\n\n在停止 Pod 和服务之前，请阅读下一节。\n\n## Kubernetes\
  \ Pod 的弹性\n\n在本章的第一个示例中，你看到当一个 Pod 被杀死时，默认情况下会有一个新的 Pod 被重新创建。你还看到，对于有状态集，当 Pod\
  \ 被重新创建时，Pod 的名称会被保留。\n\n这展示了不同类型 Pod 和部署的弹性。\n\n在接下来的几节中，你将使用 PostgreSQL Pod 进行更多实验。\n\
  \n\n\n### 状态保持\n\n首先列出现有的 Pod，如代码清单 10-53 所示。\n\n```\n(base) binildass-MacBook-Pro:~\
  \ binil$ kubectl get pods\nNAME                           READY STATUS  RESTARTS\
  \ AGE\npostgres-89dbf9fd9-f5bmc       1/1   Running 0        37m\nproduct-server-85d84cf89-kxvfw\
  \ 1/1   Running 0        37m\nproduct-web-69b5948fb9-brdnf   1/1   Running 0   \
  \     37m\n(base) binildass-MacBook-Pro:~ binil$\n代码清单 10-53\n列出 Kubernetes Pod\n\
  ```\n\n在代码清单 10-54 中，你可以看到 PostgreSQL Pod 并非定义为 StatefulSet，而是定义为 Deployment。记住这一点，你可以删除该\
  \ Pod。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl delete po postgres-89dbf9fd9-f5bmc\n\
  pod \"postgres-89dbf9fd9-f5bmc\" deleted\n(base) binildass-MacBook-Pro:~ binil$\n\
  代码清单 10-54\n删除 PostgreSQL Pod\n```\n\n现在再次列出剩余的 Pod，如代码清单 10-55 所示。\n\n```\n(base)\
  \ binildass-MacBook-Pro:~ binil$ kubectl get pods\nNAME                        \
  \   READY STATUS  RESTARTS AGE\npostgres-89dbf9fd9-4r5wk       1/1   Running 0 \
  \       9s\nproduct-server-85d84cf89-kxvfw 1/1   Running 0        38m\nproduct-web-69b5948fb9-brdnf\
  \   1/1   Running 0        38m\n(base) binildass-MacBook-Pro:~ binil$\n代码清单 10-55\n\
  再次列出 Kubernetes Pod\n```\n\n请注意，PostgreSQL 数据库 Pod 已被重新创建，但名称不同。被删除的 Pod 的状态会发生什么变化？\n\
  \n为了回答这个问题，使用相同的 URL 测试 Product Web 微服务，以便请求将命中之前存在的 Product Server 和 Product Web\
  \ 微服务 Pod。\n\n`http://192.168.64.6:30263/product.html`\n\n令你惊讶的是，你可能会发现之前的状态得以保持。这里所说的状态是指，当你初始化\
  \ Product Server 微服务时，你插入了几行数据库记录，而这些记录被保留了下来！\n\n你需要进一步探索。为此，请查看代码清单 10-56，它检查了\
  \ Pod、PVC 和 PV 之间的关联。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl get\
  \ pods --all-namespaces -o=json | jq -c '.items[] | {name: .metadata.name, namespace:\
  \ .metadata.namespace, claimName: .spec |  select( has (\"volumes\") ).volumes[]\
  \ | select( has (\"persistentVolumeClaim\") ).persistentVolumeClaim.claimName }'\n\
  {\"name\":\"postgres-89dbf9fd9-4r5wk\",\"namespace\":\"default\",\"claimName\":\"\
  postgres-persistent-volume-claim\"}\n(base) binildass-MacBook-Pro:~ binil$\n代码清单\
  \ 10-56\nPod 与 PVC 之间的关联\n\n此清单显示了 PostgreSQL Pod 与其 PVC 之间的关联。你还可以看到 PVC 与 PV 之间的关联，如代码清单\
  \ 10-57 所示。\n\n```\n(base) binildass-MacBook-Pro:~ binil$ kubectl get pvc --all-namespaces\
  \ -o json | jq -j '.items[] | \"\\(.metadata.namespace), \\(.metadata.name), \\\
  (.spec.volumeName)\\n\"'\ndefault, postgres-persistent-volume-claim, pvc-2c90c05e-c233-44d4-8adb-5595da8edc3e\n\
  (base) binildass-MacBook-Pro:~ binil$\n代码清单 10-57\nPV 与 PVC 之间的关联\n```\n\n为了理解这一点，请注意\
  \ Kubernetes 文档中的说明：\n\n> *用户创建一个 PersistentVolumeClaim（或者在动态配置的情况下，已经创建了一个），其中请求了特定数量的存储和特定的访问模式。主节点中的一个控制循环会监视新的\
  \ PVC，找到匹配的 PV（如果可能），并将它们绑定在一起。如果为新的 PVC 动态配置了 PV，则该循环将始终将该 PV 绑定到该 PVC。否则，用户将始终至少获得他们所请求的内容，但卷可能会超出请求量。一旦绑定，PersistentVolumeClaim\
  \ 的绑定是排他性的，无论它们是如何绑定的。PVC 到 PV 的绑定是一对一的映射，使用 ClaimRef，它是 PersistentVolume 和 PersistentVolumeClaim\
  \ 之间的双向绑定。*\n> \n> —Kubernetes\n\n这在某种程度上解释了你之前看到的行为。进一步的细节超出了本讨论的范围，建议你参考 Kubernetes\
  \ 文档。\n\n测试完成后，你可以停止并移除微服务容器，并使用代码清单 10-58 中所示的 `clean.sh` 脚本来清理环境。\n\n```\nmvn\
