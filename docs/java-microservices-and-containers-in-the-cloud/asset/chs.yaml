  \n当环境变量条目较多时，Kubernetes 提供了一种方法，可以将 `ConfigMap` 的所有条目作为环境变量暴露出来，而不是逐个创建环境变量，如清单\
  \ 10-43 所示。你可以使用 `envFrom` 属性（而不是 `env`）将它们暴露为环境变量。你仍然可以像之前的示例那样使用 `env` 来引用 PostgreSQL\
  \ 数据库地址。清单 10-43 展示了此 `ConfigMap` 的条目。\n\n```\napiVersion: v1\nkind: ConfigMap\n\
  metadata:\nname: postgres-config\nlabels:\ngroup: db\ndata:\nPOSTGRES_DB: productdb\n\
  POSTGRES_USER: postgres\nPOSTGRES_PASSWORD: postgre\n清单 10-43\nProduct Server 引用的\
  \ ConfigMap YAML (ch10\\ch10-02\\postgres-config.yml)\n```\n\n这些条目用于 PostgreSQL\
  \ 服务器配置，其含义不言自明。\n\n清单 10-42 中引用的 PostgreSQL 数据库也是新的，清单 10-44 展示了其描述符。\n\n\n\n```\n\
  apiVersion: apps/v1\nkind: Deployment\nmetadata:\nname: postgres\nlabels:\napp:\
  \ postgres\ngroup: db\nspec:\nreplicas: 1\nselector:\nmatchLabels:\napp: postgres\n\
  template:\nmetadata:\nlabels:\napp: postgres\ntype: db\nspec:\nvolumes:\n- name:\
  \ postgres-storage\npersistentVolumeClaim:\nclaimName: postgres-persistent-volume-claim\n\
  containers:\n- name: postgres\nimage: postgres:15.3-alpine3.18\nports:\n- containerPort:\
  \ 5432\nenvFrom:\n- configMapRef:\nname: postgres-config\nvolumeMounts:\n- name:\
  \ postgres-storage\nmountPath: /var/lib/postgresql/data\n清单 10-44\nPostgreSQL 数据库的\
  \ Pod 描述（ch10\\ch10-02\\postgres-deployment.yml）\n```\n\n请注意，PostgreSQL Pod 引用了与\
  \ Product Server 微服务相同的 `ConfigMap`。通过这种方式，Product Server 微服务可以使用与 PostgreSQL DB\
  \ 容器实例化时相同的凭据连接到该数据库。\n\n接下来，检查 `persistentVolumeClaim`，如清单 10-45 所示。\n\n```\napiVersion:\
  \ v1\nkind: PersistentVolumeClaim\nmetadata:\nname: postgres-persistent-volume-claim\n\
  spec:\naccessModes:\n- ReadWriteOnce\nresources:\nrequests:\nstorage: 4Gi\n清单 10-45\n\
  PostgreSQL 数据库的 persistentVolumeClaim 描述（ch10\\ch10-02\\postgres-pvc.yml）\n```\n\
  \n您要检查的最后一个文件是 PostgreSQL 数据库的服务定义，如清单 10-46 所示。\n\n```\napiVersion: v1\nkind: Service\n\
  metadata:\nname: postgres\nlabels:\ngroup: db\nspec:\ntype: ClusterIP\nselector:\n\
  app: postgres\nports:\n- port: 5432\ntargetPort: 5432\n清单 10-46\nPostgreSQL 数据库服务的描述（ch10\\\
  ch10-02\\postgres-svc.yml）\n```\n\n只有 Product Server 微服务会从 Kubernetes VM 内部访问 PostgreSQL\
  \ 数据库，因此您只需要一个 `ClusterIP`。\n\n### 在 Kubernetes 中运行微服务\n\n`ch10\\ch10-02` 文件夹包含构建和运行这些示例所需的脚本。第一步是启动一个\
