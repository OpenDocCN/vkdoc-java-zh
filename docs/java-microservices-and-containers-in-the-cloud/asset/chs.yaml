  \ PostgreSQL 版本。\n\n## 基于 PostgreSQL 的 Kafka CRUD 微服务\n\n本示例对上一节中看到的同一组微服务进行了调整。一个消费者微服务和一个提供者微服务使用\
  \ Kafka 作为消息通道进行通信。提供者微服务将实体存储在 PostgreSQL 数据库中，而不是 MongoDB 中。当浏览器向第一个（消费者）微服务发送请求时，它使用异步\
  \ HTTP。尽管代码使用了异步 HTTP，但它在浏览器层面模拟了同步风格的用户体验。\n\n与上一个示例一样，本示例旨在演示消费者和提供者微服务的多个实例，并在测试该服务时使用多个客户端。\n\
