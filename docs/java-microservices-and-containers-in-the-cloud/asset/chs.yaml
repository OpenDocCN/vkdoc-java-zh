  \n## 总结\n\n在本章开始时，我通过展示用 MongoDB 替换 PostgreSQL 的插件机制，探讨了端口和适配器的可插拔特性如何在企业应用中发挥作用。这种插件机制是六边形架构的一个关键特征。接着，你了解了六边形架构和洋葱架构的互补性质。我再次演示了一种在六边形架构中添加更多端口的灵活方式，使得应用程序的核心保持不变。同样重要的是洋葱架构中的分层概念，其中外层依赖于内层，并且随着你越来越深入内层，你会探索到业务领域的核心，而核心的可复用性是一个理想的目标。现在，你应该对微服务架构范式中可用的选项有了扎实的理解。你已经准备好学习微服务中事件和消息传递的下一级概念，这些内容将在第\
  \ 4 章中介绍。\n\n# 4. 面向消息的微服务\n\n在本书的前几章中，你看到了微服务之间的相互交互，以及人类参与者（最终用户）通过客户端设备（浏览器）与边缘微服务进行交互。由于微服务本质上是“微”型的，多个微服务通常需要相互通信以满足有用的业务功能。这些微服务间的通信可以在一个业务领域内进行，也可以跨业务领域进行。\n\
  \n微服务是应用程序的分布式部分，运行在多个进程或服务上，有时甚至跨多个服务器或主机，甚至跨多个地理位置。每个服务实例通常是一个计算机进程。因此，微服务间的通信使用进程间通信（IPC）协议（如\
  \ HTTP 或 AMQP）或二进制协议（如 TCP）进行，具体取决于这些微服务的性质。\n\n使用 REST 进行微服务间通信简单直接。REST 在其最简单的形式中是同步的，即客户端发送请求并等待服务的响应。因此，客户端代码或客户端线程只有在收到服务器的\
  \ HTTP 响应后才能继续其任务。虽然这没问题，但你可以使用其他范式来实现微服务间通信，而且方式更灵活、更具可扩展性。本章介绍面向消息的微服务，其中微服务可以通过消息骨干网进行通信。\n\
  \n本章涵盖以下概念：\n\n*   微服务的特性\n\n*   基于 REST 的请求-响应风格的微服务间通信\n\n*   微服务间通信对灵活模式的需求\n\
  \n*   消息通道简介\n\n*   使用消息通道进行微服务间通信\n\n*   为 Web 浏览器的请求-响应风格交互带来灵活性\n\n## 微服务的特性\n\
  \n本节首先探讨微服务应用程序的典型特性，这将帮助你理解微服务间通信需要新范式的原因。\n\n\n\n### 微服务是自治的\n\n您知道微服务之间会相互通信，因为单个微服务可能不足以完成端到端的业务用例。同时，微服务架构的目标之一是每个微服务都是自治的，并且对客户端消费者可用，即使构成端到端应用流程的其他微服务宕机或不健康也是如此。这超越了微服务拥有并封装自身数据这一基本原则。\n\
  \n当微服务使用典型的同步风格 REST 进行通信时，它们被称为以点对点的方式进行通信。因此，HTTP 传输是一个点对点通道，它确保只有一个接收者会收到特定的消息（见图\
  \ 4-1）。\n\n![](img/619782_1_En_4_Fig1_HTML.jpg)\n\n一个点对点通信系统的示意图。它描绘了左侧的一个发送者，向一个接收者发送请求。\n\
  \n图 4-1\n点对点通信\n\n图 4-1 展示了一个订单微服务。订单被创建，然后发送到调度微服务。当您从订单微服务调用调度微服务时（例如，为调度订单事件执行\
  \ HTTP 请求），这个调用链可以向客户端应用程序提供响应。当这些微服务中的某些发生故障时，这种架构的弹性将不足。换句话说，如果提供者微服务无法在 SLA 内响应，消费者微服务将收到一个错误。\n\
  \n### 微服务是演进的\n\n一个更好的替代方案是在微服务之间采用松耦合。您可以用消息通道替代 HTTP 通道。同样，消息队列是点对点的，因此您需要使用消息主题，它是一对多的。主题提供了发布-订阅语义，它会将特定事件的副本传递给每个订阅的接收者。\n\
  \n在发布-订阅通道中，一个输入通道分成多个输出通道，每个输出通道对应一个订阅者微服务。当一个事件被发布到通道中时，发布-订阅通道会将消息的副本传递给每个输出通道。每个输出通道只有一个订阅者微服务，该服务只允许消费一次消息。这样，每个订阅者只会收到一次消息；消费过的副本会从它们的通道中消失。见图\
  \ 4-2。\n\n![](img/619782_1_En_4_Fig2_HTML.jpg)\n\n一个发布-订阅通道的流程图。它从发布者向订阅者交付订单开始。订阅者被调度并收到通知。\n\
  \n图 4-2\n发布-订阅通道\n\n这种发布-订阅通道不仅为单个微服务带来了更多的自治性，还允许微服务应用随着时间的推移按自己的节奏演进。换句话说，如图 4-2\
  \ 所示，当微服务应用随时间增长，您需要添加更多微服务时，无需干扰现有架构；甚至无需重启现有的应用部署！\n\n### 蜂巢类比\n\n到目前为止的讨论让我们想到了微服务架构的蜂巢类比。微服务应用架构从第一个、单个微服务开始，逐渐增长到更多的微服务，就像建造蜂巢一样（见图\
  \ 4-3）。\n\n![](img/619782_1_En_4_Fig3_HTML.jpg)\n\n一个类似微服务的蜂巢结构流程图。它从一个六边形结构开始，最终形成蜂巢结构的\
  \ 6 个六边形。\n\n图 4-3\n微服务蜂巢类比\n\n下一节将探讨消息基础设施作为微服务间通信的媒介。\n\n## 异步，仍是请求-回复\n\n我在上一节中故意省略了另一个重要方面，即典型的微服务间通信需要请求-回复语义。消息通道是异步的，通常是单向的，或者仅仅是请求。那么，您如何获得相应的回复呢？本节将讨论这个问题。\n\
  \n### 异步请求\n\nHTTP 通道不仅是同步的，而且还为发送者提供了一种接收回复或响应的机制。然而，如前所述，要充分发挥基于消息的架构的优势，事件委托机制必须是天生异步的。然而，可能有许多用例仍然需要同步风格的请求-回复语义。挑战在于如何在本质上是单向通道的消息通道上模拟请求-回复语义。\n\
  \n### 异步请求-回复\n\n当应用程序发送消息时，它如何通过消息通道从接收者那里获得相应的响应？请求-回复企业集成模式提供了一种经过验证的机制，用于在异步通道上进行同步风格的消息交换（见图\
  \ 4-4）。\n\n![](img/619782_1_En_4_Fig4_HTML.jpg)\n\n一个请求-回复的流程图。发送者应接收者的请求调度了一个订单。图中描绘了一条同步消息。\n\
  \n图 4-4\n通过异步实现请求-回复\n\n解决方案是发送一对请求-回复消息，每条消息都在自己的通道上。但有一个问题。服务提供者或接收者（或服务器角色微服务）可以在其公布的知名通道上接受请求。但是客户端的通道地址呢？多个客户端可以连接到同一个服务器角色的微服务进程，服务器不可能知道或记住回复通道，因为客户端来来去去，未来还可能出现更多的新客户端。相反，一种经过验证的方法是让请求消息包含一个返回地址，指示将回复消息发送到哪里（见图\
  \ 4-5）。\n\n![](img/619782_1_En_4_Fig5_HTML.jpg)\n\n一个返回地址模式的示意图。它从两个请求者开始，它们通过不同的通道向一个回复者发送请求并接收回复。\n\
  \n图 4-5\n返回地址模式\n\n通过将返回地址附加到请求中，回复者无需知道或记住将回复发送到哪里。它只需检查并从请求中推断出来。如果发送给同一个回复者的不同消息需要回复到不同的地方，回复者可以推断出每个请求对应的回复应发送到哪里。这将使用哪些通道进行请求和回复的知识封装在请求者内部，因此这些决策不必硬编码在回复者中。返回地址被放置在消息的头部，因为它不是正在传输的数据的一部分，并且消息传输基础设施无需检查有效载荷。\n\
  \n下一节将用代码演示这个过程。\n\n## 微服务上的同步与异步\n\n在此示例中，您将调整之前看到的同一组微服务。一个消费者微服务和一个提供者微服务将使用消息通道相互通信。为简化示例，提供者微服务将实体存储在内存数据库中。\n\
  \n\n\n### 基于异步通道设计微服务\n\n本示例对第 2 章图 2-1 中展示的六边形微服务视图进行了细微调整，使两个微服务通过异步消息通道而非 HTTP\
  \ 通道进行通信。Apache Kafka 被用作消息通道，它本质上是异步的。请记住，目标是在基于 Kafka 的异步通道上模拟同步风格的通信。参见图 4-6。\n\
  \n![](img/619782_1_En_4_Fig6_HTML.jpg)\n\n微服务通信流程图。流程始于传入的命令、REST API、实体、请求通道以及最终实体。\n\
  \n图 4-6\n\n微服务通过异步通道通信\n\n来自浏览器的最终用户请求将首先到达 Product Web 微服务。Product Web 微服务将通过消息通道将请求委托给\
  \ Product Server 微服务。Product Server 微服务可以自动知道应向哪个通道向 Product Web 微服务发送回复，但如前所述，硬编码的假设会降低软件的灵活性并增加维护难度。在这种情况下，单个\
  \ Product Server 微服务实例可能正在处理来自多个不同请求者类型，甚至来自同一请求者类型的多个实例的调用，因此回复通道并非对每条消息都相同。它取决于发送该请求消息的请求者。在这种情况下，你可以使用返回地址模式。\n\
  \n请注意，此示例中的 Product Server 微服务使用的是消息端口，这与之前示例中使用的 HTTP 端口不同。这进一步验证了六边形架构中不同的端口和适配器如何能够根据需要轻松地插入。\n\
  \n### 理解代码\n\n本书的源代码可通过图书产品页面在 GitHub 上获取，网址为 [`www.apress.com/9798868805547`](http://www.apress.com/9798868805547)。本示例的代码组织在\
  \ `ch04\\ch04-01` 文件夹内。本节首先查看消费者微服务（即 Product Web 微服务）中的变更。\n\n使用的核心组件是 Spring 中的\
  \ `ReplyingKafkaTemplate<K,V,R>`，它扩展了 `KafkaTemplate` 的行为，以提供请求-回复语义。要设置此组件，你需要一个生产者（`ProducerFactory`）和一个\
  \ `KafkaMessageListenerContainer`。清单 4-1 展示了如何使用 Kafka `Configuration` 类来实现这一点。\n\
  \n```\n@Configuration\npublic class KafkaConfig {\n@Bean\npublic Map producerConfigs()\
  \ {\n// 配置值写在这里\n}\n@Bean\npublic Map consumerConfigs() {\n// 配置值写在这里\n}\n@Bean\n\
  public ProducerFactory producerFactory() {\nreturn new DefaultKafkaProducerFactory(\n\
  producerConfigs());\n}\n@Bean\npublic KafkaTemplate kafkaTemplate() {\nreturn new\
  \ KafkaTemplate(producerFactory());\n}\n@Bean\npublic ReplyingKafkaTemplate\nreplyKafkaTemplate(ProducerFactory\
  \ pf, KafkaMessageListenerContainer container){\nreturn new ReplyingKafkaTemplate(pf,\
  \ container);\n}\n@Bean\npublic KafkaMessageListenerContainer\nreplyContainer(\n\
  ConsumerFactory cf) {\nContainerProperties containerProperties =\nnew ContainerProperties(requestReplyTopic);\n\
  return new KafkaMessageListenerContainer(cf,\ncontainerProperties);\n}\n@Bean\n\
  public ConsumerFactory\nconsumerFactory() {\nreturn new DefaultKafkaConsumerFactory(\n\
  consumerConfigs(),\nnew StringDeserializer(),new JsonDeserializer(\nProducts.class));\n\
  }\n@Bean\npublic KafkaListenerContainerFactory>\nkafkaListenerContainerFactory()\
  \ {\nConcurrentKafkaListenerContainerFactory factory =\nnew ConcurrentKafkaListenerContainerFactory();\n\
  factory.setConsumerFactory(consumerFactory());\nfactory.setReplyTemplate(kafkaTemplate());\n\
  return factory;\n}\n@Bean\npublic KafkaAdmin admin() {\nMap configs = new HashMap();\n\
  configs.put(ConsumerConfig.BOOTSTRAP_SERVERS_CONFIG,\nbootstrapServers);\nreturn\
  \ new KafkaAdmin(configs);\n}\n@Bean\npublic NewTopic requestTopic() {\nMap configs\
  \ = new HashMap();\nconfigs.put(\"retention.ms\", replyTimeout.toString());\nreturn\
  \ new NewTopic(requestReplyTopic, 2, (short) 1).\nconfigs(configs);\n}\n}\n清单 4-1\n\
  消息生产者的 Kafka 配置 (ch04\\ch04-01\\02-ProductWeb\\src\\main\\java\\com\\acme\\ecom\\\
  product\\KafkaConfig.java)\n```\n\n为了理解事件传输机制，请考虑一个典型事件（也称为消息）的外观：\n\n*   事件键：“Ria”\n\
  \n*   事件值：“向 Ann 支付了 300 美元”\n\n*   事件时间戳：“2021 年 9 月 25 日下午 3:06”\n\n每个事件都有一个发起者，并且事件通常是时间序列数据。如果你查看发送事件的模板，`ReplyingKafkaTemplate\
  \ <K, V, R>` 在消息被提供者或生产者端的 Kafka 监听器消费后，会提供一个返回对象或回复对象。类型参数表示：\n\n*   `K` – 键类型\n\
  \n*   `V` – 出站数据类型\n\n*   `R` – 回复数据类型\n\n此处，示例事件中显示的事件时间戳可以是一个可选的元数据标头。键用于确定消息被追加到消息基础设施日志中的哪个分区。值是消息的实际负载。当新事件发布到主题时，它会被追加到该主题的某个分区中。具有相同事件键（例如，客户\
  \ ID 或账户 ID）的事件会被写入同一分区，并且 Kafka 保证给定主题-分区的任何消费者将始终按照写入顺序读取该分区的事件。\n\n键和/或值也可以为\
  \ null。如果键为 null，则会随机选择一个分区。如果值为 null，并且你为主题启用了日志压缩策略而非日志保留策略，则它可以具有特殊的“删除”语义。\n\
  \n\n\n使用键（key）将消息定向到特定分区是生产者的默认策略。如果你在某个主题上拥有多个消费者组^(³)中的消费者，那么指定键以确保所有具有相同键的事件都进入同一个分区，对于保证消息处理的正确顺序至关重要。如果没有键，两个具有相同键的消息可能会进入不同的分区，并由组中不同的消费者处理，从而导致顺序错乱。\n\
  \n最终，由生产者决定使用哪个分区。如果你指定了分区参数，则会使用该参数，而键将被“忽略”，尽管它仍然会被写入主题。这允许你在拥有键的情况下实现自定义分区。换句话说，顺序保证并非来自键，而是来自消息位于同一分区。重申一下，消息到分区的路由不必基于键。你可以在创建\
  \ `ProducerRecord` 时显式指定一个分区。\n\n此示例将 Bean 定义为 `ReplyingKafkaTemplate<String, String,\
  \ Products>`，你将向 Kafka 发送一个 `String` 类型的请求，然后获取 `Products` 类型的对象作为回复数据类型。你将在下一节中创建\
  \ Products 及其包含的 DTO 类。总而言之，你设置了一个 `ReplyingKafkaTemplate`，它发送带有 `String` 键的请求消息，并接收带有\
  \ `String` 键的回复消息。`ReplyingKafkaTemplate` 需要由 `Request ProducerFactory`、`ReplyConsumerFactory`\
  \ 和 `MessageListenerContainer` 支持，并带有相应的消费者和生产者配置，这些已在清单 4-1 的 `KafkaAdmin` 中完成。\n\
  \n当你在应用程序上下文中定义一个 `KafkaAdmin` Bean 时，它可以自动向代理添加主题。为此，你需要为每个主题向应用程序上下文添加一个 `NewTopic\
  \ @Bean`。\n\n`ContainerProperties` 包含监听器容器的运行时属性。尽管你使用 `requestReplyTopic` 指定了回复地址，但你稍后会看到，此示例在发送消息时显式设置了返回地址。它使用\
  \ Java 消费者创建了一个单线程的消息监听器容器。\n\n在 `ReplyingKafkaTemplate` 中使用的 REST 控制器类，在清单 4-2\
  \ 的 `KafkaAdmin` 中进行了配置。\n\n```\n@RestController\npublic class ProductRestController{\n\
  @Autowired\nReplyingKafkaTemplate kafkaTemplate;\n@Value(\"${kafka.topic.request-topic}\"\
  )\nprivate String requestTopic;\n@Value(\"${kafka.topic.requestreply-topic}\")\n\
  private String requestReplyTopic;\n@RequestMapping(value = \"/productsweb\",\nmethod\
  \ = RequestMethod.GET,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\npublic ResponseEntity>>\n\
  getAllProducts() throws InterruptedException,\nExecutionException {\nProducerRecord\
  \ record =\nnew ProducerRecord(requestTopic, \"All\");\nrecord.headers().add(new\
  \ RecordHeader(\nKafkaHeaders.REPLY_TOPIC,\nrequestReplyTopic.getBytes()));\nRequestReplyFuture\n\
  sendAndReceive =\nkafkaTemplate.sendAndReceive(record);\nConsumerRecord consumerRecord\
  \ =\nsendAndReceive.get();\nreturn new ResponseEntity(consumerRecord.value().\n\
  getProducts(), HttpStatus.OK);\n}\n}\n清单 4-2\n消息生产者的 Kafka 配置 (ch04\\ch04-01\\02-ProductWeb\\\
  src\\main\\java\\com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n\
  ```\n\nREST 控制器接收来自客户端设备（本例中为浏览器）的请求。在控制器内部，`requestReplyKafkaTemplate` 生成并设置一个\
  \ `KafkaHeaders.CORRELATION_ID` 头。`CorrelationId` 应由提供者微服务消费，并在响应头中返回相同的值。你需要显式地在请求上设置\
  \ `KafkaHeaders.REPLY_TOPIC` 头，尽管之前在 `KafkaConfig` 中已经将相同的回复主题冗余连接到了 `replyListenerContainer`。\n\
  \n`ReplyingKafkaTemplate` 的 `sendAndReceive` 方法发送一个请求并在默认超时时间内接收回复。它会返回一个 `RequestReplyFuture`，你可以对其调用\
  \ `get` 方法，该方法会在必要时等待计算完成，然后检索其结果。本例中为 `Products`。\n\n接下来，查看 `Products` 类。参见清单 4-3。\n\
  \n```\npublic class Products {\nprivate List products;\npublic List getProducts()\
  \ {\nreturn products;\n}\npublic void setProducts(List products) {\nthis.products\
  \ = products;\n}\n}\n清单 4-3\n用于返回产品实体集合的容器类 (ch04\\ch04-01\\02-ProductWeb\\src\\\
  main\\java\\com\\acme\\ecom\\product\\model\\Products.java)\n```\n\n`Products` 只是一个容器包装器，用于保存\
  \ `Product` 实例的集合。\n\nProduct Web 微服务的配置如清单 4-4 所示，其中 `requestreply-topic` 指的是提供者应发送响应的主题。\n\
  \n```\nserver.port=8080\nspring.kafka.bootstrap-servers: localhost:9092\nspring.kafka.consumer.auto-offset-reset:\
  \ earliest\nspring.kafka.consumer.group-id: product-web\nkafka.topic.requestreply-topic:\
  \ product-req-reply-topic\nkafka.topic.request-topic=product-req-topic\nkafka.request-reply.timeout-ms:\
  \ 20000\n清单 4-4\nProduct Web 微服务配置 (ch04\\ch04-01\\02-ProductWeb\\src\\main\\resources\\\
  application.properties)\n```\n\n在 Product Server 微服务端，一个常规的 `KafkaListener` 正在监听请求主题。参见清单\
  \ 4-5。\n\n```\n@Component\npublic class ProductListener {\n@KafkaListener(topics\
  \ = \"${kafka.topic.request-topic}\")\n@SendTo\npublic Products listen(String request)\
  \ {\nList productList = getAllTheProducts();\nProducts products = new Products();\n\
  products.setProducts(productList);\nreturn products;\n}\n}\n清单 4-5\nProduct Web\
  \ 微服务配置 (ch04\\ch04-01\\01-ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\\
  kafka\\client\\ProductListener.java)\n```\n\n此监听器额外使用了 `@SendTo` 注解来提供回复消息。由 `getAllTheProducts()`\
  \ 方法检索并由 `listener` 方法返回的 `Product` 实例会自动包装到回复消息中。`CORRELATION_ID` 被添加，回复被发布到 `REPLY_TOPIC`\
  \ 指定的主题上。`@KafkaListener` 用于订阅请求 Kafka 主题。使用该注解，`@SendTo` 注解使 `listener` 方法能够将响应发送到另一个回复主题。图\
  \ 4-7 说明了这些交互的动态过程，并按照事件流顺序进行了标记。\n\n![](img/619782_1_En_4_Fig7_HTML.jpg)\n\nKafka\
  \ 模板回复的流程图。它由产品 Web 和服务器微服务两个模块组成。回复 Kafka 模板包含一个 Kafka 生产者和一个回复容器。\n\n图 4-7\n\n\
  回复 Kafka 模板\n\n提供者微服务也有一个 `KafkaConfig`，但与消费者微服务相比，它简单直接，因此此处未列出。\n\n\n\n### 构建并运行微服务\n\
