    \ `stdout` 插件将消息发送到控制台，而 `file` 插件则将消息记录写入本地文件。\n\n还有更多的输出插件。下面是一个几乎完整的列表：\n\n\
    *   `null`\n\n    丢弃消息。\n\n*   `stdout`\n\n    将消息写入附加到 Fluentd 进程的控制台。你主要在开发和调试目的时使用此插件。\n\
