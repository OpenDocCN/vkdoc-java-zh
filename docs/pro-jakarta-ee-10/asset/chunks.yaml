- fmt: '# Spring Boot


    Spring Boot has a bias toward distributed microservices. If this contradicts your
    application’s architecture, Spring Boot might not be your best choice.


    # Vue


    Vue is a templating framework, similar to Angular, but with less complexity and
    a more modular approach.


    ```

    https://vuejs.org

    ```


    **Pros:**


    - Uses JavaScript as a frontend logic idiom, so there is no need to learn TypeScript
    as is the case for many other frameworks.

    - Vue is incrementally adoptable, meaning you can introduce Vue step-by-step in
    your web application.

    - Allows for fast development, since all templating happens on-the-fly by the
    pages’ JavaScript code.

    - While being optional, it is possible to render HTML pages on the server, speeding
    up page loading (at the cost of server load, of course).


    **Cons:**


    - While Vue can be included in your web application by simply using a `<script>`
    tag in the web applications HTML page(s), the documentation suggests using Node.js
    for a build environment. This introduces a new paradigm based on JavaScript as
    a script language.


    # Spring MVC


    Spring MVC is the less “convention over configuration” sibling of Spring Boot.
    What you read about Spring Boot previously holds for Spring MVC, except that Spring
    MVC requires more configuration work. This, in turn, leads to an increased versatility
    of Spring MVC if compared to Spring Boot, with the cost of more work to be done
    to get it working.


    ```

    https://spring.io/guides/gs/serving-web-content/

    ```


    **Pros:**


    - Lines up with the Spring architecture, with a component hierarchy built up by
    injection.

    - Good documentation.


    **Cons:**


    - High grade of complexity.

    - Spring might be considered a competitor to Jakarta EE, although Spring and Jakarta
    mutually adopt features from each other during their version upgrades. Mixing
    both is possible, but introduces a new level of complexity to the application
    development.

    - Spring is a “let others do your job” framework. By using Spring sub-technologies
    or Spring modules, you somehow lose control over the internal function of your
    application. This is something you might not want to do.


    # Ember


    Ember is another template-based web application framework that relies on Node.js
    as a build and execution framework.


    ```

    https://emberjs.com/

    ```


    **Pros:**


    - Heavily *convention over configurations* based, allowing for Lean code.


    **Cons:**


    - Although *convention over configuration* based, Ember seemingly has a steeper
    learning curve compared to other frameworks.

    - Ember depends on Node.js, which introduces a new paradigm based on JavaScript
    as a server code language. Using Ember together with Jakarta EE means you have
    to maintain two ecosystems—Java and JavaScript. Also, Node.js introduces another
    vendor lock-in: Private and company owned software repositories for Node.js modules
    are not easy to build and maintain.

    - Ember introduces a full-stack web application technology. It is therefore a
    competitor to Jakarta EE and mixing both in a stable manner is challenging.


    # Act.Framework


    ```

    http://actframework.org/

    ```


    **Pros:**


    - Uses dependency injection, allowing for Lean code.

    - By relying on REST for frontend-to-backend communication, exhibits a clear and
    high-performing architecture.

    - Uses Maven for builds, therefore better integrates with the Jakarta EE build
    processes.

    - Allows you to choose between different rendering (templating) engines.


    **Cons:**


    - Templating is done by third-party libraries, which leads to leaving the Jakarta
    EE specification. While code might be smaller compared to Faces, using `Act.Framework`
    introduces additional project complexity due to the need to monitor backend (Jakarta
    EE) and frontend (`Act.Framework`) specification development.


    # Apache Struts 2


    Apache Struts is a venerable frontend technology that follows the MVC (model view
    controller) paradigm.


    ```

    https://struts.apache.org

    ```


    **Pros:**


    - By design, Apache Struts tries not to hide the stateless nature of the HTTP
    protocol. Thus Struts might be considered a “clean” web development approach.

    - Struts is a seasoned web development framework showing a high grade of stability
    and is expected to be future-proof.


    **Cons:**


    - There is a steep learning curve and some proficiency in understanding the HTTP
    request-response cycle is required.

    - While Struts 2 supports several frontend templating engines or can even go without
    elaborate templating by utilizing REST, Struts exhibits some bias toward the “old
    fashioned” JSP technology.


    # GWT


    GWT by Google Inc. is basically a compilation engine transforming Java classes
    into JavaScript, which then can be executed in a browser.


    ```

    http://www.gwtproject.org/

    ```


    **Pros:**


    - Takes away the need to develop any JavaScript code. Everything is just Java.

    - It is possible to migrate from a common web application to GWT iteratively.

    - Good integration into IDEs like Eclipse.

    - Good debugging support.


    **Cons:**


    - You are somewhat limited to build web applications the way the Google people
    think of.

    - Java by itself is not good at defining HTML markup. The transition from Java
    to JavaScript and HTML, although automated by GWT, is far away from being a simple,
    clean procedure.

    - There is no easy way to do things. A first working web application version will
    show up much later compared to other web application frameworks.

    - Writing good GWT applications requires a lot of Java development skills.


    # Vaadin


    Vaadin is a Java-based web development framework. The distribution distinguishes
    between a free variant with basic features and a paid variant with more elaborated
    modules.


    ```

    https://vaadin.com/

    ```


    **Pros:**


    - Explicitly addresses PC browsers and handhelds.

    - Includes elaborated components for grid data, charts, and dialogs.

    - Professional looking UI design by default.

    - Explicit Java EE (/Jakarta EE) support.

    - Maven and Gradle build tooling.

    - You only need Java for the complete web application.


    **Cons:**


    - Separated into free basic features and paid pro features. This always bears
    the risk that one day you might be forced to pay for features you formerly considered
    as basic.

    - The UI logic and state is stored on the server. This leads to a performance
    impact for heavy-load publicly available applications.

    - Fine-grained frontend customization, for example animation, is hard to achieve.


    # DataTables


    This is a `jQuery` plugin. While it’s not a multi-purpose frontend technology,
    `DataTables` enables you to show and edit tabular data on the browser in a very
    versatile manner. In in-house applications, listing tabular data and editing the
    data are common tasks, and `DataTables` helps you rapidly implement such applications
    with Jakarta EE running in the background.


    ```

    https://www.datatables.net/

    ```


    **Pros:**


    - Easy integration. As a `jQuery` plugin, `DataTables` imposes no restrictions
    on the backend technology in use.

    - Highly flexible.

    - Powerful search features.

    - Well documented.


    **Cons:**


    - Not a multi-purpose frontend technology.


    # D3js


    D3js is a powerful visualization library. It helps you visualize scientific and/or
    business related data.


    ```

    https://d3js.org/

    ```


    **Pros:**


    - Very flexible visualization library.

    - Highly professional looking design.

    - Simple inclusion by HTML `<script>` tags.


    **Cons:**


    - Not a multi-purpose frontend technology.

    - It takes some time to get an overview of all the features.

    - To use it, good JavaScript skills are required.


    # 12. Form-Based Authentication'
