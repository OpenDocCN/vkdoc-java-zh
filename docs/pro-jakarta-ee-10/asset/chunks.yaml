    This chapter covers using Faces 4.0’s built-in templating engine, called *Facelets*.
    Compared to using plain Faces, you can use Facelets to further modularize your
    frontend code and improve code quality, reuse, and maintenance.


    Note


    The old name of Faces, *JSF*, is no longer used.


    ## Faces Templating via Facelets


    While you can create a full page-flow web application by using various fully defined
    Faces (XHTML) pages and the tags from the following component namespaces, it is
    probably not the cleverest way to rely on those three tag libraries:


    ```

    h="jakarta.faces.html"

    f="jakarta.faces.core"

    pt="jakarta.faces.passthrough"

    ```


    (The last is a pseudo-component namespace for attributes *not* to be handled by
    Faces.) If you have a common page structure with, for example, a header, a menu,
    a footer, and a content area, all Faces pages have to repeat all the page elements
    that are common to the different application parts. This is a violation of the
    DRY (Don’t Repeat Yourself) principle. Instead, it would be better if you could
    use templating mechanisms to compose pages, given patterns, (*X*)HTML snippets,
    and placeholders.


    Faces includes such a templating technology, and it is called *Facelets*. Facelets
    allows you to introduce parameterized template HTML pages, HTML snippets (components)
    to be included in pages, placeholders for such snippets, and decorators and repetitions
    for things like elaborated list views. In the following sections, you learn about
    the configuration issues and about the Facelets tags. In the last section of this
    chapter, you develop a sample application to get you started.


    This sample application mimics the functionality of an online music box. It includes
    a header, a footer, and a menu that appears on every page of the web application,
    no matter which functionality the user is currently using. Facelets does a good
    job at letting you factor out common page parts so you have to code them only
    once. See Figure [7-1](#490565_1_En_7_Chapter.xhtml#Fig1).


    ![](images/490565_1_En_7_Chapter/490565_1_En_7_Fig1_HTML.png)


    An illustration of the H T M L template. It includes 5 boxes with the text, placeholder,
    and 3 dots. The boxes named snippet or component point to the placeholders.


    Figure 7-1


    Templating with Facelets


