    ```


    （`javaee/` 后面不应有换行符或空格。）这个文件没有什么特别之处；只需确保将 `book.jakartapro.formbasedauth.web`
    替换为 `src/main/resources` 中存放语言资源的文件夹即可。对于这个示例项目，你可以保留原样。


    对于 `glassfish-web.xml` 文件，目前只需编写以下内容：


    重要的配置部分将写入 `web.xml`。在这里，你需要定义一个安全约束和一个登录配置，如下所示：


