    \ the project setup. Error markers won’t disappear until everything is downloaded\
    \ and reconfigured.\n\nThe new project view in NetBeans will now look similar\
    \ to Figure [3-1](#490565_1_En_3_Chapter.xhtml#Fig1). After you start the server,\
    \ you can double-click the `deployWar` task to build and deploy the project.\n\
    \n![](images/490565_1_En_3_Chapter/490565_1_En_3_Fig1_HTML.jpg)\n\nA window screenshot\
    \ lists different projects such as Rest Date, resources, and build scripts with\
    \ another window screenshot below that lists different navigators such as documentation\
    \ and verification.\n\nFigure 3-1\n\nRestDate migrated to NetBeans\n\nIn the rest\
    \ of this book, you use Eclipse, but in this chapter you have seen that migrating\
    \ to and using a different IDE is easy.\n\n# 4. Git and Subversion\n\nVersion\
    \ control systems serve several purposes. First, they are a kind of backup system.\
    \ Once committed (or pushed, in the case of Git), a file has a persisted copy\
    \ on some server, so if a developer’s machine crashes, the files are not lost.\
    \ Second, a version control system keeps a history of file versions, so an edit\
    \ will not lead to previous versions being lost. Third, a continuous integration\
    \ (CI) system might be connected to a version control system repository, which\
    \ means development artifacts can be automatically published to integration systems\
    \ for testing and then later released to some production (or pre-production) system.\n\
    \nThis chapter covers the Subversion and Git version control systems. Other version\
    \ control systems exist, but Git and Subversion are the most commonly used products.\n\
    \nNote\n\nFor client-side usage only, skip to the “Subversion Clients” and “Git\
    \ Clients” sections. Using Git and Subversion clients is well documented in manuals\
    \ and tutorials. The rest of this chapter is about installing corporate Subversion\
    \ or Git servers, which makes sense if you don’t want to host sources outside\
    \ your company."
  trans: "\n## 更改项目布局\n\n到目前为止，你将所有文件工件放置到了以下位置：\n\n```\nJava 源码 -> src/main/java\n\
    测试源码 -> src/test/java\nWeb 文件 -> src/main/resources\n```\n\n你无需在 `build.gradle`\
    \ 文件中指定这些路径，因为它们是 Gradle 默认使用的位置。顺便提一下，Maven 构建框架也使用相同的位置。不过，有充分的理由可以偏离这种布局。最主要的原因是你有一个预设的布局，因为版本控制系统的检出操作规定了它。在这种情况下，告诉\
    \ Gradle 在哪里查找文件并不困难。在 `build.gradle` 文件中，只需添加以下内容：\n\n```\nsourceSets {\nmain\
    \ {\njava {\nsrcDirs = ['path/to/folder']\n}\nresources {\nsrcDirs = ['path/to/folder']\n\
    }\n}\ntest {\njava {\nsrcDirs = ['path/to/folder']\n}\nresources {\nsrcDirs =\
    \ ['path/to/folder']\n}\n}\n}\n```\n\n将 `path/to/folder` 替换为你自定义的项目布局文件夹。`[ ...\
    \ ]` 是 Groovy 语言的列表，因此你也可以在其中放置一个逗号分隔的列表来指定多个文件夹，这些文件夹将被合并。\n\n# 3. 使用 NetBeans\
    \ 作为 IDE 进行开发\n\n大多数现代 IDE 都能满足你的开发需求，包括支持 Groovy 和 Gradle、版本控制、编译和运行 Java 等。我可以加入更多“使用\
    \ *XXX* 作为 IDE”的章节，填满半本书，但大多数 IDE 遵循相似的概念，具有帮助功能，并提供教程和示例。开发工作流程的路径通常遵循以下步骤：\n\
    \n1.  学习如何创建项目、文件和文件夹。\n2.  学习如何编辑文件：Java、XML、资源、脚本文件等。\n3.  学习如何连接项目和 JRE。\n\
    4.  学习如何向项目添加 Gradle 功能。\n5.  学习如何添加版本控制。\n6.  学习使用更多次要但有用的工具。\n\n你已经学会了如何使用 Eclipse，它提供了开发和部署\
    \ Jakarta EE 项目所需的一切。作为可用于开发的第二个 IDE 示例，本章简要探讨了另一个由 Apache 维护的免费 IDE，名为 NetBeans。\n\
    \n## 安装 NetBeans\n\n访问 [`https://netbeans.apache.org/`](https://netbeans.apache.org/)\
    \ 并下载 NetBeans。选择适合你操作系统的安装程序之一。你也可以安装二进制版本，例如 `netbeans-16-bin.zip`，但随后你必须手动设置一些安装程序本应为你完成的配置。\n\
    \n下载页面上描述了更多安装选项。\n\n注意\n\n与 Eclipse 不同，NetBeans IDE 将一些设置存储在 `USER_HOME/.netbeans`\
    \ 文件夹中。如果你想卸载 NetBeans 或从头重新安装，请记住这一点。\n\n## 启动 NetBeans 项目\n\n选择文件 ➤ 新建项目...\
    \ 来生成一个新项目。然后选择其中一个带有 Gradle 的 Java 项目模板：\n\n*   **Java 应用程序**\n\n    生成一个基本的\
