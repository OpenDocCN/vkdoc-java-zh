    Inside the `MarvinEjb` sub-project, add a folder called `src/main/java/book/jakartapro/marvin/ejb`
    and then add `src/main/java` as a source folder by right-mouse-clicking (project)
    ➤ Properties ➤ Java Build Path ➤ Source. Add a configuration helper class to the
    `book/jakartapro/marvin/ejb` package, as follows:


    ```

    package book.jakartapro.marvin.ejb;

    import java.io.File;

    import java.io.FileOutputStream;

    import java.io.IOException;

    import java.io.InputStream;

    import org.apache.commons.configuration2.Configuration;

    import org.apache.commons.configuration2.builder.fluent.

    Configurations;

    import org.apache.commons.configuration2.ex.

    ConfigurationException;

    import org.apache.commons.io.IOUtils;

    public class Conf {

    private static Conf INSTANCE = null;

    public static Conf getInstance() {

    if(INSTANCE == null) INSTANCE = new Conf();

    return INSTANCE;

    }

    private Configuration c;

    private Conf() {

    try {

    Configurations configs = new Configurations();

    // From Class, the path is relative to the package

    // of the class unless you include a leading slash,

    // so if you don''t want to use the current package,

    // include a slash like this:

    InputStream ins = this.getClass().

    getResourceAsStream("/marvin.properties");

    File f = File.createTempFile("marvin-x48", null);

    IOUtils.copy(ins, new FileOutputStream(f));

    c = configs.properties(f);

    f.delete();

    } catch (ConfigurationException | IOException e) {

    e.printStackTrace(System.err);

    }

    }

    public String string(String key) {

    return c.getString(key);

    }

    }

    ```


    The sole purpose of this class is to simplify configuration access. The EJB implementation
    class is called `LocalMirror`. As its contents, write the following:


    ```

    package book.jakartapro.marvin.ejb;

    import java.io.File;

    import java.io.FileInputStream;

    import java.io.InputStream;

    import java.net.HttpURLConnection;

    import java.net.URL;

    import jakarta.ejb.Local;

    import jakarta.ejb.Stateless;

    import jakarta.ws.rs.core.Response.ResponseBuilder;

    import org.apache.commons.io.FileUtils;

    import org.apache.commons.io.IOUtils;

    import book.jakartapro.marvin.ejb.interfaces.

    LocalMirrorLocal;

    @Stateless

    @Local(LocalMirrorLocal.class)

    public class LocalMirror {

    static Conf conf = Conf.getInstance();

    public byte[] fetchBytes(String path,

    ResponseBuilder rb) {

    String repoDir = conf.string("repoDir");

    File f = new File(repoDir + "/" + path);

    // If the file does not exist in our local (mirror)

    // repository, we contact the external (public)

    // Maven repository. This is the place where you

    // could add filters

    if (!f.exists())

    loadExternal(path, f, rb);

    // If it still does not exist, the public repo doesn''t

    // have it either (and it was not copied into our

    // mirror repo), and we output an error message.

    // Otherwise read the bytes

    if (!f.exists()) {

    rb.type("text/plain");

    return ("Cannot load ''" + path + "''\n").getBytes();

    } else {

    try {

    return IOUtils.toByteArray(

    new FileInputStream(f));

    } catch (Exception e) {

    }

    return null;

    }

    }

    ////////////////////////////////////////////////////////

    ////////////////////////////////////////////////////////

    private void loadExternal(String path, File tgtFile,

    ResponseBuilder rb) {

    try {

    // Contact the external (public) repositories until

    // we find the file requested

    InputStream ins = null;

    String[] urls = conf.string("externalRepos").

    split(",");

    for (String r : urls) {

    HttpURLConnection c = (HttpURLConnection)

    new URL(r + "/" + path).openConnection();

    c.setRequestProperty("User-Agent", "Marvin");

    int respCode = c.getResponseCode();

    rb.status(respCode);

    if (respCode != 200)

    continue; // not yet found

    ins = c.getInputStream();

    break;

    }

    if (ins != null)

    writeToMirror(ins, tgtFile);

    } catch (Exception e) {

    e.printStackTrace(System.err);

    }

    }

    // Mirror the file in our local repo

    private void writeToMirror(InputStream ins,

    File tgtFile) throws Exception {

    tgtFile.getParentFile().mkdirs();

    FileUtils.copyInputStreamToFile(ins, tgtFile);

    }

    }

    ```


    Add the EJB interface `LocalMirrorLocal.class` inside the `book/jakartapro/marvin/ejbinterfaces`
    package:


    ```

    package book.jakartapro.marvin.ejb.interfaces;

    import jakarta.ws.rs.core.Response.ResponseBuilder;

    public interface LocalMirrorLocal {

    byte[] fetchBytes(String path, ResponseBuilder rb);

    }

    ```


    This interface will be needed by clients to use the EJB.


    ### Building and Deploying the EAR


    To build the EAR, double-click Marvin ➤ Build ➤ EAR inside the Gradle Tasks view.
    The generated EAR file will be placed in the `build/libs` project.


    **Caution:** Eclipse filters out the `build` folder from the Package Explorer
    view. To see the folder, open the menu (find the menu button inside the taskbar)
    and navigate to Filters. Then uncheck the Gradle Build Folder entry. Press F5
    on that folder to let Eclipse reread its contents.


    To deploy the EAR file on the local server, select Marvin ➤ Other ➤ deployEar.
    This task depends on the EAR task, so to build *and* deploy the deploy task is
    enough. Obviously, the server must be running for this to work.


    **Caution:** You must check Show All Tasks in the Gradle Task menu to see this
    custom task.


    ### Using the Corporate Repository


    To use that corporate Maven repository in your `build.gradle` build files, enter
    the following:


    ```

    repositories {

    maven {

    url ''http://serv.er.addr:8080/MarvinWeb/repo

    }

    }

    ```


    Substitute the repository’s server address. The port is the GlassFish HTTP connector’s
    standard port. If you changed this, you have to change the port number accordingly.


    **Note:** To perform a quick check in your browser, enter this for example:


    [`http://serv.er.addr:8080/MarvinWeb/repo/junit/junit/4.13.2/junit-4.13.2.pom`](http://serv.er.addr:8080/MarvinWeb/repo/junit/junit/4.13.2/junit-4.13.2.pom)


    ### A Sample Java Library


    As an example, you can write a simple library Gradle project with one Java class
    that counts word frequencies in some arbitrary text. Start a new Gradle project
    and replace the contents of the `build.gradle` file with the following:


    ```

    plugins {

    id ''java-library''

    }

    sourceCompatibility = 1.17

    targetCompatibility = 1.17

    repositories {

    jcenter()

    }

    dependencies {

    api ''org.apache.commons:commons-math3:3.6.1''

    implementation ''com.google.guava:guava:28.0-jre''

    testImplementation ''junit:junit:4.13.2''

    }

    ```


    The class reads as follows:


    ```

    package book.jakartapro.textutils;

    import java.util.Comparator;

    import java.util.List;

    import java.util.stream.Collectors;

    import com.google.common.base.CharMatcher;

    import com.google.common.base.Splitter;

    import com.google.common.collect.HashMultiset;

    import com.google.common.collect.Multiset;

    public class TextUtils {

    public static class Pair {

    public S s;

    public T t;

    public Pair(S s, T t) {

    this.s = s;

    this.t = t;

    }

    public S first() { return s;}

    public T second() { return t; }

    @Override public String toString() {

    return "(" + s + "," + t + ")"; };

    }

    public static List>

    wordFrequenciesSorted(String text) {

    Multiset mus = Splitter.

    onPattern("[^\\p{L}\\p{Nd}]+").

    trimResults(CharMatcher.anyOf(

    ".,;:-''\"!?=()[]{}*/")).

    omitEmptyStrings().

    splitToList(text).stream().collect(

    () -> { return HashMultiset.create(); },

    (ms,str) -> { ms.add(str.toLowerCase()); },

    (ms1,ms2) -> { ms1.addAll(ms2); });

    return mus.entrySet().stream().

    sorted(Comparator.comparing((e) -> {

    return String.format("%09d-%s",

    10000000-e.getCount(),

    e.getElement());

    })).

    map((Multiset.Entrye) -> {

    return new Pair(e.getElement(),

    e.getCount()); }).

    collect(Collectors.toList());

    }

    }

    ```


    You can see that this example uses the `java-library` plugin, not `java`. The
    difference is that the former introduces two dependency types—`implementation`
    and `api`—and the latter describes a dependency transitively forwarded to client
    projects referring to the library. In contrast, `implementation` is needed only
    internally by the library.


    You can then push all files to a Git repository, and afterward you can invoke
    the `toRepo.sh` script that I talk about in the following section to copy the
    library to the Maven repository.'
