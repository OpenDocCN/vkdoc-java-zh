- fmt: '# The Test Plan


    The test plan now looks like Figure [36-2](#490565_1_En_36_Chapter.xhtml#Fig2).
    You can start the test from the JMeter GUI. Select the `Graph Result` listener
    in order to see how the performance figures develop.


    ![](images/490565_1_En_36_Chapter/490565_1_En_36_Fig2_HTML.jpg)


    A window of the JMeter test plan, where the test plan on the left is selected.
    It displays the name, comments, and user-defined variables. It selects the option
    to run teardown thread groups after a shutdown of main threads.


    **Figure 36-2** *JMeter test plan*


    # Frontend Tests with Selenium


    Selenium is a browser automation tool. Contrary to JMeter, Selenium simulates
    real browser activities, including JavaScript code. There are two operating modes
    for Selenium: either you use a web driver scriptable via Java API (other languages
    are available), or you use the Selenium IDE, which is a browser plugin with GUI-style
    scripting capabilities.


    Although technically possible, you normally don’t use Selenium to generate significant
    load on a web application server. Running many Selenium instances in parallel
    requires the allocation of a huge amount of CPU resources. And you don’t need
    that—in the end, server applications are not getting triggered by client applications,
    but by the protocol data clients send to servers. If you really think Selenium
    will help you reach your project goals, it makes much more sense to generate load
    via JMeter and then let just *one* Selenium instance run in parallel.


    You can download Selenium from [`https://www.selenium.dev`](https://www.selenium.dev).
    This is also where you can find other documentation.


    # Analyzing Performance Figures


    After you run a test, the elapsed time of the whole workflow or some part of it
    is the most interesting outcome. The output from JMeter’s `Simple Data Writer`
    listener could look as follows:


    ```

    timeStamp,elapsed,label,responseCode,responseMessage,...

    1649233423985,743,HTTP Request,200,OK,...

    1649233424077,651,HTTP Request-1,200,OK,...

    1649233424484,481,HTTP Request,200,OK,...

    1649233424525,440,HTTP Request-1,200,OK,...

    ...

    ```


    To simplify this point, I remove the header and reduce the data set to just the
    timestamp and the elapsed number:


    ```

    1649233423985,743

    1649233424077,651

    1649233424484,481

    1649233424525,440

    ...

    ```


    The Linux command to perform this transformation is as follows:


    ```

    cat testout.csv | tail -n+2 | cut -d'','' -f1,2 \

    > testout2.csv

    ```


    # Reducing the File Size


    After a long test, the test outcome file may contain 100,000 or more lines. Handling
    such big files inside a spreadsheet program, maybe to draw diagrams, is a very
    time-consuming and tedious task. For this reason, you can reduce the file. Keeping
    only every Nth line and throwing away all the other lines is easy. Just enter
    the following in a terminal to keep every second, third, or forth line:


    ```

    cat testout2.csv | awk ''(NR+1)%2==0'' > testout3.csv

    - or -

    cat testout2.csv | awk ''(NR+1)%3==0'' > testout3.csv

    - or -

    cat testout2.csv | awk ''(NR+1)%4==0'' > testout3.csv

    ...

    ```


    # Plotting a Performance Chart


    You can now import your data into a spreadsheet program, for example LibreOffice
    Calc. After the import, you get the timestamps in Column A and the elapsed time
    in Column B. As a first refinement, you can add a column for the test timeline.
    To this aim, insert a new column next to the first column and enter this formula
    inside cell `B1`:


    ```

    =(A1-A$1)/1000

    ```


    Use the fill handle of cell `B1` to fill the whole column with this formula; see
    Figure [36-3](#490565_1_En_36_Chapter.xhtml#Fig3).


    ![](images/490565_1_En_36_Chapter/490565_1_En_36_Fig3_HTML.jpg)


    A table of test timelines has 6 rows and 3 columns A, B, and C. Cell `B1` has
    a formula that is `=(A1-A$1)/1000`.


    **Figure 36-3** *Test timeline has been added*


    > **Note:** Press `Ctrl` and `Left+Mouse-Double-click` the fill handle to fill
    the whole column at once.


    If you now create a chart from the raw data, you’ll get a cloud like the one shown
    in Figure [36-4](#490565_1_En_36_Chapter.xhtml#Fig4).


    ![](images/490565_1_En_36_Chapter/490565_1_En_36_Fig4_HTML.jpg)


    A scatterplot for an elapsed time chart represents raw scattered data between
    10 and 70 values on the x-axis and between 0 and 1000 on the y-axis.


    **Figure 36-4** *Elapsed time chart*


    This chart is not very expressive—you cannot reliably tell what the average elapsed
    time is, nor how the elapsed time develops during a test. For this reason, you
    can add another column and calculate the moving average. Inside the cell at `D20`
    add this formula:


    ```

    =SUM(C1:C20)/20

    ```


    Fill all cells below cell `D20` using the fill handle of cell `D20`. Figure [36-5](#490565_1_En_36_Chapter.xhtml#Fig5)
    shows the result. This produces a moving average using a frame length of 20 items.
    Using ten items instead (change the formula!) generates a less smooth line—bigger
    frames lead to more smoothing.


    ![](images/490565_1_En_36_Chapter/490565_1_En_36_Fig5_HTML.jpg)


    A table of test timelines has 12 rows and 4 columns A, B, C, and D. Cell `D20`
    has a formula that is `=SUM(C1:C20)/20`.


    **Figure 36-5** *Moving average column added*


    Another interesting figure is standard deviation. It tells you how much the elapsed
    times differ from their average. The formula for standard deviation is as follows:


    ![$$ \sqrt{\frac{\sum \limits_i^n{\left({y}_i-\overline{y}\right)}^2}{n-1}} $$](images/490565_1_En_36_Chapter/490565_1_En_36_Chapter_TeX_Equa.png)


    To add it to the spreadsheet, you first use a column for the squared distance
    from the elapsed time to its moving average. In cell `E20`, write the following:


    ```

    =(D20-C20)*(D20-C20)

    ```


    Fill all cells below cell `E20` using the fill handle of cell `E20`. Now, in cell
    `F30`, you can add the formula for the standard deviation:


    ```

    =SQRT(SUM(E21:E30)/9)

    ```


    Again, use the fill handle to copy this formula to all cells below `F30`.


    You can now plot a chart from columns B, C, D, and F. It will look like Figure
    [36-6](#490565_1_En_36_Chapter.xhtml#Fig6).


    ![](images/490565_1_En_36_Chapter/490565_1_En_36_Fig6_HTML.jpg)


    A scattered graph represents the moving average column added performance chart.
    The 2 fluctuating lines start at (10, 150) and (10, 480) with scattered dots around.
    Values are approximate.


    **Figure 36-6** *Moving average column added*


    # No Min or Max, Please


    It’s customary to watch for minimum and maximum values in time series. However,
    the information behind such numbers is of negligible worth. Consider, for example,
    a time series of elapsed times with 999 values near 500ms and one value at 3.0s.
    The max value is obviously 3.0s. If you take a second time series with 500 values
    near 500ms, and 500 values between 2.5s and 3.0s, the max value again is 3.0s.
    But the two time series are totally different! There is no value in stating that
    there is a maximum of 3.0 seconds.


    Much better information about the distribution of values is given by the *percentiles*.
    The calculation is as follows: given *N* values *y*[*i*] (*i* = 1, …, *N*), the
    M-Percentile (M between 0 and 100) is given by exactly the *y*[*j*], where *M*
    percent of all the other *y*[*i*] are smaller than *y*[*j*]. Computationally,
    you sort the *y*[*i*] in ascending order and then fetch the row at index *N* ·
    *M*/100.


    For example, if you have *N* = 1000 for 1000 values *y*[*i*], you first sort the
    *y*[*i*] in ascending order. For the 95 percentile, you look up the value at row
    number 950 (from 1,000 · 95/100). For example, if this value is 650ms, you can
    say: “The 95 percentile of the series lies at 650ms,” which is equivalent to “95
    percent of all values are below 650ms.”


    Common percentiles are 90 percentile, 95 percentile, 98 percentile, and 99 percentile.
    Since percentiles are easy to calculate, a performance test report would probably
    contain all of them.'
