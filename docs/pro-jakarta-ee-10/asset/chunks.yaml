    # Part IV: Useful Supporting Technologies


    ## 22. XML Binding


    XML binding in Java relates to a Java object tree, which is a set of Java objects
    connected via class member relations, with XML documents. The technology behind
    the XML binding is called JAXB (Java XML Binding), and for Jakarta EE 10, the
    JAXB specification is in version number 4.0.


    > **Caution:** Until Java version 11, the JAXB technology was part of Java SE.
    Beginning with Java 11, JAXB libraries have to be added explicitly in order for
    JAXB to work correctly. Since JAXB is part of any Jakarta EE server, you don''t
    have to do this yourself.


    ### Why JAXB Is So Complicated


    At first sight, it should be easy to convert an XML document into a Java object
    tree and vice versa. For example, consider a music record library as an XML document:


    ```

    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>

    <catalog xmlns="http://book.jakartapro.catalog">

    <recordList>

    <record id="173658" type="cd" make="1733">

    <fileType>wav</fileType>

    <genre>classics</genre>

    <composer>J.S. Bach</composer>

    <title>Mass in B-flat Minor</title>

    <performer>H. Masters</performer>

    </record>

    <record id="1734536" type="usb" make="2001">

    <fileType>mp3</fileType>

    <genre>rock</genre>

    <composer>G. Jung</composer>

    <title>Butterflies</title>

    <performer>B. Hoyden</performer>

    </record>

    </recordList>

    </catalog>

    ```


    Here are the Java classes:


    ```

    public class Catalog {

    private List records;

    // Getters and setters...

    }

    public class Record {

    private long id;

    private String typ;

    private int make;

    private String fileType;

    private String genre;

    private String composer;

    private String title;

    private String performer;

    // Getters and setters...

    }

    ```


    The challenges for a conversion engine are as follows:


    *   If you''re converting from Java to XML, you must decide which values go as
    elements, and which values go as attributes. This must be specified.

    *   From a Java perspective it is possible, although probably not advisable, to
    add a field to a record that points to the parent: `public class Record { ...
    private Catalog catalog; ... }`. A naive conversion to XML in this case would
    introduce an infinite regression: A record pointing to the catalog, the catalog
    pointing to all records, each record again pointing to the parent catalog, and
    so on, forever. There must be a way to avoid this.

    *   In XML, you would write `<record ... make = "unknown" >`. When converting
    to the corresponding integer field, this would lead to an error. There must be
    a way to ensure type safety or impose other pattern constraints to XML values.

    *   Although not used in this simple example, there must be a common understanding
    as to how more complex basic types like dates and byte arrays will be converted.

    *   If names cannot match, you must be able to translate names during conversion.
    The example uses `type` in XML and `typ` for the corresponding field in Java.


    ### Writing a Java Object Tree as XML


    This process, usually called *marshalling*, is handled by Java classes marked
    with annotations and a JAXB processing engine you get from factories inside the
    `jakarta.xml.bind` package.


    The annotations you can use for XML binding are numerous. You can see the complete
    list and all detailed descriptions if you look at the `jakarta.xml.bind.annotation`
    package:


    ```

    https://docs.oracle.com/javase/8/docs/api/

    javax/xml/bind/annotation/package-frame.html

    ```


    For this simple music catalog, use the following annotations:


    *   `@XmlRootElement`: Add this as an annotation to the class building the root
    of the object tree. You can also define a namespace for the resulting XML element
    (including the child hierarchy).

    *   `@XmlAccessorType`: This annotation allows you to specify how the class defines
    its data members. For simple cases, you can indicate that fields should be considered
    for conversions.

    *   `@XmlTransient`: Use this annotation to mark fields that have to be skipped
    for the conversion.

    *   `@XmlElement`: If you don''t specify field access as `@XmlAccessorType`, or
    if you need to explicitly specify an XML element name, you can use this annotation
    to mark and configure a field for conversion.

    *   `@XmlAttribute`: If you want a field to end up as an attribute and not as
    an XML element, use this annotation at the field level.

    *   `@XmlElementWrapper`: For collections, specify the corresponding XML container
    element using this annotation. Usually, you also add an `@XmlElement` annotation
    to specify how the child elements are named.


    For this music catalog example, change the `Catalog` type to the following:


    ```

    package book.jakartapro.xmlbinding;

    import java.util.List;

    import jakarta.xml.bind.annotation.*;

    @XmlRootElement(namespace = "http://book.jakartapro.catalog")

    @XmlAccessorType(XmlAccessType.FIELD)

    public class Catalog {

    @XmlElementWrapper(name = "recordList")

    @XmlElement(name = "record")

    private List records;

    // Getters and setters...

    }

    ```


    You can see that all fields, here it is just `records`, will be converted to XML
    elements. The catalog is marked as the root element, the collection is called
    `recordList`, and its elements are called `record`.


    The accordingly adapted `Record` class reads as follows:


    ```

    package book.jakartapro.xmlbinding;

    import jakarta.xml.bind.annotation.*;

    @XmlAccessorType(XmlAccessType.FIELD)

    public class Record {

    @XmlAttribute private long id;

    @XmlAttribute(name = "type") private String typ;

    @XmlAttribute private int make;

    private String fileType;

    private String genre;

    private String composer;

    private String title;

    private String performer;

    // Getters and setters...

    }

    ```


    This example uses `@XmlAttribute` to mark fields that you want to go to attributes
    instead of elements. All the other fields are automatically transformed to XML
    elements by virtue of the `@XmlAccessorType` annotation.


    For the conversion itself, you use a `JAXBContext.newInstance()` call and then
    create a marshaller (exception handling omitted):


    ```

    List records = new ArrayList();

    Record r1 = new Record();

    r1.setId(173658);

    r1.setTyp("cd");

    r1.setMake(1733);

    r1.setFileType("wav");

    r1.setGenre("classics");

    r1.setComposer("J.S. Bach");

    r1.setTitle("Mass in B-flat Minor");

    r1.setPerformer("H. Masters");

    Record r2 = new Record();

    r2.setId(1734536);

    r2.setTyp("usb");

    r2.setMake(2001);

    r2.setFileType("mp3");

    r2.setGenre("rock");

    r2.setComposer("G. Jung");

    r2.setTitle("Butterflies");

    r2.setPerformer("B. Hoyden");

    records.add(r1);

    records.add(r2);

    Catalog cat = new Catalog();

    cat.setRecords(records);

    JAXBContext context = JAXBContext.newInstance(

    Catalog.class);

    Marshaller m = context.createMarshaller();

    m.setProperty(Marshaller.JAXB_FORMATTED_OUTPUT,

    Boolean.TRUE);

    // Write to System.out

    m.marshal(cat, System.out);

    // Write to File

    //m.marshal(cat, new File("catalog.xml"));

    ```


    Because of the `JAXB_FORMATTED_OUTPUT` property, you will get nicely formatted
    output, and the `marshal()` method call actually performs the transformation.
    The output of this sample program looks like this:


    ```

    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>

    <catalog xmlns="http://book.jakartapro.catalog">

    <recordList>

    <record id="173658" type="cd" make="1733">

    <fileType>wav</fileType>

    <genre>classics</genre>

    <composer>J.S. Bach</composer>

    <title>Mass in B-flat Minor</title>

    <performer>H. Masters</performer>

    </record>

    <record id="1734536" type="usb" make="2001">

    <fileType>mp3</fileType>

    <genre>rock</genre>

    <composer>G. Jung</composer>

    <title>Butterflies</title>

    <performer>B. Hoyden</performer>

    </record>

    </recordList>

    </catalog>

    ```


    ### Adding a Schema


    In the preceding section, the XML document you retrieved did not have a schema
    associated with it. XML schemas are not introduced detail here, but I at least
    want to give you a couple of hints for how to include them.


    To include a reference to a schema in the generated XML, add one of the following
    to the marshaller:


    ```

    m.setProperty(

    Marshaller.JAXB_SCHEMA_LOCATION,

    "http://some.server/catalog.xsd");

    // or, if the schema does not specify a namespace

    m.setProperty(

    Marshaller.JAXB_NO_NAMESPACE_SCHEMA_LOCATION,

    "http://some.server/catalog.xsd");

    ```


    In order to validate the generated XML against an XSD schema file, you have to
    first generate a schema file and then add it to the marshaller.


    The schema file can be generated manually using the XML Schema specification,
    or you can use a tool. Eclipse and other IDEs provide schema generators. The one
    from Eclipse can be accessed via File ➤ New ➤ Other... ➤ JAXB ➤ Schema from JAXB
    Classes. Or you can use the Apache tool called XMLBeans for this purpose. For
    this catalog, a schema file would read as follows:


    ```

    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>

    <xs:schema xmlns:xs="http://www.w3.org/2001/XMLSchema"

    targetNamespace="http://book.jakartapro.catalog"

    xmlns:tns="http://book.jakartapro.catalog"

    elementFormDefault="qualified">

    <xs:element name="catalog">

    <xs:complexType>

    <xs:sequence>

    <xs:element name="recordList">

    <xs:complexType>

    <xs:sequence>

    <xs:element name="record" maxOccurs="unbounded">

    <xs:complexType>

    <xs:sequence>

    <xs:element name="fileType" type="xs:string"/>

    <xs:element name="genre" type="xs:string"/>

    <xs:element name="composer" type="xs:string"/>

    <xs:element name="title" type="xs:string"/>

    <xs:element name="performer" type="xs:string"/>

    </xs:sequence>

    <xs:attribute name="id" type="xs:long" use="required"/>

    <xs:attribute name="type" type="xs:string"/>

    <xs:attribute name="make" type="xs:int"/>

    </xs:complexType>

    </xs:element>

    </xs:sequence>

    </xs:complexType>

    </xs:element>

    </xs:sequence>

    </xs:complexType>

    </xs:element>

    </xs:schema>

    ```


    To add validation to the code, change the code to read as follows:


    ```

    ... [same as above]

    records.add(r1);

    records.add(r2);

    SchemaFactory sf = SchemaFactory.newInstance(

    "http://www.w3.org/2001/XMLSchema");

    Schema schem = sf.newSchema(new File("Catalog.xsd"));

    Catalog cat = new Catalog();

    cat.setRecords(records);

    JAXBContext context =

    JAXBContext.newInstance(Catalog.class);

    Marshaller m = context.createMarshaller();

    m.setSchema(schem);  // <==== NEW! ====

    ... [same as above]

    ```


    Of course, `... new File() ...` must be changed to point to your schema file.
    If you start the application, the generated XML will be validated against the
    schema file you provided.


    > **Note:** For this to work in a non-Jakarta EE environment, a JAXP implementation
    must be added to the classpath. One candidate is the Xerces library, for example,
    added via the Maven dependency artifact `= "xercesImpl", group = "xerces", version
    = "2.12.1"`.


    ### Transforming from XML to Java


    For the opposite operation, transforming XML to a Java object tree, the procedure
    is very similar. You use `JAXBContext` and create an unmarshaller from it. For
    the music records example, this process reads as follows:


    ```

    String xml = """

    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>

    <catalog xmlns="http://book.jakartapro.catalog">

    <recordList>

    <record id="173658" type="cd" make="1733">

    <fileType>wav</fileType>

    <genre>classics</genre>

    <composer>J.S. Bach</composer>

    <title>Mass in B-flat Minor</title>

    <performer>H. Masters</performer>

    </record>

    <record id="1734536" type="usb" make="2001">

    <fileType>mp3</fileType>

    <genre>rock</genre>

    <composer>G. Jung</composer>

    <title>Butterflies</title>

    <performer>B. Hoyden</performer>

    </record>

    </recordList>

    </catalog>

    """;

    JAXBContext context = JAXBContext.

    newInstance(Catalog.class);

    Unmarshaller um = context.createUnmarshaller();

    ByteArrayInputStream bis =

    new ByteArrayInputStream(xml.getBytes());

    Object o = um.unmarshal(bis);

    System.out.println(o.getClass());

    Catalog c = (Catalog) o;

    System.out.println(c.getRecords().size());

    System.out.println(c.getRecords().get(0).getComposer());

    ```


    In order to add a schema validation, all you have to do is write the following:


    ```

    SchemaFactory sf = SchemaFactory

    .newInstance("http://www.w3.org/2001/XMLSchema");

    Schema schem = sf.newSchema(new File("NewXMLSchema2.xsd"));

    ...

    JAXBContext context = JAXBContext.

    newInstance(Catalog.class);

    Unmarshaller um = context.createUnmarshaller();

    um.setSchema(schem);

    ...

    ```


    Again, use a version of `.newSchema()` that suits your needs.


    ### Generating Java Classes from Schemas


    If you start development given an XSD file, and you want Java classes to be generated
    automatically, you can use IDE functionalities. In Eclipse, choose File ➤ New
    ➤ Other... ➤ JAXB ➤ Schema from JAXB Classes. Or you can use a command-line utility
    like `scomp` from the Apache XMLBeans project.


    The Eclipse XML/XSD tools seem to have problems with some JRE versions. Therefore,
    take a closer look at the Apache XMLBeans toolset. Download XMLBeans from [`https://xmlbeans.apache.org`](https://xmlbeans.apache.org).
    Then run the following in a shell:


    ```

    scomp -src src -d build Catalog.xsd

