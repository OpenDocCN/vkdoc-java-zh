    考虑一个追加器，它提供关于每日传入日志事件的统计数据。你只会将其用作辅助追加器，这没问题，因为你可以为一个日志记录器关联多个追加器。统计数据会在每天午夜过后、第一条新消息到达时写出。该追加器类编写如下：


    ```

    package book.jakartapro.restdate.log4j;

    import java.time.LocalDate;

