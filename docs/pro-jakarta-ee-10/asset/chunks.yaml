- fmt: "\nWith the application deployed, you can point your browser to `http://localhost:8080/JavaMvc`\
    \ to see the pet list. You can see the details, change the status of a pet to\
    \ reserved, and create a new pet. See Figure [15-2](#490565_1_En_15_Chapter.xhtml#Fig2).\n\
    \n![](images/490565_1_En_15_Chapter/490565_1_En_15_Fig2_HTML.jpg)\n\nA window\
    \ of pet overview lists the pet number, name, status, and options for details,\
    \ reserve, and del.\n\n**Figure 15-2** The Pet Shop application\n\n![](images/490565_1_En_15_Chapter/490565_1_En_15_Fig1_HTML.jpg)\n\
    \nTwo windows of package explorer display the Java MVC project in which `src/main/java`\
    \ on the left side and web app files on the right side are selected.\n\n**Figure\
    \ 15-1** Pet shop sources\n\n# Part III Advanced Architecture Related Topics\n\
    \n## 16. Microprofiles\n\nMicroservices describe an architectural pattern in which\
    \ small processor units work together to perform application tasks. Each unit\
    \ only is responsible for a single service, and all units are loosely coupled\
    \ and communicate with each other using computer language-independent protocols.\
    \ In the Java world, the specification set for a microservice is described by\
    \ the MicroProfile specification, which you can access at the following:\n\n```\n\
    https://microprofile.io/\n```\n\nBroadly speaking, a microservice yielding the\
    \ MicroProfile 5.0 specification must be able to handle:\n\n*   **JAX-RS 3.0:**\
    \ For RESTful services\n*   **Rest Client 3.0:** For REST consumers\n*   **JSON-P\
    \ 2.0:** For handling JSON data\n*   **JSON-B 2.0:** For binding JSON to Java\
    \ objects\n*   **CDI 3.0:** For Context and Dependency Injection\n*   **Jakarta\
    \ Annotations 2.0:** For annotation processing\n*   **Config 3.0:** For configuring\
    \ microservices\n*   **OpenAPI 3.0:** For REST services metadata describing the\
    \ services in machine and human readable format\n*   **Fault Tolerance 4.0:**\
    \ For improving microservice stability\n*   **Metrics 4.0:** For letting microservices\
    \ tell about performance figures\n*   **Health 4.0:** For letting microservices\
    \ tell about their health\n*   **JWT Authentication 2.0:** For JWT authentication\n\
    *   **Open Tracing 3.0:** For finding out the relations and communication routes\
    \ between the microservices\n\n> **Note**\n> \n> The latest MicroProfile version\
    \ is 6.0. This book uses version 5.0, since this is the version our MicroProfile\
    \ server adheres to.\n\nAt first sight, microservices seem to contradict Jakarta\
    \ EE, where you have a monolithic architecture with a central server process that\
    \ hosts dependent modules. The question is, if you are talking about microservices,\
    \ are you then talking about a competitor to Jakarta EE? Why do I mention microservices\
    \ in a Jakarta EE book? The answer is surprisingly easy: You can in fact use an\
    \ application server product with lean memory and lean resources to host a single\
    \ microservice, thus yielding a microservices architecture based on Jakarta EE!\
    \ A Jakarta EE microservices landscape is a set of independent, small server processes\
    \ with a very small number of applications running on each server.\n\nThere is\
    \ one important difference though: The Jakarta EE specification set (EJB, JPA,\
    \ CDI, etc., versions) and the MicroProfiles specification have different structures.\
    \ Although you can make a Jakarta EE server follow the MicroProfile specifications,\
    \ there is no strict conformity of Jakarta EE toward the MicroProfile specification.\
    \ Nevertheless, thanks to an ongoing effort to coordinate these worlds, MicroProfile\
    \ 5.0 aligns with Jakarta EE 9, making it easy to switch between those technologies.\n\
    \nIf you want to use software that's tailored to follow the MicroProfile specification,\
    \ a couple of server products follow either approach, including Open Liberty®,\
    \ Dropwizard®, Thorntail®, Kumuluz®, Payara®, and TomEE®, to name a few.\n\nThe\
    \ rest of this chapter talks about some aspects of TomEE, because it has a commercial-friendly\
    \ license (Apache license) and is derived from Tomcat, which is a very mature\
    \ servlet container that has been used in many projects for more than 20 years\
    \ now. TomEE currently is at version 9.0.0 and adheres to MicroProfile 5.0.\n\n\
    ## Starting a MicroProfile Sample Project\n\nTo begin, you'll use the `RestDate`\
    \ project from Chapter [2](#490565_1_En_2_Chapter.xhtml) and enhance it with MicroProfile\
    \ capabilities. Make a copy of this project and name it `RestDateMP`, or follow\
    \ the instructions in that chapter and replace `RestDate` with `RestDateMP`. The\
    \ project structure should read as follows:\n\n```\nbuild.gradle\ngradle\n|__\
    \ wrapper\n|__ gradle-wrapper.jar\n|__ gradle-wrapper.properties\ngradlew\ngradlew.bat\n\
    src\n|__ main\n|__ java\n|   |__ book\n|       |__ jakartapro\n|           |__\
    \ restdatemp\n|               |__ RestDate.java\n|__ resources\n|__ webapp\n|__\
    \ WEB-INF\n|__ beans.xml\n|__ glassfish-web.xml\n|__ web.xml\n```\n\nStart with\
    \ a standard `build.gradle` file for web applications in Jakarta EE:\n\n```\n\
    plugins {\nid 'war'\n}\nsourceCompatibility = 1.17\ntargetCompatibility = 1.17\n\
    repositories {\njcenter()\n}\ndependencies {\nprovidedCompile\n'jakarta.platform:jakarta.jakartaee-api:10.0.0'\n\
    // Use JUnit test framework\ntestImplementation 'junit:junit:4.13.2'\n}\n```\n\
    \nFor the deployment descriptor called `web.xml` inside `src/main/webapp/WEB-INF`,\
    \ you can write the following:\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<web-app xmlns=\"https://jakarta.ee/xml/ns/jakartaee\"\n         xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"https://jakarta.ee/xml/ns/jakartaee\n\
    \         https://jakarta.ee/xml/ns/jakartaee/web-app_6_0.xsd\"\n         version=\"\
    6.0\">\n    <display-name>RestDateMP</display-name>\n    <servlet>\n        <servlet-name>jakarta.ws.rs.core.Application</servlet-name>\n\
    \    </servlet>\n    <servlet-mapping>\n        <servlet-name>jakarta.ws.rs.core.Application</servlet-name>\n\
    \        <url-pattern>/webapi/*</url-pattern>\n    </servlet-mapping>\n</web-app>\n\
    ```\n\n## Installing a MicroProfile Server\n\nDownload the TomEE MicroProfile\
    \ variant, version 9.0.0 of the TomEE server, from the Downloads section of [`http://tomee.apache.org/`](http://tomee.apache.org/).\
    \ Then unzip the archive to a suitable place.\n\n## Changing the Application to\
    \ a Microservice\n\nTo allow for the enhancements that MicroProfile has to offer,\
    \ you first need to add the MicroProfile dependencies to `build.gradle`:\n\n```\n\
    ...\ndependencies {\ncompileOnly 'org.apache.tomee:jakartaee-api:10.0.0'\nprovidedCompile\n\
    'org.eclipse.microprofile:microprofile:5.0'\nprovidedCompile\n'org.eclipse.microprofile.openapi:'\
    \ +\n'microprofile-openapi-api:3.0'\n// Use JUnit test framework\ntestImplementation\
    \ 'junit:junit:4.13.2'\n...\n}\n...\n```\n\nYou can now add MicroProfile capabilities\
    \ to the application. First, add a few OpenAPI information emitters. A new file\
    \ called `openapi.yaml` is created and added to `src/main/webapp/META-INF` (be\
    \ sure to create the folder first):\n"
