    \ you add\ncontents, such as:\n\n```\nHello\n\n```\n\nIt will be taken as a default\
    \ if the placeholder is not otherwise\ndefined.\n\nThe <ui:define> Tag\n\nThis\
    \ tag declares\nwhat will be inserted at the insertion points:\n\n```\nContents...\n\
    \n```\n\nSince insertion points can only exist in template files, the `<ui:define>`\
    \ tag\ncan only show up in files referring to template files via `<ui:composition\
    \ template = \"...\">`.\n\nThe <ui:param> Tag\n\nSpecify a parameter that’s passed\n\
    to an `<ci:include>`-ed\nfile, or to the template specified in `<ui:composition\
    \ template = \"...\"> ...` Simply add as a child element, such as:\n\nInside the\
    \ referred-to file, use `#{paramName}` to use\nthe parameter:\n\n```\n\nThe <ui:component>\
    \ Tag\n\nThis is the same as the first variation of `<ui:composition>`,\nwithout\
    \ template specification. It adds\nan element to the Faces component tree. It\
    \ supports the following\nattributes:\n\n*   `id` for\n    the element’s ID in\
    \ the component tree. It’s not required, and Faces\n    generates an automatic\
    \ ID if you don’t specify it. May be an EL\n    (expression language) string value.\n\
    \n*   `binding`\n    for binding the component to a Java class (must inherit from\
    \ `jakarta.faces.component.UIComponent`).\n    Not required. May be an EL string\
    \ value (class name).\n\n*   `rendered`\n    for determining whether the component\
    \ is to be rendered. Not required.\n    May be an EL boolean value.\n\nIt is common\
    \ practice to use `<ui:param>` to\npass parameters to components. You can for\
    \ example tell the component to\nuse a particular ID. Caller:\n\nCallee ( `comp1.xhtml`):\n\
    \n```\n...\n\n```\n\nThe <ui:decorate> Tag\n\nSimilar to `<ui:composition>`,\n\
    but it does *not* disregard the XHTML code around it:\n\n```\n...\nI'm written\
    \ to the output!\n\nI'm passed to \"templ.xhtml\", you can refer to\nme in \"\
    templ.xhtml\" via\n\n...\n```\n\nIn contrast to `<ui:composition>`,\nthe file\
    \ with the `<ui:decorate>`\nwill contain the completely valid XHTML code, including\
    \ `html`, `head`, and `body`, and the\ntemplate file will be inserted where the\
    \ `<ui:decorate>`\nappears. It therefore must not contain `html`, `head`, or `body`.\
    \ This is thus\nmore or less an extended “include,” where passed-over data is\
    \ not given\nby the attributes but in the `body` tag instead.\nYou usually apply\
    \ the `<ui:decorate>`\ntag to further\nelaborate code snippets. You can wrap them\
    \ into more `<div>`s to apply\nmore styles, add a label or a heading, and more.\n\
    \nThe <ui:fragment> Tag\n\nSimilar to `<ui:decorate>`,\nbut this tag\ncreates\
    \ an element in the Faces component tree. It has the following\nattributes:\n\n\
    *   `id` for\n    the element’s ID in the component tree. This is not required,\
    \ and Faces\n    generates an automatic ID if you don’t specify it. May be an\
    \ EL\n    (expression language) string value.\n\n*   `binding`\n    for binding\
    \ the component to a Java class (must inherit from `jakarta.faces.component.UIComponent`).\n\
    \    Not required. May be an EL string value (class name).\n\n*   `rendered`\n\
    \    for indicating whether the component is to be rendered. Not required.\n \
    \   May be an EL boolean value.\n\nYou can use this tag to extract existing code\
    \ snippets and to convert\nthem partly to a component. For example, consider the\
    \ following code:\n\n```\n...\n\n...\n\n[Some table|\n\n...\n\n```\n\nIf you now\
    \ extract the table to a different file, called `table1_frag.xhtml`:\n\n```\n\n\
    ...\n\n...\n\n...\n\nI am the table caption\n\n[Some table|\n\n```\n\nYou have\
    \ introduced XHTML (the caption) and a new component (the\ntable).\n\nThe <ui:repeat>\
    \ Tag\n\nThis is not a necessarily templating-related tag, but it’s used to\n\
    loop over a collection or an array. Its attributes are:\n\n*   `begin`.\n    Not\
    \ required. If it’s specified, it’s the iteration’s first index in the\n    list\
    \ or array. May be an `int` valued value\n    expression.\n\n*   `end`**.**\n\
    \    Not required. If it’s specified, it’s the iteration last index\n    (inclusive)\
    \ in the list or array. May be an `int` valued value\n    expression.\n\n*   `step`.\n\
    \    Not required. If it’s specified, it’s the stepping that inside the list\n\
    \    or array. May be an `int` valued value\n    expression.\n\n*   `offset`.\n\
    \    Not required. If it’s specified, it’s an offset that’s added to the\n   \
    \ iterated-over values. May be an `int` valued value\n    expression.\n\n*   `size`.\n\
    \    Not required. If it’s specified, it is the maximum number of elements to\n\
    \    read from the collection or array. Must not be greater than the\n    collection’s\
    \ array size.\n\n*   `value`.\n    The list or array to iterate over. An `Object`\
    \ valued\n    expression. Required.\n\n*   `var`. The\n    name of an expression\
    \ language variable that holds the current item of\n    the iteration. May be\
    \ a `String` value\n    expression.\n\n*   `varStatus`**.**\n    Not required.\
    \ The name of a variable that holds the\n    iteration status. A POJO with read-only\
    \ values: `begin` (int), `end` (int), `index` (int), `step` (int), `even` (boolean),\
    \ `odd` (boolean), `first` (boolean), and\n    `last`\n    (boolean).\n\n*   `rendered`.\
    \ Whether or\n    not the component is to be rendered. Not required. May be an\
    \ EL boolean\n    value.\n\nNote\n\nThe JSTL (Java Standard Tag Library) collection\n\
    provides a `<c:forEach>` tag\nfor looping. Faces and JSTL do not work together\
    \ very well because of\nconceptional differences. In tutorials and blogs, you\
    \ will find lots of\nexamples of `for`\nloops with JSTL. It is, however, better\
    \ to use `<ui:repeat>` to\navoid problems."
  trans: "\n### `<ui:include>` 标签\n\n包含另一个 XHTML 文件，如下所示：\n\n```\n如果文件包含 `<ui:composition>`\
    \ 或 `<ui:component>`，\n则只会包含 `<ui:composition>`\n或 `<ui:component>` 的内部内容。\n这允许设计者独立于服务器后续的拼接来设计包含的文件样式。\n\
    \n<ui:composition> 标签的第一种变体\n\n如果此标签 *不* 带 `template=\"...\"` 使用，如下所示：\n\n```\n\
    ...\n\n```\n\n它定义了一个 HTML 元素的子树（集合）。其背后的思想是，如果你使用 `<ui:include>`，\n并且被包含的文件包含\
    \ `<ui:composition> ... </ui:composition>`，\n则只会包含 `<ui:composition> ... </ui:composition>`\
    \ 的内部内容。\n标签本身及其周围的任何内容都将被忽略。因此，你可以让页面设计者创建\n一个完全有效的 XHTML 文件，将 `<ui:composition>\
    \ ... </ui:composition>` 放在感兴趣的部分周围，\n并在任何其他 Faces 页面中编写 `<ui:include>` 来精确提取这些部分。\n\
    \n<ui:composition> 标签的第二种变体\n\n如果此标签 *带* `template=\"...\"` 使用，如下所示：\n\n```\n\
    ...\n\n```\n\n它定义了一个 XHTML 片段集合，这些片段将被传递到模板文件内的占位符中（对应于 `template = \"...\"`\n\
    属性）。\n\n与不带 `template=\"...\"` 的 `<ui:composition>` 相比，\n这是一个完全不同的使用场景。在\n模板文件中，你有一个或多个元素，例如\
    \ `<ui:insert name=\"name1\" />`，\n而在带有 `<ui:composition template=\"...\">` 的文件中，你在\
    \ `<ui:composition template=\"...\"> ... </ui:composition>` *内部* 使用 `<ui:define>`\n\
    标签，如下所示：\n\n```\n... \n... \n...\n\n```\n\n这定义了\n要用于 `<ui:insert>` 标签的内容。\n`<ui:composition>`\
    \ 标签周围的任何内容将再次被忽略，因此你可以让设计者\n使用非 Faces 感知的 HTML 编辑器创建片段，并仅在稍后使用 `<ui:define name\
    \ = \"someName\"> ... </ui:define>` 提取感兴趣的部分，用于\n实现模板文件。\n\n<ui:insert> 标签\n\n\
    使用此标签在模板文件内定义占位符。\n在模板文件中使用此标签意味着任何引用此模板的文件都可以为这些占位符定义内容：\n\n```\n此定义必须发生在 `<ui:composition>`、\n\
    `<ui:component>`、\n`<ui:decorate>`、\n或 `<ui:fragment>` 内部。\n\n通常你不会在此标签中提供内容。但是，如果你添加了内容，例如：\n\
    \n```\nHello\n\n```\n\n如果占位符未被其他方式定义，则此内容将作为默认值。\n\n<ui:define> 标签\n\n此标签声明\n\
    将在插入点插入的内容：\n\n```\nContents...\n\n```\n\n由于插入点只能存在于模板文件中，因此 `<ui:define>` 标签\n\
    只能出现在通过 `<ui:composition template = \"...\">` 引用模板文件的文件中。\n\n<ui:param> 标签\n\n\
    指定一个参数，该参数被传递给\n`<ui:include>` 包含的文件，或传递给 `<ui:composition template = \"...\"\
    > ...` 中指定的模板。只需将其添加为子元素，例如：\n\n在被引用的文件中，使用 `#{paramName}` 来使用\n该参数：\n\n```\n\n\
    <ui:component> 标签\n\n这与 `<ui:composition>` 的第一种变体相同，\n即不指定模板。它向\nFaces 组件树添加一个元素。它支持以下\n\
    属性：\n\n*   `id` 用于\n    组件树中元素的 ID。它不是必需的，如果你不指定，Faces\n    会自动生成一个 ID。可以是 EL（表达式语言）字符串值。\n\
    \n*   `binding`\n    用于将组件绑定到 Java 类（必须继承自 `jakarta.faces.component.UIComponent`）。\n\
    \    非必需。可以是 EL 字符串值（类名）。\n\n*   `rendered`\n    用于确定是否渲染该组件。非必需。\n    可以是 EL\
