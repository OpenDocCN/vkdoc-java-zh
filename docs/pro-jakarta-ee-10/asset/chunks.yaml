    \ is packaged like a JAR file, but contrary to a\nstandard JAR file, it must use\
    \ a filename ending in `.rar`. The structure\nof a simple RAR archive is as follows:\n\
    \n```\nsome/package/ClassA.class\nsome/other/package/ClassB.class\n... more classes\
    \ ...\nMETA-INF/MANIFEST.MF\n```\n\nThe `MANIFEST.MF`\nfile is a simple text file\
    \ with these contents:\n\n```\nManifest-Version: 1.0\n```\n\nFor the `HelloJca`\
    \ example\nresource adapter, the archive file structure is as follows:\n\n```\n\
    META-INF/\nMANIFEST.MF\nbook/\njakartapro/\njcahello/\nHelloWorldManagedConnection.class\n\
    HelloWorldManagedConnectionFactory.class\nHelloWorldResourceAdapter.class\nHelloWorldConnectionFactoryImpl.class\n\
    HelloWorldConnectionImpl.class\nHelloWorldManagedConnectionMetaData.class\ninterfaces/\n\
    HelloWorldConnectionFactory.class\nHelloWorldConnection.class\n```\n\nBecause\
    \ clients need the interfaces to address the resource adapter, you\nneed to also\
    \ set up a build workflow that packages the interfaces in a\nstandard Java library\
    \ JAR file. For the `HelloJca` example,\nthis could be a file called `jca-interfaces.jar`\n\
    containing:\n\n```\nMETA-INF/\nMANIFEST.MF\nbook/\njakartapro/\njcahello/\ninterfaces/\n\
    HelloWorldConnectionFactory.class\nHelloWorldConnection.class\n```\n\nFor more\
    \ complex resource adapters that need additional libraries, you\ncould for example\
    \ add those inside a `lib/` folder in the\nRAR file:\n\n```\nsome/package/ClassA.class\n\
    some/other/package/ClassB.class\n... more classes ...\nMETA-INF/MANIFEST.MF\n\
    lib/someLibrary1.jar\nlib/someLibrary2.jar\n... more libraries ...\n```\n\nThe\
    \ additional libraries then need to be mentioned in the `MANIFEST.MF` file:\n\n\
    ```\nManifest-Version: 1.0\nClass-Path: lib/someLibrary1.jar lib/someLibrary2.jar\n\
    ```\n\n(This should be on one line, with a single space as a separator.)\n\nCaution\n\
    \nMake sure the `MANIFEST.MF` file ends\nwith a line terminator (a new line or\
    \ carriage return).\n\nIf you use Gradle as your build tool, changing the archive\
    \ file ending\nto `.rar` and\nadding a step to produce a `jca-interfaces.jar`\n\
    file is easy. You\nsimply add the following lines to your `build.gradle` file:\n\
    \n```\nplugins {\nid 'java'\n}\n...\narchivesBaseName = 'HelloJca'\njar { archiveExtension\
    \ = 'rar' }\nrepositories {\n...\n}\ndependencies {\n...\n}\n// Build a JAR with\
    \ just the JCA interfaces, for clients\ntask('JcaInterfaces', type: Jar, dependsOn:\
    \ 'classes') {\n//describe jar contents here as a CopySpec\narchiveFileName =\
    \ \"jca-interfaces.jar\"\ndestinationDirectory = file(\"$buildDir/libs\")\nfrom(\"\
    $buildDir/classes/java/main\") {\ninclude \"**/interfaces/**/*.*\"\n}\n}\n// make\
    \ sure it is part of the assembly path\njar.dependsOn JcaInterfaces\n```\n\nIf\
    \ you now execute the `jar` task, you will\nfind both the RAR file and the `jca-interfaces.jar`\n\
    file in the `build/libs`\nfolder.\n\nDeployment Descriptors\nIn older versions\
    \ of JCA, it was necessary to provide a `ra.xml` deployment descriptor\nfile inside\
    \ the `META-INF` folder.\nBecause of the annotations you can add to the resource\
    \ adapter file (the\n`HelloWorldResourceAdapter`\nclass in this example) and to\
    \ the Managed Connection Factory (the `HelloWorldManagedConnectionFactory`\nclass\
    \ in the example), this file no longer is needed. However, depending\non which\
    \ Jakarta EE server you are using, a server-specific deployment\ndescriptor has\
    \ to be added to the `META-INF` folder. It\nusually has the name `[SERVER]-ra.xml`,\n\
    where `[SERVER]`\nidentifies the server product. For example, for Weblogic, this\
    \ file must\nbe named `weblogic-ra.xml`. For\ndetails about the naming and the\
    \ contents of this file, consult your\nserver documentation.\nFor GlassFish, this\
    \ server-specific deployment descriptor is not\nneeded—everything can be configured\
    \ using the web administrator or the\n`asadmin` console\ntool. See the section,\
    \ \"Defining a Resource Adapter on the Server,\"\nlater in this chapter.\n\nResource\
    \ Adapter Deployment\nTo deploy a RAR file, you usually follow the same procedure\
    \ as for a\nWAR or EAR file. Consult your server documentation for details.\n\n\
    Defining a Resource Adapter on the Server\nDeploying a resource adapter on the\
    \ server does not automatically\nmean you can instantaneously refer to it from\
    \ a client. In the end, you\nwant to be able to inject a resource adapter using\
    \ the `@Resource` annotation,\nbut that requires a lot of configuration work.\
    \ Even worse, the\nconfiguration procedure is not standardized, so you have to\
    \ consult the\nserver documentation in order to learn how to do that.\n\nFor GlassFish,\
    \ for example, you must create a thread pool, an adapter\nconfiguration, a connection\
    \ pool, and a connector resource. You can use\nthe web administrator at `http://localhost:4848`\n\
    to that aim, but a shell script using the `asadmin` tool gives\nyou the same power.\
    \ For the `HelloJca` example,\nsuch a script could read as follows:\n\n```"
