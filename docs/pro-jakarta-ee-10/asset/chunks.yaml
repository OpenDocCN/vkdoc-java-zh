    ## Part VII Advanced Monitoring and Logging


    ### 34. Monitoring Workflow


    Monitoring is a vital part of any enterprise-level application. You need to be
    able to monitor technical aspects like memory usage, CPU load, and thread counts,
    performance figures like elapsed times and throughput, as well as functional aspects
    like sales figures, order numbers, and operation costs.


    This chapter covers the process of monitoring workflows, which includes provisioning
    data, aggregating data, and presenting monitoring figures.


    #### Using JMX as a Monitoring Technology


    Of course it is possible to provide monitoring data by logging, by means of EJBs,
    web services (XML via SOAP or JSON via REST), and servlets. However, from version
    1.6 on, Java includes a technology that’s capable of monitoring in a more straightforward
    manner: JMX (Java Management Extensions). By using JMX, it is possible to declare
    special classes called MBeans as properties and methods accessible or callable
    from inside and outside the JVM. This way, applications can more easily provide
    monitorable data. In addition, the JVM by itself provides valuable information
    about its state via JMX.


    MBeans come in different flavors:


    * Standard MBeans

    * Dynamic MBeans

    * Open MBeans

    * Model MBeans

    * MXBeans


    They differ in the way published properties or methods are reflected in the MBean
    coding, how they need to be registered, and which types are allowed to communicate
    between the client and server.


    From the choices you have, MXBeans are extraordinarily useful for monitoring purposes.
    This is because communication types are limited to standard Java types with the
    benefit of simplified client access, and for each monitorable feature, you just
    need a getter method in the MBean class code. For example, consider the elapsed
    time in a booking workflow. All you need is an interface and an MBean class:


    ```java

    package book.jakartapro.jmxmonitoring;

    public interface MonitoringBeanMXBean {

    double getElapse();

    void setElapse(double elapse);

    }

    ```


    ```java

    package book.jakartapro.jmxmonitoring;

    public class MonitoringBean

    implements MonitoringBeanMXBean {

    private double elapse;

    public double getElapse() {

    return elapse;

    }

    public void setElapse(double elapse) {

    this.elapse = elapse;

    }

    }

    ```


    In an application initialization method, you then must register the MBean with
    an MBean server. For simplicity, this example uses the platform MBean server,
    which is configured and starts automatically for every JVM.


    ```java

    import java.lang.management.ManagementFactory;

    import javax.management.ObjectName;

    ...

    final String OBJECT_NAME =

    "book.jakartapro.mxbeans:type=MonitoringBean";

    ...

    MonitoringBean m = ...;

    ...

    try {

    ManagementFactory.getPlatformMBeanServer().

    registerMBean(m,

    new ObjectName(OBJECT_NAME));

    } catch (Exception e) {

    e.printStackTrace(System.err);

    }

    ```


    #### Enabling Remote JMX


    In order for clients to access MBeans through the network, you need to add a couple
    of JVM startup properties to the server:


    ```

    -Dcom.sun.management.jmxremote=true

    -Dcom.sun.management.jmxremote.port=9010

    -Dcom.sun.management.jmxremote.ssl=false

    -Dcom.sun.management.jmxremote.authenticate=true

    -Dcom.sun.management.jmxremote.password.file=

    /path/to/jmxremote.password

    ```


    In its simplest form, the `jmxremote.password` file just is a one-liner:


    ```

    monitorRole pASSWurd

    ```


    Of course, you should choose your own password. In the `JDK-INST-DIR/conf/management`
    folder, you can find a template file called `jmxremote.password.template` that
    verbosely describes all the options for the password file.


    **Note:** In order to enable SSL, expect a considerable amount of extra work.
    You must add certificates to the server’s trust store and keystore, and you must
    correspondingly configure your JMX clients.


    Consult your Jakarta EE server documentation in order to find out how to add JVM
    startup properties.


    For GlassFish, you must add a security setting to the `server.policy` file (inside
    `glassfish/domains/domain1/config`), as follows:


    ```

    grant {

    permission javax.management.MBeanPermission

    "*", "getMBeanInfo";

    permission javax.management.MBeanPermission

    "*", "getAttribute";

    };

    ```


    #### MBeans in Jakarta EE Applications


    Because every Jakarta EE application runs in a container-controlled environment,
    you can simplify the registration of MBeans to further streamline your JMX monitoring.
    Presuming you can use a single MBean instance for the whole application (EJB or
    web application), you can add the `@ApplicationScoped` annotation to ensure that
    the container takes care of constructing the MBean, and you can add a post-construct
    method annotated with `@PostConstruct` to register the MBean:


    ```java

    package book.jakartapro.jmxmonitoring;

    import java.lang.management.ManagementFactory;

    import javax.management.ObjectName;

    import jakarta.annotation.PostConstruct;

    import jakarta.enterprise.context.ApplicationScoped;

    @ApplicationScoped

    public class MonitoringBean

    implements MonitoringBeanMXBean {

    private static final String OBJECT_NAME =

    "book.jakartapro.mxbeans:type=MonitoringBean";

    private double elapse;

    public double getElapse() {

    return elapse;

    }

    public void setElapse(double elapse) {

    this.elapse = elapse;

    }

    @PostConstruct

    public void start() {

    try {

    ManagementFactory.getPlatformMBeanServer().

    registerMBean(this,

    new ObjectName(OBJECT_NAME));

    } catch (Exception e) {

    e.printStackTrace(System.err);

    }

    }

    }

    ```


    Accessing the MBean for the purpose of setting monitorable values is easy then—you
    just use CDI to inject the MBean, as follows:'
  raw: '```

    public class MyAuth

    implements HttpAuthenticationMechanism {

    @Inject IdentityStoreHandler ish;

    AuthenticationStatus validateRequest(

    HttpServletRequest request,

    HttpServletResponse response,

    HttpMessageContext httpMessageContext)

    throws AuthenticationException {

    // use ish to validate the request

    ...

    CredentialValidationResult vr = ...;

    // we need to inform the container about the result

    // of the validation

    AuthenticationStatus res =

    httpMessageContext.notifyContainerAboutLogin(vr);

    return res;

    }

    }

    ```


    The `secureResponse()` and `cleanSubject()` methods are used to

    perform post-processing activities on requests and logout activities,

    respectively. Both have default implementations, so you don’t have to

    implement them unless you need to perform additional actions on requests

    during the logout process.

    The `HttpMessageContext`

    parameter is used

    as an interface to the security infrastructure controlled by the

    container. Its `notifyContainerAboutLogin()`

    method signals a successful login, but you can also skip the

    authentication process for unsecured paths via `doNothing()`. Or, you

    invoke `responseUnauthorized()`

    or `responseNotFound()` to

    force a 401 or 404 HTTP response status, respectively.

    As was the case for `IdentityStore`s, you don’t have to

    register `HttpAuthenticationMechanism`

    implementations. You can just put them in the `CLASSPATH`.


    In order to simplify the programming of authentication procedures, the

    RFC-375 standard declares a couple of variants for

    authentication mechanisms. They come in the form of annotations:


    ```

    @BasicAuthenticationMechanismDefinition

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue())

    @FormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue())

    ```


    For example, you can use the `@FormAuthenticationMechanismDefinition`

    annotation to tell the authentication controller which URLs to use to

    generate the login form page and the error page, as follows:


    ```

    @FormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage="/login/login.xhtml",

    errorPage="/login/error.xhtml"

    )

    )

    @WebServlet("/secured")

    @DeclareRoles({ "user", "authorized" })

    @ServletSecurity(

    @HttpConstraint(rolesAllowed = "authorized"))

    public class SecuredContentServlet extends HttpServlet {

    ...

    }

    ```


    To learn more about these annotations, consult the API

    documentation.


