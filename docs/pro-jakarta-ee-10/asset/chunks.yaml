    added a *hard* link of that `svnserve` command to the `/usr/lib/restricted/bin`
    folder.'
  trans: '

    ## Subversion 版本控制系统


    Subversion 是一个相对较老的版本控制系统，但至今仍在积极维护。它是一个集中式版本控制系统，意味着所有版本都存储在一个中央位置。Eclipse 以及我所知的所有其他
    IDE 都提供了与 Subversion 通信的内置功能，或者允许你为此安装插件。


    Subversion 可以方便地安装在 Linux 服务器上。要安装它，请以 `root` 身份运行以下代码：


    ```

    # Ubuntu 或 Debian

    apt-get install subversion

    # Fedora 或 RHEL

    yum install subversion

    # SuSE

    zypper install subversion

    ```


    除非安装过程自动创建了 `subversion` 用户和组，否则你可以通过运行 `cat /etc/group | grep subversion` 和 `cat
    /etc/passwd | grep subversion` 来检查。然后，通过输入以下命令创建 `subversion` 用户和组：


    ```

    # 我们是 "root"

    # Ubuntu, Debian, Fedora, RHEL

    mkdir -p /srv/subversion

    adduser --home /srv/subversion subversion

    chown -R subversion.subversion /srv/subversion

    # OpenSUSE Leap

    mkdir -p /srv/subversion

    useradd -r -U --home-dir /srv/subversion subversion

    chown -R subversion.subversion /srv/subversion

    ```


    例如，你可以为第 2 章的 `RestDate` 项目创建一个仓库：


    ```

    # 创建一个空仓库

    # 我们是 "root"

    su -l subversion

    svnadmin create /srv/subversion/RestDate

    # 创建标准的 Subversion 目录结构

    cd # 回到主目录

    mkdir tmp

    cd tmp

    svn co file:///srv/subversion/RestDate

    cd RestDate

    mkdir trunk tags branches

    svn add *

    svn commit -m "Init"

    # 在 Debian 和 OpenSUSE Leap 上：

    chmod -R g+w /srv/subversion/RestDate

    # 清理，我们将以普通用户身份工作

    cd ..

    rm -rf RestDate

    exit

    ```


    这将创建一个标准的 Subversion 仓库目录结构。`trunk` 是主开发分支，`branches` 包含所有分支，`tags` 用于标签。这是通常的约定，但你不必强制遵守。不过，遵循此约定有助于他人更好地理解你的版本控制流程。


    Subversion 提供了多种客户端连接仓库的方法。以下列表总结了这些方法：


    *   `file:///`


    仅限本地访问。这并非一个真正的选项，因为公司服务器不应同时作为开发者的工作站。


    *   `http://`


    通过中介 Apache HTTP 服务器进行间接访问。


    *   `https://`


    与 `http://` 相同，但增加了 SSL 加密。


    *   `svn://`


    Subversion 自身的网络协议。


    *   `svn+ssh://`


    通过 SSH 登录进行中介访问。


    出于多种原因，我强烈推荐使用 `svn+ssh://` 协议。首先，它直接且简单。无需在服务器上运行任何其他软件，也无需花费时间创建坚不可摧的 Apache
    安装（这对于 `http://` 或 `https://` 是必需的，包括后续维护）。而且，你也不必使用不安全的 `svn://` 协议访问。安全性被委托给了非常安全的
    SSH 访问方法。通常反对使用 SSH 的论点并不令人信服——你只需要一个 SSH 用户来进行 Subversion 工作，并且不会浪费磁盘空间。此外，你可以使用
    `rbash` 来限制该用户的 shell 访问。由于 SSH 的重要性，社区有很高的积极性来立即修复任何出现的 SSH 漏洞。


    当然，决定权在你手中，你可以在文档和互联网上找到安装说明。本章的其余部分将使用 `svn+ssh://` 协议，因为它非常简单。


    你首先需要确保，使用 `rbash` 作为 shell 且属于 `subversion` 组的用户，在登录时只能执行非常有限的命令集。为此，你需要根据你使用的发行版，完成一些准备步骤：


    ```

    # Fedora ************************************************

    ln -s /bin/bash /bin/rbash

    # OpenSUSE Leap *****************************************

    # 此处 PATH=/usr/lib/restricted/bin 是 rbash 可执行命令的默认路径。

    # 它无法更改。你可以在此处做的是，基于组和所有权策略，

    # 进一步限制对 /usr/lib/restricted/bin 的访问。例如：

    #     groupadd rbashusers

    #     chgrp rbashusers /usr/lib/restricted/bin/*

    #     chmod o-x /usr/lib/restricted/bin/*

    # 并且不要将用户 "svnuser" 添加到组 "rbashusers" 中

    # （见下文）。为此，该文件夹中的链接必须是硬链接

    # （在 \ci{ln} 中不使用 -s 选项）

    ```


    接下来，在 `/etc/profile.d/` 目录中添加 `svnuser.sh` 文件：


    ```

    # Ubuntu, Debian 或 Fedora

    if [ "$SHELL" = "/bin/rbash" -a \

    $(groups | grep -c \\bsubversion\\b) = 1  ]; then

    export PATH=.

    fi

    # 在 OpenSUSE Leap 上不要编写此文件。请参见上一个列表中的注释

    ```


    这样，使用 `rbash` shell 且属于 `subversion` 组的用户，通过 SSH 登录后，只能使用有限的命令集。实际上，任何试图通过 `ssh`
    登录到你服务器的 Subversion 用户，都会很快意识到这种直接登录毫无意义，因为使用所提供的 shell 什么也做不了。


    要创建一个用于 Subversion 访问的 SSH 用户，请使用相应的操作系统功能，并将 `home` 目录限制为 SSH 所需的最小限度：


    ```

    # 我们是 "root"

    # Ubuntu 或 Debian **************************************

    adduser --system --ingroup subversion \

    --shell /bin/rbash --disabled-password svnuser

    ln -s /usr/bin/groups ~svnuser

    ln -s /bin/grep ~svnuser

    su svnuser --shell /bin/bash \

    -c "ssh-keygen -q -N '''' -f /home/svnuser/.ssh/id_rsa"

    # Fedora ************************************************

    adduser -r -N -G subversion -s "/bin/rbash" \

    -d /home/svnuser svnuser

    mkdir /home/svnuser

    chown svnuser.subversion /home/svnuser

    echo "export PATH=." > /home/svnuser/.bashrc

    ln -s /bin/svnserve /home/svnuser

    su svnuser --shell /bin/bash \

    -c "ssh-keygen -q -N '''' -f /home/svnuser/.ssh/id_rsa"

    # OpenSUSE Leap *****************************************

    useradd -r -G subversion -m -U -s /usr/bin/rbash svnuser

    ln /usr/bin/svnserve /usr/lib/restricted/bin/svnserve

    su svnuser --shell /bin/bash \

    -c "ssh-keygen -q -N '''' -f /home/svnuser/.ssh/id_rsa"

    ```


    `adduser` 命令创建用户，将 `subversion` 组分配给该用户，并且由于使用了 `–shell /bin/rbash` 或 `-s` 参数，应用了访问限制。`ssh-keygen`
    命令生成 SSH 密钥，并且，对你而言更重要的是，它创建了一个空间，你可以在其中放置用于从外部连接的公钥。


    对于 Ubuntu、Debian 和 Fedora，我在主目录中添加了一些命令链接，因为它们是 Subversion 在这些系统上正常运行所必需的。对于 OpenSUSE
    Leap，`svnserve` 命令是必需的，但我改为将该 `svnserve` 命令的*硬*链接添加到了 `/usr/lib/restricted/bin`
    文件夹中。

    '
- fmt: '# Subversion Clients


    As a client, you use the `Subclipse` Eclipse plugin. In your browser, navigate
    to


    ```

    https://marketplace.eclipse.org/content/subclipse

    ```


    and drag the install badge onto your Eclipse window. Select all the features and
    finish the installation. Choose Window ➤ Preferences ➤ Team ➤ SVN and ignore the
    error message about a missing JavaHL installation. From the SVN Interface option,
    select `SVNKit` as the client. This will make the error message disappear. Click
    Apply and Close.


    Now you need a public/private SSH key pair for each Subversion user on their workstation.
    If you already have one or if you have a Linux box, an `ssh-keygen` will create
    such a public/private key pair. On Windows, you can, for example, install Cygwin
    and use the same command, or use PuTTY (you must convert the key to the OpenSSH
    format in this case). It is also possible to install a key generator in the PowerShell.
    Use `Install-Module -Force OpenSSHUtils` and enter `ssh-keygen`.


    The public counterpart of the key needs to go to the server. There, add its contents
    to the `authorized_keys` file inside the `.ssh/` of the `svnuser` user you want
    to connect to. Make sure this file is visible to the user only:


    ```

    # We are "root"

    cat thePublicKey.file >>

    /home/svnuser/.ssh/authorized_keys

    chown svnuser.subversion \

    /home/svnuser/.ssh/authorized_keys

    chmod 600 \

    /home/svnuser/.ssh/authorized_keys

    ```


    With the user’s public key on the server, it is now possible to access the repository
    from Eclipse. To this aim, open the SVN Repository Exploring perspective by choosing
    Window ➤ Perspective ➤ Open Perspective ➤ Other... In the SVN Repositories tab
    on the left, right-mouse-click and choose New → Repository Location... For the
    URL, enter this:


    ```

    svn+ssh://svnuser@THE.SERVER.ADDR/srv/subversion/RestDate

    ```


    Unless Eclipse already knows about your SSH key or can guess it, you will be prompted
    for credentials and can point Eclipse to the key; see Figure [4-1](#490565_1_En_4_Chapter.xhtml#Fig1).


    ![](images/490565_1_En_4_Chapter/490565_1_En_4_Fig1_HTML.jpg)


    A window displays the credentials. The credentials are repository, username, selected
    use private key authentication option, password, key file, passphrase, and port
    number as 22, click on the save information checkbox and click on the ok button.


    **Figure 4-1** SSH credentials input


    **Caution**


    If you didn’t add a passphrase to that key while building it, Eclipse shows another
    input dialog for that empty passphrase. Enter an `x` into the password field to
    enable the OK button. Then check the Save Password checkbox, clear the password
    field, and click OK. See Figure [4-2](#490565_1_En_4_Chapter.xhtml#Fig2).


    ![](images/490565_1_En_4_Chapter/490565_1_En_4_Fig2_HTML.jpg)


    A window to enter the username and password. It includes a repository, username,
    and password, click on the save password checkbox with the cancel and ok buttons.


    **Figure 4-2** Extra password input


    The new repository is now available in Eclipse’s SVN Repositories view, including
    all the branches and tags; see Figure [4-3](#490565_1_En_4_Chapter.xhtml#Fig3).


    ![](images/490565_1_En_4_Chapter/490565_1_En_4_Fig3_HTML.jpg)


    A window of SVN repositories displays a new repository in Eclipse SVN Repositories
    view which includes folders of branches, tags, and trunk.


    **Figure 4-3** Repository view


    To connect the `RestDate` project to Subversion, right-click the project, then
    choose Team ➤ Share Project... In the wizard dialog box, select SVN as the repository
    type, then check the Use Existing Repository Location option and select the repository
    you just registered. In the next wizard dialog box, check the Use Specified Folder
    Name option and enter `trunk`. See Figure [4-4](#490565_1_En_4_Chapter.xhtml#Fig4).
    Click Next, then Finish to complete this process.


    ![](images/490565_1_En_4_Chapter/490565_1_En_4_Fig4_HTML.jpg)


    A window of Share Project to enter the folder name. Select trunk as use specified
    folder name and click on the finish button. It has a box with URL.


    **Figure 4-4** Connect the project to SVN


    The project has now been shared with Subversion. You can see it by looking for
    `[trunk]`, which was added to the Package Explorer view. See Figure [4-5](#490565_1_En_4_Chapter.xhtml#Fig5).


    ![](images/490565_1_En_4_Chapter/490565_1_En_4_Fig5_HTML.jpg)


    A window of the package explorer where the `RestDate` of trunk is visible on the
    SVN workspace with other projects such as `bin`, `gradle`, and `src`.


    **Figure 4-5** Project under Subversion control


    Now you need to add all the files and folders—except for the `bin` folder—to the
    Subversion repository. Right-mouse-click the `bin` folder and choose Team ➤ Add
    to `svn:ignore`... Then select the project by right-mouse-clicking and choosing
    Team ➤ Commit... Then set all the other files and folders under version control.'
