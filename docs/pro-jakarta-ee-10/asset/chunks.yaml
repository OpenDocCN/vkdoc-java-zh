- fmt: '# 5. Continuous Integration


    Continuous Integration (CI) involves continuously delivering applications to an
    integration server. A CI product on that server will then instantaneously or at
    least periodically deploy or redeploy such applications for testing and demonstration
    purposes.


    This book doesn’t talk about CI servers too much, since CI is not part of the
    Jakarta EE specification. Most CI products hook into version repository commits,
    however; so from a developer’s perspective, CI is automatically performed once
    the developer performs a commit into Subversion or Git. Corporate policy usually
    determines how artifacts need to be checked in, more precisely into which branch
    they need to be checked in and how commits are marked, in order for CI to happen.


    ## The Jenkins CI Server


    Without going into detail, I present with a working example of a Jenkins installation.
    Jenkins is a free, open-source CI server. You can get the program and the user
    handbook from


    ```

    https://jenkins.io/download/

    https://jenkins.io/doc/book/

    ```


    The rest of this chapter assumes that you are running a Jenkins server. The handbook
    tells you more in its “Installing Jenkins” chapter.


    Caution


    Jenkins runs on port `8080`. Since this port is frequently used by other programs
    as well, you can also configure a different port. Open the `/etc/default/jenkins`
    file and change the port at `HTTP_PORT=8080` to a port that better suits your
    needs. Run `systemctl restart jenkins` to apply the changes. If Jenkins didn’t
    start because port `8080` was used by a different program, change the configuration
    and then issue a `systemctl start jenkins` command.


    To see whether Jenkins has started correctly, you can view its log file at `/var/log/jenkins/jenkins.log`.
    In your browser, open `http://localhost:8080` and follow the instructions.


    Note


    If you see a blank page, run `systemctl restart jenkins` once to clean things
    up.


    You will see a localized version of the Jenkins site. To get as close as possible
    to the descriptions in the following paragraphs, you can change the language setting
    in your browser to English. In Firefox, for example, enter `about:config` in the
    Address field, then change the `intl:accept_languages` setting. Put `en` in front
    of the comma-separated list.


    ## Starting a Jenkins Project


    Once you enter the Jenkins web administrator, create a new item using the New
    Item menu entry. This corresponds to a Jenkins project. Give it any name you like
    and choose Pipeline for the type. All the other types can be used for CI projects
    as well, but the pipeline type provides a good mixture of ease and flexibility.
    For the other types, consult the documentation.


    Note


    If you use the Jenkins WAR file installation type, you might have to add the plugins
    before you can proceed. This chapter assumes that you are using the CLI version.


    As an example, you can use the `RestDate` project you created in Chapter [2](#490565_1_En_2_Chapter.xhtml)
    and create a corresponding Git repository directly on the Jenkins server:


    ```

    sudo su        # become root

    mkdir /srv     # only if it does not exist yet

    mkdir /srv/git # only if it does not exist yet

    mkdir /srv/git/RestDate

    cd /srv/git

    adduser git  # if missing yet

    chown git.git RestDate

    cd RestDate

    su git         # now we are the git user

    git init --bare

    mkdir tmp      # temporary

    cd tmp

    git clone file:///srv/git/RestDate

    cd RestDate

    ```


    This script creates the folder, registers a new `git` user in the operating system,
    and initializes the Git repository. This assumes that `adduser` also creates a
    group of the same name. Ubuntu does that. Otherwise, use `addgroup git` to create
    that group. In the `tmp` folder, create a local clone of the repository. Now copy
    the `gradle.properties`, `build.gradle`, `settings.gradle`, `gradlew`, `src`,
    and `gradle` files and folders from the `RestDate` project to the `tmp/RestDate`
    folder.


    Note


    The `gradlew` file and the `gradle` folder exist only if you allowed Eclipse to
    build the Gradle wrapper. Make sure you did not uncheck the corresponding checkbox
    while creating the Eclipse project.


    Add another file called `Jenkinsfile` (no suffix) with the following contents
    to the same folder:


    ```

    pipeline {

    agent any

    stages {

    stage(''Stage 1'') {

    steps {

    echo ''Hello world!''

    }

    }

    }

    }

    ```


    This file describes a Jenkins pipeline. In the terminal, continue with the following:


    ```

    git add *

    git commit -m "Initial"

    git push origin

    ```


    This registers all the project files in the version control system (in the `master`
    branch, to be precise).


    Back in the Pipeline configuration section of the Jenkins web administrator, change
    the definition to `Pipeline script from SCM` and specify the following:


    ```

    SCM:                GIT

    Repository URL:     file:///srv/git/RestDate

    Credentials:        -none-

    Branches to build:  */master

    Repository browser: (Auto)

    Script path:        Jenkinsfile

    ```


    Obviously, if you had not created the Git repository on the same machine, you
    could have specified an appropriate Git URL such as `ssh://...`, together with
    an authentication mechanism, such as username plus a password or a certificate.'
