    ## 构建并上传公司库


    既然你已经知道，要将库上传到公司的 Maven 仓库，需要以下内容：


    *   库的 JAR 文件本身

    *   描述库及其依赖关系的 `.pom` 文件

    *   上述所有文件的 MD5 和 SHA1 哈希值


    你需要找到一种方法来生成 POM 文件和哈希值。下面是一个尽可能自动化此过程的脚本：


    1.  从仓库中检出项目。

    2.  构建项目（即创建库的 JAR 文件）。

    3.  通过适配后的 `build.gradle` 文件生成 POM 文件。

    4.  从同一个构建文件中添加 MD5 和 SHA1 哈希值。

    5.  将所有内容上传到公司的 Maven 仓库。


    你要做的第一件事是创建一个脚本文件，该文件通过包含的 Groovy 脚本创建一个适配后的 Gradle 构建文件。这个脚本文件可以是一个 bash 脚本，但这会相当复杂，因为你需要进行一些替换操作，而在
    bash 中这并不容易实现。因此，你改用 Groovy 脚本。由于你手头有 Gradle，而 Gradle 内部包含完整的 Groovy，你可以将脚本打包到
    Gradle 构建文件中。为此，创建一个空目录，并添加一个包含以下内容的 `buildRepoGradle.gradle` 文件：


    ```

    task a { doLast {

    def FS = File.separator

    def buildFile = new File("build.gradle")

    def newBuild = buildFile.readLines().

    grep { ln -> !( ln ==~ /\s*archivesBaseName\s*=.*/ ) }.

    grep { ln -> !( ln ==~ /\s*group\s*=.*/ ) }.

    grep { ln -> !( ln ==~ /\s*version\s*=.*/ ) }.

    grep { ln -> !( ln ==~ /\s*id\s+(''|")maven("|'')\s*/) }.

    join("\n")

    // 添加 maven 插件。该插件能够生成 POM 文件

    newBuild = newBuild.replaceFirst(

    /(?s)plugins\s*\{([^}]*)\}/) { all, p ->

    "plugins {" + p + "  id ''maven''\n" + "}"

    }

    // 添加 Maven 坐标

    newBuild = newBuild.replaceFirst(

    /(?s)plugins\s*\{[^}]*\}/) { all ->

    all +

    "\ngroup = ''" +

    project.properties.GROUP_ID + "''" +

    "\narchivesBaseName = ''" +

    project.properties.ARTIFACT_ID + "''" +

    "\nversion = ''" +

    project.properties.VERSION + "''" +

    "\n"

    }

    // 添加 POM 生成任务

    newBuild += """\n

    task writePomAndHashes() {

    doLast {

    def FS = File.separator

    def jarName = ''""" + project.properties.ARTIFACT_ID +

    "-" + project.properties.VERSION + ".jar" + """''

    def pomName = ''""" + project.properties.ARTIFACT_ID +

    "-" + project.properties.VERSION + ".pom" + """''

    pom {

    project {

    inceptionYear ''2019''

    licenses {

    license {

    name ''Property of the company''

    }

    }

    }

    }.writeTo(buildDir.absolutePath + FS +

    "poms" + FS + pomName)

    // 添加哈希值

    def jarFile = buildDir.absolutePath + FS +

    ''libs'' + FS + jarName

    def pomFile = buildDir.absolutePath + FS +

    ''poms'' + FS + pomName

    def md5 = java.security.MessageDigest.

    getInstance("MD5")

    def sha1 = java.security.MessageDigest.

    getInstance("SHA-1")

    new File(jarFile+".md5").bytes =

    md5.digest(jarFile.bytes)

    new File(jarFile+".sha1").bytes =

    sha1.digest(jarFile.bytes)

    new File(pomFile+".MS5").bytes =

    md5.digest(pomFile.bytes)

    new File(pomFile+".sha1").bytes =

    sha1.digest(pomFile.bytes)

    // 写入信息文件

    def infoFile = new File(buildDir.absolutePath + FS +

    "repoFiles.txt")

    infoFile.delete()

    infoFile << jarFile + "\\n" +

    jarFile + ".md5\\n" +

    jarFile + ".sha1\\n" +

    pomFile + "\\n" +

    pomFile + ".md5\\n" +

    pomFile +".sha1\\n"

    }

    }"""

    new File("build2.gradle").text = newBuild

    } }

    ```


    该脚本获取原始的 `build.gradle` 文件，首先移除一些将由你自己完成的声明，例如设置 Maven 工件 ID、Maven 组 ID 和 Maven
    版本。然后确保加载了 Maven 插件，因为该插件可以生成你所需的 POM 文件。接着设置 Maven 项目坐标，并编写 POM 生成器任务，其中包括计算哈希值。该任务最后做的一件事是创建一个信息文件，列出生成的工件。


    接下来是一个 bash 脚本 `toRepo.sh`。它检出库项目，调用这个 Gradle 生成器脚本，然后将生成的工件复制到 Maven 仓库：


    ```

    #!/bin/bash

    GROUP_ID=book.jakartapro

    ARTIFACT_ID=textutils

    VERSION=1.0

    REPO_BASE=`pwd`/REPO

    GIT_URL=/the/path/to/GITREPO/TextUtils

    # 从 GIT 检出

    rm -rf checkout && mkdir checkout

    cd checkout

    git clone $GIT_URL .

    cp ../buildRepoGradle.gradle .

    # ---------------------------------------------------

    # 创建一个修改后的 build.gradle 文件：build2.gradle

    ./gradlew -b buildRepoGradle.gradle -q \

    -PGROUP_ID=${GROUP_ID} \

    -PARTIFACT_ID=${ARTIFACT_ID} \

    -PVERSION=${VERSION} \

    a

    # ---------------------------------------------------

    ./gradlew -b build2.gradle build

    ./gradlew -b build2.gradle writePomAndHashes

    cd ..

    # 将所有内容复制到仓库中

    pathInRepo=\

    ${GROUP_ID//\./\/}/${ARTIFACT_ID//\./\/}/${VERSION}

    mkdir -p $REPO_BASE/$pathInRepo

    while read p; do

    cp $p $REPO_BASE/$pathInRepo

    done < checkout/build/repoFiles.txt

    rm -rf checkout

    ```


    调整文件顶部的变量，然后调用脚本：`./toRepo.sh`。首先确保文件是可执行的（`chmod a+x toRepo.sh`）。Git URL 当然也可以是网络
    URL，例如 `http://...` 或 `ssh://...`，但如果你在同一台机器上，也可以直接输入路径。Git 知道你的意思是 `file://...`
    协议。


    # 第二部分 高级 Web 层主题


    # 7. Facelets


    本章介绍如何使用 Faces 4.0 内置的模板引擎，即 *Facelets*。与使用纯 Faces 相比，你可以使用 Facelets 进一步模块化前端代码，并提高代码质量、复用性和可维护性。


    注意


    Faces 的旧名称 *JSF* 已不再使用。


    ## 通过 Facelets 进行 Faces 模板化


    虽然你可以通过使用各种完全定义的 Faces（XHTML）页面以及来自以下组件命名空间的标签来创建一个完整的页面流 Web 应用程序，但依赖这三个标签库可能不是最明智的方式：


    ```

    h="jakarta.faces.html"

    f="jakarta.faces.core"

    pt="jakarta.faces.passthrough"

    ```


    （最后一个是一个伪组件命名空间，用于*不*由 Faces 处理的属性。）如果你的页面具有通用结构，例如包含页眉、菜单、页脚和内容区域，那么所有 Faces
    页面都必须重复应用程序不同部分共有的所有页面元素。这违反了 DRY（不要重复自己）原则。相反，如果你能使用模板机制来组合页面，利用模式、(*X*)HTML
    片段和占位符，那会更好。


    Faces 包含了这样一种模板技术，称为 *Facelets*。Facelets 允许你引入参数化的模板 HTML 页面、要包含在页面中的 HTML 片段（组件）、此类片段的占位符，以及用于诸如详细列表视图等内容的装饰器和重复结构。在接下来的章节中，你将了解配置问题和
    Facelets 标签。在本章的最后一节，你将开发一个示例应用程序来入门。


    这个示例应用程序模拟了一个在线音乐盒的功能。它包含一个页眉、一个页脚和一个菜单，无论用户当前使用哪个功能，该菜单都会出现在 Web 应用程序的每个页面上。Facelets
    在让你分解出公共页面部分方面做得很好，这样你只需编写一次代码。参见图 7-1。


    ![](img/490565_1_En_7_Fig1_HTML.png)


    一个 HTML 模板的图示。它包含 5 个框，分别带有文本、占位符和 3 个点。名为 snippet 或 component 的框指向占位符。


    图 7-1


    使用 Facelets 进行模板化


