    ## 17. Custom CDI


    CDI (Context and Dependency Injection) can be used to fetch session or request
    contexts, inject beans for EL (Expression Language) usage, retrieve entity managers
    in a JPA context, and more. They do this to seamlessly let classes interact with
    containers provided by Jakarta EE. CDI, however, has another facet which regularly
    gets ignored by introductions, tutorials, and blog entries: You can allow CDI
    to construct application-internal object graphs or even use your own contexts,
    producers, interceptors, decorators, stereotypes, and CDI-style events.


    ### CDI Specification


    Jakarta EE 10 includes the CDI technology, version 4.0. Find the specification
    document at


    ```

    https://jakarta.ee/specifications/cdi/4.0

    ```


    This chapter talks about some interesting aspects of CDI for intra-application
    use. For more information and online resources like the documentation of the reference
    implementation, Weld can help you. Visit:


    ```

    http://weld.cdi-spec.org/documentation/

    ```


    ### Building Object Graphs


    With normal Java SE, the *programming model* for building object graphs consists
    of explicit associations and instantiations of classes:


    ```

    public class Address {

    private String country;

    private String state;

    private String city;

    private String street;

    private String number;

    private String zip;

    // getters and setters...

    }

    public class Person {

    private String firstName;

    private String lastName;

    private char gender;

    private String ssn;

    private LocalDate birthday;

    private Address address;

    // getters and setters...

    }

    public class Invoice {

    private Person buyer;

    private LocalDateTime time;

    private List entries = new ArrayList();

    // getters and setters...

    }

    ...

    Person buyer = new Buyer();

    buyer.setFirstName("Peter");

    // Set other Buyer fields...

    Invoice inv = new Invoice();

    inv.setBuyer(buyer);

    inv.setTime(LocalDateTime.now());

    // Set other Invoice fields...

    ```


    The instantiation and plumbing work shown in the last lines of this snippet go
    to a suitable method inside your code.


    > **Note:** The classes all need to have their own Java files. The rest of this
    chapter suppresses this note for simplicity.


    With CDI, you still declare the associations, but you let the CDI engine instantiate
    objects and assign them to fields:


    ```

    public class Address {

    private String country;

    private String state;

    private String city;

    private String street;

    private String number;

    private String zip;

    // getters and setters...

    }

    public class Person {

    private String firstName;

    private String lastName;

    private char gender;

    private String ssn;

    private LocalDate birthday;

    @Inject private Address address;

    // getters and setters...

    }

    public class Invoice {

    @Inject private Person buyer;

    private LocalDateTime time;

    private List entries = new ArrayList();

    // getters and setters...

    }

    ...

    // Somewhere, as a class member:

    @Inject Invoice inv;

    ```


    Because of the `@Inject`, you know that an `Invoice` object created by CDI *does*
    have a `Person` instance in the `buyer` field (don''t use `new`!), and that the
    `buyer` *does* have an `Address` instance in the `address` field (again, you don''t
    use `new` to manually instantiate `Address` instances).


    The most prominent conceptional difference between the non-CDI code and the CDI
    code is the way an object graph is bootstrapped. With non-CDI, you do all that
    inside some appropriate method, but with CDI at work, you can just use an injected
    field `@Inject Invoice inv;` *inside a class, which itself is under custody of
    CDI*. This is easy to achieve inside a Faces bean class, a REST endpoint class,
    or an EJB:


    ```

    // Faces: -------------------------------------

    @ManagedBean

    @SessionScoped

    public class SomeJsfBean {

    @Inject Invoice inv;

    ...

    }

    // REST endpoint: -----------------------------

    @Path("/invoice")

    public class RestInvoice {

    @Inject Invoice inv;

    @GET

    @Path("show")

    @Produces("application/json")

    public String show() {

    return "{ ... }";

    }

    }

    // EJB: ---------------------------------------

    @Stateful

    public class InvoiceBean {

    @Inject Invoice inv;

    ...

    }

    ```


    By the way, it is also possible to inject instances into constructors and setters:


    ```

    public class SomeClass {

    @Inject

    public SomeClass(Invoice inv) {

    ...

    }

    ...

    }

    public class SomeClass {

    ...

    @Inject

    public setInvoice(Invoice inv) {

    ...

    }

    ...

    }

    ```


    It is important to understand that in your code you still don''t explicitly use
    those constructors or setters, even with constructor or setter injection at work!


    If you programmatically need to fetch an instance of a CDI bean class, you can
    write the following:


    ```

    import jakarta.enterprise.inject.se.SeContainer;

    import jakarta.enterprise.inject.se.SeContainerInitializer;

    ...

    SeContainerInitializer containerInit =

    SeContainerInitializer.newInstance();

    SeContainer container = containerInit.initialize();

    Invoice proc = container.select(Invoice.class).get();

    ...

    // Just for debugging / inspection, list all CDI beans

    container.getBeanManager().getBeans(Object.class).

    forEach(b -> {

    System.out.println(b);

    });

    ...

    container.close();

    ```


    This is also the way you would use CDI in a non-Jakarta EE environment or in elaborated
    unit tests.


    ### Qualifiers


    CDI can also be used to automatically fetch implementations of interfaces. Consider
    the following example:


    ```

    public interface Audit {

    ...

    }

    public class BasicAudit implements Audit {

    ...

    }

    public class SomeBean {

    @Inject Audit audit;

    }

    ```


    CDI sees that `BasicAudit` is the only implementation of the `Audit` interface
    and injects an instance of `BasicAudit` into the field.


    But what happens if you have two implementations, such as in the following setup:


    ```

    public interface Audit {

    ...

    }

    public class BasicAudit implements Audit {

    ...

    }

    public class ComplexAudit implements Audit {

    ...

    }

    public class SomeBean {

    @Inject Audit audit;

    }

    ```


    CDI will now throw an exception, stating that it cannot resolve ambiguous dependencies.


    One way to fix this is to mark the different implementations with qualifiers:


    ```

    public interface Audit {

    ...

    }

    // ------------------------------------------------

    import java.lang.annotation.Retention;

    import java.lang.annotation.Target;

    import static java.lang.annotation.RetentionPolicy.*;

    import static java.lang.annotation.ElementType.*;

    import jakarta.inject.Qualifier;

    @Qualifier

    @Retention(RUNTIME)

    @Target({TYPE, METHOD, FIELD, PARAMETER})

    public @interface Basic {}

    // ------------------------------------------------

    import java.lang.annotation.Retention;

    import java.lang.annotation.Target;

    import static java.lang.annotation.RetentionPolicy.*;

    import static java.lang.annotation.ElementType.*;

    import jakarta.inject.Qualifier;

    @Qualifier

    @Retention(RUNTIME)

    @Target({TYPE, METHOD, FIELD, PARAMETER})

    public @interface Complex {}

    // ------------------------------------------------

    @Basic

    public class BasicAudit implements Audit {

    ...

    }

    // ------------------------------------------------

    @Complex

    public class ComplexAudit implements Audit {

    ...

    }

    // ------------------------------------------------

    public class SomeBean {

    @Inject @Complex Audit audit;

    // or: @Inject @Basic Audit audit;

    }

    ```


    Such annotations are called *qualifier annotations*. Because of the `@Complex`
    (or `@Basic`) next to the `@Inject`, CDI now knows which implementation to take.


    > **Note:** CDI automatically applies a `@Default` qualifier to injections if
    you don''t explicitly declare a qualifier. You can suppress this automatic assignment
    by specifying `@Any`, which expresses "no qualifier."


    ### Alternatives


    To avoid ambiguous dependencies, you can also mark all implementations but one
    with `@Alternative`:


    ```

    public interface Audit {

    ...

    }

    // ------------------------------------------------

    @Default

    public class BasicAudit implements Audit {

    ...

    }

    // ------------------------------------------------

    @Alternative

    public class ComplexAudit implements Audit {

    ...

    }

    // ------------------------------------------------

    public class SomeBean {

    @Inject Audit audit;

    }

    ```


    CDI will select the alternative implementation only if you specify it in `WEB-INF/beans.xml`
    (or `META-INF/beans.xml` if outside Jakarta EE):


    ```

    <beans>

    <alternatives>

    <class>book.jakartapro.cdi.audit.ComplexAudit</class>

    </alternatives>

    </beans>

    ```


    Or, you can avoid writing something into `beans.xml` and instead add a `@Priority`
    to the alternative implementations:


    ```

    public interface Audit {

    ...

    }

    // ------------------------------------------------

    @Priority(100) @Alternative

    public class BasicAudit implements Audit {

    ...

    }

    // ------------------------------------------------

    @Priority(101) @Alternative

    public class ComplexAudit implements Audit {

    ...

    }

    // ------------------------------------------------

    public class SomeBean {

    @Inject Audit audit;

    }

    ```


    The implementation with the highest `@Priority` value wins. You can see that,
    when using the `@Priority` disambiguation, the example removed the `@Default`
    qualifier, since the default does not correspond to a calculable priority.


    ### Producers


    If you need more control over the way CDI instantiates classes, or if you need
    to decide programmatically which implementation of some interface you need for
    injection purposes, you can provide a *producer method* to create CDI beans:


    ```

    public interface Audit {

    ...

    }

    // ------------------------------------------------

    @Vetoed

    public class BasicAudit implements Audit {

    ...

    }

    // ------------------------------------------------

    @Vetoed

    public class ComplexAudit implements Audit {

    ...

    }

    // ------------------------------------------------

    @ApplicationScoped

    public class AuditProducer {

    @Produces

    public Audit produce() {

    Audit res = null;

    if(...) { // make a decision

    res = new BasicAudit();

    } else {

    res = new ComplexAudit();

    }

    return res;

    }

    }

    // ------------------------------------------------

    public class SomeBean {

    @Inject Audit audit;

    }

    ```


    This example had to add `@Vetoed` to the implementations, because otherwise the
    implementations CDI sees would compete with the producer during the dependency
    resolution process, yielding an ambiguation exception. Also, the producer class
    can have any name, but since it is a CDI bean itself and is instantiated by CDI,
    you need to add `@ApplicationScope` to the class, which means you at most get
    one instance of this class for the whole application. Scopes are discussed more
    in the next section.


    Producer methods can have injected parameters, which might help the producer method
    properly do its work:


    ```

    @Produces

    public Audit produce(SomeBean b1,

    SomeOtherBean b2, ...) {

    ...

    }

    ```


    Producer methods can have qualifiers assigned to them, just as implementations
    can have:


    ```

    @ApplicationScoped

    public class AuditProducer {

    @Produces @SomeQualifier

    public Audit produce() {

    ...

    }

    @Produces @SomeOtherQualifier

    public Audit produce() {

    ...

    }

    }

    // ------------------------------------------------

    public class SomeBean {

    @Inject @SomeQualifier Audit audit1;

    @Inject @SomeOtherQualifier Audit audit2;

    }

    ```


    The qualifier annotations must be declared exactly the same way as described for
    implementation qualifiers.


    ### Scope


    Scopes determine the lifecycle of beans created by CDI. In a Jakarta EE environment,
    you learned about a couple of scopes:


    *   `@ApplicationScoped`: Any bean in that scope is instantiated only once during
    the lifetime of an application. All injected beans of the same application refer
    to the same instance.

    *   `@SessionScoped`: Any bean in that scope gets instantiated just once while
    a user session is active. Any injection occurring in the same user session refers
    to the same instance.

    *   `@RequestScoped`: All request scope beans of the same type refer to the same
    instance during a request.

    *   `@ConversationScoped`: Similar to the session scope, but bound to a user activity
    inside a session and explicitly controlled by the web application.


    If beans don''t explicitly declare a scope, they will automatically run inside
    the `@Dependent` scope, which means their lifecycle is bound to the object they
    are injected to. The `Dependent` scope is called a *pseudo-scope*, since it is
    derived. There exists a second pseudo-scope named `Singleton`, which ensures that
    only one instance of the bean exists on a JVM basis.


    You need to add a scope declaration on the type level, or on the method level
    for producers:


    ```

    @ApplicationScope

    public class SomeBean {

    ...

    }

    // ------------------------------------------------

    public class SomeBean {

    @Produces @ApplicationScoped

    public SomeOtherBean produce() {

    ...

    }

    }

    ```


    If you are using only intra-app CDI, or you are running outside a Jakarta EE application,
    only the `@ApplicationScope`, `@Dependent`, and `Singleton` scopes play a role.


    If you need to hook into the construction or destruction of a CDI bean, or for
    debugging purposes, you can use the `@PostConstruct` and `@PreDestroy` annotations:


    ```

    public class SomeBean {

    ...

    @PostConstruct

    public void postContruct() {

    System.out.println("POST-CONSTRUCT");

    }

    @PreDestroy

    public void preDestroy() {

    System.out.println("PRE-DESTROY");

    }

    }

    ```


    ### Interceptors


    Interceptors are used to add crosscutting concerns to method invocations of CDI
    beans. This means that you use them to add logging, auditing, performance measurement,
    and other non-functional code to your bean classes. CDI interceptors are covered
    later in this book, in Chapter [18](#490565_1_En_18_Chapter.xhtml).


    ### Decorators


    Decorators are similar to interceptors, in that they somehow extend existing code.
    But contrary to interceptors, they actually change the functioning of classes,
    so you use them for things like hotfixes or temporary functional changes.


    The only requirement for a CDI bean class to be decoratable is that it must have
    an interface. As an example, consider the `Processor` interface and the `ProcessorImpl`
    implementation:


    ```

    public interface Processor {

    void process(Invoice inv);

    }

    // --------------------------------------------

    public class ProcessorImpl implements Processor {

    public void process(Invoice inv) {

    // some code...

    }

    }

    ```


    To decorate the processor, all you have to do is write a decorator class as follows:


    ```

    @Decorator

    public class ProcessorImplNew implements Processor {

    @Inject @Delegate private ProcessorImpl old;

    public void process(Invoice inv) {

    // some other code...

    }

    }

    ```


    Then you declare the decorator inside `WEB-INF/beans.xml` (or `MEA-INF/beans.xml`
    if you''re outside Jakarta EE):


    ```

    <beans>

    <decorators>

    <class>book.jakartapro.cdi.decorate.ProcessorImplNew</class>

    </decorators>

    </beans>

    ```


    In the decorator class, you can add a field annotated with `@Inject @Delegate`.
    That means you can access the original implementation, so you could use it for
    the decorator code.


    ## 18. Interceptors


    Interceptors are methods or classes that hook into method invocations or lifecycle
    events. You will typically use them for crosscutting concerns like logging, auditing,
    performance measurements, or any other non-functional aspect of an application.
    Non-functional means that the program and data flow of the application are not
    interfered with, so the software functionality stays the same whether or not interceptors
    are used. Interceptor targets—classes that are subject to being intercepted—may
    be session beans, message driven beans, and CDI managed beans. In addition, interceptor
    targets can also be JPA lifecycle listeners, servlets, and Faces phase listeners.
    The fact that the latter are not usually called interceptors but more often are
    called just listeners does not obviate that they can be used the same way as interceptors.
    For Jakarta EE 10, the interceptors (not the JPA, servlets, and Faces lifecycle
    listeners) are described by the Interceptors 2.1 specification.


    ### CDI Interceptors


    CDI interceptors are used to add crosscutting concerns to method invocations of
    CDI beans. You can apply CDI interceptors to *any* class within the custody of
    CDI. This includes session EJBs, message driven beans, and beans used for Faces
    and servlets.


    To start intercepting, you first declare a new annotation, as in the following
    snippet:


    ```

    import java.lang.annotation.Retention;

    import java.lang.annotation.Target;

    import static java.lang.annotation.RetentionPolicy.*;

    import static java.lang.annotation.ElementType.*;

    import jakarta.interceptor.InterceptorBinding;

    @InterceptorBinding

    @Retention(RUNTIME)

    @Target({TYPE, METHOD, FIELD})

    public @interface TracingInterceptor { }

    ```


    The name is up to you. This example implies that you somehow want to trace the
    program flow.


    The interceptor implementation just needs to add the `@Interceptor` annotation
    and the new annotation you just defined:


    ```

    import jakarta.interceptor.*;

    import jakarta.annotation.PostConstruct;

    import jakarta.annotation.PreDestroy;

    @Interceptor

    @TracingInterceptor

    public class TracingInterceptorSys {

    @AroundInvoke

    public Object logMethodEntry(InvocationContext ctx)

    throws Exception {

    System.out.println("Before entering method: " +

    ctx.getMethod().getName());

    // We call the next interceptor in the

    // interceptor chain.

    return ctx.proceed();

    }

    @AroundConstruct

    public void aroundConstruct(InvocationContext ctx) {

    ...

    ctx.proceed();

    }

    /*or*/

    @AroundConstruct

    public Object aroundConstruct(InvocationContext ctx)

    throws Exception {

    ...

    return ctx.proceed();

    }

    @AroundTimeout

    public Object aroundTimeout(InvocationContext ctx)

    throws Exception {

    ...

    return ctx.proceed();

    }

    @PostConstruct

    public void postConstruct(InvocationContext ctx) {

    ...

    ctx.proceed();

    }

    @PreDestroy

    public void preDestroy(InvocationContext ctx) {

    ...

    ctx.proceed();

    }

    }

    ```


    The annotations can be freely mixed. You are not obliged to use all of them.


    In order for the interceptor to be activated, it needs to be added to the `WEB-INF/beans.xml`
    file (or `META-INF/beans.xml` if it''s outside Jakarta EE):


    ```

    <beans>

    <interceptors>

    <class>book.jakartapro.cdi.intercept.TracingInterceptorSys</class>

    </interceptors>

    </beans>

    ```


    To apply the interceptor to CDI beans, you have to add the interceptor annotation
    to a class or method call level:


    ```

    @TracingInterceptor

    public class SomeBean {

    ...

    }

    // --------------------------------------------

    public class SomeBean {

    ...

    @TracingInterceptor

    public void someMethod() {

    ...

    }

    }

    ```


    > **Note:** This is one of the downsides of CDI interception. The clients (the
    classes to be intercepted) must explicitly be annotated, which somehow thwarts
    the non-functional nature of CDI interceptions. Readers of the class code will
    wonder what this annotation is about and might feel tempted to investigate the
    non-functional code. Also, it is not possible to add interceptors without touching
    the code, later in a project, after the development phase. In order to avoid this,
    you must use other technologies, such as runtime weaving in AOP (aspect oriented
    programming).


    It is possible to avoid creating custom interceptor annotations. Although such
    custom annotations, like `@TracingInterceptor` in the previous code, improve the
    flexibility and the expressiveness and thus readability of the code, you can omit
    the annotation and directly write the following:


    ```

    import jakarta.interceptor.AroundInvoke;

    import jakarta.interceptor.Interceptor;

    import jakarta.interceptor.InvocationContext;

    @Interceptor

    public class TracingInterceptorSys {

    @AroundInvoke

    public Object logMethodEntry(InvocationContext ctx)

    throws Exception {

    System.out.println("Before entering method: " +

    ctx.getMethod().getName());

    return ctx.proceed();

    }

    }

    // --------------------------------------------

    @Interceptors({TracingInterceptorSys.class})

    public class SomeBean {

    ...

    }

    ```


    ### JPA Lifecycle Listeners


    You have several options for intercepting JPA lifecycle activities. The first
    thing you can do is add methods annotated with `@PrePersist`, `@PostPersist`,
    `@PostLoad`, `@PreUpdate`, `@PostUpdate`, `@PreRemove`, and `@PostRemove` to a
    JPA entity class (tagged with `@Entity`). Such methods can have any name, but
    they must have a zero-size parameter list and they must return `void`.


    Second, you can create a special listener class and assign it to a JPA using special
    annotations:


    ```

    public class MyListener {

    @PrePersist void onPrePersist(Object o) { ... }

    @PostPersist void onPostPersist(Object o) { ... }

    @PostLoad void onPostLoad(Object o) { ... }

    @PreUpdate void onPreUpdate(Object o) { ... }

    @PostUpdate void onPostUpdate(Object o) { ... }

    @PreRemove void onPreRemove(Object o) { ... }

    @PostRemove void onPostRemove(Object o) { ... }

    }

    ...

    @Entity @EntityListeners({MyListener.class})

    public class TheJpa { ... }

    ```


    The object passed as a parameter is the JPA entity class instance. In addition,
    you can add such a listener class to *all* JPA entity beans. To this aim, open
    or create a `src/main/resources/META-INF/orm.xml` file and add the following:


    ```

    <entity-mappings xmlns="https://jakarta.ee/xml/ns/persistence/orm"

    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

    xsi:schemaLocation="https://jakarta.ee/xml/ns/persistence/orm

    https://jakarta.ee/xml/ns/persistence/orm/orm_3_1.xsd"

    version="3.1">

    <persistence-unit-metadata>

    <persistence-unit-defaults>

    <entity-listeners>

    <entity-listener class="the.pac.kage.MyListener"/>

    </entity-listeners>

    </persistence-unit-defaults>

    </persistence-unit-metadata>

    </entity-mappings>

    ```


    Such a listener frequently gets called a *default entity listener*.


    ### Servlet Listeners


    In order to listen to servlet lifecycle events, you create a class as follows:


    ```

    @WebListener()

    public class SimpleServletListener implements ... {

    ... implementation ...

    }

    ```


    and extend one or more of the following interfaces:


    ```

    jakarta.servlet.ServletContextListener

    jakarta.servlet.ServletContextAttributeListener

    jakarta.servlet.ServletRequestListener

    jakarta.servlet.ServletRequestAttributeListener

    jakarta.servlet.http.HttpSessionListener

    jakarta.servlet.http.HttpSessionAttributeListener

    ```


    These listeners listen to the following events during the lifetime of a servlet:


    *   `HttpSessionListener`: Listens to HTTP sessions (user sessions) being initialized
    or destroyed. This is a good hook for auditing purposes.

    *   `ServletContextListener`: Listens to a servlet''s context being initialized
    or destroyed. You can use this to react to a web application that just started.

    *   `ServletRequestListener`: Tells about a request being initialized or destroyed.

    *   `HttpSessionAttributeListener`: Listens to session attributes being added,
    removed or altered.

    *   `ServletContextAttributeListener`: Listens to context attributes being added,
    removed or altered.

    *   `ServletRequestAttributeListener`: Listens to request attributes being added,
    removed or altered.


    ### Faces Phase Listeners


    To add a phase listener to monitor various Faces phases, you add a listener class
    declaration to `src/main/webapp/WEB-INF/faces-config.xml`:


    ```

    <faces-config xmlns="https://jakarta.ee/xml/ns/jakartaee"

    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

    xsi:schemaLocation="https://jakarta.ee/xml/ns/jakartaee

    https://jakarta.ee/xml/ns/jakartaee/web-facesconfig_4_0.xsd"

    version="4.0">

    <lifecycle>

    <phase-listener>the.pac.kage.MyPhaseListener</phase-listener>

    ... more phase listeners ...

    </lifecycle>

    </faces-config>

    ```


    (Make sure there are no line breaks or spaces after `jakartaee/`.)


    The implementation then indicates which phase it is interested in and presents
    the methods that are executed before and after the phase:


    ```

    package the.pac.kage;

    ...

    public class MyPhaseListener implements PhaseListener {

    private static final long serialVersionUID =

    -7607159318721947672L;

    // The phase where the listener is going to be called

    private PhaseId phaseId = PhaseId.RENDER_RESPONSE;

    public void beforePhase(PhaseEvent event) {

    ...

    }

    public void afterPhase(PhaseEvent event) {

    ...

    }

    public PhaseId getPhaseId() {

    return phaseId;

    }

    }

    ```


    Allowed `PhaseId` values include the following:


    1.  `ANY_PHASE` for all phases.

    2.  `RESTORE_VIEW` for the *restore view* phase. This is the first phase, where
    the in-memory view representation is built.

    3.  `APPLY_REQUEST_VALUES` for the *apply request values* phase. This is the second
    phase, where the input field values are read.

    4.  `PROCESS_VALIDATIONS` for the validations processing phase.

    5.  `UPDATE_MODEL_VALUES` for the fourth phase, where the model is updated.

    6.  `INVOKE_APPLICATION` for the fifth phase, where the application is invoked
    to, for example, find out which page to load next.

    7.  `RENDER_RESPONSE` for the last phase, where the response is created.


    ## 19. Bean Validation


    If in a JPA entity bean like this


    ```

    @Entity

    public class Customer {

    private String name;

    public String getName () {

    return name;

    }

    public void setName (String name) {

    this.name = name;

    }

    ...

    }

    ```


    you add a non-null check like this


    ```

    ...

    public void setName (String name) {

    if(name == null)

    throw new IllegalArgumentException(

    "Name must not be null");

    this.name = name;

    }

    ...

    ```


    You may feel tempted to think of a standard, shorter way to declare such constraints.
    *Bean validation,* governed by JSR 380, is the answer to this concern. Using bean
    validation, you can simply write this


    ```

    ...

    @NotNull

    private String name;

    public String getName () {

    return name;

    }

    public void setName (String name) {

    this.name = name;

    }

    ...

    ```


    The bean validation version inside Jakarta EE 10 is 3.0 and you can see its specification
    at


    ```

    https://jakarta.ee/specifications/bean-validation/3.0/

    jakarta-bean-validation-spec-3.0.html

    ```


    There are a lot more bean validation constraints. This chapter only talks about
    some of their usage scenarios.


    ### Where to Use Bean Validation


    Bean validation happens at suitable places inside Jakarta EE 10. It is *not* sufficient
    to just add a constraint annotation to your class for bean validation to work.
    The framework must also have the class in its custody in order for the constraints
    to be checked. More precisely, bean validation works at the following places:


    *   Entity beans (JPA)

    *   CDI beans

    *   Faces (beans used in EL constructs, for example during user input fetching)

    *   JAX-RS (RESTful services)


    ### How to Add Constraints


    Constraints can be added to fields as follows:


    ```

    class Person {

    @NotNull @Size(max=30)

    private String name;

    }

    ```


    They can be added to constructor and method parameters as follows:


    ```

    class Person {

    public Person(@NotNull @Size(max=30) String name) {

    ...

    }

    ...

    public void setEmail(@Email email) {

    ...

    }

    }

    ```


    And they can be added to method return values as follows:


    ```

    class Person {

    ...

    @NotNull @Size(max=30)

    public String getCountry() {

    ...

    }

    }

    ```


    ### Built-in Constraints


    All built-in constraints live in the `jakarta.validation.constraints` package.
    The list is as follows:


    *   `@NotNull`: Annotated element must not be `null`.

    *   `@Null`: Annotated element must be `null`.

    *   `@AssertTrue`: Annotated element must be a boolean `true`.

    *   `@AssertFalse`: Annotated element must be a boolean `false`.

    *   `@Min`: Annotated element must be a numeric value greater than or equal to
    some value. The `float` and `double` types are not supported, due to possible
    rounding errors. Example: `@Min(37)`

    *   `@DecimalMin`: Annotated element must be a numeric value greater than or equal
    to some value specified by a string. The `float` and `double` types are not supported,
    due to possible rounding errors. An optional `inclusive` parameter specifies whether
    the specified value is inclusive (the default is `true`). A `null` value is considered
    valid, so you must add `NotNull` to disallow `null`. Examples: `@DecimalMin("37.4")`,
    `@DecimalMin(value="37.4", inclusive=false)`

    *   `@Max`: Annotated element must be a numeric value less than or equal to some
    value. The `float` and `double` types are not supported, due to possible rounding
    errors. Example: `@Max(42)`

    *   `@DecimalMax`: Annotated element must be a numeric value less than or equal
    to some value specified by a string. The `float` and `double` types are not supported,
    due to possible rounding errors. An optional `inclusive` parameter specifies whether
    the specified value is inclusive (the default is `true`). A `null` value is considered
    valid, so you must add `NotNull` to disallow `null`. Examples: `@DecimalMax("42.0")`,
    `@DecimalMax(value="42.0", inclusive=false)`

    *   `@Negative`: Same as `@Max(0)`, but equals is not included and `float` and
    `double` are allowed.

    *   `@Positive`: Same as `@Min(0)`, but equals is not included and `float` and
    `double` are allowed.

    *   `@NegativeOrZero`: Same as `Negative`, but `0.0` is included.

    *   `@PositiveOrZero`: Same as `Positive`, but `0.0` is included.

    *   `@Size`: The size of a string, collection, map, or array must be between the
    specified parameters. Optional parameters include `min` (default is `0`) and `max`
    (default is `Integer.MAX_VALUE`). Examples: `@Size( min = 5 )`, `@Size( min =
    10, max = 15 )`

    *   `@NotEmpty`: Same as `@Size(min=1)`.

    *   `@NotBlank`: Same as `@Size(min=1)`, only for strings.

    *   `@Digits`: Confines the number of integer and fraction digits. Parameters
    include `integer` (maximum number of integer digits) and `fraction` (maximum number
    of fraction digits).

    *   `@Email`: Checks whether a string represents a valid email address. Optional
    additional parameters include `regexp` and `flags`; see `@Pattern`.

    *   `@Pattern`: Annotated element must match the specified pattern. Parameters
    are `regexp` (the regular expression) and `flags` (array of `Pattern.Flag` values,
    for regular expression flags). Examples: `@Pattern(regexp = "\\d6")` (six digits),
    `@Pattern(regexp = "[ABCD]5", flags = Pattern.Flag.CASE_INSENSITIVE )` (five from
    A to D, case-insensitive).

    *   `@Past`: The annotated element must represent a date and time in the past.
    Supported types are `Date`, `Calendar`, and more (see the specification).

    *   `@PastOrPresent`: Same as `@Past`, but present is included.

    *   `@Future`: The annotated element must represent a date and time in the future.
    Supported types are `Date`, `Calendar`, and more (see the specification).

    *   `@FutureOrPresent`: Same as `@Future`, but present is included.


    As a rule of thumb, always add `@NotNull` if you want to disallow `null` values,
    since most constraints consider `null` a positively validating value.


    ### Custom Constraints


    The built-in constraints cover a wide range of validation scenarios. If you still
    feel tempted to create your own constraint, you have to declare the corresponding
    annotation and provide an implementation. As an example, you can create a constraint
    called `PZN8` that denotes the barcode for pharmaceuticals in Germany. It is built
    from a `-` sign, plus seven to eight digits, and one check digit at the end. For
    technical reasons, this string is surrounded by two asterisks (`*`). You''ll want
    to include the check digit into the validation process, so this is a case in which
    you have to use a custom validator.


    The validation annotation code reads as follows:


    ```

    package book.jakartapro.restdate;

    import static java.lang.annotation.ElementType.*;

    import static java.lang.annotation.RetentionPolicy.RUNTIME;

    import java.lang.annotation.*;

    import jakarta.validation.Constraint;

    import jakarta.validation.Payload;

    @Target({ METHOD, FIELD, ANNOTATION_TYPE,

    CONSTRUCTOR, PARAMETER, TYPE_USE })

    @Retention(RUNTIME)

    @Documented

    @Constraint(validatedBy = { Pzn8Validator.class })

    public @interface PZN8 {

    String message() default "Not a PZN-8";

    Class[] groups() default { };

    Class[] payload() default { };

    boolean includeDelimiters() default false;

    }

    ```


    For the implementation class called `Pzn8Validator`, you have to implement the
    `ConstraintValidator` interface. In its `isValid()` method, you take the input
    string, possibly check and strip off the surrounding asterisks, check for the
    length, check for and strip off the leading `-`, check whether all digits are
    numeric, and then perform the check digit test:


    ```

    import jakarta.validation.ConstraintValidator;

    import jakarta.validation.ConstraintValidatorContext;

    public class Pzn8Validator implements

    ConstraintValidator {

    protected boolean delimitersIncluded;

    @Override

    public void initialize(PZN8 pzn8) {

    this.delimitersIncluded = pzn8.includeDelimiters();

    }

    @Override

    public boolean isValid(String str,

    ConstraintValidatorContext ctx) {

    // null values are valid

    if ( str == null )

    return true;

    String str2 = str;

    if(delimitersIncluded) {

    if(str.length() < 9)

    return false;

    if(str2.charAt(0) != ''-'') return false;

    str2 = str2.substring(1);

    char checkDigit = str2.charAt(str2.length() - 1);

    str2 = str2.substring(0, str2.length() - 1);

    if(!str2.matches("\\d*")) return false;

    // the check digit algorithm for PZNs

    int p = 2;

    int s = 0;

    for(int i=0;i<str2.length();i++) {

    s += p * (str2.charAt(i) - ''0'');

    p++;

    }

    int x = s % 11;

    return (checkDigit - ''0'') == x;

    }

    }

    ```


    You can now add the custom bean validator to any method, constructor, field, or
    method parameter. Just as an example inside a REST controller, you could write
    something like the following:


    ```

    @Path("registerPzn/{pzn}")

    @POST

    @Produces("application/json")

    public Response registerPzn(

    @PathParam("pzn")

    @PZN8 @NotNull String pzn

    )

    {

    ... maybe save in database ...

    return Response.status(200)...; // some OK message

    }

    ```


    ### Bean Validation Exceptions


    Bean validation issues a `jakarta.validation.ValidationException` or one of its
    subclasses when a validation fails. The bean validation specification does not
    contain any information, because handling this message is the business of the
    client code.


    In RESTful applications using Jax-RS, you would for example add an `ExceptionMapper`
    (in the `jakarta.ws.rs.ext` package):


    ```

    import java.util.HashMap;

    import java.util.Map;

    import jakarta.validation.ConstraintViolation;

    import jakarta.validation.ConstraintViolationException;

    import jakarta.ws.rs.core.Response;

    import jakarta.ws.rs.core.Response.Status;

    import jakarta.ws.rs.ext.ExceptionMapper;

    import jakarta.ws.rs.ext.Provider;

    @Provider

    public class ValidationExceptionMapper

    implements

    ExceptionMapper {

    @Override

    public Response toResponse(

    ConstraintViolationException ex) {

    Map errors =

    new HashMap();

    for(ConstraintViolation viol :

    ex.getConstraintViolations()) {

    errors.put(viol.getMessage(),

    viol.getInvalidValue().toString());

    }

    return Response.status(

    Status.PRECONDITION_FAILED).

    entity(errors).build();

    }

    }

    ```


    Note that `ConstraintViolationException` is a subclass of `jakarta.validation.ValidationException`.


    ## 20. Jakarta EE Concurrency


    Concurrency in Java enterprise applications cannot be achieved the same way as
    in Java SE, where you can use the classes from the `java.util.concurrent` package
    and the `Thread` class and its affiliated classes. The reason for this difference
    is because the container context data does not automatically propagate to manually
    created threads, which frequently leads to issues with container-provided resources.
    Using threads in Jakarta EE''s predecessor, JEE, was deprecated until version
    8 and developers used to abuse JMS for multithreading, which led to large overhead
    for concurrency administration and to bad scalability. Fortunately with JEE version
    7 and of course Jakarta EE 8 and later, the situation changed and a dedicated
    enterprise concurrency API was added. This chapter covers Jakarta EE concurrency
    using this API.


    ### Preparing the Jakarta EE Server


    Concurrency services in Jakarta EE are services provided and managed by the server,
    so they need to be configured using server administrative tools. For your server
    product, you have to consult the manual to learn how to do that.


    For GlassFish, enter the web administration console at `http://localhost:4848`
    and choose Resources ➤ Concurrent Resources. You will see the following objects:


    *   **ContextService**: This service is responsible for context propagation to
    the threads created by the other services. You normally don''t have to alter this
    service or create more services of this type. The preconfigured default context
    service is sufficient in most cases. An instance of this service type belongs
    to the `jakarta.enterprise.concurrent.ContextService` class.

    *   **Managed Executor Services:** This service type is most often used when you
    need concurrency in Jakarta EE. The preconfigured default managed executor service
    called `defaultManagedExecutorService` can be used as a starting point, and, according
    to circumstances, your application might be happy with this one. You need its
    *Logical JNDI Name* (`java:comp/DefaultManagedExecutorService`) in your application.
    An instance of this service type belongs to the `jakarta.enterprise.concurrent.ManagedExecutorService`
    class.

    *   **Managed Scheduled Executor Services:** Same as above, but for scheduled
    task executions. The *Logical JNDI Name* is `java:comp/DefaultManagedScheduledExecutorService`
    and the class name is `jakarta.enterprise.concurrent.ManagedScheduledExecutorService`.

    *   **Managed Thread Factory:** This service type is used for thread creation
    with propagated container context. This is more low level compared to the other
    services. You need it if you want to use Java SE concurrency utilities in your
    application. GlassFish provides one preconfigured managed thread factory with
    a logical JNDI name of `java:comp/DefaultManagedThreadFactory`.


    ### Using a ManagedExecutorService


    A managed executor service will be your entry point if you need high-level concurrency
    in your Jakarta EE application. There are two ways to acquire this service. The
    more concise method is to inject it via the following


    ```

    @Resource(name="java:comp/DefaultManagedExecutorService")

    private ManagedExecutorService execService;

    ```


    where the resource JNDI name depends on the server product; the name shown corresponds
    to GlassFish''s default and preconfigured service.


    The second way to acquire a managed executor service consists of a JNDI lookup:


    ```

    ManagedExecutorService execService =

    InitialContext.

    doLookup("java:comp/DefaultManagedExecutorService");

    ```


    From here, you can register `Runnable` or `Callable` tasks to be executed in the
    background:


    ```

    Future f1 = execService.submit( () -> {

    // not returning anything, corresponds

    // to a Runnable

    ...

    }

    );

    Future f2 = execService.submit( () -> {

    // not returning anything, corresponds

    // to a Runnable

    ...

    }, 42 /* calculated outside the task */

    );

    Future f3 = execService.submit( () -> {

    // returning something, corresponds

    // to a Callable

    ...

    return 42;

    }

    );

    ```


    Or even create lists of them:


    ```

    List> retrieverTasks =

    new ArrayList>();

    ... fill the list ...

    List> taskResults = execService.

    invokeAll(retrieverTasks);

    ```


    The `Future` objects you get from the invocation may then be used to wait for
    the termination of the background task or tasks:


    ```

    ...

    // waits until background task finishes

    f1.get();

    ...

    ...

    // waits until background task finishes

    Integer backgroundRes = f2.get();

    ...

    // waits until all background tasks finish

    for (Future taskResult : taskResults) {

    try {

    Integer ii = taskResult.get();

    // do something with the res...

    } catch (ExecutionException e) {

    e.printStackTrace(System.err);

    }

    }

    ```


    For more details about `ManagedExecutorService` and for more methods, consult
    the API documentation. The same holds for `Future`, which is documented in the
    Java SE API documentation.


    ### Using a ManagedScheduledExecutorService


    A managed scheduled executor service is similar to a managed executor service,
    except that you can use it for delayed or repeated executions. You acquire the
    service instance via injection or via JNDI lookup:


    ```

    @Resource(name=

    "java:comp/DefaultManagedScheduledExecutorService")

    private ManagedScheduledExecutorService

    schedExecService;

    ...or...

    ManagedScheduledExecutorService schedExecService =

    InitialContext.

    doLookup(

    "java:comp/DefaultManagedScheduledExecutorService"

    );

    ```


    where the JNDI name is `server` and it''s server-configuration dependent. The
    name shown here comes from the preconfigured default service on GlassFish.


    To schedule a task for delayed execution, you can now write the following:


    ```

    ScheduledFuture sf1 = schedExecService.

    schedule( () -> {

    ...

    return 42;

    }, 5L, TimeUnit.SECONDS);

    // or, if you don''t need a result:

    ScheduledFuture sf2 = schedExecService.

    schedule( () ->

    ...

    }, 5L, TimeUnit.SECONDS);

    ```


    The returned `ScheduledFuture` object inherits from `Future`, so you can use it
    to cancel the execution or retrieve the result:


    ```

    // In case we want to cancel the execution:

    sf1.cancel(true);

    ...

    // Wait for the termination. The sf2 object comes from

    // a Runnable, so it can return only ''null'' and we don''t

    // care for the result object.

    int res1 = sf1.get();

    sf2.get();

    ```


    You can also ask for the remaining timeout value:


    ```

    ...

    if(!sf1.isDone()) {

    int remainingMillis = sf1.getDelay(

    TimeUnit.MILLISECONDS);

    ...

    }

    ...

    ```


    For repeated executions, you can specify repetition at a fixed rate or specify
    a fixed delay between the end of one execution and the beginning of the next one:


    ```

    int firstDelay = 5;

    int betweenDelay = 2;

    ScheduledFuture f1 =

    schedExecService.scheduleAtFixedRate(() -> {

    ...

    }, firstDelay, betweenDelay, TimeUnit.SECONDS);

    ...

    ScheduledFuture f2 =

    schedExecService.scheduleWithFixedDelay(() -> {

    ...

    }, firstDelay, betweenDelay, TimeUnit.SECONDS);

    ```


    > **Caution:** Be careful with `scheduleAtFixedRate()`. If subsequent task executions
    take longer than the delay specified, threads may pile up, eventually breaking
    your server.


    A `get()` on the `ScheduledFuture` object returned from the repeated execution
    scheduling will throw an exception. It doesn''t make sense to retrieve the result
    from a repeated execution. You can, however, use it to cancel the repetition by
    invoking the `cancel()` method.


    ### Using the ManagedThreadFactory


    If you need to go a level deeper and create `Thread` instances directly inside
    a Jakarta EE application, you can acquire a `jakarta.enterprise.concurrent.ManagedThreadFactory`


    ```

    @Resource(name = "java:comp/DefaultManagedThreadFactory")

    private ManagedThreadFactory threadFactory;

    ...or...

    ManagedThreadFactory threadFactory =

    InitialContext.

    doLookup(

    "java:comp/DefaultManagedThreadFactory"

    );

    ```


    The JNDI name is `server` and it''s server-configuration dependent. The name shown
    here comes from the preconfigured default service on GlassFish.


    You can now get a thread by calling the corresponding method of that service:


    ```

    // Thread thr = new Thread(); // NO, NOT IN JAKARTA EE!

    Thread thr = threadFactory.newThread( () -> {

    ...

    }

    );

    thr.start();

    ```


    It is also possible to use `ManagedThreadFactory` at places where a `ThreadFactory`
    is asked for. For example


    ```

    ThreadPoolExecutor exec = new ThreadPoolExecutor(

    5, 10, 5, TimeUnit.SECONDS,

    new ArrayBlockingQueue(10),

    threadFactory);

    ```


    This will give you an `ExecutorService` that you can then use for concurrency,
    as described by the Java SE API documentation.


    ### Enterprise Concurrency and Transactions


    Transactionality, as defined by JTA, does not propagate from parents to concurrent
    tasks. It is just too complicated to make sure such an automatism works correctly.


    What you can do, however, is to let the background tasks run in a `UserTransaction`,
    as follows:


    ```

    @Resource(name="java:comp/DefaultManagedExecutorService")

    private ManagedExecutorService execService;

    @Resource

    private UserTransaction ut;

    ...

    public void someMethod() {

    Future f1 = execService.submit( new Runnable() {

    public void run() {

    ut.begin();

    try{

    ...

    ut.commit();

    }catch(Exception e){

    ut.rollback();

    }

    }});

    ...

    }

    ```


    ## 21. Batch Processing


    If you need to perform regularly and automatically repeating tasks without user
    interaction, but based on data that''s fed into a database or file by an external
    process, that''s called *batch processing*. For example, consider software that
    collects employee work hours or aggregates attendance system data each day at
    midnight and updates employee records in a human resources database. While the
    first program consists of a user interface in the form of a web application or
    attendance detection based on cards, badges, or something similar, the aggregation
    software is a typical candidate for batch processing. Jakarta EE 10 includes a
    batch processing technology described by JSR 352. It does *not* include job scheduling
    or triggering. To this aim, you can use timers, EJBs, or a custom process configured
    in a `@Singleton @Startup` annotated bean class. Instead, JSR 352 batch processing
    is a batch programming model, a job specification language, and a batch runtime
    process. The version of batch processing for Jakarta EE 10 is 2.1.


    This chapter covers the Jakarta EE batch processing concepts, without introducing
    every functionality described by JSR 352. For more details, check out the specification
    at


    ```

    https://www.jcp.org/en/jsr/detail?id=352

    ```


    Also, the JEE 7 batch processing tutorial at [`https://docs.oracle.com/javaee/7/tutorial/batch-processing.htm#GKJIQ6`](https://docs.oracle.com/javaee/7/tutorial/batch-processing.htm%2523GKJIQ6)
    has valuable information about batch processing, and you can of course find more
    tutorials on the Internet.


    ### Batch Processing Concepts


    Batch processing describes the execution of a number of *batch jobs*. Each job
    initially runs on a separate thread. A job consists of one or more steps, and
    by default, the steps run consecutively on the job''s single thread. A step may
    be *partitioned,* which means that its workload will run on separate threads.
    You can use a partitioning procedure if the items from the input data can be processed
    independently of each other. There is a distinction between a *chunk* step type,
    where the input items get processed, and a *task* step type, which does not see
    the individual data items but instead is used for initialization, logging, cleanup,
    or aggregation purposes. A *flow* is a sequence of steps running as a unit. It
    is not possible to perform step transitions from individual steps from inside
    the flow to another step outside the flow. Transitions can only happen after each
    flow has finished its work. If you want to run several flows in parallel, that''s
    called *split* execution. Flows are optional, so you don''t have to use them if
    you don''t need them. A job may contain *decision* elements, which means the step-by-step
    workflow may be controlled by decision elements.


    ### Preparing the Server for Batch Processing


    To learn whether or not your Jakarta EE server needs to be prepared for batch
    processing, and how to do this, consult your server manual.


    For the GlassFish server, you need to configure a JDBC resource. This is necessary
    because the server needs a database to store job maintenance data. You can administer
    this resource for GlassFish (version 7) using the `asadmin` command:


    ```

    ./asadmin create-jdbc-connection-pool \

    --datasourceclassname \

    org.apache.derby.jdbc.EmbeddedXADataSource \

    --restype javax.sql.XADataSource \

    --property portNumber=1527:password=APP:user=APP:

    serverName=localhost:

    databaseName=\$\{com.sun.aas.instanceRoot\}/lib/

    databases/batchprocessing:

    connectionAttributes=\;create\\=true \

    MyBatchPool

    ```


    (Make sure all the properties are in one line and the spaces are removed.) This
    installs an embedded Derby database. Derby is included with GlassFish 7, so you
    don''t have to install it. Since it is embedded, you don''t have to start it neither.
    In order to check the connection pool, actually probing the database, enter the
    following:


    ```

    ./asadmin ping-connection-pool MyBatchPool

    ```


    If you ever need to remove it, here''s how you do that:


    ```

    ./asadmin delete-jdbc-connection-pool MyBatchPool

    ```


    Next you need to configure a JNDI resource to be able to address the new JDBC
    pool. Enter the following:


    ```

    ./asadmin create-jdbc-resource \

    --connectionpoolid MyBatchPool jdbc/MyBatchPool

    ```


    If you need to delete it, write the following:


    ```

    ./asadmin delete-jdbc-resource jdbc/MyBatchPool

    ```


    In order to ensure that the batch processing engine uses the new JDBC connection,
    enter the following in a terminal:


    ```

    ./asadmin set-batch-runtime-configuration \

    --datasourcelookupname jdbc/MyBatchPool \

    --executorservicelookupname \

    concurrent/__defaultManagedExecutorService

    ```


    ### An Employee Attendance Example Batch Processing


    As an example for a batch processing, consider a single file collecting employee
    attendance data as follows:


    ```

    162836945,1459763400000,1459774320000

    162836945,1459837380000,1459851300000

    618456945,1459756800000,1459783380000

    ...

    ```


    The first column contains social security numbers, then the start and end times
    (milliseconds since 1970-01-01 00:00:00 UTC) of an attendance.


    You need to write a Jakarta EE enterprise application in form of an EAR file with
    batch processing acting from inside an EJB as follows:


    *   In a chunk step, read in the lines from the input file using a *reader.*

    *   Still in the chunk step, process the items and filter out entries with a missing
    SSN (social security number).

    *   Still in the chunk step, collect the attendance times and aggregate them for
    each employee.

    *   In a subsequent task step, perform any cleanup activities. The input file
    gets a `.bak` suffix, and empty output folders are possibly deleted.


    For simplicity, this example doesn''t use a database or write everything into
    a file system folder, one file per SSN. In a production setup, you would probably
    enhance this and write everything into a database. Also, the input could as well
    come from a database instead of a file.


    File access in GlassFish is restricted by global permissions. In order for this
    batch processing application to work, edit the `GLASSFISH_INST/glassfish/domains/domain1/config/server.policy`
    file and add this to the end:


    ```

    grant {

    permission java.io.FilePermission

    ">", "write,read,delete";

    };

    ```


    ### Starting a Batch Processing EAR Project


    Inside Eclipse, create a new Gradle project. Replace the contents of the `build.gradle`
    with the following:


