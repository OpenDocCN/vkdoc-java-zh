  trans: '

    ## Subversion 客户端


    作为客户端，你需要使用 `Subclipse` Eclipse 插件。在浏览器中，导航到


    ```

    https://marketplace.eclipse.org/content/subclipse

    ```


    并将安装徽章拖拽到你的 Eclipse 窗口中。选择所有功能并完成安装。选择 **窗口** ➤ **首选项** ➤ **团队** ➤ **SVN**，忽略关于缺少
    JavaHL 安装的错误消息。从 **SVN 接口** 选项中，选择 **SVNKit** 作为客户端。这将使错误消息消失。点击 **应用并关闭**。


    现在，你需要为每个 Subversion 用户在其工作站上生成一个公钥/私钥 SSH 密钥对。如果你已经有一个，或者你有一台 Linux 机器，`ssh-keygen`
    命令将创建这样一个公钥/私钥对。在 Windows 上，你可以安装 Cygwin 并使用相同的命令，或者使用 PuTTY（在这种情况下，你必须将密钥转换为
    OpenSSH 格式）。也可以在 PowerShell 中安装密钥生成器。使用 `Install-Module -Force OpenSSHUtils` 并输入
    `ssh-keygen`。


    密钥的公钥部分需要放到服务器上。在那里，将其内容添加到你要连接的 `svnuser` 用户的 `.ssh/` 目录下的 `authorized_keys`
    文件中。确保该文件仅对该用户可见：


    ```

    # 我们是 "root"

    cat thePublicKey.file >>

    /home/svnuser/.ssh/authorized_keys

    chown svnuser.subversion \

    /home/svnuser/.ssh/authorized_keys

    chmod 600 \

    /home/svnuser/.ssh/authorized_keys

    ```


    将用户的公钥放在服务器上后，现在就可以从 Eclipse 访问仓库了。为此，通过选择 **窗口** ➤ **透视图** ➤ **打开透视图** ➤ **其他...**
    来打开 **SVN 仓库浏览** 透视图。在左侧的 **SVN 仓库** 选项卡中，右键单击并选择 **新建** → **仓库位置...**。对于 URL，输入以下内容：


    ```

    svn+ssh://svnuser@THE.SERVER.ADDR/srv/subversion/RestDate

    ```


    除非 Eclipse 已经知道你的 SSH 密钥或可以猜测到它，否则系统会提示你输入凭据，并可以将 Eclipse 指向该密钥；参见图 4-1。


    ![](img/490565_1_En_4_Fig1_HTML.jpg)


    一个窗口显示凭据。凭据包括仓库、用户名、选中的使用私钥认证选项、密码、密钥文件、密码短语和端口号（22），点击保存信息复选框，然后点击确定按钮。


    **图 4-1**

    SSH 凭据输入


    **注意**


    如果在生成密钥时没有添加密码短语，Eclipse 会显示另一个输入对话框来输入该空密码短语。在密码字段中输入一个 `x` 以启用确定按钮。然后勾选 **保存密码**
    复选框，清空密码字段，并点击 **确定**。参见图 4-2。


    ![](img/490565_1_En_4_Fig2_HTML.jpg)


    一个用于输入用户名和密码的窗口。它包含仓库、用户名和密码，点击保存密码复选框，并带有取消和确定按钮。


    **图 4-2**

    额外密码输入


    现在，新仓库在 Eclipse 的 **SVN 仓库** 视图中可用，包括所有分支和标签；参见图 4-3。


    ![](img/490565_1_En_4_Fig3_HTML.jpg)


    一个 SVN 仓库窗口在 Eclipse SVN 仓库视图中显示了一个新仓库，其中包含 branches、tags 和 trunk 文件夹。


    **图 4-3**

    仓库视图


    要将 `RestDate` 项目连接到 Subversion，右键单击该项目，然后选择 **团队** ➤ **共享项目...**。在向导对话框中，选择 **SVN**
    作为仓库类型，然后勾选 **使用现有仓库位置** 选项，并选择你刚刚注册的仓库。在下一个向导对话框中，勾选 **使用指定的文件夹名称** 选项，并输入 `trunk`。参见图
    4-4。点击 **下一步**，然后点击 **完成** 以完成此过程。


    ![](img/490565_1_En_4_Fig4_HTML.jpg)


    一个共享项目窗口，用于输入文件夹名称。选择 trunk 作为使用指定的文件夹名称，并点击完成按钮。它有一个带有 URL 的框。


    **图 4-4**

    将项目连接到 SVN


    该项目现在已与 Subversion 共享。你可以通过查找添加到 **包资源管理器** 视图中的 `[trunk]` 来看到它。参见图 4-5。


    ![](img/490565_1_En_4_Fig5_HTML.jpg)


    一个包资源管理器窗口，其中 trunk 的 RestDate 在 SVN 工作区中可见，并带有其他项目，如 bin、gradle 和 src。


    **图 4-5**

    受 Subversion 控制的项目


    现在，你需要将所有文件和文件夹（`bin` 文件夹除外）添加到 Subversion 仓库。右键单击 `bin` 文件夹，选择 **团队** ➤ **添加到
    svn:ignore...**。然后通过右键单击项目并选择 **团队** ➤ **提交...** 来选择项目。然后将所有其他文件和文件夹置于版本控制之下。

