- fmt: "与 VisualVM 分析一样，请务必关注**保留**（*retained*）堆大小。你可以通过单击、双击或右键单击相关类，并执行各种计算和选择来继续此分析。这里几乎不可能描述所有功能，但插件附带的帮助文档应该能为你提供一个起点。\n\
    \n对于本章中的人工内存泄漏，你可以例如右键单击`MemLeak`类，然后选择 **Leak Identification ➤ Component Report**。通过单击\
    \ **Retained Set** 标签，你将看到有大量`MemLeak$A`对象与此类静态关联。\n\n## 39. 自定义 Log4j Appender\n\
    \nLog4j appender 负责将日志事件写出或发送到某个外部消费者。有许多内置的 appender 可供使用，因此如果你有特殊需求，应首先检查 Log4j\
    \ 是否能满足你的需求。表 [39-1](#490565_1_En_39_Chapter.xhtml#Tab1) 列出了 Log4j 附带的所有 appender。\n\
    \n> **注意**\n>\n> Log4j 从 1.x 版本到 2.x 版本发生了重大变化。这就是为什么 2.x 版本通常被称为 Log4j2。尽管 Log4j\
    \ 1.x 仍在使用，但本章中提及 Log4j 时，我指的是 Log4j2。\n\n**表 39-1** Log4j Appender\n\n| 名称 |\
    \ 描述 |\n| :--- | :--- |\n| `Async` | 包装另一个 appender，并在新线程中异步发送日志事件。 |\n| `Cassandra`\
    \ | 将日志事件发送到 Apache Cassandra 数据库。 |\n| `Console` | 将日志事件发送到控制台。请注意，大多数 Jakarta\
    \ EE 服务器会重定向控制台，并将控制台消息写入服务器日志文件。 |\n| `Failover` | 包装一个 appender 列表，并按顺序发送日志事件，直到其中一个成功。\
    \ |\n| `File` | 将日志事件发送到文件。 |\n| `Flume` | 将日志事件发送到 Apache Flume（一个用于路由和聚合大量日志数据的系统）。\
    \ |\n| `JDBC` | 将日志事件发送到可通过 JDBC 访问的数据库。 |\n| `JMS` | 将日志事件发送到可通过 JMS 访问的消息系统。\
    \ |\n| `JPA` | 通过持久化 API（JPA 2.1）将日志事件发送到数据库。 |\n| `HTTP` | 通过 HTTP 发送日志事件。 |\n\
    | `Kafka` | 将日志事件发送到 Apache Kafka 实例（一个分布式事件流平台）。 |\n| `Memory Mapped File` |\
    \ 将日志事件发送到内存映射文件。操作系统负责将数据写入内存区域，稍后再将数据同步到真实文件。 |\n| `NoSQL` | 通过轻量级 API 将数据发送到\
    \ NoSQL 数据库。提供了针对 MongoDB 和 CouchDB 的实现。 |\n| `NoSQL for MongoDB 3` | 将日志事件发送到\
    \ MongoDB v3。 |\n| `NoSQL for MongoDB 4` | 将日志事件发送到 MongoDB v4。 |\n| `NoSQL for\
    \ CouchDB` | 将日志事件发送到 CouchDB。 |\n| `Random Access File` | 与文件 appender 相同，但始终使用缓冲。\
    \ |\n| `Rewrite` | 允许在日志事件发送到另一个 appender 之前对其进行操作。 |\n| `Rolling File` | 与文件\
    \ appender 相同，但允许滚动文件策略。 |\n| `Rolling Random Access File` | 与随机访问文件 appender\
    \ 相同，但允许滚动文件策略。 |\n| `Routing` | 允许将事件路由到下级 appender。 |\n| `SMTP` | 允许将日志事件作为电子邮件发送。\
    \ |\n| `ScriptAppenderSelector` | 根据脚本结果选择 appender。 |\n| `Socket` | 将日志事件写入 TCP\
    \ 或 UDP 套接字。 |\n| `Syslog` | 与套接字 appender 相同，但使用 BSD Syslog 或 RFC 5424 格式。 |\n\
    | `ZeroMQ/JeroMQ` | 将日志事件发送到 ZeroMQ 网络系统。 |\n\n更多详情，请参阅文档：[`https://logging.apache.org/log4j/2.x/manual/appenders.html`](https://logging.apache.org/log4j/2.x/manual/appenders.html)。如果没有内置的\
    \ appender 满足你的需求，构建一个自定义 appender 也并不复杂。以下章节将向你展示如何操作。\n\n### 包含 Log4j\n\n为了使用\
    \ Log4j 并编写自定义 appender，请添加以下依赖：\n\n```groovy\n// Gradle\nimplementation 'org.apache.logging.log4j:log4j-core:2.17.2'\n\
    ```\n\n```xml\n<dependency>\n    <groupId>org.apache.logging.log4j</groupId>\n\
    \    <artifactId>log4j-core</artifactId>\n    <version>2.17.2</version>\n</dependency>\n\
    ```\n\n### 一个统计 Appender"
  raw: "As was the case for the VisualVM analysis, be\nsure to watch out for the *retained*\
    \ heap sizes. You would\ncontinue this analysis by clicking, double-clicking,\
    \ or right-clicking\nthe class in question and performing various calculations\
    \ and\nselections. It is almost impossible to describe all the functionalities\n\
    here, but the help included with the plugin should give you a starting\npoint.\n\
    For the artificial memory leak in this chapter, you can for example\nright-mouse-click\
    \ the `MemLeak` class, and then choose\nLeak Identification ➤ Component Report.\
    \ By clicking the Retained Set\nlabel, you’ll see that there is a huge number\
    \ of `MemLeak$A` objects\nstatically associated with this class.\n\n39. Custom\
    \ Log4j Appender\n\nLog4j appenders\nare responsible for writing out or sending\
    \ log events to some external\nconsumer. There are many built-in appenders you\
    \ can use, so if you have\nspecial requirements, you should first check whether\
    \ Log4j can fulfill\nyour needs. Table [39-1](#490565_1_En_39_Chapter.xhtml#Tab1)\
    \ lists all the\nappenders that ship with Log4j.\n\nNote\n\nLog4j heavily changed\
    \ from version 1.x to 2.x. That is why versions\n2.x are commonly referred to\
    \ as Log4j2\\. Although Log4j 1.x is still in\nuse, I mean Log4j2 when I refer\
    \ to Log4j in this chapter.\n\nTable 39-1\nLog4j Appenders\n\nName |\n Description\
    \ |\n\n| --- | --- | --- | --- | --- |\n\nAsync |\n Wraps another appender and\
    \ sends log events asynchronously in a new\nthread. |\n\nCassandra |\n Sends log\
    \ events to an Apache Cassandra database. |\n\nConsole |\n Sends log events to\
    \ the console. Note that most Jakarta EE servers redirect the\nconsole and write\
    \ console messages to the server log file\ninstead. |\n\nFailover |\n Wraps a\
    \ list of appenders and sends log events in order until one\nsucceeds. |\n\nFile\
    \ |\n Sends log events to a file. |\n\nFlume |\n Sends log events to Apache Flume\
    \ (a system for routing and aggregating large\namounts of log data). |\n\nJDBC\
    \ |\n Sends log events to a database accessible via JDBC. |\n\nJMS |\n Sends log\
    \ events to a messaging system accessible via JMS. |\n\nJPA |\n Sends log events\
    \ to a database via Persistence API (JPA 2.1). |\n\nHTTP |\n Sends log events\
    \ via HTTP. |\n\nKafka |\n Sends log events to an Apache Kafka instance (a distributed\
    \ event streaming\nplatform). |\n\nMemory Mapped File |\n Sends log events to\
    \ a memory mapped file. The OS takes care of writing the data to\na memory region\
    \ and only later syncs the data with a real file. |\n\nNoSQL |\n Sends data to\
    \ a NoSQL database through a lightweight API. An implementation for\nMongoDB and\
    \ CouchDB is provided. |\n\nNoSQL for MongoDB 3 |\n Sends log events to a MongoDB\
    \ v3. |\n\nNoSQL for MongoDB 4 |\n Sends log events to a MongoDB v4. |\n\nNoSQL\
    \ for CouchDB |\n Sends log events to a CouchDB. |\n\nRandom Access File |\n Same\
    \ as file appender, but always buffered. |\n\nRewrite |\n Allows log events to\
    \ be manipulated before they are sent to another\nappender. |\n\nRolling File\
    \ |\n Same as file appender, but allows for a rolling file policy. |\n\nRolling\
    \ Random Access File |\n Same as random access file appender, but allows for a\
    \ rolling file\npolicy. |\n\nRouting |\n Allows for routing events to subordinate\
    \ appenders. |\n\nSMTP |\n Allows for sending log events as emails. |\n\nScriptAppenderSelector\
    \ |\n Selects appenders based on a script outcome. |\n\nSocket |\n Writes log\
    \ events to TCP or UDP sockets. |\n\nSyslog |\n Same as socket appender, but uses\
    \ the BSD Syslog or the RFC 5424\nformat. |\n\nZeroMQ/JeroMQ |\n Sends log events\
    \ to a ZeroMQ networking system. |\n\nFor more details, see the documentation\
    \ at [`https://logging.apache.org/log4j/2.x/manual/appenders.html`](https://logging.apache.org/log4j/2.x/manual/appenders.html).\n\
    If none of the built-in appenders suits your needs, it is not too\ncomplicated\
    \ to build a custom appender. The following sections show you\nhow to do that.\n\
    \nIncluding Log4j\n\nIn order to use Log4j and write a custom appender, add the\
    \ following\ndependency:\n\n```\n// Gradle\nimplementation 'org.apache.logging.log4j:log4j-core:2.17.2'\n\
    \norg.apache.logging.log4j\nlog4j-core\n2.17.2\n\n```\n\nA Statistics Appender"
