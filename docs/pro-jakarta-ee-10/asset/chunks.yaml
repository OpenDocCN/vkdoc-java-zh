    第七部分 高级监控与日志记录


    34. 监控工作流


    监控是任何企业级应用的关键组成部分。您需要能够监控技术方面（如内存使用率、CPU 负载和线程数）、性能指标（如耗时和吞吐量）以及功能方面（如销售额、订单数量和运营成本）。


    本章涵盖监控工作流的流程，包括数据供应、数据聚合以及监控指标的呈现。


    使用 JMX 作为监控技术


    当然，可以通过日志记录、EJB、Web 服务（通过 SOAP 的 XML 或通过 REST 的 JSON）和 Servlet 来提供监控数据。然而，从 1.6
    版本开始，Java 包含了一种能够以更直接的方式进行监控的技术：JMX（Java 管理扩展）。通过使用 JMX，可以声明称为 MBean 的特殊类，将其属性和方法设置为可从
    JVM 内部和外部访问或调用。这样，应用程序可以更容易地提供可监控的数据。此外，JVM 本身也通过 JMX 提供有关其状态的有价值信息。


    MBean 有多种类型：


    *   标准 MBean

    *   动态 MBean

    *   开放 MBean

    *   模型 MBean

    *   MXBean


    它们在已发布属性或方法在 MBean 编码中的反映方式、注册方式以及客户端与服务器之间允许通信的类型上有所不同。


    在您可选的类型中，MXBean 对于监控目的特别有用。这是因为通信类型仅限于标准 Java 类型，从而简化了客户端访问，并且对于每个可监控的特性，您只需在
    MBean 类代码中提供一个 getter 方法。例如，考虑预订工作流中的耗时。您只需要一个接口和一个 MBean 类：


    ```java

    package book.jakartapro.jmxmonitoring;

    public interface MonitoringBeanMXBean {

    double getElapse();

    void setElapse(double elapse);

    }

    package book.jakartapro.jmxmonitoring;

    public class MonitoringBean

    implements MonitoringBeanMXBean {

    private double elapse;

    public double getElapse() {

    return elapse;

    }

    public void setElapse(double elapse) {

    this.elapse = elapse;

    }

    }

    ```


    在应用程序初始化方法中，您必须将 MBean 注册到 MBean 服务器。为简单起见，此示例使用平台 MBean 服务器，该服务器已配置好并为每个 JVM
    自动启动。


    ```java

    import java.lang.management.ManagementFactory;

    import javax.management.ObjectName;

    ...

    final String OBJECT_NAME =

    "book.jakartapro.mxbeans:type=MonitoringBean";

    ...

    MonitoringBean m = ...;

    ...

    try {

    ManagementFactory.getPlatformMBeanServer().

    registerMBean(m,

    new ObjectName(OBJECT_NAME));

    } catch (Exception e) {

    e.printStackTrace(System.err);

    }

    ```


    启用远程 JMX


    为了使客户端能够通过网络访问 MBean，您需要向服务器添加一些 JVM 启动属性：


    ```

    -Dcom.sun.management.jmxremote=true

    -Dcom.sun.management.jmxremote.port=9010

    -Dcom.sun.management.jmxremote.ssl=false

    -Dcom.sun.management.jmxremote.authenticate=true

    -Dcom.sun.management.jmxremote.password.file=

    /path/to/jmxremote.password

    ```


    在最简单的形式中，`jmxremote.password` 文件只是一行内容：


    ```

    monitorRole pASSWurd

    ```


    当然，您应该选择自己的密码。在 `JDK-INST-DIR/conf/management` 文件夹中，您可以找到一个名为 `jmxremote.password.template`
    的模板文件，其中详细描述了密码文件的所有选项。


    注意


    要启用 SSL，预计需要额外的大量工作。您必须将证书添加到服务器的信任库和密钥库，并相应地配置您的 JMX 客户端。


    请查阅您的 Jakarta EE 服务器文档，了解如何添加 JVM 启动属性。


    对于 GlassFish，您必须向 `server.policy` 文件（位于 `glassfish/domains/domain1/config` 内）添加安全设置，如下所示：


    ```

    grant {

    permission javax.management.MBeanPermission

    "*", "getMBeanInfo";

    permission javax.management.MBeanPermission

    "*", "getAttribute";

    };

    ```


    Jakarta EE 应用程序中的 MBean


    由于每个 Jakarta EE 应用程序都在容器控制的环境中运行，您可以简化 MBean 的注册，以进一步简化 JMX 监控。假设您可以为整个应用程序（EJB
    或 Web 应用程序）使用单个 MBean 实例，您可以添加 `@ApplicationScoped` 注解以确保容器负责构造 MBean，并添加一个带有
    `@PostConstruct` 注解的后构造方法来注册 MBean：


    ```java

    package book.jakartapro.jmxmonitoring;

    import java.lang.management.ManagementFactory;

    import javax.management.ObjectName;

    import jakarta.annotation.PostConstruct;

    import jakarta.enterprise.context.ApplicationScoped;

    @ApplicationScoped

    public class MonitoringBean

    implements MonitoringBeanMXBean {

    private static final String OBJECT_NAME =

    "book.jakartapro.mxbeans:type=MonitoringBean";

    private double elapse;

    public double getElapse() {

    return elapse;

    }

    public void setElapse(double elapse) {

    this.elapse = elapse;

    }

    @PostConstruct

    public void start() {

    try {

    ManagementFactory.getPlatformMBeanServer().

    registerMBean(this,

    new ObjectName(OBJECT_NAME));

    } catch (Exception e) {

    e.printStackTrace(System.err);

    }

    }

    }

    ```


    为了设置可监控值而访问 MBean 就变得很简单了——您只需使用 CDI 注入 MBean，如下所示：'
