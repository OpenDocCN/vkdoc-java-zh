  trans: "\n/login/login.xhtml\n/login/error.xhtml\n\nadmin\n\n```\n\n由于 `<security-constraint>`\
    \ 内部的设置，\n服务器会拦截对某些资源的访问，具体如下：\n\n*   `<url-pattern>` 内部的模式\n    决定了要监控哪些资源。此处，你指明\
    \ `admin/` 下的所有\n    资源都必须置于安全监管之下。\n\n*   传输协议被强制使用 SSL/TLS。这是因为\n    `<transport-guarantee>`\
    \ 内部的 `CONFIDENTIAL` 标记。\n    如有必要，从 HTTP 到 HTTPS 的切换会自动进行。\n\n*   用户已通过身份验证并拥有\
    \ `admin` 角色。这是\n    因为 `<role-name>` 标签。\n\n`<login-config>`\n元素表明\n你想要使用基于表单的身份验证，并指定了登录\n\
    表单文件。稍后将讨论这些文件。在 `<login-config>` 内部，\n`<auth-method> FORM </auth-method>`（`FORM`\
    \ 是一个\n预定义常量）规定了一个用于身份验证的自定义表单。\n`<realm-name> file </realm-name>` 指明了授权数据\n的位置。这是服务器特定的——这里的\
    \ `file`（不是\nJakarta EE 规范中看到的预定义常量）是用于\nGlassFish 的，它指定了服务器上用于存储用户和密码的本地文件。\n\
    `<security-role>`\n元素列出了\n所有影响应用程序的角色（除了未授权访问）。\n虽然你可以有多个角色，但本例中只有一个。\n\n安全角色映射\n\
    \n服务器将\n角色（在 `web.xml` 中定义）映射到\n用户组（在服务器产品中定义）。此映射在\n`WEB-INF / *-web.xml` 文件中指定。对于\
    \ GlassFish，你需要重写\n`WEB-INF` 文件夹内的 `glassfish-web.xml`\n文件，并使其内容如下：\n\n```\n\n\
    admin\nApplAdmin\n\n```\n\n`admin`\n角色被映射到 `ApplAdmin` 用户组，\n因为你在前面的章节中使用了 `ApplAdmin`\
    \ 作为用户的组。\n\n基于表单的身份验证 XHTML 代码\n\nWeb 用户进入受保护应用程序部分所需的步骤\n取决于你的应用程序，更准确地说，取决于\
    \ `web.xml`\n文件中 `<security-constraint>` 内部的 `<url-pattern>`\n标签。例如，如果你需要一个按钮或链接来进入\n\
    安全区域，你可以这样写：\n\n```\n...\n\n...\n\n...或...\n\n...\n\n```\n\n注意\n\n为简洁起见，本示例对 XHTML\
    \ 文本使用了字面值。对于\n生产代码，你应该改用语言资源文件。\n\n如果在 `<security-constraint>`\n内部的 `<url-pattern>`\n\
    标签中，你编写了以下内容：\n\n```\n/admin/*\n```\n\n服务器就知道它需要要求提供凭证才能进入\n按钮或链接中给出的安全区域。\n\n\
    对于基于表单的身份验证代码，`login.xhtml` 由\n`web.xml` 文件中的 `<login-config>`\n引用。你可以编写一个如下所示的登录表单：\n\
    \n```\n\n登录表单\n\n请登录：\n\n```\n\n你可以编写任何你喜欢的内容，添加公司指南定义的图片和样式，\n以及添加“忘记密码”链接、信息页面\n\
    链接、地址、电话号码等。重要的部分是：\n\n*不要*在此处使用 `<h:form>`。\n而是使用此处所示的纯 HTML `<form>` 标签。你必须\n\
    为 action 使用 `j_security_check`，并为\n字段 ID 使用 `j_username` 和 `j_password`。\n\n对于错误\n\
    页面（`login/error.xhtml`），\n当输入无效的用户/密码组合时将显示该页面，\n你可以使用以下内容：\n\n```\n\n登录错误\n\n\
    无效的用户名或密码。\n请输入有权访问受保护部分的用户名或密码。\n对于此应用程序，这意味着\n一个已在文件领域中创建并已分配给\nApplAdmin 组的用户。\n\
    \n```\n\n注意\n\n本示例在链接的值前添加了 `#{request.contextPath}`，\n因为错误页面不能使用相对 URL。\n这是因为它由登录模块处理，该模块会丢弃\n\
    应用程序的 URL 上下文。\n\n应用程序现在可以运行了。你可以部署它，并将浏览器指向\n以下 URL 进行测试：\n\n```\nhttps://localhost:8181/FormBasedAuth/\n\
    ```\n\n13. 客户端证书\n\n在服务器端使用 SSL/TLS 来确保隐私和数据完整性\n是当今非常常见的任务。随着 TLS 的出现，SSL 已被弃用，\n\
    你可以确信你的通信是加密的，并且属于服务器的\n一方的身份也是安全的。服务器向客户端出示\n证书以证明其身份。然而，客户端一侧的身份\n是通过将对话框输入中的密码与数据库中的密码进行比较来检查的。\n\
    如果这对你来说还不够，你可以要求你的\nWeb 应用程序的用户也通过证书进行身份验证。\n为了实现这一点，你使用*客户端*证书。这样，\n你获得了更高的安全性，因为用户不能像有时密码那样\n\
    将证书钉在显示器上，并且将证书借给\n他人与将密码交给他人也是不同的情况。本章讨论\n这些客户端证书。\n\n准备脚本\n在安装客户端证书之前，你需要知道如何\n\
    生成它们。本书涵盖专业的 Web 应用程序，因此你\n可能拥有不止少数几个客户端证书。因此，\n如果你能使用脚本进行批量生产，那就太好了。我向你展示\n这样一个脚本，并且由于此示例使用\
    \ Groovy 作为脚本语言，你可以\n从 Linux 和 Windows 机器上管理客户端证书。\n\n注意\n\n不要忘记添加 Groovy 插件，如本书开头所述。\n\
    \n首先，在 Eclipse 中创建一个新的 Gradle 和 Groovy 项目：选择 文件\n➤ 新建 ➤ 其他... ➤ Gradle 项目，并输入\
    \ `ClientCertificates` 作为\n项目名称。项目创建后，右键单击该项目\n并选择 配置 ➤ 转换为 Groovy 项目，以添加显式的 Groovy\n\
    脚本功能。\n向项目添加一个新的 `scripts` 文件夹，\n然后再次右键单击该项目并选择 属性 ➤\nGroovy 编译器。勾选“启用项目特定设置”复选框。\n\
    对“启用脚本文件夹支持”执行相同操作，并添加 `scripts` 文件夹（在\n对话框中输入 `scripts/*`）。\n\n注意\n\n为了更严格地遵守标准，你可以使用\
    \ `src/main/scripts` 作为\n脚本文件夹。我在这里仅将 Gradle 用于依赖项解析，因此\n使用 `scripts`\n顶级文件夹，虽然不太像\
    \ Gradle 风格，但在项目资源管理器中更容易找到。\n但如果你愿意，也可以使用标准位置。\n\n在 `build.gradle` 文件中，\n为名为\
    \ `Bouncycastle` 的证书管理库添加依赖项，如下所示：\n\n```\ndependencies {\n...\nimplementation\
    \ 'org.bouncycastle:bcprov-jdk15on:1.64'\n}\n```\n\n在同一文件中，确保你使用的是 Java 1.17：\n\
    \n```\nplugins {\n...\n}\nsourceCompatibility = 1.17\ntargetCompatibility = 1.17\n\
    ```\n\n然后右键单击该项目并选择 Gradle ➤ 刷新 Gradle 项目。\n\n生成客户端证书\n\n要生成一个或多个客户端证书，请添加\n名为\
    \ `scripts/generate.groovy` 的脚本文件，如下所示：\n"
- fmt: "```groovy\nimport java.security.spec.RSAPrivateKeySpec\nimport java.security.spec.RSAPublicKeySpec\n\
    import java.security.*\nimport java.security.cert.*\nimport java.time.Instant\n\
    import java.time.temporal.ChronoUnit\nimport org.bouncycastle.jce.provider.BouncyCastleProvider\n\
    import org.bouncycastle.cert.jcajce.*\nimport org.bouncycastle.operator.*\nimport\
    \ org.bouncycastle.asn1.x500.X500Name\nimport org.bouncycastle.operator.jcajce.*\n\
    import org.bouncycastle.openssl.*\nimport org.bouncycastle.openssl.jcajce.JcaPEMWriter\n\
    KEYSTORE_PASSWORD = \"changeit\"\nRSA_KEYSIZE = 2048\nRSA_SIGN_ALGORITHM = 'SHA256WithRSA'\n\
    VALIDITY_DAYS = 3650\nUSERS = [[\"MarkHamilton\",\"pw173\"], [\"LindaGreen\",\"\
    pw518\"]]\nnew File(\"OUTPUT\").deleteDir(); new File(\"OUTPUT\").mkdir()\nUSERS.each\
    \ { user0 ->\ndef user = user0[0]\ndef pw = user0[1]\ndef certFull = makeCert(user)\n\
    def cert = certFull.cert\n//println(cert.getClass())\n//println(cert)\nFileWriter\
    \ fileWriter = new FileWriter(\nnew File(\"OUTPUT\" + File.separator +\n\"clientCert.\"\
    \ + user + \".pem\"))\nJcaPEMWriter pemWriter = new JcaPEMWriter(fileWriter)\n\
    pemWriter.writeObject(cert)\npemWriter.flush()\nX509Certificate[] serverChain\
    \ = new X509Certificate[1]\nserverChain[0] =  cert\ndef keyStore = KeyStore.getInstance(\"\
    PKCS12\")\nkeyStore.load(null, pw.toCharArray())\nkeyStore.setEntry(user,\nnew\
    \ KeyStore.PrivateKeyEntry(certFull.priv,\nserverChain),\nnew KeyStore.PasswordProtection(pw.toCharArray())\n\
    )\ndef fos = new java.io.FileOutputStream(\"OUTPUT\" +\nFile.separator + \"clientCert.\"\
    \ + user + \".p12\")\nkeyStore.store(fos, pw.toCharArray())\n}\ndef makeCert(def\
    \ commonName) {\ndef bcProvider = BouncyCastleProvider.PROVIDER_NAME\nSecurity.addProvider(\n\
    new org.bouncycastle.jce.provider.\nBouncyCastleProvider())\ndef keyPairGenerator\
    \ =\nKeyPairGenerator.getInstance(\"RSA\", bcProvider)\nkeyPairGenerator.initialize(RSA_KEYSIZE)\n\
    def keyPair = keyPairGenerator.generateKeyPair()\ndef contentSigner =\nnew JcaContentSignerBuilder(RSA_SIGN_ALGORITHM).\n\
    build(keyPair.private)\ndef dnName = new X500Name(\"CN=\" + commonName)\ndef certSerialNumber\
    \ = BigInteger.valueOf(\nSystem.currentTimeMillis())\ndef startDate = Instant.now()\n\
    def endDate = startDate.plus(VALIDITY_DAYS,\nChronoUnit.DAYS)\ndef certBuilder\
    \ = new JcaX509v3CertificateBuilder(\ndnName,\ncertSerialNumber,\nDate.from(startDate),\n\
    Date.from(endDate),\ndnName,\nkeyPair.public)\nX509Certificate certificate =\n\
    new JcaX509CertificateConverter().\nsetProvider(bcProvider).\ngetCertificate(certBuilder.build(contentSigner))\n\
    [\"priv\":keyPair.private,\n\"pub\":keyPair.public,\n\"cert\":certificate]\n}\n\
    ```\n\nIf necessary, change the all-capital letters at the top part of the file,\
    \ especially the `USERS` list for the usernames and passwords. Then run the script\
    \ by right-mouse-clicking and choosing Run As ➤ Groovy Script. Update the Package\
    \ Explorer by pressing F5 and you’ll see the certificates in the `OUTPUT` folder.\
    \ The `PKCS12` files are for installing the certificates on the browsers, and\
    \ the `PEM` files are the counterparts that will be registered with the server.\n\
    \n## Storing the Client Certificate in the Browser\n\nTo install the `PKCS12`\
    \ files on the browsers, you must distribute them with an installation manual\
    \ to your users. Or, as an alternative, you can apply some provisioning software\
    \ for that task. The installation procedure depends on the browser you use. If\
    \ you choose manual installation and use Firefox, open the preferences and go\
    \ to the Privacy & Security section. In the Certificates section, click View Certificates,\
    \ and on the Your Certificates tab, click Import. Select the `PKCS12` file. You\
    \ will then be asked for the password. This was specified in the generator script\
    \ in the users list. For Internet Explorer on Windows, just double-click the file\
    \ to start the import procedure. The password you need to enter is the password\
    \ specified in the generator script in the users list.\n\n## Storing the Client\
    \ Certificate on the Server\n\nTo store the client certificates on the server,\
    \ use the `.pem` files you generated in the previous sections. It is possible\
    \ to use a shell script to perform this task, but since you already have a Groovy\
    \ project at hand, you can just as well use a Groovy script to simplify this work\
    \ and to improve flexibility (filtering, renaming, and so on).\n\nFor the GlassFish\
    \ server, you would back up the existing `cacerts.jks` keystore file, read all\
    \ the `.pem` files from the build directory `OUTPUT`, pass them into an in-memory\
    \ representation of the keystore, and eventually overwrite the `cacerts.jks` file\
    \ with the updated version:\n\n```groovy\nimport java.security.*\nimport java.security.cert.*\n\
    import java.time.Instant\nimport java.time.LocalDateTime\nimport java.time.format.DateTimeFormatter\n\
    import java.time.temporal.ChronoUnit\nimport javax.security.auth.x500.X500Principal\n\
    import org.bouncycastle.asn1.x500.X500Name\nimport org.bouncycastle.cert.jcajce.*\n\
    import org.bouncycastle.jce.provider.BouncyCastleProvider\nimport org.bouncycastle.openssl.PEMParser\n\
    import org.bouncycastle.openssl.jcajce.JcaPEMWriter\nimport org.bouncycastle.operator.jcajce.*\n\
    KEYSTORE_PASSWORD = \"changeit\"\nKEYSTORE_ALIAS_PREFIX = \"\"\nIMPORT_FOLDER\
    \ = \"OUTPUT\"\nGLASSFISH_INST = \"/my/local/glassfish/glassfish7\"\nGLASSFISH_DOMAIN\
    \ = \"domain1\"\nSecurity.addProvider(new org.bouncycastle.jce.provider.\nBouncyCastleProvider())\n\
    // Backup old cacerts.jks\ndef FS = File.separator\ndef cacerts = GLASSFISH_INST\
    \ + FS + \"glassfish\" + FS +\n\"domains\" + FS +\nGLASSFISH_DOMAIN + FS + \"\
    config\" + FS + \"cacerts.jks\"\ndef bak = cacerts + \".\" + LocalDateTime.now().format(\n\
    DateTimeFormatter.ISO_LOCAL_DATE_TIME).\nreplaceAll(/[^\\d]/, \"_\")\nnew File(bak).bytes\
    \ = new File(cacerts).bytes\n// Load current keystore\nKeyStore ks = KeyStore.getInstance(\"\
    JKS\")\nchar[] password = KEYSTORE_PASSWORD.toCharArray()\nFileInputStream fis\
    \  = new FileInputStream(cacerts)\nks.load(fis, password)\nfis.close()\n// Fetch\
    \ and register all new keys\nnew File(\"OUTPUT\").listFiles().\ngrep{ f -> f.name.endsWith(\"\
    .pem\") }.each { f ->\nprintln(f)\naddPemToStore(f, ks)\n}\n// Overwrite cacerts.jks\
    \ file\nks.store(new FileOutputStream(new File(cacerts)),\npassword)\ndef addPemToStore(def\
    \ f, def keyStore) {\ndef p = new PEMParser(new FileReader(f))\ndef o = p.readObject()\n\
    X509Certificate x509 =\nnew JcaX509CertificateConverter().\nsetProvider(\"BC\"\
    ).getCertificate(o)\nprintln(x509)\nX500Principal princ = x509.subjectX500Principal\n\
    def name = princ.name.replaceAll(/CN\\s*=\\s*/,\"\")\nprintln(name)\nkeyStore.deleteEntry(KEYSTORE_ALIAS_PREFIX\
    \ + name)\nkeyStore.setCertificateEntry(\nKEYSTORE_ALIAS_PREFIX + name, x509)\n\
    keyStore.aliases().each {\nalias -> println(\"A: \" + alias) }\n}\n```\n\nSave\
    \ this file (for example, as `scripts/importToServer.groovy`). As usual, change\
    \ the all-capital letter variables at the beginning of this file according to\
    \ your needs.\n\n> **Note**  \n> The Jakarta EE server product determines where\
    \ the certificates are stored, so for servers other than GlassFish, other procedures\
    \ apply. Read the server manual to find out how to install certificates.\n\n##\
    \ Client Certificate Web Applications\n\nThe `WEB-INF/web.xml` web deployment\
    \ descriptor used for web applications that want to use client certificates reads\
    \ as follows:\n\n```xml\n...\n...\n\n...\n\n...\n\nSecured Area\n\nMembers\n\n\
    /admin/*\n\nadmin\n\nCONFIDENTIAL\n\nCLIENT-CERT\ncertificate\n\nadmin\n\n...\n\
    ```\n\nObserve the following characteristics:\n\n*   The `<url-pattern>` tag inside\
    \ `<web-resource-collection>` describes the parts of the web applications that\
    \ you want to secure.\n*   The `<role-name>` tag specifies the name of a role\
    \ that a user needs to acquire in order to gain access to the secured parts. Later,\
    \ inside the server-specific deployment descriptor (`glassfish-web.xml` for GlassFish),\
    \ you will see how to describe a mapping from the roles to the user groups.\n\
    *   The `<transport-guarantee> CONFIDENTIAL </transport-guarantee>` code makes\
    \ sure you will be switching to HTTPS (SSL/TLS) for the secured areas."
