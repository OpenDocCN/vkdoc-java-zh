    \ the name\n// of the .ear file, without the suffix\ndef APPL_NAME = \"AppClientServer\"\
    \n// The EJB module name inside the EAR file\ndef EJB_MODULE_NAME = \"AppClientEjb\"\
    \n// The EJB's class name\ndef EJB_NAME = \"TheDate\"\n// The fully qualified\
    \ name of the EJB's remote interface\ndef EJB_REMOTE_CLASS =\n\"book.jakartapro.appclient.ejb.interfaces.TheDateRemote\"\
    \ndef look = \"${NAMING_SCHEMA}/\" +\n\"${APPL_NAME}/${EJB_MODULE_NAME}/\" +\n\
    \"${EJB_NAME}!${EJB_REMOTE_CLASS}\"\ndef ejb = ctx.lookup(look)\ndef date = ejb.fetchDate()\
    \ // invoke the ejb\nprintln date\ndef getContext() {\nProperties props = new\
    \ Properties().with(true){\nsetProperty(Context.INITIAL_CONTEXT_FACTORY,\n\"com.sun.enterprise.naming.SerialInitContextFactory\"\
    )\nsetProperty(\"org.omg.CORBA.ORBInitialHost\",\n\"localhost\") // application\
    \ server\nsetProperty(\"org.omg.CORBA.ORBInitialPort\",\n\"3700\") // Glassfish'\
    \ JNDI port\n}\nnew InitialContext(props)\n}\n```\n\n26. Adding Scripting Languages\n\
    \nThe Java language is not always the best choice for implementing\nbusiness functionalities\
    \ and algorithms. The language only slowly\nimplements new features, which can\
    \ be an advantage, because it is easier\nto maintain old code when the coding\
    \ structures don’t change too often.\nAnd Java is statically typed, which means\
    \ you have to take care of\nobject types at a language level. This leads to more\
    \ typing work, since\ntype specifiers need to be entered often in order to make\
    \ sure that type\nconformance works correctly. Contrary to that, scripting languages\
    \ like\nGroovy and Python often include features to write code more concisely,\n\
    and they are often typed dynamically. That means that type checks don’t\ntake\
    \ place during compiling and the code contains fewer boilerplate\nconstructs to\
    \ ensure variable type conformance in assignments.\nFortunately, Java allows you\
    \ to mix Java language code and scripting\nlanguages by means of JSR 223\\. The\
    \ Java code is compiled before you have\nany deployable (and runnable) artifacts\
    \ like class files and class file\narchives, while the scripts are compiled at\
    \ runtime. This opens another\nusage scenario for scripts: Because they can be\
    \ changed without having\nto compile the application over and over again, scripts\
    \ can be changed\nmore easily even after an application enters the production\
    \ stage.\nScripts can, for example, be saved as text in a database, or in resource\n\
    files extraneous to deployment artifacts, like JARs, WARs, and EARs.\nThis chapter\
    \ explains how to include Groovy and Python scripts in a\nJakarta EE application.\n\
    \nInstalling Scripting Engines\n\nIn order to use JSR 223 scripting, you have\
    \ to add the following\ndependencies to your project:\n\n```\n// For Python, in\
    \ Gradle build.gradle file\nimplementation 'org.python:jython-standalone:2.7.2'\n\
    \norg.python\njython-standalone\n2.7.2\n\n// For Groovy, in Gradle build.gradle\
    \ file\nimplementation 'org.apache.groovy:groovy-jsr223:4.0.8'\n\norg.apache.groovy\n\
    groovy-jsr223\n4.0.8\n\n```\n\nUsing Scripting in Java\n\nIn order to use a script\
    \ from anywhere inside your\ncode, write this code (Python version):\n\n```\n\
    import javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
    import javax.script.ScriptException;\n...\nScriptEngine engine = new ScriptEngineManager().\n\
    getEngineByName(\"python\");\n// read in Python code\nStringReader f = new StringReader(\n\
    \"class Multiplier:\\n\"\n+ \"\\n\"\n+ \"  def multiply(self, x, y):\\n\"\n+ \"\
    \    return x * y\\n\"\n+ \"\\n\"\n+ \"x = Multiplier().multiply(par1, par2)\\\
    n\"\n);\n//  40\n...\n```\n\nThe Groovy variant for the same script reads as follows:\n\
    \n```\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
    import javax.script.ScriptException;\n...\nScriptEngine engine = new ScriptEngineManager().\n\
    getEngineByName(\"groovy\");\n// read in Groovy code\nStringReader f = new StringReader(\n\
    \"class Multiplier {\\n\"\n+ \"  def multiply(def x, def y) {\\n\"\n+ \"    x\
    \ * y\\n\"\n+ \"  }\\n\"\n+ \"}\\n\"\n+ \"x = new Multiplier().multiply(par1,\
    \ par2)\\n\"\n);\n//  40\n```\n\nPart VAdvanced Resource Related Topics\n\n27. Hibernate\
    \ as ORM\n\nThe GlassFish Jakarta EE application server comes with a built-in\n\
    EclipseLink as a JPA provider, and other application servers have their\nown ideas\
    \ about which JPA provider to use. After all, it’s one of the\nstrengths of JPA\
    \ that application developers don’t have to worry about\nwhich JPA provider is\
    \ used. If you do want to prescribe the JPA provider\nfor some reason, you can\
    \ do so without having to change the application\nserver installation.\nThis chapter\
    \ explains how to configure the application to use\nHibernate as a JPA provider.\
    \ The procedure is similar when using other\nproviders.\n\nNote\n\nGo to [`https://hibernate.org/`](https://hibernate.org/)\n\
    to learn what can be done with Hibernate.\n\nInstalling Hibernate\n\nTo install\
    \ Hibernate as a JPA\nprovider, add the following code to your `build.gradle`\
    \ or `pom.xml` file, for\nGradle or Maven, respectively:\n\n```\n...\ndependencies\
    \ {\n...\nimplementation 'org.hibernate:' +\n'hibernate-core-jakarta:5.6.3.Final'\n\
    }\n...\n\n...\n\norg.hibernate\nhibernate-core-jakarta\n5.6.3.Final\n\n...\n```\n\
    \nAdapting the Persistence Configuration\n\nYou need to tell the JPA configuration\
    \ to use Maven as a JPA provider.\nTo this aim, open `persistence.xml`\ninside\
    \ the `META_INF` folder and\nadd the following:\n\n```\n\norg.hibernate.jpa.HibernatePersistenceProvider\n\
    \n...\n\n...\n\n-->\n\n```\n\nThe Hibernate documentation tells you more about\
    \ the Hibernate\nsettings you can place in this file.\n\nFetching the Hibernate\
    \ Session\n\nTo directly address the Hibernate JPA given an injected entity manager,\n\
    the API documentation suggests using the following code:\n\n```\n...\nimport org.hibernate.Session;\n\
    ...\n@PersistenceContext(unitName = \"my-persistence-unit\")\nprivate EntityManager\
    \ entityManager;\n...\nSession session = entityManager.unwrap(Session.class);\n\
    // directly use the Hibernate session:\n// ...\n```\n\nCaution\n\nUnfortunately,\
    \ due to class-loading issues, this does not currently\nwork for GlassFish 7.\n\
    \n28. Connectors\n\nIt might not be possible for a Jakarta EE application to seamlessly\n\
    communicate with legacy EISs (enterprise information systems) using one\nof the\
    \ standard communication protocols. This is especially true in\ncorporate environments.\
    \ For this to be possible, you have to create a\nresource adapter that conforms\
    \ to the Jakarta Connectors\narchitecture.\nThe Jakarta Connectors technology\
    \ (version number 2.1) is part of the\nJakarta EE 10 technology stack. The JCA\
    \ project’s home page can be found\nat [`https://projects.eclipse.org/projects/ee4j.jca/releases/2.1.0`](https://projects.eclipse.org/projects/ee4j.jca/releases/2.1.0),\n\
    and for the specification, see [`https://www.jcp.org/en/jsr/detail?id=322`](https://www.jcp.org/en/jsr/detail%253Fid%253D322).\n\
    Creating a connector for a big or\nimportant EIS can be a very challenging task.\
    \ The specification document\nhas more than 500 pages, so this book covers only\
    \ a few features of the\nConnectors architecture. This chapter works through a\
    \ simple JCA\nproject, which nevertheless should give you a starting point for\
    \ your\nown projects.\n\nCoding a Resource Adapter\n\nFor a resource\nadapter,\
    \ you need at least the following artifacts:\n\n*   An interface describing all\
    \ the business methods of the resource\n    adapter, accessible from a client.\
    \ Usually referred to as\n    *connections*. In this example, it’s called `HelloWorldConnection`.\n\
    \n*   Another interface describing a connection factory. Its sole\n    purpose\
    \ is providing a factory method for obtaining connections. It must\n    extend\
    \ `jakarta.resource.Referenceable`\n    and `java.io.Serializable`.\n    In this\
    \ example, it’s called `HelloWorldConnectionFactory`.\n\n*   A class implementing\
    \ the connection interface. In this example,\n    it’s called `HelloWorldConnectionImpl`.\n\
    \n*   A class implementing the connection factory interface. In this\n    example,\
    \ it’s called `HelloWorldConnectionFactoryImpl`.\n\n*   A class extending `jakarta.resource.spi.ManagedConnection`.\n\
    \    This represents a physical connection to the underlying EIS. In this\n  \
    \  example, it’s called `HelloWorldManagedConnection`.\n\n*   A factory class\
    \ for a `ManagedConnection`. It\n    must implement `jakarta.resource.spi.ManagedConnectionFactory`\n\
    \    and `jakarta.resource.spi.ResourceAdapterAssociation`.\n    In this example,\
    \ it’s called `HelloWorldManagedConnectionFactory`.\n\n*   A class implementing\
    \ `jakarta.resource.spi.ManagedConnectionMetaData`\n    for metadata. In this\
    \ example, it’s called `HelloWorldManagedConnectionMetaData`.\n\n*   A class implementing\
    \ `jakarta.resource.spi.ResourceAdapter`.\n    In this example, it’s called `HelloWorldResourceAdapter`.\n\
    \nFor more details about the class relations and descriptions of what\neach class\
    \ does, consult the API documentation and the JCA\nspecification.\n\nTo simplify\
    \ packaging, this example puts all the interfaces into a `interfaces`\nsubpackage.\
    \ Figure [28-1](#490565_1_En_28_Chapter.xhtml#Fig1) shows the\nproject layout\
    \ for this example project.\n\n![](images/490565_1_En_28_Chapter/490565_1_En_28_Fig1_HTML.jpg)\n\
    \nA window of the J c a example displays lists of files where some\nfiles are\
    \ expanded such as interfaces, s r c forward slash main forward\nslash resources,\
    \ bin, build, and gradle.\n\nFigure 28-1\nJCA example project layout\n\nThe coding\
    \ for the two interfaces is as\nfollows:\n\n```\n// ---------- File HelloWorldConnection.java\n\
    package book.jakartapro.jcahello.interfaces;\npublic interface HelloWorldConnection\
    \ {\npublic String helloWorld();\npublic String helloWorld(String name);\npublic\
    \ void close();\n}\n// ---------- File HelloWorldConnection.java\npackage book.jakartapro.jcahello.interfaces;\n\
    import java.io.Serializable;\nimport jakarta.resource.Referenceable;\nimport jakarta.resource.ResourceException;\n\
    public interface HelloWorldConnectionFactory extends\nSerializable, Referenceable\
    \ {\npublic HelloWorldConnection getConnection()\nthrows ResourceException;\n\
    }\n```\n\nThe two classes implementing these interfaces are shown next. Note how\n\
    the `helloWorld()` method\naccesses a resource adapter property.\n\n```\n// ----------\
    \ File HelloWorldConnectionImpl.java\npackage book.jakartapro.jcahello;\nimport\
    \ java.util.logging.Logger;\nimport book.jakartapro.jcahello.interfaces.\nHelloWorldConnection;\n\
    public class HelloWorldConnectionImpl\nimplements HelloWorldConnection {\nprivate\
    \ HelloWorldManagedConnection mc;\nprivate HelloWorldManagedConnectionFactory\
    \ mcf;\npublic HelloWorldConnectionImpl(\nHelloWorldManagedConnection mc,\nHelloWorldManagedConnectionFactory\
    \ mcf) {\nthis.mc = mc;\nthis.mcf = mcf;\n}\npublic String helloWorld() {\nreturn\
    \ helloWorld(\n((HelloWorldResourceAdapter) mcf.\ngetResourceAdapter()).getName());\n\
    }\npublic String helloWorld(String name) {\nreturn mc.helloWorld(name);\n}\npublic\
    \ void close() {\nmc.closeHandle(this);\n}\n}\n// ---------- File HelloWorldConnectionFactoryImpl.java\n\
    package book.jakartapro.jcahello;\nimport javax.naming.NamingException;\nimport\
    \ javax.naming.Reference;\nimport book.jakartapro.jcahello.interfaces.\nHelloWorldConnection;\n\
    import book.jakartapro.jcahello.interfaces.\nHelloWorldConnectionFactory;\nimport\
    \ jakarta.resource.ResourceException;\nimport jakarta.resource.spi.ConnectionManager;\n\
    public class HelloWorldConnectionFactoryImpl\nimplements HelloWorldConnectionFactory\
    \ {\nprivate Reference reference;\nprivate HelloWorldManagedConnectionFactory\
    \ mcf;\nprivate ConnectionManager connectionManager;\npublic HelloWorldConnectionFactoryImpl(\n\
    HelloWorldManagedConnectionFactory mcf,\nConnectionManager cxManager) {\nthis.mcf\
    \ = mcf;\nthis.connectionManager = cxManager;\n}\n@Override\npublic HelloWorldConnection\
    \ getConnection()\nthrows ResourceException {\nreturn (HelloWorldConnection) connectionManager.\n\
    allocateConnection(mcf, null);\n}\n@Override\npublic Reference getReference()\n\
    throws NamingException {\nreturn reference;\n}\n@Override\npublic void setReference(Reference\
    \ reference) {\nthis.reference = reference;\n}\n}\n```\n\nThe managed connection\
    \ class and its factory class represent the physical connection to\nthe EIS. The\
    \ code reads as follows:\n\n```\n// ---------- File HelloWorldManagedConnection.java\n\
    package book.jakartapro.jcahello;\nimport java.io.PrintWriter;\nimport java.util.ArrayList;\n\
    import java.util.List;\nimport java.util.logging.Logger;\nimport jakarta.resource.NotSupportedException;\n\
    import jakarta.resource.ResourceException;\nimport jakarta.resource.spi.ConnectionEvent;\n\
    import jakarta.resource.spi.ConnectionEventListener;\nimport jakarta.resource.spi.ConnectionRequestInfo;\n\
    import jakarta.resource.spi.LocalTransaction;\nimport jakarta.resource.spi.ManagedConnection;\n\
    import jakarta.resource.spi.ManagedConnectionMetaData;\nimport javax.security.auth.Subject;\n\
    import javax.transaction.xa.XAResource;\nimport book.jakartapro.jcahello.interfaces.\n\
    HelloWorldConnection;\npublic class HelloWorldManagedConnection\nimplements ManagedConnection\
    \ {\nprivate HelloWorldManagedConnectionFactory mcf;\nprivate List listeners;\n\
    private Object connection;\nprivate PrintWriter logWriter;\npublic HelloWorldManagedConnection(\n\
    HelloWorldManagedConnectionFactory mcf) {\nthis.mcf = mcf;\nthis.logWriter = null;\n\
    this.listeners =\nnew ArrayList(1);\nthis.connection = null;\n}\n/**\n* Creates\
    \ a new connection handle for the underlying\n* physical connection represented\
    \ by the\n* ManagedConnection instance.\n*/\npublic Object getConnection(\nSubject\
    \ subject,\nConnectionRequestInfo cxRequestInfo)\nthrows ResourceException {\n\
    connection = new HelloWorldConnectionImpl(this, mcf);\nreturn connection;\n}\n\
    /**\n* Used by the container to change the association of\n* an application-level\
    \ connection handle with a\n* ManagedConneciton instance.\n*/\npublic void associateConnection(Object\
    \ connection)\nthrows ResourceException {\nthis.connection = connection;\n}\n\
    /**\n* Application server calls this method to force any\n* cleanup on the ManagedConnection\
    \ instance.\n*/\npublic void cleanup() throws ResourceException {\n}\n/**\n* Destroys\
    \ the physical connection to the underlying\n* resource manager.\n*/\npublic void\
    \ destroy() throws ResourceException {\nthis.connection = null;\n}\npublic void\
    \ addConnectionEventListener(\nConnectionEventListener listener) {\nlisteners.add(listener);\n\
    }\npublic void removeConnectionEventListener(\nConnectionEventListener listener)\
    \ {\nlisteners.remove(listener);\n}\npublic PrintWriter getLogWriter()\nthrows\
    \ ResourceException {\nreturn logWriter;\n}\npublic void setLogWriter(PrintWriter\
    \ out)\nthrows ResourceException {\nthis.logWriter = out;\n}\npublic LocalTransaction\
    \ getLocalTransaction()\nthrows ResourceException {\nthrow new NotSupportedException(\n\
    \"LocalTransaction not supported\");\n}\npublic XAResource getXAResource()\nthrows\
    \ ResourceException {\nthrow new NotSupportedException(\n\"GetXAResource not supported\"\
    );\n}\npublic ManagedConnectionMetaData getMetaData()\nthrows ResourceException\
    \ {\nreturn new HelloWorldManagedConnectionMetaData();\n}\nString helloWorld(String\
    \ name) {\nreturn \"Hello World, \" + name + \" !\";\n}\nvoid closeHandle(HelloWorldConnection\
    \ handle) {\nConnectionEvent event =\nnew ConnectionEvent(this,\nConnectionEvent.CONNECTION_CLOSED);\n\
    event.setConnectionHandle(handle);\nfor (ConnectionEventListener cel : listeners)\
    \ {\ncel.connectionClosed(event);\n}\n}\n}\n// ---------- File HelloWorldManagedConnectionFactory.java\n\
    package book.jakartapro.jcahello;\nimport java.util.Objects;\nimport java.io.PrintWriter;\n\
