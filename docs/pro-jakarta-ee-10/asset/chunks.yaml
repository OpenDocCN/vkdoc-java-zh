    \ for GlassFish).\n\n## Analyzing Heap Dumps\n\nHeap dumps use a binary format\
    \ named `HPROF` to store class and object relation information. Besides, for a\
    \ Jakarta EE server, you typically have thousands of classes at work. So you can\
