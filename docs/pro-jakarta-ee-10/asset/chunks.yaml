    ### Example Data Preparation


    You can use any suitable folder on your file system as the example data for the
    employee attendance batch processing application. The following sections call
    this folder `DATA_FOLDER`.


    Create an input file called `DATA_FOLDER/attendance.csv` and let it read as follows:


    ```

    162836945,1459763400000,1459774320000

    162836945,1459837380000,1459851300000

    618456945,1459756800000,1459783380000

    ```


    The columns are Social Security Number, Work Begin Time, and Work End Time (in
    milliseconds since 1970-01-01 00:00:00 UTC).


    ### Job Definition File


    The job definition file is the main configuration file of the batch processing
    application. It is called `myJobName.xml` and it''s in this folder of the `Batch-Ejb`
    subproject:


    ```

    src/main/resources/META-INF/batch-jobs

    ```


    Instead of `myJobName`, you can use a different name for the job definition file,
    but you cannot change the `.xml` suffix.


    Create the file and let its contents read as follows:


    ```

    <job id="job1" xmlns="https://jakarta.ee/xml/ns/jakartaee"

    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

    xsi:schemaLocation="https://jakarta.ee/xml/ns/jakartaee

    https://jakarta.ee/xml/ns/jakartaee/jobXML_2_1.xsd"

    version="2.1">

    <properties>

    <property name="input_file"

    value="/path/to/DATA_FOLDER/attendance.csv"/>

    <property name="output_folder"

    value="/path/to/DATA_FOLDER/out"/>

    </properties>

    <step id="step1" next="step2">

    <chunk item-count="10">

    <reader ref="AttendanceReader"/>

    <processor ref="AttendanceProcessor"/>

    <writer ref="AttendanceWriter"/>

    </chunk>

    </step>

    <step id="step2">

    <batchlet ref="Cleanup"/>

    </step>

    </job>

    ```


    You can see that this example defined two properties for the input file and the
    output files. You can later use these properties from inside the coding. One chunk
    type step is for reading, processing, and writing the processed data, and the
    other task step is for cleaning up. *Checkpoints* define points in the processing
    that can be restarted after a planned or unplanned processing interruption. You
    can allow at maximum of ten chunk items to be re-read if something happens. The
    various `ref` attributes refer to the CDI `@Named` classes.


    ### Batch Processing Scheduling


    You can use a timer EJB to schedule batch processing. Create any class inside
    the `Batch-Ejb` project and let it read as follows:


    ```

    package book.jakartapro.batch;

    import java.util.Properties;

    import jakarta.batch.operations.JobOperator;

    import jakarta.batch.runtime.BatchRuntime;

    import jakarta.ejb.Schedule;

    import jakarta.ejb.Stateless;

    @Stateless

    public class BatchEjb {

    @Schedule(

    // for development and testing, we start the

    // job each 10 seconds

    hour = "*",

    minute = "*",

    second = "*/10",

    persistent = false)

    public void timeout() {

    try {

    JobOperator jobOperator =

    BatchRuntime.getJobOperator();

    // Just in case we want to programmatically add

    // a property

    Properties props = new Properties();

    props.setProperty("parameter1", "value1");

    // The "job1" corresponds to the name of

    // the job definition file (without the .xml)

    // inside META-INF/batch-jobs

    long execID = jobOperator.start("job1", props);

    } catch (Exception e) {

    e.printStackTrace(System.err);

    ...

    }

    }

    }

    ```


    The class name and position (package) is up to you. Jakarta knows this is a timer
    EJB just by the `@Schedule` annotation.


    ### Batch Processing Java Artifacts


    The various `ref` attributes inside the job definition file correspond to the
    following classes. First, define a class that holds an input item:


    ```

    package book.jakartapro.batch;

    import java.io.Serializable;

    public class AttendanceItem implements Serializable {

    private static final long serialVersionUID =

    2413741734728319063L;

    private String ssn; // + getters/setters

    private int workMillis; // + getters/setters

    public AttendanceItem(String ssn, int workMillis) {

    this.ssn = ssn;

    this.workMillis = workMillis;

    }

    }

    ```


    Next, implement the reader in the chunk step:


    ```

    package book.jakartapro.batch;

    import java.io.*;

    import java.util.Properties;

    import jakarta.batch.api.chunk.ItemReader;

    import jakarta.batch.runtime.context.JobContext;

    import jakarta.enterprise.context.Dependent;

    import jakarta.inject.Inject;

    import jakarta.inject.Named;

    @Dependent

    @Named("AttendanceReader")

    public class AttendanceReader implements ItemReader {

    private Integer lineNumber = 0;

    private String fileName;

    private InputStream ins;

    private BufferedReader breader;

    @Inject

    private JobContext jobCtx;

    public AttendanceReader() {

    }

    @Override

    public void open(Serializable checkpoint)

    throws Exception {

    Properties props = jobCtx.getProperties();

    fileName = props.getProperty("input_file");

    System.out.println("open file " + fileName);

    if (new File(fileName).exists()) {

    ins = new FileInputStream(fileName);

    breader = new BufferedReader(

    new InputStreamReader(ins));

    if (checkpoint != null) {

    lineNumber = (Integer) checkpoint;

    for (int i = 0; i < lineNumber; i++) {

    breader.readLine();

    }

    }

    }

    }

    @Override

    public void close() throws Exception {

    if (breader != null) breader.close();

    }

    @Override

    public Object readItem() throws Exception {

    Object result = null;

    if (breader != null) {

    String line = breader.readLine();

    if (line != null && line.trim().length() > 0) {

    String fields[] = line.split(",");

    String ssn = fields[0].trim();

    long tm = Long.parseLong(fields[2]) -

    Long.parseLong(fields[1]);

    AttendanceItem itemObj =

    new AttendanceItem(ssn, (int) tm);

    result = itemObj;

    }

    lineNumber++;

    }

    return result;

    }

    @Override

    public Serializable checkpointInfo() throws Exception {

    return lineNumber;

    }

    }

    ```


    Because of the `@Named("AttendanceReader")`, the batch processing engine knows
    that this class is meant when the name `AttendanceReader` is referred to in the
    job definition file. The injection of the `JobContext` allows you to address the
    properties defined in that file. Inside the `open()` method, you open the input
    file. If its `checkpoint` parameter is not `null`, you wind the input file to
    the last line defined by the checkpoint info method at the end of the class. Inside
    `readItem()`, build and return an `AttendanceItem` object. Subsequent processor
    steps get exactly this object.


    As such a processor, define a class that filters out items with missing SSNs:


    ```

    package book.jakartapro.batch;

    import jakarta.batch.api.chunk.ItemProcessor;

    import jakarta.enterprise.context.Dependent;

    import jakarta.inject.Named;

    @Dependent

    @Named("AttendanceProcessor")

    public class AttendanceProcessor implements ItemProcessor {

    @Override

    public Object processItem(Object item) throws Exception {

    // Use this to convert an object, or return null to

    // exclude objects

    AttendanceItem itm = (AttendanceItem) item;

    if(itm.getSsn() == null ||

    itm.getSsn().trim().isEmpty()) return null;

    return item;

    }

    }

    ```


    A writer class implements `jakarta.batch.api.chunk.ItemWriter` and, in its `writeItems()`
    method, gets a list of items that are passed. You can use it to create or update
    a per-employee file summing each employee''s workload:


    ```

    package book.jakartapro.batch;

    import java.io.File;

    import java.io.FileWriter;

    import java.io.Serializable;

    import java.util.List;

    import java.util.Properties;

    import java.util.Scanner;

    import jakarta.batch.api.chunk.ItemWriter;

    import jakarta.batch.runtime.context.JobContext;

    import jakarta.enterprise.context.Dependent;

    import jakarta.inject.Inject;

    import jakarta.inject.Named;

    @Dependent

    @Named("AttendanceWriter")

    public class AttendanceWriter implements ItemWriter {

    private String outputDir;

    @Inject

    private JobContext jobCtx;

    @Override

    public void open(Serializable checkpoint)

    throws Exception {

    Properties props = jobCtx.getProperties();

    outputDir = props.getProperty("output_folder") +

    File.separator + jobCtx.getExecutionId();

    if(checkpoint == null) {

    // first start

    new File(outputDir).mkdirs();

    } else {

    // restart

    }

    }

    @Override

    public void close() throws Exception {

    }

    @Override

    public void writeItems(List items)

    throws Exception {

    for(Object o : items) {

    AttendanceItem itm = (AttendanceItem) o;

    String ssn = itm.getSsn().trim();

    long millis = itm.getWorkMillis();

    File f = new File(outputDir + File.separator + ssn);

    long tm = 0L;

    if(f.exists()) {

    // The following line is just a simple trick

    // to read in the contents of a file.

    try(Scanner s = new Scanner(f).

    useDelimiter("\\Z")) {

    tm = Long.parseLong(s.next().trim());

    }

    }

    tm += millis;

    f.delete();

    FileWriter fw = new FileWriter(f);

    fw.append(tm + "\n");

    fw.flush();

    fw.close();

    }

    }

    @Override

    public Serializable checkpointInfo() throws Exception {

    return null;

    }

    }

    ```


    The number of items passed to `writeItems()` corresponds to the `item-count` attribute
    that''s used to define the item''s extent between checkpoints.


    The last step is a task type step. It backs up the input file and removes empty
    output folders:


    ```

    package book.jakartapro.batch;

    import java.io.File;

    import java.util.Properties;

    import jakarta.batch.api.AbstractBatchlet;

    import jakarta.batch.runtime.context.JobContext;

    import jakarta.enterprise.context.Dependent;

    import jakarta.inject.Inject;

    import jakarta.inject.Named;

    @Dependent

    @Named("Cleanup")

    public class Cleanup extends AbstractBatchlet {

    @Inject

    private JobContext jobCtx;

    @Override

    public String process() throws Exception {

    backupInput();

    removeEmptyOutputDirs();

    return "COMPLETED"; // "FAILED"

    }

    private void removeEmptyOutputDirs() {

    Properties props = jobCtx.getProperties();

    String outputDir = props.getProperty("output_folder") +

    File.separator + jobCtx.getExecutionId();

    if(new File(outputDir).list().length == 0)

    new File(outputDir).delete();

    }

    private void backupInput() {

    Properties props = jobCtx.getProperties();

    String fileName = props.getProperty("input_file");

    String bakName = fileName + ".bak" +

    System.currentTimeMillis();

    new File(fileName).renameTo(new File(bakName));

    }

    }

    ```


