    ## 26. Adding Scripting Languages


    The Java language is not always the best choice for implementing business functionalities
    and algorithms. The language only slowly implements new features, which can be
    an advantage, because it is easier to maintain old code when the coding structures
    don''t change too often. And Java is statically typed, which means you have to
    take care of object types at a language level. This leads to more typing work,
    since type specifiers need to be entered often in order to make sure that type
    conformance works correctly. Contrary to that, scripting languages like Groovy
    and Python often include features to write code more concisely, and they are often
    typed dynamically. That means that type checks don''t take place during compiling
    and the code contains fewer boilerplate constructs to ensure variable type conformance
    in assignments. Fortunately, Java allows you to mix Java language code and scripting
    languages by means of JSR 223. The Java code is compiled before you have any deployable
    (and runnable) artifacts like class files and class file archives, while the scripts
    are compiled at runtime. This opens another usage scenario for scripts: Because
    they can be changed without having to compile the application over and over again,
    scripts can be changed more easily even after an application enters the production
    stage. Scripts can, for example, be saved as text in a database, or in resource
    files extraneous to deployment artifacts, like JARs, WARs, and EARs. This chapter
    explains how to include Groovy and Python scripts in a Jakarta EE application.


    ### Installing Scripting Engines


    In order to use JSR 223 scripting, you have to add the following dependencies
    to your project:


    ```

    // For Python, in Gradle build.gradle file

    implementation ''org.python:jython-standalone:2.7.2''


    org.python

    jython-standalone

    2.7.2


    // For Groovy, in Gradle build.gradle file

    implementation ''org.apache.groovy:groovy-jsr223:4.0.8''


    org.apache.groovy

    groovy-jsr223

    4.0.8

    ```


    ### Using Scripting in Java


    In order to use a script from anywhere inside your code, write this code (Python
    version):


    ```

    import javax.script.ScriptEngine;

    import javax.script.ScriptEngineManager;

    import javax.script.ScriptException;

    ...

    ScriptEngine engine = new ScriptEngineManager().

    getEngineByName("python");

    // read in Python code

    StringReader f = new StringReader(

    "class Multiplier:\n"

    + "\n"

    + "  def multiply(self, x, y):\n"

    + "    return x * y\n"

    + "\n"

    + "x = Multiplier().multiply(par1, par2)\n"

    );

    //  40

    ...

    ```


    The Groovy variant for the same script reads as follows:


    ```

    import javax.script.ScriptEngine;

    import javax.script.ScriptEngineManager;

    import javax.script.ScriptException;

    ...

    ScriptEngine engine = new ScriptEngineManager().

    getEngineByName("groovy");

    // read in Groovy code

    StringReader f = new StringReader(

    "class Multiplier {\n"

    + "  def multiply(def x, def y) {\n"

    + "    x * y\n"

    + "  }\n"

    + "}\n"

    + "x = new Multiplier().multiply(par1, par2)\n"

    );

    //  40

    ```


    ## Part V: Advanced Resource Related Topics


    ### 27. Hibernate as ORM


    The GlassFish Jakarta EE application server comes with a built-in EclipseLink
    as a JPA provider, and other application servers have their own ideas about which
    JPA provider to use. After all, it''s one of the strengths of JPA that application
    developers don''t have to worry about which JPA provider is used. If you do want
    to prescribe the JPA provider for some reason, you can do so without having to
    change the application server installation. This chapter explains how to configure
    the application to use Hibernate as a JPA provider. The procedure is similar when
    using other providers.


    > **Note**

    > Go to [https://hibernate.org/](https://hibernate.org/) to learn what can be
    done with Hibernate.


    #### Installing Hibernate


    To install Hibernate as a JPA provider, add the following code to your `build.gradle`
    or `pom.xml` file, for Gradle or Maven, respectively:


    ```

    ...

    dependencies {

    ...

    implementation ''org.hibernate:'' +

    ''hibernate-core-jakarta:5.6.3.Final''

    }

    ...


    ...


    org.hibernate

    hibernate-core-jakarta

    5.6.3.Final


    ...

    ```


    #### Adapting the Persistence Configuration


    You need to tell the JPA configuration to use Maven as a JPA provider. To this
    aim, open `persistence.xml` inside the `META_INF` folder and add the following:


    ```


    org.hibernate.jpa.HibernatePersistenceProvider


    ...


    ...


    -->

    ```


    The Hibernate documentation tells you more about the Hibernate settings you can
    place in this file.


    #### Fetching the Hibernate Session


    To directly address the Hibernate JPA given an injected entity manager, the API
    documentation suggests using the following code:


    ```

    ...

    import org.hibernate.Session;

    ...

    @PersistenceContext(unitName = "my-persistence-unit")

    private EntityManager entityManager;

    ...

    Session session = entityManager.unwrap(Session.class);

    // directly use the Hibernate session:

    // ...

    ```


    > **Caution**

    > Unfortunately, due to class-loading issues, this does not currently work for
    GlassFish 7.


    ### 28. Connectors


    It might not be possible for a Jakarta EE application to seamlessly communicate
    with legacy EISs (enterprise information systems) using one of the standard communication
    protocols. This is especially true in corporate environments. For this to be possible,
    you have to create a resource adapter that conforms to the Jakarta Connectors
    architecture.


    The Jakarta Connectors technology (version number 2.1) is part of the Jakarta
    EE 10 technology stack. The JCA project''s home page can be found at [https://projects.eclipse.org/projects/ee4j.jca/releases/2.1.0](https://projects.eclipse.org/projects/ee4j.jca/releases/2.1.0),
    and for the specification, see [https://www.jcp.org/en/jsr/detail?id=322](https://www.jcp.org/en/jsr/detail%253Fid%253D322).
    Creating a connector for a big or important EIS can be a very challenging task.
    The specification document has more than 500 pages, so this book covers only a
    few features of the Connectors architecture. This chapter works through a simple
    JCA project, which nevertheless should give you a starting point for your own
    projects.


    #### Coding a Resource Adapter


    For a resource adapter, you need at least the following artifacts:


    * An interface describing all the business methods of the resource adapter, accessible
    from a client. Usually referred to as *connections*. In this example, it''s called
    `HelloWorldConnection`.

    * Another interface describing a connection factory. Its sole purpose is providing
    a factory method for obtaining connections. It must extend `jakarta.resource.Referenceable`
    and `java.io.Serializable`. In this example, it''s called `HelloWorldConnectionFactory`.

    * A class implementing the connection interface. In this example, it''s called
    `HelloWorldConnectionImpl`.

    * A class implementing the connection factory interface. In this example, it''s
    called `HelloWorldConnectionFactoryImpl`.

    * A class extending `jakarta.resource.spi.ManagedConnection`. This represents
    a physical connection to the underlying EIS. In this example, it''s called `HelloWorldManagedConnection`.

    * A factory class for a `ManagedConnection`. It must implement `jakarta.resource.spi.ManagedConnectionFactory`
    and `jakarta.resource.spi.ResourceAdapterAssociation`. In this example, it''s
    called `HelloWorldManagedConnectionFactory`.

    * A class implementing `jakarta.resource.spi.ManagedConnectionMetaData` for metadata.
    In this example, it''s called `HelloWorldManagedConnectionMetaData`.

    * A class implementing `jakarta.resource.spi.ResourceAdapter`. In this example,
    it''s called `HelloWorldResourceAdapter`.


    For more details about the class relations and descriptions of what each class
    does, consult the API documentation and the JCA specification.


    To simplify packaging, this example puts all the interfaces into a `interfaces`
    subpackage. Figure [28-1](#490565_1_En_28_Chapter.xhtml#Fig1) shows the project
    layout for this example project.


    ![](images/490565_1_En_28_Chapter/490565_1_En_28_Fig1_HTML.jpg)


    A window of the J c a example displays lists of files where some files are expanded
    such as interfaces, s r c forward slash main forward slash resources, bin, build,
    and gradle.


    **Figure 28-1** JCA example project layout


    The coding for the two interfaces is as follows:


    ```

    // ---------- File HelloWorldConnection.java

    package book.jakartapro.jcahello.interfaces;

    public interface HelloWorldConnection {

    public String helloWorld();

    public String helloWorld(String name);

    public void close();

    }

    // ---------- File HelloWorldConnection.java

    package book.jakartapro.jcahello.interfaces;

    import java.io.Serializable;

    import jakarta.resource.Referenceable;

    import jakarta.resource.ResourceException;

    public interface HelloWorldConnectionFactory extends

    Serializable, Referenceable {

    public HelloWorldConnection getConnection()

    throws ResourceException;

    }

    ```


