- fmt: '# The Git Version Control System


    Git is a modern, distributed version control system. Distributed means you *might*
    have a central repository, but any number of fully standalone repositories for
    the same project can exist on different machines, including the developer’s box.


    This means that project teams situated in different locations with different network
    access policies don’t have to struggle with network differences, and development
    and version control system operation is possible, even without network access.
    In a distributed version control system like Git, it is therefore easier to run
    `local` repositories, which only later can have their data moved to a central
    repository.


    To install Git and a `git` user, a `git` group, and a base directory for repositories
    on a Linux server, enter the following:


    ```

    # Ubuntu or Debian

    apt-get install git

    mkdir -p /srv/git

    adduser --home /srv/git git

    chown -R git.git /srv/git

    # Fedora or RHEL

    yum install git

    mkdir -p /srv/git

    adduser --home /srv/git git

    chown -R git.git /srv/git

    # OpenSUSE Leap

    zypper install git

    mkdir -p /srv/git

    useradd -U --home /srv/git git

    chown -R git.git /srv/git

    ```


    Next, you''ll create an example repository. For demonstration purposes, you can
    use the `RestDate` project from Chapter [2](#490565_1_En_2_Chapter.xhtml):


    ```

    # Create an empty repository

    # We are "root"

    su -l git

    cd /srv/git

    mkdir RestDate

    cd RestDate

    git init

    exit

    ```


    Git supports several connection protocols: `file://...` for local access (connecting
    to a repository on the same machine), `http://...` and `https://` for connecting
    through a web server, `git://...` for using a protocol and port specially tailored
    for Git, and `ssh://...` for access mediated by an SSH account. While the `git`
    and `http` methods transfer unencrypted data and thus are out of scope, the `file`
    method is disqualified for remote access. That means you are left with `https`
    and `ssh` for commercial projects.


    The `https` method requires a specially configured (Apache) HTTP server and leads
    to substantial extra effort and cost. It is used often with community-driven projects.
    In a corporate environment, using Git via SSH is the better option. It is heavily
    immune against intrusion, and you can configure a dedicated Git user with limited
    access to system resources:


    ```

    # We are "root"

    # Ubuntu or Debian **************************************

    adduser --system --ingroup git \

    --shell /bin/rbash --disabled-password gituser

    ln -s /usr/bin/groups ~gituser

    ln -s /bin/grep ~gituser

    su gituser --shell /bin/bash \

    -c "ssh-keygen -q -N '' '' -f /home/gituser/.ssh/id_rsa"

    # Fedora ************************************************

    ln -s /bin/bash /bin/rbash

    adduser -r -N -G git -s "/bin/rbash" \

    -d /home/gituser gituser

    mkdir /home/gituser

    chown gituser.git /home/gituser

    echo "export PATH=." > /home/gituser/.bashrc

    ln -s /usr/bin/git-upload-pack /home/svnuser

    ln -s /usr/bin/groups /home/svnuser

    ln -s /usr/bin/grep /home/svnuser

    su gituser --shell /bin/bash \

    -c "ssh-keygen -q -N '' '' -f /home/gituser/.ssh/id_rsa"

    # OpenSUSE Leap *****************************************

    useradd -r -G git -m -U -s /usr/bin/rbash gituser

    ln /usr/bin/git-upload-pack \

    /usr/lib/restricted/bin/git-upload-pack

    su gituser --shell /bin/bash \

    -c "ssh-keygen -q -N '''' -f /home/gituser/.ssh/id_rsa"

    ```


    This links the `gituser` account to the `rbash` shell, which means the `gituser`
    logging in from a terminal via an SSH shell has limited capabilities to use system
    resources. You can narrow that limit further by redefining the `PATH` variable.
    To this aim, create a file called `gituser.sh` inside `/etc/profile.d`:


    ```

    # Ubuntu, Debian or Fedora

    if [ "$SHELL" = "/bin/rbash" -a \

    $(groups | grep -c \\bgit\\b) = 1  ]; then

    export PATH=.

    fi

    # On OpenSUSE Leap don''t write this file.

    # PATH=/usr/lib/restricted/bin is the default path for

    # executable commands for rbash on this system. It

    # cannot be changed. What you can do here is to further

    # limit access to /usr/lib/restricted/bin based on group

    # and ownership policies. For example

    #     groupadd rbashusers

    #     chgrp rbashusers /usr/lib/restricted/bin/*

    #     chmod o-x /usr/lib/restricted/bin/*

    # and NOT adding group "rbashusers" to user "gituser"

    # For this to work the links in that folder must be HARD

    # links (no -s option in \ci{ln})

    ```


    Users logging in via SSH cannot use commands from `/bin`, `/usr/bin`, or the other
    usual places for binaries and scripts, making the SSH shell effectively unusable.


    ## Git Clients


    The Git plugin, which the Eclipse IDE uses to talk to Git repositories, is included
    in the distribution, so you can use Git right from the start if you use Eclipse.


    To connect to the Git repository on the server, you need a public/private SSH
    key pair for each Git user on their workstation. If you already have one or if
    you have a Linux box, `ssh-keygen` will create such a public/private key pair.
    On Windows, you can get one if you, for example, install Cygwin and use the same
    command, or use PuTTY (you must convert the key to the OpenSSH format in this
    case). There is also a module for PowerShell. Type `Install-Module -Force OpenSSHUtils`
    and enter `ssh-keygen`.


    The public counterpart of the key needs to go to the server. There, add its contents
    to the `authorized_keys` file inside the `.ssh/` of the `gituser` user you want
    to connect to. Make sure this file is visible to the user only:


    ```

    # We are "root"

    cat thePublicKey.file >>

    /home/gituser/.ssh/authorized_keys

    chown gituser.git \

    /home/gituser/.ssh/authorized_keys

    chmod 600 \

    /home/gituser/.ssh/authorized_keys

    ```


    You now create a local Git repository as a clone of the server repository. Because
    of the distributed nature of Git, the relation to a server repository is much
    looser compared to centralized version control systems like Subversion. You could
    even start from a local repository, totally ignorant of the server repository,
    and only later make the connection. But with the server repository at hand, you
    can start with the cloning process.


    To this aim, open the Git perspective by choosing Window ➤ Perspective ➤ Open
    Perspective ➤ Other... In the Git Repositories tab on the left, select the Clone
    a Git Repository link. In the wizard dialog box that appears, enter the following
    as the URI:


    ```

    ssh://gituser@the.serv.er.addr/srv/git/RestDate

    ```


    Substitute `the.serv.er.addr` with the Git server’s address. In the authentication
    area, leave `gituser` as the user and don’t enter a password. It is not needed,
    since you use the SSH key. See Figure [4-6](#490565_1_En_4_Chapter.xhtml#Fig6).


    ![](images/490565_1_En_4_Chapter/490565_1_En_4_Fig6_HTML.jpg)


    A window of the clone git repository. It includes U R L, host, name, protocol,
    port, user, and password. Then click on the next button.


    Figure 4-6


    Git repository input


    Click Next >, ignore the warning that the repository is empty, and click Next
    > again. In the last wizard dialog box, select a directory where you''ll store
    the local Git repository. The usual convention is to *not* choose a directory
    inside the Eclipse workspace, to avoid messing up the workspace with Git meta
    information files. Click Finish.


    The new repository now shows up in the repositories view. See Figure [4-7](#490565_1_En_4_Chapter.xhtml#Fig7).


    ![](images/490565_1_En_4_Chapter/490565_1_En_4_Fig7_HTML.jpg)


    A window of Git repositories where the new repository RestDate is visible with
    branches, tags, references, remotes, and a working tree.


    Figure 4-7


    Git repository is registered


    To connect the `RestDate` project to Git, right-click the project, then choose
    Team ➤ Share Project... In the wizard dialog box, select Git as the repository
    type, then select the local repository from the dropdown box. Then click Finish.


    The project is now backed up by the local repository, and you can operate Git
    by right-mouse-clicking (on project) and choosing Team.'
