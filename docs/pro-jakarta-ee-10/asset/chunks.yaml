  raw: "# Afterwards, find Java classes in the src folder\nbin/scomp -srconly -src\
    \ src -d xsb \\\n/path/to/xsd/file\n```\n\nFor details and options, consult the\
    \ Apache XMLBeans\ndocumentation.\n\n23. JSON Handling\n\nThe XML binding technology\
    \ covered in Chapter [22](#490565_1_En_22_Chapter.xhtml) introduced a valuable\
    \ data\nexchange format, simplifying and standardizing the communication in\n\
    heterogeneous and wide-spread computer networks. By using schemas and\nnamespaces\
    \ for elements and attributes, this enabled semantics and\nversion consistency\
    \ in XML, thus allowing for XML document validity\nchecks. Unfortunately, with\
    \ all those additions, XML documents became\nmore and more complex, and in order\
    \ to send a few bytes formatted as\nXML, a lot of boilerplate data had to be transmitted,\
    \ too. Especially\nwith browser-to-server communication, XML became overkill.\
    \ For this\nreason, web application developers switched to the leaner JSON\n(JavaScript\
    \ Object Notation) data protocol,\nmaking it necessary for the Java world to develop\
    \ tools and libraries\nthat could handle JSON.\nJSON processing is part of the\
    \ Jakarta EE 10 specification. This\nspecifically involves Jakarta JSON Binding\
    \ (JSON-B),\nversion 3.0, and Jakarta JSON Processing\n(JSON-P), version 2.1\\\
    . The specifications for JSON-P and JSON-B\ncan be found at [`https://jcp.org/aboutJava/communityprocess/pr/jsr367/index.html`](https://jcp.org/aboutJava/communityprocess/pr/jsr367/index.html)\n\
    and [`https://jcp.org/en/jsr/detail?id=374`](https://jcp.org/en/jsr/detail%253Fid%253D374).\n\
    This chapter covers these JSON libraries and explains how you can add\nJSON to\
    \ Jakarta EE applications.\n\nJSON Documents\n\nAs is the case for XML, a JSON\
    \ document represents a\ntree-like object hierarchy. Unlike XML, JSON entities\
    \ cannot have\nattributes. There are no such things as namespaces and schemas,\
    \ and\ninstead of opening and closing tags, complex JSON objects use `{ ... }`\
    \ to map\nname-value pairs and `[...]` for arrays.\nHere is a simple JSON document\
    \ showing all features:\n\n```\n{\n\"lastname\": \"Smith\",\n\"married\": true,\n\
    \"birthday\": \"1997-12-30\",\n\"records\": null,\n\"height\": 6.1,\n\"cars\"\
    : 2,\n\"children\": [\n\"Amanda\",\n{ \"forename\": \"Jim\", \"gender\": \"m\"\
    \ }\n]\n\"address\": {\n\"us\": true,\n\"state\": \"California\",\n\"city\": \"\
    Paradise\",\n\"owned\": false\n}\n}\n```\n\nYou can see that basic types are numbers\
    \ with and without fraction\ndigits, boolean literals `true` and `false`, strings,\
    \ and\n`null`. Arrays\nand maps can contain elements of mixed types, including\
    \ inner complex\ntypes.\n\nJSON with REST Services\n\nIn previous chapters, you\
    \ saw a REST method that returned\nJSON data, as follows:\n\n```\n@GET\n@Produces(\"\
    application/json\")\npublic String stdDate() {\nreturn \"{\\\"date\\\":\\\"\"\
    \ +\nZonedDateTime.now().toString() + \"\\\"}\";\n}\n```\n\nWhile at first sight,\
    \ this seems to be an easy way to create JSON\ndata, it lacks a basic syntax check.\
    \ First, it easily might happen that\nyou forget a closing `}`, or that you make\
    \ a\nmistake because of misplaced quotation and or punctuation mark. Second,\n\
    think of a more complex JSON document with more elements and deeper\nhierarchy.\
    \ Manually constructing concatenating strings to represent\nlarger JSON objects\
    \ is a nightmare in terms of comprehensiveness and\nmaintainability.\n\nThe first\
    \ steps toward increased readability consists of using JSON-P to\nconstruct JSON\
    \ data. JSON-P contains classes representing values,\narrays, and maps. Replacing\
    \ the previous code snippet, you will\neventually get code like this:\n\n```\n\
    ...\nimport jakarta.json.Json;\nimport jakarta.json.JsonStructure;\n...\n@GET\n\
    @Path(\"j\")\n@Produces(\"application/json\")\npublic JsonStructure stdDate()\
    \ {\nJsonStructure json = Json.createObjectBuilder()\n.add(\"date\", ZonedDateTime.now().toString())\n\
    .build();\nreturn json;\n}\n```\n\nYou can see that you no longer have to concatenate\
    \ strings to build\nthe JSON document. You can even let the method return an object\
    \ of type\n`JsonObject`,\n`JsonArray` or\n`JsonStructure`\n(all from the `jakarta.json`\n\
    package). JAX-RS knows how to handle such return types.\n\nFrom AJAX calls and\
    \ if you need to pass data from the web frontend to\nthe server, you can either\
    \ let the REST service receive a string, as in\nthis:\n\n```\n// Corresponds to\
    \ for example AJAX calls from jQuery:\n// $.ajax({\n//  method: \"POST\",\n//\
    \  contentType: \"application/json\",\n//  url: \"../webapi/date\",\n//  data:\
    \ { timeZone: \"UTC\", format: \"standard\" }\n// })\n// .done(function( msg,\
    \ textStatus, jqXHR ) {\n//   alert( \"Data Saved: \" + msg );\n// });\n@POST\n\
    @Path(\"/date\")\n@Consumes(MediaType.APPLICATION_JSON)\n...\npublic Response\
    \ stdDate(String data) {\n// data is a JSON string\n...\n}\n```\n\nOr, as an alternative,\
    \ you can use a `jakarta.json.JsonStructure`\nparameter for the method, as follows:\n\
    \n```\n// Corresponds to for example AJAX calls from jQuery:\n// $.ajax({\n//\
    \  method: \"POST\",\n//  contentType: \"application/json\",\n//  url: \"../webapi/date\"\
    ,\n//  data: '{ timeZone: \"UTC\", format: \"standard\" }'\n// })\n// .done(function(\
    \ msg, textStatus, jqXHR ) {\n//   alert( \"Data Saved: \" + msg );\n// });\n\
    @POST\n@Path(\"/date\")\n@Consumes(MediaType.APPLICATION_JSON)\n...\npublic Response\
    \ stdDate(JsonStructure data) {\n...\n}\n```\n\nFor the jQuery AJAX call, you\
    \ must pass a JSON formatted string, not\nthe JavaScript data object.\nApart from\
    \ these simple examples, there is more to discover about\nJSON handling using\
    \ the JSON-P and JSON-B technologies. The following\nsections more thoroughly\
    \ explain JSON binding and processing.\n\nGenerating JSON\n\nIn order to generate\
    \ JSON data using the\nbuilder pattern, you use the classes from the `jakarta.json`\
    \ package.\nYou start from a builder:\n\n```\n...\nimport jakarta.json.*;\n...\n\
    JsonObjectBuilder builder = Json.createObjectBuilder();\n```\n\nFrom here you\
    \ add elements as follows:\n\n```\nbuilder.add(\"elementName\", ...);\n// <- you\
    \ can add int, long, double, boolean,\n//    String, BigInteger, and BigDecimal\
    \ elements.\n//    And you can append more add(...) statements.\n```\n\nThere\
    \ is also a variant for `null` values and for\ncomplex types:\n\n```\nbuilder.addNull(\"\
    elementName\");\nbuilder.\nadd(\"element1\",\nJson.createObjectBuilder().\nadd(\"\
    inner1\", 42).\nadd(\"inner2\", \"deepThought\")).\nadd(\"element2\", 3.1415);\n\
    ```\n\nTo create JSON arrays, use the `JsonArrayBuilder`\nclass instead:\n\n```\n\
    ...\nimport jakarta.json.*;\n...\nJsonArrayBuilder builder = Json.createArrayBuilder();\n\
    builder.add(\"Fibonacci\");\nbuilder.add(1); // it is allowed to mix types in\
    \ arrays\nbuilder.add(2);\nbuilder.add(3);\nbuilder.add(5);\nbuilder.add(8);\n\
    ```\n\nFor both JSON\nobjects and JSON arrays, to get the Java object, you must\
    \ invoke the\n`build()` method:\n\n```\n...\nimport jakarta.json.*;\n...\nJsonObjectBuilder\
    \ builder = Json.createObjectBuilder();\n// ... add elements, then:\nJsonObject\
    \ obj = builder.build();\n...\nJsonArrayBuilder abuilder = Json.createArrayBuilder();\n\
    // ... add elements, then:\nJsonArray aobj = abuilder.build();\n```\n\nParsing\
    \ JSON\n\nFor low-level parsing of JSON\nstrings, you can use JSON-P’s streaming\
    \ API:\n\n```\n...\nimport jakarta.json.*;\n...\nfinal String json =\n\"{\\\"\
    name\\\":\\\"John\\\",\\\"age\\\":27,\\\"employed\\\":false}\";\nfinal JsonParser\
    \ parser =\nJson.createParser(new StringReader(json));\nString key = null;\nString\
    \ value = null;\nwhile (parser.hasNext()) {\nfinal Event event = parser.next();\n\
    switch (event) {\ncase KEY_NAME:\nkey = parser.getString();\nSystem.out.println(key);\n\
    break;\ncase VALUE_STRING:\nvalue = parser.getString();\nSystem.out.println(value);\n\
    break;\n}\n}\nparser.close();\n```\n\nThis comes in handy if you don’t need a\
    \ verbose JSON-to-Java object\nbinding, which requires extra coding. Also, if\
    \ you want to read in a\nvery large JSON document, the streaming API helps you\
    \ avoid allocating\nexhaustive resources.\n\nIf you don’t like the pull-parsing\
    \ API, you can read in a JSON string,\nthus producing a generic JSON object instead:\n\
    \n```\nfinal String json =\n\"{\\\"name\\\":\\\"John\\\",\\\"age\\\":27,\\\"employed\\\
    \":false}\";\nJsonReader jsonReader =\nJson.createReader(new StringReader(json));\n\
    JsonObject object = jsonReader.readObject();\njsonReader.close();\n...\nString\
    \ name = object.getString(\"name\", \"\");\n```\n\nFor more details, see the API\n\
    documentation at [`https://javaee.github.io/jsonp/index.html`](https://javaee.github.io/jsonp/index.html).\n\
    \nBinding JSON to Java Objects\n\nIf you need an automatic mapping between a Java\
    \ object tree and a JSON\nrepresentation of such a tree, you can use the classes\
    \ from the JSON-B\nlibrary. Consider the following JSON string for a club\nmembers\
    \ list:\n\n```\n[\n{\n\"name\": \"John\",\n\"age\": 27,\n\"employed\":false,\n\
    \"children\" :\n[\n{\"name\": \"Bart\", \"birthday\": \"2015-11-10\"},\n{\"name\"\
    : \"Amanda\", \"birthday\": \"2017-06-01\"}\n]\n},\n{\n\"name\": \"Linda\",\n\"\
    age\": 22,\n\"employed\":true,\n\"children\" :\n[\n]\n}\n]\n```\n\nA natural set\
    \ of classes representing\nthe same list would be as follows:\n\n```\nclass Member\
    \ {\nprivate String name;\nprivate int age;\nprivate boolean employed;\nprivate\
    \ List children;\n// getters and setters...\n}\nclass Child {\nprivate String\
    \ name;\nprivate String birthday;\n// getters and setters...\n}\n```\n\nIn order\
    \ to read in the JSON string and construct a list of members, all you have\nto\
    \ do is this:\n\n```\nString json = \"[ ... ]\";\nJsonb jsonb = JsonbBuilder.create();\n\
    @SuppressWarnings(\"unchecked\")\nList members = jsonb.fromJson(json, List.class);\n\
    // just to check, the other way round, getting the\n// JSON string from a Java\
    \ object tree:\njsonb = JsonbBuilder.create();\nString json2 = jsonb.toJson(members);\n\
    // <- semantically the same as 'json' above.\n```\n\nConverting between simple\
    \ types like strings, booleans, and numbers is\nstraightforward. If you need more\
    \ control over the conversion process,\nJSON-B helps you with a couple of annotations.\
    \ In the previous example,\nyou can for example change the `birthday` field to\
    \ a\nfield of type `java.util.Date`:\n\n```\nclass Child {\nprivate java.util.Date\
    \ birthday;\n...\n}\n```\n\n(The getters and setters are accordingly adapted.)\
    \ The `jakarta.json.bind.annotation.JsonbDateFormat`\nthen allows for the specification\
    \ of a date string conversion pattern. For the `yyyy-MM-dd` pattern,\nsee the\
    \ API documentation of `SimpleDateFormat` for\nmore options. The annotation would\
    \ read as follows:\n\n```\nclass Child {\n@JsonbDateFormat(\"yyyy-MM-dd\")\nprivate\
    \ java.util.Date birthday;\n...\n}\n```\n\nMore annotations\ncontrol the conversion\
    \ of number formats and `null` values. It is\nalso possible to exclude fields\
    \ from conversion, and for maximum\ncontrol, you can define a custom type adapter.\
    \ Table [23-1](#490565_1_En_23_Chapter.xhtml#Tab1) summarizes the\nJSON-B annotations.\n\
    \nTable 23-1\nJSON-B Annotations\n\n Annotation |\n Useful For |\n\n| --- | ---\
    \ | --- | --- | --- |\n\n `@JsonbDateFormat` |\n Defining a custom date format.\
    \ Mediates between a `java.util.Date` in\nJava and a JSON string value. |\n\n\
    \ `@JsonbNillable` |\n Showing a `null` Java value\nas \"null\" in the JSON string.\
    \ If set to `false`, a null value\ndoes not show up in the JSON string. |\n\n\
    \ `@JsonbNumberFormat` |\n Defining a custom number format. Mediates between a\
    \ `java.math.BigDecimal`\nin Java and a JSON string value. Format options are\
    \ described in the API\ndocumentation of the `DecimalFormat`\nclass. |\n\n `@JsonbTransient`\
    \ |\n Excluding a field from conversion. |\n\n `@JsonbProperty` |\n Specifying\
    \ a custom key name for a mapping. |\n\n `@JsonbTypeAdapter` |\n Specifying a\
    \ custom type adapter (the `JsonbAdapter`\nclass). |\n\nAs an example of a type\n\
    adapter, consider the following classes:\n\n```\nclass Color {\npublic int r;\n\
    public int g;\npublic int b;\npublic Color(int r, int g, int b) {\nthis.r = r;\n\
    this.g = g;\nthis.b = b;\n}\n}\nclass Shape {\nprivate Color color;\n...\n// getters\
    \ and setters...\n}\n```\n\nIf you want a color to be\nrepresentable as the hexadecimal\
    \ value `#RRGGBB`, a JSON\nsnippet for a shape object could look like this:\n\n\
    ```\n{\n\"color\": \"#FF1B75\",\n...\n}\n```\n\nThe converter\nclass is responsible\
    \ for translating the `Color` object to a\nJSON string representation and vice\
    \ versa:\n\n```\nclass MyColorAdapter implements\nJsonbAdapter {\n@Override\n\
    public String adaptToJson(Color obj)\nthrows Exception {\nreturn \"#\" +\nString.format(\"\
    %02x\", obj.r) +\nString.format(\"%02x\", obj.g) +\nString.format(\"%02x\", obj.b);\n\
    }\n@Override\npublic Color adaptFromJson(String obj)\nthrows Exception {\nint\
    \ r = Integer.parseInt( obj.substring(1,3), 16);\nint g = Integer.parseInt( obj.substring(3,5),\
    \ 16);\nint b = Integer.parseInt( obj.substring(5,7), 16);\nreturn new Color(r,g,b);\n\
    }\n}\n```\n\nFinally, to add the converter to the `Shape` class, you have to\n\
    apply the `@JsonbTypeAdapter`\nannotation as follows:\n\n```\nclass Shape {\n\
    @JsonbTypeAdapter(MyColorAdapter.class)\nprivate Color color;\n...\n// getters\
    \ and setters...\n}\n```\n\nThe documentation of the annotations from the\n`jakarta.json.bind.annotation`\n\
    package shows more information. To learn more about JSON-B, check out\n[`https://javaee.github.io/jsonb-spec/`](https://javaee.github.io/jsonb-spec/)\n\
    as well.\n\n24. Jakarta Mail\n\nBeing able to send emails from server processes\
    \ can be a vital part\nof a company’s IT landscape. Consider, for example, asynchronously\n\
    transmitting results from long-running calculations, sending\nautomatically generated\
    \ reports, or sending warning messages when a\nserver process fails.\nNot often\
    \ recognized as a central part of the Jakarta EE technology\nstack, Jakarta Mail\
    \ 2.1 can serve this purpose. This chapter covers\nJakarta Mail, from [`https://eclipse-ee4j.github.io/mail/`](https://eclipse-ee4j.github.io/mail/),\n\
    which is included with Jakarta EE 10 as a versatile email library.\n\nInstalling\
    \ Jakarta Mail\n\nJakarta Mail is\nincluded in the Jakarta EE specification, so\
    \ for any enterprise project\nwith this basic dependency (Gradle configuration,\
    \ Maven accordingly):\n\n```\nimplementation 'jakarta.platform:' +\n'jakarta.jakartaee-api:10.0.0'\n\
    ```\n\nYou have everything you need to use Jakarta Mail.\n\nNote\n\nJakarta Mail’s\
    \ predecessor is called JavaMail. The main difference is\nthat Jakarta Mail uses\
    \ the `jakarta.` namespace\ninstead of `javax.` Many online\nresources still refer\
    \ to JavaMail. In most cases, you can easily adapt\nJavaMail tutorials by simply\
    \ switching to the new namespace.\n\nGenerating and Sending Emails\n\nThe standard\
    \ way to send emails from a\nJakarta EE application consists of the following:\n\
    \n*   Provide an authenticator for authentication at the Message Transfer Agent\n\
    \    (MTA). To this aim, create an instantiable class that inherits\n    from\
    \ `jakarta.mail.Autenticator`.\n    If you don’t need to authenticate to your\
    \ MTA, you can skip this\n    step.\n\n*   Instantiate and fill a `java.util.Properties`\n\
    \    collection. Here, various SMTP-related parameters need to be\n    entered.\n\
    \n*   Get a `jakarta.mail.Session`\n    instance.\n\n*   Instantiate a message\
    \ object, for example `jakarta.mail.internet.MimeMessage`.\n\n*   Get a transport\
    \ object (the `jakarta.mail.Transport`\n    class) from the session.\n\n*   Use\
    \ the transport object to connect to the MTA and then send the\n    message.\n\
    \nThis example provides a rudimentary REST class for building and sending\nemails.\
    \ This is a starting point only. For your own\napplication, you should read the\
    \ constants from the configuration file.\nYou also have to update the connection\
    \ parameters to match your mail\nserver.\n\n```\nimport java.util.Date;\nimport\
    \ java.util.Properties;\nimport jakarta.mail.Authenticator;\nimport jakarta.mail.Message;\n\
    import jakarta.mail.MessagingException;\nimport jakarta.mail.PasswordAuthentication;\n\
    import jakarta.mail.Session;\nimport jakarta.mail.Transport;\nimport jakarta.mail.internet.InternetAddress;\n\
    import jakarta.mail.internet.MimeMessage;\nimport jakarta.ws.rs.POST;\nimport\
    \ jakarta.ws.rs.Path;\nimport jakarta.ws.rs.Produces;\n@Path(\"/mail\")\npublic\
    \ class JakartaMail {\nfinal String MAILSERVER_ADDR = \"addr.to.mta.com\";\nfinal\
    \ String MAILSERVER_PORT = \"465\"; //465,587;\nfinal String MAILSERVER_IDENTITY\
    \ = \"your@email.addr.com\";\nfinal String MAILSERVER_LOGIN = \"mailserver.login\"\
    ;\nfinal String MAILSERVER_PASSWD = \"mailserver.passwd\";\n@POST\n@Produces(\"\
    application/json\")\npublic String sendMail() {\nsendMail(\"recipient@example.com\"\
    , \"test\",\nnew Date().toString());\nreturn \"{\\\"done\\\":true}\";\n}\nclass\
    \ SMTPAuthenticator extends Authenticator {\npublic PasswordAuthentication\ngetPasswordAuthentication(){\n\
    return new PasswordAuthentication(MAILSERVER_LOGIN,\nMAILSERVER_PASSWD);\n}\n\
    }\nprivate void sendMail(String toAddr,\nString theSubject,\nString theMessage)\
    \ {\nProperties props = new Properties();\nprops.put(\"mail.smtp.user\", MAILSERVER_IDENTITY);\n\
    props.put(\"mail.smtp.host\", MAILSERVER_ADDR);\nprops.put(\"mail.smtp.port\"\
    , MAILSERVER_PORT);\nprops.put(\"mail.smtp.starttls.enable\",\"true\");\nprops.put(\"\
    mail.smtp.debug\", \"true\");\nprops.put(\"mail.smtp.auth\", \"true\");\nprops.put(\"\
    mail.smtp.socketFactory.port\",\nMAILSERVER_PORT);\n//props.put(\"mail.smtps.ssl.checkserveridentity\"\
    ,\n// \"false\");\nprops.put(\"mail.smtps.ssl.trust\",  MAILSERVER_ADDR);\nSMTPAuthenticator\
    \ auth = new SMTPAuthenticator();\nSession session = Session.getInstance(props,\
    \ auth);\nsession.setDebug(false);\nMimeMessage msg = new MimeMessage(session);\n\
    try {\nmsg.setText(theMessage);\nmsg.setSubject(theSubject);\nmsg.setFrom(new\
    \ InternetAddress(\nMAILSERVER_IDENTITY));\nmsg.addRecipient(Message.RecipientType.TO,\n\
    new InternetAddress(toAddr));\n// use \"smtps\" instead of \"smtp\", to enable\
    \ SSL\nTransport transport = session.getTransport(\"smtps\");\ntransport.connect(MAILSERVER_ADDR,\n\
    Integer.parseInt(MAILSERVER_PORT),\nMAILSERVER_LOGIN, MAILSERVER_PASSWD);\ntransport.sendMessage(msg,\
    \ msg.getAllRecipients());\ntransport.close();\n} catch (MessagingException e)\
    \ {\ne.printStackTrace(System.err);\n}\n}\n}\n```\n\nA word about the `mail.smtps.ssl.trust`\n\
    property: If it’s\nused as shown here, the handshake process used with SSL encrypted\n\
    communication disregards the server’s SSL certificate check. If you\ncomment out\
    \ this line, you might have to import the server’s certificate\ninto Java’s `cacerts`\
    \ key store. So\nexpect some\nadditional work if you need to check the server’s\
    \ identity.\n\nOnce it’s deployed—for example as `JakartaMail.war` on a\nGlassFish\
    \ server and with the `<url-pattern> /webapi/* </url-pattern>` URL pattern in\
    \ `web.xml`—you can\ntrigger an email from a terminal via this command:\n\n```\n\
    curl -X POST \\\nhttp://localhost:8080/JakartaMail/webapi/email\n```\n\n25. Application\
    \ Client (Groovy)\n\nJakarta EE server applications usually provide interfaces\
    \ that\nclients can use to fulfill enterprise use case needs. These are often\n\
    web or REST services for communicating XML or JSON data, or EJB\ninterfaces that\
    \ a client can access via RMI. However, during the\ndevelopment phase and later\
    \ for maintenance purposes like monitoring, a\nlightweight and easy-to-configure\
    \ access library is better solution.\nSome application servers like GlassFish\
    \ therefore provide scripts for\ngenerating such on-the-fly client libraries,\
    \ commonly referred to as\n*application clients*.\n\nNote\n\nApplication clients\
    \ are not standardized. For Jakarta EE servers\nother than GlassFish, you have\
    \ to consult the documentation to see\nwhether application clients are supported.\
    \ Or you can develop your own\nscripts.\n\nThis chapter is about using Groovy\
    \ scripts to access EJB interfaces\nvia an application client library generated\
    \ by GlassFish.\n\nProviding an Enterprise Application\nYou can start from any\
    \ Jakarta EE application with a `remote` EJB interface.\nA remote interface is\
    \ necessary, since you run the client code in a JVM\nthat's different from the\
    \ application server.\n\nThis simple example codes an EAR project named `ApplicationClientServer`.\n\
    It targets a `ApplicationClientServer.ear`\ndeployable and uses the following\
    \ EJB classes:\n\n```\n// ----- file TheDate.java\npackage book.jakartapro.appclient.ejb;\n\
    import java.time.ZonedDateTime;\nimport book.jakartapro.appclient.ejb.interfaces.\n\
    TheDateLocal;\nimport book.jakartapro.appclient.ejb.interfaces.\nTheDateRemote;\n\
    import jakarta.ejb.Local;\nimport jakarta.ejb.Remote;\nimport jakarta.ejb.Stateless;\n\
    @Stateless\n@Local(TheDateLocal.class)\n@Remote(TheDateRemote.class)\npublic class\
    \ TheDate {\npublic String fetchDate() {\nreturn ZonedDateTime.now().toString();\n\
    }\n}\n// ----- file TheDateLocal.java\npackage book.jakartapro.appclient.ejb.interfaces;\n\
    public interface TheDateLocal {\nString fetchDate();\n}\n// ----- file TheDateRemote.java\n\
    package book.jakartapro.appclient.ejb.interfaces;\npublic interface TheDateRemote\
    \ {\nString fetchDate();\n}\n```\n\nNote\n\nAt this point, the example doesn’t\
    \ explain how to develop a Jakarta\nEE application packaged as an EAR file. Different\
    \ IDEs use different\nworkflows for this aim, and it also depends on which build\
    \ framework you\nuse. Previous chapters provided hints; consult your server documentation\n\
    if you need more information.\n\nFor the application client generation to work,\
    \ this EAR must be\ndeployed and running on GlassFish.\n\nBuilding an Application\
    \ Client\n\nWith an EAR application deployed on GlassFish, the steps for generating\n\
    and running application\nclients are summarized as follows:\n\n1.  Package the\
    \ interface classes into a `ejb-interfaces.jar`\n    archive.\n\n2.  Generate\
    \ `appclient.jar`. Go to\n    the `GLASSFISH_INST/glassfish`\n    folder and issue\
    \ a `bin/package-appclient`.\n\n3.  Fetch the `GLASSFISH_INST/glassfish/lib/appclient.jar`\n\
    \    generated in the previous step.\n\n4.  Unzip `appclient.jar` to any\n   \
    \ suitable folder on the machine (remember a `.jar` file is just a\n    ZIP file\
    \ with a different suffix). Call this folder `MYAPPCLIENT`. Move the\n    contents\
    \ of the `appclient` folder to\n    its parent folder.\n\n5.  Copy `ejb-interfaces.jar`\n\
    \    into `MYAPPCLIENT`.\n\n6.  Modify the `MYAPPCLIENT/config/asenv.*`\n    and\
    \ `MYAPPCLIENT/glassfish/domains/domain1/config/sun-acc.xml`\n    files. See the\
    \ instructions at [`https://glassfish.org/docs/latest/reference-manual.html#package-appclient`](https://glassfish.org/docs/latest/reference-manual.html%2523package-appclient).\n\
    \    This step is necessary only if you want to use the GlassFish client\n   \
    \ application container. This example use a different approach; see the\n    next\
    \ section.\n\n7.  Make the `MYAPPCLIENT/glassfish/bin/appclient`\n    and `MYAPPCLIENT/glassfish/bin/appclient.bat`\n\
    \    files executable. This step is necessary only if you want to use the\n  \
    \  GlassFish client application container. This example uses a different\n   \
    \ approach; see the next section.\n\n8.  If you want to start the application\
    \ client container, provide the\n    client code as, for example, `myClient.jar`.\
    \ Then\n    run `MYAPPCLIENT/glassfish/bin/appclient`,\n    using `myClient.jar`\
    \ as a\n    parameter.\n\nRunning a GroovyConsole Application Client\n\nTo allow\
    \ a Groovy\nscript to access the Jakarta EE server, first download and\ninstall\
    \ Groovy from [`https://groovy-lang.org/install.html`](https://groovy-lang.org/install.html).\n\
    Next—with `GROOVY_HOME` pointing\nto the Groovy installation folder and `JAVA_HOME`\
    \ pointing to\nJDK version 11, and with the `MYAPPCLIENT` folder\nprepared as\
    \ described in the preceding section—build a shell script\ninside `MYAPPCLIENT`\
    \ as\nfollows:\n\n```\n#!/bin/bash"
  trans: "\n# 随后，在 src 文件夹中查找 Java 类\nbin/scomp -srconly -src src -d xsb \\\n/path/to/xsd/file\n\
    ```\n\n有关详细信息和选项，请查阅 Apache XMLBeans 文档。\n\n23. JSON 处理\n\n第 22 章介绍的 XML 绑定技术引入了一种宝贵的数据交换格式，简化并标准化了异构且广泛分布的计算机网络中的通信。通过对元素和属性使用模式与命名空间，XML\
    \ 实现了语义和版本一致性，从而能够进行 XML 文档有效性检查。不幸的是，随着这些附加功能的增加，XML 文档变得越来越复杂，为了发送少量格式化为 XML\
    \ 的字节，也必须传输大量样板数据。尤其是在浏览器与服务器的通信中，XML 显得过于繁重。因此，Web 应用程序开发者转向了更精简的 JSON（JavaScript\
    \ 对象表示法）数据协议，这使得 Java 世界有必要开发能够处理 JSON 的工具和库。\nJSON 处理是 Jakarta EE 10 规范的一部分。这具体涉及\
    \ Jakarta JSON Binding (JSON-B) 3.0 版和 Jakarta JSON Processing (JSON-P) 2.1 版。JSON-P\
    \ 和 JSON-B 的规范可以在 [`https://jcp.org/aboutJava/communityprocess/pr/jsr367/index.html`](https://jcp.org/aboutJava/communityprocess/pr/jsr367/index.html)\
    \ 和 [`https://jcp.org/en/jsr/detail?id=374`](https://jcp.org/en/jsr/detail%253Fid%253D374)\
    \ 找到。本章将介绍这些 JSON 库，并解释如何将 JSON 添加到 Jakarta EE 应用程序中。\n\nJSON 文档\n\n与 XML 一样，JSON\
    \ 文档表示一种树状的对象层次结构。与 XML 不同，JSON 实体不能拥有属性。没有命名空间和模式之类的东西，并且，与使用开闭标签不同，复杂的 JSON\
    \ 对象使用 `{ ... }` 来映射名称-值对，使用 `[...]` 来表示数组。\n下面是一个展示所有特性的简单 JSON 文档：\n\n```\n\
    {\n\"lastname\": \"Smith\",\n\"married\": true,\n\"birthday\": \"1997-12-30\"\
    ,\n\"records\": null,\n\"height\": 6.1,\n\"cars\": 2,\n\"children\": [\n\"Amanda\"\
    ,\n{ \"forename\": \"Jim\", \"gender\": \"m\" }\n]\n\"address\": {\n\"us\": true,\n\
    \"state\": \"California\",\n\"city\": \"Paradise\",\n\"owned\": false\n}\n}\n\
    ```\n\n你可以看到，基本类型包括带或不带小数位的数字、布尔字面量 `true` 和 `false`、字符串以及 `null`。数组和映射可以包含混合类型的元素，包括内部复杂类型。\n\
    \n使用 REST 服务的 JSON\n\n在前面的章节中，你看到了一个返回 JSON 数据的 REST 方法，如下所示：\n\n```\n@GET\n@Produces(\"\
    application/json\")\npublic String stdDate() {\nreturn \"{\\\"date\\\":\\\"\"\
    \ +\nZonedDateTime.now().toString() + \"\\\"}\";\n}\n```\n\n虽然乍一看，这似乎是创建 JSON\
    \ 数据的一种简单方法，但它缺乏基本的语法检查。首先，很容易忘记一个闭合的 `}`，或者因为引号或标点符号放错位置而出错。其次，考虑一个包含更多元素和更深层次结构的更复杂的\
    \ JSON 文档。手动构建连接字符串来表示更大的 JSON 对象，在全面性和可维护性方面都是一场噩梦。\n\n提高可读性的第一步是使用 JSON-P 来构建\
    \ JSON 数据。JSON-P 包含表示值、数组和映射的类。替换之前的代码片段，你最终会得到如下代码：\n\n```\n...\nimport jakarta.json.Json;\n\
    import jakarta.json.JsonStructure;\n...\n@GET\n@Path(\"j\")\n@Produces(\"application/json\"\
    )\npublic JsonStructure stdDate() {\nJsonStructure json = Json.createObjectBuilder()\n\
    .add(\"date\", ZonedDateTime.now().toString())\n.build();\nreturn json;\n}\n```\n\
    \n你可以看到，你不再需要连接字符串来构建 JSON 文档。你甚至可以让方法返回一个 `JsonObject`、`JsonArray` 或 `JsonStructure`（均来自\
    \ `jakarta.json` 包）类型的对象。JAX-RS 知道如何处理这些返回类型。\n\n来自 AJAX 调用，如果你需要将数据从 Web 前端传递到服务器，你可以让\
    \ REST 服务接收一个字符串，如下所示：\n\n```\n// 对应于例如来自 jQuery 的 AJAX 调用：\n// $.ajax({\n// \
    \ method: \"POST\",\n//  contentType: \"application/json\",\n//  url: \"../webapi/date\"\
    ,\n//  data: { timeZone: \"UTC\", format: \"standard\" }\n// })\n// .done(function(\
    \ msg, textStatus, jqXHR ) {\n//   alert( \"Data Saved: \" + msg );\n// });\n\
    @POST\n@Path(\"/date\")\n@Consumes(MediaType.APPLICATION_JSON)\n...\npublic Response\
    \ stdDate(String data) {\n// data 是一个 JSON 字符串\n...\n}\n```\n\n或者，作为一种替代方案，你可以为该方法使用一个\
    \ `jakarta.json.JsonStructure` 参数，如下所示：\n\n```\n// 对应于例如来自 jQuery 的 AJAX 调用：\n\
    // $.ajax({\n//  method: \"POST\",\n//  contentType: \"application/json\",\n//\
    \  url: \"../webapi/date\",\n//  data: '{ timeZone: \"UTC\", format: \"standard\"\
    \ }'\n// })\n// .done(function( msg, textStatus, jqXHR ) {\n//   alert( \"Data\
    \ Saved: \" + msg );\n// });\n@POST\n@Path(\"/date\")\n@Consumes(MediaType.APPLICATION_JSON)\n\
    ...\npublic Response stdDate(JsonStructure data) {\n...\n}\n```\n\n对于 jQuery AJAX\
    \ 调用，你必须传递一个 JSON 格式的字符串，而不是 JavaScript 数据对象。\n除了这些简单的例子，关于使用 JSON-P 和 JSON-B\
    \ 技术处理 JSON，还有更多内容有待探索。以下部分将更详细地解释 JSON 绑定和处理。\n\n生成 JSON\n\n为了使用构建器模式生成 JSON\
    \ 数据，你需要使用 `jakarta.json` 包中的类。从一个构建器开始：\n\n```\n...\nimport jakarta.json.*;\n\
    ...\nJsonObjectBuilder builder = Json.createObjectBuilder();\n```\n\n从这里开始，你可以按如下方式添加元素：\n\
    \n```\nbuilder.add(\"elementName\", ...);\n// <- 你可以添加 int、long、double、boolean、\n\
    //    String、BigInteger 和 BigDecimal 元素。\n//    并且你可以追加更多的 add(...) 语句。\n```\n\
    \n还有一个用于 `null` 值和复杂类型的变体：\n\n```\nbuilder.addNull(\"elementName\");\nbuilder.\n\
    add(\"element1\",\nJson.createObjectBuilder().\nadd(\"inner1\", 42).\nadd(\"inner2\"\
    , \"deepThought\")).\nadd(\"element2\", 3.1415);\n```\n\n要创建 JSON 数组，请改用 `JsonArrayBuilder`\
    \ 类：\n\n```\n...\nimport jakarta.json.*;\n...\nJsonArrayBuilder builder = Json.createArrayBuilder();\n\
    builder.add(\"Fibonacci\");\nbuilder.add(1); // 允许在数组中混合类型\nbuilder.add(2);\n\
    builder.add(3);\nbuilder.add(5);\nbuilder.add(8);\n```\n\n对于 JSON 对象和 JSON 数组，要获取\
    \ Java 对象，你必须调用 `build()` 方法：\n\n```\n...\nimport jakarta.json.*;\n...\nJsonObjectBuilder\
    \ builder = Json.createObjectBuilder();\n// ... 添加元素，然后：\nJsonObject obj = builder.build();\n\
    ...\nJsonArrayBuilder abuilder = Json.createArrayBuilder();\n// ... 添加元素，然后：\n\
    JsonArray aobj = abuilder.build();\n```\n\n解析 JSON\n\n对于 JSON 字符串的低级解析，你可以使用 JSON-P\
    \ 的流式 API：\n\n```\n...\nimport jakarta.json.*;\n...\nfinal String json =\n\"{\\\
    \"name\\\":\\\"John\\\",\\\"age\\\":27,\\\"employed\\\":false}\";\nfinal JsonParser\
    \ parser =\nJson.createParser(new StringReader(json));\nString key = null;\nString\
    \ value = null;\nwhile (parser.hasNext()) {\nfinal Event event = parser.next();\n\
    switch (event) {\ncase KEY_NAME:\nkey = parser.getString();\nSystem.out.println(key);\n\
    break;\ncase VALUE_STRING:\nvalue = parser.getString();\nSystem.out.println(value);\n\
    break;\n}\n}\nparser.close();\n```\n\n如果你不需要冗长的 JSON 到 Java 对象的绑定（这需要额外的编码），这会很方便。此外，如果你想读取一个非常大的\
    \ JSON 文档，流式 API 可以帮助你避免分配过多的资源。\n\n如果你不喜欢拉取解析 API，你可以读取一个 JSON 字符串，从而生成一个通用的\
    \ JSON 对象：\n\n```\nfinal String json =\n\"{\\\"name\\\":\\\"John\\\",\\\"age\\\
    \":27,\\\"employed\\\":false}\";\nJsonReader jsonReader =\nJson.createReader(new\
    \ StringReader(json));\nJsonObject object = jsonReader.readObject();\njsonReader.close();\n\
    ...\nString name = object.getString(\"name\", \"\");\n```\n\n更多详细信息，请参阅 [`https://javaee.github.io/jsonp/index.html`](https://javaee.github.io/jsonp/index.html)\
    \ 的 API 文档。\n\n将 JSON 绑定到 Java 对象\n\n如果你需要在 Java 对象树和该树的 JSON 表示之间进行自动映射，你可以使用\
    \ JSON-B 库中的类。考虑以下用于俱乐部成员列表的 JSON 字符串：\n\n```\n[\n{\n\"name\": \"John\",\n\"age\"\
    : 27,\n\"employed\":false,\n\"children\" :\n[\n{\"name\": \"Bart\", \"birthday\"\
    : \"2015-11-10\"},\n{\"name\": \"Amanda\", \"birthday\": \"2017-06-01\"}\n]\n\
    },\n{\n\"name\": \"Linda\",\n\"age\": 22,\n\"employed\":true,\n\"children\" :\n\
    [\n]\n}\n]\n```\n\n表示相同列表的一组自然类如下所示：\n\n```\nclass Member {\nprivate String name;\n\
    private int age;\nprivate boolean employed;\nprivate List children;\n// getters\
    \ and setters...\n}\nclass Child {\nprivate String name;\nprivate String birthday;\n\
    // getters and setters...\n}\n```\n\n为了读取 JSON 字符串并构建一个成员列表，你只需这样做：\n\n```\nString\
    \ json = \"[ ... ]\";\nJsonb jsonb = JsonbBuilder.create();\n@SuppressWarnings(\"\
    unchecked\")\nList members = jsonb.fromJson(json, List.class);\n// 只是为了检查，反过来，从\
    \ Java 对象树获取\n// JSON 字符串：\njsonb = JsonbBuilder.create();\nString json2 = jsonb.toJson(members);\n\
    // <- 在语义上与上面的 'json' 相同。\n```\n\n在字符串、布尔值和数字等简单类型之间进行转换是直接的。如果你需要对转换过程进行更多控制，JSON-B\
    \ 通过一些注解来帮助你。在前面的例子中，你可以例如将 `birthday` 字段更改为 `java.util.Date` 类型的字段：\n\n```\n\
    class Child {\nprivate java.util.Date birthday;\n...\n}\n```\n\n（getter 和 setter\
    \ 相应地进行调整。）然后，`jakarta.json.bind.annotation.JsonbDateFormat` 允许指定日期字符串转换模式。对于\
    \ `yyyy-MM-dd` 模式，请参阅 `SimpleDateFormat` 的 API 文档以获取更多选项。该注解如下所示：\n\n```\nclass\
    \ Child {\n@JsonbDateFormat(\"yyyy-MM-dd\")\nprivate java.util.Date birthday;\n\
    ...\n}\n```\n\n更多的注解控制数字格式和 `null` 值的转换。也可以从转换中排除字段，并且为了最大程度的控制，你可以定义一个自定义类型适配器。表\
    \ 23-1 总结了 JSON-B 注解。\n\n表 23-1\nJSON-B 注解\n\n 注解 |\n 用途 |\n\n| --- | --- | ---\
    \ | --- | --- |\n\n `@JsonbDateFormat` |\n 定义自定义日期格式。在 Java 中的 `java.util.Date`\
    \ 和 JSON 字符串值之间进行中介。 |\n\n `@JsonbNillable` |\n 将 Java 中的 `null` 值在 JSON 字符串中显示为\
    \ \"null\"。如果设置为 `false`，则 null 值不会出现在 JSON 字符串中。 |\n\n `@JsonbNumberFormat` |\n\
    \ 定义自定义数字格式。在 Java 中的 `java.math.BigDecimal` 和 JSON 字符串值之间进行中介。格式选项在 `DecimalFormat`\
    \ 类的 API 文档中有描述。 |\n\n `@JsonbTransient` |\n 从转换中排除一个字段。 |\n\n `@JsonbProperty`\
    \ |\n 为映射指定自定义键名。 |\n\n `@JsonbTypeAdapter` |\n 指定自定义类型适配器（`JsonbAdapter` 类）。\
    \ |\n\n作为类型适配器的一个例子，考虑以下类：\n\n```\nclass Color {\npublic int r;\npublic int g;\n\
    public int b;\npublic Color(int r, int g, int b) {\nthis.r = r;\nthis.g = g;\n\
    this.b = b;\n}\n}\nclass Shape {\nprivate Color color;\n...\n// getters and setters...\n\
    }\n```\n\n如果你希望颜色能够表示为十六进制值 `#RRGGBB`，一个形状对象的 JSON 片段可能如下所示：\n\n```\n{\n\"color\"\
    : \"#FF1B75\",\n...\n}\n```\n\n转换器类负责将 `Color` 对象转换为 JSON 字符串表示，反之亦然：\n\n```\n\
    class MyColorAdapter implements\nJsonbAdapter {\n@Override\npublic String adaptToJson(Color\
    \ obj)\nthrows Exception {\nreturn \"#\" +\nString.format(\"%02x\", obj.r) +\n\
    String.format(\"%02x\", obj.g) +\nString.format(\"%02x\", obj.b);\n}\n@Override\n\
    public Color adaptFromJson(String obj)\nthrows Exception {\nint r = Integer.parseInt(\
    \ obj.substring(1,3), 16);\nint g = Integer.parseInt( obj.substring(3,5), 16);\n\
    int b = Integer.parseInt( obj.substring(5,7), 16);\nreturn new Color(r,g,b);\n\
    }\n}\n```\n\n最后，要将转换器添加到 `Shape` 类，你必须按如下方式应用 `@JsonbTypeAdapter` 注解：\n\n```\n\
    class Shape {\n@JsonbTypeAdapter(MyColorAdapter.class)\nprivate Color color;\n\
    ...\n// getters and setters...\n}\n```\n\n来自 `jakarta.json.bind.annotation` 包的注解文档显示了更多信息。要了解更多关于\
    \ JSON-B 的信息，也请查看 [`https://javaee.github.io/jsonb-spec/`](https://javaee.github.io/jsonb-spec/)。\n\
    \n24. Jakarta Mail\n\n能够从服务器进程发送电子邮件可能是公司 IT 架构的关键部分。例如，考虑异步传输长时间运行计算的结果、发送自动生成的报告，或者在服务器进程失败时发送警告消息。\n\
    Jakarta Mail 2.1 可以服务于这个目的，尽管它并不常被认为是 Jakarta EE 技术栈的核心部分。本章介绍 Jakarta Mail，它来自\
    \ [`https://eclipse-ee4j.github.io/mail/`](https://eclipse-ee4j.github.io/mail/)，作为\
    \ Jakarta EE 10 中包含的一个多功能电子邮件库。\n\n安装 Jakarta Mail\n\nJakarta Mail 包含在 Jakarta\
    \ EE 规范中，因此对于任何具有此基本依赖项（Gradle 配置，Maven 类似）的企业项目：\n\n```\nimplementation 'jakarta.platform:'\
    \ +\n'jakarta.jakartaee-api:10.0.0'\n```\n\n你就拥有了使用 Jakarta Mail 所需的一切。\n\n注意\n\
    \nJakarta Mail 的前身称为 JavaMail。主要区别在于 Jakarta Mail 使用 `jakarta.` 命名空间而不是 `javax.`。许多在线资源仍然引用\
    \ JavaMail。在大多数情况下，你只需切换到新的命名空间，就可以轻松地调整 JavaMail 教程。\n\n生成和发送电子邮件\n\n从 Jakarta\
    \ EE 应用程序发送电子邮件的标准方法包括以下步骤：\n\n*   提供一个用于在消息传输代理 (MTA) 进行身份验证的身份验证器。为此，创建一个继承自\
    \ `jakarta.mail.Autenticator` 的可实例化类。如果你不需要向 MTA 进行身份验证，可以跳过此步骤。\n\n*   实例化并填充一个\
    \ `java.util.Properties` 集合。在这里，需要输入各种与 SMTP 相关的参数。\n\n*   获取一个 `jakarta.mail.Session`\
    \ 实例。\n\n*   实例化一个消息对象，例如 `jakarta.mail.internet.MimeMessage`。\n\n*   从会话中获取一个传输对象（`jakarta.mail.Transport`\
    \ 类）。\n\n*   使用传输对象连接到 MTA，然后发送消息。\n\n这个例子提供了一个用于构建和发送电子邮件的初级 REST 类。这只是一个起点。对于你自己的应用程序，你应该从配置文件中读取常量。你还必须更新连接参数以匹配你的邮件服务器。\n\
    \n```\nimport java.util.Date;\nimport java.util.Properties;\nimport jakarta.mail.Authenticator;\n\
    import jakarta.mail.Message;\nimport jakarta.mail.MessagingException;\nimport\
    \ jakarta.mail.PasswordAuthentication;\nimport jakarta.mail.Session;\nimport jakarta.mail.Transport;\n\
    import jakarta.mail.internet.InternetAddress;\nimport jakarta.mail.internet.MimeMessage;\n\
    import jakarta.ws.rs.POST;\nimport jakarta.ws.rs.Path;\nimport jakarta.ws.rs.Produces;\n\
    @Path(\"/mail\")\npublic class JakartaMail {\nfinal String MAILSERVER_ADDR = \"\
    addr.to.mta.com\";\nfinal String MAILSERVER_PORT = \"465\"; //465,587;\nfinal\
    \ String MAILSERVER_IDENTITY = \"your@email.addr.com\";\nfinal String MAILSERVER_LOGIN\
    \ = \"mailserver.login\";\nfinal String MAILSERVER_PASSWD = \"mailserver.passwd\"\
    ;\n@POST\n@Produces(\"application/json\")\npublic String sendMail() {\nsendMail(\"\
    recipient@example.com\", \"test\",\nnew Date().toString());\nreturn \"{\\\"done\\\
    \":true}\";\n}\nclass SMTPAuthenticator extends Authenticator {\npublic PasswordAuthentication\n\
    getPasswordAuthentication(){\nreturn new PasswordAuthentication(MAILSERVER_LOGIN,\n\
    MAILSERVER_PASSWD);\n}\n}\nprivate void sendMail(String toAddr,\nString theSubject,\n\
    String theMessage) {\nProperties props = new Properties();\nprops.put(\"mail.smtp.user\"\
    , MAILSERVER_IDENTITY);\nprops.put(\"mail.smtp.host\", MAILSERVER_ADDR);\nprops.put(\"\
    mail.smtp.port\", MAILSERVER_PORT);\nprops.put(\"mail.smtp.starttls.enable\",\"\
    true\");\nprops.put(\"mail.smtp.debug\", \"true\");\nprops.put(\"mail.smtp.auth\"\
    , \"true\");\nprops.put(\"mail.smtp.socketFactory.port\",\nMAILSERVER_PORT);\n\
    //props.put(\"mail.smtps.ssl.checkserveridentity\",\n// \"false\");\nprops.put(\"\
    mail.smtps.ssl.trust\",  MAILSERVER_ADDR);\nSMTPAuthenticator auth = new SMTPAuthenticator();\n\
    Session session = Session.getInstance(props, auth);\nsession.setDebug(false);\n\
    MimeMessage msg = new MimeMessage(session);\ntry {\nmsg.setText(theMessage);\n\
    msg.setSubject(theSubject);\nmsg.setFrom(new InternetAddress(\nMAILSERVER_IDENTITY));\n\
    msg.addRecipient(Message.RecipientType.TO,\nnew InternetAddress(toAddr));\n//\
    \ 使用 \"smtps\" 而不是 \"smtp\"，以启用 SSL\nTransport transport = session.getTransport(\"\
    smtps\");\ntransport.connect(MAILSERVER_ADDR,\nInteger.parseInt(MAILSERVER_PORT),\n\
    MAILSERVER_LOGIN, MAILSERVER_PASSWD);\ntransport.sendMessage(msg, msg.getAllRecipients());\n\
    transport.close();\n} catch (MessagingException e) {\ne.printStackTrace(System.err);\n\
    }\n}\n}\n```\n\n关于 `mail.smtps.ssl.trust` 属性的一点说明：如果像这里这样使用，与 SSL 加密通信一起使用的握手过程会忽略服务器的\
    \ SSL 证书检查。如果你注释掉这一行，你可能需要将服务器的证书导入到 Java 的 `cacerts` 密钥库中。因此，如果你需要检查服务器的身份，预计会有一些额外的工作。\n\
    \n一旦部署完成——例如，作为 `JakartaMail.war` 部署在 GlassFish 服务器上，并且在 `web.xml` 中使用 `<url-pattern>\
    \ /webapi/* </url-pattern>` URL 模式——你可以通过以下命令从终端触发一封电子邮件：\n\n```\ncurl -X POST\
    \ \\\nhttp://localhost:8080/JakartaMail/webapi/email\n```\n\n25. 应用程序客户端 (Groovy)\n\
    \nJakarta EE 服务器应用程序通常提供客户端可以用来满足企业用例需求的接口。这些通常是用于通信 XML 或 JSON 数据的 Web 或 REST\
    \ 服务，或者客户端可以通过 RMI 访问的 EJB 接口。然而，在开发阶段以及后续的维护目的（如监控）中，一个轻量级且易于配置的访问库是更好的解决方案。因此，一些应用服务器（如\
    \ GlassFish）提供了用于生成此类即时客户端库的脚本，通常称为*应用程序客户端*。\n\n注意\n\n应用程序客户端没有标准化。对于 GlassFish\
    \ 以外的 Jakarta EE 服务器，你必须查阅文档以了解是否支持应用程序客户端。或者你可以开发自己的脚本。\n\n本章介绍如何使用 Groovy 脚本，通过\
    \ GlassFish 生成的应用程序客户端库来访问 EJB 接口。\n\n提供企业应用程序\n你可以从任何具有 `remote` EJB 接口的 Jakarta\
    \ EE 应用程序开始。远程接口是必需的，因为你在与应用程序服务器不同的 JVM 中运行客户端代码。\n\n这个简单的例子编码了一个名为 `ApplicationClientServer`\
    \ 的 EAR 项目。它针对一个可部署的 `ApplicationClientServer.ear`，并使用以下 EJB 类：\n\n```\n// -----\
    \ 文件 TheDate.java\npackage book.jakartapro.appclient.ejb;\nimport java.time.ZonedDateTime;\n\
    import book.jakartapro.appclient.ejb.interfaces.\nTheDateLocal;\nimport book.jakartapro.appclient.ejb.interfaces.\n\
    TheDateRemote;\nimport jakarta.ejb.Local;\nimport jakarta.ejb.Remote;\nimport\
    \ jakarta.ejb.Stateless;\n@Stateless\n@Local(TheDateLocal.class)\n@Remote(TheDateRemote.class)\n\
    public class TheDate {\npublic String fetchDate() {\nreturn ZonedDateTime.now().toString();\n\
    }\n}\n// ----- 文件 TheDateLocal.java\npackage book.jakartapro.appclient.ejb.interfaces;\n\
    public interface TheDateLocal {\nString fetchDate();\n}\n// ----- 文件 TheDateRemote.java\n\
    package book.jakartapro.appclient.ejb.interfaces;\npublic interface TheDateRemote\
    \ {\nString fetchDate();\n}\n```\n\n注意\n\n在这一点上，该示例没有解释如何开发打包为 EAR 文件的 Jakarta\
    \ EE 应用程序。不同的 IDE 为此目的使用不同的工作流程，这也取决于你使用的构建框架。前面的章节提供了一些提示；如果你需要更多信息，请查阅你的服务器文档。\n\
    \n为了使应用程序客户端生成工作，这个 EAR 必须部署并在 GlassFish 上运行。\n\n构建应用程序客户端\n\n在 GlassFish 上部署了\
    \ EAR 应用程序后，生成和运行应用程序客户端的步骤总结如下：\n\n1.  将接口类打包到 `ejb-interfaces.jar` 归档文件中。\n\n\
    2.  生成 `appclient.jar`。转到 `GLASSFISH_INST/glassfish` 文件夹并执行 `bin/package-appclient`。\n\
    \n3.  获取上一步生成的 `GLASSFISH_INST/glassfish/lib/appclient.jar`。\n\n4.  将 `appclient.jar`\
    \ 解压到机器上的任何合适文件夹（记住 `.jar` 文件只是一个后缀不同的 ZIP 文件）。将此文件夹称为 `MYAPPCLIENT`。将 `appclient`\
    \ 文件夹的内容移动到其父文件夹。\n\n5.  将 `ejb-interfaces.jar` 复制到 `MYAPPCLIENT`。\n\n6.  修改 `MYAPPCLIENT/config/asenv.*`\
    \ 和 `MYAPPCLIENT/glassfish/domains/domain1/config/sun-acc.xml` 文件。请参阅 [`https://glassfish.org/docs/latest/reference-manual.html#package-appclient`](https://glassfish.org/docs/latest/reference-manual.html%2523package-appclient)\
    \ 上的说明。仅当你想要使用 GlassFish 客户端应用程序容器时，才需要此步骤。此示例使用不同的方法；请参阅下一节。\n\n7.  使 `MYAPPCLIENT/glassfish/bin/appclient`\
    \ 和 `MYAPPCLIENT/glassfish/bin/appclient.bat` 文件可执行。仅当你想要使用 GlassFish 客户端应用程序容器时，才需要此步骤。此示例使用不同的方法；请参阅下一节。\n\
    \n8.  如果你想启动应用程序客户端容器，请提供客户端代码，例如 `myClient.jar`。然后运行 `MYAPPCLIENT/glassfish/bin/appclient`，将\
    \ `myClient.jar` 作为参数。\n\n运行 GroovyConsole 应用程序客户端\n\n为了允许 Groovy 脚本访问 Jakarta\
    \ EE 服务器，首先从 [`https://groovy-lang.org/install.html`](https://groovy-lang.org/install.html)\
