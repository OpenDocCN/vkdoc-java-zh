- fmt: "# A Different Connection Factory Class\n\n`bin/asadmin create-connector-resource\
    \ \\ --poolname eis/HelloJcaConnectionPool \\ eis/HelloWorld`\n\n(There should\
    \ be no line break and no spaces after `interfaces`.) For details and more options,\
    \ see the GlassFish server documentation.\n\n## Resource Adapter Clients\n\nOnce\
    \ the resource adapter is deployed and correctly configured, you then have to\
    \ inject the Connection Factory via a `@Resource` annotation (the `jakarta.annotation`\
    \ package) so the client can access the resource adapter’s functionalities. For\
    \ a REST controller, for example, the code would read as follows:\n\n```\n@Path(\"\
    /\")\npublic class HelloJca {\n    @Resource(name = \"eis/HelloWorld\")\n    private\
    \ HelloWorldConnectionFactory connectionFactory;\n    // more fields...\n    @GET\n\
    \    public Response fetch() {\n        try {\n            HelloWorldConnection\
    \ conn = connectionFactory.getConnection();\n            String s = conn.helloWorld();\n\
    \            conn.close();\n            return Response.status(200).entity(\"\
    done: \" + s).build();\n        } catch (ResourceException e) {\n            return\
    \ Response.status(500).entity(\"error\").build();\n        }\n    }\n    ...\n\
    }\n```\n\nThe `name` parameter of the annotation must match the JNDI name of the\
    \ resource adapter.\n\n# 29. Caching\n\nAccessing data from a large database or\
    \ using complex `select` clauses can be time consuming tasks. In addition, it\
    \ quite often happens that your application uses the same database access statement\
    \ several times, which might make you wonder if there is a way to shortcut such\
    \ database queries. Might that shortcut help the application react faster to user\
    \ queries and avoid too much load on the database server? This is exactly what\
    \ caching is for. It sits between the client code that runs database queries and\
    \ the database access itself, and it answers database queries on behalf of the\
    \ database when the same query has been run before. This chapter covers using\
    \ Ehcache for the Hibernate persistence provider.\n\n## Installing Ehcache\n\n\
    In order to install Ehcache, add the following dependency to your build file:\n\
    \n```\n// For Gradle:\n...\ndependencies {\n    ...\n    // Assuming you use the\
    \ following Hibernate version\n    implementation 'org.hibernate:' +\n       \
    \ 'hibernate-core-jakarta:5.6.15.Final'\n    // ... you must add:\n    implementation\
    \ 'org.hibernate:' +\n        'hibernate-ehcache:5.6.15.Final'\n}\n...\n...\n\
    org.hibernate\nhibernate-ehcache\n5.6.15.Final\n```\n\n## Configuring Hibernate\
    \ for Ehcache\n\nBefore caching is actually enabled, you need to tell Hibernate\
    \ that you want to use Ehcache. The Hibernate configuration for Jakarta EE happens\
    \ inside the `persistence.xml` file, and this is also where you announce Ehcache\
    \ to Hibernate:\n\n```\n...\norg.hibernate.jpa.HibernatePersistenceProvider\n\
    ...\n...\n```\n\n(Be sure to remove the newlines and the spaces inside the `\"\
    ...\"`.) A few notes on the properties seem appropriate; for details, consult\
    \ the documentation at [`https://www.ehcache.org`](https://www.ehcache.org).\n\
    \n- `hibernate.cache.use_second_level_cache`  \n  Set this to `true` if you want\
    \ the second level cache to be enabled. The second level cache stores entities\
    \ by ID in a session agnostic way, which means it works across all sessions. The\
    \ default is `false`.\n\n- `hibernate.cache.use_query_cache`  \n  Set this to\
    \ `true` if you want the query cache to be enabled. The query cache is used to\
    \ store the results of explicit HQL queries in the code, but only if you add `.setCacheable(true)`\
    \ while building a `Criteria` object. The default is `false`.\n\n- `hibernate.cache.region.factory_class`\
    \  \n  Defines the region factory class used for caching. The other possible value\
    \ is `org.hibernate.cache.ehcache.EhCacheRegionFactory`.\n\n- `hibernate.cache.ehcache.missing_cache_strategy`\
    \  \n  If you don’t explicitly define regions in a class’ `Cache` annotation (the\
    \ `region` parameter), a `create` value for this property tells Hibernate to create\
    \ a region based on the class name. Otherwise, you’ll get a warning in the logs.\n\
    \n- `hibernate.generate_statistics`  \n  Set this to `true` if you want Hibernate\
    \ to generate statistics data, including caching usage. The default is `false`.\n\
    \n- `hibernate.jmx.enabled`  \n  Set this to `true` if you want Hibernate to announce\
    \ statistical figures via JMX. The default is `false`.\n\n- `hibernate.jmx.usePlatformServer`\
    \  \n  Set this to `true` if you want Hibernate to use the platform MBean server\
    \ for JMX. The default is `false`.\n\nFurthermore, you need a `META-INF/ehcache.xml`\
    \ file, which is where the caching parameters are defined. An example is as follows:\n\
    \nThe Ehcache documentation readily tells you all about the definitions and parameters\
    \ you can set in this file.\n\n## Defining Cached Objects in the Code\n\nHibernate\
    \ in the end sends SQL statements, but because it is an ORM (object relational\
    \ mapper), the code refers to cached Java objects. However, Hibernate does not\
    \ cache all objects by default. Instead, you have to add the `org.hibernate.annotations.Cache`\
    \ annotation to the JPA entity class:\n\n```\npackage ...;\nimport org.hibernate.annotations.Cache;\n\
    import org.hibernate.annotations.CacheConcurrencyStrategy;\nimport jakarta.persistence.Entity;\n\
    import jakarta.persistence.Table;\n@Entity\n@Table(name = \"person\")\n@Cache(usage=CacheConcurrencyStrategy.READ_ONLY,\n\
    \      region=\"Region1\")\npublic class Person {\n    .... some JPA class\n}\n\
    ```\n\nThe `region` parameter of the `@Cache` annotation corresponds to a region\
    \ defined in the `ehcache.xml` file. The `usage` parameter specifies the concurrency\
    \ strategy. You can use one of the following for its value:\n\n- `CacheConcurrencyStrategy.NONE`\
    \  \n  No concurrency strategy. Hibernate doesn’t care which application updates\
    \ or reads data. If there are cached objects, they are used irrespective of whether\
    \ there are other parties accessing the same table.\n\n- `CacheConcurrencyStrategy.READ_ONLY`\
    \  \n  Use this to indicate that your application only reads from and never writes\
    \ to this table.\n\n- `CacheConcurrencyStrategy.READ_WRITE`  \n  Use this to indicate\
    \ that your application reads from and writes to this table.\n\n- `CacheConcurrencyStrategy.NONSTRICT_READ_WRITE`\
    \  \n  Use this to indicate that your application reads from this table and only\
    \ once in a while writes to it as well.\n\n- `CacheConcurrencyStrategy.TRANSACTIONAL`\
    \  \n  Use this to indicate that the caching manager allows for transactions.\
    \ This book doesn’t explore transactional caching; for details, see the “Transactions\
    \ in Ehcache” section of the Ehcache documentation.\n\n## Monitoring Caching Activities\n\
    \nBecause you enabled statistical data gathering and JMX access in the former\
    \ sections, you can use a JMX browser to investigate the cache performance. You\
    \ can use the VisualVM program at [`https://visualvm.github.io/`](https://visualvm.github.io/)\
    \ for this purpose. After you install it and add the MBeans plugin, navigate to\
    \ Hibernate’s statistics page, as shown in Figure [29-1](#490565_1_En_29_Chapter.xhtml#Fig1).\n\
    \n![](images/490565_1_En_29_Chapter/490565_1_En_29_Fig1_HTML.jpg)\n\nA window\
    \ of VisualVM displays JMX access caching activities. It depicts the MBeans browser\
    \ and the MBeans plugin. It navigates to the Hibernate statistics page which includes\
    \ attribute values with the cache reports.\n\n**Figure 29-1** *VisualVM JMX access*\n\
    \n# 30. NoSQL\n\nSQL databases do a good job at mapping real-world relations to\
    \ data storages. However, developing a big relationship structure is not an easy\
    \ task, because later in a project or during the production stage, changing relations\
    \ and adding or moving table columns are time-consuming tasks. You have to check\
    \ whether database entry relations are still valid and correctly correlate to\
    \ database access code, and check whether all the clients can cope with an updated\
    \ database structure. For these reasons, a considerable amount of effort is spent\
    \ at the beginning of a project to create a bullet-proof database relation model.\
    \ In order to simplify structural data-model changes, you have to ease or even\
    \ abandon strict database table relations. Such database management systems have\
    \ recently gained a considerable amount of attention when used in modern usage\
    \ scenarios, where database structures change often. They provide a usable API\
    \ from Java clients. They are commonly referred to as “NoSQL” databases. This\
    \ is an abbreviation of “Not-Only-SQL,” because often the traditional way of accessing\
    \ data in a SQL-like manner still is possible, while schema-less access to database\
    \ entries is the preferred way of addressing table entries. There is no finalized\
    \ Jakarta EE 10 standard describing access to NoSQL databases (`see` [`https://jakarta.ee/specifications/nosql/`](https://jakarta.ee/specifications/nosql/)\
    \ for the ongoing work). Nevertheless, because of the importance that NoSQL databases\
    \ have today, this chapter briefly describes the two NoSQL DBMSs—CouchDB and MongoDB.\n\
    \n## Using CouchDB from Jakarta EE Applications\n\nCouchDB provides a REST API\
    \ that you can address from Java using a `HttpClient` from the `java.net.http`\
    \ package. Assuming you have a CouchDB running locally on port 5984 and an admin\
    \ user `admin` with password `PASSWD`, you first define a couple of helper functions:\n\
    \n```\nimport java.net.Authenticator;\nimport java.net.PasswordAuthentication;\n\
    import java.net.URI;\nimport java.net.http.HttpClient;\nimport java.net.http.HttpRequest;\n\
    import java.net.http.HttpResponse;\nimport java.net.http.HttpResponse.BodyHandlers;\n\
    import java.nio.charset.StandardCharsets;\nimport java.time.Duration;\nimport\
    \ java.util.Base64;\nimport java.util.function.BiFunction;\nimport java.util.function.Function;\n\
    ...\nfinal String SERVER = \"127.0.0.1:5984\";\nfinal String USER = \"admin\"\
    ;\nfinal String PASSWD = \"PASSWD\";\nvar auth = new Authenticator() {\n    protected\
    \ PasswordAuthentication getPasswordAuthentication() {\n        return new PasswordAuthentication(USER,\
    \ PASSWD.toCharArray());\n    }\n};\nvar encodedAuth = Base64.getEncoder()\n \
    \   .encodeToString((USER + \":\" + PASSWD)\n    .getBytes(StandardCharsets.UTF_8));\n\
    Function<String, HttpRequest> get = (url) -> {\n    return HttpRequest.newBuilder()\n\
    \        .uri(URI.create(\"http://\" + SERVER + \"/\" + url))\n        .timeout(Duration.ofSeconds(10))\n\
    \        .header(\"Authorization\", \"Basic \" + encodedAuth)\n        .GET().build();\n\
    };\nFunction<String, HttpRequest> delete = (url) -> {\n    return HttpRequest.newBuilder()\n\
    \        .uri(URI.create(\"http://\" + SERVER + \"/\" + url))\n        .timeout(Duration.ofSeconds(10))\n\
    \        .header(\"Authorization\", \"Basic \" + encodedAuth)\n        .DELETE().build();\n\
    };\nBiFunction<String, String, HttpRequest> post = (url, body) -> {\n    return\
    \ HttpRequest.newBuilder()\n        .uri(URI.create(\"http://\" + SERVER + \"\
    /\" + url))\n        .timeout(Duration.ofSeconds(10))\n        .header(\"Authorization\"\
    , \"Basic \" + encodedAuth)\n        .POST(HttpRequest.BodyPublishers.ofString(body))\n\
    \        .build();\n};\nBiFunction<String, String, HttpRequest> put = (url, body)\
    \ -> {\n    return HttpRequest.newBuilder()\n        .uri(URI.create(\"http://\"\
    \ + SERVER + \"/\" + url))\n        .timeout(Duration.ofSeconds(10))\n       \
    \ .header(\"Authorization\", \"Basic \" + encodedAuth)\n        .PUT(HttpRequest.BodyPublishers.ofString(body))\n\
    \        .build();\n};\nHttpClient client = HttpClient.newBuilder()\n    .version(HttpClient.Version.HTTP_1_1)\n\
    \    .followRedirects(HttpClient.Redirect.NORMAL)\n    .connectTimeout(Duration.ofSeconds(10))\n\
    \    .authenticator(auth)\n    .build();\nFunction<HttpRequest, HttpResponse<String>>\
    \ invoke = (req) -> {\n    try {\n        return client.send(req, BodyHandlers.ofString());\n\
    \    } catch (Exception e) {\n        e.printStackTrace(System.err);\n       \
    \ return null;\n    }\n};\n```\n\nFor simplicity, this example uses lambda expressions,\
    \ but the helper functions can readily be translated to class methods.\n\nIt is\
    \ now easy to send requests to the CouchDB instance. Search statements are deliberately\
    \ not used in the following code snippet, since for CouchDB, searchable indexes\
    \ need to be created and/or search plugins need to be installed, which is out\
    \ of scope of this brief example.\n\n```\n// ----- CouchDB info\nvar request1\
    \ = get.apply(\"\");\nvar response1 = invoke.apply(request1);\nSystem.out.println(response1.statusCode()\
    \ + \"\\n\" + response1.body());\n// ----- create database\nvar request2 = put.apply(\"\
    mydb\", \"\");\nvar response2 = invoke.apply(request2);\nSystem.out.println(response2.statusCode()\
    \ + \"\\n\" + response2.body());\n// ----- create entry\nvar request3 = put.apply(\"\
    mydb/001\", \"{ \\\"name\\\":\\\"John\\\", \\\"age\\\":42 }\");\nvar response3\
    \ = invoke.apply(request3);\nSystem.out.println(response3.statusCode() + \"\\\
    n\" + response3.body());\n// ----- delete database\nvar request99 = delete.apply(\"\
    mydb\");\nvar response99 = invoke.apply(request99);\nSystem.out.println(response99.statusCode()\
    \ + \"\\n\" + response99.body());\n```\n\n## Using MongoDB from Jakarta EE Applications\n\
    \nMongoDB has a dedicated Java driver. Add the following dependencies to your\
    \ project (this is for Gradle):\n\n```\n...\ndependencies {\n    ...\n    implementation\
    \ 'org.mongodb:' +\n        'mongodb-driver-sync:4.5.1'\n    implementation 'org.slf4j:'\
    \ +\n        'slf4j-simple:1.8.0-beta4'\n    implementation 'org.slf4j:' +\n \
    \       'slf4j-api:1.8.0-beta4'\n}\n```\n\nFor Maven dependencies, write this\
    \ inside the `pom.xml` file:\n\n```\n...\n<dependency>\n    <groupId>org.mongodb</groupId>\n\
    \    <artifactId>mongodb-driver-sync</artifactId>\n    <version>4.5.1</version>\n\
    </dependency>\n<dependency>\n    <groupId>org.slf4j</groupId>\n    <artifactId>slf4j-api</artifactId>\n\
    \    <version>1.8.0-beta4</version>\n</dependency>\n<dependency>\n    <groupId>org.slf4j</groupId>\n\
    \    <artifactId>slf4j-simple</artifactId>\n    <version>1.8.0-beta4</version>\n\
    </dependency>\n...\n```\n\nIn the code, you can then use the classes from the\
    \ driver API. Note that MongoDB automatically creates databases and collections\
    \ (tables in MongoDB are called “collections”) upon first usage if they don’t\
    \ exist. So you don’t have to explicitly create them.\n\n```\n...\nimport org.bson.Document;\n\
    import org.bson.types.ObjectId;\nimport com.mongodb.client.MongoClient;\nimport\
    \ com.mongodb.client.MongoClients;\nimport com.mongodb.client.MongoCollection;\n\
    import com.mongodb.client.MongoDatabase;\npublic class MongoMain {\n    public\
    \ static void main(String[] args) {\n        MongoClient client = MongoClients.create();\n\
    \        // Accessing a database:\n        MongoDatabase database = client.getDatabase(\"\
    my_database\");\n        // Accessing a collection (table):\n        MongoCollection<Document>\
    \ persons = database.getCollection(\"persons\");\n        // Create a document\
    \ (an entry):\n        Document p = new Document(\"name\", \"John\")\n       \
    \     .append(\"cars\", new Document(\"Tesla\", 2019));\n        // Save it:\n\
    \        ObjectId id = persons.insertOne(p)\n            .getInsertedId().asObjectId().getValue();\n\
    \        // Search for a document (an entry):\n        Document john = persons.find(\n\
    \            new Document(\"name\", \"John\")).first();\n        System.out.println(john.toJson());\n\
    \    }\n}\n```\n\nThis is for a MongoDB instance running on the localhost and\
    \ using the standard port 27017. For different addresses or ports, look at `MongoClients`’\
    \ other `create(...)` methods. For more details, see [`https://docs.mongodb.com/drivers/java/sync/current/`](https://docs.mongodb.com/drivers/java/sync/current/)\
    \ and [`https://mongodb.github.io/mongo-java-driver/`](https://mongodb.github.io/mongo-java-driver/).\n\
    \n# Part VI: Security Enhancements\n\n# 31. Secured JMX\n\nJMX (Java Management\
    \ Extensions) is a very powerful and largely underestimated way to monitor and\
    \ control a Jakarta EE application server or the applications running inside it.\
    \ I do not provide an introduction to JMX here, because you can find lots of stuff\
    \ about it on the Internet, including Oracle’s documentation at [`https://docs.oracle.com/javase/tutorial/jmx/overview/index.html`](https://docs.oracle.com/javase/tutorial/jmx/overview/index.html).\
    \ What I do instead in this chapter is explain how to secure remote JMX connections\
    \ using SSL, because this might come up in a corporate environment.\n\n## Using\
    \ SSL for Remote JMX Connections\n\nIn order to use SSL for JMX connections, you\
    \ need a key and a trust store on both sides of the server (Jakarta EE server)\
    \ and the client (a remote tool for investigating or monitoring JMX). The client\
    \ key’s public part is entered into the server’s trust store and vice versa, so\
    \ the client and server authenticate themselves at the communication partner.\
    \ The following sections describe how to generate the keys and trust stores, and\
    \ how to configure client and server accordingly.\n\n### Generating the SSL Keys\n\
    \nFor key and certificate store management, you must use the `keytool` CLI utility,\
    \ which is part of every JDK installation. The following bash script does all\
    \ the work:\n\n```\n#!/bin/bash\nPASSWORD=dhdgdfd534\nDNAME=\"cn=JMX, ou=Java,\
    \ o=Glassfish\"\n```"
  raw: "# a different connection factory class.\nbin/asadmin create-connector-resource\
    \ \\\n--poolname eis/HelloJcaConnectionPool \\\neis/HelloWorld\n```\n\n(There\
    \ should be no line break and no spaces after `interfaces`.) For\ndetails and\
    \ more options, see the GlassFish server documentation.\n\nResource Adapter Clients\n\
    \nOnce the resource\nadapter is deployed and correctly configured, you then have\
    \ to\ninject the Connection Factory via a `@Resource` annotation\n(the `jakarta.annotation`\n\
    package) so the client can access the resource adapter’s\nfunctionalities. For\
    \ a REST controller, for example, the code would read\nas follows:\n\n```\n@Path(\"\
    /\")\npublic class HelloJca {\n@Resource(name = \"eis/HelloWorld\")\nprivate HelloWorldConnectionFactory\
    \ connectionFactory;\n// more fields...\n@GET\npublic Response fetch() {\ntry\
    \ {\nHelloWorldConnection conn = connectionFactory.\ngetConnection();\nString\
    \ s = conn.helloWorld();\nconn.close();\nreturn Response.status(200).\nentity(\"\
    done: \" + s).build();\n} catch (ResourceException e) {\nreturn Response.status(500).entity(\"\
    error\").\nbuild();\n}\n}\n...\n}\n```\n\nThe `name`\nparameter of the annotation\
    \ must match the JNDI name of the resource adapter.\n\n29. Caching\n\nAccessing\
    \ data from a large database or using complex `select` clauses can be\ntime consuming\
    \ tasks. In addition, it quite often happens that your\napplication uses the same\
    \ database access statement several times, which\nmight make you wonder if there\
    \ is a way to shortcut such database\nqueries. Might that shortcut help the application\
    \ react faster to user\nqueries and avoid too much load on the database server?\
    \ This is exactly\nwhat *caching* is for.\nIt sits between the client code that\
    \ runs database queries and the\ndatabase access itself, and it answers database\
    \ queries on behalf of the\ndatabase when the same query has been run before.\n\
    This chapter covers using Ehcache for the Hibernate persistence\nprovider.\n\n\
    Installing Ehcache\n\nIn order to install Ehcache, add the\nfollowing dependency\
    \ to your build file:\n\n```\n// For Gradle:\n...\ndependencies {\n...\n// Assuming\
    \ you use the following Hibernate version\nimplementation 'org.hibernate:' +\n\
    'hibernate-core-jakarta:5.6.15.Final'\n// ... you must add:\nimplementation 'org.hibernate:'\
    \ +\n'hibernate-ehcache:5.6.15.Final'\n}\n\n...\n\n...\n\norg.hibernate\nhibernate-ehcache\n\
    5.6.15.Final\n\n```\n\nConfiguring Hibernate for Ehcache\n\nBefore caching is\
    \ actually enabled, you need to tell Hibernate that you\nwant to use Ehcache.\
    \ The Hibernate configuration for Jakarta EE happens\ninside the `persistence.xml`\n\
    file, and this is also where you announce Ehcache to Hibernate:\n\n```\n\norg.hibernate.jpa.HibernatePersistenceProvider\n\
    \n...\n\n...\n\n```\n\n(Be sure to remove the newlines and the spaces inside the\
    \ `\"...\".`) A few notes\non the properties\nseem appropriate; for details, consult\
    \ the documentation at [`https://www.ehcache.org`](https://www.ehcache.org).\n\
    \n*   `hibernate.cache.use_second_level_cache`\n\n    Set this to `true` if you\
    \ want the\n    second level cache to be enabled. The second level cache stores\
    \ entities\n    by ID in a session agnostic way, which means it works across all\n\
    \    sessions. The default is `false`.\n\n*   `hibernate.cache.use_query_cache`\n\
    \n    Set this to `true` if you want the\n    query cache to be enabled. The query\
    \ cache is used to store the results\n    of explicit HQL queries in the code,\
    \ but only if you add `.setCacheable(true)`\n    while building a `Criteria` object.\
    \ The\n    default is `false`.\n\n*   `hibernate.cache.region.factory_class`\n\
    \n    Defines the region factory class used for caching. The other possible\n\
    \    value is `org.hibernate.cache.ehcache.EhCacheRegionFactory`.\n\n*   `hibernate.cache.ehcache.missing_cache_strategy`\n\
    \n    If you don’t explicitly define regions in a class’ `Cache` annotation (the\n\
    \    `region`\n    parameter), a `create` value for this\n    property tells Hibernate\
    \ to create a region based on the class name.\n    Otherwise, you’ll get a warning\
    \ in the logs.\n\n*   `hibernate.generate_statistics`\n\n    Set this to `true`\
    \ if you want\n    Hibernate to generate statistics data, including caching usage.\
    \ The\n    default is `false`.\n\n*   `hibernate.jmx.enabled`\n\n    Set this\
    \ to `true` if you want\n    Hibernate to announce statistical figures via JMX.\
    \ The default is `false`.\n\n*   `hibernate.jmx.usePlatformServer`\n\n    Set\
    \ this to `true` if you want\n    Hibernate to use the platform MBean server for\
    \ JMX. The default is `false`.\n\nFurthermore, you need a `META-INF/ehcache.xml`\n\
    file, which is where the caching parameters are defined. An example is\nas follows:\n\
    \nThe Ehcache documentation readily\ntells you all about the definitions and parameters\
    \ you can set in this\nfile.\n\nDefining Cached Objects in the Code\n\nHibernate\
    \ in the end sends SQL statements, but because it is an ORM\n(object relational\
    \ mapper), the code\nrefers to cached Java objects. However,\nHibernate does not\
    \ cache all objects by default. Instead, you have to\nadd the `org.hibernate.annotations.Cache`\n\
    annotation to the JPA entity class:\n\n```\npackage ...;\nimport org.hibernate.annotations.Cache;\n\
    import org.hibernate.annotations.CacheConcurrencyStrategy;\nimport jakarta.persistence.Entity;\n\
    import jakarta.persistence.Table;\n@Entity\n@Table(name = \"person\")\n@Cache(usage=CacheConcurrencyStrategy.READ_ONLY,\n\
    region=\"Region1\")\npublic class Person {\n.... some JPA class\n}\n```\n\nThe\
    \ `region`\nparameter of the `@Cache` annotation\ncorresponds to a region defined\
    \ in the `ehcache.xml` file. The\n`usage` parameter\nspecifies the concurrency\
    \ strategy. You can use one of the following for\nits value:\n\n*   `CacheConcurrencyStrategy.NONE`\n\
    \n    No concurrency strategy. Hibernate doesn’t care which application\n    updates\
    \ or reads data. If there are cached objects, they are used\n    irrespective\
    \ of whether there are other parties accessing the same\n    table.\n\n*   `CacheConcurrencyStrategy.READ_ONLY`\n\
    \n    Use this to indicate that your application only reads from and never\n \
    \   writes to this table.\n\n*   `CacheConcurrencyStrategy.READ_WRITE`\n\n   \
    \ Use this to indicate that your application reads from and writes to\n    this\
    \ table.\n\n*   `CacheConcurrencyStrategy.NONSTRICT_READ_WRITE`\n\n    Use this\
    \ to indicate that your\n    application reads from this table and only once in\
    \ a while writes to it\n    as well.\n\n*   `CacheConcurrencyStrategy.TRANSACTIONAL`\n\
    \n    Use this to indicate that the caching manager allows for\n    transactions.\
    \ This book doesn’t explore transactional caching; for\n    details, see the “Transactions\
    \ in Ehcache” section of the Ehcache\n    documentation.\n\nMonitoring Caching\
    \ Activities\n\nBecause you enabled statistical data gathering and JMX\naccess\
    \ in the former sections, you can use a JMX browser to investigate\nthe cache\
    \ performance. You can use the VisualVM program at [`https://visualvm.github.io/`](https://visualvm.github.io/)\n\
    for this purpose. After you install it and add the MBeans plugin,\nnavigate to\
    \ Hibernate’s statistics page, as shown in Figure [29-1](#490565_1_En_29_Chapter.xhtml#Fig1).\n\
    \n![](images/490565_1_En_29_Chapter/490565_1_En_29_Fig1_HTML.jpg)\n\nA window\
    \ of visual V M displays J M X access caching activities. It\ndepicts the M Beans\
    \ browser and the M Beans plugin. It navigates to the\nHibernate statistics page\
    \ which includes attribute values with the cache\nreports.\n\nFigure 29-1\n*VisualVM\
    \ JMX access*\n\n30. NoSQL\n\nSQL databases\ndo a good job at mapping real-world\
