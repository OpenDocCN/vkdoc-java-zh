    \n# 14. REST 安全\n\n对于 SPA（单页 Web 应用程序），使用`WEB-INF/web.xml`中定义的安全约束无法可靠地强制执行安全性。原因是这些安全约束专门针对\
    \ Web 页面的 HTTP 请求和响应而定制，而非 JSON 片段。此外，尽管存在用于将 REST 类和方法标记为需要安全检查的注解，但 REST 实现并不要求实际执行这些检查。用于\
