- fmt: "### The Marvin Web Project\n\nFor the WAR subproject, create a new top-level\
    \ folder named `MarvinWeb` inside the EAR project and copy the `gradlew`, `gradlew.bat`,\
    \ and `gradle` files and folders from the root project into it. This way Gradle\
    \ can be executed from inside the web-subproject using a terminal as well. I won’t\
    \ show that here, but you might want to use it, so it does not hurt having it\
    \ here.\n\nInside the `MarvinWeb` folder, create a `build.gradle` file and add\
    \ these contents:\n\n```\n/*\n* GRADLE project build file\n*/\nplugins {\n   \
    \ id 'war'\n}\nsourceCompatibility = 1.17\ntargetCompatibility = 1.17\next {\n\
    \    referencedEjbProjects = ['MarvinEjb']\n}\nrepositories {\n    jcenter()\n\
    }\ndependencies {\n    testImplementation 'junit:junit:4.13.2'\n    implementation\
    \ 'jakarta.platform:' +\n            'jakarta.jakartaee-api:10.0.0'\n    implementation\
    \ 'org.apache.commons:' +\n            'commons-configuration2:2.6'\n    // No\
    \ EJB project dependency here, because then we would\n    // get the EJB implementations.\
    \ Instead we only need the\n    // interfaces\n    referencedEjbProjects.each\
    \ { ejb ->\n        implementation files(\"${rootDir}/${ejb}/build/libs/\" +\n\
    \                \"ejb-interfaces.jar\")\n    }\n}\n```\n\nThis build file makes\
    \ sure you use the WAR plugin, and it says to compile using Java 17. The `referencedEjbProjects`\
    \ lists the EJB projects you depend on, which in this case is a single one named\
    \ `MarvinEjb`. If you have more, you write `['MarvinEjb', 'OtherEjb', ...]`. For\
    \ the dependencies, add the Jakarta EE API as a `compileOnly` dependency, meaning\
    \ it won’t be added to the WAR file. You also add the EJB interfaces, which the\
    \ EJB projects create. I talk about that later.\n\nBefore you add the code for\
    \ the web application, first declare the EJB project. This way, you can let Eclipse\
    \ re-layout its project structure first, before you write the code for each subproject.\n\
    \n### The Marvin EJB Project\n\nFor the EJB subproject, create a new top-level\
    \ folder named `MarvinEjb` and copy the `gradlew`, `gradlew.bat`, and `gradle`\
    \ files and folders from the root project into it. This again allows Gradle for\
    \ the EJB project to be run in a terminal.\n\nInside `MarvinEjb`, create a new\
    \ build file called `build.gradle` and insert the following text:\n\n```\n/*\n\
    * GRADLE project build file\n*/\nplugins {\n    id 'java'\n}\nsourceCompatibility\
    \ = 1.17\ntargetCompatibility = 1.17\nrepositories {\n    jcenter()\n}\ndependencies\
    \ {\n    testImplementation 'junit:junit:4.13.2'\n    implementation 'jakarta.platform:'\
    \ +\n            'jakarta.jakartaee-api:10.0.0'\n    // Those need to be added\
    \ in the root projects 'earlib'\n    // dependencies:\n    compileOnly 'org.apache.commons:commons-'\
    \ +\n            'configuration2:2.6'\n    compileOnly 'commons-io:commons-io:2.6'\n\
    \    compileOnly 'commons-beanutils:commons-' +\n            'beanutils:1.9.4'\n\
    }\n// Build a JAR with just the EJB interfaces,\n// for clients\ntask('EjbInterfaces',\
    \ type: Jar, dependsOn: 'classes') {\n    //describe jar contents here as a CopySpec\n\
    \    archiveFileName = \"ejb-interfaces.jar\"\n    destinationDirectory = file(\"\
    $buildDir/libs\")\n    from(\"$buildDir/classes/java/main\") {\n        include\
    \ \"**/ejb/interfaces/**/*.*\"\n    }\n}\n// make sure it is part of the assembly\
    \ path\njar.dependsOn EjbInterfaces\n```\n\nThe crucial part of this build script\
    \ is that you added a custom task that builds an additional JAR containing the\
    \ EJB interfaces. This is important, because clients, for example the web application,\
    \ are supposed to use and bundle the EJB interface, *not* the implementations.\
    \ This additional JAR is referred to in this special `dependencies { }` construct\
    \ of the web application’s `build.gradle` file.\n\n### Laying Out the Projects\
    \ Again\n\nChoose **Gradle ➤ Refresh Gradle Project** in the context menu of the\
    \ root (EAR) project. Eclipse will show an extracted view with the two subprojects\
    \ shown in the top-level hierarchy, as shown in Figure [6-1](#490565_1_En_6_Chapter.xhtml#Fig1).\n\
    \n![](images/490565_1_En_6_Chapter/490565_1_En_6_Fig1_HTML.jpg)\n\nA screenshot\
    \ of the package explore window. The left panel comprises 3 main menus with sub-menus.\
