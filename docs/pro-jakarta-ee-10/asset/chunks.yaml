- fmt: '# Code-Level Monitoring with VisualVM


    `VisualVM` is a monitoring and management tool that addresses various aspects
    of a running JVM. It has a built-in plugin called `Sampler`, which queries the
    JVM state on a regular basis, including elapsed times of method calls. This way,
    it is possible to find performance bottlenecks without writing a single line of
    code or changing the server configuration.


    **Note:** You can download `VisualVM` at [`https://visualvm.github.io/index.html`](https://visualvm.github.io/index.html).


    `VisualVM` can be run with a Java version different from the application server.
    There is a minor issue with `VisualVM` and OpenJDK 16 or 1—the tooltip texts do
    not reliably show up, which makes it a little bit hard to handle. With OpenJDK
    15, there is no problem.


    As an example, you could add a time-consuming operation to a REST controller.
    The following method shows a somewhat unclever way of calculating the `pi` constant:


    ```

    @Path("/pi")

    @GET

    @Produces("application/json")

    public String pi() {

    return "{\"pi\":" + calcPi() + "}";

    }

    private double calcPi() {

    int d = 1;

    double sum = 0;

    for(int i=0;i<100_000_000;i++) {

    if(i % 2 == 0) sum += 4.0/d; else sum -= 4.0/d;

    d += 2;

    }

    return sum;

    }

    ```


    You can write a new web application containing the `pi()` method, or you can temporarily
    add it to an existing controller—it is up to you. In a JMeter test plan, you simulate
    many concurrently acting users calling the `pi()` method. For simplicity, you
    can use an infinite loop for this purpose.


    If you start `VisualVM`, connect it to the GlassFish application, and open the
    `Sampler` plugin, you can click the CPU button to start fetching performance data.
    Click the Hot Spots view button. After a few seconds, you will be presented with
    a table showing the most time-consuming methods. See Figure [36-7](#490565_1_En_36_Chapter.xhtml#Fig7).


    ![](images/490565_1_En_36_Chapter/490565_1_En_36_Fig7_HTML.jpg)


    A window of `VisualVM` selects the GlassFish option under local, opens the `Sampler`
    plugin, and clicks on the CPU button to start fetching performance data. It presents
    a table that includes name, self-time, and total time.


    **Figure 36-7** VisualVM at work


    As expected, the `calcPi()` shows up on top of this list.


    # Code Optimization


    There is a plethora of possible reasons for performance bottlenecks. It is not
    possible to construct something like a checklist in order to avoid all of them.
    Nevertheless, the following list gives you a couple of hints to avoid such shortcomings:


    * Depending on the circumstances, functional constructs may be superior compared
    to procedural setups. However, you must watch out for intermediate terminal operations.
    Building large collections—like lists, sets, or maps—in a functional expression
    is a time-consuming operation.

    * Avoid the construction of too many objects in large loops.

    * Although often considered old fashioned, using arrays instead of collections
    can speed up an application significantly.

    * For database operations, consider using a cache.

    * Unless absolutely necessary, avoid using reflection. Reflective access to Java
    objects is much more time consuming compared to direct, language-level access.

    * Using JMS to transmit data often leads to a clean and stable architecture. However,
    watch out for pitfalls—messaging is more time consuming compared to more directly
    addressing remote objects, for example via REST interfaces or via RMI. On the
    other hand, due to its asynchronicity, JMS messaging might improve performance.
    A detailed analysis can help avoid deficiencies.

    * Avoid using JMS for concurrent constructs. The current versions of Jakarta EE
    handle concurrency much more efficiently than older versions, where JMS was abused
    for the same purpose.

    * When possible, use JSON over XML. JSON is leaner than XML and processing large
    JSON structures is less time consuming than for equivalent XML data.

    * Avoid file operations, when possible. Writing data into memory instead of into
    files is much faster.

    * Avoid overly extensive logging.

    * An ill-configured garbage collection program might lead to performance problems.
    Chapter [37](#490565_1_En_37_Chapter.xhtml) talks about garbage collection.


    # 37. Garbage Collection


    Garbage collection is the cleanup process that Java uses to get rid of unused
    objects, freeing associated heap memory. Over time, Java garbage collectors went
    through many changes, and the historical development of garbage collectors is
    actually quite interesting. However, a detailed description of ancient garbage
    collectors is beyond the scope of this book, so this chapter limits its description
    to the three garbage collectors most often in use—The G1 Garbage Collector, the
    Shenandoah GC, and the Zero Garbage Collector. The inclined reader can find information
    about the other garbage collectors on the web.


    ## The Importance of Garbage Collectors


    Garbage collection happens in the background, while the application server is
    running. From an application developer’s point of view, garbage collectors do
    their work without interfering with the application—it is not possible for garbage
    collectors to do something functionally interesting. Nevertheless, garbage collectors
    (GCs) can influence the application’s operation in one or a combination of ways:


    * If the GC is wrongly configured, it might fail to properly do its work. Unfreed
    memory might pile up, eventually leading to an out-of-memory error and an application
    breakdown.

    * GCs need one or more threads to do their work. This requires computation power
    that the application cannot use.

    * Due to the way GCs function, GCs have to stop the application threads once in
    a while. Obviously, such STW (stop the world) periods should be reduced to a minimum.
    The STW period length is often referred to as *latency*.

    * A bug in the application might prevent the GC from freeing up unused objects.
    This can cause an application to break down. Such bugs are called *memory leaks*.


    For these reasons, GC figures should be included in performance/stability tests.
    Fortunately, this is not very complicated. All GCs publish their own performance
    figures via JMX. In JMeter, for example, you can add Groovy scripts that write
    numbers queried via JMX into other test outcome files. There are no rules for
    determining which GC best suits your application, and which configuration options
    to choose for maximum GC performance and stability. For this reason, you must
    follow a heuristic approach and run performance and load tests with various GC
    options in order to see which GC setup is the best for you.


    ## G1 Garbage Collector


    The G1 garbage collector, also called *garbage first*, was designed with large
    heap sizes and multi-processor machines in mind. It is the default GC since JDK
    version 9. Enter `java g1 options` in your favorite search engine to find out
    more about G1 options.


    ## Shenandoah GC


    The Shenandoah GC is designed for lower latencies compared to G1, especially for
    larger heaps. It was optionally included in JDK 11, but needed an opt-in during
    build time. It was discontinued for JDK versions 12 through 16, but came back
    fully included within JDK 17. You can switch on this garbage collector via this
    flag:


    ```

    -XX:+UseShenandoahGC

    ```


    Enter `java shenandoah options` in your favorite search engine to find out more
    about Shenandoah GC options.


    ## Zero Garbage Collector


    The Z Garbage Collector is a low-latency garbage collector with STW (stop the
    world, i.e. pausing the application) periods guaranteed to be less than ten milliseconds.
    It also claims to handle terabyte heaps without significant degradation. For heavy-traffic
    applications with maybe 1,000 or more users, the Zero Garbage Collector might
    be your best choice.


    To enable the Zero Garbage Collector, add the following to the `java` command:


    ```

    -XX:+UseZGC

    ```'
