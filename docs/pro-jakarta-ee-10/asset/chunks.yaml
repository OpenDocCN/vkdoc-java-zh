    8.  Faces 自定义组件


    自定义组件允许开发者设计自己的 Faces 组件。关键在于可用性——自定义组件可以轻松移植到其他项目，甚至可以考虑构建一个公司级的自定义组件库。


    定义自定义组件主要有三种方式。首先，你可以定义标签文件，然后在 `web.xml` 中将其注册为你自己的自定义命名空间。其次，你可以使用 Faces 的*复合组件*功能。在这里，你只需使用
    XHTML 文件来定义组件的接口和实现。第三，你可以使用自定义 Java 类来定义组件。以下各节将分别介绍这三种方法。


    自定义标签库


