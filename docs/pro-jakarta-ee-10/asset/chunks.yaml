    \ Collector\nThe Z Garbage Collector is a\nlow-latency garbage collector with\
    \ STW (stop the world, i.e. pausing the\napplication) periods guaranteed to be\
    \ less than ten milliseconds. It\nalso claims to handle terabyte heaps without\
    \ significant degradation.\nFor heavy-traffic applications with maybe 1,000 or\
    \ more users, the Zero\nGarbage Collector might be your best choice.\n\nTo enable\
    \ the Zero\nGarbage Collector, add the following to the `java` command:\n\n```\n\
    -XX:+UseZGC\n```"
