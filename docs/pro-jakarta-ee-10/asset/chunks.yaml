- fmt: 'The interesting part of the story begins now. You need to tell Gradle how
    to build a WAR from that and how to deploy it on a server. You first need to add
    a WAR plugin. Open the `build.gradle` file and enter `id ''war''` inside the `plugins
    { }` section:


    ```

    plugins {

    id ''war''

    }

    ```


    Choose `Gradle ➤ Refresh Gradle Project` from the project’s context menu.


    To build the WAR, open the Gradle Tasks view (choose `Window ➤ Show View ➤ Other...`
    to open it if you can’t find it). Then right-mouse-click `Build ➤ Build` and select
    `Run Gradle Tasks`. The build task performs the unit tests and creates the WAR
    file. You can find the result in the `build/libs` folder.


    **Caution**


    Eclipse by default installs a filter to hide the Gradle build folder in the Project
    Explorer. To remove that filter, click the gray triangle tool in the header area
    of the Project Explorer, select `Filters and Customization...` and uncheck the
    `Gradle Build Folder` entry.


    To deploy the WAR file on the server, you must first define some properties. Create
    the `gradle.properties` file in the project root and add the following, substituting
    your server’s path:


    ```

    glassfish.inst.dir = /PATH/TO/YOUR/GLASSFISH/SERVER

    glassfish.user = admin

    glassfish.passwd =

    ```


    Also replace `user` and `passwd` according to your needs—change `user` to `admin`
    and use an empty password belong to a vanilla installation. If you use Windows,
    make sure you use double backslashes `\\` instead of single ones for the path
    (since this is a Java properties file).


    Next, add custom `deploy` and `undeploy` tasks to the `build.gradle` file. Open
    it and add the following:


    ```

    task deployWar(dependsOn: war,

    description:">>> RESTDATE deploy task") {

    doLast {

    def FS = File.separator

    def glassfish =

    project.properties[''glassfish.inst.dir'']

    def user = project.properties[''glassfish.user'']

    def passwd = project.properties[''glassfish.passwd'']

    File temp = File.createTempFile("asadmin-passwd",

    ".tmp")

    temp  ${sout}"

    if(serr.toString()) System.err.println(serr)

    temp.delete()

    }

    }

    task undeployWar(

    description:">>> RESTDATE undeploy task") {

    doLast {

    def FS = File.separator

    def glassfish =

    project.properties[''glassfish.inst.dir'']

    def user = project.properties[''glassfish.user'']

    def passwd = project.properties[''glassfish.passwd'']

    File temp = File.createTempFile("asadmin-passwd",

    ".tmp")

    temp  ${sout}"

    if(serr.toString()) System.err.println(serr)

    temp.delete()

    }

    }

    ```


    Both tasks specify a `doLast { }` block, which is a requirement for the tasks
    actually being executed in the task execution phase. If you didn’t use such blocks,
    the corresponding code would be executed inside a configuration phase, regardless
    of whether the task is actually being executed or not. As you might guess, there
    is also a `doFirst { }` block possible. For the purposes here, you can use either
    of them.


    The coding is for Linux as a development box. The change needed to run these same
    tasks under Windows is actually quite small. You only need to add a `cmd /c` to
    the beginning of the `def proc = """...` string:


    ```

    // This is Windows!

    def proc = """cmd /c ${glassfish}${FS} ...

    ```


    If you want to use Windows, make the same change to both new tasks!


    The code itself uses the Groovy language as an idiom. The `project.properties`
    addresses the properties defined in the `gradle.properties` file. The rest is
    Groovy code, with the `.execute` running a system shell command. The temporary
    file is needed, because for the `asadmin` command, it is only possible to hand
    over the password by specifying a specially tailored password file. The `<<` writes
    into that file, yielding the necessary syntax as given by the `asadmin` specification.


    In the Gradle Tasks view, go to the menu (inside the toolbar of the view) and
    check `Show All Tasks`. You can now run the deploy and undeploy tasks from that
    view. Navigate to `Other` and double-click either of the new custom tasks. The
    standard and error output is printed to the console view. Make sure the server
    is running before you deploy or undeploy the application.


    **Note**


    For any other Jakarta EE server, the deployment procedure will be very similar
    as seen from the build scripts. Because Groovy runs on top of Java, you can do
    a lot of other fancy things during deployment and undeployment. Besides, a task
    may easily call any other task and, by virtue of Gradle plugins, a lot of additional
    functionality is possible here.


    To see this little application running, point your browser to `http://localhost:8080/RestDate/webapi/d`.
    The output will look like Figure [2-3](#490565_1_En_2_Chapter.xhtml#Fig3).


    ![](images/490565_1_En_2_Chapter/490565_1_En_2_Fig3_HTML.jpg)


    A window of restful date application where J S O N is selected which gives an
    output of date. There are options to save, copy, collapse all, and expand all.


    **Figure 2-3** RESTful date application


    **Note**


    To streamline development and save time deploying applications, you can also use
    the Gradle wrapper from a shell terminal. Go to the project’s directory and then
    invoke `./gradlew deployWar` to perform a build and then a deploy.


    ## Eclipse Everyday Usage


    Eclipse provides a lot of functions and you can learn about them by opening the
    built-in help. Following is a list of tips that will help you to get most out
    of Eclipse:


    *   You can get to an identifier’s definition by placing the cursor over it and
    pressing `F3`. This works for variables (navigate to its declaration) and classes/interfaces
    (navigate to its definition). You can even inspect referenced and Java standard
    library classes that way. Eclipse will possibly download sources and show the
    code. This is a great way to learn about libraries by looking at the code in-depth.


    *   To rapidly find a resource, such as a file, class, or interface, press `CTRL+SHIFT+R`.


    *   Start typing the code and then press `CTRL+SPACE`. Eclipse will show you suggestions
    for finishing your typing. For example, type `new SimpleDa` and then press `CTRL+SPACE`.
    The list provided will contain all the constructors for the `SimpleDateFormat`
    class. Even better, you can shortcut that by typing `new SiDF` and pressing `CTRL+SPACE`,
    because Eclipse will guess the missing lowercase letters. An additional goody
    is that you don’t have to write the `import` statements for classes and interfaces
    you introduce that way—Eclipse will do the `import`s for you.


    *   Let Eclipse do the `import`s for all classes not yet resolved by pressing
    `SHIFT+CTRL+O` (think of O as “organize imports”).


    *   Format your code by pressing `CTRL+ALT+F`. This also works for XML and other
    file types.


    *   Let Eclipse show you super- and subtypes by pressing `F4` over a type designator.


    *   Use `F5` to update the Project Explorer view, if files were added or removed
    from outside of Eclipse.


    *   With a new Eclipse installation, open the Problems view from `Window ➤ Show
    View ➤ Other... ➤ General ➤ Problems`. It will readily point you to any problems
    that Eclipse detects (compiler problems, configuration problems, and others).


    *   Open the Tasks view from `Window ➤ Show View ➤ Other... ➤ General ➤ Tasks`
    to get a list of all occurrences of `TODO` that you entered in code comments.


    *   If `TODO` is not enough fine-grained for you, you can add bookmarks by right-mouse-clicking
    anywhere on the vertical bar on the left side of the code editor. Bookmarks are
    listed in the Bookmarks view.'
