- fmt: "# Analyzing Jenkins Builds via REST\n\nYou don’t have to use the web administrator\
    \ to monitor Jenkins builds. Instead you can use a REST API provided by Jenkins.\
    \ This is extremely powerful for enterprise applications where you need scripted\
    \ access to Jenkins.\n\nTo try that, create a Groovy project inside Eclipse, add\
    \ a folder called `scripts` to the project, and announce that `scripts` folder\
    \ to Eclipse by right-mouse-clicking the project and choosing Groovy Compiler.\
    \ Check the Enable Project Specific Settings. Then click Add, enter `scripts/**`,\
    \ and click Apply.\n\nCreate a `scripts/builds.groovy` file and enter the following\
    \ script:\n\n```\n@Grapes(\n@Grab(group='org.codehaus.groovy',\nmodule='groovy-all',\
    \ version='2.5.8', type='pom')\n)\nimport groovy.json.*\nSERVER=\"localhost\"\n\
    PORT=8080\nUSER=\"TheUser\"\nPASSWD=\"ThePassword\"\nPROJECT=\"My%20Project\"\n\
    /**\n* Performs a GET given some URL. If the parameter does\n* not start with\
    \ \"http://\", a \"http://server:port/\" gets\n* prepended. The requested content\
    \ type is\n* 'application/json'\n*/\ndef fetch(def url) {\ndef enc64 = { s ->\n\
    new String(Base64.encoder.encode(s.bytes)) }\ndef c = ( !url.startsWith(\"http://\"\
    )?\nnew URL(\"http://${SERVER}:${PORT}/${url}\"):\nnew URL(url) ).openConnection()\n\
    c.with {\nsetRequestProperty('User-Agent','groovy')\nsetRequestProperty('Accept','application/json')\n\
    setRequestProperty('Authorization',\n\"Basic \" + enc64(\"${USER}:${PASSWD}\"\
    ))\n}\n[output:c.inputStream.text, respCode:c.responseCode]\n}\ndef d = fetch\
    \ \"job/${PROJECT}/api/json\"\ndef json = new JsonSlurper().parseText(d.output)\n\
    // 'json' is the REST call result parsed into a\n// Groovy object. See the JsonParser\
    \ documentation in the\n// Groovy docs\ndef lastTen = json.builds.sort{-it.number}.take(10)\n\
    //println lastTen\nlastTen.each { b ->\ndef url = b.url\ndef build = new JsonSlurper().parseText(\n\
    fetch(url + \"api/json\").output)\n//println build\ndef author = build.changeSets\
    \ ?\nbuild.changeSets[0]?.items[0]?.author?.fullName :\n\"\"\nprintln(\"\" + build.number\
    \ +\n\" - \" + new Date(build.timestamp) +\n\" - \" + build.result +\n\" - \"\
    \ + author)\n}\n```\n\nReplace the connection information at top of the file.\
    \ This script fetches the last ten builds using the `job/${PROJECT}/api/json`\
    \ API call, and then for each build, it issues another API call (the URLs are\
    \ derived from the first call’s results). It takes the build number, the build\
    \ date, the outcome, and if the build comes from changed sources, the (first)\
    \ author of the changes.\n\n**Note:** The `GRAPE` library fetch on top of the\
    \ script is necessary, because the Groovy plugin in Eclipse corresponds to the\
    \ “Indy” variant of Groovy, missing some APIs. Make sure the version specified\
    \ here matches the plugin’s Groovy version (look in the preferences).\n\nThe REST\
    \ API of Jenkins is much bigger compared to what you used in this section. You\
    \ can get more information if you click the REST API link found at the bottom\
    \ of most pages of the web administrator. The output of your script might look\
    \ like this:\n\n```\n90 - Wed Oct 09 13:38:12 CEST 2019 - SUCCESS - Mark\n89 -\
    \ Wed Oct 09 13:09:02 CEST 2019 - SUCCESS - \n88 - Wed Oct 09 13:06:52 CEST 2019\
    \ - FAILURE - \n87 - Wed Oct 09 13:05:17 CEST 2019 - FAILURE - \n86 - Wed Oct\
    \ 09 10:06:12 CEST 2019 - SUCCESS - \n85 - Wed Oct 09 09:52:02 CEST 2019 - SUCCESS\
    \ - Pete\n84 - Wed Oct 09 09:49:42 CEST 2019 - SUCCESS - Mark\n83 - Tue Oct 08\
    \ 17:05:04 CEST 2019 - SUCCESS - \n82 - Tue Oct 08 17:01:58 CEST 2019 - FAILURE\
    \ - Mark\n81 - Tue Oct 08 16:02:42 CEST 2019 - SUCCESS - Mark\n```\n\nYou don’t\
    \ have to use a fully-fledged scripting engine like Groovy to access the REST\
    \ API, though. To access the API, you can also use `cURL` from a bash shell. You\
    \ could start with the following sample request:\n\n```\ncurl -X GET \\\n-H \"\
    Accept: application/json\" \\\n-u USERNAME:PASSWORD \\\nhttp://SERVER:PORT/job/PROJECT/api/json\n\
    ```\n\nwhere you must substitute `SERVER`, `PORT`, `PROJECT`, `USERNAME`, and\
    \ `PASSWORD` with the appropriate values (don’t forget to replace the spaces in\
    \ the project name with the `%20` escape sequence).\n\n# Corporate Maven Repositories\n\
    \nMaven provides a repository and a dependency resolution build system for projects.\
    \ You use it for Java and build related configuration files, and since Gradle\
    \ uses Maven repositories, it is worthwhile to let some light shed on it to further\
    \ streamline your Java Enterprise development process.\n\nIn the `dependencies\
    \ { ... }` section of the `build.gradle` file, this script determines which libraries\
    \ are needed for a project to be tested, built, and run:\n\n```\n...\ndependencies\
    \ {\n// This dependency is exported to consumers, that\n// is to say found on\
    \ their compile classpath.\napi 'org.apache.commons:commons-math3:3.6.1'\n// This\
    \ dependency is used internally, and not\n// exposed to consumers on their own\
    \ compile\n// classpath.\nimplementation 'com.codepoetics:protonpack:1.16'\n//\
    \ This dependency is only needed for compilation.\n// It will not be packed in\
    \ assemblies like WAR\n// files. It will also not be forwarded as a\n// dependency\
    \ when publishing\ncompileOnly 'jakarta.jakartaee-api:10.0.0'\n// Use JUnit test\
    \ framework\ntestImplementation 'junit:junit:4.13.2'\n}\n...\n```\n\nFurthermore,\
    \ in the `repositories { ... }` section of the same file, you can see where to\
    \ load the dependencies:\n\n```\n...\nrepositories {\njcenter()\n}\n...\n```\n\
    \nYou can also declare one of `mavenCentral()` or `google` here. They, by convention,\
    \ resolve to the following:\n\n```\nmavenCentral -> https://repo.maven.apache.org/maven2/\n\
    jcenter      -> https://jcenter.bintray.com/\ngoogle       -> https://maven.google.com/\n\
    ```\n\nThe chapter title is “Corporate Maven Repositories,” which means Maven\
    \ has repository available only from a corporate intranet. What good would that\
    \ be? First of all, if you are developing software for a space rocket or a nuclear\
    \ power plant, you probably don’t want to allow direct access to the public repositories.\
    \ Second, if your company built its own libraries that are not supposed to be\
    \ publicly available, you don’t want to use a public repository either. So you’ll\
    \ at least want to think about using corporate Maven repositories.\n\nIf your\
    \ company has decided to install a corporate Maven repository, you can use one\
    \ of the products available for that purpose. Right? Maybe not. From a client\
    \ perspective, a repository is just a web server that provides static content\
    \ (the JARs and some meta-information). A web frontend could be used to provide\
    \ an upload functionality for the company-owned library JARs, but the files needed\
    \ for Maven are built using scripts and/or a Lean web application.\n\nYou pay\
    \ a relatively low price for installing a Maven server, but you gain a huge amount\
    \ of flexibility. Consider maintenance costs in this calculation alone. This chapter\
    \ presents such a server, plus some scripts. It is up to you if you prefer to\
    \ use standard products instead, but I think you should have the choice."
