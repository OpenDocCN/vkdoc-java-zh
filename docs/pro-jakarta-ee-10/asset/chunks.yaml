    \ the program can do more to help you find memory leaks. Inside the heap dump\
    \ view, if you switch from the Summary to the Objects view type, you enter a tool\
    \ subset capable of telling you about instance statistics and object relations.\
    \ See Figure [38-4](#490565_1_En_38_Chapter.xhtml#Fig4).\n\n![](images/490565_1_En_38_Chapter/490565_1_En_38_Fig4_HTML.jpg)\n\
