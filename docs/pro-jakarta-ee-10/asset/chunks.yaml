    \ Subversion 或 Git 服务器，如果你不想将源代码托管在公司外部，这将很有意义。\n"
- fmt: '# The Subversion Version Control System


    Subversion is a somewhat older version control system that''s still actively maintained.
    It is a centralized version control system, which means that all versions are
    stored in a central place. Eclipse, and all other IDEs that I am aware of, provide
    built-in functionality to talk to Subversion or allow you to install plugins for
    that purpose.


    Subversion is readily installed on a Linux server. To install it, run the following
    code as `root`:


    ```

    # Ubuntu or Debian

    apt-get install subversion

    # Fedora or RHEL

    yum install subversion

    # SuSE

    zypper install subversion

    ```


    Unless the installation creates a `subversion` user and group, you can check this
    by running `cat /etc/group | grep subversion` and `cat /etc/passwd | grep subversion`.
    Then create a `subversion` user and group by entering the following:


    ```

    # We are "root"

    # Ubuntu, Debian, Fedora, RHEL

    mkdir -p /srv/subversion

    adduser --home /srv/subversion subversion

    chown -R subversion.subversion /srv/subversion

    # OpenSUSE Leap

    mkdir -p /srv/subversion

    useradd -r -U --home-dir /srv/subversion subversion

    chown -R subversion.subversion /srv/subversion

    ```


    As an example, you can create a repository for the `RestDate` project from Chapter
    [2](#490565_1_En_2_Chapter.xhtml):


    ```

    # Create an empty repository

    # We are "root"

    su -l subversion

    svnadmin create /srv/subversion/RestDate

    # Creating the standard subversion layout

    cd # going home

    mkdir tmp

    cd tmp

    svn co file:///srv/subversion/RestDate

    cd RestDate

    mkdir trunk tags branches

    svn add *

    svn commit -m "Init"

    # On Debian and OpenSUSE Leap:

    chmod -R g+w /srv/subversion/RestDate

    # Cleanup, we are going to work with a normal user

    cd ..

    rm -rf RestDate

    exit

    ```


    This creates a standard Subversion repository layout. The `trunk` is the main
    development branch, `branches` contains all the branches, and `tags` is for tags.
    This is the usual convention, but you are not obliged to follow it. It does help
    others understand your versioning procedures better if you follow this convention.


    Subversion provides different methods for clients to connect to repositories.
    The following list shows a summary:


    *   `file:///`


    Local access only. Not really an option, because a corporate server should not
    be a developer''s workstation at the same time.


    *   `http://`


    Indirect access via a mediating Apache HTTP server.


    *   `https://`


    Same as `http://`, but with additional SSL encryption.


    *   `svn://`


    Subversion''s own network protocol.


    *   `svn+ssh://`


    Access mediated via an SSH login.


    For several reasons, I highly favor the `svn+ssh://` protocol. First of all, it
    is straightforward and easy. There is no need for any other software to run on
    the server, and you don''t need to spend time creating a bulletproof Apache installation,
    which is necessary for `http://` or `https://`, including maintenance. And you
    don''t have to use the unsecured `svn://` protocol access. Security is delegated
    to the very safe SSH access method instead. The usual arguments against using
    SSH are not convincing—you just need a single SSH user for your Subversion work
    and don''t waste disk space. Besides, you can use `rbash` to restrict shell access
    to this user. Because of SSH''s importance, the community is highly motivated
    to immediately fix any SSH vulnerabilities that arise.


    Of course, the decision is up to you and you will find installation instructions
    in the documentation and on the Internet. The rest of this chapter uses the `svn+ssh://`
    protocol, because it is so easy.


    You first need to make sure that logins using `rbash` as the shell in the `subversion`
    group can execute only a very limited set of commands. For this aim, you need
    to go through a few preparational steps, depending on the distribution you use:


    ```

    # Fedora ************************************************

    ln -s /bin/bash /bin/rbash

    # OpenSUSE Leap *****************************************

    # Here PATH=/usr/lib/restricted/bin is the default path

    # for executable commands for rbash. It cannot be

    # changed. What you can do here is to further limit

    # access to /usr/lib/restricted/bin based on group

    # and ownership policies. For example

    #     groupadd rbashusers

    #     chgrp rbashusers /usr/lib/restricted/bin/*

    #     chmod o-x /usr/lib/restricted/bin/*

    # and NOT adding group "rbashusers" to user "svnuser"

    # (see below). For this to work the links in that folder

    # must be HARD links (no -s option in \ci{ln})

    ```


    Next, add the `svnuser.sh` file inside `/etc/profile.d/`:


    ```

    # Ubuntu, Debian or Fedora

    if [ "$SHELL" = "/bin/rbash" -a \

    $(groups | grep -c \\bsubversion\\b) = 1  ]; then

    export PATH=.

    fi

    # On OpenSUSE Leap don''t write this file. See comment in

    # previous listing

    ```


    This way, users with the `rbash` shell belonging to the `subversion` group, logging
    in via SSH, can only use a limited set of commands. Effectively, any Subversion
    user trying to log in to your server via `ssh` will soon realize that such a direct
    login makes no sense, because nothing can be done using the shell provided.


    To create an SSH user for Subversion access, use the corresponding operating system
    functions and restrict the `home` directory to a bare minimum needed for SSH:


    ```

    # We are "root"

    # Ubuntu or Debian **************************************

    adduser --system --ingroup subversion \

    --shell /bin/rbash --disabled-password svnuser

    ln -s /usr/bin/groups ~svnuser

    ln -s /bin/grep ~svnuser

    su svnuser --shell /bin/bash \

    -c "ssh-keygen -q -N '''' -f /home/svnuser/.ssh/id_rsa"

    # Fedora ************************************************

    adduser -r -N -G subversion -s "/bin/rbash" \

    -d /home/svnuser svnuser

    mkdir /home/svnuser

    chown svnuser.subversion /home/svnuser

    echo "export PATH=." > /home/svnuser/.bashrc

    ln -s /bin/svnserve /home/svnuser

    su svnuser --shell /bin/bash \

    -c "ssh-keygen -q -N '''' -f /home/svnuser/.ssh/id_rsa"

    # OpenSUSE Leap *****************************************

    useradd -r -G subversion -m -U -s /usr/bin/rbash svnuser

    ln /usr/bin/svnserve /usr/lib/restricted/bin/svnserve

    su svnuser --shell /bin/bash \

    -c "ssh-keygen -q -N '''' -f /home/svnuser/.ssh/id_rsa"

    ```


    The `adduser` creates the user, assigns the `subversion` group to the user, and,
    because of `--shell /bin/rbash` or `-s`, applies the access restrictions. The
    `ssh-keygen` builds the SSH key, and, what is more important for your purposes,
    it creates a space where you can put the public keys to connect from the outside.


    For Ubuntu, Debian, and Fedora, I added a couple of command links in the home
    directory, because they are necessary for Subversion to work properly on these
    systems. For OpenSUSE Leap, the `svnserve` command is necessary, but I instead
    added a *hard* link of that `svnserve` command to the `/usr/lib/restricted/bin`
    folder.'
