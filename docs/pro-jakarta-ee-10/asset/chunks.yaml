    在接收方，你必须解密 JWE 消息才能检查其内容。首先，你需要构建与加密时使用的相同的密钥。这是该过程的特征，因为你使用的是对称加密。然后，构造一个 `JsonWebEncryption`
    对象，在其上设置一些参数，然后注册 JWE 消息和密钥。


    ```

