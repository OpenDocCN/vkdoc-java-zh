    # Part I Development Workflow Proposal


    # 1. Installing a Development Server


    This book uses GlassFish version 7.0.1 as a Jakarta EE server, although I try
    to avoid vendor lock-in, so that, unless otherwise noted, you can test all the
    examples on different Jakarta EE servers.


    For the Eclipse IDE, there is a GlassFish plugin called GlassFish Tools, which
    you can use if you want to. I don’t use it in this book for several reasons. First
    of all, the plugin can have issues with your Eclipse installation. Second, if
    you don’t use the plugin and instead use a terminal to start and stop the server
    and then use a build tool like Gradle to install and uninstall Enterprise applications,
    you are already close to what you need for integration testing and production
    setups. Third, it is easier to switch between different Jakarta EE servers and
    different IDEs. Fourth, you don’t have to learn how to use that plugin, including
    any peculiarities that might arise.


    So for now, simply download and install the GlassFish server, version 7.0.1, from
    this location:


    ```

    https://glassfish.org/download.html

    ```


    Select the Full Platform variant.


    **Note**


    GlassFish 7.0.1 runs on JDK 11 through 19. You can try higher JDK versions for
    GlassFish 7.0.1, but they might not work.


    ## Installing and Running Under Linux


    If you have a Linux development box, unzip the GlassFish distribution to any folder
    suitable for your needs. I call this folder `GLASSFISH-INST` in this chapter.


    GlassFish by default uses the default Java installed on your system. If you don’t
    want that, open the `GLASSFISH-INST/glassfish/config/asenv.conf` file and add
    the following:


    ```

    AS_JAVA=/path/to/your/sdk

    ```


    to the end, replacing `/path/to/your/sdk` with your JDK installation directory.


    In addition, make sure the `JAVA_HOME` environment variable points to the JDK
    installation directory:


    ```

    # In any terminal for Glassfish operation, first run

    export JAVA_HOME=/path/to/your/sdk

    ```


    You can enter this line on top of the `GLASSFISH-INST/bin/asadmin` file, after
    the `#!/bin/sh` preamble. That way, you don’t have to enter it each time you start
    a new terminal.


    Even without any Jakarta EE server applications installed, it should be possible
    to start the server from a console. Enter the following:


    ```

    cd GLASSFISH-INST

    bin/asadmin start-domain

    ```


    You should see the following as the command output:


    ```

    Admin Port: 4848

    Command start-domain executed successfully.

    ```


    If you open a browser window at `http://localhost:4848`, you can see the web administrator
    frontend (the admin console); see Figure [1-1](#490565_1_En_1_Chapter.xhtml#Fig1).


    ![](images/490565_1_En_1_Chapter/490565_1_En_1_Fig1_HTML.jpg)


    A window of the GlassFish console for common tasks. It includes GlassFish news,
    documentation, deployment, administration, resources, and monitoring.


    **Figure 1-1** GlassFish server running


    If you want to use a different port, you can change it in the admin console by
    choosing Configurations ➤ Server-config ➤ HTTP Service ➤ Http Listeners ➤ Admin-listener.
    You can also make this change via the terminal:


    ```

    bin/asadmin set server-config.network-config.

    network-listeners.network-listener.admin-listener.

    port=4444

    ```


    (Type this on one line when the server is running.) Then restart GlassFish and
    add the `-p 4444` option to the `asadmin` invocations.'
