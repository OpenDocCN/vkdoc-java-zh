- fmt: "# Changing the Project Layout\n\nSo far, you placed all file artifacts into\
    \ the following:\n\n```\nJava sources -> src/main/java\nTest sources -> src/test/java\n\
    Web files    -> src/main/resources\n```\n\nYou didn’t specify this in the `build.gradle`\
    \ file, because these are the locations Gradle uses by default. By the way, the\
    \ Maven build framework uses these same places. There are good reasons to deviate\
    \ from this layout, though. The most prominent reason is you that you have a prescribed\
    \ layout because a version control system checkout dictates it. It is not hard\
    \ to tell Gradle where to look for files in such cases. In the `build.gradle`\
    \ file, simply add the following:\n\n```\nsourceSets {\n    main {\n        java\
    \ {\n            srcDirs = ['path/to/folder']\n        }\n        resources {\n\
    \            srcDirs = ['path/to/folder']\n        }\n    }\n    test {\n    \
    \    java {\n            srcDirs = ['path/to/folder']\n        }\n        resources\
    \ {\n            srcDirs = ['path/to/folder']\n        }\n    }\n}\n```\n\nwhere\
    \ you substitute the `path/to/folder` with your custom project layout folders.\
    \ The `[ ... ]` are Groovy language lists, so you can also place a comma-separated\
    \ list there to designate several folders, which will then be merged.\n\n# Development\
    \ with NetBeans as an IDE\n\nMost modern IDEs can fulfill your development needs,\
    \ including Groovy and Gradle support, versioning, compiling and running Java,\
    \ and more. I could include more “Using *XXX* as IDE” chapters and fill half of\
    \ the book, but most IDEs follow similar concepts, have a help functionality,\
    \ and provide tutorials and examples. The path to a development workflow usually\
    \ follows these steps:\n\n1. Learn how to create projects, files, and folders.\n\
    2. Learn how to edit files: Java, XML, resources, script files, and others.\n\
    3. Learn how to connect projects and JREs.\n4. Learn how to add Gradle functionality\
    \ to projects.\n5. Learn how to add versioning.\n6. Learn to use more, less important\
    \ but helpful tools.\n\nYou learned how to use Eclipse, which provides all you\
    \ need to develop and deploy Jakarta EE projects. As an example of a second IDE\
    \ that you can use for development, this chapter briefly investigates another\
    \ free IDE maintained by Apache, called NetBeans.\n\n## Installing NetBeans\n\n\
    Go to [`https://netbeans.apache.org/`](https://netbeans.apache.org/) and download\
    \ NetBeans. Choose one of the installers that suits your operating system. You\
    \ can also install the binary version, something like `netbeans-16-bin.zip`, but\
    \ then you have to manually set some configuration settings that the installer\
    \ otherwise does for you.\n\nMore installation options are described on the download\
    \ page.\n\n> **Note**  \n> Contrary to Eclipse, the NetBeans IDE stores some settings\
    \ in a `USER_HOME/.netbeans` folder. Keep that in mind if you want to uninstall\
    \ NetBeans or reinstall it from scratch.\n\n## Starting a NetBeans Project\n\n\
    Choose File ➤ New Project... to generate a new project. Then select one of the\
    \ Java with Gradle project templates:\n\n- **Java Application**  \n  Generates\
    \ a basic Java application template. If you use Gradle as a build and dependency\
    \ resolution tool, you can start here and add features later.\n\n- **Java Class\
    \ Library**  \n  Use this to create a library JAR that can be used with other\
    \ projects.\n\n- **Web Application**  \n  This is a Java application plus an associated\
    \ server. Since you’ll continue controlling servers from the Gradle script in\
    \ this book, this option is not explained. You can of course experiment with it\
    \ and use it for your own purposes.\n\n- **Multi-Project Build**  \n  This build\
    \ creates a project with one or more sub-projects. This happens by using `include`\
    \ directives inside `settings.gradle`. You can specify the sub-projects while\
    \ installing the root project, and NetBeans will create one new project view per\
    \ sub-project.\n\n- **Java Frontend Application**  \n  This creates a Java frontend\
    \ application blueprint. For this installation option to work, NetBeans must be\
    \ running under Java 11 or later (you can change this option in `NETBEANS-INST/netbeans/etc/netbeans.conf`).\n\
    \n- **Micronaut Project**  \n  Generates a project based on the Micronaut platform\
    \ (non-Jakarta EE).\n\nBecause it is enough for the purposes in this book, the\
    \ following section uses the Java Application type.\n\n## Multi-IDE Projects\n\
    \nChapter [2](#490565_1_En_2_Chapter.xhtml) used a Gradle project style. Because\
    \ you’ll do the same here for NetBeans, it is extremely easy to migrate a project\
    \ from Eclipse to NetBeans and vice versa. Do you remember the simple `RestDate`\
    \ project you created for Eclipse in Chapter [2](#490565_1_En_2_Chapter.xhtml)?\
    \ To move that project to NetBeans, you simply copy the `build.gradle`, `gradle.properties`,\
    \ and `settings.gradle` files from `ECLIPSE-PROJ` (the project folder) to `NETBEANS-PROJ`,\
    \ and then do likewise for all the `src` files. See Table [3-1](#490565_1_En_3_Chapter.xhtml#Tab1).\n\
    \n**Table 3-1**  \nMigrating Gradle Projects\n\n| Eclipse |   | NetBeans |\n|\
    \ --- | --- | --- |\n| `ECLIPSE-PROJ/` | → | `NETBEANS-PROJ/` |\n| `build.gradle`\
    \ | → | `build.gradle` |\n| `settings.gradle` | → | `settings.gradle` |\n| `gradle.properties`\
    \ | → | `gradle.properties` |\n| `src/*` | → | `src/*` |\n\nFirst create a Java\
    \ project by choosing Gradle ➤ Java Application in NetBeans. Check the Initialize\
    \ Gradle Wrapper checkbox so the wizard will also generate a non-IDE (shell) script\
    \ set in the project. Then perform the copy operations shown in Table [3-1](#490565_1_En_3_Chapter.xhtml#Tab1).\n\
    \n> **Note**  \n> NetBeans detects the file changes and automatically downloads\
    \ the new dependencies. This takes a minute or so, so give NetBeans some time\
    \ to restore the project setup. Error markers won’t disappear until everything\
    \ is downloaded and reconfigured.\n\nThe new project view in NetBeans will now\
    \ look similar to Figure [3-1](#490565_1_En_3_Chapter.xhtml#Fig1). After you start\
    \ the server, you can double-click the `deployWar` task to build and deploy the\
    \ project.\n\n![](images/490565_1_En_3_Chapter/490565_1_En_3_Fig1_HTML.jpg)\n\n\
    A window screenshot lists different projects such as Rest Date, resources, and\
    \ build scripts with another window screenshot below that lists different navigators\
    \ such as documentation and verification.\n\n**Figure 3-1**  \nRestDate migrated\
    \ to NetBeans\n\nIn the rest of this book, you use Eclipse, but in this chapter\
    \ you have seen that migrating to and using a different IDE is easy.\n\n# Git\
    \ and Subversion\n\nVersion control systems serve several purposes. First, they\
    \ are a kind of backup system. Once committed (or pushed, in the case of Git),\
    \ a file has a persisted copy on some server, so if a developer’s machine crashes,\
    \ the files are not lost. Second, a version control system keeps a history of\
    \ file versions, so an edit will not lead to previous versions being lost. Third,\
    \ a continuous integration (CI) system might be connected to a version control\
    \ system repository, which means development artifacts can be automatically published\
    \ to integration systems for testing and then later released to some production\
    \ (or pre-production) system.\n\nThis chapter covers the Subversion and Git version\
    \ control systems. Other version control systems exist, but Git and Subversion\
    \ are the most commonly used products.\n\n> **Note**  \n> For client-side usage\
    \ only, skip to the “Subversion Clients” and “Git Clients” sections. Using Git\
    \ and Subversion clients is well documented in manuals and tutorials. The rest\
    \ of this chapter is about installing corporate Subversion or Git servers, which\
    \ makes sense if you don’t want to host sources outside your company."
