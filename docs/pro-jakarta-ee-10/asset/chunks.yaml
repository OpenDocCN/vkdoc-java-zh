    \ files inside `src/main/webapp/WEB-INF`:\n\n```\nbeans.xml:\n\nfaces-config.xml:\n\
    \nbook.jakartapro.clientcertauth.web.WebMessages\n\nbundle\n\nen\nes -->\n\nglassfish-web.xml:\n\
    \nadmin\nauthorized\n\nweb.xml:\n\nindex.xhtml\n\nFaces Servlet\n\njakarta.faces.webapp.FacesServlet\n\
    \nFaces Servlet\n*.xhtml\n\nAdmin Constraint\n\nmembers\n\n/admin/*\n\nadmin\n\
    \nCONFIDENTIAL\n\nCLIENT-CERT\ncertificate\n\nadmin\n\n```\n\nAlso create the\
    \ following XHTML files inside `src/main/webapp`:\n\n```\nindex.xhtml:\n\nClient\
    \ Cert Authentication\n\nThis is the company website\n\nadmin/secured.xhtml:\n\
    \nClient Cert Authentication\n\nSecured area\n\n```\n\nYou can see that the client\
    \ certificate is working by navigating to\nthe secured area. Also, look at the\
    \ page properties inside your browser.\nIn Firefox, click the security badge next\
    \ to the URL address in the\nheader, then choose Connection Not Secure →More Information.\n\
    \nNote\n\nUnless you change the HTTPS listener\nconfiguration in GlassFish (and\
    \ if the project name is `ClientCertAuth`), go\nto `https://localhost:8181/ClientCertAuth`.\n\
    \n14. REST Security\n\nWith SPAs\n(single page web applications), it’s impossible\
    \ to reliably enforce\nsecurity using the security constraints defined in `WEB-INF/web.xml`.\
    \ The\nreason for this is that these security constraints have been especially\n\
    tailored to HTTP requests and responses of web pages, not JSON snippets.\nAlso,\
    \ although annotations exist to mark REST classes and methods as\nsubject to security\
    \ checks, REST implementations are not required to\nactually perform those checks.\
    \ The JAX-RS specification for RESTful\nservices just does not handle security.\n\
    As a remedy, a handful of additional specifications explicitly handle\nREST security:\
    \ JWT (JSON Web Token), JWS (JSON Web\nSignature), JWE\n(JSON Web Encryption),\
    \ JWK (JSON\nWeb Key), and JWA\n(JSON Web Algorithms). This set of\nspecifications\
    \ handles security tokens and signing and encryption of\nJSON data.\n\nNote\n\n\
    JSR-375 tried to standardize the Jakarta EE security techniques.\nHowever, the\
    \ implementation seems to be in a questionable state and you\ncannot find helpful\
    \ tutorials and examples on the Internet. I therefore\ndecided to use the aforementioned\
    \ technologies."
