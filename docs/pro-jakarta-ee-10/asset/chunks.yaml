    故事的有趣部分现在开始。你需要告诉 Gradle 如何从中构建一个 WAR 文件，以及如何将其部署到服务器上。首先需要添加一个 WAR 插件。打开 `build.gradle`
    文件，在 `plugins { }` 部分内输入 `id ''war''`：


    ```

    plugins {

    id ''war''

    }

    ```


    从项目的上下文菜单中选择 Gradle ➤ Refresh Gradle Project。


    要构建 WAR 文件，请打开 Gradle Tasks 视图（如果找不到，请选择 Window ➤ Show View ➤ Other... 打开它）。然后右键单击
    Build ➤ Build 并选择 Run Gradle Tasks。构建任务会执行单元测试并创建 WAR 文件。你可以在 `build/libs` 文件夹中找到结果。


    注意


    Eclipse 默认安装了一个过滤器，用于在 Project Explorer 中隐藏 Gradle 构建文件夹。要移除该过滤器，请点击 Project Explorer
    标题区域中的灰色三角形工具，选择 Filters and Customization...，然后取消勾选 Gradle Build Folder 条目。


    要将 WAR 文件部署到服务器上，你必须首先定义一些属性。在项目根目录下创建 `gradle.properties` 文件，并添加以下内容，将服务器路径替换为你自己的路径：


    ```

    glassfish.inst.dir = /PATH/TO/YOUR/GLASSFISH/SERVER

    glassfish.user = admin

    glassfish.passwd =

    ```


    同时根据你的需要替换 `user` 和 `passwd`——将 `user` 改为 `admin`，并使用空密码（这属于默认安装配置）。如果你使用 Windows，请确保路径中使用双反斜杠
    `\\` 而不是单反斜杠（因为这是一个 Java 属性文件）。


    接下来，将自定义的 `deploy` 和 `undeploy` 任务添加到 `build.gradle` 文件中。打开该文件并添加以下内容：


    ```

    task deployWar(dependsOn: war,

    description:">>> RESTDATE deploy task") {

    doLast {

    def FS = File.separator

    def glassfish =

    project.properties[''glassfish.inst.dir'']

    def user = project.properties[''glassfish.user'']

    def passwd = project.properties[''glassfish.passwd'']

    File temp = File.createTempFile("asadmin-passwd",

    ".tmp")

    temp  ${sout}"

    if(serr.toString()) System.err.println(serr)

    temp.delete()

    }

    }

    task undeployWar(

    description:">>> RESTDATE undeploy task") {

    doLast {

    def FS = File.separator

    def glassfish =

    project.properties[''glassfish.inst.dir'']

    def user = project.properties[''glassfish.user'']

    def passwd = project.properties[''glassfish.passwd'']

    File temp = File.createTempFile("asadmin-passwd",

    ".tmp")

    temp  ${sout}"

    if(serr.toString()) System.err.println(serr)

    temp.delete()

    }

    }

    ```


    两个任务都指定了一个 `doLast { }` 块，这是任务实际在任务执行阶段执行的必要条件。如果你没有使用这样的块，相应的代码将在配置阶段内执行，无论该任务是否实际被执行。正如你可能猜到的，也可以使用
    `doFirst { }` 块。就此处目的而言，你可以使用其中任何一个。


    代码基于 Linux 作为开发环境。要在 Windows 下运行相同的任务，所需的改动实际上非常小。你只需要在 `def proc = """...` 字符串的开头添加一个
    `cmd /c`：


    ```

    // 这是 Windows 系统！

    def proc = """cmd /c ${glassfish}${FS} ...

    ```


    如果你想使用 Windows，请对这两个新任务都进行相同的修改！


    代码本身使用了 Groovy 语言作为惯用语法。`project.properties` 用于访问在 `gradle.properties` 文件中定义的属性。其余部分是
    Groovy 代码，其中 `.execute` 用于执行系统 shell 命令。之所以需要临时文件，是因为对于 `asadmin` 命令，只能通过指定一个特制的密码文件来传递密码。`<<`
    操作符将内容写入该文件，生成 `asadmin` 规范所要求的必要语法。


    在 Gradle Tasks 视图中，转到菜单（位于视图的工具栏内）并勾选 Show All Tasks。现在你可以从该视图运行 deploy 和 undeploy
    任务。导航到 Other 并双击任一新的自定义任务。标准输出和错误输出将打印到控制台视图。在部署或取消部署应用程序之前，请确保服务器正在运行。


    注意


    对于任何其他 Jakarta EE 服务器，从构建脚本来看，部署过程将非常相似。由于 Groovy 运行在 Java 之上，你可以在部署和取消部署期间执行许多其他有趣的操作。此外，一个任务可以轻松调用任何其他任务，并且借助
    Gradle 插件，这里可以实现许多额外的功能。


    要查看这个小应用程序的运行情况，请将浏览器指向 `http://localhost:8080/RestDate/webapi/d`。输出将如图 2-3 所示。


    ![](img/490565_1_En_2_Fig3_HTML.jpg)


    一个 RESTful 日期应用程序的窗口，其中选择了 JSON，给出了日期输出。有保存、复制、全部折叠和全部展开的选项。


    图 2-3


    RESTful 日期应用程序


    注意


    为了简化开发并节省部署应用程序的时间，你也可以从 shell 终端使用 Gradle 包装器。进入项目目录，然后调用 `./gradlew deployWar`
    来执行构建并随后进行部署。


    ## Eclipse 日常使用


    Eclipse 提供了许多功能，你可以通过打开内置帮助来了解它们。以下是一些提示列表，将帮助你充分利用 Eclipse：


    *   将光标放在标识符上并按 F3 键，可以跳转到该标识符的定义。这适用于变量（跳转到其声明）和类/接口（跳转到其定义）。你甚至可以以这种方式检查引用的类和
    Java 标准库类。Eclipse 可能会下载源代码并显示代码。这是通过深入查看代码来学习库的好方法。


    *   要快速查找资源（例如文件、类或接口），请按 CTRL+SHIFT+R。


    *   开始输入代码，然后按 CTRL+SPACE。Eclipse 将显示完成输入的建议。例如，输入 `new SimpleDa`，然后按 CTRL+SPACE。提供的列表将包含
    `SimpleDateFormat` 类的所有构造函数。更好的是，你可以通过输入 `new SiDF` 并按 CTRL+SPACE 来快捷操作，因为 Eclipse
    会猜测缺失的小写字母。另一个好处是，你无需为以这种方式引入的类和接口编写 `import` 语句——Eclipse 会为你完成 `import`。


    *   按 SHIFT+CTRL+O 让 Eclipse 为所有尚未解析的类完成 `import`（将 O 视为“组织导入”）。


    *   按 CTRL+ALT+F 格式化你的代码。这也适用于 XML 和其他文件类型。


    *   在类型指示符上按 F4 键，让 Eclipse 显示其超类型和子类型。


    *   如果从 Eclipse 外部添加或删除了文件，请使用 F5 更新 Project Explorer 视图。


    *   对于新的 Eclipse 安装，请从 Window ➤ Show View ➤ Other... ➤ General ➤ Problems 打开 Problems
    视图。它会立即指出 Eclipse 检测到的任何问题（编译器问题、配置问题等）。


    *   从 Window ➤ Show View ➤ Other... ➤ General ➤ Tasks 打开 Tasks 视图，以获取你在代码注释中输入的所有
    `TODO` 的列表。


    *   如果 `TODO` 对你来说粒度不够细，你可以通过右键单击代码编辑器左侧垂直栏上的任意位置来添加书签。书签会列在 Bookmarks 视图中。

