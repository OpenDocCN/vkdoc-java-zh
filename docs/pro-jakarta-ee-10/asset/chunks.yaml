    @Path("logout")

    public Response unauthenticateUser(

    @Context HttpServletRequest req) {

    try {

    // TODO: 可能从数据库中移除令牌

    // 取消身份验证

    unauthenticate(req);

    // 返回空响应

    return Response.ok().entity("{}").build();

    } catch (Exception e) {

    e.printStackTrace(System.err);

    return Response.status(INTERNAL_SERVER_ERROR).

    build();

    }

    }

    ////////////////////////////////////////////////////////

    ////////////////////////////////////////////////////////

    private void authenticate(String login, String password,

    HttpServletRequest req) throws Exception {

    // 使用容器进行身份验证。作为替代方案，你也可以实现

    // 自己的身份验证流程。

    boolean authenticated = false;

    Principal p = req.getUserPrincipal();

    if(p != null && p.getName().equals(login))

    authenticated = true;

    try {

    if(!authenticated)

    req.login(login, password);

    } catch(ServletException ex) {

    throw new SecurityException("无效的用户名/密码");

    }

    }

    private void unauthenticate(HttpServletRequest req)

    throws Exception {

    // 使用容器取消身份验证。作为替代方案，你也可以实现

    // 自己的取消身份验证流程。

    boolean authenticated = false;

    Principal p = req.getUserPrincipal();

    if(p != null)

    authenticated = true;

    if(authenticated)

    req.logout();

    }

    private String issueToken(String login) {

    Key key = keyGenerator.generateKey();

    String jwtToken = Jwts.builder()

    .setSubject(login)

    .setIssuer(uriInfo.getAbsolutePath().toString())

    .setIssuedAt(new Date())

    .setExpiration(toDate(

    LocalDateTime.now().plusMinutes(15L)))

    .signWith(key, SignatureAlgorithm.HS512)

    .compact();

    return jwtToken;

    }

    private Date toDate(LocalDateTime localDateTime) {

    return Date.from(

    localDateTime.atZone(ZoneId.systemDefault()).

    toInstant());

    }

    }

    ```


