- fmt: "```java\npackage book.jakartapro.websocket.server;\nimport jakarta.enterprise.context.ApplicationScoped;\n\
    import jakarta.inject.Inject;\nimport jakarta.json.Json;\nimport jakarta.json.JsonObject;\n\
    import jakarta.json.JsonReader;\nimport jakarta.websocket.OnClose;\nimport jakarta.websocket.OnError;\n\
    import jakarta.websocket.OnMessage;\nimport jakarta.websocket.OnOpen;\nimport\
    \ jakarta.websocket.Session;\nimport jakarta.websocket.server.ServerEndpoint;\n\
    @ApplicationScoped\n@ServerEndpoint(\"/actions\")\npublic class WebSocketServer\
    \ {\n@OnOpen\npublic void open(Session session) {\n// Somehow handle an opened\
    \ session. For example\n// save the session object in the instance of\n// some\
    \ session registrar class...\n}\n@OnClose\npublic void close(Session session)\
    \ {\n// Somehow handle a closed session\n}\n@OnError\npublic void onError(Throwable\
    \ error) {\n// Somehow handle a websocket error\n}\n@OnMessage\npublic void handleMessage(String\
    \ message,\nSession session) {\n// Receive a string message. It is not required\n\
    // to use JSON as a message format, but it is a\n// good choice in many cases\
    \ and it simplifies\n// programming JavaScript websocket clients\ntry (JsonReader\
    \ reader = Json.createReader(\nnew StringReader(message))) {\nJsonObject jsonMessage\
    \ = reader.readObject();\n// handle the incoming message...\n}\n}\n}\n```\n\n\
    You can see that you added the server object to the application scope. The usual\
    \ session scope won’t work here, since websockets do not correspond to user sessions\
    \ in the traditional HTTP sense.\n\nIn order to send messages to a client, you\
    \ get a hold of a `jakarta.websocket.Session` object and then issue messages as\
    \ follows:\n\n```java\n// Build a data object:\nJsonProvider provider = JsonProvider.provider();\n\
    JsonObject msg = provider.createObjectBuilder()\n.add(\"someField\", \"someValue\"\
    )\n.add(\"someOtherField\", 42)\n...\n.build();\n// Send it to the client:\ntry\
    \ {\nsession.getBasicRemote().sendText(msg.toString());\n} catch (IOException\
    \ ex) {\n// Handle errors. Also maybe remove the session\n// from the session\
    \ storage:\n// sessions.remove(session);\n}\n```\n\nIf the WAR file runs under\
    \ the `WebSock-Server-War` context, the websocket URI on a local GlassFish reads\
    \ as follows:\n\n```\nhttp://localhost:8080/WebSock-Server-War/actions\n```\n\n\
    You need to know that in order for a client web application (JavaScript) to connect\
    \ to the websocket.\n\nBy the way, in order to change the context of the EAR plugin\
    \ (in case the web application is part of an EAR), you must adapt the EAR plugin\
    \ configuration inside `build.gradle`:\n\n```groovy\n...\near {\ndeploymentDescriptor\
    \ {\nwebModule(\"WebSock-Server-War.war\",\n\"sock-context\")\n}\n}\n```\n\nwhere\
    \ `WebSock-Server-War.war` is the generated WAR module’s deployment artifact and\
    \ `sock-context` is the new context:\n\n```\nhttp://localhost:8080/sock-context/\n\
    ```\n\nIf you instead deploy the web application as a WAR file, it is the server’s\
    \ business to determine how the context looks. For GlassFish 7, you can specify\
    \ the context root during the deployment:\n\n```bash\n./asadmin \\\n--user THE_USER\
    \ \\\ndeploy --contextroot sock-context theWar.war\n```\n\n## Websockets on the\
    \ Client Side\n\nOn the client side, you add the following JavaScript code to\
    \ your web application:\n\n```javascript\nvar server = \"localhost:8080/WebSock-Server-War\"\
    ;\nvar socket = new WebSocket(\"ws://\" + server +\n\"/actions\");\nsocket.onmessage\
    \ = onMessage;\nfunction onMessage(event) {\n// Handle messages which come from\
    \ the server...\n// We assume the message is in JSON format\nvar msg = JSON.parse(event.data);\n\
    ...\n}\n...\n// Sending a message to the server. You do this from\n// somewhere\
    \ in your JavaScript code or an\n// event handler like a button press\nvar msg\
    \ = {\nid: 42,\ntxt: \"Hello World\"\n};\nsendToServer(msg);\n...\nfunction sendToServer(msg)\
    \ {\n// We convert the message to a JSON string, so\n// 'msg' could be any object\n\
    socket.send(JSON.stringify(msg));\n}\n...\n```\n\nThe `/actions` part from the\
    \ socket URL should match the `@ServerEndpoint` annotation from the Java server\
    \ class.\n\n## 11. Frontend Technologies\n\nWith web applications situated on\
    \ the interface between users and application functionality, and with the need\
    \ to present well designed and highly usable frontends on various types of devices,\
    \ frontend technologies have gained lots of attention in the developer community.\n\
    \nIt is acceptable to build web frontends using the dedicated Jakarta EE technologies\
    \ Faces or REST, but with the plethora of different and sometimes even contradictory\
    \ requirements that a frontend has to fulfill, there are many different web frontend\
    \ technologies. It is not easy to decide whether you need a third-party web frontend\
    \ technology, and, if you do, which one to choose. These basic questions can help\
    \ you make a decision:\n\n* Does it cost something, or is it open-source or free?\n\
    * How good is the documentation?\n* What is the expected effort to produce a good\
    \ design?\n* How easy is it to merge graphical designers’ ideas into the web application?\n\
    * How easy is it to ensure the web application has good usability?\n* How difficult\
    \ is it to include the frontend in Jakarta EE?\n* How easy is it to address different\
    \ frontend devices (browsers and smartphones)?\n* How easy is it to get help if\
    \ problems arise?\n* How easy is it to upgrade to new versions?\n* Which programming\
    \ skills are required to use the frontend technology?\n* How likely is it that\
    \ the technology will still exist in five years?\n\nFrom the number of questions\
    \ and possible answers, you might guess that it is easy to list ten, twenty, or\
    \ more frontend technologies, all of them with merits and drawbacks. It is impossible\
    \ to provide a thorough introduction to all of them in a single book, but the\
    \ following sections give an overview of several and present some pros and cons.\n\
    \n> **Note**  \n> Due to the nature of such comparisons, it is possible that advocates\
    \ of one or the other framework will disagree with my assessments. Note, however,\
    \ that this is only a rough comparison of features. You can use each product’s\
    \ web documentation to draw your own conclusions.\n\nWalking through the list,\
    \ you might get the impression that I’m not a fan of Node.js. I have to admit\
    \ that this is indeed the case. I don’t follow the usual argument that web developers\
    \ know how to use JavaScript and so using JavaScript as a server-side language\
    \ and build environment is a good idea. Instead, I think that the Java ecosystem\
    \ already has everything that is needed to build good and elegant code, and that\
    \ the frontend logic running in a browser and the backend logic should stay separate,\
    \ for both have different requirements concerning architectural aspects and developer\
    \ programming skills. That said, it is of course up to you. Go ahead and use Node.js\
    \ to any extent you like. I personally think that mixing Jakarta EE and Node.js\
    \ introduces unnecessary conceptional complexity in a project process.\n\n###\
    \ No Third-Party Frontend Technology\n\nAs mentioned, the Faces and REST technologies\
    \ included in Jakarta EE are enough to build any kind of web application. You\
    \ can simplify development if you include the `jQuery` JavaScript library, because\
    \ it evens out some browser differences and helps you write shorter, more elegant\
    \ JavaScript code.\n\n**Pros:**\n\n* Faces and REST are already included in Jakarta\
    \ EE\n* Heavily standardized and stable\n* Very good documentation\n\n**Cons:**\n\
    \n* Advanced development skills needed to achieve a good graphical design and\
    \ high usability\n* Different frontend devices are not explicitly addressed\n\n\
    ### Play 2\n\nPlay (version 2) is a full-stack web application technology. It\
    \ works with Java or Scala as a programming language and allows you to use functional\
    \ patterns. It follows the MVC (model view controller) paradigm. A basic development\
    \ project including a running web server is set up in five minutes.\n\n```\nhttps://www.playframework.com/\n\
    ```\n\n**Pros:**\n\n* HTTP based, stateless.\n* Explicitly addresses mobile devices.\n\
    * Asynchronous requests, non-blocking I/O.\n* Rapid development lifecycle.\n\n\
    **Cons:**"
