    \ index page of a web application. Figure [36-1](#490565_1_En_36_Chapter.xhtml#Fig1)\
    \ shows JMeter’s\nstart window\n(choose Options ➤ Look and Feel and select your\
    \ favorite color scheme).\n\n![](images/490565_1_En_36_Chapter/490565_1_En_36_Fig1_HTML.jpg)\n\
    \nA window of Apache J Meter where the test plan displays the name,\ncomments,\
    \ and user-defined variables. It selects the option to run\nteardown thread groups\
    \ after a shutdown of main threads.\n\nFigure 36-1\n*JMeter's* *start\nwindow*\n\
    \nRight-mouse-click Test Plan in the left tree view panel, then choose Add\n➤\
    \ Threads (Users) ➤ Thread Group. This is a master controller where you\nspecify\
    \ the parallelization grade (the number of simulated concurrent\nusers) and the\
    \ test lifetime. In the settings view for the thread group, make\nthese changes:\n\
    \n```\nNumber of Threads (users):  50\nRamp-up period (seconds):   30\nLoop Count:\
    \ [x] Infinite\n[x] Specify Thread lifetime\nDuration (seconds):         300\n\
    ```\n\nLeave the other settings at their default value. This defines a test\n\
    running for five\nminutes, simulating 50 users, and a ramp-up period of 30 seconds.\
    \ The\nlast option indicates that the users will not all start their work at\n\
    once, which is unrealistic. Instead the startup time for the users is\nevenly\
    \ distributed among the first 30 seconds.\nInside the thread group, add a Simple\
    \ Controller\n(choose Add ➤ Logic Controller ➤ Simple Controller). This is simply\
    \ a\ncontainer for other test elements; it helps you organize the test\nplan.\n\
    \nNote\n\nEach test element, including container elements, has a `name` property\
    \ that\nyou can freely change to your needs. This way, you can build highly\n\
    comprehensive test plans.\n\nInside the Simple Controller, add a Flow Control\
    \ Action\n(choose Add ➤ Sampler ➤ Flow Control Action). Inside the Flow Control\n\
    Action, add a Constant Throughput Timer (choose Add ➤ Timer ➤ Constant\nThroughput\
    \ Timer). The Flow Control Action is just a dummy test\nelement—you need it to\
    \ make sure the timer acts only once each\niteration. The timer itself adds pauses\
    \ to the test run and tries to\nestablish a certain throughput (invocations per\
    \ minute). Otherwise, you\nwould have simulated users who act without breaks between\
    \ page loads,\nwhich is not realistic. For the setting, inside the Flow Control\
    \ Action,\nleave everything at the default values (a zero milliseconds pause,\
    \ which\nbasically means nothing). In the Constant Throughput\nTimer, change the\
    \ settings as follows:\n\n```\nTarget throughput (per minute): 6.0\nCalculate\
    \ based on:             this thread only\n```\n\nThis simulates each user clicking\
    \ the Reload button every ten\nseconds.\n\nAs a basic test plan element, add a\
    \ HTTP request to the Simple\nController (as a sibling to the Flow Control Action).\
    \ You can find it by\nchoosing Add ➤ Sampler ➤ HTTP Request. In its\nsettings\
    \ page, change the following:\n\n```\nServer Name or IP: www.someserver.com\n\
    Port Number:       80\nPath:              /index.html\n```\n\nUse any running\
    \ web\nserver of your choice here. However, do not use a locally running\nserver—the\
    \ response times are just too slow.\n\nYou still need a way to save or display\
    \ the test outcome data. This is\ncovered by *listeners*. You’ll add three listeners\
    \ to the test\nplan:\n\n*   A Summary Report shows performance data in a table,\
    \ updated in\n    real-time while the test is running.\n\n*   A Graph Results\
    \ listener shows a quick diagram with performance\n    figures. This diagram is\
    \ updated in real-time, too.\n\n*   A Simple Data Writer writes performance figures\
    \ to a CSV\n    file.\n\nFor all three listeners, only a\nfilename for the Simple\
    \ Data Writer needs to be entered. You can play\naround with the other settings\
    \ at will. I place the listeners as\nsiblings to the thread group."
