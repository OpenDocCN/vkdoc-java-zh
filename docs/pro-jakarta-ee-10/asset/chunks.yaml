    \ VisualVM object view\n\nIn the checkbox labeled Preset, you can select object\
    \ relations you are interested in. Possible values are as follows:\n\n*   **All\
    \ Objects**  \n    Look at all objects, regardless of what their relations to\
    \ other objects are. In this preset, you can determine that there are exceedingly\
    \ many instances of the `MemLeak$A` class. You cannot, however, find out where\
    \ the objects are stored, or why the objects are not being garbage collected.\
    \ This preset thus only gives you a hint as to which class is the source of the\
    \ memory leak.\n\n*   **Dominators**  \n    The *Dominator* relationship expresses\
    \ which objects are responsible for preventing other objects from being garbage\
    \ collected. A Dominator view is a tree view, because you can arrange Dominators\
    \ in a tree hierarchy. It allows you to calculate *retained* size, which is the\
    \ number of bytes that can be freed if the dominating relationship is broken.\
    \ The Dominators preset thus is very important for memory leak-related troubleshooting.\n\
