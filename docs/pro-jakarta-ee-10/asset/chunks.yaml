    @ApplicationScoped\n@ServerEndpoint(\"/actions\")\npublic class WebSocketServer\
    \ {\n@OnOpen\npublic void open(Session session) {\n// 以某种方式处理已打开的会话。例如\n// 将 session\
    \ 对象保存在某个\n// 会话注册器类的实例中...\n}\n@OnClose\npublic void close(Session session) {\n\
    // 以某种方式处理已关闭的会话\n}\n@OnError\npublic void onError(Throwable error) {\n// 以某种方式处理\
    \ websocket 错误\n}\n@OnMessage\npublic void handleMessage(String message,\nSession\
    \ session) {\n// 接收字符串消息。不要求\n// 使用 JSON 作为消息格式，但在许多情况下这是一个\n// 不错的选择，并且它简化了\n\
    // JavaScript websocket 客户端的编程\ntry (JsonReader reader = Json.createReader(\n\
    new StringReader(message))) {\nJsonObject jsonMessage = reader.readObject();\n\
    // 处理传入的消息...\n}\n}\n}\n```\n\n可以看到，你将服务器对象添加到了\n应用作用域中。通常的会话作用域在这里不起作用，因为\nwebsocket\
    \ 并不对应传统 HTTP\n意义上的用户会话。\n\n为了向客户端发送消息，\n你需要获取一个 `jakarta.websocket.Session`\n\
    对象，然后按如下方式发送消息：\n\n```\n// 构建一个数据对象：\nJsonProvider provider = JsonProvider.provider();\n\
    JsonObject msg = provider.createObjectBuilder()\n.add(\"someField\", \"someValue\"\
    )\n.add(\"someOtherField\", 42)\n...\n.build();\n// 将其发送给客户端：\ntry {\nsession.getBasicRemote().sendText(msg.toString());\n\
    } catch (IOException ex) {\n// 处理错误。同时可能从会话存储中移除该会话：\n// sessions.remove(session);\n\
    }\n```\n\n如果 WAR 文件\n在 `WebSock-Server-War`\n上下文下运行，本地 GlassFish 上的 websocket\
    \ URI 如下所示：\n\n```\nhttp://localhost:8080/WebSock-Server-War/actions\n```\n\n\
    你需要知道这一点，以便客户端 Web 应用程序\n（JavaScript）能够连接到 websocket。\n\n顺便提一下，为了更改 EAR 插件的上下文（如果\
    \ Web\n应用程序是 EAR 的一部分），你必须在 `build.gradle` 中调整 EAR 插件\n配置：\n\n```\n...\near {\n\
    deploymentDescriptor {\nwebModule(\"WebSock-Server-War.war\",\n\"sock-context\"\
    )\n}\n}\n```\n\n其中 `WebSock-Server-War.war`\n是生成的 WAR 模块的部署构件，而 `sock-context`\n\
    是新的上下文：\n\n```\nhttp://localhost:8080/sock-context/\n```\n\n如果你改为将 Web 应用程序部署为\
    \ WAR 文件，则由\n服务器决定上下文的外观。对于 GlassFish 7，\n你可以在部署期间指定上下文根：\n\n```\n./asadmin \\\
    \n--user THE_USER \\\ndeploy --contextroot sock-context theWar.war\n```\n\n客户端上的\
    \ WebSocket\n\n在客户端\n，你需要将以下 JavaScript 代码添加到你的 Web\n应用程序中：\n\n```\n\nvar server\
    \ = \"localhost:8080/WebSock-Server-War\";\nvar socket = new WebSocket(\"ws://\"\
    \ + server +\n\"/actions\");\nsocket.onmessage = onMessage;\nfunction onMessage(event)\
    \ {\n// 处理来自服务器的消息...\n// 我们假设消息是 JSON 格式\nvar msg = JSON.parse(event.data);\n\
    ...\n}\n...\n// 向服务器发送消息。你可以从\n// JavaScript 代码的某个位置或\n// 事件处理程序（如按钮按下）中执行此操作\n\
    var msg = {\nid: 42,\ntxt: \"Hello World\"\n};\nsendToServer(msg);\n...\nfunction\
    \ sendToServer(msg) {\n// 我们将消息转换为 JSON 字符串，因此\n// 'msg' 可以是任何对象\nsocket.send(JSON.stringify(msg));\n\
    }\n\n...\n\n```\n\nsocket URL 中的 `/actions`\n部分应与 Java 服务器类中的 `@ServerEndpoint`\n\
    注解匹配。\n\n11. 前端技术\n\n随着 Web 应用程序位于用户和\n应用程序功能之间的接口上，并且需要在各种类型的设备上呈现设计良好且\n高度可用的前端，前端技术\n\
    在开发者社区中获得了大量关注。\n\n使用 Jakarta EE 专用技术\nFaces 或 REST 构建 Web 前端是可以接受的，但由于前端需要满足的众多不同甚至有时相互矛盾的\n\
    需求，存在许多\n不同的 Web 前端技术。很难决定\n你是否需要第三方 Web 前端技术，如果需要，\n又该选择哪一种。以下基本问题可以帮助你做出决定：\n\
    \n*   它是收费的，还是开源或免费的？\n\n*   文档质量如何？\n\n*   产生良好设计的预期工作量是多少？\n\n*   将图形设计师的想法融入\
    \ Web\n    应用程序有多容易？\n\n*   确保 Web 应用程序具有良好的\n    可用性有多容易？\n\n*   将前端包含在 Jakarta\n\
    \    EE 中有多困难？\n\n*   适配不同的前端设备（浏览器\n    和智能手机）有多容易？\n\n*   出现问题时获得帮助有多容易？\n\n\
    *   升级到新版本有多容易？\n\n*   使用该前端技术需要哪些编程技能？\n\n*   该技术在五年后仍然存在的可能性有多大？\n\n从问题和可能答案的数量来看，你可能会猜到\n\
    很容易列出十种、二十种甚至更多的前端技术，\n它们各有优缺点。在一本书中不可能对所有这些技术进行\n全面的介绍，但以下各节将概述几种技术并介绍一些优缺点。\n\
    \n注意\n\n由于此类比较的性质，某个或另一个框架的\n拥护者可能会不同意我的评估。但请注意，\n这仅仅是功能的粗略比较。你可以\n使用每个产品的 Web\
    \ 文档来得出自己的结论。\n\n浏览列表时，你可能会觉得我不是\nNode.js 的粉丝。我不得不承认事实确实如此。我\n不认同通常的论点，即 Web 开发者知道如何使用\
    \ JavaScript，因此使用\nJavaScript 作为服务器端语言和构建环境是一个\n好主意。相反，我认为 Java 生态系统已经拥有\n构建良好且优雅代码所需的一切，并且\n\
    在浏览器中运行的前端逻辑和后端逻辑应该保持分离，\n因为两者在架构方面和开发者编程技能方面有不同的要求。话虽如此，当然由你决定。\n你可以尽情使用 Node.js。\n\
    我个人认为，在项目过程中混合使用 Jakarta EE 和 Node.js\n会引入不必要的概念复杂性。\n\n无第三方前端技术\n如前所述，Jakarta\
    \ EE 中包含的 Faces 和 REST 技术足以构建任何类型的 Web 应用程序。如果包含 `jQuery` JavaScript\n库，你可以简化开发，因为它可以消除一些浏览器差异，并帮助你编写\n\
    更短、更优雅的 JavaScript 代码。\n\n优点：\n\n*   Faces 和 REST 已包含在 Jakarta EE 中\n\n*   高度标准化且稳定\n\
    \n*   非常好的文档\n\n缺点：\n\n*   需要高级开发技能才能实现\n    良好的图形设计和高度可用性\n\n*   未明确处理不同的前端设备\n\
    \nPlay 2\n\nPlay（版本 2）\n是一种全栈 Web 应用程序技术。它使用 Java 或 Scala\n作为编程语言，并允许你使用函数式模式。它\n\
    遵循 MVC（模型-视图-控制器）范式。一个包含运行中 Web 服务器的基本开发项目\n可在五分钟内设置完成。\n\n```\nhttps://www.playframework.com/\n\
    ```\n\n优点：\n\n*   基于 HTTP，无状态。\n\n*   明确支持移动设备。\n\n*   异步请求，非阻塞 I/O。\n\n*   快速开发生命周期。\n\
    \n缺点：\n"
- fmt: '# React


    `React`是一个基于组件的Web开发框架。你使用一种名为`JSX`的增强型`JavaScript`语言，将编程逻辑与`HTML`标记混合在一起。例如：


    ```

    class ShoppingList extends React.Component {

    render() {

    return (


    Shopping List for {this.props.name}


    Bananas

    Apples

    Peanuts


    );

    }

    }

    ```


    在开发过程中，一个即时编译器将`JSX`转换为`JavaScript`；对于生产环境，则提供了预编译器。


    ```

    https://reactjs.org/

    ```


    **优点：**


    *   混合了`JavaScript`和`HTML`编码（`JSX`页面），在一定程度上简化了开发。

    *   与其他技术无缝集成，因此你可以逐步将`React`特性包含到`Jakarta EE`应用程序中。

    *   开发过程伴随着`JSX`页面的即时编译，这使得开发速度很快。


    **缺点：**


    *   `React`由`Facebook`维护，这依赖于公司政策。你可能不希望为你的软件接受这些偏好。此外，其许可证包含一些感觉像是供应商锁定的部分。

    *   生产代码的构建过程严重依赖于`Node.js`，这引入了一种基于`JavaScript`作为服务器端代码语言的新范式。使用`React`意味着你必须维护两个生态系统：`Java`和`JavaScript`。此外，`Node.js`引入了另一个供应商锁定：构建和维护私有的、公司拥有的`Node.js`模块软件仓库并不容易。

    *   标记（`HTML`）和逻辑没有分离，这与广泛接受的`MVC`范式相矛盾。


    # Angular 2


    `Angular`是一个模板化的Web开发框架。你使用一种特殊语法创建包含`Angular`组件占位符的`HTML`页面。部署`Angular`应用程序通过`Node.js`（一个服务器端`JavaScript`框架）进行。


    ```

    https://angular.io/

    ```


    **优点：**


    *   明确针对移动设备。

    *   `Angular`将*依赖注入*引入到Web层（`JavaScript`/`TypeScript`代码）。


    **缺点：**


    *   `Angular`依赖于`TypeScript`，它需要被转换为`JavaScript`才能在浏览器上运行。

    *   `Angular`严重依赖于`Node.js`，这引入了一种基于`JavaScript`作为服务器端代码语言的新范式。将`Angular`与`Jakarta
    EE`一起使用意味着你必须维护两个生态系统——`Java`和`JavaScript`。此外，`Node.js`引入了另一个供应商锁定：构建和维护私有的、公司拥有的`Node.js`模块软件仓库并不容易。

    *   `Angular`引入了一种全栈Web应用程序技术。因此，它是`Jakarta EE`的竞争对手，并且以稳定的方式将两者混合具有挑战性。


    # Spring Boot


    `Spring Boot`利用`Spring`平台，使你能够快速开发Web应用程序。


    ```

    https://spring.io/projects/spring-boot

    ```


    **优点：**


    *   在独立的、几乎生产就绪的环境中快速搭建Web应用程序（和微服务）。

    *   `Spring Boot`自动打开监控端口，用于发现指标和技术应用程序状态。

    *   严重依赖*约定优于配置*模式，简化了配置并加速了开发。


    **缺点：**


    *   `Spring`可能被认为是`Jakarta EE`的竞争对手，尽管`Spring`和`Jakarta`在版本升级过程中相互采纳彼此的特性。将两者混合是可能的，但这样做会给应用程序开发带来新的复杂性。

    *   `Spring Boot`是一个“让别人做你的工作”的框架。你在某种程度上失去了对应用程序内部功能的控制。这可能是你不希望做的事情。'
