- fmt: "# This chapter covers securing REST endpoints using the JJWT (Java JSON Web\
    \ Token) library. It focuses on browser-to-server communication and therefore\
    \ limits the coverage to JWT and JWS. All the other REST security specifications\
    \ might improve security, but they are not easily adoptable to browser-to-server\
    \ communication. If you are thinking about using those as well, consult the specifications\
    \ and the JJWT documentation at [`https://github.com/jwtk/jjwt`](https://github.com/jwtk/jjwt).\n\
    \n## Security Constraints for REST URLs\n\nSay you have a SPA with one HTML page\
    \ called `index.html` and two classes of REST data queries, as follows:\n\n```\n\
    /data/unsecured/*\n/data/secured/*\n```\n\nThe following sections show you how\
    \ to develop a method to apply JWT security to the `/data/secured/*` kind of REST\
    \ URLs.\n\n## About JSON Web Tokens\n\nJSON Web Tokens (JWTs) are data snippets\
    \ that assert a number of claims in client-server communication. They are especially\
    \ useful in RESTful applications in which such a claim could be the user’s name,\
    \ role assignments, and more.\n\nThe main idea around generating and checking\
    \ JWTs to make sure the user gets authenticated is as follows:\n\n1.  The user\
    \ initiates the login process, sending credentials (name and password) to the\
    \ server. This is done by an AJAX call, typically a `POST` or a `PUT`.\n2.  The\
    \ server tries to authenticate the user.\n3.  If the authentication fails, a response\
    \ *without* a JWT is constructed and the server returns from the call.\n4.  Otherwise,\
    \ the server generates a new JWT.\n5.  The JWT is signed with a secret key, stored\
    \ along with the username and the signing key in some database. The JWT is returned\
    \ in the response header.\n6.  The browser client receives the JWT and stores\
    \ it with the browser session.\n7.  With each subsequent AJAX request, the client\
    \ (browser) sends the JWT with the request header. The server decides whether\
    \ to check the transmitted JWT and reacts accordingly with a success or failure\
    \ response.\n\nSee Figure [14-1](#490565_1_En_14_Chapter.xhtml#Fig1).\n\n![](images/490565_1_En_14_Chapter/490565_1_En_14_Fig1_HTML.png)\n\
    \nA block diagram of the JWT process. The client requests a username and password\
    \ that are sent to the server. It authenticates the username, claims, and sign\
    \ and sends a response to the client. The client sends any subsequent requests\
    \ to the server to check the JWT process and sends a response.\n\n**Figure 14-1**\
    \ The JWT process\n\n> **Note**  \n> As is usually the case for security-sensitive\
    \ applications, the protocol should enforce TLS. In GlassFish, you can disable\
    \ the unsecured HTTP listener; for other server products, consult the documentation.\n\
    \nBecause a secret (private) key is used, the server can be sure the JWT has not\
    \ been tampered with. From the client (browser) perspective, the JWT is a piece\
    \ of data that might contain claims like user groups. If the client is not interested\
    \ in such claims, the JWT is handed around in request and response headers, disregarding\
    \ any structure or contents.\n\n## Preparing GlassFish\n\nBecause the coding used\
    \ in this chapter needs Java runtime permissions that are not automatically granted\
    \ by GlassFish, you need to make a few adjustments to the server policy. Open\
    \ the following file:\n\n```\nGLASSFISH-INST/glassfish/domains/domain1/\nconfig/server.policy\n\
    ```\n\nAnd add the following lines to it:\n\n```\n// Make Jackson serialization\
    \ work\ngrant {\npermission java.lang.reflect.ReflectPermission\n\"suppressAccessChecks\"\
    ;\n};\n// Allow programmatic login\ngrant {\npermission javax.security.auth.AuthPermission\n\
    \"createLoginContext.fileRealm\";\npermission javax.security.auth.AuthPermission\n\
    \"doAsPrivileged\";\n};\n```\n\n## The JWT Login Process, Client Code\n\nFor the\
    \ login process, let’s assume you have input fields for the username and password,\
    \ as well as Login and Logout buttons. In addition, you have two buttons for testing\
    \ the access to secured and unsecured data, and an area for diagnostic output:\n\
    \n```\nREST Security\n\nUser:\nPassword: \nLogin\nLogout\n\nAccess Unsecured\n\
    Access Secured\n```\n\nThis is part of the main HTML file. This file and the rest\
    \ of the client code is inside the `webapp` source folder:\n\n```\nsrc\nmain\n\
    webapp\nstatic\nindex.html\njs\nscript.js\njquery-3.3.1.min.js\ncss\nstyles.css\n\
    WEB-INF\nweb.xml\nglassfish-web.xml\nbeans.xml\n```\n\nIn the `script.js` JavaScript\
    \ file, you add a variable for the JWT and the code that performs the login and\
    \ logout activities and reacts to the test buttons:\n\n```\nvar jwt = '';\n$(function()\
    \ {\n$('#loginButton').click(function(){\nvar url = \"../jwtlogin/login\";\nvar\
    \ loginObj = {\nuser: $('#user').val(),\npasswd: $('#passwd').val()\n};\n$.ajax({\n\
    method: \"PUT\",\ndataType: \"json\",\ncontentType: \"application/json\",\nurl:\
    \ url,\ndata: JSON.stringify(loginObj),\n})\n.done(function(data, status, jqXHR)\
    \ {\n$('#errOutput').html(\"\");\n$('#output').html(\"Logged in\");\njwt = jqXHR.getResponseHeader(\"\
    Authorization\");\n})\n.fail(function(jqXHR, textStatus, errorThrown) {\n$('#errOutput').html(\"\
    AJAX error: \" + errorThrown);\n$('#output').html(\"\");\njwt = \"\";\n});\n});\n\
    $('#logoutButton').click(function(){\nvar url = \"../jwtlogin/logout\";\n$.ajax({\n\
    method: \"PUT\",\ndataType: \"json\",\ncontentType: \"application/json\",\nurl:\
    \ url\n})\n.done(function(data, status, jqXHR) {\n$('#errOutput').html(\"\");\n\
    $('#output').html(\"Logged out\");\njwt = jqXHR.getResponseHeader(\"Authorization\"\
    );\n})\n.fail(function(jqXHR, textStatus, errorThrown) {\n$('#errOutput').html(\"\
    AJAX error: \" + errorThrown);\n$('#output').html(\"\");\njwt = \"\";\n});\njwt\
    \ = \"\";\n});\n$('#accessUnsecuredButton').click(function(){\nvar url = \"../unsecured/hello\"\
    ;\n$.ajax({\nmethod: \"GET\",\nheaders: {Authorization : jwt},\ndataType: \"json\"\
    ,\ncontentType: \"application/json\",\nurl: url\n})\n.done(function(data, status,\
    \ jqXHR) {\n$('#output').html(data.msg);\n$('#errOutput').html(\"\");\n})\n.fail(function(jqXHR,\
    \ textStatus, errorThrown) {\n$('#output').html(\"\");\n$('#errOutput').html(\"\
    AJAX error: \" + errorThrown);\n});\n});\n$('#accessSecuredButton').click(function(){\n\
    var url = \"../secured/hello\";\n$.ajax({\nmethod: \"GET\",\nheaders: {Authorization\
    \ : jwt},\ndataType: \"json\",\ncontentType: \"application/json\",\nurl: url\n\
    })\n.done(function(data, status, jqXHR) {\n$('#output').html(data.msg);\n$('#errOutput').html(\"\
    \");\n})\n.fail(function(jqXHR, textStatus, errorThrown) {\n$('#output').html(\"\
    \");\n$('#errOutput').html(\"AJAX error: \" + errorThrown);\n});\n});\n});\n```\n\
    \nThe button `onclick` handlers construct AJAX `PUT` requests and send them to\
    \ the server. Result and error messages from the server go to the diagnostic output\
    \ fields. Upon successful login, the JWT send by the server is stored in the global\
    \ `jwt` variable.\n\nThe `styles.css` CSS file for now contains just a few basic\
    \ styling instructions:\n\n```\nbody { color: #000044; }\ndiv.clearfloat { clear:\
    \ both; }\n.err { color: red; };\n```\n\nThe `WEB-INF/web.xml` file declares the\
    \ REST servlet. Since you’re adding programmatic security, you don’t need to add\
    \ security-related configuration entries here:\n\n```\nRest Security\n\njakarta.ws.rs.core.Application\n\
    \njakarta.ws.rs.core.Application\n\n/*\n```\n\nThe `beans.xml` file specifies\
    \ `all` as the discovery mode:\n\nThe server-specific deployment descriptor `glassfish-web.xml`\
    \ can have this basic form:\n\n## Server Code\n\nThe server-side classes go into\
    \ the `book.jakartapro.restsecurity` packages:\n\n```\nsrc\nmain\njava\nbook\n\
    jakartapro\nrestsecurity\nStaticContent.java\nNonSecured.java\nSecured.java\n\
    jwt\nJWTLogin.java\nJWTTokenNeeded.java\nJWTTokenNeededFilter.java\nKeyGenerator.java\n\
    JWTKeyGeneratorImpl.java\n```\n\nOf course, you can adapt this according to your\
    \ needs.\n\nThe `StaticContent` class is a simple controller serving the static\
    \ parts from inside the `static/` portion of the web application."
