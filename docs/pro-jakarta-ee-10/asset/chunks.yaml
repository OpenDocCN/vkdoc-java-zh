- fmt: '# Installing and Running Under Windows


    The GlassFish installation instructions for Windows are similar to those for Linux.
    Unzip the GlassFish distribution and add the following


    ```

    set AS_JAVA=C:\path\to\your\sdk

    ```


    to the end of the `GLASSFISH-INST/glassfish/config/asenv.bat` path. If you don’t
    want to use the system’s default Java version, set the `JAVA_HOME` environment
    variable accordingly. Then run this in the console:


    ```

    chdir GLASSFISH-INST

    bin\asadmin start-domain

    ```


    The server should start and the console output should look similar to this:


    ```

    ...

    Admin Port: 4848

    Command start-domain executed successfully.

    ```


    To access the web administrator frontend, open a browser window at `http://localhost:4848`
    (or whatever port you configured); see Figure [1-1](#490565_1_En_1_Chapter.xhtml#Fig1).


    ## GlassFish Application Debugging


    In order to enable debugging for Jakarta EE applications in GlassFish, one possibility
    is to start the server using the `--debug` flag:


    ```

    cd GLASSFISH-INST

    bin/asadmin --debug start-domain

    ```


    The default debugging port of GlassFish is `9009`.


    You can also use the web administrator console at `http://localhost:4848`. Choose
    Configurations ➤ Server-config ➤ JVM Settings ➤ General tab. Then check the Debug
    checkbox. In the Debug Options field, you can change the debugging options, like
    the port and others. You have to restart the server after you change any debugging
    settings.


    Once debugging is enabled, you can use a debugger like the one included in the
    Eclipse IDE to set breakpoints and investigate the program flow step-by-step.


    ## Elaborated GlassFish Operation Instructions


    You will find verbose information about the `asadmin` command and other operation
    procedures in the online documentation at [`https://glassfish.org/documentation`](https://glassfish.org/documentation),
    as well as in the *Beginning Jakarta EE* book from the same author and publisher
    (ISBN: 978-1-4842-5078-5).


    # Creating and Building Projects with Eclipse


    Eclipse is an IDE (Integrated Development Environment) with a plethora of functionalities
    that help you develop Java Enterprise projects. It is freely available and you
    can use it for commercial and non-commercial projects free of charge.


    Eclipse can be extended by plugins, many of which are developed by the community
    and are free to use. Plugins, however, might also come from vendors and you might
    have to buy licenses to use them. This book uses free plugins. If you feel tempted
    to try proprietary plugins, which under the circumstances might boost your development,
    visit the Eclipse marketplace at


    ```

    https://marketplace.eclipse.org

    ```


    Consult each plugin’s documentation to learn more about such extensions.


    ## Installing Eclipse


    Eclipse comes in several variants. To download any of them, go to


    ```

    https://www.eclipse.org/downloads/

    ```


    This book uses the Eclipse IDE for Enterprise Java Developers variant.


    Note


    If you choose to download the installer, you will be later asked for the variant.
    To select the Enterprise variant from the start, click the Download Packages link
    and choose the Enterprise version on the next page.


    This book uses Eclipse version 2022-09, but you can use higher versions. Just
    remember that if you run into trouble without an obvious solution, downgrading
    to Eclipse 2022-09 is an option.


    Use any installation folder suitable for your needs. Plugin installations and
    version upgrades go into that folder, so make sure you have appropriate file access
    rights. On my Linux box, I usually put Eclipse in a folder called:


    ```

    /opt/eclipse-2022-09

    ```


    (or whatever version you have). I make it writable to my Linux user, as follows:


    ```

    cd /opt

    USER=...  # enter user name here

    GROUP=... # enter group name here

    chown -R $USER.$GROUP eclipse-2022-09

    ```


    This changes the ownership of all files of the Eclipse installation, and it makes
    sense for a one-user workstation. If instead you have different users for Eclipse,
    you can create a new group called `eclipse` and allow write access to that group:


    ```

    cd /opt

    groupadd eclipse

    chgrp -R eclipse eclipse-2022-09

    chmod -R g+w eclipse-2022-09

    USER=...  # enter your username here

    usermod -a -G eclipse $USER

    ```


    The `chgrp ...` command changes the group ownership and the `chmod ...` command
    allows write access for all group members. The `usermod ...` command adds a particular
    user to the new group.


    Note


    You need to be `root` for these commands. Also note that the `usermod` command
    does not affect the currently active window manager session on the PC. That means
    you must restart your system or, depending on your distribution, log out and log
    in again for that command to take effect.


    As a last step, you can provide a symbolic link to the Eclipse installation folder:


    ```

    cd /opt

    ln -s eclipse-2022-09 eclipse

    ```


    This makes it easier to switch between different Eclipse versions on your system.


    On a Windows system, the installer sets the access rights for you and it is usually
    possible for any normal user to install plugins. This, however, depends on the
    Windows version and your system’s configuration. In a corporate environment, you
    can configure more fine-grained access rights using Window’s own access rights
    management. This could include not allowing normal users to install plugins or
    upgrades and creating superusers for administrative purposes.


    ## Configuring Eclipse


    Upon startup, Eclipse uses the default Java version installed on your system.
    If it cannot find Java or if you have several Java versions installed, you can
    explicitly tell Eclipse which Java to choose. To this aim, open the `ECLIPSE-INST/eclipse.ini`
    file and add the following line:


    ```

    -vm

    /path/to/your/jdk/bin/java

    ```


    Add this line directly above this `-vmargs` line:


    ```

    ...

    openFile

    --launcher.appendVmargs

    -vm

    /path/to/your/jdk/bin/java

    -vmargs

    ...

    ```


    The format of the `eclipse.ini` file depends on your Eclipse version. Visit [`https://wiki.eclipse.org/Eclipse.ini`](https://wiki.eclipse.org/Eclipse.ini)
    for the correct syntax. On that site, you will also find precise instructions
    for specifying the Java executable path. The syntax I show here is for Eclipse
    2022-09.


    On Windows PCs, you specify the path as used on Windows systems:


    ```

    ...

    -vm

    C:\path\to\your\jdk\bin\javaw

    ...

    ```


    Don’t use escaped backslashes (such as in `C:\\path\\to\\...`), as you would expect
    for Java-related files!


    ## Adding Java Runtimes


    Eclipse itself is a Java application, and in the preceding section, you learned
    how to tell Eclipse which Java to choose for its own interests. For the development,
    you have to tell Eclipse which Java to use for compiling and running applications.


    To do so, note the paths of all JDK installations you want to use for Eclipse
    development. Then, inside Eclipse, choose Window ➤ Preferences ➤ Java ➤ Installed
    JREs. Eclipse is usually clever enough to automatically provide the JRE it used
    for its own startup. If this is enough for you, you don’t have to do anything.
    Otherwise, click the Add button to register more JREs. In the subsequent wizard
    dialog box, select Standard VM as the JRE type.


    Select the checkbox to mark your primary JRE and don’t forget to click the Apply
    or Apply and Close button to register your changes.'
  raw: '## Installing and Running Under Windows


    The GlassFish installation instructions for Windows are similar to those for Linux.
    Unzip the GlassFish distribution and add the following


    ```

    set AS_JAVA=C:\path\to\your\sdk

    ```


    to the end of the `GLASSFISH-INST/glassfish/config/asenv.bat` path. If you don’t
    want to use the system’s default Java version, set the `JAVA_HOME` environment
    variable accordingly. Then run this in the console:


    ```

    chdir GLASSFISH-INST

    bin\asadmin start-domain

    ```


    The server should start and the console output should look similar to this:


    ```

    ...

    Admin Port: 4848

    Command start-domain executed successfully.

    ```


    To access the web administrator frontend, open a browser window at `http://localhost:4848`
    (or whatever port you configured); see Figure [1-1](#490565_1_En_1_Chapter.xhtml#Fig1).


    ## GlassFish Application Debugging


    In order to enable debugging for Jakarta EE applications in GlassFish, one possibility
    is to start the server using the `--debug` flag:


    ```

    cd GLASSFISH-INST

    bin/asadmin --debug start-domain

    ```


    The default debugging port of GlassFish is `9009`.


    You can also use the web administrator console at `htp://localhost:4848`. Choose
    Configurations ➤ Server-config ➤ JVM Settings ➤ General tab. Then check the Debug
    checkbox. In the Debug Options field, you can change the debugging options, like
    the port and others. You have to restart the server after you change any debugging
    settings.


    Once debugging is enabled, you can use a debugger like the one included in the
    Eclipse IDE to set breakpoints and investigate the program flow step-by-step.


    ## Elaborated GlassFish Operation Instructions


    You will find verbose information about the `asadmin` command and other operation
    procedures in the online documentation at [`https://glassfish.org/documentation`](https://glassfish.org/documentation),
    as well as in the *Beginning Jakarta EE* book from the same author and publisher
    (ISBN: 978-1-4842-5078-5).


    # 2. Creating and Building Projects with Eclipse


    Eclipse is an IDE (Integrated Development Environment) with a plethora of functionalities
    that help you develop Java Enterprise projects. It is freely available and you
    can use it for commercial and non-commercial projects free of charge.


    Eclipse can be extended by plugins, many of which are developed by the community
    and are free to use. Plugins, however, might also come from vendors and you might
    have to buy licenses to use them. This book uses free plugins. If you feel tempted
    to try proprietary plugins, which under the circumstances might boost your development,
    visit the Eclipse marketplace at


    ```

    https://marketplace.eclipse.org

    ```


    Consult each plugin’s documentation to learn more about such extensions.


    ## Installing Eclipse


    Eclipse comes in several variants. To download any of them, go to


    ```

    https://www.eclipse.org/downloads/

    ```


    This book uses the Eclipse IDE for Enterprise Java Developers variant.


    Note


    If you choose to download the installer, you will be later asked for the variant.
    To select the Enterprise variant from the start, click the Download Packages link
    and choose the Enterprise version on the next page.


    This book uses Eclipse version 2022-09, but you can use higher versions. Just
    remember that if you run into trouble without an obvious solution, downgrading
    to Eclipse 2022-09 is an option.


    Use any installation folder suitable for your needs. Plugin installations and
    version upgrades go into that folder, so make sure you have appropriate file access
    rights. On my Linux box, I usually put Eclipse in a folder called:


    ```

    /opt/eclipse-2022-09

    ```


    (or whatever version you have). I make it writable to my Linux user, as follows:


    ```

    cd /opt

    USER=...  # enter user name here

    GROUP=... # enter group name here

    chown -R $USER.$GROUP eclipse-2022-09

    ```


    This changes the ownership of all files of the Eclipse installation, and it makes
    sense for a one-user workstation. If instead you have different users for Eclipse,
    you can create a new group called `eclipse` and allow write access to that group:


    ```

    cd /opt

    groupadd eclipse

    chgrp -R eclipse eclipse-2022-09

    chmod -R g+w eclipse-2022-09

    USER=...  # enter your username here

    usermod -a -G eclipse $USER

    ```


    The `chgrp ...` command changes the group ownership and the `chmod ...` command
    allows write access for all group members. The `usermod ...` command adds a particular
    user to the new group.


    Note


    You need to be `root` for these commands. Also note that the `usermod` command
    does not affect the currently active window manager session on the PC. That means
    you must restart your system or, depending on your distribution, log out and log
    in again for that command to take effect.


    As a last step, you can provide a symbolic link to the Eclipse installation folder:


    ```

    cd /opt

    ln -s eclipse-2022-09 eclipse

    ```


    This makes it easier to switch between different Eclipse versions on your system.


    On a Windows system, the installer sets the access rights for you and it is usually
    possible for any normal user to install plugins. This, however, depends on the
    Windows version and your system’s configuration. In a corporate environment, you
    can configure more fine-grained access rights using Window’s own access rights
    management. This could include not allowing normal users to install plugins or
    upgrades and creating superusers for administrative purposes.


    ## Configuring Eclipse


    Upon startup, Eclipse uses the default Java version installed on your system.
    If it cannot find Java or if you have several Java versions installed, you can
    explicitly tell Eclipse which Java to choose. To this aim, open the `ECLIPSE-INST/eclipse.ini`
    file and add the following line:


    ```

    -vm

    /path/to/your/jdk/bin/java

    ```


    Add this line directly above this `-vmargs` line:


    ```

    ...

    openFile

    --launcher.appendVmargs

    -vm

    /path/to/your/jdk/bin/java

    -vmargs

    ...

    ```


    The format of the `eclipse.ini` file depends on your Eclipse version. Visit [`https://wiki.eclipse.org/Eclipse.ini`](https://wiki.eclipse.org/Eclipse.ini)
    for the correct syntax. On that site, you will also find precise instructions
    for specifying the Java executable path. The syntax I show here is for Eclipse
    2022-09.


    On Windows PCs, you specify the path as used on Windows systems:


    ```

    ...

    -vm

    C:\path\to\your\jdk\bin\javaw

    ...

    ```


    Don’t use escaped backslashes (such as in `C:\\path\\to\\...`), as you would expect
    for Java-related files!


    ## Adding Java Runtimes


    Eclipse itself is a Java application, and in the preceding section, you learned
    how to tell Eclipse which Java to choose for its own interests. For the development,
    you have to tell Eclipse which Java to use for compiling and running applications.


    To do so, note the paths of all JDK installations you want to use for Eclipse
    development. Then, inside Eclipse, choose Window ➤ Preferences ➤ Java ➤ Installed
    JREs. Eclipse is usually clever enough to automatically provide the JRE it used
    for its own startup. If this is enough for you, you don’t have to do anything.
    Otherwise, click the Add button to register more JREs. In the subsequent wizard
    dialog box, select Standard VM as the JRE type.


    Select the checkbox to mark your primary JRE and don’t forget to click the Apply
    or Apply and Close button to register your changes.'
  trans: '

    ## 在 Windows 下安装与运行


    GlassFish 在 Windows 上的安装说明与 Linux 类似。解压 GlassFish 发行版后，将以下内容


    ```

    set AS_JAVA=C:\path\to\your\sdk

    ```


    添加到 `GLASSFISH-INST/glassfish/config/asenv.bat` 路径的末尾。如果你不想使用系统的默认 Java 版本，请相应设置
    `JAVA_HOME` 环境变量。然后在控制台中运行：


    ```

    chdir GLASSFISH-INST

    bin\asadmin start-domain

    ```


    服务器应启动，控制台输出应类似于：


    ```

    ...

    Admin Port: 4848

    Command start-domain executed successfully.

    ```


    要访问 Web 管理员前端，请在浏览器中打开 `http://localhost:4848`（或你配置的任何端口）；参见图 1-1。


    ## GlassFish 应用程序调试


    为了在 GlassFish 中启用 Jakarta EE 应用程序的调试，一种方法是使用 `--debug` 标志启动服务器：


    ```

    cd GLASSFISH-INST

    bin\asadmin --debug start-domain

    ```


    GlassFish 的默认调试端口是 `9009`。


    你也可以使用位于 `htp://localhost:4848` 的 Web 管理员控制台。依次选择 Configurations ➤ Server-config
    ➤ JVM Settings ➤ General 选项卡。然后勾选 Debug 复选框。在 Debug Options 字段中，你可以更改调试选项，例如端口等。更改任何调试设置后，必须重新启动服务器。


    启用调试后，你可以使用 Eclipse IDE 中内置的调试器来设置断点并逐步检查程序流程。


    ## 详细的 GlassFish 操作说明


    你可以在在线文档 [`https://glassfish.org/documentation`](https://glassfish.org/documentation)
    以及同一作者和出版社出版的 *Beginning Jakarta EE* 一书（ISBN：978-1-4842-5078-5）中找到关于 `asadmin`
    命令和其他操作流程的详细信息。


    # 2. 使用 Eclipse 创建和构建项目


    Eclipse 是一个 IDE（集成开发环境），拥有大量功能，可帮助你开发 Java 企业项目。它是免费提供的，你可以免费将其用于商业和非商业项目。


    Eclipse 可以通过插件进行扩展，其中许多插件由社区开发且免费使用。然而，插件也可能来自供应商，你可能需要购买许可证才能使用它们。本书使用免费插件。如果你倾向于尝试专有插件（在某些情况下可能会提升你的开发效率），请访问
    Eclipse 市场：


    ```

    https://marketplace.eclipse.org

    ```


    请查阅每个插件的文档以了解有关此类扩展的更多信息。


    ## 安装 Eclipse


    Eclipse 有多个变体。要下载其中任何一个，请访问：


    ```

    https://www.eclipse.org/downloads/

    ```


    本书使用 Eclipse IDE for Enterprise Java Developers 变体。


    注意


    如果你选择下载安装程序，稍后系统会要求你选择变体。要一开始就选择企业版变体，请点击 Download Packages 链接，并在下一页选择企业版。


    本书使用 Eclipse 2022-09 版本，但你可以使用更高版本。请记住，如果你遇到没有明显解决方案的问题，降级到 Eclipse 2022-09 是一个选择。


    使用任何适合你需求的安装文件夹。插件安装和版本升级都会进入该文件夹，因此请确保你拥有适当的文件访问权限。在我的 Linux 机器上，我通常将 Eclipse
    放在一个名为：


    ```

    /opt/eclipse-2022-09

    ```


    的文件夹中（或你拥有的任何版本）。我使其对我的 Linux 用户可写，如下所示：


    ```

    cd /opt

    USER=...  # 在此处输入用户名

    GROUP=... # 在此处输入组名

    chown -R $USER.$GROUP eclipse-2022-09

    ```


    这会更改 Eclipse 安装的所有文件的所有权，这对于单用户工作站来说是合理的。如果你有多个 Eclipse 用户，你可以创建一个名为 `eclipse`
    的新组，并允许对该组进行写访问：


    ```

    cd /opt

    groupadd eclipse

    chgrp -R eclipse eclipse-2022-09

    chmod -R g+w eclipse-2022-09

    USER=...  # 在此处输入你的用户名

    usermod -a -G eclipse $USER

    ```


    `chgrp ...` 命令更改组所有权，`chmod ...` 命令允许所有组成员进行写访问。`usermod ...` 命令将特定用户添加到新组。


    注意


    你需要以 `root` 身份执行这些命令。另请注意，`usermod` 命令不会影响 PC 上当前活动的窗口管理器会话。这意味着你必须重新启动系统，或者根据你的发行版，注销并重新登录才能使该命令生效。


    作为最后一步，你可以为 Eclipse 安装文件夹提供一个符号链接：


    ```

    cd /opt

    ln -s eclipse-2022-09 eclipse

    ```


    这使得在你的系统上切换不同的 Eclipse 版本更加容易。


    在 Windows 系统上，安装程序会为你设置访问权限，通常任何普通用户都可以安装插件。然而，这取决于 Windows 版本和你的系统配置。在企业环境中，你可以使用
    Windows 自身的访问权限管理来配置更细粒度的访问权限。这可能包括不允许普通用户安装插件或升级，以及为管理目的创建超级用户。


    ## 配置 Eclipse


    启动时，Eclipse 使用系统上安装的默认 Java 版本。如果找不到 Java，或者你安装了多个 Java 版本，你可以明确告诉 Eclipse 选择哪个
    Java。为此，打开 `ECLIPSE-INST/eclipse.ini` 文件并添加以下行：


    ```

    -vm

    /path/to/your/jdk/bin/java

    ```


    将此行直接添加到 `-vmargs` 行上方：


    ```

    ...

    openFile

    --launcher.appendVmargs

    -vm

    /path/to/your/jdk/bin/java

    -vmargs

    ...

    ```


    `eclipse.ini` 文件的格式取决于你的 Eclipse 版本。请访问 [`https://wiki.eclipse.org/Eclipse.ini`](https://wiki.eclipse.org/Eclipse.ini)
    获取正确的语法。在该网站上，你还会找到指定 Java 可执行文件路径的精确说明。我在此处展示的语法适用于 Eclipse 2022-09。


    在 Windows PC 上，你按照 Windows 系统使用的路径来指定：


    ```

    ...

    -vm

    C:\path\to\your\jdk\bin\javaw

    ...

    ```


    不要使用转义的反斜杠（例如 `C:\\path\\to\\...`），尽管你可能期望 Java 相关文件会这样使用！


    ## 添加 Java 运行时


    Eclipse 本身是一个 Java 应用程序，在前面的部分中，你学习了如何告诉 Eclipse 为其自身选择哪个 Java。对于开发，你必须告诉 Eclipse
    使用哪个 Java 来编译和运行应用程序。


    为此，记下你想要用于 Eclipse 开发的所有 JDK 安装的路径。然后，在 Eclipse 内部，选择 Window ➤ Preferences ➤ Java
    ➤ Installed JREs。Eclipse 通常足够智能，会自动提供其用于自身启动的 JRE。如果这对你来说足够了，你无需执行任何操作。否则，单击 Add
    按钮以注册更多 JRE。在随后的向导对话框中，选择 Standard VM 作为 JRE 类型。


    选中复选框以标记你的主 JRE，并且不要忘记单击 Apply 或 Apply and Close 按钮以注册你的更改。

