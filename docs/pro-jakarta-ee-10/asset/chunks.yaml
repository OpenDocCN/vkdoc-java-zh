    \ |\n| `gradle.properties` | → | `gradle.properties` |\n| `src/*` | → | `src/*`\
    \ |\n\n首先，在 NetBeans 中选择 Gradle ➤ Java 应用程序来创建一个 Java 项目。勾选“初始化 Gradle Wrapper”复选框，以便向导还会在项目中生成一组非\
