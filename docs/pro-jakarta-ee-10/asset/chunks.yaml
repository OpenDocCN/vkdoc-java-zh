  trans: "\n# 终端 2\ncd fluentd\nfluentd -c fluent.conf -v\n```\n\n回到终端 1，向 Fluentd\
    \ 进程发送输入并检查其输出：\n\n```\necho '{\"json\":\"message\"}' | fluent-cat debug.test\n\
    ```\n\n在终端 2 中，你现在应该看到类似这样的内容：\n\n```\n2022-03-27 10:10:22.741302646 +0200 debug.test:\n\
    {\"json\":\"message\"}\n```\n\n在 `fluentd -c fluent.conf` 中，你告诉 Fluentd 使用 `fluent.conf`\
    \ 作为配置文件。这里定义了日志消息的内部路由和转换规则。如果你更改了配置，必须重启进程（按 Ctrl+C，然后再次输入 `fluentd -c fluent.conf\
    \ -v`）。当然，对于你自己的实验，你可以使用自己的配置文件。如果你希望减少调试输出的详细程度，可以省略 `-v` 标志。\n\n使用日志文件作为输入\n\
    \n在 Fluentd 中，输入由*输入插件*处理。你在配置文件的以下部分指定它们：\n\n```\n...\n\n```\n\n输入插件有很多种类型，但就本文而言，最重要的插件是\
    \ Tail 插件，它监视添加到文件中的行。以下是一个使用日志文件作为输入的工作示例配置：\n\n```\n@type tail\npath /path/to/server.log\n\
    pos_file server.log.pos\ntag serv.log\n\n@type regexp\nexpression \\\n/^\\[(?[^\\\
    ]]*)\\] \\\n(?[^ ]*) \\\n(?[^ ]*) (?.*)$/\ntime_key logtime\ntime_format %Y-%m-%d\
    \ %H:%M:%S %z\n\n@type stdout\n@id stdout_output\n\n```\n\n（删除末尾的 `\\` 字符，包括换行符和紧随其后的空白字符。）由于\
    \ `<parse> ... </parse>` 内部的格式规范，Tail 插件可以处理如下输入行：\n\n```\n[2022-02-28 12:00:00\
    \ +0900] error\nbook.jakartapro.TheClass Invalid integer 42\n```\n\n`<match> ...\
    \ </match>` 标签指定了一个输出插件。目前，它只是将日志记录打印到 `STDOUT`。你可以将此配置保存为 `conf1.conf` 文件，通过\
    \ Ctrl+C 终止 Fluentd 进程，然后通过 `fluentd -c conf1.conf -v` 重新启动它。\n\n为了进行简单测试，将 `path\
    \ ...` 行替换为 `path server.log`，重启 Fluentd，并向当前目录下的 `server.log` 文件发送几行测试数据：\n\n\
    ```\ndate=`date +%F' '%T' '%z`\necho \"[${date}] error book.jakartapro.TheClass\
    \ \" \\\n\"Invalid integer 42\" >> server.log\necho \"[${date}] warn book.jakartapro.TheClass\
    \ \" \\\n\"String length > 64\" >> server.log\n```\n\n输出应该显示类似这样的内容：\n\n```\n\
    2022-03-28 10:55:29.000000000 +0200 serv.log:\n{\"level\":\"error\",\"name\":\"\
    book.jakartapro.TheClass\",\n\"title\":\"Invalid integer 42\"}\n2022-03-28 10:55:29.000000000\
    \ +0200 serv.log:\n{\"level\":\"warn\",\"name\":\"book.jakartapro.TheClass\",\n\
    \"title\":\"String length > 64\"}\n```\n\n为了更好地理解此设置的工作原理，让我们逐步研究 `<source> ...\
    \ </source>` 内部的所有指令：\n\n*   `@type tail`\n\n    指向 *Tail* 插件。\n\n*   `path /path/to/server.log`\n\
    \n    指定被监视日志文件的路径。可以包含通配符，这允许你监视包含滚动日志文件的文件夹。\n\n*   `pos_file server.log.pos`\n\
    \n    Tail 插件需要此文件来保存其当前状态。你可以给它任意喜欢的名称。\n\n*   `tag serv.log`\n\n    Fluentd\
    \ 会向消息记录添加一个标签。此行指示 Fluentd 使用 `serv.log` 标记来自 Tail 插件的消息。标签很重要，因为它们被用作过滤器和转换器的区分符，并决定使用哪个输出插件。\n\
    \n*   `@type regexp`\n\n    （在 `<parse>...<parse>` 内部。）使用正则表达式将每个日志行拆分为多个部分。其他类型在插件的文档中有描述。\n\
    \n*   `expression ...`\n\n    （在 `<parse>...<parse>` 内部。）指定正则表达式。\n\n*   **time_key\
    \ logtime**\n\n    （在 `<parse>...<parse>` 内部。）指定使用日志行的哪一部分来确定日志记录的时间戳。与正则表达式中的\
    \ `<logtime>` 标识符匹配。\n\n*   **time_format ...**\n\n    （在 `<parse>...<parse>`\
    \ 内部。）时间字符串的格式。\n\n过滤\n\n过滤插件可用于根据条件过滤掉日志事件。或者，你也可以使用它们来丰富和转换消息。例如，你可以修改上一节的配置，添加一个过滤器，将\
    \ Fluentd 消息限制为“error”日志级别。为此，请在配置中添加以下内容：\n\n```\n...\n\n@type grep\n\nkey level\n\
    pattern /error/\n\n...\n\n```\n\n此声明表示：仅允许（通过 `@type grep`）在 `level` 字段中包含“error”的事件（通过\
    \ `<regexp>`）。这样，就可以在原始日志文件中保留完整的日志记录，同时将所有错误发送到特殊目的地，例如监控平台。\n\n使用多条路由\n\nFluentd\
    \ 中的消息路由可以通过名为 `rewrite_tag_filter` 的输出插件实现。其背后的思想是根据条件将消息发送到不同的输出插件。该插件是输出插件的原因源于\
    \ Fluentd 的架构。\n\n注意\n\n你必须运行 `fluent-gem install fluent-plugin-rewrite-tag-filter`\
    \ 来安装此插件。\n\n以下配置让重写/路由插件接收标记为 `serv.log` 的消息，提取 `level` 字段，并根据 `level` 字段的内容，使用扩展标签（如\
    \ `error.serv.log` 或 `warn.serv.log`）重写消息：\n\n```\ntag serv.log\n\n# ... 必须构建包含\
    \ \"level\" 字段的记录\n\n# 重写消息\n\n@type rewrite_tag_filter\n\nkey level       # 使用\
    \ \"level\" 字段\npattern /(\\w+)/ # 获取整个字段\ntag $1.${tag}   # 新的标签值\n#\n\n# 获取\
    \ level=\"error\" 的重写标签\n\n@type file\npath serv.error.log\n\ntimekey 1d\ntimekey_use_utc\
    \ true\ntimekey_wait 10s\n"
- fmt: "# Fetches the rewritten tag with `level=\"warn\"`\n\n`@type file`\n`path serv.warn.log`\n\
    `timekey 1d`\n`timekey_use_utc true`\n`timekey_wait 10s`\n\n```\nThis example\
    \ writes its output to different files. You can of course\nchoose from the other\
    \ output plugins.\n```\n\n## Fluentd Output\n\nAfter input, message parsing, filtering,\
    \ and routing, Fluentd sends the messages to its output layer. The way that messages\
    \ are transmitted to the outer world is determined by the output plugins. In the\
    \ previous sections of this chapter, you used the `stdout` plugin to send messages\
    \ to the console, and the `file` plugin wrote the message records to local files.\n\
    \nThere are many more output plugins. An almost complete list of them is as follows:\n\
    \n* `null` — Drops messages.\n* `stdout` — Writes messages to the console attached\
    \ to the Fluentd process. You use this plugin mainly during development and for\
    \ debugging purposes.\n* `forward` — Sends messages to other Fluentd nodes. The\
    \ plugin is very elaborate and there are many options to control the message flow.\n\
    * `file` — Writes to the local file system. Writes to rolling files based on a\
    \ freely configurable time period.\n* `exec` — Sends messages to an operating\
    \ system command. This plugin is actually quite powerful, since you can basically\
    \ do anything you like with logging records. Even if the starting up operating\
    \ system processes are slow compared to built-in output plugins, you still can\
    \ use the `exec` plugin efficiently in a heavy load environment, because you can\
    \ use buffers to collect message records in memory, and then send messages in\
    \ bulk to the OS process.\n* `http` — Sends messages to an HTTP server. This could\
    \ be a REST interface receiving JSON formatted data.\n* `mongo` and `mongo_replset`\
    \ — Sends messages to a MongoDB database or MongoDB replica set.\n* `s3` — Forwards\
    \ data to an Amazon S3 cloud storage instance.\n* `webhdfs` — Sends messages to\
    \ a Hadoop instance.\n* `kafka` — Sends messages to Apache Kafka for further message\
    \ routing.\n* `elasticsearch` — Sends messages to ElasticSearch.\n* `opensearch`\
    \ — Sends messages to OpenSearch.\n\nFive more output plugins—`copy`, `roundrobin`,\
    \ `exec_filter`, `relabel`, and `rewrite_tag_filter`—do not actually output data,\
    \ but instead control the routing of data in Fluentd. You can read more about\
    \ those plugins in Fluentd’s documentation.\n\n## Further Reading\n\nThis chapter\
    \ covered only a subset of Fluentd’s capabilities. The best place to learn more\
    \ about Fluentd is from the official documentation at [`https://docs.fluentd.org/`](https://docs.fluentd.org/).\n\
    \n# 36. Performance Troubleshooting\n\nIn many IT projects, application performance\
    \ is monitored too late in the project timeline. Sometimes application performance\
    \ is completely neglected, which too often results in unsatisfied customers and\
    \ expensive software fixes while the application runs in a production stage. It\
    \ is therefore advisable to include performance tests and performance optimization\
    \ early on in a project, such as during development, or at least during the test\
    \ phase. This chapter investigates techniques and best practices for optimizing\
    \ application performance.\n\n> **Note:** The ideas presented in this chapter\
    \ are not limited to Jakarta EE applications. You can use them for other server\
    \ technologies as well.\n\n## Load and Performance Tests\n\nIn order to see how\
    \ your application will behave in real-world scenarios before it goes to production,\
    \ you must add a testing phase to your project plan. Testing is a science of its\
    \ own, but there is a distinction between unit tests, integration tests, functional\
    \ test, and nonfunctional requirement (NFR) tests. While unit tests cover components\
    \ as they are written by developers, functional tests focus on behavioral aspects\
    \ of an application, and integration tests try to determine whether the various\
    \ components of an application work together well in an IT landscape. Finally,\
    \ NFR tests check the performance of an application or the application components,\
    \ and they also examine the stability of an application under load (i.e., with\
    \ many concurrently acting, simulated users at work).\n\nConsider for example\
    \ a web page that books a service. In a corresponding test, you should check the\
    \ following:\n\n* When data is entered and submitted, are subsequent business\
    \ processes—such as shipping, allocating business resources, and billing—triggered?\
    \ Does the next page loaded show the expected result? Is the database updated\
    \ correctly? This refers to functional and integration tests.\n* What is the elapsed\
    \ time between submitting the data and loading the next page (such as a confirmation\
    \ page)? This refers to performance tests. For more realistic results, you should\
    \ run these tests while the application is under load. This means you simulate\
    \ many, concurrently acting users.\n* When the application is under load, does\
    \ it still work correctly? Are enough computational resources available? This\
    \ refers to load tests.\n* When NFR tests are running, how does the memory consumption\
    \ look? What can you say about the process load as seen from the operating system?\
    \ Such secondary data can improve the value of NFR tests, and it would be nice\
    \ if an NFR test tool could add such figures.\n\nPerformance and load tests are\
    \ not limited to web pages by talking to web components using HTTP. You can also\
    \ directly address web services (SOAP) or REST interfaces. You can even test mail\
    \ servers by writing NFR tests that communicate via SMTP, or you can write tests\
    \ targeting JMS endpoints. This flexibility allows for a fine-grained test setup,\
    \ which in contrast to coarse tests, simplifies the identification of bottlenecks.\n\
    \n## NFR Testing Methodology\n\nAn NFR test concept contains the following elements:\n\
    \n* Identify crucial application components with a web, web service (SOAP), or\
    \ REST interface. Any other interface is possible as well, but these three are\
    \ the most important ones.\n* Develop test cases. A test case is a series of test\
    \ steps with the following characteristics:\n  * A test case simulates a business\
    \ activity, like an order or a user registration.\n  * A test step is an atomic\
    \ action, like sending a `GET` or `POST` request to a web application or to a\
    \ REST interface.\n  * A test case might contain preparational steps. It must\
    \ be possible to automate such preparational steps. For example, if the test case\
    \ describes the deletion of a user from the user database, adding the user is\
    \ a preparational step.\n  * A test case might contain cleanup steps. It must\
    \ be possible to automate such cleanup steps. For example, if the test case describes\
    \ the registration of a user with the user database, deleting the user afterward\
    \ is a cleanup step.\n  * A test case must be repeatable.\n  * A test case must\
    \ be parallelizable. This means it must be possible for several threads to perform\
    \ the same test case at the same time, without interfering with each other.\n\
    * Describe a tool capable of running test cases. This chapter uses JMeter for\
    \ this purpose.\n* If a test case simulates a web application workflow, decide\
    \ whether frontend (web browser) activities will be included. If this is the case,\
    \ use Selenium as a testing tool, since JMeter cannot simulate browsers.\n* Decide\
    \ whether monitorable data needs to be added. This could, for example, be memory\
    \ consumption as seen by the JVM or by the operating system.\n* Describe the analysis\
    \ of NFR test outcome data.\n* Suggest improvements in order to increase performance\
    \ or stability.\n\nA collection of test cases, executed sequentially or in parallel,\
    \ is sometimes called a *test plan*. JMeter uses this idiom.\n\n## Where to Run\
    \ NFR Tests\n\nTest plans can be developed on a user workstation. In many cases,\
    \ it is also possible to run NFR tests on developer machines. Using dedicated\
    \ servers for the same purpose is an option too. Experience shows that both approaches\
    \ are valid, but the following checklist should help you to make your decision:\n\
    \n* If user workstations experience high network latency when connecting to the\
    \ application server, a dedicated NFR test server is the better option.\n* NFR\
    \ tests can run for hours. If the user workstations’ network connection is not\
    \ 100 percent reliable, a dedicated NFR test server is the better option.\n* Developer\
    \ machines usually have enough power to simulate 30 or even 100 concurrently acting\
    \ users. If this is not the case or if you need the PC to also run other applications\
    \ that require significant CPU resources, a dedicated NFR test server is the better\
    \ option.\n* Using user workstations for NFR tests is sometimes more realistic\
    \ compared to a dedicated NFR test server. In the end, application clients are\
    \ often user workstations. If this is the case for you, running NFR tests on a\
    \ developer machine is the better option.\n* Using a dedicated NFR server means\
    \ you have to transport JMeter test plans from the developer PC to the test server,\
    \ before you can start the tests. This is not rocket science, but it takes a few\
    \ minutes each time.\n* If you need to include Selenium with your NFR tests, using\
    \ a dedicated NFR test server usually is not an option.\n* Using developer PCs\
    \ for short-term tests and dedicated NFR test servers for longer running tests\
    \ is an option as well. This setup gives you the maximum amount of flexibility.\n\
    \n> **Caution:** Never run NFR tests on the same server as the application. Such\
    \ a setup generates weird effects because of back-coupling.\n\n## NFR Test Duration\n\
    \nWhile you might be tempted to schedule NFR tests for less than an hour or so,\
    \ experience indicates that it is advisable to include longer-running test in\
    \ your project plan. Running NFR tests overnight for six to ten hours provides\
    \ performance data with better statistical significance. Also, deficiencies like\
    \ memory and classloader leaks often show up only after a couple of hours. The\
    \ suggested procedure is to mix tests that run an hour or two, perhaps during\
    \ business hours, with tests that run overnight, for six to ten hours.\n\n## NFR\
    \ Tests with JMeter\n\nJMeter is an extremely versatile tool for creating and\
    \ running NFR test plans. It has a GUI for building tests of any level of complexity.\
    \ As you add more and more test elements, you can run the tests from the GUI and\
    \ investigate test outcomes using real-time diagrams or automatically updated\
    \ tables. Later, when the test plan is finished, you can run it from the terminal\
    \ on the developer machine or after you copy the test plan to a dedicated NFR\
    \ test server.\n\nSince JMeter is a Java tool, you can freely choose which operating\
    \ system you want to use. You can, for example, develop test plans on a Windows\
    \ PC and later run them on a Linux server.\n\nAs a very helpful feature, JMeter\
    \ provides a recorder for web applications. You can configure your browser to\
    \ send its requests through a proxy provided by JMeter. All requests, including\
    \ redirections, then show up as test elements in a generated test plan. This greatly\
    \ simplifies and speeds up test-plan development for complex web application workflows.\n\
    \n> **Note:** This chapter doesn’t cover this recording feature in detail, since\
    \ it is beyond the scope of the book. Visit [`https://jmeter.apache.org/usermanual/component_reference.html#HTTP(S)_Test_Script_Recorder`](https://jmeter.apache.org/usermanual/component_reference.html%2523HTTP%2528S%2529_Test_Script_Recorder)\
    \ to learn more about it.\n\nYou can download JMeter from [`https://jmeter.apache.org/`](https://jmeter.apache.org/).\
    \ This is also your primary place for getting information.\n\nIn order to simplify\
    \ the process of starting up JMeter, add the `start.sh` file to the installation\
    \ folder with these contents:\n\n```\n#!/bin/bash\n```"
