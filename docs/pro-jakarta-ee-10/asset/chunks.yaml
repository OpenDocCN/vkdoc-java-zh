    \ 上的规范。\n\n17. 自定义 CDI\n\nCDI（上下文和依赖注入）可用于获取会话或请求上下文、为 EL（表达式语言）使用注入 bean、在 JPA\
    \ 上下文中检索实体管理器等。它们这样做是为了让类能够无缝地与 Jakarta EE 提供的容器进行交互。\n然而，CDI 还有另一个经常被介绍、教程和博客文章忽略的方面：你可以让\
    \ CDI 构建应用程序内部的对象图，甚至使用你自己的上下文、生产者、拦截器、装饰器、原型和 CDI 风格的事件。\n\nCDI 规范\n\nJakarta\
    \ EE 10 包含 CDI 技术，版本 4.0。规范文档位于\n\n```\nhttps://jakarta.ee/specifications/cdi/4.0\n\
    ```\n\n本章讨论 CDI 在应用程序内部使用的一些有趣方面。更多信息和在线资源，如参考实现的文档，Weld 可以为你提供帮助。请访问：\n\n```\n\
    http://weld.cdi-spec.org/documentation/\n```\n\n构建对象图\n\n使用普通的 Java SE，构建对象图的*编程模型*包括显式的关联和类的实例化：\n\
    \n```\npublic class Address {\nprivate String country;\nprivate String state;\n\
    private String city;\nprivate String street;\nprivate String number;\nprivate\
    \ String zip;\n// getters and setters...\n}\npublic class Person {\nprivate String\
    \ firstName;\nprivate String lastName;\nprivate char gender;\nprivate String ssn;\n\
    private LocalDate birthday;\nprivate Address address;\n// getters and setters...\n\
    }\npublic class Invoice {\nprivate Person buyer;\nprivate LocalDateTime time;\n\
    private List entries = new ArrayList();\n// getters and setters...\n}\n...\nPerson\
    \ buyer = new Buyer();\nbuyer.setFirstName(\"Peter\");\n// Set other Buyer fields...\n\
    Invoice inv = new Invoice();\ninv.setBuyer(buyer);\ninv.setTime(LocalDateTime.now());\n\
    // Set other Invoice fields...\n```\n\n此代码片段最后几行显示的实例化和装配工作会进入你代码中的某个合适方法。\n\n\
    注意\n\n这些类都需要有自己的 Java 文件。为简单起见，本章其余部分将省略此说明。\n\n使用 CDI，你仍然声明关联，但让 CDI 引擎实例化对象并将它们分配给字段：\n\
    \n```\npublic class Address {\nprivate String country;\nprivate String state;\n\
    private String city;\nprivate String street;\nprivate String number;\nprivate\
    \ String zip;\n// getters and setters...\n}\npublic class Person {\nprivate String\
    \ firstName;\nprivate String lastName;\nprivate char gender;\nprivate String ssn;\n\
    private LocalDate birthday;\n@Inject private Address address;\n// getters and\
    \ setters...\n}\npublic class Invoice {\n@Inject private Person buyer;\nprivate\
    \ LocalDateTime time;\nprivate List entries = new ArrayList();\n// getters and\
    \ setters...\n}\n...\n// Somewhere, as a class member:\n@Inject Invoice inv;\n\
    ```\n\n由于 `@Inject`，你知道由 CDI 创建的 `Invoice` 对象*确实*在 `buyer` 字段中有一个 `Person` 实例（不要使用\
    \ `new`！），并且 `buyer`*确实*在 `address` 字段中有一个 `Address` 实例（同样，你不需要手动使用 `new` 来实例化\
    \ `Address` 实例）。\n\n非 CDI 代码和 CDI 代码之间最显著的概念性区别是对象图的引导方式。使用非 CDI，你在某个合适的方法内完成所有操作，但在使用\
    \ CDI 时，你可以*在本身受 CDI 管理的类内部*直接使用注入的字段 `@Inject Invoice inv;`。这在 Faces bean 类、REST\
    \ 端点类或 EJB 中很容易实现：\n\n```\n// Faces: -------------------------------------\n@ManagedBean\n\
    @SessionScoped\npublic class SomeJsfBean {\n@Inject Invoice inv;\n...\n}\n// REST\
    \ endpoint: -----------------------------\n@Path(\"/invoice\")\npublic class RestInvoice\
    \ {\n@Inject Invoice inv;\n@GET\n@Path(\"show\")\n@Produces(\"application/json\"\
    )\npublic String show() {\nreturn \"{ ... }\";\n}\n}\n// EJB: ---------------------------------------\n\
    @Stateful\npublic class InvoiceBean {\n@Inject Invoice inv;\n...\n}\n```\n\n顺便说一下，也可以将实例注入到构造函数和\
    \ setter 中：\n\n```\npublic class SomeClass {\n@Inject\npublic SomeClass(Invoice\
    \ inv) {\n...\n}\n...\n}\npublic class SomeClass {\n...\n@Inject\npublic setInvoice(Invoice\
    \ inv) {\n...\n}\n...\n}\n```\n\n重要的是要理解，在你的代码中，即使使用了构造函数或 setter 注入，你仍然不会显式地使用这些构造函数或\
    \ setter！\n\n如果你需要以编程方式获取 CDI bean 类的实例，可以编写以下代码：\n\n```\nimport jakarta.enterprise.inject.se.SeContainer;\n\
    import jakarta.enterprise.inject.se.SeContainerInitializer;\n...\nSeContainerInitializer\
    \ containerInit =\nSeContainerInitializer.newInstance();\nSeContainer container\
    \ = containerInit.initialize();\nInvoice proc = container.select(Invoice.class).get();\n\
    ...\n// Just for debugging / inspection, list all CDI beans\ncontainer.getBeanManager().getBeans(Object.class).\n\
    forEach(b -> {\nSystem.out.println(b);\n});\n...\ncontainer.close();\n```\n\n\
    这也是你在非 Jakarta EE 环境或精心设计的单元测试中使用 CDI 的方式。\n\n限定符\n\nCDI 也可用于自动获取接口的实现。考虑以下示例：\n\
    \n```\npublic interface Audit {\n...\n}\npublic class BasicAudit implements Audit\
    \ {\n...\n}\npublic class SomeBean {\n@Inject Audit audit;\n}\n```\n\nCDI 看到 `BasicAudit`\
    \ 是 `Audit` 接口的唯一实现，并将 `BasicAudit` 的实例注入到该字段中。\n\n但是，如果你有两个实现，例如以下设置：\n\n```\n\
    public interface Audit {\n...\n}\npublic class BasicAudit implements Audit {\n\
    ...\n}\npublic class ComplexAudit implements Audit {\n...\n}\npublic class SomeBean\
    \ {\n@Inject Audit audit;\n}\n```\n\nCDI 现在将抛出一个异常，指出它无法解析歧义依赖关系。\n\n解决此问题的一种方法是使用限定符标记不同的实现：\n\
    \n```\npublic interface Audit {\n...\n}\n// ------------------------------------------------\n\
    import java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\n\
    import static java.lang.annotation.RetentionPolicy.*;\nimport static java.lang.annotation.ElementType.*;\n\
    import jakarta.inject.Qualifier;\n@Qualifier\n@Retention(RUNTIME)\n@Target({TYPE,\
    \ METHOD, FIELD, PARAMETER})\npublic @interface Basic {}\n// ------------------------------------------------\n\
    import java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\n\
    import static java.lang.annotation.RetentionPolicy.*;\nimport static java.lang.annotation.ElementType.*;\n\
    import jakarta.inject.Qualifier;\n@Qualifier\n@Retention(RUNTIME)\n@Target({TYPE,\
    \ METHOD, FIELD, PARAMETER})\npublic @interface Complex {}\n// ------------------------------------------------\n\
    @Basic\npublic class BasicAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @Complex\npublic class ComplexAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    public class SomeBean {\n@Inject @Complex Audit audit;\n// or: @Inject @Basic\
    \ Audit audit;\n}\n```\n\n这样的注解被称为*限定符注解*。由于 `@Inject` 旁边的 `@Complex`（或 `@Basic`），CDI\
    \ 现在知道要采用哪个实现。\n\n注意\n\n如果你没有显式声明限定符，CDI 会自动将 `@Default` 限定符应用于注入。你可以通过指定 `@Any`\
    \ 来抑制此自动分配，`@Any` 表示“无限定符”。\n\n备选方案\n\n为了避免歧义依赖关系，你也可以将所有实现（除了一个）标记为 `@Alternative`：\n\
    \n```\npublic interface Audit {\n...\n}\n// ------------------------------------------------\n\
    @Default\npublic class BasicAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @Alternative\npublic class ComplexAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    public class SomeBean {\n@Inject Audit audit;\n}\n```\n\n仅当你在 `WEB-INF/beans.xml`（如果在\
    \ Jakarta EE 之外，则为 `META-INF/beans.xml`）中指定时，CDI 才会选择备选实现：\n\n```\n\nbook.jakartapro.cdi.audit.ComplexAudit\n\
    \n```\n\n或者，你可以避免向 `beans.xml` 写入内容，而是向备选实现添加 `@Priority`：\n\n```\npublic interface\
    \ Audit {\n...\n}\n// ------------------------------------------------\n@Priority(100)\
    \ @Alternative\npublic class BasicAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @Priority(101) @Alternative\npublic class ComplexAudit implements Audit {\n...\n\
    }\n// ------------------------------------------------\npublic class SomeBean\
    \ {\n@Inject Audit audit;\n}\n```\n\n具有最高 `@Priority` 值的实现获胜。你可以看到，当使用 `@Priority`\
    \ 消歧时，示例移除了 `@Default` 限定符，因为默认值不对应于可计算的优先级。\n\n生产者\n\n如果你需要对 CDI 实例化类的方式进行更多控制，或者需要以编程方式决定为注入目的需要哪个接口的实现，你可以提供一个*生产者方法*来创建\
    \ CDI bean：\n\n```\npublic interface Audit {\n...\n}\n// ------------------------------------------------\n\
    @Vetoed\npublic class BasicAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @Vetoed\npublic class ComplexAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @ApplicationScoped\npublic class AuditProducer {\n@Produces\npublic Audit produce()\
    \ {\nAudit res = null;\nif(...) { // make a decision\nres = new BasicAudit();\n\
    } else {\nres = new ComplexAudit();\n}\nreturn res;\n}\n}\n// ------------------------------------------------\n\
    public class SomeBean {\n@Inject Audit audit;\n}\n```\n\n这个例子必须向实现添加 `@Vetoed`，否则\
    \ CDI 看到的实现会在依赖关系解析过程中与生产者竞争，产生歧义异常。此外，生产者类可以有任意名称，但由于它本身是一个 CDI bean 并由 CDI 实例化，你需要向该类添加\
    \ `@ApplicationScope`，这意味着整个应用程序最多只能获得该类的一个实例。作用域将在下一节中详细讨论。\n\n生产者方法可以具有注入的参数，这可能有助于生产者方法正确地完成其工作：\n\
    \n```\n@Produces\npublic Audit produce(SomeBean b1,\nSomeOtherBean b2, ...) {\n\
    ...\n}\n```\n\n生产者方法可以像实现一样分配限定符：\n\n```\n@ApplicationScoped\npublic class AuditProducer\
    \ {\n@Produces @SomeQualifier\npublic Audit produce() {\n...\n}\n@Produces @SomeOtherQualifier\n\
    public Audit produce() {\n...\n}\n}\n// ------------------------------------------------\n\
    public class SomeBean {\n@Inject @SomeQualifier Audit audit1;\n@Inject @SomeOtherQualifier\
    \ Audit audit2;\n}\n```\n\n限定符注解的声明方式必须与实现限定符所述的方式完全相同。\n\n作用域\n\n作用域决定了 CDI 创建的\
    \ bean 的生命周期。在 Jakarta EE 环境中，你了解了几种作用域：\n\n*   `@ApplicationScoped`：\n    该作用域中的任何\
    \ bean 在应用程序的生命周期内仅实例化一次。同一应用程序的所有注入 bean 都引用同一个实例。\n\n*   `@SessionScoped`：\n\
    \    该作用域中的任何 bean 在用户会话处于活动状态时仅实例化一次。同一用户会话中发生的任何注入都引用同一个实例。\n\n*   `@RequestScoped`：\n\
    \    同一类型的所有请求作用域 bean 在请求期间引用同一个实例。\n\n*   `@ConversationScoped`：\n    与会话作用域类似，但绑定到会话内的用户活动，并由\
    \ Web 应用程序显式控制。\n\n如果 bean 没有显式声明作用域，它们将自动在 `@Dependent` 作用域内运行，这意味着它们的生命周期绑定到它们被注入的对象。`Dependent`\
    \ 作用域被称为*伪作用域*，因为它是派生的。存在第二个名为 `Singleton` 的伪作用域，它确保在 JVM 基础上只存在一个 bean 实例。\n\n\
    你需要在类型级别或生产者方法级别添加作用域声明：\n\n```\n@ApplicationScope\npublic class SomeBean {\n\
    ...\n}\n// ------------------------------------------------\npublic class SomeBean\
    \ {\n@Produces @ApplicationScoped\npublic SomeOtherBean produce() {\n...\n}\n\
    }\n```\n\n如果你只使用应用程序内部 CDI，或者在 Jakarta EE 应用程序之外运行，则只有 `@ApplicationScope`、`@Dependent`\
    \ 和 `Singleton` 作用域起作用。\n\n如果你需要挂钩到 CDI bean 的构造或销毁，或用于调试目的，你可以使用 `@PostConstruct`\
    \ 和 `@PreDestroy` 注解：\n\n```\npublic class SomeBean {\n...\n@PostConstruct\npublic\
    \ void postContruct() {\nSystem.out.println(\"POST-CONSTRUCT\");\n}\n@PreDestroy\n\
    public void preDestroy() {\nSystem.out.println(\"PRE-DESTROY\");\n}\n}\n```\n\n\
    拦截器\n拦截器用于向 CDI bean 的方法调用添加横切关注点。这意味着你可以使用它们向 bean 类添加日志记录、审计、性能测量和其他非功能性代码。\n\
    CDI 拦截器将在本书后面的第 18 章中介绍。\n\n装饰器\n装饰器与拦截器类似，因为它们都以某种方式扩展现有代码。但与拦截器相反，它们实际上会改变类的功能，因此你可以将它们用于热修复或临时功能更改之类的事情。\n\
    \nCDI bean 类可被装饰的唯一要求是它必须有一个接口。例如，考虑 `Processor` 接口和 `ProcessorImpl` 实现：\n\n```\n\
    public interface Processor {\nvoid process(Invoice inv);\n}\n// --------------------------------------------\n\
    public class ProcessorImpl implements Processor {\npublic void process(Invoice\
    \ inv) {\n// some code...\n}\n}\n```\n\n要装饰处理器，你所要做的就是编写一个装饰器类，如下所示：\n\n```\n\
    @Decorator\npublic class ProcessorImplNew implements Processor {\n@Inject @Delegate\
    \ private ProcessorImpl old;\npublic void process(Invoice inv) {\n// some other\
    \ code...\n}\n}\n```\n\n然后在 `WEB-INF/beans.xml`（如果你在 Jakarta EE 之外，则为 `META-INF/beans.xml`）中声明装饰器：\n\
    \n```\n...\n\nbook.jakartapro.cdi.decorate.ProcessorImplNew\n\n```\n\n在装饰器类中，你可以添加一个用\
    \ `@Inject @Delegate` 注解的字段。这意味着你可以访问原始实现，因此你可以将其用于装饰器代码。\n\n18. 拦截器\n\n拦截器是挂钩到方法调用或生命周期事件的方法或类。你通常会将它们用于横切关注点，例如日志记录、审计、性能测量或应用程序的任何其他非功能性方面。非功能性意味着应用程序的程序和数据流不会受到干扰，因此无论是否使用拦截器，软件功能都保持不变。\n\
    拦截目标——即被拦截的类——可以是会话 bean、消息驱动 bean 和 CDI 管理的 bean。此外，拦截目标也可以是 JPA 生命周期监听器、Servlet\
    \ 和 Faces 阶段监听器。后者通常不被称为拦截器，而更常被称为监听器，但这并不妨碍它们可以像拦截器一样使用。\n对于 Jakarta EE 10，拦截器（不是\
    \ JPA、Servlet 和 Faces 生命周期监听器）由 Interceptors 2.1 规范描述。\n\nCDI 拦截器\nCDI 拦截器用于向\
    \ CDI bean 的方法调用添加横切关注点。你可以将 CDI 拦截器应用于 CDI 管理范围内的*任何*类。这包括会话 EJB、消息驱动 bean 以及用于\
    \ Faces 和 Servlet 的 bean。\n\n要开始拦截，你首先声明一个新的注解，如下面的代码片段所示：\n\n```\nimport java.lang.annotation.Retention;\n\
    import java.lang.annotation.Target;\nimport static java.lang.annotation.RetentionPolicy.*;\n\
    import static java.lang.annotation.ElementType.*;\nimport jakarta.interceptor.InterceptorBinding;\n\
    @InterceptorBinding\n@Retention(RUNTIME)\n@Target({TYPE, METHOD, FIELD})\npublic\
    \ @interface TracingInterceptor { }\n```\n\n名称由你决定。这个例子暗示你想以某种方式跟踪程序流程。\n\n拦截器实现只需要添加\
    \ `@Interceptor` 注解和你刚刚定义的新注解：\n\n```\nimport jakarta.interceptor.*;\nimport jakarta.annotation.PostConstruct;\n\
    import jakarta.annotation.PreDestroy;\n@Interceptor\n@TracingInterceptor\npublic\
    \ class TracingInterceptorSys {\n@AroundInvoke\npublic Object logMethodEntry(InvocationContext\
    \ ctx)\nthrows Exception {\nSystem.out.println(\"Before entering method: \" +\n\
    ctx.getMethod().getName());\n// We call the next interceptor in the\n// interceptor\
    \ chain.\nreturn ctx.proceed();\n}\n@AroundConstruct\npublic void aroundConstruct(InvocationContext\
    \ ctx) {\n...\nctx.proceed();\n}\n/*or*/\n@AroundConstruct\npublic Object aroundConstruct(InvocationContext\
    \ ctx)\nthrows Exception {\n...\nreturn ctx.proceed();\n}\n@AroundTimeout\npublic\
    \ Object aroundTimeout(InvocationContext ctx)\nthrows Exception {\n...\nreturn\
    \ ctx.proceed();\n}\n@PostConstruct\npublic void postConstruct(InvocationContext\
    \ ctx) {\n...\nctx.proceed();\n}\n@PreDestroy\npublic void preDestroy(InvocationContext\
    \ ctx) {\n...\nctx.proceed();\n}\n}\n```\n\n这些注解可以自由混合。你不必全部使用它们。\n\n为了激活拦截器，需要将其添加到\
    \ `WEB-INF/beans.xml` 文件（如果在 Jakarta EE 之外，则为 `META-INF/beans.xml`）：\n\n```\n\
    ...\n\nbook.jakartapro.cdi.intercept.TracingInterceptorSys\n\n```\n\n要将拦截器应用于\
    \ CDI bean，你必须将拦截器注解添加到类或方法调用级别：\n\n```\n@TracingInterceptor\npublic class SomeBean\
    \ {\n...\n}\n// --------------------------------------------\npublic class SomeBean\
    \ {\n...\n@TracingInterceptor\npublic void someMethod() {\n...\n}\n}\n```\n\n\
    注意\n\n这是 CDI 拦截的缺点之一。客户端（要被拦截的类）必须显式地进行注解，这在某种程度上违背了 CDI 拦截的非功能性本质。类代码的读者会想知道这个注解是关于什么的，并且可能会觉得有必要研究非功能性代码。此外，在开发阶段之后的项目中，不可能在不触及代码的情况下添加拦截器。为了避免这种情况，你必须使用其他技术，例如\
    \ AOP（面向方面编程）中的运行时织入。\n\n可以避免创建自定义拦截器注解。尽管像前面代码中的 `@TracingInterceptor` 这样的自定义注解提高了代码的灵活性和表现力，从而提高了可读性，但你可以省略该注解并直接编写以下内容：\n\
    \n```\nimport jakarta.interceptor.AroundInvoke;\nimport jakarta.interceptor.Interceptor;\n\
    import jakarta.interceptor.InvocationContext;\n@Interceptor\npublic class TracingInterceptorSys\
    \ {\n@AroundInvoke\npublic Object logMethodEntry(InvocationContext ctx)\nthrows\
    \ Exception {\nSystem.out.println(\"Before entering method: \" +\nctx.getMethod().getName());\n\
    return ctx.proceed();\n}\n}\n// --------------------------------------------\n\
    @Interceptors({TracingInterceptorSys.class})\npublic class SomeBean {\n...\n}\n\
    ```\n\nJPA 生命周期监听器\n你有几个选项来拦截 JPA 生命周期活动。\n你可以做的第一件事是向 JPA 实体类（用 `@Entity` 标记）添加用\
    \ `@PrePersist`、`@PostPersist`、`@PostLoad`、`@PreUpdate`、`@PostUpdate`、`@PreRemove`\
    \ 和 `@PostRemove` 注解的方法。这些方法可以有任意名称，但它们必须具有零大小的参数列表，并且必须返回 `void`。\n\n其次，你可以创建一个特殊的监听器类，并使用特殊的注解将其分配给\
    \ JPA：\n\n```\npublic class MyListener {\n@PrePersist void onPrePersist(Object\
    \ o) { ... }\n@PostPersist void onPostPersist(Object o) { ... }\n@PostLoad void\
    \ onPostLoad(Object o) { ... }\n@PreUpdate void onPreUpdate(Object o) { ... }\n\
    @PostUpdate void onPostUpdate(Object o) { ... }\n@PreRemove void onPreRemove(Object\
    \ o) { ... }\n@PostRemove void onPostRemove(Object o) { ... }\n}\n...\n@Entity\
    \ @EntityListeners({MyListener.class})\npublic class TheJpa { ... }\n```\n\n作为参数传递的对象是\
    \ JPA 实体类实例。此外，你可以将这样的监听器类添加到*所有* JPA 实体 bean。为此，打开或创建一个 `src/main/resources/META-INF/orm.xml`\
    \ 文件并添加以下内容：\n\n这样的监听器通常被称为*默认实体监听器*。\n\nServlet 监听器\n\n为了监听 Servlet 生命周期事件，你创建一个类如下：\n\
    \n```\n@WebListener()\npublic class SimpleServletListener implements ... {\n...\
    \ implementation ...\n}\n```\n\n并扩展以下一个或多个接口\n\n```\njakarta.servlet.ServletContextListener\n\
    jakarta.servlet.ServletContextAttributeListener\njakarta.servlet.ServletRequestListener\n\
    jakarta.servlet.ServletRequestAttributeListener\njakarta.servlet.http.HttpSessionListener\n\
    jakarta.servlet.http.HttpSessionAttributeListener\n```\n\n这些监听器在 Servlet 的生命周期内监听以下事件：\n\
    \n*   `HttpSessionListener`：\n    监听 HTTP 会话（用户会话）被初始化或销毁。这是一个很好的审计挂钩。\n\n*  \
    \ `ServletContextListener`：\n    监听 Servlet 上下文被初始化或销毁。你可以使用它来响应刚刚启动的 Web 应用程序。\n\
    \n*   `ServletRequestListener`：\n    告知请求被初始化或销毁。\n\n*   `HttpSessionAttributeListener`：\n\
    \    监听会话属性被添加、移除或更改。\n\n*   `ServletContextAttributeListener`：\n    监听上下文属性被添加、移除或更改。\n\
    \n*   `ServletRequestAttributeListener`：\n    监听请求属性被添加、移除或更改。\n\nFaces 阶段监听器\n\
    \n要添加一个阶段监听器来监控各种 Faces 阶段，你需要向 `src/main/webapp/WEB-INF/faces-config.xml` 添加一个监听器类声明：\n\
    \n```\n\nthe.pac.kage.MyPhaseListener\n\n... more phase listeners ...\n\n...\n\
    \n```\n\n（确保 `jakartaee/` 之后没有换行符或空格。）\n\n然后，实现指示它感兴趣的阶段，并呈现在该阶段之前和之后执行的方法：\n\n\
    ```\npackage the.pac.kage;\n...\npublic class MyPhaseListener implements PhaseListener\
    \ {\nprivate static final long serialVersionUID =\n-7607159318721947672L;\n//\
    \ The phase where the listener is going to be called\nprivate PhaseId phaseId\
    \ = PhaseId.RENDER_RESPONSE;\npublic void beforePhase(PhaseEvent event) {\n...\n\
    }\npublic void afterPhase(PhaseEvent event) {\n...\n}\npublic PhaseId getPhaseId()\
    \ {\nreturn phaseId;\n}\n}\n```\n\n允许的 `PhaseId` 值包括以下内容：\n\n1.  `ANY_PHASE`\n\
    \    用于所有阶段。\n\n2.  `RESTORE_VIEW`\n    用于*恢复视图*阶段。这是第一阶段，在此阶段构建内存中的视图表示。\n\n\
    3.  `APPLY_REQUEST_VALUES`\n    用于*应用请求值*阶段。这是第二阶段，在此阶段读取输入字段值。\n\n4.  `PROCESS_VALIDATIONS`\n\
    \    用于验证处理阶段。\n\n5.  `UPDATE_MODEL_VALUES`\n    用于第四阶段，在此阶段更新模型。\n\n6.  `INVOKE_APPLICATION`\n\
    \    用于第五阶段，在此阶段调用应用程序，例如，找出接下来要加载哪个页面。\n\n7.  `RENDER_RESPONSE` 用于最后一个阶段，在此阶段创建响应。\n\
    \n19. Bean 验证\n\n如果在像这样的 JPA 实体 bean 中\n\n```\n@Entity\npublic class Customer\
    \ {\nprivate String name;\npublic String getName () {\nreturn name;\n}\npublic\
    \ void setName (String name) {\nthis.name = name;\n}\n...\n}\n```\n\n你添加一个非空检查，如下所示\n\
    \n```\n...\npublic void setName (String name) {\nif(name == null)\nthrow new IllegalArgumentException(\n\
    \"Name must not be null);\nthis.name = name;\n}\n...\n```\n\n你可能会想用一种标准的、更短的方式来声明这样的约束。\n\
    *Bean 验证*，由 JSR 380 管理，正是解决这个问题的答案。使用 bean 验证，你可以简单地这样写\n\n```\n...\n@NotNull\n\
    private String name;\npublic String getName () {\nreturn name;\n}\npublic void\
    \ setName (String name) {\nthis.name = name;\n}\n...\n```\n\nJakarta EE 10 中的\
    \ bean 验证版本是 3.0，你可以在以下位置查看其规范\n\n```\nhttps://jakarta.ee/specifications/bean-validation/3.0/\n\
    jakarta-bean-validation-spec-3.0.html\n```\n\n还有更多的 bean 验证约束。本章只讨论它们的一些使用场景。\n\
    \n在哪里使用 Bean 验证\n\nBean 验证发生在 Jakarta EE 10 中的合适位置。仅仅向你的类添加一个约束注解并不足以使 bean 验证生效。框架还必须拥有该类的管理权，以便检查约束。更准确地说，bean\
    \ 验证在以下位置生效：\n\n*   实体 bean (JPA)\n\n*   CDI bean\n\n*   Faces（在 EL 构造中使用的 bean，例如在用户输入获取期间）\n\
    \n*   JAX-RS（RESTful 服务）\n\n如何添加约束\n\n约束可以按如下方式添加到字段：\n\n```\nclass Person {\n\
    @NotNull @Size(max=30)\nprivate String name;\n}\n```\n\n它们可以按如下方式添加到构造函数和方法参数：\n\
    \n```\nclass Person {\npublic Person(@NotNull @Size(max=30) String name) {\n...\n\
    }\n...\npublic void setEmail(@Email email) {\n...\n}\n}\n```\n\n并且它们可以按如下方式添加到方法返回值：\n\
    \n```\nclass Person {\n...\n@NotNull @Size(max=30)\npublic String getCountry()\
    \ {\n...\n}\n}\n```\n\n内置约束\n\n所有内置约束都位于 `jakarta.validation.constraints` 包中。列表如下：\n\
    \n*   `@NotNull`：被注解的元素不能为 `null`。\n\n*   `@Null`：\n    被注解的元素必须为 `null`。\n\n\
    *   `@AssertTrue`：\n    被注解的元素必须为布尔值 `true`。\n\n*   `@AssertFalse`：\n    被注解的元素必须为布尔值\
    \ `false`。\n\n*   `@Min`：\n    被注解的元素必须是一个大于或等于某个值的数值。由于可能存在舍入误差，不支持 `float` 和\
    \ `double` 类型。示例：`@Min(37)`\n\n*   `@DecimalMin`：\n    被注解的元素必须是一个大于或等于由字符串指定的某个值的数值。由于可能存在舍入误差，不支持\
    \ `float` 和 `double` 类型。可选的 `inclusive` 参数指定指定的值是否包含在内（默认为 `true`）。`null` 值被认为是有效的，因此你必须添加\
    \ `NotNull` 来禁止 `null`。示例：\n    `@DecimalMin(\"37.4\")`、\n    `@DecimalMin(value=\"\
    37.4\", inclusive=false)`\n\n*   `@Max`：\n    被注解的元素必须是一个小于或等于某个值的数值。由于可能存在舍入误差，不支持\
    \ `float` 和 `double` 类型。示例：`@Max(42)`\n\n*   `@DecimalMax`：\n    被注解的元素必须是一个小于或等于由字符串指定的某个值的数值。由于可能存在舍入误差，不支持\
    \ `float` 和 `double` 类型。可选的 `inclusive` 参数指定指定的值是否包含在内（默认为 `true`）。`null` 值被认为是有效的，因此你必须添加\
    \ `NotNull` 来禁止 `null`。示例：\n    `@DecimalMax(\"42.0\")`、\n    `@DecimalMax(value=\"\
    42.0\", inclusive=false)`\n\n*   `@Negative`：与 `@Max(0)` 相同，但不包含等于，并且允许 `float`\
    \ 和 `double`。\n\n*   `@Positive`：与 `@Min(0)` 相同，但不包含等于，并且允许 `float` 和 `double`。\n\
    \n*   `@NegativeOrZero`：与 `Negative` 相同，但包含 `0.0`。\n\n*   `@PositiveOrZero`：与\
    \ `Positive` 相同，但包含 `0.0`。\n\n*   `@Size`：\n    字符串、集合、映射或数组的大小必须在指定的参数之间。可选参数包括\
    \ `min`（默认为 `0`）和 `max`（默认为 `Integer.MAX_VALUE`）。\n    示例：`@Size( min = 5 )`，`@Size(\
    \ min = 10, max = 15 )`\n\n*   `@NotEmpty`：与 `@Size(min=1)` 相同。\n\n*   `@NotBlank`：与\
    \ `@Size(min=1)` 相同，仅适用于字符串。\n\n*   `@Digits`：\n    限制整数和小数位数。参数包括 `integer`（最大整数位数）和\
    \ `fraction`（最大小数位数）。\n\n*   `@Email`：\n    检查字符串是否表示有效的电子邮件地址。可选的附加参数包括 `regexp`\
    \ 和 `flags`；参见 `@Pattern`。\n\n*   `@Pattern`：被注解的元素必须匹配指定的模式。参数是 `regexp`（正则表达式）和\
    \ `flags`（`Pattern.Flag` 值的数组，用于正则表达式标志）。示例：`@Pattern(regexp = \"\\\\d6\")`（六位数字），`@Pattern(regexp\
    \ = \"[ABCD]5\", flags = Pattern.Flag.CASE_INSENSITIVE )`（五个来自 A 到 D，不区分大小写）。\n\
    \n*   `@Past`：\n    被注解的元素必须表示过去的日期和时间。支持的类型是 `Date`、`Calendar` 等（参见规范）。\n\n*\
    \   `@PastOrPresent`：与 `@Past` 相同，但包含现在。\n\n*   `@Future`：\n    被注解的元素必须表示未来的日期和时间。支持的类型是\
    \ `Date`、`Calendar` 等（参见规范）。\n\n*   `@FutureOrPresent`：\n    与 `@Future` 相同，但包含现在。\n\
    \n根据经验，如果你想禁止 `null` 值，请始终添加 `@NotNull`，因为大多数约束都将 `null` 视为肯定有效的值。\n\n自定义约束\n\
    内置约束涵盖了广泛的验证场景。\n如果你仍然想创建自己的约束，你必须声明相应的注解并提供实现。\n例如，你可以创建一个名为 `PZN8` 的约束，它表示德国药品的条形码。它由一个\
    \ `-` 符号、加上七到八位数字以及末尾的一位校验位组成。出于技术原因，此字符串由两个星号 (`*`) 包围。你需要将校验位包含在验证过程中，因此这是一个必须使用自定义验证器的情况。\n\
    \n验证注解代码如下：\n\n```\npackage book.jakartapro.restdate;\nimport static java.lang.annotation.ElementType.*;\n\
    import static java.lang.annotation.RetentionPolicy.RUNTIME;\nimport java.lang.annotation.*;\n\
    import jakarta.validation.Constraint;\nimport jakarta.validation.Payload;\n@Target({\
    \ METHOD, FIELD, ANNOTATION_TYPE,\nCONSTRUCTOR, PARAMETER, TYPE_USE })\n@Retention(RUNTIME)\n\
    @Documented\n@Constraint(validatedBy = { Pzn8Validator.class })\npublic @interface\
    \ PZN8 {\nString message() default \"Not a PZN-8\";\nClass[] groups() default\
    \ { };\nClass[] payload() default { };\nboolean includeDelimiters() default false;\n\
    }\n```\n\n对于名为 `Pzn8Validator` 的实现类，你必须实现 `ConstraintValidator` 接口。在其 `isValid()`\
    \ 方法中，你获取输入字符串，可能检查并去除周围的星号，检查长度，检查并去除前导的 `-`，检查所有数字是否都是数字，然后执行校验位测试：\n\n```\n\
    import jakarta.validation.ConstraintValidator;\nimport jakarta.validation.ConstraintValidatorContext;\n\
    public class Pzn8Validator implements\nConstraintValidator {\nprotected boolean\
    \ delimitersIncluded;\n@Override\npublic void initialize(PZN8 pzn8) {\nthis.delimitersIncluded\
    \ = pzn8.includeDelimiters();\n}\n@Override\npublic boolean isValid(String str,\n\
    ConstraintValidatorContext ctx) {\n// null values are valid\nif ( str == null\
    \ )\nreturn true;\nString str2 = str;\nif(delimitersIncluded) {\nif(str.length()\
    \  9)\nreturn false;\nif(str2.charAt(0) != '-') return false;\nstr2 = str2.substring(1);\n\
    char checkDigit = str2.charAt(str2.length() - 1);\nstr2 = str2.substring(0, str2.length()\
    \ - 1);\nif(!str2.matches(\"\\\\d*\")) return false;\n// the check digit algorithm\
    \ for PZNs\nint p = 2;\nint s = 0;\nfor(int i=0;i<str2.length();i++) {\ns += p\
    \ * (str2.charAt(i) - '0');\np++;\n}\nint x = s % 11;\nreturn (checkDigit - '0')\
    \ == x;\n}\n}\n```\n\n你现在可以将自定义 bean 验证器添加到任何方法、构造函数、字段或方法参数。例如，在 REST 控制器内部，你可以编写如下内容：\n\
    \n```\n@Path(\"registerPzn/{pzn}\")\n@POST\n@Produces(\"application/json\")\n\
    public Response registerPzn(\n@PathParam(\"pzn\")\n@PZN8 @NotNull String pzn\n\
    )\n{\n... maybe save in database ...\nreturn Response.status(200)...; // some\
    \ OK message\n}\n```\n\nBean 验证异常\n当验证失败时，Bean 验证会发出 `jakarta.validation.ValidationException`\
    \ 或其子类之一。Bean 验证规范不包含任何信息，因为处理此消息是客户端代码的事务。\n\n在使用 Jax-RS 的 RESTful 应用程序中，例如，你可以添加一个\
    \ `ExceptionMapper`（位于 `jakarta.ws.rs.ext` 包中）：\n\n```\nimport java.util.HashMap;\n\
    import java.util.Map;\nimport jakarta.validation.ConstraintViolation;\nimport\
    \ jakarta.validation.ConstraintViolationException;\nimport jakarta.ws.rs.core.Response;\n\
    import jakarta.ws.rs.core.Response.Status;\nimport jakarta.ws.rs.ext.ExceptionMapper;\n\
    import jakarta.ws.rs.ext.Provider;\n@Provider\npublic class ValidationExceptionMapper\n\
    implements\nExceptionMapper {\n@Override\npublic Response toResponse(\nConstraintViolationException\
    \ ex) {\nMap errors =\nnew HashMap();\nfor(ConstraintViolation viol :\nex.getConstraintViolations())\
    \ {\nerrors.put(viol.getMessage(),\nviol.getInvalidValue().toString());\n}\nreturn\
    \ Response.status(\nStatus.PRECONDITION_FAILED).\nentity(errors).build();\n}\n\
    }\n```\n\n请注意，`ConstraintViolationException` 是 `jakarta.validation.ValidationException`\
    \ 的子类。\n\n20. Jakarta EE 并发\n\nJava 企业应用程序中的并发不能像在 Java SE 中那样实现，在 Java SE 中，你可以使用\
    \ `java.util.concurrent` 包中的类以及 `Thread` 类及其附属类。这种差异的原因在于，容器上下文数据不会自动传播到手动创建的线程，这经常导致容器提供的资源出现问题。在\
    \ Jakarta EE 的前身 JEE 中，使用线程在版本 8 之前已被弃用，开发人员曾经滥用 JMS 进行多线程处理，这导致了并发管理的大量开销和糟糕的可扩展性。\n\
    幸运的是，从 JEE 7 版本以及当然 Jakarta EE 8 及更高版本开始，情况发生了变化，并添加了专门的企业并发 API。本章介绍使用此 API 的\
    \ Jakarta EE 并发。\n\n准备 Jakarta EE 服务器\nJakarta EE 中的并发服务是由服务器提供和管理的服务，因此需要使用服务器管理工具进行配置。对于你的服务器产品，你必须查阅手册以了解如何执行此操作。\n\
    \n对于 GlassFish，\n请进入 Web 管理控制台 `http://localhost:4848`，然后选择资源 ➤ 并发资源。你将看到以下对象：\n\
    \n*   **ContextService**：此服务负责将上下文传播到由其他服务创建的线程。你通常不必更改此服务或创建更多此类型的服务。在大多数情况下，预配置的默认上下文服务就足够了。此服务类型的实例属于\
    \ `jakarta.enterprise.concurrent.ContextService` 类。\n\n*   **Managed Executor\
    \ Services：** 当你在 Jakarta EE 中需要并发时，最常使用此服务类型。预配置的默认托管执行器服务称为 `defaultManagedExecutorService`，可以作为一个起点，根据情况，你的应用程序可能对此感到满意。你需要在你的应用程序中使用它的*逻辑\
    \ JNDI 名称*（`java:comp/DefaultManagedExecutorService`）。此服务类型的实例属于 `jakarta.enterprise.concurrent.ManagedExecutorService`\
    \ 类。\n\n*   **Managed Scheduled Executor Services：** 与上述相同，但用于计划任务执行。*逻辑 JNDI\
    \ 名称*是 `java:comp/DefaultManagedScheduledExecutorService`，类名是 `jakarta.enterprise.concurrent.ManagedScheduledExecutorService`。\n\
    \n*   **Managed Thread Factory：** 此服务类型用于创建具有传播的容器上下文的线程。与其他服务相比，这更底层。如果你想在应用程序中使用\
    \ Java SE 并发工具，则需要它。GlassFish 提供了一个预配置的托管线程工厂，其逻辑 JNDI 名称为 `java:comp/DefaultManagedThreadFactory`。\n\
    \n使用 ManagedExecutorService\n\n如果你需要在 Jakarta EE 应用程序中使用高级并发，托管执行器服务将是你的入口点。有两种方法可以获取此服务。更简洁的方法是通过以下方式注入它\n\
    \n```\n@Resource(name=\"java:comp/DefaultManagedExecutorService\")\nprivate ManagedExecutorService\
    \ execService;\n```\n\n其中资源 JNDI 名称取决于服务器产品；显示的名称对应于 GlassFish 的默认和预配置服务。\n\n\
    获取托管执行器服务的第二种方法包括 JNDI 查找：\n\n```\nManagedExecutorService execService =\nInitialContext.\n\
    doLookup(\"java:comp/DefaultManagedExecutorService\");\n```\n\n从这里，你可以注册要在后台执行的\
    \ `Runnable` 或 `Callable` 任务：\n\n```\nFuture f1 = execService.submit( () -> {\n\
    // not returning anything, corresponds\n// to a Runnable\n...\n}\n);\nFuture f2\
    \ = execService.submit( () -> {\n// not returning anything, corresponds\n// to\
    \ a Runnable\n...\n}, 42 /* calculated outside the task */\n);\nFuture f3 = execService.submit(\
    \ () -> {\n// returning something, corresponds\n// to a Callable\n...\nreturn\
    \ 42;\n}\n);\n```\n\n甚至可以创建它们的列表：\n\n```\nList> retrieverTasks =\nnew ArrayList>();\n\
    ... fill the list ...\nList> taskResults = execService.\ninvokeAll(retrieverTasks);\n\
    ```\n\n然后，你可以使用从调用中获得的 `Future` 对象来等待后台任务或任务的终止：\n\n```\n...\n// waits until background\
    \ task finishes\nf1.get();\n...\n...\n// waits until background task finishes\n\
    Integer backgroundRes = f2.get();\n...\n// waits until all background tasks finish\n\
    for (Future taskResult : taskResults) {\ntry {\nInteger ii = taskResult.get();\n\
    // do something with the res...\n} catch (ExecutionException e) {\ne.printStackTrace(System.err);\n\
    }\n}\n```\n\n有关 `ManagedExecutorService` 的更多详细信息以及更多方法，请查阅 API 文档。`Future` 也是如此，它在\
    \ Java SE API 文档中有记录。\n\n使用 ManagedScheduledExecutorService\n\n托管计划执行器服务类似于托管执行器服务，不同之处在于你可以将其用于延迟或重复执行。你可以通过注入或\
    \ JNDI 查找来获取服务实例：\n\n```\n@Resource(name=\n\"java:comp/DefaultManagedScheduledExecutorService\"\
    )\nprivate ManagedScheduledExecutorService\nschedExecService;\n...or...\nManagedScheduledExecutorService\
    \ schedExecService =\nInitialContext.\ndoLookup(\n\"java:comp/DefaultManagedScheduledExecutorService\"\
    \n);\n```\n\n其中 JNDI 名称是 `server`，并且依赖于服务器配置。此处显示的名称来自 GlassFish 上预配置的默认服务。\n\n\
    要安排一个延迟执行的任务，你现在可以编写以下内容：\n\n```\nScheduledFuture sf1 = schedExecService.\nschedule(\
    \ () -> {\n...\nreturn 42;\n}, 5L, TimeUnit.SECONDS);\n// or, if you don't need\
    \ a result:\nScheduledFuture sf2 = schedExecService.\nschedule( () ->\n...\n},\
    \ 5L, TimeUnit.SECONDS);\n```\n\n返回的 `ScheduledFuture` 对象继承自 `Future`，因此你可以使用它来取消执行或检索结果：\n\
    \n```\n// In case we want to cancel the execution:\nsf1.cancel(true);\n...\n//\
    \ Wait for the termination. The sf2 object comes from\n// a Runnable, so it can\
    \ return only 'null' and we don't\n// care for the result object.\nint res1 =\
    \ sf1.get();\nsf2.get();\n```\n\n你还可以查询剩余的超时值：\n\n```\n...\nif(!sf1.isDone())\
    \ {\nint remainingMillis = sf1.getDelay(\nTimeUnit.MILLISECONDS);\n...\n}\n...\n\
    ```\n\n对于重复执行，你可以指定以固定速率重复，或者指定一次执行结束与下一次执行开始之间的固定延迟：\n\n```\nint firstDelay =\
    \ 5;\nint betweenDelay = 2;\nScheduledFuture f1 =\nschedExecService.scheduleAtFixedRate(()\
    \ -> {\n...\n}, firstDelay, betweenDelay, TimeUnit.SECONDS);\n...\nScheduledFuture\
    \ f2 =\nschedExecService.scheduleWithFixedDelay(() -> {\n...\n}, firstDelay, betweenDelay,\
    \ TimeUnit.SECONDS);\n```\n\n注意\n\n请谨慎使用 `scheduleAtFixedRate()`。如果后续任务执行时间超过指定的延迟，线程可能会堆积，最终导致服务器崩溃。\n\
    \n对从重复执行调度返回的 `ScheduledFuture` 对象调用 `get()` 将抛出异常。从重复执行中检索结果是没有意义的。但是，你可以使用它通过调用\
    \ `cancel()` 方法来取消重复。\n\n使用 ManagedThreadFactory\n\n如果你需要更深入一层，直接在 Jakarta EE\
    \ 应用程序内部创建 `Thread` 实例，你可以获取一个 `jakarta.enterprise.concurrent.ManagedThreadFactory`\n\
    \n```\n@Resource(name = \"java:comp/DefaultManagedThreadFactory\")\nprivate ManagedThreadFactory\
    \ threadFactory;\n...or...\nManagedThreadFactory threadFactory =\nInitialContext.\n\
    doLookup(\n\"java:comp/DefaultManagedThreadFactory\"\n);\n```\n\nJNDI 名称是 `server`，并且依赖于服务器配置。此处显示的名称来自\
    \ GlassFish 上预配置的默认服务。\n\n你现在可以通过调用该服务的相应方法来获取一个线程：\n\n```\n// Thread thr = new\
    \ Thread(); // NO, NOT IN JAKARTA EE!\nThread thr = threadFactory.newThread( ()\
    \ -> {\n...\n}\n);\nthr.start();\n```\n\n也可以在需要 `ThreadFactory` 的地方使用 `ManagedThreadFactory`。例如\n\
    \n```\nThreadPoolExecutor exec = new ThreadPoolExecutor(\n5, 10, 5, TimeUnit.SECONDS,\n\
    new ArrayBlockingQueue(10),\nthreadFactory);\n```\n\n这将为你提供一个 `ExecutorService`，然后你可以按照\
    \ Java SE API 文档的描述将其用于并发。\n\n企业并发和事务\n由 JTA 定义的事务性不会从父级传播到并发任务。确保这种自动机制正确工作实在太复杂了。\n\
    \n但是，你可以做的是让后台任务在 `UserTransaction` 中运行，如下所示：\n\n```\n@Resource(name=\"java:comp/DefaultManagedExecutorService\"\
    )\nprivate ManagedExecutorService execService;\n@Resource\nprivate UserTransaction\
    \ ut;\n...\npublic void someMethod() {\nFuture f1 = execService.submit( new Runnable()\
    \ {\npublic void run() {\nut.begin();\ntry{\n...\nut.commit();\n}catch(Exception\
    \ e){\nut.rollback();\n}\n}});\n...\n}\n```\n\n21. 批处理\n\n如果你需要定期自动执行重复性任务，无需用户交互，但基于由外部进程馈送到数据库或文件中的数据，这称为*批处理*。例如，考虑一个软件，它每天午夜收集员工工作时间或汇总考勤系统数据，并更新人力资源数据库中的员工记录。虽然第一个程序由\
    \ Web 应用程序或基于卡、徽章或类似物品的考勤检测形式的用户界面组成，但聚合软件是批处理的典型候选者。\nJakarta EE 10 包含由 JSR 352\
    \ 描述的批处理技术。它*不*包含作业调度或触发。为此，你可以使用定时器、EJB 或在 `@Singleton @Startup` 注解的 bean 类中配置的自定义进程。相反，JSR\
    \ 352 批处理是一种批处理编程模型、一种作业规范语言和一种批处理运行时进程。Jakarta EE 10 的批处理版本是 2.1。\n\n本章介绍 Jakarta\
    \ EE 批处理概念，但不介绍 JSR 352 描述的每个功能。有关更多详细信息，请查看以下位置的规范\n\n```\nhttps://www.jcp.org/en/jsr/detail?id=352\n\
    ```\n\n此外，[`https://docs.oracle.com/javaee/7/tutorial/batch-processing.htm#GKJIQ6`](https://docs.oracle.com/javaee/7/tutorial/batch-processing.htm%2523GKJIQ6)\
    \ 上的 JEE 7 批处理教程包含有关批处理的有价值信息，当然你也可以在互联网上找到更多教程。\n\n批处理概念\n批处理描述了许多*批处理作业*的执行。每个作业最初在单独的线程上运行。一个作业由一个或多个步骤组成，默认情况下，这些步骤在作业的单个线程上连续运行。一个步骤可以被*分区*，这意味着它的工作负载将在单独的线程上运行。如果输入数据中的项目可以彼此独立处理，则可以使用分区过程。\n\
    *块*步骤类型（处理输入项目）和*任务*步骤类型（不查看单个数据项目，而是用于初始化、日志记录、清理或聚合目的）之间存在区别。\n*流程*是作为一个单元运行的一系列步骤。无法从流程内部的单个步骤执行到流程外部的另一个步骤的步骤转换。只有在每个流程完成其工作后才能进行转换。如果你想并行运行多个流程，这称为*拆分*执行。流程是可选的，因此如果你不需要它们，则不必使用它们。\n\
    一个作业可能包含*决策*元素，这意味着逐步工作流可以由决策元素控制。\n\n为批处理准备服务器\n要了解你的 Jakarta EE 服务器是否需要为批处理做准备，以及如何执行此操作，请查阅你的服务器手册。\n\
    \n对于 GlassFish 服务器，你需要配置一个 JDBC 资源。这是必要的，因为服务器需要一个数据库来存储作业维护数据。你可以使用 `asadmin`\
    \ 命令为 GlassFish（版本 7）管理此资源：\n\n```\n./asadmin create-jdbc-connection-pool \\\n\
    --datasourceclassname \\\norg.apache.derby.jdbc.EmbeddedXADataSource \\\n--restype\
    \ javax.sql.XADataSource \\\n--property portNumber=1527:password=APP:user=APP:\n\
    serverName=localhost:\ndatabaseName=\\$\\{com.sun.aas.instanceRoot\\}/lib/\ndatabases/batchprocessing:\n\
    connectionAttributes=\\;create\\\\=true \\\nMyBatchPool\n```\n\n（确保所有属性都在一行中，并且删除了空格。）这将安装一个嵌入式\
    \ Derby 数据库。Derby 包含在 GlassFish 7 中，因此你无需安装它。由于它是嵌入式的，你也不需要启动它。为了检查连接池，实际探测数据库，请输入以下内容：\n\
    \n```\n./asadmin ping-connection-pool MyBatchPool\n```\n\n如果你需要删除它，请按以下步骤操作：\n\
    \n```\n./asadmin delete-jdbc-connection-pool MyBatchPool\n```\n\n接下来，你需要配置一个 JNDI\
    \ 资源，以便能够寻址新的 JDBC 池。请输入以下内容：\n\n```\n./asadmin create-jdbc-resource \\\n--connectionpoolid\
    \ MyBatchPool jdbc/MyBatchPool\n```\n\n如果你需要删除它，请编写以下内容：\n\n```\n./asadmin delete-jdbc-resource\
    \ jdbc/MyBatchPool\n```\n\n为了确保批处理引擎使用新的 JDBC 连接，请在终端中输入以下内容：\n\n```\n./asadmin\
    \ set-batch-runtime-configuration \\\n--datasourcelookupname jdbc/MyBatchPool\
    \ \\\n--executorservicelookupname \\\nconcurrent/__defaultManagedExecutorService\n\
    ```\n\n一个员工考勤示例批处理\n\n作为批处理的一个示例，考虑一个收集员工考勤数据的文件，如下所示：\n\n```\n162836945,1459763400000,1459774320000\n\
    162836945,1459837380000,1459851300000\n618456945,1459756800000,1459783380000\n\
    ...\n```\n\n第一列包含社会安全号码，然后是考勤的开始和结束时间（自 1970-01-01 00:00:00 UTC 以来的毫秒数）。\n\n你需要编写一个\
    \ Jakarta EE 企业应用程序，形式为 EAR 文件，批处理从 EJB 内部运行，如下所示：\n\n*   在块步骤中，使用*读取器*从输入文件中读取行。\n\
    \n*   仍在块步骤中，处理项目并过滤掉缺少 SSN（社会安全号码）的条目。\n\n*   仍在块步骤中，收集考勤时间并为每个员工汇总。\n\n*   在随后的任务步骤中，执行任何清理活动。输入文件获得一个\
    \ `.bak` 后缀，并且可能删除空的输出文件夹。\n\n为简单起见，此示例不使用数据库，也不将所有内容写入文件系统文件夹（每个 SSN 一个文件）。在生产设置中，你可能会增强此功能并将所有内容写入数据库。此外，输入也可以来自数据库而不是文件。\n\
    \nGlassFish 中的文件访问受到全局权限的限制。为了使此批处理应用程序正常工作，请编辑 `GLASSFISH_INST/glassfish/domains/domain1/config/server.policy`\
    \ 文件并在末尾添加以下内容：\n\n```\ngrant {\npermission java.io.FilePermission\n\">\", \"\
    write,read,delete\";\n};\n```\n\n启动批处理 EAR 项目\n\n在 Eclipse 中，创建一个新的 Gradle 项目。将\
    \ `build.gradle` 的内容替换为以下内容：\n\n```\nplugins {\nid 'ear'\n}\n// !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!\n\
    // Use the deloyEar task to compile and assemble all and\n// upload it to GlassFish\n\
    // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!\nrepositories {\njcenter()\n\
    }\ndependencies {\ndeploy project(path: ':Batch-Ejb',\nconfiguration: 'archives')\n\
    // The following dependencies will become EAR libs and\n// will be placed in a\
    \ dir configured via the libDirName\n// property\n// earlib group: 'log4j', name:\
    \ 'log4j',\n//     version: '1.2.15', ext: 'jar'\n// earlib 'org.apache.commons:commons-configuration2:2.6'\n\
    }\near {\n//  EAR plugin configuration, if necessary\n}\ntask deployEar(dependsOn:\
    \ ear,\ndescription:\">>> BATCH deploy task\") {\ndoLast {\ndef FS = File.separator\n\
    def glassfish =\nproject.properties['glassfish.inst.dir']\ndef user = project.properties['glassfish.user']\n\
    def passwd = project.properties['glassfish.passwd']\nFile temp = File.createTempFile(\"\
    asadmin-passwd\",\n\".tmp\")\ntemp  ${sout}\"\nif(serr.toString()) System.err.println(serr)\n\
    temp.delete()\n}\n}\ntask undeployEar(\ndescription:\">>> BATCH undeploy task\"\
    ) {\ndoLast {\ndef FS = File.separator\ndef glassfish =\nproject.properties['glassfish.inst.dir']\n\
    def user = project.properties['glassfish.user']\ndef passwd = project.properties['glassfish.passwd']\n\
    File temp = File.createTempFile(\"asadmin-passwd\",\n\".tmp\")\ntemp  ${sout}\"\
    \nif(serr.toString()) System.err.println(serr)\ntemp.delete()\n}\n}\n```\n\n在\
    \ `settings.gradle` 文件中，为 EJB 子项目添加一行：\n\n```\ninclude 'Batch-Ejb'\n```\n\n要连接到本地\
    \ GlassFish 服务器，请在项目根目录中添加 `gradle.properties` 文件，并使其内容如下：\n\n```\nglassfish.inst.dir\
    \ = /glassfish/inst/dir\nglassfish.user = admin\nglassfish.passwd =\n```\n\n其中\
    \ `user` 和空密码对应于一个原始的 GlassFish 安装。\n当然，你必须提供你自己的本地 GlassFish 安装文件夹作为第一个属性的值。\n\
    \n对于子项目，创建一个名为 `Batch-Ejb` 的文件夹，作为主项目文件夹的子文件夹。将 `gradlew` 和 `gradlew.bat` 以及完整的\
    \ `gradle` 文件夹复制到 `Batch-Ejb` 中。这允许你使用 Gradle 包装器脚本从终端内部构建 EJB JAR。同样在 `Batch-Ejb`\
    \ 内部，创建一个名为 `build.gradle` 的文件，并使其内容如下：\n\n```\nplugins {\nid 'java'\n}\nsourceCompatibility\
    \ = 1.17\ntargetCompatibility = 1.17\nrepositories {\njcenter()\n}\ndependencies\
    \ {\ntestImplementation 'junit:junit:4.13.2'\ncompileOnly 'jakarta.platform:jakarta.jakartaee-api:10.0.0'\n\
    }\n```\n\n你现在可以右键单击（根项目），然后选择 Gradle → 刷新 Gradle 项目。Eclipse 随后将在包资源管理器视图中显示两个项目，如图\
    \ 21-1 所示。最后，在 `Batch-Ejb` 子项目中添加以下文件夹：\n\n```\nsrc/main/java\nsrc/main/resources/META-INF\n\
    ```\n\n确保 Eclipse 将第一个文件夹识别为源文件夹（为此使用项目属性）。\n\n![](img/490565_1_En_21_Fig1_HTML.jpg)\n\
    \n一个包资源管理器窗口显示批处理项目，例如 bin、build 和 s r c、batch E j b 以及不同的子项目。\n\n图 21-1\n批处理项目和子项目\n\
    \n注意\n\n尽管在 Eclipse 中显示为两个独立的项目，但主项目和子项目（在子文件夹中）的分离仍然有效。\n\n示例数据准备\n你可以使用文件系统上的任何合适文件夹作为员工考勤批处理应用程序的示例数据。以下部分将此文件夹称为\
    \ `DATA_FOLDER`。\n\n创建一个名为 `DATA_FOLDER/attendance.csv` 的输入文件，并使其内容如下：\n\n```\n\
    162836945,1459763400000,1459774320000\n162836945,1459837380000,1459851300000\n\
    618456945,1459756800000,1459783380000\n```\n\n列分别是社会安全号码、工作开始时间、工作结束时间（自 1970-01-01\
    \ 00:00:00 UTC 以来的毫秒数）。\n\n作业定义文件\n\n作业定义文件是批处理应用程序的主要配置文件。它被称为 `myJobName.xml`，位于\
    \ `Batch-Ejb` 子项目的以下文件夹中：\n\n```\nsrc/main/resources/META-INF/batch-jobs\n```\n\
    \n你可以为作业定义文件使用不同的名称来代替 `myJobName`，但不能更改 `.xml` 后缀。\n\n创建该文件并使其内容如下：\n\n你可以看到，此示例为输入文件和输出文件定义了两个属性。你以后可以在编码中使用这些属性。一个块类型步骤用于读取、处理和写入处理后的数据，另一个任务步骤用于清理。\n\
    *检查点*定义了处理中的点，这些点可以在计划内或计划外的处理中断后重新启动。如果发生某些情况，最多允许重新读取十个块项目。\n各种 `ref` 属性引用 CDI\
    \ `@Named` 类。\n\n批处理调度\n\n你可以使用定时器 EJB 来调度批处理。在 `Batch-Ejb` 项目中创建任何类，并使其内容如下：\n\
    \n```\npackage book.jakartapro.batch;\nimport java.util.Properties;\nimport jakarta.batch.operations.JobOperator;\n\
    import jakarta.batch.runtime.BatchRuntime;\nimport jakarta.ejb.Schedule;\nimport\
    \ jakarta.ejb.Stateless;\n@Stateless\npublic class BatchEjb {\n@Schedule(\n//\
    \ for development and testing, we start the\n// job each 10 seconds\nhour = \"\
    *\",\nminute = \"*\",\nsecond = \"*/10\",\npersistent = false)\npublic void timeout()\
    \ {\ntry {\nJobOperator jobOperator =\nBatchRuntime.getJobOperator();\n// Just\
    \ in case we want to programmatically add\n// a property\nProperties props = new\
    \ Properties();\nprops.setProperty(\"parameter1\", \"value1\");\n// The \"job1\"\
    \ corresponds to the name of\n// the job definition file (without the .xml)\n\
    // inside META-INF/batch-jobs\nlong execID = jobOperator.start(\"job1\", props);\n\
    } catch (Exception e) {\ne.printStackTrace(System.err);\n...\n}\n}\n}\n```\n\n\
    类名和位置（包）由你决定。Jakarta 仅通过 `@Schedule` 注解就知道这是一个定时器 EJB。\n\n批处理 Java 工件\n\n作业定义文件中的各种\
    \ `ref` 属性对应于以下类。首先，定义一个保存输入项目的类：\n\n```\npackage book.jakartapro.batch;\nimport\
    \ java.io.Serializable;\npublic class AttendanceItem implements Serializable {\n\
    private static final long serialVersionUID =\n2413741734728319063L;\nprivate String\
    \ ssn; // + getters/setters\nprivate int workMillis; // + getters/setters\npublic\
    \ AttendanceItem(String ssn, int workMillis) {\nthis.ssn = ssn;\nthis.workMillis\
    \ = workMillis;\n}\n}\n```\n\n接下来，实现块步骤中的读取器：\n\n```\npackage book.jakartapro.batch;\n\
    import java.io.*;\nimport java.util.Properties;\nimport jakarta.batch.api.chunk.ItemReader;\n\
    import jakarta.batch.runtime.context.JobContext;\nimport jakarta.enterprise.context.Dependent;\n\
    import jakarta.inject.Inject;\nimport jakarta.inject.Named;\n@Dependent\n@Named(\"\
    AttendanceReader\")\npublic class AttendanceReader implements ItemReader {\nprivate\
    \ Integer lineNumber = 0;\nprivate String fileName;\nprivate InputStream ins;\n\
    private BufferedReader breader;\n@Inject\nprivate JobContext jobCtx;\npublic AttendanceReader()\
    \ {\n}\n@Override\npublic void open(Serializable checkpoint)\nthrows Exception\
    \ {\nProperties props = jobCtx.getProperties();\nfileName = props.getProperty(\"\
    input_file\");\nSystem.out.println(\"open file \" + fileName);\nif (new File(fileName).exists())\
    \ {\nins = new FileInputStream(fileName);\nbreader = new BufferedReader(\nnew\
    \ InputStreamReader(ins));\nif (checkpoint != null) {\nlineNumber = (Integer)\
    \ checkpoint;\nfor (int i = 0; i  0) {\nString ssn = fields[0].trim();\nlong tm\
    \ = Long.parseLong(fields[2]) -\nLong.parseLong(fields[1]);\nAttendanceItem itemObj\
    \ =\nnew AttendanceItem(ssn, (int) tm);\nresult = itemObj;\n}\nlineNumber++;\n\
    }\nreturn result;\n}\n@Override\npublic Serializable checkpointInfo() throws Exception\
    \ {\nreturn lineNumber;\n}\n}\n```\n\n由于 `@Named(\"AttendanceReader\")`，批处理引擎知道当作业定义文件中引用名称\
    \ `AttendanceReader` 时，指的是这个类。注入 `JobContext` 允许你寻址该文件中定义的属性。在 `open()` 方法内部，你打开输入文件。如果其\
    \ `checkpoint` 参数不为 `null`，则将输入文件定位到类末尾的检查点信息方法定义的最后一行。在 `readItem()` 内部，构建并返回一个\
    \ `AttendanceItem` 对象。后续的处理器步骤将精确地获得这个对象。\n\n作为这样一个处理器，定义一个过滤掉缺少 SSN 的项目的类：\n\n\
    ```\npackage book.jakartapro.batch;\nimport jakarta.batch.api.chunk.ItemProcessor;\n\
    import jakarta.enterprise.context.Dependent;\nimport jakarta.inject.Named;\n@Dependent\n\
    @Named(\"AttendanceProcessor\")\npublic class AttendanceProcessor implements ItemProcessor\
    \ {\n@Override\npublic Object processItem(Object item) throws Exception {\n//\
    \ Use this to convert an object, or return null to\n// exclude objects\nAttendanceItem\
    \ itm = (AttendanceItem) item;\nif(itm.getSsn() == null ||\nitm.getSsn().trim().isEmpty())\
    \ return null;\nreturn item;\n}\n}\n```\n\n一个写入器类实现 `jakarta.batch.api.chunk.ItemWriter`，并在其\
    \ `writeItems()` 方法中获取传递的项目列表。你可以使用它来创建或更新每个员工的文件，汇总每个员工的工作量：\n\n```\npackage\
    \ book.jakartapro.batch;\nimport java.io.File;\nimport java.io.FileWriter;\nimport\
    \ java.io.Serializable;\nimport java.util.List;\nimport java.util.Properties;\n\
    import java.util.Scanner;\nimport jakarta.batch.api.chunk.ItemWriter;\nimport\
    \ jakarta.batch.runtime.context.JobContext;\nimport jakarta.enterprise.context.Dependent;\n\
    import jakarta.inject.Inject;\nimport jakarta.inject.Named;\n@Dependent\n@Named(\"\
    AttendanceWriter\")\npublic class AttendanceWriter implements ItemWriter {\nprivate\
    \ String outputDir;\n@Inject\nprivate JobContext jobCtx;\n@Override\npublic void\
    \ open(Serializable checkpoint)\nthrows Exception {\nProperties props = jobCtx.getProperties();\n\
    outputDir = props.getProperty(\"output_folder\") +\nFile.separator + jobCtx.getExecutionId();\n\
    if(checkpoint == null) {\n// first start\nnew File(outputDir).mkdirs();\n} else\
    \ {\n// restart\n}\n}\n@Override\npublic void close() throws Exception {\n}\n\
    @Override\npublic void writeItems(List items)\nthrows Exception {\nfor(Object\
    \ o : items) {\nAttendanceItem itm = (AttendanceItem) o;\nString ssn = itm.getSsn().trim();\n\
    long millis = itm.getWorkMillis();\nFile f = new File(outputDir + File.separator\
    \ + ssn);\nlong tm = 0L;\nif(f.exists()) {\n// The following line is just a simple\
    \ trick\n// to read in the contents of a file.\ntry(Scanner s = new Scanner(f).\n\
    useDelimiter(\"\\\\Z\")) {\ntm = Long.parseLong(s.next().trim());\n}\n}\ntm +=\
    \ millis;\nf.delete();\nFileWriter fw = new FileWriter(f);\nfw.append(tm + \"\\\
    n\");\nfw.flush();\nfw.close();\n}\n}\n@Override\npublic Serializable checkpointInfo()\
    \ throws Exception {\nreturn null;\n}\n}\n```\n\n传递给 `writeItems()` 的项目数量对应于用于定义检查点之间项目范围的\
    \ `item-count` 属性。\n\n最后一步是任务类型步骤。它备份输入文件并删除空的输出文件夹：\n\n```\npackage book.jakartapro.batch;\n\
    import java.io.File;\nimport java.util.Properties;\nimport jakarta.batch.api.AbstractBatchlet;\n\
    import jakarta.batch.runtime.context.JobContext;\nimport jakarta.enterprise.context.Dependent;\n\
    import jakarta.inject.Inject;\nimport jakarta.inject.Named;\n@Dependent\n@Named(\"\
    Cleanup\")\npublic class Cleanup extends AbstractBatchlet {\n@Inject\nprivate\
    \ JobContext jobCtx;\n@Override\npublic String process() throws Exception {\n\
    backupInput();\nremoveEmptyOutputDirs();\nreturn \"COMPLETED\"; // \"FAILED\"\n\
    }\nprivate void removeEmptyOutputDirs() {\nProperties props = jobCtx.getProperties();\n\
    String outputDir = props.getProperty(\"output_folder\") +\nFile.separator + jobCtx.getExecutionId();\n\
    if(new File(outputDir).list().length == 0)\nnew File(outputDir).delete();\n}\n\
    private void backupInput() {\nProperties props = jobCtx.getProperties();\nString\
    \ fileName = props.getProperty(\"input_file\");\nString bakName = fileName + \"\
    .bak\" +\nSystem.currentTimeMillis();\nnew File(fileName).renameTo(new File(bakName));\n\
    }\n}\n```\n\n构建和部署应用程序\n\n为了构建和部署示例应用程序，请调用 Gradle `deployEar` 任务。你可以在 Eclipse\
    \ 的 Gradle 任务视图中执行此操作（确保在视图的菜单中选中了“显示所有任务”），或者在终端中使用 Gradle 包装器，键入以下内容：\n\n```\n\
    cd path/to/root/project\n./gradlew deployEar\n```\n\n第四部分有用的支持技术\n\n22. XML 绑定\n\
    \nJava 中的 XML 绑定涉及 Java 对象树（一组通过类成员关系连接的 Java 对象）与 XML 文档之间的转换。XML 绑定背后的技术称为 JAXB（Java\
    \ XML Binding），对于 Jakarta EE 10，JAXB 规范的版本号为 4.0。\n\n注意\n\n直到 Java 11 版本，JAXB\
    \ 技术都是 Java SE 的一部分。从 Java 11 开始，必须显式添加 JAXB 库才能使 JAXB 正常工作。由于 JAXB 是任何 Jakarta\
    \ EE 服务器的一部分，因此你无需自己执行此操作。\n\n为什么 JAXB 如此复杂\n\n乍一看，将 XML 文档转换为 Java 对象树以及反向转换应该很容易。例如，考虑一个音乐唱片库作为\
    \ XML 文档：\n\n```\n\nwav\nclassics\nJ.S. Bach\nMass in B-flat Minor\nH. Masters\n\
    \nmp3\nrock\nG. Jung\nButterflies\nB. Hoyden\n\n```\n\n以下是 Java 类：\n\n```\npublic\
    \ class Catalog {\nprivate List records;\n// Getters and setters...\n}\npublic\
    \ class Record {\nprivate long id;\nprivate String typ;\nprivate int make;\nprivate\
    \ String fileType;\nprivate String genre;\nprivate String composer;\nprivate String\
    \ title;\nprivate String performer;\n// Getters and setters...\n}\n```\n\n转换引擎面临的挑战如下：\n\
    \n*   如果你从 Java 转换到 XML，你必须决定哪些值作为元素，哪些值作为属性。这必须指定。\n\n*   从 Java 的角度来看，可以向记录添加一个指向父级的字段，尽管可能不建议这样做：`public\
    \ class Record { ... private Catalog catalog; ... }`。在这种情况下，天真的 XML 转换会引入无限回归：一条记录指向目录，目录指向所有记录，每条记录再次指向父目录，依此类推，永无止境。必须有一种方法来避免这种情况。\n\
    \n*   在 XML 中，你会编写 `<record ... make = \"unknown\" >`。当转换为相应的整数字段时，这会导致错误。必须有一种方法来确保类型安全或对\
    \ XML 值施加其他模式约束。\n\n*   尽管在此简单示例中未使用，但必须就如何转换更复杂的基本类型（如日期和字节数组）达成共识。\n\n*   如果名称不匹配，你必须在转换期间能够翻译名称。该示例在\
    \ XML 中使用 `type`，在 Java 中为相应字段使用 `typ`。\n\n将 Java 对象树编写为 XML\n此过程通常称为*编组*，由带有注解的\
    \ Java 类和你从 `jakarta.xml.bind` 包中的工厂获得的 JAXB 处理引擎处理。\n\n你可以用于 XML 绑定的注解很多。如果你查看\
    \ `jakarta.xml.bind.annotation` 包，可以看到完整的列表和所有详细描述：\n\n```\nhttps://docs.oracle.com/javase/8/docs/api/\n\
    javax/xml/bind/annotation/package-frame.html\n```\n\n对于这个简单的音乐目录，请使用以下注解：\n\n\
    *   `@XmlRootElement`：将此作为注解添加到构建对象树根的类。你还可以为生成的 XML 元素（包括子层次结构）定义命名空间。\n\n* \
    \  `@XmlAccessorType`：\n    此注解允许你指定类如何定义其数据成员。对于简单情况，你可以指示应考虑字段进行转换。\n\n*   `@XmlTransient`：使用此注解标记必须在转换中跳过的字段。\n\
    \n*   `@XmlElement`：如果你没有将字段访问指定为 `@XmlAccessorType`，或者你需要显式指定 XML 元素名称，则可以使用此注解来标记和配置要转换的字段。\n\
    \n*   `@XmlAttribute`：如果你希望字段最终成为属性而不是 XML 元素，请在字段级别使用此注解。\n\n*   `@XmlElementWrapper`：\n\
    \    对于集合，使用此注解指定相应的 XML 容器元素。通常，你还会添加一个 `@XmlElement` 注解来指定子元素的命名方式。\n\n对于这个音乐目录示例，将\
    \ `Catalog` 类型更改为以下内容：\n\n```\npackage book.jakartapro.xmlbinding;\nimport java.util.List;\n\
    import jakarta.xml.bind.annotation.*;\n@XmlRootElement(namespace = \"http://book.jakartapro.catalog\"\
    )\n@XmlAccessorType(XmlAccessType.FIELD)\npublic class Catalog {\n@XmlElementWrapper(name\
    \ = \"recordList\")\n@XmlElement(name = \"record\")\nprivate List records;\n//\
    \ Getters and setters...\n}\n```\n\n你可以看到，所有字段（这里只是 `records`）都将转换为 XML 元素。目录被标记为根元素，集合被称为\
    \ `recordList`，其元素被称为 `record`。\n\n相应调整后的 `Record` 类如下所示：\n\n```\npackage book.jakartapro.xmlbinding;\n\
    import jakarta.xml.bind.annotation.*;\n@XmlAccessorType(XmlAccessType.FIELD)\n\
    public class Record {\n@XmlAttribute private long id;\n@XmlAttribute(name = \"\
    type\") private String typ;\n@XmlAttribute private int make;\nprivate String fileType;\n\
    private String genre;\nprivate String composer;\nprivate String title;\nprivate\
    \ String performer;\n// Getters and setters...\n}\n```\n\n此示例使用 `@XmlAttribute`\
    \ 来标记你想要作为属性而不是元素的字段。所有其他字段都通过 `@XmlAccessorType` 注解自动转换为 XML 元素。\n\n对于转换本身，你使用\
    \ `JAXBContext.newInstance()` 调用，然后创建一个编组器（省略异常处理）：\n\n```\nList records = new\
    \ ArrayList();\nRecord r1 = new Record();\nr1.setId(173658);\nr1.setTyp(\"cd\"\
    );\nr1.setMake(1733);\nr1.setFileType(\"wav\");\nr1.setGenre(\"classics\");\n\
    r1.setComposer(\"J.S. Bach\");\nr1.setTitle(\"Mass in B-flat Minor\");\nr1.setPerformer(\"\
    H. Masters\");\nRecord r2 = new Record();\nr2.setId(1734536);\nr2.setTyp(\"usb\"\
    );\nr2.setMake(2001);\nr2.setFileType(\"mp3\");\nr2.setGenre(\"rock\");\nr2.setComposer(\"\
    G. Jung\");\nr2.setTitle(\"Butterflies\");\nr2.setPerformer(\"B. Hoyden\");\n\
    records.add(r1);\nrecords.add(r2);\nCatalog cat = new Catalog();\ncat.setRecords(records);\n\
    JAXBContext context = JAXBContext.newInstance(\nCatalog.class);\nMarshaller m\
    \ = context.createMarshaller();\nm.setProperty(Marshaller.JAXB_FORMATTED_OUTPUT,\n\
    Boolean.TRUE);\n// Write to System.out\nm.marshal(cat, System.out);\n// Write\
    \ to File\n//m.marshal(cat, new File(\"catalog.xml\"));\n```\n\n由于 `JAXB_FORMATTED_OUTPUT`\
    \ 属性，你将获得格式良好的输出，而 `marshal()` 方法调用实际执行转换。此示例程序的输出如下所示：\n\n```\n\nwav\nclassics\n\
    J.S. Bach\nMass in B-flat Minor\nH. Masters\n\nmp3\nrock\nG. Jung\nButterflies\n\
    B. Hoyden\n\n```\n\n添加模式\n在前面的部分中，你获取的 XML 文档没有关联模式。此处不详细介绍 XML 模式，但我至少想给你一些关于如何包含它们的提示。\n\
    \n要在生成的 XML 中包含对模式的引用，请向编组器添加以下内容之一：\n\n```\nm.setProperty(\nMarshaller.JAXB_SCHEMA_LOCATION,\n\
    \"http://some.server/catalog.xsd\");\n// or, if the schema does not specify a\
    \ namespace\nm.setProperty(\nMarshaller.JAXB_NO_NAMESPACE_SCHEMA_LOCATION,\n\"\
    http://some.server/catalog.xsd\");\n```\n\n为了根据 XSD 模式文件验证生成的 XML，你必须首先生成一个模式文件，然后将其添加到编组器。\n\
    \n模式文件可以使用 XML 模式规范手动生成，也可以使用工具。Eclipse 和其他 IDE 提供模式生成器。Eclipse 的模式生成器可以通过文件 ➤新建\
    \ ➤其他... ➤JAXB ➤ 从 JAXB 类生成模式来访问。或者，你可以为此目的使用名为 XMLBeans 的 Apache 工具。对于此目录，模式文件如下所示：\n\
    \n要向代码添加验证，请将代码更改为以下内容：\n\n```\n... [same as above]\nrecords.add(r1);\nrecords.add(r2);\n\
    SchemaFactory sf = SchemaFactory.newInstance(\n\"http://www.w3.org/2001/XMLSchema\"\
    );\nSchema schem = sf.newSchema(new File(\"Catalog.xsd\"));\nCatalog cat = new\
    \ Catalog();\ncat.setRecords(records);\nJAXBContext context =\nJAXBContext.newInstance(Catalog.class);\n\
    Marshaller m = context.createMarshaller();\nm.setSchema(schem);  // <==== NEW!\
    \ ====\n... [same as above]\n```\n\n当然，`... new File() ...` 必须更改为指向你的模式文件。如果你启动应用程序，生成的\
    \ XML 将根据你提供的模式文件进行验证。\n\n注意\n\n为了在非 Jakarta EE 环境中工作，必须将 JAXP 实现添加到类路径中。一个候选者是\
    \ Xerces 库，例如，通过 Maven 依赖项 `= \"xercesImpl\", group = \"xerces\", version = \"\
    2.12.1\"` 添加。\n\n从 XML 转换到 Java\n\n对于相反的操作，将 XML 转换为 Java 对象树，过程非常相似。你使用 `JAXBContext`\
    \ 并从中创建一个反编组器。对于音乐记录示例，此过程如下所示：\n\n```\nString xml = \"\"\"\n\nwav\nclassics\n\
    J.S. Bach\nMass in B-flat Minor\nH. Masters\n\nmp3\nrock\nG. Jung\nButterflies\n\
    B. Hoyden\n\n\"\"\";\nJAXBContext context = JAXBContext.\nnewInstance(Catalog.class);\n\
    Unmarshaller um = context.createUnmarshaller();\nByteArrayInputStream bis =\n\
    new ByteArrayInputStream(xml.getBytes());\nObject o = um.unmarshal(bis);\nSystem.out.println(o.getClass());\n\
    Catalog c = (Catalog) o;\nSystem.out.println(c.getRecords().size());\nSystem.out.println(c.getRecords().get(0).getComposer());\n\
    ```\n\n为了添加模式验证，你所要做的就是编写以下内容：\n\n```\nSchemaFactory sf = SchemaFactory\n.newInstance(\"\
    http://www.w3.org/2001/XMLSchema\");\nSchema schem = sf.newSchema(new File(\"\
    NewXMLSchema2.xsd\"));\n...\nJAXBContext context = JAXBContext.\nnewInstance(Catalog.class);\n\
    Unmarshaller um = context.createUnmarshaller();\num.setSchema(schem);\n...\n```\n\
    \n同样，使用适合你需求的 `.newSchema()` 版本。\n\n从模式生成 Java 类\n如果你在给定 XSD 文件的情况下开始开发，并且希望自动生成\
