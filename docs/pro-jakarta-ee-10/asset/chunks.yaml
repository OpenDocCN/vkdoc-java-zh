- fmt: '- 该类对`PUT`请求作出响应，请求地址为[`https://server.addr:8181/RestSecurity/jwtlogin/login`](https://server.addr:8181/RestSecurity/jwtlogin/login)和[`https://server.addr:8181/RestSecurity/jwtlogin/logout`](https://server.addr:8181/RestSecurity/jwtlogin/logout)。除非另有配置，`RestSecurity`对应WAR文件的名称，`8181`是TLS安全HTTP监听器的端口。


    - 名为`Credentials`的内部类用于保存凭据。它是REST启用的`authenticateUser()`方法所必需的，这样JAX-RS可以自动将JSON输入转换为单个方法参数。


    - `KeyGenerator`用于构建密钥或签署JWT。它永远不会发送给客户端。


    - 在生产环境中，登录用户、其JWT以及签名密钥都应保存在数据库中。为简洁起见，代码中仅包含`TODO`标记。


    - `authenticate()`和`unauthenticate()`方法连接到容器的基础设施，用于登录和注销用户。


    - `issueToken()`方法使用JJWT库构建JWT。


    ## 将JWT发送回服务器


    一旦客户端JavaScript代码接收到JWT，它将被存储在局部变量中。所有后续的AJAX请求都应通过`Authorization`HTTP头传输此JWT。


    ```javascript

    $.ajax({

    method: "GET",

    headers: {Authorization : jwt}, // <===

    dataType: "json",

    contentType: "application/json",

    url: url

    })

    .done(function(data, status, jqXHR) {

    // 成功，访问允许或JWT被忽略...

    })

    .fail(function(jqXHR, textStatus, errorThrown) {

    // 失败，JWT过期或不匹配...

    });

    ```


    你应该将头部添加到*所有*AJAX调用中，因为对于传输JWT而言，服务器是否检查JWT并不重要。如果服务器不检查，头部值将被忽略。如果服务器检查且JWT不匹配或已过期，服务器将返回带有错误代码的AJAX响应。


    ## 在REST端点中处理JWT


    `Secured`和`NonSecured`类是简单的REST端点类，演示了安全和非安全的REST访问：


    ```java

    package book.jakartapro.restsecurity;

    import jakarta.ws.rs.GET;

    import jakarta.ws.rs.Path;

    import jakarta.ws.rs.PathParam;

    import jakarta.ws.rs.Produces;

    import jakarta.ws.rs.core.Response;

    import book.jakartapro.restsecurity.jwt.JWTTokenNeeded;

    @Path("/secured")

    @JWTTokenNeeded

    public class Secured {

    @GET

    @Path("/{path : .*}")

    @Produces("application/json")

    public Response hello(@PathParam("path") String path) {

    return Response.ok().entity(

    "{\"msg\":\"" + "Secured Content" + "\"}"

    ).build();

    }

    }

    ```


    ```java

    package book.jakartapro.restsecurity;

    import jakarta.ws.rs.GET;

    import jakarta.ws.rs.Path;

    import jakarta.ws.rs.PathParam;

    import jakarta.ws.rs.Produces;

    import jakarta.ws.rs.core.Response;

    @Path("/unsecured")

    public class NonSecured {

    @GET

    @Path("/{path : .*}")

    @Produces("application/json")

    public Response hello(@PathParam("path") String path) {

    return Response.ok().entity(

    "{\"msg\":\"" + "Unsecured Content" + "\"}"

    ).build();

    }

    }

    ```


    重要的区别在于安全端点类使用了`@JWTTokenNeeded`注解。此注解也适用于方法级别。


    该注解本身使用了JAX-WS自动绑定机制。其代码如下：


    ```java

    package book.jakartapro.restsecurity.jwt;

    import java.lang.annotation.Retention;

    import static java.lang.annotation.RetentionPolicy.*;

    import java.lang.annotation.Target;

    import static java.lang.annotation.ElementType.*;

    import jakarta.ws.rs.NameBinding;

    @NameBinding

    @Retention(RUNTIME)

    @Target({TYPE, METHOD})

    public @interface JWTTokenNeeded {

    }

    ```


    由于`NameBinding`元注解的存在，JAX-WS会查找该注解的实现，该实现随后作为REST方法的过滤器。此实现并非基于Java语言层面。相反，过滤器本身使用了`@JWTTokenNeeded`注解：


    ```java

    package book.jakartapro.restsecurity.jwt;

    import java.io.IOException;

    import java.security.Key;

    import jakarta.annotation.Priority;

    import jakarta.inject.Inject;

    import jakarta.ws.rs.Priorities;

    import jakarta.ws.rs.container.ContainerRequestContext;

    import jakarta.ws.rs.container.ContainerRequestFilter;

    import jakarta.ws.rs.core.HttpHeaders;

    import jakarta.ws.rs.core.Response;

    import jakarta.ws.rs.ext.Provider;

    import io.jsonwebtoken.Jwts;

    @Provider

    @JWTTokenNeeded

    @Priority(Priorities.AUTHENTICATION)

    public class JWTTokenNeededFilter

    implements ContainerRequestFilter {

    @Inject

    private KeyGenerator keyGenerator;

    @Override

    public void filter(ContainerRequestContext

    requestContext) throws IOException {

    // 从请求中获取HTTP Authorization头部

    String authorizationHeader = requestContext.

    getHeaderString(HttpHeaders.AUTHORIZATION);

    if(authorizationHeader == null)

    authorizationHeader = "";

    if(authorizationHeader.equals("")) {

    requestContext.abortWith(Response.status(

    Response.Status.UNAUTHORIZED).build());

    } else {

    // 从HTTP Authorization头部提取令牌

    String token = authorizationHeader.

    replaceAll("^Bearer ","");

    try {

    // 验证令牌

    Key key = keyGenerator.generateKey();

    Jwts.parser().setSigningKey(key).

    parseClaimsJws(token);

    } catch (Exception e) {

    //e.printStackTrace(System.err);

    requestContext.abortWith(Response.status(

    Response.Status.UNAUTHORIZED).build());

    }

    }

    }

    }

    ```


    此类提取`Authorization`HTTP头部，并检查其是否包含有效且未过期的JWT。如果一切正常，则直接返回。否则，`abortWith(...)`语句会导致AJAX请求返回`UNAUTHORIZED`错误代码。


    在代码中，`keyGenerator.generateKey()`方法始终返回相同的（秘密）签名密钥。在生产环境中，你应从数据库获取密钥。例如，你可以通过以下代码获取用于访问此类数据库实体的“用户”密钥：


    ```java

    String dd = new String(Base64.getDecoder().

    decode(token.split("\\.")[1]));

    JsonReader reader = Json.createReader(

    new StringReader(dd));

    JsonObject jsonObject = reader.readObject();

    String user = jsonObject.getString("sub");

    ```


    尽管这绕过了JWT签名，但如果你仅将此`user`字符串用于从数据库获取JWT签名，则不会带来安全风险，因为该签名不可能被篡改。


    ## 15. JAVA MVC


    Java MVC是符合Jakarta EE规范的模型-视图-控制器模式实例化。它是基于组件的Faces技术的替代方案。Java MVC的规范由JSR-371管理，作为Java
    MVC的实现，它使用了Eclipse Krazo项目。


    ### 关于MVC

    MVC（模型-视图-控制器）是一种相当古老的架构模式，起源于1979年。它将应用程序分为数据模型层、前端表示视图层以及前端转换（页面流）和模型与视图之间数据协调的控制器层。

    Jakarta EE的专用Web架构技术是Faces，它不一定与MVC矛盾，但偏向于分层组件结构，为每个请求引入生命周期，并让组件决定页面流。为了回归本源，让开发者专注于MVC并避免组件树的特殊性，Java
    MVC项目应运而生。相应的JSR-371版本号为1.0，可用于商业产品。Eclipse Krazo项目（版本2.0.0）提供了实现。


    该规范可在以下地址获取：


    ```

    https://jcp.org/en/jsr/detail?id=371

