    public class MyAuth

    implements HttpAuthenticationMechanism {

    @Inject IdentityStoreHandler ish;

    AuthenticationStatus validateRequest(

    HttpServletRequest request,

    HttpServletResponse response,

    HttpMessageContext httpMessageContext)

    throws AuthenticationException {

    // use ish to validate the request

    ...

    CredentialValidationResult vr = ...;

    // we need to inform the container about the result

    // of the validation

    AuthenticationStatus res =

    httpMessageContext.notifyContainerAboutLogin(vr);

    return res;

    }

    }

    ```


    The `secureResponse()` and `cleanSubject()` methods are used to perform post-processing
    activities on requests and logout activities, respectively. Both have default
    implementations, so you don’t have to implement them unless you need to perform
    additional actions on requests during the logout process.


    The `HttpMessageContext` parameter is used as an interface to the security infrastructure
    controlled by the container. Its `notifyContainerAboutLogin()` method signals
    a successful login, but you can also skip the authentication process for unsecured
    paths via `doNothing()`. Or, you invoke `responseUnauthorized()` or `responseNotFound()`
    to force a 401 or 404 HTTP response status, respectively.


    As was the case for `IdentityStore`s, you don’t have to register `HttpAuthenticationMechanism`
    implementations. You can just put them in the `CLASSPATH`.


    In order to simplify the programming of authentication procedures, the RFC-375
    standard declares a couple of variants for authentication mechanisms. They come
    in the form of annotations:


    ```java

    @BasicAuthenticationMechanismDefinition

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue())

    @FormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue())

    ```


    For example, you can use the `@FormAuthenticationMechanismDefinition` annotation
    to tell the authentication controller which URLs to use to generate the login
    form page and the error page, as follows:


    ```java

    @FormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage="/login/login.xhtml",

    errorPage="/login/error.xhtml"

    )

    )

    @WebServlet("/secured")

    @DeclareRoles({ "user", "authorized" })

    @ServletSecurity(

    @HttpConstraint(rolesAllowed = "authorized"))

    public class SecuredContentServlet extends HttpServlet {

    ...

    }

