    \n/**\n * REST Web Service\n */\n@Path(\"/\")\npublic class Marvin {\n    static\
    \ Map<String, String> CM = new HashMap<>();\n    static {\n        CM.put(\".jar\"\
    , \"application/java-archive\");\n        CM.put(\".pom\", \"text/xml\");\n  \
    \  }\n\n    @EJB\n    LocalMirrorLocal localMirror;\n\n    @GET\n    @Path(\"\
    repo/{p : .*}\")\n    public Response fetch(@PathParam(\"p\") String path,\n \
