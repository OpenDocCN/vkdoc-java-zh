    ## Triggering Builds from Git


    In the previous “Build Triggers” section of this chapter, you learned how to configure
    an URL endpoint where you can trigger Jenkins builds from the outside. One possibility
    is to tell Git to invoke this trigger every time a new version is pushed into
    the central Git repository. To this aim, open this file:


    ```

    /srv/git/RestDate/hooks/post-receive

    ```


    If that file doesn’t exist, create it and make it executable: `chmod a+x post-receive`.
    For its contents, write the following:


    ```

    #!/bin/bash

    USERPW=USER:PASSWD

    SERVER=localhost

    PORT=8712

    TOKEN=TRGG5474Fhee5h

    PROJECT=My%20Project

    date >> jenkins-triggers.log

    curl -X GET -u ${USERPW} -s -S \

    http://${SERVER}:${PORT}/job/${PROJECT}/build?

    token=${TOKEN} >> jenkins-triggers.log 2>&1

    echo "Hook post-receive performed (informed CI)"

    ```


    (Remove the line break and the spaces after `build?`.) For `USER` and `PASSWD`,
    you must write a valid Jenkins user. For `SERVER` and `PORT`, write the Jenkins
    server and port (you are using these for the Jenkins web administrator). For `TOKEN`,
    include the string you entered at `Authentication` in the “Build Triggers” section
    of the Jenkins project (again in the web administrator). For the `PROJECT`, enter
    the Jenkins project’s name (you have to escape spaces as `%20` shown here). The
    `-s -S` disables cURL’s progress meter, but it allows error messages to be written.
    The `echo` message goes to the Git client, so committers see it after they push
    something to the central repository.


    The trigger is ready now. Try it and push any change to the Git repo. The trigger
    will fire the Jenkins project and the web administrator will automatically show
    the new build process that was triggered. Make sure you have the project view
    open to see these activities immediately.


    There are many more hooks you can use in Git to do interesting things. You can
    for example invoke some tests before the push actually happens, send the committer
    more information by -mail, and lots more. The possibilities are endless here.


    ## Triggering Builds from Subversion


    Once the remote triggers are activated for the Jenkins project, you can let Subversion
    trigger Jenkins builds just as you did for Git. Go to this path:


    ```

    /path/to/svn/repo/hooks

    ```


    Replace `/path/to/svn/repo` with the location of the Subversion repository. Create
    a new file called `post-commit` and write as its contents:


    ```

    #!/bin/bash

    USERPW=USER:PASSWD

    SERVER=localhost

    PORT=8712

    TOKEN=TRGG5474Fhee5h

    PROJECT=My%20Project

    WHEREAMI=/path/to/the/repo

    export PATH=/usr/local/sbin:/usr/local/bin

    export PATH=${PATH}:/usr/sbin:/usr/bin:/sbin:/bin

    cd $WHEREAMI

    date >> jenkins-triggers.log

    curl -X GET -u ${USERPW} -s -S \

    http://${SERVER}:${PORT}/job/${PROJECT}/build?

    token=${TOKEN} >> jenkins-triggers.log 2>&1

    echo "Hook post-receive performed (informed CI)" \

    >> jenkins-triggers.log

    ```


    (Remove the line break and the spaces after `build?`.) For `USER` and `PASSWD`,
    you must write a valid Jenkins user. For `SERVER` and `PORT`, provide the Jenkins
    server and port (you are using these for the Jenkins web administrator). For the
    `TOKEN`, include the string you entered at `Authentication` in the “Build Triggers”
    section of the Jenkins project (again in the web administrator). For `PROJECT`,
    include the Jenkins project’s name (you have to escape spaces, as `%20` here).
    For `WHEREAMI`, provide the location of the script. The `-s -S` disables cURL’s
    progress meter, but allows error messages to be written.


    Don’t forget to make this file executable by entering `chmod a+x post-commit`.
    The current directory and the `PATH` environment variable had to be set because
    Subversion doesn’t provide this information to the script.


    In the Jenkins web administrator, update the project configuration and, in the
    Pipeline section, change the `Jenkinsfile` (pipeline) definition source to Pipeline
    Script from SCM and change SCM” to Subversion. As the repository URL, enter the
    `svn+ssh://USER@SERVER//path/to/repo/RestDate/trunk` string, where `USER` needs
    to be replaced with a username able to connect via SSH, `SERVER` is the server
    address, and `/path/to/repo` is the repository path. As in the previous section
    for Git, the `RestDate/trunk` is supposed to contain the complete Gradle project,
    including a `Jenkinsfile` file.


    In the Credentials field, add the login information for using SSH. The possibilities
    include username plus password, or a username (probably `Jenkins`) plus a private
    SSH key (you must explicitly provide a key—take it from `jenkins/.ssh/id_rsa`).
    In the latter case, you must add the contents of `jenkins/.ssh/id_rsa.pub` to
    the `.ssh/authorized_keys` file on the server where the Subversion repository
    resides.


    Caution


    The `.ssh/authorized_keys` file must be restricted to owner-access only; otherwise,
    a standard-SSH won’t use it. Enter `chmod 600 authorized_keys` to do that.


    The trigger is now finished. Try committing an arbitrary change. Jenkins should
    start the project’s build pipeline.'
