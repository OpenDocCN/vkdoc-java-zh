    会查找该注解的实现，该实现随后作为 REST 方法的过滤器。此实现并非基于 Java 语言层面。相反，过滤器本身使用了 `@JWTTokenNeeded`\
    \ 注解：\n\n```\npackage book.jakartapro.restsecurity.jwt;\nimport java.io.IOException;\n\
    import java.security.Key;\nimport jakarta.annotation.Priority;\nimport jakarta.inject.Inject;\n\
    import jakarta.ws.rs.Priorities;\nimport jakarta.ws.rs.container.ContainerRequestContext;\n\
    import jakarta.ws.rs.container.ContainerRequestFilter;\nimport jakarta.ws.rs.core.HttpHeaders;\n\
    import jakarta.ws.rs.core.Response;\nimport jakarta.ws.rs.ext.Provider;\nimport\
    \ io.jsonwebtoken.Jwts;\n@Provider\n@JWTTokenNeeded\n@Priority(Priorities.AUTHENTICATION)\n\
    public class JWTTokenNeededFilter\nimplements ContainerRequestFilter {\n@Inject\n\
    private KeyGenerator keyGenerator;\n@Override\npublic void filter(ContainerRequestContext\n\
    requestContext) throws IOException {\n// 从请求中获取 HTTP Authorization 标头\nString\
    \ authorizationHeader = requestContext.\ngetHeaderString(HttpHeaders.AUTHORIZATION);\n\
    if(authorizationHeader == null)\nauthorizationHeader = \"\";\nif(authorizationHeader.equals(\"\
    \")) {\nrequestContext.abortWith(Response.status(\nResponse.Status.UNAUTHORIZED).build());\n\
    } else {\n// 从 HTTP Authorization 标头中提取令牌\nString token = authorizationHeader.\n\
    replaceAll(\"^Bearer \",\"\");\ntry {\n// 验证令牌\nKey key = keyGenerator.generateKey();\n\
    Jwts.parser().setSigningKey(key).\nparseClaimsJws(token);\n} catch (Exception\
    \ e) {\n//e.printStackTrace(System.err);\nrequestContext.abortWith(Response.status(\n\
    Response.Status.UNAUTHORIZED).build());\n}\n}\n}\n}\n```\n\n该类提取 `Authorization`\
    \ HTTP\n标头并检查它是否包含有效且未过期的 JWT。如果\n一切正常，它就直接返回。否则，`abortWith(...)`\n语句会导致 AJAX\
    \ 请求返回一个 `UNAUTHORIZED` 错误\n代码。\n\n在代码中，`keyGenerator.generateKey()`\n方法始终返回相同的（秘密）签名密钥。在生产环境中，你\n\
    应该从数据库中获取密钥。你可以通过使用\n以下代码来获取用于访问此类数据库实体的“用户”密钥：\n\n```\nString dd = new String(Base64.getDecoder().\n\
    decode(token.split(\"\\\\.\")[1]));\nJsonReader reader = Json.createReader(\n\
    new StringReader(dd));\nJsonObject jsonObject = reader.readObject();\nString user\
    \ = jsonObject.getString(\"sub\");\n```\n\n尽管这绕过了 JWT 签名，但如果你仅将此 `user` 字符串用于\n\
    从数据库中获取 JWT 签名，则不会带来\n安全风险，因为\n此签名不可能被篡改。\n\n15. JAVA MVC\n\nJava MVC 是\n模型-视图-控制器模式的一种符合\
    \ Jakarta EE 规范的实例化。\n它是基于组件的 Faces 技术的替代方案。Java MVC 的\n规范由 JSR-371 管理，并且作为\n\
    Java MVC 的一种实现，它使用了 Eclipse Krazo 项目。\n\n关于 MVC\nMVC（模型-视图-控制器）是一种相当古老的\n架构模式，起源于\
    \ 1979 年。它包含将应用程序\n分离为用于数据的模型层、用于前端展示的视图层，\n以及用于前端转换（页面流）和模型与视图之间数据协调的控制器层。\n\
    Jakarta EE 的专用 Web 架构技术是 Faces，\n它不一定与 MVC 相矛盾，但偏向于\n分层组件结构，为每个请求引入生命周期，\n并让组件决定页面流。为了回归本源，让开发者专注于\
    \ MVC 并避免\n组件树的特殊性，Java MVC 项目应运而生。相应的\nJSR-371 版本号为 1.0，可用于\n商业产品。Eclipse Krazo\
    \ 项目（版本 2.0.0）提供了\n一种实现。\n\n该规范可在以下地址获取：\n\n```\nhttps://jcp.org/en/jsr/detail?id=371\n\
    ```\n"
- fmt: "# Installing Java MVC\n\nIn order to install Java MVC, you have to add the\
    \ following dependencies to the `Gradle` build file:\n\n```\nimplementation 'jakarta.mvc:jakarta.mvc-api:2.0.0'\n\
    implementation 'org.eclipse.krazo:krazo-jersey:3.0.1'\nimplementation 'jstl:jstl:1.2'\n\
    ```\n\nThe last dependency is not actually needed for MVC, but since you aren't\
    \ using Faces pages, you have to revert to using JSP pages and add JSTL to allow\
    \ for improved functionalities like conditional statements and loops in the web\
    \ page templates. More precisely, the whole `build.gradle` file reads as follows:\n\
    \n```\nplugins {\n    id 'war'\n}\nsourceCompatibility = 1.17\ntargetCompatibility\
    \ = 1.17\nrepositories {\n    jcenter()\n}\ndependencies {\n    testImplementation\
    \ 'junit:junit:4.13.2'\n    implementation 'jakarta.platform:jakarta.jakartaee-api:10.0.0'\n\
    \    implementation 'jakarta.mvc:jakarta.mvc-api:2.0.0'\n    implementation 'org.eclipse.krazo:krazo-jersey:3.0.1'\n\
    \    implementation 'org.glassfish.jersey.core:jersey-server:3.0.0'\n    implementation\
    \ 'jstl:jstl:1.2'\n    implementation 'org.webjars:bootstrap:4.3.1'\n}\ntask deployWar(dependsOn:\
    \ war,\n        description:\">>> JavaMVC deploy task\") {\n    doLast {\n   \
    \     def FS = File.separator\n        def glassfish =\n                project.properties['glassfish.inst.dir']\n\
    \        def user = project.properties['glassfish.user']\n        def passwd =\
    \ project.properties['glassfish.passwd']\n        File temp = File.createTempFile(\"\
    asadmin-passwd\",\n                \".tmp\")\n        temp  ${sout}\"\n      \
    \  if(serr.toString()) System.err.println(serr)\n        temp.delete()\n    }\n\
    }\ntask undeployWar(\n        description:\">>> JavaMVC undeploy task\") {\n \
    \   doLast {\n        def FS = File.separator\n        def glassfish =\n     \
    \           project.properties['glassfish.inst.dir']\n        def user = project.properties['glassfish.user']\n\
    \        def passwd = project.properties['glassfish.passwd']\n        File temp\
    \ = File.createTempFile(\"asadmin-passwd\",\n                \".tmp\")\n     \
    \   temp  ${sout}\"\n        if(serr.toString()) System.err.println(serr)\n  \
    \      temp.delete()\n    }\n}\n```\n\nThis code adds the usual tasks for local\
    \ deployment and undeployment. For this to work, add the following to the `gradle.properties`\
    \ file in the root folder of the Gradle project:\n\n```\nglassfish.inst.dir =\
    \ /path/to/your/glassfish7\nglassfish.user = admin\nglassfish.passwd =\n```\n\n\
    In the rest of this chapter, you learn how to develop a pet store web application\
    \ as an example project. The project is called `JavaMvc`.\n\n## Configuration\
    \ Files\n\nIn `src/main/webapp/WEB-INF`, create two files—a file called `beans.xml`:\n\
    \nAnd a file called `glassfish-web.xml`:\n\nJava MVC is based on JAX-RS and it\
    \ uses annotations to control the REST API. A `web.xml` file is therefore not\
    \ needed. Also, you don't need a traditional `index.*` (`index.jsp` or whatever)\
    \ file for the same reason.\n\nIn the main package (called `book.jakartapro.javamvc`),\
    \ create an `App` class with the following contents:\n\n```\npackage book.jakartapro.javamvc;\n\
    import jakarta.ws.rs.ApplicationPath;\nimport jakarta.ws.rs.core.Application;\n\
    @ApplicationPath(\"/mvc\")\npublic class App extends Application {\n}\n```\n\n\
    This adds an additional `/mvc` to the context root. In the same package, add a\
    \ web filter named `RootRedirector`:\n\n```\npackage book.jakartapro.javamvc;\n\
    import jakarta.servlet.FilterChain;\nimport jakarta.servlet.annotation.WebFilter;\n\
    import jakarta.servlet.http.HttpFilter;\nimport jakarta.servlet.http.HttpServletRequest;\n\
    import jakarta.servlet.http.HttpServletResponse;\nimport java.io.IOException;\n\
    /**\n* Redirecting http://localhost:8080/JavaMvc/\n* This way we don't need a\
    \ <welcome-file> in web.xml\n*/\n@WebFilter(urlPatterns = \"/\")\npublic class\
    \ RootRedirector extends HttpFilter {\n    private static final long serialVersionUID\
    \ =\n            7332909156163673868L;\n    @Override\n    protected void doFilter(final\
    \ HttpServletRequest req,\n                            final HttpServletResponse\
    \ res,\n                            final FilterChain chain) throws IOException\
    \ {\n        res.sendRedirect(\"mvc/pets\");\n    }\n}\n```\n\nThis adds a redirector,\
    \ so that using the base URL in the browser address line directly leads to the\
    \ pet list.\n\nStarting with Jersey version 2.0, you need to add a bridge between\
    \ HTML forms and non-HTML REST verbs like `DELETE` and `PUT`. In HTML without\
    \ applying AJAX, issuing `DELETE` and `PUT` requests is not possible. On the other\
    \ hand, since on the server side, you want to stay clean and use a proper application\
    \ design built on top of JAX-RS, you need a way to simulate `DELETE` and `PUT`\
    \ requests using HTML forms. To this aim, you can install a `ContainerRequestFilter`\
    \ and special markers in the HTML forms. The class is named `HttpMethodOverride`\
    \ and it reads as follows:\n\n```\npackage book.jakartapro.javamvc;\nimport java.io.ByteArrayInputStream;\n\
    import java.io.ByteArrayOutputStream;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
    import java.lang.annotation.Annotation;\nimport org.glassfish.jersey.message.internal.MediaTypes;\n\
    import jakarta.ws.rs.container.ContainerRequestContext;\nimport jakarta.ws.rs.container.ContainerRequestFilter;\n\
    import jakarta.ws.rs.container.PreMatching;\nimport jakarta.ws.rs.core.Context;\n\
    import jakarta.ws.rs.core.Form;\nimport jakarta.ws.rs.core.MediaType;\nimport\
    \ jakarta.ws.rs.ext.Provider;\nimport jakarta.ws.rs.ext.Providers;\n@Provider\n\
    @PreMatching\npublic class HttpMethodOverride\n        implements ContainerRequestFilter\
    \ {\n    @Context\n    private Providers providers;\n    @Override\n    public\
    \ void filter(\n            ContainerRequestContext requestContext)\n        \
    \    throws IOException {\n        if (isForm(requestContext)) {\n           \
    \ Form form = getForm(requestContext);\n            String pseudoMethod = (String)\
    \ form.asMap().\n                    getFirst(\"_method\");\n            if(pseudoMethod\
    \ != null) {\n                requestContext.setMethod(pseudoMethod);\n      \
    \      }\n        }\n        String methodFromHeader = requestContext.\n     \
    \           getHeaderString(\"X-HTTP-Method-Override\");\n        if(methodFromHeader\
    \ != null) {\n            requestContext.setMethod(methodFromHeader);\n      \
    \  }\n    }\n    //////////////////////////////////////////////////\n    //////////////////////////////////////////////////\n\
    \    private boolean isForm(\n            ContainerRequestContext requestContext)\
    \ {\n        return requestContext.hasEntity()\n                && MediaTypes.typeEqual(\n\
    \                MediaType.APPLICATION_FORM_URLENCODED_TYPE,\n               \
    \ requestContext.getMediaType());\n    }\n    private Form getForm(\n        \
    \    ContainerRequestContext requestContext)\n            throws IOException {\n\
    \        ByteArrayInputStream bis = toResettableStream(\n                requestContext.getEntityStream());\n\
    \        Form form = providers.getMessageBodyReader(\n                       \
    \ Form.class, Form.class, new Annotation[0],\n                        MediaType.APPLICATION_FORM_URLENCODED_TYPE).\n\
    \                readFrom(\n                        Form.class,\n            \
    \            Form.class,\n                        new Annotation[0],\n       \
    \                 MediaType.APPLICATION_FORM_URLENCODED_TYPE,\n              \
    \          null,\n                        bis);\n        bis.reset();\n      \
    \  requestContext.setEntityStream(bis);\n        return form;\n    }\n    private\
    \ ByteArrayInputStream toResettableStream(\n            InputStream entityStream)\
    \ throws IOException {\n        ByteArrayOutputStream baos = new ByteArrayOutputStream();\n\
    \        byte[] buffer = new byte[1024];\n        int len;\n        while ((len\
    \ = entityStream.read(buffer)) > -1) {\n            baos.write(buffer, 0, len);\n\
    \        }\n        baos.flush();\n        return new ByteArrayInputStream(baos.toByteArray());\n\
    \    }\n}\n```\n\nThe filter looks for a form parameter called `_method`, and,\
    \ if it is present, the filter uses its value to override the REST method. The\
    \ `getForm()` and `toResettableStream()` methods extract the form body and ensure\
    \ that subsequent filters and the REST method processors get a data stream that\
    \ hasn't been consumed.\n\n## Static Files\n\nYou need a very short style file\
    \ for the Pet Shop application. The application, by virtue of the `implementation\
    \ 'org.webjars:bootstrap:4.3.1'` dependency, includes the bootstrap styles. You\
    \ will see how to use them in the view files. The little addition you need is\
    \ called `styles.css` and it goes in the `src/main/webapp/staticcss` folder. As\
    \ its contents, write the following:\n\n```\n.table td {\n    vertical-align:\
    \ middle;\n}\n```\n\nFor your own development, you can use the same `static` folder\
    \ for any static file you need in your application.\n\n## Model Classes\n\nThe\
    \ model classes go in a `model` package. For the sample application, it is called\
    \ `book.jakartapro.javamvc.model` and then you add a `Pet` class:"
