    ## Introduction


    Java is not just a programming language, it’s also a platform used to host software.
    As far as enterprise environments go, Java Enterprise Edition Jakarta EE (formerly
    JEE) has an extensive collection of APIs that are particularly useful for addressing
    corporate IT requirements.


    This book covers advanced topics of Jakarta EE development. This includes pro-level
    web tier development, architecture-related matters, advanced XML and JSON processing,
    application clients and scripting languages, resource handling, high-level security
    enhancements, and advanced monitoring and logging techniques.


    The target version of Jakarta EE is version 10. Unless otherwise noted, server
    scripts have been tested on Ubuntu 22.04. Switching to Debian, Fedora, or OpenSUSE
    Leap should not impose any problems.


    The book is for advanced enterprise software developers with knowledge of Java
    Standard Edition version 8 or later and some experience in Jakarta EE (or JEE)
    development. Having read the book titled *Beginning Jakarta EE* from the same
    author and publisher (ISBN: 978-1-4842-5078-5) will surely help, but it’s not
    a strict prerequisite. I keep references to the beginner book at a bare minimum.
    I also assume that you can use the online API references, so this book is not
    a complete reference in the sense that not all API classes and methods are listed.
    Instead, the book includes techniques and technologies that will help professional
    Java enterprise-level developers deal with topics and master problems that arise
    in a corporate environment.


    The book uses the Linux operating system as its development platform, although
    the code can run on other platforms without requiring complex changes. The server
    installations—like version control, continuous integration systems, and operating
    instructions—all target the Linux operating system. This book also does not cover
    hardware issues, except for some cases where hardware performance has a noticeable
    impact on the software.


    After finishing this book, you will be able to develop and run Jakarta EE 10 programs
    of mid- to high-level complexity.


    ### How to Read This Book


    You can read this book sequentially from the beginning to the end, or you can
    read chapters on an ad hoc basis if your work demands special attention to one
    or another topic.


    ### Source Code


    All the source code in this book can be found at `github.com/Apress/pro-jakarta-ee10`.


