    \ open to see these activities immediately.\n\nThere are many more hooks you can\
    \ use in Git to do interesting things. You can for example invoke some tests before\
    \ the push actually happens, send the committer more information by email, and\
    \ lots more. The possibilities are endless here.\n\n## Triggering Builds from\
    \ Subversion\n\nOnce the remote triggers are activated for the Jenkins project,\
    \ you can let Subversion trigger Jenkins builds just as you did for Git. Go to\
    \ this path:\n\n```\n/path/to/svn/repo/hooks\n```\n\nReplace `/path/to/svn/repo`\
    \ with the location of the Subversion repository. Create a new file called `post-commit`\
    \ and write as its contents:\n\n```bash\n#!/bin/bash\nUSERPW=USER:PASSWD\nSERVER=localhost\n\
