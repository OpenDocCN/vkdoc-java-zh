    \ field.\nVoila—there is the memory leak! See Figure [38-5](#490565_1_En_38_Chapter.xhtml#Fig5).\n\
    \n![](images/490565_1_En_38_Chapter/490565_1_En_38_Fig5_HTML.jpg)\n\nA window\
    \ of visual V M dominators analysis memory leaks. The\ndominator is Mem Leak followed\
    \ by static fields and static list. It\nincludes the name, size, and retained\
    \ details.\n\nFigure 38-5\nVisualVM Dominators analysis\n\nNote\n\nExpect some\
    \ trial and error work. For other types of memory leaks,\nyou'll probably have\
    \ to use other settings to find something\nmeaningful.\n\nIt is also possible\
    \ to compare two heaps. The\nbutton on the left side of the Preset label allows\
    \ you to select another\nheap dump for comparison. This is an advanced analysis\
    \ technique, which\ncan help you if looking at a single heap dump does not lead\
    \ you to\nsignificant conclusions.\n\nThe Eclipse Memory\nAnalyzer (EMA) is another\
    \ quite\nversatile tool you can use for heap dump analysis. It is an Eclipse\n\
    plugin and you can find it in the Eclipse Marketplace if you search for\nMemory\
    \ Analyzer. After installation, there is a new perspective called\nMemory Analysis\
    \ (choose Window ➤ Perspective). Using the toolbar, you\ncan import a heap dump.\
    \ In a wizard dialog box, check Leak Suspects\nReport. You will then be presented\
    \ a report pointing to suspicious\nclasses, as shown in Figure [38-6](#490565_1_En_38_Chapter.xhtml#Fig6).\n\
    \n![](images/490565_1_En_38_Chapter/490565_1_En_38_Fig6_HTML.jpg)\n\nAn illustration\
    \ of the eclipse memory analyzer report. It presented a\nreport on problem suspect\
    \ 1 with keywords. A chart denotes the total\nwhich is 1871 M B.\n\nFigure 38-6\n\
    Eclipse memory analyzer report\n\nThe report correctly lists the `MemLeak` class\
