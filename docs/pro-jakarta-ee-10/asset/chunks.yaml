    \     String suffix = path.substring(path.lastIndexOf(\".\"));\n        String\
    \ outType = CM.getOrDefault(suffix, \"text/plain\");\n        rb.type(outType);\n\
    \        rb.entity(localMirror.fetchBytes(path, rb));\n        return rb;\n  \
