    *   `<auth-method>CLIENT-CERT</auth-method>` 代码是最关键的部分。在此示例中，你声明要使用客户端证书登录安全区域。随后的
    `<realm-name> certificate </realm-name>` 标签告知服务器登录凭据（即证书）在服务器上的存储位置。后者是服务器特定的设置——对于
    GlassFish 而言，`certificate` 域指示 GlassFish 使用已注册的客户端证书。


    角色到用户组的映射发生在服务器特定的部署描述符中。对于 GlassFish，该文件是 `WEB-INF/glassfish-web.xml`。此文件的内容可能如下所示：


    ```


    admin

    authorized


    ```


    此示例表示将角色 `admin` 映射到用户组 `authorized`。对于其他服务器，你需要查阅其手册以了解如何将角色映射到用户组。


    **额外的 GlassFish 配置**

    为了让 GlassFish 使用客户端证书，你需要启用此功能。打开 Web 管理控制台 `http://localhost:4848`，然后依次选择“配置”
    ➤ “服务器配置” ➤ “HTTP 服务” ➤ “HTTP 监听器” ➤ “http-listener-2”。在 SSL 选项卡上，勾选“客户端身份验证”复选框。


    请注意，用户组与证书之间没有直接关系。这是一个特定于服务器产品的设置。对于 GlassFish，你需要编辑此文件：


    ```

    GLASSFISH_INST/glassfish/domains/domain1/config/domain.xml

    ```


    滚动到


    ```


    并将该条目修改为


    进行此更改后，你必须重新启动服务器。


    **注意**


    GlassFish 7 中存在一个错误，导致你无法通过 Web 管理控制台管理此条目。幸运的是，对于 `certificate` 域，你只需编辑此文件一次，无论对该域进行何种客户端证书管理活动。


    **客户端证书示例**


    作为示例，创建一个 Web 应用程序，并在 `src/main/webapp/WEB-INF` 目录下包含以下文件：


    ```

    beans.xml:


    faces-config.xml:


    book.jakartapro.clientcertauth.web.WebMessages


    bundle


    en

    es -->


    glassfish-web.xml:


    admin

    authorized


    web.xml:


    index.xhtml


    Faces Servlet


    jakarta.faces.webapp.FacesServlet


    Faces Servlet

    *.xhtml


    Admin Constraint


    members


    /admin/*


    admin


    CONFIDENTIAL


    CLIENT-CERT

    certificate


    admin


    ```


    同时，在 `src/main/webapp` 目录下创建以下 XHTML 文件：


    ```

    index.xhtml:


    Client Cert Authentication


    This is the company website


    admin/secured.xhtml:


    Client Cert Authentication


    Secured area


    ```


    你可以通过导航到安全区域来验证客户端证书是否正常工作。此外，还可以查看浏览器中的页面属性。在 Firefox 中，点击标题栏中 URL 地址旁边的安全徽章，然后选择“连接不安全”
    → “更多信息”。


    **注意**


    除非你更改了 GlassFish 中的 HTTPS 监听器配置（并且项目名称为 `ClientCertAuth`），否则请访问 `https://localhost:8181/ClientCertAuth`。


    **14. REST 安全性**


    对于 SPA（单页 Web 应用程序），无法可靠地使用 `WEB-INF/web.xml` 中定义的安全约束来强制执行安全性。原因是这些安全约束是专门为 Web
    页面的 HTTP 请求和响应量身定制的，而非 JSON 片段。此外，尽管存在用于将 REST 类和方法标记为需进行安全检查的注解，但 REST 实现并非必须实际执行这些检查。用于
    RESTful 服务的 JAX-RS 规范根本不处理安全性问题。

    作为补救措施，一些额外的规范明确处理了 REST 安全性：JWT（JSON Web 令牌）、JWS（JSON Web 签名）、JWE（JSON Web 加密）、JWK（JSON
    Web 密钥）和 JWA（JSON Web 算法）。这一系列规范处理了安全令牌以及 JSON 数据的签名和加密。


    **注意**


    JSR-375 曾试图标准化 Jakarta EE 安全技术。然而，其实现似乎处于不确定状态，并且你在互联网上找不到有用的教程和示例。因此，我决定使用上述技术。

