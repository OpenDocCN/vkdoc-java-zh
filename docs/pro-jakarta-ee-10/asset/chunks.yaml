- fmt: "`/login/login.xhtml`\n`/login/error.xhtml`\n\n`admin`\n\n```\nBecause of the\
    \ settings inside <security-constraint>,\naccess to some resources is\nintercepted\
    \ by the server, as follows:\n\n*   The pattern inside <url-pattern>\n    determines\
    \ which resources to watch. Here, you indicate that all\n    resources underneath\
    \ admin/ must be set\n    under security custody.\n\n*   The transport protocol\
    \ is forced to use SSL/TLS. This is because\n    of the CONFIDENTIAL note\n  \
    \  inside <transport-guarantee>.\n    A switch from HTTP to HTTPS happens automatically\
    \ if it’s\n    necessary.\n\n*   The user has authenticated themself and has the\
    \ admin role. This is\n    because of the <role-name>\n    tag.\n```\n\nThe `<login-config>`\
    \ element indicates that you want to use form-based authentication and specifies\
    \ the login form files. Those files are discussed shortly. Inside `<login-config>`,\
    \ the `<auth-method> FORM </auth-method>` (the `FORM` being a predefined constant)\
    \ prescribes a custom form for authentication. The `<realm-name> file </realm-name>`\
    \ indicates the authorization data location. This is server specific—the `file`\
    \ here (not a predefined constant as seen in the Jakarta EE specification) is\
    \ for GlassFish and specifies the server’s local file storage for users and passwords.\n\
    \nThe `<security-role>` element lists all the roles (apart from unauthorized access)\
    \ that affect the application. Although you can have several, there is just one\
    \ in this example.\n\n## Security Role Mapping\n\nThe server maps the roles (defined\
    \ in `web.xml`) to the user groups (defined in the server product). This mapping\
    \ is specified in the `WEB-INF / *-web.xml` file. For GlassFish, you rewrite the\
    \ `glassfish-web.xml` file inside the `WEB-INF` folder and let it read as follows:\n\
    \n```\nadmin\nApplAdmin\n```\n\nThe `admin` role is mapped to the `ApplAdmin`\
    \ user group because you used `ApplAdmin` in the previous sections as the user’s\
    \ group.\n\n## Form-Based Authentication XHTML Code\n\nThe steps necessary for\
    \ a web user to enter a secured application part depends on your application,\
    \ more precisely on the `<url-pattern>` tag inside the `<security-constraint>`\
    \ of the `web.xml` file. If you, for example, need a button or link to enter the\
    \ secured area, you write something like this:\n\n```\n...\n...\n...or...\n...\n\
    ```\n\n> **Note:** For brevity, this example uses literal values for the XHTML\
    \ text. For production code, you should refer to the language resource files instead.\n\
    \nIf, in the `<url-pattern>` tag, inside `<security-constraint>`, you write the\
    \ following:\n\n```\n/admin/*\n```\n\nThe server knows it has to ask for credentials\
    \ to enter the secured area given in the button or link.\n\nFor the form-based\
    \ authentication code, `login.xhtml` is referred to by `<login-config>` inside\
    \ the `web.xml` file. You could write a login form as follows:\n\n```\nLogin Form\n\
    Please log in:\n```\n\nYou can code whatever you like, add images and styling\
    \ as defined by company guidelines, as well as add “Forgot Password” links, information\
    \ page links, addresses, phone numbers, and more. The important part is this:\n\
    \nDo **not** use `<h:form>` here. Instead, use the plain HTML `<form>` tag, as\
    \ shown here. You have to use `j_security_check` for the action and `j_username`\
    \ and `j_password` for the field IDs.\n\nFor the error page (`login/error.xhtml`),\
    \ which will be shown if an invalid user/password combination is entered, you\
    \ can use the following:\n\n```\nLogin Error\nInvalid user name or password.\n\
    Please enter a username or password that is authorized\nto access the secured\
    \ part. For this application, this\nmeans a user that has been created in the\n\
    file realm and has been assigned to the\ngroup of ApplAdmin.\n```\n\n> **Note:**\
    \ This example prepends `#{request.contextPath}` to the link’s value, because\
    \ the error page cannot use relative URLs. This is because it is handled by the\
    \ login module, which discards the application’s URL context.\n\nThe application\
    \ is functional now. You can deploy it and point your browser to the following\
    \ URL to test it:\n\n```\nhttps://localhost:8181/FormBasedAuth/\n```\n\n## 13.\
    \ Client Certificates\n\nUsing SSL/TLS on the server side to ensure privacy and\
    \ data integrity is an extremely common task today. With TLS, SSL is deprecated,\
    \ and you can be sure that your communication is encrypted, and that the identity\
    \ of the party belonging to the server is also secured. The server presents a\
    \ certificate to the client to attest its identity. The identity on the client\
    \ side, however, is checked by comparing a password from a dialog entry with the\
    \ password from a database.\n\nIf this is not enough for your needs, you can require\
    \ users of your web application to authenticate themselves via a certificate as\
    \ well. To achieve this, you use *client-side* certificates. This way, you get\
    \ improved security, because users cannot pin certificates to their monitors as\
    \ sometimes happens with passwords, and lending a certificate to someone else\
    \ also is a different story compared to giving away a password. This chapter talks\
    \ about such these client certificates.\n\n### Preparing Scripting\n\nBefore you\
    \ install client certificates, you need to know how to generate them. This book\
    \ covers professional web applications, so you'll probably have more than a handful\
    \ of client certificates. Therefore, it would be nice if you could use a script\
    \ for mass production. I present you such a script, and because this example uses\
    \ Groovy as the scripting language, you can administer the client certificates\
    \ from Linux and Windows boxes.\n\n> **Note:** Don’t forget to add the Groovy\
    \ plugin, as described at the beginning of the book.\n\nFirst, create a new Gradle\
    \ and Groovy project in Eclipse: Choose File ➤ New ➤ Other... ➤ Gradle Project\
    \ and enter `ClientCertificates` as a project name. Once the project is created,\
    \ right-mouse-click the project and choose Configure ➤ Convert to Groovy Project\
    \ to add explicit Groovy scripting capabilities.\n\nAdd a new `scripts` folder\
    \ to the project, and again right-mouse-click the project and choose Properties\
    \ ➤ Groovy Compiler. Check the Enable Project Specific Settings checkbox. Do the\
    \ same for Enable Script Folder Support and add the `scripts` folder (enter `scripts/*`\
    \ in the dialog box).\n\n> **Note:** To adhere more closely to the standards,\
    \ you can use `src/main/scripts` as the scripts folder. I use Gradle here for\
    \ dependency resolution only, so using a `scripts` top-level folder, apart from\
    \ being less Gradle like, is easier to find in the Project Explorer. But if you\
    \ prefer, go ahead and use the standard location.\n\nIn the `build.gradle` file,\
    \ add dependencies for the certificate administration library called `Bouncycastle`,\
    \ as follows:\n\n```\ndependencies {\n...\nimplementation 'org.bouncycastle:bcprov-jdk15on:1.64'\n\
    }\n```\n\nIn that same file, make sure you are using Java 1.17:\n\n```\nplugins\
    \ {\n...\n}\nsourceCompatibility = 1.17\ntargetCompatibility = 1.17\n```\n\nThen\
    \ right-mouse-click the project and choose Gradle ➤ Refresh Gradle Project.\n\n\
    ### Generating Client Certificates\n\nTo generate one or more client certificates,\
    \ add the script file called `scripts/generate.groovy`, as follows:"
