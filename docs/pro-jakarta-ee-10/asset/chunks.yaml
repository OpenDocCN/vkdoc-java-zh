- fmt: "# Memory Troubleshooting\n\n## Garbage Collector Options\n\nThis is possible\
    \ in JDK 15 or later. For JDK 11 to 14, the Zero Garbage Collector was an experimental\
    \ feature and you had to also add:\n\n```\n# only for jdks < 15\n-XX:+UnlockExperimentalVMOptions\n\
    ```\n\nEnter `java zero garbage collector options` in your favorite search engine\
    \ to find out more about ZGC options.\n\n## Garbage Collector Logs\n\nFor all\
    \ garbage collectors, you can enable logging output. The garbage collector then\
    \ writes information about its activities into a dedicated logfile. To analyze\
    \ such files is a science of its own, but besides writing scripts to extract valuable\
    \ information from GC logfiles, there are also GUI applications that can help\
    \ you. For example, the little tool GCViewer from [`https://sourceforge.net/projects/gcviewer/`](https://sourceforge.net/projects/gcviewer/)\
    \ can help you quickly analyze GC activities.\n\n**Note:** For garbage collector\
    \ logging options, watch out for JVM `-Xlog:*` or `-Xlog:gc:*` flags in the documentation\
    \ (`*` is a wildcard).\n\n# 38. Memory Troubleshooting\n\nA central characteristic\
    \ of Java programs is the dynamic creation of objects while the application is\
    \ running. In well-formed code, the garbage collector can automatically remove\
    \ unused objects in a balanced manner. That is to say that, at some point, the\
    \ number of removed objects equals the number of newly created objects. Unfortunately,\
    \ and especially with complex applications in a corporate environment, software\
    \ deficiencies might lead to functionally unused objects somewhat hanging around\
    \ and *not* being cleared by garbage collection. If such objects pile up over\
    \ time, that’s called a *memory leak*. Memory leaks inevitably lead to an application\
    \ breaking down. It is therefore important to identify memory leaks during the\
    \ testing phase, identify their cause, and fix the code.\n\n## Identifying Memory\
    \ Leaks\n\nConsider the following code snippet:\n\n```java\nstatic class A {\n\
    \    int x = 7;\n}\nstatic List list = new ArrayList();\n\npublic String memLeak()\
    \ {\n    Runnable r = new Runnable() {\n        public void run() {\n        \
    \    while (true) {\n                for (int i = 0; i < 500; i++) {\n       \
    \             A a = new A();\n                    if (Math.random() < 0.5)\n \
    \                       list.add(a);\n                }\n                try {\n\
    \                    Thread.sleep(0, 100);\n                } catch (InterruptedException\
    \ e) {\n                }\n            }\n        }\n    };\n    new Thread(r).start();\n\
    \    return \"{\\\"result\\\":\\\"\" + \"OK\" + \"\\\"}\";\n}\n```\n\nYou can\
    \ for example add this to a REST controller inside a web application:\n\n```java\n\
    @Path(\"/\")\npublic class MemLeak {\n    static class A { int x = 7; }\n    static\
    \ List list = new ArrayList();\n\n    @Path(\"/memleak\")\n    @GET\n    @Produces(\"\
    application/json\")\n    public String memLeak() {\n        ...\n    }\n}\n```\n\
    \nOnce you invoke the method, it spawns a new thread. Inside the thread, the program\
    \ enters an infinite loop for creating instances of class `A`. Each object is\
    \ added to a list with a probability of approximately 50 percent. The garbage\
    \ collector later removes the objects not added to the list. The objects inside\
    \ the list can never be freed, and they perpetually pile up in the heap memory.\
    \ So you effectively have an artificial memory leak here.\n\nIf you added the\
    \ method to a REST controller, the application happens to be called `MemLeak`,\
    \ and the servlet filter addresses `webapi/*` URLs (configured inside `web.xml`).\
    \ You can start the leaking method via this:\n\n```bash\ncurl -X GET http://localhost:8080/MemLeak/webapi/memleak\n\
    ```\n\n**Note:** This is for a locally running GlassFish—for other application\
    \ servers, you probably have to change this URL.\n\nIn a VisualVM instance connected\
    \ to the server process, you can watch the heap memory usage from the Monitor\
    \ tab. With the leaking method running, you will see a development like the one\
    \ shown in Figure 38-1.\n\n![Memory leaking](images/490565_1_En_38_Chapter/490565_1_En_38_Fig1_HTML.jpg)\n\
    \n*A VisualVM interface displays memory leaks. The heap size and used heap are\
    \ plotted. The heap memory used is 535 MB, the maximum is 536 MB, and the size\
    \ is 536 MB.*\n\n**Figure 38-1** Memory leaking\n\nYou can see that the Used Heap\
    \ figure hits the maximum allowed heap space (512 MB in this case) several times.\
    \ Garbage collector activities, recognizable by negative slope regions, free less\
    \ and less memory. Finally, the Used Heap curve approaches the maximum heap value\
    \ and the garbage collector can’t free any noticeable amount of memory. This is\
    \ the point where the application server finally breaks down.\n\nUnfortunately,\
    \ plotting the Used Heap line will not always point to the leaking application.\
    \ Consider another example shown in Figure 38-2.\n\n![Another memory leaking](images/490565_1_En_38_Chapter/490565_1_En_38_Fig2_HTML.jpg)\n\
    \n*A VisualVM interface displays the other memory leaks. The heap size and used\
    \ heap are plotted. The heap memory used is 425 MB, the maximum is 536 MB, and\
    \ the size is 536 MB.*\n\n**Figure 38-2** Another memory leaking\n\nHere, the\
    \ Used Heap number touches the maximum value just once, so the garbage collector\
    \ performs a cleanup, and the application server continues its work with a flatter\
    \ slope with respect to the Used Heap number. The leaking thread dies, not the\
    \ whole application.\n\nLooking at these two examples, it should be clear that\
    \ you need another source of information in order to reliably detect memory leaks.\
    \ This is why you also need to look at the logs. Regardless of whether the whole\
    \ server breaks down or just an application thread, for a memory leak, you will\
    \ always find an entry like this:\n\n```\n[2022-04-14T17:06:40.873+0200] [glassfish\
    \ 6.2]\n[SEVERE] [] [] [tid: _ThreadID=305 _ThreadName=Thread-8]\n[timeMillis:\
    \ 1649948800873] [levelValue: 1000] [[\njava.lang.OutOfMemoryError: Java heap\
    \ space\nat ...\nat book.jakartapro.memleak.MemLeak$1.run(\nMemLeak.java:32)\n\
    at java.base/java.lang.Thread.run(Thread.java:834)\n]]\n```\n\nThe suggested procedure\
    \ is to first look at the logs, and then visualize the Used Heap curve to strengthen\
    \ the evidence for a memory leak in action.\n\n## More Evidence: Heap Dumps\n\n\
    To further identify which part of an application is responsible for a memory leak,\
    \ you can use *heap dumps*. Heap dumps represent the precise memory state a Java\
    \ application (or application server) has at the time the heap dump was taken.\
    \ A heap dump stores its data in a file, typically located on the same machine\
    \ on which the application runs. There are several possibilities for taking heap\
    \ dumps. Some of them require the knowledge of the process ID of the Java program\
    \ you want to take the heap dump from.\n\n**Note:** For all the shell commands\
    \ presented here, you must either add the `bin` directory from your JDK installation\
    \ to the `PATH` environment variable, or you must add the full path to the command.\n\
    \nIn order to acquire the process ID, use the `jps` command:\n\n```bash\njps -l\n\
    Output for example:\n8384 jdk.jcmd/sun.tools.jps.Jps\n8209 org.eclipse.lemminx.XMLServerLauncher\n\
    7796 /opt/eclipse/[...]equinox.launcher[...].jar\n7416 com.sun.enterprise.glassfish.bootstrap.ASMain\n\
    8072 org.gradle.launcher.daemon.bootstrap.GradleDaemon\n```\n\nIn the output shown,\
    \ `ASMain` points to a running GlassFish instance—`7416` is the process ID in\
    \ this case.\n\nBack to the heap dumping tools—the `jmap` command is one option:\n\
    \n```bash\njmap -dump:live,format=b,file=dump1.hprof 7416\n```\n\nThe `live` flag\
    \ is optional. If you omit it, orphaned objects subject to garbage collection\
    \ will be added to the dump. The `format=b` flag ensures that the dump will be\
    \ in `HPROF` binary format. `7416` is the process ID; substitute your own here.\
    \ After the command has executed, you can find the dump in the current directory.\n\
    \nThe `jmap` command has an operation mode where just the Java object instances\
    \ are counted and no dump is written. Enter the following:\n\n```bash\njmap -histo:live\
    \ 7416 | less\n```\n\nTo see output like this (which has been slightly shortened):\n\
    \n```\nnum #instances #bytes    class name (module)\n```"
