    ## 23. JSON Handling


    The XML binding technology covered in Chapter [22](#490565_1_En_22_Chapter.xhtml)
    introduced a valuable data exchange format, simplifying and standardizing the
    communication in heterogeneous and wide-spread computer networks. By using schemas
    and namespaces for elements and attributes, this enabled semantics and version
    consistency in XML, thus allowing for XML document validity checks. Unfortunately,
    with all those additions, XML documents became more and more complex, and in order
    to send a few bytes formatted as XML, a lot of boilerplate data had to be transmitted,
    too. Especially with browser-to-server communication, XML became overkill. For
    this reason, web application developers switched to the leaner JSON (JavaScript
    Object Notation) data protocol, making it necessary for the Java world to develop
    tools and libraries that could handle JSON.


    JSON processing is part of the Jakarta EE 10 specification. This specifically
    involves Jakarta JSON Binding (JSON-B), version 3.0, and Jakarta JSON Processing
    (JSON-P), version 2.1. The specifications for JSON-P and JSON-B can be found at
    [`https://jcp.org/aboutJava/communityprocess/pr/jsr367/index.html`](https://jcp.org/aboutJava/communityprocess/pr/jsr367/index.html)
    and [`https://jcp.org/en/jsr/detail?id=374`](https://jcp.org/en/jsr/detail%253Fid%253D374).
    This chapter covers these JSON libraries and explains how you can add JSON to
    Jakarta EE applications.


    ### JSON Documents


    As is the case for XML, a JSON document represents a tree-like object hierarchy.
    Unlike XML, JSON entities cannot have attributes. There are no such things as
    namespaces and schemas, and instead of opening and closing tags, complex JSON
    objects use `{ ... }` to map name-value pairs and `[...]` for arrays. Here is
    a simple JSON document showing all features:


    ```

    {

    "lastname": "Smith",

    "married": true,

    "birthday": "1997-12-30",

    "records": null,

    "height": 6.1,

    "cars": 2,

    "children": [

    "Amanda",

    { "forename": "Jim", "gender": "m" }

    ],

    "address": {

    "us": true,

    "state": "California",

    "city": "Paradise",

    "owned": false

    }

    }

    ```


    You can see that basic types are numbers with and without fraction digits, boolean
    literals `true` and `false`, strings, and `null`. Arrays and maps can contain
    elements of mixed types, including inner complex types.


    ### JSON with REST Services


    In previous chapters, you saw a REST method that returned JSON data, as follows:


    ```

    @GET

    @Produces("application/json")

    public String stdDate() {

    return "{\"date\":\"" +

    ZonedDateTime.now().toString() + "\"}";

    }

    ```


    While at first sight, this seems to be an easy way to create JSON data, it lacks
    a basic syntax check. First, it easily might happen that you forget a closing
    `}`, or that you make a mistake because of misplaced quotation and or punctuation
    mark. Second, think of a more complex JSON document with more elements and deeper
    hierarchy. Manually constructing concatenating strings to represent larger JSON
    objects is a nightmare in terms of comprehensiveness and maintainability.


    The first steps toward increased readability consists of using JSON-P to construct
    JSON data. JSON-P contains classes representing values, arrays, and maps. Replacing
    the previous code snippet, you will eventually get code like this:


    ```

    ...

    import jakarta.json.Json;

    import jakarta.json.JsonStructure;

    ...

    @GET

    @Path("j")

    @Produces("application/json")

    public JsonStructure stdDate() {

    JsonStructure json = Json.createObjectBuilder()

    .add("date", ZonedDateTime.now().toString())

    .build();

    return json;

    }

    ```


    You can see that you no longer have to concatenate strings to build the JSON document.
    You can even let the method return an object of type `JsonObject`, `JsonArray`
    or `JsonStructure` (all from the `jakarta.json` package). JAX-RS knows how to
    handle such return types.


    From AJAX calls and if you need to pass data from the web frontend to the server,
    you can either let the REST service receive a string, as in this:


    ```

    // Corresponds to for example AJAX calls from jQuery:

    // $.ajax({

    //  method: "POST",

    //  contentType: "application/json",

    //  url: "../webapi/date",

    //  data: { timeZone: "UTC", format: "standard" }

    // })

    // .done(function( msg, textStatus, jqXHR ) {

    //   alert( "Data Saved: " + msg );

    // });

    @POST

    @Path("/date")

    @Consumes(MediaType.APPLICATION_JSON)

    ...

    public Response stdDate(String data) {

    // data is a JSON string

    ...

    }

    ```


    Or, as an alternative, you can use a `jakarta.json.JsonStructure` parameter for
    the method, as follows:


    ```

    // Corresponds to for example AJAX calls from jQuery:

    // $.ajax({

    //  method: "POST",

    //  contentType: "application/json",

    //  url: "../webapi/date",

    //  data: ''{ timeZone: "UTC", format: "standard" }''

    // })

    // .done(function( msg, textStatus, jqXHR ) {

    //   alert( "Data Saved: " + msg );

    // });

    @POST

    @Path("/date")

    @Consumes(MediaType.APPLICATION_JSON)

    ...

    public Response stdDate(JsonStructure data) {

    ...

    }

    ```


    For the jQuery AJAX call, you must pass a JSON formatted string, not the JavaScript
    data object. Apart from these simple examples, there is more to discover about
    JSON handling using the JSON-P and JSON-B technologies. The following sections
    more thoroughly explain JSON binding and processing.


    ### Generating JSON


    In order to generate JSON data using the builder pattern, you use the classes
    from the `jakarta.json` package. You start from a builder:


    ```

    ...

    import jakarta.json.*;

    ...

    JsonObjectBuilder builder = Json.createObjectBuilder();

    ```


    From here you add elements as follows:


    ```

    builder.add("elementName", ...);

    // <- you can add int, long, double, boolean,

    //    String, BigInteger, and BigDecimal elements.

    //    And you can append more add(...) statements.

    ```


    There is also a variant for `null` values and for complex types:


    ```

    builder.addNull("elementName");

    builder.

    add("element1",

    Json.createObjectBuilder().

    add("inner1", 42).

    add("inner2", "deepThought")).

    add("element2", 3.1415);

    ```


    To create JSON arrays, use the `JsonArrayBuilder` class instead:


    ```

    ...

    import jakarta.json.*;

    ...

    JsonArrayBuilder builder = Json.createArrayBuilder();

    builder.add("Fibonacci");

    builder.add(1); // it is allowed to mix types in arrays

    builder.add(2);

    builder.add(3);

    builder.add(5);

    builder.add(8);

    ```


    For both JSON objects and JSON arrays, to get the Java object, you must invoke
    the `build()` method:


    ```

    ...

    import jakarta.json.*;

    ...

    JsonObjectBuilder builder = Json.createObjectBuilder();

    // ... add elements, then:

    JsonObject obj = builder.build();

    ...

    JsonArrayBuilder abuilder = Json.createArrayBuilder();

    // ... add elements, then:

    JsonArray aobj = abuilder.build();

    ```


    ### Parsing JSON


    For low-level parsing of JSON strings, you can use JSON-P''s streaming API:


    ```

    ...

    import jakarta.json.*;

    ...

    final String json =

    "{\"name\":\"John\",\"age\":27,\"employed\":false}";

    final JsonParser parser =

    Json.createParser(new StringReader(json));

    String key = null;

    String value = null;

    while (parser.hasNext()) {

    final Event event = parser.next();

    switch (event) {

    case KEY_NAME:

    key = parser.getString();

    System.out.println(key);

    break;

    case VALUE_STRING:

    value = parser.getString();

    System.out.println(value);

    break;

    }

    }

    parser.close();

    ```


    This comes in handy if you don''t need a verbose JSON-to-Java object binding,
    which requires extra coding. Also, if you want to read in a very large JSON document,
    the streaming API helps you avoid allocating exhaustive resources.


    If you don''t like the pull-parsing API, you can read in a JSON string, thus producing
    a generic JSON object instead:


    ```

    final String json =

    "{\"name\":\"John\",\"age\":27,\"employed\":false}";

    JsonReader jsonReader =

    Json.createReader(new StringReader(json));

    JsonObject object = jsonReader.readObject();

    jsonReader.close();

    ...

    String name = object.getString("name", "");

    ```


    For more details, see the API documentation at [`https://javaee.github.io/jsonp/index.html`](https://javaee.github.io/jsonp/index.html).


    ### Binding JSON to Java Objects


    If you need an automatic mapping between a Java object tree and a JSON representation
    of such a tree, you can use the classes from the JSON-B library. Consider the
    following JSON string for a club members list:


    ```

    [

    {

    "name": "John",

    "age": 27,

    "employed":false,

    "children" :

    [

    {"name": "Bart", "birthday": "2015-11-10"},

    {"name": "Amanda", "birthday": "2017-06-01"}

    ]

    },

    {

    "name": "Linda",

    "age": 22,

    "employed":true,

    "children" :

    [

    ]

    }

    ]

    ```


    A natural set of classes representing the same list would be as follows:


    ```

    class Member {

    private String name;

    private int age;

    private boolean employed;

    private List children;

    // getters and setters...

    }

    class Child {

    private String name;

    private String birthday;

    // getters and setters...

    }

    ```


    In order to read in the JSON string and construct a list of members, all you have
    to do is this:


    ```

    String json = "[ ... ]";

    Jsonb jsonb = JsonbBuilder.create();

    @SuppressWarnings("unchecked")

    List members = jsonb.fromJson(json, List.class);

    // just to check, the other way round, getting the

    // JSON string from a Java object tree:

    jsonb = JsonbBuilder.create();

    String json2 = jsonb.toJson(members);

    // <- semantically the same as ''json'' above.

    ```


    Converting between simple types like strings, booleans, and numbers is straightforward.
    If you need more control over the conversion process, JSON-B helps you with a
    couple of annotations. In the previous example, you can for example change the
    `birthday` field to a field of type `java.util.Date`:


    ```

    class Child {

    private java.util.Date birthday;

    ...

    }

    ```


    (The getters and setters are accordingly adapted.) The `jakarta.json.bind.annotation.JsonbDateFormat`
    then allows for the specification of a date string conversion pattern. For the
    `yyyy-MM-dd` pattern, see the API documentation of `SimpleDateFormat` for more
    options. The annotation would read as follows:


    ```

    class Child {

    @JsonbDateFormat("yyyy-MM-dd")

    private java.util.Date birthday;

    ...

    }

    ```


    More annotations control the conversion of number formats and `null` values. It
    is also possible to exclude fields from conversion, and for maximum control, you
    can define a custom type adapter. Table [23-1](#490565_1_En_23_Chapter.xhtml#Tab1)
    summarizes the JSON-B annotations.


    **Table 23-1** JSON-B Annotations


    | Annotation | Useful For |

    | --- | --- |

    | `@JsonbDateFormat` | Defining a custom date format. Mediates between a `java.util.Date`
    in Java and a JSON string value. |

    | `@JsonbNillable` | Showing a `null` Java value as "null" in the JSON string.
    If set to `false`, a null value does not show up in the JSON string. |

    | `@JsonbNumberFormat` | Defining a custom number format. Mediates between a `java.math.BigDecimal`
    in Java and a JSON string value. Format options are described in the API documentation
    of the `DecimalFormat` class. |

    | `@JsonbTransient` | Excluding a field from conversion. |

    | `@JsonbProperty` | Specifying a custom key name for a mapping. |

    | `@JsonbTypeAdapter` | Specifying a custom type adapter (the `JsonbAdapter` class).
    |


    As an example of a type adapter, consider the following classes:


    ```

    class Color {

    public int r;

    public int g;

    public int b;

    public Color(int r, int g, int b) {

    this.r = r;

    this.g = g;

    this.b = b;

    }

    }

    class Shape {

    private Color color;

    ...

    // getters and setters...

    }

    ```


    If you want a color to be representable as the hexadecimal value `#RRGGBB`, a
    JSON snippet for a shape object could look like this:


    ```

    {

    "color": "#FF1B75",

    ...

    }

    ```


    The converter class is responsible for translating the `Color` object to a JSON
    string representation and vice versa:


    ```

    class MyColorAdapter implements

    JsonbAdapter {

    @Override

    public String adaptToJson(Color obj)

    throws Exception {

    return "#" +

    String.format("%02x", obj.r) +

    String.format("%02x", obj.g) +

    String.format("%02x", obj.b);

    }

    @Override

    public Color adaptFromJson(String obj)

    throws Exception {

    int r = Integer.parseInt( obj.substring(1,3), 16);

    int g = Integer.parseInt( obj.substring(3,5), 16);

    int b = Integer.parseInt( obj.substring(5,7), 16);

    return new Color(r,g,b);

    }

    }

    ```


    Finally, to add the converter to the `Shape` class, you have to apply the `@JsonbTypeAdapter`
    annotation as follows:


    ```

    class Shape {

    @JsonbTypeAdapter(MyColorAdapter.class)

    private Color color;

    ...

    // getters and setters...

    }

    ```


    The documentation of the annotations from the `jakarta.json.bind.annotation` package
    shows more information. To learn more about JSON-B, check out [`https://javaee.github.io/jsonb-spec/`](https://javaee.github.io/jsonb-spec/)
    as well.


    ## 24. Jakarta Mail


    Being able to send emails from server processes can be a vital part of a company''s
    IT landscape. Consider, for example, asynchronously transmitting results from
    long-running calculations, sending automatically generated reports, or sending
    warning messages when a server process fails. Not often recognized as a central
    part of the Jakarta EE technology stack, Jakarta Mail 2.1 can serve this purpose.
    This chapter covers Jakarta Mail, from [`https://eclipse-ee4j.github.io/mail/`](https://eclipse-ee4j.github.io/mail/),
    which is included with Jakarta EE 10 as a versatile email library.


    ### Installing Jakarta Mail


    Jakarta Mail is included in the Jakarta EE specification, so for any enterprise
    project with this basic dependency (Gradle configuration, Maven accordingly):


    ```

    implementation ''jakarta.platform:'' +

    ''jakarta.jakartaee-api:10.0.0''

    ```


    You have everything you need to use Jakarta Mail.


    **Note**


    Jakarta Mail''s predecessor is called JavaMail. The main difference is that Jakarta
    Mail uses the `jakarta.` namespace instead of `javax.` Many online resources still
    refer to JavaMail. In most cases, you can easily adapt JavaMail tutorials by simply
    switching to the new namespace.


    ### Generating and Sending Emails


    The standard way to send emails from a Jakarta EE application consists of the
    following:


    * Provide an authenticator for authentication at the Message Transfer Agent (MTA).
    To this aim, create an instantiable class that inherits from `jakarta.mail.Autenticator`.
    If you don''t need to authenticate to your MTA, you can skip this step.

    * Instantiate and fill a `java.util.Properties` collection. Here, various SMTP-related
    parameters need to be entered.

    * Get a `jakarta.mail.Session` instance.

    * Instantiate a message object, for example `jakarta.mail.internet.MimeMessage`.

    * Get a transport object (the `jakarta.mail.Transport` class) from the session.

    * Use the transport object to connect to the MTA and then send the message.


    This example provides a rudimentary REST class for building and sending emails.
    This is a starting point only. For your own application, you should read the constants
    from the configuration file. You also have to update the connection parameters
    to match your mail server.


    ```

    import java.util.Date;

    import java.util.Properties;

    import jakarta.mail.Authenticator;

    import jakarta.mail.Message;

    import jakarta.mail.MessagingException;

    import jakarta.mail.PasswordAuthentication;

    import jakarta.mail.Session;

    import jakarta.mail.Transport;

    import jakarta.mail.internet.InternetAddress;

    import jakarta.mail.internet.MimeMessage;

    import jakarta.ws.rs.POST;

    import jakarta.ws.rs.Path;

    import jakarta.ws.rs.Produces;

    @Path("/mail")

    public class JakartaMail {

    final String MAILSERVER_ADDR = "addr.to.mta.com";

    final String MAILSERVER_PORT = "465"; //465,587;

    final String MAILSERVER_IDENTITY = "your@email.addr.com";

    final String MAILSERVER_LOGIN = "mailserver.login";

    final String MAILSERVER_PASSWD = "mailserver.passwd";

    @POST

    @Produces("application/json")

    public String sendMail() {

    sendMail("recipient@example.com", "test",

    new Date().toString());

    return "{\"done\":true}";

    }

    class SMTPAuthenticator extends Authenticator {

    public PasswordAuthentication

    getPasswordAuthentication(){

    return new PasswordAuthentication(MAILSERVER_LOGIN,

    MAILSERVER_PASSWD);

    }

    }

    private void sendMail(String toAddr,

    String theSubject,

    String theMessage) {

    Properties props = new Properties();

    props.put("mail.smtp.user", MAILSERVER_IDENTITY);

    props.put("mail.smtp.host", MAILSERVER_ADDR);

    props.put("mail.smtp.port", MAILSERVER_PORT);

    props.put("mail.smtp.starttls.enable","true");

    props.put("mail.smtp.debug", "true");

    props.put("mail.smtp.auth", "true");

    props.put("mail.smtp.socketFactory.port",

    MAILSERVER_PORT);

    //props.put("mail.smtps.ssl.checkserveridentity",

    // "false");

    props.put("mail.smtps.ssl.trust",  MAILSERVER_ADDR);

    SMTPAuthenticator auth = new SMTPAuthenticator();

    Session session = Session.getInstance(props, auth);

    session.setDebug(false);

    MimeMessage msg = new MimeMessage(session);

    try {

    msg.setText(theMessage);

    msg.setSubject(theSubject);

    msg.setFrom(new InternetAddress(

    MAILSERVER_IDENTITY));

    msg.addRecipient(Message.RecipientType.TO,

    new InternetAddress(toAddr));

    // use "smtps" instead of "smtp", to enable SSL

    Transport transport = session.getTransport("smtps");

    transport.connect(MAILSERVER_ADDR,

    Integer.parseInt(MAILSERVER_PORT),

    MAILSERVER_LOGIN, MAILSERVER_PASSWD);

    transport.sendMessage(msg, msg.getAllRecipients());

    transport.close();

    } catch (MessagingException e) {

    e.printStackTrace(System.err);

    }

    }

    }

    ```


    A word about the `mail.smtps.ssl.trust` property: If it''s used as shown here,
    the handshake process used with SSL encrypted communication disregards the server''s
    SSL certificate check. If you comment out this line, you might have to import
    the server''s certificate into Java''s `cacerts` key store. So expect some additional
    work if you need to check the server''s identity.


    Once it''s deployed—for example as `JakartaMail.war` on a GlassFish server and
    with the `<url-pattern> /webapi/* </url-pattern>` URL pattern in `web.xml`—you
    can trigger an email from a terminal via this command:


    ```

    curl -X POST \

    http://localhost:8080/JakartaMail/webapi/email

    ```


    ## 25. Application Client (Groovy)


    Jakarta EE server applications usually provide interfaces that clients can use
    to fulfill enterprise use case needs. These are often web or REST services for
    communicating XML or JSON data, or EJB interfaces that a client can access via
    RMI. However, during the development phase and later for maintenance purposes
    like monitoring, a lightweight and easy-to-configure access library is better
    solution. Some application servers like GlassFish therefore provide scripts for
    generating such on-the-fly client libraries, commonly referred to as *application
    clients*.


    **Note**


    Application clients are not standardized. For Jakarta EE servers other than GlassFish,
    you have to consult the documentation to see whether application clients are supported.
    Or you can develop your own scripts.


    This chapter is about using Groovy scripts to access EJB interfaces via an application
    client library generated by GlassFish.


    ### Providing an Enterprise Application


    You can start from any Jakarta EE application with a `remote` EJB interface. A
    remote interface is necessary, since you run the client code in a JVM that''s
    different from the application server.


    This simple example codes an EAR project named `ApplicationClientServer`. It targets
    a `ApplicationClientServer.ear` deployable and uses the following EJB classes:


    ```

    // ----- file TheDate.java

    package book.jakartapro.appclient.ejb;

    import java.time.ZonedDateTime;

    import book.jakartapro.appclient.ejb.interfaces.

    TheDateLocal;

    import book.jakartapro.appclient.ejb.interfaces.

    TheDateRemote;

    import jakarta.ejb.Local;

    import jakarta.ejb.Remote;

    import jakarta.ejb.Stateless;

    @Stateless

    @Local(TheDateLocal.class)

    @Remote(TheDateRemote.class)

    public class TheDate {

    public String fetchDate() {

    return ZonedDateTime.now().toString();

    }

    }

    // ----- file TheDateLocal.java

    package book.jakartapro.appclient.ejb.interfaces;

    public interface TheDateLocal {

    String fetchDate();

    }

    // ----- file TheDateRemote.java

    package book.jakartapro.appclient.ejb.interfaces;

    public interface TheDateRemote {

    String fetchDate();

    }

    ```


    **Note**


    At this point, the example doesn''t explain how to develop a Jakarta EE application
    packaged as an EAR file. Different IDEs use different workflows for this aim,
    and it also depends on which build framework you use. Previous chapters provided
    hints; consult your server documentation if you need more information.


    For the application client generation to work, this EAR must be deployed and running
    on GlassFish.


    ### Building an Application Client


    With an EAR application deployed on GlassFish, the steps for generating and running
    application clients are summarized as follows:


    1. Package the interface classes into a `ejb-interfaces.jar` archive.

    2. Generate `appclient.jar`. Go to the `GLASSFISH_INST/glassfish` folder and issue
    a `bin/package-appclient`.

    3. Fetch the `GLASSFISH_INST/glassfish/lib/appclient.jar` generated in the previous
    step.

    4. Unzip `appclient.jar` to any suitable folder on the machine (remember a `.jar`
    file is just a ZIP file with a different suffix). Call this folder `MYAPPCLIENT`.
    Move the contents of the `appclient` folder to its parent folder.

    5. Copy `ejb-interfaces.jar` into `MYAPPCLIENT`.

    6. Modify the `MYAPPCLIENT/config/asenv.*` and `MYAPPCLIENT/glassfish/domains/domain1/config/sun-acc.xml`
    files. See the instructions at [`https://glassfish.org/docs/latest/reference-manual.html#package-appclient`](https://glassfish.org/docs/latest/reference-manual.html%2523package-appclient).
    This step is necessary only if you want to use the GlassFish client application
    container. This example uses a different approach; see the next section.

    7. Make the `MYAPPCLIENT/glassfish/bin/appclient` and `MYAPPCLIENT/glassfish/bin/appclient.bat`
    files executable. This step is necessary only if you want to use the GlassFish
    client application container. This example uses a different approach; see the
    next section.

    8. If you want to start the application client container, provide the client code
    as, for example, `myClient.jar`. Then run `MYAPPCLIENT/glassfish/bin/appclient`,
    using `myClient.jar` as a parameter.


    ### Running a GroovyConsole Application Client


    To allow a Groovy script to access the Jakarta EE server, first download and install
    Groovy from [`https://groovy-lang.org/install.html`](https://groovy-lang.org/install.html).
    Next—with `GROOVY_HOME` pointing to the Groovy installation folder and `JAVA_HOME`
