    15-2。


    ![](img/490565_1_En_15_Fig2_HTML.jpg)


    宠物概览窗口列出了宠物编号、名称、状态以及查看详情、预订和删除的选项。


    图 15-2

    宠物商店

    应用


    ![](img/490565_1_En_15_Fig1_HTML.jpg)


    两个包资源管理器窗口显示了 Java M V C 项目，其中左侧选中了 `src/main/java`，右侧选中了 Web 应用文件。


    图 15-1

    宠物商店源码


    第三部分 高级架构相关主题


    16. 微配置文件


    微服务

    描述了一种架构模式，其中小型处理单元协同工作以执行应用任务。每个单元仅负责单一服务，所有单元松散耦合，并使用与计算机语言无关的协议相互通信。在 Java 世界中，微服务的规范集由
    MicroProfile 规范定义，您可以通过以下链接访问：


    ```

    https://microprofile.io/

    ```


    广义上讲，符合 MicroProfile 5.0 规范的微服务必须能够处理：


    *   **JAX-RS 3.0：** 用于 RESTful 服务

    *   **Rest Client 3.0：** 用于 REST 消费者

    *   **JSON-P 2.0：** 用于处理 JSON 数据

    *   **JSON-B 2.0：** 用于将 JSON 绑定到 Java 对象

    *   **CDI 3.0：** 用于上下文和依赖注入

    *   **Jakarta Annotations 2.0：** 用于注解处理

    *   **Config 3.0：** 用于配置微服务

    *   **OpenAPI 3.0：** 用于以机器和人类可读格式描述服务的 REST 服务元数据

    *   **Fault Tolerance 4.0：** 用于提高微服务稳定性

    *   **Metrics 4.0：** 用于让微服务报告性能指标

    *   **Health 4.0：** 用于让微服务报告其健康状态

    *   **JWT Authentication 2.0：** 用于 JWT 认证

    *   **Open Tracing 3.0：** 用于发现微服务之间的关系和通信路由


    注意


    最新的 MicroProfile 版本是 6.0。本书使用 5.0 版本，因为这是我们的 MicroProfile 服务器所遵循的版本。


    乍一看，微服务似乎与 Jakarta EE 相矛盾，后者是一种单体架构，拥有一个承载依赖模块的中央服务器进程。问题是，当您谈论微服务时，是否意味着您正在谈论
    Jakarta EE 的竞争对手？为什么我要在一本 Jakarta EE 的书中提及微服务？答案出奇地简单：您实际上可以使用内存和资源占用精简的应用服务器产品来托管单个微服务，从而构建基于
    Jakarta EE 的微服务架构！一个 Jakarta EE 微服务环境由一组独立的小型服务器进程组成，每个服务器上运行的应用数量非常少。

    不过，有一个重要的区别：Jakarta EE 规范集（EJB、JPA、CDI 等版本）与 MicroProfile 规范具有不同的结构。尽管您可以让 Jakarta
    EE 服务器遵循 MicroProfile 规范，但 Jakarta EE 并不严格符合 MicroProfile 规范。尽管如此，得益于协调这两个领域的持续努力，MicroProfile
    5.0 与 Jakarta EE 9 保持一致，使得在这两种技术之间切换变得容易。

    如果您想使用专为遵循 MicroProfile 规范而定制的软件，有几种服务器产品支持这两种方法，包括 Open Liberty®、Dropwizard®、Thorntail®、Kumuluz®、Payara®
    和 TomEE® 等。

    本章的其余部分将讨论 TomEE 的一些方面，因为它拥有商业友好的许可证（Apache 许可证），并且源自 Tomcat，而 Tomcat 是一个非常成熟的
    Servlet 容器，至今已在许多项目中使用超过 20 年。TomEE 当前版本为 9.0.0，并遵循 MicroProfile 5.0。


    启动一个 MicroProfile 示例项目


    首先，您将使用第 2 章的 `RestDate` 项目，并为其添加 MicroProfile 功能。复制此项目并将其命名为 `RestDateMP`，或者按照该章的说明，将
    `RestDate` 替换为 `RestDateMP`。项目结构应如下所示：


    ```

    build.gradle

    gradle

    |__ wrapper

    |__ gradle-wrapper.jar

    |__ gradle-wrapper.properties

    gradlew

    gradlew.bat

    src

    |__ main

    |__ java

    |   |__ book

    |       |__ jakartapro

    |           |__ restdatemp

    |               |__ RestDate.java

    |__ resources

    |__ webapp

    |__ WEB-INF

    |__ beans.xml

    |__ glassfish-web.xml

    |__ web.xml

    ```


    从 Jakarta EE 中 Web 应用的标准 `build.gradle` 文件开始：


    ```

    plugins {

    id ''war''

    }

    sourceCompatibility = 1.17

    targetCompatibility = 1.17

    repositories {

    jcenter()

    }

    dependencies {

    providedCompile

    ''jakarta.platform:jakarta.jakartaee-api:10.0.0''

    // 使用 JUnit 测试框架

    testImplementation ''junit:junit:4.13.2''

    }

    ```


    对于位于 `src/main/webapp/WEB-INF` 内的部署描述符 `web.xml`，您可以编写以下内容：


    ```


    RestDateMP


    jakarta.ws.rs.core.Application


    jakarta.ws.rs.core.Application


    /webapi/*


    ```


    安装 MicroProfile 服务器

    从 [`http://tomee.apache.org/`](http://tomee.apache.org/) 的下载部分下载 TomEE MicroProfile
    变体，即 TomEE 服务器的 9.0.0 版本。然后将归档文件解压到合适的位置。


    将应用更改为微服务


    为了利用 MicroProfile 提供的增强功能，您首先需要将 MicroProfile 依赖项添加到 `build.gradle` 中：


    ```

    ...

    dependencies {

    compileOnly ''org.apache.tomee:jakartaee-api:10.0.0''

    providedCompile

    ''org.eclipse.microprofile:microprofile:5.0''

    providedCompile

    ''org.eclipse.microprofile.openapi:'' +

    ''microprofile-openapi-api:3.0''

    // 使用 JUnit 测试框架

    testImplementation ''junit:junit:4.13.2''

    ...

    }

    ...

    ```


    您现在可以向应用添加 MicroProfile 功能。首先，添加一些 OpenAPI 信息发射器。创建一个名为 `openapi.yaml` 的新文件，并将其添加到
    `src/main/webapp/META-INF`（请确保先创建该文件夹）：

    '
- fmt: "```yaml\nopenapi: \"3.1.0\"\npaths:\n/d:\nget:\ndescription: Get the date\n\
    info:\ntitle: RestDate\ndescription: Date operations\nlicense:\nname: Eclipse\
    \ Public License - v 1.0\nurl: https://www.eclipse.org/legal/epl-v10.html\nversion:\
    \ 1.0.0\nservers:\n- url: http://localhost:8080/webapi\n```\n\nAdapt the contents\
    \ according to your needs. In addition, you can add an OpenAPI annotation to the\
