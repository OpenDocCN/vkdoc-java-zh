- fmt: '# Secured Web Applications and Authentication


    Secured web applications typically use the HTTPS (SSL/TLS) communication protocol
    rather than HTTP and require users to authenticate themselves via a login dialog
    box. With the *basic authentication* procedure, the browser presents a standardized
    input form for the user credentials. Although it’s easy enough to implement and
    configure, the basic authentication does not allow you to control the presentation
    and behavior of the login dialog box. Professional web applications use *form-based
    authentication* instead, which allows them to implement their own login dialog
    box that’s compliant with company policies and design guidelines.


    > **Note:** `JSR-375` attempted to standardize the Jakarta EE security techniques.
    However, the implementation seems to be in a questionable state, apart from announcements
    that you cannot find helpful tutorials and examples on the Internet. I therefore
    describe the somewhat old fashioned but reliably working and well documented original
    Jakarta EE security enhancements techniques in this book.


    ## Enabling Security on the Server


    Enabling and configuring security on the server, as well as adding users and groups,
    depends on the Jakarta EE server product, its configuration, and the security
    methods you use. Although this means that you have to read the server documentation
    for specifics, the following paragraphs describe the basic steps for GlassFish
    7 to give you a basic idea.


    > **Note:** We are not dealing with users stored in some dedicated SQL user database.
    To include database access, create a new realm of type `com.sun.enterprise.security.auth.realm.jdbc.JDBCRealm`.
    Using the terminal, you can enter the following on one line:


    ```

    asadmin create-auth-realm

    --classname com.sun.enterprise.security.auth.realm.jdbc.JDBCRealm

    --property jaas-context=jdbcRealm

    :datasource-jndi="jdbc/auth"

    :user-table=users

    :user-name-column=email

    :password-column=password

    :group-table=users_groups

    :group-name-column=groupname

    :digest-algorithm=SHA-512

    userMgmtJdbcRealm

    ```


    If you want to use the web admin console, you must add the properties one by one
    while creating the realm.


    First, you have to enable security in a server-wide configuration setting. To
    achieve this, in the web administration console at `http://localhost:4848`, choose
    **Configurations** ➤ **Server-config** ➤ **Security**. Then check the **Security
