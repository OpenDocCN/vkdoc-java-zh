    \n```\n...\n\n```\n\n<ui:decorate> 标签\n\n类似于 `<ui:composition>`，\n但它 *不会* 忽略其周围的\
    \ XHTML 代码：\n\n```\n...\n我会被写入输出！\n\n我被传递给 \"templ.xhtml\"，你可以通过\n在 \"templ.xhtml\"\
    \ 中引用我\n\n...\n```\n\n与 `<ui:composition>` 相反，\n包含 `<ui:decorate>` 的文件将包含完全有效的\
    \ XHTML 代码，包括 `html`、`head` 和 `body`，并且\n模板文件将被插入到 `<ui:decorate>` 出现的位置。因此，它不能包含\
    \ `html`、`head` 或 `body`。这或多或少是一种扩展的“包含”，其中传递的数据不是由属性给出，而是在 `body` 标签中给出。\n你通常应用\
    \ `<ui:decorate>` 标签来进一步\n细化代码片段。你可以将它们包裹在更多的 `<div>` 中以应用\n更多样式，添加标签或标题等。\n\n\
    <ui:fragment> 标签\n\n类似于 `<ui:decorate>`，\n但此标签\n在 Faces 组件树中创建一个元素。它具有以下\n属性：\n\
    \n*   `id` 用于\n    组件树中元素的 ID。这不是必需的，如果你不指定，Faces\n    会自动生成一个 ID。可以是 EL（表达式语言）字符串值。\n\
    \n*   `binding`\n    用于将组件绑定到 Java 类（必须继承自 `jakarta.faces.component.UIComponent`）。\n\
    \    非必需。可以是 EL 字符串值（类名）。\n\n*   `rendered`\n    用于指示是否渲染该组件。非必需。\n    可以是 EL\
    \ 布尔值。\n\n你可以使用此标签提取现有代码片段，并将它们部分转换为组件。例如，考虑以下代码：\n\n```\n...\n\n...\n\n[某个表格|\n\
    \n...\n\n```\n\n如果你现在将表格提取到另一个名为 `table1_frag.xhtml` 的文件中：\n\n```\n\n...\n\n...\n\
    \n...\n\n我是表格标题\n\n[某个表格|\n\n```\n\n你引入了 XHTML（标题）和一个新组件（表格）。\n\n<ui:repeat> 标签\n\
    \n这不一定是一个与模板相关的标签，但它用于\n遍历集合或数组。其属性为：\n\n*   `begin`。\n    非必需。如果指定，它是列表或数组中迭代的第一个索引。可以是\
    \ `int` 类型的值\n    表达式。\n\n*   `end`**。**\n    非必需。如果指定，它是列表或数组中迭代的最后一个索引\n   \
    \ （包含）。可以是 `int` 类型的值\n    表达式。\n\n*   `step`。\n    非必需。如果指定，它是列表或数组内的步进值。可以是\
    \ `int` 类型的值\n    表达式。\n\n*   `offset`。\n    非必需。如果指定，它是一个偏移量，将添加到\n    迭代的值上。可以是\
    \ `int` 类型的值\n    表达式。\n\n*   `size`。\n    非必需。如果指定，它是要从集合或数组中读取的最大元素数量。\n   \
    \ 不得大于集合的数组大小。\n\n*   `value`。\n    要迭代的列表或数组。一个 `Object` 类型的\n    表达式。必需。\n\n\
    *   `var`。一个\n    表达式语言变量的名称，该变量保存迭代的当前项。\n    可以是 `String` 类型的值\n    表达式。\n\n\
    *   `varStatus`**。**\n    非必需。一个变量的名称，该变量保存\n    迭代状态。一个具有只读值的 POJO：`begin` (int)、`end`\
    \ (int)、`index` (int)、`step` (int)、`even` (boolean)、`odd` (boolean)、`first` (boolean)\
    \ 和\n    `last` (boolean)。\n\n*   `rendered`。是否\n    渲染该组件。非必需。可以是 EL 布尔值。\n\n\
    注意\n\nJSTL（Java 标准标签库）集合\n提供了一个 `<c:forEach>` 标签\n用于循环。由于概念上的差异，Faces 和 JSTL 不能很好地协同工作。在教程和博客中，你会找到很多\n\
    使用 JSTL 进行 `for` 循环的例子。然而，最好使用 `<ui:repeat>` 来\n避免问题。\n"
- fmt: '# The `<ui:debug>` Tag


    Add this tag to your page during the development phase of your project. Using
    a hotkey, the tag will then lead to the Faces component tree and other information
    to be shown on the page. Use the `hotkey="x"` attribute to change the hotkey.
    `Shift+Ctrl+X` will then display the component (the default `d` does not work
    with the Firefox browser!). The second optional attribute is `rendered="true|false"`
    (you can also use an EL boolean expression), which switches this component on
    and off.


    **Note**


    This tag works only in the development project stage. Inside `web.xml`, you can
    add the following:


    ```

    jakarta.faces.PROJECT_STAGE

    Development

    ```


    to specify the project stage (`Development` (default), `UnitTest`, `SystemTest`,
    or `Production`).


    # An Example Facelets Project


    In this section, you learn how to build an example Facelets project with a music
    box database showing similarly designed pages for titles, composers, and performers.
    Start a new Gradle project in Eclipse and name it `MusicBox`. Take the `build.gradle`
    file and replace its contents with the following:


    ```

    plugins {

    id ''war''

    }

    sourceCompatibility = 1.17

    targetCompatibility = 1.17

    repositories {

    jcenter()

    }

    dependencies {

    compileOnly ''jakarta.platform:jakarta.jakartaee-api:10.0.0''

    implementation ''com.google.guava:guava:31.1-jre''

    testImplementation ''junit:junit:4.13.2''

    }

    task deployWar(dependsOn: war,

    description:">>> MUSICBOX deploy task") {

    doLast {

    def FS = File.separator

    def pp = { a -> project.properties[a] }

    def glassfish = pp ''glassfish.inst.dir''

    def user = pp ''glassfish.user''

    def passwd = pp ''glassfish.passwd''

    File temp = File.createTempFile("asadmin-passwd",

    ".tmp")

    temp  ${sout}"

    if(serr.toString()) System.err.println(serr)

    temp.delete()

    }

    }

    task undeployWar(

    description:">>> MUSICBOX undeploy task") {

    doLast {

    def FS = File.separator

    def pp = { a -> project.properties[a] }

    def glassfish = pp ''glassfish.inst.dir''

    def user = pp ''glassfish.user''

    def passwd = pp ''glassfish.passwd''

    File temp = File.createTempFile("asadmin-passwd",

    ".tmp")

    temp  ${sout}"

    if(serr.toString()) System.err.println(serr)

    temp.delete()

    }

    }

    ```


    Apart from dependency handling, this build file introduces two custom tasks for
    deploying and undeploying the `MusicBox` web application on a local server.


    To connect to the `asadmin` tool, create another file, called `gradle.properties`,
    in the project root:


    ```

    glassfish.inst.dir = /path/to/glassfish7

    glassfish.user = admin

    glassfish.passwd =

    ```


    where you enter your own GlassFish server installation path. An empty `admin`
    password is the default setting for GlassFish. If you changed this default setting,
    you must enter the password in this file.


    For the music box data, you''ll create three Java classes. For simplicity, they
    return static information. In real life, you would connect to a database to get
    the data. Create a package called `book.jakartapro.musicbox` and add the following:


    ```

    // Composers.java:

    package book.jakartapro.musicbox;

    import java.io.Serializable;

    import java.util.List;

    import jakarta.enterprise.context.SessionScoped;

    import jakarta.inject.Named;

    import com.google.common.collect.Lists;

    @SessionScoped

    @Named

    public class Composers implements Serializable {

    private static final long serialVersionUID =

    -5244686848723761341L;

    public List getComposers() {

    return Lists.newArrayList("Brahms, Johannes",

    "Debussy, Claude");

    }

    }

    // Titles.java:

    package book.jakartapro.musicbox;

    import java.io.Serializable;

    import java.util.List;

    import jakarta.enterprise.context.SessionScoped;

    import jakarta.inject.Named;

    import com.google.common.collect.Lists;

    @SessionScoped

    @Named

    public class Titles implements Serializable {

    private static final long serialVersionUID =

    -1034755008236485058L;

    public List getTitles() {

    return Lists.newArrayList("Symphony 1",

    "Symphony 2", "Childrens Corner");

    }

    }

    // Performers.java:

    package book.jakartapro.musicbox;

    import java.io.Serializable;

    import java.util.List;

    import jakarta.enterprise.context.SessionScoped;

    import jakarta.inject.Named;

    import com.google.common.collect.Lists;

    @SessionScoped

    @Named

    public class Performers implements Serializable {

    private static final long serialVersionUID =

    6941511768526140932L;

    public List getPerformers() {

    return Lists.newArrayList(

    "Gewandhausorchester Leipzig",

    "Boston Pops");

    }

    }

    ```


    Although you won''t internationalize this sample application for the sake of brevity,
    you do prepare internationalization and create an empty `WebMessages.properties`
    file inside `src/main/resources/book/jakartapro/musicbox/web`.


    For Faces to work correctly, you need to create a `src/main/webapp/WEB-INF/beans.xml`
    file:


    Another file, called `src/main/webapp/WEB-INF/web.xml`, must read as follows:


    ```


    MusicBox


    start.xhtml


    Faces Servlet


    jakarta.faces.webapp.FacesServlet


    Faces Servlet

    *.xhtml


    ```


    Add one more file, called `src/main/webapp/WEB-INF/glassfish-web.xml`. It should
    contain the following:


    This last configuration file, called `src/main/webapp/WEB-INF/faces-config.xml`,
    defines the language files:


    ```


    book.jakartapro.musicbox.web.WebMessages


    bundle


    en

    es -->


    ```


    Before you get into the coding, see Figure [7-2](#490565_1_En_7_Chapter.xhtml#Fig2)
    to get an impression of what you actually want to achieve. To apply the Facelets
    functionalities, you need to add one template file, called `src/main/webapp/frame.xhtml`:


    ```


    Musicbox


    Top Section


    Menu1Menu2


    Contents


    Footer


    ```


    This template file defines a common page structure and declares a couple of placeholders
    via `<ui:insert>` tags. The CSS file is called `style.css` and it goes to `src/main/webapp/resources/css/style.css`:


    ```

    body { color: blue; }

    .header-line { height: 3em; background-color: #CCF000; }

    .bottom-line { clear: both; height: 1.5em; }

    .menu-column { float: left; width: 8em;

    background-color: #FFC000; height: calc(100vh - 7em); }

    .menu-column ul { margin:0.5em; padding: 0;

    list-style-position: inside; }

    .contents-column { float: left; padding: 0.5em;

    background-color: #FFFF99;

    width: calc(100% - 9em); height: calc(100vh - 8em); }

    .bottom-line { padding-top: 1em;

    background-color: #CCFFFF; }

    ```


    For common page elements, you define a couple of XHTML files inside the `src/main/webapp/common`
    folder:


    ```


    Musicbox


    Titles

    Composers

    Performers


    (c) The Musicbox company 2019


    ```


    The three page files inside the `src/main/webapp` folder—`titles.xhtml`, `composers.xhtml`,
    and `performers.xhtml`—refer to the template file and the common page elements:


    ```


    Titles


    Composers


    Performers


    ```


    Note that the `<ui:composition>` tag applies the page template.


    Build and deploy the application by running the Gradle task called `deployWar`.
    Then point your browser to the following URL to see the running application:


    ```

    http://localhost:8080/MusicBox

    ```


    See Figure [7-2](#490565_1_En_7_Chapter.xhtml#Fig2).


