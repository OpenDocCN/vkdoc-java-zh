    To get started, you’ll see how to develop a simple test plan for loading the index
    page of a web application. Figure [36-1](#490565_1_En_36_Chapter.xhtml#Fig1) shows
    JMeter’s start window (choose Options ➤ Look and Feel and select your favorite
    color scheme).


    ![](images/490565_1_En_36_Chapter/490565_1_En_36_Fig1_HTML.jpg)


    A window of Apache JMeter where the test plan displays the name, comments, and
    user-defined variables. It selects the option to run teardown thread groups after
    a shutdown of main threads.


    Figure 36-1

    *JMeter''s start window*


    Right-mouse-click Test Plan in the left tree view panel, then choose Add ➤ Threads
    (Users) ➤ Thread Group. This is a master controller where you specify the parallelization
    grade (the number of simulated concurrent users) and the test lifetime. In the
    settings view for the thread group, make these changes:


    ```

    Number of Threads (users):  50

    Ramp-up period (seconds):   30

    Loop Count: [x] Infinite

    [x] Specify Thread lifetime

    Duration (seconds):         300

    ```


    Leave the other settings at their default value. This defines a test running for
    five minutes, simulating 50 users, and a ramp-up period of 30 seconds. The last
    option indicates that the users will not all start their work at once, which is
    unrealistic. Instead the startup time for the users is evenly distributed among
    the first 30 seconds.


    Inside the thread group, add a Simple Controller (choose Add ➤ Logic Controller
    ➤ Simple Controller). This is simply a container for other test elements; it helps
    you organize the test plan.


    > **Note:** Each test element, including container elements, has a `name` property
    that you can freely change to your needs. This way, you can build highly comprehensive
    test plans.


    Inside the Simple Controller, add a Flow Control Action (choose Add ➤ Sampler
    ➤ Flow Control Action). Inside the Flow Control Action, add a Constant Throughput
    Timer (choose Add ➤ Timer ➤ Constant Throughput Timer). The Flow Control Action
    is just a dummy test element—you need it to make sure the timer acts only once
    each iteration. The timer itself adds pauses to the test run and tries to establish
    a certain throughput (invocations per minute). Otherwise, you would have simulated
    users who act without breaks between page loads, which is not realistic. For the
    setting, inside the Flow Control Action, leave everything at the default values
    (a zero milliseconds pause, which basically means nothing). In the Constant Throughput
    Timer, change the settings as follows:


    ```

    Target throughput (per minute): 6.0

    Calculate based on:             this thread only

    ```


    This simulates each user clicking the Reload button every ten seconds.


    As a basic test plan element, add a HTTP request to the Simple Controller (as
    a sibling to the Flow Control Action). You can find it by choosing Add ➤ Sampler
    ➤ HTTP Request. In its settings page, change the following:


    ```

    Server Name or IP: www.someserver.com

    Port Number:       80

    Path:              /index.html

    ```


    Use any running web server of your choice here. However, do not use a locally
    running server—the response times are just too slow.


    You still need a way to save or display the test outcome data. This is covered
    by *listeners*. You’ll add three listeners to the test plan:


    *   A Summary Report shows performance data in a table, updated in real-time while
    the test is running.

    *   A Graph Results listener shows a quick diagram with performance figures. This
    diagram is updated in real-time, too.

    *   A Simple Data Writer writes performance figures to a CSV file.


    For all three listeners, only a filename for the Simple Data Writer needs to be
    entered. You can play around with the other settings at will. I place the listeners
    as siblings to the thread group.'
