    list library JARs to be included inside the EAR’s `lib` folder. These dependency
    types are defined by the EAR plugin. You won’t find them elsewhere.


    *   The two custom tasks are to create the Groovy scripts and to describe how
    to install and uninstall the EAR on a GlassFish server. They are not included
    in a build phase and therefore must be called explicitly. Obviously, these scripts
    must be rewritten for other server products.


    *   At the end of the deploy script, the application configuration file is copied
    to a place where the application can read it using classpath resolution. This
    procedure also depends on the server product in use.


    *   The operating system commands are executed inside both custom scripts. For
    Windows, just prepend `cmd /c` to the command strings.


    In the project root, add a file called `gradle.properties`. Here, you see how
    to connect to the local GlassFish instance:


    ```

    glassfish.inst.dir = /path/to/glassfish7

    glassfish.user = admin

    glassfish.passwd =

    ```


    Add the `marvin.properties` file to the project root. This file contains the runtime
    configuration for Marvin:


    ```

    repoDir = /path/to/mirror

    externalRepos = http://repo.maven.apache.org/maven2

    ```


    The `repoDir` specifies the path to your mirror repository. The `externalRepos`
    is a comma-separated list of external (/public) repositories to contact if the
    local mirror repository is missing any files.'
