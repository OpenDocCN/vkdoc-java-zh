    `PORT`，提供 Jenkins 服务器和端口（你在 Jenkins Web 管理界面中使用的那些）。对于 `TOKEN`，包含你在 Jenkins 项目（同样在
    Web 管理界面中）的“构建触发器”部分的 `Authentication` 处输入的字符串。对于 `PROJECT`，包含 Jenkins 项目的名称（你必须像这里一样，将空格转义为
