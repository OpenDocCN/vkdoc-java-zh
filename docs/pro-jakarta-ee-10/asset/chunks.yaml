    \ `deployWar` 任务来构建和部署项目。\n\n![](img/490565_1_En_3_Fig1_HTML.jpg)\n\n一个窗口截图列出了不同的项目，如\
    \ Rest Date、资源和构建脚本，下方另一个窗口截图列出了不同的导航器，如文档和验证。\n\n图 3-1\n\n迁移到 NetBeans 的 RestDate\n\
    \n在本书的其余部分，你将使用 Eclipse，但在本章中你已经看到，迁移到并使用不同的 IDE 是很容易的。\n\n# 4. Git 和 Subversion\n\
    \n版本控制系统有多个用途。首先，它们是一种备份系统。一旦文件被提交（或在 Git 的情况下被推送），它就会在某个服务器上持久化一份副本，因此如果开发者的机器崩溃，文件不会丢失。其次，版本控制系统会保留文件版本的历史记录，因此编辑操作不会导致以前的版本丢失。第三，持续集成（CI）系统可能连接到版本控制系统仓库，这意味着开发工件可以自动发布到集成系统进行测试，然后稍后发布到某个生产（或预生产）系统。\n\
