    #### Packaging and Deploying a Resource Adapter


    A resource adapter is packaged like a JAR file, but contrary to a standard JAR
    file, it must use a filename ending in `.rar`. The structure of a simple RAR archive
    is as follows:


    ```

    some/package/ClassA.class

    some/other/package/ClassB.class

    ... more classes ...

    META-INF/MANIFEST.MF

    ```


    The `MANIFEST.MF` file is a simple text file with these contents:


    ```

    Manifest-Version: 1.0

    ```


    For the `HelloJca` example resource adapter, the archive file structure is as
    follows:


    ```

    META-INF/

    MANIFEST.MF

    book/

    jakartapro/

    jcahello/

    HelloWorldManagedConnection.class

    HelloWorldManagedConnectionFactory.class

    HelloWorldResourceAdapter.class

    HelloWorldConnectionFactoryImpl.class

    HelloWorldConnectionImpl.class

    HelloWorldManagedConnectionMetaData.class

    interfaces/

    HelloWorldConnectionFactory.class

    HelloWorldConnection.class

    ```


    Because clients need the interfaces to address the resource adapter, you need
    to also set up a build workflow that packages the interfaces in a standard Java
    library JAR file. For the `HelloJca` example, this could be a file called `jca-interfaces.jar`
    containing:


    ```

    META-INF/

    MANIFEST.MF

    book/

    jakartapro/

    jcahello/

    interfaces/

    HelloWorldConnectionFactory.class

    HelloWorldConnection.class

    ```


    For more complex resource adapters that need additional libraries, you could for
    example add those inside a `lib/` folder in the RAR file:


    ```

    some/package/ClassA.class

    some/other/package/ClassB.class

    ... more classes ...

    META-INF/MANIFEST.MF

    lib/someLibrary1.jar

    lib/someLibrary2.jar

    ... more libraries ...

    ```


    The additional libraries then need to be mentioned in the `MANIFEST.MF` file:


    ```

    Manifest-Version: 1.0

    Class-Path: lib/someLibrary1.jar lib/someLibrary2.jar

    ```


    (This should be on one line, with a single space as a separator.)


    > **Caution**

    > Make sure the `MANIFEST.MF` file ends with a line terminator (a new line or
    carriage return).


    If you use Gradle as your build tool, changing the archive file ending to `.rar`
    and adding a step to produce a `jca-interfaces.jar` file is easy. You simply add
    the following lines to your `build.gradle` file:


    ```

    plugins {

    id ''java''

    }

    ...

    archivesBaseName = ''HelloJca''

    jar { archiveExtension = ''rar'' }

    repositories {

    ...

    }

    dependencies {

    ...

    }

    // Build a JAR with just the JCA interfaces, for clients

    task(''JcaInterfaces'', type: Jar, dependsOn: ''classes'') {

    //describe jar contents here as a CopySpec

    archiveFileName = "jca-interfaces.jar"

    destinationDirectory = file("$buildDir/libs")

    from("$buildDir/classes/java/main") {

    include "**/interfaces/**/*.*"

    }

    }

    // make sure it is part of the assembly path

    jar.dependsOn JcaInterfaces

    ```


    If you now execute the `jar` task, you will find both the RAR file and the `jca-interfaces.jar`
    file in the `build/libs` folder.


    #### Deployment Descriptors


    In older versions of JCA, it was necessary to provide a `ra.xml` deployment descriptor
    file inside the `META-INF` folder. Because of the annotations you can add to the
    resource adapter file (the `HelloWorldResourceAdapter` class in this example)
    and to the Managed Connection Factory (the `HelloWorldManagedConnectionFactory`
    class in the example), this file no longer is needed. However, depending on which
    Jakarta EE server you are using, a server-specific deployment descriptor has to
    be added to the `META-INF` folder. It usually has the name `[SERVER]-ra.xml`,
    where `[SERVER]` identifies the server product. For example, for Weblogic, this
    file must be named `weblogic-ra.xml`. For details about the naming and the contents
    of this file, consult your server documentation.


    For GlassFish, this server-specific deployment descriptor is not needed—everything
    can be configured using the web administrator or the `asadmin` console tool. See
    the section, "Defining a Resource Adapter on the Server," later in this chapter.


    #### Resource Adapter Deployment


    To deploy a RAR file, you usually follow the same procedure as for a WAR or EAR
    file. Consult your server documentation for details.


    #### Defining a Resource Adapter on the Server


    Deploying a resource adapter on the server does not automatically mean you can
    instantaneously refer to it from a client. In the end, you want to be able to
    inject a resource adapter using the `@Resource` annotation, but that requires
    a lot of configuration work. Even worse, the configuration procedure is not standardized,
    so you have to consult the server documentation in order to learn how to do that.


    For GlassFish, for example, you must create a thread pool, an adapter configuration,
    a connection pool, and a connector resource. You can use the web administrator
    at `http://localhost:4848` to that aim, but a shell script using the `asadmin`
    tool gives you the same power. For the `HelloJca` example, such a script could
    read as follows:'
  raw: "# Provide your own paths here:\nexport GROOVY_HOME=/opt/groovy-4\nexport JAVA_HOME=/opt/jdk17\n\
    addClasspath=\"ejb-interfaces.jar\"\nfor i in glassfish/modules/*.jar; do\naddClasspath=${addClasspath}:$i\n\
    done\nexport GROOVY_TURN_OFF_JAVA_WARNINGS=true\n$GROOVY_HOME/bin/groovyConsole\
    \ -cp $addClasspath\n```\n\nUnfortunately, there is a bug in the startup script\
    \ of some versions of\nthe Groovy distribution. Check the `GROOVY/bin/startGroovy`\n\
    file for this line:\n\n```\nif [ \"$(expr \"$JAVA_VERSION\" \\> \"1.8.0\")\" ];\
    \ then\n```\n\nand if it exists, replace it by\n\n```\nif [ \"$(expr true)\" ];\
    \ then\n```\n\nObviously `1.17.x` is not greater\nthan `1.8.0`, so\nthe original\
    \ condition is wrong.\n\nWhen you start the script, a GroovyConsole window appears.\
    \ To access\nEJBs from that window, you can use code like this:\n\n```\nimport\
    \ javax.naming.*\ndef ctx = getContext()\n// This is GlassFish' JNDI naming schema\n\
