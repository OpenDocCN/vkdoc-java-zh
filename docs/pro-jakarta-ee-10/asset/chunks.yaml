    \ options. 1, Titles. 2, Composers. 3, Performers. On the right, it has 3 bulleted\
    \ points for titles. a, Symphony 1. b, Symphony 2. c, Children's corner.\n\n**Figure\
    \ 7-2**  \nThe Musicbox Facelets application\n\n## 8. Faces Custom Components\n\
    \nCustom components allow developers to design their own Faces components. The\
    \ key point is usability—a custom component may easily be transported to other\
    \ projects, or you might even decide to build a company-wide custom component\
    \ collection.\n\nThere are basically three ways to define custom components. First,\
    \ you can define tag files that you then register in `web.xml` as your own custom\
    \ namespace. Second, you can use the *composite component* feature of Faces. Here,\
    \ you use only XHTML files to define interfaces and implementations of components.\
    \ Third, you can use custom Java classes to define components. The following sections\
    \ describe all three of these methods.\n\n### Custom Tag Libraries\n\nHere, you\
    \ define your own XML namespace for use by XHTML pages, and this example uses\
    \ components defined in a special XHTML file. The steps to create a custom tag\
    \ library are as follows:\n\n1. Create a component definition file called `mycomponent.xhtml`\
    \ and place it in the `src/main/webapp/WEB-INF/tags` folder (create the folder\
    \ if it doesn’t exist). The name is free, but write it down since you will need\
    \ it for the configuration files.\n2. Create a tag library descriptor file called\
    \ `mytaglib.taglib.xml`. The name is free again, but it goes to the configuration\
    \ files as well. You describe the new component in this file.\n3. Register the\
    \ new tag library descriptor using `web.xml`.\n\nAs an example, you will create\
    \ a simple date input component. The example doesn’t add graphical goodies like\
    \ a popup calendar, but you could later extend it to do such things. Here, you'll\
    \ only take care of adding the correct user input in the form YYYY-MM-DD.\n\n\
    Create a file called `fancyDateInput.xhtml` inside `src/main/webapp/WEB-INF/tags`\
    \ and let it read as follows:\n\nRemember that the code around the `<ui:composition>`\
    \ tag will be disregarded, so you add `<html>` to declare the namespaces and make\
    \ this a well-formed XHTML document. The `#{idParam}` and `#{valueParam}` tags\
    \ are the component parameters.\n\nNext, create a file called `mytaglib.taglib.xml`\
    \ inside `src/main/webapp/WEB-INF`. For its contents, write the following:\n\n\
    ```\nhttp://book.jakartapro.mytaglib\n\nfancyDate\ntags/fancyDateInput.xhtml\n\
    ```\n\n(Remove the line break and spaces after `jakartaee/`.) The namespace can\
    \ be anything, but it must be unique and should certainly point to your company.\n\
    \nNow you must register the new tag library. To this aim, add the following to\
    \ the `src/main/webapp/WEB-INF/web.xml` file:\n\n```\n...\n\njavax.faces.FACELETS_LIBRARIES\n\
    /WEB-INF/mytaglib.taglib.xml\n\n...\n```\n\nTo use that new component in any XHTML\
    \ page, you first have to declare the new, custom namespace. After that, you can\
    \ use it like any other component:\n\n```\n...\n\n...\n```\n\nYou can see that\
    \ the attribute names refer to the `#-` parameters used in the `fancyDateInput.xhtml`\
    \ file.\n\n### Composite Components\n\nComposite components are more lightweight\
    \ compared to custom tag libraries. While they implicitly define a new non-public\
    \ namespace, you don’t have to define and register a tag library in order to use\
    \ them. The steps to define a composite component are as follows:\n\n![](images/490565_1_En_8_Chapter/490565_1_En_8_Fig1_HTML.png)\n\
    \nAn illustration. It includes 2 blocks in the custom component section with HTML\
    \ codes for interface and implementation. It points downwards to the client HTML\
    \ coding with a folder name, file name, and attributes.\n\n**Figure 8-1**  \n\
    Custom components\n\n1. Make up a component collection name. This could be anything.\
    \ This example uses `mycomponents`.\n2. Create a file called `myComponent.xhtml`.\
    \ You can use any name here, but you must jot down the filename (without the `.xhtml`),\
    \ because it will be the name of the component. Save the file inside `src/main/webapp/resources/mycomponents`.\n\
    3. Use `<composite:interface>` and `<composite:implementation>` to define an interface\
    \ and an implementation for the new component. See Figure [8-1](#490565_1_En_8_Chapter.xhtml#Fig1).\n\
    \nThe new component can then be used from any Faces file by using the [`http://java.su.com/Faces/composite/mycomponents`](http://java.su.com/Faces/composite/mycomponents)\
    \ namespace and adding attributes with names defined in the interface.\n\nAs an\
    \ example, consider the `labelAndField` component, which combines a label and\
    \ a text input field. Create a file called `labelAndField.xhtml` and put it in\
    \ the `src/main/webapp/resources/mycomponents` folder:\n\nObserve the new namespace\
    \ declaration called `jakarta.faces.composite`. In the implementation, you refer\
    \ to parameters via `#{cc.attrs.ATTRNAME}`. This is a convention; you *have to*\
    \ use `cc.attrs.` as a prefix.\n\nTo use the new component, declare the composite\
    \ namespace with `mycomponents` added:\n\n```\n...\n\n...\n```\n\n### Custom Components\
    \ in Java\n\nAlthough it's a highly advanced operation, it is possible to define\
    \ your own components with a Java class. This might be necessary if component\
    \ programming using just XHTML files doesn’t suit your needs.\n\nTo create such\
    \ a class, add the appropriate annotations and let the class extend `UIComponent`,\
    \ as follows:\n\n```\npackage this.package;\nimport jakarta.faces.component.FacesComponent;\n\
    import jakarta.faces.component.UIComponent;\n@FacesComponent(createTag = true,\n\
    namespace = \"https://mycompany.com/mynamespace\",\ntagName = \"custom-component\"\
    ,\nvalue = \"this.package.CustomComponent\")\npublic class CustomInput extends\
    \ UIComponent {\n...\n}\n```\n\nIf you do it this way, you have to implement a\
    \ lot of abstract methods from `UIComponent`. It is maybe a little bit easier\
    \ if you extend from `UIInput` or `UIOutput`, or at least from `UIComponentBase`.\
    \ The most important methods to override are the `decode...()` and `encode...()`\
    \ methods, since those define the rendering and user input value extraction procedures\
    \ of the component.\n\nThe API documentation of `UIComponent` and its derived\
    \ classes give you more information about such Faces Java components. It also\
    \ helps to look at the implementations of the standard components included with\
    \ Faces.\n\nOnce you have properly implemented such a component, it is easy to\
    \ use. Just write the following in any Faces page:\n\n```\n...\n\n...\n\n...\n\
    ```\n\n## 9. Flows\n\nFaces Flows is a page-cohesion concept that entered the\
    \ JEE world in 2013 with JEE version 7. Its main idea is that a couple of pages\
    \ are said to belong to a “flow.” Data associated with such flows and stored on\
    \ the server can be confined to a *flow scope*, which means that all pages of\
    \ a flow can access the same common flow scope data pool, and that the associated\
    \ memory can be freed once the flow is exited. A flow variable scope thus lives\
    \ between the *request scope*, where variables only survive a request, and the\
    \ *session scope*, where data lives as long as a user session prevails.\n\nThe\
    \ predominant usage scenario for flows is a wizard, where the pages belong to\
    \ a chain of interconnected dialog-like input pages and serve a precise use case,\
    \ like a payment process, a poll, a registration workflow, or similar.\n\n###\
    \ The Flow Process\n\nTo define a flow, you usually create a couple of XHTML pages\
    \ inside a dedicated folder, called `src/main/webapp/flow-name`. Instead of `flow-name`,\
    \ you can use any suitable name. To then enter the flow, you can use a button\
    \ inside your web application, like so:\n\n```\n```\n\nTo exit the flow, you provide\
    \ a file called `flow-name-return.xhtml` *outside* the flow folder and write anywhere\
    \ in the flow XHTML pages:\n\n```\n```"
