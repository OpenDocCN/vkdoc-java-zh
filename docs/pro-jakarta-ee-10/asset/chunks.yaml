    安全 Web 应用程序通常使用 HTTPS（SSL/TLS）通信协议而非 HTTP，并要求用户通过登录对话框进行身份验证。采用*基本身份验证*流程时，浏览器会提供一个标准化的用户凭证输入表单。虽然基本身份验证易于实现和配置，但它无法让你控制登录对话框的呈现方式和行为。专业
    Web 应用程序会改用*基于表单的身份验证*，这种方式允许它们实现符合公司策略和设计准则的自定义登录对话框。


    注意


    JSR-375 曾试图标准化 Jakarta EE 安全技术。然而，除了相关公告之外，你在互联网上找不到有用的教程和示例，因此其实现状态似乎存疑。因此，本书将介绍一种略显过时但运行可靠且文档完善的原始
    Jakarta EE 安全增强技术。


    在服务器上启用安全功能

    在服务器上启用和配置安全功能，以及添加用户和组，取决于 Jakarta EE 服务器产品、其配置以及你使用的安全方法。虽然这意味着你需要查阅服务器文档以了解具体细节，但以下段落描述了
    GlassFish 7 的基本步骤，以便让你有个基本概念。


    注意


    我们这里不涉及存储在专用 SQL 用户数据库中的用户。要包含数据库访问，请创建一个类型为 `com.sun.enterprise.security.auth.realm.jdbc.JDBCRealm`
    的新域。使用终端，你可以在一行内输入以下内容：


    ```

    asadmin create-auth-realm

    --classname com.sun.enterprise.security.auth.realm.jdbc.JDBCRealm

    --property jaas-context=jdbcRealm

    :datasource-jndi="jdbc/auth"

    :user-table=users

    :user-name-column=email

    :password-column=password

    :group-table=users_groups

    :group-name-column=groupname

    :digest-algorithm=SHA-512

    userMgmtJdbcRealm

    ```


    如果你想使用 Web 管理控制台，则必须在创建域时逐个添加这些属性。


    首先，你需要在服务器范围的配置设置中启用安全功能。为此，请在 Web 管理控制台 `http://localhost:4848` 中，选择 Configurations
    ➤ Server-config ➤ Security。然后勾选 Security Manager 复选框。


    接下来，你需要向服务器的用户数据库添加一个名为 `AdminUser` 的示例用户。该用户必须被分配到 `ApplAdmin` 组。同样在 `http://localhost:4848`
    中，导航到 Configurations ➤ Server-config ➤ Security ➤ Realms ➤ File。点击 Manage Users
    按钮。在出现的页面上，点击 New，然后输入以下内容：


    ```

    User ID:    AdminUser

    Group List: ApplAdmin

    Password:   pW41834

    ```


    点击 OK。这个新用户被存储在服务器文件树结构内的一个文件中。这就是 `file` 域名称的由来。


    Faces 的基于表单的身份验证


    要开始为你的 Faces 页面开发基于表单的身份验证，请创建一个新的 Gradle 项目，并像往常一样添加一个包含四个文件的 `src/main/webapp/WEB-INF`
