    \ You use it for Java and build related configuration files, and since Gradle\
    \ uses Maven repositories, it is worthwhile to let some light shed on it to further\
    \ streamline your Java Enterprise development process.\n\nIn the `dependencies\
    \ { ... }` section of the `build.gradle` file, this script determines which libraries\
    \ are needed for a project to be tested, built, and run:\n\n```\n...\ndependencies\
    \ {\n// This dependency is exported to consumers, that\n// is to say found on\
    \ their compile classpath.\napi 'org.apache.commons:commons-math3:3.6.1'\n// This\
    \ dependency is used internally, and not\n// exposed to consumers on their own\
    \ compile\n// classpath.\nimplementation 'com.codepoetics:protonpack:1.16'\n//\
    \ This dependency is only needed for compilation.\n// It will not be packed in\
    \ assemblies like WAR\n// files. It will also not be forwarded as a\n// dependency\
    \ when publishing\ncompileOnly 'jakarta.jakartaee-api:10.0.0'\n// Use JUnit test\
    \ framework\ntestImplementation 'junit:junit:4.13.2'\n}\n...\n```\n\nFurthermore,\
    \ in the `repositories { ... }` section of the same file, you can see where to\
    \ load the dependencies:\n\n```\n...\nrepositories {\njcenter()\n}\n...\n```\n\
    \nYou can also declare one of `mavenCentral()` or `google` here. They, by convention,\
    \ resolve to the following:\n\n```\nmavenCentral -> https://repo.maven.apache.org/maven2/\n\
    jcenter      -> https://jcenter.bintray.com/\ngoogle       -> https://maven.google.com/\n\
    ```\n\nThe chapter title is “Corporate Maven Repositories,” which means Maven\
    \ has repository available only from a corporate intranet. What good would that\
    \ be? First of all, if you are developing software for a space rocket or a nuclear\
    \ power plant, you probably don’t want to allow direct access to the public repositories.\
    \ Second, if your company built its own libraries that are not supposed to be\
    \ publicly available, you don’t want to use a public repository either. So you’ll\
    \ at least want to think about using corporate Maven repositories.\n\nIf your\
    \ company has decided to install a corporate Maven repository, you can use one\
    \ of the products available for that purpose. Right? Maybe not. From a client\
    \ perspective, a repository is just a web server that provides static content\
    \ (the JARs and some meta-information). A web frontend could be used to provide\
    \ an upload functionality for the company-owned library JARs, but the files needed\
    \ for Maven are built using scripts and/or a Lean web application.\n\nYou pay\
    \ a relatively low price for installing a Maven server, but you gain a huge amount\
    \ of flexibility. Consider maintenance costs in this calculation alone. This chapter\
    \ presents such a server, plus some scripts. It is up to you if you prefer to\
    \ use standard products instead, but I think you should have the choice."
  trans: "\n## 通过 REST 分析 Jenkins 构建\n\n你不必使用 Web 管理员界面来监控 Jenkins 构建。相反，你可以使用 Jenkins\
    \ 提供的 REST API。这对于需要脚本化访问 Jenkins 的企业级应用来说非常强大。\n\n要尝试此功能，请在 Eclipse 中创建一个 Groovy\
    \ 项目，向项目添加一个名为 `scripts` 的文件夹，然后右键单击项目并选择 Groovy Compiler，将该 `scripts` 文件夹告知 Eclipse。勾选“启用项目特定设置”。然后点击“添加”，输入\
    \ `scripts/**`，并点击“应用”。\n\n创建一个 `scripts/builds.groovy` 文件，并输入以下脚本：\n\n```\n@Grapes(\n\
    @Grab(group='org.codehaus.groovy',\nmodule='groovy-all', version='2.5.8', type='pom')\n\
    )\nimport groovy.json.*\nSERVER=\"localhost\"\nPORT=8080\nUSER=\"TheUser\"\nPASSWD=\"\
    ThePassword\"\nPROJECT=\"My%20Project\"\n/**\n* 执行 GET 请求，给定某个 URL。如果参数\n* 不以\
    \ \"http://\" 开头，则会自动添加\n* \"http://server:port/\" 前缀。\n* 请求的内容类型为 'application/json'\n\
    */\ndef fetch(def url) {\ndef enc64 = { s ->\nnew String(Base64.encoder.encode(s.bytes))\
    \ }\ndef c = ( !url.startsWith(\"http://\")?\nnew URL(\"http://${SERVER}:${PORT}/${url}\"\
    ):\nnew URL(url) ).openConnection()\nc.with {\nsetRequestProperty('User-Agent','groovy')\n\
    setRequestProperty('Accept','application/json')\nsetRequestProperty('Authorization',\n\
    \"Basic \" + enc64(\"${USER}:${PASSWD}\"))\n}\n[output:c.inputStream.text, respCode:c.responseCode]\n\
    }\ndef d = fetch \"job/${PROJECT}/api/json\"\ndef json = new JsonSlurper().parseText(d.output)\n\
    // 'json' 是 REST 调用的结果，已解析为\n// Groovy 对象。请参阅 Groovy 文档中的 JsonParser 文档\ndef lastTen\
    \ = json.builds.sort{-it.number}.take(10)\n//println lastTen\nlastTen.each { b\
    \ ->\ndef url = b.url\ndef build = new JsonSlurper().parseText(\nfetch(url + \"\
    api/json\").output)\n//println build\ndef author = build.changeSets ?\nbuild.changeSets[0]?.items[0]?.author?.fullName\
    \ :\n\"\"\nprintln(\"\" + build.number +\n\" - \" + new Date(build.timestamp)\
    \ +\n\" - \" + build.result +\n\" - \" + author)\n}\n```\n\n替换文件顶部的连接信息。此脚本使用\
    \ `job/${PROJECT}/api/json` API 调用获取最近十次构建，然后针对每次构建，再发起一次 API 调用（URL 从第一次调用的结果中派生）。它会获取构建编号、构建日期、构建结果，如果构建来自变更的源代码，还会获取（第一个）变更作者。\n\
    \n注意\n\n脚本顶部的 `GRAPE` 库获取是必需的，因为 Eclipse 中的 Groovy 插件对应的是 Groovy 的“Indy”变体，缺少某些\
    \ API。请确保此处指定的版本与插件的 Groovy 版本匹配（在首选项中查看）。\n\nJenkins 的 REST API 比你在本节中使用的要庞大得多。如果你点击\
    \ Web 管理员界面大多数页面底部的 REST API 链接，可以获取更多信息。你的脚本输出可能如下所示：\n\n```\n90 - Wed Oct 09\
    \ 13:38:12 CEST 2019 - SUCCESS - Mark\n89 - Wed Oct 09 13:09:02 CEST 2019 - SUCCESS\
    \ - \n88 - Wed Oct 09 13:06:52 CEST 2019 - FAILURE - \n87 - Wed Oct 09 13:05:17\
    \ CEST 2019 - FAILURE - \n86 - Wed Oct 09 10:06:12 CEST 2019 - SUCCESS - \n85\
    \ - Wed Oct 09 09:52:02 CEST 2019 - SUCCESS - Pete\n84 - Wed Oct 09 09:49:42 CEST\
    \ 2019 - SUCCESS - Mark\n83 - Tue Oct 08 17:05:04 CEST 2019 - SUCCESS - \n82 -\
    \ Tue Oct 08 17:01:58 CEST 2019 - FAILURE - Mark\n81 - Tue Oct 08 16:02:42 CEST\
    \ 2019 - SUCCESS - Mark\n```\n\n不过，你并不一定需要使用像 Groovy 这样功能完备的脚本引擎来访问 REST API。要访问该\
    \ API，你也可以在 bash shell 中使用 cURL。你可以从以下示例请求开始：\n\n```\ncurl -X GET \\\n-H \"Accept:\
    \ application/json\" \\\n-u USERNAME:PASSWORD \\\nhttp://SERVER:PORT/job/PROJECT/api/json\n\
    ```\n\n其中，你必须将 `SERVER`、`PORT`、`PROJECT`、`USERNAME` 和 `PASSWORD` 替换为适当的值（不要忘记将项目名称中的空格替换为\
    \ `%20` 转义序列）。\n\n# 6. 企业 Maven 仓库\n\nMaven 为项目提供了一个仓库和依赖解析构建系统。你将其用于 Java 和构建相关的配置文件，并且由于\
    \ Gradle 使用 Maven 仓库，因此有必要对其进行一些了解，以进一步简化你的 Java 企业开发流程。\n\n在 `build.gradle` 文件的\
    \ `dependencies { ... }` 部分，此脚本确定了项目测试、构建和运行所需的库：\n\n```\n...\ndependencies {\n\
    // 此依赖项会导出给消费者，\n// 即会在他们的编译类路径中找到。\napi 'org.apache.commons:commons-math3:3.6.1'\n\
    // 此依赖项在内部使用，不会\n// 暴露给消费者自己的编译类路径。\nimplementation 'com.codepoetics:protonpack:1.16'\n\
    // 此依赖项仅在编译时需要。\n// 它不会被打包到像 WAR 文件这样的程序集中。\n// 发布时也不会作为依赖项转发。\ncompileOnly 'jakarta.jakartaee-api:10.0.0'\n\
    // 使用 JUnit 测试框架\ntestImplementation 'junit:junit:4.13.2'\n}\n...\n```\n\n此外，在同一文件的\
    \ `repositories { ... }` 部分，你可以看到从哪里加载依赖项：\n\n```\n...\nrepositories {\njcenter()\n\
    }\n...\n```\n\n你也可以在此处声明 `mavenCentral()` 或 `google`。按照惯例，它们解析为以下地址：\n\n```\n\
    mavenCentral -> https://repo.maven.apache.org/maven2/\njcenter      -> https://jcenter.bintray.com/\n\
    google       -> https://maven.google.com/\n```\n\n本章标题是“企业 Maven 仓库”，这意味着 Maven\
    \ 拥有仅能从企业内部网络访问的仓库。这有什么好处呢？首先，如果你正在为太空火箭或核电站开发软件，你可能不希望允许直接访问公共仓库。其次，如果你的公司构建了自己的库，并且这些库不应公开可用，那么你也不希望使用公共仓库。因此，你至少需要考虑使用企业\
    \ Maven 仓库。\n\n如果你的公司决定安装一个企业 Maven 仓库，你可以使用为此目的提供的产品之一。对吧？也许不一定。从客户端角度来看，仓库只是一个提供静态内容（JAR\
    \ 文件和一些元信息）的 Web 服务器。可以使用 Web 前端为公司自有的库 JAR 文件提供上传功能，但 Maven 所需的文件是通过脚本和/或一个精简的\
    \ Web 应用程序构建的。\n\n安装 Maven 服务器的成本相对较低，但你能获得极大的灵活性。仅考虑维护成本这一项就值得这么做。本章将介绍这样一个服务器，以及一些脚本。你是否更喜欢使用标准产品，这取决于你，但我认为你应该拥有选择权。\n"
- fmt: '# The Maven Repository Layout


    If you look at one of the public Maven repositories, for example [`https://repo.maven.apache.org/maven2/`](https://repo.maven.apache.org/maven2/),
    you will immediately get for example the following hierarchy:


    ```

    ..

    org

    -> apache

    -> commons

    -> commons-math3

    -> 3.5

    -> 3.6

    -> [artifacts]

    -> ...

    ```


    This directly corresponds to these Maven coordinates:


    ```

    org.apache.commons:commons-math3:3.6

    ```


    This means that, whenever Gradle decides to look into the Maven repository to
    resolve `org.apache.commons:commons-math3:3.6`, it will navigate to


    ```

    https://repo.maven.apache.org/maven2/org/apache/commons/

    commons-math3/3.6/

    ```


    To compile, for example, it will look for the following files in that URL:


    ```

    .../commons-math3-3.6.jar

    .../commons-math3-3.6.jar.asc

    .../commons-math3-3.6.jar.md5

    .../commons-math3-3.6.jar.sha1

    .../commons-math3-3.6.pom

    .../commons-math3-3.6.pom.asc

    .../commons-math3-3.6.pom.md5

    .../commons-math3-3.6.pom.sha1

    ```


    where all the `.md5` and `.sha1` files are just the hashes that a client might
    or might not check to see whether the POM and JAR files contain the correct byte
    sequence. The `.pom` file defines transitive dependencies and other resolution-strategy
    and verification-related settings. The `.asc` file is optional and applies only
    to signed libraries. The `.jar` file contains the library itself.


    It is important to know that the repository does not provide semantic functionality.
    It is up to the dependency resolution client (Gradle, Maven, Ivy, ...) to decide
    which files need to be downloaded. So, for a corporate Maven repository, omitting
    any signing, all you need is the `.jar` file and the adjacent `.jar.md5` and `.jar.sha1`.


    Note


    All those `*metadata.xml` files you see in the public repository are for list
    and search functionalities and do not affect resolution strategies.


    For a corporate Maven repository, this chapter’s strategy for providing libraries
    is as follows:


    1.  Check whether you can serve requests from a local (mirror) repository. If
    so, take the local version.

    2.  Otherwise, decide whether it is allowed to contact public repositories. This
    is optional. In the repository software, the answer will always be yes, but this
    is where you can hook in to comply with company policies.

    3.  If confirmed, fetch the libraries and POM files from the public repository.

    4.  Perform some checks (even manually by a human security appointee). This is
    optional.

    5.  If confirmed, save the library in the local (mirror) repository and deliver
    the library and POM to the requester.


    In this example, I name it `Marvin`. I skip all the optional steps, but you are
    free to add them as extension work.


    ## A Simple Server to Provide Mavenized Artifacts


    You need to create a REST webserver that serves the Maven repository client. This
    consists of a root EAR Gradle project, one WAR Gradle child project, and one EJB
    Gradle child project.


    ### The Marvin EAR Root Project


    To start, create a Gradle project in Eclipse and name it `Marvin`. In the `settings.gradle`
    file, add the following:


    ```

    include ''MarvinWeb'', ''MarvinEjb''

    ```


    This is to inform Gradle that you have two subprojects—`MarvinWeb` and `MarvinEjb`.
    Replace the contents of the `build.gradle` file with the following:


    ```

    /*

    * GRADLE project build file

    */

    plugins {

    id ''ear''

    }

    // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

    // Use the deloyEar task to compile and assemble all and

    // upload it to Glassfish

    // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

    repositories {

    jcenter()

    }

    dependencies {

    // The following dependencies will be the ear modules

    // and will be placed in the ear root

    deploy project(path: '':MarvinWeb'',

    configuration: ''archives'')

    deploy project(path: '':MarvinEjb'',

    configuration: ''archives'')

    // The following dependencies will become ear libs and

    // will be placed in a dir configured via the

    // libDirName property (default: ''lib'')

    earlib ''org.apache.commons:commons-configuration2:2.6''

    earlib ''commons-io:commons-io:2.6''

    earlib ''commons-beanutils:commons-beanutils:1.9.4''

    }

    ear {

    // Possibly tweak the "ear" task. See the "ear" plugin

    // documentation

    }

    // This is a custom task to deploy the EAR on a local

    // Glassfish instance

    task deployEar(dependsOn: ear,

    description:">>> MARVIN deploy task") {

    doLast {

    def FS = File.separator

    def glassfish =

    project.properties[''glassfish.inst.dir'']

    def user = project.properties[''glassfish.user'']

    def passwd = project.properties[''glassfish.passwd'']

    File temp = File.createTempFile("asadmin-passwd",

    ".tmp")

    temp  ${sout}"

    if(serr.toString()) System.err.println(serr)

    temp.delete()

    new File(glassfish + FS +

    "glassfish${FS}domains${FS}domain1${FS}lib" +

    "${FS}classes" + FS + "marvin.properties").bytes =

    new File(project.rootDir.absolutePath + FS +

    "marvin.properties").bytes

    }

    }

    // This is a custom task for undeploying the application

    // from a local Glassfish server

    task undeployEar(

    description:">>> MARVIN undeploy task") {

    doLast {

    def FS = File.separator

    def glassfish =

    project.properties[''glassfish.inst.dir'']

    def user = project.properties[''glassfish.user'']

    def passwd = project.properties[''glassfish.passwd'']

    File temp = File.createTempFile("asadmin-passwd",

    ".tmp")

    temp  ${sout}"

    if(serr.toString()) System.err.println(serr)

    temp.delete()

    }

    }

    ```


    The following characteristics describe this file:


    *   The `plugins { id ''ear'' }` loads and enables Gradle’s EAR plugin. This plugin
    describes the construction of an `.ear` file.

    *   The `repositories { }` describes which repositories to contact for the necessary
    libraries.

    *   The `dependencies { }` section defines what needs to go into the EAR file.
    The `deploy` items tell about WARs an EJB should include; and the `earlib` items
    list library JARs to be included inside the EAR’s `lib` folder. These dependency
    types are defined by the EAR plugin. You won’t find them elsewhere.

    *   The two custom tasks are to create the Groovy scripts and to describe how
    to install and uninstall the EAR on a GlassFish server. They are not included
    in a build phase and therefore must be called explicitly. Obviously, these scripts
    must be rewritten for other server products.

    *   At the end of the deploy script, the application configuration file is copied
    to a place where the application can read it using classpath resolution. This
    procedure also depends on the server product in use.

    *   The operating system commands are executed inside both custom scripts. For
    Windows, just prepend `cmd /c` to the command strings.


    In the project root, add a file called `gradle.properties`. Here, you see how
    to connect to the local GlassFish instance:


    ```

    glassfish.inst.dir = /path/to/glassfish7

    glassfish.user = admin

    glassfish.passwd =

    ```


    Add the `marvin.properties` file to the project root. This file contains the runtime
    configuration for Marvin:


    ```

    repoDir = /path/to/mirror

    externalRepos = http://repo.maven.apache.org/maven2

    ```


    The `repoDir` specifies the path to your mirror repository. The `externalRepos`
    is a comma-separated list of external (/public) repositories to contact if the
    local mirror repository is missing any files.'
