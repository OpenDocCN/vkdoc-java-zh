    \ jmxBean;\n@Produces(\"application/json\")\npublic String pi() {\nlong t1 = System.currentTimeMillis();\n\
    double pi = calcPi(100_000_001);\nlong ela = System.currentTimeMillis() - t1;\n\
    jmxBean.setElapse(ela);\nreturn \"{\\\"pi\\\":\\\"\" + pi + \"\\\"}\";\n}\nprivate\
    \ double calcPi(int n) {\n// This is a stupid way of calculating PI.\n// It is\
    \ just an example of a time-consuming\n// operation.\ndouble pi = 0.0;\nfor (int\
    \ i = 1; i < n; i++) {\nif (i % 2 == 1) {\npi = pi + (4/((i*2.0)-1));\n} else\
    \ {\npi = pi - (4/((i*2.0)-1));\n}\n}\nreturn pi;\n}\n}\n```\n\nThis way, all\
    \ that you need for an MBean in a Jakarta EE application is an MBean interface\
    \ and an MBean class amended with a startup method.\n\n## Aggregating Values\n\
    \nTo monitor and later show every value of a monitorable variable is not always\
    \ desirable. In some cases, the amount of different numbers is just too big and\
    \ keeping an eye on them becomes a tedious and error-prone task. What you want\
    \ to do instead is apply some kind of aggregation, which is the process of taking,\
    \ say N numbers and applying a formula to calculate a single or at least a smaller\
    \ set of numbers from them.\n\nAggregation formulas particularly useful for monitoring\
    \ are the following:\n\n*   **Moving Average**\n\n    Takes the arithmetic average\
    \ of the last *N* values. In order to calculate it, you use a ring-buffer of size\
    \ *N* to gather the input values, sum up all values, and divide the sum by *N*.\
    \ The ring-buffer ensures that the latest *N* values are kept in memory.\n\n*\
    \   **Exponentially Moving Average**\n\n    Given a monitorable feature with a\
    \ current value *A* and a parameter *β* ∈ [0; 1], and with a new incoming value\
    \ *a*, the next monitorable value calculates to *A* = *β* · *A* + (1 − *β*) ·\
    \ *a*. This applies smoothing with more current values having a bigger weight\
    \ compared to older values. Common values for *β* are 0.7 ... 0.999.\n\n*   **Standard\
    \ Deviation**\n\n    Based on the same buffer as is used for the Moving Average,\
    \ the *standard deviation* is calculated using the formula known from statistics.\
    \ Although it’s not used often, presenting the standard deviation of, for example\
    \ the elapsed time, might provide valuable insight into a process’ stability.\n\
    \nFor the elapsed time example from the previous sections, a variant including\
    \ the moving average reads as follows:\n\n```java\npublic interface MonitoringBeanMXBean\
    \ {\ndouble getElapse();\nvoid addElapse(double elapse);\n}\npublic class MonitoringBean\n\
    implements MonitoringBeanMXBean {\nprivate static final int ELAPSE_LEN = 1000;\n\
