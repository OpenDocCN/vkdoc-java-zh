    :162595.0,\n\"fiveMinRate\":0.013113559807197639,\n\"fifteenMinRate\":0.004419844282431078,\n\
    \"meanRate\":0.007779616975224711,\n\"count\":4,\n\"oneMinRate\":0.06140731004375435,\n\
    \"elapsedTime\":1761859.0\n},\n\"book.jakartapro.restdatemp.RestDate.stdDateMeter\"\
    :{\n\"fiveMinRate\":0.013113559807197639,\n\"fifteenMinRate\":0.004419844282431078,\n\
    \"meanRate\":0.007779591604845184,\n\"count\":4,\n\"oneMinRate\":0.06140731004375435\n\
    }\n}\n```\n\nIn order to get the OpenAPI data, enter the\nfollowing:\n\n```\n\
    curl -X GET -H \"Accept:application/json\" \\\nhttp://localhost:8080/RestDateMP/openapi\n\
    ```\n\nThis produces something like this:\n\n```\n{\n\"openapi\" : \"3.1.0\",\n\
    \"info\" : {\n\"title\" : \"RestDate\",\n\"description\" : \"Date operations\"\
    ,\n\"license\" : {\n\"name\" : \"Eclipse Public License - v 1.0\",\n\"url\" :\
    \ \"https://www.eclipse.org/legal/epl-v10.html\"\n},\n\"version\" : \"1.0.0\"\n\
    },\n\"servers\" : [ {\n\"url\" : \"http://localhost:8080/webapi\"\n} ],\n\"paths\"\
    \ : {\n\"/d\" : {\n\"get\" : {\n\"summary\" : \"Outputs the date\",\n\"description\"\
    \ : \"This method outputs the date\",\n\"responses\" : {\n\"200\" : {\n\"description\"\
    \ : \"OK\",\n\"content\" : {\n\"application/json\" : {\n\"schema\" : {\n\"type\"\
    \ : \"string\"\n}\n}\n}\n}\n}\n}\n}\n}\n```\n\nFor more information, read the\
    \ specifications at [`https://download.eclipse.org/microprofile/`](https://download.eclipse.org/microprofile/).\n\
    \n17. Custom CDI\n\nCDI (Context and Dependency Injection) can be used to fetch\
    \ session or\nrequest contexts, inject beans for EL (Expression Language) usage,\n\
    retrieve entity managers in a JPA context, and more. They do this to\nseamlessly\
    \ let classes interact with containers provided by Jakarta\nEE.\nCDI, however,\
    \ has another facet which regularly gets ignored by\nintroductions, tutorials,\
    \ and blog entries: You can allow CDI to\nconstruct application-internal object\
    \ graphs or even use your own\ncontexts, producers, interceptors, decorators,\
    \ stereotypes, and\nCDI-style events.\n\nCDI Specification\n\nJakarta EE 10 includes\
    \ the CDI technology, version 4.0\\. Find the specification document\nat\n\n```\n\
    https://jakarta.ee/specifications/cdi/4.0\n```\n\nThis chapter talks about some\
    \ interesting aspects of CDI for\nintra-application use. For more information\
    \ and online resources like\nthe documentation of the reference implementation,\
    \ Weld can help you.\nVisit:\n\n```\nhttp://weld.cdi-spec.org/documentation/\n\
    ```\n\nBuilding Object Graphs\n\nWith normal Java SE, the *programming model*\
    \ for building object graphs consists\nof explicit associations and instantiations\
    \ of classes:\n\n```\npublic class Address {\nprivate String country;\nprivate\
    \ String state;\nprivate String city;\nprivate String street;\nprivate String\
    \ number;\nprivate String zip;\n// getters and setters...\n}\npublic class Person\
    \ {\nprivate String firstName;\nprivate String lastName;\nprivate char gender;\n\
    private String ssn;\nprivate LocalDate birthday;\nprivate Address address;\n//\
    \ getters and setters...\n}\npublic class Invoice {\nprivate Person buyer;\nprivate\
    \ LocalDateTime time;\nprivate List entries = new ArrayList();\n// getters and\
    \ setters...\n}\n...\nPerson buyer = new Buyer();\nbuyer.setFirstName(\"Peter\"\
    );\n// Set other Buyer fields...\nInvoice inv = new Invoice();\ninv.setBuyer(buyer);\n\
    inv.setTime(LocalDateTime.now());\n// Set other Invoice fields...\n```\n\nThe\
    \ instantiation and plumbing work shown in the last lines of this\nsnippet go\
    \ to a suitable method inside your code.\n\nNote\n\nThe classes all need to have\
    \ their own Java files. The rest of this\nchapter suppresses this note for simplicity.\n\
    \nWith CDI, you still declare the associations, but you let the CDI engine\ninstantiate\
    \ objects and assign them to fields:\n\n```\npublic class Address {\nprivate String\
    \ country;\nprivate String state;\nprivate String city;\nprivate String street;\n\
    private String number;\nprivate String zip;\n// getters and setters...\n}\npublic\
    \ class Person {\nprivate String firstName;\nprivate String lastName;\nprivate\
    \ char gender;\nprivate String ssn;\nprivate LocalDate birthday;\n@Inject private\
    \ Address address;\n// getters and setters...\n}\npublic class Invoice {\n@Inject\
    \ private Person buyer;\nprivate LocalDateTime time;\nprivate List entries = new\
    \ ArrayList();\n// getters and setters...\n}\n...\n// Somewhere, as a class member:\n\
    @Inject Invoice inv;\n```\n\nBecause of the `@Inject`, you\nknow that an `Invoice`\
    \ object\ncreated by CDI *does* have a `Person` instance in\nthe `buyer` field\n\
    (don’t use `new`!), and that the\n`buyer`\n*does* have an `Address` instance in\n\
    the `address`\nfield (again, you don’t use `new` to manually\ninstantiate `Address`\n\
    instances).\n\nThe most prominent conceptional difference between the non-CDI\
    \ code and the CDI\ncode is the way an object graph is bootstrapped. With non-CDI,\
    \ you do\nall that inside some appropriate method, but with CDI at work, you can\n\
    just use an injected field `@Inject Invoice inv;`\n*inside a class, which itself\
    \ is under custody of CDI*. This is\neasy to achieve inside a Faces bean class,\
    \ a\nREST endpoint\nclass, or an EJB:\n\n```\n// Faces: -------------------------------------\n\
    @ManagedBean\n@SessionScoped\npublic class SomeJsfBean {\n@Inject Invoice inv;\n\
    ...\n}\n// REST endpoint: -----------------------------\n@Path(\"/invoice\")\n\
    public class RestInvoice {\n@Inject Invoice inv;\n@GET\n@Path(\"show\")\n@Produces(\"\
    application/json\")\npublic String show() {\nreturn \"{ ... }\";\n}\n}\n// EJB:\
    \ ---------------------------------------\n@Stateful\npublic class InvoiceBean\
    \ {\n@Inject Invoice inv;\n...\n}\n```\n\nBy the way, it is also possible to inject\
    \ instances into\nconstructors and setters:\n\n```\npublic class SomeClass {\n\
    @Inject\npublic SomeClass(Invoice inv) {\n...\n}\n...\n}\npublic class SomeClass\
    \ {\n...\n@Inject\npublic setInvoice(Invoice inv) {\n...\n}\n...\n}\n```\n\nIt\
    \ is important to understand that in your code you still don’t\nexplicitly use\
    \ those constructors or setters, even with constructor or\nsetter injection at\
    \ work!\n\nIf you programmatically need to fetch an instance of a CDI bean class,\
    \ you can\nwrite the following:\n\n```\nimport jakarta.enterprise.inject.se.SeContainer;\n\
    import jakarta.enterprise.inject.se.SeContainerInitializer;\n...\nSeContainerInitializer\
    \ containerInit =\nSeContainerInitializer.newInstance();\nSeContainer container\
    \ = containerInit.initialize();\nInvoice proc = container.select(Invoice.class).get();\n\
    ...\n// Just for debugging / inspection, list all CDI beans\ncontainer.getBeanManager().getBeans(Object.class).\n\
    forEach(b -> {\nSystem.out.println(b);\n});\n...\ncontainer.close();\n```\n\n\
    This is also the way you would use CDI in a non-Jakarta EE\nenvironment or in\
    \ elaborated unit tests.\n\nQualifiers\n\nCDI can also be\nused to automatically\
    \ fetch implementations of interfaces. Consider the\nfollowing example:\n\n```\n\
    public interface Audit {\n...\n}\npublic class BasicAudit implements Audit {\n\
    ...\n}\npublic class SomeBean {\n@Inject Audit audit;\n}\n```\n\nCDI sees that\
    \ `BasicAudit` is the\nonly implementation of the `Audit` interface and\ninjects\
    \ an instance of `BasicAudit` into the\nfield.\n\nBut what happens if you have\
    \ two implementations, such as in the\nfollowing setup:\n\n```\npublic interface\
    \ Audit {\n...\n}\npublic class BasicAudit implements Audit {\n...\n}\npublic\
    \ class ComplexAudit implements Audit {\n...\n}\npublic class SomeBean {\n@Inject\
    \ Audit audit;\n}\n```\n\nCDI will now throw an exception, stating that it cannot\
    \ resolve\nambiguous dependencies.\n\nOne way to fix this is to mark the different\
    \ implementations with\nqualifiers:\n\n```\npublic interface Audit {\n...\n}\n\
    // ------------------------------------------------\nimport java.lang.annotation.Retention;\n\
    import java.lang.annotation.Target;\nimport static java.lang.annotation.RetentionPolicy.*;\n\
    import static java.lang.annotation.ElementType.*;\nimport jakarta.inject.Qualifier;\n\
    @Qualifier\n@Retention(RUNTIME)\n@Target({TYPE, METHOD, FIELD, PARAMETER})\npublic\
    \ @interface Basic {}\n// ------------------------------------------------\nimport\
    \ java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\nimport\
    \ static java.lang.annotation.RetentionPolicy.*;\nimport static java.lang.annotation.ElementType.*;\n\
    import jakarta.inject.Qualifier;\n@Qualifier\n@Retention(RUNTIME)\n@Target({TYPE,\
    \ METHOD, FIELD, PARAMETER})\npublic @interface Complex {}\n// ------------------------------------------------\n\
    @Basic\npublic class BasicAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @Complex\npublic class ComplexAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    public class SomeBean {\n@Inject @Complex Audit audit;\n// or: @Inject @Basic\
    \ Audit audit;\n}\n```\n\nSuch annotations are called *qualifier annotations*.\
    \ Because\nof the `@Complex`\n(or `@Basic`)\nnext to the `@Inject`, CDI now\n\
    knows which implementation to take.\n\nNote\n\nCDI automatically applies a `@Default`\
    \ qualifier to\ninjections if you don’t explicitly declare a qualifier. You can\
    \ suppress\nthis automatic assignment by specifying `@Any`, which expresses\n\
    “no qualifier.”\n\nAlternatives\n\nTo avoid ambiguous dependencies, you can\n\
    also mark all implementations but one with `@Alternative`:\n\n```\npublic interface\
    \ Audit {\n...\n}\n// ------------------------------------------------\n@Default\n\
    public class BasicAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @Alternative\npublic class ComplexAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    public class SomeBean {\n@Inject Audit audit;\n}\n```\n\nCDI will select the alternative\
    \ implementation only if you specify it in\n`WEB-INF/beans.xml` (or\n`META-INF/beans.xml`\
    \ if\noutside Jakarta EE):\n\n```\n\nbook.jakartapro.cdi.audit.ComplexAudit\n\n\
    ```\n\nOr, you can avoid writing something into `beans.xml` and instead\nadd a\
    \ `@Priority`\nto the alternative implementations:\n\n```\npublic interface Audit\
    \ {\n...\n}\n// ------------------------------------------------\n@Priority(100)\
    \ @Alternative\npublic class BasicAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @Priority(101) @Alternative\npublic class ComplexAudit implements Audit {\n...\n\
    }\n// ------------------------------------------------\npublic class SomeBean\
    \ {\n@Inject Audit audit;\n}\n```\n\nThe implementation with the highest `@Priority`\
    \ value wins.\nYou can see that, when using the `@Priority`\ndisambiguation, the\
    \ example removed the `@Default` qualifier,\nsince the default does not correspond\
    \ to a calculable priority.\n\nProducers\n\nIf you need more control over the\
    \ way CDI instantiates classes, or if\nyou need to decide programmatically which\
    \ implementation of some\ninterface you need for injection purposes, you can provide\
    \ a\n*producer method* to create CDI beans:\n\n```\npublic interface Audit {\n\
    ...\n}\n// ------------------------------------------------\n@Vetoed\npublic class\
    \ BasicAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @Vetoed\npublic class ComplexAudit implements Audit {\n...\n}\n// ------------------------------------------------\n\
    @ApplicationScoped\npublic class AuditProducer {\n@Produces\npublic Audit produce()\
    \ {\nAudit res = null;\nif(...) { // make a decision\nres = new BasicAudit();\n\
    } else {\nres = new ComplexAudit();\n}\nreturn res;\n}\n}\n// ------------------------------------------------\n\
    public class SomeBean {\n@Inject Audit audit;\n}\n```\n\nThis example had to add\
    \ `@Vetoed` to the\nimplementations, because otherwise the implementations CDI\
    \ sees would\ncompete with the producer during the dependency resolution process,\n\
    yielding an ambiguation exception. Also, the producer class can have any\nname,\
    \ but since it is a CDI bean itself and is instantiated by CDI, you\nneed to add\
    \ `@ApplicationScope` to\nthe class, which means you at most get one instance\
    \ of this class for\nthe whole application. Scopes are discussed more in the next\n\
    section.\n\nProducer methods can have injected parameters, which might help the\n\
    producer method properly do its work:\n\n```\n@Produces\npublic Audit produce(SomeBean\
    \ b1,\nSomeOtherBean b2, ...) {\n...\n}\n```\n\nProducer methods can have qualifiers\
    \ assigned to\nthem, just as implementations can have:\n\n```\n@ApplicationScoped\n\
    public class AuditProducer {\n@Produces @SomeQualifier\npublic Audit produce()\
    \ {\n...\n}\n@Produces @SomeOtherQualifier\npublic Audit produce() {\n...\n}\n\
    }\n// ------------------------------------------------\npublic class SomeBean\
    \ {\n@Inject @SomeQualifier Audit audit1;\n@Inject @SomeOtherQualifier Audit audit2;\n\
    }\n```\n\nThe qualifier annotations must be declared exactly the same way as\n\
    described for implementation qualifiers.\n\nScope\n\nScopes determine\nthe lifecycle\
    \ of beans created by CDI. In a Jakarta EE environment, you\nlearned about a couple\
    \ of scopes:\n\n*   `@ApplicationScoped`:\n    Any bean in that scope is instantiated\
    \ only once during the lifetime of\n    an application. All injected beans of\
    \ the same application refer to the\n    same instance.\n\n*   `@SessionScoped`:\
    \ Any\n    bean in that scope gets instantiated just once while a user session\
    \ is\n    active. Any injection occurring in the same user session refers to the\n\
    \    same instance.\n\n*   `@RequestScoped`: All\n    request scope beans of the\
    \ same type refer to the same instance during a\n    request.\n\n*   `@ConversationScoped`:\n\
    \    Similar to the session scope, but bound to a user activity inside a\n   \
    \ session and explicitly controlled by the web application.\n\nIf beans don’t\
    \ explicitly declare a scope, they will automatically\nrun inside the `@Dependent`\
    \ scope,\nwhich means their lifecycle is bound to the object they are injected\
    \ to.\nThe `Dependent`\nscope is called a *pseudo-scope*, since it is derived.\
    \ There\nexists a second pseudo-scope named `Singleton`, which\nensures that only\
    \ one instance of the bean exists on a JVM basis.\n\nYou need to add a scope declaration\
    \ on the type level, or on the method\nlevel for producers:\n\n```\n@ApplicationScope\n\
    public class SomeBean {\n...\n}\n// ------------------------------------------------\n\
    public class SomeBean {\n@Produces @ApplicationScoped\npublic SomeOtherBean produce()\
    \ {\n...\n}\n}\n```\n\nIf you are using only intra-app CDI, or you are running\
    \ outside a\nJakarta EE application, only the `@ApplicationScope`,\n`@Dependent`,\
    \ and\n`Singleton`\nscopes play a role.\n\nIf you need to hook into the construction\
    \ or destruction of a CDI bean,\nor for debugging purposes, you can use the `@PostConstruct`\
    \ and\n`@PreDestroy`\nannotations:\n\n```\npublic class SomeBean {\n...\n@PostConstruct\n\
    public void postContruct() {\nSystem.out.println(\"POST-CONSTRUCT\");\n}\n@PreDestroy\n\
    public void preDestroy() {\nSystem.out.println(\"PRE-DESTROY\");\n}\n}\n```\n\n\
    Interceptors\nInterceptors are used to add\ncrosscutting concerns to method invocations\
    \ of CDI beans. This means\nthat you use them to add logging, auditing, performance\
    \ measurement, and\nother non-functional code to your bean classes.\nCDI interceptors\
    \ are covered later in this book, in Chapter [18](#490565_1_En_18_Chapter.xhtml).\n\
    \nDecorators\nDecorators are\nsimilar to interceptors, in that they somehow extend\
    \ existing code. But\ncontrary to interceptors, they actually change the functioning\
    \ of\nclasses, so you use them for things like hotfixes or temporary\nfunctional\
    \ changes.\n\nThe only requirement for a CDI bean class to be decoratable is that\
    \ it\nmust have an interface. As an example, consider the `Processor` interface\n\
    and the `ProcessorImpl`\nimplementation:\n\n```\npublic interface Processor {\n\
    void process(Invoice inv);\n}\n// --------------------------------------------\n\
    public class ProcessorImpl implements Processor {\npublic void process(Invoice\
    \ inv) {\n// some code...\n}\n}\n```\n\nTo decorate the processor, all you have\
    \ to do is write a decorator class\nas follows:\n\n```\n@Decorator\npublic class\
    \ ProcessorImplNew implements Processor {\n@Inject @Delegate private ProcessorImpl\
    \ old;\npublic void process(Invoice inv) {\n// some other code...\n}\n}\n```\n\
    \nThen you declare the decorator inside `WEB-INF/beans.xml` (or\n`MEA-INF/beans.xml`\
    \ if\nyou're outside Jakarta EE):\n\n```\n...\n\nbook.jakartapro.cdi.decorate.ProcessorImplNew\n\
    \n```\n\nIn the decorator class, you can add a field annotated with `@Inject @Delegate`.\n\
    That means you can access the original implementation, so you could use\nit for\
    \ the decorator code.\n\n18. Interceptors\n\nInterceptors\nare methods or classes\
    \ that hook into method invocations or lifecycle\nevents. You will typically use\
    \ them for crosscutting concerns like\nlogging, auditing, performance measurements,\
    \ or any other non-functional\naspect of an application. Non-functional means\
    \ that the program and data\nflow of the application are not interfered with,\
    \ so the software\nfunctionality stays the same whether or not interceptors are\
    \ used.\nInterceptor targets—classes that are\nsubject to being intercepted—may\
    \ be session beans, message driven beans,\nand CDI managed beans. In addition,\
    \ interceptor targets can also be JPA\nlifecycle listeners, servlets, and Faces\
    \ phase listeners. The fact that\nthe latter are not usually called interceptors\
    \ but more often are called\njust listeners does not obviate that they can be\
    \ used the same way as\ninterceptors.\nFor Jakarta EE 10, the interceptors (not\
    \ the JPA, servlets, and Faces\nlifecycle listeners) are described by the Interceptors\
    \ 2.1\nspecification.\n\nCDI Interceptors\nCDI interceptors are used to\nadd crosscutting\
    \ concerns to method invocations of CDI beans. You can\napply CDI interceptors\
    \ to *any* class within the custody of CDI.\nThis includes session EJBs, message\
    \ driven beans, and beans used for\nFaces and servlets.\n\nTo start intercepting,\
    \ you first declare a new annotation, as in the\nfollowing snippet:\n\n```\nimport\
    \ java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\nimport\
    \ static java.lang.annotation.RetentionPolicy.*;\nimport static java.lang.annotation.ElementType.*;\n\
    import jakarta.interceptor.InterceptorBinding;\n@InterceptorBinding\n@Retention(RUNTIME)\n\
    @Target({TYPE, METHOD, FIELD})\npublic @interface TracingInterceptor { }\n```\n\
    \nThe name is up to you. This example implies that you somehow want to\ntrace\
    \ the program flow.\n\nThe interceptor\nimplementation just needs to add the `@Interceptor`\
    \ annotation and the new\nannotation you just defined:\n\n```\nimport jakarta.interceptor.*;\n\
    import jakarta.annotation.PostConstruct;\nimport jakarta.annotation.PreDestroy;\n\
    @Interceptor\n@TracingInterceptor\npublic class TracingInterceptorSys {\n@AroundInvoke\n\
    public Object logMethodEntry(InvocationContext ctx)\nthrows Exception {\nSystem.out.println(\"\
    Before entering method: \" +\nctx.getMethod().getName());\n// We call the next\
    \ interceptor in the\n// interceptor chain.\nreturn ctx.proceed();\n}\n@AroundConstruct\n\
    public void aroundConstruct(InvocationContext ctx) {\n...\nctx.proceed();\n}\n\
    /*or*/\n@AroundConstruct\npublic Object aroundConstruct(InvocationContext ctx)\n\
    throws Exception {\n...\nreturn ctx.proceed();\n}\n@AroundTimeout\npublic Object\
    \ aroundTimeout(InvocationContext ctx)\nthrows Exception {\n...\nreturn ctx.proceed();\n\
    }\n@PostConstruct\npublic void postConstruct(InvocationContext ctx) {\n...\nctx.proceed();\n\
    }\n@PreDestroy\npublic void preDestroy(InvocationContext ctx) {\n...\nctx.proceed();\n\
    }\n}\n```\n\nThe annotations can be\nfreely mixed . You are not obliged to use\
    \ all of them.\n\nIn order for the interceptor to be activated, it needs to be\
    \ added to\nthe `WEB-INF/beans.xml`\nfile (or `META-INF/beans.xml` if\nit’s outside\
    \ Jakarta EE):\n\n```\n...\n\nbook.jakartapro.cdi.intercept.TracingInterceptorSys\n\
    \n```\n\nTo apply the interceptor to CDI beans, you have to add\nthe interceptor\
    \ annotation to a class or method call level:\n\n```\n@TracingInterceptor\npublic\
    \ class SomeBean {\n...\n}\n// --------------------------------------------\n\
    public class SomeBean {\n...\n@TracingInterceptor\npublic void someMethod() {\n\
    ...\n}\n}\n```\n\nNote\n\nThis is one of the downsides of CDI interception. The\
    \ clients (the classes to\nbe intercepted) must explicitly be annotated, which\
    \ somehow thwarts the\nnon-functional nature of CDI interceptions. Readers of\
    \ the class code\nwill wonder what this annotation is about and might feel tempted\
    \ to\ninvestigate the non-functional code. Also, it is not possible to add\ninterceptors\
    \ without touching the code, later in a project, after the\ndevelopment phase.\
    \ In order to avoid this, you must use other\ntechnologies, such as runtime weaving\
    \ in AOP (aspect oriented programming).\n\nIt is possible to avoid creating custom\
    \ interceptor\nannotations. Although such custom annotations, like `@TracingInterceptor`\n\
    in the previous code, improve the flexibility and the expressiveness and\nthus\
    \ readability of the code, you can omit the annotation and directly\nwrite the\
    \ following:\n\n```\nimport jakarta.interceptor.AroundInvoke;\nimport jakarta.interceptor.Interceptor;\n\
    import jakarta.interceptor.InvocationContext;\n@Interceptor\npublic class TracingInterceptorSys\
    \ {\n@AroundInvoke\npublic Object logMethodEntry(InvocationContext ctx)\nthrows\
    \ Exception {\nSystem.out.println(\"Before entering method: \" +\nctx.getMethod().getName());\n\
    return ctx.proceed();\n}\n}\n// --------------------------------------------\n\
    @Interceptors({TracingInterceptorSys.class})\npublic class SomeBean {\n...\n}\n\
    ```\n\nJPA Lifecycle Listeners\nYou have several options for intercepting JPA\
    \ lifecycle activities.\nThe first thing you can do is add methods annotated with\
    \ `@PrePersist`, `@PostPersist`, `@PostLoad`, `@PreUpdate`, `@PostUpdate`, `@PreRemove`,\
    \ and `@PostRemove` to a JPA\nentity class (tagged with `@Entity`). Such\nmethods\
    \ can have any name, but they must have a zero-size parameter list\nand they must\
    \ return `void`.\n\nSecond, you can create a special listener class and assign\
    \ it to a JPA\nusing special annotations:\n\n```\npublic class MyListener {\n\
    @PrePersist void onPrePersist(Object o) { ... }\n@PostPersist void onPostPersist(Object\
    \ o) { ... }\n@PostLoad void onPostLoad(Object o) { ... }\n@PreUpdate void onPreUpdate(Object\
    \ o) { ... }\n@PostUpdate void onPostUpdate(Object o) { ... }\n@PreRemove void\
    \ onPreRemove(Object o) { ... }\n@PostRemove void onPostRemove(Object o) { ...\
    \ }\n}\n...\n@Entity @EntityListeners({MyListener.class})\npublic class TheJpa\
    \ { ... }\n```\n\nThe object passed as a parameter is the JPA entity class instance.\
    \ In\naddition, you can add such a listener class to *all* JPA entity\nbeans.\
    \ To this aim, open or create a `src/main/resources/META-INF/orm.xml`\nfile and\
    \ add the following:\n\nSuch a listener frequently gets called a *default entity\n\
    listener*.\n\nServlet Listeners\n\nIn order to listen to servlet lifecycle\nevents,\
    \ you create a class as follows:\n\n```\n@WebListener()\npublic class SimpleServletListener\
    \ implements ... {\n... implementation ...\n}\n```\n\nand extend one or more of\
    \ the following interfaces\n\n```\njakarta.servlet.ServletContextListener\njakarta.servlet.ServletContextAttributeListener\n\
    jakarta.servlet.ServletRequestListener\njakarta.servlet.ServletRequestAttributeListener\n\
    jakarta.servlet.http.HttpSessionListener\njakarta.servlet.http.HttpSessionAttributeListener\n\
    ```\n\nThese listeners listen to the following events during the lifetime of a\n\
    servlet:\n\n*   `HttpSessionListener`:\n    Listens to HTTP sessions (user sessions)\
    \ being initialized or destroyed.\n    This is a good hook for auditing purposes.\n\
    \n*   `ServletContextListener`:\n    Listens to a servlet’s context being initialized\
    \ or destroyed. You can\n    use this to react to a web application that just\
    \ started.\n\n*   `ServletRequestListener`:\n    Tells about a request being initialized\
    \ or destroyed.\n\n*   `HttpSessionAttributeListener`:\n    Listens to session\
    \ attributes being added,\n    removed or altered.\n\n*   `ServletContextAttributeListener`:\n\
    \    Listens to context attributes being added, removed or altered.\n\n*   `ServletRequestAttributeListener`:\n\
    \    Listens to request attributes being added, removed or altered.\n\nFaces Phase\
    \ Listeners\n\nTo add a phase listener to monitor various Faces phases, you add\
    \ a\nlistener class declaration to `src/main/webapp/WEB-INF/faces-config.xml`:\n\
    \n```\n\nthe.pac.kage.MyPhaseListener\n\n... more phase listeners ...\n\n...\n\
    \n```\n\n(Make sure there are no line breaks or spaces after `jakartaee/`.)\n\n\
    The implementation then indicates which phase it is interested in and\npresents\
    \ the methods that are executed before and after the phase:\n\n```\npackage the.pac.kage;\n\
    ...\npublic class MyPhaseListener implements PhaseListener {\nprivate static final\
    \ long serialVersionUID =\n-7607159318721947672L;\n// The phase where the listener\
    \ is going to be called\nprivate PhaseId phaseId = PhaseId.RENDER_RESPONSE;\n\
    public void beforePhase(PhaseEvent event) {\n...\n}\npublic void afterPhase(PhaseEvent\
    \ event) {\n...\n}\npublic PhaseId getPhaseId() {\nreturn phaseId;\n}\n}\n```\n\
    \nAllowed `PhaseId`\nvalues include the following:\n\n1.  `ANY_PHASE`\n    for\
    \ all phases.\n\n2.  `RESTORE_VIEW`\n    for the *restore view* phase. This is\
    \ the first phase, where the\n    in-memory view representation is built.\n\n\
    3.  `APPLY_REQUEST_VALUES`\n    for the *apply request values* phase. This is\
    \ the second phase,\n    where the input field values are read.\n\n4.  `PROCESS_VALIDATIONS`\n\
    \    for the validations processing phase.\n\n5.  `UPDATE_MODEL_VALUES`\n    for\
    \ the fourth phase, where the model is updated.\n\n6.  `INVOKE_APPLICATION`\n\
    \    for the fifth phase, where the application is invoked to, for example,\n\
    \    find out which page to load next.\n\n7.  `RENDER_RESPONSE` for the last phase,\n\
    \    where the response is created.\n\n19. Bean Validation\n\nIf in a JPA entity\n\
    bean like this\n\n```\n@Entity\npublic class Customer {\nprivate String name;\n\
    public String getName () {\nreturn name;\n}\npublic void setName (String name)\
    \ {\nthis.name = name;\n}\n...\n}\n```\n\nyou add a non-null check like this\n\
    \n```\n...\npublic void setName (String name) {\nif(name == null)\nthrow new IllegalArgumentException(\n\
    \"Name must not be null);\nthis.name = name;\n}\n...\n```\n\nYou may feel tempted\
    \ to think of a standard, shorter way to declare such\nconstraints.\n*Bean validation,*\
    \ governed by JSR 380, is the answer to this\nconcern. Using bean validation,\
    \ you can simply write this\n\n```\n...\n@NotNull\nprivate String name;\npublic\
    \ String getName () {\nreturn name;\n}\npublic void setName (String name) {\n\
    this.name = name;\n}\n...\n```\n\nThe bean validation version inside Jakarta\n\
    EE 10 is 3.0 and you can see its specification at\n\n```\nhttps://jakarta.ee/specifications/bean-validation/3.0/\n\
    jakarta-bean-validation-spec-3.0.html\n```\n\nThere are a lot more bean validation\
    \ constraints. This chapter only\ntalks about some of their usage scenarios.\n\
    \nWhere to Use Bean Validation\n\nBean validation happens at suitable places inside\
    \ Jakarta EE 10\\. It is\n*not* sufficient to just add a constraint annotation\
    \ to your\nclass for bean validation to work. The framework must also have the\n\
    class in its custody in order for the constraints to be checked. More\nprecisely,\
    \ bean validation works at the following places:\n\n*   Entity beans (JPA)\n\n\
    *   CDI beans\n\n*   Faces (beans used in EL constructs, for example during user\
    \ input\n    fetching)\n\n*   JAX-RS (RESTful services)\n\nHow to Add Constraints\n\
    \nConstraints can be\nadded to fields as follows:\n\n```\nclass Person {\n@NotNull\
    \ @Size(max=30)\nprivate String name;\n}\n```\n\nThey can be added to constructor\
    \ and method parameters as follows:\n\n```\nclass Person {\npublic Person(@NotNull\
    \ @Size(max=30) String name) {\n...\n}\n...\npublic void setEmail(@Email email)\
    \ {\n...\n}\n}\n```\n\nAnd they can be added to method return values as follows:\n\
    \n```\nclass Person {\n...\n@NotNull @Size(max=30)\npublic String getCountry()\
    \ {\n...\n}\n}\n```\n\nBuilt-in Constraints\n\nAll built-in\nconstraints live\
    \ in the `jakarta.validation.constraints`\npackage. The list is as follows:\n\n\
    *   `@NotNull`: Annotated\n    element must not be `null`.\n\n*   `@Null`:\n \
    \   Annotated element must be `null`.\n\n*   `@AssertTrue`:\n    Annotated element\
    \ must be a boolean `true`.\n\n*   `@AssertFalse`:\n    Annotated element must\
    \ be a boolean `false`.\n\n*   `@Min`:\n    Annotated element must be a numeric\
    \ value greater than or equal to some\n    value. The `float` and `double` types\
    \ are not\n    supported, due to possible rounding errors. Example: `@Min(37)`\n\
    \n*   `@DecimalMin`:\n    Annotated element must be a numeric value greater than\
    \ or equal to some\n    value specified by a string. The `float` and `double`\
    \ types are not\n    supported, due to possible rounding errors. An optional `inclusive`\
    \ parameter\n    specifies whether the specified value is inclusive (the default\
    \ is `true`). A `null` value is\n    considered valid, so you must add `NotNull`\
    \ to disallow\n    `null`. Examples:\n    `@DecimalMin(\"37.4\")`,\n    `@DecimalMin(value=\"\
    37.4\", inclusive=false)`\n\n*   `@Max`:\n    Annotated element must be a numeric\
    \ value less than or equal to some\n    value. The `float` and `double` types\
    \ are not\n    supported, due to possible rounding errors. Example: `@Max(42)`\n\
    \n*   `@DecimalMax`:\n    Annotated element must be a numeric value less than\
    \ or equal to some\n    value specified by a string. The `float` and `double`\
    \ types are not\n    supported, due to possible rounding errors. An optional `inclusive`\
    \ parameter\n    specifies whether the specified value is inclusive (the default\
    \ is `true`). A `null` value is\n    considered valid, so you must add `NotNull`\
    \ to disallow\n    `null`. Examples:\n    `@DecimalMax(\"42.0\")`,\n    `@DecimalMax(value=\"\
    42.0\", inclusive=false)`\n\n*   `@Negative`: Same as\n    `@Max(0)`, but\n  \
    \  equals is not included and `float` and `double` are\n    allowed.\n\n*   `@Positive`:\
    \ Same as\n    `@Min(0)`, but\n    equals is not\n    included and `float` and\
    \ `double` are\n    allowed.\n\n*   `@NegativeOrZero`: Same\n    as `Negative`,\n\
    \    but `0.0` is\n    included.\n\n*   `@PositiveOrZero`: Same\n    as `Positive`,\n\
    \    but `0.0` is\n    included.\n\n*   `@Size`:\n    The size of a string, collection,\
    \ map, or array must be between the\n    specified parameters. Optional parameters\
    \ include `min` (default is `0`) and `max` (default is `Integer.MAX_VALUE`).\n\
    \    Examples: `@Size( min = 5 )`, `@Size( min = 10, max = 15 )`\n\n*   `@NotEmpty`:\
    \ Same as\n    `@Size(min=1)`.\n\n*   `@NotBlank`: Same as\n    `@Size(min=1)`,\n\
    \    only for strings.\n\n*   `@Digits`:\n    Confines the number of integer and\
    \ fraction digits. Parameters include\n    `integer`\n    (maximum number of integer\
    \ digits) and `fraction` (maximum\n    number of fraction digits).\n\n*   `@Email`:\n\
    \    Checks whether a string represents a valid email address. Optional\n    additional\
    \ parameters include `regexp` and `flags`; see `@Pattern`.\n\n*   `@Pattern`:\
    \ Annotated\n    element must match the specified pattern. Parameters are `regexp`\
    \ (the regular\n    expression) and `flags` (array of `Pattern.Flag` values,\n\
    \    for regular expression flags). Examples: `@Pattern(regexp = \"\\\\d6\")`\
    \ (six digits), `@Pattern(regexp = \"[ABCD]5\", flags = Pattern.Flag.CASE_INSENSITIVE\
    \ )` (five from A to D,\n    case-insensitive).\n\n*   `@Past`:\n    The annotated\
    \ element must represent a date and time in the past.\n    Supported types are\
    \ `Date`, `Calendar`, and more\n    (see the specification).\n\n*   `@PastOrPresent`:\
    \ Same\n    as `@Past`, but\n    present is included.\n\n*   `@Future`:\n    The\
    \ annotated element must represent\n    a date and time in the future. Supported\
    \ types are `Date`, `Calendar`, and more\n    (see the specification).\n\n*  \
    \ `@FutureOrPresent`:\n    Same as `@Future`, but present\n    is included.\n\n\
    As a rule of thumb, always add `@NotNull` if you want\nto disallow `null` values,\
    \ since\nmost constraints consider `null` a positively\nvalidating value.\n\n\
    Custom Constraints\nThe built-in constraints cover a wide range of validation\
    \ scenarios.\nIf you still feel tempted to create your own constraint, you have\
    \ to\ndeclare the corresponding annotation and provide an implementation.\nAs\
    \ an example, you can create a constraint called `PZN8` that\ndenotes the barcode\
    \ for pharmaceuticals in Germany. It is built from a\n`-` sign, plus\nseven to\
    \ eight digits, and one check digit at the end. For technical\nreasons, this string\
    \ is surrounded by two asterisks (`*`). You’ll want to\ninclude the check digit\
    \ into the validation process, so this is a case\nin which you have to use a custom\
    \ validator.\n\nThe validation annotation code reads\nas follows:\n\n```\npackage\
    \ book.jakartapro.restdate;\nimport static java.lang.annotation.ElementType.*;\n\
    import static java.lang.annotation.RetentionPolicy.RUNTIME;\nimport java.lang.annotation.*;\n\
    import jakarta.validation.Constraint;\nimport jakarta.validation.Payload;\n@Target({\
    \ METHOD, FIELD, ANNOTATION_TYPE,\nCONSTRUCTOR, PARAMETER, TYPE_USE })\n@Retention(RUNTIME)\n\
    @Documented\n@Constraint(validatedBy = { Pzn8Validator.class })\npublic @interface\
    \ PZN8 {\nString message() default \"Not a PZN-8\";\nClass[] groups() default\
    \ { };\nClass[] payload() default { };\nboolean includeDelimiters() default false;\n\
    }\n```\n\nFor the implementation class called `Pzn8Validator`,\nyou have to implement\
    \ the `ConstraintValidator`\ninterface. In its `isValid()` method, you take the\n\
    input string, possibly check and strip off the surrounding asterisks,\ncheck for\
    \ the length, check for and strip off the leading `-`, check whether all\ndigits\
    \ are numeric, and then perform the check digit test:\n\n```\nimport jakarta.validation.ConstraintValidator;\n\
    import jakarta.validation.ConstraintValidatorContext;\npublic class Pzn8Validator\
    \ implements\nConstraintValidator {\nprotected boolean delimitersIncluded;\n@Override\n\
    public void initialize(PZN8 pzn8) {\nthis.delimitersIncluded = pzn8.includeDelimiters();\n\
    }\n@Override\npublic boolean isValid(String str,\nConstraintValidatorContext ctx)\
    \ {\n// null values are valid\nif ( str == null )\nreturn true;\nString str2 =\
    \ str;\nif(delimitersIncluded) {\nif(str.length()  9)\nreturn false;\nif(str2.charAt(0)\
    \ != '-') return false;\nstr2 = str2.substring(1);\nchar checkDigit = str2.charAt(str2.length()\
    \ - 1);\nstr2 = str2.substring(0, str2.length() - 1);\nif(!str2.matches(\"\\\\\
    d*\")) return false;\n// the check digit algorithm for PZNs\nint p = 2;\nint s\
    \ = 0;\nfor(int i=0;i<str2.length();i++) {\ns += p * (str2.charAt(i) - '0');\n\
    p++;\n}\nint x = s % 11;\nreturn (checkDigit - '0') == x;\n}\n}\n```\n\nYou can\
    \ now add the custom bean validator\nto any method, constructor, field, or method\
    \ parameter. Just as an\nexample inside a REST controller, you could write something\
    \ like the\nfollowing:\n\n```\n@Path(\"registerPzn/{pzn}\")\n@POST\n@Produces(\"\
    application/json\")\npublic Response registerPzn(\n@PathParam(\"pzn\")\n@PZN8\
    \ @NotNull String pzn\n)\n{\n... maybe save in database ...\nreturn Response.status(200)...;\
    \ // some OK message\n}\n```\n\nBean Validation Exceptions\nBean\nvalidation issues\
    \ a `jakarta.validation.ValidationException`\nor one of its subclasses when a\
    \ validation fails. The bean validation\nspecification does not contain any information,\
    \ because handling this\nmessage is the business of the client code.\n\nIn RESTful\
    \ applications using Jax-RS, you would for example add an `ExceptionMapper` (in\n\
    the `jakarta.ws.rs.ext`\npackage):\n\n```\nimport java.util.HashMap;\nimport java.util.Map;\n\
    import jakarta.validation.ConstraintViolation;\nimport jakarta.validation.ConstraintViolationException;\n\
    import jakarta.ws.rs.core.Response;\nimport jakarta.ws.rs.core.Response.Status;\n\
    import jakarta.ws.rs.ext.ExceptionMapper;\nimport jakarta.ws.rs.ext.Provider;\n\
    @Provider\npublic class ValidationExceptionMapper\nimplements\nExceptionMapper\
    \ {\n@Override\npublic Response toResponse(\nConstraintViolationException ex)\
    \ {\nMap errors =\nnew HashMap();\nfor(ConstraintViolation viol :\nex.getConstraintViolations())\
    \ {\nerrors.put(viol.getMessage(),\nviol.getInvalidValue().toString());\n}\nreturn\
    \ Response.status(\nStatus.PRECONDITION_FAILED).\nentity(errors).build();\n}\n\
    }\n```\n\nNote that `ConstraintViolationException`\nis a subclass of `jakarta.validation.ValidationException`.\n\
    \n20. Jakarta EE Concurrency\n\nConcurrency in\nJava enterprise applications cannot\
    \ be achieved the same way as in Java\nSE, where you can use the classes from\
    \ the `java.util.concurrent`\npackage and the `Thread` class and its\naffiliated\
    \ classes. The reason for this difference is because the\ncontainer context data\
    \ does not automatically propagate to manually\ncreated threads, which frequently\
    \ leads to issues with\ncontainer-provided resources. Using threads in Jakarta\
    \ EE’s predecessor,\nJEE, was deprecated until version 8 and developers used to\
    \ abuse JMS for\nmultithreading, which led to large overhead for concurrency\n\
    administration and to bad scalability.\nFortunately with JEE version 7 and of\
    \ course Jakarta EE 8 and later,\nthe situation changed and a dedicated enterprise\
    \ concurrency API was\nadded. This chapter covers Jakarta EE concurrency using\
    \ this API.\n\nPreparing the Jakarta EE Server\nConcurrency services in Jakarta\
    \ EE are services provided\nand managed by the server, so they need to be configured\
    \ using server\nadministrative tools. For your server product, you have to consult\
    \ the\nmanual to learn how to do that.\n\nFor GlassFish,\nenter the web administration\
    \ console at `http://localhost:4848`\nand choose Resources ➤ Concurrent Resources.\
    \ You will see the following\nobjects:\n\n*   **ContextService**: This service\
    \ is responsible\n    for context propagation to the threads created by the other\
    \ services.\n    You normally don’t have to alter this service or create more\
    \ services of\n    this type. The preconfigured default context service is sufficient\
    \ in\n    most cases. An instance of this service type belongs to the `jakarta.enterprise.concurrent.ContextService`\n\
    \    class.\n\n*   **Managed Executor Services:** This service type is most\n\
    \    often used when you need concurrency in Jakarta EE. The preconfigured\n \
    \   default managed executor service called `defaultManagedExecutorService`\n\
    \    can be used as a starting point, and, according to circumstances, your\n\
    \    application might be happy with this one. You need its *Logical JNDI\n  \
    \  Name* (`java:comp/DefaultManagedExecutorService`)\n    in your application.\
    \ An instance of this service type belongs to the\n    `jakarta.enterprise.concurrent.ManagedExecutorService`\n\
    \    class.\n\n*   **Managed Scheduled Executor Services:** Same as\n    above,\
    \ but for scheduled task executions. The\n    *Logical JNDI Name* is `java:comp/DefaultManagedScheduledExecutorService`\n\
    \    and the class name is `jakarta.enterprise.concurrent.ManagedScheduledExecutorService`.\n\
    \n*   **Managed Thread Factory:** This service type is used for\n    thread creation\
    \ with propagated container context. This is more low\n    level compared to the\
    \ other services. You need it if you want to use\n    Java SE concurrency utilities\
    \ in your application. GlassFish provides\n    one preconfigured managed thread\
    \ factory with a logical JNDI name of\n    `java:comp/DefaultManagedThreadFactory`.\n\
    \nUsing a ManagedExecutorService\n\nA managed executor service will be your entry\
    \ point if you need\nhigh-level concurrency in your Jakarta EE application. There\
    \ are two\nways to acquire this service. The more concise method is to inject\
    \ it\nvia the following\n\n```\n@Resource(name=\"java:comp/DefaultManagedExecutorService\"\
    )\nprivate ManagedExecutorService execService;\n```\n\nwhere the resource JNDI\
    \ name depends on the\nserver product; the name shown corresponds to GlassFish’s\
    \ default and\npreconfigured service.\n\nThe second way to acquire a managed executor\
    \ service consists of a JNDI lookup:\n\n```\nManagedExecutorService execService\
    \ =\nInitialContext.\ndoLookup(\"java:comp/DefaultManagedExecutorService\");\n\
    ```\n\nFrom here, you can register `Runnable` or `Callable` tasks to be executed\
    \ in\nthe background:\n\n```\nFuture f1 = execService.submit( () -> {\n// not\
    \ returning anything, corresponds\n// to a Runnable\n...\n}\n);\nFuture f2 = execService.submit(\
    \ () -> {\n// not returning anything, corresponds\n// to a Runnable\n...\n}, 42\
    \ /* calculated outside the task */\n);\nFuture f3 = execService.submit( () ->\
    \ {\n// returning something, corresponds\n// to a Callable\n...\nreturn 42;\n\
    }\n);\n```\n\nOr even create lists of them:\n\n```\nList> retrieverTasks =\nnew\
    \ ArrayList>();\n... fill the list ...\nList> taskResults = execService.\ninvokeAll(retrieverTasks);\n\
    ```\n\nThe `Future`\nobjects you get\nfrom the invocation may then be used to\
    \ wait for the termination of the\nbackground task or tasks:\n\n```\n...\n// waits\
    \ until background task finishes\nf1.get();\n...\n...\n// waits until background\
    \ task finishes\nInteger backgroundRes = f2.get();\n...\n// waits until all background\
    \ tasks finish\nfor (Future taskResult : taskResults) {\ntry {\nInteger ii = taskResult.get();\n\
    // do something with the res...\n} catch (ExecutionException e) {\ne.printStackTrace(System.err);\n\
    }\n}\n```\n\nFor more details about `ManagedExecutorService`\nand for more methods,\
    \ consult the API documentation. The same holds for\n`Future`, which\nis documented\
    \ in the Java SE API documentation.\n\nUsing a ManagedScheduledExecutorService\n\
    \nA managed scheduled executor service is similar to a managed executor\nservice,\
    \ except that you can use it for delayed or repeated executions.\nYou acquire\
    \ the service instance via injection or via JNDI lookup:\n\n```\n@Resource(name=\n\
    \"java:comp/DefaultManagedScheduledExecutorService\")\nprivate ManagedScheduledExecutorService\n\
    schedExecService;\n...or...\nManagedScheduledExecutorService schedExecService\
    \ =\nInitialContext.\ndoLookup(\n\"java:comp/DefaultManagedScheduledExecutorService\"\
    \n);\n```\n\nwhere the JNDI\nname is `server` and it’s\nserver-configuration dependent.\
    \ The name shown here comes from the\npreconfigured default service on GlassFish.\n\
    \nTo schedule a task for delayed\nexecution, you can now write the following:\n\
    \n```\nScheduledFuture sf1 = schedExecService.\nschedule( () -> {\n...\nreturn\
    \ 42;\n}, 5L, TimeUnit.SECONDS);\n// or, if you don't need a result:\nScheduledFuture\
    \ sf2 = schedExecService.\nschedule( () ->\n...\n}, 5L, TimeUnit.SECONDS);\n```\n\
    \nThe returned `ScheduledFuture` object inherits from\n`Future`, so you\ncan use\
    \ it to cancel the execution or retrieve the result:\n\n```\n// In case we want\
    \ to cancel the execution:\nsf1.cancel(true);\n...\n// Wait for the termination.\
    \ The sf2 object comes from\n// a Runnable, so it can return only 'null' and we\
    \ don't\n// care for the result object.\nint res1 = sf1.get();\nsf2.get();\n```\n\
    \nYou can also ask for the remaining timeout value:\n\n```\n...\nif(!sf1.isDone())\
    \ {\nint remainingMillis = sf1.getDelay(\nTimeUnit.MILLISECONDS);\n...\n}\n...\n\
    ```\n\nFor repeated executions, you can specify repetition at a fixed\nrate or\
    \ specify a fixed delay between the end of one execution and the\nbeginning of\
    \ the next one:\n\n```\nint firstDelay = 5;\nint betweenDelay = 2;\nScheduledFuture\
    \ f1 =\nschedExecService.scheduleAtFixedRate(() -> {\n...\n}, firstDelay, betweenDelay,\
    \ TimeUnit.SECONDS);\n...\nScheduledFuture f2 =\nschedExecService.scheduleWithFixedDelay(()\
    \ -> {\n...\n}, firstDelay, betweenDelay, TimeUnit.SECONDS);\n```\n\nCaution\n\
    \nBe careful with `scheduleAtFixedRate()`.\nIf subsequent task executions take\
    \ longer than the delay specified,\nthreads may pile up, eventually breaking your\
    \ server.\n\nA `get()` on\nthe `ScheduledFuture`\nobject returned from the repeated\
    \ execution scheduling will throw an\nexception. It doesn’t make sense to retrieve\
    \ the result from a repeated\nexecution. You can, however, use it to cancel the\
    \ repetition by invoking\nthe `cancel()`\nmethod.\n\nUsing the ManagedThreadFactory\n\
    \nIf you need to go a level deeper and create `Thread` instances\ndirectly inside\
    \ a Jakarta EE application, you can\nacquire a `jakarta.enterprise.concurrent.ManagedThreadFactory`\n\
    \n```\n@Resource(name = \"java:comp/DefaultManagedThreadFactory\")\nprivate ManagedThreadFactory\
    \ threadFactory;\n...or...\nManagedThreadFactory threadFactory =\nInitialContext.\n\
    doLookup(\n\"java:comp/DefaultManagedThreadFactory\"\n);\n```\n\nThe JNDI name\n\
    is `server` and\nit’s server-configuration dependent. The name shown here comes\
    \ from the\npreconfigured default service on GlassFish.\n\nYou can now get a thread\
    \ by calling the corresponding method of that\nservice:\n\n```\n// Thread thr\
    \ = new Thread(); // NO, NOT IN JAKARTA EE!\nThread thr = threadFactory.newThread(\
    \ () -> {\n...\n}\n);\nthr.start();\n```\n\nIt is also possible to use `ManagedThreadFactory`\n\
    at places where a `ThreadFactory` is\nasked for. For example\n\n```\nThreadPoolExecutor\
    \ exec = new ThreadPoolExecutor(\n5, 10, 5, TimeUnit.SECONDS,\nnew ArrayBlockingQueue(10),\n\
    threadFactory);\n```\n\nThis will give you an `ExecutorService` that\nyou can\
    \ then use for concurrency, as described by the Java SE API\ndocumentation.\n\n\
    Enterprise Concurrency and Transactions\nTransactionality, as\ndefined by JTA,\
    \ does not propagate from parents to concurrent tasks. It\nis just too complicated\
    \ to make sure such an automatism works\ncorrectly.\n\nWhat you can do, however,\
    \ is to let the background tasks run in a `UserTransaction`, as\nfollows:\n\n\
    ```\n@Resource(name=\"java:comp/DefaultManagedExecutorService\")\nprivate ManagedExecutorService\
    \ execService;\n@Resource\nprivate UserTransaction ut;\n...\npublic void someMethod()\
    \ {\nFuture f1 = execService.submit( new Runnable() {\npublic void run() {\nut.begin();\n\
    try{\n...\nut.commit();\n}catch(Exception e){\nut.rollback();\n}\n}});\n...\n\
    }\n```\n\n21. Batch Processing\n\nIf you need to perform regularly and automatically\
    \ repeating tasks\nwithout user interaction, but based on data that's fed into\
    \ a database\nor file by an external process, that's called *batch\nprocessing*.\
    \ For example, consider software that collects\nemployee work hours or aggregates\
    \ attendance system data each day at\nmidnight and updates employee records in\
    \ a human resources database.\nWhile the first program consists of a user interface\
    \ in the form of a\nweb application or attendance detection based on cards, badges,\
    \ or\nsomething similar, the aggregation software is a typical candidate for\n\
    batch processing.\nJakarta EE 10 includes a batch processing technology described\
    \ by\nJSR 352\\. It does\n*not* include job scheduling or triggering. To this\
    \ aim, you can\nuse timers, EJBs, or a custom process configured in a `@Singleton\
    \ @Startup`\nannotated bean class. Instead, JSR 352 batch processing is a batch\n\
    programming model, a job specification language, and a batch runtime\nprocess.\
    \ The version of batch processing for Jakarta EE 10 is 2.1.\n\nThis chapter covers\
    \ the Jakarta EE batch processing concepts, without\nintroducing every functionality\
    \ described by JSR 352\\. For more details,\ncheck out the specification at\n\n\
    ```\nhttps://www.jcp.org/en/jsr/detail?id=352\n```\n\nAlso, the JEE 7\nbatch processing\
    \ tutorial at [`https://docs.oracle.com/javaee/7/tutorial/batch-processing.htm#GKJIQ6`](https://docs.oracle.com/javaee/7/tutorial/batch-processing.htm%2523GKJIQ6)\n\
    has valuable information about batch processing, and you can of course\nfind more\
    \ tutorials on the Internet.\n\nBatch Processing Concepts\nBatch\nprocessing describes\
    \ the execution of a number of *batch\njobs*. Each job initially runs on a separate\
    \ thread. A job consists\nof one or more steps, and by default, the steps run\
    \ consecutively on the\njob’s single thread. A step may be *partitioned,* which\
    \ means\nthat its workload will run on separate threads. You can use a\npartitioning\
    \ procedure if the items from the input data can be processed\nindependently of\
    \ each other.\nThere is a distinction between a *chunk* step type, where the\n\
    input items get processed, and a *task* step type, which does not\nsee the individual\
    \ data items but instead is used for initialization,\nlogging, cleanup, or aggregation\
    \ purposes.\nA *flow* is a sequence of steps\nrunning as a unit. It is not possible\
    \ to perform step transitions from\nindividual steps from inside the flow to another\
    \ step outside the flow.\nTransitions can only happen after each flow has finished\
    \ its work. If\nyou want to run several flows in parallel, that's called *split*\n\
    execution. Flows are optional, so you don’t have to use them if you\ndon’t need\
    \ them.\nA job may contain *decision* elements, which means the\nstep-by-step\
    \ workflow may be controlled by decision elements.\n\nPreparing the Server for\
    \ Batch Processing\nTo learn whether or not your Jakarta EE server needs to be\n\
    prepared for batch processing, and how to do this, consult your server\nmanual.\n\
    \nFor the GlassFish server, you need to configure a JDBC resource. This is\nnecessary\
    \ because the server needs a database to store job maintenance\ndata. You can\
    \ administer this resource for GlassFish (version 7) using\nthe `asadmin`\ncommand:\n\
    \n```\n./asadmin create-jdbc-connection-pool \\\n--datasourceclassname \\\norg.apache.derby.jdbc.EmbeddedXADataSource\
    \ \\\n--restype javax.sql.XADataSource \\\n--property portNumber=1527:password=APP:user=APP:\n\
    serverName=localhost:\ndatabaseName=\\$\\{com.sun.aas.instanceRoot\\}/lib/\ndatabases/batchprocessing:\n\
    connectionAttributes=\\;create\\\\=true \\\nMyBatchPool\n```\n\n(Make sure all\
    \ the properties are in one line and the spaces are\nremoved.) This installs an\
    \ embedded Derby database. Derby is included\nwith GlassFish 7, so you don’t have\
    \ to install it. Since it is embedded,\nyou don’t have to start it neither. In\
    \ order to check the connection\npool, actually probing the database, enter the\
    \ following:\n\n```\n./asadmin ping-connection-pool MyBatchPool\n```\n\nIf you\
    \ ever need to remove it, here's how you do that:\n\n```\n./asadmin delete-jdbc-connection-pool\
    \ MyBatchPool\n```\n\nNext you need to configure a JNDI resource to be able to\
    \ address the new\nJDBC pool. Enter the following:\n\n```\n./asadmin create-jdbc-resource\
    \ \\\n--connectionpoolid MyBatchPool jdbc/MyBatchPool\n```\n\nIf you need to delete\
    \ it, write the following:\n\n```\n./asadmin delete-jdbc-resource jdbc/MyBatchPool\n\
    ```\n\nIn order to ensure that the batch processing engine\nuses the new JDBC\
    \ connection, enter the following in a terminal:\n\n```\n./asadmin set-batch-runtime-configuration\
    \ \\\n--datasourcelookupname jdbc/MyBatchPool \\\n--executorservicelookupname\
    \ \\\nconcurrent/__defaultManagedExecutorService\n```\n\nAn Employee Attendance\
    \ Example Batch Processing\n\nAs an example for a batch\nprocessing, consider\
    \ a single file collecting employee attendance\ndata as follows:\n\n```\n162836945,1459763400000,1459774320000\n\
    162836945,1459837380000,1459851300000\n618456945,1459756800000,1459783380000\n\
    ...\n```\n\nThe first column contains social security numbers, then the start\
    \ and\nend times (milliseconds since 1970-01-01 00:00:00 UTC) of an\nattendance.\n\
    \nYou need to write a Jakarta EE enterprise application in form of an EAR\nfile\
    \ with batch processing acting from inside an EJB as follows:\n\n*   In a chunk\
    \ step, read in the lines from the input file using a\n    *reader.*\n\n*   Still\
    \ in the chunk step, process the items and filter out entries\n    with a missing\
    \ SSN (social security number).\n\n*   Still in the chunk step, collect the attendance\
    \ times and\n    aggregate them for each employee.\n\n*   In a subsequent task\
    \ step, perform any cleanup activities. The\n    input file gets a `.bak` suffix,\
    \ and\n    empty output folders are possibly deleted.\n\nFor simplicity, this\
    \ example doesn’t use a database or write\neverything into a file system folder,\
    \ one file per SSN. In a production\nsetup, you would probably enhance this and\
    \ write everything into a\ndatabase. Also, the input could as well come from a\
    \ database instead of\na file.\n\nFile access in GlassFish is restricted\nby global\
    \ permissions. In order for this batch processing application to\nwork, edit the\
    \ `GLASSFISH_INST/glassfish/domains/domain1/config/server.policy`\nfile and add\
    \ this to the end:\n\n```\ngrant {\npermission java.io.FilePermission\n\">\",\
    \ \"write,read,delete\";\n};\n```\n\nStarting a Batch Processing EAR Project\n\
    \nInside Eclipse, create a new Gradle project. Replace\nthe contents of the `build.gradle`\
    \ with the\nfollowing:\n\n```\nplugins {\nid 'ear'\n}\n// !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!\n\
    // Use the deloyEar task to compile and assemble all and\n// upload it to GlassFish\n\
    // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!\nrepositories {\njcenter()\n\
    }\ndependencies {\ndeploy project(path: ':Batch-Ejb',\nconfiguration: 'archives')\n\
    // The following dependencies will become EAR libs and\n// will be placed in a\
    \ dir configured via the libDirName\n// property\n// earlib group: 'log4j', name:\
    \ 'log4j',\n//     version: '1.2.15', ext: 'jar'\n// earlib 'org.apache.commons:commons-configuration2:2.6'\n\
    }\near {\n//  EAR plugin configuration, if necessary\n}\ntask deployEar(dependsOn:\
    \ ear,\ndescription:\">>> BATCH deploy task\") {\ndoLast {\ndef FS = File.separator\n\
    def glassfish =\nproject.properties['glassfish.inst.dir']\ndef user = project.properties['glassfish.user']\n\
    def passwd = project.properties['glassfish.passwd']\nFile temp = File.createTempFile(\"\
    asadmin-passwd\",\n\".tmp\")\ntemp  ${sout}\"\nif(serr.toString()) System.err.println(serr)\n\
    temp.delete()\n}\n}\ntask undeployEar(\ndescription:\">>> BATCH undeploy task\"\
    ) {\ndoLast {\ndef FS = File.separator\ndef glassfish =\nproject.properties['glassfish.inst.dir']\n\
    def user = project.properties['glassfish.user']\ndef passwd = project.properties['glassfish.passwd']\n\
    File temp = File.createTempFile(\"asadmin-passwd\",\n\".tmp\")\ntemp  ${sout}\"\
    \nif(serr.toString()) System.err.println(serr)\ntemp.delete()\n}\n}\n```\n\nInside\
    \ the `settings.gradle` file,\nadd one line for the EJB\nsubproject:\n\n```\n\
    include 'Batch-Ejb'\n```\n\nTo connect to the local GlassFish server, add the\
    \ `gradle.properties`\nfile in the\nproject root and let it read as follows:\n\
    \n```\nglassfish.inst.dir = /glassfish/inst/dir\nglassfish.user = admin\nglassfish.passwd\
    \ =\n```\n\nwhere the `user` and the empty\npassword correspond to a vanilla GlassFish\
    \ installation.\nOf course, you must provide your own local GlassFish installation\
    \ folder\nas a value for the first property.\n\nFor the subproject, create a folder\
    \ called `Batch-Ejb`,\nsituated as a child to the main project folder. Copy `gradlew`\
    \ and `gradlew.bat` and the\ncomplete `gradle`\nfolder into `Batch-Ejb`. This\n\
    allows you to build the EJB JAR from inside a terminal using the Gradle\nwrapper\
    \ script. Also inside `Batch-Ejb`, create a\nfile called `build.gradle`\nand let\
    \ it read as follows:\n\n```\nplugins {\nid 'java'\n}\nsourceCompatibility = 1.17\n\
    targetCompatibility = 1.17\nrepositories {\njcenter()\n}\ndependencies {\ntestImplementation\
    \ 'junit:junit:4.13.2'\ncompileOnly 'jakarta.platform:jakarta.jakartaee-api:10.0.0'\n\
    }\n```\n\nYou can now right-mouse-click (the root project) and then choose Gradle\n\
    → Refresh Gradle Project. Eclipse will henceforth show two projects in\nthe Package\
    \ Explorer\nview, as shown in Figure [21-1](#490565_1_En_21_Chapter.xhtml#Fig1).\
    \ Finally, add\nthe following folders inside the `Batch-Ejb`\nsubproject:\n\n\
    ```\nsrc/main/java\nsrc/main/resources/META-INF\n```\n\nMake sure Eclipse recognizes\
    \ the first one as a source folder (use\nproject properties for that).\n\n![](images/490565_1_En_21_Chapter/490565_1_En_21_Fig1_HTML.jpg)\n\
    \nA window of package explorer displays batch projects such as bin,\nbuild, and\
    \ s r c, batch E j b, and different subprojects.\n\nFigure 21-1\nBatch project\
    \ and subproject\n\nNote\n\nDespite being shown as two separate projects in Eclipse,\
    \ the\nseparation into main project and subproject (in a subfolder) still\nholds.\n\
    \nExample Data Preparation\nYou can use any suitable folder on your file system\
    \ as the example\ndata for the\nemployee attendance batch processing application.\
    \ The following sections\ncall this folder `DATA_FOLDER`.\n\nCreate an input file\
    \ called `DATA_FOLDER/attendance.csv`\nand let it read as follows:\n\n```\n162836945,1459763400000,1459774320000\n\
    162836945,1459837380000,1459851300000\n618456945,1459756800000,1459783380000\n\
    ```\n\nThe columns are Social Security Number, Work Begin\nTime, and Work End\
    \ Time (in milliseconds since 1970-01-01 00:00:00\nUTC).\n\nJob Definition File\n\
    \nThe job definition\nfile is\nthe main configuration file of the batch processing\
    \ application. It is\ncalled `myJobName.xml` and\nit's in this folder of the `Batch-Ejb`\
    \ subproject:\n\n```\nsrc/main/resources/META-INF/batch-jobs\n```\n\nInstead of\
    \ `myJobName`, you can\nuse a different name for the job definition file, but\
    \ you cannot change\nthe `.xml`\nsuffix.\n\nCreate the file and let its contents\
    \ read as follows:\n\nYou can see that this example defined two properties for\
    \ the input\nfile and the output files. You can later use these properties from\n\
    inside the coding. One chunk type step is for reading, processing, and\nwriting\
    \ the processed data, and the other task step is for cleaning\nup.\n*Checkpoints*\
    \ define points in the\nprocessing that can be restarted after a planned or unplanned\
    \ processing\ninterruption. You can allow at maximum of ten chunk items to be\
    \ re-read\nif something happens.\nThe various `ref` attributes refer\nto the CDI\
    \ `@Named` classes.\n\nBatch Processing Scheduling\n\nYou can use a timer EJB\
    \ to schedule batch processing.\nCreate any class inside the `Batch-Ejb` project\
    \ and\nlet it read as follows:\n\n```\npackage book.jakartapro.batch;\nimport\
    \ java.util.Properties;\nimport jakarta.batch.operations.JobOperator;\nimport\
    \ jakarta.batch.runtime.BatchRuntime;\nimport jakarta.ejb.Schedule;\nimport jakarta.ejb.Stateless;\n\
    @Stateless\npublic class BatchEjb {\n@Schedule(\n// for development and testing,\
    \ we start the\n// job each 10 seconds\nhour = \"*\",\nminute = \"*\",\nsecond\
    \ = \"*/10\",\npersistent = false)\npublic void timeout() {\ntry {\nJobOperator\
    \ jobOperator =\nBatchRuntime.getJobOperator();\n// Just in case we want to programmatically\
    \ add\n// a property\nProperties props = new Properties();\nprops.setProperty(\"\
    parameter1\", \"value1\");\n// The \"job1\" corresponds to the name of\n// the\
    \ job definition file (without the .xml)\n// inside META-INF/batch-jobs\nlong\
    \ execID = jobOperator.start(\"job1\", props);\n} catch (Exception e) {\ne.printStackTrace(System.err);\n\
    ...\n}\n}\n}\n```\n\nThe class name and position (package) is up to you. Jakarta\
    \ knows\nthis is a timer EJB just by the `@Schedule`\nannotation.\n\nBatch Processing\
    \ Java Artifacts\n\nThe various `ref`\nattributes inside the job definition file\
    \ correspond to the following\nclasses. First, define a class that holds an\n\
    input item:\n\n```\npackage book.jakartapro.batch;\nimport java.io.Serializable;\n\
    public class AttendanceItem implements Serializable {\nprivate static final long\
    \ serialVersionUID =\n2413741734728319063L;\nprivate String ssn; // + getters/setters\n\
    private int workMillis; // + getters/setters\npublic AttendanceItem(String ssn,\
    \ int workMillis) {\nthis.ssn = ssn;\nthis.workMillis = workMillis;\n}\n}\n```\n\
    \nNext, implement the reader in the chunk\nstep:\n\n```\npackage book.jakartapro.batch;\n\
    import java.io.*;\nimport java.util.Properties;\nimport jakarta.batch.api.chunk.ItemReader;\n\
    import jakarta.batch.runtime.context.JobContext;\nimport jakarta.enterprise.context.Dependent;\n\
    import jakarta.inject.Inject;\nimport jakarta.inject.Named;\n@Dependent\n@Named(\"\
    AttendanceReader\")\npublic class AttendanceReader implements ItemReader {\nprivate\
    \ Integer lineNumber = 0;\nprivate String fileName;\nprivate InputStream ins;\n\
    private BufferedReader breader;\n@Inject\nprivate JobContext jobCtx;\npublic AttendanceReader()\
    \ {\n}\n@Override\npublic void open(Serializable checkpoint)\nthrows Exception\
    \ {\nProperties props = jobCtx.getProperties();\nfileName = props.getProperty(\"\
    input_file\");\nSystem.out.println(\"open file \" + fileName);\nif (new File(fileName).exists())\
    \ {\nins = new FileInputStream(fileName);\nbreader = new BufferedReader(\nnew\
    \ InputStreamReader(ins));\nif (checkpoint != null) {\nlineNumber = (Integer)\
    \ checkpoint;\nfor (int i = 0; i  0) {\nString ssn = fields[0].trim();\nlong tm\
    \ = Long.parseLong(fields[2]) -\nLong.parseLong(fields[1]);\nAttendanceItem itemObj\
    \ =\nnew AttendanceItem(ssn, (int) tm);\nresult = itemObj;\n}\nlineNumber++;\n\
    }\nreturn result;\n}\n@Override\npublic Serializable checkpointInfo() throws Exception\
    \ {\nreturn lineNumber;\n}\n}\n```\n\nBecause of the `@Named(\"AttendanceReader\"\
    )`,\nthe batch processing engine knows that this class is meant when the name\n\
    `AttendanceReader`\nis referred to in the job definition file. The injection of\
    \ the `JobContext` allows you\nto address the properties defined in that file.\
    \ Inside the `open()` method, you\nopen the input file. If its `checkpoint` parameter\n\
    is not `null`,\nyou wind the input file to the last line defined by the checkpoint\
    \ info\nmethod at the end of the class. Inside `readItem()`,build and\nreturn\
    \ an `AttendanceItem`\nobject. Subsequent processor steps get exactly this object.\n\
    \nAs such a processor, define a class that filters out items with missing\nSSNs:\n\
    \n```\npackage book.jakartapro.batch;\nimport jakarta.batch.api.chunk.ItemProcessor;\n\
    import jakarta.enterprise.context.Dependent;\nimport jakarta.inject.Named;\n@Dependent\n\
    @Named(\"AttendanceProcessor\")\npublic class AttendanceProcessor implements ItemProcessor\
    \ {\n@Override\npublic Object processItem(Object item) throws Exception {\n//\
    \ Use this to convert an object, or return null to\n// exclude objects\nAttendanceItem\
    \ itm = (AttendanceItem) item;\nif(itm.getSsn() == null ||\nitm.getSsn().trim().isEmpty())\
    \ return null;\nreturn item;\n}\n}\n```\n\nA writer class implements `jakarta.batch.api.chunk.ItemWriter`\n\
    and, in its `writeItems()` method, gets a list of\nitems that are passed. You\
    \ can use it to create or update a per-employee\nfile summing each employee’s\
    \ workload:\n\n```\npackage book.jakartapro.batch;\nimport java.io.File;\nimport\
    \ java.io.FileWriter;\nimport java.io.Serializable;\nimport java.util.List;\n\
    import java.util.Properties;\nimport java.util.Scanner;\nimport jakarta.batch.api.chunk.ItemWriter;\n\
    import jakarta.batch.runtime.context.JobContext;\nimport jakarta.enterprise.context.Dependent;\n\
    import jakarta.inject.Inject;\nimport jakarta.inject.Named;\n@Dependent\n@Named(\"\
    AttendanceWriter\")\npublic class AttendanceWriter implements ItemWriter {\nprivate\
    \ String outputDir;\n@Inject\nprivate JobContext jobCtx;\n@Override\npublic void\
    \ open(Serializable checkpoint)\nthrows Exception {\nProperties props = jobCtx.getProperties();\n\
    outputDir = props.getProperty(\"output_folder\") +\nFile.separator + jobCtx.getExecutionId();\n\
    if(checkpoint == null) {\n// first start\nnew File(outputDir).mkdirs();\n} else\
    \ {\n// restart\n}\n}\n@Override\npublic void close() throws Exception {\n}\n\
    @Override\npublic void writeItems(List items)\nthrows Exception {\nfor(Object\
    \ o : items) {\nAttendanceItem itm = (AttendanceItem) o;\nString ssn = itm.getSsn().trim();\n\
    long millis = itm.getWorkMillis();\nFile f = new File(outputDir + File.separator\
    \ + ssn);\nlong tm = 0L;\nif(f.exists()) {\n// The following line is just a simple\
    \ trick\n// to read in the contents of a file.\ntry(Scanner s = new Scanner(f).\n\
    useDelimiter(\"\\\\Z\")) {\ntm = Long.parseLong(s.next().trim());\n}\n}\ntm +=\
    \ millis;\nf.delete();\nFileWriter fw = new FileWriter(f);\nfw.append(tm + \"\\\
    n\");\nfw.flush();\nfw.close();\n}\n}\n@Override\npublic Serializable checkpointInfo()\
    \ throws Exception {\nreturn null;\n}\n}\n```\n\nThe number of items passed to\
    \ `writeItems()`\ncorresponds to the `item-count` attribute that's used\nto define\
    \ the item's extent between checkpoints.\n\nThe last step is a task\ntype step.\
    \ It backs up the input file and removes empty output\nfolders:\n\n```\npackage\
    \ book.jakartapro.batch;\nimport java.io.File;\nimport java.util.Properties;\n\
    import jakarta.batch.api.AbstractBatchlet;\nimport jakarta.batch.runtime.context.JobContext;\n\
    import jakarta.enterprise.context.Dependent;\nimport jakarta.inject.Inject;\n\
    import jakarta.inject.Named;\n@Dependent\n@Named(\"Cleanup\")\npublic class Cleanup\
    \ extends AbstractBatchlet {\n@Inject\nprivate JobContext jobCtx;\n@Override\n\
    public String process() throws Exception {\nbackupInput();\nremoveEmptyOutputDirs();\n\
    return \"COMPLETED\"; // \"FAILED\"\n}\nprivate void removeEmptyOutputDirs() {\n\
    Properties props = jobCtx.getProperties();\nString outputDir = props.getProperty(\"\
    output_folder\") +\nFile.separator + jobCtx.getExecutionId();\nif(new File(outputDir).list().length\
    \ == 0)\nnew File(outputDir).delete();\n}\nprivate void backupInput() {\nProperties\
    \ props = jobCtx.getProperties();\nString fileName = props.getProperty(\"input_file\"\
    );\nString bakName = fileName + \".bak\" +\nSystem.currentTimeMillis();\nnew File(fileName).renameTo(new\
    \ File(bakName));\n}\n}\n```\n\nBuilding and Deploying the Application\n\nIn order\
    \ to build and deploy the example application, invoke the\nGradle `deployEar`\
    \ task. You\ncan either do that from inside Eclipse in the Gradle Tasks view (make\n\
    sure you checked Show All Tasks in the view’s menu), or in a terminal\nusing the\
    \ Gradle wrapper, type the following:\n\n```\ncd path/to/root/project\n./gradlew\
    \ deployEar\n```\n\nPart IVUseful Supporting Technologies\n\n22. XML Binding\n\
    \nXML binding in\nJava relates to a Java object tree, which is a set of Java objects\n\
    connected via class member relations, with XML documents. The technology\nbehind\
    \ the XML binding is called JAXB (Java XML Binding), and for\nJakarta EE 10, the\
    \ JAXB specification is in version number 4.0.\n\nCaution\n\nUntil Java version\
    \ 11, the JAXB technology was part of Java SE.\nBeginning with Java 11, JAXB libraries\
    \ have to be added explicitly in\norder for JAXB to work correctly. Since JAXB\
    \ is part of any Jakarta EE\nserver, you don’t have to do this yourself.\n\nWhy\
    \ JAXB Is So Complicated\n\nAt first sight, it should be easy to convert an XML\
    \ document into a Java\nobject tree and vice versa. For example, consider a music\
    \ record library\nas an XML document:\n\n```\n\nwav\nclassics\nJ.S. Bach\nMass\
    \ in B-flat Minor\nH. Masters\n\nmp3\nrock\nG. Jung\nButterflies\nB. Hoyden\n\n\
    ```\n\nHere are the Java classes:\n\n```\npublic class Catalog {\nprivate List\
    \ records;\n// Getters and setters...\n}\npublic class Record {\nprivate long\
    \ id;\nprivate String typ;\nprivate int make;\nprivate String fileType;\nprivate\
    \ String genre;\nprivate String composer;\nprivate String title;\nprivate String\
    \ performer;\n// Getters and setters...\n}\n```\n\nThe challenges for a conversion\
    \ engine are as follows:\n\n*   If you’re converting from Java to XML, you must\
    \ decide which\n    values go as elements, and which values go as attributes.\
    \ This must be\n    specified.\n\n*   From a Java perspective it is possible,\
    \ although probably not\n    advisable, to add a field to a record that points\
    \ to the parent: `public class Record { ... private Catalog catalog; ... }`. A\
    \ naive conversion to XML in this\n    case would introduce an infinite regression:\
    \ A record pointing to the\n    catalog, the catalog pointing to all records,\
    \ each record again pointing\n    to the parent catalog, and so on, forever. There\
    \ must be a way to avoid\n    this.\n\n*   In XML, you would write `<record ...\
    \ make = \"unknown\" >`. When converting to the corresponding integer\n    field,\
    \ this would lead to an error. There must be a way to ensure type\n    safety\
    \ or impose other pattern constraints to XML values.\n\n*   Although not used\
    \ in this simple example, there must be a common understanding as\n    to how\
    \ more complex basic types like dates and byte arrays will be\n    converted.\n\
    \n*   If names cannot match, you must be able to translate names during\n    conversion.\
    \ The example uses `type` in XML and `typ` for the\n    corresponding field in\
    \ Java.\n\nWriting a Java Object Tree as XML\nThis process, usually called *marshalling*,\
    \ is\nhandled by Java classes marked with annotations and a JAXB processing\n\
    engine you get from factories inside the `jakarta.xml.bind`\npackage.\n\nThe annotations\n\
    you can use for XML binding are numerous. You can see the complete list\nand all\
    \ detailed descriptions if you look at the `jakarta.xml.bind.annotation`\npackage:\n\
    \n```\nhttps://docs.oracle.com/javase/8/docs/api/\njavax/xml/bind/annotation/package-frame.html\n\
    ```\n\nFor this simple music catalog, use the following annotations:\n\n*   `@XmlRootElement`:\
    \ Add\n    this as an annotation to the class building the root of the object\
    \ tree.\n    You can also define a namespace for the resulting XML element (including\n\
    \    the child hierarchy).\n\n*   `@XmlAccessorType`:\n    This annotation allows\
    \ you to specify how the class defines its data\n    members. For simple cases,\
    \ you can indicate that fields should be\n    considered for conversions.\n\n\
    *   `@XmlTransient`: Use\n    this annotation to mark fields that have to be skipped\
    \ for the\n    conversion.\n\n*   `@XmlElement`: If you\n    don’t specify field\
    \ access as `@XmlAccessorType`, or\n    if you need to explicitly specify an XML\
    \ element name, you can use this\n    annotation to mark and configure a field\
    \ for conversion.\n\n*   `@XmlAttribute`: If\n    you want a field\n    to end\
    \ up as an attribute and not as an XML element, use this annotation\n    at the\
    \ field level.\n\n*   `@XmlElementWrapper`:\n    For collections, specify the\
    \ corresponding XML container element using\n    this annotation. Usually, you\
    \ also add an `@XmlElement`\n    annotation to specify how the child elements\
    \ are named.\n\nFor this music catalog example, change the `Catalog` type to the\
    \ following:\n\n```\npackage book.jakartapro.xmlbinding;\nimport java.util.List;\n\
    import jakarta.xml.bind.annotation.*;\n@XmlRootElement(namespace = \"http://book.jakartapro.catalog\"\
    )\n@XmlAccessorType(XmlAccessType.FIELD)\npublic class Catalog {\n@XmlElementWrapper(name\
    \ = \"recordList\")\n@XmlElement(name = \"record\")\nprivate List records;\n//\
    \ Getters and setters...\n}\n```\n\nYou can see that all fields, here it is just\
    \ `records`, will be\nconverted to XML elements. The catalog is marked as the\
    \ root element,\nthe collection is called `recordList`,\nand its elements are\
    \ called `record`.\n\nThe accordingly adapted `Record` class reads as follows:\n\
    \n```\npackage book.jakartapro.xmlbinding;\nimport jakarta.xml.bind.annotation.*;\n\
    @XmlAccessorType(XmlAccessType.FIELD)\npublic class Record {\n@XmlAttribute private\
    \ long id;\n@XmlAttribute(name = \"type\") private String typ;\n@XmlAttribute\
    \ private int make;\nprivate String fileType;\nprivate String genre;\nprivate\
    \ String composer;\nprivate String title;\nprivate String performer;\n// Getters\
    \ and setters...\n}\n```\n\nThis example uses `@XmlAttribute`\nto mark fields\
    \ that you want to go to attributes instead of elements.\nAll the other fields\
    \ are automatically transformed to XML elements by\nvirtue of the `@XmlAccessorType`\n\
    annotation.\n\nFor the conversion itself, you use a `JAXBContext.newInstance()`\n\
    call and then create a marshaller (exception\nhandling omitted):\n\n```\nList\
    \ records = new ArrayList();\nRecord r1 = new Record();\nr1.setId(173658);\nr1.setTyp(\"\
    cd\");\nr1.setMake(1733);\nr1.setFileType(\"wav\");\nr1.setGenre(\"classics\"\
    );\nr1.setComposer(\"J.S. Bach\");\nr1.setTitle(\"Mass in B-flat Minor\");\nr1.setPerformer(\"\
    H. Masters\");\nRecord r2 = new Record();\nr2.setId(1734536);\nr2.setTyp(\"usb\"\
    );\nr2.setMake(2001);\nr2.setFileType(\"mp3\");\nr2.setGenre(\"rock\");\nr2.setComposer(\"\
    G. Jung\");\nr2.setTitle(\"Butterflies\");\nr2.setPerformer(\"B. Hoyden\");\n\
    records.add(r1);\nrecords.add(r2);\nCatalog cat = new Catalog();\ncat.setRecords(records);\n\
    JAXBContext context = JAXBContext.newInstance(\nCatalog.class);\nMarshaller m\
    \ = context.createMarshaller();\nm.setProperty(Marshaller.JAXB_FORMATTED_OUTPUT,\n\
    Boolean.TRUE);\n// Write to System.out\nm.marshal(cat, System.out);\n// Write\
    \ to File\n//m.marshal(cat, new File(\"catalog.xml\"));\n```\n\nBecause of the\
    \ `JAXB_FORMATTED_OUTPUT`\nproperty, you\nwill get nicely formatted output, and\
    \ the `marshal()` method call\nactually performs the transformation. The output\
    \ of this sample\nprogram looks like this:\n\n```\n\nwav\nclassics\nJ.S. Bach\n\
    Mass in B-flat Minor\nH. Masters\n\nmp3\nrock\nG. Jung\nButterflies\nB. Hoyden\n\
    \n```\n\nAdding a Schema\nIn the preceding section, the XML document you retrieved\
    \ did not have\na schema\nassociated with it. XML schemas are not introduced detail\
    \ here, but I at\nleast want to give you a couple of hints for how to include\
    \ them.\n\nTo include a reference to a schema in the generated XML, add one of\
    \ the\nfollowing to the marshaller:\n\n```\nm.setProperty(\nMarshaller.JAXB_SCHEMA_LOCATION,\n\
    \"http://some.server/catalog.xsd\");\n// or, if the schema does not specify a\
    \ namespace\nm.setProperty(\nMarshaller.JAXB_NO_NAMESPACE_SCHEMA_LOCATION,\n\"\
    http://some.server/catalog.xsd\");\n```\n\nIn order to validate the generated\
    \ XML against an XSD schema file,\nyou have to first generate a schema file and\
    \ then add it to the\nmarshaller.\n\nThe schema file can be generated manually\
    \ using the XML Schema\nspecification, or you can use a tool. Eclipse and other\
    \ IDEs provide\nschema generators. The one from Eclipse can be accessed via File\
    \ ➤New ➤\nOther... ➤JAXB ➤ Schema from JAXB Classes. Or you can use the Apache\n\
    tool called XMLBeans for this purpose. For this catalog, a schema file\nwould\
    \ read as follows:\n\nTo add validation to the code, change the code to read as\
    \ follows:\n\n```\n... [same as above]\nrecords.add(r1);\nrecords.add(r2);\nSchemaFactory\
    \ sf = SchemaFactory.newInstance(\n\"http://www.w3.org/2001/XMLSchema\");\nSchema\
    \ schem = sf.newSchema(new File(\"Catalog.xsd\"));\nCatalog cat = new Catalog();\n\
    cat.setRecords(records);\nJAXBContext context =\nJAXBContext.newInstance(Catalog.class);\n\
    Marshaller m = context.createMarshaller();\nm.setSchema(schem);  // <==== NEW!\
    \ ====\n... [same as above]\n```\n\nOf course,`... new File() ...` must be changed\
    \ to point to your schema file. If you\nstart the application, the\ngenerated\
    \ XML will be validated against the schema file you\nprovided.\n\nNote\n\nFor\
    \ this to work in a non-Jakarta EE environment, a JAXP\nimplementation must be\
    \ added to the classpath. One candidate is the\nXerces library, for example, added\
    \ via the Maven dependency artifact\n`= \"xercesImpl\", group = \"xerces\", version\
    \ = \"2.12.1\"`.\n\nTransforming from XML to Java\n\nFor the opposite operation,\
    \ transforming XML to a Java object tree, the\nprocedure is very similar. You\
    \ use `JAXBContext` and\ncreate an unmarshaller from it. For the music records\
    \ example, this\nprocess reads as follows:\n\n```\nString xml = \"\"\"\n\nwav\n\
    classics\nJ.S. Bach\nMass in B-flat Minor\nH. Masters\n\nmp3\nrock\nG. Jung\n\
    Butterflies\nB. Hoyden\n\n\"\"\";\nJAXBContext context = JAXBContext.\nnewInstance(Catalog.class);\n\
    Unmarshaller um = context.createUnmarshaller();\nByteArrayInputStream bis =\n\
    new ByteArrayInputStream(xml.getBytes());\nObject o = um.unmarshal(bis);\nSystem.out.println(o.getClass());\n\
    Catalog c = (Catalog) o;\nSystem.out.println(c.getRecords().size());\nSystem.out.println(c.getRecords().get(0).getComposer());\n\
    ```\n\nIn order to add a schema validation, all you have to do is write the\n\
    following:\n\n```\nSchemaFactory sf = SchemaFactory\n.newInstance(\"http://www.w3.org/2001/XMLSchema\"\
    );\nSchema schem = sf.newSchema(new File(\"NewXMLSchema2.xsd\"));\n...\nJAXBContext\
    \ context = JAXBContext.\nnewInstance(Catalog.class);\nUnmarshaller um = context.createUnmarshaller();\n\
    um.setSchema(schem);\n...\n```\n\nAgain, use a version of `.newSchema()` that\n\
    suits your needs.\n\nGenerating Java Classes from Schemas\nIf you start development\
    \ given an XSD file, and you want Java\nclasses to be generated automatically,\
    \ you can use IDE functionalities.\nIn Eclipse, choose File ➤ New ➤ Other... ➤\
    \ JAXB ➤ Schema from JAXB\nClasses. Or you can use a command-line utility like\
    \ `scomp` from the Apache\nXMLBeans project.\n\nThe Eclipse XML/XSD tools seem\
    \ to have problems with some JRE versions.\nTherefore, take a closer look at the\
    \ Apache XMLBeans toolset. Download\nXMLBeans from [`https://xmlbeans.apache.org`](https://xmlbeans.apache.org).\n\
    Then run the following in a shell:\n\n```"
