    根据所使用的库不同，日志记录器也可以配置为将日志数据发送到其他目标，例如数据库或消息队列。然而，如果你考虑可靠性，让日志记录器写入文件是最稳定的选择。毕竟，文件系统的访问由操作系统提供，无需网络运行或在服务器上启动额外进程即可进行日志记录。因此，将日志写入文件是迄今为止最常用的方法。


    超越单个应用服务器，从更广泛的企业视角来看，收集日志数据的需求随之产生。这简化了服务器维护，并帮助运维人员高效完成工作。为此，可以使用日志数据收集器。它们作为一种架构组件，能够从多个来源收集和聚合日志信息。经过一些可选的过滤和转换操作后，日志数据可以被转发到不同的目标，例如文件、数据库、监控应用、消息系统等。收集和聚合日志数据并非
    Jakarta EE 规范的一部分。尽管如此，该主题被认为足够重要，因此本章将讨论 Fluentd 日志数据收集器。还有类似的产品，例如 Logstash、Logagent、Filebeat、Rsyslog
    等，但我喜欢 Fluentd 配置日志管道的声明式方式。此外，Fluentd 在其内部处理中使用 JSON 作为消息格式，并将其作为专用输出格式。这使得在消费日志信息的企业中心组件中进一步处理日志数据变得容易。


    安装 Fluentd


    Fluentd 可以安装在 Linux、Windows 和 macOS 上。在实际安装 Fluentd 之前，手册建议执行一些预安装步骤：


    1.  设置 NTP 守护进程以获得准确的时间戳。

    2.  将最大文件描述符数量增加到 65535（Linux）。

    3.  优化网络内核参数（Linux）。


    详情请参阅 [`https://docs.fluentd.org/`](https://docs.fluentd.org/) 上的文档。


    注意


    出于测试目的，你无需执行任何这些准备步骤。


    安装选项如下：


    *   对于 Windows，有 MSI 安装程序。

    *   对于 Mac，有 DMG 包。

    *   对于 Linux，有 RPM（Red Hat）或 DEB（Debian/Ubuntu）包。

    *   如果你的系统上安装了 Ruby，可以使用 `gem` 安装 Fluentd。

    *   你可以从源代码编译 Fluentd。


    [`https://docs.fluentd.org/installation`](https://docs.fluentd.org/installation)
    上的页面提供了更多详细信息。

    Fluentd 进程可以作为命令或操作系统服务运行。为简单起见，本章其余部分假设使用 `fluentd` 命令启动 Fluentd。


    运行 Fluentd


    为了确定 Fluentd 是否正常运行，你必须首先在某处创建一个空文件夹，并让 Fluentd 在其中创建基本配置：


    ```


    # 终端 1

    mkdir fluentd

    fluentd --setup ./fluent

    ```


    注意


    此操作适用于 Linux。对于 Windows 或 macOS，请使用相应的命令语法。


    在另一个终端中，启动 Fluentd 并让其作为前台进程运行：


    ```'
- fmt: "# terminal 2\n\n```\ncd fluentd\nfluentd -c fluent.conf -v\n```\n\nBack in\
    \ terminal 1, send input to the Fluentd process and check its output:\n\n```\n\
    echo '{\"json\":\"message\"}' | fluent-cat debug.test\n```\n\nIn terminal 2, you\
    \ should now see something like this:\n\n```\n2022-03-27 10:10:22.741302646 +0200\
    \ debug.test:\n{\"json\":\"message\"}\n```\n\nIn `fluentd -c fluent.conf`, you\
    \ tell Fluentd to use `fluent.conf` as a configuration file. This is where the\
    \ internal routing and transformation of logging messages are defined. If you\
    \ change the configuration, you must restart the process (press Ctrl+C, then enter\
    \ `fluentd -c fluent.conf -v` again). Of course, for your own experiments, you\
    \ can use your own configuration files. Omit the `-v` flag if you want less verbose\
    \ debugging output.\n\n## Using Logfiles as Input\n\nIn Fluentd, input is handled\
    \ by *input plugins*. You specify them in these sections in the configuration\
    \ file:\n\n```\n<source>\n  ...\n</source>\n```\n\nThere are many types of input\
    \ plugins, but for the purposes here, the most important plugin is the Tail plugin,\
    \ which observes the lines added to a file. Here is a working example configuration\
    \ using a logfile as input:\n\n```\n<source>\n  @type tail\n  path /path/to/server.log\n\
    \  pos_file server.log.pos\n  tag serv.log\n  <parse>\n    @type regexp\n    expression\
    \ \\\n      /^\\[(?<logtime>[^\\]]*)\\] \\\n      (?<level>[^ ]*) \\\n      (?<name>[^\
    \ ]*) (?<title>.*)$/\n    time_key logtime\n    time_format %Y-%m-%d %H:%M:%S\
    \ %z\n  </parse>\n</source>\n\n<match serv.log>\n  @type stdout\n  @id stdout_output\n\
    </match>\n```\n\n(Remove the tailing `\\` characters, including the line breaks\
    \ and immediately following whitespace characters.) Because of the format specification\
    \ inside `<parse> ... </parse>`, the Tail plugin can handle input lines like these:\n\
    \n```\n[2022-02-28 12:00:00 +0900] error\nbook.jakartapro.TheClass Invalid integer\
    \ 42\n```\n\nThe `<match> ... </match>` tag designates an output plugin. For now,\
    \ it just prints the logging record to `STDOUT`. You can save this configuration,\
    \ for example, as the `conf1.conf` file, kill the Fluentd process via Ctrl+C,\
    \ and restart it via `fluentd -c conf1.conf -v`.\n\nFor a simple test, replace\
    \ the `path ...` line with `path server.log`, restart Fluentd, and send a few\
    \ test lines to the `server.log` file in the current directory:\n\n```\ndate=`date\
    \ +%F' '%T' '%z`\necho \"[${date}] error book.jakartapro.TheClass \" \\\n\"Invalid\
    \ integer 42\" >> server.log\necho \"[${date}] warn book.jakartapro.TheClass \"\
    \ \\\n\"String length > 64\" >> server.log\n```\n\nThe output should show something\
    \ like this:\n\n```\n2022-03-28 10:55:29.000000000 +0200 serv.log:\n{\"level\"\
    :\"error\",\"name\":\"book.jakartapro.TheClass\",\n\"title\":\"Invalid integer\
    \ 42\"}\n2022-03-28 10:55:29.000000000 +0200 serv.log:\n{\"level\":\"warn\",\"\
    name\":\"book.jakartapro.TheClass\",\n\"title\":\"String length > 64\"}\n```\n\
    \nTo give you a better idea about how this setup works, let's investigate all\
    \ directives inside `<source> ... </source>`, step-by-step:\n\n* `@type tail`\n\
    \n  Addresses the *Tail* plugin.\n\n* `path /path/to/server.log`\n\n  Specifies\
    \ the path to the observed logfile. May contain wildcards, which allow you to\
    \ observe folders with rolling logfiles.\n\n* `pos_file server.log.pos`\n\n  The\
    \ Tail plugin needs this file to save its current state. Give it any name you\
    \ like.\n\n* `tag serv.log`\n\n  Fluentd adds a tag to message records. This line\
    \ instructs Fluentd to mark messages from the Tail plugin with `serv.log`. Tags\
    \ are important, because they are used as discriminators for filters and transformers,\
    \ and they determine which output plugin is used.\n\n* `@type regexp`\n\n  (Inside\
    \ `<parse>...</parse>`.) Uses a regular expression to split each logging line\
    \ into parts. Other types are described in the plugin's documentation.\n\n* `expression\
    \ ...`\n\n  (Inside `<parse>...</parse>`.) Specifies the regular expression.\n\
    \n* `time_key logtime`\n\n  (Inside `<parse>...</parse>`.) Specifies which part\
    \ of each logging line is used to determine the log record's timestamp. Matches\
    \ the `<logtime>` identifier in the regular expression.\n\n* `time_format ...`\n\
    \n  (Inside `<parse>...</parse>`.) The format of the time string.\n\n## Filtering\n\
    \nFilter plugins can be used to filter out logging events based on a condition.\
    \ Or you can use them to enrich and transform messages. As an example, you could\
    \ amend the configuration from the previous section and add a filter for limiting\
    \ Fluentd messages to the \"error\" logging level. To this aim, add the following\
    \ to the configuration:\n\n```\n<filter serv.log>\n  @type grep\n  <regexp>\n\
    \    key level\n    pattern /error/\n  </regexp>\n</filter>\n```\n\nThis declaration\
    \ says: Allow only (by `@type grep`) events that have an \"error\" in the `level`\
    \ field (by `<regexp>`). This way, it is possible to keep the full logging in\
    \ the original logfiles, while additionally sending all errors to a special destination,\
    \ like a monitoring platform.\n\n## Using Multiple Routes\n\nMessage routing in\
    \ Fluentd can be achieved using the output plugin called `rewrite_tag_filter`.\
    \ The idea behind it is to send messages to different output plugins, based on\
    \ a condition. The reason that this plugin is an output plugin comes from Fluentd's\
    \ architecture.\n\n> **Note**: You must run `fluent-gem install fluent-plugin-rewrite-tag-filter`\
    \ to install this plugin.\n\nThe following configuration lets the rewrite/routing\
    \ plugin receive messages tagged with `serv.log`, extracts the `level` field,\
    \ and rewrites the message using an extended tag like `error.serv.log` or `warn.serv.log`,\
    \ depending on the contents of the `level` field:\n\n```\n<source>\n  tag serv.log\n\
    \  # ... must construct records with a \"level\" field\n</source>\n\n# Rewrite\
    \ messages\n<match serv.log>\n  @type rewrite_tag_filter\n  <rule>\n    key level\
    \       # Use the \"level\" field\n    pattern /(\\w+)/ # Fetches the whole field\n\
    \    tag $1.${tag}   # New tag value\n  </rule>\n</match>\n\n# Fetches the rewritten\
    \ tag with level=\"error\"\n<match error.serv.log>\n  @type file\n  path serv.error.log\n\
    \  <buffer>\n    timekey 1d\n    timekey_use_utc true\n    timekey_wait 10s\n\
    \  </buffer>\n</match>\n```"
