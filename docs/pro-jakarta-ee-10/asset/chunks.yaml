- fmt: "根据您的需求，以下是排版后的 Markdown 文档：\n\nChange the passwords and paths according to\
    \ your needs. After that, you usually have to restart the server.\n\n## Configuring\
    \ the Client\n\nIf the JMX client you want to use to monitor or investigate the\
    \ JMX figures is a Java program, the steps to access the SSL-secured JMX are quite\
    \ similar to those for the server. Likewise, the configuration differs from client\
    \ to client, so again you have to consult the documentation for details.\n\nRegardless\
    \ of your client software, first move or copy the `jmxclient.keystore` and `jmxclient.truststore`\
    \ files to a suitable place inside the client installation. For the configuration\
    \ itself, in many cases there is a script or configuration file where the following\
    \ properties can be set:\n\n```\njavax.net.ssl.keyStore=\n/path/to/keystores/jmxclient.keystore\n\
    javax.net.ssl.keyStorePassword=\ndhdgdfd534\njavax.net.ssl.trustStore=\n/path/to/keystores/jmxclient.truststore\n\
    javax.net.ssl.trustStorePassword=\ndhdgdfd534\n```\n\nFor VisualVM, for example,\
    \ after you install the MBeans plugin, locate the `etc/visualvm.conf` file and\
    \ add the following right after the `-J-Xmx768m` string:\n\n```\n-J-Djavax.net.ssl.keyStore=\n\
    /path/to/keystores/jmxclient.keystore\n-J-Djavax.net.ssl.keyStorePassword=\ndhdgdfd534\n\
    -J-Djavax.net.ssl.trustStore=\n/path/to/keystores/jmxclient.truststore\n-J-Djavax.net.ssl.trustStorePassword=\n\
    dhdgdfd534\n```\n\n(Make sure there are no line breaks or spaces after the `=`\
    \ signs.)\n\nWith the configuration set up, you need a JMX URL to connect to the\
    \ server. This URL differs from Jakarta EE server to Jakarta EE server, but for\
    \ GlassFish, and as a starting point for other servers, use this URL:\n\n```\n\
    service:jmx:rmi:///jndi/rmi://localhost:9010/jmxrmi\n```\n\nwhere `localhost`\
    \ possibly needs to be replaced with the JMX server network address, and `9010`\
    \ corresponds to the port declared in the server configuration.\n\n## Disabling\
    \ Random JMX Ports\n\nIn the server configuration, this example declares a JMX\
    \ port as follows:\n\n```\ncom.sun.management.jmxremote.port=9010\n```\n\nThe\
    \ whole story is more complicated, though. The truth is, the specified port establishes\
    \ JMX connections, it does not actually communicate with MBeans. This workload\
    \ port is usually referred-to as `RMI-Port`. Without further configuration, the\
    \ `RMI-Port` is a randomly assigned number. This happens under the hood, so from\
    \ a development or configuration point of view, there is no need to care about\
    \ this random port. In a corporate environment, however, a randomly assigned port\
    \ frequently causes troubles, because a firewall might block the RMI communication.\n\
    \nFor this reason, there is another setting you can use to assign a static port\
    \ for JMX-RMI communication. You can even use the same port to establish a connection\
    \ and use it. The second line in\n\n```\n...\ncom.sun.management.jmxremote.port=9010\n\
    com.sun.management.jmxremote.rmi.port=9010\n...\n```\n\ndeclares a system property\
    \ to set a static JMX-RMI port.\n\n## 32. Java Web Tokens with Encryption\n\n\
    Chapter [14](#490565_1_En_14_Chapter.xhtml) covered JWTs (Java Web Tokens), which\
    \ are used to enhance RESTful client-server communication by adding security-related\
    \ claims. That same chapter presented a signing process to ensure that the token’s\
    \ content hadn’t been tampered with. For that purpose, you added the JJWT library\
    \ to the web application. Using JJWT allows you to write code like the following\
    \ as a token-generation method:\n\n```\nimport io.jsonwebtoken.Jwts;\n...\nKey\
    \ key = keyGenerator.generateKey();\nString jwtToken = Jwts.builder()\n.setSubject(login)\n\
    .setIssuer(uriInfo.getAbsolutePath().toString())\n.setIssuedAt(new Date())\n.setExpiration(toDate(\n\
    LocalDateTime.now().plusMinutes(15L)))\n.signWith(key, SignatureAlgorithm.HS512)\n\
    .compact();\n...\n```\n\nHowever, if security requirements go a step further and\
    \ encryption needs to be added, you must watch out for a library that implements\
    \ the JWE (Java Web Tokens with Encryption) specification. JJWT provides signing,\
    \ not encryption, but there are a couple of projects that target JWE. One of them\
    \ is called *Jose4j*, and you can download it and get its documentation at [`https://bitbucket.org/b_c/jose4j/wiki/Home`](https://bitbucket.org/b_c/jose4j/wiki/Home).\
    \ This chapter briefly outlines JWE and Jose4j. For more details, see the project’s\
    \ home page and the JWE specification at [`https://datatracker.ietf.org/doc/rfc7516/ballot/`](https://datatracker.ietf.org/doc/rfc7516/ballot/).\n\
    \n> **Note**  \n> JWT, JWS, and JWE are not part of the Jakarta EE specification.\
    \ I added it because of the attention that communication via JWTs receives nowadays.\n\
    \n### Installing Jose4j\n\nIn order to install Jose4j, add the following dependency\
    \ to your Gradle (`build.gradle`) or Maven (`pom.xml`) build file:\n\n```\n//\
    \ Gradle:\n...\ndependencies {\n...\nimplementation 'org.bitbucket.b_c:jose4j:0.7.10'\n\
    }\n\n...\n\norg.bitbucket.b_c\njose4j\n0.7.10\n\n```\n\n### Encrypting Claims\n\
    \nClaims represent statements about an entity, typically a person, that needs\
    \ to be asserted. So, to issue a JWT or an encrypted JWT, you first need to collect\
    \ the claims:\n\n```\nimport org.jose4j.jwt.JwtClaims;\n...\nJwtClaims claims\
    \ = new JwtClaims();\nclaims.setIssuer(\"Issuer\");\n// <- token creator\nclaims.setIssuedAtToNow();\n\
    // <- token created now\nclaims.setAudience(\"Audience\");\n// <- intended token\
    \ recipient\nclaims.setExpirationTimeMinutesInTheFuture(10);\n// <- expiry time\n\
    ...\n```\n\nFor more claim-related options, consult the API documentation.\n\n\
    As a next step, you need a key for encrypting the JWT. Naturally, there are many\
    \ options for creating keys. You can use symmetric or asymmetric encryption, and\
    \ there are several suitable encryption algorithms at hand. This example uses\
    \ a simple but nevertheless strong symmetric key in the form of an octet stream\
    \ (a string cipher):\n\n```\nimport org.jose4j.jwk.JsonWebKey;\n...\nString jwkJson\
    \ = \"{\" +\n\"\\\"kty\\\":\\\"oct\\\",\" +\n\"\\\"k\\\":\" +\n\"\\\"ffdbdh4grh5tffnkkj5tvrfcddehjihhhfddeesdfff\\\
