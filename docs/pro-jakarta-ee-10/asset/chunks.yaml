    \  user is a preparational step.\n\n    *   A test case might contain cleanup\
    \ steps. It must be possible to\n        automate such cleanup steps. For example,\
    \ if the test case describes the\n        registration of a user with the user\
    \ database, deleting the user\n        afterward is a cleanup step.\n\n    * \
    \  A test case must be repeatable.\n\n    *   A test case must be parallelizable.\
    \ This means it must be\n        possible for several threads to perform the same\
    \ test case at the same\n        time, without interfering with each other.\n\n\
    *   Describe a tool capable of running test cases. This chapter uses\n    JMeter\
    \ for this purpose.\n\n*   If a test case simulates a web application workflow,\
    \ decide\n    whether frontend (web browser) activities will be included. If this\
    \ is\n    the case, use Selenium as a testing tool, since JMeter cannot simulate\n\
    \    browsers.\n\n*   Decide whether monitorable data needs to be added. This\
    \ could,\n    for example, be memory consumption as seen by the JVM or by the\n\
    \    operating system.\n\n*   Describe the analysis of NFR test outcome data.\n\
    \n*   Suggest improvements in order to increase performance or\n    stability.\n\
    \nA collection of test cases, executed sequentially or in parallel, is\nsometimes\
    \ called a *test plan*. JMeter uses this\nidiom.\n\nWhere to Run NFR Tests\n\n\
    Test plans can be\ndeveloped on a user workstation. In many cases, it is also\
    \ possible to\nrun NFR tests on\ndeveloper machines. Using dedicated servers for\
    \ the same purpose is an\noption too. Experience shows that both approaches are\
    \ valid, but the\nfollowing checklist should help you to make your decision:\n\
    \n*   If user workstations experience high network latency when\n    connecting\
    \ to the application server, a dedicated NFR test server is the\n    better option.\n\
    \n*   NFR tests can run for hours. If the user workstations’ network\n    connection\
    \ is not 100 percent reliable, a dedicated NFR test server is\n    the better\
    \ option.\n\n*   Developer machines usually have enough power to simulate 30 or\n\
    \    even 100 concurrently acting users. If this is not the case or if you\n \
    \   need the PC to also run other applications that require significant CPU\n\
    \    resources, a dedicated NFR test server is the better option.\n\n*   Using\
    \ user workstations for NFR tests is sometimes more realistic\n    compared to\
    \ a dedicated NFR test server. In the end, application clients\n    are often\
    \ user workstations. If this is the case for you, running NFR\n    tests on a\
    \ developer machine is the better option.\n\n*   Using a dedicated NFR server\
    \ means you have to transport JMeter\n    test plans from the developer PC to\
    \ the test server, before you can\n    start the tests. This is not rocket science,\
    \ but it takes a few minutes\n    each time.\n\n*   If you need to include Selenium\
    \ with your NFR tests, using a\n    dedicated NFR test server usually is not an\
    \ option.\n\n*   Using developer PCs for short-term\n    tests and dedicated NFR\
    \ test servers for longer running tests is an\n    option as well. This setup\
    \ gives you the maximum amount of\n    flexibility.\n\nCaution\n\nNever run NFR\
    \ tests on the same server as the application. Such a\nsetup generates weird effects\
    \ because of back-coupling.\n\nNFR Test Duration\nWhile you might be tempted to\
    \ schedule NFR tests for less than an\nhour or so, experience indicates that it\
    \ is advisable to include\nlonger-running test in your project plan. Running NFR\
    \ tests overnight\nfor six to ten hours provides performance data with better\
    \ statistical\nsignificance. Also, deficiencies like memory and classloader leaks\
    \ often\nshow up only after a couple of hours.\nThe suggested procedure is to\
    \ mix tests that run an hour or two,\nperhaps during business hours, with tests\
    \ that run overnight, for six to\nten hours.\n\nNFR Tests with JMeter\nJMeter\
    \ is an\nextremely versatile tool for creating and running NFR test plans. It\
    \ has\na GUI for building tests of any level of complexity. As you add more and\n\
    more test elements, you can run the tests from the GUI and investigate\ntest outcomes\
    \ using real-time diagrams or automatically updated tables.\nLater, when the test\
    \ plan is finished, you can run it from the terminal\non the developer machine\
    \ or after you copy the test plan to a dedicated\nNFR test server.\nSince JMeter\n\
    is a Java tool, you can freely choose which operating system you\nwant to use.\
    \ You can, for example, develop test plans on a Windows PC\nand later run them\
    \ on a Linux server.\nAs a very helpful feature, JMeter provides a recorder for\
    \ web\napplications. You can configure your browser to send its requests\nthrough\
    \ a proxy provided by JMeter. All requests, including\nredirections, then show\
    \ up as test elements in a generated test plan.\nThis greatly simplifies and speeds\
    \ up test-plan development for complex\nweb application workflows.\n\nNote\n\n\
    This chapter doesn’t cover this recording feature in detail, since it\nis beyond\
    \ the scope of the book. Visit [`https://jmeter.apache.org/usermanual/component_reference.html#HTTP(S)_Test_Script_Recorder`](https://jmeter.apache.org/usermanual/component_reference.html%2523HTTP%2528S%2529_Test_Script_Recorder)\n\
    to learn more about it.\n\nYou can download JMeter from [`https://jmeter.apache.org/`](https://jmeter.apache.org/).\n\
    This is also your primary place for getting information.\n\nIn order to simplify\
    \ the process of starting up JMeter, add the `start.sh` file to the\ninstallation\
    \ folder with these contents:\n\n```\n#!/bin/bash"
