- fmt: '# Building and Uploading Company Libraries


    Since you know that, to upload a library to the company’s Maven repository, you
    need the following:


    - The library JAR itself

    - A `.pom` file describing the library and its dependencies

    - MD5 and SHA1 files of all of the above


    You have to find a way to generate a POM file and the hashes. A script to automate
    this process as much as possible follows:


    1. Check out the project from a repository.

    2. Build the project (this means create the library JAR).

    3. Generate a POM file by an adapted `build.gradle` file.

    4. Add MD5 and SHA1 hashes from the same build file.

    5. Upload everything to the company’s Maven repository.


    The first thing you do is create a script file which, by virtue of an included
    Groovy script, creates an adapted Gradle build file. This script file could be
    a bash script, but this would be rather complex because you need some replacement
    activities, which in bash is not easy to do. Instead, you use a Groovy script.
    Since you have Gradle at hand and Gradle has a complete Groovy inside, you can
    pack the script into a Gradle build file. To this aim, create an empty directory
    and add a `buildRepoGradle.gradle` file with the following contents:


    ```

    task a { doLast {

    def FS = File.separator

    def buildFile = new File("build.gradle")

    def newBuild = buildFile.readLines().

    grep { ln -> !( ln ==~ /\s*archivesBaseName\s*=.*/ ) }.

    grep { ln -> !( ln ==~ /\s*group\s*=.*/ ) }.

    grep { ln -> !( ln ==~ /\s*version\s*=.*/ ) }.

    grep { ln -> !( ln ==~ /\s*id\s+(''|")maven("|'')\s*/) }.

    join("\n")

    // Add the maven plugin. This is able to generate POM

    // files

    newBuild = newBuild.replaceFirst(

    /(?s)plugins\s*\{([^}]*)\}/) { all, p ->

    "plugins {" + p + "  id ''maven''\n" + "}"

    }

    // Add Maven coordinates

    newBuild = newBuild.replaceFirst(

    /(?s)plugins\s*\{[^}]*\}/) { all ->

    all +

    "\ngroup = ''" +

    project.properties.GROUP_ID + "''" +

    "\narchivesBaseName = ''" +

    project.properties.ARTIFACT_ID + "''" +

    "\nversion = ''" +

    project.properties.VERSION + "''" +

    "\n"

    }

    // Add the POM generation task

    newBuild += """\n

    task writePomAndHashes() {

    doLast {

    def FS = File.separator

    def jarName = ''""" + project.properties.ARTIFACT_ID +

    "-" + project.properties.VERSION + ".jar" + """''

    def pomName = ''""" + project.properties.ARTIFACT_ID +

    "-" + project.properties.VERSION + ".pom" + """''

    pom {

    project {

    inceptionYear ''2019''

    licenses {

    license {

    name ''Property of the company''

    }

    }

    }

    }.writeTo(buildDir.absolutePath + FS +

    "poms" + FS + pomName)

    // Add the hashes

    def jarFile = buildDir.absolutePath + FS +

    ''libs'' + FS + jarName

    def pomFile = buildDir.absolutePath + FS +

    ''poms'' + FS + pomName

    def md5 = java.security.MessageDigest.

    getInstance("MD5")

    def sha1 = java.security.MessageDigest.

    getInstance("SHA-1")

    new File(jarFile+".md5").bytes =

    md5.digest(jarFile.bytes)

    new File(jarFile+".sha1").bytes =

    sha1.digest(jarFile.bytes)

    new File(pomFile+".MS5").bytes =

    md5.digest(pomFile.bytes)

    new File(pomFile+".sha1").bytes =

    sha1.digest(pomFile.bytes)

    // Write an info file

    def infoFile = new File(buildDir.absolutePath + FS +

    "repoFiles.txt")

    infoFile.delete()

    infoFile << jarFile + "\\n" +

    jarFile + ".md5\\n" +

    jarFile + ".sha1\\n" +

    pomFile + "\\n" +

    pomFile + ".md5\\n" +

    pomFile +".sha1\\n"

    }

    }"""

    new File("build2.gradle").text = newBuild

    } }

    ```


    The script takes the original `build.gradle` file and first removes some declarations
    that you’ll do yourself, like setting the Maven artifact ID, the Maven group ID,
    and the Maven version. Then make sure the Maven plugin is loaded, since this plugin
    can generate the POM file you need. Then set the Maven project coordinates and
    write the POM generator task, which includes calculating the hashes. The last
    thing the task does is create an info file, which lists the generated artifacts.


    Next is a bash script `toRepo.sh`. It checks out the library project, invokes
    this Gradle generator script, and then copies the generated artifacts to the Maven
    repository:


    ```

    #!/bin/bash

    GROUP_ID=book.jakartapro

    ARTIFACT_ID=textutils

    VERSION=1.0

    REPO_BASE=`pwd`/REPO

    GIT_URL=/the/path/to/GITREPO/TextUtils

    # Checkout from GIT

    rm -rf checkout && mkdir checkout

    cd checkout

    git clone $GIT_URL .

    cp ../buildRepoGradle.gradle .

    # ---------------------------------------------------

    # Create a modified build.gradle file: build2.gradle

    ./gradlew -b buildRepoGradle.gradle -q \

    -PGROUP_ID=${GROUP_ID} \

    -PARTIFACT_ID=${ARTIFACT_ID} \

    -PVERSION=${VERSION} \

    a

    # ---------------------------------------------------

    ./gradlew -b build2.gradle build

    ./gradlew -b build2.gradle writePomAndHashes

    cd ..

    # Copy everything into the repository

    pathInRepo=\

    ${GROUP_ID//\./\/}/${ARTIFACT_ID//\./\/}/${VERSION}

    mkdir -p $REPO_BASE/$pathInRepo

    while read p; do

    cp $p $REPO_BASE/$pathInRepo

    done < checkout/build/repoFiles.txt

    rm -rf checkout

    ```


    Adapt the variables on top of the file and then invoke the script: `./toRepo.sh`.
    Make sure first the file is executable (`chmod a+x toRepo.sh`). The Git URL can
    of course also be a network URL, like `http://...` or `ssh://...`, but if you
    are on the same machine, you can also just enter the path. Git knows that you
    mean the `file://...` protocol.


    # Part II – Advanced Web Tier Topics


    # 7. Facelets


    This chapter covers using Faces 4.0’s built-in templating engine, called *Facelets*.
    Compared to using plain Faces, you can use Facelets to further modularize your
    frontend code and improve code quality, reuse, and maintenance.


    > **Note**: The old name of Faces, *JSF*, is no longer used.


    ## Faces Templating via Facelets


    While you can create a full page-flow web application by using various fully defined
    Faces (XHTML) pages and the tags from the following component namespaces, it is
    probably not the cleverest way to rely on those three tag libraries:


    ```

    h="jakarta.faces.html"

    f="jakarta.faces.core"

    pt="jakarta.faces.passthrough"

    ```


    (The last is a pseudo-component namespace for attributes *not* to be handled by
    Faces.) If you have a common page structure with, for example, a header, a menu,
    a footer, and a content area, all Faces pages have to repeat all the page elements
    that are common to the different application parts. This is a violation of the
    DRY (Don’t Repeat Yourself) principle. Instead, it would be better if you could
    use templating mechanisms to compose pages, given patterns, (X)HTML snippets,
    and placeholders.


    Faces includes such a templating technology, and it is called *Facelets*. Facelets
    allows you to introduce parameterized template HTML pages, HTML snippets (components)
    to be included in pages, placeholders for such snippets, and decorators and repetitions
    for things like elaborated list views. In the following sections, you learn about
    the configuration issues and about the Facelets tags. In the last section of this
    chapter, you develop a sample application to get you started.


    This sample application mimics the functionality of an online music box. It includes
    a header, a footer, and a menu that appears on every page of the web application,
    no matter which functionality the user is currently using. Facelets does a good
    job at letting you factor out common page parts so you have to code them only
    once. See Figure 7-1.


    ![An illustration of the HTML template. It includes 5 boxes with the text, placeholder,
    and 3 dots. The boxes named snippet or component point to the placeholders.](images/490565_1_En_7_Chapter/490565_1_En_7_Fig1_HTML.png)


    **Figure 7-1** – Templating with Facelets


    ## Installing Facelets


    Facelets is already part of Faces and Jakarta EE, so there is no need to install
    it. But before you can use it in your Faces pages, you have to declare an additional
    namespace, as the `ui` in the following:


    ```

    <html xmlns:ui="jakarta.faces.facelets">

    ...

    </html>

    ```


    ## Facelets Tags Overview


    Facelets consists of the following tags, which you can include in an XHTML file
    to apply or mix templates, include XHTML snippets, or pass parameters:'
