    ## 创建真实世界的构建


    在本节中，你将回到 `Jenkinsfile`，并为构建添加一个真实世界的场景：


    *   一个构建阶段，包括单元测试

    *   一个部署阶段

    *   一个集成测试阶段

    *   一个发布阶段


    为此，请将以下内容添加到 `/srv/git/RestDate/tmp/RestDateJenkinsfile` 文件中。（请记住，Git 检出被放置在 `/srv/git/RestDate/tmp/RestDate`。）


    ```

