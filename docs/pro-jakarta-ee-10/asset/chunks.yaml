    .followRedirects(HttpClient.Redirect.NORMAL)\n.connectTimeout(Duration.ofSeconds(10))\n\
    .authenticator(auth)\n.build();\nFunction> invoke =\n(req) -> {\ntry {\nreturn\
    \ client.send(req, BodyHandlers.ofString());\n} catch (Exception e) {\ne.printStackTrace(System.err);\n\
    return null;\n}\n};\n```\n\nFor simplicity, this example uses lambda expressions,\
    \ but the helper\nfunctions can readily be translated to class methods.\n\nIt\
    \ is now easy to send requests to the CouchDB\ninstance. Search statements are\
    \ deliberately not used in the following\ncode snippet, since for CouchDB, searchable\
    \ indexes need to be created\nand/or search plugins need to be installed, which\
    \ is out of scope of\nthis brief example.\n\n```\n// ----- CouchDB info\nvar request1\
    \ = get.apply(\"\");\nvar response1 = invoke.apply(request1);\nSystem.out.println(response1.statusCode()\
    \ +\"\\n\"\n+ response1.body());\n// ----- create database\nvar request2 = put.apply(\"\
    mydb\",\"\");\nvar response2 = invoke.apply(request2);\nSystem.out.println(response2.statusCode()\
    \ + \"\\n\"\n+ response2.body());\n// ----- create entry\nvar request3 = put.apply(\"\
    mydb/001\",\n\"{ \\\"name\\\":\\\"John\\\", \\\"age\\\":42 }\");\nvar response3\
    \ = invoke.apply(request3);\nSystem.out.println(response3.statusCode() + \"\\\
    n\"\n+ response3.body());\n// ----- delete database\nvar request99 = delete.apply(\"\
    mydb\");\nvar response99 = invoke.apply(request99);\nSystem.out.println(response99.statusCode()\
    \ + \"\\n\"\n+ response99.body());\n```\n\nUsing MongoDB from Jakarta EE Applications\n\
    \nMongoDB has a dedicated Java driver. Add the following dependencies to your\n\
    project (this is for Gradle):\n\n```\n...\ndependencies {\n...\nimplementation\
    \ 'org.mongodb:' +\n'mongodb-driver-sync:4.5.1'\nimplementation 'org.slf4j:' +\n\
    'slf4j-simple:1.8.0-beta4'\nimplementation 'org.slf4j:' +\n'slf4j-api:1.8.0-beta4'\n\
    }\n```\n\nFor Maven dependencies, write this inside the `pom.xml` file:\n\n```\n\
    ...\n\n...\n\norg.mongodb\nmongodb-driver-sync\n4.5.1\n\norg.slf4j\nslf4j-api\n\
    1.8.0-beta4\n\norg.slf4j\nslf4j-simple\n1.8.0-beta4\n\n```\n\nIn the code, you\
    \ can then use the classes from the driver API. Note that\nMongoDB automatically\
    \ creates databases and collections (tables in\nMongoDB are called “collections”)\
    \ upon first usage if they don’t exist.\nSo you don’t have to explicitly create\
    \ them.\n\n```\n...\nimport org.bson.Document;\nimport org.bson.types.ObjectId;\n\
    import com.mongodb.client.MongoClient;\nimport com.mongodb.client.MongoClients;\n\
    import com.mongodb.client.MongoCollection;\nimport com.mongodb.client.MongoDatabase;\n\
    public class MongoMain {\npublic static void main(String[] args) {\nMongoClient\
    \ client = MongoClients.create();\n// Accessing a database:\nMongoDatabase database\
    \ = client.\ngetDatabase(\"my_database\");\n// Accessing a collection (table):\n\
    MongoCollection persons =\ndatabase.getCollection(\"persons\");\n// Create a document\
    \ (an entry):\nDocument p = new Document(\"name\", \"John\")\n.append(\"cars\"\
    , new Document(\"Tesla\", 2019));\n// Save it:\nObjectId id = persons.insertOne(p)\n\
    .getInsertedId().asObjectId().getValue();\n// Search for a document (an entry):\n\
    Document john = persons.find(\nnew Document(\"name\", \"John\")).first();\nSystem.out.println(john.toJson());\n\
    }\n}\n```\n\nThis is for a MongoDB instance running on the localhost and using\
    \ the\nstandard port 27017\\. For different addresses or ports, look at `MongoClients`’\
    \ other\n`create( ... )`\nmethods. For more details, see [`https://docs.mongodb.com/drivers/java/sync/current/`](https://docs.mongodb.com/drivers/java/sync/current/)\n\
    and [`https://mongodb.github.io/mongo-java-driver/`](https://mongodb.github.io/mongo-java-driver/).\n\
    \nPart VISecurity Enhancements\n\n31. Secured JMX\n\nJMX (Java Management Extensions)\
    \ is a very\npowerful and largely underestimated way to monitor and control a\
    \ Jakarta\nEE application server or the applications running inside it. I do not\n\
    provide an introduction to JMX here, because you can find lots of stuff\nabout\
    \ it on the Internet, including Oracle’s documentation at [`https://docs.oracle.com/javase/tutorial/jmx/overview/index.html`](https://docs.oracle.com/javase/tutorial/jmx/overview/index.html).\n\
    What I do instead in this chapter is explain how to secure remote JMX\nconnections\
    \ using SSL, because this might come up in a corporate\nenvironment.\n\nUsing\
    \ SSL for Remote JMX Connections\nIn order to use SSL for JMX connections,\nyou\
    \ need a key and a trust store on both sides of the server (Jakarta EE\nserver)\
    \ and the client (a remote tool for investigating or monitoring\nJMX). The client\
    \ key’s public part is entered into the server’s trust\nstore and vice versa,\
    \ so the client and server authenticate themselves\nat the communication partner.\n\
    The following sections describe how to generate the keys and trust\nstores, and\
    \ how to configure client and server accordingly.\n\nGenerating the SSL Keys\n\
    \nFor key and\ncertificate store management, you must use the `keytool` CLI utility,\n\
    which is part of every JDK installation. The following bash script does\nall the\
    \ work:\n\n```\n#!/bin/bash\nPASSWORD=dhdgdfd534\nDNAME=\"cn=JMX, ou=Java, o=Glassfish\""
  trans: "\n# 不同的连接工厂类\nbin/asadmin create-connector-resource \\\n--poolname eis/HelloJcaConnectionPool\
    \ \\\neis/HelloWorld\n```\n\n（`interfaces` 后面不应有换行和空格。）有关详细信息和更多选项，请参阅 GlassFish\
    \ 服务器文档。\n\n## 资源适配器客户端\n\n部署并正确配置资源适配器后，你需要通过 `@Resource` 注解（位于 `jakarta.annotation`\
    \ 包中）注入连接工厂，以便客户端能够访问资源适配器的功能。例如，对于 REST 控制器，代码如下所示：\n\n```\n@Path(\"/\")\npublic\
    \ class HelloJca {\n@Resource(name = \"eis/HelloWorld\")\nprivate HelloWorldConnectionFactory\
    \ connectionFactory;\n// 更多字段...\n@GET\npublic Response fetch() {\ntry {\nHelloWorldConnection\
    \ conn = connectionFactory.\ngetConnection();\nString s = conn.helloWorld();\n\
    conn.close();\nreturn Response.status(200).\nentity(\"done: \" + s).build();\n\
    } catch (ResourceException e) {\nreturn Response.status(500).entity(\"error\"\
    ).\nbuild();\n}\n}\n...\n}\n```\n\n注解的 `name` 参数必须与资源适配器的 JNDI 名称匹配。\n\n# 29.\
    \ 缓存\n\n从大型数据库访问数据或使用复杂的 `select` 子句可能非常耗时。此外，应用程序经常多次使用相同的数据库访问语句，这可能会让你思考是否有办法缩短此类数据库查询。这种捷径能否帮助应用程序更快地响应用户查询，并避免数据库服务器负载过高？这正是*缓存*的作用所在。它位于执行数据库查询的客户端代码和数据库访问本身之间，当之前执行过相同的查询时，它会代表数据库来响应数据库查询。\n\
    本章介绍如何将 Ehcache 用于 Hibernate 持久化提供程序。\n\n## 安装 Ehcache\n\n要安装 Ehcache，请将以下依赖项添加到你的构建文件中：\n\
    \n```\n// 对于 Gradle：\n...\ndependencies {\n...\n// 假设你使用以下 Hibernate 版本\nimplementation\
    \ 'org.hibernate:' +\n'hibernate-core-jakarta:5.6.15.Final'\n// ... 你必须添加：\nimplementation\
    \ 'org.hibernate:' +\n'hibernate-ehcache:5.6.15.Final'\n}\n\n...\n\n...\n\norg.hibernate\n\
    hibernate-ehcache\n5.6.15.Final\n\n```\n\n## 为 Ehcache 配置 Hibernate\n\n在真正启用缓存之前，你需要告诉\
    \ Hibernate 你想要使用 Ehcache。Jakarta EE 的 Hibernate 配置在 `persistence.xml` 文件中进行，这也是你向\
    \ Hibernate 声明 Ehcache 的地方：\n\n```\n\norg.hibernate.jpa.HibernatePersistenceProvider\n\
    \n...\n\n...\n\n```\n\n（确保删除 `\"...\"` 内的换行和空格。）这里有必要对属性做一些说明；有关详细信息，请查阅 [`https://www.ehcache.org`](https://www.ehcache.org)\
    \ 上的文档。\n\n*   `hibernate.cache.use_second_level_cache`\n\n    如果你想启用二级缓存，请将其设置为\
    \ `true`。二级缓存以会话无关的方式按 ID 存储实体，这意味着它跨所有会话工作。默认值为 `false`。\n\n*   `hibernate.cache.use_query_cache`\n\
    \n    如果你想启用查询缓存，请将其设置为 `true`。查询缓存用于存储代码中显式 HQL 查询的结果，但前提是在构建 `Criteria` 对象时添加了\
    \ `.setCacheable(true)`。默认值为 `false`。\n\n*   `hibernate.cache.region.factory_class`\n\
    \n    定义用于缓存的区域工厂类。另一个可能的值是 `org.hibernate.cache.ehcache.EhCacheRegionFactory`。\n\
    \n*   `hibernate.cache.ehcache.missing_cache_strategy`\n\n    如果你没有在类的 `Cache`\
    \ 注解（`region` 参数）中显式定义区域，则此属性的 `create` 值会告诉 Hibernate 基于类名创建一个区域。否则，你会在日志中收到警告。\n\
    \n*   `hibernate.generate_statistics`\n\n    如果你希望 Hibernate 生成统计数据（包括缓存使用情况），请将其设置为\
    \ `true`。默认值为 `false`。\n\n*   `hibernate.jmx.enabled`\n\n    如果你希望 Hibernate 通过\
    \ JMX 公布统计数据，请将其设置为 `true`。默认值为 `false`。\n\n*   `hibernate.jmx.usePlatformServer`\n\
    \n    如果你希望 Hibernate 使用平台 MBean 服务器进行 JMX，请将其设置为 `true`。默认值为 `false`。\n\n此外，你还需要一个\
    \ `META-INF/ehcache.xml` 文件，该文件用于定义缓存参数。示例如下：\n\nEhcache 文档会详细告诉你可以在该文件中设置的所有定义和参数。\n\
    \n## 在代码中定义缓存对象\n\nHibernate 最终会发送 SQL 语句，但由于它是一个 ORM（对象关系映射器），代码中引用的是缓存的 Java\
    \ 对象。然而，Hibernate 默认不会缓存所有对象。相反，你需要将 `org.hibernate.annotations.Cache` 注解添加到 JPA\
    \ 实体类中：\n\n```\npackage ...;\nimport org.hibernate.annotations.Cache;\nimport\
    \ org.hibernate.annotations.CacheConcurrencyStrategy;\nimport jakarta.persistence.Entity;\n\
    import jakarta.persistence.Table;\n@Entity\n@Table(name = \"person\")\n@Cache(usage=CacheConcurrencyStrategy.READ_ONLY,\n\
    region=\"Region1\")\npublic class Person {\n.... 某个 JPA 类\n}\n```\n\n`@Cache`\
    \ 注解的 `region` 参数对应于 `ehcache.xml` 文件中定义的区域。`usage` 参数指定了并发策略。你可以使用以下值之一：\n\n\
    *   `CacheConcurrencyStrategy.NONE`\n\n    无并发策略。Hibernate 不关心哪个应用程序更新或读取数据。如果存在缓存对象，无论是否有其他方访问同一张表，都会使用它们。\n\
    \n*   `CacheConcurrencyStrategy.READ_ONLY`\n\n    使用此值表示你的应用程序只从该表读取数据，从不写入。\n\
    \n*   `CacheConcurrencyStrategy.READ_WRITE`\n\n    使用此值表示你的应用程序会读取和写入该表。\n\n*\
    \   `CacheConcurrencyStrategy.NONSTRICT_READ_WRITE`\n\n    使用此值表示你的应用程序读取该表，并且偶尔也会写入。\n\
    \n*   `CacheConcurrencyStrategy.TRANSACTIONAL`\n\n    使用此值表示缓存管理器允许事务。本书不探讨事务性缓存；有关详细信息，请参阅\
    \ Ehcache 文档中的“Ehcache 中的事务”部分。\n\n## 监控缓存活动\n\n由于你在前面的部分中启用了统计数据收集和 JMX 访问，因此可以使用\
    \ JMX 浏览器来调查缓存性能。你可以为此目的使用 [`https://visualvm.github.io/`](https://visualvm.github.io/)\
    \ 上的 VisualVM 程序。安装它并添加 MBeans 插件后，导航到 Hibernate 的统计页面，如图 29-1 所示。\n\n![](img/490565_1_En_29_Fig1_HTML.jpg)\n\
    \nVisualVM 窗口显示 JMX 访问缓存活动。它展示了 MBeans 浏览器和 MBeans 插件。它导航到 Hibernate 统计页面，该页面包含带有缓存报告的属性值。\n\
    \n图 29-1\n*VisualVM JMX 访问*\n\n# 30. NoSQL\n\nSQL 数据库在将现实世界的关系映射到数据存储方面做得很好。然而，开发一个大型关系结构并非易事，因为在项目后期或生产阶段，更改关系、添加或移动表列都是耗时的任务。你必须检查数据库条目关系是否仍然有效并正确关联到数据库访问代码，并检查所有客户端是否能够应对更新的数据库结构。出于这些原因，在项目开始时需要投入大量精力来创建一个无懈可击的数据库关系模型。\n\
    为了简化结构化数据模型的更改，你必须放宽甚至放弃严格的数据库表关系。此类数据库管理系统在数据库结构频繁变化的现代使用场景中，最近获得了相当大的关注。它们提供了\
    \ Java 客户端可用的 API。它们通常被称为“NoSQL”数据库。这是“Not-Only-SQL”的缩写，因为通常仍然可以使用类似 SQL 的传统方式访问数据，而无模式地访问数据库条目是处理表条目的首选方式。\n\
    目前还没有最终确定的 Jakarta EE 10 标准来描述对 NoSQL 数据库的访问（参见 [`https://jakarta.ee/specifications/nosql/`](https://jakarta.ee/specifications/nosql/)\
    \ 了解正在进行的工作）。尽管如此，鉴于 NoSQL 数据库如今的重要性，本章简要介绍两种 NoSQL DBMS——CouchDB 和 MongoDB。\n\
    \n## 从 Jakarta EE 应用程序使用 CouchDB\n\nCouchDB 提供了一个 REST API，你可以使用 `java.net.http`\
    \ 包中的 `HttpClient` 从 Java 访问该 API。假设你有一个 CouchDB 在本地端口 5984 上运行，并且有一个管理员用户 `admin`，密码为\
    \ `PASSWD`，你首先定义几个辅助函数：\n\n```\nimport java.net.Authenticator;\nimport java.net.PasswordAuthentication;\n\
    import java.net.URI;\nimport java.net.http.HttpClient;\nimport java.net.http.HttpRequest;\n\
    import java.net.http.HttpResponse;\nimport java.net.http.HttpResponse.BodyHandlers;\n\
    import java.nio.charset.StandardCharsets;\nimport java.time.Duration;\nimport\
    \ java.util.Base64;\nimport java.util.function.BiFunction;\nimport java.util.function.Function;\n\
    ...\nfinal String SERVER = \"127.0.0.1:5984\";\nfinal String USER = \"admin\"\
    ;\nfinal String PASSWD = \"PASSWD\";\nvar auth = new Authenticator() {\nprotected\
    \ PasswordAuthentication\ngetPasswordAuthentication() {\nreturn new PasswordAuthentication(USER,\n\
    PASSWD.toCharArray());\n}\n};\nvar encodedAuth = Base64.getEncoder()\n.encodeToString((USER\
    \ + \":\" + PASSWD)\n.getBytes(StandardCharsets.UTF_8));\nFunction get = (url)\
    \ -> {\nreturn HttpRequest.newBuilder()\n.uri(URI.create(\"http://\" + SERVER\
    \  + \"/\" + url))\n.timeout(Duration.ofSeconds(10))\n.header(\"Authorization\"\
    , \"Basic \" + encodedAuth)\n.GET().build();\n};\nFunction delete = (url) -> {\n\
    return HttpRequest.newBuilder()\n.uri(URI.create(\"http://\" + SERVER  + \"/\"\
    \ + url))\n.timeout(Duration.ofSeconds(10))\n.header(\"Authorization\", \"Basic\
    \ \" + encodedAuth)\n.DELETE().build();\n};\nBiFunction post =\n(url,body) ->\
    \ {\nreturn HttpRequest.newBuilder()\n.uri(URI.create(\"http://\" + SERVER + \"\
    /\" + url))\n.timeout(Duration.ofSeconds(10))\n.header(\"Authorization\", \"Basic\
    \ \" + encodedAuth)\n.POST(HttpRequest.BodyPublishers.ofString(body))\n.build();\n\
    };\nBiFunction put = (url,body) -> {\nreturn HttpRequest.newBuilder()\n.uri(URI.create(\"\
    http://\" + SERVER + \"/\" + url))\n.timeout(Duration.ofSeconds(10))\n.header(\"\
    Authorization\", \"Basic \" + encodedAuth)\n.PUT(HttpRequest.BodyPublishers.ofString(body))\n\
    .build();\n};\nHttpClient client = HttpClient.newBuilder()\n.version(HttpClient.Version.HTTP_1_1)\n\
    .followRedirects(HttpClient.Redirect.NORMAL)\n.connectTimeout(Duration.ofSeconds(10))\n\
    .authenticator(auth)\n.build();\nFunction> invoke =\n(req) -> {\ntry {\nreturn\
    \ client.send(req, BodyHandlers.ofString());\n} catch (Exception e) {\ne.printStackTrace(System.err);\n\
    return null;\n}\n};\n```\n\n为简单起见，此示例使用了 lambda 表达式，但辅助函数可以很容易地转换为类方法。\n\n现在很容易向\
    \ CouchDB 实例发送请求。以下代码片段中故意未使用搜索语句，因为对于 CouchDB，需要创建可搜索索引和/或安装搜索插件，这超出了这个简短示例的范围。\n\
    \n```\n// ----- CouchDB 信息\nvar request1 = get.apply(\"\");\nvar response1 = invoke.apply(request1);\n\
    System.out.println(response1.statusCode() +\"\\n\"\n+ response1.body());\n// -----\
    \ 创建数据库\nvar request2 = put.apply(\"mydb\",\"\");\nvar response2 = invoke.apply(request2);\n\
    System.out.println(response2.statusCode() + \"\\n\"\n+ response2.body());\n//\
    \ ----- 创建条目\nvar request3 = put.apply(\"mydb/001\",\n\"{ \\\"name\\\":\\\"John\\\
    \", \\\"age\\\":42 }\");\nvar response3 = invoke.apply(request3);\nSystem.out.println(response3.statusCode()\
    \ + \"\\n\"\n+ response3.body());\n// ----- 删除数据库\nvar request99 = delete.apply(\"\
    mydb\");\nvar response99 = invoke.apply(request99);\nSystem.out.println(response99.statusCode()\
    \ + \"\\n\"\n+ response99.body());\n```\n\n## 从 Jakarta EE 应用程序使用 MongoDB\n\n\
    MongoDB 有一个专用的 Java 驱动程序。将以下依赖项添加到你的项目中（这是针对 Gradle 的）：\n\n```\n...\ndependencies\
    \ {\n...\nimplementation 'org.mongodb:' +\n'mongodb-driver-sync:4.5.1'\nimplementation\
    \ 'org.slf4j:' +\n'slf4j-simple:1.8.0-beta4'\nimplementation 'org.slf4j:' +\n\
    'slf4j-api:1.8.0-beta4'\n}\n```\n\n对于 Maven 依赖项，请在 `pom.xml` 文件中写入以下内容：\n\n```\n\
    ...\n\n...\n\norg.mongodb\nmongodb-driver-sync\n4.5.1\n\norg.slf4j\nslf4j-api\n\
    1.8.0-beta4\n\norg.slf4j\nslf4j-simple\n1.8.0-beta4\n\n```\n\n然后，你可以在代码中使用驱动程序\
    \ API 中的类。请注意，MongoDB 会在首次使用时自动创建数据库和集合（MongoDB 中的表称为“集合”），如果它们不存在的话。因此，你无需显式创建它们。\n\
    \n```\n...\nimport org.bson.Document;\nimport org.bson.types.ObjectId;\nimport\
    \ com.mongodb.client.MongoClient;\nimport com.mongodb.client.MongoClients;\nimport\
    \ com.mongodb.client.MongoCollection;\nimport com.mongodb.client.MongoDatabase;\n\
    public class MongoMain {\npublic static void main(String[] args) {\nMongoClient\
    \ client = MongoClients.create();\n// 访问数据库：\nMongoDatabase database = client.\n\
    getDatabase(\"my_database\");\n// 访问集合（表）：\nMongoCollection persons =\ndatabase.getCollection(\"\
    persons\");\n// 创建一个文档（条目）：\nDocument p = new Document(\"name\", \"John\")\n.append(\"\
    cars\", new Document(\"Tesla\", 2019));\n// 保存它：\nObjectId id = persons.insertOne(p)\n\
    .getInsertedId().asObjectId().getValue();\n// 搜索文档（条目）：\nDocument john = persons.find(\n\
    new Document(\"name\", \"John\")).first();\nSystem.out.println(john.toJson());\n\
    }\n}\n```\n\n这适用于在本地主机上运行并使用标准端口 27017 的 MongoDB 实例。对于不同的地址或端口，请查看 `MongoClients`\
    \ 的其他 `create( ... )` 方法。有关更多详细信息，请参阅 [`https://docs.mongodb.com/drivers/java/sync/current/`](https://docs.mongodb.com/drivers/java/sync/current/)\
    \ 和 [`https://mongodb.github.io/mongo-java-driver/`](https://mongodb.github.io/mongo-java-driver/)。\n\
    \n# 第六部分 安全增强\n\n# 31. 安全的 JMX\n\nJMX（Java 管理扩展）是一种非常强大且在很大程度上被低估的监控和控制 Jakarta\
    \ EE 应用服务器或其内部运行的应用程序的方法。我在此不介绍 JMX，因为你可以在互联网上找到大量相关资料，包括 Oracle 在 [`https://docs.oracle.com/javase/tutorial/jmx/overview/index.html`](https://docs.oracle.com/javase/tutorial/jmx/overview/index.html)\
    \ 上的文档。本章我要做的是解释如何使用 SSL 保护远程 JMX 连接，因为这可能会在企业环境中出现。\n\n## 为远程 JMX 连接使用 SSL\n\n\
    为了对 JMX 连接使用 SSL，你需要在服务器端（Jakarta EE 服务器）和客户端（用于调查或监控 JMX 的远程工具）都拥有密钥库和信任库。客户端密钥的公钥部分被输入到服务器的信任库中，反之亦然，这样客户端和服务器就可以在通信伙伴处进行身份验证。\n\
    以下部分介绍如何生成密钥和信任库，以及如何相应地配置客户端和服务器。\n\n### 生成 SSL 密钥\n\n对于密钥和证书存储管理，你必须使用 `keytool`\
    \ CLI 工具，该工具是每个 JDK 安装的一部分。以下 bash 脚本完成了所有工作：\n\n```\n#!/bin/bash\nPASSWORD=dhdgdfd534\n\
    DNAME=\"cn=JMX, ou=Java, o=Glassfish\"\n"
- fmt: '# JMX server


    `DAYS=3650`

    `SERVERCACERTS="/path/to/server/conf/cacerts.jks"`

    `rm -rf jmxserver.keystore jmxserver.truststore`


    # Make a key

    `keytool -genkey -alias serverjmx -keyalg RSA \

    -validity ${DAYS} \

    -keystore jmxserver.keystore -storepass ${PASSWORD} \

    -keypass ${PASSWORD} -dname "${DNAME}"`


    # Make our own copy of the Truststore

    `cp ${SERVERCACERTS} jmxserver.truststore`


    # Convert to new format (Glassfish)

    `keytool -importkeystore \

    -srckeystore jmxserver.truststore \

    -srcstorepass changeit \

    -destkeystore jmxserver.truststore \

    -deststorepass changeit \

    -deststoretype pkcs12`

    `rm -rf jmxserver.truststore.old`

    `keytool -storepasswd -keystore jmxserver.truststore \

    -storepass changeit -new ${PASSWORD}`


    # Make a new key inside the truststore

    `keytool -genkey -alias serverjmx -keyalg RSA \

    -validity ${DAYS} -keystore jmxserver.truststore \

    -storepass ${PASSWORD} \

    -dname "${DNAME}"`


    # JMX client


    `DAYS=3650`


    # Make an empty truststore

    `keytool -genkeypair -alias boguscert \

    -storepass ${PASSWORD} -keystore emptyStore.keystore \

    -dname "CN=Developer, OU=Department, O=Company, \

    L=City, ST=State, C=CA"`

    `keytool -delete -alias boguscert -storepass ${PASSWORD} \

    -keystore emptyStore.keystore`

    `mv emptyStore.keystore "${CLIENTCACERTS}"`

    `rm -rf jmxclient.keystore jmxclient.truststore`


    # Make a key

    `keytool -genkey -alias clientjmx -keyalg RSA \

    -validity ${DAYS} -keystore jmxclient.keystore \

    -storepass ${PASSWORD} \

    -keypass ${PASSWORD} \

    -dname "${DNAME}"`


    # Make a new key inside the truststore

    `keytool -genkey -alias jmxclient -keyalg RSA \

    -validity ${DAYS} -keystore "${CLIENTCACERTS}" \

    -storepass ${PASSWORD} -dname "${DNAME}"`


    # Export the public certificates from the keystores:

    `rm -rf jmxserver.cer jmxclient.cer`

    `keytool -export -alias serverjmx \

    -keystore jmxserver.keystore -file jmxserver.cer \

    -storepass ${PASSWORD}`

    `keytool -export -alias clientjmx \

    -keystore jmxclient.keystore -file jmxclient.cer \

    -storepass ${PASSWORD}`


    # Finally, import the certificates into each other''s truststore. This allows
    the server to trust the client, and vice versa:

    `keytool -import -alias jmxclient -file jmxclient.cer \

    -keystore jmxserver.truststore \

    -storepass ${PASSWORD} -noprompt`

    `keytool -import -alias jmxserver -file jmxserver.cer \

    -keystore jmxclient.truststore \

    -storepass ${PASSWORD} -noprompt`


    # Get rid of any remaining CER certificate files

    `rm -f jmxserver.cer jmxclient.cer`


    At the top of the script, you must define a password for all key and trust stores.
    You should use your own, of course. `DNAME` is a distinguished name to be used
    for all keys—you can adapt it to your needs, if you like. Then you build a server
    key and trust store, and a client key and trust store. After extracting the public
    part of each of the keys from the keystores, you register the client’s public
    certificate with the server''s trust store, and the server’s public certificate
    with the client''s trust store. The whole process leaves you with the following
    files:


    *   `jmxserver.keystore` — Contains the key used by the server to identify itself.
    Also, its public part is registered with the client’s trust store.

    *   `jmxserver.truststore` — Contains the public keys of all clients that want
    to authenticate to the server. This includes the JMX client’s public key.

    *   `jmxclient.keystore` — Contains the key used by the client to identify itself.
    Also, its public part gets registered with the server’s trust store.

    *   `jmxclient.truststore` — Contains the public keys of all servers that want
    to authenticate to the client. This is usually the server’s public key.


    ## Configuring the Server


    There is no standard for configuring JMX on a Jakarta EE server, so you have to
    consult the server’s manual for that purpose. Often, there is a startup configuration
    file that can be used to set the system properties. If this is the case for you,
    the basic steps for configuring the server for JMX are first to copy or move the
    `jmxserver.keystore` and `jmxserver.truststore` files to a suitable place for
    the server installation. Then, make sure the following system properties are set:


    ```

    javax.net.ssl.keyStore=

    /path/to/keystores/jmxserver.keystore

    javax.net.ssl.trustStore=

    /path/to/keystores/jmxserver.truststore

    com.sun.management.jmxremote=

    true

    com.sun.management.jmxremote.port=


    com.sun.management.jmxremote.authenticate=

    false

    com.sun.management.jmxremote.ssl=

    true

    javax.net.ssl.keyStorePassword=

    dhdgdfd534

    javax.net.ssl.trustStorePassword=

    dhdgdfd534

    com.sun.management.jmxremote.ssl.need.client.auth=

    true

    ```'
