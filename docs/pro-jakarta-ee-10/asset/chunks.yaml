    package book.jakartapro.jmxmonitoring;

    import jakarta.inject.Inject;

    import jakarta.ws.rs.GET;

    import jakarta.ws.rs.Path;

    import jakarta.ws.rs.Produces;

    /**

    * REST Web Service

    */

    @Path("/pi")

    public class Jmx {

    @Inject MonitoringBean jmxBean;

    @Produces("application/json")

    public String pi() {

    long t1 = System.currentTimeMillis();

    double pi = calcPi(100_000_001);

    long ela = System.currentTimeMillis() - t1;

    jmxBean.setElapse(ela);

    return "{\"pi\":\"" + pi + "\"}";

    }

    private double calcPi(int n) {

    // This is a stupid way of calculating PI.

    // It is just an example of a time-consuming

    // operation.

    double pi = 0.0;

    for (int i = 1; i < n; i++) {

    if (i % 2 == 1) {

    pi = pi + (4/((i*2.0)-1));

    } else {

    pi = pi - (4/((i*2.0)-1));

    }

    }

    return pi;

    }

    }

    ```


    这样一来，在 Jakarta EE 应用程序中，一个 MBean 所需的全部内容就是一个 MBean 接口和一个添加了启动方法的 MBean 类。


    **聚合值**


    监控并随后显示一个可监控变量的每一个值并不总是可取的。在某些情况下，不同数值的数量过于庞大，持续关注它们会变成一项繁琐且容易出错的任务。你更希望做的是应用某种聚合，

    这是一个过程，例如，取 N 个数值并应用一个公式，从中计算出一个或至少一组更小的数值。


    对监控特别有用的聚合公式如下：


    *   **移动平均**


    取最近 *N* 个值的算术平均值。为了计算它，你使用一个大小为 *N* 的环形缓冲区来收集输入值，将所有值求和，然后将总和除以 *N*。环形缓冲区确保最近
    *N* 个值保存在内存中。


    *   **指数移动平均**


    给定一个当前值为 *A* 的可监控特性，一个参数 *β* ∈ [0; 1]，以及一个新传入的值 *a*，下一个可监控值的计算公式为

    *A* = *β* · *A* + (1 − *β*) · *a*。

    这应用了平滑处理，使得较新的值比较旧的值具有更大的权重。*β* 的常见值为 0.7 ... 0.999。


    *   **标准差**


    基于与移动平均相同的缓冲区，使用统计学中已知的公式计算*标准差*。虽然不常用，但展示例如经过时间的标准差，可能会为流程的稳定性提供有价值的见解。


    对于前面章节中的经过时间示例，包含移动平均的变体如下所示：


    ```

    public interface MonitoringBeanMXBean {

    double getElapse();

    void addElapse(double elapse);

    }

    public class MonitoringBean

    implements MonitoringBeanMXBean {

    private static final int ELAPSE_LEN = 1000;

    private double[] elapse = new double[ELAPSE_LEN];

    private int elapseInd = 0;

    @Override

    synchronized

    public double getElapse() {

    double x = 0.0;

    for(int i = 0; i < ELAPSE_LEN; i++) {

    x += elapse[i];

    }

    return x / ELAPSE_LEN;

    }

    @Override

    synchronized

    public void addElapse(double elapse) {

    this.elapse[elapseInd++] = elapse;

    if(elapseInd >= ELAPSE_LEN) elapseInd = 0;

    }

    }

    ```


    这个例子为环形缓冲区使用了一个固定大小的数组，以确保代码运行速度非常快。`synchronized` 语句有助于防止来自多个线程的并发访问，这可能会破坏数组内容或数组索引指针值。


    对于计算指数移动平均的变体，你不需要数组，因此 MBean 代码甚至更简单：


    ```

    public interface MonitoringBeanMXBean {

    double getElapse();

    void addElapse(double elapse);

    }

    public class MonitoringBean

    implements MonitoringBeanMXBean {

    private static final double ELAPSE_EMA_PARAM = 0.95;

    private double elapseEMA = 0.0;

    @Override

    synchronized

    public double getElapse() {

    return elapseEMA;

    }

    @Override

    synchronized

    public void addElapse(double elapse) {

    this.elapseEMA =

    ELAPSE_EMA_PARAM * this.elapseEMA +

    (1.0-ELAPSE_EMA_PARAM) * elapse;

    }

    }

    ```


    因为指数移动平均值从 0.0 开始，该算法需要一个预热期才能显示有效数据。


    **JMX 客户端**


    有三种类型的 JMX 客户端可以访问远程 JMX 服务器：


    *   JMX GUI 客户端


    *   带有 JMX 模块的监控框架


    *   使用 JVM 的 Java 应用程序或脚本环境


    GUI 客户端

    是显示本地运行或远程 JMX 服务器的 JMX 信息的程序。它们适用于开发目的、故障排除和临时监控需求。通常你不会将它们用于企业级运营监控。此类应用程序的示例包括
    JConsole、VisualVM（带有 MBeans 插件）以及一些 IDE 插件。本节不进一步描述此类应用程序，但你可以通过查阅相应的用户手册轻松获取更多信息。

    监控框架是具有更复杂功能来收集、过滤、存储和显示监控数据的程序。后续章节将更详细地介绍此类软件。

    当然，你也可以以 Java JMX 客户端应用程序的形式编写 JMX 客户端代码。或者，更好的是，你可以使用 Java 脚本引擎编写更简洁的代码来访问 MBeans。例如，Groovy
    使您能够编写优雅的 JMX 客户端代码。


    注意


    Groovy JMX API 作为一个附加模块提供。为了启用它，你必须将 `groovy-jmx-x.x.x.jar` 添加到 `CLASSPATH` 或
    `MODULEPATH`。


    用于访问前面章节中经过时间的 Groovy 代码如下所示：


    ```

    import groovy.jmx.GroovyMBean

    import javax.management.ObjectName

    import javax.management.remote.JMXConnectorFactory

    as JmxFactory

    import javax.management.remote.JMXServiceURL

    as JmxUrl

    import javax.management.remote.JMXConnector

    def credentials = ["monitorRole","pASSWurd"] as String[]

    def env = [

    (JMXConnector.CREDENTIALS): credentials

    ]

    def serverUrl =

    ''service:jmx:rmi:///jndi/rmi://localhost:9010/jmxrmi''

    def server = JmxFactory.connect(

    new JmxUrl(serverUrl), env).MBeanServerConnection

    def mbean = new GroovyMBean(server,

    ''book.jakartapro.mxbeans:type=MonitoringBean'')

    println("Elapse: " + mbean.Elapse)

    ```


    注意 `mbean.Elapse` 中首字母大写的 `E`。该字段是首字母小写的 `elapse`，但 `GroovyMBean` 将其转换为首字母大写的
    `.Elapse` 访问器。

    Groovy JMX 客户端的强大功能怎么强调都不为过。你可以做很多花哨的事情，比如过滤、进一步聚合、添加告警阈值、将监控数据写入文件或通过电子邮件发送、通过
    Swing 或 JavaFX 呈现图表等。


    **监控框架**


    企业级监控的目标是网络和服务器的可用性、稳定性和性能；衡量描述服务的技术指标；并监控应用程序特性。功能完善的监控平台通常通过 Web 应用程序展示其活动，其中显示图表和告警。

    存在多种监控平台产品。Nagios 可能是其中最常被提及的，尽管在企业环境中使用它会产生可观的许可费用。^(¹) 另一个具有友好许可协议并带有 JMX 数据适配器的产品叫做
    Zabbix。

    你可以从 [`https://www.zabbix.com/`](https://www.zabbix.com/) 下载该软件，包括文档。

    进一步介绍 Zabbix 超出了本书的范围，但你可以从 Zabbix 主页获取更多信息。


    **脚注**


    35. 使用 Fluentd 的日志管道


    从开发角度来看，日志记录通常意味着包含一个日志库，如 Slf4j、Log4j 或 Logback，并在代码中添加日志语句。然后，日志记录器将日志信息追加到文件中，报告应用程序运行时发生的功能或技术事件。日志信息可用于排查问题或进行审计。


    注意

    '
- fmt: '根据所使用的库不同，日志记录器也可能被配置为将日志数据发送到其他目的地，例如数据库或消息队列。然而，如果你考虑可靠性，让日志记录器写入文件是最稳定的选择。毕竟，对文件系统的访问由操作系统提供，无需网络运行或在服务器上启动额外进程即可进行日志记录。因此，将日志写入文件是迄今为止最常用的方法。


    超越单个应用服务器，从更广泛的企业角度来看，收集日志数据的需求随之产生。这简化了服务器维护，并帮助运维人员高效完成工作。为此，可以使用日志数据收集器。它们作为一种架构组件，能够从多个来源收集和聚合日志信息。经过一些可选的过滤和转换操作后，日志数据可以被转发到不同的目的地，例如文件、数据库、监控应用程序、消息系统等。收集和聚合日志数据并非`Jakarta
    EE`规范的一部分。尽管如此，该主题被认为足够重要，因此本章将讨论`Fluentd`日志数据收集器。还有类似的产品，如`Logstash`、`Logagent`、`Filebeat`、`Rsyslog`等，但我喜欢`Fluentd`配置日志管道的声明式方式。此外，`Fluentd`在其内部处理中使用`JSON`作为消息格式，并将其作为专用输出格式。这使得在消费日志信息的中央企业组件中进一步处理日志数据变得容易。


    ## 安装 Fluentd


    `Fluentd`可以安装在`Linux`、`Windows`和`macOS`上。在实际安装`Fluentd`之前，手册建议执行几个预安装步骤：


    1.  设置`NTP`守护进程以获得准确的时间戳。

    2.  将最大文件描述符数量增加到`65535`（`Linux`）。

    3.  优化网络内核参数（`Linux`）。


    详情请参阅文档：[`https://docs.fluentd.org/`](https://docs.fluentd.org/)。


    > **注意**：出于测试目的，你无需执行任何这些准备步骤。


    安装选项如下：


    *   对于`Windows`，有`MSI`安装程序。

    *   对于`Mac`，有`DMG`包。

    *   对于`Linux`，有`RPM`（`Red Hat`）或`DEB`（`Debian`/`Ubuntu`）包。

    *   如果你的系统上安装了`Ruby`，你可以使用`gem`来安装`Fluentd`。

    *   你可以从源代码编译`Fluentd`。


    [`https://docs.fluentd.org/installation`](https://docs.fluentd.org/installation)上的页面提供了更多详细信息。

    `Fluentd`进程可以作为命令或操作系统服务运行。为简单起见，本章其余部分假设使用`fluentd`命令启动`Fluentd`。


    ## 运行 Fluentd


    为了确定`Fluentd`是否正常运行，你必须首先在某处创建一个空文件夹，并让`Fluentd`在其中创建基本配置：


    ```

    # terminal 1

    mkdir fluentd

    fluentd --setup ./fluent

    ```


    > **注意**：此操作适用于`Linux`。对于`Windows`或`macOS`，请使用相应的命令语法。


    在另一个终端中，启动`Fluentd`并让它作为前台进程运行：


    ```

    fluentd -c ./fluent/fluent.conf

    ```'
  raw: "Depending on which library is used, loggers might also be configured\nto send\
    \ logging data to other destinations, such as databases or message\nqueues. However,\
    \ letting loggers write to files is the most stable\noption if you're thinking\
    \ about reliability. After all, access to the\nfile system is provided by the\
    \ operating system and there is no need to\nhave the network running or to start\
    \ additional processes on the server\nfor logging to work. Thus, writing logging\
    \ to files is by far the most\ncommonly used method.\n\nBeyond individual application\
    \ servers and\nfrom a more enterprise-wide point of view, the need to collect\
    \ logging\ndata arises. It simplifies server maintenance and helps the operations\n\
    staff do their job efficiently. For these purposes, logging data collectors\n\
    can be used. They serve as an architectural component capable of\ncollecting and\
    \ aggregating logging information from multiple sources.\nAfter some optional\
    \ filtering and transformation operations, the logging\ndata can then be forwarded\
    \ to different destinations, such as files,\ndatabases, monitoring applications,\
    \ messaging systems, and more.\nCollecting and aggregating logging data is not\
    \ part of the Jakarta EE\nspecification. Nevertheless, the topic is considered\
    \ important enough,\nso this chapter talks about the Fluentd logging data collector.\
    \ There are\nsimilar products,\nsuch as Logstash, Logagent, Filebeat, Rsyslog,\
    \ and others, but I like\nthe declarative way that Fluentd configures logging\
    \ pipelines. In\naddition, Fluentd uses JSON as a message format\nfor its internal\
    \ processing and also as the dedicated output format.\nThis makes it easy to further\
    \ process logging data in central enterprise\ncomponents consuming logging information.\n\
    \nInstalling Fluentd\n\nFluentd can be installed on Linux,\nWindows, and macOS.\
    \ Before actually installing Fluentd, the manual\nrecommends a few pre-installation\
    \ steps:\n\n1.  Set up an NTP daemon for accurate time stamps.\n\n2.  Increase\
    \ the maximum number of file descriptors to 65535 (Linux).\n\n3.  Optimize network\
    \ kernel parameters (Linux).\n\nFor details, see the documentation at [`https://docs.fluentd.org/`](https://docs.fluentd.org/).\n\
    \nNote\n\nFor testing purposes, you don’t need to run any of these\npreparational\
    \ steps.\n\nInstallation options are as follows:\n\n*   For Windows, there is\
    \ an MSI installer.\n\n*   For Mac, there is a DMG package.\n\n*   For Linux,\
    \ there is an RPM (Red Hat) or DEB (Debian/Ubuntu)\n    package.\n\n*   With Ruby\
    \ installed on your system, you can use `gem` to install\n    Fluentd.\n\n*  \
    \ You can compile Fluentd from the sources,\n\nThe pages at [`https://docs.fluentd.org/installation`](https://docs.fluentd.org/installation)\n\
    provide more details.\nThe Fluentd process can be run as a command or as an OS\
    \ service. For\nsimplicity, the rest of this chapter assumes that Fluentd is started\n\
    using the `fluentd` command.\n\nRunning Fluentd\n\nIn order to determine whether\
    \ Fluentd is running correctly, you\nmust first create an empty folder somewhere\
    \ and let Fluentd create a\nbasic configuration inside it:\n\n```\n\n# terminal\
    \ 1\nmkdir fluentd\nfluentd --setup ./fluent\n```\n\nNote\n\nThis is for Linux.\
    \ For Windows or macOS, use the corresponding\ncommand syntax.\n\nIn another terminal,\
    \ start Fluentd and let it run as a foreground\nprocess:\n\n```"
