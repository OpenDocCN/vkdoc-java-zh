    使用 VisualVM 进行代码级监控

    VisualVM 是一款监控与管理工具，可处理运行中 JVM 的各个方面。它内置了一个名为 Sampler 的插件，该插件会定期查询 JVM 状态，包括方法调用的耗时。通过这种方式，无需编写一行代码或更改服务器配置，即可发现性能瓶颈。


    注意


    你可以从 [`https://visualvm.github.io/index.html`](https://visualvm.github.io/index.html)
    下载 VisualVM。


    VisualVM 可以使用与应用服务器不同的 Java 版本运行。VisualVM 与 OpenJDK 16 或 17 存在一个小问题——工具提示文本无法可靠显示，这给操作带来了一点不便。使用
    OpenJDK 15 则没有问题。


    例如，你可以向一个 REST 控制器添加一个耗时的操作。下面的方法展示了一种计算 `pi` 常量的不太聪明的方式：


    ```

    @Path("/pi")

    @GET

    @Produces("application/json")

    public String pi() {

    return "{\"pi\":" + calcPi() + "}";

    }

    private double calcPi() {

    int d = 1;

    double sum = 0;

    for(int i=0;i<100_000_000;i++) {

    if(i % 2 == 0) sum += 4.0/d; else sum -= 4.0/d;

    d += 2;

    }

    return sum;

    }

    ```


    你可以编写一个包含 `pi()` 方法的新 Web 应用程序，或者将其临时添加到一个现有的控制器中——这取决于你。

    在 JMeter 测试计划中，你可以模拟许多并发用户调用 `pi()` 方法。为简单起见，你可以为此使用一个无限循环。


    启动 VisualVM 后，将其连接到 GlassFish 应用程序，打开 Sampler 插件，然后点击 CPU 按钮开始获取性能数据。点击 Hot Spots
    视图按钮。几秒钟后，你将看到一个表格，其中显示了最耗时的那些方法。参见图 36-7。


    ![](img/490565_1_En_36_Fig7_HTML.jpg)


    VisualVM 窗口在本地选项下选择 GlassFish，打开 Sampler 插件，并点击 CPU 按钮开始获取性能数据。它呈现出一个包含名称、自身时间和总时间的表格。


    图 36-7

    工作中的 VisualVM


    正如预期的那样，`calcPi()` 显示在此列表的顶部。


    代码优化


    导致性能瓶颈的可能原因有很多。不可能构建一个类似检查清单的东西来避免所有这些问题。尽管如此，以下列表为你提供了一些避免此类缺陷的提示：


    *   根据具体情况，函数式构造可能优于过程式设置。但是，你必须留意中间终止操作。在函数式表达式中构建大型集合（如列表、集合或映射）是一项耗时的操作。


    *   避免在大型循环中构造过多对象。


    *   尽管通常被认为过时，但使用数组代替集合可以显著加快应用程序的速度。


    *   对于数据库操作，请考虑使用缓存。


    *   除非绝对必要，否则避免使用反射。与直接的、语言级别的访问相比，对 Java 对象的反射访问要耗时得多。


    *   使用 JMS 传输数据通常能带来清晰稳定的架构。但是，要注意陷阱——与更直接地寻址远程对象（例如通过 REST 接口或 RMI）相比，消息传递更耗时。另一方面，由于其异步性，JMS
    消息传递可能会提升性能。详细分析有助于避免缺陷。


    *   避免将 JMS 用于并发构造。当前版本的 Jakarta EE 处理并发的效率远高于旧版本，在旧版本中 JMS 被滥用于同一目的。


    *   在可能的情况下，优先使用 JSON 而非 XML。JSON 比 XML 更精简，处理大型 JSON 结构比处理等效的 XML 数据耗时更少。


    *   尽可能避免文件操作。将数据写入内存而非文件要快得多。


    *   避免过度广泛的日志记录。


    *   配置不当的垃圾回收程序可能导致性能问题。第 37 章将讨论垃圾回收。


    37. 垃圾回收


    垃圾回收是 Java 用来清除未使用对象、释放相关堆内存的清理过程。随着时间的推移，Java 垃圾回收器经历了许多变化，垃圾回收器的发展历史实际上相当有趣。然而，详细描述古老的垃圾回收器超出了本书的范围，因此本章将其描述限制在最常用的三种垃圾回收器——G1
    垃圾回收器、Shenandoah GC 和零垃圾回收器。有兴趣的读者可以在网上找到关于其他垃圾回收器的信息。


    垃圾回收器的重要性


    垃圾回收发生在后台，而应用服务器正在运行。从应用程序开发人员的角度来看，垃圾回收器在不干扰应用程序的情况下完成其工作——垃圾回收器不可能在功能上做一些有趣的事情。尽管如此，垃圾回收器
    (GC) 可以通过以下一种或多种方式影响应用程序的运行：


    *   如果 GC 配置错误，它可能无法正常完成其工作。未释放的内存可能会堆积，最终导致内存不足错误和应用程序崩溃。


    *   GC 需要一个或多个线程来完成其工作。这需要应用程序无法使用的计算能力。


    *   由于 GC 的工作方式，GC 必须时不时地停止应用程序线程。显然，这种 STW（停止世界）周期应减少到最低限度。STW 周期长度通常被称为*延迟*。


    *   应用程序中的错误可能会阻止 GC 释放未使用的对象。这可能导致应用程序崩溃。此类错误被称为*内存泄漏*。


    由于这些原因，GC 指标应包含在性能/稳定性测试中。幸运的是，这并不复杂。所有 GC 都通过 JMX 发布自己的性能指标。例如，在 JMeter 中，你可以添加
    Groovy 脚本，将通过 JMX 查询的数字写入其他测试结果文件中。

    没有规则可以确定哪种 GC 最适合你的应用程序，以及选择哪些配置选项以获得最大的 GC 性能和稳定性。因此，你必须遵循启发式方法，并使用各种 GC 选项运行性能和负载测试，以查看哪种
    GC 设置最适合你。


    G1 垃圾回收器

    G1 垃圾回收器，也称为 *Garbage First*，是为大堆内存和多处理器机器而设计的。自 JDK 9 版本起，它是默认的 GC。

    在你常用的搜索引擎中输入 `java g1 options` 以了解有关 G1 选项的更多信息。


    Shenandoah GC


    与 G1 相比，Shenandoah GC 旨在实现更低的延迟，尤其是对于更大的堆。它可选地包含在 JDK 11 中，但需要在构建时选择加入。它在 JDK
    12 到 16 版本中被移除，但在 JDK 17 中完全回归。你可以通过以下标志启用此垃圾回收器：


    ```

    -XX:+UseShenandoahGC

    ```


    在你常用的搜索引擎中输入 `java shenandoah options` 以了解有关 Shenandoah GC 选项的更多信息。


    零垃圾回收器

    Z 垃圾回收器是一种低延迟垃圾回收器，其 STW（停止世界，即暂停应用程序）周期保证小于十毫秒。它还声称可以处理 TB 级别的堆内存而不会显著降级。对于可能有
    1000 个或更多用户的高流量应用程序，零垃圾回收器可能是你的最佳选择。


    要启用零垃圾回收器，请将以下内容添加到 `java` 命令中：


    ```

    -XX:+UseZGC

    ```

