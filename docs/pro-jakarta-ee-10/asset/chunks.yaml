  trans: "\n本章介绍如何使用 JJWT（Java JSON Web Token）库来保护 REST 端点。内容聚焦于浏览器与服务器之间的通信，因此仅涵盖\
    \ JWT 和 JWS。所有其他 REST 安全规范或许能提升安全性，但它们不易适用于浏览器与服务器之间的通信。如果你也考虑使用这些规范，请查阅相关规范以及\
    \ [`https://github.com/jwtk/jjwt`](https://github.com/jwtk/jjwt) 上的 JJWT 文档。\n\
    \nREST URL 的安全约束\n\n假设你有一个单页应用（SPA），其中包含一个名为 `index.html` 的 HTML 页面和两类 REST 数据查询，如下所示：\n\
    \n```\n/data/unsecured/*\n/data/secured/*\n```\n\n以下章节将向你展示如何开发一种方法，将 JWT 安全应用于\
    \ `/data/secured/*` 这类 REST URL。\n\n关于 JSON Web Token\nJSON Web Token（JWT）是客户端-服务器通信中断言一系列声明（claims）的数据片段。它们在\
    \ RESTful 应用中尤其有用，此类声明可以是用户名、角色分配等信息。\n\n生成和校验 JWT 以确保用户通过身份验证的主要思路如下：\n\n1. \
    \ 用户启动登录流程，将凭据（用户名和密码）发送至服务器。这通常通过 AJAX 调用完成，典型方式为 `POST` 或 `PUT` 请求。\n2.  服务器尝试对用户进行身份验证。\n\
    3.  如果身份验证失败，则构建一个*不含* JWT 的响应，服务器从该调用返回。\n4.  否则，服务器生成一个新的 JWT。\n5.  使用密钥对 JWT\
    \ 进行签名，该密钥与用户名和签名密钥一起存储在某个数据库中。JWT 在响应头中返回。\n6.  浏览器客户端接收 JWT 并将其存储在浏览器会话中。\n\
    7.  在随后的每次 AJAX 请求中，客户端（浏览器）都会在请求头中发送该 JWT。服务器决定是否检查传输的 JWT，并相应地返回成功或失败的响应。\n\n\
    参见图 14-1。\n\n![](img/490565_1_En_14_Fig1_HTML.png)\n\nJWT 流程的框图。客户端请求用户名和密码，这些信息被发送到服务器。服务器对用户名、声明进行身份验证并签名，然后将响应发送回客户端。客户端将任何后续请求发送到服务器以检查\
    \ JWT 流程，并发送响应。\n\n图 14-1\nJWT 流程\n\n注意\n\n与通常的安全敏感型应用一样，协议应强制使用 TLS。在 GlassFish\
    \ 中，你可以禁用不安全的 HTTP 监听器；对于其他服务器产品，请查阅相关文档。\n\n由于使用了秘密（私有）密钥，服务器可以确保 JWT 未被篡改。从客户端（浏览器）的角度来看，JWT\
    \ 是一段可能包含用户组等声明的数据。如果客户端对这些声明不感兴趣，JWT 会在请求和响应头中传递，而忽略其任何结构或内容。\n\n准备 GlassFish\n\
