- fmt: "### The `<ui:include>` Tag\n\nInclude another XHTML file, as follows:\n\n\
    ```\n<ui:include src=\"someFile.xhtml\"/>\n```\n\nIf the file contains a `<ui:composition>`\
    \ or a `<ui:component>`, only the inner contents of the `<ui:composition>` or\
    \ `<ui:component>` will be included. This allows designers to style the included\
    \ files independent of their later plumbing together by the server.\n\n### First\
    \ Variation of the `<ui:composition>` Tag\n\nIf this is used *without* `template=\"\
    ...\"`, as in the following:\n\n```\n<ui:composition>\n    ...\n</ui:composition>\n\
    ```\n\nIt defines a subtree (collection) of HTML elements. The idea behind that\
    \ is, if you use `<ui:include>` and the file included contains a `<ui:composition>\
    \ ... </ui:composition>`, only the inner contents of the `<ui:composition> ...\
    \ </ui:composition>` will be included. The tag itself and anything around it will\
    \ be ignored. So you can let page designers create a completely valid XHTML file,\
    \ put a `<ui:composition> ... </ui:composition>` around interesting parts, and\
    \ write `<ui:include>` in any other Faces pages to extract exactly such parts.\n\
    \n### Second Variation of the `<ui:composition>` Tag\n\nIf it’s used *with* `template=\"\
    ...\"`, as in the following:\n\n```\n<ui:composition template=\"someTemplate.xhtml\"\
    >\n    ...\n</ui:composition>\n```\n\nIt defines a collection of XHTML snippets\
    \ to be passed into placeholders inside the template file (corresponding to the\
    \ `template=\"...\"` attribute).\n\nThis is a completely different usage scenario\
    \ compared to `<ui:composition>` without `template=\"...\"`. In the template file,\
    \ you have one or more elements, such as `<ui:insert name=\"name1\" />`, and in\
    \ the file with the `<ui:composition template=\"...\">`, you use `<ui:define>`\
    \ tags *inside* the `<ui:composition template=\"...\"> ... </ui:composition>`,\
    \ as follows:\n\n```\n<ui:composition template=\"someTemplate.xhtml\">\n    <ui:define\
    \ name=\"name1\">\n        ...\n    </ui:define>\n    <ui:define name=\"name2\"\
    >\n        ...\n    </ui:define>\n</ui:composition>\n```\n\nThis defines contents\
    \ to be used for the `<ui:insert>` tags. Anything around the `<ui:composition>`\
    \ tag will be ignored again, so you can let designers create the snippets using\
    \ non-Faces-aware HTML editors and only later extract interesting parts with `<ui:define\
    \ name=\"someName\"> ... </ui:define>`, to be used for materializing the template\
    \ file.\n\n### The `<ui:insert>` Tag\n\nUse this tag to define placeholders inside\
    \ template files. Using this tag inside a template file means that any file referring\
    \ to this template may define contents for the placeholders:\n\n```\n<ui:insert\
    \ name=\"name1\">\n    ...\n</ui:insert>\n```\n\nThis definition has to happen\
    \ inside of `<ui:composition>`, `<ui:component>`, `<ui:decorate>`, or `<ui:fragment>`.\n\
    \nUsually you don’t provide contents in this tag. If however you add contents,\
    \ such as:\n\n```\n<ui:insert name=\"name1\">\n    Hello\n</ui:insert>\n```\n\n\
    It will be taken as a default if the placeholder is not otherwise defined.\n\n\
    ### The `<ui:define>` Tag\n\nThis tag declares what will be inserted at the insertion\
    \ points:\n\n```\n<ui:define name=\"name1\">\n    Contents...\n</ui:define>\n\
    ```\n\nSince insertion points can only exist in template files, the `<ui:define>`\
    \ tag can only show up in files referring to template files via `<ui:composition\
    \ template=\"...\">`.\n\n### The `<ui:param>` Tag\n\nSpecify a parameter that’s\
    \ passed to an `<ui:include>`-ed file, or to the template specified in `<ui:composition\
    \ template=\"...\"> ...`. Simply add as a child element, such as:\n\n```\n<ui:include\
    \ src=\"someFile.xhtml\">\n    <ui:param name=\"paramName\" value=\"paramValue\"\
    />\n</ui:include>\n```\n\nInside the referred-to file, use `#{paramName}` to use\
    \ the parameter:\n\n```\n<ui:composition>\n    <h:outputText value=\"#{paramName}\"\
    />\n</ui:composition>\n```\n\n### The `<ui:component>` Tag\n\nThis is the same\
    \ as the first variation of `<ui:composition>`, without template specification.\
    \ It adds an element to the Faces component tree. It supports the following attributes:\n\
    \n- `id` for the element’s ID in the component tree. It’s not required, and Faces\
    \ generates an automatic ID if you don’t specify it. May be an EL (expression\
    \ language) string value.\n- `binding` for binding the component to a Java class\
    \ (must inherit from `jakarta.faces.component.UIComponent`). Not required. May\
    \ be an EL string value (class name).\n- `rendered` for determining whether the\
    \ component is to be rendered. Not required. May be an EL boolean value.\n\nIt\
    \ is common practice to use `<ui:param>` to pass parameters to components. You\
    \ can for example tell the component to use a particular ID. Caller:\n\n```\n\
    <ui:component>\n    <ui:param name=\"id\" value=\"myId\"/>\n    ...\n</ui:component>\n\
    ```\n\nCallee (`comp1.xhtml`):\n\n```\n<ui:composition>\n    <h:panelGroup id=\"\
    #{id}\">\n        ...\n    </h:panelGroup>\n</ui:composition>\n```\n\n### The\
    \ `<ui:decorate>` Tag\n\nSimilar to `<ui:composition>`, but it does *not* disregard\
    \ the XHTML code around it:\n\n```\n<html>\n    <body>\n        <h1>I'm written\
    \ to the output!</h1>\n        <ui:decorate template=\"templ.xhtml\">\n      \
    \      <ui:define name=\"content\">\n                I'm passed to \"templ.xhtml\"\
    , you can refer to me in \"templ.xhtml\" via <ui:insert name=\"content\"/>\n \
    \           </ui:define>\n        </ui:decorate>\n    </body>\n</html>\n```\n\n\
    In contrast to `<ui:composition>`, the file with the `<ui:decorate>` will contain\
    \ the completely valid XHTML code, including `html`, `head`, and `body`, and the\
    \ template file will be inserted where the `<ui:decorate>` appears. It therefore\
    \ must not contain `html`, `head`, or `body`. This is thus more or less an extended\
    \ “include,” where passed-over data is not given by the attributes but in the\
    \ `body` tag instead. You usually apply the `<ui:decorate>` tag to further elaborate\
    \ code snippets. You can wrap them into more `<div>`s to apply more styles, add\
    \ a label or a heading, and more.\n\n### The `<ui:fragment>` Tag\n\nSimilar to\
    \ `<ui:decorate>`, but this tag creates an element in the Faces component tree.\
    \ It has the following attributes:\n\n- `id` for the element’s ID in the component\
    \ tree. This is not required, and Faces generates an automatic ID if you don’t\
    \ specify it. May be an EL (expression language) string value.\n- `binding` for\
    \ binding the component to a Java class (must inherit from `jakarta.faces.component.UIComponent`).\
    \ Not required. May be an EL string value (class name).\n- `rendered` for indicating\
    \ whether the component is to be rendered. Not required. May be an EL boolean\
    \ value.\n\nYou can use this tag to extract existing code snippets and to convert\
    \ them partly to a component. For example, consider the following code:\n\n```\n\
    <h:panelGroup>\n    <h:dataTable value=\"#{bean.items}\" var=\"item\">\n     \
    \   ...\n    </h:dataTable>\n</h:panelGroup>\n```\n\nIf you now extract the table\
    \ to a different file, called `table1_frag.xhtml`:\n\n```\n<ui:fragment>\n   \
    \ <h:panelGroup>\n        <h:outputText value=\"I am the table caption\"/>\n \
    \       <h:dataTable value=\"#{bean.items}\" var=\"item\">\n            ...\n\
    \        </h:dataTable>\n    </h:panelGroup>\n</ui:fragment>\n```\n\nYou have\
    \ introduced XHTML (the caption) and a new component (the table).\n\n### The `<ui:repeat>`\
    \ Tag\n\nThis is not a necessarily templating-related tag, but it’s used to loop\
    \ over a collection or an array. Its attributes are:\n\n- `begin`. Not required.\
    \ If it’s specified, it’s the iteration’s first index in the list or array. May\
    \ be an `int` valued value expression.\n- `end`. Not required. If it’s specified,\
    \ it’s the iteration last index (inclusive) in the list or array. May be an `int`\
    \ valued value expression.\n- `step`. Not required. If it’s specified, it’s the\
    \ stepping that inside the list or array. May be an `int` valued value expression.\n\
    - `offset`. Not required. If it’s specified, it’s an offset that’s added to the\
    \ iterated-over values. May be an `int` valued value expression.\n- `size`. Not\
    \ required. If it’s specified, it is the maximum number of elements to read from\
    \ the collection or array. Must not be greater than the collection’s array size.\n\
    - `value`. The list or array to iterate over. An `Object` valued expression. Required.\n\
    - `var`. The name of an expression language variable that holds the current item\
    \ of the iteration. May be a `String` value expression.\n- `varStatus`. Not required.\
    \ The name of a variable that holds the iteration status. A POJO with read-only\
    \ values: `begin` (int), `end` (int), `index` (int), `step` (int), `even` (boolean),\
    \ `odd` (boolean), `first` (boolean), and `last` (boolean).\n- `rendered`. Whether\
    \ or not the component is to be rendered. Not required. May be an EL boolean value.\n\
    \n**Note**\n\nThe JSTL (Java Standard Tag Library) collection provides a `<c:forEach>`\
    \ tag for looping. Faces and JSTL do not work together very well because of conceptional\
    \ differences. In tutorials and blogs, you will find lots of examples of `for`\
    \ loops with JSTL. It is, however, better to use `<ui:repeat>` to avoid problems."
