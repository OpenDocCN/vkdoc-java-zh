    ## 基本流程设置


    流程遵循“约定优于配置”的范式。因此，你不需要为基本流程进行配置。约定如下：


    1.  在`src/main/webapp`目录下创建一个名为`flow-name`的文件夹。你可以选择任何你喜欢的文件夹名称，但按照约定，文件夹名称也将作为流程名称。

    2.  在`src/main/webapp/flow-name`目录下创建一个名为`flow-name-flow.xml`的空文件。文件名的第一部分`flow-name`*必须*与流程名称匹配。因此，如果你的流程名为`flow-a`，则必须有一个名为`src/main/webapp/flow-a`的文件夹，并且这个空文件必须命名为`flow-a-flow.xml`。由于此文件存在，Faces知道该文件夹属于一个流程。如果你以后需要配置流程，配置将放入此文件中。

    3.  在`src/main/webapp/flow-name`目录下创建一个名为`flow-name.xhtml`的流程起始页面。不带后缀的文件名`flow-name`*必须*与流程名称匹配。这是一个标准的Faces
    XHTML页面。

    4.  在`src/main/webapp/flow-name`目录下创建任意数量的后续流程页面。对使用的名称没有限制。

    5.  为了在流程中保存数据（用户输入）并处理导航情况，创建一个带有`@Named`（导入`jakarta.inject`）和`@FlowScoped(value
    = "flow-name")`注解的Bean类。这个Bean还必须实现`java.io.Serializable`。这是一个普通的支持Bean，但它仅对流程内的XHTML页面可用。`value`属性*必须*与流程名称匹配。

    6.  在`src/main/webapp/flow-name`文件夹*外部*创建一个名为`flow-name-return.xhtml`的文件。文件名中`-return.xhtml`之前的部分*必须*与流程名称匹配。这是流程的出口点。它是一个标准的Faces
    XHTML页面，但你无法在此处使用`@FlowScoped` Bean——它将在页面被调用之前被销毁。


