  视图页面


  视图页面可能是 Java MVC 中最具挑战性的部分。原因如下：


  *   你需要知道如何与控制器通信以进行导航。

  *   你需要知道如何读取和写入模型数据。

  *   你需要知道如何遍历集合以及如何做出决策。

  *   你需要知道如何应用样式。


  对于 Java MVC，你将 JSP 页面作为视图元素放置在 `src/main/webapp/WEB-INF/views` 文件夹中。这是一种约定。也可以使用
  Facelets 和 XHTML 模板文件来实现此目的。但是，由于这里不应用基于组件的架构，并且某些 Facelet 结构（如表单和重复）如果在 Java MVC
  上下文中使用会导致问题，因此使用 JSP 和 JSTL 是更自然的选择。


  对于 Pet Shop 应用程序，你需要提供一个 `404.jsp` 文件来处理任何错误消息：


  ```


  [ ... 见下文 ...]


  ${msg.get("header.brand")}


  ${msg.get("404.title")}

  ${petNumber}


  ```


  此外，你需要一个 `index.jsp` 文件来显示宠物列表：


  ```


  ${msg.get("page.title")}


  ${msg.get("header.brand")}


  ${msg.get("index.title")}


  ${msg.get("index.btn.new")}


  ${msg.get("index.col.petNumber")}


  ${msg.get("index.col.name")}


  ${msg.get("index.col.status")}


  ${pet.petNumber}

  ${pet.name}


  ${msg.get("index.badge.active")}


  ${msg.get("index.badge.reserved")}


  ${msg.get("index.btn.details")}


  ${msg.get("index.btn.reserve")}


  ${msg.get("index.btn.delete")}


  暂无条目


  ```


  `details.jsp` 文件内容如下：


  ```


  [ ... 见下文 ...]


  ${msg.get("header.brand")}


  ${msg.get("details.title")}


  ${msg.get("details.petNumber")}


  ${msg.get("details.name")}


  ${msg.get("details.status")}


  ```


  最后一个文件 `form.jsp` 内容如下：


  ```


  [ ... 见下文 ...]


  ${msg.get("header.brand")}


  新建宠物


  ${msg.get("form.label.name")}


  ${error.getParamName()}: ${error.getMessage()}


  ${msg.get("form.btn.save")}


  ```


  所有视图文件都放在 `src/main/webapp/WEB-INF/views` 目录下，并且它们都有相同的 `<head>` 部分：


  ```


  ${msg.get("page.title")}


  ```


  （请务必删除以 `/` 结尾的行后的换行符和空格）。


  视图文件有几个特点值得一提：


  *   像 `${petNumber}` 这样的字符串直接引用模型值。例如，参见 `404.jsp` 文件的末尾。此模型参数通过 `models.put( "petNumber",
  petNumber );` 在控制器中设置。

  *   像 `${msg.get("header.brand")}` 这样的字符串引用 `Messages` 类。这是因为它的 `@Named("msg")`
  注解。

  *   像 `${mvc.uri(’PetshopController#showIndex’)}` 这样的字符串表示导航到由调用控制器的 `showIndex()`
  方法的结果所指定的页面。这在 JSR-371 规范中有描述。

  *   `<head></head>` 中的 `/webjars` URL 部分来自 bootstrap 库。这不是 Java MVC 特有的，其细节由 bootstrap
  文档描述。


