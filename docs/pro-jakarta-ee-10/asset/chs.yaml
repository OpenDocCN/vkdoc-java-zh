  \ Facelets 应用程序\n\n8.  Faces 自定义组件\n\n自定义组件允许开发者设计自己的 Faces 组件。关键在于可用性——自定义组件可以轻松移植到其他项目，甚至可以考虑构建一个公司级的自定义组件库。\n\
  \n定义自定义组件主要有三种方式。首先，你可以定义标签文件，然后在 `web.xml` 中将其注册为你自己的自定义命名空间。其次，你可以使用 Faces 的*复合组件*功能。在这里，你只需使用\
  \ XHTML 文件来定义组件的接口和实现。第三，你可以使用自定义 Java 类来定义组件。以下各节将分别介绍这三种方法。\n\n自定义标签库\n\n在这里，你为\
  \ XHTML 页面定义自己的 XML 命名空间，本示例使用在特殊 XHTML 文件中定义的组件。创建自定义标签库的步骤如下：\n\n1.  创建一个名为 `mycomponent.xhtml`\
  \ 的组件定义文件，并将其放置在 `src/main/webapp/WEB-INF/tags` 文件夹中（如果该文件夹不存在，请创建）。文件名可以自由命名，但请记下它，因为配置文件会用到。\n\
  \n2.  创建一个名为 `mytaglib.taglib.xml` 的标签库描述符文件。文件名同样可以自由命名，但它也会被用于配置文件中。你需要在此文件中描述新组件。\n\
  \n3.  使用 `web.xml` 注册新的标签库描述符。\n\n例如，你将创建一个简单的日期输入组件。该示例不会添加弹出日历等图形化功能，但你以后可以扩展它来实现此类功能。这里，你只需处理以\
  \ YYYY-MM-DD 格式输入的正确用户输入。\n\n在 `src/main/webapp/WEB-INF/tags` 目录下创建一个名为 `fancyDateInput.xhtml`\
  \ 的文件，内容如下：\n\n请记住，`<ui:composition>` 标签周围的代码将被忽略，因此你需要添加 `<html>` 来声明命名空间，使其成为一个格式良好的\
  \ XHTML 文档。`#{idParam}` 和 `#{valueParam}` 标签是组件参数。\n\n接下来，在 `src/main/webapp/WEB-INF`\
  \ 目录下创建一个名为 `mytaglib.taglib.xml` 的文件。其内容如下：\n\n```\n\nhttp://book.jakartapro.mytaglib\n\
  \nfancyDate\ntags/fancyDateInput.xhtml\n\n```\n\n（删除 `jakartaee/.` 之后的换行和空格。）命名空间可以是任何内容，但必须唯一，并且最好指向你的公司。\n\
  \n现在，你必须注册新的标签库。为此，请在 `src/main/webapp/WEB-INF/web.xml` 文件中添加以下内容：\n\n```\n\n...\n\
  \njavax.faces.FACELETS_LIBRARIES\n/WEB-INF/mytaglib.taglib.xml\n\n...\n\n```\n\n\
  要在任何 XHTML 页面中使用这个新组件，你首先必须声明新的自定义命名空间。之后，你就可以像使用其他任何组件一样使用它：\n\n```\n\n...\n\n\
  ...\n\n```\n\n你可以看到，属性名称引用了 `fancyDateInput.xhtml` 文件中使用的 `#-` 参数。\n\n复合组件\n\n与自定义标签库相比，复合组件更轻量级。虽然它们隐式地定义了一个新的非公共命名空间，但你无需定义和注册标签库即可使用它们。定义复合组件的步骤如下：\n\
