- "# 7. Facelets\n\n本章介绍如何使用 Faces 4.0 内置的模板引擎，即 *Facelets*。与使用纯 Faces 相比，你可以使用 Facelets\
  \ 进一步模块化前端代码，并提高代码质量、复用性和可维护性。\n\n注意\n\nFaces 的旧名称 *JSF* 已不再使用。\n\n## 通过 Facelets\
