- "# 29. 缓存\n\n从大型数据库访问数据或使用复杂的 `select` 子句可能非常耗时。此外，应用程序经常多次使用相同的数据库访问语句，这可能会让你思考是否有办法缩短此类数据库查询。这种捷径能否帮助应用程序更快地响应用户查询，并避免数据库服务器负载过高？这正是*缓存*的作用所在。它位于执行数据库查询的客户端代码和数据库访问本身之间，当之前执行过相同的查询时，它会代表数据库来响应数据库查询。\n\
  本章介绍如何将 Ehcache 用于 Hibernate 持久化提供程序。\n\n## 安装 Ehcache\n\n要安装 Ehcache，请将以下依赖项添加到你的构建文件中：\n\
  \n```\n// 对于 Gradle：\n...\ndependencies {\n...\n// 假设你使用以下 Hibernate 版本\nimplementation\
  \ 'org.hibernate:' +\n'hibernate-core-jakarta:5.6.15.Final'\n// ... 你必须添加：\nimplementation\
  \ 'org.hibernate:' +\n'hibernate-ehcache:5.6.15.Final'\n}\n\n...\n\n...\n\norg.hibernate\n\
  hibernate-ehcache\n5.6.15.Final\n\n```\n\n## 为 Ehcache 配置 Hibernate\n\n在真正启用缓存之前，你需要告诉\
  \ Hibernate 你想要使用 Ehcache。Jakarta EE 的 Hibernate 配置在 `persistence.xml` 文件中进行，这也是你向\
  \ Hibernate 声明 Ehcache 的地方：\n\n```\n\norg.hibernate.jpa.HibernatePersistenceProvider\n\
  \n...\n\n...\n\n```\n\n（确保删除 `\"...\"` 内的换行和空格。）这里有必要对属性做一些说明；有关详细信息，请查阅 [`https://www.ehcache.org`](https://www.ehcache.org)\
  \ 上的文档。\n\n*   `hibernate.cache.use_second_level_cache`\n\n    如果你想启用二级缓存，请将其设置为\
  \ `true`。二级缓存以会话无关的方式按 ID 存储实体，这意味着它跨所有会话工作。默认值为 `false`。\n\n*   `hibernate.cache.use_query_cache`\n\
  \n    如果你想启用查询缓存，请将其设置为 `true`。查询缓存用于存储代码中显式 HQL 查询的结果，但前提是在构建 `Criteria` 对象时添加了\
  \ `.setCacheable(true)`。默认值为 `false`。\n\n*   `hibernate.cache.region.factory_class`\n\
  \n    定义用于缓存的区域工厂类。另一个可能的值是 `org.hibernate.cache.ehcache.EhCacheRegionFactory`。\n\
  \n*   `hibernate.cache.ehcache.missing_cache_strategy`\n\n    如果你没有在类的 `Cache` 注解（`region`\
  \ 参数）中显式定义区域，则此属性的 `create` 值会告诉 Hibernate 基于类名创建一个区域。否则，你会在日志中收到警告。\n\n*   `hibernate.generate_statistics`\n\
  \n    如果你希望 Hibernate 生成统计数据（包括缓存使用情况），请将其设置为 `true`。默认值为 `false`。\n\n*   `hibernate.jmx.enabled`\n\
  \n    如果你希望 Hibernate 通过 JMX 公布统计数据，请将其设置为 `true`。默认值为 `false`。\n\n*   `hibernate.jmx.usePlatformServer`\n\
  \n    如果你希望 Hibernate 使用平台 MBean 服务器进行 JMX，请将其设置为 `true`。默认值为 `false`。\n\n此外，你还需要一个\
  \ `META-INF/ehcache.xml` 文件，该文件用于定义缓存参数。示例如下：\n\nEhcache 文档会详细告诉你可以在该文件中设置的所有定义和参数。\n\
  \n## 在代码中定义缓存对象\n\nHibernate 最终会发送 SQL 语句，但由于它是一个 ORM（对象关系映射器），代码中引用的是缓存的 Java 对象。然而，Hibernate\
  \ 默认不会缓存所有对象。相反，你需要将 `org.hibernate.annotations.Cache` 注解添加到 JPA 实体类中：\n\n```\n\
  package ...;\nimport org.hibernate.annotations.Cache;\nimport org.hibernate.annotations.CacheConcurrencyStrategy;\n\
  import jakarta.persistence.Entity;\nimport jakarta.persistence.Table;\n@Entity\n\
  @Table(name = \"person\")\n@Cache(usage=CacheConcurrencyStrategy.READ_ONLY,\nregion=\"\
  Region1\")\npublic class Person {\n.... 某个 JPA 类\n}\n```\n\n`@Cache` 注解的 `region`\
  \ 参数对应于 `ehcache.xml` 文件中定义的区域。`usage` 参数指定了并发策略。你可以使用以下值之一：\n\n*   `CacheConcurrencyStrategy.NONE`\n\
  \n    无并发策略。Hibernate 不关心哪个应用程序更新或读取数据。如果存在缓存对象，无论是否有其他方访问同一张表，都会使用它们。\n\n*   `CacheConcurrencyStrategy.READ_ONLY`\n\
  \n    使用此值表示你的应用程序只从该表读取数据，从不写入。\n\n*   `CacheConcurrencyStrategy.READ_WRITE`\n\n\
  \    使用此值表示你的应用程序会读取和写入该表。\n\n*   `CacheConcurrencyStrategy.NONSTRICT_READ_WRITE`\n\
  \n    使用此值表示你的应用程序读取该表，并且偶尔也会写入。\n\n*   `CacheConcurrencyStrategy.TRANSACTIONAL`\n\
  \n    使用此值表示缓存管理器允许事务。本书不探讨事务性缓存；有关详细信息，请参阅 Ehcache 文档中的“Ehcache 中的事务”部分。\n\n##\
  \ 监控缓存活动\n\n由于你在前面的部分中启用了统计数据收集和 JMX 访问，因此可以使用 JMX 浏览器来调查缓存性能。你可以为此目的使用 [`https://visualvm.github.io/`](https://visualvm.github.io/)\
  \ 上的 VisualVM 程序。安装它并添加 MBeans 插件后，导航到 Hibernate 的统计页面，如图 29-1 所示。\n\n![](img/490565_1_En_29_Fig1_HTML.jpg)\n\
  \nVisualVM 窗口显示 JMX 访问缓存活动。它展示了 MBeans 浏览器和 MBeans 插件。它导航到 Hibernate 统计页面，该页面包含带有缓存报告的属性值。\n\
  \n图 29-1\n*VisualVM JMX 访问*\n\n"
- '# 30. NoSQL


  SQL 数据库在将现实世界的关系映射到数据存储方面做得很好。然而，开发一个大型关系结构并非易事，因为在项目后期或生产阶段，更改关系、添加或移动表列都是耗时的任务。你必须检查数据库条目关系是否仍然有效并正确关联到数据库访问代码，并检查所有客户端是否能够应对更新的数据库结构。出于这些原因，在项目开始时需要投入大量精力来创建一个无懈可击的数据库关系模型。

  为了简化结构化数据模型的更改，你必须放宽甚至放弃严格的数据库表关系。此类数据库管理系统在数据库结构频繁变化的现代使用场景中，最近获得了相当大的关注。它们提供了
  Java 客户端可用的 API。它们通常被称为“NoSQL”数据库。这是“Not-Only-SQL”的缩写，因为通常仍然可以使用类似 SQL 的传统方式访问数据，而无模式地访问数据库条目是处理表条目的首选方式。

  目前还没有最终确定的 Jakarta EE 10 标准来描述对 NoSQL 数据库的访问（参见 [`https://jakarta.ee/specifications/nosql/`](https://jakarta.ee/specifications/nosql/)
  了解正在进行的工作）。尽管如此，鉴于 NoSQL 数据库如今的重要性，本章简要介绍两种 NoSQL DBMS——CouchDB 和 MongoDB。


  ## 从 Jakarta EE 应用程序使用 CouchDB


  CouchDB 提供了一个 REST API，你可以使用 `java.net.http` 包中的 `HttpClient` 从 Java 访问该 API。假设你有一个
  CouchDB 在本地端口 5984 上运行，并且有一个管理员用户 `admin`，密码为 `PASSWD`，你首先定义几个辅助函数：


  ```

  import java.net.Authenticator;

  import java.net.PasswordAuthentication;

  import java.net.URI;

  import java.net.http.HttpClient;

  import java.net.http.HttpRequest;

  import java.net.http.HttpResponse;

  import java.net.http.HttpResponse.BodyHandlers;

  import java.nio.charset.StandardCharsets;

  import java.time.Duration;

  import java.util.Base64;

  import java.util.function.BiFunction;

  import java.util.function.Function;

  ...

  final String SERVER = "127.0.0.1:5984";

  final String USER = "admin";

  final String PASSWD = "PASSWD";

  var auth = new Authenticator() {

  protected PasswordAuthentication

  getPasswordAuthentication() {

  return new PasswordAuthentication(USER,

  PASSWD.toCharArray());

  }

  };

  var encodedAuth = Base64.getEncoder()

  .encodeToString((USER + ":" + PASSWD)

  .getBytes(StandardCharsets.UTF_8));

  Function get = (url) -> {

  return HttpRequest.newBuilder()

  .uri(URI.create("http://" + SERVER  + "/" + url))

  .timeout(Duration.ofSeconds(10))

  .header("Authorization", "Basic " + encodedAuth)

  .GET().build();

  };

  Function delete = (url) -> {

  return HttpRequest.newBuilder()

  .uri(URI.create("http://" + SERVER  + "/" + url))

  .timeout(Duration.ofSeconds(10))

  .header("Authorization", "Basic " + encodedAuth)

  .DELETE().build();

  };

  BiFunction post =

  (url,body) -> {

  return HttpRequest.newBuilder()

  .uri(URI.create("http://" + SERVER + "/" + url))

  .timeout(Duration.ofSeconds(10))

  .header("Authorization", "Basic " + encodedAuth)

  .POST(HttpRequest.BodyPublishers.ofString(body))

  .build();

  };

  BiFunction put = (url,body) -> {

  return HttpRequest.newBuilder()

  .uri(URI.create("http://" + SERVER + "/" + url))

  .timeout(Duration.ofSeconds(10))

  .header("Authorization", "Basic " + encodedAuth)

  .PUT(HttpRequest.BodyPublishers.ofString(body))

  .build();

  };

  HttpClient client = HttpClient.newBuilder()

  .version(HttpClient.Version.HTTP_1_1)

  .followRedirects(HttpClient.Redirect.NORMAL)

  .connectTimeout(Duration.ofSeconds(10))

  .authenticator(auth)

  .build();

  Function> invoke =

  (req) -> {

  try {

  return client.send(req, BodyHandlers.ofString());

  } catch (Exception e) {

  e.printStackTrace(System.err);

  return null;

  }

  };

  ```


  为简单起见，此示例使用了 lambda 表达式，但辅助函数可以很容易地转换为类方法。


  现在很容易向 CouchDB 实例发送请求。以下代码片段中故意未使用搜索语句，因为对于 CouchDB，需要创建可搜索索引和/或安装搜索插件，这超出了这个简短示例的范围。


  ```

  // ----- CouchDB 信息

  var request1 = get.apply("");

  var response1 = invoke.apply(request1);

  System.out.println(response1.statusCode() +"\n"

  + response1.body());

  // ----- 创建数据库

  var request2 = put.apply("mydb","");

  var response2 = invoke.apply(request2);

  System.out.println(response2.statusCode() + "\n"

  + response2.body());

  // ----- 创建条目

  var request3 = put.apply("mydb/001",

  "{ \"name\":\"John\", \"age\":42 }");

  var response3 = invoke.apply(request3);

  System.out.println(response3.statusCode() + "\n"

  + response3.body());

  // ----- 删除数据库

  var request99 = delete.apply("mydb");

  var response99 = invoke.apply(request99);

  System.out.println(response99.statusCode() + "\n"

  + response99.body());

  ```


  ## 从 Jakarta EE 应用程序使用 MongoDB


  MongoDB 有一个专用的 Java 驱动程序。将以下依赖项添加到你的项目中（这是针对 Gradle 的）：


  ```

  ...

  dependencies {

  ...

  implementation ''org.mongodb:'' +

  ''mongodb-driver-sync:4.5.1''

  implementation ''org.slf4j:'' +

  ''slf4j-simple:1.8.0-beta4''

  implementation ''org.slf4j:'' +

  ''slf4j-api:1.8.0-beta4''

  }

  ```


  对于 Maven 依赖项，请在 `pom.xml` 文件中写入以下内容：


  ```

  ...


  ...


  org.mongodb

  mongodb-driver-sync

  4.5.1


  org.slf4j

  slf4j-api

  1.8.0-beta4


  org.slf4j

  slf4j-simple

  1.8.0-beta4


  ```


  然后，你可以在代码中使用驱动程序 API 中的类。请注意，MongoDB 会在首次使用时自动创建数据库和集合（MongoDB 中的表称为“集合”），如果它们不存在的话。因此，你无需显式创建它们。


  ```

  ...

  import org.bson.Document;

  import org.bson.types.ObjectId;

  import com.mongodb.client.MongoClient;

  import com.mongodb.client.MongoClients;

  import com.mongodb.client.MongoCollection;

  import com.mongodb.client.MongoDatabase;

  public class MongoMain {

  public static void main(String[] args) {

  MongoClient client = MongoClients.create();

  // 访问数据库：

  MongoDatabase database = client.

  getDatabase("my_database");

  // 访问集合（表）：

  MongoCollection persons =

  database.getCollection("persons");

  // 创建一个文档（条目）：

  Document p = new Document("name", "John")

  .append("cars", new Document("Tesla", 2019));

  // 保存它：

  ObjectId id = persons.insertOne(p)

  .getInsertedId().asObjectId().getValue();

  // 搜索文档（条目）：

  Document john = persons.find(

  new Document("name", "John")).first();

  System.out.println(john.toJson());

  }

  }

  ```


  这适用于在本地主机上运行并使用标准端口 27017 的 MongoDB 实例。对于不同的地址或端口，请查看 `MongoClients` 的其他 `create(
  ... )` 方法。有关更多详细信息，请参阅 [`https://docs.mongodb.com/drivers/java/sync/current/`](https://docs.mongodb.com/drivers/java/sync/current/)
  和 [`https://mongodb.github.io/mongo-java-driver/`](https://mongodb.github.io/mongo-java-driver/)。


