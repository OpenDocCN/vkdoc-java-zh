  \    可以是 `String` 类型的值\n    表达式。\n\n*   `varStatus`**。**\n    非必需。一个变量的名称，该变量保存\n\
  \    迭代状态。一个具有只读值的 POJO：`begin` (int)、`end` (int)、`index` (int)、`step` (int)、`even`\
  \ (boolean)、`odd` (boolean)、`first` (boolean) 和\n    `last` (boolean)。\n\n*   `rendered`。是否\n\
  \    渲染该组件。非必需。可以是 EL 布尔值。\n\n注意\n\nJSTL（Java 标准标签库）集合\n提供了一个 `<c:forEach>` 标签\n\
  用于循环。由于概念上的差异，Faces 和 JSTL 不能很好地协同工作。在教程和博客中，你会找到很多\n使用 JSTL 进行 `for` 循环的例子。然而，最好使用\
  \ `<ui:repeat>` 来\n避免问题。\n\n\n\n<ui:debug> 标签\n在项目的开发阶段，将此标签添加到页面中。使用热键，该标签将显示 Faces\
  \ 组件树以及其他信息。使用 `hotkey=\"x\"` 属性可以更改热键。按下 Shift+Ctrl+X 即可显示组件（默认的 *d* 键在 Firefox\
  \ 浏览器中无效！）。第二个可选属性是 `rendered=\"true|false\"`（你也可以使用 EL 布尔表达式），用于开启或关闭此组件。\n\n注意\n\
  \n此标签仅在开发项目阶段有效。在 `web.xml` 中，你可以添加以下内容\n\n```\njakarta.faces.PROJECT_STAGE\nDevelopment\n\
  \n```\n\n来指定项目阶段（Development（默认）、UnitTest、SystemTest 或 Production）。\n\n一个 Facelets\
  \ 项目示例\n\n在本节中，你将学习如何构建一个示例 Facelets 项目，该项目包含一个音乐盒数据库，为标题、作曲家和表演者显示设计相似的页面。在 Eclipse\
  \ 中启动一个新的 Gradle 项目，并将其命名为 `MusicBox`。获取 `build.gradle` 文件，并将其内容替换为以下内容：\n\n```\n\
