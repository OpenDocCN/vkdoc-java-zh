  ```\n\n有关详细信息和选项，请查阅 Apache XMLBeans 文档。\n\n23. JSON 处理\n\n第 22 章介绍的 XML 绑定技术引入了一种宝贵的数据交换格式，简化并标准化了异构且广泛分布的计算机网络中的通信。通过对元素和属性使用模式与命名空间，XML\
  \ 实现了语义和版本一致性，从而能够进行 XML 文档有效性检查。不幸的是，随着这些附加功能的增加，XML 文档变得越来越复杂，为了发送少量格式化为 XML 的字节，也必须传输大量样板数据。尤其是在浏览器与服务器的通信中，XML\
  \ 显得过于繁重。因此，Web 应用程序开发者转向了更精简的 JSON（JavaScript 对象表示法）数据协议，这使得 Java 世界有必要开发能够处理 JSON\
  \ 的工具和库。\nJSON 处理是 Jakarta EE 10 规范的一部分。这具体涉及 Jakarta JSON Binding (JSON-B) 3.0\
  \ 版和 Jakarta JSON Processing (JSON-P) 2.1 版。JSON-P 和 JSON-B 的规范可以在 [`https://jcp.org/aboutJava/communityprocess/pr/jsr367/index.html`](https://jcp.org/aboutJava/communityprocess/pr/jsr367/index.html)\
  \ 和 [`https://jcp.org/en/jsr/detail?id=374`](https://jcp.org/en/jsr/detail%253Fid%253D374)\
  \ 找到。本章将介绍这些 JSON 库，并解释如何将 JSON 添加到 Jakarta EE 应用程序中。\n\nJSON 文档\n\n与 XML 一样，JSON\
  \ 文档表示一种树状的对象层次结构。与 XML 不同，JSON 实体不能拥有属性。没有命名空间和模式之类的东西，并且，与使用开闭标签不同，复杂的 JSON 对象使用\
  \ `{ ... }` 来映射名称-值对，使用 `[...]` 来表示数组。\n下面是一个展示所有特性的简单 JSON 文档：\n\n```\n{\n\"lastname\"\
  : \"Smith\",\n\"married\": true,\n\"birthday\": \"1997-12-30\",\n\"records\": null,\n\
  \"height\": 6.1,\n\"cars\": 2,\n\"children\": [\n\"Amanda\",\n{ \"forename\": \"\
  Jim\", \"gender\": \"m\" }\n]\n\"address\": {\n\"us\": true,\n\"state\": \"California\"\
  ,\n\"city\": \"Paradise\",\n\"owned\": false\n}\n}\n```\n\n你可以看到，基本类型包括带或不带小数位的数字、布尔字面量\
  \ `true` 和 `false`、字符串以及 `null`。数组和映射可以包含混合类型的元素，包括内部复杂类型。\n\n使用 REST 服务的 JSON\n\
  \n在前面的章节中，你看到了一个返回 JSON 数据的 REST 方法，如下所示：\n\n```\n@GET\n@Produces(\"application/json\"\
  )\npublic String stdDate() {\nreturn \"{\\\"date\\\":\\\"\" +\nZonedDateTime.now().toString()\
  \ + \"\\\"}\";\n}\n```\n\n虽然乍一看，这似乎是创建 JSON 数据的一种简单方法，但它缺乏基本的语法检查。首先，很容易忘记一个闭合的\
  \ `}`，或者因为引号或标点符号放错位置而出错。其次，考虑一个包含更多元素和更深层次结构的更复杂的 JSON 文档。手动构建连接字符串来表示更大的 JSON\
  \ 对象，在全面性和可维护性方面都是一场噩梦。\n\n提高可读性的第一步是使用 JSON-P 来构建 JSON 数据。JSON-P 包含表示值、数组和映射的类。替换之前的代码片段，你最终会得到如下代码：\n\
  \n```\n...\nimport jakarta.json.Json;\nimport jakarta.json.JsonStructure;\n...\n\
  @GET\n@Path(\"j\")\n@Produces(\"application/json\")\npublic JsonStructure stdDate()\
  \ {\nJsonStructure json = Json.createObjectBuilder()\n.add(\"date\", ZonedDateTime.now().toString())\n\
  .build();\nreturn json;\n}\n```\n\n你可以看到，你不再需要连接字符串来构建 JSON 文档。你甚至可以让方法返回一个 `JsonObject`、`JsonArray`\
  \ 或 `JsonStructure`（均来自 `jakarta.json` 包）类型的对象。JAX-RS 知道如何处理这些返回类型。\n\n来自 AJAX 调用，如果你需要将数据从\
  \ Web 前端传递到服务器，你可以让 REST 服务接收一个字符串，如下所示：\n\n```\n// 对应于例如来自 jQuery 的 AJAX 调用：\n\
  // $.ajax({\n//  method: \"POST\",\n//  contentType: \"application/json\",\n// \
  \ url: \"../webapi/date\",\n//  data: { timeZone: \"UTC\", format: \"standard\"\
  \ }\n// })\n// .done(function( msg, textStatus, jqXHR ) {\n//   alert( \"Data Saved:\
  \ \" + msg );\n// });\n@POST\n@Path(\"/date\")\n@Consumes(MediaType.APPLICATION_JSON)\n\
  ...\npublic Response stdDate(String data) {\n// data 是一个 JSON 字符串\n...\n}\n```\n\
  \n或者，作为一种替代方案，你可以为该方法使用一个 `jakarta.json.JsonStructure` 参数，如下所示：\n\n```\n// 对应于例如来自\
  \ jQuery 的 AJAX 调用：\n// $.ajax({\n//  method: \"POST\",\n//  contentType: \"application/json\"\
  ,\n//  url: \"../webapi/date\",\n//  data: '{ timeZone: \"UTC\", format: \"standard\"\
  \ }'\n// })\n// .done(function( msg, textStatus, jqXHR ) {\n//   alert( \"Data Saved:\
  \ \" + msg );\n// });\n@POST\n@Path(\"/date\")\n@Consumes(MediaType.APPLICATION_JSON)\n\
  ...\npublic Response stdDate(JsonStructure data) {\n...\n}\n```\n\n对于 jQuery AJAX\
  \ 调用，你必须传递一个 JSON 格式的字符串，而不是 JavaScript 数据对象。\n除了这些简单的例子，关于使用 JSON-P 和 JSON-B 技术处理\
  \ JSON，还有更多内容有待探索。以下部分将更详细地解释 JSON 绑定和处理。\n\n生成 JSON\n\n为了使用构建器模式生成 JSON 数据，你需要使用\
  \ `jakarta.json` 包中的类。从一个构建器开始：\n\n```\n...\nimport jakarta.json.*;\n...\nJsonObjectBuilder\
  \ builder = Json.createObjectBuilder();\n```\n\n从这里开始，你可以按如下方式添加元素：\n\n```\nbuilder.add(\"\
  elementName\", ...);\n// <- 你可以添加 int、long、double、boolean、\n//    String、BigInteger\
  \ 和 BigDecimal 元素。\n//    并且你可以追加更多的 add(...) 语句。\n```\n\n还有一个用于 `null` 值和复杂类型的变体：\n\
  \n```\nbuilder.addNull(\"elementName\");\nbuilder.\nadd(\"element1\",\nJson.createObjectBuilder().\n\
  add(\"inner1\", 42).\nadd(\"inner2\", \"deepThought\")).\nadd(\"element2\", 3.1415);\n\
  ```\n\n要创建 JSON 数组，请改用 `JsonArrayBuilder` 类：\n\n```\n...\nimport jakarta.json.*;\n\
  ...\nJsonArrayBuilder builder = Json.createArrayBuilder();\nbuilder.add(\"Fibonacci\"\
  );\nbuilder.add(1); // 允许在数组中混合类型\nbuilder.add(2);\nbuilder.add(3);\nbuilder.add(5);\n\
  builder.add(8);\n```\n\n对于 JSON 对象和 JSON 数组，要获取 Java 对象，你必须调用 `build()` 方法：\n\n\
  ```\n...\nimport jakarta.json.*;\n...\nJsonObjectBuilder builder = Json.createObjectBuilder();\n\
  // ... 添加元素，然后：\nJsonObject obj = builder.build();\n...\nJsonArrayBuilder abuilder\
  \ = Json.createArrayBuilder();\n// ... 添加元素，然后：\nJsonArray aobj = abuilder.build();\n\
  ```\n\n解析 JSON\n\n对于 JSON 字符串的低级解析，你可以使用 JSON-P 的流式 API：\n\n```\n...\nimport jakarta.json.*;\n\
  ...\nfinal String json =\n\"{\\\"name\\\":\\\"John\\\",\\\"age\\\":27,\\\"employed\\\
  \":false}\";\nfinal JsonParser parser =\nJson.createParser(new StringReader(json));\n\
  String key = null;\nString value = null;\nwhile (parser.hasNext()) {\nfinal Event\
  \ event = parser.next();\nswitch (event) {\ncase KEY_NAME:\nkey = parser.getString();\n\
  System.out.println(key);\nbreak;\ncase VALUE_STRING:\nvalue = parser.getString();\n\
  System.out.println(value);\nbreak;\n}\n}\nparser.close();\n```\n\n如果你不需要冗长的 JSON\
  \ 到 Java 对象的绑定（这需要额外的编码），这会很方便。此外，如果你想读取一个非常大的 JSON 文档，流式 API 可以帮助你避免分配过多的资源。\n\n\
  如果你不喜欢拉取解析 API，你可以读取一个 JSON 字符串，从而生成一个通用的 JSON 对象：\n\n```\nfinal String json =\n\
  \"{\\\"name\\\":\\\"John\\\",\\\"age\\\":27,\\\"employed\\\":false}\";\nJsonReader\
  \ jsonReader =\nJson.createReader(new StringReader(json));\nJsonObject object =\
  \ jsonReader.readObject();\njsonReader.close();\n...\nString name = object.getString(\"\
  name\", \"\");\n```\n\n更多详细信息，请参阅 [`https://javaee.github.io/jsonp/index.html`](https://javaee.github.io/jsonp/index.html)\
  \ 的 API 文档。\n\n将 JSON 绑定到 Java 对象\n\n如果你需要在 Java 对象树和该树的 JSON 表示之间进行自动映射，你可以使用 JSON-B\
  \ 库中的类。考虑以下用于俱乐部成员列表的 JSON 字符串：\n\n```\n[\n{\n\"name\": \"John\",\n\"age\": 27,\n\
  \"employed\":false,\n\"children\" :\n[\n{\"name\": \"Bart\", \"birthday\": \"2015-11-10\"\
  },\n{\"name\": \"Amanda\", \"birthday\": \"2017-06-01\"}\n]\n},\n{\n\"name\": \"\
  Linda\",\n\"age\": 22,\n\"employed\":true,\n\"children\" :\n[\n]\n}\n]\n```\n\n\
  表示相同列表的一组自然类如下所示：\n\n```\nclass Member {\nprivate String name;\nprivate int age;\n\
  private boolean employed;\nprivate List children;\n// getters and setters...\n}\n\
  class Child {\nprivate String name;\nprivate String birthday;\n// getters and setters...\n\
  }\n```\n\n为了读取 JSON 字符串并构建一个成员列表，你只需这样做：\n\n```\nString json = \"[ ... ]\";\nJsonb\
  \ jsonb = JsonbBuilder.create();\n@SuppressWarnings(\"unchecked\")\nList members\
  \ = jsonb.fromJson(json, List.class);\n// 只是为了检查，反过来，从 Java 对象树获取\n// JSON 字符串：\n\
  jsonb = JsonbBuilder.create();\nString json2 = jsonb.toJson(members);\n// <- 在语义上与上面的\
  \ 'json' 相同。\n```\n\n在字符串、布尔值和数字等简单类型之间进行转换是直接的。如果你需要对转换过程进行更多控制，JSON-B 通过一些注解来帮助你。在前面的例子中，你可以例如将\
  \ `birthday` 字段更改为 `java.util.Date` 类型的字段：\n\n```\nclass Child {\nprivate java.util.Date\
  \ birthday;\n...\n}\n```\n\n（getter 和 setter 相应地进行调整。）然后，`jakarta.json.bind.annotation.JsonbDateFormat`\
  \ 允许指定日期字符串转换模式。对于 `yyyy-MM-dd` 模式，请参阅 `SimpleDateFormat` 的 API 文档以获取更多选项。该注解如下所示：\n\
  \n```\nclass Child {\n@JsonbDateFormat(\"yyyy-MM-dd\")\nprivate java.util.Date birthday;\n\
  ...\n}\n```\n\n更多的注解控制数字格式和 `null` 值的转换。也可以从转换中排除字段，并且为了最大程度的控制，你可以定义一个自定义类型适配器。表\
  \ 23-1 总结了 JSON-B 注解。\n\n表 23-1\nJSON-B 注解\n\n 注解 |\n 用途 |\n\n| --- | --- | ---\
  \ | --- | --- |\n\n `@JsonbDateFormat` |\n 定义自定义日期格式。在 Java 中的 `java.util.Date`\
  \ 和 JSON 字符串值之间进行中介。 |\n\n `@JsonbNillable` |\n 将 Java 中的 `null` 值在 JSON 字符串中显示为\
  \ \"null\"。如果设置为 `false`，则 null 值不会出现在 JSON 字符串中。 |\n\n `@JsonbNumberFormat` |\n\
  \ 定义自定义数字格式。在 Java 中的 `java.math.BigDecimal` 和 JSON 字符串值之间进行中介。格式选项在 `DecimalFormat`\
  \ 类的 API 文档中有描述。 |\n\n `@JsonbTransient` |\n 从转换中排除一个字段。 |\n\n `@JsonbProperty`\
  \ |\n 为映射指定自定义键名。 |\n\n `@JsonbTypeAdapter` |\n 指定自定义类型适配器（`JsonbAdapter` 类）。 |\n\
  \n作为类型适配器的一个例子，考虑以下类：\n\n```\nclass Color {\npublic int r;\npublic int g;\npublic\
  \ int b;\npublic Color(int r, int g, int b) {\nthis.r = r;\nthis.g = g;\nthis.b\
  \ = b;\n}\n}\nclass Shape {\nprivate Color color;\n...\n// getters and setters...\n\
  }\n```\n\n如果你希望颜色能够表示为十六进制值 `#RRGGBB`，一个形状对象的 JSON 片段可能如下所示：\n\n```\n{\n\"color\"\
  : \"#FF1B75\",\n...\n}\n```\n\n转换器类负责将 `Color` 对象转换为 JSON 字符串表示，反之亦然：\n\n```\nclass\
  \ MyColorAdapter implements\nJsonbAdapter {\n@Override\npublic String adaptToJson(Color\
  \ obj)\nthrows Exception {\nreturn \"#\" +\nString.format(\"%02x\", obj.r) +\nString.format(\"\
  %02x\", obj.g) +\nString.format(\"%02x\", obj.b);\n}\n@Override\npublic Color adaptFromJson(String\
  \ obj)\nthrows Exception {\nint r = Integer.parseInt( obj.substring(1,3), 16);\n\
  int g = Integer.parseInt( obj.substring(3,5), 16);\nint b = Integer.parseInt( obj.substring(5,7),\
  \ 16);\nreturn new Color(r,g,b);\n}\n}\n```\n\n最后，要将转换器添加到 `Shape` 类，你必须按如下方式应用\
  \ `@JsonbTypeAdapter` 注解：\n\n```\nclass Shape {\n@JsonbTypeAdapter(MyColorAdapter.class)\n\
  private Color color;\n...\n// getters and setters...\n}\n```\n\n来自 `jakarta.json.bind.annotation`\
  \ 包的注解文档显示了更多信息。要了解更多关于 JSON-B 的信息，也请查看 [`https://javaee.github.io/jsonb-spec/`](https://javaee.github.io/jsonb-spec/)。\n\
  \n24. Jakarta Mail\n\n能够从服务器进程发送电子邮件可能是公司 IT 架构的关键部分。例如，考虑异步传输长时间运行计算的结果、发送自动生成的报告，或者在服务器进程失败时发送警告消息。\n\
  Jakarta Mail 2.1 可以服务于这个目的，尽管它并不常被认为是 Jakarta EE 技术栈的核心部分。本章介绍 Jakarta Mail，它来自\
  \ [`https://eclipse-ee4j.github.io/mail/`](https://eclipse-ee4j.github.io/mail/)，作为\
  \ Jakarta EE 10 中包含的一个多功能电子邮件库。\n\n安装 Jakarta Mail\n\nJakarta Mail 包含在 Jakarta EE\
  \ 规范中，因此对于任何具有此基本依赖项（Gradle 配置，Maven 类似）的企业项目：\n\n```\nimplementation 'jakarta.platform:'\
  \ +\n'jakarta.jakartaee-api:10.0.0'\n```\n\n你就拥有了使用 Jakarta Mail 所需的一切。\n\n注意\n\n\
  Jakarta Mail 的前身称为 JavaMail。主要区别在于 Jakarta Mail 使用 `jakarta.` 命名空间而不是 `javax.`。许多在线资源仍然引用\
  \ JavaMail。在大多数情况下，你只需切换到新的命名空间，就可以轻松地调整 JavaMail 教程。\n\n生成和发送电子邮件\n\n从 Jakarta\
  \ EE 应用程序发送电子邮件的标准方法包括以下步骤：\n\n*   提供一个用于在消息传输代理 (MTA) 进行身份验证的身份验证器。为此，创建一个继承自 `jakarta.mail.Autenticator`\
  \ 的可实例化类。如果你不需要向 MTA 进行身份验证，可以跳过此步骤。\n\n*   实例化并填充一个 `java.util.Properties` 集合。在这里，需要输入各种与\
  \ SMTP 相关的参数。\n\n*   获取一个 `jakarta.mail.Session` 实例。\n\n*   实例化一个消息对象，例如 `jakarta.mail.internet.MimeMessage`。\n\
  \n*   从会话中获取一个传输对象（`jakarta.mail.Transport` 类）。\n\n*   使用传输对象连接到 MTA，然后发送消息。\n\n\
  这个例子提供了一个用于构建和发送电子邮件的初级 REST 类。这只是一个起点。对于你自己的应用程序，你应该从配置文件中读取常量。你还必须更新连接参数以匹配你的邮件服务器。\n\
  \n```\nimport java.util.Date;\nimport java.util.Properties;\nimport jakarta.mail.Authenticator;\n\
  import jakarta.mail.Message;\nimport jakarta.mail.MessagingException;\nimport jakarta.mail.PasswordAuthentication;\n\
  import jakarta.mail.Session;\nimport jakarta.mail.Transport;\nimport jakarta.mail.internet.InternetAddress;\n\
  import jakarta.mail.internet.MimeMessage;\nimport jakarta.ws.rs.POST;\nimport jakarta.ws.rs.Path;\n\
  import jakarta.ws.rs.Produces;\n@Path(\"/mail\")\npublic class JakartaMail {\nfinal\
  \ String MAILSERVER_ADDR = \"addr.to.mta.com\";\nfinal String MAILSERVER_PORT =\
  \ \"465\"; //465,587;\nfinal String MAILSERVER_IDENTITY = \"your@email.addr.com\"\
  ;\nfinal String MAILSERVER_LOGIN = \"mailserver.login\";\nfinal String MAILSERVER_PASSWD\
  \ = \"mailserver.passwd\";\n@POST\n@Produces(\"application/json\")\npublic String\
  \ sendMail() {\nsendMail(\"recipient@example.com\", \"test\",\nnew Date().toString());\n\
  return \"{\\\"done\\\":true}\";\n}\nclass SMTPAuthenticator extends Authenticator\
  \ {\npublic PasswordAuthentication\ngetPasswordAuthentication(){\nreturn new PasswordAuthentication(MAILSERVER_LOGIN,\n\
  MAILSERVER_PASSWD);\n}\n}\nprivate void sendMail(String toAddr,\nString theSubject,\n\
  String theMessage) {\nProperties props = new Properties();\nprops.put(\"mail.smtp.user\"\
  , MAILSERVER_IDENTITY);\nprops.put(\"mail.smtp.host\", MAILSERVER_ADDR);\nprops.put(\"\
  mail.smtp.port\", MAILSERVER_PORT);\nprops.put(\"mail.smtp.starttls.enable\",\"\
  true\");\nprops.put(\"mail.smtp.debug\", \"true\");\nprops.put(\"mail.smtp.auth\"\
  , \"true\");\nprops.put(\"mail.smtp.socketFactory.port\",\nMAILSERVER_PORT);\n//props.put(\"\
  mail.smtps.ssl.checkserveridentity\",\n// \"false\");\nprops.put(\"mail.smtps.ssl.trust\"\
  ,  MAILSERVER_ADDR);\nSMTPAuthenticator auth = new SMTPAuthenticator();\nSession\
  \ session = Session.getInstance(props, auth);\nsession.setDebug(false);\nMimeMessage\
  \ msg = new MimeMessage(session);\ntry {\nmsg.setText(theMessage);\nmsg.setSubject(theSubject);\n\
  msg.setFrom(new InternetAddress(\nMAILSERVER_IDENTITY));\nmsg.addRecipient(Message.RecipientType.TO,\n\
  new InternetAddress(toAddr));\n// 使用 \"smtps\" 而不是 \"smtp\"，以启用 SSL\nTransport transport\
  \ = session.getTransport(\"smtps\");\ntransport.connect(MAILSERVER_ADDR,\nInteger.parseInt(MAILSERVER_PORT),\n\
  MAILSERVER_LOGIN, MAILSERVER_PASSWD);\ntransport.sendMessage(msg, msg.getAllRecipients());\n\
  transport.close();\n} catch (MessagingException e) {\ne.printStackTrace(System.err);\n\
  }\n}\n}\n```\n\n关于 `mail.smtps.ssl.trust` 属性的一点说明：如果像这里这样使用，与 SSL 加密通信一起使用的握手过程会忽略服务器的\
  \ SSL 证书检查。如果你注释掉这一行，你可能需要将服务器的证书导入到 Java 的 `cacerts` 密钥库中。因此，如果你需要检查服务器的身份，预计会有一些额外的工作。\n\
  \n一旦部署完成——例如，作为 `JakartaMail.war` 部署在 GlassFish 服务器上，并且在 `web.xml` 中使用 `<url-pattern>\
  \ /webapi/* </url-pattern>` URL 模式——你可以通过以下命令从终端触发一封电子邮件：\n\n```\ncurl -X POST \\\
  \nhttp://localhost:8080/JakartaMail/webapi/email\n```\n\n25. 应用程序客户端 (Groovy)\n\n\
  Jakarta EE 服务器应用程序通常提供客户端可以用来满足企业用例需求的接口。这些通常是用于通信 XML 或 JSON 数据的 Web 或 REST 服务，或者客户端可以通过\
  \ RMI 访问的 EJB 接口。然而，在开发阶段以及后续的维护目的（如监控）中，一个轻量级且易于配置的访问库是更好的解决方案。因此，一些应用服务器（如 GlassFish）提供了用于生成此类即时客户端库的脚本，通常称为*应用程序客户端*。\n\
  \n注意\n\n应用程序客户端没有标准化。对于 GlassFish 以外的 Jakarta EE 服务器，你必须查阅文档以了解是否支持应用程序客户端。或者你可以开发自己的脚本。\n\
  \n本章介绍如何使用 Groovy 脚本，通过 GlassFish 生成的应用程序客户端库来访问 EJB 接口。\n\n提供企业应用程序\n你可以从任何具有 `remote`\
  \ EJB 接口的 Jakarta EE 应用程序开始。远程接口是必需的，因为你在与应用程序服务器不同的 JVM 中运行客户端代码。\n\n这个简单的例子编码了一个名为\
  \ `ApplicationClientServer` 的 EAR 项目。它针对一个可部署的 `ApplicationClientServer.ear`，并使用以下\
  \ EJB 类：\n\n```\n// ----- 文件 TheDate.java\npackage book.jakartapro.appclient.ejb;\n\
  import java.time.ZonedDateTime;\nimport book.jakartapro.appclient.ejb.interfaces.\n\
  TheDateLocal;\nimport book.jakartapro.appclient.ejb.interfaces.\nTheDateRemote;\n\
  import jakarta.ejb.Local;\nimport jakarta.ejb.Remote;\nimport jakarta.ejb.Stateless;\n\
  @Stateless\n@Local(TheDateLocal.class)\n@Remote(TheDateRemote.class)\npublic class\
  \ TheDate {\npublic String fetchDate() {\nreturn ZonedDateTime.now().toString();\n\
  }\n}\n// ----- 文件 TheDateLocal.java\npackage book.jakartapro.appclient.ejb.interfaces;\n\
  public interface TheDateLocal {\nString fetchDate();\n}\n// ----- 文件 TheDateRemote.java\n\
  package book.jakartapro.appclient.ejb.interfaces;\npublic interface TheDateRemote\
  \ {\nString fetchDate();\n}\n```\n\n注意\n\n在这一点上，该示例没有解释如何开发打包为 EAR 文件的 Jakarta EE\
  \ 应用程序。不同的 IDE 为此目的使用不同的工作流程，这也取决于你使用的构建框架。前面的章节提供了一些提示；如果你需要更多信息，请查阅你的服务器文档。\n\n\
  为了使应用程序客户端生成工作，这个 EAR 必须部署并在 GlassFish 上运行。\n\n构建应用程序客户端\n\n在 GlassFish 上部署了 EAR\
  \ 应用程序后，生成和运行应用程序客户端的步骤总结如下：\n\n1.  将接口类打包到 `ejb-interfaces.jar` 归档文件中。\n\n2.  生成\
  \ `appclient.jar`。转到 `GLASSFISH_INST/glassfish` 文件夹并执行 `bin/package-appclient`。\n\
  \n3.  获取上一步生成的 `GLASSFISH_INST/glassfish/lib/appclient.jar`。\n\n4.  将 `appclient.jar`\
  \ 解压到机器上的任何合适文件夹（记住 `.jar` 文件只是一个后缀不同的 ZIP 文件）。将此文件夹称为 `MYAPPCLIENT`。将 `appclient`\
  \ 文件夹的内容移动到其父文件夹。\n\n5.  将 `ejb-interfaces.jar` 复制到 `MYAPPCLIENT`。\n\n6.  修改 `MYAPPCLIENT/config/asenv.*`\
  \ 和 `MYAPPCLIENT/glassfish/domains/domain1/config/sun-acc.xml` 文件。请参阅 [`https://glassfish.org/docs/latest/reference-manual.html#package-appclient`](https://glassfish.org/docs/latest/reference-manual.html%2523package-appclient)\
  \ 上的说明。仅当你想要使用 GlassFish 客户端应用程序容器时，才需要此步骤。此示例使用不同的方法；请参阅下一节。\n\n7.  使 `MYAPPCLIENT/glassfish/bin/appclient`\
  \ 和 `MYAPPCLIENT/glassfish/bin/appclient.bat` 文件可执行。仅当你想要使用 GlassFish 客户端应用程序容器时，才需要此步骤。此示例使用不同的方法；请参阅下一节。\n\
  \n8.  如果你想启动应用程序客户端容器，请提供客户端代码，例如 `myClient.jar`。然后运行 `MYAPPCLIENT/glassfish/bin/appclient`，将\
  \ `myClient.jar` 作为参数。\n\n运行 GroovyConsole 应用程序客户端\n\n为了允许 Groovy 脚本访问 Jakarta EE\
  \ 服务器，首先从 [`https://groovy-lang.org/install.html`](https://groovy-lang.org/install.html)\
  \ 下载并安装 Groovy。接下来——将 `GROOVY_HOME` 指向 Groovy 安装文件夹，将 `JAVA_HOME` 指向 JDK 11 版本，并按照上一节所述准备好\
  \ `MYAPPCLIENT` 文件夹——在 `MYAPPCLIENT` 内部构建一个如下所示的 shell 脚本：\n\n```\n#!/bin/bash\n\
  \n\n\n"
- '# ---------- 文件 ''groovyForJakarta.sh'' ----------




  '
- '# 在此处提供您自己的路径：

  export GROOVY_HOME=/opt/groovy-4

  export JAVA_HOME=/opt/jdk17

  addClasspath="ejb-interfaces.jar"

  for i in glassfish/modules/*.jar; do

  addClasspath=${addClasspath}:$i

  done

  export GROOVY_TURN_OFF_JAVA_WARNINGS=true

  $GROOVY_HOME/bin/groovyConsole -cp $addClasspath

  ```


  遗憾的是，某些版本的 Groovy 发行版启动脚本中存在一个错误。请检查 `GROOVY/bin/startGroovy` 文件中的这一行：


  ```

  if [ "$(expr "$JAVA_VERSION" \> "1.8.0")" ]; then

  ```


  如果存在，请将其替换为：


  ```

  if [ "$(expr true)" ]; then

  ```


  显然，`1.17.x` 并不大于 `1.8.0`，因此原始条件是错误的。


  启动脚本后，会弹出一个 GroovyConsole 窗口。要从该窗口访问 EJB，可以使用如下代码：


  ```

  import javax.naming.*

  def ctx = getContext()

  // 这是 GlassFish 的 JNDI 命名模式

  def NAMING_SCHEMA = "java:global"

  // 应用程序的名称。对于 GlassFish，即 .ear 文件的名称（不含后缀）

  def APPL_NAME = "AppClientServer"

  // EAR 文件内的 EJB 模块名称

  def EJB_MODULE_NAME = "AppClientEjb"

  // EJB 的类名

  def EJB_NAME = "TheDate"

  // EJB 远程接口的完全限定名

  def EJB_REMOTE_CLASS =

  "book.jakartapro.appclient.ejb.interfaces.TheDateRemote"

  def look = "${NAMING_SCHEMA}/" +

  "${APPL_NAME}/${EJB_MODULE_NAME}/" +

  "${EJB_NAME}!${EJB_REMOTE_CLASS}"

  def ejb = ctx.lookup(look)

  def date = ejb.fetchDate() // 调用 EJB

  println date

  def getContext() {

  Properties props = new Properties().with(true){

  setProperty(Context.INITIAL_CONTEXT_FACTORY,

  "com.sun.enterprise.naming.SerialInitContextFactory")

  setProperty("org.omg.CORBA.ORBInitialHost",

  "localhost") // 应用服务器

  setProperty("org.omg.CORBA.ORBInitialPort",

  "3700") // GlassFish 的 JNDI 端口

  }

  new InitialContext(props)

  }

  ```


  26. 添加脚本语言


  Java 语言并非实现业务功能和算法的最佳选择。该语言新特性的实现速度较慢，这可以是一个优势，因为当编码结构不频繁变化时，维护旧代码会更容易。而且 Java 是静态类型语言，这意味着你必须在语言层面处理对象类型。这会导致更多的编码工作，因为需要频繁输入类型说明符以确保类型一致性正确工作。与此相反，像
  Groovy 和 Python 这样的脚本语言通常包含更简洁编写代码的特性，并且通常是动态类型语言。这意味着类型检查不会在编译期间进行，并且代码中包含更少的样板结构来确保赋值中的变量类型一致性。幸运的是，Java
  允许你通过 JSR 223 将 Java 语言代码和脚本语言混合使用。Java 代码在生成任何可部署（和可运行）的工件（如类文件和类文件归档）之前被编译，而脚本则在运行时编译。这为脚本开辟了另一种使用场景：由于可以在不反复编译应用程序的情况下更改脚本，因此即使在应用程序进入生产阶段后，也可以更轻松地更改脚本。例如，脚本可以以文本形式保存在数据库中，或者保存在独立于部署工件（如
  JAR、WAR 和 EAR）的资源文件中。本章介绍如何在 Jakarta EE 应用程序中包含 Groovy 和 Python 脚本。


  安装脚本引擎


  为了使用 JSR 223 脚本，你必须将以下依赖项添加到项目中：


  ```

  // 对于 Python，在 Gradle build.gradle 文件中

  implementation ''org.python:jython-standalone:2.7.2''


  org.python

  jython-standalone

  2.7.2


  // 对于 Groovy，在 Gradle build.gradle 文件中

  implementation ''org.apache.groovy:groovy-jsr223:4.0.8''


  org.apache.groovy

  groovy-jsr223

  4.0.8


  ```


  在 Java 中使用脚本


  为了在代码中的任何位置使用脚本，请编写以下代码（Python 版本）：


  ```

  import javax.script.ScriptEngine;

  import javax.script.ScriptEngineManager;

  import javax.script.ScriptException;

  ...

  ScriptEngine engine = new ScriptEngineManager().

  getEngineByName("python");

  // 读取 Python 代码

  StringReader f = new StringReader(

  "class Multiplier:\n"

  + "\n"

  + "  def multiply(self, x, y):\n"

  + "    return x * y\n"

  + "\n"

  + "x = Multiplier().multiply(par1, par2)\n"

  );

  //  40

  ...

  ```


  相同脚本的 Groovy 变体如下所示：


  ```

  import javax.script.ScriptEngine;

  import javax.script.ScriptEngineManager;

  import javax.script.ScriptException;

  ...

  ScriptEngine engine = new ScriptEngineManager().

  getEngineByName("groovy");

  // 读取 Groovy 代码

  StringReader f = new StringReader(

  "class Multiplier {\n"

  + "  def multiply(def x, def y) {\n"

  + "    x * y\n"

  + "  }\n"

  + "}\n"

  + "x = new Multiplier().multiply(par1, par2)\n"

  );

  //  40

  ```


  第五部分 高级资源相关主题


  27. 使用 Hibernate 作为 ORM


  GlassFish Jakarta EE 应用服务器内置了 EclipseLink 作为 JPA 提供者，而其他应用服务器对于使用哪个 JPA 提供者有自己的想法。毕竟，应用程序开发人员无需担心使用哪个
  JPA 提供者，这是 JPA 的优势之一。如果你确实出于某种原因想要指定 JPA 提供者，可以这样做，而无需更改应用服务器安装。

  本章介绍如何配置应用程序以使用 Hibernate 作为 JPA 提供者。使用其他提供者时的过程类似。


  注意


  前往 [`https://hibernate.org/`](https://hibernate.org/)

  了解 Hibernate 能做什么。


  安装 Hibernate


  要将 Hibernate 安装为 JPA 提供者，请将以下代码分别添加到你的 `build.gradle` 或 `pom.xml` 文件中（适用于 Gradle
  或 Maven）：


  ```

  ...

  dependencies {

  ...

  implementation ''org.hibernate:'' +

  ''hibernate-core-jakarta:5.6.3.Final''

  }

  ...


  ...


  org.hibernate

  hibernate-core-jakarta

  5.6.3.Final


  ...

  ```


  调整持久化配置


  你需要告诉 JPA 配置使用 Hibernate 作为 JPA 提供者。为此，请打开 `META_INF` 文件夹内的 `persistence.xml` 文件并添加以下内容：


  ```


  org.hibernate.jpa.HibernatePersistenceProvider


  ...


  ...


  -->


  ```


  Hibernate 文档会告诉你更多关于可以在此文件中放置的 Hibernate 设置的信息。


  获取 Hibernate Session


  为了在注入实体管理器的情况下直接使用 Hibernate JPA，API 文档建议使用以下代码：


  ```

  ...

  import org.hibernate.Session;

  ...

  @PersistenceContext(unitName = "my-persistence-unit")

  private EntityManager entityManager;

  ...

  Session session = entityManager.unwrap(Session.class);

  // 直接使用 Hibernate session：

  // ...

  ```


  警告


  遗憾的是，由于类加载问题，这目前不适用于 GlassFish 7。


  28. 连接器


  Jakarta EE 应用程序可能无法使用标准通信协议之一与遗留 EIS（企业信息系统）无缝通信。在企业环境中尤其如此。为了实现这一点，你必须创建一个符合 Jakarta
  连接器架构的资源适配器。

  Jakarta 连接器技术（版本号 2.1）是 Jakarta EE 10 技术栈的一部分。JCA 项目的主页位于 [`https://projects.eclipse.org/projects/ee4j.jca/releases/2.1.0`](https://projects.eclipse.org/projects/ee4j.jca/releases/2.1.0)，规范请参见
  [`https://www.jcp.org/en/jsr/detail?id=322`](https://www.jcp.org/en/jsr/detail%253Fid%253D322)。

  为大型或重要的 EIS 创建连接器可能是一项非常具有挑战性的任务。规范文档有 500 多页，因此本书仅涵盖连接器架构的少数特性。本章将完成一个简单的 JCA 项目，尽管如此，它应该能为你的项目提供一个起点。


  编码资源适配器


  对于一个资源适配器，你至少需要以下工件：


  *   一个接口，描述资源适配器所有可从客户端访问的业务方法。通常称为*连接*。在此示例中，它被称为 `HelloWorldConnection`。


  *   另一个接口，描述连接工厂。其唯一目的是提供获取连接的工厂方法。它必须扩展 `jakarta.resource.Referenceable` 和 `java.io.Serializable`。在此示例中，它被称为
  `HelloWorldConnectionFactory`。


  *   一个实现连接接口的类。在此示例中，它被称为 `HelloWorldConnectionImpl`。


  *   一个实现连接工厂接口的类。在此示例中，它被称为 `HelloWorldConnectionFactoryImpl`。


  *   一个扩展 `jakarta.resource.spi.ManagedConnection` 的类。这表示到底层 EIS 的物理连接。在此示例中，它被称为
  `HelloWorldManagedConnection`。


  *   一个用于 `ManagedConnection` 的工厂类。它必须实现 `jakarta.resource.spi.ManagedConnectionFactory`
  和 `jakarta.resource.spi.ResourceAdapterAssociation`。在此示例中，它被称为 `HelloWorldManagedConnectionFactory`。


  *   一个实现 `jakarta.resource.spi.ManagedConnectionMetaData` 的类，用于元数据。在此示例中，它被称为 `HelloWorldManagedConnectionMetaData`。


  *   一个实现 `jakarta.resource.spi.ResourceAdapter` 的类。在此示例中，它被称为 `HelloWorldResourceAdapter`。


  有关类关系以及每个类功能的更多详细信息，请查阅 API 文档和 JCA 规范。


  为了简化打包，此示例将所有接口放入一个 `interfaces` 子包中。图 28-1 显示了此示例项目的项目布局。


  ![](img/490565_1_En_28_Fig1_HTML.jpg)


  JCA 示例窗口显示文件列表，其中一些文件已展开，例如 interfaces、src/main/resources、bin、build 和 gradle。


