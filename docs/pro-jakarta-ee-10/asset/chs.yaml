  \ `cc.attrs.` 作为前缀。\n\n要使用新组件，请声明添加了 `mycomponents` 的复合命名空间：\n\n```\n\n...\n\n...\n\
  \n```\n\nJava 中的自定义组件\n尽管这是一个高度复杂的操作，但可以使用 Java 类定义你自己的组件。如果仅使用 XHTML 文件进行组件编程不能满足你的需求，则可能需要这样做。\n\
  \n要创建这样一个类，请添加适当的注解，并让该类扩展 `UIComponent`，如下所示：\n\n```\npackage this.package;\nimport\
  \ jakarta.faces.component.FacesComponent;\nimport jakarta.faces.component.UIComponent;\n\
  @FacesComponent(createTag = true,\nnamespace = \"https://mycompany.com/mynamespace\"\
  ,\ntagName = \"custom-component\",\nvalue = \"this.package.CustomComponent\")\n\
  public class CustomInput extends UIComponent {\n...\n}\n```\n\n如果这样做，你必须实现 `UIComponent`\
  \ 中的许多抽象方法。如果从 `UIInput` 或 `UIOutput` 扩展，或者至少从 `UIComponentBase` 扩展，可能会稍微容易一些。最重要的重写方法是\
  \ `decode...()` 和 `encode...()` 方法，因为它们定义了组件的渲染和用户输入值提取过程。\n`UIComponent` 及其派生类的\
  \ API 文档为你提供了有关此类 Faces Java 组件的更多信息。查看 Faces 中包含的标准组件的实现也很有帮助。\n\n一旦你正确实现了这样一个组件，使用起来就很容易了。只需在任何\
  \ Faces 页面中编写以下内容：\n\n```\n\n...\n\n...\n\n...\n\n```\n\n9.  流\n\nFaces 流是一种页面内聚概念，于\
  \ 2013 年随 JEE 7 版本进入 JEE 世界。其主要思想是，若干页面被认为属于一个“流”。与这些流关联并存储在服务器上的数据可以被限制在*流作用域*内，这意味着流中的所有页面都可以访问相同的公共流作用域数据池，并且一旦退出流，相关的内存就可以被释放。因此，流变量作用域介于*请求作用域*（变量仅在一次请求中存活）和*会话作用域*（数据在用户会话持续期间存活）之间。\n\
  流的主要使用场景是向导，其中页面属于一系列相互关联的、类似对话框的输入页面，并服务于一个精确的用例，例如支付流程、投票、注册工作流等。\n\n流处理过程\n\n\
  要定义一个流，你通常在一个专用文件夹内创建若干 XHTML 页面，该文件夹名为 `src/main/webapp/flow-name`。你可以使用任何合适的名称代替\
  \ `flow-name`。然后，要进入该流，你可以在 Web 应用程序中使用一个按钮，如下所示：\n\n```\n\n要退出流，你需要在流文件夹*之外*提供一个名为\
  \ `flow-name-return.xhtml` 的文件，并在流 XHTML 页面中的任何位置编写：\n\n```\n\n\n\n将 `flow-name`\
  \ 替换为你为流程实际选择的名称。对于流程页面之间传递的数据，你需要提供一个使用 `@FlowScoped( value = \"flow-name\" )`\
  \ 注解的 bean，同样在属性值中使用你的流程名称。请参见图 9-1。\n\n![](img/490565_1_En_9_Fig1_HTML.png)\n\n\
  一张插图。图中包含一个方框内的两个块，位于顶部的流程文件夹中，包含流程步骤 1 和步骤 2，分别命名为 step 1 和 step 2 dot x h t m\
  \ l；一个流程出口文件框，命名为 flow name return dot x h t m l；一个进入流程的命令；以及一个带有代码的框，标题为“对应一个 bean”。\n\
  \n图 9-1\n流程过程\n\n基本流程设置\n\n流程遵循“约定优于配置”的范式。因此，你不需要为基本流程进行配置。约定如下：\n\n1.  在 `src/main/webapp`\
  \ 目录下创建一个名为 `flow-name` 的文件夹。你可以选择任何你喜欢的文件夹名称，但按照约定，文件夹名称也将作为流程名称。\n\n2.  在 `src/main/webapp/flow-name`\
  \ 目录下创建一个名为 `flow-name-flow.xml` 的空文件。文件名的第一部分 `flow-name` *必须*与流程名称匹配。因此，如果你的流程名为\
  \ `flow-a`，则必须有一个名为 `src/main/webapp/flow-a` 的文件夹，并且这个空文件必须命名为 `flow-a-flow.xml`。由于此文件存在，Faces\
  \ 就知道该文件夹属于一个流程。如果你以后需要配置该流程，配置将放入此文件中。\n\n3.  在 `src/main/webapp/flow-name` 目录下创建一个名为\
  \ `flow-name.xhtml` 的流程起始页面。不带后缀的文件名 `flow-name` *必须*与流程名称匹配。这是一个标准的 Faces XHTML\
  \ 页面。\n\n4.  在 `src/main/webapp/flow-name` 目录下创建任意数量的后续流程页面。对使用的名称没有限制。\n\n5.  为了在流程中保存数据（用户输入）并处理导航情况，创建一个带有\
  \ `@Named`（导入 `\"jakarta.inject\"`）和 `@FlowScoped(value = \"flow-name\")` 注解的 bean\
  \ 类。这个 bean 还必须实现 `java.io.Serializable`。这是一个普通的支持 bean，但它仅对流程内的 XHTML 页面可用。`value`\
  \ 属性*必须*与流程名称匹配。\n\n6.  在 `src/main/webapp/flow-name` 文件夹*外部*创建一个名为 `flow-name-return.xhtml`\
  \ 的文件。文件名的第一部分，即 `-return.xhtml` 之前的所有内容，*必须*与流程名称匹配。这是流程的出口点。它是一个标准的 Faces XHTML\
  \ 页面，但你无法在此处使用 `@FlowScoped` bean——在页面被调用之前，该 bean 已被销毁。\n\n请参见图 9-2（在此图中，流程名为 `flow-a`）。\n\
  \n![](img/490565_1_En_9_Fig2_HTML.jpg)\n\n一张标题为“包资源管理器”的截图。它包含一个带有下拉子菜单的侧边菜单栏。右上角有\
  \ 6 个图标。\n\n图 9-2\n一个基本流程设置\n\n要进入流程，你使用文件夹名称，如下所示：\n\n```\n...\n\n...\n\n```\n\n\
  要退出最后一个流程页面，使用不带路径或后缀的出口页面名称，如下所示：\n\n```\n...\n\n...\n\n```\n\n如果你更改了名称，请将 `flow-name-return`\
  \ 替换为实际的流程名称加上 `-return`。\n\n一个带有必要注解和示例字段的基本流程作用域 bean 如下所示：\n\n```\npackage the.package.name;\n\
  import java.io.Serializable;\nimport jakarta.faces.flow.FlowScoped;\nimport jakarta.inject.Named;\n\
  @Named\n@FlowScoped(value = \"flow-name\")\npublic class FlowScopeBean implements\
  \ Serializable{\nprivate static final long serialVersionUID =\n-3877099938046102267L;\n\
  private String value;\npublic String getValue() {\nreturn value;\n}\npublic void\
  \ setValue(String value) {\nthis.value = value;\n}\n}\n```\n\n覆盖约定\n\n如果你不想使用刚刚了解到的约定，你必须为\
  \ Faces 提供合适的配置。一种可能性是在此文件中添加配置条目：\n\n\n\n```\nsrc/main/webapp/flow-name/flow-name-flow.xml\n\
  ```\n\n其中两处的 `flow-name` 均代表流程名称，因此如果你的流程使用了不同的名称，则必须同时替换这两处。\n\n该文件的内容如下所示：\n\n\
  ```\n\n...\n\n```\n\n（删除 `jakartaee/` 后的换行符和空格）。`id` 属性必须与流程所使用的文件夹名称一致。\n\n指定不同的流程起始页面\n\
  \n若要指定不同的流程起始页面，请在 `<flow-definition>` 元素内编写以下内容：\n\n```\n...\n\n/flow-name/page1.xhtml\n\
  \nflow-a-start\n\n```\n\n对于 `<view>` 内的 ID 属性，你可以随意选择，但它必须与 `<start-node>` 元素的内容一致。\n\
  \n指定不同的返回页面\n\n如果你想为流程使用不同的返回页面，请在 `<flow-definition>` 元素内编写以下内容：\n\n```\n...\n\n\
  #{someBean.returnValue}  -->\n/start\n\n```\n\n对于 `<flow-return>` 内的 ID 属性，请使用与流程最后一个页面中的完成命令按钮相同的值：\n\
  \n```\n...\n\n...\n\n```\n\n`<from-outcome> /start </from-outcome>` 将跳转到 `start.xhtml`。如果你改用方法表达式，例如\
  \ `<from-outcome> #{someBean.aboutToExit} </from-outcome>`，则会调用此方法来确定跳转目标：\n\n```\n\
  public String aboutToExit() {\nreturn \"start\"; // -> start.xhtml\n}\n```\n\n程序化配置\n\
  \n流程也可以使用 Java 类进行程序化配置。为了让 Faces 识别流程配置，该类的名称必须与流程名称匹配。因此，例如，如果你有一个名为 `checkout`\
  \ 的流程文件夹，则此配置类的名称必须为 `CheckoutFlow`（首字母必须大写，并附加 `Flow`）。\n\n要指定自定义的流程起始页面和流程返回页面，该类的内容如下：\n\
  \n```\npackage the.package;\nimport java.io.Serializable;\nimport jakarta.enterprise.inject.Produces;\n\
  import jakarta.faces.flow.Flow;\nimport jakarta.faces.flow.builder.FlowBuilder;\n\
  import jakarta.faces.flow.builder.FlowBuilderParameter;\nimport jakarta.faces.flow.builder.FlowDefinition;\n\
  // 名称表明流程文件位于\n// 文件夹 \"flow-a\" 内\npublic class FlowAFlow implements Serializable\
  \ {\nprivate static final long serialVersionUID = 1586568679L;\n@Produces\n@FlowDefinition\n\
  public Flow defineFlow(@FlowBuilderParameter FlowBuilder\nflowBuilder) {\n// 指定流程起始页面\n\
  String flowId = \"flow-a\";\nflowBuilder.id(\"\", flowId);\nflowBuilder.viewNode(flowId,\
  \ \"/\" + flowId +\n\"/flow-a-start.xhtml\").markAsStartNode();\n// 指定流程返回页面\nflowBuilder.returnNode(\"\
  returnFromFlow\").\nfromOutcome(\"/start\");\nreturn flowBuilder.getFlow();\n}\n\
  }\n```\n\n在 `.fromOutcome()` 中，你也可以指定一个方法表达式：\n\n```\n...\n.fromOutcome(\"#{someBean.aboutToExit}\"\
  );\n```\n\n注意\n\n请注意，在 Java 类中使用 EL 构造会引入类依赖的双重结构：Java 类关系和 EL 关系。\n\n处理流程结果\n\n\
  在返回到名为 `flow-name-return.xhtml` 的退出页面之前，你可以在 `@FlowScope` 作用域的后备 bean 中调用最后一个导航案例。例如，你可以评估用户在流程期间输入的所有数据，并执行流程的实际目的。为此，你可以按如下方式编写一个“完成”按钮：\n\
  \n```\n...\n\n...\n\n...\n```\n\n然后，在 bean 中添加一个方法来执行任何收尾操作：\n\n```\npublic String\
  \ aboutToExit() {\n// 在这里，我们可以使用流程期间输入的数据执行操作...\nreturn \"flow-name-return\"; //\
  \ 流程名称 + \"-return\"\n}\n```\n\n在流程之间传递数据\n\n流程可以调用其他流程。但是，这不能简单地通过在 `<h:commandButton>`\
  \ 组件中使用第二个流程的名称来实现。相反，你必须在第一个流程的配置中显式声明该流程转换。\n\n如果你想在 XML 配置中执行此操作，请将以下内容添加到 `flow-name/flow-nameflow.xml`\
  \ 文件中：\n\n```\n...\n\n....\n\nflow-b\n\n```\n\n其中 `<flow-call>` 中的 `call-flow-b`\
  \ ID 对应于调用流程中某处的命令按钮操作：\n\n```\n`<flow-reference><flow-id>...</flow-id></flow-reference>`\n\
  对应于被调用的第二个流程。\n\n你不能使用流程作用域的变量在流程之间传递数据。相反，你需要在调用流程的配置中添加一个*出站*参数规范：\n\n```\n\n\
  flow-b\n\nparam1FromCallingFlow\nthe value\n\n```\n\n其中，除了 `the value`，你也可以使用 EL\
  \ 值表达式。\n\n然后，在被调用流程的配置中，添加一个*入站*参数规范：\n\n```\n\nparam1FromCallingFlow\n#{someFlowBean.value}\n\
  \n```\n\n其中 `someFlow` bean 是一个在*被调用*流程内具有流程作用域的后备 bean。\n\n警告\n\n同样，由于模式定义文件中的一个错误，这些配置条目将被标记为错误。然而，此处显示的配置已在\
  \ GlassFish 7 上测试通过，运行正常。\n\n使用 Java 类而非 XML 文件实现相同配置的方法如下：\n\n```\n// 在调用流程内部：\n\
  flowBuilder.flowCallNode(\"call-flow-b\").\nflowReference(\"\", \"flow-b\").\noutboundParameter(\"\
  param1FromCallingFlow\",\n\"the value\");\n// 在被调用流程内部：\nflowBuilder.inboundParameter(\"\
  param1FromCallingFlow\",\n\"#{someFlowBean.value}\");\n```\n\n10. WebSocket\n\n\
  HTTP 本质上是一种单向、无状态的协议。这意味着通信的一方（例如 Web 浏览器这样的客户端）向服务器发送单个请求并等待返回数据，最终在检索完该单个请求的所有数据后关闭连接。从协议的角度来看，任何后续请求都不知道之前的请求，这就是为什么\
  \ HTTP 被称为无状态协议。\n然而，一旦需要将多个 HTTP 请求分配给操作应用程序的特定用户，服务器上的应用程序就需要维护会话上下文。通过将会话信息附加为\
  \ `GET` 参数或使用 cookie，这成为了可能。因此 HTTP 保持无状态，而添加状态并不违背 HTTP 的本质。\nHTTP 概念上的单向性则是另一回事。虽然在互联网初期，数据流只能由客户端发起是完全可接受的，但随着现代\
  \ Web 应用程序的发展，数据流也能由服务器触发变得越来越必要。想象一个聊天应用程序，服务器需要通知用户 B，用户 A 已经发送了一些消息。从那时起，人们使用了多种技术来克服\
  \ HTTP 的这一概念性缺陷，但没有一种技术易于理解和/或维护。\n作为补救措施，*WebSocket* 被发明出来，它允许服务器和客户端之间进行双向通信。自\
  \ JEE 7 版本起，Java 企业服务器就包含了 WebSocket。Jakarta EE 10 当然也包含了 WebSocket 实现。本章将讨论如何在\
  \ Jakarta EE 中使用 WebSocket。\n\n服务器端的 WebSocket\n\nWebSocket 由 JSR 356 涵盖。你可以在以下地址查看规范：\n\
  \n```\nhttps://www.jcp.org/en/jsr/detail?id=356\n```\n\n有几种环境可以运行服务器端 WebSocket。由于本书讨论的是\
  \ Jakarta EE，本章将考虑在由 WAR 打包的 Web 应用程序中运行 WebSocket，这是运行它们的主要场所。\n\n你可以像启动本书中描述的任何其他\
  \ WAR 项目一样启动一个 WebSocket 项目。要添加一个 WebSocket，你所要做的就是引入一个带有适当注解的 Java 类。选择任意名称和包，并编写以下内容：\n\
  \n\n\n```\npackage book.jakartapro.websocket.server;\nimport jakarta.enterprise.context.ApplicationScoped;\n\
  import jakarta.inject.Inject;\nimport jakarta.json.Json;\nimport jakarta.json.JsonObject;\n\
  import jakarta.json.JsonReader;\nimport jakarta.websocket.OnClose;\nimport jakarta.websocket.OnError;\n\
  import jakarta.websocket.OnMessage;\nimport jakarta.websocket.OnOpen;\nimport jakarta.websocket.Session;\n\
  import jakarta.websocket.server.ServerEndpoint;\n@ApplicationScoped\n@ServerEndpoint(\"\
  /actions\")\npublic class WebSocketServer {\n@OnOpen\npublic void open(Session session)\
  \ {\n// 以某种方式处理已打开的会话。例如\n// 将 session 对象保存在某个\n// 会话注册器类的实例中...\n}\n@OnClose\n\
  public void close(Session session) {\n// 以某种方式处理已关闭的会话\n}\n@OnError\npublic void\
  \ onError(Throwable error) {\n// 以某种方式处理 websocket 错误\n}\n@OnMessage\npublic void\
  \ handleMessage(String message,\nSession session) {\n// 接收字符串消息。不要求\n// 使用 JSON\
  \ 作为消息格式，但在许多情况下这是一个\n// 不错的选择，并且它简化了\n// JavaScript websocket 客户端的编程\ntry (JsonReader\
  \ reader = Json.createReader(\nnew StringReader(message))) {\nJsonObject jsonMessage\
  \ = reader.readObject();\n// 处理传入的消息...\n}\n}\n}\n```\n\n可以看到，你将服务器对象添加到了\n应用作用域中。通常的会话作用域在这里不起作用，因为\n\
  websocket 并不对应传统 HTTP\n意义上的用户会话。\n\n为了向客户端发送消息，\n你需要获取一个 `jakarta.websocket.Session`\n\
  对象，然后按如下方式发送消息：\n\n```\n// 构建一个数据对象：\nJsonProvider provider = JsonProvider.provider();\n\
  JsonObject msg = provider.createObjectBuilder()\n.add(\"someField\", \"someValue\"\
  )\n.add(\"someOtherField\", 42)\n...\n.build();\n// 将其发送给客户端：\ntry {\nsession.getBasicRemote().sendText(msg.toString());\n\
  } catch (IOException ex) {\n// 处理错误。同时可能从会话存储中移除该会话：\n// sessions.remove(session);\n\
  }\n```\n\n如果 WAR 文件\n在 `WebSock-Server-War`\n上下文下运行，本地 GlassFish 上的 websocket URI\
  \ 如下所示：\n\n```\nhttp://localhost:8080/WebSock-Server-War/actions\n```\n\n你需要知道这一点，以便客户端\
  \ Web 应用程序\n（JavaScript）能够连接到 websocket。\n\n顺便提一下，为了更改 EAR 插件的上下文（如果 Web\n应用程序是\
  \ EAR 的一部分），你必须在 `build.gradle` 中调整 EAR 插件\n配置：\n\n```\n...\near {\ndeploymentDescriptor\
  \ {\nwebModule(\"WebSock-Server-War.war\",\n\"sock-context\")\n}\n}\n```\n\n其中 `WebSock-Server-War.war`\n\
  是生成的 WAR 模块的部署构件，而 `sock-context`\n是新的上下文：\n\n```\nhttp://localhost:8080/sock-context/\n\
  ```\n\n如果你改为将 Web 应用程序部署为 WAR 文件，则由\n服务器决定上下文的外观。对于 GlassFish 7，\n你可以在部署期间指定上下文根：\n\
  \n```\n./asadmin \\\n--user THE_USER \\\ndeploy --contextroot sock-context theWar.war\n\
  ```\n\n客户端上的 WebSocket\n\n在客户端\n，你需要将以下 JavaScript 代码添加到你的 Web\n应用程序中：\n\n```\n\n\
  var server = \"localhost:8080/WebSock-Server-War\";\nvar socket = new WebSocket(\"\
  ws://\" + server +\n\"/actions\");\nsocket.onmessage = onMessage;\nfunction onMessage(event)\
  \ {\n// 处理来自服务器的消息...\n// 我们假设消息是 JSON 格式\nvar msg = JSON.parse(event.data);\n...\n\
  }\n...\n// 向服务器发送消息。你可以从\n// JavaScript 代码的某个位置或\n// 事件处理程序（如按钮按下）中执行此操作\nvar msg\
  \ = {\nid: 42,\ntxt: \"Hello World\"\n};\nsendToServer(msg);\n...\nfunction sendToServer(msg)\
  \ {\n// 我们将消息转换为 JSON 字符串，因此\n// 'msg' 可以是任何对象\nsocket.send(JSON.stringify(msg));\n\
  }\n\n...\n\n```\n\nsocket URL 中的 `/actions`\n部分应与 Java 服务器类中的 `@ServerEndpoint`\n\
  注解匹配。\n\n11. 前端技术\n\n随着 Web 应用程序位于用户和\n应用程序功能之间的接口上，并且需要在各种类型的设备上呈现设计良好且\n高度可用的前端，前端技术\n\
  在开发者社区中获得了大量关注。\n\n使用 Jakarta EE 专用技术\nFaces 或 REST 构建 Web 前端是可以接受的，但由于前端需要满足的众多不同甚至有时相互矛盾的\n\
  需求，存在许多\n不同的 Web 前端技术。很难决定\n你是否需要第三方 Web 前端技术，如果需要，\n又该选择哪一种。以下基本问题可以帮助你做出决定：\n\n\
  *   它是收费的，还是开源或免费的？\n\n*   文档质量如何？\n\n*   产生良好设计的预期工作量是多少？\n\n*   将图形设计师的想法融入 Web\n\
  \    应用程序有多容易？\n\n*   确保 Web 应用程序具有良好的\n    可用性有多容易？\n\n*   将前端包含在 Jakarta\n   \
  \ EE 中有多困难？\n\n*   适配不同的前端设备（浏览器\n    和智能手机）有多容易？\n\n*   出现问题时获得帮助有多容易？\n\n*   升级到新版本有多容易？\n\
  \n*   使用该前端技术需要哪些编程技能？\n\n*   该技术在五年后仍然存在的可能性有多大？\n\n从问题和可能答案的数量来看，你可能会猜到\n很容易列出十种、二十种甚至更多的前端技术，\n\
  它们各有优缺点。在一本书中不可能对所有这些技术进行\n全面的介绍，但以下各节将概述几种技术并介绍一些优缺点。\n\n注意\n\n由于此类比较的性质，某个或另一个框架的\n\
  拥护者可能会不同意我的评估。但请注意，\n这仅仅是功能的粗略比较。你可以\n使用每个产品的 Web 文档来得出自己的结论。\n\n浏览列表时，你可能会觉得我不是\n\
  Node.js 的粉丝。我不得不承认事实确实如此。我\n不认同通常的论点，即 Web 开发者知道如何使用 JavaScript，因此使用\nJavaScript\
  \ 作为服务器端语言和构建环境是一个\n好主意。相反，我认为 Java 生态系统已经拥有\n构建良好且优雅代码所需的一切，并且\n在浏览器中运行的前端逻辑和后端逻辑应该保持分离，\n\
  因为两者在架构方面和开发者编程技能方面有不同的要求。话虽如此，当然由你决定。\n你可以尽情使用 Node.js。\n我个人认为，在项目过程中混合使用 Jakarta\
  \ EE 和 Node.js\n会引入不必要的概念复杂性。\n\n无第三方前端技术\n如前所述，Jakarta EE 中包含的 Faces 和 REST 技术足以构建任何类型的\
  \ Web 应用程序。如果包含 `jQuery` JavaScript\n库，你可以简化开发，因为它可以消除一些浏览器差异，并帮助你编写\n更短、更优雅的 JavaScript\
  \ 代码。\n\n优点：\n\n*   Faces 和 REST 已包含在 Jakarta EE 中\n\n*   高度标准化且稳定\n\n*   非常好的文档\n\
  \n缺点：\n\n*   需要高级开发技能才能实现\n    良好的图形设计和高度可用性\n\n*   未明确处理不同的前端设备\n\nPlay 2\n\nPlay（版本\
  \ 2）\n是一种全栈 Web 应用程序技术。它使用 Java 或 Scala\n作为编程语言，并允许你使用函数式模式。它\n遵循 MVC（模型-视图-控制器）范式。一个包含运行中\
  \ Web 服务器的基本开发项目\n可在五分钟内设置完成。\n\n```\nhttps://www.playframework.com/\n```\n\n优点：\n\
  \n*   基于 HTTP，无状态。\n\n*   明确支持移动设备。\n\n*   异步请求，非阻塞 I/O。\n\n*   快速开发生命周期。\n\n缺点：\n\
  \n\n\n*   对 Scala 而非 Java 作为编程语言存在一定偏好。\n\n*   虽然 Play 同时支持 SBT 和 Gradle 作为构建工具，但其介绍基本依赖于\
  \ SBT，这意味着你需要学习 SBT 才能熟悉 Play。\n\n*   Play 引入了一种全栈 Web 应用技术。因此，它是 Jakarta EE 的竞争对手，将两者混合使用颇具挑战性。\n\
  \nReact\n\nReact 是一个\n基于组件的 Web 开发框架。你使用一种名为 JSX 的增强型 JavaScript 语言，将编程逻辑与 HTML\
  \ 标记混合在一起。例如：\n\n```\nclass ShoppingList extends React.Component {\nrender() {\n\
  return (\n\nShopping List for {this.props.name}\n\nBananas\nApples\nPeanuts\n\n\
  );\n}\n}\n```\n\n在开发过程中，一个即时编译器会将 JSX 转换为 JavaScript；而在生产环境中，则可以使用预编译器。\n\n```\n\
  https://reactjs.org/\n```\n\n优点：\n\n*   将 JavaScript 和 HTML 编码（JSX 页面）混合在一起，在一定程度上简化了开发。\n\
  \n*   与其他技术无缝集成，因此你可以逐步将 React 功能引入 Jakarta EE 应用程序。\n\n*   开发过程中对 JSX 页面进行即时编译，使得开发速度很快。\n\
  \n缺点：\n\n*   React 由 Facebook 维护，这取决于公司政策。你可能不希望为你的软件接受这些偏好。此外，其许可证包含一些感觉像是供应商锁定的部分。\n\
  \n*   生产代码的构建过程严重依赖 Node.js，这引入了一种基于 JavaScript 作为服务器端代码语言的新范式。使用 React 意味着你必须维护两个生态系统：Java\
  \ 和 JavaScript。此外，Node.js 还引入了另一种供应商锁定：为 Node.js 模块构建和维护私有及公司拥有的软件仓库并不容易。\n\n* \
  \  标记（HTML）和逻辑没有分离，这与广泛接受的 MVC 范式相矛盾。\n\nAngular 2\n\nAngular 是一个\n模板化 Web 开发框架。你使用特殊语法创建包含\
  \ Angular 组件占位符的 HTML 页面。部署 Angular 应用程序通过 Node.js（一个服务器端 JavaScript 框架）进行。\n\n\
  ```\nhttps://angular.io/\n```\n\n优点：\n\n*   明确针对移动设备。\n\n*   Angular 将*依赖注入*引入到\
  \ Web 层（JavaScript/TypeScript 代码）。\n\n缺点：\n\n*   Angular 依赖 TypeScript，而 TypeScript\
  \ 需要先转换为 JavaScript 才能在浏览器上运行。\n\n*   Angular 严重依赖 Node.js，这引入了一种基于 JavaScript 作为服务器端代码语言的新范式。将\
  \ Angular 与 Jakarta EE 结合使用意味着你必须维护两个生态系统：Java 和 JavaScript。此外，Node.js 还引入了另一种供应商锁定：为\
  \ Node.js 模块构建和维护私有及公司拥有的软件仓库并不容易。\n\n*   Angular 引入了一种全栈 Web 应用技术。因此，它是 Jakarta\
  \ EE 的竞争对手，将两者稳定地混合使用颇具挑战性。\n\nSpring Boot\n\nSpring Boot\n利用 Spring 平台，使你能够快速开发\
  \ Web 应用程序。\n\n```\nhttps://spring.io/projects/spring-boot\n```\n\n优点：\n\n*   在独立的、近乎生产就绪的环境中快速搭建\
  \ Web 应用程序（和微服务）。\n\n*   Spring Boot 会自动打开监控端口，用于发现指标和技术应用程序状态。\n\n*   严重依赖*约定优于配置*模式，简化了配置并加快了开发速度。\n\
  \n缺点：\n\n*   Spring 可能被视为 Jakarta EE 的竞争对手，尽管 Spring 和 Jakarta 在版本升级过程中会相互采纳对方的功能。将两者混合使用是可能的，但这会给应用程序开发带来新的复杂性。\n\
  \n*   Spring Boot 是一个“让别人替你干活”的框架。你会在某种程度上失去对应用程序内部功能的控制。这可能是你不希望发生的事情。\n\n\n\n\
  *   Spring Boot 倾向于分布式微服务。如果这与您的应用程序架构相悖，那么 Spring Boot 可能不是您的最佳选择。\n\nVue\n\nVue\
  \ 是一个模板框架，与 Angular 类似，但复杂性更低，且采用更模块化的方法。\n\n```\nhttps://vuejs.org\n```\n\n优点：\n\
  \n*   使用 JavaScript 作为前端逻辑语言，因此无需像许多其他框架那样学习 TypeScript。\n\n*   Vue 可以增量采用，这意味着您可以逐步在\
  \ Web 应用程序中引入 Vue。\n\n*   允许快速开发，因为所有模板都由页面的 JavaScript 代码即时生成。\n\n*   虽然是可选的，但可以在服务器端渲染\
  \ HTML 页面，从而加快页面加载速度（当然，代价是增加服务器负载）。\n\n缺点：\n\n*   虽然可以通过在 Web 应用程序的 HTML 页面中使用\
  \ `<script>` 标签来引入 Vue，但文档建议使用 Node.js 作为构建环境。这引入了一种基于 JavaScript 作为脚本语言的新范式。\n\n\
  Spring MVC\n\nSpring MVC 是 Spring Boot 中“约定优于配置”程度较低的兄弟框架。之前关于 Spring Boot 的阅读内容同样适用于\
  \ Spring MVC，不同之处在于 Spring MVC 需要更多的配置工作。这反过来使得 Spring MVC 与 Spring Boot 相比具有更高的通用性，代价是需要做更多的工作才能使其正常运行。\n\
  \n```\nhttps://spring.io/guides/gs/serving-web-content/\n```\n\n优点：\n\n*   与 Spring\
  \ 架构保持一致，通过注入构建组件层次结构。\n\n*   文档完善。\n\n缺点：\n\n*   复杂度高。\n\n*   Spring 可能被视为 Jakarta\
  \ EE 的竞争对手，尽管 Spring 和 Jakarta 在版本升级过程中会相互采用对方的功能。两者可以混合使用，但这会给应用程序开发带来新的复杂性。\n\n\
  *   Spring 是一个“让别人替你干活”的框架。通过使用 Spring 的子技术或 Spring 模块，您会在某种程度上失去对应用程序内部功能的控制。这可能是您不希望做的事情。\n\
  \nEmber\n\nEmber 是另一个基于模板的 Web 应用程序框架，它依赖 Node.js 作为构建和执行框架。\n\n```\nhttps://emberjs.com/\n\
  ```\n\n优点：\n\n*   高度基于*约定优于配置*，允许编写精简代码。\n\n缺点：\n\n*   尽管基于*约定优于配置*，但与其他框架相比，Ember\
  \ 的学习曲线似乎更陡峭。\n\n*   Ember 依赖 Node.js，这引入了一种基于 JavaScript 作为服务器端代码语言的新范式。将 Ember\
  \ 与 Jakarta EE 一起使用意味着您需要维护两个生态系统——Java 和 JavaScript。此外，Node.js 还引入了另一个供应商锁定：为 Node.js\
  \ 模块构建和维护私有及公司拥有的软件仓库并不容易。\n\n*   Ember 引入了一种全栈 Web 应用程序技术。因此，它是 Jakarta EE 的竞争对手，并且以稳定的方式将两者混合使用具有挑战性。\n\
  \nAct.Framework\n\n```\nhttp://actframework.org/\n```\n\n优点：\n\n*   使用依赖注入，允许编写精简代码。\n\
  \n*   通过依赖 REST 进行前后端通信，展现出清晰且高性能的架构。\n\n*   使用 Maven 进行构建，因此能更好地与 Jakarta EE 构建流程集成。\n\
  \n*   允许您在不同的渲染（模板）引擎之间进行选择。\n\n缺点：\n\n*   模板由第三方库完成，这导致偏离了 Jakarta EE 规范。虽然代码可能比使用\
  \ Faces 更少，但使用 `Act.Framework` 会因需要同时监控后端（Jakarta EE）和前端（`Act.Framework`）规范的开发而引入额外的项目复杂性。\n\
  \nApache Struts 2\n\nApache Struts 是一种历史悠久的、遵循 MVC（模型-视图-控制器）范式的前端技术。\n\n```\nhttps://struts.apache.org\n\
  ```\n\n优点：\n\n*   按照设计，Apache Struts 试图不隐藏 HTTP 协议的无状态特性。因此，Struts 可以被认为是一种“纯粹”的\
  \ Web 开发方法。\n\n*   Struts 是一个成熟的 Web 开发框架，表现出高度的稳定性，并且预计在未来也能持续适用。\n\n缺点：\n\n* \
  \  学习曲线陡峭，需要具备一定的理解 HTTP 请求-响应周期的能力。\n\n*   虽然 Struts 2 支持多种前端模板引擎，甚至可以通过使用 REST\
  \ 来避免复杂的模板，但 Struts 仍然倾向于使用“老式”的 JSP 技术。\n\nGWT\n\nGoogle 公司的 GWT 基本上是一个编译引擎，它将\
  \ Java 类转换为 JavaScript，然后可以在浏览器中执行。\n\n```\nhttp://www.gwtproject.org/\n```\n\n\
  优点：\n\n*   消除了开发任何 JavaScript 代码的需要。一切都只是 Java。\n\n*   可以逐步从普通的 Web 应用程序迁移到 GWT。\n\
  \n*   与 Eclipse 等 IDE 集成良好。\n\n*   调试支持良好。\n\n缺点：\n\n*   您在某种程度上受限于按照 Google 人员设想的方式来构建\
  \ Web 应用程序。\n\n*   Java 本身并不擅长定义 HTML 标记。从 Java 到 JavaScript 和 HTML 的转换，虽然由 GWT\
  \ 自动化，但远非一个简单、清晰的过程。\n\n*   没有简单的方法来做事。与其他 Web 应用程序框架相比，第一个可运行的 Web 应用程序版本会晚很多才出现。\n\
  \n*   编写优秀的 GWT 应用程序需要大量的 Java 开发技能。\n\nVaadin\n\nVaadin 是一个基于 Java 的 Web 开发框架。其发行版区分了具有基本功能的免费版本和具有更复杂模块的付费版本。\n\
  \n```\nhttps://vaadin.com/\n```\n\n优点：\n\n*   明确支持 PC 浏览器和手持设备。\n\n*   包含用于网格数据、图表和对话框的复杂组件。\n\
  \n*   默认提供专业外观的 UI 设计。\n\n*   明确支持 Java EE (/Jakarta EE)。\n\n*   支持 Maven 和 Gradle\
  \ 构建工具。\n\n*   整个 Web 应用程序只需要 Java。\n\n缺点：\n\n*   分为免费的 basic 功能和付费的 pro 功能。这始终存在一种风险，即有一天您可能被迫为您曾经认为是\
  \ basic 的功能付费。\n\n*   UI 逻辑和状态存储在服务器上。这会导致高负载的公开可用应用程序出现性能问题。\n\n*   细粒度的前端定制，例如动画，很难实现。\n\
  \nDataTables\n\n这是一个 `jQuery` 插件。虽然它不是一种多用途的前端技术，但 `DataTables` 使您能够以非常灵活的方式在浏览器中显示和编辑表格数据。在企业内部应用中，列出表格数据和编辑数据是常见任务，而\
  \ `DataTables` 可以帮助您快速实现此类应用，并在后台运行 Jakarta EE。\n\n```\nhttps://www.datatables.net/\n\
  ```\n\n优点：\n\n*   易于集成。作为一个 jQuery 插件，`DataTables` 对所使用的后端技术没有任何限制。\n\n*   高度灵活。\n\
  \n*   强大的搜索功能。\n\n*   文档完善。\n\n缺点：\n\n*   不是一种多用途的前端技术。\n\nD3js\n\nD3js 是一个强大的可视化库。它可以帮助您可视化科学和/或业务相关数据。\n\
  \n```\nhttps://d3js.org/\n```\n\n优点：\n\n*   非常灵活的可视化库。\n\n*   高度专业的外观设计。\n\n*  \
  \ 通过 HTML `<script>` 标签即可简单引入。\n\n缺点：\n\n*   不是一种多用途的前端技术。\n\n*   需要一些时间来了解所有功能的全貌。\n\
  \n*   使用它需要良好的 JavaScript 技能。\n\n12. 基于表单的身份验证\n\n\n\n安全 Web 应用程序通常使用 HTTPS（SSL/TLS）通信协议而非\
  \ HTTP，并要求用户通过登录对话框进行身份验证。采用*基本身份验证*流程时，浏览器会提供一个标准化的用户凭证输入表单。虽然基本身份验证易于实现和配置，但它无法让你控制登录对话框的呈现方式和行为。专业\
  \ Web 应用程序会改用*基于表单的身份验证*，这种方式允许它们实现符合公司策略和设计准则的自定义登录对话框。\n\n注意\n\nJSR-375 曾试图标准化\
  \ Jakarta EE 安全技术。然而，除了相关公告之外，你在互联网上找不到有用的教程和示例，因此其实现状态似乎存疑。因此，本书将介绍一种略显过时但运行可靠且文档完善的原始\
  \ Jakarta EE 安全增强技术。\n\n在服务器上启用安全功能\n在服务器上启用和配置安全功能，以及添加用户和组，取决于 Jakarta EE 服务器产品、其配置以及你使用的安全方法。虽然这意味着你需要查阅服务器文档以了解具体细节，但以下段落描述了\
  \ GlassFish 7 的基本步骤，以便让你有个基本概念。\n\n注意\n\n我们这里不涉及存储在专用 SQL 用户数据库中的用户。要包含数据库访问，请创建一个类型为\
  \ `com.sun.enterprise.security.auth.realm.jdbc.JDBCRealm` 的新域。使用终端，你可以在一行内输入以下内容：\n\
  \n```\nasadmin create-auth-realm\n--classname com.sun.enterprise.security.auth.realm.jdbc.JDBCRealm\n\
  --property jaas-context=jdbcRealm\n:datasource-jndi=\"jdbc/auth\"\n:user-table=users\n\
  :user-name-column=email\n:password-column=password\n:group-table=users_groups\n\
  :group-name-column=groupname\n:digest-algorithm=SHA-512\nuserMgmtJdbcRealm\n```\n\
  \n如果你想使用 Web 管理控制台，则必须在创建域时逐个添加这些属性。\n\n首先，你需要在服务器范围的配置设置中启用安全功能。为此，请在 Web 管理控制台\
  \ `http://localhost:4848` 中，选择 Configurations ➤ Server-config ➤ Security。然后勾选 Security\
  \ Manager 复选框。\n\n接下来，你需要向服务器的用户数据库添加一个名为 `AdminUser` 的示例用户。该用户必须被分配到 `ApplAdmin`\
  \ 组。同样在 `http://localhost:4848` 中，导航到 Configurations ➤ Server-config ➤ Security\
  \ ➤ Realms ➤ File。点击 Manage Users 按钮。在出现的页面上，点击 New，然后输入以下内容：\n\n```\nUser ID: \
  \   AdminUser\nGroup List: ApplAdmin\nPassword:   pW41834\n```\n\n点击 OK。这个新用户被存储在服务器文件树结构内的一个文件中。这就是\
  \ `file` 域名称的由来。\n\nFaces 的基于表单的身份验证\n\n要开始为你的 Faces 页面开发基于表单的身份验证，请创建一个新的 Gradle\
  \ 项目，并像往常一样添加一个包含四个文件的 `src/main/webapp/WEB-INF` 文件夹。一个名为 `beans.xml` 的文件：\n\n以及另外三个文件，分别名为\
  \ `faces-config.xml`、`glassfish-web.xml` 和 `web.xml`。\n对于 `faces-config.xml` 的内容，请编写以下内容：\n\
  \n```\n\nbook.jakartapro.formbasedauth.web.WebMessages\n\nbundle\n\nen\nes -->\n\
  \n```\n\n（`javaee/` 后面不应有换行符或空格。）这个文件没有什么特别之处；只需确保将 `book.jakartapro.formbasedauth.web`\
  \ 替换为 `src/main/resources` 中存放语言资源的文件夹即可。对于这个示例项目，你可以保留原样。\n\n对于 `glassfish-web.xml`\
  \ 文件，目前只需编写以下内容：\n\n重要的配置部分将写入 `web.xml`。在这里，你需要定义一个安全约束和一个登录配置，如下所示：\n\n```\n\n\
  index.xhtml\n\nFaces Servlet\n\njakarta.faces.webapp.FacesServlet\n\nFaces Servlet\n\
  *.xhtml\n\nAdmin Constraint\n\nmembers\n\n/admin/*\n\nadmin\n\nCONFIDENTIAL\n\n\
  FORM\nfile\n\n\n\n/login/login.xhtml\n/login/error.xhtml\n\nadmin\n\n```\n\n由于 `<security-constraint>`\
  \ 内部的设置，\n服务器会拦截对某些资源的访问，具体如下：\n\n*   `<url-pattern>` 内部的模式\n    决定了要监控哪些资源。此处，你指明\
  \ `admin/` 下的所有\n    资源都必须置于安全监管之下。\n\n*   传输协议被强制使用 SSL/TLS。这是因为\n    `<transport-guarantee>`\
  \ 内部的 `CONFIDENTIAL` 标记。\n    如有必要，从 HTTP 到 HTTPS 的切换会自动进行。\n\n*   用户已通过身份验证并拥有\
  \ `admin` 角色。这是\n    因为 `<role-name>` 标签。\n\n`<login-config>`\n元素表明\n你想要使用基于表单的身份验证，并指定了登录\n\
  表单文件。稍后将讨论这些文件。在 `<login-config>` 内部，\n`<auth-method> FORM </auth-method>`（`FORM`\
  \ 是一个\n预定义常量）规定了一个用于身份验证的自定义表单。\n`<realm-name> file </realm-name>` 指明了授权数据\n的位置。这是服务器特定的——这里的\
  \ `file`（不是\nJakarta EE 规范中看到的预定义常量）是用于\nGlassFish 的，它指定了服务器上用于存储用户和密码的本地文件。\n`<security-role>`\n\
  元素列出了\n所有影响应用程序的角色（除了未授权访问）。\n虽然你可以有多个角色，但本例中只有一个。\n\n安全角色映射\n\n服务器将\n角色（在 `web.xml`\
  \ 中定义）映射到\n用户组（在服务器产品中定义）。此映射在\n`WEB-INF / *-web.xml` 文件中指定。对于 GlassFish，你需要重写\n\
  `WEB-INF` 文件夹内的 `glassfish-web.xml`\n文件，并使其内容如下：\n\n```\n\nadmin\nApplAdmin\n\n\
  ```\n\n`admin`\n角色被映射到 `ApplAdmin` 用户组，\n因为你在前面的章节中使用了 `ApplAdmin` 作为用户的组。\n\n基于表单的身份验证\
  \ XHTML 代码\n\nWeb 用户进入受保护应用程序部分所需的步骤\n取决于你的应用程序，更准确地说，取决于 `web.xml`\n文件中 `<security-constraint>`\
  \ 内部的 `<url-pattern>`\n标签。例如，如果你需要一个按钮或链接来进入\n安全区域，你可以这样写：\n\n```\n...\n\n...\n\n\
  ...或...\n\n...\n\n```\n\n注意\n\n为简洁起见，本示例对 XHTML 文本使用了字面值。对于\n生产代码，你应该改用语言资源文件。\n\
  \n如果在 `<security-constraint>`\n内部的 `<url-pattern>`\n标签中，你编写了以下内容：\n\n```\n/admin/*\n\
  ```\n\n服务器就知道它需要要求提供凭证才能进入\n按钮或链接中给出的安全区域。\n\n对于基于表单的身份验证代码，`login.xhtml` 由\n`web.xml`\
  \ 文件中的 `<login-config>`\n引用。你可以编写一个如下所示的登录表单：\n\n```\n\n登录表单\n\n请登录：\n\n```\n\n\
  你可以编写任何你喜欢的内容，添加公司指南定义的图片和样式，\n以及添加“忘记密码”链接、信息页面\n链接、地址、电话号码等。重要的部分是：\n\n*不要*在此处使用\
  \ `<h:form>`。\n而是使用此处所示的纯 HTML `<form>` 标签。你必须\n为 action 使用 `j_security_check`，并为\n\
  字段 ID 使用 `j_username` 和 `j_password`。\n\n对于错误\n页面（`login/error.xhtml`），\n当输入无效的用户/密码组合时将显示该页面，\n\
  你可以使用以下内容：\n\n```\n\n登录错误\n\n无效的用户名或密码。\n请输入有权访问受保护部分的用户名或密码。\n对于此应用程序，这意味着\n一个已在文件领域中创建并已分配给\n\
  ApplAdmin 组的用户。\n\n```\n\n注意\n\n本示例在链接的值前添加了 `#{request.contextPath}`，\n因为错误页面不能使用相对\
  \ URL。\n这是因为它由登录模块处理，该模块会丢弃\n应用程序的 URL 上下文。\n\n应用程序现在可以运行了。你可以部署它，并将浏览器指向\n以下 URL\
  \ 进行测试：\n\n```\nhttps://localhost:8181/FormBasedAuth/\n```\n\n13. 客户端证书\n\n在服务器端使用\
  \ SSL/TLS 来确保隐私和数据完整性\n是当今非常常见的任务。随着 TLS 的出现，SSL 已被弃用，\n你可以确信你的通信是加密的，并且属于服务器的\n\
  一方的身份也是安全的。服务器向客户端出示\n证书以证明其身份。然而，客户端一侧的身份\n是通过将对话框输入中的密码与数据库中的密码进行比较来检查的。\n如果这对你来说还不够，你可以要求你的\n\
  Web 应用程序的用户也通过证书进行身份验证。\n为了实现这一点，你使用*客户端*证书。这样，\n你获得了更高的安全性，因为用户不能像有时密码那样\n将证书钉在显示器上，并且将证书借给\n\
  他人与将密码交给他人也是不同的情况。本章讨论\n这些客户端证书。\n\n准备脚本\n在安装客户端证书之前，你需要知道如何\n生成它们。本书涵盖专业的 Web 应用程序，因此你\n\
  可能拥有不止少数几个客户端证书。因此，\n如果你能使用脚本进行批量生产，那就太好了。我向你展示\n这样一个脚本，并且由于此示例使用 Groovy 作为脚本语言，你可以\n\
  从 Linux 和 Windows 机器上管理客户端证书。\n\n注意\n\n不要忘记添加 Groovy 插件，如本书开头所述。\n\n首先，在 Eclipse\
  \ 中创建一个新的 Gradle 和 Groovy 项目：选择 文件\n➤ 新建 ➤ 其他... ➤ Gradle 项目，并输入 `ClientCertificates`\
  \ 作为\n项目名称。项目创建后，右键单击该项目\n并选择 配置 ➤ 转换为 Groovy 项目，以添加显式的 Groovy\n脚本功能。\n向项目添加一个新的\
  \ `scripts` 文件夹，\n然后再次右键单击该项目并选择 属性 ➤\nGroovy 编译器。勾选“启用项目特定设置”复选框。\n对“启用脚本文件夹支持”执行相同操作，并添加\
  \ `scripts` 文件夹（在\n对话框中输入 `scripts/*`）。\n\n注意\n\n为了更严格地遵守标准，你可以使用 `src/main/scripts`\
  \ 作为\n脚本文件夹。我在这里仅将 Gradle 用于依赖项解析，因此\n使用 `scripts`\n顶级文件夹，虽然不太像 Gradle 风格，但在项目资源管理器中更容易找到。\n\
  但如果你愿意，也可以使用标准位置。\n\n在 `build.gradle` 文件中，\n为名为 `Bouncycastle` 的证书管理库添加依赖项，如下所示：\n\
  \n```\ndependencies {\n...\nimplementation 'org.bouncycastle:bcprov-jdk15on:1.64'\n\
  }\n```\n\n在同一文件中，确保你使用的是 Java 1.17：\n\n```\nplugins {\n...\n}\nsourceCompatibility\
  \ = 1.17\ntargetCompatibility = 1.17\n```\n\n然后右键单击该项目并选择 Gradle ➤ 刷新 Gradle 项目。\n\
  \n生成客户端证书\n\n要生成一个或多个客户端证书，请添加\n名为 `scripts/generate.groovy` 的脚本文件，如下所示：\n\n\n\n\
  ```\nimport java.security.spec.RSAPrivateKeySpec\nimport java.security.spec.RSAPublicKeySpec\n\
  import java.security.*\nimport java.security.cert.*\nimport java.time.Instant\n\
  import java.time.temporal.ChronoUnit\nimport org.bouncycastle.jce.provider.BouncyCastleProvider\n\
  import org.bouncycastle.cert.jcajce.*\nimport org.bouncycastle.operator.*\nimport\
  \ org.bouncycastle.asn1.x500.X500Name\nimport org.bouncycastle.operator.jcajce.*\n\
  import org.bouncycastle.openssl.*\nimport org.bouncycastle.openssl.jcajce.JcaPEMWriter\n\
  KEYSTORE_PASSWORD = \"changeit\"\nRSA_KEYSIZE = 2048\nRSA_SIGN_ALGORITHM = 'SHA256WithRSA'\n\
  VALIDITY_DAYS = 3650\nUSERS = [[\"MarkHamilton\",\"pw173\"], [\"LindaGreen\",\"\
  pw518\"]]\nnew File(\"OUTPUT\").deleteDir(); new File(\"OUTPUT\").mkdir()\nUSERS.each\
  \ { user0 ->\ndef user = user0[0]\ndef pw = user0[1]\ndef certFull = makeCert(user)\n\
  def cert = certFull.cert\n//println(cert.getClass())\n//println(cert)\nFileWriter\
  \ fileWriter = new FileWriter(\nnew File(\"OUTPUT\" + File.separator +\n\"clientCert.\"\
  \ + user + \".pem\"))\nJcaPEMWriter pemWriter = new JcaPEMWriter(fileWriter)\npemWriter.writeObject(cert)\n\
  pemWriter.flush()\nX509Certificate[] serverChain = new X509Certificate[1]\nserverChain[0]\
  \ =  cert\ndef keyStore = KeyStore.getInstance(\"PKCS12\")\nkeyStore.load(null,\
  \ pw.toCharArray())\nkeyStore.setEntry(user,\nnew KeyStore.PrivateKeyEntry(certFull.priv,\n\
  serverChain),\nnew KeyStore.PasswordProtection(pw.toCharArray())\n)\ndef fos = new\
  \ java.io.FileOutputStream(\"OUTPUT\" +\nFile.separator + \"clientCert.\" + user\
  \ + \".p12\")\nkeyStore.store(fos, pw.toCharArray())\n}\ndef makeCert(def commonName)\
  \ {\ndef bcProvider = BouncyCastleProvider.PROVIDER_NAME\nSecurity.addProvider(\n\
  new org.bouncycastle.jce.provider.\nBouncyCastleProvider())\ndef keyPairGenerator\
  \ =\nKeyPairGenerator.getInstance(\"RSA\", bcProvider)\nkeyPairGenerator.initialize(RSA_KEYSIZE)\n\
  def keyPair = keyPairGenerator.generateKeyPair()\ndef contentSigner =\nnew JcaContentSignerBuilder(RSA_SIGN_ALGORITHM).\n\
  build(keyPair.private)\ndef dnName = new X500Name(\"CN=\" + commonName)\ndef certSerialNumber\
  \ = BigInteger.valueOf(\nSystem.currentTimeMillis())\ndef startDate = Instant.now()\n\
  def endDate = startDate.plus(VALIDITY_DAYS,\nChronoUnit.DAYS)\ndef certBuilder =\
  \ new JcaX509v3CertificateBuilder(\ndnName,\ncertSerialNumber,\nDate.from(startDate),\n\
  Date.from(endDate),\ndnName,\nkeyPair.public)\nX509Certificate certificate =\nnew\
  \ JcaX509CertificateConverter().\nsetProvider(bcProvider).\ngetCertificate(certBuilder.build(contentSigner))\n\
  [\"priv\":keyPair.private,\n\"pub\":keyPair.public,\n\"cert\":certificate]\n}\n\
  ```\n\n如有必要，请修改文件顶部的全大写变量，特别是 `USERS` 列表中的用户名和密码。然后通过右键单击并选择“运行方式 ➤ Groovy 脚本”来运行该脚本。按\
  \ F5 刷新包资源管理器，您将在 `OUTPUT` 文件夹中看到证书。`PKCS12` 文件用于在浏览器上安装证书，而 `PEM` 文件则是对应的、将在服务器上注册的证书。\n\
  \n**在浏览器中存储客户端证书**\n\n要在浏览器上安装 PKCS12 文件，您必须将它们与安装手册一起分发给您的用户。或者，作为一种替代方案，您可以使用一些配置管理软件来完成此任务。安装过程取决于您使用的浏览器。\n\
  \n如果您选择手动安装并使用 Firefox，请打开首选项并进入“隐私与安全”部分。在“证书”部分，单击“查看证书”，然后在“您的证书”选项卡上，单击“导入”。选择\
  \ PKCS12 文件。系统将提示您输入密码。该密码已在生成器脚本的 users 列表中指定。\n\n对于 Windows 上的 Internet Explorer，只需双击该文件即可启动导入过程。您需要输入的密码是在生成器脚本的\
  \ users 列表中指定的密码。\n\n**在服务器上存储客户端证书**\n\n要将客户端证书存储在服务器上，请使用您在前面的部分中生成的 `.pem` 文件。可以使用\
  \ shell 脚本执行此任务，但由于您手头已有 Groovy 项目，因此也可以使用 Groovy 脚本来简化此工作并提高灵活性（过滤、重命名等）。\n\n对于\
  \ GlassFish 服务器，您需要备份现有的 `cacerts.jks` 密钥库文件，从构建目录 `OUTPUT` 中读取所有 `.pem` 文件，将它们传入密钥库的内存表示中，最后用更新后的版本覆盖\
  \ `cacerts.jks` 文件：\n\n```\nimport java.security.*\nimport java.security.cert.*\n\
  import java.time.Instant\nimport java.time.LocalDateTime\nimport java.time.format.DateTimeFormatter\n\
  import java.time.temporal.ChronoUnit\nimport javax.security.auth.x500.X500Principal\n\
  import org.bouncycastle.asn1.x500.X500Name\nimport org.bouncycastle.cert.jcajce.*\n\
  import org.bouncycastle.jce.provider.BouncyCastleProvider\nimport org.bouncycastle.openssl.PEMParser\n\
  import org.bouncycastle.openssl.jcajce.JcaPEMWriter\nimport org.bouncycastle.operator.jcajce.*\n\
  KEYSTORE_PASSWORD = \"changeit\"\nKEYSTORE_ALIAS_PREFIX = \"\"\nIMPORT_FOLDER =\
  \ \"OUTPUT\"\nGLASSFISH_INST = \"/my/local/glassfish/glassfish7\"\nGLASSFISH_DOMAIN\
  \ = \"domain1\"\nSecurity.addProvider(new org.bouncycastle.jce.provider.\nBouncyCastleProvider())\n\
  // 备份旧的 cacerts.jks\ndef FS = File.separator\ndef cacerts = GLASSFISH_INST + FS\
  \ + \"glassfish\" + FS +\n\"domains\" + FS +\nGLASSFISH_DOMAIN + FS + \"config\"\
  \ + FS + \"cacerts.jks\"\ndef bak = cacerts + \".\" + LocalDateTime.now().format(\n\
  DateTimeFormatter.ISO_LOCAL_DATE_TIME).\nreplaceAll(/[^\\d]/, \"_\")\nnew File(bak).bytes\
  \ = new File(cacerts).bytes\n// 加载当前密钥库\nKeyStore ks = KeyStore.getInstance(\"JKS\"\
  )\nchar[] password = KEYSTORE_PASSWORD.toCharArray()\nFileInputStream fis  = new\
  \ FileInputStream(cacerts)\nks.load(fis, password)\nfis.close()\n// 获取并注册所有新密钥\n\
  new File(\"OUTPUT\").listFiles().\ngrep{ f -> f.name.endsWith(\".pem\") }.each {\
  \ f ->\nprintln(f)\naddPemToStore(f, ks)\n}\n// 覆盖 cacerts.jks 文件\nks.store(new\
  \ FileOutputStream(new File(cacerts)),\npassword)\ndef addPemToStore(def f, def\
  \ keyStore) {\ndef p = new PEMParser(new FileReader(f))\ndef o = p.readObject()\n\
  X509Certificate x509 =\nnew JcaX509CertificateConverter().\nsetProvider(\"BC\").getCertificate(o)\n\
  println(x509)\nX500Principal princ = x509.subjectX500Principal\ndef name = princ.name.replaceAll(/CN\\\
  s*=\\s*/,\"\")\nprintln(name)\nkeyStore.deleteEntry(KEYSTORE_ALIAS_PREFIX + name)\n\
  keyStore.setCertificateEntry(\nKEYSTORE_ALIAS_PREFIX + name, x509)\nkeyStore.aliases().each\
  \ {\nalias -> println(\"A: \" + alias) }\n}\n```\n\n保存此文件（例如，保存为 `scripts/importToServer.groovy`）。像往常一样，根据您的需要修改此文件开头的全大写变量。\n\
  \n> **注意**\n>\n> Jakarta EE 服务器产品决定了证书的存储位置，因此对于 GlassFish 以外的服务器，需要采用其他步骤。请阅读服务器手册以了解如何安装证书。\n\
  \n**客户端证书 Web 应用程序**\n\n用于需要使用客户端证书的 Web 应用程序的 `WEB-INF/web.xml` Web 部署描述符内容如下：\n\
  \n```\n...\n\n...\n\n...\n\n安全区域\n\n成员\n\n/admin/*\n\nadmin\n\nCONFIDENTIAL\n\n\
  CLIENT-CERT\ncertificate\n\nadmin\n\n...\n```\n\n请注意以下特征：\n\n*   `<web-resource-collection>`\
  \ 内部的 `<url-pattern>` 标签描述了您想要保护的 Web 应用程序部分。\n\n*   `<role-name>` 标签指定了用户为了获得对受保护部分的访问权限而需要获取的角色名称。稍后，在特定于服务器的部署描述符（对于\
  \ GlassFish 是 `glassfish-web.xml`）中，您将看到如何描述从角色到用户组的映射。\n\n*   `<transport-guarantee>\
  \ CONFIDENTIAL </transport-guarantee>` 代码确保您将为受保护区域切换到 HTTPS（SSL/TLS）。\n\n\n\n*\
  \   `<auth-method>CLIENT-CERT</auth-method>` 代码是最关键的部分。在此示例中，你声明要使用客户端证书登录安全区域。随后的\
  \ `<realm-name> certificate </realm-name>` 标签告知服务器登录凭据（即证书）在服务器上的存储位置。后者是服务器特定的设置——对于\
  \ GlassFish 而言，`certificate` 域指示 GlassFish 使用已注册的客户端证书。\n\n角色到用户组的映射发生在服务器特定的部署描述符中。对于\
  \ GlassFish，该文件是 `WEB-INF/glassfish-web.xml`。此文件的内容可能如下所示：\n\n```\n\nadmin\nauthorized\n\
  \n```\n\n此示例表示将角色 `admin` 映射到用户组 `authorized`。对于其他服务器，你需要查阅其手册以了解如何将角色映射到用户组。\n\n\
  **额外的 GlassFish 配置**\n为了让 GlassFish 使用客户端证书，你需要启用此功能。打开 Web 管理控制台 `http://localhost:4848`，然后依次选择“配置”\
  \ ➤ “服务器配置” ➤ “HTTP 服务” ➤ “HTTP 监听器” ➤ “http-listener-2”。在 SSL 选项卡上，勾选“客户端身份验证”复选框。\n\
  \n请注意，用户组与证书之间没有直接关系。这是一个特定于服务器产品的设置。对于 GlassFish，你需要编辑此文件：\n\n```\nGLASSFISH_INST/glassfish/domains/domain1/config/domain.xml\n\
  ```\n\n滚动到\n\n```\n\n并将该条目修改为\n\n进行此更改后，你必须重新启动服务器。\n\n**注意**\n\nGlassFish 7 中存在一个错误，导致你无法通过\
  \ Web 管理控制台管理此条目。幸运的是，对于 `certificate` 域，你只需编辑此文件一次，无论对该域进行何种客户端证书管理活动。\n\n**客户端证书示例**\n\
  \n作为示例，创建一个 Web 应用程序，并在 `src/main/webapp/WEB-INF` 目录下包含以下文件：\n\n```\nbeans.xml:\n\
  \nfaces-config.xml:\n\nbook.jakartapro.clientcertauth.web.WebMessages\n\nbundle\n\
  \nen\nes -->\n\nglassfish-web.xml:\n\nadmin\nauthorized\n\nweb.xml:\n\nindex.xhtml\n\
  \nFaces Servlet\n\njakarta.faces.webapp.FacesServlet\n\nFaces Servlet\n*.xhtml\n\
  \nAdmin Constraint\n\nmembers\n\n/admin/*\n\nadmin\n\nCONFIDENTIAL\n\nCLIENT-CERT\n\
  certificate\n\nadmin\n\n```\n\n同时，在 `src/main/webapp` 目录下创建以下 XHTML 文件：\n\n```\n\
  index.xhtml:\n\nClient Cert Authentication\n\nThis is the company website\n\nadmin/secured.xhtml:\n\
  \nClient Cert Authentication\n\nSecured area\n\n```\n\n你可以通过导航到安全区域来验证客户端证书是否正常工作。此外，还可以查看浏览器中的页面属性。在\
  \ Firefox 中，点击标题栏中 URL 地址旁边的安全徽章，然后选择“连接不安全” → “更多信息”。\n\n**注意**\n\n除非你更改了 GlassFish\
  \ 中的 HTTPS 监听器配置（并且项目名称为 `ClientCertAuth`），否则请访问 `https://localhost:8181/ClientCertAuth`。\n\
  \n**14. REST 安全性**\n\n对于 SPA（单页 Web 应用程序），无法可靠地使用 `WEB-INF/web.xml` 中定义的安全约束来强制执行安全性。原因是这些安全约束是专门为\
  \ Web 页面的 HTTP 请求和响应量身定制的，而非 JSON 片段。此外，尽管存在用于将 REST 类和方法标记为需进行安全检查的注解，但 REST 实现并非必须实际执行这些检查。用于\
  \ RESTful 服务的 JAX-RS 规范根本不处理安全性问题。\n作为补救措施，一些额外的规范明确处理了 REST 安全性：JWT（JSON Web 令牌）、JWS（JSON\
  \ Web 签名）、JWE（JSON Web 加密）、JWK（JSON Web 密钥）和 JWA（JSON Web 算法）。这一系列规范处理了安全令牌以及 JSON\
  \ 数据的签名和加密。\n\n**注意**\n\nJSR-375 曾试图标准化 Jakarta EE 安全技术。然而，其实现似乎处于不确定状态，并且你在互联网上找不到有用的教程和示例。因此，我决定使用上述技术。\n\
  \n\n\n本章介绍如何使用 JJWT（Java JSON Web Token）库来保护 REST 端点。内容聚焦于浏览器与服务器之间的通信，因此仅涵盖 JWT\
  \ 和 JWS。所有其他 REST 安全规范或许能提升安全性，但它们不易适用于浏览器与服务器之间的通信。如果你也考虑使用这些规范，请查阅相关规范以及 [`https://github.com/jwtk/jjwt`](https://github.com/jwtk/jjwt)\
  \ 上的 JJWT 文档。\n\nREST URL 的安全约束\n\n假设你有一个单页应用（SPA），其中包含一个名为 `index.html` 的 HTML\
  \ 页面和两类 REST 数据查询，如下所示：\n\n```\n/data/unsecured/*\n/data/secured/*\n```\n\n以下章节将向你展示如何开发一种方法，将\
  \ JWT 安全应用于 `/data/secured/*` 这类 REST URL。\n\n关于 JSON Web Token\nJSON Web Token（JWT）是客户端-服务器通信中断言一系列声明（claims）的数据片段。它们在\
  \ RESTful 应用中尤其有用，此类声明可以是用户名、角色分配等信息。\n\n生成和校验 JWT 以确保用户通过身份验证的主要思路如下：\n\n1.  用户启动登录流程，将凭据（用户名和密码）发送至服务器。这通常通过\
  \ AJAX 调用完成，典型方式为 `POST` 或 `PUT` 请求。\n2.  服务器尝试对用户进行身份验证。\n3.  如果身份验证失败，则构建一个*不含*\
  \ JWT 的响应，服务器从该调用返回。\n4.  否则，服务器生成一个新的 JWT。\n5.  使用密钥对 JWT 进行签名，该密钥与用户名和签名密钥一起存储在某个数据库中。JWT\
  \ 在响应头中返回。\n6.  浏览器客户端接收 JWT 并将其存储在浏览器会话中。\n7.  在随后的每次 AJAX 请求中，客户端（浏览器）都会在请求头中发送该\
  \ JWT。服务器决定是否检查传输的 JWT，并相应地返回成功或失败的响应。\n\n参见图 14-1。\n\n![](img/490565_1_En_14_Fig1_HTML.png)\n\
  \nJWT 流程的框图。客户端请求用户名和密码，这些信息被发送到服务器。服务器对用户名、声明进行身份验证并签名，然后将响应发送回客户端。客户端将任何后续请求发送到服务器以检查\
  \ JWT 流程，并发送响应。\n\n图 14-1\nJWT 流程\n\n注意\n\n与通常的安全敏感型应用一样，协议应强制使用 TLS。在 GlassFish\
  \ 中，你可以禁用不安全的 HTTP 监听器；对于其他服务器产品，请查阅相关文档。\n\n由于使用了秘密（私有）密钥，服务器可以确保 JWT 未被篡改。从客户端（浏览器）的角度来看，JWT\
  \ 是一段可能包含用户组等声明的数据。如果客户端对这些声明不感兴趣，JWT 会在请求和响应头中传递，而忽略其任何结构或内容。\n\n准备 GlassFish\n\
  \n由于本章使用的代码需要 Java 运行时权限，而这些权限并非 GlassFish 自动授予的，因此你需要对服务器策略进行一些调整。打开以下文件：\n\n```\n\
  GLASSFISH-INST/glassfish/domains/domain1/\nconfig/server.policy\n```\n\n并向其中添加以下行：\n\
  \n```\n// 使 Jackson 序列化工作\ngrant {\npermission java.lang.reflect.ReflectPermission\n\
  \"suppressAccessChecks\";\n};\n// 允许编程式登录\ngrant {\npermission javax.security.auth.AuthPermission\n\
  \"createLoginContext.fileRealm\";\npermission javax.security.auth.AuthPermission\n\
  \"doAsPrivileged\";\n};\n```\n\nJWT 登录流程，客户端代码\n\n对于登录流程，假设你有用于输入用户名和密码的输入字段，以及“登录”和“注销”按钮。此外，你还有两个用于测试访问安全和非安全数据的按钮，以及一个用于诊断输出的区域：\n\
  \n```\n\nREST 安全\n\n用户：\n密码： \n登录\n注销\n\n访问非安全数据\n访问安全数据\n\n```\n\n这是主 HTML 文件的一部分。该文件以及其余的客户端代码位于\
  \ `webapp` 源文件夹内：\n\n```\nsrc\nmain\nwebapp\nstatic\nindex.html\njs\nscript.js\n\
  jquery-3.3.1.min.js\ncss\nstyles.css\nWEB-INF\nweb.xml\nglassfish-web.xml\nbeans.xml\n\
  ```\n\n在 `script.js` JavaScript 文件中，你添加一个用于存储 JWT 的变量，以及执行登录和注销活动并对测试按钮做出响应的代码：\n\
  \n```\nvar jwt = '';\n$(function() {\n$('#loginButton').click(function(){\nvar url\
  \ = \"../jwtlogin/login\";\nvar loginObj = {\nuser: $('#user').val(),\npasswd: $('#passwd').val()\n\
  };\n$.ajax({\nmethod: \"PUT\",\ndataType: \"json\",\ncontentType: \"application/json\"\
  ,\nurl: url,\ndata: JSON.stringify(loginObj),\n})\n.done(function(data, status,\
  \ jqXHR) {\n$('#errOutput').html(\"\");\n$('#output').html(\"已登录\");\njwt = jqXHR.getResponseHeader(\"\
  Authorization\");\n})\n.fail(function(jqXHR, textStatus, errorThrown) {\n$('#errOutput').html(\"\
  AJAX 错误: \" + errorThrown);\n$('#output').html(\"\");\njwt = \"\";\n});\n});\n$('#logoutButton').click(function(){\n\
  var url = \"../jwtlogin/logout\";\n$.ajax({\nmethod: \"PUT\",\ndataType: \"json\"\
  ,\ncontentType: \"application/json\",\nurl: url\n})\n.done(function(data, status,\
  \ jqXHR) {\n$('#errOutput').html(\"\");\n$('#output').html(\"已注销\");\njwt = jqXHR.getResponseHeader(\"\
  Authorization\");\n})\n.fail(function(jqXHR, textStatus, errorThrown) {\n$('#errOutput').html(\"\
  AJAX 错误: \" + errorThrown);\n$('#output').html(\"\");\njwt = \"\";\n});\njwt = \"\
  \";\n});\n$('#accessUnsecuredButton').click(function(){\nvar url = \"../unsecured/hello\"\
  ;\n$.ajax({\nmethod: \"GET\",\nheaders: {Authorization : jwt},\ndataType: \"json\"\
  ,\ncontentType: \"application/json\",\nurl: url\n})\n.done(function(data, status,\
  \ jqXHR) {\n$('#output').html(data.msg);\n$('#errOutput').html(\"\");\n})\n.fail(function(jqXHR,\
  \ textStatus, errorThrown) {\n$('#output').html(\"\");\n$('#errOutput').html(\"\
  AJAX 错误: \" + errorThrown);\n});\n});\n$('#accessSecuredButton').click(function(){\n\
  var url = \"../secured/hello\";\n$.ajax({\nmethod: \"GET\",\nheaders: {Authorization\
  \ : jwt},\ndataType: \"json\",\ncontentType: \"application/json\",\nurl: url\n})\n\
  .done(function(data, status, jqXHR) {\n$('#output').html(data.msg);\n$('#errOutput').html(\"\
  \");\n})\n.fail(function(jqXHR, textStatus, errorThrown) {\n$('#output').html(\"\
  \");\n$('#errOutput').html(\"AJAX 错误: \" + errorThrown);\n});\n});\n});\n```\n\n\
  按钮的 `onclick` 处理程序构造 AJAX `PUT` 请求并将其发送到服务器。来自服务器的结果和错误消息会输出到诊断输出字段。成功登录后，服务器发送的\
  \ JWT 会存储在全局 `jwt` 变量中。\n\n`styles.css` CSS 文件目前仅包含一些基本的样式指令：\n\n```\nbody { color:\
  \ #000044; }\ndiv.clearfloat { clear: both; }\n.err { color: red; };\n```\n\n`WEB-INF/web.xml`\
  \ 文件声明了 REST Servlet。由于你正在添加编程式安全，因此无需在此处添加与安全相关的配置条目：\n\n```\n\nRest 安全\n\njakarta.ws.rs.core.Application\n\
  \njakarta.ws.rs.core.Application\n\n/*\n\n```\n\n`beans.xml` 文件将 `all` 指定为发现模式：\n\
  \n服务器特定的部署描述符 `glassfish-web.xml` 可以具有以下基本形式：\n\n服务器代码\n\n服务器端类位于 `book.jakartapro.restsecurity`\
  \ 包中：\n\n```\nsrc\nmain\njava\nbook\njakartapro\nrestsecurity\nStaticContent.java\n\
  NonSecured.java\nSecured.java\njwt\nJWTLogin.java\nJWTTokenNeeded.java\nJWTTokenNeededFilter.java\n\
  KeyGenerator.java\nJWTKeyGeneratorImpl.java\n```\n\n当然，你可以根据自己的需要调整这些内容。\n\n`StaticContent`\
  \ 类是一个简单的控制器，用于提供 Web 应用 `static/` 部分中的静态内容。\n\n\n\n```\npackage book.jakartapro.restsecurity;\n\
  import java.io.InputStream;\nimport jakarta.ejb.Stateless;\nimport jakarta.inject.Inject;\n\
  import jakarta.servlet.ServletContext;\nimport jakarta.ws.rs.GET;\nimport jakarta.ws.rs.Path;\n\
  import jakarta.ws.rs.PathParam;\nimport jakarta.ws.rs.core.Response;\n// http://localhost:8080/RestSecurity/static/index.html\n\
  @Path(\"/static\")\n@Stateless\npublic class StaticContent {\n@Inject ServletContext\
  \ context;\n@GET\n@Path(\"/{path : .*}\")\npublic Response staticResources(\n@PathParam(\"\
  path\") final String path) {\nfinal InputStream resource = context.\ngetResourceAsStream(String.format(\n\
  \"/static/%s\", path));\nreturn null == resource ?\nResponse.status(Response.Status.NOT_FOUND).build()\n\
  : Response.ok().entity(resource).build();\n}\n}\n```\n\nJWT 登录流程，服务端代码\n\n对于登录流程，你需要实现一个名为\
  \ `JWTLogin` 的类。该类负责处理 `jwtlogin/login` 和 `jwtlogin/logout` 这两个 REST URL，并与容器提供的认证机制进行交互：\n\
  \n```\npackage book.jakartapro.restsecurity.jwt;\nimport static jakarta.ws.rs.core.HttpHeaders.AUTHORIZATION;\n\
  import static jakarta.ws.rs.core.MediaType.\nAPPLICATION_JSON;\nimport static jakarta.ws.rs.core.Response.Status.*;\n\
  import java.security.Key;\nimport java.security.Principal;\nimport java.time.LocalDateTime;\n\
  import java.time.ZoneId;\nimport java.util.Date;\nimport jakarta.inject.Inject;\n\
  import jakarta.servlet.ServletException;\nimport jakarta.servlet.http.HttpServletRequest;\n\
  import jakarta.transaction.Transactional;\nimport jakarta.ws.rs.Consumes;\nimport\
  \ jakarta.ws.rs.PUT;\nimport jakarta.ws.rs.Path;\nimport jakarta.ws.rs.Produces;\n\
  import jakarta.ws.rs.core.Context;\nimport jakarta.ws.rs.core.Response;\nimport\
  \ jakarta.ws.rs.core.UriInfo;\nimport io.jsonwebtoken.Jwts;\nimport io.jsonwebtoken.SignatureAlgorithm;\n\
  @Path(\"/jwtlogin\")\n@Produces(APPLICATION_JSON)\n@Consumes(APPLICATION_JSON)\n\
  @Transactional\npublic class JWTLogin {\npublic static class Credentials {\npublic\
  \ String user;\npublic String passwd;\npublic String getUser() {\nreturn user;\n\
  }\npublic void setUser(String user) {\nthis.user = user;\n}\npublic String getPasswd()\
  \ {\nreturn passwd;\n}\npublic void setPasswd(String passwd) {\nthis.passwd = passwd;\n\
  }\n}\n@Context\nprivate UriInfo uriInfo;\n@Inject\nprivate KeyGenerator keyGenerator;\n\
  @PUT\n@Path(\"login\")\npublic Response authenticateUser(Credentials creds,\n@Context\
  \ HttpServletRequest req) {\ntry {\n// 使用提供的凭据对用户进行身份验证\nauthenticate(creds.user,\
  \ creds.passwd, req);\n// 为用户签发令牌\nString token = issueToken(creds.user);\n// TODO:\
  \ 可能将令牌保存到某个数据库中\n// 在响应中返回令牌\nreturn Response.ok().header(AUTHORIZATION,\n\"Bearer\
  \ \" + token).entity(\"{}\").build();\n} catch (Exception e) {\ne.printStackTrace(System.err);\n\
  return Response.status(UNAUTHORIZED).build();\n}\n}\n@PUT\n@Path(\"logout\")\npublic\
  \ Response unauthenticateUser(\n@Context HttpServletRequest req) {\ntry {\n// TODO:\
  \ 可能从数据库中移除令牌\n// 取消身份验证\nunauthenticate(req);\n// 返回空响应\nreturn Response.ok().entity(\"\
  {}\").build();\n} catch (Exception e) {\ne.printStackTrace(System.err);\nreturn\
  \ Response.status(INTERNAL_SERVER_ERROR).\nbuild();\n}\n}\n////////////////////////////////////////////////////////\n\
  ////////////////////////////////////////////////////////\nprivate void authenticate(String\
  \ login, String password,\nHttpServletRequest req) throws Exception {\n// 使用容器进行身份验证。作为替代方案，你也可以实现\n\
  // 自己的身份验证流程。\nboolean authenticated = false;\nPrincipal p = req.getUserPrincipal();\n\
  if(p != null && p.getName().equals(login))\nauthenticated = true;\ntry {\nif(!authenticated)\n\
  req.login(login, password);\n} catch(ServletException ex) {\nthrow new SecurityException(\"\
  无效的用户名/密码\");\n}\n}\nprivate void unauthenticate(HttpServletRequest req)\nthrows\
  \ Exception {\n// 使用容器取消身份验证。作为替代方案，你也可以实现\n// 自己的取消身份验证流程。\nboolean authenticated\
  \ = false;\nPrincipal p = req.getUserPrincipal();\nif(p != null)\nauthenticated\
  \ = true;\nif(authenticated)\nreq.logout();\n}\nprivate String issueToken(String\
  \ login) {\nKey key = keyGenerator.generateKey();\nString jwtToken = Jwts.builder()\n\
  .setSubject(login)\n.setIssuer(uriInfo.getAbsolutePath().toString())\n.setIssuedAt(new\
  \ Date())\n.setExpiration(toDate(\nLocalDateTime.now().plusMinutes(15L)))\n.signWith(key,\
  \ SignatureAlgorithm.HS512)\n.compact();\nreturn jwtToken;\n}\nprivate Date toDate(LocalDateTime\
  \ localDateTime) {\nreturn Date.from(\nlocalDateTime.atZone(ZoneId.systemDefault()).\n\
  toInstant());\n}\n}\n```\n\n该类的特性如下：\n\n\n\n*   该类响应针对\n    [`https://server.addr:8181/RestSecurity/jwtlogin/login`](https://server.addr:8181/RestSecurity/jwtlogin/login)\n\
  \    和 [`https://server.addr:8181/RestSecurity/jwtlogin/logout`](https://server.addr:8181/RestSecurity/jwtlogin/logout)\n\
  \    URL 的 `PUT` 请求。除非另行配置，`RestSecurity`\n    对应 WAR 文件的名称，`8181` 是\n    TLS 安全\
  \ HTTP 监听器的端口。\n\n*   名为 `Credentials` 的内部类用于保存\n    凭据。它是支持 REST 的 `authenticateUser()`\n\
  \    方法所必需的，这样 JAX-RS 就能自动将 JSON 输入转换为\n    单个方法参数。\n\n*   `KeyGenerator` 用于\n \
  \   构建密钥或对 JWT 进行签名。它永远不会发送给\n    客户端。\n\n*   在生产环境中，已登录用户、其 JWT 以及\n    签名密钥都应保存在数据库中。为简洁起见，代码中仅包含\n\
  \    相应的 `TODO` 标记。\n\n*   `authenticate()` 和\n    `unauthenticate()`\n    方法连接到容器的基础设施，用于用户的登录\n\
  \    和注销。\n\n*   `issueToken()` 方法使用 JJWT\n    库来构建 JWT。\n\n将 JWT 发送回服务器\n\n一旦在客户端\
  \ JavaScript 代码中接收到 JWT，它就会被存储在一个局部\n变量中。随后所有的 AJAX 请求都应在 `Authorization` HTTP\n\
  标头中传输此 JWT。\n\n```\n$.ajax({\nmethod: \"GET\",\nheaders: {Authorization : jwt},\
  \ // <===\ndataType: \"json\",\ncontentType: \"application/json\",\nurl: url\n})\n\
  .done(function(data, status, jqXHR) {\n// 成功，访问被允许或 JWT 被忽略...\n})\n.fail(function(jqXHR,\
  \ textStatus, errorThrown) {\n// 失败，JWT 过期或不匹配...\n});\n```\n\n你应该将此标头添加到*所有* AJAX\
  \ 调用中，因为对于\n传输 JWT 而言，服务器是否会检查\nJWT 并不重要。如果服务器不检查它，该标头值将\n被忽略。如果服务器检查它，并且 JWT 不\n\
  匹配或已过期，服务器将在 AJAX\n响应中发送一个错误代码。\n\n在 REST 端点中处理 JWT\n\n`Secured` 和\n`NonSecured`\n\
  类是简单的 REST 端点类，用于\n演示安全和非安全的 REST 访问：\n\n```\npackage book.jakartapro.restsecurity;\n\
  import jakarta.ws.rs.GET;\nimport jakarta.ws.rs.Path;\nimport jakarta.ws.rs.PathParam;\n\
  import jakarta.ws.rs.Produces;\nimport jakarta.ws.rs.core.Response;\nimport book.jakartapro.restsecurity.jwt.JWTTokenNeeded;\n\
  @Path(\"/secured\")\n@JWTTokenNeeded\npublic class Secured {\n@GET\n@Path(\"/{path\
  \ : .*}\")\n@Produces(\"application/json\")\npublic Response hello(@PathParam(\"\
  path\") String path) {\nreturn Response.ok().entity(\n\"{\\\"msg\\\":\\\"\" + \"\
  安全内容\" + \"\\\"}\"\n).build();\n}\n}\n==--\npackage book.jakartapro.restsecurity;\n\
  import jakarta.ws.rs.GET;\nimport jakarta.ws.rs.Path;\nimport jakarta.ws.rs.PathParam;\n\
  import jakarta.ws.rs.Produces;\nimport jakarta.ws.rs.core.Response;\n@Path(\"/unsecured\"\
  )\npublic class NonSecured {\n@GET\n@Path(\"/{path : .*}\")\n@Produces(\"application/json\"\
  )\npublic Response hello(@PathParam(\"path\") String path) {\nreturn Response.ok().entity(\n\
  \"{\\\"msg\\\":\\\"\" + \"非安全内容\" + \"\\\"}\"\n).build();\n}\n}\n```\n\n重要的区别在于，安全端点类使用了\n\
  `@JWTTokenNeeded` 注解。此注解也\n可以在方法级别使用。\n\n该注解本身使用了 JAX-WS 自动绑定魔法。其代码如下：\n\n```\n\
  package book.jakartapro.restsecurity.jwt;\nimport java.lang.annotation.Retention;\n\
  import static java.lang.annotation.RetentionPolicy.*;\nimport java.lang.annotation.Target;\n\
  import static java.lang.annotation.ElementType.*;\nimport jakarta.ws.rs.NameBinding;\n\
  @NameBinding\n@Retention(RUNTIME)\n@Target({TYPE, METHOD})\npublic @interface JWTTokenNeeded\
  \ {\n}\n```\n\n由于 `NameBinding` 元注解的存在，JAX-WS\n会查找该注解的实现，该实现随后作为 REST 方法的过滤器。此实现并非基于\
  \ Java 语言层面。相反，过滤器本身使用了 `@JWTTokenNeeded` 注解：\n\n```\npackage book.jakartapro.restsecurity.jwt;\n\
  import java.io.IOException;\nimport java.security.Key;\nimport jakarta.annotation.Priority;\n\
  import jakarta.inject.Inject;\nimport jakarta.ws.rs.Priorities;\nimport jakarta.ws.rs.container.ContainerRequestContext;\n\
  import jakarta.ws.rs.container.ContainerRequestFilter;\nimport jakarta.ws.rs.core.HttpHeaders;\n\
  import jakarta.ws.rs.core.Response;\nimport jakarta.ws.rs.ext.Provider;\nimport\
  \ io.jsonwebtoken.Jwts;\n@Provider\n@JWTTokenNeeded\n@Priority(Priorities.AUTHENTICATION)\n\
  public class JWTTokenNeededFilter\nimplements ContainerRequestFilter {\n@Inject\n\
  private KeyGenerator keyGenerator;\n@Override\npublic void filter(ContainerRequestContext\n\
  requestContext) throws IOException {\n// 从请求中获取 HTTP Authorization 标头\nString authorizationHeader\
  \ = requestContext.\ngetHeaderString(HttpHeaders.AUTHORIZATION);\nif(authorizationHeader\
  \ == null)\nauthorizationHeader = \"\";\nif(authorizationHeader.equals(\"\")) {\n\
  requestContext.abortWith(Response.status(\nResponse.Status.UNAUTHORIZED).build());\n\
  } else {\n// 从 HTTP Authorization 标头中提取令牌\nString token = authorizationHeader.\n\
  replaceAll(\"^Bearer \",\"\");\ntry {\n// 验证令牌\nKey key = keyGenerator.generateKey();\n\
  Jwts.parser().setSigningKey(key).\nparseClaimsJws(token);\n} catch (Exception e)\
  \ {\n//e.printStackTrace(System.err);\nrequestContext.abortWith(Response.status(\n\
  Response.Status.UNAUTHORIZED).build());\n}\n}\n}\n}\n```\n\n该类提取 `Authorization`\
  \ HTTP\n标头并检查它是否包含有效且未过期的 JWT。如果\n一切正常，它就直接返回。否则，`abortWith(...)`\n语句会导致 AJAX 请求返回一个\
  \ `UNAUTHORIZED` 错误\n代码。\n\n在代码中，`keyGenerator.generateKey()`\n方法始终返回相同的（秘密）签名密钥。在生产环境中，你\n\
  应该从数据库中获取密钥。你可以通过使用\n以下代码来获取用于访问此类数据库实体的“用户”密钥：\n\n```\nString dd = new String(Base64.getDecoder().\n\
  decode(token.split(\"\\\\.\")[1]));\nJsonReader reader = Json.createReader(\nnew\
  \ StringReader(dd));\nJsonObject jsonObject = reader.readObject();\nString user\
  \ = jsonObject.getString(\"sub\");\n```\n\n尽管这绕过了 JWT 签名，但如果你仅将此 `user` 字符串用于\n\
  从数据库中获取 JWT 签名，则不会带来\n安全风险，因为\n此签名不可能被篡改。\n\n15. JAVA MVC\n\nJava MVC 是\n模型-视图-控制器模式的一种符合\
  \ Jakarta EE 规范的实例化。\n它是基于组件的 Faces 技术的替代方案。Java MVC 的\n规范由 JSR-371 管理，并且作为\nJava\
  \ MVC 的一种实现，它使用了 Eclipse Krazo 项目。\n\n关于 MVC\nMVC（模型-视图-控制器）是一种相当古老的\n架构模式，起源于 1979\
  \ 年。它包含将应用程序\n分离为用于数据的模型层、用于前端展示的视图层，\n以及用于前端转换（页面流）和模型与视图之间数据协调的控制器层。\nJakarta\
  \ EE 的专用 Web 架构技术是 Faces，\n它不一定与 MVC 相矛盾，但偏向于\n分层组件结构，为每个请求引入生命周期，\n并让组件决定页面流。为了回归本源，让开发者专注于\
  \ MVC 并避免\n组件树的特殊性，Java MVC 项目应运而生。相应的\nJSR-371 版本号为 1.0，可用于\n商业产品。Eclipse Krazo\
  \ 项目（版本 2.0.0）提供了\n一种实现。\n\n该规范可在以下地址获取：\n\n```\nhttps://jcp.org/en/jsr/detail?id=371\n\
  ```\n\n\n\n安装 Java MVC\n\n要安装 Java MVC，你需要在 Gradle 构建文件中添加以下依赖：\n\n```\nimplementation\
  \ 'jakarta.mvc:jakarta.mvc-api:2.0.0'\nimplementation 'org.eclipse.krazo:krazo-jersey:3.0.1'\n\
  implementation 'jstl:jstl:1.2'\n```\n\n最后一个依赖实际上并非 MVC 所必需，但由于你没有使用 Faces 页面，因此必须回归到使用\
  \ JSP 页面，并添加 JSTL 以支持网页模板中的条件语句和循环等增强功能。更准确地说，整个 `build.gradle` 文件内容如下：\n\n```\n\
  plugins {\nid 'war'\n}\nsourceCompatibility = 1.17\ntargetCompatibility = 1.17\n\
  repositories {\njcenter()\n}\ndependencies {\ntestImplementation 'junit:junit:4.13.2'\n\
  implementation 'jakarta.platform:jakarta.jakartaee-api:10.0.0'\nimplementation 'jakarta.mvc:jakarta.mvc-api:2.0.0'\n\
  implementation 'org.eclipse.krazo:krazo-jersey:3.0.1'\nimplementation 'org.glassfish.jersey.core:jersey-server:3.0.0'\n\
  implementation 'jstl:jstl:1.2'\nimplementation 'org.webjars:bootstrap:4.3.1'\n}\n\
  task deployWar(dependsOn: war,\ndescription:\">>> JavaMVC 部署任务\") {\ndoLast {\n\
  def FS = File.separator\ndef glassfish =\nproject.properties['glassfish.inst.dir']\n\
  def user = project.properties['glassfish.user']\ndef passwd = project.properties['glassfish.passwd']\n\
  File temp = File.createTempFile(\"asadmin-passwd\",\n\".tmp\")\ntemp  ${sout}\"\n\
  if(serr.toString()) System.err.println(serr)\ntemp.delete()\n}\n}\ntask undeployWar(\n\
  description:\">>> JavaMVC 取消部署任务\") {\ndoLast {\ndef FS = File.separator\ndef glassfish\
  \ =\nproject.properties['glassfish.inst.dir']\ndef user = project.properties['glassfish.user']\n\
  def passwd = project.properties['glassfish.passwd']\nFile temp = File.createTempFile(\"\
  asadmin-passwd\",\n\".tmp\")\ntemp  ${sout}\"\nif(serr.toString()) System.err.println(serr)\n\
  temp.delete()\n}\n}\n```\n\n这段代码添加了用于本地部署和取消部署的常规任务。要使其生效，请在 Gradle 项目的根文件夹中的 `gradle.properties`\
  \ 文件中添加以下内容：\n\n```\nglassfish.inst.dir = /path/to/your/glassfish7\nglassfish.user\
  \ = admin\nglassfish.passwd =\n```\n\n在本章的剩余部分，你将学习如何开发一个宠物商店 Web 应用程序作为示例项目。该项目名为\
  \ `JavaMvc`。\n\n配置文件\n\n在 `src/main/webapp/WEB-INF` 目录下，创建两个文件——一个名为 `beans.xml`：\n\
  \n以及一个名为 `glassfish-web.xml` 的文件：\n\nJava MVC 基于 JAX-RS，并使用注解来控制 REST API。因此，不需要\
  \ `web.xml` 文件。同样，出于相同原因，你也不需要传统的 `index.*`（`index.jsp` 或其他）文件。\n\n在主包（名为 `book.jakartapro.javamvc`）中，创建一个包含以下内容的\
  \ `App` 类：\n\n```\npackage book.jakartapro.javamvc;\nimport jakarta.ws.rs.ApplicationPath;\n\
  import jakarta.ws.rs.core.Application;\n@ApplicationPath(\"/mvc\")\npublic class\
  \ App extends Application {\n}\n```\n\n这会在上下文根路径上添加一个额外的 `/mvc`。在同一包中，添加一个名为 `RootRedirector`\
  \ 的 Web 过滤器：\n\n```\npackage book.jakartapro.javamvc;\nimport jakarta.servlet.FilterChain;\n\
  import jakarta.servlet.annotation.WebFilter;\nimport jakarta.servlet.http.HttpFilter;\n\
  import jakarta.servlet.http.HttpServletRequest;\nimport jakarta.servlet.http.HttpServletResponse;\n\
  import java.io.IOException;\n/**\n* 重定向 http://localhost:8080/JavaMvc/\n* 这样我们就不需要在\
  \ web.xml 中定义 <welcome-file-list>\n*/\n@WebFilter(urlPatterns = \"/\")\npublic class\
  \ RootRedirector extends HttpFilter {\nprivate static final long serialVersionUID\
  \ =\n7332909156163673868L;\n@Override\nprotected void doFilter(final HttpServletRequest\
  \ req,\nfinal HttpServletResponse res,\nfinal FilterChain chain) throws IOException\
  \ {\nres.sendRedirect(\"mvc/pets\");\n}\n}\n```\n\n这添加了一个重定向器，以便在浏览器地址栏中使用基础 URL\
  \ 时直接跳转到宠物列表。\n\n从 Jersey 2.0 版本开始，你需要添加一个桥接器，用于连接 HTML 表单和非 HTML 的 REST 动词，例如 `DELETE`\
  \ 和 `PUT`。在不使用 AJAX 的 HTML 中，无法发出 `DELETE` 和 `PUT` 请求。另一方面，由于在服务器端你希望保持代码整洁，并使用基于\
  \ JAX-RS 构建的适当应用程序设计，因此你需要一种方法来使用 HTML 表单模拟 `DELETE` 和 `PUT` 请求。为此，你可以安装一个 `ContainerRequestFilter`\
  \ 并在 HTML 表单中使用特殊标记。该类名为 `HttpMethodOverride`，内容如下：\n\n```\npackage book.jakartapro.javamvc;\n\
  import java.io.ByteArrayInputStream;\nimport java.io.ByteArrayOutputStream;\nimport\
  \ java.io.IOException;\nimport java.io.InputStream;\nimport java.lang.annotation.Annotation;\n\
  import org.glassfish.jersey.message.internal.MediaTypes;\nimport jakarta.ws.rs.container.ContainerRequestContext;\n\
  import jakarta.ws.rs.container.ContainerRequestFilter;\nimport jakarta.ws.rs.container.PreMatching;\n\
  import jakarta.ws.rs.core.Context;\nimport jakarta.ws.rs.core.Form;\nimport jakarta.ws.rs.core.MediaType;\n\
  import jakarta.ws.rs.ext.Provider;\nimport jakarta.ws.rs.ext.Providers;\n@Provider\n\
  @PreMatching\npublic class HttpMethodOverride\nimplements ContainerRequestFilter\
  \ {\n@Context\nprivate Providers providers;\n@Override\npublic void filter(\nContainerRequestContext\
  \ requestContext)\nthrows IOException {\nif (isForm(requestContext)) {\nForm form\
  \ = getForm(requestContext);\nString pseudoMethod = (String) form.asMap().\ngetFirst(\"\
  _method\");\nif(pseudoMethod != null) {\nrequestContext.setMethod(pseudoMethod);\n\
  }\n}\nString methodFromHeader = requestContext.\ngetHeaderString(\"X-HTTP-Method-Override\"\
  );\nif(methodFromHeader != null) {\nrequestContext.setMethod(methodFromHeader);\n\
  }\n}\n//////////////////////////////////////////////////\n//////////////////////////////////////////////////\n\
  private boolean isForm(\nContainerRequestContext requestContext) {\nreturn requestContext.hasEntity()\n\
  && MediaTypes.typeEqual(\nMediaType.APPLICATION_FORM_URLENCODED_TYPE,\nrequestContext.getMediaType());\n\
  }\nprivate Form getForm(\nContainerRequestContext requestContext)\nthrows IOException\
  \ {\nByteArrayInputStream bis = toResettableStream(\nrequestContext.getEntityStream());\n\
  Form form = providers.getMessageBodyReader(\nForm.class, Form.class, new Annotation[0],\n\
  MediaType.APPLICATION_FORM_URLENCODED_TYPE).\nreadFrom(\nForm.class,\nForm.class,\n\
  new Annotation[0],\nMediaType.APPLICATION_FORM_URLENCODED_TYPE,\nnull,\nbis);\n\
  bis.reset();\nrequestContext.setEntityStream(bis);\nreturn form;\n}\nprivate ByteArrayInputStream\
  \ toResettableStream(\nInputStream entityStream) throws IOException {\nByteArrayOutputStream\
  \ baos = new ByteArrayOutputStream();\nbyte[] buffer = new byte[1024];\nint len;\n\
  while ((len = entityStream.read(buffer)) > -1) {\nbaos.write(buffer, 0, len);\n\
  }\nbaos.flush();\nreturn new ByteArrayInputStream(baos.toByteArray());\n}\n}\n```\n\
  \n该过滤器会查找名为 `_method` 的表单参数，如果存在，则使用其值来覆盖 REST 方法。`getForm()` 和 `toResettableStream()`\
  \ 方法用于提取表单主体，并确保后续的过滤器和 REST 方法处理器能够获取到尚未被消费的数据流。\n\n静态文件\n\n你需要一个非常简短的样式文件用于宠物商店应用程序。该应用程序通过\
  \ `implementation 'org.webjars:bootstrap:4.3.1'` 依赖包含了 Bootstrap 样式。你将在视图文件中看到如何使用它们。你需要添加的一个小文件名为\
  \ `styles.css`，它位于 `src/main/webapp/staticcss` 文件夹中。其内容如下：\n\n```\n.table td {\n\
  vertical-align: middle;\n}\n```\n\n在你自己的开发过程中，可以将同一个 `static` 文件夹用于应用程序所需的任何静态文件。\n\
  \n模型类\n\n模型类放在一个 `model` 包中。对于示例应用程序，该包名为 `book.jakartapro.javamvc.model`，然后你添加一个\
  \ `Pet` 类：\n\n\n\n```\npackage book.jakartapro.javamvc.model;\nimport java.util.Objects;\n\
  import java.util.UUID;\npublic final class Pet {\nprivate UUID petNumber;\nprivate\
  \ String name;\nprivate Status status;\npublic Pet() {\n//满足 Java Bean 标准所必需\n}\n\
  public Pet(final String name, Status status) {\nthis(UUID.randomUUID(), name, status);\n\
  }\npublic Pet(final String name) {\nthis(name, Status.ACTIVE);\n}\npublic Pet(final\
  \ UUID petNumber,\nfinal String name, final Status status) {\nthis.petNumber = petNumber;\n\
  this.name = name;\nthis.status = status;\n}\npublic UUID getPetNumber() {\nreturn\
  \ petNumber;\n}\npublic void setPetNumber(final UUID petNumber) {\nthis.petNumber\
  \ = petNumber;\n}\npublic String getName() {\nreturn name;\n}\npublic void setName(final\
  \ String name) {\nthis.name = name;\n}\npublic Status getStatus() {\nreturn status;\n\
  }\npublic void setStatus(final Status status) {\nthis.status = status;\n}\npublic\
  \ void reserve() {\nthis.status = Status.RESERVED;\n}\npublic boolean isReserved()\
  \ {\nreturn this.status == Status.RESERVED;\n}\n@Override\npublic boolean equals(final\
  \ Object o) {\nif (this == o) {\nreturn true;\n}\nif (o == null || getClass() !=\
  \ o.getClass()) {\nreturn false;\n}\nfinal Pet pet = (Pet) o;\nreturn Objects.equals(petNumber,\
  \ pet.petNumber) &&\nObjects.equals(name, pet.name);\n}\n@Override\npublic int hashCode()\
  \ {\nreturn Objects.hash(petNumber, name);\n}\n@Override\npublic String toString()\
  \ {\nreturn \"Pet{\" +\n\"petNumber=\" + petNumber +\n\", name='\" + name + '\\\
  '' +\n'}';\n}\npublic enum Status {\nACTIVE,\nRESERVED\n}\n}\n```\n\n控制器类\n\n控制器类的职责有两方面：它必须定义\
  \ REST 入口点，使应用程序具备 Web 应用特性；同时，它还必须充当模型层与视图层之间的中介。在本示例应用中，控制器类名为`PetshopController`。将其移至`controller`子包中，如下所示：\n\
  \n```\npackage book.jakartapro.javamvc.controller;\nimport java.util.ArrayList;\n\
  import java.util.List;\nimport java.util.Optional;\nimport java.util.UUID;\nimport\
  \ jakarta.inject.Inject;\nimport jakarta.mvc.Controller;\nimport jakarta.mvc.Models;\n\
  import jakarta.mvc.binding.BindingResult;\nimport jakarta.mvc.binding.MvcBinding;\n\
  import jakarta.validation.constraints.NotBlank;\nimport jakarta.validation.constraints.Size;\n\
  import jakarta.ws.rs.DELETE;\nimport jakarta.ws.rs.PUT;\nimport jakarta.ws.rs.FormParam;\n\
  import jakarta.ws.rs.GET;\nimport jakarta.ws.rs.POST;\nimport jakarta.ws.rs.Path;\n\
  import jakarta.ws.rs.PathParam;\nimport jakarta.ws.rs.core.Response;\nimport jakarta.ws.rs.core.Response.Status;\n\
  import book.jakartapro.javamvc.model.Pet;\nimport book.jakartapro.javamvc.service.PetService;\n\
  // http://localhost:8080/JavaMvc2/mvc/pets\n@Path(\"/pets\")\n@Controller\npublic\
  \ class PetshopController {\n@Inject\nprivate Models models;\n@Inject\nprivate BindingResult\
  \ bindingResult;\n@Inject\nprivate PetService petService;\n@GET\npublic String showIndex()\
  \ {\nfinal List pets = petService.getAllPets();\nmodels.put(\"pets\", pets);\nreturn\
  \ \"index.jsp\";\n}\n@GET\n@Path(\"/{petNumber}\")\npublic Response showDetailsOfPet(\n\
  @PathParam(\"petNumber\") final UUID petNumber) {\nfinal Optional pet = petService.\n\
  findPetForPetNumber(petNumber);\nif (pet.isPresent()) {\nmodels.put(\"pet\", pet.get());\n\
  return Response.ok(\"details.jsp\")\n.build();\n} else {\nmodels.put(\"petNumber\"\
  , petNumber);\nreturn Response.status(Status.NOT_FOUND)\n.entity(\"404.jsp\")\n\
  .build();\n}\n}\n@GET\n@Path(\"/new\")\npublic String showNewPetForm() {\nreturn\
  \ \"form.jsp\";\n}\n@POST\npublic String createNewPet(\n@FormParam(\"name\") @MvcBinding\
  \ @NotBlank\n@Size(min = 1, max = 255) final String name) {\nif (bindingResult.isFailed())\
  \ {\nmodels.put(\"errors\", new ArrayList(\nbindingResult.getAllErrors()));\nreturn\
  \ \"form.jsp\";\n}\nfinal Pet pet = petService.createNewPet(name);\nreturn \"redirect:/pets/\"\
  \ + pet.getPetNumber();\n}\n@DELETE\n@Path(\"/{petNumber}\")\npublic String deletePet(\n\
  @PathParam(\"petNumber\") final UUID petNumber) {\npetService.deletePet(petNumber);\n\
  return \"redirect:/pets\";\n}\n@PUT\n@Path(\"/{petNumber}\")\npublic String changePet(\n\
  @PathParam(\"petNumber\") final UUID petNumber,\n@FormParam(\"reserve\") @MvcBinding\n\
  final String reserve) {\nif(\"reserve\".equals(reserve)) {\npetService.reservePet(petNumber);\n\
  return \"redirect:/pets\";\n}\nreturn \"redirect:/pets\";\n}\n}\n```\n\n来自`jakarta.ws.rs`的类遵循\
  \ JAX-RS 的预期行为，但有一个重大区别：字符串返回值不再作为 API 调用的结果，而是映射到决定 HTTP 响应的视图。注入的`Models`对象充当模型值的容器，而`BindingResult`则包含从视图传递到控制器的模型值的诊断信息。\n\
  \n作为模型值容器的辅助类（在生产环境中，这很可能是一个数据库），添加以下类：\n\n```\npackage book.jakartapro.javamvc.repository;\n\
  import java.util.ArrayList;\nimport java.util.Comparator;\nimport java.util.HashMap;\n\
  import java.util.List;\nimport java.util.Map;\nimport java.util.Optional;\nimport\
  \ java.util.UUID;\nimport jakarta.annotation.PostConstruct;\nimport jakarta.ejb.Stateless;\n\
  import book.jakartapro.javamvc.model.Pet;\n@Stateless\npublic class PetRepository\
  \ {\nprivate final Map petStore =\nnew HashMap();\n@PostConstruct\npublic void init()\
  \ {\nadd(new Pet(\"Cat\"));\nadd(new Pet(\"Dog\"));\nadd(new Pet(\"Crocodile\",\
  \ Pet.Status.RESERVED));\nadd(new Pet(\"Snake\", Pet.Status.RESERVED));\n}\npublic\
  \ List getAll() {\nfinal List pets =\nnew ArrayList(petStore.values());\npets.sort(Comparator.comparing(Pet::getName));\n\
  return pets;\n}\npublic Optional getByPetNumber(\nfinal UUID petNumber) {\nreturn\
  \ Optional.ofNullable(\npetStore.get(petNumber));\n}\npublic void add(final Pet\
  \ pet) {\npetStore.put(pet.getPetNumber(), pet);\n}\npublic boolean update(final\
  \ Pet pet) {\nreturn petStore.replace(pet.getPetNumber(), pet)\n!= null;\n}\npublic\
  \ void delete(final Pet pet) {\npetStore.remove(pet.getPetNumber());\n}\n}\n```\n\
  \n\n\n`service` 类在仓库和控制器之间起中介作用：\n\n```\npackage book.jakartapro.javamvc.service;\n\
  import java.util.List;\nimport java.util.Optional;\nimport java.util.UUID;\nimport\
  \ jakarta.ejb.Stateless;\nimport jakarta.inject.Inject;\nimport book.jakartapro.javamvc.model.Pet;\n\
  import book.jakartapro.javamvc.repository.PetRepository;\n@Stateless\npublic class\
  \ PetService {\n@Inject\nprivate PetRepository petRepository;\npublic List getAllPets()\
  \ {\nreturn petRepository.getAll();\n}\npublic Optional findPetForPetNumber(\nfinal\
  \ UUID petNumber) {\nreturn petRepository.getByPetNumber(petNumber);\n}\npublic\
  \ Pet createNewPet(final String name) {\nfinal Pet pet = new Pet(name);\npetRepository.add(pet);\n\
  return pet;\n}\npublic void reservePet(final UUID petNumber) {\nfinal Optional optPet\
  \ = petRepository.\ngetByPetNumber(petNumber);\nif (optPet.isPresent()) {\nfinal\
  \ Pet pet = optPet.get();\npet.reserve();\npetRepository.update(pet);\n}\n}\npublic\
  \ void deletePet(UUID petNumber) {\nfinal Optional optPet = petRepository.\ngetByPetNumber(petNumber);\n\
  if (optPet.isPresent()) {\nfinal Pet pet = optPet.get();\npetRepository.delete(pet);\n\
  }\n}\npublic void setPetRepository(\nfinal PetRepository petRepository) {\nthis.petRepository\
  \ = petRepository;\n}\n}\n```\n\n消息\n\n与任何其他基于 Jakarta EE 的 Web 应用程序一样，你可以使用 CDI\
