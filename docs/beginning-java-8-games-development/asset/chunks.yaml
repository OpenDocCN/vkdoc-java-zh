    \ and [8-14](#9781484204160_Ch08.xhtml#Fig14), we did the same type of compound\
    \ statement for the initializations:\n\n```\nlifeSpan = 1000;\nvX = vY = damage\
    \ = offsetX = offsetY = 0;\nboundScale = boundRot = friction = gravity = bounce\
    \ = 0;\n```\n\n![9781484204160_Fig08-14.jpg](OEBPS/Images/9781484204160_Fig08-14.jpg)\n\
    \n[Figure 8-14](#9781484204160_Ch08.xhtml#_Fig14). Optimize your Java code by\
    \ using compound declarations, and leveraging default initialization values\n\n\
    This could also be done using only two lines of code, if you happen to be editing\
