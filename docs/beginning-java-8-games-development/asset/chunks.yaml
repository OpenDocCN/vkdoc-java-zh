    现在我们已经为游戏添加了正面（宝藏）元素，接下来让我们添加一些负面（敌人和弹射物）元素，以保持开发工作流程的“平衡”。我们将使用 Actor 超类（而非 Hero
    超类）来创建 Enemy 和 Projectile 类（对象）。这样做是因为，通过这种方式，我们能够实现更优化的游戏，因为我们的 JavaFX 脉冲事件引擎只需处理**一个
    .collide() 方法**（请记住，每个 Hero 对象都实现了一个 .collide() 方法）。当我将这个游戏转换为**多人**游戏时（相关代码超出了本书的初级性质），我会希望将
    Enemy 类设为 Hero 的子类，这样敌人角色就能像 InvinciBagel 一样与宝藏和弹射物等物体发生碰撞。由于 Enemy 类仍然拥有 .update()
    方法，它可以在屏幕上移动，从而能够（并且将会）从隐藏处现身，向 InvinciBagel 角色发射子弹（负面效果）和奶油芝士球（正面效果）。Hero 类唯一的区别在于
    .collide() 方法，而对于这个版本的游戏，每次脉冲只处理一个 .collide() 方法，这让我们能够优化游戏处理流程，同时仍然保留街机游戏应有的各种游戏特性。正如你在
    **Enemy()** 构造方法中所见，敌人角色拥有 **isAlive**、**isBonus** 和 **hasValue** 属性，因此，在使用 .setTranslateX()
    和 .setTranslateY() 设置精灵位置，并通过 super() 构造方法将 SVG 数据、Image 以及初始 X、Y 位置数据传递给 Actor()
    构造方法之后，所有这些属性或特征都将在构造方法内被设置为布尔值 **true**。Enemy.java 类的 Java 代码在图 17-18 中显示为无错误状态，其结构应如下所示：


    ```

