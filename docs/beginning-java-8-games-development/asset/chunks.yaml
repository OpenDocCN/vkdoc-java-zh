    \ used by NetBeans to create getter and setter methods for the `Hero` class. The\
    \ Java code should look like this:\n\n```\nprotected double vX;\nprotected double\
    \ vY;\nprotected double lifeSpan;\nprotected double damage;\nprotected double\
    \ offsetX;\nprotected double offsetY;\nprotected double boundScale;\nprotected\
    \ double boundRot;\nprotected double friction;\nprotected double gravity;\nprotected\
    \ double bounce;\n```\n\n![9781484204160_Fig08-12.jpg](OEBPS/Images/9781484204160_Fig08-12.jpg)\n\
    \n[Figure 8-12](#9781484204160_Ch08.xhtml#_Fig12). Add eleven variables at the\
    \ top of `Hero` class defining velocity, lifespan, damage, physics, collision\n\
    \nBefore we add all **22** of your getter and setter methods, which would be 11\
    \ `.get()` and 11 `.set()` methods, to match our new `Hero` class variables, let’s\
    \ go back and finish our `Hero()` constructor method, and initialize these eleven\
    \ variables that we just added at the top of the `Hero` class.\n\n## Initializing\
    \ the Sprite Control and Definition Variables in the Hero Constructor\n\nLet’s\
    \ give our `Hero` Actor objects (motion sprites) a lifespan of 1000 units, and\
    \ set the other variables to zero, which you can see that I have done using compound\
    \ initialization statements to save eight lines of code. As you can see in [Figure\
    \ 8-13](#9781484204160_Ch08.xhtml#Fig13), the code is error free, and the Java\
    \ programming statements should take the following format:\n\n```\nlifespan =\
    \ 1000;\nvX = vY = damage = offsetX = offsetY = 0;\nboundScale = boundRot = friction\
    \ = gravity = bounce = 0;\n```\n\n![9781484204160_Fig08-13.jpg](OEBPS/Images/9781484204160_Fig08-13.jpg)\n\
    \n[Figure 8-13](#9781484204160_Ch08.xhtml#_Fig13). Add initialization for your\
    \ eleven variables inside of your constructor method using compound statements\n\
    \nBefore we generate our getter and setter methods, let’s take a look at how we\
    \ can use a combination of compound variable declaration statements and the knowledge\
    \ of what default variable type values Java will set for our variables if we do\
    \ not explicitly specify them to reduce the amount of code that it takes to write\
    \ the entire `Hero` class from its 25 lines of code (or 33 if we didn’t use compound\
