    Therefore, we have everything we need to be able to code our core Hero() constructor
    method, so let’s get into that now. The Hero() constructor will take in the same
    number of complex parameters as the Actor() constructor. These include your collision
    shape data, contained in the String object named **SVGdata**, an “initial placement”
    X and Y location for the sprite, and a comma separated list of the Image objects
    (cels or frames) for the sprite, which I named Image... spriteCels. This **Image...**
    designation, which needs to be at the end of your parameter list, because it is
    “open ended,” means that the parameter list will pass in one or more Image objects.
    Your code will look like the following:


    ```

    public void Hero(String SVGdata, double xLocation, double yLocation, Image...
    spriteCels) {

        super(SVGdata, xLocation, yLocation, spriteCels);

    }

    ```


    By using super() to pass your core constructor work up to the Actor superclass
    Actor() constructor method, your code that you wrote earlier, inside of the Actor()
    constructor, will create the **spriteBound** SVGPath Shape object using the Java
    **new** keyword and the **SVGPath** Shape subclass, and will uses a SVGPath class
    **.setContent()** method in order to load the SVGPath Shape object with your collision
    shape to be used with the sprite image states. The **iX** and **iY** initial locations
    are set, and the **imageStates** List<Image> array is loaded with sprite **Image**
    objects, passed in from the end of the parameter list.


    It’s important to note that since we’re setting this up in this way that the Hero
    class has access to everything that the Actor class has (thirteen powerful attributes).
    Actually, it may be more “salient” to look at this the other way around, that
    the Actor (fixed sprites) class has every capability that the Hero (motion sprites)
    class. This power should be leveraged for level design wow factor, including multi-image
    states (List<Image> Array), custom SVGPath collision shape capability, custom
    pivot point placements, and the ability to flip (mirror) sprite imagery around
    either the X axis (FlipV = true) or the Y axis (FlipH = true) or both axes (FlipH
    = FlipV = true). Putting these capabilities into place in your Actor Engine (Actor
    and Hero abstract superclasses) is only the first step; using them brilliantly
    for your game’s design and programming, as time goes on and you continue to build
    and refine the game, is the ultimate goal for putting this foundation into place
    during this chapter. As you can see in [Figure 8-10](#9781484204160_Ch08.xhtml#Fig10)
    our basic (core) constructor code is error free.


    ![9781484204160_Fig08-10.jpg](OEBPS/Images/9781484204160_Fig08-10.jpg)


    [Figure 8-10](#9781484204160_Ch08.xhtml#_Fig10). Create a public abstract class
    Hero extends Actor and add a constructor method and a super() constructor


