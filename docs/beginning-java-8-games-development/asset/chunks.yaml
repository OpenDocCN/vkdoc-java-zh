    | javafx.scene.input | Input (Events) | Classes related to getting input from
    the user into the JavaFX application |

    | javafx.scene.layout | UI layouts | UI layout container classes: TilePane, GridPane,
    FlowPane, Border |

    | javafx.scene.media | Media player | Media playback classes: MediaPlayer, MediaView,
    Track, AudioTrack, AudioClip |

    | javafx.scene.paint | Painting | Paint classes: Paint, Color, LinearGradient,
    RadialGradient, Stop, Material, and so on |

    | javafx.scene.shape | Geometry | 2D and 3D geometry classes: Mesh, Shape, Shape3D,
    Arc, Circle, Line, Path, and so on |

    | javafx.scene.text | Text and font | Text rendering and font rendering classes:
    Font, Text, TextFlow, and so on |

    | javafx.scene.transform | Transforms | Transform classes: Transform, Scale, Rotate,
    Shear, Translate, Affine |

    | javafx.scene.web | WebKit | Web support classes: WebView, WebEvent, WebEngine,
    HTMLEditor |


    Let’s start with the packages that have the fewest classes. The table lists subpackages
    alphabetically, but the first one, javafx.scene.canvas, coincidentally contains
    only one class, the Canvas class, which, as its name suggests, is employed to
    create a Canvas object that is used as a canvas for you to create things with!
    The next subpackage listed is javafx.scene.chart; this has charting classes, such
    as PieChart, LineChart, XYChart, BarChart, AreaChart, and BubbleChart, for use
    in business applications, which is a different book entirely, so I will not be
    covering charting.


    The next subpackage, **javafx.scene.control**, offers all the UI **control** (“widget,”
    in Android) classes, such as Button, Menu, CheckBox, RadioButton, DatePicker,
    ColorPicker, ProgressBar, Slider, Label, Scrollbar, and TextField and about eight
    dozen others. Because there are approximately a hundred classes in javafx.scene.control,
    I am not even going to attempt to cover it here; an entire book could probably
    be written about this subpackage! If you want to review these classes, simply
    reference “javafx.scene.control” on Google or on the Oracle Java website, and
    you can peruse what these classes can do for days on end. For this subpackage,
    “reference” is the key word, as you will want to reference this package and its
    classes individually at the time you need to implement a given UI element.


    The next subpackage, **javafx.scene.effect**, provides all the **special effects**
    classes, almost two dozen of them. These can be very useful for Java 8 game development,
    so this is one of the few subpackages that I am going to cover in detail in this
    section.


    The **javafx.scene.image** subpackage is used to implement digital imagery within
    JavaFX, and it has the **Image**, **ImageView**, **WritableImage**, **PixelFormat**,
    and **WritablePixelFormat** classes. The ImageView class is what you will normally
    use to hold your digital image assets, and the more advanced **PixelFormat** classes
    let you create digital imagery on a **pixel-by-pixel basis** if you want to do
    more advanced (algorithmic) pixel-based digital image creation.


    The **javafx.scene.input** subpackage includes classes that are used to get **input**
    from the JavaFX application’s user. This input is processed using the **event
    handling** capabilities, which you will be examining in great detail over the
    course of this book and which you have already experienced in your JavaFX application,
    in [Chapter 3](#9781484204160_Ch03.xhtml) (see [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2),
    ll. 22 to 24).


    The **javafx.scene.layout** subpackage contains classes that are used to create
    UI design **layouts** and that can be used for your screen layout designs as well.
    These layout classes include classes that control and manage backgrounds; add
    and style borders; and provide UI pane management, such as **StackPane**, **TilePane**,
    **GridPane**, **FlowPane**, and **AnchorPane**. These UI classes offer automatic
    screen layout algorithms for the UI controls in JavaFX. The **Background** class
    (and subclasses) furnishes **screen background** utilities, and the **Border**
    class (and its subclasses) supplies **screen border** utilities, which can be
    used for spicing up the graphics design for your UI screens.


    The **javafx.scene.media** subpackage holds classes that are used for the playback
    of audio or video media, including the **Media**, **MediaPlayer**, and **MediaView**
    classes. The Media class (or object, actually) references and contains the media
    (audio or video) asset, MediaPlayer plays that asset, and MediaView (in the case
    of video) displays the asset. This subpackage also has a **Track** superclass
    and **AudioTrack**, **VideoTrack**, and **SubtitleTrack** subclasses as well as
    the AudioClip, AudioEqualizer, and EquilizerBand classes, which provide advanced
    audio (equalizer) controls and short-form audio clips, or snippets of audio that
    are perfect for use in games. You will be using the AudioClip class later in the
    book  (see [Chapter 15](#9781484204160_Ch15.xhtml)).


    The **javafx.scene.paint** subpackage contains a **Stop** class and the **Paint**
    superclass and its **Color**, **ImagePattern**, **LinearGradient**, and **RadialGradient**
    subclasses as well as the **Material** superclass and its **PhongMaterial** subclass.
    Those of you who are familiar with 3D content production will recognize this Phong
    shader algorithm, which will allow different **surface** looks (plastic, rubber,
    and so on) to be simulated. The Material and PhongMaterial classes need 3D capabilities
    to be present on the playback hardware to function successfully, just like the
    SceneAntialiasing, PerspectiveCamera, and LightBase class (and subclasses). The
    Paint class creates your Paint object, the Color class colors this object (fills
    it with a color), the LinearGradient and RadialGradient classes fill the Paint
    object with color gradients, and the Stop class lets you define where gradient
    colors start and stop inside the gradients. Finally, there is an ImagePattern
    class, which can fill a Paint object with a tileable image pattern (this can be
    quite useful for games).


    The **javafx.scene.shape** subpackage provides classes for 2D geometry (commonly
    referred to as **shapes**) as well as for 3D geometry (commonly referred to as
    **meshes)**. A **Mesh** superclass and its **TriangleMesh** subclass handle 3D
    geometry, as do the **Shape3D** superclass and its **Box**, **Sphere**, **Cylinder**,
    and **MeshView** subclasses. The **Shape** superclass has many more subclasses
    (11); these are 2D geometry elements and include the **Arc**, **Circle**, **CubicCurve**,
    **Ellipse**, **Line**, **Path**, **Polygon**, **Polyline**, **QuadCurve**, **Rectangle**,
    and **SVGPath** classes. A path support, a path being defined as an open shape
    (I like to call it a spline, as I am a 3D modeler), is also supplied by the **PathElement**
    superclass and its **ArcTo**, **ClosePath**, **CubicCurveTo**, **HLineTo**, LineTo,
    MoveTo, QuadCurveTo, and VLineTo subclasses, which allows you to draw spline curves
    to create your own custom shapes!'
  trans: '

    | 包名 | 功能 | 内容描述 |

    | --- | --- | --- |

    | javafx.scene.canvas | 绘图 | Canvas 类（及 Canvas 对象）；用于自定义绘图表面 |

    | javafx.scene.chart | 图表 | 图表类：PieChart, LineChart, XYChart, BarChart, AreaChart,
    BubbleChart |

    | javafx.scene.control | UI 控件 | UI 控件类：Button, Menu, Slider, Label, ScrollBar,
    TextField |

    | javafx.scene.effect | 特效 | 特效类：Glow, Blend, Bloom, Shadow, Reflection, MotionBlur
    |

    | javafx.scene.image | 图像处理 | 数字图像类：Image, ImageView, WritableImageView, PixelFormat
    |

    | javafx.scene.input | 输入（事件） | 与从用户获取输入到 JavaFX 应用程序相关的类 |

    | javafx.scene.layout | UI 布局 | UI 布局容器类：TilePane, GridPane, FlowPane, Border
    |

    | javafx.scene.media | 媒体播放器 | 媒体播放类：MediaPlayer, MediaView, Track, AudioTrack,
    AudioClip |

    | javafx.scene.paint | 绘画 | 绘画类：Paint, Color, LinearGradient, RadialGradient,
    Stop, Material 等 |

    | javafx.scene.shape | 几何图形 | 2D 和 3D 几何图形类：Mesh, Shape, Shape3D, Arc, Circle,
    Line, Path 等 |

    | javafx.scene.text | 文本与字体 | 文本渲染和字体渲染类：Font, Text, TextFlow 等 |

    | javafx.scene.transform | 变换 | 变换类：Transform, Scale, Rotate, Shear, Translate,
    Affine |

    | javafx.scene.web | WebKit | Web 支持类：WebView, WebEvent, WebEngine, HTMLEditor
    |


    让我们从包含类最少的包开始。该表按字母顺序列出了子包，但第一个子包 javafx.scene.canvas 恰好只包含一个类，即 Canvas 类，顾名思义，它用于创建一个
    Canvas 对象，作为你创作内容的画布！接下来列出的子包是 javafx.scene.chart；它包含图表类，例如 PieChart、LineChart、XYChart、BarChart、AreaChart
    和 BubbleChart，用于商业应用程序，这完全是另一本书的内容，因此我不会涉及图表。


    下一个子包 **javafx.scene.control** 提供了所有 UI **控件**（在 Android 中称为“widget”）类，例如 Button、Menu、CheckBox、RadioButton、DatePicker、ColorPicker、ProgressBar、Slider、Label、Scrollbar
    和 TextField，以及大约八十多个其他类。由于 javafx.scene.control 中大约有一百个类，我甚至不打算在这里尝试涵盖它；关于这个子包可能可以写一整本书！如果你想查看这些类，只需在
    Google 或 Oracle Java 网站上搜索“javafx.scene.control”，你就可以花上几天时间仔细研究这些类的功能。对于这个子包，“参考”是关键，因为当你需要实现某个特定的
    UI 元素时，你需要参考这个包及其各个类。


    下一个子包 **javafx.scene.effect** 提供了所有**特效**类，将近二十个。这些类对于 Java 8 游戏开发非常有用，因此这是我在本节中要详细讲解的少数几个子包之一。


    **javafx.scene.image** 子包用于在 JavaFX 中实现数字图像，它包含 **Image**、**ImageView**、**WritableImage**、**PixelFormat**
    和 **WritablePixelFormat** 类。ImageView 类是你通常用来保存数字图像资源的类，而更高级的 **PixelFormat**
    类允许你**逐像素地**创建数字图像，如果你想进行更高级（基于算法）的像素级数字图像创作。


    **javafx.scene.input** 子包包含用于从 JavaFX 应用程序用户获取**输入**的类。这种输入使用**事件处理**功能进行处理，你将在本书中详细研究这些功能，并且你已经在你的
    JavaFX 应用程序中体验过，见第 3 章（参见图 3-2，第 22 至 24 行）。


    **javafx.scene.layout** 子包包含用于创建 UI 设计**布局**的类，这些类也可以用于你的屏幕布局设计。这些布局类包括控制和管理背景的类；添加和设置边框样式的类；以及提供
    UI 窗格管理的类，例如 **StackPane**、**TilePane**、**GridPane**、**FlowPane** 和 **AnchorPane**。这些
    UI 类为 JavaFX 中的 UI 控件提供了自动屏幕布局算法。**Background** 类（及其子类）提供了**屏幕背景**工具，**Border**
    类（及其子类）提供了**屏幕边框**工具，可用于美化你的 UI 屏幕的图形设计。


    **javafx.scene.media** 子包包含用于播放音频或视频媒体的类，包括 **Media**、**MediaPlayer** 和 **MediaView**
    类。Media 类（实际上是对象）引用并包含媒体（音频或视频）资源，MediaPlayer 播放该资源，而 MediaView（在视频的情况下）显示该资源。这个子包还包含一个
    **Track** 超类以及 **AudioTrack**、**VideoTrack** 和 **SubtitleTrack** 子类，以及 AudioClip、AudioEqualizer
    和 EquilizerBand 类，它们提供了高级音频（均衡器）控制和短格式音频剪辑，或音频片段，非常适合在游戏中使用。你将在本书后面使用 AudioClip
    类（见第 15 章）。


    **javafx.scene.paint** 子包包含一个 **Stop** 类以及 **Paint** 超类及其 **Color**、**ImagePattern**、**LinearGradient**
    和 **RadialGradient** 子类，以及 **Material** 超类及其 **PhongMaterial** 子类。熟悉 3D 内容制作的人会认出这个
    Phong 着色器算法，它允许模拟不同的**表面**外观（塑料、橡胶等）。Material 和 PhongMaterial 类需要播放硬件具备 3D 能力才能成功运行，就像
    SceneAntialiasing、PerspectiveCamera 和 LightBase 类（及其子类）一样。Paint 类创建你的 Paint 对象，Color
    类为该对象着色（用颜色填充它），LinearGradient 和 RadialGradient 类用颜色渐变填充 Paint 对象，而 Stop 类允许你定义渐变颜色在渐变内部开始和停止的位置。最后，还有一个
    ImagePattern 类，它可以用可平铺的图像图案填充 Paint 对象（这对游戏来说非常有用）。


    **javafx.scene.shape** 子包提供了用于 2D 几何图形（通常称为**形状**）以及 3D 几何图形（通常称为**网格**）的类。**Mesh**
    超类及其 **TriangleMesh** 子类处理 3D 几何图形，**Shape3D** 超类及其 **Box**、**Sphere**、**Cylinder**
    和 **MeshView** 子类也是如此。**Shape** 超类有更多的子类（11 个）；这些是 2D 几何元素，包括 **Arc**、**Circle**、**CubicCurve**、**Ellipse**、**Line**、**Path**、**Polygon**、**Polyline**、**QuadCurve**、**Rectangle**
    和 **SVGPath** 类。路径支持，路径被定义为开放形状（我喜欢称之为样条线，因为我是一名 3D 建模师），也由 **PathElement** 超类及其
    **ArcTo**、**ClosePath**、**CubicCurveTo**、**HLineTo**、LineTo、MoveTo、QuadCurveTo
    和 VLineTo 子类提供，这允许你绘制样条曲线来创建自己的自定义形状！

    '
- fmt: '`javafx.scene.text`子包包含用于在场景中渲染文本形状和字体的类。这包括`Font`类，用于使用任何你希望使用的非JavaFX系统字体，以及`Text`类，用于创建使用此字体显示文本值的文本节点。还有一个专门的布局容器类，名为`TextFlow`，用于流动文本，就像你在文字处理器中看到的那样。


    `javafx.scene.transform`子包提供了用于渲染2D和3D空间变换的类，例如`Transform`超类的子类：`Scale`、`Rotate`、`Shear`、`Translate`和`Affine`（3D旋转）。这些变换可以应用于场景图中的任何`Node`对象。这允许场景图中的任何内容（文本、UI控件、形状、网格、图像、媒体等）以你喜欢的任何方式进行变换，这为JavaFX游戏开发者提供了巨大的创作能力。如果你想知道，平移是整个对象的线性移动；剪切是在二维平面上沿两个不同方向的线性移动，或者当二维平面的另一部分固定时，沿一个方向的移动。想象一下移动一个平面的顶部，而底部保持固定，使得正方形变成平行四边形，或者在同一平面（正方形）的不同方向上移动顶部和底部。


    `javafx.scene.web`子包提供了一系列用于在场景中渲染Web资源的类，包括`WebView`、`WebEvent`、`WebEngine`、`WebHistory`和`HTMLEditor`。`WebEngine`类（你看，其他人也把东西称为引擎）正如你所想，负责处理在JavaFX中显示HTML5
    + CSS3 + JS，而`WebView`类则创建用于在场景图中显示`WebEngine`输出的节点。`WebHistory`类（最终是对象）保存了访问过的网页的会话历史（从`WebEngine`实例化到从内存中移除），而`WebEvent`则桥接了JavaScript
    Web事件处理与JavaFX事件处理。


    现在你已经了解了`javafx.scene`包及其相关子包中大量重要且有用的类（对象），让我们来看看15个顶级JavaFX包，以便更好地了解JavaFX为应用程序开发提供的关键能力（当然，重点是那些可用于游戏开发的包）。


    其他JavaFX包：15个顶级包


    共有15个顶级包（我认为`javafx.packagename`是顶级包），其中一些还有子包层级，正如你在`javafx.scene`包及其子包中看到的那样。[表4-2](#9781484204160_Ch04.xhtml#Tab2)概述了这些包并描述了它们的内容。


    [表4-2](#9781484204160_Ch04.xhtml#_Tab2). JavaFX顶级包、其主要功能及其功能类描述


    | 包名 | 功能 | 内容描述 |

    | --- | --- | --- |

    | `javafx.animation` | 动画 | `Timeline`、`Transition`、`AnimationTimer`、`Interpolator`、`KeyFrame`、`KeyValue`
    |

    | `javafx.application` | 应用程序 | `Application`（`init`、`start`、`stop`方法）、`Preloader`、`Parameters`、`Platform`
    |

    | `javafx.beans` | JavaFX beans | 定义最通用可观察性形式的Java接口 |

    | `javafx.collections` | 集合 | 定义最通用可观察性形式的Java集合 |

    | `javafx.concurrent` | 线程 | 线程类：`Task`、`Service`、`ScheduledService`、`WorkerStateEvent`
    |

    | `javafx.css` | CSS | 与在JavaFX中实现CSS相关的类 |

    | `javafx.embed` | 嵌入 | 嵌入已弃用的Java Swing和Java AWT GUI范式 |

    | `javafx.event` | 事件处理器 | 事件处理类：`Event`、`ActionEvent`、`EventType`、`WeakEventHandler`
    |

    | `javafx.fxml` | FXML | FXML |

    | `javafx.geometry` | 3D几何 | 3D几何类 |

    | `javafx.print` | 打印 | 打印类 |

    | `javafx.scene` | 场景控制 | 与场景创建、组织、控制和实现相关的类 |

    | `javafx.stage` | 舞台创建 | 舞台创建类 |

    | `javafx.util` | JavaFX工具 | JavaFX工具类 |

    | `netscape.javascript` | JavaScript | 允许Java代码调用JavaScript方法并检查JavaScript属性 |


    我已经讨论过其中一些包，例如`javafx.application`包（参见[第2章](#9781484204160_Ch02.xhtml)和[第3章](#9781484204160_Ch03.xhtml)）和`javafx.scene`包（参见“JavaFX场景包：十六个强大的Java
    8类”一节）。这里还有一些其他JavaFX包你应该仔细看看，因为它们（连同`javafx.scene`包）包含了你将在Java 8游戏开发中使用的类（其他包，如`javafx.print`、`javafx.fxml`、`javafx.beans`和`javafx.embed`包，不太可能用于你的Java游戏设计和工作开发流程）；这些包是`javafx.animation`、`javafx.stage`、`javafx.geometry`、`javafx.concurrent`和`javafx.event`。接下来，让我们深入看看这些包为你的游戏开发目标提供了什么。


    用于游戏的JavaFX动画：使用`javafx.animation`类


    `javafx.animation`包包含`Animation`超类，它有`Timeline`和`Transition`子类，以及`AnimationTimer`、`Interpolator`、`KeyFrame`和`KeyValue`类。动画是Java
    8游戏中的一个重要设计元素，这些动画类已经由JavaFX为我们编写好了，因此你只需正确使用它们即可为你的游戏添加动画！


    JavaFX动画类：动画对象的基础


    `Animation`类（实际上是对象）提供了JavaFX中动画的核心功能。`Animation`类包含两个（重载的）`Animation()`构造方法；它们是`Animation()`和`Animation(double
    targetFramerate)`，它们将在内存中创建`Animation`对象，该对象将控制动画及其播放特性和生命周期。


    `Animation`类包含`.play()`方法、`.playFrom(cuePoint)`或`.playFrom(Duration time)`方法，以及`.playFromStart()`方法。这些方法用于启动`Animation`对象的播放。还有`.pause()`方法，可以暂停动画播放，以及`.stop()`方法，用于停止动画播放。`.jumpTo(Duration
    time)`和`.jumpTo(cuePoint)`方法用于跳转到动画中的预定义位置。'
  raw: 'The **javafx.scene.text** subpackage has classes for rendering text shapes
    and fonts into your scenes. This includes the **Font** class, for employing any
    fonts that you may want to use that are not a JavaFX system font, as well as the
    **Text** class, for creating a text node that will display the text values using
    this font. There is also a specialized layout container class, called **TextFlow**,
    which is used to flow text, much like you would see done on a word processor.


    The **javafx.scene.transform** subpackage offers classes for rendering 2D and
    3D **spatial transformations**, such as the **Scale**, **Rotate**, **Shear**,
    **Translate**, and **Affine** (3D rotation) subclasses of the **Transform** superclass.
    These can be applied to any Node object in the Scene Graph. This allows anything
    in your scene graph (text, UI controls, shapes, meshes, images, media, and so
    on) to be transformed in any way that you like, which affords JavaFX game developers
    a ton of creative power. In case you are wondering, translation is linear movement
    of an entire object; shear is linear movement on a 2D plane in two different directions
    or movement in one direction when another part of the 2D plane is fixed. Imagine
    moving the top of a plane, while the bottom remains fixed, such that the square
    becomes a parallelogram, or moving the top and bottom of the same plane (a square)
    in different directions.


    The **javafx.scene.web** subpackage furnishes classes for rendering web assets
