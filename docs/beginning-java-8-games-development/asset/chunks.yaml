    ```

    @Override

    public void stop() {

        super.stop();

    }

    ```


    如图 7-13 所示，`GamePlayLoop` 类代码没有错误，你现在可以在 `InvinciBagel` 类中编写代码来启动 `GamePlayLoop`
    `AnimationTimer` 对象，这样你在分析应用程序时就能看到脉冲对象了。


