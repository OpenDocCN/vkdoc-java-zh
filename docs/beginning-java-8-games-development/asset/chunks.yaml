  trans: '

    正如你在图 12-5 中所见，你的 Java 代码已经没有错误了，这意味着你现在已经将 InvinciBagel.java 类（或者由它创建的对象，取决于你如何看待它）的上下文副本传递给了
    Bagel 类（更准确地说，是传递给了通过使用`Bagel()`构造方法创建的对象）。**this**对象的数字上下文结构中包含的内容超出了入门书籍的讨论范围，但可以这样说：**this**关键字会传递一个对象的完整结构引用。这个引用包含了所有必要的上下文信息，足以让接收对象能够将一切置于“数字视角”（上下文）中，从而理解传递**this**引用对象的类。在我们的例子中，就是
    InvinciBagel 类（对象）将自身的上下文信息传递给 Bagel 类（对象）。这将包括你的对象结构（变量、常量、方法等），以及与系统内存使用和线程使用相关的更复杂事物的状态信息。可以这样理解，使用
    Java **this**关键字将一个对象的上下文信息传递给另一个对象，就像是把它们连接在一起，这样你的接收对象就可以通过**this**对象引用来窥探发送对象。


    现在，通过在`Bagel()`构造方法内部使用 Java **this**关键字，我们已经将 InvinciBagel 类（对象）的**this**引用（上下文对象）传递给了
    Bagel 类（对象），从而在这两个类之间建立了一个更符合行业标准的链接。我们现在可以继续修改`Bagel .update()`方法，使其使用新的**.is()**方法调用来从它现在拥有的
    InvinciBagel 对象引用中获取四个不同的布尔变量值（状态）。我们需要这些数据才能在屏幕上移动我们的 InvinciBagel 角色。


    **使用新的 InvinciBagel .is()方法：更新你的 Bagel .update()方法**


    我们消除使用`import static`引用和静态变量的下一步，将是使用`.isUp()`、`isDown()`、`isLeft()`和`isRight()`方法调用来重写条件`if`语句。由于我们不再使用静态变量来跨类（对象）进行访问，我们需要替换掉`Bagel`类的`.update()`方法中`if()`语句里当前使用的那些**up**、**down**、**left**和**right**静态变量。这些变量将不再起作用，因为它们现在被封装在`InvinciBagel`类中，并且是私有变量，所以我们必须改用`.isUp()`、`isDown()`、`isLeft()`和`isRight()`这些“getter”方法，礼貌地敲开
    InvinciBagel 的门，请求获取这些值！


    我们将通过 InvinciBagel 引用对象（使用点表示法）来调用这四个`.is()`方法，我们在`Bagel.java`类的顶部声明并命名了这个引用对象为**invinciBagel**。这个变量（对象引用）包含了
    InvinciBagel 类的上下文，我们通过 Java **this**关键字将其从 InvinciBagel 类发送到了 Bagel 类。这意味着，如果我们在代码中写**invinciBagel.isRight()**，我们的
    Bagel 类（对象）现在就知道这意味着：使用“this”引用对象（这里只是开个玩笑）进入 invinciBagel 这个 InvinciBagel 对象，这将向
    Bagel 类（对象）展示如何以及在哪里找到并执行**public void .isRight() {...}**方法结构，该方法将传递封装在 InvinciBagel
    对象中的**private boolean right**变量。这里包含此内容是为了演示 Java OOP 的“封装”概念。


    你的新`.update()`方法体将使用相同的六行 Java 代码，但修改为在现有条件`if`结构的`if(condition=true)`评估部分内部调用**.is()**方法。新的
    Java 代码，也显示在图 12-6 中，应该如下所示：


    ```

    public void update() {

        if(invinciBagel.isRight()) { iX += vX; }

        if(invinciBagel.isLeft())  { iX -= vX; }

        if(invinciBagel.isDown())  { iY += vY; }

        if(invinciBagel.isUp())    { iY -= vY; }

        spriteFrame.setTranslateX(iX);

        spriteFrame.setTranslateY(iY);

    }

    ```


    ![9781484204160_Fig12-06.jpg](img/9781484204160_Fig12-06.jpg)


    图 12-6. 在`if`语句内部，原本布尔变量的位置，插入`invinciBagel.is()`方法调用


    正如你在图 12-6 中所见，代码没有错误，你现在有了一个`.update()`方法，它可以从你的`InvinciBagel.java`类中访问布尔变量，而无需使用任何`import
    static`语句。


    你可能会想，既然这是摆脱`Bagel.java`类中`import static`语句的好方法，为什么我不使用同样的方法来摆脱`InvinciBagel.java`类中的**static
    Bagel iBagel**声明，以及`GamePlayLoop.java`类中用于访问静态`iBagel` Bagel 对象的**import static**语句呢？哇，各位，这真是个绝妙的主意，我真希望是我想到的！事实上，我们现在就来这样做！


    **移除静态 iBagel 引用：修改 Handle()方法**


    正如你在图 12-7 中所见，我们仍然有不少使用`static`关键字声明的 InvinciBagel 变量，而它们实际上并不是常量。在本章结束之前，我们将消除这些变量，这样只有我们的`WIDTH`和`HEIGHT`常量会使用`static`修饰符关键字。由于我们将在`GamePlayLoop()`构造方法内部使用
    Java **this**关键字将 InvinciBagel 对象引用传递给`GamePlayLoop`类，这意味着我们可以从`InvinciBagel`类顶部的`Bagel
    iBagel`对象声明语句中移除`static`关键字。这可以通过以下变量声明来实现，该声明显示在图 12-7 中（已高亮显示）：


    ```

    Bagel iBagel;

    ```


    ![9781484204160_Fig12-07.jpg](img/9781484204160_Fig12-07.jpg)


    图 12-7. 从你的`Bagel iBagel`对象声明语句前面移除 Java `static`修饰符关键字


    接下来，为了确保我们的`InvinciBagel`和`GamePlayLoop`类（对象）能够相互通信，我们需要让`GamePlayLoop()`构造方法与我们需要在构造方法调用中发送给`GamePlayLoop`类的`InvinciBagel`类的**this**对象引用兼容（即在其参数列表中接受
    InvinciBagel **this**上下文引用对象）。由于我们目前依赖 Java 编译器为我们创建`GamePlayLoop()`构造方法，我们需要自己创建一个！正如你在第
    3 章中学到的，如果你没有为一个类显式创建构造方法，系统会为你创建一个。


    **增强 GamePlayLoop.java：创建 GamePlayLoop()构造方法**

