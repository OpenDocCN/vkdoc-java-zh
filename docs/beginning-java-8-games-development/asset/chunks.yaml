    Let’s test the worst case scenario first, and see how powerful the JavaFX pulse
    event and key event handling infrastructure really is. Press the up key and the
    left arrow key, or the A key and the W key, **at the same time**. As you can see,
    the InvinciBagel character moves smoothly and steadily on a diagonal vector, up
    and to the left. The result of this can be seen on the right half of [Figure 11-16](#9781484204160_Ch11.xhtml#Fig16).
    Try using the individual keys as well, to make sure they are working.


    As you play around with your now motion-enabled InvinciBagel sprite, notice that
    you are able to move him behind the UI buttons at the bottom of the screen, as
    seen on the left half of [Figure 11-17](#9781484204160_Ch11.xhtml#Fig17). This
    happens because you have your `.addGameActorNodes()` method called before your
