    ![9781484204160_Fig09-05.jpg](img/9781484204160_Fig09-05.jpg)


    图 9-5. 鼠标悬停在波浪形黄色警告高亮上，会显示“内部类可转换为 lambda 表达式”的弹出提示


    当您将鼠标悬停在这些提示上时，它们会显示一条消息：“此匿名内部类创建可转换为 lambda 表达式”。这表示 NetBeans 8.0 可能愿意为您编写一些
    lambda 表达式代码，这非常巧妙。


    要了解详情，您需要利用您信赖的 **Alt-Enter** 工作流程，正如您所见，有一个 lambda 表达式选项，可以让 NetBeans 将代码重写为
    lambda 表达式。原始代码如下所示：


    ```

    gameButton.setOnAction(new EventHandler<ActionEvent>() {

        @Override public void handle(ActionEvent event) {

            splashScreenBackplate.setVisible(false);

            splashScreenTextArea.setVisible(false);

        }

    });

    ```


    NetBeans 编写的 lambda 表达式要紧凑得多，看起来像下面的 Java 8 代码：


    ```

    gameButton.setOnAction((ActionEvent event) -> {

        splashScreenBackplate.setVisible(false);

        splashScreenTextArea.setVisible(false);

    });

    ```


    正如您在图 9-6 中所见，NetBeans 为您编写的这个 lambda 表达式本身也带有警告，因为存在“参数 event 未使用”的警告，因此我们接下来将删除
    **event**，使 lambda 表达式更加紧凑！将来某个时候，Oracle 会更新编写 lambda 表达式的这段代码，使其能够检查您的方法代码块内部，发现没有引用
    event 对象，也会将其移除，并且不再生成该警告。在那之前，我们需要自己编辑 NetBeans 生成的代码。


    ![9781484204160_Fig09-06.jpg](img/9781484204160_Fig09-06.jpg)


    图 9-6. NetBeans 为您编写的 lambda 表达式带有警告消息“参数 event 未使用”


    由于我们没有在此 lambda 表达式的代码体中使用 event 变量，我们可以将其移除，得到以下最终的 Java 8 lambda 表达式代码，它比原始代码简单得多：


    ```

    gameButton.setOnAction((ActionEvent) -> {

        splashScreenBackplate.setVisible(false);

        splashScreenTextArea.setVisible(false);

    });

    ```


    如您所见，lambda 表达式要求 Java 编译器为您创建 ActionEvent 对象，用其创建的 **ActionEvent** 对象替换了 **new
    EventHandler<ActionEvent>()** 构造方法调用。如果您想知道为什么 lambda 表达式被添加到 Java 8，以及它们如何使其变得更好，答案是它们允许将
    Java 函数（方法），特别是“一次性”或内部方法，像语句一样编写。它们还有助于多线程处理。


    在我们深入探讨 Java 8 和 JavaFX 中的事件处理类之前，让我们先看看我在编写本章时遇到的一个更新，以及出现的一些不准确的警告高亮。


