    \n[Figure 12-7](#9781484204160_Ch12.xhtml#_Fig7). Remove the Java `static` modifier\
    \ keyword from in front of your `Bagel iBagel` object declaration statement\n\n\
    The next thing that we’ll need to do to makes sure that our `InvinciBagel` and\
