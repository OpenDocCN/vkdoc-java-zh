    7 章到第 13 章中与 GamePlayLoop 类和 CastingDirector 类一起实现），现在是时候将固定的精灵对象（我称之为“道具”）添加到场景和舞台（屏幕）中了。这些固定对象对游戏的重要性几乎与主角本身相当，因为它们可以用来提供障碍物、屏障、抵御敌人的保护以及主要游戏英雄角色需要克服的各种挑战。我们还需要场景中的这些固定对象来用于碰撞检测程序逻辑，并测试我们的
    CastingDirector 类（对象）。

