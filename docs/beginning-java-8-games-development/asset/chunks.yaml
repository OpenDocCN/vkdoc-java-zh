    ,520,160,iE0);\n```\n\n![9781484204160_Fig17-39.jpg](OEBPS/Images/9781484204160_Fig17-39.jpg)\n\
    \n[Figure 17-39](#9781484204160_Ch17.xhtml#_Fig39). Add a Java `this` keyword\
    \ inside the `Enemy()` constructor method call to pass over the `InvinciBagel`\
    \ object\n\nFor this to work, you need to also update your `Enemy.java` class\
    \ to accommodate the `InvinciBagel` object. Add an `InvinciBagel invinciBagel;`\
    \ object declaration, at the top of the `Enemy.java` class, and edit your `Enemy()`\
    \ constructor method to support this object by adding an `InvinciBagel iBagel`\
    \ parameter at the head end (beginning) of the parameter list definition. Inside\
