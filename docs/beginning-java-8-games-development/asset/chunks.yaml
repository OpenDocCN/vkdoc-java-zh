- fmt: "# 排版后的内容\n\n[Figure 17-46](#9781484204160_Ch17.xhtml#_Fig46). Adding the `iBullet`,\
    \ `iCheese` and `iBeagle` `object.equals()` if-else structures to the `.scoringEngine()`\
    \ method\n\nAt this point, if you use a **Run ![image](OEBPS/Images/arrow.jpg)\
    \ Project** work process, you should have an `iBeagle` shooting a Bullet or Cream\
    \ Cheese Ball. When you catch the `iBeagle` with the `InvinciBagel` character,\
    \ you should score ten points, or, if you catch a Cream Cheese Ball, you should\
    \ get five points. If you get hit by a Bullet, you should lose five points.\n\n\
    You will notice as you test the `InvinciBagel` game application that once you\
    \ get hit by a Bullet, Cream Cheese Ball, or when you catch the `iBeagle`, that\
    \ they do not come back! This is because the collision detection programming logic\
    \ removes an object from the game once an `InvinciBagel` collects it (Treasure)\
    \ or collides with it (Prop or Projectile).\n\nSo the next step in our development\
    \ will be to add in the programming logic that adds an `iBullet`, `iCheese` or\
    \ `iBeagle` object back into the `castDirector` object once they have been removed\
    \ by the collision detection programming logic that you put into place in [Chapter\
    \ 16](#9781484204160_Ch16.xhtml). To do this, we’ll have to code an enhancement\
    \ to the `CastingDirector.java` class, code the new `.loadEnemy()`, `.loadBullet()`\
    \ and `.loadCheese()` methods at the bottom of the `Enemy.java` class, and add\
    \ the appropriate programming logic implementing these three new methods into\
    \ the `.initiateAttack()` method.\n\n## Adding Bullets to a Clip: Updating `.addCurrentCast()`\n\
    \nSince we are going to add single (one at a time, not unmarried) `Actor` objects\
    \ back into the `CURRENT_CAST` List, we will need to modify the `.addCurrentCast()`\
    \ method as it currently only takes an `Actor...` series of objects and we need\
    \ it to accommodate a single added `Actor` object, like the `addToRemovedActors()`\
    \ method does currently. You can see the `.addToRemovedActors()` method at the\
    \ bottom of [Figure 17-47](#9781484204160_Ch17.xhtml#Fig47). The `.addCurrentCast()`\
    \ method was designed to be used **statically** in the `InvinciBagel.java` class,\
    \ in the `start()` method, to add all of the cast members at one time (remember\
    \ static versus dynamic). Now I am going to show you how to redesign it to allow\
    \ “one off” additions during gameplay, which is a dynamic use of the method, as\
    \ the `List<Actor>` will be modified **dynamically** in real-time during gameplay.\
    \ To upgrade the `.addCurrentCast()` method, simply “wrap” the `.addAll()` method\
    \ call inside of the method with an `if(actors.length > 1)` if-else structure,\
    \ with the original code inside of the `if()` portion and a `CURRENT_CAST.add(actors[0]);`\
    \ statement inside of the `else` portion to accommodate single `Actor` method\
    \ calls. The Java code for the new method structure can be seen in [Figure 17-47](#9781484204160_Ch17.xhtml#Fig47),\
    \ and should look like the following:\n\n```\npublic void addCurrentCast(Actor...\
    \ actors) {\n    if(actors.length > 1) {\n        CURRENT_CAST.addAll(Arrays.asList(actors));\n\
    \    } else {\n        CURRENT_CAST.add(actors[0]);\n    }\n}\n```\n\n![9781484204160_Fig17-47.jpg](OEBPS/Images/9781484204160_Fig17-47.jpg)\n\
    \n[Figure 17-47](#9781484204160_Ch17.xhtml#_Fig47). Upgrade `addCurrentCast()`\
    \ method in the `CastingDirector` class to accept a single object in parameter\
    \ list\n\nIt is important to note that we could also accomplish this objective\
    \ by **overloading** this `.addCurrentCast()` method as well. If you wanted to\
    \ do this in this fashion, the Java code would look like the following method\
    \ bodies:\n\n```\npublic void addCurrentCast(Actor... actors) {\n        CURRENT_CAST.addAll(Arrays.asList(actors));\n\
    }\npublic void addCurrentCast(Actor actor) {\n        CURRENT_CAST.add(actor);\n\
    }\n```\n\nOnce your game design becomes more advanced and you have decorative\
    \ `Actor` objects on the Stage, you can implement the `COLLIDE_CHECKLIST` in your\
    \ `if()` structures that need to iterate through (only) the `Actor` objects in\
    \ your Scene that need to be processed for collision.\n\nAt this point in our\
    \ game design, we are processing all of the `Actor` objects for collision, thus,\
    \ we don’t yet need to implement the `COLLIDE_CHECKLIST List<Actor>` Array. I’ve\
    \ included it in the class design to be thorough and because I design foundational\
    \ classes for games by looking out into the future toward what I will need in\
    \ order for me to create an advanced (complete) game engine. That said, we may\
    \ not have enough pages in this Beginner title to get that advanced, but the functionality\
    \ is there if you needed to use it in your games, and after this chapter you will\
    \ have plenty of experience using `if()` structures!\n\nNow that we can add cast\
    \ members on an individual basis, it is time to write the methods that will allow\
    \ us to check the `CURRENT_CAST List<Actor>` Array to make sure that there are\
    \ `iBullet`, `iCheese`, and `iBeagle Actor` objects in place for us to use for\
    \ the next iteration of the auto-attack engine. What these methods will do is\
    \ to look for these `Actor` objects in the `CURRENT_CAST` List, and if they are\
    \ not present, will add one of them to the List so that it is ready for any type\
    \ of attack that our conditional `if()` statements and random number generator\
    \ create together!\n\nWe’ll write three methods, one for deadly projectiles, called\
    \ `.loadBullet()`; one for healthy projectiles, called `.loadCheese()`; and one\
    \ for Enemy objects, called `loadEnemy()`. This will give us the ultimate flexibility,\
    \ later on in our game development, of calling each type of functional `Actor`\
    \ object type in its own “replenishment function.”\n\nEach method will look through\
    \ the entire `CURRENT_CAST` List, using a `for()` loop, along with a `.size()`\
    \ method call. In this way, the entire List is processed, from the first element\
    \ (zero), through the last element (the List’s size).\n\nIf there is no `Actor`\
    \ object of that type found in the cast, that is, if the `for()` loop is completed,\
    \ and no object of that type is found, after looking through the entire `CURRENT_CAST\
    \ List<Actor>` for a match using `object.equals()`, then the two statements after\
    \ the `for` loop will be executed.\n\nThe first statement will add one `Actor`\
    \ object of that type to the `CURRENT_CAST List<Actor>`, and the second statement\
    \ will then add one `Actor` object of that type to the JavaFX SceneGraph. At that\
    \ point, the method is finished, and will then return control to the calling entity.\n\
    \nIf an `Actor` object of that type is found in the `CURRENT_CAST List<Actor>`\
    \ Array, a `return;` statement will be called to immediately exit the method,\
    \ and return control to the calling entity. This means that the statements at\
    \ the end of the `for()` loop, which add a new `Actor` object of that type to\
    \ the cast, as well as adding a new `Actor` object to the JavaFX Scene Graph root\
    \ object, will not be executed.\n\nThis `return;` statement is a central component\
    \ to making this method work, because if any `Actor` object of that type exists,\
    \ a duplicate one will not be added to the `List<Actor>` Array, which would cause\
    \ an error to occur. This is a great way to make sure that we only use one Node\
    \ for each type of Projectile and Enemy object, which allows us to optimize both\
    \ memory and processor overhead. The Java 8 programming structures for all three\
    \ of these methods is quite similar, and can be seen in [Figure 17-48](#9781484204160_Ch17.xhtml#Fig48).\
    \ The three `private void` method bodies should look like the following:\n\n```\n\
    private void loadBullet() {\n    for (int i=0; i<invinciBagel.castDirector.getCurrentCast().size();\
    \ i++) {\n        Actor object = invinciBagel.castDirector.getCurrentCast().get(i);\n\
    \        if(object.equals(invinciBagel.iBullet)) {\n            return;\n    \
    \    }\n    }\n    invinciBagel.castDirector.addCurrentCast(invinciBagel.iBullet);\n\
    \    invinciBagel.root.getChildren().add(invinciBagel.iBullet.spriteFrame);\n\
    }\n```"
  raw: '[Figure 17-46](#9781484204160_Ch17.xhtml#_Fig46). Adding the iBullet, iCheese
    and iBeagle object.equals() if-else structures to the .scoringEngine() method


    At this point, if you use a **Run ![image](OEBPS/Images/arrow.jpg) Project** work
    process, you should have an iBeagle shooting a Bullet or Cream Cheese Ball. When
    you catch the iBeagle with the InvinciBagel character, you should score ten points,
    or, if you catch a Cream Cheese Ball, you should get five points. If you get hit
    by a Bullet, you should lose five points.


    You will notice as you test the InvinciBagel game application that once you get
    hit by a Bullet, Cream Cheese Ball, or when you catch the iBeagle, that they do
    not come back! This is because the collision detection programming logic removes
    an object from the game once an InvinciBagel collects it (Treasure) or collides
    with it (Prop or Projectile).


    So the next step in our development will be to add in the programming logic that
    adds an iBullet, iCheese or iBeagle object back into the castDirector object once
    they have been removed by the collision detection programming logic that you put
    into place in [Chapter 16](#9781484204160_Ch16.xhtml). To do this, we’ll have
    to code an enhancement to the **CastingDirector.java** class, code the new .loadEnemy(),
    .loadBullet() and .loadCheese() methods at the bottom of the Enemy.java class,
    and add the appropriate programming logic implementing these three new methods
    into the .initiateAttack() method.


    Adding Bullets to a Clip: Updating .addCurrentCast()


    Since we are going to add single (one at a time, not unmarried) Actor objects
    back into the CURRENT_CAST List, we will need to modify the .addCurrentCast()
    method as it currently only takes an Actor . . . series of objects and we need
    it to accommodate a single added Actor object, like the addToRemovedActors() method
    does currently. You can see the .addToRemovedActors() method at the bottom of
    [Figure 17-47](#9781484204160_Ch17.xhtml#Fig47). The .addCurrentCast() method
    was designed to be used **statically** in the InvinciBagel.java class, in the
    start() method, to add all of the cast members at one time (remember static versus
    dynamic). Now I am going to show you how to redesign it to allow “one off” additions
    during gameplay, which is a dynamic use of the method, as the List<Actor> will
    be modified **dynamically** in real-time during gameplay. To upgrade the .addCurrentCast()
    method, simply “wrap” the .addAll() method call inside of the method with an if(actors.length
    > 1) if-else structure, with the original code inside of the if() portion and
    a **CURRENT_CAST.add(actors[0]);** statement inside of the else portion to accommodate
    single Actor method calls. The Java code for the new method structure can be seen
    in [Figure 17-47](#9781484204160_Ch17.xhtml#Fig47), and should look like the following:


    ```

    public void addCurrentCast(Actor... actors) {

        if(actors.length > 1) {

            CURRENT_CAST.addAll(Arrays.asList(actors));

        } else {

            CURRENT_CAST.add(actors[0]);

        }

    }

    ```


    ![9781484204160_Fig17-47.jpg](OEBPS/Images/9781484204160_Fig17-47.jpg)


    [Figure 17-47](#9781484204160_Ch17.xhtml#_Fig47). Upgrade addCurrentCast() method
    in the CastingDirector class to accept a single object in parameter list


    It is important to note that we could also accomplish this objective by **overloading**
    this .addCurrentCast() method as well. If you wanted to do this in this fashion,
    the Java code would look like the following method bodies:


    ```

    public void addCurrentCast(Actor... actors) {

            CURRENT_CAST.addAll(Arrays.asList(actors));

    }

    public void addCurrentCast(Actor actor) {

            CURRENT_CAST.add(actor);

    }

    ```


    Once your game design becomes more advanced and you have decorative Actor objects
    on the Stage, you can implement the COLLIDE_CHECKLIST in your if() structures
    that need to iterate through (only) the Actor objects in your Scene that need
    to be processed for collision.


    At this point in our game design, we are processing all of the Actor objects for
    collision, thus, we don’t yet need to implement the COLLIDE_CHECKLIST List<Actor>
    Array. I’ve included it in the class design to be thorough and because I design
    foundational classes for games by looking out into the future toward what I will
    need in order for me to create an advanced (complete) game engine. That said,
    we may not have enough pages in this Beginner title to get that advanced, but
    the functionality is there if you needed to use it in your games, and after this
    chapter you will have plenty of experience using if() structures!


    Now that we can add cast members on an individual basis, it is time to write the
    methods that will allow us to check the CURRENT_CAST List<Actor> Array to make
    sure that there are iBullet, iCheese, and iBeagle Actor objects in place for us
    to use for the next iteration of the auto-attack engine. What these methods will
    do is to look for these Actor objects in the CURRENT_CAST List, and if they are
    not present, will add one of them to the List so that it is ready for any type
    of attack that our conditional if() statements and random number generator create
    together!


    We’ll write three methods, one for deadly projectiles, called **.loadBullet()**;
    one for healthy projectiles, called **.loadCheese()**; and one for Enemy objects,
    called **loadEnemy()**. This will give us the ultimate flexibility, later on in
    our game development, of calling each type of functional Actor object type in
    its own “replenishment function.”


    Each method will look through the entire CURRENT_CAST List, using a for() loop,
    along with a .size() method call. In this way, the entire List is processed, from
    the first element (zero), through the last element (the List’s size).


    If there is no Actor object of that type found in the cast, that is, if the for()
    loop is completed, and no object of that type is found, after looking through
    the entire CURRENT_CAST List<Actor> for a match using **object.equals()**, then
    the two statements after the for loop will be executed.


    The first statement will add one Actor object of that type to the CURRENT_CAST
    List<Actor>, and the second statement will then add one Actor object of that type
    to the JavaFX SceneGraph. At that point, the method is finished, and will then
    return control to the calling entity.


    If an Actor object of that type is found in the CURRENT_CAST List<Actor> Array,
    a **return****;** statement will be called to immediately exit the method, and
    return control to the calling entity. This means that the statements at the end
    of the for() loop, which add a new Actor object of that type to the cast, as well
    as adding a new Actor object to the JavaFX Scene Graph root object, will not be
    executed.


    This **return;** statement is a central component to making this method work,
    because if any Actor object of that type exists, a duplicate one will not be added
    to the List<Actor> Array, which would cause an error to occur. This is a great
    way to make sure that we only use one Node for each type of Projectile and Enemy
    object, which allows us to optimize both memory and processor overhead. The Java
    8 programming structures for all three of these methods is quite similar, and
    can be seen in [Figure 17-48](#9781484204160_Ch17.xhtml#Fig48). The three **private
    void** method bodies should look like the following:


    ```

    private void loadBullet() {

        for (int i=0; i<invinciBagel.castDirector.getCurrentCast().size(); i++) {

            Actor object = invinciBagel.castDirector.getCurrentCast().get(i);

            if(object.equals(invinciBagel.iBullet)) {

                return;

            }

        }

        invinciBagel.castDirector.addCurrentCast(invinciBagel.iBullet);

        invinciBagel.root.getChildren().add(invinciBagel.iBullet.spriteFrame);

    }'
  trans: '

    图 17-46 将 iBullet、iCheese 和 iBeagle 的 object.equals() if-else 结构添加到 .scoringEngine()
    方法中


    此时，如果你使用 **运行 ![image](img/arrow.jpg) 项目** 工作流程，你应该能看到一个 iBeagle 发射子弹或奶油芝士球。当你用
    InvinciBagel 角色抓住 iBeagle 时，应得十分；如果抓住奶油芝士球，则应得五分。如果被子弹击中，则应扣五分。


    在测试 InvinciBagel 游戏应用时，你会注意到，一旦被子弹、奶油芝士球击中，或者抓住 iBeagle，它们就不会再出现了！这是因为碰撞检测编程逻辑会在
    InvinciBagel 收集（宝藏）或碰撞（道具或抛射物）到某个对象后，将其从游戏中移除。


    因此，我们开发的下一步是添加编程逻辑，将 iBullet、iCheese 或 iBeagle 对象重新添加回 castDirector 对象中——这些对象之前被你放在第
    16 章中的碰撞检测编程逻辑移除了。为此，我们需要对 **CastingDirector.java** 类进行增强编码，在 Enemy.java 类底部编写新的
    .loadEnemy()、.loadBullet() 和 .loadCheese() 方法，并在 .initiateAttack() 方法中添加实现这三个新方法的适当编程逻辑。


    将子弹添加到剪辑：更新 .addCurrentCast()


    由于我们要将单个（一次一个，而非多个）Actor 对象重新添加回 CURRENT_CAST 列表，我们需要修改 .addCurrentCast() 方法，因为它目前只接受
    Actor... 系列对象，而我们需要它能够容纳单个添加的 Actor 对象，就像 .addToRemovedActors() 方法当前所做的那样。你可以在图
    17-47 底部看到 .addToRemovedActors() 方法。.addCurrentCast() 方法最初设计为在 InvinciBagel.java
    类的 start() 方法中**静态**使用，以一次性添加所有演员成员（记住静态与动态的区别）。现在，我将向你展示如何重新设计它，以允许在游戏过程中进行“一次性”添加，这是对该方法的动态使用，因为
    List<Actor> 将在游戏过程中**动态**实时修改。要升级 .addCurrentCast() 方法，只需在方法内部用 if(actors.length
    > 1) if-else 结构“包裹” .addAll() 方法调用，将原始代码放在 if() 部分，并在 else 部分放置一条 **CURRENT_CAST.add(actors[0]);**
    语句，以容纳单个 Actor 方法调用。新方法结构的 Java 代码见图 17-47，应如下所示：


    ```

    public void addCurrentCast(Actor... actors) {

        if(actors.length > 1) {

            CURRENT_CAST.addAll(Arrays.asList(actors));

        } else {

            CURRENT_CAST.add(actors[0]);

        }

    }

    ```


    ![9781484204160_Fig17-47.jpg](img/9781484204160_Fig17-47.jpg)


    图 17-47 升级 CastingDirector 类中的 addCurrentCast() 方法，使其参数列表能接受单个对象


    需要注意的是，我们也可以通过**重载**这个 .addCurrentCast() 方法来实现这一目标。如果你想以这种方式实现，Java 代码将如下所示：


    ```

    public void addCurrentCast(Actor... actors) {

            CURRENT_CAST.addAll(Arrays.asList(actors));

    }

    public void addCurrentCast(Actor actor) {

            CURRENT_CAST.add(actor);

    }

    ```


    一旦你的游戏设计变得更加高级，并且在舞台上有了装饰性 Actor 对象，你可以在需要遍历场景中（仅）需要处理碰撞的 Actor 对象的 if() 结构中实现
    COLLIDE_CHECKLIST。


    在我们游戏设计的当前阶段，我们正在处理所有 Actor 对象的碰撞，因此，我们暂时还不需要实现 COLLIDE_CHECKLIST List<Actor>
    数组。我将其包含在类设计中是为了全面性，并且因为我设计游戏基础类时会展望未来，考虑创建高级（完整）游戏引擎所需的内容。话虽如此，这本入门级书籍的篇幅可能不足以让我们达到那么高级的程度，但如果你在游戏中需要用到这些功能，它们已经存在；而且在本章之后，你将拥有大量使用
    if() 结构的经验！


    既然我们现在可以逐个添加演员成员，是时候编写一些方法了，这些方法将允许我们检查 CURRENT_CAST List<Actor> 数组，确保其中有 iBullet、iCheese
    和 iBeagle Actor 对象，供我们用于自动攻击引擎的下一次迭代。这些方法的作用是在 CURRENT_CAST 列表中查找这些 Actor 对象，如果它们不存在，则向列表中添加一个，以便它准备好应对我们的条件
    if() 语句和随机数生成器共同生成的任何类型的攻击！


    我们将编写三个方法：一个用于致命抛射物，名为 **.loadBullet()**；一个用于有益抛射物，名为 **.loadCheese()**；一个用于敌人对象，名为
    **loadEnemy()**。这将为我们提供最大的灵活性，在后续游戏开发中，我们可以通过各自的“补充函数”来调用每种功能性的 Actor 对象类型。


    每个方法将使用 for() 循环以及 .size() 方法调用来遍历整个 CURRENT_CAST 列表。这样，整个列表将从第一个元素（零）到最后一个元素（列表的大小）被处理。


    如果在演员列表中没有找到该类型的 Actor 对象，即 for() 循环完成后，使用 **object.equals()** 在整个 CURRENT_CAST
    List<Actor> 中查找匹配项后仍未找到，则将执行 for 循环之后的两条语句。


    第一条语句将向 CURRENT_CAST List<Actor> 添加一个该类型的 Actor 对象，第二条语句则将该 Actor 对象添加到 JavaFX
    SceneGraph。此时，方法执行完毕，并将控制权返回给调用实体。


    如果在 CURRENT_CAST List<Actor> 数组中找到了该类型的 Actor 对象，则会调用 **return;** 语句立即退出该方法，并将控制权返回给调用实体。这意味着
    for() 循环末尾的语句——即向演员列表添加一个新的该类型 Actor 对象，以及向 JavaFX Scene Graph 根对象添加一个新的 Actor
    对象——将不会被执行。


    这个 **return;** 语句是使该方法正常工作的核心组件，因为如果该类型的任何 Actor 对象已经存在，就不会向 List<Actor> 数组添加重复对象，否则会导致错误。这是确保我们只为每种抛射物和敌人对象类型使用一个节点的好方法，从而优化内存和处理器开销。这三种方法的
    Java 8 编程结构非常相似，如图 17-48 所示。这三个 **private void** 方法体应如下所示：


    ```

    private void loadBullet() {

        for (int i=0; i<invinciBagel.castDirector.getCurrentCast().size(); i++) {

            Actor object = invinciBagel.castDirector.getCurrentCast().get(i);

            if(object.equals(invinciBagel.iBullet)) {

                return;

            }

        }

        invinciBagel.castDirector.addCurrentCast(invinciBagel.iBullet);

        invinciBagel.root.getChildren().add(invinciBagel.iBullet.spriteFrame);

    }

