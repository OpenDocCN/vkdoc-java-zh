- fmt: '由于 WAVE 或 AIFF 文件不会产生任何质量损失（也无需解压缩），PCM 数据可以直接从 JAR 文件加载到系统内存中！这使得 PCM 音频非常适合持续时间短（0.1
    到 1 秒）的游戏音效，并且可以通过使用 8 位和 12 位采样分辨率以及 8kHz、22kHz 或 32kHz 采样频率进行高度优化。最终，找出 JavaFX
    支持的哪种音频格式能为任何给定的数字音频数据提供最佳数字音频压缩结果的唯一真正方法，是将你的数字音频编码为你已知支持且高效的编解码器。稍后，当你向游戏添加音频时，我将概述这一工作流程，你将观察到使用相同源音频样本时不同格式之间的相对数据占用结果（参见[第
    15 章](#9781484204160_Ch15.xhtml)）。然后，你将聆听音频播放质量，以便就质量和文件大小之间的最佳平衡做出最终决定。这是你在为
    Java 8 游戏开发 JavaFX 数字音频资产时需要经历的工作流程。


    JavaFX 还支持流行的 MPEG-4 AAC 编解码器。这些数字音频数据可以包含在 MPEG4 容器（`.mp4`、`.m4a`、`.m4v`）或文件扩展名中，并且可以在任何操作系统上播放。需要注意的是，JavaFX
    不包含 MPEG-4 解码器，而是支持所谓的多媒体容器，这意味着 JavaFX 使用操作系统的 MPEG-4 解码器。


    出于这个原因，并且由于在线听力研究已得出结论，MP3 格式（对于音乐）的质量优于 MP4，你将通过 `Media` 和 `MediaPlayer` 类使用
    MP3 格式处理较长形式的音频（游戏背景音乐循环）。你将使用 PCM WAVE 音频格式处理短形式（1 秒或更短）的音频（游戏音效，例如射击、铃声、叫喊、咕哝、笑声、欢呼以及其他此类数字音频资产），你将通过
    JavaFX 慷慨提供的 `AudioClip` 数字音频序列引擎（类）来使用这些音频。


    **数字音频优化：从 CD 品质音频开始，逆向工作**


    针对市场上最广泛的硬件设备优化你的数字音频资产，将比在这些设备上优化数字视频或数字图像（以及动画）更容易。这是因为目标屏幕分辨率和显示纵横比之间的差异，远大于硬件设备之间数字音频播放硬件支持类型的差异（可能除了一些支持
    24 位高清音频播放硬件兼容性的新硬件）。所有硬件都能很好地播放数字音频资产，因此音频优化是一种“一个音频资产适配所有设备”的场景，而在视觉（视频、图像、动画）方面，你的显示屏大到
    4096 × 2160 像素（4K 网络电视），小到 320 × 320 像素（翻盖手机和智能手表）。


    重要的是要记住，用户的耳朵无法像眼睛感知数字图像、2D 动画和数字视频那样感知数字音频的质量差异。通常，在所有硬件设备上，有三个主要的数字音频支持“最佳点”是你应该为
    Java 游戏音频支持的目标。


    低质量音频，例如短旁白音轨、角色感叹声和短时音效，可以通过使用 **8kHz** 或 **22kHz** 的采样率以及 **8 位**或 **12 位**采样分辨率实现非常高的质量。中等质量音频，例如长旁白音轨、长时音效和循环背景（环境）音频，可以通过使用
    **22kHz** 或 **32kHz** 的采样率以及 **12 位**或 **16 位**采样分辨率实现非常高的质量水平。


    高质量音频资产，例如音乐，应优化至接近 **CD 品质音频**，并将使用 **32kHz** 或 **44.1kHz** 的采样率以及 **16 位**数据采样分辨率。对于**高清**品质音频，处于此音频频谱的超高端，你将使用
    **48kHz** 采样率以及 **24 位**数字音频数据采样分辨率。还有一种未命名的、“介于两者之间”的高端音频规格，使用 **48kHz** 采样率以及
    **16 位**数据采样分辨率，这恰好是杜比 THX 过去在其电影院高端音频体验技术中所使用的。


    最终，这归结为从数字音频数据占用优化工作流程中产生的质量与文件大小的平衡结果，这可能是惊人的。因此，你为在所有硬件设备上优化数字音频资产的初始工作流程是创建基线
    16 位资产，采样率为 44.1kHz 或 48kHz，然后使用 JavaFX 支持的不同格式对其进行优化（压缩）。一旦该工作流程完成，你可以查看哪些生成的数字音频资产提供了最小的数据占用以及最高的数字音频播放质量。之后，你可以将
    44.1kHz 或 48kHz 的数据降低到 32kHz 并保存，首先使用 16 位分辨率，然后使用 12 位分辨率。接下来，重新打开原始的 48kHz 数据，降采样到
    22kHz 采样频率，并使用 16 位和 12 位分辨率导出，依此类推。稍后，当你向 Java 8 游戏添加数字音频资产时，你将执行此工作流程，因此你将看到整个过程（参见[第
    15 章](#9781484204160_Ch15.xhtml)）。


    接下来，让我们看看 JavaFX Scene Builder 以及它如何使用 FXML 允许设计人员以可视化方式设计 JavaFX 应用程序。在本书中，我不会使用
    Scene Builder 或 FXML（仅使用 Java 8 代码和 JavaFX 类），所以请注意！


    **JavaFX Scene Builder：使用 FXML 进行 UI 设计**


    JavaFX **Scene Builder** 是一个可视化设计工具，它生成一个 **FXML**（JavaFX 标记语言）UI 场景图结构来定义你的 JavaFX
    应用程序的前端设计。然后，这个 FXML **UI 定义**可以在 Java 8 中“膨胀”，以创建你的应用程序的 JavaFX 场景图、节点、组和填充了
    `javafx.scene.control` 包类（对象）的 `SubScene` 对象，这些对象定义了你的 UI 设计。Oracle 同时提供 Scene
    Builder 可视化开发工具和 FXML 的意图是允许非程序员（表面上是 UI 设计师）为他们的 Java 8 应用程序设计前端 UI，以便 Java 程序员可以专注于后端功能性的应用程序任务处理逻辑。


    由于 FXML 和 Scene Builder 针对 UI 设计（排列控件，例如按钮、文本输入字段、单选按钮、复选框等）进行了优化，在本书中我不会使用 Scene
    Builder 和 FXML。但是，我将在本章中介绍它，以便你知道如何在你其他的 JavaFX 应用程序中使用它。我的理由是，除了初始的游戏启动画面（其中包含几个
    UI `Button` 对象，用于显示游戏说明、列出贡献者、追踪高分、保存当前游戏状态以及开始游戏）之外，UI 设计不会成为本书的主要焦点。'
  raw: 'Because a WAVE or AIFF file will not have any quality loss (as there is also
    no decompression needed), the PCM data can be placed straight from the JAR file
    into system memory! This makes PCM audio great for game sound effects that are
    short in duration (0.1 to 1 second), and it can be highly optimized, using 8-bit
    and 12-bit sample resolution and 8kHz, 22kHz, or 32kHz sample frequency. Ultimately,
    the only real way to find out which audio format supported by JavaFX has the best
    digital audio compression result for any given digital audio data is to encode
    your digital audio in the primary codecs that you know are supported and efficient.
    I will be outlining this work process later on, when you add audio to the game,
    and you will observe the relative data footprint results between the different
    formats, using the same source audio sample (see [Chapter 15](#9781484204160_Ch15.xhtml)).
    Then, you will listen to the audio playback quality so that you can make your
    final decision concerning the optimal balance between quality and file size .
    This is the work process that you will need to go through to develop JavaFX digital
    audio assets for use in your Java 8 game.


    JavaFX also supports the popular MPEG-4 AAC codec. These digital audio data can
    be contained in MPEG4 containers (.mp4, .m4a, .m4v), or file extensions, and can
    be played back using any OS. It is important to note that JavaFX does not contain
    an MPEG-4 decoder, but instead supports what is called a multimedia container,
    meaning that JavaFX uses the OS’s MPEG-4 decoder.


    For this reason, and because online listening studies have concluded that the
    MP3 format has better quality (for music) than the MP4, you will be using the
    MP3 format for longer-form audio (game background musical loops) via the Media
    and MediaPlayer classes. You will use the PCM WAVE audio format for short-form
    (1 second or less) audio (game sound effects, such as shots, bells, yelps, grunts,
    laughter, cheering, and other such digital audio assets), which you will use via
    the AudioClip digital audio sequencing engine (class) that JavaFX so generously
    provides.


    Digital Audio Optimization: Start with CD-Quality Audio, and Work Backward


    Optimizing your digital audio assets for playback across the widest range of hardware
    devices on the market is going to be easier than optimizing your digital video
    or digital imagery (and thus animation) across these devices. This is because
    there is a much wider disparity between target screen resolutions and display
    aspect ratios than there is between types of digital audio playback hardware support
    across hardware devices (with the possible exception of new hardware featuring
    24-bit HD audio playback hardware compatibility). All hardware plays digital audio
    assets well, so audio optimization is a “one audio asset hits all devices” scenario,
    whereas with the visual (video, image, animation) part of the equation, you have
    display screens as large as 4,096 × 2,160 pixels (4K iTV Sets) and as small as
    320 × 320 pixels (flip phones and smart watches).


    It is important to remember that the user’s ears cannot perceive the same quality
    difference with digital audio that the user’s eyes can with digital imagery, 2D
    animation, and digital video. Generally, there are three primary “sweet spots”
    of digital audio support across all hardware devices that you should target for
    support for Java game audio.


    Lower-quality audio, such as short narration tracks, character exclamations, and
    short-duration sound effects, can achieve remarkably high quality by using a sampling
    rate of **8kHZ** or **22kHz**, along with **8-bit** or **12-bit** sampling resolution.
    Medium-quality audio, such as long narration tracks, longer-duration sound effects,
    and looped background (ambient) audio, can achieve a very high quality level by
    using a **22kHz** or **32kHz** sampling rate, along with a **12-bit** or **16-bit**
    sampling resolution.


    The high-quality audio assets, such as music, should be optimized approaching
    **CD-quality audio** and will use a **32kHz** or **44.1kHz** sampling rate, along
    with the **16-bit** data sampling resolution. For **HD**-quality audio, being
    at the ultra-high end of this audio spectrum, you would use the **48kHz** sampling
    rate, along with the **24-bit** digital audio data sampling resolution. There
    is also an unnamed, “somewhere in the middle” high-end audio specification, using
    a **48kHz** sampling rate, along with a **16-bit** data sampling resolution, which
    just happens to be what Dolby THX used to use for its high-end audio experience
    technology in movie theaters (back in the day).


    Ultimately, it comes down to the quality–file size balance results that emerge
    from the digital audio data footprint optimization work process, which can be
    amazing. Therefore, your initial work process for optimizing your digital audio
    assets across all these hardware devices is going to be to create baseline 16-bit
    assets, at either 44.1kHz or 48kHz, and then optimize (compress) them, using the
    different formats supported in JavaFX. Once that work process is completed, you
    can see which resulting digital audio assets provide the smallest data footprint,
    along with the highest quality digital audio playback. After that, you can reduce
    your 44.1KHz or 48kHz data to 32kHz and save that out ,using first 16-bit and
    then 12-bit resolution. Next, reopen the original 48kHz data, downsample to 22kHz
    sample frequency, and export that, using 16-bit and 12-bit resolution, and so
    on. You will be performing this work process later on, when you add digital audio
    assets to the Java 8 game, so you will see the entire process (see [Chapter 15](#9781484204160_Ch15.xhtml)).


    Next, let’s take a look at JavaFX Scene Builder and how it uses FXML to allow
    designers to design Java FX applications visually. I am not going to be using
    Scene Builder or FXML (just Java 8 code and JavaFX classes) over the course of
    this book, so pay attention!


    JavaFX Scene Builder: Using FXML for UI Design


    JavaFX **Scene Builder** is a visual design tool that generates an **FXML** (JavaFX
    markup language) UI Scene Graph construct to define your JavaFX application’s
    front-end design. This FXML **UI definition** can then be “inflated” in Java 8
    to create your application’s JavaFX Scene Graph, nodes, groups, and SubScene objects
    filled with javafx.scene.control package classes (objects) defining your UI design.
    Oracle’s intention in offering both a Scene Builder visual development tool and
    FXML is to allow nonprogrammers, ostensibly UI designers, to design the front-end
    UIs for their Java 8 applications so that the Java programmers can then focus
    on back-end functional application task processing logic.


    Because FXML and Scene Builder are optimized for UI design (arranging controls,
    such as buttons, text entry fields, radio buttons, check boxes, and so on), I
    am not going to use Scene Builder and FXML over the course of this book. I am,
    however, going to cover it in this chapter so that you know how to use it if you
    want to for your other JavaFX applications. My reasoning is that, other than the
    initial game splash screen, which contains a few UI Button objects, which show
    game instructions, list the contributors, track the high scores, save a current
    game state, and start game play, UI design will not be a major focus of this book.'
  trans: '

    由于 WAVE 或 AIFF 文件不会产生任何质量损失（同时也无需解压缩），PCM 数据可以直接从 JAR 文件放入系统内存！这使得 PCM 音频非常适合持续时间较短（0.1
    到 1 秒）的游戏音效，并且可以通过使用 8 位和 12 位采样分辨率以及 8kHz、22kHz 或 32kHz 采样频率进行高度优化。最终，要找出 JavaFX
    支持的哪种音频格式能为任意给定的数字音频数据提供最佳的数字音频压缩效果，唯一真正的方法就是将你的数字音频编码为你已知支持且高效的编解码器。稍后，当你向游戏中添加音频时，我将概述这一工作流程，你将观察到使用相同源音频样本时，不同格式之间的相对数据占用结果（参见第
    15 章）。然后，你将聆听音频回放质量，以便就质量和文件大小之间的最佳平衡做出最终决定。这是你在为 Java 8 游戏开发 JavaFX 数字音频资源时需要经历的工作流程。


    JavaFX 还支持流行的 MPEG-4 AAC 编解码器。这些数字音频数据可以包含在 MPEG4 容器（.mp4、.m4a、.m4v）或文件扩展名中，并且可以在任何操作系统上回放。需要注意的是，JavaFX
    本身不包含 MPEG-4 解码器，而是支持所谓的多媒体容器，这意味着 JavaFX 使用操作系统的 MPEG-4 解码器。


    出于这个原因，并且由于在线听力研究得出结论，MP3 格式（对于音乐）的质量优于 MP4，你将通过 Media 和 MediaPlayer 类，对较长格式的音频（游戏背景音乐循环）使用
    MP3 格式。你将使用 PCM WAVE 音频格式来处理短格式（1 秒或更短）的音频（游戏音效，例如射击声、铃声、叫喊声、咕哝声、笑声、欢呼声以及其他此类数字音频资源），你将通过
    JavaFX 慷慨提供的 AudioClip 数字音频序列引擎（类）来使用它们。


    **数字音频优化：从 CD 品质音频开始，逆向工作**


    针对市场上最广泛的硬件设备优化你的数字音频资源，将比在这些设备上优化数字视频或数字图像（以及动画）更容易。这是因为目标屏幕分辨率和显示宽高比之间的差异，远大于硬件设备之间数字音频回放硬件支持类型的差异（可能除了具有
    24 位高清音频回放硬件兼容性的新硬件之外）。所有硬件都能很好地播放数字音频资源，因此音频优化是一种“一个音频资源适配所有设备”的场景，而在等式中的视觉（视频、图像、动画）部分，你面对的是大到
    4096 × 2160 像素（4K 网络电视）和小到 320 × 320 像素（翻盖手机和智能手表）的显示屏。


    重要的是要记住，用户的耳朵无法像眼睛感知数字图像、2D 动画和数字视频那样，感知到数字音频中同样的质量差异。通常，在所有硬件设备上，有三个主要的数字音频支持“最佳点”是你为
    Java 游戏音频提供支持时应瞄准的目标。


    低质量音频，例如短旁白音轨、角色感叹声和短时音效，通过使用 **8kHz** 或 **22kHz** 的采样率，以及 **8 位**或 **12 位**的采样分辨率，可以达到非常高的质量。中等质量音频，例如长旁白音轨、较长时长的音效和循环背景（环境）音频，通过使用
    **22kHz** 或 **32kHz** 的采样率，以及 **12 位**或 **16 位**的采样分辨率，可以达到非常高的质量水平。


    高质量音频资源，例如音乐，应优化至接近 **CD 品质音频**，并将使用 **32kHz** 或 **44.1kHz** 的采样率，以及 **16 位**的数据采样分辨率。对于处于此音频频谱超高端的
    **HD** 品质音频，你将使用 **48kHz** 的采样率，以及 **24 位**的数字音频数据采样分辨率。还有一种未命名的、“介于两者之间”的高端音频规格，使用
    **48kHz** 的采样率，以及 **16 位**的数据采样分辨率，这恰好是杜比 THX 过去在其电影院高端音频体验技术中所使用的（在那个年代）。


    最终，这一切都归结于从数字音频数据占用优化工作流程中产生的质量与文件大小的平衡结果，这可能是惊人的。因此，你为在所有硬件设备上优化数字音频资源而进行的初始工作流程将是创建基线
    16 位资源，采样率为 44.1kHz 或 48kHz，然后使用 JavaFX 支持的不同格式对其进行优化（压缩）。一旦该工作流程完成，你就可以看到哪些最终的数字音频资源提供了最小的数据占用以及最高的数字音频回放质量。之后，你可以将
    44.1kHz 或 48kHz 的数据降低到 32kHz 并保存，先使用 16 位分辨率，然后使用 12 位分辨率。接下来，重新打开原始的 48kHz 数据，降采样到
    22kHz 采样频率，并使用 16 位和 12 位分辨率导出，依此类推。稍后，当你向 Java 8 游戏添加数字音频资源时，你将执行此工作流程，因此你将看到整个过程（参见第
    15 章）。


    接下来，让我们看看 JavaFX Scene Builder 以及它如何使用 FXML 让设计人员以可视化方式设计 JavaFX 应用程序。在本书中，我不会使用
    Scene Builder 或 FXML（仅使用 Java 8 代码和 JavaFX 类），所以请注意！


    **JavaFX Scene Builder：使用 FXML 进行 UI 设计**


    JavaFX **Scene Builder** 是一个可视化设计工具，它生成一个 **FXML**（JavaFX 标记语言）UI 场景图结构，用于定义你的
    JavaFX 应用程序的前端设计。然后，这个 FXML **UI 定义**可以在 Java 8 中“膨胀”，以创建你的应用程序的 JavaFX 场景图、节点、组和
    SubScene 对象，这些对象中填充了定义你 UI 设计的 javafx.scene.control 包类（对象）。Oracle 同时提供 Scene Builder
    可视化开发工具和 FXML 的意图是，允许非程序员（表面上是 UI 设计人员）为其 Java 8 应用程序设计前端 UI，以便 Java 程序员可以专注于后端功能性的应用程序任务处理逻辑。


    由于 FXML 和 Scene Builder 是为 UI 设计（排列控件，例如按钮、文本输入字段、单选按钮、复选框等）而优化的，因此在本书中我不会使用 Scene
    Builder 和 FXML。但是，我将在本章中介绍它，以便你知道如果你想将其用于其他 JavaFX 应用程序时如何使用。我的理由是，除了最初的游戏启动画面（其中包含几个
    UI 按钮对象，用于显示游戏说明、列出贡献者、追踪高分、保存当前游戏状态和开始游戏）之外，UI 设计将不是本书的主要焦点。

    '
- fmt: "要使用`FXML`，并随后使用`Scene Builder`可视化UI设计工具，你必须创建一种特殊的`FXML`应用程序，正如你在[第2章](#9781484204160_Ch02.xhtml)（参见[图2-4](#9781484204160_Ch02.xhtml#Fig4)）中创建`JavaFX`游戏时所了解的那样。创建`FXML`应用程序会导入`javafx.fxml`包及其类。这使得`Java\
    \ 8`代码能够**填充**UI设计师创建的`FXML`结构，以便程序员能够将`Java`逻辑附加到各种UI控件上。`Android OS`也使用基本的`XML`实现了这一点，但在`Android`中，这种方法不是可选的；它是其工作方式的一部分。在`JavaFX\
    \ 8`中（如你在[图2-4](#9781484204160_Ch02.xhtml#Fig4)中所见），它只是一种选择。如果你想进一步研究`Android`中基于`XML`的UI设计，请查阅我的书*Pro\
    \ Android UI*（Apress，2014）。\n\n`Scene Builder`可视化布局工具可以为你编写`FXML` UI设计结构，它是一个**所见即所得（WYSIWYG）拖放式**界面设计工具。设计师只需从包含`javafx.scene.control`包中所有控件类（对象）的UI控件**面板**（参见[第4章](#9781484204160_Ch04.xhtml)）中，将任何`JavaFX`\
    \ UI控件拖放到编辑屏幕上即可。此`Scene Builder`已集成到`NetBeans 8.0`中，以便于访问并与`JavaFX`集成，以防程序员也需要使用它来为客户快速原型化UI设计。此外，还有一个独立版本的`Scene\
    \ Builder`工具（2.0版），适用于不想在`NetBeans IDE`中工作的设计师。\n\n你可以在`FXML`编辑和实时预览之间来回切换，无需编译`Java`应用程序即可看到UI设计和布局的更改。你还可以实时地将所有**CSS样式**应用到`Scene\
    \ Builder`工具和`FXML`结构中，并同样无需任何`Java`编译即可看到这些编码更改的结果！此外，你可以使用第三方`JAR`文件或`FXML`定义，将自定义UI控件添加到UI控件面板库中。\n\
    \n**Scene Builder Kit API**是开源的。这允许你自定义`Scene Builder` UI面板和控件的集成方式，使你能够将`Scene\
    \ Builder`集成到其他`IDE`中，例如`Eclipse`或`IntelliJ IDEA`。一个富文本`TextFlow`容器最近已被添加到GUI组件（控件）库中，提供了**富文本编辑**功能。借助这些新功能，你可以构建多节点富文本结构，将其他UI元素或新媒体元素类型与`TextFlow`元素集成在一起。\n\
    \n对于3D爱好者来说，`Scene Builder`可视化设计编辑器和`FXML`也完全支持3D。可以使用`Scene Builder`工具加载甚至保存3D对象，并且可以使用**检查器面板**实时编辑（和查看）对象的所有属性。目前尚无法使用`Scene\
    \ Builder`从头创建3D对象，也无法分配或编辑复杂的`Mesh`或`Materials`属性，但我相信这些功能将会随着计划添加到`JavaFX 8`中的高级3D\
    \ `OpenGL ES`功能一同到来。\n\n接下来，让我们深入探讨一下`FXML`标记语言的具体细节。之后，你将检查一个实际的`FXML` UI定义结构，并确切了解当前`JavaFX`应用程序的UI设计将如何使用`FXML`\
    \ UI定义结构来构建。正如你将看到的，`FXML`使UI设计变得容易得多！\n\n## FXML定义：XML UI定义结构的剖析\n\n`FXML`结构基于`JavaFX`类（对象）及其属性，你可以轻松创建的`FXML`**标签**和**参数**结构，允许你使用标记语言更轻松地“模拟”前端UI。`FXML`结构让你能够更轻松地构建场景图层次结构，而`FXML`标签及其参数（你将在下一节中看到）与`JavaFX\
    \ API`类是一一对应的。\n\n一旦你创建了UI设计，`Java`程序员就可以使用`javafx.fxml`类和方法，将你的UI布局容器和UI控件排列填充到基于`Java`对象的`JavaFX`场景和场景图结构中。然后，UI设计就可以在应用程序`Java`代码中使用。如前所述，`FXML`对于设计包含大量按钮、表单、复选框等的复杂、静态（固定）UI设计布局最为有用。\n\
    \n## Hello World UI FXML定义：使用FXML复制你当前的UI设计\n\n你在`FXML`结构中定义的第一件事是`FXML`**处理指令**。每个处理指令以小于号、问号序列（`<?`）开头，并以该序列的反转（问号、大于号\
    \ [`?>`]）结束。第一个处理指令是声明`XML`语言的使用、其**版本**（`1.0`）以及你想要使用的**文本字符集**语言编码格式（在本例中为`UTF-8`\
    \ [**通用**字符集**转换格式**，**8位**]）。因为是8位，所以这个国际字符集中有256个字符，它被设计用来覆盖许多基于日耳曼字符的语言，即使用A到Z字母表（包括重音字符）的语言。\n\
    \n在声明`XML`语言和字符集之后是处理指令。这些指令**导入**`Java`语言、工具以及`javafx.scene`包，以及`javafx.scene.layout`和`javafx.scene.control`包，这些包用于设计UI布局和布局中包含的UI控件。\n\
    \n例如，你在当前应用程序中使用的`StackPane` UI布局容器位于`javafx.scene.layout`包中，而按钮UI控件元素位于`javafx.scene.control`包中。因为`<StackPane>`\
    \ FXML UI布局容器是这个结构中的**父**元素，所以它放在最前面，或者说放在你即将创建的**嵌套** FXML UI定义结构的**外部**。\n\n\
    在`<StackPane>`内部，你将使用`<children>`标签（XML标签使用`<arrowHeadBrackets>`编码）嵌套`StackPane`类（对象）的**子元素**。嵌套在这些`<children>`标签内部的是UI控件元素（在本例中是一个按钮控件，因此你将使用`<Button>`标签）。请注意，在尖括号内使用类（对象）的专有名称来创建`FXML`标签，因此这非常合乎逻辑，并且应该很容易学习和融入到你的UI设计工作流程中：\n\
    \n```xml\n<? xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<? import java.lang.*\
    \ ?>\n<? import java.util.* ?>\n<? import javafx.scene.* ?>\n<? import javafx.scene.layout.*\
    \ ?>\n<? import javafx.scene.control.* ?>\n\n<StackPane id=\"root\" prefHeight=\"\
    250\" prefWidth=\"300\" >\n    <children>\n       <Button id=\"btn\" text=\"Say\
    \ 'Hello World'\" layoutX=\"125\" layoutY=\"116\" />\n    </children>\n</StackPane>\n\
    ```\n\n接下来，让我们看一下标签和参数语法，以便你始终知道如何构建`FXML` UI布局和控件定义文件。一个没有子元素的UI元素，例如前面的`<Button>`\
    \ UI控件，将使用简写的标签开闭语法，使用`<ClassName` 开始标签和正斜杠、大于号结束标签（`/>`），如下所示：\n\n```xml\n<Button\
    \  id=\"btn\"  text=\"Say 'Hello World'\"  layoutX=\"125\"  layoutY=\"116\"  />\n\
    ```"
  raw: 'To use FXML, and soon after use of the Scene Builder visual UI design tool,
    you must create a special kind of FXML application, as you learned in [Chapter
    2](#9781484204160_Ch02.xhtml) (see [Figure 2-4](#9781484204160_Ch02.xhtml#Fig4)),
    when you created the JavaFX game. Creating an FXML application imports the **javafx.fxml**
    package and classes. This allows the Java 8 code to **inflate** FXML constructs
    created by the UI designers so that they can be used by the programmers to attach
    Java logic to the various UI controls. The Android OS does this as well, using
    basic XML, but in Android this approach is not optional; it is part of the way
    things are done. In JavaFX 8 (as you saw in [Figure 2-4](#9781484204160_Ch02.xhtml#Fig4)),
    it is simply one option. If you want to research XML-based UI design further for
    Android, check out my book *Pro Android UI* (Apress, 2014).


    The Scene Builder visual layout tool that writes **FXML** UI design constructs
    for you is a **WYSIWYG drag and drop** interface design tool. All a designer has
    to do is drag and drop any of the JavaFX UI controls onto the editing screen from
    a UI Control **panel** that contains every Control class (object) in the **javafx.scene.control**
    package (see [Chapter 4](#9781484204160_Ch04.xhtml)). This Scene Builder is integrated
    into NetBeans 8.0 for easy access and integration with JavaFX, in case programmers
    also need to use it to quickly prototype UI designs for their clients. There is
    also a stand-alone version of the Scene Builder tool, at version 2.0, for designers
    who do not want to work inside the NetBeans IDE.


    You can switch back and forth from FXML editing and previewing in real time and
    see UI design and layout changes without having to compile the Java application.
    You can also apply all **CSS styles** to the Scene Builder tool and FXML structure
    in real time and see the results of those coding changes as well, again, without
    any Java compilation! In addition, you can add custom UI controls to the UI Control
    panel library, using third-party JAR files or FXML definitions.


    The **Scene Builder Kit API** is open source. This lets you customize your own
    integrations of Scene Builder’s UI panels and controls, allowing you to integrate
    Scene Builder into other IDEs, such as Eclipse or IntelliJ IDEA. A rich text TextFlow
    container has recently been added into the GUI component (Control) library, affording
    **rich text–editing** capabilities. With these new capabilities, you can build
    multiple-node, rich text constructs that can integrate other UI elements, or new
    media element types, with the TextFlow elements.


    For you 3D “aficionados,” 3D is also fully supported in the Scene Builder visual
    design editor and in FXML. A 3D object can be loaded and even saved out using
    the Scene Builder tool, and all of the object’s properties can be edited (and
    viewed) in real time, using the **Inspector panel**. It is not yet possible to
    create from scratch 3D objects using Scene Builder, and you cannot yet assign
    or edit complex Mesh or Materials properties at this time, but I am sure that
    these features will come, along with the advanced 3D OpenGL ES power that is scheduled
    to be added into JavaFX 8.


    Next, let’s take a look at FXML markup language specifically, at an in-depth level.
    After that, you will examine an actual FXML UI definition structure, and you will
    see exactly how the current JavaFX application’s UI design would be structured
    using an FXML UI definition construct. As you will see, FXML makes UI design a
    lot easier!


    FXML Definition: Anatomy of an XML UI Definition Construct


    The FXML structure is based on the JavaFX classes (objects), and their attributes,
    that the FXML **tags,** and **parameters** structures, which you can easily create,
    allow you to “mock up” a front-end UI more easily, using a mark-up language. The
    FXML structure lets you more easily construct your Scene Graph hierarchy, and
    the FXML tags and their parameters, which you will be looking at in the next section,
    match up 1:1 with the JavaFX API classes.


    Once you create your UI design, the Java programmers can use **javafx.fxml** classes
    and methods to inflate your UI layout container and UI control arrangement into
    a JavaFX scene and Scene Graph structure, based on Java objects. Then, the UI
    design can be used in the application Java code. As mentioned earlier, FXML is
    most useful for designing complex, static (fixed) UI design layouts containing
    lots of buttons, forms, check boxes and the like.


    Hello World UI FXML Definition: Replicating Your Current UI Design, Using FXML


    The first thing that you define in the FXML structure is the FXML **processing
    instructions**. Each processing instruction starts with a less-than sign, question
    mark sequence (**<?)** and ends with the  reversal of that sequence (question
    mark, greater-than sign [**?>])**. The first processing instruction is a declaration
    of the XML language use, its **version** (1.0), and the **text character set**
    language-encoding format that you want to use (in this case, **UTF-8** [**universal**
    character set **transformation format**, **8 bit**]). Because it is 8 bit, there
    are 256 characters in this international character set, which was designed to
    span the many languages based on Germanic characters, that is, languages that
    use an A to Z alphabet (including accented characters).


    Following the declaration of an XML language and a character set are processing
    instructions. These **import** the Java language, utilities, and **javafx.scene
    package** as well as the **javafx.scene.layout** and **javafx.scene.control**
    packages, which are used to design the UI layout and the UI controls that the
    layout contains.


    For example, the StackPane UI layout container that you are using in the current
    application is in the javafx.scene.layout package, and the button UI control element
    is in the javafx.scene.control package. Because the **<StackPane>** FXML UI layout
    container is the **parent** element in this structure, it goes first, or **outside**
    the **nested** FXML UI definition structure that you are about to create.


    Inside the <StackPane>, you will nest **children** of the StackPane class (object),
    using the **<children>** tags ( XML tags are coded using **<arrowHeadBrackets>**).
    Nested inside these <children> tags are the UI control elements (in this case,
    a button control, so you would use the <Button> tag). Note that the class (object)
    proper name is used inside the arrowhead brackets to create the FXML tag, so this
    is very logical and should be quite easy to learn and assimilate into your UI
    design work process:


    ```

    <? xml version="1.0" encoding="UTF-8" ?>

    <? import java.lang.* ?>

    <? import java.util.* ?>

    <? import javafx.scene.* ?>

    <? import javafx.scene.layout.* ?>

    <? import javafx.scene.control.* ?>


    <StackPane id="root" prefHeight="250" prefWidth="300" >

        <children>

           <Button id="btn" text="Say ''Hello World''" layoutX="125" layoutY="116"
    />

        </children>

    </StackPane>

    ```


    Next, let’s take a look at the tag and parameter syntax so that you always know
    how to construct FXML UI layout and control definition files. A UI element that
    has no children, such as the prior <Button> UI control, will use a shorthand tag
    open-and-close syntax, using the **<ClassName** opening tag and  forward slash,
    greater-than sign closing tag (**/>**), like this:


    ```

    <Button  id="btn"  text="Say ''Hello World''"  layoutX="125"  layoutY="116"  />

    ```'
  trans: '

    要使用 FXML，以及随后使用 Scene Builder 可视化 UI 设计工具，你必须创建一种特殊的 FXML 应用程序，正如你在第 2 章（参见图 2-4）创建
    JavaFX 游戏时所了解的那样。创建 FXML 应用程序会导入 **javafx.fxml** 包及其类。这使得 Java 8 代码能够**加载** UI
    设计人员创建的 FXML 结构，以便程序员可以使用这些结构将 Java 逻辑附加到各种 UI 控件上。Android 操作系统也使用基本 XML 实现了这一点，但在
    Android 中，这种方法并非可选项；它是其工作方式的一部分。在 JavaFX 8 中（如你在图 2-4 中所见），它仅仅是一种选择。如果你想进一步研究
    Android 中基于 XML 的 UI 设计，请查阅我的著作 *Pro Android UI*（Apress，2014 年）。


    为你编写 **FXML** UI 设计结构的 Scene Builder 可视化布局工具是一个**所见即所得的拖放式**界面设计工具。设计师只需从包含 **javafx.scene.control**
    包中所有控件类（对象）的 UI 控件**面板**（参见第 4 章）中，将任何 JavaFX UI 控件拖放到编辑屏幕上即可。此 Scene Builder
    已集成到 NetBeans 8.0 中，以便于访问并与 JavaFX 集成，以防程序员也需要使用它来为客户快速制作 UI 设计原型。此外，还有一个独立版本的
    Scene Builder 工具（2.0 版），适用于不想在 NetBeans IDE 中工作的设计师。


    你可以在 FXML 编辑和实时预览之间来回切换，查看 UI 设计和布局的更改，而无需编译 Java 应用程序。你还可以实时将**所有 CSS 样式**应用到
    Scene Builder 工具和 FXML 结构，并同样无需任何 Java 编译即可看到这些编码更改的结果！此外，你可以使用第三方 JAR 文件或 FXML
    定义，将自定义 UI 控件添加到 UI 控件面板库中。


    **Scene Builder Kit API** 是开源的。这允许你自定义 Scene Builder 的 UI 面板和控件的集成方式，使你能够将 Scene
    Builder 集成到其他 IDE（如 Eclipse 或 IntelliJ IDEA）中。一个富文本 TextFlow 容器最近已被添加到 GUI 组件（控件）库中，提供了**富文本编辑**功能。借助这些新功能，你可以构建多节点富文本结构，将其他
    UI 元素或新媒体元素类型与 TextFlow 元素集成在一起。


    对于你们这些 3D“发烧友”来说，Scene Builder 可视化设计编辑器和 FXML 也完全支持 3D。可以使用 Scene Builder 工具加载甚至保存
    3D 对象，并且可以使用**检查器面板**实时编辑（和查看）对象的所有属性。目前尚无法使用 Scene Builder 从头创建 3D 对象，也无法分配或编辑复杂的网格或材质属性，但我相信这些功能将会实现，同时计划添加到
    JavaFX 8 中的高级 3D OpenGL ES 功能也会到来。


    接下来，让我们深入具体地了解一下 FXML 标记语言。之后，你将检查一个实际的 FXML UI 定义结构，并确切了解当前 JavaFX 应用程序的 UI 设计将如何使用
    FXML UI 定义结构来构建。正如你将看到的，FXML 使 UI 设计变得容易得多！


    FXML 定义：XML UI 定义结构的剖析


    FXML 结构基于 JavaFX 类（对象）及其属性，你可以轻松创建的 FXML **标签**和**参数**结构允许你使用标记语言更轻松地“搭建”前端 UI。FXML
    结构让你能够更轻松地构建场景图层次结构，而 FXML 标签及其参数（你将在下一节中看到）与 JavaFX API 类是一一对应的。


    一旦你创建了 UI 设计，Java 程序员就可以使用 **javafx.fxml** 类和方法，将你的 UI 布局容器和 UI 控件排列加载到基于 Java
    对象的 JavaFX 场景和场景图结构中。然后，UI 设计就可以在应用程序 Java 代码中使用。如前所述，FXML 对于设计包含大量按钮、表单、复选框等的复杂、静态（固定）UI
    设计布局最为有用。


    Hello World UI FXML 定义：使用 FXML 复制你当前的 UI 设计


    你在 FXML 结构中定义的第一件事是 FXML **处理指令**。每个处理指令以小于号、问号序列（**<?**）开头，并以该序列的反向（问号、大于号 [**?>**]）结束。第一个处理指令是声明
    XML 语言的使用、其**版本**（1.0）以及你想要使用的**文本字符集**语言编码格式（在本例中为 **UTF-8** [**通用**字符集**转换格式**，**8
    位**]）。因为是 8 位，所以这个国际字符集中有 256 个字符，它被设计用来覆盖许多基于日耳曼字符的语言，即使用 A 到 Z 字母表（包括重音字符）的语言。


    在声明 XML 语言和字符集之后是处理指令。这些指令**导入** Java 语言、工具以及 **javafx.scene 包**，还有 **javafx.scene.layout**
    和 **javafx.scene.control** 包，这些包用于设计 UI 布局以及布局中包含的 UI 控件。


    例如，你在当前应用程序中使用的 StackPane UI 布局容器位于 javafx.scene.layout 包中，而按钮 UI 控件元素位于 javafx.scene.control
    包中。因为 **<StackPane>** FXML UI 布局容器是这个结构中的**父**元素，所以它放在最前面，或者说放在你即将创建的**嵌套** FXML
    UI 定义结构的**外部**。


    在 <StackPane> 内部，你将使用 **<children>** 标签（XML 标签使用 **<尖括号>** 编码）嵌套 StackPane 类（对象）的**子元素**。嵌套在这些
    <children> 标签内部的是 UI 控件元素（在本例中是一个按钮控件，因此你将使用 <Button> 标签）。请注意，在尖括号内使用类（对象）的专有名称来创建
    FXML 标签，因此这非常合乎逻辑，并且应该很容易学习和吸收到你的 UI 设计工作流程中：


    ```

    <? xml version="1.0" encoding="UTF-8" ?>

    <? import java.lang.* ?>

    <? import java.util.* ?>

    <? import javafx.scene.* ?>

    <? import javafx.scene.layout.* ?>

    <? import javafx.scene.control.* ?>


    <StackPane id="root" prefHeight="250" prefWidth="300" >

        <children>

           <Button id="btn" text="Say ''Hello World''" layoutX="125" layoutY="116"
    />

        </children>

    </StackPane>

    ```


    接下来，让我们看看标签和参数语法，这样你就始终知道如何构建 FXML UI 布局和控件定义文件。一个没有子元素的 UI 元素，例如前面的 <Button>
    UI 控件，将使用简写的标签开闭语法，使用 **<ClassName** 开始标签和正斜杠、大于号结束标签（**/>**），如下所示：


    ```

    <Button  id="btn"  text="Say ''Hello World''"  layoutX="125"  layoutY="116"  />

    ```

    '
- fmt: "# 排版后的内容\n\n注意，配置标签的**参数**（相当于对象的属性，或创建对象的类中的变量）再次**嵌套**在标签内部，并使用**变量名**和**等号**运算符，以及用引号指定的**数据值**，如之前的代码所示。\n\
    \n一个包含嵌套`<children>`对象的FXML标签将使用这种不同的`<ClassName>`开始标签。在此标签之后列出的嵌套标签后面，是一个`</ClassName>`结束标签。这使得标签语法能够指定（成为）内部`<children>`标签的**容器**，如下例所示，其中开始和结束FXML标签根据其嵌套（内部）层级顺序排列：\n\
    \n```\n<StackPane id=\"root\" prefHeight=\"250\" prefWidth=\"300\" >\n    <children>\n\
    \       <Button id=\"btn\" text=\"Say 'Hello World'\" layoutX=\"125\" layoutY=\"\
    116\" />\n    </children>\n</StackPane>\n```\n\n如你所见，参数可以放在父标签的开始标签内部，位于`<ClassName`部分和大于号**之间**。这就是在需要时为父标签配置任何参数的方式，例如当你指定`StackPane`的大小和名称（在FXML中称为**id**）时。\n\
    \n## 总结\n\n在第五章中，你更深入地了解了一些在Java 8游戏开发工作流程中将要用到的更重要的游戏设计和新媒体概念，以便你拥有创建游戏所需的基础知识。你还学习了JavaFX\
    \ Scene Builder和FXML，只是为了掌握这些概念并将其解决，因为我将在这本书中全部使用Java 8代码和JavaFX类来完成所有内容，以符合我收到的来自Android书籍读者的请求（“我们如何仅使用Java代码来实现这一点？我们不想使用XML来创建应用程序！”这是我最近经常听到的口号）。\n\
    \n首先，你研究了静态与动态的关键概念，以及这对游戏设计和游戏优化的重要性，因为如果游戏优化不是贯穿游戏设计、开发和优化过程的持续考虑因素，过多的动态内容可能会使较旧的单核甚至双核CPU过载。\n\
    \n接下来，你探讨了**游戏设计**（和开发）的一些关键组件，例如**精灵**、**碰撞检测**、**物理模拟**、**背景动画**、**UI设计**、**计分引擎**和**游戏逻辑**。你了解了这些如何应用于静态游戏（即没有连续移动的游戏，如策略游戏、棋盘游戏、谜题、知识游戏、记忆游戏）以及动态游戏（即使用连续移动的游戏，如平台游戏、街机游戏、第一人称射击游戏、第三人称射击游戏、驾驶游戏等）。\n\
    \n你对新媒体资产类型以及数字图像、动画、数字视频和数字音频的概念和术语进行了高层次的技术概述。你学习了像素、分辨率以及宽高比如何定义图像、动画或视频的形状；学习了颜色深度和Alpha通道透明度，以及如何使用十六进制表示法来定义这些。然后，你研究了时间的第四维度，学习了帧、帧率和比特率，并了解了数字音频、采样频率和采样分辨率。最后，你学习了JavaFX\
    \ Scene Graph和FXML，以及它们如何工作以及如何在当前游戏中使用。\n\n在下一章中，你将研究**JavaFX** Scene Graph，并为你的Java\
    \ 8游戏应用程序创建**基础设施**，包括启动画面（你的游戏主屏幕和主要UI）。\n\n# 第六章\n\n![image](OEBPS/Images/frontdot.jpg)\n\
    \n## 游戏设计的基础：JavaFX Scene Graph和InvinciBagel游戏基础设施\n\n在本章中，你将开始设计`InvinciBagel`游戏的基础设施，既从**用户界面**（UI）和**用户体验**的角度，也从“幕后”的**游戏引擎**、**精灵引擎**、**碰撞引擎**和**物理引擎**的角度。你将牢记优化，因为你在本书剩余部分的工作中必须这样做，以免得到一个过于庞大或复杂的**场景图**，导致**脉冲**系统无法高效更新所有内容。这意味着将主要的游戏UI屏幕（`Scene`或`SubScene`节点）保持在最少（三到四个）；确保3D和媒体引擎（数字音频和数字视频）使用自己的线程；并检查驱动游戏的功能性“引擎”是否都使用它们自己的类以及正确的Java\
    \ 8编程约定、结构、变量、常量和修饰符进行逻辑编码（参见[第3章](#9781484204160_Ch03.xhtml)）。\n\n首先，你将学习你的游戏将提供给用户的**顶层**、**面向用户**的UI屏幕设计，包括用户在启动应用程序时看到的`InvinciBagel`“品牌”启动画面。此屏幕将包含`Button`控件，用于访问其他信息屏幕，你希望将这些屏幕的数量最小化，因为它们将是`Scene`节点（主要游戏屏幕）或`ImageView`节点（其他信息屏幕）。这些游戏支持屏幕将包含用户有效玩游戏所需的内容，例如游戏说明和最高分屏幕。你还将包含一个法律免责声明屏幕（让你的法务部门满意），其中还将包含参与创建游戏引擎和游戏资产的程序员和新媒体艺术家的致谢。\n\
