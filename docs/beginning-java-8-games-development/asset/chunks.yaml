- fmt: "您可以通过设置`rate`属性来调整动画的**播放速度**（也称为帧率或每秒帧数[FPS]）。`cycleCount`属性（变量）允许您指定动画的**循环**次数，而`delay`属性则用于设置动画开始前的延迟时间。如果动画是循环播放的，此延迟属性将指定循环之间的延迟时间，这有助于您创建一些逼真的效果。\n\
    \n您可以通过将`cycleCount`属性或变量设置为`INDEFINITE`，并将`autoReverse`属性设置为`false`，来指定一个**无缝**的动画**循环**；或者，您可以通过将`autoReverse`属性设置为`true`，来实现**乒乓**（来回）动画循环。如果您不希望动画无限循环，也可以将`cycleCount`设置为一个**数值**（如果希望动画只播放一次，则使用`1`）。\n\
    \n`setRate()`方法用于设置动画播放速率属性，`setDelay()`方法用于设置延迟属性，而`setCycleCount()`和`setCycleDuration()`方法则控制循环特性。此外，还有类似的`get()`方法，用于“获取”这些`Animation`对象变量（属性、特性、参数或特征；您如何看待这些数据字段都可以）的当前设定值。\n\
    \n您可以使用加载了`ActionEvent`对象的`onFinished`属性，来指定动画播放完成时要执行的操作。当动画到达每个循环的末尾时，该操作将被执行，并且可以想象，利用这一特定能力，可以在游戏中触发一些非常强大的功能。\n\
    \n还有一些**只读**变量（属性），您可以随时“轮询”它们，以获取每个`Animation`对象的`status`、`currentTime`、`currentRate`、`cycleDuration`和`totalDuration`。例如，您可以使用`currentTime`属性来查看动画播放周期中任意时间点的播放头（帧指针）位置。\n\
    \n## JavaFX `Timeline` 类：用于属性时间线管理的动画子类\n\nJavaFX `Timeline` 类是 JavaFX `Animation`\
    \ 超类的一个子类，因此其继承层次结构从 Java 8 主类 `java.lang.Object` 开始，向下延伸到 `Timeline` 类，如下所示：\n\
    \n```\n> java.lang.Object\n  > javafx.animation.Animation\n    > javafx.animation.Timeline\n\
    ```\n\n`Timeline` 对象可用于定义一种特殊的 `Animation` 对象，该对象由 `WritableValue` 对象类型的 JavaFX\
    \ 值（属性）组成。由于所有 JavaFX 属性都属于该类型，因此此类可用于为 JavaFX 中的任何内容制作动画，这意味着其用途仅受限于您的想象力。\n\n\
    如前所述，`Timeline` 动画是使用 `KeyFrame` 对象定义的，这些对象通过 `KeyFrame` 类创建和管理。`KeyFrame` 对象由\
    \ `Timeline` 对象根据 `time` 变量（通过 `KeyFrame.time` 访问）和要动画化的属性（通过 `KeyFrame` 对象的 `values`\
    \ 变量（通过 `KeyFrame.values` 访问）定义）进行处理。\n\n需要注意的是，您需要在启动 `Timeline` 对象之前设置好 `KeyFrame`\
    \ 对象，因为您无法在正在运行的 `Timeline` 对象中更改 `KeyFrame` 对象。这是因为一旦启动，它就会被放入系统内存中。如果您想以任何方式更改正在运行的\
    \ `Timeline` 对象中的 `KeyFrame` 对象，请先停止 `Timeline` 对象；然后对 `KeyFrame` 进行更改；最后，重新启动\
    \ `Timeline` 对象。这将使用新的值将 `Timeline` 对象及其修改后的 `KeyFrame` 对象重新加载到内存中。\n\n`Interpolator`\
    \ 类根据时间线的 `direction` 对 `Timeline` 对象中的这些 `KeyFrame.values` 进行插值。插值是一个基于起始值和结束值创建中间帧（或补间帧）的过程。如果您想知道\
    \ `direction` 是如何推断的，它保存在 `Animation` 超类（它是扩展后的 `Timeline` 子类的一部分）的 `rate` 和只读的\
    \ `currentRate` 属性中。\n\n反转 `rate` 属性的值（即使其为**负值**）将反转（切换）播放方向；读取 `currentRate`\
    \ 属性时也遵循同样的原则（负值表示反向或倒退方向）。最后，`KeyValue` 类（对象）用于保存 `KeyFrame` 对象内部的值。\n\n## JavaFX\
    \ `Transition` 类：用于过渡效果应用的动画子类\n\nJavaFX `Transition` 类是 JavaFX `Animation` 超类的一个子类，因此其继承层次结构从\
    \ Java 8 主类 `java.lang.Object` 开始，向下延伸到 `Transition` 类，如下所示：\n\n```\n> java.lang.Object\n\
    \  > javafx.animation.Animation\n    > javafx.animation.Transition\n```\n\n`Transition`\
    \ 类是一个**公共抽象**类，因此它只能被用于（子类化或扩展）创建过渡子类。事实上，已经为您创建了十个这样的子类，供您用来创建自己的过渡特效；它们是 `SequentialTransition`、`FadeTransition`、`FillTransition`、`PathTransition`、`PauseTransition`、`RotateTransition`、`ScaleTransition`、`TranslateTransition`、`ParallelTransition`\
    \ 和 `StrokeTransition` 类。作为 `Animation` 的子类，`Transition` 类包含了 `Animation` 的所有功能。\n\
    \n您很可能会直接使用这十个自定义过渡类，因为它们提供了您可能想要使用的不同类型的过渡（淡入淡出、填充、基于路径、基于描边、旋转、缩放、移动等）。接下来我将继续介绍\
    \ `AnimationTimer` 类，因为我们将在本书中为游戏引擎使用这个类。\n\n## JavaFX `AnimationTimer` 类：帧处理、纳秒和脉冲\n\
    \nJavaFX `AnimationTimer` 类**不是** JavaFX `Animation` 超类的子类，因此其继承层次结构从 Java 8 主类\
