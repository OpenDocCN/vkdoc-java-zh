    ActionEvent 和 KeyEvent 处理，并且整个过程都乐在其中！我认为这是相当成功的一章，我们将在每一章中继续享受乐趣！


    总结


    在第十一章中，我们重新组织了主要的 `InvinciBagel.java` 类，提取了五个关键的 Java 游戏创建语句，然后将剩余的 Java 代码组织成八个逻辑方法（例程），其中六个是在本章中从头创建的。这六个新方法用于细分任务，例如添加图像资源、创建新的
    Actor 对象、将 Actor 添加到场景图、将 Actor 添加到演员表、创建和启动游戏引擎，以及实现游戏按键事件处理例程。我们添加了对象声明，以便为游戏的主要角色创建一个新的
    `iBagel` Bagel 对象，并且还创建了一个 `castDirector` CastingDirection 引擎，以便在后续章节中将演员成员添加到游戏中时进行管理。


    我们学习了 `import static` 语句，并了解了如何使用它们将 `iBagel` Bagel 对象连接到 `GamePlayLoop.java`
    引擎的 `.handle()` 方法。我们还使用这些 `import static` 语句，让 `Bagel.java` 类能够在 `.update()`
    方法中处理布尔类型的 `up`、`down`、`left` 和 `right` 变量。


    接下来，我们介绍了如何使用条件 `if` 语句来确定游戏玩家正在使用哪些按键事件（保存在四个布尔变量中）。我们将此逻辑放在 `Bagel` 类的 `.update()`
    方法中，正如我们所知，该方法正由 `GamePlayLoop` 的 `.handle()` JavaFX 脉冲引擎以每秒 60 次的速度快速执行。


    最后，我们测试了本章中添加的所有新方法和 Java 语句，以验证基本的游戏精灵移动是否有效。我们观察了一些需要在未来章节中解决的问题，并全面测试了现有的 KeyEvent
    处理方法以及我们为所有游戏角色资源创建的抽象 Actor 类的 `iX`、`iY`、`vX` 和 `vY` 属性。


    在下一章中，我们将更深入地研究 JavaFX Node 类，并探讨关于在屏幕上移动游戏**精灵**的高级概念，以及如何确定屏幕边界（边缘）、角色方向、移动速度，以及相关的动画和移动注意事项。


