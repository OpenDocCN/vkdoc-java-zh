- fmt: "# 精灵注册与Actor抽象类\n\n尽管我们在精灵Actor引擎抽象类中提供了`offset`和`pivot point`功能，但这并不意味着我们不应该确保运动精灵图像状态之间良好**同步**。这样我们就不必经常使用这些枢轴或偏移功能来获得良好的视觉效果。这就是我所说的**精灵注册**，它涉及将不同精灵状态相对于彼此进行最佳**定位**。\n\
    \n在[图8-3](#9781484204160_Ch08.xhtml#Fig3)中可以看到一些将相互配合使用的精灵帧之间的精灵注册示例。例如，开始跑步的`imageStates[1]`精灵应该以与站立（或等待）的`imageStates[0]`精灵相同的脚部位置开始其跑步循环，如[图8-3](#9781484204160_Ch08.xhtml#Fig3)左侧所示。此外，跑步中的`imageStates[2]`精灵应尽可能保持其身体部分静止，相对于开始跑步的`imageStates[1]`精灵。准备着陆的`imageStates[6]`精灵应相对于已着陆的`imageStates[7]`精灵以逼真的方式改变脚部位置。\n\
    \n![9781484204160_Fig08-03.jpg](OEBPS/Images/9781484204160_Fig08-03.jpg)\n\n[图8-3](#9781484204160_Ch08.xhtml#_Fig3).\
    \ 精灵注册（对齐）以确保过渡动画平滑\n\n要优化精灵注册（相对于所有其他精灵），你需要将所有数字图像精灵放入相同正方形1:1宽高比的图像格式中，并将它们全部放置在数字图像合成软件包（如GIMP或Photoshop）的**图层**中。然后使用**移动工具**和**微调**（使用键盘上的箭头键进行单像素移动）将每个精灵定位到相对于你已打开可见性（使用每个图层左侧的眼睛图标切换开/关）的任意两个图层的位置。结果如[图8-3](#9781484204160_Ch08.xhtml#Fig3)所示。\n\
    \n## 创建Actor超类：固定Actor属性\n\n让我们开始编写我们的公共抽象`Actor`类，它将是本书中为游戏创建的所有精灵的基础。我不会重复如何在NetBeans中创建新类（参见[图7-2](#9781484204160_Ch07.xhtml#Fig2)），因为你已经在[第7章](#9781484204160_Ch07.xhtml)中学过了。因此，创建一个`Actor.java`类，使用`public\
    \ abstract class Actor`声明它，并在类顶部放置前五行代码，声明一个名为`imageStates`的`List<Image>`，创建一个`new\
    \ ArrayList<>`对象，以及一个名为`spriteFrame`的`ImageView`，一个名为`spriteBound`的`SVGPath`，以及两个double变量`iX`和`iY`。将所有这些东西设为`protected`，以便任何子类都可以访问它们，如[图8-4](#9781484204160_Ch08.xhtml#Fig4)所示。你需要使用`Alt-Enter`工作流程来处理与`import`语句相关的红色错误下划线，这些导入语句是你需要的`List`类（对象）、`ArrayList`类（对象）、`Image`类（对象）、`ImageView`类（对象）和`SVGPath`类（对象）。一旦NetBeans为你编写了这些，声明`List<Image>`、`ArrayList`、`spriteFrame`、`ImageView`、`SVGPath`碰撞形状对象以及包含精灵X和Y位置的double变量的十几行代码应该如下所示：\n\
    \n```java\npackage invincibagel;\nimport java.util.ArrayList;\nimport java.util.List;\n\
    import javafx.scene.image.Image;\nimport javafx.scene.image.ImageView;\nimport\
    \ javafx.scene.shape.SVGPath;\npublic abstract class Actor {\n    protected List<Image>\
    \ imageStates = new ArrayList<>();\n    protected ImageView spriteFrame;\n   \
    \ protected SVGPath spriteBound;\n    protected double iX;\n    protected double\
    \ iY;\n}\n```\n\n![9781484204160_Fig08-04.jpg](OEBPS/Images/9781484204160_Fig08-04.jpg)\n\
    \n[图8-4](#9781484204160_Ch08.xhtml#_Fig4). 在NetBeans中创建一个新类，将其命名为`public abstract\
    \ class Actor`，并添加主要的Actor变量\n\n这五个变量或属性保存了任何精灵的“核心”属性：`spriteFrame`、`ImageView`以及它持有的`List<Image>`、`ArrayList`图像资源（一个到多个可见状态）（这定义了精灵的外观）、`spriteBound`碰撞形状区域（定义了被认为与精灵相交的内容），以及精灵在显示屏上的X、Y位置。\n\
    \n这些也是将使用`Actor()`构造函数方法以及稍后的`Hero()`构造函数方法进行配置的五个变量。首先我们将创建`Actor()`构造函数；之后，我们将添加所有其他我们需要每个`Actor`子类包含的变量。\n\
    \n在我们创建了`Actor`类的所有其他变量（这些变量不是通过`Actor()`构造函数方法设置的）之后，我们将在构造函数方法中将它们初始化为默认值，最后我们将让NetBeans使用一个你一定会喜欢的自动编码功能为我们的变量创建`.get()`和`.set()`方法。\n\
    \n我们将编码传入此`Actor()`构造函数的参数将包括名为`SVGdata`的`String`对象，它将包含定义`SVGPath`碰撞形状的文本字符串，以及精灵的X、Y位置，以及一个逗号分隔的`Image`对象列表。`SVGPath`类有一个`.setContent()`方法，可以读取或“解析”原始SVG数据字符串，因此我们将使用它将`String`、`SVGdata`变量转换为我们的`SVGPath`碰撞形状对象。\n\
    \n我们不会在本章或下一章实现碰撞代码或`SVGPath`形状对象，但我们需要将它们放在适当位置，以便我们可以在后面的[第16章](#9781484204160_Ch16.xhtml)中使用它们，该章将介绍碰撞检测处理以及如何使用GIMP和PhysEd（PhysicsEditor）软件包创建碰撞多边形数据。\n\
    \n我们将创建的`Actor`构造函数方法将遵循以下构造函数方法格式：\n\n```java\npublic Actor(String SVGdata, double\
    \ xLocation, double yLocation, Image... spriteCels)\n```\n\n稍后，如果我们需要创建更复杂的`Actor()`构造函数方法，我们可以通过添加其他更高级的参数来“重载”此方法，例如枢轴点`pX`和`pY`，或者`isFlipH`或`isFlipV`布尔值，以允许我们水平或垂直镜像固定的精灵图像。你的Java代码将如下所示：\n\
    \n```java\npublic Actor(String SVGdata, double xLocation, double yLocation, Image...\
    \ spriteCels) {\n    spriteBound = new SVGPath();\n    spriteBound.setContent(SVGdata);\n\
    \    spriteFrame = new ImageView(spriteCels[0]);\n    imageStates.addAll(Arrays.asList(spriteCels));\n\
    \    iX = xLocation;\n    iY = yLocation;\n}\n```\n\n请注意，使用Java `new`关键字调用的`ImageView`构造函数，通过使用`spriteCels[0]`注解，传递你使用逗号分隔列表传入的`List<Image>`、`ArrayList`数据的**第一帧**（`Image`）。如果你要创建一个允许设置枢轴点数据的**重载方法**，它可能如下所示：\n\
    \n```java\npublic Actor(String SVG, double xLoc, double yLoc, double xPivot, double\
    \ yPivot, Image... Cels){\n    spriteBound = new SVGPath();\n    spriteBound.setContent(SVG);\n\
    \    spriteFrame = new ImageView(Cels[0]);\n    imageStates.addAll(Arrays.asList(Cels));\n\
    \    iX = xLoc;\n    iY = yLoc;\n    pX = xPivot;\n    pY = yPivot;\n}\n```\n\n\
    如[图8-5](#9781484204160_Ch08.xhtml#Fig5)所示，你需要使用`Alt-Enter`工作流程，并让NetBeans为你编写`Arrays`类的导入语句。一旦你这样做，你的代码将没有错误。\n\
    \n![9781484204160_Fig08-05.jpg](OEBPS/Images/9781484204160_Fig08-05.jpg)"
  raw: 'Even though we are providing **offset** and **pivot point** capabilities in
    our sprite Actor Engine abstract classes, that doesn’t mean that we should not
    make sure that our motion sprite image states are well **synchronized** with each
    other. This is so that we do not routinely have to use these pivot or offset capabilities
    to get good visual results. This is what I term **sprite registration**, and involves
    **positioning** the different sprite states optimally relative to each other.


    Some examples of sprite registration between sprite frames that will be used with
    each other can be seen in [Figure 8-3](#9781484204160_Ch08.xhtml#Fig3). For instance,
    the starting to run imageStates[1] sprite should start its run cycle with the
    same foot position as a standing (or waiting) imageStates[0] sprite, as seen on
    the left side of [Figure 8-3](#9781484204160_Ch08.xhtml#Fig3). Also, the running
    imageStates[2] sprite should keep its body portion as still as possible, relative
    to the imageStates[1] starting to run sprite. A preparing to land imageStates[6]
    sprite should change foot positioning realistically relative to the landed imageStates[7]
    sprite.


    ![9781484204160_Fig08-03.jpg](OEBPS/Images/9781484204160_Fig08-03.jpg)


    [Figure 8-3](#9781484204160_Ch08.xhtml#_Fig3). Sprite registration (alignment)
    to make sure the transition motion is smooth


    What you want to do to optimize sprite registration, relative to all of the other
    sprites, is to put all of your digital image sprites into the same square 1:1
    aspect ratio resolution image format, and place them all in **layers** in a digital
    image compositing software package, such as GIMP or Photoshop. Then use the **move
    tool** and **nudge** (single pixel movements using arrow keys on keyboard) each
    sprite into position, relative to whichever two layers you have visibility (toggled
    on/off using the eye icon on the left of each layer) turned on for. The result
    is shown in [Figure 8-3](#9781484204160_Ch08.xhtml#Fig3).


    Creating an Actor Superclass: Fixed Actor Attributes


    Let’s get down to scratch coding our public abstract Actor class that will be
    the foundation for all sprites we will be creating for the game during this book.
    I won’t revisit how to create a new class in NetBeans (see [Figure 7-2](#9781484204160_Ch07.xhtml#Fig2))
    as you’ve already learned that in [Chapter 7](#9781484204160_Ch07.xhtml), so create
    an **Actor.java** class, and declare it using **public abstract class Actor**
    and place the first five lines of code at the top of the class, declaring a List<Image>
    named **imageStates**, and creating a **new ArrayList<>** object, as well as an
    ImageView named **spriteFrame**, an SVGPath named **spriteBound**, and double
    variables **iX** and **iY**. Make all of these **protected**, so that any subclasses
    can access them, as is shown in [Figure 8-4](#9781484204160_Ch08.xhtml#Fig4).
    You’ll need to use the **Alt-Enter** work process for the red error underlining
    relating to the **import** statements you will need for the List class (object),
    ArrayList class (object), Image class (object), ImageView class (object), and
    SVGPath class (object). Once NetBeans writes these for you, the dozen or so lines
    of code declaring the List<Image> ArrayList, spriteFrame ImageView, SVGPath collision
    Shape object and double variables containing the sprite’s X and Y location should
    look like the following Java class structure:


    ```

    package invincibagel;

    import java.util.ArrayList;

    import java.util.List;

    import javafx.scene.image.Image;

    import javafx.scene.image.ImageView;

    import javafx.scene.shape.SVGPath;

    public abstract class Actor {

        protected List<Image> imageStates = new ArrayList<>();

        protected ImageView spriteFrame;

        protected SVGPath spriteBound;

        protected double iX;

        protected double iY;

    }

    ```


    ![9781484204160_Fig08-04.jpg](OEBPS/Images/9781484204160_Fig08-04.jpg)


    [Figure 8-4](#9781484204160_Ch08.xhtml#_Fig4). Create a New Class in NetBeans,
    name it public abstract class Actor, and add in the primary Actor variables


    These five variables or attributes hold the “core” properties for any sprite;
    the spriteFrame ImageView and the List<Image> ArrayList of Image assets (one to
    many visible states) that it holds (this defines what the sprite looks like),
    the spriteBound collision Shape area (defines what is deemed to have intersected
    with the sprite), and the X, Y location of the sprite on the display screen.


    These are also the five variables that will be configured using your Actor() constructor
    method, as well as your Hero() constructor method later on. First we will create
    the Actor() constructor; after that, we will add in all the other variables that
    we will need every Actor subclass to include.


    After we create all of the other variables for the Actor class, which are not
    set using the Actor() constructor method, we will initialize these to hold their
    default values inside of the constructor method, and finally we will have NetBeans
    create **.get()** and **.set()** methods for our variables using an automatic
    coding function which you’ll really like.


    The parameters that we will code to pass into this Actor() constructor will include
    the **String** object named **SVGdata,** which will contain a string of text defining
    the SVGPath collision shape, as well as the sprite X, Y location, and a comma
    delimited List of Image objects. The SVGPath class has a .setContent() method
    that can read or “parse” raw SVG data strings, and so we will use this to turn
    the String SVGdata variable into our SVGPath collision Shape object.


    We will not be implementing the collision code, or SVGPath Shape object during
    this chapter, or the next for that matter, but we need to put them in place, so
    we can use them later during [Chapter 16](#9781484204160_Ch16.xhtml) on collision
    detection processing and how to create collision polygon data using the GIMP and
    PhysEd (PhysicsEditor) software packages.


    The Actor constructor method that we will be creating will follow the following
    constructor method format:


    ```

    public Actor(String SVGdata, double xLocation, double yLocation, Image... spriteCels)

    ```


    Later on if we need to create more complex Actor() constructor methods, we can
    “overload” this method by adding other more advanced parameters, such as pivot
    point pX and pY, for instance, or the isFlipH or isFlipV boolean values, to allow
    us to mirror fixed sprite imagery horizontally or vertically. Your Java code will
    look like the following:


    ```

    public Actor(String SVGdata, double xLocation, double yLocation, Image... spriteCels)
    {

        spriteBound = new SVGPath();

        spriteBound.setContent(SVGdata);

        spriteFrame = new ImageView(spriteCels[0]);

        imageStates.addAll(Arrays.asList(spriteCels));

        iX = xLocation;

        iY = yLocation;

    }

    ```


    Notice that the ImageView constructor, invoked using the Java **new** keyword,
    passes the **first frame** (Image) of the List<Image> ArrayList data you are passing
    in using a comma delimited list by using a **spriteCels[0]** annotation. If you
    were to create an **overloaded method** that allowed you to set up the pivot point
    data, it might look like this:


    ```

    public Actor(String SVG, double xLoc, double yLoc, double xPivot, double yPivot,
    Image... Cels){

        spriteBound = new SVGPath();

        spriteBound.setContent(SVG);

        spriteFrame = new ImageView(Cels[0]);

        imageStates.addAll(Arrays.asList(Cels));

        iX = xLoc;

        iY = yLoc;

        pX = xPivot;

        pY = yPivot;

    }

    ```


    As you can see in [Figure 8-5](#9781484204160_Ch08.xhtml#Fig5), you will need
    to use the **Alt-Enter** work process, and have NetBeans code your import statements
    for the **Arrays** class for you. Once you do this, your code will be error free.


    ![9781484204160_Fig08-05.jpg](OEBPS/Images/9781484204160_Fig08-05.jpg)'
  trans: '

    尽管我们在精灵角色引擎抽象类中提供了**偏移量**和**枢轴点**功能，但这并不意味着我们不应确保运动精灵图像状态之间良好**同步**。这样我们就不必经常使用这些枢轴或偏移功能来获得良好的视觉效果。这就是我所说的**精灵注册**，它涉及将不同精灵状态相对于彼此进行最佳**定位**。


    在图 8-3 中可以看到一些将相互配合使用的精灵帧之间的精灵注册示例。例如，开始奔跑的 imageStates[1] 精灵应以其起始奔跑循环的脚部位置与站立（或等待）的
    imageStates[0] 精灵相同，如图 8-3 左侧所示。此外，奔跑中的 imageStates[2] 精灵应尽可能保持其身体部分相对于开始奔跑的 imageStates[1]
    精灵静止不动。准备着陆的 imageStates[6] 精灵应相对于已着陆的 imageStates[7] 精灵以逼真的方式改变脚部位置。


    ![9781484204160_Fig08-03.jpg](img/9781484204160_Fig08-03.jpg)


    图 8-3. 精灵注册（对齐）以确保过渡动作流畅


    为了优化所有精灵之间的注册，你需要将所有数字图像精灵放入相同正方形 1:1 宽高比分辨率的图像格式中，并将它们全部放置在数字图像合成软件包（如 GIMP 或
    Photoshop）的**图层**中。然后使用**移动工具**和**微调**（使用键盘上的箭头键进行单像素移动）将每个精灵定位到相对于你已打开可见性（使用每个图层左侧的眼睛图标切换开/关）的任意两个图层的位置。结果如图
    8-3 所示。


    创建角色超类：固定角色属性


    让我们开始从头编写我们的公共抽象 Actor 类，它将作为本书中我们将为游戏创建的所有精灵的基础。我不会重复如何在 NetBeans 中创建新类（参见图 7-2），因为你已经在第
    7 章中学过了，所以创建一个 **Actor.java** 类，并使用 **public abstract class Actor** 声明它，然后在类顶部放置前五行代码，声明一个名为
    **imageStates** 的 List<Image>，并创建一个 **new ArrayList<>** 对象，以及一个名为 **spriteFrame**
    的 ImageView，一个名为 **spriteBound** 的 SVGPath，以及双精度变量 **iX** 和 **iY**。将所有内容设为 **protected**，以便任何子类都可以访问它们，如图
    8-4 所示。你需要使用 **Alt-Enter** 工作流程来处理与 List 类（对象）、ArrayList 类（对象）、Image 类（对象）、ImageView
    类（对象）和 SVGPath 类（对象）所需的 **import** 语句相关的红色错误下划线。一旦 NetBeans 为你编写了这些，声明 List<Image>
    ArrayList、spriteFrame ImageView、SVGPath 碰撞形状对象以及包含精灵 X 和 Y 位置的双精度变量的十几行代码应该如下所示：


    ```

    package invincibagel;

    import java.util.ArrayList;

    import java.util.List;

    import javafx.scene.image.Image;

    import javafx.scene.image.ImageView;

    import javafx.scene.shape.SVGPath;

    public abstract class Actor {

        protected List<Image> imageStates = new ArrayList<>();

        protected ImageView spriteFrame;

        protected SVGPath spriteBound;

        protected double iX;

        protected double iY;

    }

    ```


    ![9781484204160_Fig08-04.jpg](img/9781484204160_Fig08-04.jpg)


    图 8-4. 在 NetBeans 中创建一个新类，将其命名为 public abstract class Actor，并添加主要 Actor 变量


    这五个变量或属性保存了任何精灵的“核心”属性：spriteFrame ImageView 及其持有的 List<Image> ArrayList 图像资源（一个到多个可见状态）（这定义了精灵的外观）、spriteBound
    碰撞形状区域（定义了被认为与精灵相交的内容），以及精灵在显示屏幕上的 X、Y 位置。


    这些也是将使用你的 Actor() 构造函数方法以及稍后的 Hero() 构造函数方法进行配置的五个变量。首先我们将创建 Actor() 构造函数；之后，我们将添加我们需要每个
    Actor 子类包含的所有其他变量。


    在我们为 Actor 类创建所有其他变量（这些变量不是使用 Actor() 构造函数方法设置的）之后，我们将在构造函数方法中将它们初始化为默认值，最后我们将让
    NetBeans 使用一个你一定会喜欢的自动编码功能为我们的变量创建 **.get()** 和 **.set()** 方法。


    我们将编码传入此 Actor() 构造函数的参数将包括名为 **SVGdata** 的 **String** 对象，它将包含定义 SVGPath 碰撞形状的文本字符串，以及精灵的
    X、Y 位置，以及一个逗号分隔的 Image 对象列表。SVGPath 类有一个 .setContent() 方法，可以读取或“解析”原始 SVG 数据字符串，因此我们将使用它将
    String SVGdata 变量转换为我们的 SVGPath 碰撞形状对象。


    我们不会在本章或下一章实现碰撞代码或 SVGPath 形状对象，但我们需要将它们放在适当位置，以便我们可以在后面的第 16 章关于碰撞检测处理以及如何使用
    GIMP 和 PhysEd（PhysicsEditor）软件包创建碰撞多边形数据时使用它们。


    我们将创建的 Actor 构造函数方法将遵循以下构造函数方法格式：


    ```

    public Actor(String SVGdata, double xLocation, double yLocation, Image... spriteCels)

    ```


    稍后，如果我们需要创建更复杂的 Actor() 构造函数方法，我们可以通过添加其他更高级的参数来“重载”此方法，例如枢轴点 pX 和 pY，或者 isFlipH
    或 isFlipV 布尔值，以允许我们水平或垂直镜像固定的精灵图像。你的 Java 代码将如下所示：


    ```

    public Actor(String SVGdata, double xLocation, double yLocation, Image... spriteCels)
    {

        spriteBound = new SVGPath();

        spriteBound.setContent(SVGdata);

        spriteFrame = new ImageView(spriteCels[0]);

        imageStates.addAll(Arrays.asList(spriteCels));

        iX = xLocation;

        iY = yLocation;

    }

    ```


    请注意，使用 Java **new** 关键字调用的 ImageView 构造函数，通过使用 **spriteCels[0]** 注解，传递了你使用逗号分隔列表传入的
    List<Image> ArrayList 数据的**第一帧**（Image）。如果你要创建一个允许设置枢轴点数据的**重载方法**，它可能如下所示：


    ```

    public Actor(String SVG, double xLoc, double yLoc, double xPivot, double yPivot,
    Image... Cels){

        spriteBound = new SVGPath();

        spriteBound.setContent(SVG);

        spriteFrame = new ImageView(Cels[0]);

        imageStates.addAll(Arrays.asList(Cels));

        iX = xLoc;

        iY = yLoc;

        pX = xPivot;

        pY = yPivot;

    }

    ```


    如图 8-5 所示，你需要使用 **Alt-Enter** 工作流程，并让 NetBeans 为你编写 **Arrays** 类的 import 语句。一旦你这样做，你的代码将没有错误。


    ![9781484204160_Fig08-05.jpg](img/9781484204160_Fig08-05.jpg)

