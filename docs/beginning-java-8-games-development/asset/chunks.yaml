- fmt: '# 编写 `createSplashScreenNodes()` 方法


    我认为目前已经提供了足够的类背景信息，因此让我们开始编写第一个 `.createSplashScreenNodes()` 方法的代码，该方法将实例化并设置场景图（Scene
    Graph）中的所有 `Node` 对象！


    ## 场景图节点：`.createSplashScreenNodes()`


    在 `createSplashScreenNodes()` 方法中，首先要做的是编写空方法结构，并添加已在[第2章](#9781484204160_Ch02.xhtml)中由
    NetBeans 生成的引导代码中存在的 `Node` 对象创建代码。这包括 `Button` 节点、`StackPane` 根节点和名为 `scene`
    的 `Scene` 对象的 `Node` 对象。你将把 `primaryStage` 代码保留在 `.start()` 方法中，因为该对象是通过 `.start(Stage
    primaryStage)` 构造方法调用创建的。`Button` 对象已重命名为 `gameButton`（原为 `btn`），因此你有三行对象实例化代码和一行配置代码，如下所示：


    ```

    root = new StackPane();

    scene = new Scene(root, 640, 400);

    gameButton = new Button();

    gameButton.setText("PLAY GAME");

    ```


    需要注意的是，由于 `root` `StackPane` 对象在 `scene` `Scene` 对象的构造方法调用中被使用，因此这行代码需要放在前面（你的
    `root` 对象必须在使用之前创建！）。接下来需要创建的是 `HBox` 布局容器对象，它将容纳你的四个 `Button` UI 控件。你还需要为 `HBox`
    设置对齐属性；添加一个 `Insets` 对象来包含内边距值；然后将此内边距添加到 `HBox` 对象，使用以下四行 Java 代码：


    ```

    buttonContainer = new HBox(12);

    buttonContainer.setAlignment(Pos.BOTTOM_LEFT);

    buttonContainerPadding = new Insets(0, 0, 10, 16);

    buttonContainer.setpadding(buttonContainerPadding);

    ```


    接下来，让我们采用一个便捷的程序员快捷方式，将两行 `gameButton`（实例化和配置）代码复制并粘贴到 `HBox` 代码下方（因为按钮位于 `HBox`
    内部，这只是为了视觉组织，而不是为了让代码工作），然后将其再复制并粘贴三次，分别放在单独的行上。这将允许你分别将 `game` 更改为 `help`、`score`
    和 `legal`，从而创建以下四个按钮的 Java 代码：


    ```

    gameButton = new Button();

    gameButton.setText("PLAY GAME");

    helpButton = new Button();

    helpButton.setText("INSTRUCTIONS");

    scoreButton = new Button();

    scoreButton.setText("HIGH SCORES");

    legalButton = new Button();

    legalButton.setText("LEGAL & CREDITS");

    ```


    现在你已经创建了 `HBox` 按钮 UI 控件布局容器和按钮，你还需要再编写一行代码，使用 `.getChildren().addAll()` 方法链将
    `Button` 对象填充到 `HBox` 中，如下所示：


    ```

    buttonContainer.getChildren().addAll(gameButton, helpButton, scoreButton, legalButton);

    ```


    接下来，让我们添加图像合成 `Node` 对象（`Image` 和 `ImageView`），以便为 InvinciBagel 启动画面添加艺术作品，以及用于装饰说明、法律声明和制作人员名单的面板叠加层，以及游戏高分表的背景和屏幕标题（最终）。我使用两个
    `ImageView` 对象来包含这两个图层；首先使用以下 Java 代码设置最底层的背板图像图层，实例化 `Image` 对象，然后实例化 `ImageView`
    对象并将它们连接起来：


    ```

    splashScreen = new Image("/invincibagelsplash.png", 640, 400, true, false, true);

    splashScreenBackplate = new ImageView();

    splashScreenBackplate.setImage(splashScreen);   // 此 Java 语句连接两个对象

    ```


    最后，让我们对图像合成面板执行相同的操作，即 `ImageView` 将包含包含 alpha 通道（透明度）值的不同 `Image` 对象，这些值将为 InvinciBagel
    启动画面艺术作品（由才华横溢的 2D 艺术家 Patrick Harrington 创建）创建面板图像的叠加层：


    ```

    instructionLayer = new Image("/invincibagelinstruct.png", 640, 400, true, false,
    true);

    splashScreenTextArea = new ImageView();

    splashScreenTextArea.setImage(instructionLayer); // 此 Java 语句连接两个对象

    ```


    如[图6-7](#9781484204160_Ch06.xhtml#Fig7)所示，你的场景图节点创建（位于 `InvinciBagel` 类顶部）和 `Node`
    对象实例化与配置（位于 `createSplashScreenNodes()` 方法中）已就位且无错误。你仍然需要为其他两个屏幕添加 `Image` 对象，但这里有足够的代码来将这些
    `Node` 对象添加到场景图中，使用 `addNodesToStackPane()` 方法，然后测试代码以确保其正常工作。根据 NetBeans IDE，此代码无错误！


    ![9781484204160_Fig06-07.jpg](OEBPS/Images/9781484204160_Fig06-07.jpg)


    [图6-7](#9781484204160_Ch06.xhtml#_Fig7). 编写 `createSplashScreenNodes()` 方法；实例化并配置场景图中的节点


    接下来，让我们在 `addNodesToStackPane()` 方法中将 `Node` 对象添加到 `StackPane` 场景图根对象中。


    ## 将节点添加到场景图：`.addStackPaneNodes()`


    最后，你必须创建一个方法，将已创建的 `Node` 对象添加到场景图根节点，在本例中是一个 `StackPane` 对象。你将使用 `.getChildren().add()`
    方法链将子 `Node` 对象添加到父 `StackPane` 根场景图节点。这通过三行简单的 Java 代码完成，如下所示：


    ```

    root.getChildren().add(splashScreenBackplate);

    root.getChildren().add(splashScreenTextArea);

    root.getChildren().add(buttonContainer);

    ```


    如[图6-8](#9781484204160_Ch06.xhtml#Fig8)所示，Java 代码无错误，并且 `root` 对象在类顶部有其声明。在代码中单击
    `root` 对象会创建此高亮显示，从而跟踪该对象在代码中的使用情况。这是一个非常酷的 NetBeans 8.0 技巧，当你想要在代码中跟踪对象时，应该使用它。


    ![9781484204160_Fig06-08.jpg](OEBPS/Images/9781484204160_Fig06-08.jpg)


    [图6-8](#9781484204160_Ch06.xhtml#_Fig8). 编写 `addNodesToStackPane()` 方法，使用 `.getChildren()`
    方法链接到 `.add()` 方法


    这里需要注意的重要事项是 `Node` 对象添加到 `StackPane` 根场景图对象的**顺序**。这会影响图像合成的合成图层顺序，以及这些数字图像元素之上的
    UI 元素合成顺序。添加到 `StackPane` 的第一个节点将位于图层堆栈的**底部**；这必须是 `splashScreenBackplate` `ImageView`
    `Node` 对象，如图所示。


    接下来要添加的节点将是 `splashScreenTextArea` `ImageView` `Node` 对象，因为带有面板叠加层的透明图像需要直接放在
    Pat Harrington 的 InvinciBagel 启动画面 2D 艺术作品之上。之后，你可以放置 UI 设计，在本例中，可以使用 `buttonContainer`
    `HBox` `Node` 对象一次性完成，该对象包含所有 `Button` 对象。请注意，你不必将按钮添加到此 `StackPane` 根场景图对象，因为你已经使用
    `.getChildren().addAll()` 方法链将 `Button` UI 控件添加到 `HBox`（父对象）`Node` 分支对象下方的场景图层次结构中。现在，你已经准备好进行测试了！


    ## 测试 InvinciBagel 应用程序：脉冲场景图'
  raw: 'I think that is enough class background information for now, so let’s get
    into writing the code for your first **.createSplashScreenNodes()** method, which
    will instantiate and set up all the Node objects for your Scene Graph!


    Scene Graph Nodes: .createSplashScreenNodes()


    The first thing you will want to do with your createSplashScreenNodes() method
    is code the empty method structure and add the Node object creation code that
    already exists in the bootstrap code that was generated for you by NetBeans in
    [Chapter 2](#9781484204160_Ch02.xhtml). This includes the Node objects for the
    Button node, the StackPane root node, and the Scene object named scene. You will
    keep the primaryStage code in the .start() method because that object is created
    using the .start(Stage primaryStage) constructor method call. The Button object
    has already been renamed gameButton (it was btn), so you have three lines of object
    instantiation code and a line of configuration code, as follows:


    ```

    root = new StackPane();

    scene = new Scene(root, 640, 400);

    gameButton = new Button();

    gameButton.setText("PLAY GAME");

    ```


    It is important to note that because the root StackPane object is used in the
    constructor method call for the scene Scene object, this line of code needs to
    come first (your root object has to be created before it is used!). The next thing
    you need to create is the HBox layout container object that will hold your four
    Button UI controls. You will also set the alignment attribute for the HBox; add
    an Insets object to contain the padding values; and then add this padding to the4
    HBox object, using these four lines of Java code:


    ```

    buttonContainer = new HBox(12);

    buttonContainer.setAlignment(Pos.BOTTOM_LEFT);

    buttonContainerPadding = new Insets(0, 0, 10, 16);

    buttonContainer.setpadding(buttonContainerPadding);

    ```


    Next, let’s take a handy programmers’ shortcut and copy and paste the two gameButton
    (instantiation and configuration) lines of code below the HBox code (because the
    buttons are inside the HBox, this is just for visual organization, not to make
    the code work) and then copy and paste them three more times, on separate lines.
    This will allow you to change the game to help, score, and legal, respectively,
    by creating the following four button Java codes:


    ```

    gameButton = new Button();

    gameButton.setText("PLAY GAME");

    helpButton = new Button();

    helpButton.setText("INSTRUCTIONS");

    scoreButton = new Button();

    scoreButton.setText("HIGH SCORES");

    legalButton = new Button();

    legalButton.setText("LEGAL & CREDITS");

    ```


    Now that you have created the HBox Button UI control layout container and buttons,
    you still need to write one more line of code to fill the HBox with Button objects,
    using the .getChildren().addAll() method chain, like this:


    ```

    buttonContainer.getChildren().addAll(gameButton, helpButton, scoreButton, legalButton);

    ```


    Next, let’s add your image-compositing Node objects (Image and ImageView) so that
    you can add the artwork for your InvinciBagel splash screen as well as the panel
    overlays that will decorate your instructions, legal disclaimers and production
    credits and a background and screen title for your (eventual) game high scores
    table. I use two ImageView objects to contain these two layers; let’s set up the
    bottommost backplate image layer first by using the following Java code to instantiate
    the Image object and then the ImageView object and wire them together:


    ```

    splashScreen = new Image("/invincibagelsplash.png", 640, 400, true, false, true);

    splashScreenBackplate = new ImageView();

    splashScreenBackplate.setImage(splashScreen);   // this Java statement connects
    the two objects

    ```


    Finally, let’s do the same thing for the image-compositing plate, that is, the
    ImageView that will hold the different Image objects containing the alpha channel
    (transparency) values that will create an overlay of panel images for the InvinciBagel
    splash screen artwork (which was created by the talented 2D artist Patrick Harrington):


    ```

    instructionLayer = new Image("/invincibagelinstruct.png", 640, 400, true, false,
    true);

    splashScreenTextArea = new ImageView();

    splashScreenTextArea.setImage(instructionLayer); // this Java statement connects
    the two objects

    ```


    As [Figure 6-7](#9781484204160_Ch06.xhtml#Fig7) demonstrates, your Scene Graph
    node creation (seen at the top of the InvinciBagel class) and the Node object
    instantiation and configuration (seen in the createSplashScreenNodes() method)
    are in place and error free. You still need to add in the Image objects for the
    other two screens, but there is enough code here to be able to add these Node
    objects to the Scene Graph, using the **addNodesToStackPane()** method, and then
    test the code to make sure that it is working. According to the NetBeans IDE,
    this code is error free!


    ![9781484204160_Fig06-07.jpg](OEBPS/Images/9781484204160_Fig06-07.jpg)


    [Figure 6-7](#9781484204160_Ch06.xhtml#_Fig7). Coding the createSplashScreenNodes()
    method; instantiating and configuring the nodes in the Scene Graph


    Next, let’s add the Node objects to the StackPane Scene Graph root object in an
    addNodesToStackPane() method.


    Adding Nodes to the Scene Graph: .addStackPaneNodes()


    Finally, you have to create a method that will add the Node objects that you have
    created to the Scene Graph root, which, in this case, is a StackPane object. You
    will use the .getChildren().add() method chain to add the children Node objects
    to the parent StackPane root Scene Graph node. This is done via three simple lines
    of Java code, like this:


    ```

    root.getChildren().add(splashScreenBackplate);

    root.getChildren().add(splashScreenTextArea);

    root.getChildren().add(buttonContainer);

    ```


    As you can see in [Figure 6-8](#9781484204160_Ch06.xhtml#Fig8), the Java code
    is error free, and the root object sees its declaration at the top of the class.
    Clicking the root object in the code creates this highlighting, which traces the
    use of the object through the code. This is a pretty cool NetBeans 8.0 trick that
    you should use whenever you want to track an object in code.


    ![9781484204160_Fig06-08.jpg](OEBPS/Images/9781484204160_Fig06-08.jpg)


    [Figure 6-8](#9781484204160_Ch06.xhtml#_Fig8). Coding the addNodesToStackPane()
    method, using the .getChildren() method chained to the .add() method


    The important thing to note here is the **order** in which the Node objects were
    added to the StackPane root Scene Graph object. This affects the compositing layer
    order for the image compositing, as well as for the UI element compositing, on
    top of these digital image elements. The first node added to the StackPane will
    be on the **bottom** of the layer stack; this needs to be the **splashScreenBackplate**
    ImageView Node object, as you can see in the figure.


    The next node to add will be the **splashScreenTextArea** ImageView Node object,
    as the transparent images with the panel overlays need to go right on top of Pat
    Harrington’s InvinciBagel splash screen 2D artwork. After this, you can place
    the UI design, which, in this case can be done in one fell swoop, using the **buttonContainer**
    HBox Node object, which contains all the Button objects. Note that you do not
    have to add buttons to this StackPane root Scene Graph object, because you have
    already used the **.getChildren().addAll()** method chain to add your Button UI
    controls to the Scene Graph hierarchy below an HBox (Parent object) Node branch
    object. Now, you are ready to test!


    Testing the InvinciBagel Application: Pulse the Scene Graph'
