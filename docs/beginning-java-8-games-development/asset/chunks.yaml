    在你的 `.loadAudioAssets()` 方法体内，你将包含两条 Java 代码语句，因为加载数字音频资源比引用数字图像资源稍微复杂一些。首先，你将使用
    **`getClass().getResource()`** 方法链加载第一个 **`iAudioFile0`** URL 对象。这个方法链会为你想要使用的数字音频样本资源加载
    URL（统一资源定位符）对象，并且会针对你的 Class 对象（在本例中，是 `InvinciBagel` 类，因为我们正在这个 Java 类中编写代码）执行此操作。


    你希望获取 URL 的资源位于 `.getResource()` 方法调用内部，并使用与你用于数字图像资源相同的资源引用格式，在本例中是一个 `"/leftmono.wav"`
    文件引用，该引用由 `.getResource()` 方法转换为二进制 URL 数据格式。这段 Java 代码如图 15-14 所示，形式如下面的 Java
    方法体：


    ```

    private void loadAudioAssets() {

        iAudioFile0 = getClass().getResource("/leftmono.wav");

        iSound0 = new AudioClip(iAudioFile0.toString());

    }

    ```


