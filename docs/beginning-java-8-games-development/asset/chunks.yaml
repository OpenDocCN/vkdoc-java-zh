- fmt: "`Random`类有两个构造器：一个是我们将要使用的`Random()`构造器，以及一个重载的`Random(long seed)`构造器，你可以在其中为这个类实现的随机数生成器指定**种子值**。一旦你有了一个`Random`对象，就可以调用近二十多个（22个）生成不同类型随机值的方法。本章我们将使用的方法调用是`.nextInt(int\
    \ bound)`和`.nextBoolean()`。如果你好奇，还有一个`.nextInt()`方法，但我们需要在**特定范围**（从零到屏幕底部）内生成随机数，而`.nextInt(int\
    \ bound)`允许生成从零到方法调用中传入的指定整数边界（上限）的随机数范围。\n\n我们将在`Enemy.java`类中为敌人攻击策略（和代码）使用`Random`类。现在，让我们在`Enemy.java`类的顶部声明并实例化一个名为`randomNum`的`Random`对象，如[图17-28](#9781484204160_Ch17.xhtml#Fig28)所示，使用以下复合（声明加实例化）Java\
    \ 8编程语句：\n\n```\nprotected static final Random randomNum = new Random();\n```\n\
    \n![9781484204160_Fig17-28.jpg](OEBPS/Images/9781484204160_Fig17-28.jpg)\n\n[图17-28](#9781484204160_Ch17.xhtml#_Fig28).\
    \ 在`Enemy.java`类顶部使用`Random()`声明并实例化一个随机数生成器\n\n我们将在本章剩余部分使用这个`Random`（随机数生成器）对象，为我们的敌人`iBeagle`对象添加随机攻击位置、侧边和子弹，以便他能尽力击倒`InvinciBagel`角色（游戏玩家），或者至少让他产生大量负分！\n\
    \n**发起攻击：编写敌人攻势代码**\n\n首先，我们需要声明**计数器变量**，如[图17-29](#9781484204160_Ch17.xhtml#Fig29)中高亮所示，使用以下两条Java语句：\n\
    \n```\nint attackCounter = 0;\nint attackFrequency = 250;\n```\n\n![9781484204160_Fig17-29.jpg](OEBPS/Images/9781484204160_Fig17-29.jpg)\n\
    \n[图17-29](#9781484204160_Ch17.xhtml#_Fig29). 在`Enemy.java`类顶部添加整型变量；设置`attackCounter=0`，`attackFrequency=250`\n\
    \n现在，我们准备开始在`Enemy.java`类中放置六个相当复杂的方法。这些方法将使用`GamePlayLoop`类的`.handle()`方法，接入JavaFX\
    \ 60 FPS脉冲定时事件引擎，以驱动完全自动化、完全随机的敌人攻击。我们在本章剩余部分编写的代码，相当于将计算机处理器变成我们游戏玩家的对手。让我们开始写代码吧！\n\
    \n**敌人攻击的基础：`.update()`方法**\n\n让我们从编写`iBeagle`敌人自动攻击引擎的基础开始。我们要做的第一件事是“节流”60 FPS脉冲引擎，确保攻击每四秒只发生一次。这通过`if()`结构中的`attackCounter`和`attackFrequency`变量实现，该结构对这两个变量进行计数。如果`attackCounter`达到**250**，则重置为**0**并调用`initiateAttack()`方法。否则（`else`），`attackCounter`使用`+=1`进行**递增**。你也可以使用`attackCounter++`来实现。基本的条件`if()`结构代码，如[图17-30](#9781484204160_Ch17.xhtml#Fig30)中间高亮所示，应如下Java方法所示：\n\
    \n```\npublic void update() {\n    if(attackCounter >= attackFrequency) {\n  \
    \      attackCounter=0;\n        initiateAttack();\n    } else {\n        attackCounter+=1;\n\
    \    }\n}\n```\n\n![9781484204160_Fig17-30.jpg](OEBPS/Images/9781484204160_Fig17-30.jpg)\n\
    \n[图17-30](#9781484204160_Ch17.xhtml#_Fig30). 在`.update()`方法中使用`attackCounter`创建一个条件`if`，调用`initiateAttack()`方法\n\
    \n在这个公认的高级章节中，我们将编写的大部分“自动攻击”代码都将利用这个`.update()`方法，该方法将从运行我们游戏的`GamePlayLoop`类的`.handle()`方法中调用。我安装这个你需要在每个`Actor`子类中重写的`.update()`方法的原因，是考虑到你可能想在游戏中制作动画。如果`Actor`是静态的，`.update()`方法就只是一个空方法或未使用的方法。\n\
    \n**从屏幕两侧攻击：`.initiateAttack()`方法**\n\n让攻击从屏幕两侧发起的方法是使用一个布尔变量，它可以设置为右侧（`true`）或左侧（`false`），我们将其命名为`takeSides`。在`Enemy`类的顶部声明这个变量，然后在你的`.update()`方法下方创建一个空的`private\
    \ void initiateAttack(){}`方法结构。在这个`.initiateAttack()`方法内部，创建一个空的`if-else`结构`if(takeSides){}else{}`来容纳你的攻击编程逻辑，所以如果你喜欢编写超级紧凑的Java代码，就是`private\
    \ void initiateAttack(){if(takeSides){}else{}}`（这是有效的Java代码，但到目前为止什么也不做）。如果你遵循行业标准的Java\
    \ 8代码格式化实践，用于实现这个空基础设施的Java方法体如[图17-31](#9781484204160_Ch17.xhtml#Fig31)所示，应如下所示：\n\
    \n```\nboolean takeSides = false;\nprivate void initiateAttack() {\n    if(takeSides)\
    \ {\n              // 空语句\n    } else {  // 空语句 }\n}\n```\n\n![9781484204160_Fig17-31.jpg](OEBPS/Images/9781484204160_Fig17-31.jpg)\n\
    \n[图17-31](#9781484204160_Ch17.xhtml#_Fig31). 在`initiateAttack()`方法内部添加`if-else`结构，以在左侧和右侧之间交替\n\
    \n在`if(takeSides){}`结构内部，将敌人对象（我们在`InvinciBagel`类中命名为`iBeagle`）的X位置设置为500，使用`spriteFrame.setTranslateX(500);`，并设置一个屏幕上的**随机高度**，使用`spriteFrame.setTranslateY()`方法调用，结合我们在本章前一节安装的随机数生成器对象。如果你输入`randomNum`对象名然后按句点键，将看到许多方法调用选项，如[图17-32](#9781484204160_Ch17.xhtml#Fig32)所示。双击`nextInt(int\
    \ bound)`选项，并将该方法调用插入到`.setTranslateY()`方法中的`randomNum`对象之后。\n\n![9781484204160_Fig17-32.jpg](OEBPS/Images/9781484204160_Fig17-32.jpg)\n\
    \n[图17-32](#9781484204160_Ch17.xhtml#_Fig32). 在`.setTranslateY()`方法中使用`randomNum`\
    \ Random对象，并使用句点调用选择器\n\n接下来你要做的是声明一个名为`attackBoundary`的**整型**变量，该变量将在你的`.nextInt()`方法调用中被引用，这样你以后可以在`Enemy.java`类顶部的一个易于编辑的位置更改Y轴（屏幕底部）边界。Java语句应如下所示：\n\
    \n```\nint attackBoundary = 300;\n```\n\n现在，我们准备完成翻转`iBeagle`敌人Actor（精灵）使其面向正确方向的Java代码，然后我们可以测试代码。以逻辑、可消化的步骤编写复杂的Java代码非常重要。通过这种方式，你可以在编写代码时进行测试，确保编程逻辑的每个组件都能工作，然后再增加复杂性。在本章中，你将看到这个工作流程，因为我们在`Enemy.java`类中开发了一个健壮的自动攻击算法。这个自动攻击代码可以用于你将来创建的任何敌人对象；因此，你在本章编写的代码将涵盖大量坏蛋的攻击方式！"
  raw: 'The Random class has two constructors, a **Random()** constructor, which we
    will be using, and an overloaded **Random(long seed)** constructor, where you
    can specify the **seed value** for the Random Number Generator that this class
    implements. Once you have a Random object, you can call one of almost two dozen
    (22) methods that generate different types of random values. The method calls
    we’ll be using during this chapter are the **.nextInt(int bound)** and **.nextBoolean()**
    method calls. In case you are wondering, there is also a .nextInt() method, but
    we need to generate a random number inside of a **specific range** (zero to bottom
    of screen), and the .nextInt(int bound) allows generation of a random number range
    from zero to the specified integer bound (boundary) passed over inside of the
    method call.


    We will be using the Random class for our Enemy attack strategy (and code) in
    the Enemy.java class. Let’s go ahead and declare and instantiate a Random object
    named **randomNum** at the top of the Enemy.java class, as shown in [Figure 17-28](#9781484204160_Ch17.xhtml#Fig28),
    using the following compound (declaration plus instantiation) Java 8 programming
    statement:


    ```

    protected static final Random randomNum = new Random();

    ```


    ![9781484204160_Fig17-28.jpg](OEBPS/Images/9781484204160_Fig17-28.jpg)


    [Figure 17-28](#9781484204160_Ch17.xhtml#_Fig28). Declare and instantiate a Random
    Number Generator at the top of the Enemy.java class using Random()


    We will be using this Random (number generator) object throughout the remainder
    of this chapter to add random attack positions, sides, and bullets for our Enemy
    iBeagle object, so that he can try his best to take down the InvinciBagel character
    (the game player), or at least cause him to generate lots of negative scoring
    points if he can!


    Mounting the Attack: Coding the Enemy Onslaught


    First we need to declare **counter variables**, seen highlighted in [Figure 17-29](#9781484204160_Ch17.xhtml#Fig29),
    using the following two Java statements:


    ```

    int attackCounter = 0;

    int attackFrequency = 250;

    ```


    ![9781484204160_Fig17-29.jpg](OEBPS/Images/9781484204160_Fig17-29.jpg)


    [Figure 17-29](#9781484204160_Ch17.xhtml#_Fig29). Add integer variables at the
    top of the Enemy.java class; set attackCounter=0, and attackFrequency=250


    Now we are ready to start to put a half dozen fairly complicated methods into
    place in the **Enemy.java** class. These will use the GamePlayLoop class’s **.handle()**
    method, to tap into the JavaFX 60 FPS pulse timing event engine, to drive a fully
    automated, fully randomized Enemy attack. The code that we’ll be putting together
    during the remainder of this chapter is the equivalent of turning the computer
    processor into our game player’s opponent. Let’s write code!


    The Foundation of an Enemy Class Attack: The .update() Method


    Let’s start by writing the foundation of our iBeagle Enemy auto-attack engine.
    The first thing that we want to do is to “throttle” the 60 FPS pulse engine, and
    make sure that attacks only happen every four seconds. This is done using the
    attackCounter and attackFrequency variables inside of an if() structure, which
    counts between the two variables. If the attackCounter reaches **250**, it is
    reset to **0** and an **initiateAttack()** method is called. Otherwise (else)
    the attackCounter is **incremented** using +=1\. You could also use **attackCounter++**
    to accomplish this. The code for the basic conditional if() structure, which can
    be seen highlighted in the middle of [Figure 17-30](#9781484204160_Ch17.xhtml#Fig30),
    should look like the following Java method:


    ```

    public void update() {

        if(attackCounter >= attackFrequency) {

            attackCounter=0;

            initiateAttack();

        } else {

            attackCounter+=1;

        }

    }

    ```


    ![9781484204160_Fig17-30.jpg](OEBPS/Images/9781484204160_Fig17-30.jpg)


    [Figure 17-30](#9781484204160_Ch17.xhtml#_Fig30). Create a conditional if using
    attackCounter inside the .update() method that calls initiateAttack() method


    Most of this “auto-attack” code we will be writing during this admittedly advanced
    chapter will leverage this .update() method, which will be called from the .handle()
    method that runs our game from the GamePlayLoop class. The reason I installed
    this .update() method that you need to override in every Actor subclass, is in
    case you wanted to animate things in the game. If an Actor is static, the .update()
    method simply exists as an empty or unused method.


    Attacking on Both Sides of the Screen: .initiateAttack() Method


    The way to make your attack come from both sides of the screen is to have a boolean
    variable that can be set to right (true) or left (false), which we will call **takeSides**.
    Declare this variable at the top of the Enemy class, and then create an empty
    **private void initiateAttack(){}** method structure underneath your .update()
    method. Inside of this .initiateAttack() method, create an empty if-else structure
    **if(takeSides){}else{}** to hold your attack programming logic, so **private
    void initiateAttack(){if(takeSides){}else{}}** if you are into writing super compact
    Java code (this is valid Java code, but does absolutely nothing thus far). If
