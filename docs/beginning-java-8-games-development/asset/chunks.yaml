    **大于**符号是一个朝右的箭头，而**小于**符号是一个朝左的箭头。它们分别放在等号之前，构成大于或等于以及小于或等于的关系运算符，正如你在表 3-3 底部所看到的那样。


    这些关系运算符返回布尔值 true 或 false，因此在 Java 的控制（循环）结构中经常使用，也用于游戏编程逻辑中，以控制游戏进程的路径（结果）。例如，假设你想确定游戏屏幕的左边缘位置，这样
