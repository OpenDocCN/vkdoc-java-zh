    8 入门章节），这些概念的复杂度通常会逐渐增加。


    在内存中固定数据值：在 Java 中定义数据常量


    如果你已经熟悉计算机编程，就会知道经常需要一些数据字段，它们始终包含相同的数据值，并且在应用程序运行周期内不会改变。这些字段被称为**常量**，它们通过使用特殊的
    Java 修饰符关键字来定义或声明，这些关键字用于在内存中固定内容，使其无法更改。还有一些 Java 修饰符关键字可以限制（或解除限制）对象实例，或者限制对
    Java 类或包内部或外部的某些类的访问（你将在下一节中详细研究这些内容）。


    要声明固定的 Java 变量，必须使用 Java **final** 修饰符关键字。“Final”的含义与你的父母说某事“最终决定”时相同：它被固定下来，是一个
    **FOL（既定事实）**，永远不会改变。因此，创建常量的第一步是添加这个 `final` 关键字，将其放在声明中的数据类型关键字之前。


    声明 Java 常量（以及其他编程语言中的常量）时，有一个约定是使用**大写字符**，并在每个单词之间使用**下划线字符**，这表示代码中的常量。


    如果你想为游戏创建**屏幕宽度**和**屏幕高度**常量，可以这样做：


    ```

    final int SCREEN_HEIGHT_PIXELS = 480;

    final int SCREEN_WIDTH_PIXELS  = 640;

    ```


    如果你希望由类的构造方法创建的所有对象都能看到并使用这个常量，可以添加 Java **static** 修饰符关键字，将其放在 `final` 修饰符关键字之前，如下所示：


    ```

    static final int SCREEN_HEIGHT_PIXELS = 480;

    static final int SCREEN_WIDTH_PIXELS = 640;

    ```


    如果你只希望你的类以及由该类创建的对象能看到这些常量，可以通过将 Java **private** 修饰符关键字放在 `static` 修饰符关键字之前来声明常量，使用以下代码：


    ```

    private static final int SCREEN_HEIGHT_PIXELS = 480;

    private static final int SCREEN_WIDTH_PIXELS = 640;

    ```


    如果你希望任何 Java 类，甚至是包外部的类（即其他人的 Java 类），都能看到这些常量，可以通过将 Java **public** 修饰符关键字放在
    `static` 修饰符关键字之前来声明常量，使用以下 Java 代码：


    ```

    public static final int SCREEN_HEIGHT_PIXELS = 480;

    public static final int SCREEN_WIDTH_PIXELS = 640;

    ```


    如你所见，声明一个常量比声明一个简单的类变量需要更详细的 Java 语句！接下来，你将更深入地了解 Java 修饰符关键字，因为它们允许你控制诸如对类、方法和变量的**访问**，以及**锁定**它们以防止修改等概念，以及类似的高级
    Java 代码控制概念，这些概念相当复杂。


    Java 修饰符关键字：访问控制及其他


    Java 修饰符关键字是保留的 Java 关键字，用于修改 Java 编程结构主要类型中代码的访问权限、可见性或持久性（在应用程序执行期间，某物在内存中存在的时间长短）。修饰符关键字是
    Java 代码结构外部最先声明的部分，因为结构的 Java 逻辑（至少对于类和方法而言）包含在花括号分隔符内，该分隔符位于 `class` 关键字和类名之后，或者方法名和参数列表之后。修饰符关键字可用于
    Java 类、方法、数据字段（变量和常量）以及接口。


    正如你在图 3-2 底部看到的，对于 NetBeans 为你的 **InvinciBagel** 类定义创建的 `.main()` 方法（该方法使用了 `public`
    修饰符），你可以使用多个 Java 修饰符关键字。**`.main()`** 方法首先使用了 **public** 修饰符关键字（这是一个访问控制修饰符关键字），然后使用了
    **static** 修饰符关键字（这是一个非访问控制修饰符关键字）。


    访问控制修饰符：Public、Protected、Private、Package Private


    我们先介绍访问控制修饰符，因为它们是在非访问修饰符关键字或返回类型关键字之前声明的，并且从概念上更容易理解。有四个访问控制修饰符级别可应用于任何 Java
    代码结构。如果你没有声明访问控制修饰符关键字，则默认的访问控制级别为包私有（package private），这将允许该代码结构对 Java 包（在此例中为
    `invincibagel`）内的任何 Java 编程结构可见，从而可用。


    其他三个访问控制修饰符级别有自己的访问控制修饰符关键字，包括 `public`、`private` 和 `protected`。这些关键字的命名与其功能大致相符，因此你可能已经对如何应用它们来公开共享代码或保护代码不被公开使用有了很好的想法，但这里我们还是要详细讨论每一个，以确保理解无误，因为访问（安全性）在当今时代是一个重要问题，无论是在代码内部还是外部世界。我将从访问控制最少的级别开始介绍！


    Java 的 Public 修饰符：允许公众访问 Java 程序结构


    Java **public** 访问修饰符关键字可用于类、方法、构造方法、数据字段（变量和常量）以及接口。如果你将某物声明为 `public`，那么公众就可以访问它！这意味着它可以被世界上任何其他包中的任何其他类导入和使用。本质上，你的代码可以在任何使用
    Java 编程语言创建的软件中使用。正如你将在 Java 或 JavaFX 编程平台（API）中使用的类中看到的那样，`public` 关键字最常用于用于创建自定义应用程序（例如游戏）的开源
    Java 编程平台或包中。

