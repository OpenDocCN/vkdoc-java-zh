  trans: '

    这份自动生成的碰撞数据非常“沉重”，因此我们研究了一种更复杂的工作流程，允许我们使用更少的数据点对来手动创建碰撞多边形。这个过程涉及使用 GIMP 中的路径工具手动创建碰撞多边形，这让我们能更好地控制生成尽可能少的数据点。我们还研究了
    CodeAndWeb PhysicsEditor 软件，该软件可用于所有游戏开发平台。


    在下一章中，我们将探讨如何在游戏中实现增强的游戏玩法元素，包括计分引擎、对手、宝藏、自动攻击引擎和物理模拟。


    第 17 章


    ![image](img/frontdot.jpg)


    增强游戏玩法：创建计分引擎、添加宝藏和敌人自动攻击引擎


    既然我们已经为游戏实现了碰撞检测，并为计分引擎奠定了基础，那么让我们完成从 **.checkCollisions()** 方法中调用的计分引擎的编码，然后添加更多游戏玩法元素以利用这个计分引擎，并使游戏玩法更有趣。为了实现计分引擎的显示，我们将在
    InvinciBagel.java 类中创建一个 **gameScore** 整数变量和一个 **scoreText** 文本对象。我们还将创建一个 **scoreFont**
    字体对象，并使用它来设置 scoreText 文本对象的样式，使其更突出。我们还将学习如何在我们将要创建的 **.scoringEngine()** 方法的条件
    if() 语句中使用 Java **instanceof** 求值器，并使用它来确定 InvinciBagel 与哪种类型的 Actor 对象发生了碰撞。当然，我们随后会相应地增加我们的
    gameScore 变量。


    我们还将创建一个 **Treasure.java** 类，以便为游戏添加有价值的战利品，供我们的 InvinciBagel 角色拾取，同时他还要躲避来自 **InvinciBeagle**（简称
    iBeagle）的持续敌人攻击，iBeagle 可以发射致命的子弹（iBullets）和奶油芝士球（iCheese）投射物对象。我们还将在此章节中创建这些
    **Enemy.java** 和 **Projectile.java** 类，因此我们将利用您在本书中学到的所有知识，在本章中创建一些非常高级的 Java
    8 类和方法。


    一旦我们有了 Enemy 和 Projectile 类，真正的挑战就来了：创建一个**自动攻击引擎**，让游戏本身与玩家对抗，这样我们就可以创建这个游戏的**单人**版本。我们将通过将
    Enemy.java 类连接到 GamePlayLoop.java 类来实现这一点，方法是从 GamePlayLoop 类的 **.handle()** 方法中调用
    Enemy 类的 **.update()** 方法，这将使我们能够利用 JavaFX 脉冲计时引擎来控制 iBeagle 敌人对象。完成后，我们可以对 Enemy
    对象进行编码，赋予它自己的生命，让它随机出现在屏幕上，并通过发射致命的子弹或美味的奶油芝士球来攻击 InvinciBagel。


    我们将逻辑地、循序渐进地构建这个自动攻击引擎，首先让 iBeagle 敌人出现在屏幕的任一侧，并翻转以正确面对 iBagel 角色。然后，我们将添加编程逻辑，使
    iBeagle 动画化到屏幕上，然后再退出屏幕。接着，我们将让他发射子弹或奶油芝士球，然后我们将添加一些计时代码，使他的移动更加逼真。


    之后，我们将为外观、位置和移动添加**随机化**，使游戏玩家无法判断 iBeagle 的攻击将从何而来。之后，我们将添加物理模拟，使子弹和奶油芝士球受到阻力和重力的影响，所有这些都将使游戏玩法随着章节的推进而变得越来越逼真，直到本书结束！


    我希望您和享受我为您编写本书的过程一样，享受在本书中的学习体验。现在，让我们在进一步学习 Java 8 和 JavaFX 类及编程技术的同时，让我们的游戏玩法变得更具挑战性和专业性。


    创建分数 UI 设计：文本和字体对象


    要实现计分引擎的显示，我们需要做的第一件事是在 NetBeans 中打开 InvinciBagel.java 选项卡，并添加一个**整数**变量来保存数字分数的累加值，以及一个**文本**
    UI 元素对象，用于在屏幕底部与其他 UI 元素一起显示分数。JavaFX 中的 Text 类用于处理游戏中的文本元素，甚至有自己的 **javafx.scene.text**
    包，因为文本在应用程序中是一个重要的元素。整数数据类型允许您的游戏玩家获得数十亿的分数，因此这应该足以容纳您的游戏玩家可以累积的任何量级的数字分数。我们将把这些
    Java 变量和对象声明（如图 17-1 中突出显示的）放在 InvinciBagel.java 类的最顶部，紧跟在 WIDTH 和 HEIGHT 常量声明之后，Java
    代码应如下所示：


    ```

    int gameScore = 0;

    Text scoreText;

    ```


    ![9781484204160_Fig17-01.jpg](img/9781484204160_Fig17-01.jpg)


    图 17-1。添加一个名为 gameScore 的整数变量并将其初始化为 0，然后添加一个名为 scoreText 的 Text 对象


    将鼠标悬停在波浪形的红色错误高亮上，然后单击包含此错误的代码行旁边以将其选中（以浅蓝色显示）。接下来，使用 **Alt-Enter** 工作流程调出错误解析帮助弹出窗口，如图
    17-1 底部所示，然后双击“Add import for javafx.scene.text.Text”选项，让 NetBeans 为您编写此 Text
    类的导入语句。


    现在，我们准备打开 **.createSplashScreenNodes()** 方法，并使用 Java **new** 关键字和 **Text()** 构造方法实例化这个名为
    **scoreText** 的 Text 对象。完成此操作后，您可以调用 **.setText()** 方法，并使用 **String.valueOf()**
    方法引用 **gameScore** 整数，以及使用 **.setLayoutX()** 和 **.setLayoutY()** 方法将其定位在您的 UI
    布局设计中，使用图 17-2 中显示的以下 Java 代码：


    ```

    scoreText = new Text();

    scoreText.setText(String.valueOf(gameScore));

    scoreText.setLayoutY(365);

    scoreText.setLayoutX(565);

    ```


    ![9781484204160_Fig17-02.jpg](img/9781484204160_Fig17-02.jpg)


    图 17-2。使用 Java new 关键字实例化 scoreText 对象，并调用 .setText() 和 .setLayout() 方法


    目前，我们将使用 **365, 565** 的 X、Y 位置值，如图 17-2 所示。为了能够设置此 Text 对象的样式，我们需要声明一个名为 **scoreFont**
    的 **private Font** 对象，如图 17-3 所示。再次对红色错误高亮使用 **Alt-Enter** 工作流程，然后选择“Add import
    for javafx.scene.text.Font”选项。


    ![9781484204160_Fig17-03.jpg](img/9781484204160_Fig17-03.jpg)


    图 17-3。添加一个 private Font scoreFont 声明，并使用 Alt-Enter 并选择“Add import javafx.scene.text.Font”


    在我们能够使用这个 scoreFont 字体对象来设置 scoreText 文本对象的样式之前，我们需要通过使用 **root.getChildren().add(scoreText);**
    Java 语句将这个 scoreText 文本节点对象添加到 JavaFX 场景图中，如图 17-4 中突出显示的。如果您忘记执行此操作，在您单击 PLAY
    GAME 按钮后，您的游戏屏幕上将只显示白色！

