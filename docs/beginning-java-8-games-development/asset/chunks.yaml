    总结


    在第十四章中，我们创建了固定精灵“道具”类，这些类允许我们设计游戏场景以及运动精灵 Actor 对象将与之交互的固定对象。我们首先创建了 **Prop**
    类，它扩展了我们在第 8 章中创建的 Actor 类。我们使用 `.setTranslateX()` 和 `.setTranslateY()` 方法，将构造函数方法中的
    xLocation 和 yLocation 参数用于在舞台上定位 ImageView，类似于我们使用 `.moveInvinciBagel()` 类所做的操作，只是对于固定精灵，移动仅在构造函数方法内执行一次，以将道具定位在舞台上的场景中。


    接下来，我们创建了更复杂的 **PropH** 和 **PropV** 类，除了在场景中定位固定精灵外，它们还会自动围绕 Y 轴（PropH）和 X 轴（PropV）镜像它们。我们还创建了一个
    PropB（B 代表 Both）类，它将自动围绕 X 轴和 Y 轴镜像固定精灵图像资源。


    接着，我们学习了如何通过在我们的 InvinciBagel.java 主游戏设计类中声明、实例化并将这些 Prop 类添加到 JavaFX 场景图以及 CastingDirector
    对象中来实现它们。我们学习了如何在屏幕上定位固定精灵，以及如何创建无缝的镜像平铺效果，并测试了我们的新 Prop 类，以确保它们已准备好用于设计游戏关卡。


    最后，我们使用更大的道具测试了这四个新固定精灵类中的两个，如果我们不通过将它们添加到 CastingDirector 对象中来定义用于碰撞检测的固定精灵对象，那么它们可以合理地用于场景背景合成。这将有助于减少游戏的数据占用，通过最小化大型
    PNG24 背景图像的使用，允许我们用更小的 PNG8 背景图像替换这些数据量大的图像。这些图像可以描绘场景“设置”，例如雨天、多云天空或生动的日落。


    在下一章中，我们将研究如何将数字音频音效引擎添加到我们的游戏代码中。该音频引擎将使用 JavaFX AudioClip 类为游戏添加音效排序功能，这样当我们开始添加物理和碰撞检测等内容时，我们就拥有了所有基本的新媒体元素（固定和运动图像以及音频反馈）可供使用。通过这种方式，我们可以开始添加多媒体，在游戏玩法（用户）体验中利用玩家的所有感官。


    第 15 章


    ![image](img/frontdot.jpg)


    实现游戏音频资源：使用 JavaFX AudioClip 类音频排序引擎


    现在我们已经使用抽象 Actor（固定精灵）和 Hero（运动精灵）超类创建了运动精灵和固定精灵类，我们需要将代码落实到位，以播放我们的游戏音频资源。虽然通常认为数字音频（听觉）资源不如数字图像（视觉）资源重要，但它们对于游戏玩法的质量可能相当重要。事实上，你会惊讶于优秀的音频资源能为你的
    Java 8 游戏产品增加多少感知价值。在本章中，我们将学习如何使用 Audacity 2.0.6 等开源工具来优化和实现 Java 8 游戏开发的数字音频资源。

