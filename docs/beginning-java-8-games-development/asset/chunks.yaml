    Summary


    In this sixteenth chapter, we started in on some of the more advanced topics that
    we will be covering during the last couple of chapters in this book. **Collision
    detection** is one of the foundational topics of game development, whether this
    is using Java 8, or any other platform, for that matter. In this chapter we learned
    about the **SVG data format** specification, so that we can leverage the JavaFX
    **SVGPath** class, which allows us to access **custom path shapes**, often called
    **polygons**, if they are closed, and which collision shapes, or **collision polygons**,
    usually are. We looked at the seven primary commands within the SVG specification,
    all of which can be used in **absolute** or **relative mode**.


    Next we took a detailed look at how to get GIMP 2.8 to create custom collision
    shape SVG data strings for us using a fully automated process that uses only GIMP
    tools (algorithms) to allow us to simply click on transparent areas and have GIMP
    generate the selection set. We converted the selection set into a collision path,
    and then exported the path as SVG data. This work process allows us to generate
    complex collision polygons with transparent (alpha channel data) areas within
    any of the game asset digital images.'
