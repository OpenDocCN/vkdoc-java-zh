  raw: 'Next, we are going to take the .playiSound0() method call out of the .checkCollision()
    method, and we’ll put it inside of the scoringEngine() method instead. As long
    as it is in one of these two methods, it’s going to get called on collision, one
    way or the other. The reason that I am going to do it this way is because we will
    probably want to play a different sound effect when a player finds a treasure,
    or is hit by a projectile. In this way, your audio is associated with scoring
    and game play when different types of collisions are detected, rather than just
    playing audio for any collision.


    Our conditional if() structure code bodies use curly braces, which allows us to
    add Java statements into each type of collision (scoring) object instance (type).
    So in addition to incrementing (or decrementing, as we will add later) the score,
    we can also use different sounds (audioClips) for different objects. Let’s add
    the .playSound() method calls into these conditional if() code blocks next, so
    that we have the code in place to trigger sound effects when a treasure is picked
    up by the primary character or when he is hit by (or catches) a projectile shot
    by an enemy (an InvinciBeagle) character, or when he collides with a prop in the
    scene.


    This is done by using the following Java conditional if() structures, which can
    also be seen in [Figure 17-10](#9781484204160_Ch17.xhtml#Fig10):


    ```

    private void scoringEngine(Actor object) {

        if(object instanceof Prop)  {

            invinciBagel.gameScore+=5;

            invinciBagel.playiSound0();

        }

        if(object instanceof PropV) {

            invinciBagel.gameScore+=4;

            invinciBagel.playiSound1();

        }

        if(object instanceof PropH) {

            invinciBagel.gameScore+=3;

            invinciBagel.playiSound2();

        }

        if(object instanceof PropB) {

            invinciBagel.gameScore+=2;

            invinciBagel.playiSound3();

        }

        invinciBagel.scoreText.setText(String.valueOf(invinciBagel.gameScore));

    }

    ```


