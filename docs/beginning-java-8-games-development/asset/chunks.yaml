  trans: '

    **查德·达比**是 Java 开发领域的作家、讲师和演讲者。作为 Java 应用与架构领域的公认权威，他曾在全球软件开发大会（英国、印度、俄罗斯和澳大利亚）上发表技术演讲。在十五年的专业软件架构师生涯中，他曾为蓝十字蓝盾协会、默克公司、波音公司、红帽公司以及多家初创企业工作。


    查德是数本 Java 书籍的合著者，包括《专业 Java 电子商务》（Wrox 出版社）、《Java 网络编程入门》（Wrox 出版社）以及《XML 与 Web
    服务完全手册》（Sams 出版社）。他拥有 Sun Microsystems 和 IBM 的 Java 认证，并持有卡内基梅隆大学计算机科学学士学位。


    访问查德的博客 [www.luv2code.com](http://www.luv2code.com) 可观看他的免费 Java 视频教程。你也可以在 Twitter
    上关注他：@darbyluvs2code。


    致谢


    我要感谢 Apress 出版社所有出色的编辑及其支持团队，他们为此书付出了漫长的工作时间与艰辛努力，使其成为终极的 Android 零基础应用开发指南。


    **史蒂夫·安格林**，感谢他担任本书的**首席编辑**，并招募我为 Apress 撰写关于最受欢迎的开源应用开发平台（Android 和 Java）的编程书籍。


    **马修·穆迪**，感谢他担任本书的**开发编辑**，并在将本书打造为当前市场上优秀的 Java 8 游戏开发书籍的过程中提供的经验与指导。


    **马克·鲍尔斯**，感谢他担任本书的**协调编辑**，并始终勤勉尽责地确保我按时甚至提前完成各章节的交付。


    **丽莎·韦基奥内**和**凯伦·詹姆森**，感谢她们担任本书的**文字编辑**，对极其细微之处给予细致关注，并确保文本符合 Apress 当前的写作标准。


    **查德·达比**，感谢他担任本书的**技术审校**，确保我没有犯任何 Java 编程错误——因为包含错误的 Java 代码无法正常运行，除非这些错误极其幸运，而这在当今计算机编程中极为罕见。


    **安娜·伊什琴科**，感谢她担任本书的**封面设计师**，为本书封面创作了图形设计，使其与其他流行的 Apress Java 8 和 JavaFX 8 编程书籍风格一致。


    **艾拉·H·哈里森·鲁宾**，我的朋友兼客户，也是世界上最优秀、最受尊敬的漫画和连环画作者之一，感谢他允许我们使用其 BagelToons 知识产权中的部分内容，特别是
    InvinciBagel 概念，作为平台向读者展示如何围绕客户的实际知识产权创建游戏。请务必在未与鲁宾先生确认其知识产权使用事宜前，不要自行创建 InvinciBagel
    游戏！


    **帕特里克·哈林顿**，我的朋友兼客户，也是世界上最优秀的漫画家之一，感谢他为 InvinciBagel 游戏创建了 2D 素材，并允许我使用其中部分内容来展示如何创建基本的
    Java 8 游戏引擎。


    **安德烈亚斯·洛**，同为 Apress 的作者，感谢他允许我在本书第 16 章中使用其 CodeAndWeb GmbH 公司的产品 PhysicsEditor（PhysEd），以展示另一种专业的碰撞多边形开发工具工作流程。


    最后，我要感谢**甲骨文公司**收购了 Sun Microsystems，并持续增强 Java 8，使其保持顶级开源编程语言的地位；同时感谢他们收购了 JavaFX
    新媒体引擎，并将其整合到 Java 8 中，使现有的 Java 应用能够实现“游戏化”并具备“寓教于乐”的特性。


    引言


    Java 编程语言是当今世界上最流行的面向对象编程语言。Java 运行于从智能手表、高清智能手机、触控平板、电子书阅读器、游戏主机、智能眼镜到超高清 4K
    互动电视等各类设备上。随着时间推移，越来越多的消费电子设备类型（如汽车、家电、医疗、数字标牌、安防和家庭自动化市场中的设备）正逐步采用开源 Java 平台。


    由于全球数十亿用户拥有数十亿台兼容 Java 的消费电子设备，因此，只要拥有正确的游戏概念、美术设计、游戏设计和优化工作流程，为所有这些用户开发流行的 Java
    8 游戏无疑是一项利润丰厚的事业。


    Java 8（及其多媒体引擎 JavaFX 8）代码几乎可以在所有操作系统上运行，包括 Windows XP、Vista、7、8、9；所有 Linux 发行版；32
    位 Android 4 和 64 位 Android 5；Open Solaris；Macintosh OS/X、iOS；Symbian 以及树莓派——其他主流操作系统增加对这款流行开源编程语言的支持只是时间问题。此外，所有主流互联网浏览器都内置了
    Java！Java 在软件安装方面提供了终极灵活性，既可作为应用程序安装，也可在浏览器中作为小程序运行。你甚至可以将 Java 应用程序直接从浏览器拖出，并使其自动安装到用户桌面！Java
    8 确实是一项非凡的技术。


    目前，Java 8（及 JavaFX 8.0）拥有大量嵌入式及桌面硬件支持层级，包括完整的 Java SE 8、Java SE 8 嵌入式版、Java ME（微型版）8、Java
    ME 8 嵌入式版，以及用于企业应用开发的 Java EE 8。这正是“一次编码，随处部署！”的体现。这是每位程序员的梦想，而甲骨文公司正通过强大的 Java
    8 多媒体编程平台将其变为现实。


    本书将极大地帮助你学习如何利用 Java 编程语言结合新近加入的 JavaFX 8.0 多媒体引擎来开发 Java 8 游戏。这些 Java 8 游戏应用将能够在大量兼容
    Java 的消费电子设备上运行。开发能在所有这些不同类型的消费电子设备上流畅运行的 Java 8 游戏应用，需要一套非常具体的工作流程，包括素材设计、游戏代码设计和优化，这些内容都将在本书中涵盖。


    我完全从零开始撰写《Java 8 游戏开发入门》这本书，使用了一个我实际正在开发、并计划于 2015 年某个时候向公众交付的真实客户游戏项目。我的目标读者是那些初学游戏开发、且未曾使用
    Java 8 和 JavaFX 8.0 编写过代码的人。这些读者具备技术悟性，但对面向对象编程的概念和技术并不十分熟悉。由于 Java 现已更新至 8u40
    版本，本书将比市面上许多其他 Java 书籍更为深入。Java 8 增加了一些非常高级的特性，例如 JavaFX 8.0 API，它为 Java 8 提供了自己的多媒体引擎，支持
    SVG、2D、3D、音频和视频媒体。

