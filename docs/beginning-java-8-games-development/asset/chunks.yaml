- fmt: '# The Method Calls for Game Setup


    The method calls that we are going to put into place during the first part of
    this chapter involve creating the event handlers for the `Scene` object, which
    we will do right after we have set-up that `Scene` object named `scene`. The next
    thing that we will need to do in the process of adding to the game is to load
    the `Image` object assets (digital image references), which is what your `.loadImageAssets()`
    method will do. Once your `Image` objects are declared and instantiated, we can
    then create the game actors using the `.createGameActors()` method and the constructor
    method calls that we created in our custom `Actor` and `Hero` subclasses, such
    as the `Bagel.java` class we created in [Chapter 10](#9781484204160_Ch10.xhtml).
    Once we have the actors created, we can add them to the Scene Graph using `.addGameActorNodes()`
    as well as adding them to the game cast using the `.createCastingDirection()`
    method. At the end, we create and start the `GamePlayLoop` object by calling the
    `.createStartGameLoop()` method. The `.createSplashScreenNodes()` and `.addNodesToStackPane()`
    are at the end, as they won’t be added to now that the splashscreen content production
    work has been completed. The method call code that we’ll add during this chapter
    looks like the following:


    ```

    createSceneEventHandling();

    loadImageAssets();

    createGameActors();

    addGameActorNodes();

    createCastingDirection();

    createSplashScreenNodes();

    addNodesToStackPane();

    createStartGameLoop();

    ```


    Let’s get down to business and start implementing this code redesign process for
    the `InvinciBagel.java` class.


    ## The Scene Event Handling Method: `.createSceneEventHandling()`


    The first thing that we will want to do is to move the event handling for our
    game play into its own method, which we will call `.createSceneEventHandling()`.
    The reason that I am creating a method for the creation of `Scene` object event
    handling is because if later on you wanted to add other types of input events
    into your game, such as mouse events or drag events, you will have a logical method
    already in place which can hold this event-related Java code.


    This new Java code, which can be seen in [Figure 11-2](#9781484204160_Ch11.xhtml#Fig2),
    will involve taking your `scene.setOnKeyPressed()` and `scene.setOnKeyReleased()`
    method handling structures, created in [Chapter 9](#9781484204160_Ch09.xhtml),
    out of your `.createSplashScreenNodes()` method, and placing them into their own
    method structure. Later we’ll relocate all `ActionEvent` handlers, which are in
    the `.start()` method, and actually belong inside the `.createSplashScreenNodes()`
    method where they would be grouped with the other splashscreen objects. This new
    event handling code structure should look like the following Java code:


    ```

    private void createSceneEventHandling() {

        scene.setOnKeyPressed((KeyEvent event) -> {

            switch (event.getCode()) {

                case UP:    up     = true; break;

                case DOWN:  down   = true; break;

                case LEFT:  left   = true; break;

                case RIGHT: right  = true; break;

                case W:     up     = true; break;

                case S:     down   = true; break;

                case A:     left   = true; break;

                case D:     right  = true; break;

            }

        });

        scene.setOnKeyReleased((KeyEvent event) -> {

            switch (event.getCode()) {

                case UP:    up     = false; break;

                case DOWN:  down   = false; break;

                case LEFT:  left   = false; break;

                case RIGHT: right  = false; break;

                case W:     up     = false; break;

                case S:     down   = false; break;

                case A:     left   = false; break;

                case D:     right  = false; break;

            }

        });

    }

    ```


    ![9781484204160_Fig11-02.jpg](OEBPS/Images/9781484204160_Fig11-02.jpg)


    [Figure 11-2](#9781484204160_Ch11.xhtml#_Fig2). Create `private void createSceneEventHandling()`
    method for `OnKeyReleased` and `OnKeyPressed` event handling structures


    Now that the event handling for the game play is where it needs to be, before
    we can write the rest of the method structures for adding `Image`, `Actor`, and
    `CastingDirector` objects, we’ll need to declare these objects for use at the
    top of our `InvinciBagel.java` class. Let’s do this work that sets up the rest
    of the methods we’ll need to code next.


    ## Adding InvinciBagel: Declare `Image`, `Bagel`, and `CastingDirector`


    Since we are going to start to get our InvinciBagel character on the game play
    screen during this chapter, and bring together all of the code we wrote during
    previous chapters creating our `GamePlayLoop` class ([Chapter 7](#9781484204160_Ch07.xhtml)),
    `Actor` and `Hero` classes ([Chapter 8](#9781484204160_Ch08.xhtml)), event handling
    ([Chapter 9](#9781484204160_Ch09.xhtml)), and `CastingDirector` class ([Chapter
    10](#9781484204160_Ch10.xhtml)), we need to declare some object variables at the
    top of the `InvinciBagel.java` class, before we can instantiate and use these
    objects during the chapter. We will declare the `Bagel` object named `iBagel`
    using the `static` keyword, as we will be calling the `iBagel` object’s `.update()`
    method from the `GamePlayLoop` object’s `.handle()` method, and this will make
    the `iBagel` “visible” across (or between) these two classes. We will also declare
    the nine `Image` (sprite state) objects, `iB0` through `iB8`, by using a compound
    declaration. Finally, we will declare a `CastingDirector` object, which we will
    name `castDirector`. The declaration statements, which we need to add at the top
    of our `InvinciBagel.java` class, can be seen in [Figure 11-3](#9781484204160_Ch11.xhtml#Fig3).
    They include the following Java variable declaration statements, located at the
    top of your `InvinciBagel.java` class:


    ```

    static Bagel iBagel;

    Image iB0, iB1, iB2, iB3, iB4, iB5, iB6, iB7, iB8;

    CastingDirector castDirector;

    ```


    ![9781484204160_Fig11-03.jpg](OEBPS/Images/9781484204160_Fig11-03.jpg)


    [Figure 11-3](#9781484204160_Ch11.xhtml#_Fig3). Add `static Bagel iBagel`, `CastingDirector
    castDirector` and `Image` object declaration named `iB0` through `iB8`


    Now that we’ve declared the object variables that we will need to implement the
    InvinciBagel `Actor` object instantiation in the `.createGameActors()` method
    and `CastingDirection` engine in the `createCastingDirection()` method, let’s
    move on to creating the first of our new methods, the `.loadImageAssets()` method,
    which will contain all of your `Image` object instantiation calls to the `Image()`
    constructor. We will put all `Image` object instantiations in this method.


    ## The Actor Image Assets Loading Method: `.loadImageAssets()`


    Now that we have declared the nine `Image` objects for use at the top of our `InvinciBagel.java`
    class, the next thing that we will need to do is to copy the nine PNG32 sprite
    images, which are named `sprite0.png` through `sprite8.png`, into the `/src` folder
    for our InvinciBagel NetBeans project. This is done using the file management
    utility for your operating system; in the case of my 64-bit Windows 7 OS it is
    the Windows Explorer utility, shown in [Figure 11-4](#9781484204160_Ch11.xhtml#Fig4),
    with the Image assets copied into the `C:/Users/user/MyDocuments/NetBeansProjects/InvinciBagel/src`
    folder. All of the PNG image assets are **PNG32** (24-bit RGB true color data
    with a 8-bit 256 gray level alpha channel) except for the back plate for the splashscreen,
    which is a PNG24, as it does not need an alpha channel because it is a background
    image plate.


    ![9781484204160_Fig11-04.jpg](OEBPS/Images/9781484204160_Fig11-04.jpg)


    [Figure 11-4](#9781484204160_Ch11.xhtml#_Fig4). Copy the `sprite0.png` through
    `sprite8.png` files into your `NetBeansProjects/InvinciBagel/src` project folder'
