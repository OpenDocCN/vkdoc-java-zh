    Stage in the constructor method using a .setTranslateX() and .setTranslateY()


    Next let’s create **PropH**, **PropV**, and **PropB** (which stands for “both”)
    classes. These will automatically mirror props for us around the X, Y or X and
    Y axes using the constructor method, so the object will inherently mirror images.


    Mirrored Prop Classes: Set the isFlip Property in the Constructor


    To make our process of building scenes easier, since everything (collision, location,
    animation) is part of a constructor method call, the difference between props
    is how they are mirrored (X or Y axis, or both axes). In this section, we are
    going to create variants of the Prop class that flip sprites for us, inside of
    a constructor method, so that all we have to do to get the effect we want is create
    that PropX object type. Create the first **PropH** class, as is shown in [Figure
    14-9](#9781484204160_Ch14.xhtml#Fig9).


