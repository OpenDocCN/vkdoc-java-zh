    \ objects (positive score generation), both of which will require our `Enemy.java`\
    \ class to have visibility into the `InvinciBagel` class. Thus, the first thing\
    \ that we’ll need to do is to modify the `Enemy()` constructor method to accept\
    \ an `InvinciBagel` object using the Java `this` keyword, much like we did with\
    \ our `Bagel()` constructor method. Go into the `InvinciBagel.java` class and\
    \ add a `this` keyword to the front end of (beginning of) your `Enemy()` constructor\
    \ parameter list, as shown highlighted in [Figure 17-39](#9781484204160_Ch17.xhtml#Fig39),\
