    \n[Figure 12-6](#9781484204160_Ch12.xhtml#_Fig6). Insert the `invinciBagel.is()`\
    \ method calls inside of the `if` statements, where the boolean variables used\
    \ to be\n\nAs you can see in [Figure 12-6](#9781484204160_Ch12.xhtml#Fig6), the\
