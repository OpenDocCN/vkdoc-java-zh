- fmt: "`Set<E>`是一个**无序**的`Collection<E>`，也可以被视为一个没有特定顺序的随机对象集合。`Set<E>`集合**不包含重复元素**，如果向`Set<E>`添加重复元素，或者任何“可变的”（可以改变为其他内容的元素）元素被更改为与`Set<E>`中已有元素重复的元素，则会抛出一个称为“异常”的错误。这个无重复规则也意味着，`Set<E>`最多只能包含**一个`null`**元素。正如你们中精通数学的人可能已经推测到的，这个`Set<E>`接口是模仿你在学校学到的**数学集合**而建模的。\n\
    \n`Set<E>`接口在从`Collection<E>`超接口“继承”的“契约”（对你们非法律人士来说就是要求）之外，对所有构造方法以及`.add()`、`.equals()`和`.hashCode()`相关方法的契约（要求）增加了额外的规定。\n\
    \n根据规则，这些构造方法的额外规定是：所有构造方法必须创建一个包含零个重复元素的`Set<E>`。\n\n如前所述，如果在`Set<E>`集合中使用可变（可更改）对象作为元素，你必须小心行事。如果当可变对象是`Set<E>`中的元素时，其值以影响`.equals()`方法比较的方式被更改，则`Set<E>`的行为是未指定的。此禁令的一个特殊情况是，`Set<E>`不允许将自身作为元素包含，而`List<E>`可以。\n\
    \n### java.util.HashSet 类：使用无序对象集合\n\n接下来，让我们介绍同样是Java集合框架成员的**`public`**类**`HashSet<E>`**。这个为`Set<E>`接口规范提供`HashSet`对象容器的类，类似于`ArrayList<E>`类为`List<E>`接口创建`ArrayList`对象容器的方式。`HashSet`类可以“**实现**”或支持以下Java接口：`Serializable`、`Cloneable`、`Iterable<E>`、`Collection<E>`和`Set<E>`。我们将在`CastingDirector.java`类中使用`Set<E>`，或者在我们的例子中是`Set<Actor>`接口。`Set<E>`的类层次结构如下：\n\
    \n```\njava.lang.Object\n  > java.util.AbstractCollection<E>\n    > java.util.AbstractSet<E>\n\
    \      > java.util.HashSet<E>\n```\n\n`HashSet`类以**哈希表**的形式实现`Set<E>`接口，哈希表实际上是`HashMap`的一个实例。`HashSet`不保证对象`Set<E>`的迭代顺序；特别是，它不保证顺序随时间保持不变。此类允许使用一个`null`元素。\n\
    \n需要注意的是，`Set<E>`的实现是**不同步的**。如果多个线程同时访问你的`HashSet`对象，并且至少有一个线程修改了你的`Set<E>`，则应在外部进行同步。这通常通过同步某个自然封装了`Set<E>`（例如`HashSet`）的对象来实现。我们以非常基本的方式使用`HashSet`：保存因某种原因（例如找到宝藏、敌人被消灭或类似的游戏设计场景）从游戏中移除的对象。\n\
    \n`HashSet`类（及其对象）的优点之一是为基本数据集操作（如`.add()`、`.remove()`、`.contains()`和`.size()`方法）提供恒定时间的性能。对`HashSet`对象的迭代所需的时间与`Set<E>`对象实例的大小（由`Set<E>`中当前元素的数量加上底层`HashMap`对象实例的“容量”共同决定）之和成正比。\n\
    \n### 创建你的选角引擎：CastingDirector.java\n\n现在你已经对Java接口、Java集合框架以及由`ArrayList<E>`和`HashSet<E>`类实现的`List<E>`和`Set<E>`接口有了一些了解，我们可以继续创建基本的`CastingDirector`类。该类将维护一个`List`对象，用于存储当前场景中“活跃”的`Actor`对象；以及另一个`List`对象，用于存储应检查碰撞的`Actor`对象。此外，还会有一个`Set`对象来保存需要移除的`Actor`对象。右键单击NetBeans项目窗格中的**`invincibagel`**包文件夹，选择**新建\
    \ ![image](OEBPS/Images/arrow.jpg) Java类**菜单序列，调出**新建Java类**对话框，如[图10-2](#9781484204160_Ch10.xhtml#Fig2)所示。将新类命名为**`CastingDirector`**，并保留对话框中由NetBeans自动设置的其他字段。\n\
    \n![9781484204160_Fig10-02.jpg](OEBPS/Images/9781484204160_Fig10-02.jpg)\n\n[图10-2](#9781484204160_Ch10.xhtml#_Fig2).\
    \ 在`invincibagel`包中创建一个新的Java类；为InvinciBagel项目将其命名为`CastingDirector`\n\n我们将首先创建**`List<Actor>\
    \ ArrayList<Actor>`**对象，一个用于保存场景的当前演员阵容，第二个`List<Actor>`用于保存待检测碰撞的对象。之后，我们将创建**`Set<Actor>\
    \ HashSet<Actor>`**对象，它将提供一个无序的`Set`对象，用于收集需要从场景中移除的`Actor`对象。让我们开始创建`public CastingDirector`类的主体。\n\
    \n### 创建ArrayList对象：CURRENT_CAST数据存储列表\n\n我们需要添加到`CastingDirector`类的第一件事是一个私有的`List<Actor>\
    \ ArrayList<Actor>`对象，我将其命名为`CURRENT_CAST`，因为它包含当前在舞台上的`Actor`对象，即当前的演员阵容。虽然从技术上讲，在其声明中使用`static`和`final`关键字并不算常量，但它充当着某种数据库的角色，因此我使用全大写字母，使其在代码中作为数据结构脱颖而出。我还将添加一个基本的`.get()`方法来访问`ArrayList<Actor>`结构，使用Java的**`return`**关键字将对象返回给调用实体。`CURRENT_CAST`\
    \ `ArrayList`对象的声明和实例化代码，以及`.getCurrentCast()`方法结构的主体，应类似于以下Java代码：\n\n```\npackage\
    \ invincibagel;\npublic class CastingDirector {\n\nprivate List<Actor> CURRENT_CAST\
    \ = new ArrayList<>();\n\npublic List<Actor> getCurrentCast() {\n        return\
    \ CURRENT_CAST;\n    }\n}\n```\n\n如[图10-3](#9781484204160_Ch10.xhtml#Fig3)所示，在声明和实例化`CURRENT_CAST`对象的代码行中，`List`接口引用和`ArrayList`引用下方都有波浪形的红色错误高亮，因此你需要使用**`Alt-Enter`**工作流程，让NetBeans\
    \ 8在你的类顶部写入**`import java.util.List;`**语句。`.getCurrentCast()`将是最容易编写的方法，因为它只是将整个**`CURRENT_CAST`**\
    \ `ArrayList<Actor>`对象**返回**给任何可能调用该方法的Java实体。接下来，我们将看看如何编写更复杂的`ArrayList`数据存储访问方法，这些方法将处理从此`CURRENT_CAST`\
    \ `ArrayList<Actor>`对象中添加、移除和重置（清除）`Actor`对象。\n\n![9781484204160_Fig10-03.jpg](OEBPS/Images/9781484204160_Fig10-03.jpg)\n\
    \n[图10-3](#9781484204160_Ch10.xhtml#_Fig3). 在`CastingDirector`类内部，添加一个`CURRENT_CAST`\
    \ `List<Actor>`对象和一个`.getCurrentCast()`方法"
  raw: 'A Set<E> is an **unordered** Collection<E> and could also be thought of as
    a random collection of objects in no particular order. A Set<E> collection may
    contains **no duplicate elements**, and will throw an error, called an “exception,”
    if a duplicate element is added to the Set<E> or if any “mutable” (elements than
    can change into something else) element is changed into an element that duplicates
    another element already in the Set<E>. This no duplicates rule also means that
    at the most, a Set<E> can contain only **one single null** element. As all of
    you who are well versed in mathematics may have surmised already, this Set<E>
    interface is modeled after the **mathematical set** you learned about in school.


    The Set<E> interface places additional stipulations beyond those that are “inherited”
    from the Collection<E> super interface, on the “contracts” (requirements for all
    of you non-legal types) for all constructor methods, as well as on the contracts
    (requirements) of the **.add()**, **.equals()**, and **.hashCode()** related methods.


    The additional stipulations on these constructor methods is, according to rule,
    that all constructors must create a Set<E> containing zero duplicate elements.


    As mentioned earlier, you must be careful regarding what you are doing if mutable
    (changeable) objects are used as elements in a Set<E> collection. The behavior
    of the Set<E> is not specified if the value of an object is changed in a manner
    that affects the .equals() method comparisons while the mutable object is an element
    in that Set<E>. The special case of this prohibition is that it is not permissible
    for a Set<E> to contain itself as an element, as a List<E> can.


    The java.util HashSet Class: Using Unordered Sets of Objects


    Next, let’s cover the **public** class **HashSet<E>** that is a member of the
    Java Collections Framework as well. This class that provides a HashSet object
    container for the Set<E> interface specification is similar to the way that the
    ArrayList<E> class creates an ArrayList object container for the List<E> interface.
    The HashSet class can “**implement**” or support the following Java Interfaces:
    Serializable, Cloneable, Iterable<E>, Collection<E>, and Set<E>. We will be using
    the Set<E>, or in our case, Set<Actor> interface, in our CastingDirector.java
    class. The Set<E> class hierarchy is as follows:


    ```

    java.lang.Object

      > java.util.AbstractCollection<E>

        > java.util.AbstractSet<E>

          > java.util.HashSet<E>

    ```


    The HashSet class implements the Set<E> interface in the form of a **hash table**,
    which is actually an instance of a **HashMap**. The HashSet makes no guarantees
    as to the iteration order of the Set<E> of objects; in particular, it does not
    guarantee that the order will remain constant over time. This class permits the
    use of one null element.


    It is important to note that the Set<E> implementation is **not synchronized**.
    If multiple threads access your HashSet object concurrently, and at least one
    of these threads modifies your Set<E>, then it should be synchronized externally.
    This is typically accomplished by synchronizing on some object that naturally
    encapsulates the Set<E> such as the HashSet. We are using the HashSet in a very
    basic fashion: to hold objects that are removed from the game play for one reason
    or another, such as treasure being found; enemies being eliminated; or similar
    game design scenarios.


    One of the advantages of the HashSet class (and object) offers is a constant time
    performance for your basic dataset operations such as the .add(), .remove(), .contains(),
    and .size() methods. Iteration over a HashSet object will require a time period
    proportional to the sum of the Set<E> object instance size, which is determined
    by the number of elements currently in the Set<E> combined with the “capacity”
    of the backing HashMap object instance.


    Creating Your Casting Engine: CastingDirector.java


    Now that you have some background on Java interfaces, the Java Collection Framework,
    and its List<E> and Set<E> interfaces implemented by the ArrayList<E> and HashSet<E>
    classes, we can move on to create our basic CastingDirector class. The class will
    keep a List object of what Actor objects are currently “in play” in the current
    scene and another List object of what Actor objects should be checked for collisions.
    There will also be a Set object to hold Actor objects that need to be removed.
    Right-click on the **invincibagel** package folder in the NetBeans Projects pane,
    and select the **New ![image](OEBPS/Images/arrow.jpg) Java Class** menu sequence
    to bring up the **New Java Class** dialog, which is shown in [Figure 10-2](#9781484204160_Ch10.xhtml#Fig2).
    Name the new class **CastingDirector** and leave the other fields in the dialog,
    which are automatically set by NetBeans.


    ![9781484204160_Fig10-02.jpg](OEBPS/Images/9781484204160_Fig10-02.jpg)


    [Figure 10-2](#9781484204160_Ch10.xhtml#_Fig2). Create a New Java Class in the
    invincibagel package; name it CastingDirector for the InvinciBagel Project


    We will start by creating the **List<Actor> ArrayList<Actor>** objects first,
    one to hold the current cast for your scene and then a second List<Actor> to hold
    objects to be checked for collision detection. After that we will create the **Set<Actor>
    HashSet<Actor>** object, which will provide an unordered Set object, which will
    collect those Actor objects that need to be removed from the scene. Let’s get
    started creating the body of our public CastingDirector class.


    Creating an ArrayList Object: CURRENT_CAST Data Store List


    The first thing that we need to add to the CastingDirector class is a private
    List<Actor> ArrayList<Actor> object that I am going to name CURRENT_CAST as it
    contains the Actor objects that are currently on the Stage, which is the current
    cast. Although it is not technically a constant as far as using static and final
    keywords in its declaration, it is acting (no pun intended) as a database of sorts,
    and so I am using ALL_CAPS so that it stands out in the code as being a data structure.
    I’m also going to add a basic .get() method to access the ArrayList<Actor> structure
    using a Java **return** keyword to return an object to the calling entity. The
    code for the declaration and instantiation of the CURRENT_CAST ArrayList object
    and the body of the .getCurrentCast() method structure should look like the following
    Java code:


    ```

    package invincibagel;

    public class CastingDirector {


    private List<Actor> CURRENT_CAST = new ArrayList<>();


    public List<Actor> getCurrentCast() {

            return CURRENT_CAST;

        }

    }

    ```


    As you can see in [Figure 10-3](#9781484204160_Ch10.xhtml#Fig3), there is wavy
    red error highlighting under your List interface reference as well as your ArrayList
    reference in the line of code that declares and instantiates the CURRENT_CAST
    object, so you’ll need to use the **Alt-Enter** work process, and have NetBeans
    8 write the **import java.util.List;** statement at the top of your class. The
    **.getCurrentCast()** will be the easiest method to code, as it simply **returns**
    your entire **CURRENT_CAST** ArrayList<Actor> object to whatever Java entity may
    be calling the method. Next, we’ll take a look at how to code the more complicated
    ArrayList data store access methods, which will deal with adding, removing, and
    resetting (clearing) the Actor objects from this CURRENT_CAST ArrayList<Actor>
    object.


    ![9781484204160_Fig10-03.jpg](OEBPS/Images/9781484204160_Fig10-03.jpg)


    [Figure 10-3](#9781484204160_Ch10.xhtml#_Fig3). Inside the CastingDirector class,
    add a CURRENT_CAST List<Actor> object, and a .getCurrentCast() method'
