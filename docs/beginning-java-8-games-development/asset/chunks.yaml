- fmt: '# Java 中的十六进制值


    Java 中的十六进制值总是以`0`和`x`开头，例如：`0xFFFFFF`。这个十六进制颜色值代表`Color.WHITE`常量，并且不使用 alpha
    通道。在这个**24 位十六进制表示**中的六个位置，每个位置代表一个单独的 Base16 值，因此要获得每个 RGB 颜色所需的 256 个值，需要两个位置，因为`16
    × 16 = 256`。因此，要使用十六进制表示法表示 24 位图像，你需要在井号后面有六个位置来存放六个十六进制数据值（每个数据对代表 256 个级别的值）。如果你计算`16
    × 16 × 16 × 16 × 16 × 16`，你将得到使用 24 位真彩色图像数据可能产生的 16,777,216 种颜色。


    十六进制数据位置以以下格式表示 RGB 值：`0xRRGGBB`。对于 Java 常量`Color.WHITE`，十六进制颜色数据值表示中的所有红色、绿色和蓝色通道都处于完全（最大颜色值）亮度设置。如果你将这些颜色全部相加，你将得到白光。


    黄色将由红色和绿色通道开启、蓝色通道关闭来表示，因此`Color.YELLOW`的十六进制表示将是`0xFFFF00`，其中红色和绿色通道位置完全开启（`FF`，即
    Base10 数据值 255），而蓝色通道位置完全关闭（`00`，即值 0）。


    ARGB 值的八个十六进制数据位置将以以下格式存放数据：`0xAARRGGBB`。因此，对于`Color.WHITE`，十六进制颜色数据值表示中的所有 alpha、红色、绿色和蓝色通道都将处于其最大亮度（或不透明度），并且
    alpha 通道将完全不透明，即不透明，由`FF`值表示。因此，`Color.WHITE`常量的十六进制值将是`0xFFFFFFFF`。


    100% 透明的 alpha 通道可以通过将 alpha 位置设置为`0`来表示，正如你在创建无窗口 Java 8 应用程序时所观察到的（参见[第 4 章](#9781484204160_Ch04.xhtml)）。因此，你将使用`0x00000000`到`0x00FFFFFF`之间的任何值来表示透明图像像素值。需要注意的是，如果
    alpha 通道值等于完全透明，那么其他六个（RGB）十六进制数据值位置中包含的 16,777,216 种颜色值将完全无关紧要，因为该像素是透明的，将被评估为不存在，因此不会在最终图像或动画合成图像中合成。


    # 数字图像遮罩：使用 Alpha 通道创建游戏精灵


    在游戏设计中，alpha 通道的主要应用之一是**遮罩**图像或动画（一系列图像）的某些区域，以便它可以在游戏图像合成场景中用作游戏精灵。**遮罩**是从数字图像中裁剪出主题的过程，以便可以使用
    alpha 通道透明度值将主题放置在其自己的虚拟层上。这是使用数字成像软件包（例如 GIMP）完成的。


    数字图像合成软件包，例如 Photoshop 和 GIMP，提供了用于遮罩和图像合成的工具。如果不进行有效的遮罩，就无法进行有效的图像合成，因此对于希望将图形元素（例如图像精灵和精灵动画）集成到其游戏设计中的游戏设计师来说，这是一个需要掌握的重要领域。数字图像遮罩艺术已经存在了很长时间！


    遮罩可以自动为你完成，使用专业的蓝屏（或绿屏）背景，以及可以自动提取这些精确颜色值以创建遮罩的计算机软件，该遮罩会转换为 alpha 通道（透明度）信息（数据）。遮罩也可以手动完成，使用数字图像软件，通过算法选择工具之一，结合各种锐化和模糊算法。


    在本课程中，你将使用常见的开源软件包（例如 GIMP）学习很多关于此工作流程的知识。遮罩可能是一个复杂且涉及面广的工作流程。本章旨在让你接触基础知识，这些知识将支撑你在学习本书过程中进行的工作。


    遮罩过程中的一个关键考虑因素是围绕遮罩对象（主题）获得平滑、锐利的边缘。这样，当你将遮罩对象（在本例中为游戏精灵）放置到（覆盖）新的背景图像上时，它看起来就像最初在那里拍摄的一样。成功做到这一点的关键在于你的**选择**工作流程，这需要以正确的方式使用数字图像软件**选择工具**，例如
    GIMP 中的**剪刀**工具或 Photoshop 中的**魔棒**工具。选择正确的工作流程至关重要！


    例如，如果你要遮罩的对象周围有**均匀颜色**的区域（也许你是在蓝屏前拍摄的），你将使用带有适当**阈值**设置的魔棒工具来选择除对象之外的所有内容。然后，你**反转****选区**，这将为你提供一个包含对象的**选择集**。通常，正确的工作流程需要反向处理某些事情。其他选择工具包含复杂的算法，可以查看像素之间的颜色变化。这些对于**边缘检测**很有用，你可以将其用于其他选择方法。


    # 平滑数字图像合成：使用抗锯齿平滑图像边缘


    **抗锯齿**是一种流行的数字图像合成技术，其中数字图像中两种相邻颜色沿着边界这两种颜色区域的**边缘**进行**混合**。这可以欺骗观看者的眼睛，使其在图像缩小时看到更平滑（锯齿更少）的边缘，从而消除了所谓的图像锯齿。抗锯齿通过使用平均颜色值（介于两种颜色之间的颜色范围），仅沿着需要平滑的边缘使用几个彩色像素，从而提供了令人印象深刻的结果。


    让我们看一个例子来理解我在说什么。[图 5-2](#9781484204160_Ch05.xhtml#Fig2) 显示了一个看起来非常锐利的红色圆形位于一个图层上，覆盖在背景图层的黄色填充色上。我放大了红色圆形的边缘，然后截取了另一张屏幕截图，将其放置在缩小后的圆形右侧。这张屏幕截图揭示了在红色和黄色颜色交界处（圆形与背景相遇的地方）边缘上的一系列抗锯齿颜色值（黄橙色、橙色、红橙色）。


    ![9781484204160_Fig05-02.jpg](OEBPS/Images/9781484204160_Fig05-02.jpg)


    [图 5-2](#9781484204160_Ch05.xhtml#_Fig2). 合成在黄色背景上的红色圆形（左）和显示抗锯齿的放大视图（右）


    需要注意的是，JavaFX 引擎将使用 Java2D 软件渲染器或使用 Prism 引擎（可以使用 OpenGL 或 DirectX）的硬件渲染，对所有背景颜色和背景图像上的
    2D 形状和 3D 对象进行抗锯齿处理。你仍然需要负责正确合成，即使用每个图像的 alpha 通道为你的多层图像提供抗锯齿。


