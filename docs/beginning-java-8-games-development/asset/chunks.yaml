- fmt: '![9781484204160_Fig16-14.jpg](OEBPS/Images/9781484204160_Fig16-14.jpg)


    [Figure 16-14](#9781484204160_Ch16.xhtml#_Fig14). Collision polygon is correct
    using integer data (left); deselect visibility in Layers Palette (right) to see
    SVG


    You may have noticed that there are three identical X,Y data point coordinate
    values for every point, except for the starting and ending point, for which we
    have data point pairs instead of data point triplets. If you recall back in [Table
    16-1](#9781484204160_Ch16.xhtml#Tab1), the only SVG command that uses triplet
    (three) X,Y data point pairs is the `C`, or Cubic Bezier (Spline) Curve. Sure
    enough, as you see in [Figure 16-15](#9781484204160_Ch16.xhtml#Fig15), right under
    the `M` (moveto) opening SVG command is the `C` command. This explains why GIMP
    put three data points in each point in your polygon. The reason all the data point
    triplets have the **same value** is because we checked the **polygon** option
    in GIMP. This puts the spline curve control handles “away” or out of sight, directly
    on top of the X,Y data point. This defines zero curvature, or the square polygon
    structure seen in [Figure 16-14](#9781484204160_Ch16.xhtml#Fig14).


    Let’s export the SVG data with the triplets removed, which is shown in [Figure
    16-15](#9781484204160_Ch16.xhtml#Fig15), and see what the result looks like in
    GIMP, using our newfound Import Path work process, primarily for learning purposes,
    as we are not quite finished with the optimization work process.


    ![9781484204160_Fig16-15.jpg](OEBPS/Images/9781484204160_Fig16-15.jpg)


    [Figure 16-15](#9781484204160_Ch16.xhtml#_Fig15). Remove duplicate point data
    for those points in the interior of the collision polygon, to further optimize


    Save the XML data shown in [Figure 16-15](#9781484204160_Ch16.xhtml#Fig15) as
    `sprite1svghandintegerxmloptimized.txt` and then use the same Import Path work
    process, shown in [Figures 16-12](#9781484204160_Ch16.xhtml#Fig12) and 6-13, to
    import this further optimized SVG data set into GIMP. As you can see in [Figure
    16-16](#9781484204160_Ch16.xhtml#Fig16), removing those cubic Bezier curve control
    handles from the data set also removes the polygonal nature of your collision
    polygon. So, we will need to do some further work on our SVG data to correct this.


    ![9781484204160_Fig16-16.jpg](OEBPS/Images/9781484204160_Fig16-16.jpg)


    [Figure 16-16](#9781484204160_Ch16.xhtml#_Fig16). Import the latest SVG data with
    data triplets deleted into GIMP to see curve without tension handle data


    The solution to turn these non-conforming (to the sprite outline) curves into
    the same collision polygon that we had before is quite simple, and you may have
    already guessed what it is. Since we want **straight lines** between our data
    points, we need to change this `C` to an `L`. This will turn a `curveto` SVG command
    into a `lineto` SVG command.


    As you can see in [Figure 16-17](#9781484204160_Ch16.xhtml#Fig17), our collision
    polygon data is almost where we expected it to be, containing 16 data point pairs
    and a `Z` closing command to create a 16-sided collision polygon. We can remove
    the first duplicate data pair, reducing the data set to 15 data point pairs, which
    is what we “laid down” in GIMP. Next, let’s again use our **Import Path** work
    process in GIMP, and see if we get the same square polygon result that is shown
    in [Figure 16-14](#9781484204160_Ch16.xhtml#Fig14).


    ![9781484204160_Fig16-17.jpg](OEBPS/Images/9781484204160_Fig16-17.jpg)


    [Figure 16-17](#9781484204160_Ch16.xhtml#_Fig17). Change your SVG Path data from
    using the `C` (curve) data type to the `L` (line) data type representation


    The final SVG data set is shown in [Figure 16-18](#9781484204160_Ch16.xhtml#Fig18),
    and you can copy and paste that data into your Java code as well as into an empty
    Notepad document and save it as its own file, named `iBshape1svg.txt`, so that
    we can do some math next, and see exactly how much data we have reduced our collision
    polygon from the automatic GIMP created collision polygon, to our hand-optimized
    custom collision polygon. If you import the collision data shown in [Figure 16-18](#9781484204160_Ch16.xhtml#Fig18)
    in GIMP, you will get the desired collision polygon shown in [Figure 16-14](#9781484204160_Ch16.xhtml#Fig14)
    with 15 data point pairs, instead of 100!


    ![9781484204160_Fig16-18.jpg](OEBPS/Images/9781484204160_Fig16-18.jpg)


    [Figure 16-18](#9781484204160_Ch16.xhtml#_Fig18). To use optimized SVG Path data
    set, select the part after `d=` (including quotes), and paste into the code


    ## Ascertaining Collision Data Optimization: Calculating Data Footprint for SVG
    Data


    Let’s figure out our data footprint optimization percentage. The SVG data culled
    from the file shown in [Figure 16-18](#9781484204160_Ch16.xhtml#Fig18), and put
    into the format we will use in our `Bagel()` constructor method call, can be seen
    in the top part of [Figure 16-19](#9781484204160_Ch16.xhtml#Fig19).


    Mouse-over both `iBshape1svg` files, seen in [Figures 16-19](#9781484204160_Ch16.xhtml#Fig19)
    and [16-20](#9781484204160_Ch16.xhtml#Fig20), and get the file size, or right-click
    on the file, and use a **Properties** dialog to find the number of bytes in the
    files. This should be **97** bytes and **1,605** bytes.


    ![9781484204160_Fig16-19.jpg](OEBPS/Images/9781484204160_Fig16-19.jpg)


    [Figure 16-19](#9781484204160_Ch16.xhtml#_Fig19). Open folder in your workstation
    containing the SVG data, and mouse-over file to see the number of bytes


    ![9781484204160_Fig16-20.jpg](OEBPS/Images/9781484204160_Fig16-20.jpg)


    [Figure 16-20](#9781484204160_Ch16.xhtml#_Fig20). Mouse-over the original Fuzzy
    Select Tool generated SVG data to get the data footprint, and do the math


    To find out the data footprint optimization, simply divide these numbers into
    each other. If you divide 97 by 1605 (97/1605=0.0604) you find that 97 is 6% of
    1605, giving you a **94%** reduction in data footprint. If you divide 1605 by
    97 (1605/97=16.546) it means you have reduced the file by 16.546 times, giving
    a **16.55X** data footprint reduction. These are the inverse (1/x) of each other
    on the calculator, so you can look at it from either direction. So 1605 bytes
    is 1,655% more data than 97 bytes, or 97 bytes is 6% (or 94% less data) of 1605
    bytes. Any way that you look at it, you have just saved your game a whole lot
    of memory, processing, and JAR file data footprint, and that is only for one of
    the sprites! Remember that optimizing your collision polygon to use more than
    16 times less memory as well as 16 times less CPU processing overhead can be very
    significant to the smoothness of your game play once you implement collision detection
    in your game logic, which we are going to do after we take a look at CodeAndWeb’s
    PhysEd tool.


    ## Creating and Optimizing Physics Data: Using PhysEd'
