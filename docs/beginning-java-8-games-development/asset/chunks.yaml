- fmt: "# JavaFX Image Class: Preparing Digital Image Assets\n\nTherefore, the `Image`\
    \ class (object) is used to prepare a digital image asset for use, that is, to\
    \ read its data from a URL; resize them, if necessary (using whatever smoothing\
    \ and aspect ratio lock you like); and load them asynchronously, while other things\
    \ are going on in your application. It is important to note that the `Image` class\
    \ (or object) does not display an image asset: the `Image` class just loads it;\
    \ scales it, if needed; and places it in system memory to be used in your application.\n\
    \nTo display an `Image` object, you will need to use a second class (object),\
    \ called an `ImageView` class. The `ImageView` object can be used as a node on\
    \ your Scene Graph and references and then “paints” the `Image` object data onto\
    \ the layout container, which holds the `ImageView` node (in this case, a `StackPane`\
    \ Scene Graph root and `Parent` node to the leaf `ImageView` node). I will be\
    \ covering the `ImageView` class in the next section.\n\nFrom a digital image–compositing\
    \ perspective, the `StackPane` class (object) is the image-compositing engine,\
    \ or layer manager, if you will, and each `ImageView` object represents an individual\
    \ layer in the layer stack. An `Image` object contains the digital image data\
    \ in the `ImageView` layer or in more than one `ImageView`, if needed, as the\
    \ `Image` objects and the `ImageView` objects are decoupled and exist independently\
    \ of each other.\n\n# JavaFX ImageView Class: Displaying Digital Images in a Design\n\
    \nThe `ImageView` class is a `public` class that directly extends the `javafx.scene.Node`\
    \ superclass, which is an extension of the `java.lang.Object` (see [Chapter 4](#9781484204160_Ch04.xhtml)).\
    \ The `ImageView` object is therefore a type of `Node` object in the JavaFX Scene\
    \ Graph that is used for painting a view, using the data contained in an `Image`\
    \ object. The class has methods that allow image resampling (resizing), and, as\
    \ with the `Image` class, you can lock the aspect ratio for scaling as well as\
    \ specify the resampling algorithm (smoothing quality).\n\nThe Java class hierarchy\
    \ for the `ImageView` class starts with the `java.lang.Object` master class and\
    \ uses this class to create the `javafx.scene.Node` class, which is then employed\
    \ to create an `ImageView` Node subclass. As [Figure 6-4](#9781484204160_Ch06.xhtml#Fig4)\
    \ illustrates (l. 10), like the `Image` class, `ImageView` is contained in the\
    \ JavaFX image package. The `ImageView` class uses the following Java class inheritance\
    \ hierarchy structure:\n\n```\njava.lang.Object\n  > javafx.scene.Node\n    >\
    \ javafx.scene.image.ImageView\n```\n\nThe `ImageView` class provides three different\
    \ (overloaded) `ImageView()` constructor methods. These range from an empty constructor\
    \ (which is the one you are going to use later on, in your code); to one that\
    \ takes an `Image` object as its parameter; to one that takes a URL `String` object\
    \ as the parameter and creates the `Image` object automatically. To create an\
    \ `ImageView` object, the simple (empty) `ImageView()` constructor method uses\
    \ the following format:\n\n```\nImageView()\n```\n\nYou will be employing this\
    \ constructor method so that I can show you how to use the `.setImage()` method\
    \ call to load an `Image` object into an `ImageView` object. If you want to avoid\
    \ using the `.setImage()` method call, you can use the overloaded constructor\
    \ method, which has the following format:\n\n```\nImageView(Image image)\n```\n\
    \nSo, to set up an `ImageView` “explicitly” and wire it to the `Image` object\
    \ looks like this:\n\n```\nsplashScreenBackplate = new ImageView();      // This\
    \ uses the empty constructor method approach\nsplashScreenBackplate.setImage(splashScreen);\n\
    ```\n\nYou can condense this into one line of code, using an overloaded constructor\
    \ method, structured as follows:\n\n```\nsplashScreenBackplate = new ImageView(splashScreen);\
    \  // using the overloaded constructor method\n```\n\nIf you want to bypass the\
    \ process of creating and loading an `Image` object, there is a constructor method\
    \ for that as well, which uses the following format:\n\n```\nImageView(String\
    \ url)\n```\n\nTo load an image in the background (asynchronously), using its\
    \ native (default) resolution and native aspect ratio, the `Image()` constructor\
    \ uses the following format:\n\n```\nsplashScreen = new Image(\"/invincibagelsplash.png\"\
    , 640, 400, true, false, true);\nsplashScreenBackplate = new ImageView();\nsplashScreenBackplate.setImage(splashScreen);\
    \   // uses the empty constructor method approach\n```\n\nIf you did not want\
    \ to specify the image dimensions, background image loading, and smooth scaling,\
    \ or lock the aspect ratio for any scaling, you could condense the previous three\
    \ lines of Java code into the following constructor:\n\n```\nsplashScreenBackplate\
    \ = new ImageView(\"/invincibagel.png\");   // uses third constructor method\n\
    ```\n\nAt least initially (for learning purposes), I am going to do this the long\
    \ way, and I will always explicitly load `Image` objects, using the `Image()`\
    \ constructor method, so that you can specify all the different attributes and\
    \ see all the different image assets that you are using in this Java programming\
    \ logic. I want to show you the shortcut code here, because you will be using\
    \ this approach later in the book, once you start using `ImageView`s as sprites\
    \ (see [Chapter 8](#9781484204160_Ch08.xhtml)). You can use this shortcut approach\
    \ with your sprites because you will not be scaling them and because they are\
    \ so highly optimized that background loading will not be necessary.\n\nNext,\
    \ let’s take a quick look at the `TableView` class, which will hold the high scores\
    \ table. Although you will not be implementing this here, I will cover the class,\
    \ as it is part of the top-level UI design that you are creating and implementing\
    \ in this chapter.\n\n# The JavaFX TableView Class: Displaying Data Tables in\
    \ a Design\n\nThe `TableView` class is a `public` class that directly extends\
    \ the `javafx.scene.control.Control` superclass, which is an extension of `javafx.scene.layout.Region`.\
    \ `javafx.scene.layout.Region` is an extension of the `javafx.scene.Parent`, which\
    \ is an extension of the `javafx.scene.Node` Scene Graph superclass (see [Chapter\
    \ 4](#9781484204160_Ch04.xhtml)). A `TableView<S>` object is therefore a type\
    \ of UI control (a table) and a `Node` object in the JavaFX Scene Graph that is\
    \ used for constructing a table, using `S` objects, each of which contains data\
    \ to be displayed in a table. You will be writing data into a `TableView<S>` object\
    \ later in the book, using these `S` objects, after scores have been achieved\
    \ that eclipse those currently listed in the table.\n\nThe Java class hierarchy\
    \ for the `TableView` class starts with the `java.lang.Object` master class and\
    \ uses this class to create the `javafx.scene.Node` class, which is then used\
    \ to create a `Parent` class. This is used to create a `Region` class, which in\
    \ turn creates a `Control` class, which is used to create the `TableView` class.\
    \ The `TableView` class has the following Java class inheritance hierarchy structure:\n\
    \n```\njava.lang.Object\n  > javafx.scene.Node\n    > javafx.scene.Parent\n  \
    \    > javafx.scene.layout.Region\n        > javafx.scene.control.Control\n  \
    \        > javafx.scene.control.TableView<S>\n```\n\nThe `TableView` class provides\
    \ two different (overloaded) `TableView()` constructor methods, an empty constructor\
    \ and a constructor that takes an `ObservableList<S>` object, filled with Table\
    \ data items as a parameter. A simple (empty) `TableView()` constructor method\
    \ to create an empty `TableView` object will use the following format:\n\n```\n\
    TableView()\n```\n\nThe second constructor type uses an `ObservableList<E>` class\
    \ (object) from the `javafx.collections` package, which is a type of list that\
    \ allows a data change event listener to track any changes in the list as they\
    \ occur. This `TableView` object constructor method call uses the following format:\n\
    \n```\nTableView(ObservableList<S> items)\n```"
  raw: 'Therefore, the Image class (object) is used to prepare a digital image asset
    for use, that is, to read its data from a URL; resize them, if necessary (using
    whatever smoothing and aspect ratio lock you like); and load them asynchronously,
    while other things are going on in your application. It is important to note that
    the Image class (or object) does not display an image asset: the Image class just
    loads it; scales it, if needed; and places it in system memory to be used in your
    application.


    To display an Image object, you will need to use a second class (object), called
    an ImageView class. The ImageView object can be used as a node on your Scene Graph
    and references and then “paints” the Image object data onto the layout container,
    which holds the ImageView node (in this case, a StackPane Scene Graph root and
    Parent node to the leaf ImageView node). I will be covering the ImageView class
    in the next section.


    From a digital image–compositing perspective, the StackPane class (object) is
    the image-compositing engine, or layer manager, if you will, and each ImageView
    object represents an individual layer in the layer stack. An Image object contains
    the digital image data in the ImageView layer or in more than one ImageView, if
    needed, as the Image objects and the ImageView objects are decoupled and exist
    independently of each other.


    JavaFX ImageView Class: Displaying Digital Images in a Design


    The **ImageView** class is a **public** class that directly extends the javafx.scene.Node
    superclass, which is an extension of the java.lang.Object (see [Chapter 4](#9781484204160_Ch04.xhtml)).
    The ImageView object is therefore a type of **Node** object in the JavaFX Scene
    Graph that is used for painting a view, using the data contained in an Image object.
    The class has methods that allow image resampling (resizing), and, as with the
    Image class, you can lock the aspect ratio for scaling as well as specify the
    resampling algorithm (smoothing quality).


    The Java class hierarchy for the ImageView class starts with the **java.lang.Object**
    master class and uses this class to create the **javafx.scene.Node** class, which
    is then employed to create an ImageView Node subclass. As [Figure 6-4](#9781484204160_Ch06.xhtml#Fig4)
    illustrates (l. 10), like the Image class, ImageView is contained in the JavaFX
    image package. The ImageView class uses the following Java class inheritance hierarchy
    structure:


    ```

    java.lang.Object

      > javafx.scene.Node

        > javafx.scene.image.ImageView

    ```


    The ImageView class provides three different (overloaded) **ImageView()** constructor
    methods. These range from an empty constructor (which is the one you are going
    to use later on, in your code); to one that takes an Image object as its parameter;
    to one that takes a URL String object as the parameter and creates the Image object
    automatically. To create an ImageView object, the simple (empty) ImageView() constructor
    method uses the following format:


    ```

    ImageView()

    ```


    You will be employing this constructor method so that I can show you how to use
    the **.setImage()** method call to load an Image object into an ImageView object.
    If you want to avoid using the .setImage() method call, you can use the overloaded
    constructor method, which has the following format:


    ```

    ImageView(Image image)

    ```


    So, to set up an ImageView “explicitly” and wire it to the Image object looks
    like this:


    ```

    splashScreenBackplate = new ImageView();      // This uses the empty constructor
    method approach

    splashScreenBackplate.setImage(splashScreen);

    ```


    You can condense this into one line of code, using an overloaded constructor method,
    structured as follows:


    ```

    splashScreenBackplate = new ImageView(splashScreen);  // using the overloaded
    constructor method

    ```


    If you want to bypass the process of creating and loading an Image object, there
    is a constructor method for that as well, which uses the following format:


    ```

    ImageView(String url)

    ```


    To load an image in the background (**asynchronously**), using its native (default)
    resolution and native aspect ratio, the Image() constructor uses the following
    format:


    ```

    splashScreen = new Image("/invincibagelsplash.png", 640, 400, true, false, true);

    splashScreenBackplate = new ImageView();

    splashScreenBackplate.setImage(splashScreen);   // uses the empty constructor
    method approach

    ```


    If you did not want to specify the image dimensions, background image loading,
    and smooth scaling, or lock the aspect ratio for any scaling, you could condense
    the previous three lines of Java code into the following constructor:


    ```

    splashScreenBackplate = new ImageView("/invincibagel.png");   // uses third constructor
    method

    ```


    At least initially (for learning purposes), I am going to do this the long way,
    and I will always explicitly load Image objects, using the Image() constructor
    method, so that you can specify all the different attributes and see all the different
    image assets that you are using in this Java programming logic. I want to show
    you the shortcut code here, because you will be using this approach later in the
    book, once you start using ImageViews as sprites (see [Chapter 8](#9781484204160_Ch08.xhtml)).
    You can use this shortcut approach with your sprites because you will not be scaling
    them and because they are so highly optimized that background loading will not
    be necessary.


    Next, let’s take a quick look at the TableView class, which will hold the high
    scores table. Although you will not be implementing this here, I will cover the
    class, as it is part of the top-level UI design that you are creating and implementing
    in this chapter.


    The JavaFX TableView Class: Displaying Data Tables in a Design


    The **TableView** class is a **public** class that directly extends the **javafx.scene.control.Control**
    superclass, which is an extension of javafx.scene.layout.Region. javafx.scene.layout.Region
    is an extension of the javafx.scene.Parent, which is an extension of the javafx.scene.Node
    Scene Graph superclass (see [Chapter 4](#9781484204160_Ch04.xhtml)). A TableView<S>
    object is therefore a type of UI control (a table) and a Node object in the JavaFX
    Scene Graph that is used for constructing a table, using S objects, each of which
    contains data to be displayed in a table. You will be writing data into a TableView<S>
    object later in the book, using these S objects, after scores have been achieved
    that eclipse those currently listed in the table.


    The Java class hierarchy for the TableView class starts with the **java.lang.Object**
    master class and uses this class to create the **javafx.scene.Node** class, which
    is then used to create a Parent class. This is used to create a Region class,
    which in turn creates a Control class, which is used to create the TableView class.
    The TableView class has the following Java class inheritance hierarchy structure:


    ```

    java.lang.Object

      > javafx.scene.Node

        > javafx.scene.Parent

          > javafx.scene.layout.Region

            > javafx.scene.control.Control

              > javafx.scene.control.TableView<S>

    ```


    The TableView class provides two different (overloaded) **TableView()** constructor
    methods, an empty constructor and a constructor that takes an **ObservableList<S>**
    object, filled with Table data items as a parameter. A simple (empty) TableView()
    constructor method to create an empty TableView object will use the following
    format:


    ```

    TableView()

    ```


    The second constructor type uses an **ObservableList<E>** class (object) from
    the **javafx.collections** package, which is a type of list that allows a data
    change event listener to track any changes in the list as they occur. This TableView
    object constructor method call uses the following format:


    ```

    TableView(ObservableList<S> items)

    ```'
