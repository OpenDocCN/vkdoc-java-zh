- fmt: '# Setting Boundaries for Your Action Figure in 2D: Using the Node Class `LocalToParent`
    Attribute


    Now that we have organized your Java code into logical methods in the `InvinciBagel.java`
    class, and wired up the `GamePlayLoop.handle()` method to the `Bagel.update()`
    method in [Chapter 10](#9781484204160_Ch10.xhtml), to make sure that our `KeyEvent`
    handlers will move our `InvinciBagel` character around the screen, it is time
    to establish some **boundaries** for our game hero, so that he does not leave
    the field of play, so to speak. To do this, we will need to dive into the JavaFX
    `Node` superclass at a much deeper level of detail than we did in [Chapter 4](#9781484204160_Ch4.xhtml).
    We will look at how **transforms** are performed, and more important, how they
    function **relative** to the Parent Node, which is located above them in the Scene
    Graph. For our Actor `ImageView` Node(s), that Parent Node would be the Scene
    Graph **root** `StackPane` Node.


    Before we start getting into code complexities such as absolute or relative transformation,
    which we will be looking at during this chapter, and things such as collision
    detection and physics simulation, which we will cover later in [Chapters 16](#9781484204160_Ch16.xhtml)
    and [17](#9781484204160_Ch17.xhtml), we will need to get back into our `InvinciBagel.java`
    primary application class Java code here in [Chapter 12](#9781484204160_Ch12.xhtml),
    so that we can do a few more things that will optimize the Java 8 foundation for
    our game. We have been putting our game engines into place during the first part
    of this book, and I want to make sure that everything is “up to snuff” before
    I start to build complex code structures on top of what we have put into place
    so far. We’re going to make sure everything is “locked down tightly!”


    For this reason, I am going to spend the first few pages of this chapter getting
    rid of those `import static` Java statements, which although they work just fine,
    as you have seen, they are not what is termed “**best practice**” in Java programming.
    There is a more complex and involved way to talk between classes, involving a
    Java `this` keyword, so I am going to show you how to implement far more **private**
    variables (and far less static variables), and then I will teach you how to use
    reference objects, represented by the Java `this` keyword, to send object data
    variables between classes.


    This is a somewhat advanced topic for a beginner level book, but it will allow
    you to write more professional and “industry standard” Java 8 code, so it will
    be worth the extra effort. Sometimes, the right way to do things is more involved
    and detailed than the basic (simple) way to get things coded. The assumption here
    is that you are going to be producing a commercially viable game, so you will
    need a rock solid foundation to build increasingly complex code on.


    After we finish adding additional code refinements in our `InvinciBagel.java`
    class, which will implement Java “encapsulation” using **private** variables wherever
    possible, and the `this` keyword where needed to provide access to the `InvinciBagel`
    object to other related classes—in this case, the `GamePlayLoop` and `Bagel` classes
    for now—we will begin to add complexity to the sprite movement code that is in
    our `Bagel` class `update()` method.


    We will add code that will tell your `InvinciBagel` character where the ceiling
    and floor of his Scene and Stage are located, and where the left and right sides
    of the screen are, so that he does not fall off of his flat 2D world. We will
    also organize the methods in the `Bagel.java` class, so that the `update()` method
    only calls higher-level methods that contain all of the Java programming logic
    in an exceptionally well organized fashion.


    ## InvinciBagel Privatization: Removing Static Modifiers


    The first thing that I want to do regarding the `InvinciBagel.java` class Java
    code, as well as the `GamePlayLoop.java` class code and the `Bagel.java` class
    code that both reference the `InvinciBagel` up, down, left, and right Boolean
    variables by using `import static` statements, is to **remove** these `import
    static` statements from the top of both of these “worker” classes, and instead
    pass an `InvinciBagel` class (**context**) object, using the Java `this` keyword,
    in the `Bagel()` constructor method as well as in the `GamePlayLoop()` constructor
    method. The first step in this process, which will span the next several pages
    of the chapter, is to change the `public static boolean` variable declaration
    compound statement to not use a `static` modifier, and instead of the `public`
    access control modifier, to use the `private` keyword, as is shown here:


    ```

    private boolean up, down, left, right;

    ```


    As you can see in [Figure 12-1](#9781484204160_Ch12.xhtml#Fig1), this doesn’t
    generate any red errors or yellow warning highlights in the code; however, it
    does generate wavy grey underlining. This signifies that the code that is highlighted
    is not currently being used. Since the “convention” or general rule in Java regarding
    `static` modifier keywords is to use them with constants, such as we are in the
    first line of code, and thus, I am going to try and “encapsulate” the code in
    this `InvinciBagel.java` class as much as possible, by removing the `static` modifiers
    (first), and making many of the other declarations **private**.


    ![9781484204160_Fig12-01.jpg](OEBPS/Images/9781484204160_Fig12-01.jpg)


    [Figure 12-1](#9781484204160_Ch12.xhtml#_Fig1). Change the `public static` access
    modifiers for the boolean `KeyEvent` variables to be `private` access control


    The code that we are going to put into place next will eliminate this wavy grey
    highlighting, and in fact, we are going to have NetBeans write that code for us
    using the **Source ![image](OEBPS/Images/arrow.jpg) Insert Code ![image](OEBPS/Images/arrow.jpg)
    Getters and Setters** work process, which we learned about in [Chapter 8](#9781484204160_Ch08.xhtml),
    when we created our `Actor` and `Hero` superclasses. The `is()` and `set()` methods,
    which we are about to generate next, are the solution that allows us to eliminate
    the `public static` variable declaration that was allowing your classes external
    to `InvinciBagel.java` to “reach inside” (think of this as a security breach)
    to grab these four Boolean variables. Making these variables **private** prevents
    this. So, we need to put `is()` and `set()` methods into place which force external
    classes and methods to “request” this information, using a more “formal” method
    call.


    This time, we are going to use the NetBeans **Generate Getters and Setters** dialog,
    which is shown in [Figure 12-2](#9781484204160_Ch12.xhtml#Fig2), to selectively
    write the getters (the `is()` methods) and the setters (the `set()` methods),
    which will access the four Boolean variables. Technically, right now we only need
    to use the getter `is()` methods, so you could use the **Generate ![image](OEBPS/Images/arrow.jpg)
    Getter** menu option, shown in the middle (pop-up or floating) Generate menu,
    above the selected Getter and Setter option, in the middle (encased with a red
    line) of [Figure 12-2](#9781484204160_Ch12.xhtml#Fig2). I prefer to generate both
    of these method “directions,” just in case, later on in the software development
    process, I need to set these variables (externally, in another class) for some
    programming reason relating to the game play logic development.


    ![9781484204160_Fig12-02.jpg](OEBPS/Images/9781484204160_Fig12-02.jpg)


    [Figure 12-2](#9781484204160_Ch12.xhtml#_Fig2). Use the **Source ![image](OEBPS/Images/arrow.jpg)
    Insert Code ![image](OEBPS/Images/arrow.jpg) Getter and Setter** dialog to create
    methods for the four boolean variables'
