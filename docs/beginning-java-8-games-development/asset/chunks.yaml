    [Figure 11-17](#9781484204160_Ch11.xhtml#_Fig17). Notice the InvinciBagel character
    is using a lower Z-index than the UI elements, and can move off-screen


    Yet again you have made a ton of progress during this chapter in getting your
    primary `InvinciBagel.java` class optimized, implementing all of the classes that
    you have coded thus far in this book, wired the game play loop engine into your
    primary game character, tested all of your `ActionEvent` and `KeyEvent` handling,
    and had an all-around good time doing it! I would call that a pretty successful
    chapter, and we will continue to have a good time in every chapter!


    ## Summary


    In this eleventh chapter, we reorganized our primary `InvinciBagel.java` class
    to extract the five key game creation Java statements, and then organized the
    rest of the Java code into eight logical methods (routines), six of them which
    we created from scratch during this chapter. The six new methods serve to parcelize
    things such as adding Image assets, creating new `Actor` objects, adding Actors
    to the Scene Graph, adding Actors to the Cast, creating and starting the Game
    Engine, and implementing the game key event handling routines. We added object
    declarations so that we could create a new `iBagel` `Bagel` object for our game’s
    primary character, and also created a `castDirector` `CastingDirection` engine
    so that we could manage our cast members as we add them to the game in later chapters.


    We learned about `import static` statements, and we saw how to use them to wire
    our `iBagel` `Bagel` object to the `GamePlayLoop.java` engine `.handle()` method.
    We also used these `import static` statements to allow our `Bagel.java` class
    to process the Boolean `up`, `down`, `left`, and `right` variables in the `.update()`
    method.


    Next, we covered how to use conditional `if` statements to determine which key
    events (held in four Boolean variables) were being used by the game player. We
    placed this logic inside of the `Bagel` class `.update()` method, which as we
    know is being rapidly executed 60 times per second by the `GamePlayLoop` `.handle()`
    JavaFX pulse engine.


    Finally we tested all of the new methods and Java statements that we added during
    the chapter to see if the basic game sprite movement works. We observed some of
    the things that we will need to address in future chapters, and thoroughly tested
    the existing `KeyEvent` handling methods and `iX`, `iY`, `vX`, and `vY` attributes
    of the abstract `Actor` class that we created as the foundation for all of our
    game actor assets.


    In the next chapter, we are going to take a closer look at the JavaFX `Node` class
    and also take a look at advanced concepts regarding moving the game sprite around
    your screen, as well as how to ascertain the boundary (edges) of the screen, character
    direction, movement velocity, and related animation and movement considerations.


