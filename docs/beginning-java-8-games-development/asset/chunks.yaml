    点击 NetBeans 左上角的 + 号图标，展开你的 import 语句部分，看看现在是否有一条未使用的 `import javafx.event.EventHandler`
    语句，其下方带有波浪形黄色下划线警告。我遇到了这种情况，如图 9-13 所示，当我将鼠标悬停在其上时，会看到“未使用的导入”警告信息。我使用 **Alt-Enter**
    工作流程调出了解决方案选项辅助对话框，果然，有一个“删除导入语句”选项。所以 NetBeans 不仅能为你编写代码，还能为你删除代码！这个功能相当惊人！


    ![9781484204160_Fig09-13.jpg](img/9781484204160_Fig09-13.jpg)


    图 9-13。将鼠标悬停在 import EventHandler 警告高亮上，并显示弹出的“未使用的导入”警告


    接下来，让我们添加传统的 ASDW 游戏按键事件处理，让我们的用户可以选择使用这些按键，或者用双手进行游戏！这将向你展示如何仅需在高效的 switch-case
    语句中增加几行代码，就能为现有的事件处理代码添加替代按键映射支持。


    添加替代 KeyEvent 映射：使用 A-S-D-W


    既然我们已经有了这些 KeyEvent 处理结构，让我们看看为常用于游戏的 ASDW 按键添加替代按键映射是多么简单。这只需为键盘上的 A、S、D 和 W
    字符添加几个额外的 case 语句，并将它们设置为我们已经设置好的 UP、DOWN、LEFT 和 RIGHT 布尔等效值即可。例如，这将允许用户用左手使用
    A 和 D 键，用右手使用 UP 和 DOWN 箭头键，从而更轻松地进行游戏。


    稍后，如果你想为游戏添加更多功能，使用你的游戏控制器及其对 KeyCode 类的 **GAME_A**（**跳跃**）、**GAME_B**（**飞行**）、**GAME_C**（**攀爬**）和
    **GAME_D**（**爬行**）常量的支持，你只需在屏幕顶部的 up、down、left 和 right 旁边再添加四个布尔变量（jump、fly、climb
    和 crawl），并再添加四个 case 语句即可。


    这四个 W (UP)、S (DOWN)、A (LEFT) 和 D (RIGHT) 的 case 语句，一旦添加到 switch 语句中，就会使你的 KeyEvent
    对象及其事件处理 Java 代码结构仅剩十几行 Java 代码。进行此修改后，你新的 `.setOnKeyPressed()` 事件处理结构将如下所示：


    ```

    scene.setOnKeyPressed(KeyEvent event) -> {

        switch (event.getCode()) {

            case UP:    up    = true; break;

            case DOWN:  down  = true; break;

            case LEFT:  left  = true; break;

            case RIGHT: right = true; break;

            case W:     up    = true; break;

            case S:     down  = true; break;

            case A:     left  = true; break;

            case D:     right = true; break;

        }

    });

    ```


    如你所见，现在用户可以使用其中一组按键，或同时使用两组按键来控制游戏。既然你已经让 `.setOnKeyPressed()` 事件处理结构对游戏玩家来说更加灵活（且强大），让我们对
    `.setOnKeyReleased()` 事件处理结构也做同样的处理。当用户**释放**键盘、遥控器或设备键盘上的 A 或 LEFT、W 或 UP、S 或
    DOWN、或 D 或 RIGHT 键时，该结构会将 up、down、left 和 right 布尔标志变量设置为 **false** 值。


    一旦你在 switch 语句体末尾添加这些 case 语句，你的 `.setOnKeyReleased()` 事件处理 Java 代码应如下所示：


    ```

    scene.setOnKeyReleased(KeyEvent event) -> {

        switch (event.getCode()) {

            case UP:    up    = false; break;

            case DOWN:  down  = false; break;

            case LEFT:  left  = false; break;

            case RIGHT: right = false; break;

            case W:     up    = false; break;

            case S:     down  = false; break;

            case A:     left  = false; break;

            case D:     right = false; break;

        }

    });

    ```


    现在，你已经为玩家添加了另一组用于控制游戏的玩家移动控制键，你的代码没有错误，并且结构简单有效，如图 9-14 所示。我们在名为 scene 的 Scene
    对象的最顶层一次性处理事件，在此事件处理“计算”中不涉及任何场景图节点对象，并且仅使用几个字节的内存来保存八个布尔（开/关）值。


    ![9781484204160_Fig09-14.jpg](img/9781484204160_Fig09-14.jpg)


    图 9-14。为 ASDW 按键添加 case 语句，为用户提供两种按键选项，或允许双手游戏


    这符合我们优化内存和 CPU 周期的目标，以便这些资源可用于我们游戏中更高级的部分，例如游戏逻辑、碰撞检测或物理计算。


    我们还添加了一些常量，以便以后可以将这个 640x400 的游戏原型缩放到不同分辨率的显示屏幕，例如伪高清（1280x720）、真高清（1920x1080）和超高清（4096x2160）。这些常量也可以在游戏逻辑中使用，用于计算屏幕区域的大小以确定移动边界。


    到目前为止，我们已经添加了角色和辅助角色引擎，以及基本的事件处理流程，这样我们就可以在下一章开始确定这个 InvinciBagel 游戏英雄将如何在屏幕上移动。我们已经准备好了
    `.handle()`、`.update()` 和 `.collide()` 方法来存放代码，这些代码将用于在单人游戏以及未来的多人游戏版本中为角色（最终还有敌人）制作动画。


    接下来，让我们重新审视一下这个游戏设计的概览图，看看 InvinciBagel 包、InvinciBagel.java 类，以及 GamePlayLoop、Actor
    和 Hero 类，它们为我们的游戏处理流程以及角色（以及投射物、宝藏、敌人和障碍物或“道具”）的创建提供了基础。


    更新我们的游戏设计：添加事件处理


    让我们更新我在第 7 章（图 7-19）中介绍并在第 8 章（图 8-17）中更新的图表，以包含 EventHandler 类对 ActionEvent 和
    KeyEvent 的处理。如图 9-15 所示，我将 EventHandler 事件处理类以及处理我们 UI 设计控件的 ActionEvent 对象和我们用来在屏幕上移动
    InvinciBagel 角色的 KeyEvent 添加到了图表中。由于 `.setOnKeyPressed()` 和 `.setOnKeyReleased()`
    方法是从名为 scene 的 Scene 对象上调用的，并且 ActionEvent 也包含在 Scene 对象下，我将它们放在了图表中 Scene 对象的内部。


    ![9781484204160_Fig09-15.jpg](img/9781484204160_Fig09-15.jpg)


    图 9-15。当前的 InvinciBagel 包类（对象）层次结构，现在我们已经添加了 Actor 和 Hero 类


    由 KeyEvent switch-case 语句设置的布尔标志将在 `.update()` 方法中使用，并移动 InvinciBagel。GamePlayLoop
    对象中的 `.handle()` 方法将调用 `.update()` 方法，因此它们之间也存在连接。我们仍在稳步推进游戏引擎框架，添加事件处理！


