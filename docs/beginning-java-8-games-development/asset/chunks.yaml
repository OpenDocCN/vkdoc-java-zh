    \ (I like to call it the masterclass), which is in the `java.lang` package, so\
    \ an import statement for it would reference `java.lang.Object`, the full pathname\
    \ for the Java `Object` class.\n\nJava objects are used to “virtualize” reality\
    \ by allowing the objects you see all around you in everyday life, or, in the\
    \ case of your game, objects you are creating out from your imagination, to be\
    \ realistically simulated. This is done by using the data fields (variables and\
    \ constants) and the methods that you have been learning about in this chapter.\
    \ These Java programming constructs will make up the object characteristics, or\
    \ attributes (constants); states (variables); and behaviors (methods). The Java\
    \ class construct organizes each object definition (constants, variables, and\
    \ methods) and gives birth to an instance of that object, using the constructor\
    \ method for the class that designs and defines the object via the various Java\
    \ keywords and constructs.\n\n### Creating an InvinciBagel Object: Attributes,\
    \ States, and Behavior\n\nLet’s put together an example of an InvinciBagel object\
