  raw: 'This is significant, because coding an object creation in this way allows
    you to declare an object at the top of your class, where each of the methods inside
    the class that use or access these objects can **see** the object. In Java, unless
    declared otherwise, using modifiers, an object or data field is only visible inside
    the Java programming construct (class or method) in which it is declared.


    If you declare an object inside your class, and therefore outside all the methods
    contained in the class, then all the methods in your class can access (use) that
    object. Similarly, anything declared inside a method is **local to** that method
    and is only **visible** to other **members** of that method (Java statements inside
    the method scope delimiters). If you wanted to implement this separate object
    declaration (in the class, outside the methods) and object instantiation (inside
    the **.start()** method) in your current InvinciBagel class, the first few lines
    of Java code for your InvinciBagel class would change to look like the following
    Java programming logic:


    ```

    public class InvinciBagel extends Application {

         Button btn;

         @Override

         public void start(Stage primaryStage) {

            btn = new Button();

            btn.setText("Say ''Hello World''");

            // The other programming statements continue underneath here

         }

    }

    ```


    When the object declaration and instantiation are split up, they can be placed
    inside (or outside) methods as needed for visibility. In the preceding code, other
    methods of your **InvinciBagel** class could call the .setText() method call shown
    without the Java compiler’s throwing an error. The way the **Button** object is
    declared in [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2), only the **.start()**
    method can see the object, and so only the **.start()** method can use this btn.setText()
    **method call.**


    Creating a Constructor Method: Coding an Object’s Structure


    A constructor method is more a method for creating objects in system memory, whereas
    other methods (or functions, if using a different programming language) are usually
    used to perform calculation or processing of one type or another. The constructor
    method’s use in creating Java objects in memory, rather than performing some other
    programming function, is evidenced by the use of the Java **new** keyword, which
    creates a new object in memory. For this reason, a constructor method will define
    the structure of an object as well as allow the calling entity to **populate**
    the object structure with custom data values, using the constructor method’s **parameter
    list**.


    You will create a couple of sample constructor methods in this section to learn
    the basics of how this is done as well as what a constructor method usually contains.
    Let’s say you are creating an **InvinciBagel** object for your game, so you declare
    a **public InvinciBagel()** constructor method, using the following Java code
    structure:


    ```

    public InvinciBagel() {

        int lifeIndex = 1000;  // Defines units of lifespan

        int hitsIndex = 0;    //  Defines units of damage ("hits" on the object)

        String directionFacing = "E";        // Direction that the object is facing

        Boolean currentlyMoving = false;  //  Flag showing if the object is in motion

    }

    ```


    This constructor method, when called using an InvinciBagel mortimer = new InvinciBagel();
    Java method call, creates an **InvinciBagel** object named **mortimer**, with
    1,000 units of life and no hits, that is facing e**ast** and that is not currently
    moving.


    Next, let’s explore the concept of **overloading** the constructor method, which
    you learned about earlier (see the section “Java Methods: Java Core Function Code
    Constructs”), and create another constructor method that has parameters that allow
    you to define the **lifeIndex and directionFacing variables of the InvinciBagel**
    object while you are creating it. This constructor method looks like this:


    ```

    public InvinciBagel(int lifespan, String direction) {

        int lifeIndex;

        int hitsIndex;

        String directionFacing = null;

        Boolean currentlyMoving = false;

        lifeIndex = lifespan;

        directionFacing = direction;

    }

    ```


    In this version the **lifeIndex** and **hitsIndex** variables at the top are initialized
    to **0,** the default value for an integer, so you do not have to use **lifeIndex
    = 0 or hitsIndex = 0 in** the code. The Java programming language accommodates
    method overloading, so if you use an InvinciBagel bert = new InvinciBagel(900,
    "W"); method call to instantiate **the InvinciBagel object, the correct constructor
    method will be used to create the object. The InvinciBagel** object named **bert**
    would have a **lifeIndex** of 900 units of life and no hits on its life, would
    be facing **West**, and would not be currently moving.


    You can have as many (overloaded) constructor methods as you like, so long as
    they are each 100 percent unique. This means that **overloaded constructors**
    must have different parameter list configurations, including parameter list length
    (the number of parameters) and parameter list types (order of data types). As
    you can see, it is the parameter list (length, data types, order) that allows
    a Java compiler to differentiate overloaded methods from one another.


    Java Variables and Constants: Values in Data Fields


    The next level down (progressing from API, to package, to class, to method, to
    the actual **data values** that are being operated on in Java classes and methods)
    is the **data field**. Data values are held inside something called a **variable**;
    if you fix, or make permanent, the data, it is called a **constant**. A constant
    is a special type of variable (which I will cover in the next section), because
    declaring a constant correctly is a bit more involved (advanced) than declaring
    a Java variable.


    In the Java lingo, variables declared at the top of a class are called **member
    variables**, **fields**, or **data fields**, although all variables and constants
    can be considered data fields, at a fundamental level. A variable declared inside
    a method or other **lower-level** Java programming structure declared inside a
    class or method, is called a **local variable**, because it can only be seen locally,
    inside the programming constructs delimited by curly braces. Finally, variables
    declared inside a parameter list area of a method declaration or method call are,
    not surprisingly, called **parameters**.


    A variable is a data field that holds an **attribute** of your Java object or
    software that can (and will) change over the course of time. As you might imagine,
    this is especially important for game programming. The simplest form of variable
    declaration can be achieved by using a Java **data type keyword**, along with
    the name that you want to use for the variable in your Java program logic. In
    the previous section, using the constructor method, you declared an integer variable
    named **hitsIndex** to hold the damage, or hits, that your InvinciBagel object
    will sustain during game play. You defined the variable data type, and named it,
    using the following Java variable declaration programming statement:


    ```

    int hitsIndex; // This could also be coded as: int hitsIndex = 0; (the default
    Integer is Zero)

    ```


    As you also saw in that section, you can initialize your variable to a starting
    value, using an equals operator, along with a data value that **matches up with**
    the data type declared: for example:


    ```

    String facingDirection = "E";

    ```'
