    (KeyCode) KeyPressed 常量的音频。我这样做是因为我打算使用此音频来“提示”我们即将创建的代码中检测到的碰撞。接下来，在 .update()
    方法内部调用的方法末尾创建一个 **.checkCollision()** 方法调用。此方法将在每个处理的脉冲事件上调用碰撞检测 Java 代码，我们将在本章剩余部分中实现这些代码。这符合
    .update() 方法中游戏代码处理的逻辑顺序。


    新的 .update() 方法（如图 16-30 所示）应如下面的 Java 方法体所示：


    ```

    public void update() {

        setXYLocation();

        setBoundaries();

        setImageState();

        moveInvinciBagel();

    //  playAudioClip();

        checkCollision();

    }

    ```


    ![9781484204160_Fig16-30.jpg](img/9781484204160_Fig16-30.jpg)


    图 16-30。注释掉 playAudioClip() 方法调用以关闭所有音频，并添加 checkCollision() 方法调用


    创建一个空的 **public void checkCollision(){}** 方法体，这将消除你在 图 16-30 中看到的波浪形红色错误提示，以便我们开始落实代码，遍历
    CURRENT_CAST List<Actor> 对象，从而确定是否有任何演员与游戏舞台上的主要 InvinciBagel 角色**相交**（即发生碰撞）。


    在此 **.checkCollision()** 方法内部，我们需要一个 Java **for “计数器”循环**结构。此结构将用于遍历你的 CURRENT_CAST
    List<Actor> 对象数组；在本例中，这些是 **Prop** 对象，以检查与 InvinciBagel 对象是否存在任何碰撞（相交）。for 循环的第一部分是迭代器变量声明和初始化，在我们的例子中是
    **int i=0;**，用于声明名为“i”的整数类型**迭代器**变量，并将其初始化为计数值零。

    '
- fmt: "# 排版后的内容\n\n`for`循环的第二部分是**迭代条件**，在本例中为“迭代直到到达`CURRENT_CAST List<Actor>`对象的末尾”，即`i\
    \ < invinciBagel.castDirector.getCurrentCast().size()`，它表示`List`的大小（因此也是最后一个元素）。`for`循环语句条件的第三部分是迭代的步长，由于我们希望遍历`List<Actor>`中的每个对象以检查碰撞，我们将对变量`i`使用熟悉的**Java\
    \ `++`运算符**，即`i++`。在`for`循环的`{...}`花括号内，是我们希望在每次循环迭代中执行的操作；在本例中，这是针对`List<Actor>`对象中的每个`Prop\
    \ Actor`对象执行的。这是一个很好的结构，用于从第一个元素到最后一个元素迭代任何`List`对象。\n\n在`for`循环内部，我们将创建一个“局部”的`Actor`对象引用变量，并将其设置为等于`List(i)`中的**当前元素**，使用`invinciBagel.castDirector.getCurrentCast().get(i)`方法链。Java方法链是一种创建紧凑Java代码结构的酷炫方式，不是吗？一旦我们使用`CURRENT_CAST(i)`中的演员成员对象加载了该`Actor`对象，我们将使用`collide(object);`\
    \ Java语句调用`.collide()`方法。请记住，我们在`Hero`超类中安装了此抽象的`.collide()`方法，因此接下来我们必须在了解更多关于`Node`和`Shape`类及其可用于确定交集（碰撞）的几个关键方法和属性之后，重写并编码该方法。\n\
    \n```java\npublic void checkCollision() {\n    for(int i=0; i<invinciBagel.castDirector.getCurrentCast().size();\
    \ i++) {\n        Actor object = invinciBagel.castDirector.getCurrentCast().get(i);\n\
    \        collide(object);\n    }\n}\n```\n\n这是确定碰撞的第一个（简单）部分，位于第一个`checkCollision()`方法中，该方法由脉冲事件管理器从`.update()`方法内部调用。它遍历`List<Actor>\
    \ CURRENT_CAST`，并为每个`Actor`对象调用`collide(object);`方法，以检查`InvinciBagel`角色是否与其发生碰撞。如[图16-31](#9781484204160_Ch16.xhtml#Fig31)所示，这段Java代码没有错误，我们接下来要编码的下一个Java方法体是`public\
    \ boolean collide()`方法，我们之前在[第8章](#9781484204160_Ch08.xhtml)的抽象`Hero`类中声明了该方法以供使用。\n\
    \n![9781484204160_Fig16-31.jpg](OEBPS/Images/9781484204160_Fig16-31.jpg)\n\n[图16-31](#9781484204160_Ch16.xhtml#_Fig31).\
    \ 添加一个`for`循环，使用`.getCurrentCast().size()`从0计数到`CURRENT_CAST`中的对象数量。\n\n在编码`.collide()`方法之前（这是整本书中我们将编码的最困难的方法体之一），我们需要研究一些与`javafx.scene`包的`Node`类及其`Bounds`属性、`.getBoundsInLocal()`和`.getBoundsInParent()`方法调用相关的更复杂主题。我们还将研究`javafx.scene.shape`包的`Shape`类及其`.intersect(Shape\
    \ shape1, Shape shape2)`方法调用。我们将在`public boolean collide(Actor object) {...}`方法中使用所有这些内容，因此我们需要先掌握这些高级知识，然后才能编写这个复杂而密集（但令人兴奋）的Java结构。\n\
    \n## 定位Node对象：使用Bounds对象\n\n关于碰撞检测，我们需要首先了解的是`javafx.geometry`包的`Bounds`类。这个`public\
    \ abstract`类（及其创建的对象）在`javafx.scene`包的`Node`类中用于保存`Node`的**边界**。正如您可能已经推测的那样，这是我们将利用来确定碰撞检测的方法之一，结合我们的碰撞`SVGPath\
    \ Shape`数据，我们将在研究`Bounds`对象及其相关的`.getBoundsInLocal()`和`.getBoundsInParent()`方法如何为我们工作之后，再深入探讨这些数据。\n\
    \n`Bounds`类是使用`java.lang.Object`主类从头创建的，包含`X`、`Y`和`Z`坐标，以及`width`、`height`和`depth`值。由于我们将在2D环境中工作，我们将使用`Bounds`对象的`X`和`Y`以及`width`和`height`值（属性）。`Bounds`类有一个直接的已知子类，称为`BoundingBox`。如果您想知道，“直接子类”意味着`BoundingBox`类声明为`BoundingBox\
    \ extends Bounds`，而“已知”类是已**正式**添加到Java 8 JDK中的类。\n\n“未知”类的一个例子是您自己编写的自定义`Bounds`子类（如果您编写了一个的话）。Java\
    \ 8中`javafx.geometry.Bounds`类的类层次结构如下所示：\n\n```\njava.lang.Object\n  > javafx.geometry.Bounds\n\
    ```\n\n`Bounds`类用于创建`Bounds`对象。这些对象用于描述`Node`对象的边界，正如我们所知，这些是JavaFX场景图`Node`对象。`Bounds`对象的一个重要特性是它可以具有**负**的`width`、`height`或`depth`。`Bounds`对象属性的负值用于指示该`Bounds`对象是**空的**。我们稍后将在代码中使用这一点来确定碰撞**未**发生。正如我在本书前面指出的，有时您必须采取“相反”的方法来找到解决方案或正确的工作流程，以实现您的游戏设计和编程目标。\n\
    \n## 使用Node局部边界：`.getBoundsInLocal()`方法\n\nJavaFX场景图`Node`类中的一个重要方法是`public final\
    \ Bounds .getBoundsInLocal()`方法。此方法是获取`boundsInLocal`属性值的getter方法。`boundsInLocal`属性是“只读”的，并为其包含的`Node`保存一个矩形`Bounds`对象。它包含的数据表示`Node`的**未变换**（原始）局部坐标空间。未变换意味着`Node`在**旋转**、**平移**或**缩放**之前的坐标，这代表了`Node`对象的原始（默认）坐标。\n\
    \n对于扩展`Shape`类的`Node`类（对象）（我们的`ImageView Node`不扩展`Shape`），局部边界还将包括实现非零`Shape`（或`Path`）**描边**所需的空间，因为这可能会扩展到由这些位置和大小属性定义的`Shape`几何体“外部”。**局部边界**对象还包括您可能已设置的任何**裁剪路径**区域，以及您可能已设置的任何**特殊效果**的范围。\n\
    \n`boundsInLocal`属性始终具有**非空**值，并且需要注意的是，此方法不考虑`Node`对象的可见性，因此计算仅基于`Node`的几何体。每当`Node`对象的几何体发生变化时，`boundsInLocal`属性会自动重新计算。"
  raw: 'The second part of the for loop is the **iteration condition**, which, in
    this case, is “iterate until you reach the end of the CURRENT_CAST List<Actor>
    object, or **i<invinciBagel.castDirector.getCurrentCast().size()** that represents
    the size of (and thus, the last item in) the List. The third part of the for loop
    statement condition is the amount to iterate by, and since we want to go over
    each object in the List<Actor> to check for collisions, we will use the familiar
    **Java ++ operator** on the “i” variable, or **i++**. Inside of the for loop {…}
    curly braces are the things that we want to perform during each iteration of the
    loop; in this case, this would be for each Prop Actor object that is in the List<Actor>
    object. This is a good construct to use to iterate any List objects from the first
    element to the last element.


    Inside of the for loop, we are going to create a “local” Actor object reference
    variable, which we are going to set equal to the **current element** in the **List(i)**,
    using the **invinciBagel.castDirector.getCurrentCast().get(i)** method chain.
    Java method chains are a cool way to create compact Java code structures, aren’t
    they? Once we have loaded that Actor object with the CURRENT_CAST(i) cast member
    object, we will then call the **.collide()** method, using the collide(object);
    Java statement. Remember that we installed this abstract .collide() method in
    our Hero superclass, so we are going to have to “Override” and code that method
    next, after we learn more about the **Node** and **Shape** classes, and a couple
    of their key methods and properties that can be used to determine intersections
    (collisions).


    ```

    public void checkCollision() {

        for(int i=0; i<invinciBagel.castDirector.getCurrentCast().size(); i++) {

            Actor object = invinciBagel.castDirector.getCurrentCast().get(i);

            collide(object);

        }

    }

    ```


    This is the first (easy) part of determining collisions, in this first checkCollision()
    method, called from inside of the .update() method, by the pulse event manager.
    This iterates through the List<Actor> CURRENT_CAST and calls the **collide(object);**
    method, for each Actor object, to see if the InvinciBagel character has collided
    with it. As you can see in [Figure 16-31](#9781484204160_Ch16.xhtml#Fig31), this
    Java code is error-free, and the next Java method body that we will code is the
    **public** **boolean collide()** method, which we declared for use previously
    inside of our abstract Hero class, in [Chapter 8](#9781484204160_Ch08.xhtml).


    ![9781484204160_Fig16-31.jpg](OEBPS/Images/9781484204160_Fig16-31.jpg)


    [Figure 16-31](#9781484204160_Ch16.xhtml#_Fig31). Add a for loop, counting from
    0 to number of objects in the CURRENT_CAST using .getCurrentCast().size()


    Before we code the .collide() method, which is one of the more difficult method
    bodies that we’ll be coding during this entire book, we’ll need to look at some
    of the more complex topics relating to the **javafx.scene** package’s **Node**
    class, and its **Bounds** property, and **.getBoundsInLocal()** and **.getBoundsInparent()**
    method call. We will also be looking at the **javafx.scene.shape** package’s **Shape**
    class, and its **.intersect(Shape shape1, Shape shape2)** method call. We will
    be using all of these inside of our **public boolean collide(Actor object) {...}**
    method, so we will need to have this advanced knowledge in place first, before
    we write this complex and dense (but exciting) Java structure.


    Locating a Node Object: Using the Bounds Object


    The first thing that we need to look at regarding collision detection is the **javafx.geometry**
    package’s **Bounds** class. This **public abstract** class (and the objects that
    it creates) is utilized in the **javafx.scene** package’s **Node** class to hold
    the **boundaries** for the Node. As you may have surmised, this is one of the
    things that we will leverage to determine collision detection, in conjunction
    with our collision SVGPath Shape data, which we will get into after we take a
    look at how this Bounds object, and its related **.getBoundsInLocal()** and **.getBoundsInParent()**
    methods, can work for us.


    This Bounds class was created from scratch, using the java.lang.Object master
    class, and contains **X**, **Y**, and **Z** coordinates, as well as **width**,
    **height**, and **depth** values. Since we will be working in 2D, we will be using
    the X and Y, as well as the width and height, values (properties) of the Bounds
    object. The Bounds class has a single direct known subclass, called BoundingBox.
    In case you are wondering, a “direct subclass” means the BoundingBox class declaration
    says BoundingBox **extends** Bounds, and a “known” class is one that has been
    **officially** added into the Java 8 JDK.


    An example of an “unknown” class would be one of your own customized Bounds subclasses,
    if you were to write one, that is. The Java 8 class hierarchy for the javafx.geometry.Bounds
    class would look like the following:


    ```

    java.lang.Object

      > javafx.geometry.Bounds

    ```


    The Bounds class is used to create Bounds objects. These are used to describe
    the Bounds of a Node object, which as we know are JavaFX Scene Graph Node objects.
    An important characteristic of a Bounds object is that it can have a **negative**
    width, height, or depth. A negative value for any of the Bounds object attributes
    (properties) is used to indicate that the Bounds object is **empty**. We will
    be using this in our code later on to ascertain when a collision has **not** occurred.
    As I pointed out earlier in this book, sometimes you have to take the “opposite”
    approach to finding the solution, or the proper work process, for achieving your
    game design and programming objectives.


    Using Node Local Bounds: The .getBoundsInLocal() Method


    One of the important methods in the JavaFX Scene Graph Node class is the **public
    final Bounds .getBoundsInLocal()** method. This method is the getter method that
    retrieves the value of the boundsInLocal property. The boundsInLocal property
    is “read-only” and holds a rectangular Bounds object for the Node it is contained
    in. The data that it contains represents **untransformed** (original) local coordinate
    space for a Node. Untransformed means the Node coordinates prior to their being
    **rotated**, **translated**, or **scaled**, which represents the Node object’s
    original (default) coordinates.


    For a Node class (object) that extends the Shape class (which our ImageView Node
    does not), the local Bounds will also include the space required to implement
    a non-zero Shape (or Path) **stroke**, as this might extend “outside” of the Shape
    geometry, which is being defined by these position and size attributes. A **local
    Bounds** object also includes any **clipping path** areas that you may have set,
    as well as the extents of any **special effects** that you may have set.


    The **boundsInLocal** property will always have a **non-null** value, and it is
    important to note that this method does not take the Node object’s visibility
    into account, so the computation is based on the geometry of the Node only. The
    boundsInLocal property is automatically computed whenever the geometry of a Node
    object changes.'
