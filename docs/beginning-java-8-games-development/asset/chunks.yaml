  trans: '

    我想用几页的篇幅向你介绍 GIMP 的一个替代方案，它将物理和碰撞功能整合到一个统一的游戏开发工具中，相对于它为游戏开发所做的一切而言，这个工具的价格非常实惠。**PhysicsEditor**（简称
    PhysEd 或 PE）来自 **CodeAndWeb GmbH**，这家公司的所有者是另一位 Apress 出版社的作者 **Andreas Loew**，他撰写过关于
    iOS 游戏开发的书籍。让我们快速了解一下如何使用这款专业的游戏开发工具来定义精灵的碰撞多边形，然后我们就可以开始进行碰撞检测编码了。安装并启动 PE（使用绿色立方体
    PE 图标），然后使用图 16-21 中所示的“导入精灵”按钮打开你的 `sprite1.png` 文件，并使用屏幕底部的缩放滑块将视图放大到 **600%**，就像我们在
    GIMP 中所做的那样。


    ![9781484204160_Fig16-21.jpg](img/9781484204160_Fig16-21.jpg)


    图 16-21。启动 PhysicsEditor，使用“添加精灵”按钮打开 sprite1.png 文件，并将其放大到 600%


    接下来，点击精灵编辑区域顶部的**描摹图标**（它是中间的图标，看起来像一个魔棒），这将打开**描摹**对话框，如图 16-22 所示。在此对话框中，你可以设置缩放、描摹算法容差、**描摹模式**和**帧模式**，并查看这些设置产生的顶点数量结果。


    ![9781484204160_Fig16-22.jpg](img/9781484204160_Fig16-22.jpg)


    图 16-22。在 PhysEd 中使用描摹工具设置容差、描摹模式、帧模式和顶点数


    一旦你通过调整各种描摹对话框设置获得了满意的视觉效果，点击**确定**按钮，你将返回到 PhysicsEditor 的主用户界面窗口。


    然后，你可以通过用鼠标点击并拖动这些数据点来逐个精炼你的碰撞多边形结构数据点，如图 16-23 所示。如果你将图 16-22 中的碰撞多边形与图 16-23
    中的进行比较，你会发现我已经精炼了几个数据点，使其更好地贴合精灵的轮廓。


    ![9781484204160_Fig16-23.jpg](img/9781484204160_Fig16-23.jpg)


    图 16-23。在 PhysicsEditor 中微调碰撞多边形的顶点位置，然后选择你的导出器


    碰撞多边形越接近精灵的轮廓越好，理想情况下，你会希望将其正好放置在精灵像素与透明区域之间像素边缘的抗锯齿之上，或者如果你想要更具挑战性的游戏玩法，甚至可以将其放置在抗锯齿内部。最终，你需要在游戏开发和测试周期中调整你的碰撞多边形，以便在游戏过程中获得最真实的结果。如果你正在为游戏主机等高性能平台开发，你可以向碰撞多边形添加更多数据点；如果你正在为单核或双核平台（如
    HTML5 手机或 iTV）开发，则使用较少的数据点。


    替换虚拟碰撞数据：InvinciBagel.java


    接下来，让我们对 **InvinciBagel.java** 类中的 Java 代码做一些修改，以便实际使用我们刚刚在本章中开发的这个高度优化的碰撞多边形数据。我们将使用只有
    15 个数据点的数据集，这样我们就可以在 NetBeans 8.0 代码编辑窗格中看到所有的碰撞多边形数据。如图 16-24 所示，我们需要将 `Bagel()`
    构造方法调用放在三行不同的代码中：一行用于实例化的 `iBagel = new Bagel(this)` 部分，另一行用于**碰撞多边形 SVG 数据字符串对象**，还有一行用于
    `xLocation`、`yLocation` 和 `Image` 对象列表。我们还将运用从表 16-1 中学到的 SVG 命令知识，为我们的可平铺砖块元素创建碰撞多边形数据。我们将在本章后面使用这些砖块“道具”元素来开发我们的碰撞检测
    Java 代码。我们将仅凭大脑来创建这些更简单的碰撞多边形，通过实现与砖块图像分辨率相关的数字逻辑，以及结合我们从表 16-1 中学到的 SVG 路径绘制命令来确定角像素在
    X、Y 坐标空间中的位置。你正在成为一名相当专业的游戏开发者！


    ![9781484204160_Fig16-24.jpg](img/9781484204160_Fig16-24.jpg)


    图 16-24。将你的 15 个数据点碰撞多边形 SVG 数据复制并粘贴到 Bagel() 方法中，替换虚拟数据


    我们还将使用在第 3 章中学到的 Java 代码注释技术，从场景中（临时）移除较大的苔藓岩石道具，使我们的代码达到 InvinciBagel 角色和几个砖块出现在舞台上的状态。然后，我们可以使用这些基本对象开始我们的代码开发，涉及如何使用
    **.collide()** 方法以及它如何将 **castDirector** CastingDirector 类（对象）用作碰撞处理指南。


    如果你想查看 `iPR1` 和 `iPV1` 对象被临时从你的 **.createGameActors()**、**.addGameActorNodes()**
    和 **.createCastingDirection()** 方法中移除的情况，你可以在图 16-25 和 16-26 中看到这些 Java 代码注释。接下来，让我们复制并粘贴你之前在本章中创建的
    SVG 碰撞多边形数据集。打开 **iBshape1svg.txt** 文件（如图 16-20 所示），选择并复制 SVG 数据，使用 **编辑 ![image](img/arrow.jpg)
    复制** 菜单序列或 **CTRL-C** 键盘快捷键。确保包含引号。将数据粘贴到 **.createGameActors()** 方法中的 `Bagel()`
    方法里，替换原来虚拟 SVG 数据的位置，如图 16-24 所示。


    ![9781484204160_Fig16-25.jpg](img/9781484204160_Fig16-25.jpg)


    图 16-25。使用分辨率为 32x72 的 prop0.png 图像，为 iP0 固定 Actor 道具创建碰撞多边形 SVG 数据


    ![9781484204160_Fig16-26.jpg](img/9781484204160_Fig16-26.jpg)


    图 16-26。在 addGameActorNodes() 和 createCastingDirection() 方法中注释掉与 iP1 对象相关的代码

    '
- fmt: "更新`iBagel`的`Bagel()`构造方法，使用准确的碰撞多边形SVG数据后，更新`iP0`固定`Actor`属性，利用四个角像素的坐标创建一个方形碰撞多边形，如图[16-25](#9781484204160_Ch16.xhtml#Fig25)所示。任何图像的左上角原点均为`0,0`，因此第一个SVG命令是`M0,0`（即“移动到原点”）。接下来，使用`L`命令绘制一条“连线到”左下角的线，对应`L0,32`命令及数据集，因为该砖块图像高32像素（Y轴）、宽72像素（X轴）。\n\
    \n下一对数据无需以`L`命令开头，因为任何SVG数据解析算法的实现都会假定，若未显式指定命令，则沿用前一对数据的命令。砖块图像的右下角坐标为`72,32`，右上角坐标为`72,0`。`Z`命令可用于将图像右上角与原点连接，从而在此特定用例中，通过闭合多边形实现砖块顶部的碰撞检测。如图[16-25](#9781484204160_Ch16.xhtml#Fig25)所示，SVG数据中可使用逗号或空格，因此以下两种方法调用均有效：\n\
    \n```\niPR0 = new Prop(\"M0 0 L0 32 72 32 72 0 Z\", 0, 148, iP0);\n                                                          OR:\n\
    iPR0 = new Prop(\"M0,0 L0,32 72,32 72,0 Z\", 0, 148, iP0);\n```\n\n第二个示例在NetBeans\
    \ 8中占用相同空间，且能更清晰地展示数据点对。我将注释掉与`iP1 Actor Prop`对象相关的所有代码，如图[16-25](#9781484204160_Ch16.xhtml#Fig25)和[16-26](#9781484204160_Ch16.xhtml#Fig26)所示，从而暂时“禁用”这些较大的`Prop\
    \ Actor`对象，使其不显示在舞台（及场景）上，以免干扰碰撞检测的基础代码开发。\n\n现在，我们准备使用**Run ![image](OEBPS/Images/arrow.jpg)\
    \ Project**工作流程，确保`InvinciBagel`角色以及用于测试碰撞检测代码的四块金色砖块已就位，且大型苔藓岩石对象不再出现在舞台上。如图[16-27](#9781484204160_Ch16.xhtml#Fig27)所示，场景已为开发基础碰撞检测代码设置完毕，我们可以专注于编写Java\
    \ 8游戏代码，之后再着手实现进一步的场景设计、游戏玩法设计、游戏逻辑、物理引擎及计分引擎代码——这些内容将在下一章[第17章](#9781484204160_Ch17.xhtml)中实现。\n\
    \n![9781484204160_Fig16-27.jpg](OEBPS/Images/9781484204160_Fig16-27.jpg)\n\n[Figure\
    \ 16-27](#9781484204160_Ch16.xhtml#_Fig27). 使用Run ![image](OEBPS/Images/arrow.jpg)\
    \ Project工作流程测试游戏\n\n在切换到`Bagel.java`类实现碰撞检测之前，我们需要在`InvinciBagel.java`类中进行一两个基本修改。由于将在碰撞代码中使用`CastingDirector`对象，因此必须移除`CastingDirector\
    \ castDirector;`声明中的`private`访问控制关键字，如图[16-28](#9781484204160_Ch16.xhtml#Fig28)所示。我们尽量将`InvinciBagel`类中的变量保持为`private`，若需从其他类（如`Bagel.java`）访问，再将其改为包级保护。\n\
    \n![9781484204160_Fig16-28.jpg](OEBPS/Images/9781484204160_Fig16-28.jpg)\n\n[Figure\
    \ 16-28](#9781484204160_Ch16.xhtml#_Fig28). 移除`CastingDirector castDirector`对象声明中的`private`访问控制修饰符关键字\n\
    \n接下来，我们需要从`createCastingDirection()`方法的`.addCurrentCast()`方法调用参数列表中移除`iBagel`对象。这样做是为了避免`InvinciBagel`（我们将检查其与`CURRENT_CAST\
    \ List<Actor>`对象中其他`Actor`对象的碰撞）与自身发生碰撞！新的更短方法调用（不含`iBagel`对象）应如下所示，该Java代码在[图16-29](#9781484204160_Ch16.xhtml#Fig29)底部高亮显示：\n\
    \n```\ncastDirector.addCurrentCast(iPR0, iPH0, iPV0, iPB0);\n```\n\n![9781484204160_Fig16-29.jpg](OEBPS/Images/9781484204160_Fig16-29.jpg)\n\
    \n[Figure 16-29](#9781484204160_Ch16.xhtml#_Fig29). 从传递给`.addCurrentCast()`方法的对象列表前端移除`iBagel`对象\n\
    \n现在，我们准备在`Bagel.java`类中编写方法，通过检查每个对象的`Node`（`ImageView`）和碰撞形状（`SVGPath`）的边界，来检测`iBagel`对象与`CURRENT_CAST\
    \ List<Actor>`对象中对象的碰撞。接下来要介绍的内容可能有些复杂，但若想真正制作一款合法的游戏，就必须能够判断游戏元素何时**相交**（在游戏开发术语中称为碰撞）。现在，让我们深入探讨这一主题！\n\
    \n## Bagel类碰撞检测：`.checkCollision()`\n\n在[图16-29](#9781484204160_Ch16.xhtml#Fig29)所示的“项目”窗格中右键单击`Bagel.java`类，选择“打开”选项，在NetBeans\
    \ 8中打开`Bagel.java`选项卡。进入`.update()`方法，在`playAudioClip()`方法调用前添加两个正斜杠将其**注释掉**。这将有效关闭当前`KeyEvent`（`KeyCode`）`KeyPressed`常量调用的音频。这样做的原因是，我将使用此音频来“提示”即将创建的代码中检测到的碰撞。接下来，在`.update()`方法内部调用的方法末尾创建一个`.checkCollision()`方法调用。该方法将在每个脉冲事件处理时调用碰撞检测Java代码（我们将在本章剩余部分编写）。这符合`.update()`方法中游戏代码处理的逻辑顺序。\n\
    \n新的`.update()`方法（如图[16-30](#9781484204160_Ch16.xhtml#Fig30)所示）应如下所示：\n\n```\n\
    public void update() {\n    setXYLocation();\n    setBoundaries();\n    setImageState();\n\
    \    moveInvinciBagel();\n//  playAudioClip();\n    checkCollision();\n}\n```\n\
    \n![9781484204160_Fig16-30.jpg](OEBPS/Images/9781484204160_Fig16-30.jpg)\n\n[Figure\
