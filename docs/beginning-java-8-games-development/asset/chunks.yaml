    接下来，我们创建了 **CastingDirector.java** 类，用于管理需要添加到游戏中以及从游戏中移除的 Actor 对象。该类还将维护一个 `List<Actor>`
    结构，该结构将用于我们稍后在本书第 16 章中添加的碰撞检测逻辑。


    最后，我们创建了第一个与 Actor 相关的类，即 Bagel 类，它继承了 Hero 超类，并允许我们将主要的 InvinciBagel Actor 对象角色放入游戏场景和舞台中。我们创建了
    `Bagel()` 构造方法，并使用 **@Override** 关键字重写了 **.update()** 和 **.collide()** 方法，以便在本书的后续部分中，有地方构建与此角色相关的编程逻辑。


    在下一章中，我们将探讨如何使用本章创建的 KeyEvent 事件处理结构在屏幕上移动游戏**精灵**，以及如何确定屏幕的**边界**（边缘）、角色方向、移动速度以及相关的动画和移动注意事项。


    第 11 章


    ![image](img/frontdot.jpg)


    在 2D 中移动你的可动人偶：控制 X 和 Y 显示屏幕坐标


    既然我们已经在第 10 章中创建了公开的 CastingDirector 类（我称之为“选角引擎”），那么我们需要回到第 11 章的 **InvinciBagel.java**
    主应用程序类编码中，并在 **.createGameActors()** 方法中创建我们的 **iBagel** 主要游戏玩法 Actor（角色）。我们还将使用我们在第
    10 章中创建的 CastingDirector.java 类及其 CastingDirector() 构造方法来创建 **castDirector** 对象，以及创建
    **.createCastingDirection()** 方法，该方法将管理我们的选角方向类相关功能。


    在完成向 InvinciBagel.java 类中添加代码以创建 iBagel Bagel 对象和 **castDirector** CastingDirector
    对象之后，我们将把代码重新组织成针对 InvinciBagel 类中需要处理的主要任务区域的**逻辑方法结构**。完成此操作后，我们将拥有八个逻辑方法区域。这些方法将作为“指南”，指引我们在本书后续开发游戏过程中需要持续更新（添加语句）的功能区域。例如，如果我们要向游戏添加一个
    Actor，我们将通过在 `.createGameActors()` 方法内部添加（实例化）一个 Actor 对象来实现，然后将该 Actor 对象添加到使用新的
    `CastingDirector()` 构造方法在 `.createCastingDirection()` 方法内部创建的 cast 对象中。


    除了 `.createGameActors()` 和 `.createCastingDirector()` 方法之外，我们的新方法还将包括 **.loadImageAssets()**
    方法、**.createSceneEventHandling()** 方法、**.createStartGameLoop()** 方法和 **.addGameActorNodes()**
    方法。因此，在本章中，我们将为你的 InvinciBagel.java 类创建六个新方法，以显著“充实”我们游戏核心类及其“顶层” **.start()**
    方法的顶层组织结构。只有一个方法在此过程中无需任何修改即可保留；那就是你在第 6 章中创建的 `.addNodesToStackPane()` 方法（参见图
    6-8 以回顾）。


    在重新组织好 InvinciBagel.java 代码基础设施后，我们可以继续前进，开始创建用于创建并随后控制游戏主角（InvinciBagel 本人）的程序逻辑。这将涉及使用
    `Bagel()` 和 `CastingDirector()` 构造方法，然后分别使用 **.add()** 方法调用和 **.addCurrentCast()**
    方法调用，将 **iBagel** Bagel 对象添加到场景图（StackPane **root** 对象）和 CastingDirector **castDirector**
    对象中。


    在创建好 iBagel Actor 之后，我们将把它的 `.update()` 方法连接到 `GamePlayLoop .handle()` 方法，此时我们就可以开始构建编程逻辑，让这个
    InvinciBagel 在你的舞台上移动。此时，事情变得更有趣了，因为我们可以开始定义舞台的移动边界、精灵图像状态（九种不同的角色位置），以及这些状态与
    X（左右）和 Y（上下）按键使用的关系。例如，不移动就是站立，左右移动使用跑步，向上使用跳跃，向下使用着陆，或者在游戏设计的后期，某些按键组合可以使 InvinciBagel
    飞行等等，随着我们不断完善代码。


    InvinciBagel.java 重新设计：添加逻辑方法


    关于 InvinciBagel.java 代码（如果尚未在 NetBeans 的标签页中打开，请使用右键单击和**打开**工作流程），我想做的第一件事是使用六个新方法重新组织当前代码，这些方法逻辑上包含并展示了为了向游戏添加新
    Actor 而需要处理的不同区域。这些包括管理事件处理、添加新的图像资源引用、创建新的游戏 Actor 对象、将新 Actor 添加到场景图、将新 Actor
    对象添加到我们在第 10 章中创建的 `CURRENT_CAST` 列表，以及启动 `GamePlayLoop AnimationTimer` 脉冲引擎。我们应该做的第一件事是将那些需要首先执行且必须位于
    `.start()` 方法本身的 Java 语句放在代码顶部。这些语句创建场景图根节点、Scene 对象并设置 Stage 对象：


    ```

    primaryStage.setTitle(InvinciBagel);

    root = new StackPane();

    scene = new Scene(root, WIDTH, HEIGHT, Color.WHITE);

    primaryStage.setScene(scene);

    primaryStage.show();

    ```


    如图 11-1 所示，我们将 root 和 scene 对象的实例化从名为 `.createSplashScreenNodes()` 的方法中取出，并将其放在
    `.start()` 方法的顶部。我这样做是因为它们是我们 InvinciBagel 游戏（类）的基础。接下来，我们还将向现有代码中添加六个全新的方法结构。在此过程中唯一保持不变的方法是
    **.addNodesToStackPane()**。你可以看到我按逻辑顺序调用这些方法：添加事件、添加图像、添加 Actor、添加场景图、添加选角。


    ![9781484204160_Fig11-01.jpg](img/9781484204160_Fig11-01.jpg)


    图 11-1. 将基本配置语句放在 .start() 方法的顶部，然后是八个游戏方法调用

