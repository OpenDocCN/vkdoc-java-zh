    \ 方法。此方法提供了您希望在 JavaFX 引擎的场景和舞台处理周期的每一帧上执行的编程逻辑，该周期优化为以 60FPS 播放（这对游戏来说非常完美）。JavaFX\
    \ 使用一个**脉冲**系统，该系统基于新的 Java 8 **纳秒**时间单位（早期版本的 Java 使用**毫秒**）。"
  raw: 'You can set the animation **playback speed** (also called the frame rate or
    frames per second [FPS]) by using the **rate** property. The **cycleCount** property
    (variable) allows you to specify how many times an animation will **loop**, and
    a **delay** property lets you specify a delay time before the animation starts.
    If your animation is looping, this delay property will specify the delay time
    between loops, which can help you create some realistic effects.


    You can specify a **seamless** animation **loop** by setting the **cycleCount**
    attribute or property (variable) to **INDEFINITE** and then using the **autoReverse**
    property (set to **false**), or you can use **pong** (back and forth) animation
    looping by specifying the **true** value for the autoReverse property. You can
    also set the cycleCount to a **numeric value** (use 1 if you want the animation
    to play only one time) if you do not want the animation to loop indefinitely.


    The **.setRate()** method sets the animation playback rate property, the **.setDelay()**
    method sets the delay property, and the **.setCycleCount()** and **.setCycleDuration()**
    methods control the cycling characteristics. There are also similar **.get()**
    methods to “get” the currently set values for these Animation object variables
    (properties, attributes, parameters, or characteristics; however you prefer to
    look at these data fields is fine).


    You can assign an action to be executed when the animation has completed playback,
    using the **onFinished** property loaded with an ActionEvent object. The action
    will be executed when the animation reaches the end of each loop, and, as you
    can imagine, some very powerful things can be triggered in a game with this particular
    capability.


    There are also **read-only** variables (properties), which you can “poll” at any
    time to find the **status**, **currentTime**, **currentRate**, **cycleDuration**,
    and **totalDuration** for each Animation object. For example, you can use the
    **currentTime** property to see the position of the playback head (frame pointer)
    at any point in time in the animation playback cycle.


    The JavaFX TimeLine Class: An Animation Subclass for Property Timeline Management


    The JavaFX Timeline class is a subclass of the JavaFX Animation superclass, so
    its inheritance hierarchy starts with the Java 8 masterclass, java.lang.Object,
    progressing down to the Timeline class, as follows:


    ```

    > java.lang.Object

      > javafx.animation.Animation

        > javafx.animation.Timeline

    ```


    A Timeline object can be used to define a special kind of Animation object that
    is composed of JavaFX values (properties) of the object type **WritableValue**.
    Because all JavaFX properties are of that type, this class can be used to animate
    anything in JavaFX, which means that its use is limited only by your imagination.


    As mentioned earlier, Timeline animations are defined using **KeyFrame** objects,
    created via the KeyFrame class, which both creates and manages these objects.
    A KeyFrame object is processed by a Timeline object, according to a **time** variable
    (accessed via **KeyFrame.time**) and properties to be animated, which are defined
    using the KeyFrame object’s values variable (accessed via **KeyFrame.values**).


    It is important to note that you need to set up your KeyFrame objects before you
    start running the Timeline object, as you cannot change a KeyFrame object within
    a running Timeline object. This is because it is put into system memory once it
    has been started. If you want to change a KeyFrame object in a running Timeline
    object in any way, first, stop the Timeline object; then, make the change to the
    KeyFrame; and, finally, start the Timeline object again. This will reload the
    Timeline object and its revised KeyFrame objects into memory with their new values.


    The **Interpolator** class interpolates these KeyFrame.values in the Timeline
    object, based on the timeline **direction**. Interpolation is a process of creating
    in-between (or tween) frames, based on the beginning and ending values. In case
    you are wondering how the **direction** is inferred, it is kept in the rate and
    the read-only currentRate property of the Animation superclass (which is a part
    of the extended Timeline subclass).


    Inverting the value of the rate property (i.e., making it **negative**) will reverse
    (toggle) the playback direction; the same principle holds when reading the currentRate
    property (a negative value signifies the reverse, or backward, direction). Finally,
    the **KeyValue** class (object) is used to hold the values inside the KeyFrame
    object.


    The JavaFX Transition Class: An Animation Subclass for Transition Effects Application


    The JavaFX Transition class is a subclass of the JavaFX Animation superclass,
    so its inheritance hierarchy starts with the Java 8 masterclass, java.lang.Object,
    progressing down to the Transition class, as follows:


    ```

    > java.lang.Object

      > javafx.animation.Animation

        > javafx.animation.Transition

    ```


    The Transition class is a **public abstract** class, and, as such, it can only
    be used (subclassed or extended) to create transition subclasses. In fact, ten
    of these subclasses have already been created for you to use to create your own
    transition special effects; these are the **SequentialTransition**, **FadeTransition**,
    **FillTransition**, **PathTransition**, **PauseTransition**, **RotateTransition**,
    **ScaleTransition**, **TranslateTransition**, **ParallelTransition**, and **StrokeTransition**
    classes. As a subclass of Animation, the Transition class contains all the functionality
    of Animation.


    Chances are you will end up using the ten custom transition classes directly,
    as they provide the different types of transitions you are likely to want to use
    (fades, fills, path based, stroke based, rotate, scale, movement, and so on).
    I am going to move on to the AnimationTimer class next, as we will be using this
    class for our game engine during the book.


    The JavaFX AnimationTimer Class: Frame Processing, Nanoseconds, and Pulse


    The JavaFX AnimationTimer class is **not** a subclass of the JavaFX Animation
    superclass, so its inheritance hierarchy starts with the Java 8 masterclass, java.lang.Object,
    and looks like this:


    ```

    > java.lang.Object

      > javafx.animation.AnimationTimer

    ```


    What this means is that the AnimationTimer class is **scratch coded** specifically
    to offer AnimationTimer functionality to JavaFX and that it is not related to
    the Animation (or Timeline or Transition) class or subclasses in any way. For
    this reason, the name of this class may be somewhat misleading if you are mentally
    grouping the class in with the Animation, Interpolator, KeyFrame, and KeyValue
    classes that occupy the javafx.animation package with it, as is has no relation
    to these classes whatsoever!


    Like the Transition class, the AnimationTimer class has been declared a **public
    abstract** class. Because it is an abstract class, it can only be used (subclassed
    or extended) to create AnimationTimer subclasses. Unlike the Transition class,
    it has no subclasses that have been created for you; you have to create your own
    AnimationTimer subclasses from scratch, which we will be doing later on in the
    book to create our GamePlayLoop.java class.


    The AnimationTimer class is deceptively simple, in that it has only one method
    that you must override or replace, contained in the public abstract class: the
    .handle() method. This method provides the programming logic that you want to
    have executed on every frame of the JavaFX engine’s stage and scene processing
    cycle, which is optimized to play at 60FPS (this is perfect for games). JavaFX
    uses a **pulse** system, which is based on the new Java 8 **nanosecond** unit
    of time (previous versions of Java used **milliseconds**).'
  trans: '

    你可以通过 **rate** 属性来设置动画的**播放速度**（也称为帧率或每秒帧数 [FPS]）。**cycleCount** 属性（变量）允许你指定动画**循环**的次数，而
    **delay** 属性则让你指定动画开始前的延迟时间。如果你的动画是循环播放的，这个 delay 属性将指定循环之间的延迟时间，这可以帮助你创建一些逼真的效果。


    你可以通过将 **cycleCount** 属性或变量设置为 **INDEFINITE**，然后使用 **autoReverse** 属性（设置为 **false**）来指定一个**无缝**的动画**循环**；或者，你也可以通过为
    autoReverse 属性指定 **true** 值来使用 **pong**（来回）动画循环。如果你不希望动画无限循环，也可以将 cycleCount 设置为一个**数值**（如果你希望动画只播放一次，则使用
    1）。


    **.setRate()** 方法用于设置动画播放速率属性，**.setDelay()** 方法用于设置延迟属性，而 **.setCycleCount()**
    和 **.setCycleDuration()** 方法则控制循环特性。还有一些类似的 **.get()** 方法用于“获取”这些 Animation 对象变量（属性、特性、参数或特征；你如何称呼这些数据字段都可以）的当前设定值。


    你可以使用加载了 ActionEvent 对象的 **onFinished** 属性，来指定动画播放完成时要执行的动作。当动画到达每次循环的末尾时，该动作将被执行，并且，你可以想象，在游戏中可以利用这一特定功能触发一些非常强大的效果。


    还有一些**只读**变量（属性），你可以随时“轮询”它们以获取每个 Animation 对象的 **status**、**currentTime**、**currentRate**、**cycleDuration**
    和 **totalDuration**。例如，你可以使用 **currentTime** 属性来查看动画播放周期中任意时间点的播放头（帧指针）位置。


    JavaFX TimeLine 类：用于属性时间线管理的动画子类


    JavaFX Timeline 类是 JavaFX Animation 超类的一个子类，因此其继承层次结构从 Java 8 主类 java.lang.Object
    开始，向下延伸到 Timeline 类，如下所示：


    ```

    > java.lang.Object

      > javafx.animation.Animation

        > javafx.animation.Timeline

    ```


    Timeline 对象可用于定义一种特殊的 Animation 对象，该对象由 **WritableValue** 对象类型的 JavaFX 值（属性）组成。由于所有
    JavaFX 属性都属于该类型，因此此类可用于为 JavaFX 中的任何内容制作动画，这意味着它的使用仅受限于你的想象力。


    如前所述，Timeline 动画是使用 **KeyFrame** 对象定义的，这些对象通过 KeyFrame 类创建，该类同时负责创建和管理这些对象。KeyFrame
    对象由 Timeline 对象根据 **time** 变量（通过 **KeyFrame.time** 访问）和要动画化的属性（使用 KeyFrame 对象的
    values 变量定义，通过 **KeyFrame.values** 访问）进行处理。


    需要注意的是，你需要在启动 Timeline 对象之前设置好你的 KeyFrame 对象，因为你无法在正在运行的 Timeline 对象中更改 KeyFrame
    对象。这是因为一旦启动，它就会被放入系统内存。如果你想以任何方式更改正在运行的 Timeline 对象中的 KeyFrame 对象，首先，停止 Timeline
    对象；然后，对 KeyFrame 进行更改；最后，再次启动 Timeline 对象。这将使用新的值将 Timeline 对象及其修改后的 KeyFrame
    对象重新加载到内存中。


    **Interpolator** 类根据时间线**方向**对 Timeline 对象中的这些 KeyFrame.values 进行插值。插值是一个基于起始值和结束值创建中间帧（或补间帧）的过程。如果你想知道**方向**是如何推断的，它保存在
    Animation 超类（它是扩展的 Timeline 子类的一部分）的 rate 和只读的 currentRate 属性中。


    反转 rate 属性的值（即使其为**负值**）将反转（切换）播放方向；读取 currentRate 属性时也遵循同样的原则（负值表示反向或倒退方向）。最后，**KeyValue**
    类（对象）用于保存 KeyFrame 对象内部的值。


    JavaFX Transition 类：用于过渡效果应用的动画子类


    JavaFX Transition 类是 JavaFX Animation 超类的一个子类，因此其继承层次结构从 Java 8 主类 java.lang.Object
    开始，向下延伸到 Transition 类，如下所示：


    ```

    > java.lang.Object

      > javafx.animation.Animation

        > javafx.animation.Transition

    ```


    Transition 类是一个**公共抽象**类，因此它只能被使用（子类化或扩展）来创建过渡子类。事实上，已经为你创建了十个这样的子类，供你用来创建自己的过渡特效；它们是
    **SequentialTransition**、**FadeTransition**、**FillTransition**、**PathTransition**、**PauseTransition**、**RotateTransition**、**ScaleTransition**、**TranslateTransition**、**ParallelTransition**
    和 **StrokeTransition** 类。作为 Animation 的子类，Transition 类包含了 Animation 的所有功能。


    你很可能会直接使用这十个自定义过渡类，因为它们提供了你可能想要使用的不同类型的过渡（淡入淡出、填充、基于路径、基于描边、旋转、缩放、移动等等）。接下来我将继续介绍
    AnimationTimer 类，因为在本书中我们将使用这个类来构建我们的游戏引擎。


    JavaFX AnimationTimer 类：帧处理、纳秒和脉冲


    JavaFX AnimationTimer 类**不是** JavaFX Animation 超类的子类，因此其继承层次结构从 Java 8 主类 java.lang.Object
    开始，如下所示：


    ```

    > java.lang.Object

      > javafx.animation.AnimationTimer

    ```


    这意味着 AnimationTimer 类是**从头编码**的，专门为 JavaFX 提供 AnimationTimer 功能，并且它与 Animation（或
    Timeline 或 Transition）类或子类没有任何关系。因此，如果你在心理上将这个类与同属 javafx.animation 包中的 Animation、Interpolator、KeyFrame
    和 KeyValue 类归为一组，那么这个类的名称可能会有些误导，因为它与这些类完全没有关系！


    与 Transition 类一样，AnimationTimer 类被声明为一个**公共抽象**类。因为它是一个抽象类，所以只能被使用（子类化或扩展）来创建
    AnimationTimer 子类。与 Transition 类不同，它没有为你创建任何子类；你必须从头创建自己的 AnimationTimer 子类，我们将在本书后面创建
    GamePlayLoop.java 类时进行此操作。


    AnimationTimer 类看似简单，因为它只有一个你必须覆盖或替换的方法，包含在这个公共抽象类中：即 .handle() 方法。此方法提供了你希望在
    JavaFX 引擎的场景和舞台处理循环的每一帧上执行的编程逻辑，该循环优化为以 60FPS 播放（这对游戏来说非常完美）。JavaFX 使用一个**脉冲**系统，该系统基于新的
    Java 8 **纳秒**时间单位（旧版本的 Java 使用**毫秒**）。

