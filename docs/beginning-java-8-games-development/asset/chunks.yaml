    ## CHAPTER 5


    ![image](OEBPS/Images/frontdot.jpg)


    ### An Introduction to Game Design: Concepts, Multimedia, and Using Scene Builder


    In this chapter, you will build on your knowledge of the JavaFX multimedia engine
    by learning about the optimal way to use the scene graph paradigm in JavaFX and
    take a look at JavaFX Scene Builder tool and FXML, and why (or why not) to use
    these in certain types of Java game development scenarios. You will also examine
    basic game design optimization concepts, and the types of games, as well as game
    engines, that are available for the Java platform, including physics engines,
    such as `JBox2D` and `Dyn4J`, and 3D game engines, such as `LWJGL` and `JMonkey`.
    Finally, you will consider the new media concepts that you will need to understand
    to integrate digital imaging, digital audio, digital video, and animation into
    your game production pipeline. We will also look at some of the free open-source
    multimedia production tools that you installed back in [Chapter 1](#9781484204160_Ch01.xhtml),
    and can now use to create Java 8 games.


    First, you will revisit the underlying concept of static (fixed) versus dynamic
    (real time), which was covered in [Chapter 3](#9781484204160_Ch03.xhtml) (constant
    versus variable) and [Chapter 4](#9781484204160_Ch04.xhtml) (pulse) and which
    is one of the foundational principles of game optimization. This is important,
    because you will want your game to run smoothly across all the different platforms
    and devices that are used to play it, even if the device only uses a single processor
    (which is actually rare these days, with most devices featuring dual core (two
    processor) or quad core (four processor) CPUs).


    Next, you will study the concepts, techniques, and lingo of game design, including
    sprites, collision detection, physics simulation, background plates, animation,
    layers, levels, logic, and AI. You will also examine the different types of games
    that can be designed, and how they differ from each other.


    Then, you will explore the role that multimedia assets play in today’s visually
    (and aurally) impressive games. You will learn about the principles of digital
    imaging, digital video, and animation as well as digital audio, as you will be
    using many of these new media asset types over the course of the book, and will
    need this foundational knowledge to be able to work with them.


    Finally, you will take an in-depth look at the bootstrap JavaFX application code
    that you generated in [Chapter 2](#9781484204160_Ch02.xhtml) and at how the Java
    `.main()` method and the JavaFX `.start()` method create the `primaryStage` Stage
    object, using the `Stage()` constructor method, and, inside that, create a Scene
    object named `scene`, using the `Scene()` constructor method. You will look at
    how to use methods from the `Stage` class to set the scene, title the stage, and
    show the stage as well as how to create and use `StackPane` and `Button` class
    (objects) and how to add an `EventHandler` to a button.


    ### High-Level Concept: Static vs. Dynamic


    I want to start out with a high-level concept that touches on everything that
    I will be talking about in this chapter, from the types of games you can create,
    to game optimization, to JavaFX Scene Builder and JavaFX Scene Graph. You took
    a look at this concept back in [Chapter 3](#9781484204160_Ch03.xhtml), whether
    you realized it or not, while exploring the concept of a Java constant, which
    is fixed, or static, and does not change, versus a Java variable, which is dynamic
    and changes in real time. Similarly, a UI design in JavaFX Scene Graph can be
    static (fixed and immovable) or dynamic (animated, draggable, or skinnable, meaning
    that you can change the UI look to suit your personal taste).


    The reason these concepts are important in game design and development is that
    your game’s engine, which you design to run or render your game, must constantly
    check on its dynamic portions to see if they have changed and require a response
    (update a score, move a sprite position, play an animation frame, change the game
    piece’s state, calculate collision detection, calculate physics, and so on). This
    checking (and the ensuing processing) on every frame update (called a pulse in
    JavaFX; see [Chapter 4](#9781484204160_Ch04.xhtml)), to make sure that all your
    variables, positions, states, animations, collisions, physics, and the like are
    conforming to your Java game engine logic, can really add up, and, at some point,
    the processor that is doing all this work can get overloaded, which can slow it
    down!


    The result of this overloading of all the real-time, per-frame checking that enhances
    the dynamics of your game (play) is that the frame rate at which your game is
    running will decrease. That’s right, like digital video and animation, Java 8
    games have frame rates, too, but Java 8 game frame rates are based upon the efficiency
    of your programming logic. The lower the frame rate of your game, the less smooth
    the game play becomes, at least for dynamic, real-time games, such as arcade games;
    how smoothly a game plays relates to how seamless (enjoyable) the user experience
    is for the customer, the game player.


    For this reason, the concept of static versus dynamic is very important to every
    aspect of game play design and makes it easier to achieve a great user experience
    with certain types of games than with others. I will be discussing different types
    of games later in the chapter (see the section “Types of Games: Puzzles, Board
    Games, Arcade Games, Hybrids”), but, as you might imagine, board games are more
    static in nature, and arcade games are more dynamic. That said, there are optimization
    approaches that can keep a game dynamic, that is, seem like a lot is going on,
    when, from a processing point of view, what is really going on is quite manageable.
    This is one of the many tricks of game design, which, when all is said and done,
    is about optimization.'
