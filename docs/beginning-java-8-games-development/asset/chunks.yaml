    现在，我们准备创建 **Hero 子类**，它将为我们在 Actor 类中创建的十三个属性再增加十一个属性，使总数达到整整二十四个。Hero 类中保存的这些额外十一个属性将用于可在屏幕上移动的可移动精灵（我喜欢称之为运动精灵）。我们的
    InvinciBagel 角色将是游戏单人版本中的主要 Hero Actor 对象，而在未来的多人版本中，这将包括 InvinciBagel Hero Actor
    对象和 Enemy Hero Actor 对象。


    创建 Hero 超类：运动精灵属性


    接下来，让我们创建 **public abstract Hero** 类！这个类将是本书中为游戏创建**运动精灵**的基础。在 NetBeans 中创建你的
    **Hero.java** 类，并将其声明为 **public abstract class Hero extends Actor**。由于我们已经在 Actor
    类中完成了大部分“繁重工作”，你无需再创建 ImageView 来保存精灵图像资源，也无需创建加载了 Image 对象列表的 List<Image> ArrayList
    对象，或用于保存碰撞形状 SVG 折线（或多边形）路径数据的 SVGPath Shape 对象。


    由于我们无需声明任何主要属性（这些属性已从 Actor 超类继承），我们要做的第一件事是创建一个 **Hero()** 构造方法。该方法将包含 **String**
    对象中的碰撞形状数据、精灵的 **X, Y** 位置，以及将加载到 List<Image> ArrayList 对象中的 **Image** 对象。在创建基本的
    Hero() 构造方法后，我们将像设计 Actor 超类时那样，完成对运动精灵所需其他属性（或变量）的确定。


    请记住，你已经通过 Actor() 方法在 Actor 类中构建了 spriteBound SVGPath Shape 对象、imageStates List<Image>
    ArrayList 对象、SpriteFrames Image 对象以及 iX 和 iY 变量。为了能够编写 Hero() 构造方法，这些元素也必须就位。由于
    Hero 类声明中的 Java **extends** 关键字已确保这些元素全部就位，我们只需使用 **super()** 构造方法调用，将这些变量从 Hero()
    构造方法传递给 Actor() 构造方法。这将利用 Java **super** 关键字自动将这些变量传递到 Hero 类中供我们使用。


    因此，我们已具备编写核心 Hero() 构造方法所需的一切，现在就开始吧。Hero() 构造方法将接收与 Actor() 构造方法相同数量的复杂参数。这些参数包括：包含在名为
    **SVGdata** 的 String 对象中的碰撞形状数据、精灵的“初始放置”X 和 Y 位置，以及精灵的 Image 对象（帧或单元）的逗号分隔列表，我将其命名为
    `Image... spriteCels`。这个 **Image...** 声明必须位于参数列表的末尾，因为它表示“开放式”参数，意味着参数列表将传入一个或多个
    Image 对象。你的代码将如下所示：


    ```

    public void Hero(String SVGdata, double xLocation, double yLocation, Image...
    spriteCels) {

        super(SVGdata, xLocation, yLocation, spriteCels);

    }

    ```


    通过使用 super() 将核心构造工作传递给 Actor 超类的 Actor() 构造方法，你之前写在 Actor() 构造方法中的代码将使用 Java
    **new** 关键字和 **SVGPath** Shape 子类创建 **spriteBound** SVGPath Shape 对象，并使用 SVGPath
    类的 **.setContent()** 方法将碰撞形状加载到 SVGPath Shape 对象中，以便与精灵图像状态一起使用。**iX** 和 **iY**
    初始位置被设置，**imageStates** List<Image> 数组则加载了从参数列表末尾传入的精灵 **Image** 对象。


    需要注意的是，由于我们以这种方式进行设置，Hero 类可以访问 Actor 类拥有的所有内容（十三个强大的属性）。实际上，从另一个角度来看可能更“贴切”：Actor（固定精灵）类拥有
    Hero（运动精灵）类的全部能力。这种能力应被充分利用，以实现关卡设计的惊艳效果，包括多图像状态（List<Image> 数组）、自定义 SVGPath 碰撞形状能力、自定义枢轴点放置，以及围绕
    X 轴（FlipV = true）或 Y 轴（FlipH = true）或两个轴（FlipH = FlipV = true）翻转（镜像）精灵图像的能力。将这些能力落实到你的
    Actor 引擎（Actor 和 Hero 抽象超类）中只是第一步；随着时间推移，你不断构建和完善游戏，巧妙地将它们用于游戏设计和编程，才是本章奠定这一基础的最终目标。正如你在图
    8-10 中所见，我们的基本（核心）构造代码没有错误。


