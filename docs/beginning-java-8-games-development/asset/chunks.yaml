    be changed (reassigned) to refer to a different object; the data that are held
    inside the (final) referenced object can be changed, however, as only the reference
    to the object itself is the final reference variable, which is essentially locked
    in, using a Java final keyword.'
  trans: '

    需要注意的是，如果你试图访问和使用的公共类存在于你自己的包（在你的例子中是 invincibagel）之外的另一个包中，那么 Java 编程惯例是使用 `import`
    关键字来创建一条导入语句，从而允许使用该公共类。这就是为什么，当你读到本书结尾时，你的 `InvinciBagel.java` 类顶部会有几十条导入语句，因为你将利用代码库中那些已经过编码、测试、优化并已使用
    `public` 访问控制修饰符关键字公开的现有 Java 和 JavaFX 类，从而随心所欲地创建 Java 8 游戏！


    由于 Java 中的**类继承**概念，一个公共类中的所有公共方法和公共变量都将被该类的子类**继承**（一旦该类被继承，它就变成了超类）。图 3-2 展示了在
    `InvinciBagel` 类关键字前使用 `public` 访问控制修饰符关键字的示例。


    Java 的受保护修饰符：允许子类访问的变量和方法


    Java 的 **protected** 访问修饰符关键字可用于数据字段（变量和常量）和方法（包括构造方法），但不能用于类或接口。`protected` 关键字允许超类中的变量、方法和构造器仅被其他包（例如
    `invincibagel` 包）中该超类的子类访问，或者被与包含这些受保护成员（Java 结构）的类位于同一包中的任何类访问。


    这个访问修饰符关键字本质上保护了那些旨在（希望被用作）超类中的方法和变量，使其能够被其他开发者通过创建子类（**扩展**）来使用。除非你拥有包含这些受保护
    Java 结构的包（你并没有），否则你必须扩展该超类，并从该超类创建你自己的子类，才能使用这些受保护的方法。


    你可能会想，为什么要这样做，以这种方式保护 Java 代码结构呢？当你设计一个大型项目（例如 Android 操作系统 API）时，你通常希望高级别的方法和变量不被直接使用（即不直接从该类内部使用），而是在一个定义更明确的子类结构中使用。


    你可以通过保护这些方法和变量结构不被直接使用来实现这种直接使用的预防，使它们仅成为其他类中更详细实现的蓝图，而无法被直接使用。本质上，保护一个方法或变量会将其转变为仅是一个蓝图或定义。


    Java 的私有修饰符：变量、方法和类仅限本地访问


    Java 的 **private** 访问控制修饰符关键字可用于数据字段（变量或常量）和方法（包括构造方法），但不能用于类或接口。`private` 修饰符可用于嵌套类，但不能用于外部类或主（最顶层）类。`private`
    访问控制关键字允许类中的变量、方法和构造器仅在该类内部被访问。`private` 访问控制关键字允许 Java 实现一个称为封装的概念，通过该概念，一个类（以及使用该类创建的对象）可以封装自身，可以说是将其“内部细节”隐藏于外部的
    Java 世界。OOP 的封装概念可用于大型项目，允许团队创建（更重要的是，调试）他们自己的类和对象。这样，其他人的 Java 代码就无法破坏这些类内部存在的代码，因为它们的方法、变量、常量和构造器都是私有的！


    这个访问修饰符关键字本质上将类中的方法或变量私有化，使得它们只能在该类内部本地使用，或者由该类的构造方法创建的对象使用。除非你拥有包含这些私有 Java 结构的类，否则你无法访问或使用这些方法或数据字段。这是
    Java 中最严格的访问控制级别。如果一个声明为 `public` 的方法（称为公共的 `.get()` 方法调用）从类内部访问一个私有变量，并且该方法被声明为
    `public`，从而通过该公共方法为私有变量或常量中的数据提供了一条路径（或通道），那么声明为 `private` 的变量可以在类外部被访问。


    Java 的包私有修饰符：你包中的变量、方法和类


    如果未声明任何 Java 访问控制修饰符关键字，则将为该 Java 结构（类、方法、数据字段或接口）应用**默认**的访问控制级别，也称为**包私有**访问控制级别。这意味着这些
    Java 结构对于包含它们的 Java 包内的任何其他 Java 类都是可见或可用的。这种包私有级别的访问控制对你的方法、构造器、常量和变量来说是最容易使用的，因为它只需不显式声明访问控制修饰符关键字即可应用。


    在你自己的 Java 应用程序（游戏）编程中，你会经常使用这种默认的访问控制级别，因为你通常是在自己的包中创建自己的应用程序，供用户以其编译后的可执行状态使用。然而，如果你正在为其他游戏开发者开发游戏引擎，你会更多地使用我在本节中讨论的访问控制修饰符关键字，来控制其他人如何使用你的代码。


    非访问控制修饰符：final、static、abstract、volatile、synchronized


    那些不专门为你的 Java 结构提供访问控制功能的 Java 修饰符关键字被称为**非访问控制修饰符关键字**。这些包括常用的 **final**、**static**
    和 **abstract** 修饰符关键字，以及不太常用的 **synchronized** 和 **volatile** 修饰符关键字，后者用于更高级的**线程**控制，在本初级编程书籍中我不会深入介绍，除了描述它们的含义和作用，以防你在
    Java 世界的旅途中遇到它们。


    我将按照这些概念的复杂程度来介绍它们，即从初学者最容易理解的概念到面向对象编程初学者最难理解的概念。OOP 就像冲浪，在你练习多次之前看起来非常困难，然后突然间你就掌握了！


    Java 的 final 修饰符：不能被修改的变量、方法和类


    你已经探索过 **final** 修饰符关键字，它通常与 `static` 关键字一起用于声明常量。一个 `final` 数据字段变量只能被初始化（设置）一次。一个
    `final` **引用变量**，这是一种特殊的 Java 变量，包含对内存中某个对象的引用，不能被更改（重新赋值）以引用不同的对象；然而，被（final）引用的对象内部持有的数据是可以更改的，因为只有对对象本身的引用才是
    `final` 引用变量，它通过使用 Java 的 `final` 关键字被本质地锁定。

