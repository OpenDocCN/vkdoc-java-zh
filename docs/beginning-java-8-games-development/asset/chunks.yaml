  trans: '

    最后，我们查看了一个更新后的 InvinciBagel 包、类和对象结构图，以了解我们在本书前八章中取得的进展。这真是令人兴奋！


    在下一章中，我们将探讨如何控制我们将在本章创建的 Actor 引擎所生成的游戏**精灵**。接下来的第 9 章将涵盖 Java 8 和 JavaFX 事件处理，这将使我们的游戏玩家能够通过事件处理来操控（控制）这些
    Actor 精灵。


    第 9 章


    ![图片](img/frontdot.jpg)


    控制你的动作角色：实现 Java 事件处理器并使用 Lambda 表达式


    既然我们已经在第 8 章中创建了公开的抽象 Actor 和 Hero 类（我称之为“Actor 引擎”），那么让我们回到第 9 章中的 **InvinciBagel.java**
    主应用程序类编码，并创建**事件处理**框架，用于控制我们游戏中的主要英雄——InvinciBagel 本人。如果我们沿用至今使用的引擎范式，那么实现玩家与游戏编程逻辑之间接口的事件处理可以被视为游戏的“**交互引擎**”。与游戏交互的方式有很多种，包括**方向键**（在消费电子设备中也称为**DPAD**）、**键盘**、**鼠标**或轨迹球、**游戏控制器**、**触摸屏**，甚至更高级的硬件，如**陀螺仪**和**加速度计**。你在游戏开发中需要做出的选择之一，就是玩家将如何利用他们正在玩游戏的硬件设备及其支持的**输入能力**来与游戏进行**交互**。


    在本章中，我们将对你的 InvinciBagel.java 类进行多项**升级**。首先是添加对游戏 **WIDTH** 和 **HEIGHT** 变量的支持，以
    Java **常量**的形式。这将使我们能够更改游戏画面的宽度和高度，即弹出游戏窗口内部的区域，或者如果游戏玩家使用的是消费电子设备，则是整个屏幕。


    我们要进行的第二项升级是添加 Java 代码，创建一个**空白白色屏幕**，以便我们在接下来的几章中在其上设计游戏。我们将通过在 `Scene()` 构造方法调用中设置
    **Color.WHITE** 背景颜色（连同我们新的宽度和高度变量），然后在已有的 Button 控件事件处理器结构中安装 Java 代码，来**隐藏**我们用于合成启动画面
    UI 设计的两个 ImageView “面板”。我们稍后也可以使用这两个 ImageView Node 对象来保存游戏玩法的背景图像，一旦我们进入那个设计阶段。请记住，保持场景图中节点的数量最少非常重要，因此我们将**重用**
    Node 对象，而不是添加更多。


    我们要添加的第三项升级是向 Scene 对象添加**键盘事件处理**例程，这些例程将处理我们将用于游戏的方向键支持，以适用于任何带有方向键板或 DPAD 的硬件设备。这将处理从
    Scene 顶层到 StackPane（场景图）层次结构的所有事件。这将把用户按下的方向键值传递给我们的 Node 对象。这最终将允许**运动控制代码**在游戏中移动
    Actor，这是我们将在下一章中更详细地探讨的内容。


    除了升级我们的 InvinciBagel.java 代码和添加键盘事件处理之外，我们还将在这章学习 **lambda 表达式**，以确保我在这本书中涵盖了
    Java 8 的所有新特性。这些 lambda 表达式对于这本入门级书籍来说有些高级，但由于它们是 Java 8 的主要新特性，并且提供了多线程支持以及更紧凑的代码结构，我将在本章中介绍它们，部分原因是
    NetBeans 8（毫不意外）愿意为你编写它们！


    游戏画面设计：添加分辨率灵活性


    我想对 InvinciBagel.java 代码做的第一件事（该代码应该已经在 NetBeans 的一个标签页中打开，如果没有，请使用右键单击和**打开**工作流程）是为游戏应用程序添加
    **WIDTH** 和 **HEIGHT** 常量。这样做的原因是，你可能希望为上网本或平板电脑（1024 x 600）、iTV 或电子阅读器（1280 x
    720）、高清电视（1920 x 1080）甚至新的 4K iTV（4096 x 2160）提供定制版本。拥有高度和宽度变量可以让你以后不必更改 **Scene()**
    构造方法调用，并且可以使用这些变量进行某些屏幕边界计算，而不是在整个代码中使用“硬编码”的数值。正如你在图 9-1 顶部所见，我使用一行 Java 代码（称为**复合语句**，如前一章所学）为这两个变量创建了一个**常量**声明。该声明的
    Java 代码可以在图 9-1 的类顶部看到，应该如下所示：


    ```

    static final double WIDTH = 640, HEIGHT = 400;

