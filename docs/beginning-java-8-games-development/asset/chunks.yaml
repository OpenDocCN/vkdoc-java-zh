- fmt: '# 排版后的内容


    [Figure 8-5](#9781484204160_Ch08.xhtml#_Fig5). Create a constructor method to
    set up fixed Actor sprite subclasses with collision shape, Image list, location


    Next, let’s code the other crucial method for this class, the abstract `.update()`
    method, and then we can add the rest of the `Actor` class fixed sprite attributes
    that we will need. After that, we can initialize the additional variables inside
    of the `Actor()` constructor method. Finally we will learn how to create “getter
    and setter” methods for the `Actor` class, before we move on to use this new custom
    `Actor` superclass to create our other `Hero` motion sprites subclass.


    ## Creating an `.update()` Method: Connect to GamePlayLoop Engine


    The most important method for any sprite class, other than the constructor method
    that births it into existence, is the `.update()` method. The `.update()` method
    will contain the Java 8 code that tells the sprite what to do on every pulse of
    the `GamePlayLoop`. For this reason, this `.update()` method will serve to “wire”
    the `Actor` sprite subclasses created using our `Actor` superclass and `Hero`
    subclass into the `GamePlayLoop` timing engine that we created in [Chapter 7](#9781484204160_Ch07.xhtml).


    Because we need to have an `.update()` method as part of every `Actor` object
    (actor sprite) in our game, we’ll need to include an “empty” (for now) abstract
    `.update()` method in the `Actor` superclass we are coding currently.


    As you learned in [Chapter 3](#9781484204160_Ch03.xhtml), this public abstract
    method is left empty, or more accurately, **unimplemented**, in the `Actor` superclass,
    but will need to be (that is, will be required to be) implemented (or alternatively,
    to again be declared as an abstract method) in any `Actor` subclass, including
    the `Hero` subclass we are going to be coding later on.


    The method is declared `public abstract void`, as it does not return any values
    (it is simply executed on each JavaFX pulse event) and does not include the `{...}`
    curly braces, as it does not (yet) have any body of code inside of it! The single
    line of code that declares the public abstract (empty or unimplemented) method
    should look like this:


    ```

    public abstract void update();

    ```


    As you can see in [Figure 8-6](#9781484204160_Ch08.xhtml#Fig6), the method is
    very simple to implement, and once you add this new method under your `Actor()`
    constructor method, your Java 8 code is again error free, and you will be ready
    to add more code.


    ![9781484204160_Fig08-06.jpg](OEBPS/Images/9781484204160_Fig08-06.jpg)


    [Figure 8-6](#9781484204160_Ch08.xhtml#_Fig6). Add an Arrays import statement
    to support constructor method; add a public abstract `.update()` method


    Next, we will add the rest of the attributes (or variables) for our fixed sprite
    `Actor` superclass, which requires us to think ahead, regarding what we want to
    be able to accomplish with our sprites during the creation of this game.


    ## Adding Sprite Control and Definition Variables to an Actor Class


    The next part of the process is easy, from a coding standpoint, as we will be
    declaring some more variables at the top of the `Actor` class. From a design standpoint,
    this is more difficult, however, as it requires that we think ahead as far as
    possible, and speculate about what variable data we will need for our sprite actors,
    both fixed and motion sprites, to be able to do everything that we want to during
    the construction of this game, as well as during its game play.


    The first additional variables I am going to declare after the `iX` and `iY` variables
    are the `pX` and `pY` pivot point variables. I had originally placed these in
    the `Hero` subclass, which we’re going to create next, once we are done with the
    creation of this `Actor` superclass. The reason I moved these “up” to the `Actor`
    superclass level is because I wanted to have the flexibility of rotating fixed
    sprites (treasure and obstacles) as well as motion sprites. This gives me more
    power and flexibility where level and scene design purposes are concerned. These
    pivot point X and Y variables would be declared as `protected double` data variables,
    and would be done using the following two lines of Java code:


    ```

    protected double pX;

    protected double pY;

    ```


    Next, we need to add some boolean “**flags**” to our `Actor` class (object) definition.
    These will indicate certain things about the sprite object in question, such as
    if it is **Alive** (for fixed sprites this will always be false) or **Dead**,
    or if it is **Fixed** (for fixed sprites this will always be true, and true for
    motion sprites that are not in motion) or **Moving**, or **Bonus** objects, indicating
    additional points (or lifespan) for their capture (collision), or **Valuable**,
    indicating additional powers (or lifespan) for their acquisition (collision).
    Finally, I’m defining a **Flip Horizontal** and **Flip Vertical** flag, to give
    me four times the flexibility with (fixed or motion) sprite image assets than
    I would have without these flags in place.


    Since JavaFX can flip or mirror images on the X or Y axis, this means I can reverse
    a sprite direction (left or right) using `FlipV` or orientation (up or down) using
    `FlipH`.


    These six additional Boolean flag fixed (`Actor`) sprite attributes will be declared
    by using `protected boolean` data variables, using the following six lines of
    Java 8 code, as is shown (error free, no less) in [Figure 8-7](#9781484204160_Ch08.xhtml#Fig7):


    ```

    protected boolean isAlive;

    protected boolean isFixed;

    protected boolean isBonus;

    protected boolean hasValu;

    protected boolean isFlipV;

    protected boolean isFlipH;

    ```


    ![9781484204160_Fig08-07.jpg](OEBPS/Images/9781484204160_Fig08-07.jpg)


    [Figure 8-7](#9781484204160_Ch08.xhtml#_Fig7). Add the rest of the variables needed
    to support rotation (pivot point), and sprite definition states


    Next, we’ll initialize these variables, inside the `Actor()` constructor method.
    If you wanted to pass settings to any of these Boolean flags into the `Actor()`
    constructor method using the parameter list, remember that you’re able to create
    as many **overloaded** constructor method formats as you like, as long as the
    parameter list for each one is 100% unique. We may well do this later on during
    the book, if, for instance, we need a constructor method that pivots our fixed
    sprites for layout design purposes, for instance, or one that flips it around
    a given axis, for instance, for the same exact purpose, or one that does both
    of these, which would give us a nine parameter `Actor()` constructor method call.


    ## Initializing Sprite Control and Definition Variables in an Actor Constructor
    Method


    For now we are going to initialize our pivot point `pX` and `pY` to `0` (the upper
    left corner origin) and all of our Boolean flags to a value of `false` except
    for the `isFixed` variable, which for a fixed sprite will always be set to a value
    of `true`. We will do this using the following eight lines of Java code inside
    of the current `Actor()` constructor method and underneath the initial four lines
    of code in the method that deal with configuring the `Actor` object using the
    method parameters:


    ```

    pX = 0;

    pY = 0;

    isAlive = false;

    isFixed = true;

    isBonus = false;

    hasValu = false;

    isFlipV = false;

    isFlipH = false;

    ```


    We could also do this using **compound initialization statements**. This would
    reduce the code to three lines:


    ```

    px = pY = 0;

    isFixed = true;

    isAlive = isBonus = hasValu = isFlipV = isFlipH = false;

    ```'
