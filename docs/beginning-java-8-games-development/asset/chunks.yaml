  raw: 'While we are adding game design elements to the game, let’s go ahead and learn
    how to use a splashscreen ImageView Node object to implement a game background
    image plate. We will do this so that our white iBeagle, and (Cream) iCheese and
    iBullet objects, stand out to the game player better, using an enhanced blue background
    color.


    Adding a Background Image: Using .toBack() Method


    Before we get into coding the collision and scoring routines for the Enemy and
    Projectile objects, let’s add an Image asset (object) to use in the background
    plate, while we are in the process of adding objects to our game. Copy the **skycloud.png**
    8-bit PNG8 image asset, seen in the bottom-left corner of [Figure 17-24](#9781484204160_Ch17.xhtml#Fig24),
    from the book repository into the NetBeansProjects/InvinciBagel/src folder. After
    you do this, add a skyCloud Image object declaration to the end of the private
    Image object declarations for the splashscreen related image assets, as seen at
    the top of [Figure 17-24](#9781484204160_Ch17.xhtml#Fig24). As you can see, there
    will be a warning highlight under this object until you implement (use) it in
    your Java code. Next, instantiate a skyCloud object in .loadImageAssets(), as
    seen at the bottom of [Figure 17-24](#9781484204160_Ch17.xhtml#Fig24), using the
    following code:


    ```

    private Image splashScreen, instructionLayer, legalLayer, scoresLayer, skyCloud;

    skyCloud = new Image("/skycloud.png", 640, 400, true, false, true);

    ```


    ![9781484204160_Fig17-24.jpg](OEBPS/Images/9781484204160_Fig17-24.jpg)


    [Figure 17-24](#9781484204160_Ch17.xhtml#_Fig24). Declare and instantiate a skyCloud
    Image object that references a skycloud.png background image asset


    Now you have a skyCloud object, so use a **.setImage()** method to set a SplashScreenBackground
    ImageView Node, to use this image asset inside the gameButton.setOnAction(ActionEvent)
    code block, so that when you click the PLAY GAME Button, this image is set as
    the backplate image. Also, make sure to use the **.setVisible()** method call
    with a value of **true**, so that the ImageView Node will be visible. The Java
    code, shown in [Figure 17-25](#9781484204160_Ch17.xhtml#Fig25), should look like
    this:


    ```

    splashScreenBackground.setImage(skyCloud);

    splashScreenBackground.setVisible(true);

    ```


    ![9781484204160_Fig17-25.jpg](OEBPS/Images/9781484204160_Fig17-25.jpg)


    [Figure 17-25](#9781484204160_Ch17.xhtml#_Fig25). Use a splashScreenBackplate.setImage()
    method call to install a skyCloud Image object in gameButton


    Since you have added this code to the gameButton’s event handling code, you must
    “counter” this move, by adding the same method call to the other three Button
    event handlers to set the image asset back to the splashscreen image asset, using
    the following Java code, shown in the other three Button event handling methods
    in [Figure 17-25](#9781484204160_Ch17.xhtml#Fig25):


    ```

    splashScreenBackground.setImage(splashScreen);

    ```


    Use **Run ![image](OEBPS/Images/arrow.jpg) Project** to test the code. As you
    can see on the left side of [Figure 17-26](#9781484204160_Ch17.xhtml#Fig26), we
    have a z-index issue!


    ![9781484204160_Fig17-26.jpg](OEBPS/Images/9781484204160_Fig17-26.jpg)


    [Figure 17-26](#9781484204160_Ch17.xhtml#_Fig26). Install the skyCloud background
    Image (left), and use a .toBack() method call to set proper z-index (right)


    Since we want to have our background image at the lowest (zero) z-index so it
    will be behind all of our game play assets, but also have all the splashscreen
    assets at the highest z-index, so that those image plates will cover (be in front
    of) all of our game play assets, we normally would have to implement yet another
    ImageView compositing plate, to be able to do this. However, there is a handy
    set of z-index related **Node** class methods that will allow us to use the SplashScreenBackplate
    ImageView object to hold both the game splashscreen and a game background image
    plate at the same time! This is one of the ImageView Node optimizations that I
    wanted to implement to keep our game Nodes at a minimum, to reduce memory and
    processing overhead. The code to place the ImageView behind our game assets will
    call the **.toBack()** method off of the **SplashScreenBackplate** ImageView Node
    object, which relocates that Node to the Back (Bottom layer) of the JavaFX Scene
    Graph Node Stack. This is the equivalent of setting this Node’s **z-index** to
    **zero**. The Java statement can be seen highlighted in light blue at the top
    of [Figure 17-26](#9781484204160_Ch17.xhtml#Fig26), and the completed Java code
    for your **gameButton.setOnAction((ActionEvent)->{}** event handling structure
    should look like the following:


    ```

    gameButton.setOnAction((ActionEvent) -> {

        splashScreenBackplate.setImage(skyCloud);

        splashScreenBackplate.setVisible(true);

        splashScreenBackplate.toBack();

        splashScreenTextArea.setVisible(false);

    });

    ```


    As you probably realize by now, we’ll need to “counter” this move in the other
    three Button event handling structures. We will use the opposite of the .toBack()
    method call, which is of course the **.toFront()** method call. As you can see,
    we need to not only call the .toFront() method off of the **splashScreenBackplate**
    ImageView Node object, but also off of the **splashScreenTextArea** ImageView
    object, and the **buttonContainer** HBox object that is holding our UI Button
    controls. We will need to call this method off of all of these Splashscreen and
    UI objects so that all of these are brought back to the front of the JavaFX Scene
    Graph Node Stack. The Java code, shown in [Figure 17-27](#9781484204160_Ch17.xhtml#Fig27),
    looks like this:


    ```

    helpButton.setOnAction((ActionEvent) -> {

        splashScreenBackplate.setImage(splashScreen);

        splashScreenBackplate.toFront();

        splashScreenBackplate.setVisible(true);

        splashScreenTextArea.setVisible(true);

        splashScreenTextArea.setImage(instructionLayer);

        splashScreenTextArea.toFront();

        buttonContainer.toFront();

    });

    ```


    ![9781484204160_Fig17-27.jpg](OEBPS/Images/9781484204160_Fig17-27.jpg)


    [Figure 17-27](#9781484204160_Ch17.xhtml#_Fig27). Use a .toBack() method call
    in the gameButton code, and .toFront() method call in the other Button code


    Using Random Number Generators: java.util.Random


    The **java.util** package contains programming **utilities** that you can use
    for your Java 8 games development, as you may have guessed from the package name.
    One of the most important Java utilities for game programmers is the **Random**
    class, and its **Random()** constructor method. This class can be used to create
    **Random Number** **Generator** objects, which generate random number (or boolean)
    values for use inside your game programming logic. We will be using this class
    to generate both **int** (integer, for random screen locations) and **boolean**
    (for “guess where the Enemy is coming from next” functions) random values. These
    will make sure the game player cannot anticipate the game by recognizing **patterns**
    during the game play. The Java 8 Random class was scratch-coded specifically to
    generate random numbers using the Java Object master class. The class hierarchy
    for the Random class looks like the following:


    ```

    java.lang.Object

      > java.util.Random

    ```'
  trans: '

    在向游戏中添加游戏设计元素的同时，我们继续学习如何使用启动画面 ImageView 节点对象来实现游戏背景图片板。我们将这样做，以便让我们的白色 iBeagle
    以及（奶油色）iCheese 和 iBullet 对象，通过增强的蓝色背景色，在游戏玩家眼中更加突出。


    添加背景图片：使用 .toBack() 方法


    在我们开始编写敌人和投射物对象的碰撞与计分逻辑代码之前，让我们先添加一个图片资源（对象）用于背景板，此时我们正在向游戏中添加对象。将 **skycloud.png**
    8 位 PNG8 图片资源（见图 17-24 左下角）从书籍仓库复制到 NetBeansProjects/InvinciBagel/src 文件夹中。完成此操作后，在私有
    Image 对象声明（与启动画面相关图片资源）的末尾添加一个 skyCloud Image 对象声明，如图 17-24 顶部所示。如你所见，在 Java 代码中实现（使用）该对象之前，该对象下方会有一个警告高亮。接下来，在
    .loadImageAssets() 方法中实例化一个 skyCloud 对象，如图 17-24 底部所示，使用以下代码：


    ```

    private Image splashScreen, instructionLayer, legalLayer, scoresLayer, skyCloud;

    skyCloud = new Image("/skycloud.png", 640, 400, true, false, true);

    ```


    ![9781484204160_Fig17-24.jpg](img/9781484204160_Fig17-24.jpg)


    图 17-24. 声明并实例化一个 skyCloud Image 对象，该对象引用 skycloud.png 背景图片资源


    现在你有了一个 skyCloud 对象，使用 **.setImage()** 方法设置一个 SplashScreenBackground ImageView
    节点，以便在 gameButton.setOnAction(ActionEvent) 代码块中使用该图片资源。这样，当你点击“开始游戏”按钮时，该图片将被设置为背景板图片。同时，确保使用
    **.setVisible()** 方法调用并传入值 **true**，以使 ImageView 节点可见。Java 代码如图 17-25 所示，应如下所示：


    ```

    splashScreenBackground.setImage(skyCloud);

    splashScreenBackground.setVisible(true);

    ```


    ![9781484204160_Fig17-25.jpg](img/9781484204160_Fig17-25.jpg)


    图 17-25. 使用 splashScreenBackplate.setImage() 方法调用在 gameButton 中安装 skyCloud Image
    对象


    由于你已将此代码添加到 gameButton 的事件处理代码中，你必须“抵消”这一操作，通过在其他三个按钮事件处理程序中添加相同的方法调用，将图片资源设置回启动画面图片资源，使用以下
    Java 代码，如图 17-25 中其他三个按钮事件处理方法所示：


    ```

    splashScreenBackground.setImage(splashScreen);

    ```


    使用 **运行 ![image](img/arrow.jpg) 项目** 测试代码。如图 17-26 左侧所示，我们遇到了 z-index 问题！


    ![9781484204160_Fig17-26.jpg](img/9781484204160_Fig17-26.jpg)


    图 17-26. 安装 skyCloud 背景图片（左），并使用 .toBack() 方法调用设置正确的 z-index（右）


    由于我们希望背景图片位于最低（零）z-index，以便它位于所有游戏资源之后，但同时希望所有启动画面资源位于最高 z-index，以便这些图片板能够覆盖（位于）所有游戏资源之前，通常我们需要实现另一个
    ImageView 合成板才能做到这一点。然而，有一组方便的与 z-index 相关的 **Node** 类方法，允许我们同时使用 SplashScreenBackplate
    ImageView 对象来容纳游戏启动画面和游戏背景图片板！这正是我想要实现的 ImageView 节点优化之一，以保持游戏节点数量最少，从而减少内存和处理开销。将
    ImageView 放置到游戏资源后面的代码将调用 **SplashScreenBackplate** ImageView 节点对象的 **.toBack()**
    方法，该方法将该节点重新定位到 JavaFX 场景图节点堆栈的后面（底层）。这相当于将该节点的 **z-index** 设置为 **零**。该 Java 语句在图
    17-26 顶部以浅蓝色高亮显示，你的 **gameButton.setOnAction((ActionEvent)->{}** 事件处理结构的完整 Java
    代码应如下所示：


    ```

    gameButton.setOnAction((ActionEvent) -> {

        splashScreenBackplate.setImage(skyCloud);

        splashScreenBackplate.setVisible(true);

        splashScreenBackplate.toBack();

        splashScreenTextArea.setVisible(false);

    });

    ```


    正如你现在可能意识到的，我们需要在其他三个按钮事件处理结构中“抵消”这一操作。我们将使用 .toBack() 方法调用的相反方法，即 **.toFront()**
    方法调用。如你所见，我们不仅需要在 **splashScreenBackplate** ImageView 节点对象上调用 .toFront() 方法，还需要在
    **splashScreenTextArea** ImageView 对象以及容纳我们 UI 按钮控件的 **buttonContainer** HBox
    对象上调用。我们需要在所有启动画面和 UI 对象上调用此方法，以便所有这些对象都回到 JavaFX 场景图节点堆栈的前面。Java 代码如图 17-27 所示，如下所示：


    ```

    helpButton.setOnAction((ActionEvent) -> {

        splashScreenBackplate.setImage(splashScreen);

        splashScreenBackplate.toFront();

        splashScreenBackplate.setVisible(true);

        splashScreenTextArea.setVisible(true);

        splashScreenTextArea.setImage(instructionLayer);

        splashScreenTextArea.toFront();

        buttonContainer.toFront();

    });

    ```


    ![9781484204160_Fig17-27.jpg](img/9781484204160_Fig17-27.jpg)


    图 17-27. 在 gameButton 代码中使用 .toBack() 方法调用，在其他按钮代码中使用 .toFront() 方法调用


    使用随机数生成器：java.util.Random


    **java.util** 包包含可用于 Java 8 游戏开发的编程**工具**，正如你可能从包名中猜到的那样。对游戏程序员来说，最重要的 Java 工具之一就是
    **Random** 类及其 **Random()** 构造方法。该类可用于创建**随机数生成器**对象，这些对象生成随机数（或布尔值），供游戏编程逻辑使用。我们将使用该类生成
    **int**（整数，用于随机屏幕位置）和 **boolean**（用于“猜测敌人下一步从哪出现”功能）随机值。这将确保游戏玩家无法通过识别游戏过程中的**模式**来预判游戏。Java
    8 的 Random 类是专门使用 Java Object 主类从头编写的，用于生成随机数。Random 类的类层次结构如下所示：


    ```

    java.lang.Object

      > java.util.Random

    ```

