    选择“所有文件”选项后，你会看到 **sprite1svgdata** 文件，可以双击打开该文件（或单击选中它，然后点击**打开**按钮）。


    如果你想在 Java 代码中使用这些数据，只需选择 **d =**（**数据等于**）后面引号内的部分，包括引号（你需要用引号来表示字符串），如图 16-7
    中以蓝色选中的部分所示。


    ![9781484204160_Fig16-07.jpg](img/9781484204160_Fig16-07.jpg)


