    flags, which we installed in the abstract Actor class, and we will set these to
    a **true** value in the Treasure() constructor method, which we will code next,
    along with overriding the required .update() method, so that later on in development
    we can add animation and treasure processing logic. Like the Prop, PropV, PropH,
    and PropB classes, this class will use the xLocation and yLocation parameters
    to set the translateX and translateY properties for the spriteFrame ImageView
    Node object, which will live inside of this Treasure object (Actor object type,
    also Actor subclass) as part of the Treasure() constructor method programming
    logic. The Java code for this class, which can also be seen in [Figure 17-13](#9781484204160_Ch17.xhtml#Fig13),
    should look like the following:


    ```

    package invincibagel;

    import javafx.scene.image.Image;

    public class Treasure extends Actor {

        public Treasure(String SVGdata, double xLocation, double yLocation, Image...
    spriteCels){

            super(SVGdata, xLocation, yLocation, spriteCels);

            spriteFrame.setTranslateX(xLocation);

            spriteFrame.setTranslateY(yLocation);

            hasValu = true;

            isBonus = true;

        }

        @Override

        public void update() {   // Currently this is an Empty but Implemented Method  
    }

    }

    ```


