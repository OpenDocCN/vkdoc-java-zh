- fmt: "# JavaFX Pulse Synchronization: Asynchronous Processing for Scene Graph Elements\n\
    \nA JavaFX pulse is a type of **synchronization** (**timing**) **event**, one\
    \ that synchronizes the states of the elements that are contained within any given\
    \ Scene Graph structure that you create for your JavaFX applications (games).\
    \ The pulse system in JavaFX is administered by the Glass Windowing Toolkit. Pulse\
    \ uses high-resolution (nanosecond) timers, which are also available to Java programmers\
    \ using the `System.nanoTime()` method, as of the Java 8 API.\n\nThe pulse management\
    \ system in JavaFX is capped or throttled to **60FPS**. This is so that all the\
    \ JavaFX threads have the “processing headroom” to do what they need to do. A\
    \ JavaFX application will automatically **spawn** up to three threads, based on\
    \ what you are doing in your application logic. A basic business application will\
    \ probably only use the **primary JavaFX thread**, but a 3D game will also spawn\
    \ the **Prism rendering thread**, and if that game uses audio or video, or both,\
    \ which it usually will, it will spawn a **media playback thread** as well.\n\n\
    You will be using audio, 2D, 3D, and possibly video in the course of your game\
    \ development journey, so your JavaFX game application will certainly be multithreaded!\
    \ As you will see, JavaFX has been designed to be able to create games that take\
    \ advantage of multithreading and nanosecond timing capabilities and 3D rendering\
    \ hardware (Prism) support.\n\nWhenever something is changed in the Scene Graph,\
    \ such as a UI control positioning, a CSS style definition, or an animation playing,\
    \ a pulse event is scheduled and is eventually fired to synchronize the states\
    \ of elements on the Scene Graph. The trick in JavaFX game design is to optimize\
    \ pulse events so that they are focusing on the game play logic (animation, collision\
    \ detection, and so on); thus, you will minimize the other changes (UI control\
    \ location, CSS style changes, and so on) the pulse engine looks at. You will\
    \ do this by using the Scene Graph as a **fixed** design system, meaning that\
    \ you will use the Scene Graph to design your game structure but will not manipulate\
    \ nodes in real time on the Scene Graph, using **dynamic** programming logic,\
    \ as the pulse system will perform the updates.\n\nA JavaFX pulse system allows\
    \ developers to handle events **asynchronously**, like a **batch processing**\
    \ system that schedules tasks on the nanosecond level, instead of once a day,\
    \ like batch processing schedulers from the old mainframe computer days. Next,\
    \ let’s examine how to schedule code in a pulse, using a `.handle()` method.\n\
    \n## Harnessing the JavaFX Pulse Engine: Extending the `AnimationTimer` Class\
    \ to Generate Pulse Events\n\nExtending the `AnimationTimer` class is a great\
    \ way to get the JavaFX pulse system to process your code for each pulse that\
    \ it processes. Your real-time game programming logic will be placed inside the\
    \ `.handle(long now)` method and can be started and stopped at will by using the\
    \ other two `AnimationTimer` methods, `.start()` and `.stop()`.\n\nThe `.start()`\
    \ and `.stop()` methods are called from the `AnimationTimer` superclass, although\
    \ the two methods can be overridden as well; just be sure eventually to call `super.start()`\
    \ and `super.stop()` in your override code methods. If added as an inner class\
    \ inside your current JavaFX `public void .start()` method structure, the code\
    \ structure might look as follows (see [Chapter 3](#9781484204160_Ch03.xhtml),\
    \ [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)):\n\n```\npublic void start(Stage\
    \ primaryStage) {\n    Button btn = new Button;\n    new AnimationTimer() {\n\
    \        @Override\n        public void handle(long now) {\n            // Program\
    \ logic that gets processed on every pulse that JavaFX processes\n        }\n\
    \    }.start();\n}\n```\n\nThe above programming logic shows how an `AnimationTimer`\
    \ inner class would be constructed as well as how Java **dot chaining** works.\
    \ The `.start()` method call to the `AnimationTimer` superclass is appended to\
    \ the end of the `new AnimationTimer(){. . .}` code construct so that the entire\
    \ `AnimationTimer` creation (using `new`), declaration (using the curly braces),\
    \ and execution (using a `.start()` method call) are chained to the `AnimationTimer`\
    \ object construct.\n\nIf you want to create a more complex `AnimationTimer` subclass\
    \ for something central to your game logic, such as **Collision Detection**, it\
    \ would be a better idea (Java code design approach) to make this game logic its\
    \ very own custom `AnimationTimer` subclass.\n\nThis is especially true if you\
    \ are going to be creating more than one `AnimationTimer` subclass to do pulse\
    \ event–controlled high-speed processing. That’s right, you can have more than\
    \ one `AnimationTimer` subclass running at the same time (just do not get carried\
    \ away and use too many `AnimationTimer`s). You can accomplish this with the `extends`\
    \ keyword, creating your own `AnimationTimer` class, called `GamePlayLoop`, using\
    \ the following class definition:\n\n```\npublic class GamePlayLoop extends AnimationTimer\
    \ {\n    @Override\n    public void handle(long now) {\n        // Program logic\
    \ that gets processed on every pulse that JavaFX processes\n    }\n    @Override\n\
    \    public void start() {\n        super.start();\n    }\n    @Override\n   \
    \ public void stop() {\n        super.stop();\n    }\n}\n```\n\nNext, let’s investigate\
    \ the JavaFX `Stage` class (object), which is passed into your `InvinciBagel .start()`\
    \ method!\n\n## JavaFX Screen and Window Control: Using `javafx.stage` Classes\n\
    \nThe `javafx.stage` package contains classes that can be considered top level,\
    \ in terms of the display for your JavaFX application (in this case, a game).\
    \ This display is at the top of the resulting game play, because it shows your\
    \ game’s scenes to the end user of your application. Inside the `Stage` object\
    \ are `Scene` objects, and inside these are `Scene Graph Node` objects, which\
    \ contain the elements that make up an application.\n\nIn contrast, the classes\
    \ that are in this package could be considered fairly **low level**, from an OS\
    \ perspective; these are the `Stage`, `Screen`, `Window`, `WindowEvent`, `PopupWindow`,\
    \ `Popup`, `DirectoryChooser`, and `FileChooser` classes as well as the `FileChooser.ExtensionFilter`\
    \ nested class. These classes can be used to interface with the device’s display\
    \ hardware, and the OS software’s windowing management, file management, and directory\
    \ (folder) management functionality.\n\nTo get a description of the display hardware\
    \ that is being used by the device that a JavaFX application is running on, you\
    \ will want to use the `Screen` class. This class supports **multiscreen** (commonly\
    \ referred to as **second screen**) scenarios, using the `.getScreens()` method,\
    \ which can access an `ObservableList` object that will contain a list (array)\
    \ with all the currently available screens. A primary screen is accessed using\
    \ the `.getPrimary()` method call. You can get the **physical resolution** for\
    \ the primary screen hardware by using a `.getDpi()` method call. There are also\
    \ `.getBounds()` and `.getVisualBounds()` method calls for usable resolution.\n\
    \nThe `Window` superclass, and its `Stage` and `PopupWindow` subclasses, can be\
    \ used by the JavaFX end user to interact with your application. As you saw in\
    \ [Chapter 3](#9781484204160_Ch03.xhtml) (see [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)),\
    \ this is done using the `Stage` object named `primaryStage`, which is passed\
    \ into your `.start()` method, or using a `PopupWindow` (dialog, tool tip, context\
    \ menu, notification, and so on) subclass, such as a `Popup` or `PopupControl`\
    \ object."
  raw: 'JavaFX Pulse Synchronization: Asynchronous Processing for Scene Graph Elements


    A JavaFX pulse is a type of **synchronization** (**timing**) **event**, one that
    synchronizes the states of the elements that are contained within any given Scene
    Graph structure that you create for your JavaFX applications (games). The pulse
    system in JavaFX is administered by the Glass Windowing Toolkit. Pulse uses high-resolution
    (nanosecond) timers, which are also available to Java programmers using the **System.nanoTime()**
    method, as of the Java 8 API.


    The pulse management system in JavaFX is capped or throttled to **60FPS**. This
    is so that all the JavaFX threads have the “processing headroom” to do what they
    need to do. A JavaFX application will automatically **spawn** up to three threads,
    based on what you are doing in your application logic. A basic business application
    will probably only use the **primary JavaFX thread**, but a 3D game will also
    spawn the **Prism rendering thread**, and if that game uses audio or video, or
    both, which it usually will, it will spawn a **media playback thread** as well.


    You will be using audio, 2D, 3D, and possibly video in the course of your game
    development journey, so your JavaFX game application will certainly be multithreaded!
    As you will see, JavaFX has been designed to be able to create games that take
    advantage of multithreading and nanosecond timing capabilities and 3D rendering
    hardware (Prism) support.


    Whenever something is changed in the Scene Graph, such as a UI control positioning,
    a CSS style definition, or an animation playing, a pulse event is scheduled and
    is eventually fired to synchronize the states of elements on the Scene Graph.
    The trick in JavaFX game design is to optimize pulse events so that they are focusing
    on the game play logic (animation, collision detection, and so on); thus, you
    will minimize the other changes (UI control location, CSS style changes, and so
    on) the pulse engine looks at. You will do this by using the Scene Graph as a
    **fixed** design system, meaning that you will use the Scene Graph to design your
    game structure but will not manipulate nodes in real time on the Scene Graph,
    using **dynamic** programming logic, as the pulse system will perform the updates.


    A JavaFX pulse system allows developers to handle events **asynchronously**, like
    a **batch processing** system that schedules tasks on the nanosecond level, instead
    of once a day, like batch processing schedulers from the old mainframe computer
    days. Next, let’s examine how to schedule code in a pulse, using a **.handle()**
    method.


    Harnessing the JavaFX Pulse Engine: Extending the AnimationTimer Class to Generate
    Pulse Events


    Extending the AnimationTimer class is a great way to get the JavaFX pulse system
    to process your code for each pulse that it processes. Your real-time game programming
    logic will be placed inside the **.handle(long now)** method and can be started
    and stopped at will by using the other two AnimationTimer methods, .start() and
    .stop().


    The **.start()** and **.stop()** methods are called from the AnimationTimer superclass,
    although the two methods can be overridden as well; just be sure eventually to
    call **super.start()** and **super.stop()** in your override code methods. If
    added as an inner class inside your current JavaFX **public void .start()** method
    structure,  the code structure might look as follows (see [Chapter 3](#9781484204160_Ch03.xhtml),
    [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)):


    ```

    public void start(Stage primaryStage) {

        Button btn = new Button;

        new AnimationTimer() {

            @Override

            public void handle(long now) {

                // Program logic that gets processed on every pulse that JavaFX processes

            }

        }.start();

    }

    ```


    The above programming logic shows how an AnimationTimer inner class would be constructed
    as well as how Java **dot chaining** works. The .start() method call to the AnimationTimer
    superclass is appended to the end of the new AnimationTimer(){. . .} code construct
    so that the entire AnimationTimer creation (**using new**), declaration (using
    the curly braces), and execution (using a .start**()** method call) are chained
    to the AnimationTimer object construct.


    If you want to create a more complex AnimationTimer subclass for something central
    to your game logic, such as **Collision Detection**, it would be a better idea
    (Java code design approach) to make this game logic its very own custom AnimationTimer
    subclass.


    This is especially true if you are going to be creating more than one AnimationTimer
    subclass to do pulse event–controlled high-speed processing. That’s right, you
    can have more than one AnimationTimer subclass running at the same time (just
    do not get carried away and use too many AnimationTimers). You can accomplish
    this with the **extends** keyword, creating your own AnimationTimer class, called
    **GamePlayLoop**, using the following class definition:


    ```

    public class GamePlayLoop extends AnimationTimer {

        @Override

        public void handle(long now) {

            // Program logic that gets processed on every pulse that JavaFX processes

        }

        @Override

        public void start() {

            super.start();

        }

        @Override

        public void stop() {

            super.stop();

        }

    }

    ```


    Next, let’s investigate the JavaFX Stage class (object),which is passed into your
    InvinciBagel .start() method!


    JavaFX Screen and Window Control: Using javafx.stage Classes


    The **javafx.stage** package contains classes that can be considered top level,
    in terms of the display for your JavaFX application (in this case, a game). This
    display is at the top of the resulting game play, because it shows your game’s
    scenes to the end user of your application. Inside the Stage object are Scene
    objects, and inside these are Scene Graph Node objects, which contain the elements
    that make up an application.


    In contrast, the classes that are in this package could be considered fairly **low
    level**, from an OS perspective; these are the **Stage**, **Screen**, **Window**,
    **WindowEvent**, **PopupWindow**, **Popup**, **DirectoryChooser**, and **FileChooser**
    classes as well as the **FileChooser.ExtensionFilter** nested class. These classes
    can be used to interface with the device’s display hardware, and the OS software’s
    windowing management, file management, and directory (folder) management functionality.


    To get a description of the display hardware that is being used by the device
    that a JavaFX application is running on, you will want to use the **Screen** class.
    This class supports **multiscreen** (commonly referred to as **second screen**)
    scenarios, using the **.getScreens()** method, which can access an **ObservableList**
    object that will contain a list (array) with all the currently available screens.
    A primary screen is accessed using the **.getPrimary()** method call. You can
    get the **physical resolution** for the primary screen hardware by using a **.getDpi()**
    method call. There are also **.getBounds()** and **.getVisualBounds()** method
    calls for usable resolution.


    The **Window** superclass, and its **Stage** and **PopupWindow** subclasses, can
    be used by the JavaFX end user to interact with your application. As you saw in
    [Chapter 3](#9781484204160_Ch03.xhtml) (see [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)),
    this is done using the **Stage** object named primaryStage, which is passed into
    your .start() method, or using a **PopupWindow** (dialog, tool tip, context menu,
    notification, and so on) subclass, such as a **Popup** or **PopupControl** object.'
  trans: '

    JavaFX 脉冲同步：场景图元素的异步处理


    JavaFX 脉冲是一种**同步**（**定时**）**事件**，用于同步你在 JavaFX 应用程序（游戏）中创建的任何场景图结构内所包含元素的状态。JavaFX
    中的脉冲系统由 Glass 窗口工具包管理。脉冲使用高分辨率（纳秒级）定时器，自 Java 8 API 起，Java 程序员也可以使用 **System.nanoTime()**
    方法来访问这些定时器。


    JavaFX 中的脉冲管理系统被限制或节流在 **60FPS**。这是为了让所有 JavaFX 线程都有“处理余量”来完成它们需要做的事情。根据你在应用程序逻辑中所做的操作，一个
    JavaFX 应用程序会自动**生成**最多三个线程。一个基础的业务应用程序可能只会使用**主 JavaFX 线程**，但一个 3D 游戏还会生成**棱镜渲染线程**，并且如果该游戏使用了音频或视频（通常都会使用），它还会生成一个**媒体播放线程**。


    在你的游戏开发过程中，你会用到音频、2D、3D，甚至可能用到视频，因此你的 JavaFX 游戏应用程序肯定是多线程的！正如你将看到的，JavaFX 被设计成能够创建利用多线程、纳秒级定时能力和
    3D 渲染硬件（Prism）支持的游戏。


    每当场景图中的某些内容发生变化时，例如 UI 控件定位、CSS 样式定义或动画播放，就会调度一个脉冲事件，并最终触发该事件以同步场景图上元素的状态。JavaFX
    游戏设计的技巧在于优化脉冲事件，使其专注于游戏逻辑（动画、碰撞检测等）；因此，你将最小化脉冲引擎关注的其他变化（UI 控件位置、CSS 样式更改等）。你将通过将场景图用作**固定**设计系统来实现这一点，这意味着你将使用场景图来设计游戏结构，但不会在场景图上使用**动态**编程逻辑实时操作节点，因为脉冲系统将执行更新。


    JavaFX 脉冲系统允许开发者**异步**处理事件，就像一个**批处理**系统，它在纳秒级别调度任务，而不是像过去大型机时代的批处理调度器那样每天一次。接下来，让我们研究如何使用
    **.handle()** 方法在脉冲中调度代码。


    驾驭 JavaFX 脉冲引擎：扩展 AnimationTimer 类以生成脉冲事件


    扩展 AnimationTimer 类是让 JavaFX 脉冲系统在其处理的每个脉冲中处理你的代码的好方法。你的实时游戏编程逻辑将放置在 **.handle(long
    now)** 方法内部，并且可以通过使用另外两个 AnimationTimer 方法 .start() 和 .stop() 随意启动和停止。


    **.start()** 和 **.stop()** 方法是从 AnimationTimer 超类调用的，尽管这两个方法也可以被重写；只需确保在你的重写代码方法中最终调用
    **super.start()** 和 **super.stop()** 即可。如果作为内部类添加到你当前的 JavaFX **public void .start()**
    方法结构中，代码结构可能如下所示（参见第 3 章，图 3-2）：


    ```

    public void start(Stage primaryStage) {

        Button btn = new Button;

        new AnimationTimer() {

            @Override

            public void handle(long now) {

                // 在 JavaFX 处理的每个脉冲上被处理的程序逻辑

            }

        }.start();

    }

    ```


    上述编程逻辑展示了如何构造一个 AnimationTimer 内部类，以及 Java **点链式调用**是如何工作的。对 AnimationTimer 超类的
    .start() 方法调用被附加到 new AnimationTimer(){. . .} 代码构造的末尾，这样整个 AnimationTimer 的创建（使用
    **new**）、声明（使用花括号）和执行（使用 .start**()** 方法调用）就链接到了 AnimationTimer 对象构造上。


    如果你想为游戏逻辑的核心部分（例如**碰撞检测**）创建一个更复杂的 AnimationTimer 子类，那么更好的做法（Java 代码设计方法）是将这个游戏逻辑做成它自己的自定义
    AnimationTimer 子类。


    如果你打算创建多个 AnimationTimer 子类来执行脉冲事件控制的高速处理，这一点尤其正确。没错，你可以同时运行多个 AnimationTimer
    子类（只是不要得意忘形，使用太多 AnimationTimer）。你可以使用 **extends** 关键字来实现这一点，创建你自己的 AnimationTimer
    类，命名为 **GamePlayLoop**，使用以下类定义：


    ```

    public class GamePlayLoop extends AnimationTimer {

        @Override

        public void handle(long now) {

            // 在 JavaFX 处理的每个脉冲上被处理的程序逻辑

        }

        @Override

        public void start() {

            super.start();

        }

        @Override

        public void stop() {

            super.stop();

        }

    }

    ```


    接下来，让我们研究一下 JavaFX Stage 类（对象），它被传递到你的 InvinciBagel .start() 方法中！


    JavaFX 屏幕与窗口控制：使用 javafx.stage 类


    **javafx.stage** 包包含的类，就 JavaFX 应用程序（此处指游戏）的显示而言，可以被视为顶层类。此显示位于最终游戏画面的顶层，因为它将你的游戏场景展示给应用程序的最终用户。在
    Stage 对象内部是 Scene 对象，而在这些 Scene 对象内部是 Scene Graph Node 对象，这些节点包含了构成应用程序的元素。


    相比之下，从操作系统的角度来看，此包中的类可以被视为相当**底层**的；这些类包括 **Stage**、**Screen**、**Window**、**WindowEvent**、**PopupWindow**、**Popup**、**DirectoryChooser**
    和 **FileChooser** 类，以及 **FileChooser.ExtensionFilter** 嵌套类。这些类可用于与设备的显示硬件以及操作系统的窗口管理、文件管理和目录（文件夹）管理功能进行交互。


    要获取运行 JavaFX 应用程序的设备所使用的显示硬件的描述，你将需要使用 **Screen** 类。此类支持**多屏幕**（通常称为**第二屏幕**）场景，使用
    **.getScreens()** 方法，该方法可以访问一个 **ObservableList** 对象，该对象包含一个包含所有当前可用屏幕的列表（数组）。主屏幕通过调用
    **.getPrimary()** 方法访问。你可以通过调用 **.getDpi()** 方法获取主屏幕硬件的**物理分辨率**。还有用于获取可用分辨率的
    **.getBounds()** 和 **.getVisualBounds()** 方法调用。


    **Window** 超类及其 **Stage** 和 **PopupWindow** 子类，可供 JavaFX 最终用户用来与你的应用程序交互。正如你在第
    3 章（参见图 3-2）中看到的，这是通过传递到你的 .start() 方法中的名为 primaryStage 的 **Stage** 对象，或者使用 **PopupWindow**（对话框、工具提示、上下文菜单、通知等）子类（例如
    **Popup** 或 **PopupControl** 对象）来完成的。

    '
- fmt: 'You can use the `Stage` class to create secondary stages within your JavaFX
    application programming logic. A **primary** `Stage` object is always constructed
    by the JavaFX platform, using the `public void start(Stage primaryStage)` method
    call, as you have already seen in [Chapters 2](#9781484204160_Ch02.xhtml) and
    [3](#9781484204160_Ch03.xhtml) in the bootstrap JavaFX application created by
    NetBeans.


    All JavaFX `Stage` objects must be constructed using, and modified inside the
    primary JavaFX application thread, which I discussed in the previous section.
    Because a stage equates to a window on the OS platform it is running on, certain
    attributes or properties are **read-only**, as they need to be controlled at the
    OS level; these are **Boolean** properties (variables): `alwaysOnTop`, `fullScreen`,
    `iconified`, and `maximized`.


    All `Stage` objects have a `StageStyle` attribute and a `Modality` attribute,
    which can be set using constants. The `stageStyle` constants are `StageStyle.DECORATED`,
    `StageStyle.UNDECORATED`, `StageStyle.TRANSPARENT`, and `StageStyle.UTILITY`.
    The `Modality` constants are `Modality.NONE`, `Modality.APPLICATION_MODAL`, and
    `Modality.WINDOW_MODAL`. In the next section, I will show you how to do something
    really impressive using the `StageStyle` attribute and the `TRANSPARENT` constant
    that will make your JavaFX applications stand out from everyone else’s in the
    marketplace.


    The `Popup` class can be used to create custom pop-up notifications, and even
    custom game components, from scratch. Alternately, you can use the `PopupControl`
    class, and its `ContextMenu` and `Tooltip` subclasses, to provide these predefined
    (coded) JavaFX UI controls.


    The `DirectoryChooser` and `FileChooser` classes give support for passing through
    the standard OS file selection and directory navigation dialogs into your JavaFX
    applications. The `FileChooser.ExtensionFilter` nested class offers a utility
    for filtering the files that will come up in the `FileChooser` dialog, based on
    file type (file extension).


    Next, let’s take your current `InvinciBagel` `Stage` object to the next level
    and make it a **windowless** (floating) application. This is one of the impressive
    features of JavaFX that cannot be matched by Flash or other game engines.


    ## Using a JavaFX Primary Stage Object: Creating a Floating Windowless Application


    Let’s make the primary `Stage` for your `InvinciBagel` application transparent
    so that the `Button` UI control floats right on top of the OS desktop. This is
    something that JavaFX can do that you do not see very often, and it allows you
    to create 3D applications that float on top of the OS desktop (for 3D virtual
    objects, this is called a windowless ActiveX control).


    This is accomplished by using the `StageStyle.TRANSPARENT` constant, in conjunction
    with the `.initStyle()` method, from the `Stage` class. As [Figure 4-4](#9781484204160_Ch04.xhtml#Fig4)
    demonstrates, I also used the technique I told you about in [Chapter 3](#9781484204160_Ch03.xhtml)
    (a technique that does not follow the proper Java coding convention regarding
    declaring an import statement for classes you are planning to use). In **line
    35** of the code, I reference the constant by using the fully qualified class
    name (package.subpackage.class.constant), `javafx.stage.StageStyle.TRANSPARENT`,
    inside the `primaryStage.initStyle(StageStyle style)` method call. This is done
    via the following line of Java code:


    ```

    primaryStage.initStyle(javafx.stage.StageStyle.TRANSPARENT);

    ```


    ![9781484204160_Fig04-04.jpg](OEBPS/Images/9781484204160_Fig04-04.jpg)


    [Figure 4-4](#9781484204160_Ch04.xhtml#_Fig4). Call an `.initStyle()` method with
    the `StageStyle.TRANSPARENT` constant, off the `primaryStage` `Stage` object


    As you can, I clicked the `primaryStage` `Stage` object in NetBeans IDE 8.0, in
    the code editing area, and it shows (tracks) the **usage** of that object in the
    code. The `Stage` object is set up (displaying title, style, and scene), using
    the `.setTitle()`, `.initStyle()`, `.setScene()`, and `.show()` method calls.


    I am going to leave the `.setTitle()` method call in the code, but make a mental
    note that once you get this windowless application treatment working, the title
    bar is part of the window’s “chrome,” or UI elements, and when these are gone
    (including the title bar), this setting of the title will amount to a moot point.


    If you have been worrying about memory optimization, at this point in the application
    development work process, you would remove the `.setTitle()` method call, because
    the title would not be shown using a `StageStyle.TRANSPARENT` constant for the
    `StageStyle` attribute.


    Next, use the **Run icon** (or **Run menu**), and run the application. As [Figure
    4-5](#9781484204160_Ch04.xhtml#Fig5) illustrates, what you are trying to achieve
    did not work: the window chrome elements are gone, and the transparency value
    is not evident.


    ![9781484204160_Fig04-05.jpg](OEBPS/Images/9781484204160_Fig04-05.jpg)


    [Figure 4-5](#9781484204160_Ch04.xhtml#_Fig5). Run the project to see if the `Stage`
    object is transparent; clearly, something is set to White


    There must be something else in the processing pipeline that is not yet defining
    its **background** using the **transparency** value. Transparency is defined using
    a hexadecimal value of `#00000000`, which signifies that all `AARRGGBB` (alpha
    channel, red, green, blue) color and opacity values are turned off. You will need
    to start thinking about the JavaFX components of your application as **layers**
    (currently, these are **stage-scene-stackPane-button**). You will be learning
    about digital imaging concepts such as color depth, alpha channels, layers, blending,
    and all the technical information that relates to processing pixels in a 2D plane
    as the book progresses.


    The next thing you should try to set to this transparent value is the next level
    down in the JavaFX Scene Graph hierarchy from the stage, which contains the Scene
    Graph itself. The next most top-level component, as discussed previously, is the
    `Scene` object, which also has a background color value parameter or attribute.


    Like the `Stage` class (object), the `Scene` class (object) does not have a style
    constant of `TRANSPARENT`, so you will have to approach setting the `Scene` object’s
    background to a transparency value in a different way, using a different method
    and constant. One thing you should know is that everything in JavaFX that writes
    itself to the screen will in some way support transparency to allow multiple-layer
    **compositing** in JavaFX applications.


    If you read the `Scene` class documentation, you will notice that there is a method,
    `.setFill(Color value)`, that takes a `Color` (class or object) value, so let’s
    try that next. As [Figure 4-6](#9781484204160_Ch04.xhtml#Fig6) shows, I called
    the `.setFill()` off the `Scene` object **named scene**, using a `scene.setFill(Color.TRANSPARENT);`
    statement, which NetBeans helps me construct!


    ![9781484204160_Fig04-06.jpg](OEBPS/Images/9781484204160_Fig04-06.jpg)


    [Figure 4-6](#9781484204160_Ch04.xhtml#_Fig6). Call the `.setFill()` method with
    the `Color.TRANSPARENT` constant, off the `Scene` object named scene


    Run the application again, to see if the transparency is showing yet. As you can
    see in [Figure 4-7](#9781484204160_Ch04.xhtml#Fig7), it is not!


    ![9781484204160_Fig04-07.jpg](OEBPS/Images/9781484204160_Fig04-07.jpg)


    [Figure 4-7](#9781484204160_Ch04.xhtml#_Fig7). Run the project to look at the
    transparent `Stage` object; something is still set to White'
