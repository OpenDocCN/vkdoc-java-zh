    如果你还记得，在第 8 章中，我们创建了基于固定精灵的**Actor**超类和基于运动精灵的**Hero**超类。我先从运动精灵开始，因为主要游戏角色是运动精灵，尽管运动精灵更复杂，但就其本质而言，它们玩起来也更有趣！现在，我需要用一章的篇幅将
    Actor 超类付诸实践，并创建一些**Prop**相关的子类。我们将使用这些 Actor 子类来填充场景（舞台），加入诸如平台、障碍物、屏障、桥梁、宝藏以及类似的游戏固定位置对象，这些对象将被添加到场景（舞台）中，以构建游戏世界并增强游戏体验（也称为用户体验）。


    我们将使用 Actor 超类创建四个固定的**Prop**子类，这将使构建固定场景（当你创建了多个场景时，也称为关卡）变得容易。**Prop.java**类将“原样”使用你的固定精灵图像资源，而**PropH.java**类会将**isFlipH**属性设置为**true**，并使用
    JavaFX 的**spriteFrame.setScaleX(-1);** Java 语句，围绕 Y 轴镜像图像资源。**PropV.java**类会将**isFlipV**属性设置为**true**，并使用
    JavaFX 的**spriteFrame.setScaleY(-1);** Java 语句，围绕 X 轴镜像图像资源。**PropB.java**类（B
    代表“两者”）会将**isFlipV**属性和**isFlipH**属性都设置为**true**，并使用两条 JavaFX 的**spriteFrame.setScale(-1);**
    Java 语句，围绕 X 轴和 Y 轴镜像图像资源。


    一旦我们创建了这四个与 Prop 相关的 Actor 子类，我们将使用它们将固定对象放置到场景中，以创建这个游戏的第一关。这样，当我们进入碰撞检测章节时，真实游戏中应有的一切都已就位，我们就可以开始编写碰撞检测逻辑了；然后，最终编写自动攻击引擎；再然后是游戏玩法逻辑，它决定了计分引擎的实现方式。


    本章对于创建一个功能更丰富的游戏非常有价值。在任何游戏设计中，构建角色（英雄及其敌人，无论是单人游戏还是多人游戏）互动的环境，对于游戏的成功和受欢迎程度至关重要，因为这些固定元素是创造玩家游戏挑战的主要部分。在本例中，即
    Ira H. Harrison Rubin 的 InvinciBagel 角色和游戏。


