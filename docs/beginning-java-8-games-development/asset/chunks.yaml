    that add functionality to your application. These may include methods, variables,
    constants, nested classes, or inner classes.


    Java classes can also be used to create Java **objects**. Java objects are **constructed**,
    using your Java class, and have the same name as the Java class and as that class’s
    **constructor method**.


    As you saw in [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2), you **declare** your
    class, using a Java **class** keyword, along with a name for your class. You can
    also preface the declaration with Java **modifier** keywords, which you will be
    studying later in this chapter (see the section “Java Modifier Keywords: Access
    Control and More”). Java modifier keywords are always placed **before** (or in
    front of) the Java class keyword, using the following format:


    ```

    <modifier keywords> class <your custom classname goes here>

    ```'
  trans: '

    图 3-2. InvinciBagel 类的嵌套 Java 代码块：start 方法、setOnAction 方法和 handle 方法


    每个红色方框内的 Java 代码都以花括号开头，并以花括号结尾。现在你已经熟悉了 Java 8 的各种代码注释方式，以及如何界定 Java 8 游戏编程语句（无论是单个语句还是
    Java 代码块），接下来你将学习各种 Java 代码结构本身——它们的使用方式、能为你的应用程序和游戏带来什么功能，以及实现它们需要用到哪些重要的 Java
    关键字。


    **Java API：使用包按功能组织代码**


    在编程平台的最顶层，例如使用 Java SE 6 的谷歌 32 位 Android 4、使用 Java SE 7 的 64 位 Android 5，以及最近发布的
    Oracle Java SE 8 平台，都包含一系列包，这些包中包含了类、接口、方法和常量，它们共同构成了 **API**。应用程序（此处指游戏）开发者可以使用这些
    Java 代码（此处指 Java 8 API）来创建跨多种操作系统、平台和消费电子设备（如计算机、笔记本电脑、上网本、平板电脑、智能电视、游戏机、智能手表和智能手机）的专业级软件。


    要安装特定版本的 API 级别，你需要安装 SDK（**软件开发工具包**）。Java SDK 有一个特殊的名称，即 JDK（**Java 开发工具包**）。熟悉
    Android（基于 Linux 的 Java SE）操作系统开发的人都知道，每当添加一些新功能时，就会发布一个不同的 API 级别。这是因为需要支持这些新的**硬件特性**，而不是因为谷歌的高管们每隔几个月就想发布一个新的
    SDK。Android 有 24 个不同的 API 级别，而 Java SE 只有 8 个，并且目前只有三个 Java API 级别（Java 6、Java
    7、Java 8）在使用。


    Java SE 6 与 Eclipse ADT（Android 开发者工具）IDE 配合使用，用于开发 32 位 Android（版本 1.5 至 4.5）；Java
    SE 7 与 IntelliJ IDEA 配合使用，用于开发 64 位 Android（版本 5.0 及更高版本）；Java 8 与 NetBeans IDE
    配合使用，用于在 Windows、Mac OS X、Linux 和 Oracle Solaris 操作系统上开发 JavaFX 和 Java 8 应用程序。我有三台不同的工作站，分别针对这些
    Java API 平台和 IDE 软件包进行了优化，以便我可以同时为 Android 4（Java 6）、Android 5（Java 7）和 JavaFX（Java
    8）开发应用程序。幸运的是，你可以在 PriceWatch.com 上花几百美元买到一台强大的 Windows 8.1 六核或八核 64 位 AMD 工作站！


    除了 API 级别（你安装和使用的 SDK）之外，Java 编程语言中最高级别的结构是**包**。Java 包使用 **package** 关键字在 Java
    代码顶部声明应用程序的包。这必须是除了注释之外的第一行代码（参见图 3-1；另见第 2 章）。你在第 2 章中使用的 NetBeans **新建项目**系列对话框会自动为你创建包，并根据你在应用程序中的需求导入你需要使用的其他包。在本例中，这些是
    JavaFX 包，因此你可以使用 JavaFX 新媒体引擎。


    正如你可能从名称中推断出的那样，Java 包收集了所有 Java 编程结构。这些结构包括与你的应用程序相关的类、接口和方法，因此 invinciBagel
    包将包含你的所有代码，以及你导入用于协同工作的代码，以创建、编译和运行 InvinciBagel 游戏。


    Java 包对于组织和包含你自己的所有应用程序代码当然很有用，但它对于组织和包含 SDK（API）的 Java 代码更为有用，你将使用这些代码以及你自己的
    Java 编程逻辑来创建 Java 8 应用程序。你可以通过使用 Java **import** 关键字来使用目标 API 中的任何类，该关键字与你想要使用的包和类一起构成一条
    **import 语句**。


    import 语句以 **import 关键字**开头，后跟**完全限定类名**，它由**包名**、任何**子包名**和**类名**组成，形成一个完整的**命名引用路径**（类的完整正式名称）。import
    语句以**分号结束**。正如你在图 3-1 中已经看到的，用于从 **javafx.event** 包中导入 JavaFX **EventHandler**
    类的 import 语句应如下所示：


    ```

    import javafx.event.EventHandler;

    ```


    import 语句告诉 Java 编译器，你将使用所引用类中的方法（或常量），并指定该类存储在哪个包中。如果你在自己的 Java 类（例如 **InvinciBagel**
    类，参见图 3-2）中使用了某个类、方法或接口，但尚未使用 import 语句**声明**该类以供使用，则 Java 编译器将**抛出**错误，直到你在该类顶部（在
    Java 包声明语句之后，Java 类声明语句之前）添加所需的 import 语句。


    ![Image](img/sq.jpg) **注意**  也可以不使用 Java **import** 关键字，而直接在 Java 代码中使用完全限定类名，即在类名前加上包名。按照惯例，应使用
    import 语句；但是，如果你想要打破标准的 Java 编程惯例，图 3-2 中的第 20 行可以写成 javafx.scene.control.Button
    btn = new javafx.scene.control.Button();。


    **Java 类：构建代码的逻辑结构**


    包级别之下的下一个逻辑 Java 编程结构是 Java **类**级别，正如你在 import 语句中看到的，它既引用了包含该类的包，也引用了类本身。正如包组织所有相关的类一样，类也组织其所有相关的方法、变量和常量，有时还包括其他**嵌套**类。


    因此，Java 类用于在下一个逻辑功能组织级别组织你的 Java 代码，你的类将包含为应用程序添加功能的 Java 代码结构。这些结构可能包括方法、变量、常量、嵌套类或内部类。


    Java 类也可用于创建 Java **对象**。Java 对象是使用你的 Java 类**构造**的，并且与 Java 类及其**构造方法**具有相同的名称。


    正如你在图 3-2 中看到的，你使用 Java **class** 关键字以及类名来**声明**你的类。你还可以在声明前加上 Java **修饰符**关键字，你将在本章后面学习这些关键字（参见“Java
    修饰符关键字：访问控制及其他”一节）。Java 修饰符关键字始终放在 Java class 关键字**之前**，格式如下：


    ```

    <修饰符关键字> class <你的自定义类名写在这里>

    ```

