    总结


    在第五章中，你更深入地了解了一些在 Java 8 游戏开发工作流程中将要用到的更重要的游戏设计和新媒体概念，从而具备了创建游戏所需的基础知识。你还学习了 JavaFX
    Scene Builder 和 FXML，只是为了掌握这些概念并将其解决，因为我将使用 Java 8 代码和 JavaFX 类来完成本书中的所有内容，以响应我的
    Android 书籍读者提出的要求（“我们如何仅用 Java 代码做到这一点？我们不想使用 XML 来创建应用程序！”这是我最近经常听到的口号）。


    首先，你研究了静态与动态的关键概念，以及这对游戏设计和游戏优化的重要性，因为如果在整个游戏设计、开发和优化过程中没有持续考虑优化问题，过多的动态内容可能会使较旧的单核甚至双核
    CPU 过载。


    接下来，你探讨了**游戏设计**（和开发）的一些关键组成部分，例如**精灵**、**碰撞检测**、**物理模拟**、**背景动画**、**UI 设计**、**计分引擎**和**游戏逻辑**。你了解了这些如何应用于静态游戏，或没有连续运动的游戏，例如策略游戏、棋盘游戏、益智游戏、知识游戏、记忆游戏和动态游戏，以及使用连续运动的游戏，例如平台游戏、街机游戏、第一人称射击游戏、第三人称射击游戏、驾驶游戏等。


    你对新媒体资产类型以及数字成像、动画、数字视频和数字音频中的概念和术语进行了高层次的技术概述。你学习了像素、分辨率以及宽高比如何定义图像、动画或视频的形状；学习了颜色深度和
    Alpha 通道透明度，以及如何使用十六进制表示法来定义它们。然后，你研究了时间的第四维度，学习了帧、帧速率和比特率，并了解了数字音频、采样频率和采样分辨率。最后，你学习了
    JavaFX Scene Graph 和 FXML，了解了它们的工作原理以及如何在当前游戏中使用它们。


    在下一章中，你将研究 **JavaFX** Scene Graph，并为你的 Java 8 游戏应用程序创建**基础设施**，包括启动画面（你的游戏主屏幕和主要
