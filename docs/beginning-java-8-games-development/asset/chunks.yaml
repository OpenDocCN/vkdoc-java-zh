- fmt: 'Ultimately, there will be a number of different variables that you will need
    to fine-tune to achieve the best data footprint optimization for any given digital
    video data asset. It is important to remember that each video asset will look
    different (mathematically) to a digital video codec. For this reason, there can
    be no standard settings that can be developed to achieve any given compression
    result. That said, experience tweaking various settings will eventually allow
    you to get a feel, over time, for the various settings that you have to change,
    in terms of the different compressions parameters, to get the desired end result.


    ## Digital Audio Concepts: Amplitude, Frequency, Samples


    Those of you who are audiophiles know that sound is created by sending sound waves
    pulsing through the air. Digital audio is complex; part of that complexity comes
    from the need to bridge analog audio technology, created with speaker cones, with
    digital audio codecs. Analog speakers generate sound waves by pulsing them into
    existence. Our ears receive analog audio in exactly the opposite fashion, catching
    and receiving those pulses of air, or vibrations with different wavelengths, and
    then turning them back into data that our brain can process. This is how we “hear”
    the sound waves; our brain then interprets the different audio sound wave frequencies
    as different notes, or tones.


    Sound waves generate various **tones**, depending on the **frequency** of the
    sound wave. A wide, or infrequent (long), wave produces a low (bass) tone, whereas
    a more frequent (short) wavelength produces a higher (treble) tone. Interestingly,
    different frequencies of light will produce different colors, so there is a close
    correlation between analog sound (audio) and analog light (color). There are many
    other similarities between digital images (and video) that will also carry through
    into your digital new media content production, as you will soon see.


    The **volume** of a sound wave will be determined by its **amplitude**, or the
    **height** (or size) of that wave. Thus, frequency of sound waves equates to how
    **closely together** the waves are spaced, along the **x axis** if you are looking
    at it in 2D, and amplitude equates to how tall the waves are, as measured along
    the **y axis**.


    Sound waves can be uniquely shaped, allowing them to “piggyback” various sound
    effects. A “pure,” or baseline, type of sound wave is called a **sine wave** (which
    you learned about in high school trigonometry, with the sine, cosine, and tangent
    math functions). Those of you who are familiar with **audio synthesis** are aware
    that other types of sound waves are also used in sound design, such as the **saw
    wave**, which looks like the edge of a saw (hence its name), and the **pulse wave**,
    which is shaped using only right angles, resulting in immediate on and off sounds
    that translate into pulses (or bursts) of audio.


    Even randomized waveforms, such as noise, are used in sound design to obtain edgy
    sound results. As you may have ascertained by using your recently acquired knowledge
    of data footprint optimization, the more “chaos,” or noise, present in your sound
    wave (and in new media data in general), the harder it will be to compress for
    a codec. Therefore, more complex sound waves will result in larger digital audio
    file sizes, owing to the chaos in the data.


    ## Converting Analog Audio to Digital Audio Data: Sampling, Accuracy, HD Audio


    The process of turning analog audio (sound waves) into digital audio data is called
    **sampling**. If you work in the music industry, you have probably heard about
    a type of keyboard (or even rack-mounted equipment) called a **sampler**. Sampling
    is the process of **slicing** an analog audio wave into **segments** so that you
    can store the **shape** of the wave as digital audio data, using a digital audio
    format. This turns an infinitely accurate analog sound wave into a discrete amount
    of digital data, that is, into zeroes and ones. The more zeroes and ones used,
    the more accurate the reproduction of the infinitely accurate (original) analog
    sound wave.


    Each digital segment of a sampled audio sound wave is called a sample, because
    it samples that sound wave at an exact point in time. The **sample accuracy**
    (resolution) you want will determine how many zeroes and ones are used to reproduce
    analog sound waves, so the **precision** of a sample is determined by the amount
    of data used to define each wave slice’s **height**. As with digital imaging,
    this precision is termed the **resolution**, or, more accurately (no pun intended),
    the **sample resolution**. Sample resolution is usually defined using **8-bit**,
    **12-bit**, **16-bit**, **24-bit**, or **32-bit** resolution. Games mostly leverage
    8-bit resolution for effects such as explosions, in which clarity is not as important;
    12-bit resolution for crystal-clear spoken dialogue and more important audio elements;
    and, possibly, 16-bit resolution for background music.


    In digital imaging and digital video this resolution is quantified by the number
    of pixels, and in digital audio, by how many bits of data are used to define each
    of the analog audio samples taken. Again, as with digital imaging, in which more
    pixels yields better quality, with digital audio a higher sample resolution yields
    better sound reproduction. Thus, higher sampling resolutions, using more data
    to reproduce a given sound wave sample, will produce higher-quality audio playback,
    at the expense of a larger data footprint. This is the reason that 16-bit audio
    (commonly referred to as **CD quality audio**) sounds better than 8-bit audio.
    Depending on the audio involved, 12-bit audio can be a great compromise.


    In digital audio there is a new type of audio sample, known as HD audio in the
    consumer electronics industry. HD digital audio broadcast radio uses a 24-bit
    sample resolution, so each audio sample, or slice of the sound wave, contains
    16,777,216 bits of sample resolution. Some of the newer hardware devices now support
    HD audio, such as the smartphones you see advertised featuring “HD-quality audio,”
    meaning that they have 24-bit audio hardware. These days, laptops (including PCs),
    as well as game consoles and iTVs, also come standard with 24-bit audio playback
    hardware.


    It is important to note that HD audio is probably not necessary for Java 8 games,
    unless your game is music oriented and makes use of high-quality music, in which
    case you can use HD audio samples via a **WAVE** file format.'
