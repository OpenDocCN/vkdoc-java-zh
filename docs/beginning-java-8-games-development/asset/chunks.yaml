    这是确定碰撞的第一个（简单）部分，位于第一个 checkCollision() 方法中，该方法由脉冲事件管理器从 .update() 方法内部调用。它遍历
    List<Actor> CURRENT_CAST，并为每个 Actor 对象调用 **collide(object);** 方法，以检查 InvinciBagel
    角色是否与其发生碰撞。如您在图 16-31 中所见，此 Java 代码没有错误，我们接下来要编写的 Java 方法体是 **public** **boolean
    collide()** 方法，我们之前在第 8 章的抽象 Hero 类中声明了该方法以供使用。


    ![9781484204160_Fig16-31.jpg](img/9781484204160_Fig16-31.jpg)


    图 16-31. 添加一个 for 循环，使用 .getCurrentCast().size() 从 0 计数到 CURRENT_CAST 中的对象数量


    在编写 .collide() 方法（这是本书中我们将要编写的最困难的方法体之一）之前，我们需要研究一些与 **javafx.scene** 包的 **Node**
    类及其 **Bounds** 属性，以及 **.getBoundsInLocal()** 和 **.getBoundsInparent()** 方法调用相关的更复杂主题。我们还将研究
    **javafx.scene.shape** 包的 **Shape** 类及其 **.intersect(Shape shape1, Shape shape2)**
    方法调用。我们将在 **public boolean collide(Actor object) {...}** 方法内部使用所有这些内容，因此在编写这个复杂而密集（但令人兴奋）的
    Java 结构之前，我们需要先掌握这些高级知识。


    定位 Node 对象：使用 Bounds 对象


    关于碰撞检测，我们首先需要了解的是 **javafx.geometry** 包的 **Bounds** 类。这个 **public abstract** 类（及其创建的对象）在
    **javafx.scene** 包的 **Node** 类中被用来保存 Node 的**边界**。正如您可能已经推测到的，这是我们将利用来确定碰撞检测的方法之一，并结合我们的碰撞
    SVGPath Shape 数据，在研究了 Bounds 对象及其相关的 **.getBoundsInLocal()** 和 **.getBoundsInParent()**
    方法如何为我们工作之后，我们将深入探讨这些数据。


    这个 Bounds 类是使用 java.lang.Object 主类从头创建的，包含 **X**、**Y** 和 **Z** 坐标，以及 **width**、**height**
    和 **depth** 值。由于我们将在 2D 环境中工作，我们将使用 Bounds 对象的 X 和 Y 以及 width 和 height 值（属性）。Bounds
    类有一个直接的已知子类，称为 BoundingBox。如果您想知道，“直接子类”意味着 BoundingBox 类声明为 BoundingBox **extends**
    Bounds，而“已知”类是指已**正式**添加到 Java 8 JDK 中的类。


    “未知”类的一个例子是您自己定制的 Bounds 子类（如果您编写了一个的话）。Java 8 中 javafx.geometry.Bounds 类的类层次结构如下所示：


    ```

    java.lang.Object

      > javafx.geometry.Bounds

    ```


    Bounds 类用于创建 Bounds 对象。这些对象用于描述 Node 对象的边界，正如我们所知，这些是 JavaFX Scene Graph Node
    对象。Bounds 对象的一个重要特性是它可以具有**负**的 width、height 或 depth。Bounds 对象属性中的任何负值都用于指示该 Bounds
    对象是**空的**。稍后我们将在代码中使用这一点来确定碰撞**未**发生。正如我在本书前面指出的，有时您必须采取“相反”的方法来找到解决方案或正确的工作流程，以实现您的游戏设计和编程目标。


    使用 Node 局部边界：.getBoundsInLocal() 方法


    JavaFX Scene Graph Node 类中的一个重要方法是 **public final Bounds .getBoundsInLocal()**
    方法。此方法是获取 boundsInLocal 属性值的 getter 方法。boundsInLocal 属性是“只读”的，并为包含它的 Node 保存一个矩形
    Bounds 对象。它包含的数据表示 Node 的**未变换**（原始）局部坐标空间。未变换意味着 Node 坐标在它们被**旋转**、**平移**或**缩放**之前的状态，这代表了
    Node 对象的原始（默认）坐标。


    对于扩展 Shape 类的 Node 类（对象）（我们的 ImageView Node 不扩展 Shape 类），局部边界还将包括实现非零 Shape（或
    Path）**描边**所需的空间，因为这可能会延伸到由这些位置和大小属性定义的 Shape 几何体“外部”。**局部边界**对象还包括您可能已设置的任何**裁剪路径**区域，以及您可能已设置的任何**特殊效果**的范围。


    **boundsInLocal** 属性将始终具有**非空**值，并且需要注意的是，此方法不考虑 Node 对象的可见性，因此计算仅基于 Node 的几何体。每当
    Node 对象的几何体发生变化时，boundsInLocal 属性会自动重新计算。

