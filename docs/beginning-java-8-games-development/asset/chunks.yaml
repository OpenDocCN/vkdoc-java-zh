    quite as confused between Node.intersects() and Shape.intersect() methods. We
    will be using both of these in our collision detection code later on in the chapter—first
    to detect when an ImageView Node overlaps another ImageView Node, and then to
    do a Boolean intersection operation between our SVG data collision polygons (SVGPath
    objects named spriteBounds within each Actor object).


    The **static** method format for the Shape class’s .intersect() method takes two
    Shape objects in its parameter list, and this method returns a new Shape object.
    The new Shape object that is created represents an intersection of (between) two
    input shapes. As you can imagine, you can also use this method to do Boolean intersection
    generation for your vector artwork if you are using the Shape class and its subclasses
    for this purpose. The format for the method is **static Shape intersect(Shape
    shape1, Shape shape2)**, and the way that we’re going to use it looks like this:


    ```

    Shape shape = SVGPath.intersect(invinciBagel.iBagel.getSpriteBound(), object.getSpriteBound());

    ```


    The reason that the Shape class’s .intersect() method works so well for our collision
    detection application is because we can later use a **.getBoundsInLocal().getWidth()**
    method chain, to determine if a collision has occurred, or rather, if it has **not**
    occurred by looking for a **-1 empty** value. We’ll call this method chain that
    looks for a -1 off of this new Shape object, which we will name **intersection**,
    in our **.collide(object)** method, using the following line of code:


    ```

    if (intersection.getBoundsInLocal().getWidth() != -1) { collisionDetect = true;
    }

    ```


    The way this .intersect() method works is that it only processes the **geometric
    data** that occupies your input shapes, which in our application is the **spriteBound**
    SVGPath object inside of our Actor objects. This is why we’re using an SVGPath
    Shape object (for maximum collision cage or polygon definition), purely for its
    geometric data values, and why we’ve installed this spriteBounds SVGPath Shape
    object container in our Actor object design, because we intend on using this geometric
    data for our collision detection, and not for vector illustration artwork (we
    are not stroking, or filling, the SVGPath, for instance, and please, no subtle
    jokes here folks, we’re learning game development right now).'
  trans: '

    我们将使用 InvinciBagel 的 SVGPath 形状数据与另一个场景演员道具的 SVGPath 碰撞形状数据相交后的 `.getBoundsInLocal()`
    方法，以确定相交区域的宽度是否为负一。正如我们所知，Bounds 对象中的 -1 表示空值，即**无相交**，这代表**无碰撞**。接下来，让我们看看 **boundsInParent**
    属性，它包含了 boundsInLocal 数据以及变换信息。


    使用节点父级边界：`.getBoundsInParent()` 方法


    在 JavaFX 场景图节点类中，另一个需要理解的重要方法是 **public final Bounds .getBoundsInParent()** 方法。该方法是获取
    boundsInParent 属性值的 getter 方法。boundsInParent 属性是一个“只读”属性，它保存了其所在节点的矩形 Bounds 对象。它所包含的数据代表了节点的**变换后**（修改后）的坐标空间。“变换后”意味着节点坐标加上自节点对象默认、初始或原始状态以来发生的任何变换。之所以命名为“boundsInParent”，是因为
    Bounds 对象的矩形数据需要相对于父节点对象的坐标系。这代表了节点对象的“视觉”边界，即节点经过**移动**、**旋转**、**缩放**、**倾斜**等操作后，你在屏幕上看到的内容。


    **boundsInParent** 属性的计算方式是：获取由 boundsInLocal 属性定义的局部 Bounds，然后应用所有已发生的变换，包括对以下节点属性的
    `.set()` 方法调用：**scaleX**、**scaleY**、**rotate**、**layoutX**、**layoutY**、**translateX**、**translateY**
    以及 **transforms**（Java 的 ObservableList）。与 boundsInLocal 属性一样，boundsInParent 属性始终包含一个**非空**值。


    生成的 Bounds 对象将包含在节点对象父对象的**坐标空间**内，然而，节点对象即使没有父对象（它可以是场景的根节点），也能计算 boundsInParent
    属性。与 `.getBoundsInLocal()` 方法类似，此方法不考虑节点对象的可见性，因此不要错误地认为可以通过“隐藏”你的演员节点（在我们的例子中，是一个名为
    **spriteFrame** 的 ImageView 节点子类）来规避碰撞检测代码。


    由于它计算的是对 boundsInLocal 属性的更改，因此当节点的几何形状发生变化，或该节点对象发生任何变换时，boundsInParent 属性都会被重新计算。正因如此，如果基于依赖此变量的表达式来计算节点中的任何值，将会是一个错误。例如，节点对象的
    X 或 Y 变量，或者 translateX、translateY，都不应使用此 boundsInParent 属性来计算以定位节点，因为该属性已包含先前的定位数据，从而会创建**循环引用**（有点类似于臭名昭著的无限循环场景）。


    使用节点相交：`.intersects(Bounds 对象)` 方法


    在涉及碰撞检测的 JavaFX 场景图节点类中，另一个重要方法是 **public boolean intersects(Bounds localBounds)**
    方法。如果指定调用此方法的节点对象局部坐标空间的 Bounds 对象与通过参数传入的 Bounds 对象（即你试图确定是否相交的节点的 Bounds 对象）相交，则此方法将返回
    true。例如，要确定包含 InvinciBagel 精灵的 ImageView Bounds 是否与包含某个道具精灵的 ImageView Bounds
    相交，我们将使用以下 Java 代码格式：


    ```

    iBagel.spriteFrame.getBoundsInParent().intersects(object.getSpriteFrame().getBoundsInParent());

    ```


    需要注意的是，与 `.getBoundsInLocal()` 和 `.getBoundsInParent()` 方法一样，此方法也不考虑节点对象的可见性属性。因此，相交测试仅基于相关节点对象的**几何形状**，而对于我们的
    ImageView spriteFrame 节点对象，这将是其**正方形**（InvinciBagel）或**矩形**（道具）图像容器的几何形状（尺寸）。Node
    类的 **intersects(Bounds localBounds)** 函数的默认行为是检查传入此方法调用的 Bounds 对象的局部坐标是否与调用 `.intersects()`
    方法的节点的局部 Bounds 坐标相交。接下来，让我们更仔细地看看 Shape 超类及其 `.intersect()` 方法。


    使用形状类相交：`.intersect()` 方法


    正如 Node 类（对象）有一个名为 `.intersects()` 的相交方法用于确定节点对象何时相交一样，Shape 类也有一个相交方法，可用于形状对象的相交。这个方法被称为
    **.intersect()**（而不是 intersects），以便这些方法使用不同的命名约定。这样做可能是为了让开发者不会对 Node.intersects()
    和 Shape.intersect() 方法感到过于困惑。在本章后面的碰撞检测代码中，我们将同时使用这两种方法——首先检测 ImageView 节点何时与另一个
    ImageView 节点重叠，然后对我们的 SVG 数据碰撞多边形（每个 Actor 对象中名为 spriteBounds 的 SVGPath 对象）执行布尔相交运算。


    Shape 类的 `.intersect()` 方法的**静态**方法格式在其参数列表中接受两个 Shape 对象，并返回一个新的 Shape 对象。创建的这个新
    Shape 对象表示两个输入形状之间的相交区域。可以想象，如果你使用 Shape 类及其子类进行矢量图创作，也可以使用此方法进行布尔相交生成。该方法的格式为
    **static Shape intersect(Shape shape1, Shape shape2)**，我们将这样使用它：


    ```

    Shape shape = SVGPath.intersect(invinciBagel.iBagel.getSpriteBound(), object.getSpriteBound());

    ```


    Shape 类的 `.intersect()` 方法之所以非常适合我们的碰撞检测应用，是因为我们可以随后使用 **.getBoundsInLocal().getWidth()**
    方法链，通过查找 **-1 空值** 来确定是否发生了碰撞，或者更确切地说，是否**没有**发生碰撞。我们将在 **.collide(object)** 方法中，对这个名为
    **intersection** 的新 Shape 对象调用查找 -1 的方法链，使用以下代码行：


    ```

    if (intersection.getBoundsInLocal().getWidth() != -1) { collisionDetect = true;
    }

    ```


    这个 `.intersect()` 方法的工作原理是，它只处理输入形状中的**几何数据**，在我们的应用中，就是 Actor 对象内部的 **spriteBound**
    SVGPath 对象。这就是为什么我们使用 SVGPath Shape 对象（以获得最大的碰撞框或多边形定义），纯粹是为了其几何数据值，并且为什么我们在 Actor
    对象设计中安装了此 spriteBounds SVGPath Shape 对象容器，因为我们打算将这些几何数据用于碰撞检测，而不是用于矢量插画（例如，我们没有对
    SVGPath 进行描边或填充，请各位不要开不合时宜的玩笑，我们现在正在学习游戏开发）。

