    will have to add the **import javafx.scene.image.Image;** code statement in order
    to be able to use the **Image...** annotation in your **public Bagel()** constructor
    method parameter list.


    Just to be thorough, let’s **override** a public Boolean **.collide()** method
    as well, so that we have it in the Bagel class. You may be wondering why NetBeans
    did not give us an error in [Figure 10-14](#9781484204160_Ch10.xhtml#Fig14) when
    we did not add the .collide() method to the Bagel class. As you can see in [Figure
    10-15](#9781484204160_Ch10.xhtml#Fig15), which shows the public abstract Hero
    class, we didn’t make the .collide() method a public abstract method, like we
    did with the .update() method. This is why NetBeans 8 did not generate any error
    highlighting, because we’re not required to implement the .collide() method in
    all Hero subclasses.


    ![9781484204160_Fig10-15.jpg](OEBPS/Images/9781484204160_Fig10-15.jpg)


    [Figure 10-15](#9781484204160_Ch10.xhtml#_Fig15). The Hero abstract class has
    a public boolean collide() method but since it is not abstract it is not required


    You might be wondering why we didn’t make .collide() into an abstract method,
    which it’s important to note that we could do, at any point in time in the future.
    The reason is that we might want to have (add in) motion sprites that do not collide
    with anything in the scene (game play) at some point in your future game development,
    perhaps to add in visual detail elements, such as a bird flying across the top
    of the screen. The choice is yours to make, so if you want motion sprites to always
    collide with things, you could declare the .collide() method to be abstract as
    well.


    The important thing to note is that **we can still override the .collide() method**,
    which I am going to do next, just to show you that this can still be done without
    the method having to be declared using the Java abstract keyword and the Bagel
    class will use the overridden .collide() method rather than the “default” method
    in the Hero superclass, which returns a false value (no collision).


    What is important to make a note of here is that you can put your **default method
    code** into the superclass, which, if not specifically overridden in any given
    subclass, will become your default method programming logic for all of your subclasses.
    This allows you to implement “default” behaviors for all your subclasses, in one
    place (superclass).


    Of course, you can always override this default behavior, and implement a more
    specific behavior, using the @Override keyword along with the same exact method
    declaration format. This can be seen in [Figure 10-16](#9781484204160_Ch10.xhtml#Fig16),
    near the bottom of the screen shot, and if you compare this with the bottom of
    [Figure 10-15](#9781484204160_Ch10.xhtml#Fig15), you will see that their structure
    is identical, with the exception of the @Override keyword used in the Bagel subclass.
    When we cover collision detection programming, we’ll replace the **return false;**
    line of code with our Bagel class’s own customized .collide() collision detection
    behavior, which will become quite complex as we add advanced features to the game
    as time goes on. For now I am installing this .collide() method body (essentially
    empty, as it just returns false) so you see a complete class.


    ![9781484204160_Fig10-16.jpg](OEBPS/Images/9781484204160_Fig10-16.jpg)


    [Figure 10-16](#9781484204160_Ch10.xhtml#_Fig16). Override public boolean .collide()
    method body, for our use later on during a collision detection chapter


    We have made a lot of good progress in this chapter, creating a Casting Director
    and the Star for your game!


    Summary


    In this tenth chapter, we added two key classes to the game: the CastingDirector.java
    class and the Bagel.java class. The first performs a cast management and collision
    management functionality, and the second adds the primary actor for the game,
    so that we can start to work on how the InvinciBagel moves around the screen.
    We looked at a diagram of our current package and class structure and how the
    new classes are going to fit into an overall game engine design strategy that
    we are implementing during this book.


    We learned what a Java **interface** is, and how Java interfaces will allow us
    to control what’s implemented by other developers regarding our classes. We also
    learned about the **Java Collection Framework**, which provides things such as
    Arrays, Lists and Sets to use to provide data store functionality for our Java
    8 and JavaFX applications (games).


    We learned about the java.util package and its **List<E>** interface, as well
    as the **ArrayList<E>** class, and how the ArrayList<E> class implements this
    List<E> interface. We learned about **<E> Elements**, **<K> Keys**, **<V> Values**,
    and **<T> Types**. We learned that the List and ArrayList objects have a structure
    and an order, whereas the Set and HashSet objects do not have a specific order,
    and cannot have duplicate elements.'
  trans: '

    我们要编写的第一个内容是 `Bagel()` 构造方法，因为我们希望创建一个 Bagel 角色并将其放置到屏幕上，以便开始处理移动代码以及后续的碰撞检测代码。此代码将接收与
    Hero 类的 `Hero()` 构造方法完全相同的参数，并使用 Java 的 **super** 关键字（我喜欢称之为 **super 构造器**），以
    **super()** 构造方法调用的形式将这些参数“向上”传递给 Hero 类的 `Hero()` 构造方法。你的 `Bagel()` 构造方法的 Java
    代码应如下面的 Java 类和构造方法结构所示：


    ```

    public class Bagel extends Hero {

        public Bagel(String SVGdata, double xLocation, double yLocation, Image...
    spriteCels) {

            super(SVGdata, xLocation, yLocation, spriteCels);

        }

    }

    ```


    如图 10-13 所示，Bagel 类名下方有一条波浪形的红色错误下划线高亮。如果将鼠标悬停在此处，你会看到“Bagel is not abstract and
    does not override abstract method .update() in Hero”，这告诉你，你需要么将 Bagel 设为公共抽象类（但我们不会这样做，因为我们希望实际使用此类来容纳角色（对象）及其属性（变量）和能力（方法）），要么消除此错误的另一个选项是添加
    **@Override public void update() {...}** 方法结构，即使它目前是一个空方法。


    ![9781484204160_Fig10-13.jpg](img/9781484204160_Fig10-13.jpg)


    图 10-13。编写一个公共 Bagel() 构造方法，该方法调用 super() 构造方法（来自 Hero 超类）


    实现当前为空的 `.update()` 方法的代码使用了 Java 的 **@Override** 关键字，一旦添加该代码，错误就会消失，代码将无错误，如图
    10-14 所示。代码如下：


    ```

    @Override

    public void update() { // 空方法结构 }

    ```


    ![9781484204160_Fig10-14.jpg](img/9781484204160_Fig10-14.jpg)


    图 10-14。添加一个公共 void .update() 方法，以覆盖 Hero 类中的公共抽象 void update 方法


    请注意图 10-14 顶部，你需要添加 **import javafx.scene.image.Image;** 代码语句，以便能够在 **public Bagel()**
    构造方法的参数列表中使用 **Image...** 注解。


    为了确保完整性，我们还要**覆盖**一个公共布尔型 **.collide()** 方法，以便在 Bagel 类中拥有它。你可能想知道为什么在图 10-14
    中，当我们没有向 Bagel 类添加 `.collide()` 方法时，NetBeans 没有给出错误。如图 10-15 所示（该图显示了公共抽象 Hero
    类），我们没有像对待 `.update()` 方法那样将 `.collide()` 方法设为公共抽象方法。这就是 NetBeans 8 没有生成任何错误高亮的原因，因为我们不需要在所有
    Hero 子类中实现 `.collide()` 方法。


    ![9781484204160_Fig10-15.jpg](img/9781484204160_Fig10-15.jpg)


    图 10-15。Hero 抽象类有一个公共布尔 collide() 方法，但由于它不是抽象的，因此不是必需的


    你可能想知道为什么我们没有将 `.collide()` 设为抽象方法，需要注意的是，我们可以在未来的任何时间点这样做。原因在于，在未来的游戏开发中，我们可能希望拥有（添加）不与场景（游戏玩法）中任何物体发生碰撞的运动精灵，也许是为了添加视觉细节元素，例如一只鸟飞过屏幕顶部。这由你决定，因此如果你希望运动精灵始终与物体碰撞，你也可以将
    `.collide()` 方法声明为抽象的。


    需要重点注意的是，**我们仍然可以覆盖 .collide() 方法**，我接下来就要这样做，只是为了向你展示，即使该方法没有使用 Java 的 abstract
    关键字声明，这仍然可以做到，并且 Bagel 类将使用被覆盖的 `.collide()` 方法，而不是 Hero 超类中返回 false 值（无碰撞）的“默认”方法。


    这里需要重点记录的是，你可以将**默认方法代码**放入超类中，如果该代码在任何特定子类中没有被专门覆盖，它将成为你所有子类的默认方法编程逻辑。这允许你在一个地方（超类）为所有子类实现“默认”行为。


    当然，你始终可以使用 @Override 关键字以及完全相同的方法声明格式来覆盖此默认行为，并实现更具体的行为。这可以在图 10-16 中看到（位于屏幕截图底部附近），如果你将其与图
    10-15 底部进行比较，你会发现它们的结构是相同的，只是 Bagel 子类中使用了 @Override 关键字。当我们介绍碰撞检测编程时，我们将用 Bagel
    类自己定制的 `.collide()` 碰撞检测行为替换 **return false;** 这行代码，随着我们不断为游戏添加高级功能，该行为将变得相当复杂。现在我安装这个
    `.collide()` 方法体（基本上是空的，因为它只返回 false），以便你看到一个完整的类。


    ![9781484204160_Fig10-16.jpg](img/9781484204160_Fig10-16.jpg)


    图 10-16。覆盖公共布尔 .collide() 方法体，供我们在后续的碰撞检测章节中使用


    在本章中，我们取得了很好的进展，为你的游戏创建了一个选角导演和主角！


    总结


    在第十章中，我们为游戏添加了两个关键类：`CastingDirector.java` 类和 `Bagel.java` 类。前者执行演员管理和碰撞管理功能，后者添加了游戏的主要角色，以便我们开始研究
    InvinciBagel 如何在屏幕上移动。我们查看了当前包和类结构的图表，以及新类将如何融入我们在本书中实现的整体游戏引擎设计策略。


    我们学习了什么是 Java **接口**，以及 Java 接口如何让我们控制其他开发人员针对我们的类所实现的内容。我们还学习了 **Java 集合框架**，它提供了诸如
    Arrays、Lists 和 Sets 之类的东西，用于为我们的 Java 8 和 JavaFX 应用程序（游戏）提供数据存储功能。


    我们学习了 `java.util` 包及其 **List<E>** 接口，以及 **ArrayList<E>** 类，并了解了 ArrayList<E> 类如何实现此
    List<E> 接口。我们学习了 **<E> 元素**、**<K> 键**、**<V> 值**和 **<T> 类型**。我们了解到 List 和 ArrayList
    对象具有结构和顺序，而 Set 和 HashSet 对象没有特定顺序，并且不能包含重复元素。

