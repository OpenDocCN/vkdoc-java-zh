- fmt: '# Chapter 9


    In this ninth chapter, we added constants to our game `Scene` object creation
    so that we can change the supported display resolution at any time in the future,
    as well as adding a `Color.WHITE` background color using one of the other overloaded
    `Scene()` constructor methods. We did this so that we could finish our UI design
    and implement the PLAY GAME UI Button control so that it would hide the two `ImageView`
    image compositing plates that currently hold splash screen assets, and which can
    later hold game background digital image assets.


    We learned about the `ImageView` class (and object) `visible` characteristic (or
    attribute, or variable), and how to use the `.setVisible()` method call to toggle
    the visibility of a given `ImageView` image plate using `true` or `false` values.
    Since we turned the `ImageView` image compositing plate’s visibility off in the
    `ActionEvent` handling structure for the PLAY GAME Button, we then of course had
    to make sure that the `visible` attribute was set back to `true` (on or visible)
    for the other three Button UI controls in case your game player wanted to review
    any of these screens at a later time.


    Next we covered how to turn Java 7 compatible anonymous inner class event handling
    structures into a Java 8 lambda expression using NetBeans. I wanted to cover Java
    8 lambda expressions in this book, even though they are an advanced feature, because
    they are one of the major new features in Java 8, and this is a Java 8 programming
    title.


    Finally we got into adding new features to our Java 8 game programming infrastructure,
    and learned about input event (`InputEvent`) classes and subclasses and about
    how the event handler (`EventHandler`) class structures are set up, and how they
    span across the `java.lang`, `java.util`, `javafx.event` and `javafx.scene.input`
    packages. We took a look at `KeyCode` constants and at the `KeyEvent` class, and
    then implemented this `KeyEvent` handing in our Java game code, using `.setOnKeyPressed()`
    and `.setOnKeyReleased()` event handler structures for both Java 7 and Java 8
    compatibility.


    In the next chapter, we are going to take a look at how to move a game sprite
    around your screen using this `KeyEvent` event handling structure that we have
    created during this chapter, as well as how to ascertain the boundary (edges)
    of the screen, character direction, movement velocity, and related animation and
    movement considerations.


    # Chapter 10


    ![image](OEBPS/Images/frontdot.jpg)


    ## Directing the Cast of Actors: Creating a Casting Director Engine and Creating
    the Bagel Actor Class


    Now that we have created the public abstract `Actor` and `Hero` classes (the Actor
    Engine) in [Chapter 8](#9781484204160_Ch08.xhtml), and some basic `KeyEvent` handling
    in [Chapter 9](#9781484204160_Ch09.xhtml), it is time to put more of our game
    infrastructure in place here in [Chapter 10](#9781484204160_Ch10.xhtml). We are
    going to create yet another Java class to manage our cast of actors, called `CastingDirector.java`
    (the Casting Engine). We will do this so that we can keep track of the `Actor`
    objects on the game play screen that have been created using our `Actor` and `Hero`
    abstract classes. It is important to know what game components (actors) are currently
    on the screen (or stage, or set, if you like the film production lingo that we
    are using) at any given time (or level) in the game.


    In this chapter, we’ll also need to learn more about, and use, the `List` and
    `ArrayList` classes as well as the `Set` and `HashSet` classes. These Java “collection”
    classes will manage the `List` objects and `Set` object that we’ll use to track
    the current `Actor` objects that are involved in the game play on the screen.
    We’ll cover these `java.util` package classes in detail early on during this chapter,
    so get ready to learn about Java Array objects, and some other fairly advanced
    Java programming concepts that may be a challenge for the beginner. However, they
    will be very useful for you to use in your Java 8 game title development work
    process, so I have decided to include them in this book.


    We will also want to create our first actor for the game, the InvinciBagel character
    actor, since I don’t want to get too far removed from the code that we wrote in
    [Chapter 8](#9781484204160_Ch08.xhtml) without implementing it (using it to create
    an actor). We will accomplish this by creating a `Bagel.java` class that will
    use the Java `extends` keyword to subclass a `Hero.java` abstract class. This
    makes `Bagel.java` into a subclass, and makes `Hero.java` a superclass.


    Once we have a `Bagel.java` class in place, we will then use the Java `new` keyword
    and the `Bagel()` constructor method for the `Bagel` class to create a `Bagel`
    object named `iBagel`. We will load the `iBagel` object with some temporary SVG
    data, at least until we get into how to create complex SVG collision shape data
    in [Chapter 16](#9781484204160_Ch16.xhtml) covering collision detection. We will
    also pass an X and Y coordinate, to put the `iBagel` actor in the middle of the
    screen, and finally the 9-character movement sprite “cels,” which we first looked
    at during [Chapter 8](#9781484204160_Ch08.xhtml).


    We will do this so you can start to utilize the primary data fields (variables,
    properties, or attributes) that we installed in a public abstract `Actor` and
    `Hero` class infrastructure, which we so painstakingly (or, should I say, lovingly)
    designed back in [Chapter 8](#9781484204160_Ch08.xhtml).


    We will also be working in our `InvinciBagel.java` primary application class again
    here in [Chapter 10](#9781484204160_Ch10.xhtml), and will create our `iBagel`
    Bagel (`Hero`) object in a new `.createGameActor()` method we will be coding,
    so that we can wire our main character up to the `GamePlayLoop` class’s `.handle()`
    method. This will then access (call) the `Bagel` class `.update()` method, so
    that we can start to control the movements for the primary hero for our game,
    the InvinciBagel himself.


    ### Game Design: Adding Our `CastingDirector.java` Class


    The first thing that I want to do to is to update our `invincibagel` package and
    class structure diagram to show you the new actor (sprite) management class that
    we are going to develop during this chapter using Java `ArrayList` and `HashSet`
    classes (objects). As you can see in [Figure 10-1](#9781484204160_Ch10.xhtml#Fig1),
    I am going to name this class `CastingDirector.java` because it will act just
    like a Casting Director would for any entertainment project, adding Actors to
    the project, and removing them when the scene is finished. This class will also
    contain a Java collection (a Java `ListArray` is an ordered collection and a Java
    `HashSet` is an unordered collection) that will be used when we start to implement
    collision detection later on during the book. As your game levels and scenes get
    more complicated, you will be glad to have a `CastingDirector` class that keeps
    your game actors organized and adds and removes actors from the game as needed
    by your game’s programming logic. It is important to keep track of exactly how
    many `Actor` (fixed sprites) and `Hero` (motion sprites) objects are in the scene,
    so that you only involve the fewest possible number of actors in your collision
    detection code (algorithms). This is a function of optimizing your game programming
    logic so the game plays well across all platforms.'
