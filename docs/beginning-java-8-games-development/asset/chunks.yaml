    \ you’ll need to declare `double` variables for `bulletGravity` and `cheeseGravity`,\
    \ and set them equal to `0.2` and `0.1` values.\n\n![9781484204160_Fig17-59.jpg](OEBPS/Images/9781484204160_Fig17-59.jpg)\n\
    \n[Figure 17-59](#9781484204160_Ch17.xhtml#_Fig59). Declaring `bulletGravity`\
    \ and `cheeseGravity` double variables, and converting `randomOffset` to a double\n\
    \nWhat we want to do is to add a `bulletGravity` (or `cheeseGravity`) factor to\
    \ the `randomOffset` (Y location) on each frame, so we get a slight “tailing off”\
