  raw: 'Note that the **parameters** that configure the tag, which would equate to
    the attributes of the object (or the variables in the class that creates the object)
    are (yet again) **nested** inside the tag itself and use the **variable name**
    and **equals** operator, along with the **data value** specified in quotation
    marks, as shown in the previous code.


    A FXML tag that has <children> objects nested inside it will use this different
    **<ClassName>** opening tag. Following the nested tags listed inside (after) this
    tag is a **</ClassName>** closing tag. This allows the tag syntax to specify (become)
    the **container** for the <children> tags inside it, as you can see in the example
    here, in which the opening and closing FXML tags are ordered according to their
    nesting (inside) hierarchy:


    ```

    <StackPane id="root" prefHeight="250" prefWidth="300" >

        <children>

           <Button id="btn" text="Say ''Hello World''" layoutX="125" layoutY="116"
    />

        </children>

    </StackPane>

    ```


    As you can see, the parameters can be put inside the opening tag for a parent
    tag by placing them **between** the **<ClassName** part of the opening tag and
    the greater-than sign. This is how you would configure the parent tag for any
    parameters if you needed to do so, as when you specified the StackPane size and
    name (called an **id** in FXML).


    Summary


    In this fifth chapter, you took a closer look at some of the more important game
    design and new media concepts that you will be using in your Java 8 game development
    work process so that you have the foundational knowledge necessary to create your
    game. You also studied JavaFX Scene Builder and FXML, just to get those concepts
    under your belt and out of the way, as I am going to do everything in this book
    using Java 8 code and JavaFX classes to comply with the requests I get from readers
    of my Android books (“How do we do this using only Java code? We don’t want to
    use XML to create our applications!” is the mantra that I am constantly hearing
    these days).


    First, you examined the key concept of static versus dynamic and how this is important
    for both game design and game optimization, as too much dynamics can overload
    older single-core and even dualcore CPUs if game optimization is not an ongoing
    consideration throughout the game design, development, and optimization process.


    Next, you explored some of the key components of **game design** (and development),
    such as **sprites**, **collision detection**, **physics simulation**, **background
    animation**, **UI design**, **scoring engines**, and **game play logic**. You
    took a look at how these applied to static games, or games without continuous
    movement, such as strategy games, board games, puzzles, knowledge games, memory
    games, and dynamic games, and games using continuous movement, such as platformers,
    arcade games, first-person shooters, third-person shooters, driving games, and
    the like.


    You took a high-level technical overview of new media asset types and the concepts
    and terminology across digital imaging, animation, digital video, and digital
    audio. You learned about pixels; resolutions; and how aspect ratios define the
    shape of an image, animation, or video and about color depth and alpha channel
    transparency and how to define these, using hexadecimal notation. Then, you investigated
    the fourth dimension of time and learned about frames, frame rates, and bit rates,
    and you looked at digital audio, sample frequency, and sample resolution. Finally,
    you studied JavaFX Scene Graph and FXML how these work and how they can be used
    in your current game.


    In the next chapter, you are going to examine **JavaFX** Scene Graph and create
    the **infrastructure** for your Java 8 game application, including the splash
    screen (your game’s home screen and primary UI).


    CHAPTER 6


    ![image](OEBPS/Images/frontdot.jpg)


    The Foundation of Game Design: The JavaFX Scene Graph and the InvinciBagel Game
    Infrastructure


    In this chapter, you will start to design the infrastructure of your InvinciBagel
    game, both from the **user interface** (UI) and **user experience** standpoint
    as well as from the “under the hood” **game engine**, **sprite engine**, **collision
    engine**, and **physics engine** standpoint. You will keep optimization in mind,
    as you must do as you work through the rest of the book, so that you do not get
    a **scene graph** that is so extensive or complicated that the **pulse** system
    cannot update everything efficiently. This means keeping primary game UI screens
    (**Scene** or **SubScene nodes**) to a minimum (three or four); making sure that
    the 3D and Media engine (digital audio and digital video) use their own threads;
    and checking that the functional “engines” that drive the game are all coded logically,
    using their own classes and proper Java 8 programming conventions, structures,
    variables, constants, and modifiers (see [Chapter 3](#9781484204160_Ch03.xhtml)).


    First, you will learn about the **top-level**, **front-facing** UI screen design
    that your game will offer the user, including the InvinciBagel “branding” splash
    screen he or she sees when launching the application. This screen will have Button
    controls on it, accessing other information screens, which you will want to minimize
    in number, as they will be either Scene nodes (primary game play screen) or ImageView
    nodes (the other information screens). These game support screens will contain
    things that the user needs to know to play the game effectively, such as game
    instructions and a high scores screen. You will also include a legal disclaimers
    screen (to keep your legal department happy), which will also have credits for
    the various programmers and new media artisans who worked on the creation of the
    game engine and game assets.


    The next level down of the InvinciBagel game design foundation that you will develop
    is the **under the hood**, or **back-facing** (unseen by the game user), game
    engine component Java class design aspects for the InvinciBagel game. These include
    a **game play engine**, which will use a **javafx.animation.AnimationTimer** class
    to control the game play updates to the game play interface screen; a **sprites
    engine**, which will use Java **list** arrays and **sets** to manage game sprites;
    a **collision engine**, which will detect and respond when a collision has occurred
    between two sprites; a **physics engine**, which will apply force and similar
    physics simulations to the game play so that sprites **accelerate** and **react
    to gravity** realistically; and an **actor engine**, which will manage each of
    the characteristics of individual actors in the InvinciBagel game.


    Finally, you will modify your existing InvinciBagel.java Application subclass
    to implement a new splash screen and buttons for the game play screen and for
    the other three functional information screens needed to provide these top-level
    UI features and the foundational UI screen infrastructure for this InvinciBagel
    game application. This will ultimately get you into some Java and JavaFX programming,
    as you create the foundation for the game.


