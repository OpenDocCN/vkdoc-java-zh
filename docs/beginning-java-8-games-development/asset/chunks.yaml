- fmt: '# 排版后的内容


    如果你还记得，在[第8章](#9781484204160_Ch08.xhtml)中，我们创建了`Actor`超类（用于固定精灵）和`Hero`超类（用于运动精灵）。我从运动精灵开始，因为主要游戏角色是运动精灵，尽管运动精灵更复杂，但就其本质而言，它们也更有趣！现在我需要用一章来让`Actor`超类发挥作用，并创建一些与`Prop`相关的子类。我们将使用这些`Actor`子类来填充场景（舞台），添加诸如平台、障碍物、屏障、桥梁、宝藏以及类似的游戏固定位置对象，这些对象将被添加到场景（舞台）中，以创建游戏世界并增强游戏体验（也称为用户体验）。


    我们将使用`Actor`超类创建四个固定的`Prop`子类，这将使构建固定场景（当你创建了多个场景时，也称为关卡）变得容易。`Prop.java`类将“原样”使用你的固定精灵图像资源，而`PropH.java`类将把`isFlipH`属性设置为`true`，并使用JavaFX语句`spriteFrame.setScaleX(-1);`沿Y轴镜像图像资源。`PropV.java`类将把`isFlipV`属性设置为`true`，并使用JavaFX语句`spriteFrame.setScaleY(-1);`沿X轴镜像图像资源。`PropB.java`类（B代表“both”）将把`isFlipV`属性和`isFlipH`属性都设置为`true`，这将使用两条JavaFX语句`spriteFrame.setScale(-1);`沿X轴和Y轴镜像图像资源。


    一旦我们创建了这四个与`Prop`相关的`Actor`子类，我们将使用它们将固定对象放置到场景中，以创建游戏的第一关。这样，当我们进入碰撞检测章节时，真实游戏中应有的所有元素都将就位，我们将能够开始编写碰撞检测逻辑；然后，最终编写自动攻击引擎；再然后是游戏逻辑，它决定了计分引擎的实现方式。


    本章对于创建功能更丰富的游戏非常有价值。在任何游戏设计中，构建角色（英雄及其敌人，无论是单人游戏还是多人游戏）所处的环境对于游戏的成功和受欢迎程度至关重要，因为这些固定元素是创造游戏玩法挑战的主要部分。


