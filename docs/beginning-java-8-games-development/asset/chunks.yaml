    现在我们已经有了一个基础的构造方法（稍后会添加更多内容），让我们添加所需的抽象 **.update()** 方法，以及一个 **.collide()** 方法，因为运动精灵在移动，因此可能会与其他物体发生碰撞！首先，我们添加
    **public abstract void .update();** 方法，因为这是我们的 Actor 超类所要求的。这样做本质上是将这个 .update()
    方法的实现要求从 Actor 超类向下传递（如果你愿意，也可以说是向上传递）到 Hero 子类，再到 Hero 的任何未来子类（这将使 Hero 成为一个超类，并更符合其名称的含义）。未来的非抽象（功能性）类将实现这个
    .update() 方法，该方法将用于完成游戏编程逻辑中的所有繁重工作。正如你在图 8-11 中所见，运动精灵（Hero 子类）还需要一个碰撞检测方法，我将其命名为
    **.collide()**，因为这个名字更短，并且至少目前，除了返回一个布尔值 **false**（这里没有碰撞，Boss！）之外，它将保持**未实现**状态。你的
    .collide() 方法结构的 Java 代码将接受一个 **Actor 对象**作为其参数，因为这是你的 Hero 对象将要与之碰撞的对象，代码应如下所示：


    ```

    public boolean collide(Actor object) {

        return false;

    }

    ```


    ![9781484204160_Fig08-11.jpg](img/9781484204160_Fig08-11.jpg)


    图 8-11。添加 @Override public abstract void .update() 和 public boolean .collide(Actor
    object) 方法


    接下来，让我们在这个 Hero 类中再添加十一个变量。这些变量将保存适用于运动精灵的数据值，这些精灵需要处理与其他物体的碰撞，并遵循物理定律。我们还需要一些变量，例如
    **lifespan** 变量，以及一个用于保存累积的 **damage**（点数）的变量，如果敌人互相射击，可能会产生伤害。我们将添加受保护的变量，例如
    X 和 Y 方向的 **velocity**、X 和 Y 方向的 **offset**（用于微调精灵相关物体的位置）、碰撞形状的 **rotation**
    和 **scaling** 因子，以及最终的 **friction**、**gravity** 和 **bounce** 因子。


    向 Hero 类添加精灵控制和定义变量


    接下来我们需要做的是，确保我们需要的所有用于保存运动精灵数据的变量都在 Hero 类的顶部定义，如图 8-12 所示。这些信息将被 NetBeans 用来为
    Hero 类创建 getter 和 setter 方法。Java 代码应如下所示：


    ```

    protected double vX;

    protected double vY;

    protected double lifeSpan;

    protected double damage;

    protected double offsetX;

    protected double offsetY;

    protected double boundScale;

    protected double boundRot;

    protected double friction;

    protected double gravity;

    protected double bounce;

    ```


    ![9781484204160_Fig08-12.jpg](img/9781484204160_Fig08-12.jpg)


    图 8-12。在 Hero 类顶部添加十一个变量，定义速度、生命周期、伤害、物理、碰撞


    在我们添加全部 **22** 个 getter 和 setter 方法（即 11 个 .get() 和 11 个 .set() 方法，以匹配我们新的 Hero
    类变量）之前，让我们先回到 **Hero()** 构造方法，完成它，并初始化我们刚刚在 Hero 类顶部添加的这十一个变量。


    在 Hero 构造方法中初始化精灵控制和定义变量


    让我们为我们的 Hero Actor 对象（运动精灵）赋予 1000 个单位的生命周期，并将其余变量设置为零，你可以看到我使用了复合初始化语句来节省八行代码。如图
    8-13 所示，代码没有错误，Java 编程语句应采用以下格式：


    ```

    lifespan = 1000;

    vX = vY = damage = offsetX = offsetY = 0;

    boundScale = boundRot = friction = gravity = bounce = 0;

    ```


    ![9781484204160_Fig08-13.jpg](img/9781484204160_Fig08-13.jpg)


    图 8-13。在构造方法内部使用复合语句为你的十一个变量添加初始化


    在生成 getter 和 setter 方法之前，让我们看看如何结合使用复合变量声明语句以及了解 Java 在我们未明确指定变量时为其设置的默认变量类型值，来减少编写整个
    Hero 类所需的代码量，从 25 行代码（如果我们不使用复合变量初始化语句，则为 33 行）减少到 14 行代码。


    如果你不计算只有单个花括号的行（三行），那么编写这个完整的公共抽象类只需要不到一打 Java 语句，包括包、类和导入声明。考虑到这个核心类为我们提供了如此强大的运动精灵功能和能力，这相当令人印象深刻。当然，在我们添加了
    22 个 getter 和 setter 方法（每个方法 3 行代码）之后，总代码量（不包括空格）将达到大约 80 行。值得注意的是，NetBeans 将为我们编写超过
    75% 的类代码！非常酷。


    通过复合语句和默认变量值优化 Hero 类


    在让 NetBeans 为我们编写 getter 和 setter 方法之前，我将做两件主要事情来减少 Hero 类这一主要部分的代码量。第一件事是对我们所有相似的数据类型使用复合声明，先声明
    `protected double` 和 `protected float` 修饰符和关键字，然后在它们后面列出所有变量，用逗号分隔，这在编程术语中称为“逗号分隔”。Hero
    类变量声明的 Java 代码现在将如下所示：


    ```

    protected double vX, vY, lifeSpan, damage, offsetX, offsetY;

    protected float boundScale, boundRot, friction, gravity, bounce;

    ```


    如你在图 8-13 和图 8-14 中所见，我们对初始化也做了相同类型的复合语句：


    ```

    lifeSpan = 1000;

    vX = vY = damage = offsetX = offsetY = 0;

    boundScale = boundRot = friction = gravity = bounce = 0;

    ```


    ![9781484204160_Fig08-14.jpg](img/9781484204160_Fig08-14.jpg)


    图 8-14。通过使用复合声明并利用默认初始化值来优化你的 Java 代码


    如果你碰巧在高清电视显示屏上编辑，这甚至可以用两行代码完成：


    ```

    lifeSpan = 1000;

    vX = vY = damage = offsetX = offsetY = boundScale = boundRot = friction = gravity
    = bounce = 0;

    ```


    接下来，如果我们依赖 Java 编译器将变量初始化为零（因为如果没有指定初始化值，double 和 float 变量将被初始化为零），我们可以将这两行代码减少为一行代码：


    ```

    lifeSpan = 1000;

    ```


    现在我们已经完成了 Hero() 构造方法的“核心”部分，让 NetBeans 来编写一些代码吧！


    访问 Hero 变量：创建 Getter 和 Setter 方法

