    [Figure 10-4](#9781484204160_Ch10.xhtml#_Fig4). Add .addCurrentCast(), removeCurrentCast(),
    and resetCurrentCast methods to the CastingDirector class


    The second method that we will code is the **.removeCurrentCast()** method, which
    will also pass in a comma delimited List of Actor objects to the List (and ArrayList
    class implementing List) interfaces **.removeAll()** method call.


    To show this .removeCurrentCast() method that we are going to pass more than one
    Actor object into the body of the method, we again use the **Actor...** annotation,
    and I am going to again name this variable **actors**. Inside of the body of the
    .removeCurrentCast() method we will again call the .removeAll() method off of
    the CURRENT_CAST object, and inside of the .removeAll() method we’ll nest another
    Java statement that will create an Arrays object from the comma delimited List
    using the .asList() method called off the Arrays class reference, again passing
    the Actor... comma delimited list named actors into the method. This is done using
    the following Java method seen in [Figure 10-4](#9781484204160_Ch10.xhtml#Fig4):


    ```

    public void removeCurrentCast(Actor... actors) {

