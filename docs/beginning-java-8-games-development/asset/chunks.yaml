    用于游戏的 JavaFX 动画：使用 javafx.animation 类


    javafx.animation 包包含 **Animation** 超类，它有 **Timeline** 和 **Transition** 子类，以及 **AnimationTimer**、**Interpolator**、**KeyFrame**
    和 **KeyValue** 类。动画是 Java 8 游戏中的一个重要设计元素，多亏了 JavaFX，这些动画类已经为我们编写好了，所以你只需正确使用它们，就能为你的游戏添加动画！


    JavaFX 动画类：动画对象的基础


    Animation 类（实际上是对象）提供了 JavaFX 中动画的核心功能。Animation 类包含两个（重载的）Animation() 构造方法；它们是
    **Animation()** 和 **Animation(double targetFramerate)**，它们将在内存中创建 Animation 对象，该对象将控制动画及其播放特性和生命周期。


    Animation 类包含 **.play()** 方法、**.playFrom(cuePoint)** 或 **.playFrom(Duration time)**
    方法，以及 **.playFromStart()** 方法。这些方法用于启动 Animation 对象的播放。还有 **.pause()** 方法，可以暂停动画播放，以及
    **.stop()** 方法，用于停止动画播放。**.jumpTo(Duration time)** 和 **.jumpTo(cuePoint)** 方法用于跳转到动画中的预定义位置。

