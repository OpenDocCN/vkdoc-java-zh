- fmt: "我认为这些背景信息已经足够让我们继续实现游戏的`KeyEvent`处理了。因此，在声明屏幕`WIDTH`和`HEIGHT`常量的代码之后添加一行代码，使用一条复合声明语句声明四个`Boolean`变量，分别命名为`up`、`down`、`left`和`right`，如[图9-9](#9781484204160_Ch09.xhtml#Fig9)所示。由于任何`Boolean`值的默认值都是`false`（表示一个未被按下的键，即当前释放的键），我们不必显式初始化这些变量。这可以通过以下Java代码行完成，该代码行在[图9-9](#9781484204160_Ch09.xhtml#Fig9)顶部也无错误地显示：\n\
    \n```\nboolean up, down, left, right;\n```\n\n![9781484204160_Fig09-09.jpg](OEBPS/Images/9781484204160_Fig09-09.jpg)\n\
    \n[图9-9](#9781484204160_Ch09.xhtml#_Fig9). 在场景对象上添加`.setOnKeyPressed()`函数调用，并创建一个新的`EventHandler<KeyEvent>`对象\n\
    \n如[图9-9](#9781484204160_Ch09.xhtml#Fig9)底部所示，我通过调用`Scene`对象（名为`scene`，在前一行代码中已实例化）的`.setOnKeyPressed()`方法，为`KeyEvent`（按下）处理奠定了基础。在此方法调用内部，我们创建了一个新的`EventHandler<KeyEvent>`，就像我们为动作事件所做的那样。该代码（如您所见，在导入`KeyEvent`类之前会附带一条错误消息）如下所示：\n\
    \n```\nscene.setOnKeyPressed(new EventHandler<KeyEvent>() {  your .handle() method\
    \ will go in here });\n```\n\n使用`Alt-Enter`工作流程，选择`import javafx.scene.input.KeyEvent`选项（如[图9-9](#9781484204160_Ch09.xhtml#Fig9)所示），以消除此错误消息。接下来，让我们看看需要编写的用于处理`KeyEvent`的`.handle()`方法。\n\
    \n## 处理KeyEvent：使用Switch-Case语句\n\n`KeyEvent`对象处理是应用Java高效`switch-case`语句的绝佳场景。我们可以为传递给`.handle()`方法的任何`KeyEvent`（名为`event`）中包含的每种`KeyCode`常量添加一个`case`语句。可以使用`.getCode()`方法从`KeyEvent`对象中提取`KeyCode`。该方法在`switch()`评估区域内对名为`event`的`KeyEvent`对象调用。在`switch{}`主体内部，`case`语句将自身与提取的`KeyCode`常量进行比较，如果匹配，则处理冒号后的语句。`break;`语句允许处理退出`switch-case`评估，作为一种优化。\n\
    \n此事件处理`switch-case`结构应使用以下Java编程结构实现，该结构也在[图9-10](#9781484204160_Ch09.xhtml#Fig10)中高亮显示：\n\
    \n```\nscene.setOnKeyPressed(new EventHandler<KeyEvent>() {\n    @Override\n \
    \   public void handle(KeyEvent event) {\n        switch (event.getCode()) {\n\
    \            case UP:    up    = true; break;\n            case DOWN:  down  =\
    \ true; break;\n            case LEFT:  left  = true; break;\n            case\
    \ RIGHT: right = true; break;\n        }\n    }\n});\n```\n\n![9781484204160_Fig09-10.jpg](OEBPS/Images/9781484204160_Fig09-10.jpg)\n\
    \n[图9-10](#9781484204160_Ch09.xhtml#_Fig10). 在`public void handle()`方法内部添加`switch-case`语句，设置布尔方向变量\n\
    \n现在我们有了基本的按键按下事件处理结构，稍后我们会对其进行一些补充。接下来，让NetBeans将这段Java 7代码转换为Java 8 lambda表达式！之后，我们可以通过块复制粘贴操作创建一个按键释放事件处理结构，将`.setOnKeyPressed()`改为`.setOnKeyReleased()`，并将`true`值改为`false`值。编程快捷方式几乎和让NetBeans为我们编写代码一样酷！\n\
    \n## 转换KeyEvent处理结构：使用Java 8 Lambda表达式\n\n接下来，让NetBeans将我们的`EventHandler<KeyEvent>`代码结构重写为lambda表达式，这将显著简化它，将其从三层嵌套的代码块减少为仅两层嵌套，并将代码行数从十一行减少到八行。这些lambda表达式在编写紧凑代码方面确实非常优雅，并且它们是为多线程环境设计的，因此只要可能，使用它们可能会带来更优的线程使用！生成的Java\
    \ 8 lambda表达式代码结构应如下所示，如[图9-11](#9781484204160_Ch09.xhtml#Fig11)所示：\n\n```\nscene.setOnKeyPressed(KeyEvent\
    \ event) -> {\n    switch (event.getCode()) {\n        case UP:    up    = true;\
    \ break; // UP, DOWN, LEFT, RIGHT constants from KeyCode class\n        case DOWN:\
    \  down  = true; break;\n        case LEFT:  left  = true; break;\n        case\
    \ RIGHT: right = true; break;\n    }\n});\n```\n\n![9781484204160_Fig09-11.jpg](OEBPS/Images/9781484204160_Fig09-11.jpg)\n\
    \n[图9-11](#9781484204160_Ch09.xhtml#_Fig11). 将`KeyEvent`方法转换为lambda表达式；注意`event`变量在`switch`中使用\n\
    \n接下来，让我们使用块复制粘贴操作，将`.OnKeyPressed()` `KeyEvent`处理结构复制到自身下方，将其改为`.OnKeyReleased`\
    \ `KeyEvent`处理结构，并将`true`值改为`false`值。\n\n## 创建KeyPressed KeyEvent处理结构\n\n接下来我们需要做的是创建与`OnKeyPressed`结构完全相反的结构，即创建`OnKeyReleased`结构。这将使用相同的代码结构，只是`true`值将变为`false`值，并且`.setOnKeyPressed()`方法调用将改为`.setOnKeyReleased()`方法调用。最简单的方法是选中`.setOnKeyPressed()`结构，将其复制并粘贴到自身下方。Java代码（如[图9-12](#9781484204160_Ch09.xhtml#Fig12)所示）应如下所示：\n\
    \n```\nscene.setOnKeyReleased(KeyEvent event) -> {\n    switch (event.getCode())\
    \ {\n        case UP:    up    = false; break;\n        case DOWN:  down  = false;\
    \ break;\n        case LEFT:  left  = false; break;\n        case RIGHT: right\
    \ = false; break;\n    }\n});\n```\n\n![9781484204160_Fig09-12.jpg](OEBPS/Images/9781484204160_Fig09-12.jpg)\n\
    \n[图9-12](#9781484204160_Ch09.xhtml#_Fig12). 使用块复制粘贴操作创建`.setOnKeyReleased()`代码块，基于`.setOnKeyPressed()`\n\
    \n使用lambda表达式通过“隐式”声明和使用类（例如本章实例中的`EventHandler`类）所带来的一个有趣之处是，它减少了类代码顶部的`import`语句数量。这是因为如果某个类没有在代码中具体使用（即其名称未被写入），则该类的`import`语句就不必出现在代码顶部与其他`import`语句一起。\n\
    \n另外，请注意，NetBeans左边距中的代码折叠加号和减号图标也消失了！这是因为lambda表达式是一个基本的Java代码语句，而不是像方法或内部类那样的构造（在您将其转换为lambda表达式之前）。如果您查看[图9-12](#9781484204160_Ch09.xhtml#Fig12)，您的事件处理代码看起来非常简洁且结构良好，然而，仅用十几行代码，它实际上为您的游戏做了相当多的工作。\n\
    \n接下来，让我们看看您的`import`语句代码块（特别是如果您折叠了`import`代码块），因为您让NetBeans 8为您创建了lambda表达式。让我们看看是否有任何不需要的导入！\n\
    \n## 优化导入语句：移除EventHandler类导入语句"
  raw: 'I think that is enough background information for us to move on to implementing
    KeyEvent processing for the game, so add a line of code after your screen WIDTH
    and HEIGHT constant declarations, and declare four Boolean variables named **up**,
    **down**, **left**, and **right**, using a single compound declaration statement,
    shown in [Figure 9-9](#9781484204160_Ch09.xhtml#Fig9). Since the default value
    for any Boolean value is **false** (which will signify a key which is not being
    pressed, that is, a key which is currently released), we do not have to **explicitly
    initialize** these variables.  This is done by using the following line of Java
    code, which is also shown error-free at the top of [Figure 9-9](#9781484204160_Ch09.xhtml#Fig9):


    ```

    boolean up, down, left, right;

    ```


    ![9781484204160_Fig09-09.jpg](OEBPS/Images/9781484204160_Fig09-09.jpg)


    [Figure 9-9](#9781484204160_Ch09.xhtml#_Fig9). Add a .setOnKeyPressed() function
    call off a scene object and create a new EventHandler<KeyEvent> object


    As you can see at the bottom of [Figure 9-9](#9781484204160_Ch09.xhtml#Fig9),
    I put the foundation for my KeyEvent (pressed) handling using the .setOnKeyPressed()
    method call off of the Scene object named scene, which I have instantiated in
    the previous line of code. Inside of this method call I create a new EventHandler<KeyEvent>
    just like we did for our action events. The code, which as you can see has an
    error message attached to it until you import a **KeyEvent** class, looks like
    this:


    ```

    scene.setOnKeyPressed(new EventHandler<KeyEvent>() { your .handle() method will
    go in here });

    ```


    Use an **Alt-Enter** work process to select an **import javafx.scene.input.KeyEvent**
    option seen in [Figure 9-9](#9781484204160_Ch09.xhtml#Fig9), to remove this error
    message. Next, let’s take a look at the .handle() method we need to write to process
    the KeyEvent.


    Processing Your KeyEvent: Using the Switch-Case Statement


    KeyEvent object processing is a perfect application for implementing Java’s highly
    efficient **switch-case** statement. We can add a **case** statement for each
    type of KeyCode constant that is contained inside of any KeyEvent (named **event**)
    that is passed into the .handle() method. A KeyCode can be extracted from a KeyEvent
    object using a **.getCode()** method. This method is called on the KeyEvent object
    named event, inside of the switch() evaluation area. Inside of the switch{} body,
    the case statements compare themselves against this extracted KeyCode constant,
    and if there is a match, the statements after the colon are processed. The break;
    statement allows processing to exit the switch-case evaluation, as an optimization.


    This event handling switch-case structure should be implemented by using the following
    Java programming structure, which is also shown highlighted in [Figure 9-10](#9781484204160_Ch09.xhtml#Fig10):


    ```

    scene.setOnKeyPressed(new EventHandler<KeyEvent>() {

        @Override

        public void handle(KeyEvent event) {

            switch (event.getCode()) {

                case UP:    up    = true; break;

                case DOWN:  down  = true; break;

                case LEFT:  left  = true; break;

                case RIGHT: right = true; break;

            }

        }

    });

    ```


    ![9781484204160_Fig09-10.jpg](OEBPS/Images/9781484204160_Fig09-10.jpg)


    [Figure 9-10](#9781484204160_Ch09.xhtml#_Fig10). Add a switch-case statement inside
    of the public void handle() method setting Boolean direction variables


    Now we have the basic **key-pressed** event handling structure, which we’ll be
    adding to a bit later, let’s have NetBeans turn this Java 7 code into a Java 8
    lambda expression for us! After that, we can create a **key-released** event handling
    structure by using a block copy and paste operation, turning the .setOnKeyPressed()
    to .setOnKeyReleased(), and the true values to false values. Programming shortcuts
    are almost as cool as having NetBeans write code for us!


    Converting the KeyEvent Handling Structure: Using a Java 8 Lambda Expression


    Next let’s have NetBeans recode our EventHandler<KeyEvent> code structure as a
    lambda expression, which will simplify it significantly, reducing it from a three-deep
    nested code block to one that is nested only two deep, and from eleven lines of
    code to only eight. These lambda expressions are really elegant for writing tight
    code, and they are designed for multi-threaded environments, so whenever possible
    their usage could result in more optimal Thread usage! The resulting Java 8 lambda
    expression code structure should look like the following, as shown in [Figure
    9-11](#9781484204160_Ch09.xhtml#Fig11):


    ```

    scene.setOnKeyPressed(KeyEvent event) -> {

        switch (event.getCode()) {

            case UP:    up    = true; break; // UP, DOWN, LEFT, RIGHT constants from
    KeyCode class

            case DOWN:  down  = true; break;

            case LEFT:  left  = true; break;

            case RIGHT: right = true; break;

        }

    });

    ```


    ![9781484204160_Fig09-11.jpg](OEBPS/Images/9781484204160_Fig09-11.jpg)


    [Figure 9-11](#9781484204160_Ch09.xhtml#_Fig11). Convert the KeyEvent method to
    a lambda expression; notice that the event variable is used in the switch


    Next, let’s use a block copy and paste operation, and copy the .OnKeyPressed()
    KeyEvent handing structure underneath itself, changing it to be an .OnKeyReleased
    KeyEvent handling structure, with false values instead of true.


    Creating the KeyPressed KeyEvent Handling Structure


    The next thing that we will need to do is to create the polar opposite of the
    OnKeyPressed structure, and create the OnKeyReleased structure. This will use
    the same code structure, except that the true values will become false values,
    and the .setOnKeyPressed() method call will instead be a .setOnKeyReleased() method
    call. The easiest way to do this is to select the .setOnKeyPressed() structure,
    and copy and paste it underneath itself. The Java code, which is shown in [Figure
    9-12](#9781484204160_Ch09.xhtml#Fig12), should look like this Java structure:


    ```

    scene.setOnKeyReleased(KeyEvent event) -> {

        switch (event.getCode()) {

            case UP:    up    = false; break;

            case DOWN:  down  = false; break;

            case LEFT:  left  = false; break;

            case RIGHT: right = false; break;

        }

    });

    ```


    ![9781484204160_Fig09-12.jpg](OEBPS/Images/9781484204160_Fig09-12.jpg)


    [Figure 9-12](#9781484204160_Ch09.xhtml#_Fig12). Use a block copy and paste operation
    to create .setOnKeyReleased() code block, using .setOnKeyPressed()


    One of the interesting things that using lambda expressions does by “implicitly”
    declaring and using classes, such as the EventHandler class in the instances in
    this chapter, is that it **reduces the number of import statements** in the top
    of your class code. This is because if a class is not specifically used (its name
    written) in your code, the import statement for that class does not have to be
    in place at the top of your code with the other import statements.


    Also, notice that the code-collapsing plus and minus icons in the left margin
    of NetBeans are also gone! This is because a lambda expression is a basic Java
    code statement, and not a construct, such as a method or inner class as it was
    before you converted it to a lambda expression. If you look at [Figure 9-12](#9781484204160_Ch09.xhtml#Fig12),
    your event handling code is looking very clean and well-structured, and yet, in
    just over a dozen lines of code, it is actually doing quite a lot for your game.


    Next, let’s take a look at your import statements code block (especially if you
    have your import code block collapsed), since you had NetBeans 8 create lambda
    expressions for you. Let’s see if you have any unneeded imports!


    Optimizing Import Statements: Remove the EventHandler Class Import Statement'
