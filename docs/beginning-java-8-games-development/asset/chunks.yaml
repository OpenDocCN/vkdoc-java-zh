    在第十二章中，我们尽可能地私有化了主要的`InvinciBagel.java`类，并移除了所有与常量（`WIDTH`和`HEIGHT`）无关的`static`修饰符关键字。首先，我们移除了`public
    static Boolean`变量，并将它们设为`InvinciBagel`类的私有变量，然后创建了 getter 和 setter 方法，允许`Bagel`类通过`.is()`方法调用来使用这些变量。我们还必须在`Bagel()`构造函数参数列表的开头，使用
    Java 的`this`关键字，将`InvinciBagel`对象引用传递给`Bagel`对象。我们对静态的`Bagel iBagel`对象声明也做了同样的修改，移除了`static`修饰符关键字，并再次使用
    Java 的`this`关键字传递`InvinciBagel`对象上下文，这次是在`GamePlayLoop()`构造函数方法调用中。为此，我们必须创建自己的自定义`GamePlayLoop()`构造函数方法，而不是使用编译器（JVM）在我们未显式提供时所创建的那个。


    之后，我们移除了`StackPane`和`HBox`对象上的另外两个`static`修饰符关键字，并将所有其他变量设为私有（至少目前如此），以便为`InvinciBagel`（主）游戏类提供最高级别的封装。


    接下来，我们重新组织了`Bagel.java`类中与`.update()`方法相关的代码。我们创建了专门的方法来轮询按键值并设置对象的`iX`和`iY`属性，我们称之为`.setXYLocation()`方法，同时创建了`.moveInvinciBagel()`方法来调用`.setTranslate()`方法。


    最后，我们在`Bagel.java`类中创建了一个新的`.setBoundaries()`方法，该方法在`.setXYLocation()`方法之后、`.moveInvinciBagel()`方法之前被调用，确保我们的主角始终显示在屏幕上。


    在下一章中，我们将探讨关于为游戏精灵制作动画的高级概念，因为当它在你屏幕上移动时，会使用`List<Image> ArrayList<Image>`对象，这样我们就能在进入数字音频、碰撞检测和物理模拟等高级主题之前，获得更逼真的精灵动画效果。


    # 第十三章


    ![image](OEBPS/Images/frontdot.jpg)


    ## 为你的动作形象状态制作动画：基于`KeyEvent`处理设置图像状态


    既然我们已经在[第 11 章](#9781484204160_Ch11.xhtml)和[第 12 章](#9781484204160_Ch12.xhtml)中将
    Java 代码组织成了`Bagel.java`类中的逻辑方法，并确保所有 Java 代码符合标准，那么是时候进入更复杂的代码结构了，这些结构将在用户移动角色时为屏幕上的`InvinciBagel`角色制作动画。例如，如果角色正朝正东或正西方向移动（仅使用左或右按键，沿直线移动），他应该是在奔跑（在`imageStates(1)`和`imageStates(2)`这两个`List<Image>`元素之间交替）。如果同时按下了上键，他应该朝左或右按键的方向向上跳跃；如果按下了下键，他应该准备朝左或右按键的方向着陆。


    我们还需要实现`Actor`类的`isFlipH`属性或特性，以便角色根据其移动方向面朝正确的方向。为此，我们不会使用另一张图像，而是利用 JavaFX 的能力来“翻转”或“镜像”任何图像，可以围绕其中心
    Y 轴（`isFlipH`）或中心 X 轴（`isFlipV`）进行翻转。一旦精灵动画状态与你在前一章中实现的移动代码相结合，你会惊讶于这个角色将变得多么逼真，而到目前为止，我们仅使用了九张精灵状态图像（到目前为止，我们新的媒体资产总数据占用不到
    84KB）。


    在本章中，我们将仅使用 Java 代码，并且仅使用 JavaFX 的`AnimationTimer`（`GamePlayLoop`）超类来完成所有这些角色动画。这样，我们通过仅使用`javafx.animation`包中内存开销最小的类来访问脉冲事件定时引擎，从而优化了
    JavaFX 脉冲引擎在游戏中的使用。`AnimationTimer`类是最简单的类，没有类变量，只需要实现一个`.handle()`方法，但它也是最强大的，因为它允许你编写所有自己的代码。


    这种方法允许我们编写自定义代码，根据按下的键和移动来为角色制作动画，而不是触发基于`KeyFrame`（及其`KeyValue`）沿时间线预定义的`Timeline`对象。我在游戏引擎方面保持简单，将所有复杂性放入我们的自定义游戏玩法代码中。这将为我们以后省去很多试图“同步”基于关键帧和基于时间线的线性动画的麻烦，后者会将我们置于一个基于线性时间线的范式中，就像
    Flash 使用的那样。从 Java 编码的角度来看，这种 100% 的 Java 8 编码方法当然更困难，但它赋予我们一个数量级的强大能力，以实现事件处理、屏幕移动、角色动画、物理和碰撞检测的无缝集成。设置大量预构建的
    JavaFX `Animation`子类最终可能也能达到同样的效果，但代码会不够优雅，并且可能更难在此基础上构建未来版本的游戏玩法。


    我们所有的角色状态动画都将通过一个`.setImageState()`方法来创建，该方法将从`.update()`方法内部调用。因此，我们将在角色的移动和动画方面继续保持组织有序。


    ## `InvinciBagel`动画：`.setImageState()`方法'
