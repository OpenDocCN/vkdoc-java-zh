    Java 类的层级术语中，它就变成了一个**超类**。一个类总是使用 Java 的 **extends** 关键字来子类化一个超类。如果一个类没有以这种方式扩展给定的超类，那么它会自动扩展
    Java 的主类：**java.lang.Object**。这样做是为了让 Java 中的每个类都能通过实现一个构造器方法来创建对象。


    使用 Java 的 **extends** 关键字告诉编译器，你希望将超类的功能和特性添加（扩展）到你的类中，而你的类一旦使用了这个 extends 关键字，就变成了一个子类。子类扩展了超类提供的核心功能。要将你的类定义扩展以包含一个超类，你需要使用以下格式，在你现有的类声明中添加（或**扩展**，这里并非双关）内容：


    ```

    <修饰符关键字> class <你的自定义类名> extends <超类>

    ```


    当你用你的类扩展一个超类（此时你的类成为该超类的子类）时，你可以在你的子类中使用超类的所有特性（嵌套类、内部类、方法、变量、常量），而无需将它们全部显式地编写（编码）在你的类的**主体**中，那样做会是冗余的（且杂乱无章的）。


    ![Image](img/sq.jpg) **注意**  如果你正在扩展（或者，如果你愿意，也可以说是子类化）的超类中的任何数据字段或方法已经使用 **private**
    访问控制关键字声明，那么这些变量（或常量）和方法仅供该超类内部使用，因此你的子类将无法访问它们。同样的规则也适用于嵌套类和内部类；这些类结构不能使用在包含它们（或者，如果你愿意，可以说是位于它们之上）的
    Java 构造中被声明为 private 的任何代码。


    你的类的主体被编码在花括号内（参见图 3-2，最外层的红色方框），这些花括号位于你的类（**以及本例中的 javafx.application.Application
    超类**）声明之后。这就是为什么你首先要学习 Java 语法，然后在此基础上，通过类声明和包含类定义（变量、常量、方法、构造器、嵌套类）构造的 Java 语法来构建。


    正如你在图中看到的，**InvinciBagel** 类扩展了来自 JavaFX 包的 **Application** 超类。你当前超类到子类层级的继承图（这是我在整本书中用来向你展示事物在整体
    Java 和 JavaFX API 架构中来源的工具）因此将如下所示：


    ```

    > java.lang.Object

      > javafx.application.Application

        > invincibagel.InvinciBagel

    ```


    通过扩展 javafx.application 包及其 Application 类，你将赋予 InvinciBagel 类托管（或运行）JavaFX 应用程序所需的一切。**J**avaFX
    Application 类“构造”一个 **Application** 对象，以便它能使用系统内存；调用 **.init()** 方法来初始化任何可能需要初始化的内容；并调用
    **.start()** 方法（参见图 3-2，第二外层的红色方框），该方法将最终启动（开始）InvinciBagel Java 8 游戏应用程序所需的一切准备就绪。


    当最终用户结束使用 InvinciBagel 游戏应**用程序**时，由 **Application** 类使用 **Application()** 构造器方法创建的
    **Application** 对象，将调用其 **.stop()** 方法，并将你的应用程序从系统内存中移除，从而为你的最终用户的其他用途释放该内存空间。你很快就会学习
    Java 8 的方法、构造器和对象，因为你正从高级别的包和类构造，逐步深入到较低级别的方法和对象构造，所以你正从高级概览转向较低级别。你可能想知道 Java
    类是否可以**嵌套**在彼此内部，也就是说，Java 类是否可以包含其他 Java 类。答案是肯定的，它们当然可以（也确实如此）！接下来，让我们看看 Java
    嵌套类的概念。


    嵌套类：存在于其他类内部的 Java 类


    Java 中的**嵌套类**是定义在另一个 Java 类内部的类。嵌套类是其所在类的一部分，这种嵌套表示这两个类旨在以某种方式一起使用。嵌套类有两种类型：**静态嵌套类**，通常简称为嵌套类；以及**非静态嵌套类**，通常被称为**内部类**。


    静态嵌套类（我将称之为嵌套类）用于创建供包含它们的类使用的实用程序，有时仅用于保存供该类使用的常量。你们中那些开发 Android 应用程序的人对嵌套类非常熟悉，因为它们在
    Android API 中非常常用，用于保存实用方法或 Android 常量，这些常量用于定义诸如屏幕密度设置、动画运动插值曲线类型、对齐常量和用户界面元素缩放设置等内容。如果你想要理解
    static（静态）这个概念，可以将其视为固定的，或者不可改变的。照片是静态图像，而视频则不是。在本书中，我们会经常探讨这个概念。


    嵌套类使用 Java 中通常称为**点表示法**的方式来引用“从属于”其主类或父类（即包含类）的嵌套类。例如，**MasterClass.NestedClass**
    将是使用其主类（包含类）名称来引用嵌套类的格式，这里使用了泛型类类型名称。如果你创建了一个 InvinciBagel SplashScreen 嵌套类来为你的
    Java 游戏绘制**启动画面**，那么在 Java 代码中，它将使用这种 Java 8 **点表示法**语法被引用为 **InvinciBagel.SplashScreen**。


    让我们以 JavaFX 的 Application 类为例，它包含一个 **Parameters** 嵌套类。这个嵌套类**封装**（或者说包含）了你可以为
    JavaFX 应用程序设置的参数。因此，这个 **Application.Parameters** 嵌套类将与你的 **Application** 类属于同一个
    **javafx.application** 包，如果你使用 import 语句，它将被引用为 **javafx.application.Application.Parameters**。


    类似地，构造器方法将被编写为 **Application.Parameters()**，因为构造器方法必须与其所在类的命名方案完全相同。除非你是在为其他开发人员编写代码（这是嵌套类最常用的场景，例如
    JavaFX 的 Application 类或你在 Android 操作系统中会找到的许多嵌套的实用程序或常量提供类），否则你更有可能使用非静态嵌套类（通常称为
    Java **内部类**）。

    '
- fmt: "# 嵌套类与内部类\n\n一个嵌套类可以通过使用 Java `static` 关键字来声明。Java 关键字有时也被称为 Java 修饰符。因此，如果你要创建一个\
    \ `InvinciBagel.SplashScreen` 嵌套类，`InvinciBagel` 类及其 `SplashScreen` 嵌套类声明（Java\
    \ 8 编程结构）将如下所示：\n\n```\npublic class InvinciBagel extends Application {\n    static\
    \ class SplashScreen {\n        // The Java code that creates and displays your\
    \ splashscreen is in here\n    }\n}\n```\n\n需要注意的是，如果你使用例如 `import javafx.application.Application.Parameters`\
    \ 来导入一个嵌套类，你可以在你的类中仅使用 `Parameters` 类名来引用该嵌套类，而不必使用完整的类名路径（该路径通过 `Application.Parameter`（`ClassName.NestedClassName`）点号表示法语法引用，向你的类代码展示如何通过父类访问其嵌套类）。\n\
    \n正如你将在本书中多次看到的，Java 方法也可以使用点号表示法来访问。因此，与其使用 `ClassName.NestedClassName.MethodName`，如果你已经使用\
    \ `import` 语句导入了这个嵌套类，你可以直接使用 `NestedClassName.MethodName`。这是因为 Java `import`\
    \ 语句已经建立了通过其包含类到达该嵌套类的完整引用路径，因此你无需提供这个完整路径引用，编译器就能知道你在引用哪个代码结构！\n\n接下来，让我们看看非静态嵌套类，它们通常被称为\
    \ Java 内部类。\n\n## 内部类：不同类型的非静态嵌套类\n\nJava **内部类**也是嵌套类，但它们没有在 `class` 关键字和类名之前使用\
    \ `static` 关键字修饰符声明，这就是为什么它们被称为**非静态**嵌套类。因此，任何位于另一个类内部且未使用 `static`（关键字）修饰符的类声明，在\
    \ Java 中都将被称为内部类。Java 中有三种类型的内部类：**成员**类、**局部**类和**匿名**类。在本节中，你将了解这些内部类之间的区别，以及它们是如何实现的。\n\
    \n与嵌套类类似，**成员类**是在包含（父）类的主体内部定义的。你可以在包含类主体内的任何位置声明一个成员类。如果你希望访问属于包含类的数据字段（变量或常量）和方法，而无需提供到该数据字段或方法的路径（通过点号表示法，如\
    \ `ClassName.DataField` 或 `ClassName.Method`），那么你可以声明一个成员类。成员类可以被认为是一个未使用 Java\
    \ `static` 修饰符关键字的嵌套类。\n\n嵌套类通过其包含类（或顶层类）使用点号表示法路径来引用静态嵌套类，而成员类由于不是静态的，因此是实例特定的，这意味着通过该类创建的对象（实例）可以彼此不同（对象是类的一个唯一实例），而静态（固定）嵌套类只有一个版本，不会改变。例如，一个**私有内部类**只能被包含它的父类使用。将\
    \ `SplashScreen` 内部类编码为私有类将如下所示：\n\n```\npublic class InvinciBagel extends Application\
    \ {\n    private class SplashScreen {\n        // The Java code that creates and\
    \ displays your splashscreen is in here\n    }\n}\n```\n\n由于这个类被声明为 `private`，它仅供你自己的应用程序使用（具体来说是供包含类使用）。因此，这不会是一个供其他类、应用程序或开发人员使用的工具类或常量类。你也可以在不使用**私有访问修饰符关键字**的情况下声明你的内部类，这将如下面的\
    \ Java 编程结构所示：\n\n```\npublic class InvinciBagel extends Application {\n    class\
    \ SplashScreen {\n        // The Java code that creates and displays your splashscreen\
    \ is in here\n    }\n}\n```\n\n这种**访问控制**级别被称为**包**或**包私有**，这是应用于任何未使用其他 Java\
    \ 访问控制修饰符**关键字**（`public`、`protected`、`private`）声明的类、接口、方法或数据字段的默认访问控制级别。这种类型的内部类不仅可以被顶层类（或包含类）访问，还可以被包含该类的包中的任何其他类成员访问。这是因为包含类被声明为\
    \ `public`，而内部类被声明为包私有。如果你希望内部类在包外部也可用，你可以使用以下 Java 代码结构将其声明为 `public`：\n\n```\n\
    public class InvinciBagel extends Application {\n    public class SplashScreen\
    \ {\n        // The Java code that creates and displays your splashscreen is in\
    \ here\n    }\n}\n```\n\n你也可以将内部类声明为 `protected`，这意味着它只能被父类的任何子类访问。如果你在一个不是类的较低级\
    \ Java 编程结构（例如方法或迭代控制结构（通常称为循环））内部声明一个类，那么它在技术上将被视为一个**局部类**。局部类仅在该代码块内部可见；因此，它不允许（或使用）类修饰符，如\
    \ `static`、`public`、`protected` 或 `private`。局部类的使用方式类似于**局部变量**，不同之处在于它是一个复杂的\
    \ Java 编码结构，而不是一个在本地使用的简单数据字段值。\n\n最后，还有一种类型的内部类称为**匿名类**。匿名类是一个没有给定类名的局部类。你遇到匿名类的频率可能远高于局部类。这是因为程序员通常不会为他们的局部类命名（使其成为匿名类）；局部类包含的逻辑仅在**局部**（在其声明处）使用，因此这些类实际上不需要有名称——它们仅在内部被该\
    \ Java 代码块引用。\n\n## Java 方法：核心 Java 函数代码结构\n\n在类内部，通常有方法以及这些方法使用的数据字段（变量或常量）。因为我们是从外到内（从顶层结构到较低层结构）进行讲解，所以接下来我将介绍方法。方法在其他编程语言中有时被称为函数。[图\
    \ 3-2](#9781484204160_Ch03.xhtml#Fig2) 提供了一个 `.start()` 方法的示例，展示了该方法如何持有创建基本“Hello\
    \ World！”应用程序的编程逻辑。方法内部的编程逻辑使用 Java 编程语句来创建一个 `Stage` 对象和一个 `Scene` 对象，在 `StackPane`\
    \ 对象中放置一个按钮到屏幕上，并定义事件处理逻辑，使得当按钮被点击时，引导 Java 代码将“Hello World！”文本写入你的 NetBeans IDE\
    \ 输出区域。\n\n方法声明以访问修饰符关键字开头，可以是 `public`、`protected`、`private` 或包私有（通过不使用任何访问控制修饰符来指定）。如图所示，`.start()`\
    \ 方法已使用 `public` 访问控制修饰符声明。"
  raw: 'A nested class can be declared by using the Java **static** keyword. A Java
    keyword is also sometimes called a Java modifier. Therefore, if you were to do
    an InvinciBagel.SplashScreen nested class, the InvinciBagel class and its SplashScreen
    nested class declaration (Java 8 programming structure) would look something like
    this:


    ```

    public class InvinciBagel extends Application {

        static class SplashScreen {

            // The Java code that creates and displays your splashscreen is in here

        }

    }

    ```


    It is important to note if you use, for example, import javafx.application.Application.Parameters
    to import a nested class, you can reference that nested class within your class,
    using just the Parameters class name, rather than the full class name path that
    shows your class’s code how to travel through a parent class to its nested class
    via the Application.Parameter (ClassName.NestedClassName) dot notation syntax
    reference.


    As you will see many times throughout this book, Java methods can also be accessed
    using the dot notation. So, instead of using **ClassName.NestedClassName.MethodName**,
    you could, if you had used the import statement to import this nested class, simply
    use **NestedClassName.MethodName**. This is because the Java import statement
    has already been used to establish the full reference path to this nested class,
    through its containing class, and so you do not have to provide this full path
    reference for the compiler to know what code construct you are referring to!


    Next, let’s take a look at nonstatic nested classes, which are usually referred
    to as Java inner classes.


    Inner Classes: Different Types of Nonstatic Nested Classes


    Java **inner classes** are also nested classes, but they are not declared using
    the **static** keyword modifier before the class keyword and class name, which
    is why they are called **nonstatic** nested classes. Thus, any class declaration
    that is inside another class that does not use the static (keyword) modifier would
    be termed an inner class in Java. There are three types of inner classes in Java:
    **member** class, **local** class, and **anonymous** class. In this section, you
    will discover what the differences are between these inner classes, as well as
    how they are implemented .


    Like nested classes, **member classes** are defined within the body of the containing
    (parent) class. You can declare a member class anywhere within the body of the
    containing class. You would declare a member class if you wanted to access data
    fields (variables or constants) and methods belonging to the containing class
    without having to provide a path (via dot notation) to the data field or method
    (**ClassName.DataField or ClassName.Method**). A member class can be thought of
    as a nested class that does not use the Java static modifier keyword.


    Whereas a nested class is referenced through its containing, or top-level, class,
    using a dot notation path to the static nested class, a member class, because
    it is not static, is instance specific, meaning that objects (instances) created
    via that class can be different from each other (an object is a unique instance
    of a class), whereas a static (fixed) nested class will only have one version,
    which does not change. For instance, a **private inner class** can only be used
    by a parent class that contains it. The **SplashScreen** inner class coded as
    a private class would look something like this:


    ```

    public class InvinciBagel extends Application {

        private class SplashScreen {

            // The Java code that creates and displays your splashscreen is in here

        }

    }

    ```


    Because this class is declared as private, it is for your own application usage
    (the containing class’s usage, specifically). Thus, this would not be a utility
    or constant class for use by other classes, applications, or developers. You can
    also declare your inner class without using the **private access modifier keyword**,
    which would look like the following Java programming construct:


    ```

    public class InvinciBagel extends Application {

        class SplashScreen {

            // The Java code that creates and displays your splashscreen is in here

        }

    }

    ```


    This level of **access control** is called **package** or **package private**
    and is the default level of access control applied to any class, interface, method,
    or data field that is declared without using one of the other Java access control
    modifier **keywords** (public, protected, private). This type of inner class can
    be accessed not only by the top-level, or containing, class, but also by any other
    class member of the package that contains that class. This is because the containing
    class is declared public, and the inner class is declared package private. If
    you want an inner class to be available outside the package, you declare it to
    be **public**, using the following Java code structure:


    ```

    public class InvinciBagel extends Application {

        public class SplashScreen {

            // The Java code that creates and displays your splashscreen is in here

        }

    }

    ```


    You can also declare an inner class **protected**, meaning that it can only be
    accessed by any subclasses of the parent class. If you declare a class inside
    a lower-level Java programming structure that is not a class, such as a method
    or an iteration control structure (commonly called a loop), it would technically
    be referred to as a **local class**. A local class is only visible inside that
    block of code; thus, it does not allow (or make sense to use) class modifiers,
    such as static, public, protected, or private. A local class is used like a **local
    variable**, except that it is a complex Java coding construct rather than a simple
    a data field value that is used locally.


    Finally, there is a type of inner class called an **anonymous class**. An anonymous
    class is a local class that has not been given a class name. You are likely to
    encounter anonymous classes far more often than you are local classes. This is
    because programmers often do not name their local classes (making them anonymous
    classes); the logic local classes contain is only used **locally**, to their declaration,
    and so these classes do not really need to have a name—they are only referenced
    internally to that block of Java code.


    Java Methods: Core Java Function Code Constructs


    Inside classes, you generally have methods and the data fields (variables or constants)
    that these methods use. Because we are going from outside to inside, or top-level
    structures to lower-level structures, I will cover methods next. Methods are sometimes
    called functions in other programming languages. [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)
    provides an example of the **.start()** method, showing how the method holds the
    programming logic that creates a basic “Hello World!” application. The programming
    logic inside the method uses Java programming statements to create a Stage object
    and a Scene object, place a button on the screen in a **StackPane** object, and
    define event**-**handling logic, such that when the button is clicked, the bootstrap
    Java code writes the “Hello World!” text to your NetBeans IDE output area.


    The method declaration starts with an access modifier keyword, either public,
    protected, private, or package private (which is designated by not using any access
    control modifier at all). As you can see in the figure, the **.start()** method
    has been declared, using the public access control modifier.'
