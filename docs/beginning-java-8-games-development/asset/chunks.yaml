    InvinciBagel 游戏实现玩法元素时一切工作的核心。我们要做的第一件事是在 `.collide()` 方法顶部安装一个名为 **`collisionDetect`**
    的布尔“标志”变量，并将其设置为 **`false`** 值（未检测到碰撞）。设置 `collisionDetect` 标志的 Java 代码应如下所示：


    ```

    boolean collisionDetect = false;

    ```


    判断是否发生碰撞的下一步是使用 Java 的条件 `if()` 语句。这使我们能够通过结合使用 Node 类的 `.intersects()` 方法调用和每个
    `spriteFrame` ImageView Node 对象的 `.getBoundsInParent()` 方法调用，来测试包含精灵图像资源的 ImageView
    Node 对象是否发生了交集。第一个 `spriteFrame.getBoundsInParent()` 方法调用是我们链式调用 `.intersects()`
    方法的基础，因为我们要做的是确定与主要游戏角色的碰撞。由于我们要引用 `invinciBagel` 对象（InvinciBagel 类）及其 `iBagel`
    Actor 对象，这个结构将采用 **`invinciBagel.iBagel.spriteFrame.getBoundsInParent().intersects()`**
    方法调用的形式。由于我们正在测试碰撞的 Actor 对象的 Bounds 对象需要位于 `.intersects(Bounds localBounds)`
    方法调用内部，因此我们需要使用我们在第 8 章中开发的 **`.getSpriteFrame()`** 方法调用。对于传入 `.collide()` 方法的
    Actor 对象，我们将链式调用 `.getBoundsInParent()` 方法，从而形成 **`object.getSpriteFrame().getBoundsInParent()`**
    结构，然后将其放入 `.intersect()` 方法调用内部。完整的条件 `if()` 结构如下所示：


    ```

    if( invinciBagel.iBagel.spriteFrame.getBoundsInParent().intersects(

        object.getSpriteFrame().getBoundsInParent() ) ){此处进行第二级碰撞检测}

    ```


    这第一级碰撞检测代码将检查 `iBagel` 的 `spriteFrame` ImageView Node 与每个传入我们当前正在编写的 `.collide(Actor
    object)` 方法调用的 Actor 对象中所包含的 `spriteFrame` ImageView Node 对象是否发生交集。


    这部分代码将在我们调用更“昂贵”的 Shape 交集算法之前，检查“顶层”ImageView Node 的接近程度（碰撞），而该算法我们接下来将实现，以确认更明确的碰撞发生（SVGPath
    碰撞多边形交集）。请记住，我们在此 `.collide()` 方法内部放置的代码将在调用此 `collide(Actor object)` 方法的 for
    循环的每次迭代（针对每个角色成员）中执行。


    第一个条件 `if()` 语句内部的 Java 代码创建了一个名为 **`intersection`** 的 **Shape** 对象，并将其设置为 **`SVGPath.intersect()`**
    方法调用的结果，该方法引用了 `iBagel` 的 SVGPath Shape 对象和传入 `collide(Actor object)` 方法的 SVGPath
    Shape 对象。这两个对象都调用了我们在第 8 章中创建的 **`.getSpriteBound()`** 方法，以访问 **`.intersect(Shape1,
    Shape2)`** 方法调用格式所需的 SVGPath Shape 对象。为了可读性，你的 Java 代码格式化为两行，应如下所示：


    ```

    Shape intersection = SVGPath.intersect( invinciBagel.iBagel.getSpriteBound(),

                                                         object.getSpriteBound() );

    ```


    获得此交集数据后，我们将使用另一个条件 `if()` 语句来检查该交集 Shape 对象是否包含任何碰撞数据，如果包含（即，它不包含 -1 值），则说明发生了碰撞。


    第二个嵌套的 `if()` 语句将利用链式调用自交集 Shape 对象的 **`.getBoundsInLocal().getWidth()`** 方法，并检查其是否为空（返回
    -1 值），或者是否发生了碰撞。如果交集 Shape 对象的 Bounds 对象包含任何非 -1 的数据值，则会发生碰撞检测。在 `if()` 语句的主体中，如果存在任何数据（由
    `!= -1` 表示），则将 `collisionDetect` 布尔标志设置为 `true`。条件 `if()` 语句的 Java 代码应如下所示：


    ```

    if(intersection.getBoundsInLocal().getWidth() != -1) { collisionDetect = true;
    }

    ```

