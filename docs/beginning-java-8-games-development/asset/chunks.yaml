- fmt: 'I designed this book to contain a comprehensive overview of the optimal Java
    8 game development work process. Most beginning Java application development books
    only cover the language, however. If you really want to become that well-known
    Java game application developer that you seek to become, you will have to understand
    as well as master all of the areas of game design, including multimedia asset
    creation, user interface design, Java 8 Programming, `JavaFX 8.0` class usage,
    and data footprint, memory, and CPU usage optimization. Once you’ve mastered these
    areas – hopefully, by the end of this book, you will be able to create the memorable
    user experience that will be required to create popular, best-selling Java 8 games.
    You can do it; I know you can!


    Java 8 games are not only developed using the `NetBeans 8.0` Integrated Development
    Environment (IDE) alone, but also in conjunction with the use of `JavaFX 8` and
    several other different types of new media content development software packages.
    For this reason, this book covers the installation and use of a wide variety of
    other popular open source software packages, such as `GIMP 2.8` and `Audacity
    2.0.6`, in conjunction with developing Java 8 game applications using the `NetBeans
    8.0` IDE and the `JavaFX` new media engine, which brings the "wow factor" to the
    Java programming language.


    I am architecting this book in this fashion so that you can ascertain precisely
    how your usage of new media content development software will fit into your overall
    Java 8 game development work process. This comprehensive approach will serve to
    set this unique book title distinctly apart from all of those other Java 8 game
    application development titles that are currently out on the market. The book
    starts out in [Chapter 1](#9781484204160_Ch01.xhtml) with downloading and installing
    the latest Java 8 JDK as well as the `NetBeans 8.0` IDE, along with several popular
    open source content development applications.


    In [Chapter 2](#9781484204160_Ch02.xhtml), you will learn about `NetBeans 8.0`,
    and create your first Java 8 game application, and look at useful NetBeans features,
    such as code completion and code profiling. In [Chapter 3](#9781484204160_Ch03.xhtml),
    you will learn about the fundamentals of the Java 8 programming language, which
    you’ll be implementing to create a Java 8 game during the remainder of the book.


    In [Chapter 4](#9781484204160_Ch04.xhtml), you will learn all about the `JavaFX
    8.0` new media engine (API) and how its impressive features can take your Java
    8 game development and place it into the stratosphere. In [Chapter 5](#9781484204160_Ch05.xhtml),
    you will learn all about the `JavaFX 8 FXML` (Java FX Markup Language) and about
    the underlying concepts of developing new media assets such as digital audio,
    digital images, digital video, 2D scalable vector graphics (SVG), and 3D geometry,
    for use with Java 8 games. In [Chapter 6](#9781484204160_Ch06.xhtml), you will
    learn about game design concepts, and create the foundation for your Java 8 game,
    its user interface, and a splashscreen. Thus the first third of this book is foundational
    material, which you’ll need to be able to understand how `NetBeans 8.0`, `Java
    8`, `JavaFX 8.0`, and various new media asset types supported by the `JavaFX`
    engine function together as a platform.


    In [Chapter 7](#9781484204160_Ch07.xhtml) we will start to create the various
    game engines, starting with the game play loop 60 FPS timing engine, and we will
    learn about the `JavaFX 8 Animation`, `Timeline`, `KeyFrame`, `KeyValue`, `Interpolator`,
    and `AnimationTimer` classes, which allow the Java 8 game to tap into the `JavaFX`
    pulse event timing engine that gives Java 8 its multimedia power.


    In [Chapter 8](#9781484204160_Ch08.xhtml), we will create your game `Actor` and
    `Hero` Java abstract classes, the Actor engine, if you will, which will allow
    us to create the different types of game play components that we will need for
    the Java 8 game. This will teach you how to create custom foundational classes
    for a game project, and you will look at the `Node`, `SVGPath`, `Shape`, `Image`,
    and `ImageView` classes as we incorporate these `JavaFX` class (object) types
    into our Java 8 Game Actor design.


    In [Chapter 9](#9781484204160_Ch09.xhtml), you will learn how to add interactivity
    to your Java 8 Game projects, using event handling. We will add an event processing
    engine, which will process all of the different types of action, key, mouse, and
    drag events that you are likely to utilize in your Java 8 game development work
    process in the future when you create your own custom games.


    In [Chapter 10](#9781484204160_Ch10.xhtml), you will learn about Java `List`,
    `Set`, and `Array` classes. These are called Java collections, and we will create
    a custom Actor management engine, which we will call the `CastingDirector` class,
    during this chapter. This will allow you to automate the task of keeping track
    of the cast of your game for each level, and will be used for collision detection.


    In [Chapter 11](#9781484204160_Ch11.xhtml) we will start coding our primary `Actor`
    class for the `InvinciBagel` character, and add Java 8 code that controls movement
    on the screen, so that we can start to work on fusing character animation with
    game player key use so that we can allow our game players to control the `InvinciBagel`
    character completely. This involves "wiring up" the `Bagel` class to the `GamePlayLoop`
    (game play timing class created in [Chapter 7](#9781484204160_Ch07.xhtml)) class,
    so we can start working in the fourth dimension of time.


    In [Chapter 12](#9781484204160_Ch12.xhtml) you will use your `Actor` and `Hero`
    abstract classes that you created in [Chapter 8](#9781484204160_Ch08.xhtml) to
    create the `InvinciBagel` primary character and his `Bagel.java` class, as well
    as learn how to implement code that sets the boundaries for your Java 8 game,
    so that the Actor does not go off the screen, forcing him stay inside of the field
    of play for the game.


    In [Chapter 13](#9781484204160_Ch13.xhtml) you will add different `InvinciBagel`
    sprite image states into your Java 8 game, and when these are combined with the
    movement you coded in [Chapter 11](#9781484204160_Ch11.xhtml), allow your `InvinciBagel`
    character to run, jump, fly, land, wait impatiently to be moved, and even turn
    sideways to evade bullets.


    In [Chapter 14](#9781484204160_Ch14.xhtml), you will create a series of `Prop`
    classes that will allow you to place fixed props and obstacles into your Java
    8 game levels. You will learn how to use one digital image asset to create four
    different scenery props, using the `JavaFX` ability to flip and mirror your image
    assets around either (or both of) their X and Y axes.


    In [Chapter 15](#9781484204160_Ch15.xhtml), you’ll implement your Java 8 game
    audio engine, using the `JavaFX AudioClip` class, which allows digital audio sequencing
    to be integrated into your Java 8 game play, taking it an order of magnitude higher,
    by stimulating the aural senses of your game player. You’ll learn how to optimize
    digital audio assets so well, that you will not have to use any lossy compression,
    giving you perfect audio samples, and showing you exactly how much of the system’s
    memory your audio assets will be using.


    In [Chapter 16](#9781484204160_Ch16.xhtml), we’ll start getting into advanced
    topics, such as designing collision polygons using SVG data and the `GIMP 2.8`
    and `PhysicsEditor` software packages. We will also learn about the `JavaFX Bounds`
    and `Node` classes, and how collision detection is accomplished for Java 8 game
    development, using the `.getBoundsInLocal()` and `.getBoundsInParent()` method
    calls, in conjunction with the `Node.intersects()` and `Shape.intersect()` method
    calls.'
  raw: 'I designed this book to contain a comprehensive overview of the optimal Java
    8 game development work process. Most beginning Java application development books
    only cover the language, however. If you really want to become that well-known
    Java game application developer that you seek to become, you will have to understand
    as well as master all of the areas of game design, including multimedia asset
    creation, user interface design, Java 8 Programming, JavaFX 8.0 class usage, and
    data footprint, memory, and CPU usage optimization. Once you’ve mastered these
    areas – hopefully, by the end of this book, you will be able to create the memorable
    user experience that will be required to create popular, best-selling Java 8 games.
    You can do it; I know you can!


    Java 8 games are not only developed using the NetBeans 8.0 Integrated Development
    Environment (IDE) alone, but also in conjunction with the use of JavaFX 8 and
    several other different types of new media content development software packages.
    For this reason, this book covers the installation and use of a wide variety of
    other popular open source software packages, such as GIMP 2.8 and Audacity 2.0.6,
    in conjunction with developing Java 8 game applications using the NetBeans 8.0
    IDE and the JavaFX new media engine, which brings the "wow factor" to the Java
    programming language.


    I am architecting this book in this fashion so that you can ascertain precisely
    how your usage of new media content development software will fit into your overall
    Java 8 game development work process. This comprehensive approach will serve to
    set this unique book title distinctly apart from all of those other Java 8 game
    application development titles that are currently out on the market. The book
    starts out in [Chapter 1](#9781484204160_Ch01.xhtml) with downloading and installing
    the latest Java 8 JDK as well as the NetBeans 8.0 IDE, along with several popular
    open source content development applications.


    In [Chapter 2](#9781484204160_Ch02.xhtml), you will learn about NetBeans 8.0,
    and create your first Java 8 game application, and look at useful NetBeans features,
    such as code completion and code profiling. In [Chapter 3](#9781484204160_Ch03.xhtml),
    you will learn about the fundamentals of the Java 8 programming language, which
    you’ll be implementing to create a Java 8 game during the remainder of the book.


    In [Chapter 4](#9781484204160_Ch04.xhtml), you will learn all about the JavaFX
    8.0 new media engine (API) and how its impressive features can take your Java
    8 game development and place it into the stratosphere. In [Chapter 5](#9781484204160_Ch05.xhtml),
    you will learn all about the JavaFX 8 FXML (Java FX Markup Language) and about
    the underlying concepts of developing new media assets such as digital audio,
    digital images, digital video, 2D scalable vector graphics (SVG), and 3D geometry,
    for use with Java 8 games. In [Chapter 6](#9781484204160_Ch06.xhtml), you will
    learn about game design concepts, and create the foundation for your Java 8 game,
    its user interface, and a splashscreen. Thus the first third of this book is foundational
    material, which you’ll need to be able to understand how NetBeans 8.0, Java 8,
    JavaFX 8.0, and various new media asset types supported by the JavaFX engine function
    together as a platform.


    In [Chapter 7](#9781484204160_Ch07.xhtml) we will start to create the various
    game engines, starting with the game play loop 60 FPS timing engine, and we will
    learn about the JavaFX 8 Animation, Timeline, KeyFrame, KeyValue, Interpolator,
    and AnimationTimer classes, which allow the Java 8 game to tap into the JavaFX
    pulse event timing engine that gives Java 8 its multimedia power.


    In [Chapter 8](#9781484204160_Ch08.xhtml), we will create your game Actor and
    Hero Java abstract classes, the Actor engine, if you will, which will allow us
    to create the different types of game play components that we will need for the
    Java 8 game. This will teach you how to create custom foundational classes for
    a game project, and you will look at the Node, SVGPath, Shape, Image, and ImageView
    classes as we incorporate these JavaFX class (object) types into our Java 8 Game
    Actor design.


    In [Chapter 9](#9781484204160_Ch09.xhtml), you will learn how to add interactivity
    to your Java 8 Game projects, using event handling. We will add an event processing
    engine, which will process all of the different types of action, key, mouse, and
    drag events that you are likely to utilize in your Java 8 game development work
    process in the future when you create your own custom games.


    In [Chapter 10](#9781484204160_Ch10.xhtml), you will learn about Java List, Set,
    and Array classes. These are called Java collections, and we will create a custom
    Actor management engine, which we will call the CastingDirector class, during
    this chapter. This will allow you to automate the task of keeping track of the
    cast of your game for each level, and will be used for collision detection.


    In [Chapter 11](#9781484204160_Ch11.xhtml) we will start coding our primary Actor
    class for the InvinciBagel character, and add Java 8 code that controls movement
    on the screen, so that we can start to work on fusing character animation with
    game player key use so that we can allow our game players to control the InvinciBagel
    character completely. This involves "wiring up" the Bagel class to the GamePlayLoop
    (game play timing class created in [Chapter 7](#9781484204160_Ch07.xhtml)) class,
    so we can start working in the fourth dimension of time.


    In [Chapter 12](#9781484204160_Ch12.xhtml) you will use your Actor and Hero abstract
    classes that you created in [Chapter 8](#9781484204160_Ch08.xhtml) to create the
    InvinciBagel primary character and his Bagel.java class, as well as learn how
    to implement code that sets the boundaries for your Java 8 game, so that the Actor
    does not go off the screen, forcing him stay inside of the field of play for the
    game.


    In [Chapter 13](#9781484204160_Ch13.xhtml) you will add different InvinciBagel
    sprite image states into your Java 8 game, and when these are combined with the
    movement you coded in [Chapter 11](#9781484204160_Ch11.xhtml), allow your InvinciBagel
    character to run, jump, fly, land, wait impatiently to be moved, and even turn
    sideways to evade bullets.


    In [Chapter 14](#9781484204160_Ch14.xhtml), you will create a series of Prop classes
    that will allow you to place fixed props and obstacles into your Java 8 game levels.
    You will learn how to use one digital image asset to create four different scenery
    props, using the JavaFX ability to flip and mirror your image assets around either
    (or both of) their X and Y axes.


    In [Chapter 15](#9781484204160_Ch15.xhtml), you’ll implement your Java 8 game
    audio engine, using the JavaFX AudioClip class, which allows digital audio sequencing
    to be integrated into your Java 8 game play, taking it an order of magnitude higher,
    by stimulating the aural senses of your game player. You’ll learn how to optimize
    digital audio assets so well, that you will not have to use any lossy compression,
    giving you perfect audio samples, and showing you exactly how much of the system’s
    memory your audio assets will be using.


    In [Chapter 16](#9781484204160_Ch16.xhtml), we’ll start getting into advanced
    topics, such as designing collision polygons using SVG data and the GIMP 2.8 and
    PhysicsEditor software packages. We will also learn about the JavaFX Bounds and
    Node classes, and how collision detection is accomplished for Java 8 game development,
    using the .getBoundsInLocal() and .getBoundsInParent() method calls, in conjunction
    with the Node.intersects() and Shape.intersect() method calls.'
  trans: '

    我设计这本书的目的是全面概述最优的 Java 8 游戏开发工作流程。然而，大多数初级的 Java 应用开发书籍只涵盖语言本身。如果你真的想成为你渴望成为的那位知名
    Java 游戏应用开发者，你必须理解并掌握游戏设计的各个领域，包括多媒体素材创建、用户界面设计、Java 8 编程、JavaFX 8.0 类使用，以及数据占用、内存和
    CPU 使用优化。一旦你掌握了这些领域——希望到本书结束时，你将能够创造出令人难忘的用户体验，这是创建流行、畅销的 Java 8 游戏所必需的。你能做到；我知道你可以！


    Java 8 游戏不仅使用 NetBeans 8.0 集成开发环境（IDE）进行开发，还需要结合使用 JavaFX 8 和其他几种不同类型的新媒体内容开发软件包。因此，本书涵盖了多种其他流行的开源软件包的安装和使用，例如
    GIMP 2.8 和 Audacity 2.0.6，并结合使用 NetBeans 8.0 IDE 和 JavaFX 新媒体引擎来开发 Java 8 游戏应用程序，这为
    Java 编程语言带来了“惊叹因素”。


    我以这种方式构建本书，以便你能精确地确定新媒体内容开发软件的使用将如何融入你的整体 Java 8 游戏开发工作流程。这种全面的方法将使这本独特的书与目前市场上所有其他
    Java 8 游戏应用开发书籍截然不同。本书从第 1 章开始，介绍下载和安装最新的 Java 8 JDK 以及 NetBeans 8.0 IDE，以及几个流行的开源内容开发应用程序。


    在第 2 章中，你将了解 NetBeans 8.0，创建你的第一个 Java 8 游戏应用程序，并了解有用的 NetBeans 功能，例如代码补全和代码分析。在第
    3 章中，你将学习 Java 8 编程语言的基础知识，你将在本书的其余部分中实现这些知识来创建一个 Java 8 游戏。


    在第 4 章中，你将全面了解 JavaFX 8.0 新媒体引擎（API），以及它令人印象深刻的功能如何将你的 Java 8 游戏开发提升到一个新的高度。在第
    5 章中，你将全面了解 JavaFX 8 FXML（Java FX 标记语言），以及开发用于 Java 8 游戏的新媒体素材（如数字音频、数字图像、数字视频、2D
    可缩放矢量图形（SVG）和 3D 几何体）的基本概念。在第 6 章中，你将学习游戏设计概念，并为你的 Java 8 游戏、其用户界面和启动画面创建基础。因此，本书的前三分之一是基础材料，你需要能够理解
    NetBeans 8.0、Java 8、JavaFX 8.0 以及 JavaFX 引擎支持的各种新媒体素材类型如何作为一个平台协同工作。


    在第 7 章中，我们将开始创建各种游戏引擎，从 60 FPS 游戏循环计时引擎开始，我们将学习 JavaFX 8 的 `Animation`、`Timeline`、`KeyFrame`、`KeyValue`、`Interpolator`
    和 `AnimationTimer` 类，这些类允许 Java 8 游戏接入 JavaFX 脉冲事件计时引擎，从而赋予 Java 8 多媒体能力。


    在第 8 章中，我们将创建你的游戏 `Actor` 和 `Hero` Java 抽象类，也就是 Actor 引擎，这将允许我们创建 Java 8 游戏所需的不同类型的游戏组件。这将教你如何为游戏项目创建自定义的基础类，并且在我们将这些
    JavaFX 类（对象）类型整合到我们的 Java 8 游戏 Actor 设计中时，你将了解 `Node`、`SVGPath`、`Shape`、`Image`
    和 `ImageView` 类。


    在第 9 章中，你将学习如何使用事件处理为你的 Java 8 游戏项目添加交互性。我们将添加一个事件处理引擎，该引擎将处理你将来在创建自己的自定义游戏时可能在
    Java 8 游戏开发工作流程中使用的所有不同类型的动作、按键、鼠标和拖拽事件。


    在第 10 章中，你将学习 Java 的 `List`、`Set` 和 `Array` 类。这些被称为 Java 集合，在本章中，我们将创建一个自定义的 Actor
    管理引擎，我们将其称为 `CastingDirector` 类。这将使你能够自动完成跟踪每个关卡游戏角色阵容的任务，并将用于碰撞检测。


    在第 11 章中，我们将开始为 InvinciBagel 角色编写主要的 Actor 类，并添加控制屏幕上移动的 Java 8 代码，以便我们可以开始致力于将角色动画与游戏玩家的按键使用融合在一起，从而让我们的游戏玩家能够完全控制
    InvinciBagel 角色。这涉及将 `Bagel` 类“连接”到 `GamePlayLoop`（在第 7 章中创建的游戏循环计时类）类，这样我们就可以开始在时间的第四维度中工作了。


    在第 12 章中，你将使用你在第 8 章中创建的 `Actor` 和 `Hero` 抽象类来创建 InvinciBagel 主要角色及其 `Bagel.java`
    类，并学习如何实现为你的 Java 8 游戏设置边界的代码，以便 Actor 不会离开屏幕，迫使他留在游戏场地内。


    在第 13 章中，你将把不同的 InvinciBagel 精灵图像状态添加到你的 Java 8 游戏中，当这些状态与你在第 11 章中编写的移动代码相结合时，可以让你的
    InvinciBagel 角色奔跑、跳跃、飞行、着陆、不耐烦地等待移动，甚至侧身躲避子弹。


    在第 14 章中，你将创建一系列 `Prop` 类，这些类将允许你将固定的道具和障碍物放置到你的 Java 8 游戏关卡中。你将学习如何使用一个数字图像素材创建四个不同的场景道具，利用
    JavaFX 的能力围绕其 X 轴和/或 Y 轴翻转和镜像你的图像素材。


    在第 15 章中，你将使用 JavaFX 的 `AudioClip` 类实现你的 Java 8 游戏音频引擎，该类允许将数字音频序列集成到你的 Java 8
    游戏玩法中，通过刺激游戏玩家的听觉感官，将其提升一个数量级。你将学习如何优化数字音频素材，以至于你不需要使用任何有损压缩，从而获得完美的音频样本，并精确显示你的音频素材将使用多少系统内存。


    在第 16 章中，我们将开始深入探讨高级主题，例如使用 SVG 数据以及 GIMP 2.8 和 PhysicsEditor 软件包设计碰撞多边形。我们还将了解
    JavaFX 的 `Bounds` 和 `Node` 类，以及如何使用 `.getBoundsInLocal()` 和 `.getBoundsInParent()`
    方法调用，结合 `Node.intersects()` 和 `Shape.intersect()` 方法调用来实现 Java 8 游戏开发的碰撞检测。

    '
- fmt: '# 排版后的内容


    在[第17章](#9781484204160_Ch17.xhtml)中，我们将把所有内容整合在一起，并专注于实现游戏玩法。你将创建`Treasure`、`Projectile`和`Enemy`的`Actor`子类，并创建一个自动攻击引擎，将游戏玩家的PC或移动设备变成其对手。在本章中，我们将探讨最前沿的主题，例如物理和AI，之后你将拥有足够的基础知识，利用自己的知识产权创建属于自己的Java
    8游戏！


    本书旨在成为市场上最全面的Java 8游戏应用程序开发编程书籍，涵盖了创建Java 8游戏应用程序所需的大部分（如果不是全部）主要Java 8和JavaFX类。其中一些包括`Image`、`ImageView`、`Group`、`Node`、`StackPane`、`Scene`、`Stage`、`Application`、`ListArray`、`HashSet`、`Arrays`、`AudioClip`、`MediaPlayer`、`URL`、`Button`、`Shape`、`HBox`、`SVGPath`、`Insets`、`AnimationTimer`等。


    如果你正在寻找最全面、最新的Java 8游戏编程语言概述，包括与新媒体内容开发工作流程无缝集成的JavaFX 8.0和NetBeans 8.0 IDE，以及关于如何将这些技术与领先的开源新媒体游戏内容设计和开发工具结合使用的最佳实践知识，那么这本书将真正引起你的浓厚兴趣。


    本书旨在将你从Java 8游戏应用程序开发的初学者，提升到关于Java 8、NetBeans 8和JavaFX 8.0游戏应用程序开发的扎实中级知识水平。请注意，尽管本书表面上是一本入门级书籍，但它包含了大量的技术知识。书中描述的所有工作流程可能需要阅读不止一遍，才能将其吸收到应用程序开发知识库（你的技术知识储备）中。不过，请放心，这绝对值得你投入时间。


    # 第1章


    ![image](OEBPS/Images/frontdot.jpg)


    ## 搭建Java 8游戏开发环境


    欢迎阅读《Beginning Java 8 Games Development》这本书！让我们从为本书创建一个坚实的开发软件基础开始。这个基础的核心是**Java
    SDK（软件开发工具包）8**，也称为**JDK（Java开发工具包）8**。我还将为你配置**NetBeans IDE 8.0（集成开发环境）**，这将使Java
    8游戏的编码变得更加容易。之后，我将向你介绍最新的开源新媒体内容创作软件包，包括数字插图（Inkscape）、数字图像处理（GIMP [GNU图像处理程序]）、数字视频（EditShare
    Lightworks）、数字音频（Audacity）以及3D建模和动画（Blender）。在本章末尾，我还会建议一些其他专业级软件包，你应该考虑将它们添加到在本章中逐步搭建的专业游戏开发工作站中。


    为了从所有这些免费的专业级软件中获得最佳效果，你需要一台现代的**64位**工作站，至少配备4GB系统内存（6GB或8GB更佳）和一个**多核**处理器（中央处理器[CPU]），例如AMD
    FX-6300（六核）、AMD FX-8350（八核）或Intel i7（四核）。这类工作站已成为大众商品，可以在沃尔玛或[Pricewatch.com](http://Pricewatch.com)以实惠的价格购买。


    在本章中，你要做的第一件事是确保**移除**任何**过时版本的Java**，例如Java 7或Java 6，或任何过时版本的NetBeans，例如NetBeans
    7或NetBeans 6。这涉及到从你的工作站上**卸载**（完全移除或删除）这些较旧的开发软件版本。


    你将使用Windows程序管理工具**程序和功能**来完成此操作，该工具可以在Windows操作系统（OS）**控制面板**的**Windows OS管理工具**套件中找到。如果你碰巧使用的是Linux或Mac平台（这些不太常用的操作系统），它们也有类似的工具。由于大多数开发者使用Windows
    7、8或9，本书中的示例将使用Windows 64位平台。


    接下来，我将向你展示具体在互联网上的什么地方可以获取这些软件包，所以准备好启动你高速的互联网连接，以便下载近1GB的全新游戏内容制作软件！下载完所有这些软件的最新版本后，你将安装编程和内容开发包，并配置它们以供本书使用。


    执行这些软件安装的顺序很重要，因为Java JDK 8和Java 8运行时环境（JRE）构成了NetBeans IDE 8.0的基础。这是因为NetBeans
    IDE 8.0最初是使用Java编程语言编写的，所以你将看到使用这种语言可以开发出多么令人难以置信的专业级软件。因此，Java 8软件将是你安装的第一个软件。


    安装Java 8之后，你将安装NetBeans 8.0，这样你就在Java编程语言之上拥有了一个图形用户界面（GUI），这将使Java软件开发工作流程更加容易。安装完这两个主要的软件开发工具后，你将获得大量新媒体内容创作软件包，你可以将它们与Java
    8和NetBeans 8.0结合使用，来创建2D和3D游戏。


    ### 为Java 8游戏开发准备工作站


    假设你已经拥有一个用于新媒体内容开发和游戏开发的专业级工作站，你需要移除所有过时的JDK和IDE，并确保你的系统上已安装并准备好最新的V8（不是饮料，别傻了！）Java和NetBeans软件。如果你是新手，并且没有适合游戏开发的工作站，请前往沃尔玛或Pricewatch.com，购买一台价格实惠的多核（使用4核、6核或8核）64位计算机，运行Windows
    8.1（如果可用，也可以是9.0），至少配备4GB、6GB或8GB的DDR3（1333或1600内存访问速度）系统内存，以及一个750GB甚至1TB的硬盘驱动器。


    移除旧软件的方法是通过Windows**控制面板**及其一组实用程序图标，其中之一是**程序和功能**图标（Windows 7和8），如[图1-1](#9781484204160_Ch01.xhtml#Fig1)所示。请注意，在早期版本的Windows中，此实用程序图标可能标签不同，可能类似于**添加或删除程序**。


    ![9781484204160_Fig01-01.jpg](OEBPS/Images/9781484204160_Fig01-01.jpg)


    [图1-1](#9781484204160_Ch01.xhtml#_Fig1). 使用程序和功能实用程序图标卸载或更改计算机工作站上的程序


    点击“程序和功能”链接，或在早期版本的Windows中双击该图标，以启动该实用程序。然后，向下滚动查看你的工作站上是否安装了任何旧版本的Java开发工具（Java
    5、Java 6或Java 7）。请注意，如果你有一台全新的工作站，你的系统上应该没有预装任何版本的Java或NetBeans。如果确实发现了它们，请退回该系统，因为它可能已被使用过！'
  raw: 'In [Chapter 17](#9781484204160_Ch17.xhtml), we will pull everything together,
    and focus solely on implementing your game play. You will create Actor subclasses
    for Treasure, Projectile, and Enemy, and create an auto-attack engine that will
    turn a game player’s PC or mobile device into his or her adversary. We look at
    the most advanced topics, such as physics and AI, during this chapter, after which
    you will have enough of a foundation to create your own Java 8 games, using your
    own intellectual property!


    This book attempts to be the most comprehensive Java 8 game application development
    programming title on the market, by covering most, if not all, of the major Java
    8 and JavaFX classes that will need to be used to create Java 8 Game Applications.
    Some of these include the Image, ImageView, Group, Node, StackPane, Scene, Stage,
    Application, ListArray, HashSet, Arrays, AudioClip, MediaPlayer, URL, Button,
    Shape, HBox, SVGPath, Insets, AnimationTimer, and more.


    If you’re looking for the most comprehensive, up-to-date overview of the Java
    8 programming language for games, including JavaFX 8.0 and NetBeans 8.0 IDE all
    seamlessly integrated with new media content development work processes, as well
    as a "soup to nuts" knowledge about how to optimally use these technologies in
    conjunction with the leading open source new media game content design and development
    tools, then this book will really be of significant interest to you.


    It is the intention of this book to take you from being a Beginner in Java 8 game
    application development to a solid intermediate knowledge level regarding Java
    8, NetBeans 8, and JavaFX 8.0 game application development. Be advised that this
    book, even though it’s ostensibly a Beginner title, contains a significant amount
    of technical knowledge. All of the work processes that are described during the
    book may well take more than one read through to assimilate into an application
    development knowledge base (your quiver of technical knowledge). It will be well
    worth your time, however, rest assured.


    CHAPTER 1


    ![image](OEBPS/Images/frontdot.jpg)


    Setting Up a Java 8 Game Development Environment


    Welcome to the book *Beginning Java 8 Games Development*! Let’s get started by
    creating a solid development software foundation for use with this book. The core
    of this foundation will be **Java SDK** (**Software Development Kit**) **8**,
    also called **JDK (Java Development Kit) 8**. I will also set you up with **NetBeans
    IDE 8.0** (**Integrated Development Environment**), which will make coding Java
    8 games much easier. After that, I will introduce you to the latest open-source
    new media content creation software packages for digital illustration (Inkscape),
    digital imaging (GIMP [GNU Image Manipulation Program]), digital video (EditShare
    Lightworks), digital audio (Audacity), and 3D modeling and animation (Blender).
    At the end of the chapter, I will also suggest some other professional-level software
    packages that you should consider adding to the professional game development
    workstation that you will be creating over the course of this chapter.


    To get the best results from all this free, professional-level software, you will
    want to have a modern, **64-bit** workstation with at least 4GB of system memory
    (6GB or 8GB would be even better) and a **multicore** processor (central processing
    unit [CPU]), such as an AMD FX-6300 (hexa-core), AMD FX-8350 (octa-core), or Intel
    i7 (quad-core). Workstations such as these have become commodity items and can
    be purchased at Walmart or [Pricewatch.com](http://Pricewatch.com) at an affordable
    price.


    The first thing that you will do in this chapter is make sure that you have **removed**
    any of the **outdated versions** of Java, such as Java 7 or Java 6, or any outdated
    versions of NetBeans, such as NetBeans 7 or NetBeans 6\. This involves **uninstalling**
    (removing or deleting completely) these older development software versions from
    your workstation.


    You will do this using the Windows program management utility **Programs and Features**,
    which can be found in the Windows operating system (OS) **Control Panel** suite
    of **Windows OS Management Utilities**. There are similar utilities on the Linux
    and Mac platforms, if you happen to be using one of these less commonly used OSs.
    Because most developers use Windows 7, 8, or 9, you will be using the Windows
    64-bit platform for the examples in this book.


    Next, I will show you where exactly to go on the Internet to get these software
    packages, so get ready to fire up your speedy Internet connection so that you
    can download nearly a gigabyte of all-new game content production software! After
    you download the latest versions of all this software, you will install the programming
    and content development packages and configure them for use with this book.


    The order in which you perform these software installations is important, because
    Java JDK 8 and Java 8 Runtime Environment (JRE) form the foundation of NetBeans
    IDE 8.0\. This is because NetBeans IDE 8.0 was originally coded using the Java
    programming language, so you will see just how incredibly professional a piece
    of software can be using this language. Thus, the Java 8 software will be the
    first software you install.


    After you install Java 8, you will then install NetBeans 8.0, so that you have
    a graphical user interface (GUI), on top of the Java programming language, which
    will make the Java software development work process easier. After you have these
    two primary software development tools installed, you will get a plethora of new
    media content creation software packages, which you can use in conjunction with
    Java 8 and NetBeans 8.0 to create 2D and 3D games.


    Prepare a Workstation for Java 8 Game Development


    Assuming that you already have a professional-level workstation in place for new
    media content development and game development, you need to remove all the outdated
    JDKs and IDEs and make sure that you have the latest V8 (not the drink, silly!)
    Java and NetBeans software installed on your system and ready to go. If you are
    new to this and do not have a game-appropriate workstation, go to Walmart or Pricewatch.com,
    and purchase an affordable multicore (use a 4-, 6- or 8-core) 64-bit computer
    running Windows 8.1 (or 9.0 if it is available) that has 4GB, 6GB, or 8GB of DDR3
    (1333 or 1600 memory access speed) system memory at the very least and a 750GB,
    or even 1TB, hard disk drive.


    The way that you remove old software is through the Windows **Control Panel**
    and its set of utility icons, one of which is the **Programs and Features** icon
    (Windows 7 and 8), displayed in [Figure 1-1](#9781484204160_Ch01.xhtml#Fig1).
    Note that in earlier versions of Windows, this utility icon may be labeled differently,
    probably as something like **Add or Remove Programs**.


    ![9781484204160_Fig01-01.jpg](OEBPS/Images/9781484204160_Fig01-01.jpg)


    [Figure 1-1](#9781484204160_Ch01.xhtml#_Fig1). Use the Programs and Features utility
    icon to uninstall or change programs on your computer workstation


    Click the Programs and Features link, or double-click the icon in previous versions
    of Windows, to launch the utility. Then, scroll down to see if you have any old
    versions of the Java development tools (Java 5, Java 6, or Java 7) installed on
    your workstation. Note that if you have a brand new workstation, you should find
    no preinstalled versions of Java or NetBeans on your system. If you do find them,
    return the system, as it may have been used previously!'
  trans: '

    在第 17 章中，我们将把所有内容整合起来，并专注于实现你的游戏玩法。你将创建用于宝藏、投射物和敌人的 Actor 子类，并构建一个自动攻击引擎，将游戏玩家的
    PC 或移动设备变成其对手。在本章中，我们将探讨最前沿的主题，例如物理和人工智能，之后你将拥有足够的基础，利用自己的知识产权创建属于自己的 Java 8 游戏！


    本书旨在成为市场上最全面的 Java 8 游戏应用开发编程书籍，涵盖了创建 Java 8 游戏应用所需的大部分（如果不是全部）主要 Java 8 和 JavaFX
    类。其中一些包括：`Image`、`ImageView`、`Group`、`Node`、`StackPane`、`Scene`、`Stage`、`Application`、`ListArray`、`HashSet`、`Arrays`、`AudioClip`、`MediaPlayer`、`URL`、`Button`、`Shape`、`HBox`、`SVGPath`、`Insets`、`AnimationTimer`等。


    如果你正在寻找最全面、最新的 Java 8 游戏编程语言概述，包括与新媒体内容开发工作流程无缝集成的 JavaFX 8.0 和 NetBeans 8.0 IDE，以及关于如何将这些技术与领先的开源新媒体游戏内容设计与开发工具结合使用的最佳实践的“从入门到精通”知识，那么这本书将真正引起你的浓厚兴趣。


    本书旨在将你从 Java 8 游戏应用开发的初学者，提升到对 Java 8、NetBeans 8 和 JavaFX 8.0 游戏应用开发具备扎实中级知识水平的程度。请注意，尽管本书表面上是一本入门级书籍，但它包含了大量的技术知识。书中描述的所有工作流程可能需要不止一次的阅读才能完全吸收到应用开发知识库（你的技术知识储备）中。不过，请放心，这绝对值得你投入时间。


    第 1 章


    ![image](img/frontdot.jpg)


    搭建 Java 8 游戏开发环境


    欢迎阅读《Java 8 游戏开发入门》！让我们从为本书创建一个稳固的开发软件基础开始。这个基础的核心将是**Java SDK（软件开发工具包）8**，也称为**JDK（Java
    开发工具包）8**。我还将为你配置**NetBeans IDE 8.0（集成开发环境）**，这将使 Java 8 游戏的编码工作变得更加容易。之后，我将向你介绍最新的开源新媒体内容创作软件包，包括数字插图（Inkscape）、数字图像处理（GIMP
    [GNU 图像处理程序]）、数字视频（EditShare Lightworks）、数字音频（Audacity）以及 3D 建模和动画（Blender）。在本章末尾，我还会建议一些其他专业级软件包，你应该考虑将它们添加到你在本章中将要构建的专业游戏开发工作站中。


    为了从所有这些免费的专业级软件中获得最佳效果，你需要一台配备至少 4GB 系统内存（6GB 或 8GB 更佳）和**多核**处理器（中央处理器 [CPU]）的现代**64
    位**工作站，例如 AMD FX-6300（六核）、AMD FX-8350（八核）或 Intel i7（四核）。这类工作站已成为大众商品，可以在沃尔玛或[Pricewatch.com](http://Pricewatch.com)以实惠的价格购买。


    在本章中，你要做的第一件事是确保**移除**任何**过时版本的**Java，例如 Java 7 或 Java 6，或任何过时版本的 NetBeans，例如
    NetBeans 7 或 NetBeans 6。这涉及到从你的工作站上**卸载**（移除或完全删除）这些较旧的开发软件版本。


    你将使用 Windows 程序管理工具**程序和功能**来完成此操作，该工具可以在 Windows 操作系统（OS）的**控制面板**套件中的**Windows
    OS 管理工具**中找到。如果你碰巧使用的是 Linux 或 Mac 平台这些不太常用的操作系统，它们也有类似的工具。由于大多数开发者使用 Windows
    7、8 或 9，本书中的示例将使用 Windows 64 位平台。


    接下来，我将向你展示在互联网上具体去哪里获取这些软件包，所以准备好启动你的高速互联网连接，以便下载近 1GB 的全新游戏内容制作软件！下载完所有这些软件的最新版本后，你将安装编程和内容开发包，并配置它们以供本书使用。


    执行这些软件安装的顺序很重要，因为 Java JDK 8 和 Java 8 运行时环境（JRE）构成了 NetBeans IDE 8.0 的基础。这是因为
    NetBeans IDE 8.0 最初是使用 Java 编程语言编写的，因此你将看到使用这种语言可以构建出多么令人难以置信的专业软件。因此，Java 8 软件将是你安装的第一个软件。


    安装 Java 8 之后，你将安装 NetBeans 8.0，这样你就在 Java 编程语言之上拥有了一个图形用户界面（GUI），这将使 Java 软件开发工作流程更加容易。安装完这两个主要的软件开发工具后，你将获得大量新媒体内容创作软件包，你可以将它们与
    Java 8 和 NetBeans 8.0 结合使用，来创建 2D 和 3D 游戏。


    为 Java 8 游戏开发准备工作站


    假设你已经拥有一个用于新媒体内容开发和游戏开发的专业级工作站，你需要移除所有过时的 JDK 和 IDE，并确保你的系统上已安装并准备好最新的 V8（不是饮料，别傻了！）Java
    和 NetBeans 软件。如果你是新手，并且没有适合游戏开发的工作站，请前往沃尔玛或 Pricewatch.com，购买一台价格实惠的、运行 Windows
    8.1（如果可用，也可以是 9.0）的多核（使用 4、6 或 8 核）64 位计算机，该计算机至少配备 4GB、6GB 或 8GB 的 DDR3（1333
    或 1600 内存访问速度）系统内存，以及 750GB 甚至 1TB 的硬盘驱动器。


    移除旧软件的方法是通过 Windows**控制面板**及其一组实用程序图标，其中之一是**程序和功能**图标（Windows 7 和 8），如图 1-1 所示。请注意，在早期版本的
    Windows 中，此实用程序图标的标签可能不同，可能类似于**添加或删除程序**。


    ![9781484204160_Fig01-01.jpg](img/9781484204160_Fig01-01.jpg)


    图 1-1. 使用程序和功能实用程序图标卸载或更改计算机工作站上的程序


    点击“程序和功能”链接，或在早期版本的 Windows 中双击该图标，以启动该实用程序。然后，向下滚动查看你的工作站上是否安装了任何旧版本的 Java 开发工具（Java
    5、Java 6 或 Java 7）。请注意，如果你有一台全新的工作站，你的系统上应该没有预装任何版本的 Java 或 NetBeans。如果确实发现了它们，请退回该系统，因为它可能已被使用过！

