    constructor’s parameter list, since we can’t put it at the end of the parameter
    list, because we’re using the end of the parameter list to hold our Image... List
    (or Array, at some point in the code it is both of these) specification. Inside
    of the constructor method itself, you’ll set the InvinciBagel reference object,
    which is passed into the constructor method using the name **iBagel**, to equal
    an **invinciBagel** variable, which you have already declared at the top of the
