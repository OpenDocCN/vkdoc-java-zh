    \ true;    }\n```\n\n![9781484204160_Fig17-42.jpg](OEBPS/Images/9781484204160_Fig17-42.jpg)\n\
    \n[Figure 17-42](#9781484204160_Ch17.xhtml#_Fig42). Add `bulletOffset` values\
