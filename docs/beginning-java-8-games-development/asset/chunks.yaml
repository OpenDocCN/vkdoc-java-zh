- fmt: 'If you wanted to add a black background to the scene, you would select the
    **fifth** overloaded constructor method, using a `Color.BLACK` constant from the
    `Color` class (this is a `Paint` object, because `Color` is a `Paint` subclass)
    as your fill data (in this case, a fill `Color`). You would do this by using the
    following `Scene()` object constructor method call:


    ```

    Scene scene = new Scene(root, 300, 250, Color.BLACK);

    ```


    Note that the `root` object is a `Parent` subclass, called the `StackPane` class,
    created using the `StackPane()` constructor method (two lines above the `Scene()`
    constructor method call) by using the following line of Java code:


    ```

    StackPane root = new StackPane();  // StackPane subclassed from Parent, so Parent
    root satisfied

    ```


    As you can see, any class can be used in the constructor that is a subclass of
    the object (class) type that is declared (required) for that constructor parameter
    position (data). You are able to use `Color` and `StackPane` objects in your parameter
    list because they have superclass origins from the `Paint` and `Parent` classes,
    respectively.


    In case you are wondering, the `Boolean depthBuffer` parameter is used for **3D**
    scene components. Because these scene components are 3D and have depth (a z component,
    in addition to 2D x **and** y components), you will need to include this parameter,
    and set it to a value of `true`, if you are creating 3D scenes or combining 2D
    and 3D scene components. Finally, the `SceneAntialiasing` object (and class) that
    is passed in the parameter list for the fourth constructor method provides **real-time
    smoothing** for 3D scene components.


    ## JavaFX Scene Graph: Organizing Scenes, Using Parent Nodes


    A scene graph, which is not unique to JavaFX and which can be seen in quite a
    few new media content creation software packages, is a **data structure** that
    resembles an upside-down tree, with the **root node** at the top and **branch
    nodes** and **leaf nodes** coming off the root node. The first time I saw a scene
    graph approach to design was when I was 3D modeling using a software package on
    the Amiga called Real 3D from Realsoft Oy. This approach has been copied by many
    3D, digital video, and digital imaging software packages since then and now is
    a part of how JavaFX organizes content and scenes. For this reason, many of you
    may be familiar (and comfortable) with this design paradigm.


    JavaFX Scene Graph data structure allows you not only to architect, organize,
    and design your JavaFX scene and its content, but also to apply **opacity**, **states**,
    **event handlers**, **transformations**, and **special effects** to entire logical
    branches of the Scene Graph hierarchy if you set up the Scene Graph correctly.
    [Figure 4-3](#9781484204160_Ch04.xhtml#Fig3) shows the basic Scene Graph tree,
    with the root node at the top and branch and leaf nodes below it.


    ![9781484204160_Fig04-03.jpg](OEBPS/Images/9781484204160_Fig04-03.jpg)


    [Figure 4-3](#9781484204160_Ch04.xhtml#_Fig3). JavaFX Scene Graph hierarchy, starting
    with the root node and progressing to branch and leaf nodes


    The root node is the topmost node, which is why it is called the root, even though
    it is at the top, not the bottom, like a root would be in the plant world. A root
    node has no `parent`, that is, nothing above it in the Scene Graph hierarchy.
    A root node is itself a parent to the branch nodes and leaf nodes below it.


    The next most powerful (and complex) construct in the Scene Graph tree is the
    branch node, which uses the `javafx.scene.Parent` class as its superclass and
    which can contain `children` (this is logical, as it extends a class aptly named
    `Parent`). A branch node can contain other branch nodes, as well as leaf nodes,
    so it can be used to create some very complicated and powerful Scene Graph hierarchy
    (or Scene Graph architecture) constructs.


    The last level in the hierarchy is the leaf node. A leaf node is the end of the
    branch and, as such, cannot have children. It is important to note that leaf nodes
    can come directly off the root node, as you can see in [Figure 4-3](#9781484204160_Ch04.xhtml#Fig3).
    Branch nodes can be created by using the `Parent`, `Group`, or `SubScene` classes
    (see [Figure 4-2](#9781484204160_Ch04.xhtml#Fig2)) or any of their subclasses,
    such as the `WebView`, `PopupControl`, `Region`, `Pane`, or `StackPane` class.


    Examples of leaf nodes include JavaFX classes (as objects), which can be configured
    using parameters, such as shapes, text, or an `ImageView`, but which are design
    or content components, in and of themselves, and have not been designed to have
    children (child objects).


    A leaf node will therefore always contain a JavaFX class that has not been subclassed
    (extended) from the `Parent` class, and that has not itself been specifically
    designed to have child elements (child objects) within it, or below it, in the
    JavaFX Scene Graph hierarchy.


    The four subclasses of the `Parent` class can all be used as branch nodes and
    include the `Group` class, for grouping child (leaf node) objects, so that opacity,
    transforms, and effects can be applied to them; the `Region` class, for grouping
    child (leaf node) objects to form screen layouts, which can also be styled using
    CSS; the `Control` class, which can be used to create custom user interface elements
    (called controls in JavaFX); and the `WebView` class, which is used to contain
    the JavaFX `WebEngine` class (this class renders HTML5 and CSS3 content into a
    `WebView`).


    ## JavaFX Scene Content: Lights, Camera, Cursor, Action!


    Next, let’s take a look at the eight classes listed in the center column in [Figure
    4-2](#9781484204160_Ch04.xhtml#Fig2). They provide powerful multimedia tools for
    controlling your application’s cursor as well as custom lighting special effects
    and custom camera capabilities for your 2D and 3D JavaFX applications (in this
    case, games, but they could also be e-books, or iTV shows, or anything else that
    requires the powerful new media capabilities that JavaFX offers via the Java language).


    The more generalized classes (`Cursor`, `LightBase`, `Camera`) in the figure are
    parent classes, and the more specialized ones (`ImageCursor`, `PointLight`, `ParallelCamera`,
    and so on) listed after each of those are the subclasses of those parent classes.
    Except the `LightBase` class, that seems to be stating the obvious!


    As you may have guessed (correctly), the JavaFX `Cursor` class can be used to
    control the application cursor graphic (arrow, hand, closed hand, crosshair, and
    so on) being used at any given time. The `ImageCursor` subclass can be used to
    define and supply a custom image-based cursor as well as an `x` and a `y` location
    within the custom cursor image that defines where its point (also called the cursor
    hot spot) is located.


    The `LightBase` class, and its `PointLight` and `AmbientLight` subclasses, can
    be used to light your scenes. These classes are primarily used for 3D scenes,
    and they require 3D capabilities on any platform that the game is running on,
    which is not really a problem these days, as most of the major CPU manufacturers
    also make (and include) GPUs. Also, it is important to note that the Prism game
    engine will simulate a 3D environment (GPU), using 3D processing emulation, if
    one is not available on the platform that is rendering the game. In addition,
    if you set it up correctly, you can use the lighting classes with your 2D games
    or use lighting with a hybrid 2D-3D game.'
