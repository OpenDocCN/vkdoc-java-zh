    often used, as it will be the one you use when something in your cast has changed:
    for instance, a killed enemy, such as an InvinciBagel, a spent projectile, such
    as a bullet, consumed food, such as a ball of cream cheese, or found treasure,
    such as a gift box.


    The **.addToRemovedActors()** method uses the **if-else** statement, to ascertain
    if multiple Actor objects have been passed in the parameter list (the first or
    if part of the construct) or if just one Actor object needs to be removed (the
    second or else part of the construct). The first part of the if-else statement
    uses the **.length()** method to ascertain if more than one Actor objects has
    been passed into the method call parameter list using **if(actors.length > 1)**
    since an **Actor...** parameter allows more than one Actor object to be submitted
    to the method, as seen in [Figure 10-9](#9781484204160_Ch10.xhtml#Fig9).


    ![9781484204160_Fig10-09.jpg](OEBPS/Images/9781484204160_Fig10-09.jpg)


    [Figure 10-9](#9781484204160_Ch10.xhtml#_Fig9). Add .getRemovedActors(), .addToRemovedActors(),
    and .resetRemovedActors() method structures


    If there are multiple Actor objects to be processed the inside of an **if{...}**
    construct, use the **.addAll()** method to add the contents of the parameter list
    to your **REMOVED_ACTORS** Set<Actor> object. This is accomplished by using the
    **Arrays.asList((Actor[]) actors))** construct inside of the .addAll() method
    call, which constructs the **Actor[]** Array named **actors** that is compatible
    with (necessary for) using an .addAll() method call with a Set<E> object type.
    The second **else{...}** portion of this method body adds one single Actor object,
    since the actors.length was not greater than one, by using an **actors[0]** annotation
    (first Actor parameter) and an .add() method call using the following code:


    ```

    public void addToRemovedActors(Actor... actors) {

        if (actors.length > 1) { REMOVED_ACTORS.addAll(Arrays.asList((Actor[]) actors));
    }

        else {                   REMOVED_ACTORS.add(actors[0]);                          }

    ```


    Notice that since we have converted the Actor... parameters (which are destined
    for a List, but are not one yet) into an Array (because the compiler can count
    the fixed number of items), so we can use the **actors[0]** notation.


    Now that we have a way to add one or more Actor objects to the REMOVED_ACTORS
    Set<Actor> HashSet, let’s create a .resetRemovedActors() to clear out the REMOVED_ACTORS
    data set. Before we clear the Set<Actor> object we need to make sure all of the
    Actor objects contained within it are removed from the CURRENT_CAST Actor List
    object, since that is what it is there for, so the first part of this method will
    call the .removeAll() method off of the CURRENT_CAST ArrayList<Actor> object and
    inside of this method pass over the REMOVED_ACTORS Set<Actors> object. After that
    we can use the .clear() method call off of the REMOVED_ACTORS object to reset
    it back to being empty, so that it can be used all over again to collect Actor
    objects that need to be disposed of. The Java code, which is shown in [Figure
    10-9](#9781484204160_Ch10.xhtml#Fig9), should look like the following:


    ```

    public void resetRemovedActors() {

        CURRENT_CAST.removeAll(REMOVED_ACTORS);

        REMOVED_ACTORS.clear();

    }

    ```


    Next, we are going to look at how we can get NetBeans to code our **CastingDirector()**
    constructor method!


    CastingDirector() Constructor: Having NetBeans Write the Code


    There is a way that you can get NetBeans to write a **constructor method** for
    you, and since it is a little bit “hidden,” I’ll show you how to find it! I left
    the **insertion-bar cursor** in [Figure 10-10](#9781484204160_Ch10.xhtml#Fig10),
    to show you that I clicked on the **final** keyword and the yellow light bulb
    “**tip**” icon that appears, and the pale yellow pop-up tooltip message that I
    get when I mouse-over the tip light bulb. The message that I get is the “Move
    initializer to constructor(s),” and so I hit the **Alt-Enter** key combo that
    is suggested. Sure enough, there is an option for NetBeans to write this constructor
    method code for me.


    ![9781484204160_Fig10-10.jpg](OEBPS/Images/9781484204160_Fig10-10.jpg)


    [Figure 10-10](#9781484204160_Ch10.xhtml#_Fig10). Mouse-over the yellow light
    bulb icon in the line number area of the pane and reveal the constructor tip


    For the first final keyword that you click on, and Alt-Enter, and have NetBeans
    write your CastingDirector() constructor method for, it will code the **public
    CastingDirector(){...}** structure for you, and add the first instantiation statement.
    As you can see in [Figure 10-11](#9781484204160_Ch10.xhtml#Fig11), once you click
    on each of the three final keywords at the top of your class and use the same
    work process, you can have NetBeans write the entire constructor method for you.
    The Java code that NetBeans generates uses the Java **this** keyword (so that
    the CastingDirector object can refer to itself) to preface each of the three data
    store objects, as well as using the Java **new** keyword to create new instances
    of ArrayList<E> and HashSet<E> should look like the following:


    ```

    public CastingDirector() {

        this.CURRENT_CAST = new ArrayList<>();

        this.COLLIDE_CHECKLIST = new ArrayList<>();

        this.REMOVED_ACTORS = new HashSet<>();

    }

    ```


    ![9781484204160_Fig10-11.jpg](OEBPS/Images/9781484204160_Fig10-11.jpg)


    [Figure 10-11](#9781484204160_Ch10.xhtml#_Fig11). Use Alt-Enter, and have NetBeans
    write your CastingDirector() constructor method Java code for you


