    最终，测试游戏应用程序最彻底的方法是在各种不同的操作系统和硬件配置上进行，但我向您展示这个性能分析功能，是因为它是获取应用程序性能良好基线的好方法，您可以在此基础上通过优化代码来提升性能（然后反复运行分析器，并将结果与原始基线测量值进行比较）。


    一旦您单击“确定”按钮，NetBeans IDE 8.0 将根据您的系统硬件特性校准其性能分析工具，在快速、现代的多核工作站上，这应该不会花费太长时间。


    如果您运行的是 Windows 操作系统（如此处所示的 64 位 Windows 7 版本），您很可能会看到一个 **Windows 防火墙已阻止此程序的部分功能**
    的 Windows 安全警报对话框。您希望可以使用 NetBeans 8.0 的所有功能，因此接下来我们来看看如何在 Windows 中允许访问 Java
    SE 8 平台。


    通过 Windows 防火墙解除对 Java 8 平台二进制的阻止


    如果您遇到了如图 2-16 所示的令人头疼的“已阻止功能”网络对话框，请选中“允许 Java Platform SE binary 在专用网络上通信，例如我的家庭或工作网络”复选框，然后单击“允许访问”按钮，这将允许
    Java 8 平台 SE 二进制通过 Windows 防火墙进行通信。


    ![9781484204160_Fig02-16.jpg](img/9781484204160_Fig02-16.jpg)


    图 2-16. 单击“允许访问”以允许使用 Java 功能


    在您允许访问 **Java 8 平台** SE **二进制**后，NetBeans 8.0 性能分析工具可以（并且将会）运行，并生成**基本性能分析遥测**结果。您将在接下来的章节中更详细地了解这些结果，这些章节将讨论如何分析性能分析结果，以及它们揭示了您的应用程序如何使用内存和
    CPU 资源。


    分析 NetBeans IDE 8.0 游戏项目 CPU 性能分析工具结果


    NetBeans 分析器主要关注执行代码所使用的**内存使用量**和 **CPU 时间**。使用的内存越少，CPU 时间越快（这相当于执行代码所需的 CPU
    处理周期更少），您的应用程序优化得就越好。分析器还会查看与代码（软件）相关的内容，例如方法调用和线程状态，您将在本书中学习这些内容。


    运行 NetBeans 8.0 分析器后，您会发现在 IDE 左侧的“项目”、“文件”和“服务”选项卡旁边添加了一个 **Profiler** 选项卡，如图
    2-17 所示。您在本章前面已经了解了其他三个选项卡（请参阅“NetBeans 8.0 高效：组织有序的项目管理工具”一节），现在让我们来探索 Profiler
    选项卡。


    ![9781484204160_Fig02-17.jpg](img/9781484204160_Fig02-17.jpg)


    图 2-17. IDE 左侧 Profiler 选项卡下的“基本遥测”部分，显示了方法、线程以及总内存和已用内存


    在 Profiler 选项卡的顶部是 **Controls** 部分，包含 **Stop**（终止）分析中的应用程序、**Reset** 收集的分析结果缓冲区、**Garbage
    Collection**、**Modify** 分析会话和 **VM Telemetry Overview** 图标。


    其下方是 **Status** 部分，显示您选择的**分析类型**（此处为 **CPU**）、**配置**（**Analyze Performance**）和**状态**（**Running**）。


    **Profiling Results** 部分包含一些图标，用于在**代码编辑器**部分打开关于分析数据结果（报告）的选项卡，而 **View** 部分则对**虚拟机
    (VM) 遥测**、**线程**和线程**锁争用**执行相同操作。在下一节中，当您分析内存使用情况时（您当前正在分析 CPU 使用情况），您将查看其中的一些内容。


    您可以在 **Saved Snapshots** 部分保存代码分析会话期间不同时间点的**快照**。**Basic Telemetry** 部分显示有关分析会话的**统计信息**，包括方法数量、过滤器设置、正在运行的线程和内存使用情况。


    单击 **Profiling Results** 部分中的 **Live Results** 图标，打开一个实时分析结果选项卡，如图 2-18 顶部所示，标签上标有
    CPU 时间（下午 2:12:09）。


    ![9781484204160_Fig02-18.jpg](img/9781484204160_Fig02-18.jpg)


    图 2-18. NetBeans 分析器输出，显示在右上角的 cpu 选项卡和右下角的 Output 选项卡中


    如您所见，您可以打开您的代码层次结构，包括 `.main()` 方法、`.start()` 方法和 `.handle()` 方法，并直观地看到它们占总 CPU
    时间的百分比以及实际使用的 CPU 时间（以毫秒为单位），该时间值用于 Java 8 和 JavaFX 甚至 HTML5、JavaScript 和 Android
    应用程序开发的 Java 编程中。


    最后，如您在图形底部的 **Output** 窗格中所见，还有**文本输出**，就像此 Output 窗格用于显示已编译、运行和执行的代码时一样，也显示了分析器正在执行的操作。在您通过单击应用程序的“Say
    ‘Hello World’”按钮生成的“**Hello World!**”之后，您可以看到分析器代理正在初始化、缓存类等。NetBeans 的这个区域有大量的选项卡和选项，我无法在这个基本的
    NetBeans 概述章节中涵盖每一个，所以请随意探索您屏幕上看到的内容！


    分析您的 Java 8 游戏应用程序内存使用情况


    接下来，让我们看看**内存**分析。单击 **Profile Project** 图标，打开 **Analyze Memory** 对话框，如图 2-19
    所示。如您所见，如果您选择 **Record stack trace for allocations**，分析器会使用更多的系统**开销**。


    ![9781484204160_Fig02-19.jpg](img/9781484204160_Fig02-19.jpg)


    图 2-19. 选择 Profile InvinciBagel 对话框的 Memory 部分，并选择 Record stack trace for allocation


    一旦**内存分析器**运行起来，请使用 **Window ![image](img/arrow.jpg) Profiling ![image](img/arrow.jpg)
    VM Telemetry Overview** 菜单序列，如图 2-20（顶部）所示，打开 VM Telemetry Overview 选项卡（底部）。此选项卡显示**已分配内存**和**已用内存**。您可以将鼠标悬停在可视化条上，以获取任何时间点的精确读数。在编程术语中，将鼠标悬停在某个对象上将在您的代码中通过“mouse-over”来访问。


    ![9781484204160_Fig02-20.jpg](img/9781484204160_Fig02-20.jpg)


    图 2-20. 使用 Window ![image](img/arrow.jpg) Profiling 菜单序列访问可视化分析选项卡


    查看 **Window ![image](img/arrow.jpg) Profiling** 菜单序列中的其他一些可视化报告选项卡。图 2-21 展示了
    **Threads** 选项卡，显示了所有 **11** 个线程（请参见屏幕左侧的 Basic Telemetry 窗格），包括每个线程正在执行的操作（线程正在运行的代码），以及
    **VM Telemetry** 选项卡，该选项卡显示随时间变化的虚拟内存使用情况。


    ![9781484204160_Fig02-21.jpg](img/9781484204160_Fig02-21.jpg)


    图 2-21. 使用 Window ![image](img/arrow.jpg) Profiling 菜单序列访问 Threads 和 VM Telemetry
    选项卡

