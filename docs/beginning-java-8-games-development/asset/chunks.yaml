    \ 检查宝藏放置（左）并测试负碰撞值（右）和宝藏碰撞检测\n\n正如你很快会看到的（并且在[图17-15](#9781484204160_Ch17.xhtml#Fig15)右侧所示），Java的`int`（整数）数据类型支持负值，因此你只需在`.scoringEngine()`方法中将`+=`改为`-=`，即可处理希望游戏玩家避免碰撞的`Actor`对象。在我们的开发场景中，我们将使用与`Prop`对象的碰撞来给予负分。\n\
    \n添加宝藏碰撞检测：更新`.scoringEngine()`\n\n更改`Prop`角色对象的计分，通过将`+=`值改为`-=1`或`-=2`来减少计分板数值，然后在现有的`if-else-if`链末尾添加一个`else-if{}`部分，以支持`Treasure`对象，我们将为其计分`+=5`，即加五分。执行此操作的Java代码（你可以在[图17-16](#9781484204160_Ch17.xhtml#Fig16)中看到）应如下所示：\n\
    \n```\nprivate void scoringEngine(Actor object)  {\n    if(object instanceof Prop)\
    \         {\n        invinciBagel.gameScore-=1;\n        invinciBagel.playiSound0();\n\
    \    } else if(object instanceof PropV) {\n        invinciBagel.gameScore-=2;\n\
    \        invinciBagel.playiSound1();\n    } else if(object instanceof PropH) {\n\
    \        invinciBagel.gameScore-=1;\n        invinciBagel.playiSound2();\n   \
    \ } else if(object instanceof PropB) {\n        invinciBagel.gameScore-=2;\n \
    \       invinciBagel.playiSound3();\n    } else if(object instanceof Treasure)\
    \ {\n        invinciBagel.gameScore+=5;\n        invinciBagel.playiSound4(); \
    \      }\n    invinciBagel.scoreText.setText(String.valueOf(invinciBagel.gameScore));\n\
    }\n```\n\n![9781484204160_Fig17-16.jpg](OEBPS/Images/9781484204160_Fig17-16.jpg)\n\
    \n[图17-16](#9781484204160_Ch17.xhtml#_Fig16). 在`.scoringEngine()`方法条件`if()`结构的末尾添加一个`Treasure`的`else-if`结构\n\
    \n你需要记得将`Treasure`对象添加到`castDirector`对象中，如[图17-17](#9781484204160_Ch17.xhtml#Fig17)所示，因为碰撞检测引擎使用这个`CastingDirector`类（对象）来管理碰撞检测过程。如果不执行此步骤，`InvinciBagel`将直接越过`Treasure`对象而不会（与它们）发生碰撞！\n\
    \n![9781484204160_Fig17-17.jpg](OEBPS/Images/9781484204160_Fig17-17.jpg)\n\n[图17-17](#9781484204160_Ch17.xhtml#_Fig17).\
    \ 在`.addCurrentCast(Actor. . .)`方法调用中添加`iTR0`和`iTR1`的`Treasure`对象\n\n现在我们已经将这两个`Treasure`对象添加到了`castDirector`的`CastingDirector`对象中，碰撞检测编程逻辑将“看到”它们，并且与`Treasure`对象的碰撞将会发生，从而触发计分引擎正确计分。测试在游戏中实现宝藏的最终代码，确保其正常工作，然后我们就可以继续添加**敌人**，并让它们向`InvinciBagel`角色发射弹丸。\n\
    \n添加敌人：`Enemy`和`Projectile`类"
  raw: 'Now that we have a Treasure.java class, we can create Treasure objects for
    the game. As you know, this will be done in the InvinciBagel.java class. Declare
    **package protected** (since we’re going to reference them outside of InvinciBagel,
    in Bagel.java) Treasure objects, and name them **iTR0** and **iTR1** (stands for
    InvinciBagel Treasure). Add **iT0** and **iT1** Image object declarations to the
    end of your private Image objects compound declaration. Instantiate the iT0 and
    iT1 Image objects using the Java **new** keyword, the **Image()** constructor
    method, and the **treasure1.png** and **treasure2.png** image assets, respectively.
    After that, you can create the iTR0 and iTR1 Treasure objects, using the **Treasure()**
    constructor method, SVG path data of 0,0, 0,64, 64,64 and 64,0 and locations of
    50,105 and 533,206 respectively. Make sure that you add these new Treasure object’s
    spriteFrame ImageView Nodes to the JavaFX Scene Graph, using the **.getChildren().add()**
    method chain, called off of the root Group object. As you can see in [Figure 17-14](#9781484204160_Ch17.xhtml#Fig14),
    the code is error-free, and we are now ready to test the new Treasure.java class
    and the Java code that we have added to the InvinciBagel.java class to see if
    we can get Treasure in the game Scene. Your Java code should look like the following:


    ```

    Treasure iTR0, iTR1;    // These Object Declarations go at the top of the InvinciBagel
    class

    private Image iB0, iB1, iB2, iB3, iB4, iB5, iB6, iB7, iB8, iP0, iP1, iT0, iT1;


    iT0 =  new Image("/treasure1.png", 64, 64, true, false, true);  // .loadImageAssets()
    Method

    iT1 =  new Image("/treasure2.png", 64, 64, true, false, true);


    iTR0 = new Treasure("M0 0 L0 64 64 64 64 0 Z", 50, 105, iT0);  // .createGameActors()
    Method

    iTR1 = new Treasure("M0 0 L0 64 64 64 64 0 Z", 533, 206, iT1);


    root.getChildren().add(iTR0.spriteFrame);

    root.getChildren().add(iTR1.spriteFrame);

    ```


    ![9781484204160_Fig17-14.jpg](OEBPS/Images/9781484204160_Fig17-14.jpg)


    [Figure 17-14](#9781484204160_Ch17.xhtml#_Fig14). After adding declarations at
    the top of the class, instantiate the objects, and add them to a Scene Graph


    Let’s take a moment and use a **Run ![image](OEBPS/Images/arrow.jpg) Project**
    work process and see if our Treasure Actors are on the screen!


    As you can see in the left half of [Figure 17-15](#9781484204160_Ch17.xhtml#Fig15),
    all Treasure objects are visible in the Scene, and we’re ready to start enhancing
    our .scoringEngine() method, to support **negative scoring** as well as add in
    **Treasure scoring** values.


    ![9781484204160_Fig17-15.jpg](OEBPS/Images/9781484204160_Fig17-15.jpg)


    [Figure 17-15](#9781484204160_Ch17.xhtml#_Fig15). Check Treasure placement (left)
    and test negative collision values (right) and Treasure collision detection


    As you’ll soon see (and is seen on the right side of [Figure 17-15](#9781484204160_Ch17.xhtml#Fig15)),
    a Java int (integer) data type supports negative values, so all you have to do
    in your **.scoringEngine()** method is to change **+=** to **-=** for Actor objects
    that you want the game player to avoid. In our development scenario here, we’ll
    use collision with Prop objects to give a negative score.


    Adding Treasure Collision Detection: Updating .scoringEngine()


    Change your Prop Actor objects scoring to reduce the scoreboard value by changing
    the += values to -=1 or -=2, and then add an else-if{} section at the end of the
    existing if-else-if chain, to support Treasure objects, which we will score at
    +=5, to add five points. The Java code to do this, which you can see in [Figure
    17-16](#9781484204160_Ch17.xhtml#Fig16), should look like the following:


    ```

    private void scoringEngine(Actor object)  {

        if(object instanceof Prop)         {

            invinciBagel.gameScore-=1;

            invinciBagel.playiSound0();

        } else if(object instanceof PropV) {

            invinciBagel.gameScore-=2;

            invinciBagel.playiSound1();

        } else if(object instanceof PropH) {

            invinciBagel.gameScore-=1;

            invinciBagel.playiSound2();

        } else if(object instanceof PropB) {

            invinciBagel.gameScore-=2;

            invinciBagel.playiSound3();

        } else if(object instanceof Treasure) {

            invinciBagel.gameScore+=5;

            invinciBagel.playiSound4();       }

        invinciBagel.scoreText.setText(String.valueOf(invinciBagel.gameScore));

    }

    ```


    ![9781484204160_Fig17-16.jpg](OEBPS/Images/9781484204160_Fig17-16.jpg)


    [Figure 17-16](#9781484204160_Ch17.xhtml#_Fig16). Add a Treasure else-if structure
    to end of the .scoringEngine() method conditional if() structure


    You will need to remember to add the Treasure objects to the **castDirector**
    object, as seen in [Figure 17-17](#9781484204160_Ch17.xhtml#Fig17), because the
    collision detection engine uses this **CastingDirector** class (object) to manage
    a collision detection process. If you do not do this step, the InvinciBagel will
    go right over the Treasure objects without seeing (colliding with) them!


    ![9781484204160_Fig17-17.jpg](OEBPS/Images/9781484204160_Fig17-17.jpg)


    [Figure 17-17](#9781484204160_Ch17.xhtml#_Fig17). Add iTR0 and iTR1 Treasure objects
    inside the .addCurrentCast(Actor. . .) method call


    Now that we have added these two Treasure objects to the castDirector CastingDirector
    object, the collision detection programming logic will “see” them, and collisions
    with the Treasure objects will occur, triggering the scoring engine to score the
    game correctly. Test the final code for implementing Treasure in your game, and
    make sure that it works, and then we can move on to adding **adversaries** and
    have them shoot projectiles at the InvinciBagel character.


    Adding Enemies: The Enemy and Projectile Classes'
