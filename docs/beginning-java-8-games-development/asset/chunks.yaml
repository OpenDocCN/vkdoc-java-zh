    对象 iSound0 到 iSound5）匹配起来，如 图 15-20 所示，使用以下 Java 代码：


    ```

    private void playAudioClip()   {

        if(invinciBagel.isLeft())  { invinciBagel.playiSound0(); }

        if(invinciBagel.isRight()) { invinciBagel.playiSound1(); }

        if(invinciBagel.isUp())    { invinciBagel.playiSound2(); }

        if(invinciBagel.isDown())  { invinciBagel.playiSound3(); }

        if(invinciBagel.iswKey())  { invinciBagel.playiSound4(); }

        if(invinciBagel.issKey())  { invinciBagel.playiSound5(); }

    }

    ```


    ![9781484204160_Fig15-20.jpg](img/9781484204160_Fig15-20.jpg)


    图 15-20. 向 .playAudioClip() 方法添加条件 if() 语句，以调用正确的 .playiSound() 方法


    现在，我们已经将数字音频添加到了游戏引擎基础架构中，之后只需将旁白替换为音效，游戏开发的数字音频部分就完成了。如果你使用 **运行 ![image](img/arrow.jpg)
    项目** 工作流程并测试代码，你会发现使用 JavaFX 可以快速触发音频样本。


    总结


    在第十五章中，我们将关注点从游戏的外观（视觉）转向了游戏的声音（听觉），并用一章的时间实现了 AudioClip 类的代码，以便我们能够触发**数字音频音效**。


    首先，我们了解了 JavaFX 的 **AudioClip** 类。我们了解到它为何非常适合在游戏开发中用于音频，包括短音乐循环（使用 **INDEFINITE**
    常量设置）或快速音效。


    接下来，我们学习了如何使用 **Audacity 2.0.6** 优化数字音频资源。我们掌握了优化数字音频的工作流程，使其仅占用十几 KB 的系统内存，以及如何优化音频以至于我们甚至无需应用压缩，特别是因为
    Java 8 支持的音频压缩编解码器是“有损”编解码器，一旦解压缩到系统内存中，可能会降低音频数据的质量。


    最后，我们在 InvinciBagel.java 类中使用 **.loadAudioAssets()** 方法实现了 AudioClip 对象，然后创建了六个
    **.playiSound()** 方法，以允许外部类访问和播放这些数字音频资源。我们还在 Bagel.java 类中添加了一个 **.playAudioClip()**
    方法，该方法根据按下的按键触发音频样本。在下一章中，我们将探讨如何为游戏代码添加**碰撞检测**。


    第 16 章


    ![image](img/frontdot.jpg)


    碰撞检测：为游戏角色创建 SVG 多边形并编写代码检测碰撞


    现在，我们已经为游戏音效和短循环音乐实现了数字音频，并实现了与数字图像相关的类来创建运动精灵（角色）和固定精灵（道具），接下来我们将深入探讨新媒体的另一个主要类型或领域：**矢量**。矢量在
    2D 插画软件（InkScape）以及 3D 建模和动画软件（Blender）中都有应用，它使用数学来定义用于创建 2D 或 3D 图形的形状。这使得矢量成为定义**自定义碰撞形状**的完美解决方案，这些形状能够完美地包裹我们的精灵，这样我们就不必使用复杂的像素阵列来检测碰撞，而是使用一个更简单（且内存和处理器效率高得多）的**碰撞多边形**，它将完美地包围我们的精灵。

