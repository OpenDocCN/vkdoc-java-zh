    on the screen, telling him to mount his attack, which I will name **callAttack**.
    We will also need **integer** variables to hold the current Enemy sprite right
    and left side X location, named **spriteMoveR** and **spriteMoveL**, and a **destination**
    variable that holds where we want the Enemy to stop and fire his Projectile objects.
