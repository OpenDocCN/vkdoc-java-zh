- fmt: '# The NetBeans Profiler


    The `NetBeans Profiler` is something that you learn how to use over time, first
    through experimentation and then, as you become familiar with what `Profiler`
    can do, by using it with your own projects as they become increasingly complex
    and observing what your code base does regarding threads, CPU usage, and memory
    allocation and usage. `NetBeans Profiler` is a powerful and useful tool that is
    going to serve as the code development foundation for your Java 8 game development.
    I included it in this chapter to give you a solid overview, as this knowledge
    base will help you leverage the software, using it to its fullest potential and
    capabilities.


    Clearly, this is an advanced IDE and software development tool that cannot be
    covered in one short chapter (maybe in a book; however, this is not a NetBeans
    8.0 games development title), so you will be learning more about what `NetBeans
    8.0` can do for you in just about all the chapters in this book, as `NetBeans
    8.0` and `Java 8` (and `JavaFX 8`) are inexorably intertwined.


    ## Summary


    In this second chapter, you learned about `NetBeans IDE 8.0`, which will serve
    as the foundation and primary tool for your Java 8 game development work process.
    This IDE is where your Java 8 (and `JavaFX 8`) code is written, compiled, run,
    tested, and debugged as well as where your new media (image, audio, video, 3D,
    font, shape, and so on) assets are stored and referenced, using your `NetBeansProject`
    folder and its subfolders.


    You started by taking a look at `NetBeans 8.0` and the high-level features that
    make it the official IDE for Java 8 and that help programmers develop code quickly,
    efficiently, and effectively (i.e., make code that is bug free) the first time.
    After this overview, you created your Java 8 game project, using as a model a
    real-world game project that I am working on for a major client.


    You went through the `New Java Application` series of dialogs and created a `JavaFX`
    framework for your game, which will allow you to use new media assets, such as
    images, audio, video, and 3D. Then, you explored how to compile and run an application,
    using `NetBeans 8.0`. You also studied the `Output` tab and how that is used for
    compiler output, runtime output, and profiling output, which you considered next.


    You examined both CPU profiling and memory profiling in `NetBeans 8.0`; learned
    how to set up and start up the `Profile Project` tool; and studied some of the
    output, statistics, and visual reports that the `NetBeans Profiler` can create
    for you, based on your Java 8 game project.


    In the next chapter, I will present an overview of the Java 8 programming language
    to make sure that you are up to speed on how Java 8 works; a Java primer chapter,
    if you will.


    ## CHAPTER 3


    ![image](OEBPS/Images/frontdot.jpg)


    # A Java 8 Primer: An Introduction to Java 8 Concepts and Principles


    Let’s build on the knowledge you gained about `NetBeans IDE 8.0` in the previous
    chapter by exploring the basic concepts and principles behind the Java 8 programming
    language. `Java JDK 8` will be the foundation for your Java 8 games, as well as
    for your `NetBeans IDE 8.0`, so it is important that you take the time to study
    this chapter, a Java 8 “primer” that gives you an overview of this internationally
    popular computer (and device) programming language.


    You will of course learn about more advanced concepts, such as Lambda Expressions,
    and about other Java 8 components, such as the recent `JavaFX` multimedia engine,
    as you progress through the book, so be aware that this chapter will cover the
    most foundational Java programming language concepts, techniques, and principles,
    spanning the three major versions of Java SE currently in widespread use today,
    on computers, iTVs, and handheld devices.


    These versions of Java, used by billions of users, include Java 6, which is used
    in the 32-bit Android 4.x OS and applications; Java 7, which is used in the 64-bit
    Android 5.x OS and applications; and Java 8, which is used across many popular
    OSs, such as Microsoft Windows, Apple OS X, Oracle Solaris, and a plethora of
    popular Linux “distros,” or distributions (custom Linux OS versions, such as SUSE,
    Ubuntu, Mint, Mandrake, Fedora, and Debian).


    You will start with the easiest concepts, the highest level of Java, and progress
    to the more difficult ones, the guts of the Java programming constructs. You will
    begin with a study of Java syntax, or lingo, including what Java keywords are,
    how Java delimits its programming constructs, and how to comment your code. Examining
    this first will give you a head start at being able to read Java code, as it is
    important to be able to discern the Java code from the commentary regarding that
    code (which is usually written by the author of the Java code using comments).


    Then, you will consider the top-level concept of APIs, as well as what a package
    is, and how you can import and use the preexisting code that is provided by Java
    packages. These Java packages are a part of the Java 8 API, and it is important
    to note that you can create custom Java packages of your own, containing your
    games or applications.


    After that, you will consider the constructs that are held inside of these Java
    packages, which are called Java classes. Java classes are the foundation of Java
    programming, and can be used to build your applications (in this case, your Java
    8 games). You will learn about the methods, variables, and constants that these
    classes contain, as well as what superclasses and subclasses are, and what nested
    classes and inner classes are, and how to utilize them.


    Finally, you will discover what Java objects are, and learn how they form the
    foundation of Object Oriented Programming (OOP). You will also come to know what
    a constructor method is, and how it creates the Java object, by using a special
    kind of method called a constructor method that has the same name as the class
    that it is contained in. Let’s get started—we have a lot of ground to cover!


    ## The Syntax of Java: Comments and Code Delimiters


    There are a couple of things regarding syntax, meaning how Java writes things
    in its programming language, that you need to consider right off of the bat. These
    primary syntax rules are there to allow the Java compiler to understand how you
    are structuring your Java code. Java compilation is the part of the Java programming
    process, in which the JDK compiler (program) turns your Java code into bytecode
    that is executed or run by a Java Runtime Engine (JRE). This JRE, in this case
    it is `JRE 8`, is installed on your end user’s computer system. The Java compiler
    needs to know where your Java code blocks begin and end, where your individual
    Java programming statements or instructions begin and end within those Java code
    blocks, and which parts of your code are Java programming logic, and which parts
    are comments to yourself, or comments (notes) to other members of your game project
    programming team.


    Let’s start with comments, as this topic is the easiest to grasp, and you have
    already seen comments in your `InvinciBagel` game bootstrap Java code, in [Chapter
    2](#9781484204160_Ch02.xhtml). There are two ways to add comments into Java code:
    single-line, also referred to as “in-line,” comments, which are placed after a
    line of Java code logic, and multiple-line, or “block,” comments, which are placed
    before (or after) a line of Java code or a block of Java code (a Java code structure).'
