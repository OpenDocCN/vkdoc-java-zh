- fmt: '# Java Primitive Data Types


    There are **eight** **primitive data types** in the Java programming language,
    as shown in [Table 3-1](#9781484204160_Ch03.xhtml#Tab1). You will be using these
    as you work your way through the book to create your InvinciBagel game, so I am
    not going to go into detail regarding each one of them now, except to say that
    Java `boolean` data variables are used for flags or switches (on/off), `char`
    is used for Unicode characters or to create `String` objects (an array of `char`),
    and the rest are used to hold numeric values of different sizes and resolutions.
    Integer values hold whole numbers, whereas a floating point value holds fractional
    (decimal point value) numbers. It is important to use the right numeric data type
    for a variable’s scope, or range, of use, because, as you can see in Binary Size
    column in [Table 3-1](#9781484204160_Ch03.xhtml#Tab1), large numeric data types
    can use up to eight times more memory than the smaller ones.


    [Table 3-1](#9781484204160_Ch03.xhtml#_Tab1). Java Primitive Data Types, Along
    with Their Default Values, Size in Memory, Definition, and Numeric Range


    ![Table3-1](OEBPS/Images/Table3-1.jpg)


    ## Reference Data Types: Objects and Arrays


    (OOP languages also have **reference data types**, which provide a reference in
    memory to another structure containing a more complex data structure, such as
    an **object** or an **array**. These more complex data structures are created
    using code; in the case of Java, this is a class. There are Java **Array** classes
    of various types that create arrays of data (such as simple databases) as well
    as the constructor method in a Java class, which can create the object structure
    in memory, containing both Java code (methods) and data (fields).


    ## Java Operators: Manipulating Data in the Application


    In this section, you will learn about some of the most commonly used **operators**
    in the Java programming language, especially those that are the most useful for
    programming games. These include **arithmetic** operators, used for mathematical
    expressions; **relational** operators, used to ascertain relationships (equal,
    not equal, greater than, less than, and so on) between data values; **logical**
    operators, used for boolean logic; **assignment** operators, which do the arithmetic
    operations and assign the value to another variable in one compact operation (operator);
    and the **conditional operator**, also called a ternary operator, which assigns
    a value to a variable, based on the outcome of a true or false (boolean) evaluation.


    There are also the conceptually more advanced **bitwise** operators, used to perform
    operations at the **binary** data (**zeroes and ones**) level, the logic of which
    is beyond the beginner scope of this book and the use of which is not as common
    in Java game programming as these other, more mainstream types of operators, each
    of which you will be using over the course of this book to accomplish various
    programming objectives in your game play logic.


    ### Java Arithmetic Operators


    The Java **arithmetic operators** are the most commonly used in programming, especially
    in arcade type games, in which things are moving on the screen by a discrete number
    of pixels. Many more complex equations can be created using these basic arithmetic
    operators, as you have already learned in math class, from primary school through
    college.


    The only arithmetic operators shown in [Table 3-2](#9781484204160_Ch03.xhtml#Tab2)
    that you may not be that familiar with are the **modulus** operator, which will
    return the remainder (what is left over) after a divide operation is completed,
    and the **increment** and **decrement** operators, which add or subtract 1, respectively,
    from a value. These are used to implement your **counter** logic. Counters (using
    increment and decrement operators) were originally used for loops, (which I will
    be covering in the next section); however, these increment and decrement operators
    are also extremely useful for game programming (point scoring, **life span** loss,
    game piece movement, and similar progressions).


    [Table 3-2](#9781484204160_Ch03.xhtml#_Tab2). Java Arithmetic Operators, Their
    Operation Type, and a Description of the Arithmetic Operation


    | Operator | Operation | Description |

    | --- | --- | --- |

    | Plus `+` | Addition | Adds the operands on either side of the operator |

    | Minus `–` | Subtraction | Subtracts the right-hand operand from the left-hand
    operand |

    | Multiply `*` | Multiplication | Multiplies the operands on either side of the
    operator |

    | Divide `/` | Division | Divides the left-hand operand by the right-hand operand
    |

    | Modulus `%` | Remainder | Divides the left-hand operand by the right hand-operand,
    returning remainder |

    | Increment `++` | Add 1 | Increases the value of the operand by 1 |

    | Decrement `--` | Subtract 1 | Decreases the value of the operand by 1 |


    To implement the arithmetic operators, place the data field (variable) that you
    want to receive the results of the arithmetic operation on the **left side** of
    the **equals assignment operator** and the variables that you want to perform
    arithmetic operations on the right side of the equals sign. Here is an example
    of **adding** an `x` and a `y` variable and assigning the result to a `z` variable:


    ```

    Z = X + Y;   // Using an Addition Operator

    ```


    If you want to **subtract** `y` from `x`, you use a **minus** sign rather than
    a plus sign; if you want to **multiply** the `x` and `y` values, you use an **asterisk**
    rather than a plus sign; and if you want to **divide** `x` by `y`, you use a **forward
    slash** instead of a plus sign. Here is how those operations look:


    ```

    Z = X - Y;    // Subtraction Operator

    Z = X * Y;   //  Multiplication Operator

    Z = X / Y;  //   Division Operator

    ```


    You will be using these arithmetic operators quite a bit, so you will get some
    great practice with these before you are finished with this book! Let’s take a
    closer look at relational operators next, as sometimes you will want to compare
    values rather than calculate them.


    ### Java Relational Operators


    The Java **relational operators** are used to make **logical comparisons** between
    two variables or between a variable and a constant, in some circumstances. These
    should be familiar to you from school and include equals**,** not equal**,** greater
    than**,** less than**,** greater than or equal to**, and** less than or equal
    to. In Java, equal to uses two equals signs side by side between the data fields
    being compared and an exclamation point before an equals sign to denote “**not
    equal to**.” [Table 3-3](#9781484204160_Ch03.xhtml#Tab3) shows the relational
    operators, along with an example and a description of each.


    [Table 3-3](#9781484204160_Ch03.xhtml#_Tab3). Java Relational Operators, an Example
    in Which A = 25 and B = 50, and a Description of the Relational Operation'
