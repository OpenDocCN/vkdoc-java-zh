    **this** 关键字。你新修订的 Java 语句应类似于以下代码，该代码也在图 12-5 中高亮显示：


    ```

    iBagel = new Bagel(this, "M150 0 L75 200 L225 200 Z", 0,0, iB0,iB1,iB2,iB3,iB4,iB5,iB6,iB7,iB8);

    ```


    ![9781484204160_Fig12-05.jpg](img/9781484204160_Fig12-05.jpg)


