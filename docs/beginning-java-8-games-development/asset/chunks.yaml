  trans: '

    图 8-5. 创建一个构造器方法，用于设置固定的 Actor 精灵子类，包含碰撞形状、图像列表和位置。


    接下来，我们来编写该类的另一个关键方法，即抽象的 **.update()** 方法，然后添加 Actor 类固定精灵属性中我们需要的其余部分。之后，我们可以在
    Actor() 构造器方法内部初始化额外的变量。最后，我们将学习如何为 Actor 类创建“getter 和 setter”方法，然后再使用这个新的自定义
    Actor 超类来创建我们的另一个 Hero 运动精灵子类。


    创建 .update() 方法：连接到 GamePlayLoop 引擎


    对于任何精灵类而言，除了将其“诞生”的构造器方法之外，最重要的方法就是 **.update()** 方法。.update() 方法将包含 Java 8 代码，用于告诉精灵在
    GamePlayLoop 的每次脉冲时该做什么。因此，这个 .update() 方法将用于将使用我们的 Actor 超类和 Hero 子类创建的 Actor
    精灵子类“连接”到我们在第 7 章中创建的 GamePlayLoop 计时引擎。


    由于我们需要在每个 Actor 对象（actor 精灵）中都包含一个 .update() 方法，因此我们需要在我们当前正在编写的 Actor 超类中包含一个“空的”（目前）抽象
    .update() 方法。


    正如你在第 3 章中学到的，这个公共抽象方法在 Actor 超类中是留空的，或者更准确地说，是**未实现的**，但它需要在任何 Actor 子类中（包括我们稍后将编写的
    Hero 子类）被实现（或者，也可以再次声明为抽象方法）。


    该方法被声明为 **public abstract void**，因为它不返回任何值（它只是在每个 JavaFX 脉冲事件上执行），并且不包含 {...}
    花括号，因为它（目前）内部没有任何代码体！声明这个公共抽象（空或未实现）方法的单行代码应如下所示：


    ```

    public abstract void update();

    ```


    正如你在图 8-6 中所见，这个方法实现起来非常简单，一旦你将这个新方法添加到你的 Actor() 构造器方法下方，你的 Java 8 代码将再次没有错误，并且你可以准备添加更多代码。


    ![9781484204160_Fig08-06.jpg](img/9781484204160_Fig08-06.jpg)


    图 8-6. 添加一个 Arrays 导入语句以支持构造器方法；添加一个公共抽象 .update() 方法


    接下来，我们将为固定精灵 Actor 超类添加其余属性（或变量），这要求我们提前思考，在创建这个游戏的过程中，我们希望用精灵实现什么。


    向 Actor 类添加精灵控制和定义变量


    从编码角度来看，过程的下一步很简单，因为我们将在 Actor 类的顶部声明一些更多的变量。然而，从设计角度来看，这更困难，因为它要求我们尽可能提前思考，并推测我们的精灵角色（包括固定精灵和运动精灵）需要哪些变量数据，以便在构建这个游戏期间以及游戏过程中能够完成我们想要的一切。


    在 iX 和 iY 变量之后，我要声明的第一个额外变量是 **pX** 和 **pY** 枢轴点变量。我最初将这些变量放在了 Hero 子类中（我们将在完成这个
    Actor 超类的创建后立即创建它）。我将它们“上移”到 Actor 超类级别的原因是我希望拥有旋转固定精灵（宝藏和障碍物）以及运动精灵的灵活性。这为我在关卡和场景设计方面提供了更多的能力和灵活性。这些枢轴点
    X 和 Y 变量将被声明为 **protected double** 数据变量，并使用以下两行 Java 代码完成：


    ```

    protected double pX;

    protected double pY;

    ```


    接下来，我们需要向我们的 Actor 类（对象）定义中添加一些布尔“**标志**”。这些标志将指示所讨论的精灵对象的某些状态，例如它是**活的**（对于固定精灵，这始终为
    false）还是**死的**，或者它是**固定的**（对于固定精灵，这始终为 true，对于不在运动中的运动精灵也为 true）还是**移动的**，或者是**奖励**对象，表示捕获（碰撞）它们可获得额外分数（或生命值），或者是**有价值的**，表示获取（碰撞）它们可获得额外能力（或生命值）。最后，我定义了一个**水平翻转**和**垂直翻转**标志，这使我在（固定或运动）精灵图像资源方面的灵活性比没有这些标志时提高了四倍。


    由于 JavaFX 可以在 X 或 Y 轴上翻转或镜像图像，这意味着我可以使用 FlipV 反转精灵方向（左或右），或使用 FlipH 反转精灵朝向（上或下）。


    这六个额外的布尔标志固定（Actor）精灵属性将使用 **protected boolean** 数据变量声明，使用以下六行 Java 8 代码，如图 8-7
    所示（且没有错误）：


    ```

    protected boolean isAlive;

    protected boolean isFixed;

    protected boolean isBonus;

    protected boolean hasValu;

    protected boolean isFlipV;

    protected boolean isFlipH;

    ```


    ![9781484204160_Fig08-07.jpg](img/9781484204160_Fig08-07.jpg)


    图 8-7. 添加支持旋转（枢轴点）和精灵定义状态所需的其余变量


    接下来，我们将在 Actor() 构造器方法内部初始化这些变量。如果你想通过参数列表将设置传递给 Actor() 构造器方法中的任何这些布尔标志，请记住，你可以创建任意数量的**重载**构造器方法格式，只要每个构造器方法的参数列表是
    100% 唯一的。我们可能会在本书后面这样做，例如，如果我们需要一个用于布局设计目的而旋转固定精灵的构造器方法，或者一个用于相同目的而围绕给定轴翻转精灵的构造器方法，或者一个同时执行这两项操作的构造器方法，这将为我们提供一个九参数的
    Actor() 构造器方法调用。


    在 Actor 构造器方法中初始化精灵控制和定义变量


