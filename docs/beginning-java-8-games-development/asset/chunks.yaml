    Looping Control Structures: While, Do-While, and For


    Whereas the decision tree type of control structure is traversed a fixed number
    of times (once all the way through, unless a break [switch-case] or resolved expression
    [if-else] is encountered), **looping** control structures keep executing over
    time, which, with respect to the **while** and **do-while** structures, makes
    them a bit dangerous, as an **infinite loop** can be generated, if you are not
    careful with your programming logic! The **for** loop structure executes for a
    **finite number** of loops (the number is specified in the definition of the for
    loop), as you will soon see in this section.


    Let’s start with the finite loop, covering the for loop first. A Java for loop
    uses the following general format:


    ```

    for(initialization; boolean expression; update equation) {

        programming statement one;

        programming statement two;

    }

    ```


    As you can see, the three parts of the evaluation area of the for loop are inside
    the parentheses, separated by semicolons, as each contains a programming statement.
    The first is a variable declaration and initialization, the second is a boolean
    expression evaluation, and the third is an update equation showing how to increment
    the loop during each pass.


    To move the InvinciBagel 40 pixels **diagonally** on the screen, along both X
    and Y, the for loop is as follows:


    ```

    for(int x=0; x < 40; x = x + 1) {   // Note: an x = x + 1 statement could also
    be coded as x++

        invinciBagelX++;  // Note: invinciBagelX++ could be coded invinciBagelX = invinciBagelX
    + 1;

        invinciBagelY++;  // Note: invinciBagelY++ could be coded invinciBagelY = invinciBagelY
    + 1;

    }

    ```


    In contrast, the while (or do-while) type of loop does not execute over a finite
    number of processing cycles, but rather executes the statements inside the loop
    until a condition is met, using the following structure:


    ```

    while(boolean expression) {

        programming statement one;

        programming statement two;

    }

    ```


    To code the for loop to move the InvinciBagel 40 pixels, using a while loop structure,
    looks like this:


    ```

    int x = 0;

    while(x < 40) {

        invinciBagelX++;

        invinciBagelY++;

        x++

    }

    ```


    The only difference between a do-while loop and a while loop is that, with the
    latter, the loop logic programming statements are performed **before**, instead
    of after, the evaluation. Thus, using a **do-while** loop programming structure,
    the previous example would be written as follows:


    ```

    int x = 0;

    do {

        invinciBagelX++;

        invinciBagelY++;

        x++

    } while(x < 40);

    ```


    As you can see, the Java programming logic structure is inside curly braces, following
    the Java **do** keyword, with the **while** statement **after** the closing brace.
    Note that the while evaluation statement (and therefore the entire construct)
    must be terminated with a **semicolon**.


    If you want to make sure that the programming logic inside the while loop structure
    is performed at least one time, use the **do-while**, as the evaluation is performed
    **after** the loop logic is executed. If you want to make sure that the logic
    inside the loop is only executed after (whenever) the evaluation is successful,
    which is the safer way to code things, use the while loop structure.


    Java Objects: Virtual Reality, Using Java Constructs


    I saved the best, Java objects, for last, because they can be constructed in one
    fashion or another using all the concepts that I have covered thus far in the
    chapter and because they are the foundation of OOP language (in this case, Java
    8). The fact is, everything in the Java 8 programming language is based on Java’s
    Object superclass (I like to call it the masterclass), which is in the **java.lang**
    package, so an import statement for it would reference java.lang.Object, the full
    pathname for the Java Object class.


    Java objects are used to “virtualize” reality by allowing the objects you see
    all around you in everyday life, or, in the case of your game, objects you are
    creating out from your imagination, to be realistically simulated. This is done
    by using the data fields (variables and constants) and the methods that you have
    been learning about in this chapter. These Java programming constructs will make
    up the object **characteristics**, or **attributes** (constants); **states** (variables);
    and **behaviors** (methods). The Java class construct organizes each object definition
    (constants, variables, and methods) and gives birth to an instance of that object,
    using the constructor method for the class that designs and defines the object
    via the various Java keywords and constructs.


    Creating an InvinciBagel Object: Attributes, States, and Behavior


    Let’s put together an example of an InvinciBagel object that shows how constants
    define characteristics, variables define states, and methods define behaviors.
    We will do this using Java coding constructs that you have learned about thus
    far in the chapter, including constants, variables, and methods that you have
    already defined, to some extent.'
