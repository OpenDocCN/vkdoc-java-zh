    因此，我们将这段包含“left”一词的音频文件的内存需求从九分之一兆字节（112KB）降低到了三十六分之一兆字节（28KB）。这意味着你可以拥有 **36**
    个这种大小的音频资源，而仍然只占用一兆字节的系统内存！在我创建其他五个音频资源时，这个文件是最大的，而最小的（你可能已经猜到是“up”和“s”）每个都不到
    4KB！


    我们数字音频优化工作流程的最后一步是将这些数据从**立体声**文件转换为**单声道**文件。我们这样做是因为对于游戏音频资源来说，我们不需要同一段语音的两个副本。对于大多数游戏音频特效，例如激光爆炸和爆炸声，也是如此；在这些类型的音效场景中，单声道音频完全够用。这一点尤其重要，因为
    JavaFX 的 `AudioClip` 类及其声像和平衡功能，也允许我们在需要时，使用单声道数字音频资源来模拟立体声效果。


    这还将使我们的数据占用空间再减少 100%，从而得到一个 14KB 的音频文件。我们可以将 **72** 个这种大小的数字单声道音频资源放入一兆字节的系统内存中。因此，只要可能，使用单声道音频资源而不是立体声数字音频资源是一件非常好的事情，这也是我们接下来要讨论的内容。


    立体声与单声道音频：将内存占用再减少 100%


    我们数字音频优化工作流程的最后一步是将我们的数字音频数据从使用立体声音频资源转换为使用单声道音频资源。我们这样做是因为在这种情况下，我们不需要为游戏音频资源提供同一段语音的两个副本。对于大多数与游戏相关的数字音频特效，例如激光爆炸和爆炸声，也是如此。在这些类型的音效场景中，单声道音频的效果与立体声音频一样好。这一点尤其重要，因为
    JavaFX 的 `AudioClip` 类为开发者提供了音频声像和平衡功能。这些功能允许开发者使用单声道音频资源来模拟立体声效果。Audacity 能够将立体声音频资源（两个音轨，一个左声道，一个右声道）的数据**合并**成一个听起来相同的单声道音频资源。


    如果我们使用 Audacity 的 **音轨 ![image](img/arrow.jpg) 立体声转单声道**算法（如图 15-8 中的菜单序列所示）将两个立体声音轨合并成一个单声道音轨，这将使数字音频数据占用空间再减少
    100%，从而得到一个 14KB 的音频文件。我们可以将 72 个这种大小的数字音频资源放入一兆字节的系统内存中。实际上，通过使用我在本章这一部分展示的（未压缩的）数字音频数据占用空间优化方法，我已经成功地将所有六个数字音频资源的内存占用控制在了
    62KB 以下。


