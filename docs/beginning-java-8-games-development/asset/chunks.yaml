    JavaFX 应用程序，这意味着你很快就能使用 **IntelliJ** 将 Java（及 JavaFX 引擎）应用程序直接导出到 Android 5.0，或使用
    NetBeans 8.0 导出到 Chrome OS。借助 Java 8 和 JavaFX 8.0 这对动态组合，你最终将能够实现“一次编写，到处运行”！Oracle
    最近发布了 Java 8 SE Embedded、Java 8 ME 和 Java 8 ME Embedded 版本，所有这些版本都支持 JavaFX。


    ![Image](img/sq.jpg) **注意**  **JetBrains IntelliJ IDEA** 现已成为创建 64 位 Android 5.0
    应用程序的官方 IDE。我的著作 *Android Apps for Absolute Beginners, 3rd Edition*（Apress，2014）中详细介绍了此
    IDE，该书涵盖了使用 Eclipse IDE 和 Java 6 开发 32 位 Android 4.0 应用程序，以及使用 IntelliJ IDEA 和
    Java 7 开发 64 位 Android 5.0 应用程序。


    让我们从图表的顶部开始，看看 JavaFX 场景图和 **javafx.scene** 包，该包在 JavaFX API 中实现了场景图（你将在下一章了解
    Scene Builder）。


    JavaFX 场景包：16 个核心 Java 8 类


    在高层概述之后，我想做的第一件事是介绍最重要的 JavaFX 包之一：**javafx.scene** 包。在第 2 章和第 3 章中，你发现 JavaFX
    包不止一个。正如你在第 3 章（参见图 3-1）中所见，InvinciBagel 游戏应用程序使用了四个不同的 JavaFX 包。javafx.scene
    包包含 **16** 个强大的 Java 8 类（请记住，JavaFX 是用 Java 8 重新编码的），包括 **Camera**、**ParallelCamera**
    和 **PerspectiveCamera**、**Cursor** 和 **ImageCursor**、**LightBase**、**PointLight**
    和 **AmbientLight** 类；***场景图类***（**Node**、**Parent**、**Group** 和 **SubScene**）；以及一些实用工具类（参见图
    4-2）。


    ![9781484204160_Fig04-02.jpg](img/9781484204160_Fig04-02.jpg)


    图 4-2. javafx.scene 包及其 16 个核心场景图、场景实用工具、光照、相机和光标类


    我按逻辑对这些 javafx.scene 包中的 16 个类进行了分组。Scene 类位于图表的场景图部分，因为使用 Scene 类创建的 Scene 对象包含使用这四个场景图相关类（Node、Parent、Group、SubScene）及其子类创建的场景图对象。我将在本章后面详细介绍场景图类（参见“JavaFX
    场景图：使用父节点组织场景”一节）。


    JavaFX 中的场景图架构类从最高层开始，包括 **Node** 超类及其 **Parent** 类，以及 **Group** 和 **SubScene**
    类，它们是 Parent 类的子类。这些核心类用于创建 JavaFX 场景图层次结构，并组织和分组使用 JavaFX 包中其他 JavaFX 类创建的对象。


    有三个场景实用工具类（我这样称呼它们），它们允许你随时对场景或其任何场景图节点进行快照（类似于屏幕截图），以及在场景中使用 3D 图元时打开或关闭 SceneAntialiasing。javafx.scene
    包中的另一半（八个）类用于场景光照、场景相机和场景的光标控制。我将在本章后面讨论这些类（参见“JavaFx 场景内容：灯光、相机、光标，开拍！”一节），在此之前，你将先了解场景图类，这些类用于创建、分组、管理和操作你的
    JavaFX 场景内容。因此，我将按照图中从左到右的顺序，根据你最可能使用它们的顺序（从最不常用到最常用）来介绍 javafx.scene 包中的类。


    JavaFX Scene 类：场景大小、颜色和场景图节点


    javafx.scene 包中的两个主要类是 **Scene** 类和 **Node** 类。我将在下一节介绍 Node 类及其 **Parent**、**Group**
    和 **SubScene** 子类，因为这些类及其子类（例如 InvinciBagel 类中使用的 StackPane 类）用于在 JavaFX 中实现场景图架构。此外，从某种意义上说（以及在我的图表中），Node
    类及其子类可以被视为位于 Scene 类之下，尽管 Node 类不是 Scene 类的子类。实际上，Node（场景图）类及其子类，或者更确切地说，使用这些类创建的对象，是包含在
    Scene 对象**内部**的。


    因此，你将首先考虑如何使用 Scene 类及其 Scene() 构造方法来为 JavaFX 应用程序创建 Scene 对象。本节将巩固你在第 3 章中学到的关于重载构造方法的知识，因为需要有几种不同的方式来创建
    Scene 对象。


    Scene 类用于使用 **Scene()** 构造类创建 Scene 对象，该构造方法接受一到五个参数，具体取决于你选择使用**六个**（重载的）构造方法中的哪一个。这些构造方法及其六种不同（因此是重载的）参数列表数据字段配置如下：


    ```

    Scene(Parent root)

    Scene(Parent root, double width, double height)

    Scene(Parent root, double width, double height, boolean depthBuffer)

    Scene(Parent root, double width, double height, boolean depthBuffer, SceneAntialiasing
    aAlias)

    Scene(Parent root, double width, double height, Paint fill)

    Scene(Parent root, Paint fill)

    ```


    当前在你的引导 Java 和 JavaFX 代码中使用的构造方法是第二个，调用方式如下：


    ```

    Scene scene = new Scene(root, 300, 250);

    ```

