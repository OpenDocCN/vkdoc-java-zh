- fmt: "# Java 类与嵌套类\n\nJava 类的一个强大特性是，它们可用于**模块化**您的 Java 游戏代码，使您的核心游戏应用功能成为高层类的一部分，而该高层类可以被**子类化**以创建更专门的版本。一旦一个类被子类化，它在\
    \ Java 类层次结构中就成为**超类**。一个类总是使用 Java `extends` 关键字来子类化一个超类。如果一个类没有以这种方式扩展给定的超类，那么它会自动扩展\
    \ Java 主类 `java.lang.Object`。这样做的目的是，Java 中的每个类都可以通过实现构造器方法来创建对象。\n\n使用 Java `extends`\
    \ 关键字告诉编译器，您希望将超类的功能和特性添加（扩展）到您的类中，而一旦该类使用了 `extends` 关键字，它就变成了子类。子类扩展了超类提供的核心功能。要将您的类定义扩展为包含超类，您需要将以下格式添加到现有的类声明中：\n\
    \n```\n<modifier keywords> class <your custom classname> extends <superclass>\n\
    ```\n\n当您用您的类扩展一个超类（此时您的类成为该超类的子类）时，您可以在子类中使用超类的所有特性（嵌套类、内部类、方法、变量、常量），而无需在类的**主体**中显式编写（编码）它们，否则会造成冗余（且混乱）。\n\
    \n![Image](OEBPS/Images/sq.jpg) **注意**：如果您正在扩展（或者，如果您更喜欢，子类化）的超类中的任何数据字段或方法已使用\
    \ `private` 访问控制关键字声明，那么这些变量（或常量）和方法仅供该超类内部使用，因此您的子类将无法访问它们。同样的规则适用于嵌套类和内部类；这些类结构不能使用在包含它们（或者，如果您愿意，位于它们之上）的\
    \ Java 构造中声明为 `private` 的任何代码。\n\n类的主体是在类声明（本例中为您的类**以及 `javafx.application.Application`\
    \ 超类**）之后的花括号（参见[图 3-2](#9781484204160_Ch03.xhtml#Fig2)，最外层的红色框）内编写的。这就是为什么您首先学习了\
    \ Java 语法，然后在此基础上构建类声明和包含类定义（变量、常量、方法、构造器、嵌套类）构造的 Java 语法。\n\n如图中所示，`InvinciBagel`\
    \ 类扩展了来自 JavaFX 包的 `Application` 超类。您当前超类到子类层次结构的继承图（我将在本书中使用的工具，用于向您展示在整体 Java\
    \ 和 JavaFX API 模式中事物的来源）如下所示：\n\n```\n> java.lang.Object\n  > javafx.application.Application\n\
    \    > invincibagel.InvinciBagel\n```\n\n通过扩展 `javafx.application` 包及其 `Application`\
    \ 类，您将为 `InvinciBagel` 类提供托管（或运行）JavaFX 应用程序所需的一切。JavaFX `Application` 类“构造”一个\
    \ `Application` 对象，以便它可以使用系统内存；调用 `.init()` 方法来初始化任何可能需要初始化的内容；并调用 `.start()`\
    \ 方法（参见[图 3-2](#9781484204160_Ch03.xhtml#Fig2)，第二外层的红色框），该方法将最终启动（启动）`InvinciBagel`\
    \ Java 8 游戏应用程序所需的一切准备就绪。\n\n当最终用户完成使用 `InvinciBagel` 游戏应用程序时，由 `Application`\
    \ 类使用 `Application()` 构造器方法创建的 `Application` 对象将调用其 `.stop()` 方法，并将您的应用程序从系统内存中移除，从而为您的最终用户的其他用途释放该内存空间。您很快将学习\
    \ Java 8 方法、构造器和对象，因为您正在从高层包和类构造逐步深入到较低层的方法和对象构造，因此您正在从高层概览向下移动到较低层。您可能想知道 Java\
    \ 类是否可以**嵌套**在彼此内部，即 Java 类是否包含其他 Java 类。答案是肯定的，它们当然可以（也确实如此）！接下来让我们看看 Java 嵌套类的概念。\n\
    \n## 嵌套类：生活在其他类内部的 Java 类\n\nJava 中的**嵌套类**是定义在另一个 Java 类内部的类。嵌套类是其所在类的一部分，这种嵌套表示这两个类旨在以某种方式一起使用。有两种类型的嵌套类：**静态嵌套类**，通常简称为嵌套类；以及**非静态嵌套类**，通常称为**内部类**。\n\
    \n静态嵌套类（我将简称为嵌套类）用于创建与包含它们的类一起使用的实用程序，有时仅用于保存与该类一起使用的常量。那些开发 Android 应用程序的人对嵌套类非常熟悉，因为它们在\
    \ Android API 中非常常用，用于保存实用方法或 Android 常量，这些常量用于定义诸如屏幕密度设置、动画运动插值曲线类型、对齐常量和用户界面元素缩放设置等内容。如果您想理解\
    \ `static` 的概念，可以将其视为固定的，或不可更改的。照片是静态图像，而视频则不是静态的。我们将在本书中经常探讨这个概念。\n\n嵌套类使用 Java\
    \ 中通常称为**点表示法**的方式来引用嵌套类“从属于”其主类或父类（包含类）。例如，`MasterClass.NestedClass` 将是用于通过其主类（包含类）名称引用嵌套类的引用格式，这里使用了泛型类类型名称。如果您创建了一个\
    \ `InvinciBagel.SplashScreen` 嵌套类来为您的 Java 游戏绘制**启动画面**，那么在您的 Java 代码中，它将使用这种\
    \ Java 8 **点表示法**语法被引用为 `InvinciBagel.SplashScreen`。\n\n让我们以 JavaFX `Application`\
    \ 类为例，它包含一个 `Parameters` 嵌套类。这个嵌套类**封装**（或包含）您可以为 JavaFX 应用程序设置的参数。因此，这个 `Application.Parameters`\
    \ 嵌套类将与您的 `Application` 类属于同一个 `javafx.application` 包，如果您使用 `import` 语句，它将被引用为\
    \ `javafx.application.Application.Parameters`。\n\n类似地，构造器方法将被写为 `Application.Parameters()`，因为构造器方法必须与其所在类的命名模式完全相同。除非您正在为其他开发人员编写代码（这是嵌套类最常用的场景，例如\
    \ JavaFX `Application` 类或您将在 Android 操作系统中找到的许多嵌套实用程序或常量提供类），否则您更有可能使用非静态嵌套类（通常称为\
    \ Java **内部类**）。"
  raw: 'One of the powerful features of Java classes is that they can be used to **modularize**
    your Java game code so that your core game application features can be a part
    of a high-level class that can be **subclassed** to create more specialized versions
    of that class. Once a class has been subclassed, it becomes a **superclass**,
    in Java class hierarchy terminology. A class will always subclass a superclass
    using a Java **extends** keyword. If a class does not extend a given superclass
    in this way, then it automatically extends the Java masterclass: **java.lang.Object**.
    This is so that every class in Java can create an object by implementing a constructor
    method.


    Using a Java **extends** keyword tells the compiler that you want the superclass’s
    capabilities and functionality added (extended) to your class, which, once it
    uses this extends keyword, becomes a subclass. A subclass extends the core functionality
    that is provided by the superclass. To extend your class definition to include
    a superclass, you add to (or **extend**, no pun intended) your existing class
    declaration, using the following format:


    ```

    <modifier keywords> class <your custom classname> extends <superclass>

    ```


    When you extend a superclass with your class, which is now a subclass of that
    superclass, you can use all the superclass’s features (nested classes, inner classes,
    methods, variables, constants) in your subclass, without having them all explicitly
    written (coded) in the **body** of your class, which would be redundant (and disorganized).


    ![Image](OEBPS/Images/sq.jpg) **Note**  If any of the data fields or methods in
    the superclass that you are extending (or, if you prefer, subclassing) have been
    declared using the **private** access control keyword, those variables (or constants)
    and methods are reserved for use only by (or within) that superclass, and thus
    will not be accessible to your subclass. The same rules apply to nested and inner
    classes; these class structures cannot use any code declared as private in the
    Java constructs that contain them (or that are above them, if you will).


    The body of your class is coded inside the curly braces (see [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2),
    outermost red box), which follow your class (**and javafx.application.Application
    superclass**, in this case) declaration. This is why you learned about Java syntax
    first, and you are building on that with the class declaration and the Java syntax
    that holds the class definition (variables, constants, methods, constructor, nested
    classes) constructs.


    As you can see in the figure, the **InvinciBagel** class extends an **Application**
    superclass from the JavaFX package. The inheritance diagram (a tool I will be
    using throughout the book to show you where things come from in the overall Java
    and JavaFX API schemas) for your current superclass-to-subclass hierarchy will
    therefore look like this:


    ```

    > java.lang.Object

      > javafx.application.Application

        > invincibagel.InvinciBagel

    ```


    By extending the javafx.application package and its Application class, you will
    give the InvinciBagel class everything it needs to host (or run) the JavaFX application.
    The **J**avaFX Application class “constructs” an **Application** object so that
    it can use system memory; call an **.init()** method, to initialize anything that
    may require initializing; and call a **.start()** method (see [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2),
    second-outermost red box), which puts things into place that will ultimately be
    needed to fire up (start) an InvinciBagel Java 8 game application.


    When the end user finishes using the InvinciBagel game a**pplication**, the **Application**
    object, created by the **Application** class, using the **Application()** constructor
    method, will call its **.stop()** method and remove your application from system
    memory, thus freeing up that memory space for other uses by the your end-users.
    You will be learning about Java 8 methods, constructors, and objects soon, as
    you are progressing from the high-level package and class constructs, to lower-level
    method and object constructs, and so you are moving from a high-level overview
    to lower levels. You may be wondering if Java classes can be **nested** inside
    each other, that is, if Java classes contain other Java classes. The answer is
    yes, they certainly can (and do)! Let’s take a look at the concept of Java nested
    classes next.


    Nested Classes: Java Classes Living Inside Other Classes


    A **nested class** in Java is a class that is defined inside of another Java class.
    A nested class is part of the class in which it is nested, and this nesting signifies
    that the two classes are intended to be used together in some fashion. There are
    two types of nested classes: **static nested classes**, which are commonly referred
    to simply as nested classes, and **nonstatic nested classes**, which are commonly
    referred to as **inner classes**.


    Static nested classes, which I will refer to as nested classes, are used to create
    utilities for use with the class that contains them, and are sometimes used only
    to hold constants for use with that class. Those of you who develop Android applications
    are very familiar with nested classes, as they are quite commonly employed in
    the Android API, to hold either utility methods or Android constants, which are
    used to define things such as screen density settings, animation motion interpolation
    curve types, alignment constants, and user interface element scaling settings.
    If you are looking for an understanding regarding the concept of static, it can
    be thought of as fixed, or not capable of being changed. A photograph is a static
    image, whereas video is not static. We’ll look at this concept often during this
    book.


    A nested class uses what is commonly referred to in Java as **dot notation** to
    reference the nested class “off of” its master, or parent, containing class. For
    instance, **MasterClass.NestedClass** would be the referencing format that would
    be used to reference a nested class via its master class (containing class) name,
    using generic class type names here. If you created an InvinciBagel SplashScreen
    nested class to draw the **splash screen** for your Java game, it would be referenced
    in your Java code as **InvinciBagel.SplashScreen**, using this Java 8 **dot notation**
    syntax.


    Let’s take a look at, for example, the JavaFX Application class, which contains
    a **Parameters** nested class. This nested class **encapsulates**, or contains,
    the parameters that you can set for your JavaFX application. Thus, this **Application.Parameters**
    nested class would be a part of the same **javafx.application** package as your
    **Application** class and would be referenced as **javafx.application.Application.Parameters**,
    if you were using an import statement.


    Similarly, the constructor method would be written as **Application.Parameters()**,
    because the constructor method must have the exact same naming schema as the class
    that it is contained in. Unless you are writing code for other developers, which
    is when nested classes are most often used (such as the JavaFX Application class
    or the many nested utility or constant provider classes which you will find in
    the Android OS), you are far more likely to utilize non-static nested classes
    (commonly referred to as Java **inner classes**).'
