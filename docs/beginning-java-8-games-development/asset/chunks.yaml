    Alpha 通道来表示图像像素的透明度值，以及如何在 Java 8 游戏中实时使用这些值进行数字图像的**合成**。


    数字图像合成：在图层中使用 Alpha 通道和透明度


    合成是将多层数字图像无缝**混合**在一起的过程。正如你可能想象到的，这对于游戏设计和开发来说是一个极其重要的概念。当你想在显示器上创建一个看起来像是单一图像（或动画）的图像，而实际上它是两个或更多合成图像层的无缝集合时，合成非常有用。设置图像或动画合成的一个主要原因是为了能够通过将不同元素放在不同图层上，从而对这些元素进行程序化控制。


    为了实现这一点，你需要有一个**Alpha 通道透明度**值，你可以用它来控制给定像素与位于其他图层（其上方和下方）上相同 x、y 图像位置的另一个像素的混合程度的精度。


    与其他 RGB**通道**类似，Alpha 通道具有**256 个透明度级别**。在 Java 编程中，Alpha 通道由**#AARRGGBB**数据值（我将在下一节详细介绍）的**十六进制表示法**中的**前两个位置**表示。Alpha
    通道**ARGB**数据值使用**八个**位置（32 位）的数据，而不是 24 位图像中使用的**六个数据位置**（**#RRGGBB**），而 24 位图像实际上是
    Alpha 通道数据为零的 32 位图像。


    因此，24 位（PNG24）图像没有 Alpha 通道，不能用于合成，除非它是合成图层堆栈中的底层图像。相比之下，PNG32 图像将用作 PNG24（背景层）或
    PNG32（下方，z 顺序合成层）之上的合成层，这些层需要这种 Alpha 通道能力，以便在图像合成的某些像素位置（通过 Alpha 通道透明度值）显示出来。


    数字图像 Alpha 通道以及图像合成的概念如何影响 Java 游戏设计？主要优势在于能够将游戏画面及其包含的精灵、弹丸和背景图形元素分解为多个**组件层**。这样做的原因是能够将
    Java 8 编程逻辑（或 JavaFX 类）应用于单个图形图像元素，以控制游戏画面的各个部分，而如果它是一个单一图像，你将无法单独控制这些部分。


    图像合成的另一个部分，称为**混合模式**，也在专业图像合成能力中起着重要作用。JavaFX 混合模式通过使用**Blend**类以及**javafx.scene.effect**子包中找到的**BlendMode**常量值来应用（参见第
    4 章）。这个 JavaFX 混合效果包为 Java 游戏开发者提供了许多与 Photoshop（和 GIMP）提供给数字图像工匠相同的图像合成模式。这通过
    JavaFX 将 Java 8 变成了一个强大的图像合成引擎，就像 Photoshop 一样，并且混合算法可以使用自定义的 Java 8 代码在非常灵活的层面上进行控制。JavaFX
    混合模式常量包括**ADD**、**SCREEN**、**OVERLAY**、**DARKEN**、**LIGHTEN**、**MULTIPLY**、**DIFFERENCE**、**EXCLUSION**、**SRC_ATOP**、**SRC_OVER**、**SOFT_LIGHT**、**HARD_LIGHT**、**COLOR_BURN**和**COLOR_DODGE**。


    在 Java 8 游戏代码中表示颜色和 Alpha：使用十六进制表示法


    既然你已经了解了什么是颜色深度和 Alpha 通道，并且知道在任何给定的数字图像中，颜色和透明度是通过四种不同的**图像通道**（Alpha、红色、绿色、蓝色
    [ARGB]）的组合来表示的，那么理解作为程序员，你如何在 Java 8 和 JavaFX 中表示这四个 ARGB 图像颜色和透明度通道值就很重要了。


    在 Java 编程语言中，颜色和 Alpha 不仅用于 2D 数字图像（通常称为**位图**图像），也用于 2D 插图（通常称为**矢量**图像）。颜色和透明度值也经常用于许多不同的颜色设置选项。正如你已经在
    Stage 对象和 Scene 对象中看到的，你可以为舞台、场景、布局容器（StackPane）或 UI 控件等设置背景颜色（或透明度值）。


    在 Java（以及 JavaFX）中，不同级别的 ARGB 颜色强度值使用**十六进制**表示法来表示。十六进制（或 hex）基于原始的**Base16**计算机记数法。这在很久以前被用来表示**16
    位**的数据值。与更常见的**Base10**（从 0 数到 9）不同，Base16 记数法从 0 数到 F，其中 F 代表 Base10 中的值 15（0
    到 15 产生 16 个数据值）。

