  trans: '

    Java 编程语言中有**八种** **基本数据类型**，如表 3-1 所示。在本书中，你将使用这些数据类型来创建你的 InvinciBagel 游戏，因此我现在不会详细逐一介绍它们，只需说明：Java
    的布尔型数据变量用于标志或开关（开/关），字符型用于 Unicode 字符或创建字符串对象（字符数组），其余类型用于存储不同大小和精度的数值。整型值用于存储整数，而浮点型值用于存储小数（带小数点的数值）。根据变量的使用范围或区间选择正确的数值数据类型非常重要，因为正如你在表
    3-1 的二进制大小列中所见，较大的数值数据类型占用的内存可能是较小数据类型的八倍之多。


    表 3-1. Java 基本数据类型及其默认值、内存大小、定义和数值范围


    ![表 3-1](img/Table3-1.jpg)


    引用数据类型：对象和数组


    （面向对象编程语言也有**引用数据类型**，它提供内存中对另一个结构的引用，该结构包含更复杂的数据结构，例如**对象**或**数组**。这些更复杂的数据结构是通过代码创建的；在
    Java 中，这通常是一个类。有各种类型的 Java **数组**类，用于创建数据数组（例如简单的数据库），以及 Java 类中的构造方法，它可以在内存中创建对象结构，其中包含
    Java 代码（方法）和数据（字段）。


    Java 运算符：在应用程序中操作数据


    在本节中，你将学习 Java 编程语言中一些最常用的**运算符**，尤其是那些对游戏编程最有用的运算符。这些运算符包括：用于数学表达式的**算术**运算符；用于确定数据值之间关系（等于、不等于、大于、小于等）的**关系**运算符；用于布尔逻辑的**逻辑**运算符；**赋值**运算符，它在一个紧凑的操作（运算符）中同时执行算术运算并将值赋给另一个变量；以及**条件运算符**（也称为三元运算符），它根据真或假（布尔）评估的结果为变量赋值。


    还有一些概念上更高级的**位**运算符，用于在**二进制**数据（**0 和 1**）级别执行操作，其逻辑超出了本书的初学者范围，并且在 Java 游戏编程中不如其他更主流的运算符类型常见，而你在本书中将使用这些主流运算符来完成游戏逻辑中的各种编程目标。


    Java 算术运算符


    Java **算术运算符**是编程中最常用的，尤其是在街机类游戏中，游戏中的物体以离散的像素数在屏幕上移动。正如你从小学到大学在数学课上学到的，可以使用这些基本算术运算符创建许多更复杂的表达式。


    表 3-2 中显示的算术运算符中，你可能不太熟悉的是**取模**运算符，它返回除法运算完成后的余数（剩余部分），以及**递增**和**递减**运算符，它们分别将值加
    1 或减 1。这些运算符用于实现你的**计数器**逻辑。计数器（使用递增和递减运算符）最初用于循环（我将在下一节中介绍）；然而，这些递增和递减运算符对于游戏编程（计分、**生命值**减少、游戏棋子移动以及类似的进度）也极其有用。


    表 3-2. Java 算术运算符、其运算类型以及算术运算的描述


    | 运算符 | 运算 | 描述 |

    | --- | --- | --- |

    | 加号 + | 加法 | 将运算符两侧的操作数相加 |

    | 减号 – | 减法 | 用左操作数减去右操作数 |

    | 乘号 * | 乘法 | 将运算符两侧的操作数相乘 |

    | 除号 / | 除法 | 用左操作数除以右操作数 |

    | 取模 % | 取余 | 用左操作数除以右操作数，返回余数 |

    | 递增 ++ | 加 1 | 将操作数的值增加 1 |

    | 递减 -- | 减 1 | 将操作数的值减少 1 |


    要实现算术运算符，请将希望接收算术运算结果的数据字段（变量）放在**等号赋值运算符**的**左侧**，将要执行算术运算的变量放在等号的右侧。以下是一个将 x
    和 **y** 变量**相加**并将结果赋给 z 变量的示例：


    ```

    Z = X + Y;   // 使用加法运算符

    ```


    如果你想从 x 中**减去** y，则使用**减号**而不是加号；如果你想将 x 和 y 的值**相乘**，则使用**星号**而不是加号；如果你想将 x **除以**
    y，则使用**正斜杠**而不是加号。以下是这些运算的写法：


    ```

    Z = X - Y;    // 减法运算符

    Z = X * Y;   //  乘法运算符

    Z = X / Y;  //   除法运算符


    ```


    你将大量使用这些算术运算符，因此在完成本书之前，你将获得大量的练习！接下来，让我们更详细地了解关系运算符，因为有时你需要比较值而不是计算它们。


    Java 关系运算符


    Java **关系运算符**用于在某些情况下对两个变量之间或变量与常量之间进行**逻辑比较**。你在学校应该已经熟悉这些运算符，包括等于**、**不等于**、**大于**、**小于**、**大于或等于**和**小于或等于**。在
    Java 中，等于使用两个并排的等号放在被比较的数据字段之间，而感叹号放在等号之前表示“**不等于**”。表 3-3 显示了关系运算符，以及每个运算符的示例和描述。


    表 3-3. Java 关系运算符，示例中 A = 25 且 B = 50，以及关系运算的描述

    '
- fmt: '| Operator | Example | Description |

    | --- | --- | --- |

    | `==` | `(A == B)` **not** true | Comparison of two operands: if they are **equal**
    then the condition equates to **true** |

    | `!=` | `(A != B)` **is** true | Comparison of two operands: if they are **not
    equal** the condition equates to **true** |

    | `>` | `(A > B)` **not** true | Comparison of two operands: if left operand is
    **greater** than right operand, equates to **true** |

    | `<` | `(A < B)` **is** true | Comparison of two operands: if left operand is
    **less** than right operand, equates to **true** |

    | `>=` | `(A >= B)` **not** true | Compare two operands: if left operand is **greater**
    or equal to right operand equates to **true** |

    | `<=` | `(A <= B)` **is** true | Compare two operands: if left operand **less**
    than or equal to right operand, equates to **true** |


    The **greater than** symbol is a right-facing arrow-head, and the **less than**
    symbol is a left-facing arrow-head. These are used before the equals sign to create
    greater than or equal to and less than or equal to relational operators respectively,
    as you can see at the bottom of [Table 3-3](#9781484204160_Ch03.xhtml#Tab3).


    These relational operators return a boolean value of true or false, and as such
    are also used in control (loop) structures in Java quite a bit, and are also used
    in gameplay programming logic as well to control the path (result) that the gameplay
    will take. For instance, let’s say you want to determine where the left edge of
    the game screen is so that the InvinciBagel does not travel right off of the screen
    when he is moving to the left. Using this relational comparison:


    ```

    boolean changeDirection = false; // Create boolean variable changeDirection, initialize
    to false

    changeDirection = (invinciBagelX <= 0); //  boolean changeDirection is TRUE if
    left side reached

    ```


    Notice that I have used the `<=` **less than or equal to** (yes, Java supports
    negative numbers too), so that if the InvinciBagel has gone past **the (x=0) left
    side of the screen** the `changeDirection` boolean flag will be set to the value
    of true, and the sprite movement programming logic can deal with the situation,
    by changing the direction of movement (so InvinciBagel bounces off of the wall)
    or stopping the movement entirely (so the InvinciBagel sticks to the wall).


    You will be getting a lot of exposure to these relational operators during this
    book as they are quite useful in creating gameplay logic, so we are going to be
    having a lot of fun with these soon enough. Let’s take a look at logical operators
    next, so we can work with **Boolean Sets** and compare things in groups, which
    is also important for games.


    ## Java Logical Operators


    The Java **logical operators** are similar to the boolean operations (union, intersection,
    etc.) that you learned about in school, and allow you to determine if both boolean
    variables hold the same value (**AND**), or if one of the boolean variables is
    different (**OR**), from the other. There’s also a **NOT** operator that reverses
    the value of any of the compared boolean operands. [Table 3-4](#9781484204160_Ch03.xhtml#Tab4)
    shows Java’s three logical operators, and an example of each, along with a description.


    [Table 3-4](#9781484204160_Ch03.xhtml#_Tab4). Java Logical Operators, an Example
    in Which A = True and B = False, and a Description of Logical Operation


    | Operator | Example | Description |

    | --- | --- | --- |

    | `&&` | `(A && B)` is false | A logical **AND** operator equates to **true**
    when **BOTH** operands are the same value. |

    | `&#124;&#124;` | `(A &#124;&#124; B)` is true | A logical **OR** operator equates
    to **true** when **EITHER** operand is the same value. |

    | `!` | `!(A && B)` is true | A logical **NOT** operator **reverses** the **logical
    state** of the operator (or set) it is applied to. |


    Let’s use logical operators to enhance the game logic example in the previous
    section by including the **direction** in which the InvinciBagel is moving on
    the screen. The existing `facingDirection` **String** variable will control the
    direction the InvinciBagel is facing (and moving in, if in motion). You can now
    use the following logical operator to determine if the InvinciBagel is facing
