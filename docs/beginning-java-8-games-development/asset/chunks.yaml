    ![9781484204160_Fig10-01.jpg](img/9781484204160_Fig10-01.jpg)


    图 10-1. 创建一个 CastingDirector.java 演员选角与追踪引擎，用于管理 Actor 和 Hero 对象


    在编写 CastingDirector.java 类之前，我们先花些时间学习 Java 集合、泛型，以及我们将用于创建这些演员管理工具的 List、ArrayList、Set
    和 HashSet 类。


    List 和 ArrayList：使用 java.util 的 List 管理


    首先，我们来介绍 **public** 类 **ArrayList<E>**，因为它是一个类；然后我们再来看 List，因为它是一个接口，而不是 Java
    类。如果你想知道 **<E>** 代表什么，它代表 **Element**（元素）；如果你看到 **<K>**，它代表 **Key**（键）；如果你看到 **<T>**，它代表
    **Type**（类型）；如果你看到 **<V>**，它代表 **Value**（值）。<E> 会被你在 ArrayList 中使用的元素（对象）所替换。在我们的例子中，就是
    ArrayList<Actor>，因为 CastingDirector.java 类的 ArrayList（和 Set）将引用 Actor 对象（Actor
    超类的子类）。类的层次结构如下：


    ```

    java.lang.Object

      > java.util.AbstractCollection<E>

        > java.util.AbstractList<E>

          > java.util.ArrayList<E>

    ```


    你可能已经猜到，这个类是 **Java 集合框架** 的成员，它既是一个 List，也是一个 Array，两者都包含数据集合，很像数据结构（或数据存储），只是格式更简单。ArrayList<E>
    类可以“**实现**”或支持以下 Java 接口：Serializable、Cloneable、Iterable<E>、Collection<E>、List<E>
    和 RandomAccess。我们将使用 List<E> 接口，或者在我们的例子中，使用 List<Actor> 这个 Java 接口，我们将在下一节关于
    List<E> 的内容中学习它，届时我们将了解 **Java 接口**。


    本质上，ArrayList 类（及其对象）创建了 List<E> 接口的一个**可调整大小的 Array** 实现。因此，ArrayList 对象实现了所有可选的
    List 操作，并允许所有类型的 List 元素，包括 **null**。除了实现 List<E> 这个 Java 接口外，该类还提供了方法调用，包括 **.removeAll()**、**.addAll()**
    和 **.clear()**，我们将在类中使用这些方法来操作 List 的内容以及内部用于存储 Actor 列表（对于 List<Actor>）或图像列表（对于
    List<Image>）的 ArrayList 对象的大小。


    每个 ArrayList 对象实例都有一个容量。容量是用于在 List<E> 实现中存储元素（对象）的 Array 的大小：在我们的例子中，就是 List<Actor>。容量始终至少与
    List 的大小相等。当元素（Actor 对象）被添加到 ArrayList 时，其容量会自动增长，这使得它非常适合我们的 CastingDirector
    类，因为我们可以让游戏关卡变得越来越复杂，也就是说，它可以在 ArrayList<Actor> 或 List<Actor> 中利用更多的 Actor 对象。


    需要注意的是，List<E> 的实现不是**同步的**（不能同时在多个线程上运行）。如果你需要多个线程并发（同时）访问一个 ArrayList 实例，并且这些线程中至少有一个修改了你的
    List<Actor> 结构，则必须在外部进行同步（手动，通过你的代码）。我们将在敌人被杀死、发射弹丸或找到（收集）宝藏时专门调用 CastingDirector
    类，而不会让它持续不断地被调用。


    对 ArrayList 对象的结构性修改是指添加或删除一个或多个元素的操作；仅仅设置 ArrayList 中某个元素（Actor）的值不被视为结构性修改。


    Java 接口：为你的类定义实现规则


    在我们查看 List<E> 这个 Java 接口之前，我们先来看看 Java 接口通常做什么，因为在第 3 章中我们没有足够的篇幅来涵盖所有 Java 编程语言。所以，我将在本书中根据需要学习一些更高级的
    Java 主题。一个很好的例子是第 9 章中的 lambda 表达式，以及这里第 10 章中的 Java 接口。使用 Java 接口的原因是为了确保其他将要使用你代码的程序员能够正确地实现它；也就是说，包含代码正常运行所需的一切。


    本质上，接口只指定了其他开发人员实现你的类所需的一组相关方法。这些方法以“空方法”代码体的形式指定。例如，如果你希望其他开发人员使用 Hero 类，你可以指定一个
    Hero 接口。这可以通过以下 Java 代码完成：


    ```

    public interface Hero {

        public void update();

        public boolean collide(Actor actor);

    }

    ```


    如你所见，这与我们在 Actor 超类中对 .update() 方法的处理类似，因为这里没有像通常方法中那样指定 {代码体}。因此，从某种意义上说，Java
    接口也以抽象的方式用于定义“实现”该 Java 接口的类中必须包含的内容。你可能已经猜到，你需要在类声明中使用 Java 的 **implements**
    关键字来实现一个 Java 接口。


    所以，如果你定义了一个 Hero 接口，并希望在你的一个类中实现它，那么 Java 编译器会监视代码，确保你实现了必要的方法结构。类定义的代码行和类体内部的方法看起来会像下面这样：


    ```

    public class SuperHero implements Hero {

        protected boolean flagVariable1, flagVariable2;

        public void update() {

            // 每次更新时处理的 Java 语句

        }

        public boolean collide(Actor actor) {

            // 用于碰撞检测处理的 Java 语句

        }

    }

    ```


    因此，对于我们之前看到的 java.util ArrayList 类，其技术类定义如下：


    ```

    public class ArrayList<E> extends AbstractList<E> implements List<E>

    ```


    ArrayList<E> 类还实现了 RandomAccess、Cloneable 和 Serializable，但我们目前不会使用这些，所以我只向你展示与本章学习内容相关的
    ArrayList<E> 类定义部分，而不是完整的 **public class ArrayList<E> extends AbstractList<E>
    implements List<E>, RandomAccess, Cloneable, Serializable** 类定义，如果你在线查看 ArrayList<E>
    类的 Java 文档，你会看到完整的定义。


    需要注意的是，我们将与 ArrayList<E> 类一起使用的 **.addAll()**、**.removeAll()** 和 **.clear()**
    方法调用之所以被实现，是因为 List<E> 这个 Java 接口要求它们必须被实现，这就是类之间的关联，也是我们为什么使用以下代码来声明 ArrayList<>
    对象的原因：


    ```

    private List<Actor> CURRENT_CAST = new ArrayList<>();

    ```


    你可能想知道为什么我们不需要在这个声明和实例化语句的两边都显式指定 Actor 对象类型。在 Java 7 之前，你需要在 ArrayList<>() 构造方法调用的两边都指定
    Actor 对象类型。所以，如果你编写的游戏代码需要兼容 Java 5 和 Java 6，你应该使用以下 Java 代码行来编写这条语句：


    ```

    private List<Actor> CURRENT_CAST = new ArrayList<Actor>();

    ```


    现在我们已经了解了什么是 Java 接口，让我们来详细看看 List<E> 这个公共接口。

