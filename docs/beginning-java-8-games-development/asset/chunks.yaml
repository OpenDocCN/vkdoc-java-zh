    \ and finally, `friction`, `gravity`, and `bounce` factors.\n\n## Adding Sprite\
    \ Control and Definition Variables to the Hero Class\n\nThe next thing that we\
    \ need to do is to make sure that all of the variables that we will need to hold\
    \ data for motion sprites are defined at the top of the `Hero` class, as seen\
