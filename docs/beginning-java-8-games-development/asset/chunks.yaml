- fmt: 'It is important to note that if a public class that you are trying to access
    and use exists in a package other than your own (in your case, `invincibagel`),
    then the Java programming convention is to use the Java `import` keyword to create
    an import statement that allows use of that public class. This is why, by the
    time you reach the end of this book, you will have dozens of `import` statements
    at the top of your `InvinciBagel.java` class, as you will be leveraging preexisting
    Java and JavaFX classes in code libraries that have already been coded, tested,
    refined, and made public, using the `public` access control modifier keyword,
    so that you can create Java 8 games with them to your heart’s content!


    Owing to the concept of class inheritance in Java, all the `public` methods and
    `public` variables inside a `public` class will be inherited by the subclasses
    of that class (which, once it is subclassed, becomes a superclass). [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)
    offers an example of a `public` access control modifier keyword, in front of the
    `InvinciBagel` class keyword.


    ## Java’s Protected Modifier: Variables and Methods Allow Access by Subclass


    The Java `protected` access modifier keyword can be used by data fields (variables
    and constants) and by methods, including constructor methods, but cannot be used
    by classes or interfaces. The `protected` keyword allows variables, methods, and
    constructors in a superclass to be accessed only by subclasses of that superclass
    in other packages (such as the `invincibagel` package) or by any class within
    the same package as the class containing those `protected` members (Java constructs).


    This access modifier keyword essentially protects methods and variables in a class
    that is intended to be (hoped to be used as) a superclass by being subclassed
    (extended) by other developers. Unless you own the package that contains these
    `protected` Java constructs (which you do not), you must extend the superclass
    and create your own subclass from that superclass to be able to use the `protected`
    methods.


    You may be wondering, why would one want to do this, protecting Java code structures
    in this way? When you are designing a large project, such as the Android OS API,
    you will often want to have the higher-level methods and variables not be used
    directly, right out of, or from within, that class, but rather within a more well-defined
    subclass structure.


    You can achieve this direct usage prevention by protecting these methods and variable
    constructs from being used directly such that they become only a blueprint for
    more detailed implementations in other classes and are not able to be used directly.
    Essentially, protecting a method or variable turns it into a blueprint or a definition
    only.


    ## Java’s Private Modifier: Variables, Methods, and Classes Get Local Access Only


    The Java `private` access control modifier keyword can be used by data fields
    (variables or constants) and by methods, including constructor methods, but cannot
    be used by classes or interfaces. The `private` modifier can be used by a nested
    class; however, it cannot be used by an outer or the primary (topmost) class.
    The `private` access control keyword allows variables, methods, and constructors
    in a class to be accessed only inside that class. The `private` access control
    keyword allows Java to implement a concept called encapsulation, in which a class
    (and objects created using that class) can encapsulate itself, hiding its “internals”
    from outside Java universe, so to speak. The OOP concept of encapsulation can
    be used in large projects to allow teams to create (and, more importantly, debug)
    their own classes and objects. In this way, no one else’s Java code can break
    the code that exists inside these classes, because their methods, variables, constants,
    and constructors are `private`!


    The access modifier keyword essentially privatizes methods or variables in a class
    so that they can only be used locally within that class or by objects created
    by that class’s constructor method. Unless you own the class that contains these
    `private` Java constructs, you cannot access or use these methods or data fields.
    This is the most restrictive level of access control in Java. A variable declared
    `private` can be accessed outside the class if a `public` method that accesses
    a `private` variable from inside the class, called a `public .get()` method call,
    is declared `public` and thus provides a pathway (or doorway) through that `public`
    method to the data in the `private` variable or constant.


    ## Java’s Package Private Modifier: Variables, Methods, and Classes in Your Package


    If no Java access control modifier keyword is declared, then a default access
    control level, which is also referred to as the package private access control
    level, will be applied to that Java construct (class, method, data field, or interface).
    This means that these Java constructs are visible, or available, to any other
    Java class inside the Java package that contains them. This package private level
    of access control is the easiest to use with your methods, constructors, constants,
    and variables, as it is applied simply by not explicitly declaring an access control
    modifier keyword.


    You will use this default access control level quite a bit for your own Java applications
    (game) programming, as usually you are creating your own application in your own
    package for your users to use in its compiled executable state. If you were developing
    game engines for other game developers to use, however, you would use more of
    the access control modifier keywords I have discussed in this section to control
    how others would use your code.


    ## Nonaccess Control Modifiers: `final`, `static`, `abstract`, `volatile`, `synchronized`


    The Java modifier keywords that do not specifically provide access control features
    to your Java constructs are termed nonaccess control modifier keywords. These
    include the often used `final`, `static`, and `abstract` modifier keywords as
    well as the not so often used `synchronized` and `volatile` modifier keywords,
    which are employed for more advanced thread control and which I will not be covering
    in this beginner-level programming title, except to describe what they mean and
    do, in case you encounter them in your Java universe travels.


    I will present these concepts in the order of their complexity, that is, from
    the easiest for beginners to wrap their mind around to the most difficult for
    beginning OOP developers to wrap their mind around. OOP is like surfing, in that
    it seems very difficult until you have practiced doing it a number of times, and
    then suddenly you just get it!


    ## Java’s `final` Modifier: Variables, Methods, and Classes That Cannot Be Modified


    You have already explored the `final` modifier keyword as it is used to declare
    a constant, along with a `static` keyword. A `final` data field variable can only
    be initialized (set) one time. A `final` reference variable, which is a special
    type of Java variable that contains a reference to an object in memory, cannot
    be changed (reassigned) to refer to a different object; the data that are held
    inside the (`final`) referenced object can be changed, however, as only the reference
    to the object itself is the `final` reference variable, which is essentially locked
    in, using a Java `final` keyword.'
