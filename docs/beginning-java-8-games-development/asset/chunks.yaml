    就会粘在墙上）来处理这种情况。


    在本书中，你会大量接触到这些关系运算符，因为它们在创建游戏逻辑时非常有用，所以我们很快就能用它们玩出很多花样。接下来，让我们看看逻辑运算符，这样我们就可以处理**布尔集合**，并对事物进行分组比较，这对游戏来说也很重要。


    Java 逻辑运算符：


    Java 的**逻辑运算符**类似于你在学校学过的布尔运算（并集、交集等），它们允许你判断两个布尔变量是否持有相同的值（**AND**），或者其中一个布尔变量是否与另一个不同（**OR**）。还有一个
    **NOT** 运算符，它可以反转任何被比较的布尔操作数的值。表 3-4 展示了 Java 的三个逻辑运算符、每个运算符的示例以及描述。


    表 3-4. Java 逻辑运算符，示例中 A = True 且 B = False，以及逻辑运算的描述


    | 运算符 | 示例 | 描述 |

    | --- | --- | --- |

    | && | (A && B) 为 false | 逻辑 **AND** 运算符：当**两个**操作数都为相同值时，结果为**真**。 |

    | &#124;&#124; | (A &#124;&#124; B) 为 true | 逻辑 **OR** 运算符：当**任一**操作数为相同值时，结果为**真**。
    |

    | ! | !(A && B) 为 true | 逻辑 **NOT** 运算符：**反转**其所应用运算符（或集合）的**逻辑状态**。 |


    让我们使用逻辑运算符来增强上一节中的游戏逻辑示例，将 InvinciBagel 在屏幕上的移动**方向**纳入考虑。现有的 **facingDirection
    String** 变量将控制 InvinciBagel 面对（以及移动，如果正在运动的话）的方向。现在，你可以使用以下逻辑运算符来判断 InvinciBagel
    是否面向左（W，即**西**）；**travelingWest** 布尔变量是否为 **true**；**并且**屏幕左侧的命中（或越过）布尔变量 **hitLeftSideScrn**
    是否也等于 **true**。实现这一功能的修改代码将包含两个额外的布尔变量声明和初始化，如下所示：


    ```

    boolean changeDirection = false; // 创建布尔变量 changeDirection，初始化为 false

    boolean hitLeftSideScrn = false; // 创建布尔变量 hitLeftSideScrn，初始化为 false

    boolean travelingWest = false;   // 创建布尔变量 travelingWest，初始化为 false

    hitLeftSideScrn = (invinciBagelX <= 0); // 如果到达左侧边缘，布尔变量 hitLeftSideScrn 为 TRUE

    travelingWest = (facingDirection == "W") // 如果 facingDirection="W"，布尔变量 travelingWest
    为 TRUE

    changeDirection = (hitLeftSideScrn && travelingWest) // 如果两者都为 TRUE，则改变方向

    ```


    为了判断 InvinciBagel 是否面向（或移动，如果也在运动的话）**西**，你创建了另一个 **travelingWest** 布尔变量，并将其初始化为
    **false**（因为你最初的 facingDirection 设置为 East）。然后，你创建了一个名为 **hitLeftSideScrn** 的布尔变量，将其设置为
    **(invinciBagelX <= 0)** 关系运算符语句。


    最后，你使用 travelingWest = (facingDirection == "W") 逻辑创建了一个关系运算符语句，然后就可以将 **changeDirection**
    布尔变量与新的逻辑运算符一起使用了。这个逻辑运算符将通过 changeDirection = (hitLeftSideScrn && travelingWest)
    逻辑运算编程语句，确保 **hitLeftSideScrn** 和 **travelingWest** 这两个布尔变量都设置为 **true**。


