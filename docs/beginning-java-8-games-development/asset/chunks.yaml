  trans: '

    EditShare 的 Lightworks 曾是一款付费软件包，直到它被开源。你需要在 Lightworks 网站上**注册**才能下载和使用该软件。该软件包适用于
    Linux、Windows 和 Mac 操作系统。要在互联网上找到 Lightworks，请打开谷歌搜索，输入 **Lightworks**，如图 1-18
    左上角所示。点击 **Download** 链接（或右键单击，在新标签页中打开），然后点击相应的 **Download** 按钮以及代表你所使用操作系统的标签页。**Downloads**
    页面会自动检测你使用的操作系统并选择正确的操作系统标签页；在我的情况下是 Windows。


    ![9781484204160_Fig01-18.jpg](img/9781484204160_Fig01-18.jpg)


    图 1-18。在谷歌中搜索“Lightworks”，进入 Lightworks 下载页面，并点击与你操作系统匹配的标签页


    如果你尚未注册，请在 Lightworks 网站上注册。一旦获得批准，你就可以下载并安装最新版本的 Lightworks。安装该软件，并像安装其他软件一样，在任务栏上创建一个快速启动图标。接下来，你将安装一个名为
    **Blender** 的 3D 建模和动画软件包。


    下载并安装 Blender


    JavaFX 最近已开始支持在 JavaFX 环境之外创建的 3D 新媒体资源，这意味着你将能够使用第三方软件包（例如 Autodesk 3D Studio
    Max 或 Maya 以及 NewTek Lightwave 3D）创建 3D 模型、纹理和动画。在本节中，你将下载并安装名为 Blender 的流行开源
    3D 建模和动画软件包。Blender 适用于 Linux、Windows 和 Mac 操作系统，因此你可以使用任何你喜欢的操作系统平台来创建和优化 3D
    模型、3D 纹理映射以及 3D 动画，以便在你的 Java 8 和 JavaFX 游戏中使用。


    要使用谷歌搜索引擎在互联网上找到 Blender 软件，请输入 **Blender**，如图 1-19 所示。点击正确的下载链接以下载并安装 Blender，然后创建快速启动图标。


    ![9781484204160_Fig01-19.jpg](img/9781484204160_Fig01-19.jpg)


    图 1-19。在谷歌中搜索“Blender”，进入 Blender 下载页面，并点击与你操作系统对应的标签页


    其他值得关注的开源软件包


    在我的新媒体内容制作业务中，我还使用了许多其他专业级的开源软件包，我想让你了解一下，以防你未曾听说过它们。这些软件将为到目前为止你已搭建的新媒体制作工作站增添更强大的功能和更多样化的用途。值得注意的是，在完成所有这些大量的下载和安装过程中，你已经为自己节省了数千美元，否则这些钱本会花在类似的付费内容制作软件包上。我想你可以说我的座右铭是：“第一次就做对，并且一定要坚持到底”，所以让我告诉你一些我安装在自己的内容制作工作站上的其他免费甚至更实惠的新媒体内容制作软件包。


    除了 EditShare Lightworks 软件包（过去曾价值六位数）之外，开源软件中性价比最高的之一是由 **Oracle** 在收购 Sun Microsystems
    后开源的**办公生产力软件套件**。Oracle 将其 OpenOffice 软件套件移交给了广受欢迎的 Apache 开源项目。**OpenOffice
    4.1** 是一个完整的办公生产力软件套件，包含**六个**功能齐全的商务生产力软件包！由于你的内容制作机构实际上是一个完整的商业实体，你或许应该了解这款软件，因为它是一个非常可靠的开源软件产品。你可以在
    **[www.openoffice.org](http://www.openoffice.org)** 找到它；这款广受欢迎的商务软件包已被像你这样精明的专业人士下载超过一亿次，所以正如他们所说，这绝非儿戏！


    与 Audacity 数字音频编辑软件完美互补的是 **Rosegarden** MIDI 音序、音乐创作和乐谱软件，它可用于音乐创作以及打印出最终乐谱用于音乐出版。Rosegarden
    当前版本为 14.02，正在从 Linux 移植到 Windows，可以通过谷歌搜索或在 **[www.rosegardenmusic.com](http://www.rosegardenmusic.com)**
    找到。


    另一款令人印象深刻的音频、MIDI 和声音设计软件包是 **Qtractor**。如果你运行的是 Linux 操作系统，请务必通过谷歌搜索或访问 **[`Qtractor.SourceForge.net`](https://Qtractor.SourceForge.net)**
    来下载并安装这款专业级的数字音频合成软件包。


    对于 3D 角色建模和动画，请务必在有空时查看 **DAZ Studio**（**[www.daz3d.com](http://www.daz3d.com)**）的
    3D 软件包。**DAZ Studio Pro** 的当前版本是 4.6，没错，它是免费的！你需要像注册 EditShare Lightworks 那样登录并注册，但这是很小的代价！该网站上还有一个免费的
    3D 建模软件包，名为 **Hexagon 2.5**，以及一个售价不到 20 美元的流行地形生成软件包，名为 **Bryce 7.1 Pro**。DAZ
    Studio 网站上最贵的软件是 **Carrara**（150 美元）和 **Carrara Pro**（285 美元）。DAZ Studio 的大部分收入来自销售各种类型的**角色模型**，所以不妨看看，因为它在
    3D 内容（虚拟）世界中是一股不可忽视的力量！


    另一款令人印象深刻（且基础版免费）的世界生成软件包是来自英国 Planetside Software 的 **Terragen 3.2**。你可以从 **[`planetside.co.uk`](https://planetside.co.uk)**
    下载基础版，并加入其论坛。我在我的几本 Android 应用开发书籍中使用过这款软件，所以我知道它非常适合多媒体应用和游戏。它也被专业电影制作人所使用，因为其质量水准堪称完美。


    **Caligari TrueSpace 7.61** 也是一款出色的免费 3D 建模和动画软件。根据 Caligari 网站（**[`Caligari.us`](https://Caligari.us)**，你仍可从此处下载）的说法，该程序“免费且充满活力！”。它最初由
    Caligari 公司（后被微软收购）的创始人 Roman Ormandy 开发时，售价曾接近一千美元。作为一款专业级的 3D 建模和动画软件包，该程序在其鼎盛时期拥有数百万用户。它是一款非常酷的软件，拥有趣味十足的用户界面（UI），所以一定要下载它！

    '
- fmt: '# Another 3D Rendering and Modeling Software


    Another 3D rendering software you should take a look at is **POV-Ray** (Persistence
    of Vision Raytracer), which works with any 3D modeling and animation software
    package to generate impressive 3D scenes, using advanced ray-traced rendering
    algorithms. The most recent version on the POV-Ray web site (`[www.povray.org](http://www.povray.org)`),
    `3.7`, is `64` bit and multicore (multithreaded) compatible, and it can be downloaded
    for free!


    `Bishop3D` is a cool 3D modeling software package that was specifically designed
    for use with POV-Ray. The software can be used to create custom 3D objects, which
    can then be imported into POV-Ray (and then into JavaFX) for use in your games.
    The most recent version, an 8MB download, is `1.0.5.2`, for Windows 7. The software
    can be found at `[www.bishop3d.com](http://www.bishop3d.com)` and can currently
    be downloaded for free!


    Yet another free 3D modeling software worth investigating is **Wings 3D**. This
    software can be used to create custom 3D objects, which can then be imported into
    JavaFX for use in your games. The most recent version, a `64`-bit, 16MB download,
    is `1.5.3` and was released in April 2014, for Windows 7, Mac OS X, and Ubuntu
    Linux. The software can be found at `[www.wings3d.com](http://www.wings3d.com)`
    and can currently be downloaded for free!


    For UI design prototyping, the free software package **Pencil 2.0.6**, from **Evolus**,
    allows you to easily prototype UI designs before you create them in Java, Android,
    or HTML5. The software is located at `[http://pencil.evolus.vn](http://pencil.evolus.vn)`
    and is available for Linux, Windows, and Mac OSs.


    Next, you will take a look at how I organize some of the basic OS utilities and
    open-source software on my taskbar.


    ## Organizing Quick Launch Icons in Your Taskbar Area


    There are certain OS utilities, such as the calculator, text editor (Notepad),
    and file manager (Explorer), for which I create Quick Launch icons on my taskbar,
    as these utilities are used frequently in programming and new media content development
    work processes. I also keep as Quick Launch icons a wide range of new media development,
    programming, and office productivity applications. [Figure 1-20](#9781484204160_Ch01.xhtml#Fig20)
    displays a dozen of these, including everything that you just installed, in the
    order in which you installed it, as well as a few others, such as OpenOffice 4.1,
    DAZ Studio Pro 4.6, and Bryce 7.1 Pro.


    ![9781484204160_Fig01-20.jpg](OEBPS/Images/9781484204160_Fig01-20.jpg)


    [Figure 1-20](#9781484204160_Ch01.xhtml#_Fig20). Make taskbar Quick Launch icons
    for key system utilities, NetBeans 8.0, and new media production software


    There are a couple of ways to create these Quick Launch icons: you can drag programs
    from the start menu and drop them onto the taskbar, or you can right-click icons
    on the desktop or in the Explorer file manager and select **Pin this program to
    taskbar** from the context-sensitive menu. Once icons are on the taskbar, you
    can change their position simply by dragging them to the left or to the right.


    Congratulations, you have just set up a new media Java 8 game development workstation
    that is highly optimized and that will allow you to create any new media Java
    8 game that you or your clients can imagine!


    ## Summary


    In this first chapter I made sure that you have everything that you need to develop
    standout Java 8 games, including the latest versions of Java 8, JavaFX, and NetBeans
    8.0 as well as all the latest open-source new media software.


    You started by downloading and installing the latest Java JDK 8 and NetBeans IDE
    8.0 software. Then, you did the same for a plethora of professional open-source
    new media tools.


    In the next chapter, I will show you how to use NetBeans 8.0 to create a Java
    8 project.


    # CHAPTER 2


    ![image](OEBPS/Images/frontdot.jpg)


    ## Setting Up Your Java 8 IDE: An Introduction to NetBeans 8.0


    Let’s get started here in [Chapter 2](#9781484204160_Ch02.xhtml) by considering
    **NetBeans IDE 8.0**, because that is the primary piece of software that you will
    be using to create your Java 8 games. Even though Java JDK 8 is the foundation
    for your Java 8 games, as well as for NetBeans 8.0, you will start your journey
    by learning about NetBeans, as it is the "front end," the window through which
    you look at your Java game project.


    NetBeans 8.0 is the **official IDE** for Java JDK 8, and, as such, it is what
    you will be using for this book. That is not to say you cannot use another IDE,
    such as Eclipse or IntelliJ, which are the official IDEs for Android 4.x (32 bit)
    and Android 5.x (64 bit) respectively, but I prefer to use NetBeans 8.0 for my
    new media application and game development for the Java 8, JavaFX 8, HTML5, CSS3
    (Cascading Style Sheets 3), and JavaScript software development markup and programming
    paradigms.


    This is not only because NetBeans 8.0 integrates **JavaFX Scene Builder**, which
    you will be learning about in [Chapter 5](#9781484204160_Ch05.xhtml) of this book,
    but also because it is an HTML5 IDE, too, and I create everything I design for
    my clients using Java 8, JavaFX 8, Android 4.x, or Android 5.x as well as HTML5.
    I do this so that the content works across (on) closed, or proprietary, OSs and
    platforms. I prefer open-source software and platforms, as you observed in [Chapter
    1](#9781484204160_Ch01.xhtml).


    First, you will take a look at what is new in NetBeans 8.0. This version of NetBeans
    was released at the same time as Java 8, and the version number synchronization
    is no coincidence. You will discover why you will want to use NetBeans 8.0 rather
    than an older NetBeans version, such as NetBeans 7.4 or earlier.


    Next, you will examine the various attributes of NetBeans IDE 8.0 that make it
    an invaluable tool for Java 8 game development. You will not be able to get hands-on
    experience with all its features in the chapter, but you will be exploring all
    the cool things that it can do for you over the course of this book (you will
    need to put an advanced code base into place to really give some of the features
    a workout).


    Finally, you will learn how to create your Java 8 and JavaFX project, using NetBeans
    8.0 so that you progress toward creating the Java 8 game that you will be developing
    as you read through this book.


    ## Primary Attributes of NetBeans 8.0: An Intelligent IDE


    Assuming that you already have a professional-level workstation in place for new
    media content and game development, you need to remove all the outdated JDKs and
    IDEs and make sure that you have the latest V8 Java and NetBeans software installed
    on your system and ready to go. If you are new to this and do not have a game-appropriate
    workstation, go to Walmart or PriceWatch.com, and purchase an affordable multicore
    (use a 4-, 6- or 8-core) 64-bit computer running Windows 8.1 (or 9.0 if it is
    available) that has 4GB, 6GB, or 8GB of DDR3 (1333 or 1600 memory access speed)
    system memory at the very least and a 750GB, or even 1TB, hard disk drive.


    ### NetBeans 8.0 Is Smart: Put Your Code Editing into Hyperdrive


    Although it is true that an IDE is like a word processor, only geared toward writing
    code text rather than creating business documents, a programming integrated development
    environment such as NetBeans does a lot more for your programming work process
    than a word processor does for your document-authoring work process.


    For instance, your word processor does not make suggestions in real time regarding
    the content that you are writing for your business, whereas the NetBeans IDE will
    actually look at what you are coding while you are writing that code and will
    help you write your code statements and constructs.'
