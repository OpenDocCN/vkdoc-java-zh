    因此，Image 类（对象）用于准备数字图像资源以供使用，即从其 URL 读取数据；如有必要，对其进行缩放（使用您喜欢的任何平滑和宽高比锁定方式）；并在应用程序中其他操作进行的同时，异步加载它们。需要注意的是，Image
    类（或对象）并不显示图像资源：Image 类仅负责加载它；在需要时进行缩放；并将其放置在系统内存中，以供应用程序使用。


    要显示一个 Image 对象，您需要使用第二个类（对象），称为 ImageView 类。ImageView 对象可以用作场景图上的一个节点，它引用 Image
    对象数据，然后将其“绘制”到包含该 ImageView 节点的布局容器上（在本例中，是一个 StackPane 场景图根节点和作为叶子 ImageView
    节点的父节点）。我将在下一节介绍 ImageView 类。


    从数字图像合成的角度来看，StackPane 类（对象）是图像合成引擎，或者说是图层管理器（如果您愿意这样理解的话），而每个 ImageView 对象代表图层堆栈中的一个独立图层。一个
    Image 对象包含 ImageView 图层中的数字图像数据，或者如果需要，也可以包含在多个 ImageView 中，因为 Image 对象和 ImageView
    对象是解耦的，彼此独立存在。


    JavaFX ImageView 类：在设计中显示数字图像


    **ImageView** 类是一个 **public** 类，它直接继承自 javafx.scene.Node 超类，而后者又是 java.lang.Object
    的扩展（参见第 4 章）。因此，ImageView 对象是 JavaFX 场景图中一种 **Node** 对象，用于使用 Image 对象中包含的数据来绘制视图。该类提供了允许图像重采样（调整大小）的方法，并且与
    Image 类一样，您可以锁定缩放时的宽高比，以及指定重采样算法（平滑质量）。


    ImageView 类的 Java 类层次结构始于 **java.lang.Object** 主类，并使用此类创建 **javafx.scene.Node**
    类，然后使用该类创建 ImageView Node 子类。如图 6-4 所示（第 10 行），与 Image 类一样，ImageView 包含在 JavaFX
    图像包中。ImageView 类使用以下 Java 类继承层次结构：


    ```

    java.lang.Object

      > javafx.scene.Node

        > javafx.scene.image.ImageView

    ```


    ImageView 类提供了三种不同的（重载的）**ImageView()** 构造方法。这些方法包括一个空构造方法（这是您稍后将在代码中使用的方法）；一个以
    Image 对象作为参数的方法；以及一个以 URL 字符串对象作为参数并自动创建 Image 对象的方法。要创建一个 ImageView 对象，简单的（空）ImageView()
    构造方法使用以下格式：


    ```

    ImageView()

    ```


    您将使用这个构造方法，以便我可以向您展示如何使用 **.setImage()** 方法调用来将 Image 对象加载到 ImageView 对象中。如果您想避免使用
    .setImage() 方法调用，可以使用重载的构造方法，其格式如下：


    ```

    ImageView(Image image)

    ```


    因此，“显式地”设置一个 ImageView 并将其连接到 Image 对象，如下所示：


    ```

    splashScreenBackplate = new ImageView();      // 这使用了空构造方法

    splashScreenBackplate.setImage(splashScreen);

    ```


    您可以将此压缩为一行代码，使用重载的构造方法，结构如下：


    ```

    splashScreenBackplate = new ImageView(splashScreen);  // 使用重载的构造方法

    ```


    如果您想跳过创建和加载 Image 对象的过程，也有一个构造方法可以实现，其格式如下：


    ```

    ImageView(String url)

    ```


    要在后台（**异步地**）加载图像，使用其原生（默认）分辨率和原生宽高比，Image() 构造方法使用以下格式：


    ```

    splashScreen = new Image("/invincibagelsplash.png", 640, 400, true, false, true);

    splashScreenBackplate = new ImageView();

    splashScreenBackplate.setImage(splashScreen);   // 使用空构造方法

    ```


    如果您不想指定图像尺寸、后台图像加载和平滑缩放，或者锁定任何缩放时的宽高比，您可以将前面三行 Java 代码压缩为以下构造方法：


    ```

    splashScreenBackplate = new ImageView("/invincibagel.png");   // 使用第三种构造方法

    ```


    至少在一开始（出于学习目的），我将采用较长的写法，并且我会始终显式地加载 Image 对象，使用 Image() 构造方法，以便您可以指定所有不同的属性，并查看您在此
    Java 编程逻辑中使用的所有不同图像资源。我想在这里向您展示快捷代码，因为一旦您开始将 ImageView 用作精灵（参见第 8 章），您将在本书后面使用这种方法。您可以将这种快捷方法用于您的精灵，因为您不会对它们进行缩放，并且它们经过高度优化，因此不需要后台加载。


    接下来，让我们快速看一下 TableView 类，它将保存高分表。虽然您不会在这里实现它，但我将介绍这个类，因为它是您在本章中创建和实现的顶层 UI 设计的一部分。


    JavaFX TableView 类：在设计中显示数据表


    **TableView** 类是一个 **public** 类，它直接继承自 **javafx.scene.control.Control** 超类，而后者是
    javafx.scene.layout.Region 的扩展。javafx.scene.layout.Region 是 javafx.scene.Parent
    的扩展，而 javafx.scene.Parent 又是 javafx.scene.Node 场景图超类的扩展（参见第 4 章）。因此，一个 TableView<S>
    对象是一种 UI 控件（一个表格）和 JavaFX 场景图中的 Node 对象，用于使用 S 对象构建表格，每个 S 对象包含要在表格中显示的数据。在本书后面，当获得超过表格中当前列出的分数后，您将使用这些
    S 对象将数据写入 TableView<S> 对象。


    TableView 类的 Java 类层次结构始于 **java.lang.Object** 主类，并使用此类创建 **javafx.scene.Node**
    类，然后使用该类创建 Parent 类。Parent 类用于创建 Region 类，Region 类又创建 Control 类，Control 类用于创建
    TableView 类。TableView 类具有以下 Java 类继承层次结构：


    ```

    java.lang.Object

      > javafx.scene.Node

        > javafx.scene.Parent

          > javafx.scene.layout.Region

            > javafx.scene.control.Control

              > javafx.scene.control.TableView<S>

    ```


    TableView 类提供了两种不同的（重载的）**TableView()** 构造方法：一个空构造方法，以及一个以填充了表格数据项的 **ObservableList<S>**
    对象作为参数的构造方法。一个用于创建空 TableView 对象的简单（空）TableView() 构造方法将使用以下格式：


    ```

    TableView()

    ```


    第二种构造方法类型使用来自 **javafx.collections** 包的 **ObservableList<E>** 类（对象），这是一种允许数据更改事件监听器跟踪列表中发生的任何更改的列表类型。此
    TableView 对象构造方法调用使用以下格式：


    ```

    TableView(ObservableList<S> items)

    ```

