  raw: 'Now the time has come to reorganize our .createSplashScreenNodes() method
    body, and then we will be ready to get into “wiring up” the JavaFX pulse engine
    that we created in our GamePlayLoop.java class to the Actor object that we created
    using our Actor.java, Hero.java and Bagel.java classes. We have already removed
    four lines of code from the end of the .createSplashScreenNodes() method, and
    placed them into the .loadImageAssets() method, where they more logically belong.
    The other thing that we need to do to try and streamline our .start() method is
    to group the ActionEvent handling structures with each of their respective object
    instantiations and configuration Java statements. Thus, your **gameButton** object
    instantiation, configuration, and event handling will all be kept together in
    one place, for instance. We will do the same thing for the **helpButton**, **scoreButton**,
    and **legalButton** objects. The event handling structures that I copied from
    the .start() method into the .createSplashScreenNodes() method are shown here
    in bold. The new .createSplashScreenNodes() method body will contain the following
    three dozen lines of Java code:


    ```

    private void createSplashScreenNodes() {

        buttonContainer = new HBox(12);

        buttonContainer.setAlignment(Pos.BOTTOM_LEFT);

        buttonContainerPadding = new Insets(0, 0, 10, 16);

        buttonContainer.setPadding(buttonContainerPadding);

        gameButton = new Button();

        gameButton.setText("PLAY GAME");

        gameButton.setOnAction((ActionEvent) -> {

            splashScreenBackplate.setVisible(false);

            splashScreenTextArea.setVisible(false);

        });

        helpButton = new Button();

        helpButton.setText("INSTRUCTIONS");

        helpButton.setOnAction((ActionEvent) -> {

            splashScreenBackplate.setVisible(true);

            splashScreenTextArea.setVisible(true);

            splashScreenTextArea.setImage(instructionLayer);

        });

        scoreButton = new Button();

        scoreButton.setText("HIGH SCORES");

        scoreButton.setOnAction((ActionEvent) -> {

            splashScreenBackplate.setVisible(true);

            splashScreenTextArea.setVisible(true);

            splashScreenTextArea.setImage(scoresLayer);

        });

        legalButton = new Button();

        legalButton.setText("LEGAL & CREDITS");

        legalButton.setOnAction((ActionEvent) -> {

            splashScreenBackplate.setVisible(true);

            splashScreenTextArea.setVisible(true);

            splashScreenTextArea.setImage(legalLayer);

        });

            buttonContainer.getChildren().addAll(gameButton, helpButton, scoreButton,
    legalButton);

            splashScreenBackplate = new ImageView();

            splashScreenBackplate.setImage(splashScreen);

            splashScreenTextArea = new ImageView();

            splashScreenTextArea.setImage(instructionLayer);

        }

    ```


    Notice that since the .loadImageAssets() method is called **before** the .createSplashScreenNodes()
    method, that we can still keep the last four lines of code in the method body
    that reference the loaded Image assets in place. This is because the splashScreen
    and instructionLayer Image objects have been created, and loaded with their digital
    image assets, in the top part of the .loadImageAssets() method. Since this method
    is called inside the .start() method before the .createSplashScreenNodes() method
    is called, these objects can be safely used inside of this method body.


    As you can see in [Figure 11-10](#9781484204160_Ch11.xhtml#Fig10), the new method
    is error-free and all of the objects, including the HBox named buttonContainer,
    Button(s) named gameButton, helpButton, scoreButton and legalButton, and ImageView(s)
    named splashScreenBackplate and splashScreenTextArea, are all logically grouped
    together, and are now well organized.


    ![9781484204160_Fig11-10.jpg](OEBPS/Images/9781484204160_Fig11-10.jpg)


    [Figure 11-10](#9781484204160_Ch11.xhtml#_Fig10). Copy .setOnAction() event handlers
    from the .start() method into the .createSplashScreenNodes() method


    Since we don’t have to do anything to your **.addNodesToStackPane()** method,
    we are finished with the code reorganization that we needed to do here, before
    we take this game to the next level of complexity! Every now and then, you need
    to go back and make sure that your programming logic is optimally structured,
    so that when you build more complex structures, you have a solid foundation to
    build upon, just like you’re building a real building structure.


    Powering the iBagel Actor: Using the GamePlayLoop


    Next let’s “wire up” or make the connection between these game engines that we
    have been putting into place in our game code infrastructure during the first
    half of the book. The first thing that we will need to do is to tell our GamePlay
    Engine in the GamePlayLoop AnimationTimer subclass that we want to have it look
    at (update) the iBagel Bagel object on every pulse. There are two major lines
    of code that we will need to install in the GamePlayLoop.java class for this to
    happen. The first is a reference to the **static** Bagel object named iBagel that
    we declared in the code that is shown in [Figure 11-3](#9781484204160_Ch11.xhtml#Fig3)
    using the **import static invincibagel.InvinciBagel.iBagel** Java statement. The
    second line of code that we need to install will live inside of the .handle()
    method, and will serve to “wire” the .handle() method (the pulse engine) to the
    iBagel object using its .update() method. The new GamePlayLoop class import statements
    and .handle() method should look like the following Java code, shown error-free
    in [Figure 11-11](#9781484204160_Ch11.xhtml#Fig11):


    ```

    import javafx.animation.AnimationTimer;

    import static invincibagel.InvinciBagel.iBagel;

    public class GamePlayLoop extends AnimationTimer {

        @Override

        public void handle(long now) {

            iBagel.update();

        }

    }

    ```


    ![9781484204160_Fig11-11.jpg](OEBPS/Images/9781484204160_Fig11-11.jpg)


    [Figure 11-11](#9781484204160_Ch11.xhtml#_Fig11). Add a Java statement inside
    of the GamePlayLoop .handle() method invoking an iBagel.update() method


    What the **iBagel.update()** Java statement does is to call the .update() method
    for the Bagel object named iBagel on every pulse event. Anything that you put
    into this .update() method will be executed 60 times every second. Any other Actor
    object that you want processed at 60 FPS, simply add a similar .update() call
    to this .handle() method.


