- fmt: '接下来，让我们来看看你在本章中编写的场景图实现占用了多少CPU周期，因为你希望确保一个100%静态的顶层UI设计，这样游戏中唯一使用的动态元素就是游戏引擎（及相关引擎）本身。由于脉冲解析引擎对场景图层次结构的遍历可能会变得“昂贵”，你需要非常小心！


    请记住，你的主要目标是创建一个用于启动游戏画面和循环的顶层UI设计，同时实现一个允许用户显示说明、法律免责声明和制作人员名单的UI，并负责设置一个用于显示高分表的区域。同时，你的任务是将99%的处理能力保留下来，供后续处理游戏逻辑、精灵移动、精灵动画、碰撞检测、计分以及通过JavaFX脉冲引擎实现的物理效果。


    **分析InvinciBagel场景图的脉冲效率**


    游戏UI设计不能占用CPU的任何处理能力，这一点非常重要，因为游戏引擎将需要所有这些处理能力。如[图6-13](#9781484204160_Ch06.xhtml#Fig13)所示，你可以使用**Profile
    > Profile Project (InvinciBagel)**菜单序列来运行分析器，并截取当前（顶层UI）应用程序的CPU统计信息截图。


    ![9781484204160_Fig06-13.jpg](OEBPS/Images/9781484204160_Fig06-13.jpg)


    [图6-13](#9781484204160_Ch06.xhtml#_Fig13). 分析到目前为止的场景图UI设计，以确保它不使用任何可感知的CPU周期


    正如你在图中右侧的**Total Time**列中所看到的，`createSplashScreenNodes()`方法执行耗时279毫秒，大约十分之三秒，你的场景图被创建。`addNodesToStackPane()`方法执行耗时约3毫秒，即千分之三秒。


    如果你查看线程分析输出并点击UI按钮元素，你会看到线程上出现一个颜色闪烁，显示按钮点击的处理开销，正如你所见，每次点击不到十分之一秒（查看最右侧的**Invocations**列，可以看到我测试按钮点击功能的次数）。我高亮显示了线程视图，在其中我点击了High
    Scores，然后是Legal和Credits按钮UI元素（参见[图6-14](#9781484204160_Ch06.xhtml#Fig14)）。在这个视图中你也可以看到，当前设计使用的资源极少。


    ![9781484204160_Fig06-14.jpg](OEBPS/Images/9781484204160_Fig06-14.jpg)


    [图6-14](#9781484204160_Ch06.xhtml#_Fig14). 分析到目前为止的场景图UI设计，以确保它不使用任何可感知的线程开销


    Java 8及其JavaFX引擎生成了近十几个线程，因此你的游戏应用程序已经是高度多线程的，而在当前时间点它甚至不需要这样！Oracle的团队正在努力使JavaFX成为首屈一指的游戏引擎，因此性能只会越来越好，这对Java
    8游戏开发者来说是个好消息！


    **总结**


    在第六章中，你亲自动手进行了游戏的**顶层UI设计**，并概述了底层的**游戏引擎组件设计**，以及找出最高效的**场景图节点设计**。然后，你重新回到Java
    8游戏编程，并重新设计了最初由NetBeans 8.0创建的现有引导Java 8代码。


    由于这个NetBeans生成的Java代码设计并不适合你的需求，你完全重写了它，使其更有条理。你通过创建两个自定义Java方法`createSplashScreenNodes()`和`addNodesToStackPane()`来实现这一点，以**模块化**场景图节点的创建过程，以及将三个父节点（和叶节点）对象添加到场景图**根节点**（在本例中是`StackPane`对象，你利用其多层UI对象合成能力）。


    接下来，你学习了一些用于实现这些新方法的JavaFX类，包括来自`javafx.geometry`包的`Pos`类和`Insets`类；来自`javafx.scene.image`包的`Image`和`ImageView`类；来自`javafx.scene.layout`包的`HBox`类；以及来自`javafx.scene.control`包的`TableView`类。你编写了新的`createSplashScreenNodes()`方法，该方法实例化并配置了`HBox`对象（使用`Insets`对象），然后是`Image`和`ImageView`对象以及四个`Button`对象。一旦所有这些场景图节点被实例化和配置，你编写了一个`addNodesToStackPane()`方法，将节点对象添加到`StackPane`根对象中，以便它们能被`Stage`对象显示，该对象引用了场景图的根对象。接着，你测试了你的顶层游戏应用程序UI设计。然后，你添加了最后几个`Image`对象，并加入了`ActionEvent`事件处理程序逻辑。最后，你对应用程序进行了分析，以确保其高效。


    在下一章中，我将介绍**JavaFX**脉冲引擎和`AnimationTimer`类，以便你可以为你的Java 8游戏引擎创建**基础设施**，该引擎将实时处理你的游戏事件。


    **第七章**


    ![image](OEBPS/Images/frontdot.jpg)


    **游戏循环的基础：JavaFX脉冲系统与游戏处理架构**


    现在你已经创建了用户学习如何玩游戏、开始游戏、查看高分以及查看法律免责声明和Ira H. Harrison Rubin的InvinciBagel知识产权游戏制作人员名单所需的顶层UI屏幕，让我们开始着手为你的InvinciBagel游戏创建游戏循环定时。从**用户体验**的角度来看，这一点至关重要，并且对于你将在本书剩余部分创建的不同**游戏引擎**（包括**精灵引擎**、**碰撞检测引擎**、**动画引擎**、**计分引擎**和**物理引擎**）的正常运行也至关重要。你将始终牢记游戏**流畅性**；在游戏的这个阶段（无意双关），高效、最优地实现JavaFX**脉冲**系统至关重要。因此，我将在本章中详细介绍`javafx.animation`包，以及其所有功能类之间的区别。


    首先，你将探索`javafx.animation`包中的两个**动画超类**：`Animation`和`AnimationTimer`。之后，你将查看`Animation`、`Timeline`和`Transition`，以及这些类及其任何子类（如`PathAnimation`和`TranslateAnimation`）如何允许你访问JavaFX**脉冲事件定时系统**。现在，如果你想创建一个动作导向的街机类Java
    8游戏，你需要使用脉冲！'
  raw: 'Next, let’s take a look at how many CPU cycles are being taken up by the Scene
    Graph implementation that you have coded in this chapter, as you want to ensure
    a 100 percent static, top-level UI design so that the only dynamic elements used
    in your game are the game play engine (and related engines) themselves. Because
    the traversal of the Scene Graph hierarchy by the pulse resolution engine can
    get “expensive,” you need to be very careful here!


    Remember that your primary objective is to create a top-level UI design for starting
    the game play screen and loop, while also implementing a UI that allows your users
    to display the instructions, legal disclaimers, and production credits and take
    care of setting up an area to use for displaying the high scores table. At the
    same time, you are tasked with saving 99 percent of the processing power for use
    later on, for processing the game logic, sprite movements, sprite animation, collision
    detection, scoring, and physics via the JavaFX pulse engine.


    Profiling the InvinciBagel Scene Graph for Pulse Efficiency


    It is important that the game UI design not take any processing power away from
    the CPU, as the game engine is going to need all of it. As [Figure 6-13](#9781484204160_Ch06.xhtml#Fig13)
    reveals, you can use the **Profile > Profile Project (InvinciBagel)** menu sequence
    to run the Profiler and take a screenshot of the CPU statistics for the current
    (top-level UI) application.


    ![9781484204160_Fig06-13.jpg](OEBPS/Images/9781484204160_Fig06-13.jpg)


    [Figure 6-13](#9781484204160_Ch06.xhtml#_Fig13). Profiling the Scene Graph UI
    design thus far to make sure that it does not use any perceptible CPU cycles


    As you can see in the **Total Time** column, on the right-hand side of the figure,
    the createSplashScreenNodes() method takes 279 milliseconds, or approximately
    three-tenths of a second, to execute, and your Scene Graph is created. The addNodesToStackPane()
    method takes approximately 3 milliseconds, or three one-thousandths of a second,
    to execute.


    If you look at the threads profiling output and click the UI button elements,
    you will see a blip of color appear on the thread, showing the processing overhead
    of a button click, which, as you can see, is less than one-tenth of a second per
    click (look at the **Invocations** column, on the far right, to see how many times
    I tested the button click functions). I highlighted the threads view, where I
    clicked High Scores, and then the Legal and Credits button UI elements (see [Figure
    6-14](#9781484204160_Ch06.xhtml#Fig14)). As you can see in this view as well,
    the current design is using minimal resources.


    ![9781484204160_Fig06-14.jpg](OEBPS/Images/9781484204160_Fig06-14.jpg)


    [Figure 6-14](#9781484204160_Ch06.xhtml#_Fig14). Profiling the Scene Graph UI
    design thus far to make sure that it does not use any perceptible thread overhead


    Java 8 and its JavaFX engine spawned nearly a dozen threads, so your game application
    is already highly multithreaded, and it does not even need to be at this point
    in time! The teams at Oracle are working diligently at making JavaFX the premier
    game engine, so the performance just keeps getting better and better, which is
    great news for Java 8 game developers!


    Summary


    In this sixth chapter, you got your hands dirty doing the actual **top-level UI
    design** for your game as well as outlining the underlying **game engine component
    design** and figuring out the most efficient **Scene Graph node design**. Then,
    you got back into Java 8 game programming and redesigned your existing bootstrap
    Java 8 code, originally created by NetBeans 8.0.


    Because this NetBeans-generated Java code design was not optimal for your purposes,
    you rewrote it completely to make it more organized. You did this by creating
    two custom Java methods,**.createSplashScreenNodes()** and **.addNodesToStackPane()**,
    to **modularize** the Scene Graph node creation process as well as the adding
    of the three Parent (and leaf) Node objects to the Scene Graph **root** (in this
    case, the **StackPane** object, which you are using for its multilayer UI object-compositing
    capability).


    Next, you learned about some of the JavaFX classes for implementing these new
    methods, including the **Pos** class and the **Insets** class, from the **javafx.geometry**
    package; the **Image** and the **ImageView** class, from the **javafx.scene.image**
    package; the **HBox** class, from the **javafx.scene.layout** package; and the
    **TableView** class, from the **javafx.scene.control** package. You coded the
    new .createSplashScreenNodes() method, which instantiated and configured the HBox
    object, using the Insets object, and then the Image and ImageView objects and
    the four Button objects. Once all these Scene Graph nodes were instantiated and
    configured, you wrote an .addNodesToStackPane() method to add Node objects to
    the StackPane root object so that they would be displayed by the Stage object,
    which references the Scene Graph’s root object. Next, you tested your top-level
    game application UI design. Then, you added in the last couple of Image objects
    and added ActionEvent EventHandler program logic. Finally, you profiled the application
    to make sure it was efficient.


    In the next chapter, I will present the **JavaFX** pulse engine and the AnimationTimer
    class so that you can create the **infrastructure** for your Java 8 game engine,
    which will process your game events in real time.


    CHAPTER 7


    ![image](OEBPS/Images/frontdot.jpg)


    The Foundation of Game Play Loop: The JavaFX Pulse System and the Game Processing
    Architecture


    Now that you have created the top-level UI screens needed for your user to learn
    how to play the game, start the game, view high scores, and review the legal disclaimers
    and Ira H. Harrison Rubin’s InvinciBagel intellectual property game production
    credits, let’s get down to business and create the game play timing loop for your
    InvinciBagel game. This is of the greatest importance from a **user experience**
    standpoint, and is also critical to the proper functioning of the different **game
    engines** that you will be creating over the course of the remainder of this book,
    including the **sprite engine**, **collision detection engine**, **animation engine**,
    **scoring engine**, and **physics engine**. You will always keep **smoothness**
    of game play in mind; the efficient, optimal implementation of the JavaFX **pulse**
    system is of paramount importance at this stage of the game (no pun intended).
    For this reason, I will be going into great detail in this chapter regarding the
    **javafx.animation** package, and how all of its functional classes differ from
    each other.


    First, you will explore the two **Animation superclasses** in the javafx.animation
    package: **Animation** and **AnimationTimer**. After that, you will take a look
    at Animation, **Timeline**, and **Transition** and how these classes, and any
    of their subclasses, such as **PathAnimation** and **TranslateAnimation**, will
    allow you to access the JavaFX **pulse event timing system**. Now, you need to
    use pulse, if you want to create an action-oriented arcade type Java 8 game!'
