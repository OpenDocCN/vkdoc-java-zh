    Java 8 游戏设计中。


    有趣的是，在 Java 编程中，事情并不总是像你期望的那样直接和一致，因为为了达到完全相同的结果（为设计元素安装一个透明的背景颜色/图像**底板**），你到目前为止已经使用了三种不同的方法调用，传入了三种自定义对象类型：.initStyle(StageStyle
    对象)、.setFill(Color 对象) 和 .setBackground(Background 对象)。


    这一次，你将调用 .setBackground(Background value) 方法，并使用另一个 Background 类（对象）常量 **EMPTY**。如图
    4-8 所示，一旦你在名为 root 的 StackPane 对象上调用该方法，NetBeans 将帮助你找到该常量，使用以下 **Java 语句：root.setBackground(Background.EMPTY);**。NetBeans
    会提供一个方法选择器下拉菜单，一旦你选择了一个方法，就会显示一个信息对话框，说明该方法的来源（超类）、功能以及详细描述。在这种情况下，**null**（无内容）、零颜色填充或零图像设置等同于
    TRANSPARENT。现在，你可以通过使用 **run project** 工作流程来测试你的无窗口（透明）应用版本。


    ![9781484204160_Fig04-08.jpg](img/9781484204160_Fig04-08.jpg)


    图 4-8. 在名为 root 的 StackPane 对象上调用带有 Background.EMPTY 常量的 .setBackground() 方法


    正如你在图 4-9 中所见，你现在已经实现了目标，桌面上仅可见 Button 对象。我将 NetBeans IDE 8.0 的顶部稍微下拉了一点，以便你能看到这个效果有多棒，同时还能看到你为实现这一最终结果而添加的三行
    Java 代码。利用 2D、3D 和 Alpha 通道，可以通过这种 **StageStyle.TRANSPARENT** 功能创建一些非常酷炫的应用，所以我想在本书的早期就向你展示这一点，并在这个
