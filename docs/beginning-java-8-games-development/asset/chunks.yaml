  trans: '

    视频流是一个比分辨率更复杂的概念，因为它涉及在广阔范围内播放视频数据，例如在你的 Java 8 游戏应用与远程视频数据服务器之间，该服务器将存储你潜在的海量数字视频资产。此外，你的
    Java 游戏应用所运行的设备将与远程数据服务器实时通信，在视频播放时接收**视频数据包**（之所以称为流式传输，是因为视频从视频服务器通过互联网流式传输到硬件设备）。MPEG-4
    H.264 AVC 格式编解码器（编码器-解码器对）支持视频流式传输。


    你需要理解的最后一个概念是**比特率**。比特率是视频压缩过程中使用的关键设置，因为比特率代表你的**目标带宽**，或者能够容纳**每秒流经它的特定数量比特**的**数据管道大小**。比特率设置还应考虑任何支持
    Java 的设备中的 CPU 处理能力，这使得数字视频的数据优化更具挑战性。幸运的是，如今大多数设备都配备了双核或四核 CPU！


    一旦比特流经数据管道，它们还需要在设备屏幕上被**处理**和**显示**。因此，数字视频资产的比特率不仅需要针对带宽进行优化，还需要预见到 CPU 处理能力的差异。一些单核
    CPU 可能无法在不**丢帧**的情况下解码高分辨率、高比特率的数字视频资产，因此，如果你的目标是较旧或较便宜的消费电子设备，请务必优化低比特率视频资产。


    数字视频数据占用空间优化：使用编解码器及其设置


    如前所述，你的数字视频资产将使用称为编解码器的软件工具进行压缩。视频编解码器有两个“方面”：一个用于编码视频数据流，另一个用于解码。视频解码器将是使用它的操作系统、平台（JavaFX）或浏览器的一部分。解码器主要针对速度进行优化，因为播放的流畅性是一个关键问题，而编码器则针对减少其生成的数字视频资产的数据占用空间进行优化。因此，编码过程可能需要很长时间，具体取决于工作站包含多少个处理核心。大多数数字视频内容制作工作站应支持八个处理器核心，就像我的
    64 位 AMD 八核工作站一样。


    编解码器（编码器端）就像插件一样，可以安装到不同的数字视频编辑软件包中，使它们能够编码不同的数字视频资产文件格式。由于 Java 和 JavaFX 8 支持
    MPEG-4 H.264 AVC 格式，你需要确保使用的是支持使用（或转换为）此数字视频文件格式编码数字视频数据的数字视频软件包之一。不止一家软件制造商生产
    MPEG-4 编码软件，因此会有不同的 MPEG-4 AVC 编解码器，它们在编码速度和文件大小方面会产生不同（更好或更差）的结果。我强烈推荐的专业解决方案是
    Sorenson Squeeze Pro，如果你想专业地制作数字视频。


    还有一个名为 EditShare LightWorks 12 的开源解决方案，计划在 2014 年原生支持输出到 MPEG4 编解码器。在优化（设置压缩设置）数字视频数据文件大小时，有许多变量直接影响数字视频数据占用空间。我将按照它们对视频文件大小影响的重要性顺序进行讨论，从最重要到最不重要，以便你知道应该调整哪些参数来获得你想要的结果。


    与数字图像压缩一样，视频每一帧的分辨率或像素数是开始优化过程的最佳起点。如果你的用户使用的是 800 × 480 或 **1,280 × 720** 的智能手机、电子阅读器或平板电脑，那么你不需要使用真正的全高清
    1,920 × 1,080 分辨率来为你的数字视频资产获得良好的视觉效果。有了超精细密度（小点距）的显示屏，你可以将 1,280 视频放大 33%，它看起来会相当不错。例外情况可能是针对
    iTV 的高清或超高清（通常称为 4K iTV）游戏；对于这些巨大的 55 到 75 英寸（屏幕）场景，你会希望使用行业标准、真正的全高清 **1,920
    × 1,080** 分辨率。


    下一个优化级别来自**每秒使用的帧数**（或 **FPS**），假设数字视频本身的实际秒数无法缩短。如前所述，这被称为帧率，与其设置**视频标准 30FPS**
    帧率，不如考虑使用**电影标准**帧率 24FPS，甚至**多媒体标准**的 **20FPS**。你甚至可以使用 **15FPS** 的帧率，即视频标准的一半，具体取决于内容中运动的数量（和速度）。请注意，15FPS
    的数据量是 30FPS 的**一半**（编码数据减少 100%）。对于某些视频内容，其播放效果（看起来）与 30FPS 内容相同。测试这一点的唯一方法是在编码过程中尝试不同的帧率设置。


    下一个获得更小数据占用空间的最优设置是**你为编解码器设定的目标比特率**。比特率等同于**应用的压缩量**，从而为数字视频数据设定一个**质量水平**。需要注意的是，你可以简单地使用
    30FPS、1,920 分辨率的高清视频，并指定一个较低的比特率上限。如果你这样做，结果看起来不会像你尝试使用较低的帧率和分辨率，同时配合较高（质量）比特率设置那样好。对此没有固定的规则，因为每个数字视频资产都包含完全独特的数据（从编解码器的角度来看）。


    下一个获得更小数据占用空间的最有效设置是编解码器用于**采样**数字视频的**关键帧**数量。视频编解码器通过查看每一帧，然后仅对接下来几帧中的变化或**偏移量**进行编码来应用压缩，这样编解码器算法就不必对视频数据流中的每一帧都进行编码。这就是为什么“说话头像”视频比每一帧中每个像素都在移动的视频（例如使用快速摄像机平移或快速视野
    [FOV] 缩放）编码效果更好的原因。


    关键帧是编解码器中的一个设置，它强制编解码器每隔一段时间对视频数据资产进行一次**全新采样**。关键帧通常有一个**自动设置**，允许编解码器决定采样多少个关键帧，以及一个**手动设置**，让你指定每隔多长时间进行一次关键帧采样，通常是每秒一定次数或在整个视频持续时间内（总帧数）。


    大多数编解码器通常都有一个**质量**或**锐度**设置（滑块），用于控制在压缩前应用于视频帧的**模糊**程度。如果你不熟悉这个技巧，对图像或视频应用轻微的模糊（这通常是不希望的）可以实现更好的压缩，因为图像中锐利的过渡（边缘）更难编码，需要更多数据来再现，而柔和的过渡则更容易。话虽如此，我会将质量（或锐度）滑块保持在
    80% 到 100% 之间，并尝试使用我在此讨论的其他变量之一来减少数据占用空间，例如降低分辨率、帧率或比特率。

