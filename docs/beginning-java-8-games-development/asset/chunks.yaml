- fmt: '在[第4章](#9781484204160_Ch04.xhtml)中，我向你介绍了Alpha通道和透明度的概念。你需要对精灵（`sprites`）实现同样的最终效果，以在游戏中创造无缝的视觉体验。游戏玩法的下一个最重要方面是**碰撞检测**（`collision
    detection`），因为如果你的精灵只是在屏幕上彼此飞过，并且在它们接触或“相交”时从不做任何酷炫的事情，那么你的游戏实际上就没什么可玩的了！一旦你添加了一个碰撞检测引擎（由**相交逻辑**（`intersection
    logic`）处理例程组成），你的游戏就能确定任意两个精灵何时接触（边缘）或相互重叠。碰撞检测将调用（触发）其他逻辑处理例程，这些例程将决定当任意两个给定的精灵（例如，一个抛射物和主角）相交时会发生什么。例如，当一个抛射物与主角相交时，可能会累积伤害点数，生命值指数可能会降低，或者可能会启动一个死亡动画。相反，如果一个宝藏物品与主角相交（被主角拾取），可能会累积能量或能力点数，生命值指数可能会增加，或者可能会启动一个“我找到了”的欢呼动画。正如你所见，除了精灵（角色、抛射物、宝藏、敌人、障碍物等）本身之外，游戏的碰撞检测是游戏玩法的基础设计元素之一，这就是为什么我在本书早期就介绍这个概念的原因。


    对游戏玩法而言，下一个重要的概念是**真实世界物理模拟**（`real-world physics simulation`）。添加诸如重力、摩擦力、弹力、阻力、加速度、运动曲线（例如JavaFX的`Interpolator`类提供的功能）等元素，会在已经逼真的精灵、同步动画序列、风景背景和高精度碰撞检测之上，增加一个额外的真实感层次。


    最后，要添加到游戏玩法中的最专有的属性或逻辑结构（Java代码）是**自定义游戏玩法逻辑**（`custom game play logic`），它使你的游戏在市场上真正独一无二。此逻辑应保存在其自己的Java类或方法中，与物理模拟和碰撞检测代码分开。毕竟，如果你学习面向对象编程（OOP）概念并将其应用到你的编程逻辑中，Java
    8能使你的代码模块化结构良好。


    当你开始将所有游戏组件组合在一起时，它们开始使游戏更可信，也更专业。一款伟大游戏的关键目标之一是**信念的暂停**（`suspension of belief`），这意味着你的玩家完全接受了游戏的设定、角色、目标和玩法。这也是任何内容创作者——无论是电影制作人、电视制片人、作家、词曲作者、Java
    8游戏程序员还是应用程序开发者——所追求的目标。如今的游戏，即使不比其它内容分发类型更具创收能力，也至少具有同等的创收能力。


    接下来，让我们看看可以创建的不同类型的游戏，以及它们在应用精灵、碰撞检测、物理模拟和游戏玩法逻辑这些核心游戏组件方面的差异。


    **游戏类型：益智游戏、棋盘游戏、街机游戏、混合型游戏**


    就像我在本章中讨论的所有其他内容一样，游戏本身也可以使用静态与动态的分类方法进行归类。静态游戏不受处理器限制，因为它们往往是回合制的，本质上不依赖手眼协调，因此从某种意义上说，它们更容易流畅运行；只需要实现并调试好游戏规则的编程逻辑和精美的图形即可。此外，还存在一个巨大的机会，即开发使用静态和动态游戏玩法以创造性新方式（前所未见）结合的混合型游戏类型。我自己就在研究其中的几个！


    因为这是一本关于Java 8编程的书，我将从这一角度出发来处理所有事情，这恰好是将游戏划分为不同类别（静态、动态、混合）的好方法，所以让我们先介绍静态（固定图形）、回合制游戏。这些包括**棋盘游戏**（`board
    games`）、**益智游戏**（`puzzle games`）、**知识游戏**（`knowledge games`）、**记忆游戏**（`memory
    games`）和**策略游戏**（`strategy games`），所有这些游戏的受欢迎程度和适销性都不应被低估。


    静态游戏的酷炫之处在于，它们可以像动态游戏一样有趣，但处理开销要少得多，因为它们不需要达到每秒60帧（60FPS）的实时处理目标来实现流畅、专业的游戏体验。这是因为这类游戏的性质根本不依赖于运动，而是依赖于在轮到你行动时做出正确的**战略移动**（`strategic
    move`）。


    在静态游戏中，可能会涉及某些形式的碰撞检测，以判断哪个游戏棋子已被移动到棋盘或游戏板上的特定位置；然而，不存在碰撞检测使处理器过载的风险，因为除了在该特定玩家回合中被战略移动的那个棋子外，游戏板的其余部分是静态的。


    策略游戏的处理逻辑更多是基于**策略逻辑**（`strategy logic`）的编程，旨在允许玩家通过正确的移动序列来达成最终胜利；而动态游戏编程逻辑则更多地关注游戏精灵之间发生的碰撞。动态游戏侧重于得分、躲避抛射物、寻找宝藏、完成关卡目标和消灭敌人。


    具有大量相互关联规则的复杂策略游戏（如国际象棋）可能拥有比动态游戏多得多的编程逻辑例程。然而，由于代码的执行对时间不那么敏感，无论平台和CPU有多强大，最终的游戏体验都会很流畅。当然，对于这类游戏来说，游戏规则集逻辑必须完美无缺才能真正专业。所以，归根结底，静态游戏和动态游戏都很难编码，尽管原因不同。


    动态游戏可称为**动作游戏**（`action games`）或**街机游戏**（`arcade games`），包含显示屏上的大量运动。这些高度动态的游戏几乎总是涉及射击（例如第一人称射击游戏，如《毁灭战士》、《半条命》；以及第三人称射击游戏，如《生化危机》、《侠盗猎车手》），或者偷窃、躲避。还有常见的障碍赛道导航范式，常见于平台游戏，如《大金刚》和《超级马里奥》。


    需要注意的是，任何类型的游戏都可以使用2D或3D图形和资源来制作，甚至可以使用2D和3D资源的组合，正如我在[第4章](#9781484204160_Ch04.xhtml)中指出的，JavaFX允许这样做。


    流行的游戏类型如此之多，以至于总是有机会通过使用静态（策略）游戏类型和动态（动作）游戏类型的混合方法来创造一个全新的游戏类型。


    **游戏设计资源：新媒体内容概念**'
  raw: 'In [Chapter 4](#9781484204160_Ch04.xhtml), I introduced you to the concept
    of alpha channels and transparency. You will need to achieve this same end result
    with your sprites to create a seamless visual experience with your game. The next
    most important aspect of game play is **collision detection**, because if your
    sprites simply flew right past each other on the screen and never did anything
    cool when they touched, or “intersected” each other, then you really would not
    have much of a game! Once you add a collision detection engine (composed of **intersection
    logic** processing routines) your game can ascertain when any two sprites are
    touching (edges) or overlapping each other. A collision detection will call (trigger)
    other logic processing routines that will determine what happens when any two
    given sprites, such as a projectile and the main character, intersect. For example,
    when a projectile intersects the main character, damage points might accrue, life
    force index might be decreased, or a death animation may be started. In contrast,
    if a treasure item intersects with (is picked up by) the main character, power
    or capability points might accrue, the life force index might be increased, or
    an “I found it” jubilation animation might be started. As you can see, the collision
    detection for your game is one of the foundational design elements of your game
    play, besides the sprites (characters, projectiles, treasures, enemies, obstacles,
    and so on) themselves, which is why I am covering this concept early on in the
    book.


    The concept next in significance to your game play is **real-world** **physics
    simulation**. The addition of things like gravity; friction; bounce; drag; acceleration;
    motion curves, such as the JavaFX Interpolator class provides; and the like add
    an additional level of realism on top of the already photo-realistic sprites,
    synchronized animation sequences, scenic backgrounds, and highly accurate collision
    detection.


    Finally, the most proprietary attribute, or logic construct (Java code), to add
    to your game play is the **custom game play logic**, which makes your game truly
    unique in the marketplace. This logic should be kept in its own Java class or
    methods, separate from physics simulation and collision detection code. After
    all, Java 8 makes your code modularization well-structured if you learn the OOP
    concepts and apply them to your programming logic!


    When you start to add all these game components together, they begin to make the
    game more believable as well as more professional. One of the key objectives for
    a great game is suspension of belief, which means that your player is buying into
    the premise, characters, objectives, and game play completely. This is the same
    objective that any content producer, whether he or she be a filmmaker, television
    producer, author, songwriter, Java 8 game programmer, or application developer,
    is going for. Games these days have the same revenue-generating capability as
    any of the other content distribution genres, if not more.


    Next, let’s take a look at the different types of games that can be created and
    how these differ in their application of the core game components of sprites,
    collision detection, physics simulation, and game play logic.


    Types of Games: Puzzles, Board Games, Arcade Games, Hybrids


    Like everything else I have talked about in this chapter, games themselves can
    be categorized by using a static-versus-dynamic classification approach. Static
    games are not processor bound, because they tend to be turn based and not hand-eye
    coordination based in nature, and so, in a sense, they are easier to get working
    smoothly; only the programming logic for the rules of game play and the attractive
    graphics have to be put in place and debugged. A significant opportunity also
    exists for developing new types of game genres that use a hybrid combination of
    static and dynamic game play in creative new ways that have never before been
    seen. I am working on a few of these myself!


    Because this is a Java 8 programming title, I am going to approach everything
    from this standpoint,  which happens to be a great way to divide games into discrete
    categories (static, dynamic, hybrid), so let’s cover the static (fixed graphics),
    turn-based games first. These include **board games**, **puzzle games**, **knowledge
    games**, **memory games**, and **strategy games**, all of which should not be
    underestimated in their popularity and marketability.


    The thing that is cool about static games is that they can be just as fun to play
    as dynamic games and have significantly less processing overhead, as they do not
    have to achieve the 60FPS real-time processing target to achieve smooth, professional
    game play. This is because the nature of the game is not predicated on motion
    at all, but rather on making the right **strategic move**, but only when it is
    your turn to do so.


    There can be some forms of collision detection involved in static games regarding
    which game piece has been moved to a given location on the gameboard or playing
    surface; however, there is no danger of overloading the processor with collision
    detection, because the rest of the game board is static, with the exception of
    the one piece that is being strategically moved during that particular player’s
    turn.


    The processing logic for strategy games is more **strategy logic**–based programming,
    geared toward allowing the players to achieve an end win, given the right sequence
    of moves, whereas the dynamic game programming logic looks more at what collisions
    are taking place between game sprites. Dynamic games are focused on point score,
    dodging projectiles, finding treasures, completing level objectives, and killing
    enemies.


    Complicated strategy games with lots of interrelated rules, such as chess, are
    likely to have far more programming logic routines than dynamic games. Yet, because
    the execution of the code is not as time sensitive, the resulting game play will
    be smooth, no matter how powerful the platform and CPU are. Of course, the game
    rule set logic must be flawless for this type of game to truly be professional,
    so, in the end, both static and dynamic games are difficult to code, albeit for
    different reasons.


    Dynamic games could be termed **action games** or **arcade games** and include
    a lot of movement on the display screen. These highly dynamic games almost always
    involve shooting things, such as in the first-person shooter (e.g., Doom, Half-Life)
    as well as in the third-person shooter (Resident Evil, Grand Theft Auto) genres,
    or stealing things, or evading things. There is also the obstacle course navigation
    paradigm, commonly seen in platform games, such as Donkey Kong and Super Mario.


    It is important to note that any genre of game can be produced using 2D or 3D
    graphics and assets or even a combination of 2D and 3D assets, which, as I pointed
    out in [Chapter 4](#9781484204160_Ch04.xhtml), is allowed by JavaFX.


    There are so many popular game types that there is always the opportunity to create
    an entirely new genre of game by using a hybrid approach of a static (strategic)
    game type and a dynamic (action) game type.


    Game Design Assets: New Media Content Concepts'
  trans: '

    在第 4 章中，我向你介绍了 Alpha 通道和透明度的概念。你需要对游戏精灵实现同样的最终效果，以营造无缝的视觉体验。游戏玩法中下一个最重要的方面是**碰撞检测**，因为如果你的精灵在屏幕上只是彼此擦肩而过，在接触或“相交”时从未触发任何酷炫效果，那么你的游戏实际上就没什么可玩性了！一旦你添加了碰撞检测引擎（由**相交逻辑**处理例程组成），你的游戏就能判断任意两个精灵何时接触（边缘）或相互重叠。碰撞检测会调用（触发）其他逻辑处理例程，这些例程将决定当任意两个给定精灵（例如，一个投射物和主角）相交时会发生什么。例如，当投射物与主角相交时，可能会累积伤害点数，生命值指数可能会降低，或者可能会触发死亡动画。相反，如果一件宝物与主角相交（被拾取），可能会累积能量或能力点数，生命值指数可能会增加，或者可能会触发“我找到了”的欢呼动画。正如你所见，除了精灵（角色、投射物、宝物、敌人、障碍物等）本身之外，游戏的碰撞检测是游戏玩法的基础设计元素之一，这就是我在这本书中较早介绍这个概念的原因。


    对游戏玩法而言，下一个重要的概念是**真实世界物理模拟**。添加诸如重力、摩擦力、弹力、阻力、加速度、运动曲线（例如 JavaFX 的`Interpolator`类所提供的）以及类似效果，会在已经逼真的精灵、同步动画序列、场景背景和高精度碰撞检测之上，增加额外的真实感。


    最后，要添加到游戏玩法中的最独特属性或逻辑结构（Java 代码）是**自定义游戏玩法逻辑**，它使你的游戏在市场上真正独一无二。此逻辑应保存在其自己的 Java
    类或方法中，与物理模拟和碰撞检测代码分开。毕竟，如果你学习面向对象编程（OOP）概念并将其应用于编程逻辑，Java 8 能让你的代码模块化结构良好。


    当你开始将这些游戏组件整合在一起时，它们会让游戏变得更可信，也更专业。一款优秀游戏的关键目标之一是“沉浸感”，这意味着你的玩家完全相信游戏的设定、角色、目标和玩法。这也是任何内容创作者——无论是电影制作人、电视制片人、作家、词曲作者、Java
    8 游戏程序员还是应用程序开发者——所追求的目标。如今的游戏，即使不比其它内容分发类型更具创收能力，也至少拥有同等的潜力。


    接下来，让我们看看可以创建的不同类型的游戏，以及它们在应用精灵、碰撞检测、物理模拟和游戏玩法逻辑这些核心游戏组件方面的差异。


    **游戏类型：益智游戏、棋盘游戏、街机游戏、混合型游戏**


    就像我在本章中讨论的所有其他内容一样，游戏本身也可以使用静态与动态的分类方法进行归类。静态游戏不受处理器性能限制，因为它们通常是回合制的，本质上不依赖手眼协调，因此从某种意义上说，它们更容易流畅运行；只需要实现并调试好游戏规则的编程逻辑和精美的图形即可。此外，还存在巨大的机会来开发新型游戏类型，这些类型以前所未有的创意方式，将静态和动态游戏玩法进行混合组合。我自己就在研究其中的几种！


    由于这是一本关于 Java 8 编程的书，我将从这个角度出发来探讨一切，而这也恰好是将游戏划分为不同类别（静态、动态、混合）的好方法。那么，我们先来介绍静态（固定图形）、回合制游戏。这些游戏包括**棋盘游戏**、**益智游戏**、**知识问答游戏**、**记忆游戏**和**策略游戏**，它们的受欢迎程度和市场潜力都不应被低估。


    静态游戏的酷炫之处在于，它们可以像动态游戏一样有趣，但处理开销却显著降低，因为它们无需达到 60FPS 的实时处理目标来实现流畅、专业的游戏体验。这是因为这类游戏的性质根本不依赖于运动，而是依赖于在轮到你行动时做出正确的**战略移动**。


    静态游戏中可能涉及某些形式的碰撞检测，用于判断哪个游戏棋子已被移动到棋盘或游戏板上的特定位置；然而，不存在碰撞检测使处理器过载的风险，因为除了在特定玩家回合中被战略性移动的那一个棋子外，游戏板的其余部分都是静态的。


    策略游戏的处理逻辑更多是基于**策略逻辑**的编程，旨在允许玩家通过正确的移动序列最终获胜；而动态游戏编程逻辑则更关注游戏精灵之间发生的碰撞。动态游戏侧重于得分、躲避投射物、寻找宝物、完成关卡目标和消灭敌人。


    像国际象棋这样规则复杂、相互关联的策略游戏，其编程逻辑例程可能比动态游戏多得多。然而，由于代码执行对时间不那么敏感，无论平台和 CPU 有多强大，最终的游戏体验都会很流畅。当然，对于这类游戏来说，游戏规则集逻辑必须完美无缺才能真正专业。所以，归根结底，静态游戏和动态游戏都很难编码，尽管原因各不相同。


    动态游戏可称为**动作游戏**或**街机游戏**，其特点是显示屏上有大量运动。这些高度动态的游戏几乎总是涉及射击（例如第一人称射击游戏，如《毁灭战士》、《半条命》；以及第三人称射击游戏，如《生化危机》、《侠盗猎车手》）、偷窃或躲避。还有常见的障碍赛道导航范式，常见于平台游戏，如《大金刚》和《超级马里奥》。


    值得注意的是，任何类型的游戏都可以使用 2D 或 3D 图形和资源来制作，甚至可以结合 2D 和 3D 资源，正如我在第 4 章中指出的那样，JavaFX
    是支持这种做法的。


    流行的游戏类型如此之多，因此总有机会通过采用静态（策略）游戏类型和动态（动作）游戏类型的混合方法来创造一个全新的游戏类型。


