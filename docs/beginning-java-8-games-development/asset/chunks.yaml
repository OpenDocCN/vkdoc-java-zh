- fmt: 'As you can see in [Figure 1-2](#9781484204160_Ch01.xhtml#Fig2), on my Windows
    7 HTML5 development workstation, I had an older version of Java, Java 7, installed
    (on November 29, 2013), taking up 344MB of space. To remove a piece of software,
    **select it** by clicking it (it will turn light blue), and then click the **Uninstall**
    button, shown at the top of the figure. I left the **tool tip**, which says, “**Uninstall
    this program,**” showing in the screenshot so that you can see that if you **hover**
    your mouse over anything in the Programs and Features utility, it will tell you
    what that feature is used for.


    ![9781484204160_Fig01-02.jpg](OEBPS/Images/9781484204160_Fig01-02.jpg)


    [Figure 1-2](#9781484204160_Ch01.xhtml#_Fig2). Select any version of Java older
    than the current version (Java 8), and click the Uninstall button at the top


    Once you click the Uninstall button, the utility will remove the older version
    of Java. If you want to keep your old Java project files, make sure to back up
    your Java project files folder (if you have not done so already, that is). Make
    sure that you back up your workstation’s hard disk drive regularly so that you
    do not lose any of your work.


    Also make sure that you uninstall all versions of Java; in my case, there were
    64-bit Java 7 update 45 and Java SDK 7u45, used to run or execute IDEs, such as
    NetBeans (or Eclipse), that were coded using the Java programming language.


    Next, you will want to ascertain if there are any older versions of the NetBeans
    IDE on your workstation. In my case, as you can see in [Figure 1-3](#9781484204160_Ch01.xhtml#Fig3),
    there was indeed a NetBeans 7 IDE installation currently on my 64-bit Windows
    7 workstation. I selected this for removal and then clicked the **Uninstall/Change**
    button, shown at left, which brought up a custom **Uninstall Summary** dialog,
    shown at right.


    Manufacturers (in this case, the NetBeans development team) can create custom
    Uninstall Summary dialogs for their products to use during the uninstall process,
    as you can see here. This dialog allows you to select whether you want to uninstall
    GlassFish Server 4 and the NetBeans **UserDir Configuration** folder. Because
    you are installing new versions of NetBeans and GlassFish, select both check boxes,
    and then click the **Uninstall** button.


    ![9781484204160_Fig01-03.jpg](OEBPS/Images/9781484204160_Fig01-03.jpg)


    [Figure 1-3](#9781484204160_Ch01.xhtml#_Fig3). Find and select any version of
    NetBeans that is older than version 8.0; also, uninstall old GlassFish versions


    ## Downloading Java JDK 8 and NetBeans 8.0


    Now that the outdated versions of Java and NetBeans have been removed from your
    workstation, you will need to go on the Internet, to the **Oracle** and **NetBeans**
    web sites, respectively, to get the latest development SDKs and IDEs. I will show
    you how to do this using Google’s search engine (I am using this method in case
    the download links, or URLs, ever change) as well as demonstrate what the direct
    download URLs are currently, at the time of writing this book.


    Let’s get Java 8 first, as that is the foundation for everything that you are
    going to be doing as you read through this book. A Google search for **Java JDK
    8** will give you the search result that Oracle’s Java **Downloads** page, which
    is located in the Oracle Technology Network section, as shown at the top of the
    screenshot in [Figure 1-4](#9781484204160_Ch01.xhtml#Fig4). The URL for this page
    is currently **[www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)**.
    It is important to note that this URL could change at any time in the future and
    that you can always use Google Search to find the latest one. Before you can download
    the 170MB SDK installer file for Windows 7/8 64-bit, you will need to click the
    **radio button** next to the **Accept** **License Agreement** option shown at
    the top left of the Java 8 download table. Once you accept the license agreement,
    these 11 OS-specific links will become activated for use.


    ![9781484204160_Fig01-04.jpg](OEBPS/Images/9781484204160_Fig01-04.jpg)


    [Figure 1-4](#9781484204160_Ch01.xhtml#_Fig4). Google the term “Java JDK 8,” open
    the JDK 8 Downloads page, and select Accept License Agreement


    Be sure to match the Java JDK 8 software that you download to your OS and bit
    level (**x86** signifies a **32-bit**-level OS). Most modern-day workstations
    use a **64-bit** Linux, Mac, Solaris (Oracle), Windows 7, or Windows 8 OS. This
    will be specified with the **x64** delineation after the name of the OS.


    To find out the bit level of the OS, on **Windows 7**, open the **Start Menu,**
    right-click the **Computer** entry, and select the **Properties** option, at the
    bottom of the context-sensitive menu. On Windows 8, you click **Start** (a window
    pane icon at the bottom left of your desktop if you are in Windows 7 desktop mode)
    and then the **down-arrow icon** at the bottom left, then click the **PC Settings**
    purple gear icon and finally the **PC Info** entry at the bottom left of the screen.
    In both use cases, there should then be a text entry that says **System type**
    and either **32-bit Operating System** or **64-bit Operating System**.


    Now that you have downloaded the Java JDK 8 installer, the next thing that you
    need to do is download is NetBeans IDE 8.0. Do a Google search for the term **NetBeans
    8.0**, as is shown at the top of [Figure 1-5](#9781484204160_Ch01.xhtml#Fig5),
    and click the **Download** search result option, which will take you to the NetBeans
    IDE 8.0.1 Download page (currently **[https://netbeans.org/downloads](https://netbeans.org/downloads)**).
    If you want to keep both tabs open in the browser, as I did, then right-click
    the **Download** link, and select the **Open link in new tab** option.


    ![9781484204160_Fig01-05.jpg](OEBPS/Images/9781484204160_Fig01-05.jpg)


    [Figure 1-5](#9781484204160_Ch01.xhtml#_Fig5). Google the term “NetBeans 8.0,”
    open the NetBeans IDE 8.0.1 Download page, and download all versions


    Once you are on the NetBeans IDE 8.0 Download page, select the **language** and
    **platform** (OS) that you are using from the drop-down menus at the top right
    of the page. I chose **English** and **Windows**. Now, you can click one of the
    three **Download** buttons at the bottom of the page to download a NetBeans IDE
    8.0 that supports JavaFX 8 new media (and that will therefore support game development)
    programming language (application programming interface [API]). You will learn
    more about what an API is in [Chapter 3](#9781484204160_Ch03.xhtml), when I cover
    the Java programming language in detail.'
