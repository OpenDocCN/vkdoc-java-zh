    iX 和 iY 变量保存了角色在屏幕上的位置，我们将在每个 if 语句中使用它们，并分别加上（或减去）每个轴的速度变量值（处理 iX 时用 vX，处理 iY
    时用 vY）。我们最初将 vX 和 vY 的值设置为 1，这相当于相对较慢的移动速度。如果 vX 和 vY 设置为 2，iBagel 的移动速度将加倍（每次脉冲事件移动两个像素，而不是一个像素）。


