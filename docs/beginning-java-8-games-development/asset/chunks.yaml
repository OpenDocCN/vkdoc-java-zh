    按正确顺序操作至关重要，因为某些 Java 代码依赖于其他 Java 代码。因此，应首先声明对象；然后，在 `.start()` 方法内部，创建（实例化）节点。一旦声明、命名并实例化（创建）了这些节点，就将它们添加到
    StackPane 根节点，然后使用 `.setTitle()` 方法进行配置，并使用 `.setScene()` 方法将 Scene 场景对象添加到 primaryStage
    Stage 对象。当对象进入系统内存后，你才能处理附加到四个 Button UI 控件上的 ActionEvent 处理例程。接下来，请确保将在 **createSplashScreenNodes()**
    方法中引用的数字图像资源位于正确的 NetBeans 文件夹中。


    场景图资源：在项目中安装 ImageView 的图像资源


    要在 Java 代码中引用 JAR 文件内的数字图像资源，你必须在文件名前添加一个正斜杠。不过，在引用文件之前，你必须先从本书的代码仓库将这些图像文件复制到
    **Computer/ComputerName/Users/user/MyDocuments/NetBeansProjects/InvinciBagel/src**
    文件夹中，如图 6-6 左侧（及顶部）所示。你还可以看到这些数字图像资源将如何合成，因为背景底板 invincibagelsplash PNG24 为另外三张
    PNG32 图像预留了叠加（覆盖）位置。在合成的 ImageView 资源中看到的白色区域实际上是透明的！现在，一切准备就绪！


    ![9781484204160_Fig06-06.jpg](img/9781484204160_Fig06-06.jpg)


    图 6-6。Windows 7 资源管理器文件管理工具，显示了一个 PNG24 启动画面和三个 PNG32 叠加层


    JavaFX UI 类：HBox、Pos、Insets 和 ImageView


    让我们暂时放下编码，深入了解一下你将用于完成顶级游戏应用 UI 设计的一些新类。这些类包括 Pos 类（定位）；Insets 类（内边距）；HBox 类（UI
    布局容器）；Image 类（数字图像容器）；ImageView 类（数字图像显示）；以及 TableView 类（表格数据展示），你将在此处学习这些类，但在游戏开发后期，当游戏完全完成后，才会在代码中实现它们。你将按从最简单（Pos）到最复杂（TableView）的顺序逐一研究它们，然后编写
    **.createSplashScreenNodes()** 和 **.addNodesToStackPane()** 方法，这些方法将使用这些新类（对象）。


    JavaFX Pos 类：通用屏幕位置常量


    **Pos** 类是一个 **Enum<Pos>** 类，代表“枚举”。该类包含一系列**常量**，这些常量被转换为整数值以供代码使用。常量值（此处为定位常量，例如
    TOP、CENTER 和 BASELINE）使程序员更容易在代码中使用这些值。


    Pos 类的 Java 类扩展层次结构始于 java.lang.Object 主类，进而到 java.lang.Enum<Pos> 类，最终止于 **javafx.geometry.Pos**
    类。如图 6-4 所示（第 6 行），Pos 位于 JavaFX 几何包中，并使用以下子类层次结构：


    ```

    java.lang.Object

      > java.lang.Enum<Pos>

        > javafx.geometry.Pos

    ```


    Pos 类提供了一组常量，用于实现通用的水平和垂直定位与对齐（参见表 6-1）。正如你将在下一节中看到的，你必须使用 Insets 类和对象来获得所需的像素级精确定位。你将使用
    BOTTOM_LEFT 常量将 Button 控件组定位在启动画面的左下角。


    表 6-1。可在 JavaFX 中用于定位和对齐的 Pos 类枚举常量


    | Pos 常量 | 定位结果（对象） |

    | --- | --- |

    | **BASELINE_CENTER** | 垂直方向在基线上；水平方向在中心 |

    | **BASELINE_LEFT** | 垂直方向在基线上；水平方向在左侧 |

    | **BASELINE_RIGHT** | 垂直方向在基线上；水平方向在右侧 |

    | **BOTTOM_CENTER** | 垂直方向在底部；水平方向在中心 |

    | **BOTTOM_LEFT** | 垂直方向在底部；水平方向在左侧 |

    | **BOTTOM_RIGHT** | 垂直方向在底部；水平方向在右侧 |

    | **CENTER** | 垂直和水平方向均在中心 |

    | **CENTER_LEFT** | 垂直方向在中心；水平方向在左侧 |

    | **CENTER_RIGHT** | 垂直方向在中心；水平方向在右侧 |

    | **TOP_CENTER** | 垂直方向在顶部；水平方向在中心 |

    | **TOP_LEFT** | 垂直方向在顶部；水平方向在左侧 |

    | **TOP_RIGHT** | 垂直方向在顶部；水平方向在右侧 |


    由于 Pos 类提供的是通用定位，因此应将其与 **Insets** 类结合使用，以实现像素级精确定位。接下来，让我们看看 Insets 类，它也位于 **javafx.geometry**
    包中。


    JavaFX Insets 类：为 UI 提供内边距值


    **Insets** 类是一个 **public** 类，它直接扩展了 java.lang.Object 主类，这意味着 Insets 类是从头开始编写的，用于提供内边距，即矩形区域内的**偏移量**。想象一个相框，你在其中放置一个衬板，或者在外部相框和内部照片之间放置一个漂亮的边框。这就是
    Insets 类通过两个构造方法所做的事情：一个提供**相等**或均匀的内边距，另一个提供**不相等**或不均匀的内边距。


    你将使用提供**不均匀**内边距值的构造方法，如果用于装裱照片，这会显得非常不专业！Insets 类的 Java 类层次结构始于 **java.lang.Object**
    主类，并使用此类创建 **javafx.geometry.Insets** 类。如图 6-4 所示（第 5 行），Insets 与 Pos 类一样，包含在
    JavaFX 几何包中，并使用以下类层次结构：


    ```

    java.lang.Object

      > javafx.geometry.Insets

    ```


    Insets 类提供了一组四个 double 类型的偏移值，用于指定矩形的四个边（**上**、**右**、**下**、**左**），在构造方法中应按照此顺序指定。你将使用
    Insets 类（对象）来微调 Button 控件组的位置，你将使用 HBox 布局容器创建该控件组。可以将这些 Insets 对象视为在另一个盒子内部绘制一个盒子的方法，它显示了矩形内部对象在其边缘周围应“遵守”的间距。Insets
    对象的简单构造方法将使用以下格式：


    ```

    Insets(double topRightBottomLeft)

    ```


    此构造方法对所有边距（topRightBottomLeft）使用单个值，而一个重载的构造方法允许你分别指定每个值，如下所示：


    ```

    Insets(double top, double right, double bottom, double left)

    ```


    这些值需要按此顺序指定。记住这一点的一个简单方法是使用模拟时钟。时钟的顶部是“12”，右侧是“3”，底部是“6”，左侧是“9”。因此，从正午（对于西部片爱好者来说）开始，始终按顺时针方向，就像指针在钟面上移动一样，这样你就能很好地记住如何在“不均匀值”构造方法中指定
    Insets 值。你很快将使用 Insets 类来定位 Button 控件组，该控件组最初“卡在”启动画面设计的左下角，通过使用这四个内边距定位参数中的两个，使其远离屏幕的左侧和底部。

