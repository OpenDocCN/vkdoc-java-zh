- fmt: "# Types of Controllers: What Types of Events Should We Handle?\n\nOne of the\
    \ key things to look at is what is the most logical approach to supporting game\
    \ play related events, such as arrow keys; mouse clicks; touchscreen events; game\
    \ controller buttons (A, B, C and D); and more advanced controllers, such as gyroscopes\
    \ and accelerometers that are available on Android, Kindle, Tizen, and iOS consumer\
    \ electronics devices. This decision will be driven by the hardware devices that\
    \ a game is targeted to run on; if a game needs to run everywhere, then code for\
    \ handling different event types, and even different programming approaches to\
    \ event handling, will ultimately be required. We’ll take a look at what input\
    \ events are currently supported in Java 8.\n\nIt is also interesting to note\
    \ that Java 8 and JavaFX apps are already working on these embedded platforms,\
    \ and I’d put money on native support on open platforms (Android, Tizen, Chrome,\
    \ Ubuntu), and proprietary platforms that currently support Java technology (Windows,\
    \ Blackberry, Samsung Bada, LGE WebOS, Firefox OS, Opera, etc.), at some point\
    \ in time in the near future. The future of Java 8 is bright, thanks to JavaFX\
    \ and hardware platform support!\n\n## Java 8 and JavaFX Events: `javafx.event`\
    \ and `java.util`\n\nAs you have seen, the `javafx.event` package’s `EventHandler`\
    \ public interface, which extends the `java.util` package’s `EventListener` interface,\
    \ is the way that `Event` objects are created and handled, either using an anonymous\
    \ inner class (Java 7) structure, or a lambda expression (Java 8). You have become\
    \ familiar now with how to code both of these types of event handling structures,\
    \ and I will continue during this book to initially code methods using the Java\
    \ 7 (anonymous inner class) approach, and I will then use NetBeans to convert\
    \ them to Java 8 lambda expressions so that you can create games that are compatible\
    \ with both Java 7 (Android) and Java 8 (PC OS) game code delivery pipelines.\n\
    \nThe `ActionEvent` class (and objects) that you’ve used thus far during the book\
    \ for your user interface Button control event handling is a subclass of the `Event`\
    \ superclass, which is a subclass of the `java.util` package’s `EventObject` superclass,\
    \ which is a subclass of the `java.lang.Object` master class. The entire class\
    \ hierarchy is structured as follows:\n\n```\njava.lang.Object\n  > java.util.EventObject\n\
    \    > javafx.event.Event\n      > javafx.event.ActionEvent\n```\n\nThe `ActionEvent`\
    \ class is also in the `javafx.event` package, along with the `EventHandler` public\
    \ interface. All of the other event-related classes that we will be using from\
    \ here on out are contained in a `javafx.scene.input` package. I am going to focus\
    \ on the `javafx.scene.input` package for the rest of this chapter, as you have\
    \ already learned how to use the `EventHandler<ActionEvent> {…}` structure for\
    \ Java 7 and the `(ActionEvent) -> {…}` structure for Java 8, so it is time to\
    \ learn how to use other types of events, called input events, in our Java 8 game\
    \ development work process.\n\nLet’s take a look next at this important JavaFX\
    \ Scene input event package, and the twenty-five input event classes that it provides\
    \ us to use for our Java 8 game development.\n\n## JavaFX Input Event Classes:\
    \ The `javafx.scene.input` Package\n\nEven though it is the `java.util` and `javafx.event`\
    \ packages that contain the core `EventObject`, `Event` and `EventHandler` classes\
    \ that “handle” the events, at the foundational level of making sure that the\
    \ events get processed (handled), there is another JavaFX package called `javafx.scene.input`\
    \ which contains the classes that we will be interested in using to process (handle)\
    \ our player’s input for the different types of games that you might be creating.\
    \ I will call these “input events,” because they are different events than the\
    \ action events and pulse (timing) events that we have encountered thus far in\
    \ the book. Once we’ve covered input events in this chapter, you will be familiar\
    \ with many of the different types of events that you will want to use in your\
    \ own Java 8 games development. Later on in the chapter we will also implement\
    \ a `KeyEvent` object to handle arrow keypad (or DPAD and game controller) usage\
    \ in our game.\n\nIt’s interesting to note that a number of the input event types\
    \ that are supported in the `javafx.scene.input` package are more suited to consumer\
    \ electronics (the industry term is “embedded”) devices, such as smartphones or\
    \ tablets, which tells me that JavaFX is being positioned (designed) for use on\
    \ open source platforms such as Android or Chrome. JavaFX has specialized events\
    \ such as `GestureEvent`, `SwipeEvent`, `TouchEvent`, and `ZoomEvent`, that support\
    \ specific features in the new embedded devices marketplace. These input event\
    \ classes support advanced touchscreen device features, such as gestures, page\
    \ swiping, touchscreen input handling, and multi-touch display that are required\
    \ features for these devices, which support advanced input paradigms such as two-finger\
    \ (pinching in or spreading out) touch input, for instance, to zoom in and out\
    \ of the content on the screen.\n\nWe will be covering the more “universal” input\
    \ types in this book, which are supported across both personal computers (desktops,\
    \ laptops, notebooks, netbooks, and the newer “pro” tablets, such as the Surface\
    \ Pro 3) as well as embedded devices, including smartphones, tablets, e-Readers,\
    \ iTV sets, game consoles, home media centers, Set-Top Boxes (STBs), and so forth.\
    \ These devices will also process these more widespread (in their implementation)\
    \ `KeyEvent` and `MouseEvent` types of input events, as mouse and key events are\
    \ always supported for legacy software packages.\n\nIt is interesting to note\
    \ that a touchscreen display will “handle” mouse events as well as touch events,\
    \ which is very convenient as far as making sure that your game works across as\
    \ many different platforms as possible. I often use this approach of using mouse\
    \ event handling in my Android book titles, so that both the touchscreen and a\
    \ DPAD center (click) button can be used by the user to generate a mouse click\
    \ event without having to specifically use touch events. Another advantage of\
    \ using mouse (click) events where possible for touchscreen users is that if you\
    \ use touch events, you cannot go in the other direction, that is, your game application\
    \ will only work on touchscreen devices and not on devices (such as iTV sets,\
    \ laptops, desktops, netbooks, and the like) that feature mouse hardware of some\
    \ type.\n\nThis same principle applies to key events, especially the arrow keys\
    \ we will be using for this game, as these keys can be found on the arrow keypad\
    \ on keyboards and remote controls, on game controllers, and on the DPAD on most\
    \ smartphones. I will also show you how to include alternate key mapping so that\
    \ your players can decide which input method they prefer to use to play your Java\
    \ 8 game. Let’s take a look at the `KeyCode` and `KeyEvent` classes next.\n\n\
    ## The `KeyCode` Class: Using Enum Constants to Define Keys Players Use for Game"
  raw: 'Types of Controllers: What Types of Events Should We Handle?


    One of the key things to look at is what is the most logical approach to supporting
    game play related events, such as arrow keys; mouse clicks; touchscreen events;
    game controller buttons (A, B, C and D); and more advanced controllers, such as
    gyroscopes and accelerometers that are available on Android, Kindle, Tizen, and
    iOS consumer electronics devices. This decision will be driven by the hardware
    devices that a game is targeted to run on; if a game needs to run everywhere,
    then code for handling different event types, and even different programming approaches
    to event handling, will ultimately be required. We’ll take a look at what input
    events are currently supported in Java 8.


    It is also interesting to note that Java 8 and JavaFX apps are already working
    on these embedded platforms, and I’d put money on **native support** on **open
    platforms** (Android, Tizen, Chrome, Ubuntu), and proprietary platforms that currently
    support Java technology (Windows, Blackberry, Samsung Bada, LGE WebOS, Firefox
    OS, Opera, etc.), at some point in time in the near future. The future of Java
    8 is bright, thanks to JavaFX and hardware platform support!


    Java 8 and JavaFX Events: javafx.event and java.util


    As you have seen, the **javafx.event** package’s **EventHandler** public interface,
    which extends the **java.util** package’s **EventListener** interface, is the
    way that **Event** objects are created and handled, either using an anonymous
    inner class (Java 7) structure, or a lambda expression (Java 8). You have become
    familiar now with how to code both of these types of event handling structures,
    and I will continue during this book to initially code methods using the Java
    7 (anonymous inner class) approach, and I will then use NetBeans to convert them
    to Java 8 lambda expressions so that you can create games that are compatible
    with both Java 7 (Android) and Java 8 (PC OS) game code delivery pipelines.


    The **ActionEvent** class (and objects) that you’ve used thus far during the book
    for your user interface Button control event handling is a subclass of the **Event**
    superclass, which is a subclass of the **java.util** package’s **EventObject**
    superclass, which is a subclass of the java.lang.Object master class. The entire
    class hierarchy is structured as follows:


    ```

    java.lang.Object

      > java.util.EventObject

        > javafx.event.Event

          > javafx.event.ActionEvent

    ```


    The ActionEvent class is also in the javafx.event package, along with the EventHandler
    public interface. All of the other event-related classes that we will be using
    from here on out are contained in a **javafx.scene.input** package. I am going
    to focus on the javafx.scene.input package for the rest of this chapter, as you
    have already learned how to use the EventHandler<ActionEvent> {…} structure for
    Java 7 and the (ActionEvent) -> {…} structure for Java 8, so it is time to learn
    how to use other types of events, called **input events**, in our Java 8 game
    development work process.


    Let’s take a look next at this important JavaFX Scene input event package, and
    the twenty-five input event classes that it provides us to use for our Java 8
    game development.


    JavaFX Input Event Classes: The javafx.scene.input Package


    Even though it is the java.util and javafx.event packages that contain the core
    **EventObject**, **Event** and **EventHandler** classes that “handle” the events,
    at the foundational level of making sure that the events get processed (handled),
    there is another JavaFX package called **javafx.scene.input** which contains the
    classes that we will be interested in using to process (handle) our player’s input
    for the different types of games that you might be creating. I will call these
    “input events,” because they are different events than the action events and pulse
    (timing) events that we have encountered thus far in the book. Once we’ve covered
    input events in this chapter, you will be familiar with many of the different
    types of events that you will want to use in your own Java 8 games development.
    Later on in the chapter we will also implement a KeyEvent object to handle arrow
    keypad (or DPAD and game controller) usage in our game.


    It’s interesting to note that a number of the input event types that are supported
    in the javafx.scene.input package are more suited to consumer electronics (the
    industry term is “embedded”) devices, such as smartphones or tablets, which tells
    me that JavaFX is being positioned (designed) for use on open source platforms
    such as Android or Chrome. JavaFX has specialized events such as **GestureEvent**,
    **SwipeEvent**, **TouchEvent**, and **ZoomEvent**, that support specific features
    in the new embedded devices marketplace. These input event classes support advanced
    touchscreen device features, such as gestures, page swiping, touchscreen input
    handling, and multi-touch display that are required features for these devices,
    which support advanced input paradigms such as two-finger (pinching in or spreading
    out) touch input, for instance, to zoom in and out of the content on the screen.


    We will be covering the more “universal” input types in this book, which are supported
    across both personal computers (desktops, laptops, notebooks, netbooks, and the
    newer “pro” tablets, such as the Surface Pro 3) as well as embedded devices, including
    smartphones, tablets, e-Readers, iTV sets, game consoles, home media centers,
    Set-Top Boxes (STBs), and so forth. These devices will also process these more
    widespread (in their implementation) **KeyEvent** and **MouseEvent** types of
    input events, as mouse and key events are always supported for legacy software
    packages.


    It is interesting to note that a touchscreen display will “handle” mouse events
    as well as touch events, which is very convenient as far as making sure that your
    game works across as many different platforms as possible. I often use this approach
    of using mouse event handling in my Android book titles, so that both the touchscreen
    and a DPAD center (click) button can be used by the user to generate a mouse click
    event without having to specifically use touch events. Another advantage of using
    mouse (click) events where possible for touchscreen users is that if you use touch
    events, you cannot go in the other direction, that is, your game application will
    only work on touchscreen devices and not on devices (such as iTV sets, laptops,
    desktops, netbooks, and the like) that feature mouse hardware of some type.


    This same principle applies to key events, especially the arrow keys we will be
    using for this game, as these keys can be found on the arrow keypad on keyboards
    and remote controls, on game controllers, and on the DPAD on most smartphones.
    I will also show you how to include alternate key mapping so that your players
    can decide which input method they prefer to use to play your Java 8 game. Let’s
    take a look at the KeyCode and KeyEvent classes next.


    The KeyCode Class: Using Enum Constants to Define Keys Players Use for Game'
  trans: '

    控制器类型：我们应该处理哪些类型的事件？


    需要关注的关键问题之一是，哪种方法最符合逻辑地支持与游戏玩法相关的事件，例如方向键、鼠标点击、触摸屏事件、游戏控制器按钮（A、B、C、D），以及更高级的控制器，比如
    Android、Kindle、Tizen 和 iOS 消费电子设备上可用的陀螺仪和加速度计。这一决策将由游戏目标运行的硬件设备驱动；如果游戏需要在所有平台上运行，那么最终将需要编写处理不同事件类型的代码，甚至采用不同的编程方法来处理事件。我们将探讨
    Java 8 目前支持哪些输入事件。


    同样值得注意的是，Java 8 和 JavaFX 应用已经可以在这些嵌入式平台上运行，我敢打赌，在不久的将来，**原生支持**将出现在**开放平台**（Android、Tizen、Chrome、Ubuntu）以及当前支持
    Java 技术的专有平台（Windows、Blackberry、Samsung Bada、LGE WebOS、Firefox OS、Opera 等）上。得益于
    JavaFX 和硬件平台的支持，Java 8 的未来一片光明！


    Java 8 和 JavaFX 事件：javafx.event 和 java.util


    如你所见，**javafx.event** 包中的 **EventHandler** 公共接口（它扩展了 **java.util** 包中的 **EventListener**
    接口）是创建和处理 **Event** 对象的方式，无论是使用匿名内部类（Java 7）结构，还是 lambda 表达式（Java 8）。你现在已经熟悉了如何编写这两种事件处理结构，在本书中，我将继续先使用
    Java 7（匿名内部类）方法编写代码，然后使用 NetBeans 将它们转换为 Java 8 lambda 表达式，以便你可以创建与 Java 7（Android）和
    Java 8（PC 操作系统）游戏代码交付管道兼容的游戏。


    到目前为止，你在本书中用于用户界面按钮控件事件处理的 **ActionEvent** 类（及其对象）是 **Event** 超类的子类，而 **Event**
    超类又是 **java.util** 包中 **EventObject** 超类的子类，后者则是 java.lang.Object 主类的子类。整个类层次结构如下所示：


    ```

    java.lang.Object

      > java.util.EventObject

        > javafx.event.Event

          > javafx.event.ActionEvent

    ```


    ActionEvent 类与 EventHandler 公共接口一样，也位于 javafx.event 包中。我们之后将使用的所有其他与事件相关的类都包含在
    **javafx.scene.input** 包中。本章剩余部分我将重点介绍 javafx.scene.input 包，因为你已经学会了如何使用 Java
    7 的 `EventHandler<ActionEvent> {…}` 结构和 Java 8 的 `(ActionEvent) -> {…}` 结构，现在是时候学习如何在我们的
    Java 8 游戏开发工作流程中使用其他类型的事件，即所谓的**输入事件**了。


    接下来，让我们看看这个重要的 JavaFX Scene 输入事件包，以及它为我们进行 Java 8 游戏开发所提供的 25 个输入事件类。


    JavaFX 输入事件类：javafx.scene.input 包


    尽管是 java.util 和 javafx.event 包包含了“处理”事件的核心 **EventObject**、**Event** 和 **EventHandler**
    类，在确保事件得到处理（被处理）的基础层面上，还有另一个名为 **javafx.scene.input** 的 JavaFX 包，其中包含我们感兴趣用于处理（处理）玩家输入的各种类，这些输入对应你可能正在创建的不同类型的游戏。我将这些称为“输入事件”，因为它们与我们迄今为止在本书中遇到的动作事件和脉冲（定时）事件不同。一旦我们在本章中涵盖了输入事件，你将熟悉许多你希望在自己的
    Java 8 游戏开发中使用的不同类型的事件。在本章后面，我们还将实现一个 KeyEvent 对象，以处理我们游戏中方向键（或 DPAD 和游戏控制器）的使用。


    有趣的是，javafx.scene.input 包中支持的许多输入事件类型更适合消费电子（行业术语称为“嵌入式”）设备，例如智能手机或平板电脑，这告诉我 JavaFX
    正被定位（设计）用于 Android 或 Chrome 等开源平台。JavaFX 拥有专门的事件，例如 **GestureEvent**、**SwipeEvent**、**TouchEvent**
    和 **ZoomEvent**，它们支持新兴嵌入式设备市场中的特定功能。这些输入事件类支持先进的触摸屏设备功能，例如手势、页面滑动、触摸屏输入处理以及多点触控显示，这些都是这些设备所需的功能，它们支持先进的输入范式，例如双指（捏合或张开）触摸输入，用于放大或缩小屏幕上的内容。


    本书将涵盖更“通用”的输入类型，这些类型在个人计算机（台式机、笔记本电脑、上网本、以及较新的“专业”平板电脑，如 Surface Pro 3）以及嵌入式设备（包括智能手机、平板电脑、电子阅读器、iTV
    设备、游戏机、家庭媒体中心、机顶盒等）上都得到支持。这些设备也将处理这些更广泛（在其实现中）的 **KeyEvent** 和 **MouseEvent**
    类型的输入事件，因为鼠标和键盘事件总是为传统软件包提供支持。


    值得注意的是，触摸屏显示器会“处理”鼠标事件以及触摸事件，这对于确保你的游戏能在尽可能多的不同平台上运行非常方便。在我的 Android 书籍中，我经常使用这种处理鼠标事件的方法，这样用户既可以使用触摸屏，也可以使用
    DPAD 中心（点击）按钮来生成鼠标点击事件，而无需专门使用触摸事件。在可能的情况下为触摸屏用户使用鼠标（点击）事件的另一个优点是，如果你使用触摸事件，则无法反向兼容，也就是说，你的游戏应用将只能在触摸屏设备上运行，而无法在配备某种鼠标硬件的设备（例如
    iTV 设备、笔记本电脑、台式机、上网本等）上运行。


    同样的原则也适用于键盘事件，尤其是我们将在本游戏中使用的方向键，这些键可以在键盘和遥控器的方向键区、游戏控制器以及大多数智能手机的 DPAD 上找到。我还将向你展示如何包含备用的按键映射，以便你的玩家可以决定他们更喜欢使用哪种输入方式来玩你的
    Java 8 游戏。接下来，让我们看看 KeyCode 和 KeyEvent 类。


    KeyCode 类：使用枚举常量定义玩家用于游戏的按键

