    ![9781484204160_Fig16-12.jpg](img/9781484204160_Fig16-12.jpg)


    图 16-12。在空白的路径面板中右键点击，选择导入路径选项


    一旦你点击图 16-12 中看到的**导入路径**菜单项，你将看到**从 SVG 导入路径**对话框。选择“所有文件 (*.*)”下拉菜单选项，然后点击 **sprite1svghandintegerxml.txt**
    文件，接着点击**打开按钮**，如图 16-13 所示。这将在 GIMP 中打开编辑后的整数碰撞路径数据。


    ![9781484204160_Fig16-13.jpg](img/9781484204160_Fig16-13.jpg)


    图 16-13。打开 sprite1svghandintegerxml.txt 文件


    如图 16-14 所示，碰撞多边形 SVG 数据的这种整数表示形式与图 16-9 中显示的浮点表示形式完全相同。由于在 SVG 数据字符串末尾添加了 SVG“Z”命令，碰撞多边形现在是闭合的。我们的碰撞数据正在变得更加优化！

