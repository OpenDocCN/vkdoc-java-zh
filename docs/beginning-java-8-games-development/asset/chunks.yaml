    game development tool, and then we will be ready to get to collision detection
    coding. Install and launch PE using the green cube PE icon, and use the Import
    Sprite button shown in [Figure 16-21](#9781484204160_Ch16.xhtml#Fig21) to open
    up your sprite1.png file, and use the zoom slider at the bottom of the screen
    to zoom in **600%**, just like we did in GIMP.


