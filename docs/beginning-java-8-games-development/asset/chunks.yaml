    \ three parts of the evaluation area of the `for` loop are inside the parentheses,\
    \ separated by semicolons, as each contains a programming statement. The first\
    \ is a variable declaration and initialization, the second is a boolean expression\
    \ evaluation, and the third is an update equation showing how to increment the\
    \ loop during each pass.\n\nTo move the InvinciBagel 40 pixels diagonally on the\
    \ screen, along both X and Y, the `for` loop is as follows:\n\n```\nfor(int x=0;\
