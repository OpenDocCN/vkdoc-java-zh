    图 15-14。实例化并加载 URL 对象，然后在 `iSound0` AudioClip 对象实例化中使用它


    有趣的是，第二行代码使用了 **`.toString()`** 方法调用，该方法将这个 URL 对象转换回 String 对象，这是加载 `AudioClip()`
    构造方法所需的音频资源 URL。你可能会想：为什么不直接使用 **`iSound0 = new AudioClip("/leftmono");`**？你可以尝试这样做，但你必须使用
    `"file:/Users/users/MyDocuments/NetBeansProjects/InvinciBagel/src/leftmono.wav"`
    来“硬编码”目录。


    我使用了 URL 对象的方法，这样你就可以从 JAR 文件内部引用这个音频文件，而不是使用上面那种**需要**硬盘驱动器上“绝对”位置的方法。因此，这个 **`getClass().getResource()`**
    方法链正在向这个 URL 对象添加“相对”引用数据。你的 `InvinciBagel` 类需要这些相对引用数据，以便能够从你的 NetBeans 8 项目
    **`InvinciBagel/src`** 文件夹内部以及你的 Java 8 游戏应用程序的 JAR 文件内部引用你的 WAV 音频资源文件。


    接下来，使用你信赖的程序员快捷方式，将这两行代码在其下方再复制粘贴五次，这是创建其他五个 `AudioClip` 对象的简便方法。将 `iAudioFile0`
    和 `iSound0` 中的零分别改为 `iAudioFile1` 至 `iAudioFile5` 以及 `iSound1` 至 `iSound5`。然后将
    WAV 音频文件名引用分别改为 **`rightmono.wav`**、**`upmono.wav`**、**`downmono.wav`**、**`wmono.wav`**
    和 **`smono.wav`**。你完成的 `loadAudioAssets()` 方法应该如下面的 Java 方法体所示，该方法也显示在图 15-15
    中：


    ```

    private void loadAudioAssets() {

        iAudioFile0 = getClass().getResource("/leftmono.wav");

        iSound0 = new AudioClip(iAudioFile0.toString());

        iAudioFile1 = getClass().getResource("/rightmono.wav");

        iSound1 = new AudioClip(iAudioFile1.toString());

        iAudioFile2 = getClass().getResource("/upmono.wav");

        iSound2 = new AudioClip(iAudioFile2.toString());

        iAudioFile3 = getClass().getResource("/downmono.wav");

        iSound3 = new AudioClip(iAudioFile3.toString());

        iAudioFile4 = getClass().getResource("/wmono.wav");

        iSound4 = new AudioClip(iAudioFile4.toString());

        iAudioFile5 = getClass().getResource("/smono.wav");

        iSound5 = new AudioClip(iAudioFile5.toString());

    }

    ```


