    public void setLifeSpan(double lifeSpan) {

        this.lifeSpan = lifeSpan;

    }


    public double getDamage() {

        return damage;

    }


    public void setDamage(double damage) {

        this.damage = damage;

    }


    public double getOffsetX() {

        return offsetX;

    }


    public void setOffsetX(double offsetX) {

        this.offsetX = offsetX;

    }


    public double getOffsetY() {

        return offsetY;

    }


    public void setOffsetY(double offsetY) {

        this.offsetY = offsetY;

    }


    public float getBoundScale() {

        return boundScale;

    }


    public void setBoundScale(float boundScale) {

        this.boundScale = boundScale;

    }


    public float getBoundRot() {

        return boundRot;

    }


    public void setBoundRot(float boundRot) {

        this.boundRot = boundRot;

    }


    public float getFriction() {

        return friction;

    }


    public void setFriction(float friction) {

        this.friction = friction;

    }


    public float getGravity() {

        return gravity;

    }


    public void setGravity(float gravity) {

        this.gravity = gravity;

    }


    public float getBounce() {

        return bounce;

    }


    public void setBounce(float bounce) {

        this.bounce = bounce;

    }

    ```


    需要注意的是，使用 Hero 类创建的对象也可以访问我们之前为 Actor 类生成的 getter 和 setter 方法。如果你想知道所有这些 `.set()`
    方法中的 Java 关键字 **this** 是什么意思，它指的是使用 Actor 或 Hero 类构造方法创建的当前对象。因此，如果你在 iBagel Bagel
    对象（我们将在第 10 章中创建）上调用 `.setBounce()` 方法，`this` 关键字指的就是这个 (iBagel) Bagel 对象实例。所以，如果我们想设置
    50% 的弹力系数，我们可以使用新的 `.setBounce()` setter 方法进行如下调用：


    ```

    iBagel.setBounce(0.50);

    ```


    接下来，让我们看看这些精灵 Actor 类如何与我们迄今为止在本书中编写的其他类配合使用。之后，我们将总结本章所学的内容，然后进入本书后续章节，学习如何使用这些类为我们的游戏创建精灵，并学习如何在游戏玩法中使用精灵。


    **更新游戏设计：Actor 或 Hero 如何融入其中**


    让我们更新我在第 7 章（图 7-19）中介绍的图表，以包含 Actor.java 和 Hero.java 类。如图 8-16 所示，我不得不交换图表中 `.update()`
    物理部分和 `.collide()` 碰撞部分的位置，因为 Actor 类只包含 `.update()` 方法，而 Hero 类则包含这两个方法。由于 `.collide()`
    方法将在 `.update()` 方法中被调用，我还用一个铬色球体连接了图表的这两个部分。


    ![9781484204160_Fig08-16.jpg](img/9781484204160_Fig08-16.jpg)


    图 8-16. 当前 invincibagel 包类（对象）层次结构，现在我们已经添加了 Actor 和 Hero 类


    GamePlayLoop 对象中的 **.handle()** 方法将调用这些 **.update()** 方法，因此它们之间也存在连接。Actor 和 Hero
    类与 InvinciBagel 类之间存在连接，因为使用这些抽象类创建的所有游戏精灵对象都将在此类的方法中声明和实例化。


    我们在开发游戏引擎框架方面取得了巨大进展，同时，我们也看到了如何利用 Java 8 编程语言的一些核心特性来为我们服务。我们将在下一章关于事件处理的内容中，探讨强大的新
    Java 8 **lambda 表达式**特性，因此关于前沿 Java 8 特性的更多知识就在（游戏）拐角处。希望你和我一样兴奋！


    **总结**


    在第八章中，我们编写了本书中将要设计和编码的多个游戏引擎中的第二轮：**Actor**（固定精灵）超类及其 **Hero**（运动精灵）子类。一旦我们在第
    10 章及后续章节中开始创建游戏精灵，Hero 类也将成为一个超类。本质上，在本章中，你学习了如何创建**公共抽象类**，从本书的此处开始，我们将使用这些类来定义我们的精灵对象。这意味着我们要预先完成所有繁重的工作（精灵设计和编码工作），为游戏中的所有角色（精灵）做好准备，从而使我们今后为游戏创建强大的固定和运动精灵变得更加容易。我们首先构建的是知识库和游戏引擎框架！


    我们首先探讨了如何设计 Actor 和 Hero 类，以及我们将使用它们创建哪些类型的实际精灵类。我们查看了九个精灵图像资源，以及如何仅使用九个资源来覆盖广泛的运动范围，并探讨了如何“注册”精灵“状态”之间的相对关系。


    接下来，我们设计并创建了 Actor 超类，用于处理固定精灵（如道具和宝藏），创建了基本的 `List<Image>`、`ImageView`、`SVGPath`、`iX`
    和 `iY` 变量，以及一个使用这些变量定义固定精灵外观、位置和碰撞边界的构造方法。然后，我们添加了一些未来游戏设计方面所需的额外变量，并学习了如何让 NetBeans
    编写 `.get()` 和 `.set()` 方法。


    最后，我们设计并创建了 Hero 子类，它扩展了 Actor 以处理运动精灵（如 InvinciBagel 本身及其敌人，以及弹丸和移动障碍物）。我们创建了基本的构造方法，用于设置来自
    Actor 超类的变量，这次是为了定义运动精灵的图像、初始位置和碰撞边界。然后，我们添加了一些未来游戏设计方面所需的额外变量，并再次见证了 NetBeans
    如何为我们编写 `.get()` 和 `.set()` 方法，这总是很有趣！

