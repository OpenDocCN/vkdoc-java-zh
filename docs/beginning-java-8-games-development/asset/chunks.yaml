    Summary


    In this fourteenth chapter, we created our fixed sprite “prop” classes that allow
    us to design our game scenes and the fixed objects that our motion sprite Actor
    objects will interact with. We first created the **Prop** class, which extends
    the Actor class that we created during [Chapter 8](#9781484204160_Ch08.xhtml).
    We used the .setTranslateX() and .setTranslateY() methods to take the xLocation
    and yLocation parameters in the constructor method to position the ImageView on
    the Stage, similar to what we did with the .moveInvinciBagel() class, only with
    fixed sprites a move is only made once, inside of the constructor method, to position
    the prop in the Scene on the Stage.


    Next we created even more complicated **PropH** and **PropV** classes, which in
    addition to positioning the fixed sprites in the Scene, also mirror them automatically,
    around the Y axis (PropH) and X axis (PropV). We also created a PropB (B stands
    for Both) class that will automatically mirror fixed sprite Image assets around
    both the X and Y axes.


    Next, we learned how to implement these Prop classes by declaring, instantiating,
    and adding (to the JavaFX Scene Graph as well as to the CastingDirector object)
    them inside of our InvinciBagel.java primary game design class. We learned how
    to position our fixed sprites on the screen, as well as how to create seamless
    mirrored tiling effects, and tested our new Prop classes to make sure they were
    ready for use in designing game play levels.


    Finally, we tested two of these four new fixed sprite classes with larger props,
    which, if we do not define the fixed sprite objects for use in collision detection
    by adding them into the CastingDirector object, could conceivably be used for
    scene background compositing. This would help reduce the data footprint for the
    game, by minimizing use of large PNG24 background imagery, allowing us to replace
    these data heavy images with far smaller PNG8 background images. These could depict
    scene “settings,” such as a rainy day, a cloudy sky, or a vivid sunset.


    In the next chapter, we are going take a look at how to add a digital audio sound
    effects engine to our game code. This audio engine will use the JavaFX AudioClip
    class to add sound effect sequencing capabilities to the game, so that we have
    all of the basic new media elements (fixed and motion imagery, and audio feedback)
    to work**,** with when we get into adding things such as like physics and collision
    detection. In this way**,** we can start to add in multimedia that will utilize
    all of our player’s senses in the game play (user) experience.


    CHAPTER 15


    ![image](OEBPS/Images/frontdot.jpg)


    Implementing Game Audio Assets: Using the JavaFX AudioClip Class Audio Sequencing
    Engine


    Now that we have created both motion sprite and fixed sprite classes using our
    abstract Actor (fixed sprites) and Hero (motion sprites) superclasses, we need
    to put the code into place that will play our game audio assets. Although generally
    not thought of as being as important as the digital image (visual) assets, digital
    audio (aural) assets can be quite important to the quality of your game play.
    In fact, you would be surprised how much that great audio assets can add to the
    perceived value of your Java 8 game products. We will be learning how to optimize
    and implement digital audio assets for your Java 8 game development during this
    chapter, using open source tools such as Audacity 2.0.6.'
