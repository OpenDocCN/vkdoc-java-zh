    方法中所见，在 `attackCounter`（计时器）允许玩家在敌人攻击后有足够时间恢复镇定之后，此 `callAttack` 变量被设置为 `true`（攻击）值。在你更复杂的
    `.initiateAttack()` 方法版本中，你会将此 `callAttack` 变量设置为 `false`（延迟攻击）值，从而启动 `attackCounter`。


