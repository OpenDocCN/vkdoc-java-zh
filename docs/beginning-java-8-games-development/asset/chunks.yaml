  trans: '

    在第九章中，我们为游戏场景对象的创建添加了常量，以便将来随时更改支持的显示分辨率，同时使用另一个重载的 `Scene()` 构造方法添加了 `Color.WHITE`
    背景色。我们这样做是为了完成 UI 设计并实现“开始游戏”UI 按钮控件，使其能够隐藏当前包含启动画面素材的两个 `ImageView` 图像合成面板，这些面板后续还可用于存放游戏背景数字图像素材。


    我们学习了 `ImageView` 类（及其对象）的 **visible** 特性（或称属性、变量），以及如何使用 **.setVisible()** 方法调用，通过
    `true` 或 `false` 值来切换指定 `ImageView` 图像面板的可见性。由于我们在“开始游戏”按钮的 `ActionEvent` 处理结构中关闭了
    `ImageView` 图像合成面板的可见性，因此我们当然必须确保其他三个按钮 UI 控件的 `visible` 属性被重新设置为 **true**（即开启或可见），以防游戏玩家稍后想要查看这些界面。


    接下来，我们介绍了如何使用 NetBeans 将兼容 Java 7 的匿名内部类事件处理结构转换为 Java 8 的 lambda 表达式。我之所以想在这本书中介绍
    Java 8 的 **lambda 表达式**，尽管它们是一项高级特性，但它们是 Java 8 的主要新特性之一，而本书正是一本关于 Java 8 编程的书籍。


    最后，我们开始为 Java 8 游戏编程基础设施添加新功能，学习了**输入事件**（`InputEvent`）类及其子类，了解了事件处理器（`EventHandler`）类结构的设置方式，以及它们如何跨越
    `java.lang`、`java.util`、`javafx.event` 和 `javafx.scene.input` 包。我们研究了 **KeyCode**
    常量和 **KeyEvent** 类，然后使用 **.setOnKeyPressed()** 和 **.setOnKeyReleased()** 事件处理结构（同时兼容
    Java 7 和 Java 8）在 Java 游戏代码中实现了这一 `KeyEvent` 处理。


    在下一章中，我们将探讨如何利用本章创建的 `KeyEvent` 事件处理结构在屏幕上移动游戏精灵，以及如何确定屏幕边界（边缘）、角色方向、移动速度，以及相关的动画和移动考量。


    第十章


    ![image](img/frontdot.jpg)


    指挥演员阵容：创建选角导演引擎与贝果演员类


    既然我们已经在第 8 章中创建了公共抽象类 `Actor` 和 `Hero`（即演员引擎），并在第 9 章中实现了一些基本的 `KeyEvent` 处理，现在是时候在第
    10 章中进一步完善我们的游戏基础设施了。我们将创建另一个 Java 类来管理我们的演员阵容，名为 **CastingDirector.java**（即选角引擎）。这样做的目的是，我们能够追踪游戏画面中那些通过
    `Actor` 和 `Hero` 抽象类创建出来的 `Actor` 对象。在任何给定的游戏时刻（或关卡），了解当前屏幕上（或者用我们喜欢的电影制作术语来说，舞台上或片场中）有哪些游戏组件（演员）是至关重要的。


    在本章中，我们还需要进一步学习并使用 **List** 和 **ArrayList** 类，以及 **Set** 和 **HashSet** 类。这些 Java“集合”类将管理我们用来**追踪**当前参与游戏画面的
    `Actor` 对象的 `List` 对象和 `Set` 对象。我们将在本章早期详细讲解这些 **java.util** 包中的类，所以请准备好学习 Java
    数组对象，以及其他一些对初学者来说可能颇具挑战性的、相当高级的 Java 编程概念。不过，这些知识在你进行 Java 8 游戏开发工作时会非常有用，因此我决定将它们纳入本书。


    我们还想为游戏创建第一个演员，即 InvinciBagel 角色演员，因为我不想在第 8 章编写完代码后，迟迟不将其付诸实践（即用它来创建演员）。我们将通过创建一个
    **Bagel.java** 类来实现这一点，该类将使用 Java 的 **extends** 关键字来继承 `Hero.java` 抽象类。这使得 `Bagel.java`
    成为一个子类，而 `Hero.java` 则成为其超类。


    一旦我们有了 `Bagel.java` 类，我们将使用 Java 的 **new** 关键字和 `Bagel` 类的 `Bagel()` 构造方法来创建一个名为
    **iBagel** 的 `Bagel` 对象。我们将为 `iBagel` 对象加载一些临时的 SVG 数据，至少在我们于第 16 章中讲解如何创建复杂的
    SVG 碰撞形状数据（涵盖碰撞检测）之前是这样。我们还将传入 X 和 Y 坐标，将 `iBagel` 演员放置在屏幕中央，最后传入我们在第 8 章中首次接触到的
    9 字符移动精灵“赛璐珞片”。


    我们这样做是为了让你能够开始利用我们在第 8 章中煞费苦心（或者应该说，满怀热忱地）设计的公共抽象类 `Actor` 和 `Hero` 基础设施中的主要数据字段（变量、属性或特性）。


    在第 10 章中，我们还将再次在我们的 **InvinciBagel.java** 主应用程序类中工作，并将在我们即将编写的一个新的 **.createGameActor()**
    方法中创建我们的 **iBagel** Bagel（Hero）对象，以便将我们的主角连接到 `GamePlayLoop` 类的 `.handle()` 方法。这将进而访问（调用）`Bagel`
    类的 `.update()` 方法，这样我们就可以开始控制游戏主角——InvinciBagel 本人的移动了。


    游戏设计：添加我们的 CastingDirector.java 类


    我首先要做的是更新我们的 `invincibagel` 包和类结构图，向你展示我们将在本章中使用 Java **ArrayList** 和 **HashSet**
    类（对象）开发的新演员（精灵）管理类。正如你在图 10-1 中所见，我将把这个类命名为 **CastingDirector.java**，因为它的作用就像任何娱乐项目中的选角导演一样，为项目添加演员，并在场景结束时移除他们。这个类还将包含一个
    Java **集合**（Java `ListArray` 是一个有序集合，而 Java `HashSet` 是一个无序集合），当我们稍后在书中开始实现碰撞检测时，将会用到这个集合。随着你的游戏关卡和场景变得越来越复杂，你会庆幸拥有一个
    `CastingDirector` 类，它能保持游戏演员的有序组织，并根据游戏编程逻辑的需要添加或移除演员。精确追踪场景中究竟有多少个 `Actor`（固定精灵）和
    `Hero`（运动精灵）对象非常重要，这样你才能在碰撞检测代码（算法）中只涉及尽可能少的演员数量。这是优化游戏编程逻辑的一个功能，目的是让游戏在所有平台上都能流畅运行。

