  trans: '

    NetBeans 8.0 并非 Bug 的盟友：使用调试器消灭 Bug


    在所有计算机编程语言中，都有一个共识：一个“Bug”或未能完全按你预期运行的代码，其对你编程项目的负面影响会随着它未被修复的时间越长而越大，因此 Bug 必须在它们“诞生”后立即被消灭。NetBeans
    的 Bug 查找**代码分析**工具、集成的 **NetBeans 调试器**，以及与第三方 **FindBugs** 项目的集成（根据你从 Audacity
    获得的经验，你可以在 SourceForge 网站上找到它：**[`findbugs.sourceforge.net`](http://findbugs.sourceforge.net)**，如果你想要独立版本的话），所有这些都补充了我之前讨论过的实时、“即输即改”的代码修正和效率工具（参见“NetBeans
    8.0 很智能：让你的代码编辑进入超速模式”一节）。


    你的 Java 代码在本书稍后部分之前不会太复杂，因此我将在你的知识储备更深入一些后，再介绍当你需要使用这些工具时它们是如何工作的。


    NetBeans 8.0 是速度狂人：使用分析器优化代码


    NetBeans 还有一个叫做**分析器**的工具，它会在你的 Java 8 代码运行时对其进行观察，然后告诉你它使用**内存**和 **CPU** 周期的**效率**如何。这使你能够优化代码，使其在关键系统资源的使用上更高效，这对于
    Java 8 游戏开发来说相当重要，因为它会影响游戏在性能不那么强大的系统（例如，在单核和双核 CPU 上）上运行的流畅度。


    这个分析器是一个**动态**软件分析工具，因为它会在你的 Java 代码**运行时**对其进行观察；而 FindBugs 代码分析工具则是一个**静态**软件分析工具，因为它仅仅是在你的代码**在编辑器中**、尚未编译并在系统内存中运行时对其进行查看。NetBeans
    调试器允许你在代码运行时**单步执行**，因此该工具可以被视为一种**混合体**，其范围从静态（编辑）到动态（执行）代码分析模式。


    在你为你的 Java 8 (JavaFX) 游戏引擎创建好基础（在接下来的几节中）之后，你将运行分析器，看看它在 NetBeans IDE 8.0 内部是如何工作的。我将尽可能多地提前介绍
    NetBeans 的关键特性，以便你熟悉这个软件。


    创建你的 Java 8 游戏项目：InvinciBagel


    让我们言归正传，为你的游戏打下基础。我将演示如何创建一个原创游戏，以便你能看到开发一个尚不存在的游戏所涉及的过程，这与大多数游戏编程书籍不同，那些书籍通常是复制市场上已有的游戏。我已获得我的客户
    **Ira Harrison-Rubin**（**BagelToons** 系列的漫画家/作者/幽默作家）的许可，让读者在本书的编写过程中看到创建他的 **InvinciBagel**
    卡通游戏的过程。


    点击任务栏上的快速启动图标（或双击桌面上的图标）启动 NetBeans 8.0，你将看到 NetBeans 启动屏幕，如图 2-2 所示。此屏幕包含一个进度条（红色），并会告诉你正在执行哪些操作来配置
    NetBeans IDE 以供使用。这涉及将 IDE 的各种组件加载到你的计算机系统内存中，以便在开发过程中能够流畅且实时地使用它们。


    ![9781484204160_Fig02-02.jpg](img/9781484204160_Fig02-02.jpg)


    图 2-2。使用快速启动图标启动 NetBeans 8.0


    在 NetBeans IDE 8.0 加载到你的系统内存后，NetBeans 8.0 的**起始页**将显示在你的屏幕上，如图 2-3 所示。点击起始页选项卡右侧的“**x**”关闭此页面。


    ![9781484204160_Fig02-03.jpg](img/9781484204160_Fig02-03.jpg)


    图 2-3。点击屏幕左上角起始页选项卡右侧的“x”关闭该选项卡，以显示 NetBeans IDE 8.0


    这将显示我称之为“原始”的 IDE，其中没有激活任何项目。现在好好享受这一刻吧，因为很快你就会用项目组件的窗格填满这个 IDE（你可以在图 2-4 中看到这个空
    IDE 的一部分，它只包含菜单和快捷图标，几乎没有其他内容）。


    ![9781484204160_Fig02-04.jpg](img/9781484204160_Fig02-04.jpg)


    图 2-4。显示原始的 NetBeans 8.0 IDE（左侧）和一个 JavaFX 新建项目对话框（右侧）


    以防你好奇，起始页会在你每次启动 NetBeans IDE 时显示，如果你以后想打开起始页选项卡，也许是为了探索媒体库部分（演示）和教程，你可以随时打开！要随时打开起始页，请使用
    NetBeans IDE 8.0 的**帮助**菜单和**起始页**子菜单。为方便日后参考，我通常这样表示菜单序列：**帮助 ![image](img/arrow.jpg)
    起始菜单**。


    在 NetBeans IDE 8.0 中，你要做的第一件事就是创建一个新的 **InvinciBagel 游戏项目**！为此，你将使用 NetBeans 8.0
    的**新建项目**系列对话框。这是我之前提到的那些有用的 Java 编程特性之一（参见“NetBeans IDE 8.0 很智能：让你的编辑进入超速模式”一节），它会创建一个包含正确
    JavaFX 库、.main() 和 .start() 方法以及 import 语句的引导项目（更多详情，请参见第 3 章）。


    点击 IDE 左上角的**文件**菜单，如图 2-4（左侧）所示，然后选择**新建项目**（第一个菜单项）。请注意，此选项右侧给出了一个键盘快捷键（**Ctrl+Shift+N**），方便你记忆。


    如果你想使用这个键盘快捷键调出新建项目系列对话框，请同时按住键盘上的 **CTRL** 和 **Shift** 键，并在按住它们的同时按下 **N** 键。这将产生与使用**文件
    ![image](img/arrow.jpg) 新建项目**菜单序列相同的效果。


    该系列中的第一个对话框是**选择项目**对话框，如图 2-4（右侧）所示。因为你将在游戏中使用强大的 JavaFX 新媒体引擎，请从**类别**窗格的编程语言类别列表中选择
    **JavaFX**，并且由于游戏是一种应用程序，请从**项目**窗格中选择 **JavaFX 应用程序**。


    请记住，Oracle 已将 JavaFX 作为 Java 7 和 Java 8 的一部分，因此 JavaFX 游戏也是 Java 游戏，而在 Java 7
    之前（Java 6 中），JavaFX 是它自己独立的编程语言！JavaFX 引擎必须被重新编码为 Java（7 和 8）API（一组库），才能成为 Java
    编程语言无缝的一部分。JavaFX API 取代了 AWT（抽象窗口工具包）和 Swing，尽管这些较旧的 UI 设计库仍然可以在 Java 项目中使用，但它们通常仅由遗留（较旧）的
    Java 代码使用，以便这些项目能够在 Java 7 和 8 中编译和运行。稍后在本章中，你将编译并运行你在此处创建的新项目。


    请注意，在其他窗格下方有一个**描述**窗格，它会告诉你你的选择将得到什么。在这种情况下，将是**一个启用了 JavaFX 特性的新 Java 应用程序**；这里的“启用”表示
    JavaFX API 库将被包含（并启动）在 Java 应用程序项目的类和方法中，正如你很快将在代码中看到的那样（有关代码含义的更多信息，请参见第 3 章）。

    '
