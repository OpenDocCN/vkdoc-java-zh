    NetBeans 分析工具，直到你习惯它为止，因为许多开发者因为不熟悉而回避这个工具。


    你看不到任何事件的原因是，仅仅创建 `GamePlayLoop` 对象并不足以让其中的 `.handle()` 方法捕获脉冲事件。因为它是一种定时器对象（确切地说是
    `AnimationTimer`），像任何定时器一样，它需要被 **启动** 和 **停止**。接下来，让我们为 `GamePlayLoop` 创建这些方法。


    **控制你的 GamePlayLoop：.start() 和 .stop()**


    由于 `AnimationTimer` 超类拥有 `.start()` 和 `.stop()` 方法，它们控制类（对象）何时（通过调用 `.start()`
