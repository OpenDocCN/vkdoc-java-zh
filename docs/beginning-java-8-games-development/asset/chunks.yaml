  raw: 'A hexadecimal value in Java always starts with a **0 and an x**, like this:
    **0xFFFFFF**. This hexadecimal color value represents the Color.WHITE constant
    and uses no alpha channel. Each of the six slots in this **24-bit hexadecimal
    representation** stands for a single Base16 value, so to get the 256 values required
    for each RGB color will take two slots, as 16 × 16 = 256\. Therefore, to represent
    a 24-bit image using hexadecimal notation, you would need to have six slots after
    the pound sign to hold each of the six hexadecimal data values (data pairs representing
    256 levels of value each). If you multiply 16 × 16 × 16 × 16 × 16 × 16 you will
    get the 16,777,216 colors that are possible using 24-bit, truecolor image data.


    The hexadecimal data slots represent RGB values in the following format: **0xRRGGBB**.
    For the Java constant Color.WHITE, all the red, green, and blue channels in the
    hexadecimal color data value representation are at the full (maximum color value)
    luminosity setting. If you add all these colors together, you will get white light.


    The color yellow would be represented by the red and green channels’ being on,
    and the blue channel’s being off, so a hexadecimal representation for Color.YELLOW
    would therefore be **0xFFFF00**, where both the red and green channel slots are
    fully on (FF, or a 255 Base10 data value), and the blue channel slots are fully
    off (00, or a 0 value).


    The eight hexadecimal data slots for an ARGB value will hold data using the following
    format: **0xAARRGGBB**. Thus, for the Color.WHITE, all alpha, red, green, and
    blue channels in the hexadecimal color data value representation would be at their
    maximum luminosity (or opacity), and the alpha channel would be fully opaque,
    that is, not transparent, as represented by an FF value. Therefore, the hexadecimal
    value for the Color.WHITE constant would be **0xFFFFFFFF**.


    A 100 percent transparent alpha channel can be represented by setting an alpha
    slot to 0, as you observed when you created a windowless Java 8 application (see
    [Chapter 4](#9781484204160_Ch04.xhtml)). Therefore, you would represent transparent
    image pixel values using any value between **0x00000000** and **0x00FFFFFF**.
    It is important to note that if an alpha channel value equates to full transparency,
    it would follow that the 16,777,216 color values that could be contained in the
    other six (RGB) hexadecimal data value slots will not matter at all, because that
    pixel, being transparent, will be evaluated as not being there and thus will not
    be composited in the final image or animation composite image.


    Digital Image Masking: Using Alpha Channels to Create Game Sprites


    One of the primary applications for alpha channels in game design is to **mask**
    out areas of an image or animation (series of images) so that it can be used as
    a game sprite in a game play image-compositing scenario. **Masking** is the process
    of cutting subject matter out of a digital image so that the subject matter can
    be placed on its own virtual layer, using alpha channel transparency values. This
    is done using a digital imaging software package, such as GIMP.


    Digital image–compositing software packages, such as Photoshop and GIMP, feature
    tools that are included for use in masking and image compositing. You cannot do
    effective image compositing without doing effective masking, so this is an important
    area to master for game designers who wish to integrate graphics elements, such
    as image sprites and sprite animation, into their game designs. The art of digital
    image masking has been around for a very long time!


    Masking can be done for you automatically, using professional blue screen (or
    green screen) backdrops, along with computer software that can automatically extract
    those exact color values to create a mask, which is turned into alpha channel
    (transparency) information (data). Masking can also be done manually, using digital
    image software, via one of the algorithmic selection tools, in conjunction with
    various sharpening and blur algorithms.


    You will learn a lot about this work process over the course of this book, using
    common open-source software packages, such as GIMP. Masking can be a complex and
    involved work process. This chapter is intended to expose you to foundational
    knowledge that will underlie the processes you undertake while working through
    the book.


    A key consideration in the masking process is getting smooth, sharp edges around
    a masked object (subject matter). This is so that when you place a masked object
    (in this case, a game sprite) into (over) new background imagery, it looks as
    if it were photographed there in the first place. The key to doing this successfully
    lies in your **selection** work process, which entails using digital image software
    **selection tools,** such as the **scissors** tool in GIMP, or the **magic wand**
    tool in Photoshop, in the proper fashion. Choosing the correct work process is
    critical!


    For instance, if there are areas of **uniform color** around the object that you
    wish to mask (maybe you shot it against a blue screen), you will use a magic wand
    tool with a proper **threshold** setting to select everything except your object.
    Then, you **invert** the **selection**, which will give you a **selection set**
    containing the object. Often, the correct work process requires approaching something
    in reverse. Other selection tools contain complex algorithms that can look at
    color changes between pixels. These can be useful for **edge detection**, which
    you can use for other selection methods.


    Smoothing Digital Image Composites: Using Antialiasing to Smooth Image Edges


    **Antialiasing** is a popular digital image–compositing technique, in which two
    adjacent colors in a digital image are **blended** together along the **edge that**
    borders the two color areas. This tricks the viewer’s eye into seeing a smoother
    (less jagged) edge when the image is zoomed out, thereby eliminating what has
    come to be called image jaggies. Antialiasing provides an impressive result by
    using averaged color values (a color range that is a portion of the way between
    the two colors coming together), with just a few colored pixels along the edge
    that needs to be smoothed.


    Let’s take a look at an example to see what I am talking about. [Figure 5-2](#9781484204160_Ch05.xhtml#Fig2)
    shows what appears to be a razor-sharp red circle on one layer, overlaying a yellow
    fill color on a background layer. I zoomed into the red circle’s edge and then
    made another screenshot, placing it to the right of the zoomed-out circle. This
    screenshot reveals a range of antialiasing color values (yellow-orange, to orange,
    to red-orange) right on the edge bordering the red and yellow colors, where the
    circle meets the background.


    ![9781484204160_Fig05-02.jpg](OEBPS/Images/9781484204160_Fig05-02.jpg)


    [Figure 5-2](#9781484204160_Ch05.xhtml#_Fig2). A red circle composited on a yellow
    background (left) and a zoomed-in view (right) showing antialiasing


    It is important to note that the JavaFX engine will antialias 2D shapes and 3D
    objects against all background colors and background imagery, using the Java2D
    software renderer or the hardware rendered with the Prism engine, which can use
    OpenGL or DirectX. You will still be responsible for correctly compositing, that
    is, providing antialiasing for your multilayered imagery, using each image’s alpha
    channel.


    Digital Image Optimization: Using Compression, Indexed Color, and Dithering'
  trans: '

    Java 中的十六进制值总是以 **0 和 x** 开头，例如：**0xFFFFFF**。这个十六进制颜色值代表 Color.WHITE 常量，并且不使用
    Alpha 通道。在这个 **24 位十六进制表示法** 中，六个位置各自代表一个 Base16 值，因此要为每种 RGB 颜色获取所需的 256 个值，需要占用两个位置，因为
    16 × 16 = 256。所以，要使用十六进制表示法表示一幅 24 位图像，你需要在井号后面有六个位置来存放六个十六进制数据值（每个数据对代表 256 个级别的值）。如果你计算
    16 × 16 × 16 × 16 × 16 × 16，你将得到使用 24 位真彩色图像数据所能表示的 16,777,216 种颜色。


    这些十六进制数据位置以如下格式表示 RGB 值：**0xRRGGBB**。对于 Java 常量 Color.WHITE，其十六进制颜色数据值表示中的所有红色、绿色和蓝色通道都处于最大亮度（最大颜色值）设置。如果你将这些颜色全部相加，你将得到白光。


    黄色则通过红色和绿色通道开启、蓝色通道关闭来表示，因此 Color.YELLOW 的十六进制表示是 **0xFFFF00**，其中红色和绿色通道位置完全开启（FF，即十进制
    255），而蓝色通道位置完全关闭（00，即 0 值）。


    一个 ARGB 值的八个十六进制数据位置将使用以下格式存放数据：**0xAARRGGBB**。因此，对于 Color.WHITE，其十六进制颜色数据值表示中的所有
    Alpha、红色、绿色和蓝色通道都将处于最大亮度（或不透明度），并且 Alpha 通道将完全不透明，即没有透明度，由 FF 值表示。因此，Color.WHITE
    常量的十六进制值是 **0xFFFFFFFF**。


    一个 100% 透明的 Alpha 通道可以通过将 Alpha 位置设置为 0 来表示，正如你在创建无窗口 Java 8 应用程序时所看到的那样（参见第 4
    章）。因此，你将使用 **0x00000000** 到 **0x00FFFFFF** 之间的任意值来表示透明图像像素值。需要注意的是，如果一个 Alpha
    通道值等于完全透明，那么其他六个（RGB）十六进制数据值位置可能包含的 16,777,216 种颜色值将完全无关紧要，因为该像素是透明的，会被视为不存在，因此不会合成到最终的图像或动画合成图像中。


    数字图像遮罩：使用 Alpha 通道创建游戏精灵


    在游戏设计中，Alpha 通道的主要应用之一是**遮罩**出图像或动画（一系列图像）的某些区域，以便在游戏玩法的图像合成场景中将其用作游戏精灵。**遮罩**是从数字图像中裁剪出主体内容的过程，以便使用
    Alpha 通道透明度值将该主体内容放置在其自己的虚拟图层上。这通常使用数字成像软件包（如 GIMP）来完成。


    数字图像合成软件包，例如 Photoshop 和 GIMP，都配备了用于遮罩和图像合成的工具。没有有效的遮罩，就无法进行有效的图像合成，因此对于希望将图形元素（如图像精灵和精灵动画）集成到游戏设计中的游戏设计师来说，这是一个需要掌握的重要领域。数字图像遮罩艺术已经存在了很长时间！


    遮罩可以自动为你完成，使用专业的蓝屏（或绿屏）背景，配合能够自动提取这些精确颜色值以创建遮罩的计算机软件，该遮罩随后会转换为 Alpha 通道（透明度）信息（数据）。遮罩也可以手动完成，使用数字图像软件，通过某种算法选择工具，并结合各种锐化和模糊算法。


    在本书的学习过程中，你将使用常见的开源软件包（如 GIMP）了解很多关于这个工作流程的知识。遮罩可能是一个复杂且涉及面广的工作流程。本章旨在让你了解一些基础知识，这些知识将是你阅读本书时进行相关操作的基础。


    遮罩过程中的一个关键考虑因素是，在遮罩对象（主体内容）周围获得平滑、锐利的边缘。这样，当你将遮罩对象（在本例中为游戏精灵）放置到（覆盖在）新的背景图像上时，它看起来就像最初是在那里拍摄的一样。成功做到这一点的关键在于你的**选区**工作流程，这需要以正确的方式使用数字图像软件**选区工具**，例如
    GIMP 中的**剪刀**工具或 Photoshop 中的**魔棒**工具。选择正确的工作流程至关重要！


    例如，如果你想要遮罩的对象周围有**均匀颜色**的区域（也许你是在蓝屏前拍摄的），你将使用魔棒工具并设置合适的**阈值**来选择除对象之外的所有内容。然后，你**反选**这个**选区**，这将得到一个包含该对象的**选区集合**。通常，正确的工作流程需要逆向思考。其他选区工具包含复杂的算法，可以查看像素之间的颜色变化。这些算法可用于**边缘检测**，你可以将其用于其他选区方法。


    平滑数字图像合成：使用抗锯齿平滑图像边缘


    **抗锯齿**是一种流行的数字图像合成技术，其中数字图像中两种相邻的颜色沿着分隔两个颜色区域的**边缘**进行**混合**。这可以欺骗观看者的眼睛，使其在图像缩小时看到更平滑（锯齿更少）的边缘，从而消除所谓的图像锯齿。抗锯齿通过使用平均颜色值（介于两种颜色之间的颜色范围），仅沿着需要平滑的边缘使用少量彩色像素，就能产生令人印象深刻的效果。


    让我们看一个例子来理解我在说什么。图 5-2 显示了一个图层上一个看起来非常锐利的红色圆形，覆盖在背景图层的黄色填充色上。我放大了红色圆形的边缘，然后截取了另一张截图，将其放置在缩小后的圆形右侧。这张截图揭示了在红色和黄色颜色交界处（即圆形与背景相接处）有一系列抗锯齿颜色值（黄橙色、橙色、红橙色）。


    ![9781484204160_Fig05-02.jpg](img/9781484204160_Fig05-02.jpg)


    图 5-2. 合成在黄色背景上的红色圆形（左）和显示抗锯齿效果的放大视图（右）


    需要注意的是，JavaFX 引擎将使用 Java2D 软件渲染器或使用 Prism 引擎（可使用 OpenGL 或 DirectX）的硬件渲染，对所有背景颜色和背景图像上的
    2D 形状和 3D 对象进行抗锯齿处理。你仍然需要负责正确合成，即利用每个图像的 Alpha 通道为你的多层图像提供抗锯齿效果。


    数字图像优化：使用压缩、索引颜色和抖动

