    \    iBagelLocation = (int) invinciBagel.iBagel.getiY();\n    bulletType = randomNum.nextBoolean();\n\
    \    if(bulletType) {\n    spriteFrame.setTranslateY(randomLocation);\n    randomOffset\
    \ = randomLocation + 5;\n    } else {\n    spriteFrame.setTranslateY(iBagelLocation);\n\
    \    randomOffset = iBagelLocation + 5;\n    }\n    callAttack = true;\n} else\
    \ { attackCounter+=1; }\n```\n\n![9781484204160_Fig17-58.jpg](OEBPS/Images/9781484204160_Fig17-58.jpg)\n\
    \n[Figure 17-58](#9781484204160_Ch17.xhtml#_Fig58). Add an if-else structure after\
    \ the `bulletType`, `randomLocation`, and `iBagelLocation` to locate by `bulletType`\n\
    \n## Adding Gravity to the Bullets: Intro to Game Physics\n\nSince physics calculations\
    \ tend to use fractional numbers rather than integers, we need to pull the `randomOffset`\
    \ out of the compound integer declaration and make it a `double randomOffset;`\
