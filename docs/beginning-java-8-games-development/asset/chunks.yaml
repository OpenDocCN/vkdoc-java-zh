    如你所见，初始化每个事件队列（包括脉冲事件）以及所有四个 `ActionEvent` `EventHandler` 事件处理队列只需要不到一毫秒的时间。这符合我们的最大游戏优化方法，即使用静态场景图节点，并且不在
    `GamePlayLoop` 内部执行任何会消耗比完成你在创建动作街机游戏过程中将要构建的各种任务所绝对必需的更多系统资源（内存和处理周期）的操作。


