    background is revealed for us to develop our game over. Later on we can use the
    ImageView plates that we use for our splash screen support to provide background
    image compositing for the game to make it more interesting visually. The way that
    we are going to hide the two ImageView Node objects in the Scene Graph is by calling
    the **.setVisible()** method off of each of these objects inside of the .handle()
    method that is attached to the PLAY GAME UI Button object. This can be seen in
    the bottom portion of [Figure 9-2](#9781484204160_Ch09.xhtml#Fig2), and would
    be implemented using the following two lines of Java code, inside of the **.handle()**
    EventHandler<ActionEvent> method structure:


