    [Figure 12-19](#9781484204160_Ch12.xhtml#_Fig19). Testing the InvinciBagel character
    movement; shown as stopping at the top and bottom boundary limits


    Now that we have both organized and encapsulated our code, got the sprite movement
    working and set the boundaries for the edges of the screen, we can start to look
    at implementing the different sprite image states so that when combined with the
    key movement, we can start to create a more realistic InvinciBagel character action
    figure!


    Summary


    In this twelfth chapter, we privatized our primary InvinciBagel.java class as
    much as possible, and removed all of the static modifier keywords that were not
    specifically related to constants (WIDTH and HEIGHT). First we removed the public
    static Boolean variables and made them private to the InvinciBagel class, and
    then created getter and setter methods to allow the Bagel class to use these variables
    using .is() method calls. We also had to pass the InvinciBagel object reference
    to the Bagel object inside of the front of the Bagel() constructor parameter list
    using the Java **this** keyword. We made these same changes to the static Bagel
    iBagel object declaration, removing the static modifier keyword and passing the
    InvinciBagel object context using the Java **this** keyword, this time inside
    of the GamePlayLoop() constructor method call. To do this we had to create our
    own custom GamePlayLoop() constructor method rather than using the one that is
    created by the compiler (JVM) if we do not specifically provide one.


    After that we removed the other two static modifier keywords on the StackPane
    and HBox objects, and made all of the rest of the variables private, at least
    for now, to provide the greatest level of encapsulation for the InvinciBagel (primary)
    game class.


    Next, we reorganized the code in the Bagel.java class relating to the .update()
    method. We created specific methods for polling the keypressed values and setting
    the iX and iY properties for the object, which we called the .setXYLocation()
    method, as well as creating the .moveInvinciBagel() method for calling the .setTranslate()
    methods.


    Finally, we created a new .setBoundaries() method in the Bagel.java class, which
    is called after the .setXYLocation() method but before the .moveInvinciBagel()
    method that makes sure that our main character stays on the screen at all times.


    In the next chapter, we are going take a look at advanced concepts regarding animating
    the game sprite as it **is moved** around your screen using the List<Image> ArrayList<Image>
    object, so that we get more realistic sprite animation before we get into advanced
    topics such as digital audio, collision detection, and physics simulation.


    CHAPTER 13


    ![image](OEBPS/Images/frontdot.jpg)


    Animating Your Action Figure States: Setting the Image States Based on KeyEvent
    Processing


    Now that we have also organized your Java code into logical methods in the Bagel.java
    class, as well as making sure that all of our Java code is standards compliant
    in [Chapters 11](#9781484204160_Ch11.xhtml) and [12](#9781484204160_Ch12.xhtml),
    it is time to get into some more complicated code structures that will animate
    our InvinciBagel character on the screen as the user moves the character. For
    instance, if the character is traveling due East or due West (using only left
    or right keypresses, to travel in a straight line), he should be running (alternating
    between the imageStates(1) and imageStates(2) List<Image> elements). If the up
    key is also pressed, he should be leaping up in the direction of the left or right
    keypress, and if the down key is pressed, he should be preparing to land in the
    direction of the left or right keypress.


    We will also need to implement the Actor class’s **isFlipH** property or attribute,
    so that the character is facing the right way based upon the direction he is traveling.
    Instead of using another image for that, we will use the JavaFX capability to
    “flip” or “mirror” any image around its central Y axis (isFlipH) or around its
    central X axis (isFlipV). Once a sprite animation state is combined with the movement
    code that you put into place in the previous chapter, you’ll be amazed at how
    realistic this character will become, and we are still using only nine sprite
    state images (under 84KB of total data footprint used for our new media assets
    so far).


    We will do all of this character animation during this chapter using only Java
    code, and using only the JavaFX **AnimationTimer** (GamePlayLoop) superclass.
    This way, we are optimizing the use of the JavaFX pulse engine for our game by
    accessing the pulse event timing engine using only the **javafx.animation** package’s
    class that uses the least amount of memory overhead. The AnimationTimer class
    is the most simple class, with no class variables, and only a **.handle()** method
    to implement, and yet it is also the most powerful, because it lets you write
    all of your own code.


    This approach allows us to write custom code to animate a character based on keys
    pressed and movement, rather than triggering predefined Timeline objects based
    on KeyFrames (and their KeyValues) along that Timeline. I am keeping it simple
    on the game engine side, and putting all of the complexity into our custom game
    play code. This will save us a lot of headaches later on, trying to “synchronize”
    keyframe-based and timeline-based linear animations, which puts us into a linear
    timeline-based paradigm, such as Flash uses. This 100% Java 8 coding approach
    is certainly more difficult, from a Java coding perspective, but gives us an order
    of magnitude more power, to achieve a seamless integration of event processing,
    screen movement, character animation, physics, and collision detection. Setting
    up a multitude of prebuilt JavaFX Animation subclasses would presumably allow
    the same results in the end, but the code would be less elegant, and probably
    much more difficult to build future versions of the game play on top of.


    All of our character state animation will be created using a **.setImageState()**
    method that will be called from inside of the .update() method, so, we will continue
    to be organized in the movement and animation of our character.


