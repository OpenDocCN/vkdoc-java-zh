    `InvinciBagel` 启动画面艺术效果的信息屏幕。现在我们可以学习 Java lambda 表达式了。


    ## Lambda 表达式：Java 8 强大的新特性


    2014 年发布的 Java 8 中一个重要的新特性是 **lambda 表达式**。使用 lambda 表达式可以使代码更紧凑，并允许您使用 Java 8
    新的 lambda **->** “箭头”运算符将方法转换为简单的 Java 语句。lambda 表达式提供了一种 Java 代码快捷方式，通过使用 lambda
    表达式来构造单个方法接口。


    Java 8 lambda 表达式具有与 Java 方法结构相同的特性，因为它需要传入参数列表以及指定代码“主体”。lambda 表达式调用的代码可以是单个
    Java 语句，也可以是包含多个 Java 编程语句的代码块。这个语句（或这些语句）将利用传入 lambda 表达式的参数来表达。**简单 lambda 表达式**的基本
    Java 8 语法应编写如下：


    ```java

    (参数列表) -> (一个 Java 表达式)

    ```


    您还可以通过使用 Java 中用于定义整个 Java 代码语句块的**花括号**与 lambda 表达式结合，来创建**复杂 lambda 表达式**。这可以通过使用以下格式完成：


    ```java

    (参数列表) -> { 语句一; 语句二; 语句三; 语句 n; }

    ```


    需要注意的是，您不必使用 lambda 表达式来替代传统的 Java 方法！事实上，如果您希望代码与 Java 7 兼容（例如，如果您希望代码也能在使用 Java
    7 的 Android 5.0 上运行），则不必使用 lambda 表达式。然而，由于这 specifically 是一本 Java 8 游戏开发书籍，并且
    lambda 表达式是 Java 8 的主要新特性，而且 NetBeans 会为您将 Java 方法转换为 lambda 表达式（正如您即将看到的），我决定在本书中使用它们。


    让我们仔细看看让 NetBeans 为您将 Java 方法转换为 lambda 表达式的工作流程。如[图 9-5](#9781484204160_Ch09.xhtml#Fig5)
    所示，您的代码中目前有波浪形的黄色警告高亮。'
  raw: 'The next thing that we will need to do is to finish the Button control event
