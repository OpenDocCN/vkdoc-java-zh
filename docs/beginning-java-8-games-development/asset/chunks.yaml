    List 类使用 **() 圆括号**来引用 List 对象，而 Java Array 类则使用 **[] 方括号**。Java List 是“动态的”（幸运的是，我们已经讨论过静态与动态）；也就是说，它是开放式的，而
    Java Array 是“静态的”或固定的，这意味着它的长度在创建时就需要定义。


    实现 List<E> 的对象从零开始编号，就像所有 Java Array 对象一样。这并不奇怪，因为大多数 Java 编程结构也会从零开始计数，而不是从一开始。从优化的角度来看，需要注意的是，**迭代**
    List<E> 中的元素通常比通过数字索引（例如使用 for 循环）更可取（更优化），这大概就是为什么 ListIterator 接口的支持是 List<E>
    接口规范的一部分，因此也是 ArrayList 类的一部分，而 ArrayList 类别无选择，只能实现 List<E> 接口规范，因为它使用了 Java
    的 implements 关键字。


    List<E> 接口还提供了三种方法，允许使用指定对象访问 List。这些方法包括 **.indexOf(Object object)**、**.contains(Object
    object)** 和 **.remove(Object object)**。再次强调，严格从性能角度来看，应谨慎使用这些方法，因为将一个“输入”对象与 List
    中的每个对象进行比较，将比简单地使用对象在 List 中的索引消耗更多的内存和 CPU 周期。毕竟，索引就是为此而生的！在许多实现中，这将执行一次代价高昂的“线性”对象搜索，从
    ListElement[0] 开始，遍历整个列表比较对象。如果你的对象位于此 List 的“头部”，这完全不会耗费太多资源。另一方面，如果你的对象位于包含大量对象元素的
    List 的末尾，那么使用这些“面向对象”的方法很可能会观察到性能下降。好吧，所有方法都是面向对象的，所以我们不妨巧妙地将这些方法称为“对象参数化”方法！


    List<E> 接口还提供了两种方法，用于高效地读取或移除 List 中任意位置的多个 List 元素。**.removeRange(int fromIndex,
    int toIndex)** 方法移除一个范围内的 List 元素，而 **.subList(int fromIndex, int toIndex)** 方法返回
    List 中指定 fromIndex 和 toIndex 之间部分的视图。返回的子列表包含 fromIndex，但不包含 toIndex。


    最后，List<E> 接口提供了三种方法，可以通过单个方法操作整个 List。由于我们使用 List 来管理场景中当前的所有 Actor 对象，我们将主要使用这些方法，这些方法在本章前面的
    ArrayList 部分已经提到过，包括 .addAll()、.removeAll() 和 .clear()。我们还将使用 **.add(E element)**
    方法向我们的 CURRENT_CAST List 中添加单个 Actor 对象。


    最后，虽然从技术上讲，List<E> 允许将自身作为元素包含在内，但这并不被视为一种“良好”的编程实践，因此我不建议这样做。如果你打算尝试这样做，必须极其谨慎，因为在此类
    List 中，**equals** 和 **hashCode** 方法将不再“定义良好”。


    Set 和 HashSet：使用 java.util 无序集合


    **Set<E> 公共接口**也是 Java 集合框架的成员。Java 公共接口 Set<E> 继承了 Collections<E> 公共接口，而 Collections<E>
    又继承了 Iterable<T> 公共接口。因此，Set<E> 从超接口到子接口的层级关系与 List<E> 相同，如下所示：


    ```

    Interface Iterable<T>

      > Interface Collection<E>

        > Interface Set<E>

    ```

