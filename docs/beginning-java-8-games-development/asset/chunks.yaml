    总结


    在这第十六章中，我们开始探讨本书最后几章将涵盖的一些更高级的主题。**碰撞检测**是游戏开发的基础主题之一，无论这是使用 Java 8 还是任何其他平台。在本章中，我们学习了
    **SVG 数据格式**规范，以便我们可以利用 JavaFX **SVGPath** 类，该类允许我们访问**自定义路径形状**（如果它们是闭合的，通常称为**多边形**），而碰撞形状或**碰撞多边形**通常就是如此。我们研究了
    SVG 规范中的七个主要命令，所有这些命令都可以在**绝对模式**或**相对模式**下使用。


    接下来，我们详细了解了如何让 GIMP 2.8 使用完全自动化的流程为我们创建自定义碰撞形状 SVG 数据字符串，该流程仅使用 GIMP 工具（算法），使我们只需单击透明区域，即可让
    GIMP 生成选区。我们将选区转换为碰撞路径，然后将路径导出为 SVG 数据。这个工作流程使我们能够为任何游戏资产数字图像中具有透明（Alpha 通道数据）区域的复杂碰撞多边形生成数据。

