    **Java ++ 运算符**，即 **i++**。在 for 循环 {…} 花括号内，是我们希望在每次循环迭代中执行的操作；在本例中，即针对 List<Actor>
    对象中的每个 Prop Actor 对象执行的操作。这是从第一个元素到最后一个元素迭代任何 List 对象时使用的良好结构。


    在 for 循环内部，我们将创建一个“局部”Actor 对象引用变量，并使用 **invinciBagel.castDirector.getCurrentCast().get(i)**
    方法链将其设置为 **List(i)** 中的**当前元素**。Java 方法链是一种创建紧凑 Java 代码结构的酷炫方式，不是吗？一旦我们使用 CURRENT_CAST(i)
    的演员对象加载了该 Actor 对象，我们将使用 `collide(object);` Java 语句调用 **.collide()** 方法。请记住，我们在
