  trans: '

    你还可以通过添加 Alpha 通道来定义透明度以进行合成，从而增加图像的**数据占用**。这是因为添加 Alpha 通道相当于为待压缩图像增加了一个 8 位颜色通道（实际上是透明度通道）。如果你需要
    Alpha 通道来为图像定义透明度，以满足未来的合成需求（例如将图像用作游戏精灵），那么除了包含 Alpha 通道数据之外，别无选择。


    如果你的 Alpha 通道包含全零值（或使用全黑填充色），这将定义图像为完全透明；或者包含全 FF 值（或使用全白填充色），这将定义图像为完全不透明。那么，实际上你定义的
    Alpha 通道并不包含任何有用的 Alpha 数据值。因此，透明图像需要被移除，而不透明图像则需要定义为 PNG24 而非 PNG32。


    最后，大多数用于在数字图像的 RGB 图层中遮罩对象的 Alpha 通道应该能够很好地压缩。这是因为 Alpha 通道主要是白色（不透明）和黑色（透明）区域，并在两种颜色的边缘之间有一些中灰色值，用于对遮罩进行抗锯齿处理（参见图
    5-2）。这些灰色区域包含了 Alpha 通道中的抗锯齿值，并将为图像 RGB 图层中的对象与其背后的任何背景颜色或背景图像之间提供视觉上平滑的边缘过渡。


    其原因在于，在 Alpha 通道图像遮罩中，一个 8 位的**透明度渐变**（从白色到黑色）定义了透明度的级别，这可以理解为逐像素的混合（不透明度）强度。因此，遮罩中每个对象边缘的中灰色值（包含在
    Alpha 通道中）将主要用于**平均**对象边缘的颜色以及任何目标背景的颜色，无论其包含何种颜色（或图像）值。这为可能使用的任何目标背景（包括动画背景）提供了实时抗锯齿效果。


    数字视频与动画：帧、帧率、循环、方向


    有趣的是，我刚才介绍的所有关于数字图像的概念同样适用于数字视频和动画，因为这两种格式都以数字图像作为其内容的基础。数字视频和动画通过使用**帧**，将数字图像扩展到了第四维度（时间）。这两种格式由**有序的帧序列**组成，这些帧随时间快速显示。


    “帧”一词源于电影行业，即使在今天，电影胶片仍以**每秒 24 帧**（**24FPS**）的**帧率**通过电影放映机播放，从而创造出**运动**的错觉。由于数字视频和动画都由包含数字图像的帧集合构成，因此帧率（以每秒帧数表示）的概念在内存数据占用优化工作流程（针对动画资源）以及数字视频文件大小数据占用优化工作流程中也至关重要。如前所述，在
    JavaFX 中，动画的这一属性存储在 Animation 对象的 **rate** 变量中（参见第 4 章）。


    关于动画对象或数字视频资源中帧的优化概念，与图像中像素的优化概念（数字图像的分辨率）非常相似：用得越少越好！这是因为动画或视频中的帧数会随着每一帧成倍增加系统内存使用量和文件大小数据占用。在数字视频中，不仅每一帧的（图像）分辨率，而且帧率（在**压缩设置**对话框中指定）都会影响文件大小。在本章前面部分，你了解到如果将图像中的像素数乘以其颜色通道数，你将得到图像的原始数据占用。对于动画和数字视频，你现在需要将这个数字再乘以创建运动错觉所需的帧数。


    因此，如果你为游戏准备了一个动画 VGA（RGB）背景板（记住每帧是 900KB），它使用五帧来创建运动错觉，那么你将使用 900KB × 5，即 4,500KB（4.5MB）的系统内存来保存该动画。当然，这对于一个背景来说内存占用太大了，这就是为什么你将使用静态背景配合精灵覆盖层，以不到
    1MB 的代价实现完全相同的最终效果。数字视频的计算略有不同，因为它有数百或数千帧。对于数字视频，你需要将原始图像数据大小乘以数字视频设定的播放帧率（每秒帧数，该帧率值在压缩过程中指定），然后将该结果乘以视频文件中包含的内容总时长（秒数）。


    继续以 VGA 为例，你知道一个 24 位 VGA 图像是 900KB。这使得将其提升到下一个级别的计算变得简单。数字视频传统上以 30FPS 运行，因此
    1 秒的**标清**原始（未压缩）数字视频将是 30 个图像帧，每帧 900KB，总数据占用达到 27,000KB！你可以理解为什么像 MPEG-4 H.264
    AVC 这样的视频压缩文件格式极其重要，因为它能够压缩数字视频可能产生的巨大原始数据占用。JavaFX 媒体包使用了最令人印象深刻的视频压缩**编解码器**（“codec”代表**编码-解码**）之一，该编解码器也受
    HTML5 和 Android 支持，即前面提到的 MPEG-4 H.264 AVC（高级视频编解码器）。这对于开发者进行资源优化非常方便，因为一个数字视频资源可以跨
    JavaFX、HTML5 和 Android 应用程序使用。以防你希望在游戏背景中使用数字视频（我不推荐这样做），接下来我将介绍数字视频压缩和优化的基础知识。


    数字视频压缩概念：比特率、数据流、标清、高清、超高清


    让我们从商业视频中使用的主要或标准分辨率开始。这些分辨率也恰好是常见的设备屏幕分辨率，这可能是因为如果屏幕像素分辨率与屏幕上全屏播放的视频像素分辨率匹配，则不会有缩放，而缩放可能导致**缩放伪影**。在高清出现之前，视频是**标清**（**SD**）的，使用**480
    像素**的垂直分辨率。VGA 是一种标清分辨率，而 **720 × 480** 可以称为**宽标清**分辨率。**高清**（**HD**）视频有两种分辨率，**1,280
    × 720**（我称之为**伪高清**）和 **1,920 × 1,080**（业界称之为**真高清**）。两种高清分辨率都具有 **16:9** 的宽高比，并用于电视和智能电视、智能手机、平板电脑、电子书阅读器和游戏机。现在还有一种**超高清**（**UHD**）分辨率，其像素为
    4,096 × 2,160。

