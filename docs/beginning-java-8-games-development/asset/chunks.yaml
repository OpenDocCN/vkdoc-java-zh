- fmt: 'Finally, we took a look at an updated `invincibagel` package, class and object
    structure diagram, to see just how much progress we have made so far during the
    first eight chapters of this book. This is getting pretty exciting!


    In the next chapter, we are going to take a look at how to control the game sprites
    that we will create using this `Actor` engine that we have created during this
    chapter. This next [Chapter 9](#9781484204160_Ch09.xhtml) will cover Java 8 and
    JavaFX event handling, which will allow our game player to manipulate (control)
    these actor sprites using event handling.


    ## CHAPTER 9


    ![image](OEBPS/Images/frontdot.jpg)


    ### Controlling Your Action Figure: Implementing Java Event Handlers and Using
    Lambda Expressions


    Now that we have created the public abstract `Actor` and `Hero` classes, which
    I call the “actor engine,” in [Chapter 8](#9781484204160_Ch08.xhtml), let’s get
    back into our `InvinciBagel.java` primary application class coding here in [Chapter
    9](#9781484204160_Ch09.xhtml), and create the event handling framework that we
    can use to control the primary hero for our game, the InvinciBagel himself. The
    event handling that implements the interface between the player and your game
    programming logic could be looked at as the “interactivity engine” for your game,
    if we follow the engine paradigm we have been using thus far. There are many ways
    to interface with a game, including arrow keys (also known as a DPAD for consumer
    electronics devices), the keyboard, a mouse or trackball, a game controller, touchscreen,
    or even advanced hardware, such as gyroscopes and accelerometers. One of the choices
    you will make for your game development will be how a player will interface with
    the game, using the hardware device they are playing the game on, and the input
    capabilities it supports.


    During this chapter, we will be doing a number of upgrades to your `InvinciBagel.java`
    class. The first is to add support for the game `WIDTH` and `HEIGHT` variables
    in the form of Java constants. These will allow us to change the width and height
    of the game play surface, which is the area inside of the game window that pops
    up, or the entire screen, if your game player is using a consumer electronics
    device.


    The second upgrade we will do is to add the Java code that will create a blank
    white screen for us to design the game over (on top of) during the next several
    chapters. We’ll do this by installing a `Color.WHITE` background color in the
    `Scene()` constructor method call (along with our new width and height variables),
    and then installing Java code into our `Button` control event handler structure
    that are already in place, to hide the two `ImageView` “plates” we are using for
    image compositing of our splash screen UI design. We can also use these two `ImageView`
    Node objects later on to hold background imagery for our game play, once we get
    into that level of design. Remember it is important to keep the number of Nodes
    in the Scene Graph to a minimum, so we will reuse Node objects, instead of adding
    more.


    The third upgrade we’ll add is to add keyboard event handling routines to our
    `Scene` object that will handle the arrow key support that we will use for the
    game, to span any hardware device that has an arrow key pad or DPAD. This will
    handle any events at the top-level of the `Scene` down to the `StackPane` (Scene
    Graph) hierarchy. This will pass the arrow key values pressed by the user to our
    Node objects. This will eventually allow motion control code to move the actors
    around the game, which is something we will be getting involved with in greater
    detail in the next chapter.


    Besides upgrading our `InvinciBagel.java` code, and adding keyboard event handling,
    we will also be learning about lambda expressions during this chapter, just to
    make sure I get everything that is new in Java 8 covered during this book. These
    lambda expressions are somewhat advanced to be covered in this beginner level
    book, but since they are a major new feature of Java 8, and provide multi-threading
    support as well as more compact code structures, I am going to cover them here
    in this chapter, partly because NetBeans 8 (no surprise here) is willing to code
    them for you!


    ### Game Surface Design: Adding Resolution Flexibility


    The first thing that I want to do to the `InvinciBagel.java` code, which should
    already be open in a tab in NetBeans (if it is not, use the right-click and **Open**
    work process), is to add `WIDTH` and `HEIGHT` constants for the game application.
    The reason for doing this is that you may want to provide custom versions for
    netbooks or tablets (1024 by 600), or iTV set or eReaders (1280 by 720) or HDTV
    usage (1920 by 1080) or even for new 4K iTV sets (4096 by 2160). Having a height
    and width variable allows you to not have to change your `Scene()` constructor
    method call later, and to do certain screen boundary calculations using these
    variables rather than “hard coded” numeric values throughout your code. As you
    can see at the top of [Figure 9-1](#9781484204160_Ch09.xhtml#Fig1), I have created
    a constant declaration for these two variables using a single line of Java code,
    which is known as a compound statement, as you learned in the previous chapter.
    The Java code for this declaration can be seen at the top of the class in [Figure
    9-1](#9781484204160_Ch09.xhtml#Fig1), and should look like the following:


    ```

    static final double WIDTH = 640, HEIGHT = 400;

    ```


    ![9781484204160_Fig09-01.jpg](OEBPS/Images/9781484204160_Fig09-01.jpg)


    [Figure 9-1](#9781484204160_Ch09.xhtml#_Fig1). Add private static final double
    WIDTH and HEIGHT constants; install these, and Color.WHITE, in Scene()


    The next thing that we will want to do is the upgrade our `Stage()` constructor
    method call, to use one of the other overloaded constructor methods that allows
    us to also specify the background color value. Let’s use the `Color` class constant
    of `WHITE`, and our new width and height display screen size constants, and create
    this new constructor method call, using the following line of Java code, which
    is also shown (laden with errors) at the bottom of [Figure 9-1](#9781484204160_Ch09.xhtml#Fig1):


    ```

    scene = new Scene(root, WIDTH, HEIGHT, Color.WHITE);

    ```


    As you can see in [Figure 9-1](#9781484204160_Ch09.xhtml#Fig1), you will have
    a wavy red error underline under your `Color` class reference, until you use the
    **Alt-Enter** work process to bring up the helper dialog (as shown), and select
    the option that specifies “Add import for `javafx.scene.paint.Color`” in order
    to have NetBeans write the Java import statement for you. Once you do this, your
    code will be error free, and we will be ready to write some code that will put
    this background color in place.


    To do this, we’ll need to hide the `ImageView` Node objects that hold our full
    screen (`splashScreenbackplate`) and overlay (`splashScreenTextArea`) image assets.
    We will do this by setting the `visible` attribute (or characteristic, or parameter,
    if you prefer) to a value of `false`, which will allow the white background color
    that we set to show through.


    ### Finishing the UI Design: Coding a Game Play Button'
