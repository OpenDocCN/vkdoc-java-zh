    **Compile File** (the eleventh menu item) to compile your Java code, or use the
    **F9** keyboard shortcut, as indicated at the right of the selection, as seen
    in [Figure 2-8](#9781484204160_Ch02.xhtml#Fig8). Now your project is ready to
    run!


