  trans: '

    **最小化**场景图的诀窍在于使用尽可能少的节点来实现完整的设计，正如你在图 6-3 中所见，这可以通过一个 StackPane **根**节点、一个 VBox
    **分支**（父）节点和七个**叶**（子）节点（一个 **TableView**、两个 **ImageView** 和四个 **Button** UI 控件）来实现。当你接下来（终于！）开始编写场景图代码时，你只需使用
    14 个对象，并导入 12 个类，就能为你上一节设计的 InvinciBagel 游戏构建完整的顶层界面。TableView 将覆盖 ImageView 组合体，该组合体包含设计中的信息屏幕层。这个
    TableView 对象将在游戏设计的后续阶段添加。一个 ImageView **背板**将包含 InvinciBagel 的图稿；一个 ImageView
    **合成**层将包含三张不同的透明图像，这些图像将根据 ActionEvents（按钮控件的点击）无缝叠加在背板图像上；而一个 **VBox** 父级 UI
    布局容器将包含四个 Button 控件。你还需要创建一个 **Insets** 对象来保存**内边距**值，以微调按钮组的对齐方式。


    ![9781484204160_Fig06-03.jpg](img/9781484204160_Fig06-03.jpg)


    图 6-3。主启动画面场景图节点层次结构、其包含的对象以及其引用的资源


    由于 Button 对象无法单独定位，我不得不使用 **HBox** 类，配合 **Insets** 类和 **Pos** 类，来容纳和定位 Button
    控件。本章我将介绍你在此高级设计中将要使用的类，以便你全面了解需要添加到 InvinciBagel 类中以创建此顶层 UI 设计的每一个类。


    我优化场景图以匹配四个不同按钮所需的四个不同屏幕的方式是：使用一个 ImageView 作为**背板**来容纳 InvinciBagel 启动画面图稿，然后再用一个
    ImageView 来容纳使用透明度（Alpha 通道）的不同**合成图像**（叠加层）。通过这种方式，你只需使用两个 ImageView 场景图节点对象，就能模拟出四个不同的屏幕。


    最后，一个 TableView 场景图节点将包含高分榜的表格结构。这将通过分数引擎创建，而分数引擎将在你完成整个游戏设计和编程之后，最后再创建。目前，你将暂时不实现“高分榜”和“开始游戏”按钮的代码。


    场景图代码：优化你当前的 InvinciBagel 类


    我知道你渴望处理 InvinciBagel 类的代码，那么让我们来清理、组织并优化现有的 Java 代码，以实现这个顶层 UI 屏幕设计。首先，将对象声明和命名的
    Java 代码放在 InvinciBagel 类的顶部。这样组织性更强，并且类内部的所有方法无需使用 Java 修饰符关键字就能看到并引用这些对象。如图 6-4
    所示，这些对象包括你现有的 scene 场景对象、root StackPane 对象和 btn Button 对象（我将其重命名为 gameButton）。我添加了另外三个
    Button 对象，分别命名为 **helpButton**、**scoreButton** 和 **legalButton**，全部使用一行 Java 代码声明和命名；以及两个
    ImageView 对象，分别命名为 **splashScreenbackplate** 和 **splashScreenTextArea**。你还需要创建四个
    Image 对象来保存数字图像资源，这些资源将显示在 ImageView 节点中；我将它们命名为 **splashScreen**、**instructionLayer**、**legalLayer**
    和 **scoresLayer**，并使用一条**复合** Java 语句进行声明。最后，你声明并命名了 **buttonContainer** VBox
    对象和 **buttonContainerPadding** Insets 对象。只要你使用 Alt+Enter 键盘快捷键并选择正确的 javafx 包和类路径，NetBeans
    就会为你编写 import 语句。导入语句显示在图的顶部。


    ![9781484204160_Fig06-04.jpg](img/9781484204160_Fig06-04.jpg)


    图 6-4。在类顶部声明和命名构成场景图层次结构的 14 个对象


    本章你将详细查看所有这些 JavaFX 类，以便了解它们的用途以及它们能为你的 Java 应用程序带来什么。


    场景图设计：精简现有的 .start() 方法


    现在，你可以优化 .start() 方法，使其仅包含一两行代码。首先，将场景图节点创建的 Java 例程模块化，放入它们自己的 **createSplashScreenNodes()**
    方法中，该方法将在 .start() 方法的顶部被调用，如图 6-5 所示。在此方法中创建所有节点后，再创建一个 **addNodesToStackPane()**
    方法，将节点添加到 StackPane 根节点，然后是配置和管理 Stage 对象的三行 primaryStage 代码，最后是 ActionEvent 处理代码例程，这些例程将
    Button UI 控件“连接”到点击时要执行的 Java 代码。


    ![9781484204160_Fig06-05.jpg](img/9781484204160_Fig06-05.jpg)


    图 6-5。使用 createSplashScreenNodes() 和 addNodesToStackPane() 方法组织 .start() 方法


    如你所见，在你为每个 Button 对象**复制** **.setOnAction()** 构造后，当你折叠 EventHandler 例程时，你得到了九行代码：一行用于创建节点，一行用于将节点添加到根节点，三行用于
    Stage 对象设置，四行用于 UI 按钮事件处理。考虑到你为游戏结构顶层添加的功能量（游戏玩法、说明、法律信息、致谢、计分板），这已经相当紧凑了。

