- fmt: "# `List<E>` 公共接口：Java 对象的列表集合\n\n`List<E>` 公共接口也是 Java 集合框架的成员。Java 公共接口 `List<E>`\
    \ 继承了 `Collection<E>` 公共接口，而 `Collection<E>` 又继承了 `Iterable<T>` 公共接口。因此，从超接口到子接口的层级关系如下所示，即\
    \ `List<E>` 的 Java 接口层级：\n\n```\nInterface Iterable<T>\n  > Interface Collection<E>\n\
    \    > Interface List<E>\n```\n\n`List<E>` 是一个**有序**的 `Collection<E>`，也可以被视为对象的**序列**。在我们的例子中，`List<Actor>`\
    \ 将是一个有序的 `Actor` 对象序列。`List` 接口的使用者可以精确控制每个元素（在我们的例子中是 `Actor` 对象）在列表中的插入位置。用户可以使用**整数索引**（即元素在列表中的位置）来访问元素，方法是在列表名称后使用**圆括号**。你也可以在列表中搜索元素。\n\
    \n例如，在 `Actor.java` 类中，我们在类顶部声明了以下代码行：\n\n```\nprotected List<Image> imageStates\
    \ = new ArrayList<>();\n```\n\n要访问第一个 `Actor` 类的 `imageState` 的 `Image` 对象列表精灵，我们将使用以下\
    \ Java 语句：\n\n```\nimageStates.get(0);\n```\n\n与 `Set` 对象（我们将在本章下一节学习）不同，符合 `List<E>`\
    \ 接口规范的 `ArrayList` 对象通常允许重复元素。在游戏应用中，一个例子可能包括弹丸（例如子弹），如果你编写的游戏允许 `Enemy` 对象向\
    \ `Bagel` 对象射击。当然，为了优化，我们会尽量将游戏中的重复元素控制在最低限度，但如果我们需要在游戏场景中包含重复元素，拥有 `List<Actor>`\
    \ 实现中的这种能力是很好的。\n\n`List<E>` 接口提供了四种方法，用于通过方法调用中的整数索引对列表元素（对象）进行位置（索引）访问。这些方法包括：`.get(int\
    \ index)` 方法，用于从列表中获取对象；`.remove(int index)` 方法，用于从列表中移除对象；`.set(int index, E\
    \ element)` 方法，用于替换列表中的对象；以及 `.listIterator()` 方法，它返回一个来自列表的 `ListIterator` 对象。`ListIterator`\
    \ 对象允许你同时对多个列表元素执行操作（添加、移除、设置/替换），如果你想知道 `ListIterator` 的用途，这就是它的作用。\n\n`List`\
    \ 接口提供了这种特殊的 `Iterator<E>` 实现，称为 `ListIterator<E>`，它是 `Iterator<E>` 超接口的子接口，以允许多个元素的插入和替换。除了\
    \ `Iterator<E>` 接口提供的常规操作外，`ListIterator<E>` 还提供了双向的列表访问。\n\n我们之前讨论的 `.listIterator()`\
    \ 方法用于获取一个从列表中指定位置开始的 `ListIterator` 对象。因此，使用 `imageStates` 这个 `List<Image>` 的\
    \ `ArrayList` 对象，调用 `imageStates.listIterator()` 方法将产生一个 `ListIterator` 对象，该对象包含对整个\
    \ `imageStates` 的 `ArrayList<Image>` 对象的迭代。这将给我们 `imageStates(0)`（起始列表元素），以及该\
    \ `List<Image>` 在 `ArrayList<Image>` 结构中的其余部分，它们将被引用为 `imageStates(1)`、`imageStates(2)`，最后一个将被引用为\
    \ `imageStates(8)`。Java 的 `List` 类使用**圆括号 `()`** 来引用列表对象，而 Java 的数组类使用**方括号 `[]`**。Java\
    \ 的 `List` 是“动态的”（幸运的是，我们已经讨论过静态与动态）；也就是说，它是开放式的，而 Java 的数组是“静态的”或固定的，这意味着它的长度在创建时就需要定义。\n\
    \n实现 `List<E>` 的对象从零开始编号，就像所有 Java 数组对象一样。这并不奇怪，因为大多数 Java 编程结构也会从零开始计数，而不是从一开始。从优化的角度来看，重要的是要注意，**迭代**\
    \ `List<E>` 中的元素通常比通过数字索引（例如使用 `for` 循环）更可取（更优化），这很可能就是为什么对 `ListIterator` 接口的支持是\
    \ `List<E>` 接口规范的一部分，因此也是 `ArrayList` 类的一部分，而 `ArrayList` 类别无选择，只能实现 `List<E>`\
    \ 接口规范，因为它使用了 Java 的 `implements` 关键字。\n\n`List<E>` 接口还提供了三种方法，允许使用指定的对象来访问列表。这些方法包括：`.indexOf(Object\
    \ object)`、`.contains(Object object)` 和 `.remove(Object object)`。再次强调，严格从性能角度来看，应谨慎使用这些方法，因为将一个“输入”对象与列表中的每个对象进行比较，将消耗比简单使用对象在列表中的索引多得多的内存和\
    \ CPU 周期。毕竟，索引就是为此而存在的！在许多实现中，这将执行一次代价高昂的“线性”对象搜索，从 `ListElement[0]` 开始，遍历整个列表比较对象。如果你的对象位于列表的“头部”，这根本不会耗费太多资源。另一方面，如果你的对象位于包含大量对象元素的列表末尾，你可能会观察到使用这些“面向对象”方法带来的性能下降。好吧，所有方法都是面向对象的，所以我们不妨巧妙地将这些方法称为“对象参数化”方法！\n\
    \n`List<E>` 接口还提供了两种方法，用于高效地读取或移除列表中任意位置处的多个列表元素。`.removeRange(int fromIndex,\
    \ int toIndex)` 方法移除一个范围内的列表元素，而 `.subList(int fromIndex, int toIndex)` 方法返回列表中指定\
    \ `fromIndex` 和 `toIndex` 之间部分的视图。返回的子列表包含 `fromIndex`，但不包含 `toIndex`。\n\n最后，`List<E>`\
    \ 接口提供了三种方法，可以通过单个方法操作整个列表。由于我们使用 `List` 来管理场景中所有的 `Actor` 对象，我们将主要使用这些方法，这些方法在本章前面的\
    \ `ArrayList` 部分已经提到过，包括 `.addAll()`、`.removeAll()` 和 `.clear()`。我们还将使用 `.add(E\
    \ element)` 方法向我们的 `CURRENT_CAST` 列表中添加单个 `Actor` 对象。\n\n最后，虽然从技术上讲，`List<E>`\
    \ 可以包含自身作为元素，但这并不被视为一种“良好”的编程实践，因此我不建议这样做。如果你打算尝试这样做，应极其谨慎，因为 `equals` 和 `hashCode`\
    \ 方法在这样的列表中不再具有“良好定义”。\n\n# `Set` 和 `HashSet`：使用 `java.util` 的无序集合\n\n`Set<E>`\
    \ 公共接口也是 Java 集合框架的成员。Java 公共接口 `Set<E>` 继承了 `Collection<E>` 公共接口，而 `Collection<E>`\
    \ 继承了 `Iterable<T>` 公共接口。因此，`Set<E>` 从超接口到子接口的层级关系与 `List<E>` 相同，如下所示：\n\n```\n\
    Interface Iterable<T>\n  > Interface Collection<E>\n    > Interface Set<E>\n```"
  raw: 'The List<E> Public Interface: A List Collection of Java Objects


    The **List<E> public interface** is also a member of the Java Collections Framework.
    The Java public interface List<E> extends the Collections<E> public interface,
    which extends the Iterable<T> public interface. Thus, the super interface to sub
    interface hierarchy would look something like this following List<E> Java interface
    hierarchy:


    ```

    Interface Iterable<T>

      > Interface Collection<E>

        > Interface List<E>

    ```


    A List<E> is an **ordered** Collection<E> and could also be thought of as a **sequence**
    of objects. In our case, the List<Actor> will be an ordered sequence of Actor
    objects. A user of the List interface has precise control over where in the List
    each element (in our case, Actor object) is inserted. The user can access elements
    using an **integer index**, that is, the position in the List, using a **parenthesis**
    after the name of the List. You can also search for elements in a List.


    For instance, in the Actor.java class, we have the following line of code we declared
    at the top of the class:


    ```

    protected List<Image> imageStates = new ArrayList<>();

    ```


    To access the first Actor class imageState Image object List sprite, we will use
    the following Java statement:


    ```

    imageStates.get(0);

    ```


    Unlike Set objects, which we will be learning about in the next section of the
    chapter, your List<E> interface conformant ArrayList objects will typically allow
    duplicate elements. An example of this for a game application might include projectiles
    (say, bullets) if you have coded the game to allow the Enemy object to shoot at
    the Bagel object. We will, of course, try to keep duplicate elements in our game
    to a minimum for optimization purposes, but it is nice to have this capability
    in the List<Actor> implementation if we need to have duplicate elements in a game
    scene.


    The List<E> interface provides four methods for positional (indexed) access to
    List elements (objects) using the integer index in the method call. These include
    the **.get(int index)** method, to get an object from the List; the **.remove(int
    index)** method, to remove an object from the List; the **.set(int index, E element)**
    method, which will replace an object within the List; and a **.listIterator()**
    method, which returns a **ListIterator** object from the List. A ListIterator
    object allows you to perform an operation (add, remove, set/replace) on more than
    one List element at a time, in case you might be wondering what a ListIterator
    is utilized for.


    The List interface provides this special Iterator<E> implementation, called a
    **ListIterator<E>**, which is a sub interface of the Iterator<E> super interface,
    to allow multiple element insertion and replacement. A ListIterator<E> also provides
    bidirectional List access, in addition to the normal operations that the Iterator<E>
    interface provides.


    The .listIterator() method that we discussed earlier was provided to obtain a
    ListIterator object that starts at a specified position in the list. So using
    an imageStates List<Image> ArrayList object, a imageStates.listIterator() method
    call would produce a ListIteration object containing an iteration over an entire
    imageStates ArrayList<Image> object. This would give us imageStates(0), the starting
    List element, as well as the remainder of this List<Image> in an ArrayList<Image>
    construct, which would be referenced as imageStates(1), imageStates(2), and the
    last one would be referenced as imageStates(8). Java List class use **() parens**
    to reference List objects, whereas Java Array classes use the **[] square brackets**.
    A Java List is “dynamic” (luckily, we have discussed static versus dynamic); that
    is, it’s open-ended, whereas a Java Array is “static,” or fixed, which means that
    its length needs to be defined when it is created.


    Objects that implement List<E> start their numbering schema using a zero, just
    like all Java Array objects. This is not out of the ordinary, as most Java programming
    constructs will also start counting at zero instead of using one. It is important
    to note from an optimization standpoint that **iterating** over the elements in
    List<E> is typically preferable (more optimal) to indexing through it by number,
    for instance using a for loop, which is probably why support for this ListIterator
    interface is a part of the List<E> interface specification, and therefore is a
    part of the ArrayList class, which has no choice but to implement the List<E>
    interface specification because it uses the Java implements keyword.


    The List<E> interface also provides three methods allowing access to the List
    using a specified object. These include **.indexOf(Object object)**, **.contains(Object
    object)**, and **.remove(Object object)**. Again, looking at it strictly from
    a performance standpoint, these methods should be used with caution, because having
    to compare an “input” object to every object inside of the List is going to take
    way more memory and CPU cycles than simply using the index for the object in the
    List. After all, that is what an index is for! In many implementations this will
    perform a costly “linear” object search, starting at ListElement[0] and going
    through the entire list comparing objects. If your object is at the “head” of
    this List, this would not be costly at all. One the other hand, if your object
    is at the end of a List containing a great many object elements, you may well
    observe a performance hit using these “object oriented” methods. Well, all methods
    are object oriented, so, let’s cleverly call these methods “object parameterized”
    instead!


    The List<E> interface also provides two methods to efficiently read or remove
    multiple List elements at an arbitrary point within the List. The **.removeRange(int
    fromIndex, int toIndex)** removes a range of List elements, and the **.subList(int
    fromIndex, int toIndex)** returns a view of the portion of the List between the
    specified fromIndex and the toIndex. The fromIndex is included in the returned
    sub-list, however, the toIndex is not included.


    Finally, the List<E> interface provides three methods that manipulate the entire
    List using a single method. Since we are using the List to manage all of the Actor
    objects currently in the scene, we will primarily be using these methods, which
    were mentioned earlier in the ArrayList section of the chapter and include .addAll(),
    .removeAll(), and .clear(). We will also be using the **.add(E element)** method
    to add a single Actor object to our CURRENT_CAST List.


    Finally, while it is technically permissible for a List<E> to contain itself as
    an element, this is not viewed as being a “good” programming practice, so I do
    not recommend doing this. You should use extreme caution if you are going to try
    doing this, because the **equals** and **hashCode** methods will no longer be
    “well defined” in such a List.


    Set and HashSet: Using java.util Unordered Sets


    The **Set<E> public interface** is also a member of the Java Collections Framework.
    The Java public interface Set<E> extends the Collections<E> public interface,
    which extends the Iterable<T> public interface. Thus, the super interface to sub
    interface hierarchy for Set<E> is the same as it is for List<E> and looks like
    the following interface hierarchy:


    ```

    Interface Iterable<T>

      > Interface Collection<E>

        > Interface Set<E>

    ```'
