    8 游戏更专业、更受欢迎。在我们完成核心 Java 8 游戏开发周期的第一轮（入门级）之前，你需要对这些概念有所了解。


    **增加惊喜元素：随机化攻击频率**


    既然我们已经让攻击在屏幕上的进入点和使用的屏幕侧边完全随机，那么让我们进入第四维度（时间），让攻击发生的时间也变得随机。这通过随机化 `attackFrequency`
    变量来实现，此前我们将其设置为 4.167 秒（250/60FPS）。我们将在 `.initiateAttack()` 方法的 `else` 结构中设置这个随机值，在该结构中我们设置了布尔标志并调用了我们创建的
    `.load()` 方法，以确保自动攻击引擎始终有可用的敌人和投射物对象。我们将在 `if(onScreen && launchIt)` 条件结构的 `else`
    部分末尾添加一条 Java 语句，该语句将一个随机值插入到 `attackFrequency` 变量中，这样当 `.update()` 方法开始使用该变量进行攻击延迟计数器编程逻辑时，就会有一个新的随机时间。由于
    `.nextInt(int bounds)` 方法调用结构会返回一个介于 0 和上限之间的随机整数，为了获得介于 1 秒（60）和 9 秒（60+480）之间的攻击延迟范围，我们需要将
    60 加到由 **`randomNum.nextInt(480)`** 语句部分生成的值上，然后将 `attackFrequency` 变量设置为该值。用于此
    `attackFrequency` 随机化语句的 Java 代码可以在图 17-56 中看到，应该如下所示：


    ```

    attackFrequency = 60 + randomNum.nextInt(480);

    ```


    ![9781484204160_Fig17-56.jpg](img/9781484204160_Fig17-56.jpg)


    图 17-56. 在 `if (onScreen && launchIt)` 中添加一条包含 `.nextInt(bounds)` 方法的 `attackFrequency`
    语句


    正如你在使用 **运行 ![image](img/arrow.jpg) 项目** 工作流程时所看到的，你再也无法计算任何一次敌人攻击何时开始！接下来，让我们让自动攻击引擎更智能一些，告诉它
    InvinciBagel 角色在屏幕上的位置（Y 坐标），这样自动攻击引擎就能更有效地瞄准他！


    **瞄准 InvinciBagel：添加敌人人工智能**


    接下来，为了让游戏玩法更具挑战性，我们应该告诉自动攻击引擎 iBagel 在屏幕上的位置，这是一项人工智能信息收集任务，因为我们控制着所有 Java 代码，所以这变得更容易！为此，我们将不再使用
    `randomLocation` 随机 Y 屏幕高度位置值，而是创建一个变量来保存 InvinciBagel 的 Y 屏幕高度位置值，从而为敌人提供关于 iBagel
    对象在屏幕上位置的内部信息。这是通过使用 iBagel 英雄对象的 `iY` 属性来实现的，我们通过 `.getiY()` getter 方法访问该属性，然后在
    `.setTranslateY()` 方法调用中使用它。我们使用整数（而不是双精度浮点数）作为 `iBagelLocation` 的数据类型，因此需要将 `.getiY()`
    方法返回的双精度浮点数值进行“强制类型转换”，使其与 `iBagelLocation` 变量兼容。Java 代码如图 17-57 所示，应该如下所示：


    ```

    int iBagelLocation;

    iBagelLocation = (int) invinciBagel.iBagel.getiY();

    spriteFrame.setTranslateY(iBagelLocation);

    randomOffset = iBagelLocation + 5;

    ```


    ![9781484204160_Fig17-57.jpg](img/9781484204160_Fig17-57.jpg)


    图 17-57. 声明 `iBagelLocation` 整数变量，将双精度浮点数 `iY` 变量强制转换为其类型，并使用它来创建 `randomOffset`

