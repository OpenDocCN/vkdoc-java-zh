    types of event handling to our Java 8 game development efforts.


    ## Event Handling: Adding Interactivity to Your Games


    One could argue that event handing is at the very foundation and core of game
    development, as without a way to interface with the game play logic and actors,
    you really don’t have much of a game at all. I am going to cover the Java and
    JavaFX event handling related classes during this section of the chapter, and
    then we’ll implement keypad event handing, so that we can support using the `arrow
    keys` to navigate our `InvinciBagel` character around the screen. After that,
    we’ll turn that Java 7 compatible code into Java 8 compatible lambda expressions,
    and then we will be ready to cover sprite movement around the screen during the
    next chapter of the book. The first thing I want to talk about before we start
    dissecting Java and JavaFX classes is the different types of events that are handled
    for games, from the arrow keys (DPAD on Smartphones) to keyboard (or remotes for
    iTV) to mouse (or trackball on Smartphones) to touchscreen (Smartphones and Tablets)
    to game controllers (Game Consoles and iTV Sets) to gyroscopes and accelerometers
    (Smartphones and Tablets) to motion controllers such as the Leap Motion and Razer
    Hydra Portal.'
