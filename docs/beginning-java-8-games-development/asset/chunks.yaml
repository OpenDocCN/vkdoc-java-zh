    to the `.playAudioClip()` method that call the correct `.playiSound()` method


    Now we have added digital audio to our game engine infrastructure, and all we
    have to do later is swap out the voiceovers with sound effects, and we will have
    the digital audio portion of our game development completed. If you use a **Run
    ![image](OEBPS/Images/arrow.jpg) Project** work process and test the code, you
    will find that audio samples trigger rapidly using JavaFX.


    ## Summary


    In this fifteenth chapter, we changed our focus from how our game looks to our
    eyes (visual) and addressed how it sounds to our ears (aural), and took a chapter
    to implement the code for the `AudioClip` class so that we can trigger digital
    audio sound effects.


    First we took a look at the JavaFX `AudioClip` class. We learned why it is perfectly
    suited for use in our game development for audio, including short musical loops
    (using the `INDEFINITE` constant setting) or rapid sound effects.


    Next, we learned how to optimize digital audio assets using `Audacity 2.0.6`.
    We learned the work process for optimizing digital audio so that it takes only
    a dozen or so kilobytes of system memory, and how to optimize audio so well that
    we do not even have to apply compression, especially since audio compression codecs
    supported by Java 8 are “lossy” codecs and can degrade the quality of the audio
    data once they are decompressed into system memory.


    Finally, we implemented `AudioClip` objects in our `InvinciBagel.java` class using
    a `.loadAudioAssets()` method, and then created six `.playiSound()` methods to
    allow external classes to access and play these digital audio assets. We also
    added a `.playAudioClip()` method in our `Bagel.java` class that triggered the
    audio samples based on which keys were being pressed. In the next chapter, we
    are going take a look at how to add collision detection to our game code.


    # CHAPTER 16


    ![image](OEBPS/Images/frontdot.jpg)


    ## Collision Detection: Creating SVG Polygons for the Game Actors and Writing
    Code to Detect Collision


    Now that we have implemented digital audio for our game sound effects and short-loop
    music, as well as implemented our digital imaging related classes that create
    motion sprites (characters) and fixed sprites (props), we will now delve into
    the other major genre or area of new media: **vectors**. Vectors are utilized
    in 2D illustration software (InkScape) as well as 3D modeling and animation software
    (Blender), and use math to define the shapes that are used to create the 2D or
    3D artwork. This makes vectors the perfect solution for defining custom collision
    shapes that perfectly encase our sprites, so that instead of using a complex array
    of pixels to detect collision, we use a far simpler (and far more memory and processor
    efficient) collision polygon, that will perfectly surround our sprite.'
