    Making the Enemy Pause Before Firing: pauseCounter Variable


    To make the Enemy pause on screen, so that his shooting action looks more realistic,
    and so that the InvinciBagel character has some time to try and tackle him (which
    we are going to assign ten scoring points to a bit later on), let’s add an integer
    **pauseCounter** variable and a boolean **launchIt** variable at the top of our
    Enemy.java class, as is shown highlighted in [Figure 17-44](#9781484204160_Ch17.xhtml#Fig44).
    Inside of the if(shootBullet) conditional statement, after the shootProjectile()
    method call, place an **if(pauseCounter >= 60)** conditional structure, and inside
    of it, set **launchIt** equal to **true**, and reset the **pauseCounter** variable
    to **zero**. In the else part of the condition, increment the pauseCounter by
    one using **pauseCounter++** and then all we have to do is to implement the launchIt
    boolean flag into our initiateAttack() method and we will have an Enemy character
    who takes his time when he aims and shoots at the InvinciBagel character. Your
    Java code for this if(shootBullet) if-else structure can be seen in [Figure 17-44](#9781484204160_Ch17.xhtml#Fig44),
    and should look like the following code:


    ```

    if(shootBullet) {

        shootProjectile();

        if(pauseCounter >= 60) {

            launchIt = true;

            pauseCounter = 0;

        } else { pauseCounter++ }

    }

    ```


    ![9781484204160_Fig17-44.jpg](OEBPS/Images/9781484204160_Fig17-44.jpg)


    [Figure 17-44](#9781484204160_Ch17.xhtml#_Fig44). Add a pauseCounter variable
    to create a timer, creating a one-second delay, so Enemy doesn''t bounce


    Shoot the Bullet: Pulling the Trigger Using the launchIt Variable


    Inside of each of your **if(takeSides)** and **if(!takeSides)** conditional if
    structures, modify the if(onScreen) structure to be an **if(onScreen** && **launchIt)**
    structure instead, and then add a **launchit = false;** statement into the else
    portion of this modified structure. The Java code for the new if() structure is
    shown in [Figure 17-45](#9781484204160_Ch17.xhtml#Fig45), and looks like the following:


    ```

    if(onScreen && launchIt) {

        destination = 700;

        if(spriteMoveR <= destination) {

            spriteMoveR+=1;

            spriteFrame.setTranslateX(spriteMoveR);

        } else {

            onScreen   = false;

            takeSides  = true;    // This will be false if inside of the if(takeSides)
    structure

            callAttack = false;

            launchIt   = false;   }

    }

    ```


