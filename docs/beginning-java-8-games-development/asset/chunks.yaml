    另一个需要考虑的因素是数字音频的**采样频率**（也称为**采样率**），它衡量的是在 1 秒的采样时间范围内，以特定采样分辨率采集的样本数量。在数字图像编辑领域，采样频率类似于数字图像中包含的颜色数量。你可能熟悉“CD
    音质音频”这个术语，它定义为使用**16 位**采样分辨率和**44.1kHz**采样率（即每秒采集 44,100 个样本，每个样本具有 16 位采样分辨率，即
    65,536 位音频数据）。你可以通过将采样比特率乘以采样频率再乘以音频片段的秒数，来计算音频文件中的原始数据量。显然，这可能是一个巨大的数字！音频编解码器非常擅长将数据优化到惊人的小数据量，同时几乎听不出质量损失。


    因此，数字成像和数字视频中存在的权衡取舍，在数字音频中同样存在：包含的数据越多，结果质量就越高，但代价始终是数据量大幅增加。在视觉媒介中，数据量的大小由颜色深度、像素以及（在数字视频和动画的情况下）帧来定义。在听觉媒介中，则通过采样分辨率与采样率相结合来定义。目前数字音频行业中最常见的采样率包括**8kHz**、**22kHz**、**32kHz**、**44.1kHz**、**48kHz**、**96kHz**、**192kHz**，甚至**384kHz**。


    较低的采样率，例如 8kHz、11kHz 和 22kHz，是你将在游戏中使用的采样率，因为通过精心优化，这些采样率可以产生高质量的音效和街机音乐。这些采样率也非常适合采样任何基于语音的数字音频，例如电影对白或电子书旁白音轨。较高的音频采样率，例如
    44.1kHz，则更适合音乐；而需要高动态范围（高保真度）的音效，如雷鸣般的雷声，则可以使用 48kHz。更高的采样率能够再现影院级（THX）音质，但对于大多数游戏来说并非必需。


