    Double-click the **nextInt(int bound)** option, and insert that method call off
    of the randomNum object inside the .setTranslateY() method.


    ![9781484204160_Fig17-32.jpg](OEBPS/Images/9781484204160_Fig17-32.jpg)


    [Figure 17-32](#9781484204160_Ch17.xhtml#_Fig32). Use a randomNum Random object
    inside of the .setTranslateY() method and use a period to call selector


