  raw: 'What this means is that the geometric areas of the input Shape objects being
    considered by the algorithm in the .intersect() method is “math based” only. This
    means the algorithm is independent of the type of Shape (subclass) being processed,
    as well as independent of configuration for the Paint object being used for filling
    or stroking (please, again briefly resist the temptation to snicker one more time,
    for the sake of learning Java 8 game development).


    Before the final intersection calculation, the areas of the input Shape objects
    are transformed to the Parent Node object’s coordinate space (think: boundsInParent).
    In this way, the resulting shape will only include those areas (mathematical geometric
    areas, more precisely) which were contained in the areas of the two input Shape
    objects passed into the method using the parameter list. Therefore, if there’s
    any data (something other than a -1 empty data value) in the resulting Shape object,
    which we will be calling intersection in the code we will be writing next, there
    has been some level of intersection, and even a small area of intersection (overlap)
    needs to signal a detected collision.


    Now we are ready to use the technical Java 8 class and method information that
    we have learned over the past several pages of the chapter to create the core
    collision detection logic using only around a dozen lines of Java code. We’ll
    add another dozen lines of code before the end of the chapter, to process the
    collision for our game play.


    Overriding the Abstract Hero Class: .collide() Method


    Finally the time has come to **override** and implement the **public boolean collide
    (Actor object)** method that we installed in our abstract Hero class back in [Chapter
    8](#9781484204160_Ch08.xhtml). This is a critical method to our game play, as
    it determines when our primary InvinciBagel character comes into contact with
    other elements in the game. The result of this contact is scoring, as well as
    things changing visually on the game screen, so it becomes pivotal to everything
    that we will be doing in the next chapter to implement game play elements into
    the InvinciBagel game. The first thing we want to do is to install a Boolean “flag”
    variable called **collisionDetect**, and set it equal to a **false** value (collision
    not detected) at the top of the .collide() method. The Java code for this statement
    setting up the collisionDetect flag should look like the following:


    ```

    boolean collisionDetect = false;

    ```


    The next step in determining if a collision has occurred is to use a Java conditional
    if() statement. This allows us to test if the ImageView Node objects that contain
    the sprite Image assets have intersected by using the Node class .intersects()
    method call in conjunction with the .getBoundsInParent() method call off of each
    spriteFrame ImageView Node object. The first spriteFrame.getBoundsInParent() method
    call is the one that we method chain the .intersects() method call off of, since
    what we are trying to do is to ascertain collision with our primary game character.
    Since we want to reference the invinciBagel object (InvinciBagel class) and its
    iBagel Actor object, this construct would take the form of an **invinciBagel.iBagel.spriteFrame.getBoundsInParent().intersects()**
    method call structure. Since the Bounds object from the Actor object that we are
    testing for collision needs to be inside of the .intersects(Bounds localBounds)
    method call, we need to use the **.getSpriteFrame()** method call we developed
    in [Chapter 8](#9781484204160_Ch08.xhtml). Off of the Actor object we pass into
    the .collide() method we will method chain the .getBoundsInParent() method call,
    resulting in the **object.getSpriteFrame().getBoundsInParent()** structure, which
    is then placed on the inside of an .intersect() method call. The complete conditional
    if() construct looks like this:


    ```

    if( invinciBagel.iBagel.spriteFrame.getBoundsInParent().intersects(

        object.getSpriteFrame().getBoundsInParent() ) ){second level of collision
    detection in here}

    ```


    This first level of collision detection code will check for the intersection of
    the iBagel spriteFrame ImageView Node with the spriteFrame ImageView Node object
    that is contained in each Actor object that will be passed into this .collide(Actor
    object) method call that we are coding currently.


    This part of the code will check for a “top level” ImageView Node proximity (collision)
    before we call a more “expensive” Shape intersection algorithm, which we are going
    to implement next, in order to confirm more definitive collision occurrence (SVGPath
    collision polygon intersection). Remember that the code we’re putting into place
    inside of this .collide() method will be processed for each iteration of the for
    loop (for each cast member) that is calling this collide(Actor object) method.


    The Java code inside of this first conditional if() statement creates a **Shape**
    object, named **intersection**, and sets it equal to the result of an **SVGPath.intersect()**
    method call that references the iBagel SVGPath Shape object and an SVGPath Shape
    object passed into the collide(Actor object) method. Both objects call a **.getSpriteBound()**
    method, which we created back in [Chapter 8](#9781484204160_Ch08.xhtml), to access
    the SVGPath Shape objects needed for the **.intersect(Shape1, Shape2)** method
    call format. Your Java code, formatted using two lines of code, for readability,
    should look like the following:


    ```

    Shape intersection = SVGPath.intersect( invinciBagel.iBagel.getSpriteBound(),

                                                         object.getSpriteBound() );

    ```


    After we have this intersection data, we will use another conditional if() statement
    to see if that intersection Shape object contains any collision data, and if it
    does (that is, if it doesn’t contain a -1 value) a collision has occurred.


    The second nested if() statement will utilize the **.getBoundsInLocal().getWidth()**
    method chain, called off of the intersection Shape object, and will check to see
    if it is empty (returns a -1 value), or if a collision has occurred. The collision
    detection will occur if the intersection Shape object’s Bounds object contains
    any data value other than -1\. In the body of the if() statement, collisionDetect
    Boolean flag is set to true of any data is present ( signified by != -1). The
    Java code for the conditional if() statement should look like the following:


    ```

    if(intersection.getBoundsInLocal().getWidth() != -1) { collisionDetect = true;
    }

    ```'
