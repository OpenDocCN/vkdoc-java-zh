- fmt: "Since we are going to use the `arrow keypad` for our game, and possibly the\
    \ `A-S-D-W` keys, and in the future, the game controller’s `GAME_A`, `GAME_B`,\
    \ `GAME_C` and `GAME_D` buttons, let’s take a closer look at the `KeyCode` class\
    \ first. This class is a public `Enum` class that holds `enumerated constant`\
    \ values. This class is where the `KeyEvent` class goes to get the `KeyCode` constant\
    \ values that it uses (processes) to determine which key was used by the player\
    \ for any particular key event invocation. The Java 8 and JavaFX class hierarchy\
    \ for the `KeyCode` class looks like the following:\n\n```\njava.lang.Object\n\
    \  > java.lang.Enum<KeyCode>\n    > javafx.scene.input.KeyCode\n```\n\nThe constant\
    \ values contained in the `KeyCode` class use `capital letters`, and are named\
    \ after the key that the keycode supports. For instance, the a, s, w, and d keycodes\
    \ are `A`, `S`, `W`, and `D`. The arrow keypad keycodes are `UP`, `DOWN`, `LEFT`,\
    \ and `RIGHT`, and the game controller button keycodes are `GAME_A`, `GAME_B`,\
    \ `GAME_C`, and `GAME_D`.\n\nWe will be implementing `KeyCode` constants along\
    \ with the `KeyEvent` object in the `EventHandler` object in a bit, after we cover\
    \ these foundational packages and classes for input event handling. As you will\
    \ soon see, this is done in much the same way that an `ActionEvent` is set up\
    \ to be handled, and `KeyEvents` can be coded using the Java 7 inner class approach,\
    \ or by using a Java 8 lambda expression.\n\nWe will set up our `KeyEvent` object\
    \ handling in a very `modular` fashion, so that an event `KeyCode` evaluation\
    \ structure sets Boolean flag variables for each `KeyCode` mapping. The nature\
    \ of event processing is that it is a real-time engine, like the pulse engine,\
    \ so these Boolean `flags` will provide an accurate “view” of what keys are being\
    \ pressed or released by the player during any given nanosecond. These Boolean\
    \ values can then be read and acted upon, by using Java game programming logic\
    \ in our other game engine classes, which will then process these key events in\
    \ real time.\n\n## The KeyEvent Class: Using KeyEvent Objects to Hold KeyCode\
    \ Players Are Using\n\nNext, let’s take a closer look at the `KeyEvent` class.\
    \ This class is designated `public final KeyEvent`, and it extends the `InputEvent`\
    \ superclass, which is used to create all of the input event subclasses that are\
    \ in the `javafx.scene.input` package. The `KeyEvent` class is set into motion\
    \ using the `EventHandler` class, and handles `KeyCode` class constant values.\
    \ This class’s hierarchy starts with the `java.lang.Object` master class and goes\
    \ through the `java.util.EventObject` event superclass to the `javafx.event.Event`\
    \ class, which is used to create the `javafx.scene.input.InputEvent` class that\
    \ the `KeyEvent` class extends (subclasses). It is interesting to note that we\
    \ are spanning four different packages here!\n\nThe Java 8 and JavaFX class hierarchy\
    \ for the `KeyEvent` class jumps from the `java.lang` package to the `java.util`\
    \ package to the `javafx.event` package to the `javafx.scene.input` package. The\
    \ `KeyEvent` class hierarchy looks like the following:\n\n```\njava.lang.Object\n\
    \  > java.util.EventObject\n    > javafx.event.Event\n      > javafx.scene.input.InputEvent\n\
    \        > javafx.scene.input.KeyEvent\n```\n\nThe generation of a `KeyEvent`\
    \ object by the `EventHandler` object indicates that a keystroke has occurred.\
    \ A `KeyEvent` is often generated in a Scene Graph Node, such as an editable text\
    \ UI control, but in our case we are going to attach our event handling above\
    \ the Scene Graph Node hierarchy directly to the `Scene` object named `scene`,\
    \ hoping to avoid any Scene Graph processing overhead that would be incurred by\
    \ attaching event handling to any of the `Node` objects in the Scene Graph (in\
    \ our case, this is currently the `StackPane` object named `root`).\n\nA `KeyEvent`\
    \ object is generated whenever a key is `pressed` and held down, `released`, or\
    \ `typed` (pressed and immediately released). Depending on the nature of this\
    \ key pressing action itself, your `KeyEvent` object is passed into either an\
    \ `.onKeyPressed()`, an `.onKeyTyped()` or an `.onKeyReleased()` method for further\
    \ processing inside the nested `.handle()` method, which is what will hold your\
    \ game-specific programming logic.\n\nGames typically use key-pressed and key-released\
    \ events, as users typically press and hold keys to move the actors in the game.\
    \ Key-typed events on the other hand tend to be “higher-level” events and generally\
    \ do not depend upon the OS platform or the keyboard layout. Typed key events\
    \ (`.onKeyTyped()` method calls) will be generated when a Unicode character is\
    \ entered, and are used to obtain `character input` for UI controls such as text\
    \ fields, and are used for business applications, such as calendars and word processors,\
    \ for instance.\n\nIn a simple case, the key-typed event will be produced by using\
    \ a single key press and its immediate release. Additionally, alternate characters\
    \ can be produced using combinations of key press events, for instance, the capital\
    \ A can be produced using a `SHIFT` key press and an ‘a’ key-type (press and immediate\
    \ release).\n\nA key-release is not usually necessary to generate a key-typed\
    \ `KeyEvent` object. It is important to notice that there are some fringe cases\
    \ where a key-typed event is not generated until the key is released; a great\
    \ example of this is the process of entering `ASCII character code sequences`,\
    \ using that old-school `Alt-Key-with-Numeric-keypad` entry method, which was\
    \ used “back in the day,” with DOS and held over into Windows OSes.\n\nIt is important\
    \ to note that no key-typed `KeyEvent` objects will be generated for keys that\
    \ do not generate any Unicode characters. This would include action keys or modifier\
    \ keys, although these do generate key-pressed and key-released `KeyEvent` objects,\
    \ and could thus be used for game play! This would not represent a good user interface\
    \ design (or user experience design) approach, generally speaking, as these keys\
    \ are used to modify other key behavior.\n\nThe `KeyEvent` class has a `character`\
    \ variable (I am tempted to call this a character characteristic, but I won’t)\
    \ which will always contains a valid `Unicode character` for a key-typed event\
    \ or `CHAR_UNDEFINED` for a key-pressed or key-released event. Character input\
    \ is only reported for key-typed events, since key-pressed and key-released events\
    \ are not necessarily associated with character input. Therefore, the `character`\
    \ variable is guaranteed to be meaningful only for key-typed events. In a sense,\
    \ by not using key-typed events, we are saving both memory and CPU processing,\
    \ by not having to process this Unicode character variable.\n\nFor key-pressed\
    \ and key-released `KeyEvent` objects, the `code` variable in the `KeyEvent` class\
    \ will contain your `KeyEvent` object’s keycode, defined using the `KeyCode` class\
    \ you learned about earlier. For key-typed events, this `code` variable always\
    \ contains the constant `KeyCode.UNDEFINED`. So as you can see, key-pressed and\
    \ key-released are thus designed to be used differently than key-typed, and that’s\
    \ the reason we are using these for our game event handling.\n\nKey-pressed and\
    \ key-released events are low-level, and depend upon platform or keyboard layout.\
    \ They are generated whenever a given key is pressed or released, and are the\
    \ only way to “poll” the keys that do not generate character input. The key being\
    \ pressed or released is indicated by the `code` variable, which contains a virtual\
    \ `KeyCode`.\n\n## Adding Keyboard Event Handling: Using KeyEvents"
