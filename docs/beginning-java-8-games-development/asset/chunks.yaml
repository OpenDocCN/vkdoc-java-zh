    \ = false; }\n    }\n    if(!bulletType && takeSides) {\n        invinciBagel.iBullet.spriteFrame.setTranslateY(randomOffset);\n\
    \        invinciBagel.iBullet.spriteFrame.setScaleX(0.5);\n        invinciBagel.iBullet.spriteFrame.setScaleY(0.5);\n\
    \        bulletRange = 624;\n        if(bulletOffset <= bulletRange) {\n     \
    \       bulletOffset+=6;\n            invinciBagel.iBullet.spriteFrame.setTranslateX(bulletOffset);\n\
    \            randomOffset = randomOffset + bulletGravity;\n        } else { shootBullet\
    \ = false; }\n    }\n    if(bulletType && !takeSides) {\n        invinciBagel.iCheese.spriteFrame.setTranslateY(randomOffset);\n\
    \        invinciBagel.iCheese.spriteFrame.setScaleX(-0.5);\n        invinciBagel.iCheese.spriteFrame.setScaleY(0.5);\n\
    \        bulletRange = -50;\n        if(bulletOffset >= bulletRange) {\n     \
    \       bulletOffset-=4;\n            invinciBagel.iCheese.spriteFrame.setTranslateX(bulletOffset);\n\
    \            randomOffset = randomOffset + cheeseGravity;\n        } else { shootBullet\
    \ = false; }\n    }\n    if(bulletType && takeSides) {\n        invinciBagel.iCheese.spriteFrame.setTranslateY(randomOffset);\n\
    \        invinciBagel.iCheese.spriteFrame.setScaleX(0.5);\n        invinciBagel.iCheese.spriteFrame.setScaleY(0.5);\n\
    \        bulletRange = 630;\n        if(bulletOffset <= bulletRange) {\n     \
    \       bulletOffset+=4;\n            invinciBagel.iCheese.spriteFrame.setTranslateX(bulletOffset);\n\
    \            randomOffset = randomOffset + cheeseGravity;\n        } else { shootBullet\
    \ = false; }\n    }\n}\n```\n\n![9781484204160_Fig17-60.jpg](OEBPS/Images/9781484204160_Fig17-60.jpg)\n\
    \n[Figure 17-60](#9781484204160_Ch17.xhtml#_Fig60). Adding physics simulation\
    \ of gravity to the Projectile object's trajectory in the `.shootProjectile()`\
    \ method\n\n## Summary\n\nIn this seventeenth and final chapter, we used all of\
    \ the foundational elements of our game engine(s) that we have been building during\
    \ the course of this book, and created the basic game play for the InvinciBagel\
    \ game, including a scoring engine and an auto-attack engine, as well as random\
    \ attack strategies and basic physics simulation to enhance realism. We learned\
    \ how to use the JavaFX 8.0 `Text` and `Font` class to create scoreboard output\
    \ on the game, and how to use the Java 8 `Random` class as a random number generator\
    \ to make our auto-attack engine seem like it had a life of its own. We also added\
    \ bounty to the game by coding a `Treasure.java` class and created a `.scoringEngine()`\
    \ method to track and organize our scoring algorithm. We learned more about optimization,\
    \ using if-else-if loops with `break;` and learned how to use `return;` to break\
    \ out of a method prematurely as well, and we used both of these techniques to\
    \ great benefit in our game play logic. We added Enemy characters and Projectile\
    \ objects to the game, and learned how to implement a background plate behind\
    \ the game play. I’ve tried to go beyond a basic beginner Java 8 book and show\
    \ you the work process involved in creating a game engine infrastructure, including\
    \ the design thought process, how to leverage key classes in Java 8 and JavaFX\
    \ 8.0, and how to use new media assets and optimization techniques.\n\n## Index\n\
