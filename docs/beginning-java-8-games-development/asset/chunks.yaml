- fmt: '影响数字图像压缩的因素有很多，你可以使用一些基本技术来获得更高质量的结果，同时减小数据占用空间。这是优化数字图像的首要目标：为你的应用（此处指游戏）获得尽可能小的数据占用空间，同时实现最高质量的视觉效果。让我们从最显著影响数据占用空间的方面开始，并审视它们各自如何为任何给定数字图像的数据占用空间优化做出贡献。有趣的是，其重要性顺序与我迄今为止介绍数字成像概念的顺序相似。


    对最终数字图像资源文件大小影响最关键的因素，是我称之为**数据占用空间**的东西，即数字图像的像素数量，或称**分辨率**。这合乎逻辑，因为每个像素都需要存储，连同其三个（24位）或四个（32位）通道中包含的颜色和Alpha值。在保持图像清晰的前提下，你能将分辨率降得越低，最终的文件大小就越小。


    原始（或未压缩）图像大小的计算方式为：24位RGB图像为**宽 × 高 × 3**，32位ARGB图像为**宽 × 高 × 4**。例如，一幅未压缩的真彩色24位VGA图像将有`640
    × 480 × 3`，等于**921,600B**的原始（未压缩）数字图像数据。要计算这幅原始VGA图像中的**千字节**数，你可以这样除：`921,600
    ÷ 1,024`（1KB的字节数），得到一幅真彩色VGA图像中正好有**900KB**的数据。


    通过优化数字图像的分辨率来优化原始（未压缩）图像大小非常重要。这是因为一旦图像从游戏应用文件中解压缩到系统内存中，这就是它将占用的内存量，因为图像将逐像素存储，在内存中使用24位（RGB）或32位（ARGB）表示。这也是我在游戏开发中使用`PNG24`和`PNG32`，而不使用索引颜色（`GIF`或`PNG8`）的原因之一；如果操作系统要将颜色转换为24位色彩空间，那么出于质量原因，你应该使用该24位色彩空间，并接受稍大的应用文件大小。


    图像颜色深度是影响压缩图像数据占用空间的下一个最关键因素，因为图像中的像素数量要乘以1（8位）、2（16位）、3（24位）或4（32位）颜色数据通道。这种较小的文件大小是8位索引颜色图像仍被广泛使用的原因，尤其是在`GIF`图像格式中。


    如果构成图像的颜色变化范围不大，索引颜色图像可以模拟真彩色图像。索引颜色图像仅使用8位数据（256种颜色）来定义图像像素颜色，使用一个包含最多256种优化选择颜色的**调色板**，而不是包含各256级颜色的3个RGB颜色通道或4个ARGB颜色通道。再次强调，需要注意的是，一旦你通过使用`GIF`或`PNG8`编解码器压缩，将24位图像转换为8位图像，你只能使用原始16,777,216种颜色中最多256种颜色。这就是我提倡使用`PNG24`或`PNG32`图像，而不是`GIF`或`PNG1`（2色）、`PNG2`（4色）、`PNG4`（16色）或`PNG8`（256色）图像的原因，JavaFX也支持这些格式。


    根据任何给定24位源图像中使用的颜色数量，使用256种颜色来表示原本包含16,777,216种颜色的图像可能会导致一种称为**条带化**的效果。当结果（压缩后）的256色（或更少）调色板中相邻颜色之间的过渡不平滑，从而无法呈现平滑的颜色渐变时，就会出现这种情况。索引颜色图像有一个选项可以通过称为**抖动**的方法来视觉上校正条带化。


    抖动是一种**算法过程**，通过在图像中任何相邻颜色之间的边缘制作**点阵图案**来欺骗眼睛，使其看到第三种颜色。抖动会给你一个最大的感知颜色数量（65,536种；`256
    × 256`），但这仅在256种颜色中的每一种都与另外256种颜色中的每一种相邻时才会发生。尽管如此，你仍能看到创造额外颜色的潜力，并且你会惊讶于索引颜色格式在某些压缩场景（针对特定图像）中能达到的效果。


    让我们拿一幅真彩色图像，例如[图5-3](#9781484204160_Ch05.xhtml#Fig3)中所示的图像，并将其保存为`PNG5`索引颜色图像格式，以向你展示这种抖动效果。需要注意的是，`PNG5`虽然在Android和HTML5中受支持，但在JavaFX中不受支持，所以如果你自己进行此练习，请选择2色、4色、16色或256色选项！该图展示了奥迪3D图像中驾驶员侧后挡泥板上的抖动效果，因为它包含一个灰色渐变。


    ![9781484204160_Fig05-03.jpg](OEBPS/Images/9781484204160_Fig05-03.jpg)


    [图5-3](#9781484204160_Ch05.xhtml#_Fig3). 使用Autodesk 3ds Max创建的真彩色`PNG24`图像，你将把它压缩为`PNG5`


    有趣的是，在8位索引颜色图像中，允许使用**少于256种**颜色的最大值。这样做通常是为了进一步减少图像的数据占用空间。例如，一幅仅使用32种颜色就能获得良好效果的图像实际上是5位图像，技术上应称为`PNG5`，尽管该格式本身在索引颜色使用层面通常被称为`PNG8`。


    我将[图5-4](#9781484204160_Ch05.xhtml#Fig4)中所示的索引颜色`PNG`图像设置为使用5位颜色（32色，即`PNG5`），以清晰地说明这种抖动效果。正如你在图像预览区域（图左侧）所见，抖动算法在相邻颜色之间制作点阵图案以创建额外的颜色。


    ![9781484204160_Fig05-04.jpg](OEBPS/Images/9781484204160_Fig05-04.jpg)


    [图5-4](#9781484204160_Ch05.xhtml#_Fig4). 将抖动设置为扩散算法和32种颜色（5位），100%抖动用于`PNG5`输出


    另外，请注意你可以设置所使用的**抖动百分比**。我经常选择0%或100%的设置；然而，你可以在这两个极端值之间**微调**抖动效果。你还可以在**抖动算法**之间进行选择，因为你可能已经猜到，抖动效果是通过抖动算法创建的，这些算法是索引文件格式（此处为`PNG8`）压缩例程的一部分。


    我使用**扩散**抖动，它能沿着不规则形状的渐变产生平滑效果，就像在汽车挡泥板上看到的那样。你也可以使用**噪声**选项，它更随机，或者**图案**选项，它则不那么随机。扩散选项通常能给出最佳结果，这就是我在使用索引颜色（不常用）时选择它的原因。


    正如你可能想象的那样，抖动会向图像添加更难压缩的数据模式。这是因为图像中的平滑区域（如渐变）对于压缩算法来说，比锐利过渡（边缘）或随机像素图案（例如，来自相机CCD的抖动或“噪声”）更容易压缩。


    因此，应用抖动选项总是会使数据占用空间增加几个百分点。请务必检查应用抖动和不应用抖动（在“导出”对话框中选择）时的结果文件大小，以确定其带来的视觉改善是否值得。请注意，索引颜色`PNG`图像还有一个透明度选项（复选框），但`PNG8`图像中使用的Alpha通道只有1位（开/关），不像`PNG32`那样是8位。'
  raw: 'There are a number of factors that affect digital image compression and some
    basic techniques that you can use to achieve a better-quality result with a smaller
    data footprint. This is a primary objective in optimized digital imagery; obtaining
    the smallest possible data footprint for your application (in this case, a game),
    while achieving the highest quality visual result. Let’s start with the aspects
    that most significantly affect data footprint and examine how each of these contributes
    to data footprint optimization for any given digital image. Interestingly, their
    order of significance is similar to the order in which I have presented the digital
    imaging concepts thus far.


    The most critical contributor to a resulting digital image asset file size is
    what I like to call the **data footprint**, which is the number of pixels, or
    **resolution** of, a digital image. This is logical, because each of the pixels
    needs to be stored, along with the color and alpha values that are contained in
    their three (24 bit) or four (32 bit) channels. The smaller you can get your resolution,
    while still having the image look sharp, the smaller the resulting file size will
    be.


    Raw (or uncompressed) image size is calculated by **width × height × 3** for 24-bit
    RBG images, and **width × height × 4** for 32-bit ARGB images. For instance, an
    uncompressed, truecolor, 24-bit VGA image will have 640 × 480 × 3, equaling **921,600B**
    of original (raw), uncompressed digital image data. To determine the number of
    **kilobytes** in this raw VGA image, you would divide as follows: 921,600 ÷ 1,024,
    the number of bytes that are in a kilobyte, giving you an even **900KB** of data
    in a truecolor VGA image.


    It is important to optimize for raw (uncompressed) image size by optimizing your
    digital imagery resolution. This is because once an image is decompressed out
    of a game application file, into system memory, this is the amount of memory that
    it is going to occupy, as the image will be stored pixel for pixel, using a 24-bit
    (RGB) or 32-bit (ARGB) representation in memory. This is one of the reasons I
    use **PNG24** and **PNG32** for my game development, not indexed color (GIF or
    PNG8); if the OS is going to transmute the color to a 24-bit color space, then
    you should use that 24-bit color space for quality reasons and deal with (accept)
    a slightly larger application file size.


    Image color depth is the next most critical contributor to the data footprint
    of a compressed image, because the number of pixels in the image is multiplied
    by 1 (8 bit), 2 (16 bit), 3 (24 bit), or 4 (32 bit) color data channels. This
    small file size is the reason 8-bit indexed color images are still widely used,
    especially with the GIF image format.


    Indexed color images can simulate truecolor images if the colors that are used
    to make up the image do not vary too widely. Indexed color imagery uses only 8
    bits of data (256 colors) to define the image pixel color, using a **palette**
    of up to 256 optimally selected colors, instead of 3 RGB color channels or 4 ARGB
    color channels, containing 256 levels of color each. Again, it is important to
    note that once you turn a 24-bit image into an 8-bit image by compressing it using
    a GIF or PNG8 codec, you only have a potential (maximum) 256 of the original 16,777,216
    colors at your disposal. This is why I am advocating using PNG24 or PNG32 imagery
    rather than GIF or PNG1 (2 color), PNG2 (4 color), PNG4 (16 color), or PNG8 (256
    color) images, which JavaFX also supports.


    Depending on how many colors are employed in any given 24-bit source image, using
    256 colors to represent an image originally containing 16,777,216 colors can cause
    an effect called **banding**. This is when the transfer between adjoining colors
    in the resulting (from compression) 256- (or less) color palette is not gradual
    and thus does not appear to be a smooth color gradient. Indexed color images have
    an option to correct visually for banding, called **dithering**.


    Dithering is an **algorithmic process** of making **dot patterns** along the edges
    between any adjoining colors within an image to trick the eye into seeing a third
    color. Dithering will give you a maximum perceptual number of colors (of 65,536;
    256 × 256), but this will only occur if each of those 256 colors borders on each
    of the other 256 colors. Still, you can see the potential for creating additional
    colors, and you would be amazed at the result that indexed color formats can achieve
    in some compression scenarios (with certain imagery).


    Let’s take a truecolor image, such as the one shown in [Figure 5-3](#9781484204160_Ch05.xhtml#Fig3),
    and save it as a PNG5 indexed color image format, to show you this dithering effect.
    It is important to note that PNG5, although supported in Android and HTML5, is
    not supported in JavaFX, so if you do this exercise yourself, select the 2-, 4-,
    16-, or 256-color option! The figure demonstrates the dithering effect on the
    driver-side rear fender in an Audi 3D image, as it contains a gray gradient.


    ![9781484204160_Fig05-03.jpg](OEBPS/Images/9781484204160_Fig05-03.jpg)


    [Figure 5-3](#9781484204160_Ch05.xhtml#_Fig3). A truecolor PNG24 image created
    with Autodesk 3ds Max, which you are going to compress as PNG5


    Interestingly, it is permissible to use **less than the 256**-colormaximum in
    an 8-bit indexed color image. This is often done to reduce further the imagery’s
    data footprint. For instance, an image that can attain good results using only
    32 colors is actually a 5-bit image and would technically be called a PNG5, even
    though the format itself is generally called PNG8 for the indexed color usage
    level.


    I have set this indexed color PNG image, shown in [Figure 5-4](#9781484204160_Ch05.xhtml#Fig4),
    to use 5-bit color (32 color, or PNG5) to illustrate this dithering effect clearly.
    As you can see in the image preview area, on the left-hand side of the figure,
    the dithering algorithm makes dot patterns between adjacent colors to create additional
    colors.


    ![9781484204160_Fig05-04.jpg](OEBPS/Images/9781484204160_Fig05-04.jpg)


    [Figure 5-4](#9781484204160_Ch05.xhtml#_Fig4). Setting dithering to the diffusion
    algorithm and 32 colors (5 bit), with 100 percent dithering for PNG5 output


    Also, note that you can set the **percentage of dithering** that is used. I often
    select either the 0 percent or 100 percent setting; however, you can **fine-tune**
    the dithering effect anywhere between these two extreme values. You can also choose
    between **dithering** **algorithms**, because, as you probably have surmised,
    the dithering effect is created using dithering algorithms, which are part of
    the indexed file format (in this case, PNG8) compression routines.


    I use **diffusion** dithering, which gives a smooth effect along irregularly shaped
    gradients, as is seen in the car fender. You can also use a **noise** option,
    which is more randomized, or a **pattern** option, which is less so. The diffusion
    option usually gives the best results, which is why I choose it when I am using
    indexed color (which is not often).


    Dithering, as you might imagine, adds data patterns to an image that are more
    difficult to compress. This is because smooth areas in an image, such as gradients,
    are easier for the compression algorithm to compress than sharp transitions (edges)
    or random pixel patterns (e.g., dithering or “noise” from a camera CCD).


    Therefore, applying the dithering option will always increase the data footprint
    by a few percentage points. Be sure to check the resulting file size with and
    without dithering applied (selected in the Export dialog) to see if it is worth
    the improved visual result that it affords. Note that there is also a transparency
    option (check box) for indexed color PNG images but that the alpha channel used
    in PNG8 images is only 1 bit (on/off), not 8 bit, as with PNG32.'
  trans: '

    影响数字图像压缩的因素有很多，你可以运用一些基本技术，在减小数据体积的同时获得更高质量的结果。这是优化数字图像的首要目标：为你的应用（此处指游戏）获取尽可能小的数据体积，同时实现最高质量的视觉效果。我们先从对数据体积影响最大的几个方面开始，逐一分析它们如何为任意数字图像的数据体积优化做出贡献。有趣的是，这些因素的重要性排序与我迄今为止介绍数字成像概念的顺序大致相同。


    对最终数字图像资源文件大小影响最大的因素，是我称之为**数据体积**的东西，即数字图像的像素数量，也就是**分辨率**。这合乎逻辑，因为每个像素都需要存储，连同其三个（24
    位）或四个（32 位）通道中包含的颜色和 Alpha 值。在保持图像清晰的前提下，分辨率能设得越小，最终文件大小就越小。


    原始（或未压缩）图像大小的计算方式为：24 位 RGB 图像是**宽 × 高 × 3**，32 位 ARGB 图像是**宽 × 高 × 4**。例如，一幅未压缩的真彩色
    24 位 VGA 图像，其原始（raw）未压缩数字图像数据为 640 × 480 × 3，等于 **921,600B**。要计算这幅原始 VGA 图像有多少**千字节**，你可以这样除：921,600
    ÷ 1,024（1KB 的字节数），得到一幅真彩色 VGA 图像的数据正好是 **900KB**。


    通过优化数字图像的分辨率来优化原始（未压缩）图像大小非常重要。这是因为一旦图像从游戏应用文件中解压缩到系统内存中，它就会占用这么多内存，因为图像将逐像素存储，在内存中使用
    24 位（RGB）或 32 位（ARGB）表示。这也是我在游戏开发中使用**PNG24**和**PNG32**，而不使用索引颜色（GIF 或 PNG8）的原因之一；如果操作系统要将颜色转换到
    24 位色彩空间，那么出于质量考虑，你应该使用那个 24 位色彩空间，并处理（接受）稍大的应用文件大小。


    图像颜色深度是影响压缩图像数据体积的次关键因素，因为图像中的像素数量要乘以 1（8 位）、2（16 位）、3（24 位）或 4（32 位）个颜色数据通道。正是这种小文件大小使得
    8 位索引颜色图像至今仍被广泛使用，尤其是在 GIF 图像格式中。


    如果构成图像所使用的颜色变化范围不大，索引颜色图像可以模拟真彩色图像。索引颜色图像仅使用 8 位数据（256 色）来定义图像像素颜色，使用一个包含最多 256
    种优化选择颜色的**调色板**，而不是使用 3 个 RGB 颜色通道或 4 个 ARGB 颜色通道（每个通道包含 256 级颜色）。再次强调，需要注意的是，一旦你通过使用
    GIF 或 PNG8 编解码器压缩，将 24 位图像转换为 8 位图像，你只能从原始的 16,777,216 种颜色中最多使用 256 种颜色。这就是为什么我提倡使用
    PNG24 或 PNG32 图像，而不是 GIF 或 PNG1（2 色）、PNG2（4 色）、PNG4（16 色）或 PNG8（256 色）图像，JavaFX
    也支持这些格式。


    根据任意 24 位源图像中使用的颜色数量，用 256 种颜色来表示原本包含 16,777,216 种颜色的图像，可能会产生一种称为**条带**的效果。当压缩后得到的
    256 色（或更少）调色板中相邻颜色之间的过渡不平滑，从而无法呈现平滑的颜色渐变时，就会出现这种情况。索引颜色图像有一个选项可以在视觉上校正条带，称为**抖动**。


    抖动是一种**算法过程**，通过在图像中任何相邻颜色之间的边缘制作**点阵图案**，来欺骗眼睛看到第三种颜色。抖动能给你最大感知颜色数量（65,536 种；256
    × 256），但这只有在 256 种颜色中的每一种都与另外 256 种颜色中的每一种相邻时才会发生。尽管如此，你仍能看到创造额外颜色的潜力，并且你会惊讶于索引颜色格式在某些压缩场景（针对特定图像）中能达到的效果。


    让我们拿一幅真彩色图像，比如图 5-3 中显示的那幅，将其保存为 PNG5 索引颜色图像格式，来向你展示这种抖动效果。需要注意的是，尽管 Android 和
    HTML5 支持 PNG5，但 JavaFX 不支持，所以如果你自己动手做这个练习，请选择 2 色、4 色、16 色或 256 色选项！该图展示了奥迪 3D
    图像中驾驶员侧后翼子板上的抖动效果，因为它包含一个灰色渐变。


    ![9781484204160_Fig05-03.jpg](img/9781484204160_Fig05-03.jpg)


    图 5-3. 使用 Autodesk 3ds Max 创建的真彩色 PNG24 图像，你将把它压缩为 PNG5


    有趣的是，在 8 位索引颜色图像中，允许使用**少于 256 种**颜色的最大值。这样做通常是为了进一步减少图像的数据体积。例如，一幅仅用 32 种颜色就能获得良好效果的图像，实际上是一幅
    5 位图像，技术上应称为 PNG5，尽管该格式本身在索引颜色使用层面上通常被称为 PNG8。


    我将图 5-4 中显示的这幅索引颜色 PNG 图像设置为使用 5 位颜色（32 色，即 PNG5），以清晰地说明这种抖动效果。正如你在图像预览区域（图的左侧）所看到的，抖动算法在相邻颜色之间制作点阵图案，以创建额外的颜色。


    ![9781484204160_Fig05-04.jpg](img/9781484204160_Fig05-04.jpg)


    图 5-4. 将抖动设置为扩散算法和 32 种颜色（5 位），抖动程度为 100%，用于 PNG5 输出


    另外，请注意你可以设置所使用的**抖动百分比**。我经常选择 0%或 100%的设置；不过，你可以在这两个极端值之间的任何位置**微调**抖动效果。你还可以在**抖动算法**之间进行选择，因为你可能已经猜到，抖动效果是通过抖动算法创建的，这些算法是索引文件格式（此处为
    PNG8）压缩例程的一部分。


    我使用**扩散**抖动，它能在不规则形状的渐变上产生平滑效果，就像在汽车翼子板上看到的那样。你也可以使用**噪点**选项，它更随机，或者**图案**选项，它则不那么随机。扩散选项通常能给出最佳效果，这就是我在使用索引颜色时选择它的原因（虽然不常用）。


    正如你可能想象的那样，抖动会向图像中添加更难压缩的数据图案。这是因为图像中的平滑区域（如渐变）对于压缩算法来说，比尖锐的过渡（边缘）或随机的像素图案（例如，来自相机
    CCD 的抖动或“噪点”）更容易压缩。


    因此，应用抖动选项总是会使数据体积增加几个百分点。请务必检查应用抖动和不应用抖动（在“导出”对话框中选择）时的最终文件大小，以判断它是否值得其带来的视觉改善效果。请注意，索引颜色
    PNG 图像还有一个透明度选项（复选框），但 PNG8 图像中使用的 Alpha 通道只有 1 位（开/关），不像 PNG32 那样是 8 位。

