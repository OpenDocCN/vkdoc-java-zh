- fmt: '# 多媒体资产：数字图像、矢量形状、数字音频与数字视频


    您手中最强大的工具之一，是让游戏高度专业且对买家具有吸引力的**多媒体**制作软件，该软件已在[第1章](#9781484204160_Ch01.xhtml)中下载并安装。在进一步深入之前，我需要花一些时间为您提供基础知识，涉及Java
    8中使用JavaFX 8多媒体引擎所支持的四种主要**新媒体资产**类型：**数字图像**，用于精灵、背景图像和2D动画；**矢量形状**，用于2D插图、碰撞检测、3D对象、路径和曲线；**数字音频**，用于音效、旁白和背景音乐；以及**数字视频**，在游戏中用于经过高度优化的动画背景循环（如飞过天空的鸟、飘动的云等）。如[图5-1](#9781484204160_Ch05.xhtml#Fig1)所示，这四大类型或领域均通过JavaFX场景图安装，使用我在[第4章](#9781484204160_Ch04.xhtml)中描述的包。将使用的一些主要类包括`ImageView`、`AudioClip`、`Media`、`MediaView`、`MediaPlayer`、`Line`、`Arc`、`Path`、`Circle`、`Rectangle`、`Box`、`Sphere`、`Cylinder`、`Shape3D`、`Mesh`和`MeshView`。


    ![9781484204160_Fig05-01.jpg](OEBPS/Images/9781484204160_Fig05-01.jpg)


    [图5-1](#9781484204160_Ch05.xhtml#_Fig1) 通过NetBeans在Java 8中利用JavaFX API，通过场景图实现新媒体资产的方式


    因为在Java 8游戏设计与编程流程中使用任何类型的新媒体元素之前，您需要具备**技术基础**，我将逐一介绍这四个新媒体领域的基本概念，从数字成像和矢量插图开始。


    ## 数字成像概念：分辨率、颜色深度、Alpha通道与图层


    JavaFX（以及Java 8）支持大量流行的数字图像文件（数据）格式，这为游戏设计师提供了极大的灵活性。其中一些格式已经存在很久，例如CompuServe的**图形交换格式**（GIF）和**联合图像专家组**（JPEG）格式。一些JavaFX图形文件格式则更为现代，例如**便携式网络图形**（PNG，发音为“ping”），这将是您在游戏中使用的文件格式，因为它能提供最高质量水平并支持图像**合成**。Java支持的所有主流数字图像文件格式同样受HTML5浏览器支持，由于Java应用程序可与HTML应用程序和网站配合使用，这确实是一种非常合理的协同效应！


    最古老的CompuServe GIF格式是一种**无损**数字图像文件格式。之所以称为无损，是因为它不会丢弃图像数据以获得更好的压缩效果。GIF压缩算法不如PNG格式精细（强大），且GIF仅支持**索引颜色**，这正是其获得**压缩**（更小文件大小）的方式。如果您的游戏图像资产已使用GIF格式创建，您将能够毫无问题地在Java
    8游戏应用程序中使用它们（除了压缩效率较低且不具备合成能力之外）。


    Java 8（JavaFX）支持的最流行的数字图像文件格式是JPEG，它使用“真彩色”颜色深度而非索引颜色深度，并采用所谓的**有损**数字图像压缩，其中压缩算法“丢弃”图像数据以实现更小的文件大小（除非您明智地保存原始图像，否则图像数据将永久丢失！）。


    如果在压缩后放大JPEG图像，您会看到**变色区域**（效果），这显然在原始图像中并不存在。图像中退化区域通常被称为**压缩伪影**。这仅会出现在有损图像压缩中，在JPEG（以及运动图像专家组[MPEG]）压缩中很常见。


    ![Image](OEBPS/Images/sq.jpg) **提示** 我建议您在Java 8游戏中使用**PNG**数字图像格式。这是一种专业的图像**合成**格式，您的游戏本质上将是一个实时精灵合成引擎，因此您需要使用**PNG32**图像。


    PNG有两种真彩色文件版本：**PNG24**，不能用于图像合成；以及**PNG32**，它携带用于定义透明度的Alpha通道。


    我推荐在游戏中使用PNG，因为它具有不错的图像压缩算法，并且是一种**无损**图像格式。这意味着PNG具有出色的图像质量以及合理的数据压缩效率，这将使您的游戏分发文件更小。PNG32格式的真正强大之处在于其能够使用**透明度**和**抗锯齿**（通过其Alpha通道）与其他游戏图像进行合成。


    ## 数字图像分辨率与宽高比：定义图像大小与形状


    您可能知道，数字图像由**2D**（二维）**像素**数组组成（“像素”代表**图像**元素）。图像的清晰度由其**分辨率**表示，即图像**宽度**（或**W**，有时称为**x轴**）和**高度**（或**H**，有时称为**y轴**）维度中的像素数量。图像的像素越多，其分辨率越高。这与数码相机的工作原理类似，因为图像捕捉设备（称为相机CCD）的百万像素数越多，所能达到的图像质量就越高。


    要找到图像的总像素数，请将宽度像素**乘以**高度像素。例如，宽视频图形阵列（VGA）800 × 480图像包含384,000像素，正好是八分之三兆字节。这就是您如何找到图像的**大小**，包括以千字节（或兆字节）为单位的大小以及显示屏幕上的高度和宽度。


    数字图像资产的形状使用图像**宽高比**来指定。宽高比是数字图像的**宽度:高度**比率，定义了正方形（**1:1**宽高比）或矩形（也称为**宽屏**）数字图像形状。现在已有采用**2:1**（宽屏）宽高比的显示器，例如**2,160
    × 1,080**分辨率。


    **1:1宽高比**显示器（或图像）始终是**完美正方形**，**2:2**或**3:3**宽高比的图像也是如此。例如，您可能会在智能手表上看到这种宽高比。需要注意的是，定义图像或屏幕形状的是宽度和高度（x和y）这两个变量之间的**比率**，而不是实际数字本身。


    宽高比应始终表示为**冒号**两侧所能达到（约简）的**最小数字对**。如果您在高中学习最小公分母时注意听讲，那么计算宽高比对您来说将非常容易。我通常通过不断将冒号两侧的数字除以二来计算宽高比。例如，以**SXGA
    1,280 × 1,024**分辨率为例，1,280 × 1,024的一半是640 × 512，640 × 512的一半是320 × 256；320 × 256的一半是160
    × 128，再一半是80 × 64，再一半是40 × 32，再一半是20 × 16；20 × 16的一半是10 × 8，再一半得到SXGA的5 × 4宽高比，这可以通过在两个数字之间使用冒号来表示，即5:4宽高比。


    ## 数字图像颜色理论与颜色深度：定义精确的图像像素颜色'
  raw: 'One of the most powerful tools you have to make your game highly professional
    and desirable to buyers is the **multimedia** production software that you downloaded
    and installed back in [Chapter 1](#9781484204160_Ch01.xhtml). Before I go any
    further, I need to spend some time providing you with foundational knowledge regarding
    four primary types of **new media assets** that are supported in Java 8, using
    the JavaFX 8 multimedia engine: **digital images**, used for sprites, background
    imagery, and 2D animation; **vector shapes**, used in 2D illustration, collision
    detection, 3D objects, paths, and curves; **digital audio**, used for sound effects,
    narration, and background music; and **digital video**, used in games for animated
    background loops (birds flying through the sky, drifting clouds, and so on) once
    highly optimized. As illustrated in [Figure 5-1](#9781484204160_Ch05.xhtml#Fig1),
    these four major genres, or areas, are all installed via the JavaFX Scene Graph,
    using packages that I described in [Chapter 4](#9781484204160_Ch04.xhtml). Some
    of the primary classes that will be used are **ImageView**, **AudioClip**, **Media**,
    **MediaView**, **MediaPlayer**, **Line**, **Arc**, **Path**, **Circle, Rectangle**,
    **Box**, **Sphere**, **Cylinder**, **Shape3D**, **Mesh,** and **MeshView**.


    ![9781484204160_Fig05-01.jpg](OEBPS/Images/9781484204160_Fig05-01.jpg)


    [Figure 5-1](#9781484204160_Ch05.xhtml#_Fig1). How new media assets are implemented,
    using Scene Graph through the JavaFX API in Java 8 via NetBeans


    Because you need to have a **technical foundation** before using any of these
    types of new media elements in a Java 8 game design and programming pipeline,
    I am going to go over basic concepts for each of these four new media areas, beginning
    with digital imaging and vector illustration.


    Digital Imaging Concepts: Resolution, Color Depth, Alpha, Layers


    JavaFX (and therefore Java8) supports a significant number of popular digital
    imaging file (data) formats, which gives game designers a ton of flexibility.
    Some of these have been around forever, such as CompuServe’s **graphics interchange
    format** (GIF) and the **Joint Photographic Experts Group** (JPEG) format. Some
    JavaFX graphics file formats are more modern, such as **portable network graphics**
    (PNG; pronounced “ping”), which is the file format that you will be using for
    your games, as it yields the highest quality level and supports image **compositing**.
    All these mainstream digital image file formats supported in Java are also supported
    in HTML5 browsers, and because Java applications can be used with HTML applications
    and web sites, this is a very logical synergy indeed!


    The oldest CompuServe GIF format is the **lossless** digital image file format.
    It is termed lossless because it does not throw away image data to achieve better
    compression results. The GIF compression algorithm is not as refined (powerful)
    as that of the PNG format, and GIF only supports **indexed color**, which is how
    it obtains its **compression** (smaller file size). If your game image assets
    are already created with the GIF format, you will be able to use them with no
    problem (other than a less efficient image compression algorithm and no compositing
    capability) with your Java 8 game applications.


    The most popular digital imaging file format that Java 8 (JavaFX) supports is
    JPEG, which uses a “truecolor” color depth, instead of an indexed color depth,
    as well as what is termed **lossy** digital image compression, in which the compression
    algorithm “throws away” image data so that it can achieve a smaller file size
    (the image data are lost forever, unless you are smart and save your original
    image!).


    If you magnify a JPEG image after compression, you will see a **discolored area**
    (effect) that clearly was not present in the original imagery. The degraded area
    or areas in the image are commonly referred to as **compression artifacts**. This
    will only occur in lossy image compression and is common with JPEG (and Moving
    Picture Experts Group [MPEG]) compression.


    ![Image](OEBPS/Images/sq.jpg) **Tip**  I recommend that you use the **PNG** digital
    imaging format for your Java 8 games. This is a professional image-**compositing**
    format, and your games will essentially be a real-time sprite-compositing engine,
    so you will need to use **PNG32** imagery.


    PNG has two truecolor file versions: **PNG24**, which cannot be used in image
    compositing, and **PNG32**, which carries an alpha channel used to define transparency.


    I recommend PNG for your games because it has a decent image compression algorithm
    and because it is a **lossless** image format. This means that PNG has great image
    quality as well as reasonable levels of data compression efficiency, which will
    make your game distribution file smaller. The real power of the PNG32 format lies
    in its ability to composite with other game imagery, using **transparency** and
    **antialiasing** (via its alpha channel).


    Digital Image Resolution and Aspect Ratio: Defining Image Size and Shape


    As you probably know, digital imagery is made up of **2D** (two-dimensional) **arrays**
    of **pixels** (“pixel” stands for **picture** [pix] **element** [el]). The sharpness
    of an image is expressed by its **resolution**, which is the number of pixels
    in the image **width** (or **W**, sometimes referred to as the **x axis**) and
    **height** (or **H**, sometimes referred to as the **y axis**) dimensions. The
    more pixels an image has, the higher its resolution. This is similar to how digital
    cameras work, as the more megapixels in an image capture device (called a camera
    CCD), the higher the image quality that can be achieved.


    To find the total number of image pixels, **multiply** the width pixels by the
    height pixels. For instance, a wide video graphics array (VGA) 800 × 480 image
    contains 384,000 pixels, which is exactly three-eighths of a megabyte. This is
    how you would find the **size** of your image, both in terms of kilobytes (or
    megabytes) used and height and width on the display screen.


    The shape of a digital image asset is specified using the image **aspect ratio**.
    Aspect ratio is the **width:height** ratio for the digital image and defines the
    square (**1:1** aspect ratio) or rectangular (also known as **widescreen**) digital
    image shape. Displays featuring a **2:1** (widescreen) aspect ratio, such as **2,160
    × 1,080** resolution, are now available.


    A **1:1 aspect ratio** display (or image) is always **perfectly square**, as is
    a **2:2** or **3:3** aspect ratio image. You might see this aspect ratio on a
    smart watch, for instance. It is important to note that it is the **ratio** between
    these two width and height (x and y) variables that defines the shape of an image
    or screen, not the actual numbers themselves.


    An aspect ratio should always be expressed as the **smallest pair of numbers**
    that can be achieved (reduced) on either side of the **colon**. If you paid attention
    in high school while you were learning about the lowest common denominator, then
    an aspect ratio will be very easy for you to calculate. I usually do aspect ratio
    calculation by continuing to divide each side of the colon by two. For example,
    if you take the **SXGA 1,280 × 1,024** resolution, half of 1,280 × 1,024 is 640
    × 512, and half of 640 × 512 is 320 × 256; half of 320 × 256 is 160 × 128, half
    of that again is 80 × 64, half of that is 40 × 32, and half of that is 20 × 16;
    half of 20 × 16 is 10 × 8, and half of that gives you the 5 × 4 aspect ratio for
    SXGA, which would be signified by using a colon between the two numbers, as in
    a 5:4 aspect ratio.


