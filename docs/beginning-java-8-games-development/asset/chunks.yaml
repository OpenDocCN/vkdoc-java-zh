    如果你使用 **运行 ![image](img/arrow.jpg) 项目** 工作流程来测试代码，你会发现无论将 InvinciBagel 角色放置在屏幕上的哪个位置，抛射物现在都会以该角色为目标！这对于使用致命的
    iBullet 抛射体 Actor 对象的攻击来说非常棒，但当自动攻击引擎使用 iCheese 抛射体 Actor 对象时，得分就变得太容易了。因此，如果自动攻击引擎要发射奶油芝士球，我们需要添加另一层代码，使用
    **randomLocation** 变量；如果自动攻击引擎要发射致命的（真）子弹，则使用 **iBagelLocation** 变量。我们将把这个逻辑结构放在
    .update() 方法中，在该方法中我们创建 randomLocation 和 iBagelLocation 变量值（使用 .nextBoolean()
    或 .getiY() 方法调用），紧跟在通过 randomNum Random 对象的 .nextBoolean() 方法调用确定 bulletType 之后。


    我们将要创建的 **if(bulletType)** 条件 if 结构将使用 .setTranslateY() 方法调用，如果 bulletType 等于
    true 值（iCheese），则传递 randomLocation 参数；如果 bulletType 等于 false 值（iBullet），则使用 .setTranslateY()
    方法调用传递 iBagelLocation 参数，使用 if-else 结构的 else{} 部分。在 if-else 结构每个部分的第二行代码中，我们将记得设置
    randomOffset 变量，在结构的 if 部分内给 randomLocation 变量增加五个像素，或者在 else 部分内给 iBagelLocation
    变量增加五个像素，使用如下代码，如图 17-58 所示：


    ```

    if(attackCounter >= attackFrequency) {

        attackCounter=0;

        spriteMoveR = 700;

        spriteMoveL = -70;

        randomLocation = randomNum.nextInt(attackBoundary);

        iBagelLocation = (int) invinciBagel.iBagel.getiY();

        bulletType = randomNum.nextBoolean();

        if(bulletType) {

        spriteFrame.setTranslateY(randomLocation);

        randomOffset = randomLocation + 5;

        } else {

        spriteFrame.setTranslateY(iBagelLocation);

        randomOffset = iBagelLocation + 5;

        }

        callAttack = true;

    } else { attackCounter+=1; }

    ```


    ![9781484204160_Fig17-58.jpg](img/9781484204160_Fig17-58.jpg)


    图 17-58. 在 bulletType、randomLocation 和 iBagelLocation 之后添加一个 if-else 结构，以根据 bulletType
    定位


    为子弹添加重力：游戏物理入门


    由于物理计算倾向于使用小数而非整数，我们需要将 randomOffset 从复合整数声明中提取出来，并将其声明为 **double randomOffset;**，如图
    17-59 所示。此外，你还需要为 **bulletGravity** 和 **cheeseGravity** 声明 **double** 变量，并将它们分别设置为
    **0.2** 和 **0.1**。


    ![9781484204160_Fig17-59.jpg](img/9781484204160_Fig17-59.jpg)


    图 17-59. 声明 bulletGravity 和 cheeseGravity 双精度变量，并将 randomOffset 转换为双精度类型


    我们要做的是在每一帧上向 randomOffset（Y 位置）添加一个 bulletGravity（或 cheeseGravity）因子，这样射击就会产生轻微的“拖尾”效果。这将模拟重力将抛射物拉向地面的效果。我们将把它放在
    if(bulletOffset >= bulletRange) 计数器循环内部，这样重力因子仅在抛射物可见地飞过屏幕时应用。将 bulletGravity
    和 cheeseGravity 调整整合到抛射体对象轨迹中的 Java 代码如图 17-60 所示，应类似于以下代码：


    ```

    private void shootProjectile() {

        if(!bulletType && !takeSides) {

            invinciBagel.iBullet.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iBullet.spriteFrame.setScaleX(-0.5);

            invinciBagel.iBullet.spriteFrame.setScaleY(0.5);

            bulletRange = -50;

            if(bulletOffset >= bulletRange) {

                bulletOffset-=6;

                invinciBagel.iBullet.spriteFrame.setTranslateX(bulletOffset);

                randomOffset = randomOffset + bulletGravity;

            } else { shootBullet = false; }

        }

        if(!bulletType && takeSides) {

            invinciBagel.iBullet.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iBullet.spriteFrame.setScaleX(0.5);

            invinciBagel.iBullet.spriteFrame.setScaleY(0.5);

            bulletRange = 624;

            if(bulletOffset <= bulletRange) {

                bulletOffset+=6;

                invinciBagel.iBullet.spriteFrame.setTranslateX(bulletOffset);

                randomOffset = randomOffset + bulletGravity;

            } else { shootBullet = false; }

        }

        if(bulletType && !takeSides) {

            invinciBagel.iCheese.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iCheese.spriteFrame.setScaleX(-0.5);

            invinciBagel.iCheese.spriteFrame.setScaleY(0.5);

            bulletRange = -50;

            if(bulletOffset >= bulletRange) {

                bulletOffset-=4;

                invinciBagel.iCheese.spriteFrame.setTranslateX(bulletOffset);

                randomOffset = randomOffset + cheeseGravity;

            } else { shootBullet = false; }

        }

        if(bulletType && takeSides) {

            invinciBagel.iCheese.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iCheese.spriteFrame.setScaleX(0.5);

            invinciBagel.iCheese.spriteFrame.setScaleY(0.5);

            bulletRange = 630;

            if(bulletOffset <= bulletRange) {

                bulletOffset+=4;

                invinciBagel.iCheese.spriteFrame.setTranslateX(bulletOffset);

                randomOffset = randomOffset + cheeseGravity;

            } else { shootBullet = false; }

        }

    }

    ```


    ![9781484204160_Fig17-60.jpg](img/9781484204160_Fig17-60.jpg)


    图 17-60. 在 .shootProjectile() 方法中为抛射体对象的轨迹添加重力物理模拟


    总结


    在这第十七章也是最后一章中，我们使用了本书中一直在构建的游戏引擎的所有基础元素，为 InvinciBagel 游戏创建了基本的游戏玩法，包括计分引擎和自动攻击引擎，以及随机攻击策略和基本的物理模拟以增强真实感。我们学习了如何使用
    JavaFX 8.0 的 Text 和 Font 类在游戏中创建记分板输出，以及如何使用 Java 8 的 Random 类作为随机数生成器，使我们的自动攻击引擎看起来仿佛拥有自己的生命。我们还通过编写
    Treasure.java 类为游戏增加了奖励，并创建了一个 .scoringEngine() 方法来跟踪和组织我们的计分算法。我们学习了更多关于优化的知识，使用带有
    **break;** 的 if-else-if 循环，并学习了如何使用 **return;** 提前跳出方法，我们在游戏逻辑中充分利用了这两种技术。我们为游戏添加了敌人角色和抛射体对象，并学习了如何在游戏画面后方实现背景板。我试图超越一本基础的
    Java 8 入门书籍，向你展示创建游戏引擎基础设施所涉及的工作流程，包括设计思路、如何利用 Java 8 和 JavaFX 8.0 中的关键类，以及如何使用新的媒体资源和优化技术。


