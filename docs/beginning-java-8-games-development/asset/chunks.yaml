    \ Enemy( InvinciBagel iBagel,\n              String SVGdata, double xLocation,\
    \ double yLocation, Image... spriteCels) {\n        super(SVGdata, xLocation,\
    \ yLocation, spriteCels);\n        invinciBagel = iBagel;\n        spriteFrame.setTranslateX(xLocation);\n\
    \        spriteFrame.setTranslateY(yLocation);\n        isAlive = true;\n    \
    \    isBonus = true;\n        hasValu = true;\n    }\n```\n\n![9781484204160_Fig17-40.jpg](OEBPS/Images/9781484204160_Fig17-40.jpg)\n\
    \n[Figure 17-40](#9781484204160_Ch17.xhtml#_Fig40). Modify the `Enemy()` constructor\
    \ method in the Enemy class to add an `InvinciBagel` object named `iBagel`\n\n\
    Now that the Enemy class (object) can see into the `InvinciBagel` class (object),\
    \ we’re ready to add projectiles.\n\n## Creating a Projectile Infrastructure:\
    \ Adding Projectile Variables\n\nTo add projectile support to the Enemy class\
    \ we will need to declare four new variables at the top of the class. These will\
    \ include `randomLocation`, a new variable that we’ll use for both the Enemy character\
    \ and the projectile he shoots; `randomOffset`, a new variable that will hold\
    \ the vertical (Y) offset that allows us to fine-tune position the projectile\
    \ so that it comes out of the bazooka barrel; and the `bulletRange` and `bulletOffset`\
    \ allowing us to do X positioning. We will set the `randomLocation` variable equal\
