    选中“我接受所有许可协议中的条款”复选框，然后点击**更新**按钮，开始下载和安装过程。如图 9-8 右下角所示，进度条会准确显示已下载了多少，以及正在下载和安装到系统上的内容。


    让我们用本章剩余的时间来探讨事件处理，以及 Java 和 JavaFX 中可用于为我们的 Java 8 游戏开发工作提供不同类型事件处理的事件相关类。


    事件处理：为您的游戏增加交互性


    有人可能会说，事件处理是游戏开发的基石和核心，因为如果没有与游戏逻辑和角色交互的方式，您实际上根本算不上拥有一个游戏。我将在本章的这一部分介绍 Java 和
    JavaFX 事件处理相关的类，然后我们将实现键盘事件处理，以便支持使用**方向键**在屏幕上导航我们的 InvinciBagel 角色。之后，我们将把那个
    Java 7 兼容的代码转换为 Java 8 兼容的 lambda 表达式，然后我们就准备好在本章下一节中介绍屏幕上的精灵移动了。在我们开始剖析 Java
    和 JavaFX 类之前，我想先谈谈为游戏处理的不同类型的事件，从方向键（智能手机上的方向键）到键盘（或 iTV 的遥控器）到鼠标（或智能手机上的轨迹球）到触摸屏（智能手机和平板电脑）到游戏控制器（游戏机和
    iTV 设备）到陀螺仪和加速度计（智能手机和平板电脑）再到运动控制器，例如 Leap Motion 和 Razer Hydra Portal。

