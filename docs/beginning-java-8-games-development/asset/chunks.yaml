- fmt: 'After this access control modifier, you will need to declare the method’s
    return type. This is the type of data that the method will return after it is
    called, or invoked. Because the `.start()` method performs setup operations but
    does not return a specific type of value, it uses the `void` return type, which
    signifies that the method performs tasks but does not return any resulting data
    to the calling entity. In this case, the calling entity is the JavaFX `Application`
    class, as the `.start()` method is one of the key methods (the others being the
    `.stop()` and `.init()` methods) provided by that class to control the life cycle
    stages of a JavaFX application.


    Next, you will supply the method name, which, by convention (programming rules),
    should start with a lowercase letter (or word, preferably a verb), with any subsequent
    (internal) words (nouns or adjectives) starting with a capital letter. For instance,
    a method to display the splash screen would be named `.showSplashScreen()` or
    `.displaySplashScreen()` and because it does something but does not return a value,
    would be declared using this code:


    ```

    public void displaySplashScreen() { Java code to display splashscreen goes in
    here }

    ```


    If you need to pass parameters, which are named data values that have to be operated
    on within the body of the method (the part inside the curly braces), these go
    inside the parentheses that are attached to the method name. In [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)
    the `.start()` method for your bootstrap “HelloWorld!” JavaFX application receives
    a `Stage` object, named `primaryStage`, using the following Java method declaration
    syntax:


    ```

    public void start(Stage primaryStage) { bootstrap Java code to start Application
    goes in here }

    ```


    You can provide as many parameters as you like, using the data type and parameter
    name pairs, with each pair separated by a comma. Methods can also have no parameters,
    in which case the parameter parentheses are empty, with the opening and closing
    parentheses right next to each other, for example, `.start()`, and `.stop()`.


    The programming logic that defines your method will be contained in the body of
    the method, which, as discussed previously, is inside the curly braces that define
    the beginning and the end of the method. The Java programming logic that is inside
    methods can include variable declarations, program logic statements, and iterative
    control structures (loops), all of which you will be leveraging to create your
    Java game.


    Before moving on, let’s focus on one other Java concept that applies to methods,
    namely, overloading Java methods. Overloading a Java method means using the same
    method name, but different parameter list configurations. What this means is that,
    if you have defined more than one method with the same name, Java can figure out
    which of your (overloaded) methods to use by looking at the parameters that are
    being passed into the method being called and then using that parameter list to
    discern which of the methods (that have the same name) to use by matching the
    parameter list data types and names and the order in which they appear. Of course,
    your parameter list configurations must all be unique for this Java method overloading
    feature to work correctly.


    You will be learning how to use and how to code Java methods over the course of
    this book, beginning in [Chapter 4](#9781484204160_Ch04.xhtml), so I am not going
    to spend too much time on them here, other than to define what they are and the
    basic rules for how they are declared, and used, inside Java classes.


    One specialized kind of method that I am going to cover in detail, however, is
    the constructor method. This is a type of method that can be used to create objects.
    Java objects are the foundation of OOP, so you will be taking a look at constructor
    methods next, as it is important to do so before learning about the Java object
    itself, which you will study later in the chapter (see the section “Java Objects:
    Virtual Reality, Using Java Constructs”).


    ## Creating a Java Object: Invoking a Class’s Constructor Method


    A Java class can contain a constructor method with the exact same name as the
    class that can be used to create Java objects using that class. A constructor
    method uses its Java class like a blueprint to create an instance of that class
    in memory, which creates a Java object. A constructor method will always return
    a Java object and thus does not use any of the Java return types that other methods
    will typically use (`void`, `String`, and so on). A constructor method is invoked
    by using the Java `new` keyword, because you are creating a new object.


    You can see an example of this in the bootstrap JavaFX code shown in [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)
    (ll. 20, 28, and 30), where `new Button`, `StackPane`, and `Scene` objects are
    created, respectively, by using the following object declaration, naming, and
    creation Java code structure:


    ```

    <Java class name> <your object instance name> = new <Java constructor method name>
    <semicolon>

    ```


    The reason that a Java object is declared in this way, using the class name, the
    name of the object you are constructing, the Java `new` keyword, and the class’s
    constructor method name (and parameters, if any) in a single Java statement terminated
    with a semicolon, is because a Java object is an instance of a Java class.


    Let’s take a look at, for example, the `Button` object creation from line 20 of
    your current Java code. Here, via the part of the Java statement on the left-hand
    side of the equals operator, you are telling the Java language compiler that you
    want to create a `Button` object named `btn`, using the JavaFX `Button` class
    as the object blueprint. This declares the `Button` class (object type) and gives
    it a unique name.


    The first part of creating the object is thus called the object declaration. The
    second part of creating your Java object is called the object instantiation, and
    this part of the object creation process, seen on the right-hand side of the equals
    operator, involves a constructor method and the Java `new` keyword.


    To instantiate a Java object, you invoke the Java `new` keyword, in conjunction
    with an object constructor method call. Because this takes place on the right-hand
    side of the equals operator, the result of the object instantiation is placed
    in the declared object, which is on the left-hand side of the Java statement.
    As you will see a bit later in the chapter, when I discuss operators (see the
    section “Java Operators: Manipulating Data in the Application”), this is what
    an equals operator does, and a useful operator it is.


    This completes the process of declaring (class name), naming (object name), creating
    (using a `new` keyword), configuring (using a constructor method), and loading
    (using the equals operator) your very own custom Java object.


    It is important to note that the declaration and instancing parts of this process
    can be coded using separate lines of Java code as well. For instance, the `Button`
    object instantiation (see [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2), l. 20)
    could be coded as follows:


    ```

    Button btn;

    btn = new Button();

    ```'
