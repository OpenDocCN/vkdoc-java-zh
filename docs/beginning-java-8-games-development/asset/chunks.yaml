    请注意，除了生成的 `.get()` 和 `.set()` 方法外，对于布尔变量还会额外生成一个 `.is()` 方法，用以替代 `.get()` 方法。由于我已经使用“is”前缀命名了布尔标志，我将移除第二个“Is”，以便这些“双重
