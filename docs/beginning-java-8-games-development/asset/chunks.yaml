    \ relating to more complex things that relate to use of system memory and thread\
    \ usage. Think of passing one object’s context information to another object using\
    \ the Java `this` keyword as wiring them together, so to speak, so that your receiving\
    \ object can peer into the sending object by using the `this` object reference.\n\
    \nNow that the `this` reference (contextual object) for the `InvinciBagel` class\
