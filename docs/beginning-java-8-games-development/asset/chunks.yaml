    \ and will use the `.setTranslateY()` method call passing the `iBagelLocation`\
    \ parameter, if the `bulletType` equates to a false value (`iBullet`), using the\
    \ `else{}` portion of the if-else structure. In a second line of code inside each\
    \ section of the if-else structure, we’ll remember to set the `randomOffset` variable,\
    \ to add five pixels to the `randomLocation` variable inside the if portion of\
