    要让你的游戏显得高度专业且对买家有吸引力，最强大的工具之一就是你早在第 1 章中下载并安装的**多媒体**制作软件。在进一步深入之前，我需要花些时间为你提供一些基础知识，内容涉及
    Java 8 使用 JavaFX 8 多媒体引擎所支持的四种主要**新媒体资源**类型：用于精灵图、背景图像和 2D 动画的**数字图像**；用于 2D 插图、碰撞检测、3D
    对象、路径和曲线的**矢量形状**；用于音效、旁白和背景音乐的**数字音频**；以及用于游戏中高度优化后的动画背景循环（如飞过天空的鸟儿、飘动的云朵等）的**数字视频**。如图
    5-1 所示，这四大类型或领域均通过 JavaFX 场景图进行安装，使用的是我在第 4 章中描述过的包。将用到的一些主要类包括：**ImageView**、**AudioClip**、**Media**、**MediaView**、**MediaPlayer**、**Line**、**Arc**、**Path**、**Circle**、**Rectangle**、**Box**、**Sphere**、**Cylinder**、**Shape3D**、**Mesh**和**MeshView**。


    ![9781484204160_Fig05-01.jpg](img/9781484204160_Fig05-01.jpg)


    图 5-1. 通过 NetBeans 在 Java 8 中利用 JavaFX API，使用场景图实现新媒体资源的方式


    因为在 Java 8 游戏设计与编程流程中使用任何类型的新媒体元素之前，你需要具备**技术基础**，所以我将逐一介绍这四个新媒体领域的基本概念，从数字图像和矢量插图开始。


    数字图像概念：分辨率、颜色深度、Alpha 通道、图层


    JavaFX（以及 Java 8）支持大量流行的数字图像文件（数据）格式，这为游戏设计师提供了极大的灵活性。其中一些格式已经存在很久了，例如 CompuServe
    的**图形交换格式**（GIF）和**联合图像专家组**（JPEG）格式。而 JavaFX 支持的某些图形文件格式则更为现代，例如**便携式网络图形**（PNG；发音为“ping”），这将是你在游戏中使用的文件格式，因为它能提供最高质量水平并支持图像**合成**。Java
    支持的所有这些主流数字图像文件格式在 HTML5 浏览器中也同样受支持，并且由于 Java 应用程序可以与 HTML 应用程序和网站一起使用，这确实是一种非常合理的协同效应！


    最古老的 CompuServe GIF 格式是一种**无损**数字图像文件格式。之所以称其为无损，是因为它不会为了获得更好的压缩效果而丢弃图像数据。GIF
    压缩算法不如 PNG 格式那么精良（强大），并且 GIF 仅支持**索引颜色**，这正是它实现**压缩**（更小的文件大小）的方式。如果你的游戏图像资源已经使用
    GIF 格式创建，那么你可以在 Java 8 游戏应用程序中毫无问题地使用它们（除了压缩算法效率较低且不具备合成能力之外）。


    Java 8（JavaFX）支持的最流行的数字图像文件格式是 JPEG，它使用“真彩色”颜色深度，而非索引颜色深度，并且采用所谓的**有损**数字图像压缩，即压缩算法会“丢弃”图像数据，以便实现更小的文件大小（除非你足够聪明并保存了原始图像，否则这些图像数据将永久丢失！）。


    如果你在压缩后放大 JPEG 图像，你会看到**变色区域**（效果），这显然在原始图像中是不存在的。图像中这些退化的区域通常被称为**压缩伪影**。这种情况只会发生在有损图像压缩中，并且在
    JPEG（以及运动图像专家组[MPEG]）压缩中很常见。


    ![Image](img/sq.jpg) **提示**  我建议你在 Java 8 游戏中使用**PNG**数字图像格式。这是一种专业的图像**合成**格式，你的游戏本质上将是一个实时的精灵图合成引擎，因此你需要使用**PNG32**图像。


    PNG 有两种真彩色文件版本：**PNG24**，不能用于图像合成；以及**PNG32**，它带有一个用于定义透明度的 Alpha 通道。


    我推荐在游戏中使用 PNG，因为它具有不错的图像压缩算法，并且是一种**无损**图像格式。这意味着 PNG 既拥有出色的图像质量，又具备合理的数据压缩效率，这将使你的游戏分发文件更小。PNG32
    格式的真正强大之处在于它能够利用**透明度**和**抗锯齿**（通过其 Alpha 通道）与其他游戏图像进行合成。


    数字图像分辨率与宽高比：定义图像尺寸与形状


    你可能知道，数字图像由像素（“pixel”代表**图像** [pix] **元素** [el]）的**二维**（2D）**数组**构成。图像的清晰度由其**分辨率**表示，即图像**宽度**（或**W**，有时称为**x
    轴**）和**高度**（或**H**，有时称为**y 轴**）维度上的像素数量。图像的像素越多，其分辨率就越高。这与数码相机的工作原理类似，图像捕捉设备（称为相机
    CCD）的百万像素数越高，所能达到的图像质量就越高。


    要计算图像的总像素数，请将宽度像素数**乘以**高度像素数。例如，一个宽视频图形阵列（VGA）800 × 480 的图像包含 384,000 个像素，正好是
    0.375 兆字节。这就是你如何确定图像**大小**的方法，既包括占用的千字节（或兆字节）数，也包括在显示屏上的高度和宽度。


    数字图像资源的形状使用图像**宽高比**来指定。宽高比是数字图像的**宽度:高度**比率，它定义了正方形（**1:1** 宽高比）或矩形（也称为**宽屏**）的数字图像形状。现在已有采用**2:1**（宽屏）宽高比的显示器，例如**2,160
    × 1,080**分辨率。


    **1:1 宽高比**的显示器（或图像）总是**完美的正方形**，**2:2**或**3:3**宽高比的图像也是如此。例如，你可能会在智能手表上看到这种宽高比。需要注意的是，定义图像或屏幕形状的是这两个宽度和高度（x
    和 y）变量之间的**比率**，而不是实际的数字本身。


    宽高比应始终表示为**冒号**两侧所能达到（约简）的**最小一对数字**。如果你在高中学习最小公分母时认真听讲，那么计算宽高比对你来说将非常容易。我通常通过不断将冒号两侧的数字除以
    2 来计算宽高比。例如，以**SXGA 1,280 × 1,024**分辨率为例，1,280 × 1,024 的一半是 640 × 512，640 × 512
    的一半是 320 × 256；320 × 256 的一半是 160 × 128，再一半是 80 × 64，再一半是 40 × 32，再一半是 20 × 16；20
    × 16 的一半是 10 × 8，再一半就得到了 SXGA 的 5 × 4 宽高比，这可以用两个数字之间的冒号来表示，即 5:4 宽高比。


