    processing guide.


    If you want to see the `iPR1` and `iPV1` objects temporarily removed from your
    `.createGameActors()` as well as your `.addGameActorNodes()` and `.createCastingDirection()`
    methods, you can see this Java code commenting in place in [Figures 16-25](#9781484204160_Ch16.xhtml#Fig25)
    and [16-26](#9781484204160_Ch16.xhtml#Fig26). Next, let’s copy and paste the SVG
    collision polygon data set that you created earlier in the chapter. Open the `iBshape1svg.txt`
