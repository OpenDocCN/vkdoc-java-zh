- fmt: "# The JavaFX HBox Class: Using a Layout Container in a Design\n\nBecause `Button`\
    \ objects cannot be positioned easily, I will be placing the four `Button` objects\
    \ in a **layout container** from the `javafx.scene.layout` package called `HBox`,\
    \ which stands for **Horizontal Box**. This `public` class arranges things in\
    \ a row, and because you want the buttons to be aligned at the bottom of the splash\
    \ screen, you use the `Parent` node for four `Button` control nodes, which will\
    \ become children (**leaf** nodes) of this `HBox` **branch** node. This will create\
    \ a bank of UI buttons that can be positioned (moved around) together as a single\
    \ unit of the splash screen design.\n\nAn `HBox` class is a `public` class that\
    \ directly extends the `javafx.layout.Pane` superclass, which in turn extends\
    \ a `javafx.layout.Region` superclass. The `javafx.layout.Region` superclass extends\
    \ a `javafx.scene.parent` superclass, which in turn extends a `javafx.scene.Node`\
    \ superclass, which extends the `java.lang.Object` masterclass. As [Figure 6-4](#9781484204160_Ch06.xhtml#Fig4)\
    \ shows (l. 11), `HBox` is contained in the `javafx.scene.layout` package, just\
    \ like the `StackPane` class, and it uses the following class hierarchy structure:\n\
    \n```\njava.lang.Object\n  > javafx.scene.Node\n    > javafx.scene.Parent\n  \
    \    > javafx.scene.layout.Region\n        > javafx.scene.layout.Pane\n      \
    \    > javafx.scene.layout.HBox\n```\n\nIf an `HBox` has a **border** or a **padding**\
    \ value specified, the contents of your `HBox` layout container will respect that\
    \ border or padding specification. A padding value is specified using the `Insets`\
    \ class, which you will be using for exactly this fine-tuned UI control bank application.\n\
    \nYou will use the `HBox` class (object), along with the `Pos` class constant\
    \ and the `Insets` class (object), to group the UI `Button` objects together and,\
    \ later, to fine-tune their position as a `Button` control bank. This `HBox` layout\
    \ container will thus become the `Parent` node (or a branch node) for the `Button`\
    \ UI controls (or leaf nodes).\n\nThink of an `HBox` object as a way to **array**\
    \ children objects **horizontally**, in a row. These could be your image assets,\
    \ which would use the basic `HBox` constructor (with zero spacing), or UI controls,\
    \ such as buttons, arranged next to each other but spaced apart, using one of\
    \ the overloaded constructors. The simplest constructor for an `HBox` object creation\
    \ would use the following **empty** constructor method call format:\n\n```\nHBox()\n\
    ```\n\nThe overloaded constructor that you will be employing for your `HBox` object\
    \ creation will use a spacing value to put some space between the child `Button`\
    \ objects inside the `HBox`, with the following constructor method call format:\n\
    \n```\nHBox(double spacing)\n```\n\nThere are also two other overloaded constructor\
    \ method call formats. These will allow you to specify the children `Node` objects\
    \ (in this case, `Button` objects) inside the constructor method call itself,\
    \ as follows:\n\n```\nHBox(double spacing, Nodes... children)  - or, with zero\
    \ spacing value in between Node objects:\n\nHBox(Nodes... children)\n```\n\nYou\
    \ are going to be using the “long form,” and `.getChildren().addAll()` method\
    \ chain, in your code, but you could also declare the `HBox`, and its `Button`\
    \ `Node` objects, by using the following constructor:\n\n```\nHBox buttonContainer\
    \ = new HBox(12, gameButton, helpButton, scoreButton, legalButton);\n```\n\nThe\
    \ `HBox` layout container will control resizing of child elements, based on different\
    \ screen sizes, aspect ratios, and physical resolutions if the child objects are\
    \ set to be resizable. If the `HBox` area will accommodate the child objects’\
    \ preferred widths, they will be set to that value. In addition, a `fillHeight`\
    \ attribute (boolean variable) is set to `true`, as the default value, specifying\
    \ whether a child object should fill (scale up to) the `HBox` height value.\n\n\
    Alignment of an `HBox` is controlled by the `alignment` attribute (property or\
    \ variable), which defaults to the `TOP_LEFT` constant from the `Pos` class (`Pos.TOP_LEFT`).\
    \ If an `HBox` is sized above its specified width, the child objects use their\
    \ preferred width values, and the extra space goes unused. It is important to\
    \ note that the `HBox` layout engine will lay out the managed child elements,\
    \ regardless of their `visibility` attribute (property or variable) setting.\n\
    \nNow that I have discussed the JavaFX geometry and layout classes, which you\
    \ will be using to create the UI (a bank of `Button` objects) design, let’s take\
    \ a look at the digital image–related classes, from the `javafx.scene.image` package,\
    \ which will allow you to implement the digital image–compositing pipeline that\
    \ you will put in place behind these four JavaFX `Button` UI control element objects\
    \ held inside an `HBox` UI layout container object.\n\n# The JavaFX Image Class:\
    \ Referencing Digital Images in a Design\n\nThe `Image` class is a `public` class\
    \ that directly extends the `java.lang.Object` masterclass, meaning that the `Image`\
    \ class was also coded from scratch to provide image loading (referencing) and\
    \ scaling (resizing). You can lock the aspect ratio for scaling and specify the\
    \ scaling algorithm (quality) as well. All URLs that are supported by the `java.net.URL`\
    \ class are supported. This means that you can load images from the Internet (`www.servername.com/image.png`);\
    \ from the OS (`file:image.png`); or from the JAR file, using a forward slash\
    \ (`/image.png`).\n\nThe Java class hierarchy for the `Image` class starts with\
    \ the `java.lang.Object` master class and uses this class to create the `javafx.scene.image.Image`\
    \ class. As [Figure 6-4](#9781484204160_Ch06.xhtml#Fig4) shows (l. 9), `Image`\
    \ is contained in the JavaFX image package, just like the `ImageView` class, and\
    \ uses the following class hierarchy structure:\n\n```\njava.lang.Object\n  >\
    \ javafx.scene.image.Image\n```\n\nThe `Image` class supplies six different (overloaded)\
    \ `Image()` constructor methods. These take anything from a simple URL to a set\
    \ of parameter values specifying the `URL`, `width`, `height`, `aspectRatioLock`,\
    \ `smoothing`, and `preload` options. These should be specified in that order\
    \ within the constructor method, as you will soon see, when you write an `Image()`\
    \ constructor using the most complicated of all the constructor methods, which\
    \ has the following format:\n\n```\nImage(String url, double requestedWidth, double\
    \ requestedHeight, boolean preserveRatio, boolean smooth, boolean backgroundLoading)\n\
    ```\n\nThe simple constructor for an `Image` object specifies only the URL and\
    \ uses the following format:\n\n```\nImage(String url)\n```\n\nIf you want to\
    \ load an image and also have the constructor method scale the image to a different\
    \ width and height (usually, this is smaller, to save memory), while locking (preserving)\
    \ the aspect ratio, using the highest-quality resampling (smooth-pixel scaling),\
    \ that `Image` object constructor uses the following format:\n\n```\nImage(String\
    \ url, double scaleWidth, double scaleHeight, boolean preserveAspect, boolean\
    \ smooth)\n```\n\nIf you want to load an image in the background (**asynchronously**),\
    \ using its “native,” or physical, resolution and native aspect ratio, the `Image()`\
    \ constructor uses the following format:\n\n```\nImage(String url, boolean backgroundLoading)\n\
    ```\n\nTwo `Image()` constructor methods also use the `java.io.InputStream` class,\
    \ which furnishes a real-time stream (like streaming video or audio, only customized\
    \ for a Java application) of input data to the `Image()` constructor method. These\
    \ two `Image` object constructor formats take the following formats (simple and\
    \ complex):\n\n```\nImage(InputStream is) // This is the simple format. The complex\
    \ format would thus be as follows:\n\nImage(InputStream is, double newWidth, double\
    \ newHeight, boolean preserveAspect, boolean smooth)\n```"
  raw: 'The JavaFX HBox Class: Using a Layout Container in a Design


    Because Button objects cannot be positioned easily, I will be placing the four
    Button objects in a **layout container** from the **javafx.scene.layout** package
    called **HBox**, which stands for **Horizontal Box**. This **public** class arranges
    things in a row, and because you want the buttons to be aligned at the bottom
    of the splash screen, you use the Parent node for four Button control nodes, which
    will become children (**leaf** nodes) of this HBox **branch** node. This will
    create a bank of UI buttons that can be positioned (moved around) together as
    a single unit of the splash screen design.


    An **HBox** class is a **public** class that directly extends the javafx.layout.Pane
    superclass, which in turn extends a javafx.layout.Region superclass. The javafx.layout.Region
    superclass extends a javafx.scene.parent superclass, which in turn extends a javafx.scene.Node
    superclass, which extends the java.lang.Object masterclass. As [Figure 6-4](#9781484204160_Ch06.xhtml#Fig4)
    shows (l. 11), HBox is contained in the javafx.scene.layout package, just like
    the StackPane class, and it uses the following class hierarchy structure:


    ```

    java.lang.Object

      > javafx.scene.Node

        > javafx.scene.Parent

          > javafx.scene.layout.Region

            > javafx.scene.layout.Pane

              > javafx.scene.layout.HBox

    ```


    If an HBox has a **border** or a **padding** value specified, the contents of
    your HBox layout container will respect that border or padding specification.
    A padding value is specified using the Insets class, which you will be using for
    exactly this fine-tuned UI control bank application.


    You will use the HBox class (object), along with the Pos class constant and the
    Insets class (object), to group the UI Button objects together and, later, to
    fine-tune their position as a Button control bank. This HBox layout container
    will thus become the Parent node (or a branch node) for the Button UI controls
    (or leaf nodes).


    Think of an HBox object as a way to **array** children objects **horizontally**,
    in a row. These could be your image assets, which would use the basic HBox constructor
    (with zero spacing), or UI controls, such as buttons, arranged next to each other
    but spaced apart, using one of the overloaded constructors. The simplest constructor
    for an HBox object creation would use the following **empty** constructor method
    call format:


    ```

    HBox()

    ```


    The overloaded constructor that you will be employing for your HBox object creation
    will use a spacing value to put some space between the child Button objects inside
    the HBox, with the following constructor method call format:


    ```

    HBox(double spacing)

    ```


    There are also two other overloaded constructor method call formats. These will
    allow you to specify the children Node objects (in this case, Button objects)
    inside the constructor method call itself, as follows:


    ```

    HBox(double spacing, Nodes... children)  - or, with zero spacing value in between
    Node objects:


    HBox(Nodes... children)

    ```


    You are going to be using the “long form,” and **.getChildren().addAll()** method
    chain, in your code, but you could also declare the HBox, and its Button Node
    objects, by using the following constructor:


    ```

    HBox buttonContainer = new HBox(12, gameButton, helpButton, scoreButton, legalButton);

    ```


    The HBox layout container will control resizing of child elements, based on different
    screen sizes, aspect ratios, and physical resolutions if the child objects are
    set to be resizable. If the HBox area will accommodate the child objects’ preferred
    widths, they will be set to that value. In addition, a **fillHeight** attribute
    (boolean variable) is set to **true**, as the default value, specifying whether
    a child object should fill (scale up to) the HBox height value.


    Alignment of an HBox is controlled by the **alignment** attribute (property or
    variable), which defaults to the **TOP_LEFT** constant from the Pos class (**Pos.TOP_LEFT**).
    If an HBox is sized above its specified width, the child objects use their preferred
    width values, and the extra space goes unused. It is important to note that the
    HBox layout engine will lay out the managed child elements, regardless of their
    **visibility** attribute (property or variable) setting.


    Now that I have discussed the JavaFX geometry and layout classes, which you will
    be using to create the UI (a bank of Button objects) design, let’s take a look
    at the digital image–related classes, from the javafx.scene.image package, which
    will allow you to implement the digital image–compositing pipeline that you will
    put in place behind these four JavaFX Button UI control element objects held inside
    an HBox UI layout container object.


    The JavaFX Image Class: Referencing Digital Images in a Design


    The **Image** class is a **public** class that directly extends the java.lang.Object
    masterclass, meaning that the Image class was also coded from scratch to provide
    image loading (referencing) and scaling (resizing). You can lock the aspect ratio
    for scaling and specify the scaling algorithm (quality) as well. All URLs that
    are supported by the java.net.URL class are supported. This means that you can
    load images from the Internet ([www.servername.com/image.png](http://www.servername.com/image.png));
    from the OS (file:image.png); or from the JAR file, using a forward slash (/image.png).


    The Java class hierarchy for the Image class starts with the **java.lang.Object**
    master class and uses this class to create the **javafx.scene.image.Image** class.
    As [Figure 6-4](#9781484204160_Ch06.xhtml#Fig4) shows (l. 9), Image is contained
    in the JavaFX image package, just like the ImageView class, and uses the following
    class hierarchy structure:


    ```

    java.lang.Object

      > javafx.scene.image.Image

    ```


    The Image class supplies six different (overloaded) **Image()** constructor methods.
    These take anything from a simple URL to a set of parameter values specifying
    the **URL**, **width**, **height**, **aspectRatioLock**, **smoothing**, and **preload**
    options. These should be specified in that order within the constructor method,
    as you will soon see, when you write an Image() constructor using the most complicated
    of all the constructor methods, which has the following format:


    ```

    Image(String url, double requestedWidth, double requestedHeight, boolean preserveRatio,
    boolean smooth, boolean backgroundLoading)

    ```


    The simple constructor for an Image object specifies only the URL and uses the
    following format:


    ```

    Image(String url)

    ```


    If you want to load an image and also have the constructor method scale the image
    to a different width and height (usually, this is smaller, to save memory), while
    locking (preserving) the aspect ratio, using the highest-quality resampling (smooth-pixel
    scaling), that Image object constructor uses the following format:


    ```

    Image(String url, double scaleWidth, double scaleHeight, boolean preserveAspect,
    boolean smooth)

    ```


    If you want to load an image in the background (**asynchronously**), using its
    “native,” or physical, resolution and native aspect ratio, the Image() constructor
    uses the following format:


    ```

    Image(String url, boolean backgroundLoading)

    ```


    Two Image() constructor methods also use the java.io.InputStream class, which
    furnishes a real-time stream (like streaming video or audio, only customized for
    a Java application) of input data to the Image() constructor method. These two
    Image object constructor formats take the following formats (simple and complex):


    ```

    Image(InputStream is) // This is the simple format. The complex format would thus
    be as follows:


    Image(InputStream is, double newWidth, double newHeight, boolean preserveAspect,
    boolean smooth)

    ```'
  trans: '

    JavaFX HBox 类：在设计中运用布局容器


    由于 Button 对象不易定位，我将把四个 Button 对象放入 **javafx.scene.layout** 包中的一个名为 **HBox** 的**布局容器**中，**HBox**
    代表**水平盒子**。这个**公共**类将元素排列成一行，并且因为你希望按钮在启动画面底部对齐，所以你将使用 Parent 节点来容纳四个 Button 控制节点，这些节点将成为此
    HBox **分支**节点的子节点（**叶**节点）。这将创建一组 UI 按钮，它们可以作为启动画面设计的一个整体单元进行定位（移动）。


    **HBox** 类是一个**公共**类，它直接继承自 javafx.layout.Pane 超类，而 Pane 又继承自 javafx.layout.Region
    超类。javafx.layout.Region 超类继承自 javafx.scene.parent 超类，后者又继承自 javafx.scene.Node
    超类，而 Node 超类则继承自 java.lang.Object 主类。如图 6-4（第 11 行）所示，HBox 与 StackPane 类一样，都包含在
    javafx.scene.layout 包中，并使用以下类层次结构：


    ```

    java.lang.Object

      > javafx.scene.Node

        > javafx.scene.Parent

          > javafx.scene.layout.Region

            > javafx.scene.layout.Pane

              > javafx.scene.layout.HBox

    ```


    如果 HBox 指定了**边框**或**内边距**值，则 HBox 布局容器中的内容将遵循该边框或内边距规范。内边距值使用 Insets 类指定，你将在此精细调整的
    UI 控件组应用中使用它。


    你将使用 HBox 类（对象）以及 Pos 类常量和 Insets 类（对象）来将 UI Button 对象组合在一起，然后微调它们作为 Button 控件组的位置。因此，此
    HBox 布局容器将成为 Button UI 控件（或叶节点）的 Parent 节点（或分支节点）。


    可以将 HBox 对象视为一种将子对象**水平**排列成一行的方法。这些子对象可以是你的图像资源（使用基本的 HBox 构造函数，间距为零），也可以是 UI
    控件（例如按钮），它们彼此相邻排列但保持间距，使用其中一个重载构造函数。创建 HBox 对象最简单的构造函数将使用以下**空**构造函数方法调用格式：


    ```

    HBox()

    ```


    你将用于创建 HBox 对象的那个重载构造函数将使用一个间距值，在 HBox 内部的子 Button 对象之间留出一些空间，其构造函数方法调用格式如下：


    ```

    HBox(double spacing)

    ```


    还有另外两种重载的构造函数方法调用格式。这些格式允许你在构造函数方法调用本身中指定子 Node 对象（在本例中为 Button 对象），如下所示：


    ```

    HBox(double spacing, Nodes... children)  - 或者，在 Node 对象之间使用零间距值：


    HBox(Nodes... children)

    ```


    你将在代码中使用“长格式”和 **.getChildren().addAll()** 方法链，但你也可以使用以下构造函数声明 HBox 及其 Button
    Node 对象：


    ```

    HBox buttonContainer = new HBox(12, gameButton, helpButton, scoreButton, legalButton);

    ```


    如果子对象被设置为可调整大小，HBox 布局容器将根据不同的屏幕尺寸、宽高比和物理分辨率来控制子元素的尺寸调整。如果 HBox 区域能够容纳子对象的首选宽度，它们将被设置为该值。此外，**fillHeight**
    属性（布尔变量）默认设置为 **true**，指定子对象是否应填充（按比例放大至）HBox 的高度值。


    HBox 的对齐方式由 **alignment** 属性（属性或变量）控制，其默认值为 Pos 类中的 **TOP_LEFT** 常量（**Pos.TOP_LEFT**）。如果
    HBox 的尺寸超过其指定宽度，子对象将使用其首选宽度值，多余的空间将闲置不用。需要注意的是，HBox 布局引擎将布局受管理的子元素，无论其 **visibility**
    属性（属性或变量）设置如何。


    现在我已经讨论了你将用于创建 UI（一组 Button 对象）设计的 JavaFX 几何和布局类，让我们来看看来自 javafx.scene.image 包的与数字图像相关的类，这些类将允许你实现数字图像合成管线，你将把它放置在这四个位于
    HBox UI 布局容器对象内部的 JavaFX Button UI 控件元素对象之后。


    JavaFX Image 类：在设计中引用数字图像


    **Image** 类是一个**公共**类，它直接继承自 java.lang.Object 主类，这意味着 Image 类也是从头开始编码的，以提供图像加载（引用）和缩放（调整大小）。你可以锁定缩放时的宽高比，并指定缩放算法（质量）。java.net.URL
    类支持的所有 URL 都受支持。这意味着你可以从互联网（[www.servername.com/image.png](http://www.servername.com/image.png)）、操作系统（file:image.png）或
    JAR 文件中加载图像（使用正斜杠 /image.png）。


    Image 类的 Java 类层次结构从 **java.lang.Object** 主类开始，并使用此类创建 **javafx.scene.image.Image**
    类。如图 6-4（第 9 行）所示，Image 与 ImageView 类一样，都包含在 JavaFX 图像包中，并使用以下类层次结构：


    ```

    java.lang.Object

      > javafx.scene.image.Image

    ```


    Image 类提供了六种不同的（重载的）**Image()** 构造函数方法。这些方法接受从简单的 URL 到一组参数值的各种输入，这些参数值指定了 **URL**、**width**、**height**、**aspectRatioLock**、**smoothing**
    和 **preload** 选项。这些参数应按照该顺序在构造函数方法中指定，你很快就会看到，当你使用所有构造函数方法中最复杂的一个编写 Image() 构造函数时，其格式如下：


    ```

    Image(String url, double requestedWidth, double requestedHeight, boolean preserveRatio,
    boolean smooth, boolean backgroundLoading)

    ```


    Image 对象的简单构造函数仅指定 URL，并使用以下格式：


    ```

    Image(String url)

    ```


    如果你想加载图像，并让构造函数方法将图像缩放到不同的宽度和高度（通常是为了节省内存而缩小），同时锁定（保留）宽高比，并使用最高质量的重新采样（平滑像素缩放），则该
    Image 对象构造函数使用以下格式：


    ```

    Image(String url, double scaleWidth, double scaleHeight, boolean preserveAspect,
    boolean smooth)

    ```


    如果你想在后台（**异步**）加载图像，并使用其“原生”或物理分辨率以及原生宽高比，则 Image() 构造函数使用以下格式：


    ```

    Image(String url, boolean backgroundLoading)

    ```


    还有两个 Image() 构造函数方法使用 java.io.InputStream 类，该类向 Image() 构造函数方法提供输入数据的实时流（类似于流式传输视频或音频，但专为
    Java 应用程序定制）。这两种 Image 对象构造函数格式采用以下格式（简单和复杂）：


    ```

    Image(InputStream is) // 这是简单格式。复杂格式如下：


    Image(InputStream is, double newWidth, double newHeight, boolean preserveAspect,
    boolean smooth)

    ```

