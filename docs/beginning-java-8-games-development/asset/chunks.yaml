    Optimizing Run-Cycle Processing: Turning Off Processing for Fly and Land States


    The next thing that I want to do is also advanced conceptually, but uses far less
    code. As an optimization nut, what is concerning me is that the animator, framecounter,
    and runningspeed variables and the programming logic that uses them might be taking
    up memory when the player is using the up and down arrow keys, so I want to put
    a statement in the top of the conditional if() structure that leaves the .setScaleX()
    sprite mirroring code intact but turns off the rest of the processing logic if
    the up and down keys are being used. The Java code for excluding the run-cycle
    logic should be based on the up and down arrow key variables both showing as false,
    indicating the player is using the left or right keys **only**. This exclusion
    logic is seen in [Figure 13-12](#9781484204160_Ch13.xhtml#Fig12), and looks like
    the following Java code (shown in bold) addition:


    ```

    if(invinciBagel.isRight())  {

        spriteFrame.setScaleX(1);

        if( !animator && ( !invinciBagel.isDown() && !invinciBagel.isUp() ) ) {

            spriteFrame.setImage(imageStates.get(1));

            if(framecounter >= runningspeed) {

                animator=true;

                framecounter=0;

            } else { framecounter+=1; }

        }   else if(animator) {

            spriteFrame.setImage(imageStates.get(2));

            if(framecounter >= runningspeed) {

                animator=false;

                framecounter=0;

            } else { framecounter+=1; }

        }

    }

    ```


    ![9781484204160_Fig13-12.jpg](OEBPS/Images/9781484204160_Fig13-12.jpg)


    [Figure 13-12](#9781484204160_Ch13.xhtml#_Fig12). Add if() statement logic to
    exclude processing of nested if-else hierarchy if down or up keys being pressed


    The reason that I’m doing this is because when either the up or down key is being
    pressed, the jump (or fly) or preparing to land sprite cel image is showing. For
    this reason, optimization dictates that I need to turn off all of the “alternating
    between sprite cel 1 and sprite cel 2” processing code. I want to do this so that
    this constant processing is not going on in memory and in the thread (CPU) when
    the imageStates(1) and imageStates(2) are not even being used (displayed) inside
    of the spriteFrame ImageView “container.”


    To achieve this optimization objective, I added a new level of evaluation to the
    outside of the second nested if() loop. This is the level that contains all of
    the sprite cel changes (1 to 2 and back) using the animator, framecounter, and
    runningspeed variables and related processing. This new more complex evaluation
    statement guarantees that all of this run-cycle processing logic will not be executed
    if this the new condition is being met.


    What this new condition says specifically, is that if the animator variable is
    false **AND** the up **AND** down keys are both not being used (are false) then
    to process the rest of the logic, which switches between the two sprite image
    states (as well as waiting a certain number of pulse events before each switch).
    What this means is that if either of the up or down keys are being pressed (thus
    showing the fly or land sprite cel image state), none of the programming logic
    past that point will be processed at all, saving CPU processing cycles for the
    many other things that we are going to be adding into the game play that will
    need to use this “saved” processing overhead for other game play-related logic.


    You may be wondering why I have not added this same extended condition to the
    **else if(animator)** portion of this programming structure. The reason is that
    this portion of the loop will never be executed unless the first part, which we
    are excluding with this new statement, is processed. This is because inside of
    the first part of this loop, we set **animator=true;** and this will never happen
    (now that we have added the extended condition) if the up or down key is being
    pressed.


