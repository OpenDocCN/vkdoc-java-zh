  trans: '

    幸运的是，**javafx.scene.shape** 包中的 JavaFX **SVGPath** 类允许我们使用自定义的 SVG 路径（形状）数据来定义精灵的碰撞边界。不仅如此，这个
    SVGPath 类（对象）还非常高效，因为它没有属性，只有少数几个方法，以及一个简单的 SVGPath() 构造方法，正如你在第 8 章中已经看到的那样。这意味着使用
    SVGPath 类（对象）在**内存和处理器效率**方面相对较高。实际上，我们唯一需要用到的方法就是我们在第 8 章的 Actor 类构造方法中使用的 **.setContent()**
    方法。由于我们只在游戏启动时执行一次，SVG 路径碰撞数据将被加载到系统内存中，并用于我们的碰撞检测例程，我们将在本章后面部分实现这些例程。


    在本章中，我们将详细探讨如何定义 SVG 路径数据。这是由万维网联盟（W3C）——也就是定义 HTML5 的机构——所规定的。该规范位于他们的 w3.org
    网站上，网址是 [`www.w3.org/TR/SVG/paths.html`](http://www.w3.org/TR/SVG/paths.html)，如果你想查看更详细的内容，可以访问该链接。


    在详细了解了 SVG 或**可缩放矢量图形**（如果你想知道这个缩写代表什么的话）数据格式之后，我们将开始使用你在第 1 章中安装的流行的 **GIMP 2.8**
    数字图像编辑软件，并学习如何创建碰撞多边形。我们还将了解如何使用 **PhysEd**（PhysicsEditor）碰撞多边形生成软件。该软件来自一家名为
    **CodeAndWeb** GmbH 的公司，该公司专门制作专业且价格合理的游戏资源创建软件。


    我们将使用 GIMP 2.8 经历一个碰撞多边形矢量资源的创建和优化过程，既会采用“快速而粗糙”的工作流程（让 GIMP 100% 为你创建碰撞多边形形状），也会采用一种更“深入”的工作流程（即你使用
    GIMP 的路径工具亲手创建自己的碰撞多边形）。在学习了如何创建与 JavaFX SVGPath 类兼容的碰撞多边形之后，我们将把本章剩余的时间用于 Java
    8 游戏编程，创建碰撞检测引擎（代码），该引擎将使我们能够检测到 InvinciBagel 角色何时与游戏环境（场景和舞台对象）中的任何其他 Actor 对象发生接触。从这部分开始，本书将变得更加高级（实用）。


    SVG 数据格式：手写编码矢量形状


    在 SVG 数据字符串中，可以使用十个不同的字母与数字（二维空间中的 X,Y 数据点位置）数据配合使用。每个字母都有大写（绝对引用）和小写（相对引用）两种版本。我们将使用绝对引用，因为我们需要这些数据点与我们打算“附加”或分组这些
    SVG 路径数据字符串的精灵图像的像素位置相匹配，以提供碰撞检测数据指南。如表 16-1 所示，SVG 数据命令为你定义 Java 8 游戏开发中的自定义曲线提供了极大的灵活性。你甚至可以将所有这些可缩放矢量命令与你的
    Java 8 代码结合起来，创建前所未有的交互式矢量（数字插画）艺术作品，但由于这是一本游戏开发书籍，我们将利用这些信息来开发高度优化的**碰撞多边形**，这些多边形仅使用十几个
    X,Y 数据点（大约在 12 到 15 个之间）来定义一个相对详细的碰撞多边形，该多边形将包裹我们的精灵图像，并提供高度精确的（至少从游戏玩家的角度来看）碰撞结果。


    表 16-1. 用于创建 SVG 路径数据字符串的 SVG 数据命令（来源：万维网联盟 w3.org）


    ![Table16-1.jpg](img/Table16-1.jpg)


    了解如何使用强大的 SVG 数据“路径绘制”命令的最佳方法是直接学习创建基于 SVG 数据的碰撞多边形路径的工作流程。我们将学习如何使用 GIMP 2.8.14，采用“快速而粗糙”的方法来完成这项工作，该方法让
    GIMP 完成 100% 的路径创建工作。之后，我们将学习另一种使用 GIMP 手动完成此操作的方法。第二种方法让你拥有 100% 的路径创建控制权。在本
    SVG 主题的结尾，我还会向你展示如何使用另一个专门的碰撞和物理开发工具，名为 **PhysEd**，它来自一家位于德国乌尔姆的创新游戏开发软件工具公司，名为
    **CodeAndWeb GmbH**。


    创建和优化碰撞数据：使用 GIMP


    幸运的是，流行的开源数字图像编辑软件包 GIMP（当前版本为 2.8.14）具有足够的路径功能，并且能够将其导出为 SVG 数据集，从而使该软件能够作为一个功能齐全的碰撞多边形创建工具来使用。GIMP
    软件通过**路径工具**（显示为带有贝塞尔手柄的曲线数据点旁边的老式**钢笔尖**形状）来支持路径，你可以在图 16-1（工具箱图标第二行左起第二个图标）中看到它。GIMP
    支持路径的原因在于，虽然它通常不是一个**矢量**（基于路径的）软件包，而是一个**光栅**（基于像素的）软件包，但创建路径并将其“转换”为**选区**的能力对于数字图像合成工匠来说非常有用。实际上，我们将利用
    GIMP 的相反能力：即将通过算法创建的选区集合转换为路径数据，这将构成我们全自动、“快速而粗糙”的 SVG 路径数据创建过程的基础。我们将首先探讨这一点，因为它快速、简单且有效（但“数据量较大”）。让我们开始吧：启动
    GIMP，使用**文件 ![image](img/arrow.jpg) 打开**流程，打开项目 **/src** 文件夹中的 **sprite1.png**
    PNG32 数字图像资源。如图 16-1 所示，我已将图像放大。这使我能够看到我们即将使用 GIMP **工具箱**创建的碰撞数据路径（最初，这将是一个**选区**）。


    ![9781484204160_Fig16-01.jpg](img/9781484204160_Fig16-01.jpg)


    图 16-1. 启动 GIMP，使用文件 ![image](img/arrow.jpg) 打开来打开 sprite1.png 文件


    点击 GIMP 的**模糊选择工具**（图标看起来像烟花棒或魔术棒），该工具在图 16-2 中显示为已选中状态（凹陷进去，不是悲伤的意思）。点击图像中显示**棋盘格图案**的任何区域，该图案在任何数字成像软件包以及许多其他类型的软件（例如，CodeAndWeb
    GmbH 的游戏资源创建软件包）中始终表示**透明度**。如图 16-2 所示，你会看到图像透明区域周围出现一个动画的、“爬动的蚂蚁”轮廓线，因为透明区域刚刚被模糊选择工具算法选中，该算法会选择**连续颜色值**的区域。


    ![9781484204160_Fig16-02.jpg](img/9781484204160_Fig16-02.jpg)


    图 16-2. 使用模糊选择工具点击透明区域以选择 Actor

