    JavaFX 拥有 Prism 游戏引擎以及 3D（使用 OpenGL ES [**用于嵌入式系统的 OpenGL**]）支持，因此我将重点关注 JavaFX
    场景图和 JavaFX API。这里的假设是你希望构建尽可能先进的 Java 8 游戏，而利用现在已成为 Java 8 一部分（与 Lambda 表达式一起）的
    JavaFX 引擎将是实现这一目标的方法。开发游戏最快的方法是利用 Java 8 和 JavaFX 环境慷慨地提供给你的高级代码和编程结构，用于创建包含强大新媒体元素的尖端应用程序（在本例中为游戏）。

    '
- fmt: '# NetBeans 8.0 Is Not Bug Friendly: Squash Bugs with a Debugger


    There is an assumption across all computer programming languages that the negative
    impact to your programming project of a “bug,” or code that does not do exactly
    what you want it to, increases in magnitude the longer it remains unfixed, so
    bugs must be squashed as soon as they are “born.” NetBeans bug-finding `code analysis`
    tools, and integrated `NetBeans Debugger`, and integration with the third-party
    `FindBugs` project, which, as you now know from experience (Audacity), can be
    found on the SourceForge web site ([http://findbugs.sourceforge.net](http://findbugs.sourceforge.net))
    (if you want the stand-alone version), all supplement the real-time, “as you type”
    code-correcting and efficiency tools I discussed earlier (see the section “NetBeans
    8.0 Is Smart: Put Your Code Editing into Hyperdrive”).


    Your Java code will not be very complicated until a bit later in the book, so
    I will cover how these tools work when you need to use them, once your knowledge
    base is a bit more advanced.


    # NetBeans 8.0 Is a Speed Freak: Optimize the Code with a Profiler


    NetBeans also has something called a `Profiler`, which looks at your Java 8 code
    while it is running and then tells you how `efficiently` it uses `memory` and
    `CPU` cycles. This allows you to refine your code and make it more efficient in
    its use of key system resources, which is quite important for Java 8 game development,
    as this will affect the smoothness of game play on systems that are not as powerful
    (e.g., on single- and dual-core CPUs).


    This `Profiler` is a `dynamic` software analysis tool, as it looks at your Java
    code `while it is running`, whereas the `FindBugs` code analysis tool is a `static`
    software analysis tool, as it simply looks at your code `in the editor`, when
    it is not compiled and running in system memory. The `NetBeans Debugger` will
    allow you to `step` through your code while it is running, so that tool can be
    viewed as a `hybrid` that ranges from a static (editing) to a dynamic (executing)
    code analysis mode.


    After you create the foundation for your Java 8 (JavaFX) game engine (in the following
    sections), you will run the `Profiler` to see how it works inside NetBeans IDE
    8.0. I am going to present as many key features of NetBeans as possible up front
    so that you get comfortable with this software.


    # Creating Your Java 8 Game Project: The InvinciBagel


    Let’s get down to business and create the foundation for your game. I am going
    to demonstrate how to create an original game so that you can see the process
    involved in developing a game that does not yet exist, as opposed to most game
    programming books, which replicate games that are already on the market. I got
    permission from my client `Ira Harrison-Rubin`, cartoonist/author/humorist for
    the `BagelToons` franchise, to let readers to see the process of creating his
    `InvinciBagel` cartoon game during the course of this book.


    Click the Quick Launch icon on your taskbar (or double-click the icon on your
    desktop) to launch NetBeans 8.0, and you will see the NetBeans start-up screen,
    illustrated in [Figure 2-2](#9781484204160_Ch02.xhtml#Fig2). This screen contains
    a progress bar (in red) and will tell you what is being done to configure the
    NetBeans IDE for use. This involves loading the various components of the IDE
    into your computer system memory so that they can be used smoothly and in real
    time during development.


    ![9781484204160_Fig02-02.jpg](OEBPS/Images/9781484204160_Fig02-02.jpg)


    [Figure 2-2](#9781484204160_Ch02.xhtml#_Fig2). Launch NetBeans 8.0, using the
    Quick Launch icon


    After NetBeans IDE 8.0 has been loaded into your system memory, the NetBeans 8.0
    `start page` will be displayed on your screen, as shown in [Figure 2-3](#9781484204160_Ch02.xhtml#Fig3).
    Click the “`x`” at the right of the Start Page tab to close this page.


    ![9781484204160_Fig02-03.jpg](OEBPS/Images/9781484204160_Fig02-03.jpg)


    [Figure 2-3](#9781484204160_Ch02.xhtml#_Fig3). Close the Start Page tab, at the
    top left of the screen, by clicking the “x” at the right of the tab to reveal
    NetBeans IDE 8.0


    This will display what I term the virgin IDE, with no projects active. Enjoy this
    now, as soon you will be filling this IDE with panes for your project components
    (you can see part of this empty IDE in [Figure 2-4](#9781484204160_Ch02.xhtml#Fig4),
    which contains menus and shortcut icons and not much else).


    ![9781484204160_Fig02-04.jpg](OEBPS/Images/9781484204160_Fig02-04.jpg)


    [Figure 2-4](#9781484204160_Ch02.xhtml#_Fig4). Showing virgin NetBeans 8.0 IDE
    (left) and a JavaFX New Project dialog (right)


    In case you are wondering, the start page displays every time you start the NetBeans
    IDE, and if you wanted to open the Start Page tab later on, perhaps to explore
    the Media Library section (demos) and tutorials, you can! To open the start page
    at any time, you use the NetBeans IDE 8.0 `Help` menu and the `Start Page` submenu.
    For future reference, I usually notate a menu sequence like this: `Help` ![image](OEBPS/Images/arrow.jpg)
    `Start Menu`.


    The first thing that you will want to do in NetBeans IDE 8.0 is create a new `InvinciBagel
    game project`! To accomplish this, you will use the NetBeans 8.0 `New Project`
    series of dialogs. This is one of those helpful Java programming features that
    I mentioned earlier (see the section “NetBeans IDE 8.0 Is Smart: Put Your Editing
    into Hyperdrive”) that creates a bootstrap project with the correct JavaFX libraries,
    `.main()` and `.start()` methods, and import statements (for more details, see
    [Chapter 3](#9781484204160_Ch03.xhtml)).


    Click the `File` menu, at the top-left corner of the DE, as displayed in [Figure
    2-4](#9781484204160_Ch02.xhtml#Fig4) (left), and then select `New Project` (the
    first menu item). Note that to the right of this selection, there is a keyboard
    shortcut given (`Ctrl+Shift+N`), in case you want to memorize it.


    If you want to use this keyboard short-cut to bring up the New Project series
    of dialogs, hold down the `CTRL` and `Shift` keys on your keyboard (both at the
    same time), and while they are depressed (held down), press the `N` key. This
    will do the same thing as using the `File` ![image](OEBPS/Images/arrow.jpg) `New
    Project` menu sequence.


    The first in the series is the `Choose Project` dialog, shown in [Figure 2-4](#9781484204160_Ch02.xhtml#Fig4)
    (right). Because you are going to use the powerful JavaFX new media engine in
    your game, select `JavaFX` from the list of programming language categories in
    the `Categories` pane, and because a game is a type of application, select `JavaFX
    Application` from the `Projects` pane.


    Remember that Oracle made JavaFX a part of Java 7 and Java 8, so a JavaFX game
    is also a Java game, whereas before Java 7 (in Java 6), JavaFX was its own separate
    programming language! The JavaFX engine had to be recoded as a Java (7 and 8)
    API (set of libraries) for it to become a seamless part of the Java programming
    language. The JavaFX API replaces AWT (Abstract Windowing Toolkit) and Swing,
    and although these older UI design libraries can still be used in Java projects,
    they are normally used only by legacy (older) Java code so that those projects
    can compile and run in Java 7 and 8. You will be compiling and running the new
    project you are creating here a bit later in this chapter.


    Note that there is a `Description` pane below the other panes that will tell you
    what your selections will give you. In this case, that would be `a new Java application
    with enabled JavaFX features`; here, “enabled” indicates that the JavaFX API libraries
    will be included (and started) in the Java application project’s class and methods,
    as you will soon see in the code (for further information on what the code means,
    see [Chapter 3](#9781484204160_Ch03.xhtml)).'
