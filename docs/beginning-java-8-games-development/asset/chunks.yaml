    `.update()` 方法应包含对其他方法的调用，这些方法逻辑地组织我们在每一帧需要完成的任务，例如确定按键按下（或未按下）、移动 InvinciBagel
    角色、检查他是否移出屏幕（设置边界），以及最终控制他的视觉状态、检测碰撞和应用物理效果。我想做的第一件事是将精灵的移动“提取”到一个 `.moveInvinciBagel()`
    方法中，该方法将通过 **`moveInvinciBagel(iX, iY);`** 方法调用来执行任何需要实现的平移变换。这意味着我们需要创建 **`private
    void moveInvinciBagel(double x, double y){...}`** 方法结构，并将 `.setTranslate()` 方法调用放入其中，然后在
    `.update()` 方法中用 `.moveInvinciBagel()` 方法调用替换它们。对 Bagel.java 类进行这些更改的基本 Java 代码如图
    12-13 所示，代码如下：


    ```

    @Override

    public void update() {

        if(invinciBagel.isRight()) { iX += vX }

        if(invinciBagel.isLeft())  { iX -= vX }

        if(invinciBagel.isDown())  { iY += vY }

        if(invinciBagel.isUp())    { iY -= vY }

        moveInvinciBagel(iX, iY);

    }

    private void moveInvinciBagel(double x, double y) {

        spriteFrame.setTranslateX(x);

        spriteFrame.setTranslateY(y);

    }

    ```


    ![9781484204160_Fig12-13.jpg](img/9781484204160_Fig12-13.jpg)


    图 12-13. 为 `.setTranslate()` 方法调用创建一个 `.moveInvinciBagel()` 方法，并从 `.update()`
    方法中调用它


    接下来，让我们使用 ImageView 的 `.setTranslateX()` 和 `.setTranslateY()` 方法在屏幕上移动 iBagel。


    进一步模块化 `.update()` 方法：`.setXYLocation()`


    你可能认为 KeyEvent 处理的布尔变量需要在 `.update()` 方法内部处理，但由于它们只是被求值然后递增 Bagel 对象的 `iX` 和 `iY`
    属性，这也可以放入它自己的 `.setXYLocation()` 方法中，这样我们的 `.update()` 方法内部就只剩下顶层方法调用。这将使进一步的精灵操作和游戏开发更加有条理，也有助于我们看清在
    `.update()` 循环的各个阶段执行了哪些代码。我们要做的（如图 12-14 所示）是创建一个 `.setXYLocation()` 方法，我们将在
    `.update()` 方法中首先调用它，然后将四个条件 `if()` 语句放入这个新的 **`private void setXYLocation(){...}`**
    方法结构中。Bagel.java 类 `.update()` 方法的“命令链”新三方法结构将使用以下 Java 代码：


    ```

    public void update() {

        setXYLocation();

        moveInvinciBagel(iX, iY);

    }

    private void setXYLocation() {

        if(invinciBagel.isRight()) { iX += vX }

        if(invinciBagel.isLeft())  { iX -= vX }

        if(invinciBagel.isDown())  { iY += vY }

        if(invinciBagel.isUp())    { iY -= vY }

    }

    private void moveInvinciBagel(double x, double y) {

        spriteFrame.setTranslateX(x);

        spriteFrame.setTranslateY(y);

    }

    ```


    ![9781484204160_Fig12-14.jpg](img/9781484204160_Fig12-14.jpg)


    图 12-14. 创建一个 `.setXYLocation()` 方法，在其中安装四个 `if()` 语句，并从 `.update()` 方法中调用它

