- fmt: "# 精灵动画：实现奔跑循环\n\n本章精灵动画的下一步是实际为角色制作奔跑循环动画。通常我们会使用 JavaFX 的 `KeyFrame` 和 `Timeline`\
    \ 类来实现，但这里我们只需十几行代码即可完成。由于我们已经使用了 `AnimationTimer` 类，这是最优方案，并且只需使用一个 `Boolean`\
    \ 变量即可实现。\n\n由于奔跑循环有两个帧（cel），我们可以使用这个 `Boolean` 变量并在 `true` 和 `false` 之间交替切换。如果这个\
    \ `Boolean` 变量（我们称之为 `animator`）为 `false`，则显示 `imageStates(1)` 中的帧，即开始奔跑的姿势（脚接触地面）。如果\
    \ `animator` 为 `true`，则显示 `imageStates(2)` 中的帧，即全力奔跑的姿势（双脚完全运动）。\n\n在 `Bagel.java`\
    \ 类的顶部创建 `Boolean animator` 变量。NetBeans 给出了“变量未初始化”的警告，因此我显式地将其设置为 `Boolean` 的默认值\
    \ `false`，因为我希望奔跑循环始终从脚蹬地开始。变量声明语句应如下所示，并显示在[图 13-6](#9781484204160_Ch13.xhtml#Fig6)\
    \ 的最顶部：\n\n```java\nboolean animator = false;\n```\n\n![9781484204160_Fig13-06.jpg](OEBPS/Images/9781484204160_Fig13-06.jpg)\n\
    \n[图 13-6](#9781484204160_Ch13.xhtml#_Fig6) 使用 `boolean animator` 变量嵌套 if-else\
    \ 逻辑结构，在精灵帧 1 和 2 之间交替\n\n由于我们希望奔跑循环始终从 `imageStates(1)` 脚蹬地的帧开始，我们将在“未按下箭头键”的代码语句中添加一行\
    \ `animator=false;` 代码。该语句现在将执行两个不同的操作：设置 `imageStates(0)` 等待状态的精灵 `Image` 引用；并确保\
    \ `animator` 变量初始化为 `false` 值，从而保证奔跑循环从脚着地开始，就像现实生活中的情况一样。新的“未按下箭头键”条件 `if()`\
    \ 结构的 Java 代码应如下所示：\n\n```java\nif( !invinciBagel.isRight()  &&\n    !invinciBagel.isLeft()\
    \   &&\n    !invinciBagel.isDown()   &&\n    !invinciBagel.isUp()        )  {\n\
    \    spriteFrame.setImage(imageStates.get(0));\n    animator=false;          \
    \     }\n```\n\n现在，`.isRight()` 和 `.isLeft()` 条件 `if()` 结构的 Java 代码将变得更加健壮，因为我们必须在判断右箭头键是否按下的条件语句内部**嵌套**另一个\
    \ if-else 条件语句。如果 `right` 为 `true`，它将 `ScaleX` 属性设置为 1（不镜像），然后添加一个条件 `if()` 语句，检查\
    \ `animator` `Boolean` 变量的值是否为 `false`。如果 `animator` 为 `false`，我们使用便捷的方法链获取 `imageStates(1)`，并将此\
    \ `Image` 资源设置为 `spriteFrame` `ImageView` 使用的帧。之后，我们需要将 `animator` 变量设置为 `true`\
    \ 值，以便稍后可以设置 `imageStates(2)` 的完整奔跑精灵图像。如果 `animator` 为 `true`，结构的 `else-if` 部分会确认\
    \ `animator` 为 `true`，如果是，则再次使用 `spriteFrame.setImage(imageStates.get(2));` 方法链获取\
    \ `imageStates(2)`，并将 `animator` 设置为 `false`。该语句的新代码（也显示在[图 13-6](#9781484204160_Ch13.xhtml#Fig6)\
    \ 中）应如下所示：\n\n```java\nif(invinciBagel.isRight())  {\n    spriteFrame.setScaleX(1);\n\
    \    if(!animator) {\n        spriteFrame.setImage(imageStates.get(1));\n    \
    \    animator=true;\n    }   else if(animator)   {\n        spriteFrame.setImage(imageStates.get(2));\n\
    \        animator=false;\n    }\n}\n```\n\n需要注意的是，在这种情况下，你可以移除 `else if(animator)`，直接使用不带\
    \ `if(animator)` 部分的 `else`。然而，我们将通过嵌套更多代码到 if-else-if-else 结构中，使右（和左）按键构造更加复杂，因此我打算保留这种方式，既为了可读性，也为了未来的代码开发。如[图\
    \ 13-6](#9781484204160_Ch13.xhtml#Fig6) 所示，代码没有错误。\n\n现在，你可以将完全相同的代码结构实现到你的 `.isLeft()`\
    \ 条件 `if()` 结构中。由于玩家将使用左键或右键（但不会同时使用，至少在我们开始添加那些酷炫的隐藏“彩蛋”功能之前是这样），我们可以在 `.isRight()`\
    \ 和 `.isLeft()` 条件 `if()` 构造中使用相同的 `animator` 变量，从而在此处进行一些内存使用优化。如你所见，唯一的区别是 `ScaleX`\
    \ 属性设置为镜像精灵图像（使用 `-1` 值），因此 `if(invinciBagel.isLeft())` 条件 `if()` 结构的 Java 代码应如下所示：\n\
    \n```java\nif(invinciBagel.isLeft())  {\n    spriteFrame.setScaleX(-1);\n    if(!animator)\
    \ {\n        spriteFrame.setImage(imageStates.get(1));\n        animator=true;\n\
    \    }   else if(animator)   {\n        spriteFrame.setImage(imageStates.get(2));\n\
    \        animator=false;\n    }\n}\n```\n\n如[图 13-7](#9781484204160_Ch13.xhtml#Fig7)\
    \ 所示，这段 Java 代码没有错误，你可以使用 **Run > Project** 工作流程，测试 InvinciBagel 的奔跑循环，看看你的超级英雄能跑多快（或者\
    \ JavaFX 中的脉冲引擎能有多快，使用 `AnimationTimer` 超类作为你的 `GamePlayLoop` 类）。当你测试 Java 代码时，你会看到你的超级英雄角色奔跑速度远超人类极限（也远超百吉饼的奔跑速度）；事实上，精灵动画帧交替得如此之快，以至于看起来像是一个模糊的奔跑动画！\n\
    \n![9781484204160_Fig13-07.jpg](OEBPS/Images/9781484204160_Fig13-07.jpg)\n\n[图\
    \ 13-7](#9781484204160_Ch13.xhtml#_Fig7) 在 `.isLeft()` 结构中复制嵌套的 if-else 语句，使 InvinciBagel\
    \ 角色能双向奔跑\n\n接下来我们需要添加一些 Java 代码来控制 InvinciBagel 精灵的奔跑速度。我们将使用两个 `Integer` 变量：一个用作帧计数器（framecounter），另一个用于保存奔跑速度值，稍后我们可以根据\
    \ `vX`（X 轴速度）变量更改该值，以使奔跑循环的动画速度与精灵在屏幕上移动的速度实现真实匹配。\n\n## 控制奔跑循环速度：设置动画节流程序逻辑"
  raw: 'The next step in our sprite animation for this chapter is to actually animate
    a run cycle for our character, which we would normally do with JavaFX KeyFrame
    and Timeline classes, but which we will do here in little more than a dozen lines
    of code. Since we are already using the AnimationTimer class, this is the optimal
    approach, and can be done using only a single Boolean variable. Since we have
    two cels for our run cycle, we can use this Boolean variable and alternate its
    value between true and false. If this Boolean value, which we will call **animator**,
    is false, we will show the cel in imageStates(1), which is our starting to run
    position (foot touching the ground). If animator is true, we will show the cel
    in imageStates(2), which is our full-out run position (both feet in full motion).
    Create the Boolean animator variable at the top of the Bagel.java class. NetBeans
    was giving me a “variable not initialized” warning, so I explicitly set it equal
    to the default Boolean value of **false**, as I want the run cycle to always start
    with a foot pushing off of the ground. The variable declaration statement should
    look like the following, and is shown at the very top of [Figure 13-6](#9781484204160_Ch13.xhtml#Fig6):


    ```

    boolean animator = false;

    ```


    ![9781484204160_Fig13-06.jpg](OEBPS/Images/9781484204160_Fig13-06.jpg)


    [Figure 13-6](#9781484204160_Ch13.xhtml#_Fig6). Nest an if-else logic structure
    alternating between sprite cels 1 and 2 using the boolean animator variable


    Since we want the run cycle to always start with the imageStates(1) foot pushing
    off the ground cel, we will add an **animator=false;** line of code inside of
    our “no arrow keys pressed” code statement. This statement will now do two different
    things: setting the imageStates(0) waiting sprite Image reference; and making
    sure that the animator variable is initialized to a false value, which ensures
    the run cycle starts with a foot on the ground, just like it would in real life.
    The new Java code for the “no arrow keys pressed” conditional if() structure should
    look like the following:


    ```

    if( !invinciBagel.isRight()  &&

        !invinciBagel.isLeft()  &&

        !invinciBagel.isDown()  &&

        !invinciBagel.isUp()       )  {

        spriteFrame.setImage(imageStates.get(0));

        animator=false;               }

    ```


    The Java code for the **.isRight()** and **.isLeft()** conditional if() structures
    is going to become significantly more robust now, as we will have to **nest**
    another if-else conditional statement inside of the one that determines if the
    right arrow key is pressed. If right is true, it will set the ScaleX property
    to 1 (not mirrored), and then adds a conditional if() statement that looks to
    see if the value of the **animator** Boolean variable is **false**. If animator
    is false we use the handy method chain to get imageStates(1), and set this Image
    asset as the cel that the spriteFrame ImageView will use. After that, we need
    to set the animator variable to a **true** value, so that later on the imageStates(2)
    full run sprite image can be set. If animator is true, the else-if portion of
    the structure then looks to confirm animator is true, and if it is, again uses
    the **spriteFrame.setImage(imageStates.get(2));** method chain to get imageStates(2)
    and sets animator to false. The new code for the statement, which is also shown
    in [Figure 13-6](#9781484204160_Ch13.xhtml#Fig6), should look like the following:


    ```

    if(invinciBagel.isRight())  {

        spriteFrame.setScaleX(1);

        if(!animator) {

            spriteFrame.setImage(imageStates.get(1));

            animator=true;

        }   else if(animator)   {

            spriteFrame.setImage(imageStates.get(2));

            animator=false;

        }

    }

    ```


    It is important to note that you could remove the **else if(animator)** in this
    situation, and just use an **else** without the **if(animator)** part. However,
    we’re going to be making the right (and left) KeyPressed construct even more complex,
    by nesting even more code even deeper in the if-else-if-else structure, so I am
    going to leave it this way both for readability as well as for future code development
    purposes. As you can see in [Figure 13-6](#9781484204160_Ch13.xhtml#Fig6), the
    code is error-free.


    You can now implement the same exact code structure into your **.isLeft()** conditional
    if() structure. Since the player will be using either the left or the right key
    (but not both together, at least not until we start adding those cool hidden “Easter
    egg” features during later stages of the game development) we can use the same
    **animator** variable in both the .isRight() and .isLeft() conditional if() constructs,
    allowing us to do a bit of memory-use optimization here. As you can see, the only
    difference is that the ScaleX property is set to mirror the sprite image (using
    a -1 value), and the Java code for **the if(invinciBagel.isLeft())** conditional
    if() structure should therefore look like the following:


    ```

    if(invinciBagel.isLeft())  {

        spriteFrame.setScaleX(-1);

        if(!animator) {

            spriteFrame.setImage(imageStates.get(1));

            animator=true;

        }   else if(animator)   {

            spriteFrame.setImage(imageStates.get(2));

            animator=false;

        }

    }

    ```


    As you can see in [Figure 13-7](#9781484204160_Ch13.xhtml#Fig7), this Java code
    is error-free, and you are ready to use your **Run > Project** work process, and
    test the InvinciBagel run cycle so you can see just how fast your superhero can
    run (or how fast the pulse engine in JavaFX can be, using the AnimationTimer superclass
    for your GamePlayLoop class). When you test your Java code, you will see that
    your superhero character is running much faster than humanly possible (and much
    faster than a bagel can run); in fact, the sprite animation cels are alternating
    so fast, that it looks like one blurred run animation!


    ![9781484204160_Fig13-07.jpg](OEBPS/Images/9781484204160_Fig13-07.jpg)


    [Figure 13-7](#9781484204160_Ch13.xhtml#_Fig7). Duplicate the nested if-else statement
    in .isLeft() structure, so InvinciBagel character runs both directions


    The next thing that we’ll need to is to add some Java code to control the running
    speed of your InvinciBagel sprite. We will do this using two Integer variables:
    one to serve as a framecounter and the other to hold the running speed value,
    which we can change later on based on our vX (velocity along the X axis) variable
    to get a realistic match between the speed the run cycle is animating at and the
    speed the sprite is being moved across the screen.


    Controlling Run Cycle Speed: Setting Up Your Animation Throttle Program Logic'
  trans: "\n本章精灵动画的下一步是实际为角色制作奔跑循环动画，通常我们会使用 JavaFX 的 `KeyFrame` 和 `Timeline` 类来实现，但这里我们只需十几行代码即可完成。由于我们已经使用了\
    \ `AnimationTimer` 类，这是最优方案，并且仅需一个布尔变量即可实现。由于奔跑循环有两个关键帧，我们可以使用这个布尔变量在 `true` 和\
    \ `false` 之间交替取值。如果这个布尔变量（我们称之为 **animator**）为 `false`，则显示 `imageStates(1)` 中的关键帧，即起始奔跑姿势（脚触地）。如果\
    \ `animator` 为 `true`，则显示 `imageStates(2)` 中的关键帧，即全力奔跑姿势（双脚完全运动）。在 `Bagel.java`\
    \ 类的顶部创建布尔变量 `animator`。NetBeans 曾提示“变量未初始化”警告，因此我显式将其设置为布尔默认值 **false**，因为我希望奔跑循环始终以脚蹬地开始。变量声明语句应如下所示，并显示在图\
    \ 13-6 的最顶部：\n\n```\nboolean animator = false;\n```\n\n![9781484204160_Fig13-06.jpg](img/9781484204160_Fig13-06.jpg)\n\
    \n图 13-6. 使用布尔变量 `animator` 在精灵关键帧 1 和 2 之间嵌套 if-else 逻辑结构\n\n由于我们希望奔跑循环始终以 `imageStates(1)`\
    \ 脚蹬地关键帧开始，我们将在“未按下方向键”的代码语句中添加一行 **animator=false;** 代码。该语句现在将执行两项不同操作：设置 `imageStates(0)`\
    \ 等待精灵图像引用；并确保 `animator` 变量初始化为 `false` 值，从而保证奔跑循环以脚触地开始，就像现实中的奔跑一样。新的“未按下方向键”条件\
    \ `if()` 结构的 Java 代码应如下所示：\n\n```\nif( !invinciBagel.isRight()  &&\n    !invinciBagel.isLeft()\
    \  &&\n    !invinciBagel.isDown()  &&\n    !invinciBagel.isUp()       )  {\n \
    \   spriteFrame.setImage(imageStates.get(0));\n    animator=false;           \
    \    }\n```\n\n现在，**.isRight()** 和 **.isLeft()** 条件 `if()` 结构的 Java 代码将变得更加健壮，因为我们需要在判断右箭头键是否按下的结构中**嵌套**另一个\
    \ if-else 条件语句。如果 `right` 为 `true`，它将设置 `ScaleX` 属性为 1（不镜像），然后添加一个条件 `if()` 语句，检查\
    \ **animator** 布尔变量的值是否为 **false**。如果 `animator` 为 `false`，我们使用便捷的方法链获取 `imageStates(1)`，并将此图像资源设置为\
    \ `spriteFrame` 的 `ImageView` 所使用的关键帧。之后，我们需要将 `animator` 变量设置为 **true** 值，以便稍后可以设置\
    \ `imageStates(2)` 的完整奔跑精灵图像。如果 `animator` 为 `true`，结构的 `else-if` 部分会确认 `animator`\
    \ 为 `true`，如果是，则再次使用 **spriteFrame.setImage(imageStates.get(2));** 方法链获取 `imageStates(2)`，并将\
    \ `animator` 设置为 `false`。该语句的新代码（也显示在图 13-6 中）应如下所示：\n\n```\nif(invinciBagel.isRight())\
    \  {\n    spriteFrame.setScaleX(1);\n    if(!animator) {\n        spriteFrame.setImage(imageStates.get(1));\n\
    \        animator=true;\n    }   else if(animator)   {\n        spriteFrame.setImage(imageStates.get(2));\n\
    \        animator=false;\n    }\n}\n```\n\n需要注意的是，在这种情况下，你可以移除 **else if(animator)**，直接使用不带\
    \ **if(animator)** 部分的 **else**。然而，我们后续将通过嵌套更多代码到 if-else-if-else 结构中，使右（和左）按键构造变得更加复杂，因此我保留这种写法，既为了可读性，也为了未来代码开发的需要。如图\
    \ 13-6 所示，代码没有错误。\n\n现在，你可以将完全相同的代码结构实现到你的 **.isLeft()** 条件 `if()` 结构中。由于玩家只会使用左键或右键（不会同时使用，至少在我们游戏开发后期添加那些酷炫的隐藏“彩蛋”功能之前不会），我们可以在\
    \ `.isRight()` 和 `.isLeft()` 条件 `if()` 结构中使用相同的 **animator** 变量，从而在此处进行一些内存使用优化。如你所见，唯一的区别在于\
    \ `ScaleX` 属性被设置为镜像精灵图像（使用 -1 值），因此 **if(invinciBagel.isLeft())** 条件 `if()` 结构的\
    \ Java 代码应如下所示：\n\n```\nif(invinciBagel.isLeft())  {\n    spriteFrame.setScaleX(-1);\n\
    \    if(!animator) {\n        spriteFrame.setImage(imageStates.get(1));\n    \
    \    animator=true;\n    }   else if(animator)   {\n        spriteFrame.setImage(imageStates.get(2));\n\
    \        animator=false;\n    }\n}\n```\n\n如图 13-7 所示，这段 Java 代码没有错误，现在你可以使用 **运行\
    \ > 项目** 工作流程，测试 InvinciBagel 的奔跑循环，看看你的超级英雄能跑多快（或者 JavaFX 中的脉冲引擎能有多快，通过为 `GamePlayLoop`\
    \ 类使用 `AnimationTimer` 超类）。测试 Java 代码时，你会看到你的超级英雄角色奔跑速度远超人类极限（也远超百吉饼的奔跑速度）；实际上，精灵动画关键帧交替得如此之快，以至于看起来像是一个模糊的奔跑动画！\n\
    \n![9781484204160_Fig13-07.jpg](img/9781484204160_Fig13-07.jpg)\n\n图 13-7. 在 `.isLeft()`\
    \ 结构中复制嵌套的 if-else 语句，使 InvinciBagel 角色能双向奔跑\n\n接下来我们需要添加一些 Java 代码来控制 InvinciBagel\
    \ 精灵的奔跑速度。我们将使用两个整数变量：一个作为帧计数器，另一个保存奔跑速度值，之后我们可以根据 `vX`（X 轴速度）变量更改该值，以实现奔跑循环动画速度与精灵在屏幕上移动速度之间的真实匹配。\n\
    \n控制奔跑循环速度：设置动画节流程序逻辑\n"
- fmt: "# 排版后的内容\n\n为了能够“节流”我们的跑步循环精灵动画以实现不同的速度，我们需要引入一个名为`framecounter`的“计数器”变量，它会在我们将一个`false`（精灵单元1）动画值更改为`true`（精灵单元2）之前，计数到一定数量的帧。我们还将使用一个`runningspeed`变量，这样我们的动画速度就不是硬编码的，而是存在于一个我们以后可以更改的变量中。这使我们能够对跑步循环动画的速度（真实感）进行精细控制。在`Bagel.java`类的顶部声明这两个整数（`int`）变量，并将`framecounter`变量初始化为零，将`runningspeed`变量设置为值6。由于`false`（`!animator`）和`true`（`animator`）这两个二级`if()`结构都将使用这个“计数到6”的变量，我们正在做的事情的数学计算相当于6+6=12，除以60FPS脉冲定时循环，意味着我们将未节流的动画速度降低了500%（五倍，因为60/12=5）。`Bagel`类顶部的变量声明语句应如下面的Java代码所示，也显示在[图13-8](#9781484204160_Ch13.xhtml#Fig8)的中间：\n\
    \n```\nint framecounter = 0;\nint runningspeed = 6;\n```\n\n![9781484204160_Fig13-08.jpg](OEBPS/Images/9781484204160_Fig13-08.jpg)\n\
    \n[图13-8](#9781484204160_Ch13.xhtml#_Fig8). 在类顶部为`framecounter`和`runningspeed`添加`int`变量，并在无移动的`if`中设置为零\n\
    \n正如你在[图13-8](#9781484204160_Ch13.xhtml#Fig8)中看到的，我点击了`framecounter`变量，因此它被高亮显示，你可以看到它在初始化语句中的使用，我们需要将其放入“未按下箭头键”的条件`if()`结构中，就像我们对`animator`变量所做的那样。这个`if()`结构的代码显示在[图13-8](#9781484204160_Ch13.xhtml#Fig8)中，如下所示：\n\
    \n```\nif( !invinciBagel.isRight()  &&\n    !invinciBagel.isLeft()   &&\n    !invinciBagel.isDown()\
    \   &&\n    !invinciBagel.isUp()       )  {\n    spriteFrame.setImage(imageStates.get(0));\n\
    \    animator=false;\n    framecounter=0;\n}\n```\n\n就像我们希望`animator`布尔变量在任何时候所有箭头键都未被使用时重置为`false`值一样，我们也希望`framecounter`整数变量在任何时候箭头键未被使用时（即同时处于释放状态）重置为`zero`值。正如你所看到的，我们不仅在这个条件语句中设置了精灵的等待图像状态，还用它来重置其他变量。\n\
    \n现在我们准备让我们的`.isRight()`和`.isLeft()`条件`if`结构变得更加复杂，因为我们将把Java逻辑嵌套到三层条件`if`结构的深度，以便将`framecounter`和`runningspeed`整数变量整合到我们的条件`if()`结构中。这将使我们的动画代码在将`animator`的`false`值更改为`true`之前“等待”六个脉冲事件周期，然后再等待另外六个脉冲事件周期，然后将其更改回`false`。\n\
    \n这是相当复杂的Java代码，至少对于一本Java 8入门书籍来说是这样，但游戏编程本质上是一项复杂的任务，所以让我们继续学习如何为我们的跑步循环动画编写这个节流机制。\n\
    \n我想在这本书中教你一些高级主题，而这个主题（实现速度节流）是我们无法回避的，因为使用简单的布尔交替图像状态逻辑结构的跑步速度在我们的游戏中是不可行的，考虑到JavaFX脉冲事件定时引擎及其“主机游戏”60FPS帧率的惊人速度，这使得我们的`InvinciBagel`精灵跑步循环看起来不仅不真实，而且看起来痛苦！\n\
    \n也就是说，这大概是我们在本章中Java 8编码最复杂的地方了，所以请抓紧，享受这段旅程（或者更确切地说，是跑步），因为我们将在下一节中创建一个16行Java代码的嵌套条件`if()`结构。这将需要大量工作，但由此产生的跑步循环节流控制将非常值得！\n\
    \n## 编写你的跑步循环节流：三重嵌套的If-Else结构\n\n我们将对我们的布尔`animator` `if()`结构进行的修改是，在`animator=true;`语句“周围”放置一个`if(framecounter\
    \ >= runningspeed){...}`结构，这样`animator`在六个脉冲事件循环过去之前不会变为`true`。如果`framecounter`等于（或由于某种原因，大于）六，`animator`变为`true`，并且`framecounter`被重置为零，并使用`imageStates(2)`。如果`framecounter`小于六，语句的`else`部分通过`framecounter+=1;`语句将`framecounter`增加一。我们将`framecounter`代码包裹在这个结构的两个部分的`if(animator)`代码周围，如[图13-9](#9781484204160_Ch13.xhtml#Fig9)所示：\n\
    \n```\nif(invinciBagel.isRight())  {\n    spriteFrame.setScaleX(1);\n    if(!animator)\
    \ {\n        spriteFrame.setImage(imageStates.get(1));\n        if(framecounter\
    \ >= runningspeed) {\n            animator=true;\n            framecounter=0;\n\
    \        } else { framecounter+=1; }\n    }   else if(animator) {\n        spriteFrame.setImage(imageStates.get(2));\n\
    \        if(framecounter >= runningspeed) {\n            animator=false;\n   \
    \         framecounter=0;\n        } else { framecounter+=1; }\n    }\n}\n```\n\
    \n![9781484204160_Fig13-09.jpg](OEBPS/Images/9781484204160_Fig13-09.jpg)\n\n[图13-9](#9781484204160_Ch13.xhtml#_Fig9).\
    \ 添加第三层if-else嵌套，通过使用`framecounter`防止单元交替过快\n\n现在对`if(invinciBagel.isLeft())`条件`if()`结构进行相同的修改。唯一的区别是`ScaleX`属性为`-1`（镜像精灵图像），如下面[图13-10](#9781484204160_Ch13.xhtml#Fig10)中的代码所示：\n\
    \n```\nif(invinciBagel.isLeft())  {\n    spriteFrame.setScaleX(-1);\n    if(!animator)\
    \ {\n        spriteFrame.setImage(imageStates.get(1));\n        if(framecounter\
    \ >= runningspeed) {\n            animator=true;\n            framecounter=0;\n\
    \        } else { framecounter+=1; }\n    }   else if(animator) {\n        spriteFrame.setImage(imageStates.get(2));\n\
    \        if(framecounter >= runningspeed) {\n            animator=false;\n   \
    \         framecounter=0;\n        } else { framecounter+=1; }\n    }\n}\n```\n\
    \n![9781484204160_Fig13-10.jpg](OEBPS/Images/9781484204160_Fig13-10.jpg)\n\n[图13-10](#9781484204160_Ch13.xhtml#_Fig10).\
    \ 将`isRight()`结构中的if-else结构复制到使用`framecounter`的`isLeft()`结构中\n\n现在又到了使用**运行 ![image](OEBPS/Images/arrow.jpg)\
    \ 项目**工作流程并测试跑步循环代码的时候了，该代码现在呈现出流畅、均匀、逼真的跑步循环。你可以将跑步速度微调为稍慢（使用7或8的值）或稍快（使用4或5的值）。当我们为跑步添加更快的`vX`值（例如`vX\
    \ = 2`）时，我们可以将`runningspeed`设置为3或4以匹配这一点，并使游戏更加逼真。"
  raw: 'In order to be able to “throttle” our run cycle sprite animation to achieve
    different speeds, we need to introduce a “counter” variable called **framecounter**,
    which will count up to a certain number of frames before we change a false (sprite
    cel 1) animator value to true (sprite cel 2). We will also use a **runningspeed**
    variable, so that our animation speed is not hard-coded, and exists in a variable
    that we can change later on. This allows us to have fine-tuned control over the
    speed (realism) of this run-cycle animation. Declare these two Integer (int) variables
    at the top of the Bagel.java class and initialize the framecounter variable to
    zero and set the runningspeed variable to a value of 6\. Since both the false
    (!animator) and true (animator) second-level if() structures will use this “count
    up to 6” variable, the math for what we are doing would equate to 6+6=12, divided
    into the 60FPS pulse timing loop, means that we are slowing down the unthrottled
    animation by 500% (five times, because 60/12=5). The variable declaration statements
    at the top of the Bagel class should look like the following Java code, and are
    also shown in the middle of [Figure 13-8](#9781484204160_Ch13.xhtml#Fig8):


    ```

    int framecounter = 0;

    int runningspeed = 6;

    ```


    ![9781484204160_Fig13-08.jpg](OEBPS/Images/9781484204160_Fig13-08.jpg)


    [Figure 13-8](#9781484204160_Ch13.xhtml#_Fig8). Add int variables at top of the
    class for framecounter and runningspeed and set to zero in no movement if


    As you can see in [Figure 13-8](#9781484204160_Ch13.xhtml#Fig8), I’ve clicked
    on the framecounter variable, so it is highlighted, and you can see its use in
    an initialization statement that we’ll need to put into the “no arrow keys pressed”
    conditional if() structure, just as we did with the animator variable. The code
    for this if() structure is shown in [Figure 13-8](#9781484204160_Ch13.xhtml#Fig8),
    and looks like this:


    ```

    if( !invinciBagel.isRight()  &&

        !invinciBagel.isLeft()   &&

        !invinciBagel.isDown()   &&

        !invinciBagel.isUp()       )  {

        spriteFrame.setImage(imageStates.get(0));

        animator=false;

        framecounter=0;

    }

    ```


    Just like we want the **animator** Boolean variable to be reset to the **false**
    value any time that all of the arrow keys are not in use, so to do we want the
    **framecounter** integer variable to be reset to a **zero** value, any time that
    the arrow keys are not in use (that is, are in a released state all at the same
    time). As you can see, we not only are setting our sprite’s waiting image state
    in this conditional statement, we are also using it to reset our other variables
    as well.


    Now we are ready to make our .isRight() and .isLeft() conditional if structures
    even more complicated, as we will be nesting our Java logic three-nested conditional
    if structures deep, to allow us to incorporate the framecounter and runningspeed
    integer variables into our conditional if() structure. This will make our animation
    code “wait” for six pulse event cycles before it changes the animator false value
    to true, and then wait for another six pulse event cycles before changing it back
    to false.


    This is fairly complicated Java code, at least for a beginner Java 8 title, but
    game programming is inherently a complex undertaking, so let’s go ahead and learn
    how to code this throttle mechanism for our run-cycle animation.


    I want to teach you about advanced topics during this book, and this one (implementing
    a speed throttle) is one that we simply can’t avoid, as this run speed using a
    simple Boolean alternating image state logic structure is not feasible to use
    in our game, given the incredible speed of the JavaFX pulse event timing engine
    and its “console game” 60FPS frame rate, which is making our InvinciBagel sprite
    run cycle look not only unrealistic, but painful to look at!


    That said, this is about as complex as our Java 8 coding is going to get during
    this chapter, at least, so hang on tight, and enjoy the ride (or rather, the run)
    as we create a 16 lines of Java code, nested conditional if() structure, in the
    next section. It will be a lot of work, but the resulting run-cycle throttle control
    will be well worth the effort!


    Coding Your Run Cycle Throttle: Triple Nested If-Else Structures


    The modification we are going to make to our Boolean animator if() structure is
    to place an **if(framecounter >= runningspeed){...}** structure “around” the **animator=true;**
    statement, so that the animator does not become true until six pulse event loops
    have transpired. If the framecounter is equal to (or for some reason, greater
    than) six, animator becomes true, and the framecounter gets reset to zero and
    imageStates(2) is used. If framecounter is less than six, the **else** part of
    the statement increments the framecounter by one with a **framecounter+=1;** statement.
    We wrap framecounter code around both the **if(animator)** code in both parts
    of this structure, as shown in [Figure 13-9](#9781484204160_Ch13.xhtml#Fig9):


    ```

    if(invinciBagel.isRight())  {

        spriteFrame.setScaleX(1);

        if(!animator) {

            spriteFrame.setImage(imageStates.get(1));

            if(framecounter >= runningspeed) {

                animator=true;

                framecounter=0;

            } else { framecounter+=1; }

        }   else if(animator) {

            spriteFrame.setImage(imageStates.get(2));

            if(framecounter >= runningspeed) {

                animator=false;

                framecounter=0;

            } else { framecounter+=1; }

        }

    }

    ```


    ![9781484204160_Fig13-09.jpg](OEBPS/Images/9781484204160_Fig13-09.jpg)


    [Figure 13-9](#9781484204160_Ch13.xhtml#_Fig9). Add a third level of if-else nesting
    that prevents cels from alternating too quickly by using a framecounter


    Now make the same modifications to the **if(invinciBagel.isLeft())** conditional
    if() structure. The only difference will be the **ScaleX** property being **-1**
    (mirrored sprite image) as shown in the following code in [Figure 13-10](#9781484204160_Ch13.xhtml#Fig10):


    ```

    if(invinciBagel.isLeft())  {

        spriteFrame.setScaleX(-1);

        if(!animator) {

            spriteFrame.setImage(imageStates.get(1));

            if(framecounter >= runningspeed) {

                animator=true;

                framecounter=0;

            } else { framecounter+=1; }

        }   else if(animator) {

            spriteFrame.setImage(imageStates.get(2));

            if(framecounter >= runningspeed) {

                animator=false;

                framecounter=0;

            } else { framecounter+=1; }

        }

    }

    ```


    ![9781484204160_Fig13-10.jpg](OEBPS/Images/9781484204160_Fig13-10.jpg)


    [Figure 13-10](#9781484204160_Ch13.xhtml#_Fig10). Duplicate the if-else structure
    from the isRight() structure into the isLeft() structure using framecounter


    Now the time has come again to use the **Run ![image](OEBPS/Images/arrow.jpg)
    Project** work process and test the run-cycle code, which now exhibits a smooth,
    even, realistic run cycle. You can fine tune the running speed to slightly slower
    with a 7 or 8 value or slightly faster with a 4 or 5 value. As we add faster vX
    values for running (say vX = 2) we can set the runningspeed to 3 or 4 to match
    this and make the game far more realistic.'
  trans: "\n为了能够“节流”我们的跑步循环精灵动画以实现不同的速度，我们需要引入一个名为 **framecounter** 的“计数器”变量。该变量会累计到一定帧数后，再将动画器（animator）的值从\
    \ false（精灵单元 1）切换为 true（精灵单元 2）。我们还将使用一个 **runningspeed** 变量，这样动画速度就不会被硬编码，而是存储在一个我们后续可以修改的变量中。这使我们能够对这个跑步循环动画的速度（真实感）进行精细控制。在\
    \ `Bagel.java` 类的顶部声明这两个整数（int）变量，并将 `framecounter` 变量初始化为零，将 `runningspeed` 变量设置为\
    \ 6。由于 false（!animator）和 true（animator）这两个二级 if() 结构都会使用这个“计数到 6”的变量，因此我们计算的结果相当于\
    \ 6+6=12，再除以 60FPS 的脉冲定时循环，意味着我们将未节流的动画速度降低了 500%（五倍，因为 60/12=5）。`Bagel` 类顶部的变量声明语句应类似于以下\
    \ Java 代码，如图 13-8 中间部分所示：\n\n```\nint framecounter = 0;\nint runningspeed = 6;\n\
    ```\n\n![9781484204160_Fig13-08.jpg](img/9781484204160_Fig13-08.jpg)\n\n图 13-8.\
    \ 在类顶部为 framecounter 和 runningspeed 添加 int 变量，并在无移动的 if 语句中将其设置为零\n\n如图 13-8 所示，我点击了\
    \ `framecounter` 变量，因此它被高亮显示，你可以看到它在初始化语句中的使用方式。我们需要将这个初始化语句放入“未按下方向键”的条件 if()\
    \ 结构中，就像我们对 `animator` 变量所做的那样。该 if() 结构的代码如图 13-8 所示，内容如下：\n\n```\nif( !invinciBagel.isRight()\
    \  &&\n    !invinciBagel.isLeft()   &&\n    !invinciBagel.isDown()   &&\n    !invinciBagel.isUp()\
    \       )  {\n    spriteFrame.setImage(imageStates.get(0));\n    animator=false;\n\
    \    framecounter=0;\n}\n```\n\n正如我们希望 **animator** 布尔变量在所有方向键都未被使用时重置为 **false**\
    \ 值一样，我们也希望 **framecounter** 整数变量在所有方向键都未被使用时（即同时处于释放状态）重置为 **zero** 值。如你所见，我们不仅在这个条件语句中设置了精灵的待机图像状态，还用它来重置其他变量。\n\
    \n现在，我们准备让 `.isRight()` 和 `.isLeft()` 的条件 if 结构变得更加复杂，因为我们将把 Java 逻辑嵌套到三层条件 if\
    \ 结构中，以便将 `framecounter` 和 `runningspeed` 整数变量整合到我们的条件 if() 结构中。这将使我们的动画代码在将动画器的\
    \ false 值更改为 true 之前“等待”六个脉冲事件周期，然后再等待另外六个脉冲事件周期，才将其更改回 false。\n\n这是相当复杂的 Java\
    \ 代码，至少对于一本 Java 8 入门书籍来说是这样，但游戏编程本质上是一项复杂的任务，所以让我们继续学习如何为我们的跑步循环动画编写这个节流机制。\n\
    \n我想在这本书中向你介绍一些高级主题，而这个主题（实现速度节流）是我们无法回避的。因为使用简单的布尔交替图像状态逻辑结构来实现跑步速度，在我们的游戏中是不可行的，这要归功于\
    \ JavaFX 脉冲事件定时引擎及其“主机游戏”般的 60FPS 帧率，它让我们的 InvinciBagel 精灵跑步循环看起来不仅不真实，而且看着都难受！\n\
    \n话虽如此，这至少是本章中 Java 8 编码最复杂的部分了，所以请抓紧了，享受这段旅程（或者更确切地说，是跑步过程），因为我们将在下一节创建一个包含 16\
    \ 行 Java 代码的嵌套条件 if() 结构。这会需要大量工作，但最终实现的跑步循环节流控制将完全值得付出努力！\n\n编写跑步循环节流代码：三层嵌套\
    \ If-Else 结构\n\n我们要对布尔动画器 if() 结构进行的修改是，在 **animator=true;** 语句“周围”放置一个 **if(framecounter\
    \ >= runningspeed){...}** 结构，这样动画器只有在经过六个脉冲事件循环后才会变为 true。如果 `framecounter` 等于（或由于某种原因大于）6，则\
    \ `animator` 变为 true，`framecounter` 重置为零，并使用 `imageStates(2)`。如果 `framecounter`\
    \ 小于 6，则语句的 **else** 部分通过 **framecounter+=1;** 语句将 `framecounter` 增加 1。我们将 `framecounter`\
    \ 代码包裹在该结构的两个部分中的 **if(animator)** 代码周围，如图 13-9 所示：\n\n```\nif(invinciBagel.isRight())\
    \  {\n    spriteFrame.setScaleX(1);\n    if(!animator) {\n        spriteFrame.setImage(imageStates.get(1));\n\
    \        if(framecounter >= runningspeed) {\n            animator=true;\n    \
    \        framecounter=0;\n        } else { framecounter+=1; }\n    }   else if(animator)\
    \ {\n        spriteFrame.setImage(imageStates.get(2));\n        if(framecounter\
    \ >= runningspeed) {\n            animator=false;\n            framecounter=0;\n\
    \        } else { framecounter+=1; }\n    }\n}\n```\n\n![9781484204160_Fig13-09.jpg](img/9781484204160_Fig13-09.jpg)\n\
    \n图 13-9. 添加第三层 if-else 嵌套，通过使用 framecounter 防止精灵单元交替过快\n\n现在，对 **if(invinciBagel.isLeft())**\
    \ 条件 if() 结构进行相同的修改。唯一的区别是 **ScaleX** 属性为 **-1**（镜像精灵图像），如下面图 13-10 中的代码所示：\n\n\
    ```\nif(invinciBagel.isLeft())  {\n    spriteFrame.setScaleX(-1);\n    if(!animator)\
    \ {\n        spriteFrame.setImage(imageStates.get(1));\n        if(framecounter\
    \ >= runningspeed) {\n            animator=true;\n            framecounter=0;\n\
    \        } else { framecounter+=1; }\n    }   else if(animator) {\n        spriteFrame.setImage(imageStates.get(2));\n\
    \        if(framecounter >= runningspeed) {\n            animator=false;\n   \
    \         framecounter=0;\n        } else { framecounter+=1; }\n    }\n}\n```\n\
    \n![9781484204160_Fig13-10.jpg](img/9781484204160_Fig13-10.jpg)\n\n图 13-10. 将\
    \ isRight() 结构中的 if-else 结构复制到 isLeft() 结构中，并使用 framecounter\n\n现在，是时候再次使用 **运行\
    \ ![image](img/arrow.jpg) 项目** 工作流程并测试跑步循环代码了，该代码现在呈现出流畅、均匀、真实的跑步循环。你可以将跑步速度微调为稍慢（使用\
    \ 7 或 8 的值）或稍快（使用 4 或 5 的值）。当我们为跑步添加更快的 vX 值（例如 vX = 2）时，我们可以将 `runningspeed`\
    \ 设置为 3 或 4 以匹配此速度，从而使游戏更加真实。\n"
- fmt: "# 排版后的内容\n\nOne additional thing that I noticed as I was testing the code\
    \ during this chapter that I want to correct here is the sprite cel image for\
    \ landing. I have been using `imageStates(3)`, which is the “landed” image, which\
    \ should actually be better utilized with a collision situation. Let’s save this\
    \ sprite cel image state for use later, in the collision detection code development\
    \ phase, to signify a collision with a surface (just landed or on impact image).\
    \ The image I want to use while the down arrow key is pressed is actually `imageStates(6)`,\
    \ which is the “preparing to land” image. The revised Java code will look like\
    \ the following, and is shown highlighted in [Figure 13-11](#9781484204160_Ch13.xhtml#Fig11):\n\
    \n```\nif(invinciBagel.isDown()) {\n    spriteFrame.setImage(imageStates.get(6));\n\
    }\n```\n\n![9781484204160_Fig13-11.jpg](OEBPS/Images/9781484204160_Fig13-11.jpg)\n\
    \n[Figure 13-11](#9781484204160_Ch13.xhtml#_Fig11). Change `.isDown()` sprite\
    \ cel to `imageStates(6)` using the `imageStates.get(6)` method call to use correct\
    \ cel\n\nLet’s make sure that the professionalism of our InvinciBagel sprite animation\
    \ is improving with each section of this chapter, and use the **Run ![image](OEBPS/Images/arrow.jpg)\
    \ Project** work process and test all four arrow keys. Be sure and test the up\
    \ and down keypresses with the left and right keypresses (left-up, left-down,\
    \ right-up, and right-down) to really see what the Java code that you have put\
    \ into place so far is capable of. We have a long way to go, but very impressive\
    \ results already!\n\n## Optimizing Run-Cycle Processing: Turning Off Processing\
    \ for Fly and Land States\n\nThe next thing that I want to do is also advanced\
    \ conceptually, but uses far less code. As an optimization nut, what is concerning\
    \ me is that the `animator`, `framecounter`, and `runningspeed` variables and\
    \ the programming logic that uses them might be taking up memory when the player\
    \ is using the up and down arrow keys, so I want to put a statement in the top\
    \ of the conditional `if()` structure that leaves the `.setScaleX()` sprite mirroring\
    \ code intact but turns off the rest of the processing logic if the up and down\
    \ keys are being used. The Java code for excluding the run-cycle logic should\
    \ be based on the up and down arrow key variables both showing as false, indicating\
    \ the player is using the left or right keys **only**. This exclusion logic is\
    \ seen in [Figure 13-12](#9781484204160_Ch13.xhtml#Fig12), and looks like the\
    \ following Java code (shown in bold) addition:\n\n```\nif(invinciBagel.isRight())\
    \  {\n    spriteFrame.setScaleX(1);\n    if( !animator && ( !invinciBagel.isDown()\
    \ && !invinciBagel.isUp() ) ) {\n        spriteFrame.setImage(imageStates.get(1));\n\
    \        if(framecounter >= runningspeed) {\n            animator=true;\n    \
    \        framecounter=0;\n        } else { framecounter+=1; }\n    }   else if(animator)\
    \ {\n        spriteFrame.setImage(imageStates.get(2));\n        if(framecounter\
    \ >= runningspeed) {\n            animator=false;\n            framecounter=0;\n\
    \        } else { framecounter+=1; }\n    }\n}\n```\n\n![9781484204160_Fig13-12.jpg](OEBPS/Images/9781484204160_Fig13-12.jpg)\n\
    \n[Figure 13-12](#9781484204160_Ch13.xhtml#_Fig12). Add `if()` statement logic\
    \ to exclude processing of nested `if-else` hierarchy if down or up keys being\
    \ pressed\n\nThe reason that I’m doing this is because when either the up or down\
    \ key is being pressed, the jump (or fly) or preparing to land sprite cel image\
    \ is showing. For this reason, optimization dictates that I need to turn off all\
    \ of the “alternating between sprite cel 1 and sprite cel 2” processing code.\
    \ I want to do this so that this constant processing is not going on in memory\
    \ and in the thread (CPU) when the `imageStates(1)` and `imageStates(2)` are not\
    \ even being used (displayed) inside of the `spriteFrame` ImageView “container.”\n\
    \nTo achieve this optimization objective, I added a new level of evaluation to\
    \ the outside of the second nested `if()` loop. This is the level that contains\
    \ all of the sprite cel changes (1 to 2 and back) using the `animator`, `framecounter`,\
    \ and `runningspeed` variables and related processing. This new more complex evaluation\
    \ statement guarantees that all of this run-cycle processing logic will not be\
    \ executed if this the new condition is being met.\n\nWhat this new condition\
    \ says specifically, is that if the `animator` variable is false **AND** the up\
    \ **AND** down keys are both not being used (are false) then to process the rest\
    \ of the logic, which switches between the two sprite image states (as well as\
    \ waiting a certain number of pulse events before each switch). What this means\
    \ is that if either of the up or down keys are being pressed (thus showing the\
    \ fly or land sprite cel image state), none of the programming logic past that\
    \ point will be processed at all, saving CPU processing cycles for the many other\
    \ things that we are going to be adding into the game play that will need to use\
    \ this “saved” processing overhead for other game play-related logic.\n\nYou may\
