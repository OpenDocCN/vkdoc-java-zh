    ### 组织 `.update()` 方法：`.moveInvinciBagel()`


    由于在本书剩余部分我们将向 `Bagel` 类的 `.update()` 方法中添加越来越多的 Java 编程逻辑，我希望建立一种“方法模块化”，这与我们在[第
    11 章](#9781484204160_Ch11.xhtml)中为 `InvinciBagel` 类添加六个新逻辑方法结构时所做的非常相似。随着游戏变得越来越复杂，我们将在
    `.update()` 方法内执行许多复杂操作，因此 `.update()` 方法应包含对其他方法的调用，这些方法逻辑地组织我们每帧需要完成的任务，例如确定按键按下（或未按下）、移动
    `InvinciBagel` 角色、检查角色是否移出屏幕（设置边界），以及最终控制其视觉状态、检测碰撞和应用物理效果。我要做的第一件事是将精灵的移动“提取”到一个
    `.moveInvinciBagel()` 方法中，该方法将通过 `moveInvinciBagel(iX, iY);` 方法调用来执行任何需要实现的平移变换。这意味着我们需要创建
    `private void moveInvinciBagel(double x, double y){...}` 方法结构，并将 `.setTranslate()`
    方法调用放入其中，然后在 `.update()` 方法中用 `.moveInvinciBagel()` 方法调用替换它们。对 `Bagel.java` 类进行这些更改的基本
    Java 代码如[图 12-13](#9781484204160_Ch12.xhtml#Fig13) 所示，代码如下：


    ```

    @Override

    public void update() {

        if(invinciBagel.isRight()) { iX += vX }

        if(invinciBagel.isLeft())  { iX -= vX }

        if(invinciBagel.isDown())  { iY += vY }

        if(invinciBagel.isUp())    { iY -= vY }

        moveInvinciBagel(iX, iY);

    }

    private void moveInvinciBagel(double x, double y) {

        spriteFrame.setTranslateX(x);

        spriteFrame.setTranslateY(y);

    }

    ```


