    您可以在 JavaFX 应用程序编程逻辑中使用 `Stage` 类来创建辅助舞台。**主** `Stage` 对象始终由 JavaFX 平台通过调用 **public
    void start(Stage primaryStage)** 方法构造，正如您在 NetBeans 创建的引导 JavaFX 应用程序的第 2 章和第
    3 章中所见。


    所有 JavaFX `Stage` 对象必须使用主 JavaFX 应用程序线程（我在上一节中讨论过）进行构造和修改。由于舞台等同于其运行所在操作系统平台上的一个窗口，某些属性或特性是**只读**的，因为它们需要在操作系统级别进行控制；这些是**布尔**属性（变量）：**alwaysOnTop**、**fullScreen**、**iconified**
    和 **maximized**。


    所有 `Stage` 对象都具有 **StageStyle** 属性和 **Modality** 属性，可以使用常量进行设置。`stageStyle` 常量包括
    **StageStyle.DECORATED**、**StageStyle.UNDECORATED**、**StageStyle.TRANSPARENT**
    和 **StageStyle.UTILITY**。**Modality** 常量包括 **Modality.NONE**、**Modality.APPLICATION_MODAL**
    和 **Modality.WINDOW_MODAL**。在下一节中，我将向您展示如何使用 `StageStyle` 属性和 `TRANSPARENT` 常量做一些真正令人印象深刻的事情，这将使您的
    JavaFX 应用程序在市场上脱颖而出。


    `Popup` 类可用于从头开始创建自定义弹出通知，甚至自定义游戏组件。或者，您可以使用 `PopupControl` 类及其 **ContextMenu**
    和 **Tooltip** 子类来提供这些预定义（编码）的 JavaFX UI 控件。


    **DirectoryChooser** 和 **FileChooser** 类支持将标准操作系统文件选择和目录导航对话框传递到您的 JavaFX 应用程序中。**FileChooser.ExtensionFilter**
    嵌套类提供了一个实用程序，用于根据文件类型（文件扩展名）过滤将在 `FileChooser` 对话框中显示的文件。


    接下来，让我们将当前的 InvinciBagel `Stage` 对象提升到一个新的水平，使其成为一个**无窗口**（浮动）应用程序。这是 JavaFX 的显著特性之一，是
    Flash 或其他游戏引擎无法比拟的。


    使用 JavaFX 主 Stage 对象：创建浮动无窗口应用程序


    让我们使 InvinciBagel 应用程序的主 **Stage** 透明，以便 **Button** UI 控件直接浮动在操作系统桌面上方。这是 JavaFX
    能够做到但您并不常见的事情，它允许您创建浮动在操作系统桌面上方的 3D 应用程序（对于 3D 虚拟对象，这称为无窗口 ActiveX 控件）。


    这是通过使用 **Stage** 类中的 **StageStyle.TRANSPARENT** 常量，结合 **.initStyle()** 方法实现的。如图
    4-4 所示，我还使用了我在第 3 章中告诉您的技术（一种不遵循正确 Java 编码规范中关于声明要使用的类的导入语句的技术）。在代码的**第 35 行**，我通过在
    **primaryStage.initStyle(StageStyle style)** 方法调用中使用完全限定类名（package.subpackage.class.constant）**javafx.stage.StageStyle.TRANSPARENT**
    来引用该常量。这是通过以下 Java 代码行完成的：


    ```

    primaryStage.initStyle(javafx.stage.StageStyle.TRANSPARENT);

    ```


    ![9781484204160_Fig04-04.jpg](img/9781484204160_Fig04-04.jpg)


    图 4-4. 在 primaryStage Stage 对象上调用带有 StageStyle.TRANSPARENT 常量的 .initStyle() 方法


    如您所见，我在 NetBeans IDE 8.0 的代码编辑区域中单击了 `primaryStage` `Stage` 对象，它显示（跟踪）了该对象在代码中的**使用情况**。`Stage`
