    (not the ASDW keys), the Button control focus (the blue outline) moves as well,
    which means that we will also have to fix this in a future chapter, by having
    our `KeyEvents` “consumed.” As you can see, there is lots of really cool code
    to write and things about Java 8 and JavaFX 8.0 to learn before we’re finished!


