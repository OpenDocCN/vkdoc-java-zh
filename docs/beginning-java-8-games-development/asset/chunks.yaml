    如图 16-7 所示，有 32 组乘以 3 个数据对，接近 100 个数据点，这是需要处理的大量数据，尤其是当两个都定义了 SVGPath 碰撞检测数据的对象发生碰撞时！


    如果你观察图 16-4 中的 InvinciBagel 角色，我们实际上应该能够用 14 到 16 条完美包裹角色的线条来定义其碰撞多边形，并使用少得多（实际上，正如你将在本章下一节中看到的，少了
    16 倍）的数据，这相当于减少了 16 倍的内存和 16 倍的处理开销（效率提高 1600%），甚至更多。


    因此，我想向你展示在 GIMP 中定义你自己的**自定义**碰撞多边形 SVG 数据形状对象的更复杂工作流程，使用尽可能少的线条（数据点之间）。这本质上等同于**碰撞检测
    SVG 路径形状数据优化**，既然我已经向你展示了其他新媒体元素的数据优化工作流程，现在没有理由停止这个趋势！所以接下来，让我们在本章的下一节中详细探讨如何将碰撞检测
    SVG 路径形状数据开销减少 1600%。


