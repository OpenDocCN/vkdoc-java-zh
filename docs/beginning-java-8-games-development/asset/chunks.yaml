  trans: '

    在本章第一部分中，我们将要实施的方法调用涉及为 Scene 对象创建事件处理器，这将在我们设置好名为 scene 的 Scene 对象之后立即进行。在向游戏添加内容的过程中，接下来需要做的是加载
    Image 对象资源（数字图像引用），这正是你的 `.loadImageAssets()` 方法将要完成的工作。一旦你的 Image 对象被声明并实例化，我们就可以使用
    `.createGameActors()` 方法以及我们在自定义的 Actor 和 Hero 子类中创建的构造方法调用来创建游戏角色，例如我们在第 10 章中创建的
    `Bagel.java` 类。创建好角色后，我们可以使用 `.addGameActorNodes()` 将它们添加到场景图中，并使用 `.createCastingDirection()`
    方法将它们添加到游戏演员表中。最后，我们通过调用 `.createStartGameLoop()` 方法来创建并启动 GamePlayLoop 对象。`.createSplashScreenNodes()`
    和 `.addNodesToStackPane()` 方法放在最后，因为启动画面内容制作工作已经完成，现在不会添加它们。我们在本章中将添加的方法调用代码如下所示：


    ```

    createSceneEventHandling();

    loadImageAssets();

    createGameActors();

    addGameActorNodes();

    createCastingDirection();

    createSplashScreenNodes();

    addNodesToStackPane();

    createStartGameLoop();

    ```


    让我们开始正题，为 InvinciBagel.java 类实施这一代码重构过程。


    场景事件处理方法：`.createSceneEventHandling()`


    我们要做的第一件事是将游戏玩法的事件处理移入其自己的方法中，我们将其命名为 **`.createSceneEventHandling()`**。我之所以为
    Scene 对象事件处理的创建单独创建一个方法，是因为如果以后你想在游戏中添加其他类型的输入事件，例如鼠标事件或拖拽事件，你将有一个现成的逻辑方法来容纳这些与事件相关的
    Java 代码。


    这段新的 Java 代码，如图 11-2 所示，将涉及从你的 `.createSplashScreenNodes()` 方法中取出你在第 9 章中创建的 **`scene.setOnKeyPressed()`**
    和 **`scene.setOnKeyReleased()`** 方法处理结构，并将它们放入自己的方法结构中。稍后，我们将重新定位所有位于 `.start()`
    方法中的 ActionEvent 处理器，它们实际上应该属于 `.createSplashScreenNodes()` 方法，在那里它们将与其他启动画面对象组合在一起。这个新的事件处理代码结构应如下所示：


    ```

    private void createSceneEventHandling() {

        scene.setOnKeyPressed((KeyEvent event) -> {

            switch (event.getCode()) {

                case UP:    up     = true; break;

                case DOWN:  down   = true; break;

                case LEFT:  left   = true; break;

                case RIGHT: right  = true; break;

                case W:     up     = true; break;

                case S:     down   = true; break;

                case A:     left   = true; break;

                case D:     right  = true; break;

            }

        });

        scene.setOnKeyReleased((KeyEvent event) -> {

            switch (event.getCode()) {

                case UP:    up     = false; break;

                case DOWN:  down   = false; break;

                case LEFT:  left   = false; break;

                case RIGHT: right  = false; break;

                case W:     up     = false; break;

                case S:     down   = false; break;

                case A:     left   = false; break;

                case D:     right  = false; break;

            }

        });

    }

    ```


