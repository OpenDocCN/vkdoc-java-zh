    在你的 `start()` 方法内部创建一个方法调用，如图 15-13 所示，名为 **`loadAudioAssets()`**，并将其放置在逻辑方法顺序中
    `loadImageAssets();` 方法调用之前。为了消除波浪形的红色错误提示，在 `createSceneEventHandling()` 方法之后添加一个空的
