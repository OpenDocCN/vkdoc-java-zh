    ## About the Author


    ![9781484204160_unFM-01.jpg](OEBPS/Images/9781484204160_unFM-01.jpg)


    **Wallace Jackson** has been writing for leading multimedia publications about
    his work in new media content development since the advent of *Multimedia Producer
    Magazine* nearly two decades ago, when he wrote about advanced computer processor
    architecture for an issue centerfold (removable "mini-issue" insert) distributed
    at the SIGGRAPH trade show. Since then, Wallace has written for a number of other
    popular publications about his work in interactive 3D and new media advertising
    campaign design, including *3D Artist Magazine*, *Desktop Publishers Journal*,
    *CrossMedia Magazine*, *AVvideo/Multimedia Producer Magazine*, *Digital Signage
    Magazine* and *Kiosk Magazine*.


    Wallace Jackson has authored a half-dozen Android book titles for Apress, including
    four titles in the popular Pro Android series. This particular Java 8 programming
    title focuses on the Java and JavaFX programming languages that are used with
    Android (and all other popular platforms as well) so that developers can "code
    once, deliver everywhere."


    Wallace Jackson is currently the CEO of Mind Taffy Design, a new media content
    production and digital campaign design and development agency, located in North
    Santa Barbara County, halfway between their clientele in Silicon Valley to the
    North and in Hollywood, "The OC," and San Diego to the South.


    Mind Taffy Design has created open source technology-based (HTML5, JavaScript,
    Java 8, JavaFX 8, and Android 5) digital new media content deliverables for more
    than two decades (since 1991) for a significant number of leading branded manufacturers
    worldwide, including Sony, Tyco, Samsung, IBM, Dell, Epson, Nokia, TEAC, Sun,
    Micron, SGI and Mitsubishi.


    Wallace Jackson received his undergraduate degree in Business Economics from the
    University of California at Los Angeles (UCLA). He received his graduate degree
    in MIS Design and Implementation from University of Southern California (USC).
    Mr. Jackson also received his post-graduate degree in Marketing Strategy at USC
    and completed the USC Graduate Entrepreneurship Program. The USC degrees were
    completed while at USC’s night-time Marshall School of Business MBA Program, which
    allowed Mr. Jackson to work full-time as a programmer, while he completed his
    graduate and post-graduate business degrees.


