- fmt: '# 游戏界面与引擎架构设计


    ## 顶层UI设计


    首先要设计的是游戏用户将交互的顶层（即**最高层级**）UI。这些UI都将通过`InvinciBagel`启动（品牌）屏幕访问，该屏幕包含在主`InvinciBagel.java`类代码中。如前所述，这段Java代码将继承`javafx.application.Application`类，启动应用程序并显示其启动画面，同时提供查看说明、开始游戏、查看高分榜或查看游戏法律声明和创作者致谢（程序员、美术师、作者、作曲师、音效设计师等）的选项。图6-1展示了一个从顶层功能UI屏幕向下延伸到操作系统层级的高层示意图。


    ![9781484204160_Fig06-01.jpg](OEBPS/Images/9781484204160_Fig06-01.jpg)


    [图6-1](#9781484204160_Ch06.xhtml#_Fig1). 主要游戏功能屏幕及其通过JVM使用Java和JavaFX API的实现方式


    这需要在`StackPane`布局容器`Parent`节点中添加三个`Button`节点，以及一个用于启动画面背景图片容器的`ImageView`节点。`ImageView`节点必须首先添加到`StackPane`中，作为`StackPane`的**第一个子节点**（**z-order
    = 0**），因为这个`ImageView`承载了我所说的启动画面UI设计的**背景底板**。由于它位于背景层，该图片需要位于`Button` UI控件元素之后，这些控件的z-order值将为1到4。


    这意味着仅创建`InvinciBagel`启动画面，就需要在应用程序的场景图中使用六个`Node`对象（一个父节点和五个子节点）！说明和致谢屏幕将使用另一个`ImageView`节点，因此节点数已达六个；高分榜屏幕可能再使用两个节点（`ImageView`和`TableView`），因此在考虑添加游戏画面节点之前，场景图中用于创建游戏支持基础设施的节点可能已超过八个——而游戏画面正是您希望获得最佳性能的地方。


    仔细想想这其实并不算糟糕，因为这些屏幕都是**静态**的，无需更新，即它们包含的（UI）元素是固定的，不需要使用脉冲系统进行更新。因此，您实际上应该仍有**99%**
    的JavaFX**脉冲**引擎能力可用于处理`InvinciBagel`游戏的`GamePlayLoop`引擎。事实上，随着Java 8和JavaFX 8不断提高其平台API和类的效率，您可能还会有更多的处理能力用于游戏玩法（精灵移动、碰撞、物理、动画等），因此情况会很乐观。


    `GamePlayLoop`将使用`javafx.animation`包及其`AnimationTimer`类为您处理游戏代码。您始终需要关注要求脉冲引擎处理多少个**场景图节点**对象，因为如果这个数字过大，将开始影响游戏性能。


    ## Java类结构设计：游戏引擎支持


    接下来，让我们看看`InvinciBagel`游戏的功能结构在Java 8游戏编程代码内部（即幕后）是如何组合的——这正是本书的核心内容！前端UI屏幕的外观与底层编程逻辑之间没有直接关联，因为大部分编程代码将用于在游戏画面上创建游戏体验。游戏说明、法律声明和致谢屏幕将只是图像（`ImageView`），要么将文本嵌入图像中（从而使用更少的场景图节点），要么在`ImageView`上叠加一个透明的`TextView`。高分榜屏幕需要一些编程逻辑，这将在游戏开发接近尾声时完成，因为必须先创建并运行游戏逻辑，才能生成高分（参见[第17章](#9781484204160_Ch17.xhtml)）！


    [图6-2](#9781484204160_Ch06.xhtml#Fig2)展示了`InvinciBagel`游戏完整实现所需的主要功能区域组件。该图显示`InvinciBagel
    Application`子类位于层级顶部，创建顶层和场景，而场景图则包含在其下方（或内部）。


    ![9781484204160_Fig06-02.jpg](OEBPS/Images/9781484204160_Fig06-02.jpg)


    [图6-2](#9781484204160_Ch06.xhtml#_Fig2). 主要游戏功能类及其在场景和场景图层级下的实现方式


    在`InvinciBagel Scene`对象（实际上是在`InvinciBagel Application`子类内部创建的）之下，是您将在本书剩余部分需要编码的功能类的更广泛结构设计。图中所示的引擎（类）将创建您的游戏功能，例如**游戏引擎**（游戏循环）、**逻辑引擎**（游戏逻辑）、**精灵引擎**（角色管理）、**角色引擎**（角色属性）、**计分引擎**（游戏计分逻辑）、**动画引擎**（动画逻辑）、**碰撞检测**和**物理模拟**。您需要创建所有这些Java类函数，才能为`InvinciBagel`游戏完整实现一个全面的2D游戏引擎。


    我称之为`GamePlayLoop`类的游戏引擎是主要类，它创建`AnimationTimer`对象，该对象调用持续处理游戏循环的脉冲事件。如您所知，这个循环将调用`.handle()`方法，该方法将依次包含方法调用，最终访问您将创建的其他类，以管理角色（精灵引擎）、在屏幕上移动角色（角色引擎）、检测碰撞（碰撞引擎）、在检测到碰撞后应用游戏逻辑（逻辑引擎），以及应用物理力（如重力和加速度）为游戏提供逼真效果（物理引擎）。


    从[第7章](#9781484204160_Ch07.xhtml)开始，您将逐步构建这些不同的引擎，用于创建游戏体验。我将根据每个引擎及其功能需求来划分章节主题，以便从学习和编码的角度都保持逻辑结构。


    ## JavaFX场景图设计：最小化UI节点'
  raw: 'One of the first things you want to design is the top-level, or **highest-level**,
    UIs that your game’s users will interface with. These will all be accessed using
    the InvinciBagel splash (branding) screen, contained in the primary **InvinciBagel.java**
    class code. As discussed previously, this Java code will extend the **javafx.application.Application**
    class and will launch the application, displaying its splash screen, along with
    options to review instructions, play the game, see the high scores, or review
    the game’s legal disclaimers and game creator credits (programmer, artist, writer,
    composer, sound designer, and so on). A high-level diagram showing the game, starting
    with functional UI screens at the top and progressing down to the OS level, can
    be seen in [Figure 6-1](#9781484204160_Ch06.xhtml#Fig1).


    ![9781484204160_Fig06-01.jpg](OEBPS/Images/9781484204160_Fig06-01.jpg)


    [Figure 6-1](#9781484204160_Ch06.xhtml#_Fig1). Primary game functional screens
    and how they are implemented through Java and JavaFX API, using a JVM


    This will require adding three more **Button** nodes to your **StackPane** layout
    container **Parent** node as well as an **ImageView** node for the splash screen
    background image container. The ImageView node will have to be added to the StackPane
    first to be the **first child node** in the StackPane (**z-order = 0**), as this
    ImageView holds what I call the **background plate** for the splash screen UI
    design. Because it is in the background, the image would need to be behind the
    Button UI control elements, which will have z-order values of 1 through 4.


    This means that you will be using six Node objects (one parent node and five child
    nodes) in your application’s scene graph just to create your InvinciBagel splash
    screen! The instructions and credit screens will use another ImageView node, so
    you are up to six nodes already, and the high scores screen will likely use another
    two (ImageView and TableView) nodes, so you likely have more than eight nodes
    in the Scene Graph for creating the game support infrastructure before you have
    even considered adding the nodes for the game play screen, which is, of course,
    where you want to get the best performance possible for your game.


    This really is not so bad if you think about it, as these screens are all **static**
    and do not need to be updated, that is, the (UI) elements they contain are fixed
    and do not require updates using the pulse system, and so you should essentially
    still have **99 percent** of the power of the JavaFX **pulse** engine left over
    to process an InvinciBagel game **GamePlayLoop** engine. In fact, as Java 8 and
    JavaFX 8 continue to improve the efficiency of their platform APIs and classes,
    you may actually have even more processing power left over for game play (sprite
    movements, collisions, physics, animation, and so on) and thus will be in good
    shape.


    The GamePlayLoop will process the game code for you, using the **javafx.animation**
    package and its **AnimationTimer** class. You will always need to be cognizant
    of how many **Scene Graph Node** objects you are asking the pulse engine to process,
    because, if this number gets to be too large, it will start to affect the game’s
    performance.


    Java Class Structure Design: Game Engine Support


    Next, let’s take a look at how the functional structure of the InvinciBagel game
    will need to be put together under the hood, so to speak, within your Java 8 game
    programming code, which is what this book is all about! There is really no correlation
    between what the front-facing UI screens look like and what the underlying programming
    logic looks like, as the majority of the programming code will go toward creating
    the game play experience on the game play screen. The game instructions and legal
    and credits screens will just be images (ImageView) and will either have the text
    embedded in the image (resulting in fewer Scene Graph nodes used) or composite
    a transparent TextView on top of the ImageView. The high scores screen will take
    a little bit of programming logic, which you will do toward the end of the game
    development, as the game logic has to be created and played for high scores to
    even be generated in the first place (see [Chapter 17](#9781484204160_Ch17.xhtml))!


    [Figure 6-2](#9781484204160_Ch06.xhtml#Fig2) displays the primary functional area
    components required for the InvinciBagel game to be complete. The diagram shows
    an InvinciBagel Application subclass at the top of the hierarchy, creating the
    top level and the scene, and the Scene Graph contained below (or inside) it.


    ![9781484204160_Fig06-02.jpg](OEBPS/Images/9781484204160_Fig06-02.jpg)


    [Figure 6-2](#9781484204160_Ch06.xhtml#_Fig2). Primary game functional classes
    and how they are implemented under the Scene and Scene Graph levels


    Below the InvinciBagel Scene object, which is actually created inside this InvinciBagel
    Application subclass, is the broader structural design for functional classes
    that you will need to code over the course of the remainder of the book. The engines
    (classes) shown in the figure will create your game functions, such as **game
    engine** (gameplay loop), **logic engine** (game play logic), **sprite engine**
    (actor management), **actor engine** (actor attributes), **score engine** (game-scoring
    logic), **animation engine** (animation logic), **collision detection**, and **physics
    simulation**. You will have to create all these Java class functions to fully
    implement a comprehensive, 2D game engine for the InvinciBagel game.


    The game engine, which I call the GamePlayLoop class, is the primary class that
    creates the AnimationTimer object that invoke the pulse events that continually
    process the gameplay loop. This loop, as you know, will call the **.handle()**
    method, which will in turn contain method calls, which will ultimately access
    the other classes that you will be creating to manage actors (sprite engine);
    move them around the screen (actor engine); detect any collisions (collision engine);
    apply the game logic after collisions have been detected (logic engine); and apply
    the forces of physics to provide realistic effects, such as gravity and acceleration,
    to the game play (physics engine).


    From [Chapter 7](#9781484204160_Ch07.xhtml) on, you will be building up these
    various engines, which will be used to create the game play experience. I will
    stratify chapter topics, based on each of these engines and what they need to
    do, so that everything is structured logically from a learning as well as coding
    perspective.


    JavaFX Scene Graph Design: Minimizing UI Nodes'
  trans: '

    首先要设计的是游戏用户将交互的顶层（即**最高层级**）UI。这些界面都将通过主**InvinciBagel.java**类代码中包含的 InvinciBagel
    启动（品牌）屏幕进行访问。如前所述，这段 Java 代码将扩展**javafx.application.Application**类，启动应用程序并显示其启动画面，同时提供查看说明、开始游戏、查看高分榜或查看游戏法律声明及制作人员名单（程序员、美术师、编剧、作曲、音效设计师等）的选项。从顶层功能
    UI 屏幕向下延伸至操作系统层级的高阶示意图，请参见图 6-1。


    ![9781484204160_Fig06-01.jpg](img/9781484204160_Fig06-01.jpg)


    图 6-1. 主要游戏功能屏幕及其通过 Java 和 JavaFX API 在 JVM 上的实现方式


    这需要在**StackPane**布局容器**Parent**节点上再添加三个**Button**节点，以及一个用于启动画面背景图片容器的**ImageView**节点。ImageView
    节点必须首先添加到 StackPane 中，作为 StackPane 的**第一个子节点**（**z-order = 0**），因为这个 ImageView
    承载着我所说的启动画面 UI 设计的**背景板**。由于位于背景层，该图片需要位于 Button UI 控件元素之后，这些控件的 z-order 值将为 1
    到 4。


    这意味着，仅创建 InvinciBagel 启动画面，你的应用程序场景图中就需要使用六个 Node 对象（一个父节点和五个子节点）！说明和制作人员屏幕将使用另一个
    ImageView 节点，因此节点数已达六个；高分榜屏幕可能再使用两个节点（ImageView 和 TableView），所以在考虑添加游戏画面节点之前，场景图中用于创建游戏支持基础设施的节点很可能已超过八个——而游戏画面正是你希望为游戏获得最佳性能的地方。


    仔细想想，这其实并不算太糟糕，因为这些屏幕都是**静态**的，无需更新，也就是说，它们包含的（UI）元素是固定的，不需要通过脉冲系统进行更新。因此，你基本上仍能保留
    JavaFX**脉冲**引擎**99%** 的处理能力，用于处理 InvinciBagel 游戏的**GamePlayLoop**引擎。事实上，随着 Java
    8 和 JavaFX 8 不断提升其平台 API 和类的效率，你甚至可能拥有更多的处理能力用于游戏玩法（精灵移动、碰撞、物理、动画等），因此情况会很乐观。


    GamePlayLoop 将使用**javafx.animation**包及其**AnimationTimer**类为你处理游戏代码。你始终需要留意要求脉冲引擎处理多少个**场景图节点**对象，因为如果这个数字过大，就会开始影响游戏性能。


    Java 类结构设计：游戏引擎支持


    接下来，让我们看看 InvinciBagel 游戏的功能结构在底层（可以这么说）是如何在你的 Java 8 游戏编程代码中组合起来的——这正是本书的核心内容！前端
    UI 屏幕的外观与底层编程逻辑之间实际上没有直接关联，因为大部分编程代码将用于在游戏画面上创造游戏体验。游戏说明、法律声明和制作人员屏幕将只是图像（ImageView），要么将文本嵌入图像中（从而使用更少的场景图节点），要么在
    ImageView 上叠加一个透明的 TextView。高分榜屏幕需要少量编程逻辑，这部分将在游戏开发接近尾声时完成，因为必须先创建并运行游戏逻辑，才能生成高分（参见第
    17 章）！


    图 6-2 展示了完成 InvinciBagel 游戏所需的主要功能区域组件。该图显示，层级结构顶部是一个 InvinciBagel Application
    子类，它创建了顶层和场景，而场景图则包含在其下方（或内部）。


    ![9781484204160_Fig06-02.jpg](img/9781484204160_Fig06-02.jpg)


    图 6-2. 主要游戏功能类及其在场景和场景图层级下的实现方式


    在 InvinciBagel Scene 对象（实际上是在这个 InvinciBagel Application 子类内部创建的）之下，是你在本书剩余部分需要编码的功能类更广泛的结构设计。图中所示的引擎（类）将创建你的游戏功能，例如**游戏引擎**（游戏循环）、**逻辑引擎**（游戏逻辑）、**精灵引擎**（角色管理）、**角色引擎**（角色属性）、**计分引擎**（游戏计分逻辑）、**动画引擎**（动画逻辑）、**碰撞检测**和**物理模拟**。你需要创建所有这些
    Java 类函数，才能为 InvinciBagel 游戏完整实现一个全面的 2D 游戏引擎。


    我称之为 GamePlayLoop 类的游戏引擎，是创建 AnimationTimer 对象的主要类，该对象调用脉冲事件，持续处理游戏循环。如你所知，这个循环将调用**.handle()**方法，该方法内部将包含方法调用，最终访问你将创建的其他类，以管理角色（精灵引擎）；在屏幕上移动它们（角色引擎）；检测任何碰撞（碰撞引擎）；在检测到碰撞后应用游戏逻辑（逻辑引擎）；以及应用物理力（如重力和加速度）为游戏玩法提供逼真效果（物理引擎）。


    从第 7 章开始，你将逐步构建这些不同的引擎，用于创造游戏体验。我将根据每个引擎及其功能需求来划分章节主题，以便从学习和编码的角度都保持逻辑清晰的结构。


    JavaFX 场景图设计：最小化 UI 节点

