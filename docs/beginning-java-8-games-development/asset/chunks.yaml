    需要注意的是，游戏开发者无需理解 Quantum（线程）、Glass（窗口）或 Prism（渲染）引擎的内部工作原理，就能利用其强大功能。在本书中，你将重点关注图表的顶层（**场景图**和
    Scene Builder）以及 JavaFX 和 Java 8 **API** 层级。我还会介绍 NetBeans IDE 8.0 层级，你在第 2 章中已有所了解，但在本书后续内容中，你将对此进行更深入的探索。


    至于图表的较低层级，NetBeans 8.0 会生成一个 Java **字节码**文件，该文件由各操作系统平台的自定义 JVM 读取。图中底部所示的 JVM，可通过下载
    Java 8 **JRE** 安装到任何给定的操作系统平台上，你在第 1 章中已接触过 JRE，当时你将其作为 Java JDK 8 的一部分进行了安装。


    这个 JVM 层让你的游戏能够作为应用程序安装在所有主流操作系统平台以及嵌入式设备上，这些设备也正逐步支持 JavaFX 8。此外，你可以将 Java 8
    游戏生成为一个 Java **applet**，嵌入到网站中；甚至还有一种部署模型，可以将应用程序从网站拖拽到桌面上，作为完整的 Java 8 应用程序进行安装。


    另外，目前已有方法可以在 iOS 8、Android 4.4 和 5.0 上运行 JavaFX 8 应用程序。如果你对此感兴趣，只需在谷歌搜索“JavaFX
