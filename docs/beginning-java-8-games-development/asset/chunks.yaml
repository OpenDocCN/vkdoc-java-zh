    ## Add the Element of Surprise: Randomizing the Attack Frequency


    Now that we have made the point of entry on the screen as well as the side of
    the screen that is used for the attack to be completely random, let’s go into
    the fourth dimension (time) and make when the attack will occur also random. This
    is done by randomizing the `attackFrequency` variable, which before this we had
    set to 4.167 seconds (250/60FPS). We will set this random value in the `else`
    structure in the `.initiateAttack()` method where we set your boolean flag settings
    and call the `.load()` methods that we created to make sure the auto-attack engine
    always has Enemy and Projectile objects to work with. We will put a Java statement
    that inserts a random value into the `attackFrequency` variable at the end of
    this `else` portion of the `if(onScreen && launchIt)` conditional structure, so
    that a new random time is in place when the `.update()` method starts using this
    variable for its attack delay counter programming logic. Since the `.nextInt(int
    bounds)` method call structure gives us a random integer between zero and the
    upper bounds, in order to get a range of attack delay between one second (60)
    and nine seconds (60+480), we will need to add 60 to the value generated by the
    `randomNum.nextInt(480)` part of the statement, and then set the `attackFrequency`
    variable equal to that value. The Java code for this `attackFrequency` randomization
    statement can be seen in [Figure 17-56](#9781484204160_Ch17.xhtml#Fig56) and should
    look like the following:


    ```

    attackFrequency = 60 + randomNum.nextInt(480);

    ```


    ![9781484204160_Fig17-56.jpg](OEBPS/Images/9781484204160_Fig17-56.jpg)


    [Figure 17-56](#9781484204160_Ch17.xhtml#_Fig56). Add an `attackFrequency` statement
    incorporating a `.nextInt(bounds)` method in `if (onScreen && launchIt)`


    As you can see when you use the **Run ![image](OEBPS/Images/arrow.jpg) Project**
    work process, you no longer can calculate when any given Enemy attack will commence!
    Let’s make the auto-attack engine more intelligent, by telling it where the InvinciBagel
    character is located (Y coordinate) on the screen, so that the auto-attack engine
    can more effectively target him!


