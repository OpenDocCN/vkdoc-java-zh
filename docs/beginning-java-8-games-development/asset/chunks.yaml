    关键字实际上就代表这个引用）通过 Bagel() 构造方法传递给 Bagel 类（对象）。一旦 Bagel 类接收到了关于 InvinciBagel 类（对象）如何设置、包含什么内容以及做什么的**上下文信息**（嘿，我可不是无缘无故把这个对象引用称为“上下文”对象引用的），它就能使用
    `.isUp()` 方法来“查看”布尔变量 up 的值，而无需在任何地方使用静态声明（常量除外，那才是 import static 引用应该用的地方）。


