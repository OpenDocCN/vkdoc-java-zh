    Profiling the GamePlayLoop Object: Running NetBeans Profiler


    Let’s run NetBeans Profiler, using a **Profile ![image](OEBPS/Images/arrow.jpg)
    Project Profile** menu sequence, to determine if you can see the GamePlayLoop
    object that you have created in any of the profiling views. As [Figure 7-11](#9781484204160_Ch07.xhtml#Fig11)
    demonstrates, the GamePlayLoop **<init>** call takes less than 2 milliseconds
    to set up the GamePlayLoop object in memory for your use, using very little overhead.


    ![9781484204160_Fig07-11.jpg](OEBPS/Images/9781484204160_Fig07-11.jpg)


    [Figure 7-11](#9781484204160_Ch07.xhtml#_Fig11). Use a Profile ![image](OEBPS/Images/arrow.jpg)
    Profile Project menu sequence to start the Profiler and look at GamePlayLoop memory
    use


    Next, let’s study the threads analysis pane by scrolling down in the Profiler
    tab, shown at the top left of [Figure 7-11](#9781484204160_Ch07.xhtml#Fig11).
    Find the **Threads** iconNetBeans will ask you if you want to start the threads
    analysis tool; once you agree, it will open the Threads tab (see [Figure 7-12](#9781484204160_Ch07.xhtml#Fig12)).


    ![9781484204160_Fig07-12.jpg](OEBPS/Images/9781484204160_Fig07-12.jpg)


    [Figure 7-12](#9781484204160_Ch07.xhtml#_Fig12). Click the Threads icon, seen
    at the left of the screen, and open the Threads tab; the same eleven threads are
    running


    In case you are wondering why you are not seeing any “blips” in the Thread objects
    shown in [Figure 7-12](#9781484204160_Ch07.xhtml#Fig12), like you did when you
    clicked the Button objects in the previous chapter, you are correct in your assumption
    that you should see the JavaFX pulse engine timing events somewhere in this diagram
    Yet, all the thread bars are solid colored, so no action or pulse events are firing.
    I am going to have you use the NetBeans profiling utility as often as necessary
    to get you used to it, as many developers avoid this tool because they have not
    become comfortable with it.


    This reason you do not see any events is that simply creating the GamePlayLoop
    object is not enough for the .handle() method inside it to grab hold of pulse
    events. Because it is a Timer object of sorts (an AnimationTimer, to be exact),
    like any timer, it needs to be **started** and **stopped**. Let’s create these
    methods for the GamePlayLoop next.


    Controlling Your GamePlayLoop: .start() and .stop()


    Because the AnimationTimer superclass has the .start() and .stop() methods, which
    control when the class (object) will (using a .start() method call) and will not
    (using a .stop() method call) handle pulse events, you will simply pass these
    functions “up” to the AnimationTimer superclass, using the Java **super** keyword
    inside your method code. You will override the .start() method by using the Java
    **@Override** keyword and then pass the method call functionality up to the AnimationTimer
    superclass by using the following method programming structure:


    ```

    @Override

    public void start() {

        super.start();

    }

    ```


    The .stop() method structure will be overridden, and the method functionality,
    passed up to the superclass, in exactly the same fashion, using the following
    Java method programming structure:


    ```

    @Override

    public void stop() {

        super.stop();

    }

    ```


    As [Figure 7-13](#9781484204160_Ch07.xhtml#Fig13) reveals, the GamePlayLoop class
    code is error free, and you can now write the code in the InvinciBagel class that
    starts the GamePlayLoop AnimationTimer object so that you can see pulse objects
    when you profile the application.


    ![9781484204160_Fig07-13.jpg](OEBPS/Images/9781484204160_Fig07-13.jpg)


    [Figure 7-13](#9781484204160_Ch07.xhtml#_Fig13). Adding .start() and .stop() methods
    to the GamePlayLoop class and using the Java super keyword properly


    You will need to call this .start() method off the GamePlayLoop object named **gamePlayLoop**,
    using the new .start() method that you just created. Click the InvinciBagel.java
    tab, shown in [Figure 7-14](#9781484204160_Ch07.xhtml#Fig14), and add a line of
    code below the GamePlayLoop object instantiation, calling the .start() method
    off the GamePlayLoop object named gamePlayLoop, as follows:


    ```

    gamePlayLoop.start();

    ```


    ![9781484204160_Fig07-14.jpg](OEBPS/Images/9781484204160_Fig07-14.jpg)


    [Figure 7-14](#9781484204160_Ch07.xhtml#_Fig14). Call a .start() method off the
    gamePlayLoop object to start GamePlayLoop AnimationTimer'
