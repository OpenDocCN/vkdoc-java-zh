- fmt: '![9781484204160_Fig01-13.jpg](OEBPS/Images/9781484204160_Fig01-13.jpg)


    [Figure 1-13](#9781484204160_Ch01.xhtml#_Fig13). Select the `Check for Updates`
    check box, and click the `Install` button (left) and the `Finish` button (right).


    During the installation, you will see the `Installation` dialog, and its progress
    bar, illustrated in [Figure 1-14](#9781484204160_Ch01.xhtml#Fig14), which will
    tell you exactly what percentage of the installation has been completed as well
    as which IDE files are currently being extracted, and installed, on your workstation.


    ![9781484204160_Fig01-14.jpg](OEBPS/Images/9781484204160_Fig01-14.jpg)


    [Figure 1-14](#9781484204160_Ch01.xhtml#_Fig14). The `Installation` progress dialog,
    showing the percentage of install complete.


    When the installation process is complete, you will see the `Setup Complete` dialog,
    which is shown in [Figure 1-13](#9781484204160_Ch01.xhtml#Fig13) (right). Now,
    you are ready to develop Java 8 and JavaFX applications (games) on your workstation.


    Next, let’s download five of the most popular free open-source new media content
    development software packages so that you have all the tools that you will need
    for a Java 8 games development business!


    After that, you will take a look at some other impressive open-source software
    that I use on my workstation. That way, if you want to, you can put together the
    ultimate software development workstation before you have even finished this chapter,
    creating an incredibly valuable content production workstation for the cost of
    the hardware (and OS) alone!


    ## Installing New Media Content Production Software


    There are a number of “genres” of new media elements, or assets, as I call them,
    that are supported in JavaFX, which is the new media engine in Java 8 (and Java
    7) and thus what you will be using as the foundation for your Java 8 game development.
    The primary genres of new media, for which you will be installing the leading
    open-source software in the remainder of this chapter, include digital illustration,
    digital imaging, digital audio, digital video, and 3D.


    ### Downloading and Installing Inkscape


    Because JavaFX supports 2D, or `vector`, technology, commonly used in `digital
    illustration` software packages, such as Adobe Illustrator and FreeHand, you will
    download and install the popular open-source digital illustration software package
    known as `Inkscape`.


    Inkscape is available for the Linux, Windows, and Mac OSs, just like all the software
    packages that you are installing in this chapter, so you can use any platform
    you like to develop games!


    To find the Inkscape software package on the Internet, go to Google Search, and
    type in `Inkscape`, as shown in [Figure 1-15](#9781484204160_Ch01.xhtml#Fig15),
    at the top left. Click the `Download` link (or right-click, and open in a separate
    tab), and click the icon that represents the OS that you are using. The Penguin
    signifies Linux (far-left icon), the Window signifies Windows (center icon), and
    the stylized apple signifies Mac (far-right icon).


    ![9781484204160_Fig01-15.jpg](OEBPS/Images/9781484204160_Fig01-15.jpg)


    [Figure 1-15](#9781484204160_Ch01.xhtml#_Fig15). Google the term “InkScape,” go
    to the Inkscape Download page, and click the icon that matches your OS.


    If you want to use the 64-bit Windows version of Inkscape, scroll down, and take
    a look at the text links below these three icons to access that particular OS
    download. Once you have downloaded the software, right-click it and `Run as administrator`,
    and install the software on your workstation. If you have a previous version of
    Inkscape, the installation will upgrade it to the latest version; you do not need
    to use the `Programs and Features` utility that you used earlier in the chapter
    to uninstall your SDK and IDEs, which do not upgrade previous versions, like new
    media production software packages tend to do.


    After the software is installed, create a Quick Launch icon on your taskbar so
    that you can launch Inkscape with a single click of the mouse. Next, you will
    install a popular digital imaging software package, called `GIMP`, which will
    allow you to create “raster,” or pixel-based (bitmap), artwork for your games
    in JPEG, PNG, or GIF digital image file formats supported by JavaFX. Raster images
    are different from vector, or shape, illustrations, so you will need GIMP.


    ### Downloading and Installing GIMP


    JavaFX also supports 2D images that use `raster` image technology, which represents
    images as an array of pixels and is commonly used in digital image compositing
    software packages, such as Adobe Photoshop and Corel Painter. In this section,
    you will download and install the popular open-source digital image editing and
    compositing software package called GIMP. This software is available for the Linux,
    Windows, Solaris, FreeBSD, and Mac OSs.


    To find the GIMP software on the Internet, go to Google Search, and type in `GIMP`,
    as demonstrated in [Figure 1-16](#9781484204160_Ch01.xhtml#Fig16).


    ![9781484204160_Fig01-16.jpg](OEBPS/Images/9781484204160_Fig01-16.jpg)


    [Figure 1-16](#9781484204160_Ch01.xhtml#_Fig16). Google the term “GIMP,” go to
    the GIMP Downloads page, and click the `Download GIMP` link.


    Click the `Download` link (or right-click, and open it in a separate tab), and
    click `Download GIMP 2.8.14` (or the latest version that represents the OS that
    you are using). The `Downloads` page will automatically detect the OS that you
    are using and give you the correct OS version; in my case, it is Windows. Download
    and install the latest version of GIMP, and then create a Quick Launch icon for
    your workstation taskbar, as you did for Inkscape. Next, you will install a powerful
    digital audio editing and audio effects software package, called `Audacity`.


    ### Downloading and Installing Audacity


    JavaFX supports digital audio sequencing, which uses digital audio technology.
    Digital audio represents analog audio by taking digital audio `samples`. Digital
    audio content is commonly created using digital audio composition and sequencer
    software packages, such as Propellerhead Reason and Cakewalk Sonar. In this section,
    you will download and install the popular open source digital audio editing and
    optimization software package known as `Audacity`. Audacity is available for the
    Linux, Windows, and Mac OSs, so you can use any OS platform that you like to create
    and optimize digital audio for your Java 8– and JavaFX–based games.


    To find the Audacity software package on the Internet, use the Google search engine,
    and type in `Audacity`, as shown in [Figure 1-17](#9781484204160_Ch01.xhtml#Fig17),
    at the top left. Click the `Download` link (or right-click, and open in a separate
    tab), and click `Audacity for Windows` (or the version that represents the OS
    that you are using).


    ![9781484204160_Fig01-17.jpg](OEBPS/Images/9781484204160_Fig01-17.jpg)


    [Figure 1-17](#9781484204160_Ch01.xhtml#_Fig17). Google the term “Audacity,” go
    to the Audacity Download page, and click a link matching your OS.


    Download and install the latest version of Audacity (currently, it is 2.0.6),
    and then create a Quick Launch Icon for your workstation taskbar, as you did for
    Inkscape and GIMP. Next, you will install a powerful digital video editing and
    special effects software package, called `EditShare Lightworks`.


    ### Downloading and Installing EditShare Lightworks


    JavaFX also supports digital video, which uses `raster` pixel-based motion video
    technology. Raster represents video as a sequence of `frames`, each of which contains
    a digital image based on an array of pixels. Digital video assets are usually
    created using digital video editing and special effects software packages, such
    as Adobe After Effects and Sony Vegas. In this section, you will download and
    install open-source digital video editing software known as `Lightworks`.'
