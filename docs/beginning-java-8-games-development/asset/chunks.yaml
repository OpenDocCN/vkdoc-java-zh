    现在你已经探索了 javafx.stage 包，接下来让我们检查 javafx.geometry 包！


    JavaFX 边界与尺寸：使用 javafx.geometry 类


    尽管术语“**几何**”在技术上适用于 2D 和 3D 资产，但它们包含在我之前介绍过的 javafx.scene.shape 包中（参见“**场景子包：其他
    13 个场景包**”部分）。**javafx.geometry** 包可以被视为一个更偏向工具类的包，包含用于从头构建 2D 和 3D 结构的基础类。因此，该包提供了诸如
    **Bounds** 超类及其 **BoundingBox** 子类，以及 **Insets**、**Point2D**、**Point3D**、**Dimension2D**
    和 **Rectangle2D** 等几何内容创建工具类。


    javafx.geometry 包中的所有类，除了 BoundingBox 类，都直接继承自 java.lang.Object 主类，这意味着它们都是为提供点（也称为顶点）、矩形、尺寸、边界和内边距（内部边界）而从头开发（编码）的，用作
    JavaFX 应用开发的几何工具。


    Point2D 和 Point3D 类（最终是对象）分别保存 2D 平面上一个 2D 点的 **x, y 坐标**，或 3D 空间中一个 3D 点的 **x,
    y, z 坐标**。这些 Point 对象将用于构建由点集合组成的更复杂的 2D 或 3D 结构，例如 2D 路径或 3D 网格。Point2D 和 Point3D
    的构造方法调用没有重载，它们分别使用以下标准格式：


    ```

    Point2D(double X, doubleY)

    Point3D(double X,doubleY, double Z)

    ```


    Rectangle2D 类（对象）可用于定义一个矩形 2D 区域，通常称为平面，在图形编程中有许多用途，正如你可能想象的那样。Rectangle2D 对象在矩形的左上角有一个起点，使用
    **x** 和 **y** 坐标位置以及尺寸（宽度乘以高度）来指定。Rectangle2D 对象的构造方法具有以下标准格式，且没有重载：


    ```

    Rectangle2D(double minX, double minY, double width, double height)

    ```


    此外，Dimension2D 类（对象）仅指定宽度和高度尺寸，并不使用 **x, y** 位置将尺寸（这会使它成为一个矩形）放置在屏幕上。该类的构造方法如下：


    ```

    Dimension2D(double width, double height)

    ```


    Insets 类（对象）类似于 Dimension2D 类，因为它不提供内边距的位置值，但确实基于 **top**、**bottom**、**left**
    和 **right** 偏移距离为矩形内边距区域提供**偏移量**。Insets 方法实际上是重载的，因此你可以使用以下代码指定等距内边距或自定义内边距：


    ```

    Insets(double topRightBottomLeft)

    Insets(double top, double right, double bottom, double left)

    ```


    Bounds 类是一个 **public abstract** 类，永远不会成为对象，而是用于创建 Node 边界类（如其子类 BoundingBox）的**蓝图**。Bounds
    超类还允许**负值**，用于指示边界区域是**空的**（可以将其视为 **null** 或 **未使用**）。BoundingBox 类使用以下（重载的）构造方法来创建
    **2D**（第一个构造方法）或 **3D**（第二个构造方法）的 BoundingBox 对象：


    ```

    BoundingBox(double minX, double minY, double width, double height)

    BoundingBox(double minX, double minY, double minZ, double width, double height,
    double depth)

    ```


    接下来，让我们看看 JavaFX 中的 Event 和 ActionEvent 处理，这将为你的游戏增加交互性。


    游戏中的 JavaFX 输入控制：使用 javafx.event 类


    由于游戏本质上是交互式的，我们接下来看看 **javafx.event** 包；它为我们提供了 **Event** 超类及其 **ActionEvent**
    子类，用于处理 **ACTION** 事件，例如 UI 元素的使用和动画 KeyFrame 处理。因为你将在 JavaFX 游戏（应用）中使用 ActionEvent，我在此描述其类继承层次结构，这将同时展示
    Event 类的起源：


    ```

    Java.lang.Object

      > java.util.EventObject

        > javafx.event.Event

          > javafx.event.ActionEvent

    ```

