- fmt: '[Figure 3-2](#9781484204160_Ch03.xhtml#_Fig2). Nested Java code blocks for
    the `InvinciBagel` class, `start` method, `setOnAction` method, and `handle` method


    The Java code inside each of the red squares begins with a curly brace and ends
    with a curly brace. Now that you are familiar with the various Java 8 code commenting
    approaches, as well as how your Java 8 game programming statements need to be
    delimited, both individually and as Java code blocks, you will next study the
    various Java code structures themselves—how they are used, what they can do for
    your applications and games, and which important Java keywords are employed to
    implement them.


    ## Java APIs: Using Packages to Organize by Function


    At the highest level of a programming platform, such as Google’s 32-bit Android
    4, which uses Java SE 6; 64-bit Android 5, which uses Java SE 7; and the current
    Oracle Java SE platform, which was recently released as Java SE 8, there is a
    collection of packages that contain classes, interfaces, methods, and constants
    and that together form the API. This collection of Java code (in this case, the
    Java 8 API) can be used by application (in this case, game) developers to create
    professional-level software across many OSs, platforms, and consumer electronics
    devices, such as computers, laptops, netbooks, notebooks, tablets, iTV sets, game
    consoles, smartwatches, and smartphones.


    To install a given version of an API level, you install the SDK (Software Development
    Kit). The Java SDK has a special name, the JDK (Java Development Kit). Those of
    you who are familiar with Android (Java SE on top of Linux) OS development know
    that a different API level is released every time a few new features are added.
    This is because these new hardware features need to be supported, not because
    Google’s executives feel like releasing a new SDK every few months. Android has
    24 different API levels, whereas Java SE has only eight, and only three of Java’s
    API levels (Java 6, Java 7, Java 8) are in use currently.


    Java SE 6 is used with Eclipse ADT (Android Developer Tools) IDE to develop for
    32-bit Android (versions 1.5 through 4.5); Java SE 7 is used with IntelliJ IDEA
    to develop for 64-bit Android (version 5.0 and later); and Java 8 is used with
    the NetBeans IDE to develop for JavaFX and Java 8 across the Windows, Mac OS X,
    Linux, and Oracle Solaris OSs. I have three different workstations that are optimized
    for each of these Java API platforms and IDE software packages so that I can develop
    applications for Android 4 (Java 6), Android 5 (Java 7), and JavaFX (Java 8) at
    the same time. Fortunately, you can get a powerful Windows 8.1 hexacore or octacore
    64-bit AMD workstation on PriceWatch.com for a few hundred dollars!


    Besides API level (the SDK you installed and are using), the highest-level construct
    in the Java programming language is the package. A Java package uses the `package`
    keyword to declare the application’s package at the top of your Java code. This
    must be the first line of code declared, other than comments (see [Figure 3-1](#9781484204160_Ch03.xhtml#Fig1);
    see also [Chapter 2](#9781484204160_Ch02.xhtml)). The New Project series of dialogs
    in NetBeans that you used in [Chapter 2](#9781484204160_Ch02.xhtml) will create
    your package for you and will import other packages that you will need to use,
    based on what you want to do in your application. In this case, these are JavaFX
    packages, so you can use the JavaFX new media engine.


    As you may have ascertained from the name, a Java package collects all the Java
    programming constructs. These include classes, interfaces, and methods that relate
    to your application, so the `invinciBagel` package will contain all your code,
    as well as the code that you imported to work with your code, to create, compile,
    and run the `InvinciBagel` game.


    A Java package is useful for organizing and containing all your own application
    code, certainly, but it is even more useful for organizing and containing the
    SDK’s (API’s) Java code, which you will use, along with your own Java programming
    logic, to create your Java 8 applications. You can use any of the classes that
    are part of the API that you are targeting by using the Java `import` keyword,
    which, in conjunction with the package and class that you want to use, constitutes
    an import statement.


    The import statement begins with the `import` keyword, followed by the fully qualified
    class name, which is the package name, any subpackage name, and the class name
    as a complete naming reference path (the full proper name for the class). A semicolon
    terminates an import statement. As you have already seen in [Figure 3-1](#9781484204160_Ch03.xhtml#Fig1),
    the import statement used to import the JavaFX `EventHandler` class from the `javafx.event`
    package should look just like this:


    ```

    import javafx.event.EventHandler;

    ```


    The import statement tells the Java compiler that you will be using methods (or
    constants) from the class that is referenced, using the `import` keyword, as well
    as which package the class is stored in. If you use a class, method, or interface
    in your own Java class, such as the `InvinciBagel` class (see [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)),
    and you have not declared the class for use, using the import statement, the Java
    compiler will throw an error until you add the required import statement at the
    top of the class (after the Java package declaration statement, and before the
    Java class declaration statement).


    ![Image](OEBPS/Images/sq.jpg) **Note** It is possible to use, instead of the Java
    `import` keyword, the fully qualified class name, that is, to preface the class
    name with the package name, right inside your Java code. Convention dictates using
    the import statement; however, line 20 in [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2)
    could be written as `javafx.scene.control.Button btn = new javafx.scene.control.Button();`
    if you wanted to buck standard Java programming convention.


    ## Java Classes: Logical Java Constructs to Build On


    The next logical Java programming construct beneath the package level is the Java
    class level, as you saw in the import statement, which references both the package
    that contains the class and a class itself. Just as a package organizes all the
    related classes, so too a class organizes all its related methods, variables,
    and constants and, sometimes, other nested classes.


    Thus, the Java class is used to organize your Java code at the next logical level
    of functional organization, and so your class will contain Java code constructs
    that add functionality to your application. These may include methods, variables,
    constants, nested classes, or inner classes.


    Java classes can also be used to create Java objects. Java objects are constructed,
    using your Java class, and have the same name as the Java class and as that class’s
    constructor method.


    As you saw in [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2), you declare your class,
    using a Java `class` keyword, along with a name for your class. You can also preface
    the declaration with Java modifier keywords, which you will be studying later
    in this chapter (see the section “Java Modifier Keywords: Access Control and More”).
    Java modifier keywords are always placed before (or in front of) the Java `class`
    keyword, using the following format:


    ```

    <modifier keywords> class <your custom classname goes here>

    ```'
