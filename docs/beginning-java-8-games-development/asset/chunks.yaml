  trans: '

    接着，你深入研究了游戏设计中的一些关键 JavaFX 包和子包，例如 **Application、Scene、Shape、Effect、Layout、Control、Media、Image、Stage、Animation、Geometry、Event
    和 Concurrent**，以及它们的包类、子类，甚至在某些情况下，还包括它们的接口、嵌套类和常量。


    你甚至中途休息了一下，为你的 InvinciBagel 应用程序添加了一些代码，将其变成了一个无窗口应用程序，并学习了如何使用 Alpha 通道和十六进制
    `#00000000` 或 `Color.TRANSPARENT`、`Background.EMPTY` 以及 `SceneStyle.TRANSPARENT`
    常量，使 **stage、scene 和 stackPane** 的背景板透明。我总得想办法在这一章里加入一些关于 NetBeans IDE 8.0、Java
    8 编程语言和 JavaFX API 的内容！


    在下一章中，你将探索 **JavaFX** Scene Builder，它能够轻松构建你在本章中学到的场景图结构。你还会开始构建你的游戏启动画面，因为我知道你渴望开始搭建游戏基础设施，哪怕只是一个启动画面！


    第 5 章


    ![image](img/frontdot.jpg)


    游戏设计入门：概念、多媒体与 Scene Builder 的使用


    在本章中，你将通过学习如何在 JavaFX 中最佳地使用场景图范式，并了解 JavaFX **Scene Builder** 工具和 **FXML**，以及在某些类型的
    Java 游戏开发场景中使用或不使用它们的原因，从而巩固你对 JavaFX 多媒体引擎的知识。你还将研究基本的游戏设计优化概念、游戏类型，以及 Java 平台上可用的游戏引擎，包括物理引擎（如
    JBox2D 和 Dyn4J）和 3D 游戏引擎（如 LWJGL 和 JMonkey）。最后，你将考虑需要理解的新媒体概念，以便将数字图像、数字音频、数字视频和动画集成到你的游戏制作管线中。我们还将回顾一些你在第
    1 章中安装的免费开源多媒体制作工具，现在可以用它们来创建 Java 8 游戏。


    首先，你将重新审视**静态**（固定）与**动态**（实时）的基本概念，这在第 3 章（常量与变量）和第 4 章（脉冲）中已经涉及，并且是**游戏优化**的基本原则之一。这一点很重要，因为你希望你的游戏能在所有用于运行它的不同平台和设备上流畅运行，即使设备只使用单处理器（这在如今其实很少见，大多数设备都配备双核（双处理器）或四核（四处理器）CPU）。


    接下来，你将学习游戏设计的概念、技巧和术语，包括精灵、碰撞检测、物理模拟、背景板、动画、图层、关卡、逻辑和 AI。你还将研究可以设计的不同类型的游戏，以及它们之间的区别。


    然后，你将探索多媒体资产在当今视觉（和听觉）上令人印象深刻的游戏中所扮演的角色。你将学习**数字图像**、**数字视频**、**动画**以及**数字音频**的原理，因为在本书的后续内容中，你将使用许多这些新媒体资产类型，并且需要这些基础知识才能熟练运用它们。


    最后，你将深入分析你在第 2 章中生成的引导 JavaFX 应用程序代码，以及 Java 的 `.main()` 方法和 JavaFX 的 `.start()`
    方法如何使用 **Stage()** 构造方法创建 primaryStage Stage 对象，并在其中使用 **Scene()** 构造方法创建一个名为
    scene 的 Scene 对象。你将学习如何使用 Stage 类的方法来设置场景、为舞台添加标题、显示舞台，以及如何创建和使用 **StackPane**
    和 **Button** 类（对象），以及如何为按钮添加 **EventHandler**。


    高级概念：静态与动态


    我想从一个高级概念开始，它涉及本章将要讨论的所有内容，从你可以创建的游戏类型，到游戏优化，再到 JavaFX Scene Builder 和 JavaFX
    场景图。无论你是否意识到，你在第 3 章中已经接触过这个概念，当时我们探讨了 Java 常量（固定的或**静态**的，不会改变）与 Java 变量（**动态**的，实时变化）的概念。类似地，JavaFX
    场景图中的 UI 设计可以是静态的（固定且不可移动）或动态的（可动画、可拖动或可换肤，意味着你可以改变 UI 外观以适应个人品味）。


    这些概念在游戏设计和开发中之所以重要，是因为你设计的用于运行或渲染游戏的游戏引擎，必须不断检查其动态部分，看它们是否发生了变化并需要响应（更新分数、移动精灵位置、播放动画帧、改变游戏棋子状态、计算碰撞检测、计算物理效果等）。这种在每一帧更新（在
    JavaFX 中称为脉冲；参见第 4 章）时的检查（以及随之而来的处理），以确保所有变量、位置、状态、动画、碰撞、物理等符合你的 Java 游戏引擎逻辑，会不断累积，最终，执行所有这些工作的处理器可能会过载，从而导致速度变慢！


    这种对所有实时、逐帧检查的过载，虽然增强了游戏的动态性（玩法），但会导致游戏运行的**帧率**下降。没错，就像数字视频和动画一样，Java 8 游戏也有帧率，但
    Java 8 游戏的帧率取决于你编程逻辑的效率。游戏的帧率越低，游戏玩法就越不流畅，至少对于动态、实时的游戏（如街机游戏）是这样；游戏玩法的流畅程度，关系到客户（游戏玩家）的**用户体验**有多么无缝（令人愉悦）。


    因此，**静态与动态**的概念对于游戏玩法设计的每个方面都非常重要，并且使得某些类型的游戏比其他类型的游戏更容易实现出色的用户体验。我将在本章后面讨论不同类型的游戏（参见“游戏类型：益智游戏、棋盘游戏、街机游戏、混合游戏”一节），但正如你可能想象的那样，棋盘游戏本质上更静态，而街机游戏则更动态。话虽如此，有一些优化方法可以让游戏保持动态，即看起来发生了很多事情，而从处理的角度来看，实际发生的事情是相当可控的。这是游戏设计的众多技巧之一，归根结底，游戏设计就是关于优化。

    '
- fmt: '# Android (Java) 与 JavaFX 中的静态与动态 UI 设计


    Android（Java）编程中最显著的静态与动态设计问题之一，是使用 XML（**静态设计**）进行 UI 设计，与使用 Java（**动态设计**）进行
    UI 设计之间的选择。Android 平台允许使用 XML 而非 Java 进行 UI 设计，以便非程序员（设计师）能够为应用程序进行**前端**设计。JavaFX
    允许使用 **FXML** 实现完全相同的功能。你必须创建一个 FXML JavaFX 应用程序来实现这一点，正如你在[第 2 章](#9781484204160_Ch02.xhtml)中所见（参见[图
    2-4](#9781484204160_Ch02.xhtml#Fig4)，右侧，第三个选项，“JavaFX FXML Application”）。这样做会将
    `javafx.fxml` 包和类添加到应用程序中，让你能够使用 FXML 设计 UI，然后让你的 Java 编程逻辑“膨胀”它们，从而使设计由 JavaFX
    UI 对象组成。


    需要注意的是，使用 FXML 会在应用程序开发和编译过程中增加一个包含 FXML 标记及其翻译和处理的额外层。我将在本章后面演示这是如何完成的，以防你的设计团队希望使用
    FXML 进行 UI 设计工作流程，而不是使用 Java（参见“JavaFX Scene Builder: Using FXML for UI Design”一节）。我这样做是因为我想涵盖
    JavaFX 中的所有设计选项，包括 FXML，以确保本书完整覆盖了使用 Java 8 和 JavaFX 8.0 所能完成的工作。然而，归根结底，这是一本关于
    Java 8 编程的书籍，因此我在本书中的主要重点将是使用 Java 8，而不是 FXML。


    无论如何，关于使用 XML（或 FXML）创建 UI 设计，我想指出的重点是，这种方法可以被视为静态的，因为设计是事先使用 XML 创建的，并在编译时使用
    Java 进行“膨胀”。Java 膨胀方法使用设计师提供的 FXML 结构来创建场景图，该场景图根据使用 FXML 创建的 UI 设计结构（层次结构）填充了
    JavaFX UI（类）对象。我将在本章后面概述这是如何工作的，以便你了解其运作方式（参见“JavaFX Scene Builder: Using FXML
    for UI Design”一节）。


    # 游戏优化：平衡静态元素与动态元素


    游戏优化归结为**平衡**不需要实时处理的静态元素与需要持续处理的动态元素。过多的动态处理，尤其是在并非真正需要时，可能会使你的游戏运行卡顿或生硬。这就是为什么游戏编程是一门艺术：它需要平衡，以及出色的角色、故事情节、创造力、幻觉、预期、准确性，最后还有**优化**。


    [表 5-1](#9781484204160_Ch05.xhtml#Tab1) 列出了动态游戏中一些需要考虑优化的不同游戏组件。如你所见，游戏玩法中有很多方面可以进行优化，以显著减轻处理器的“繁忙”程度。如果这些主要的动态游戏处理区域中有一个“失控”，占用了处理器每帧宝贵的周期，这可能会极大地影响你的游戏的**用户体验**。我将在本章下一节中介绍游戏术语（精灵、碰撞检测、物理模拟等）。


    [表 5-1](#9781484204160_Ch05.xhtml#_Tab1). 可优化以最小化系统内存和处理器周期使用的游戏玩法方面


    | 游戏玩法方面 | 基本优化原则 |

    | --- | --- |

    | **精灵位置（移动）** | 尽可能多地按像素移动精灵，以实现屏幕上的平滑移动。 |

    | **碰撞检测** | 仅在必要时（近距离时）检查屏幕上对象之间的碰撞。 |

    | **物理模拟** | 最小化场景中需要进行物理计算的对象数量。 |

    | **精灵动画** | 最小化创建平滑动画幻觉所需循环的帧数。 |

    | **背景动画** | 最小化动画化的背景区域，使整个背景看起来是动画的，但实际上并非如此。 |

    | **游戏玩法逻辑** | 尽可能高效地编写游戏玩法逻辑（模拟或 AI）。 |

    | **记分板更新** | 仅在得分时更新记分板，并将分数更新最小化为每秒最多一次。 |

    | **UI 设计** | 使用静态 UI 设计，以便不将脉冲事件用于 UI 元素定位或 CSS3。 |


    考虑到所有这些游戏编程领域，游戏编程是一项极其棘手的任务！


    需要注意的是，其中一些方面协同工作，为玩家创造特定的幻觉。例如，精灵动画将创造角色奔跑、跳跃或飞行的幻觉，但如果不将该代码与精灵定位（移动）代码结合，幻觉的现实感将无法实现。为了微调幻觉，可能需要调整动画的速度（帧率）和移动的距离（每帧像素数）（我喜欢称之为调整），以获得最真实的结果。我们将在[第
    13 章](#9781484204160_Ch13.xhtml)中进行此操作。


    如果你能以更少的次数移动游戏元素（主要玩家精灵、投射物精灵、敌人精灵、背景）更多的像素，你将节省处理周期。是移动部分消耗处理时间，而不是距离（移动了多少像素）。类似地，对于动画，实现令人信服的动画所需的帧数越少，存储这些帧所需的内存就越少。请记住，你正在优化内存使用以及处理周期。检测碰撞是游戏编程逻辑的主要部分；重要的是不要检查那些不在“游戏中”（屏幕上）或不活跃且彼此不接近的游戏元素之间的碰撞。


    自然力（物理模拟）和游戏玩法逻辑（如果编码不佳（未优化））是处理器最密集的方面。这些是我将在本书后面，当你更进阶时（参见[第 16 章](#9781484204160_Ch16.xhtml)和[第
    17 章](#9781484204160_Ch17.xhtml)）涵盖的主题。


    # 游戏设计概念：精灵、物理、碰撞


    让我们来看看各种游戏设计组件，你需要理解这些组件才能构建游戏，以及你可以使用哪些 Java 8（或 JavaFX）包和类来实现这些游戏玩法方面，我喜欢称之为游戏玩法组件。这些可以包括游戏玩法元素本身（通常称为**精灵**）以及处理引擎，你将自行编写这些引擎，或导入预先存在的
    Java 代码库，例如**物理模拟**和**碰撞检测**。


    精灵是游戏玩法的基础，定义了你的**主要角色**、用于伤害该主要角色的**投射物**，以及发射这些投射物的**敌人**。精灵是**2D 图形元素**，可以是静态的（固定的，单个图像）或动态的（动画的，多个图像的无缝循环）。精灵将根据决定游戏如何运行的编程逻辑在屏幕上移动。精灵需要与背景图像和其他游戏元素以及其他精灵合成，因此用于创建精灵的图形需要支持**透明背景**。'
  raw: 'One of the most significant static-versus-dynamic design issues in Android
    (Java) programming is UI design using XML (**static design**) versus UI design
    using Java (**dynamic design**). The Android platform allows UI design to be done
    using XML instead of Java so that nonprogrammers (designers) can do the **front-end**
    design for an application. JavaFX allows exactly the same thing to be done using
    **FXML**. You have to create an FXML JavaFX application to do this, as you saw
    in [Chapter 2](#9781484204160_Ch02.xhtml) (see [Figure 2-4](#9781484204160_Ch02.xhtml#Fig4),
    right-hand side, third option, “JavaFX FXML Application”). Doing so will add the
    **javafx.fxml** package and classes to the application, letting you design UIs,
    using FXML, and later having your Java programming logic “inflate” them so that
    the design consists of JavaFX UI objects.


    It is important to note that using FXML adds another layer, containing the FXML
    markup and its translation and processing, to the application development and
    compilation process. I am going to demonstrate later in the chapter how this is
    done, in case your design team wants to use FXML for the UI design work process,
    instead of Java (see the section “JavaFX Scene Builder: Using FXML for UI Design”).
    I am doing this because I want to cover all the design options in JavaFX, including
    FXML, to make sure that this book is complete in its coverage of what can be done
    using Java 8 and JavaFX 8.0\. At the end of the day, this is a Java 8 programming
    title, however, so my primary focus during this book will be using Java 8, not
    FXML.


    In any event, the point that I am making regarding using XML (or FXML) to create
    the UI design is that this approach can be viewed as static, because the design
    is created beforehand, using XML, and is “inflated” at compile time, using Java.
    Java inflation methods use the designer-provided FXML structure to create the
    scene graph, which is filled with JavaFX UI (class) objects, based on the UI design
    structure (hierarchy) created using FXML. I will give you an overview of how this
    works later in the chapter so that you have a handle on how this works (see the
    section “JavaFX Scene Builder: Using FXML for UI Design”).


    Game Optimization: Balancing Static Elements with Dynamic


    Game optimization comes down to **balancing** static elements, which do not require
    processing in real time, with dynamic elements, which require constant processing.
    Too much dynamic processing, especially when it is not really needed, can make
    your game play jerky, or stilted. This is why game programming is an art form:
    it requires balance as well as great characters, a story line, creativity, illusion,
    anticipation, accuracy, and, finally, **optimization**.


    Some of the different game component considerations for optimization in a dynamic
    game are listed in [Table 5-1](#9781484204160_Ch05.xhtml#Tab1). As you can see,
    there are a lot of areas of game play that can be optimized to make the processor’s
    workload significantly less “busy.” If you have even one of these primary dynamic
    game processing areas “run away” with the processor’s precious cycles per frame,
    this can greatly affect the **user experience** for your game. I will be getting
    into game terminology (sprites, collision detection, physics simulation, and so
    on) in the next section of the chapter.


    [Table 5-1](#9781484204160_Ch05.xhtml#_Tab1). Aspects of Game Play That Can Be
    Optimized to Minimize System Memory and Processor Cycle Usage


    | Game Play Aspect | Basic Optimization Principle |

    | --- | --- |

    | **Sprite position (Move)** | Move sprites by as many pixels as possible to achieve
    smooth movement on the screen. |

    | **Collision detection** | Check for collisions between objects on the screen
    only when necessary (in close proximity). |

    | **Physics simulation** | Minimize the number of objects in a scene that require
    physics calculations to be performed. |

    | **Sprite animation** | Minimize the number of frames that need to be cycled
    to create an illusion of smooth animation. |

    | **Background animation** | Minimize background areas that are animated so that
    the entire background looks animated but is not. |

    | **Game play logic** | Program game play logic (simulated or AI) to be as efficient
    as possible. |

    | **Scoreboard updates** | Update scoreboard only when scoring, and minimize score
    updates to once per second maximum. |

    | **UI design** | Use a static UI design so that pulse events are not used for
    UI element positioning or CSS3. |


    Considering all these game programming areas makes game programming an extremely
    tricky endeavor!


    It is important to note that some of these aspects work together to create a given
    illusion for the player. For instance, the sprite animation will create the illusion
    of a character running, jumping, or flying, but without combining that code with
    sprite positioning (movement) code, the reality of the illusion will not be achieved.
    To fine-tune an illusion, the speed of the animation (frame rate) and the distance
    moved (in pixels per frame) may need to be adjusted (I like to call this tweaked)
    to get the most realistic result. We will be doing this during [Chapter 13](#9781484204160_Ch13.xhtml).


    If you can move game elements (primary player sprite, objectile sprites, enemy
    sprites, background) a greater number of pixels a fewer number of times, you will
    save processing cycles. It is the moving part that takes processing time, not
    the distance (how many pixels are moved). Similarly, with animation, the fewer
    frames needed to achieve a convincing animation, the less memory will be required
    to hold those frames. Remember that you are optimizing memory usage as well as
    processing cycles. Detecting collisions is a major part of game programming logic;
    it is important not to check for collisions between game elements that are not
    “in play” (on the screen), or active, and that are not near each other.


    Forces of nature (physics simulations) and game play logic if it is not well coded
    (optimized), are the most processor intensive aspects. These are subjects I will
    cover later in the book, when you are more advanced (see [Chapters 16](#9781484204160_Ch16.xhtml)
    and [17](#9781484204160_Ch17.xhtml)).


    Game Design Concepts: Sprites, Physics, Collision


    Let’s take a look at the various game design components that we you will need
    to understand to be able to build a game, as well as what Java 8 (or JavaFX) packages
    and classes you can use to implement these aspects of game play, which I like
    to term components of game play. These can include the game play elements themselves
    (commonly referred to as **sprites**) as well as processing engines, which you
    will either code yourself, or import preexisting Java code libraries for, such
    as **physics simulation** and **collision detection**.


    Sprites are the foundation of game play, defining your **main character**, **projectiles**
    used to damage this main character, and the **enemies** firing these projectiles.
    Sprites are **2D graphics elements** and can be either static (fixed, a single
    image) or dynamic (animated, a seamless loop of several images). A sprite will
    be moved around the screen based on programming logic, which dictates how the
    game is to function. Sprites need to be composited with background imagery and
    other game elements as well as other sprites and so the graphics used to create
    the sprites will need to support **transparent backgrounds**.'
  trans: '

    Android（Java）编程中最显著的静态与动态设计问题之一，是使用 XML（**静态设计**）与使用 Java（**动态设计**）进行 UI 设计。Android
    平台允许使用 XML 而非 Java 进行 UI 设计，以便非程序员（设计师）也能完成应用的**前端**设计。JavaFX 则允许使用 **FXML** 实现完全相同的功能。你需要创建一个
    FXML JavaFX 应用来实现这一点，正如你在第 2 章中所见（参见图 2-4，右侧第三个选项“JavaFX FXML Application”）。这样做会将
    **javafx.fxml** 包及其类添加到应用中，让你能够使用 FXML 设计 UI，随后通过 Java 编程逻辑“膨胀”这些设计，使其由 JavaFX
    UI 对象构成。


    需要注意的是，使用 FXML 会在应用开发和编译过程中增加一个包含 FXML 标记及其翻译和处理的额外层级。我将在本章后面演示如何实现这一点，以防你的设计团队希望使用
    FXML 而非 Java 进行 UI 设计工作流程（参见“JavaFX Scene Builder：使用 FXML 进行 UI 设计”一节）。我之所以这样做，是因为我想涵盖
    JavaFX 中所有设计选项，包括 FXML，以确保本书完整覆盖了使用 Java 8 和 JavaFX 8.0 所能实现的功能。不过，归根结底，这是一本关于
    Java 8 编程的书籍，因此本书的主要重点将是使用 Java 8，而非 FXML。


    无论如何，我关于使用 XML（或 FXML）创建 UI 设计的观点是，这种方法可以被视为静态的，因为设计是预先使用 XML 创建的，并在编译时使用 Java
    进行“膨胀”。Java 膨胀方法使用设计师提供的 FXML 结构来创建场景图，该场景图根据使用 FXML 创建的 UI 设计结构（层次结构）填充了 JavaFX
    UI（类）对象。我将在本章后面概述其工作原理，以便你掌握其机制（参见“JavaFX Scene Builder：使用 FXML 进行 UI 设计”一节）。


    游戏优化：平衡静态元素与动态元素


    游戏优化归结为**平衡**不需要实时处理的静态元素与需要持续处理的动态元素。过多的动态处理，尤其是在并非真正需要的情况下，会导致游戏运行卡顿或生硬。这就是游戏编程为何是一门艺术形式的原因：它需要平衡，以及出色的角色、故事情节、创造力、幻觉、预期、准确性，最后还有**优化**。


    表 5-1 列出了动态游戏中一些需要优化的不同游戏组件考量。如你所见，游戏玩法的许多方面都可以进行优化，以显著减轻处理器的“繁忙”程度。如果这些主要的动态游戏处理区域中哪怕有一个“失控”，占用了处理器每帧宝贵的周期，都会极大地影响游戏的**用户体验**。我将在本章下一节介绍游戏术语（精灵、碰撞检测、物理模拟等）。


    表 5-1. 可优化以最小化系统内存和处理器周期用量的游戏玩法方面


    | 游戏玩法方面 | 基本优化原则 |

    | --- | --- |

    | **精灵位置（移动）** | 尽可能多地移动精灵像素，以实现屏幕上的平滑移动。 |

    | **碰撞检测** | 仅在必要时（近距离时）检查屏幕上对象之间的碰撞。 |

    | **物理模拟** | 最小化场景中需要进行物理计算的对象数量。 |

    | **精灵动画** | 最小化创建平滑动画幻觉所需的帧循环数量。 |

    | **背景动画** | 最小化动画化的背景区域，使整个背景看起来有动画效果，但实际上并非如此。 |

    | **游戏玩法逻辑** | 尽可能高效地编写游戏玩法逻辑（模拟或 AI）。 |

    | **记分板更新** | 仅在得分时更新记分板，并将分数更新频率最大限制为每秒一次。 |

    | **UI 设计** | 使用静态 UI 设计，以避免使用脉冲事件进行 UI 元素定位或 CSS3。 |


    考虑到所有这些游戏编程领域，游戏编程确实是一项极其棘手的任务！


    需要注意的是，其中一些方面协同工作，为玩家创造特定的幻觉。例如，精灵动画会创造角色奔跑、跳跃或飞行的幻觉，但如果不将该代码与精灵定位（移动）代码结合，就无法实现幻觉的真实感。为了微调幻觉，可能需要调整动画速度（帧率）和移动距离（每帧像素数）（我喜欢称之为“微调”），以获得最逼真的效果。我们将在第
    13 章中进行此操作。


    如果你能以更少的次数移动游戏元素（主要玩家精灵、目标精灵、敌人精灵、背景）更多的像素，就能节省处理周期。消耗处理时间的是移动本身，而不是距离（移动了多少像素）。类似地，对于动画，实现令人信服的动画所需的帧数越少，存储这些帧所需的内存就越少。请记住，你是在优化内存用量和处理周期。检测碰撞是游戏编程逻辑的主要部分；重要的是不要检查那些不在“游戏中”（屏幕上）、不活跃或彼此不相近的游戏元素之间的碰撞。


    自然力（物理模拟）和游戏玩法逻辑（如果编码不佳，未优化）是处理器最密集的方面。这些主题我将在本书后面，当你更进阶时再介绍（参见第 16 章和第 17 章）。


    游戏设计概念：精灵、物理、碰撞


    让我们来看看构建游戏所需了解的各种游戏设计组件，以及你可以用来实现这些游戏玩法方面（我喜欢称之为游戏玩法组件）的 Java 8（或 JavaFX）包和类。这些可以包括游戏玩法元素本身（通常称为**精灵**）以及处理引擎，你可以自己编写这些引擎，或导入现有的
    Java 代码库，例如**物理模拟**和**碰撞检测**。


    精灵是游戏玩法的基础，定义了你的**主要角色**、用于伤害主要角色的**投射物**，以及发射这些投射物的**敌人**。精灵是**2D 图形元素**，可以是静态的（固定的，单个图像）或动态的（动画的，多个图像的无缝循环）。精灵将根据决定游戏运行方式的编程逻辑在屏幕上移动。精灵需要与背景图像、其他游戏元素以及其他精灵进行合成，因此用于创建精灵的图形需要支持**透明背景**。

