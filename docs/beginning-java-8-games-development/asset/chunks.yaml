    (sprite) so he is facing the correct direction, and then we can test the code.
    It is important to write complex Java code in logical, digestible steps. In this
    way, you can test your code as you write it, making sure that each component of
    the programming logic works, before adding additional complexity. You will see
    this work process during this chapter, as we develop a robust auto-attack algorithm
    inside of the Enemy.java class. This auto-attack code can be used for any of the
