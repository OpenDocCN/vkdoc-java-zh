- fmt: "Let’s perform a similar work process in the `GamePlayLoop.java` class to what\
    \ we did in the `Bagel.java` class. Add a `protected InvinciBagel invinciBagel;`\
    \ statement at the top of the class. Next, create a `public GamePlayLoop()` constructor\
    \ method, with an `InvinciBagel` object named `iBagel` inside the parameter list.\
    \ Inside the `GamePlayLoop()` constructor method, set the `iBagel` `InvinciBagel`\
    \ object reference equal to the protected `InvinciBagel invinciBagel` (reference)\
    \ variable so that we can use the new `invinciBagel` `InvinciBagel` object reference\
    \ inside of the `GamePlayLoop.handle()` method. This will allow us to call the\
    \ `.update()` method off of the `iBagel` `Bagel` object using the `invinciBagel`\
    \ `InvinciBagel` reference object. The `GamePlayLoop` class and constructor method\
    \ structure, along with a new `.handle()` method body, which includes a revised\
    \ `invinciBagel.iBagel.update()` method call path (object referencing structure),\
    \ are shown error-free in [Figure 12-8](#9781484204160_Ch12.xhtml#Fig8), and should\
    \ look like the following Java code:\n\n```\npublic class GamePlayLoop extends\
    \ AnimationTimer {\n    protected InvinciBagel invinciBagel;\n    public GamePlayLoop(InvinciBagel\
    \ iBagel) {\n        invinciBagel = iBagel;\n    }\n    @Override\n    public\
    \ void handle(long now) {\n        invinciBagel.iBagel.update();\n    }\n}\n```\n\
    \n![9781484204160_Fig12-08.jpg](OEBPS/Images/9781484204160_Fig12-08.jpg)\n\n[Figure\
    \ 12-8](#9781484204160_Ch12.xhtml#_Fig8). Make the same change to `GamePlayLoop`\
    \ by adding an `invinciBagel` `InvinciBagel` variable and constructor\n\nAs you\
    \ can see in [Figure 12-8](#9781484204160_Ch12.xhtml#Fig8), I have clicked on\
    \ the `invinciBagel` variable (`InvinciBagel` object reference) so it is highlighted,\
    \ and you can see its usage across the two methods. The declaration is used in\
    \ the `GamePlayLoop` class, the instance inside of the `GamePlayLoop()` constructor\
    \ method is set using the `InvinciBagel` class `this` keyword (using the `iBagel`\
    \ parameter), and the variable reference inside of the `.handle()` method accessed\
    \ the `Bagel` class `.update()` method using the `iBagel` `Bagel` object and the\
    \ `invinciBagel` `InvinciBagel` reference object. Java is advanced, but cool.\n\
    \nNow that we have created our custom `GamePlayLoop()` constructor method that\
    \ accommodates the receipt of the `InvinciBagel` object reference named `iBagel`,\
    \ and then assigns it to the `invinciBagel` variable, it is time to return to\
    \ the `InvinciBagel.java` code (editing tab in NetBeans).\n\nThe final piece of\
    \ this (second) puzzle of removing the `static Bagel iBagel;` declaration is to\
    \ add the Java `this` keyword in the `GamePlayLoop()` constructor method call.\
    \ After we do this, our `InvinciBagel`, `Bagel` and `GamePlayLoop` will all be\
    \ wired up to each other, without using any static variables (other than the `WIDTH`\
    \ and `HEIGHT` constants).\n\n**Using `this` in `GamePlayLoop()` Constructor:\
    \ `GamePlayLoop(this)`**\n\nOpen up your `.createStartGameLoop()` method structure,\
    \ using the `+` expand icon on the left side of NetBeans, as shown in [Figure\
    \ 12-9](#9781484204160_Ch12.xhtml#Fig9). Add the Java `this` keyword in the parameter\
    \ area, so that you are again passing the `InvinciBagel` object reference, this\
    \ time into the `GamePlayLoop()` constructor method call. This will give that\
    \ class a reference to your `InvinciBagel` class and its context and structure,\
    \ just like you did with the `Bagel` class. Your newly revised Java method body\
    \ and constructor method call will look like the following code, which is shown\
    \ highlighted in [Figure 12-9](#9781484204160_Ch12.xhtml#Fig9):\n\n```\nprivate\
    \ void createStartGameLoop() {\n    gamePlayLoop = new GamePlayLoop(this);\n \
    \   gamePlayLoop.start();\n}\n```\n\n![9781484204160_Fig12-09.jpg](OEBPS/Images/9781484204160_Fig12-09.jpg)\n\
    \n[Figure 12-9](#9781484204160_Ch12.xhtml#_Fig9). Add a Java `this` keyword inside\
    \ of the `GamePlayLoop()` constructor method call to provide a context object\n\
    \nAs long as we are making our `InvinciBagel.java` class completely encapsulated,\
    \ let’s make the `StackPane` `root` variable private as well, and get rid of the\
    \ `static` modifier. Since I have moved the `StackPane` object named `root` back\
    \ up into the `.start()` menu from the `.createSplashScreenNodes()` method, there\
    \ is no good reason for a `static` modifier keyword. I am trying to remove all\
    \ `static` modifiers (that are not constants) and “privatize” this class as much\
    \ as I can.\n\n**Removing the Rest of the Static Variables: `StackPane` and `HBox`**\n\
    \nNow I am going to start going right down the variable declaration lines of code\
    \ at the top of the `InvinciBagel.java` class starting with the `Boolean` variables\
    \ that we made private (which were `public static`), and see which of these variables\
    \ I can make private instead of `package protected static` (which `StackPane`\
    \ and `HBox` are currently), or which are package protected, and can be made `private`.\
    \ A `private` variable “encapsulates” that variable’s data inside of the class\
    \ (object) itself; in this case, this would be the `InvinciBagel.java` code that\
    \ we’re currently refining. A package protected variable encapsulates the data\
    \ inside of the package; in this case that would be the `invincibagel` package.\
    \ The new Java statement for declaring the `StackPane` object named `root`, which\
    \ is a root element of the Scene Graph, to be a `private` member of the `InvinciBagel.java`\
    \ class (only), would be accomplished using the following code, shown in [Figure\
    \ 12-10](#9781484204160_Ch12.xhtml#Fig10).\n\n```\nprivate StackPane root;\n```\n\
    \n![9781484204160_Fig12-10.jpg](OEBPS/Images/9781484204160_Fig12-10.jpg)\n\n[Figure\
    \ 12-10](#9781484204160_Ch12.xhtml#_Fig10). Change the declaration statement for\
    \ the `StackPane` object named `root` from a `static` modifier to `private`\n\n\
    The next static variable down in the declarations at the top of the class is `static\
    \ HBox buttonContainer;` and I am also going to change this variable declaration\
    \ to be a `private` variable, using the following Java statement:\n\n```\nprivate\
    \ HBox buttonContainer;\n```\n\nLet’s make sure that the Java statements inside\
    \ of the `.createSplashScreenNodes()` method can still “see” or reference this\
    \ `buttonContainer` `HBox` object, which as you can see in [Figure 12-11](#9781484204160_Ch12.xhtml#Fig11),\
    \ they can. I also clicked on the `HBox` object in NetBeans so that it showed\
    \ me the object references throughout my code (this is a really useful feature\
    \ that you should use to visualize how objects relate between different Java 8\
    \ programming statements inside of your code). This selected object highlighting\
    \ is shown in your code inside of NetBeans 8 by using a yellow field highlighting\
    \ color.\n\n![9781484204160_Fig12-11.jpg](OEBPS/Images/9781484204160_Fig12-11.jpg)\n\
    \n[Figure 12-11](#9781484204160_Ch12.xhtml#_Fig11). Change declaration statement\
    \ for `HBox` object named `buttonContainer` from a `static` modifier to `private`\n\
    \nI had originally declared these fields `static` because I had read on the Internet,\
    \ on several of the Java coding sites, that this is an “optimization trick,” which\
    \ allows the JVM to set aside fixed areas of memory, and make the code run more\
    \ optimally. I have decided to make the objects for my game as encapsulated as\
    \ possible first, here during the development process, and then look at optimization\
    \ later on, if and when it becomes necessary.\n\nAs long as we are making our\
    \ `InvinciBagel.java` class completely encapsulated, let’s make the other variables\
    \ `private` as well. I tested this game after making each of the variables (after\
    \ the `Bagel iBagel` declaration) `private`, and it ran just fine. When I make\
    \ the `Bagel iBagel` `private`, the game hangs on a white (background color) screen,\
    \ so I left the `Bagel iBagel` declaration `package protected` (no access control\
    \ modifier keyword signifies package protected access).\n\n**Making the Remaining\
    \ Variables Private: Finish Encapsulating `InvinciBagel` Class**"
  raw: 'Let’s perform a similar work process in the GamePlayLoop.java class to what
    we did in the Bagel.java class. Add a **protected InvinciBagel invinciBagel;**
    statement at the top of the class. Next, create a **public GamePlayLoop()** constructor
    method, with an **InvinciBagel** object named **iBagel** inside the parameter
    list. Inside the GamePlayLoop() constructor method, set the **iBagel** InvinciBagel
    object reference equal to the protected InvinciBagel **invinciBagel** (reference)
    variable so that we can use the new invinciBagel InvinciBagel object reference
    inside of the GamePlayLoop .handle() method. This will allow us to call the .update()
    method off of the iBagel Bagel object using the invinciBagel InvinciBagel reference
    object. The GamePlayLoop class and constructor method structure, along with a
    new .handle() method body, which includes a revised **invinciBagel.iBagel.update()**
    method call path (object referencing structure), are shown error-free in [Figure
    12-8](#9781484204160_Ch12.xhtml#Fig8), and should look like the following Java
    code:


    ```

    public class GamePlayLoop extends AnimationTimer {

        protected InvinciBagel invinciBagel;

        public GamePlayLoop(InvinciBagel iBagel) {

            invinciBagel = iBagel;

        }

        @Override

        public void handle(long now) {

            invinciBagel.iBagel.update();.

        }

    }

    ```


    ![9781484204160_Fig12-08.jpg](OEBPS/Images/9781484204160_Fig12-08.jpg)


    [Figure 12-8](#9781484204160_Ch12.xhtml#_Fig8). Make the same change to GamePlayLoop
    by adding an invinciBagel InvinciBagel variable and constructor


    As you can see in [Figure 12-8](#9781484204160_Ch12.xhtml#Fig8), I have clicked
    on the invinciBagel variable (InvinciBagel object reference) so it is highlighted,
    and you can see its usage across the two methods. The declaration is used in the
    GamePlayLoop class, the instance inside of the GamePlayLoop() constructor method
    is set using the InvinciBagel class this keyword (using the iBagel parameter),
    and the variable reference inside of the .handle() method accessed the Bagel class
    .update() method using the iBagel Bagel object and the invinciBagel InvinciBagel
    reference object. Java is advanced, but cool.


    Now that we have created our custom GamePlayLoop() constructor method that accommodates
    the receipt of the InvinciBagel object reference named iBagel, and then assigns
    it to the invinciBagel variable, it is time to return to the InvinciBagel.java
    code (editing tab in NetBeans).


    The final piece of this (second) puzzle of removing the **static Bagel iBagel;**
    declaration is to add the Java **this** keyword in the GamePlayLoop() constructor
    method call. After we do this, our InvinciBagel, Bagel and GamePlayLoop will all
    be wired up to each other, without using any static variables (other than the
    WIDTH and HEIGHT constants).


    Using this in GamePlayLoop() Constructor: GamePlayLoop(this)


    Open up your **.createStartGameLoop()** method structure, using the + expand icon
    on the left side of NetBeans, as shown in [Figure 12-9](#9781484204160_Ch12.xhtml#Fig9).
    Add the Java **this** keyword in the parameter area, so that you are again passing
    the InvinciBagel object reference, this time into the GamePlayLoop() constructor
    method call. This will give that class a reference to your InvinciBagel class
    and its context and structure, just like you did with the Bagel class. Your newly
    revised Java method body and constructor method call will look like the following
    code, which is shown highlighted in [Figure 12-9](#9781484204160_Ch12.xhtml#Fig9):


    ```

    private void createStartGameLoop() {

        gamePlayLoop = new GamePlayLoop(this);

        gamePlayLoop.start();

    }

    ```


    ![9781484204160_Fig12-09.jpg](OEBPS/Images/9781484204160_Fig12-09.jpg)


    [Figure 12-9](#9781484204160_Ch12.xhtml#_Fig9). Add a Java this keyword inside
    of the GamePlayLoop() constructor method call to provide a context object


    As long as we are making our InvinciBagel.java class completely encapsulated,
    let’s make the StackPane root variable private as well, and get rid of the static
    modifier. Since I have moved the StackPane object named root back up into the
    .start() menu from the **.createSplashScreenNodes()** method, there is no good
    reason for a static modifier keyword. I am trying to remove all static modifiers
    (that are not constants) and “privatize” this class as much as I can.


    Removing the Rest of the Static Variables: StackPane and HBox


    Now I am going to start going right down the variable declaration lines of code
    at the top of the InvinciBagel.java class starting with the Boolean variables
    that we made private (which were public static), and see which of these variables
    I can make private instead of **package protected static** (which StackPane and
    HBox are currently), or which are package protected, and can be made **private**.
    A private variable “encapsulates” that variable’s data inside of the class (object)
    itself; in this case, this would be the **InvinciBagel.java** code that we’re
    currently refining. A package protected variable encapsulates the data inside
    of the package; in this case that would be the **invincibagel** package. The new
    Java statement for declaring the StackPane object named root, which is a root
    element of the Scene Graph, to be a private member of the InvinciBagel.java class
    (only), would be accomplished using the following code, shown in [Figure 12-10](#9781484204160_Ch12.xhtml#Fig10).


    ```

    private StackPane root;

    ```


    ![9781484204160_Fig12-10.jpg](OEBPS/Images/9781484204160_Fig12-10.jpg)


    [Figure 12-10](#9781484204160_Ch12.xhtml#_Fig10). Change the declaration statement
    for the StackPane object named root from a static modifier to private


    The next static variable down in the declarations at the top of the class is static
    HBox buttonContainer; and I am also going to change this variable declaration
    to be a private variable, using the following Java statement:


    ```

    private HBox buttonContainer;

    ```


    Let’s make sure that the Java statements inside of the .createSplashScreenNodes()
    method can still “see” or reference this buttonContainer HBox object, which as
    you can see in [Figure 12-11](#9781484204160_Ch12.xhtml#Fig11), they can. I also
    clicked on the HBox object in NetBeans so that it showed me the object references
    throughout my code (this is a really useful feature that you should use to visualize
    how objects relate between different Java 8 programming statements inside of your
    code). This selected object highlighting is shown in your code inside of NetBeans
    8 by using a yellow field highlighting color.


    ![9781484204160_Fig12-11.jpg](OEBPS/Images/9781484204160_Fig12-11.jpg)


    [Figure 12-11](#9781484204160_Ch12.xhtml#_Fig11). Change declaration statement
    for HBox object named buttonContainer from a static modifier to private


    I had originally declared these fields static because I had read on the Internet,
    on several of the Java coding sites, that this is an “optimization trick,” which
    allows the JVM to set aside fixed areas of memory, and make the code run more
    optimally. I have decided to make the objects for my game as encapsulated as possible
    first, here during the development process, and then look at optimization later
    on, if and when it becomes necessary.


    As long as we are making our InvinciBagel.java class completely encapsulated,
    let’s make the other variables private as well. I tested this game after making
    each of the variables (after the Bagel iBagel declaration) private, and it ran
    just fine. When I make the Bagel iBagel private, the game hangs on a white (background
    color) screen, so I left the Bagel iBagel declaration **package protected** (no
    access control modifier keyword signifies package protected access).


    Making the Remaining Variables Private: Finish Encapsulating InvinciBagel Class'
  trans: '

    让我们在 `GamePlayLoop.java` 类中执行与 `Bagel.java` 类类似的工作流程。在类顶部添加一个 **protected InvinciBagel
    invinciBagel;** 声明。接下来，创建一个 **public GamePlayLoop()** 构造方法，参数列表中包含一个名为 **iBagel**
    的 **InvinciBagel** 对象。在 `GamePlayLoop()` 构造方法内部，将 **iBagel** InvinciBagel 对象引用赋值给受保护的
    InvinciBagel **invinciBagel**（引用）变量，这样我们就可以在 `GamePlayLoop.handle()` 方法内部使用新的
    invinciBagel InvinciBagel 对象引用。这将允许我们通过 invinciBagel InvinciBagel 引用对象调用 iBagel
    Bagel 对象的 `.update()` 方法。`GamePlayLoop` 类和构造方法的结构，以及包含修改后的 **invinciBagel.iBagel.update()**
    方法调用路径（对象引用结构）的新 `.handle()` 方法体，在图 12-8 中显示为无错误状态，应类似于以下 Java 代码：


    ```

    public class GamePlayLoop extends AnimationTimer {

        protected InvinciBagel invinciBagel;

        public GamePlayLoop(InvinciBagel iBagel) {

            invinciBagel = iBagel;

        }

        @Override

        public void handle(long now) {

            invinciBagel.iBagel.update();.

        }

    }

    ```


    ![9781484204160_Fig12-08.jpg](img/9781484204160_Fig12-08.jpg)


