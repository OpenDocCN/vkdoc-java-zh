    [Table 6-1](#9781484204160_Ch06.xhtml#_Tab1). Pos Class Enum Constants That Can
    Be Used for Positioning and Alignment in JavaFX


    | Pos Constant | Positioning Result (Object) |

    | --- | --- |

    | **BASELINE_CENTER** | On the baseline, vertically; at the center, horizontally
    |

    | **BASELINE_LEFT** | On the baseline, vertically; on the left, horizontally |

    | **BASELINE_RIGHT** | On the baseline, vertically; on the right, horizontally
    |

    | **BOTTOM_CENTER** | On the bottom, vertically; at the center, horizontally |

    | **BOTTOM_LEFT** | On the bottom, vertically; on the left, horizontally |

