- fmt: 'Ultimately, the most thorough way to test a game application is across a wide
    range of different OSs and hardware configurations, but I wanted to show you this
    profiling feature, as it is a great way to get a good baseline on your application
    performance, which you can then improve on as you refine your code (and then run
    the profiler again and again, comparing the results with the original baseline
    measurements).


    Once you click the `OK` button, `NetBeans IDE 8.0` will calibrate its profiling
    tool relative to your system hardware characteristics, which should not take long
    at all on a fast, modern-day, multicore workstation.


    If you are running the Windows OS (as seen here, in the 64-bit Windows 7 version),
    you will probably get a `Windows Firewall has blocked some features of this program`
    Windows Security Alert dialog. You want to have all the features of `NetBeans
    8.0` at your disposal, so let’s look at how to allow access to the `Java SE 8`
    platform in Windows next.


    ## Unblocking the Java 8 Platform Binary via the Windows Firewall


    If you get the dreaded `Blocked Features` network dialog, presented in [Figure
    2-16](#9781484204160_Ch02.xhtml#Fig16), select the `Allow Java Platform SE binary
    to communicate on Private networks, such as my home or work network` check box,
    and then click the `Allow access` button, which will allow the `Java 8 platform
    SE binary` to communicate through the Windows firewall.


    ![9781484204160_Fig02-16.jpg](OEBPS/Images/9781484204160_Fig02-16.jpg)


    [Figure 2-16](#9781484204160_Ch02.xhtml#_Fig16). Allow Java features to be used
    by clicking `Allow access`


    After you allow access to the `Java 8 platform SE binary`, the `NetBeans 8.0`
    profiling tool can (and will) run and will generate `basic profiling telemetry`
    results. You will take a closer look at these in the following sections, which
    deal how to analyze profiling results and what they reveal in terms of how your
    application uses memory and CPU resources.


    ## Analyzing the NetBeans IDE 8.0 Game Project CPU Profiling Tool Results


    The `NetBeans Profiler` essentially looks at `memory usage` and the `CPU time`
    used to execute your code. The less memory used, and the faster the CPU times
    (which equates to fewer CPU processing cycles required to execute code), the better
    optimized your application is. The `Profiler` also looks at code- (software-)
    related things, such as method calls and thread states, which you will be learning
    about over the course of this book.


    After you run the `NetBeans 8.0 Profiler`, you will see that a `Profiler` tab
    has been added to your `Projects`, `Files`, and `Services` tabs, at the left of
    the IDE, as illustrated in [Figure 2-17](#9781484204160_Ch02.xhtml#Fig17). You
    examined these other three tabs earlier in the chapter (see the section “NetBeans
    8.0 Is Efficient: Organized Project Management Tools”), so let’s explore the `Profiler`
    tab now.


    ![9781484204160_Fig02-17.jpg](OEBPS/Images/9781484204160_Fig02-17.jpg)


    [Figure 2-17](#9781484204160_Ch02.xhtml#_Fig17). Profile’s Basic Telemetry section,
    at the left of the IDE, under the Profile tab, shows methods, threads, and total
    and used memory


    At the top of the `Profiler` tab is the `Controls` section, with `Stop` (Terminate)
    Profiled Application, `Reset` Collected Profiling Results Buffer, `Garbage Collection`,
    `Modify` Profiling Session, and `VM Telemetry Overview` icons.


    Below these is the `Status` section, showing the `type` of profiling you have
    selected (in this case, `CPU`), the `configuration` (`Analyze Performance`), and
    the `Status` (`Running`).


    The `Profiling Results` section contains icons that open tabs in the `code editor`
    section regarding profiling data results (reports), and the `View` section does
    the same thing for `virtual memory (VM) telemetry`, `threads`, and thread `lock
    contention`. You will be looking at some of these in the next section, when you
    profile memory usage (you are currently profiling CPU usage).


    You can save `snapshots` of various points in time during your code profiling
    sessions in the `Saved Snapshots` section. The `Basic Telemetry` section shows
    `statistics` regarding the profiling session, including number of methods, filter
    settings, threads running, and memory usage.


    Click the `Live Results` icon in the `Profiling Results` section, and open a live
    profiling result tab, shown in [Figure 2-18](#9781484204160_Ch02.xhtml#Fig18),
    at the top, labeled with the CPU time (2:12:09 PM).


    ![9781484204160_Fig02-18.jpg](OEBPS/Images/9781484204160_Fig02-18.jpg)


    [Figure 2-18](#9781484204160_Ch02.xhtml#_Fig18). NetBeans Profiler output, shown
    in the cpu tab, at the top right, and the Output tab, at the bottom right


    As you can see, you are able to open your code hierarchy, including the `.main()`
    method, the `.start()` method, and the `.handle()` method, and see a visual representation
    of their percentage of total CPU time used as well as the actual CPU time used,
    in milliseconds, which is the time value that is employed in Java programming
    for both Java 8 and JavaFX and even for HTML5, JavaScript, and Android application
    development.


    Finally, as you can see in the `Output` pane at the bottom of the figure, there
    is also `text output`, just like when this `Output` pane is used for displaying
    the compiled, run, and executed code, showing what the `Profiler` is doing as
    well. After the `Hello World!` that you generated by clicking your application’s
    `Say "Hello World"` button, you can see the `Profiler agent` Initializing, caching
    classes, and so on. There are a ton of tabs and options in this area of NetBeans,
    and I cannot cover every single one of them in this basic NetBeans overview chapter,
    so play around with what you see on your screen!


    ## Profiling Your Java 8 Game Application Memory Usage


    Let’s take a look at `Memory` Profiling next. Click the `Profile Project` icon,
    and open the `Analyze Memory` dialog, presented in [Figure 2-19](#9781484204160_Ch02.xhtml#Fig19).
    As you can see, if you select `Record stack trace for allocations`, the `Profiler`
    uses more system `overhead`.


    ![9781484204160_Fig02-19.jpg](OEBPS/Images/9781484204160_Fig02-19.jpg)


    [Figure 2-19](#9781484204160_Ch02.xhtml#_Fig19). Select the Memory section of
    the Profile InvinciBagel dialog and select `Record stack trace for allocation`


    Once the `memory profiler` is running, use a `Window` -> `Profiling` -> `VM Telemetry
    Overview` menu sequence, shown in [Figure 2-20](#9781484204160_Ch02.xhtml#Fig20)
    (top), to open the `VM Telemetry Overview` tab (bottom). This tab shows `memory
    allocated` and `memory used`. You can hover the mouse over the visual bar to get
    an exact reading at any point in time. In programming terms, hovering a mouse
    over something will be accessed in your code using “mouse-over.”


    ![9781484204160_Fig02-20.jpg](OEBPS/Images/9781484204160_Fig02-20.jpg)


    [Figure 2-20](#9781484204160_Ch02.xhtml#_Fig20). Use the `Window` -> `Profiling`
    menu sequence to access the visual profiling tabs


    Check out some of the other visual report tabs in the `Window` -> `Profiling`
    menu sequence. Presented in [Figure 2-21](#9781484204160_Ch02.xhtml#Fig21) are
    the `Threads` tab, showing all `11` threads (see the Basic Telemetry pane, at
    the left of the screen), including what each thread is doing (what code the thread
    is running), and the `VM Telemetry` tab, which displays virtual memory usage over
    time.


    ![9781484204160_Fig02-21.jpg](OEBPS/Images/9781484204160_Fig02-21.jpg)


    [Figure 2-21](#9781484204160_Ch02.xhtml#_Fig21). Use the `Window` -> `Profiling`
    menu sequence to access the `Threads` and `VM Telemetry` tabs'
  raw: 'Ultimately, the most thorough way to test a game application is across a wide
    range of different OSs and hardware configurations, but I wanted to show you this
    profiling feature, as it is a great way to get a good baseline on your application
    performance, which you can then improve on as you refine your code (and then run
    the profiler again and again, comparing the results with the original baseline
    measurements).


    Once you click the OK button, NetBeans IDE 8.0 will calibrate its profiling tool
    relative to your system hardware characteristics, which should not take long at
    all on a fast, modern-day, multicore workstation.


    If you are running the Windows OS (as seen here, in the 64-bit Windows 7 version),
    you will probably get a **Windows Firewall has blocked some features of this program**
    Windows Security Alert dialog. You want to have all the features of NetBeans 8.0
    at your disposal, so let’s look at how to allow access to the Java SE 8 platform
    in Windows next.


    Unblocking the Java 8 Platform Binary via the Windows Firewall


    If you get the dreaded Blocked Features network dialog, presented in [Figure 2-16](#9781484204160_Ch02.xhtml#Fig16),
    select the Allow Java Platform SE binary to communicate on Private networks, such
    as my home or work network check box, and then click the Allow access button,
    which will allow the Java 8 platform SE binary to communicate through the Windows
    firewall.


    ![9781484204160_Fig02-16.jpg](OEBPS/Images/9781484204160_Fig02-16.jpg)


    [Figure 2-16](#9781484204160_Ch02.xhtml#_Fig16). Allow Java features to be used
    by clicking Allow access


    After you allow access to the **Java 8 platform** SE **binary**, the NetBeans
    8.0 profiling tool can (and will) run and will generate **basic profiling telemetry**
    results. You will take a closer look at these in the following sections, which
    deal how to analyze profiling results and what they reveal in terms of how your
    application uses memory and CPU resources.


    Analyzing the NetBeans IDE 8.0 Game Project CPU Profiling Tool Results


    The NetBeans Profiler essentially looks at **memory usage** and the **CPU time**
    used to execute your code. The less memory used, and the faster the CPU times
    (which equates to fewer CPU processing cycles required to execute code), the better
    optimized your application is. The Profiler also looks at code- (software-) related
    things, such as method calls and thread states, which you will be learning about
    over the course of this book.


    After you run the NetBeans 8.0 Profiler, you will see that a **Profiler** tab
    has been added to your Projects, Files, and Services tabs, at the left of the
    IDE, as illustrated in [Figure 2-17](#9781484204160_Ch02.xhtml#Fig17). You examined
    these other three tabs earlier in the chapter (see the section “NetBeans 8.0 Is
    Efficient: Organized Project Management Tools”), so let’s explore the Profiler
    tab now.


    ![9781484204160_Fig02-17.jpg](OEBPS/Images/9781484204160_Fig02-17.jpg)


    [Figure 2-17](#9781484204160_Ch02.xhtml#_Fig17). Profile’s Basic Telemetry section,
    at the left of the IDE, under the Profile tab, shows methods, threads, and total
    and used memory


    At the top of the Profiler tab is the **Controls** section, with **Stop** (Terminate)
    Profiled Application, **Reset** Collected Profiling Results Buffer, **Garbage
    Collection**, **Modify** Profiling Session, and **VM Telemetry Overview** icons.


    Below these is the **Status** section, showing the **type** of profiling you have
    selected (in this case, **CPU**), the **configuration** (**Analyze Performance**),
    and the **Status** (**Running**).


    The **Profiling Results** section contains icons that open tabs in the **code
    editor** section regarding profiling data results (reports), and the **View**
    section does the same thing for **virtual memory (VM) telemetry**, **threads**,
    and thread **lock contention**. You will be looking at some of these in the next
    section, when you profile memory usage (you are currently profiling CPU usage).


    You can save **snapshots** of various points in time during your code profiling
    sessions in the **Saved Snapshots** section. The **Basic Telemetry** section shows
    **statistics** regarding the profiling session, including number of methods, filter
    settings, threads running, and memory usage.


    Click the **Live Results** icon in the **Profiling Results** section, and open
    a live profiling result tab, shown in [Figure 2-18](#9781484204160_Ch02.xhtml#Fig18),
    at the top, labeled with the CPU time (2:12:09 PM).


    ![9781484204160_Fig02-18.jpg](OEBPS/Images/9781484204160_Fig02-18.jpg)


    [Figure 2-18](#9781484204160_Ch02.xhtml#_Fig18). NetBeans Profiler output, shown
    in the cpu tab, at the top right, and the Output tab, at the bottom right


    As you can see, you are able to open your code hierarchy, including the .main()
    method, the .start() method, and the .handle() method, and see a visual representation
    of their percentage of total CPU time used as well as the actual CPU time used,
    in milliseconds, which is the time value that is employed in Java programming
    for both Java 8 and JavaFX and even for HTML5, JavaScript, and Android application
    development.


    Finally, as you can see in the **Output** pane at the bottom of the figure, there
    is also **text output**, just like when this Output pane is used for displaying
    the compiled, run, and executed code, showing what the Profiler is doing as well.
    After the “**Hello World!**” that you generated by clicking your application’s
    Say “Hello World” button, you can see the Profiler agent Initializing, caching
    classes, and so on. There are a ton of tabs and options in this area of NetBeans,
    and I cannot cover every single one of them in this basic NetBeans overview chapter,
    so play around with what you see on your screen!


    Profiling Your Java 8 Game Application Memory Usage


    Let’s take a look at **Memory** Profiling next. Click the **Profile Project**
    icon, and open the **Analyze Memory** dialog, presented in [Figure 2-19](#9781484204160_Ch02.xhtml#Fig19).
    As you can see, if you select **Record stack trace for allocations**, the Profiler
    uses more system **overhead**.


    ![9781484204160_Fig02-19.jpg](OEBPS/Images/9781484204160_Fig02-19.jpg)


    [Figure 2-19](#9781484204160_Ch02.xhtml#_Fig19). Select the Memory section of
    the Profile InvinciBagel dialog and select Record stack trace for allocation


    Once the **memory profiler** is running, use a **Window ![image](OEBPS/Images/arrow.jpg)
    Profiling ![image](OEBPS/Images/arrow.jpg) VM Telemetry Overview** menu sequence,
    shown in [Figure 2-20](#9781484204160_Ch02.xhtml#Fig20) (top), to open the VM
    Telemetry Overview tab (bottom). This tab shows **memory allocated** and **memory
    used**. You can hover the mouse over the visual bar to get an exact reading at
