    Next we created your `CastingDirector.java` class, to manage the `Actor` objects
    that will need to be added to the game and removed from the game. This class will
    also maintain the `List<Actor>` structure that will be used for the collision
    detection logic that we will be adding later on during the book in [Chapter 16](#9781484204160_Ch16.xhtml).


    Finally, we created our first `Actor` related class, the `Bagel` class, which
    extends the `Hero` superclass and will allow us to put the primary `InvinciBagel`
    `Actor` object character into our game `Scene` and onto the `Stage`. We created
    the `Bagel()` constructor method and used the `@Override` keyword to override
    the `.update()` and `.collide()` methods, so that we have someplace to construct
    our programming logic relating to this character during the rest of the book.


    In the next chapter, we’re going to take a look at how to move the game sprite
    around the screen using this `KeyEvent` event handling structure that we have
    created during this chapter, as well as how to ascertain the boundary (edges)
    of the screen, character direction, movement velocity, and related animation and
    movement considerations.


    ## CHAPTER 11


    ![image](OEBPS/Images/frontdot.jpg)


    ## Moving Your Action Figure in 2D: Controlling the X and Y Display Screen Coordinates


    Now that we have created the public `CastingDirector` class, which I call the
    “casting engine,” in [Chapter 10](#9781484204160_Ch10.xhtml), we need to get back
    into our `InvinciBagel.java` primary application class coding here in [Chapter
    11](#9781484204160_Ch11.xhtml), and create our `iBagel` primary game play `Actor`
    (character) in the `.createGameActors()` method. We will also create the `castDirector`
    object using the `CastingDirector.java` class and its `CastingDirector()` constructor
    method, which we created in [Chapter 10](#9781484204160_Ch10.xhtml), as well as
    creating the `.createCastingDirection()` method, which will manage our casting
    direction class-related features.


    After we finish adding the code into our `InvinciBagel.java` class that will create
    the `iBagel` `Bagel` object, and create a `castDirector` `CastingDirector` object,
    we will reorganize our code into logical method structures for the major task
    areas that need to be addressed in the `InvinciBagel` class. After we do this,
    we’ll have eight logical method areas. These methods will then serve as “guides”
    to the functional areas that we will need to keep updated (add statements to)
    as we develop our game over the rest of the book. For instance, if we add an `Actor`
    to the game, we will do this by adding (instantiating) an `Actor` object inside
    of a `.createGameActors()` method, and then add the `Actor` object to a cast object
    created using our new `CastingDirector()` constructor method inside of a new `.createCastingDirection()`
    method.


    In addition to the `.createGameActors()` and `.createCastingDirector()` methods,
    our new methods will include the `.loadImageAssets()` method, the `.createSceneEventHandling()`
    method, the `.createStartGameLoop()` method, and the `.addGameActorNodes()` method.
    So, we will be creating half a dozen new methods for your `InvinciBagel.java`
    class during this chapter, to significantly “beef up” the top-level organizational
    structure for our game’s core class as well as its “top-level” `.start()` method.
    There’s only one method that will survive this process without any modifications;
    that will be the `.addNodesToStackPane()` method, that you created in [Chapter
    6](#9781484204160_Ch06.xhtml) (see [Figure 6-8](#9781484204160_Ch06.xhtml#Fig8)
    to refresh your memory).


    After we have reorganized our `InvinciBagel.java` code infrastructure, we can
    move on and start to create the program logic that will be used to create, and
    later control, the primary hero for our game, the `InvinciBagel` himself. This
    will involve using the `Bagel()` and `CastingDirector()` constructor methods,
    and then adding the `iBagel` `Bagel` object to the Scene Graph (`StackPane` root
    object) and `CastingDirector` `castDirector` object, using the `.add()` method
    call and the `.addCurrentCast()` method call respectively.


    After we have the `iBagel` `Actor` created, we will wire up its `.update()` method
    to the `GamePlayLoop.handle()` method, at which point we can start to build the
    programming logic that will move this `InvinciBagel` around on your `Stage`. At
    this point, things get more interesting, as we can start to define the movement
    boundaries for the `Stage`, the sprite image states (the nine different character
    positions), and how these relate to X (left-right) and Y (up-down) key usage.
    For instance, no movement will be standing, left and right will use running, up
    will use jump, down will land, or later on in the game design, certain key combinations
    can cause an `InvinciBagel` to fly and so on as we refine the code.


    ## InvinciBagel.java Redesign: Adding Logical Methods


    The first thing that I want to do regarding the `InvinciBagel.java` code, which
    should already be open in a tab in NetBeans (if it is not, use the right-click
    and **Open** work process), is to reorganize the current code using a half-dozen
    new methods that logically contain, as well as show, the different areas that
    we will need to address in order to add new `Actor` objects to our game. These
    include things such as managing event handling, adding new `Image` asset references,
    creating the new game `Actor` objects, adding the new actors to the Scene Graph,
    adding the new `Actor` objects to the `CURRENT_CAST` `List` we created in [Chapter
    10](#9781484204160_Ch10.xhtml), and starting the `GamePlayLoop` `AnimationTimer`
    pulse engine. The first thing that we should do is to put those Java statements
    that need to be done first and that need to be in the `.start()` method itself
    at the top of the code. These create the Scene Graph root, a `Scene` object, and
    set up the `Stage` object:


    ```

    primaryStage.setTitle(InvinciBagel);

    root = new StackPane();

    scene = new Scene(root, WIDTH, HEIGHT, Color.WHITE);

    primaryStage.setScene(scene);

    primaryStage.show();

    ```


    As you can see in [Figure 11-1](#9781484204160_Ch11.xhtml#Fig1), we are taking
    the `root` and `scene` object instantiations out of the method that is called
    `.createSplashScreenNodes()`, and putting these at the top of the `.start()` method.
    I am doing this because they are foundational to our `InvinciBagel` game (class).
    Next, we are also going to add six all-new method structures to our existing code.
    The only method that will remain untouched during this process is your `.addNodesToStackPane()`.
    You can see I’m calling the methods in a logical order: add events, add images,
    add actors, add Scene Graph, and add cast.


    ![9781484204160_Fig11-01.jpg](OEBPS/Images/9781484204160_Fig11-01.jpg)


    [Figure 11-1](#9781484204160_Ch11.xhtml#_Fig1). Place basic configuration statements
    at top of the `.start()` method, and then the eight game method calls'
