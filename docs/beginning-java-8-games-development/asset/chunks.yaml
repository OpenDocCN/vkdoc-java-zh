    on the left side of the equals operator, and then sets the declared variable to
    a value of “E,” which signifies the direction **East**, or right. This is similar
    to how an object is declared and instantiated, except that the Java `new` keyword
    and constructor method are replaced by the data value itself, because now a variable
    (data field) is being declared instead of an object being created. You will learn
    about the different data types (I have already covered `Integer`, `String`, and
    `Object`) later in chapter (see the section “Java Data Types: Defining Data in
    Applications”).


    You can also use Java modifier keywords with variable declarations, which I will
    do in the next section, when I show you how to declare an **immutable** variable,
    also known as a **constant**, which is fixed, or **locked**, in memory and which
    cannot be altered.


    Now that I am almost finished going from the largest Java constructs to the smallest
    (data fields), I will start to cover topics that apply to all levels (classes,
    methods, variables) of Java. These concepts will generally increase in complexity
    as you progress to the end of this Java 8 primer chapter.


    ## Fixing Data Values in Memory: Defining a Data Constant in Java


    If you are already familiar with computer programming, you know that there is
    often a need to have data fields that will always contain the same data value
    and that will not change during the duration of your application run cycle. These
    are called **constants**, and they are defined, or declared, using special Java
    modifier keywords that are used to fix things in memory so that they cannot be
    changed. There are also Java modifier keywords that will restrict (or unrestrict)
    object instances, or access to certain classes inside or outside a Java class
    or package (which you will be examining in detail in the next section).


    To declare Java variables fixed, you must use a Java `final` modifier keyword.
    “Final” means the same thing as when your parents say that something is final:
    it is fixed in place, an **FOL (fact of life)**, and not going to change, ever.
    Thus, the first step in creating a constant is to add this `final` keyword, placing
    it in front of the data type keyword in your declaration.


    A convention, when declaring a Java constant (and constants in other programming
    languages), is to use **uppercase characters**, with **underscored characters**
    between each word, which signifies a constant in your code.


    If you want to create **screen width** and **screen height** constants for your
    game, you do so like this:


    ```

    final int SCREEN_HEIGHT_PIXELS = 480;

    final int SCREEN_WIDTH_PIXELS  = 640;

    ```


    If you want all the objects created by your class’s constructor method to be able
    to see and use this constant, you add the Java `static` modifier keyword, placing
    it in front of the `final` modifier keyword, like this:


    ```

    static final int SCREEN_HEIGHT_PIXELS = 480;

    static final int SCREEN_WIDTH_PIXELS = 640;

    ```


    If you want only your class, and objects created by this class, to be able to
    see these constants, you declare the constants by placing the Java `private` modifier
    keyword in front of the `static` modifier keyword, using this code:


    ```

    private static final int SCREEN_HEIGHT_PIXELS = 480;

    private static final int SCREEN_WIDTH_PIXELS = 640;

    ```


    If you want any Java class, even those outside your package (i.e., anyone else’s
    Java classes), to be able to see these constants, you declare the constants by
    placing the Java `public` modifier keyword in front of the `static` modifier keyword,
    using the following Java code:


    ```

    public static final int SCREEN_HEIGHT_PIXELS = 480;

    public static final int SCREEN_WIDTH_PIXELS = 640;

    ```


    As you can see, declaring a constant involves a significantly more detailed Java
    statement than declaring a simple variable for your class! Next, you will take
    a deeper look at Java modifier keywords, as they allow you to control things such
    as **access** to your classes, methods, and variables as well as **locking** them
    from being modified and similar high-level Java code control concepts that are
    fairly complicated.


    ## Java Modifier Keywords: Access Control and More


    Java modifier keywords are reserved Java keywords that modify the access, visibility,
    or permanence (how long something exists in memory during the execution of an
    application) for code inside the primary types of Java programming structures.
    The modifier keywords are the first ones declared outside the Java code structure,
    because the Java logic for the structure, at least for classes and methods, is
    contained within the curly braces delimiter, which comes after the `class` keyword
    and class name or after the method name and parameter list. Modifier keywords
    can be used with Java classes, methods, data fields (variables and constants),
    and interfaces.


    As you can see at the bottom of [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2),
    for the `.main()` method, created by NetBeans for your **InvinciBagel** class
    definition, which uses the `public` modifier, you can use more than one Java modifier
    keyword. The `.main()` method first uses a `public` modifier keyword, which is
    an access control modifier keyword, and then a `static` modifier keyword, which
    is a nonaccess control modifier keyword.


    ### Access Control Modifiers: Public, Protected, Private, Package Private


    Let’s cover access control modifiers first, because they are declared first, before
    nonaccess modifier keywords or return type keywords, and because they are easier
    to understand conceptually. There are four access control modifier levels that
    are applied to any Java code structure. If you do not declare an access control
    modifier keyword, a default access control level of package private will be applied
    to that code structure, which allows it to be visible, and thus usable, to any
    Java programming structure inside your Java package (in this case, `invincibagel`).


    The other three access control modifier levels have their own access control modifier
    keywords, including `public`, `private`, and `protected`. These are somewhat aptly
    named for what they do, so you probably have a good idea of how to apply them
    to either share your code publicly or protect it from public usage, but let’s
    cover each one in detail here, just to make sure, as access (security) is an important
    issue these days, inside your code as well as in the outside world. I will start
    with the least amount of access control first!


    #### Java’s Public Modifier: Allowing Access by the Public to Java Program Constructs


    The Java `public` access modifier keyword can be used by classes, methods, constructors,
    data fields (variables and constants), and interfaces. If you declare something
    public, it can be accessed by the public! This means that it can be imported and
    used by any other class, in any other package, in the entire world. Essentially,
    your code can be used in any software that is created using the Java programming
    language. As you will see in the classes that you use from the Java or JavaFX
    programming platforms (APIs), the `public` keyword is most often used in open-source
    programming Java platforms or packages that are employed to create custom applications,
    such as games.'
