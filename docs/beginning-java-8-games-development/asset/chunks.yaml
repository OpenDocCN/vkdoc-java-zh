  trans: '

    预先创建演员引擎将使你获得创建公共抽象类的经验。正如你在第 3 章中所回顾的，公共抽象类用于在 Java 中创建其他类（和对象）结构，但不会直接用于实际的游戏编程逻辑中。这就是为什么我将创建这两个“蓝图”类称为创建演员引擎，因为在本章中，我们本质上是在定义游戏的最低层级，即“演员”。


    随着本书中游戏设计的推进，我们将使用**Actor**（固定精灵）类创建**Treasure**子类，用于表示游戏过程中 InvinciBagel 可以拾取的“固定”宝藏。我们还将使用这个
    Actor 超类创建**Prop**类，用于表示游戏中 InvinciBagel 必须成功攀爬、越过、钻过、绕过或穿过的障碍物。我们还将使用 Actor 超类的
    Hero 子类创建在屏幕上移动的精灵，例如**Bagel**类。最终，我们还将创建**Enemy**类和**Projectile**类。


    除了在本章中设计两个关键的公共抽象 Actor 类之外，我们还将使用少于十个**PNG32**数字图像资源来定义我们主角 InvinciBagel 的**数字图像状态**。我们将在本章中完成这项工作，以便在本书下一章探讨事件处理时，这些类及精灵图像状态已经准备就绪，从而让玩家能够控制
    InvinciBagel 在屏幕上的移动位置，以及他用于穿越世界中障碍物时所处的状态（站立、奔跑、跳跃、腾空、飞行、着陆、闪避、蹲伏等）。


    游戏演员设计：预先定义属性


    任何热门游戏的基础都是角色——英雄和他的宿敌——以及游戏中的障碍物、武器库（投射物）和宝藏。这些“演员”中的每一个都需要拥有属性，这些属性在 Java 中使用变量定义，利用系统内存区域实时追踪每个演员在游戏过程中的状态。我打算从一开始就正确地完成这项工作，就像你希望第一次定义数据库时就能正确地定义出未来所需的数据记录结构一样。这可能是游戏开发中一个具有挑战性的阶段，因为你需要展望未来，确定你希望游戏及其演员具备哪些功能，然后预先将这些功能纳入演员的能力（变量和方法）中。图
    8-1 展示了我们将在本章中为游戏演员安装的二十多个属性中的一部分，我们将编写超过一百行代码来实现游戏的演员引擎。


    ![9781484204160_Fig08-01.jpg](img/9781484204160_Fig08-01.jpg)


    图 8-1. 设计一个公共抽象 Actor 超类和一个公共抽象 Hero 子类，用于创建精灵类


    如你所见，我正试图让变量数量保持平衡；在这种情况下，固定精灵 Actor 类和运动精灵 Hero 类各约有十几个变量。正如你在第 3 章中所知，因为我们即将创建的
    Hero 子类**扩展**了 Actor 超类，所以它实际上拥有两打（二十四个）属性或特征，因为它除了拥有自己的变量外，还继承了超类的所有变量。一个设计挑战将是尽可能多地将这些属性放入
    Actor 超类中，以便固定精灵拥有尽可能大的灵活性。一个很好的例子是，在最初几轮设计中，我将**枢轴点**（**pX**和**pY**变量）放在了 Hero
    类中，但后来我思考了一下，“如果以后我想旋转固定精灵（障碍物和宝藏）以提高关卡设计效率怎么办？”于是我将这些变量放在了 Actor 超类中，从而将这种枢轴（旋转）能力赋予了**固定精灵和运动精灵**。


    另一个我最初放在 Hero 类中，后来“向上”移动到 Actor 超类中的变量是`List<Image>`属性。在这个设计过程中，我自问：“如果出于某种原因，我希望我的固定精灵拥有不止一个图像状态呢？”我还将
    Actor 类从使用简单的`Rectangle`形状对象升级为使用**SVGPath**形状子类，这样我就可以使用比**Rectangle**更复杂的形状来定义**碰撞几何体**（即`spriteBounds`变量所代表的内容），以支持游戏后期更复杂的关卡中更高级的障碍物结构。


    另外请注意，我将**spriteFrame ImageView**（用于保存精灵图像资源）放在了 Actor 类中，因为固定精灵和运动精灵都使用图像，所以我可以将
    ImageView 放入 Actor 超类中。我在 Actor 超类中使用了**imageStates List<Image>**，这样固定精灵也能像运动精灵一样访问不同的“视觉状态”。你可能已经猜到，`List<Image>`是一个填充了
    JavaFX Image 对象的 Java List 对象。Actor 类中的`iX`和`iY`变量是图像（或初始）放置的 X 和 Y 坐标，它们用于在游戏关卡布局中放置固定精灵，但当被
    Hero 子类继承时，它们也将保存运动精灵的当前位置。其他变量则保存布尔状态（存活/死亡等）以及我们稍后需要的生命周期、伤害、偏移量、碰撞或物理数据。


    InvinciBagel 精灵图像：视觉动作状态


    除了设计最优的演员引擎类来实现游戏中的角色、宝藏和障碍物之外，另一个需要优化的重点是游戏的主角，以及角色根据玩家的移动而在不同**动画状态**之间切换的方式。从内存优化的角度来看，我们能够实现所有这些状态所使用的图像帧越少越好。正如你在图
    8-2 中所见，我将仅使用九个不同的精灵图像资源来提供 InvinciBagel 角色的所有运动状态；其中一些图像可以以多种方式使用：例如，通过使用**pX**和**pY**变量，我们可以围绕我们选择的任何枢轴点旋转这些精灵帧。一个例子是图
    8-2 中间所示的**FLY**状态的**中心枢轴点放置**，只需将此图像顺时针旋转**50**度（至水平方向）到顺时针**100**度（倾斜向下飞行，而非向上），即可实现起飞（向上飞）、飞行和着陆（向下飞）三种状态。


    ![9781484204160_Fig08-02.jpg](img/9781484204160_Fig08-02.jpg)


    图 8-2. 游戏中将使用的 InvinciBagel 角色的九个主要角色运动精灵

