    使用率以及内存分配与使用方面的表现。NetBeans Profiler 是一个强大且实用的工具，它将作为你 Java 8 游戏开发的代码基础。我将其纳入本章，是为了给你一个全面的概述，因为这一知识库将帮助你充分利用该软件，发挥其最大潜力和能力。


    显然，这是一个高级的 IDE 和软件开发工具，无法在一章简短的篇幅中完全涵盖（或许一本书可以；然而，本书并非专门介绍 NetBeans 8.0 游戏开发的书籍），因此你将在本书的几乎所有章节中进一步了解
