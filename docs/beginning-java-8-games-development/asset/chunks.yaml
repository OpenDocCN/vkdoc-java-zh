    Now that the assets you need to call your `Bagel()` constructor method that you
    created in [Chapter 10](#9781484204160_Ch10.xhtml) are in place, we can move on
    to creating a method that holds our game asset creation Java code. This amounts
    to calling the constructor methods for each of the `Actor` subclasses we eventually
    create, the first of which was the `Bagel` class, which we created first so that
    we can start to work on getting our primary character moving around the screen.


    ## Creating Your InvinciBagel Bagel Object: `.createGameActors()`


    The next step in the game actor creation process after loading your image assets
    is to call the constructor method for the game actor. To be able to do this, you
    must first subclass either the `Actor` superclass (for fixed game actors, which
    could be called “props”) or the `Hero` superclass (for motion game actors, such
    as the Hero, his enemies, and the like). I am going to create a `.createGameActors()`
    method to hold these instantiations, because even though initially there is only
    going to be one line of code inside of the body of this method, eventually, as
    the game becomes more and more complex, this method will serve as a “roadmap”
    regarding what game actor assets we have installed. This method will be declared
    as a `private` method, since the `InvinciBagel` class will be controlling the
    creation of these game actors, and will feature a `void` return type, because
    the method doesn’t return any values to the calling entity (the `.start()` method
    in this case). Inside of the method we’ll call the `Bagel()` constructor method,
    using some “placeholder” SVG path data, as well as a `0,0` initial X,Y screen
    location, and finally, the nine sprite cels using a comma-delimited list at the
    end of the constructor method call. The method body and object instantiation will
    use the following three lines of Java code:


    ```

    private void createGameActors() {

        iBagel = new Bagel("M150 0 L75 500 L225 200 Z", 0, 0, iB0,iB1,iB2,iB3,iB4,iB5,iB6,iB7,iB8);

    }

    ```


    As you can see in [Figure 11-6](#9781484204160_Ch11.xhtml#Fig6), the code is error-free,
    and you now have an `iBagel` `Bagel` object that you can now use to start to develop
    the InvinciBagel sprite movement around the game play stage, which is usually
    the entire display screen. We’ll be wiring this `Bagel` `Actor` up to the JavaFX
    pulse timing engine a bit later on during this chapter.


    ![9781484204160_Fig11-06.jpg](OEBPS/Images/9781484204160_Fig11-06.jpg)


    [Figure 11-6](#9781484204160_Ch11.xhtml#_Fig6). Add a `private void createGameActors()`
    method; add an `iBagel` object instantiation via `Bagel()` constructor


    In case you’re wondering what the `SVGdata` `String` object `"M150 0 L75 200 L225
    200 Z"` does, it is shorthand for the following line drawing instructions (commands).
    The `M` is a “Move Absolute” command and tells the line draw (or in this case
    a path draw) operation to start at location `150,0`. The `L` is a “Line Draw To”
    command and tells the SVG data to draw a line from `150,0` to `75,200`. The second
    `L` draws a line from `75,200` to `225,200`, giving us two sides of the triangle
    shape. The `Z` is a “Close Shape” command, which, if the shape is open, as ours
    is currently, will draw a line to close the shape. In this case, that would equate
    to drawing a line from `225,200` to `150,0`, giving us three sides to our triangle
    shape, closing the open path, and giving us a valid collision detection boundary.


    We will be replacing this with a more complex collision shape later on, during
    [Chapter 16](#9781484204160_Ch16.xhtml) covering collision detection polygon creation,
    SVG data, and collision detection logic. Our actual collision polygon will contain
    many more numbers, making our `Bagel()` constructor method call unwieldy. As you
    might imagine, at that point in the game (no pun intended), I will probably create
    a work process that will be used specifically for constructing collision shapes.
    This work process will show you how to generate SVG polygon data using GIMP so
    that you can place SVG data into its own `String` object, and reference that in
    your `Actor` object constructor. If you wanted to turn collision data creation
    into its own method as well, this is how that would look, using a (theoretical)
    `.createActorCollisionData()` method:


    ```

    String cBagel; // Create String variable named cBagel (collision data Bagel) at
    top of class


    private void createActorCollisionData() {

        cBagel = "M150 0 L75 500 L225 200 Z";

    }

    private void createGameActors() {

        iBagel = new Bagel(cBagel, 0, 0, iB0,iB1,iB2,iB3,iB4,iB5,iB6,iB7,iB8);

    }

    ```


    You could also, later on, create a method for `Image` sprite `List<Actor>` object
    loading. This would pass the `ArrayList` as a parameter, instead of a comma-delimited
    `List`. Note that if you did this, you would also need to change your `Actor`
    abstract class constructor to take in an `ArrayList<Actor>` object, instead of
    an `Image...` `List` of `Image` objects.


    Next, let’s take a look at how we add our newly created `iBagel` object into our
    game’s Scene Graph object, which is currently a `Stackpane` object named `root`.


    ## Adding Your iBagel to the Scene Graph: `.addGameActorNodes()`'
