    Set<Actor> 对象中。这通过在 .addAll() 方法调用内部使用 **Arrays.asList((Actor[]) actors))** 结构来实现，该结构构造了与
    Set<E> 对象类型使用 .addAll() 方法调用兼容（必需）的 **Actor[]** 数组（名为 **actors**）。该方法体的第二个 **else{...}**
