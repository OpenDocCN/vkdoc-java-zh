    基于你的 Java 8 游戏项目可以为你创建的一些输出、统计数据和可视化报告。


    在下一章中，我将概述 Java 8 编程语言，以确保你跟上 Java 8 的工作方式；如果你愿意，可以称之为 Java 入门章节。


    第 3 章


    ![image](img/frontdot.jpg)


    Java 8 入门：Java 8 概念与原理介绍


    让我们通过探索 **Java 8** 编程语言背后的基本概念和原理，来巩固你在上一章中获得的关于 NetBeans IDE 8.0 的知识。Java JDK
    8 将是你 Java 8 游戏以及 NetBeans IDE 8.0 的基础，因此花时间学习本章非常重要，本章是一份 Java 8 “入门指南”，为你概述这种全球流行的计算机（和设备）编程语言。


    当然，随着你阅读本书的深入，你还会学习更高级的概念，例如 **Lambda 表达式**，以及其他 Java 8 组件，例如最新的 **JavaFX** 多媒体引擎。因此请注意，本章将涵盖最**基础**的
    Java 编程语言概念、技术和原理，涵盖目前广泛用于计算机、网络电视和手持设备的三个主要 Java SE 版本。


    这些被数十亿用户使用的 Java 版本包括：用于 32 位 Android 4.x 操作系统及应用程序的 **Java 6**；用于 64 位 Android
    5.x 操作系统及应用程序的 **Java 7**；以及用于许多流行操作系统（如 Microsoft Windows、Apple OS X、Oracle Solaris
    以及大量流行的 Linux “发行版”或分发版（如 SUSE、Ubuntu、Mint、Mandrake、Fedora 和 Debian））的 Java 8。


    你将先从最简单的概念（Java 的最高层级）开始，然后逐步深入到更困难的概念（Java 编程结构的核心）。你将首先学习 Java **语法**或术语，包括什么是
    Java **关键字**，Java 如何**界定**其编程结构，以及如何为代码添加**注释**。首先研究这些内容将使你在阅读 Java 代码时领先一步，因为能够从关于代码的注释（通常由
    Java 代码的作者使用注释编写）中辨别出 Java 代码本身非常重要。


    然后，你将考虑 **API** 这一顶层概念，以及什么是**包**，以及如何**导入**和使用 Java 包提供的现有代码。这些 Java 包是 Java
    8 API 的一部分，并且值得注意的是，你可以创建自己的自定义 Java 包，其中包含你的游戏或应用程序。


    之后，你将考虑这些 Java 包内部包含的结构，它们被称为 Java **类**。Java 类是 Java 编程的基础，可用于构建你的应用程序（在本例中是你的
    Java 8 游戏）。你将了解这些类包含的**方法**、**变量**和**常量**，以及什么是超类和子类，什么是嵌套类和内部类，以及如何使用它们。


    最后，你将发现什么是 Java **对象**，并了解它们如何构成**面向对象编程**（**OOP**）的基础。你还将了解什么是**构造**方法，以及它如何通过一种特殊的方法（称为**构造方法**，其名称与包含它的类相同）来创建
    Java 对象。让我们开始吧——我们有很多内容要覆盖！


    Java 语法：注释与代码分隔符


    关于**语法**（即 Java 如何在其编程语言中编写内容），有几件事你需要立即考虑。这些主要的语法**规则**是为了让 Java **编译器**能够理解你如何构建
    Java 代码。Java **编译**是 Java 编程过程的一部分，在此过程中，JDK 编译器（程序）将你的 Java 代码转换为**字节码**，由 Java
    **运行时**引擎（JRE）执行或运行。这个 JRE（在本例中是 JRE 8）安装在你最终用户的计算机系统上。Java 编译器需要知道你的 Java 代码块从哪里开始和结束，你的单个
    Java 编程语句或指令在这些 Java 代码块内从哪里开始和结束，以及你的代码中哪些部分是 Java 编程逻辑，哪些部分是给自己的注释，或者是给你的游戏项目编程团队其他成员的注释（笔记）。


    让我们从注释开始，因为这个主题最容易掌握，而且你已经在第 2 章的 InvinciBagel 游戏引导 Java 代码中看到了注释。向 Java 代码中添加注释有两种方式：单行注释，也称为“**行内**”注释，放在一行
    Java 代码逻辑之后；以及多行注释，或“**块**”注释，放在一行 Java 代码或一个 Java 代码块（一种 Java 代码结构）之前（或之后）。

