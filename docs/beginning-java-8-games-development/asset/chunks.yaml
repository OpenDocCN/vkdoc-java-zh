    involved work process, allowing us to create collision polygons by hand using
    fewer data point pairs. This process involved using the Path Tool in GIMP to create
    a collision polygon by hand, which gave us far more control over generating as
    few data points as possible. We also looked at the CodeAndWeb PhysicsEditor software,
    which can be used across all game development platforms.


    In the next chapter, we are going take a look at how to implement enhanced game
    play elements into a game, including the scoring engine, adversaries, treasure,
    an auto-attack engine, and physics simulation.


    ## CHAPTER 17


    ![image](OEBPS/Images/frontdot.jpg)


    # Enhancing Game Play: Creating a Scoring Engine, Adding Treasure and an Enemy
    Auto-Attack Engine


    Now that we’ve implemented collision detection for our game, as well as putting
    the foundation in place for a scoring engine, let’s finish coding the scoring
    engine that is called from the `.checkCollisions()` method, and then add some
    more game play elements to take advantage of this scoring engine, as well as to
    make the game play more interesting. To implement our scoring engine display,
    we will create a `gameScore` integer variable and `scoreText` Text object in our
    `InvinciBagel.java` class. We will also create a `scoreFont` Font object, and
    use it to style the `scoreText` Text object, to make it stand out better. We will
    also learn how to use the Java `instanceof` evaluator in the conditional `if()`
    statement in the `.scoringEngine()` method that we will be creating, and use this
    to determine what type of Actor object the InvinciBagel has collided with. Of
    course, we will then increment our `gameScore` variable accordingly.


    We’ll also create a `Treasure.java` class, so that we can add valuable bounty
    to the game for our InvinciBagel character to pick up, while he is evading constant
    Enemy attacks from the `InvinciBeagle`, or iBeagle for short, who can shoot both
    deadly bullets (iBullets) as well as Cream Cheese Balls (iCheese) Projectile objects.
    We will also be creating these `Enemy.java` and `Projectile.java` classes during
    this chapter, so we will be using all of the knowledge that you’ve learned during
    this book to create some very advanced Java 8 classes and methods during the course
    of this chapter.


    Once we have the Enemy and Projectile classes in place, the real challenge comes
    in creating an **auto-attack engine**, so the game itself plays against the player,
    so that we can create a **single-player** version of this game. We will do this
    by wiring the `Enemy.java` class into the `GamePlayLoop.java` class, by calling
    the Enemy class `.update()` method from the `GamePlayLoop` class `.handle()` method,
    which will allow us to harness the JavaFX pulse timing engine for the iBeagle
    Enemy object. Once this is done, we can code the Enemy object, and give it a life
    of its own, having it appear randomly on the screen, and attack the InvinciBagel
    by shooting deadly bullets, or scrumptious cream cheese balls.


    We will build this auto-attack engine logically and gradually, first by making
    the iBeagle Enemy appear on either side of the screen, and flip around to face
    the iBagel character correctly. Then we will add programming logic that will animate
    the iBeagle onto the screen, and then back off of the screen. Then we will make
    him shoot a bullet or cream cheese ball, and then we will add some timing code
    in order to make his movement far more realistic.


    After that, we will add **randomization** to the appearance, locations, and movement,
    so that the game player cannot tell where an iBeagle attack is going to come from.
    After that we will add physics simulation so that the bullets and cream cheese
    balls are affected by drag and gravity, all of which will make the game play more
    and more realistic, as the chapter progresses on, through the end of the book!


    I hope that you have enjoyed your learning experience during the book, as much
    as I have enjoyed writing it for you. Now let’s get into making our game play
    more and more challenging and professional, as we learn even more about Java 8
    and JavaFX classes and programming techniques.


    ## Creating the Score UI Design: Text and Font Objects


    The first thing that we need to do to implement a display for our scoring engine
    is to open the `InvinciBagel.java` tab in NetBeans, and add an **integer** variable
    to hold a numeric score accumulation, and a **Text** UI element object, to display
    the score on the bottom of the screen, alongside our other UI elements. The Text
    class in JavaFX is used to work with text elements in your games, and even has
    its own `javafx.scene.text` package, because text is an important element in applications.
    The integer data type allows your game players to score well into the billions
    of points, so this should be adequate for holding any magnitude of numeric score
    your game player can rack up. We will place these Java variable and object declarations,
    which can be seen highlighted in [Figure 17-1](#9781484204160_Ch17.xhtml#Fig1),
    at the very top of the `InvinciBagel.java` class, right after the WIDTH and HEIGHT
    constant declarations, and the Java code should look like the following:


    ```

    int gameScore = 0;

    Text scoreText;

    ```


    ![9781484204160_Fig17-01.jpg](OEBPS/Images/9781484204160_Fig17-01.jpg)


    [Figure 17-1](#9781484204160_Ch17.xhtml#_Fig1). Add an integer variable named
    `gameScore` and initialize it to 0, then add a Text object named `scoreText`


    Mouse-over the wavy red error highlighting, and click next to the line of code
    containing this error, to select it (which is shown using a light blue color).
    Next, use an **Alt-Enter** work process to bring up the error resolution helper
    pop-up, shown at the bottom of [Figure 17-1](#9781484204160_Ch17.xhtml#Fig1),
    and double-click on the “Add import for `javafx.scene.text.Text`” option to have
    NetBeans write this Text class import statement for you.


    Now we are ready to open the `.createSplashScreenNodes()` method, and instantiate
    this Text object named `scoreText`, using a Java `new` keyword and the `Text()`
    constructor method. After you do this, you can call the `.setText()` method, and
    reference the `gameScore` integer, using the `String.valueOf()` method, as well
    as positioning it in your UI layout design, using the `.setLayoutX()` and `.setLayoutX()`
    methods, using the following Java code shown in [Figure 17-2](#9781484204160_Ch17.xhtml#Fig2):


    ```

    scoreText = new Text();

    scoreText.setText(String.valueOf(gameScore));

    scoreText.setLayoutY(365);

    scoreText.setLayoutX(565);

    ```


    ![9781484204160_Fig17-02.jpg](OEBPS/Images/9781484204160_Fig17-02.jpg)


    [Figure 17-2](#9781484204160_Ch17.xhtml#_Fig2). Instantiate a `scoreText` object
    using a Java `new` keyword and call the `.setText()` and `.setLayout()` methods


    For now, we are going to use the X,Y position value of **365,565**, as you can
    see in [Figure 17-2](#9781484204160_Ch17.xhtml#Fig2). To be able to style this
    Text object, we will need to declare a `private Font` object, named `scoreFont`,
    as seen in [Figure 17-3](#9781484204160_Ch17.xhtml#Fig3). Use the **Alt-Enter**
    work process again on the red error highlight, and select the “Add import for
    `javafx.scene.text.Font`” option.


    ![9781484204160_Fig17-03.jpg](OEBPS/Images/9781484204160_Fig17-03.jpg)


    [Figure 17-3](#9781484204160_Ch17.xhtml#_Fig3). Add a `private Font scoreFont`
    declaration and use Alt-Enter and select “Add import `javafx.scene.text.Font`”


    Before we can use this `scoreFont` Font object to style the `scoreText` Text object,
    we will need to add this `scoreText` Text Node object to the JavaFX Scene Graph
    by using the `root.getChildren().add(scoreText);` Java statement, which is shown
    highlighted in [Figure 17-4](#9781484204160_Ch17.xhtml#Fig4). If you forget to
    do this, you will see only white on your game screen after you click the PLAY
    GAME Button!'
