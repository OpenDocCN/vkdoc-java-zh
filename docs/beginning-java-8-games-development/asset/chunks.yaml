- fmt: "# Java 注释与代码结构\n\n## 单行注释\n\n单行注释通常用于解释某一行 Java 逻辑（我称之为 Java 编程“**语句**”）的作用，即该行\
    \ Java 代码在整个代码结构中要完成的任务。Java 中的单行注释以**双正斜杠**序列开头。例如，如果你想注释在[第 2 章](#9781484204160_Ch02.xhtml)中创建的\
    \ `InvinciBagel` 启动代码中的某条 `import` 语句，你可以在该行代码后添加双正斜杠。注释后的 Java 代码如下所示（另请参见[图\
    \ 3-1](#9781484204160_Ch03.xhtml#Fig1)，右下角）：\n\n```\nimport javafx.stage.Stage\
    \ // This line of code imports the Stage class from JavaFX.stage package\n```\n\
    \n![9781484204160_Fig03-01.jpg](OEBPS/Images/9781484204160_Fig03-01.jpg)\n\n[图\
    \ 3-1](#9781484204160_Ch03.xhtml#_Fig1). 多行注释（顶部前五行代码）和单行注释（底部后三行代码）\n\n## 多行注释\n\
    \n接下来，我们来看一下**多行注释**，如[图 3-1](#9781484204160_Ch03.xhtml#Fig1) 顶部所示，位于 `package`\
    \ 语句（你将在下一节中学习）之上。如你所见，这些 Java 块注释的实现方式不同，使用**单个正斜杠紧挨着一个星号**来开始注释，以及其反向形式——**一个星号紧挨着单个正斜杠**——来结束多行注释。\n\
    \n正如你在 NetBeans 8.0 的 `InvinciBagel.java` 代码编辑选项卡中所见，就像我将单行注释对齐以使其看起来美观（酷）且有条理一样，Java\
    \ 块注释的**惯例**也是将星号对齐，其中一个作为开始注释分隔符，另一个作为结束注释分隔符。\n\n![Image](OEBPS/Images/sq.jpg)\
    \ **定义** Java 编程中的“**惯例**”是指大多数（如果不是全部）Java 程序员实现某个 Java 构造的方式。在这种情况下，这就是 Java\
    \ 代码块注释的**样式**。\n\n## Javadoc 注释\n\n还有第三种注释类型，称为 **Javadoc** 注释，你在 Java 8 游戏开发中不会用到它，因为你的代码旨在用于创建游戏，而不是分发给公众。如果你打算编写一个供他人创建游戏的\
    \ Java 游戏引擎，那时你才会使用 Javadoc 注释来为你的 Java 8 游戏引擎添加文档。Javadoc 注释可以被 JDK 中的 `javadoc.exe`\
    \ 工具使用，根据你在 Javadoc 注释中放入的文本内容，为包含 Javadoc 注释的 Java 类生成 HTML 文档。\n\nJavadoc 注释类似于多行注释，但它使用两个星号来创建\
    \ Javadoc 注释的开始分隔符，如下所示：\n\n```\n/**  This is an example of a Java Documentation\
    \ (Javadoc) type of Java code comment.\n     This is a type of comment which will\
    \ automatically generate Java documentation!\n*/\n```\n\n如果你想在 Java 语句或编程结构的中间插入注释（作为专业\
    \ Java 程序员，你绝不应该这样做），请使用多行注释格式，如下所示：\n\n```\nimport  /* This line of code imports\
    \ the Stage class */  javafx.stage.Stage;\n```\n\n这不会产生任何错误，但会混淆代码的读者，因此不要以这种方式注释代码。然而，下面这种使用双正斜杠的单行注释方式会在\
    \ NetBeans 8.0 中产生编译器错误：\n\n```\nimport  // This line of code imports the Stage\
    \ class  javafx.stage.Stage\n```\n\n在这里，编译器只会看到单词 `import`，因为单行注释会一直持续到行尾，而多行注释则使用块注释分隔符序列（星号和正斜杠）明确结束。因此，编译器会为这第二个不正确的注释代码抛出错误，本质上是在问：“导入什么？”\n\
    \n## 代码分隔符\n\n正如 Java 编程语言使用双正斜杠和斜杠-星号配对来**分隔** Java 代码中的注释一样，其他一些关键字符也用于分隔 Java\
    \ 编程语句以及整个 Java 编程逻辑块（我常称之为 Java 代码结构）。\n\n**分号**在 Java（所有版本）中用于分隔或划分 Java 编程语句，例如[图\
    \ 3-1](#9781484204160_Ch03.xhtml#Fig1) 中看到的 `package` 和 `import` 语句。Java 编译器会查找启动\
    \ Java 语句的 Java 关键字，然后获取该关键字之后直到分号（这是告诉 Java 编译器“我已完成此 Java 语句的编码”的方式）的所有内容，作为\
    \ Java 代码语句的一部分。例如，要在 Java 应用程序顶部声明 Java 包，你可以使用 Java `package` 关键字、包名，然后是一个分号，如下所示（另请参见[图\
    \ 3-1](#9781484204160_Ch03.xhtml#Fig1)）：\n\n```\npackage invincibagel;\n```\n\n\
    `import` 语句也使用分号作为分隔符，如图所示。`import` 语句提供 `import` 关键字、要导入的包和类，最后是分号分隔符，如下面的 Java\
    \ 编程语句所示：\n\n```\nimport javafx.application.Application;\n```\n\n接下来，你应该看看**花括号\
    \ `{ }`** 分隔符，它与多行注释分隔符类似，有一个**左花括号**，用于标记（即向编译器指示）一组 Java 语句的开始，以及一个**右花括号**，用于标记这组\
    \ Java 编程语句的结束。花括号允许你在许多 Java 构造中使用多条 Java 编程语句，包括 Java 类、方法、循环、条件语句、Lambda 表达式和接口中，所有这些你将在本书中学习。\n\
    \n如[图 3-2](#9781484204160_Ch03.xhtml#Fig2) 所示，使用花括号分隔的 Java 代码块可以相互嵌套（包含），从而允许更复杂的\
    \ Java 代码构造。第一个（最外层）使用花括号的代码块是 `InvinciBagel` 类，然后其他构造按如下方式嵌套：`start()` 方法、`.setOnAction()`\
    \ 方法和 `handle()` 方法。随着本章的推进，你将了解所有这些代码的作用。我现在希望你（借助[图 3-2](#9781484204160_Ch03.xhtml#Fig2)\
    \ 中的红色方块）想象的是，花括号如何允许你的方法（和类）定义它们自己的代码块（结构），每个代码块都是更大 Java 结构的一部分，其中最大的 Java 结构是\
    \ `InvinciBagel.java` 类本身。注意每个左花括号都有一个匹配的右花括号。还要注意代码的缩进，最内层的 Java 代码结构缩进得最靠右。每个代码块额外缩进**四个字符**或空格。如你所见，类没有缩进（0），`start()`\
    \ 方法缩进 4 个空格，`.setOnAction()` 方法缩进 8 个空格，`handle()` 方法缩进 12 个空格。NetBeans 8.0 会自动为你缩进每个\
    \ Java 代码结构！还要注意，NetBeans 8.0 会在 IDE 中绘制非常细的（灰色）缩进参考线，以便你可以根据需要直观地对齐代码结构。\n\n\
    ![9781484204160_Fig03-02.jpg](OEBPS/Images/9781484204160_Fig03-02.jpg)"
  raw: 'The **single-line comment** is usually utilized to add a comment regarding
    what that line of Java logic, which I like to call a Java programming “**statement**,”
    is doing, that is, what that line of Java code is there to accomplish within your
    overall code structure. Single-line comments in Java start with the **double forward
    slash** sequence. For instance, if you wanted to comment one of the import statements
    in the InvinciBagel bootstrap code that you created in [Chapter 2](#9781484204160_Ch02.xhtml),
    you would add double forward slashes after the line of code. This is what your
    Java code would look like once it has been commented (see also [Figure 3-1](#9781484204160_Ch03.xhtml#Fig1),
    bottom right):


    ```

    import javafx.stage.Stage // This line of code imports the Stage class from JavaFX.stage
    package

    ```


    ![9781484204160_Fig03-01.jpg](OEBPS/Images/9781484204160_Fig03-01.jpg)


    [Figure 3-1](#9781484204160_Ch03.xhtml#_Fig1). Multiline comments (first five
    lines of code, at the top) and single-line comments (last three lines of code,
    at the bottom)


    Next, let’s take a look at **multiline comments**, which are shown at the top
    of [Figure 3-1](#9781484204160_Ch03.xhtml#Fig1), above the package statement (which
    you will be learning about in the next section). As you can see, these Java block
    comments are done differently, using a **single forward slash next to an asterisk**
    to start the comment and the reverse of that, an **asterisk next to a single forward
    slash**, to end the multi-line comment.


    As you can see in the **InvinciBagel.java** code editing tab in NetBeans 8.0,
    just as I lined up the single-line comments to look pretty (cool) and organized,
    so too the Java **convention** in block commenting is to line up the asterisks,
    with one as the beginning comment delimiter and one as the ending comment delimiter.


    ![Image](OEBPS/Images/sq.jpg) **Definition**  A “**convention**” in Java programming
    is the way that most, if not all, Java programmers will implement a Java construct.
    In this case, this is the way that the Java code block commenting is **styled**.


    There is a third type of comment, called a **Javadoc** comment, which you will
    not be using in your Java 8 game development, as your code is intended to be used
    to create a game, and not to be distributed to the public. If you were going to
    write a Java game engine for use by others to create games, that is when you would
    use Javadoc comments to add documentation to your Java 8 game engine. A Javadoc
    comment can be used by the **javadoc.exe** tool in the JDK to generate HTML documentation
    for the Java class containing Javadoc comments, based on the text content that
    you put inside the Javadoc comment.


    A Javadoc comment is similar to a multiline comment, but it uses instead two asterisks
    to create the opening Javadoc comment delimiter, as shown here:


    ```

    /**  This is an example of a Java Documentation (Javadoc) type of Java code comment.

         This is a type of comment which will automatically generate Java documentation!

    */

    ```


    If you wanted to insert a comment right in the middle of your Java statement or
    programming structure (which you should never do as a professional Java programmer),
    use the multiline comment format, like so:


    ```

    import  /* This line of code imports the Stage class */  javafx.stage.Stage;

    ```


    This will not generate any errors, but would confuse the readers of this code,
    so do not comment your code in this way. The following single line comment way
    of commenting this code, using the double forward slash, would, however, generate
    compiler errors in NetBeans 8.0:


    ```

    import  // This line of code imports the Stage class  javafx.stage.Stage

    ```


    Here, the compiler will see only the word **import**, as the single-line comment
    goes to the end of the line, compared with the multiline comment, which is specifically
    ended using the block comment delimiter sequence (asterisk and a forward slash).
    So, the compiler will throw an error for this second improperly commented code,
    essentially asking, “Import what?”


    Just as the Java programming language uses the double forward slash and slash-asterisk
    pairing to **delimit** the comments in your Java code, so too a couple of other
    key characters are used to delimit Java programming statements as well as entire
    blocks of Java programming logic (I often call these Java code structures).


    The **semicolon** is used in Java (all versions) to delimit or separate Java programming
    statements, such as the package and import statements seen in [Figure 3-1](#9781484204160_Ch03.xhtml#Fig1).
    The Java compiler looks for a Java keyword, which starts a Java statement, and
    then takes everything after that keyword, up to the semicolon (which is the way
    to tell the Java compiler, “I am done coding this Java statement”), as being part
    of the Java code statement. For instance, to declare the Java package at the top
    of your Java application, you use the Java **package** keyword, the name of your
    package, and then a semicolon, as follows (see also [Figure 3-1](#9781484204160_Ch03.xhtml#Fig1)):


    ```

    package invincibagel;

    ```


    Import statements are delimited using the semicolon as well, as can be seen in
    the figure. The import statement provides the import keyword, the package and
    class to be imported, and, finally, the semicolon delimiter, as shown in the following
    Java programming statement:


    ```

    import javafx.application.Application;

    ```


    Next, you should take a look at the **curly { braces** (**{. . .})** delimiter,
    which, like the multiline comment delimiter, has an **opening curly brace**, which
    delimits (that is, which shows a compiler) the start of a collection of Java statements,
    as well as a **closing curly brace**, which delimits the end of the collection
    of Java programming statements. The curly braces allow you to use multiple Java
    programming statements inside a number of Java constructs, including inside of
    Java classes, methods, loops, conditional statements, lambda expressions, and
    interfaces, all of which you will be learning about over the course of this book.


    As illustrated in [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2), Java code blocks
    delimited using curly braces can be nested (contained) inside of each other, allowing
    far more complex Java code constructs. The first (outermost) code block using
    curly braces is the InvinciBagel class, with other constructs then nested as follows:
    the **start()** method, the **.setOnAction()** method, and  the **handle()** method.
    You will be examining what all this code does as this chapter progresses. What
    I want you to visualize now (with the help of the red squares in [Figure 3-2](#9781484204160_Ch03.xhtml#Fig2))
    is how the curly braces are allowing your methods (and class) to define their
    own code blocks (structures), each of which is a part of a larger Java structure,
    with the largest Java structure being the **InvinciBagel.java** class itself.
    Note how each opening curly brace has a matching closing curly brace. Note as
    well the indenting of the code, such that the innermost Java code structures are
    indented the farthest to the right. Each block of code is indented by an additional
    **four characters** or spaces. As you can see, the class is not indented (0),
    the **start()** method is 4 spaces in, the **.setOnAction()** method is 8 spaces
    in, and the **handle()** method is 12 spaces in. NetBeans 8.0 will indent each
    of your Java code structures for you! Also notice that NetBeans 8.0 draws very
    fine (gray) indentation guide lines in the IDE so that you can line up your code
    structures visually, if you prefer.


