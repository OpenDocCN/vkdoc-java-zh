- fmt: 'The trick to minimizing the Scene Graph is to use as few nodes as possible
    to implement a complete design, and, as you can see in [Figure 6-3](#9781484204160_Ch06.xhtml#Fig3),
    this can be accomplished with one `StackPane` root node, one `VBox` branch (parent)
    node, and seven leaf (children) nodes (one `TableView`, two `ImageView`, and four
    `Button` UI controls). When you get into coding the Scene Graph next (finally!),
    you will use only 14 objects, and import only 12 classes, to make the entire top
    level for your `InvinciBagel` game, which you designed in the previous section,
    a reality. The `TableView` will overlay the `ImageView` composite, which contains
    the information screen layers of the design. This `TableView` object will be added
    in later stages of your game design. An `ImageView` backplate will contain the
    `InvinciBagel` artwork; an `ImageView` compositing layer will contain three different
    transparent images, which will seamlessly overlay the backplate image, based on
    the `ActionEvents` (clicks of the `Button` controls); and a `VBox` Parent UI layout
    container will contain the four `Button` controls. You will also create an `Insets`
    object to hold the padding values to fine-tune the button bank alignment.


    ![9781484204160_Fig06-03.jpg](OEBPS/Images/9781484204160_Fig06-03.jpg)


    [Figure 6-3](#9781484204160_Ch06.xhtml#_Fig3). Primary splash screen Scene Graph
    node hierarchy, the objects it contains, and the assets it references


    Because a `Button` object cannot be positioned individually, I had to use the
    `HBox` class, along with an `Insets` class and a `Pos` class, to contain and position
    the `Button` controls. I will be going over the classes you will be using for
    this high-level design in this chapter so that you have an overview of every class
    that you are going to be adding to your `InvinciBagel` class to create this top-level
    UI design.


    The way I optimized the Scene Graph use for the four different screens needed
    to match the four different buttons was to use one `ImageView` as a backplate
    to contain the `InvinciBagel` splash screen artwork and then one more `ImageView`
    to contain different composite images (overlays) that use transparency (alpha
    channel). In this way, you can simulate four different screens, using only two
    `ImageView` Scene Graph Node objects.


    Finally, a `TableView` Scene Graph node will contain the table structure for the
    high scores table. This will be created via the score engine, which you will be
    creating last, after you finish your entire game design and programming. For now,
    you will leave the High Scores and Play Game button code unimplemented.


    ## Scene Graph Code: Optimizing Your Current InvinciBagel Class


    I know you are eager to work on the `InvinciBagel` class code, so let’s clean
    up, organize, and optimize the existing Java code to implement this top-level
    UI screen design. First, put the object declaration and naming Java code at the
    top of the `InvinciBagel` class. This is more organized, and all the methods that
    are inside your class will be able to see and reference these objects without
    using Java modifier keywords. As you can see in [Figure 6-4](#9781484204160_Ch06.xhtml#Fig4),
    these include your existing `scene` Scene object, `root` StackPane object, and
    `btn` Button object (which I am renaming `gameButton`). I added three other `Button`
    objects, named `helpButton`, `scoreButton`, and `legalButton`, all declared and
    named using a single line of Java code, as well as two `ImageView` objects, named
    `splashScreenbackplate` and `splashScreenTextArea`. You also need to create four
    `Image` objects to hold digital image assets, which will be displayed in the `ImageView`
    nodes; I have named these `splashScreen`, `instructionLayer`, `legalLayer`, and
    `scoresLayer` and declared them, using one compound Java statement. Finally, you
    declare and name the `buttonContainer` VBox object and the `buttonContainerPadding`
    Insets object. NetBeans will write import statements for you, so long as you use
    the `Alt+Enter` keyboard shortcut, selecting the correct `javafx` package and
    class path. The imports are shown at the top of the figure.


    ![9781484204160_Fig06-04.jpg](OEBPS/Images/9781484204160_Fig06-04.jpg)


    [Figure 6-4](#9781484204160_Ch06.xhtml#_Fig4). Declaring and naming the 14 objects
    that will make up your Scene Graph hierarchy at the top of the class


    You will be taking a look at all these JavaFX classes in detail in this chapter
    so that you learn what they are used for and what they can do for your Java applications.


    ## Scene Graph Design: Streamlining the Existing .start() Method


    Now, you can optimize the `.start()` method so that it only has one or two dozen
    lines of code. First, modularize the Scene Graph node creation Java routines into
    their own `createSplashScreenNodes()` method, which will be called at the top
    of the `.start()` method, as can be seen in [Figure 6-5](#9781484204160_Ch06.xhtml#Fig5).
    After all the nodes are created in this method, create an `addNodesToStackPane()`
    method to add the nodes to the `StackPane` root node, and then have the three
    `primaryStage` lines of code configuring and managing the `Stage` object and,
    finally, the `ActionEvent` handling code routines that “wire” the `Button` UI
    controls to the Java code to be executed when they are clicked.


    ![9781484204160_Fig06-05.jpg](OEBPS/Images/9781484204160_Fig06-05.jpg)


    [Figure 6-5](#9781484204160_Ch06.xhtml#_Fig5). Organize the `.start()` method
    with the `createSplashScreenNodes()` and `addNodesToStackPane()` methods


    As you can see, after you duplicate the `.setOnAction()` constructs for each `Button`
    object, when you collapse the `EventHandler` routines, you have nine lines of
    code: one for creating nodes, one for adding nodes to root, three for `Stage`
    object setup, and four for UI Button event-handling. This is pretty compact, if
    you consider the amount of functionality you are adding to the top level of your
    game structure (game play, instructions, legal, credits, scoreboard).'
