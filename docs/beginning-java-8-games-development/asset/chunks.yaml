  raw: 'Weaponizing the Enemy: Shooting Projectile Objects


    Now that we have the Enemy animating onto (and off of) both sides of the screen,
    the next level of complexity that we need to add is the shooting of Projectile
    objects. We’ll first implement **iBullet** objects (negative score generation)
    and later **iCheese** objects (positive score generation), both of which will
    require our Enemy.java class to have visibility into the InvinciBagel class. Thus,
    the first thing that we’ll need to do is to modify the **Enemy()** constructor
    method to accept an InvinciBagel object using the Java **this** keyword, much
    like we did with our Bagel() constructor method. Go into the InvinciBagel.java
    class and add a this keyword to the front end of (beginning of) your Enemy() constructor
    parameter list, as shown highlighted in [Figure 17-39](#9781484204160_Ch17.xhtml#Fig39),
    using the following amended Enemy() constructor method call:


    ```

    iBeagle = new Enemy(this, "M0 6 L0 52 70 52 70 70 70 93 115 45 115 0 84 0 68 16
    Z",520,160,iE0);

    ```


    ![9781484204160_Fig17-39.jpg](OEBPS/Images/9781484204160_Fig17-39.jpg)


    [Figure 17-39](#9781484204160_Ch17.xhtml#_Fig39). Add a Java this keyword inside
    the Enemy() constructor method call to pass over the InvinciBagel object


    For this to work, you need to also update your Enemy.java class to accommodate
    the **InvinciBagel** object. Add an **InvinciBagel invinciBagel;** object declaration,
    at the top of the Enemy.java class, and edit your Enemy() constructor method to
    support this object by adding an **InvinciBagel iBagel** parameter at the head
    end (beginning) of the parameter list definition. Inside of the Enemy() constructor
    method, set the invinciBagel InvinciBagel object equal to the iBagel InvinciBagel
    object reference passed into the Enemy() constructor method in its parameter list.
    The Java code for the amended Enemy() constructor method body is shown in [Figure
    17-40](#9781484204160_Ch17.xhtml#Fig40), and should look like the following:


    ```

    InvinciBagel invinciBagel;

    public Enemy( InvinciBagel iBagel,

                  String SVGdata, double xLocation, double yLocation, Image... spriteCels)
    {

            super(SVGdata, xLocation, yLocation, spriteCels);

            invinciBagel = iBagel;

            spriteFrame.setTranslateX(xLocation);

            spriteFrame.setTranslateY(yLocation);

            isAlive = true;

            isBonus = true;

            hasValu = true;

        }

    ```


    ![9781484204160_Fig17-40.jpg](OEBPS/Images/9781484204160_Fig17-40.jpg)


    [Figure 17-40](#9781484204160_Ch17.xhtml#_Fig40). Modify the Enemy() constructor
    method in the Enemy class to add an InvinciBagel object named iBagel


    Now that the Enemy class (object) can see into the InvinciBagel class (object),
    we’re ready to add projectiles.


    Creating a Projectile Infrastructure: Adding Projectile Variables


    To add projectile support to the Enemy class we will need to declare four new
    variables at the top of the class. These will include randomLocation, a new variable
    that we’ll use for both the Enemy character and the projectile he shoots; randomOffset,
    a new variable that will hold the vertical (Y) offset that allows us to fine-tune
    position the projectile so that it comes out of the bazooka barrel; and the bulletRange
    and bulletOffset allowing us to do X positioning. We will set the **randomLocation**
    variable equal to the **randomNum.nextInt(attackBoundary)** logic, which used
    to be inside of the **.setTranslateY()** method call, and add **5** to this variable,
    to create the **randomOffset** variable data value. The new Java structure for
    these methods is error-free, as shown in [Figure 17-41](#9781484204160_Ch17.xhtml#Fig41),
    and should look like the following Java code:


    ```

    int spriteMoveR, spriteMoveL, destination;

    int randomLocation, randomOffset, bulletRange, bulletOffset;

    public void update() {

        if(callAttack) {

            if(attackCounter >= attackFrequency) {

                attackCounter=0;

                spriteMoveR = 700;

                spriteMoveL = -70;

                randomLocation = randomNum.nextInt(attackBoundary);

                spriteFrame.setTranslateY(randomLocation);

                randomOffset = randomLocation + 5;

                callAttack = true;

            } else { attackCounter+=1; }

        } else {     initiateAttack(); }

    }

    ```


    ![9781484204160_Fig17-41.jpg](OEBPS/Images/9781484204160_Fig17-41.jpg)


    [Figure 17-41](#9781484204160_Ch17.xhtml#_Fig41). Add randomLocation, randomOffset,
    bulletRange, and bulletOffset variables to control bullet placement


    Also notice, at the bottom of [Figure 17-41](#9781484204160_Ch17.xhtml#Fig41),
    we’ve also added an **if(shootBullet){shootProjectile();}** conditional if structure
    to the bottom of the .update() method, as well as adding a **boolean shootBullet
    = false;** declaration at the top of the Enemy.java class. Before we code the
    .shootProjectile() method, let’s add the shootBullet flag settings to the .initiateAttack()
    method, as well as setting a **bulletOffset** X location for the bullet, in **if(!onScreen)**.


    Invoking a .shootProjectile() Method: Setting shootBullet to True


    Inside each of the if(takeSides) conditional if-else structures, in the else portion
    of the statement, add a bulletOffset variable setting (**480** or **120**) and
    set **shootBullet** equal to **true**. The Java code, seen in [Figure 17-42](#9781484204160_Ch17.xhtml#Fig42),
    will look like this:


    ```

    if(takeSides) {

        spriteFrame.setScaleX(1);

        this.setIsFlipH(false);

        if(!onScreen) {

            destination = 500;

            if(spriteMoveR >= destination) {

                spriteMoveR-=2;

                spriteFrame.setTranslateX(spriteMoveR);

            } else {

                bulletOffset = 480;

                shootBullet = true;

                onScreen = true;    }

    ```


    ![9781484204160_Fig17-42.jpg](OEBPS/Images/9781484204160_Fig17-42.jpg)


    [Figure 17-42](#9781484204160_Ch17.xhtml#_Fig42). Add bulletOffset values and
    shootBullet=true statements into the sprite-reached-destination else body


    Now that you have set up the variables and if(shootBullet) structure in the .update()
    method, which will call the .shootProjectile() method to launch the Projectile
    objects out of the iBeagle Enemy Actor bazooka, we can start to create the code
    that will animate the iBullet object (and later, the iCheese object as well) in
