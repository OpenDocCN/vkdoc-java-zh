- fmt: 'If you are only going to develop Java SE (Standard Edition) and JavaFX applications
    (games) for individuals, then click the first button. If you are going to develop
    Java EE (Enterprise Edition) and JavaFX applications (games) for enterprise (business),
    then click the second button. If you are going to develop both JavaFX and HTML5
    applications (games), which is what I do for my business, then you click the fifth
    `Download` button, and download the “All” version of NetBeans IDE 8.0. This version
    will allow you to develop in all the programming languages supported by NetBeans!


    Because the NetBeans IDE is free, and your workstation hard disk drive can handle
    huge amounts of data, I recommend that you install this 204MB `All` version of
    the IDE, in case you ever find that you need any of the other capabilities that
    NetBeans IDE 8.0 is able to provide for you as a software developer (Java EE,
    Java ME, PHP, HTML5, Groovy, GlassFish, Tomcat, C++). This is an extra 120MB if
    you are going to install the client-side, or Java SE IDE, version, but is less
    than 20MB of extra disk space if you are going to install the server-side, or
    Java EE IDE, version.


    Once you click the `Download` button, the software download will commence. After
    it is finished, you will be ready to install Java 8 and then NetBeans IDE 8.0.
    Finally, to complete the setup of your comprehensive Java 8 game development workstation,
    you will get some ancillary new media content tools. You will be able to use the
    workstation as you read through this book (and thereafter) to create epic Java
    8 game deliverables! This is getting exciting!


    ## Installing the Java 8 Software Development Environment


    NetBeans IDE 8.0 requires Java to be installed in order to function (run), so
    you will need to install the JDK and JRE first. Because you want to develop games
    using the latest and most feature-filled version of Java, so you are going to
    be installing Java 8, which was released in 2014. Installing the latest version
    of software ensures that you have the newest features and the fewest bugs possible.
    Make sure to check often that you are using the latest version of all your software
    packages; after all, these are open source and free to download, upgrade, and
    use!


    The first step is to find where you downloaded your installer files to on your
    system. The default should be set to the `Download` folder in Windows. I downloaded
    mine to a `C:/Clients/Java8` folder, as you can see in [Figure 1-6](#9781484204160_Ch01.xhtml#Fig6).


    ![9781484204160_Fig01-06.jpg](OEBPS/Images/9781484204160_Fig01-06.jpg)


    [Figure 1-6](#9781484204160_Ch01.xhtml#_Fig6). Find the JDK 8 install file on
    your hard disk drive, right-click it, and select `Run as administrator`


    The file will be named using the format `jdk-version-platform-bitlevel`, so find
    the latest version (in this case, it was `jdk-8u25-windows-x64`). Right-click
    it, and select the `Run as administrator` option so that the installer has all
    the OS “permissions” that it needs to create folders, transfer files into them,
    and the like.


    Once you launch the installer, you will see the `Welcome` dialog, shown in [Figure
    1-7](#9781484204160_Ch01.xhtml#Fig7) (left). Click the `Next` button to advance
    to the `Select Features to Install` dialog, shown in [Figure 1-7](#9781484204160_Ch01.xhtml#Fig7)
    (right), and accept the defaults.


    ![9781484204160_Fig01-07.jpg](OEBPS/Images/9781484204160_Fig01-07.jpg)


    [Figure 1-7](#9781484204160_Ch01.xhtml#_Fig7). Click `Next` in the `Welcome` dialog
    to advance to the `Select Features to Install` dialog, and then click the `Next`
    button


    As you can see, the installer will install 180MB of software into the `C:\ProgramFiles\Java\jdk1.8.0_25`
    folder on your workstation. Click the `Next` button to start the installation
    process, which will extract the installation files and then copy them onto your
    system, using an animated progress bar, as displayed in [Figure 1-8](#9781484204160_Ch01.xhtml#Fig8)
    (left).


    ![9781484204160_Fig01-08.jpg](OEBPS/Images/9781484204160_Fig01-08.jpg)


    [Figure 1-8](#9781484204160_Ch01.xhtml#_Fig8). Java 8 installation will extract
    and copy install files (left) and then suggest the installation directory (right)


    After the Java SDK is installed on your system, you will get the `JRE` installation
    dialog, which is presented in [Figure 1-8](#9781484204160_Ch01.xhtml#Fig8) (right).
    Make sure that you accept the default installation location for this JRE; it should
    be installed in the `\Java\jre8` folder. It is best to allow Oracle (Java SDK)
    to put the software in an industry standard folder location, as other software
    packages that you will be using that use this JRE, such as NetBeans IDE 8.0, will
    be looking for it there first. Click the `Next` button to install the JRE.


    The installation will show a progress bar during the install, as seen in [Figure
    1-9](#9781484204160_Ch01.xhtml#Fig9) (left). When it is finished, it will display
    the `Successfully Installed` dialog, shown in [Figure 1-9](#9781484204160_Ch01.xhtml#Fig9)
    (right). If you want to access tutorials, API documentation, developer guides,
    version release notes, and so on, you can click the `Next Steps` button.


    ![9781484204160_Fig01-09.jpg](OEBPS/Images/9781484204160_Fig01-09.jpg)


    [Figure 1-9](#9781484204160_Ch01.xhtml#_Fig9). During installation a progress
    bar shows you what is installing (left) and then gives you a completed dialog
    (right)


    ## Installing NetBeans IDE 8.0


    Now, you are ready to install NetBeans, so locate your `netbeans-8.0-windows`
    file (see [Figure 1-6](#9781484204160_Ch01.xhtml#Fig6)). Right-click it, and select
    the `Run as administrator` option to launch the installer. Once it is launched,
    you will see the dialog shown in [Figure 1-10](#9781484204160_Ch01.xhtml#Fig10),
    which gives you a `Customize` button that you can use to customize the install.


    ![9781484204160_Fig01-10.jpg](OEBPS/Images/9781484204160_Fig01-10.jpg)


    [Figure 1-10](#9781484204160_Ch01.xhtml#_Fig10). The `Welcome to the NetBeans
    IDE 8.0 Installer` dialog


    Click the `Next` button to begin the default (full) installation, and you will
    get the `NetBeans IDE 8.0 License Agreement` dialog, shown in [Figure 1-11](#9781484204160_Ch01.xhtml#Fig11)
    (left). Select the `I accept the terms in the license agreement` check box, and
    click the `Next` button to advance to the `JUnit License Agreement` dialog, shown
    in [Figure 1-11](#9781484204160_Ch01.xhtml#Fig11) (right).


    ![9781484204160_Fig01-11.jpg](OEBPS/Images/9781484204160_Fig01-11.jpg)


    [Figure 1-11](#9781484204160_Ch01.xhtml#_Fig11). Accept the terms of the license
    agreement, click the `Next` button (left), and then do the same for JUnit (right)


    In the `JUnit License Agreement` dialog, presented in [Figure 1-11](#9781484204160_Ch01.xhtml#Fig11)
    (right), click the radio button next to the `I accept the terms in the license
    agreement` statement, and click the `Next` button to proceed with the installation.
    The next two installer dialogs, illustrated in [Figure 1-12](#9781484204160_Ch01.xhtml#Fig12),
    will allow you to specify where NetBeans 8.0 and GlassFish 4.0 will be installed
    on your system. I suggest accepting the default installation locations in these
    two dialogs as well. As you will notice, the NetBeans installer has found your
    Java installation in its default location as well.


    ![9781484204160_Fig01-12.jpg](OEBPS/Images/9781484204160_Fig01-12.jpg)


    [Figure 1-12](#9781484204160_Ch01.xhtml#_Fig12). Accept the default installation
    directory suggestions for NetBeans IDE (left) and GlassFish 4.0 (right)


    Once you accept these default installation locations and click the `Next` button
    to advance through these dialogs, you will get a `Summary` dialog, shown in [Figure
    1-13](#9781484204160_Ch01.xhtml#Fig13) (left). This dialog contains an `Install`
    button, which will trigger the installation that you have set up over the previous
    five NetBeans IDE 8.0 installation dialogs.'
