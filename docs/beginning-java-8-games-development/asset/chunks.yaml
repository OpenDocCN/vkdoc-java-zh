    “输出”选项卡将包含 NetBeans 中的不同类型输出，例如来自 Ant 的编译操作输出、运行操作输出（如图所示）、分析器操作输出（你将在下一节中探索），甚至还有来自应用程序本身的输出。


    你可能已经在图 2-10 中注意到，这个引导型 Java 8/JavaFX 应用程序的代码在第 25 行包含一条 `(System.out.println("Hello
    World!");` Java 语句，因此，如果你想看到当前正在运行的应用程序打印到“输出”窗格（在编程圈子里有时被称为输出**控制台**）的内容，请单击“Hello
    World!”应用程序（在 IDE 之上运行）中的 **Say “Hello World”** 按钮。


    一旦你单击此按钮，**“Hello World!”** 将出现在“输出”选项卡中，位于显示正在执行 **InvinciBagel.jar** 文件的红色文本下方。.jar（Java
    归档）文件是 Java 应用程序的**可分发的格式**。编译过程的一部分就是创建此文件，因此，如果你的编译版本有效，并且应用程序设计和编程已完成，你就可以准备好分发
    .jar 文件了！


    .jar 文件不包含你实际的 Java 8 代码，而是包含应用程序的一个压缩、加密的“Java 字节流”版本，JRE 可以**执行并运行**它（就像 NetBeans
    8.0 现在所做的那样）。附加在 InvinciBagel.jar 文件前面的路径告诉你编译后的 .jar 文件位于何处，以及 NetBeans 当前从何处访问它以运行它。在我的系统上，此位置是
    `C:\Users\user\Documents\NetBeansProjects\InvinciBagel\dist\run1331700299\InvinciBagel.jar`。


    让我们看看“输出”选项卡中的一些其他文本，了解 NetBeans 为了能够运行此项目的 .jar 文件都做了些什么。首先，编译器会根据游戏应用程序的独特属性，在
    **\NetBeansProjects\InvinciBagel\build** 文件夹中删除并重建 **build-jar-properties** 文件。


    接下来，Ant 会创建一个 **\NetBeansProjects\InvinciBagel\dist\** 分发文件夹来存放项目 .jar 文件，然后检测到
    JavaFX 的使用，启动 `ant-javafx.jar` 以将 JavaFX 功能添加到 Ant 构建引擎，该引擎将创建 .jar 文件。最后，你会看到一个警告，提示将
    `manifest.custom.codebase` 属性从星号值（表示“所有内容”）更改为特定值。我可能会在本书后面，在你更进阶一些之后，再深入探讨应用程序开发的清单和权限领域。然后，JavaFX
    被启动，.jar 文件被构建。


    **Ant** 是构建引擎，或者说**构建工具**，它负责创建你的 .jar 文件。其他构建引擎，例如 **Maven** 和 **Gradle**，也可以在
    NetBeans 中使用，因为正如你现在所知，NetBeans 是可扩展的！


    Ant 也用于 Eclipse IDE，它是一个存在已久的 Apache 开源项目。要了解有关 Ant 构建系统及其功能的更多信息，请访问 Ant 网站 **(****[`ant.apache.org`](http://ant.apache.org)****)**。


    接下来，你将探索 NetBeans 8.0 中的性能分析功能，它可以在运行时分析你的代码，并让你了解 Java 8 代码运行的效率（或低效程度）。这对于游戏来说很重要，尤其是街机游戏或任何需要在用户屏幕上实时移动**精灵**的游戏。你将在本书的第
    6 章中学习游戏概念和设计。


    在 NetBeans 8.0 中分析你的 Java 8 游戏项目


    要启动 Java 8 代码分析实用程序，请使用 IDE 顶部的“Profile”菜单，选择“Profile Project (InvinciBagel)”（第一个菜单项），如图
    2-12 所示，或者使用“Profile Project”快捷方式图标，该图标在图 2-13 给出的折叠屏幕视图中可见（你可以通过**代码编辑器**窗格中的
    Java 代码行号看出我折叠了屏幕截图，该窗格仅包含第 1 行和第 38 行，即该范围中的第一个和最后一个数字；我使用 Photoshop 删除了第 2–37
    行）。


    ![9781484204160_Fig02-12.jpg](img/9781484204160_Fig02-12.jpg)


    图 2-12. 单击 NetBeans IDE 8.0 的 Profile 菜单，然后选择 Profile Project (InvinciBagel) 菜单选项


    ![9781484204160_Fig02-13.jpg](img/9781484204160_Fig02-13.jpg)


    图 2-13. Profile Project 实用程序的快捷方式图标，带有工具提示（屏幕已折叠）


    正如你在 Profile 菜单和 Profile Project 图标工具提示中看到的，在屏幕顶部，Profile Project 工具的键盘快捷键是 **ALT+F2**（同时按住键盘上的
    **ALT** 键并按下键盘左上角的 **F2** 功能键）。


    分析你的 Java 8 游戏应用程序的 CPU 使用情况


    使用 Profile Project 菜单项或快捷方式图标将打开 **Profile InvinciBagel**（你的游戏项目名称）对话框，如图 2-14
    所示。让我们单击对话框左侧中间的 **CPU** 按钮，这将使对话框进入 **Analyze Performance**（选择特性）模式。稍后你将查看分析**内存**使用情况（请参阅“分析你的
    Java 8 游戏应用程序内存使用情况”一节）。**Monitor**（按钮）选项支持实时线程监控，可以在你编写 Java 代码时使用。


    ![9781484204160_Fig02-14.jpg](img/9781484204160_Fig02-14.jpg)


    图 2-14. 使用 Profile Project 对话框中的下拉菜单设置过滤器，并选择 Advanced (instrumented) 输出设置


    在此对话框中，你可以选择 **Quick profile** 或 **Advanced profile**，后者具有图形化工具，可以直观地显示性能。如你所见，这是选中的选项，并且从
    **Instrumentation Filter** 下拉菜单中选择了 **Profile only project classes** 选项。保持选中 **Use
    defined Profiling Points**，以便让 NetBeans 8.0 执行最大可能量的分析工作。还要注意对话框底部的 **Overhead**
    仪表（指示器），显示值为 50%。


    第一次运行 NetBeans 分析工具时，它需要**校准**你的工作站，因为每个工作站都有不同的特性，例如内存大小和 CPU 核心数或处理器数量。


    图 2-15 显示了校准信息对话框，该对话框建议在校准过程中仅让 NetBeans 在你的工作站上运行，并告诉你将来如何再次校准（如果你更改了系统硬件配置），方法是使用
    **Profile ![image](img/arrow.jpg) Advanced Commands ![image](img/arrow.jpg) Manage
    Calibration Data** 菜单序列。


    ![9781484204160_Fig02-15.jpg](img/9781484204160_Fig02-15.jpg)


    图 2-15. 第一次进行分析时，会执行校准


    还有一个警告，说你应该**禁用动态 CPU 频率切换**（这通常被称为超频），这是当今常见的一个特性。


    因为我想要测试较慢的 CPU 速度，所以我没有费心去做这件事，因为这涉及到进入工作站主板上的系统 BIOS（基本输入/输出系统），并且不是初学者应该摆弄的事情。

