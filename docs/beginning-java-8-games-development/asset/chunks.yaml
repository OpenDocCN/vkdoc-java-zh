    \ operator: Divides left-hand operand by right-hand operand; puts remainder in\
    \ left-hand operand |\n\nFinally, you are going to take a look at conditional\
    \ operators, which also allow you to code powerful game logic.\n\n## Java Conditional\
    \ Operators\n\nThe Java language also has a **conditional operator** that can\
    \ evaluate a condition and make a variable assignment for you, based on the resolution\
    \ of that condition, using only one compact programming construct. The generic\
    \ Java programming statement for a conditional operator always uses the following\
    \ basic format:\n\n```\nVariable = (evaluated expression) ? Set this value if\
    \ TRUE : Set this value if FALSE ;\n```\n\nSo, on the left-hand side of the equals\
    \ sign, you have the variable, which is going to change (be set), based on what\
    \ is on the right-hand side of the equals sign. This conforms to what you have\
    \ learned thus far.\n\nOn the right-hand side of the equals sign, you have an\
    \ evaluated expression, for instance, “x is equal to 3,” followed by a question\
    \ mark and then two numeric values that are separated from each other, using the\
    \ colon, and, finally, a semicolon to terminate the conditional operator statement.\
    \ If you wanted to set a variable `y` to a value of `25` if `x` is equal to `3`,\
    \ and to `10` if `x` is not equal to `3`, you would write that conditional operator\
    \ programming statement by using the following Java programming logic:\n\n```\n\
    y = (x == 3) ? 25 : 10 ;\n```\n\nNext, you are going to look at Java logic control\
    \ structures that leverage the operators you just learned about.\n\n## Java Conditional\
    \ Control: Decision Making or Loops\n\nAs you have just seen, many of the Java\
    \ operators can have a fairly complex structure and provide a lot of processing\
    \ power, using very few characters of Java programming logic. Java also has several\
    \ more complicated **conditional control** structures, which can automatically\
    \ make decisions or perform repetitive tasks for you, once you have set up the\
    \ conditions for those decisions or task repetitions by coding the Java **logic\
    \ control** structure.\n\nIn this section, you will first explore decision-making\
    \ control structures, such as the Java `switch-case` structure and the `if-else`\
    \ structure. Then, you will take a look at Java’s looping control structures,\
    \ including `for`, `while`, and `do-while`.\n\n### Decision-Making Control Structures:\
    \ Switch-Case and If-Else\n\nSome of the most powerful Java logic control structures\
    \ allow you to define decisions that you want your program logic to make for you\
    \ as the application is running. One such structure offers a case-by-case, “flat”\
    \ decision matrix; the other has a cascading (if this, do this; if not, do this;\
    \ if not, do this; and so on) type of structure that evaluates things in the order\
    \ in which you want them examined.\n\nLet’s start by looking at the Java `switch`\
    \ statement, which uses the Java `switch` keyword and an expression at the top\
    \ of this decision tree and then uses the Java `case` keyword to provide Java\
    \ statement blocks for each outcome for this expression’s evaluation. If none\
    \ of the cases inside a `switch` statement structure (curly braces) are called\
    \ (used) by the expression evaluation, you can also supply a Java `default` keyword\
    \ and Java statement code block for what you want done.\n\nThe variable used in\
    \ the case statements can be one of four Java data types: `char` (character),\
    \ `byte`, `short`, or `int` (integer). You will generally want to add a Java `break`\
    \ keyword at the end of each of your case statement code blocks, at least in the\
    \ use case, in which the values being switched between need to be exclusive, and\
    \ only one is viable (or permissible) for each invocation of the `switch` statement.\
    \ The `default` statement, which is the “if any of these do not match” is the\
    \ last of the statements inside of the `switch`, and does not need this `break`\
    \ keyword.\n\nIf you do not furnish a Java `break` keyword in each of your case\
    \ logic blocks, more than one case statement can be evaluated in the same pass\
    \ through your `switch` statement. This would be done as your expression evaluation\
    \ tree progresses from top (first case code block) to bottom (last case code block\
    \ or `default` keyword code block). So if you had a collection of Boolean “flags”\
    \ such as `hasValue`, `isAlive`, `isFixed`, and so on, these could all be processed\
    \ on one single “pass” by using a `switch-case` statement structure that does\
    \ not use any `break` statements at all.\n\nThe significance of this is that you\
    \ can create some fairly complex decision trees, based on case statement evaluation\
    \ order, and whether you put this `break` keyword at the end of any given case\
    \ statement’s code block.\n\nThe **general format** for your `switch-case` decision\
    \ tree programming construct would look like this:\n\n```\nswitch(expression)\
    \ {\n    case value1 :\n        programming statement one;\n        programming\
    \ statement two;\n        break;\n    case value2 :\n        programming statement\
    \ one;\n        programming statement two;\n        break;\n    default :\n  \
    \      programming statement one;\n        programming statement two;\n}\n```\n\
    \nLet’s say you want to have a decision in your game as to which `InvinciBagel`\
    \ death animation is called when the `InvinciBagel` is hit (shot, slimed, punched,\
    \ and so on). The death animation routine (method) would be called, based on the\
    \ `InvinciBagel`’s state of activity when he or she is hit, such as flying (`F`),\
    \ jumping (`J`), running (`R`), or idle (`I`). Let’s say these states are held\
    \ in a data field called `ibState`, of the type `char`, which holds a single character.\
    \ The `switch-case` code construct for using these game-piece state indicators\
    \ to call the correct method, once a hit has occurred, would be:\n\n```\nswitch(ibState)\
    \ {            // Evaluate ibState char and execute case code blocks accordingly\n\
    \    case 'F' :\n        deathLogicFlying();  // Java method controlling death\
    \ sequence if InvinciBagel flying\n        break;\n    case 'J' :\n        deathLogicJumping();\
    \ // Java method controlling death sequence if InvinciBagel jumping\n        break;\n\
    \    case 'R' :\n        deathLogicRunning(); // Java method controlling death\
    \ sequence if InvinciBagel running\n        break;\n    default :\n        deathLogicIdle();\
    \    // Java method controlling death sequence if InvinciBagel is idle\n}\n```\n\
    \nThis `switch-case` logic construct evaluates the `ibState` char variable inside\
    \ the evaluation portion of the `switch()` statement (note that this is a Java\
    \ method) and then provides a case logic block for each of the game-piece states\
    \ (flying, jumping, running) and a default logic block for the idle state (which\
    \ is a logical way to set this up)."
