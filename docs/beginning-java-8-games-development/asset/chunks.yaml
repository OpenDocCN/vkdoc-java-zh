    最后，你将了解条件运算符，它也能让你编写出强大的游戏逻辑。


    Java 条件运算符


    Java 语言还提供了一种**条件运算符**，它能够**求值**一个条件，并根据该条件的判断结果，仅用一条紧凑的编程结构为你完成变量赋值。条件运算符的通用
    Java 编程语句始终采用以下基本格式：


    ```

    变量 = (求值表达式) ? 若为真则设置此值 : 若为假则设置此值 ;

    ```


    因此，在等号左侧，是即将根据等号右侧内容发生改变（被设置）的变量。这与你目前所学的内容一致。


    在等号右侧，是一个**求值表达式**，例如“x 等于 3”，后面跟着一个**问号**，然后是两个用**冒号**分隔的数值，最后用一个**分号来终止**条件运算符语句。如果你想在
    **x** 等于 **3** 时将变量 **y** 设置为 **25**，而在 x 不等于 3 时设置为 **10**，你可以使用以下 Java 编程逻辑来编写该条件运算符语句：


    ```

    y = (x == 3) ? 25 : 10 ;

    ```


    接下来，你将学习利用刚刚了解的运算符的 Java 逻辑控制结构。


    Java 条件控制：决策或循环


    正如你刚刚所见，许多 Java 运算符可以拥有相当复杂的结构，并且仅用很少的 Java 编程逻辑字符就能提供强大的处理能力。Java 还有几种更复杂的**条件控制**结构，一旦你通过编写
    Java **逻辑控制**结构为这些决策或任务重复设定了条件，它们就能自动为你**做出决策**或**执行重复任务**。


    在本节中，你将首先探索决策控制结构，例如 Java 的 **switch-case** 结构和 **if-else** 结构。然后，你将了解 Java 的循环控制结构，包括
    **for**、**while** 和 **do-while**。


    决策控制结构：Switch-Case 和 If-Else


    一些最强大的 Java 逻辑控制结构允许你定义希望程序逻辑在应用程序运行时为你做出的**决策**。其中一种结构提供了一种逐项、“扁平化”的决策矩阵；另一种则具有级联式（如果这样，则执行此操作；如果不这样，则执行此操作；如果不这样，则执行此操作；依此类推）的结构，它会按照你希望检查的顺序对事物进行求值。


    让我们先来看看 Java 的 **switch** 语句，它在决策树的顶部使用 Java 关键字 switch 和一个表达式，然后使用 Java 关键字 **case**
    为该表达式求值的每个结果提供 Java 语句块。如果 switch 语句结构（花括号）内的所有 case 都没有被表达式求值调用（使用），你还可以提供一个
    Java **default** 关键字以及你希望执行的 Java 语句代码块。


    case 语句中使用的变量可以是四种 Java 数据类型之一：**char**（字符）、**byte**、**short** 或 **int**（整数）。通常你需要在每个
    case 语句代码块的末尾添加一个 Java **break** 关键字，至少在需要被切换的值互斥，并且每次调用 switch 语句时只有一个值有效（或允许）的用例中需要这样做。**default**
    语句，即“如果这些都不匹配”的情况，是 switch 内部的最后一条语句，并且不需要这个 break 关键字。


    如果你没有在每个 case 逻辑块中提供 Java **break** 关键字，那么在一次 switch 语句的执行过程中，可能会对多个 case 语句进行求值。这会在你的表达式求值树从顶部（第一个
    case 代码块）向下（最后一个 case 代码块或 default 关键字代码块）进行时发生。因此，如果你有一组布尔“标志”，例如 hasValue、isAlive、isFixed
    等，它们都可以通过一个完全不使用任何 break 语句的 switch-case 语句结构在一次“执行”中处理完毕。


    其重要意义在于，你可以根据 case 语句的求值顺序，以及是否在任何给定 case 语句的代码块末尾放置 break 关键字，创建出相当复杂的决策树。


    你的 switch-case 决策树编程结构的**通用格式**如下所示：


    ```

    switch(表达式) {

        case 值 1 :

            编程语句一;

            编程语句二;

            break;

        case 值 2 :

            编程语句一;

            编程语句二;

            break;

        default :

            编程语句一;

            编程语句二;

    }

    ```


    假设你想在游戏中设定一个决策，决定当 InvinciBagel 被击中（射击、粘液攻击、拳击等）时调用哪个死亡动画。死亡动画例程（方法）将根据 InvinciBagel
    被击中时的活动状态来调用，例如飞行（**F**）、跳跃（**J**）、奔跑（**R**）或空闲（**I**）。假设这些状态存储在一个名为 **ibState**
    的 **char** 类型数据字段中，该字段保存单个字符。一旦发生击中事件，使用这些游戏棋子状态指示器来调用正确方法的 switch-case 代码结构如下：


    ```

    switch(ibState) {            // 求值 ibState 字符，并相应地执行 case 代码块

        case ''F'' :

            deathLogicFlying();  // 控制 InvinciBagel 飞行时死亡序列的 Java 方法

            break;

        case ''J'' :

            deathLogicJumping(); // 控制 InvinciBagel 跳跃时死亡序列的 Java 方法

            break;

        case ''R'' :

            deathLogicRunning(); // 控制 InvinciBagel 奔跑时死亡序列的 Java 方法

            break;

        default :

            deathLogicIdle();    // 控制 InvinciBagel 空闲时死亡序列的 Java 方法

    ```


    这个 switch-case 逻辑结构在 switch() 语句的求值部分（注意这是一个 Java 方法）中对 **ibState** 字符变量进行求值，然后为每个游戏棋子状态（飞行、跳跃、奔跑）提供一个
    case 逻辑块，并为空闲状态提供一个 default 逻辑块（这是一种设置此逻辑的合理方式）。

