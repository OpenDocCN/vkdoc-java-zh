    A KeyEvent object is generated whenever a key is **pressed** and held down, **released**,
    or **typed** (pressed and immediately released). Depending on the nature of this
    key pressing action itself, your KeyEvent object is passed into either an **.onKeyPressed()**,
    an **.onKeyTyped()** or an **.onKeyReleased()** method for further processing
    inside the nested .handle() method, which is what will hold your game-specific
    programming logic.


    Games typically use key-pressed and key-released events, as users typically press
    and hold keys to move the actors in the game. Key-typed events on the other hand
    tend to be “higher-level” events and generally do not depend upon the OS platform
    or the keyboard layout. Typed key events (.onKeyTyped() method calls) will be
    generated when a Unicode character is entered, and are used to obtain **character
    input** for UI controls such as text fields, and are used for business applications,
    such as calendars and word processors, for instance.


    In a simple case, the key-typed event will be produced by using a single key press
    and its immediate release. Additionally, alternate characters can be produced
    using combinations of key press events, for instance, the capital A can be produced
    using a SHIFT key press and an ‘a’ key-type (press and immediate release).


    A key-release is not usually necessary to generate a key-typed KeyEvent object.
    It is important to notice that there are some fringe cases where a key-typed event
    is not generated until the key is released; a great example of this is the process
    of entering **ASCII character code sequences**, using that old-school **Alt-Key-with-Numeric-keypad**
    entry method, which was used “back in the day,” with DOS and held over into Windows
    OSes.


    It is important to note that no key-typed KeyEvent objects will be generated for
    keys that do not generate any Unicode characters. This would include action keys
    or modifier keys, although these do generate key-pressed and key-released KeyEvent
    objects, and could thus be used for game play! This would not represent a good
    user interface design (or user experience design) approach, generally speaking,
    as these keys are used to modify other key behavior.


    The KeyEvent class has a **character** variable (I am tempted to call this a character
    characteristic, but I won’t) which will always contains a valid **Unicode character**
    for a key-typed event or **CHAR_UNDEFINED** for a key-pressed or key-released
    event. Character input is only reported for key-typed events, since key-pressed
    and key-released events are not necessarily associated with character input. Therefore,
    the character variable is guaranteed to be meaningful only for key-typed events.
    In a sense, by not using key-typed events, we are saving both memory and CPU processing,
    by not having to process this Unicode character variable.


    For key-pressed and key-released KeyEvent objects, the **code** variable in the
    KeyEvent class will contain your KeyEvent object’s keycode, defined using the
    KeyCode class you learned about earlier. For key-typed events, this code variable
    always contains the constant **KeyCode.UNDEFINED**. So as you can see, key-pressed
    and key-released are thus designed to be used differently than key-typed, and
    that’s the reason we are using these for our game event handling.


    Key-pressed and key-released events are low-level, and depend upon platform or
    keyboard layout. They are generated whenever a given key is pressed or released,
    and are the only way to “poll” the keys that do not generate character input.
    The key being pressed or released is indicated by the **code** variable, which
    contains a virtual KeyCode.


    Adding Keyboard Event Handling: Using KeyEvents'
  trans: '

    由于我们将在游戏中使用**方向键**，可能还会用到 **A-S-D-W** 键，未来还会涉及游戏手柄的 **GAME_A**、**GAME_B**、**GAME_C**
    和 **GAME_D** 按钮，因此我们首先来仔细研究一下 **KeyCode** 类。这个类是一个公共的 **Enum** 类，用于保存**枚举常量**值。KeyEvent
    类会从这个类中获取它使用（处理）的 KeyCode 常量值，以确定玩家在特定按键事件调用中使用了哪个键。KeyCode 类在 Java 8 和 JavaFX
    中的类层次结构如下所示：


    ```

    java.lang.Object

      > java.lang.Enum<KeyCode>

        > javafx.scene.input.KeyCode

    ```


    KeyCode 类中包含的常量值使用**大写字母**，并以该键码所支持的键的名称命名。例如，a、s、w 和 d 的键码分别是 **A**、**S**、**W**
    和 **D**。方向键的键码是 **UP**、**DOWN**、**LEFT** 和 **RIGHT**，而游戏手柄按钮的键码是 **GAME_A**、**GAME_B**、**GAME_C**
    和 **GAME_D**。


    在介绍完这些用于输入事件处理的基础包和类之后，我们将稍后在 EventHandler 对象中结合 KeyEvent 对象来实现 KeyCode 常量。您很快就会看到，其实现方式与设置
    ActionEvent 的处理方式非常相似，并且 KeyEvent 可以使用 Java 7 的内部类方法或 Java 8 的 lambda 表达式进行编码。


    我们将以非常**模块化**的方式设置 KeyEvent 对象的处理，使得事件 KeyCode 评估结构为每个 KeyCode 映射设置布尔标志变量。事件处理的本质是它是一个实时引擎，类似于脉冲引擎，因此这些布尔**标志**将精确“反映”玩家在任何给定纳秒内按下或释放了哪些键。然后，通过在我们的其他游戏引擎类中使用
    Java 游戏编程逻辑，可以读取这些布尔值并对其做出响应，从而实时处理这些按键事件。


    KeyEvent 类：使用 KeyEvent 对象保存玩家正在使用的 KeyCode


    接下来，让我们更仔细地研究一下 **KeyEvent** 类。这个类被指定为 **public final KeyEvent**，它扩展了 **InputEvent**
    超类，该超类用于创建 javafx.scene.input 包中的所有输入事件子类。KeyEvent 类通过 EventHandler 类启动，并处理 **KeyCode**
    类的常量值。该类的层次结构从 java.lang.Object 主类开始，经过 java.util.EventObject 事件超类，再到 javafx.event.Event
    类，该类用于创建 KeyEvent 类所扩展（子类化）的 javafx.scene.input.InputEvent 类。有趣的是，我们这里跨越了四个不同的包！


    KeyEvent 类在 Java 8 和 JavaFX 中的类层次结构从 java.lang 包跳转到 java.util 包，再到 javafx.event
    包，最后到 javafx.scene.input 包。KeyEvent 类的层次结构如下所示：


    ```

    java.lang.Object

      > java.util.EventObject

        > javafx.event.Event

          > javafx.scene.input.InputEvent

            > javafx.scene.input.KeyEvent

    ```


    EventHandler 对象生成 KeyEvent 对象表示发生了按键操作。KeyEvent 通常在场景图节点（例如可编辑的文本 UI 控件）中生成，但在我们的案例中，我们将把事件处理附加到场景图节点层次结构之上，直接附加到名为
    **scene** 的 Scene 对象上，希望避免因将事件处理附加到场景图中的任何 Node 对象（在我们的案例中，当前是名为 **root** 的 StackPane
    对象）而产生的任何场景图处理开销。


    每当一个键被**按下**并按住、**释放**或**键入**（按下并立即释放）时，就会生成一个 KeyEvent 对象。根据按键操作本身的性质，您的 KeyEvent
    对象会被传递到 **.onKeyPressed()**、**.onKeyTyped()** 或 **.onKeyReleased()** 方法中，以便在嵌套的
    .handle() 方法内进行进一步处理，该方法将包含您特定于游戏的编程逻辑。


    游戏通常使用按键按下和按键释放事件，因为用户通常按下并按住键来移动游戏中的角色。另一方面，按键键入事件往往是“更高级别”的事件，通常不依赖于操作系统平台或键盘布局。当输入
    Unicode 字符时，会生成键入的按键事件（.onKeyTyped() 方法调用），并用于获取 UI 控件（如文本字段）的**字符输入**，并用于业务应用程序，例如日历和文字处理器。


    在简单情况下，按键键入事件是通过一次按键按下并立即释放产生的。此外，可以使用按键按下事件的组合来产生替代字符，例如，可以通过按下 SHIFT 键和键入 ''a''
    键（按下并立即释放）来产生大写字母 A。


    生成按键键入的 KeyEvent 对象通常不需要按键释放。需要注意的是，在某些边缘情况下，按键键入事件直到按键释放时才会生成；一个很好的例子是使用老式的 **Alt
    键加数字小键盘**输入方法输入 **ASCII 字符代码序列**的过程，这种方法“在过去”与 DOS 一起使用，并延续到了 Windows 操作系统中。


    重要的是要注意，对于不生成任何 Unicode 字符的键，不会生成任何按键键入的 KeyEvent 对象。这包括操作键或修饰键，尽管这些键确实会生成按键按下和按键释放的
    KeyEvent 对象，因此可以用于游戏玩法！但一般来说，这并不代表良好的用户界面设计（或用户体验设计）方法，因为这些键用于修改其他键的行为。


    KeyEvent 类有一个 **character** 变量（我很想称之为字符特性，但我不会），对于按键键入事件，它始终包含一个有效的 **Unicode
    字符**；对于按键按下或按键释放事件，它包含 **CHAR_UNDEFINED**。字符输入仅针对按键键入事件报告，因为按键按下和按键释放事件不一定与字符输入相关联。因此，character
    变量仅对按键键入事件有意义。从某种意义上说，通过不使用按键键入事件，我们无需处理这个 Unicode 字符变量，从而节省了内存和 CPU 处理资源。


    对于按键按下和按键释放的 KeyEvent 对象，KeyEvent 类中的 **code** 变量将包含您的 KeyEvent 对象的键码，该键码使用您之前了解的
    KeyCode 类定义。对于按键键入事件，此 code 变量始终包含常量 **KeyCode.UNDEFINED**。因此，您可以看到，按键按下和按键释放的设计用途与按键键入不同，这就是我们在游戏事件处理中使用它们的原因。


    按键按下和按键释放事件是低级别事件，依赖于平台或键盘布局。它们在给定键被按下或释放时生成，并且是“轮询”不生成字符输入的键的唯一方法。被按下或释放的键由 **code**
    变量指示，该变量包含一个虚拟的 KeyCode。


    添加键盘事件处理：使用 KeyEvents

