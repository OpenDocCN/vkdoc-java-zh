- fmt: "It is important to remember that because of the work we did in [Chapter 8](#9781484204160_Ch08.xhtml)\
    \ that the `Actor` superclass’s `Actor()` constructor method already performs\
    \ the `iX=xLocation;` and `iY=yLocation;` sprite `iX` and `iY` property setting\
    \ for us. Thus, all that we have to do in the `Prop()` constructor method is to\
    \ call `spriteFrame.setTranslateX(xLocation);` and `spriteFrame.setTranslateY(yLocation);`\
    \ inside of the constructor method, and after our `super()` constructor method\
    \ call. Notice in the code that the `xLocation` and `yLocation` variables are\
    \ utilized in both the `super()` constructor method call to set the `iX` and `iY`\
    \ properties for the `Prop` Actor as well as inside the `.setTranslateX()` and\
    \ `.setTranslateY()` method calls, to position the fixed sprites on the Stage\
    \ during the `Prop` object instantiation, so that we do not have to do this somewhere\
    \ else in our code. The Java code for the class, and constructor method, will\
    \ look like the following:\n\n```\npackage invincibagel;\nimport javafxscene.image.Image;\n\
    public class Prop extends Actor {\n    public Prop(String SVGdata, double xLocation,\
    \ double yLocation, Image... spriteCels) {\n        super(SVGdata, xLocation,\
    \ yLocation, spriteCels);\n        spriteFrame.setTranslateX(xLocation);\n   \
    \     spriteFrame.setTranslateY(yLocation);\n    }\n    @Override\n    public\
    \ void update() {\n        // empty method\n    }\n}\n```\n\nAs you can see in\
    \ [Figure 14-8](#9781484204160_Ch14.xhtml#Fig8), this Java code is error-free,\
    \ and everything that is needed to define and place a prop in the Scene (on the\
    \ Stage) is in place, thanks to good design of the `Actor` (fixed) sprite class.\
    \ This includes SVG collision shape data, the X and Y location (placement in the\
    \ scene), and one or more Image assets. The reason that we included an `.update()`\
    \ method in a fixed sprite class is to allow us to have animated (more than one\
    \ Image cel) props if we want to get fancy later on in our game design process,\
    \ and ratchet up the wow factor of the game’s visual design.\n\n![9781484204160_Fig14-08.jpg](OEBPS/Images/9781484204160_Fig14-08.jpg)\n\
    \n[Figure 14-8](#9781484204160_Ch14.xhtml#_Fig8). Position a fixed sprite on the\
    \ Stage in the constructor method using a `.setTranslateX()` and `.setTranslateY()`\n\
    \nNext let’s create `PropH`, `PropV`, and `PropB` (which stands for “both”) classes.\
    \ These will automatically mirror props for us around the X, Y or X and Y axes\
    \ using the constructor method, so the object will inherently mirror images.\n\
    \n## Mirrored Prop Classes: Set the `isFlip` Property in the Constructor\n\nTo\
    \ make our process of building scenes easier, since everything (collision, location,\
    \ animation) is part of a constructor method call, the difference between props\
    \ is how they are mirrored (X or Y axis, or both axes). In this section, we are\
    \ going to create variants of the `Prop` class that flip sprites for us, inside\
    \ of a constructor method, so that all we have to do to get the effect we want\
    \ is create that `PropX` object type. Create the first `PropH` class, as is shown\
    \ in [Figure 14-9](#9781484204160_Ch14.xhtml#Fig9).\n\n![9781484204160_Fig14-09.jpg](OEBPS/Images/9781484204160_Fig14-09.jpg)\n\
    \n[Figure 14-9](#9781484204160_Ch14.xhtml#_Fig9). Right-click on the project folder\
    \ and select New ![image](OEBPS/Images/arrow.jpg) Java Class; using a New Java\
    \ Class dialog, name it `PropH`\n\nCopy the contents of the basic `Prop` class\
    \ that you created in the previous section, including the package, import and\
    \ `super()` constructor, into the `PropH` class, and then change `Prop` to `PropH`,\
    \ as is shown in [Figure 14-10](#9781484204160_Ch14.xhtml#Fig10).\n\n![9781484204160_Fig14-10.jpg](OEBPS/Images/9781484204160_Fig14-10.jpg)\n\
    \n[Figure 14-10](#9781484204160_Ch14.xhtml#_Fig10). Create a `PropH` class structure\
    \ identical to the `Prop` class structure, except using `PropH`, instead of `Prop`\n\
    \nAdd the Java `this` keyword to your `PropH()` constructor method on a new line\
    \ under the `super()` constructor, and then use (type) the **period** key to open\
    \ up the handy NetBeans method selector pop-up, as seen in [Figure 14-11](#9781484204160_Ch14.xhtml#Fig11).\n\
    \n![9781484204160_Fig14-11.jpg](OEBPS/Images/9781484204160_Fig14-11.jpg)\n\n[Figure\
    \ 14-11](#9781484204160_Ch14.xhtml#_Fig11). Add a Java `this` keyword reference\
    \ to `PropH` (object) inside of the constructor and open up method helper\n\n\
    Double-click on the `.setIsFlipH` method, shown highlighted in [Figure 14-11](#9781484204160_Ch14.xhtml#Fig11),\
    \ and insert a `true` value inside the method call parameter area. The finished\
    \ `this.setIsFlipH(true);` Java statement can be seen in [Figure 14-12](#9781484204160_Ch14.xhtml#Fig12).\n\
    \n![9781484204160_Fig14-12.jpg](OEBPS/Images/9781484204160_Fig14-12.jpg)\n\n[Figure\
    \ 14-12](#9781484204160_Ch14.xhtml#_Fig12). Call the `.setIsFlipH()` method, off\
    \ of a Java `this` (`PropH`) object reference, and pass it the `true` setting\
    \ value\n\nIt is important to note that if we only use the `this.setFlipH(true);`\
    \ method invocation in the constructor method, we would still need to observe\
    \ that `isFlipH` is set this way, and invoke your `.spriteFrame.setScaleX(-1);`\
    \ method call, somewhere else in the code. Let’s go ahead and put this method\
    \ call in your constructor method as well, so that all our `PropH` objects automatically\
    \ will have their Image assets flipped around the Y axis. In case you might be\
    \ wondering why the `.setScaleX(-1)` method mirrors the Image asset around the\
    \ Y axis, that is something that I was also wondering about, but what I did was\
    \ match the `isFlipH` with the `.setScaleX(-1)` (since X is an H or horizontal\
    \ axis). That said, I would have made `.setScaleY(-1)` mirror around the vertical\
    \ Y axis, which makes more sense to me. Add another line of code and type `spriteFrame`\
    \ and hit the **period** key, and select `.setScaleX` in the pop-up, as seen in\
    \ [Figure 14-13](#9781484204160_Ch14.xhtml#Fig13).\n\n![9781484204160_Fig14-13.jpg](OEBPS/Images/9781484204160_Fig14-13.jpg)\n\
    \n[Figure 14-13](#9781484204160_Ch14.xhtml#_Fig13). Call a `.setScaleX()` method,\
    \ off of the `spriteFrame` object variable reference, and pass it a `-1` setting\
    \ value\n\nDouble-click on the `setScaleX(double value) void` option in the pop-up\
    \ method selector and then add the `-1` value, completing the method call. Now\
    \ all `PropH` objects will automatically have the Image asset Y axis mirrored!\
    \ The final code for the `PropH` constructor, once you add in the `.setTranslateX()`\
    \ and `.setTranslateY()` method calls that will actually position the fixed sprite\
    \ location on the Stage, is seen in [Figure 14-14](#9781484204160_Ch14.xhtml#Fig14),\
    \ and looks like the following Java code:\n\n```\nimport javafxscene.image.Image;\n\
    public class PropH extends Actor {\n    public PropH(String SVGdata, double xLocation,\
    \ double yLocation, Image... spriteCels) {\n        super(SVGdata, xLocation,\
    \ yLocation, spriteCels);\n        this.setIsFlipH(true);\n        spriteFrame.setScaleX(-1);\n\
    \        spriteFrame.setTranslateX(xLocation);\n        spriteFrame.setTranslateY(yLocation);\n\
    \    }\n}\n```\n\n![9781484204160_Fig14-14.jpg](OEBPS/Images/9781484204160_Fig14-14.jpg)\n\
    \n[Figure 14-14](#9781484204160_Ch14.xhtml#_Fig14). A completed `PropH()` constructor\
    \ method creates a fixed `PropH` object flipped along the horizontal X axis\n\n\
    Next, perform the same work process that you did for the `PropH` class and create\
    \ a `PropV` class that sets the `isFlipV` property to `true`, and implements the\
    \ `spriteFrame.setScaleY(-1);` method call, as shown in [Figure 14-15](#9781484204160_Ch14.xhtml#Fig15).\n\
    \n![9781484204160_Fig14-15.jpg](OEBPS/Images/9781484204160_Fig14-15.jpg)\n\n[Figure\
    \ 14-15](#9781484204160_Ch14.xhtml#_Fig15). A completed `PropV()` constructor\
    \ method creates a fixed `PropV` object flipped along the vertical Y axis"
  raw: 'It is important to remember that because of the work we did in [Chapter 8](#9781484204160_Ch08.xhtml)
    that the Actor superclass’s Actor() constructor method already performs the **iX=xLocation;**
    and **iY=yLocation;** sprite iX and iY property setting for us. Thus, all that
    we have to do in the Prop() constructor method is to call **spriteFrame.setTranslateX(xLocation);**
    and **spriteFrame.setTranslateY(yLocation);** inside of the constructor method,
    and after our **super()** constructor method call. Notice in the code that the
    xLocation and yLocation variables are utilized in both the super() constructor
    method call to set the iX and iY properties for the Prop Actor as well as inside
    the .setTranslateX() and .setTranslateY() method calls, to position the fixed
    sprites on the Stage during the Prop object instantiation, so that we do not have
    to do this somewhere else in our code. The Java code for the class, and constructor
    method, will look like the following:


    ```

    package invincibagel;

