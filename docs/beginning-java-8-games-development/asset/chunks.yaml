    \ my game development after I add in more game play logic. The implementation\
    \ of the basic jump and evade (projectiles) sprite cel Image assets would be accomplished\
    \ by using the following two basic Java conditional `if()` structures for using\
    \ the W key via `if(invinciBagel.iswKey())` and the S key via `if(invinciBagel.issKey())`\
    \ processing structures, which are shown below, as well as in [Figure 13-17](#9781484204160_Ch13.xhtml#Fig17):\n\
    \n```java\nif(invinciBagel.iswKey()) {\n    spriteFrame.setImage(imageStates.get(5));\n\
    }\nif(invinciBagel.issKey()) {\n    spriteFrame.setImage(imageStates.get(8));\n\
    }\n```\n\n![9781484204160_Fig13-17.jpg](OEBPS/Images/9781484204160_Fig13-17.jpg)\n\
    \n[Figure 13-17](#9781484204160_Ch13.xhtml#_Fig17). Add `if()` statements at the\
    \ bottom of the method for `.iswKey()` and `issKey` for Jump and Evade animation\n\
    \nNow we have implemented `imageStates(0)`, `imageStates(1)`, `imageStates(2)`,\
    \ `imageStates(4)`, `imageStates(5)`, `imageStates(6)`, and `imageStates(8)` in\
    \ our game event handling and character animation processing. The other sprites\
    \ are better suited for use with collision detection, so let’s save those for\
    \ later chapters in the book.\n\n## Last Minute Details: Setting the `isFlipH`\
    \ Property\n\nNext, I want to add in two more lines of code for what I call “bookkeeping,”\
    \ because we have installed `isFlipH` and `isFlipV` properties in our `Actor`\
    \ superclass, so if we mirror sprites around the X or Y axis, we need to be sure\
    \ to set these variables correctly, to reflect that (no pun intended) change to\
    \ the `Actor` object, so that we can use this information in other areas of our\
