    -1）都会围绕轴进行镜像。下一行代码将 **bulletRange** 变量设置为 **-50**，然后 **if(bulletOffset >= bulletRange)**
    条件语句使用每秒四像素的高速设置将子弹动画化到位。其编码方式与我们为敌人精灵所做的方式相同，即使用 **bulletOffset** 变量，该变量在条件语句的
    if 部分中，通过 `iBullet.spriteFrame` ImageView 对象调用的 `.setTranslateX()` 方法内的计数器逻辑中使用。if-else
    语句的 else 部分将 **shootProjectile** 变量设置为 **false**，因此只发射一发子弹！


    **if(takeSides)** 条件 if 结构的 Java 代码类似，只是它使用 **+=4**，bulletRange 为 **624**，以及一个
    **if(bulletOffset <= bulletRange)** 评估语句。你在 **shootProjectile()** 方法体内为这些 **if(!takeSides)**
    和 **if(takeSides)** 结构编写的 Java 代码可以在图 17-43 中看到，并且应该如下所示：


    ```

    private void shootProjectile() {

        if(!takeSides) {

            invinciBagel.iBullet.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iBullet.spriteFrame.setScaleX(-0.5);

            invinciBagel.iBullet.spriteFrame.setScaleY(0.5);

            bulletRange = -50;

            if(bulletOffset >= bulletRange) {

                bulletOffset-=4;

                invinciBagel.iBullet.spriteFrame.setTranslateX(bulletOffset);

            } else { shootBullet = false; }

        }

        if(takeSides) {

            invinciBagel.iBullet.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iBullet.spriteFrame.setScaleX(0.5);

            invinciBagel.iBullet.spriteFrame.setScaleY(0.5);

            bulletRange = 624;

            if(bulletOffset <= bulletRange) {

                bulletOffset+=4;

                invinciBagel.iBullet.spriteFrame.setTranslateX(bulletOffset);

            } else { shootBullet = false; }

        }

    }

    ```


    ![9781484204160_Fig17-43.jpg](img/9781484204160_Fig17-43.jpg)


    图 17-43。添加 private void shootProjectile() 方法并编写 if(!takeSides) 和 if(takeSides)
    if-else 语句


    如果你现在使用 **Run ![image](img/arrow.jpg) Project** 工作流程，你将看到你的 iBeagle 在屏幕上动画化，发射一颗子弹，然后迅速退回屏幕外。我们需要在代码中添加的下一个真实感层次是让
    iBeagle 在瞄准和发射子弹时暂停一秒钟，因为目前看起来它像是撞到了无形的屏障并被弹回屏幕外。我们将通过在 `.update()` 方法中的 `if(shootBullet)`
    条件语句中添加计数器逻辑来实现这一点。接下来我们就这么做，以便拥有一个完全专业的敌人自动攻击序列！


    让敌人在开火前暂停：pauseCounter 变量


    为了让敌人在屏幕上暂停，使其射击动作看起来更真实，并且让 InvinciBagel 角色有时间尝试攻击它（稍后我们将为其分配十分得分点），让我们在 Enemy.java
    类的顶部添加一个整数 **pauseCounter** 变量和一个布尔值 **launchIt** 变量，如图 17-44 中突出显示的那样。在 `if(shootBullet)`
    条件语句内部，在 `shootProjectile()` 方法调用之后，放置一个 **if(pauseCounter >= 60)** 条件结构，并在其内部将
    **launchIt** 设置为 **true**，并将 **pauseCounter** 变量重置为 **zero**。在条件的 else 部分，使用 **pauseCounter++**
    将 pauseCounter 增加 1，然后我们所要做的就是将 launchIt 布尔标志实现到我们的 `initiateAttack()` 方法中，这样我们就有了一个在瞄准和射击
    InvinciBagel 角色时会花时间的敌人角色。这个 `if(shootBullet)` if-else 结构的 Java 代码可以在图 17-44 中看到，并且应该如下所示：


    ```

    if(shootBullet) {

        shootProjectile();

        if(pauseCounter >= 60) {

            launchIt = true;

            pauseCounter = 0;

        } else { pauseCounter++ }

    }

    ```


    ![9781484204160_Fig17-44.jpg](img/9781484204160_Fig17-44.jpg)


    图 17-44。添加一个 pauseCounter 变量来创建计时器，产生一秒延迟，这样敌人就不会弹跳


    发射子弹：使用 launchIt 变量扣动扳机


    在你的每个 **if(takeSides)** 和 **if(!takeSides)** 条件 if 结构内部，将 `if(onScreen)` 结构修改为
    **if(onScreen** && **launchIt)** 结构，然后在这个修改后结构的 else 部分添加一条 **launchit = false;**
    语句。新的 if() 结构的 Java 代码如图 17-45 所示，如下所示：


    ```

    if(onScreen && launchIt) {

        destination = 700;

        if(spriteMoveR <= destination) {

            spriteMoveR+=1;

            spriteFrame.setTranslateX(spriteMoveR);

        } else {

            onScreen   = false;

            takeSides  = true;    // 如果位于 if(takeSides) 结构内部，这将为 false

            callAttack = false;

            launchIt   = false;   }

    }

    ```


    ![9781484204160_Fig17-45.jpg](img/9781484204160_Fig17-45.jpg)


    图 17-45。向 if(onScreen) 条件添加一个 launchIt 标志，使该代码结构等待 pauseCounter


    对于 **if(takeSides)** 版本的 `if(onScreen && launchIt)` 结构，确保将目标更改为 **-70**，将计数器改为
    **if(spriteMoveL >= destination)**，将计数器更新改为 **spriteMoveL-=1;**，并在该条件结构的 **else**
    部分将 takeSides 设置为 **false**。接下来，让我们更新 Bagel 类中的 **scoring engine**。


    更新 .scoringEngine() 方法：使用 .equals()


    让我们为最后三个对象计分 else-if 结构使用不同的方法，不再使用 `if(object instanceof Actor)` 进行更通用的对象类型比较，而是使用更精确的
    `.equals()` 方法，该方法允许我们指定对象本身，例如 **if(object.equals(invinciBagel.iBullet)**。你可以在图
    17-46 中看到完整的 if-else 结构，最后三个 Enemy 对象的 Java 代码如下所示：


    ```

    } else if(object.equals(invinciBagel.iBullet)) {

        invinciBagel.gameScore-=5;

        invinciBagel.playiSound5;

    } else if(object.equals(invinciBagel.iCheese)) {

        invinciBagel.gameScore+=5;

        invinciBagel.playiSound0;

    } else if(object.equals(invinciBagel.iBeagle)) {

        invinciBagel.gameScore+=10;

        invinciBagel.playiSound0;   }

    ```


    ![9781484204160_Fig17-46.jpg](img/9781484204160_Fig17-46.jpg)

