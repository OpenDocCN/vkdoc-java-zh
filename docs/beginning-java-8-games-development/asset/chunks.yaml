- fmt: "# JavaFX AudioClip 类：数字音频序列器\n\n幸运的是，JavaFX 的 `AudioClip` 引擎（实际上是 `javafx.scene.media`\
    \ 包中的一个类）可以为我们的游戏开发带来强大的功能。这是因为该类本质上被设计为一个音频序列引擎，能够控制音频资产表现的各个方面，并利用 6 个八度（向上三个，向下三个）的音高移位能力创建新的音频资产。我们将在本章开头详细了解这个类，然后在我们的主要\
    \ `InvinciBagel.java` 类中实现它，并在 `Bagel.java` 类中通过一个新的 `.playAudioClip()` 方法使用它，我们将在该类的\
    \ `.update()` 方法中编写并调用该方法。\n\n在详细了解了 JavaFX 的 `AudioClip` 类之后，我们将开始使用流行的 `Audacity\
    \ 2.0.6` 数字音频编辑（及音频效果）软件，该软件已在[第 1 章](#9781484204160_Ch01.xhtml)中安装所有开源游戏开发软件工具时安装。我们将使用\
    \ Audacity 经历一个音频资产创建和优化的过程。我们将运用在[第 5 章](#9781484204160_Ch05.xhtml)中学到的关于新媒体内容创作概念的知识，优化数字音频文件以实现\
    \ 800% 的数据占用空间节省。我们这样做是为了让数字音频资产使用的系统内存不超过 64KB；实际上，我们将让 6 个 16 位数字音频资产使用的数据少于\
    \ 62KB。\n\n一旦我们创建了这六个音频资产（它们将与用于控制 `InvinciBagel` 角色的六个不同按键相匹配），我们将在 `InvinciBagel`\
    \ 类中创建 `.loadAudioAssets()` 方法，并学习如何声明 `AudioClip` 和 `URL` 对象。在 `.loadAudioAssets()`\
    \ 方法内部，我们将一起使用这两个类（对象）来为游戏创建数字音频资产，并将它们安装到玩家计算机系统（或消费电子设备）的内存中。\n\n一旦这六个 `AudioClip`\
    \ 对象就位，我们将让 NetBeans 为 `AudioClip` 对象创建六个 Setter 方法，然后将这些 `.setiSound()` 方法“变形”为我们所需的\
    \ `.playiSound()` 方法。完成此操作后，我们将进入 `Bagel.java` 类，并添加一个 `.playAudioClip()` 方法。在此方法内部，我们将根据玩家按下的按键调用六个\
    \ `.playiSound()` 方法。\n\n本章需要涵盖的内容很多，让我们从深入研究 JavaFX 的 `AudioClip` 类及其各种属性和方法开始，这些属性和方法可以让我们实现令人印象深刻的音频序列！完成这部分后，我们就可以进入有趣的部分，开始使用\
    \ `Audacity 2.0.6` 和 `NetBeans 8` 进行创作！\n\n## JavaFX AudioClip 类：数字音频序列器\n\n`public\
    \ final` 的 `AudioClip` 类是 `javafx.scene.media` 包的一部分，本质上是一个数字音频样本播放和音频序列引擎，旨在使用短的音频片段或“样本”来创建更复杂的音频表现。这就是为什么这个类是你\
    \ Java 8 游戏开发中完美的数字音频媒体播放类。正如你在下面的 Java 继承层次结构中看到的，JavaFX 的 `AudioClip` 类是 `java.lang.Object`\
    \ 主类的直接子类。这表明 `AudioClip` 类是专门为成为数字音频序列引擎而“从头编码”的。\n\n```\njava.lang.Object\n\
    \  > javafx.scene.media.AudioClip\n```\n\n你的每个 `AudioClip` 对象将引用内存中的一个**数字音频样本**。这些样本可以几乎零延迟地触发，这使得该类成为\
    \ Java 8 游戏开发的完美选择。`AudioClip` 对象的加载方式与 `Media`（长格式音频或视频）对象类似，都使用 `URL` 对象，但行为却大相径庭。例如，`Media`\
    \ 对象不能自行播放；它需要一个 `MediaPlayer` 对象，如果包含数字视频，还需要一个 `MediaView` 对象。`Media` 对象更适合无法同时全部放入内存且必须流式传输以实现最佳内存利用的长格式数字音频资产（如音乐）。`MediaPlayer`\
    \ 只会将足够解压缩的数字音频数据“预卷”到内存中，以播放很短的时间，因此对于长数字音频片段，尤其是压缩过的，`MediaPlayer` 方法在内存效率上要高得多。\n\
    \n`AudioClip` 对象在实例化后立即可用，正如你将在本章后面看到的那样，这对于 Java 8 游戏开发来说是一个重要的属性。`AudioClip`\
    \ 对象的播放行为可以说是“发射后不管”，这意味着一旦你的某个 `.playiSound()` 方法调用被触发，此时你对数字音频样本的唯一可操作控制就是调用\
    \ `AudioClip` 的 `.stop()` 方法。\n\n有趣的是，你的 `AudioClip` 对象可以被多次触发（播放），甚至可以同时触发，正如你将在本章稍后看到的那样。要使用\
    \ `Media` 对象实现相同的结果，你必须为每个想要并行播放的声音创建一个新的 `MediaPlayer` 对象。\n\n`AudioClip` 对象如此多功能（响应迅速）的原因是你的\
    \ `AudioClip` 对象存储在内存中。`AudioClip` 对象使用代表整个声音的原始、未压缩的数字音频样本。它以其原始、未压缩的状态放入内存，这就是为什么在本章的下一节中，我们将使用\
    \ WAVE 音频文件格式。这种音频格式不应用任何压缩，因此，优化后的数字音频样本的文件大小也将代表每个样本将使用的系统内存量。\n\n然而，`AudioClip`\
    \ 类真正令人印象深刻的是它通过其属性和三个重载的 `.play()` 方法调用赋予开发者的强大能力。你可以设置样本播放优先级，将**音高**（声音的频率）向上移动最多\
    \ 8 倍（高八度）或向下移动至 1/8（低八度），在空间频谱中**平移**声音，控制声音的左右**平衡**，控制声音的**音量**（或振幅），以及使用 `AudioClip`\
    \ 的 `INDEFINITE` 常量控制声音的**播放次数**，从一次到无限次。\n\n除了这些 `AudioClip` 属性的 getter 和 setter\
    \ 方法之外，还有 `.play()` 和 `.stop()` 方法以及三个（重载的）`.play()` 方法：一个用于简单（默认）播放；一个用于指定音量；还有一个用于指定音量、平衡、频率比率（音高移位因子）、平移和样本优先级。"
  raw: 'Fortunately for us, the JavaFX **AudioClip** engine (actually, it is a class
    in the **javafx.scene.media** package) can bring a lot of power to our games development.
    This is because this class has essentially been designed to be an audio sequencing
    engine, able to control every aspect of the audio asset performance, as well as
    to create new audio assets using 6 octave (three up, and three down) pitch shifting
    capabilities. We’ll be learning about this class in detail, during the beginning
    of this chapter, and then implementing it in our primary InvinciBagel.java class,
    as well as using it in our Bagel.java class in a new **.playAudioClip()** method,
    which we’ll code and call in that class’s primary .update() method.


    After we look at the JavaFX AudioClip class is detail, we will get into using
    the popular **Audacity 2.0.6** digital audio editing (and audio effects) software,
    which we installed in [Chapter 1](#9781484204160_Ch01.xhtml), when we installed
    all of your open source game development software tools. We’ll go through an audio
    asset creation and optimization process using Audacity. We will use the concepts
    that we learned in [Chapter 5](#9781484204160_Ch05.xhtml) covering new media content
    creation concepts, and optimize digital audio files to achieve an 800% data footprint
    savings. We will do this so that our digital audio assets do not use more than
    64KB of our system memory; in fact, we will get six 16-bit digital audio assets
    to use less than 62KB of data.


    Once we have created the six audio assets, which will match up with the six different
    keys that we are using to control our InvinciBagel character, we will create the
    **.loadAudioAssets()** method in the InvinciBagel class and learn how to declare
    AudioClip and **URL** objects. Inside of the .loadAudioAssets() method we will
    then use these two classes (objects) together in order to create our digital audio
    assets for the game and install them into the player’s computer system (or consumer
    electronics device) memory.


    Once these six AudioClip objects are in place, we will then have NetBeans create
    six Setter methods for the AudioClip objects and then “morph” these .setiSound()
    methods into the .playiSound() methods that we require. After this is done, we
    will go into our Bagel.java class, and add a .playAudioClip() method. Inside of
    this method, we will call the six .playiSound() methods, based upon which keys
    the player is pressing.


    We have a lot of ground to cover during this chapter, so let’s get started by
    taking an in-depth look at the JavaFX AudioClip class and its various properties
    and methods that we can invoke impressive audio sequencing with! After we get
    that out of the way we can get into the fun stuff and start using Audacity 2.0.6
    and NetBeans 8 to create!


    JavaFX AudioClip Class: A Digital Audio Sequencer


    The **public final** AudioClip class is part of the **javafx.scene.media** package,
    and is essentially a digital audio sample playback and audio sequencing engine
    that is designed to use short audio snippets or “samples” to create more complex
    audio performances. This is why this class is the perfect digital audio media
    playback class to use for your Java 8 game development. As you can see by the
    Java inheritance hierarchy shown below, the JavaFX AudioClip class is a direct
    subclass of the java.lang.Object master class. This signifies that the AudioClip
    class has been “scratch coded” specifically for the purpose of being a digital
    audio sequencing engine.


    ```

    java.lang.Object

      > javafx.scene.media.AudioClip

    ```


    Your AudioClip objects will each reference one **digital audio sample** in memory.
    These can be triggered with virtually zero latency, which is what makes this class
    the perfect class to use for Java 8 games development. AudioClip objects are loaded
    similarly to Media (long-form audio or video) objects, using URL objects, but
    have a vastly different behavior. For example, a Media object cannot play itself;
    it will need a MediaPlayer object, and also the MediaView object, if it contains
    digital video. Media objects would be better suited for long-form digital audio
    assets (like music), which cannot fit in memory all at the same time, and must
    be streamed for optimal memory utilization. A MediaPlayer will only have enough
    decompressed digital audio data “pre-rolled” into memory to play for a short amount
    of time, so a MediaPlayer approach is much more memory efficient for long digital
    audio clips, especially if they are compressed.


    The AudioClip object is usable immediately upon instantiation, as you’ll see later
    on during this chapter, and this is an important attribute to have when it comes
    to Java 8 game development. AudioClip object playback behavior can be said to
    be “fire and forget,” which means that once one of your playiSound() method calls
    is invoked, your only operable control at that point over the digital audio sample
    is to call the AudioClip .stop() method.


    Interestingly, your AudioClip objects may also be triggered (played) multiple
    times, and AudioClips can even be triggered simultaneously, as you will see a
    bit later on during this chapter. To accomplish this same result by using a Media
    object, you would have to create a new MediaPlayer object for each sound that
    you want to play in parallel.


    The reason that the AudioClip object is so versatile (responsive) is because your
    AudioClip objects are stored in memory. The AudioClip object uses a raw, uncompressed
    digital audio sample representing the entire sound. This is placed into memory
    in its raw, uncompressed state, which is why in the next section of the chapter
    we’re going to use the WAVE audio file format. This audio format applies zero
    compression, and thus, the resulting file size for optimized digital audio samples
    will also represent the amount of system memory that each of these samples will
    utilize.


    What is really impressive about the AudioClip class, however, is the amount of
    power it gives developers via its properties and the three overloaded .play()
    method calls. You can set up sample playback priorities, **shift the pitch** (frequency
    of the sound) up to 8 times (higher octaves) or down to 1/8th (lower octaves),
    **pan** the sound anywhere in the spatial spectrum, control the left and right
    **balance** of the sound, control the **volume** (or amplitude) of the sound,
    and control the **number of times** the sound is played, from once to forever,
    using the AudioClip **INDEFINITE** constant.


    Besides the getter and setter methods for these AudioClip properties, there are
    .play() and .stop() methods as well as three (overloaded) .play() methods: one
    for simple (default) playback; one where you can specify volume; and one where
    you can specify volume, balance, frequency rate (pitch shifting factor), panning,
    and sample priority.'
  trans: '

    对我们来说幸运的是，JavaFX **AudioClip** 引擎（实际上，它是 **javafx.scene.media** 包中的一个类）能为我们的游戏开发带来强大的功能。这是因为该类本质上被设计成一个音频序列引擎，能够控制音频资产表现的各个方面，并利用
    6 个八度（向上三个，向下三个）的音高变换能力来创建新的音频资产。我们将在本章开头详细了解这个类，然后在我们的主要 InvinciBagel.java 类中实现它，并在我们的
    Bagel.java 类中通过一个新的 **.playAudioClip()** 方法使用它，我们将在该类的 .update() 主方法中编写并调用这个方法。


    在我们详细了解了 JavaFX AudioClip 类之后，我们将开始使用流行的 **Audacity 2.0.6** 数字音频编辑（及音频效果）软件，该软件我们在第
    1 章中安装所有开源游戏开发软件工具时已经安装。我们将使用 Audacity 完成一个音频资产创建和优化的过程。我们将运用在第 5 章中学到的关于新媒体内容创作的概念，并优化数字音频文件以实现
    800% 的数据占用空间节省。我们这样做是为了让我们的数字音频资产使用的系统内存不超过 64KB；事实上，我们将让六个 16 位数字音频资产使用的数据量低于
    62KB。


    一旦我们创建了这六个音频资产（它们将与我们用来控制 InvinciBagel 角色的六个不同按键相对应），我们将在 InvinciBagel 类中创建 **.loadAudioAssets()**
    方法，并学习如何声明 AudioClip 和 **URL** 对象。在 .loadAudioAssets() 方法内部，我们将一起使用这两个类（对象），以便为游戏创建数字音频资产，并将它们安装到玩家计算机系统（或消费电子设备）的内存中。


    一旦这六个 AudioClip 对象就位，我们将让 NetBeans 为这些 AudioClip 对象创建六个 Setter 方法，然后将这些 .setiSound()
    方法“变形”为我们所需的 .playiSound() 方法。完成此操作后，我们将进入 Bagel.java 类，并添加一个 .playAudioClip()
    方法。在此方法内部，我们将根据玩家按下的按键来调用六个 .playiSound() 方法。


    本章需要涵盖的内容很多，那么让我们从深入探究 JavaFX AudioClip 类及其各种属性和方法开始吧，这些属性和方法能让我们实现令人印象深刻的音频序列编排！完成这部分后，我们就可以进入有趣的部分，开始使用
    Audacity 2.0.6 和 NetBeans 8 进行创作了！


    JavaFX AudioClip 类：一个数字音频序列器


    **public final** AudioClip 类是 **javafx.scene.media** 包的一部分，本质上是一个数字音频样本回放和音频序列引擎，旨在使用短的音频片段或“样本”来创建更复杂的音频表现。这就是为什么这个类是用于
    Java 8 游戏开发的完美数字音频媒体回放类。正如你在下面显示的 Java 继承层次结构中所看到的，JavaFX AudioClip 类是 java.lang.Object
    主类的直接子类。这表明 AudioClip 类是专门为成为数字音频序列引擎而“从头编写”的。


    ```

    java.lang.Object

      > javafx.scene.media.AudioClip

    ```


    你的每个 AudioClip 对象将在内存中引用一个**数字音频样本**。这些样本可以几乎零延迟地触发，这使得这个类成为 Java 8 游戏开发的完美选择。AudioClip
    对象的加载方式与 Media（长格式音频或视频）对象类似，都使用 URL 对象，但行为却大相径庭。例如，Media 对象不能自行播放；它需要一个 MediaPlayer
    对象，如果包含数字视频，还需要一个 MediaView 对象。Media 对象更适合长格式的数字音频资产（如音乐），这些资产无法同时全部放入内存，必须通过流式传输以实现最佳内存利用。MediaPlayer
    只会将足够解压缩的数字音频数据“预卷”到内存中，以播放很短的时间，因此对于长的数字音频片段，尤其是经过压缩的，MediaPlayer 方法在内存效率上要高得多。


    AudioClip 对象在实例化后立即可用，正如你将在本章后面看到的那样，这对于 Java 8 游戏开发来说是一个重要的属性。AudioClip 对象的回放行为可以说是“发射后不管”，这意味着一旦你的某个
    playiSound() 方法调用被触发，此时你对数字音频样本唯一可操作的控制就是调用 AudioClip 的 .stop() 方法。


    有趣的是，你的 AudioClip 对象也可以被多次触发（播放），甚至 AudioClip 可以同时被触发，正如你将在本章稍后看到的那样。要使用 Media
    对象实现同样的效果，你必须为每个想要并行播放的声音创建一个新的 MediaPlayer 对象。


    AudioClip 对象如此多功能（响应迅速）的原因在于你的 AudioClip 对象存储在内存中。AudioClip 对象使用代表整个声音的原始、未压缩的数字音频样本。它以原始、未压缩的状态放入内存，这就是为什么在本章的下一节中，我们将使用
    WAVE 音频文件格式。这种音频格式应用零压缩，因此，优化后的数字音频样本的文件大小也将代表每个样本将使用的系统内存量。


    然而，AudioClip 类真正令人印象深刻的是它通过其属性和三个重载的 .play() 方法调用赋予开发者的强大能力。你可以设置样本回放优先级，**将音高**（声音频率）向上移动最多
    8 倍（高八度）或向下移动至 1/8（低八度），在空间频谱中**平移**声音，控制声音的左右**平衡**，控制声音的**音量**（或振幅），以及使用 AudioClip
    的 **INDEFINITE** 常量控制声音的**播放次数**，从一次到无限次。


    除了这些 AudioClip 属性的 getter 和 setter 方法之外，还有 .play() 和 .stop() 方法以及三个（重载的）.play()
    方法：一个用于简单（默认）回放；一个允许你指定音量；还有一个允许你指定音量、平衡、频率比率（音高变换因子）、平移和样本优先级。

    '
- fmt: '# 控制 `AudioClip` 对象


    控制 `AudioClip` 对象的关键是根据你希望如何控制样本播放，调用三个 `.play()` 方法之一。使用 `.play()` 进行直接播放，正如我们在本章中所做的那样；或者使用
    `.play(double volume)` 以相对音量级别（从 `0.0`（关闭）到 `1.0`（最大））播放你的 `AudioClip` 对象；或者使用
    `.play(double volume, double balance, double rate, double pan, double priority)`
    以相对 `volume`（`0.0` 到 `1.0`）、相对 `balance`（`-1.0` 左，`0.0` 居中，`1.0` 右）、音高偏移 `rate`（`0.125`
    到 `8.0`）、相对 `pan`（`-1.0` 左，`0.0` 居中，`1.0` 右）以及 `priority` 整数（指定哪些样本优先播放，由于资源不足和优先级低，某些样本可能不会被播放）来播放你的
    `AudioClip` 对象。接下来，让我们开始使用 `Audacity` 来优化我们的样本！


    # 创建和优化数字音频：`Audacity 2.0.6`


    启动最新版本的 `Audacity`——在撰写本文时是 `2.0.6`，并使用你的麦克风录制你说“left”这个词的声音。幸运的是，我的 `NetBeans
    8` 和 `Java 8` 开发工作站也是我的 `Skype` 工作站，我有一个基本的 `Logitech` 可调节麦克风放在支架上，可以用来制作基本的音频文件，这些文件将用于为我们在[第13章](#9781484204160_Ch13.xhtml)中放置的每个不同精灵运动添加音频文件。在本章的这一部分，我将介绍数字音频文件的“从头创建”和优化工作流程，你可以自己为本章编码部分所需的六个数字音频文件中的每一个执行此操作。如果你只想直接进入使用
    `JavaFX AudioClip` 类实现数字音频资产的 `Java 8` 编码部分，你也可以使用本书软件仓库中包含的六个音频文件。我建议回顾一下如何优化用于系统内存的未压缩音频，因为我们即将处理
    `113KB` 的原始源音频数据，从中削减 `99KB` 的数据，再将其减少 `88%`，使其仅为 `14KB`。


    如[图15-1](#9781484204160_Ch15.xhtml#Fig1)左侧所示，我**录制**了口语单词“**left**”，并使用 `Audacity`
    **选择工具**仅选择了录音会话中包含音频数据的那部分（以较深的灰色阴影显示）。由于你可以在 `Audacity` 波形编辑区域中看到数字音频波形表示，因此你可以看到录音中包含你刚刚录制数据的那部分。不包含任何数字音频数据的录音部分看起来就像一条直线。


    ![9781484204160_Fig15-01.jpg](OEBPS/Images/9781484204160_Fig15-01.jpg)


    [图15-1](#9781484204160_Ch15.xhtml#_Fig1). 启动 `Audacity`，录制你说“left”的声音，然后选择波形并导出选区


    获取仅包含原始数字音频数据（这正是我们在 `.WAV` 文件中真正想要的，也是我们想要使用 `Audacity` 优化的唯一数据）的最快方法是使用 **File
    ![image](OEBPS/Images/arrow.jpg) Export Selection** 菜单序列。这将允许我们直接将选中的音频数据以 `WAVE
    PCM` 数字音频格式写入 `left.wav` 文件。完成此操作后，我们可以开始一个新的 `Audacity` 编辑会话，直接打开该文件并开始数字音频内容优化过程。


    在 `Audacity` 中使用 **Export Selection** 菜单选项后，你将看到 **Export File** 对话框，如[图15-2](#9781484204160_Ch15.xhtml#Fig2)所示。在对话框底部的
    **File name:** 字段中输入 `left`，然后点击 **Save** 按钮。


    ![9781484204160_Fig15-02.jpg](OEBPS/Images/9781484204160_Fig15-02.jpg)


    [图15-2](#9781484204160_Ch15.xhtml#_Fig2). 在 **Export File** 对话框中，使用 `.WAV` 音频文件类型将文件命名为“left”


    现在，我们已将口语单词“left”保存在 `left.wav` 音频文件中，并已保存该文件，以便我们可以查看这个基线原始 `32-bit` `44.1kHz`
    数字音频将提供的数据占用空间（以及如果我们原样使用此文件，它在我们游戏中的内存占用空间），我们可以关闭录音会话，因为它已经完成了任务。我们将通过使用 **File
    ![image](OEBPS/Images/arrow.jpg) Close** 菜单序列来完成此操作，如[图15-3](#9781484204160_Ch15.xhtml#Fig3)左侧所示。


    ![9781484204160_Fig15-03.jpg](OEBPS/Images/9781484204160_Fig15-03.jpg)


    [图15-3](#9781484204160_Ch15.xhtml#_Fig3). 关闭当前编辑会话，然后打开“left”文件，注意其原始文件大小，以便进一步优化


    接下来我们要做的是返回并使用 **File ![image](OEBPS/Images/arrow.jpg) Open** 菜单序列打开 `left.wav`
    文件，该文件仅包含我们希望优化的数字音频数据段。这在[图15-3](#9781484204160_Ch15.xhtml#Fig3)中间部分（菜单序列）可以看到，在屏幕截图的右侧，你可以看到一个
    **Select one or more audio files**（文件打开）对话框。请注意，`left.wav` 文件显示了其原始数据占用空间（`113
    KB`）。


    我们可以将此原始数据占用空间作为**基线**，以查看在此优化过程中我们将数据占用空间减少了多少次（一旦完成，最终将减少 `8.8` 倍）。


    当你点击 **Open** 按钮并在 `Audacity` 中首次打开文件时，你将看到一个 **Warning** 对话框，如[图15-4](#9781484204160_Ch15.xhtml#Fig4)所示。这将建议你可以在编辑会话中使用原始文件的副本，而不是使用原始文件。这在多媒体行业中被称为“非破坏性”编辑，并且始终是一个非常好的主意，因为它本质上在工作流程中为你提供了一个**备份**文件（原始文件）。


    ![9781484204160_Fig15-04.jpg](OEBPS/Images/9781484204160_Fig15-04.jpg)


    [图15-4](#9781484204160_Ch15.xhtml#_Fig4). 在 `Audacity` 中启用非破坏性音频编辑


    选择“**Make a copy of the files before editing (safer)**”单选按钮选项，并勾选“**Don’t warn
    again, and always use my choice above**”复选框，这将把 `Audacity 2` 变成一个非破坏性的非线性数字音频编辑软件包。点击
    **OK** 按钮，我们就可以开始数字音频数据优化工作流程了。我们将优化数字音频数据，但不会压缩它，接下来我将解释原因。


    # 优化与压缩：音频内存占用空间


    你可能想知道为什么我使用未压缩的脉冲编码调制（`PCM`）波形（`.wav`）文件格式，而不是你们许多人用于数字音频音乐文件存储的行业标准 `.MP3` 文件格式。在开始优化过程之前，我将先说明原因。在数字音频中，数据占用空间优化实际上分为两个阶段。首先，你优化样本分辨率（`32-bit`
    原始录音、`24-bit` 高清音频、`16-bit` CD 质量音频和 `8-bit` 较低质量音频）和样本频率（`44.1kHz`、`22.05kHz`、`11.025kHz`
    是仍能保持足够数据以获得高质量结果的主要频率级别），然后应用压缩。压缩会影响你的文件大小；在这种情况下，它影响的是你的 `.JAR`（Java 资源）文件。'
  raw: 'The key to controlling the AudioClip object is to call one of the three .play()
    methods based upon how you want to control the sample playback. Use **.play()**
    for straightforward playback, as we will be doing during this chapter; or use
    **.play(double volume)** to play your AudioClip object at a relative volume level
    from 0.0 (off) to 1.0 (full); or use the **.play(double volume, double balance,
    double rate, double pan, double priority)** to play your AudioClip object at a
    relative **volume** (0.0 to 1.0), a relative **balance** (-1.0 left, 0.0 center,
    1.0 right), pitch shift **rate** (0.125 to 8.0), relative **pan** (-1.0 left,
    0.0 center, 1.0 right); and **priority** integer, which specifies which samples
    get played over others, which, due to low resources and low priority, may not
    get played. Let’s get into using Audacity to optimize our samples next!


    Creating and Optimizing Digital Audio: Audacity 2.0.6


    Launch the latest version of Audacity—at the time of this writing that would be
    2.0.6, and use your microphone to record your voice saying the word “left.” Fortunately
    my NetBeans 8 and Java 8 development workstation is also my Skype workstation,
    and I have a basic Logitech adjustable microphone on a stand that I can use to
    make the basic audio files that we will need to put audio files into place for
    each of our different sprite movements that we put into place in [Chapter 13](#9781484204160_Ch13.xhtml).
    I will go through the digital audio file “scratch creation” and optimization work
    process in this section of the chapter, and you can do this yourself, for each
    of the six digital audio files we will need to use in the coding sections of this
    chapter. You can also use the six audio files included with this book’s software
    repository if you want to simply get onto the Java 8 coding part of digital audio
    asset implementation using the JavaFX AudioClip class. I would recommend going
    over how to optimize uncompressed audio for use in system memory, as we’re about
    to take 113KB of raw source audio data, and knock 99KB of data off of it, and
    reduce it another 88% to be only 14KB.


    As you can see in the left side of [Figure 15-1](#9781484204160_Ch15.xhtml#Fig1),
    I have **recorded** the spoken word “**left**,” and used the Audacity **selection
    tool** to select only that portion of the recording session, seen in a darker
    gray shade, that contains the audio data. Since you can see the digital audio
    waveform representation in the Audacity waveform editing area, you can see the
    portion of your recording where the data that you just recorded is contained.
    The portion of your audio recording that does not contain any digital audio data
    will just look like a straight line.


    ![9781484204160_Fig15-01.jpg](OEBPS/Images/9781484204160_Fig15-01.jpg)


    [Figure 15-1](#9781484204160_Ch15.xhtml#_Fig1). Launch Audacity, record your voice
    saying the word “left,” and then select the wave and Export Selection


    The fastest way to get only the raw digital audio data, which is all that we really
    want inside of our .WAV file anyway, and is the only data that we want to be optimizing
    using Audacity, is to use the **File ![image](OEBPS/Images/arrow.jpg) Export Selection**
    menu sequence. This will allow us to directly write the selected audio data into
    the **left.wav** file using the WAVE PCM digital audio format. After we do this,
    we can then start a new Audacity editing session and simply open up that file
    and start the digital audio content optimization process.


    After you use the Export Selection menu option in Audacity, you will get the **Export
    File** dialog, which is shown in [Figure 15-2](#9781484204160_Ch15.xhtml#Fig2).
    Type **left** in the **File name:** field, seen in the bottom of the dialog, and
    click the **Save** button.


    ![9781484204160_Fig15-02.jpg](OEBPS/Images/9781484204160_Fig15-02.jpg)


    [Figure 15-2](#9781484204160_Ch15.xhtml#_Fig2). In the Export File dialog, name
    the file “left” using the .WAV audio file type


    Now that we have only the spoken word left in a left.wav audio file, and have
    saved that so that we can see what this baseline raw 32-bit 44.1kHz digital audio
    will give us as a data footprint (and as a memory footprint for our game, if we
    were to use this file as-is), we can close out the recording session, as it has
    served its purpose. We will do this by using the **File ![image](OEBPS/Images/arrow.jpg)
    Close** menu sequence, which can be seen on the left side of [Figure 15-3](#9781484204160_Ch15.xhtml#Fig3).


    ![9781484204160_Fig15-03.jpg](OEBPS/Images/9781484204160_Fig15-03.jpg)


    [Figure 15-3](#9781484204160_Ch15.xhtml#_Fig3). Close the current editing session,
    then Open the “left” file, noting its raw file size, for further optimization


    The next thing that we will do is to go back and use the **File ![image](OEBPS/Images/arrow.jpg)
    Open** menu sequence to open the **left.wav** file that contains only the segment
    of digital audio data that we wish to optimize. This is seen in the middle of
    [Figure 15-3](#9781484204160_Ch15.xhtml#Fig3)  (the menu sequence), and on the
    right side of the screenshot you can see a **Select one or more audio files**
    (File Open) dialog. Notice that the left.wav file shows what its raw (original)
    data footprint is (113 KB).


    We can use this original data footprint as a **baseline** to see how many times
    we reduce the data footprint (it will eventually be 8.8 times smaller, once we
    are done) during this optimization process we are about to embark on.


    When you click on the **Open** button and open a file for the first time in Audacity
    you’ll get a **Warning** dialog, which is shown in [Figure 15-4](#9781484204160_Ch15.xhtml#Fig4).
    This will advise you that you can make a copy of your original file for use in
    your editing session, instead of using the original. This is what is called “non-destructive”
    editing in the multimedia industry, and is always a very good idea, since it essentially
    provides you with a **back-up** file (the original), as part of the work process.


    ![9781484204160_Fig15-04.jpg](OEBPS/Images/9781484204160_Fig15-04.jpg)


    [Figure 15-4](#9781484204160_Ch15.xhtml#_Fig4). Enable non-destructive audio editing
    in Audacity


    Select the “**Make a copy of the files before editing (safer)**” radio button
    option, and check the “**Don’t warn again, and always use my choice above**” checkbox,
    which will turn Audacity 2 into a non-destructive non-linear digital audio editing
    software package. Click on the **OK** button and we’ll be ready to start your
    digital audio data optimization work process. We will be optimizing our digital
    audio data, but not compressing it, and I will get into why that is next.


    Optimization Versus Compression: The Audio Memory Footprint


    You might be wondering why I am using the uncompressed, pulse code modulated (PCM)
    Wave (.wav) file format instead of the industry standard .MP3 file format that
    many of you use for your digital audio music file storage. I will cover the reason
    for this up front, before we start the optimization process. In digital audio,
    there are really two stages to data footprint optimization. First you optimize
    the sample resolution (32-bit original recording, 24-bit HD audio, 16-bit CD Quality
    audio and 8-bit lower quality audio) and the sample frequency (44.1kHz, 22.05kHz,
    11.025kHz are the primary frequency levels that still maintain enough data for
    a quality result), and then you apply the compression. The compression affects
    your file size; in this case it is your .JAR (Java Resources) file.'
  trans: '

    控制 `AudioClip` 对象的关键在于根据你希望如何控制样本播放，调用三种 `.play()` 方法之一。使用 **.play()** 进行直接播放，正如我们将在本章中所做的那样；或者使用
    **.play(double volume)** 以 0.0（静音）到 1.0（最大）的相对音量级别播放你的 `AudioClip` 对象；或者使用 **.play(double
    volume, double balance, double rate, double pan, double priority)** 以相对**音量**（0.0
    到 1.0）、相对**平衡**（-1.0 左声道，0.0 居中，1.0 右声道）、音高偏移**速率**（0.125 到 8.0）、相对**声像**（-1.0
    左声道，0.0 居中，1.0 右声道）以及**优先级**整数（指定哪些样本优先播放，由于资源不足和优先级低，某些样本可能无法播放）来播放你的 `AudioClip`
    对象。接下来，让我们开始使用 Audacity 来优化我们的样本！


    创建和优化数字音频：Audacity 2.0.6


    启动最新版本的 Audacity——在撰写本文时，该版本为 2.0.6，并使用你的麦克风录制你说“left”这个词的声音。幸运的是，我的 NetBeans
    8 和 Java 8 开发工作站也是我的 Skype 工作站，并且我有一个基本的罗技可调节麦克风放在支架上，我可以使用它来制作基本的音频文件，这些文件将用于我们在第
    13 章中为每个不同精灵移动所放置的音频文件。我将在本章的这一部分介绍数字音频文件“从头创建”和优化的工作流程，你可以自己为本章编码部分所需的六个数字音频文件中的每一个执行此操作。如果你只想直接进入使用
    JavaFX `AudioClip` 类实现数字音频资产的 Java 8 编码部分，你也可以使用本书软件仓库中包含的六个音频文件。我建议回顾一下如何优化未压缩音频以用于系统内存，因为我们即将处理
    113KB 的原始源音频数据，从中削减 99KB 的数据，并将其再减少 88%，使其仅为 14KB。


    正如你在图 15-1 左侧所看到的，我**录制**了口语单词“**left**”，并使用 Audacity **选择工具**仅选择了录音会话中包含音频数据的那部分（以较深的灰色阴影显示）。由于你可以在
    Audacity 波形编辑区域中看到数字音频波形表示，因此你可以看到录音中包含你刚刚录制数据的那部分。录音中不包含任何数字音频数据的部分看起来就像一条直线。


    ![9781484204160_Fig15-01.jpg](img/9781484204160_Fig15-01.jpg)


    图 15-1。启动 Audacity，录制你说“left”的声音，然后选择波形并导出选区


    获取仅包含原始数字音频数据（这正是我们真正想要放在 `.WAV` 文件中的内容，也是我们想要使用 Audacity 优化的唯一数据）的最快方法是使用 **文件
    ![image](img/arrow.jpg) 导出选区**菜单序列。这将允许我们使用 WAVE PCM 数字音频格式将选定的音频数据直接写入 **left.wav**
    文件。完成此操作后，我们可以开始一个新的 Audacity 编辑会话，直接打开该文件，并开始数字音频内容优化过程。


    在 Audacity 中使用“导出选区”菜单选项后，你将看到**导出文件**对话框，如图 15-2 所示。在对话框底部的**文件名：**字段中输入 **left**，然后单击**保存**按钮。


    ![9781484204160_Fig15-02.jpg](img/9781484204160_Fig15-02.jpg)


    图 15-2。在“导出文件”对话框中，使用 `.WAV` 音频文件类型将文件命名为“left”


    现在，我们已将口语单词“left”单独保存在 left.wav 音频文件中，并已保存该文件，以便我们可以查看这个基线原始 32 位 44.1kHz 数字音频将提供的数据占用空间（以及如果我们原样使用此文件，它在我们游戏中的内存占用空间），我们可以关闭录音会话，因为它已经完成了它的使命。我们将通过使用**文件
    ![image](img/arrow.jpg) 关闭**菜单序列来完成此操作，如图 15-3 左侧所示。


    ![9781484204160_Fig15-03.jpg](img/9781484204160_Fig15-03.jpg)


    图 15-3。关闭当前编辑会话，然后打开“left”文件，注意其原始文件大小，以便进一步优化


    接下来我们要做的是返回并使用**文件 ![image](img/arrow.jpg) 打开**菜单序列来打开 **left.wav** 文件，该文件仅包含我们希望优化的数字音频数据段。这在图
    15-3 中间部分（菜单序列）可以看到，在屏幕截图的右侧，你可以看到一个**选择一个或多个音频文件**（文件打开）对话框。请注意，left.wav 文件显示了其原始数据占用空间（113
    KB）。


    我们可以将此原始数据占用空间作为**基线**，以查看在此优化过程中我们将数据占用空间减少了多少倍（一旦我们完成，最终将减少 8.8 倍）。


    当你单击**打开**按钮并在 Audacity 中首次打开文件时，你将看到一个**警告**对话框，如图 15-4 所示。这将建议你为编辑会话制作原始文件的副本，而不是使用原始文件。这在多媒体行业中被称为“非破坏性”编辑，并且始终是一个非常好的主意，因为它本质上在工作流程中为你提供了一个**备份**文件（原始文件）。


    ![9781484204160_Fig15-04.jpg](img/9781484204160_Fig15-04.jpg)


    图 15-4。在 Audacity 中启用非破坏性音频编辑


    选择“**在编辑前制作文件副本（更安全）**”单选按钮选项，并勾选“**不再警告，始终使用我上面的选择**”复选框，这将把 Audacity 2 转变为一个非破坏性的非线性数字音频编辑软件包。单击**确定**按钮，我们就可以开始数字音频数据优化工作流程了。我们将优化数字音频数据，但不会压缩它，接下来我将解释原因。


    优化与压缩：音频内存占用空间


    你可能想知道为什么我使用未压缩的脉冲编码调制（PCM）Wave（.wav）文件格式，而不是你们许多人用于数字音频音乐文件存储的行业标准 .MP3 文件格式。在开始优化过程之前，我将先说明原因。在数字音频中，数据占用空间的优化实际上分为两个阶段。首先，你优化样本分辨率（32
    位原始录音、24 位高清音频、16 位 CD 质量音频和 8 位较低质量音频）和样本频率（44.1kHz、22.05kHz、11.025kHz 是仍能保持足够数据以获得高质量结果的主要频率级别），然后应用压缩。压缩会影响你的文件大小；在这种情况下，它影响的是你的
    .JAR（Java 资源）文件。

    '
- fmt: '# 为什么我们不将文件压缩成 MP3 格式，让我们的 `.JAR` 文件缩小几 KB？


    主要原因在于 MP3 是一种“有损”格式，它会丢弃音频样本中的原始数据（以及质量）。由于 `JavaFX` 的 `AudioClip` 类会将我们的数字音频资源**解压缩**到内存中，如果我们使用
    MP3，那么内存中包含的音频数据质量将低于使用 WAV 格式的情况。考虑到在下一节将要学习的样本优化工作流程中，我们至少能实现 8 倍的数据占用空间缩减，并且我们所有的数字音频资源都将被优化到
    4KB 到 14KB 的数据占用空间，MP3 压缩相对于它给我们带来的样本质量损失，并不能真正减少 JAR 文件的数据占用空间。游戏音频是短促的音效和音乐循环，因此我们可以使用
    WAV 文件格式并获得良好的效果，而且无需使用**任何压缩**。另一个优点是，你在文件管理软件中看到的 WAV 文件的数据大小，也就是该样本在内存中占用的空间大小。


    ## 音频样本分辨率和频率：优化内存占用


    内存数据占用空间缩减过程的第一步，是将原始的 32 位数据采样率降低 100%，从 32 位浮点数据转换为 16 位 PCM 数据，如[图 15-5](#9781484204160_Ch15.xhtml#Fig5)
    截图左下角所示。找到 Audacity 样本编辑区域左侧灰色信息面板中的下拉箭头（我在截图中用红圈标出，因为如果你不习惯使用它，可能不太容易找到）。这将弹出一个菜单，允许你设置数据显示方式（波形图或频谱图）以及设置样本数据格式。我们需要使用这个子菜单来选择
    **16-bit PCM** 选项，而不是 32-bit float 选项。不要使用此菜单设置采样率，因为这会使你的声音变慢（如果你想以后将其用作特殊效果，可以尝试一下）。接下来，我们将学习设置采样率的正确工作流程。


    ![9781484204160_Fig15-05.jpg](OEBPS/Images/9781484204160_Fig15-05.jpg)


    [图 15-5](#9781484204160_Ch15.xhtml#_Fig5). 点击左侧的下拉菜单箭头，选择 Set Sample Format ![image](OEBPS/Images/arrow.jpg)
    16-bit PCM 设置选项


    需要注意的是，如果你在进行此数据位深度更改后保存文件，文件大小并不会改变！你可能已经注意到，“导出文件”对话框会以 16 位 PCM WAVE 格式保存你的文件，因此它正在执行你在此处对内存中的数据所做的相同调整，以影响磁盘上的文件大小。我在此处包含此步骤，只是为了让你对整个流程有一个全面的了解：从降低样本数据率开始，然后降低样本频率（我们下一步将进行），最后处理立体声与单声道样本的考量，这将是本章这一部分的最后一步。


    这些“优化操作”中的每一步，在每次应用工作流程时，都可以将文件大小（和内存占用）减少 100% 或更多。事实上，当我们下一步将采样频率从 44,100 降低到
    11,025 时，我们将把数据占用空间减少 200%（从 44,100 到 22,050 减少 100%，然后从 22,050 到 11,025 再减少 100%）。


    ## 设置音频采样频率：将内存数据占用空间再减少 200%


    在 Audacity 中为你的项目设置**数字音频采样频率**的正确方法是使用项目采样频率设置的下拉对话框。这可以在[图 15-6](#9781484204160_Ch15.xhtml#Fig6)
    的左下角看到，用红色框突出显示。选择 **11025** 频率设置，这将把音频数据（可以将其视为声波的垂直切片）采样率从每秒 44,100 次降低到每秒 11,025
    个数据切片，即最初采样的音频数据减少了 4 倍，由于这个采样频率步骤，数据占用空间减少了 200%（在这种情况下，你应该将其视为内存使用量，而不仅仅是文件空间使用量）。


    ![9781484204160_Fig15-06.jpg](OEBPS/Images/9781484204160_Fig15-06.jpg)


    [图 15-6](#9781484204160_Ch15.xhtml#_Fig6). 通过将音频采样频率从每秒 44100 次降低到每秒 11025 次，将其减少四倍


    你可以在 44,100 和 8000 采样频率之间的这七种不同设置中进行尝试，每种设置都有不同的质量水平。8000 的质量太低，不适合用于语音样本，但可能适用于“脏”或“嘈杂”的声音，例如爆炸声。


    如果你想听听这些不同设置的效果，在每次选择后，点击[图 15-6](#9781484204160_Ch15.xhtml#Fig6) 左上角音频传输按钮中的绿色播放（右向三角形）按钮。你会发现
    32,000 频率听起来和 44,100 频率一样，22,050 频率也是如此。16,000 或 11,025 频率听起来不那么“明亮”，但仍然可用，所以我使用了
    11,025 频率，以实现数据的 4 倍均匀降采样。这是因为按**偶数**倍（2 倍或 4 倍）进行降采样总能提供最佳结果。这涉及到数学运算，不会留下“部分”样本（或像素，因为同样的概念也适用于图像处理）。


    接下来，让我们使用 **File ![image](OEBPS/Images/arrow.jpg) Export** 工作流程。如果你想在菜单中看到它，可以在[图
    15-1](#9781484204160_Ch15.xhtml#Fig1) 中找到此菜单序列，它显示在“文件”菜单上，位于“导出所选”选项上方。在“导出文件”对话框中（如[图
    15-7](#9781484204160_Ch15.xhtml#Fig7) 所示），你可以使用**不同的文件名**保存文件的新版本，这样你就同时拥有了原始未压缩数据文件
    `left.wav` 和新的压缩（立体声）数据文件 `leftstereo.wav`。将此文件命名为 **leftstereo**，然后点击 **Save**
    按钮，将其保存为未压缩的 **16-bit PCM WAV** 文件，如[图 15-7](#9781484204160_Ch15.xhtml#Fig7) 左侧所示。


    ![9781484204160_Fig15-07.jpg](OEBPS/Images/9781484204160_Fig15-07.jpg)


    [图 15-7](#9781484204160_Ch15.xhtml#_Fig7). 使用 File ![image](OEBPS/Images/arrow.jpg)
    Export 对话框，将文件命名为 `leftstereo`，点击 Save 保存文件，然后使用 File ![image](OEBPS/Images/arrow.jpg)
    Open 检查其文件大小


    接下来我们要做的是，使用与[图 15-3](#9781484204160_Ch15.xhtml#Fig3) 中所示相同的工作流程，使用 **File ![image](OEBPS/Images/arrow.jpg)
    Open** 菜单序列，打开“选择一个或多个音频文件”对话框（如[图 15-7](#9781484204160_Ch15.xhtml#Fig7) 右侧所示），这将允许我们将鼠标悬停在
    **leftstereo.wav** 文件上，看到其大小为 **28.0 KB**，这比原始 112 KB 源文件大小减少了四倍，正如我们所预期的那样！'
  raw: 'So, why are we not compressing our files into MP3 format, to make our .JAR
    file a few kilobytes smaller? A primary reason for this is because MP3 is a “lossy”
    format, which throws away original data (and quality) for the audio sample. Since
    the JavaFX AudioClip class is going to take our digital audio assets and **decompress**
    them into memory, if we use MP3, that memory will contain **lower quality** audio
    data that if we use WAV format. Given that we are going to get at least an 8X
    data footprint reduction during the sample optimization work process that we are
    about to learn in the next section of the chapter, and that all our digital audio
    assets are going to be optimized to between 4KB and 14K of data footprint, MP3
    compression is not going to give us any real JAR file data footprint reduction
    relative to the reduction in sample quality that it will “cost” us. Game audio
    is short-burst sound effects and musical loops, so we can use WAV file format
    and still get a good result, and not have to use **any compression**. The other
    advantage is the data size of the WAV file that you see in our file management
    software is also the amount of memory the sample will use.


    Audio Sample Resolution and Frequency: Optimizing for Your Memory Footprint


    The first step in the memory data footprint reduction process will be to take
    the raw 32-bit data sampling rate and reduce that by 100%, from 32-bit floating
    point data to 16-bit PCM data, as is shown in [Figure 15-5](#9781484204160_Ch15.xhtml#Fig5)
    on the bottom left of the screenshot. Find the drop-down arrow in the gray information
    panel on the left side of the Audacity sample editing area, which I have circled
    in red in this screenshot as it is kind of difficult to find if you are not used
    to using it. This will give you a menu that allows you to set the data display
    (Waveform or Spectrogram) and set your Sample Data Format, which is the submenu
    that we want to use to select the **16-bit PCM** option rather than the 32-bit
    float option. Do not set your sample rate using this menu, as it will slow down
    your voice (you can try this if you want to use this as a special effect later
    on). Next, we will be looking at the correct work process for setting the sample
    rate.


    ![9781484204160_Fig15-05.jpg](OEBPS/Images/9781484204160_Fig15-05.jpg)


    [Figure 15-5](#9781484204160_Ch15.xhtml#_Fig5). Click the drop-down menu arrow
    at the left and select the Set Sample Format ![image](OEBPS/Images/arrow.jpg)
    16-bit PCM setting option


    It is important to note that if you save your file out after making this data
    bit-level change, your file size will not have changed! As you may have noticed,
    the Export File dialog is saving your file in 16-bit PCM WAVE format, so it is
    doing this same adjustment that you are doing here in memory, for your file size
    on disk. I am simply including this step here so that you get a comprehensive
    overview of the entire process, starting with a sample data rate reduction, and
    then reducing the sample frequency rate, which we are going to do next, and finally
    addressing the stereo versus mono sample consideration, which will be our final
    step later on in this section of the chapter.


    Each of these “optimization moves” can reduce the file size (and memory footprint)
    by 100% or more, upon each application of the work process. In fact, when we reduce
    the sampling frequency next from 44,100 to 11,025 we will be reducing the data
    footprint by 200% (100% from 44,100 to 22,050, and then 100% from 22,050 to 11,025).


    Setting the Audio Sample Frequency: Reducing Your Memory Data Footprint by Another
    200%


    The proper way to set the **digital audio sampling frequency** for your project
    in Audacity is to use the drop-down dialog for the project’s sample frequency
    setting. This can be seen in the lower left corner of [Figure 15-6](#9781484204160_Ch15.xhtml#Fig6),
    highlighted inside of a red box. Select the **11025** frequency setting, which
    reduces the audio data (think of these as vertical slices of the sound wave) sampling
    rate from 44,100 times per second, to 11,025 data slices per second, or a 4X reduction
    in audio data sampled in the first place, which is a 200% reduction in data footprint
    due to this sample frequency step in the data (in this case, you should look at
    this as memory used, more than file space used) optimization work process.


    ![9781484204160_Fig15-06.jpg](OEBPS/Images/9781484204160_Fig15-06.jpg)


    [Figure 15-6](#9781484204160_Ch15.xhtml#_Fig6). Reduce audio sampling frequency
    by four times by reducing it from 44100 per second to 11025 per second


    You can play around with these seven different settings, between the 44,100 and
    8000 sample frequency rates, as each of them will have a different quality level,
    with 8000 being too low of a quality to use for voice samples, but which might
    work well with a “dirty” or “noisy” sound, such as an explosion.


    If you want to hear what these different settings sound like, after you select
    each one of course, click on the green play (right facing triangle) in the audio
    transport buttons shown at the top-left of [Figure 15-6](#9781484204160_Ch15.xhtml#Fig6).
    You will see that the 32,000 frequency sounds just like the 44,100 frequency rate,
    as does the 22,050 frequency. The 16,000 or 11,025 frequency rates do not sound
    as “bright” but are still usable, so I used the 11,025 rate, to get an even 4X
    downsample of the data. This is because downsampling by an **even** 2X (100%)
    or 4X (200%) will always provide the best result. This is because of the math
    involved leaving no “partial” samples (or pixels, since the same concept applies
    with imaging).


    Next, let’s use the **File ![image](OEBPS/Images/arrow.jpg) Export** work process.
    If you want to see this on a menu, this menu sequence can be seen in [Figure 15-1](#9781484204160_Ch15.xhtml#Fig1),
    and is shown on the File menu, above Export Selection option. In the Export File
    dialog, which can be seen in [Figure 15-7](#9781484204160_Ch15.xhtml#Fig7), you
    can save the new version of the file using a **different file name**, so that
    you have both the original uncompressed data in the left.wav file and the new
    compressed (stereo) data in the leftstereo.wav file. Name this file **leftstereo**,
    and click on the **Save** button, to save it as an uncompressed **16-bit PCM WAV**
    file, as shown on the left side of [Figure 15-7](#9781484204160_Ch15.xhtml#Fig7).


    ![9781484204160_Fig15-07.jpg](OEBPS/Images/9781484204160_Fig15-07.jpg)


    [Figure 15-7](#9781484204160_Ch15.xhtml#_Fig7). Use the File ![image](OEBPS/Images/arrow.jpg)
    Export dialog, name the file leftstereo, Save the file, then use File ![image](OEBPS/Images/arrow.jpg)
    Open to check its file size


    The next thing that we will want to do is use the same work process shown back
    in [Figure 15-3](#9781484204160_Ch15.xhtml#Fig3), and use the **File ![image](OEBPS/Images/arrow.jpg)
    Open** menu sequence, to open the **Select one or more audio files** dialog, shown
    on the right side of [Figure 15-7](#9781484204160_Ch15.xhtml#Fig7), which will
    allow us to mouse-over the **leftstereo.wav** file and see that the size is **28.0
    KB**, which is four times less data than the original 112 KB source file size,
    just as we expected!'
  trans: '

    那么，为什么我们不把文件压缩成 MP3 格式，让我们的 .JAR 文件体积再小几 KB 呢？一个主要原因是 MP3 是一种“有损”格式，它会丢弃音频样本中的原始数据（以及质量）。由于
    JavaFX 的 `AudioClip` 类会将我们的数字音频资源**解压缩**到内存中，如果我们使用 MP3，那么内存中包含的音频数据质量将**低于**使用
    WAV 格式的情况。考虑到在下一节将要学习的样本优化工作流程中，我们至少能将数据占用空间减少 8 倍，并且我们所有的数字音频资源都将被优化到 4KB 到 14KB
    的数据占用空间，那么相对于 MP3 压缩将“牺牲”的样本质量而言，它并不能为我们的 JAR 文件带来实质性的数据占用空间减少。游戏音频是短促的音效和音乐循环，因此我们可以使用
    WAV 文件格式并获得良好效果，而且无需使用**任何压缩**。另一个优点是，你在文件管理软件中看到的 WAV 文件的数据大小，也就是该样本在内存中将要占用的内存量。


    音频样本分辨率与频率：优化内存占用空间


    内存数据占用空间缩减过程的第一步，是将原始的 32 位数据采样率降低 100%，从 32 位浮点数据转换为 16 位 PCM 数据，如截图左下角的图 15-5
    所示。在 Audacity 样本编辑区域左侧的灰色信息面板中找到下拉箭头，我在截图中用红色圆圈标出了它，因为如果你不习惯使用它，可能不太容易找到。这会弹出一个菜单，允许你设置数据显示方式（波形图或频谱图）以及设置样本数据格式，我们需要使用这个子菜单来选择
    **16 位 PCM** 选项，而不是 32 位浮点选项。不要使用此菜单设置采样率，因为它会降低你的语速（如果你想以后将其用作特殊效果，可以尝试一下）。接下来，我们将学习设置采样率的正确工作流程。


    ![9781484204160_Fig15-05.jpg](img/9781484204160_Fig15-05.jpg)


    图 15-5。点击左侧的下拉菜单箭头，选择设置样本格式 ![image](img/arrow.jpg) 16 位 PCM 设置选项


    需要注意的是，如果你在进行此数据位深度更改后保存文件，文件大小并不会改变！你可能已经注意到，“导出文件”对话框会以 16 位 PCM WAVE 格式保存你的文件，因此它正在执行与你在此处内存中相同的调整，以影响磁盘上的文件大小。我在此处包含此步骤，只是为了让你对整个流程有一个全面的了解：从降低样本数据率开始，然后降低样本频率（我们下一步要做的），最后处理立体声与单声道样本的考量，这将是本章本节中的最后一步。


    这些“优化操作”中的每一步，在每次应用工作流程时，都可以将文件大小（以及内存占用空间）减少 100% 或更多。事实上，当我们下一步将采样频率从 44,100
    降低到 11,025 时，我们将把数据占用空间减少 200%（从 44,100 到 22,050 减少 100%，再从 22,050 到 11,025 减少
    100%）。


    设置音频采样频率：将内存数据占用空间再减少 200%


    在 Audacity 中为你的项目设置**数字音频采样频率**的正确方法是使用项目采样频率设置的下拉对话框。这可以在图 15-6 的左下角看到，用红色框突出显示。选择
    **11025** 频率设置，这将把音频数据（可以将其视为声波的垂直切片）的采样率从每秒 44,100 次降低到每秒 11,025 个数据切片，即最初采样的音频数据减少了
    4 倍，由于数据（在这种情况下，你应该将其视为内存使用量，而不仅仅是文件空间使用量）优化工作流程中的这个采样频率步骤，数据占用空间减少了 200%。


    ![9781484204160_Fig15-06.jpg](img/9781484204160_Fig15-06.jpg)


    图 15-6。通过将音频采样频率从每秒 44100 次降低到每秒 11025 次，将其减少四倍


