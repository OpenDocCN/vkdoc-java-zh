- fmt: 'As the figure illustrates, your code is error free, and you are ready to use
    the **Run ![image](OEBPS/Images/arrow.jpg) Project** work process and watch the
    60FPS fireworks! Get ready for some blinding speed!


    Next, let’s run the **Live Results** Profiler and **Threads Profiler** one last
    time to see if your pulse engine is cranking! Once you do this, you will know
    that you have successfully implemented your `GamePlayLoop` timing engine for your
    game, and you can then shift your focus to developing your game sprites, collision
    detection, physics, and logic!


    ## Profiling the GamePlayLoop: Pulse Engine


    Now, let’s use the **Profile ![image](OEBPS/Images/arrow.jpg) Profile Project
    (InvinciBagel)** work process one final time to see if anything new has appeared
    in the **Live Results** and **Threads** tabs in NetBeans. Click the Live Results
    icon, shown at the left of [Figure 7-21](#9781484204160_Ch07.xhtml#Fig21), and
    start the Live Results Profiler in a tab. Note that the `GamePlayLoop` object
    is created, using `<init>`; that an `AnimationTimer` is started, using the `invincibagel.GamePlayLoop.start()`
    entry in the Profiler output; and that there is an `invincibagel.GamePlayLoop.handle(long)`
    entry as well, which means that your game timing loop is being processed.


    ![9781484204160_Fig07-21.jpg](OEBPS/Images/9781484204160_Fig07-21.jpg)


    [Figure 7-21](#9781484204160_Ch07.xhtml#_Fig21). Run the Live Results Profiler


    As you can see, the **Invocations** column indicates how many pulses have accessed
    the `.handle()` method in the `GamePlayLoop`. It has only taken **40.1** milliseconds
    to process **3,532** pulses, so each pulse equates to **0.0114** milliseconds,
    or **114** nanoseconds, using the new Java 8 timing resolution. Thus, your current
    code for testing the pulse, or at least the JavaFX pulse engine, is running efficiently.


    Of course, you will need to remove this pulse engine testing code from the `.handle()`
    method before moving on to the next chapter, when you will start processing game
    assets and logic inside this method.


    Next, let’s scroll down one last time in the Profiler tab, displayed at the top
    left of [Figure 7-21](#9781484204160_Ch07.xhtml#Fig21), and click the **Threads**
    icon, which is shown at the top left of [Figure 7-22](#9781484204160_Ch07.xhtml#Fig22),
    to open the Threads tab. As you can see, the pulse engine is running, and pulse
    events can be seen processing in Thread-6 as well as the JavaFX Application Thread.


    ![9781484204160_Fig07-22.jpg](OEBPS/Images/9781484204160_Fig07-22.jpg)


    [Figure 7-22](#9781484204160_Ch07.xhtml#_Fig22). Run the Threads Profiler


    Given the empty `.handle()` method processing from the `GamePlayLoop` object in
    Thread-6 (see [Figure 7-18](#9781484204160_Ch07.xhtml#Fig18)), you can assume
    that the pulse events in Thread-6 are from the `GamePlayLoop` `AnimationTimer`
    subclass. This means that the pulse events showing in the JavaFX Application Thread
    are showing where the `.handle()` method is accessing a `buttonContainer` `HBox`
    object contained in a `stackPane` Scene Graph root in the `InvinciBagel` class.


    Now, you have a low-overhead, extremely fast game processing loop in place, and
    you can start to create your other (sprite, collision, physics, scoring, logic,
    and so on) game engines! One down, and a whole bunch to go!


    ## Summary


    In this seventh chapter, you wrote the first of the many game engines that you
    will be designing and coding over the course of this book, the `GamePlayLoop`
    game play timing class and object, which allow you to tap into the powerful JavaFX
    pulse event processing system.


    First, you examined the different classes in the `javafx.animation` package and
    the different ways to use the `Animation`, `Transition`, `Timeline`, and `AnimationTimer`
    classes to harness the JavaFX pulse event processing system.


    After that, you learned how to create a **new Java class** in NetBeans and then
    **extended** the `AnimationTimer` superclass to create the `GamePlayLoop` subclass,
    which will process your game play logic at 60FPS. You saw how to use NetBeans
    to help you write the majority of the code for this new subclass, including the
    package and class statement, the import statement, and the bootstrap `.handle()`
    method.


    Next, you went into the `InvinciBagel.java` class and declared and named a new
    `gamePlayLoop` `GamePlayLoop` object, using the new class you created. Then, you
    tested the code and profiled it to see if any new entries appeared in the **Threads
    Live Results** tabs. You also tested the `.handle()` method that NetBeans coded
    for you and changed it to an empty method to get rid of repeated errors thrown
    by the pulse event engine. Next, you implemented the `.start()` and `.stop()`
    methods, using the Java `super` keyword, so that you can control your use of the
    pulse engine if you want to add in additional Java statements, such as saving
    the game state, later on, when the pulse engine is started and stopped. You again
    tested and profiled the application to observe your progress. Finally, you placed
    some test code in the `.handle()` method so that you could again test and profile
    the application to make sure that the pulse event engine was quickly and consistently
    processing the code that you placed in the `.handle()` method.


    In the next chapter, you are going to take a look at how to create and implement
    abstract classes which will later be used to create your game **sprites**. Once
    we have that in place, it will allow us to display them, animate them, and process
    their movement on the display screen inside your new `gamePlayLoop` engine in
    real time in later chapters.


    # CHAPTER 8


    ![image](OEBPS/Images/frontdot.jpg)


    ## Creating Your Actor Engine: Design the Characters for Your Game and Define
    Their Capabilities


    Now that we have created the game play timing loop in [Chapter 7](#9781484204160_Ch07.xhtml),
    let’s get into some scratch coding here in [Chapter 8](#9781484204160_Ch08.xhtml),
    and create the **public abstract class** framework that we can use to create the
    different types of **sprites** that we will be using in our InvinciBagel game.
    This essentially equates to your “**Actor Engine**” for your game, as you’ll define
    and design the various types of game components that your game will include as
    actors, and these two classes will be used to create all of the other classes
    that will be used to create the objects (components) that are in your game. These
    would include things such as the InvinciBagel himself (the `Bagel` class), his
    adversaries (the `Enemy` class), all the treasure he looks for during the game
    (the `Treasure` class), things that are shot at him (the `Projectile` class),
    things that he navigates over and around (the `Prop` classes), all providing game
    objectives that InvinciBagel must try and achieve.


    During this chapter, we will create **two** public abstract class constructs.
    The first, the `Actor` class, will be the superclass of the other, the `Hero`
    subclass. These two abstract classes can be used during the book to create both
    our **fixed sprites**, which are sprites that do not move (obstacles and treasure),
    using the `Actor` superclass, and sprites that move around the screen, using a
    `Hero` subclass of the `Actor` class. The `Hero` class will provide additional
    methods and variables for motion sprites (the superhero, and his arch enemies
    in the multi-player version of the game). These will track things like collision
    and physics characteristics, as well as Actor animation (motion states). Having
    lots of motion on the screen will make game play more interesting, and allow us
    to make the game more challenging for the player.'
