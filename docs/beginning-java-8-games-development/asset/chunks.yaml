    ## Triggering the `.playiSound()` Methods in `Bagel.java`: The `.playAudioClip()`
    Method


    Now that we have declared, universal resource located (referenced), and instantiated
    our `AudioClip` objects, and created `.playiSound()` methods that will allow us
    to trigger each of these digital audio samples from “outside” of the `InvinciBagel.java`
    class, we can go into the `Bagel.java` class, and write some code that allows
    us to trigger these audio objects, to see how well the `AudioClip` class works.
    The best way to do this with our existing code is to use the event handler code
    we are using to move our motion sprite object to also allow us to trigger one
    of these sounds for each of the `KeyEvents` that we have set up currently for
    our game. This is why I named these files with the keys that they will be triggered
    by. The first thing that we need to put into place in the `Bagel.java` class,
    similar to what we did in the `InvinciBagel` class, is a method call to a `playAudioClip()`
    method inside of the `.update()` method that references an empty `private void
    playAudioClip()` method. This method call and empty method body can be seen in
    [Figure 15-19](#9781484204160_Ch15.xhtml#Fig19).


    ![9781484204160_Fig15-19.jpg](OEBPS/Images/9781484204160_Fig15-19.jpg)


    [Figure 15-19](#9781484204160_Ch15.xhtml#_Fig19). Create an empty `.playAudioClip()`
    method in the `Bagel.java` class and add a call to it inside of `.update()`


    Inside of the `playAudioClip()` method body, we need to create conditional `if()`
    structures, similar to what we did for the sprite movement that we created in
    [Chapter 12](#9781484204160_Ch12.xhtml). We’ll match `KeyEvent` handling (left,
    right, up, down, w, s) to audio files that speak each of the keys (`AudioClip`
    objects `iSound0` through `iSound5`) via an `invinciBagel.playiSound()` object
    reference and method call inside of the conditional `if()` statements, seen in
    [Figure 15-20](#9781484204160_Ch15.xhtml#Fig20), using this Java code:


    ```

    private void playAudioClip()   {

        if(invinciBagel.isLeft())  { invinciBagel.playiSound0(); }

        if(invinciBagel.isRight()) { invinciBagel.playiSound1(); }

        if(invinciBagel.isUp())    { invinciBagel.playiSound2(); }

        if(invinciBagel.isDown())  { invinciBagel.playiSound3(); }

        if(invinciBagel.iswKey())  { invinciBagel.playiSound4(); }

        if(invinciBagel.issKey())  { invinciBagel.playiSound5(); }

    }

    ```


