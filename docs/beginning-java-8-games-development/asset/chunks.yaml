- fmt: '# Creating the Actor Engine


    Creating the `Actor Engine` up front will give you experience in creating public
    abstract classes. As you recall from [Chapter 3](#9781484204160_Ch03.xhtml), public
    abstract classes are used to create other class (and object) structures in Java,
    but are not used directly in the actual game programming logic. This is the reason
    I am terming creating these two “blueprint” classes creating the `Actor Engine`,
    as we are essentially defining the lowest level of the game, the “actors” during
    this chapter.


    As we progress in the design of the game during the book, we’ll create the `Treasure`
    subclass using the `Actor` (fixed sprite) class, for “fixed” treasures that will
    get picked up by `InvinciBagel` during the game play. We’ll also create the `Prop`
    class using this `Actor` superclass, for the obstacles in the game that `InvinciBagel`
    has to navigate up, over, under, around, or through, successfully. We’ll also
    create sprites that move around on the screen using the `Hero` subclass of the
    `Actor` superclass, such as the `Bagel` class. We’ll eventually create an `Enemy`
    class and `Projectile` class.


    Besides designing the two key public abstract `Actor` classes during this chapter,
    we will also define our main `InvinciBagel` character’s **digital image states**
    using less than ten `PNG32` digital image assets. We will do this during this
    chapter so that this is in place before we’ll want to use these classes and sprite
    image states in the next chapter of the book, when we’ll look at event handling,
    so that the player can control where the `InvinciBagel` goes around the screen
    and what states (stand, run, jump, leap, fly, land, miss, crouch, etc.) he is
    using to navigate the obstacles in his world.


    ## Game Actor Design: Defining the Attributes Up Front


    The foundation of any popular game is the characters – the Hero and his Arch Enemies
    – as well as the game’s obstacles, armory (projectiles), and treasures. Each of
    these “actors” need to have attributes, defined using variables in Java, that
    keep track of what is going on with each of these actors during game play in real
    time, using areas of system memory. I am going to try to do this right the first
    time, in the same sense that you want to define a database record structure to
    hold the data you will need out into the future correctly the first time that
    you define your database. This can be a challenging stage of your game development,
    as you need to look out into the future and ascertain what features you want your
    game and its actors to have, and then put those into your actor’s capabilities
    (variables and methods) up front. [Figure 8-1](#9781484204160_Ch08.xhtml#Fig1)
    gives you an idea of some of the two dozen attributes that we will be installing
    for the game actors over the course of the chapter as we create over a hundred
    lines of code to implement our actor engine for the game.


    ![9781484204160_Fig08-01.jpg](OEBPS/Images/9781484204160_Fig08-01.jpg)


    [Figure 8-1](#9781484204160_Ch08.xhtml#_Fig1). Design a public abstract `Actor`
    superclass and a public abstract `Hero` subclass to use to create sprite classes


    As you can see, I’m trying to get a balanced number of variables; in this case
    it’s about a dozen each, between the fixed sprite `Actor` class and the motion
    sprite `Hero` class. As you know from [Chapter 3](#9781484204160_Ch03.xhtml),
    because the `Hero` subclass we’ll be creating **extends** the `Actor` superclass,
    it actually has two dozen attributes or characteristics, as it assumes all of
    the superclass variables, in addition to having its own. A design challenge will
    be to put as many of these attributes in the `Actor` superclass as possible, so
    that fixed sprites have as much flexibility as possible. A good example of this
    is that in the first rounds of design I had the **pivot point** (`pX` and `pY`
    variables) in the `Hero` class, but then I thought about it and thought “what
    if I want to rotate fixed sprites (obstacles and treasure) later on for more level
    design efficiency” so I placed these variables in the `Actor` superclass, giving
    this pivot (rotate) capability to **both** fixed and motion sprites.


    Another variable that I had in the `Hero` class that I moved “up” into the `Actor`
    superclass is the `List<Image>` property. I thought to myself during this design
    process, “What if for some reason I want my fixed sprites to have more than one
    image state?” I also upgraded the `Actor` class from using a simple `Rectangle`
    Shape object to using a `SVGPath` Shape subclass, so that I can define **collision
    geometry** (which is what a `spriteBounds` variable is) using more complex shapes
    than a `Rectangle` to support advanced obstacle constructs in later levels of
    the game that are more complex.


    Also note that I have the **spriteFrame** `ImageView`, which holds the sprite
    image assets, in the `Actor` class, as both fixed and motion sprites use images,
    so I can put the `ImageView` into the `Actor` superclass. I use the **imageStates**
    `List<Image>` in the `Actor` superclass, so that fixed sprites have access to
    different “visual states” just like the motion sprites do. As you may have guessed,
    `List<Image>` is a Java `List` object filled with JavaFX `Image` objects. The
    `iX` and `iY` variables in the `Actor` class are image (or initial) placement
    X and Y locations, which place a fixed sprite on your game level layout, but will
    also hold current sprite position for motion sprites, when assumed by the `Hero`
    subclass. Other variables hold Boolean states (alive/dead, etc.) and lifespan,
    damage, offset, collision, or physics data we’ll need later.


    ## The InvinciBagel Sprite Images: Visual Action States


    Besides designing the optimal `Actor Engine` classes to use to implement characters,
    treasure, and obstacles in a game, the other important thing to optimize is the
    main character for the game, and the different **states** of animation that a
    character will move between, based on the movement of the character by the player.
    From a memory optimization standpoint, the fewer image frames that we can accomplish
    all of this in, the better. As you can see in [Figure 8-2](#9781484204160_Ch08.xhtml#Fig2),
    I will provide all of the `InvinciBagel` character motion states using only nine
    different sprite image assets; some of these can be used in more than one way:
    for instance, by using the `pX` and `pY` variables, which will allow us to rotate
    these sprite frames around any pivot point that we choose. An example of this
    is **center pivot point placement** for the `FLY` state, seen in the middle of
    [Figure 8-2](#9781484204160_Ch08.xhtml#Fig2), which gives us a take-off (fly up),
    flying, and landing (fly down) simply by rotating this image **50** degrees clockwise
    (to a horizontal orientation) to **100** degrees clockwise (tilting to fly down,
    instead of up).


    ![9781484204160_Fig08-02.jpg](OEBPS/Images/9781484204160_Fig08-02.jpg)


    [Figure 8-2](#9781484204160_Ch08.xhtml#_Fig2). The nine primary character motion
    sprites for the `InvinciBagel` character that will be used during the game'
