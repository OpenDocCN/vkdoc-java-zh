    javafx.animation package, because you’ll need to use one of these classes for
    your Java 8 game play loop. You will do this by using a diagram of the entire
    package, so that you can get an overview of how all its classes interrelate. You
    will then examine the class hierarchies among all of the JavaFX Animation classes,
    in detail. With the exception of **AnimationTimer**, **Interpolator**, **KeyFrame**,
    and **KeyValue**, all of these javafx.animation package classes are subclassed
    (using the Java extends keyword) using the JavaFX Animation superclass.


    Finally, you will be adding the new **GamePlayLoop.java** class into your invincibagel
    package, which will be created as a GamePlayLoop object in the InvinciBagel.java
    Application subclass, implementing the **timing loop**. This GamePlayLoop class
    will contain a **.handle()** method, as well as a **.start()** method and a **.stop()**
    method, which will allow you to control your GamePlayLoop **timing events** when
    the GamePlayLoop is operational, and to determine when it is latent (stopped or
    paused).


    I will create a diagram that will show the class and object hierarchy for this
    InvinciBagel game, so that you can start to visualize how these classes that you
    are coding, and objects that you are creating, will all fit together. It is almost
    as if the coding of a game using Java 8 and JavaFX is in itself a (puzzle) game!
    Pretty cool stuff.


    Game Loop Processing: Harnessing a JavaFX Pulse


    One of the primary questions, even among Oracle employees on the development teams,
    is which **design approach** to implementing a **game timing loop** engine should
    be used with classes that are contained in the JavaFX animation package (suite
    of classes). Indeed, this is precisely what this chapter is all about: using the
    **javafx.animation** package and its classes, which tap into the **JavaFX pulse
    event timing engine**. At the top level of the class hierarchy for the package,
    shown in [Figure 7-1](#9781484204160_Ch07.xhtml#Fig1), the **AnimationTimer**
    and **Animation** classes provide the primary way to grab hold of these pulse
    events so that they do your real-time processing for you. In this section, you
    will see how they differ and what they have been designed for, including the kinds
    of games they should be used for. With the exception of **Interpolator** (motion
    curve application), **KeyFrame** (keyframe definition), and **KeyValue** (keyframe
    customization), all the classes in the javafx.animation package can be used to
    harness pulse events.


    ![9781484204160_Fig07-01.jpg](OEBPS/Images/9781484204160_Fig07-01.jpg)


    [Figure 7-1](#9781484204160_Ch07.xhtml#_Fig1). Javafx.animation package subclass
    hierarchy; top level classes all coded from scratch with java.lang.Object


    There are four basic approaches to implementing (accessing) the JavaFX pulse event
    timing system to create a game timing loop. These different approaches apply to
    the different types of game play, which I discussed previously (see [Chapter 5](#9781484204160_Ch05.xhtml)).
    These game play types range from static games (board games, puzzle games) that
    need to use the pulse event engine to implement special effects (**Transition**
    subclasses) or custom animations (**Timeline** class, in conjunction with the
    **KeyFrame** class and possibly the **KeyValue** class) to highly dynamic games
    that need no-frills core access to the pulse event system at the full 60 times
    per second game play refresh rate (**AnimationTimer** class).


    The highest level (visually, the lowest level, shown at the bottom left of the
    figure) is the use of **prebuilt Transition subclasses** in the javafx.animation
    package, such as the **PathTransition** class (or object), for the path of the
    game sprites or projectiles, or TranslateTransition, which translates (moves)
    things on the screen. All these Transition subclasses are coded for you; all you
    have to do is use them, which is why I am labeling this the highest functional
    level, in this particular discussion. With this high level of prebuilt functionality
    comes a memory and processing price; this is because, as you know from what you
    learned about Java inheritance (see [Chapter 3](#9781484204160_Ch03.xhtml)), the
    PathTransition class contains all its methods, variables, and constants as well
    as those from all the classes above it in the class hierarchy.


    This means that the entire PathTransition class, the Transition superclass, the
    Animation superclass, and the java.lang.Object masterclass are all contained within
    the memory footprint for this class and potentially the processing overhead, too,
    depending on how the object is implemented using the class. This is something
    to consider, as the lower down you go in the JavaFX animation package, the more
    expensive it is and the more control you give the code that has been written for
    you rather than custom code you are writing yourself.


    The next-highest-level approach to coding custom game loops is to subclass the
    **javafx.animation.Transition** class to create your own customized Transition
    subclass. Both this and the previous level are what would be considered the top-level
    approaches and would be best applied to games that are static yet animated, or
    that have a less dynamic game play.


    The middle-level solution is to use the **Timeline** class and its related **KeyFrame**
    and **KeyValue** classes, which are great for implementing the type of timeline-based
    animation that you see in drag-and-drop tools, such as Flash. As you will find,
    if you look online at JavaFX game engine discussions, this is a popular approach,
    as many animations are implemented by creating a single KeyFrame object and then
    using a TimeLine object to process the pulse events.


    Using the Timeline object approach allows you to specify a frame **rate** for
    processing your game loop, such as 30FPS. This would be appropriate for less dynamic
    games that can use a lower frame rate, because they do not involve a lot of interframe
    game processing, such as sprite movement, sprite animation, collision detection,
    or physics calculation. It is important to note that if you use a **Timeline**
    object (class), you will be defining variables in system memory for **frame rate**
    and at least one **KeyFrame** object reference (these are part of the Timeline
    class definition) as well as properties (variables) inherited from the Animation
    superclass, such as **status**, **duration**, **delay**, **cycleCount**, **cycleDuration**,
    **autoReverse**, **currentRate**, **currentTime**, and an **onFinished** (ActionEvent)
    ObjectProperty.


    If you are familiar with creating animations, you will see that Timeline, along
    with at least one KeyFrame object and potentially a large number of KeyValue objects
    stored inside each KeyFrame object, is clearly designed for (optimized toward)
    creating timeline-based animation. Although this is a very powerful feature, it
    also means that using a Timeline and KeyFrame object for game loop processing
    will create close to a dozen areas of memory allocation that you may not even
    use in your game or that may not be designed (coded) optimally for your game design
    implementation.'
  trans: '

    你还需要更深入地审视整个 `javafx.animation` 包的总体结构，因为你将需要使用其中的一个类来构建你的 Java 8 游戏循环。为此，你将借助整个包的示意图，从而概览其所有类之间的相互关系。接着，你将详细研究所有
    JavaFX 动画类之间的类层次结构。除了 **AnimationTimer**、**Interpolator**、**KeyFrame** 和 **KeyValue**
    之外，`javafx.animation` 包中的所有其他类都使用 JavaFX Animation 超类作为子类（使用 Java 的 `extends`
    关键字）。


    最后，你将在你的 `invincibagel` 包中添加一个新的 **GamePlayLoop.java** 类，该类将在 `InvinciBagel.java`
    的 Application 子类中作为 GamePlayLoop 对象创建，用于实现**计时循环**。这个 GamePlayLoop 类将包含一个 **.handle()**
    方法，以及一个 **.start()** 方法和一个 **.stop()** 方法，这些方法将允许你在 GamePlayLoop 运行时控制其**计时事件**，并判断其何时处于潜伏状态（停止或暂停）。


    我将创建一个示意图，展示这个 InvinciBagel 游戏的类和对象层次结构，这样你就可以开始想象你正在编码的这些类和你正在创建的对象将如何组合在一起。这几乎就像使用
    Java 8 和 JavaFX 编写游戏本身就是一个（拼图）游戏！非常酷。


    **游戏循环处理：驾驭 JavaFX 脉冲**


    其中一个首要问题，甚至在 Oracle 开发团队的员工中也存在，就是哪种**设计方法**最适合与 JavaFX 动画包（类套件）中的类一起使用，来实现**游戏计时循环**引擎。事实上，这正是本章的全部内容：使用
    **javafx.animation** 包及其类，这些类会接入 **JavaFX 脉冲事件计时引擎**。在该包的类层次结构的顶层，如图 7-1 所示，**AnimationTimer**
    和 **Animation** 类提供了捕获这些脉冲事件的主要方式，以便它们为你执行实时处理。在本节中，你将了解它们之间的区别以及它们的设计目的，包括它们应该用于哪些类型的游戏。除了
    **Interpolator**（运动曲线应用）、**KeyFrame**（关键帧定义）和 **KeyValue**（关键帧定制）之外，`javafx.animation`
    包中的所有类都可以用来驾驭脉冲事件。


    ![9781484204160_Fig07-01.jpg](img/9781484204160_Fig07-01.jpg)


    图 7-1. Javafx.animation 包子类层次结构；顶层类全部从 `java.lang.Object` 开始编码


    实现（访问）JavaFX 脉冲事件计时系统以创建游戏计时循环，有四种基本方法。这些不同的方法适用于我之前讨论过的不同类型的游戏玩法（参见第 5 章）。这些游戏玩法类型范围广泛，从需要使用脉冲事件引擎来实现特效（**Transition**
    子类）或自定义动画（**Timeline** 类，结合 **KeyFrame** 类以及可能的 **KeyValue** 类）的静态游戏（棋盘游戏、益智游戏），到需要以每秒
    60 次完整游戏刷新率无额外功能地核心访问脉冲事件系统的高度动态游戏（**AnimationTimer** 类）。


    最高层级（视觉上是最低层级，如图左下角所示）是使用 `javafx.animation` 包中的**预构建 Transition 子类**，例如用于游戏精灵或弹丸路径的
    **PathTransition** 类（或对象），或者用于在屏幕上平移（移动）物体的 `TranslateTransition`。所有这些 Transition
    子类都已为你编写好；你只需使用它们即可，这就是为什么在这次特定讨论中，我将其标记为最高功能层级。这种高水平的预构建功能伴随着内存和处理代价；这是因为，正如你从
    Java 继承中学到的（参见第 3 章），PathTransition 类包含了它自己的所有方法、变量和常量，以及类层次结构中所有位于其上的类的那些内容。


    这意味着整个 PathTransition 类、Transition 超类、Animation 超类以及 `java.lang.Object` 主类都包含在该类的内存占用中，并且可能也包含在处理开销中，具体取决于如何使用该类实现对象。这是需要考虑的一点，因为你在
    JavaFX 动画包中层级越低，代价就越高，并且你给予那些已为你编写好的代码的控制权就越多，而不是你自己编写的自定义代码。


    编码自定义游戏循环的次高层级方法是子类化 **javafx.animation.Transition** 类，以创建你自己的自定义 Transition 子类。这种方法以及前一种方法都可以被视为顶层方法，最适合应用于那些虽然是静态但具有动画效果，或者游戏动态性较弱的游戏。


    中间层级的解决方案是使用 **Timeline** 类及其相关的 **KeyFrame** 和 **KeyValue** 类，它们非常适合实现你在 Flash
    等拖放工具中看到的那种基于时间轴的动画。正如你将发现的，如果你在网上查看 JavaFX 游戏引擎的讨论，这是一种流行的方法，因为许多动画都是通过创建一个 KeyFrame
    对象，然后使用 TimeLine 对象来处理脉冲事件来实现的。


    使用 Timeline 对象方法允许你指定处理游戏循环的帧**速率**，例如 30FPS。这适用于那些动态性较低、可以使用较低帧率的游戏，因为它们不涉及大量的帧间游戏处理，例如精灵移动、精灵动画、碰撞检测或物理计算。需要注意的是，如果你使用
    **Timeline** 对象（类），你将在系统内存中为**帧速率**和至少一个 **KeyFrame** 对象引用（这些是 Timeline 类定义的一部分）定义变量，以及从
    Animation 超类继承的属性（变量），例如 **status**、**duration**、**delay**、**cycleCount**、**cycleDuration**、**autoReverse**、**currentRate**、**currentTime**
    和一个 **onFinished** (ActionEvent) ObjectProperty。


    如果你熟悉创建动画，你会看到 Timeline，连同至少一个 KeyFrame 对象以及可能存储在每个 KeyFrame 对象中的大量 KeyValue 对象，显然是针对（优化于）创建基于时间轴的动画而设计的。尽管这是一个非常强大的特性，但它也意味着，使用
    Timeline 和 KeyFrame 对象进行游戏循环处理将创建近十几个内存分配区域，而这些区域在你的游戏中可能根本用不到，或者可能没有针对你的游戏设计实现进行优化（编码）。

