    Java 赋值运算符


    Java 赋值运算符将赋值运算符右侧逻辑结构的值赋给赋值运算符左侧的变量。最常见的赋值运算符也是 Java 编程语言中最常用的运算符，即**等号运算符**。等号运算符前面可以加上任何算术运算符，从而创建一个同时执行算术运算的赋值运算符，如表
    3-5 所示。当变量本身将成为等式的一部分时，这允许创建更“紧凑”的编程语句。因此，不必编写 **C = C + A**，你可以直接使用 **C+=A**
    并获得相同的最终结果。你将在游戏逻辑设计中经常使用这种赋值运算符快捷方式。


