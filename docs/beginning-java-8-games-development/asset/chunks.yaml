    \n与 `Transition` 类一样，`AnimationTimer` 类被声明为**公共抽象**类。因为它是一个抽象类，所以它只能被用于（子类化或扩展）创建\
    \ `AnimationTimer` 子类。与 `Transition` 类不同，它没有为您创建任何子类；您必须从头开始创建自己的 `AnimationTimer`\
