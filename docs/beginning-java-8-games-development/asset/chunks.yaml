    Be sure to match the Java JDK 8 software that you download to your OS and bit
    level (**x86** signifies a **32-bit**-level OS). Most modern-day workstations
    use a **64-bit** Linux, Mac, Solaris (Oracle), Windows 7, or Windows 8 OS. This
    will be specified with the **x64** delineation after the name of the OS.


    To find out the bit level of the OS, on **Windows 7**, open the **Start Menu,**
    right-click the **Computer** entry, and select the **Properties** option, at the
    bottom of the context-sensitive menu. On Windows 8, you click **Start** (a window
    pane icon at the bottom left of your desktop if you are in Windows 7 desktop mode)
    and then the **down-arrow icon** at the bottom left, then click the **PC Settings**
    purple gear icon and finally the **PC Info** entry at the bottom left of the screen.
    In both use cases, there should then be a text entry that says **System type**
    and either **32-bit Operating System** or **64-bit Operating System**.


    Now that you have downloaded the Java JDK 8 installer, the next thing that you
    need to do is download is NetBeans IDE 8.0\. Do a Google search for the term **NetBeans
    8.0**, as is shown at the top of [Figure 1-5](#9781484204160_Ch01.xhtml#Fig5),
    and click the **Download** search result option, which will take you to the NetBeans
    IDE 8.0.1 Download page (currently **[https://netbeans.org/downloads](https://netbeans.org/downloads)**).
    If you want to keep both tabs open in the browser, as I did, then right-click
    the **Download** link, and select the **Open link in new tab** option.


    ![9781484204160_Fig01-05.jpg](OEBPS/Images/9781484204160_Fig01-05.jpg)


    [Figure 1-5](#9781484204160_Ch01.xhtml#_Fig5). Google the term “NetBeans 8.0,”
    open the NetBeans IDE 8.0.1 Download page, and download all versions


    Once you are on the NetBeans IDE 8.0 Download page, select the **language** and
    **platform** (OS) that you are using from the drop-down menus at the top right
    of the page. I chose **English** and **Windows**. Now, you can click one of the
    three **Download** buttons at the bottom of the page to download a NetBeans IDE
    8.0 that supports JavaFX 8 new media (and that will therefore support game development)
    programming language (application programming interface [API]). You will learn
    more about what an API is in [Chapter 3](#9781484204160_Ch03.xhtml), when I cover
    the Java programming language in detail.'
  trans: '

    正如你在图 1-2 中所见，在我的 Windows 7 HTML5 开发工作站上，安装了一个较旧版本的 Java（Java 7，日期为 2013 年 11
    月 29 日），占用了 344MB 空间。要卸载某个软件，请**选中它**（点击后它会变为浅蓝色），然后点击图中顶部的**卸载**按钮。我在截图中保留了显示“**卸载此程序**”的**工具提示**，这样你就能看到，如果将鼠标**悬停**在“程序和功能”实用程序中的任何项目上，它会告诉你该功能的用途。


    ![9781484204160_Fig01-02.jpg](img/9781484204160_Fig01-02.jpg)


    图 1-2. 选择任何早于当前版本（Java 8）的 Java 版本，然后点击顶部的卸载按钮


    点击卸载按钮后，该实用程序将移除旧版本的 Java。如果你想保留旧的 Java 项目文件，请务必备份你的 Java 项目文件夹（如果尚未备份的话）。请确保定期备份工作站硬盘，以免丢失任何工作成果。


    同时，请确保卸载所有版本的 Java；就我而言，有 64 位的 Java 7 Update 45 和 Java SDK 7u45，它们用于运行或执行使用 Java
    编程语言编写的 IDE（如 NetBeans 或 Eclipse）。


    接下来，你需要确认工作站上是否有任何旧版本的 NetBeans IDE。就我而言，如图 1-3 所示，我的 64 位 Windows 7 工作站上确实安装了
    NetBeans 7 IDE。我选择将其卸载，然后点击左侧显示的**卸载/更改**按钮，这会弹出一个右侧所示的自定义**卸载摘要**对话框。


    正如你所见，制造商（此处为 NetBeans 开发团队）可以为其产品创建自定义的卸载摘要对话框，用于卸载过程。此对话框允许你选择是否要卸载 GlassFish
    Server 4 和 NetBeans **UserDir 配置**文件夹。由于你要安装新版本的 NetBeans 和 GlassFish，请勾选这两个复选框，然后点击**卸载**按钮。


    ![9781484204160_Fig01-03.jpg](img/9781484204160_Fig01-03.jpg)


    图 1-3. 查找并选择任何早于 8.0 版本的 NetBeans；同时，卸载旧版本的 GlassFish


    下载 Java JDK 8 和 NetBeans 8.0


    既然过时版本的 Java 和 NetBeans 已从工作站中移除，你需要上网，分别访问**Oracle**和**NetBeans**网站，获取最新的开发 SDK
    和 IDE。我将向你展示如何使用谷歌搜索引擎（以防下载链接或 URL 发生变化）以及当前（在撰写本书时）的直接下载 URL 是什么。


    我们先获取 Java 8，因为它是你阅读本书所做一切的基础。在谷歌中搜索**Java JDK 8**，你会得到 Oracle Java **下载**页面的搜索结果，该页面位于
    Oracle 技术网络部分，如图 1-4 截图顶部所示。该页面的 URL 当前为**[www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)**。需要注意的是，此
    URL 将来随时可能更改，你始终可以使用谷歌搜索找到最新的 URL。在下载 170MB 的 Windows 7/8 64 位 SDK 安装程序文件之前，你需要点击
    Java 8 下载表格左上角显示的**接受许可协议**选项旁边的**单选按钮**。一旦接受许可协议，这 11 个特定于操作系统的链接将被激活以供使用。


    ![9781484204160_Fig01-04.jpg](img/9781484204160_Fig01-04.jpg)


    图 1-4. 在谷歌中搜索“Java JDK 8”，打开 JDK 8 下载页面，并选择接受许可协议


    请确保下载的 Java JDK 8 软件与你的操作系统及位数级别相匹配（**x86**表示**32 位**操作系统）。大多数现代工作站使用**64 位**的
    Linux、Mac、Solaris（Oracle）、Windows 7 或 Windows 8 操作系统。这将在操作系统名称后以**x64**标识指定。


    要查看操作系统的位数级别，在**Windows 7**上，打开**开始菜单**，右键点击**计算机**条目，然后从上下文菜单底部选择**属性**选项。在 Windows
    8 上，点击**开始**（如果你处于 Windows 7 桌面模式，则是桌面左下角的窗口窗格图标），然后点击左下角的**向下箭头图标**，接着点击**电脑设置**紫色齿轮图标，最后点击屏幕左下角的**电脑信息**条目。在这两种情况下，应该会有一个显示**系统类型**的文本条目，内容为**32
    位操作系统**或**64 位操作系统**。


    既然你已经下载了 Java JDK 8 安装程序，接下来需要下载的是 NetBeans IDE 8.0。在谷歌中搜索**NetBeans 8.0**，如图
    1-5 顶部所示，然后点击**下载**搜索结果选项，这将带你进入 NetBeans IDE 8.0.1 下载页面（当前为**[`netbeans.org/downloads`](https://netbeans.org/downloads)**）。如果你想像我一样在浏览器中保持两个标签页都打开，请右键点击**下载**链接，然后选择**在新标签页中打开链接**选项。


    ![9781484204160_Fig01-05.jpg](img/9781484204160_Fig01-05.jpg)


    图 1-5. 在谷歌中搜索“NetBeans 8.0”，打开 NetBeans IDE 8.0.1 下载页面，并下载所有版本


    进入 NetBeans IDE 8.0 下载页面后，从页面右上角的下拉菜单中选择你使用的**语言**和**平台**（操作系统）。我选择了**英语**和**Windows**。现在，你可以点击页面底部的三个**下载**按钮之一，下载支持
    JavaFX 8 新媒体（因此也支持游戏开发）编程语言（应用程序编程接口[API]）的 NetBeans IDE 8.0。你将在第 3 章中详细了解 API
    是什么，届时我会详细讲解 Java 编程语言。

