    your first round (level) of Enemy auto-attack Java code. As you can see in [Figure
    17-35](#9781484204160_Ch17.xhtml#Fig35), the InvinciBeagle appears on both sides
    of the screen, in **random locations** along the **Y axis**, and alternates between
    the left side of the screen and the right side of the screen. I left the Bullet
    and Cream Cheese Ball Projectile Actor objects visible on the screen for now,
    in the upper-left corner. We will eventually place these off-screen, and will
    shoot them at the InvinciBagel every few seconds using the InvinciBeagle’s powerful
    bazooka.


    ![9781484204160_Fig17-35.jpg](OEBPS/Images/9781484204160_Fig17-35.jpg)


    [Figure 17-35](#9781484204160_Ch17.xhtml#_Fig35). Use the **Run ![image](OEBPS/Images/arrow.jpg)
    Project** to test your code; left half shows left side attack, right half shows
    right side attack


    To keep our use of JavaFX Scene Graph Node objects optimized, we will reuse Projectile
    objects once they hit the InvinciBagel. This “bullet recycling” will be done using
    Java programming logic in several methods that we’ll put into place as we continue
    to write more and more advanced game play program logic throughout this chapter.


    Now we are ready to make the Enemy move on and off-screen, to add the element
    of surprise. We will be coding this animation rather than using another `Animation`
    class, since we are trying to do everything using only one `AnimationTimer` class
    (object) as an optimization strategy, which is working out amazingly well thus
    far.


    ## Adding the Element of Surprise: Animating Your Enemy Attack


    To animate our Enemy onto the Stage we will need to define **boolean** variables
    that hold the “on-screen off-screen” state, which I will call `onScreen`, as well
    as one that will serve as a switch that I can flip once the Enemy is visible on
    the screen, telling him to mount his attack, which I will name `callAttack`. We
    will also need **integer** variables to hold the current Enemy sprite right and
    left side X location, named `spriteMoveR` and `spriteMoveL`, and a `destination`
    variable that holds where we want the Enemy to stop and fire his Projectile objects.
    The Java declaration statements can be seen highlighted near the top of [Figure
    17-36](#9781484204160_Ch17.xhtml#Fig36), and should look like the following Java
    code:


    ```

    boolean onScreen = false;

    boolean callAttack = false;

    int spriteMoveR, spriteMoveL, destination;

    ```


    ![9781484204160_Fig17-36.jpg](OEBPS/Images/9781484204160_Fig17-36.jpg)


    [Figure 17-36](#9781484204160_Ch17.xhtml#_Fig36). Add `callAttack`, `spriteMove`
    and `destination` variables and an `if(callAttack)-else` programming structure


    The first thing that we’ll need to do, inside the `.update()` method, is add an
    `if(!callAttack)` `if-else` conditional structure around the `if(attackCounter
    >= attackFrequency)` structure that we already have in place. We will leave the
    `attackCounter = 0;` initialization statement inside of this inner loop, and we
    will add a `spriteMoveR = 700;` and a `spriteMoveL = -70;` initialization statement.
    These will place the Enemy sprite off-screen on either side of the Stage.


    A `callAttack` **boolean flag** allows us to communicate between the `.update()`
    and the `.initiateAttack()` methods, as you can see, in the `.update()` method,
    after the `attackCounter` (timer) has allowed the player enough time to collect
    his wits after enemy attacks, this `callAttack` variable is set to a `true` (attack)
    value. In a more complex version of your `.initiateAttack()` method, you will
    set this `callAttack` variable to a `false` (delay attack) value, starting the
    `attackCounter`.


    Let’s also make a Java code optimization and take the `.setTranslateY()` method
    call that we have twice in the `initiateAttack()` method, and make just a single
    method call (which represents a 100% savings on usage of the `Random` object’s
    `.nextInt()` method call). Once all these programming statements are in place,
    you can finally set the `callAttack` boolean variable to a `true` value, so that
    the next time that the `if(!callAttack)` conditional `if-else` structure is called,
    the `else` portion at the bottom of the structure will execute and will call an
    `initiateAttack()` method. This method is where the real heavy lifting is done,
    as far as **animating** the `iBeagle` Enemy character onto the screen, having
    him **pause** and fire off a shot, and then **retreat** off-screen before the
    InvinciBagel can execute (collide with) him, gaining ten valuable scoring points.'
