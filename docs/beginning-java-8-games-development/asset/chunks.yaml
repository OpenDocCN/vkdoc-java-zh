    \ demonstrating how to create a windowless application). So, you have window “chrome”\
    \ back, at least for now. As you can see, you are getting a very good result,\
    \ using only a dozen `import` statements (external classes), a few dozen lines\
    \ of Java code, and a half a dozen child nodes below the Scene Graph root (`StackPane`)\
    \ object. As you can see, JavaFX does a great job of compositing the backplate,\
    \ composite image overlays, and button bank overlay into one seamless, professional\
