    对象沿 Y 轴正方向移动。因此，我们将使用 **if(down){iY+=vY}** 编程语句，利用 += 运算符，将 vY 速度值加到 iY 位置值上。在
    JavaFX 中，X 正方向从原点 (0,0) 向右，而 Y 正方向从原点 (0,0) 向下。最后，要将 iBagel 向上移动，我们将使用 **if(up){iY-=vY}**
    编程语句，利用 -= 运算符，从 iY 位置值中减去 vY 速度值。在 Bagel 类的 .update() 方法中执行这四个条件 if 语句评估及其各自
    X 或 Y 精灵移动计算的基本 Java 代码，如图 11-13 所示，到目前为止的方法体结构应如下所示：


