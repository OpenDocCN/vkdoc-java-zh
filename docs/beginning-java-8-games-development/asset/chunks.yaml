  raw: 'To test the collision code, I put the **invinciBagel.playiSound0()** method
    call inside of the **if(collisionDetect){}** conditional statement. This is why
    I commented out that .playAudioClip() method call in the .update() method, so
    that the only thing that I will hear during a collision is the audio playback.
    This is a quick, easy, and effective way to test the collision code, at least
    for now. Since this is the **public boolean collide(Actor object)** method, I
    am also going to put a **return true;** line of code at the end of the if() body,
    that returns a **true** value from the method call. I am placing the statement
    inside of this conditional if() construct, so that if needed, we can use this
    true Boolean value returned from the .collide() method call in the .update() method
    for other processing, if we want to. The very nature of this .collide() method
    is to detect if a collision has occurred and then **return** a value, so we could
    do further processing inside of the .collide() method, or more efficiently do
    this on-collision processing inside of the .checkCollision() method, using an
    **if(collide(object)=true){invinciBagel.playiSound0();}** construct, instead of
    the way that we are doing this here with the statement processing inside of the
    .collide() method. The reason I am doing it this way, at least for now, is because
    I am testing this .collide() method, so I’m putting the statements that allow
    me to test the .collide() method inside of that .collide() method since that is
    where I’m working within the IDE right now. The Java code looks like this:


    ```

        if(collisionDetect) {

            invinciBagel.playiSound0();

            return true;

        }

        return false;

    ```


    The complete .collide(Actor object) method structure, before we get into manipulating
    the CastingDirector class and object List<Actor> objects, should look like the
    following, which can also be seen in [Figure 16-32](#9781484204160_Ch16.xhtml#Fig32):


    ```

    @Override

    public boolean collide(Actor object) {

        boolean collisionDetect = false;

        if ( invinciBagel.iBagel.spriteFrame.getBoundsInParent().intersects(

             object.getSpriteFrame().getBoundsInParent() ) ) {

                 Shape intersection =

                 SVGPath.intersect(invinciBagel.iBagel.getSpriteBound(), object.getSpriteBound());

                 if (intersection.getBoundsInLocal().getWidth() != -1) {

                     collisionDetect = true;

                 }

        }

        if(collisionDetect) {

            invinciBagel.playiSound0();

            return true;

        }

        return false;

    }

    ```


    ![9781484204160_Fig16-32.jpg](OEBPS/Images/9781484204160_Fig16-32.jpg)


    [Figure 16-32](#9781484204160_Ch16.xhtml#_Fig32). Creating the basic collision
    detection code and testing it using the invinciBagel.playiSound0() method call


    Now we’re ready to add the Java code that manages the CastingDirector object,
    to remove the Actor object.


    If Collision Detected: Manipulating the CastingDirector Object


    Add a line of code under the .playiSound0() method call, accessing the CastingDirector
    object, **invinciBagel.castDirector**. Next type a **period** key, to access a
    method helper pop-up, seen in [Figure 16-33](#9781484204160_Ch16.xhtml#Fig33),
    and select **.addToRemovedActors()**.


    ![9781484204160_Fig16-33.jpg](OEBPS/Images/9781484204160_Fig16-33.jpg)


    [Figure 16-33](#9781484204160_Ch16.xhtml#_Fig33). Add a line of code under the
    .playiSound0() method call, and type invinciBagel.castDirector, and a period


    After you double-click on the **.addToRemoveActors(Actor… actors)** option in
    this pop-up helper dialog, you will need to pass the Actor object, aptly named
    **object**, into the method call using the parameter list area inside of the parentheses,
    as shown highlighted at the bottom of [Figure 16-34](#9781484204160_Ch16.xhtml#Fig34).
    This will add this Actor object that was just involved in a collision (luckily,
    no one was hurt) to the REMOVED_ACTORS HashSet<Actor> object.


    ![9781484204160_Fig16-34.jpg](OEBPS/Images/9781484204160_Fig16-34.jpg)


    [Figure 16-34](#9781484204160_Ch16.xhtml#_Fig34). Add Actor object that was passed
    into the .collide() method to parameter list of addToRemovedActors()


    Not only do we need to remove this collided Actor object from the game cast using
    the CastingDirector class (object), we also need to remove the ImageView Node
    from the Scene Graph root as well. Let’s look at how to do that next, and then
    we will take a look at how to remove the Actor object from the CURRENT_CAST List<Actor>
    after that.


    Removing Actors from the Scene Graph: .getChildren().remove()


    Now that we have effectively removed the Actor that the InvinciBagel collided
    with from the cast by adding it to the REMOVED_ACTORS HashSet<Actor> object, the
    next step is to remove it from the JavaFX Scene Graph, which we are currently
    using the StackPane UI layout container class for. If you remember earlier in
    the book, we learned that the StackPane class can be used as a layer-based layout
    container, and arranges its contents using a centered XY grid. We will be learning
    how to use a **Group** object (class) as our Scene Graph root later on in the
    chapter, to implement the more typical upper-left corner 0,0 XY location indexing
    scheme and as an optimization, as we are not specifically using any of the StackPane
    class properties or methods, and because a Group class is a more basic class that
    is higher up in the Node superclass hierarchy. In this way, you will have experienced
    using both center screen 0,0 location referencing (StackPane), as well as the
    traditional upper-left 0,0 screen location referencing (a Group class as a Scene
    Graph root).


    Removing a Node object from the Scene Graph root is done using a **.getChildren().remove()**
    method chain, in the exact opposite fashion of the **.getChildren.add()** method
    call found in the .addGameActorNodes() method. Add a line of code, and type **invinciBagel.root**
    and a **period**, as shown in [Figure 16-35](#9781484204160_Ch16.xhtml#Fig35),
    to open the method helper pop-up.


    ![9781484204160_Fig16-35.jpg](OEBPS/Images/9781484204160_Fig16-35.jpg)


    [Figure 16-35](#9781484204160_Ch16.xhtml#_Fig35). Add a line of code under an
    .addToRemovedActors() method call and type invinciBagel.root and a period


    Since we are doing this ImageView Node removal from the Bagel.java class, we will
    use Java dot notation to preface the root object with the invinciBagel object
    reference before we add the .getChildren() method call, using the following **invinciBagel.root.getChildren()**
    code shown in [Figure 16-35](#9781484204160_Ch16.xhtml#Fig35). Double-click on
    the **remove(Object o)** selection and add the object you passed into the .collide()
    method into the .remove() method, as seen in [Figure 16-36](#9781484204160_Ch16.xhtml#Fig36).
    This will create the final **invinciBagel.root.getChildren().remove(object);**
    Java programming statement.


    ![9781484204160_Fig16-36.jpg](OEBPS/Images/9781484204160_Fig16-36.jpg)


    [Figure 16-36](#9781484204160_Ch16.xhtml#_Fig36). Investigate red error highlight
    under the Scene Graph root StackPane object reference in the method call


    Mouse-over the warning highlighting, and you will see that NetBeans sees that
    we are passing our custom Actor object to the .getChildren().remove() method chain,
    instead of the ImageView Node object. The error message also tells us that the
    **private StackPane root;** declaration in our **InvinciBagel.java** class will
    not allow us to access this object, until we remove this **private** access control
    modifier keyword. Let’s fix the most serious (error) problem first, and then fix
    the “Suspicious method call to java.util.Collection.remove” after that by using
    an **object.getSpriteFrame()** method call, inside of the current .remove() method
    call.


    Click on the InvinciBagel.java editing tab in NetBeans and remove the **private**
    keyword from the front of the **StackPane root;** object declaration, as is shown
    highlighted in [Figure 16-37](#9781484204160_Ch16.xhtml#Fig37).'
