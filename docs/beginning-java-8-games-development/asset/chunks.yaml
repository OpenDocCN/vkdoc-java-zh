    等。由于 switch-case 结构不支持在其评估逻辑中使用对象，我们将不得不使用条件 if() 语句，配合 Java 的 **instanceof**
    运算符，顾名思义，该运算符用于确定对象类型或实例；在这个特定案例中，首先判断 **Actor** 对象**是否是** **Prop**、**PropV**、**PropH**
