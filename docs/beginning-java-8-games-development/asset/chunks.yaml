    Optimizing the scoringEngine() Method: Using Logical If Else If


    Although the previous series of if() statements will do the job that we are trying
    to do here, we really need to emulate the **break;** statement that we would have
    at our disposal if we were using the Java switch-case statement type. To optimize
    this method, we want to break out of this evaluation series once the object type
    that is involved in the collision has been determined. We can do this by attaching
    all of these conditional if() statements together, using the Java **else-if**
    capability. If a condition in this structure is satisfied, the rest of the **if-else-if**
    structure is not evaluated, which is the equivalent of a **break;** statement
    in a switch-case structure. To optimize this even further, you would want to place
    the most common (the highest number of collidable objects in the Scene of that
    object type) objects at the **top** of this if-else-if structure, and the least
    common objects at the bottom of the structure. All you have to do to accomplish
    this is tie your if() condition blocks together by using the Java **else** keyword,
    as shown in [Figure 17-12](#9781484204160_Ch17.xhtml#Fig12). This creates a more
    compact and processing-optimized conditional evaluation structure, and uses fewer
    lines of Java code:


    ```

    private void scoringEngine(Actor object) {

        if(object instanceof Prop)         {

            invinciBagel.gameScore+=5;

            invinciBagel.playiSound0();

        } else if(object instanceof PropV) {

            invinciBagel.gameScore+=4;

            invinciBagel.playiSound1();

        } else if(object instanceof PropH) {

            invinciBagel.gameScore+=3;

            invinciBagel.playiSound2();

        } else if(object instanceof PropB) {

            invinciBagel.gameScore+=2;

            invinciBagel.playiSound3();    }

        invinciBagel.scoreText.setText(String.valueOf(invinciBagel.gameScore));

    }

    ```


    ![9781484204160_Fig17-12.jpg](OEBPS/Images/9781484204160_Fig17-12.jpg)


    [Figure 17-12](#9781484204160_Ch17.xhtml#_Fig12). Make all the previously unrelated
    if() structures into one if-else-if stucture by inserting else in between ifs


