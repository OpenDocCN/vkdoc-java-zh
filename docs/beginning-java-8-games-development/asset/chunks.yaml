    to test your code, you will see that the projectiles now target the InvinciBagel
    character, no matter where you might position him on the screen! This is great
    for attacks that utilize the deadly iBullet Projectile Actor object, but makes
    it too easy to score points when the iCheese Projectile Actor object is used by
    the auto-attack engine. Therefore, we will need to add another layer of code that
    uses the **randomLocation** variable, if the auto-attack engine is going to shoot
    a Cream Cheese Ball, and the **iBagelLocation** variable, if the auto-attack engine
    is going to shoot a deadly (real) bullet. We will put this logic structure up
    in the .update() method where we create both the randomLocation and iBagelLocation
    variable values (using .nextBoolean() or .getiY() method calls), right after the
    bulletType is determined, using a .nextBoolean() method call off of the randomNum
    Random object.


    The **if(bulletType)** conditional if structure that we are going to create will
    use a .setTranslateY() method call, passing a randomLocation parameter, if bulletType
    equates to a true value (iCheese), and will use the .setTranslateY() method call
    passing the iBagelLocation parameter, if the bulletType equates to a false value
    (iBullet), using the else{} portion of the if-else structure. In a second line
    of code inside each section of the if-else structure, we’ll remember to set the
    randomOffset variable, to add five pixels to the randomLocation variable inside
    the if portion of the structure, or to add five pixels to the iBagelLocation variable,
    inside the else portion, using the following code, shown in [Figure 17-58](#9781484204160_Ch17.xhtml#Fig58):


    ```

    if(attackCounter >= attackFrequency) {

        attackCounter=0;

        spriteMoveR = 700;

        spriteMoveL = -70;

        randomLocation = randomNum.nextInt(attackBoundary);

        iBagelLocation = (int) invinciBagel.iBagel.getiY();

        bulletType = randomNum.nextBoolean();

        if(bulletType) {

        spriteFrame.setTranslateY(randomLocation);

        randomOffset = randomLocation + 5;

        } else {

        spriteFrame.setTranslateY(iBagelLocation);

        randomOffset = iBagelLocation + 5;

        }

        callAttack = true;

    } else { attackCounter+=1; }

    ```


    ![9781484204160_Fig17-58.jpg](OEBPS/Images/9781484204160_Fig17-58.jpg)


    [Figure 17-58](#9781484204160_Ch17.xhtml#_Fig58). Add an if-else structure after
    the bulletType, randomLocation, and iBagelLocation to locate by bulletType


    Adding Gravity to the Bullets: Intro to Game Physics


    Since physics calculations tend to use fractional numbers rather than integers,
    we need to pull the randomOffset out of the compound integer declaration and make
    it a **double randomOffset;** declaration, as seen in [Figure 17-59](#9781484204160_Ch17.xhtml#Fig59).
    Also, you’ll need to declare **double** variables for **bulletGravity** and **cheeseGravity**,
    and set them equal to **0.2** and **0.1** values.


    ![9781484204160_Fig17-59.jpg](OEBPS/Images/9781484204160_Fig17-59.jpg)


    [Figure 17-59](#9781484204160_Ch17.xhtml#_Fig59). Declaring bulletGravity and
    cheeseGravity double variables, and converting randomOffset to a double


    What we want to do is to add a bulletGravity (or cheeseGravity) factor to the
    randomOffset (Y location) on each frame, so we get a slight “tailing off” effect
    on the shot. This will simulate gravity pulling the Projectile down to Earth.
    We will put this inside of the if(bulletOffset >= bulletRange) counter loop so
    that gravity factor is only applied when the projectile is visible flying across
    the screen. The Java code that incorporates bulletGravity and cheeseGravity adjustments
    to the Projectile object’s trajectories can be seen in [Figure 17-60](#9781484204160_Ch17.xhtml#Fig60),
    and should look like the following code:


    ```

    private void shootProjectile() {

        if(!bulletType && !takeSides) {

            invinciBagel.iBullet.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iBullet.spriteFrame.setScaleX(-0.5);

            invinciBagel.iBullet.spriteFrame.setScaleY(0.5);

            bulletRange = -50;

            if(bulletOffset >= bulletRange) {

                bulletOffset-=6;

                invinciBagel.iBullet.spriteFrame.setTranslateX(bulletOffset);

                randomOffset = randomOffset + bulletGravity;

            } else { shootBullet = false; }

        }

        if(!bulletType && takeSides) {

            invinciBagel.iBullet.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iBullet.spriteFrame.setScaleX(0.5);

            invinciBagel.iBullet.spriteFrame.setScaleY(0.5);

            bulletRange = 624;

            if(bulletOffset <= bulletRange) {

                bulletOffset+=6;

                invinciBagel.iBullet.spriteFrame.setTranslateX(bulletOffset);

                randomOffset = randomOffset + bulletGravity;

            } else { shootBullet = false; }

        }

        if(bulletType && !takeSides) {

            invinciBagel.iCheese.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iCheese.spriteFrame.setScaleX(-0.5);

            invinciBagel.iCheese.spriteFrame.setScaleY(0.5);

            bulletRange = -50;

            if(bulletOffset >= bulletRange) {

                bulletOffset-=4;

                invinciBagel.iCheese.spriteFrame.setTranslateX(bulletOffset);

                randomOffset = randomOffset + cheeseGravity;

            } else { shootBullet = false; }

        }

        if(bulletType && takeSides) {

            invinciBagel.iCheese.spriteFrame.setTranslateY(randomOffset);

            invinciBagel.iCheese.spriteFrame.setScaleX(0.5);

            invinciBagel.iCheese.spriteFrame.setScaleY(0.5);

            bulletRange = 630;

            if(bulletOffset <= bulletRange) {

                bulletOffset+=4;

                invinciBagel.iCheese.spriteFrame.setTranslateX(bulletOffset);

                randomOffset = randomOffset + cheeseGravity;

            } else { shootBullet = false; }

        }

    }

    ```


    ![9781484204160_Fig17-60.jpg](OEBPS/Images/9781484204160_Fig17-60.jpg)


    [Figure 17-60](#9781484204160_Ch17.xhtml#_Fig60). Adding physics simulation of
    gravity to the Projectile object''s trajectory in the .shootProjectile() method


    Summary


    In this seventeenth and final chapter, we used all of the foundational elements
    of our game engine(s) that we have been building during the course of this book,
    and created the basic game play for the InvinciBagel game, including a scoring
    engine and an auto-attack engine, as well as random attack strategies and basic
    physics simulation to enhance realism. We learned how to use the JavaFX 8.0 Text
    and Font class to create scoreboard output on the game, and how to use the Java
    8 Random class as a random number generator to make our auto-attack engine seem
    like it had a life of its own. We also added bounty to the game by coding a Treasure.java
    class and created a .scoringEngine() method to track and organize our scoring
    algorithm. We learned more about optimization, using if-else-if loops with **break;**
    and learned how to use **return;** to break out of a method prematurely as well,
    and we used both of these techniques to great benefit in our game play logic.
    We added Enemy characters and Projectile objects to the game, and learned how
    to implement a background plate behind the game play. I’ve tried to go beyond
    a basic beginner Java 8 book and show you the work process involved in creating
    a game engine infrastructure, including the design thought process, how to leverage
    key classes in Java 8 and JavaFX 8.0, and how to use new media assets and optimization
    techniques.


