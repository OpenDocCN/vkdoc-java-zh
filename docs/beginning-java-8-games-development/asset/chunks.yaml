  trans: '

    如果你仅为**个人**开发 Java SE（标准版）和 JavaFX 应用程序（游戏），请点击第一个按钮。如果你要为**企业**（商业）开发 Java EE（企业版）和
    JavaFX 应用程序（游戏），请点击第二个按钮。如果你要同时开发 JavaFX 和 HTML5 应用程序（游戏），就像我从事的业务那样，那么请点击第五个**下载**按钮，下载
    NetBeans IDE 8.0 的“全部”版本。该版本将允许你使用 NetBeans 支持的所有编程语言进行开发！


    由于 NetBeans IDE 是免费的，并且你的工作站硬盘可以处理大量数据，我建议你安装这个 204MB 的**全部**版本 IDE，以防你将来发现需要
    NetBeans IDE 8.0 作为软件开发人员能够为你提供的任何其他功能（Java EE、Java ME、PHP、HTML5、Groovy、GlassFish、Tomcat、C++）。如果你要安装客户端版本（即
    Java SE IDE），这需要额外 120MB 空间；但如果你要安装服务器端版本（即 Java EE IDE），则只需额外不到 20MB 的磁盘空间。


    一旦你点击**下载**按钮，软件下载就会开始。下载完成后，你就可以安装 Java 8，然后安装 NetBeans IDE 8.0。最后，为了完成你的综合 Java
    8 游戏开发工作站的设置，你还需要获取一些辅助性的新媒体内容工具。当你阅读本书（及之后）时，你将能够使用该工作站来创建史诗级的 Java 8 游戏交付成果！这真是令人兴奋！


    安装 Java 8 软件开发环境


    NetBeans IDE 8.0 需要安装 Java 才能运行，因此你需要先安装 JDK 和 JRE。因为你希望使用最新、功能最丰富的 Java 版本来开发游戏，所以你将安装
    2014 年发布的 Java 8。安装最新版本的软件可以确保你拥有最新的功能和尽可能少的错误。请务必经常检查你是否在使用所有软件包的最新版本；毕竟，这些软件都是开源的，可以免费下载、升级和使用！


    第一步是找到你在系统上下载的安装程序文件。默认位置应设置为 Windows 中的**下载**文件夹。我将我的文件下载到了 C:/Clients/Java8
    文件夹，如图 1-6 所示。


    ![9781484204160_Fig01-06.jpg](img/9781484204160_Fig01-06.jpg)


    图 1-6. 在硬盘上找到 JDK 8 安装文件，右键单击它，然后选择“以管理员身份运行”


    文件将采用 **jdk-版本-平台-位数级别** 的格式命名，因此请找到最新版本（在本例中为 jdk-8u25-windows-x64）。右键单击它，然后选择**以管理员身份运行**选项，以便安装程序拥有创建文件夹、将文件传输到其中等操作所需的所有操作系统“权限”。


    启动安装程序后，你将看到**欢迎**对话框，如图 1-7（左）所示。点击**下一步**按钮进入**选择要安装的功能**对话框，如图 1-7（右）所示，并接受默认设置。


    ![9781484204160_Fig01-07.jpg](img/9781484204160_Fig01-07.jpg)


    图 1-7. 在欢迎对话框中点击“下一步”进入“选择要安装的功能”对话框，然后点击“下一步”按钮


    如你所见，安装程序会将 **180MB** 的软件安装到你工作站的 **C:\ProgramFiles\Java\jdk1.8.0_25** 文件夹中。点击**下一步**按钮开始安装过程，该过程将解压安装文件，然后使用动画进度条将它们复制到你的系统上，如图
    1-8（左）所示。


    ![9781484204160_Fig01-08.jpg](img/9781484204160_Fig01-08.jpg)


    图 1-8. Java 8 安装将解压并复制安装文件（左），然后建议安装目录（右）


    在 Java SDK 安装到你的系统后，你将看到 **JRE** 安装对话框，如图 1-8（右）所示。请确保你接受此 JRE 的默认安装位置；它应安装在 **\Java\jre8**
    文件夹中。最好允许 Oracle（Java SDK）将软件放在行业标准文件夹位置，因为你要使用的其他依赖此 JRE 的软件包（例如 NetBeans IDE
    8.0）会首先在此处查找。点击**下一步**按钮安装 JRE。


    安装过程中会显示一个进度条，如图 1-9（左）所示。安装完成后，将显示**成功安装**对话框，如图 1-9（右）所示。如果你想访问教程、API 文档、开发人员指南、版本发布说明等，可以点击**后续步骤**按钮。


    ![9781484204160_Fig01-09.jpg](img/9781484204160_Fig01-09.jpg)


    图 1-9. 安装过程中，进度条会显示正在安装的内容（左），然后显示完成对话框（右）


    安装 NetBeans IDE 8.0


    现在，你可以安装 NetBeans 了，请找到你的 netbeans-8.0-windows 文件（参见图 1-6）。右键单击它，然后选择**以管理员身份运行**选项来启动安装程序。启动后，你将看到如图
    1-10 所示的对话框，其中提供了一个**自定义**按钮，你可以使用它来自定义安装。


    ![9781484204160_Fig01-10.jpg](img/9781484204160_Fig01-10.jpg)


    图 1-10. 欢迎使用 NetBeans IDE 8.0 安装程序对话框


    点击**下一步**按钮开始默认（完整）安装，你将看到**NetBeans IDE 8.0 许可协议**对话框，如图 1-11（左）所示。选中**我接受许可协议中的条款**复选框，然后点击**下一步**按钮进入
    **JUnit 许可协议**对话框，如图 1-11（右）所示。


    ![9781484204160_Fig01-11.jpg](img/9781484204160_Fig01-11.jpg)


    图 1-11. 接受许可协议条款，点击“下一步”按钮（左），然后对 JUnit 执行相同操作（右）


    在图 1-11（右）所示的 JUnit 许可协议对话框中，点击**我接受许可协议中的条款**声明旁边的**单选按钮**，然后点击**下一步**按钮继续安装。接下来的两个安装程序对话框，如图
    1-12 所示，将允许你指定 NetBeans 8.0 和 GlassFish 4.0 在系统上的安装位置。我建议你也接受这两个对话框中的默认安装位置。你会注意到，NetBeans
    安装程序也已在其默认位置找到了你的 Java 安装。


    ![9781484204160_Fig01-12.jpg](img/9781484204160_Fig01-12.jpg)


    图 1-12. 接受 NetBeans IDE（左）和 GlassFish 4.0（右）的默认安装目录建议


    一旦你接受这些默认安装位置并点击**下一步**按钮通过这些对话框，你将看到一个**摘要**对话框，如图 1-13（左）所示。此对话框包含一个**安装**按钮，该按钮将触发你在前五个
    NetBeans IDE 8.0 安装对话框中设置的安装。

