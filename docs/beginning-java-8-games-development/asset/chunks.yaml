- fmt: 'It is important to note that game developers do not need to understand the
    inner workings of the `Quantum` (threading), `Glass` (windowing), or `Prism` (rendering)
    engines to be able to take advantage of their amazingly powerful features. Throughout
    the book, you are going to be focusing on the top level (`Scene Graph` and Scene
    Builder) as well as the JavaFX and Java 8 `API` levels of the diagram. I will
    also be covering the NetBeans IDE 8.0 level, which you learned about in [Chapter
    2](#9781484204160_Ch02.xhtml) but which you will also be exploring much further
    during the remainder of this book.


    As for the lower levels of the diagram, NetBeans 8.0 will generate a Java `bytecode`
    file that is read by the custom JVM for each of the OS platforms. The JVM, illustrated
    at the bottom of the figure, can be installed for any given OS platform by downloading
    a Java 8 `JRE`, which you already encountered in [Chapter 1](#9781484204160_Ch01.xhtml),
    when you installed it as part of Java JDK 8.


    This JVM layer lets your game be installed as an application across all popular
    OS platforms as well as on embedded devices, which are also moving to support
    JavaFX 8. Furthermore, you can generate your Java 8 game as a Java `applet`, which
    can be embedded in a web site, and there is even a deployment model, in which
    the application can be dragged out of the web site and onto your desktop, where
    it is installed as a full-fledged Java 8 application.


    In addition, there is already a way to run JavaFX 8 applications on iOS 8, and
    Android 4.4 and 5.0. If you are interested in the latest information on this,
    simply google “JavaFX on Android,” or “JavaFX on iOS,”; you can bet that by 2015,
    Android 5.0 and Chrome OS devices will be running JavaFX applications “natively,”
    meaning that you will someday (soon) be able to export Java (and JavaFX engine)
    applications directly to Android 5.0, using `IntelliJ`, or to Chrome OS, using
    NetBeans 8.0. You should eventually be able to “code once, run everywhere” with
    this Java 8 and JavaFX 8.0 dynamic duo! Oracle recently released Java 8 SE Embedded,
    Java 8 ME and Java 8 ME Embedded versions, all of which support JavaFX.


    ![Image](OEBPS/Images/sq.jpg) **Note** The `JetBrains IntelliJ IDEA` is now the
    official IDE used for creating 64-bit Android 5.0 applications. This IDE is examined
    in my *Android Apps for Absolute Beginners, 3rd Edition* (Apress, 2014), which
    covers developing 32-bit Android 4.0 applications, using an Eclipse IDE and Java
    6, and 64-bit Android 5.0 applications, using an IntelliJ IDEA and Java 7.


    Let’s start at the top of the diagram, and take a look at the JavaFX Scene Graph
    and the `javafx.scene` package, which implements Scene Graph in the JavaFX API
    (you will look at Scene Builder in the next chapter).


    ## JavaFX Scene Package: 16 Core Java 8 Classes


    The first thing I want to do after our high-level overview is present one of the
    most important JavaFX packages, the `javafx.scene` package. In [Chapters 2](#9781484204160_Ch02.xhtml)
    and [3](#9781484204160_Ch03.xhtml), you discovered that there is more than one
    JavaFX package. As you saw in [Chapter 3](#9781484204160_Ch03.xhtml) (see [Figure
    3-1](#9781484204160_Ch03.xhtml#Fig1)), the InvinciBagel game application uses
    four different JavaFX packages. The `javafx.scene` package contains **16** powerful
    Java 8 classes (remember, JavaFX was recoded in Java 8), including the `Camera`,
    `ParallelCamera` and `PerspectiveCamera`, `Cursor` and `ImageCursor`, `LightBase`,
    `PointLight`, and `AmbientLight` classes; the `Scene Graph` classes (`Node`, `Parent`,
    `Group`, and `SubScene`); and some utility classes (see [Figure 4-2](#9781484204160_Ch04.xhtml#Fig2)).


    ![9781484204160_Fig04-02.jpg](OEBPS/Images/9781484204160_Fig04-02.jpg)


    [Figure 4-2](#9781484204160_Ch04.xhtml#_Fig2). The `javafx.scene` package and
    its 16-core Scene Graph, Scene utility, Lighting, Camera, and Cursor classes


    I have grouped these 16 `javafx.scene` package classes logically. The `Scene`
    class is inside the Scene Graph section of the diagram, because `Scene` objects,
    which are created using the `Scene` class, contain Scene Graph objects, which
    are created using these four Scene Graph–related classes (`Node`, `Parent`, `Group`,
    `SubScene`) and their subclasses. I will be covering the Scene Graph classes in
    detail later in the chapter (see the section “JavaFX Scene Graph: Organizing Scenes,
    Using Parent Nodes”).


    Scene Graph architecting classes in JavaFX start at the highest level, with a
    `Node` superclass, and its `Parent` class, and include the `Group` and `SubScene`
    classes, which are subclasses of the `Parent` class. These core classes are used
    to create the JavaFX Scene Graph hierarchy and to organize and group objects that
    have been created using the other JavaFX classes in the JavaFX packages.


    There are three Scene utility classes, as I call them, which allow you to take
    a snapshot (like a screenshot) of your scene or any of its Scene Graph nodes at
    any time as well as to turn `SceneAntialiasing` on and off if you are using 3D
    primitives in a scene. The other half (eight) of the classes in the `javafx.scene`
    package are used for scene lighting, scene cameras, and cursor control for your
    scene. I will be discussing these classes later in the chapter (see the section
    “JavaFx Scene Content: Lights, Camera, Cursor, Action!”), after you take a look
    at the Scene Graph classes, which create, group, manage, and manipulate your JavaFX
    scene content. Thus, I will be covering the `javafx.scene` package classes shown
    in the figure, from the left-hand side of the diagram to the right-hand side,
    in the order in which you are most likely to use them, from least to most.


    ## JavaFX Scene Class: Scene Size and Color and Scene Graph Nodes


    The two primary classes in the `javafx.scene` package are the `Scene` class and
    the `Node` class. I will be covering the `Node` class and its `Parent`, `Group`,
    and `SubScene` subclasses in the next section, as those classes, along with their
    subclasses (such as the `StackPane` class used in the InvinciBagel class) are
    used to implement the Scene Graph architecture in JavaFX. Also, in a sense (and
    in my diagram) the `Node` class and its subclasses can be viewed as being below
    the `Scene` class, although the `Node` class is not a subclass of the `Scene`
    class. In fact, the `Node` (Scene Graph) class and subclasses, or rather the objects
    created using these classes, are contained **inside** the `Scene` object itself.


    For this reason, you will first consider how the `Scene` class, and its `Scene()`
    constructor method, is used to create `Scene` objects for JavaFX applications.
    This section will provide reinforcement of what you learned in [Chapter 3](#9781484204160_Ch03.xhtml)
    regarding overloading constructor methods, as there needs to be several different
    ways to create a `Scene` object.


    The `Scene` class is used to create a `Scene` object, using the `Scene()` constructor
    class, which takes between one and five parameters, depending on which of the
    **six** (overloaded) constructor methods you choose to use. These include the
    following constructor methods, along with their six different (and thus overloaded)
    parameter list data field configurations:


    ```

    Scene(Parent root)

    Scene(Parent root, double width, double height)

    Scene(Parent root, double width, double height, boolean depthBuffer)

    Scene(Parent root, double width, double height, boolean depthBuffer, SceneAntialiasing
    aAlias)

    Scene(Parent root, double width, double height, Paint fill)

    Scene(Parent root, Paint fill)

    ```


    The constructor currently used in your bootstrap Java and JavaFX code is the second
    one, called as follows:


    ```

    Scene scene = new Scene(root, 300, 250);

    ```'
