    类型（子类），也独立于用于填充或描边的 Paint 对象的配置（为了学习 Java 8 游戏开发，请再次暂时忍住不要窃笑）。


    在进行最终的交集计算之前，输入 Shape 对象的区域会被转换到父节点对象的坐标空间（可理解为 `boundsInParent`）。这样一来，生成的形状将只包含那些通过参数列表传入方法的两个输入
    Shape 对象区域中所包含的区域（更准确地说，是数学几何区域）。因此，如果生成的 Shape 对象中包含任何数据（除了 -1 空数据值以外的数据），我们将在接下来编写的代码中将其称为
