    文件中。因此，如果你计划编写一个点唱机应用程序，可能需要考虑流式传输你的数字音频数据；否则，请尝试优化你的数字音频数据，以便将它们（内嵌）包含在.JAR 文件中。这样，当应用程序的用户需要时，数据将始终可用！


    流式数字音频的缺点是，如果用户的连接（或音频数据服务器）出现故障，你的数字音频文件可能无法始终供最终用户使用你的游戏应用程序进行播放和收听！数字音频数据的可靠性和可用性是流式传输与内嵌权衡取舍中需要考虑的关键因素。这同样适用于数字视频资源。


    同样，与数字视频一样，关于流式传输数字音频的主要概念之一是数字音频数据的比特率。正如你在上一节中所了解的，比特率是在压缩过程中定义的。需要支持较低比特率带宽的数字音频文件，其音频数据将应用更多压缩，从而导致质量较低。这些文件将在更多设备上更流畅地流式传输（播放），因为较少的比特可以快速传输，也更容易处理。


    **JavaFX 中的数字音频：支持的数字音频编解码器和数据格式**


    JavaFX 中的**数字音频编解码器**比数字视频编解码器多得多，因为视频编解码器只有一种，即 MPEG-4 H.264 AVC。Android 音频支持包括.**MP3**（**MPEG-3**）文件、Windows
    **WAVE**（**脉冲编码调制**[**PCM**]音频）.**WAV**文件、.**MP4**（或.M4A）**MPEG-4 AAC**（**高级音频编码**）音频，以及苹果的**AIFF**（PCM）文件格式。JavaFX（以及
    Java 8）支持的最常见格式是流行的.MP3 数字音频文件格式。由于 Napster 或 Soundcloud 等音乐下载网站，你们大多数人熟悉 MP3
    数字音频文件，并且我们大多数人会收集这种格式的歌曲，用于 MP3 播放器以及基于 CD-ROM 或 DVD-ROM 的音乐收藏。MP3 数字音频文件格式之所以流行，是因为它具有相当好的压缩质量比，并且得到广泛支持。


    MP3 是在 Java 8 应用程序中可接受的格式，只要你能通过使用最佳的编码工作流程，从中获得尽可能高的质量水平。需要注意的是，与 JPEG（用于图像）一样，MP3
    是一种**有损**音频文件格式，在压缩过程中，一些音频数据（以及相应的质量）会被**丢弃**且无法恢复。


    JavaFX 确实有两种**无损**音频压缩编解码器：AIFF 和 WAVE。你们中的许多人熟悉这些格式，因为它们分别是 Apple Macintosh 和
    Microsoft Windows 操作系统最初使用的音频格式。这些文件使用 PCM 音频，这是无损的（在这种情况下，因为根本没有应用任何压缩！）。“PCM”代表“脉冲编码调制”，指的是它所包含的数据格式。


    PCM 音频通常用于 CD-ROM 内容以及电话应用。这是因为 PCM WAVE 音频是一种**未压缩**的数字音频格式，数据流没有应用 CPU 密集型的压缩算法。因此，解码（CPU
    数据处理）对于电话设备或 CD 播放器来说不是问题。


    出于这个原因，当你开始将数字音频资源压缩成各种文件格式时，你可以使用 PCM 作为你的**基准**文件格式。它允许你查看 PCM（WAVE）与 MP3 和
    MP4 音频压缩结果之间的差异，从而了解你的 JAR 文件获得了多少数据量优化；更重要的是，你还可以看到你的采样分辨率和采样频率优化将如何影响游戏音效所使用的系统内存。即使你使用
    MP3 或 MP4 格式，在音频资源能够与`AudioClip`类一起使用并作为音效应用于 Java 8 游戏之前，它仍然需要被解压缩到内存中。

