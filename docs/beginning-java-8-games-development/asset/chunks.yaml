    ## Adding Jump and Evade Animation: Using the W and S Keys\n\nLet’s start to put\
    \ into place the infrastructure for using another set of four keys to give our\
    \ players more flexibility in implementing sprite (character) actions (animation).\
    \ Using the keyboard, these would use the ASDW keys, and using a game controller,\
