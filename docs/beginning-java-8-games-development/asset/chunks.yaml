    正如你在图 8-8 中所见，我们现在已经编写了近三打无错误的 Java 8 代码，并准备创建其余的`.get()`和`.set()`方法，这些方法将构成公共抽象
    Actor 超类。


    ![9781484204160_Fig08-08.jpg](img/9781484204160_Fig08-08.jpg)


    图 8-8. 为你刚刚声明的八个新的固定精灵枢轴和状态定义变量添加初始化值


    Actor 类中剩余的方法通常被称为“getter”和“setter”方法，因为这些方法提供了对类内部数据变量的访问。使用**getter**和**setter**方法是正确的做法，因为这实现了
    Java 的**封装**概念（及其优势），使得 Java 对象能够成为包含对象属性（变量数据值）和行为（方法）的自包含容器。


    访问 Actor 变量：创建 Getter 和 Setter 方法


    NetBeans 最强大的功能之一（正如你即将看到的，还能节省时间）在于，它可以自动为你的每个对象和数据变量编写所有的`.get()`和`.set()`方法。在本书中，我们将尽可能使用这一便捷功能，让你习惯利用这一省时特性来编写大量
    Java 8 代码，从而加速你的 Java 8 游戏代码产出！你可以通过**Source**菜单及其**Insert Code**子菜单来访问这一自动编码功能，如图
