- fmt: "你的`InvinciBagel`游戏应用已经在使用`ActionEvent`类（对象），配合`EventHandler`接口及其`.handle()`方法，你需要自行编写代码，告诉应用在事件（`ActionEvent`）发生（触发）后要如何“处理”它。`.handle()`方法会**捕获**这个**触发**的事件，然后根据`.handle()`方法体中的Java编程逻辑对其进行处理。\n\
    \nJava**接口**是一种提供**空**方法的类，这些方法被声明以供使用，但尚未包含任何Java编程结构。这些**未实现的方法**在使用时，需要由你（Java程序员）来实现。这个Java接口仅定义了需要实现的方法（在本例中，是一个用于处理`ActionEvent`的方法，以便事件能以某种方式被处理）。需要注意的是，Java接口定义了需要编码的方法，但并不会为你编写方法代码，因此它是一张路线图，指引你必须完成哪些工作，才能与现有的编程结构进行**交互**（在本例中，是用于处理`ActionEvent`对象（即触发的事件）的Java编程结构）。\n\
    \n现在，让我们来看看JavaFX中的**多线程**，这是高级游戏的另一个重要概念，以此结束我们对JavaFX API和包层次结构中所有2D和3D（游戏）相关内容的探索。\n\
    \n## JavaFX游戏线程控制：`javafx.concurrent`包\n\n游戏需要**后台**或**异步**处理。这可以通过使用除JavaFX应用线程、Prism渲染线程和媒体播放线程之外的额外线程来实现，这些线程会根据你在场景图中使用的类（对象）自动为你创建。你的应用编程逻辑可以生成自己的`Worker`线程进行处理，这样就不会使主JavaFX应用线程过载。接下来，让我们看看`javafx.concurrent`包，它为我们提供了`Service`超类及其子类`ScheduledService`，用于创建`Worker`对象，以及一个用于一次性任务处理的`Task`类。\n\
    \n由于你将在JavaFX游戏（应用）中使用`Service`和`ScheduledService`，我在此演示`ScheduledService`类的继承层次结构，这将向你展示`Service`类的`java.lang.Object`起源：\n\
    \n```\nJava.lang.Object\n  > javafx.concurrent.Service\n    > javafx.concurrent.ScheduledService\n\
    ```\n\n`Task`（类）对象仅使用一次来完成给定任务，而**服务**是持续进行的，`Service`对象和`ScheduledService`（类）对象可以重复使用，即它们随时准备执行其**服务**。这更适合游戏处理，因为游戏会持续很长时间，并且这里假设所涉及的游戏逻辑处理类型也需要在游戏过程中随时间计算，而不是像`Task`类（对象）那样只计算一次。\n\
    \n`Worker`Java结构实际上是一个**接口**，而`Task`、`Service`和`ScheduledService`类是基于这个`Worker`接口为你创建的（这比`EventHandler`接口强多了，后者需要你自己实现！）。\n\
    \n`Worker`对象使用后台线程执行处理，可以是可重用的（如`Service`类）或不可重用的（如`Task`类）。`Worker`线程状态由`Worker.State`类（对象）控制，并包含`Worker`线程的生命周期阶段。这些状态适用于`javafx.concurrent`包中的三个主要类，因为它们实现了`Worker`接口及其相关的嵌套类。如前一章所述，嵌套类通过点符号访问，因此`State`类嵌套在`Worker`接口（类）内部。由于在使用`Worker`线程之前理解其状态非常重要，我将以表格形式详细说明它们，以便你清晰理解（参见[表4-3](#9781484204160_Ch04.xhtml#Tab3)）。\n\
    \n[表4-3](#9781484204160_Ch04.xhtml#_Tab3). `Worker`线程生命周期状态，由`Worker.State`嵌套类定义，用于`Worker`接口\n\
    \n| `Worker.State`常量 | 含义 |\n| --- | --- |\n| `READY` | `Worker`对象（线程）已**初始化**（或重新初始化）并准备使用。\
    \ |\n| `SCHEDULED` | `Worker`对象（线程）已**调度**执行，但当前未运行。 |\n| `RUNNING` | `Worker`对象（线程）当前正在**运行**，并执行Java编程逻辑。\
    \ |\n| `SUCCEEDED` | `Worker`对象（线程）已成功**执行**，并且`value`属性中包含有效结果。 |\n| `FAILED`\
    \ | `Worker`对象（线程）由于某些意外情况未能成功**执行**。 |\n| `CANCELLED` | `Worker`对象（线程）已通过调用`Worker.cancel()`方法被**取消**。\
    \ |\n\n与本章中JavaFX 8多媒体引擎概述的其他内容一样，你将在本书后续内容中深入了解如何使用这些包、类、嵌套类、接口、方法、常量和变量，因为你将应用这些JavaFX编程结构和概念！\n\
    \n## 总结\n\n在本第四章中，你更深入地了解了**JavaFX 8 API**中一些更重要的包、概念、组件、类、构造函数、常量和变量（属性），这是一个令人印象深刻的集合，包含**36**个`javafx.packagename.subpackagename`包，我已在表格中概述并逐一介绍，以满足多媒体2D和3D（以及混合2D-3D）游戏开发的需要。当我说“概述”时，我的意思是概述！\n\
    \n当然，我无法在一章中讨论JavaFX中的每一个功能类，因此我从JavaFX引擎的广泛概述开始，以及它如何与上层的JavaFX **Scene Builder**工具和JavaFX\
    \ **Scene Graph API**集成，并与下层的**Java 8** API、**NetBeans 8.0**和目标操作系统集成，这为JavaFX在众多流行平台、设备和主流网络浏览器上提供了广泛的操作系统支持。\n\
    \n我提供了JavaFX的高级技术视图，详细介绍了其结构，包括**JavaFX Scene Graph**、**APIs**、**Quantum**、**Prism**、**Glass**、**WebKit**和**Media**引擎。你了解了这些多线程、渲染、窗口化、媒体和网络引擎如何与**Java\
    \ 8 API**和**Java JDK 8**以及**NetBeans 8.0**及其生成的**JVM**字节码交互，这些字节码被当前运行在十几种不同消费电子设备类型上的各种操作系统平台读取。\n\
    \n你还探索了JavaFX的核心概念，例如**JavaFX Scene Graph**和JavaFX **pulse**事件系统，你将在本书后续内容中利用这些概念创建Java\
    \ 8游戏，从下一章开始，我将解释如何在NetBeans中使用JavaFX Scene Builder可视化编辑工具。"
  raw: 'Your InvinciBagel game application is already using this **ActionEvent** class
    (object), with the **EventHandler interface** and its **.handle()** method, which
    you code yourself to tell your application what to do to “handle” the Event (ActionEvent)
    once it has occurred (fired). The .handle() method **catches** this **fired**
    event and then processes it, according to the Java programming logic inside the
    body of the .handle() method.


    A Java **interface** is a class that furnishes **empty** methods, which are declared
    for use but which do not yet contain any Java programming constructs. The **unimplemented
    methods** will, at the time of their use, have to be implemented by you, the Java
    programmer. This Java interface defines only the methods to be implemented (in
    this case, a method for handling the ActionEvent so that the event gets processed
    in some fashion). It is important to note that the Java interface defines the
    method that needs to be coded but does not write the method code for you, so it
    is a road map of what you must do to complete, or **interface with**, the programming
    structure that is in place (in this case, the Java programming structure for handling
    ActionEvent objects, that is, fired action events.


    Now, let’s take a look at **multithreading** in JavaFX, which is another important
    concept for advanced games, to conclude this exploration of everything 2D- and  3D-
    (game) related in the JavaFX API and package hierarchy.


    JavaFX Thread Control for Games: javafx.concurrent Package


    Games require **background**, or **asynchronous**, processing. This can be done
    using additional threads besides the JavaFX application thread, Prism rendering
    thread, and media playback thread, which are all automatically created for you,
    based on which classes (objects) you are using in your scene graph. Your application
    programming logic can spawn its own Worker threads for processing so that you
    do not overload the primary JavaFX application thread. Let’s take a look at the
    **javafx.concurrent** package next, as it provides us with the **Service** superclass
    and its **ScheduledService** subclass, for creating **Worker** objects, as well
    as a **Task** class, used for one-off task processing.


    Because you are going to be using Service and ScheduledService in your JavaFX
    games (applications), I am demonstrating the ScheduledService class inheritance
    hierarchy here, as this will show you the java.lang.Object origins of the Service
    classes as well:


    ```

    Java.lang.Object

      > javafx.concurrent.Service

        > javafx.concurrent.ScheduledService

    ```


    Whereas Task (class) objects are used only one time, to accomplish a given task,
    a **service** is ongoing, and a Service object and a ScheduledService (class)
    object can be reused, that is, they are ready to perform their **service** at
    any time. This is more appropriate for game play processing, as game play continues
    for long periods of time, and the assumption here is that the types of game logic
    processing involved will also need to be calculated as time goes on during game
    play, and not just one single time, as with the Task class (object).


    The **Worker** Java construct is actually an **interface**, and the Task, Service,
    and ScheduledService classes have been created for you, based on this Worker interface
    (which is more than can be said for the **EventHandler** interface, which you
    have to implement yourself!).


    A Worker object performs processing, using a background thread, and can be either
    reusable (such as in the Service class) or not reusable (such as in the Task class).
    Worker thread states are controlled by the **Worker.State** class (object) and
    contain the life cycle stages for a Worker thread. These apply across the three
    primary classes in the javafx.concurrent package, as they implement the Worker
    interface and its related nested classes. As mentioned in the previous chapter,
    a nested class is accessed via dot notation, so the State class is thus nested
    inside the **Worker interface (class**). Because the states of a Worker thread
    are very important to understand before you use it, I am going to detail them
    in the form of a table so that they are crystal clear to you (see [Table 4-3](#9781484204160_Ch04.xhtml#Tab3)).


    [Table 4-3](#9781484204160_Ch04.xhtml#_Tab3). Worker Thread Life Cycle States,
    as Defined by the Worker.State Nested Class for Use with a Worker Interface


    | Worker.State Constant | Significance |

    | --- | --- |

    | **READY** | Worker object (thread) has been **initialized** (or reinitialized)
    and is ready to be used. |

    | **SCHEDULED** | Worker object (thread) has been **scheduled** for execution
    but is not currently running. |

    | **RUNNING** | Worker object (thread) is currently **running** and is executing
    the Java programming logic. |

    | **SUCCEEDED** | Worker object (thread) has **executed** successfully, and a
    valid result is in the value property. |

    | **FAILED** | Worker object (thread) has **failed** to execute successfully because
    of some unexpected condition. |

    | **CANCELLED** | Worker object (thread) has been **cancelled** by invoking the
    **Worker.cancel()** method call. |


    As with everything else in this JavaFX 8 multimedia engine overview chapter, you
    will be getting deep into the details of how to use these packages, classes, nested
    classes, interfaces, methods, constants, and variables over the course of the
    book, as you apply these JavaFX programming constructs and concepts!


    Summary


    In this fourth chapter, you took a closer look at some of the more important packages,
    concepts, components, classes, constructors, constants, and variables (attributes)
    that can be found in the **JavaFX 8 API**, an impressive collection of **36**
    javafx.packagename.subpackagename packages, which I outlined in tables and covered,
    one by one, as needed for multimedia 2D and 3D (and hybrid 2D-3D) game development.
    When I say, “an overview,” I mean an overview!


    Certainly, I cannot discuss every functional class in JavaFX in one chapter, so
    I started with a broad overview of the JavaFX engine and how it integrates with
    the JavaFX **Scene Builder** tool and the JavaFX **Scene Graph** **API** above
    it, and with the **Java 8** API, **NetBeans 8.0**, and target OSs below it, which
    give JavaFX expansive OS support across so many popular platforms and devices
    and the leading web browsers.


    I presented a high-level technical view of JavaFX, detailing its structures, including
    **JavaFX Scene Graph**, **APIs**, **Quantum**, **Prism**, **Glass**, **WebKit**,
    and **Media** engine. You looked at how these multithreading, rendering, windowing,
    media, and web engines interface with the **Java 8 API** and **Java JDK 8** as
    well as with **NetBeans 8.0** and the **JVM** bytecode that it generates, which
    is read by all the various OS platforms currently running across a dozen different
    consumer electronics device types.


    You also explored JavaFX core concepts, such as the **JavaFX Scene Graph** and
    the JavaFX **pulse** events system, which you will be leveraging to create a Java
    8 game as you work through this book, starting in the next chapter, when I explain
    how to use the JavaFX Scene Builder visual editing tool in NetBeans.'
