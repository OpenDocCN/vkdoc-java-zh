    我这样做的原因是，当按下向上或向下键时，会显示跳跃（或飞行）或准备着陆的精灵单元图像。因此，优化要求我需要关闭所有“在精灵单元 1 和精灵单元 2 之间交替”的处理代码。我希望这样做，以便当
    `imageStates(1)` 和 `imageStates(2)` 甚至没有在 `spriteFrame` ImageView “容器”中使用（显示）时，这种持续的处理不会在内存和线程（CPU）中进行。


    为了实现这一优化目标，我在第二个嵌套 `if()` 循环的外部添加了一个新的评估层级。这个层级包含了所有使用 `animator`、`framecounter`
    和 `runningspeed` 变量及相关处理的精灵单元更改（从 1 到 2 再返回）。这个新的更复杂的评估语句保证了，如果满足这个新条件，则所有这些奔跑循环处理逻辑都不会被执行。


    这个新条件具体说明的是，如果 `animator` 变量为 `false` **并且**向上**和**向下键都未被使用（均为 `false`），则处理其余逻辑，即在两个精灵图像状态之间切换（以及在每次切换前等待一定数量的脉冲事件）。这意味着，如果按下了向上或向下键中的任何一个（从而显示飞行或着陆精灵单元图像状态），则此点之后的所有编程逻辑都不会被处理，从而为我们将要添加到游戏中的许多其他内容节省
    CPU 处理周期，这些内容将需要使用这些“节省”出来的处理开销来处理其他与游戏相关的逻辑。


