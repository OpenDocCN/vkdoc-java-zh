    is the Finding Feature dialog, shown in [Figure 2-5](#9781484204160_Ch02.xhtml#Fig5).
    This dialog displays a progress bar while it is “Activating JavaFX 2,” which equates
    to installing the JavaFX API libraries in your project code infrastructure. You
    will find that sometimes JavaFX 8 is still referred to as JavaFX 2 (2.3 was the
    latest version of JavaFX before people started using the name JavaFX 8, probably
    to sync up with Java 8). I have also seen discussion of a JavaFX 3, which is now
    being called JavaFX 8, and because JavaFX is now a part of Java 8, I am going
