    \ later, let’s add the required abstract `.update()` method, as well as a `.collide()`\
    \ method, as motion sprites are moving, and therefore can collide with things!\
    \ First let’s add in the `public abstract void .update();` method, as it is required\
    \ by our `Actor` superclass. Doing this essentially passes down (or up, if you\
    \ prefer) the implementation requirement for this `.update()` method, from `Actor`\
    \ superclass to `Hero` subclass, and on to any future subclasses of `Hero` (which\
    \ will make `Hero` into a superclass, and more reflective of its name). Future\
