        if(takeSides) {

                  // Empty Statement

        } else { // Empty Statement }

    }

    ```


    ![9781484204160_Fig17-31.jpg](OEBPS/Images/9781484204160_Fig17-31.jpg)


    [Figure 17-31](#9781484204160_Ch17.xhtml#_Fig31). Add an if-else structure inside
    of the initiateAttack() method, to alternate between the left and right sides


    Inside the if(takeSides){} structure set the Enemy object (which we named iBeagle
    in the InvinciBagel class) to an X location of 500, by using **spriteFrame.setTranslateX(500);**
    and to a **random height** on the screen, using a **spriteFrame.setTranslateY()**
