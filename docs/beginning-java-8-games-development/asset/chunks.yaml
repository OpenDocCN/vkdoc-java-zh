    通常认为，switch-case 决策结构比 if-else 决策结构更高效、更快速。而 if-else 结构可以仅使用 **if** 关键字进行简单的条件判断，如下所示：


    ```

    if(expression = true) {

        programming statement one;

        programming statement two;

    }

    ```


    你还可以添加一个 **else** 关键字，使这个决策结构能够评估当布尔变量（真或假条件）评估为 **false** 而非 **true** 时需要执行的语句，这使该结构更强大（也更有用）。这个通用的编程结构如下所示：


    ```

    if(expression = true) {

        programming statement one;

        programming statement two;

    } else {                         // 如果 (expression = false) 则执行此代码块

        programming statement one;

        programming statement two;

    }

    ```


    此外，你可以嵌套 **if-else** 结构，从而创建 **if{}-{else if}-{else if}-else{}** 结构。如果这些结构嵌套过深，那么你就应该改用
    **switch-case** 结构。相对于嵌套的 if-else 结构，if-else 嵌套越深，switch-case 结构的效率就越高。例如，你之前为
    InvinciBagel 游戏编写的 switch-case 语句，如果翻译成嵌套的 if-else 决策结构，将如下面的 Java 编程结构所示：


    ```

    if(ibState = ''F'') {

        deathLogicFlying();

    } else if(ibState = ''J'') {

          deathLogicJumping();

      } else if(ibState = ''R'') {

            deathLogicRunning();

        } else {

              deathLogicIdle();

    }

    ```


    如你所见，这个 if-else 决策树结构与之前创建的 switch-case 非常相似，区别仅在于决策代码结构是相互**嵌套**的，而不是包含在一个扁平结构中。根据经验法则，我会对单值和双值评估使用
    if 和 if-else，对三值及以上的评估场景使用 switch-case。在我关于 Android 的书籍中，我广泛使用了这种 switch-case
    结构。


    接下来，让我们看看 Java 中广泛使用的另一种条件控制结构：循环编程结构。这些结构允许你按预定义的次数执行一个编程语句块（使用 **for** 循环），或者直到达成某个目标为止（使用
    **while** 或 **do-while** 循环）。


    循环控制结构：While、Do-While 和 For


    决策树类型的控制结构只会执行固定的次数（一次性完整执行，除非遇到 break [switch-case] 或已解析的表达式 [if-else]），而**循环**控制结构会持续执行。对于
    **while** 和 **do-while** 结构来说，这有点危险，因为如果你在编程逻辑上不小心，可能会产生**无限循环**！而 **for** 循环结构会执行**有限次数**的循环（次数在
    for 循环的定义中指定），你将在本节中很快看到这一点。


    让我们从有限循环开始，先介绍 for 循环。Java for 循环使用以下通用格式：


    ```

    for(initialization; boolean expression; update equation) {

        programming statement one;

        programming statement two;

    }

    ```


    如你所见，for 循环评估区域的三个部分位于括号内，用分号分隔，每个部分都包含一个编程语句。第一个是变量声明和初始化，第二个是布尔表达式评估，第三个是更新方程，显示如何在每次循环中递增。


    要在屏幕上沿 X 和 Y 轴**对角线**方向将 InvinciBagel 移动 40 像素，for 循环如下所示：


    ```

    for(int x=0; x < 40; x = x + 1) {   // 注意：x = x + 1 语句也可以写成 x++

        invinciBagelX++;  // 注意：invinciBagelX++ 可以写成 invinciBagelX = invinciBagelX
    + 1;

        invinciBagelY++;  // 注意：invinciBagelY++ 可以写成 invinciBagelY = invinciBagelY
    + 1;

    }

    ```


    相比之下，while（或 do-while）类型的循环不会在有限的处理周期内执行，而是执行循环内的语句，直到满足某个条件为止，其结构如下：


    ```

    while(boolean expression) {

        programming statement one;

        programming statement two;

    }

    ```


    使用 while 循环结构来编写将 InvinciBagel 移动 40 像素的 for 循环，代码如下：


    ```

    int x = 0;

    while(x < 40) {

        invinciBagelX++;

        invinciBagelY++;

        x++

    }

    ```


    do-while 循环和 while 循环的唯一区别在于，后者是在评估**之前**执行循环逻辑编程语句，而不是在评估**之后**。因此，使用 **do-while**
    循环编程结构，前面的例子将写成如下形式：


    ```

    int x = 0;

    do {

        invinciBagelX++;

        invinciBagelY++;

        x++

    } while(x < 40);

    ```


    如你所见，Java 编程逻辑结构位于花括号内，跟在 Java **do** 关键字之后，而 **while** 语句位于**右花括号之后**。请注意，while
    评估语句（以及整个结构）必须以**分号**结束。


    如果你想确保 while 循环结构内的编程逻辑至少执行一次，请使用 **do-while**，因为评估是在循环逻辑执行**之后**进行的。如果你想确保循环内的逻辑仅在评估成功时（才）执行（这是更安全的编码方式），请使用
    while 循环结构。


    Java 对象：使用 Java 构造实现虚拟现实


    我把最好的部分——Java 对象——留到了最后，因为它们可以通过本章迄今为止介绍的所有概念以某种方式构建，并且它们是面向对象编程语言（此处指 Java 8）的基础。事实上，Java
    8 编程语言中的一切都基于 Java 的 Object 超类（我喜欢称之为大师类），它位于 **java.lang** 包中，因此它的 import 语句将引用
    java.lang.Object，即 Java Object 类的完整路径名。


    Java 对象用于“虚拟化”现实，它允许你在日常生活中看到的周围对象，或者在你的游戏中，你从想象中创造的对象，被逼真地模拟出来。这是通过使用你在本章中学到的数据字段（变量和常量）和方法来实现的。这些
    Java 编程结构将构成对象的**特征**或**属性**（常量）；**状态**（变量）；以及**行为**（方法）。Java 类结构组织每个对象定义（常量、变量和方法），并使用类的构造方法生成该对象的一个实例，该构造方法通过各种
    Java 关键字和结构来设计和定义对象。


    创建 InvinciBagel 对象：属性、状态和行为


    让我们组合一个 InvinciBagel 对象的示例，展示常量如何定义特征，变量如何定义状态，以及方法如何定义行为。我们将使用本章迄今为止学到的 Java
    编码结构来实现这一点，包括你已经在一定程度上定义过的常量、变量和方法。

