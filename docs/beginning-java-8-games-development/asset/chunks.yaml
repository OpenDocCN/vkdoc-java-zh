    关于作者


    ![9781484204160_unFM-01.jpg](img/9781484204160_unFM-01.jpg)


    **华莱士·杰克逊**自近二十年前《多媒体制作人杂志》创刊以来，一直为领先的多媒体出版物撰写关于他在新媒体内容开发方面的工作，当时他为该杂志的跨页（可拆卸的“迷你期刊”插页）撰写了关于高级计算机处理器架构的文章，该插页在
    SIGGRAPH 贸易展上分发。此后，华莱士还为其他一些流行出版物撰写过关于他在交互式 3D 和新媒体广告活动设计方面工作的文章，包括《3D 艺术家杂志》、《桌面出版者杂志》、《CrossMedia
    杂志》、《AVvideo/多媒体制作人杂志》、《数字标牌杂志》和《Kiosk 杂志》。


    华莱士·杰克逊为 Apress 撰写了半打 Android 书籍，包括流行的 Pro Android 系列中的四本。这本特定的 Java 8 编程书籍侧重于
    Java 和 JavaFX 编程语言，这些语言用于 Android（以及所有其他流行平台），以便开发人员可以“一次编码，随处交付”。


    华莱士·杰克逊目前是 Mind Taffy Design 的首席执行官，这是一家位于北圣巴巴拉县的新媒体内容制作和数字活动设计开发机构，地理位置介于其北边硅谷和南边好莱坞、“橙县”及圣地亚哥的客户之间。


    二十多年来（自 1991 年起），Mind Taffy Design 为全球众多领先品牌制造商创建了基于开源技术（HTML5、JavaScript、Java
    8、JavaFX 8 和 Android 5）的数字新媒体内容交付物，这些制造商包括索尼、泰科、三星、IBM、戴尔、爱普生、诺基亚、TEAC、Sun、美光、SGI
    和三菱。


    华莱士·杰克逊在加州大学洛杉矶分校（UCLA）获得了**商业经济学**学士学位。他在南加州大学（USC）获得了**管理信息系统设计与实施**硕士学位。杰克逊先生还在南加州大学获得了**营销策略**研究生学位，并完成了**南加州大学创业研究生项目**。这些南加州大学的学位是在南加州大学马歇尔商学院的夜间
    MBA 项目期间完成的，这使得杰克逊先生能够在完成研究生和研究生商业学位的同时，全职担任程序员。


