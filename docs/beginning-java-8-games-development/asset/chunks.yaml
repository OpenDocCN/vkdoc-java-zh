- fmt: "接下来，我们需要放置一些代码，防止我们的`InvinciBagel`角色在游戏玩家未及时反转方向时移出屏幕。稍后实现计分功能时，我们可以添加代码来扣除“出界”的分数，但现在我们只是简单地停止移动，就像游戏区域（`Stage`和`Scene`大小边界）边缘存在一道无形的屏障。\n\
    \n### 设置屏幕边界：`.setBoundaries()`方法\n\n对于`InvinciBagel`游戏，接下来最重要的事情是确保角色不会消失在屏幕边缘。我们需要在`.setXYLocation()`方法（该方法评估箭头键或`ASDW`键组合，并相应地递增`Bagel`对象的`iX`和`iY`属性）和`.moveInvinciBagel()`方法（该方法实际执行移动）之间放置一个`.setBoundaries()`方法调用。通过在调用精灵移动方法之前放置`.setBoundaries()`方法，我们可以确保在真正调用移动函数（方法）之前，精灵不会超出屏幕（如果超出，则将其移回屏幕）。编写此代码的第一步是定义精灵的像素大小，以便我们可以结合`WIDTH`和`HEIGHT`这两个`Stage`大小常量进行计算，从而确定边界变量值。这些值将在`.setBoundaries()`方法及其条件`if()`语句结构中用于检查`iX`和`iY`精灵位置。如[图12-15](#9781484204160_Ch12.xhtml#Fig15)所示，我在`Bagel.java`类的顶部使用以下两行Java代码定义了这些精灵像素大小常量声明：\n\
    \n```\nprotected static final double SPRITE_PIXELS_X = 81;\nprotected static final\
    \ double SPRITE_PIXELS_Y = 81;\n```\n\n![9781484204160_Fig12-15.jpg](OEBPS/Images/9781484204160_Fig12-15.jpg)\n\
    \n[图12-15](#9781484204160_Ch12.xhtml#_Fig15). 在类顶部声明`protected static final double\
    \ SPRITE_PIXELS_X`和`SPRITE_PIXELS_Y`常量\n\n接下来，我们需要使用`InvinciBagel`类中的`WIDTH`和`HEIGHT`常量，以及我们刚刚在该类顶部定义的`SPRITE_PIXELS_X`和`SPRITE_PIXELS_Y`常量，来计算四个屏幕边界值。你可能已经注意到，从`Bagel`对象初始的`0,0`坐标（将精灵置于屏幕中心）来看，JavaFX使用的是中心化的X轴和Y轴屏幕寻址范式。这意味着存在四个象限，负值（与正值镜像）向左和向上移动，正值向右和向下移动。我们稍后可以利用这个范式快速确定角色在屏幕的哪个象限。因此，计算边界的方法是：取屏幕宽度的一半减去精灵宽度的一半，得到右边界（正值）值，然后取其负值作为左边界限制值。顶部和底部边界限制值的计算类似：取屏幕高度的一半减去精灵高度的一半，得到底部边界（正值）值，然后取其负值作为顶部边界限制值。这些计算的Java代码应如下所示：\n\
    \n```\nprotected static final double rightBoundary  =   WIDTH/2  - SPRITE_PIXELS_X/2;\n\
    protected static final double leftBoundary   = -(WIDTH/2  - SPRITE_PIXELS_X/2);\n\
    protected static final double bottomBoundary =   HEIGHT/2 - SPRITE_PIXELS_Y/2;\n\
    protected static final double topBoundary    = -(HEIGHT/2 - SPRITE_PIXELS_Y/2);\n\
    ```\n\n如[图12-16](#9781484204160_Ch12.xhtml#Fig16)所示，NetBeans无法识别`InvinciBagel`类内部的常量。\n\
    \n![9781484204160_Fig12-16.jpg](OEBPS/Images/9781484204160_Fig12-16.jpg)\n\n[图12-16](#9781484204160_Ch12.xhtml#_Fig16).\
    \ 同时按住左箭头（或`A`）和上箭头（或`W`）键，对角移动角色\n\n将鼠标悬停在NetBeans中`WIDTH`常量下方波浪形的红色错误高亮上，选择**import\
    \ static invincibagel.InvinciBagel.WIDTH;**选项，以便NetBeans为你编写此导入语句。行业标准中“正确”使用`import\
    \ static`（或静态导入）的方式是用于导入和使用常量，因此我们完全符合Java编程标准流程。对`HEIGHT`常量引用下方的红色错误高亮重复相同的工作流程，然后在`.update()`方法中的`.setXYLocation()`和`.moveInvinciBagel()`方法调用之间添加`.setBoundaries()`方法调用。这可以通过在`.update()`方法中使用以下Java方法调用来完成，如[图12-17](#9781484204160_Ch12.xhtml#Fig17)所示：\n\
    \n```\nsetBoundaries();\n```\n\n![9781484204160_Fig12-17.jpg](OEBPS/Images/9781484204160_Fig12-17.jpg)\n\
    \n[图12-17](#9781484204160_Ch12.xhtml#_Fig17). 在类顶部创建`rightBoundary`、`leftBoundary`、`bottomBoundary`和`topBoundary`常量\n\
    \n如[图12-17](#9781484204160_Ch12.xhtml#Fig17)所示，在我们编写该方法之前，方法调用下方会生成一个错误。\n\n在`.setXYLocation()`方法结构下方创建一个`private\
    \ void setBoundaries(){...}`空方法结构，以便你的方法顺序与我们在`.update()`方法中调用它们的顺序一致。接下来，你将放置四个条件`if()`结构，每个屏幕边界一个，从X轴相关的右边界和左边界开始，然后是Y轴相关的底部边界和顶部边界。第一个`if`语句需要查看`rightBoundary`值，并将当前的`iX`位置与该值进行比较。如果`iX`值**大于或等于**`rightBoundary`限制值，那么你需要将`iX`值设置为`rightBoundary`值。这将使`InvinciBagel`锁定在边界位置。同样的逻辑反过来也适用于屏幕左侧：如果`iX`值**小于或等于**`leftBoundary`限制值，那么你需要将`iX`值设置为`leftBoundary`值。\n\
    \n第三个`if`语句需要查看`bottomBoundary`值，并将当前的`iY`位置与该值进行比较。如果`iY`值**大于或等于**`bottomBoundary`限制值，那么你需要将`iY`值设置为`bottomBoundary`值。这将使你的`InvinciBagel`锁定在屏幕底部边界位置。同样的逻辑反过来也适用于屏幕顶部：如果`iY`值**小于或等于**`topBoundary`限制值，那么你需要将`iY`值设置为`topBoundary`值。包含四个`if()`语句的`.setBoundaries()`方法的Java代码如[图12-18](#9781484204160_Ch12.xhtml#Fig18)所示，应如下所示：\n\
    \n```\nprivate void setBoundaries()  {\n    if (iX >= rightBoundary)  { iX=rightBoundary;\
    \  }\n    if (iX <= leftBoundary)   { iX=leftBoundary;   }\n    if (iY >= bottomBoundary)\
    \ { iY=bottomBoundary; }\n    if (iY <= topBoundary)    { iY=topBoundary;    }\n\
    }\n```\n\n![9781484204160_Fig12-18.jpg](OEBPS/Images/9781484204160_Fig12-18.jpg)\n\
    \n[图12-18](#9781484204160_Ch12.xhtml#_Fig18). 创建一个`private void .setBoundaries()`方法，并使用四个`if()`语句来确定和设置边界\n\
    \n接下来，让我们测试所有这些代码，看看它是否按照我们逻辑上认为的那样工作！代码组织得相当好且非常符合逻辑，我认为它应该没有问题，但在NetBeans中测试是唯一能真正确定的方法！我们接下来就做这件事。这开始变得有点令人兴奋了！\n\
    \n### 测试`InvinciBagel`精灵边界：运行![image](OEBPS/Images/arrow.jpg)项目"
  raw: 'Next, we need to put some code in place that prevents our InvinciBagel character
    from going off of the screen, in case our game player does not reverse his direction
    in time. Later when we implement scoring, we could add in code that subtracts
    points for going “out of bounds,” but for now we are simply going to stop the
    movement, as if there was an invisible barrier in place at the edges of the game
    play area (the Stage and Scene size boundaries).


    Setting Screen Boundaries: .setBoundaries() Method


    The next most important thing to do for our InvinciBagel game is to make sure
    that the character does not disappear off the edge of the screen by placing a
    **.setBoundaries()** method call between the .setXYLocation() method, which evaluates
    arrow (or ASDW) keypress combinations, and increments the iX and iY Bagel object
    properties accordingly, and the .moveInvinciBagel() method, which actually executes
    the movement. By placing the .setBoundaries() method before the sprite movement
    is invoked, we can make sure that the sprite is not off the screen (and if he
    is, move him back onto the screen) before we actually call the move function (method).
    The first step in writing this code is to define the sprite size in pixels so
    that we can calculate this along with our WIDTH and HEIGHT Stage size constants
    to determine the boundary variable values that we will need to check our iX and
    iY sprite location against inside of the .setBoundaries() method and its conditional
    if() statement structures. As you can see in [Figure 12-15](#9781484204160_Ch12.xhtml#Fig15),
    I define these sprite pixel size constant declarations at the top of the Bagel.java
    class, by using the following two lines of Java code:


    ```

    protected static final double SPRITE_PIXELS_X = 81;

    protected static final double SPRITE_PIXELS_Y = 81;

    ```


    ![9781484204160_Fig12-15.jpg](OEBPS/Images/9781484204160_Fig12-15.jpg)


    [Figure 12-15](#9781484204160_Ch12.xhtml#_Fig15). Declare protected static final
    double SPRITE_PIXELS_X and SPRITE_PIXELS_Y constants at the top of class


    Next, we need to calculate the four screen boundary values using the WIDTH and
    HEIGHT constants in the InvinciBagel class and the SPRITE_PIXELS_X and SPRITE_PIXELS_Y
    constants we just defined at the top of this class. As you may have noticed from
    our 0,0 initial X,Y Bagel object location coordinates putting our sprite in the
    center of the screen, JavaFX is using a centered X axis and Y axis screen addressing
    paradigm. This means there are four quadrants, and that negative values (which
    mirror positive values) move left and up, and positive values move right and down.
    We can actually use this paradigm later on to quickly ascertain which quadrant
    of the screen the character is in. The way we would thus calculate the boundaries
    is to take half of the screen width and subtract half of the sprite width to find
    the right (positive) boundary value and simply take the negative of this for the
    value for the left boundary limit. A similar calculation applies to the top and
    bottom boundary value limit, for which we will take half of the screen height
    and subtract half of the sprite height to find the bottom (positive) boundary
    value and simply take the negative of this for the value for the top boundary
    limit value. The Java code for these calculations should look like the following:


    ```

    protected static final double rightBoundary  =   WIDTH/2  - SPRITE_PIXELS_X/2;

    protected static final double leftBoundary   = -(WIDTH/2  - SPRITE_PIXELS_X/2);

    protected static final double bottomBoundary =   HEIGHT/2 - SPRITE_PIXELS_Y/2;

    protected static final double topBoundary    = -(HEIGHT/2 - SPRITE_PIXELS_Y/2);

    ```


    As you can see in [Figure 12-16](#9781484204160_Ch12.xhtml#Fig16), NetBeans is
    having trouble seeing the constants inside the InvinciBagel class.


    ![9781484204160_Fig12-16.jpg](OEBPS/Images/9781484204160_Fig12-16.jpg)


    [Figure 12-16](#9781484204160_Ch12.xhtml#_Fig16). Hold a left arrow (or A) and
    up arrow (or W) key down at the same time, and move the Actor diagonally


    Mouse-over the wavy red error highlighting in NetBeans that is underneath the
    WIDTH constant, and select the **import static invincibagel.InvinciBagel.WIDTH;**
    option so that NetBeans will write this import statement for you. The industry
    standard way to “correctly” utilize import static (or static imports, if you wish)
    are for the import and use of constants, so we are in top conformance with Java
    programming standard procedures here. Perform that same work process again for
    the red error highlighting underneath the HEIGHT constant reference, and then
    add the .setBoundaries() method call in between the .setXYLocation() and .moveInvinciBagel()
    method calls in your .update() method. This would be done using the following
    Java method call in the .update() method, shown in [Figure 12-17](#9781484204160_Ch12.xhtml#Fig17):


    ```

    setBoundaries();

    ```


    ![9781484204160_Fig12-17.jpg](OEBPS/Images/9781484204160_Fig12-17.jpg)


    [Figure 12-17](#9781484204160_Ch12.xhtml#_Fig17). Create rightBoundary, leftBoundary,
    bottomBoundary and topBoundary constants at the top of the class


    As you can see in [Figure 12-17](#9781484204160_Ch12.xhtml#Fig17), this will generate
    an error under the method call, until we code the method.


    Create a **private void setBoundaries(){...}** empty method structure underneath
    the .setXYLocation() method structure, so that your methods are in the same order
    that we will call them from inside of your .update() method. Next you will place
    your four conditional if() structures, one for each screen boundary, starting
    with the X axis related right and left screen boundaries, and then for the Y axis
    related bottom and top screen boundaries. The first if statement needs to look
    at the rightBoundary value and compare the current iX location to that value.
    If the iX value **is greater than or equal to** the rightBoundary value limit,
    then you want to set the iX value to the rightBoundary value. This will keep the
    InvinciBagel locked into position right at the boundary. The reverse of this logic
    will also work for the left side of the screen; if the iX value **is less than
    or equal to** the rightBoundary value limit, then you will want to set the iX
    value equal to the leftBoundary value.


    The third if statement needs to look at the bottomBoundary value and compare the
    current iY location to that value. If the iY value **is greater than or equal
    to** the bottomBoundary value limit, then you will want to set the iY value to
    the bottomBoundary value. This will keep your InvinciBagel locked into position
    at the bottom of the screen boundary. The reverse of this logic will also work
    for the top of the screen; if the iY value **is less than or equal to** the topBoundary
    value limit, then you will want to set the iY value equal to the topBoundary value.
    The Java code for the .setBoundaries() method including the four if() statements
    is shown in [Figure 12-18](#9781484204160_Ch12.xhtml#Fig18), and should look like
    the following:


    ```

    private void setBoundaries()  {

        if (iX >= rightBoundary)  { iX=rightBoundary;  }

        if (iX <= leftBoundary)   { iX=leftBoundary;   }

        if (iY >= bottomBoundary) { iY=bottomBoundary; }

        if (iY <= topBoundary)    { iY=topBoundary;    }

    }

    ```


    ![9781484204160_Fig12-18.jpg](OEBPS/Images/9781484204160_Fig12-18.jpg)


    [Figure 12-18](#9781484204160_Ch12.xhtml#_Fig18). Create a private void .setBoundaries()
    method and four if() statements to ascertain and set boundaries


    Next, let’s test all of this code to see if it does what we think that it logically
    should do! The code is quite well organized and very logical, so I don’t see any
    problems with it, but testing it in NetBeans is the only real way to find out
    for sure! Let’s do that next. This is getting kind of exciting!


    Testing the InvinciBagel Sprite Boundaries: Run ![image](OEBPS/Images/arrow.jpg)
