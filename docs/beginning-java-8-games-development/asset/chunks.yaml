  trans: '

    如果你想为场景添加黑色背景，你需要选择**第五个**重载的构造方法，使用来自**Color**类的**Color.BLACK**常量（这是一个**Paint**对象，因为
    Color 是 Paint 的子类）作为填充数据（本例中为填充颜色）。你可以通过调用以下 Scene()对象构造方法来实现：


    ```

    Scene scene = new Scene(root, 300, 250, Color.BLACK);

    ```


    请注意，**root**对象是一个**Parent**子类，名为**StackPane**类，它是通过**StackPane()**构造方法（位于 Scene()构造方法调用上方两行）使用以下
    Java 代码行创建的：


    ```

    StackPane root = new StackPane();  // StackPane 继承自 Parent，因此满足 Parent root 的要求

    ```


    如你所见，任何属于该构造参数位置所声明（要求）的对象（类）类型的子类，都可以在该构造方法中使用。你可以在参数列表中使用 Color 和 StackPane
    对象，因为它们分别继承自 Paint 和 Parent 类。


    如果你想知道，**Boolean depthBuffer**参数用于**3D**场景组件。由于这些场景组件是 3D 的且具有深度（除了 2D 的 x ***和***
    y 分量外，还有一个 z 分量），如果你正在创建 3D 场景或组合 2D 和 3D 场景组件，则需要包含此参数，并将其值设置为**true**。最后，在第四个构造方法的参数列表中传入的**SceneAntialiasing**对象（及类）为
    3D 场景组件提供了**实时平滑**功能。


    JavaFX 场景图：组织场景，使用父节点


    场景图并非 JavaFX 独有，在许多新媒体内容创作软件包中都能见到，它是一种**数据结构**，类似于一棵倒置的树，**根节点**位于顶部，**分支节点**和**叶节点**从根节点延伸出来。我第一次看到场景图设计方法是在
    Amiga 上使用 Realsoft Oy 公司的 Real 3D 软件包进行 3D 建模时。此后，许多 3D、数字视频和数字成像软件包都复制了这种方法，现在它已成为
    JavaFX 组织内容和场景的一部分。因此，你们中的许多人可能对这种设计范式感到熟悉（且舒适）。


    JavaFX 场景图数据结构不仅允许你构建、组织和设计 JavaFX 场景及其内容，而且如果你正确设置了场景图，还可以将**不透明度**、**状态**、**事件处理器**、**变换**和**特效**应用于场景图层次结构的整个逻辑分支。图
    4-3 展示了基本的场景图树，根节点位于顶部，分支节点和叶节点位于其下方。


    ![9781484204160_Fig04-03.jpg](img/9781484204160_Fig04-03.jpg)


    图 4-3. JavaFX 场景图层次结构，从根节点开始，延伸到分支节点和叶节点


    根节点是最顶层的节点，因此被称为根，尽管它位于顶部，而不是像植物世界中的根那样位于底部。根节点没有**父节点**，即在场景图层次结构中没有任何节点在其上方。根节点本身是其下方的分支节点和叶节点的父节点。


    场景图树中下一个最强大（且复杂）的结构是分支节点，它使用**javafx.scene.Parent**类作为其超类，并且可以包含**子节点**（这很合理，因为它扩展了一个恰如其名的**Parent**类）。分支节点可以包含其他分支节点以及叶节点，因此它可以用来创建一些非常复杂且强大的场景图层次结构（或场景图架构）构造。


    层次结构中的最后一级是叶节点。叶节点是分支的末端，因此不能有子节点。需要注意的是，叶节点可以直接从根节点延伸出来，如图 4-3 所示。分支节点可以通过使用**Parent**、**Group**或**SubScene**类（参见图
    4-2）或其任何子类（如**WebView**、**PopupControl**、**Region**、**Pane**或**StackPane**类）来创建。


    叶节点的示例包括 JavaFX 类（作为对象），这些类可以通过参数进行配置，例如形状、文本或 ImageView，但它们本身就是设计或内容组件，并且未被设计为拥有子节点（子对象）。


    因此，叶节点始终包含一个未从 Parent 类继承（扩展）的 JavaFX 类，并且该类本身并未被专门设计为在 JavaFX 场景图层次结构中包含子元素（子对象）或在其下方包含子元素。


    Parent 类的四个子类都可以用作分支节点，包括：**Group**类，用于对子（叶节点）对象进行分组，以便对其应用不透明度、变换和效果；**Region**类，用于对子（叶节点）对象进行分组以形成屏幕布局，这些布局还可以使用
    CSS 进行样式设置；**Control**类，可用于创建自定义用户界面元素（在 JavaFX 中称为控件）；以及**WebView**类，用于包含 JavaFX
    **WebEngine**类（该类将 HTML5 和 CSS3 内容渲染到 WebView 中）。


    JavaFX 场景内容：灯光、相机、光标、动作！


    接下来，让我们看看图 4-2 中间列出的八个类。它们提供了强大的多媒体工具，用于控制应用程序的光标，以及为你的 2D 和 3D JavaFX 应用程序（本例中为游戏，但也可能是电子书、iTV
    节目或任何其他需要 JavaFX 通过 Java 语言提供的强大新媒体功能的内容）提供自定义灯光特效和自定义相机功能。


    图中较通用的类（**Cursor**、**LightBase**、**Camera**）是父类，而每个父类之后列出的更专门的类（**ImageCursor**、**PointLight**、**ParallelCamera**等）是这些父类的子类。除了
    LightBase 类，这似乎是显而易见的！


    你可能已经（正确地）猜到，JavaFX **Cursor**类可用于控制应用程序在任何给定时间使用的光标图形（箭头、手形、闭合手形、十字准线等）。**ImageCursor**子类可用于定义和提供自定义的基于图像的光标，以及自定义光标图像内的***x***和***y***位置，该位置定义了其点（也称为光标热点）所在的位置。


    **LightBase**类及其**PointLight**和**AmbientLight**子类可用于照亮你的场景。这些类主要用于 3D 场景，并且要求游戏运行的任何平台都具备
    3D 能力，这在当今并不是什么问题，因为大多数主要的 CPU 制造商也制造（并包含）GPU。此外，需要注意的是，如果渲染游戏的平台上没有 3D 环境，Prism
    游戏引擎将使用 3D 处理模拟来模拟 3D 环境（GPU）。另外，如果你设置正确，你可以将光照类用于你的 2D 游戏，或者将光照用于混合 2D-3D 游戏。

    '
- fmt: '`Camera`类及其子类`ParallelCamera`和`PerspectiveCamera`可用于在3D和2D（及混合）游戏应用中拍摄场景或视频。其中`Camera`和`ParallelCamera`这两个相机类不要求运行JavaFX应用（此处指游戏）的平台具备3D（GPU）能力。


    `Camera`类的子类提供了两种不同类型的专用相机。`ParallelCamera`类可用于渲染无深度透视校正的场景，这在3D行业中称为**正交投影**。这意味着该类非常适合用于2D场景（以及2D游戏）。


    `PerspectiveCamera`类拥有更复杂的相机，用于3D场景，支持3D视景体。与`LightBase`类及其子类类似，`PerspectiveCamera`类要求应用（或游戏）运行的硬件平台具备3D能力。


    `PerspectiveCamera`类有一个`fieldOfView`属性（状态或变量），可用于改变其视景体，就像真实相机的变焦镜头从广角端拉近时一样。`fieldOfView`属性的默认设置为30度锐角。如果你还记得中学几何知识，可以通过沿`y`（垂直）轴观察相机来想象这个视野。正如你所料，有`.getFieldOfView()`和`.setFieldOfView(double)`方法调用来控制这个相机类属性。


    接下来，让我们更仔细地看看`Scene`工具类。之后，你将研究一些`javafx.scene`**子包**，例如`javafx.scene.text`、`javafx.scene.image`、`javafx.scene.shape`和`javafx.scene.layout`。


    ## JavaFX Scene 工具：场景快照与抗锯齿


    最后，你应该快速查看一下[图4-2](#9781484204160_Ch04.xhtml#Fig2)右侧列中所示的三个工具类，它们可用于提高用户设备屏幕上场景输出的质量（使用抗锯齿），并为用户（用于社交媒体分享）或游戏逻辑本身提供屏幕捕获功能。


    我们先来研究`SceneAntialiasing`类。**抗锯齿**是一个数字成像行业术语，指的是一种算法，用于平滑两种颜色交汇处的锯齿边缘，通常出现在对角线或图像合成的圆形区域。**图像合成**是将两个独立的图像放在**图层**中以形成一幅图像。有时，这两个（或更多）图像层之间的边缘需要进行**平滑**处理。需要平滑（抗锯齿）处理，以使最终合成图像看起来像是一幅无缝的图像，这正是艺术家或游戏设计师的意图。有趣的是，你已经在`InvinciBagel`应用中通过`StackPane`类（**窗格**即**图层**）实现了JavaFX的“图层引擎”。这种“图层堆叠”的图像合成方法在游戏以及Photoshop和GIMP等软件中都很常见。


    `SceneAntialiasing`类为3D场景提供**抗锯齿处理**（算法），以便它们能够合成到你的2D场景背景之上，无论该背景是默认的`Color.WHITE`、任何其他颜色值、一张2D图像（创建混合2D-3D应用），还是其他任何内容。`SceneAntialiasing`类允许你将`static
    SceneAntialiasing`数据字段设置为`DISABLED`（关闭抗锯齿）或`BALANCED`（开启抗锯齿）。平衡选项提供了质量与性能的平衡，这仅仅意味着设备硬件提供的处理能力越强，处理的抗锯齿质量就越高。


    接下来，让我们探索`SnapshotParameters`类（对象），它用于设置（包含）一个渲染属性参数，该参数将由`SnapshotResult`类（对象）使用。这些参数包括：要使用的`Camera`（平行或透视）对象类型；`depthBuffer`（用于3D）是开启（3D为`true`）还是关闭（2D为`false`）；用于包含图像数据的`Paint`对象；用于包含任何变换数据的`Transform`对象；以及用于定义要渲染的视口区域（即快照尺寸）的`Rectangle2D`对象。


    你将在本章中了解所有这些`javafx.scene`子包类和概念，并在本书中多次使用它们。你在Java 8游戏开发中将要利用的大部分功能都可以在这些JavaFX
    8.0子包中找到。


    `SnapshotResult`类（更重要的是，使用此类创建的对象）包含你得到的快照图像数据、生成它的参数以及它在场景图中生成的源节点。因此，该类支持的三个方法应该显而易见：`.getImage()`方法将获取快照图像，`.getSource()`方法获取源节点信息，而`.getSnapshotParameters()`方法将获取`SnapshotParameters`对象的内容。


    ## Scene 子包：其他 13 个 Scene 包


    你可能会想，“哇！在`javafx.scene`包概述中要涵盖的内容真多！”，确实，核心的`javafx.scene`包包含了很多类，涵盖了场景创建、场景图组织以及场景工具，如光照、相机、光标和屏幕截图（或者我们应该称之为场景截图？）。在`javafx.scene`包中还有更多内容，存在于子包中，正如我所称呼的，或者说是位于`javafx.scene`包之下的包，通过另一个点和另一个包名（描述）来引用。实际上，还有13个`javafx.scene`包（见[表4-1](#9781484204160_Ch04.xhtml#Tab1)），涵盖了诸如绘图、绘画、图表、UI设计、成像、特效、媒体（音频和视频）播放、输入输出、文本、形状（2D几何）、变换以及网页（使用HTML5、JavaScript和CSS3创建的内容）渲染等内容。你将在本节中探索这些场景包类。


    [表4-1](#9781484204160_Ch04.xhtml#_Tab1). 十三个二级JavaFX Scene子包、其主要功能及类描述'
  raw: 'The **Camera** class, and its **ParallelCamera** and **PerspectiveCamera**
    subclasses, can be used to photograph or video your scene in 3D and 2D (and hybrid)
    game applications. Two of the camera classes, Camera and ParallelCamera, do not
    require that 3D (GPU) capabilities be present on the platform that is playing
    your JavaFX application (in this case, a game).


    The subclasses of the Camera class provide two different, specialized types of
    cameras. The ParallelCamera class can be used for rendering scenes without any
    depth perspective correction, which in the 3D industry is called an **orthographic
    projection**. What this means is that this class is perfect for use with 2D scenes
    (and for 2D games).


    The PerspectiveCamera class has a much more complex camera, used for 3D scenes,
    which will support 3D viewing volumes. Like the LightBase class and its subclasses,
    the PerspectiveCamera class requires 3D capabilities on the hardware platform
    that the application (or game) is running on.


    The PerspectiveCamera class has a **fieldOfView** attribute (state or variable),
    which can be used to change its viewing volume, just like a real camera zoom lens,
    when you zoom it in from wide angle. The default setting for the fieldOfView attribute
    is an acute angle of 30 degrees. If you remember your geometry from high school,
    you can visualize this field of view by looking down the ***y*** (vertical) axis
    at the camera. As you might expect, there are **.getFieldOfView()** and **.setFieldOfView(double)**
    method calls to control this camera class attribute.


    Next, let’s take a closer look at the Scene utility classes. After that, you will
    examine some of the javafx.scene **subpackages**, such as javafx.scene.text, javafx.scene.image,
    javafx.scene.shape, and javafx.scene.layout.


    JavaFX Scene Utilities: Scene Snapshots and Antialiasing


    Finally, you should take a quick look at the three utility classes, shown in the
    right-hand column in [Figure 4-2](#9781484204160_Ch04.xhtml#Fig2), as they can
    be used to improve the quality of scene output on the user’s device’s screen (using
    antialiasing) as well as to provide screen capture capabilities to either your
    user (for social media sharing) or your game play logic itself.


    Let’s investigate the **SceneAntialiasing** class first. **Antialiasing** is a
    digital imaging industry term that references an algorithm that smoothes jagged
    edges where two colors come together, usually on a diagonal line or in the circular
    area of an image composite. An **image composite** is two separate images placed
    in **layers** to form one image. Sometimes, the edges between the image components
    of these two (or more) image layers will need to be **smoothed**. Smoothing (antialiasing)
    is required so that a final composite looks like it is one seamless image, which
    is the intention of the artist or game designer. Interestingly, you are already
    implementing the JavaFX “layer engine” in your InvinciBagel application, using
    the **StackPane** class (**panes** are **layers**). The “layer stack” image-compositing
    approach is common in games as well as in software, such as Photoshop and GIMP.


    The SceneAntialiasing class offers **antialiasing processing** (algorithm) to
    3D scenes so that they can be composited over your 2D scene background, whether
    that is the default, **Color.WHITE**, or any other color value; a 2D image (creating
    a hybrid 2D-3D application); or anything else, for that matter. The SceneAntialiasing
    class allows you to set the **static SceneAntialiasing** data field to a value
    of **DISABLED** (turn antialiasing off) or **BALANCED** (turn antialiasing on).
    The balanced option gives a balance of quality and performance, which simply means
    that the more processing power the device’s hardware brings to the table, the
    more antialiasing quality will be processed.


    Next, let’s explore the **SnapshotParameters** class (object), which is used to
    set up (contain) a rendering attribute parameter that will be used by the **SnapshotResult**
    class (object). The parameters include the type of **Camera** (parallel or perspective)
    object to be used; whether the **depthBuffer** (used for 3D) is on (true for 3D)
    or off (false for 2D); a **Paint** object, used to contain the image data; a **Transform**
    object, used to contain any transform data; and a **Rectangle2D** object, used
    to define the viewport area to be rendered (i.e., the snapshot dimensions).


    You will be looking at all these javafx.scene subpackage classes and concepts
    in this chapter as well as using many of them over the course of this book. Much
    of the functionality that you will be tapping into for your Java 8 game development
    will be found in these JavaFX 8.0 subpackages.


    The SnapshotResult class (and, more important, the object created using this class)
    contains your resulting snapshot image data, the parameters that generated it,
    and the source node in the scene graph that it was generated from. For this reason,
    the three methods supported by the class should be obvious: the **.getImage()**
    method will get a snapshot image, the **.getSource()** method gets the source
    node information, and the **.getSnapshotParameters()** method will get the SnapshotParameters
    object contents.


    Scene Subpackages: The 13 Other Scene Packages


    You may be thinking, “Whew! That was a lot to cover in that javafx.scene package
    overview!,” and indeed the core javafx.scene package has a lot of classes in it,
    covering scene creation; scene graph organization; and scene utilities, such as
    lighting, cameras, cursors, and screenshots (or should we call these sceneshots?).
    There is a lot more in the javafx.scene package, in subpackages, as I call them,
    or packages that are below the javafx.scene package, referenced using another
    dot and another package name (description). In fact, there are 13 more javafx.scene
    packages (see in [Table 4-1](#9781484204160_Ch04.xhtml#Tab1)), covering things
    such as drawing, painting, charting, UI design, imaging, special effects, media
    (audio and video) playback, input-output, text, shapes (2D geometry), transforms,
    and web page (content created with HTML5, JavaScript and CSS3) rendering. You
    are going to explore these scene package classes in this section.


    [Table 4-1](#9781484204160_Ch04.xhtml#_Tab1). Thirteen Second-Level JavaFX Scene
    Subpackages, Their Primary Functions, and a Description of Classes'
