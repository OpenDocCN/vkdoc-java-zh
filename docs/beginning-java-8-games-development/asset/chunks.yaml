    structures. Finally, you examined Java objects and discovered how to define object
    attributes, states, and behaviors, using a Java class, methods, and constructor
    methods.


    In the next chapter, I will give you an overview of the **JavaFX** multimedia
    engine, and its classes and capabilities, as you will be leveraging JavaFX to
    add media elements to your games, such as images, video, and audio, and to control
    your games, using JavaFX object constructs (classes), such as the **Stage**, **Scene**,
    and **StackPane.**


    CHAPTER 4


    ![image](OEBPS/Images/frontdot.jpg)


    An Introduction to JavaFX 8: Exploring the Capabilities of the Java 8 Multimedia
    Engine'
