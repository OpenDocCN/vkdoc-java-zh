- fmt: "Now that we have added positive (`Treasure`) elements to our game, let’s add\
    \ some negative (`Enemy` and `Projectile`) elements to the game, so that we remain\
    \ “balanced” in our development work process. We are going to use the `Actor`\
    \ superclass, rather than the `Hero` superclass, to create the `Enemy` and `Projectile`\
    \ classes (objects). This is because by doing it this way, we have a more optimized\
    \ game, as we are only using **one single** `.collide()` method (remember that\
    \ each `Hero` object has a `.collide()` method implemented) for our JavaFX pulse\
    \ event engine to process. When I convert this game into a **multi-player** game\
    \ (the code for this is beyond the Beginner nature of this title), I would want\
    \ to make the `Enemy` class a `Hero` subclass, so that the `Enemy` character could\
    \ collide with things, such as `Treasure` and `Projectiles`, just like the `InvinciBagel`\
    \ can. Since the `Enemy` class still has an `.update()` method, it can be moved\
    \ around on the screen, where it can (and will) come out of hiding and shoot bullets\
    \ (negative effect) and balls of cream cheese (positive effect) at the `InvinciBagel`\
    \ character. The only thing that differentiates the `Hero` class is the `.collide()`\
    \ method, and for this version of the game, having one `.collide()` method to\
    \ process per pulse allows us to optimize the game play processing, while still\
    \ having a game with the different game features that an arcade game would include.\
    \ As you can see in the `Enemy()` constructor method, the `Enemy` character `isAlive`,\
    \ `isBonus`, and `hasValue`, and so all of these properties or characteristics\
    \ of the `Enemy` will be set to a boolean value of `true` inside of the constructor\
    \ method, after the sprite location has been set using `.setTranslateX()` and\
    \ `.setTranslateY()`, and after the SVG data, Image, and initial X,Y location\
    \ data is passed up to the `Actor()` constructor using the `super()` constructor.\
    \ The Java code for the `Enemy.java` class can be seen error-free in [Figure 17-18](#9781484204160_Ch17.xhtml#Fig18),\
    \ and should look like the following Java class structure:\n\n```\npackage invincibagel;\n\
    import javafx.scene.image.Image;\n\npublic class Enemy extends Actor {\n    public\
    \ Enemy(String SVGdata, double xLocation, double yLocation, Image... spriteCels)\
    \ {\n        super(SVGdata, xLocation, yLocation, spriteCels);\n        spriteFrame.setTranslateX(xLocation);\n\
    \        spriteFrame.setTranslateY(yLocation);\n        isAlive = true;\n    \
    \    isBonus = true;\n        hasValu = true;\n    }\n    @Override\n    public\
    \ void update() {\n        // Currently Empty Method\n    }\n}\n```\n\n![9781484204160_Fig17-18.jpg](OEBPS/Images/9781484204160_Fig17-18.jpg)\n\
    \n[Figure 17-18](#9781484204160_Ch17.xhtml#_Fig18). Create an `Enemy.java` class,\
    \ override the `.update()` method, and code your `Enemy()` constructor method\n\
    \nThe next step in the work process is to use GIMP to create the **collision polygon**\
    \ for the `Enemy` object, as is seen in [Figure 17-19](#9781484204160_Ch17.xhtml#Fig19),\
    \ using only nine data points. Use the SVG data creation work process you learned\
    \ in [Chapter 16](#9781484204160_Ch16.xhtml).\n\n![9781484204160_Fig17-19.jpg](OEBPS/Images/9781484204160_Fig17-19.jpg)\n\
    \n[Figure 17-19](#9781484204160_Ch17.xhtml#_Fig19). Use GIMP to create a nine-point\
    \ collision polygon for your `Enemy` `Actor`\n\nBefore we go into the `InvinciBagel.java`\
    \ class to declare and instantiate an `Enemy` object named `iBeagle`, let’s create\
    \ the `Projectile.java` class, so that our `Enemy` object has `Projectile` objects\
    \ to shoot at the `InvinciBagel` character!\n\n## Creating Cream Cheese Bullets:\
    \ Coding a Projectile.java Class\n\nNow that we have added positive (`Treasure`)\
    \ elements to our game, let’s add some negative (`Enemy` and `Projectile`) elements\
    \ to the game, so that we remain “balanced” in our development work process! Create\
    \ a `Projectile.java` class and constructor method that sets `isFixed` to `false`\
    \ (since projectiles fly) and `isBonus` and `hasValu` to `true`, so the object\
    \ properties are set. The Java code for this `Projectile.java` class can be seen\
    \ in [Figure 17-20](#9781484204160_Ch17.xhtml#Fig20), and looks like the following:\n\
    \n```\npackage invincibagel;\nimport javafx.scene.image.Image;\npublic class Projectile\
    \ extends Actor {\n    public Projectile(String SVGdata, double xLocation, double\
    \ yLocation, Image... spriteCels) {\n        super(SVGdata, xLocation, yLocation,\
    \ spriteCels);\n        spriteFrame.setTranslateX(xLocation);\n        spriteFrame.setTranslateY(yLocation);\n\
    \        isFixed = false;\n        isBonus = true;\n        hasValu = true;\n\
    \    }\n    @Override\n    public void update() {   // Empty Method   }\n}\n```\n\
    \n![9781484204160_Fig17-20.jpg](OEBPS/Images/9781484204160_Fig17-20.jpg)\n\n[Figure\
    \ 17-20](#9781484204160_Ch17.xhtml#_Fig20). Create a `Projectile.java` class,\
    \ override the `.update()` method, and code a `Projectile()` constructor method\n\
    \n## Adding an Enemy and Projectiles to the Game: InvinciBagel.java\n\nOpen the\
    \ `InvinciBagel.java` tab in NetBeans and declare an `Enemy` object, named `iBeagle`,\
    \ and two `Projectile` objects, named `iBullet` and `iCheese`, underneath the\
    \ `iBagel` `Bagel` object, as shown highlighted in [Figure 17-21](#9781484204160_Ch17.xhtml#Fig21).\
    \ Next, declare three `Image` objects, `iE0`, `iC0`, and `iC1`, by adding the\
    \ object names at the end of the second private `Image` declaration.\n\n![9781484204160_Fig17-21.jpg](OEBPS/Images/9781484204160_Fig17-21.jpg)\n\
    \n[Figure 17-21](#9781484204160_Ch17.xhtml#_Fig21). Declare `iBeagle`, `iBullet`,\
    \ `iCheese` (`Enemy` and `Projectile`) objects, and `iE0`, `iC0`, `iC1` (`Image`)\
    \ objects\n\nCopy the `enemy.png`, `bullet.png` and `cheese.png` image assets\
    \ into the `/src` folder, as shown in [Figure 17-22](#9781484204160_Ch17.xhtml#Fig22).\n\
    \n![9781484204160_Fig17-22.jpg](OEBPS/Images/9781484204160_Fig17-22.jpg)\n\n[Figure\
    \ 17-22](#9781484204160_Ch17.xhtml#_Fig22). Copy the `enemy.png`, `bullet.png`,\
    \ and `cheese.png` image assets into your `InvinciBagel/src` project folder\n\n\
    You can then refine your collision polygon structure data point by data point,\
    \ by clicking and dragging these points with your mouse, as seen in [Figure 17-23](#9781484204160_Ch17.xhtml#Fig23).\
    \ If you compare the collision polygon in [Figure 17-22](#9781484204160_Ch17.xhtml#Fig22)\
    \ with the one in [Figure 17-23](#9781484204160_Ch17.xhtml#Fig23), you can see\
    \ I that have refined several of the data points to better conform to the outline\
    \ of the sprite.\n\n```\nEnemy iBeagle;                     // Object Declarations\
    \ go at top of InvinciBagel.java class\nProjectile iBullet, iCheese;\nprivate\
    \ Image iB0, iB1, iB2, iB3, iB4, iB5, iB6, iB7, iB8, iP0, iP1, iT0, iT1, iE0,\
    \ iC0, iC1;\niE0 =  new Image(\"/enemy.png\", 70, 116, true, false, true);   \
    \    // .loadImageAssets() Method\niC0 =  new Image(\"/bullet.png\", 64, 24, true,\
    \ false, true);\niC1 =  new Image(\"/cheese.png\", 32, 29, true, false, true);\n\
