- fmt: "A Java method can also be locked using the `final` modifier keyword. When\
    \ a Java method is made `final`, if the Java class that contains that method is\
    \ subclassed, that `final` method cannot be overridden, or modified, within the\
    \ body of the subclass. This basically locks what is inside the method code structure.\
    \ For example, if you want the `.start()` method for your `InvinciBagel` class\
    \ (were it ever to be subclassed) always to do the same things that it does for\
    \ your `InvinciBagel` superclass (prepare a JavaFX staging environment), you use\
    \ the following code:\n\n```\npublic class InvinciBagel extends Application {\n\
    \    Button btn;\n\n    @Override\n    public final void start(Stage primaryStage)\
    \ {\n        btn = new Button();\n        // The other method programming statements\
    \ continue here\n    }\n}\n```\n\nThis prevents any subclasses (`public class\
    \ InvinciBagelReturns extends InvinciBagel`) from changing anything regarding\
    \ how the `InvinciBagel` game engine (JavaFX) is set up initially, which is what\
    \ the `.start()` method does for your game application (see [Chapter 4](#9781484204160_Ch04.xhtml)).\
    \ A class that is declared using a `final` modifier keyword cannot be extended,\
    \ or subclassed, locking that class for future use.\n\n## Java’s Static Modifier:\
    \ Variables or Methods That Exist in a Class (Not in Objects)\n\nAs you have already\
    \ seen, the `static` keyword can be used in conjunction with the `final` keyword\
    \ to create a constant. The `static` keyword is used to create Java constructs\
    \ (methods or variables) that exist independently, or outside, any object instances\
    \ that are created using the class that `static` variables or `static` methods\
    \ are defined in. A `static` variable in a class will force all instances of the\
    \ class to share the data in that variable, almost as if it is a global variable\
    \ as far as objects created from that class are concerned. Similarly, a `static`\
    \ method will also exist outside instanced objects for that class and will be\
    \ shared by all those objects. A `static` method will not reference variables\
    \ outside itself, such as an instanced object’s variables.\n\nGenerally, a `static`\
    \ method will have its own internal (local or static) variables and constants\
    \ and will also take in variables, using the method parameter list, and then provide\
    \ processing and computation, based on those parameters and its own internal (static\
    \ local) constants if needed. Because `static` is a concept that applies to instances\
    \ of a class, and is thus at a lower level than any class itself, a class would\
    \ not be declared using a `static` modifier keyword.\n\n## Java’s Abstract Modifier:\
    \ Classes and Methods to Be Extended and Implemented\n\nThe Java `abstract` modifier\
    \ keyword has more to do with protecting your actual code than with code that\
    \ has been placed in memory (object instances and variables, and so on) at runtime.\
    \ The `abstract` keyword allows you to specify how the code will be used as a\
    \ superclass, that is, how it is implemented in a subclass once it is extended.\
    \ For this reason, it applies only to classes and methods and not to data fields\
    \ (variables and constants).\n\nA class that has been declared using the `abstract`\
    \ modifier keyword cannot be instanced, and it is intended to be used as a superclass\
    \ (blueprint) to create (extend) other classes. Because a `final` class cannot\
    \ be extended, you will not use the `final` and `abstract` modifier keywords together\
    \ at the class level. If a class contains any methods that have been declared\
    \ using the `abstract` modifier keyword, the class must itself be declared an\
    \ `abstract` class. An `abstract` class does not have to contain any `abstract`\
    \ methods, however.\n\nA method that has been declared using the `abstract` modifier\
    \ keyword is a method that has been declared for use in subclasses but that has\
    \ no current implementation. This means that it will have no Java code inside\
    \ its method body, which, as you know, is delineated in Java by using curly braces.\
    \ Any subclass that extends an `abstract` class must implement all these `abstract`\
    \ methods, unless the subclass is also declared `abstract`, in which case the\
    \ `abstract` methods are passed down to the next subclass level.\n\n## Java’s\
    \ Volatile Modifier: Advanced Multithreading Control over Data Fields\n\nThe Java\
    \ `volatile` modifier keyword is used when you are developing multithreaded applications,\
    \ which you are not going to be doing in basic game development, as you want to\
    \ optimize your game well enough so that it only uses one thread. The `volatile`\
    \ modifier tells the Java virtual machine (JVM), which is running your application,\
    \ to merge the private (that thread’s) copy of the data field (variable or constant)\
    \ that has been declared `volatile` with the master copy of that variable in system\
    \ memory.\n\nThis is similar to the `static` modifier keyword, the difference\
    \ being that a `static` variable (data field) is shared by more than one object\
    \ instance, whereas a `volatile` data field (variable or constant) is shared by\
    \ more than one thread.\n\n## Java’s Synchronized Modifier: Advanced Multithreading\
    \ Control over Methods\n\nThe Java `synchronized` modifier keyword is also used\
    \ when you are developing multithreaded applications, which you are not going\
    \ to be doing for your basic game development here. The `synchronized` modifier\
    \ tells the JVM, which is running your application, that the method that has been\
    \ declared `synchronized` can be accessed by only one thread at a time. This concept\
    \ is similar to that of synchronized database access, which prevents record access\
    \ collisions. A `synchronized` modifier keyword likewise prevents collisions between\
    \ threads accessing your method (in system memory) by serializing the access to\
    \ one at a time so that parallel (simultaneous) access to a method in memory by\
    \ multiple threads will never occur.\n\nNow that you have studied primary Java\
    \ constructs (classes, methods, and fields) and basic modifier keywords (`public`,\
    \ `private`, `protected`, `static`, `final`, `abstract`, and so on), let’s journey\
    \ inside the curly braces now, learning about the tools that are used to create\
    \ the Java programming logic that will eventually define your game app’s game\
    \ play.\n\n## Java Data Types: Defining Data Type in Applications\n\nBecause you\
    \ have already learned about variables and constants encountered in a few of Java’s\
    \ data types, let’s explore these next, as it is not too advanced for your current\
    \ progression from easy to more difficult topics!\n\nThere are two primary data\
    \ type classifications in Java: primitive data types, which are the ones that\
    \ you are the most familiar with if you have used a different programming language,\
    \ and reference (object) data types, which you will know about if you have used\
    \ another OOP language, such as Lisp, Python, Objective-C, C++, or C# (C Sharp).\n\
    \n### Primitive Data Types: Characters, Numbers, and Boolean (Flags)"
  raw: 'A Java method can also be locked using the final modifier keyword. When a
    Java method is made final, if the Java class that contains that method is subclassed,
    that final method cannot be **overridden**, or modified, within the body of the
    subclass. This basically locks what is inside the method code structure. For example,
    if you want the .start() method for your **InvinciBagel** class (were it ever
    to be subclassed) always to do the same things that it does for your InvinciBagel
    superclass (prepare a JavaFX staging environment), you use the following code:


    ```

    public class InvinciBagel extends Application {

         Button btn;


    @Override

         public final void start(Stage primaryStage) {

            btn = new Button();

            // The other method programming statements continue here

         }

    }

    ```


    This prevents any subclasses (public class InvinciBagelReturns extends InvinciBagel)
    from changing anything regarding how the InvinciBagel game engine (JavaFX) is
    set up initially, which is what the .start() method does for your game application
    (see [Chapter 4](#9781484204160_Ch04.xhtml)). A class that is declared using a
    final modifier keyword cannot be extended, or subclassed, locking that class for
    future use.


    Java’s Static Modifier: Variables or Methods That Exist in a Class (Not in Objects)


    As you have already seen, the static keyword can be used in conjunction with the
    final keyword to create a constant. The static keyword is used to create Java
    constructs (methods or variables) that exist independently, or outside, any object
    instances that are created using the class that static variables or static methods
    are defined in. A static variable in a class will force all instances of the class
    to share the data in that variable, almost as if it is a global variable as far
    as objects created from that class are concerned. Similarly, a static method will
    also exist outside instanced objects for that class and will be shared by all
    those objects. A static method will not reference variables outside  itself, such
    as an instanced object’s variables.


    Generally, a static method will have its own internal (local or static) variables
    and constants and will also take in variables, using the method parameter list,
    and then provide processing and computation, based on those parameters and its
    own internal (static local) constants if needed. Because static is a concept that
    applies to **instances** of a class, and is thus at a lower level than any class
    itself, a class would not be declared using a static modifier keyword.


    Java’s Abstract Modifier: Classes and Methods to Be Extended and Implemented


    The Java **abstract** modifier keyword has more to do with protecting your actual
    code than with code that has been placed in memory (object instances and variables,
    and so on) at runtime. The abstract keyword allows you to specify how the code
    will be used as a superclass, that is, how it is implemented in a subclass once
    it is extended. For this reason, it applies only to classes and methods and not
    to data fields (variables and constants).


    A class that has been declared using the abstract modifier keyword cannot be instanced,
    and it is intended to be used as a superclass (blueprint) to create (**e**x**tend**)
    other classes. Because a final class cannot be extended, you will not use the
    final and abstract modifier keywords together at the class level. If a class contains
    any methods that have been declared using the abstract modifier keyword, the class
    must itself be declared an abstract class. An abstract class does not have to
    contain any abstract methods, however.


    A method that has been declared using the abstract modifier keyword is a method
    that has been declared for use in subclasses but that has no current implementation.
    This means that it will have no Java code inside its method body, which, as you
    know, is delineated in Java by using curly braces. Any subclass that extends an
    abstract class must implement all these abstract methods, unless the subclass
    is also declared abstract, in which case the abstract methods are passed down
    to the next subclass level.


    Java’s Volatile Modifier: Advanced Multithreading Control over Data Fields


    The Java **volatile** modifier keyword is used when you are developing multithreaded
    applications, which you are not going to be doing in basic game development, as
    you want to optimize your game well enough so that it only uses one thread. The
    volatile modifier tells the Java virtual machine (JVM), which is running your
    application, to merge the private (that thread’s) copy of the data field (variable
    or constant) that has been declared volatile with the master copy of that variable
    in system memory.


    This is similar to the static modifier keyword, the difference being that a static
    variable (data field) is shared by more than one object instance, whereas a volatile
    data field (variable or constant) is shared by more than one thread.


    Java’s Synchronized Modifier: Advanced Multithreading Control over Methods


    The Java **synchronized** modifier keyword is also used when you are developing
    multithreaded applications, which you are not going to be doing for your basic
    game development here. The synchronized modifier tells the JVM, which is running
    your application, that the method that has been declared synchronized can be accessed
    by only one thread at a time. This concept is similar to that of synchronized
    database access, which prevents record access **collisions**. A synchronized modifier
    keyword likewise prevents collisions between threads accessing your method (in
    system memory) by serializing the access to one at a time so that parallel (simultaneous)
    access to a method in memory by multiple threads will never occur.


    Now that you have studied primary Java constructs (classes, methods, and fields)
    and basic modifier keywords (public, private, protected, static, final, abstract,
    and so on), let’s journey inside the curly braces now, learning about the tools
    that are used to create the Java programming logic that will eventually define
    your game app’s game play.


    Java Data Types: Defining Data Type in Applications


    Because you have already learned about variables and constants encountered in
    a few of Java’s data types, let’s explore these next, as it is not too advanced
    for your current progression from easy to more difficult topics!


    There are two primary data type classifications in Java: **primitive data types**,
    which are the ones that you are the most familiar with if you have used a different
    programming language, and **reference (object) data types**, which you will know
    about if you have used another OOP language, such as Lisp, Python, Objective-C,
    C++, or C# (C Sharp).


    Primitive Data Types: Characters, Numbers, and Boolean (Flags)'
  trans: '

    Java 方法也可以使用 `final` 修饰符关键字进行锁定。当一个 Java 方法被声明为 `final` 时，如果包含该方法的 Java 类被继承，那么该
    `final` 方法在子类中不能被**重写**或修改。这基本上锁定了方法代码结构内部的内容。例如，如果你希望 **InvinciBagel** 类的 `.start()`
    方法（如果它被继承的话）始终执行与 InvinciBagel 超类相同的操作（准备 JavaFX 舞台环境），你可以使用以下代码：


    ```

    public class InvinciBagel extends Application {

         Button btn;


    @Override

         public final void start(Stage primaryStage) {

            btn = new Button();

            // 其他方法编程语句在此继续

         }

    }

    ```


    这可以防止任何子类（例如 `public class InvinciBagelReturns extends InvinciBagel`）更改 InvinciBagel
    游戏引擎（JavaFX）的初始设置方式，而这正是 `.start()` 方法为你的游戏应用程序所做的事情（参见第 4 章）。使用 `final` 修饰符关键字声明的类不能被扩展或继承，从而将该类锁定以供将来使用。


    Java 的 Static 修饰符：存在于类中（而非对象中）的变量或方法


    正如你已经看到的，`static` 关键字可以与 `final` 关键字结合使用来创建常量。`static` 关键字用于创建独立于任何使用定义有静态变量或静态方法的类所创建的对象实例而存在的
    Java 结构（方法或变量）。类中的静态变量将强制该类的所有实例共享该变量中的数据，对于从该类创建的对象而言，这几乎就像一个全局变量。类似地，静态方法也将独立于该类的实例化对象而存在，并被所有这些对象共享。静态方法不会引用其自身之外的变量，例如实例化对象的变量。


    通常，静态方法拥有自己的内部（局部或静态）变量和常量，并且还会使用方法参数列表接收变量，然后根据这些参数以及其自身的内部（静态局部）常量（如果需要）进行处理和计算。由于
    `static` 是一个适用于类**实例**的概念，因此其层级低于任何类本身，所以类不能使用 `static` 修饰符关键字来声明。


    Java 的 Abstract 修饰符：待扩展和实现的类与方法


    Java 的 **abstract** 修饰符关键字更多地与保护你的实际代码有关，而不是与运行时已放入内存中的代码（对象实例和变量等）有关。`abstract`
    关键字允许你指定代码将如何作为超类被使用，即，一旦被扩展，它如何在子类中被实现。因此，它仅适用于类和方法，而不适用于数据字段（变量和常量）。


    使用 `abstract` 修饰符关键字声明的类不能被实例化，它旨在作为超类（蓝图）来创建（**扩展**）其他类。由于 `final` 类不能被扩展，因此你不能在类级别同时使用
    `final` 和 `abstract` 修饰符关键字。如果一个类包含任何使用 `abstract` 修饰符关键字声明的方法，则该类本身必须被声明为抽象类。然而，抽象类不一定非要包含抽象方法。


    使用 `abstract` 修饰符关键字声明的方法是一个声明用于子类但当前没有实现的方法。这意味着它的方法体内没有 Java 代码，正如你所知，在 Java
    中方法体使用花括号界定。任何扩展抽象类的子类都必须实现所有这些抽象方法，除非该子类也被声明为抽象类，在这种情况下，抽象方法会传递给下一个子类层级。


    Java 的 Volatile 修饰符：对数据字段的高级多线程控制


    Java 的 **volatile** 修饰符关键字在你开发多线程应用程序时使用，而在基础游戏开发中你不会用到它，因为你希望充分优化你的游戏，使其仅使用一个线程。`volatile`
    修饰符告诉运行你应用程序的 Java 虚拟机（JVM），将已声明为 `volatile` 的数据字段（变量或常量）的私有副本（该线程的）与系统内存中该变量的主副本合并。


    这类似于 `static` 修饰符关键字，区别在于静态变量（数据字段）由多个对象实例共享，而 `volatile` 数据字段（变量或常量）由多个线程共享。


    Java 的 Synchronized 修饰符：对方法的高级多线程控制


    Java 的 **synchronized** 修饰符关键字同样在你开发多线程应用程序时使用，而在这里的基础游戏开发中你不会用到它。`synchronized`
    修饰符告诉运行你应用程序的 JVM，被声明为 `synchronized` 的方法一次只能被一个线程访问。这个概念类似于同步数据库访问，后者可以防止记录访问**冲突**。`synchronized`
    修饰符关键字同样通过将访问序列化（一次一个）来防止线程访问你的方法（在系统内存中）时发生冲突，从而确保永远不会发生多个线程对内存中方法的并行（同时）访问。


    现在你已经学习了主要的 Java 结构（类、方法和字段）以及基本的修饰符关键字（public、private、protected、static、final、abstract
    等），让我们深入花括号内部，学习用于创建 Java 编程逻辑的工具，这些逻辑最终将定义你的游戏应用程序的游戏玩法。


    Java 数据类型：在应用程序中定义数据类型


    由于你已经了解了在几种 Java 数据类型中遇到的变量和常量，接下来让我们探讨这些内容，因为对于你当前从简单到复杂主题的学习进程来说，这并不过于深入！


    Java 中有两种主要的数据类型分类：**基本数据类型**，如果你使用过其他编程语言，这是你最熟悉的一种；以及**引用（对象）数据类型**，如果你使用过其他面向对象编程语言，如
    Lisp、Python、Objective-C、C++ 或 C#（C Sharp），你会了解这种类型。


    基本数据类型：字符、数字和布尔值（标志）

