  trans: '

    最终，你需要微调许多不同的变量，才能针对任何给定的数字视频数据资产实现最佳的数据占用优化。请务必记住，每个视频资产在数字视频编解码器看来（从数学角度）都是不同的。因此，不可能制定出能够实现任何给定压缩结果的标准设置。话虽如此，随着时间的推移，通过经验调整各种设置，你最终会逐渐了解，为了获得期望的最终结果，需要根据不同的压缩参数来更改哪些设置。


    数字音频概念：振幅、频率、采样


    各位音响发烧友都知道，声音是通过声波在空气中传播而产生的。数字音频很复杂；其复杂性部分源于需要将使用扬声器纸盆创造的模拟音频技术与数字音频编解码器桥接起来。模拟扬声器通过脉冲方式产生声波。我们的耳朵则以完全相反的方式接收模拟音频，捕捉并接收这些空气脉冲或不同波长的振动，然后将它们转换回大脑可以处理的数据。这就是我们“听到”声波的方式；然后，我们的大脑会将不同的音频声波频率解读为不同的音符或音调。


    声波会产生各种**音调**，具体取决于声波的**频率**。宽幅或低频（长）波产生低音（低音调），而高频（短）波长则产生高音（高音调）。有趣的是，不同频率的光会产生不同的颜色，因此模拟声音（音频）和模拟光（颜色）之间存在密切的关联。数字图像（和视频）之间还有许多其他相似之处，这些也会贯穿到你的数字新媒体内容制作中，你很快就会看到。


    声波的**音量**由其**振幅**或该波的**高度**（或大小）决定。因此，声波的频率等同于波在**x 轴**上（如果你从二维角度看）的**紧密程度**，而振幅则等同于波在**y
    轴**上测量的高度。


    声波可以具有独特的形状，从而能够“搭载”各种音效。一种“纯净”或基线的声波类型称为**正弦波**（你在高中三角学中学过，涉及正弦、余弦和正切数学函数）。熟悉**音频合成**的人都知道，声音设计中还会使用其他类型的声波，例如**锯齿波**，它看起来像锯子的边缘（因此得名），以及**脉冲波**，它仅使用直角成形，产生即时的开/关声音，转化为音频脉冲（或突发）。


    即使是随机波形，例如噪声，也用于声音设计以获得尖锐的声音效果。正如你可能通过运用刚学到的数据占用优化知识所推断的那样，声波（以及一般的新媒体数据）中存在的“混沌”或噪声越多，编解码器就越难对其进行压缩。因此，由于数据中的混沌，更复杂的声波会导致更大的数字音频文件大小。


    将模拟音频转换为数字音频数据：采样、精度、高清音频


    将模拟音频（声波）转换为数字音频数据的过程称为**采样**。如果你在音乐行业工作，你可能听说过一种称为**采样器**的键盘（甚至机架式设备）。采样是将模拟音频波**切片**成**片段**的过程，以便你可以使用数字音频格式将波的**形状**存储为数字音频数据。这将无限精确的模拟声波转换为离散量的数字数据，即零和一。使用的零和一越多，对无限精确的（原始）模拟声波的再现就越精确。


    采样音频声波的每个数字片段称为一个样本，因为它是在一个精确的时间点对该声波进行采样。你想要的**样本精度**（分辨率）将决定用于再现模拟声波的零和一的位数，因此样本的**精度**由用于定义每个波片**高度**的数据量决定。与数字成像一样，这种精度被称为**分辨率**，或者更准确地说（无意双关），**样本分辨率**。样本分辨率通常使用**8
    位**、**12 位**、**16 位**、**24 位**或**32 位**分辨率来定义。游戏主要利用 8 位分辨率来处理爆炸等效果，在这些效果中清晰度不那么重要；12
    位分辨率用于清晰的口语对话和更重要的音频元素；可能还会使用 16 位分辨率用于背景音乐。


    在数字成像和数字视频中，这种分辨率由像素数量来量化，而在数字音频中，则由用于定义每个模拟音频样本的数据位数来量化。再次强调，与数字成像中更多像素带来更好质量一样，在数字音频中，更高的样本分辨率能带来更好的声音再现。因此，使用更多数据来再现给定声波样本的更高采样分辨率，会产生更高质量的音频播放，但代价是更大的数据占用。这就是
    16 位音频（通常称为**CD 音质音频**）听起来比 8 位音频更好的原因。根据所涉及的音频类型，12 位音频可以是一个很好的折衷方案。


    在数字音频中，有一种新型的音频样本，在消费电子行业中称为高清音频。高清数字音频广播电台使用 24 位样本分辨率，因此每个音频样本或声波切片包含 16,777,216
    位样本分辨率。一些较新的硬件设备现在支持高清音频，例如你看到的宣传具有“高清音质音频”的智能手机，这意味着它们拥有 24 位音频硬件。如今，笔记本电脑（包括个人电脑）、游戏机以及
    iTV 也标配了 24 位音频播放硬件。


    需要注意的是，对于 Java 8 游戏来说，高清音频可能并非必需，除非你的游戏是音乐导向的并且使用了高质量音乐，在这种情况下，你可以通过**WAVE**文件格式使用高清音频样本。

    '
- fmt: '另一个需要考虑的因素是数字音频的**采样频率**（也称为**采样率**），它衡量的是在1秒的采样时间范围内，以特定采样分辨率采集的样本数量。在数字图像编辑领域，采样频率类似于数字图像中包含的颜色数量。你可能熟悉“CD音质音频”这个术语，它定义为使用**16位**采样分辨率和**44.1kHz**采样率（即每秒采集44,100个样本，每个样本具有16位采样分辨率，即65,536位音频数据）。你可以通过将采样比特率乘以采样频率再乘以音频片段的秒数，来计算音频文件中的原始数据量。显然，这可能是一个巨大的数字！音频编解码器非常擅长将数据优化到惊人的小数据占用空间，同时几乎听不出音质损失。


    因此，数字成像和数字视频中存在的完全相同的权衡也出现在数字音频中：包含的数据越多，结果质量越高，但代价总是更大的数据占用空间。在视觉媒介中，数据占用空间的大小由颜色深度、像素以及（对于数字视频和动画而言）帧来定义。在听觉媒介中，它由采样分辨率与采样率共同定义。目前数字音频行业中最常见的采样率包括**8kHz**、**22kHz**、**32kHz**、**44.1kHz**、**48kHz**、**96kHz**、**192kHz**，甚至**384kHz**。


    较低的采样率，例如`8kHz`、`11kHz`和`22kHz`，是你将在游戏中使用的采样率，因为通过精心优化，这些采样率可以产生高质量的音效和街机音乐。这些采样率也最适合采样任何基于语音的数字音频，例如电影对白或电子书旁白音轨。较高的音频采样率，例如`44.1kHz`，更适合音乐，而需要高动态范围（高保真度）的音效，如雷鸣般的雷声，则可以使用`48kHz`。更高的采样率将允许音频再现达到电影院（THX）音质，但对于大多数游戏来说并非必需。


    **数字音频流：内嵌音频 vs. 流式音频**


    与数字视频数据一样，数字音频数据可以内嵌在应用程序分发文件中（在Java中，即`.JAR`文件），也可以使用远程数据服务器进行**流式传输**。与数字视频类似，流式传输数字音频数据的优点是可以减少应用程序文件的数据占用空间。缺点是可靠性。许多相同的概念同样适用于音频和视频。流式音频将节省数据占用空间，因为你无需将所有那些庞大的新媒体数字音频数据包含在`.JAR`文件中。因此，如果你计划编写一个点唱机应用程序，你可能需要考虑流式传输你的数字音频数据；否则，请尝试优化你的数字音频数据，以便将它们（内嵌）包含在`.JAR`文件中。这样，当应用程序用户需要时，数据将始终可用！


    流式数字音频的缺点是，如果用户的连接（或音频数据服务器）中断，你的数字音频文件可能无法始终供最终用户使用你的游戏应用程序播放和收听！数字音频数据的可靠性和可用性是流式传输与内嵌权衡的另一面需要考虑的关键因素。这同样适用于数字视频资源。


    同样，与数字视频一样，关于流式传输数字音频的主要概念之一是数字音频数据的比特率。正如你在上一节中所了解的，比特率是在压缩过程中定义的。需要支持较低比特率带宽的数字音频文件将对音频数据应用更多压缩，这将导致质量降低。这些文件将在更多设备上更流畅地流式传输（播放），因为较少的比特可以更快地传输，也更容易处理。


    **JavaFX中的数字音频：支持的数字音频编解码器和数据格式**


    JavaFX中的**数字音频** **编解码器**比数字视频编解码器多得多，因为视频编解码器只有一种，即MPEG-4 H.264 AVC。Android音频支持包括`.MP3`（**MPEG-3**）文件、Windows
    **WAVE**（**脉冲编码调制** [**PCM**] 音频）`.WAV`文件、`.MP4`（或`.M4A`）**MPEG-4 AAC**（**高级音频编码**）音频，以及苹果的**AIFF**（PCM）文件格式。JavaFX（以及Java
    8）支持的最常见格式是流行的`.MP3`数字音频文件格式。由于Napster或Soundcloud等音乐下载网站，你们大多数人都熟悉MP3数字音频文件，并且我们大多数人都会收集这种格式的歌曲，用于MP3播放器以及基于CD-ROM或DVD-ROM的音乐收藏。MP3数字音频文件格式之所以流行，是因为它具有相当好的压缩质量比，并且得到广泛支持。


    只要使用最佳的编码工作流程从中获得尽可能高的质量水平，`MP3`就是在Java 8应用程序中可接受的格式。需要注意的是，与JPEG（用于图像）一样，`MP3`是一种**有损**音频文件格式，在压缩过程中，一些音频数据（以及质量）会被**丢弃**且无法恢复。


    JavaFX确实有两种**无损**音频压缩编解码器：`AIFF`和`WAVE`。你们中的许多人熟悉这些格式，因为它们分别是Apple Macintosh和Microsoft
    Windows操作系统最初使用的音频格式。这些文件使用PCM音频，这是无损的（在这种情况下，因为根本没有应用任何压缩！）。“PCM”，如前所述，代表“脉冲编码调制”，指的是它所持有的数据格式。


    PCM音频通常用于CD-ROM内容以及电话应用。这是因为PCM WAVE音频是一种**未压缩**的数字音频格式，没有对数据流应用CPU密集型的压缩算法。因此，解码（CPU数据处理）对于电话设备或CD播放器来说不是问题。


    出于这个原因，当你开始将数字音频资源压缩成各种文件格式时，你可以使用`PCM`作为你的**基准**文件格式。它允许你查看PCM（WAVE）与MP3和MP4音频压缩结果之间的差异，以了解你的`.JAR`文件获得了多少数据占用空间优化；更重要的是，你还可以看到你的采样分辨率和采样频率优化将如何影响游戏音效所使用的系统内存。即使你使用了`MP3`或`MP4`格式，在音频资源可以与`AudioClip`类一起使用并作为音效应用于Java
    8游戏之前，它仍然需要被解压缩到内存中。'
  raw: 'Another consideration is digital audio **sampling frequency** (also called
    the **sampling rate**), This is a measure of how many samples at a particular
    sample resolution are taken during 1 second of sampling time frame. In terms of
    digital image editing, sampling frequency is analogous to the number of colors
    contained in a digital image. You are probably familiar with the term “CD-quality
    audio,” which is defined as using a **16-bit** sample resolution and a **44.1kHz**
    sampling rate (taking 44,100 samples, each of which has 16 bits of sample resolution,
    or 65,536 bits of audio data). You can determine the amount of raw data in an
    audio file by multiplying the sampling bit rate by the sampling frequency by the
    number of seconds in the audio snippet. Obviously, this can potentially be a huge
    number! Audio codecs are really great at optimizing data down to an amazingly
    small data footprint with very little audible loss in quality.


    Thus, the exact same trade-off that exists in digital imaging and digital video
    occurs with digital audio as well: the more data you include, the higher quality
    the result, but always at the cost of a much larger data footprint. In the visual
    mediums the size of the data footprint is defined using color depth, pixels, and,
    in the case of digital video and animation, frames. In the aural medium it is
    defined via the sample resolution, in combination with the sampling rate. The
    most common sampling rates in the digital audio industry currently include **8kHz**,
    **22kHz**, **32kHz**, **44.1kHz**, **48kHz**, **96KHz**, **192kHz**, and even
    **384kHz**.


    Lower sampling rates, such as 8kHz, 11kHz, and 22kHz, are the ones that you are
    going to use in your games, as, with careful optimization, these can yield high-quality
    sound effects and arcade music. These rates would be optimal for sampling any
    voice-based digital audio as well, such as movie dialogue or an e-book narration
    track. Higher audio sample rates, such as 44.1kHz, would be more appropriate for
    music, and sound effects that need a high dynamic range (high fidelity), such
    as rumbling thunder, could use 48kHz. Higher sample rates will allow audio reproduction
    that exhibits movie theater (THX) sound quality, but this is not required for
    most games.


    Digital Audio Streaming: Captive Audio vs. Streaming Audio


    As with digital video data, digital audio data can be either captive within the
    application distribution file (in the case of Java, a .**JAR** file) or **streamed**,
    using remote data servers. Similar to digital video, the upside to streaming digital
    audio data is that it can reduce the data footprint of the application file. The
    downside is reliability. Many of the same concepts apply equally well to audio
    and video. Streaming audio will save the data footprint, because you do not have
    to include all that heavy new media digital audio data in your .JAR files. So,
    if you are planning on coding a Jukebox application, you may want to consider
    streaming your digital audio data; otherwise, try to optimize your digital audio
    data so that you can include them (captive) inside the .JAR file. This way, the
    data will always be available to the application’s users when they need it!


    The downside to streaming digital audio is that if a user’s connection (or the
    audio data server) goes down, your digital audio file may not always be present
    for your end users to play and listen to, using your game application! The reliability
    and availability of digital audio data are a key factor to be considered on the
    other side of this streaming-versus-captive  trade-off. The same would apply to
    digital video assets as well.


    Again, as with digital video, one of the primary concepts in regard to streaming
    your digital audio is the bit rate of the digital audio data. As you learned in
    the previous section, the bit rate is defined during the compression process.
    Digital audio files that need to support lower bit-rate bandwidth are going to
    have more compression applied to the audio data, which will result in lower quality.
    These will stream (play back) more smoothly across a greater number of devices,
    because fewer bits can be quickly transferred as well as processed more easily.


    Digital Audio in JavaFX: Supported Digital Audio Codecs and Data Formats


    There are considerably more **digital audio** **codecs** in JavaFX than digital
    video codecs, as there is only one video codec, MPEG-4 H.264 AVC. Android audio
    support includes **.MP3** (**MPEG-3**) files, Windows **WAVE** (**Pulse Code Modulation**
    [**PCM**] audio) **.WAV** files, **.MP4** (or .M4A) **MPEG-4 AAC** (**Advanced
    Audio Coding**) audio, and Apple’s **AIFF** (PCM) file format. The most common
    format supported by JavaFX (and thus Java 8) is the popular .MP3 digital audio
    file format. Most of you are familiar with MP3 digital audio files, owing to music
    download web sites, such as Napster or Soundcloud, and most of us collect songs
    in this format to use on MP3 players and in CD-ROM- or DVD-ROM-based music collections.
    The MP3 digital audio file format is popular because it has a fairly good compression-to-quality
    ratio and is widely supported.


    MP3 is an acceptable format to use in a Java 8 application, so long as you get
    the highest quality level possible out of it, using an optimal encoding work process.
    It is important to note that, like JPEG (used for images), MP3 is a **lossy**
    audio file format, in which some of the audio data (and thus quality) are **thrown
    away** during your compression process and cannot be recovered.


    JavaFX does have two **lossless** audio compression codecs, AIFF and WAVE. Many
    of you are familiar with these, as they were the original audio formats used with
    the Apple Macintosh and Microsoft Windows OSs, respectively. These files use PCM
    audio, which is lossless (in this case, because there is no compression applied
    whatsoever!). “PCM,” which, as stated, stands for “pulse code modulation,” refers
    to the data format it holds.


    PCM audio is commonly used for CD-ROM content as well as telephony applications.
    This is because PCM WAVE audio is an **uncompressed** digital audio format, with
    no CPU-intensive compression algorithms applied to the data stream. Thus, decoding
    (CPU data processing) is not an issue for telephony equipment or for CD players.


    For this reason, when you start compressing digital audio assets into the various
    file formats, you can use PCM as your **baseline** file format. It allows you
    to look at the difference between PCM (WAVE) and MP3 and MP4 audio compression
    results to get an idea of how much data footprint optimization you are getting
    for your JAR file;  more important, you can also see how your sample resolution
    and sample frequency optimization are going to affect the system memory used for
    your game’s audio effects. Even if you used an MP3 or MP4 format, it would still
    have to be decompressed into memory before the audio asset could be used with
    the AudioClip class and employed as a sound effect in a Java 8 game.'
