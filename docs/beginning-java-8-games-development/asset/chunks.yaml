    Next, let’s add the traditional ASDW game play key event handling, to give our
    users an option to use those keys or to use two hands for their game play! This
    will show you how to add alternate key mapping support to your existing event
    handling code, using only a few more lines of code in the highly efficient switch-case
    statement.


    Adding Alternate KeyEvent Mapping: Using A-S-D-W


    Now that we have these KeyEvent handling structures in place, let’s take a look
    at how easy it is to add an alternate key mapping to the ASDW keys often used
    for game play. This is done by adding in a few more case statements for the A,
    S, D, and W characters on the keyboard, and setting them to the UP, DOWN, LEFT,
    and RIGHT Boolean equivalents that we have set up already. This will allow users
    to use the A and D characters with their left hand and the UP and DOWN arrows
    with their right hand for easier game play, for instance.


    Later on, if you wanted to add more features to your game play, using your game
    controller, and its support for the KeyCode class’s **GAME_A** (**Jump**), **GAME_B**
    (**Fly**), **GAME_C** (**climb**), and **GAME_D** (**crawl**) constants, all that
    you would have to do is to add these new features into your game would be to add
    another four Boolean variables (jump, fly, climb, and crawl) to the up, down,
    left, and right at the top of the screen, and add in another four case statements.


    These four W (UP), S (DOWN), A (LEFT), and D (RIGHT) case statements, once added
    to the switch statement, would bring your KeyEvent object and its event handling
    Java code structure to only a dozen lines of Java code. Your new .setOnKeyPressed()
    event handling structure would look like this block of code after you make this
    modification:


    ```

    scene.setOnKeyPressed(KeyEvent event) -> {

        switch (event.getCode()) {

            case UP:    up    = true; break;

            case DOWN:  down  = true; break;

            case LEFT:  left  = true; break;

            case RIGHT: right = true; break;

            case W:     up    = true; break;

            case S:     down  = true; break;

            case A:     left  = true; break;

            case D:     right = true; break;

        }

    });

    ```


    As you can see, now the user can use either set of keys, or both sets of keys
    at the same time, to control the game play. Now that you have made the .setOnKeyPressed()
    event handling structure more flexible (and powerful) for the game player, let’s
    do the same thing to the .setOnKeyReleased() event handling structure, which will
    instead set a **false** value to the up, down, left and right Boolean flag variables
    when the user has **released** the A or LEFT, W or UP, S or DOWN, or D or RIGHT
    keys on the keyboard, remote control, or device keyboard and keypad.


    Your .setOnKeyReleased() event handling Java code should look like the following
    once you add these case statements at the end of the body of the switch statement:


    ```

    scene.setOnKeyReleased(KeyEvent event) -> {

        switch (event.getCode()) {

            case UP:    up    = false; break;

            case DOWN:  down  = false; break;

            case LEFT:  left  = false; break;

            case RIGHT: right = false; break;

            case W:     up    = false; break;

            case S:     down  = false; break;

            case A:     left  = false; break;

            case D:     right = false; break;

        }

    });

    ```


    Now that you have added another set of player movement control keys for your player
    to use to control the game play, your code is error free, and has a simple, effective
    structure, as is shown in [Figure 9-14](#9781484204160_Ch09.xhtml#Fig14). We are
    handling the events one time at the very top of the Scene object named scene,
    not involving any Scene Graph Node objects in this event handling “calculation,”
    and are using only a few bytes of memory to hold eight Boolean (on/off) values.


    ![9781484204160_Fig09-14.jpg](OEBPS/Images/9781484204160_Fig09-14.jpg)


    [Figure 9-14](#9781484204160_Ch09.xhtml#_Fig14). Add the case statements for ASDW
    keys to give users two key options, or to allow two-handed game play


    This is in keeping with our objective of optimizing both memory and CPU cycles,
    so that these are available for the more advanced parts of our game play, such
    as the game play logic, collision detection, or physics calculation.


    We also added constants that will allow us to later scale this 640 by 400 game
    prototype to fit display screens of different resolutions such as Pseudo HD (1280
    by 720), True HD (1920 by 1080), and UHD (4096 by 2160). These can also be used
    in the game logic, to calculate the size of the screen area to determine movement
    boundaries.


    So far, we have added our actor and supporting cast engine, as well as our basic
    event handling processing, so that we can start to determine how this InvinciBagel
    game hero is going to move around on the screen in the next chapter. We have .handle()
    as well as .update() and .collide() methods in place to hold the code, which will
    animate a character, and eventually enemies, in both the single-player as well
    as a future multi-player version of this game.


    Next, let’s revisit our overview diagram of this game design, and take a look
    at the InvinciBagel package, the InvinciBagel.java class, and the GamePlayLoop
    and Actor and Hero classes, which provide the foundation for our game play processing
    and actor (and projectiles, treasure, enemy and obstacles or “props”) creation.


    Updating Our Game Design: Adding Event Handling


    Let’s update the diagram that I introduced in [Chapter 7](#9781484204160_Ch07.xhtml)
    (Figure 7-19) and updated in [Chapter 8](#9781484204160_Ch08.xhtml) (Figure 8-17)
    to include the ActionEvent and KeyEvent handling by the EventHandler class. As
    you can see in [Figure 9-15](#9781484204160_Ch09.xhtml#Fig15), I added the EventHandler
    event handling class to the diagram as well as the ActionEvent objects that handle
    our UI design control and the KeyEvent that we are going to use to move the InvinciBagel
    actor around the screen. Since the .setOnKeyPressed() and .setOnKeyReleased()
    methods are called off of the scene Scene object named scene, and the ActionEvent
    is also contained under the Scene object, I placed these inside of the Scene object
    in the diagram.


    ![9781484204160_Fig09-15.jpg](OEBPS/Images/9781484204160_Fig09-15.jpg)


    [Figure 9-15](#9781484204160_Ch09.xhtml#_Fig15). The current InvinciBagel package
    class (object) hierarchy, now that we have added Actor and Hero classes


    The Boolean flags set by the KeyEvent switch-case statements will be used in the
    .update() method and will move the InvinciBagel. The .handle() method in the GamePlayLoop
    object will call the .update() method, so there is a connection there as well.
    We are still making steady progress on our game engine framework, adding event
    handling!


