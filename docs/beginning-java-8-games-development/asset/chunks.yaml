- fmt: '# 排版后的文本


    Fortunately for us, the JavaFX `SVGPath` class in the `javafx.scene.shape` package
    allows us to use custom SVG Path (Shape) data to define our sprite collision boundaries.
    Not only that, but this `SVGPath` class (object) is also highly efficient, as
    it has zero properties, only a few methods, and a simple `SVGPath()` constructor
    method, as you have seen already in [Chapter 8](#9781484204160_Ch08.xhtml). This
    means that using the `SVGPath` class (object) is relatively memory and processor
    efficient. In fact, the only method that we will need to use is the `.setContent()`
    method that we used in our `Actor` class constructor method in [Chapter 8](#9781484204160_Ch08.xhtml).
    Since we’ll do this once, at game start-up, the SVG Path collision data will be
    loaded into system memory and will be used in our collision detection routines,
    which we will be putting into place later in this chapter.


    In this chapter we’ll take a detailed look at how the SVG Path data can be defined.
    This is specified by World Wide Web (W3) Consortium (also known as W3C), the body
    who defines HTML5. This specification is on their `w3.org` website, and is located
    at the [http://www.w3.org/TR/SVG/paths.html](http://www.w3.org/TR/SVG/paths.html)
    URL, if you want to view it in further detail.


    After we look at the SVG or Scalable Vector Graphics (in case you are wondering
    what this stands for) data format in detail, we will get into using the popular
    GIMP 2.8 digital image editing software, which you installed in [Chapter 1](#9781484204160_Ch01.xhtml),
    and learn how to create collision polygons. We will also take a look at how to
    use the `PhysEd` (PhysicsEditor) collision polygon generation software. This is
    from a company called CodeAndWeb GmbH, who makes professional, and affordable,
    game assets creation software.


    We will go through a collision polygon vector asset creation and optimization
    process using GIMP 2.8, using both the quick and dirty work process, which allows
    GIMP to 100% create the collision polygon shape for you, as well as a more “involved”
    work process, where you create your own collision polygon yourself, by hand, using
    GIMP’s Path tools. After we have learned how to create collision polygons that
    are compatible with the JavaFX `SVGPath` class, we will spend the remainder of
    the chapter on Java 8 game programming, creating the collision detection engine
    (code) that will allow us to detect when our `InvinciBagel` character comes into
    contact with any of the other `Actor` objects in the game environment (Scene and
    Stage objects). This is where the book will start to become more advanced (useful).


    ## The SVG Data Format: Hand Coding Vector Shapes


    There are ten different letters that can be utilized with the numeric (X,Y data
    point location in 2D space) data in an SVG data string. Each has an upper case
    (absolute referencing) and a lower case (relative referencing) version. We will
    be using absolute referencing as we need these data points to match up with pixel
    locations in the sprite imagery that we are going to “attach” or group these SVG
    Path data strings with to provide collision detection data guidelines. As you
    can see in [Table 16-1](#9781484204160_Ch16.xhtml#Tab1), the SVG data commands
    provide you a great deal of flexibility in defining custom curves for your Java
    8 game development. You could even combine all of these scalable vector commands
    with your Java 8 code to create interactive vector (digital illustration) artwork
    that has never before been experienced, but since this is a game development title,
    we’re going to use this information to develop highly optimized collision polygons
    that only use a dozen X,Y data points (somewhere between 12 and 15) to define
    a relatively detailed collision polygon that will encase our sprite imagery, and
    provide highly accurate (from the game player’s viewpoint, at least) collision
    results.


    [Table 16-1](#9781484204160_Ch16.xhtml#_Tab1). SVG data commands to use for creating
    SVG path data string (source: Worldwide Web Consortium w3.org)


    ![Table16-1.jpg](OEBPS/Images/Table16-1.jpg)


    The best way to see how to use the powerful SVG data “path drawing” commands is
    to get down to learning the work process for creating SVG data-based collision
    polygon paths. We will learn how to do this using GIMP 2.8.14, using a “quick
    and dirty” approach, which lets GIMP do 100% of the path creation work. After
    that, we’ll learn another way to do this by hand using GIMP. A second approach
    gives you 100% of the path creation control. At the end of this SVG topic, I will
    also show you how to use another dedicated collision and physics development tool
    called `PhysEd` from an innovative game development software tools company, located
    in Ulm, Germany, called CodeAndWeb GmbH.


    ## Creating and Optimizing Collision Data: Using GIMP


    Fortunately for us, the popular open source digital image editing software package
    called GIMP, currently at version 2.8.14, has enough Path capabilities, and the
    ability to export this as SVG datasets, to allow the software to be used as a
    full-fledged collision polygon creation tool. The GIMP software supports paths
    using a Path Tool (shown as an old-fashioned fountain pen tip next to a curve
    data point with Bezier handles coming out of it), which you can see in [Figure
    16-1](#9781484204160_Ch16.xhtml#Fig1) (second icon from the left in the second
    row of the Toolbox Icons). The reason GIMP supports paths, as it is not generally
    a vector (path-based) software package, but instead a raster (pixel-based) software
    package, is because the ability to create a path and then “convert” it to a selection
    area is a very useful one to the digital image compositing artisan. In fact, we
    will be using GIMP’s ability to do just the opposite of this: that is, convert
    an algorithmically created selection set into path data, which will form the foundation
    of our fully automated, “quick and dirty” SVG Path data creation process. We will
    take a look at this first, since it is fast, simple, and effective (but “data
    heavy”). Let’s get started by launching GIMP, and using the **File ![image](OEBPS/Images/arrow.jpg)
    Open** process to open the `sprite1.png` PNG32 digital image asset that is in
    your project `/src` folder. As you can see in [Figure 16-1](#9781484204160_Ch16.xhtml#Fig1),
    I have zoomed into the image. This allows me to see the collision data path (initially,
    this will be a selection) that we’re about to create using the GIMP Toolbox.


    ![9781484204160_Fig16-01.jpg](OEBPS/Images/9781484204160_Fig16-01.jpg)


    [Figure 16-1](#9781484204160_Ch16.xhtml#_Fig1). Launch GIMP, and use File ![image](OEBPS/Images/arrow.jpg)
    Open to open the `sprite1.png` file


    Click on the GIMP Fuzzy Selection Tool (icon looks like a sparkler or a magic
    wand), which is shown selected (depressed, as in “sunk in,” not sad) in [Figure
    16-2](#9781484204160_Ch16.xhtml#Fig2). Click on any area of the image that shows
    a checkerboard pattern, which always signifies transparency in any digital imaging
    software package, as well as many other types of software, such as the game asset
    creation software packages from CodeAndWeb GmbH, for instance. As you see, in
    [Figure 16-2](#9781484204160_Ch16.xhtml#Fig2), you’ll get an animated, “crawling
    ants” outline around the transparent areas of the image, since the transparent
    areas have just been selected by the Fuzzy Selection Tool algorithm, which selects
    areas of contiguous color values.


    ![9781484204160_Fig16-02.jpg](OEBPS/Images/9781484204160_Fig16-02.jpg)


    [Figure 16-2](#9781484204160_Ch16.xhtml#_Fig2). Click in a transparent area using
    Fuzzy Select Tool to select Actor'
