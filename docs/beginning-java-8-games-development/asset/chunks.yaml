    ## Adding Your Audio Asset Loading Method: `.loadAudioAssets()`


    Create a method call inside of your `start()` method, as seen in [Figure 15-13](#9781484204160_Ch15.xhtml#Fig13),
    called `loadAudioAssets();` and place it in the logical method order right before
    the `loadImageAssets();` method invocation. To get rid of the wavy red error highlighting,
    add a `private void loadAudioAssets(){}` empty method after the `createSceneEventHandling()`
    method. In this way, your digital audio assets will be referenced and loaded into
    memory right after your `KeyEvent` handling is set up, and right before your digital
    image assets are referenced and loaded into memory.


    ![9781484204160_Fig15-13.jpg](OEBPS/Images/9781484204160_Fig15-13.jpg)


    [Figure 15-13](#9781484204160_Ch15.xhtml#_Fig13). Create the private void .loadAudioAssets()
    method to hold the AudioClip object instantiation statements


    Inside of your `.loadAudioAssets()` method body, your will have two Java code
    statements, as loading a digital audio asset is a little bit more involved than
    referencing digital image assets. First, you will load your first `iAudioFile0`
    URL object, using the `getClass().getResource()` method chain. This method chain
    loads the `URL` (uniform resource locator) object with the digital audio sample
    resource that you want to use, and will do this for your `Class` object (in this
    case, this is the `InvinciBagel` class, since that is the Java class which we
    are writing this code in).


    The resource that you are looking to get the URL for goes inside of the `.getResource()`
    method call, and uses the same format as the resource references that you used
    for your digital image assets, which in this case would be a `"/leftmono.wav"`
    file reference, which is converted by the `.getResource()` method into a binary
    URL data format. This Java code can be seen in [Figure 15-14](#9781484204160_Ch15.xhtml#Fig14),
    and looks like the following Java method body:


    ```

    private void loadAudioAssets() {

        iAudioFile0 = getClass().getResource("/leftmono.wav");

        iSound0 = new AudioClip(iAudioFile0.toString());

    }

    ```


    ![9781484204160_Fig15-14.jpg](OEBPS/Images/9781484204160_Fig15-14.jpg)


    [Figure 15-14](#9781484204160_Ch15.xhtml#_Fig14). Instantiate and load the URL
    object, and then use it inside of the iSound0 AudioClip object instantiation


    The second line of code, interestingly, uses the `.toString()` method call, which
    converts this `URL` object right back into a `String` object, which is required
    to load the `AudioClip()` constructor method with the audio asset URL. You may
    be thinking: why not use `iSound0 = new AudioClip("/leftmono");`? You can try
    this, however, you''ll have to "hard code" the directory, using `"file:/Users/users/MyDocuments/NetBeansProjects/InvinciBagel/src/leftmono.wav"`.


    I used the `URL` object approach so that you will be able to reference this audio
    file from the inside of the JAR file, instead of using the approach shown above
    that **requires** an "absolute" location on a hard disk drive. Therefore, this
    `getClass().getResource()` method chain is adding "relative" reference data into
    this `URL` object. Your `InvinciBagel` class needs this relative reference data
    to be able to reference your WAV audio resource files from the inside of your
    NetBeans 8 project `InvinciBagel/src` folder, as well as from the inside of your
    JAR file for your Java 8 game application.


    Next, use your trusty programmer''s shortcut, and copy and paste these two lines
    of code five more times underneath themselves, which is the easy way to create
    your other five `AudioClip` objects. Change the zero on both `iAudioFile0` and
    `iSound0` to `iAudioFile1` through `iAudioFile5` and `iSound1` through `iSound5`
    respectively. Then change the WAV audio file name reference to `rightmono.wav`,
    `upmono.wav`, `downmono.wav`, `wmono.wav` and `smono.wav` respectively. Your completed
    `loadAudioAssets()` method should then look like the following Java method body,
    which is also shown in [Figure 15-15](#9781484204160_Ch15.xhtml#Fig15):


    ```

    private void loadAudioAssets() {

        iAudioFile0 = getClass().getResource("/leftmono.wav");

        iSound0 = new AudioClip(iAudioFile0.toString());

        iAudioFile1 = getClass().getResource("/rightmono.wav");

        iSound1 = new AudioClip(iAudioFile1.toString());

        iAudioFile2 = getClass().getResource("/upmono.wav");

        iSound2 = new AudioClip(iAudioFile2.toString());

        iAudioFile3 = getClass().getResource("/downmono.wav");

        iSound3 = new AudioClip(iAudioFile3.toString());

        iAudioFile4 = getClass().getResource("/wmono.wav");

        iSound4 = new AudioClip(iAudioFile4.toString());

        iAudioFile5 = getClass().getResource("/smono.wav");

        iSound5 = new AudioClip(iAudioFile5.toString());

    }

    ```


    ![9781484204160_Fig15-15.jpg](OEBPS/Images/9781484204160_Fig15-15.jpg)


    [Figure 15-15](#9781484204160_Ch15.xhtml#_Fig15). Create more AudioClip objects
    referencing the rightmono, upmono, downmono, wmono, and smono files


