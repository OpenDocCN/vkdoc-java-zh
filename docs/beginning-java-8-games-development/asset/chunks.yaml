- fmt: "接下来，我们将把`.playiSound0()`方法调用从`.checkCollision()`方法中移出，并将其放入`scoringEngine()`方法中。只要它位于这两个方法之一中，它就会在碰撞时被调用，无论哪种方式。我之所以这样做，是因为当玩家找到宝藏或被弹丸击中时，我们可能希望播放不同的音效。这样，你的音频与得分和游戏玩法相关联，当检测到不同类型的碰撞时，而不是仅仅为任何碰撞播放音频。\n\
    \n我们的条件`if()`结构代码体使用花括号，这允许我们向每种碰撞（得分）对象实例（类型）中添加Java语句。因此，除了增加（或减少，我们稍后会添加）分数之外，我们还可以为不同的对象使用不同的声音（`audioClips`）。接下来，让我们将`.playSound()`方法调用添加到这些条件`if()`代码块中，这样我们就有了代码来触发音效，当主要角色拾取宝藏、被敌人（`InvinciBeagle`）角色发射的弹丸击中（或接住）时，或者当他与场景中的道具碰撞时。\n\
    \n这是通过使用以下Java条件`if()`结构完成的，这些结构也可以在[图17-10](#9781484204160_Ch17.xhtml#Fig10)中看到：\n\
    \n```\nprivate void scoringEngine(Actor object) {\n    if(object instanceof Prop)\
    \  {\n        invinciBagel.gameScore+=5;\n        invinciBagel.playiSound0();\n\
    \    }\n    if(object instanceof PropV) {\n        invinciBagel.gameScore+=4;\n\
    \        invinciBagel.playiSound1();\n    }\n    if(object instanceof PropH) {\n\
    \        invinciBagel.gameScore+=3;\n        invinciBagel.playiSound2();\n   \
    \ }\n    if(object instanceof PropB) {\n        invinciBagel.gameScore+=2;\n \
    \       invinciBagel.playiSound3();\n    }\n    invinciBagel.scoreText.setText(String.valueOf(invinciBagel.gameScore));\n\
    }\n```\n\n![9781484204160_Fig17-10.jpg](OEBPS/Images/9781484204160_Fig17-10.jpg)\n\
    \n[图17-10](#9781484204160_Ch17.xhtml#_Fig10). 在每个`if()`语句体中添加`.playiSound()`方法调用，以便为每种类型播放不同的音频\n\
    \n现在，我们有了更多的游戏玩法交互，因为记分板会在每次碰撞时立即正确更新，并同时播放一个`audioClip`，以指示已检测到碰撞、发生的碰撞类型（好或坏），以及记分板已更新，因为毕竟，这个编程逻辑包含在`scoringEngine()`方法中，因此应该以某种方式与得分行为相关。\n\
    \n在我们测试这个条件`if()`编程逻辑并确保一切按预期工作后，我们可以看看如何向这个`.scoringEngine()`方法添加优化，然后我们将准备添加更多`Actor`类型，例如`Treasure.java`类，我们接下来将添加它。之后，我们可以向`InvinciBagel`游戏添加一些敌人（对手），因为我们在本章中继续添加使游戏玩法更有趣和更令人兴奋的功能。\n\
    \n使用**运行 ![image](OEBPS/Images/arrow.jpg) 项目**工作流程测试游戏。如[图17-11](#9781484204160_Ch17.xhtml#Fig11)所示，记分板正常工作！\n\
