    中的单行注释以**双斜杠**序列开头。例如，如果你想为你创建的 InvinciBagel 引导代码中的某个导入语句添加注释（该代码在第 2 章中创建），你可以在该行代码后面加上双斜杠。添加注释后，你的
    Java 代码将如下所示（另请参见图 3-1 右下角）：


    ```

    import javafx.stage.Stage // 这行代码从 JavaFX.stage 包中导入 Stage 类

    ```


    ![9781484204160_Fig03-01.jpg](img/9781484204160_Fig03-01.jpg)


    图 3-1. 多行注释（顶部前五行代码）和单行注释（底部后三行代码）


    接下来，让我们看看**多行注释**，如图 3-1 顶部所示，位于 package 语句上方（你将在下一节学习 package 语句）。如你所见，这些 Java
    块注释的实现方式不同，使用**斜杠后跟星号**来开始注释，并使用其反向形式，即**星号后跟斜杠**，来结束多行注释。


    正如你在 NetBeans 8.0 的**InvinciBagel.java**代码编辑标签页中所见，就像我将单行注释对齐以使其看起来美观（酷炫）且有条理一样，Java
    块注释的**惯例**也是将星号对齐，其中一个星号作为注释开始分隔符，另一个作为注释结束分隔符。


    ![Image](img/sq.jpg) **定义**  Java 编程中的“**惯例**”是指大多数（如果不是全部）Java 程序员实现 Java 构造的方式。在这种情况下，这就是
    Java 代码块注释的**样式**。


    还有第三种注释类型，称为**Javadoc**注释，你在 Java 8 游戏开发中不会用到它，因为你的代码旨在用于创建游戏，而不是分发给公众。如果你打算编写一个供他人创建游戏使用的
    Java 游戏引擎，那时你才会使用 Javadoc 注释来为你的 Java 8 游戏引擎添加文档。Javadoc 注释可以被 JDK 中的**javadoc.exe**工具使用，根据你在
    Javadoc 注释中放入的文本内容，为包含 Javadoc 注释的 Java 类生成 HTML 文档。


    Javadoc 注释类似于多行注释，但它使用两个星号来创建 Javadoc 注释的开始分隔符，如下所示：


    ```

    /**  这是一个 Java 文档（Javadoc）类型的 Java 代码注释示例。

         这是一种能够自动生成 Java 文档的注释类型！

    */

    ```


    如果你想在 Java 语句或编程结构的中间插入注释（作为专业 Java 程序员，你绝不应该这样做），请使用多行注释格式，如下所示：


    ```

    import  /* 这行代码导入 Stage 类 */  javafx.stage.Stage;

    ```


    这不会产生任何错误，但会混淆代码的阅读者，因此不要以这种方式注释你的代码。然而，以下使用双斜杠的单行注释方式会在 NetBeans 8.0 中产生编译器错误：


    ```

    import  // 这行代码导入 Stage 类  javafx.stage.Stage

    ```


    在这里，编译器只会看到**import**这个词，因为单行注释会一直持续到行尾，而多行注释则使用块注释分隔符序列（星号和斜杠）明确结束。因此，编译器会对这第二个注释不当的代码抛出错误，本质上是在问：“导入什么？”


    正如 Java 编程语言使用双斜杠和斜杠-星号配对来**界定**Java 代码中的注释一样，其他一些关键字符也被用来界定 Java 编程语句以及整个 Java
    编程逻辑块（我常称之为 Java 代码结构）。


    **分号**在 Java（所有版本）中用于界定或分隔 Java 编程语句，例如图 3-1 中看到的 package 和 import 语句。Java 编译器会查找启动
    Java 语句的 Java 关键字，然后获取该关键字之后直到分号（这是告诉 Java 编译器“我已完成此 Java 语句的编码”的方式）的所有内容，作为 Java
    代码语句的一部分。例如，要在 Java 应用程序顶部声明 Java 包，你需要使用 Java **package**关键字、包名，然后是一个分号，如下所示（另请参见图
    3-1）：


    ```

    package invincibagel;

    ```


    Import 语句也使用分号进行界定，如图所示。import 语句提供 import 关键字、要导入的包和类，最后是分号分隔符，如下面的 Java 编程语句所示：


    ```

    import javafx.application.Application;

    ```


    接下来，你应该看看**花括号 { 大括号**（**{. . .}**）分隔符，它与多行注释分隔符类似，有一个**左花括号**，用于界定（即向编译器指示）一组
    Java 语句的开始，以及一个**右花括号**，用于界定这组 Java 编程语句的结束。花括号允许你在许多 Java 构造中使用多条 Java 编程语句，包括
    Java 类、方法、循环、条件语句、lambda 表达式和接口中，所有这些你将在本书中逐步学习。


    如图 3-2 所示，使用花括号界定的 Java 代码块可以相互嵌套（包含），从而允许构建更复杂的 Java 代码结构。第一个（最外层）使用花括号的代码块是
    InvinciBagel 类，然后其他构造按如下方式嵌套：**start()** 方法、**.setOnAction()** 方法以及**handle()**
    方法。随着本章的推进，你将了解所有这些代码的作用。我现在希望你能（借助图 3-2 中的红色方框）直观地看到，花括号是如何让你的方法（和类）定义它们自己的代码块（结构）的，每个代码块都是更大
    Java 结构的一部分，而最大的 Java 结构就是**InvinciBagel.java**类本身。请注意每个左花括号都有一个匹配的右花括号。同时注意代码的缩进，最内层的
    Java 代码结构缩进得最靠右。每个代码块缩进额外的**四个字符**或空格。如你所见，类没有缩进（0），**start()** 方法缩进 4 个空格，**.setOnAction()**
    方法缩进 8 个空格，**handle()** 方法缩进 12 个空格。NetBeans 8.0 会自动为你缩进每个 Java 代码结构！另外请注意，NetBeans
    8.0 会在 IDE 中绘制非常细的（灰色）缩进参考线，这样如果你愿意，就可以在视觉上对齐你的代码结构。


