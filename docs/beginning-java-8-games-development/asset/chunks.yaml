  trans: '

    另一款值得关注的 3D 渲染软件是**POV-Ray**（持续视觉光线追踪器），它能与任何 3D 建模和动画软件包配合，利用先进的光线追踪渲染算法生成令人惊叹的
    3D 场景。POV-Ray 官网（**[www.povray.org](http://www.povray.org)**）上的最新版本**3.7**兼容**64
    位**和多核（多线程）系统，并且可以免费下载！


    **Bishop3D**是一款专为 POV-Ray 设计的酷炫 3D 建模软件包。该软件可用于创建自定义 3D 对象，然后导入 POV-Ray（再导入 JavaFX）用于游戏开发。最新版本为**1.0.5.2**，安装包大小
    8MB，适用于 Windows 7 系统。该软件可在**[www.bishop3d.com](http://www.bishop3d.com)**找到，目前可免费下载！


    另一款值得探索的免费 3D 建模软件是**Wings 3D**。该软件可用于创建自定义 3D 对象，然后导入 JavaFX 用于游戏开发。最新版本为**1.5.3**，支持**64
    位**系统，安装包大小 16MB，于 2014 年 4 月发布，适用于 Windows 7、Mac OS X 和 Ubuntu Linux 系统。该软件可在**[www.wings3d.com](http://www.wings3d.com)**找到，目前可免费下载！


    对于 UI 设计原型制作，来自**Evolus**的免费软件包**Pencil 2.0.6**，可让你在用 Java、Android 或 HTML5 创建
    UI 设计之前轻松制作原型。该软件位于**[`pencil.evolus.vn`](http://pencil.evolus.vn)**，适用于 Linux、Windows
    和 Mac 操作系统。


    接下来，你将了解我如何在任务栏上组织一些基本的操作系统实用程序和开源软件。


    在任务栏区域组织快速启动图标


    有一些操作系统实用程序，例如计算器、文本编辑器（记事本）和文件管理器（资源管理器），我会在任务栏上为它们创建快速启动图标，因为这些工具在编程和新媒体内容开发工作流程中经常使用。我还会将各种新媒体开发、编程和办公效率应用程序保留为快速启动图标。图
    1-20 展示了其中十几个图标，包括你刚刚安装的所有软件，按安装顺序排列，以及其他一些软件，如 OpenOffice 4.1、DAZ Studio Pro
    4.6 和 Bryce 7.1 Pro。


    ![9781484204160_Fig01-20.jpg](img/9781484204160_Fig01-20.jpg)


    图 1-20。为关键系统实用程序、NetBeans 8.0 和新媒体制作软件创建任务栏快速启动图标


    创建这些快速启动图标有几种方法：你可以将程序从开始菜单拖放到任务栏上，或者右键单击桌面或资源管理器文件管理器中的图标，然后从上下文菜单中选择**将此程序固定到任务栏**。图标放到任务栏后，只需向左或向右拖动即可更改它们的位置。


    恭喜！你刚刚搭建了一个高度优化的新媒体 Java 8 游戏开发工作站，它将使你能够创建你或你的客户能想象到的任何新媒体 Java 8 游戏！


    总结


    在第一章中，我确保你拥有开发出色 Java 8 游戏所需的一切，包括最新版本的 Java 8、JavaFX 和 NetBeans 8.0，以及所有最新的开源新媒体软件。


    你首先下载并安装了最新的 Java JDK 8 和 NetBeans IDE 8.0 软件。然后，你为大量专业级开源新媒体工具也做了同样的操作。


    在下一章中，我将向你展示如何使用 NetBeans 8.0 创建一个 Java 8 项目。


    第 2 章


    ![image](img/frontdot.jpg)


    设置你的 Java 8 IDE：NetBeans 8.0 入门


    让我们从第 2 章开始，首先介绍**NetBeans IDE 8.0**，因为这是你将用来创建 Java 8 游戏的主要软件。尽管 Java JDK 8 是你
    Java 8 游戏以及 NetBeans 8.0 的基础，但我们将从学习 NetBeans 开始，因为它是“前端”，是你查看 Java 游戏项目的窗口。


    NetBeans 8.0 是 Java JDK 8 的**官方 IDE**，因此本书将使用它。这并不是说你不能使用其他 IDE，例如 Eclipse 或 IntelliJ，它们分别是
    Android 4.x（32 位）和 Android 5.x（64 位）的官方 IDE，但我更喜欢使用 NetBeans 8.0 进行我的新媒体应用程序和游戏开发，涉及
    Java 8、JavaFX 8、HTML5、CSS3（层叠样式表 3）和 JavaScript 软件开发标记和编程范式。


    这不仅是因为 NetBeans 8.0 集成了**JavaFX Scene Builder**（你将在本书第 5 章中学习），还因为它也是一个 HTML5
    IDE，而我为客户设计的所有内容都使用 Java 8、JavaFX 8、Android 4.x 或 Android 5.x 以及 HTML5 来创建。我这样做是为了让内容能够在封闭或专有的操作系统和平台上运行。正如你在第
    1 章中看到的，我更喜欢开源软件和平台。


    首先，你将了解 NetBeans 8.0 的新特性。这个版本的 NetBeans 与 Java 8 同时发布，版本号的同步并非巧合。你将发现为什么应该使用
    NetBeans 8.0 而不是较旧的版本，如 NetBeans 7.4 或更早版本。


    接下来，你将研究 NetBeans IDE 8.0 的各种特性，这些特性使其成为 Java 8 游戏开发的宝贵工具。你无法在本章中亲身体验其所有功能，但将在本书的后续内容中探索它能为你做的所有酷炫事情（你需要建立一个高级代码库才能真正发挥某些功能的作用）。


    最后，你将学习如何使用 NetBeans 8.0 创建你的 Java 8 和 JavaFX 项目，以便在阅读本书的过程中逐步创建你将开发的 Java 8 游戏。


    NetBeans 8.0 的主要特性：智能 IDE


    假设你已经拥有一个适合新媒体内容和游戏开发的专业级工作站，那么你需要移除所有过时的 JDK 和 IDE，并确保系统上安装了最新的 V8 Java 和 NetBeans
    软件并准备就绪。如果你是新手，没有适合游戏开发的工作站，可以去沃尔玛或 PriceWatch.com 购买一台价格实惠的多核（使用 4 核、6 核或 8 核）64
    位计算机，运行 Windows 8.1（如果可用，也可以是 9.0），至少配备 4GB、6GB 或 8GB 的 DDR3（1333 或 1600 内存访问速度）系统内存，以及
    750GB 甚至 1TB 的硬盘驱动器。


    NetBeans 8.0 很智能：让你的代码编辑进入超速模式


    虽然 IDE 确实像一个文字处理器，只是更侧重于编写代码文本而不是创建商业文档，但像 NetBeans 这样的编程集成开发环境对你的编程工作流程的帮助远大于文字处理器对你的文档编写工作流程的帮助。


    例如，你的文字处理器不会对你正在编写的商业内容实时提出建议，而 NetBeans IDE 实际上会在你编写代码时查看你正在编码的内容，并帮助你编写代码语句和结构。

    '
- fmt: '# NetBeans 8.0 功能概述


    ## 代码补全与语法高亮


    `NetBeans` 会为你补全代码行，并对代码语句应用颜色，以突出显示不同类型的结构（类、方法、变量、常量、引用等）（更多详情请参见[第3章](#9781484204160_Ch03.xhtml)）。`NetBeans`
    还会应用行业标准的**代码缩进**，使你的代码更易于阅读（无论对你本人还是游戏应用开发团队的其他成员而言）。


    此外，`NetBeans` 会提供**匹配**的代码结构**括号**、**冒号**和**分号**，这样你在创建复杂、深度嵌套或异常密集的编程结构时就不会迷失方向。当你从
    Java 8 游戏初学者成长为 Java 8 游戏开发者时，你将创建此类结构，并且我会在你遇到密集、复杂或深度嵌套的 Java 8 代码时指出它们。


    ## 引导代码与重构工具


    `NetBeans` 还可以提供引导代码，例如你将在本章稍后创建的 JavaFX 游戏应用引导代码（参见“创建你的 Java 8 项目：`InvinciBagel`”一节），以及代码模板（你可以填写和自定义）、编码技巧和代码重构工具。随着你的
    Java 代码变得更加复杂，它也更适合进行代码重构，这可以使代码更易于理解、更易于升级且更高效。`NetBeans` 还可以自动重构你的代码。


    如果你想知道，**代码重构**是指在不改变外部行为（即代码所实现的功能）的前提下，改变现有计算机代码的结构，使其更高效或更具可扩展性。例如，你可以将 Java
    6 或 Java 7 代码通过实现 Lambda 表达式（使用 Java 8）来使其更高效。


    ## 弹出式帮助对话框


    此外，`NetBeans` 提供各种类型的弹出式帮助对话框，包含**方法**、**常量**、资源**引用**（参见[第3章](#9781484204160_Ch03.xhtml)），甚至还有关于如何构建代码语句的**建议**，例如，何时适合使用强大的新
    Java 8 **Lambda 表达式**功能，以使你的代码更精简并支持多线程。


    # NetBeans 8.0 的可扩展性：多语言代码编辑


    你的文字处理器无法做到的另一点是允许你为其添加功能，而 `NetBeans` 可以通过其**插件**架构实现这一点。描述这种架构的术语是**可扩展的**，这意味着如果需要，它可以被扩展以包含额外功能。因此，如果你想要扩展
    `NetBeans 8.0` 以允许使用 Python 编程，你可以做到。`NetBeans 8.0` 同样可以以这种方式支持较老的语言，如 `COBOL`
    和 `BASIC`，尽管如今大多数流行的消费电子设备都使用 `Java`、`XML`、`JavaScript` 和 `HTML5`，我不太确定为什么有人会花时间这样做。不过，我为此进行了
    Google 搜索，确实有人在 `NetBeans 8.0` 中使用 Python 和 COBOL 编码，这证明了该 IDE 确实是可扩展的。


    ## 支持的语言


    可能由于其可扩展性，`NetBeans IDE 8.0` 支持多种流行的编程语言，包括**客户端**的 `C`、`C++`、`Java SE`、`JavaScript`、`XML`、`HTML5`
    和 `CSS`，以及**服务器端**的 `PHP`、`Groovy`、`Java EE` 和 `JavaServer Pages`（`JSP`）。客户端软件运行在最终用户手持或使用的设备上（例如
    iTV）；服务器端软件**远程**运行在服务器上，并通过互联网或类似网络与最终用户通信，而软件则在服务器上运行。客户端软件更高效，因为它**本地**运行在硬件设备上，因此更具**可扩展性**：没有服务器会因同时使用软件的人数增加而出现过载。


    # NetBeans 8.0 的高效性：组织化的项目管理工具


    一个好的编程 IDE 需要能够管理可能变得非常庞大的项目，这些项目可能包含超过一百万行代码，分布在项目文件夹层次结构中的数百个文件夹以及数千个文件和新媒体资源中。因此，任何主流
    IDE 的项目管理功能都必须极其强大。`NetBeans 8.0` 包含大量项目管理功能，允许你以多种不同方式查看你的 Java 8 游戏开发项目及其对应文件及其相互关系。


    ## 四种项目管理视图


    有四种主要的项目管理视图，或称“窗格”，你可以使用它们来查看项目中不同类型的**相互关系**。（我称它们为窗格，因为整个 IDE 位于我所说的窗口中）。我提前（到本章末尾，在你的
    Java 8 游戏项目创建之后）截取了[图 2-1](#9781484204160_Ch02.xhtml#Fig1) 中显示的屏幕截图。此截图显示了在此新项目中打开的四个项目管理窗格，以便你准确了解它们将显示什么。


    ![9781484204160_Fig02-01.jpg](OEBPS/Images/9781484204160_Fig02-01.jpg)


    [图 2-1](#9781484204160_Ch02.xhtml#_Fig1). IDE 左侧的项目管理窗格，包括项目、文件、服务和导航器


    **项目**窗格位于屏幕左侧，显示构成你（游戏）项目的 Java **源包**和**库**。下一个窗格是**文件**窗格，其中包含硬盘驱动器上的**项目文件夹**和**文件层次结构**。**服务**窗格包含数据库、服务器、存储库和构建主机（如果它们在项目中使用）（这些主要是服务器端技术，以及与开发团队一起使用的技术，因此我不会详细讨论它们）。


    项目窗格应始终保持打开状态（如[图 2-7](#9781484204160_Ch02.xhtml#Fig7) 至[2-21](#9781484204160_Ch02.xhtml#Fig21)
    所示）。项目窗格为你提供了访问 Java 8 游戏项目中所有项目源代码和资源（内容）的主要入口点。文件窗格不仅显示项目文件夹和文件层次结构，还显示每个文件内部的数据和
    `FXML` 标记（`JavaFX`）或 Java 8 代码层次结构。


    **导航器**窗格（底部）显示 Java 代码结构内部存在的**关系**。在本例中，这些是 `InvinciBagel` 类、`.start()` 方法和
    `.main()` 方法（更多信息请参见[第3章](#9781484204160_Ch03.xhtml)）。


    # NetBeans 8.0 的用户界面设计友好性：UI 设计工具


    `NetBeans 8.0` 还拥有**设计 GUI** 拖放设计工具，支持多种平台，包括 `Java SE`、`Java EE`、`Java ME`、`JavaFX`
    和 `Java Swing`，以及 `C`、`C++`、`PHP`、`HTML5` 和 `CSS3`。`NetBeans` 提供可视化编辑器，为你编写应用程序的
    **UI** 代码，因此你只需让屏幕上的视觉效果看起来像你希望它在游戏应用程序中的样子即可。由于游戏使用 `JavaFX` 新媒体（游戏）引擎，你将在本书的[第5章](#9781484204160_Ch05.xhtml)中学习**JavaFX
    Scene Builder**，这是一个基于 `FXML` 的高级可视化设计编辑器。


    `JavaFX` 拥有 `Prism` 游戏引擎以及 3D（使用 `OpenGL ES` [**OpenGL for** Embedded Systems]）支持，因此我将重点关注
    `JavaFX` 场景图和 `JavaFX` API。这里的假设是，你希望构建尽可能先进的 Java 8 游戏，而利用 `JavaFX` 引擎（现在已成为
    Java 8 的一部分，与 Lambda 表达式一起）将是实现这一目标的方法。开发游戏最快的方法是利用 Java 8 和 `JavaFX` 环境慷慨提供给你的高级代码和编程结构，用于创建包含强大新媒体元素的尖端应用程序（在本例中为游戏）。'
  raw: 'One of the things that NetBeans will do is finish lines of code for you as
    well as apply color to the code statements to highlight different types of constructs
    (classes, methods, variables, constants, references, and the like) (for more details,
    see [Chapter 3](#9781484204160_Ch03.xhtml)). NetBeans will also apply the industry
    standard for **code indenting** to make your code much easier to read (for both
    yourself and the other members of your game application development team).


    In addition, NetBeans will provide **matching** code structure **brackets**, **colons**,
    and **semicolons** so that you do not get lost when you are creating complex,
    deeply nested, or exceptionally dense programming constructs. You will be creating
    constructs such as these as I take you from Java 8 game beginner to Java 8 game
    developer, and I will point out Java 8 code that is dense, complex, or deeply
    nested as you encounter it.


    NetBeans can also provide bootstrap code, such as the JavaFX game application
    bootstrap code that you will be creating a bit later in this chapter (see the
    section “Creating Your Java 8 Project: The InvinciBagel”), as well as code templates
    (which you can fill out and customize), coding tips and tricks, and code refactoring
    tools. As your Java code becomes more complex, it also becomes a better candidate
    for code refactoring, which can make the code easier to understand, easier to
    upgrade, and more efficient. NetBeans can also refactor your code automatically.


    In case you are wondering, **code refactoring** is changing the structure of existing
    computer code to make it more efficient or scalable without changing its external
    behavior, that is, what it accomplishes. For instance, you could take Java 6 or
    Java 7 code and make it more efficient by implementing Lambda Expressions, using
    Java 8.


    Furthermore, NetBeans offers pop-up helper dialogs of various types, containing
    **methods**, **constants**, asset **references** (see [Chapter 3](#9781484204160_Ch03.xhtml)),
    and even **suggestions** regarding how to construct the code statement, for example,
    when it might be appropriate to use the powerful new Java 8 **Lambda Expressions**
    feature to make your code more streamlined and multithread compatible.


    NetBeans 8.0 Is Extensible: Code Editing with Many Languages


    Another thing that your word processor cannot do is allow you to add features
    to it, which NetBeans can do using its **plug-in** architecture. The term that
    describes this type of architecture is **extensible**, which means that if needed,
    it can be extended to include additional features. So, if you wanted to extend
    NetBeans 8.0 to allow you to program using Python, for instance, you could. NetBeans
    8.0 can also support older languages, such as COBOL and BASIC, in this fashion
    as well, although with the majority of popular consumer electronics devices using
    Java, XML, JavaScript, and HTML5 these days, I am not really sure why anyone would
    want to take the time do this. I did a Google search for this, however, and there
    are people coding in Python and COBOL in NetBeans 8.0, so there is real-world
    proof that the IDE is indeed extensible.


    Probably because of its extensibility, NetBeans IDE 8.0 supports a number of popular
    programming languages, including **C**, **C++**, **Java SE**, **JavaScript**,
    **XML**, **HTML5**, and **CSS** on the **client side** and **PHP**, **Groovy**,
    **Java EE**, and **JavaServer Pages** (**JSP**) on the **server side**. Client-side
    software is run on the device that the end user is holding or using (in the case
    of an iTV); server-side software runs **remotely,** on a server, and talks to
    the end user over the Internet or a similar network while the software is running
    on the server. Client-side software is more efficient, as it is **local** to the
    hardware device that it is running on and thus is more **scalable**: no server
    is involved to experience overload as more and more people use the software at
    any given point in time.


    NetBeans 8.0 Is Efficient: Organized Project Management Tools


    A good programming IDE needs to be able to manage projects that can grow to become
    quite massive, involving more than a million lines of code contained in hundreds
    of folders in the project folder hierarchy and thousands of files and new media
    assets. For this reason, project management features must be extremely robust
    in any mainstream IDE. NetBeans 8.0 contains a plethora of project management
    features that allow you to look at your Java 8 game development project, and its
    corresponding files and their interrelationships, in a number of different ways.


    There are four primary project management views, or “panes” that you can use to
    see the different types of **interrelationships** in your project. (I call them
    panes, as the entire IDE is in what I call a window). I jumped ahead (to the end
    of the chapter, once your Java 8 game project has been created) and created the
    screenshot presented in [Figure 2-1](#9781484204160_Ch02.xhtml#Fig1). This screenshot
    displays the four project management panes opened in this new project so that
    you can see exactly what they will show you.


    ![9781484204160_Fig02-01.jpg](OEBPS/Images/9781484204160_Fig02-01.jpg)


    [Figure 2-1](#9781484204160_Ch02.xhtml#_Fig1). Project management panes, at the
    left of the IDE, include Projects, Files, Services, and Navigator


    The **Projects** pane, at the left of the screen, shows the Java **Source Packages**
    and **Libraries** that make up your (game) project. The next pane over is the
    **Files** pane, which has the **project folder** and **file hierarchy** on your
    hard disk drive. The **Services** pane contains the databases, servers, repositories,
    and build hosts, if they are used in the project (these are primarily server-side
    technologies, and technologies used with a development team, so I am not going
    to go into these in detail).


    The Projects pane should always be left open (as you will see in [Figures 2-7](#9781484204160_Ch02.xhtml#Fig7)
    through [2-21](#9781484204160_Ch02.xhtml#Fig21)). The Projects pane provides you
    with a primary access point for all the project source code and assets (content)
    in your Java 8 game project. The Files pane shows not only the project folder
    and file hierarchy, but also the data and FXML markup (JavaFX) or Java 8 code
    hierarchy inside each file.


    The **Navigator** pane (bottom) shows the **relationships** that exist inside
    your Java code structures. In this case, these are the InvinciBagel class, the
    .start() method, and the .main() method (for further information, see [Chapter
    3](#9781484204160_Ch03.xhtml)).


    NetBeans 8.0 Is User Interface Design Friendly: UI Design Tools


    NetBeans 8.0 also has **Design a GUI** drag-and-drop design tools for a plethora
    of platforms, including Java SE, Java EE, Java ME, JavaFX, and Java Swing as well
    as C, C++, PHP, HTML5, and CSS3. NetBeans provides visual editors that write the
    application’s **UI** code for you, so all you have to do is make the visual on
    the screen look like what you want it to look like in your game application. Because
    games use the JavaFX new media (game) engine, you will be learning about the **JavaFX
    Scene Builder**, an advanced FXML-based visual design editor, in [Chapter 5](#9781484204160_Ch05.xhtml)
    of this book.


    JavaFX has the Prism game engine as well as 3D (using OpenGL ES [**OpenGL for**
    Embedded Systems]) support, so I will be focusing quite a bit on the JavaFX Scene
    Graph and JavaFX APIs. The assumption here is that you will want to build the
    most advanced Java 8 games possible, and leveraging the JavaFX engine, which is
    now a part of Java 8 (along with Lambda Expressions), is going to be the way to
    accomplish this. The fastest way to develop a game is to leverage advanced code
    and programming constructs that the Java 8 and JavaFX environments generously
    give you for your use in creating cutting-edge applications (in this case, games)
    that contain powerful new media elements.'
