    如果你想知道 SVGdata 字符串对象 `"M150 0 L75 200 L225 200 Z"` 的作用，它是以下线条绘制指令（命令）的简写。`M` 是“绝对移动”命令，告诉线条绘制（或本例中的路径绘制）操作从位置
    150,0 开始。`L` 是“绘制线条到”命令，告诉 SVG 数据从 150,0 到 75,200 绘制一条线。第二个 `L` 从 75,200 到 225,200
    绘制一条线，形成三角形的两条边。`Z` 是“闭合形状”命令，如果形状是开放的（就像我们当前这样），它将绘制一条线来闭合形状。在这种情况下，这相当于从 225,200
    到 150,0 绘制一条线，形成三角形的三条边，闭合开放路径，并为我们提供一个有效的碰撞检测边界。


    我们将在后面的第 16 章中将其替换为更复杂的碰撞形状，该章节涵盖碰撞检测多边形创建、SVG 数据和碰撞检测逻辑。我们实际的碰撞多边形将包含更多数字，使得我们的
    Bagel() 构造方法调用变得笨拙。正如你可能想象的那样，在游戏的该阶段（无意双关），我可能会创建一个专门用于构建碰撞形状的工作流程。该工作流程将向你展示如何使用
    GIMP 生成 SVG 多边形数据，以便你可以将 SVG 数据放入自己的 String 对象中，并在 Actor 对象构造方法中引用它。如果你也想将碰撞数据创建变成自己的方法，那么使用一个（理论上的）`.createActorCollisionData()`
    方法，看起来会是这样：


    ```

    String cBagel; // 在类顶部创建名为 cBagel（碰撞数据 Bagel）的 String 变量


    private void createActorCollisionData() {

        cBagel = "M150 0 L75 500 L225 200 Z";

    }

    private void createGameActors() {

        iBagel = new Bagel(cBagel, 0, 0, iB0,iB1,iB2,iB3,iB4,iB5,iB6,iB7,iB8);

    }

    ```


    你也可以稍后创建一个用于 Image 精灵 List<Actor> 对象加载的方法。这将传递 ArrayList 作为参数，而不是逗号分隔的 List。请注意，如果你这样做，还需要更改你的
    Actor 抽象类构造方法，使其接收 ArrayList<Actor> 对象，而不是 Image... 的 Image 对象列表。


    接下来，让我们看看如何将我们新创建的 iBagel 对象添加到游戏的场景图对象中，该对象当前是一个名为 root 的 Stackpane 对象。


    将你的 iBagel 添加到场景图：.addGameActorNodes()

    '
- fmt: 'JavaFX 应用程序开发者经常忘记的一个步骤是，将需要在场景（以及场景对象所附加的舞台）中显示的对象添加到场景图的根对象中。在我们的例子中，这是一个名为`root`的`StackPane`对象。我们需要使用与[第6章](#9781484204160_Ch06.xhtml)中开始开发启动画面时相同的`root.getChildren().add()`方法调用链，将我们的`iBagel`对象`ImageView`（通过`iBagel.spriteFrame`引用）添加到场景图根对象中。我将在这一阶段添加一个方法，以确保我们在工作流程中永远不会忘记这个重要的“添加到场景图”步骤。我将专门在Actor创建工作流程中处理这一阶段，将其封装成一个独立的方法，并命名为`.addGameActorNodes()`。该方法体的创建以及我们第一个“将Actor添加到场景图”的编程语句，将通过以下Java代码完成，该代码也显示在[图11-7](#9781484204160_Ch11.xhtml#Fig7)中（已高亮）：


    ```

    private void addGameActorNodes() {

        root.getChildren().add(iBagel.spriteFrame);

    }

    ```


    ![9781484204160_Fig11-07.jpg](OEBPS/Images/9781484204160_Fig11-07.jpg)


    [图11-7](#9781484204160_Ch11.xhtml#_Fig7). 创建一个`private void addGameActorNodes()`方法；将`iBagel.spriteFrame`的`ImageView`通过`.add()`添加到`root`对象


    需要注意的是，我在`InvinciBagel`类的顶部，在`.start()`方法内部，调用`.addNodesToStackPane()`方法之前，调用了这个`.addGameActorNodes()`方法。这样做有一个很好的理由，这要追溯到你在[第4章](#9781484204160_Ch04.xhtml)中学到的关于JavaFX的知识。请记住，你添加到`StackPane`层管理对象中的对象是按照**Z轴索引**（或**Z轴顺序**）显示的，这意味着它们是相互“**堆叠**”的。如果这些层中的任何一层没有**Alpha通道**（我们在[第5章](#9781484204160_Ch05.xhtml)中学过），那么它们后面的任何东西都无法显示出来！因此，让我们的启动画面在玩家点击“INSTRUCTIONS”按钮控件对象时随时覆盖游戏的最简单方法，就是最后添加这些资源。


    通过让`.addNodesToStackPane()`方法在`.addGameActorNodes()`方法**之后**被调用，你将确保游戏资源始终处于比启动画面资源**更低的Z轴索引**。这意味着`SplashScreenBackplate`和`SplashScreenTextArea`的`ImageView`“面板”将始终位于`StackPane`中的**顶层Z轴索引层**，因此，当这些面板显示（变为可见）时，它们将完全覆盖你的游戏画面。这是因为`SplashScreenBackplate`的`ImageView`包含一个不透明的PNG24图像资源，其大小与你的场景（和舞台）对象相同。


    稍后，当我们测试新的`InvinciBagel`游戏应用程序时，我们将看到这种方法顺序重组的结果，你会看到我们已经解决了游戏角色显示在启动画面之上的问题。我们仅仅通过改变编程代码的执行顺序就实现了这一点。这也应该向你指出，Java编程代码的执行顺序几乎与Java编程逻辑本身一样重要！


    ## 创建和管理你的演员表：`.createCastingDirection()`


    现在，是时候实现我们在[第10章](#9781484204160_Ch10.xhtml)中创建的另一个类——`CastingDirector.java`类及其`CastingDirector()`构造方法了。我们将在另一个名为`.createCastingDirection()`的新自定义方法中完成此操作。该方法将包含一个名为`castDirector`的`CastingDirector`对象的初始实例化，我们将使用Java的`new`关键字和`CastingDirector()`构造方法来创建它，并使用我们在[第10章](#9781484204160_Ch10.xhtml)中创建的`.addCurrentCast()`方法将`iBagel`的`Actor`对象添加到`castDirector`对象中。该Java方法结构（在[图11-8](#9781484204160_Ch11.xhtml#Fig8)中显示无错误）应如下所示：


    ```

    private void createCastingDirection() {

        castDirector = new CastingDirector();

        castDirector.addCurrentCast(iBagel);

    }

    ```


    ![9781484204160_Fig11-08.jpg](OEBPS/Images/9781484204160_Fig11-08.jpg)


    [图11-8](#9781484204160_Ch11.xhtml#_Fig8). 创建`private void createCastingDirection()`方法，包含`castDirector`和`.addCurrentCast()`语句


    现在我们已经将图像资源放置到位，创建了`Actor`对象，将其添加到场景图，创建了`CastingDirector`引擎，并将我们的`iBagel`添加到演员表中，我们准备处理游戏计时引擎。


    ## 创建并启动你的游戏循环：`.createStartGameLoop()`


    我将跳过`.createSceneGraphNodes()`方法（它仍然是我们最复杂的方法体，我打算最后再讲），创建一个名为`.createStartGameLoop()`的新方法。在这个方法内部，我们将创建并启动我们的`GamePlayLoop`对象，该对象是我们早在[第7章](#9781484204160_Ch07.xhtml)中使用`GamePlayLoop.java`类创建的。这个类扩展了JavaFX的`AnimationTimer`超类，以便为我们的游戏提供对JavaFX脉冲计时引擎的访问。在`.createStartGameLoop()`方法内部，我们将使用Java的`new`关键字，通过`GamePlayLoop()`构造方法为我们的游戏创建一个名为`gamePlayLoop`的脉冲引擎。之后，我们将调用这个`gamePlayLoop`对象的`.start()`方法来启动脉冲事件计时引擎。这个调用通过以下四行Java编程逻辑完成，这些逻辑在[图11-9](#9781484204160_Ch11.xhtml#Fig9)中也显示为无错误：


    ```

    private void createStartGameLoop() {

        gamePlayLoop = new GamePlayLoop();

        gamePlayLoop.start();

    }

    ```


    ![9781484204160_Fig11-09.jpg](OEBPS/Images/9781484204160_Fig11-09.jpg)


    [图11-9](#9781484204160_Ch11.xhtml#_Fig9). 创建一个`private void createStartGameLoop()`方法，并创建和`.start()`
    `gamePlayLoop`对象


    正如你在[图11-9](#9781484204160_Ch11.xhtml#Fig9)底部看到的，我已经折叠了其他方法结构，并且为了组织清晰，它们在代码中的顺序与在`.start()`方法中被调用的顺序相同。我最后才启动游戏循环，是因为我想确保在启动JavaFX脉冲引擎并启动游戏之前，我已经完成了设置游戏环境所需的所有其他工作。正如你所见，我使用Java方法名称和我的游戏代码设计，来提醒自己每次添加新的游戏角色时需要做什么——既然我们的主角已经就位，接下来可能是游戏道具、弹丸、敌人、宝藏等等。


    ## 更新启动画面场景图：`.createSplashScreenNodes()`'
  raw: 'One of the steps that JavaFX application developers often forget is to add
    their objects that will need to be displayed in the Scene (and on the Stage that
    the Scene object is attached to) to the root object of the Scene Graph. In our
    case, this is a **StackPane** object named **root**. We will need to use the same
    **root.getChildren().add()** method call chain that we did in [Chapter 6](#9781484204160_Ch06.xhtml),
    when we started developing our Splashscreen, to add our iBagel object ImageView,
    which is referenced using **iBagel.spriteFrame**, to the Scene Graph root object.
    I am going to add a method at this stage that will ensure that we never forget
    this important **add to Scene Graph** step in our work process. I am going to
    specifically address this stage in the Actor creation work process by making it
    into its own method, which I am going to call **.addGameActorNodes()**. The creation
    of this method body, and our first add Actor to Scene Graph programming statement,
    would be accomplished using the following Java code, which is also shown (highlighted)
    in [Figure 11-7](#9781484204160_Ch11.xhtml#Fig7):


    ```

    private void addGameActorNodes() {

        root.getChildren().add(iBagel.spriteFrame);

    }

    ```


    ![9781484204160_Fig11-07.jpg](OEBPS/Images/9781484204160_Fig11-07.jpg)


    [Figure 11-7](#9781484204160_Ch11.xhtml#_Fig7). Create a private void addGameActorNodes()
    method; .add() iBagel.spriteFrame ImageView to root object


    It is important to note that I am calling this .addGameActorNodes() method, at
    the top of the InvinciBagel class, inside of the .start() method, before I call
    the .addNodesToStackPane() method. There is a very good reason for doing this,
    and it goes back to what you learned about JavaFX in [Chapter 4](#9781484204160_Ch04.xhtml).
    Remember the objects that you add to the StackPane layer management object are
    displayed using a **Z-index** (or **Z-order**), which means that they are “**stacked**”
    on top of each other. If any of these layers do not have an **alpha channel**,
    which we learned about in [Chapter 5](#9781484204160_Ch05.xhtml), then nothing
    behind them will be able to show through! For this reason, the easiest way to
    get our Splashscreen to overlay our game at any point in time that a player clicks
    the INSTRUCTIONS Button control object is to add these assets last.


    By having your .addNodesToStackPane() method called **after** your .addGameActorNodes()
    method, you will guarantee that your game assets will always be at a **lower Z-index**
    than your Splashscreen assets. This means that the **SplashScreenBackplate** and
    the **SplashScreenTextArea** ImageView “plates” will always be at the **top Z-index
    layers** in the StackPane, and thus, when these are displayed (made visible),
    they will completely cover your game play. This is because the SplashScreenBackplate
    ImageView contains an opaque PNG24 image asset that is the same size as your Scene
    (and Stage) object.


    We will be seeing the result of this method order reorganization later on when
    we test the new InvinciBagel game application, and you will see that we have resolved
    this problem of the game actor(s) displaying on top of the Splashscreen. We accomplished
    this simply by changing the order that your programming code is executed in. This
    should also point out to you that the order that the Java programming code is
    executed in is almost as important as the Java programming logic itself!


    Creating and Managing Your Cast: .createCastingDirection()


    Now the time has come to implement the other class that we created in [Chapter
    10](#9781484204160_Ch10.xhtml), the CastingDirector.java class, and its CastingDirector()
    constructor method. We will do this inside of another new custom method we will
    create called **.createCastingDirection()**. This method will contain the initial
    instantiation of a CastingDirector object named castDirector, which we will create
    by using the Java **new** keyword and the CastingDirector() constructor method,
    as well as adding the iBagel Actor object to the castDirector object, using the
    **.addCurrentCast()** method that we created in [Chapter 10](#9781484204160_Ch10.xhtml).
    The Java method structure, which is shown error-free in [Figure 11-8](#9781484204160_Ch11.xhtml#Fig8),
    should look like the following:


    ```

    private void createCastingDirection() {

        castDirector = new CastingDirector();

        castDirector.addCurrentCast(iBagel);

    }

    ```


    ![9781484204160_Fig11-08.jpg](OEBPS/Images/9781484204160_Fig11-08.jpg)


    [Figure 11-8](#9781484204160_Ch11.xhtml#_Fig8). Create private void createCastingDirection()
    method with castDirector and .addCurrentCast() statements


    Now that we have put our Image assets into place, created our Actor object, added
    him to the Scene Graph, created a CastingDirector engine, and added our iBagel
    to the cast, we’re ready to deal with the Game Timing Engine.


    Create and Start Your GamePlayLoop: .createStartGameLoop


    I am going to jump ahead of the .createSceneGraphNodes() method, which is still
    our most complex method body and which I am saving for last, and create a new
    method called .createStartGameLoop(). Inside of this method we’re going to create,
    and then start, our GamePlayLoop object, which we created back in [Chapter 7](#9781484204160_Ch07.xhtml)
    using the GamePlayLoop.java class. This class extends the JavaFX AnimationTimer
    superclass to provide access to the JavaFX pulse timing engine for our game. Inside
    of the .createStartGameLoop() method we are going to use the Java new keyword
    to create a pulse engine for our game named gamePlayLoop using the GamePlayLoop()
    constructor method. After that, we are going to call the .start() method off of
    this gamePlayLoop object to start the pulse event timing engine. This call is
    done by using the following four lines of Java programming logic, which are also
    shown error-free in [Figure 11-9](#9781484204160_Ch11.xhtml#Fig9):


    ```

    private void createStartGameLoop() {

        gamePlayLoop = new GamePlayLoop();

        gamePlayLoop.start();

    }

    ```


    ![9781484204160_Fig11-09.jpg](OEBPS/Images/9781484204160_Fig11-09.jpg)


    [Figure 11-9](#9781484204160_Ch11.xhtml#_Fig9). Create a private void createStartGameLoop()
    method, and create and .start() the gamePlayLoop object


    As you can see at the bottom of [Figure 11-9](#9781484204160_Ch11.xhtml#Fig9),
    I have collapsed the other method structures, and I have them in the same order
    in the code that they are called within the .start() method, for organization
    purposes. I start a game play loop last because I want to make sure I have done
    absolutely everything else that I need to do to set up the game environment first,
    before I start the JavaFX pulse engine firing and launch the game. As you can
    see, I’m using the Java method names, and my game code design, to keep me reminded
    about what I need to do every time that I add some new game actor, which now that
    our hero is in place, could be game props, projectiles, enemies, treasure, and
    so on.


    Update Splashscreen Scene Graph: .createSplashScreenNodes()'
