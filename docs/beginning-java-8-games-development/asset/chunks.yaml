    \ will be utilized to do all the heavy lifting for the game programming logic.\
    \ As you can see in [Figure 8-11](#9781484204160_Ch08.xhtml#Fig11), motion sprites\
    \ (`Hero` subclasses) will also need to have a collision detection method, which\
    \ I will call `.collide()`, as that is a shorter name, and that, at least for\
    \ now, will remain **unimplemented** except for returning a boolean `false` (no\
    \ collision here, Boss!) boolean data value. Your Java code for the `.collide()`\
    \ method structure will take an `Actor` object as its parameter, since that is\
    \ what your `Hero` object will be colliding with, and should look like the following:\n\
    \n```\npublic boolean collide(Actor object) {\n    return false;\n}\n```\n\n![9781484204160_Fig08-11.jpg](OEBPS/Images/9781484204160_Fig08-11.jpg)\n\
    \n[Figure 8-11](#9781484204160_Ch08.xhtml#_Fig11). Add the `@Override public abstract\
    \ void .update()` and `public boolean .collide(Actor object)` methods\n\nNext,\
    \ let’s add another eleven variables into this `Hero` class. These will hold data\
    \ values that apply to motion sprites, which have to deal with colliding with\
    \ things, and obey the laws of physics. We will also need things such as a `lifespan`\
