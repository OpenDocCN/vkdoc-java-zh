    be accessed in your code using “mouse-over.”


    ![9781484204160_Fig02-20.jpg](OEBPS/Images/9781484204160_Fig02-20.jpg)


    [Figure 2-20](#9781484204160_Ch02.xhtml#_Fig20). Use the Window ![image](OEBPS/Images/arrow.jpg)
    Profiling menu sequence to access the visual profiling tabs


    Check out some of the other visual report tabs in the **Window ![image](OEBPS/Images/arrow.jpg)
    Profiling** menu sequence. Presented in [Figure 2-21](#9781484204160_Ch02.xhtml#Fig21)
    are the **Threads** tab, showing all **11** threads (see the Basic Telemetry pane,
    at the left of the screen), including what each thread is doing (what code the
    thread is running), and the **VM Telemetry** tab, which displays virtual memory
