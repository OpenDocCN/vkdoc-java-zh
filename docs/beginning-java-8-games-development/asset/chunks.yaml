    ![9781484204160_Fig01-13.jpg](img/9781484204160_Fig01-13.jpg)


    图 1-13. 选中“检查更新”复选框，然后点击“安装”按钮（左）和“完成”按钮（右）


    在安装过程中，您将看到**安装**对话框及其进度条，如图 1-14 所示，它会精确显示安装完成的百分比，以及当前正在从工作站上提取和安装的 IDE 文件。


    ![9781484204160_Fig01-14.jpg](img/9781484204160_Fig01-14.jpg)


    图 1-14. 安装进度对话框，显示安装完成的百分比


    当安装过程完成后，您将看到**安装完成**对话框，如图 1-13（右）所示。现在，您已准备好在其工作站上开发 Java 8 和 JavaFX 应用程序（游戏）。


    接下来，让我们下载五个最流行的免费开源新媒体内容开发软件包，这样您就拥有了 Java 8 游戏开发业务所需的所有工具！


    之后，您将了解一些我在工作站上使用的其他令人印象深刻的开源软件。这样，如果您愿意，甚至可以在读完本章之前就组装出终极软件开发工作站，仅需花费硬件（和操作系统）的成本，就能创建一个极具价值的内容生产工作站！


    安装新媒体内容制作软件


    JavaFX 支持多种“类型”的新媒体元素或资产（我这样称呼它们），JavaFX 是 Java 8（和 Java 7）中的新媒体引擎，因此您将以此作为 Java
    8 游戏开发的基础。在本章剩余部分，您将安装领先的开源软件，这些软件涵盖的新媒体主要类型包括：数字插画、数字图像、数字音频、数字视频和 3D。


    下载并安装 Inkscape


    由于 JavaFX 支持 2D 或**矢量**技术，该技术常用于**数字插画**软件包（如 Adobe Illustrator 和 FreeHand），因此您将下载并安装名为
    **Inkscape** 的流行开源数字插画软件包。


    与本章中您将安装的所有软件包一样，Inkscape 适用于 Linux、Windows 和 Mac 操作系统，因此您可以使用任何喜欢的平台来开发游戏！


    要在互联网上找到 Inkscape 软件包，请打开谷歌搜索，输入 **Inkscape**，如图 1-15 左上角所示。点击**下载**链接（或右键单击，在新标签页中打开），然后点击代表您所用操作系统的图标。企鹅代表
    Linux（最左侧图标），窗口代表 Windows（中间图标），风格化的苹果代表 Mac（最右侧图标）。


    ![9781484204160_Fig01-15.jpg](img/9781484204160_Fig01-15.jpg)


    图 1-15. 在谷歌中搜索“InkScape”，进入 Inkscape 下载页面，然后点击与您的操作系统匹配的图标


    如果您想使用 64 位 Windows 版本的 Inkscape，请向下滚动，查看这三个图标下方的文本链接，以访问该特定操作系统的下载。下载软件后，右键单击并选择“以管理员身份运行”，然后在您的工作站上安装该软件。如果您之前安装过
    Inkscape，安装程序会将其升级到最新版本；您无需使用本章前面用于卸载 SDK 和 IDE 的“程序和功能”工具，因为新媒体制作软件包通常可以升级旧版本，而
    SDK 和 IDE 则不能。


    软件安装完成后，在任务栏上创建一个快速启动图标，这样您只需单击鼠标即可启动 Inkscape。接下来，您将安装一个流行的数字图像软件包，名为 **GIMP**，它允许您为游戏创建“光栅”或基于像素（位图）的艺术作品，格式为
    JavaFX 支持的 JPEG、PNG 或 GIF 数字图像文件格式。光栅图像与矢量或形状插画不同，因此您需要 GIMP。


    下载并安装 GIMP


    JavaFX 还支持使用**光栅**图像技术的 2D 图像，该技术将图像表示为像素阵列，常用于数字图像合成软件包，如 Adobe Photoshop 和 Corel
    Painter。在本节中，您将下载并安装名为 GIMP 的流行开源数字图像编辑和合成软件包。该软件适用于 Linux、Windows、Solaris、FreeBSD
    和 Mac 操作系统。


    要在互联网上找到 GIMP 软件，请打开谷歌搜索，输入 **GIMP**，如图 1-16 所示。


    ![9781484204160_Fig01-16.jpg](img/9781484204160_Fig01-16.jpg)


    图 1-16. 在谷歌中搜索“GIMP”，进入 GIMP 下载页面，然后点击“Download GIMP”链接


    点击**下载**链接（或右键单击，在新标签页中打开），然后点击**下载 GIMP 2.8.14**（或代表您所用操作系统的最新版本）。**下载**页面会自动检测您使用的操作系统，并为您提供正确的操作系统版本；在我的情况下，它是
    Windows。下载并安装最新版本的 GIMP，然后像为 Inkscape 所做的那样，在工作站任务栏上创建一个快速启动图标。接下来，您将安装一个强大的数字音频编辑和音效软件包，名为
    **Audacity**。


    下载并安装 Audacity


    JavaFX 支持数字音频序列，该技术使用数字音频技术。数字音频通过采集数字音频**样本**来表示模拟音频。数字音频内容通常使用数字音频合成和音序器软件包（如
    Propellerhead Reason 和 Cakewalk Sonar）创建。在本节中，您将下载并安装名为 **Audacity** 的流行开源数字音频编辑和优化软件包。Audacity
    适用于 Linux、Windows 和 Mac 操作系统，因此您可以使用任何喜欢的操作系统平台来为基于 Java 8 和 JavaFX 的游戏创建和优化数字音频。


    要在互联网上找到 Audacity 软件包，请使用谷歌搜索引擎，输入 **Audacity**，如图 1-17 左上角所示。点击**下载**链接（或右键单击，在新标签页中打开），然后点击
    **Audacity for Windows**（或代表您所用操作系统的版本）。


    ![9781484204160_Fig01-17.jpg](img/9781484204160_Fig01-17.jpg)


    图 1-17. 在谷歌中搜索“Audacity”，进入 Audacity 下载页面，然后点击与您的操作系统匹配的链接


    下载并安装最新版本的 Audacity（目前是 2.0.6），然后像为 Inkscape 和 GIMP 所做的那样，在工作站任务栏上创建一个快速启动图标。接下来，您将安装一个强大的数字视频编辑和特效软件包，名为
    **EditShare Lightworks**。


    下载并安装 EditShare Lightworks


    JavaFX 还支持数字视频，该技术使用**光栅**基于像素的运动视频技术。光栅将视频表示为一系列**帧**，每一帧都包含一个基于像素阵列的数字图像。数字视频资产通常使用数字视频编辑和特效软件包（如
    Adobe After Effects 和 Sony Vegas）创建。在本节中，您将下载并安装名为 **Lightworks** 的开源数字视频编辑软件。

    '
- fmt: 'EditShare’s Lightworks used to be a paid software package until it was made
    open source. You will have to `register` on the Lightworks web site to download
    and use the software. This package is available for Linux, Windows, and Mac OSs.
    To find Lightworks on the Internet, go to Google Search, and type in `Lightworks`,
    as shown in [Figure 1-18](#9781484204160_Ch01.xhtml#Fig18), at the top left. Click
    the `Download` link (or right-click, and open in a separate tab), and click the
    appropriate `Download` button and the tab that represents the OS that you are
    using. The `Downloads` page will automatically detect the OS that you are using
    and select the correct OS tab; in my case, Windows.


    ![9781484204160_Fig01-18.jpg](OEBPS/Images/9781484204160_Fig01-18.jpg)


    [Figure 1-18](#9781484204160_Ch01.xhtml#_Fig18). Google the term “Lightworks,”
    go to the Lightworks Downloads page, and click the tab that matches your OS


    Register on the Lightworks web site, if you have not done so already. Once you
    are approved, you can then download and install the latest version of Lightworks.
    Install the software, and create a Quick Launch icon for your taskbar, as you
    did for the other software. Next, you will install a 3D modeling and animation
    package, called `Blender`.


    ## Downloading and Installing Blender


    JavaFX has recently moved to support 3D new media assets that are created outside
    the JavaFX environment, which means that you will be able to create 3D models,
    textures, and animation, using third-party software packages, such as Autodesk
    3D Studio Max or Maya and NewTek Lightwave 3D. In this section, you will download
    and install the popular open-source 3D modeling and animation software package
    known as Blender. Blender is available for the Linux, Windows, and Mac OSs, so
    you can use any OS platform that you like to create and optimize 3D models, 3D
    texture mapping, and 3D animation for use in your Java 8 and JavaFX games.


    To find the Blender software on the Internet, using the Google search engine,
    type in `Blender`, as shown in [Figure 1-19](#9781484204160_Ch01.xhtml#Fig19).
    Click the correct download link to download and install Blender, and then create
    the Quick Launch icon.


    ![9781484204160_Fig01-19.jpg](OEBPS/Images/9781484204160_Fig01-19.jpg)


    [Figure 1-19](#9781484204160_Ch01.xhtml#_Fig19). Google the term “Blender,” go
    to the Blender Download page, and click the tab for your OS


    ## Other Open-Source Software Packages of Interest


    There are a number of other professional-level open-source software packages that
    I use in my new media content production business that I thought I would let you
    know about, in case you had not heard about them. These will add even more power
    and versatility to the new media production workstation that you have built up
    to this point. It is important to note that you have already saved yourself thousands
    of dollars that would have otherwise been spent on similar paid content production
    software packages in the process of doing all this extensive downloading and installing.
    I guess you could say my motto is, “Do it right the first time, and be sure to
    go all the way,” so let me tell you about some of the other free, and even some
    of the more affordable, new media content production software packages that I
    have installed on my own content production workstations.


    One of the best values in open-source software, aside from the EditShare Lightworks
    package, which used to cost six figures back in the day, is a `business productivity
    software suite` that was made open source by `Oracle` after it acquired Sun Microsystems.
    Oracle transferred its OpenOffice software suite over to the popular Apache open-source
    project. `OpenOffice 4.1` is an entire office productivity software suite that
    contains `six` full-fledged business productivity software packages! Because your
    content production agency is actually a full-fledged business concern, you should
    probably know about this software, as it is an exceptionally solid open-source
    software offering. You can find it at `[www.openoffice.org](http://www.openoffice.org)`;
    this popular business software package has been downloaded by savvy professionals
    such as yourself more than a hundred million times, so it’s no joke, as they say!


    A great complement to the Audacity digital audio editing software is `Rosegarden`
    MIDI sequencing and music composition and scoring software, which can be used
    for music composition and printing out the resulting scores for music publishing.
    Rosegarden, currently in version 14.02, and being ported from Linux to Windows,
    can be found via Google Search or at `[www.rosegardenmusic.com](http://www.rosegardenmusic.com)`.


    Another impressive audio, MIDI, and sound design software package is `Qtractor`.
    If you are running the Linux OS, be sure to download and install this professional-level
    digital audio synthesis software package by doing a Google search or going to
    `[https://Qtractor.SourceForge.net](https://Qtractor.SourceForge.net)`.


    For 3D character modeling and animation, be sure to check out the 3D software
    packages from `DAZ Studio` (`[www.daz3d.com](http://www.daz3d.com)`) when you
    have the chance. The current version of `DAZ Studio Pro` is 4.6, and yes, it is
    free! You have to log in and sign up, like you did for EditShare Lightworks, but
    that is a small price to pay! There is also a free 3D modeling software package
    on this web site, called `Hexagon 2.5`, and a popular terrain generation software
    package for less than 20 dollars, called `Bryce 7.1 Pro`. The most expensive software
    on the DAZ Studio web site is `Carrara` (150 dollars) and `Carrara Pro` (285 dollars).
    DAZ Studio makes most of its revenue selling `character models` of one type or
    another, so take a look, as it is a force to be reckoned with in the 3D content
    (virtual) world!


    Another impressive (and free, for the basic version) world generation software
    package is `Terragen 3.2`, from `Planetside` Software, in the United Kingdom.
    You can download the basic version from `[https://planetside.co.uk](https://planetside.co.uk)`
    as well as join its forum. I have used this software in a couple of my Android
    application development books, so I know it works well for multimedia applications
    and games. It is also used by professional filmmakers, as the level of quality
    is pristine.


    `Caligari TrueSpace 7.61` is also excellent, free 3D modeling and animation software.
    The program, which is “free and alive!” according to the Caligari web site (`[https://Caligari.us](https://Caligari.us)`),
    from which you can still download it, used to cost nearly a thousand dollars when
    it was first developed by Roman Ormandy, the founder of the Caligari Corporation
    (later purchased by Microsoft). A professional-level 3D modeling and animation
    software package, this program had millions of users in its heyday. It is a really
    cool piece of software, with a fun-to-use user interface (UI), so be sure to grab
    it!'
