          return lifeIndex;

      }


    public void setInvinciBagelLifeIndex(int lifespan) {             // 设置生命值的方法

          lifeIndex = lifespan;

      }


    public String getInvinciBagelDirection() {          // 获取朝向的方法

          return directionFacing;

      }


    public void setInvinciBagelDirection(String direction) {         // 设置朝向的方法

          directionFacing = direction;

      }


    public int getInvinciBagelHitsIndex() {             // 获取受击次数（伤害）的方法

          return hitsIndex;

      }


    public void setInvinciBagelHitsIndex(int damage) {           // 设置受击次数（伤害）的方法

          hitsIndex = damage;

      }


    public String getInvinciBagelMovementType() {         // 获取移动类型的方法

          return movementType;

      }


    public void setInvinciBagelMovementType(String movement) {   // 设置移动类型的方法

          movementType = movement;

      }

    }

    ```


    需要注意的是，这些常量、变量和方法仅用于演示开发者如何利用类、方法和数据字段关键字来创建（虚拟化）他们的游戏组件。随着你开发游戏，这些内容很可能会发生变化，因为游戏开发是一个不断优化的过程，你需要持续修改和增强
    Java 代码库，以添加新功能和能力。


    现在，你只需添加你的 **GamePiece()** 构造方法，它将创建一个新对象，其中包含你希望默认 GamePiece 拥有的初始化变量设置。然后，你将创建第二个**重载**构造方法。这第二个构造方法允许将**参数**传入构造方法，以便你可以为这些相同的变量（状态）提供自定义（非默认）设置。这样一来，如果你调用
    `GamePiece()`，你将获得一个**默认对象**；如果你调用 `GamePiece(此处为参数列表)`，你将获得一个**自定义对象**。


    创建 GamePiece() 构造方法：重载 GamePiece


    最后，让我们创建构造方法（实际上是两个），它们从 GamePiece 类中获取状态（变量）并创建一个默认对象。你将使用这个对象来创建自定义的重载构造方法。第一个构造方法将采用**包私有**访问控制方式，不使用任何访问修饰符关键字，以便
    `invincibagel` 包中的任何代码都可以调用此构造方法。然后，你将使用以下 Java 代码设置默认变量：


    ```

    GamePiece() {

      invinciBagelX = 0;

      invinciBagelY = 0;

      bagelOrientation = "side";

      lifeIndex = 1000;

      hitsIndex = 0;

      directionFacing = "E";

      movementType = "idle";

      currentlyMoving = false;

    }

    ```


    重载的构造方法将在方法参数列表区域中为那些在创建对象时允许变化的变量声明参数。唯一不允许变化的两个变量是 `hitsIndex`（新对象不会承受任何伤害点数，因此必须为
    0）和 `currentlyMoving`（新对象出现时不会移动，即使这只是一瞬间），你将像在默认构造方法中那样对它们进行初始化。其他五个变量（状态）将通过参数列表传入的参数，使用等号赋值运算符进行设置。这通过以下代码实现：


    ```

    GamePiece(int x, int y, String orientation, int lifespan, String direction, String
    movement) {

      invinciBagelX = x;

      invinciBagelY = y;

      bagelOrientation = orientation;

      lifeIndex = lifespan;

      hitsIndex = 0;

      directionFacing = direction;

      movementType = movement;

      currentlyMoving = false;

    }

    ```


    我将参数列表中的变量以及它们在构造方法内部用于设置对象状态（变量）的位置加粗了。这些变量在 GamePiece 类的顶部声明，你已使用它们来设计、定义和创建
    GamePiece 对象。这第二个构造方法可以说是**重载**了第一个构造方法，因为它使用了完全相同的方法调用（方法名），但参数列表不同（包含参数，而第一个为空或无参数）。这为你提供了默认对象构造方法和自定义对象构造方法，因此在你的游戏逻辑中，你可以创建默认的
    GamePiece 或自定义的 GamePiece。


    总结


    在本第三章中，你了解了 Java 8 编程语言中一些更重要的概念和结构。当然，我无法在一章中涵盖 Java 的所有内容，所以我只关注了你在本书中创建游戏时会用到的概念、结构和关键字。大多数
    Java 书籍都有 800 页或更多，所以如果你想深入学习 Java，我推荐 Kishori Sharan 所著的《Beginning Java 8 Fundamentals》（Apress，2014
    年）。


    你首先从高层次审视了 Java，考虑了其语法，包括 Java **注释**和**分隔符**、API 以及 Java API 包含的 Java **包**。你还学习了
    Java **类**，包括**嵌套**类和**内部**类，因为 Java 包包含 Java 类。然后，你深入到 Java 的下一层级——**方法**，它类似于其他编程语言中的函数，以及一种特殊类型的
    Java 方法，称为**构造**方法。


    接下来，你探索了 Java 如何使用字段（或数据字段）来表示数据，研究了不同类型，例如常量（或固定数据字段）和变量（或值可以改变的数据字段）。之后，你更仔细地研究了
    Java **修饰符关键字**，包括 **public**、**private** 和 **protected** 访问控制关键字，以及 **final**、**static**、**abstract**、**volatile**
    和 **synchronized** 非访问控制修饰符关键字。


    在了解了基本代码结构及其修改方式后，你转向了主要的 Java 数据类型，例如 **boolean**、**char**、**byte**、**int**、**float**、**short**、**long**
    和 **double**，然后探索了用于处理或桥接这些数据类型到编程逻辑的 Java 运算符。你学习了用于数值的**算术**运算符；用于布尔值的**逻辑**运算符；用于考虑数据值之间关系的**关系**运算符；允许你建立任何条件变量赋值的**条件**运算符；以及允许你将值赋给变量（或在变量之间赋值）的**赋值**运算符。


    然后，你了解了 Java **逻辑控制**结构，包括决策控制结构（我喜欢称之为决策树）和循环（或**迭代**）逻辑控制结构。你学习了 Java **switch-case**
    结构、**if-else** 结构、**for** 循环结构和 **do-while** 循环结构。最后，你研究了 Java 对象，并发现了如何使用 Java
    类、方法和构造方法来定义对象属性、状态和行为。


    在下一章中，我将向你概述 **JavaFX** 多媒体引擎及其类和功能，因为你将利用 JavaFX 为游戏添加媒体元素，如图像、视频和音频，并使用 JavaFX
    对象结构（类），如 **Stage**、**Scene** 和 **StackPane** 来控制你的游戏。


    第 4 章


    ![image](img/frontdot.jpg)


    JavaFX 8 入门：探索 Java 8 多媒体引擎的功能

