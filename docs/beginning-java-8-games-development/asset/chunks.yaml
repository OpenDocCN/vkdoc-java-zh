    在这个访问控制修饰符之后，你需要声明方法的返回类型。这是方法在被调用或执行后返回的数据类型。由于 `.start()` 方法执行设置操作但不返回特定类型的值，因此它使用了
    **void** 返回类型，这表示该方法执行任务但不向调用方返回任何结果数据。在这种情况下，调用方是 JavaFX Application 类，因为 `.start()`
    方法是该类提供的用于控制 JavaFX 应用程序生命周期阶段的关键方法之一（其他方法包括 `.stop()` 和 `.init()` 方法）。


    接下来，你需要提供方法名称。按照惯例（编程规则），方法名应以小写字母（或单词，最好是动词）开头，后续（内部）单词（名词或形容词）则以大写字母开头。例如，一个用于显示启动画面的方法可以命名为
    **.showSplashScreen()** 或 **.displaySplashScreen()**，由于它执行操作但不返回值，因此会使用以下代码进行声明：


    ```

    public void displaySplashScreen() { 用于显示启动画面的 Java 代码写在这里 }

    ```


    如果需要传递参数（即在方法体（花括号内的部分）中需要操作的有名称的数据值），这些参数应放在与方法名相连的括号内。在图 3-2 中，你的引导程序“HelloWorld!”
    JavaFX 应用程序的 `.start()` 方法使用以下 Java 方法声明语法接收一个名为 **primaryStage** 的 **Stage**
    对象：


    ```

    public void start(Stage primaryStage) { 用于启动应用程序的引导 Java 代码写在这里 }

    ```


    你可以提供任意数量的参数，使用数据类型和参数名成对出现，每对之间用逗号分隔。方法也可以没有参数，此时参数括号为空，左右括号紧挨在一起，例如 `.start()`
    和 `.stop()`。


    定义方法的编程逻辑将包含在方法体中，如前所述，方法体位于定义方法开始和结束的花括号内。方法内部的 Java 编程逻辑可以包括变量声明、程序逻辑语句和迭代控制结构（循环），你将利用所有这些来创建你的
    Java 游戏。


    在继续之前，让我们关注另一个适用于方法的 Java 概念，即 **重载** Java 方法。重载 Java 方法意味着使用相同的方法名，但使用不同的参数列表配置。这意味着，如果你定义了多个同名方法，Java
    可以通过查看传递给被调用方法的参数，然后使用该参数列表，通过匹配参数列表的数据类型、名称及其出现顺序，来辨别使用哪个（重载的）方法。当然，要使 Java 方法重载功能正常工作，你的参数列表配置必须全部唯一。


    你将在本书中学习如何使用和编写 Java 方法，从第 4 章开始，因此我不会在这里花太多时间，除了定义它们是什么，以及它们在 Java 类中声明和使用的基本规则。


    然而，我将详细讨论的一种特殊方法是 **构造方法**。这是一种可用于创建对象的方法。Java 对象是 OOP 的基础，因此接下来你将了解构造方法，因为在学习
    Java **对象**本身之前（本章稍后将学习，请参阅“Java 对象：虚拟现实，使用 Java 构造”一节），了解这一点非常重要。


    创建 Java 对象：调用类的构造方法


    一个 Java 类可以包含一个与类名完全相同的构造方法，该方法可用于使用该类创建 Java 对象。构造方法将其 Java 类当作蓝图，在内存中创建该类的一个**实例**，从而创建一个
    Java 对象。构造方法总是返回一个 Java 对象，因此它不使用其他方法通常使用的任何 Java 返回类型（void、String 等）。构造方法通过使用
    Java **new 关键字**来调用，因为你正在创建一个新对象。


    你可以在图 3-2（第 20、28 和 30 行）所示的引导 JavaFX 代码中看到一个示例，其中分别使用以下对象声明、命名和创建 Java 代码结构创建了
    **new Button、StackPane 和 Scene 对象**：


    ```

    <Java 类名> <你的对象实例名> = new <Java 构造方法名> <分号>

    ```


    Java 对象之所以以这种方式声明，即在单个以分号结尾的 Java 语句中使用类名、正在构造的对象名称、**Java new 关键字**以及类的构造方法名（以及参数，如果有的话），是因为
    Java 对象是 Java 类的一个**实例**。


    让我们以当前 Java 代码第 20 行的 **Button** 对象创建为例。在这里，通过等号左侧的 Java 语句部分，你告诉 Java 语言编译器，你想要创建一个名为
    **btn** 的 **Button 对象**，并使用 JavaFX Button 类作为对象蓝图。这声明了 Button 类（对象类型）并为其指定了一个唯一名称。


    因此，创建对象的第一部分称为**对象声明**。创建 Java 对象的第二部分称为**对象实例化**，对象创建过程的这一部分（位于等号右侧）涉及构造方法和 Java
    new 关键字。


    要实例化一个 Java 对象，你需要**调用** Java **new** 关键字，并结合对象构造方法调用。由于这发生在等号右侧，对象实例化的结果被放置在声明的对象中（位于
    Java 语句的左侧）。正如你将在本章稍后讨论运算符时（请参阅“Java 运算符：在应用程序中操作数据”一节）看到的那样，这就是等号运算符的作用，而且它是一个非常有用的运算符。


    至此，你完成了自定义 Java 对象的**声明**（类名）、**命名**（对象名）、**创建**（使用 **new** 关键字）、**配置**（使用构造方法）和**加载**（使用等号运算符）的整个过程。


    需要注意的是，此过程中的声明和实例化部分也可以使用单独的 Java 代码行来编写。例如，**Button** 对象实例化（参见图 3-2，第 20 行）可以编写如下：


    ```

    Button btn;

    btn = new Button();

    ```

