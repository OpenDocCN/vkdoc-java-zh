  trans: '

    ![9781484204160_Fig16-14.jpg](img/9781484204160_Fig16-14.jpg)


    图 16-14. 使用整数数据时碰撞多边形是正确的（左）；在图层面板中取消选择可见性（右）以查看 SVG


    你可能已经注意到，除了起点和终点外，每个点都有三个相同的 X、Y 数据点坐标值，而起点和终点只有一对数据点，而非三对。回顾表 16-1，唯一使用三对 X、Y
    数据点的 SVG 命令是 **C**，即三次贝塞尔（样条）曲线。果然，如图 16-15 所示，在 **M**（移动至）SVG 起始命令的正下方就是 C 命令。这就解释了为什么
    GIMP 会在多边形的每个点中放置三个数据点。所有数据点三元组都具有**相同值**的原因，是因为我们在 GIMP 中勾选了**多边形**选项。这会将样条曲线的控制手柄“隐藏”或移出视线，直接置于
    X、Y 数据点的顶部。这定义了零曲率，即图 16-14 中所示的方形多边形结构。


    让我们导出移除三元组后的 SVG 数据，如图 16-15 所示，并使用我们新掌握的导入路径工作流程，在 GIMP 中查看结果，这主要是为了学习目的，因为我们尚未完成优化工作流程。


    ![9781484204160_Fig16-15.jpg](img/9781484204160_Fig16-15.jpg)


    图 16-15. 移除碰撞多边形内部那些点的重复点数据，以进一步优化


    将图 16-15 中显示的 XML 数据保存为 **sprite1svghandintegerxmloptimized.txt**，然后使用与图 16-12
    和图 6-13 相同的导入路径工作流程，将此进一步优化的 SVG 数据集导入 GIMP。如图 16-16 所示，从数据集中移除这些三次贝塞尔曲线控制手柄，也会移除碰撞多边形的多边形特性。因此，我们需要对
    SVG 数据进行进一步处理来纠正这个问题。


    ![9781484204160_Fig16-16.jpg](img/9781484204160_Fig16-16.jpg)


    图 16-16. 将删除了数据三元组的最新 SVG 数据导入 GIMP，以查看没有张力手柄数据的曲线


    将这些不符合（精灵轮廓）的曲线转换回我们之前拥有的相同碰撞多边形的解决方案非常简单，你可能已经猜到了。由于我们需要数据点之间的**直线**，因此需要将这个“**C**”改为“**L**”。这将把
    **curveto**（曲线至）SVG 命令转换为 **lineto**（直线至）SVG 命令。


    如图 16-17 所示，我们的碰撞多边形数据几乎达到了预期，包含 16 对数据点和一个 Z 闭合命令，以创建一个 16 边的碰撞多边形。我们可以移除第一对重复的数据点，将数据集减少到
    15 对数据点，这正是我们在 GIMP 中“放置”的数量。接下来，让我们再次使用 GIMP 中的**导入路径**工作流程，看看是否能得到与图 16-14 中相同的方形多边形结果。


    ![9781484204160_Fig16-17.jpg](img/9781484204160_Fig16-17.jpg)


    图 16-17. 将 SVG 路径数据从使用 C（曲线）数据类型更改为 L（直线）数据类型表示


    最终的 SVG 数据集如图 16-18 所示，你可以将该数据复制粘贴到 Java 代码中，也可以粘贴到一个空白的记事本文档中，并将其保存为名为 **iBshape1svg.txt**
    的独立文件，以便我们接下来进行一些数学计算，精确了解我们从 GIMP 自动创建的碰撞多边形到我们手动优化的自定义碰撞多边形，减少了多少数据量。如果你将图 16-18
    中显示的碰撞数据导入 GIMP，你将得到图 16-14 中所需的碰撞多边形，它只有 15 对数据点，而不是 100 对！


    ![9781484204160_Fig16-18.jpg](img/9781484204160_Fig16-18.jpg)


    图 16-18. 要使用优化的 SVG 路径数据集，请选择 `d=` 之后的部分（包括引号），然后粘贴到代码中


    确定碰撞数据优化：计算 SVG 数据的数据占用


    让我们计算一下数据占用优化百分比。从图 16-18 所示的文件中提取的 SVG 数据，并转换为我们将要在 `Bagel()` 构造函数方法调用中使用的格式，可以在图
    16-19 的顶部看到。


    将鼠标悬停在图 16-19 和图 16-20 中显示的两个 `iBshape1svg` 文件上，获取文件大小，或者右键单击文件，使用**属性**对话框查找文件中的字节数。这应该是
    **97** 字节和 **1,605** 字节。


    ![9781484204160_Fig16-19.jpg](img/9781484204160_Fig16-19.jpg)


    图 16-19. 在工作站中打开包含 SVG 数据的文件夹，将鼠标悬停在文件上以查看字节数


    ![9781484204160_Fig16-20.jpg](img/9781484204160_Fig16-20.jpg)


    图 16-20. 将鼠标悬停在原始“模糊选择工具”生成的 SVG 数据上，获取数据占用，然后进行计算


    要找出数据占用优化率，只需将这些数字相除即可。如果用 97 除以 1605（97/1605=0.0604），你会发现 97 是 1605 的 6%，即数据占用减少了
    **94%**。如果用 1605 除以 97（1605/97=16.546），这意味着文件大小减少了 16.546 倍，即数据占用减少了 **16.55 倍**。在计算器上，这两个结果是互为倒数（1/x）的，所以你可以从任一角度看待。因此，1605
    字节比 97 字节多 1,655% 的数据，或者说 97 字节是 1605 字节的 6%（即数据少 94%）。无论从哪个角度看，你刚刚为你的游戏节省了大量的内存、处理能力和
    JAR 文件数据占用，而这仅仅是一个精灵！请记住，将碰撞多边形优化到使用少于 16 倍的内存以及少于 16 倍的 CPU 处理开销，对于你在游戏逻辑中实现碰撞检测后游戏玩法的流畅度至关重要，我们将在查看
    CodeAndWeb 的 PhysEd 工具后执行此操作。


    创建和优化物理数据：使用 PhysEd

    '
- fmt: 'I want to take a couple of pages to show you an alternative to GIMP that incorporates
    both physics and collision into a unified game development tool offering that
    is extremely affordable relative to all that it does for game development. `PhysicsEditor`,
    or `PhysEd` (or `PE`) is from `CodeAndWeb GmbH`, a company owned by another Apress
    author, `Andreas Loew`, who writes about iOS Game Development. Let’s take a quick
    look at how we would define our sprite’s collision polygon using this professional
    game development tool, and then we will be ready to get to collision detection
    coding. Install and launch `PE` using the green cube `PE` icon, and use the `Import
    Sprite` button shown in [Figure 16-21](#9781484204160_Ch16.xhtml#Fig21) to open
    up your `sprite1.png` file, and use the zoom slider at the bottom of the screen
    to zoom in `600%`, just like we did in GIMP.


    ![9781484204160_Fig16-21.jpg](OEBPS/Images/9781484204160_Fig16-21.jpg)


    [Figure 16-21](#9781484204160_Ch16.xhtml#_Fig21). Launch PhysicsEditor and use
    the Add Sprites button to open the sprite1.png file and zoom into it 600%


    Next click on the `tracer icon` at the top of the sprite editing area (it is the
    middle icon, that looks like a magic wand), which will open the `Tracer` dialog,
    shown in [Figure 16-22](#9781484204160_Ch16.xhtml#Fig22). In this dialog you can
    set the zoom, tracing algorithm tolerance, `Trace Mode` and `Frame mode`, and
    see the resulting vertex count as a result of these settings.


    ![9781484204160_Fig16-22.jpg](OEBPS/Images/9781484204160_Fig16-22.jpg)


    [Figure 16-22](#9781484204160_Ch16.xhtml#_Fig22). Using the Tracer utility in
    PhysEd to set the Tolerance, Trace mode, Frame mode and Vertices


    Once you have the visual result that you’re looking for, which is accomplished
    by tweaking the various Trace dialog settings, click on the `OK` button, and you
    will be taken back to the PhysicsEditor primary user interface window.


    You can then refine your collision polygon structure data point by data point,
    by clicking and dragging these points with your mouse, as seen in [Figure 16-23](#9781484204160_Ch16.xhtml#Fig23).
    If you compare the collision polygon in [Figure 16-22](#9781484204160_Ch16.xhtml#Fig22)
    with the one in [Figure 16-23](#9781484204160_Ch16.xhtml#Fig23), you can see I
    that have refined several of the data points to better conform to the outline
    of the sprite.


    ![9781484204160_Fig16-23.jpg](OEBPS/Images/9781484204160_Fig16-23.jpg)


    [Figure 16-23](#9781484204160_Ch16.xhtml#_Fig23). Fine-tune your vertex placement
    for the collision polygon in the PhysicsEditor, then select your Exporter


    The closer you can get the collision polygon to the outline of the sprite, optimally
    you would want to put it right on top of the anti-aliasing that is on the pixel-edge
    between the sprite pixels and the transparency, or even right inside of the anti-aliasing
    if you want a more challenging game play. Ultimately, your collision polygons
    will have to be tweaked during your game development and game testing cycles,
    so that you get the most realistic result during your game play. If you’re developing
    for powerful platforms such as game consoles, you can add data points to the collision
    polygon, and if you’re developing for single or dual processor platforms, such
    as HTML5 phones or iTVs, use less data.


    ## Replacing Dummy Collision Data: InvinciBagel.java


    Next, let’s make some changes to your Java code in the `InvinciBagel.java` class,
    so that you are actually using this highly optimized collision polygon data that
    we just developed during this chapter. We will use the data set that has only
    15 data points, so that we can see all of our collision polygon data in our NetBeans
    8.0 code editing pane. As you can see in [Figure 16-24](#9781484204160_Ch16.xhtml#Fig24),
    we will need to put the `Bagel()` constructor method call on three different lines:
    one for the `iBagel = new Bagel(this)` part of the instantiation, another for
    the `collision polygon SVG data String object`, and another for the `xLocation`,
    `yLocation` and `Image object List`. We will also be using our knowledge of SVG
    commands, which we learned from [Table 16-1](#9781484204160_Ch16.xhtml#Tab1),
    to create the collision polygon data for our tileable brick elements. We will
    be using these brick “Prop” elements to develop our collision detection Java code
    later on in the chapter. We will create these simpler collision polygons using
    only our brains, by implementing numeric logic that relates to the resolution
    of the brick image, and where the corner pixel locations would be in X,Y coordinate
    space, in conjunction with the SVG path drawing commands that we learned about
    in [Table 16-1](#9781484204160_Ch16.xhtml#Tab1). You are becoming quite a game
    development professional!


