    我认为这些背景信息足以让我们继续为游戏实现按键事件处理。因此，在你的屏幕宽度和高度常量声明之后添加一行代码，使用一条复合声明语句声明四个布尔变量，分别命名为
    **up**、**down**、**left** 和 **right**，如图 Figure 9-9 所示。由于任何布尔值的默认值都是 **false**（表示按键未被按下，即当前处于释放状态），我们无需**显式初始化**这些变量。只需使用下面这行
    Java 代码即可完成，该代码在 Figure 9-9 顶部也以无错误状态显示：


    ```

    boolean up, down, left, right;

    ```


    ![9781484204160_Fig09-09.jpg](img/9781484204160_Fig09-09.jpg)


    Figure 9-9。在场景对象上添加 .setOnKeyPressed() 函数调用，并创建一个新的 EventHandler<KeyEvent> 对象


    如 Figure 9-9 底部所示，我通过调用场景对象（名为 scene，在前一行代码中已实例化）的 .setOnKeyPressed() 方法，为按键事件（按下）处理奠定了基础。在此方法调用内部，我创建了一个新的
    EventHandler<KeyEvent>，就像我们为动作事件所做的那样。代码如下所示，在导入 **KeyEvent** 类之前，你会看到它附带一条错误信息：


    ```

    scene.setOnKeyPressed(new EventHandler<KeyEvent>() { 你的 .handle() 方法将放在这里 });

    ```


    使用 **Alt-Enter** 工作流程，选择 Figure 9-9 中看到的 **import javafx.scene.input.KeyEvent**
    选项，以消除此错误信息。接下来，让我们看看需要编写的 .handle() 方法，用于处理按键事件。


    处理按键事件：使用 Switch-Case 语句


    按键事件对象的处理是应用 Java 高效 **switch-case** 语句的绝佳场景。我们可以为传递给 .handle() 方法的任何按键事件（名为 **event**）中包含的每种
    KeyCode 常量添加一个 **case** 语句。可以使用 **.getCode()** 方法从按键事件对象中提取 KeyCode。该方法在 switch()
    评估区域内对名为 event 的按键事件对象调用。在 switch{} 主体内部，case 语句会与提取出的 KeyCode 常量进行比较，如果匹配，则处理冒号后的语句。break;
    语句允许处理退出 switch-case 评估，作为一种优化。


    此事件处理 switch-case 结构应使用以下 Java 编程结构实现，该结构也在 Figure 9-10 中高亮显示：


    ```

    scene.setOnKeyPressed(new EventHandler<KeyEvent>() {

        @Override

        public void handle(KeyEvent event) {

            switch (event.getCode()) {

                case UP:    up    = true; break;

                case DOWN:  down  = true; break;

                case LEFT:  left  = true; break;

                case RIGHT: right = true; break;

            }

        }

    });

    ```


    ![9781484204160_Fig09-10.jpg](img/9781484204160_Fig09-10.jpg)


    Figure 9-10。在 public void handle() 方法内部添加 switch-case 语句，设置布尔方向变量


    现在我们有了基本的**按键按下**事件处理结构，稍后我们会对其进行补充。接下来，让 NetBeans 将这段 Java 7 代码转换为 Java 8 lambda
    表达式！之后，我们可以通过块复制粘贴操作创建**按键释放**事件处理结构，将 .setOnKeyPressed() 改为 .setOnKeyReleased()，并将
    true 值改为 false 值。编程快捷方式几乎和让 NetBeans 为我们编写代码一样酷！


    转换按键事件处理结构：使用 Java 8 Lambda 表达式


    接下来，让 NetBeans 将我们的 EventHandler<KeyEvent> 代码结构重写为 lambda 表达式，这将显著简化代码，将其从三层嵌套的代码块减少为仅两层嵌套，并将代码行数从十一行减少到仅八行。这些
    lambda 表达式对于编写紧凑代码非常优雅，并且专为多线程环境设计，因此只要可能，使用它们可以带来更优的线程使用效果！生成的 Java 8 lambda
    表达式代码结构应如下所示，如 Figure 9-11 所示：


    ```

    scene.setOnKeyPressed(KeyEvent event) -> {

        switch (event.getCode()) {

            case UP:    up    = true; break; // 来自 KeyCode 类的 UP、DOWN、LEFT、RIGHT 常量

            case DOWN:  down  = true; break;

            case LEFT:  left  = true; break;

            case RIGHT: right = true; break;

        }

    });

    ```


    ![9781484204160_Fig09-11.jpg](img/9781484204160_Fig09-11.jpg)


    Figure 9-11。将按键事件方法转换为 lambda 表达式；注意 switch 中使用了 event 变量


    接下来，让我们使用块复制粘贴操作，将 .OnKeyPressed() 按键事件处理结构复制到自身下方，将其改为 .OnKeyReleased 按键事件处理结构，并将
    true 值改为 false 值。


    创建按键按下事件处理结构


    接下来我们需要做的是创建与 OnKeyPressed 结构完全相反的结构，即创建 OnKeyReleased 结构。这将使用相同的代码结构，只是 true
    值将变为 false 值，并且 .setOnKeyPressed() 方法调用将改为 .setOnKeyReleased() 方法调用。最简单的方法是选中
    .setOnKeyPressed() 结构，将其复制并粘贴到自身下方。Java 代码如 Figure 9-12 所示，应如下所示：


    ```

    scene.setOnKeyReleased(KeyEvent event) -> {

        switch (event.getCode()) {

            case UP:    up    = false; break;

            case DOWN:  down  = false; break;

            case LEFT:  left  = false; break;

            case RIGHT: right = false; break;

        }

    });

    ```


    ![9781484204160_Fig09-12.jpg](img/9781484204160_Fig09-12.jpg)


    Figure 9-12。使用块复制粘贴操作，基于 .setOnKeyPressed() 创建 .setOnKeyReleased() 代码块


    使用 lambda 表达式通过“隐式”声明和使用类（例如本章实例中的 EventHandler 类）所带来的一个有趣之处是，它**减少了类代码顶部的 import
    语句数量**。这是因为如果某个类未在代码中具体使用（即未写出其名称），则无需在代码顶部与其他 import 语句一起放置该类的 import 语句。


    另外，请注意 NetBeans 左侧边距中的代码折叠加号和减号图标也消失了！这是因为 lambda 表达式是一个基本的 Java 代码语句，而不是像方法或内部类那样的构造（在将其转换为
    lambda 表达式之前）。如果你查看 Figure 9-12，你的事件处理代码看起来非常简洁且结构良好，然而，仅用十几行代码，它实际上为你的游戏做了相当多的工作。


    接下来，让我们看看你的 import 语句代码块（特别是如果你折叠了 import 代码块），因为你让 NetBeans 8 为你创建了 lambda 表达式。让我们检查一下是否有不需要的导入！


    优化 Import 语句：移除 EventHandler 类导入语句

