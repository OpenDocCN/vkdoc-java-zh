    I will get into lambda expressions, and we will get rid of these warning messages
    in your code as well. After that, we’ll move on to implement arrow key event handling
    structures, so that the user can navigate the InvinciBagel around the screen.


    First, let’s test the code that we put into the previously empty PLAY GAME Button
    event handling structure.


    Testing the Game Play Button: Making Sure Your Code Works


    Use the **Run ![image](OEBPS/Images/arrow.jpg) Project** (or the Run icon at the
    top of the IDE that looks like a video play transport button) to launch your InvinciBagel
    game and click on the **PLAY GAME** Button on the bottom left of the window. As
