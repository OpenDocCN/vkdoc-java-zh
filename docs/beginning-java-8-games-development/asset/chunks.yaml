- fmt: "幸运的是，`javafx.animation`包中还有另一个与时间相关的类，它没有这些预构建类的开销，因此我将其称为最低层级方法。在这种方法中，你需要在单个简单的`.handle()`函数内部自行构建所有游戏处理逻辑，该函数在每次脉冲时访问JavaFX脉冲引擎。\n\
    \n这个低层级解决方案涉及使用`AnimationTimer`类，之所以这样命名，是因为Java（Swing）已经有一个`Timer`类（`javax.swing.Timer`），Java的实用工具类（`java.util.Timer`）也有一个。如果你是一个足够高级的程序员，能够处理所有线程同步问题（以及编码），你也可以使用后者。\n\
    \n由于这是一本面向初学者的书，你将坚持使用Java 8游戏引擎（JavaFX 8）来循环你的游戏。JavaFX在`javafx.animation`包中有自己的`Timer`类，名为`AnimationTimer`，以免与Swing\
    \ GUI工具包的`Timer`类（出于遗留代码原因仍受支持）混淆。许多新开发者对这个类名中的“Animation”部分感到困惑；不要认为这个`Timer`类是用于动画的；其核心是用于计时目的。就访问JavaFX脉冲计时系统而言，这个类是`javafx.animation`包中最低层级的类，本质上仅用于访问脉冲计时系统。除此之外的所有其他内容都被剥离了。\n\
    \n因此，`AnimationTimer`类将为你提供最低的系统开销（内存使用）来实现。在全速60FPS下，假设`.handle()`方法内部的所有代码都经过良好优化，它将具有最高的性能。这是用于快速、高动态游戏（例如街机游戏或射击游戏）的类。出于这个原因，你将使用这个类来构建你的游戏，因为你可以在不耗尽性能的情况下继续构建游戏引擎框架并添加功能。\n\
    \n你将在本书中全程使用最低层级方法，以防你将Java 8游戏开发推向极限，并创建一个高度动态、充满动作的游戏。JavaFX的`AnimationTimer`超类非常适合这种类型的游戏应用，因为它会在每个JavaFX脉冲事件上处理其`.handle()`方法。脉冲事件当前被限制在60FPS，这是专业动作游戏的标准帧率（也称为刷新率）。你将创建一个继承自`AnimationTimer`超类的`GamePlayLoop.java`子类。\n\
    \n有趣的是，大多数现代iTV LCD、OLED和LED显示屏产品也以这个精确的刷新率（60Hz）更新，尽管较新的显示屏会以两倍于此的速率（120Hz）更新。具有240Hz刷新率的显示器也正在推出，但由于这些120Hz和240Hz刷新率显示器使用60Hz的偶数倍（2倍或4倍），因此60FPS是为当今消费电子设备开发游戏的合理帧率。接下来，让我们在你的游戏中实现`GamePlayLoop.java`类，它将继承`AnimationTimer`以访问脉冲。\n\
    \n## 创建新Java类：GamePlayLoop.java\n\n让我们使用`javafx.animation`包中的`AnimationTimer`超类来创建一个自定义的`GamePlayLoop`类（以及最终的对象）和所需的`.handle()`方法，以处理你的游戏玩法计算。如[图7-2](#9781484204160_Ch07.xhtml#Fig2)所示，在NetBeans\
    \ 8.0中，通过右键单击**Projects**层次结构窗格中的**invincibagel**包文件夹来完成此操作。这将告诉NetBeans你希望新创建的Java类放置在哪里。\n\
    \n![9781484204160_Fig07-02.jpg](OEBPS/Images/9781484204160_Fig07-02.jpg)\n\n[图7-2](#9781484204160_Ch07.xhtml#_Fig2).\
    \ 右键单击`invincibagel`包文件夹，并使用New ![image](OEBPS/Images/arrow.jpg) Java Class菜单序列\n\
    \n单击**New ![image](OEBPS/Images/arrow.jpg) Java Class**，这将打开**New Java Class**对话框，如[图7-3](#9781484204160_Ch07.xhtml#Fig3)所示。将类命名为`GamePlayLoop`，保留NetBeans基于你右键单击`invincibagel`包文件夹而设置的其他默认值，然后单击**Finish**。\n\
    \n![9781484204160_Fig07-03.jpg](OEBPS/Images/9781484204160_Fig07-03.jpg)\n\n[图7-3](#9781484204160_Ch07.xhtml#_Fig3).\
    \ 将新的Java类命名为`GamePlayLoop`，并让NetBeans设置其他字段\n\nNetBeans将为`GamePlayLoop.java`类创建一个引导基础设施，包含包和类声明，如[图7-4](#9781484204160_Ch07.xhtml#Fig4)所示。现在，添加一个`extends`关键字和`AnimationTimer`。\n\
    \n![9781484204160_Fig07-04.jpg](OEBPS/Images/9781484204160_Fig07-04.jpg)\n\n[图7-4](#9781484204160_Ch07.xhtml#_Fig4).\
    \ NetBeans创建`GamePlayLoop.java`类，并在IDE的编辑选项卡中打开它，供你编辑\n\n将鼠标悬停在错误上，按**Alt+Enter**，然后选择**Add\
    \ import**，如[图7-5](#9781484204160_Ch07.xhtml#Fig5)所示。\n\n![9781484204160_Fig07-05.jpg](OEBPS/Images/9781484204160_Fig07-05.jpg)\n\
    \n[图7-5](#9781484204160_Ch07.xhtml#_Fig5). 使用`extends`关键字继承`AnimationTimer`超类：按Alt+Enter，然后选择Add\
    \ import\n\n一旦NetBeans添加了`import javafx.animation.AnimationTimer;`编程语句，你就可以开始创建这个类了。它将为你利用JavaFX脉冲引擎，并包含你所有的核心游戏循环处理，或者调用将执行各种类型处理（例如精灵移动、精灵动画、碰撞检测、物理模拟、游戏逻辑、音频处理、AI、记分板更新等）的类和方法。\n\
    \n## 创建GamePlayLoop类结构：实现你的.handle()方法\n\n请注意，一旦NetBeans为你编写了import语句，`GamePlayLoop`类名下方就会出现另一个波浪形的红色错误高亮。将鼠标悬停在此处，找出与此最新错误相关的错误消息。如[图7-6](#9781484204160_Ch07.xhtml#Fig6)所示，每个`AnimationTimer`子类所需的`.handle()`方法尚未在此`GamePlayLoop.java`类中实现（也称为重写），因此你接下来必须执行此操作。也许你甚至可以让NetBeans为你编写代码；让我们看看！\n\
    \n![9781484204160_Fig07-06.jpg](OEBPS/Images/9781484204160_Fig07-06.jpg)\n\n[图7-6](#9781484204160_Ch07.xhtml#_Fig6).\
    \ 一旦你扩展并导入`AnimationTimer`，NetBeans会抛出一个错误：该类未实现`.handle()`方法\n\n正如你在错误消息弹出窗口的左下角所看到的，你可以使用**Alt+Enter**组合键调出一个帮助对话框，它将为你提供几种解决方案，包括一个实际上会为你编写未实现的`.handle()`方法的方案。选择**Implement\
    \ all abstract methods**，如[图7-7](#9781484204160_Ch07.xhtml#Fig7)中蓝色高亮所示。一旦你双击此选项，NetBeans将为你编写此方法结构：\n\
    \n```java\n@Override\npublic void handle (long now) {\n    throw new UnsupportedOperationException(\"\
    Not supported yet.\");\n}\n```\n\n![9781484204160_Fig07-07.jpg](OEBPS/Images/9781484204160_Fig07-07.jpg)\n\
    \n[图7-7](#9781484204160_Ch07.xhtml#_Fig7). 走一个编码捷径：按Alt+Enter调出帮助对话框，然后选择Implement\
    \ all abstract methods\n\n请注意，`@Override`关键字位于`public void handle`方法访问关键字、返回类型关键字和方法名称之前。这告诉Java编译器，你的`.handle()`方法将替换（重写）`AnimationTimer`的`.handle()`方法，这就是错误提示你必须**重写抽象方法`.handle(long)`**的原因。"
  raw: 'Fortunately, there is another javafx.animation package timing-related class
    that carries none of this prebuilt class overhead, and so I term this the lowest-level
    approach, in which you have to build all your game processing logic yourself,
    inside one simple **.handle()** function, which accesses the JavaFX pulse engine
    on every pass it makes.


    The low-level solution involves using the **AnimationTimer** class, so named because
    Java (Swing) already has a **Timer** class (javax.swing.Timer), as does Java’s
    utility class (java.util.Timer), which you could also use if you were an advanced
    enough programmer to deal with all the thread synchronization issues (and coding).


    Because this is a beginner-level book, you will stick with looping your game using
    the Java 8 game engine (JavaFX 8). JavaFX has its own Timer class, in the javafx.animation
    package, called AnimationTimer so as not to cause confusion with Swing GUI Toolkit’s
    Timer class (which is still supported, for legacy code reasons). Many new developers
    are confused by the “Animation” part of this class name; do not assume that this
    Timer class is for Animation; it is, at its core, for timing purposes. This class
    is the lowest-level class in the javafx.animation package, in terms of accessing
    a JavaFX pulse timing system, and essentially serves just to access the pulse
    timing system. Absolutely everything else is stripped away.


    The AnimationTimer class is therefore the class that will provide you with the
    least system overhead (memory used) to implement. At the full 60FPS speed, it
    will have the highest performance, assuming that all the code inside the .handle()
    method is well optimized. This is the class to use for a fast, high-dynamics game,
    such as an arcade game or a shooter game. For this reason, this is the class that
    you are going to use for your game, as you can continue to build a game engine
    framework and add features without running out of power.


    You will use the lowest-level approach throughout this book just in case you are
    pushing your Java 8 game development to the very limit and are creating a highly
    dynamic, action-filled game. The JavaFX AnimationTimer superclass is perfect for
    this type of game application, as it processes its .handle() method on every single
    JavaFX pulse event. A pulse event is currently throttled at 60FPS, the standard
    frame rate (also called a refresh rate) for professional action games. You will
    subclass your GamePlayLoop.java class from the AnimationTimer superclass.


    Interestingly, most modern iTV LCD, OLED, and LED display screen products also
    update at this exact **refresh rate** (60Hz), although newer displays will update
    at twice this rate (120Hz). Displays with a 240Hz refresh rate are also coming
    out, but because these 120Hz and 240Hz refresh rate displays use an even multiple
    (2× or 4×) of 60Hz, 60FPS is a logical frame rate for developing games for today’s
    consumer electronics devices. Next, let’s implement the **GamePlayLoop.java**
    class in your game, which will subclass AnimationTimer to access pulses.


    Creating a New Java Class: GamePlayLoop.java


    Let’s use the AnimationTimer superclass from the javafx.animation package to create
    a custom **GamePlayLoop** class (and, eventually, object) and the required .handle()
    method to process your game play calculations. As [Figure 7-2](#9781484204160_Ch07.xhtml#Fig2)
    demonstrates, this is done in NetBeans 8.0 by right-clicking the **invincibagel**
    package folder in your **Projects** hierarchy pane. This will show NetBeans where
    you want the new Java class to be placed after it is created.


    ![9781484204160_Fig07-02.jpg](OEBPS/Images/9781484204160_Fig07-02.jpg)


    [Figure 7-2](#9781484204160_Ch07.xhtml#_Fig2). Right-click the invincibagel package
    folder, and use the New ![image](OEBPS/Images/arrow.jpg) Java Class menu sequence


    Click **New ![image](OEBPS/Images/arrow.jpg) Java Class**, which will open the
    **New Java Class** dialog, seen in [Figure 7-3](#9781484204160_Ch07.xhtml#Fig3).
    Name the class **GamePlayLoop**, and leave the other defaults, which NetBeans
    set, based on your right-clicking the invincibagel package folder, and click **Finish**.


    ![9781484204160_Fig07-03.jpg](OEBPS/Images/9781484204160_Fig07-03.jpg)


    [Figure 7-3](#9781484204160_Ch07.xhtml#_Fig3). Name the new Java class GamePlayLoop,
    and let NetBeans set up the other fields


    NetBeans will create a bootstrap infrastructure for the GamePlayLoop.java class,
    with a package and a class declaration, as illustrated in [Figure 7-4](#9781484204160_Ch07.xhtml#Fig4).
    Now, you add an **extends** keyword and AnimationTimer.


    ![9781484204160_Fig07-04.jpg](OEBPS/Images/9781484204160_Fig07-04.jpg)


    [Figure 7-4](#9781484204160_Ch07.xhtml#_Fig4). NetBeans creates a GamePlayLoop.java
    class and opens it in an editing tab in the IDE, for you to edit


    Mouse over the error, press **Alt+Enter**, and select **Add import**, as displayed
    in [Figure 7-5](#9781484204160_Ch07.xhtml#Fig5).


    ![9781484204160_Fig07-05.jpg](OEBPS/Images/9781484204160_Fig07-05.jpg)


    [Figure 7-5](#9781484204160_Ch07.xhtml#_Fig5). Subclass an AnimationTimer superclass
    with an extends keyword: press Alt+Enter, and select Add import


    Once NetBeans adds the import javafx.animation.AnimationTimer; programming statement,
    you will be ready to start creating this class, which will harness the JavaFX
    pulse engine for you and contain all your core game play loop processing, or calls
    to classes and methods that will perform the various types of processing, such
    as sprite movement, sprite animation, collision detection, physics simulation,
    game logic, audio processing, AI, scoreboard updates, and the like.


    Creating the GamePlayLoop Class Structure: Implementing Your .handle() Method


    Note that once the import statement has been written for you by NetBeans, yet
    another wavy red error highlight appears below the GamePlayLoop class name. Mouse
    over this to find out what the error message is relating to this newest error.
    As [Figure 7-6](#9781484204160_Ch07.xhtml#Fig6) demonstrates, the **.handle()**
    method required for every AnimationTimer subclass has not yet been implemented
    (also called overridden) in this GamePlayLoop.java class, so you have to do this
    next. Maybe you can even get NetBeans to write the code for you; let’s take a
    look, and see!


    ![9781484204160_Fig07-06.jpg](OEBPS/Images/9781484204160_Fig07-06.jpg)


    [Figure 7-6](#9781484204160_Ch07.xhtml#_Fig6). Once you extend and import AnimationTimer,
    NetBeans throws an error: class does not implement the .handle()


    As you can see at the bottom left of the error message pop-up, you can use the
    **Alt+Enter** keystroke combination to bring up a helper dialog, which will offer
    you several solutions, including one that will actually write the unimplemented
    **.handle()** method for you. Select **Implement all abstract methods**, shown
    in [Figure 7-7](#9781484204160_Ch07.xhtml#Fig7), highlighted in blue. Once you
    double-click this option, NetBeans will write this method structure for you:


    ```

    @Override

    public void handle (long now) {

        throw new UnsupportedOperationException("Not supported yet.");

    }

    ```


    ![9781484204160_Fig07-07.jpg](OEBPS/Images/9781484204160_Fig07-07.jpg)


    [Figure 7-7](#9781484204160_Ch07.xhtml#_Fig7). Take a coding shortcut: press Alt+Enter
    to bring up a helper dialog, and select Implement all abstract methods


    Note that the an **@Override** keyword precedes the **public void handle** method
    access keyword, return type keyword, and method name. This tells the Java compiler
    that your .handle() method is going to replace (override) AnimationTimer’s .handle()
    method, which is why the error indicates that you have to **override abstract
    method .handle(long)**.'
  trans: "\n幸运的是，`javafx.animation` 包中还有另一个与定时相关的类，它没有这些预构建类的开销，因此我将其称为最低层级方法。使用这种方法，你需要在单个简单的\
    \ **.handle()** 函数中自行构建所有游戏处理逻辑，该函数在每次脉冲时都会访问 JavaFX 脉冲引擎。\n\n这种低层级解决方案涉及使用 **AnimationTimer**\
    \ 类，之所以这样命名，是因为 Java（Swing）已经有一个 **Timer** 类（`javax.swing.Timer`），Java 的工具类（`java.util.Timer`）中也有一个。如果你是一位足够高级的程序员，能够处理所有线程同步问题（以及编码），你也可以使用这些类。\n\
    \n由于这是一本面向初学者的书籍，你将坚持使用 Java 8 游戏引擎（JavaFX 8）来循环运行你的游戏。JavaFX 在 `javafx.animation`\
    \ 包中有自己的 Timer 类，名为 `AnimationTimer`，以免与 Swing GUI 工具包的 Timer 类（出于遗留代码原因，仍受支持）混淆。许多新开发者会被这个类名中的“Animation”部分所迷惑；不要认为这个\
    \ Timer 类是用于动画的；其核心目的是用于定时。就访问 JavaFX 脉冲定时系统而言，这个类是 `javafx.animation` 包中最低层级的类，本质上仅用于访问脉冲定时系统。除此之外的所有其他功能都被剥离了。\n\
    \n因此，`AnimationTimer` 类将为你提供最低的系统开销（内存使用）来实现。在全速 60FPS 下，假设 `.handle()` 方法内的所有代码都经过良好优化，它将具有最高的性能。这个类适用于快速、高动态的游戏，例如街机游戏或射击游戏。正因如此，你将使用这个类来开发你的游戏，因为你可以在不耗尽性能的情况下继续构建游戏引擎框架并添加功能。\n\
    \n你将在本书中全程使用这种最低层级方法，以防你将 Java 8 游戏开发推向极限，并创建一款高度动态、充满动作的游戏。JavaFX 的 `AnimationTimer`\
    \ 超类非常适合这类游戏应用，因为它会在每次 JavaFX 脉冲事件时处理其 `.handle()` 方法。目前，脉冲事件被限制在 60FPS，这是专业动作游戏的标准帧率（也称为刷新率）。你将创建一个继承自\
    \ `AnimationTimer` 超类的 `GamePlayLoop.java` 子类。\n\n有趣的是，大多数现代 iTV LCD、OLED 和 LED\
    \ 显示屏产品也以这个精确的**刷新率**（60Hz）进行更新，尽管较新的显示屏会以两倍于此的速率（120Hz）进行更新。刷新率为 240Hz 的显示屏也正在推出，但由于这些\
    \ 120Hz 和 240Hz 刷新率的显示屏使用 60Hz 的偶数倍（2 倍或 4 倍），因此 60FPS 是为当今消费电子设备开发游戏的合理帧率。接下来，让我们在你的游戏中实现\
    \ **GamePlayLoop.java** 类，它将继承 `AnimationTimer` 以访问脉冲。\n\n**创建新 Java 类：GamePlayLoop.java**\n\
    \n让我们使用 `javafx.animation` 包中的 `AnimationTimer` 超类来创建一个自定义的 **GamePlayLoop** 类（以及最终的对象）和所需的\
    \ `.handle()` 方法，以处理你的游戏玩法计算。如图 7-2 所示，在 NetBeans 8.0 中，右键单击 **Projects** 层次结构窗格中的\
    \ **invincibagel** 包文件夹即可完成此操作。这将告诉 NetBeans 你希望新创建的 Java 类放置的位置。\n\n![9781484204160_Fig07-02.jpg](img/9781484204160_Fig07-02.jpg)\n\
    \n图 7-2. 右键单击 invincibagel 包文件夹，然后使用 New ![image](img/arrow.jpg) Java Class 菜单序列\n\
    \n单击 **New ![image](img/arrow.jpg) Java Class**，这将打开 **New Java Class** 对话框，如图\
    \ 7-3 所示。将类命名为 **GamePlayLoop**，保留 NetBeans 基于你右键单击 invincibagel 包文件夹而设置的其他默认值，然后单击\
    \ **Finish**。\n\n![9781484204160_Fig07-03.jpg](img/9781484204160_Fig07-03.jpg)\n\
    \n图 7-3. 将新的 Java 类命名为 GamePlayLoop，并让 NetBeans 设置其他字段\n\nNetBeans 将为 `GamePlayLoop.java`\
    \ 类创建一个引导基础设施，包含包和类声明，如图 7-4 所示。现在，你添加一个 **extends** 关键字和 `AnimationTimer`。\n\n\
    ![9781484204160_Fig07-04.jpg](img/9781484204160_Fig07-04.jpg)\n\n图 7-4. NetBeans\
    \ 创建一个 GamePlayLoop.java 类，并在 IDE 的编辑选项卡中打开它，供你编辑\n\n将鼠标悬停在错误上，按 **Alt+Enter**，然后选择\
    \ **Add import**，如图 7-5 所示。\n\n![9781484204160_Fig07-05.jpg](img/9781484204160_Fig07-05.jpg)\n\
    \n图 7-5. 使用 extends 关键字继承 AnimationTimer 超类：按 Alt+Enter，然后选择 Add import\n\n一旦\
    \ NetBeans 添加了 `import javafx.animation.AnimationTimer;` 编程语句，你就可以开始创建这个类了。这个类将为你利用\
    \ JavaFX 脉冲引擎，并包含所有核心的游戏主循环处理，或者包含对执行各种处理（如精灵移动、精灵动画、碰撞检测、物理模拟、游戏逻辑、音频处理、AI、记分板更新等）的类和方法的调用。\n\
    \n**创建 GamePlayLoop 类结构：实现你的 .handle() 方法**\n\n请注意，一旦 NetBeans 为你编写了 import 语句，`GamePlayLoop`\
    \ 类名下方就会出现另一个波浪形的红色错误高亮。将鼠标悬停在此处，找出与此最新错误相关的错误消息。如图 7-6 所示，每个 `AnimationTimer`\
    \ 子类所需的 **.handle()** 方法尚未在此 `GamePlayLoop.java` 类中实现（也称为重写），因此你接下来必须执行此操作。也许你甚至可以让\
    \ NetBeans 为你编写代码；让我们来看看吧！\n\n![9781484204160_Fig07-06.jpg](img/9781484204160_Fig07-06.jpg)\n\
    \n图 7-6. 一旦你扩展并导入 AnimationTimer，NetBeans 就会抛出一个错误：该类未实现 .handle()\n\n正如你在错误消息弹出窗口的左下角所看到的，你可以使用\
    \ **Alt+Enter** 组合键调出一个辅助对话框，该对话框将为你提供几种解决方案，其中一种实际上会为你编写未实现的 **.handle()** 方法。选择\
    \ **Implement all abstract methods**，如图 7-7 中以蓝色突出显示的部分所示。双击此选项后，NetBeans 将为你编写此方法结构：\n\
    \n```\n@Override\npublic void handle (long now) {\n    throw new UnsupportedOperationException(\"\
    Not supported yet.\");\n}\n```\n\n![9781484204160_Fig07-07.jpg](img/9781484204160_Fig07-07.jpg)\n\
    \n图 7-7. 采用编码捷径：按 Alt+Enter 调出辅助对话框，然后选择 Implement all abstract methods\n\n请注意，**@Override**\
    \ 关键字位于 **public void handle** 方法访问关键字、返回类型关键字和方法名称之前。这告诉 Java 编译器，你的 `.handle()`\
    \ 方法将替换（重写）`AnimationTimer` 的 `.handle()` 方法，这就是错误提示你必须**重写抽象方法 .handle(long)**\
    \ 的原因。\n"
- fmt: "You certainly do not want your `.handle()` method to throw 60 `UnsupportedOperationException()`\
    \ errors every single second of your game loop; however, you are going to leave\
    \ this in there for now so that you can see what it does and also learn a bit\
    \ more about the NetBeans error console.\n\nAs [Figure 7-8](#9781484204160_Ch07.xhtml#Fig8)\
    \ demonstrates, once you select the Implement all abstract methods option, the\
    \ Java code is error free, and the basic package-import-class-method structure\
    \ for the class is in place. Now, you should be able to create a `GamePlayLoop`\
    \ object using this class, so let’s switch gears and do some programming in the\
    \ `InvinciBagel` Java class, in which you create a `GamePlayLoop` object, and\
    \ then profile the application to see what it does.\n\n![9781484204160_Fig07-08.jpg](OEBPS/Images/9781484204160_Fig07-08.jpg)\n\
    \n[Figure 7-8](#9781484204160_Ch07.xhtml#_Fig8). NetBeans creates a `public void\
    \ handle(long now)` bootstrap method with `UnsupportedOperationException`\n\n\
    ## Creating a GamePlayLoop Object: Adding Pulse Control\n\nNext, you need to declare,\
    \ name, and instantiate a `GamePlayLoop` object named `gamePlayLoop`, using the\
    \ new class you have created, in conjunction with the Java `new` keyword. Click\
    \ the `InvinciBagel.java` tab, shown in [Figure 7-9](#9781484204160_Ch07.xhtml#Fig9),\
    \ and add a line of code below the `Insets` object declaration declaring the `GamePlayLoop`\
    \ object, and name it `gamePlayLoop`, as follows:\n\n```\nGamePlayLoop gamePlayLoop;\n\
    ```\n\n![9781484204160_Fig07-09.jpg](OEBPS/Images/9781484204160_Fig07-09.jpg)\n\
    \n[Figure 7-9](#9781484204160_Ch07.xhtml#_Fig9). Click the `InvinciBagel.java`\
    \ editing tab, and declare a `GamePlayLoop` object named `gamePlayLoop` at the\
    \ top\n\nAs you can see, the code is error free, because NetBeans has found your\
    \ `GamePlayLoop` class, which contains the overridden `.handle()` method and whose\
    \ parent `AnimationTimer` class has a constructor method that can create an `AnimationTimer`\
    \ (type of) object, using the `GamePlayLoop` class, extending `AnimationTimer`.\n\
    \nNow, you have to instantiate, or create, an instance in memory of the `GamePlayLoop`\
    \ object, using the Java `new` keyword. This is done once, when the game is first\
    \ started, which means that the instance needs to go in the `.start()` method.\n\
    \nYou can do this **after** all the other Scene Graph Node objects and `ActionEvent`\
    \ `EventHandler` objects have been created, using the following line of Java code\
    \ (see also [Figure 7-10](#9781484204160_Ch07.xhtml#Fig10)):\n\n```\ngamePlayLoop\
    \ = new GamePlayLoop();\n```\n\n![9781484204160_Fig07-10.jpg](OEBPS/Images/9781484204160_Fig07-10.jpg)\n\
    \n[Figure 7-10](#9781484204160_Ch07.xhtml#_Fig10). At the end of the `.start()`\
    \ method, instantiate the `gamePlayLoop` object by using the Java `new` keyword\n\
    \nThe logic of this code placement (at the end), is to set up all your static\
    \ objects, in terms of creation and configuration, and then create the dynamic\
    \ object at the end that will be processing the pulse-related logic.\n\n## Profiling\
    \ the GamePlayLoop Object: Running NetBeans Profiler\n\nLet’s run NetBeans Profiler,\
    \ using a **Profile ![image](OEBPS/Images/arrow.jpg) Project Profile** menu sequence,\
    \ to determine if you can see the `GamePlayLoop` object that you have created\
    \ in any of the profiling views. As [Figure 7-11](#9781484204160_Ch07.xhtml#Fig11)\
    \ demonstrates, the `GamePlayLoop <init>` call takes less than 2 milliseconds\
    \ to set up the `GamePlayLoop` object in memory for your use, using very little\
    \ overhead.\n\n![9781484204160_Fig07-11.jpg](OEBPS/Images/9781484204160_Fig07-11.jpg)\n\
    \n[Figure 7-11](#9781484204160_Ch07.xhtml#_Fig11). Use a **Profile ![image](OEBPS/Images/arrow.jpg)\
    \ Profile Project** menu sequence to start the Profiler and look at `GamePlayLoop`\
    \ memory use\n\nNext, let’s study the threads analysis pane by scrolling down\
    \ in the Profiler tab, shown at the top left of [Figure 7-11](#9781484204160_Ch07.xhtml#Fig11).\
    \ Find the **Threads** icon. NetBeans will ask you if you want to start the threads\
    \ analysis tool; once you agree, it will open the Threads tab (see [Figure 7-12](#9781484204160_Ch07.xhtml#Fig12)).\n\
    \n![9781484204160_Fig07-12.jpg](OEBPS/Images/9781484204160_Fig07-12.jpg)\n\n[Figure\
    \ 7-12](#9781484204160_Ch07.xhtml#_Fig12). Click the Threads icon, seen at the\
    \ left of the screen, and open the Threads tab; the same eleven threads are running\n\
    \nIn case you are wondering why you are not seeing any “blips” in the Thread objects\
    \ shown in [Figure 7-12](#9781484204160_Ch07.xhtml#Fig12), like you did when you\
    \ clicked the Button objects in the previous chapter, you are correct in your\
    \ assumption that you should see the JavaFX pulse engine timing events somewhere\
    \ in this diagram. Yet, all the thread bars are solid colored, so no action or\
    \ pulse events are firing. I am going to have you use the NetBeans profiling utility\
    \ as often as necessary to get you used to it, as many developers avoid this tool\
    \ because they have not become comfortable with it.\n\nThis reason you do not\
    \ see any events is that simply creating the `GamePlayLoop` object is not enough\
    \ for the `.handle()` method inside it to grab hold of pulse events. Because it\
    \ is a Timer object of sorts (an `AnimationTimer`, to be exact), like any timer,\
    \ it needs to be **started** and **stopped**. Let’s create these methods for the\
    \ `GamePlayLoop` next.\n\n## Controlling Your GamePlayLoop: `.start()` and `.stop()`\n\
    \nBecause the `AnimationTimer` superclass has the `.start()` and `.stop()` methods,\
    \ which control when the class (object) will (using a `.start()` method call)\
    \ and will not (using a `.stop()` method call) handle pulse events, you will simply\
    \ pass these functions “up” to the `AnimationTimer` superclass, using the Java\
    \ `super` keyword inside your method code. You will override the `.start()` method\
    \ by using the Java `@Override` keyword and then pass the method call functionality\
    \ up to the `AnimationTimer` superclass by using the following method programming\
    \ structure:\n\n```\n@Override\npublic void start() {\n    super.start();\n}\n\
    ```\n\nThe `.stop()` method structure will be overridden, and the method functionality,\
    \ passed up to the superclass, in exactly the same fashion, using the following\
    \ Java method programming structure:\n\n```\n@Override\npublic void stop() {\n\
    \    super.stop();\n}\n```\n\nAs [Figure 7-13](#9781484204160_Ch07.xhtml#Fig13)\
    \ reveals, the `GamePlayLoop` class code is error free, and you can now write\
    \ the code in the `InvinciBagel` class that starts the `GamePlayLoop` `AnimationTimer`\
    \ object so that you can see pulse objects when you profile the application.\n\
    \n![9781484204160_Fig07-13.jpg](OEBPS/Images/9781484204160_Fig07-13.jpg)\n\n[Figure\
    \ 7-13](#9781484204160_Ch07.xhtml#_Fig13). Adding `.start()` and `.stop()` methods\
    \ to the `GamePlayLoop` class and using the Java `super` keyword properly\n\n\
    You will need to call this `.start()` method off the `GamePlayLoop` object named\
    \ `gamePlayLoop`, using the new `.start()` method that you just created. Click\
    \ the `InvinciBagel.java` tab, shown in [Figure 7-14](#9781484204160_Ch07.xhtml#Fig14),\
    \ and add a line of code below the `GamePlayLoop` object instantiation, calling\
    \ the `.start()` method off the `GamePlayLoop` object named `gamePlayLoop`, as\
    \ follows:\n\n```\ngamePlayLoop.start();\n```\n\n![9781484204160_Fig07-14.jpg](OEBPS/Images/9781484204160_Fig07-14.jpg)\n\
    \n[Figure 7-14](#9781484204160_Ch07.xhtml#_Fig14). Call a `.start()` method off\
    \ the `gamePlayLoop` object to start `GamePlayLoop` `AnimationTimer`"
