    如图所示，你的代码没有错误，现在可以准备使用 **运行 ![image](img/arrow.jpg) 项目** 工作流程，观看 60FPS 的烟花表演了！准备好迎接令人目眩的速度吧！


    接下来，让我们最后一次运行 **实时结果** 分析器和 **线程** 分析器，看看你的脉冲引擎是否在全力运转！完成这一步后，你就会知道你已经成功地为你的游戏实现了
    GamePlayLoop 计时引擎，然后你就可以将重心转移到开发游戏精灵、碰撞检测、物理和逻辑上了！


    分析 GamePlayLoop：脉冲引擎


    现在，让我们最后一次使用 **分析 ![image](img/arrow.jpg) 分析项目 (InvinciBagel)** 工作流程，看看 NetBeans
    的 **实时结果** 和 **线程** 选项卡中是否出现了新内容。点击 图 7-21 左侧所示的“实时结果”图标，在一个选项卡中启动“实时结果”分析器。请注意，GamePlayLoop
    对象是使用 <init> 创建的；一个 AnimationTimer 已启动，使用的是分析器输出中的 **invincibagel.GamePlayLoop.start()**
    条目；并且还有一个 **invincibagel.GamePlayLoop.handle(long)** 条目，这意味着你的游戏计时循环正在被处理。


    ![9781484204160_Fig07-21.jpg](img/9781484204160_Fig07-21.jpg)


    图 7-21. 运行实时结果分析器


    如你所见，**调用次数** 列显示了有多少个脉冲访问了 GamePlayLoop 中的 .handle() 方法。处理 **3,532** 个脉冲仅用了 **40.1**
    毫秒，因此每个脉冲相当于 **0.0114** 毫秒，即 **114** 纳秒（使用新的 Java 8 计时精度）。因此，你当前用于测试脉冲（或至少是 JavaFX
    脉冲引擎）的代码运行效率很高。


    当然，在进入下一章之前，你需要从 .handle() 方法中移除这段脉冲引擎测试代码，届时你将开始在此方法内处理游戏资源和逻辑。


    接下来，让我们在分析器选项卡中最后一次向下滚动（显示在 图 7-21 的左上角），并点击 **线程** 图标（显示在 图 7-22 的左上角），以打开“线程”选项卡。如你所见，脉冲引擎正在运行，并且可以在
    Thread-6 以及 JavaFX 应用程序线程中看到正在处理的脉冲事件。


    ![9781484204160_Fig07-22.jpg](img/9781484204160_Fig07-22.jpg)


    图 7-22. 运行线程分析器


    鉴于 Thread-6 中来自 GamePlayLoop 对象的空 .handle() 方法处理（参见 图 7-18），你可以假设 Thread-6 中的脉冲事件来自
    GamePlayLoop AnimationTimer 子类。这意味着 JavaFX 应用程序线程中显示的脉冲事件表明 .handle() 方法正在访问 InvinciBagel
    类中 stackPane 场景图根节点内包含的一个 buttonContainer HBox 对象。


    现在，你已经拥有了一个低开销、极快的游戏处理循环，可以开始创建你的其他（精灵、碰撞、物理、计分、逻辑等）游戏引擎了！完成一个，还有很多要做！


    总结


    在第七章中，你编写了本书中将要设计和编码的众多游戏引擎中的第一个——GamePlayLoop 游戏玩法计时类和对象，它使你能够接入强大的 JavaFX 脉冲事件处理系统。


    首先，你研究了 javafx.animation 包中的不同类，以及使用 **Animation**、**Transition**、**Timeline**
    和 **AnimationTimer** 类来利用 JavaFX 脉冲事件处理系统的不同方法。


    之后，你学习了如何在 NetBeans 中创建一个 **新的 Java 类**，然后 **扩展** AnimationTimer 超类以创建 **GamePlayLoop**
    子类，该子类将以 60FPS 处理你的游戏逻辑。你看到了如何使用 NetBeans 帮助你编写这个新子类的大部分代码，包括包和类声明、导入语句以及引导 .handle()
    方法。


    接下来，你进入了 InvinciBagel.java 类，并使用你创建的新类声明并命名了一个新的 gamePlayLoop GamePlayLoop 对象。然后，你测试了代码并对其进行了分析，以查看
    **线程实时结果** 选项卡中是否出现了任何新条目。你还测试了 NetBeans 为你编写的 .handle() 方法，并将其更改为一个空方法，以消除脉冲事件引擎抛出的重复错误。接着，你使用
    Java super 关键字实现了 .start() 和 .stop() 方法，以便在脉冲引擎启动和停止时，如果你想添加额外的 Java 语句（例如保存游戏状态），可以控制对脉冲引擎的使用。你再次测试并分析了应用程序以观察你的进展。最后，你在
    .handle() 方法中放置了一些测试代码，以便再次测试和分析应用程序，确保脉冲事件引擎能够快速且一致地处理你放置在 .handle() 方法中的代码。


    在下一章中，你将了解如何创建和实现抽象类，这些类稍后将用于创建你的游戏 **精灵**。一旦我们完成了这部分工作，就可以在后续章节中，在你的新 gamePlayLoop
    引擎内，实时地在显示屏上显示它们、为它们添加动画效果并处理它们的移动。


    第 8 章


    ![image](img/frontdot.jpg)


    创建你的角色引擎：为你的游戏设计角色并定义其能力


    既然我们已经在 第 7 章 中创建了游戏玩法计时循环，那么让我们在 第 8 章 中进行一些基础编码，创建 **public abstract class**
    框架，我们可以用它来创建将在 InvinciBagel 游戏中使用的不同类型的 **精灵**。这基本上等同于你游戏的“**角色引擎**”，因为您将定义和设计游戏将包含的各种类型的游戏组件作为角色，并且这两个类将用于创建所有其他类，这些类将用于创建游戏中的对象（组件）。这些将包括诸如
    InvinciBagel 本人（Bagel 类）、他的对手（Enemy 类）、他在游戏中寻找的所有宝藏（Treasure 类）、向他射击的东西（Projectile
    类）、他导航越过和绕过的物体（Prop 类）等，所有这些都提供了 InvinciBagel 必须努力实现的游戏目标。


    在本章中，我们将创建 **两个** public abstract class 结构。第一个是 **Actor** 类，它将是另一个 **Hero** 子类的超类。在本书中，这两个抽象类可用于创建我们的
    **固定精灵**（即不移动的精灵，如障碍物和宝藏），使用 Actor 超类；以及使用 Actor 类的 **Hero** 子类创建在屏幕上移动的精灵。Hero
    类将为运动精灵（超级英雄及其在多人游戏版本中的宿敌）提供额外的方法和变量。这些将跟踪诸如碰撞和物理特性以及角色动画（运动状态）等内容。屏幕上有大量运动将使游戏玩法更有趣，并使我们能够为玩家增加游戏挑战性。

