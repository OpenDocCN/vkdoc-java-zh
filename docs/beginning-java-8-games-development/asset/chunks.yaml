    这个 if-else 编程结构中的 **else** 部分将会调用 `initiateAttack()` 函数，前提是 `callAttack` 变量在你的条件编程逻辑的
    `attackCounter` 计时器部分已被设置为 `true`。


    一旦你的条件 `if()` 计时器逻辑到期（完成倒计时），你的敌人精灵会沿 Y 轴随机定位，使用 `spriteMoveR` 和 `spriteMoveL`
    变量移动到其起始位置，并且 `attackCounter` 会被重置为零，以备下次 `callAttack` 变量被设置为 `false` 时使用。在这段“设置发起攻击”的
    Java 语句序列末尾，**callAttack** 被设置为等于 **true**，如图 17-36 所示，使用的代码如下：


    ```

    public void update() {

        if(!callAttack) {

            if(attackCounter >= attackFrequency) {

                attackCounter = 0;

                spriteFrame.setTranslateY(randomNum.nextInt(attackBoundary));

                spriteMoveR = 700;

                spriteMoveL = -70;

                callAttack = true;

            } else { attackCounter+=1; }

        } else { initiateAttack(); }

    }

    ```


    接下来，我们将重写 `if(takeSides)` 逻辑结构，移除 Y 轴随机数定位语句，重新定位 `takeSides` 布尔标志的程序逻辑，并在一个 `.setTranslateX()`
    方法调用周围添加一个 **if(!onScreen)** 嵌套结构。这将使我们能够将 iBeagle 敌人角色精灵动画化地移入和移出屏幕。


    在 `if(!takeSides)` 结构内部，你将保留设置精灵镜像（朝向）的前两条语句，但移除 `.setTranslateY()` 方法调用，因为现在这已在
    `.update()` 方法中完成。添加 `if(!onScreen)` 条件结构，在其中你将目标位置初始化为 **500** 像素，然后嵌套另一个计数器
    **if(spriteMoveR >= destination)** 结构，在该结构内部，你将使用 **spriteMoveR-=2;** 结合 **spriteFrame.setTranslateX(spriteMoveR);**
    来每脉冲移动精灵两个像素，从而在计数器变化时实际移动精灵，进而在精灵动画（移动）逻辑中利用计数器变量。


    这个 if-else 结构的 else 部分将（最终）使用我们即将编写的 **.shootProjectile()** 方法发射抛射物，并且由于精灵现在已在屏幕上，我们将
    **onScreen** 布尔标志变量设置为 **true** 值，这暂时会触发第二个 **if(onScreen)** 条件逻辑结构。这将使用它进入屏幕时一半的速度（每个计数器迭代移动一个像素）将敌人精灵从屏幕上移除。


    第二个嵌套条件 `if(onScreen)` 结构的逻辑与第一个非常相似。你将 **destination** 设置为 **700** 像素（将敌人精灵移回屏幕外，再次移出视野），这次你将使用
    **+=1** 而不是 -=2 进行迭代，这不仅会由于使用加号而非减号而将敌人向相反方向移动，而且还会使用发起攻击时所用初始速度的一半，因为你每次移动一个像素而不是两个像素。


    `if(onScreen)` 条件 if-else 结构的真正区别在于编程逻辑的 **else** 部分，我们不仅将 **onScreen** 布尔标志变量重置为
    **false**，还将 **takeSides** 布尔变量设置为 **true**，以便敌人下次尝试攻击时使用屏幕的另一侧。


    最后，由于攻击序列已完成，我们还将 **callAttack** 布尔标志变量设置为 **false**。如你所知，这将启动 `.update()` 方法中的
    `attackCounter` 程序逻辑，从而给你的玩家几秒钟时间从被攻击中恢复。整个 **if(!takeSides)** 条件结构及其嵌套的 **if(onScreen)**
    条件结构的 Java 结构在图 17-37 中高亮显示，应如下所示：


    ```

