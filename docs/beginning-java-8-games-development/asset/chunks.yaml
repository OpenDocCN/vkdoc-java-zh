    在本章关于动画的内容中，你为游戏的主要 InvinciBagel 角色添加了相当多的“惊艳元素”。这将大大有助于使其成为一款跨年龄段的流行游戏。


    总结


    在第十三章中，我们使用高度优化的代码在 InvinciBagel 应用中实现了精灵动画。我们将七种基本精灵形状与我们在第 11 章中开发的按键移动以及我们在第
    12 章中开发的边界检测相结合，创建了一个完全动画化的 InvinciBagel 角色，它真正活灵活现，并且基于六个基本游戏玩法控制键（上、下、左、右、W
    和 S）来运作。


    我们学习了如何使用 JavaFX ImageView 类的 ScaleX 属性及其特殊的 **-1** 用例设置，来翻转或**镜像** ImageView“图像容器”内的图像资源（围绕
    Y 轴）。这使我们能够仅使用 9 个基本精灵状态创建 36 个精灵图像状态，并将这些状态作为图像资源导入到 `List<Image>` ArrayList
    对象中。这是一种优化形式，因为它使我们能够为游戏的主要超级英雄 InvinciBagel 角色使用不到 84KB 的图像资源，而不是 336KB。


    接下来，我们学习了如何实现一个布尔型 **animator** 变量，用于在我们的列表中两个不同的精灵单元奔跑状态 imageStates(1) 和 imageStates(2)
    之间进行动画切换。由此产生的奔跑循环对于专业用途来说太快了，因此，我们接着添加了一个 **framecounter** 变量来减慢运动速度，以及一个 **runningspeed**
    变量，使我们能够对精灵的奔跑速度进行微调控制，我们将在后续的游戏玩法逻辑中利用这一点。


    接着，我们优化了代码，使得当奔跑循环未显示时（即 InvinciBagel 正在飞行或着陆时），不会使用用于奔跑循环的变量和处理代码。我们还确保使用 **this.setIsFlipH()**
    方法调用在我们的 Actor 超类（以及因此的 Bagel 对象）中设置 isFlipH 属性。


    然后，我们在 InvinciBagel.java 类的事件处理代码中添加了四个新的游戏玩法控制键，并添加了四个新的私有布尔变量 aKey、sKey、dKey
    和 wKey，并让 NetBeans 自动为它们创建了 Getter 和 Setter 方法。完成这一增强后，我们将精灵躲避动作图像添加到 S 键，将精灵跳跃动作图像添加到
    W 键，使我们的游戏成为双手操作的游戏，并为使用专业游戏控制器硬件做好准备。


    最后，我们使用其余的事件处理代码、Actor 和 Hero 类、CastingDirector 类、GamePlayLoop 类以及我们在前六章（第 7 章到第
    12 章）中编写的 Bagel 类精灵移动和边界代码，测试了这段新的精灵动画代码。我们的精灵移动和动画无缝协作，在游戏舞台上操控 InvinciBagel
    角色时提供了专业级的效果。


    在下一章中，我们将探讨如何将固定的游戏精灵（Prop Actor）对象添加到游戏中，这样我们在进行碰撞检测时就有东西可以处理，并且可以开始真正使用我们最新的
    **CastingDirector** 类。


