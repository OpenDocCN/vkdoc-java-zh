    GAME Button to reveal white background


    So now we have an ability to see what we are doing going into our game play design
    chapters, which are the next eight in the book. All that we have to do now is
    to fix (or rather upgrade) the other three Button controls event handling structures
    to include method calls to make sure that the ImageView Node objects are visible
    so that they can show the image content that we want them to display to our players.
    Let’s take care of this next, since we are working on the Button UI design for
    our InvinciBagel game, and then we can take a look at the new Java 8 lambda expressions.


    Upgrading the Other UI Button Code: Making ImageView Visible


    Let’s add a couple of lines of code to each of the three existing Button event
    handling structures that will make sure that both ImageView image plates are set
    to be visible whenever these Button control objects are clicked. The reason that
    we need to put this code into each of the three other UI Button event handling
    structures is because we do not know what order the user will click on the Buttons,
    so we need to put these statements into each Button event handler. If the ImageView
    Node objects are already set as visible when these statements are triggered, then
    they will simply remain visible, because they were already previously visible!
    The Java method calls will look like the following:


    ```

    splashScreenBackplate.setVisible(false);

    splashScreenTextArea.setVisible(false);

    ```


    As you can see highlighted in [Figure 9-4](#9781484204160_Ch09.xhtml#Fig4), I’ve
    installed these (identical, except for the Image object that they reference) two
    statements inside of the other three Button event handling structures. These statements
    can go either before or after the existing method calls inside each of these .handle()
    methods.


    ![9781484204160_Fig09-04.jpg](OEBPS/Images/9781484204160_Fig09-04.jpg)


    [Figure 9-4](#9781484204160_Ch09.xhtml#_Fig4). Add in the .setVisible(true) method
    calls for the splashScreenBackplate and splashScreenTextArea objects


    Now you will see that when you use your **Run ![image](OEBPS/Images/arrow.jpg)
    Project** work process, that all of your Button UI controls will do what they
    are supposed to do, and will display either a white background for the game or
    information screens that have the InvinciBagel splash screen artwork behind them.
    Now we are ready to learn about Java lambda expressions.


    Lambda Expression: A Powerful New Java 8 Feature


    One of the major new features that was recently released in Java 8 during 2014
    is the **lambda expression**. Using the lambda expression can make your code more
    compact, and allows you to turn a method into a simple Java statement using Java
    8’s new lambda **->** “arrow” operator. The lambda expression provides a Java
    code shortcut to structure one single method interface by instead using a lambda
    expression.


    The Java 8 lambda expression has the same features as a Java method structure,
    as it requires a list of parameters to be passed in, as well as the code “body”
    to be specified. The code that the lambda expression calls can be a single java
    statement, or a block of code, containing multiple Java programming statements.
    This statement (or statements) will be expressed utilizing the parameters passed
    into the lambda expression. The basic Java 8 syntax for the **simple lambda**
    **expression** should be written as follows:


    ```

    (the parameter list) -> (a Java expression)

    ```


    You can also create a **complex lambda expression** by using the **curly braces**
    that are used in Java to define an entire block of Java code statements in conjunction
    with the lambda expression. This would be done by using the following format:


    ```

    (the parameter list) -> { statement one; statement two; statement three; statement
    n; }

    ```


    It is important to note that you do not have to use lambda expressions to replace
    traditional Java methods! In fact, if you want your code to be compatible with
    Java 7, for instance, if you want your code to also work in Android 5.0, which
    uses Java 7, you do not have to utilize lambda expressions. However, since this
    is specifically a Java 8 game development title, and since lambda expressions
    are the major new feature of Java 8, and since NetBeans will convert your Java
    methods to lambda expressions for you, as you are about to see, I have decided
    to utilize them in this book.


    Let’s take a closer look at the work process for getting NetBeans to convert your
    Java methods into lambda expressions for you. As you can see in [Figure 9-5](#9781484204160_Ch09.xhtml#Fig5),
    you currently have wavy yellow warning highlights in your code.'
