  trans: '

    让我们基于你在前一章（第 4 章）中积累的 Java 编程语言知识，通过学习构成 **JavaFX 8** 多媒体引擎的功能、组件和类来进一步深入。这个令人惊叹的
    JavaFX 8 API 是通过你在第 2 章和第 3 章中看到的 **javafx** 包添加到 Java 8 中的，该包随 Java 8 一同发布。JavaFX
    8 包对游戏编程意义重大，因为它包含了你希望在游戏编程中使用的各种高级类形式，包括用于组织游戏组件的类（使用**场景图**）、用于**用户界面**布局和设计的类、用于
    2D **数字插画**（也称为矢量图形）的类、用于**数字成像**（也称为光栅图形）的类、2D **动画**、**数字视频**、**数字音频**、**3D**、**Web
    引擎**（WebKit）等等。所有这些内容我都将在本章中介绍，以便你确切了解自己拥有哪些可用资源，因为现在这些 JavaFX 8 库已被添加到 Java 8
    编程语言中。


    如此详细讲解的原因，不仅是为了让你了解 JavaFX 8.0 能为你的 Java 8 游戏开发做什么，也是为了让你全面了解这个 JavaFX 多媒体引擎的各个组件是如何组合在一起的。你将学习
    JavaFX **Quantum** 工具包、**Prism** 渲染技术、**WebKit** Web 引擎、**Glass** 窗口工具包、音频和视频
    **Media** 引擎以及场景图 API。


    在实际将 JavaFX 用于游戏之前，你需要对它的工作原理有一个高层概述，原因在于它是一套相当复杂的 API（我喜欢称之为**引擎**）。这是因为它为在你的
    Java 8 应用程序（此处指游戏）中实现用户界面（UI）和用户体验（UX）的“胜利”带来了强大能力。所以，请耐心阅读这些基础章节，它们详细介绍了如何掌握你的
    IDE（NetBeans 8.0）、你的编程语言（Java 8）以及这个新的媒体引擎（JavaFX 8）。如今，JavaFX 8 已成为 Java 8 编程平台的一部分，该平台在全球范围内的功能和受欢迎程度都在迅速增长。


    一旦你从最高层面审视了 JavaFX 8.0 是如何整合的（就像你在第 3 章中所做的那样），你将考虑一些可能用于构建 Java 8 游戏的关键类，例如 **Node**
    类，以及 **Stage、Scene、Group、StackPane、Animation、Layout、Shape、Geometry、Control、Media、Image、Camera、Effect、Canvas
    和 Paint 类**。你已经学习了 JavaFX **Application** 类（参见第 2 章和第 3 章），所以现在你将专注于那些可用于构建复杂多媒体项目（如
    Java 8 游戏）的类。


    最后，你将深入审视你在第 2 章中生成的引导 JavaFX 应用程序，以及 Java **.main()** 方法和 JavaFX **.start()**
    方法如何使用 **Stage()** 构造方法创建 primaryStage Stage 对象，并在其中使用 **Scene()** 构造方法创建名为 **scene**
    的 Scene 对象。你将探索如何使用 Stage 类的方法来设置 **scene** 和标题并显示 **Stage**，以及如何创建和使用 **StackPane**
    和 **Button** 类（对象），并为 **Button** 添加 **EventHandler**。


    JavaFX 概述：从场景图到操作系统


    与上一章关于 Java 8 的内容类似，我将从最高层面开始对 JavaFX 的概述，从**场景图 API** 和可视化编辑工具入手，这些工具包含在一个名为
    **Scene Builder** 的 JavaFX 应用程序中，但我们不会使用它（Scene Builder 用于应用程序 UI 设计，而非游戏设计）；我们将改用
    GIMP。正如你在第 1 章（参见图 1-5）中所观察到的，Scene Builder 已集成到 NetBeans 8.0 中（JavaFX 被列为特别支持在
    NetBeans 中使用，主要是因为 Scene Builder 已成为 NetBeans GUI 的组成部分）。


    如图 4-1 所示，这些 JavaFX 应用程序构建工具存在于“**JavaFX 8 API 之上**”（一组 **javafx** 包，例如 **javafx.scene**
    和 **javafx.application**），这最终使你能够使用场景图构建和 UI 设计（使用 Scene Builder）你的 JavaFX 新媒体创作（此处指
    Java 8 游戏）。请注意，JavaFX 8.0 API 不仅与其**上方**的场景图和 Scene Builder 相连（此处用钢珠表示插头），还与其**下方**的
    Java JDK 8 和 Quantum 工具包相连。如你所见，Java JDK 8（及 API）随后将 JavaFX 新媒体引擎连接到 NetBeans、JVM、Java
    当前支持的各种平台，以及未来的平台，例如 Android 4（32 位 Android）、Android 5（64 位 Android）和 iOS。


    ![9781484204160_Fig04-01.jpg](img/9781484204160_Fig04-01.jpg)


    图 4-1. JavaFX 8 的分层结构，从顶部的场景图向下贯穿 Java 8、NetBeans 8.0、JVM 和操作系统


    与 JavaFX 8.0 API 相连的 **Quantum 工具包**，将你将要学习的所有强大的新媒体引擎整合在一起。Quantum 工具包还负责所有这些引擎的**线程管理**，因此你的游戏代码和游戏的新媒体（音频、视频、3D
    等）可以利用当今计算机和消费电子设备中非常常见的**双核、四核、六核和八核** CPU 上的独立处理器。


    **Glass 窗口工具包**控制 JavaFX 8.0 的**窗口管理**，负责显示屏幕上的所有离散区域，例如**舞台**和**弹出**窗口，包括对话框。Glass
    还管理**事件处理队列**，将事件传递给 JavaFX 进行处理，并设置**定时器**。


    如图所示，还有一个 **WebKit** 引擎和一个 **Media**（播放器）引擎，它们由 Quantum 工具包管理。WebKit 引擎渲染你的 HTML5
    和 CSS3 Web 内容，而媒体播放器媒体回放引擎则分别播放你的数字音频和数字视频资源。


    Quantum 工具包下方最重要的新媒体引擎是 **Prism**（游戏）引擎，它使用 **Java 2D** 渲染 2D 内容，并使用 **OpenGL**（Mac、Linux、嵌入式操作系统）或
    **DirectX**（如果你的用户使用 Windows Vista、Windows 7 或 Windows 8.1 平台）渲染 3D 内容。Windows
    XP 的支持已于 2014 年 4 月终止，因为目前大多数计算机和消费电子设备都具备 64 位能力（XP 仅支持 32 位）。


    Prism 桥接了主流操作系统平台以及消费电子（嵌入式）设备上的强大 3D 游戏引擎（DirectX、OpenGL），因此 JavaFX 8.0 可以将复杂的渲染任务处理**卸载**到来自
    NVIDIA（GeForce）、AMD（ATI Radeon）和 Intel 的**图形处理单元**（**GPU**）**硬件**上。这使得 JavaFX（以及
    Java 8）游戏运行更快，并允许游戏使用更少的 CPU 处理能力来将游戏资源渲染到屏幕上。这反过来又允许更多的 CPU 处理能力用于游戏玩法逻辑，例如 AI
    和碰撞检测。在本书第四章掌握 JavaFX 引擎之后，你将学习游戏设计的这些领域。

