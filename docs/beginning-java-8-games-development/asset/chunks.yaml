    JavaFX Animation for Games: Using javafx.animation Classes


    The javafx.animation package contains the **Animation** superclass, which has
    the **Timeline** and **Transition** subclasses as well as the **AnimationTimer**,
    **Interpolator**, **KeyFrame**, and **KeyValue** classes. Animation is an important
    design element in Java 8 games, and these animation classes are already coded
    for us, thanks to JavaFX, so all you have to do to add animation to your games
    is use them properly!


    The JavaFX Animation Class: The Foundation for Animation Objects


    The Animation class (or object, actually) provides the core functionality of animation
    in JavaFX. The Animation class contains two (overloaded) Animation() constructor
    methods; these are **Animation()** and **Animation(double targetFramerate)**,
    and they will create in memory the Animation object, which will control an animation
    and its playback characteristics and life cycle.


    The Animation class contains the **.play()** method, the **.playFrom(cuePoint)**
    or **.playFrom(Duration time)** method, and a **.playFromStart()** method. These
    methods are used to start playback for the Animation object. There are also the
    **.pause()** method, which can pause the animation playback, and a **.stop()**
    method, to stop animation playback. The **.jumpTo(Duration time)** and **.jumpTo(cuePoint)**
    methods are used to jump to predefined positions in an animation.'
