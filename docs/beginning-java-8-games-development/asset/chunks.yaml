    \n[Figure 10-1](#9781484204160_Ch10.xhtml#_Fig1). Create a `CastingDirector.java`\
    \ actor casting and tracking engine to keep track of `Actor` and `Hero` objects\n\
    \nBefore we code our `CastingDirector.java` class, let’s take some time to learn\
    \ about Java collections, generics, and the `List`, `ListArray`, `Set` and `HashSet`\
    \ classes that we are going to use to create these actor management tools.\n\n\
    ## List and ArrayList: Using `java.util` List Management\n\nFirst, let’s cover\
    \ the `public class ArrayList<E>` because it is a class, and then we will look\
    \ at `List` as that is an Interface, and not a Java class. In case you are wondering\
    \ what the `<E>` stands for, it stands for **Element**, if you see a `<K>` that\
    \ stands for **Key**, if you see a `<T>` that stands for **Type**, and if you\
    \ see a `<V>` that stands for **Value**. The `<E>` gets replaced by an element\
    \ (object) that you’re using in an `ArrayList`. In our case that is `ArrayList<Actor>`\
    \ as `CastingDirector.java` class `ArrayList` (and `Set`) will reference `Actor`\
    \ objects (subclasses of `Actor` superclass). The class hierarchy is as follows:\n\
    \n```\njava.lang.Object\n  > java.util.AbstractCollection<E>\n    > java.util.AbstractList<E>\n\
    \      > java.util.ArrayList<E>\n```\n\nThis class is a member of the **Java Collections\
    \ Framework**, as you might have surmised, as a `List`, as well as an `Array`,\
    \ both contain collections of data, much like a data structure (or a data store)\
    \ does, only in a simpler format. An `ArrayList<E>` class can “**implement**”\
    \ or support the following Java Interfaces: `Serializable`, `Cloneable`, `Iterable<E>`,\
    \ `Collection<E>`, `List<E>`, and `RandomAccess`. We will be using the `List<E>`\
    \ or, in our case, `List<Actor>` Java interface, which we will be looking at in\
    \ the next section on `List<E>` when we will learn about **Java Interfaces**.\n\
    \nEssentially the `ArrayList` class (and object) creates a **resizable Array**\
    \ implementation of the `List<E>` interface. An `ArrayList` object thus implements\
    \ all optional `List` operations, and permits all types of `List` elements, including\
    \ **null**. In addition to implementing the `List<E>` Java interface, this class\
    \ also provides method calls, including `.removeAll()`, `.addAll()`, and `.clear()`,\
    \ which we will be using in our class, to manipulate both the `List` content as\
    \ well as the size of the `ArrayList` object that is used internally to store\
    \ the `List` of `Actor`s (for `List<Actor>`) or `Image`s (for `List<Image>`) used.\n\
    \nEach `ArrayList` object instance has a capacity. The capacity is the size of\
    \ the `Array` used to store the elements (objects) in the `List<E>` implementation:\
    \ in our case, a `List<Actor>`. The capacity will always be at least as large\
    \ as the `List` size. As elements (`Actor` objects) are added to an `ArrayList`,\
    \ its capacity will grow automatically, which makes it perfect for our `CastingDirector`\
    \ class, as we can make levels of the game more and more complex that is, it can\
    \ utilize more `Actor` objects in the `ArrayList<Actor>` of `List<Actor>`.\n\n\
    It is important to note that the `List<E>` implementation is not **synchronized**\
    \ (capable of running on multiple threads simultaneously). If you need to have\
    \ multiple threads access an `ArrayList` instance concurrently (at the same exact\
    \ time), and at least one of these multiple threads modifies your `List<Actor>`\
    \ structure, it must be synchronized externally (manually, using your code). We\
    \ are going to call the `CastingDirector` class specifically when an enemy is\
    \ killed, or a projectile is shot, or a treasure is found (collected) and will\
    \ not have it being continually called on a pulse.\n\nA structural modification\
    \ of an `ArrayList` object is an operation that adds or removes one or more elements;\
    \ merely setting the value of an element (`Actor`) in the `ArrayList` would not\
    \ be considered to be structural modification.\n\n## The Java Interface: Defining\
    \ Rules for Implementing Your Class\n\nBefore we look at the `List<E>` Java interface,\
    \ let’s take a look at what Java interfaces do in general, as we did not have\
    \ enough pages to cover all of the Java programming language back in [Chapter\
    \ 3](#9781484204160_Ch03.xhtml). So I am going to cover some of the more advanced\
    \ Java topics as we need to learn them during the book. A good example of this\
    \ is lambda expressions in [Chapter 9](#9781484204160_Ch09.xhtml) and Java interfaces\
    \ here in [Chapter 10](#9781484204160_Ch10.xhtml). The reason for using a Java\
    \ interface is to make sure that other programmers who are going to use your code\
    \ implement it correctly; that is, include everything necessary for the code to\
    \ work properly.\n\nEssentially, all an interface specifies is the group of related\
    \ methods that is needed for another developer to implement your class. These\
    \ are specified with “empty method” code bodies. If you wanted to have other developers\
    \ use the `Hero` class, for instance, you would specify a `Hero` interface. This\
    \ would be done using the following Java code:\n\n```\npublic interface Hero {\n\
    \    public void update();\n    public boolean collide(Actor actor);\n}\n```\n\
    \nAs you can see, this is similar to what we did with the `.update()` method in\
    \ the `Actor` superclass, as there is no `{code body}` specified as there usually\
    \ is in a method. Thus, in a sense, a Java interface is also used in an abstract\
    \ fashion to define what needs to be included in a class that “implements” the\
    \ Java interface. As you probably have guessed, you would thus use the Java **implements**\
    \ keyword in your class declaration to implement a Java interface.\n\nSo, if you\
    \ had defined a `Hero` interface, and wanted to implement it in one of your classes,\
    \ in which case the Java compiler would watch over the code and make sure that\
    \ you are implementing the necessary method structures, the class definition line\
    \ of code and the methods inside the body of the class would look something like\
    \ the following:\n\n```\npublic class SuperHero implements Hero {\n    protected\
    \ boolean flagVariable1, flagVariable2;\n    public void update() {\n        //\
    \ Java statements to process on each update\n    }\n    public boolean collide(Actor\
    \ actor) {\n        // Java statements to process for collision detection\n  \
    \  }\n}\n```\n\nSo with the `java.util.ArrayList` class that we looked at earlier,\
    \ the technical class definition is as follows:\n\n```\npublic class ArrayList<E>\
    \ extends AbstractList<E> implements List<E>\n```\n\nThe `ArrayList<E>` class\
    \ also implements `RandomAccess`, `Cloneable`, and `Serializable`, but we will\
    \ not be using those at this time so I am just showing you the parts of the `ArrayList<E>`\
    \ class definition that pertain to what we will be learning during this chapter,\
    \ not the full `public class ArrayList<E> extends AbstractList<E> implements List<E>,\
    \ RandomAccess, Cloneable, Serializable` class definition, as you would see if\
    \ you look at the Java class documentation for the `ArrayList<E>` class online.\n\
    \nIt is important to notice that the `.addAll()`, `.removeAll()` and `.clear()`\
    \ method calls that we will use with the `ArrayList<E>` class are implemented\
    \ because the `List<E>` Java interface demands that they be implemented, so that\
    \ is the connection between the classes and why we will specify the declaration\
    \ of the `ArrayList<>` object using this code:\n\n```\nprivate List<Actor> CURRENT_CAST\
    \ = new ArrayList<>();\n```\n\nYou may be wondering why we will not need to explicitly\
    \ specify the `Actor` object type on both sides of this declaration and instantiation\
    \ statement. Prior to Java 7, you would have needed to specify your `Actor` object\
    \ type on both sides of this statement, inside of the `ArrayList<>()` constructor\
    \ method call. So, if you are writing game code that needs to be compatible with\
    \ Java 5 and Java 6, you would code this statement using the following line of\
    \ Java code:\n\n```\nprivate List<Actor> CURRENT_CAST = new ArrayList<Actor>();\n\
    ```\n\nNow that we have learned what a Java interface is, let’s take a look at\
    \ the `List<E>` public interface in detail."
