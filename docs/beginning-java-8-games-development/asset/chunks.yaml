    现在我们有了将单个或多个 Actor 对象添加到 REMOVED_ACTORS Set<Actor> HashSet 的方法，让我们创建一个 `.resetRemovedActors()`
    方法来清空 REMOVED_ACTORS 数据集。在清空 Set<Actor> 对象之前，我们需要确保其中包含的所有 Actor 对象都已从 CURRENT_CAST
    Actor List 对象中移除，因为这就是该集合存在的目的。因此，该方法的第一部分将调用 CURRENT_CAST ArrayList<Actor> 对象的
