    and select New ![image](OEBPS/Images/arrow.jpg) Java Class; using a New Java Class
    dialog, name it PropH


    Copy the contents of the basic Prop class that you created in the previous section,
    including the package, import and super() constructor, into the PropH class, and
    then change **Prop** to **PropH**, as is shown in [Figure 14-10](#9781484204160_Ch14.xhtml#Fig10).


    ![9781484204160_Fig14-10.jpg](OEBPS/Images/9781484204160_Fig14-10.jpg)


    [Figure 14-10](#9781484204160_Ch14.xhtml#_Fig10). Create a PropH class structure
    identical to the Prop class structure, except using PropH, instead of Prop


