- fmt: "```java\nprivate final List<Actor> CURRENT_CAST = new ArrayList<>();\n```\n\
    \n![9781484204160_Fig10-05.jpg](OEBPS/Images/9781484204160_Fig10-05.jpg)\n\n[Figure\
    \ 10-5](#9781484204160_Ch10.xhtml#_Fig5). Mouse-over yellow warning highlight\
    \ under `CURRENT_CAST`, and use the `Alt-Enter` dialog to fix problem\n\nOften\
    \ there is a misunderstanding as to the use of this Java modifier keyword `final`\
    \ with regard to objects. It is true that with most Java variables (numeric, Boolean,\
    \ and String) when made `final`, the variable value itself can’t be changed. Many\
    \ assume that a `final` modifier when used with a Java object (variable declaration)\
    \ also makes the object itself “final,” and therefore “immutable,” or not changeable\
    \ in memory.\n\nGenerally in Java the `final` keyword when used with an object\
    \ variable refers to **memory references**, and the **immutable** keyword applies\
    \ to those objects themselves, and means that they can’t be changed. Therefore,\
    \ an object (reference) that is declared as `final` can still contain an object\
    \ that is **mutable** (can be changed, as we wish to do here).\n\nIn fact, what\
    \ the `final` modifier keyword does regarding Java objects in memory, such as\
    \ our `CURRENT_CAST` `ArrayList<Actor>` object, is to make the **reference** to\
    \ where it’s being kept in memory locked, that is, finalized. So what NetBeans\
    \ is suggesting here is an **optimization** that will allow your `CURRENT_CAST`\
    \ data store object to remain where it is in memory all of the time (after it\
    \ is created).\n\nThis does not mean that your `List<Actor>` `ArrayList<Actor>`\
    \ object itself can’t change. Your game’s Java code can expand, contract, and\
    \ clear (reset) a `List<Actor>` `ArrayList<Actor>` object that has been declared\
    \ `final` at any time, based upon your game’s invocation of the `.addCurrentCast()`,\
    \ `.removeCurrentCast()`, and `.resetCurrentCast()` methods.\n\nThe optimization\
    \ theory here would be the more a JVM can “lock down” memory locations “up front”\
    \ (upon program launch, when loading into memory), the better it can optimize\
    \ memory, as well as the CPU cycles that are needed to access this memory. If\
    \ you think about it, if the CPU does not have to “look” for an object in memory,\
    \ then it will be able to access it faster. A `final` object can also be used\
    \ more optimally in a **multi-threaded** environment.\n\nIf, however, you do not\
    \ want to make your object references `final`, you can optionally turn this feature\
    \ off in NetBeans. This can be done using the **Tools ![image](OEBPS/Images/arrow.jpg)\
    \ Options** menu sequence, seen on the left side of [Figure 10-6](#9781484204160_Ch10.xhtml#Fig6),\
    \ in order to access the **Options** dialog, which is shown in the right side\
    \ of [Figure 10-6](#9781484204160_Ch10.xhtml#Fig6). As you can see along the top\
    \ of this Options dialog, NetBeans has organized it’s hundreds of preferences\
    \ (also known as options) into ten specific areas, and even has a Search Filter,\
    \ seen at the top right of the dialog as well, in case you don’t know exactly\
    \ where to look for a given option. If any of these sections have too many options\
    \ to display on the dialog screen, there will be tabs (the **hints** tab is shown\
    \ selected in [Figure 10-6](#9781484204160_Ch10.xhtml#Fig6)), which you can use\
    \ to navigate to an area you want to visit. We’re going to the **Hints** section,\
    \ and selecting the **Java** Language from the drop-down, and then finally opening\
    \ up the **Threading** section.\n\n![9781484204160_Fig10-06.jpg](OEBPS/Images/9781484204160_Fig10-06.jpg)\n\
    \n[Figure 10-6](#9781484204160_Ch10.xhtml#_Fig6). Setting Editor Hints Preferences\
    \ using the Tools ![image](OEBPS/Images/arrow.jpg) Options menu and the Editor\
    \ ![image](OEBPS/Images/arrow.jpg) Hints ![image](OEBPS/Images/arrow.jpg) Java\
    \ ![image](OEBPS/Images/arrow.jpg) Threading\n\nNow that we have covered the `final`\
    \ object variable issue, and shown you both ways of dealing with it, let’s continue\
    \ on, and create a second `ArrayList<Actor>` object named `COLLIDE_CHECKLIST`\
    \ to store complex collision data.\n\n## Another ArrayList Object: `COLLIDE_CHECKLIST`\
    \ Data Store List\n\nNow let’s create our second `List<Actor>` `ArrayList` data\
    \ store object and call it `COLLIDE_CHECKLIST` since it will eventually be accessed\
    \ in the `.collide()` method; this will happen if you implement complex multiple\
    \ object collision lists in later advanced stages of game development. We will\
    \ not get to the advanced level that will require implementation of this during\
    \ this book, but I wanted to show you how to put a complete `CastingDirector`\
    \ class together, so that you will have it in place when you need it for your\
    \ game development, as you add more advanced features into your game. This object\
    \ will hold the most current copy of the `CURRENT_CAST` `ArrayList<Actor>` and\
    \ will have two methods. The `.getCollideCheckList()` method will return the `COLLIDE_CHECKLIST`\
    \ object, and the `.resetCollideCheckList()` will reset the `COLLIDE_CHECKLIST`,\
    \ by using the `.clear()` method call, and for now, we will use the `.addAll()`\
    \ method to load `COLLIDE_CHECKLIST` `ArrayList<Actor>` object with the current\
    \ version of the `CURRENT_CAST` `ArrayList<Actor>` object. Later we can use this\
    \ List to hold a custom collision checklist, that groups together only objects\
    \ that can collide with each other into one List. The Java code, which can be\
    \ seen in [Figure 10-7](#9781484204160_Ch10.xhtml#Fig7), needed to declare and\
    \ instantiate the object, should look like the following:\n\n```java\nprivate\
    \ final List<Actor> COLLIDE_CHECKLIST = new ArrayList<>();\n```\n\n![9781484204160_Fig10-07.jpg](OEBPS/Images/9781484204160_Fig10-07.jpg)\n\
    \n[Figure 10-7](#9781484204160_Ch10.xhtml#_Fig7). Add a `COLLIDE_CHECKLIST` `List<Actor>`\
    \ object, `.getCollideCheckList()`, and `resetCollideCheckList()` methods\n\n\
    A `.getCollideCheckList()` method uses a `return` keyword, to give access to the\
    \ `COLLIDE_CHECKLIST`, like this:\n\n```java\npublic List getCollideCheckList()\
    \ {\n    return COLLIDE_CHECKLIST;\n}\n```\n\nA `.resetCollideCheckList()` method\
    \ uses a `.clear()` method to clear out the `COLLIDE_CHECKLIST` and then uses\
    \ an `.addAll()` method to add (insert) the contents of the `CURRENT_CAST` object\
    \ into the `COLLIDE_CHECKLIST` object.\n\n```java\npublic void resetCollideCheckList()\
    \ {\n    COLLIDE_CHECKLIST.clear();\n    COLLIDE_CHECKLIST.addAll(CURRENT_CAST);\n\
    }\n```\n\nNow that we have our `ArrayList<Actor>` objects set up to hold cast\
    \ members and advanced collision list data sets, let’s create a `HashSet<Actor>`\
    \ object. This Set object will be used to collect Actors that for one reason or\
    \ another need to be removed from the game play (the Scene and the Stage).\n\n\
    ## Creating a HashSet Object: `REMOVED_ACTORS` Data Store `Set<Actor>`\n\nNow\
    \ let’s create our third `Set<Actor>` `HashSet` data store object, and let’s call\
    \ it `REMOVED_ACTORS`, since it will be used to hold a collection of Actor objects\
    \ that have been removed from the current Stage. This `Set<Actor>` object will\
    \ hold all of the Actor objects that for whatever reason need to be removed from\
    \ the `CURRENT_CAST` List. The `REMOVED_ACTORS` data store (data set) will have\
    \ three associated methods.\n\nThe `.getRemovedActors()` method will return the\
    \ `REMOVED_ACTORS` object, the `.addToRemovedActors()` will be the “core” method\
    \ that will add Actor objects to the `REMOVED_ACTORS` `Set<Actor>` object as things\
    \ happen during game play (finding treasure, killing enemies, etc.) that eliminate\
    \ an Actor object from the Stage and Scene, and the `.resetRemovedActors()` that\
    \ will use the `.removeAll()` method to remove Actors from the `CURRENT_CAST`\
    \ `ArrayList<Actor>` object, and then reset the `REMOVED_ACTORS` data set, by\
    \ using the `.clear()` method call on the `REMOVED_ACTORS` `HashSet` object. The\
    \ code, seen in [Figure 10-8](#9781484204160_Ch10.xhtml#Fig8), needed to declare\
    \ and instantiate the `HashSet` object using the Java `new` keyword, looks like\
    \ this:\n\n```java\nprivate final Set<Actor> REMOVED_ACTORS = new HashSet<>();\n\
    ```\n\n![9781484204160_Fig10-08.jpg](OEBPS/Images/9781484204160_Fig10-08.jpg)\n\
    \n[Figure 10-8](#9781484204160_Ch10.xhtml#_Fig8). Add a `private final Set` named\
    \ `REMOVED_ACTORS` and use the Java `new` keyword to create a `HashSet<>`"
