    和 imageStates(2) 这两个 List<Image> 元素之间交替）。如果同时按下了上键，它应该朝左或右按键的方向向上跳跃；如果按下了下键，它应该准备朝左或右按键的方向着陆。


    我们还需要实现 Actor 类的 **isFlipH** 属性，以便角色根据其移动方向面朝正确的方向。为此，我们不会使用另一张图像，而是利用 JavaFX
    的能力来“翻转”或“镜像”任何图像，可以围绕其中心 Y 轴（isFlipH）或中心 X 轴（isFlipV）进行。一旦精灵动画状态与你在前一章中实现的移动代码相结合，你会惊讶于这个角色将变得多么逼真，而到目前为止，我们仍然只使用了九个精灵状态图像（迄今为止，我们新的媒体资产总数据占用不到
    84KB）。


    在本章中，我们将仅使用 Java 代码，并且仅使用 JavaFX **AnimationTimer**（GamePlayLoop）超类来完成所有这些角色动画。这样，我们通过仅使用
    **javafx.animation** 包中内存开销最小的类来访问脉冲事件定时引擎，从而优化了 JavaFX 脉冲引擎在游戏中的使用。AnimationTimer
    类是最简单的类，没有类变量，只需要实现一个 **.handle()** 方法，但它也是最强大的，因为它允许你编写所有自己的代码。


    这种方法允许我们编写自定义代码，根据按下的键和移动来为角色添加动画，而不是基于关键帧（及其关键值）沿时间线触发预定义的 Timeline 对象。我在游戏引擎方面保持简单，将所有复杂性放入我们的自定义游戏玩法代码中。这将为我们以后省去很多试图“同步”基于关键帧和基于时间线的线性动画的麻烦，因为那会将我们置于一个类似
    Flash 使用的线性时间线范式中。从 Java 编码的角度来看，这种 100% Java 8 的编码方法当然更困难，但它赋予我们一个数量级的强大能力，以实现事件处理、屏幕移动、角色动画、物理和碰撞检测的无缝集成。设置大量预构建的
    JavaFX Animation 子类最终或许也能达到同样的效果，但代码会不够优雅，并且在此基础上构建未来版本的游戏玩法可能会困难得多。


    我们所有的角色状态动画都将通过一个 **.setImageState()** 方法来创建，该方法将在 .update() 方法内部被调用。因此，我们将继续有条理地处理角色的移动和动画。


    InvinciBagel 动画：.setImageState() 方法

    '
- fmt: "在本章中，我们将创建一个（相当复杂的）方法，名为`.setImageState()`，它将根据任意时刻按下的按键，设置`InvinciBagel`角色的动画或运动状态。在`.update()`方法中的`.moveInvinciBagel()`方法之前调用`.setImageState()`方法，将把角色的九个图像帧（`cel`）之一与角色的运动结合起来。这将创建动画的错觉，并且无需使用任何动画时间线即可实现。从游戏优化的角度来看，这意味着运行`GamePlayLoop`的JavaFX引擎可以将其资源集中到单个动画（脉冲）引擎上。如[图13-1](#9781484204160_Ch13.xhtml#Fig1)所示，我们需要在`.update()`方法内部，在`.moveInvinciBagel()`方法调用之前和`.setBoundaries()`方法调用之后，添加一个`.setImageState();`方法调用。完成此操作后，您需要创建一个空方法来消除错误高亮。Java代码如下所示：\n\
    \n```\nprivate void setImageState() { The Method Body we'll develop in this chapter\
    \ goes in here }\n```\n\n![9781484204160_Fig13-01.jpg](OEBPS/Images/9781484204160_Fig13-01.jpg)\n\
    \n[图13-1](#9781484204160_Ch13.xhtml#_Fig1). 创建`private void setImageState()`方法；在`.update()`方法中放置`setImageState()`方法调用\n\
    \n如[图13-1](#9781484204160_Ch13.xhtml#Fig1)所示，这个空的代码框架在代码中不会生成任何红色错误或黄色警告高亮。我们目前组织得非常好，仅通过`Bagel`类的`.update()`方法中的四个方法调用，就完成了所有`KeyEvent`处理、边界检测、精灵动画和精灵移动。\n\
    \n我们要检查的第一件事是没有移动：即没有按键按下，以便我们能够正确实现上一章中用于开发精灵移动算法的“等待”`InvinciBagel`状态。\n\n`InvinciBagel`等待状态：如果未按下任何键，则设置`imageState(0)`\n\
    \n我们将放入的第一个条件`if()`语句将是默认或“无按键按下”状态，即显示`InvinciBagel`不耐烦地等待被移动和动画化的精灵零。我们需要在括号内的`if`评估区域中查找的是，在同一个时间点，`up`、`down`、`left`和`right`变量均为`false`值。到目前为止，我们一直在使用`invinciBagel`对象引用上的`.isUp()`、`.isDown()`、`.isLeft()`和`.isRight()`方法调用来查找`true`值。在这种情况下，我们要查找的是`false`值。\n\
    \n为此，我们需要使用Java的**一元感叹号`!`**运算符。这会反转布尔值，因此，在我们的例子中，来自这些方法调用的`false`值将表示为`!invinciBagel.isUp()`这样的结构。要同时判断多个值是否为`false`，我们需要实现Java的**条件与**运算符，该运算符使用**两个连续的与符号**字符，像这样`&&`；在这种情况下，我们将使用三个这样的`&&`条件与运算符，来告诉Java编译器我们希望**右`&&`左`&&`下`&&`上**都为`false`。所有这些逻辑都将放在`if()`评估区域（括号内）中。在花括号内，即满足`if()`评估区域（如果`up`、`down`、`left`和`right`都为`false`）时执行的语句所在位置，我们将使用`.setImage()`方法调用，将`spriteFrame`\
    \ `ImageView`对象设置为`imageStates` `List<Image>`对象中的**第一个** `Image`对象。在该方法调用内部，我们将对`imageStates`\
    \ `List<Image>`对象使用`.get()`方法调用，以从`List<Image>`对象中获取第一个图像引用`imageStates.get(0)`。这是`InvinciBagel`的“等待”精灵帧，显示他不耐烦地等待被移动（动画化）。该结构的Java代码应如下所示（为了便于阅读和学习，我已对其进行了缩进）：\n\
    \n```\nif( !invinciBagel.isRight() &&\n    !invinciBagel.isLeft()  &&\n    !invinciBagel.isDown()\
    \  &&\n    !invinciBagel.isUp()      ) {\n    spriteFrame.setImage(imageStates.get(0));\
    \ }\n```\n\n如[图13-2](#9781484204160_Ch13.xhtml#Fig2)所示，这第一个`if()`语句，代表“如果没有按下任何箭头键”，是没有错误的。如果您使用**运行![image](OEBPS/Images/arrow.jpg)项目**工作流程并测试此代码，您将得到与上一章相同的结果！要查看此代码是否有效，我们必须首先让`InvinciBagel`跑起来，这样当我们停止使用箭头键移动他时，我们就会得到这种不耐烦的“等待”状态，当这种等待处于我们将在本章过程中实现的所有动画运动的上下文中时，这实际上会使它更加有效（有趣）！\n\
    \n![9781484204160_Fig13-02.jpg](OEBPS/Images/9781484204160_Fig13-02.jpg)\n\n[图13-2](#9781484204160_Ch13.xhtml#_Fig2).\
    \ 添加一个检查无移动的条件`if()`语句，并设置等待精灵图像状态（零）\n\n接下来，让我们开始实现一些其他的角色图像帧，尝试让我们的角色动起来！\n\n\
    `InvinciBagel`奔跑状态：如果按下按键，则设置`imageState(1 & 2)`"
  raw: 'In this chapter, we are going to create one (fairly complex) method called
    **.setImageState()**, which will set our InvinciBagel character’s animation or
    motion state based upon which keys are being pressed at any given moment. Calling
    a .setImageState() method right before the .moveInvinciBagel() method in the .update()
    method will serve to combine one of the character’s nine image cels (frames) with
    the motion of the character. This will create the illusion of animation, and will
    achieve this without using any animation timelines whatsoever. From a game optimization
    standpoint, this means that the JavaFX engine that is running our GamePlayLoop
    can focus its resources on just that single animation (pulse) engine. As you can
    see in [Figure 13-1](#9781484204160_Ch13.xhtml#Fig1), we need to add a **.setImageState();**
    method call, inside of the .update() method before the .moveInvinciBagel() method
    call and after the .setBoundaries() method call. After you do this, you’ll have
    to create an empty method to get rid of the error highlight. The Java code looks
    like this:


    ```

    private void setImageState() { The Method Body we''ll develop in this chapter
    goes in here }

    ```


    ![9781484204160_Fig13-01.jpg](OEBPS/Images/9781484204160_Fig13-01.jpg)


    [Figure 13-1](#9781484204160_Ch13.xhtml#_Fig1). Create the private void setImageState()
    method; place a setImageState() method call in .update() method


    As you can see in [Figure 13-1](#9781484204160_Ch13.xhtml#Fig1), this empty code
    framework doesn’t generate any red error or yellow warning highlights in the code.
    We are currently very organized, accomplishing all our KeyEvent handling, boundary
    detection, sprite animation, and sprite movement, by using only four method calls
    inside of this Bagel class .update() method.


    The first thing that we want to check for is no movement: that is, no keys pressed,
    so that we can correctly implement the “waiting” InvinciBagel state we used in
    the previous chapter to develop a sprite movement algorithm.


    The InvinciBagel Wait State: If No Key Pressed Set imageState(0)


    The first conditional if() statement that we put into place will be the default
    or “no keys pressed” state, which is sprite zero that shows the InvinciBagel waiting
    impatiently to be moved and animated. What we want to look for inside of the if
    evaluation area inside of the parenthesis is a false value for each of the up,
    down, left, and right variables, all at the same moment of time. Up until now,
    we have been looking for a **true** value, using the .isUp(), .isDown(), .isLeft(),
    and .isRight() method calls off of the invinciBagel object reference. In this
    situation we want to look for a **false** value.


    To accomplish this, we need to use the Java **Unary Exclamation Point !** operator.
    This reverses the Boolean value, so in our case, a false value from one of these
    method calls would be represented by a **!invinciBagel.isUp()** construct, for
    instance. To find out if more than one value is false at the same time, we’ll
    need to implement the Java **Conditional AND** operator, which uses **two consecutive
    ampersand** characters, like this && so; in this case, we will be using three
    of these && Conditional AND operators, to tell the Java compiler that we want
    **Right AND Left AND Down AND Up** to all be **false**. All of this logic will
    go inside of the if() evaluation area (inside of the parenthesis). Inside of the
    curly braces, where the statements go if the if() evaluation area is met (if up,
    down, left and right are all false), we will set the **spriteFrame** ImageView
    object equal to the **first** Image object in the **imageStates** List<Image>
    object using the **.setImage()** method call. Inside of that method call, we will
    use the **.get()** method call on the imageStates List<Image> object, to get the
    first Image reference imageStates(0) from the List<Image> object. This is the
    “waiting” sprite cel for the InvinciBagel, which shows him waiting impatiently
    to be moved (animated). The Java code for the construct would look like the following
    Java programming structure (I have indented this for easier readability and learning
    purposes):


    ```

    if( !invinciBagel.isRight() &&

        !invinciBagel.isLeft()  &&

        !invinciBagel.isDown()  &&

        !invinciBagel.isUp()      ) {

        spriteFrame.setImage(imageStates.get(0)); }

    ```


    As is seen in [Figure 13-2](#9781484204160_Ch13.xhtml#Fig2), this first if() statement,
    representing “if none of the arrow keys are being pressed,” is error-free. If
    you use the **Run ![image](OEBPS/Images/arrow.jpg) Project** work process, and
    test this code, you’ll get the same result as you did in the previous chapter!
    To see if this code works we must first make the InvinciBagel run, so that when
    we stop moving him using the arrow keys, we get this impatient “waiting” state,
    which actually makes it a lot more effective (funny), when this wait is in the
    context of all this animated movement we’re about to implement during the course
    of the chapter!


    ![9781484204160_Fig13-02.jpg](OEBPS/Images/9781484204160_Fig13-02.jpg)


    [Figure 13-2](#9781484204160_Ch13.xhtml#_Fig2). Add a conditional if() statement
    that checks for no movement, and sets the wait sprite image state (zero)


    Next let’s start to implement some of the other character image cels to try and
    get our character animating!


    The InvinciBagel Run State: If KeyPressed Set imageState(1 & 2)'
  trans: '

    在本章中，我们将创建一个（相当复杂的）方法，名为 **.setImageState()**，它将根据任意时刻按下的按键，设置我们的 InvinciBagel
    角色的动画或运动状态。在 .update() 方法中的 .moveInvinciBagel() 方法之前调用 .setImageState() 方法，可以将角色的九个图像单元（帧）之一与角色的运动结合起来。这将营造出动画的错觉，并且无需使用任何动画时间线即可实现。从游戏优化的角度来看，这意味着运行我们
    GamePlayLoop 的 JavaFX 引擎可以将其资源集中到仅这一个动画（脉冲）引擎上。如图 13-1 所示，我们需要在 .update() 方法内部，在
    .moveInvinciBagel() 方法调用之前、.setBoundaries() 方法调用之后，添加一个 **.setImageState();**
    方法调用。完成此操作后，您需要创建一个空方法来消除错误高亮。Java 代码如下所示：


    ```

    private void setImageState() { 本章将要开发的方法体写在这里 }

    ```


    ![9781484204160_Fig13-01.jpg](img/9781484204160_Fig13-01.jpg)


    图 13-1. 创建 private void setImageState() 方法；在 .update() 方法中放置一个 setImageState()
    方法调用


    如图 13-1 所示，这个空的代码框架在代码中不会生成任何红色错误或黄色警告高亮。我们目前组织得非常好，仅通过在这个 Bagel 类的 .update()
    方法内部使用四个方法调用，就完成了所有的 KeyEvent 处理、边界检测、精灵动画和精灵移动。


    我们要检查的第一件事是**无移动**：即没有按键按下，这样我们就能正确实现上一章中用于开发精灵移动算法的“等待”InvinciBagel 状态。


    **InvinciBagel 等待状态：如果未按下任何按键，则设置 imageState(0)**


    我们放入的第一个条件 if() 语句将是默认或“未按下任何按键”状态，即显示 InvinciBagel 不耐烦地等待被移动和动画化的精灵零。我们希望在括号内的
    if 评估区域中查找的是 up、down、left 和 right 变量在同一时刻均为 **false** 值。到目前为止，我们一直在使用 invinciBagel
    对象引用的 .isUp()、.isDown()、.isLeft() 和 .isRight() 方法调用来查找 **true** 值。在这种情况下，我们要查找的是
    **false** 值。


    为此，我们需要使用 Java 的**一元感叹号 !** 运算符。这会反转布尔值，因此在我们的例子中，这些方法调用之一的 false 值将表示为例如 **!invinciBagel.isUp()**
    结构。要判断多个值是否同时为 false，我们需要实现 Java 的**条件与**运算符，该运算符使用**两个连续的 & 符号**，像这样 &&；在这种情况下，我们将使用三个这样的
    && 条件与运算符，来告诉 Java 编译器我们希望 **Right AND Left AND Down AND Up** 全部为 **false**。所有这些逻辑都将放在
    if() 评估区域（括号内）中。在花括号内，即满足 if() 评估区域（如果 up、down、left 和 right 均为 false）时执行语句的地方，我们将使用
    **.setImage()** 方法调用，将 **spriteFrame** ImageView 对象设置为 **imageStates** List<Image>
    对象中的**第一个** Image 对象。在该方法调用内部，我们将在 imageStates List<Image> 对象上使用 **.get()** 方法调用，从
    List<Image> 对象中获取第一个 Image 引用 imageStates(0)。这是 InvinciBagel 的“等待”精灵单元，显示他不耐烦地等待被移动（动画化）。该结构的
    Java 代码看起来像下面的 Java 编程结构（为了便于阅读和学习，我对其进行了缩进）：


    ```

    if( !invinciBagel.isRight() &&

        !invinciBagel.isLeft()  &&

        !invinciBagel.isDown()  &&

        !invinciBagel.isUp()      ) {

        spriteFrame.setImage(imageStates.get(0)); }

    ```


    如图 13-2 所示，这第一个 if() 语句，代表“如果没有任何方向键被按下”，是没有错误的。如果您使用 **运行 ![image](img/arrow.jpg)
    项目**工作流程并测试此代码，您将得到与上一章相同的结果！要查看此代码是否有效，我们必须首先让 InvinciBagel 跑起来，这样当我们停止使用方向键移动他时，就会得到这种不耐烦的“等待”状态，当这种等待处于我们将在本章过程中实现的所有动画运动的背景下时，这实际上会使它更加有效（有趣）！


    ![9781484204160_Fig13-02.jpg](img/9781484204160_Fig13-02.jpg)


    图 13-2. 添加一个条件 if() 语句，检查是否无移动，并设置等待精灵图像状态（零）


    接下来，让我们开始实现一些其他的角色图像单元，尝试让我们的角色动起来！


    **InvinciBagel 奔跑状态：如果按下按键，则设置 imageState(1 & 2)**

    '
- fmt: "如你在[第8章](#9781484204160_Ch08.xhtml)中所见，我将尝试仅使用两个精灵帧（`imageState(1)`和`imageState(2)`）来实现角色的动画奔跑状态。无论从图像资产角度还是从编码角度来看，这都是一种高度优化的方式，你很快就会看到。尤其考虑到你无法使用单个图像状态来动画化诸如奔跑循环之类的动作。话虽如此，在本章中，我们将通过使用精心设计的单帧精灵状态，结合我们在[第12章](#9781484204160_Ch12.xhtml)中实现的精灵运动代码，来创建大量非常逼真的动画。`if(invinciBagel.isRight())`和`if(invinciBagel.isLeft())`语句结构最初会非常简单直接，但随着我们在本章中添加更多细化功能，它们将变得复杂得多。我们将首先为这些功能奠定基础，然后添加上下方向的`if()`条件语句，最后再完善左右方向的`KeyEvent`处理。在左右箭头键（以及A和D键移动）的`if()`结构中，我们将使用与第一个（待机状态）`if()`结构中相同的**链式方法**调用，只不过这里我们将从`List<Image>`对象中调用`imageStates(1)`或`imageStates(2)`精灵帧，而不是使用`imageStates(0)`精灵帧。将精灵图像状态更改为状态1或状态2（如果按下右键或左键）的Java代码如下所示：\n\
    \n```\nif(invinciBagel.isRight()) {\n    spriteFrame.setImage(imageStates.get(1));\n\
    }\nif(invinciBagel.isLeft()) {\n    spriteFrame.setImage(imageStates.get(2));\n\
    }\n```\n\n如你在[图13-3](#9781484204160_Ch13.xhtml#Fig3)中所见，Java代码没有错误，我们准备使用**运行\
    \ > 项目**工作流程来测试这个初步的奔跑模式。如果你快速连续按下左箭头键和右箭头键，你会看到InvinciBagel在奔跑！\n\n![9781484204160_Fig13-03.jpg](OEBPS/Images/9781484204160_Fig13-03.jpg)\n\
    \n[图13-3](#9781484204160_Ch13.xhtml#_Fig3). 添加检查左右移动的`if()`条件语句，并设置奔跑精灵图像状态\n\n\
    由于这不是我们想让游戏玩家控制InvinciBagel奔跑的方式（因为这种方式的本质会阻止他在屏幕上移动，而且这实在太逊了），让我们快速添加上下方向键的支持，这样我们就可以回来处理左右方向键，使奔跑循环正常工作！\n\
    \n**InvinciBagel飞行状态：如果按键按下，设置`imageState(3 & 4)`**\n\n`if(invinciBagel.isDown())`和`if(invinciBagel.isUp())`条件`if()`结构与左右方向键的结构完全相同，只是它们调用了`imageStates(3)`和`imageStates(4)`列表元素，以允许InvinciBagel角色“准备着陆”（帧3）和“起飞飞行”（帧4）。随着我们在本章中添加更多的`imageStates`，并将此帧动画代码与我们的运动和边界代码相结合，测试本章的编码结果将会越来越有趣！如果你想走程序员捷径，可以复制粘贴`.isRight()`和`.isLeft()`结构到它们下方，只需将`.get(1)`和`.get(2)`改为`.get(3)`和`.get(4)`。如你在[图13-4](#9781484204160_Ch13.xhtml#Fig4)中所见，代码目前非常紧凑、组织良好、结构清晰且逻辑性强；仅用六行Java代码，我们就已经实现了九个图像状态中的一半以上！当然，我们还需要添加细化代码，以实现方向变化的精灵镜像和奔跑循环的时间细化。`.isUp()`和`.isDown()`方法结构的Java代码如下所示：\n\
    \n```\nif(invinciBagel.isDown()) {\n    spriteFrame.setImage(imageStates.get(3));\n\
    }\nif(invinciBagel.isUp()) {\n    spriteFrame.setImage(imageStates.get(4));\n\
    }\n```\n\n![9781484204160_Fig13-04.jpg](OEBPS/Images/9781484204160_Fig13-04.jpg)\n\
    \n[图13-4](#9781484204160_Ch13.xhtml#_Fig4). 添加上下移动检查的`if()`条件语句，并设置跳跃/着陆精灵图像状态\n\
    \n如你在[图13-4](#9781484204160_Ch13.xhtml#Fig4)中所见，我们的代码没有错误，我们准备为左右箭头键事件处理代码添加几层复杂性，因为这两个键定义了InvinciBagel行进的方向（东和西）。因此，这两个`if()`条件语句结构尤其需要变得更加复杂，因为向东（向右）行进将使用原始（`isFlipH\
    \ = false`）精灵，而向西（向左）行进将使用每个精灵的镜像版本（`isFlipH = true`），即围绕中心Y轴“翻转”图像资产。\n\n**镜像精灵：将图像资产从9个翻倍到36个**\n\
    \n现在让我们回到现有的`.isLeft()`和`.isRight()`条件求值语句中，这些语句在本章中将变得相当“健壮”（复杂），并添加我们的精灵镜像功能。JavaFX\
    \ API 将其镜像功能“隐藏”在`ImageView`类的`.setScaleX()`方法调用中。虽然我们不打算缩放图像资产，因为这样做会在我们原始的PNG32图像资产中产生伪影，但有一个鲜为人知的技巧：你可以向`.setScaleX()`方法传递一个`-1`（负100%缩放因子）值，以围绕Y轴翻转或镜像图像资产（或者向`.setScaleY()`方法传递该值，以围绕X轴翻转或镜像）。显然，我们还需要在另一个条件`if()`结构中通过向同一个方法调用传递`1`（正100%缩放因子）来“撤销”此操作，这通常看起来没什么意义，因为我们的图像缩放已经是100%（未缩放），但考虑到之前可能设置了`-1`的缩放翻转因子，这样做是为了确保禁用镜像，并再次为该特定状态使用原始精灵图像资产。你新升级的实现精灵镜像的Java语句现在应如下所示，该代码也在[图13-5](#9781484204160_Ch13.xhtml#Fig5)中高亮显示：\n\
    \n```\nif(invinciBagel.isRight()) {\n    spriteFrame.setImage(imageStates.get(1));\n\
    \    spriteFrame.setScaleX(1);\n}\nif(invinciBagel.isLeft()) {\n    spriteFrame.setImage(imageStates.get(1));\n\
    \    spriteFrame.setScaleX(-1);\n}\n```\n\n![9781484204160_Fig13-05.jpg](OEBPS/Images/9781484204160_Fig13-05.jpg)\n\
    \n[图13-5](#9781484204160_Ch13.xhtml#_Fig5). 在`.isRight()`和`.isLeft()`求值中添加`.setScaleX()`方法调用，以围绕Y轴翻转精灵\n\
    \n如你在[图13-5](#9781484204160_Ch13.xhtml#Fig5)中所见，你的Java代码仍然没有错误。有趣的是，我们是在`spriteFrame\
    \ ImageView`对象上调用精灵镜像方法，而不是在此`ImageView`内部的图像资产上调用。这一点至关重要，因为这意味着我们可以在`.isRight()`和`.isLeft()`内部使用这一行代码来翻转`ImageView`中显示的任何精灵状态（图像）！这是高度优化的编程！\n\
    \n现在我们的精灵镜像代码已经就位，我们需要处理通过条件`if()`处理来交替使用`imageStates(1)`和`imageStates(2)`实现奔跑循环的问题。\n\
    \n**动画化你的奔跑循环：创建嵌套的If-Else结构**"
  raw: 'As you have seen in [Chapter 8](#9781484204160_Ch08.xhtml), I am going to
    try and achieve an animated run state for the character using only two sprite
    cels, imageState(1) and imageState(2). This is about as optimized as you can get,
    both from an Image assets standpoint, as well as from a coding standpoint, as
    you are about to see. This is especially true given that you can’t animate anything
    such as a run cycle using a single image state. That said, we are going to create
    a lot of very realistic animation during this chapter by using single cel, well-designed,
    sprite states, in combination with the sprite motion code that we put into place
    in [Chapter 12](#9781484204160_Ch12.xhtml). The **if(invinciBagel.isRight())**
    and **if(invinciBagel.isLeft())** statement constructs will initially be quite
    easy and straightforward, but these will grow far more complex as we add refining
    features during the course of this chapter. We will put the foundation into place
    for these first, then add the up and down conditional if() statements, and then
    later, we will refine the right and left KeyEvent handling. Inside of the if()
    constructs for the left and right arrow key (and A and D key movement), we will
    use the same **chained method** call that we used in the first (impatiently waiting
    state) if() construct, only here we will call the imageStates(1) or imageStates(2)
    sprite cels, from the List<Image> object, instead of using the imageStates(0)
    sprite cel. The Java code to change the sprite Image states to state 1 or 2, if
    the right or left key is pressed (true), should look like the following:


    ```

    if(invinciBagel.isRight()) {

        spriteFrame.setImage(imageStates.get(1));

    }

    if(invinciBagel.isLeft()) {

        spriteFrame.setImage(imageStates.get(2));

    }

    ```


    As you can see in [Figure 13-3](#9781484204160_Ch13.xhtml#Fig3), the Java code
    is error-free, and we are ready to use the **Run > Project** work process test
    this preliminary run mode. If you quickly press the left and right arrow keys
    in succession, you’ll see the InvinciBagel running!


    ![9781484204160_Fig13-03.jpg](OEBPS/Images/9781484204160_Fig13-03.jpg)


    [Figure 13-3](#9781484204160_Ch13.xhtml#_Fig3). Add conditional if() statements
    that check for left/right movement, and sets the run sprite image states


    Since this is not how we want to make our game player make the InvinciBagel run
    (because the very nature of it stops his movement around the screen, and because
    it’s just plain lame), let’s quickly put into place your up and down key support,
    so that we can come back and work on the left and right keys so we can make the
    run cycle work!


    The InvinciBagel Fly State: If KeyPressed Set imageState(3 & 4)


    The **if(invinciBagel.isDown())** and the **if(invinciBagel.isUp())** conditional
    if() structures are identical to the left and right key structures, except that
    they call **imageStates(3)** and **imageStates(4)** List elements, to allow the
    InvinciBagel character to “come in for landing” (cel 3), and “take off flying”
    (cel 4). As we add more of the imageStates during this chapter, and combine this
    cel animation code with our motion and boundary code, you are going to have more
    and more fun testing this chapter’s coding results! If you want to take a programmer’s
    shortcut, copy and paste the .isRight() and .isLeft() constructs underneath themselves,
    and simply change the .get(1) and .get(2) to .get(3) and .get(4). As you can see
    in [Figure 13-4](#9781484204160_Ch13.xhtml#Fig4), the code is currently very compact
    and well organized; structured; and logical; and in only half a dozen lines of
    Java code, we have now implemented more than half of our nine image states already!
    Of course, we still have to add refinement code, to implement sprite mirroring
    for direction changes and run-cycle timing refinement. The Java code for the .isUp()
    and .isDown() method structures should look like the following:


    ```

    if(invinciBagel.isDown()) {

        spriteFrame.setImage(imageStates.get(3));

    }

    if(invinciBagel.isUp()) {

        spriteFrame.setImage(imageStates.get(4));

    }

    ```


    ![9781484204160_Fig13-04.jpg](OEBPS/Images/9781484204160_Fig13-04.jpg)


    [Figure 13-4](#9781484204160_Ch13.xhtml#_Fig4). Add conditional if() statements
    that check for up/down movement and sets jump/land sprite image state


    As you can see in [Figure 13-4](#9781484204160_Ch13.xhtml#Fig4), our code is error-free,
    and we are ready to add several layers of complexity to the left and right arrow
    key event processing code, since these two keys are defining the direction (East
    and West) the InvinciBagel is traveling. For this reason, these two conditional
    if() statement structures, in particular, need to become more complex, because
    traveling East (to the right) will use original (isFlipH = false) sprites, and
    traveling West (to the left) will utilize a mirrored version (isFlipH = true)
    of each sprite, “flipping” the Image assets around the central Y axis.


    Mirroring Sprites: Quadrupling Your Image Assets from 9 to 36


    Now let’s go back into the existing .isLeft() and .isRight() conditional evaluation
    statements, which are going to become quite “robust” (complicated) over the course
    of this chapter, and let’s add our spite mirroring capability. The JavaFX API
    has its mirroring capability “hidden” in the ImageView class’s .setScaleX() method
    call. Although we are not going to scale our Image assets, as doing so causes
    artifacts in our pristine PNG32 image assets, there is a little known trick that
    you can pass a **-1** (negative 100% scaling factor) value into a .setScaleX()
    method, to flip or mirror the Image asset around the Y axis (or into the .setScaleY()
    method, to flip or mirror around the X axis). Clearly we will need to also “undo”
    this in the other conditional if() structure by passing a 1 (positive 100% scaling
    factor) into the same method call, which does not make a whole lot of sense (normally)
    as our Image scale is already 100% (not scaled) but in light that the -1 scale-flip
    factor might have been set previously, this is how we make sure that mirroring
    is disabled and we are again using our original sprite Image assets for that particular
    state. Your newly upgraded Java statements implementing sprite mirroring should
    now look like the following code, which is also shown highlighted in [Figure 13-5](#9781484204160_Ch13.xhtml#Fig5):


    ```

    if(invinciBagel.isRight()) {

        spriteFrame.setImage(imageStates.get(1));

        spriteFrame.setScaleX(1);

    }

    if(invinciBagel.isLeft()) {

        spriteFrame.setImage(imageStates.get(1));

        spriteFrame.setScaleX(-1);

    }

    ```


    ![9781484204160_Fig13-05.jpg](OEBPS/Images/9781484204160_Fig13-05.jpg)


    [Figure 13-5](#9781484204160_Ch13.xhtml#_Fig5). Add a .setScaleX() method call
    to the .isRight() and .isLeft() evaluations to flip the sprite around the Y axis


    As you can see in [Figure 13-5](#9781484204160_Ch13.xhtml#Fig5), your Java code
    is still error-free. It is interesting to note that we are calling the sprite
    mirroring method on the **spriteFrame ImageView** object, and not on the Image
    assets inside of this ImageView. This is of tantamount importance, because it
    means that we can use this one single line of code inside of .isRight() and .isLeft()
    to flip whatever sprite state (image) is showing inside of an ImageView! That’s
    highly optimized programming!


    Now that our sprite mirroring code is in place, we need to take care of the issue
    of having the run cycle that is implemented by alternating imageStates(1) and
    imageStates(2) accomplished using our conditional if() processing.


    Animating Your Run Cycle: Creating a Nested If-Else Structure'
  trans: '

    正如你在第 8 章中所见，我将尝试仅使用两个精灵帧——imageState(1)和 imageState(2)来实现角色的奔跑动画状态。无论从图像资源角度还是编码角度来看，这都是一种极致优化，你很快就会明白。尤其考虑到你无法用单个图像状态来制作奔跑循环这样的动画。话虽如此，在本章中，我们将通过精心设计的单帧精灵状态，结合我们在第
    12 章中编写的精灵运动代码，创建大量非常逼真的动画。**if(invinciBagel.isRight())** 和 **if(invinciBagel.isLeft())**
    语句结构最初会非常简单直接，但随着我们在本章中逐步添加优化功能，它们会变得复杂得多。我们将首先为这些功能奠定基础，然后添加上下方向的 if() 条件语句，之后我们还会优化左右方向的
    KeyEvent 处理。在左右箭头键（以及 A 和 D 键移动）的 if() 结构中，我们将使用与第一个（待机状态）if() 结构相同的**链式方法**调用，只不过这里我们将从
    `List<Image>` 对象中调用 imageStates(1) 或 imageStates(2) 精灵帧，而不是使用 imageStates(0) 精灵帧。当按下右键或左键（条件为真）时，将精灵图像状态更改为状态
    1 或 2 的 Java 代码如下所示：


    ```

    if(invinciBagel.isRight()) {

        spriteFrame.setImage(imageStates.get(1));

    }

    if(invinciBagel.isLeft()) {

        spriteFrame.setImage(imageStates.get(2));

    }

    ```


    如图 13-3 所示，Java 代码没有错误，我们可以使用 **运行 > 项目** 工作流程来测试这个初步的奔跑模式。如果你快速连续按下左右箭头键，你会看到
    InvinciBagel 在奔跑！


    ![9781484204160_Fig13-03.jpg](img/9781484204160_Fig13-03.jpg)


    图 13-3. 添加检查左右移动的条件 if() 语句，并设置奔跑精灵图像状态


    由于这不是我们想让游戏玩家控制 InvinciBagel 奔跑的方式（因为这种方式的本质会阻止它在屏幕上移动，而且这实在太逊了），让我们快速添加上下方向键的支持，这样我们就能回过头来优化左右方向键，让奔跑循环正常工作！


    InvinciBagel 飞行状态：如果按键按下，设置 imageState(3 & 4)


    **if(invinciBagel.isDown())** 和 **if(invinciBagel.isUp())** 条件 if() 结构与左右方向键的结构完全相同，只是它们调用的是
    **imageStates(3)** 和 **imageStates(4)** 列表元素，分别让 InvinciBagel 角色“降落”（帧 3）和“起飞飞行”（帧
    4）。随着我们在本章中添加更多的 imageStates，并将这个帧动画代码与我们的运动和边界代码结合起来，测试本章的编码结果会变得越来越有趣！如果你想走程序员捷径，可以复制粘贴
    .isRight() 和 .isLeft() 结构，然后将 .get(1) 和 .get(2) 简单地改为 .get(3) 和 .get(4)。如图 13-4
    所示，代码目前非常紧凑、组织良好、结构清晰且逻辑性强；仅用六行 Java 代码，我们就已经实现了九个图像状态中的一半以上！当然，我们还需要添加优化代码，以实现方向变化的精灵镜像和奔跑循环的时序优化。.isUp()
    和 .isDown() 方法结构的 Java 代码如下所示：


    ```

    if(invinciBagel.isDown()) {

        spriteFrame.setImage(imageStates.get(3));

    }

    if(invinciBagel.isUp()) {

        spriteFrame.setImage(imageStates.get(4));

    }

    ```


    ![9781484204160_Fig13-04.jpg](img/9781484204160_Fig13-04.jpg)


    图 13-4. 添加上下移动的条件 if() 语句，并设置跳跃/降落精灵图像状态


    如图 13-4 所示，我们的代码没有错误，可以准备为左右箭头键事件处理代码增加几层复杂性，因为这两个键定义了 InvinciBagel 的移动方向（东和西）。因此，这两个条件
    if() 语句结构尤其需要变得更复杂，因为向东（向右）移动将使用原始（isFlipH = false）精灵，而向西（向左）移动将使用每个精灵的镜像版本（isFlipH
    = true），即围绕中心 Y 轴“翻转”图像资源。


    镜像精灵：将图像资源从 9 个翻倍到 36 个


    现在让我们回到现有的 .isLeft() 和 .isRight() 条件判断语句中，这些语句在本章中会变得相当“健壮”（复杂），并添加我们的精灵镜像功能。JavaFX
    API 的镜像功能“隐藏”在 ImageView 类的 .setScaleX() 方法调用中。虽然我们不会缩放图像资源，因为这样做会在我们原始的 PNG32
    图像资源中产生伪影，但有一个鲜为人知的技巧：你可以向 .setScaleX() 方法传递一个 **-1**（负 100% 缩放因子）值，以围绕 Y 轴翻转或镜像图像资源（或者向
    .setScaleY() 方法传递该值，以围绕 X 轴翻转或镜像）。显然，我们还需要在另一个条件 if() 结构中通过向同一个方法调用传递 1（正 100%
    缩放因子）来“撤销”这个操作，这通常看起来没什么意义（因为我们的图像缩放已经是 100%，即未缩放），但考虑到之前可能设置了 -1 的缩放翻转因子，这样做是为了确保禁用镜像，并再次使用该特定状态的原始精灵图像资源。你新升级的、实现精灵镜像的
    Java 语句现在应如下所示，该代码也在图 13-5 中高亮显示：


    ```

    if(invinciBagel.isRight()) {

        spriteFrame.setImage(imageStates.get(1));

        spriteFrame.setScaleX(1);

    }

    if(invinciBagel.isLeft()) {

        spriteFrame.setImage(imageStates.get(1));

        spriteFrame.setScaleX(-1);

    }

    ```


    ![9781484204160_Fig13-05.jpg](img/9781484204160_Fig13-05.jpg)


    图 13-5. 在 .isRight() 和 .isLeft() 判断中添加 .setScaleX() 方法调用，以围绕 Y 轴翻转精灵


    如图 13-5 所示，你的 Java 代码仍然没有错误。有趣的是，我们是在 **spriteFrame ImageView** 对象上调用精灵镜像方法，而不是在这个
    ImageView 内部的图像资源上调用。这一点至关重要，因为这意味着我们可以在 .isRight() 和 .isLeft() 中使用这一行代码来翻转 ImageView
    中显示的任何精灵状态（图像）！这是高度优化的编程！


    现在我们的精灵镜像代码已经就位，我们需要处理奔跑循环的实现问题，即通过交替使用 imageStates(1) 和 imageStates(2)，并利用我们的条件
    if() 处理来完成。


    动画化你的奔跑循环：创建嵌套的 If-Else 结构

