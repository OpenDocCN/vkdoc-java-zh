- fmt: '# Let’s Build on Java Knowledge with JavaFX 8


    Let’s build on the knowledge of the Java programming language that you gained
    in the previous chapter here in [Chapter 4](#9781484204160_Ch04.xhtml), by learning
    about the capabilities, components, and classes that make up the **JavaFX 8**
    multimedia engine. This amazing JavaFX 8 API was added to Java 8 using the `javafx`
    package that you saw in [Chapters 2](#9781484204160_Ch02.xhtml) and [3](#9781484204160_Ch03.xhtml),
    which was released with Java 8. The JavaFX 8 package is significant to game programming
    because it contains advanced forms of classes that you will want to harness for
    game programming, including classes for organizing game components, using a **scene
    graph**; classes for **user interface** layout and design; classes for 2D **digital
    illustration** (also called vector graphics); and classes for **digital imaging**
    (also called raster graphics); 2D **animation**; **digital video**; **digital
    audio**; **3D**; a **web engine** (WebKit); and much more, all of which I will
    be covering in this chapter, so that you know exactly what you have available
    to you, now that these JavaFX 8 libraries have been added into the Java 8 programming
    language.


    The rationale for going into such detail is not only so that you know what JavaFX
    8.0 can do for your Java 8 game development, but also so that you have an overview
    of how the various components of this JavaFX multimedia engine are put together.
    You will learn about the JavaFX **Quantum** Toolkit, the **Prism** rendering technology,
    the **WebKit** web engine, the **Glass** Windowing Toolkit, the audio and video
    **Media** engine, and the Scene Graph API.


    The reason you will need this high-level overview of how JavaFX works before you
    actually start to use it in your games is because it is a fairly complex set of
    APIs (I like to call it an **engine**). This is due to the power that it brings
    to implementing user interface (UI) and user experience (UX) “wins” in your Java
    8 applications (in this case, games). So, bear with me in these foundational chapters
    detailing how to master your IDE (NetBeans 8.0), your programming language (Java
    8), and this new media engine (JavaFX 8) that is now a part of the Java 8 programming
    platform that is rapidly growing in power and popularity internationally.


    Once you have examined how JavaFX 8.0 comes together at the highest level (just
    like you did in [Chapter 3](#9781484204160_Ch03.xhtml)), you will consider some
    of those key classes that you might be using to construct Java 8 games, such as
    the `Node` class as well as the `Stage`, `Scene`, `Group`, `StackPane`, `Animation`,
    `Layout`, `Shape`, `Geometry`, `Control`, `Media`, `Image`, `Camera`, `Effect`,
    `Canvas`, and `Paint` classes. You have already studied the JavaFX `Application`
    class (see [Chapters 2](#9781484204160_Ch02.xhtml) and [3](#9781484204160_Ch03.xhtml)),
    so now you will focus on the classes that can be used to build complex multimedia
    projects, such as Java 8 games.


    Finally, you will take an in-depth look at the bootstrap JavaFX application that
    you generated in [Chapter 2](#9781484204160_Ch02.xhtml), and at how the Java `.main()`
    method and the JavaFX `.start()` method create the `primaryStage` Stage object,
    using the `Stage()` constructor method, and, inside of that, create your Scene
    object named `scene`, using the `Scene()` constructor method. You will explore
    how to use methods from the Stage class to set the `scene` and title and show
    the `Stage` as well as how to create and use the `StackPane` and `Button` class
    (objects), and add an `EventHandler` to a `Button`.


    ## Overview of JavaFX: From Scene Graph Down to OS


    As in the previous chapter, on Java 8, I am starting this overview of JavaFX at
    the highest level, with the **Scene Graph API** and with visual editing tools,
    which are contained in a JavaFX application called **Scene Builder**, which we
    will not be using (Scene Builder is for application UI design not game design);
    we will use GIMP instead. As you observed in [Chapter 1](#9781484204160_Ch01.xhtml)
    (see [Figure 1-5](#9781484204160_Ch01.xhtml#Fig5)), Scene Builder is integrated
    into NetBeans 8.0 (JavaFX is listed as being supported specifically for use in
    NetBeans, primarily because Scene Builder has been made an integral part of NetBeans
    GUI).


    As [Figure 4-1](#9781484204160_Ch04.xhtml#Fig1) demonstrates, these JavaFX application-building
    tools exist “**on top of**” the **JavaFX 8 API** (a collection of `javafx` packages,
    such as `javafx.scene` and `javafx.application`), which is what ultimately allows
    you to build (using Scene Graph) and UI design (using Scene Builder) your JavaFX
    new media creations (in this case, a Java 8 game). Note that the JavaFX 8.0 API
    is connected (here, using steel bearings, to denote plugs) not only to Scene Graph
    and Scene Builder, **above it**, but also to Java JDK 8 and the Quantum Toolkit,
    **below it**. As you can see, Java JDK 8 (and APIs) then connects the JavaFX new
    media engine to NetBeans, the JVM, and the various platforms that Java currently
    supports as well as to future platforms, such as Android 4 (32-bit Android), Android
    5 (64-bit Android) and iOS.


    ![9781484204160_Fig04-01.jpg](OEBPS/Images/9781484204160_Fig04-01.jpg)


    [Figure 4-1](#9781484204160_Ch04.xhtml#_Fig1). How JavaFX 8 is stratified, from
    the Scene Graph at the top down through Java 8, NetBeans 8.0, JVMs, and OSs


    The **Quantum Toolkit**, which is connected to the JavaFX 8.0 API, ties together
    all the powerful new media engines that you are going to be learning about. The
    Quantum Toolkit also handles the **thread management** for all of these, so your
    game code, and your game’s new media (audio, video, 3D, and so on), can use separate
    processors on the **dualcore, quadcore, hexacore and octacore** CPUs that are
    so commonplace in today’s computers and consumer electronics devices.


    The **Glass Windowing Toolkit** controls **window management** for JavaFX 8.0,
    and is responsible for all of the discrete areas on the display screen, such as
    the **stage** and **pop-up** windows, including dialogs. Glass also manages the
    **event processing queue**, passing events up to JavaFX for processing, and sets
    up **timers**.


    As you can see in the figure, there is also a **WebKit** engine and a **Media**
    (player) engine, which are managed by the Quantum Toolkit. The WebKit engine renders
    your HTML5 and CSS3 web content, and the media player media playback engine plays
    your digital audio and digital video assets, respectively.


    The most important new media engine below the Quantum Toolkit is the **Prism**
    (game) engine, which renders 2D content, using **Java 2D**, and 3D content, using
    either **OpenGL** (Mac, Linux, Embedded OSs) or **DirectX** if your users are
    on the Windows Vista, Windows 7, or Windows 8.1 platform. Windows XP support was
    discontinued in April 2014, as most computers and consumer electronics devices
    out now are 64-bit capable (XP was 32-bit only).


    Prism bridges the powerful 3D game engines (DirectX, OpenGL) that are on the major
    OS platforms as well as on consumer electronics (embedded) devices so JavaFX 8.0
    can **offload** complex rendering task processing to **graphics processing unit**
    (**GPU**) **hardware** from NVIDIA (GeForce), AMD (ATI Radeon), and Intel. This
    makes JavaFX (and thus Java 8) games faster and allows games to use less CPU processing
    power for rendering game assets to the screen. This in turn allows more CPU processing
    power be used for game play logic, such as AI and collision detection. You will
    be learning about these areas of game design after you master the JavaFX engine
    in this fourth chapter of the book.'
