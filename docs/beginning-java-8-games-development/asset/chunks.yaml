- fmt: '# Chád Darby


    **Chád (shod) Darby** is an author, instructor, and speaker in the Java development
    world. As a recognized authority on Java applications and architectures, he has
    presented technical sessions at software development conferences worldwide (United
    Kingdom, India, Russia, and Australia). In his fifteen years as a professional
    software architect, he’s had the opportunity to work for Blue Cross/Blue Shield,
    Merck, Boeing, Red Hat, and a handful of startup companies.


    Chád is a contributing author to several Java books, including *Professional Java
    E-Commerce* (Wrox Press), *Beginning Java Networking* (Wrox Press), and *XML and
    Web Services Unleashed* (Sams Publishing). Chád has Java certifications from Sun
    Microsystems and IBM. He holds a B.S. in Computer Science from Carnegie Mellon
    University.


    Visit Chád’s blog at [www.luv2code.com](http://www.luv2code.com) to view his free
    video tutorials on Java. You can also follow him on Twitter @darbyluvs2code.


    ## Acknowledgments


    I would like to acknowledge all my fantastic Editors, and their support staff
    at Apress, who worked those long hours and toiled so very hard on this book, to
    make it the ultimate Absolute Beginner Android application production book title.


    **Steve Anglin**, for his work as the **Lead Editor** on the book, and for recruiting
    me to write programming titles at Apress covering the most popular open source
    application development platforms (Android and Java).


    **Matthew Moodie**, for his work as the **Development Editor** on the book, and
    for his experience and guidance during the process of making this book one of
    the great Java 8 Game Development titles currently on the market.


    **Mark Powers**, for his work as the **Coordinating Editor** on the book, and
    for his constant diligence in making sure I either hit my chapter delivery deadlines
    or surpassed them.


    **Lisa Vecchione** and **Karen Jameson**, for their work as the **Copy Editors**
    for the book, and for their careful attention to excruciatingly minute details,
    and for conforming the text to the current Apress book writing standards.


    **Chád Darby**, for his work as the **Technical Reviewer** on the book, and for
    making sure that I did not make any Java programming mistakes, because Java code
    with mistakes does not run properly, if at all, unless the Java code includes
    very lucky mistakes, which is quite rare in computer programming these days.


    **Anna Ishchenko**, for her work as the **Book Cover Designer** for the book,
    and for creating the graphic design for the book cover that brings it into conformance
    with other popular Apress Java 8 and JavaFX 8 programming titles.


    **Ira H. Harrison Rubin**, a friend and client, and one of the world’s finest
    and most respected comic book and comic strip authors, for allowing us to use
    some of his BagelToons IP (intellectual property), specifically an InvinciBagel
    concept, to use as a platform to show our readers how a game can be created around
    an actual client’s intellectual property. Be sure not to create your own InvinciBagel
    game without checking with Mr. Rubin regarding using his intellectual property!


    **Patrick Harrington**, a friend and client, and one of the world’s finest caricature
    artists, for creating the 2D assets for the InvinciBagel game, and allowing me
    to use some of them to show how to create a basic Java 8 game engine.


    **Andreas Loew**, a fellow Apress author, for allowing me to use his CodeAndWeb
    GmbH product PhysicsEditor, or PhysEd, in [Chapter 16](#9781484204160_Ch16.xhtml)
    of the book to show an alternate professional collision polygon development tool
    work process.


    Finally, I’d like to acknowledge **Oracle** for acquiring Sun Microsystems, and
    continuing to enhance Java 8, so that it remains the premiere open source programming
    language, and for acquiring the JavaFX new media engine, and making it a part
    of Java 8, so that existing Java applications can be "gamified" and made "edutainment"
    friendly.


    ## Introduction


    The Java Programming Language is currently the most popular object-oriented (OOP)
    programming language in the world today. Java runs on everything from SmartWatches
    to HD Smartphones to Touchscreen Tablets to eBook Readers to Game Consoles to
    SmartGlasses to Ultra-High Definition (UHD) 4K Interactive Television Sets, with
    even more types of consumer electronics devices, such as those found in the automotive,
    appliances, health care, digital signage, security, and the home automation market,
    increasingly adopting the open source Java platform for use in their hardware
    devices as time goes on.


    Since there are literally billions of Java compatible consumer electronics devices,
    owned by billions of users all over the world, it stands to reason that developing
    popular Java 8 Games for all of these people could be an extremely lucrative undertaking,
    given that you have the right game concept, artwork, game design, and optimization
    work process, of course.


    Java 8 (and its multimedia engine, JavaFX 8) code can run on just about every
    operating system out there, including Windows XP; Vista, 7, 8, and 9; all Linux
    distributions; 32-bit Android 4 and 64-bit Android 5; Open Solaris; Macintosh
    OS/X, iOS; Symbian, and Raspberry Pi – it’s only a matter of time before the other
    popular OSes add support for this popular open source programming language. Additionally,
    every popular Internet browser has Java built in! Java provides the ultimate flexibility
    in installing software, as an application, or in the browser as an applet. You
    can even drag a Java application right out of the browser, and have it install
    itself on that user’s desktop! Java 8 is a truly remarkable technology.


    There are a plethora of embedded and desktop hardware support levels currently
    for Java 8 (and for JavaFX 8.0) including the full Java SE 8, Java SE 8 Embedded,
    Java ME (Micro Edition) 8, and Java ME 8 Embedded, as well as Java EE 8 for Enterprise
    Application Development. Talk about being able to "code once, deliver everywhere!"
    That is the dream of every programmer, and Oracle is making it a reality with
    the powerful Java 8 multimedia programming platform.


    This book will go a long way toward helping you to learn exactly how to go about
    developing Java 8 games, using the Java programming language in conjunction with
    the recently added JavaFX 8.0 multimedia engine. These Java 8 game applications
    will be able to run across a plethora of Java compatible consumer electronics
    devices. Developing Java 8 game applications that play smoothly across all of
    these different types of consumer electronics devices requires a very specific
    work process, including asset design, game code design, and optimization, all
    of which I will be covering during this book.


    I wrote the *Beginning Java 8 Game Development* title from scratch, using a real-world
    client game project that I am actually working on, and will be delivering to the
    public sometime in 2015. I am targeting those readers who are Beginning Game Developers,
    and who had not coded in Java 8 and JavaFX 8.0. These readers are technically
    savvy, but they are not that familiar with object-oriented computer programming
    concepts and techniques. Since Java is now at Version 8u40, this book will be
    more advanced than many of the other Java books out there. Java 8 has added some
    very advanced features, such as the JavaFX 8.0 API, which gives Java 8 its own
    multimedia engine, supporting SVG, 2D, 3D, audio, and video media.'
  raw: '**Chád (shod) Darby** is an author, instructor, and speaker in the Java development
