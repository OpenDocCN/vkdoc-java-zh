    public class InvinciBagel extends Application {

        class SplashScreen {

            // 创建并显示启动画面的 Java 代码写在这里

        }

    }

    ```


    这种**访问控制**级别被称为**包**或**包私有**，是应用于任何类、接口、方法或数据字段的默认访问控制级别，前提是这些元素在声明时没有使用其他 Java
    访问控制修饰符**关键字**（public、protected、private）。这种类型的内部类不仅可以被顶层类或包含类访问，还可以被包含该类的包中的任何其他类成员访问。这是因为包含类被声明为
    public，而内部类被声明为包私有。如果你希望内部类在包外部也可用，你可以使用以下 Java 代码结构将其声明为 **public**：


    ```

    public class InvinciBagel extends Application {

        public class SplashScreen {

            // 创建并显示启动画面的 Java 代码写在这里

        }

    }

    ```


    你也可以将内部类声明为 **protected**，这意味着它只能被父类的任何子类访问。如果你在一个不是类的较低级 Java 编程结构（例如方法或迭代控制结构（通常称为循环））内部声明一个类，那么它在技术上被称为**局部类**。局部类仅在该代码块内部可见；因此，它不允许（或者说使用）类修饰符（如
    static、public、protected 或 private）是没有意义的。局部类的使用方式类似于**局部变量**，不同之处在于它是一个复杂的 Java
    编码结构，而不是一个在本地使用的简单数据字段值。


    最后，还有一种内部类叫做**匿名类**。匿名类是一个没有给定类名的局部类。你遇到匿名类的频率可能远高于局部类。这是因为程序员通常不会为他们的局部类命名（使其成为匿名类）；局部类包含的逻辑仅在**局部**（即其声明处）使用，因此这些类实际上不需要有名称——它们只在那个
    Java 代码块内部被引用。


    Java 方法：核心 Java 函数代码结构


    在类内部，通常有方法以及这些方法使用的数据字段（变量或常量）。因为我们是从外到内，或者说是从顶层结构到较低层结构，所以我接下来将介绍方法。方法在其他编程语言中有时被称为函数。图
    3-2 提供了一个 **.start()** 方法的示例，展示了该方法如何持有创建基本“Hello World！”应用程序的编程逻辑。方法内部的编程逻辑使用
    Java 编程语句来创建一个 Stage 对象和一个 Scene 对象，在屏幕上的一个 **StackPane** 对象中放置一个按钮，并定义事件处理逻辑，使得当按钮被点击时，引导
    Java 代码将“Hello World！”文本写入你的 NetBeans IDE 输出区域。


    方法声明以访问修饰符关键字开头，可以是 public、protected、private 或包私有（通过不使用任何访问控制修饰符来指定）。正如你在图中看到的，**.start()**
    方法已使用 public 访问控制修饰符进行了声明。

