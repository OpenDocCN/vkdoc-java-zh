- fmt: '在这种情况下，`Fuzzy Select`工具正在选择透明度值。实际上，您应该注意到，您必须通过`Fuzzy Select Tool Options`对话框选择一个选项来选择图像中的透明区域，该对话框位于`Toolbox
    Tool Options`浮动面板的底部。如您所见，我已指示`GIMP`不仅“查看”图像中的`RGB`通道，还通过选择“`Select transparent
    areas`”选项来查看`Alpha`通道。


    现在，我们已设置了包含除我们想要选择的精灵角色之外的所有内容的选区，我们需要找到一种方法来获取当前选中内容的相反部分。诚然，选择透明区域比尝试选择`InvinciBagel`角色的不同颜色区域要容易得多！幸运的是，`GIMP`有一种算法可以完全**反转**选区，选择所有未选中的内容，并取消选择所有已选中的内容。


    在`GIMP 2.8`的**`Select`**菜单下，找到**`Invert`**选项，或者使用**`Control+I`**键盘快捷键，该快捷键显示在菜单中`Invert`选项旁边，所有这些都可以在[图16-3](#9781484204160_Ch16.xhtml#Fig3)的左半部分看到。完成此操作后，您会注意到动画的“行军蚁”不再围绕数字图像的方形边界（范围）移动，而只围绕`InvinciBagel`角色移动，这意味着选区已被反转，我们想要选择的内容现在包含在选区中。


    ![9781484204160_Fig16-03.jpg](OEBPS/Images/9781484204160_Fig16-03.jpg)


    [图16-3](#9781484204160_Ch16.xhtml#_Fig3)。使用**`Select`** ![image](OEBPS/Images/arrow.jpg)
    **`Invert`**反转选区，以便仅选中角色（左）；使用**`Select`** ![image](OEBPS/Images/arrow.jpg) **`To
    Path`**转换为路径


    下一步是将这个光栅像素选区集合（数组）转换为矢量（路径）数据表示。我们在`GIMP`中执行此操作的方法是使用**`Select`** ![image](OEBPS/Images/arrow.jpg)
    **`To Path`**菜单序列，如[图16-3](#9781484204160_Ch16.xhtml#Fig3)的右半部分所示。这会将围绕`InvinciBagel`角色的选区转换为矢量路径数据，这正是我们想要提取的。


    一旦将像素选区转换为矢量路径，您将得到如[图16-4](#9781484204160_Ch16.xhtml#Fig4)所示的结果。


    ![9781484204160_Fig16-04.jpg](OEBPS/Images/9781484204160_Fig16-04.jpg)


    [图16-4](#9781484204160_Ch16.xhtml#_Fig4)。在`Paths`面板中右键单击`Selection`路径，然后选择`Export
    Path`


    在另一个浮动面板中，点击**`Paths`**选项卡，如[图16-4](#9781484204160_Ch16.xhtml#Fig4)右侧所示。`GIMP`有两个主要的浮动工具窗口：一个是`GIMP`**`Toolbox`**，包含**`Tools`**、**`Options`**、**`Brushes`**、**`Patterns`**和**`Gradients`**；另一个包含**四个选项卡**，代表您数字图像的合成**`Layers`**、**`Channels`**、选择**`Paths`**，甚至还有一个**`Undo
    Buffer`**，它为您提供了自启动`GIMP`以来所做的每一次“操作”的“历史记录”。


    选择名为**`Selection`**的路径（名为`Selection`的路径图层将变为蓝色）。接下来，右键单击名为`Selection`的路径，在针对该`Selection`路径可执行的操作菜单底部，您会看到一个**`Export
    Path`**菜单选项。这是另一个关键的`GIMP`算法，它使我们能够实现碰撞多边形的创建和输出工作流程。


    选择此`Export Path`选项将为我们将当前的`InvinciBagel`角色`Selection`路径数据导出为一个包含`SVG`数据的基于文本的（`XML`）文件，这正是我们在`Bagel()`构造函数方法调用中需要使用的。此数据将包含在第一个**`String
    SVGdata`**参数中，并将替换我们迄今为止一直用作占位符的“虚拟数据”。


    一旦您调用`Export Path`菜单选项，您将看到`Export Path to SVG`对话框，如[图16-5](#9781484204160_Ch16.xhtml#Fig5)所示。如您所见，我选择了对话框底部的“`Export
    the active path`”选项，因为我只想要一个碰撞多边形路径数据对象，并且我将此文件命名为**`sprite1svgdata.svg`**，并将其保存在我的**`C:\Clients\BagelToons\InvinciBagelGame\Shape_Data`**文件夹中。


    ![9781484204160_Fig16-05.jpg](OEBPS/Images/9781484204160_Fig16-05.jpg)


    [图16-5](#9781484204160_Ch16.xhtml#_Fig5)。在`Export Path to SVG`对话框中，选择“`Export
    the active path`”选项，并将文件命名为`sprite1svgdata`


    工作流程的下一步是在文本编辑器中打开我们在[图16-5](#9781484204160_Ch16.xhtml#Fig5)中导出的**`sprite1svgdata.svg`**文件：对于`Windows`用户，将是**`Notepad`**；对于`Macintosh`用户，将是**`TextEdit`**；对于`Linux`用户，则可能是**`vi`**或**`vim`**。


    [图16-6](#9781484204160_Ch16.xhtml#Fig6)显示了`Windows` `Notepad`的**`Open`**文件对话框，您可能会注意到，默认情况下，`Notepad`会查找**`.txt`**（**文本文件类型**）文件扩展名，这表示该文件内部包含**文本数据**。然而，`.svg`文件扩展名（类型）内部也包含文本数据，形式为`XML`数据。我们需要使用对话框右下角的下拉菜单来告诉`Notepad`查看所有可用的文件，并允许我们决定哪些文件包含文本数据，哪些不包含。


    ![9781484204160_Fig16-06.jpg](OEBPS/Images/9781484204160_Fig16-06.jpg)


    [图16-6](#9781484204160_Ch16.xhtml#_Fig6)。使用文本编辑器（如`Notepad`），选择“`All Files`”选项，然后打开`sprite1svgdata`


    一旦您选择了“`All Files`”选项，您将看到**`sprite1svgdata`**文件，您可以双击打开该文件（或单击选中它，然后点击**`Open`**按钮）。


    如果您想在`Java`代码中使用这些数据，只需选择**`d =`**（**数据等于**）之后引号内的部分，包括引号（您需要用引号来表示一个`String`），如[图16-7](#9781484204160_Ch16.xhtml#Fig7)中以蓝色选中的部分所示。


    ![9781484204160_Fig16-07.jpg](OEBPS/Images/9781484204160_Fig16-07.jpg)


    [图16-7](#9781484204160_Ch16.xhtml#_Fig7)。选择`SVG`路径表示的`SVG`数据（包括引号字符），并在您的代码中使用它


    如您在[图16-7](#9781484204160_Ch16.xhtml#Fig7)中所见，有32乘以3个数据对，接近100个数据点，这是需要处理的大量数据，尤其是当两个都定义了`SVGPath`碰撞检测数据的对象发生碰撞时！


    如果您查看[图16-4](#9781484204160_Ch16.xhtml#Fig4)中的`InvinciBagel`角色，我们实际上应该能够用14到16条线定义一个完美包围角色的碰撞多边形，并使用少得多（实际上少16倍，正如您将在本章下一节中看到的）的数据，这相当于少占用16倍的内存和16倍的处理开销（效率提高1600%），甚至更多。


    因此，我想向您展示在`GIMP`中定义您自己的**自定义**碰撞多边形`SVG`数据形状对象的更复杂的工作流程，使用尽可能少的线条（数据点之间）。这本质上等同于**碰撞检测`SVG`路径形状数据优化**，既然我已经向您展示了其他新媒体元素的数据优化工作流程，那么现在没有理由停止这个趋势！因此，接下来，让我们在本章的下一节中详细探讨如何将我们的碰撞检测`SVG`路径形状数据开销减少1600%。


    ### 创建优化的碰撞多边形：使用路径工具'
  raw: 'In this case, the Fuzzy Select tool is selecting transparency values. In fact,
    you should notice that you have to select an option to select transparent areas
    in an image, using the Fuzzy Select Tool Options dialog, which can be seen at
    the bottom of the Toolbox Tool Options floating palette. As you can see, I have
    instructed GIMP to not only “look” at the RGB plates in the image, but also to
    look at the Alpha plate, by selecting the “Select transparent areas” option.


    Now that we have that selection set that contains everything except the sprite
    character that we wanted to select, we need to figure out a way to get the opposite
    of what we now have selected. Selecting the transparent areas was admittedly much
    easier than trying to select the different colored areas of the InvinciBagel character!
    Fortunately GIMP has an algorithm that **inverts** the selection completely, selecting
    everything that is not selected, and deselecting everything that is selected.


    Under the GIMP 2.8 **Select** menu, find the **Invert** option, or, use the **Control+I**
    keyboard shortcut, shown on the menu next to the Invert option, all of which can
    be seen on the left half of [Figure 16-3](#9781484204160_Ch16.xhtml#Fig3). Once
    you do this you will notice that the animated “marching ants” no longer march
    around the square perimeter (extents) of the digital image and that they are only
    around the InvinciBagel character, which means that the selection has been inverted
    and what we wanted to select is now contained in the selection set.


    ![9781484204160_Fig16-03.jpg](OEBPS/Images/9781484204160_Fig16-03.jpg)


    [Figure 16-3](#9781484204160_Ch16.xhtml#_Fig3). Invert selection using Select
    ![image](OEBPS/Images/arrow.jpg) Invert, so only Actor is selected (left); use
    Select ![image](OEBPS/Images/arrow.jpg) To Path to convert to path


    The next step is to convert this raster pixel selection set (array) into a vector
    (path) data representation. The way that we do this in GIMP is to use the **Select
    ![image](OEBPS/Images/arrow.jpg) To Path** menu sequence, seen on the right half
    of [Figure 16-3](#9781484204160_Ch16.xhtml#Fig3). This will convert the selection
    that is around the InvinciBagel character to vector path data, which is what we
    want to cull.


    Once you convert the pixel selection into a vector path, you will get the result
    that is shown in [Figure 16-4](#9781484204160_Ch16.xhtml#Fig4).


    ![9781484204160_Fig16-04.jpg](OEBPS/Images/9781484204160_Fig16-04.jpg)


    [Figure 16-4](#9781484204160_Ch16.xhtml#_Fig4). Right-click on Selection Path
    in Paths Palette, and Export Path


    In the other floating palette, click on the **Paths Tab**, shown on the right
    side of [Figure 16-4](#9781484204160_Ch16.xhtml#Fig4). GIMP has two, primary floating
    tool windows; one is the GIMP **Toolbox**, containing **Tools**, **Options**,
    **Brushes**, **Patterns**, and **Gradients**, and the other contains **four tabs**,
    which represent your digital image’s compositing **Layers**, **Channels**, Selection
    **Paths**, and even an **Undo Buffer**, which gives you a “history” of every “move”
    you have made in GIMP since you launched it.


    Select the Path named **Selection** (the Path layer named Selection will then
    turn blue). Next right-click on the Path named Selection, and at the bottom of
    that menu of things that you can do to the Selection Path, you will see an **Export
    Path** menu option. This is another one of the key GIMP algorithms that enables
    this collision polygon creation and output work process for us.


    Selecting this Export Path option will export the current InvinciBagel character
    Selection Path data for us, as a text-based (XML) file containing SVG data, which
    is what we need to use in our Bagel() constructor method call. This data will
    be contained in the first **String SVGdata** parameter, and will replace our “dummy
    data” that we have been using as a placeholder thus far.


    Once you invoke the Export Path menu option, you will see the Export Path to SVG
    dialog, which is shown in [Figure 16-5](#9781484204160_Ch16.xhtml#Fig5). As you
    can see, I’ve selected the “Export the active path” option, at the bottom of the
    dialog, since I only want to have one collision polygon path data object, and
    I am naming this file **sprite1svgdata.svg**, and I am saving it in my **C:\Clients\BagelToons\InvinciBagelGame\Shape_Data**
    folder.


    ![9781484204160_Fig16-05.jpg](OEBPS/Images/9781484204160_Fig16-05.jpg)


    [Figure 16-5](#9781484204160_Ch16.xhtml#_Fig5). Select “Export the active path”
    option, in the Export Path to SVG dialog, and name the file sprite1svgdata


    The next step in the work process is to open the **sprite1svgdata.svg** file that
    we are exporting in [Figure 16-5](#9781484204160_Ch16.xhtml#Fig5) in a text editor:
    for Windows users that will be **Notepad**, for Macintosh users that will be **TextEdit**,
    and for Linux users it will probably be **vi** or **vim**.


    [Figure 16-6](#9781484204160_Ch16.xhtml#Fig6) shows the File **Open** dialog for
    Windows Notepad, and you may notice that by default, Notepad will look for the
    **.txt** (**Text file type**) file extension, which indicates that there is **text
    data** inside of that file. However, there is also text data inside of the .svg
    file extension (type), in the form of XML data. We need to use the drop-down menu
    at the bottom right of the dialog to tell Notepad to look at all files that are
    available, and to allow us to decide which of them contain text data, and which
    do not.


    ![9781484204160_Fig16-06.jpg](OEBPS/Images/9781484204160_Fig16-06.jpg)


    [Figure 16-6](#9781484204160_Ch16.xhtml#_Fig6). Use a text editor (like Notepad)
    and select “All Files” option and Open sprite1svgdata


    Once you select the “All Files” option, you will see the **sprite1svgdata** file,
    and you can double-click on it to open the file (or single click on it to select
    it, and then click on the **Open** button).


    If you want to use this data in your Java code, simply select the part after the
    **d =** (**data equals**) in quotation marks, including the quotation marks, which
    you will need to denote a String, as seen selected in blue in [Figure 16-7](#9781484204160_Ch16.xhtml#Fig7).


    ![9781484204160_Fig16-07.jpg](OEBPS/Images/9781484204160_Fig16-07.jpg)


    [Figure 16-7](#9781484204160_Ch16.xhtml#_Fig7). Select the SVG data (including
    quote characters) for the SVG Path representation, and use it in your code


    As you can see in [Figure 16-7](#9781484204160_Ch16.xhtml#Fig7), there are 32
    times 3 data pairs, which is close to 100 data points, which is a lot of data
    to process, especially if two objects that both have SVGPath collision detection
    data defined are colliding!


    If you look at the InvinciBagel character in [Figure 16-4](#9781484204160_Ch16.xhtml#Fig4),
    we really should be able to define a collision polygon around the character using
    14 to 16 lines that perfectly encapsulate the character, and use many times less
    (16 times less, in fact, as you will see during the next section of the chapter)
    data, which equates to 16 times less memory, and 16 times less processing (1600%
    higher efficiency) overhead, if not more.


    For that reason, I want to show you the more complex work process in GIMP for
    defining your own **custom** collision polygon SVG data shape object, using as
    few lines (between data points) as possible. This essentially equates to **collision
    detection SVG Path shape data optimization**, and since I’ve been showing you
    the data optimization work process for other new media elements, there is no reason
    to stop that trend now! So next, let’s take a detailed look at how to reduce our
    collision detection SVG Path shape data overhead by 1600% in the next section
    of this chapter.


    Creating an Optimized Collision Polygon: Using the Path Tool'
