    It is important to note that objects created using the Hero class also have access
    to the getter and setter methods that we generated earlier for the Actor class.
    In case you are wondering what the Java keyword **this** means in all of these
    .set() methods, it is referring to the current object that has been created using
    the Actor or Hero class constructor method. Thus if you call the .setBounce()
    method off of the iBagel Bagel object (which we will soon be creating in [Chapter
    10](#9781484204160_Ch10.xhtml)), this keyword is referring to this (iBagel) Bagel
    object instance. So if we wanted to set a 50% bounce factor, we would make the
    following method call using our new .setBounce() setter method:


    ```

    iBagel.setBounce(0.50);

    ```


    Next let’s take a look at how these sprite Actor classes fit in with the other
    classes we have coded during the book so far. After that, we will summarize what
    we have learned so far during this chapter, and we can move on into the future
    chapters in this book, and use these classes to create sprites for our game, as
    we learn how to use sprites for game play.


    Updating the Game Design: How Actor or Hero Fit In


    Let’s update the diagram that I introduced in [Chapter 7](#9781484204160_Ch07.xhtml)
    ([Figure 7-19](#9781484204160_Ch07.xhtml#Fig19)) to include the Actor.java and
    Hero.java classes. As you can see in [Figure 8-16](#9781484204160_Ch08.xhtml#Fig16),
    I had to switch the .update() physics and .collide() collision parts of the diagram,
    as the Actor class only includes the .update() method, and the Hero class includes
    both of these methods. Since the .collide() method will be called in the .update()
    method, I connected these two parts of the diagram with a chrome sphere as well.


    ![9781484204160_Fig08-16.jpg](OEBPS/Images/9781484204160_Fig08-16.jpg)


    [Figure 8-16](#9781484204160_Ch08.xhtml#_Fig16). The current invincibagel package
    class (object) hierarchy, now that we have added Actor and Hero classes


    The **.handle()** method in a GamePlayLoop object will call these **.update()**
    methods, so there is a connection there as well. There are connections between
    the Actor and Hero classes with the InvinciBagel class, as all your game sprite
    objects created using these abstract classes will be declared and instantiated
    from within a method in this class.


    We are making great progress on developing our game engine framework, while at
    the same time, seeing how some of the core features of the Java 8 programming
    language can be implemented to our advantage. We will be looking at the powerful
    new Java 8 **lambda expressions** feature in the next chapter on event handling
    as well, so more knowledge regarding leading-edge Java 8 features is right around
    the (game) bend. I hope you are as excited as I am!


    Summary


    In this eighth chapter, we wrote the second round of the several game engines
    that we will be designing and coding during this book, the **Actor** (fixed sprites)
    superclass, and its **Hero** (motion sprites) subclass. Once we start creating
    our game sprites in [Chapter 10](#9781484204160_Ch10.xhtml) and subsequent chapters,
    the Hero class will also become a superclass. Essentially, during this chapter
    you learned how to create **public abstract classes**, which will be used to define
    our sprite objects from here on out during the book. What this amounts to is doing
    all the heavy lifting (sprite design and coding work) up front for all of the
    actors (sprites) in our game, making the creation of powerful fixed and motion
    sprites for our game much easier for us to do from here on out. We are building
    both our knowledge base and our game engine framework first!


    We first took a look at how these Actor and Hero classes would be designed, as
    well as what types of actual sprite classes we would be creating with them. We
    looked at nine sprite Image assets, and how these covered a wide range of motions
    by using only nine assets, and looked at how to “register” the sprite “states”
    relative to each other.


    Next, we designed and created our Actor superclass, to handle fixed sprites such
    as props and treasure, creating the basic List<Image>, ImageView, SVGPath, iX
    and iY variables and a constructor method that used these to define the fixed
    sprite appearance, position, and collision boundaries. Then we added some additional
    variables that we will be needing for future game design aspects, and learned
    how to have NetBeans write .get() and .set() methods.


    Next, we designed and created our Hero subclass, which extends Actor to handle
    motion sprites such as the InvinciBagel himself and his enemies, as well as projectiles
    and moving challenges. We created the basic constructor method that sets the variables
    from the Actor superclass, this time to define a motion sprites imagery, initial
    position, and collision boundaries. Then we added some additional variables, which
    we will be needing for future game design aspects, and again saw how NetBeans
    will write our .get() and .set() methods for us, which is always fun to watch!'
