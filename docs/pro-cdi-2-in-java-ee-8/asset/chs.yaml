- "# 7. 动态 Bean\n\n如前几章（特别是第 3 章）所述，在 CDI 中，任何可以为其创建 `Bean<T>` 实例的对象都是 bean。CDI 内部会从合适的类和生产者中自动创建此类实例，但也可以直接（以编程方式）创建它们。由于可以即时创建，甚至可以在循环中创建多个，因此它们被称为*动态\
  \ bean*。本章将介绍如何创建和使用此类 bean。\n\n## 为何使用动态 Bean？\n\n动态创建 bean（即直接将 `Bean<T>` 实例添加到运行时）是一个高级主题。许多业务应用程序很少（如果有的话）会强烈需要这样做。对于这些应用程序，CDI\
  \ 从托管 bean 和生产者生成的 bean 基本上涵盖了业务功能的所有方面。\n\n然而，在某些情况下，需要更高的灵活性，这种灵活性主要由第三方库或那些将其他类似\
  \ bean 的系统与 CDI 集成的库（通常称为*连接器*或*桥接器*）所需。\n\n动态创建 `Bean<T>` 可以让你实现经常讨论但从未实现的概念，例如在\
  \ XML 中定义 CDI bean（或者，在撰写本文时的 2019 年，在 JSON 或 YAML 中定义）。这也可以用于小型、自定义的领域特定语言（DSL），用户只需提供少量数据，库即可从中生成更大的（一组）bean。本章稍后将讨论的一个实际示例是在某种程度上模拟泛型生产者；也就是说，将为遇到的每个注入点类型添加\
  \ `Bean<T>` 实例。这种功能无法通过常规的托管 bean 实现（代码生成技术除外，但这会引发另一系列问题）。\n\n## 创建动态 Bean\n\n\
  `Bean<T>` 实例可以通过两种主要方式创建。第一种是直接实现 `javax.enterprise.inject.spi.Bean<T>` 接口；第二种是使用\
  \ CDI API 提供的构建器，以简化此任务，并消除实现 `Bean<T>` 这个相当庞大的接口时固有的一些不确定性。\n\n### 手动实现 Bean<T>\n\
  \n`Bean<T>` 本质上将工厂类型与元数据捆绑在一起。纯工厂方法位于 `Contextual<T>` 中，这是第 4 章已经讨论过的类型。在该章中，是从已经以某种方式创建的\
  \ bean 类型的角度来审视它的。这里将从创建类型的角度来审视它。\n\n#### 第 1 部分：Contextual\n\n`Bean<T>` 工厂部分的核心接口相对简单，如下所示：\n\
  \n```\npublic interface Contextual {\nT create(CreationalContext creationalContext);\n\
  void destroy(T instance, CreationalContext creationalContext);\n}\n```\n\n对于简单类型（即不由\
  \ CDI 管理或注入的类型），只需在 `create()` 方法中返回一个实例即可。例如，对于 `String` 类型，需要执行以下操作：\n\n```\n\
  @Override\npublic String create(CreationalContext creationalContext) {\nreturn \"\
  我们自己的 bean\";\n}\n@Override\npublic void destroy(Integer instance, CreationalContext\
  \ creationalContext) {\n// 此处无需执行任何操作\n}\n```\n\n\n\n#### 第二部分：核心属性\n\n如前所述，`Bean<T>`\
  \ 是工厂部分和元数据部分的组合。元数据涉及第 3 章首次讨论的核心 bean 属性。为方便起见，我们在此重复列出：\n\n*   类型（Types）\n* \
  \  限定符（Qualifiers）\n*   名称（Name）\n*   作用域（Scope）\n*   原型（Stereotypes）\n*   替代（Alternative，一个布尔值，指示该\
  \ bean 是否为替代 bean）\n\n从创建 bean 的角度来看，这些属性在很大程度上决定了从 `create()` 方法返回的 bean 如何被索引（即在内部\
  \ bean 存储中根据哪些标识符存储，以及实例存储在哪个上下文“缓存”中）。\n\n对于元数据，核心接口由与上述列表直接对应的只读属性组成。\n\n```\n\
  public interface BeanAttributes {\nSet getTypes();\nSet getQualifiers();\nClass\
  \ getScope();\nString getName();\nSet> getStereotypes();\nboolean isAlternative();\n\
  }\n```\n\n在实现此接口时，您必须考虑所需的默认值。不幸的是，该接口并未提供关于这些默认值是什么的指导，无论是在 Javadoc 中还是通过默认方法。然而，CDI\
  \ 规范确实提供了一些指导，有趣的是，这意味着每当您自己实现 `Bean<T>` 时，都必须实现规范中的某些要求。换句话说，规范的部分规则和行为实际上存在于您实现的工件中，而不是核心运行时代码中。CDI\
  \ 在 Java EE 中并非特例，例如在 JSF 中，许多看似核心框架行为的东西实际上存在于用户提供的 `UIComponents` 中。\n\n以下是为您之前从\
  \ `create()` 方法返回的 `String` bean 提供的最小实现：\n\n```\n@Override\npublic Set getTypes()\
  \ {\nreturn new HashSet(asList(String.class, Object.class));\n}\n@Override\npublic\
  \ Set getQualifiers() {\nreturn singleton((Annotation) Default.Literal.INSTANCE\
  \ );\n}\n@Override\npublic Class getScope() {\nreturn Dependent.class;\n}\n@Override\n\
  public String getName() {\nreturn null;\n}\n@Override\npublic Set> getStereotypes()\
  \ {\nreturn emptySet();\n}\n@Override\npublic boolean isAlternative() {\nreturn\
  \ false;\n}\n```\n\n为了进一步说明这里的返回值，我们先来看一下 `getTypes()`。您必须显式提供您希望 bean 被识别的所有（Java）类型。在此层级，CDI\
  \ 运行时不会扫描 `Bean<T>` 中 `T` 的任何类型，也不会扫描您从 `create()` 返回的实例的类型。\n\n对于 `getQualifiers()`\
  \ 方法，在没有任何其他特定限定符的情况下，您必须返回一个包含 `Default` 注解字面量实例的集合。同样，在此层级，CDI 运行时不会为您提供任何默认值，您不能在此处返回\
  \ `null` 或空集合，否则会导致未定义行为（很可能是某种异常，因为 CDI 运行时不会期望这样的值）。\n\n对于 `getScope()` 方法，其逻辑与\
  \ `getQualifiers()` 方法类似；在没有任何其他作用域的情况下，您必须显式返回 `Dependent` 作用域。CDI 规范规定，任何没有显式作用域的\
  \ bean 都应是依赖作用域，并且再次强调，在此层级，CDI 运行时不会为您设置默认值。\n\n`getName()` 方法是 `BeanAttributes`\
  \ 接口中唯一一个如果您不使用名称则可以返回 `null` 的方法。请记住，在 CDI 中，bean 名称完全是可选的，并且没有任何类型的默认名称，因此您无需在此处提供任何内容。\n\
  \n原型也完全是可选的，但对于 `getStereotypes()`，您实际上不能返回 `null`；您必须返回一个空集合。最后，对于 `isAlternative()`，作为一个返回原始布尔值的方法，几乎没有歧义，当\
  \ bean 不是替代 bean 时，您只需在此处返回 `false`。\n\n#### 第三部分：Bean\n\n到目前为止，您已经看到了代表工厂（`Contextual`）和元数据（`BeanAttributes`）的接口，但尚未看到它们是如何组合的。您也还没有看到我们开始讨论的\
  \ `Bean<T>` 接口是什么样子的。\n\n现在，您将查看 `Bean<T>` 接口本身，因为它恰好是将工厂和元数据结合起来的那个东西。此外，它还包含少量关于\
  \ bean 本身的额外数据。\n\n```\npublic interface Bean extends Contextual, BeanAttributes\
  \ {\nClass getBeanClass();\nSet getInjectionPoints();\n}\n```\n\n`Bean<T>` 接口最重要的部分是\
  \ `extends` 部分，它实际上结合了 `Contextual` 和 `BeanAttributes`。它包含两个自己的方法（实际上是三个，但第三个已弃用，因此我们在此省略）。\n\
  \n在 `Bean<T>` 接口的两个方法中，`getBeanClass()` 有些特殊。其文档如下：\n\n> *“托管 bean 或会话 bean 的 bean\
  \ 类，或声明生产者方法或字段的 bean 的 bean 类。”*\n\n换句话说，如果您有以下托管 bean：\n\n```\n@RequestScoped\n\
  public class SomeBean extends SomeOtherBean implements SomeInterface {\n}\n```\n\
  \n那么 bean 类将是 `SomeBean`。而如果您有以下生产者：\n\n```\npublic class SomeBean extends SomeOtherBean\
  \ implements SomeInterface {\n@Produces @RequestScoped\npublic MyBean doProduce()\
  \ {\nreturn new MyBean();\n}\n}\n```\n\n那么 bean 类将再次是 `SomeBean`，而不是 `MyBean`。因此，bean\
  \ 类不一定与可以注入或获取的类型相关。毕竟，您已经有 `getTypes()` 方法用于此目的。\n\n`getBeanClass()` 的文档并不完全完整，因为并非所有\
  \ `Bean<T>` 都是从托管 bean 或生产者生成的（否则我们现在就不会讨论 `Bean<T>` 了）。\n\n这确实引出了一个问题：bean 类用于什么目的？在不是从托管\
  \ bean 或生产者生成的实现中，它应该是什么？\n\n首先回答第一个问题，bean 类用于在模块化/多类加载器环境中确定类的可见性。在 Java EE 中，典型的例子是包含多个\
  \ WAR 模块的 EAR 模块。类可以定义在例如 EAR 级别，使其对所有 WAR 可见，或者定义在 WAR 级别，使其对其他 WAR 不可见（隔离）。\n\n\
  在 CDI 规范中，这一点通过以下陈述表达：\n\n> *“如果根据模块架构的类可访问性要求，bean 类需要对该模块中的类可访问，则该 bean 可在该模块中用于注入。”*\n\
  \n虽然这句话可能有点难以解析，但它基本上意味着 CDI 遵循其所处环境的类加载器可见性规则。要确定类加载器可见性，您需要一个代表该类加载器的类（即由该类加载器加载的类）。如前所述，这不一定是\
  \ bean 类型。在您之前看到的生产者示例中，`MyBean` 可能定义在 EAR 级别，而 `SomeBean` 位于其中一个 WAR 模块中。由于是 `SomeBean`\
  \ 完全定义了 bean（它可选地向裸类类型添加了作用域和限定符），因此我们在此展示的是 `SomeBean` 的可见性。\n\n例如，假设您在 WAR 1 中有以下内容：\n\
  \n```\npublic class SomeBean1 extends SomeOtherBean implements SomeInterface {\n\
  @Produces @RequestScoped\npublic MyBean doProduce() {\nreturn new MyBean(\"war1\"\
  );\n}\n}\n```\n\n并假设您在 WAR 2 中有以下内容：\n\n```\npublic class SomeBean2 extends SomeOtherBean\
  \ implements SomeInterface {\n@Produces @ApplicationScoped\npublic MyBean doProduce()\
  \ {\nreturn new MyBean(\"war2\");\n}\n}\n```\n\n此外，假设 `MyBean` 定义在 EAR 级别。\n\n\n\
  \n如果现在从 WAR 1 请求注入一个 `MyBean`，你需要查看的是 `SomeBean1` 而不是 `SomeBean2`。由于 `SomeBean2`\
  \ 对 WAR 1 不可见（由其类加载器可见性决定），因此 `SomeBean2` 不会被考虑，只有 `SomeBean1` 会被考虑。如果你只查看 Bean\
  \ 类型（返回类型）`MyBean`，那么两个生产者都会可见，从而产生歧义。正如本书其他地方所述，如果 CDI 运行时遇到歧义，它会中止应用程序的启动并抛出异常。\n\
  \n接下来讨论第二个问题：对于直接实现而非由受管 Bean 或生产者生成的 `Bean` 实现，其 Bean 类应该是什么。遗憾的是，CDI 规范或 Javadoc\
  \ 中都没有对此提供直接指导，但正如前面所述，它本质上隐含地应该是“提供”（创建）Bean 实例的类，因此对于你的 `Bean<T>` 实现来说，它应该就是 `Bean<T>`\
  \ 类本身。\n\n最后，你还有 `getInjectionPoints()` 方法。虽然作用域和限定符可以被视为外部元数据（外部世界通过这些属性来观察 Bean），但注入点在某种程度上是内部元数据的一部分（外部世界看不到这些，只有\
  \ CDI 运行时能看到）。不过，这个方法很特殊。它不提供主要的注入点元数据，而只是对这些元数据进行声明。CDI 运行时仅使用它们来检查依赖项是否可用。更具体地说，它使用每个返回的注入点来形成键\
  \ `{类型 + 限定符}`，并据此进行查找（例如，使用 `beanManager.getBeans()`）。如果结果为空或存在歧义，则会抛出异常；否则，表示依赖项可用，一切正常。具体来说，`Bean<T>#getInjectionPoints()`\
  \ 返回的注入点*不*用于实际的注入。`Bean<T>` 接口中之所以有单独的注入点集合，是为了确保 CDI 运行时能够在运行时进行验证，并且在验证时不必调用可能开销较大的\
  \ `create()` 方法来实际创建实例、扫描它然后验证。`getInjectionPoints()` 还有一些其他潜在用例，例如用于反序列化，但主要用例是验证。\n\
  \n#### 第 4 部分：序列化支持\n\n动态 Bean 还可以实现一些额外的接口。其中之一是 `javax.enterprise.inject.spi.PassivationCapable`\
  \ 接口，该接口几乎是强制实现的，因为一个 Bean 要能够注入到任何具有钝化作用域（`passivating` 属性设置为 `true` 的 `@NormalScope`）的其他\
  \ Bean 中，就需要实现它。由于你无法控制用户希望将你的 Bean 注入到哪些其他 Bean 中，因此不实现 `PassivationCapable` 通常会导致很多麻烦，例如当你的\
  \ Bean 被尝试用于使用众所周知的 `@SessionScoped` 作用域的 Bean 时。这就是为什么实际上 `Bean<T>` 实现也应该始终实现这个接口；只有在有非常特殊的原因时才省略它。未来版本的\
  \ CDI 很可能会强制要求实现此接口，因此，即使没有其他原因，现在实现它也是为未来做好准备。\n\n`javax.enterprise.inject.spi.PassivationCapable`\
  \ 接口带来的作用是，为 Bean 提供另一个唯一的基于 `String` 的 ID。此 ID 用于序列化目的，特别是当 `Bean<T>` 实例本身不可序列化时。\n\
  \n细心的读者可能会问，为什么还需要另一个 ID，因为一个 Bean 已经有两个 ID 了（类型 + 限定符和 EL 名称）。答案可能有点复杂。首先，EL 名称并不真正适合。它虽然已经是一个字符串，但由于它是一个可选名称，并且通常是较短（类似别名）且对用户友好的名称，如果所有\
  \ Bean 都使用这样的名称，它可能会很快（且无意地）发生冲突。其次，类型 + 限定符显然本身就不是一个字符串。你可以形式化一种格式将它们转换为字符串，但随后会遇到下一个问题：这些标识符不一定标识单个\
  \ Bean，实际上标识的是一组 Bean。而且，有趣的是，在实践中它们更类似于对 Bean 仓库的查询，在不同时间可能会产生不同的结果。为了系统的稳定性，我们确实希望尽可能限制获得不同结果的情况，但这只是可能发生的事情，因此必须予以考虑。\n\
  \n对于用于序列化的标识符，你需要一个完全唯一且因此仅标识单个 Bean 的东西。这就是 `PassivationCapable` 接口的 `getId()`\
  \ 方法的作用所在，因为它确实做到了这一点。\n\n对于从受管 Bean 或生产者生成的 `Bean<T>` 实例，`getId()` 返回的字符串通常基于 Bean\
  \ 的类型、限定符和其他属性。例如，CDI 参考实现 Weld 大致使用以下内容来生成此字符串：\n\n```\nnew StringBuilder(\"WELD%AbstractSyntheticBean%\"\
  )\n.append(beanClass.getName()).append(\"%\")\n.append(attributes.getName()).append(\"\
  ,\")\n.append(attributes.getScope().getName()).append(\",\")\n.append(attributes.isAlternative())\n\
  .append(createCollectionId(attributes.getQualifiers()))\n.append(createCollectionId(attributes.getStereotypes()))\n\
  .append(createCollectionId(attributes.getTypes()))\n.toString();\n```\n\n如你所见，这里的唯一标识符是\
  \ Weld 序言字符串 + `{beanClass, name, scope, alternative, qualifiers, stereotypes, types}`\
  \ 的组合。它比单纯的 `{types, qualifiers}` 稍微多一些内容，但除此之外，它包含了 `Bean<T>` 中包含的所有公共数据。\n\n对于你自己创建的\
  \ `Bean<T>` 实例，并且只创建了单个实例的情况，通常只需使用完全限定类名即可作为唯一标识符。如果你创建并随后添加了 `Bean<T>` 类的多个实例，则需要一些东西来区分它们。\n\
  \n\n\n例如，假设你有一个 `com.example.MyBean<T>`，你为其创建并添加了两个实例：一个从 `create()` 方法返回 `Integer`，另一个返回\
  \ `String`。那么，从 `getId()` 返回的潜在标识符，对于第一个实例可能是 `com.example.MyBean-Integer`，对于第二个实例则是\
  \ `com.example.MyBean-String`。\n\n到目前为止，我们只是顺带提及 `getId()` 返回的字符串标识符用于序列化目的，但尚未解释它具体是如何以及为何用于此目的。现在你将对此进行了解。\n\
  \n当 CDI 中的 bean 被序列化时，它所拥有的所有正常作用域 bean 依赖项（及其传递依赖项）本身并不会被序列化，而是生成这些依赖项的 `Bean<T>`\
  \ 会被序列化。可以将其想象为将你的 iPhone 备份到 iCloud。你安装在其上的应用、从 iTunes 下载的媒体等，并不包含在备份本身中；只包含指向它们在\
  \ Apple Store 和 iTunes 中原始位置的指针。根据苹果官网的说法：\n\n> *“你的 iCloud 备份包含你所购内容的信息，但不包含内容本身。当你从\
  \ iCloud 备份恢复时，你购买的内容会自动从 iTunes Store、App Store 或 Books Store 重新下载。”*\n\n当一个 bean\
  \ 被序列化时（在 CDI 术语中称为*钝化*），就其正常作用域依赖项而言，实际被序列化的是带有对 `Bean<T>` 引用的代理，而不是实际的 bean 实例。一般来说，对于序列化形式中的这个引用，有若干种不同的选项。在最简单的情况下，`Bean<T>`\
  \ 是直接可序列化的，CDI 运行时可以使用它。采用这种方法，无需再调用 `getId()` 方法，此时序列化的代理将包含序列化的 `Bean<T>` 实例。然而，当\
  \ `Bean<T>` 不可序列化时，CDI 运行时可以使用 `getId()` 方法来获取字符串标识符，然后这个字符串（且仅此字符串）会被序列化，作为所讨论的\
  \ `Bean<T>` 实例的代表性引用。\n\n每当一个 bean 被反序列化时（在 CDI 术语中称为*激活*），其正常作用域依赖项的代理也会被反序列化，并且随之一起的要么是直接的\
  \ `Bean<T>`，要么是代表它的字符串标识符。在后一种情况下，CDI 运行时需要执行一个额外的步骤，即使用其字符串标识符查找原始的 `Bean<T>`（这可以在实际访问依赖项时延迟完成）。此查找可以使用\
  \ `BeanManager` 的公共方法 `getPassivationCapableBean()` 来完成。\n\n无论使用何种方法反序列化 `Bean<T>`，CDI\
  \ 运行时都必须在某个时刻检索实际的 bean 实例。这里又有两种选择。请记住，反序列化可能发生在初始序列化之后很长时间，到那时，bean 实例可能在其给定作用域中已不存在，或者如果依赖项之前未被使用过，它可能一开始就从未存在过。如果是这种情况，则通过调用\
  \ `Bean<T>` 的 `create()` 方法当场创建该实例。否则，将使用作用域中的实例。\n\n除了可能节省时间和空间（这在 IT 领域很罕见，因为你通常会在优化其中一个时牺牲另一个）之外，如前所述进行序列化的关键原因是为了维护各个作用域的一致性。假设你实际上完全序列化了每个正常作用域的\
  \ bean。那么在反序列化时，你实际上就创建了该 bean 的一个副本。这破坏了作用域的规则，该规则确保在给定作用域中只有一个 bean 实例，并由该作用域的所有使用者共享。\n\
  \n例如，考虑一个应用作用域的 bean，显然它应该只有一个实例。如果一个被序列化随后又被反序列化的 bean 包含了这样一个 bean 的自身副本，它将看不到对原始\
  \ bean 的任何更改，并且该 bean 的其他任何使用者也不会看到对副本所做的更改。这显然是不正确的。在反序列化时有效地重新注入依赖项可以完全避免这个问题。\n\
  \n#### 第 5 部分：激活备选方案\n\n如本节第 2 部分所示，`Bean<T>` 实现可以通过从 `isAlternative()` 方法返回 `true`\
  \ 来声明自己是一个“备选方案”。默认情况下，任何作为备选方案的 `Bean<T>` 都处于一种“悬而未决”的状态。它存在，但不用于任何类型的解析。要摆脱这种状态，它需要被“激活”（不要与反序列化时类似命名的“激活”混淆）。激活可以由用户在每个\
  \ bean 归档中完成，方法是在该归档的 `beans.xml` 文件中，将 bean 类列在 `<beans>`、`<alternatives>`、`<class>`\
  \ 元素下。或者，你可以通过让 `Bean<T>` 实现 `javax.enterprise.inject.spi.Prioritized` 接口，来添加一个处于全局激活状态的\
  \ bean。该接口有一个需要实现的方法：`getPriority()`。如果多个备选方案提供相同的 bean 类型，则使用此方法返回的整数值来选择哪个 `Bean<T>`\
  \ 实例用于提供 bean。优先级最高的获胜。因此，通常系统级别的备选 bean 会使用较低的优先级，比如在 0 到 100 的范围内，这意味着库提供的备选方案（用户可以自由添加）可以在\
  \ 101 到 200 的优先级上覆盖它。最终希望决定使用哪个 bean 的应用程序，在此示例中应使用高优先级，比如 1000 或更高。\n\nCDI 规范没有规定如果两个或多个\
  \ `Bean<T>` 具有相同优先级会发生什么。在这种情况下，不同 CDI 实现（例如，Weld 和 OWB）之间的结果是未定义的。然而，给定的实现可能仍有自己的规则来打破平局。例如，Weld\
  \ 在这种情况下会使用 bean 类的字典序（由 `getBeanClass` 返回）。这意味着，在使用 Weld 时，如果其他条件相同，一个 bean 类为\
  \ `com.example.zzz` 且优先级为 10 的 `Bean<T>` 实例，将优先于一个 bean 类为 `com.example.aaa` 且优先级也为\
  \ 10 的 `Bean<T>` 实例被选中。\n\n为完整起见，我们现在将展示完整的 `Bean<T>` 实现，它结合了前面解释的关于一个未命名、非备选 bean\
  \ 的所有部分。\n\n```\npublic class MyBean implements Bean, PassivationCapable {\n@Override\n\
  public String create(CreationalContext creationalContext) {\nreturn \"Our own bean\"\
  ;\n}\n@Override\npublic void destroy(Integer instance, CreationalContext creationalContext)\
  \ {\n// Nothing to do here\n}\n@Override\npublic Set getTypes() {\nreturn new HashSet(asList(String.class,\
  \ Object.class));\n}\n@Override\npublic Set getQualifiers() {\nreturn singleton((Annotation)\
  \ Default.Literal.INSTANCE );\n}\n@Override\npublic Class getScope() {\nreturn Dependent.class;\n\
  }\n@Override\npublic String getName() {\nreturn null;\n}\n@Override\npublic Set>\
  \ getStereotypes() {\nreturn emptySet();\n}\n@Override\npublic boolean isAlternative()\
  \ {\nreturn false;\n}\n@Override\npublic Class getBeanClass() {\nreturn getClass();\n\
  }\n@Override\npublic Set getInjectionPoints() {\nreturn emptySet();\n}\n@Override\n\
  public String getId() {\nreturn getClass().getName();\n}\n@Override\npublic boolean\
  \ isNullable() { return false; }\n}\n```\n\n\n\n## 添加动态 Bean：使用扩展\n\n上一节中展示的动态 Bean\
  \ 必须通过 CDI 扩展来添加。\n\nCDI 扩展是一个庞大的主题，本书不会全面展开，但在解释如何通过扩展添加 Bean 之前，我们会先对其进行简要概述。\n\
  \nCDI 中的*扩展*是一种特殊的 CDI 类，它实现了 `javax.enterprise.inject.spi.Extension` 标记接口，并且必须通过将其完全限定类名放置在类路径（JAR\
  \ 中）的 `META-INF/services/javax.enterprise.inject.spi.Extension` 文件中来注册。\n\n有点类似于\
  \ Servlet 规范中的 `ServletContainerInitializer`，扩展可以监听 CDI 运行时启动时触发的生命周期事件，并利用这些事件以编程方式在内部\
  \ CDI Bean 仓库中添加、修改或删除 Bean。\n\n这些生命周期事件粒度极细，允许应用程序（但实践中主要是库）极大地影响 CDI 本身。在某种程度上，这使得\
  \ CDI 看起来有点像 Smalltalk 环境，后者被描述为“一个活着的系统，随身携带在运行时扩展自身的能力”。\n\n与其他几个框架的监听器类似，CDI\
  \ 生命周期事件可以大致分为两大类。\n\n*   启动时触发的事件\n\n*   关闭时触发的事件\n\n最有趣的部分是“启动时触发的事件”，它可以进一步细分为两个逻辑组。\n\
  \n*   发现普通 Java 类型\n\n*   发现 CDI Bean\n\n接下来我们将简要介绍这两者。\n\n### 发现普通 Java 类型\n\n\
  这一组事件包含三个事件。\n\n*   `javax.enterprise.inject.spi.BeforeBeanDiscovery`\n\n*   `javax.enterprise.inject.spi.ProcessAnnotatedType<X>`\n\
  \n*   `javax.enterprise.inject.spi.AfterTypeDiscovery`\n\n`BeforeBeanDiscovery`\
  \ 事件在类型扫描开始之前触发。为了保持一致性，这个事件或许应该被称为 `BeforeTypeDiscovery`，但可惜并非如此。观察此事件，你可以向 CDI\
  \ 将在后续阶段考虑的类型列表中添加全新的类型。例如，当你处于 CDI 扫描受到严格限制的 Bean 归档中时，这非常有用，例如代表 Java EE 内部库（如\
  \ JSF 和 EE Security）的 Bean 归档。这些 JAR 中的类型不会被 CDI 扫描，任何你想要添加的类型都可以在此处手动添加。例如，EE Security\
  \ 参考实现 Soteria 就执行了以下操作：\n\n```\npublic void register(@Observes BeforeBeanDiscovery\
  \ beforeBean, BeanManager beanManager) {\naddAnnotatedTypes(beforeBean, beanManager,\n\
  AutoApplySessionInterceptor.class,\nRememberMeInterceptor.class,\nLoginToContinueInterceptor.class,\n\
  FormAuthenticationMechanism.class,\nCustomFormAuthenticationMechanism.class,\nSecurityContextImpl.class,\n\
  IdentityStoreHandler.class,\nPbkdf2PasswordHashImpl.class\n);\n}\n```\n\n`addAnnotatedTypes`\
  \ 定义如下：\n\n```\npublic static void addAnnotatedTypes(BeforeBeanDiscovery beforeBean,\
  \ BeanManager beanManager,\nClass... types) {\nfor (Class type : types) {\nbeforeBean.addAnnotatedType(type,\
  \ \"Soteria \" + type.getName());\n}\n}\n```\n\n请注意，手动添加类型时需要提供一个标识符，CDI 运行时可以使用该标识符来确定类型的添加位置，并区分多次添加的相同类型。\n\
  \n通过观察 `ProcessAnnotatedType` 事件，CDI 运行时在 Bean 归档中找到的每一个普通 Java 类型（类或接口）都会回调你。你可以利用此事件来查看该类型（例如，记录日志）、修改该类型（完全替换它，或基于遇到的类型替换为另一个类型），或者完全移除该类型，使\
  \ CDI 不再“看到”它。通过 `configureAnnotatedType` 可以方便地使用构建器，在找到的类型的类、字段或方法级别轻松添加或移除注解。\n\
  \n通过观察 `AfterTypeDiscovery` 事件，我们会在 CDI 运行时完成所有应做的类型扫描后被回调。在这里，你也可以向 CDI 将在后续阶段考虑的类型列表中添加全新的类型。\n\
  \n### 发现 CDI Bean\n\n在 CDI 运行时发现原始类型之后，下一阶段是分析这些类型，并从中创建 `Bean<T>` 实例等。\n\n*   `ProcessInjectionPoint`\n\
  \n*   `ProcessInjectionTarget`\n\n*   `ProcessProducer`\n\n*   `ProcessBeanAttributes`\n\
  \n*   `ProcessBean`\n    *   `ProcessManagedBean`\n\n    *   `ProcessSessionBean`\n\
  \n    *   `ProcessProducerMethod`\n\n    *   `ProcessProducerField`\n\n    *   `ProcessSyntheticBean`\n\
  \n*   `ProcessObserverMethod`\n    *   `ProcessSyntheticObserverMethod`\n\n*   `AfterBeanDiscovery`\n\
  \n*   `AfterDeploymentValidation`\n\n图 7-1 展示了其概览。\n\n![../images/454458_1_En_7_Chapter/454458_1_En_7_Fig1_HTML.png](img/454458_1_En_7_Fig1_HTML.png)\n\
  \n图 7-1\n\nCDI 事件及其组织\n\n共有八个主要事件，以及几个专门化其父事件的子事件。在这些情况下，观察父事件会包括接收所有子事件的通知。例如，当观察\
  \ `ProcessBean` 时，你会收到所有被处理的 `Bean<T>` 的通知；而如果你观察 `ProcessSyntheticBean`，则只会收到你手动添加的\
  \ `Bean<T>` 的通知。请注意，对于本章中你称之为*动态* Bean 的 `Bean<T>` 类型，这里使用了有点引人注目的术语*合成*。这之所以引人注目，是因为尽管“合成”在其他各种\
  \ API 方法中用于类似情况，但在 CDI 规范文本或 CDI 社区中并未使用。\n\n在对 CDI 扩展进行了这番简要解释之后，你现在终于可以找到如何添加你的\
  \ `Bean<T>` 实现的答案了：通过观察 `AfterBeanDiscovery` 事件，并以类似于添加新类型的方式，你可以添加一个新的 `Bean` 实例。\n\
  \n示例如下：\n\n```\npackage com.example;\npublic class DynamicBeanExtension implements\
  \ Extension {\npublic void afterBean(@Observes AfterBeanDiscovery afterBeanDiscovery)\
  \ {\nafterBeanDiscovery.addBean(new MyBean());\n}\n}\n```\n\n如前所述，对于所有 CDI 扩展，扩展类必须通过将其完全限定名称放置在文件\
  \ `META-INF/services/javax.enterprise.inject.spi.Extension` 中来注册，在本例中，该文件将只包含一行文本\
  \ `com.example.DynamicBeanExtension`。\n\n\n\n### 使用配置器实现 `Bean<T>`\n\n如你所见，完全手动实现一个\
  \ `Bean<T>` 是件相当繁琐的工作，尽管这能让你深入理解其运作机制。\n\n在实践中，你很少需要经历所有这些步骤，因为 CDI 为此提供了一个更易于使用的构建器。\n\
  \nCDI 特性提供了一个便捷的构建器，它不仅让创建 `Bean<T>` 实例的代码简洁得多，还省去了大部分猜测工作。示例如下：\n\n```\npublic\
  \ class DynamicBeanExtension implements Extension {\npublic void afterBean(@Observes\
  \ AfterBeanDiscovery afterBeanDiscovery) {\nAfterBeanDiscovery\n.addBean()\n.createWith(e\
  \ -> \"Our own bean\")\n.types(String.class, Object.class)\n.id(DynamicBeanExtension.class.getName()\
  \ + \" String\")\n}\n}\n```\n\n上述方式只允许你指定与默认值不同的部分，从而使定义更加紧凑。\n\n特别要注意 `id` 是如何融入\
  \ `Bean<T>` 构建器的，几乎看不出它实际上是另一个接口的一部分，这进一步证明了 `getId()` 或许从一开始就应该属于 `Bean<T>` 接口。另外请注意，CDI\
  \ 规范并未完全明确当未提供显式 ID 时，`Bean<T>` 默认是否支持钝化。Weld 和 OWB 生成的实例都始终实现了 `PassivationCapable`\
  \ 接口，但它们的行为略有不同。Weld 在未提供 ID 时总会生成一个 ID，其生成方式与管理 Bean 或生产者生成 ID 的方式相同。而 OWB 仅在 `Bean<T>`\
  \ 自身具有钝化作用域时才生成 ID。看来，确保拥有 ID 的唯一可靠方法就是手动添加它。\n\n除了作为一个简单的构建器，用于收集 `Bean<T>` 中 getter\
  \ 方法返回的数据（未提供的数据使用默认值）之外，该构建器还提供了其他方式无法获得的高级功能。其中一个例子是 `addTransitiveTypeClosure()`\
  \ 方法，它背后有相当复杂的功能来发现给定 Bean 拥有的所有类型（超类及其超类、这些类实现的任何接口及其超接口等）。在构建器中使用该方法，你无需显式列出所有类型（如果你希望该\
  \ Bean 可用于其拥有的所有类型）。这本质上与 CDI 运行时从管理 Bean 或生产者生成 `Bean<T>` 实例时所做的事情相同。示例如下：\n\n\
  ```\npublic class DynamicBeanExtension implements Extension {\npublic void afterBean(@Observes\
  \ AfterBeanDiscovery afterBeanDiscovery) {\nafterBeanDiscovery\n.addBean()\n.createWith(e\
  \ -> \"Our own bean\")\n. addTransitiveTypeClosure(String.class)\n.id(DynamicBeanExtension.class.getName()\
  \ + \" String\");\n}\n}\n```\n\n请注意，这里你无需提供 `Object.class` 参数，因为类型闭包算法会自动发现它。当然，对于如此简单的案例，差异微乎其微，但在更深的类型层次结构中，这可能会带来巨大差异。\n\
  \n构建器提供的另一个便捷功能是，它可以选择性地为你提供一个 `Instance` 而非仅仅一个 `CreationalContext`。这个 `Instance`\
  \ 绑定到与 `Bean<T>` 上下文关联的 Bean 管理器和创建上下文。它可用于选择该方法可能需要的依赖项。为了传入该 `Instance`，应使用 `produceWith()`\
  \ 方法而非 `createWith()` 方法。示例如下：\n\n```\npublic class DynamicBeanExtension implements\
  \ Extension {\npublic void afterBean(@Observes AfterBeanDiscovery afterBeanDiscovery)\
  \ {\nafterBeanDiscovery\n.addBean()\n.produceWith(instance -> {\nMyBean myBean =\
  \ instance.select(MyBean.class).get();\nreturn \"MyBean says \" + myBean.hi();\n\
  })\n. addTransitiveTypeClosure(String.class)\n.id(DynamicBeanExtension.class.getName()\
  \ + \" String\");\n}\n}\n```\n\n作为上述方法的一种替代方案，`createWith()` 方法可以使用全局的 `CDI.current()`\
  \ 实例。但这并不完全等同，因为全局实例不一定允许你获取当前的 `InjectionPoint`，而传入的实例则允许。示例如下：\n\n```\npublic\
  \ class DynamicBeanExtension implements Extension {\npublic void afterBean(@Observes\
  \ AfterBeanDiscovery afterBeanDiscovery) {\nafterBeanDiscovery\n.addBean()\n.produceWith(instance\
  \ -> {\nInjectionPoint point = instance.select(InjectionPoint.class).get();\nreturn\
  \ \"Injected in bean: \" + point.getBean();\n})\n. addTransitiveTypeClosure(String.class)\n\
  .id(DynamicBeanExtension.class.getName() + \" String\");\n}\n}\n```\n\n在 `Bean<T>`\
  \ 的 `createWith()` 方法或 `create()` 方法中，可以使用以下技巧来获取当前的 `InjectionPoint`。\n\n首先定义以下\
  \ Bean：\n\n```\n@Dependent\npublic class InjectionPointGenerator {\n@Inject\nprivate\
  \ InjectionPoint injectionPoint;\npublic InjectionPoint getInjectionPoint() {\n\
  return injectionPoint;\n}\n}\n```\n\n然后定义以下工具方法：\n\n```\npublic static InjectionPoint\
  \ getCurrentInjectionPoint(\nBeanManager beanManager,\nCreationalContext creationalContext)\
  \ {\nBean bean =\nresolve(beanManager, InjectionPointGenerator.class);\nreturn\n\
  bean != null ? (InjectionPoint)\nbeanManager.getInjectableReference(\nbean.getInjectionPoints().iterator().next(),\n\
  creationalContext)\n:\nnull;\n}\npublic static  Bean resolve(\nBeanManager beanManager,\n\
  Class beanClass, Annotation... qualifiers) {\nSet> beans = beanManager.getBeans(beanClass,\
  \ qualifiers);\nfor (Bean bean : beans) {\nif (bean.getBeanClass() == beanClass)\
  \ {\nreturn (Bean)\nbeanManager.resolve(\nCollections.>singleton(bean));\n}\n}\n\
  return (Bean) beanManager.resolve(beans);\n}\n```\n\n然后可以通过调用 `getCurrentInjectionPoint()`\
  \ 来获取当前的 `InjectionPoint`。计划在 CDI 2.1 中增加一种更简单的方法来从 `createWith()` 或 `create()`\
  \ 方法中获取此信息（但当然不能保证一定会添加）。\n\n不幸的是，构建器中缺少一个关键元素，那就是设置优先级并从而全局启用替代方案的能力。使用标准的 CDI\
  \ API，除了监听 `ProcessSyntheticBean` 事件（在你通过构建器添加 Bean 后触发），使用 `getBean()` 方法从该事件中获取\
  \ `Bean<T>`，并将其包装在一个实现了 `Prioritized` 接口的新 `Bean<T>` 中之外，没有真正便捷的方法来添加此功能。到了那一步，你完全可以直接从你自己的\
  \ `Bean<T>` 实现开始，根本不必费心使用构建器。\n\nAPI 中这个令人痛苦的遗漏是一个已知问题，像 Weld 这样的实现为此提供了自定义解决方案。`AfterBeanDiscovery.addBean()`\
  \ 返回的 `BeanConfigurator` 可以转换为 `org.jboss.weld.bootstrap.event.WeldBeanConfigurator<T>`，它唯一的额外方法就是缺失的\
  \ `priority()` 方法。不用说，使用此方法后代码将不再可移植，并且需要依赖 Weld 特定的库，这两点通常都是人们试图避免的。\n\n\n\n###\
  \ 使用动态创建的 Bean 模拟通用生产者\n\nCDI 设计理念的基石是类型安全至上。在大多数情况下，这非常有效，无可指摘。然而，有时你确实需要一个“通用生产者”，即一个基于\
  \ `InjectionPoint` 类型而具有通用返回方法的生产者。\n\n理论上，它看起来像这样：\n\n```\n@Produces @SomeQualifier\n\
  public  T thisDoesNotWork(InjectionPoint injectionPoint) {\nreturn convert(doStuff(),\
  \ injectionPoint);\n}\n```\n\n这样你就可以执行以下操作：\n\n```\n@Inject\n@SomeQualifier\nFoo\
  \ foo;\n@Inject\n@SomeQualifier\nBar bar;\n```\n\n然而，你可以在一定程度上通过动态创建 `Bean<T>` 实例来模拟这一点。方法是首先扫描应用程序使用的所有注入点，然后记录这些注入目标的类型。接着，为你遇到的每个类型添加一个新的\
  \ `Bean<T>` 实例。在 CDI 中，这种扫描非常简单，因为你只需监听一个 `Process*Bean` 事件，然后检查其字段和构造函数即可。我们将展示一个示例，其中你监听\
  \ `ProcessManagedBean` 事件并检查限定符注解。\n\n```\npublic class GenericProducerSim implements\
  \ Extension {\nprivate Set types = new HashSet();\npublic  void collect(@Observes\
  \ ProcessManagedBean event) {\nfor (AnnotatedField field : event.getAnnotatedBeanClass().getFields())\
  \ {\naddAnnotatedTypeIfNecessary(field);\n}\nfor (AnnotatedConstructor ctr: event.getAnnotatedBeanClass().getConstructors())\
  \ {\nfor (AnnotatedParameter parameter : ctr.getParameters()) {\naddAnnotatedTypeIfNecessary(parameter);\n\
  }\n}\n}\nprivate void addAnnotatedTypeIfNecessary(Annotated annotated) {\nif (annotated.isAnnotationPresent(SomeQualifier.class))\
  \ {\ntypes.add(type);\n}\n}\n}\n```\n\n在前面的代码中，对于每个源自托管 Bean 的 `Bean<T>`，你都会遍历其字段，并收集所有带有\
  \ `SomeQualifier` 注解的类型。根据这个示例，你最终会得到集合 `{Foo.class, Bar.class}`。\n\n在同一个扩展中，你现在还可以监听\
  \ `AfterBeanDiscovery` 事件，并为你遇到的每个类型添加一个 `Bean<T>`：\n\n```\npublic void afterBean(@Observes\
  \ AfterBeanDiscovery afterBeanDiscovery) {\nfor (Type type : types) {\nafterBeanDiscovery.addBean(new\
  \ GenericProducer(type));\n}\n}\n```\n\n这里的 `GenericProducer` 可以使用传入的 `type` 从其\
  \ `getTypes()` 方法返回，这样当 CDI 遇到之前的注入点并使用该类型作为转换基础时，它就会被选中。或者，你也可以添加一个单一的 `Bean<T>`，使其\
  \ `getTypes()` 方法返回你遇到的所有类型。\n\n请注意，这个解决方案并非完全完美，因为它显然无法看到仅通过编程方式请求的类型，例如使用 `CDI.current().select()`。有时，你甚至没有意识到这种情况会发生，例如在\
  \ Servlet 中使用 `@Inject` 时。Servlet 并非由 CDI 直接管理，但 Servlet 容器（运行时）通常会以编程方式使用 CDI API\
  \ 来获取其所需的依赖项，然后手动将它们分配给带有 `@Inject` 注解的字段。这种用法在应用程序启动时对 CDI 运行时来说基本上是隐藏的，因此你无法收集这些类型。\n\
  \n"
- "# 8. Java SE 中的 CDI\n\n到目前为止，可能已经很明显，CDI 为任何非平凡的应用程序（包括非基于 Web 的应用程序）提供了许多好处。令人惊讶的是，在\
  \ 2.0 版本之前的 CDI 规范官方仅支持 Java EE。尽管 Java SE 并未得到官方支持，但在 2.0 规范之前，许多 CDI 实现确实提供了对\
  \ Java SE 环境的支持。例如，Weld 和 Apache OpenWebBeans 都提供了对 Java SE 的支持。由于规范并未官方支持 Java\
  \ SE，这意味着每个容器都需要提供自己的非标准化 API，以允许应用程序引导和运行容器。拥有这种非标准化 API 的一个主要缺点是，它使得应用程序开发者切换到另一个\
  \ CDI 容器稍微困难一些，因为在 Java SE 环境中引导容器的代码需要重写。像 Arquillian 和 Apache DeltaSpike Container\
  \ Control 这样的库和框架确实提供了允许开发者引导 CDI 容器的 API，无论实际使用的是哪个容器。然而，Arquillian 的主要焦点是能够在不同环境中运行单元测试和集成测试，并不太适合在应用程序内部启动\
  \ CDI 容器。容器也需要得到 Apache DeltaSpike Container Control 的显式支持。如果引入了一个新容器，或者某个容器以不兼容的方式更改了其专有\
  \ API，那么 DeltaSpike Container Control 的用户需要等待新版本发布才能获得支持。\n\n幸运的是，对 Java SE 环境的官方支持已在\
  \ CDI 2.0 中添加。作为添加此支持的一部分，CDI 规范被分成了三个独立的部分。第一部分，Core CDI，涵盖了 Java SE 和 Java EE\
  \ 通用的核心功能。第二部分，Java EE 中的 CDI，涵盖了在 Java EE 环境中使用 CDI 时，在 Core CDI 之上的附加规则和特性。最后一部分是\
  \ Java SE 中的 CDI，涵盖了 Java SE 的附加规则和功能。\n\n## 引导 API\n\nCDI 2.0 引入了一个引导 API，允许 Java\
  \ SE 容器管理和启动 CDI 容器实例。CDI 容器必须为引导 API 定义的多个接口提供实现，以便为 Java SE 环境提供支持。引导 API 可以使用\
  \ `ServiceLoader` 机制动态检测和实例化类路径或模块路径上可用的任何容器。如果你不熟悉 Java 中的 `ServiceLoader` 机制，它允许注册实现特定类或接口的类，然后在运行时动态加载这些已注册的类。\n\
  \n要使用引导 API，CDI 容器和相应的引导 API 实现必须在类路径上可用。由于大多数容器将由多个独立的 JAR 文件组成，因此向 Java SE 应用程序添加\
  \ CDI 容器的最简单方法是使用像 Maven、Gradle 或 Ivy 这样的依赖管理工具。要使用 Apache OpenWebBeans 作为 CDI 容器，必须声明对容器实现以及\
  \ OpenWebBeans 提供的 CDI API 的依赖。例如，对于 Maven，需要在 `pom.xml` 文件中添加以下依赖项才能使用 OpenWebBeans：\n\
  \n```\norg.apache.openwebbeans\nopenwebbeans-spi\n2.0.3\n\norg.apache.openwebbeans\n\
  openwebbeans-impl\n2.0.3\n\n```\n\n其他 CDI 容器可能包含对 API 本身的传递依赖，而无需显式声明对其的依赖。例如，对于\
  \ Weld，只需依赖引导 API 实现即可。引导 API 实现本身依赖于 CDI API 和容器实现本身，因此这些会自动作为传递依赖包含进来。要在 Java\
  \ SE 应用程序中使用 Weld，只需在项目的 `pom.xml` 文件中声明以下依赖项：\n\n```\norg.jboss.weld.se\nweld-se-core\n\
  3.0.3.Final\n\n```\n\n\n\n### 注意\n\n运行时，类路径或模块路径上只能存在一个 CDI 容器实现。如果引导 API 发现了多个容器实现，则在尝试加载实现时将抛出\
  \ `IllegalStateException`。\n\n引导 API 的主要入口点是 `SeContainerInitializer` 接口。该接口包含许多可用于配置并最终启动\
  \ CDI 容器实例的方法。配置方法遵循构建器模式，允许将多个调用链式组合。可以通过调用 `SeContainerInitializer` 类上的静态 `newInstance()`\
  \ 方法来获取对应容器的 `SeContainerInitializer` 实例。以下代码片段说明了如何在 Java SE 中初始化容器：\n\n```\ntry\
  \ (SeContainer container = SeContainerInitializer.newInstance()  .initialize())\
  \ {\n// 在此处初始化应用程序\n}\n```\n\n在初始化容器实例之前，可以使用 `SeContainerInitializer` 配置属性。这些属性可以是标准化属性，也可以是容器特定的属性。要配置属性，可以调用\
  \ `setProperty()` 方法。该方法接受一个 `String` 类型的键和值作为参数，并将此键值对添加到当前已配置的属性集中。还有一个 `setProperties()`\
  \ 方法，它接受一个 `Map<String, String>` 作为参数。调用此方法将用映射中的内容覆盖当前已配置的属性集。\n\n一旦获取并配置了 `SeContainerInitializer`\
  \ 实例，就可以通过调用其 `initialize()` 方法来创建 CDI 容器。请注意，`initialize()` 方法应该是 `SeContainerInitializer`\
  \ 实例上调用的最后一个方法；任何所需的配置都应首先执行。此外，当 CDI 容器已经在运行时，也无法调用 `initialize()` 方法。这样做将导致抛出\
  \ `IllegalStateException`。\n\n当 `initialize()` 方法成功完成时，它将返回一个 `SeContainer` 实例。`SeContainer`\
  \ 接口实现了 `Instance` 接口，该接口允许获取具有特定（泛型）类型和限定符注解组合的 Bean。为此，可以在 `SeContainer` 上调用 `select()`\
  \ 方法的重载之一。`SeContainer` 提供了多种重载，用于仅通过注解、通过类型和零个或多个注解、以及通过类型字面量和零个或多个注解来获取 Bean。`select()`\
  \ 方法返回另一个 `Instance`（如果使用了带有类型或类型字面量的重载，则 `T` 是 Bean 的类型），可以通过调用该实例上的 `get` 方法来获取\
  \ Bean 实例。还可以通过 `SeContainer` 接口获取 `BeanManager` 实例，该实例也可用于获取 Bean 实例。但是，建议您使用 `SeContainer`\
  \ 实例提供的 `select()` 方法。\n\n`SeContainer` 接口还应在应用程序退出时用于关闭 CDI 容器。`SeContainer` 有一个\
  \ `close()` 方法，该方法将执行必要的容器关闭操作。调用此方法将导致容器管理的所有 Bean 被销毁。在销毁每个 Bean 之前，将调用任何适用的 `@PreDestroy`\
  \ 方法，以便在容器本身被销毁之前执行任何所需的清理操作。`SeContainer` 接口还扩展了 `AutoCloseable` 接口，这使得可以在 `try-with-resources`\
  \ 语句中创建并自动销毁容器。`close()` 方法只能调用一次。第二次调用将导致抛出 `IllegalStateException`。\n\n一旦应用程序启动并运行，可能需要在无法访问\
  \ `SeContainer` 实例的情况下获取对正在运行的容器的引用。CDI 类有一个 `current()` 方法。这将返回一个 CDI 类的实例，可用于访问当前的\
  \ CDI 容器。它提供与 `SeContainer` 相同的所有功能，但无法关闭 CDI 容器。\n\n假设您想使用 CDI 编写一个简单的“Hello World”应用程序。该应用程序应由两个类组成。第一个类是一个相当简单的\
  \ `GreetingService`，它有一个返回问候字符串的方法。第二个类包含用于启动应用程序的 `main` 方法。这个 `main` 方法将引导 CDI\
  \ 实例并调用 `GreetingService`。此示例中的 `GreetingService` 实例通过调用 `container.select(GreetingService.class).get()`\
  \ 从容器中检索。您可能会注意到，没有执行强制类型转换来将 `GreetingService` 的实例分配给变量。由于 API 的泛型签名，此情况下的返回类型被推断为\
  \ `GreetingService`。\n\n```\npackage helloworld;\npublic class GreetingService {\n\
  public String generateGreeting(String name) {\nreturn \"Hello, \" + name + \"!\"\
  ;\n}\n}\n```\n\n以下清单展示了在 Java SE 应用程序中引导 CDI 容器的过程：\n\n```\npackage helloworld;\n\
  import javax.enterprise.inject.se.SeContainer;\nimport javax.enterprise.inject.se.SeContainerInitializer;\n\
  public class HelloWorldExample {\npublic static void main(String[] args) {\ntry\
  \ (SeContainer container = SeContainerInitializer.newInstance().initialize()) {\n\
  GreetingService greetingService = container.select(GreetingService.class).get();\n\
  String greeting = greetingService.generateGreeting(\"world\");\nSystem.out.println(greeting);\n\
  }\n}\n}\n```\n\n需要牢记的一点是通过引导 API 创建的 Bean 的生命周期。当使用此 API 创建依赖作用域的 Bean 实例时，容器会保留对该实例的引用。此引用将阻止该\
  \ Bean 实例被垃圾回收器清理。依赖作用域的 Bean 实例在某种程度上与创建它的容器的生命周期相关联。当应用程序使用引导 API 创建许多依赖作用域的 Bean\
  \ 时，应用程序可能会在某个时候耗尽内存。为防止此类内存泄漏，应用程序应在不再需要这些 Bean 实例时显式销毁它们。\n\n## Bean 归档扫描\n\n\
  在 Java SE 环境中初始化 CDI 容器时，默认情况下，它会通过扫描类路径上任何可用的 Bean 归档来执行 Bean 发现。与 Java EE 一样，Java\
  \ SE 中的 CDI 支持隐式和显式 Bean 归档。默认情况下，容器只会检测显式 Bean 归档中的 Bean；隐式 Bean 归档中的任何 Bean 都将被忽略。\n\
  \n对于 Java SE 容器，`javax.enterprise.inject.scan.implicit` 属性控制是否自动检测隐式 Bean 归档。有两种方法可以设置此属性。第一种是在初始化\
  \ CDI 容器之前将其设置为系统属性。这可以通过在启动应用程序时在命令行上指定 `-Djavax.enterprise.inject.scan.implicit=true`\
  \ 来完成。或者，也可以通过编程方式设置系统属性，如下所示：\n\n```\nSystem.setProperty(\"javax.enterprise.inject.scan.implicit\"\
  , \"true\");\n```\n\n启用对隐式 Bean 归档支持的第二种方法是在初始化容器之前，使用 `addProperty()` 或 `setProperties()`\
  \ 方法在 `SeContainerInitializer` 实例上设置此属性。要配置该属性，必须将属性名称指定为键，并将值指定为 `Boolean.TRUE`。\n\
  \n```\nSeContainerInitializer.newInstance()\n.addProperty(\"javax.enterprise.inject.scan.implicit\"\
  , Boolean.TRUE);\n```\n\n\n\n## 合成 Bean 归档\n\n除了自动扫描 bean 归档之外，还可以通过编程方式向 `SeContainer`\
  \ 注册 bean。每个 `SeContainer` 都有一个单一的合成 bean 归档，该归档只能在容器通过 `SeContainerInitializer`\
  \ 实例完全初始化之前进行配置。以下方法可用于管理合成 bean 归档：\n\n*   `addBeanClasses()`\n\n*   `addPackages()`\n\
  \n*   `addExtensions()`\n\n*   `enableInterceptors()`\n\n*   `enableDecorators()`\n\
  \n*   `selectAlternatives()`\n\n*   `selectAlternativeStereotypes()`\n\n*   `disableDiscovery()`\n\
  \n`addBeanClasses()` 方法将一个或多个 bean 类添加到合成 bean 归档中。这些 bean 将由容器完全管理，就像它们存在于常规 bean\
  \ 归档中一样。需要注意的是，不要将已存在于其他 bean 归档中的 bean 添加到合成 bean 归档中。如果发生这种情况，CDI 容器将因在多个 bean\
  \ 归档中遇到同一个 bean 而无法启动。\n\n除了向合成 bean 归档添加单个类之外，还可以使用 `addPackages()` 方法添加整个包。此方法有四种形式。两个主要版本接受一个或多个类或包。当使用接受类的重载时，包含这些类的包中的所有\
  \ bean 都将被添加到合成 bean 归档中。默认情况下，只会添加来自指定包的 bean，但这两个版本都有一个重载，允许您递归地添加来自某个包的 bean。当启用递归选项添加\
  \ bean 包时，该包及其子包中的所有 bean 都会被添加到合成 bean 归档中。使用此选项时需要小心，因为子包可能位于不同的归档中。父包可能不包含在 bean\
  \ 归档中，但其某个子包可能包含在其中。如果是这种情况，并且父包被递归添加，那么该子包也会被添加到合成 bean 归档中。这将导致与 `addBeanClasses()`\
  \ 方法相同的情况，即 bean 类在两个不同的 bean 归档中被指定，这将阻止容器初始化。\n\n`enableInterceptors()` 和 `enableDecorators()`\
  \ 方法可用于为合成 bean 归档启用拦截器或装饰器。这些方法允许有条件地启用拦截器或装饰器。如果拦截器或装饰器未包含在其他 bean 归档中，并且也未为合成\
  \ bean 归档启用，则该拦截器或装饰器将在运行时被静默忽略。例如，这使得仅在指定了某个命令行标志或应用程序在特定环境中运行时才启用拦截器成为可能。\n\n\
  CDI 扩展可以通过 `addExtensions()` 方法添加到合成 bean 归档中。此方法有两个重载，一个接受扩展类作为参数，另一个接受扩展实例。后者特别有趣，因为它允许使用匿名内部类作为扩展。以这种方式注册的类也不再需要使用服务配置文件进行注册。与\
  \ `enableInterceptors()` 和 `enableDecorators()` 方法一样，此方法可用于有条件地激活任何未在服务加载器配置文件中定义的扩展。\n\
  \n`selectAlternatives()` 方法用于在合成 bean 归档中选择替代 bean。此方法接受一个或多个 `Class` 类型的参数。该类必须是使用\
  \ `@Alternative` 注解的 bean 类，或者是包含使用 `@Alternative` 注解的生产者方法的类。`selectAlternativeStereotypes()`\
  \ 方法类似。它接受一个或多个使用 `@Alternative` 注解的原型注解类作为参数。`selectAlternatives()` 方法和 `selectAlternativeStereotypes()`\
  \ 方法都不会向合成 bean 归档添加任何类。所有必需的 bean 类都必须单独添加。这两种方法也只会为合成 bean 归档选择这些替代项；其他 bean 归档仍将使用默认\
  \ bean，除非它们在其各自的 `beans.xml` 文件中指定了替代项。\n\n用于扫描 bean 归档的 `ClassLoader` 可以使用 `setClassLoader()`\
  \ 方法设置。调用此方法会将 bean 归档扫描限制为仅对给定 `ClassLoader` 可用的 bean 归档。其用途之一是从类路径外部加载 bean 归档及其包含的\
  \ bean。考虑一个需要从预定义目录而不是类路径加载 bean 归档的应用服务器。这可以通过为此替代目录指定一个自定义类加载器来实现。\n\n最后，`disableDiscovery()`\
  \ 方法将完全禁用容器的 bean 归档扫描。类路径上可能存在的任何 bean 归档都将被忽略。所有 bean 类或包、拦截器类和装饰器类都必须显式注册到合成\
  \ bean 归档中。与自动 bean 归档扫描相比，这可以更好地控制哪些类可通过 CDI 使用。一个用例可能是为应用程序中的所有 bean 归档选择替代项。通常，所有\
  \ bean 归档都需要使用一个声明了所选替代 bean 的 `beans.xml` 文件进行更新。然而，更新现有的 bean 归档可能并不总是可行的。例如，一个\
  \ bean 归档可能在多个应用程序之间共享，而其他应用程序仍然需要使用默认 bean。在这种情况下，将合成 bean 归档与禁用发现功能结合使用，可以为所有类设置替代\
  \ bean，而无需更新任何 `beans.xml` 文件。\n\n必须声明应用程序所需的所有类或包可能是一个主要缺点。对于较大的应用程序，需要显式注册的依赖项列表可能会变得非常长且难以维护。\n\
  \n\n\n## 测试\n\n引导式 API 和合成 Bean 存档扫描在测试领域能发挥重要作用。单元测试和集成测试是任何软件开发流程的关键组成部分，有助于防止新缺陷引入代码库。这一点对于使用\
  \ CDI 的应用程序与其他应用程序同样适用。然而，依赖注入可能会使代码的隔离测试变得更加复杂。复杂的 Bean 层级结构难以通过编程方式管理，而考虑使用不同作用域的\
  \ Bean 层级结构时，难度会进一步增加。更好的做法是将测试代码也运行在 CDI 容器中，这样测试代码的主要关注点就是实际的测试逻辑，而非设置 Bean 类及其依赖关系。Arquillian\
  \ 已经提供了用于启动和停止容器的框架，但现在无需外部依赖也能实现这一点。以下代码清单展示了本章前面提到的 `GreetingService` 的一个简单 Junit\
  \ 5 测试：\n\n```\npackage helloworld;\nimport static org.junit.jupiter.api.Assertions.assertEquals;\n\
  import javax.enterprise.inject.se.SeContainer;\nimport javax.enterprise.inject.se.SeContainerInitializer;\n\
  import org.junit.jupiter.api.AfterEach;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.api.Test;\nclass GreetingServiceTest {\nprivate SeContainer\
  \ container;\n@BeforeEach\nvoid setUp() {\ncontainer = SeContainerInitializer.newInstance().initialize();\n\
  }\n@AfterEach\nvoid tearDown() {\ncontainer.close();\n}\n@Test\nvoid generateGreeting()\
  \ {\nGreetingService greetingService = container.select(GreetingService.class).get();\n\
  assertEquals(\"Hello, world!\", greetingService.generateGreeting(\"world\"));\n\
  }\n}\n```\n\n在此示例中，容器在每个测试方法前后通过使用 `@BeforeEach` 和 `@AfterEach` 注解的方法启动和停止。这将确保每个单独的测试方法都在独立的容器实例中运行。这是一种在测试之间重置容器状态的有效方式。例如，可能存在多个\
  \ `@ApplicationScoped` Bean 会跟踪测试期间更新的状态。通过每次启动和停止容器，每个测试都将在全新的环境中运行。如果残留状态不成问题，CDI\
  \ 容器也可以在带有 `@BeforeAll` 和 `@AfterAll` 注解的静态方法中启动和停止。`@BeforeAll` 方法会在测试类的任何测试方法被调用前调用一次，而\
  \ `@AfterAll` 方法则在之后调用一次。如果需要在测试期间获取容器的引用，可以将其存储在 `@BeforeAll` 方法的静态字段中，或者通过调用 `CDI.current()`\
  \ 来获取。\n\n可能出现的一个问题是，当需要模拟或伪造注入的 Bean 时。模拟或伪造应谨慎使用，但有时不可避免，例如当 Bean 调用远程 API 时。一个简单的解决方案是将模拟或伪造的\
  \ Bean 标记为 `@Alternative`，并使用特定于测试的 `beans.xml` 注册该替代项。然而，这种方法在大多数情况下并不奏效。原因在于测试代码通常会被编译到与被测代码不同的目标文件夹中。因此，测试代码会位于不同的\
  \ Bean 存档中，而替代项仅针对当前 Bean 存档注册，导致被测代码仍会使用常规 Bean 而非替代项。\n\n当结合禁用自动 Bean 存档扫描时，合成\
  \ Bean 存档可以为这个问题提供解决方案。通过禁用存档扫描，测试所需的所有 Bean 都必须显式注册到合成 Bean 存档中。然后，可以使用 `selectAlternatives()`\
  \ 方法将替代 Bean 注册到合成 Bean 存档中。由于所有 Bean 现在都位于同一个存档中，这也会为测试所涵盖的所有 Bean 注册替代项。这个解决方案也引入了一个新问题：随着被（间接）测试的代码随时间演变，测试注册的\
  \ Bean 列表需要持续更新。因此，如果不是严格需要使用模拟或伪造，最好避免采用这种方法。\n\n例如，如果你更新 `GreetingService` 以调用远程的\
  \ `LocalizedGreetingMessageService` 来获取本地化的问候消息，你需要在测试期间替换 `LocalizedGreetingMessageService`\
  \ 的实现。你可以通过提供一个 `FakeLocalizedGreetingMessageService` 实现来解决这个问题，该实现不执行任何远程调用，但仍能提供测试所需的输出。你可以使用\
  \ `selectAlternatives()` 方法来选择你的伪造服务，但如果你不禁用自动存档扫描，更新后的 `GreetingService` 在测试运行时仍会执行远程调用。然而，如果你在\
  \ `SeContainerInitializer` 上调用 `disableDiscovery()` 方法，测试将转而调用你的伪造服务。示例 XYZ 将展示\
  \ `RemoteGreetingServiceTest` 的代码：\n\n```\npackage helloworld;\nimport javax.enterprise.inject.se.SeContainer;\n\
  import javax.enterprise.inject.se.SeContainerInitializer;\nimport org.junit.jupiter.api.AfterEach;\n\
  import org.junit.jupiter.api.BeforeEach;\nimport org.junit.jupiter.api.Test;\npublic\
  \ class RemoteGreetingServiceTest {\nprivate SeContainer container;\n@BeforeEach\n\
  void setUp() {\ncontainer = SeContainerInitializer.newInstance()\n.disableDiscovery()\n\
  .addPackages(RemoteGreetingService.class.getPackage())\n.selectAlternatives(FakeLocalizedGreetingMessageService.class)\n\
  .initialize();\n}\n@AfterEach\nvoid tearDown() {\ncontainer.close();\n}\n@Test\n\
  public void testGenerateGreeting() {\n// TODO implement test here.\n}\n}\n```\n\n\
  \n\n## 作用域\n\n作用域与上下文是 CDI 最重要的组成部分之一。它们管理着容器所托管 Bean 的生命周期，同时也决定了事件应被投递到哪些 Bean。CDI\
  \ 在 Java SE 中完全支持作用域功能。所有内置作用域均受支持，但在某些作用域的激活时机上存在若干关键差异。例如，由于 Java EE 拥有 Servlet\
  \ API，因此定义请求作用域的工作方式相对容易。但 Java SE 的情况则不同：Java SE 应用程序可能根本不处理请求，或者仅使用底层服务器套接字来处理传入请求。因此，并非总能明确定义作用域在\
  \ Java SE 中应如何运作。结果，请求作用域在 Java SE 中的定义比在 Java EE 中受限得多。与 Java EE 一样，应用程序仍然可以提供自定义的作用域上下文。\n\
  \n以下是对每个内置作用域的定义：\n\n*   **应用作用域上下文**，定义为始终处于激活状态\n*   **请求作用域上下文**，在所有 `@PostConstruct`\
  \ 回调方法和所有异步观察者方法期间处于激活状态\n*   **会话作用域上下文**，其生命周期未预定义\n*   **对话作用域上下文**，由活动应用程序本身控制\n\
  \nJava SE 应用程序仍然可以通过提供自定义作用域上下文来覆盖上述每个作用域的定义。请求作用域就是一个体现其用途的例子。如果 Java SE 应用程序处理传入请求，则可以重新定义请求作用域，使其在处理这些请求期间处于激活状态。有关覆盖内置作用域的更多信息，请参见第\
  \ 4 章。\n\n除了内置作用域，Java SE 中的 CDI 还支持依赖伪作用域。与 Java EE 中一样，依赖作用域的 Bean 会采用其被注入或创建来源的\
  \ Bean 的生命周期。因此，例如，如果一个依赖 Bean 被注入到一个应用作用域的 Bean 中，那么该依赖 Bean 也将采用应用作用域作为其生命周期。请注意，依赖作用域的\
  \ Bean 永远不会被共享；如果某个特定类型的 Bean 被注入到另外两个具有相同作用域的 Bean 中，那么这两个 Bean 将各自获得该依赖 Bean 的不同实例。\n\
  \n## Java FX\n\nJavaFX 从 Java 8 开始成为 JRE 和 JDK 的一部分，是 Java 的新 UI 工具包。与现有的 UI 工具包（AWT、Swing\
  \ 和 SWT）相比，它提供了诸多优势，通过基于场景图的方法来构建 UI，并支持特效、动画甚至 3D。它被设计为支持从桌面应用到移动应用的多种设备。\n\nJavaFX\
  \ 中的 `Application` 类可以被扩展，以提供 JavaFX 应用程序的入口点。当扩展 `Application` 类时，JVM 会自动检测到 JavaFX\
  \ 的使用，并确保应用程序在正确的线程上初始化和启动。`Application` 类通过三个方法提供了一个简单的应用程序生命周期。`init()` 方法用于初始化应用程序，`start()`\
  \ 方法用于启动应用程序，`stop()` 方法用于在 JavaFX 框架即将关闭时停止应用程序。在 JavaFX 应用程序中集成 CDI 的一种简单方法是在\
  \ `start()` 方法中使用 `try-with-resources` 语句初始化容器。但这行不通，因为 `start` 方法在应用程序开始运行时即完成，而非在应用程序关闭时，这会导致\
  \ CDI 容器过早关闭。更好的方法是重写 `init()` 方法来初始化 CDI 容器，并将生成的 `SeContainer` 实例赋值给 `Application`\
  \ 子类中的一个字段。为了关闭活动容器，可以重写 `stop()` 方法，在 `SeContainer` 实例上调用 `close()` 方法。\n\n另一种方法是在初始化\
  \ JavaFX 之前，在 `main()` 方法中初始化 CDI 容器。JavaFX 提供了多个静态工具方法，可用于初始化 JavaFX 框架以及初始化和启动\
  \ JavaFX 应用程序。这些方法在应用程序停止之前不会完成。因此，这些方法适合在将 CDI 容器作为资源管理的 `try-with-resources` 块中调用。最直接的方法是使用\
  \ `Application.launch(String... args)`。此方法只能从扩展了 `Application` 类的类中的方法调用。原因在于应用程序类是通过检查调用栈来确定的。以下代码片段展示了在\
  \ main 方法中初始化 CDI 和 JavaFX 的示例：\n\n```\npublic static void main(String[] args) {\n\
  try (SeContainer container = SeContainerInitializer.newInstance().initialize())\
  \ {\nApplication.launch(args);\n}\n}\n```\n\n在 JavaFX 中创建用户界面的一种常见方式是使用 FXML。FXML\
  \ 是一种基于 XML 的语言，用于定义视图中的所有 UI 组件及其布局。FXML 语言还允许为视图定义一个控制器类。FXML 视图通过 `FXMLLoader`\
  \ 类从文件加载。`FXMLLoader` 实例会解析 FXML 配置，并创建视图及相应控制器的实例。由于控制器是将 UI 输入转换为对业务逻辑调用的地方，因此能够使用\
  \ CDI 注入控制器的依赖项将非常棒。`FXMLLoader` 类通过允许您定义用于创建所有控制器实例的工厂来支持此功能。该工厂必须实现 `javafx.util.Callback`\
  \ 接口，并以控制器的类作为唯一参数。由于 CDI 容器提供了一种通过 Bean 的类来获取其实例的方法，因此您可以将其用作控制器工厂。由于 `Callback`\
  \ 接口是一个函数式接口，您只需提供一个 lambda 表达式，该表达式使用 CDI 容器来获取给定类的实例，可以通过使用对 `SeContainer` 实例的可用引用，或者调用\
  \ `CDI.current()` 来获取它。由于控制器类现在是一个 CDI 管理的 Bean，您可以直接将所需的任何依赖项注入到控制器中。以下清单展示了一个加载\
  \ FXML 视图的简单 JavaFX 应用程序：\n\n```\npackage helloworld;\nimport javax.enterprise.inject.se.SeContainer;\n\
  import javax.enterprise.inject.se.SeContainerInitializer;\nimport javax.enterprise.inject.spi.CDI;\n\
  import javafx.application.Application;\nimport javafx.fxml.FXMLLoader;\nimport javafx.scene.Parent;\n\
  import javafx.scene.Scene;\nimport javafx.stage.Stage;\npublic class HelloWorldFxExample\
  \ extends Application {\nprivate SeContainer seContainer;\n@Override\npublic void\
  \ init() {\nseContainer = SeContainerInitializer.newInstance().initialize();\n}\n\
  @Override\npublic void start(Stage stage) throws Exception {\nFXMLLoader fxmlLoader\
  \ = new FXMLLoader();\nfxmlLoader.setControllerFactory(clazz -> CDI.current().select(clazz).get());\n\
  fxmlLoader.setLocation(HelloWorldFxExample.class.getResource(\"/helloworld/hello.fxml\"\
  ));\nParent root = fxmlLoader.load();\nstage.setScene(new Scene(root));\nstage.show();\n\
  }\n@Override\npublic void stop() {\nseContainer.close();\n}\n}\n```\n\n\n\n使用 CDI\
  \ 容器作为控制器实例的工厂存在一些注意事项。JavaFX 提供了一种有限的依赖注入形式，即使用 `@FXML` 注解将 FXML 视图中的组件注入到控制器中。无法将\
  \ JavaFX 提供的这种注入与具有 CDI 作用域（除依赖伪作用域外）或注册了任何拦截器的控制器结合使用。这样做会导致标记有 `@FXML` 的字段在 Bean\
  \ 构建后保持未初始化状态。这是 CDI 容器实现作用域和拦截器的方式所导致的结果。当尝试获取或注入具有作用域或拦截器的 Bean 实例时，容器将使用代理而不是\
  \ Bean 的实际实例。当在此代理上调用任何方法时，代理将首先调用任何适用的拦截器，然后根据 Bean 的作用域定义委托给实际实例。由于代理必须可赋值给原始\
  \ Bean 类型的任何字段、变量或参数，因此代理必须是原始 Bean 类的子类。这导致代理也继承了原始类中定义的任何字段。如果原始类包含任何用 `@FXML`\
  \ 注解的字段，代理的类也将具有这些相同的字段和相同的注解。由于 `FXMLLoader` 将从您定义的控制器工厂获取代理，它将尝试将视图中的相应组件注入到此代理中。`FXMLLoader`\
  \ 永远“看不到”原始控制器 Bean 实例，并且任何用 `@FXML` 注解的字段都将保持未初始化状态。任何尝试在控制器上调用使用这些组件的方法都可能导致抛出\
  \ `NullPointerException`。\n\n避免此问题的最简单方法是避免将拦截器和作用域与 `FXMLLoader` 的组件注入结合使用，而是让每个控制器类都采用依赖作用域。这并非理想解决方案，因为它意味着每个控制器实例的生命周期可能绑定到\
  \ CDI 容器的生命周期。如果某个视图在应用程序中被多次创建，则必须显式销毁控制器实例。如果这些控制器实例未被显式销毁，它们可能会导致内存泄漏，因为在容器关闭之前，它们可能不符合垃圾回收的条件。\n\
  \n### 替换 JavaFX 注入\n\n由于依赖注入是 CDI 的核心功能，因此让 CDI 容器而不是 JavaFX 来注入组件会好得多。这将允许控制器实例使用\
  \ CDI 的全部功能，包括作用域和拦截器，同时也允许将 CDI 组件注入到非控制器类中。为实现此目的，您需要实现一个生产者，该生产者能够根据其组件 ID 提供组件。理想情况下，此生产者生成的组件也应限定在当前视图范围内，这样如果应用程序中存在多个活动视图，即使两个组件具有相同的\
  \ ID，组件仍将被注入到正确的控制器中。\n\n您需要做的第一件事是定义您的视图作用域。幸运的是，您可以使用 MicroScoped 库（可在 [`https://github.com/tomitribe/microscoped`](https://github.com/tomitribe/microscoped)\
  \ 找到）来避免创建作用域实现时的大量样板代码。您只需要定义作用域注解并注册作用域上下文。对于您的视图作用域，您将创建一个无参数的 `@ViewScoped`\
  \ 注解，并使用带有 `String` 参数的 MicroScoped `ScopeContext`。这里使用任何键都可以，但我们将使用转换为 `String`\
  \ 的 UUID。\n\n接下来，定义用于注入组件的限定符注解。JavaFX 执行的组件注入基于字段的名称。您可以通过向限定符注解添加一个用于组件 ID 的 `String`\
  \ 参数来复制此行为。通常，像这样的 `String` 参数会被注解为 `@Nonbinding`。这将允许单个生产者方法处理限定符注解的所有实例，无论参数的值如何。然而，在这种情况下，您不会将值参数注解为\
  \ `@Nonbinding`，原因稍后会变得清楚。\n\n```\nimport static java.lang.annotation.ElementType.FIELD;\n\
  import static java.lang.annotation.ElementType.METHOD;\nimport static java.lang.annotation.ElementType.PARAMETER;\n\
  import static java.lang.annotation.ElementType.TYPE;\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
  import java.lang.annotation.Retention;\nimport java.lang.annotation.Target;\nimport\
  \ javax.inject.Qualifier;\n@Qualifier\n@Retention(RUNTIME)\n@Target({METHOD, PARAMETER,\
  \ TYPE, FIELD})\npublic @interface Component {\nString value();\n}\n```\n\n\n\n\
  现在你已经定义了作用域和限定符注解，接下来需要弄清楚如何让视图中的组件对 CDI 可用。自 Java 9 起，`FxmlLoader` 提供了一种在加载 FXML\
  \ 文件时检查组件的方式。每个 `FxmlLoader` 可以有一个 `LoadListener`，该监听器会在 FXML 文件解析过程中发生的事件时被调用。`LoadListener`\
  \ 接口定义了许多回调方法，每个方法对应一个特定事件。对于这个用例，最有趣的回调方法是 `endElement()` 方法。当读取到 FXML 文件中某个 XML\
  \ 元素的结束标签时，会调用此方法，并将该元素本身作为值传入。例如，当读取到 `Button` 标签的结束时，从该标签创建的新 `Button` 实例会作为值传递给\
  \ `endElement()` 方法。由于一个应用程序可能有同一个视图的多个实例，或者不同视图拥有相同的组件 ID，理想情况下，你希望能够将不同视图的组件分开管理。因此，你将创建一个\
  \ `@ViewScoped ComponentManager`，用于跟踪视图中的组件及其 ID。`ComponentManager` 将是一个相当简单的类，包含两个方法：一个\
  \ `registerComponent()` 方法用于注册组件及其对应的 ID，以及一个 `getComponent()` 方法，用于根据 ID 返回组件。对于这些方法的实现，使用映射（map）来存储和检索组件就足够了。由于组件的\
  \ ID 属性是可选的，你只应注册那些指定了 ID 的组件。\n\n可以在控制器上为 FXML 文件中的某些 UI 事件指定回调方法。例如，可以为按钮指定一个控制器方法，当该按钮被点击时调用。在加载\
  \ FXML 文件时，事件处理器会被注册到正在加载的视图的组件上，这些处理器会调用控制器上的回调方法。由于控制器本身或其依赖的 bean 也可能是视图作用域的，你需要确保每当视图中的任何组件触发\
  \ UI 事件时，视图作用域都是激活的。如果在事件触发时视图作用域未激活，任何对视图作用域 bean 的调用都会导致抛出 `ContextNotActiveException`。每个\
  \ JavaFX 组件都有一个可变的 `EventDispatcher` 属性，负责将所有事件分派到正确的事件处理器。通过提供的 setter，可以用自定义实现替换\
  \ `EventDispatcher`，该实现可以在分派事件前激活场景作用域，并在分派后禁用它。为了正确分派事件，这个自定义事件分派器还必须包装原始的事件分派器。由于\
  \ `EventDispatcher` 接口只有一个抽象方法，因此可以使用相当简单的 lambda 表达式作为实现。事件可以由多个组件的 `EventDispatcher`\
  \ 处理。如果一个场景被包含在另一个场景中，这可能会成为问题。通过使作用域可堆叠，每个组件的 `EventDispatcher` 都会为其自身的场景启动一个场景作用域实例，这样正确的场景作用域将始终处于激活状态。你可以在\
  \ `LoadListener` 实现中为每个组件注册自定义的 `EventDispatcher` 实现。加载 FXML 视图的代码将类似于以下示例：\n\n\
  ```\n// 为当前视图作用域生成唯一 ID\nString viewId = UUID.randomUUID().toString();\n// 启动视图作用域\n\
  ScopeContext viewScopeContext = (ScopeContext) beanManager.getContext(ViewScoped.class);\n\
  viewScopeContext.enter(viewId);\ntry {\n    FXMLLoader fxmlLoader = new FXMLLoader();\n\
  \    fxmlLoader.setLoadListener(new LoadListener() {\n        // 省略 LoadListener\
  \ 中的其余方法\n        @Override\n        public void endElement(Object value) {\n  \
  \          if (value instanceof Node) {\n                Node node = (Node) value;\n\
  \                if (node.getId() != null) {\n                    componentManager.registerComponent(node.getId(),\
  \ node);\n                }\n                // 注册我们自定义的事件分派器\n                EventDispatcher\
  \ eventDispatcher = node.getEventDispatcher();\n                node.setEventDispatcher((event,\
  \ eventDispatcherChain) -> {\n                    viewScopeContext.enter(viewId);\n\
  \                    try {\n                        return eventDispatcher.dispatchEvent(event,\
  \ eventDispatcherChain);\n                    } finally {\n                    \
  \    viewScopeContext.exit(viewId);\n                    }\n                });\n\
  \            }\n        }\n    });\n} finally {\n    viewScopeContext.exit(viewId);\n\
  }\n```\n\n当你想要编写生成 UI 组件的生产者方法时，会遇到两个问题。第一个问题是，注入点的类型和限定符注解需要与生产者方法完全匹配。不幸的是，JavaFX\
  \ 提供了许多内置组件类型，应用程序和库也可以定义自己的自定义组件。在一个大型应用程序中，为每种唯一类型提供一个生产者方法将非常不切实际。如果你遗漏了某种类型的生产者方法，也只有在应用程序启动后才会发现这个问题。\n\
  \n另一个问题是，你需要为 JavaFX 组件添加作用域，以便将它们注入到正确的控制器中。所有 JavaFX 组件都继承自 `javafx.scene.Node`\
  \ 类。`Node` 类包含许多 final 方法，这使得无法对 JavaFX 组件进行代理。回想一下，代理必须与被注入的类型相同。这意味着代理必须扩展组件类型本身才能代理它，并重写所有方法以委托给实际实例。由于\
  \ final 方法无法被重写，因此无法将这些方法的调用委托给实际实例，这些方法将仅在代理上执行。\n\n幸运的是，你可以使用 CDI 2.0 中的动态 bean\
  \ 功能同时解决这两个问题。你可以实现一个 CDI 扩展，监听 `ProcessManagedBeanType` 事件。当发现一个新的 bean 时，你将扫描该\
  \ bean 的字段，检查是否有任何字段使用了你的组件限定符注解进行注解，并将这些字段的类型和限定符注解的组合保存在一个 `Set` 中。当扩展上的 `AfterBeanDiscovery`\
  \ 回调被调用时，你可以使用 `BeanConfigurator` 为你需要的每种类型和限定符注解的组合注册一个动态生产者。在配置你的生产者时，你还可以指定要应用于其生成的\
  \ bean 的作用域注解。动态生产者的实际实现由一个回调方法组成，该方法接收一个 `Instance`。你可以在动态生产者中使用这个 `Instance` 来查找之前定义的组件管理器。一旦有了组件管理器，你就可以简单地查找所需的组件。然而，生产者无法读取注入点上指定的限定符注解。这就是为什么将组件\
  \ ID 设为限定符注解中的非绑定参数会变得有用，因为你现在可以简单地在动态生产者中对其进行硬编码。对于组件 ID 的每个不同值，你将创建一个新的动态生产者。\n\
  \n\n\n由于 `Node` 类中存在 final 方法，导致无法直接代理你的组件，因此你需要让生产者返回一个可被代理的不同类型。这意味着你需要将返回的组件包装在另一个类型中。遗憾的是，这确实意味着无法直接注入组件，而需要通过方法调用来获取组件本身。这个包装类型的唯一要求是：非\
  \ final、仅包含非 final 方法，并且有一个返回泛型类型以获取被包装组件的方法。`java.util.function.Supplier` 类型非常适合此场景。它是一个接口，因此可以轻松被代理，并且拥有一个泛型方法。在生产者中查找组件后，你可以返回一个\
  \ `Supplier<?>`，该 Supplier 将始终返回你从 `ComponentManager` 获取的组件。\n\n```\nimport java.lang.reflect.Type;\n\
  import java.util.AbstractMap;\nimport java.util.HashSet;\nimport java.util.Map.Entry;\n\
  import java.util.Set;\nimport java.util.function.Supplier;\nimport javax.enterprise.event.Observes;\n\
  import javax.enterprise.inject.spi.AfterBeanDiscovery;\nimport javax.enterprise.inject.spi.AnnotatedField;\n\
  import javax.enterprise.inject.spi.Extension;\nimport javax.enterprise.inject.spi.ProcessManagedBean;\n\
  import javafx.scene.Node;\npublic class FxmlComponentProducerExtension implements\
  \ Extension {\nprivate static final Set> types = new HashSet();\npublic  void collect(@Observes\
  \ ProcessManagedBean event) {\nfor (AnnotatedField field : event.getAnnotatedBeanClass().getFields())\
  \ {\nif (field.isAnnotationPresent(Component.class)) {\nComponent component = field.getAnnotations(Component.class).stream().findFirst().get();\n\
  types.add(new AbstractMap.SimpleEntry(component, field.getBaseType()));\n}\n}\n\
  }\npublic void afterBean(@Observes AfterBeanDiscovery afterBeanDiscovery) {\ntypes.forEach(entry\
  \ -> {\nafterBeanDiscovery\n.addBean()\n.scope(ViewScoped.class)\n.types(entry.getValue())\n\
  .addQualifier(entry.getKey())\n.produceWith(f -> {\nComponentManager componentManager\
  \ = f.select(ComponentManager.class).get();\nNode component = componentManager.getComponent(entry.getKey().value());\n\
  return (Supplier) () -> component;\n});\n});\n}\n}\n```\n\n现在你已能将组件注入到控制器中，可能需要在视图加载后使用它们执行某些逻辑。例如，在显示当前日期的应用中，控制器可能在加载后更新文本字段以显示日期。在控制器中执行此类逻辑有两种方式；选择哪种方式取决于初始化逻辑应在何时执行。第一种方式是使用\
  \ `@PostConstruct` 方法，就像任何常规的 CDI bean 一样。将逻辑放在 `@PostConstruct` 方法中的一个问题是，任何有作用域的\
  \ CDI bean 都是延迟初始化的。这意味着 bean 只有在调用其某个方法时才会被创建，例如在 UI 事件后的回调中。这可能导致奇怪的用户体验，即用户界面可能只有在用户执行某些操作（导致控制器上的方法被调用）后才会正确初始化。\n\
  \n`FXMLLoader` 机制本身为这个问题提供了解决方案。在加载视图并创建所有视图组件和控制器后，`FXMLLoader` 会扫描控制器类中名为 `initialize()`\
  \ 的实例方法，如果找到则调用该方法。调用此方法会产生一个副作用：在 `FXMLLoader` 返回加载的视图之前，会导致控制器实例的初始化；任何放在此方法中的初始化逻辑都将在视图显示之前执行。由于你已经确保视图作用域处于活动状态，因此与通过\
  \ CDI 注入的任何组件进行交互都是安全的。对于任何需要在视图显示之前由控制器执行逻辑的情况，`initialize()` 方法比 `@PostConstruct`\
  \ 方法更可取。\n\n注意：避免将 `initialize` 用作带有 `@PostConstruct` 注解的方法的方法名。JavaFX 会在控制器创建后自动尝试调用该名称的任何返回\
  \ `void` 的方法。由于 `@PostConstruct` 方法在构造后已经由 CDI 调用，因此名为 `initialize()` 的 `@PostConstruct`\
  \ 方法会被调用两次。\n\n\n\n### Java 9 模块\n\nJava 9 向 JVM 引入了模块的概念。模块本质上是包含模块描述符的 JAR 文件。模块系统带来的最大变化之一，是实现了比\
  \ `public`、`private` 或 `protected` 关键字更精细的访问控制级别。模块可以限制对包的访问，仅允许来自同一模块、仅来自预定义的模块集或任何其他模块的访问。这使得模块能够隐藏其实现细节，使其不成为模块导出\
  \ API 的一部分。模块系统还对反射访问引入了更严格的规则。没有模块系统时，代码的访问限制可以轻易地通过反射绕过。然而，对于位于模块中的代码，尝试绕过访问限制将会抛出异常。\n\
  \n隐藏 CDI 库的内部实现非常有用。考虑一个库，它提供了两个位于不同包中的公共类。这两个类的实现都依赖于第三个内部类。如果这两个公共类位于同一个包中，那么只需将内部类也放在该包中，并将其声明为包级私有即可。CDI\
  \ 仍然能够访问该内部类并将其注入到公共类中，同时防止从包外部轻易访问该内部类。然而，由于这两个依赖于内部类的类位于不同的包中，内部类必须被声明为 public。这可能导致库的用户（意外地）使用本应仅为内部类的类。模块系统通过仅允许访问那些声明为对其他模块导出的\
  \ API 来解决此问题。\n\n然而，CDI 规范目前尚未针对模块系统进行更新。对反射访问的更严格检查也会对 CDI 容器产生重大影响，因为它们严重依赖反射。一个例子是将依赖项注入到私有字段中；如果没有反射访问，这是不可能的。默认情况下，CDI\
  \ 容器也无法访问任何未作为模块导出 API 一部分的类。因此，建议避免在 CDI 应用程序中使用模块系统，至少在该规范被更新以明确处理模块系统之前是这样。\n\
  \n如果确实有强烈的需求要对应用程序进行模块化，有几种选项可以让 CDI 与 JDK 模块系统协同工作。第一种是避免注入到私有字段，而使用构造器注入。然而，这仅能克服依赖注入场景下反射新限制带来的问题。它无法解决使用拦截器装饰非公共类的问题。如果一个\
  \ Bean 依赖于大量其他依赖项，构造器也可能变得相当庞大。\n\n一个稍好一些的替代方案是将模块声明为完全开放以进行反射。将模块本身声明为开放以进行反射，意味着它包含的所有包都将变为公共的，并对反射访问开放。假设你有一个名为\
  \ `com.foo` 的模块。要将该模块声明为完全开放以进行反射，可以使用以下模块描述符。该模块有一个名为 `com.foo.a` 的包，其中包含一个名为 `PublicA`\
  \ 的类；一个名为 `com.foo.b` 的包，其中包含一个名为 `PublicB` 的类；以及一个名为 `com.foo.c` 的包，其中包含一个名为 `InternalC`\
  \ 的类。`PublicA` 和 `PublicB` 都是该模块官方 API 的一部分；这些是模块用户可以自由使用的类。`InternalC` 类是模块的一个内部类，被\
  \ `PublicA` 和 `PublicB` 共同使用。`InternalC` 应仅在模块内部使用，模块用户绝不应使用它。\n\n以下是一个将模块开放以进行反射的模块描述符：\n\
  \n```\nopen module com.foo {\n}\n```\n\n这种方法允许 CDI 通过反射访问任何私有字段或类，但它也会使模块中的每个公共类都成为模块导出\
  \ API 的一部分。假设该模块包含三个 Bean 类：两个应作为公共 API 一部分的类，名为 `com.foo.a.PublicA` 和 `com.foo.b.PublicB`，以及一个被注入到\
  \ `PublicA` 和 `PublicB` 中的内部 Bean 类，名为 `com.foo.c.InternalC`。由于 `PublicA` 和 `PublicB`\
  \ 位于不同的包中，`InternalC` 必须是 public 的。然而，将模块声明为完全开放意味着任何公共类都会成为模块公共 API 的一部分。在这种情况下，`InternalC`\
  \ 无意中成为了 `com.foo` 模块公共 API 的一部分。\n\n另一种方法是明确将 `com.foo.a` 和 `com.foo.b` 包声明为模块导出\
  \ API 的一部分。为了使 CDI 能够访问并注入 `InternalC` 类，必须明确将 `com.foo.c` 包声明为对反射开放。为了将 `InternalC`\
  \ 注入到 `PublicA` 和 `PublicB` 类的非公共字段中，它们的包也必须被明确声明为对反射访问开放；仅将这些包声明为公共 API 的一部分是不够的。模块描述符将类似于以下内容：\n\
  \n```\nmodule com.foo {\nexports com.foo.a;\nexports com.foo.b;\nopens com.foo.a;\n\
  opens com.foo.b;\nopens com.foo.c;\n}\n```\n\n这冗长得多，但它能达到你想要的效果吗？`InternalC` 类在编译时对导出的\
  \ API 隐藏，同时在运行时仍可通过反射被 CDI 容器访问。CDI 容器在执行依赖注入时也能够访问 `PublicA` 和 `PublicB` 类中的任何私有字段。然而，`InternalC`\
  \ 类不仅可以通过反射被 CDI 容器访问；它也可以通过反射被任何代码访问。一个了解 `InternalC` 类存在的狡猾模块用户，如果他们愿意，仍然可以访问它。\n\
  \n在未来某个时候，CDI 规范可能会更新以支持模块系统。这种支持的一部分将包括提供一个 API 模块。目前，已经存在一个被某些容器使用的官方 API JAR，但一个\
  \ API 模块将在模块系统内带来一些额外的好处。API 模块可以将其访问权限委托给任何为该 API 提供实现的模块。由于模块只能将包导出或开放给特定的模块，这意味着一旦\
  \ CDI 规范定义了一个 API 模块，就可以授予任何 CDI 容器反射访问权限，而无需在编译时知道将使用哪个容器。假设 CDI 定义了一个名为 `cdi.api`\
  \ 的 API 模块；那么你的模块的 `module-info` 将类似于以下内容：\n\n```\nmodule com.foo {\nexports com.foo.a;\n\
  exports com.foo.b;\nopens com.foo.a to cdi.api;\nopens com.foo.b to cdi.api;\nopens\
  \ com.foo.c to cdi.api;\n}\n```\n\n理论上，使用 CDI 2.0 容器已经可以做到这一点。模块系统会为在模块路径上找到的任何非模块化\
  \ JAR 文件生成一个模块名称。生成的模块名称基于文件名。例如，一个名为 `cdi-api.jar` 的 JAR 文件将获得模块名称 `cdi.api`。也可以使用这个模块名称来限制对某个模块的反射访问。然而，这样做并不可取。不同的\
  \ CDI 容器可能对 API JAR 使用不同的文件名，导致模块名称不兼容。在 CDI 容器之间切换将需要将对旧容器 API 模块的所有引用替换为对新容器 API\
  \ 模块的引用。对于一个总是在同一个容器中运行的应用程序来说，这可能没问题，但对于一个需要能在多个不同容器上运行的库来说，这并不理想。更糟糕的是，同一容器的不同版本可能使用不同的文件名，导致同一容器的不同版本彼此不兼容。除此之外，如果\
  \ CDI 规范更新并为 API JAR 文件指定了一个模块名称，这个名称很可能会与生成的模块名称不同。\n\n目前，尚不清楚模块系统在 JDK 之外会被广泛采用到什么程度，也不清楚\
  \ CDI 是否会开始支持模块系统。尽管前面的内容证明了 CDI 和模块系统目前可以协同工作，但之前建议采取观望态度的建议仍然有效。\n\n\n\n### 索引\n\
