- "# 1. CDI 的历史\n\n本章将介绍上下文与依赖注入（以下简称 CDI）的历史，从其无可否认相关的先驱技术开始，一直讲到当前状况。我们将涵盖 JSF 和\
  \ EJB 等技术，以及 Gavin King 等关键人物。我们还将介绍 CDI 历史上一些最具决定性的时刻，你将了解到像 CDI 这样的技术是如何从表面上看似截然不同的各种想法中演变而来的。\n\
  \n需要注意的是，如此漫长而复杂的演变很难详尽描述，即使可能，完整的描述也需要一整本书的篇幅。因此，本章并非 CDI 的完整历史，而仅讨论最重要的事件。\n\n\
  ## 传奇时代\n\n每一段旅程都有第一步，CDI 的漫长旅程当然也不例外。就本书而言，这第一步始于 EJB 1.0。当然，EJB 本身也有其起源故事，涉及诸如\
  \ TopLink、微软的 ODBC 以及更早的 X/Open SQL CLI 等持久化技术，还有对象代理 CORBA 的起源故事，以及早期 AT&T Tuxedo\
  \ 等事务服务器的历史——Tuxedo 本身也是 X/OPEN XA 标准的灵感来源之一。然而，这些故事不在本书的讨论范围之内。\n\nEJB 1.0 始于 1997\
  \ 年底，主要由 Sun、Oracle 和 IBM 合作开发，距离同年年初 Java 1.1 发布不久。Java 1.1 引入了一系列基础技术，为 EJB 奠定了基础，特别是\
  \ JavaBeans、JDBC、RMI，以及当时影响较小的反射（尽管反射后来可以说是所有“受管 Bean”模型中最基础的技术）。这些技术不仅在技术层面上至关重要，还改变了人们对\
  \ Java 应用领域的认知。Java 1.0 主要专注于小程序，即在 Web 浏览器内的小型盒子中执行的*小型*应用程序。随着 Java 1.1 中上述新技术的出现，特别是\
  \ EJB 1.0 的即将到来，将 Java 用于服务器端和商业计算的想法开始扎根。\n\n人们对 EJB 寄予厚望。在其 CDI 历史地位中特别相关的是对*（可移植）组件模型*的承诺，以及随之而来的一个市场，开发者可以在其中购买可插入任何\
  \ EJB 容器的独立组件。\n\n与 2017 和 2018 年的微服务热潮并非完全不同，在 1997 和 1998 年，*分布式对象*风靡一时。因此，EJB\
  \ 1.0 中的组件（称为 EJB）被设计为仅支持远程访问也就不足为奇了。从某种意义上说，你可以将它们视为一种用于 IIOP 和 RMI 协议的 Servlet。有状态变体理论上对应于使用\
  \ HTTP 会话的 Servlet，而无状态变体理论上对应于不使用 HTTP 会话的 Servlet。\n\n1998 年 3 月 24 日，在当年的 JavaOne\
  \ 大会上，Sun 发布了 EJB 的初始 1.0 版本。市场反响最初相当热烈，EJB 被称为“一项有前途的新技术”。尽管承诺满满，但 EJB 1.0 规范的实现在很多方面仍有待改进。尤其麻烦的是，对于本应相对简单的事情，却需要许多移动部件，这给开发者带来了很高的认知负荷。简单来说，该规范要求开发者承担许多本应由容器/运行时自动完成的任务。当然，我们必须考虑到当时的时代精神和技术状况。例如，Java\
  \ 还没有 JIT 编译器，XML 1.0 刚刚发布一个月，而 EJB 1.0 规范的开发时间也并不长（1997 年底到 1998 年初）。\n\n\n上述提到的活动部件包括实际的\
  \ Bean 本身，接着是一个包含该 Bean 业务方法和删除该特定 Bean 的方法的“远程接口”，一个客户端可通过其查找和删除各种类型 Bean 的“本地接口”，每个\
  \ Bean 的部署描述符（它是 `javax.ejb.deployment.SessionDescriptor` 和 `javax.ejb.deployment.DeploymentDescriptor`\
  \ 以及这些类的各种相关类的序列化实例 (!)），一个清单文件，以及作为最后侮辱的、可能存在的供应商特定配置文件。除此之外，通常还必须使用供应商特定的工具来生成配置文件和/或编译所列出的文件。作为该过程的一部分，还会创建一些额外的文件，例如远程通信所需的所谓骨架和存根。为整个应用程序完成所有这些工作已经很麻烦，但为每一个\
  \ Bean 都这样做，嗯，说得委婉点，可不太妙。\n\n以下是一个早期 EJB 样子的示例：\n\n```\npublic class MyServiceBean\
  \ implements SessionBean {\nSessionContext sessionContext;\npublic void setSessionContext(SessionContext\
  \ sc) throws EJBException, RemoteException {\nsessionContext = sc;\n}\npublic void\
  \ ejbCreate() throws EJBException, RemoteException {\n}\nvoid ejbActivate() throws\
  \ EJBException, RemoteException {\n}\nvoid ejbPassivate() throws EJBException, RemoteException\
  \ {\n}\nvoid ejbRemove() throws EJBException, RemoteException {\n}\n// Business\
  \ method\npublic String sayHello(String name) {\nreturn \"Hello, \" + name;\n}\n\
  }\n```\n\n`setSessionContext` 上下文方法本质上充当了一种原始的依赖注入机制（尽管你不会真的这么称呼它），而 `activate`/`passivate`/`remove`\
  \ 方法则是生命周期方法。\n\n接下来要实现的是远程接口。\n\n```\npublic interface MyServiceRemote extends\
  \ EJBObject {\nString sayHello(String name) throws RemoteException;\n}\n```\n\n\
  远程接口本质上是你与真实 Bean 通信所通过的代理，也是允许 EJB 运行时添加其魔力的关键。\n\n你还需要在本地接口中添加一个方法（该接口也可以包含其他\
  \ Bean 的方法）。\n\n```\npublic interface MyServiceHome extends EJBHome {\nMyServiceRemote\
  \ create() throws CreateException, RemoteException;\n}\n```\n\n本地接口基本上是后来各种技术所使用的“Bean\
  \ 管理器”的原始版本。\n\n接下来要做的是在清单文件中添加一个条目，以将该 Bean 标记为 EJB。\n\n```\nName: test/MyServiceBean.ser\
  \ Enterprise-Bean: True\n```\n\n随后，必须提供一个部署描述符，代表以下部分定义的类（仅展示了 `SessionDescriptor`\
  \ 及其超类，以及负责安全性的 `AccessControlEntry`）。这些类通常不会直接实现，而是由工具生成。\n\n```\npublic class\
  \ DeploymentDescriptor  implements Serializable {\nprotected int versionNumber;\n\
  public DeploymentDescriptor();\npublic AccessControlEntry[] getAccessControlEntries();\n\
  public AccessControlEntry getAccessControlEntries(int index);\npublic Name getBeanHomeName();\n\
  public ControlDescriptor[] getControlDescriptors();\npublic ControlDescriptor getControlDescriptors(int\
  \ index);\npublic String getEnterpriseBeanClassName();\npublic Properties getEnvironmentProperties();\n\
  public String getHomeInterfaceClassName();\npublic boolean getReentrant();\npublic\
  \ String getRemoteInterfaceClassName();\npublic boolean isReentrant();\npublic void\
  \ setAccessControlEntries(AccessControlEntry values[]);\npublic void setAccessControlEntries(int\
  \ i, AccessControlEntry v);\npublic void setBeanHomeName(Name value);\npublic void\
  \ setControlDescriptors(ControlDescriptor value[]);\npublic void setControlDescriptors(int\
  \ index, ControlDescriptor value);\npublic void setEnterpriseBeanClassName(String\
  \ value);\npublic void setEnvironmentProperties(Properties value);\npublic void\
  \ setHomeInterfaceClassName(String value);\npublic void setReentrant(boolean value);\n\
  public void setRemoteInterfaceClassName(String value);\n}\npublic class SessionDescriptor\
  \ extends DeploymentDescriptor {\npublic final static int STATEFUL_SESSION;\npublic\
  \ final static int STATELESS_SESSION;\npublic SessionDescriptor();\npublic int getSessionTimeout();\n\
  public int getStateManagementType();\npublic void setSessionTimeout(int value);\n\
  public void setStateManagementType(int value);\n}\npublic class AccessControlEntry\
  \  implements Serializable {\npublic AccessControlEntry();\npublic AccessControlEntry(Method\
  \ method);\npublic AccessControlEntry(Method method, Identity identities[]);\npublic\
  \ Identity[] getAllowedIdentities();\npublic Identity getAllowedIdentities(int index);\n\
  public Method getMethod();\npublic void setAllowedIdentities(Identity values[]);\n\
  public void setAllowedIdentities(int index, Identity value);\npublic void setMethod(Method\
  \ value);\n}\n```\n\n请注意，EJB 1.0 还包含一个颇具争议的概念，称为实体 Bean。在 Sun 公司内部，这个概念本身就存在争议，一些人在内部强烈抵制这个想法，但在\
  \ Sun 公司之外，争议更大。即使是当时尚未收购 Sun、作为独立公司的 Oracle，也明确拒绝实现它。实体 Bean 被过度设计，同时又缺少最基本的功能。因此，实体\
  \ Bean 在 EJB 1.0 中是可选的。\n\n尽管 EJB 会话 Bean 给开发者带来了一些难以承受的负担，但其核心却包含了我们今天仍然珍视和使用的理念：基于声明的服务。在早期的\
  \ EJB 1.0 时代，这些服务包括用于事务划分和安全的固定服务。例如，使用前面展示的 `AccessControlEntry`，你可以声明一个 Bean 的\
  \ `String sayHello(String name)` 方法仅对某个名为 `foo` 的 `Identity`（它是 `Principal` 的前身类型）可访问。\n\
  \n1999 年 12 月 17 日，就在千禧年即将到来的前几天，Sun 公司推出了 EJB 1.1 规范。最重要的区别在于，基于 Java 的部署描述符已被新奇的基于\
  \ XML 的描述符所取代，并且对各地的开发者来说不幸的是，存在严重缺陷的实体 Bean 现在被强制作为 EJB 规范的一部分。\n\n\n\n2001 年 6\
  \ 月 7 日，在当年的 JavaOne 大会上，Sun 公司高级工程师兼架构师 Linda DeMichiel 和Ümit Yaçinalp 提交了 EJB\
  \ 2.0 规范草案。其中包含 Yaçinalp 创建的一种基于 SQL 的新查询语言（EJB QL）、安全系统的两个新概念——*unchecked*（未检查）和*uncallable*（不可调用）方法（后更名为*excluded*方法），以及对\
  \ CDI 发展史而言最重要的——与现有*remote*（远程）接口相对的*local*（本地）接口概念。本地接口看似简单，但在当时代表了思维的重大转变。它摒弃了将\
  \ EJB Bean 视为类似 Servlet 或 Web 服务的思路，转而允许 EJB Bean 在单个 JVM 内本地使用，无需序列化方法参数和返回值，也无需经过网络协议栈。借助本地接口，EJB\
  \ Bean 可以像普通类一样使用，同时仍保留 EJB Bean 支持的所有声明式服务。\n\n2001 年 8 月 22 日，Sun 公司正式发布 EJB 2.0\
  \ 规范，而就在五天前，另一份对 CDI 发展史至关重要的规范已悄然启动：JSF。\n\nJSF 是一个基于组件的 UI/Web MVC 框架。初看之下，JSF\
  \ 在上下文依赖注入框架中扮演重要角色似乎有些奇怪，但到了 2001 年 12 月，由 Sun 工程师 Amy Fowler 领导的 JSF 团队开始研究其独有的受管\
  \ Bean 模型（即组件模型）。JSF 团队开发的受管 Bean（最初称为 Object Manager）旨在用于所谓的支持 Bean（backing bean）。支持\
  \ Bean 是位于视图和模型之间的小型 Java 类。它们不应与*UIComponents*混淆，后者是完全不同类型的类，用于 JSF 的可视化组件（即小部件）。\n\
  \n始于 2001 年的受管 Bean 工作延续至 2002 年，并逐步加入了作用域、名称和依赖注入等概念。具体而言，作用域是 JSF 受管 Bean 系统的一项相当新颖的功能，它使这些\
  \ Bean 具备了上下文特性。这里的*上下文*（Contextual）意味着：一个类为`Foo`的“会话作用域”Bean，会导致同一 HTTP 会话内（但可能处于不同请求中）的所有客户端都能访问同一个\
  \ Bean 实例。而处于其他会话中的客户端则会获得`Foo`的不同实例。同样，请求作用域 Bean `Bar`会导致同一请求内的所有客户端获得`Bar`的同一实例，但其他请求中的客户端（即使处于同一会话）则会获得不同实例。\n\
  \nJSF 团队几乎从与 EJB 团队完全相反的方向来设计其组件模型。JSF 受管 Bean 是纯旧式 Java 对象（POJO），这意味着 Bean 无需实现任何强制接口，也无需继承任何基类。同时也没有单独的接口用于生成代理，因此完全不使用代理。JSF\
  \ 受管 Bean 必须遵循 JavaBeans 约定，并且与几乎所有其他受管 Bean 系统一样，它们必须由运行时引导启动（即不能通过`new()`运算符创建，而必须向\
  \ JSF 请求或获取）。\n\n以下是一个示例。首先创建 Bean 类。\n\n```\npublic class MyServiceBean {\npublic\
  \ String sayHello(String name) {\nreturn \"Hello, \" + name;\n}\n}\n```\n\n其次，通过在`faces-config.xml`部署描述符中声明，将其设为受管\
  \ Bean。\n\n```\n\nmyServiceBean\nsession\ntest.MyServiceBean\n\n```\n\n上述代码完整定义了\
  \ JSF 1.0 中的一个受管 Bean。依赖注入还通过 JSF 的另一项技术——表达式语言（Expression Language）实现。（表达式语言的概念源自一个\
  \ Apache 标签库，该库后来成为 JSP 中的 JSTL，随后又由 JSF 进一步增强。）在 JSF 中，依赖注入主要通过这种表达式语言完成。上述代码示例中显示的`managed-bean-name`定义了可在（子）表达式中使用的根名称。\n\
  \n以下是另一个将上述 Bean 注入另一个 Bean 的示例。首先定义被注入的 Bean。\n\n```\npublic class MyBackingBean\
  \ {\nMyServiceBean myServiceBean;\n// ... 其他属性和逻辑\npublic void setService(MyServiceBean\
  \ myServiceBean) {\nthis.myServiceBean = myServiceBean;\n}\n}\n```\n\n然后声明要执行的实际注入。\n\
  \n```\nmyServiceBean\nrequest\ntest.MyBackingBean\n\nservice\n#{myServiceBean}\n\
  \n```\n\n需要注意的是，JSF 受管 Bean 系统仅支持方法注入，从不支持字段注入。\n\n## 加文·金登场\n\n2001 年，众多开发者因前述\
  \ EJB 实体 Bean 的缺陷而倍感沮丧，其中一位就职于澳大利亚 Cirrus Technologies 公司的开发者尤为突出。这位开发者——加文·金（Gavin\
  \ King）——很快意识到使用 EJB 实体 Bean 时效率低下，且无法运用常见的面向对象模式。但与大多数开发者不同，金决定正面应对问题，创建了自己的持久化框架。有趣的是，当时的加文甚至远非持久化或\
  \ SQL 方面的专家。\n\n\n\n## 罗德·约翰逊登场\n\n同样是在 2001 年，准确地说，是 2001 年 4 月 13 日，一位独自坐在伦敦书房里的开发者写下了以下几行代码：\n\
  \n```\npackage org.springframework.beans.factory;\n/**\n*\n* @author Rod Johnson\n\
  * @author Juergen Hoeller\n* @since 13 April 2001\n*/\npublic interface BeanFactory\
  \ {\n```\n\n这位开发者名叫**罗德·约翰逊**。当时他并不知道，自己刚刚写下的代码，最终将成为一场 Java 社区前所未见革命的起点。\n\n2002\
  \ 年 7 月 6 日，King 宣布发布 Hibernate 1.0，将其描述为“开源（LGPL）对象/关系持久化与查询服务”，并强调“Hibernate 拒绝使用代码生成或字节码处理，而是采用运行时反射。”Hibernate\
  \ 后来成长为有史以来最流行的 Java 框架之一。\n\n2002 年 10 月 23 日，在约翰逊写下`BeanFactory`关键代码一年半之后，他出版了可能是\
  \ Java EE 历史上最具影响力的著作：*《Expert One-on-One J2EE Design and Development》*。在这本书中，约翰逊以极其清晰的笔触，阐述了社区中酝酿了一年多的问题：Entity\
  \ Bean 概念存在深层次缺陷。结论基本上归结为一条建议：永远不要使用 Entity Beans。约翰逊确实承认了 EJB 会话 Bean 所提供的声明式事务和声明式服务的强大之处。在\
  \ 2003 年初接受 TheServerSide 采访时，他将这些服务比作一种受限形式的 AOP，但建议这些服务实际上应该是可组合的拦截器（按需点菜），而不是\
  \ EJB 那种“无论你是否想要，都得接受厨师准备的一切的品鉴菜单”。与 King 一样，约翰逊也反对代码生成，支持动态代理和（快速）反射，但他承认在 EJB\
  \ 最初设计时这些技术尚不可用。约翰逊还强烈主张在大多数情况下使用非受检异常，仅在绝对必要时才使用受检异常。King 后来向约翰逊承认，在 Hibernate\
  \ 中到处使用受检异常是一个错误，如果可能的话他会改变这一点。\n\n2003 年 5 月 27 日，EJB 3.0 的工作启动。规范负责人是 Linda Demichiel\
  \ 和 Mike Keith。这项新工作的目标是通过“从 EJB 开发者的角度降低其复杂性”来彻底简化 EJB。计划是利用 Java SE 5 中最新引入的注解，使过于冗长的部署描述符完全成为可选，并大力拥抱“异常配置”方法。会话\
  \ Bean 变成了 POJO（类似于 JSF 和 Spring），无需接口要求，与 JSF 和 Spring 不同的是，只需一个注解即可将其标记为会话 Bean。另一方面，Entity\
  \ Beans 在如此基础的层面上被发现存在深层次缺陷，以至于改进它们毫无意义。取而代之的是，基于 Hibernate 和 TopLink 使用的简单模型对象引入了一种新型\
  \ Bean。规范联合负责人 Keith 后来在他的书*《Pro JPA 2》*中提到了这其中的巨大讽刺：“……Entity Beans 的首批实现之一，实际上是通过在\
  \ TopLink 映射对象之上添加一个额外的 Entity Bean 层来演示的。”\n\n正如约翰逊所解释的，AOP 或许是 EJB 最强大的方面（这里并非双关）。当时\
  \ AOP 的典型实现一直是 AspectJ（在撰写本文时依然如此）。AspectJ 于 2001 年推出，是由传奇的施乐帕克研究中心开发的 Java 编程扩展，该中心引入了术语*面向切面编程*（AOP）。虽然可以说是最纯粹、最强大的\
  \ AOP 框架，但 AspectJ 本身就是一门语言，其本质始终带有某种学术和研究气息。这意味着它涉及一定程度的复杂性，使其不太适合那些通常不需要更强大功能的企业开发者。与旧的\
  \ EJB2 一样，当时的 AspectJ 需要单独的编译步骤和特殊的 IDE 支持。\n\n因此，在 2002/2003 年左右，几个试图以牺牲部分功能为代价来简化体验的框架被开发出来，也就不足为奇了。\n\
  \n在 JBoss，工程师 Bill Burke 正忙于开发一个名为 JBoss AOP 的 AOP 框架。JBoss AOP 是 JBoss 的延续，在其早期的\
  \ JBoss 3 服务器中允许为 EJB 使用自定义拦截器。与 AspectJ 一样，JBoss AOP 也使用字节码操作（织入），尽管是在运行时进行的。然而，JBoss\
  \ AOP 在该领域的早期贡献在于，它将交付企业服务（例如 EJB 中的事务和安全服务）作为其主要目标。而 AspectJ 和其他框架则更（学术性地）专注于 AOP\
  \ 本身。\n\n约翰逊（以及其他人）在 2003 年也很忙碌，他们正在构建 Spring 框架，该框架源于*《J2EE Design and Development》*中的经验教训和代码示例。在这个新框架的早期里程碑中，AOP\
  \ 已经扮演了重要角色。Spring 没有使用字节码操作，而是使用了动态代理。这些是动态生成的类，与其所代理的类类型相同，允许框架在实际类被调用之前运行其 AOP\
  \ 逻辑。实际的类仍然是一个普通的、未经修改的 Java 类。这种方法的优点在于侵入性较小，且无需访问类加载器，尽管缺点是不够强大（无法拦截字段或私有方法），并且程序员有时必须意识到通过代理调用方法与不使用代理调用方法之间的区别（例如，在实际类内部，一个方法调用同一类的另一个方法时）。\n\
  \n\n\n## 鲍勃·李登场\n\n当时在 AT&T 担任技术架构师的鲍勃·李（自称“疯狂鲍勃”，曾于 2003 年 6 月 15 日为《*苦涩的 EJB*》一书做出贡献），也对现有或正在开发的\
  \ AOP 框架感到不满。因此，他启动了自己的框架：dynaop。dynaop 的一个重要目标是拥有优雅的设计。它像 Spring 一样使用代理，但不同于动态代理（需要接口），它使用的是类代理（无需接口）。Dynaop\
  \ 还引入了一个当时具有革命性的理念：不拦截给定类型的所有实例，而是只拦截某些特定实例，例如从特定业务方法返回的实例。dynaop 的初始测试版于 2004 年\
  \ 2 月 11 日发布。不久之后，李也开始尝试 DI/IoC，将那个时代的另一个 DI 引擎——*picocontainer*——与仍在开发中的 dynaop\
  \ 结合起来。李主要在自己 AT&T 的项目（一个基于 Struts 的 Web 应用程序）中使用 dynaop。\n\nJSF 1.0 包含了其轻量级托管 Bean\
  \ 设施，最终于 2004 年 3 月 11 日发布。巧合的是，这仅比 Spring 1.0 的最终发布早了两周。这两个框架都拥有某种类似的、基于 POJO 的轻量级“Bean\
  \ 容器”，但两者之间存在一个主要区别：Spring 的核心 Bean 容器是一个独立的容器，可以在任何地方使用，包括 Spring 自身的一部分。然而，JSF\
  \ 的核心 Bean 容器是嵌入在 JSF 内部的，并未单独发布。它也仅面向 JSF 应用程序开发者。无论是 JSF、Java EE 中的其他规范，还是主要使用这些其他规范的应用程序开发者，都没有使用它。不过，当时有计划将这个核心\
  \ Bean 容器从 JSF 中分离出来，但这些计划从未实现。\n\n2004 年 6 月 30 日，EJB 3.0 的首个规范草案发布。很明显，这并非 EJB\
  \ 2.1 的简单演进，而本质上是一个全新的规范。\n\n我们之前展示的 EJB 2 示例，在 EJB 3.0 草案中简化为：\n\n```\n@Stateless\n\
  public class MyServiceBean {\npublic String sayHello(String name) {\nreturn \"Hello,\
  \ \" + name;\n}\n}\n```\n\n可以使用注解以声明式方式请求容器提供的服务。例如，通过`@RolesAllowed`注解来保护方法的安全，如下所示：\n\
  \n```\n@Stateless\npublic class MyServiceBean {\n@RolesAllowd(\"foo\")\npublic String\
  \ sayHello(String name) {\nreturn \"Hello, \" + name;\n}\n}\n```\n\n然而，事务服务是默认应用的（使用所谓的`REQUIRES`语义）。但如果不需要，也可以将其关闭。\n\
  \n有趣的是，在早期草案中，注入被提议通过一个名为`@Inject`的注解来实现。\n\n```\n@Stateless\npublic class MyServiceBean\
  \ {\n@Inject\nEntityManager entityManager;\npublic String sayHello(String name)\
  \ {\nreturn \"Hello, \" + name;\n}\n}\n```\n\n此外，EJB 规范确实提供了一个称为*拦截器*的轻量级 AOP 解决方案。然而，EJB\
  \ 在这里并没有“吃自己的狗粮”。现有的 AOP 服务，特别是安全性和事务性服务，并未被指定为基于这些新的拦截器。\n\nEJB 3.0 中另一个主要的突出特性是一种全新的持久化类型，它基于\
  \ Hibernate 和 TopLink。这种新的持久化方法在 EJB 的一个新子规范中进行了规定：JPA。Gavin King 是这个子规范的主要贡献者，而\
  \ Hibernate 将成为 JPA 的主要实现之一。通过 JPA，King 也终于能够纠正他之前在 Hibernate 中使用受检异常的错误。JPA API\
  \ 强烈强调非受检异常。\n\nJSF 开发者 Jacob Hookom 在 2004 年 9 月 20 日看到 Bob Lee 的 dynaop 后，思考 AOP\
  \ 是否对 JSF 真正有用，它可以在调用操作方法之前轻松验证输入。许多年后，这确实是 CDI 和 Bean Validation 规范允许 JSF 做的事情。同月，Struts\
  \ Web 框架的提交者 James Holmes 也注意到了 dynaop，并在《Oracle Magazine》的一篇文章中对其进行了介绍。\n\n大约在\
  \ 2004 年 10 月 15 日，Bob Lee 接受了 Google 的工作邀请，离开了 AT&T。尽管李提到这一变动不会影响 dynaop 的工作，但在接下来的一个月里，dynaop\
  \ 项目的提交量急剧下降。最后一次提交是在 2005 年 4 月 15 日。\n\n2005 年 9 月 19 日，当时在 JBoss 工作的 Gavin King\
  \ 宣布正在开发一个名为 Seam 的新项目。Seam 是一个“用于 Java EE 5 的应用程序框架”，其核心是一个新的组件模型。这个组件模型受到 JSF\
  \ 托管 Bean 模型（使用有状态组件和作用域）的启发，但将像 EJB 3 一样基于注解。Seam 的一个核心方面是，Bean 可以通过代理（如 EJB）进行注入，该代理在调用时解析对\
  \ Bean 的调用。这允许将较小的作用域（如请求）注入到较大的作用域（如应用程序）中，这是 JSF 所不允许的。Seam 还强调双向注入（注入和传出注入），这允许\
  \ Bean 替换其作用域内的对象，而无需知道该作用域具体是什么（这有点类似于按引用调用的语义，被调用的代码可以为变量分配一个新实例）。\n\n```\n@Stateful\n\
  @Scope(APPLICATION)\npublic class MyServiceBean {\n@In\nEntityManager entityManager;\n\
  @In @Out\nPriceList priceList;\npublic void updatePrices() {\npriceList = entityManager.merge(priceList);\n\
  }\n}\n```\n\n在前面的代码中，`priceList`可以是请求作用域、会话作用域或任何其他作用域。代码为其分配一个新值，该值将替换其作用域中的旧值（Seam\
  \ 称之为“上下文”）。下一个 Bean 在其注入的`PriceList`代理上调用方法时，会看到该调用指向新实例。除了 JSF 的请求/会话/应用程序作用域之外，Seam\
  \ 还有几个额外的作用域/上下文，其中包括所谓的会话上下文。\n\nBob Lee 于 2006 年 1 月 29 日发表了一篇关于 Spring 的批评性文章，题为“我不理解\
  \ Spring”。在文章中，李批评了 Spring“对 J2EE 嗤之以鼻”的文化以及其庞大的 API 表面。李认为 J2EE 的表面并没有那么大，因为在 J2EE\
  \ 中，API 和实现是严格分离的。李还指出了 Spring 将大量“配置”外部化到 XML 文件中的做法。根据李的说法，这种“配置”实际上是“代码”，只是用\
  \ XML 编写的代码，因此 Spring 不接触任何代码的卖点并不完全成立。李还批评了使用基于字符串的 ID 来标识（托管）Bean 的做法，以及需要在代码和\
  \ XML 之间保持这些 ID 同步的必要性。李想知道为什么仅仅使用（Java）类型还不够。最后，李想知道为什么 Spring 还没有采用泛型（引入泛型的 Java\
  \ SE 5 于 2004 年 9 月 30 日发布）。就像 Johnson 在 2002 年底的著作一样，李文章中的观察结果被证明对 Java 企业领域产生了深远的影响。\n\
  \n2006 年 5 月 11 日，EJB 3.0 规范发布。不幸的是，EJB 团队以前的一种倾向又悄悄回到了规范中：对工具的依赖。会话 Bean 的无接口要求再次被移除，被委托为“可以使用工具来实现这一点”。当然，从来没有人真正使用过这样的工具。此外，`@Inject`注解已被移除，取而代之的是，用于注入其他\
  \ EJB Bean 的`@EJB`和用于注入实体管理器的`@PersistenceContext`等注解。\n\n尽管不得不使用（应用程序定义的）接口这一挫折，EJB\
  \ 3.0 仍然是第一个（如果不是第一个）完全拥抱注解的组件框架之一，而与此同时，对于 JSF（到 2006 年已发展到 1.2 版本）来说，注解却奇怪地仍然不见踪影。\n\
  \n\n\n## CDI 的概念\n\n早在 Seam 1.0 正式发布之前，2006 年 5 月 17 日，Gavin King 就宣布了由 JBoss 发起的\
  \ Web Beans JSR（JSR 299），该规范吸收了 Seam 和 Guice 的部分理念并将其标准化。Web Beans 规范得到了 Sun、Oracle、Borland\
  \ 等公司的支持，其具体目标是统一 JSF 和 EJB 组件模型。其理念是，EJB3 会话 Bean 可以像 JSF 托管 Bean 一样工作（通过命名和设置作用域）。Web\
  \ Beans 也打算独立使用，但不会重复 EJB 提供的功能（特别是声明式事务和安全性）。\n\n2006 年 6 月 13 日，也就是 EJB 3.0 发布一个月后，Seam\
  \ 1.0 发布了。Seam 的采用率起初增长缓慢，但在第二年，其下载量和用户数确实超过了 Hibernate 在第二年的表现。\n\n就在 Bob Lee 发表批评\
  \ Spring 的文章后不到八个月，他于 2006 年 8 月 25 日首次提交了一个名为 Guice 的新 DI 框架。这次提交是在 `google-guice.googlecode.com`\
  \ 上完成的，包含 `com.google.inject` 包中的 26 个 Java 文件（不包括测试文件），其中就包含了现在著名且广为人知的 `@Inject`\
  \ 注解的第一个版本。\n\n```\n/**\n* 注解那些需要注入其值的成员和参数。\n*\n* @author crazybob@google.com (Bob\
  \ Lee)\n*/\n@Target({METHOD, CONSTRUCTOR, FIELD, PARAMETER})\n@Retention(RUNTIME)\n\
  public @interface Inject {\n/**\n* 依赖名称。默认为 {@link Container#DEFAULT_NAME}。\n*/\n\
  String value() default DEFAULT_NAME;\n/**\n* 注入是否为必需。仅适用于方法和字段（不适用于构造函数或参数）。\n*/\n\
  boolean required() default true;\n}\n```\n\n包文档对这个非常早期、尚未公开的 Guice 版本描述如下：\n\n```\n\
  /**\n* Guice（发音为 \"juice\"）。一个轻量级的依赖注入容器。\n* 特性包括：\n*\n* \n*   构造函数、方法和字段注入\n* \
  \  静态方法和字段注入\n*   循环引用支持（如果你依赖接口，则包括构造函数）\n*   高性能\n*   仅外部化需要外部化的内容\n* \n*/\n```\n\
  \n尽管 Guice 尚未公开，但 Atlassian 的技术负责人 Don Brown 于 2006 年 11 月 13 日将 Guice DI 容器的早期版本添加到了\
  \ XWork 项目中，并将类重新定位到 `com.opensymphony.xwork2.inject` 包中。声明的理由是“用于连接关键部分和常量”。XWork\
  \ 本身是一个“通用命令框架”，因使用拦截器、IoC 和命令模式而闻名。它是从 WebWork 中分离出来的，WebWork 是一个早期的“拉式分层 MVC 框架”（始于\
  \ 2000 年 11 月 18 日）。当时，WebWork（以及 XWork）即将合并到 Struts 中。\n\n随着围绕 DI 框架的活动如火如荼地展开，Java\
  \ EE 的知识产权所有者 Sun Microsystems 并未坐视不管。2007 年 3 月 2 日，Java.net 上创建了一个新项目，其首次项目设置提交信息为：“一个\
  \ 100K 的模块系统内核。” 将近两个月后，即 2007 年 4 月 23 日，已是传奇人物的 Sun 开发者 Kohsuke Kawaguchi（他启动了\
  \ Hudson 项目，该项目后来分支成为现在广为人知的 Jenkins 项目）提交了 84 个文件，并附有以下评论：\n\n> *“从* [`https://www.dev.java.net/svn/modsys/tags/move-to-hk2`](https://www.dev.java.net/svn/modsys/tags/move-to-hk2)\
  \ *修订版 168 迁移工作区”。*\n\n这些文件的版权是 2006 年，因此 Kawaguchi 和另一位 Sun 开发者 Jerome Dochez 可能已经为此工作了一段时间。`org.jvnet.hk2.annotations`\
  \ 包中同样包含了一个 `@Inject` 注解。\n\n```\n/**\n* 用于定义组件所需资源的注解。\n* 运行时将注入所有使用 @Requires\
  \ 注解的实例变量以及 setter 方法。\n*\n* @author Jerome Dochez\n*/\n@Retention(RUNTIME)\n@Target({METHOD,FIELD})\n\
  public @interface Inject {\n/**\n* 返回所需资源的名称\n* @return 所需资源的名称\n*/\npublic String\
  \ name() default \"\";\n/**\n* 指示即使要注入的组件不存在也不是错误。\n*/\npublic boolean optional()\
  \ default false;\n}\n```\n\n有趣的是，初始代码提交还包含了 `PostConstruct` 和 `PreDestroy` 接口，它们后来成为\
  \ CDI Bean 的关键注解（尽管 CDI 本身并未定义它们）。\n\n```\n/**\n* 实现此接口的类表示希望在实例被创建且组件即将投入使用\n*\
  \ 时收到通知。\n*\n* @author Jerome Dochez\n*/\npublic interface PostConstruct {\n/**\n\
  * 组件已注入所有依赖项，子系统将使其投入使用。\n*\n*/\npublic void postConstruct();\n}\n```\n\n此外，初始提交还包含一对\
  \ `@Contract/@Service` 注解，用于声明和实现组件，以及一些与类似 OSGi 的“模块”相关的类。虽然 HK2 的某些方面与 Guice 相似，但\
  \ Kawaguchi 和 Dochez 开发 HK2 主要是为了驱动名为 GlassFish 的应用服务器的内部机制，而 Guice 则面向应用程序开发者。\n\
  \n回到 Seam 阵营，在 CodeRyte 工作的资深 Java 工程师和 OSS 倡导者 Dan Allen 于 2007 年 4 月 12 日在 IBM\
  \ 的 DeveloperWorks 上发表了颇具影响力的系列文章“无缝 JSF”。该系列文章清晰地解释了 Seam 是什么，以及它如何帮助构建更优雅的 JSF（Java\
  \ EE）应用程序。虽然源自 Seam 的 Web Beans 仍在开发中，但 Seam 本身开始逐渐变得越来越流行。\n\n在 Seam 和 Web Beans\
  \ 都处于不同开发阶段的同时，Bob Lee 也没有闲着。他的依赖注入框架 Guice 1.0 于 2007 年 3 月 8 日正式发布并公开。当时，Google\
  \ 已经将其用于生产环境好几个月了，这意味着其技术（内部）发布可能在 2006 年底的某个时候，大概是 11 月 13 日左右，也就是 XWork/WebWork/Struts\
  \ 整合 Guice 的时候。\n\n在 Java EE 6 的 JSR 评审投票期间，IBM 于 2007 年 7 月 16 日评论称，它担心 Web Beans\
  \ 引入了一种新的组件模型。\n\n> *“我们开始担心 JSR-299 似乎可能超出其既定章程（整合 JSF 和 EJB 组件）的方向发展，并认为继续朝这个方向努力可能使其有理由被从\
  \ Java EE 6 中移除。我们不认为我们的客户会觉得采用一个又增加了一个组件模型定义的 Java EE 6 平台是件容易的事。”*\n\n2007 年 9\
  \ 月 22 日，Gavin King 首次展示了 Web Beans 的预览。创建新的 Java EE 规范时一个常见的主题是，有人提议该规范不应仅用于 Java\
  \ EE。JSR 299 也不例外。具体来说，Lee 主张 JSR 299 应该能在 Java EE 之外使用。然而，作为规范负责人的 King 明确将 JSR\
  \ 299 的目标设定为 Java EE，但确实为在未来的修订版中添加对 Java EE 之外的支持留有余地。\n\n首次预览使用的语法如下所示：\n\n```\n\
  @Component\n@ApplicationScoped\npublic class MyServiceBean {\n@In @UserDatabase\n\
  EntityManager entityManager;\n@In @Available\nPriceList priceList;\nPriceList lastSaved;\n\
  public void savePrices() {\nentityManager.persist(priceList);\nlastUpdated = lastSaved;\n\
  }\n@Resolves @LastSaved\nPriceList getLastSavedPriceList() {\nreturn lastSaved;\n\
  }\n}\n```\n\n\n\n在这个例子中，Seam 与 `@In` 注解的影响清晰可见。然而，当 Seam 试图通过使用另一个注解来指示作用域以区别于 JSF\
  \ 时，Web Beans 却回归了 JSF 的原始方式，使用了 `@ApplicationScoped`（但位于不同的包中）。`@In` 之后的注解被称为*绑定类型*/*绑定注解*，用于指示特定的类型种类。例如，之前的代码区分了可用的价格列表和最后保存的价格列表。两者具有相同的\
  \ Java 类型，但绑定类型不同。\n\n最后，预览部分谈到了组件类型。默认的组件类型是前面展示的 `@Component`，但也可以创建额外的类型（例如 `@MockComponent`）。组件类型具有优先级，并且这些组件类型可以全局启用/禁用。Web\
  \ Beans 只会扫描带有这种组件类型注解的类。\n\n后来的草案移除了 `@In` 注解，仅要求一个绑定注解，并使用 `@Current` 作为默认值。这实际上使\
  \ `@Current` 成为了*注入注解*，前提是大多数 bean 不需要绑定类型。组件类型被重命名为部署类型，当省略时默认为 `@Production`。`@Resolves`\
  \ 被重命名为 `@Produces`，等等。\n\n与此同时，在加利福尼亚，有人密切关注着这些草案。一家名为 Caucho 的公司的联合创始人 Scott Ferguson\
  \ 创建了 Resin 服务器。Resin 最初是一个 Servlet 容器（类似于 Tomcat），后来被整合到其他几种 Java EE 技术中。Ferguson\
  \ 于 2007 年 11 月 5 日在 Resin 3.1 的 `com.caucho.webbeans` 包中，为 Web Beans 的独立实现进行了首次提交。该实现当时尚未命名。Ferguson\
  \ 会跟踪正在开发的 Web Beans 草案，并相应地更新 Resin 中的 Web Beans 实现。\n\n当 Resin 3.1.5 最终于 2008\
  \ 年 2 月 27 日发布时，其 Web Beans 实现已完全实现了当时的 Web Beans 草案。\n\n然而，Ferguson 并非唯一一个致力于自己独立的\
  \ JSR 299 实现的人。开发者 Gurkan Erdogdu 在 SourceForge 上做同样的事情已有一段时间，并于 2008 年 10 月 3 日向\
  \ Apache 组织提议将 OpenWebBeans 项目作为孵化器。\n\n同月下旬，即 2008 年 10 月 30 日，Johson 以执行委员会成员的身份加入\
  \ JCP，这预示着某种重大事件的发生。\n\n尽管 Erdogdu 曾在其博客中提及启动 OpenWebBeans 项目，但 Web Beans 社区的人们直到一个月后，当公开评审草案在\
  \ TheServerSide 上被讨论时，才真正了解到这个项目的存在。\n\nErdogdu 立即认识到 Web Beans 的潜力，并表示“Web Beans\
  \ 定义了未来 Java EE 的‘组件模型’”，但当时 Java EE 倡导者 Reza Rahman 认为这是一个问题，因为它削弱了 EJB EG 为使 EJB\
  \ 成为人们乐于使用的技术所做的工作。Rahman 主张投入更多精力使 Web Beans 成为一种补充技术，而不是 EJB 的替代品。Gavin King 随后提到，Web\
  \ Beans 现在主要是一组服务，而非主要是一个组件模型。它提供了可应用于有状态会话 Bean 的作用域/上下文服务，提供了超越简单 *@EJB* 注入注解的会话\
  \ Bean 注入服务，此外还有用于抛出和观察事件的服务，这些服务同样可以被会话 Bean 使用。这些服务基本上是通用的，可以被所有其他组件类型按需选用。\n\n\
  特别有趣的是，当时正在为 Java EE 6 开发的新 REST 规范（称为 JAX-RS）一直在开发自己的组件模型和依赖注入系统，但到 2008 年底，人们相信它很快会使用\
  \ Web Beans 提供的注入服务。\n\n虽然在 2008 年和 2009 年初，EJB EG 对任何哪怕最微弱的、关于现在或将来可能被 Web Beans\
  \ 取代的暗示都进行了强烈抵制，但 JSF EG 对此想法却远没有那么担忧。事实上，JSF 2 EG 中的 JBoss 代表 Pete Muir（他曾在为 JBoss\
  \ 工作之前，就职于英国一家名为 Splendid.co.uk 的公司，并为 Seam 做出过贡献）在当时宣布，JSF 托管 Bean 将被弃用，转而支持 Web\
  \ Beans。\n\n在 2009 年的第一个月（2009 年 1 月 26 日），JSR 299 的名称从 Web Beans 改为“Java 的上下文与依赖注入”，简称\
  \ CDI。这个名称变更已经酝酿了相当长一段时间，因为许多人和团体都表示对 Web Beans 这个名称不满意，特别是因为它（已经）不能完全覆盖问题领域。CDI\
  \ 这个名称需要一段时间才能流行起来，尤其是在最初几个月，人们常常称其为 JCDI 而非 CDI。\n\n与此同时，EJB EG 对最终注定要取代它的规范仍然持怀疑态度。具体来说，IBM\
  \ 为 EJB 辩护，并于 2009 年 2 月 9 日重申了其一年半前提出的担忧，在 JSR 299 的公开评审投票中留下了以下评论：\n\n> *“IBM\
  \ 对在 EE 平台中引入另一个竞争性组件模型持严重保留意见，而本 JSR 本应专注于将技术集成到平台中。除了由此造成的重复和混乱之外，该规范已扩展到涵盖大量技术领域，这在一个单一规范中完全定义是相当雄心勃勃的。然而，我们承认规范负责人已在处理反馈方面取得了实质性进展，因此，我们愿意投赞成票，允许规范继续推进，前提是规范负责人将继续处理反馈和关切。”*\n\
  \n但 IBM 和 EJB EG 并非唯一反对 Web Beans 的势力。2009 年 5 月 26 日，曾为 Web Beans/JSR 299 做出贡献的\
  \ Bob Lee 和 Rod Johnson 突然启动了他们自己的竞争性 JSR 330，官方名称为“Java 的依赖注入”。不出所料，这引起了相当大的争议，但该\
  \ JSR 最终还是被接受了。不过，冲突的可能性立即被认识到，Sun 发表了以下评论：\n\n> *“我们很高兴看到 Spring 和 Guice 社区联合起来为\
  \ Java 平台标准化依赖注入，我们支持这一努力。*\n\n> *依赖注入具有普遍性，并带来一些强大的网络效应，在缺乏全面标准的情况下，这自然会导致有害的碎片化。*\n\
  \n> *在这方面，我们要求本 JSR 和 JSR-299 协调他们的工作，以便能够共同为 SE 和 EE 平台提供一个单一、一致且全面的依赖注入标准。此类协调必须在本\
  \ JSR 的公开评审之前进行。”*\n\n通过 Gavin King 领导 JSR 299 的 Red Hat 则更为担忧，并发表了以下评论：\n\n> *“Red\
  \ Hat 对本 JSR 的价值深表怀疑，因为它设想存在一个不属于 SE 或 EE 平台的独立容器，其语义和编程模型定义得如此不明确，以至于除了最琐碎的应用程序之外，应用程序在不同容器之间的可移植性将是不可能的。这违背了\
  \ Java‘一次编写，到处运行’的传统。”*\n\n\n\n> *“然而，我们认识到社区对该提案有一定支持，因此我们暂缓形成最终意见，等待专家组发布公开草案。如果该\
  \ JSR 能与 JSR-299（该规范确实定义了可移植的依赖注入模型）达成某种程度的一致，我们将更有可能投票批准该 JSR。红帽在此承诺将尽己所能促成这一结果。”*\n\
  \nGavin King 提到，再搞一套与 JSR 299 功能基本相同的注解将是一个巨大的错误。他在博客中做了如下对比：\n\n*   `@Qualifier`\
  \ 等同于 `@BindingType`。\n*   `@Scope` 等同于 `@ScopeType`。\n*   `@Singleton` 等同于 `@ApplicationScoped`。\n\
  *   `@Named` 只是一个内置的绑定类型。\n*   `Provider<X>` 接口等同于 `Instance<X>`。\n\nBob Lee 为新的\
  \ JSR 辩护，并指责 King 在针对 Java EE 6 设计 Web Beans 时只考虑了 Java EE。Lee 特别提到，使用 Web Beans\
  \ 将迫使人们使用 EJB Lite，暗示依赖 EJB 是一件非常糟糕的事情。至此，Web Beans 发现自己陷入了两难境地：IBM 认为 Web Beans\
  \ 对 EJB 的依赖不够，而对 Lee 来说，潜在的 EJB 依赖似乎是一个致命问题。\n\n经过大量辩论，冲突最终得以解决。2009 年 8 月 5 日，宣布\
  \ CDI 将采用 JSR 330 定义的注解和术语。JSR 330 最核心的注解是 `@Inject`，JSR 330 也因此得名“AtInject”。具有讽刺意味的是，`@Inject`\
  \ 恰恰也是 EJB 3 早期草案最初使用的注解。\n\n此时，Lee 已经大幅减少了对 Guice 项目的提交，该项目主要由其他人进行演进。Lee 于 2009\
  \ 年 9 月 30 日向 Guice 提交了倒数第二次提交，内容是关于 JSR 330 的兼容性。一年多后的 2010 年 12 月 15 日，Lee 做了最后一次一次性提交，之后便永久离开了\
  \ Guice 领域。\n\n2009 年 10 月 14 日，JSR 330 的最终版本发布。从创建到发布，该 JSR 仅用了五个月时间，这绝对是一个纪录。然而，该\
  \ JSR 仍然存在一些争议，被指责为只是对 Lee 和 Johnson 已经达成一致的内容进行橡皮图章式的批准，并且内容过于单薄，缺乏实际用途。后者意味着，尽管\
  \ CDI、Guice、Spring 以及后来的 HK2（Jersey）都使用了 `@Inject` 注解，但代码在这些框架之间完全不可移植，唯一实际的结果是，不同代码片段之间会发生冲突——它们都使用\
  \ `@Inject`，但本应由不同的注入提供者处理。\n\n就在 JSR 330 最终版本发布几天后，即 2009 年 10 月 18 日，Gurkan Erdogdu\
  \ 在克服了“奇怪错误”的困扰后，成功让他的 OpenWebBeans 项目通过了 JSR 330 TCK。\n\n与此同时，Scott Ferguson 和当时在\
  \ Caucho 为 Ferguson 工作的 Reza Rahman，于 2009 年 11 月 3 日发表了另一系列极具影响力的文章的第一部分：“Java\
  \ EE 6 中的依赖注入”。在这篇文章中，Ferguson 和 Rahman 不仅详细解释了 CDI，还向世界介绍了 CanDI 实现，以及它如何构成 Resin\
  \ 服务器的核心。Ferguson 和 Rahman 还提到考虑引入一个基于 CDI 的 `@Transactional` 注解。\n\n2009 年 11 月\
  \ 30 日，IBM 在最终批准投票中投了反对票，这并不完全出人意料。IBM 给出的理由如下：\n\n> *“目前 JSR 330 和 JSR 299 应用程序之间缺乏可移植性，这将给社区带来巨大困难。使用基于\
  \ JSR 330 注入注解和专有注入机制的应用程序开发人员，在利用与 JSF 关联的 JSR 299 上下文时，将遇到集成问题。在这些规范的开发过程中，对这些细节的关注不足，这将给整个\
  \ Java EE 平台带来负面影响。尽管 IBM 此前投票支持了 JSR 299 和 330，并明确期望‘SE/EE 注入编程模型必须统一为一个单一的可扩展编程模型，该模型为\
  \ SE 定义核心功能集，并通过 EE 功能进行扩展’，但这一目标尚未实现。IBM 将继续支持两个专家组，以开发一个单一、集成且可扩展的注入编程模型。”*\n\n\
  幸运的是，IBM 是唯一投票反对 CDI 的执行委员会成员。因此，不到两周后，即 2009 年 12 月 10 日，CDI 1.0 的最终版本与完整的 Java\
  \ EE 6 平台最终版本一同发布。\n\nJava EE 6 总体反响非常好。作为第二个专注于开发者友好性的 Java EE 版本，Sun 显然能够保持这一方向。随着\
  \ JAX-RS、CDI、Bean Validation、JASPIC 和 `@DataSourceDefinition` 注解的引入，该平台迈出了重大步伐。\n\
  \n不幸的是，并非一切顺利。也许是因为 CDI 1.0 最终定稿太晚，其他规范并未真正利用它。\n\nJSF 2.0 专家组似乎倾向于弃用自己的托管 Bean\
  \ 系统，但仅添加了一条通知，说明 CDI 可能会在未来取代它，并未正式弃用。更糟糕的是，JSF 2.0 引入了诸如 `@ManagedBean` 之类的注解，使其看起来对其旧的托管\
  \ Bean 系统进行了大量更新（实际上，这些新注解只是在现有 XML 之上的一层薄薄的封装）。尽管如此，CDI Bean 和 `@ManagedBean` 注解的同时引入，被视为原本广受好评的\
  \ JSF 2.0 中绝对的败笔之一。\n\n同样，JAX-RS 专家组做得更糟，并且（事后看来）相当不必要地引入了自己的 DI（使用 `@Context`）和\
  \ Bean 模型。由于 JAX-RS 1.0 很早就最终定稿，因此有足够的时间进行维护版本发布，该版本说明所谓的 JAX-RS 资源也可以是“CDI 风格的托管\
  \ Bean”，但此时木已成舟。\n\n因此，尽管 Java EE 6 的目标是通过 CDI 统一各种 Bean 模型和 DI 系统，但最终却额外增加了一堆。也许并不奇怪，这后来给开发者带来了相当大的困惑，但出于某种原因，当时这并未被视为一个非常大的问题。\n\
  \nGavin King 创立了 Hibernate 和 Seam 项目，这两个项目都极大地影响了 Java EE 规范 JPA 和 CDI。显然，他认为自己在\
  \ Java（EE）领域的工作已经完成，仅仅两个月后，他就有效地离开了 Java 领域，开始开发自己的编程语言 Ceylon（[`https://ceylon-lang.org`](https://ceylon-lang.org)）。（在撰写本文时，尽管\
  \ Gavin 又开始涉足 JPA，但他在九年后仍在从事 Ceylon 的工作。）也许与 King 想法相同，Bob Lee 也同时离开了 Google，并于\
  \ 2010 年 1 月加入 Square，基本上也离开了（开源）Java 领域。仿佛他们之间有什么秘密协议，我们的第三位 DI 先驱 Rod Johnson，在\
  \ 2009 年 8 月将他的 SpringSource 公司出售给 VMware 后，也一度离开了社区和商业领域（Johnson 最终于 2012 年离开 VMware）。如果\
  \ Kohsuke Kawaguchi 不离开，这场 DI 大逃亡就不算完整，果不其然，他确实离开了。2010 年 4 月 5 日，Kawaguchi 宣布这是他在\
  \ Sun/Oracle 的最后一天。他转而创办了自己的公司，支持 Hudson（后来的 Jenkins）。\n\n\n\n## 下一代\n\n在 2010 年\
  \ 3 月 8 日发布的《Java EE 6 中的依赖注入》第三部分中，Scott Ferguson 和 Reza Rahman 阐述了他们的愿景：将 EJB\
  \ 重新定义为带有附加服务的[CDI]托管 Bean。主要由 Rahman 担任负责人的 EJB 3.1 Lite 容器，将作为这一理念的初始实现。\n\n随着\
  \ CDI 1.0 刚刚发布，Ferguson 显然迫不及待地想要在此基础上引入新的创新。2010 年 3 月 10 日，他确实在 CanDI 中引入了前面提到的`@TransactionScoped`作用域/上下文。这是一个基于当前（JTA/XA）事务的作用域。Ferguson\
  \ 并未止步于此，2010 年 5 月 29 日，他还引入了一个`@ThreadScoped`作用域/上下文。\n\nPete Muir 于 2010 年 12\
  \ 月 14 日宣布，红帽将很快提议 CDI 1.1，并由 Muir 接替 Gavin King 担任规范负责人。当时人们认为 CDI 已基本完成，因此 CDI\
  \ 1.1 将只是一个小的版本更新。\n\n2011 年 3 月 1 日，Java EE 7 的评审投票开始。计划是将 Lee 的 AtInject 规范更新到\
  \ 1.1，并提供一个用于配置注入器的 API。但由于 Lee 已经离开，这一计划从未真正获得机会，因此最终未能实现。\n\n在此版本中，各个 EE API 首次有机会基于\
  \ CDI 构建，或在其之上构建新功能。这在 Java EE 7 JSR 中有所体现：\n\n> *“我们还期望进一步细化和扩展托管 Bean 模型，以尽可能消除托管\
  \ Bean、EJB、Servlet、JSF、CDI 和 JAX-RS 之间的不一致性。”*\n\n在 Mammatus 工作的开发者 Richard（又名 Rick）Hightower，曾参与\
  \ JCache JSR 的工作，并合著过一本关于 Caucho Resin 的书籍。他看到了 CDI 的巨大潜力。然而，早期的示例并不完全符合他的喜好，因此他在\
  \ 2011 年 3 月 7 日创立了 CDI Advocate 计划，随后在同月（3 月 28 日）宣布成立 CDI Source 组织（CDI Advocate\
  \ 的新名称）。该组织的目标是通过提供教程和支持性开源项目来填补 CDI 的空白，该项目的代码提交始于当月 19 日，并在宣布之前一直保持高度活跃。两天后，Hightower\
  \ 宣布他的项目获得了 Caucho 的支持，这意味着将承担托管费用并提供一些工程资源。次月，Hightower 在 DZone 上发布了一个广受欢迎的两部分\
  \ CDI 教程。\n\n当月月底，即 2011 年 4 月 30 日，Hightower 在官方 CDI 跟踪器上为事务作用域创建了一个问题，其灵感来源于 Ferguson\
  \ 前一年的作用域。几个月前，即 2011 年 1 月 10 日，Pete Muir 在该 CDI 跟踪器上创建了一个类似的问题，以支持使方法或 Bean 具有事务性的注解。\n\
  \n然而，这潜在地令人担忧，因为它代表了关于 CDI 应该是什么的分歧：是 Java EE 中大多数其他技术的门面（就像 EJB 曾经被计划的那样），还是其他规范应基于的核心技术。在\
  \ CDI 中包含`@Transactional`意味着 CDI 将成为 JTA 的门面，并朝着成为下一个 EJB 的方向发展。\n\nApache 的 Mark\
  \ Struberg 迅速对此作出回应，并在该问题中建议 CDI 应只关注基础功能，因此不应包含那些也可以在可移植扩展（可能由其他规范实现）中完成的内容。\n\n\
  CDI 1.1 专家组成员（特别是 Adam Bien 和 Mark Struberg）之间进行了一场相关讨论，内容涉及是为 CDI 重新实现现有功能时重用现有注解，还是引入新注解。Adam\
  \ Bien 主张重用现有注解，但 Struberg 不同意。\n\n2011 年 6 月 17 日，Reza Rahman 在新的官方 EJB 跟踪器上创建了多个问题，涉及将服务与\
  \ EJB 组件模型解耦，这代表了 Rahman 在其早期文章中概述的愿景。用他的话来说：\n\n> *“[...] 将诸如@schedule 之类的 EJB\
  \ 服务与[EJB]组件模型解耦，是为了朝着消除 Java EE 中一次性组件模型的方向发展，转而围绕托管 Bean/CDI 进行统一。”*\n\n2011 年\
  \ 8 月，Rahman 悄然离开了 Caucho。随着他的离开，CanDI 的愿景似乎也随之消失，因为此后 CanDI 陷入了诡异的沉寂。事实上，此后 Caucho\
  \ 再也没有发布过关于其自身 CDI 实现的新公告，CanDI 也没有实现 CDI 1.1 及更高版本，尽管偶尔会修复 1.0 实现中的一些错误（例如本书作者于\
  \ 2013 年 9 月报告的泛型生产者方法的一个错误）。到那时，备受讨论、由 Caucho 支持的 CDI Source 项目也已停止。事实上，自 3 月份的官方公告之后，CDI\
  \ Source 项目就没有再进行过任何代码提交。\n\n大约在同一时间，Seam 开发人员在加拿大多伦多的一次 JBoss 会议上会面，讨论 Seam 的未来。一个问题出现了，那就是没有人真正知道\
  \ Seam 到底是什么了。Seam 3 已经与 Seam 1 和 2 大相径庭；它不再是完全集成的框架栈，而是被重构为一组质量参差不齐的 CDI 扩展。在多伦多会议上，决定进一步拆解\
  \ Seam，不仅将其重构为这些 CDI 扩展，还要将这些 CDI 扩展分散到世界各地（从 Seam 项目中分离出来，进入其他项目）。\n\n2011 年 9\
  \ 月 27 日，红帽开发者兼 Seam 项目负责人 Shane Bryzak 在一篇名为“Seam 到底发生了什么？”的文章中向世界宣布了这一决定，并于 9\
  \ 月 30 日发布了后续文章“Seam.Next 更新”。另一位红帽和 Seam 开发者 Lincoln Baxter III 迅速提到“Seam 不会消失”。\n\
  \n社区自然对此感到不满。其中一位是法国开发者 Antoine Sabot-Durand，他是 Seam 社交模块的负责人。2011 年 9 月 30 日，他写了一封致红帽的公开信，敦促他们不要通过摧毁\
  \ Seam 3 来让 CDI 变成“Betamax”。\n\n2011 年 10 月 4 日，Pete Muir 介绍了 CDI 1.1 的几个计划项目。其中包含一个名为“ServiceHandler”的通用概念，它允许表达类似以下内容，其中服务的实际定义将来自一个相当抽象和通用的处理程序类：\n\
  \n```\n@QueryService\ninterface Users {\n@Query(\"select u from User u\")\npublic\
  \ List getAllUsers();\n}\n```\n\n随着 CDI 1.1 稳步推进，Shane Bryzak 于 2011 年 11 月 30 日宣布\
  \ Seam 3 将有效解散，Seam 团队将与 Apache CODI 团队以及 Rick Hightower 短命的 CDI Source 一起，在 Apache\
  \ 创建一个名为 DeltaSpike 的新项目。Mark Struberg 是这个新项目的坚定支持者，并宣称与始终与 JBoss 有联系的 Seam 相比，这是一个更加开放的项目。\n\
  \nPete Muir 和 Lincoln Baxter III 都提到，真正的 Seam.next（一个集成的端到端全栈框架）将很快宣布。然而，这一宣布从未到来，2013\
  \ 年 3 月，Seam 主网站更新了文字：“红帽已暂停 Seam 3 的积极开发。”\n\nBryzak 宣布后不久，DeltaSpike 的开发就开始了。2011\
  \ 年 12 月 22 日，Apache 的 Gerhard Petracek 进行了首次提交，随后 Mark Struberg 也进行了提交。\n\n几天后，即\
  \ 2011 年 12 月 28 日，Petracek 添加了包含单个标记接口的`org.apache.deltaspike.core.api.config`包。当天晚些时候，Struberg\
  \ 添加了`ConfigSource`接口和实现逻辑，并附有以下注释：\n\n\n\n> *“这种新逻辑将允许对可配置值进行可插拔、有序排序的实现。”*\n\n\
  然而，在接下来的一年里，一种模式逐渐显现。DeltaSpike 的大部分提交都是由 Struberg 或 Petracek 完成的。前 Seam 负责人 Bryzak\
  \ 只是偶尔提交，而红帽方面只有 Jason Porter（来自 Seam Catch）进行了相当数量的提交，尽管数量仍远少于 Struberg 或 Petracek。其意义在于，尽管\
  \ DeltaSpike 被宣布为一个代表 Seam、CODI 和 CDI Source 合并的多厂商项目，并且明确作为 Seam 的延续（在 InfoQ 关于\
  \ DeltaSpike 的采访中，甚至使用了“Seam 4”这个术语），但实际上，该项目主要由现有的 Apache（CODI）成员负责，红帽人员的参与程度要低得多。\n\
  \n2013 年 5 月，自项目成立之初就参与 DeltaSpike 的 Antoine Sabot-Durand 加入了红帽，这为红帽提供了更多为 DeltaSpike\
  \ 做贡献的机会。然而，最终 Sabot-Durand 只向 DeltaSpike 提交了一次小小的代码提交。\n\n回到 Java EE 阵营，人们并未止步不前。尽管在考虑不周的“云支持”方面存在一些问题，但包含\
  \ CDI 1.1 的 Java EE 7 最终于 2013 年 5 月 28 日发布。\n\n此前一直强烈抵制被 CDI 取代的 EJB EG 终于下定决心，与\
  \ JTA EG 合作，推出了 EJB 核心功能（声明式事务服务）的 CDI/拦截器版本。这些服务不再是 EJB Bean 的默认特性，现在可以通过 `@Transactional`\
  \ 注解按需应用于 CDI Bean，并且更进一步，引入了由 Richard Hightower 之前提出的事务作用域 `@TransactionScoped`。早期的冲突通过以下方式得到解决：规定其他规范应构建在\
  \ CDI 之上（而不是 CDI 包含一切），并且不应重用现有注解（而应引入新的注解）。\n\nBean Validation 1.1 也迅速拥抱了 CDI。其标志性的新特性——方法验证，基于拦截器实现，而在\
  \ Java EE 中，这些拦截器会自动应用于 CDI Bean。（方法验证是指使用注解对方法的输入参数和返回值进行验证。）此外，像约束验证器这样的构件现在也可以通过\
  \ CDI 进行注入。\n\nJSF 2.2 也采取措施拥抱 CDI。JSF 2.0 的主要特性之一是所谓的视图作用域。这个作用域让许多 JSF 任务变得更容易，但它有一个巨大的问题：它只适用于旧的原生托管\
  \ Bean。这个缺陷在一定程度上被 CODI 和 OmniFaces 等实用库所解决，但 JSF 2.2 通过引入自身的 CDI 兼容视图作用域，正式修复了这个问题。此外，JSF\
  \ 还通过将其新的 Flows 特性完全构建在 CDI 之上，并使其大量构件可通过 CDI 注入，从而进一步拥抱了 CDI。\n\n2014 年 1 月 14\
  \ 日，对 CDI 1.1 规范的一个微小修订（维护修订，简称 MR）启动，最终形成了 CDI 1.2。此次变更涉及澄清如何读取对话作用域的 `cid` 参数。这次微小修订的维护负责人是\
  \ Antoine Sabot-Durand，而不是 Pete Muir。\n\n事情并未止步于担任维护负责人。2014 年 3 月 15 日，Sabot-Durand\
  \ 宣布他将与 Pete Muir 共同领导 CDI 2.0 规范的制定。在一篇题为“Forward CDI 2.0”的文章中，Sabot-Durand 提出了\
  \ 2.0 版本的愿望清单。在这份非常详尽的需求清单中，包含了受 DeltaSpike 启发的特性，如“Java SE 引导”和“BeanBuilder”，用于在\
  \ CDI 扩展中轻松构建 `Bean<T>` 实例，还包括 CDI 架构的模块化，以及以编程方式将拦截器和装饰器应用于 `Bean<T>` 实例和生产者方法返回的\
  \ Bean 的能力（这是现有 CDI 1.1 SPI 中的一个巨大空白）。\n\n几乎在 Java EE 7 发布整整一年后，2014 年 6 月 14 日，DeltaSpike\
  \ 1.0 发布了。其标志性特性包括 `@Transactional` 和 `@TransactionScoped` 注解（这些已在 Java EE 7 中）、为\
  \ Bean Validation 添加 CDI 支持（也已在 Java EE 7 中）、一个用于在 Java SE 中使用 CDI 的容器控制器，以及各种模块，例如安全模块、JSF\
  \ 模块（包含已在 Java EE 7 中的 `ViewScope` 和 `WindowScope` 等功能）、Data 模块（基于 JPA 的声明式查询）和\
  \ Servlet 模块（包含已在 Java EE 7 中的注入 `ServletRequest` 等功能）。\n\n尽管 DeltaSpike 在同年晚些时候获得了\
  \ Duke's Choice Award，但总体反响并未达到 Seam 4 的预期。主要问题可能在于，部分功能已在发布整整一年的 Java EE 7 中实现，而且从\
  \ Seam 消亡到 DeltaSpike 首次发布之间的时间间隔相当长。此外，其 JSF 模块在某种程度上还面临着来自 OmniFaces 项目的竞争，后者\
  \ 1.0 版本早在两年前（2012 年 6 月 1 日）就已由 JSF 传奇人物 Bauke Scholtz（又名 BalusC）和本书的作者们发布（尽管实际上它们并不构成竞争，因为功能集差异很大）。\n\
  \n另一个问题可能是 DeltaSpike 安全模块并未原生支持 Java EE 现有的安全系统。对于一个本应构建在 Java EE 之上的框架来说，它奇怪地忽略了用于认证（JASPIC）和授权（JACC）的\
  \ EE SPI。\n\n然而，DeltaSpike 核心模块确实获得了许多赞誉，并包含了一些精华，例如其配置功能和用于轻松构建 Bean 的实用工具（这是原生\
  \ CDI 1.1 SPI 严重缺乏的领域，也是 Sabot-Durand 为 CDI 2.0 设定的目标）、异常处理机制（`@ExceptionHandler`，基于\
  \ Seam Catch）等等。值得一提的是，未能进入 CDI 本身的服务处理器提案，最终以 `Partial-Bean` 模块的形式在 DeltaSpike\
  \ 中得以实现。\n\n不久之后，2014 年 7 月 28 日，新的 CDI 2.0 JSR 审查开始了。重点在于 Java SE 支持和 CDI 的模块化，其中包括一个实际上仅实现\
  \ JSR 330 的最小化容器。Java EE 8 JSR 审查大约在一个月后，即 2014 年 8 月 26 日开始，其重点之一是加强与 CDI 的对齐。JSF\
  \ 2.3 也在同一天启动，其专家组成员包括本书的一位作者。从一开始，主要规范负责人 Ed Burns 就明确表示 Oracle 可用的资源非常有限，因此 JSF\
  \ JSR 主要依靠社区来完成。\n\n同样从那天开始的，还有颇具争议的 MVC 规范。该规范之所以有争议，一方面是因为它直接与同样是 MVC 框架且已存在于\
  \ Java EE 中的 JSF 竞争，另一方面是因为有人认为像 Angular 这样的客户端框架才是未来，因此确实不需要一个新的、第二个 MVC 框架。MVC\
  \ 规范引入了控制器，这些控制器本质上是 JAX-RS 资源，但有一个重要区别：它们*必须*是 CDI Bean。这本质上是纠正（事后看来）未立即将 CDI 用于\
  \ JAX-RS 这一错误的第一步。\n\n不久之后，2014 年 10 月 13 日，JSF 联合规范负责人 Manfred Riem 为 JSF 2.3 进行了首次提交，其中所谓的隐式对象现在通过\
  \ CDI 进行解析，因此也可以通过 CDI 注入。这标志着 JSF 完全重新对齐 CDI 的第一步。\n\n\n\n2014 年 11 月 25 日，一项新的\
  \ Java EE 8 规范评审启动：Java EE Security。本书作者之一 Arjan Tijms 是该专家组的成员，并最终在很大程度上主导了该规范的制定。Tijms\
  \ 强烈主张将 EE Security 工件完全作为 CDI Bean。最初，这一想法遭到了一些反对，规范负责人 Alex Kosowski 反驳说并非所有内容都必须采用\
  \ CDI，并提议改用 JNDI 和`@Resource`。此事后来在专家组内部得到解决，CDI 被选为首选基础。\n\n进入 2015 年，CDI 专家组正努力起草新版\
  \ CDI 规范的早期草案，并讨论如何最好地实现各种功能请求。甚至 DeltaSpike 中的部分 Bean 也被再次讨论。然而，在这些工作和讨论中，有一个人奇怪地缺席了大部分内容，那就是主要规范负责人\
  \ Pete Muir。\n\n因此，2015 年 7 月 30 日，Antoine Sabot-Durand 在 CDI 邮件列表中宣布 Muir 将辞去 CDI\
  \ 规范负责人一职，并在红帽公司承担新的职责，这并不令人意外。此后，Sabot-Durand 接任主要规范负责人。专家组对这一消息的反应极为积极，Muir 最后一次露面时表示，将\
  \ CDI 交给能干的 Sabot-Durand 是最好的选择。此后，Muir 成为 JBoss Developer Studio 团队的经理，并因此基本（但并非完全）淡出了公众视野。\n\
  \n## 暗流涌动\n\n2015 年 9 月 30 日，InfoWorld 发表了一篇题为“内部消息：甲骨文已对 Java 失去兴趣”的文章，文中称甲骨文正在缩减其在\
  \ Java 和 Java EE 方面的投入。尽管甲骨文未对此作出回应，但在随后的几个月里，情况确实变得明朗：甲骨文已悄然开始退出 Java EE，而大多数与甲骨文规范负责人相关的规范也开始凋零。\n\
  \n在 Java EE 8 启动后的一年里，JMS 专家组一直不懈地努力，通过精心设计 API 和规范，使 CDI 成为 JMS 中的一等公民，让 CDI Bean\
  \ 能够作为 JMS 监听器运行。然而，2015 年 12 月 9 日，规范负责人 Nigel Deakin 在回答一个关于定期会议主持的随意问题时，发布了一条令人担忧的消息：\n\
  \n> *“不幸的是，由于其他工作压力，我无法主持接下来的几次 JMS 2.1 会议。情况有变时我会通知大家。”*\n\n（然而，情况从未改变，JMS 2.1\
  \ 实际上就此戛然而止。）\n\n2016 年 4 月 29 日，独立的 JSF 专家组成员 Josh Juneau 发表了文章“Java EE 8，当前状态如何：2015\
  \ 年底以来已完成工作的案例研究”，该文通过各种统计数据清楚地表明，甲骨文已悄然停止了对大多数 EE 规范的工作，而更广泛的社区对此仍不甚了解。\n\n2016\
  \ 年 5 月 25 日，Arjan Tijms 弃用了 JSF 2.3 中所有原生的托管 Bean 注解，并将其指向对应的 CDI 注解。虽然这尚未实际移除它们，但被视为朝着该目标迈出的非常重要的一步。\n\
  \n随着甲骨文悄然退出 Java EE 工作带来的种种不确定性，其他 EE 供应商并未坐等甲骨文。相反，一项新的倡议被发起，2016 年 6 月 27 日，在旧金山举行的\
  \ DevNation 大会上，来自 Payara、红帽、IBM、Tomitribe 和伦敦 JUG 的代表宣布了一项名为 MicroProfile 的新合作。MicroProfile\
  \ 建立在 Java EE 之上，但创建了新的规范和 API，由各供应商自行实现。因此，其流程类似于 Java EE，只是不使用 JCP 流程，而是采用更轻量的“代码优先”方法。这意味着存在规范文档，但代码（API\
  \ 和早期实现）具有优先权。MicroProfile 的一个重要方面是，它产生的所有规范都应优先考虑 CDI。\n\n在 2016 年 9 月的 JavaOne\
  \ 大会主题演讲中，甲骨文宣布将完成 Java EE 8，但取消 JMS、MVC 以及一个不太知名的规范 Management 2.0。尽管在过去一年中，规范负责人或其他甲骨文成员对\
  \ JSF 和 Java EE Security 未做任何工作，但这两个规范主要由社区驱动且不依赖甲骨文，因此得以幸存，幸运的是它们没有被取消。CDI 2.0\
  \ 并非甲骨文规范，也未受甲骨文中止工作的影响。\n\n2016 年 10 月 26 日，CDI 专家组成员兼 IBM Liberty 架构师 Emily Jiang\
  \ 为 MicroProfile 将要交付的第一个规范——MicroProfile Config——进行了首次提交。在接下来的几个月里，Jiang 是该项目的核心提交者。2017\
  \ 年 1 月 18 日，Mark Struberg 加入。他们共同提交了大部分工作，偶尔有其他提交者提供帮助。\n\n2016 年底，几位甲骨文规范负责人短暂回归\
  \ JSF 和 EE Security 规范，但并非为了做大量或任何新工作，而是确保当前规范的快照已准备好发布。\n\n2017 年 5 月 15 日，Antoine\
  \ Sabot-Durand 宣布 CDI 2.0 已发布。主要新特性按计划是 Java SE 支持，并且规范本身更加模块化，分为三个部分（核心、SE 和 EE）。受\
  \ DeltaSpike 启发的 BeanBuilder API 确实已被包含（现在称为 Configurators），Sabot-Durand 最初愿望的一部分也被纳入：拦截器现在可以（以编程方式）应用于从生产者返回的\
  \ Bean。然而，`Bean<T>`实现查找并应用其自身装饰器的能力并未进入 2.0 规范。\n\nDeltaSpike 不仅启发了 CDI 2.0，也启发了\
  \ MicroProfile。2017 年 7 月 25 日，在 Payara 工作的工程师 Ondro Mihályi 发布了 MicroProfile Config\
  \ 1.0。MicroProfile Config 明显基于 DeltaSpike config，甚至使用了相同的术语，例如 ConfigSource，Struberg\
  \ 早在 2011 年 12 月 DeltaSpike 刚启动时的那次提交中就使用过该术语。\n\n2017 年 8 月 17 日，甲骨文软件布道师 David\
  \ Delabassee 宣布，甲骨文希望将 Java EE 迁移到一个开源组织。一个月后，即 2017 年 9 月 12 日，宣布该组织将是 Eclipse，不久之后，项目名称被宣布为\
  \ EE4J。\n\nJava EE 8 最终于 2017 年 9 月 18 日发布。它包含了 JSF 2.3 和 EE Security 1.0 等。EE Security\
  \ 完全构建在 CDI 之上（以及在更底层的 JASPIC 之上）。在 CDI 1.0 发布近八年后，终于有了一个从一开始就考虑 CDI 而设计的规范。不幸的是，由于工作中止，将服务从\
  \ EJB 进一步解耦并迁移到基于 CDI 的工件的工作一点也没有完成。\n\n2 月 26 日，Java EE 规范的官方新名称通过社区意见选定为 Jakarta\
  \ EE。不久后选定了徽标，源代码也逐步从甲骨文在 GitHub 上拥有的“java-ee”组织转移到 Eclipse 拥有的“eclipse-ee4j”。\n\
  \n\n\n## 美丽新世界\n\n2018 年 3 月 26 日，Tijms 联系 Lee，询问是否将停滞近十年的 JSR 330 移交给 Jakarta，或将其与\
  \ CDI 合并。Lee 回应称绝对不想将其与 CDI 合并，但忽略了关于移交给 Jakarta 的问题。\n\n2018 年 6 月 22 日，Stuart\
  \ Douglas 为 Red Hat 的一个名为 Shamrock 和 Protean 的新项目进行了首次提交。该项目的计划是成为一个单一的项目框架（类似于曾经的\
  \ Seam），它基本放弃了反射机制，回归到 EJB 最初采用的代码生成方法，不过这次自动化程度要高得多。这次初始代码提交包含一个`org.jboss.shamrock.codegen`包，其中有一个`BytecodeRecorder`类，使用了\
  \ JBoss ClassWriter，这清楚地表明这个新框架的核心原则是代码生成。Shamrock 的早期描述如下：\n\n“Shamrock 是一个框架，允许你在构建时处理\
  \ Java EE 和 Microprofile 元数据，并利用这些元数据创建低开销的 jar 文件，以及使用 Graal 创建原生镜像。”\n\nRed Hat\
  \ 对此方法并不陌生，因为其 CDI 实现 Weld 可选择性地使用 Jandex，后者可以在构建时扫描注解，并将这些注解存储在一个索引中，Weld 可以在运行时查询该索引。\n\
  \n当 Java EE 移交仍在进行，Oracle 与 Eclipse 之间的谈判仍在继续时，Tijms 于 2018 年 7 月 16 日启动了 JSF 3.0\
  \ 的工作。计划之一是完全从 JSF 中移除原生托管 bean 系统，包括古老的 XML 变体，并从此完全依赖 CDI。大约在同一时间，Tijms 向 Steve\
  \ Millidge（Payara 总监）提出了将 HK2 转变为完全兼容 CDI 的实现的构想。这个想法得到了积极响应，因为它将解决 Payara 服务器内部使用两个\
  \ DI 框架（HK2 和 CDI（Weld））的问题，这两个框架共享通用的 AtInject 注解，因此经常发生冲突，并导致诸如重复扫描等各种问题。\n\n\
  在这一切发生的同时，Gavin King 仍在从事他的 Ceylon 项目，但在该项目上工作了近 9 年后，2019 年 9 月 29 日终于成为 King 在\
  \ Ceylon 仓库中最后一次提交的日期。在接下来的几个月里，King 逐渐回归到 Java EE 领域。\n\n意识到 Red Hat 新项目使用 Shamrock/Protean\
  \ 这种双重命名并不完全理想，Shamrock 于 2019 年 2 月 22 日更名为 Quarkus。大约两周后，即 2019 年 3 月 7 日，Jason\
  \ Greene 向世界介绍了 Quarkus。利用构建时元数据收集和代码生成，并结合 GraalVM，Quarkus 能够以前所未有的毫秒级速度启动 Java\
  \ 应用程序。\n\n特别有趣的是，Quarkus 引入了一个名为 Quarkus ArC 的新 DI 实现。ArC 实现了 CDI 2.0 的大部分 API\
  \ 和行为，但并非全部。它并非基于 Red Hat 的 CDI 实现 Weld，而是构成了一个全新的、精简得多的代码库。由于基于构建时处理，ArC 能够在构建时（而非传统\
  \ CDI 实现那样在运行时（启动时））发出许多典型的 CDI 错误，例如歧义解析。然而，ArC 不支持 CDI 可移植扩展，而是提供了构建时的变体来替代它们。由于\
  \ ArC 并非官方的 CDI 实现，它在引入超出 CDI 2.0 API 的功能方面采取了一些自由，例如，如果使用了限定符，则`@Inject`的使用变为可选；这是一个很久以前就有人提出但从未被纳入\
  \ CDI 规范的构想。\n\nPayara 的 Jonathan Coustick 在与 Arjan Tijms 合著的一篇文章中，于 2019 年 6 月\
  \ 6 日宣布，Payara 计划在未来某个时候将 HK2 转变为完整的 CDI 实现，作为 Weld 的替代方案。这距离 Tijms 提出最初构想已近一年。\n\
  \n2019 年 7 月 22 日，作为仍在进行中的 Java EE 移交以及随后的 Jakarta EE 8 准备工作的一部分，CDI API 和规范文档被正式从\
  \ Red Hat 移交到 Github 上的 Eclipse EE4J 仓库，与所有其他已更名为 Jakarta EE 的 Java EE API 放在一起。\n\
  \n第二天，即 2019 年 7 月 23 日，来自西雅图的 Red Hat 工程师 Scott Stark 将 JSR 330 API 代码的一个分支提交到了同一个仓库。遗憾的是，未能与\
  \ Lee 或 Johnson 达成移交原版的协议。\n\n"
- '# 2. Bean 作为 EE 中的组件模型


  在上一章中，你了解了 CDI 的历史，以及 CDI 如何被定位为 Java EE 中的默认组件模型。在本章中，当你将 CDI 与 Java EE 中仍然存在的其他一些模型进行比较时，你将更深入地研究这个组件模型。


  ## 什么是组件模型？


  *组件*这个术语由来已久，就像相关的词*模块*一样，它是一个有多种不同定义的术语。有时这些解释相互重叠，有时又相互冲突。为了清晰起见，我们将在此处定义组件的模型，进而定义单个组件。我们并不声称这是权威定义；它仅仅旨在作为本书的工作定义。


  在 Java EE 中，组件最终由类定义，但与类相比，大多数组件还具有以下额外特性：


  *   被管理

  *   具有作用域

  *   可替换

  *   可拦截

  *   具有生命周期

  *   具有名称


  我们将在以下章节中解释所有这些术语的含义。




  ### 托管


  在组件的语境中，“托管”意味着开发者不会使用 Java 的 `new` 运算符来实例化作为组件的类。相反，当容器（运行时）确定需要某个实例时（例如，为了处理诸如
  URL 请求之类的传入事件），或者当开发者请求时，这些类会由容器隐式实例化。


  开发者可以通过多种方式请求此类实例。


  最显式的方式是使用所谓的服务定位器模式以编程方式实现。通过这种方式，通常通过调用某个类或实例上的方法来获取所需组件的实例。然后，该类或实例会在内部从某处获取所需的实例，或者，如果没有可用的实例，则创建一个（并通常会将其存储起来以备将来引用）。


  服务定位器模式与工厂模式略有不同，因此可能需要对此稍作澄清。从表面上看，它们很相似，因为在这两种情况下，都是通过调用某个类或实例上的方法来请求实例（在工厂模式中称为*工厂*，在服务定位器模式中称为*服务定位器*）。区别在于，工厂会创建一个新实例，该实例随后由请求它的代码所拥有；而服务定位器通常会查找一个现有实例，并且仅当未找到此类实例时，才会创建一个新实例。从服务定位器返回的实例随后*不*由请求它的代码所拥有。这尤其意味着，同一个实例可能正在被其他地方的代码使用（甚至同时在另一个线程中使用），并且请求代码不应尝试销毁它。


  正如你将在本章后面看到的，在 CDI 中，使用 `@Dependent` 时存在一些例外情况，这些界限会有些模糊，但总体而言，这些区别是相当成立的。


  以下是 Java EE 中的几个示例：


  **EJB/JNDI**


  ```

  SomeService someService =

  (someService) new InitialContext().lookup("java:module/someService");

  ```


  **JSF**


  ```

  SomeService someService =

  FacesContext.getCurrentInstance()

  .getApplication()

  .evaluateExpressionGet(

  FacesContext.getCurrentInstance(),

  "#{someService}",

  SomeService.class);

  ```


  **CDI**


  ```

  SomeService someService =

  CDI.current().select(SomeService.class).get()

  ```


  除了使用服务定位器模式显式请求实例外，开发者还可以使用注入来请求实例。在这种情况下，开发者以更具声明性的方式指定请求，容器会据此提供所请求的实例。这主要有两种变体。第一种是使用字段注入，第二种是使用参数注入（实际上，是构造函数或方法的参数）。


  使用字段注入时，你几乎总是需要以某种方式提供元数据来向容器声明你的意图，以便在创建具有可注入字段的新实例时，容器知道这些字段需要被注入。历史上，元数据是通过 XML
  部署描述符提供的，但近年来，这已基本被注解所取代。


  使用参数注入时，你可能并不总是需要提供元数据，或者可以只提供一部分。例如，在 CDI 中，你将整个带有参数的构造函数标记为可注入，然后 CDI 会为所有构造函数参数提供实例（你不必用
  `@Inject` 标记每个参数；实际上，`@Inject` 甚至不能针对参数）。请注意，只能有一个这样的可注入构造函数，因为 CDI 没有用于注入点来指定应调用哪个构造函数的
  API，并且 CDI 当然不应该做出任意选择。


  对于 Setter 注入，CDI 支持方法注入的一个特定子集。在这种情况下，同样是整个 setter 方法被 `@Inject` 注解，而不是单个参数。这些 setter
  会在 bean 创建之后、`@PostConstruct` 方法被调用之前由 CDI 运行时调用。当手动调用 setter 时，这种注入方式不适用。在大多数情况下，它们确实不应该被直接调用，但测试环境是一个明显的例外。Setter
  注入在很大程度上与字段注入相同，但它允许 bean 开发者“拦截”注入并在需要时执行额外的逻辑。这基本上与在非托管的简单 Java 类（即 POJO，Plain
  Old Java Object）中直接字段赋值与 setter 方法之间的区别是相同的原理。然而，也许值得注意的是，在 CDI 中，通常认为最佳实践是使用字段注入而不是
  setter 注入，而在 POJO 中则恰恰相反。


  CDI 还支持在运行时本身调用的所有方法中进行完整的方法注入，这些方法包括生产者方法、销毁方法和事件监听器（这些将在后续章节中更详细地介绍）。在这些情况下，该方法显然已经明确旨在由
  CDI 调用，因此你无需提供任何 `@Inject` 注解；对于方法中的每个（额外的）参数，CDI 都会解析一个实例并将其作为参数传递。


  在 JAX-RS 中，对于由 JAX-RS 调用的资源方法，你可以看到类似的情况；但是，该规范确实要求所有额外的参数都必须用 JAX-RS 的 `@Context`
  注解或其任何其他特定注解进行注解。


  请注意，使用注入时，整个对象实例链必须是托管的。换句话说，当使用 Java 的 `new` 运算符创建实例时，字段注入并不会神奇地发生。如果你从一个由容器响应事件而调用的组件开始一个链，那没有问题；容器会实例化这个初始组件并对其进行注入。如果这些被注入的组件有注入点，它们也会被注入。这确实带来了一个有趣的问题：如果你在使用
  `new` 运算符时无法注入组件，并且该组件不是由容器调用（因此创建）的，那么你如何引导这个序列？答案是使用前面解释过的服务定位器模式来创建这个初始组件。这将产生一个托管组件，随后，该组件的所有（传递的）注入点都将被解析。


  以下是 Java EE 中基于注解的字段注入的几个示例：


  **EJB**


  ```

  @Stateless

  public class SomeEJB {

  @EJB

  SomeService someService;

  }

  ```


  **JSF**


  ```

  @ManagedBean

  public class SomeJSFBean {

  @ManagedProperty(value = "#{someService}")

  SomeService someService;

  public void setSomeService(SomeService someService) {

  this.someService = someService;

  }

  }

  ```


  **JAX-RS**


  ```

  @Path("/something/")

  class SomeResource {

  @Context

  SomeService someService

  }

  ```


  **CDI**


  ```

  public class SomeCDIBean {

  @Inject

  SomeService someService;

  }

  ```


  请注意，JSF 版本要求有一个 setter 方法。这个要求之所以存在，是因为 JSF 的 DI 系统最初完全是基于 XML 的，而注解变体是在 2.0 版本中才附加上的。具体来说，这意味着
  `@ManagedProperty SomeService` 这一行并不是直接的注入点，而只是一个标记，JSF 会拾取它，然后以与使用 XML 定义时相同的方式进行处理。此外，请注意，JAX-RS
  的 `@Context` 注解通常用于注入 JAX-RS 自身提供的各种工件。在示例中，我们用它来注入一个自定义对象，但这需要专有（供应商特定）代码，例如 Jersey
  中的 `InjectableProvider` 或 CFX 中的 `ContextProvider`。


  以下是使用各种参数注入（构造函数和方法）的几个示例：


  **CDI：构造函数注入**




  ```

  public class SomeCDIBean {

  @Inject

  public void SomeCDIBean(SomeService someService) {

  }

  }

  ```


  **CDI：Setter 方法注入**


  ```

  public class SomeCDIBean {

  @Inject

  public void setSomeService(SomeService someService) {

  }

  }

  ```


  **CDI：生产者方法注入**


  ```

  public class SomeCDIBean {

  @Produces

  public Foo createFoo(SomeService someService) {

  }

  }

  ```


  **CDI：观察者方法注入**


  ```

  public class SomeCDIBean {

  public void listenTo(@Observes SomeEvent, SomeService someService) {

  }

  }

  ```


  **JAX-RS**


  ```

  @Path("/something/")

  public class SomeResource {

  @GET

  public Response getFoo(@Context HttpHeaders httpHeaders) {

  }

  }

  ```


  ### 作用域


  在组件的语境中，*作用域* 指的是一个组件的一个或多个实例被保存在前述的概念性存储库中，每个作用域实例（出现）对应一个实例。根据请求组件的代码上下文，会从匹配的作用域中返回不同的实例。


  这听起来可能有些抽象，但一个例子应该能解释清楚。考虑一个 Web 应用中的 HTTP 请求。这类应用通常会同时处理许多请求。来自单个浏览器的请求可以共享一个会话，但显然有许多不同的客户端，因此会有许多不同的浏览器和许多会话。最后，所有会话的共同点是它们都属于同一个应用。


  与此对应的作用域分别是经典的请求作用域、会话作用域和应用作用域。对于一个请求作用域的组件 `foo`，如果在一个请求中运行的代码想要使用该组件，它会获得一个仅提供给在该请求上下文中运行的代码的实例。另一个也想要
  `foo` 的请求则会获得一个不同的实例。


  并非 Java EE 中的所有组件都支持显式作用域。例如，Servlet 就不支持，尽管它们实际上是应用作用域的。无状态会话 Bean 和消息驱动 Bean 是一个特例，因为每个调用或消息都可能由不同的实例处理。


  以下是一些显式作用域的示例：


  **JSF**


  ```

  @javax.faces.bean.RequestScoped

  @ManagedBean

  public class SomeJSFBean {

  }

  ```


  **CDI**


  ```

  @javax.enterprise.context.RequestScoped

  public class SomeCDIBean {

  }

  ```


  ### 可替换性


  这里的*可替换性* 意味着组件可以被系统中兼容的组件轻松替换，而客户端代码无需感知。这可以通过静态（声明式）配置实现，也可以在运行时更动态地实现。


  当然，被替换的组件必须与原始组件兼容，这意味着它必须实现相同的接口（或该接口的子接口），或者是原始组件的子类。这当然对原始组件施加了约束；它确实必须实现一个接口，或者，当没有实现任何接口时，不能是
  final 类，也不能有 final 方法。


  最初的 J2EE 编程模型非常注重可替换组件，因为基本上所有东西都是通过“引用”（`mail-ref`、`resource-ref`、`role-ref`、`ejb-ref`
  等）来使用的。这意味着开发者应该声明间接引用（refs）并针对其编码。这些引用随后旨在由部署者在应用部署时进行映射。然而，所使用的语法相当晦涩，并且实际的映射必须以特定于服务器的方式完成，这意味着开发者总是很难找到适合其服务器的正确信息。


  这里的核心问题是，人们*必须*进行映射，而不是使用默认值，然后仅在需要时进行替换。以下给出了 EJB 和 GlassFish 或 Payara 的一个近似示例：


  **在** **web.xml** 中


  ```

  someEjb


  ```


  **在** **glassfish-web.xml** 中


  ```

  someEjb

  java:/somepath/someactualbean


  ```


  然后可以通过类似以下的方式在 Servlet 中查找该 Bean：


  ```

  context.lookup("java:comp/env/someEjb");

  ```


  通过更改 `glassfish-web.xml` 中的 JNDI 名称，你可以透明地更改 `java:comp/env/someEjb` 所引用的内容，从而更改前面显示的调用所返回的内容。


  然而，在 CDI 中，事情要优雅得多。


  在 CDI 中，不需要对每件小事都进行过度的“引用”；因此，CDI 中根本没有“引用”。你直接定义和注入依赖项，当需要更改注入的内容时，你提供一个所谓的替代项。这些替代项将在本书后面更详细地讨论，但一个简单的示例如下：


  ```

  // 这是默认使用的

  public class SomeCDIBean {

  }

  // 这是一个注入了 SomeCDIBean 的 Bean

  public class SomeOtherCDIBean {

  @Inject

  SomeCDIBean someBean;

  }

  // 提供一个替代项

  @Dependent

  @Alternative

  @Priority(APPLICATION)

  public class AlternativeProducer {

  @Produces

  public SomeCDIBean producer() {

  return new SubclassOfSomeCDIBean();

  }

  }

  ```


  一些批评者可能会说，CDI 的方式并没有那么强制开发者去考虑替换，并且如果覆盖被遗忘或由于某种原因未被拾取（从而被静默忽略），默认实例可能会出现在不应该出现的地方。虽然这些担忧有一定道理，但像
  `glassfish-web.xml` 这样的映射文件，如果包含组件的默认版本，也同样可能进入生产环境。不过，无论如何，大多数开发者选择了更少的仪式感，CDI
  方法基本上已经胜出；在现实世界的 Java EE 项目中，“引用”现在相当罕见，并且最近引入的几乎任何新框架或 Java EE API 都没有复制旧 J2EE
  中过度的“引用”方法。




  ### 可拦截性


  如果一个组件允许容器或开发者为其暴露的操作隐式或显式添加拦截器，则称该组件是*可拦截的*。此处的*拦截器*是一段代码，它在调用操作（方法）之前或之后（或前后都执行）运行，而调用者无需察觉此类拦截器的存在。拦截器通常能够修改方法的输入参数，并且能够修改返回值（如果有）。某些类型的拦截器甚至可以在保持拦截器链的同时，将调用重定向到另一个目标组件。


  图 2-1 展示了一个典型的拦截器调用序列。


  ![../images/454458_1_En_2_Chapter/454458_1_En_2_Fig1_HTML.png](img/454458_1_En_2_Fig1_HTML.png)


  图 2-1


  拦截器调用序列


  在图 2-1 中，调用是在（注入的）Bean 代理上进行的，该代理是即将被调用的真实 Bean 的替身。代理在内部调用拦截器，如前所述，拦截器可以在调用实际 Bean
  之前和之后运行代码。在拦截器规范中，这个实际调用并非直接在 Bean 实例上进行，而是通过一个 `InvocationContext` 实例在中间协调。这个 `InvocationContext`
  实例进而帮助代理调用下一个拦截器，或者最终调用实际的 Bean。


  对于开发者直接进行方法调用的组件（例如 EJB 和 CDI Bean，但不包括 Servlet 或消息驱动 Bean），其可拦截性通常意味着可替换性，因为容器必须返回一个修改后的实例，该实例内部包含一个待调用的拦截器列表，并最终调用实际实例。在
  Java EE 中，这种修改后的实例被称为*代理*。如前文“可替换性”所述，这是一个兼容的实例。


  未被直接调用的组件仍然可以拥有拦截器，例如每个 HTTP 请求都会调用的全局 JASPIC 认证模块，或者针对指定 URL 模式或指定 Servlet 调用的
  Servlet 过滤器。


  以下是一些示例（部分示例有所精简）：


  **JASPIC：Servlet 容器配置文件**


  ```

  public class SomeServerAuthModule implements ServerAuthModule {

  @Override

  public Class[] getSupportedMessageTypes() {

  return new Class[] { HttpServletRequest.class, HttpServletResponse.class };

  }

  @Override

  public AuthStatus validateRequest(MessageInfo messageInfo, Subject clientSubject,
  Subject serviceSubject) {}

  @Override

  public AuthStatus secureResponse(MessageInfo messageInfo, Subject serviceSubject)
  {}

  }

  ```


  **Servlet**


  ```

  @WebFilter(“/someurl”)

  public class SomeFilter extends HttpFilter {

  @Override

  protected void doFilter(HttpServletRequest req, HttpServletResponse res, FilterChain
  chain) {}

  }

  ```


  **EJB**


  ```

  @Stateless

  public class SomeEJB {

  // 此处应用了容器提供的隐式事务拦截器

  public void someMethod() {}

  // 此处应用了容器提供的安全拦截器

  @RolesAllowed

  public void otherMethod() {}

  }

  ```


  **CDI**


  ```

  // 定义注解

  @Inherited

  @InterceptorBinding

  @Retention(RUNTIME)

  @Target({ METHOD, TYPE })

  public @interface SomeInterceptor {

  }

  // 定义拦截器

  @Interceptor

  @SomeInterceptor

  @Priority(APPLICATION)

  public class SomeInterceptorImpl {

  @AroundInvoke

  public Object doIntercept(InvocationContext context) throws Exception {

  }

  }

  // 使用拦截器

  public class SomeCDIBean {

  @SomeInterceptor

  public void someMethod() {

  }

  }

  ```


  请注意，对于 EJB，我们仅展示了两个内置拦截器。对于 CDI，我们展示了如何定义所谓的拦截器绑定，这是一种 CDI 特有的构造，用于通过注解将拦截器附加到 CDI
  Bean 上。


  然而，拦截器本身，包括 `@AroundInvoke` 和 `@Interceptor` 注解以及 `InvocationContext` 类型，均来自 Java
  EE 的拦截器规范，并非 CDI 所特有（EJB 可以使用相同的拦截器）。CDI 中的拦截器默认是未激活的，但可以通过为拦截器指定优先级，或者在缺少优先级的情况下，使用
  CDI 的 `beans.xml` 部署描述符来激活。在前面的示例中，我们选择了使用注解。我们使用的 `@Priority` 注解既不来自 CDI，也不来自拦截器规范，而是源自通用注解规范。


  关于对象实例拦截的一个特别说明是：Java 中的 `this` 指针无法被拦截。这对于 Java EE 中的所有不同组件都是成立的，因为这是 Java 底层的限制。具体来说，这意味着类中内部调用自身的方法将不会触发拦截器。


  以下是 CDI 中的一个示例：


  ```

  // 使用拦截器

  public class SomeCDIBean {

  public void fooMethod() {

  someMethod();

  }

  @SomeInterceptor

  public void someMethod() {

  }

  }

  ```


  在这种情况下，如果外部类调用了 `fooMethod()`，并且如代码所示，`fooMethod()` 调用了 `someMethod()`，那么拦截器将不会被调用。


  拦截器以及与之密切相关的 CDI 特有装饰器将在第 6 章中详细讨论。




  ### 拥有生命周期


  Java EE 中的组件几乎总是拥有某种形式的生命周期。这源于其*受管理*的特性，意味着容器会在几个逻辑时刻回调组件，这些时刻通常与构造、初始化和销毁相关。这种回调被称为*生命周期回调*。


  这些关注点实际上非常普遍，以至于相关的注解已被添加到通用注解中，即：


  *   `@PostConstruct`


  *   `@PreDestroy`


  这些注解可以放在一个方法上，容器会在适当的时间回调该方法。


  对于 `@PostConstruct`，它发生在组件注入之后、投入使用之前。细心的读者可能会问，既然 Java 已经有了构造函数，为什么还需要 `@PostConstruct`？答案很简单：构造函数是在注入发生之前或同时被调用的（如果使用构造函数注入，则是后者）。当调用带有
  `@PostConstruct` 注解的方法时，可以保证所有注入（无论是基于构造函数还是基于字段的）都已完成。


  `@PreDestroy` 方法在组件即将停止服务之前被调用（通常，但不一定，会使其符合垃圾回收的条件）。这与 Java 的终结器（finalizer）的区别应该很清楚：终结器不可靠，应尽量少用甚至不用。而带有
  `@PreDestroy` 注解的方法在明确指定的时间被调用，可靠性高得多。但请注意，`@PreDestroy` 注解方法的可靠性在一定程度上取决于该组件所使用的作用域，它通常在该作用域结束时被调用。请求作用域通常是可靠的，因为大多数请求持续时间较短（当然也有例外）。然而，来自
  JSF 的标准视图作用域可靠性较低，因为当用户通过简单的 GET 请求导航到新视图时，它不会自动结束，这意味着在这种情况下，`@PreDestroy` 注解不会被调用，直到与之关联的
  HTTP 会话超时或被显式关闭。


  Java EE 中的许多组件都有自己的初始化和销毁方法，这些方法几乎总是早于上述通用注解的引入。一些组件，尤其是 Servlet，实际上既支持它们自己的初始化和销毁方法，也支持通用注解。不幸的是，这些方法的调用顺序并没有严格规定。对于
  Servlet 来说，`init()` 方法提供了至关重要的 `ServletConfig`（它进而提供了 `ServletContext`），但更不幸的是，在实践中，`@PostConstruct`
  似乎最常在 `init()` *之前*被调用。这意味着当调用带有 `@PostConstruct` 注解的方法时，`ServletContext` 尚不可用。由于
  Servlet 规范不允许注入其自身的任何工件（它只支持注入其他工件），因此带有 `@PostConstruct` 注解的方法也无法获取此上下文。结果是，即使是新代码，Servlet
  的 `init()` 方法仍然被更频繁地使用。


  以下是一些示例：


  **JASPIC**


  ```

  public class SomeServerAuthModule implements ServerAuthModule {

  private CallbackHandler handler;

  @Override

  public void initialize(MessagePolicy requestPolicy, MessagePolicy responsePolicy,
  CallbackHandler handler, Map options) {

  this.handler = handler;

  }

  @Override

  public AuthStatus validateRequest(MessageInfo messageInfo, Subject clientSubject,
  Subject serviceSubject) {}

  }

  ```


  **Servlet**


  ```

  @WebServlet("/someurl")

  public class SomeServlet extends HttpServlet {

  private static final long serialVersionUID = 1L;

  @PostConstruct

  public void myinit() {

  // getServletContext() 在此处可能无法工作

  }

  @Override

  public void init() {

  // getServletContext() 在此处可以工作

  }

  @Override

  public void doGet(HttpServletRequest request, HttpServletResponse response) {}

  }

  ```


  **CDI**


  ```

  public class SomeCDIBean {

  @Inject

  SomeService someService;

  @PostConstruct

  public void init() {

  // 在此处 someService 已被注入

  }

  }

  ```


  ### 命名


  Java EE 中的许多组件都是*命名的*，这意味着你可以使用（字符串）名称来引用它们。一些组件，例如 JSF 托管 Bean 和 Servlet，仅使用名称。其他组件，例如
  EJB 和 CDI Bean，可以通过名称和类型两者来引用。


  然而，Java EE 中不同的组件类型并不总是共享同一个命名空间或命名系统。通常，有三种命名系统在使用。


  *   组件特定

  *   JNDI

  *   表达式语言


  组件特定的名称，例如在 Servlet 规范中可以找到，在使用 XML 时最为常见，因为该名称随后被用于将 Servlet 映射到 URL 模式。


  ```

  Faces Servlet

  javax.faces.webapp.FacesServlet


  Faces Servlet

  /faces/*


  ```


  然而，该名称也可以在编程式查找 Servlet 时使用。


  EJB Bean 既使用组件特定的名称，也使用 JNDI 名称。不过，默认情况下这些名称是相关的。组件特定的名称被称为 *bean 名称*，它默认为 Bean
  的简单类名。可移植的 JNDI 名称由此名称派生而来。注意，我们说的是“可移植的 JNDI 名称”。这是因为在 EJB 早期，自动生成的 JNDI 名称总是特定于产品的。示例如下：


  ```

  @Stateless

  public class SomeService {}

  ```


  在这种情况下，bean 名称就是 `SomeService`，而其中一个 JNDI 名称是派生出来的 `java:module`*/*`SomeService`*。*


  你也可以显式地添加一个名称。


  ```

  @Stateless(name="foo")

  public class SomeService {}

  ```


  在这种情况下，bean 名称是 `foo`，派生出的 JNDI 名称是 `java:module/foo`。


  EJB Bean 可以通过 EJB 名称进行注入，如下所示：


  ```

  public class MyEJBBean {

  @EJB(beanName="foo")

  SomeService someService;

  }

  ```


  或者它们可以通过 JNDI 名称进行注入。


  ```

  public class MyEJBBean {

  @EJB(lookup="java:module/foo")

  SomeService someService;

  }

  ```


  然而，当使用所有默认值且名称不冲突时，名称可以省略。


  ```

  public class MyEJBBean {

  @EJB

  SomeService someService;

  }

  ```


  第三种命名系统涉及 Java EE 的表达式语言。与 JNDI 不同，表达式语言不是一个目录系统；它或多或少由一个代表对象的扁平命名空间组成。不过，与 JNDI
  类似，你需要针对各种上下文解析名称。在 JNDI 中，这是通过 `InitialContext` 完成的，你可以使用参数将其指向不同的 JNDI 树，而在表达式语言中，你使用的是
  `ELContext`，特别是 `ELResolver`。例如，用于 CDI 命名空间的 `ELResolver` 可以从 CDI Bean 管理器中获取。


  JSF 托管 Bean 系统主要是命名的，当为 Bean 定义名称时，它们最终会在 JSF 自己的命名空间中定义。当在 JSF 中定义托管 Bean 而未显式声明名称时，会使用简单类名，就像在
  EJB 中一样，但这次首字母小写。


  示例如下：


  ```

  @ManagedBean

  public class SomeJSFBean {

  }

  ```


  在这种情况下，bean 名称将是 `someJSFBean`。与 EJB 类似，你也可以显式地定义名称，如下所示：


  ```

  @ManagedBean(name = “foo”)

  public class SomeJSFBean {

  }

  ```


  如前所述，JSF 托管 Bean 可以通过其名称进行注入，如下所示：


  ```

  @ManagedBean

  public class SomeJSFBean {

  @ManagedProperty(value = “#{foo}”)

  SomeService someService;

  // + setter

  }

  ```


  与 EJB 不同，JSF 中没有可以不指定名称就注入 Bean 的变体。


  请注意，当使用表达式语言*引用*一个 Bean 时（例如在 `@ManagedProperty` 注解中），你放入的不仅仅是一个名称，而是一个几乎任意复杂的完整表达式。当你*定义*
  Bean 时（例如在 `@ManagedBean` 注解中），你使用的是简单的名称（一个不透明的字符串）。




  CDI 本身并不主要依赖命名。相反，组件完全由其 Java 类型以及零个或多个额外的所谓限定符来标识。你将在下一章深入了解这些内容，但这里只需说明，这些限定符是特殊的注解，因此是类型安全的。


  不过，CDI 确实支持为组件命名（这甚至是 CDI 内部用于描述组件的元数据结构中的一等属性），但在 CDI 中为组件命名完全是可选的，并且当组件（称为 CDI
  Bean）未被显式命名时，它没有默认名称。Bean 可以通过 `@Named` 注解来命名，或者直接构造其元数据实例并设置 name 属性（我们将在后面讨论）。不过，当你使用
  `@Named` 注解时，确实会得到一个默认名称，这与 JSF 中的规则相同：即 Bean 的简单（非限定）类名，首字母小写。


  ## 为什么 Java EE 中有如此多的不同组件模型？


  可以说，Java EE 最大的问题之一就是缺乏一个连贯的组件模型。如前一节所示，Java EE 中的许多规范/API 都有自己的模型。这包括但不限于以下内容：


  *   Servlet

  *   EJB 会话 Bean 和消息驱动 Bean

  *   服务器认证模块

  *   JSF 托管 Bean

  *   JSF 构件，如转换器、资源处理器、阶段监听器等

  *   JCA 资源适配器

  *   JAX-RS 资源


  对于那些将 Java EE 与流行的 Spring 框架结合使用的用户（这比 Java EE 与 Guice 的组合更常见），显然除了上述模型之外，还有 Spring
  组件模型和注入 API。


  正如我们在第 1 章中讨论的，这大多是历史原因造成的；Java EE 始于 EJB 模型，该模型主要针对开发高级业务组件，而非开发各种容器服务。


  另一个问题可能是，在很长一段时间里，EJB 是昂贵且闭源产品的领域，而 Servlet 则在 Tomcat 和 Jetty 等各种产品中免费且开源提供。如果当年
  EJB 没有作为这种“专属”技术推向市场，Servlet 可能早就基于它了。等到 EJB 变得更容易获取（即：作为免费开源产品更广泛可用时），Servlet 已经根深蒂固，难以且不太可能改变了。


  虽然缺乏远见，未能从一开始就以一个通用且连贯的组件模型来启动 Java EE 确实是一个原因，但这并非完全是因为没有尝试。例如，在 EJB 规范中，曾提到组件不应自行启动线程。长期以来，世界各地的开发者都逻辑地将其解释为：EJB
  Bean 不允许启动线程，但在 Servlet 中这样做是可以的。因此，许多应用程序通过复杂的技巧，将线程的创建委托给 Servlet，然后设法让 EJB 中的代码使用这些线程。然而，有传言称，这一限制从未打算仅适用于
  EJB 容器，而是旨在适用于整个 Java EE 应用服务器。可以推测，该限制的编写者当时心中已经设想了一个基于 EJB 组件的完整平台，但正如你现在所知，这个平台从未实现。最后一次也是唯一一次尝试让其他规范在一定程度上基于
  EJB，是 JAX-RPC 和 JAX-RPC 2（后更名为 JAX-WS）。在这些规范中，Web 服务组件本身不一定基于 EJB，但反过来却是成立的。EJB
  Bean 在现有的本地和（二进制）远程视图之外，增加了一个新视图：“Web 服务客户端视图”。这符合当时的理念，即其他规范不应使用 EJB（换句话说，不应构建在
  EJB 之上），而 EJB 将成为所有其他规范的门面。


  对于建立通用组件模型没有帮助的是，尽管 Sun Microsystems 领导着 Java EE 平台，甚至在 JCP 中扮演着特殊的监管角色，但监督各种 Java
  规范的过程和组织从未能够像微软和 Interface 21/SpringSource/Pivotal 等供应商自动对其各自专有平台施加的那样，对该平台实施铁腕控制。相反，在很长一段时间里，Java
  EE 只是几个或多或少独立、仅松散连接的项目的集合。规范的优势（来自众多不同利益相关者的输入）也证明是其劣势（对于平台发展方向存在众多不同意见）。


  考虑到这一点，最终成为 Java EE 通用组件模型的方案并非来自 Sun，而是来自 Red Hat（现为 IBM），这或许有些讽刺。




  ## CDI Bean 作为 Java EE 中的组件模型


  经过漫长的旅程，Java EE 终于迎来了在平台中引入通用组件模型的时刻，即使用 CDI Bean 作为组件。


  最初，关于 CDI 如何作为这种通用组件模型使用存在一些困惑，因为基本上有两种选择。


  *   CDI 作为所有其他规范的统一门面

  *   CDI 作为所有其他规范构建的核心


  最初，各方对采用哪种方法几乎没有达成共识，一些人继续将 CDI 视为另一种类型的 EJB，并为其添加了诸如 Servlet 规范所拥有的类型的内置 Bean（例如
  `HttpServletRequest`），而不是说服 Servlet 规范将其包含进来。


  然而，在 Java EE 7 和 CDI 1.1 的开发过程中，人们逐渐认识到，将 CDI 变成另一个 EJB 是错误的做法。Java EE 中大量与 CDI
  相关的工作开始将 CDI 视为一种统一 Java EE 组件模型并围绕它对齐各规范，最终形成一个更一致平台的方式。具体来说，在 Java EE 7 中，当 Java
  EE 的旗舰特性——声明式事务——基于 CDI 构建并交由 JTA 规范管理时，一个里程碑达成了。这一里程碑的重要性在于，它表明一个底层规范可以基于 CDI 提供上下文和拦截器，而无需自身支持所有可能的
  CDI 实现（得益于可移植扩展），无需自身基于 CDI，也无需 CDI 为此专门添加任何内容。（这些在某个时间点都曾被用作反对某些规范采用 CDI 的理由。）


  为了演示，我们将展示 Payara 的 JTA 实现中使用的代码片段。


  拦截器本身（略有删减）如下所示：


  ```

  /**

  * Transactional annotation Interceptor class for Mandatory transaction type, ie

  * javax.transaction.Transactional.TxType.MANDATORY If called outside a transaction
  context,

  * TransactionRequiredException will be thrown If called inside a transaction context,
  managed bean

  * method execution will then continue under that context.

  * @author Paul Parkinson

  */

  @Priority(PLATFORM_BEFORE + 200)

  @Interceptor

  @Transactional(MANDATORY)

  public class TransactionalInterceptorMandatory extends TransactionalInterceptorBase
  {

  @AroundInvoke

  public Object transactional(InvocationContext ctx) throws Exception {

  if (isLifeCycleMethod(ctx)) {

  return proceed(ctx);

  }

  setTransactionalTransactionOperationsManger(false);

  try {

  if (getTransactionManager().getTransaction() == null) {

  throw new TransactionalException(

  "... from TxType.MANDATORY transactional interceptor.",

  new TransactionRequiredException(

  "Managed bean with Transactional annotation and TxType of " +

  "MANDATORY called outside of a transaction context"));

  }

  return proceed(ctx);

  } finally {

  resetTransactionOperationsManager();

  }

  }

  }

  ```


  然后，使用可移植扩展将此拦截器添加到 CDI 运行时，如下所示：


  ```

  /**

  * The CDI Portable Extension for @Transactional.

  */

  public class TransactionalExtension implements Extension {

  public void beforeBeanDiscovery(@Observes BeforeBeanDiscovery beforeBeanDiscoveryEvent,
  BeanManager beanManager) {

  AnnotatedType timat =

  beanManager.createAnnotatedType(TransactionalInterceptorMandatory.class);

  beforeBeanDiscoveryEvent.addAnnotatedType(

  timat,

  TransactionalInterceptorMandatory.class.getName());

  // ...

  }

  }

  ```


  这段代码基本上就是一个底层规范使其服务或工件可通过 CDI 进行消费所需的一切。


  除了 JTA，JSF 在 Java EE 7 中通过与 CDI 集成，提供了 CDI 兼容的 `@ViewScoped`，其方式与 JTA 集成 CDI 的方式大致相同，同时还提供了一个新的作用域
  `@FlowScoped`，该作用域仅通过 CDI 作用域提供。此外，JMS 2 API 和 BeanValidation 也提供了 CDI 支持。


  当时的希望（部分也是计划）是 Java EE 8 能在基于 CDI 方面迈出非常大的步伐，但部分由于 Java EE 连续性方面的困难（参见第 1 章），这并未完全实现。例如，JMS
  2.1 原本计划引入 CDI Bean 作为一等消息监听器（除了消息驱动 Bean 和 Java SE 程序化监听器之外），并且有许多关于将 EJB 的其他优秀特性（如
  `@Asynchronous` 和 `@Timeout`）基于 CDI 的讨论。正在开发中的 Java 身份标识 API（JSR 351）也计划使用 CDI。


  尽管这一切并未发生，但像 JSF 这样的社区驱动规范确实推动了基于 CDI 这一主题的发展，而同样是社区驱动的新 EE Security API 甚至从一开始就完全基于
  CDI。


  至于平台的下一个修订版，在撰写本文时，正在起草计划，让 JSF 完全放弃其自身的托管 Bean 系统（该系统已在 JSF 2.3/Java EE 8 中弃用），并让
  JAX-RS 弃用其自身的组件类型和基于 `@Context` 的依赖注入，转而使用 CDI。其他计划还包括 EE Concurrency 规范采用前面提到的
  `@Asynchronous` 和 `@Timeout` 注解的 CDI 版本等。




  ## 平台内部使用 CDI 的优势


  你之前看到的一些组件模型仅面向用户，这意味着只有用户应用程序基于它们构建逻辑，而平台内部并不使用它们。此类面向用户的模型示例包括 JSF 的托管 bean 和
  EJB bean。


  然而，CDI 既面向用户也面向系统（平台），这意味着平台可以（甚至被鼓励）使用与用户代码相同的 API。这样做有什么优势呢？在本节中，我们将逐一探讨。


  对用户而言，平台内部使用 CDI 的优势在于 CDI 非常动态。Bean 及其方法可以被拦截器和装饰器包装，你可以通过可移植扩展以编程方式为它们添加这些功能。你还可以通过提供替代方案来完全替换
  bean，或者否决它们。


  这种动态特性意味着平台本身变得更具可编程性，并且许多类型的平台行为会自动变得可插拔和可扩展。例如，在 EE Security 中存在一个名为 `IdentityStoreHandler`
  的组件，它决定了多个身份存储如何被调用。（身份存储是平台用于验证所提供凭据的用户/凭据数据库。）默认情况下，平台会按顺序调用它们，直到其中一个成功验证，这对大多数应用程序来说没问题，但有时需要不同的行为，例如确保所有身份存储都成功验证，而不仅仅是单个存储。由于
  `IdentityStoreHandler` 内部是一个 CDI bean，因此可以使用用户已经熟悉的 API，通过用户代码（无论是应用程序代码还是来自库的代码）对其进行装饰或替换。


  以下是一个来自 EE Security 的 Soteria 实现的简化示例，展示了如何从应用程序中替换该处理程序：


  ```

  @Alternative

  @Priority(APPLICATION)

  @ApplicationScoped

  public class CustomIdentityStoreHandler implements IdentityStoreHandler {

  @Override

  public CredentialValidationResult validate(Credential credential) {

  CredentialValidationResult validationResult = null;

  // 检查所有存储，当其中一个验证失败时中止

  for (IdentityStore authenticationIdentityStore : validatingIdentityStores) {

  CredentialValidationResult temp = authenticationIdentityStore.validate(credential);

  switch (temp.getStatus()) {

  case NOT_VALIDATED:

  break; // 不做任何操作

  case INVALID:

  return temp; // 一个失败即全部失败

  case VALID:

  validationResult = temp;

  }

  }

  if (validationResult == null) {

  return INVALID_RESULT; // 没有一个验证成功

  }

  return validationResult; // 返回最后一个存储的有效结果

  }

  }

  ```


  前面示例中使用的 EE Security API 的确切语义超出了本书的范围，但这里重要的是，它展示了使用标准 CDI 原语替换框架行为的简洁性和优雅性。


  总而言之，平台对内部构件使用 CDI 的优势如下：


  *   你可以修改平台行为（历史上并非所有规范都费心创建自己的插件系统）。


  *   用户无需学习任何新的 API 或配置格式。


  *   平台的规范/API 设计者和实现者无需定义和实现另一个专有的工厂机制和/或部署描述符来支持行为插件。


  '
- '# 3. 识别 Bean


  CDI 的核心职责之一是提供依赖项，即 CDI 中的 bean。正如你在前一章所学，可以通过多种方式获取此类 bean，即通过某种方式注入它们或通过编程式查找。获取
  bean 的一个重要方面是，你需要一种方法来指定你想要哪个 bean。换句话说，你需要能够识别 bean。这引出了以下问题：bean 如何变得可识别，以及如何确保其他人可以引用你的
  bean？CDI 中如何实现这一点是本章的主题。




  ## 什么是 Bean？


  在上一章中，我们提到 CDI 中的一个组件被称为 *bean*。但究竟什么才构成一个 bean？Java 有 JavaBean 的概念，通常也被简称为 bean，但
  CDI 中的 bean 要抽象得多。


  从技术上讲，CDI 中的 bean 是指任何可以由 `javax.enterprise.inject.spi.Bean<T>` 实例表示的东西。这是一个内部但用户可访问的元数据结构，CDI
  为其所知的每个 bean 在内部存储该结构。该结构包含核心工厂方法 `T create()`，用于实际创建 bean 的实例。正如你将在第 4 章中看到的，CDI
  通常不会直接调用此工厂方法，而是通过一个上下文相关的“缓存层”以受控方式调用。`Bean<T>` 结构还保存了所谓的核心 bean 属性。


  *   类型

  *   限定符

  *   名称

  *   作用域

  *   原型

  *   替代（一个布尔值，表示该 bean 是替代 bean）


  类型、限定符和名称将在本章中解释。作用域将在下一章中解释。


  应用程序可以为每个 bean 实现 `Bean<T>` 接口，但并非必须如此。实际上，这样做相当罕见，因为 CDI 实现可以从另外三种更易于使用的工件生成 `Bean<T>`
  实现。


  *   托管 bean

  *   生产者方法

  *   生产者字段


  托管 bean 本身由略显晦涩的托管 bean 规范定义，该规范是 Java EE 总括规范的一部分。它甚至有自己的注解 `javax.annotation.ManagedBean`，该注解位于另一个规范（即公共注解规范）中，并且与关键的
  CDI 注解 `@PostConstruct` 和 `@PreDestroy` 相邻。


  托管 bean 是大多数人会随意联想到的“CDI bean”。它就是一个最接近 JavaBean 或 JSF 托管 bean 的 Java 类（也称为 *bean
  类*）。不过，存在一些限制；例如，内部类或抽象类不能作为托管 bean，并且 bean 类必须具有无参构造函数或单个可注入的构造函数。原因很简单：CDI 必须能够创建该类的实例。显然，抽象类无法实例化，带有
  CDI 不知道如何提供参数的构造函数的类也无法实例化。


  由于 CDI 从 bean 类创建 `Bean<T>` 结构，并且 `Bean<T>` 有一个返回该类实例的 `create()` 方法，因此可以说 bean
  类实际上是其自身类型的工厂。


  `Bean<T>` 实例也可以由 CDI 从某种更接近 `Bean<T>` 类型的东西创建，即从生产者方法创建。生产者方法是 bean 类中带有 `@Produces`
  注解的方法。乍一看，它类似于 `Bean<T>` 的 `T create()` 方法，但生产者方法是一个更高级别的工件，支持注解和方法注入，而 `T create()`
  处于较低级别，不支持这些功能。至于限制，生产者方法显然不能是抽象的（毕竟 CDI 运行时必须调用它），并且如果返回类型是泛型，则必须具有实际的类型参数（不允许通配符，并且仅在下一章讨论的特殊情况下允许类型变量）。


  最后，还有生产者字段，它是 bean 类中带有 `@Produces` 注解的实例变量。此类实例变量通常应在初始化时立即赋值，然后 CDI 将使用此实例字段的值作为前述
  `Bean<T>` 实例的 `T create()` 方法的返回值。


  我们在此省略了两种特殊的 bean 情况：拦截器和装饰器，它们实际上是 `Bean<T>` 的子类型。我们将在第 6 章中深入讨论它们。


  直接创建 `Bean<T>` 实例（而不是让 CDI 为你创建）将在第 8 章中讨论。


  ## 如何识别 Bean？


  我们将首先解释如何使用与 bean 标识相关的不同术语。与第 2 章中的术语 *组件* 一样，我们不声称这些是规范定义，不同的作者可能会略有不同地使用它们。所谓
  *获取*，是指代码想要使用一个 bean 并获取该 bean 的一般行为。通过 *引用* 其标识来获取 bean，这意味着该标识以某种方式提供给运行时。所谓 bean
  的 *标识*，我们指的是一个或多个 bean 属性的唯一组合，你可以使用它让运行时找到这个 bean。就像安全中的主体（例如全名或社会安全号码）一样，一个 bean
  可以有多个标识。运行时查找 bean 的过程称为 *解析*，这意味着将给定的标识与实际的 bean 实例进行匹配。


  在 CDI 中，有几种方法可以引用一个 bean 甚至一组 bean。有些方法重叠，有些则相互补充。以下列表给出了概述：


  *   按类型

  *   按类型和限定符

  *   按名称（表达式语言限制）


  我们将在以下各节中更详细地讨论每个选项。




  ### 按类型划分


  CDI 的核心概念之一是类型安全解析。在 Java EE 中，这使 CDI 区别于 JSF 和早期版本的 EJB，后两者都为 CDI 贡献了设计思路（参见第 1
  章）。虽然使用 EJB 3 可以通过 `@EJB` 注解在一定程度上实现类型安全注入，但 CDI 将这一概念推向了更深的层次，并将其作为核心原则内置于其架构中。


  类型安全解析基于这样一个事实：Bean 的主要标识符就是它的某个类或接口。


  例如，考虑以下简单的 Bean：


  ```

  public class SomeCDIBean {

  }

  ```


  在这种情况下，该 Bean 有两个可用于引用它的类型：`SomeCDIBean.class` 和 `Object.class`。后者显然过于通用，在实践中作为标识符用处不大。


  现在考虑以下类型：


  ```

  public interface SomeInterface {

  }

  public class SomeBaseBean implements SomeInterface {

  }

  public class SomeCDIBean extends SomeBaseBean {

  }

  ```


  现在 `SomeCDIBean` 有四个可用于引用它的类型：与之前相同的 `SomeCDIBean.class` 和 `Object.class`，但现在还多了
  `SomeBaseBean.class` 和 `SomeInterface.class`。基本上，你可以使用其中任何一个类型来获取该 Bean 的实例。如果你想要一个唯一的实例，显然需要使用一个唯一的标识符。这反过来意味着，你需要基于接口
  `SomeInterface` 来获取一个 Bean；并且只能有一个启用的 Bean 实现了该接口。这有时被称为*高地人规则*（只能有一个）。


  现在，细心的读者可能会想，如果一个接口只允许被实现一次，那么它的用途到底是什么？答案在于一个微妙之处：这里限制的实际重点是，只允许一个“已启用”的 Bean 实现所述接口。已启用的
  Bean 是指未被禁用、且未被另一个 Bean（通过我们将在本章后面讨论的“替代”概念）“覆盖”的 Bean。简单来说，它就是 CDI 会选择提供的那个 Bean。


  此外，你不能直接使用 `SomeBaseBean.class` 而不附带任何条件来获取 `SomeCDIBean` 的唯一实例，因为显然这个标识符也被 `SomeBaseBean`
  使用了。我们稍后会解释如何处理这个问题。


  另一个 Bean 可以通过注入的方式，并利用注入点的类型作为向运行时传递所请求 Bean 标识的手段，来获取对 `SomeCDIBean` 的引用，如下例所示：


  ```

  public class AnotherBean {

  @Inject

  SomeCDIBean bean;

  }

  public class AnotherBean {

  @Inject

  SomeInterface bean;

  }

  ```


  同样的事情也可以通过编程方式完成，无论是从 Bean 内部还是从非 Bean 的类中。请注意，当一个类不是 Bean 时，你必须处于 CDI 已初始化且该 Bean
  的作用域处于活动状态的上下文中。这种上下文的初始化在很大程度上依赖于具体实现，但简单实际地说，这意味着处于一个“CDI 能工作”的线程中。作用域将在下一章中详细讨论。


  以下是一些执行此操作的示例。请注意，在编程示例中，请求代码字面上将所请求 Bean 的标识传递给运行时，这一点可能更为明显。


  ```

  SomeCDIBean bean = CDI.current().select(SomeCDIBean.class).get();

  SomeInterface bean = CDI.current().select(SomeInterface.class).get();

  ```


  在许多服务查找系统或 API 中，服务对其选择公开的标识拥有完全或至少部分控制权。在 CDI 中，此标识主要来自给定 Bean 的所有类型（其自身类型及其所有祖先类型，也称为其*传递闭包*）。你是否应该仅仅为了影响哪些类型成为其标识符而更改
  Bean 的类型层次结构？这在所有情况下都可能实现吗？


  答案是否定的。你不需要这样做。CDI 有一种机制，可以通过 `@Typed` 注解显式设置 Bean 作为其标识发布的类型。当然，这些类型必须是该 Bean 类型传递闭包中实际存在的类型。


  对于前面展示的 `SomeCDIBean` 示例，你可以针对两种不同的用例使用 `@Typed`。


  第一种情况是，例如，你想在库中发布 `SomeCDIBean`，但只向外界暴露其接口，将实现作为库的私有细节。在这种情况下，你可以像下面这样用 `@Typed`
  注解 `SomeCDIBean`：


  ```

  @Typed(SomeInterface.class)

  public class SomeCDIBean extends SomeBaseBean {

  }

  ```


  按照这个 `SomeCDIBean` 的定义，只有 `SomeInterface.class` 以及作为特例的 `Object.class` 可以用来引用该 Bean（`Object.class`
  不能通过这种方式从标识列表中删除）。


  第二种示例情况是，你想通过编程方式选择为 `SomeInterface.class` 标识提供哪个 Bean，也许是通过生产者。那么该生产者应该唯一对应这个标识，这意味着
  `SomeCDIBean` 本身不应该对应。实现此目的的方法之一是再次使用 `@Typed`，这次是从标识列表中移除该接口。


  ```

  @Typed(SomeCDIBean.class)

  public class SomeCDIBean extends SomeBaseBean {

  }

  ```


  按照这个定义，只有 `SomeCDIBean.class` 可以用来引用 `SomeCDIBean`（同样还有 `Object.class`）。


  这意味着你现在可以像下面这样创建一个生产者：


  ```

  public class SomeProducer {

  @Inject

  SomeCDIBean someCDIBean;

  @Inject

  SomeOtherCDIBean someOtherCDIBean;

  @Produces

  public SomeInterface produce() {

  if (...){

  return someCDIBean;

  }

  return someOtherCDIBean;

  }

  }

  ```


  在前面的例子中，生产者注入了两个 Bean，它们都实现了 `SomeInterface`，但它们的标识符中都不包含 `SomeInterface.class`，因此不会与生产者的标识符冲突。根据某个条件，返回其中一个注入的
  Bean。


  实际上，应用程序中其他地方执行 `@Inject SomeInterface` 的代码将获得由 `SomeCDIBean` 或 `SomeOtherCDIBean`
  提供的实现。




  ### 按类型和限定符


  限定符最初在 CDI 中被称为*绑定注解*（`@BindingType`）（参见第 1 章），它是一种扩展 Bean 标识符的方式，使其不仅限于类型。严格来说，限定符（如
  `@Inject` 注解）并不属于 CDI 本身，而是位于 AtInject（JSR 330）规范中。然而，与 `@Inject` 一样，限定符是 CDI 的绝对核心，CDI
  甚至为其添加了自身的行为。


  限定符是一种注解，因此其本身是类型安全的。限定符注解可以有零个或多个属性，默认情况下每个属性的值都会增加 Bean 的标识符。此外，限定符可以包含不计入 Bean
  标识符的可选属性。这些属性必须使用 `@NonBinding` 进行注解，这是一个 CDI 注解，因此是 CDI 特有的。请注意，旧的 CDI 特定名称 `@BindingType`
  与 `@NonBinding` 之间的相似性，这很可能并非巧合。


  在定义中，Bean 可以添加零个或多个限定符来扩展其标识符，每个限定符可以有零个或多个（绑定）属性。


  因此，Bean 的完整标识符变为：“其类型之一 + 其所有限定符的所有类型 + 其所有限定符的绑定属性值。”


  例如，再次考虑 `SomeCDIBean`，但现在它带有两个没有属性的限定符，如下所示：


  ```

  @SomeQualifierOne @SomeQualifierTwo

  public class SomeCDIBean extends SomeBaseBean {

  }

  ```


  根据该定义，此 Bean 的标识符之一现在是 [`SomeInterface.class, @SomeQualifierOne, @SomeQualifierTwo`]。


  另一个 Bean 可以通过注入的方式获取对 `SomeCDIBean` 的引用，并使用带有所有限定符注解的注入点类型，将所需 Bean 的标识符传递给运行时，如下例所示：


  ```

  public class AnotherBean {

  @Inject

  @SomeQualifierOne @SomeQualifierTwo

  SomeInterface bean;

  }

  ```


  同样的事情也可以通过编程方式完成。以下是一个示例。请注意，在 Java 中，注解本身之外没有用于注解字面量的语法。因此，您必须自己创建这样一个注解实例，这不幸地需要一些工作。CDI
  提供了 `AnnotationLiteral` 来帮助解决这个问题。这是通过以特定方式继承 `AnnotationLiteral` 来实现的。对于 `SomeQualifierOne`
  限定符，如下所示：


  ```

  class SomeQualifierOneLiteral

  extends AnnotationLiteral

  implements SomeQualifierOne {

  private static final long serialVersionUID = 1L;

  }

  ```


  由于在每个项目中为每个限定符执行此操作仍然是大量重复性工作，CDI 鼓励一种约定：对于没有属性的限定符，在其内部定义一个名为 `Literal` 的类，该类包含一个名为
  `INSTANCE` 的静态成员，用于保存其外部类注解的预构建注解实例。对于 `SomeQualifierOne`，如下所示：


  ```

  @Qualifier

  @Retention(RUNTIME)

  @Target({ TYPE, METHOD, FIELD, PARAMETER })

  @Documented

  public @interface SomeQualifierOne {

  public static final class Literal

  extends AnnotationLiteral

  implements SomeQualifierOne {

  private static final long serialVersionUID = 1L;

  public static final Literal INSTANCE = new Literal();

  }

  }

  ```


  有了这个，并假设 `SomeQualifierTwo` 有类似的定义，您现在可以通过编程方式请求 `SomeCDIBean` 的实例，如下所示：


  ```

  SomeCDIBean bean =

  CDI.current()

  .select(

  SomeCDIBean.class,

  SomeQualifierOne.Literal.INSTANCE,

  SomeQualifierTwo.Literal.INSTANCE

  )

  .get();

  SomeInterface bean =

  CDI.current()

  .select(

  SomeInterface.class,

  SomeQualifierOne.Literal.INSTANCE,

  SomeQualifierTwo.Literal.INSTANCE

  )

  .get();

  ```


  到目前为止，您一直在研究没有属性的限定符。如前所述，限定符也可以有属性，这些属性有助于标识符的构成。但是，您必须意识到，使用属性不一定是类型安全的，因为您可以使用例如基于字符串的属性，这些属性容易发生输入错误。


  对于带有属性的限定符，为其关联的字面量设置一个 `INSTANCE` 的简单约定当然是不够的，因为您需要以某种方式提供属性的值。如果某些（绑定）属性没有默认值，那么提供
  `INSTANCE` 也没有太大意义，因为您必须提供默认值。这些默认值可能毫无意义或不清楚。不过，CDI 对此也有一个约定，那就是在同一个内部 `Literal`
  类中提供一个名为 `of` 的静态工厂方法。


  在下面的示例中，您添加了一个基于 `enum` 的属性，演示了这一点：


  ```

  @Qualifier

  @Retention(RUNTIME)

  @Target({ TYPE, METHOD, FIELD, PARAMETER })

  @Documented

  public @interface SomeQualifierOne {

  TimeUnit value() default DAYS;

  public static final class Literal

  extends AnnotationLiteral

  implements SomeQualifierOne {

  private static final long serialVersionUID = 1L;

  public static final Literal INSTANCE = of(DAYS);

  private final TimeUnit value;

  public static Literal of(TimeUnit value) {

  return new Literal(value);

  }

  private Literal(TimeUnit value) {

  this.value = value;

  }

  public TimeUnit value() {

  return value;

  }

  }

  }

  ```


  在这个例子中，单个属性（`value`）有一个默认值（`DAYS`），因此您可以在此处创建一个 `INSTANCE`。如果没有这样的默认值，您只需省略它，只提供
  `of` 方法。这里使用的模式基本上适用于所有限定符；静态 `of` 方法接受所有限定符属性的值，并使用这些值调用私有构造函数。私有构造函数为每个注解属性设置一个
  final 实例变量，并且与属性同名的 getter 风格方法返回这些值。


  有了这个限定符，Bean 的定义现在可以如下所示：


  ```

  @SomeQualifierOne(HOURS) @SomeQualifierTwo

  public class SomeCDIBean extends SomeBaseBean {

  }

  ```


  您可以使用以下代码通过注入请求此 Bean 的实例：


  ```

  public class AnotherBean {

  @Inject

  @SomeQualifierOne(HOURS)

  @SomeQualifierTwo

  SomeInterface bean;

  }

  ```


  以下是编程方式：


  ```

  SomeInterface bean =

  CDI.current()

  .select(

  SomeInterface.class,

  SomeQualifierOne.Literal.of(HOURS),

  SomeQualifierTwo.Literal.INSTANCE

  )

  .get();

  ```


  请注意，要使运行时解析正常工作（即找到正确的 Bean），属性值*必须*完全匹配，并且如果有多个属性，它们都必须完全匹配。但是，您可以在属性中提供额外的信息，这些信息完全不用于解析。这样的属性必须使用
  `@NonBinding` 注解进行注解。这些额外信息随后可以被使用，例如，由生产者以某种动态和自定义的方式使用。


  以下是如何首先使用新的非绑定属性扩展您的限定符：


  ```

  @Qualifier

  @Retention(RUNTIME)

  @Target({ TYPE, METHOD, FIELD, PARAMETER })

  @Documented

  public @interface SomeQualifierOne {

  TimeUnit value() default DAYS;

  @Nonbinding String key() default "";

  public static final class Literal

  extends AnnotationLiteral

  implements SomeQualifierOne {

  private static final long serialVersionUID = 1L;

  public static final Literal INSTANCE = of(DAYS, "");

  private final TimeUnit value;

  private final String key;

  public static Literal of(TimeUnit value, String key) {

  return new Literal(value, key);

  }

  private Literal(TimeUnit value, String key) {

  this.value = value;

  this.key = key;

  }

  public TimeUnit value() {

  return value;

  }

  public String key() {

  return key;

  }

  }

  }

  ```




  如您所见，我们新增了一个名为 `key` 的属性，该属性带有 `@NonBinding` 注解。这个相同的属性也必须添加到内部类 `Literal` 中。有了这个限定符，您现在可以定义以下生产者，利用这些额外信息：


  ```

  public class SomeProducer {

  @Inject

  SomeCDIBean someCDIBean;

  @Produces

  @SomeQualifierOne(HOURS) @SomeQualifierTwo

  public SomeInterface produce(InjectionPoint injectionPoint) {

  String key =

  injectionPoint.getAnnotated()

  .getAnnotation(SomeQualifierOne.class)

  .key();

  if (key == ..) {

  // 使用 someCDIBean 执行特殊操作

  }

  return someCDIBean;

  }

  }

  ```


  为清晰起见，在 `@SomeQualifierOne` 注解中，我们并未为 `key` 属性提供显式值。这样做是为了强调它不参与解析过程。不过，如果我们为 `key`
  提供了值，运行时也会简单地忽略它（就像现在忽略默认值 `""` 一样）。


  获取这些额外信息确实暴露了 CDI 的一个弱点；没有通用的方法可以获取用于解析的注解引用（稍后讨论拦截器时，您会看到类似的问题）。不过，您可以做的是注入一个所谓的
  `InjectionPoint` 实例。回顾第 2 章，这是方法注入的一个示例，您无需使用任何 `@Inject` 注解；生产者中的每个额外参数都由 CDI 在此处提供。


  `InjectionPoint` 表示使用 `@Inject` 注解的位置，并包含所有元数据，例如发生注入的方法或字段的名称、其注解等。在这种情况下，您需要的是注解，这些注解最容易从
  `"javax.enterprise.inject.spi.Annotated"` 获取，该对象表示注解所在的实体。


  您可能会质疑，如果您使用 `InjectionPoint` 来获取注解，那么当您以编程方式查找 bean 时，这又如何工作呢？当然，在这种情况下没有注入点。一个有点令人失望的答案是，它不适用于编程式查找。因此，通过注入和通过查找检索
  bean 并不完全对称。这是 CDI API 中的一个限制，或者说是一个疏忽，它最初主要关注声明式注入，而对编程式查找关注较少。


  然而，当确实使用注入时，事情就很简单了，如下所示：


  ```

  public class AnotherBean {

  @Inject

  @SomeQualifierOne(value = HOURS, key = "test")

  @SomeQualifierTwo

  SomeInterface bean;

  }

  ```


  `SomeInterface.class`、`SomeQualifierOne.class`、`SomeQualifierTwo.class` 和 `SomeQualifierOne.value
  == HOURS` 都用于解析，而 `key == "test"` 则作为额外信息存在。


  #### 为什么实际上需要限定符？


  尽管您已经看到了各种示例，但一个核心问题仍未得到解答；我们首先为什么需要限定符，为什么不能仅仅使用额外的接口来表达相同的事情？


  首先，让我们看一个常用于解释限定符的示例：接口的使用，以及希望拥有特定实现的愿望。


  例如，考虑一个用于执行任务的接口，如下所示：


  ```

  public interface JobExecutor {

  void executeJob(Job job);

  }

  ```


  现在假设您有两个此接口的实现——一个并行工作的任务执行器和一个顺序工作的任务执行器。


  ```

  public class ParallelJobExecutor implements JobExecutor {

  public void executeJob(Job job) {

  // ...

  }

  }

  public class SequentialJobExecutor implements JobExecutor {

  public void executeJob(Job job) {

  // ...

  }

  }

  ```


  现在假设一个 bean 想要使用并行或顺序执行器（甚至可能两者都用）。这该如何实现？这就是通常引入限定符的地方，例如，您可以有一个 `@Parallel` 限定符和一个
  `@Sequential` 限定符。


  ```

  @Parallel

  public class ParallelJobExecutor implements JobExecutor {

  public void executeJob(Job job) {

  // ...

  }

  }

  @Sequential

  public class SequentialJobExecutor implements JobExecutor {

  public void executeJob(Job job) {

  // ...

  }

  }

  ```


  现在，一个 bean 可以像往常一样获取对其中任何一个的引用，如下所示：


  ```

  public class AnotherBean {

  @Inject

  @Parallel

  JobExecutor executor;

  }

  ```


  然而，这里最大的问题是，为什么我们不直接注入 `ParallelJobExecutor` 而不是 `@Parallel JobExecutor`？


  虽然在这个简单的情况下我们当然可以这样做，但在实践中，这可能意味着定义好的公共 API 和实现 jar 之间的区别。在这种情况下，`@Parallel`、`@Sequential`
  和 `interface JobExecutor` 将是公共 API 中的类型，而 `ParallelJobExecutor` 和 `SequentialJobExecutor`
  则是实现 jar 中的类型。


  通常，应用程序应仅依赖于公共 API 中的类型，而不应依赖于实现中的私有类型。遵循这一通用规则意味着您可以轻松地将实现 jar 切换到另一个实现，而无需更改应用程序的代码。


  这一点在图 3-1 中进行了说明。


  ![../images/454458_1_En_3_Chapter/454458_1_En_3_Fig1_HTML.png](img/454458_1_En_3_Fig1_HTML.png)


  图 3-1


  具有多个实现的公共 API


  您可能还会问自己另一个问题，为什么不直接使用额外的接口来代替那些额外的限定符呢？例如，前面提到的 API 可以定义两个这样的接口：


  ```

  public interface ParallelJobExecutor extends JobExecutor {

  }

  public interface SequentialJobExecutor extends JobExecutor {

  }

  ```


  然后，每个（私有）实现可以实现这些接口之一，并且注入点和查找甚至会更简单，因为它们只需要引用那个单一的接口，而不是接口加限定符。换句话说，它将变成这样：


  ```

  JobExecutor executor =

  CDI.current()

  .select(

  ParallelJobExecutor.class

  )

  .get();

  ```


  而不是这样：


  ```

  JobExecutor executor =

  CDI.current()

  .select(

  JobExecutor.class,

  Parallel.Literal.INSTANCE

  )

  .get();

  ```


  虽然这当然可以完成任务，但一个没有方法的接口（称为*标记接口*）通常不太受欢迎。完整的讨论超出了本书的范围，但简而言之，事实是标记接口将接口的用途（即声明类支持的操作）与未通过这些操作表达的隐式契约混为一谈。




  在这个特定示例中，倾向于使用限定符的另一个原因是，如你之前所见，可以在限定符中提供额外数据。以`@Parallel`注解为例，你可以利用它来配置一些执行设置：


  ```

  public class AnotherBean {

  @Inject

  @Parallel(minTheads=1, maxThreads=10)

  JobExecutor executor;

  }

  ```


  如果不使用限定符，而纯粹依赖类型，那么处理配置类型数据的变通方法，例如，可以是注入一个工厂类型，在其上设置配置参数，然后从中获取你的 bean。在某些情况下，注入的
  bean 可能支持配置设置。


  以下是使用工厂的一个示例：


  ```

  public class AnotherBean {

  @Inject

  JobExecutorFactory executorFactory;

  JobExecutor executor;

  @PostConstruct

  public void init() {

  executor = executorFactory.create(1, 10);

  }

  }

  ```


  这个示例使用了一个支持后创建初始化的 bean：


  ```

  public class AnotherBean {

  @Inject

  JobExecutor executor;

  @PostConstruct

  public void init() {

  executor.setMinThreads(1);

  executor.setMaxThreads(10);

  }

  }

  ```


  可以说，在限定符中使用配置数据是一种更清晰的方法，并且使你无需了解背后使用工厂的生产者，也无需在创建 bean 时或之后对其进行配置。


  当需要组合多个限定符时，限定符也更具优势。例如，假设除了互斥的`@Parallel/@Sequential`之外，你还有一个`@Local/@Remote`注解用于在本地或远程服务器上严格执行作业，以及一个`@Stateful/@Stateless`注解用于持久化或不持久化作业进度的执行器。


  使用限定符，你可以请求一个`@Parallel @Remote @Stateful` *或* `@Parallel @Local @Stateful` 等组合的
  bean。为每一种可能的组合创建（标记）接口会变得相当繁琐且看起来别扭。


  ```

  interface ParallelLocalStatefulJobExecutor extends JobExecutor {}

  interface ParallelRemoteStatefulJobExecutor extends JobExecutor {}

  interface ParallelLocalStatelessJobExecutor extends JobExecutor {}

  interface ParallelRemoteStatelessJobExecutor extends JobExecutor {}

  interface SequentialLocalStatefulJobExecutor extends JobExecutor {}

  interface SequentialRemoteStatefulJobExecutor extends JobExecutor {}

  interface SequentialkLocalStatelessJobExecutor extends JobExecutor {}

  interface SequentialRemoteStatelessJobExecutor extends JobExecutor {}

  ```


  不过请注意，尽管在 CDI 中可以使用多个限定符，但在实践中不应过度使用，因为这仍然会使代码看起来密集且难以使用。遗憾的是，CDI 中没有一种易于使用的机制来将多个限定符合并为一个。CDI
  确实有一个有限的选项来组合（主要是）拦截器绑定注解（称为`StereoTypes`），我们稍后会介绍。


  限定符特别有用甚至不可避免的一种情况是，当生产者生成它们（或它们所属的库）不拥有的（通用）类型时。例如，JSF 显然不拥有 Java SE 的`Map`类型，因此它附带的任何生成此类型的产品者几乎都必须使用限定符，以避免与生成相同类型的其他生产者（甚至包括它自己的生产者）产生歧义。例如，JSF
  允许你注入所谓的标头映射和请求参数映射，它们分别包含 HTTP 请求标头和 HTTP 请求参数。两者都是`Map`（具体来说是`Map<String, String>`），因此
  JSF 为它们使用了限定符。以下是此情况的一个示例：


  ```

  public class AnotherBean {

  @Inject

  @HeaderMap

  Map headers;

  @Inject

  @RequestParameterMap

  Map parameters;

  }

  ```


  如果不使用此处使用的限定符，你会遇到某种歧义解析异常。


  对于库或组件编写者来说，限定符的另一个用途是使用“内部生产者”。在这种情况下，生产者（甚至可能是 bean）使用私有限定符（例如，具有默认访问权限的限定符，即“包私有”）进行限定。使用此类私有限定符时，客户端代码意外使用内部生产者的风险会大大降低。




  ### 按名称


  除了由一种类型和零个或多个限定符构成的`typesafe`标识符外，CDI 中的 Bean 还有另一个可选的并行标识符：一个基于扁平字符串的名称。此名称完全可选，Bean
  并非必须拥有它。此外，该名称可以完全独立于主标识符，并且可以根据需要简单或复杂，尽管存在某些限制。


  扁平名称并非用于常规用途，而是用于与基于字符串的环境集成，在 Java EE 中则专门用于与平台的表达式语言（EL）集成。实际上，大多数情况下，你可以将“bean
  名称”理解为“EL 名称”。


  先前对名称的限制进一步强化了 Bean 名称作为表达式语言名称的特性，因为 Bean 名称至少必须是一个有效的表达式语言名称。此外，它可以是多个有效表达式语言标识符的拼接，中间用句点分隔。然而，在实践中，这种伪命名空间的名称并不被鼓励，因为在实际的表达式语言中使用时可能会造成混淆。


  对于 Bean 类和生产者方法，Bean 名称是通过一个内置限定符 `@Named` 的某种特殊用法来设置的。这种用法很特殊，因为尽管它是一个真正的限定符注解，但实际上并不作为真正的限定符使用。它主要提供一种设置
  Bean 名称的机制，该机制被 CDI 运行时特别识别。通常，在设计 API 时，你会尽量避免赋予事物隐含的次要或硬编码语义，但这显然并不总是容易做到，最初的
  CDI 设计者可能不得不在某种程度上做出妥协。不过，在元数据结构 `javax.enterprise.inject.spi.Bean<T>` 中，通过其超接口
  `BeanAttributes`，Bean 名称确实拥有自己的属性，即只读的“name”属性（通过 `getName()` getter 方法获取）。


  使用这个“伪”限定符时，你可以自己提供名称，也可以使用默认名称。当应用于 Bean 类时，默认名称是将简单类名的首字母小写。例如，对于 `com.example.Foo`，使用不带属性的
  `@Named` 时，默认 Bean 名称是 `foo`。当应用于生产者方法时，默认名称就是方法名本身，除非方法名以 `get` 开头，在这种情况下，Bean
  名称是去掉 `get` 并将首字母小写后的方法名。例如，对于 `public Foo getFoo()`，默认名称将是 `foo`；而对于 `public Foo
  produceFoo()`，默认名称则是 `produceFoo`。


  以下是将 `@Named` 应用于 Bean 类的示例：


  ```

  @Named

  public class SomeCDIBean {

  }

  ```


  以及应用于生产者方法的示例：


  ```

  public class SomeProducer {

  @Produces

  @Named("someInterface")

  public SomeInterface produce() {

  // ...

  }

  }

  ```


  在已定义 EL 到 CDI Bean 解析为激活状态的上下文中（例如在 JSF 和 EE Security 中），可以使用这些名称通过表达式语言检索 Bean。也可以直接通过表达式语言
  API，使用从 `BeanManager` 获取的 `ELResolver` 来检索 Bean。


  以下示例演示了后者：


  ```

  public class SomeCDIBean {

  @Inject

  BeanManager beanManager;

  public void someMethod() {

  ELProcessor elProcessor = new ELProcessor();

  elProcessor.getELManager()

  .addELResolver(

  beanManager.getELResolver());

  SomeCDIBean someCDIBean =

  elProcessor.getValue(

  "someCDIBean", SomeCDIBean.class);

  }

  }

  ```


  请注意，在此示例中，作为 `getValue()` 方法第二个参数传入的 `SomeCDIBean.class` 并不用于解析；你也可以传入 `Object.class`。相反，该参数用于强制转换（转换）表达式求值（此处为
  `someCDIBean`）以及后续由 CDI 运行时解析所得到的结果。


  或者，你也可以将 `@Named` 用作查找的实际限定符，尽管这非常不推荐，因为 Bean 名称和 `@Named` 不应为此目的而使用。不过，为了完整性，以下是一个示例：


  ```

  SomeCDIBean bean = (SomeCDIBean)

  CDI.current()

  .select(Object.class, NamedLiteral.of("someCDIBean"))

  .get();

  ```


  由于 `@Named` 源自 AtInject（JSR 330），而字面量是 CDI 的构造，因此无法更新实际的注解以符合 CDI 约定。相反，CDI 为 `@Named`
  包含了一个单独的字面量，称为 `NamedLiteral`，它被用于前面的代码中。




  ## 识别与检索多个 Bean


  在 CDI 中，你不仅限于检索单个 Bean 实例；你还可以检索 Bean 的集合。无论是在注入时还是通过编程方式检索 Bean，你都可以做到这一点。


  通过编程方式实现这一点已经有所展示，因为它就是 `select()` 方法的返回值。在此之上调用 `get()` 才是真正将其缩减为单个 Bean（如果可以缩减的话）。


  在展示如何检索 Bean 集合的更详细示例之前，了解两个内置限定符非常重要：`@Default` 和 `@Any`。


  当一个 Bean 没有添加任何显式的实际限定符时，它会获得一个恰如其名的默认限定符 `@Default` *。* 一旦为其添加了任何显式限定符（`@Named`
  不算），`@Default` 限定符就会被移除。


  当你在注入点注入一个没有任何限定符的 Bean，或者通过编程方式检索 Bean 且在 `select()` 方法中没有限定符时，CDI 运行时实际上会按类型 +
  `@Default` 进行查找。


  除了 `@Default`，每个 Bean 的限定符集合中始终包含 `@Any` 限定符。按照正常的 CDI 约定，这个限定符永远不会被移除（正如你将在后续章节中看到的，当你直接通过
  `Bean<T>` 结构创建或操作 Bean 元数据时，可以将其移除）。


  此外，在组合 Bean 的标识以进行检索并提供限定符时，解析规则实际上规定：你添加到标识中的所有限定符都必须存在于该 Bean 上，但反之则不然。并非 Bean
  拥有的所有限定符都需要匹配，解析才能成功。有时情况可能并非如此，因为如果你对一个带有限定符的 Bean 仅使用“类型”作为标识符，解析将无法工作；CDI 运行时将找不到该
  Bean。但请记住，你*实际*请求的是一个标识符为类型 + `@Default` 的 Bean，而当你添加显式限定符时，`@Default` 会被移除。因此，起初可能看起来使用标识符的子集不起作用，但实际上它是有效的。例如，考虑一个带有两个限定符
  `@SomeQualifierOne` 和 `@SomeQualifierTwo` 的 Bean。如果你只组合一个类型 + `@SomeQualifierOne`
  的标识符，你可以用它来成功检索到这个 Bean。


  从某种意义上说，通过添加 `@Default` 和 `@Any` 这两个特殊限定符，你实际上拥有了一种小而简单的“Bean 查询语言”。


  现在让我们看一些实际应用的例子。考虑以下三个 Bean：


  ```

  @SomeQualifierOne

  @SomeQualifierTwo

  public class SomeCDIBean implements SomeInterface {

  }

  @SomeQualifierOne

  public class AnotherBean implements SomeInterface {

  }

  public class YetAnotherBean implements SomeInterface {

  }

  ```


  现在，你可以通过以下“查询”来检索所有带有 `@SomeQualifierOne` 注解的 Bean：


  ```

  Instance someInterfaceBeans =

  CDI.current()

  .select(

  SomeInterface.class,

  SomeQualifierOne.Literal.INSTANCE)

  ```


  `Instance` 容器是一种特殊的 CDI 类型，它封装了你初始查询的结果，并随后允许你进行子选择，以及测试是否有一个单一的“可解析”结果（一个符合注入条件的
  Bean）。随后你可以获取该结果，并使用各种方法来遍历集合。


  对于之前的查询，询问它是否可解析会返回 `false`，因为你应该有两个 Bean。


  ```

  boolean isResolvable = someInterfaceBeans.isResolvable();

  ```


  你可以通过再次调用 `select()` 方法对结果进行子选择，如下所示：


  ```

  Instance withTwoBeans =

  someInterfaceBeans.select(

  SomeQualifierTwo.Literal.INSTANCE);

  ```


  从你已经得到的结果（即之前定义的两个 Bean，它们都带有 `@SomeQualifierOne`*）* 中，你进行一个子选择，请求所有带有 `@SomeQualifierTwo`*
  的 Bean。* 这将产生一个新的 `Instance`，这次只引用 `SomeCDIBean`。由于现在只有一个 Bean，以下代码将返回 `true`：


  ```

  boolean resolvable = withTwoBeans.isResolvable();

  ```


  如果你想获取所有实现 `SomeInterface` 的 Bean 的集合，可以使用以下查询，利用特殊的 `@Any` 限定符：


  ```

  Instance allInterfaceBeans =

  CDI.current()

  .select(

  SomeInterface.class,

  Any.Literal.INSTANCE);

  ```


  `allInterfaceBeans` 实例现在将引用之前定义的所有三个 Bean。


  现在假设你想从这个集合中选择那个没有任何限定符的 Bean。如前所述，这意味着该 Bean 具有隐式的 `@Default` 限定符，因此你可以再次使用它进行子选择。


  ```

  Instance defaultBeans =

  allInterfaceBeans.select(

  Default.Literal.INSTANCE);

  ```


  如前所述，除了选择和测试结果，你还可以对其进行迭代。`Instance` 本身就是一个 `Iterable`，因此你可以直接在 `for-each` 循环中使用它，但也可以从中获取一个通用的
  `Stream`。以下示例展示了如何通过 `Stream` 将结果转换为常规的 `List`：


  ```

  List someInterfaces =

  allInterfaceBeans.stream()

  .collect(toList());

  ```


  在 CDI 中，检索多个 Bean 并不局限于编程式 API。使用注入，你也可以达到同样的效果。在这种情况下，注入点必须是 `Instance` 类型，以请求的类型作为泛型参数，并以注解形式提供请求的限定符。以下是一个示例：


  ```

  public class MultipleInjectionBean {

  @Inject

  @SomeQualifierOne

  Instance someInterfaceBeans;

  }

  ```




  ## 通过自定义方法参数注入检索 Bean


  除了注入字段外，CDI 还支持注入到方法和类的构造函数中。与字段注入类似，只有当 CDI 控制此类方法或构造函数的调用时，才支持方法注入。


  正如你在第 2 章中所见，构造函数注入是通过使用 `@Inject` 注解构造函数本身来完成的。与其他一些框架不同，没有必要（甚至不可能）使用 `@Inject`
  注解单个参数。当然，可以通过使用一个或多个限定符注解来注解任何参数，从而限定注入。


  让我们看一个例子。考虑 Bean `SomeBean`。


  ```

  @RequestScoped

  @SomeQualifierOne

  public class SomeBean {

  public String hi() {

  return "Hello from someBean";

  }

  }

  ```


  考虑 `AnotherBean` 中的以下构造函数注入：


  ```

  @RequestScoped

  public class AnotherBean {

  @Inject

  public AnotherBean (@SomeQualifierOne SomeBean someBean) {

  // ... 对 someBean 执行某些操作

  }

  }

  ```


  需要注意的是，构造函数注入自然发生在字段注入*之前*。这意味着，如果 `AnotherBean` 也指定了注入到实例变量中，那么在调用构造函数时，这些变量仍将为
  null。


  生产者中也允许方法注入。这些方法默认是可注入的，因此不必使用 `@Inject` 进行标记。以下是一个示例：


  ```

  @ApplicationScoped

  public class ProducerBean {

  @Produces

  public String produce(@SomeQualifierOne SomeBean someBean) {

  return someBean.hi();

  }

  }

  ```


  每当调用该生产者方法时（例如，当代码中出现 `@Inject String string` 时），CDI 将提供（注入）一个带有请求限定符的 `SomeBean`
  实例作为参数。


  观察者方法也是由 CDI 调用的方法，因此也是可注入的。与生产者方法一样，观察者方法默认是可注入的，因此这里也不需要 `@Inject` 注解。考虑以下示例：


  ```

  public class ListenerBean {

  public void listen(

  @Observes @SomeQualifierOne EventObject eventObject,

  SomeBean someBean) {

  // ...

  }

  }

  ```


  这样的观察者方法会监听由如下代码触发的事件：


  ```

  beanManager.fireEvent(

  new EventObject(this),

  SomeQualifierOne.Literal.INSTANCE);

  ```


  如你所见，这里没有提供 `SomeBean` 实例。细心的读者可能会注意到，我们在这里对事件使用了限定符。与 Bean 类似，事件也可以以非常相似的方式进行限定。尽管通常不这样解释，但观察者方法的查找与
  Bean 的查找非常相似，其中“事件类型 + 限定符”构成了观察者方法的标识符，随后 CDI 运行时查找所有与此标识符对应的观察者。事件将在第 5 章中更详细地讨论。


  ### 实践示例：实现自定义方法注入


  本节是一个较大的动手示例，演示如何使用 CDI 编程式 API 开发你自己的自定义功能，旨在让你深入了解如何开发 CDI 实用工具库。


  主要兴趣在于学习 CDI 本身以便在应用程序中直接使用的读者，可能希望跳过本节或略读。


  有时你可能希望允许注入到自己的自定义方法中，换句话说，就是那些并非由 CDI 直接调用的方法。CDI 不直接支持这一点，但使用本章前面部分解释的 CDI API，你可以自己实现类似的功能。一般方法是遍历
  `Method` 的形参（`Method` 是一个 Java SE 类，反射性地表示一个 Java 方法），并为每个参数记录其类型以及可选的限定符注解。对于每个记录的此类类型和限定符注解，可以使用
  `CDI.current().select(...)` 来获取一个 Bean，并将其传递给被调用的方法，这演示了前面解释的编程式 API 的一个特定实际用例。


  以下是此功能的代码示例：


  ```

  @SuppressWarnings("unchecked")

  public  T callMethod(

  BeanManager beanManager,

  Object bean, Method method, Map providedValues) {

  List parameterValues = new ArrayList();

  Parameter[] methodParameters = method.getParameters();

  for (int i=0; i  beanManager.isQualifier(e.annotationType()))

  .collect(toList())

  .toArray(new Annotation[0]);

  parameterValues.add(

  CDI.current()

  .select(

  methodParameters[i].getType(),

  qualifiers)

  .get()

  );

  }

  }

  try {

  return (T)

  method.invoke(bean, parameterValues.toArray());

  } catch (

  IllegalAccessException |

  IllegalArgumentException |

  InvocationTargetException e) {

  throw new RuntimeException(e);

  }

  }

  ```


  这里展示的示例使用了一个带有位置参数的 `Map`，以便调用方也可以提供自己的参数。其余参数将由 CDI 注入。这里使用 `beanManager` 的 `isQualifier`
  方法来确定给定的注解是否为限定符。


  为了方便起见，你可以将前面介绍的方法放入如下所示的 Bean 中：


  ```

  @ApplicationScoped

  public class MethodParamInjector {

  @Inject

  private BeanManager beanManager;

  public  T callMethod(Object bean, Method method) {

  return callMethod(beanManager, bean, method, emptyMap());

  }

  public  T callMethod(

  Object bean, Method method,

  Map providedValues) {

  return callMethod(

  beanManager, bean, method, providedValues);

  }

  @SuppressWarnings("unchecked")

  public  T callMethod(BeanManager beanManager,

  Object bean, Method method,

  Map providedValues) { … }

  }

  ```


  现在考虑 `SomeBean` 的以下版本：


  ```

  @RequestScoped

  public class SomeBean {

  public String getHello(HttpServletRequest request) {

  return

  "Hello from foo in request " +

  request.getRequestURI();

  }

  }

  ```


  现在，你可以通过参数注入器以如下方式调用 `getHello()` 方法：


  ```

  @Inject

  private SomeBean someBean;

  @Inject

  private MethodParamInjector methodParamInjector;

  public String getHello() throws Throwable {

  return methodParamInjector.callMethod(

  someBean,

  someBean.getClass()

  .getMethod(

  "getHello",

  HttpServletRequest.class));

  }

  ```


  请注意，方法名是一个 `String`。虽然这很典型，但并不完全理想。方法名可能拼写错误，而编译器当然不会捕捉到。或者方法本身可能被重构，导致这里的方法名不同步。你真正需要的是一个“方法字面量”（一个表示方法的字面量，就像
  `SomeBean.class` 表示一个类一样），但不幸的是，Java 不支持它们。




  Java 确实支持“方法引用”。不过，它们与其说是方法的表示，不如说是一种结合方法所属类的实例（对于非静态方法）来调用特定方法的方式。通过一个小技巧，你可以获取方法引用所解析到的实际方法。这个技巧涉及使用
  `InvocationHandler`，这是一个在代理上的方法被调用时会被调用的处理器。该处理器可以存储即将被调用的 `Method` 实例，从而让你能够访问方法的实际表示。这样的处理器如下所示：


  ```

  class InterceptingMethodHandler implements InvocationHandler {

  private Method interceptedMethod;

  @Override

  public Object invoke(

  Object proxy, Method method, Object[] args)

  throws Throwable {

  interceptedMethod = method;

  return null;

  }

  Method getInterceptedMethod() {

  return interceptedMethod;

  }

  }

  ```


  下一步是为 bean 类生成一个动态代理。这个代理将与原始 bean 类具有相同的类型，这意味着它可以被传入方法引用，并且方法引用将尝试在其上调用预期的方法。


  我们将使用著名的 `ByteBuddy` 库来生成这个动态代理。JDK 本身确实有动态代理功能，但它只能为接口生成代理，对于这个用例来说过于局限。


  代理生成方法如下所示：


  ```

  private static  T createProxy(

  Class beanClass, InvocationHandler invocationHandler,

  int arguments) {

  try {

  return new ByteBuddy()

  .subclass(beanClass, DEFAULT_CONSTRUCTOR)

  .method(

  isMethod()

  .and(takesArguments(arguments))

  .and(not(isDeclaredBy(Object.class))))

  .intercept(InvocationHandlerAdapter.of(invocationHandler))

  .make()

  .load(MethodParamInjector.class.getClassLoader())

  .getLoaded()

  .newInstance();

  } catch (

  IllegalAccessError |

  InstantiationException |

  IllegalAccessException e) {

  throw new RuntimeException(e);

  }

  }

  ```


  有了这两个关键组件，我们将定义一个小的粘合方法，用于实例化处理器和代理，并将对代理的实际调用委托给一个消费者。


  ```

  public static  Method findMethod(

  Class beanClass, int arguments, Consumer consumer) {

  InterceptingMethodHandler interceptingMethodHandler =

  new InterceptingMethodHandler();

  consumer.accept(

  createProxy(

  beanClass, interceptingMethodHandler, arguments));

  return interceptingMethodHandler.getInterceptedMethod();

  }

  ```


  最后一步是编写一个方法，该方法接受一个方法引用，并以一种最终能调用代理的方式对其进行调用。然而，这不能是一个单一的方法，因为方法引用必须被赋值给一个“匹配的”函数式接口。具体来说，这意味着你需要拥有覆盖各种可能
  bean 方法的函数式接口，并且对于每个这样的函数式接口，都有一个匹配的方法来接受它。这些可能的 bean 方法大致分为两类：有返回值的方法和没有返回值的方法。对于每一类，你还需要接受零个方法参数、一个方法参数、两个方法参数等的变体。


  以下是有返回值变体的三个示例：


  ```

  @FunctionalInterface

  public interface Return0Arg {

  R invoke(T bean);

  }

  @FunctionalInterface

  public interface Return1Arg {

  R invoke(T bean, W arg0);

  }

  @FunctionalInterface

  public interface Return2Arg {

  R invoke(T bean, W arg0, X arg1);

  }

  ```


  同样，你需要三个匹配这些接口的方法：


  ```

  public static  Method findMethod(

  Class beanClass, Return0Arg return1arg) {

  return findMethod(

  beanClass, 0,

  proxy -> return1arg.invoke(proxy));

  }

  public static  Method findMethod(

  Class beanClass, Return1Arg return1arg) {

  return findMethod(

  beanClass, 1,

  proxy -> return1arg.invoke(proxy, null));

  }

  public static  Method findMethod(

  Class beanClass, Return2Arg return1arg) {

  return findMethod(

  beanClass, 2,

  proxy -> return1arg.invoke(proxy, null, null));

  }

  ```


  请注意，在实际的库中，你可能会使用代码生成来创建足够多的变体。


  有了前面的代码，你现在可以将之前展示的 `getHello()` 方法替换为以下变体：


  ```

  public String getHello() {

  Return1Arg helloReference =

  SomeBean::getHello;

  return methodParamInjector.callMethod(

  someBean,

  findMethod(

  SomeBean.class, helloReference));

  }

  ```


  需要注意的是，你不能直接将 `SomeBean::getHello` 传入 `findMethod`，因为通配符不够精确，无法完全确定 `SomeBean::getHello`
  引用的是哪个实际方法。由于方法重载，可能存在许多变体，Java 使用左侧类型来确定你想要哪一个。不过，可以省略单独的赋值语句，但那样就需要进行类型转换，这可以说并不会让代码变得更美观。




  '
- '# 4. 作用域与上下文


  由于 CDI 容器负责启用 CDI 的应用程序中 Bean 的创建与销毁，它本质上管理着这些 Bean 的生命周期。这意味着容器需要知晓何时可以安全地创建和销毁每个
  Bean。如果 Bean 创建得太晚，依赖该 Bean 的代码可能会失败。如果 Bean 销毁得太晚，内存可能会被陈旧过时的对象堵塞，导致垃圾回收暂停时间延长，最终引发内存溢出错误。Bean
  生命周期管理的另一个问题，是不同 Bean 之间实例的共享。例如，为某个特定 Bean 创建多个实例可能成本过高。Bean 也可能是可变的，任何变更都应能直接让所有依赖该
  Bean 的其他 Bean 可见。如果某个 Bean 包含或管理着任何隐私敏感数据，应用程序可能还希望限制其他 Bean 对该 Bean 的可见性。


  考虑一个处理传入 HTTP 请求的应用程序示例。你可能希望将一个包含传入请求所有数据的 HTTP 请求对象，传递给执行请求处理某部分功能的每个方法。在没有依赖注入的情况下，唯一的方法是将请求对象作为方法参数传递给每个方法。处理该请求的调用链中的每个方法，都需要将这个请求对象传递给下一个处理请求的方法，即使该对象与当前处理器无关。借助依赖注入，就可以避免到处传递请求对象，而是直接将其注入任何需要访问它的
  Bean 中。当请求对象被注入而非传递时，CDI 容器需要意识到，一旦请求完成，该 Bean 就可以被销毁。如果不这样做，请求对象以及（间接地）来自请求对象的所有数据就会不断堆积，直到
  JVM 内存耗尽。根据 HTTP 应用程序的不同，HTTP 请求对象还可能包含用户特定信息，例如姓名、地址或信用卡详细信息。如果一个处理某个 HTTP 请求的
  Bean 能够看到来自不同用户的请求内容，那将非常糟糕。图 4-1 展示了如果两个用户几乎同时发起请求会发生什么。


  ![../images/454458_1_En_4_Chapter/454458_1_En_4_Fig1_HTML.png](img/454458_1_En_4_Fig1_HTML.png)


  图 4-1


  并发用户请求


  在此图中，只有一个请求处理 Bean 的实例来处理所有请求。当第一个用户发起请求时，会调用该请求处理 Bean。当第一个用户的请求仍在处理中时，另一个用户发起了第二个请求。服务器再次调用同一个请求处理
  Bean 实例来处理这个新请求。如果你直接将请求对象注入请求处理 Bean，那么处理第一个用户请求的线程不应能看到第二个用户请求的数据，反之亦然。即使你有多个请求处理
  Bean 的实例，也需要确保当前请求的数据仅对处理该请求的线程可见。


  为了解决这个问题，CDI 规范允许 Bean 拥有*作用域*。你可以为每个 Bean 定义一个显式的作用域。当为 Bean 定义了作用域后，该 Bean 的生命周期就与作用域的一个实例绑定在一起。*上下文*是解决方案的第二部分。你可以使用上下文来创建和销毁作用域；这是
  CDI 规范最重要的部分之一（CDI 中的 *C* 代表“上下文”）。上下文负责管理作用域实例。它们既负责作用域实例的创建和销毁，也负责与这些作用域实例绑定的
  Bean 实例的创建和销毁。


  让我们将其应用到之前的 HTTP 请求处理示例中。请求对象可以与一个特定于请求的作用域实例绑定。当收到一个 HTTP 请求时，处理该请求的线程会由与该作用域对应的上下文分配一个新的请求特定作用域实例。请求对象与该请求特定作用域实例绑定，这样在同一线程中调用的所有其他
  Bean 都可以注入该请求对象实例。一旦请求处理完成，上下文就会停用并销毁该请求特定作用域。当新请求到来时，这个周期会使用一个新的请求特定作用域实例重复进行。由于这里的请求特定作用域在处理请求结束时被销毁，因此无法再注入或以其他方式获取该请求对象。这可以防止一个请求的细节意外泄露给同一线程处理的下一个请求。其他线程将收到不同的请求特定作用域实例，从而防止并发请求观察到同时发生的其他请求的细节。


  在本章中，我们将介绍每个内置作用域，以及如何以及何时使用它们。我们还将介绍如何利用作用域可用的多数特性来创建自定义作用域。最后，我们将介绍自定义作用域如何覆盖或重新定义任何内置作用域的生命周期。




  ## 使用作用域


  要使 Bean 实例与某个作用域绑定，首先必须有一种声明 Bean 作用域的方式。CDI 通过使用作用域注解来实现这一点。每个作用域都与一个单一的作用域注解相关联，该注解通常以其描述的作用域来命名。例如，与特定线程绑定的作用域很可能有一个
  `@ThreadScoped` 注解。在大多数情况下，Bean 的类本身必须使用作用域注解进行标注。然而，如果 Bean 是由生产者生成的，则作用域注解必须应用于生产者方法。


  当一个 Bean 被设定了作用域后，其注入位置没有限制，只要在调用被注入的 Bean 时，相应作用域的实例是活跃的即可。具有特定作用域的 Bean 可以注入到具有更宽作用域的其他
  Bean 中。例如，作用域为给定线程的 Bean 可以注入到作用域为整个应用程序的 Bean 中。多个访问此应用程序作用域 Bean 的线程将看到线程作用域 Bean
  的不同实例，即使该线程作用域 Bean 被注入到应用程序作用域 Bean 的字段中。CDI 通过不直接注入作用域 Bean，而是注入一个代理实例来实现这一点。每当对这个注入的代理调用方法时，它都会为当前活跃的作用域查找实际的
  Bean 实例。如果该 Bean 不存在，则会在此时创建一个。Bean 本质上是在调用时解析，而不是在注入时解析。但是，如果相应的作用域不活跃，则对代理的任何方法调用都将失败。由于作用域不活跃，没有
  Bean 实例可以委托方法调用，代理将抛出 `IllegalStateException`。


  使用代理对任何作用域 Bean 都有一些影响。首先，作用域 Bean 通常是延迟创建的。只有在第一次对 Bean 执行方法调用或将事件分派给 Bean 时，才会创建它。这样做的好处是，当代理被注入到另一个
  Bean 中时，如果相应的作用域尚未激活，则 Bean 的作用域不需要处于活跃状态。使用代理的另一个影响是，代理只实现在注入点定义的类型。假设你有一个接口 A
  和一个实现该接口的类 B。当你将 B 注入到接口类型 A 的字段时，注入的代理将只实现接口 A，而不会扩展类 B。任何在 B 上声明的方法都不可用，并且任何将代理强制转换为类型
  B 的尝试都将失败。


  被代理的类型也必须是接口或非 final 类，并且所有公共方法都必须是 nonfinal。这是因为如果被代理的类型是一个类，代理必须扩展这个类。原始类型的所有字段和方法都会被继承，并且必须重写所有方法以允许委托给实际类型。如果方法是
  final 的，代理就无法将方法调用委托给实际的 Bean，因为它们将在代理实例上执行。这带来了另一个影响：被代理的类型不应有任何可公开访问的字段，因为它们必须被封装。另一个类似的问题是，作用域类型不应有任何可公开访问的字段。读取和写入公共字段无法委托给实际的
  Bean 实例，因此值将从代理实例中读取或写入。这些字段很可能只包含默认值，而实际的 Bean 实例将无法读取任何修改后的值。相反，实际上需要使用 getter
  和 setter 方法来封装任何字段。


  由于这些限制，当 CDI 容器遇到一个显式声明了作用域的 Bean，且该 Bean 是 final 类或具有任何 final 方法时，容器将导致应用程序部署失败并拒绝启动。唯一的例外是，如果该
  Bean 实现了任何接口，并且仅作为该接口的类型进行注入。例如，如果你有一个 final 类 `Foo` 实现了 `FooInterface`，只要所有适用的注入点都使用
  `FooInterface` 而不是 `Foo`，就没有问题。请记住，注入的代理将只是 `FooInterface` 类型，而不是 `Foo` 类型。这允许容器仍然拦截对具有
  final 类或任何 final 方法的 Bean 的方法调用。


  作用域 Bean 也可以被销毁，就像任何其他 Bean 一样。然而，理论上，作用域 Bean 可能在相应作用域仍然活跃时被销毁。如果发生这种情况，对 Bean
  引用的任何进一步方法调用都将触发创建一个新实例。例如，在请求作用域示例中，如果请求对象被销毁，那么在该作用域内对该请求对象的任何进一步调用都将触发创建一个新的请求对象。这种情况可能有用的一种情况是，当
  Bean 实例抛出异常，可能导致该实例处于损坏状态时。在这种情况下，最好销毁该 Bean 实例并继续使用新实例，而不是使用“损坏的”实例，后者可能导致各种错误。


  为了能够应用作用域，必须创建一个作用域类型。作用域类型是一个注解，通常具有描述作用域的名称，并以 `Scoped` 结尾。例如，对于前面提到的特定于请求的作用域，会有一个对应的
  `@RequestScoped` 注解。为 Bean 声明作用域就像在 Bean 上声明注解一样简单，具体取决于 Bean 的创建方式。


  假设你有一些 Bean，希望将它们的作用域限定在单个线程内。为此，可以使用一个特殊的线程作用域，并带有相应的 `@ThreadScoped` 注解。此线程作用域使
  Bean 仅对单个线程可见，并且一旦线程停止执行，此作用域中的任何 Bean 都会被销毁。假设你拥有的第一个 Bean 定义在一个名为 `Bar` 的 Bean
  类中。要将 `Bar` 的实例声明为具有线程作用域，你只需在 `Bar` 类上声明 `@ThreadScoped`。


  ```

  @ThreadScoped

  public class Bar {

  // 在此处实现 Bar

  }

  ```


  在此应用程序中，你还希望拥有类型为 `Bar2` 的 Bean。但是，`Bar2` 并非为与 CDI 一起使用而设计，并且没有默认构造函数，任何构造函数参数都无法直接注入。在这种情况下，你可以使用生产者方法来创建用于注入的
  `Bar2` 实例。你可以通过使用 `@ThreadScoped` 注解生产者方法，使此方法生成的 `Bar2` 实例具有线程作用域。


  ```

  @Produces

  @ThreadScoped

  public static Bar2 createBar2() {

  return new Bar2("构造函数参数");

  }

  ```


  最后，有一个 `Bar3` 类型，它与 `Bar2` 存在相同的问题。如果你有另一个线程作用域的 `Foo` 类，它在内部创建并使用 `Bar3` 的实例，则不必为
  `Bar3` 方法创建生产者方法。通过将 `@Produces` 和 `@ThreadScoped` 注解直接应用于字段，该字段将成为生产者字段，可直接供 CDI
  容器注入。使用此方法时，重要的是，创建 `Bar3` 的 Bean 必须在同一作用域内的任何其他 Bean 尝试使用注入的 `Bar3` 引用之前完成创建。如果在此之前
  `Bar3` 实例尚未创建，则可能导致错误，因为 Bean 实例尚不可用。


  ```

  @Produces

  @ThreadScoped

  private Bar3 bar3;

  ```




  ### 注意


  一个 Bean 只能定义一个作用域。为 Bean 应用多个作用域注解是非法的。如果 CDI 容器遇到一个声明了两个作用域的 Bean，则必须部署失败。不过，具有相同返回类型的不同生产者方法可以拥有不同的作用域，只要每个方法只有一个作用域和一个唯一的限定符即可。


  ## 内置作用域


  理论上，每个基于 CDI 的应用程序都可以只使用自定义作用域。然而，这将导致工程资源的浪费，因为许多应用程序有相似的需求，并且需要类似的作用域。仅允许自定义作用域也会使
  CDI 容器和其他 Java EE 组件的工作变得更加困难。如果所有作用域都是自定义的，那么容器和 CDI 组件将无法依赖使用特定作用域的应用程序。因此，CDI
  规定了一系列对大多数（Web）应用程序通用的作用域，并且每个 CDI 容器都必须提供这些作用域。这些作用域具有特定的预定义生命周期，以便应用程序可以轻松地从一个
  CDI 容器切换到另一个。CDI 定义了以下作用域：


  *   应用作用域

  *   会话作用域

  *   对话作用域

  *   请求作用域

  *   依赖作用域


  ### 应用作用域


  第一个预定义的作用域是应用作用域，可以使用 `@ApplicationScoped` 注解来应用。应用作用域与应用程序的生命周期相关联。这意味着，任何应用作用域的
  Bean 在应用程序的生命周期内本质上都是一个单例，除非它被显式销毁，此时可能会创建一个新的实例。顾名思义，应用作用域及其所有对应的应用作用域 Bean 将在应用程序本身的生命周期结束时被销毁。图
  4-2 展示了服务器中典型的应用作用域生命周期。


  ![../images/454458_1_En_4_Chapter/454458_1_En_4_Fig2_HTML.png](img/454458_1_En_4_Fig2_HTML.png)


  图 4-2


  服务器中典型的应用作用域生命周期


  应用作用域在服务器启动时创建，但应用作用域的 Bean 通常直到首次使用时才会被创建。如果你有一个处理单个用户请求的应用作用域 Bean，那么该 Bean 只会在首次调用其代理上的某个方法时被创建。每个单独的请求都将由同一个
  Bean 处理，无论执行请求的用户是谁，即使这些请求通过不同的代理实例。当服务器关闭时，应用作用域及其所有属于它的 Bean 都会被销毁。


  ### 会话作用域


  会话作用域与单个用户会话相关联，可以使用 `@SessionScoped` 注解来应用。会话作用域可用于将 Bean 实例限制在单个用户范围内。例如，一个 Web
  应用程序可能希望在屏幕的一角显示当前用户的用户名。该用户名可以由一个 `@SessionScoped` Bean 来维护，这将确保用户名不会意外地显示给其他用户。会话作用域也不要求用户登录，因此它也适用于，例如，在网店中跟踪未登录用户添加到购物车中的商品。在
  Java EE 中，会话作用域与单个 HTTP 会话相关联，并且可以跨越多个请求。会话作用域在每次调用 `service()` 方法期间、任何 Servlet
  过滤器的 `doFilter()` 方法期间，以及任何对 `HttpSessionListener`、`AsyncListener` 或 `ServletRequestListener`
  的调用期间处于活动状态。


  在 Java EE 中，当 HTTP 会话超时时，会话作用域会自动销毁。这只会发生在该会话的所有 `HttpSessionListener` 被销毁之后，以便这些监听器仍然可以访问会话作用域。在会话失效的任何请求处理结束时，会话作用域也会被销毁。在这种情况下，会话作用域也只会在所有
  `ServletRequestListener` 被调用之后才被销毁。图 4-3 展示了会话作用域生命周期的一个示例。


  ![../images/454458_1_En_4_Chapter/454458_1_En_4_Fig3_HTML.png](img/454458_1_En_4_Fig3_HTML.png)


  图 4-3


  会话作用域生命周期示例


  一旦请求结束，该作用域就会被挂起，然后在下一个请求时再次恢复。当作用域处于活动状态时，该作用域中的所有 Bean 都保持活动状态。会话超时后，会话作用域及其所有
  Bean 都会被主动销毁。




  ### 请求作用域


  CDI 还定义了一个请求作用域，可通过 `@RequestScoped` 注解来应用。该作用域通常在外部用户请求期间处于激活状态。在 Java EE 中，Servlet、Web
  服务和 EJB 均支持请求作用域。对于 Web 应用，在调用 Servlet 的 `service()` 方法或 Servlet 过滤器的 `doFilter()`
  方法期间，请求作用域处于激活状态。任何 Web 服务（无论是 JAX-WS 还是 JAX-RS）在处理单个 Web 服务调用期间，都会激活请求作用域。对于 EJB，任何远程
  EJB 调用都会导致在 EJB 处理该调用期间激活请求作用域。在上述每种类型的请求结束时，请求作用域及其所属的所有 Bean 都将被销毁。


  即使当前线程未处理传入请求，请求作用域也会在许多其他情况下处于激活状态。其中一个例子是在调用 Bean 的 `@PostConstruct` 方法期间。如果此时没有激活的请求作用域，则会在调用
  `@PostConstruct` 方法的持续时间内激活一个新的请求作用域。该方法执行完毕后，该请求作用域及其作用域内的所有 Bean 都会被销毁。每次将事件分派给异步观察者方法时，也会创建一个新的请求作用域，并在观察者方法调用完成后销毁。图
  4-4 展示了一个典型的请求作用域生命周期。


  ![../images/454458_1_En_4_Chapter/454458_1_En_4_Fig4_HTML.png](img/454458_1_En_4_Fig4_HTML.png)


  图 4-4


  典型的请求作用域生命周期


  在处理每个请求开始时，会创建一个新的请求作用域，并在处理请求期间保持激活状态。当请求处理完成并将响应返回给用户时，该请求作用域及其所属的所有 Bean 都会被销毁。


  请求作用域也可以通过应用程序代码来创建和销毁。考虑一个不依赖 Servlet、任何标准化 Web 服务或远程 EJB 来处理传入请求的应用程序。例如，应用程序可以通过电子邮件等替代通信渠道接收传入请求。当请求作用域通常不处于激活状态时，应用程序可能还需要在后台线程处理期间临时激活一个请求作用域。针对这些用例，CDI
  规范提供了一个特殊的 API 来管理请求作用域。


  CDI 提供了一个名为 `RequestScopeController` 的内置 Bean。此类型的实例可以注入到任何其他 Bean 中。`RequestScopeController`
  类定义了两个方法：`activate` 和 `deactivate`。如果当前没有激活的请求作用域，调用 `activate()` 方法将触发启动一个新的请求作用域。该方法还会返回一个布尔值，指示是否启动了新的请求作用域。相反，`deactivate()`
  方法将停用由同一 `RequestScopeController` 实例启动的任何请求作用域。这意味着，如果在请求作用域已激活时调用 `activate()`
  方法，那么只要该请求作用域仍处于激活状态，调用 `deactivate()` 方法将不会产生任何效果。但是，如果请求作用域不再处于激活状态，`deactivate()`
  方法将抛出 `ContextNotActiveException` 异常。


  假设你有一个请求作用域的 Bean，你想调用其上的某个方法，但当前请求作用域未激活。你可以调用 `activate()` 方法来激活请求作用域，然后在 `try`
  块中执行对请求作用域 Bean 的方法调用。在相应的 `finally` 块中，你调用 `deactivate()` 方法来停用并销毁该请求作用域。此处使用 `finally`
  块是为了确保即使方法调用抛出异常，请求作用域也能被干净地停用。请注意，即使 `activate()` 方法返回了 `false`，你也要调用 `deactivate()`
  方法。如果调用 `activate()` 时作用域已激活，那么 `deactivate()` 调用将不会产生任何效果。


  ```

  public class ProgrammaticRequestScopeActivation {

  private static final Logger logger = Logger.getLogger("foo.logger");

  @Inject

  private MyRequestScopedBean myRequestScopedBean;

  @Inject

  private RequestContextController requestContextController;

  public void doSomethingWithRequestScope() {

  boolean activated = requestContextController.activate();

  if (activated) {

  logger.info("New request scope activated");

  }

  try {

  myRequestScopedBean.doSomething();

  }

  finally {

  requestContextController.deactivate();

  }

  }

  }

  ```


  除了 `RequestScopeController`，CDI 还提供了一个拦截器，用于在方法调用期间激活请求作用域。拦截器将在第 6 章中详细讨论，但目前只需知道，将对应于拦截器的注解应用于方法或
  Bean，将会为该方法或该 Bean 上的所有方法激活该拦截器。用于在方法调用期间激活请求作用域的注解是 `@ActivateRequestContext`。当调用应用了此拦截器的方法时，拦截器会在实际方法调用之前激活请求作用域。一旦方法调用完成，拦截器将停用该请求作用域。与
  `RequestScopeController` 类似，如果请求作用域已激活，拦截器实际上不会执行任何操作。使用 `@ActivateRequestContext`
  注解，你可以极大地简化前面的示例。


  ```

  public class InterceptorRequestScopeActivation {

  @Inject

  private MyRequestScopedBean myRequestScopedBean;

  @ActivateRequestContext

  public void doSomethingWithRequestScope() {

  myRequestScopedBean.doSomething();

  }

  }

  ```




  ### 会话作用域


  下一个作用域是会话作用域，可通过 `@ConversationScoped` 注解应用。会话作用域最适用于跨多个请求的交互场景。与请求作用域不同，会话作用域本身没有预定义的生命周期。相反，应用程序可以在一定程度上影响新会话上下文的创建和销毁时机。由于会话作用域覆盖多个请求，它非常适合实现向导功能或用户与系统之间的其他类型会话。例如，网上商店在客户决定下订单时，可能会有一系列类似向导的步骤。这种向导式界面会先收集客户的地址、配送偏好和付款详情，然后才允许客户最终确认订单。网上商店可以选择仅在客户决定确认订单时才保留这些信息。会话作用域的
  Bean 是临时存储这些信息的不错选择。会话作用域可以在客户开始订单流程时启动，并在客户完成订单且订单已保存后销毁。


  会话作用域有两种类型：跨多个后续请求的长运行会话作用域，以及临时会话作用域。临时会话作用域仅持续单个请求；该作用域会在请求作用域销毁的同时被销毁。在 Java
  EE 中，处理每个 Servlet 请求时默认激活临时会话作用域，且其生命周期仅持续单个请求的时长。然而，临时会话作用域可以转换为长运行会话作用域。图 4-5
  展示了一个典型的会话作用域生命周期。


  ![../images/454458_1_En_4_Chapter/454458_1_En_4_Fig5_HTML.png](img/454458_1_En_4_Fig5_HTML.png)


  图 4-5


  典型的会话作用域生命周期


  默认情况下，会话作用域的行为与请求作用域相同，会在请求结束时销毁。但是，如果会话作用域转换为长运行作用域，它将在下一个请求时自动恢复。当会话结束时，会话作用域会转换回临时会话作用域，并在请求结束时删除。


  为了管理会话作用域，CDI 提供了一个类型为 `javax.enterprise.context.Conversation` 的请求作用域 Bean。这个 `Conversation`
  Bean 提供了以下方法：


  *   `void begin()`


  *   `void begin(String id)`


  *   `void end()`


  *   `String getId()`


  *   `long getTimeout()`


  *   `boolean isTransient()`


  *   `void setTimeout(long milliseconds)`


  `begin()` 和 `begin(String id)` 方法将临时会话作用域转换为长运行会话作用域。调用这些方法之一后，相同的会话作用域将在每个后续请求中保持激活，直到会话作用域结束。不带参数的
  `begin()` 方法会让容器为会话作用域生成一个唯一 ID。随后可以通过 `getID()` 方法检索此 ID，该方法将返回容器生成的 ID。在某些情况下，应用程序可能希望自行分配一个
  ID 给会话作用域；例如，可以将 ID 设置为网上商店中用户购物车的生成 ID。应用程序可以通过调用 `begin(String id)` 并将生成的 ID 作为参数传入，来为长运行会话作用域指定
  ID。请记住，当应用程序生成 ID 时，该 ID 在运行中应用程序的所有会话中仍必须是唯一的。如果应用程序已经为会话生成了一个唯一编号，那么这将是一个不错的选择。在网上商店中，订单号就是会话作用域
  ID 的一个好例子，因为订单号对于特定订单是唯一的。另请注意，这两个 begin 方法只能在临时会话作用域激活时调用；如果在没有会话作用域激活或长运行会话作用域激活时调用它们，将抛出
  `IllegalStateException`。


  当会话作用域已转换为长运行会话作用域后，后续请求需要某种方式来识别需要哪个现有的会话作用域。网站的用户可能会在浏览器不同标签页中浏览不同的向导。即使它们都针对同一用户，每个向导都需要一个独立的会话作用域。如果用户在单个向导中突然从一个激活的会话作用域切换到另一个，这可能导致错误。对于
  Web 应用程序，可以通过向 URL 添加名为 `cid` 的 HTTP 请求参数来控制要使用的确切会话上下文。此参数必须设置为要使用的会话作用域的 ID。在前面网上商店的例子中，`cid`
  参数将设置为订单的订单号。如果应用程序使用 JSF，将会话作用域传播到下一个请求会更加容易。默认情况下，JSF 会确保将会话作用域 ID 传播到下一个请求，要么通过使用隐藏表单字段，要么通过将
  `cid` 参数添加到每个 URL。


  调用 `end()` 方法会将当前的长运行会话作用域再次标记为临时。这意味着会话作用域将在当前请求作用域结束时立即结束。容器也可以自动清理长运行会话作用域。考虑这样一种情况：在网上商店中，用户确实开始了订单流程，但在完成订单前关闭了浏览器。如果没有自动清理，会话将被启动但永远不会被销毁。从客户那里收集的所有数据以及放入购物车的所有商品都将存储在会话作用域的
  Bean 中，这些 Bean 将无限期保持激活状态。每个会话作用域都有一个超时时间（以毫秒为单位），它表示自该作用域上次激活后必须经过多长时间才会被销毁。应用程序可以通过调用
  `Conversation` 实例上的 `getTimeout()` 方法来访问当前的超时值。如果应用程序需要长运行会话作用域具有更长或更短的超时时间，可以通过调用
  `setTimeout(long milliseconds)` 并传入新的超时值来更改超时时间。请注意，超时时间仅是对 CDI 容器的提示；容器可能会在超时时间到期之前或之后很久才决定销毁会话。




  ## 依赖作用域


  最后一种作用域是依赖作用域。依赖作用域可以通过 `@Dependent` 注解来应用。然而，如果没有任何作用域注解，依赖作用域也是所有 Bean 的默认作用域，因此并非必须显式应用该注解。依赖作用域与其他预定义作用域有很大不同。与使用其他任何预定义作用域进行限定的
  Bean 不同，依赖作用域的 Bean 没有预定义的生命周期。相反，依赖作用域的 Bean 会继承它们被注入到的那个 Bean 的生命周期。例如，如果一个依赖作用域的
  Bean 被注入到一个请求作用域的 Bean 中，它将在请求作用域结束时被销毁。一个被注入到另一个依赖作用域 Bean 中的 Bean，会继承那个 Bean 所注入到的
  Bean 的作用域，直到找到一个有作用域的 Bean。


  依赖作用域 Bean 的实例也可以通过 `BeanManager` 以编程方式创建。这些实例的生命周期取决于 `BeanManager` 被注入到的那个 Bean，这与直接注入依赖作用域
  Bean 类似。然而，如果 `BeanManager` 是使用 CDI API 以编程方式获取的，那么该依赖 Bean 将自动成为应用作用域。这是因为非 CDI
  Bean 的对象可能会使用此 API 创建 Bean。由于没有可继承的作用域，因此可以赋予所创建 Bean 的最安全的作用域就是应用作用域。


  对周围作用域的继承也导致了依赖作用域 Bean 与其他作用域 Bean 之间的另一个区别。依赖作用域 Bean 的实例不会在不同的 Bean 之间共享。例如，当将一个类型为
  X 的依赖作用域 Bean 注入到一个应用作用域 Bean 和一个请求作用域 Bean 时，类型为 X 的 Bean 将需要拥有两个不同的生命周期，这是不可能的。这对依赖作用域
  Bean 还有另一个影响：与其他任何作用域的 Bean 不同，它们默认不会被代理。这意味着依赖作用域 Bean 没有其他作用域 Bean 那样的限制，并且依赖作用域
  Bean 可以是 final 类或拥有 final 方法。


  ## 将不可代理类型暴露为作用域 Bean


  依赖作用域的一个可能用途是，使一个 final 类或拥有 final 方法的类型能够在另一个作用域下可用。假设你有一个类型，你想让它作为一个来自你无法控制的外部库的作用域
  Bean 可用，但这个 Bean 有一个 final 方法。例如，来自外部库的一个类型可能并非为 CDI 设计，并且拥有 final 方法。为了使这个 final
  类型能够使用某个作用域，你可以手动编写一个作用域代理类，该类将对实际类的注入实例的调用进行委托。假设你有一个 final 类 `FinalFoo`，你想让它作为一个
  `@RequestScoped` Bean 可用。你可以编写一个请求作用域的 `FooProxy` 类，并将一个依赖作用域的 `FinalFoo` 注入其中。通过在你的代理上实现类似的方法，你可以将这些方法调用委托给
  `FinalFoo` 实例。你可以将 `FooProxy` 注入到你的 Bean 中，而不是直接注入 `FinalFoo`。由于这个 `FooProxy` 具有请求作用域，因此依赖作用域的
  `FinalFoo` 实例也将继承请求作用域，并在请求结束时被销毁。


  ```

  @RequestScoped

  public class FooProxy {

  @Inject

  private FinalFoo dependentScopedBean;

  public void foo() {

  dependentScopedBean.foo();

  }

  }

  ```


  如果生产者方法的结果是不可代理的类型，也可以使用手动编写的代理或包装器来为其设置作用域。一个返回当前活动用户用户名字符串的生产者方法的结果，应该具有尽可能窄的作用域，这很可能是一个在用户凭证验证后立即开始，但在用户注销时销毁的作用域。会话作用域并不合适，因为一旦用户注销，它仍然处于活动状态，而此时你不再希望显示用户名。请求作用域也不合适。发送回用户的任何响应页面的处理都发生在同一个请求中，但对于这些页面，用户应该已经有效地注销了。由于
  `String` 类是一个 final 类，它是不可代理的，因此无法对其应用作用域。为了允许用户名字符串作为作用域 Bean 被注入，必须首先将其包装在一个自定义的包装器或代理中。


  ## 钝化作用域


  与应用作用域和请求作用域不同，会话作用域和对话作用域是钝化作用域。非钝化作用域的 Bean 实例会一直保存在内存中，直到它们或相应作用域的实例被销毁，但对于钝化作用域来说，情况并非一定如此。钝化作用域及其对应的
  Bean 可以临时从内存转移到临时存储中。例如，如果一个长时间运行的作用域有一段时间没有活动，但未来很可能会再次变为活动状态，就可能发生这种情况。在作用域及其
  Bean 被钝化后，该作用域需要再次被激活，这反过来会从辅助存储中加载所有对应的 Bean。


  像对话作用域这样的钝化作用域只能应用于能够被钝化的 Bean。一个声明为具有钝化作用域但不能被钝化的 Bean 将被视为部署问题，并会阻止应用程序启动。要使一个
  Bean 能够被钝化，该 Bean 必须是 `Serializable` 的，并且其所有拦截器和装饰器也必须能够被钝化。除此之外，该 Bean 的所有字段都必须能够被钝化或者是
  transient 的。为了帮助实现这一点，容器提供的所有 Bean 代理都必须能够被钝化。这样，只要不可钝化的 Bean 具有除依赖作用域之外的其他作用域，就可以将一个不可钝化的
  Bean 实例注入到一个可钝化的 Bean 实例中。任何注入到可钝化 Bean 中的依赖作用域 Bean 也必须是 `Serializable` 的。




  ## Java EE 中定义的其他作用域


  Java EE 8 由多个独立的规范组成。与任何普通库或应用程序一样，这些规范中的每一个都可能需要内置作用域未涵盖的特定作用域。与普通库或应用程序一样，这些其他规范也可以定义自己的自定义作用域。在
  Java EE 8 中，Java Servlet Faces (JSF) 和 Java Transaction API (JTA) 规范都定义了它们自己的作用域。


  JSF 规范在 CDI 之上定义了两个作用域。第一个是视图作用域。使用 `@ViewScoped` 注解声明的视图作用域，其生命周期与单个 JSF 视图的持续时间相同。在
  JSF 中，多个请求可以针对同一个视图，例如在执行 Ajax 请求时。拥有一个与视图生命周期相同的作用域，允许针对该视图的请求在请求之间保持一些状态。例如，在现代
  Web 应用程序中，表格的内容可能仅在需要时才加载，比如当用户滚动到表格底部时。每次获取接下来的几行数据时，都必须从客户端向服务器发送一个新请求，但这些请求都属于同一个视图。如果表格内容是根据某个用户查询填充的，那么这个用户查询以及可能的下一次要获取数据的索引就可以存储在视图作用域中。


  由 `@FlowScoped` 定义的流作用域，可以看作是类似于 CDI 中的对话作用域。与视图作用域一样，它涵盖了用户在一个 Web 应用程序中执行工作流所涉及的多个请求。这些工作流必须有明确的入口和出口点。再次考虑在线商店的例子。当用户决定购买其购物车中的商品时，他们启动订单流程，该流程在用户完成并提交订单后结束。为此，用户通常需要经历多个步骤，输入个人信息、送货偏好，以及可能最重要的支付信息。这些步骤中的每一步都属于同一个流程的一部分。


  JTA 用于在 Java EE 中启用分布式事务。JTA 定义的作用域是事务作用域。可以使用 `javax.transaction.TransactionScoped`
  注解将此作用域应用于 Bean。事务作用域在单个 JTA 事务的生命周期内处于活动状态。同一应用程序中同时处于活动状态的不同事务将具有与之关联的不同事务作用域。这意味着事务作用域最适合那些需要在单个事务期间跟踪某些内容的
  Bean。事务作用域 Bean 的一个例子是，一个 Bean 跟踪事务期间所做的数据库更改，然后在事务结束时将它们存储在事务日志中。


  ### 作用域初始化事件


  每个内置作用域都会在其生命周期的开始和结束时触发一个事件。我们不会在这里过多地详细介绍事件和观察者方法；这将在第 5 章中进行更深入的讨论。Bean 可以选择在作用域上下文初始化时、即将被销毁时以及实际已被销毁时接收通知。为此，CDI
  提供了三个限定符注解：`javax.enterprise.context.Initialized`、`javax.enterprise.context.BeforeDestroyed`
  和 `javax.enterprise.context.Destroyed`。这些注解中的每一个都有一个 value 参数，必须将其设置为作用域注解的类。要使
  Bean 选择接收这些生命周期事件，一个返回 `void` 的方法需要接受一个参数，该参数使用 `@Observes` 和 Bean 想要监听的事件的限定符注解进行注解。此参数的类型取决于
  Bean 监听的实际作用域事件，但可以是一个对象。此参数需要使用 `@Observes` 和所需的注解进行注解。Bean 想要选择的每种事件类型都需要一个单独的观察者方法。不可能有一个方法同时监听请求作用域和应用程序作用域的初始化，或者同时监听应用程序作用域的初始化和销毁。


  ```

  @ApplicationScoped

  public class RequestScopeEvents {

  public void onInitialization(@Observes

  @Initialized(RequestScoped.class) Object o) {

  System.out.println("Request scope initialized");

  }

  public void onBeforeDestruction(@Observes

  @BeforeDestroyed(RequestScoped.class) Object o) {

  System.out.println("Request scope about to be destroyed");

  }

  public void onDestroyed(@Observes

  @Destroyed(RequestScoped.class) Object o) {

  System.out.println("Request scope destroyed");

  }

  }

  ```


  请注意，只有具有作用域的 Bean 才能选择接收这些生命周期事件；依赖作用域的 Bean 无法直接接收这些事件。具有作用域的 Bean 也仅在其自身作用域处于活动状态时才能接收这些事件。例如，一个请求作用域的
  Bean 永远无法接收到 `@Destroyed(RequestScoped.class)` 事件，因为此时请求作用域已不再活动，并且该 Bean 本身也已经被销毁。




  ## 自定义作用域


  每个应用程序都是独一无二的，因此可能需要对 CDI 及其他 Java EE 规范所提供的标准作用域之外的作用域提出需求。例如，考虑一个允许多个不同用户进行群组聊天的聊天应用程序。这样的应用程序可能需要为每个群组聊天定义一个作用域，以便该群组中的消息能够传递给所有成员。要在
  CDI 规范本身中涵盖所有可能的作用域用例是不可能的。CDI 甚至没有涵盖 Java EE 8 中的所有用例。这正是自定义作用域的用武之地。应用程序和库通过自定义作用域来扩展
  CDI。定义自定义作用域是通过使用可移植扩展来完成的。可移植扩展允许以多种方式扩展 CDI 功能，并且是 CDI 中最强大的功能之一。本章不会过多地深入介绍它们，因为第
  7 章将专门介绍可移植扩展。


  在开始编写自定义作用域之前，首先需要考虑许多设计决策。这些设计决策将对作用域的工作方式以及它适用于哪些 Bean 起到重要作用。设计自定义作用域时最重要的决策是：作用域何时创建以及何时销毁。这决定了具有该作用域的
  Bean 何时可以被使用。例如，如果你决定为某个特定线程池中的线程创建一个作用域，那么具有该作用域的 Bean 就不能被任何其他线程使用。另一个相关的设计决策是作用域是否应该可挂起。例如，一个应用程序可能有一个用户作用域，在处理该用户的请求时处于活动状态，并且仅在用户注销时才被销毁。任何处理用户请求的线程都可能处理多个用户的请求。这个线程可以先取消挂起作用域，处理请求，然后再次挂起作用域，以便它可以自由地处理来自任何其他用户的请求。


  自定义作用域设计中最重要的方面之一是它是否会在线程之间共享。像请求作用域这样的作用域专用于单个线程，但像应用程序作用域这样的作用域则在应用程序的所有线程之间共享。在线程之间共享作用域意味着任何声明了该作用域的
  Bean 也必须是线程安全的。否则，可能会出现许多与并发相关的错误。


  一个后续的考虑因素是作用域是否也应该传播到其他线程。例如，以请求作用域为例，虽然默认的请求作用域根本不会传播到其他线程，但在某些用例中，将作用域传播到不同的线程可能更有意义。假设你收到一个
  HTTP 请求，并提交了一个将异步处理该请求的任务；那么将作用域也传播到后台线程将会很有用。然而，与任何其他在多个线程之间共享的作用域一样，最可能适用同样的警告：Bean
  应该是线程安全的，以避免任何奇怪的错误。


  另一个重要的问题是作用域是否应该支持钝化。对于生命周期较短的作用域，将其声明为支持钝化可能没有意义，因为钝化可能永远不会发生，并且它会给作用域可以应用的 Bean
  增加许多限制。如果一个作用域可能长时间运行并消耗大量内存（无论是少量大型实例还是许多小型实例），那么值得考虑让你的自定义作用域支持钝化。然而，如前所述，支持钝化的作用域也会对任何具有该作用域的
  Bean 增加额外要求。在某些情况下，可能无法使 Bean 支持钝化，这就排除了将钝化作用域应用于该 Bean 的可能性。如果你有一个生产者方法或字段，它从你无法控制的外部库中生成了一个不可序列化的
  Bean，那么就不可能将钝化作用域应用于该 Bean。


  最后，作用域可以设置为可堆叠或不可堆叠。例如，假设你有一个方法调用作用域。这个作用域可以在任何方法调用期间处于活动状态。然而，如果调用了另一个具有相同作用域的方法，那么在第二个方法执行期间，原始作用域应该被挂起。这被认为是作用域的堆叠；新的作用域堆叠在原始作用域之上并取代它。一旦新的作用域被挂起或销毁，原始作用域就会自动重新变为活动状态，直到它也被挂起或销毁。


  要创建自定义作用域，你需要做三件事。


  1.  为新的作用域创建一个注解。


  2.  为作用域实现一个作用域上下文。


  3.  在 CDI 扩展中注册新的作用域。


  作用域注解将标识该作用域，并允许将其应用于 Bean。作用域上下文将包含作用域的逻辑，并确定作用域何时处于活动状态，以及在该作用域的给定实例中哪些 Bean 是活动的。最后，自定义扩展允许你在
  CDI 容器中注册新的作用域。




  ### 自定义作用域注解


  首先，你需要为作用域创建一个注解，以此开启新作用域的创建。注解的命名惯例是使用描述性名称，并以 `Scoped` 结尾。例如，`Foo` 作用域的注解应为 `@FooScoped`。需要注意的是，这仅仅是一种惯例；除了类名的限制外，注解名称没有其他限制。然而，不遵循命名惯例可能会让需要应用该作用域的开发者感到困惑，因为他们必须记住注解的名称。这也会使注解更难被发现，因为用户需要查阅文档才能找到注解的名称。相比之下，像
  `@RequestScoped` 和 `@ApplicationScoped` 这样的注解，在任何 IDE 中通过自动补全功能都很容易找到。


  现在你已经有了作用域注解，接下来需要通过在其上应用其他注解来进行配置。如果你熟悉编写注解，可能知道注解默认只有类级别的保留策略。这意味着注解会存储在使用它的任何类的类文件中，但无法在运行时访问该注解。为了让
  CDI 能够将作用域应用于 Bean，它必须能够在运行时检测到该注解。为此，你需要在你的注解上应用 `@Retention` 注解。`@Retention` 有一个单一的值参数，你需要将其设置为
  `RetentionPolicy.RUNTIME`，以允许 CDI 在运行时访问该注解。


  你还应该定义 `@Target` 注解。`@Target` 注解控制该注解可以应用于哪些源代码元素。对于作用域注解，它应该只能应用于 Bean 类、生产者字段和生产者方法。例如，将作用域注解应用于方法参数是没有意义的。`@Target`
  注解只有一个 `ElementType` 数组作为参数，你需要将其设置为 `{ElementType.TYPE, ElementType.METHOD, ElementType.FIELD}`。


  最后，你需要声明你的注解是一个作用域注解。你可以通过声明以下两个注解之一来实现。对于像依赖作用域这样的伪作用域，你应该应用 `@Scopeannotation`。伪作用域很少见，因此大多数作用域创建者永远不需要使用这个注解。对于所有其他作用域，应该使用
  `@NormalScope` 注解。这个注解有一个名为 `passivating` 的布尔参数，默认设置为 `false`。该参数控制作用域是否为钝化作用域。要使作用域钝化，只需将参数值设置为
  `true`。


  完成所有这些之后，一个非钝化的 `Foo` 作用域注解看起来像这样：


  ```

  @NormalScope

  @Retention(RUNTIME)

  @Target({TYPE, FIELD, METHOD})

  public @interface FooScoped {

  }

  ```


  你还可以在作用域注解上应用其他一些注解来进一步配置它。你可能希望作用域注解自动应用于具有该作用域的类的子类，或者覆盖具有该作用域的生产者方法的生产者方法。这可以通过在作用域注解上应用
  `@Inherited` 注解来实现。这样做时需要小心，因为这将使得无法为子类或覆盖的生产者方法赋予不同的作用域。通常，继承的注解可以通过在继承它的类或方法上应用相同的注解来覆盖。然而，不同的作用域有不同的注解。应用不同的作用域注解会导致
  Bean 类型、生产者方法或生产者字段定义了多个作用域，这是一个部署问题。为了避免这些问题，通常最好对作用域注解使用 `@Inherited` 注解。


  另一件你可以做的事情是让作用域出现在为某个类型生成的 Javadoc 中。这通常是一个好做法，因为它允许浏览 Javadoc 的开发者轻松查看 Bean 声明了哪个作用域。为此，应该将
  `@Documented` 注解应用于作用域注解。


  ## 上下文


  一旦定义了作用域的注解，就该进入实现作用域的下一部分：上下文。上下文承担着多项职责，是实现作用域最重要的部分。上下文既负责确定给定线程的作用域是否处于活动状态，也负责管理该作用域的所有
  Bean 实例。了解到 CDI 容器本身并不跟踪哪个 Bean 实例与哪个作用域相关联，而是将这一职责委托给上下文，可能会让人感到惊讶。然而，这允许上下文实现具有更大的灵活性。例如，上下文现在可以决定临时挂起一个作用域，而无需销毁该作用域的任何
  Bean 实例。


  上下文的核心是上下文对象。每个不同的作用域都恰好有一个作用域对象的实例，该实例在该作用域的所有作用域实例之间共享。要实现一个上下文对象，你需要实现 `javax.enterprise.context.spi.Context`
  接口。该接口定义了以下方法：


  *   `boolean isActive()`


  *   `Class<? extends Annotation> getScope()`


  *   `T get(Contextual contextual)`


  *   `T get(Contextual contextual, CreationalContext creationalContext)`


  这个接口看起来简单得具有欺骗性，但它允许在作用域的实现中具有很大的灵活性。在深入探讨 `Context` 对象的实现之前，我们将分别讨论这些方法。


  `isActive()` 方法返回一个布尔值，指示此上下文所属的作用域对于当前线程是否处于活动状态。正如你所期望的，如果作用域处于活动状态，此方法必须返回 `true`，否则返回
  `false`。当线程尝试调用作用域 Bean 的代理对象上的方法时，CDI 容器将调用 `isActive()` 来确定作用域是否处于活动状态。仅当此作用域处于活动状态时，容器才会尝试获取作用域
  Bean 的实例。此调用将在代理上的每次方法调用时发生，因此，根据上下文的实现，作用域可能在连续调用之间被激活或停用。


  `getScope()` 方法相当直接，必须返回与当前上下文关联的作用域注解的类。这主要由 CDI 容器用于确定哪个注解和上下文对象属于一起。例如，内置的请求作用域将返回
  `@RequestScoped` 注解。上下文对象必须始终返回相同的注解，因为在运行 CDI 应用程序的过程中，不可能切换关联的注解。对于大多数上下文实现来说，从此方法返回一个硬编码的注解就足够了。




  名为 `get` 的两个方法包含了 CDI 上下文实现中的大部分逻辑。第一个方法 `get(Contextual<T> contextual)` 会为给定的 contextual
  返回一个现有的 bean 实例。*contextual* 是给定 bean 类型的描述符，它由 CDI 容器解析，并提供方法用于创建或销毁该 bean 类型的实例。每个
  bean 类型都有唯一的 contextual。这里的 bean 类型由 bean 实例的实际类型以及应用于该 bean 类型的限定符注解共同构成。例如，`@Foo
  Foo` 类型的 bean 与 `@Bar Foo` 类型的 bean 拥有不同的 contextual。不同限定符注解对应不同 contextual，这正是限定符注解能够生效的原因。上下文本身无需跟踪限定符注解，只需依赖
  contextual 即可。需要特别注意的是，此方法绝不能为匹配某个 contextual 的 bean 创建新实例。如果当前活跃作用域实例中没有现有实例，则此方法必须返回
  `null` 以表明这一点。与 `isActive()` 方法类似，每次调用作用域类型的代理时都会调用此方法。这使得根据上下文的实现方式，可以在连续的方法调用之间切换不同的作用域实例。


  另一个方法 `get(Contextual<T> contextual, CreationalContext<T> creationalContext)` 则可能创建匹配某个
  contextual 的 bean 新实例。与上一个方法一样，如果当前作用域实例中存在现有 bean 实例，此方法也必须返回该实例。如果没有现有 bean，则此方法必须创建新实例。在
  CDI 中创建 bean 实例并非简单地调用相关构造函数。创建的 bean 可能还有需要由 CDI 注入的依赖项，或者 bean 可能带有需要应用的拦截器。这正是此方法的第二个参数
  `CreationalContext<T>` 发挥作用的地方。`CreationalContext<T>` 参数可以与 `Contextual<T>` 配合使用，以创建或销毁
  bean 实例。创建 bean 实例很简单：只需调用 contextual 上的 `create()` 方法，并将 creational context 作为参数传入即可。


  ```

  T bean = contextual.create(creationalContext);

  ```


  重要的是，如果 `get(Contextual<T> contextual, CreationalContext<T> creationalContext)`
  方法创建了新的 bean 实例，则必须使用给定的 contextual 和 creational context 实例来完成。你可能会好奇为什么必须在此处传入
  `CreationalContext`。主要原因在于，这会将给定的 bean 实例与 creational context 关联起来。`CreationalContext`
  接口有一个 `release()` 方法，该方法会触发与该 creational context 关联的所有 bean 被销毁。这主要用于销毁任何 `@Dependent`
  作用域的 bean。这些 bean 与它们被注入的实例的 creational context 相关联。当该实例被销毁时，会调用 `CreationalContext`
  上的 `release()` 方法，从而导致 `@Dependent` 作用域的 bean 被销毁。


  你可能会注意到，`Context` 接口没有任何用于启动、挂起或销毁作用域实例的方法。主要原因在于，`Context` 接口中的方法旨在仅由 CDI 容器调用。启动、挂起或销毁作用域实例取决于作用域的实现，因此不属于
  CDI 容器的关注范围。这并不意味着上下文对象不能拥有控制作用域的方法。相反，如果需要此类方法，上下文对象是放置它们最合理的位置，因为上下文对象负责维护作用域。然而，由于这些方法由库或应用程序代码调用，且不同作用域对这些方法可能有不同要求，因此这些方法并未在
  `Context` 接口中定义。


  ## 扩展


  实现作用域的最后一步是定义一个可移植扩展，用于向容器注册该作用域。可移植扩展是后续章节的主题，因此我们在此不会深入探讨。可移植扩展将承担两项职责。第一项是向 CDI
  容器注册作用域注解。第二项是向容器注册上下文对象的实例。


  要创建可移植扩展，你必须创建一个实现 `javax.enterprise.inject.spi.Extension` 接口的新类。该接口是一个标记接口；它将类标记为可移植扩展，但并未定义任何方法。要注册你的作用域注解，你必须声明一个方法，该方法将在
  CDI 容器扫描所有 JAR 文件以查找 bean 之前被调用。此方法的名称并不重要；你可以随意命名，只要该方法具有特定的签名即可。方法的返回类型必须为 void，并且它必须接受一个类型为
  `javax.enterprise.inject.spi.BeforeBeanDiscovery` 的单一参数。该参数还必须使用 `@Observes` 注解。这让容器知道，在容器扫描类路径（或模块路径）上的所有
  JAR 文件以发现其中包含的 bean 之前，应调用此方法。`BeforeBeanDiscovery` 对象将有一个 `addScope()` 方法，可用于注册你的作用域注解。该方法有三个参数：作用域注解类、一个指示作用域是否为普通作用域的布尔值，以及一个指示作用域是否为钝化作用域的布尔值。如果你有一个带有
  `@FooScoped` 注解的普通非钝化作用域，该方法可能如下所示：


  ```

  public void beforeBeanDiscovery(@Observes BeforeBeanDiscovery bbd) {

  bbd.addScope(FooScoped.class, true, false);

  }

  ```


  接下来，你还需要注册上下文对象。注册上下文对象与注册作用域注解类似，但你需要为此添加第二个方法。此方法将接受一个 `javax.enterprise.inject.spi.AfterBeanDiscovery`
  实例作为单一参数，而不是 `BeforeBeanDiscovery`。顾名思义，CDI 容器将在完成 bean 发现过程后调用此方法。要注册上下文对象，你只需将其一个实例传递给
  `AfterBeanDiscovery.addContext()`。假设你将上下文类命名为 `FooContext`，那么你的 `AfterBeanDiscovery`
  方法可能如下所示：


  ```

  public void afterBeanDiscovery(@Observes AfterBeanDiscovery abd) {

  abd.addContext(new FooContext());

  }

  ```


  正如你可能注意到的，你直接传入了上下文对象的实例，而不是像注册作用域注解那样注册类。这样做的结果是，你的作用域将只有一个上下文对象的实例。




  最后，你需要确保 CDI 容器能够识别你的可移植扩展。CDI 在启动时通过 `ServiceLoader` 机制发现哪些可移植扩展可用。如果你不熟悉 `ServiceLoader`，它允许动态加载服务提供者类。服务提供者类是指实现了预定义接口或继承了预定义类的类。本质上，这允许库和应用程序将其他类作为插件动态加载。可移植扩展类就是这样一个服务提供者类，但你需要先将其注册到
  `ServiceLoader` 中。为此，你需要在 `META-INF/services` 目录下添加一个文件，该文件以 `Extension` 接口的全限定名命名。该文件的唯一内容是你的可移植扩展类的全限定名。如果你使用
  Maven 或 Gradle 构建项目，该文件应位于 `src/main/resources/META-INF/services/javax.enterprise.inject.spi.Extension`。现在，假设你的可移植扩展类名为
  `bar.foo.PortableExtension`，那么该文件的内容应为：


  ```

  com.foo.PortableExtension

  ```


  现在我们已经介绍了如何创建和注册一个作用域，你可以学习如何实现一个简单的作用域。我们暂时假设应用作用域不存在，但你的应用程序需要类似的功能。在实际代码中，你永远不需要实现这样的作用域，但这让我们能够介绍最简单的作用域实现，并以此为基础进行扩展。


  要开始创建新的自定义应用作用域，首先需要定义你的作用域注解，将其命名为 `@MyApplicationScoped`。这个注解将是一个非常直接的注解。我们将该注解命名为
  `@CustomAppScoped`，并将其标记为非钝化作用域的注解。其定义应如下所示：


  ```

  @NormalScope

  @Retention(RUNTIME)

  @Target({TYPE, FIELD, METHOD})

  public @interface CustomAppScoped {

  }

  ```


  接下来，你需要实现上下文对象。实现 `isActive()` 和 `getScope()` 方法相当简单。由于你希望自定义应用作用域始终处于活动状态，只需在 `isActive()`
  方法中返回 `true`。`getScope()` 方法应始终返回你的作用域注解的类，因此它应始终返回 `CustomAppScoped`。


  此时，你需要在两个 `get()` 方法中实现作用域的核心逻辑。要实现 `get()` 方法，你首先需要一种方法来缓存由你的上下文对象创建的任何 bean 实例。此时需要记住，对于给定的作用域，只有一个上下文对象。这意味着多个线程可能同时请求某个
  `Contextual` 的 bean 实例。实现缓存的最简单方法是使用一个映射，以 `Contextual<T>` 作为键，以实例作为值。线程安全的要求意味着
  `ConcurrentHashMap` 是最适合用于缓存的映射实现。使用 `ConcurrentHashMap` 作为实例缓存的一个额外好处是，你可以使用 `computeIfAbsent()`
  方法来确保没有两个线程会同时尝试为同一个 `Contextual<T>` 创建 bean 实例。当你将所有内容整合在一起时，作用域方法的实现将如下所示：


  ```

  public class CustomAppScopeContext implements Context {

  private final ConcurrentHashMap, Object> instances = new ConcurrentHashMap();

  @Override

  public Class getScope() {

  return CustomAppScoped.class;

  }

  @Override

  public boolean isActive() {

  return true;

  }

  @Override

  public  T get(Contextual contextual, CreationalContext creationalContext) {

  @SuppressWarnings("unchecked")

  T instance = (T) instances.computeIfAbsent(contextual, c -> contextual.create(creationalContext));

  return instance;

  }

  @Override

  public  T get(Contextual contextual) {

  @SuppressWarnings("unchecked")

  T instance = (T) instances.get(contextual);

  return instance;

  }

  }

  ```


  最后，你需要编写你的可移植扩展并将其注册到 `ServiceLoader` 中。可移植扩展相当直接；你只需要在其中注册你的作用域注解和上下文对象。


  ```

  public class CustomAppScopeExtension implements Extension {

  public void beforeBeanDiscovery(@Observes BeforeBeanDiscovery bbd) {

  bbd.addScope(CustomAppScoped.class, true, false);

  }

  public void afterBeanDiscovery(@Observes AfterBeanDiscovery abd) {

  abd.addContext(new CustomAppScopeContext());

  }

  }

  ```


  现在剩下的就是用你的作用域注解来注解 bean 和生产者方法，这样你就可以使用你的新作用域了。在实践中，拥有一个始终处于活动状态并在所有线程之间共享实例的作用域并不是非常有用，因为应用作用域已经满足了这一需求。更典型的情况是，作用域可以被随意创建、挂起或销毁。通常，作用域的控制权落在拦截器（将在后续章节中介绍）上，或者较少见地，落在
  bean 类上。然而，如前所述，`Context` 接口并未声明任何控制作用域生命周期的方法。你可以通过自己定义这些方法来解决这个问题。


  让我们尝试创建一个可以被启动、挂起、恢复甚至销毁的作用域。为了能够恢复你的作用域，你首先应该选择一个可以用作标识符的类型，该标识符可用于恢复你的作用域。一个好的做法是为此使用一个不可变类型。你将使用此标识符作为映射键。可变类型的哈希码可能会因其值的更改而改变。


  上下文对象需要为每个具有活动作用域的线程跟踪此标识符。最合适的方法是定义一个线程局部变量来存储 `String`。然而，直接写入 `ThreadLocal` 是一个相当昂贵的操作。相反，你可以使用
  `AtomicReference` 实例作为线程局部变量中的值，并改为更新它。要实现你的 `isActive()` 方法，你只需检查当前线程的线程局部变量中的
  `AtomicReference` 是否包含 `null`。如果它包含除 `null` 之外的任何内容，则作用域处于活动状态，`isActive()` 将返回
  `true`。


  你将分别命名启动和挂起作用域的方法为 `start()` 和 `suspend()`。在 `start()` 方法中，你应该检查当前线程是否已经有一个活动的作用域实例，因为你的作用域不是可堆叠的作用域。如果你允许在已有活动作用域时启动新作用域，你将丢失当前活动作用域的标识符，因此如果发生这种情况，你需要抛出异常。挂起作用域时，你需要进行类似的检查；只有当当前线程没有活动的作用域实例时，你才需要抛出异常。尝试在没有任何活动作用域时挂起作用域，表明你的代码中某处存在错误。




  ```

  private static final ThreadLocal<AtomicReference<String>> ACTIVE_SCOPE_THREAD_LOCAL
  = ThreadLocal.withInitial(AtomicReference::new);

  @Override

  public boolean isActive() {

  return ACTIVE_SCOPE_THREAD_LOCAL.get().get() != null;

  }

  public void start(String scopeId) {

  AtomicReference<String> activeScope = ACTIVE_SCOPE_THREAD_LOCAL.get();

  if (activeScope.get() != null) {

  throw new IllegalStateException("该作用域的一个实例已处于活动状态");

  }

  activeScope.set(scopeId);

  }

  public void suspend() {

  AtomicReference<String> activeScope = ACTIVE_SCOPE_THREAD_LOCAL.get();

  if (activeScope.get() == null) {

  throw new IllegalStateException("作用域当前未处于活动状态！");

  }

  activeScope.set(null);

  }

  ```


  在编写上下文对象的其余部分之前，你需要考虑如何销毁 Bean 实例。在自定义应用作用域中，作用域始终处于活动状态，因此销毁 Bean 实例并非必要的设计考量。然而，如果你按照应用程序的要求启动和挂起作用域，那么若不清理不再使用的作用域，最终可能会导致内存耗尽。当你销毁一个作用域实例时，还需要销毁与该作用域实例关联的每个单独的
  Bean 实例。如前所述，`Contextual` 接口有一个 `destroy` 方法，可用于销毁 Bean 实例。但是，`destroy()` 方法同时接收
  Bean 实例和 `CreationalContext<T>` 作为参数。`CreationalContext<T>` 仅传递给 `get(Contextual<T>,
  CreationalContext<T>)`，并用于创建 Bean 实例。由于你正在定义自己的销毁方法，`CreationalContext` 将不可用。为了能够销毁
  Bean，你还需要缓存传递给此方法的上下文。为此，你将在实例映射中定义一个名为 `BeanInstance` 的自定义类型。这个类本质上是对 Bean 实例的封装，同时存储关联的
  `Contextual<T>` 和 `CreationalContext<T>`。你需要在此处定义一个返回实际 Bean 实例的方法，以便上下文对象能够访问它。由于你已经拥有了销毁
  Bean 实例所需的一切，你也可以在此处添加一个销毁方法。该方法使用当前的 Bean 实例和关联的 `CreationalContext<T>` 调用 `Contextual.destroy()`。


  ```

  final class BeanInstance<T> {

  private final T instance;

  private final Contextual<T> contextual;

  private final CreationalContext<T> creationalContext;

  BeanInstance(T instance, Contextual<T> contextual, CreationalContext<T> creationalContext)
  {

  this.instance = instance;

  this.contextual = contextual;

  this.creationalContext = creationalContext;

  }

  T get() {

  return instance;

  }

  void destroy() {

  contextual.destroy(instance, creationalContext);

  }

  }

  ```


  对于之前的作用域，你有一个包含该作用域所有 Bean 实例的单一 `ConcurrentHashMap`。与之前的作用域不同，你的新作用域将有多个不同的实例，这意味着单个实例缓存映射将不再适用。相反，你可以使用一个
  `ConcurrentHashMap`，以你的标识符作为映射键，每个值则是另一个包含实例的 `ConcurrentHashMap`。在实现 `get(Contextual<T>)`
  方法时，还有一件事需要考虑。你之前编写的作用域始终处于活动状态，但这个作用域不会。`get(Contextual<T>)` 的契约要求：如果当前线程的作用域未处于活动状态，当前线程应抛出
  `ContextNotActiveException`。在 `get(Contextual<T>)` 的开头，你应该检查作用域是否实际处于活动状态。你可以通过检查你定义的线程局部变量中存储的
  `AtomicReference` 包含的是作用域 ID 还是 `null` 来实现这一点。如果它被设置为 `null`，则作用域未处于活动状态，你需要抛出 `ContextNotActiveException`。


  如果作用域 ID 处于活动状态，你就可以使用该作用域 ID 获取此作用域的 Bean 实例映射。由于这可能是第一次调用，所有作用域的映射可能尚未包含当前作用域实例的实例映射。你的第一反应可能是使用
  `Map.computeIfAbsent()` 来创建映射，但有一个更好的选择。由于 `get(Contextual<T>)` 方法不创建任何实例，你实际上不需要在此刻创建映射。相反，你可以使用
  `Map.getOrDefault()` 结合 JDK 9 中引入的新静态方法 `Map.of()`，如果当前作用域尚无可用的实例映射，则返回一个空的不可变映射。不带任何参数调用
  `Map.of()` 应始终返回相同的空映射，因此你避免了在需要之前创建新映射的开销。一旦你有了映射，就可以检查你要查找的 `Contextual<T>` 是否存在于映射中，并返回相应的
  Bean 实例。


  ```

  private final ConcurrentHashMap<String, ConcurrentHashMap<Contextual<?>, BeanInstance<?>>>
  cache = new ConcurrentHashMap<>();

  @Override

  public <T> T get(Contextual<T> contextual) {

  String scopeId = ACTIVE_SCOPE_THREAD_LOCAL.get().get();

  if (scopeId == null) {

  throw new ContextNotActiveException();

  }

  @SuppressWarnings("unchecked")

  BeanInstance<T> instance = (BeanInstance<T>) cache.getOrDefault(scopeId, Map.of()).get(contextual);

  if (instance == null) {

  return null;

  }

  return instance.get();

  }

  ```


  `get(Contextual<T>, CreationalContext<T>)` 方法将采用与 `get(Contextual<T>)` 方法类似的方式，但有一些细微差别。由于如果
  Bean 实例不存在，你需要创建一个，因此你需要为你的作用域准备一个映射实例，所以你需要使用 `Map.computeIfAbsent()` 来创建一个。实例映射应该是一个
  `ConcurrentHashMap`，就像外层的作用域映射一样，因为实例映射可能同时被多个并发线程访问甚至修改，具体取决于作用域何时处于活动状态。当你需要创建
  Bean 实例时，你将其封装在你之前创建的 `BeanInstance` 类中。这使你能够在稍后轻松地销毁作用域。


  ```

  @Override

  public <T> T get(Contextual<T> contextual, CreationalContext<T> creationalContext)
  {

  String scopeId = ACTIVE_SCOPE_THREAD_LOCAL.get().get();

  if (scopeId == null) {

  throw new ContextNotActiveException();

  }

  @SuppressWarnings("unchecked")

  T instance = (T) cache.computeIfAbsent(scopeId, s -> new ConcurrentHashMap<>())

  .computeIfAbsent(contextual,

  c -> new BeanInstance<>(contextual.create(creationalContext), contextual, creationalContext))

  .get();

  return instance;

  }

  ```




  最后需要做的是创建一个销毁指定作用域的方法。这是必要的，以便你可以清理不再需要的任何实例。首先应从作用域映射中移除实例映射，并检查移除操作是否返回了 `null`。这主要是为了防止两个线程同时销毁作用域实例。如果发生这种情况，只有一个线程能够成功地从作用域映射中移除实例映射。为了确保你确实成功地从作用域映射中移除了实例映射，你应该检查实例映射是否为
  `null`。如果它是 `null`，则说明另一个线程同时尝试删除该作用域实例，你无需采取进一步操作。如果实例映射不为 `null`，接下来需要删除所有独立的
  bean 实例。你可以通过遍历实例映射中的值，并调用你之前添加到 `BeanInstance` 类中的 `destroy()` 方法来实现。至此，该作用域及其所有
  bean 都已被删除。请注意，如果在删除期间该作用域处于活动状态，或者删除后再次变为活动状态，它本质上将是一个新的作用域。任何从已销毁作用域访问 bean 的尝试都将导致创建一个新的
  bean 实例。`destroy` 方法的调用方式与你之前声明的 `start()` 方法相同。


  ```

  public void destroy(String scopeId) {

  Map<String, BeanInstance> instances = cache.remove(scopeId);

  if (instances != null) {

  instances.values()

  .forEach(BeanInstance::destroy);

  }

  }

  ```


  现在你可以使用自定义作用域了。为此，你需要能够访问你的上下文对象。`BeanManager` 定义了一个 `getContext()` 方法，当给定一个作用域注解类时，它会返回相应的上下文对象。此方法的返回类型是
  `Context`，因此你需要将返回的上下文对象强制转换为正确的类型。然后，你可以使用返回的上下文对象来管理作用域的生命周期。下面的示例将启动你的作用域的一个新实例，在使用后将其挂起，并最终销毁它：


  ```

  CustomScopeContext context = (CustomScopeContext) beanManager.getContext(CustomScope.class);

  context.start(scopeId);

  try {

  // 使用作用域内的 bean

  context.suspend();

  } finally {

  context.destroy(scopeId);

  }

  ```


  ## 支持钝化的作用域


  支持钝化的作用域与不支持钝化的作用域类似。CDI 并未定义作用域必须何时以及如何钝化，因此这需要在实现上下文对象时决定。在大多数情况下，上下文对象会跟踪哪些作用域处于活动状态，并决定何时以及钝化哪个作用域。通常，这可以通过跟踪哪个作用域最近未被使用，然后钝化这些作用域来实现，例如，通过定期清理任务。


  你可以调整之前示例中的自定义作用域，使其成为一个支持钝化的作用域。为此，你需要向上下文添加两个私有方法：`writeToStorage()` 和 `loadFromStorage()`。这两个方法的实现留给你自己完成，因为它们完全取决于用于存储作用域的底层存储机制。我们将让加载方法返回一个用
  `Optional` 包装的作用域；原因很快就会明了。


  现在你需要添加一个钝化作用域的方法。在一个真正的支持钝化的上下文对象中，作用域很可能会根据哪个作用域最近处于活动状态而被定期钝化。然而，出于本示例的目的，你将定义一个
  `passivate()` 方法，该方法根据作用域的 ID 来钝化它。为了确保在钝化期间无法访问该作用域的任何 bean，你需要使用 `Map.compute()`
  方法来序列化该作用域并将其从作用域映射中移除。`compute()` 方法接受一个 lambda 作为参数，该 lambda 为给定的键计算一个值，如果要从映射中移除该键，则返回
  null。由于你为作用域映射使用的是 `ConcurrentHashMap`，对 `compute()` 的调用应该作为一个原子操作发生。如果另一个线程试图访问正在被钝化的作用域中的
  bean，该线程将会阻塞，直到钝化完成并且该作用域从作用域映射中被移除。


  ```

  public void passivate(String scopeId) {

  cache.compute(scopeId, (id, instanceMap) -> {

  writeToStorage(id, instanceMap);

  // TODO 检查是否需要销毁 beans

  instanceMap.values().forEach(BeanInstance::destroy);

  // 返回 null 以从缓存中移除实例映射

  return null;

  });

  }

  ```


  `get(Contextual<T>)` 方法的实现与不支持钝化的作用域非常相似。主要区别在于，如果在作用域映射中未找到该作用域，你需要尝试从存储中加载它。如果该作用域存在于存储中，那么你还需要用它更新作用域映射。你可以再次使用
  `computeIfAbsent()` 方法以线程安全的方式完成此任务。但是，如果该作用域是一个新的作用域或者已经被销毁，那么在存储中将找不到该作用域。在这种情况下，加载方法将返回一个空的
  `Optional`。当在存储中未找到映射时，你可以使用这个 optional 值来返回一个延迟创建的新的 `ConcurrentHashMap`。同样的通用方法也适用于
  `get(Contextual<T>, CreationalContext<T>)` 方法。


  ```

  @Override

  public <T> T get(Contextual<T> contextual) {

  String scopeId = ACTIVE_SCOPE_THREAD_LOCAL.get().get();

  if (scopeId == null) {

  throw new ContextNotActiveException();

  }

  @SuppressWarnings("unchecked")

  BeanInstance<T> instance =

  (BeanInstance<T>) cache.computeIfAbsent(scopeId, id -> loadFromStorage(id).orElseGet(ConcurrentHashMap::new))

  .get(contextual);

  if (instance == null) {

  return null;

  }

  return instance.get();

  }

  @Override

  public <T> T get(Contextual<T> contextual, CreationalContext<T> creationalContext)
  {

  String scopeId = ACTIVE_SCOPE_THREAD_LOCAL.get().get();

  if (scopeId == null) {

  throw new ContextNotActiveException();

  }

  @SuppressWarnings("unchecked")

  T instance = (T) cache.computeIfAbsent(scopeId, id -> loadFromStorage(id).orElseGet(ConcurrentHashMap::new))

  .computeIfAbsent(contextual,

  c -> new BeanInstance<>(contextual.create(creationalContext), contextual, creationalContext))

  .get();

  return instance;

  }

  ```


  作为最后一步，如果作用域已被保存到底层存储中，你还应该更新 `destroy` 方法以将其从该存储中删除。




  ## 覆盖内置作用域


  创建自定义作用域的另一种方法是覆盖内置作用域。这与编写普通自定义作用域基本相同，但存在一些微小但重要的差异。上下文对象关联的注解必须是待覆盖作用域的注解。另一个需要注意的重要事项是，自定义作用域绝不能与内置作用域同时处于激活状态。如果两个不同的上下文对象报告对同一注解具有激活的作用域，CDI
  容器将抛出异常。对于某些作用域，覆盖内置作用域可能意义不大。以请求作用域为例，无需覆盖作用域即可从应用程序代码对其进行管理。然而，对于 `SessionScope`
  来说，在 Java SE 应用程序中并未定义其生命周期。这导致默认情况下，Java SE CDI 应用程序无法依赖任何会话作用域的 Bean。


  要覆盖内置作用域，你可以像创建常规作用域一样创建上下文对象。主要区别在于，你需要从上下文对象中返回要覆盖的作用域注解。要注册被覆盖的作用域，现在只需在可移植扩展中注册自定义上下文对象即可。由于你使用的是之前已注册过的现有作用域注解，因此无需再次注册。自定义会话作用域的（非钝化）实现可能类似于以下示例：


  ```

  public class CustomSessionScopeContext implements Context {

  private static final ThreadLocal> ACTIVE_SCOPE_THREAD_LOCAL = ThreadLocal.withInitial(AtomicReference::new);

  @Override

  public boolean isActive() {

  return ACTIVE_SCOPE_THREAD_LOCAL.get().get() != null;

  }

  public void start(String scopeId) {

  AtomicReference activeScope = ACTIVE_SCOPE_THREAD_LOCAL.get();

  if (activeScope.get() != null) {

  throw new IllegalStateException("An instance of the scope is already active");

  }

  activeScope.set(scopeId);

  }

  public void suspend() {

  AtomicReference activeScope = ACTIVE_SCOPE_THREAD_LOCAL.get();

  if (activeScope.get() == null) {

  throw new IllegalStateException("Scope not currently active!");

  }

  activeScope.set(null);

  }

  @Override

  public Class getScope() {

  return SessionScoped.class;

  }

  private final ConcurrentHashMap, BeanInstance>> cache = new ConcurrentHashMap();

  @Override

  public  T get(Contextual contextual) {

  String scopeId = ACTIVE_SCOPE_THREAD_LOCAL.get().get();

  if (scopeId == null) {

  throw new ContextNotActiveException();

  }

  @SuppressWarnings("unchecked")

  BeanInstance instance = (BeanInstance) cache.getOrDefault(scopeId, Map.of())

  .get(contextual);

  if (instance == null) {

  return null;

  }

  return instance.get();

  }

  @Override

  public  T get(Contextual contextual, CreationalContext creationalContext) {

  String scopeId = ACTIVE_SCOPE_THREAD_LOCAL.get().get();

  if (scopeId == null) {

  throw new ContextNotActiveException();

  }

  @SuppressWarnings("unchecked")

  T instance = (T) cache.computeIfAbsent(scopeId, s -> new ConcurrentHashMap())

  .computeIfAbsent(contextual,

  c -> new BeanInstance(contextual.create(creationalContext), contextual, creationalContext))

  .get();

  return instance;

  }

  public void destroy(String scopeId) {

  Map, BeanInstance> instances = cache.remove(scopeId);

  if (instances != null) {

  instances.values().forEach(BeanInstance::destroy);

  }

  }

  }

  ```


  '
- '# 5. 事件


  观察者模式是许多应用程序中常用的设计模式。它允许一个对象将更改或其他事件通知给任意数量的其他对象，而无需在主题和观察者之间建立强耦合。考虑另一种情况，即被观察者需要单独调用每个观察者。这无法很好地扩展到大量观察者，并且会使被观察的主题与观察者之间产生强耦合。


  CDI 通过事件支持观察者模式。事件可以从任何 CDI Bean 触发，并且几乎任何 CDI Bean 都可以观察事件。每个触发的事件都有一个有效载荷，可以是任何原始类型或
  Java 对象。


  学完本章后，你将熟悉在 CDI 中触发和接收事件。你将了解如何控制 Bean 将接收哪些事件以及何时接收。你还将了解同步事件和异步事件之间的区别，并能够熟练使用两者。


  ## 事件类型


  每个 CDI 事件都与一个事件对象相关联。与 Bean 类似，每个事件也可以选择性地与一个限定符相关联。事件监听器监听特定类型的事件，并可选择性地带有限定符。CDI
  通过尝试将事件的限定符和类型与事件监听器所监听事件的限定符和类型进行匹配，来确定要通知哪些事件监听器。对于事件和监听器，限定符必须都不存在，否则必须完全匹配，遵循与常规
  Bean 相同的限定符规则。事件监听器监听的类型必须与事件对象的类型相同，或者是事件对象类型的超类型。让我们举一个例子，其中有一个 Bean 生成整数并将其作为事件触发，且不带限定符。假设有两个不带限定符的事件监听器，一个监听
  `Object` 类型的事件，另一个监听 `Integer` 类型的事件。当事件被触发时，CDI 将在运行时尝试查找合适的事件监听器。在这种情况下，事件对象是一个
  `Integer`，与 Java 中所有其他对象一样，它是 `Object` 的子类型。因此，这两个事件监听器都会收到该事件的通知。两者都与事件的限定符（不存在）匹配。图
  5-1 展示了如何根据事件类型传递事件。


  ![../images/454458_1_En_5_Chapter/454458_1_En_5_Fig1_HTML.png](img/454458_1_En_5_Fig1_HTML.png)


  图 5-1


  基于类型的事件传递示例


  在此示例中，有三个不同的观察者：一个观察 `String` 类型的事件，一个观察 `Number` 类型的事件，最后一个观察 `Object` 类型的事件。你首先触发一个
  `String` 类型的事件。由于 `String` 是 `Object` 的子类型，CDI 会将此事件分派给监听 `String` 和 `Object` 类型事件的观察者。当你随后触发一个
  `Number` 类型的事件时，情况也是如此。CDI 会将此事件传递给期望接收 `Number` 类型事件和期望接收 `Object` 类型事件的观察者。




  ## 事件观察者


  任何作用域内的 Bean 都可以通过提供观察者方法来监听 CDI 事件。当触发的事件类型和限定符与观察者方法监听的条件匹配时，观察者方法就会被调用。观察者方法可以使用任何有效的方法名称，并且可以声明为任何可见性级别，甚至是私有方法。要将一个方法声明为观察者方法，该方法必须恰好有一个参数使用
  `@Observes` 注解。该参数即为事件参数，是事件的负载。事件参数的类型决定了观察者方法将监听的事件类型。此类型可以包含泛型类型参数或通配符，因此可以监听
  `List<String>` 或 `List<?>` 类型的事件。禁止在观察者方法中使用多个带有 `@Observes` 注解的参数，否则在部署时会导致错误。


  事件参数也可以定义一个或多个限定符。如果事件参数上没有定义限定符，那么对于所有类型可赋值给事件参数的事件，无论其限定符如何，观察者方法都会收到通知。如果定义了一个或多个限定符，则仅当事件参数上的限定符是事件限定符的子集时，观察者方法才会收到事件通知。假设你有两个观察者方法，其事件参数类型均为
  `String`。第一个方法的事件参数上没有限定符，但第二个方法定义了 `@X` 和 `@Y` 作为参数。如果触发一个类型为 `String`、限定符为 `@Y`
  的事件，则只有没有限定符的方法会收到通知。相反，如果你触发一个限定符为 `@X`、`@Y` 和 `@Z` 的事件，那么两个观察者方法都会收到通知，即使限定符并非完全匹配。


  假设你有一个 Bean 会触发 `@X String` 类型的事件。你可以通过声明一个带有 `@Observes @X String` 参数的方法来实现针对此类事件的观察者方法。观察者方法的声明如下所示：


  ```

  private void onXEvent(@Observes @X String event) {

  // 在此处处理事件

  }

  ```


  默认情况下，没有任何限定符的观察者方法会收到所有匹配类型事件的通知，无论该类型上定义了哪些限定符。但是，可以通过应用 `@Default` 限定符来限制观察者方法仅监听没有限定符的事件。对于没有定义限定符的
  Bean 和注入点，会自动应用 `@Default` 限定符。事件也是如此；当事件没有显式限定符时，它也具有 `@Default` 限定符。通过显式指定默认限定符，观察者方法将仅收到具有
  `@Default` 限定符的事件通知。这意味着只有没有任何限定符的事件，或者也显式应用了 `@Default` 限定符的事件，才会触发观察者方法被通知。


  ```

  public void onEventWithoutQualifiers(@Observes @Default String event) {

  // 在此处处理事件

  }

  ```


  ### 条件事件观察者


  如前所述，当事件被触发时，它会被传递给当时处于活动状态的作用域内的所有观察者。由于 CDI Bean 的延迟初始化，监听事件的 Bean 可能尚未针对这些作用域之一进行初始化。如果观察事件的
  Bean 在事件发生时尚未创建，默认情况下，CDI 会创建该 Bean 的一个实例。有时，如果 Bean 不存在，可能不希望它在事件通知期间被创建。例如，观察
  Bean 的创建成本可能很高，并且可能只需要在满足其他条件后才观察事件。为了防止 CDI 仅仅为了传递方法而创建 Bean 实例，可以使用 `@Observes`
  注解的 `notifyObserver` 字段声明一个条件观察者方法，而不是常规的观察者方法。此字段可以接受两个值之一：`IF_EXISTS` 和 `ALWAYS`（默认值）。当
  `notifyObserver` 设置为 `ALWAYS` 时，如果给定活动作用域内尚不存在该 Bean 的实例，CDI 将始终创建一个新实例。如果 `notifyObserver`
  字段设置为 `IF_EXISTS`，则仅当 Bean 已存在于其关联的活动作用域内时，观察者方法才会被通知。以下是一个条件事件观察者的示例：


  ```

  public void onEvent(@Observes(notifyObserver = IF_EXISTS) String event) {

  // 在此处处理事件

  }

  ```


  ### 观察者排序


  默认情况下，观察者被调用的顺序是不确定的，取决于容器的实现。然而，从 CDI 2.0 开始，可以使用 `@javax.annotation.Priority`
  注解来影响观察者被调用的顺序。此注解必须应用于事件参数，并定义一个单一的 `int` 字段，该字段决定了观察者方法被调用的顺序。数字越小，观察者越早被通知。库、CDI
  或 Java EE 容器也可以注册观察者方法。这些方法可能需要在应用程序观察者被通知之前或之后运行。为了为容器、库和应用程序观察者定义清晰的排序，每个类别都有自己的基础优先级。例如，在应用程序观察者之前运行的容器观察者的基础优先级为
  0，而在应用程序观察者之前运行的库观察者的基础优先级为 1000，应用程序观察者的基础优先级为 2000。这意味着对于在应用程序代码之前运行的库观察者，1000
  到 1999 之间的任何值都是有效的优先级。幸运的是，你不必记住这些数字。`javax.interceptor.Interceptor.Priority` 类为基础优先级定义了以下常量：


  *   `PLATFORM_BEFORE`


  *   `LIBRARY_BEFORE`


  *   `APPLICATION`


  *   `LIBRARY_AFTER`


  *   `PLATFORM_AFTER`


  对于由应用程序定义的观察者，可以使用 `APPLICATION` 到 `LIBRARY_AFTER` 之间的任何优先级。要使用这些常量来帮助定义事件观察者的优先级，只需使用这些常量并添加一个偏移量来定义顺序。如果观察者没有定义
  `@Priority` 注解，则会自动使用 `APPLICATION + 500` 的优先级。例如，假设你有三个应用程序定义的观察者方法，其中第一个必须始终首先运行，第二个必须在之后某个时刻运行，第三个没有定义优先级。对于第一个观察者，你可以将优先级定义为
  `APPLICATION`。对于第二个，你可以选择任意一个较小的数字并将其添加到 `APPLICATION` 常量中。由于第三个观察者没有注解，它会自动使用 `APPLICATION
  + 500`，并将在三个观察者方法中最后被调用。以下展示了观察者排序：


  ```

  public void firstObserver(@Observes @Priority(Interceptor.Priority.APPLICATION)
  Object eventObject) {

  System.out.println("第一个被调用: " + eventObject);

  }

  public void secondObserver(@Observes @Priority(Interceptor.Priority.APPLICATION
  + 5) Object eventObject) {

  System.out.println("第二个被调用: " + eventObject);

  }

  public void thirdObserver(@Observes Object eventObject) {

  System.out.println("第三个被调用: " + eventObject);

  }

  ```




  ### 注意


  如果两个不同的观察者方法具有相同的优先级，则它们的调用顺序是未定义的。


  对于任何需要提供观察者方法的库作者来说，`LIBRARY_BEFORE` 和 `LIBRARY_AFTER` 常量可以以类似的方式使用。顾名思义，`LIBRARY_BEFORE`
  基础优先级将确保观察者方法在任何应用程序定义的观察者方法之前被调用，而 `LIBRARY_AFTER` 将在应用程序定义的观察者方法之后被调用。以下展示了库定义的观察者排序：


  ```

  public void libraryBeforeObserver(@Observes @Priority(Interceptor.Priority.LIBRARY_BEFORE)
  Object eventObject) {

  System.out.println("Called before application: " + eventObject);

  }

  public void libraryAfterObserver(@Observes @Priority(Interceptor.Priority.LIBRARY_AFTER)
  Object eventObject) {

  System.out.println("Called after application: " + eventObject);

  }

  ```


  通常，大多数开发者永远不需要使用平台级别的优先级。这些优先级主要用于 Java EE 和 CDI 容器中由平台规范定义的观察者。


  ### 事件元数据


  在某些情况下，可能需要获取关于已触发事件的额外信息。例如，可能需要根据一个或多个限定符中定义的非绑定参数来不同地处理事件，或者可能需要获取关于事件触发来源的注入点的信息。为了实现这一点，可以将一个
  `javax.enterprise.inject.spi.EventMetadata` 对象作为额外参数注入到观察者方法中。`EventMetadata` 定义了以下方法：


  *   `Set getQualifiers();`


  *   `InjectionPoint getInjectionPoint();`


  *   `Type getType();`


  `getQualifiers()` 方法可用于获取事件的限定符集合。这使得可以检查每个限定符，并可能从中提取一个或多个值。例如，如果你在事件上声明了一个 `ParameterizedQualifier`，其中包含一个你想要提取并用于事件处理的非绑定单字段，你可以使用
  `getQualifiers()` 方法获取限定符集合，然后尝试从中找到你需要的限定符。当你拥有这个限定符后，就可以从中提取任何需要的值。


  ```

  public void observerWithMetadata(

  @Observes @ParameterizedQualifier(name = "") String event,

  EventMetadata eventMetadata) {

  ParameterizedQualifier qualifier =

  eventMetadata.getQualifiers()

  .stream()

  .filter(annotation -> annotation instanceof ParameterizedQualifier)

  .map(ParameterizedQualifier.class::cast)

  .findFirst()

  .orElseThrow();

  String name = qualifier.name();

  System.out.println("Event " + event + " with name " + name + " observed.");

  }

  ```


  `getInjectionPoint()` 方法返回关于事件触发来源的注入点的信息。这不仅包括注入点本身的信息，还包括注入点所属的 Bean 的信息，包括该 Bean
  的类型、限定符，甚至作用域。这主要在需要确定事件触发位置时有用。如果事件是通过 `BeanManager` 触发的，`getInjectionPoint()`
  方法将返回 `null`，因为在这种情况下很可能没有任何注入点。


  ```

  public void observe(@Observes @MyQualifier String event, EventMetadata eventMetadata)
  {

  Bean bean = eventMetadata.getInjectionPoint().getBean();

  String scope = bean.getScope().getName();

  String beanClassName = bean.getBeanClass().getName();

  System.out.println(

  "Event " + event + " fired from bean " + beanClassName +         " with scope "
  + scope);

  }

  ```


  `getType()` 方法返回关于事件对象运行时类型的信息。这通常等同于在事件参数本身上调用 `getClass()` 的结果。


  ## 触发事件


  与观察事件类似，触发事件也相当直接。触发事件的主要方式是通过 `javax.enterprise.event.Event` 接口的实例。`Event` 接口有一个泛型类型参数，它表示该
  `Event` 实例可以触发的事件类型。例如，一个 `Event<String>` 可以触发 `String` 类型的事件。


  获取 `Event` 接口实例的主要方式是通过注入。实际上，`Event` 实例的注入方式几乎与常规 Bean 完全相同，只有一点小区别。与注入的 Bean 一样，可以为注入的
  `Event` 声明一个或多个可选的限定符。然而，与 Bean 不同的是，限定符并不决定注入哪个实例。相反，限定符将决定所触发事件的限定符。如果声明了一个或多个限定符，那么当事件被触发时，它将拥有该组给定的限定符。如果没有声明限定符，则事件将仅携带默认限定符。要注入一个用于触发不带任何限定符的事件的
  `Event`，只需使用 `@Inject` 注解它，而不带任何限定符。


  ```

  @Inject

  private Event unqualifiedEvent;

  ```


  一个能够触发带有一个或多个限定符的事件的 `Event` 可以以相同的方式注入。只需在 `Event` 上声明 `@Inject` 注解和所有必需的限定符即可注入它。


  ```

  @Inject

  @FirstQualifier @SecondQualifier

  private Event qualifiedEvent;

  ```


  `Event` 接口定义了一个 `fire(T event)` 方法，可用于触发事件。要触发一个事件，只需传递一个与事件类型匹配的对象。假设你有一个 Bean，希望在调用某个特定方法时触发一个类型为
  `String`、限定符为 `@Foo` 的事件。你可以在一个使用 `@Inject` 和 `@Foo` 注解的字段中注入一个 `Event<String>`。通过将你想要作为事件触发的
  `String` 传递给 `fire()` 方法，它就会作为一个类型为 `String`、限定符为 `@Foo` 的事件被触发。一旦触发，任何监听类型为 `String`（不带限定符或定义了
  `@Foo` 作为限定符）的事件的观察者方法都将收到通知。


  ```

  public class EventFiringBean {

  @Inject

  @Foo

  private Event event;

  public void fireEvent(String string) {

  event.fire(string);

  }

  }

  ```


  获取 `Event` 实例的另一种方法是通过 `BeanManager`。`BeanManager` 的 `getEvent()` 方法返回一个未限定的 `Event<Object>`。这看起来可能有限制，但
  `Event` 接口定义了许多 `select()` 方法，允许你缩小事件的泛型类型并定义限定符。这些方法不仅限于通过 `BeanManager` 获取的 `Event`
  实例，也可用于注入的实例。这些方法的工作方式与 `Instance` 接口上定义的 `select()` 方法类似。有三种变体：一种接受零个或多个注解，一种接受一个类和零个或多个注解，还有一种接受一个类型字面量和零个或多个注解。需要注意的是，只有注解会影响事件的投递位置。类和类型字面量都不会影响事件投递，因为事件投递是在运行时由事件对象的实际类型决定的。


  假设你想要获取一个 `Event` 实例，用于触发类型为 `String`、限定符为 `@Foo` 的事件。你可以通过 `BeanManager` 使用 `select()`
  方法，并传入 `String.class` 和一个 `@Foo` 注解的实例来获取。创建注解的实例相当繁琐；为此，你首先需要创建一个抽象类，该类继承 `AnnotationLiteral`
  类并将注解类型本身作为接口实现。完成后，你可以通过创建刚创建的匿名类的实例来创建一个 `@Foo` 的实例。以下是通过 `BeanManager` 获取事件实例的示例：




  ```

  public abstract class FooLiteral extends AnnotationLiteral implements Foo {

  }

  @Inject

  private BeanManager beanManager;

  public void fireEvent() {

  Event event = beanManager.getEvent().select(String.class, new FooLiteral() {

  });

  event.fire("通过 BeanManager 获取的事件对象");

  }

  ```


  如你所见，这是一种相当冗长的事件触发方式。因此，最好尽可能避免通过 `BeanManager` 获取 `Event` 实例。仅当你希望在运行时动态选择事件的限定符，或者无法直接注入
  `Event` 实例时，才使用此方法。


  `BeanManager` 还提供了一个 `fireEvent()` 方法，可用于在未获取 `Event` 实例的情况下触发事件。不过，该方法已在 CDI 2.0
  中弃用，不应再使用。


  我们可以将前面的内容整合起来，展示事件是如何被触发和处理的。在一个网店系统中，支付可能需要异步验证。假设你有一个管理单个订单的 `OrderService` Bean，而另一个
  Bean 可能实际负责接收支付确认。你可以使用事件，在收到支付时通知订单服务支付成功。为此，你首先需要定义事件类。我们将事件类命名为 `Order`。该类的具体内容并不重要；唯一重要的是其中包含一个订单
  ID 字段，用于唯一标识订单。以下是该事件 Bean 的粗略示例，但请注意，大部分细节已被省略。下面是一个订单类的示例：


  ```

  public class Order {

  private String orderId;

  // 为简洁起见，省略订单详情

  }

  ```


  然而，仅凭订单类型可能不足以唯一标识事件类型。事实上，不难想象，同一个 `Order` 对象可能触发多种不同类型的事件。例如，可能有订单取消、发货甚至支付失败的事件。为了确保只监听你真正需要的事件，你应该引入一个限定符。由于你只想监听支付成功的事件，因此需要定义
  `@PaymentReceived` 限定符注解。以下代码片段展示了这个用于支付成功事件的限定符注解：


  ```

  @Qualifier

  @Retention(RUNTIME)

  @Target({ElementType.FIELD, PARAMETER})

  public @interface PaymentReceived {

  }

  ```


  现在，你已同时拥有事件类型和事件的限定符，可以开始编写触发事件的 Bean 和消费事件的 Bean 了。不过，你首先需要确保在触发事件时，消费该事件的 Bean
  处于作用域内。为此，我们暂时假设你有一个由 `@OrderScoped` 注解定义的订单作用域，并且当收到外部支付通知时，在调用触发事件的方法之前，订单作用域会自动启动。再假设你有一个
  `PaymentService` 用于接收支付确认。如果你在此 Bean 中注入一个带有 `@PaymentSuccessful` 注解的 `Event<Order>`，就可以用它来触发支付事件。


  ```

  public class PaymentService {

  @Inject

  @PaymentReceived

  private Event paymentSuccesfulEvent;

  public void processPayment(Order order) {

  // 此方法仅在订单作用域激活时被调用。

  paymentSuccesfulEvent.fire(order);

  }

  }

  ```


  现在，你可以实现 `OrderService`，它将监听支付成功事件并更新订单状态。要监听事件，你需要添加一个以 `Order` 实例为主要参数的方法。为了监听正确类型的事件，你需要用
  `@Observes` 和 `@PaymentSuccessful` 注解来标记观察者方法。可能还有其他监听器依赖于在订单状态更新之后才被调用，因此你需要确保你的
  Bean 是首批被通知的 Bean 之一。由于这是一个应用定义的 Bean，你可以通过设置优先级 `APPLICATION + 5` 来让 Bean 提前运行。这会使你的观察者成为最早被调用的观察者之一，但仍为其他应优先调用的观察者预留了一些空间。以下是事件观察者
  Bean：


  ```

  @OrderScoped

  public class OrderService {

  public void onSuccessfulPayment(

  @Observes(during = AFTER_SUCCESS)

  @Priority(APPLICATION + 5)

  @PaymentReceived Order order) {

  updateOrderStatus(order);

  }

  private void updateOrderStatus(Order order) {

  // TODO 更新订单状态

  }

  }

  ```


  一旦你的应用程序收到一笔成功支付，支付服务将触发一个事件。CDI 随后会尝试传递该事件，并首先根据事件类型（`Order` 类）及其上定义的任何限定符注解来解析所有监听器。由于你的
  `OrderService` 有一个方法同时匹配事件对象的类型和事件上定义的注解，CDI 会将事件传递给你的观察者。


  ### 泛型事件类型


  需要记住的一点是，事件监听器的解析完全在运行时进行。对于带有泛型的类型，例如 `List` 和 `Set`，泛型类型信息仅在编译时可用，在运行时不可用。这意味着，对于这些类型，泛型参数无法在运行时解析。如果事件类型是
  `List<String>`，在运行时它只会被视为 `List`，而不带泛型类型参数。`List<String>` 类型的事件与 `List<Number>`
  类型的事件完全无法区分。因此，尝试触发泛型类型的事件可能会导致事件被传递给具有不兼容泛型类型的监听器，从而在运行时抛出意外的 `ClassCastException`。这意味着，与观察者方法不同，CDI
  明确禁止触发具有运行时无法解析的泛型类型参数的事件。


  然而，这并不意味着事件类型不能使用泛型。假设你有一个类 `X`，它被定义为 `class X implements List<String>`。`List` 接口定义的泛型类型参数
  `X` 在运行时是可用的，因为它是类签名的一部分。这意味着 CDI 能够正确地将类 `X` 注入到监听 `List<String>` 类型事件的监听器中。泛型类型参数允许在观察者方法声明中使用，因为这些参数是在运行时解析的。


  ```

  public class StringList implements List {

  private final List list;

  public StringList(List list) {

  this.list = list;

  }

  // 此处声明委托方法

  }

  ```


  这也为那些绝对需要触发泛型类型事件的情况提供了一种解决方案。如果泛型类型实现了一个接口，你可以创建一个包装类，该类实现相同的接口，但将泛型类型参数硬编码为类签名的一部分。为了避免重新实现原始接口，这个包装类只需包装并委托给原始实现即可。




  ### 观察者异常


  观察者方法在执行过程中偶尔会抛出异常。这可能是由多种原因造成的，例如其依赖的资源不可用，或者观察者方法的实现存在缺陷。当观察者方法抛出异常时，CDI 将停止通知事件的监听器。这意味着，如果第一个被通知的观察者方法抛出了异常，那么本应在该方法之后被通知的所有观察者方法都将不会收到该事件的通知。如果观察者方法抛出的异常是未检查异常，它将直接从
  `Event.fire()` 方法中重新抛出。当异常是已检查异常时，则无法直接重新抛出该异常。触发事件的代码必须要么捕获所有异常，要么声明它可能抛出该异常的基础类型。对于这种情况，观察者方法抛出的任何已检查异常都将被包装在一个
  `uncheckedjavax.enterprise.event.ObserverException` 中。


  ### 作用域与事件传递


  当事件被触发时，它会被传递给所有监听该事件且其作用域在当前线程中处于激活状态的 Bean。例如，假设当前线程有一个活跃的请求作用域和会话作用域，并且应用作用域始终是激活的。如果在此线程内触发了一个事件，该事件将被传递给所有应用作用域的
  Bean，以及所有与当前线程具有相同请求和会话作用域的 Bean。事件不会传递给任何依赖作用域的 Bean。这里令人困惑的一点是，一个尝试监听事件的依赖作用域
  Bean 不会被视作部署问题；如果是这种情况，CDI 容器会正常启动。然而，当事件被触发时，该监听器方法永远不会被调用。当意外地让一个依赖作用域的 Bean 监听事件时，这可能导致令人困惑的错误，因为该监听器永远不会被显式调用。


  ## 事务性事件


  许多应用程序会使用事务来确保其存储数据的一致性。如果事务失败，事务将被中止，所有与之相关的更改都将被撤销。这在事务期间触发事件时会带来一些问题，因为无法回滚事件的传递。以一家网店为例，它可能使用事件来通知供应链开始准备订单发货。如果订单支付失败，事务应该被中止，并且该事务期间的所有更改都将被撤销。如果支付失败，那就为时已晚，因为通知供应链的事件已经发出，订单仍然会被发送。即使不使用事件，当应用程序必须执行某些无法回滚的操作，但由于更改不支持事务而无法执行时，也可能会出现问题。


  幸运的是，CDI 为事务性事件和事务事件观察者提供了支持。事务事件观察者可以订阅，以便在当前事务的特定阶段被通知，而不是在事件触发时立即被通知。根据观察者订阅被通知的阶段，该事件可能永远不会被传递。例如，观察者可以订阅在事务成功完成后的事件。如果事务被回滚，则对于此事务，观察者将永远不会被通知。


  为事务性观察者触发事件的方式与普通观察者相同。如果在那个时间点有任何 JTA 事务处于激活状态，并且存在事务性观察者，那么一旦当前 JTA 事务到达观察者订阅的生命周期阶段，该观察者就会被通知。然而，如果在触发事件时没有可用的
  JTA 事务，任何事务性观察者都将被立即通知，就像它们是普通的非事务性观察者一样。


  可以使用 `@Observes` 注解中的 `during` 字段将观察者方法设置为事务性观察者方法。`during` 字段接受来自 `javax.enterprise.event.TransactionPhase`
  枚举的一个枚举值。可用的枚举值如下：


  *   `IN_PROGRESS`


  *   `BEFORE_COMPLETION`


  *   `AFTER_COMPLETION`


  *   `AFTER_SUCCESS`


  *   `AFTER_FAILURE`


  `IN_PROGRESS` 阶段是 `during` 字段的默认值。这意味着，默认情况下，任何观察者方法都自动是事务性观察者。`IN_PROGRESS` 值本身并不表示一个阶段，而是描述了观察者方法的默认行为，即立即通知观察者方法。


  `BEFORE_COMPLETION` 观察者方法将在事务完成之前直接被通知。这对于事务日志之类的东西可能很有用。如果在单个事务期间进行了多次更改，事务日志可以获取被更改实体的最终状态，并记录在当前事务期间所做的更改。由于这是在事务完成之前运行的，因此如果在更新事务日志时发生故障，整个事务也将被回滚。这将确保事务日志始终与实际所做的更改完全同步。




  ### 注意


  在事务完成前运行的观察者方法抛出的任何异常都可能导致该事务失败。


  `AFTER_COMPLETION` 观察者方法将在事务完成后立即收到通知，无论事务结果如何。这意味着无论事务是成功提交还是回滚，这些观察者都会收到通知。这对于需要在事务完成后执行某些操作、且不关心完成状态的观察者来说非常有用。


  `AFTER_SUCCESS` 观察者方法将在事务成功完成后立即收到通知。如果事务被回滚，这些观察者方法将完全不会收到通知。这适用于那些只应在事务成功完成后执行、但所做的更改无法回滚的观察者方法。任何需要调用非事务性外部
  API 的请求，都可以在成功事务后收到通知的观察者方法中执行。回想一下之前提到的网店需要通知其供应链系统的例子。另一个很好的例子是移动应用的后端，它需要发送推送通知来确认某个操作已成功完成。


  最后，`AFTER_FAILURE` 观察者方法将在事务完成后被调用，但仅当事务被回滚时才会触发。如果事务成功提交，这些观察者方法将不会被调用。这对于撤销事务期间可能已做出的某些非事务性更改非常有用。它也可以用于通知用户事务期间所做的更改已失败。例如，在网店中，如果用户下单但支付失败，可以使用失败后观察者向用户发送电子邮件，提示支付失败。


  除了显式设置 `during` 字段外，事务性观察者方法与常规观察者方法相同。您可以快速查看一个编写事务性观察者的示例。假设您有一个通知系统，可以根据用户的用户名向用户发送通知，但该通知系统不支持事务。现在，您希望在事务期间触发的事件通知用户，但仅当事务成功调用时才进行通知。为此，您可以编写一个观察者方法，监听包含用户用户名的事件。


  ```

  public class TransactionalEventDemo {

  @Inject

  private NotificationSystem notificationSystem;

  @Inject

  private Event notifyUserEvent;

  @Transactional

  public void doSomething(String username) {

  // 在此处进行更改

  notifyUserEvent.fire(new NotifyUserEvent(username));

  // 在事务提交前完成更改

  }

  private void notifyUser(@Observes(during = AFTER_SUCCESS) NotifyUserEvent event)
  {

  notificationSystem.notifyUser(event.getUsername());

  }

  }

  ```


  在某些情况下，可能无法再安排在事务的某个特定时间点通知观察者方法。例如，当事务已被标记为回滚或即将提交时，就可能出现这种情况。在这些情况下，事务性观察者方法可能会立即执行，而不是在它们本应执行的时间点执行。以应在事务失败后执行的事务性观察者为例。如果在为此观察者触发事件时事务已被标记为回滚，那么该观察者可能会直接执行，而不是在事务失败后执行。


  ## 异步事件


  默认情况下，所有观察者方法都在最初触发事件的同一线程内被调用。这意味着每个观察者方法将依次被调用，而最初触发事件的方法将被阻塞，直到最后一个观察者方法完成。如果某个观察者方法运行时间较长，触发方法可能会长时间无法运行。在某些情况下，以“触发即忘”的方式执行观察者方法可能更可取，这样触发线程可以执行其他工作，而无需等待观察者完成。


  CDI 2.0 引入了异步事件的概念。当某个方法触发事件时，发送方将不再被阻塞，直到所有监听器完成。相反，发送方会继续执行，而监听器会在一个或多个后台线程中收到通知。异步事件与常规事件非常相似，但有一些限制。首先，发送方和观察者都必须显式支持异步事件。其主要原因是，由于观察者方法在不同的线程中被调用，观察者方法可能拥有与事件触发时不同的活动作用域集合。没有任何内置作用域会自动传播到后台线程，因此它们可能对观察者方法不可用。事务也是如此；它们不会传播到后台线程，因此异步观察者不支持事务性事件。基于这些原因，发送方和观察者都必须显式选择加入异步事件。




  ### 观察异步事件


  Bean 可以通过声明异步观察者来观察异步事件。声明异步观察者方法的方式与声明同步观察者方法几乎完全相同。唯一的区别在于应用于事件参数的注解。同步观察者使用 `@Observes`
  注解，而异步观察者则使用 `@ObservesAsync` 注解。与 `@Observes` 注解类似，`@ObservesAsync` 注解也支持 `notifyObserver`
  字段，允许将观察者方法声明为条件性的。


  让我们以本章前面第一个观察者示例为例。只需将 `@Observes` 注解替换为 `@ObservesAsync` 注解，即可将其转换为异步观察者，如下所示：


  ```

  private void onXEvent(@ObservesAsync @X String event) {

  // 在此处处理事件

  }

  ```


  拥有同步观察者方法的 Bean 必须始终具有除 Dependent 作用域之外的其他作用域，但这一规则不适用于拥有异步观察者方法的 Bean。拥有异步观察者方法的
  Bean 实际上可以是（隐式地）Dependent 作用域的。在这种情况下，每次调用观察者方法时，都会创建一个新的 Bean 实例来处理该事件。拥有异步观察者方法的
  Bean 也可以具有任何其他作用域，但在显式声明作用域时必须小心。只有当具有异步观察者方法的非 Dependent 作用域 Bean 的作用域在调用该观察者方法的后台线程中处于活动状态时，该
  Bean 才会收到通知。对于内置作用域而言，这严重限制了哪些作用域可以应用于异步观察者方法，因为内置作用域不会传播到后台线程。应用程序作用域可以安全地用于异步观察者
  Bean，因为它在所有线程中始终处于活动状态。


  另一个适用于异步观察者 Bean 的作用域是请求作用域，但有一个重要的注意事项。如果你还记得上一章的内容，请求作用域被定义为：如果在执行观察者方法时没有请求作用域处于活动状态，则会在该方法执行期间启动一个请求作用域。由于请求作用域也不会传播到后台线程，这意味着每个异步观察者方法都将在一个新的请求作用域实例中执行。该实例仅在该观察者方法持续期间处于活动状态。这意味着，如果触发事件的
  Bean 有一个活动的请求作用域，那么所有异步观察者方法都将在不同的请求作用域中执行。实际上，在触发事件的线程中，请求作用域甚至根本不需要处于活动状态。


  需要注意的是，异步观察者方法仅会收到异步事件的通知。它们不会收到同步事件的通知。同时使用 `@Observes` 和 `@ObservesAsync` 注解声明事件参数也是不合法的。如果一个
  Bean 需要能够同时同步和异步地观察同一类型的事件，则该 Bean 需要声明两个独立的观察者方法。如果两种事件类型的代码完全相同，则可以将实际实现委托给第三个私有方法，以避免重复任何逻辑。以下是观察同一类型同步和异步事件的示例：


  ```

  private void onXEvent(@Observes @X String event) {

  handleEvent(event);

  }

  private void onXEventAsync(@ObservesAsync @X String event) {

  handleEvent(event);

  }

  private void handleEvent(String event) {

  // 在此处处理事件

  }

  ```


  ### 触发异步事件


  就像观察异步事件一样，触发异步事件与触发同步事件几乎完全相同。与同步事件一样，可以使用 `Event` 接口的实例来触发异步事件。除了同步的 `fire()`
  方法之外，`Event` 接口还定义了一个异步的 `fireAsync()` 方法。`fireAsync()` 方法与 `fire()` 方法一样，仅将事件对象作为其唯一参数，并且会立即返回，而不是等待观察者方法完成。


  ```

  public class AsynchronousEventFiringBean {

  @Inject

  @Foo

  private Event event;

  public void fireEvent(String string) {

  event.fireAsync(string);

  }

  }

  ```


  ### 注意


  触发异步事件时，最好使用不可变的事件对象。由于多个观察者方法可能同时执行，它们所做的任何修改都可能导致不同异步观察者方法之间的竞态条件。即使事件对象是完全线程安全的，一个观察者方法修改事件对象也可能对另一个观察者方法产生意想不到的后果。


  `fire()` 和 `fireAsync()` 方法的一个主要区别在于，`fire()` 方法不返回结果，而 `fireAsync()` 返回一个 `CompletionStage<U>`，其中
  `U` 是事件对象的编译时泛型类型。`CompletionStage` 接口是 Java 8 中引入的一个新接口，它模拟了异步计算的一个阶段。你可以将其视为 `Future`
  接口的更强大等价物（实际上，`CompletionStage` 的主要实现是 `CompletableFuture` 类）。从 `Future` 获取结果时，如果结果尚未可用，则需要调用会阻塞当前线程的方法；而
  `CompletionStage` 则允许向其附加额外的异步任务，这些任务将在其完成后执行。换句话说，使用 `Future` 你需要等待结果变得可用才能处理它，但使用
  `CompletionStage` 你可以安排另一个任务来处理结果，而无需阻塞任何线程。


  总而言之，`CompletionStage` 对于调度异步任务非常强大。我们不会在此详细讨论 `CompletionStage` 所有可能性的全部细节，而是会介绍两个对异步事件有用的用例。如果你想了解更多关于
  `CompletionStage`（及其主要实现 `CompletableFuture`）的信息，超出我们在此讨论的范围，该接口的 Javadoc 是一个很好的起点。


  `fireAsync()` 方法返回的 `CompletionStage` 模拟了调用所有相关观察者方法的过程。一旦此阶段完成，所有观察者方法都已收到通知。你可以利用这一点，让触发事件的
  Bean 收到所有相关观察者方法完成的通知。例如，触发事件的 Bean 可能持有某些资源，这些资源在所有观察者方法都收到事件通知之前无法释放。你可以通过向 `CompletionStage`
  附加一个额外的阶段来实现类似的功能。`CompletionStage` 上有许多方法可用于此目的，其中最重要的是 `thenAccept()` 和 `thenRun()`。`thenAccept()`
  方法接受一个 `Consumer` 函数，该函数“消费”前一阶段的结果。对于 `fireAsync()` 返回的 `CompletionStage`，结果就是事件对象本身。如果事件对象是确定要关闭哪个资源所必需的，这将非常有用。`thenRun()`
  方法则接受一个 `Runnable` 函数，因此它不接收任何参数。这两种方法都会直接在执行前一阶段的线程中执行传入的函数，该线程应该是执行最后一个完成的观察者方法的线程。如果在调用
  `thenAccept()` 或 `thenRun()` 时观察者方法已经完成，则这些函数会直接在调用这些方法的线程中被调用。这两种方法也都有对应的替代方法 `thenAcceptAsync()`
  和 `thenRunAsync()`，它们接受一个额外的 `Executor` 作为参数。这允许在前一阶段完成后，在某个特定的 `Executor` 实例上调用这两个函数。




  假设你有一个管理多个资源的 Bean，并希望通知所有观察者方法其关闭某个资源的意图。观察者方法可能需要在资源关闭前使用它，因此你必须等待所有观察者方法成功完成。由于需要跟踪要关闭的是哪个资源，你需要在待关闭的资源上调用
  `thenAccept()` 方法。你可以向该方法传递一个 Lambda 表达式，该表达式接收事件对象并用于关闭正确的资源。


  ```

  preResourceDisposalEvent.fireAsync(resourceId)

  .thenAccept(id -> closeResource(id));

  ```


  一旦所有观察者方法都被调用，这段代码将关闭该资源。然而，这些观察者方法中的某一个也可能会抛出异常，这将阻止后续阶段执行，从而导致资源无法关闭。


  这就引出了 `fireAsync()` 方法返回的 `CompletionStage` 的第二个主要用例：异常处理。`CompletionStage` 接口定义了一个名为
  `handle()` 的方法，可用于处理前一阶段抛出的异常。该方法接收一个 `BiFunction`，它有两个参数：前一阶段的结果和一个可选的异常。如果前一阶段没有抛出异常，或者异常已被另一个处理阶段处理，则异常参数将为
  `null`。如果抛出了异常，则异常参数将被设置为该异常，而前一阶段的结果将被设置为 `null`。请记住，如果前一阶段没有产生任何结果，那么在正常情况下，前一阶段的结果也可能是
  `null`。传递给 `handle()` 方法的函数也必须返回一个结果；该结果将被设置为该阶段的结果。如果没有异常，通常应直接返回前一阶段的结果。


  如果一个异步观察者方法抛出异常，传递给处理函数的异常参数将被设置。与同步观察者方法不同，在一个观察者方法抛出异常后，事件的处理仍将继续。这意味着不同的观察者方法可能会抛出多个异常。为了处理这种情况，一旦一个或多个观察者方法抛出异常，`CompletionStage`
  就会被标记为异常完成，并带有一个类型为 `java.util.concurrent.CompletionException` 的异常。这个 `CompletionException`
  会将所有观察者方法抛出的异常作为抑制异常包含在内。这意味着，在实现异常处理函数时，可以遍历所有由观察者方法抛出的异常。


  你可以将这一点与前面的示例结合起来，处理可能抛出的任何异常，以确保在所有观察者方法执行完毕后关闭你的资源。由于你需要资源 ID 来关闭正确的资源，因此当抛出异常时，你应该返回给定的资源
  ID。以下是一个使用异步观察者方法处理异常的示例：


  ```

  preResourceDisposalEvent.fireAsync(resourceId)

  .handle((id, exception) -> {

  if (exception != null) {

  for (Throwable suppressed : exception.getSuppressed()) {

  logThrowable(suppressed);

  }

  return resourceId;

  } return id;

  })

  .thenAccept(id -> closeResource(id));

  ```


  '
- '# 6. 装饰器与拦截器


  装饰器模式是一种相当常用的设计模式。它允许一个对象被另一个对象包装，从而使包装对象能够扩展或完全覆盖其功能。


  Java 中使用装饰器模式的两个很好的例子是 `InputStream` 和 `OutputStream` 类。包装类，如 `BufferedOutputStream`
  和 `FilteredOutputStream`，为它们所包装的 `OutputStream` 添加了功能。


  CDI 通过装饰器和拦截器来支持装饰器模式。装饰器与被装饰的 Bean 紧密耦合，可以应用于开发者无法控制的 Bean。另一方面，拦截器与被装饰的 Bean 松散耦合，并且只能应用于被装饰
  Bean 本身的定义中。由于与被装饰 Bean 的紧密联系，装饰器主要适用于覆盖你无法控制的 Bean 上的特定逻辑，而拦截器则更适用于实现更通用的服务。




  ## 装饰器


  装饰器 Bean 允许扩展甚至完全覆盖一个或多个其他 Bean 的逻辑。它们可以更改提供给 Bean 方法的任何参数，或更改方法的返回类型。装饰器 Bean 继承自它想要装饰的类型之一。这意味着在实现装饰器时，必须在编译时知道要装饰的方法。无法使用装饰器
  Bean 动态地覆盖方法。


  当一个 Bean 被装饰时，CDI 会注入一个代理而不是直接注入该 Bean。这个代理会将方法调用委托给装饰器，而不是 Bean 本身。这意味着，与作用域的情况非常相似，装饰器只能应用于可代理的类型。


  要实现一个装饰器，只需创建一个新的 Bean 类，该类继承自包含你想要装饰的方法的类型。假设你有一个 `FooBean`，它从 `FooInterface` 继承了一个你想要装饰的
  `foo()` 方法；你可以让你的装饰器 Bean 直接继承 `FooBean`，或者改为实现 `FooInterface`。装饰器 Bean 只需要实现那些需要被装饰的
  Bean，并且装饰器 Bean 类甚至可以是抽象的。当使用抽象的装饰器 Bean 类时，CDI 容器将提供一个装饰器 Bean 类的实现，该实现为装饰器 Bean
  类自身未实现的所有方法提供实现。


  接下来，必须将一个委托注入到装饰器 Bean 中。该委托必须使用 `@Inject @Delegate` 注解，并且可以像任何其他注入的依赖项一样，注入到字段、初始化器参数或构造函数参数中。委托可用于调用下一个装饰器，或者，如果没有其他装饰器了，则调用实际
  Bean 上的方法。


  委托还有另一个用途：委托的类型以及其上定义的任何限定符将决定装饰器 Bean 将装饰哪些类型的 Bean。装饰器将自动应用于任何与注入的委托类型相同或为其子类型的
  Bean。需要注意的是，委托的类型不必与装饰器 Bean 的类型匹配。委托可以实现委托类型继承自的任何类型，并且该类型定义了装饰器 Bean 将覆盖的方法。除此之外，还可以将限定符应用于委托。这将把装饰器
  Bean 的应用限制为仅那些既匹配委托类型，又具有与注入的委托相同的限定符注解的 Bean。


  假设你有一个 `GreetingBean`，它有两个独立的方法 `getGreetingMessage()` 和 `getGoodByeMessage()`，两者都返回一个字符串。你想要创建一个
  `GreetingDecoratorBean`，它将当前时间附加到 `GreetingBean` 创建的问候语之后。`GreetingBean` 本身相当简单，如清单
  6-1 所示。


  ```

  public class GreetingBean {

  public String getGreetingMessage(String name) {

  return "Hello, " + name + "!";

  }

  public String getGoodByeMessage(String name) {

  return "Good bye, " + name + "!";

  }

  }

  清单 6-1

  GreetingBean

  ```


  接下来，通过继承 `GreetingBean` 类来创建你的装饰器 Bean。你需要使用 `@Decorator` 注解装饰器 Bean 类，并且需要注入 `@Delegate`
  实例，以便你可以调用原始 Bean。然后，你只需覆盖 `getGreetingMessage()` 方法，并在委托上调用相同的方法以获取原始问候语。接着，在返回此字符串之前，将时间戳附加到它后面。参见清单
  6-2。


  ```

  @Decorator

  public class GreetingDecoratorBean extends GreetingBean {

  private static final DateTimeFormatter FORMATTER =       DateTimeFormatter.ofLocalizedTime(FormatStyle.FULL);

  @Inject

  @Delegate

  private GreetingBean greetingBean;

  @Override

  public String getHelloMessage(String name) {

  return greetingBean.getHelloMessage(name) + " The time is now "           + FORMATTER.format(LocalTime.now());

  }

  }

  清单 6-2

  GreetingDecoratorBean

  ```


  现在假设你需要支持多种语言。你从 `GreetingBean` 中提取出一个 `GreetingInterface`，并且会有多个不同的 Bean 来为每种语言提供问候语。为了区分这些
  Bean，你添加了一个 `@Language` 限定符注解，它以语言作为值。参见清单 6-3。


  ```

  @Qualifier

  @Retention(RetentionPolicy.RUNTIME)

  @Target(value = {FIELD, PARAMETER, METHOD, TYPE})

  public @interface Language {

  String value();

  }

  清单 6-3

  限定符注解

  ```


  现在你可以让你的 `GreetingDecoratorBean` 直接实现 `GreetingInterface`。因为你只关心 `getGreetingMessage()`
  方法，所以你将只实现该方法。但是，由于你总是需要实现接口定义的所有方法，你现在必须将装饰器 Bean 类声明为抽象类，因为你不会实现 `getGoodByMessage()`
  方法。该装饰器也只支持英语，因此你需要在委托字段上包含限定符注解，以确保你的装饰器不会为其他语言调用。参见清单 6-4。


  ```

  @Decorator

  @Priority(Interceptor.Priority.APPLICATION + 1)

  public abstract class GreetingDecoratorBean implements GreetingInterface {

  private static final DateTimeFormatter FORMATTER =       DateTimeFormatter.ofLocalizedTime(FormatStyle.FULL);

  @Inject

  @Delegate

  @Language("English")

  private GreetingInterface greetingBean;

  @Override

  public String getHelloMessage(String name) {

  return greetingBean.getHelloMessage(name) + " The time is now "           + FORMATTER.format(LocalTime.now());

  }

  }

  清单 6-4

  注入带有限定符的委托

  ```


  如果将来你想扩展你的装饰器以同时装饰另一种语言的 Bean，你可以简单地在委托字段上为你想支持的语言声明另一个 `@Language` 注解。该字段声明将如清单
  6-5 所示。


  ```

  @Inject

  @Delegate

  @Language("English")

  @Language("Dutch")

  private GreetingInterface greetingBean;

  清单 6-5

  为多个带限定符的 Bean 注入委托

  ```


  你也可以将你的装饰器应用于任何匹配的 Bean。你可以通过应用 `@Any` 注解而不是显式列出任何限定符来实现这一点。参见清单 6-6。


  ```

  @Inject

  @Delegate

  @Any

  private GreetingInterface greetingBean;

  清单 6-6

  将装饰器应用于多种类型的 Bean

  ```


  一个重要的要求是，装饰器 Bean 除了依赖作用域之外，不得声明任何显式的作用域。对于每个被装饰的 Bean 实例，都会创建一个新的装饰器 Bean 实例。由于这个装饰器
  Bean 是依赖作用域的，它将与其装饰的 Bean 同时被销毁。因此，对已装饰 Bean 的多次后续调用将始终由同一个装饰器 Bean 实例处理。




  一旦装饰器类编写完成，剩下的就是启用该装饰器，使其在运行时实际生效。要启用装饰器，需要为整个应用程序或单个 Bean 存档激活该装饰器。当为整个应用程序激活装饰器时，它将自动应用于所有匹配的
  Bean，无论该 Bean 定义在哪个 Bean 存档中。相反，当为单个 Bean 存档激活装饰器时，它只会应用于该 Bean 存档中定义的 Bean。这在某些业务逻辑可能需要被覆盖，但仅针对单个
  Bean 存档中的匹配 Bean 时非常有用。


  可以通过在装饰器类上应用 `@Priority` 注解来为整个应用程序激活装饰器。当存在多个活动装饰器时，`@Priority` 注解将决定装饰器的执行顺序。其工作方式与事件观察者相同。`@Priority`
  注解中数值较小的装饰器会先于数值较大的装饰器执行。由于装饰器主要用于扩展或覆盖现有 Bean 中声明的业务逻辑，大多数装饰器的优先级应介于 `Interceptor.Priority.APPLICATION`
  和 `Interceptor.Priority.LIBRARY_AFTER` 之间。要将装饰器声明为最先执行的装饰器（之一），优先级注解应定义为 `@Priority(APPLICATION)`。


  你可以使用本章前面提到的 `GreetingDecoratorBean` 并在应用程序范围内激活它。假设应用程序中的 `GreetingDecoratorBean`
  如果有多个装饰器，它应该作为最先执行的装饰器之一，但不一定是第一个。为此，你可以使用优先级 `APPLICATION + 5`。这对装饰器来说是一个相当高的优先级，但仍然为其他装饰器留出了空间，使其可以在你的新装饰器之前声明并执行。然后，你将带有新优先级的
  `@Priority` 注解应用到你的类上，这样你的装饰器类声明看起来就像下面这样。


  ```

  @Decorator

  @Priority(Interceptor.Priority.APPLICATION + 5)

  public class GreetingDecoratorBean extends GreetingBean {

  ```


  可以使用该存档的 `beans.xml` 文件仅为单个 Bean 存档激活装饰器。要在 `beans.xml` 文件中声明装饰器，必须添加一个名为 `decorators`
  的部分。每个装饰器必须使用 `class` 标签单独声明。此标签的内容必须是装饰器的完全限定名。装饰器声明的顺序决定了它们的执行顺序。先列出的装饰器将在后声明的装饰器之前执行。在应用程序级别激活的装饰器将始终在存档级别启用的第一个装饰器之前执行。这意味着，如果装饰器需要在应用程序级别激活的其他装饰器之间执行，则该装饰器本身也必须在应用程序级别激活，而不是在
  Bean 存档级别。


  ### 注意


  如果装饰器同时在应用程序级别和 Bean 存档级别被激活，则应用程序级别的激活将优先。在这种情况下，装饰器的执行时间将完全由 `@Priority` 注解决定。


  回到你的 `GreetingDecoratorBean`，你可以通过在该存档的 `beans.xml` 文件中声明它，仅为其单个 Bean 存档激活它。你只需更新你的
  `beans.xml` 存档，使其引用装饰器的完全限定类名。如果你希望任何装饰器在你的装饰器之前运行，你需要在 `GreetingDecoratorBean`
  之前声明它们。同样，任何需要在其之后运行的装饰器都应在 `GreetingDecoratorBean` 之后声明。


  ```


  com.foo.bar.GreetingDecoratorBean


  ```


  ## 拦截器


  拦截器是在 CDI 中使用装饰器模式的第二种方式。拦截器也可以被视为 CDI 中面向切面编程（AOP）的一种实现。你可能之前已经接触过 AOP。AOP 是一种通过将横切关注点与业务逻辑分离来使代码更加模块化的方法。一旦这些横切关注点被分离，它们就可以应用于任何现有代码。事务管理就是一个很好的例子。许多业务逻辑依赖于在执行该逻辑时事务处于活动状态，但事务的启动、中止或完成可以被视为横切关注点。在
  AOP 中，事务逻辑将以一种允许在需要时应用于任何业务逻辑的方式与业务逻辑分离。Spring 和 Java EE 都定义了一个 `@Transactional`
  注解，正是用于此目的。事实上，在 Java EE 中，`@Transactional` 是通过使用拦截器来实现的。如果你想了解更多关于 AOP 的信息或如何使用它的示例，强烈推荐
  Ivar Jacobson 所著的《*Aspect-Oriented Software Development with Use Cases*》一书。


  拦截器与装饰器有许多相似之处，但也存在一些重要差异。主要区别在于，拦截器并非由 CDI 规范本身定义。相反，拦截器由单独的规范定义，并且至少在理论上可以在不使用
  CDI 的情况下使用。然而，拦截器在 CDI 生态系统中占有重要地位。它们可用于启用新特性和服务，并且通常功能强大，这就是我们在此介绍它们的原因。拦截器更具动态性的特性使其适用于缓存方法结果、日志记录以及动态启动和停止作用域等场景。事实上，正如我们在作用域章节中所述，存在一种作用域，可以在调用方法时自动启动和停止请求作用域。


  与装饰器一样，拦截器也是依赖作用域的。拦截器也是以链式方式调用的。当存在多个拦截器时，每个拦截器会调用下一个拦截器，而链中的最后一个拦截器将调用被拦截的方法。拦截器和装饰器之间的一个重要区别在于，拦截器允许对
  Bean 进行动态装饰。在实现拦截器时，你不需要知道拦截器将应用于哪些类型的 Bean。相反，拦截器可以应用于大量不同的 Bean 类型，其中一些类型在编写拦截器时可能甚至尚未编写。这使得拦截器能够用于比装饰器更广泛的用例，因为装饰器主要用于扩展或覆盖业务逻辑。拦截器可用于为
  CDI Bean 提供额外的服务。例如，可以创建一个拦截器，当被拦截的方法被调用时启动一个 CDI 作用域，并在方法调用完成后销毁该作用域。另一个区别在于，装饰器自身决定它将应用于哪些
  Bean，而对于拦截器，情况则相反。是由 Bean 类来决定哪些拦截器将被调用。


  拦截器可以拦截常规方法调用、构造函数调用或定时器超时。后者主要在对企业级 JavaBean（EJB）应用拦截器时才有意义。在讨论 CDI 时，EJB 并不那么相关，因此本章不会涉及这种情况。构造函数拦截在你想在
  Bean 的构造函数被调用之前或之后执行某些操作，或者甚至想绕过构造函数调用以返回 Bean 的缓存实例时最为有用。目前，我们只关注常规方法拦截，稍后我们将更深入地探讨构造函数拦截。




  拦截器中的实际工作由拦截器方法完成。要实现一个拦截器，你只需定义一个包含拦截器方法的类。与装饰器不同，你无需实现任何接口或继承任何现有类。拦截器方法并非定义在另一个类或接口中，而是遵循一种约定。因此，拦截器方法的名称无关紧要，你可以随意命名，只要能清晰描述其功能即可。在声明拦截器方法时，有几项必须遵守的规则。首先，拦截器方法的返回类型必须是
  `Object`。这是因为，由于拦截器是动态拦截方法的，你在运行时无法知道被拦截方法的返回类型。被拦截方法的返回类型可以是任何原始类型、对象类型，甚至可以是 `void`。所有这些类型的共同点是它们都可以用对象来表示。所有原始类型都有对应的对象包装类型，而
  `void` 可以用 `null` 表示。使用 `Object` 作为返回类型，可以让你拦截任何方法，无论其返回类型是什么。


  出于同样的原因，拦截器方法还必须声明抛出 `Exception`。拦截器会（间接地）调用被拦截的方法，而你并不知道被拦截的方法会抛出哪些受检异常（如果有的话）。默认情况下，你应该向上传播被拦截方法抛出的任何异常。


  拦截器方法应接受一个 `javax.interceptor.InvocationContext` 类型的参数。`InvocationContext` 参数有一个
  `proceed()` 方法，调用该方法将触发调用链中的下一个拦截器。如果当前拦截器之后没有其他拦截器，调用 `proceed()` 将直接调用被拦截的方法本身。`proceed()`
  返回的值将是调用链中下一个拦截器或被拦截方法本身的返回值。`InvocationContext` 上还有其他几个有用的方法，我们稍后会深入探讨。


  你需要指明你的拦截器是拦截构造方法还是普通方法。要声明你的拦截器方法拦截普通方法，你需要使用 `javax.interceptor.@AroundInvoke`
  注解来标注你的拦截器方法。如果你要编写一个最简单的拦截器，它除了调用链中的下一个拦截器外什么都不做，那么它看起来会像清单 6-7 这样。


  ```

  public class DoNothingInterceptor {

  @AroundInvoke

  public Object aroundInvoke(InvocationContext context) throws Exception {

  return context.proceed();

  }

  }

  清单 6-7

  基础虚拟拦截器

  ```


  `InvocationContext` 参数定义了许多有用的方法，可用于获取关于拦截器正在拦截的目标方法的更多信息。`InvocationContext` 类定义了以下方法：


  *   `Object getTimer()`


  *   `Object proceed()`


  *   `Object[] getParameters()`


  *   `void setParameters(Object[] params)`


  *   `Method getMethod()`


  *   `Constructor<?> getConstructor()`


  *   `Object getTarget()`


  *   `Map<String,Object> getContextData()`


  `getTimer()` 方法仅用于 EJB 调用，我们在此不讨论。`proceed()` 方法你之前已经见过。当拦截器调用 `proceed()` 方法时，拦截器链中的下一个拦截器将被调用。如果当前拦截器之后没有其他拦截器，则会调用实际的
  Bean 方法。调用 `proceed()` 的结果取决于拦截器链中的拦截器本身。在正常情况下，调用 `proceed()` 的结果将是方法的返回值。如果方法本身没有返回类型，则结果将为
  `null`。


  然而，链中的任何拦截器都可以决定通过返回不同的值来覆盖 Bean 方法的结果。只要拦截器返回的值与实际方法的返回类型匹配，这就是可行的。由于拦截器的返回类型是
  `Object`，当值返回到拦截器链的顶部时，它会被转换为实际方法所需的正确类型。当最顶层拦截器返回的值与实际方法的返回类型不匹配时，会抛出 `ClassCastException`。需要注意的重要一点是，方法拦截器不一定要调用
  `InvocationContext.proceed()`。相反，拦截器可以决定完全绕过底层方法并直接返回一个值。例如，当一个方法计算结果的耗时很长，但对于相同的输入总是返回相同的结果时，这可能会很有用。可以编写一个能够缓存任何方法输出的拦截器。如果结果已经存在于缓存中，拦截器就无需调用被拦截的方法来获取结果，而是可以直接返回缓存的结果。


  我们以本章前面提到的 `GreetingBean` 为例。假设你想更改此 Bean 以及其他 Bean 返回字符串中的感叹号，但又不想修改方法本身。你可以使用拦截器来更改方法的结果。为此，你应该调用
  `InvocationContext.proceed()` 来获取方法返回的实际值。然后，你可以检查该值是否为字符串，如果是，则将任何感叹号替换为句号。参见清单
  6-8。


  ```

  @AroundInvoke

  public Object changeResponseString(InvocationContext context)   throws Exception
  {

  Object result = context.proceed();

  if (result instanceof String) {

  return ((String) result).replace(''!'', ''.'');

  }

  // 当结果不是字符串时的回退处理

  return result;

  }

  清单 6-8

  在拦截器中覆盖方法结果

  ```


  `getParameters()` 方法以数组形式返回传递给方法调用的参数。这允许拦截器检查当前调用的方法参数，并据此采取行动。例如，对于前面提到的缓存拦截器示例，可以使用参数作为缓存键来缓存实际方法的结果。数组中元素的顺序与参数在方法声明中定义的顺序相同。如果方法没有任何参数，调用
  `getParameters()` 将返回一个大小为 0 的数组。


  这样一个缓存拦截器的简单实现可以使用 `ConcurrentHashMap` 作为缓存。由于缓存键不应随时间被修改，因此通过从参数数组创建一个列表，然后从该列表创建一个不可变副本来使包含参数的缓存键不可变。参见清单
  6-9。


  ```

  private final ConcurrentHashMap, Object> cache =   new ConcurrentHashMap();

  @AroundInvoke

  public Object aroundInvoke(InvocationContext context) throws Exception {

  // 创建参数的不可变副本用作缓存键。

  List parameters = List.copyOf(Arrays.asList(context.getParameters()));

  if (cache.contains(parameters)) {

  return cache.get(parameters);

  }

  Object result = context.proceed();

  cache.put(parameters, result);

  return result;

  }

  清单 6-9

  缓存拦截器

  ```




  `setParameters()` 方法可用于更改传递给方法的实际参数。它接受一个对象数组作为参数。一旦被调用，这些参数将替代原始参数用于实际的方法调用。如果链中更靠后的拦截器调用
  `InvocationContext.getParameters()` 而非原始参数，它们也会看到新的参数。与 `getParameters()` 类似，数组中的位置与参数在方法中声明的顺序一致。传递给
  `setParameters()` 的数组必须与参数的数量完全匹配，并且每个值的类型也必须与实际参数的类型一致。就像从拦截器返回类型错误的结果一样，传递类型不正确的参数会导致抛出
  `ClassCastException`。


  在前面的示例中，你从一个方法获取结果，如果结果是字符串，则将结果中的感叹号替换为句号。你可以使用 `setParameters()` 方法对输入参数执行相同的操作。为此，你需要检查每个参数是否为字符串。如果是，则将感叹号替换为句号。然后将所有参数收集到一个新数组中，并将这个新数组传递给
  `setParameters()` 方法。参见清单 6-10。


  ```

  @AroundInvoke

  public Object replaceCharsInParameters(InvocationContext context)   throws Exception
  {

  Object[] parameters = context.getParameters();

  if (parameters.length > 0) {

  Object[] newParameters = Arrays.stream(parameters)

  .map(parameter -> {

  if (parameter instanceof String) {

  return ((String) parameter).replace(''!'', ''.'');

  }

  return parameter;

  }).toArray();

  context.setParameters(newParameters);

  }

  return context.proceed();

  }

  清单 6-10

  在拦截器中更新参数

  ```


  `getMethod()` 方法返回实际被调用的方法。这允许拦截器通过反射检查实际被调用的方法。例如，拦截器可以使用它来获取方法的名称、返回类型、期望的参数数量和类型，以及它声明的任何异常。当拦截的对象不是方法时，`getMethod()`
  将返回 `null`。`getMethod()` 返回的反射方法引用在许多情况下都很有用。例如，它可以用于记录当前被拦截的方法的信息，比如在一个测量方法调用耗时的拦截器中。


  除了 `getMethod()`，`getTarget()` 方法将返回一个对实际被拦截的 bean 的引用。这将返回一个代理实例，该实例查找底层 bean 的实例，并将任何调用委托给该实例。当与
  `getMethod()` 调用的结果结合使用时，可以对当前被拦截的方法执行另一次调用。此调用将从头重新启动整个拦截器链，这意味着当前拦截器也将被调用。这在拦截器需要强制对拦截器进行第二次调用的情况下可能很有用。


  假设你有一个拦截器，它检查方法的第一个参数。如果该参数设置为 `true`，则将其设置为 `false`，然后重新启动整个拦截器链。为了防止无限循环，如果第一个参数已经设置为
  `false`，拦截器只需调用 `InvocationContext.proceed()` 来继续链。你可以使用 `getMethod()`、`getTarget()`
  和 `getParameters()` 方法来实现这一点。首先，你需要获取方法调用的参数并检查第一个参数的值。如果确实是 `true`，则创建一个包含新值的数组副本。然后，使用你获得的引用，以目标
  bean（代理）和新的参数集作为值来调用该方法。这将重新启动整个拦截链，因此当前拦截器将再次被调用，但使用的是新值。


  ```

  @AroundInvoke

  public Object setFirstParameterToFalse(InvocationContext context)   throws Exception
  {

  Object[] parameters = context.getParameters();

  if (parameters.length > 0 && Objects.equals(parameters[0], true)) {

  Object[] newParameters = Arrays.copyOf(parameters, parameters.length);

  newParameters[0] = false;

  Object target = context.getTarget();

  Method method = context.getMethod();

  return method.invoke(target, newParameters);

  }

  return context.proceed();

  }

  ```


  `getTarget()` 返回的代理所委托的 bean 实例取决于 bean 的作用域和当前活动的作用域。对于任何依赖作用域的 bean，目标代理将委托给与被拦截的相同的
  bean 实例。对于有作用域的 bean，拦截器可以使用此方法将当前活动的作用域替换为另一个作用域，然后在新作用域的 bean 实例上重新启动整个拦截器链。


  `getContextMetadata()` 方法返回一个包含上下文元数据的映射。拦截器可以读取或更新这些元数据。这允许拦截器传递信息，然后这些信息可供拦截器链中更靠后的拦截器使用。


  要向上下文元数据添加内容，你只需获取上下文元数据映射并向其中放入一个键值对。如果链中后面的拦截器尝试从同一个键获取数据，则将返回第一个示例的值。链中更靠前的拦截器也可以通过调用
  `InvocationContext.proceed()` 后检查值，来看到链中更靠后的拦截器放入上下文元数据中的值。


  假设你想测量同一拦截器链中两个拦截器之间所花费的时间。例如，这对于测量链中多个拦截器的性能可能很有用。为此，你可以获取当前时间并将其添加到上下文元数据映射中。参见清单
  6-11。


  ```

  @AroundInvoke

  public Object aroundInvoke(InvocationContext context) throws Exception {

  Instant startTime = Instant.now();

  context.getContextData().put("startTime", startTime);

  return context.proceed();

  }

  清单 6-11

  在上下文元数据中存储数据

  ```


  在你的第二个拦截器中，你需要使用相同的键从映射中读取。请注意，该映射的值具有泛型类型 `Object`。因为中间的拦截器可能意外使用了相同的键，所以在盲目转换之前，最好检查从映射返回的值的类型。然而，一个好的方法是将拦截器的包名用作键的前缀。这将防止上下文元数据中键名的大多数冲突。在检查了上下文元数据中包含的值的类型后，你可以安全地转换并使用它。参见清单
  6-12。


  ```

  public Object aroundInvoke(InvocationContext context) throws Exception {

  Object startTime = context.getContextData().get("startTime");

  if (startTime instanceof Instant) {

  Duration duration = Duration.between((Instant) startTime, Instant.now());

  logger.info("执行耗时 " + duration.toMillis() + " 毫秒。");

  }

  return context.proceed();

  }

  清单 6-12

  从上下文元数据中读取

  ```




  ### 应用拦截器


  编写好拦截器后，需要将其应用到目标上。拦截器通常通过注解的方式应用于单个方法或整个类。当注解应用于类时，该类的每个公有方法在通过 Bean 代理调用时都会触发拦截器。这意味着
  Bean 内部的任何自调用都不会被拦截。


  通过注解应用拦截器有两种方式：可以使用通用注解，也可以使用自定义的专用拦截器注解。通用方法最为简单，只需应用 `javax.interceptor.Interceptors`
  注解即可。该注解接受一个拦截器类数组作为值。拦截器链中拦截器类的执行顺序由声明顺序决定。


  假设你有两个拦截器类 `FooInterceptor` 和 `BarInterceptor`，希望将其应用于你的类。你可以在类上定义 `@Interceptors`
  注解，并按期望的链顺序列出这两个拦截器。最终的类定义如清单 6-13 所示。


  ```

  @Interceptors({FooInterceptor.class, BarInterceptor.class})

  public class MyBean {

  // 实现方法写在这里

  }

  清单 6-13 使用 @Interceptors 应用拦截器

  ```


  使用 `@Interceptors` 注解虽然相当直接，但存在一些缺点。例如，后续无法控制或覆盖这些拦截器。这也意味着被拦截的类需要知道实现拦截器的类，且无法在后期将拦截器实现切换为另一个不同的实现。


  另一种方法是为拦截器定义自定义注解。这种方式有几个优点，因为它将被拦截的类与拦截器实现解耦。同时，它要求拦截器必须被激活，因此可以实现仅在特定条件下启用的拦截器。例如，考虑一个用于跟踪调试信息的拦截器。你可能不希望它在正常情况下处于激活状态，但又不想为了使用它而重新编译每个
  Bean 来添加拦截器。


  你可以通过实现一个拦截器绑定注解来定义自定义注解。该注解必须具有 `RUNTIME` 保留策略，并且应能同时应用于类型和方法。该注解还必须使用 `javax.interceptor.@InterceptorBinding`
  注解进行标注。一个典型的拦截器绑定如清单 6-14 所示。


  ```

  @InterceptorBinding

  @Retention(RUNTIME)

  @Target({TYPE, METHOD})

  public @interface ExampleInterceptorBindingAnnotation {

  }

  清单 6-14 一个拦截器绑定注解

  ```


  接下来，拦截器绑定注解也必须应用于拦截器本身，以便容器在运行时将绑定注解与你的拦截器实现关联起来。你还必须使用 `javax.interceptor.@Interceptor`
  注解标注拦截器类。这最后一个注解将你的拦截器类标记为注解，并告知 CDI 你正在将你的类定义为绑定注解的实现，而不是试图使用该注解将拦截器应用于当前类。请注意，`@Interceptor`
  注解仅在使用绑定注解方法时才需要出现；在其他所有情况下，你无需将其应用于拦截器。同一个拦截器绑定可以用于多个拦截器。当重用拦截器绑定时，每个被该绑定注解标注的拦截器都将被执行。这使得仅使用单个注解即可应用多个拦截器。然而，这可能会导致混淆，并且会使仅应用其中一个带有该注解的拦截器变得更加困难。因此，最好为每个独立的拦截器使用一个唯一的拦截器绑定。


  让我们创建一个名为 `MyInterceptor` 的 Bean，并将其绑定到名为 `@MyInterceptorBinding` 的注解上。你可以通过简单地在拦截器本身上同时标注
  `@Interceptor` 和 `@MyInterceptorBinding` 来将绑定与拦截器关联起来，这将使类定义如清单 6-15 所示。


  ```

  @Interceptor

  @MyInterceptorBinding

  public class MyInterceptor {

  // 拦截器方法写在这里

  }

  清单 6-15 将拦截器绑定链接到拦截器

  ```


  现在，你可以通过使用 `@MyInterceptorBinding` 注解来将拦截器应用于任何 Bean 或方法。


  ### 拦截器激活


  当你为拦截器定义了拦截器绑定注解后，该拦截器默认不会被使用。相反，拦截器必须首先被激活。与装饰器类似，拦截器既可以在单个 Bean 归档级别激活，也可以在整个应用程序范围内全局激活。这为拦截器的使用方式和时机提供了一定的灵活性。例如，可以让拦截器仅在开发期间激活，而在生产环境中停用，而无需从所有被拦截的类中移除注解。实现方式与装饰器的激活方式类似。


  要全局激活拦截器，需要在拦截器类上应用 `@Priority` 注解。与装饰器一样，数值越小表示拦截器在拦截器链中越早执行，数值越大则表示越晚执行。假设你使用本章前面的示例拦截器，并希望它作为应用程序范围的拦截器执行。你希望它成为最早运行的拦截器之一，但不一定是第一个，因此理想情况下你希望为其他拦截器在其之前运行留出一些空间。为此，你可以为拦截器设置优先级为
  `APPLICATION + 5`。拦截器类本身将如下所示：


  ```

  @Interceptor

  @MyInterceptorAnnotation

  @Priority(Interceptor.Priority.APPLICATION + 5)

  public class MyInterceptor {

  @AroundInvoke

  public Object aroundInvoke(InvocationContext context) throws Exception {

  return context.proceed();

  }

  }

  ```


  为单个 Bean 归档激活拦截器与为单个 Bean 归档激活装饰器类似。与装饰器一样，你需要在 `beans.xml` 文件中添加一个部分，该部分将按顺序列出所有要执行的拦截器。为此，你需要在要激活拦截器的归档的
  `beans.xml` 文件中添加一个名为 `interceptors` 的部分。在此部分中，添加多个 `class` 标签，其中包含拦截器类的完全限定名，就像对装饰器所做的那样。


  假设你有三个拦截器，希望它们在单个 Bean 归档中以特定顺序执行，分别命名为 `FirstInterceptor`、`SecondInterceptor` 和
  `ThirdInterceptor`。要让它们按此顺序执行，你需要在对应 Bean 归档的 `beans.xml` 文件中按该顺序定义它们。最终的 `beans.xml`
  文件将如清单 6-16 所示。


  ```


  com.foo.bar.FirstInterceptor

  com.foo.bar.SecondInterceptor

  com.foo.bar.ThirdInterceptor


  清单 6-16 在 beans.xml 中声明的拦截器

  ```




  ### 注意


  应用范围级别的拦截器始终会在归档文件特定的拦截器之前执行。如果某个拦截器同时被应用范围级别和特定 bean 归档文件激活，则应用范围级别的激活和优先级将始终优先。在这种情况下，该拦截器可能会在同一个
  `beans.xml` 文件中声明的其他拦截器之前执行，即使在该文件中它被声明为在其他拦截器之后运行。


  ### 构造函数拦截器


  拦截器也可以用于拦截对构造函数的调用。拦截构造函数调用的方式与拦截常规方法相同；唯一的区别在于应用于拦截器方法的注解。通过在方法上应用 `javax.interceptor.@AroundConstruct`
  注解而不是 `@AroundInvoke` 注解，该方法可用于拦截构造函数调用而非常规方法调用。常规方法拦截器与构造函数拦截器的另一个区别是，对于构造函数调用，`InvocationContext.proceed()`
  方法将始终返回 `null`。构造函数拦截器方法的方法签名也略有不同。虽然它们可以像常规拦截器方法一样返回 `Object`，但实际返回的值始终被忽略。由于返回值始终被忽略，因此也允许构造函数方法简单地返回
  `void`。然而，与常规拦截器方法不同，构造函数拦截器方法必须始终调用 `InvocationContext.proceed()` 以确保 bean 被实际创建。参见清单
  6-17。


  ```

  @AroundConstruct

  public Object aroundConstruct(InvocationContext context) throws Exception {

  return context.proceed();

  }

  清单 6-17

  最基本的构造函数拦截器示例

  ```


  实际上，允许将 `@AroundInvoke` 和 `@AroundConstruct` 方法应用于同一个方法。这使得单个拦截器方法可用于同时拦截构造函数和方法调用。这对于需要将拦截器应用于具有相似逻辑的构造函数和方法的情况可能很有用。例如，考虑一个拦截器，它测量执行构造函数或方法所花费的时间，然后记录此指标。此拦截器的逻辑在两种情况下完全相同，因此为了避免编写两次相同的代码或添加不必要的样板代码，可以为此定义一个单一的拦截器方法。由于拦截器方法必须同时适用于构造函数和常规方法，因此它必须具有
  `Object` 作为其返回类型。与常规拦截器方法的兼容性也是为什么允许构造函数拦截器方法返回值（即使它始终被忽略）的原因。


  ```

  @AroundInvoke

  @AroundConstruct

  Object measureInvocation(InvocationContext context) throws Exception {

  long start = System.nanoTime();

  try {

  return context.proceed();

  } finally {

  long stop = System.nanoTime();

  if (context.getConstructor() != null) {

  logger.info(context.getConstructor() + " 耗时 " + TimeUnit.NANOSECONDS.toMillis(stop
  - start) + " 毫秒。");

  }

  else {

  logger.info(context.getMethod() + " 耗时 " + TimeUnit.NANOSECONDS.toMillis(stop -
  start) + " 毫秒。");

  }

  }

  }

  ```


  我们之前简要介绍过 `InvocationContext` 上的 `getConstructor()` 方法。此方法将返回对构造函数的反射引用，可用于获取有关被拦截构造函数的更多信息。然而，与
  `getMethod()` 返回的方法引用不同，无法使用此构造函数引用通过反射创建新实例并返回它。首先，`@AroundConstruct` 方法的结果将被忽略。其次，当构造函数拦截器调用
  `InvocationContext.proceed()` 时，CDI 容器将创建一个完全托管的 bean 实例。如果你手动调用构造函数，你将得到一个非托管的
  bean 实例。由于依赖注入可能尚未发生，你最终可能会得到一个部分创建的 bean 实例，如果你尝试使用它，可能会导致错误。




  ### 拦截器与生产者方法


  以往无法对生产者方法生成的 bean 应用拦截器。虽然可以通过注解生产者方法来指示应使用某个拦截器，但该拦截器会应用于生产者方法本身，而非生产者方法所生成的 bean。值得庆幸的是，CDI
  2.0 修复了此问题，新增了一个 API，可通过 `InterceptionFactory` 类以编程方式将拦截器添加到任何非托管对象。


  `InterceptionFactory` 类可以直接注入到生产者方法中，也可以通过 `BeanManager` 创建。该类具有一个泛型类型参数，用于指定可应用拦截器的
  bean 类型。注入 `InterceptionFactory` 时，必须将泛型类型设置为与生产者方法返回类型兼容的类型。请注意，这不必与生产者方法的返回类型相同；实际上，它可以是不同的方法。首先需要配置工厂，将拦截器应用于
  bean。这可以通过工厂的 `configure()` 方法完成。该方法返回一个 `AnnotatedTypeFactory` 实例，该实例定义了一个用于添加新注解的方法。当生产者想要应用某个特定拦截器时，应创建该注解的实例并将其传递给
  `AnnotatedTypeFactory.add()`。可以使用之前章节中使用的 `AnnotationLiteral` 辅助类来创建注解实例。在工厂上配置好注解后，可以将
  bean 实例传递给工厂的 `createInterceptedInstance()` 方法，从而获得一个代理实例，该实例将启动拦截器链，而不是调用实际的 bean
  方法。


  假设有一个生产者方法，它返回一个包含前几个质数的列表，并且希望应用一个带有 `@Foo` 绑定注解的拦截器。像往常一样创建列表，然后将 `@Foo` 注解应用于拦截工厂，最后将新列表包装到代理中。现在可以返回刚创建的代理，而不是
  bean 实例本身。这样，当列表被注入到某处时，所有调用都将通过刚注册的拦截器。参见清单 6-18。


  ```

  public class FooLiteral extends AnnotationLiteral implements Foo {

  }

  public List produceInterceptedList(  InterceptionFactory> factory) {

  List numbers = List.of(2, 3, 5, 7);

  factory.configure().add(new FooLiteral());

  return factory.createInterceptedInstance(numbers);

  }

  清单 6-18

  在生产者方法中应用拦截器

  ```


  也可以通过 `BeanManager` 获取 `InterceptionFactory`。为此，需要为要注入的 bean 类型提供一个 `CreationalContext`。拥有此上下文后，需要调用
  `BeanManager` 的 `createInterceptionFactory()` 方法，并传入上下文和要应用拦截器的 bean 类型的类。结果与上一个示例中的
  `InterceptionFactory` 相同。假设使用之前的 `@Foo` 注解，并将其应用于在生产者方法中创建的 `GreetingBean` 实例；可以同时注入
  `BeanManager` 和 `CreationalContext`。创建工厂后，一切操作与上一个示例基本相同。


  ```

  public GreetingBean produceInterceptedListThroughBeanManager(  BeanManager beanManager,
  CreationalContext context) {

  InterceptionFactory factory = beanManager.createInterceptionFactory(context, GreetingBean.class);

  factory.configure().add(new FooLiteral());

  return factory.createInterceptedInstance(new GreetingBean());

  }

  ```


  在某些情况下，生产者方法可能生成一个不可代理类型的结果，因为它包含 final 方法。通常，无法将拦截器应用于不可代理类型的对象，但使用 `InterceptionFactory`
  可以实现。`InterceptionFactory` 定义了一个名为 `ignoreFinalMethods()` 的方法。调用此方法将导致生成的代理忽略被代理对象上定义的任何
  final 方法。使用此方法忽略 final 方法时，绝不能在代理上调用这些 final 方法。由于这些方法无法委托给实际的 bean 实例，它们将在代理实例上被调用，这可能导致不可预测的结果。


