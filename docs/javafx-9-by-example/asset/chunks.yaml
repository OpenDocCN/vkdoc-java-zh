    \ rgba(0,0,0, .8);\n-fx-stroke: #85ab32;\n}\n```\nListing 6-14. The `button-fun.css`\
    \ File Contains JavaFX CSS Styling Attribute to Style the Button Fun Application\
    \ Screen\n\n### How It Works\n\n*   重写 JavaFX `Application` 类中的 `init()` 方法，以加载一个\
    \ `Car` 对象数组。每个 `Car` 实例都包含一张前进的汽车图片、一张后退的汽车图片以及一个车辆描述字符串。\n*   在 `start()` 方法中，代码通过加载清单\
    \ [6-14](#A323804_3_En_6_Chapter.html#Par111) 中的 `button-fun.css` 文件开始设置场景。\n\
    *   接下来，代码创建一个切换组（`ToggleGroup`）和单选按钮（`RadioButton`），以支持车辆的选择。\n*   创建单选按钮后，代码创建一个超链接（`Hyperlink`），允许用户显示一个弹出窗口，展示所选汽车的描述。代码调用了一个我创建的私有方法，其签名如下：\n\
    \n    ```java\n    private Hyperlink createHyperLink(ToggleGroup chosenCarToggle)\n\
    \    ```\n\n*   通过传入 `chosenCarToggle` 参数，弹出窗口可以确定选择了哪种车辆类型，从而显示正确的描述。\n*   在\
    \ `createHyperLink()` 方法内部，创建弹出窗口时，代码会创建一个由两个形状（一个弧和一个矩形）联合而成的自定义形状。图 [6-10](#A323804_3_En_6_Chapter.html#Fig10)\
    \ 展示了联合之前的两个形状。在图 [6-11](#A323804_3_En_6_Chapter.html#Fig11) 中，两个形状构成了消息弹出框。\n\
    \n    ![A323804_3_En_6_Fig11_HTML.jpg](A323804_3_En_6_Fig11_HTML.jpg)\n\n    Figure\
    \ 6-11. 联合操作后的弧和矩形形状\n\n    ![A323804_3_En_6_Fig10_HTML.jpg](A323804_3_En_6_Fig10_HTML.jpg)\n\
    \n    Figure 6-10. 联合操作前的弧和矩形形状\n\n    ```java\n    Arc pointer = new Arc(0, 0,\
    \ 20, 20, -20, 40);\n    pointer.setType(ArcType.ROUND);\n    Rectangle msgRect\
    \ = new Rectangle( 18, -20, 200.5, 150);\n    Shape msgBubble = Shape.union(pointer,\
    \ msgRect);\n    ```\n\n*   显示的弹出窗口将位于超链接的右侧。以下代码片段获取了超链接的边界框位置，并将其转换为屏幕坐标。弹出窗口显示在另一个窗口（`Stage`）中。\n\
    \n    ```java\n    carInfoLink.setOnAction(actionEvent -> {\n    Bounds linkBounds\
    \ = carInfoLink.localToScreen(carInfoLink.getBoundsInLocal());\n    carInfoPopup.show(carInfoLink,\
    \ linkBounds.getMaxX(), linkBounds.getMinY() -10);\n    });\n    ```\n\n*   创建用于显示汽车信息的超链接后，我们返回到\
    \ `start()` 方法。代码创建了一个复选框（`CheckBox`）控件，用于切换汽车的前大灯。这段代码创建了一个填充颜色为半透明黄色的弧。\n* \
    \  最后，`start()` 方法中的代码创建了两个按钮，用于控制所选汽车向前或向后行驶。使用 `TranslateTransition` 动画来驱动汽车图片的移动。你将在第\
    \ [7](#A323804_3_En_7_Chapter.html) 章（涵盖 JavaFX 图形）中学习动画。\n\n## Menus\n\n菜单是窗口桌面应用程序允许用户选择选项的标准方式。例如，应用程序通常有一个“文件”菜单，提供保存或打开文件的选项（菜单项）。在窗口环境中，用户使用鼠标导航并选择菜单项。菜单和菜单项通常还具有通过组合键选择选项的功能，也称为键盘快捷键。换句话说，组合键允许无需鼠标即可快速进行菜单选择。"
