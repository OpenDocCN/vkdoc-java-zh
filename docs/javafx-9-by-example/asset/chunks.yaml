    Elements


    The `wireupUIBehavior()` method from Listing [7-16](#A323804_3_En_7_Chapter.html#Par112)
    finishes things off by adding handler code to buttons and keystrokes to view the
    previous and next image. The very last bit of setup in Listing [7-16](#A323804_3_En_7_Chapter.html#Par112)
    is a call to the `setupDragNDrop()` method, which will be discussed later, during
    the walkthrough in Listing [7-19](#A323804_3_En_7_Chapter.html#Par121).


    When the user goes to view the previous or next image, the code to load and display
    an image is the method `loadAndDisplayImage()` shown in Listing [7-17](#A323804_3_En_7_Chapter.html#Par115).
    Notice that the progress indicator is passed in as a parameter. The `progressIndicator`
    is hidden by default (its `visible` property is `false`). As the images are in
    the process of loading, the progress indicator becomes visible. It’s then hidden
    when the loading process is complete.


    ```java

    protected void loadAndDisplayImage(ProgressIndicator progressIndicator) {

    if (buttonPanel.getCurrentIndex() < 0) return;

    ImageInfo imageInfo = buttonPanel.getCurrentItem();

    progressIndicator.setVisible(true);

    Task<Image> loadImage = createWorker(imageInfo.getUrl());

    // after loading has succeeded apply image info

    loadImage.setOnSucceeded(workerStateEvent -> {

    try {

    currentViewImage.setImage(loadImage.get());

    // Rotate image view

    rotateImageView(imageInfo.getDegrees());

    // Apply color adjust

    colorAdjust = imageInfo.getColorAdjust();

    currentViewImage.setEffect(colorAdjust);

    // update the menu items containing slider controls

    updateSliders();

    } catch (InterruptedException e) {

    e.printStackTrace();

    } catch (ExecutionException e) {

    e.printStackTrace();

    } finally {

    // hide progress indicator

    progressIndicator.setVisible(false);

    }

    });

    // any failure turn off spinner

    loadImage.setOnFailed(workerStateEvent ->

    progressIndicator.setVisible(false));

    executorService.submit(loadImage);

    }

    ```

    **Listing 7-17.** The `loadDisplayImage()` Method Is Responsible for Loading an
    Image from a URL and Displaying the Image


    Listing [7-17](#A323804_3_En_7_Chapter.html#Par115) calls the `createWorker()`
    method that returns a `Task` worker; the code then adds handler code that responds
    when the success event is raised via the `setOnSucceeded()` method. Here, the
    code will set the image, apply the rotation angle, apply color adjustments to
    the image view, and update the color adjust sliders in the menu options.


    Every time a call is made to the `loadAndDisplayImage()` method, it will create
    a new `Task<Image>` callback to be run on the executor service (`executorService`).
    Listing [7-18](#A323804_3_En_7_Chapter.html#Par118) shows the creation of a new
    `Task` responsible for loading images on a background thread and displaying the
    image on the JavaFX application thread.


    ```java

    protected Task createWorker(String imageUrl) {

    return new Task() {

    @Override

    protected Image call() throws Exception {

    // On the worker thread...

    Image image = new Image(imageUrl, false);

    return image;

    }

    };

    }

    ```

