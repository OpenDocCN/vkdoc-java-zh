  trans: '

    #### 使用选择器样式定义块为节点设置样式


    选择器样式定义块始终以选择器名称开头，该名称以 `.` 或 `#` 符号为前缀。如前所述，该符号决定了选择器的类型。选择器将以左花括号开始一个代码块，随后是属性或规则定义。每个
    JavaFX 主题属性或规则都将以 `-fx-` 及其相应的属性名作为前缀。属性名和值之间用 `:` 符号分隔，并以分号结束该键值对。要完成样式块，只需用右花括号结束该块即可。选择器样式定义块的语法如下所示：


    ```

    . 或 # {

    -fx- : ;

    }

    ```


    最后要提的一点是，可以为 CSS 样式定义添加注释。要添加注释，请使用开头的斜杠星号 `/*` 和结尾的星号斜杠 `*/`（与在 C/C++ 和 Java
    中添加注释的方式相同）。下面是一个在选择器样式块定义中使用注释的示例：


    ```

    .num-button {

    -fx-background-color: white, rgb(189,218,230), white;

    /* 这是一条注释。

    -fx-background-radius: 50%;

    */

    -fx-background-insets: 0, 1, 2;

    -fx-font-family: "Helvetica";

    -fx-text-fill: black;

    -fx-font-size: 20px;

    }

    ```


    #### 通过内联 JavaFX CSS 样式属性为节点设置样式


    虽然 CSS 选择器块是为 JavaFX 节点设置样式的推荐方式，但在某些情况下，您可能希望覆盖样式属性。例如，您可能希望在鼠标光标悬停（`OnMouseEntered`）在指定按钮上时，临时放大该按钮并更改其文本颜色。当鼠标光标不再悬停（`OnMouseExited`）时，按钮的内联样式将被移除，从而将样式恢复为父级
    `class` 或 `id` 选择器样式块。要覆盖从其祖先（父级）`id` 或 `class` 选择器设置的节点样式属性，可以调用节点的 `setStyle()`
    方法。


    为了实现刚才提到的示例，以下代码片段实现了一个按钮，其中包含响应 `OnMouseEntered` 和 `OnMouseExited` 事件并切换按钮文本大小和颜色的处理程序代码。


    ```

    Button button = new Button("Press Me");

    button.getStyleClass()

    .add("my-default-style");

    button.setOnMouseEntered(actionEvent ->

    button.setStyle("-fx-font-size: 30px; -fx-text-fill: green;"));

    button.setOnMouseExited(actionEvent -> button.setStyle(""));

    ```


    #### 样式属性（规则）的限制


    由于所有图形节点都继承自 `Node` 类，派生类将能够从其祖先继承样式属性。了解节点类型的继承层次结构非常重要，因为节点类型将有助于确定您可以控制的样式属性类型。例如，`Rectangle`
    类继承自 `Shape`，而 `Shape` 又继承自 `Node`。话虽如此，您稍后会看到，一些您认为应该存在于节点上的属性实际上并不存在。那么，如何知道存在哪些属性呢？解决方案是参考
    JavaFX CSS 参考指南。同样，基于节点类型，您可以设置的样式是有限制的。


    ### 遵守 JavaFX CSS 规则


    您知道样式属性（规则）可以被覆盖吗？要覆盖属性，您必须了解规则定义时的优先级顺序。图 15-13 描绘了一个典型的场景图，其中包含一个根（父级）节点和子节点。诸如
    `BorderPane` 布局节点之类的根节点将包含一个名为 root 的类选择器，该选择器用于顶级属性。


    ![A323804_3_En_15_Fig13_HTML.jpg](img/A323804_3_En_15_Fig13_HTML.jpg)


    图 15-13.


    一个包含根节点且子节点为按钮的场景


    这些基本上是许多节点共有的属性，例如文本的字体大小或背景颜色。这对于主题化来说是一个很棒的功能，因为共享某个属性的许多节点都将继承该更改。如前所述，某些节点将包含默认选择器；例如，JavaFX
    `Button` 实例具有一个 `.button` 类选择器。


    在图 15-13 中，类选择器 root 可能具有一个与文本相关的、在许多节点中通用的属性：


    ```

    .root {

    -fx-font-size: 12px;

    }

    .button {

    -fx-font-size: 20px;

    }

    ```


    当您想要设置按钮文本字体大小的样式时，可以覆盖根节点的样式定义。为了覆盖 `-fx-font-size` 属性，按钮样式类定义块将用 20 磅字体覆盖父级的
    12 磅字体。


    信不信由你，除了刚才展示的方法之外，还有另一种方法可以覆盖类选择器 `.button` 的样式定义块。与 HTML5 CSS 类似，每个元素都有一个样式属性。JavaFX
    的图形节点也有一个样式属性（属性）。以下是一个如何在 Java 代码中以编程方式设置样式属性的示例：


    ```

    Button button = new Button("press it!");

    button.setStyle("-fx-font-size: 30px;");

    ```


    此代码将覆盖任何 `root-`、`id`- 或 `class`- 级别的选择器样式定义块。基本上，调用 `setStyle()` 方法允许您添加任意数量的属性-值对，只要它们用分号分隔即可。


    ## 自定义控件


    > “原力与你同在，卢克。” ——欧比旺·克诺比


    凭借您新获得的所有能力，还有一个强大的 API 您将需要掌握。想象一下，客户的需求要求使用专门的 UI 控件，例如 LED、仪表、旋钮和指示灯。当然，您可以尝试使用现有的
    UI 控件并为其设置样式，但这即使不是不可能，也是相当困难的。那么，年轻的学徒该怎么做呢？（现在，请说出那句名言。）欢迎来到 JavaFX 自定义控件的世界（控件
    API）！


    作为创建自定义控件的一个示例，在本节中，您将学习如何创建一个发光二极管（LED）控件。本节首先描述 LED 控件。然后，当您查看创建自定义控件所涉及的类时，您将看到代码是如何组织的。之后，在您逐步了解代码细节之前，您将有机会查看代码。

