  raw: '## Setting Environment Variables


    If you aren’t using the conveniences of `aternatives` to point to your default
    Java binaries, you can do it the old fashioned way, by setting up Java environment
    variables. There are other strategies to easily switch Java versions that I’ve
    not mentioned in this chapter, but understanding Java’s environmental variables
    will allow you to install and develop Java applications on any operating system.


    To get started you need to set and update a couple of important environment variables.
    How you set them and the values they should be set to vary depending on your choice
    of operating system. The two variables to set are the following:


    *   `JAVA_HOME`: Tells your operating system where the Java installation directory
    lives.

    *   `PATH`: Specifies where the Java executable directory resides. This environment
    variable lets the system search paths or directories containing executable files.
    Java executables reside in the `bin` directory under the `JAVA_HOME` home directory.


    The following are the environment variables to set in the 32-bit Windows operating
    system:


    ```

    set JAVA_HOME="C:\Program Files (x86)\Java\jdk-9"

    set PATH=%JAVA_HOME%\bin;%PATH%

    ```


    Set the same variables in 64-bit Windows, but the values are slightly different:


    ```

    set JAVA_HOME="C:\Program Files\Java\jdk-9"

    set PATH=%JAVA_HOME%\bin;%PATH%

    ```


    Note


    Depending on the version of the JDK the `JAVA_HOME` path, the name will change
    according to the version that was installed. For example, if the next version
    is named JDK 9.0.1, the path would likely appear as `JAVA_HOME="C:\Program Files\Java\jdk-9.0.1"`.
    To see Java 9’s JDK and JRE version naming scheme, go to the following links:


    [`http://openjdk.java.net/jeps/223`](http://openjdk.java.net/jeps/223) and


    [`https://blogs.oracle.com/java-platform-group/a-new-jdk-9-version-string-scheme`](https://blogs.oracle.com/java-platform-group/a-new-jdk-9-version-string-scheme)
    .


    On Unix-like platforms such as MacOS X and Linux, your settings and how you make
    them depend on which shell you are using. The following examples show you how
    to set the needed variables for Bash, Bourne, and CSH shells, respectively.


    ```

    # Mac OS X /bin/bash

    export JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-9.jdk/Contents/Home

    export PATH=$PATH:$JAVA_HOME/bin

    # Linux bash, bourne shell environments /bin/bash

    export JAVA_HOME=/usr/java/jdk-9 export PATH=$PATH:$JAVA_HOME/bin

    #csh environments /bin/csh

    setenv JAVA_HOME /usr/java/jdk-9

    setenv PATH ${JAVA_HOME}/bin:${PATH}

    ```


    These statements will set environment variables temporarily for the current terminal
    window session. To make `JAVA_HOME` and `PATH` more permanent, you will want to
    add them to your system upon logon such that they are always made available whenever
    you boot or log in. Depending on your operating system, you will need to be able
    to edit environment variable names and values.


    ### Setup Windows Environment Variables


    In the Windows environment you can use the keyboard shortcut Windows logo key+Pause/Break
    key, and then click the Advanced system settings (link on the left side) to display
    the Systems Properties window, as shown in Figure [1-12](#A323804_3_En_1_Chapter.html#Fig12).


    ![A323804_3_En_1_Fig12_HTML.jpg](A323804_3_En_1_Fig12_HTML.jpg)


    Figure 1-12.


    The System Properties window


    Next, click the Environment Variables button . At this point you can add, edit,
    and delete environment variables. You will add or edit the `JAVA_HOME` environment
    variable by using the installed home directory as the value. The Environment Variables
    window on the Windows operating system is shown in Figure [1-13](#A323804_3_En_1_Chapter.html#Fig13).


    ![A323804_3_En_1_Fig13_HTML.jpg](A323804_3_En_1_Fig13_HTML.jpg)


    Figure 1-13.


    Windows Environment Variables window


    To add the `JAVA_HOME` environment variable, click on the New button shown in
    Figure [1-13](#A323804_3_En_1_Chapter.html#Fig13).


    After you click the New button, the window in Figure [1-14](#A323804_3_En_1_Chapter.html#Fig14)
    appears and allows you to enter the environment variable name and value . When
    you’re done, click on the OK button.


    ![A323804_3_En_1_Fig14_HTML.jpg](A323804_3_En_1_Fig14_HTML.jpg)


    Figure 1-14.


    The Add/Edit window to enter the JAVA_HOME environment variable


    After, you’ve clicked on OK to add `JAVA_HOME`, you will need update the `Path`
    environment variable, as shown in Figure [1-15](#A323804_3_En_1_Chapter.html#Fig15).
    Select the `Path` environment variable in the System Variables area. Next, click
    on the Edit button.


    ![A323804_3_En_1_Fig15_HTML.jpg](A323804_3_En_1_Fig15_HTML.jpg)


    Figure 1-15.


    Editing the Path environment variable


    In Windows 10, you need to edit the `Path` environment variable by adding an new
    entry, as shown in Figure [1-16](#A323804_3_En_1_Chapter.html#Fig16). Here you
    will add an entry such as `%JAVA_HOME%\bin`. To add the entry, click on the New
    button. If the entry already exists , click on the Edit button. This allows the
    system to see all binary executables in the `bin` directory of the `JAVA_HOME`.
    In other words, when you are on the terminal or command-line prompt, the system
    will recognize files such as `javac.exe` for the Java compiler.


    ![A323804_3_En_1_Fig16_HTML.jpg](A323804_3_En_1_Fig16_HTML.jpg)


    Figure 1-16.


    Adding %JAVA_HOME%\bin to the Path environment variable


    In Figure [1-16](#A323804_3_En_1_Chapter.html#Fig16), the `%JAVA_HOME%\bin` entry
    was at the bottom of the list, but I moved it to the top by clicking on the Move
    Up button .'
  trans: '

    ## 设置环境变量


    如果你没有使用 `aternatives` 的便捷功能来指向默认的 Java 二进制文件，你可以通过设置 Java 环境变量，采用传统方式来完成。本章未提及还有其他策略可以轻松切换
    Java 版本，但理解 Java 的环境变量将使你能够在任何操作系统上安装和开发 Java 应用程序。


    首先，你需要设置并更新几个重要的环境变量。如何设置它们以及它们应被设置的值，取决于你所选择的操作系统。需要设置的两个变量如下：


    *   `JAVA_HOME`：告知操作系统 Java 安装目录的位置。

    *   `PATH`：指定 Java 可执行文件目录的位置。此环境变量允许系统搜索包含可执行文件的路径或目录。Java 可执行文件位于 `JAVA_HOME`
    主目录下的 `bin` 目录中。


    以下是在 32 位 Windows 操作系统中需要设置的环境变量：


    ```

    set JAVA_HOME="C:\Program Files (x86)\Java\jdk-9"

    set PATH=%JAVA_HOME%\bin;%PATH%

    ```


    在 64 位 Windows 中设置相同的变量，但值略有不同：


    ```

    set JAVA_HOME="C:\Program Files\Java\jdk-9"

    set PATH=%JAVA_HOME%\bin;%PATH%

    ```


    注意


    根据 JDK 版本的不同，`JAVA_HOME` 路径的名称会根据安装的版本而变化。例如，如果下一个版本命名为 JDK 9.0.1，那么路径很可能显示为 `JAVA_HOME="C:\Program
    Files\Java\jdk-9.0.1"`。要查看 Java 9 的 JDK 和 JRE 版本命名方案，请访问以下链接：


    [`http://openjdk.java.net/jeps/223`](http://openjdk.java.net/jeps/223) 和


    [`https://blogs.oracle.com/java-platform-group/a-new-jdk-9-version-string-scheme`](https://blogs.oracle.com/java-platform-group/a-new-jdk-9-version-string-scheme)
    。


    在类 Unix 平台（如 MacOS X 和 Linux）上，你的设置以及设置方式取决于你使用的 shell。以下示例分别展示了如何为 Bash、Bourne
    和 CSH shell 设置所需的变量。


    ```

    # Mac OS X /bin/bash

    export JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-9.jdk/Contents/Home

    export PATH=$PATH:$JAVA_HOME/bin

    # Linux bash, bourne shell environments /bin/bash

    export JAVA_HOME=/usr/java/jdk-9 export PATH=$PATH:$JAVA_HOME/bin

    #csh environments /bin/csh

    setenv JAVA_HOME /usr/java/jdk-9

    setenv PATH ${JAVA_HOME}/bin:${PATH}

    ```


    这些语句将仅为当前终端窗口会话临时设置环境变量。为了使 `JAVA_HOME` 和 `PATH` 更持久，你需要将它们添加到系统中，以便在登录时始终可用，这样无论何时启动或登录，它们都会被加载。根据你的操作系统，你需要能够编辑环境变量名称和值。


    ### 设置 Windows 环境变量


    在 Windows 环境中，你可以使用键盘快捷键 Windows 徽标键+Pause/Break 键，然后点击“高级系统设置”（左侧链接）以显示“系统属性”窗口，如图
    1-12 所示。


    ![A323804_3_En_1_Fig12_HTML.jpg](img/A323804_3_En_1_Fig12_HTML.jpg)


    图 1-12.


    系统属性窗口


    接下来，点击“环境变量”按钮。此时，你可以添加、编辑和删除环境变量。你将使用已安装的主目录作为值来添加或编辑 `JAVA_HOME` 环境变量。Windows
    操作系统上的“环境变量”窗口如图 1-13 所示。


    ![A323804_3_En_1_Fig13_HTML.jpg](img/A323804_3_En_1_Fig13_HTML.jpg)


    图 1-13.


    Windows 环境变量窗口


    要添加 `JAVA_HOME` 环境变量，请点击图 1-13 中所示的“新建”按钮。


    点击“新建”按钮后，将出现图 1-14 所示的窗口，允许你输入环境变量名称和值。完成后，点击“确定”按钮。


    ![A323804_3_En_1_Fig14_HTML.jpg](img/A323804_3_En_1_Fig14_HTML.jpg)


    图 1-14.


    用于输入 JAVA_HOME 环境变量的添加/编辑窗口


    点击“确定”添加 `JAVA_HOME` 后，你需要更新 `Path` 环境变量，如图 1-15 所示。在“系统变量”区域中选择 `Path` 环境变量。然后，点击“编辑”按钮。


    ![A323804_3_En_1_Fig15_HTML.jpg](img/A323804_3_En_1_Fig15_HTML.jpg)


    图 1-15.


    编辑 Path 环境变量


    在 Windows 10 中，你需要通过添加一个新条目来编辑 `Path` 环境变量，如图 1-16 所示。在此处，你将添加一个类似 `%JAVA_HOME%\bin`
    的条目。要添加条目，请点击“新建”按钮。如果条目已存在，请点击“编辑”按钮。这允许系统识别 `JAVA_HOME` 的 `bin` 目录中的所有二进制可执行文件。换句话说，当你在终端或命令行提示符下时，系统将能够识别诸如
    Java 编译器的 `javac.exe` 之类的文件。


    ![A323804_3_En_1_Fig16_HTML.jpg](img/A323804_3_En_1_Fig16_HTML.jpg)


    图 1-16.


    将 %JAVA_HOME%\bin 添加到 Path 环境变量


    在图 1-16 中，`%JAVA_HOME%\bin` 条目位于列表底部，但我通过点击“上移”按钮将其移到了顶部。

