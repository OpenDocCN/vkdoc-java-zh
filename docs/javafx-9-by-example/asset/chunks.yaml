  trans: "\n### 隐藏式字幕视频示例\n\n为了演示隐藏式字幕视频示例，我创建了一个名为 `ClosedCaptionVideo` 的项目。为节省篇幅，此处仅展示与媒体事件标记相关的代码部分（见代码清单\
    \ 9-14）。如需查看完整源代码，请访问本书网站并下载本章代码。\n\n在之前阅读视频媒体文件格式时，您了解到可以通过以下网址找到 `.flv` 文件：[`http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html`](http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html)。\n\
    \n我在隐藏式字幕视频示例中使用了 `20051210-w50s.flv` 文件。图 9-8 展示了在视频底部特定时间点显示的隐藏式字幕（`Label`）。用于显示文本的节点是位于底部的\
    \ JavaFX 标签。如需更改文本字体和大小，请查看 `playing-video.css` 文件。\n\n![A323804_3_En_9_Fig8_HTML.jpg](img/A323804_3_En_9_Fig8_HTML.jpg)\n\
    \n图 9-8. 隐藏式字幕视频\n\n代码清单 9-14 展示了 `playMedia()` 方法末尾设置隐藏式字幕代码的部分。请注意，媒体对象是在用户将视频文件拖放到应用程序界面后获取的。接着，代码通过查找获取隐藏式字幕标签节点，以便后续根据\
    \ `OnMarker` 事件进行更新。\n\n```\n// 获取媒体对象\nMedia media = ...\n// 查找隐藏式字幕标签\nLabel\
    \ closedCaption =\n(Label) root.lookup(\"#closed-caption-text\");\n// 倒带至开头\n\
    mediaPlayer.setOnEndOfMedia( ()-> {\nupdatePlayAndPauseButtons(true, root);\n\
    // 将按钮切换为播放按钮\nmediaPlayer.stop();\nplayAndPauseToggle.set(false);\n// 清除隐藏式字幕\n\
    closedCaption.setText(\"\");\n});\nmedia.getMarkers().put(\"比赛开始\",\nDuration.millis(1959));\n\
    media.getMarkers().put(\"他开始领先于她。\",\nDuration.millis(3395));\nmedia.getMarkers().put(\"\
    他们正在转弯\",\nDuration.millis(6060));\nmedia.getMarkers().put(\"人群在欢呼！！！\",\nDuration.millis(9064));\n\
    media.getMarkers().put(\"这位先生冲过了终点线。\",\nDuration.millis(11546));\n// 显示隐藏式字幕\n\
    mediaPlayer.setOnMarker((MediaMarkerEvent event) ->\nclosedCaption.setText(event.getMarker().getKey())\n\
    );\n代码清单 9-14. 媒体标记事件\n```\n\n### 工作原理\n\n代码清单 9-14 展示了基于有效 URL 字符串新建的 Media 对象。代码首先查找隐藏式字幕的\
    \ `Label` 节点。\n\n假设 `start()` 方法已调用私有方法 `createClosedCaptionArea()`，则根节点将包含一个\
    \ ID 为 `close-caption-text` 的 `Label` 节点。获取隐藏式字幕节点后，代码实现了当 `OnEndOfMedia` 事件触发时的处理程序。该处理程序会更新播放和暂停按钮的显示状态，同时清除隐藏式字幕的\
    \ `Label` 节点。\n\n接下来，代码将键/值对作为标记添加到媒体中。每个标记对包含一个 `String` 类型的键和一个 `Duration` 类型（以毫秒为单位）的值。该时长是触发\
    \ `OnMarker` 事件的时间点。\n\n您会立即注意到，`setOnMarker()` 方法通过一个参数类型为 `MediaMarkerEvent`\
    \ 的 lambda 表达式进行设置。当 `OnMarker` 事件触发时，会调用 `MediaMarkerEvent` 闭包代码。该闭包代码仅将 `closedCaption`（`javafx.scene.control.Label`）节点的文本设置为键的值，作为隐藏式字幕文本。\n\
    \n## 本章小结\n\n在本章中，您探索了 JavaFX 媒体的世界。您首先学习了媒体事件以及在使用 JavaFX Media API 时基于事件的编程。接着，您了解了如何轻松地将媒体文件创建为\
    \ URL 字符串进行加载和播放。在学习了 `MediaPlayer` API 后，您有机会查看了一个 MP3 音频播放器示例，该示例展示了诸如 Seek、Stop、Pause\
    \ 和 Play 等功能。您还学习了如何使用 `AudioSpectrumListener` 接口实现炫酷的可视化效果。\n\n在学习了音频媒体之后，您又学习了视频。您了解了当前支持的媒体格式，如\
    \ MPEG-4 和 FLV。然后您看到了一个基本的 JavaFX 视频播放器应用程序示例。在此过程中，您发现播放视频与播放音频基本相同，区别仅在于使用了能够显示视频的\
    \ `MediaView` 节点。最后，您接触了一个关于媒体标记事件（`MediaMarkerEvent`）的简短示例，用于模拟隐藏式字幕视频。\n\n#\
    \ 10. JavaFX 在 Web 中的应用\n\nJavaFX 提供了与 HTML5 内容互操作的能力。JavaFX 底层的网页渲染引擎是广受欢迎的开源\
    \ C++ API——WebKit。该 API 被用于 Apple 的 Safari 浏览器、Amazon 的 Kindle 设备，并在 Google 的\
    \ Chrome 浏览器 27 版本之前被使用（WebKit 的分支称为 Blink）。HTML5 是在网页浏览器中渲染内容的事实标准标记语言。HTML5\
    \ 内容包括 JavaScript、CSS、可缩放矢量图形（SVG）、Canvas API、媒体、XML 以及新的 HTML 元素标签。简而言之，您可以创建嵌入了类似网页浏览器功能的\
    \ JavaFX 应用程序。\n\nJavaFX 与 HTML5 之间的关系是一种重要的结合，因为它们通过发挥各自的优势相互补充。例如，JavaFX 丰富的客户端\
    \ API 与 HTML5 丰富的网页内容相结合，创造了一种兼具原生桌面软件特性的网页应用用户体验。这种新型应用程序被称为富互联网应用程序（RIA）。\n\n\
    在深入探讨示例应用程序之前，本章将讨论以下核心 Java/JavaFX 基于 Web 的 API：\n\n*   Java 9 模块 `javafx.web`，包命名空间：`javafx.scene.web`\n\
    \    *   `WebEngine`\n    *   `WebView`\n    *   `WebEvent`\n*   Java 9 模块：`jdk.jsobject`，包命名空间：`netscape.javascript`\n\
    \    *   `JSObject`\n*   Java 9 模块：`jdk.incubator.httpclient`，包命名空间：`jdk.incubator.http`。模块\
    \ `jdk.incubator.httpclient` 目前在 Java 9 中仍处于实验阶段。根据一些报告，该模块将在 Java 10 中最终确定并命名为\
    \ `java.httpclient`。\n    *   `HttpClient`\n    *   `HttpRequest`\n    *   `HttpResponse`\n\
    \n在本章中，您将研究实现以下功能的示例应用程序：\n\n*   将 HTML5 内容显示到 `WebView` 节点中（基于 SVG 的模拟时钟）\n*\
    \   Java 与 JavaScript 之间的通信（`WeatherWidget`）\n"
- fmt: "# JavaFX Web and HTTP2 APIs\n\nBefore learning about JavaFX Web and HTTP2\
    \ APIs, I want to mention that the code examples in this chapter were developed\
    \ as Java 9 modules (Jigsaw). Having said this, I thought it might be a good idea\
    \ to show you a module definition with the three modules discussed throughout\
    \ this chapter:\n\n* `javafx.web` - `WebEngine` and `WebView`\n* `jdk.jsobject`\
    \ - `JSObject`\n* `jdk.incubator.httpclient` - `HttpClient`, `HttpRequest`, `HttpResponse`\n\
    \nShown here is a typical application module that depends on these three modules:\n\
    \n```\nmodule com.jfxbe.myapplicationmodule {\n    requires javafx.web;\n    requires\
    \ jdk.jsobject;\n    requires jdk.incubator.httpclient;\n    exports com.jfxbe.myapplicationmodule;\n\
    }\n```\n\nAs a quick reference for the impatient reader, Table [10-1](#A323804_3_En_10_Chapter.html#Tab1)\
    \ contains the modules and their class descriptions. I also provide a short code\
    \ snippet on how to use the various APIs relating to JavaFX Web and HTTP2 APIs\
    \ in the description column. To see a more detailed discussion related to each\
    \ class, you can skip Table [10-1](#A323804_3_En_10_Chapter.html#Tab1).\n\n**Table\
    \ 10-1.** Description of Classes Contained Within the Java Modules\n\n| Module\
    \ Name | Class Name | Description |\n| --- | --- | --- |\n| `javafx.web` | `javafx.scene.web.WebEngine`\
