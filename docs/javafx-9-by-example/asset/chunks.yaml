    GitHub: [`https://github.com/dukke/FXRibbon`](https://github.com/dukke/FXRibbon)

    *   Custom JavaFX Styling by Narayan G. Maharjan: [`http://blog.ngopal.com.np/2012/07/11/customize-scrollbar-via-css/`](http://blog.ngopal.com.np/2012/07/11/customize-scrollbar-via-css/)
    [`http://blog.ngopal.com.np`](http://blog.ngopal.com.np) Twitter: `@javadeveloping`

    *   Undecorator by Arnaud Nouard: A library to create irregular shaped semi-transparent
    windows for your applications: [`https://github.com/in-sideFX/UndecoratorBis`](https://github.com/in-sideFX/UndecoratorBis)
    Twitter: `@In_SideFX`

    *   JavaFx JFoenix Tutorial #2 : Material Design Buttons: [`https://youtu.be/22QlOj6JVe4`](https://youtu.be/22QlOj6JVe4)

    *   Ten Ways to Make Your JavaFX App Shine by Martin Gunnarsson and Pär Sikö:
    [`https://www.youtube.com/watch?v=98ZmnN215m0`](https://www.youtube.com/watch%3Fv=98ZmnN215m0)'
