- fmt: "# Touching, Rotating, and Zooming in 3D\n\nWhen you’re manipulating a 3D scene,\
    \ the most important interactions are typically rotations and zooming, which are\
    \ most concerned with moving and changing the orientation of objects or the camera.\
    \ Integrating gesture support into your 3D application is a natural enhancement\
    \ over the traditional mouse and keyboard. JavaFX `Shape3D` objects, whether primitives\
    \ or custom triangle meshes, support all gesture events, such as `Rotate` and\
    \ `Zoom`, by default.\n\nTo demonstrate using gesture events within a JavaFX 3D\
    \ scene, we add `touchStationary`, `Rotate`, and `Zoom` gesture events to a `TriangleMesh`\
    \ example.\n\nThe base `TriangleMesh` example creates four pyramid `TriangleMesh`\
    \ objects, each added to a `MeshView` container to be visible. Each `MeshView`\
    \ container is added to a `Group` node, which is then added to the 3D scene graph.\n\
    \nWe want to enhance the scene by adding a `Rotate` gesture event to each pyramid.\
    \ A user should be able to touch a pyramid and then rotate it about the z-axis\
    \ using a rotation gesture. If you read the previous example in this chapter,\
    \ you know that we need to add an event handler for the `Rotate` gesture, in this\
    \ case `OnRotate`. However, you must first provide a means to notify your application\
    \ as to which onscreen object is intended to rotate, or else you should rotate\
    \ the camera perspective. If you stay within the multi-touch paradigm, you will\
    \ first need to add an event handler for `OnTouchStationary`. The `OnTouchStationary`\
    \ event indicates to the application that a single touch has occurred and has\
    \ remained in the same relative location. This differentiates the event from `OnTouchPressed`\
    \ and `OnTouchMoved`, which occur immediately when any touch occurs on the device,\
    \ whether it is part of a movement gesture or not.\n\nThe strategy is to select\
    \ an onscreen object as the active node to be the focus of subsequent gestures.\
    \ The `OnTouchStationary` event will occur before any `OnRotate` or `OnZoom` events,\
    \ so the `activeNode` will be available to those following gesture events. You\
    \ can use this event to select the active node by adding the following event handler:\n\
    \n```\nscene.setOnTouchStationary(event -> {\n    Node picked = event.getTouchPoint().getPickResult().getIntersectedNode();\n\
    \    if (null != picked) {\n        activeNode = picked;\n    } else {\n     \
    \   activeNode = camera;\n    }\n    event.consume();\n});\n```\n\nYou can access\
    \ the location data via the `TouchPoint` object. The `TouchPoint` object has picking\
    \ support built-in, which automatically gives you access to the intersected node,\
    \ which is to say the onscreen object `picked`. If no object is picked, that is,\
    \ the touch was not over an onscreen object, then the camera is set as the `activeNode`.\
    \ Now you can add the `OnRotate` event handler:\n\n```\nscene.setOnRotate(event\
    \ -> {\n    if (null == activeNode) {\n        activeNode = camera;\n    }\n \
    \   activeNode.setRotationAxis(Rotate.Z_AXIS);\n    activeNode.setRotate(activeNode.getRotate()\
    \ + event.getAngle());\n    event.consume();\n});\n```\n\nAccess the rotation\
    \ value provided by the `Rotate` gesture using `event.getAngle()` and add it to\
    \ whatever the previous rotation value was for the current node. This will spin\
    \ the object onscreen. If the user is touching nothing, then the camera itself\
    \ is rotated, which will cause the entire scene to appear to rotate. Figure [14-2](#A323804_3_En_14_Chapter.html#Fig2)\
    \ shows what your scene will look like when you apply a rotation gesture to several\
    \ of the scene objects—in this case the filled ones.\n\n![A323804_3_En_14_Fig2_HTML.jpg](A323804_3_En_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2. Rotating 3D pyramids using gestures\n\nNote: All objects in any\
    \ scene are technically nodes. However, when picking objects, JavaFX returns a\
    \ reference to the `MeshView` object. Any `Group` containers are ignored, as a\
    \ `Group` container will present its contained node objects to the `Picking` API\
    \ first, and the `Grabbing` API will only deliver the `TouchPoint` event to the\
    \ topmost `Node` (in terms of z-order) onscreen.\n\nNow let’s follow the same\
    \ pattern and give the user the ability to scale the `activeNode`. This will provide\
    \ an effect of enlarging or shrinking the selected node. For this, you leverage\
    \ the `OnZoom` event:\n\n```\nscene.setOnZoom(event -> {\n    if(null == activeNode)\
    \ {\n        activeNode = camera;\n    }\n    double zoomFactor = event.getZoomFactor();\n\
    \    zoomFactor *= zoomFactor < 1.0 ? -1 : 1;\n    activeNode.setScaleX(activeNode.getScaleX()\
    \ + zoomFactor / 50);\n    activeNode.setScaleY(activeNode.getScaleY() + zoomFactor\
    \ / 50);\n    activeNode.setScaleZ(activeNode.getScaleZ() + zoomFactor / 50);\n\
    \    event.consume();\n});\n```\n\nThe `Zoom` event provides a double `ZoomFactor`,\
    \ which is a positive value from 0.0 and up. Values returned between 0.0 and 1.0\
    \ indicate a “pinch” zoom gesture. Values returned higher than 1.0 indicate a\
    \ “spread” zoom gesture. Here, you can use the “pinch” values to negatively scale\
    \ the object while the “spread” values can positively scale the object. Figure\
    \ [14-3](#A323804_3_En_14_Chapter.html#Fig3) is an example of the screen when\
    \ you apply a zoom gesture to several of the scene objects.\n\n![A323804_3_En_14_Fig3_HTML.jpg](A323804_3_En_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3. Zooming 3D pyramids using gestures\n\nThese three event handlers—`OnTouchStationary`,\
    \ `OnRotate`, and `OnZoom`—have enabled multi-touch gesture support in your 3D\
    \ scene. The effects stack on each other, as users can rotate and zoom simultaneously\
    \ using a combination of “pinch” and “spin” movements with their fingers. Not\
    \ only is this type of interaction quite natural to humans but is typically easier\
    \ than with a mouse and keyboard solution.\n\nNote: Here, we are “scaling” our\
    \ zoom with a fixed integer of 50. This is needed to compensate for the difference\
    \ between onscreen coordinates and scaling coordinates. It is common practice\
    \ when dealing with 3D scenes and can be thought of as a sensitivity variable.\n\
    \n# The Leap Motion Controller\n\nThe Leap Motion controller (see Figure [14-4](#A323804_3_En_14_Chapter.html#Fig4)),\
    \ also known as the Leap, is a small device, 80×30×12 mm, that is connected to\
    \ your computer through the USB port. It doesn’t require an external power source.\n\
    \n![A323804_3_En_14_Fig4_HTML.jpg](A323804_3_En_14_Fig4_HTML.jpg)\n\nFigure 14-4.\
    \ Leap Motion device and its box\n\nThe Leap software works in Windows, MacOS\
    \ X, and Linux, and with an initial price of $79.99, was launched in July 2013\
    \ with an initial batch of 600,000 units sold around the world.\n\nThe company\
    \ has some introductory videos here: [https://www.leapmotion.com/](https://www.leapmotion.com/).\
    \ After you watch a few of them, you will be surprised by the apparently magic\
    \ performance of the device.\n\nBasically, the Leap will scan your hands at a\
    \ very fast rate and translate your movements and gestures to the computer in\
    \ a very precise way, so any Leap-enabled application can be interfaced directly,\
    \ without the need of using a mouse, keyboard, or any other physical device.\n\
    \nAs a new era of interaction with machines is beginning, many challenges are\
    \ appearing at the same time. As users, we’ll need to learn how to interact in\
    \ 3D environments, performing a whole new repertoire of gestures, while as developers,\
    \ we will face the challenge of providing the software capable of translating\
    \ accurately those gestures, so new applications will respond as we expect. With\
    \ the hand tracking provided, Leap Motion is currently reaching into virtual and\
    \ augmented reality to interact with new worlds, partnering with major VR manufacturers\
    \ to embed Leap Motion technology into mobile VR/AR headsets.\n\nIn this chapter,\
    \ we focus on the desktop controller and start by describing the hardware and\
    \ software provided by Leap Motion. Then we will talk about the API for developing\
    \ JavaFX programs with the device and present a sample application to show what\
    \ is possible to achieve once you have a Leap device in your hands."
  raw: '## Touching, Rotating, and Zooming in 3D


    When you’re manipulating a 3D scene, the most important interactions are typically
    rotations and zooming, which are most concerned with moving and changing the orientation
    of objects or the camera. Integrating gesture support into your 3D application
    is a natural enhancement over the traditional mouse and keyboard. JavaFX `Shape3D`
    objects, whether primitives or custom triangle meshes, support all gesture events,
    such as `Rotate` and `Zoom`, by default.


    To demonstrate using gesture events within a JavaFX 3D scene, we add `touchStationary`,
    `Rotate`, and `Zoom` gesture events to a `TriangleMesh` example.


    The base `TriangleMesh` example creates four pyramid `TriangleMesh` objects, each
    added to a `MeshView` container to be visible. Each `MeshView` container is added
    to a `Group` node, which is then added to the 3D scene graph.


    We want to enhance the scene by adding a `Rotate` gesture event to each pyramid.
    A user should be able to touch a pyramid and then rotate it about the z-axis using
    a rotation gesture. If you read the previous example in this chapter, you know
    that we need to add an event handler for the `Rotate` gesture, in this case `OnRotate`.
    However, you must first provide a means to notify your application as to which
    onscreen object is intended to rotate, or else you should rotate the camera perspective.
    If you stay within the multi-touch paradigm, you will first need to add an event
    handler for `OnTouchStationary`. The `OnTouchStationary` event indicates to the
    application that a single touch has occurred and has remained in the same relative
    location. This differentiates the event from `OnTouchPressed` and `OnTouchMoved`,
    which occur immediately when any touch occurs on the device, whether it is part
    of a movement gesture or not.


    The strategy is to select an onscreen object as the active node to be the focus
    of subsequent gestures. The `OnTouchStationary` event will occur before any `OnRotate`
    or `OnZoom` events, so the `activeNode` will be available to those following gesture
    events. You can use this event to select the active node by adding the following
    event handler:


    ```

    scene.setOnTouchStationary(event -> {

    Node picked = event.getTouchPoint().getPickResult().getIntersectedNode();

    if (null != picked) {

    activeNode = picked;

    } else {

    activeNode = camera;

    }

    event.consume();

    });

    ```


    You can access the location data via the `TouchPoint` object. The `TouchPoint`
    object has picking support built-in, which automatically gives you access to the
    intersected node, which is to say the onscreen object `picked`. If no object is
    picked, that is, the touch was not over an onscreen object, then the camera is
    set as the `activeNode`. Now you can add the `OnRotate` event handler :


    ```

    scene.setOnRotate(event -> {

    if (null == activeNode) {

    activeNode = camera;

    }

    activeNode.setRotationAxis(Rotate.Z_AXIS);

    activeNode.setRotate(activeNode.getRotate() + event.getAngle());

    event.consume();

    });

    ```


    Access the rotation value provided by the `Rotate` gesture using `event.getAngle()`
    and add it to whatever the previous rotation value was for the current node. This
    will spin the object onscreen. If the user is touching nothing, then the camera
    itself is rotated, which will cause the entire scene to appear to rotate. Figure
    [14-2](#A323804_3_En_14_Chapter.html#Fig2) shows what your scene will look like
    when you apply a rotation gesture to several of the scene objects—in this case
    the filled ones.


    ![A323804_3_En_14_Fig2_HTML.jpg](A323804_3_En_14_Fig2_HTML.jpg)


    Figure 14-2.


    Rotating 3D pyramids using gestures Note


    All objects in any scene are technically nodes. However, when picking objects,
    JavaFX returns a reference to the `MeshView` object. Any `Group` containers are
    ignored, as a `Group` container will present its contained node objects to the
    `Picking` API first, and the `Grabbing` API will only deliver the `TouchPoint`
    event to the topmost `Node` (in terms of z-order) onscreen.


    Now let’s follow the same pattern and give the user the ability to scale the `activeNode`.
    This will provide an effect of enlarging or shrinking the selected node. For this,
    you leverage the `OnZoom` event:


    ```

    scene.setOnZoom(event -> {

    if(null == activeNode) {

    activeNode = camera;

    }

    double zoomFactor = event.getZoomFactor();

    zoomFactor *= zoomFactor < 1.0 ? -1 : 1;

    activeNode.setScaleX(activeNode.getScaleX() + zoomFactor / 50);

    activeNode.setScaleY(activeNode.getScaleY() + zoomFactor / 50);

    activeNode.setScaleZ(activeNode.getScaleZ() + zoomFactor / 50);

    event.consume();

    });

    ```


    The `Zoom` event provides a double `ZoomFactor`, which is a positive value from
    0.0 and up. Values returned between 0.0 and 1.0 indicate a “pinch” zoom gesture.
    Values returned higher than 1.0 indicate a “spread” zoom gesture . Here, you can
    use the “pinch” values to negatively scale the object while the “spread” values
    can positively scale the object. Figure [14-3](#A323804_3_En_14_Chapter.html#Fig3)
    is an example of the screen when you apply a zoom gesture to several of the scene
    objects.


    ![A323804_3_En_14_Fig3_HTML.jpg](A323804_3_En_14_Fig3_HTML.jpg)


    Figure 14-3.


    Zooming 3D pyramids using gestures


    These three event handlers—`OnTouchStationary`, `OnRotate`, and `OnZoom`—have
    enabled multi-touch gesture support in your 3D scene . The effects stack on each
    other, as users can rotate and zoom simultaneously using a combination of “pinch”
    and “spin” movements with their fingers. Not only is this type of interaction
    quite natural to humans but is typically easier than with a mouse and keyboard
    solution.


    Note


    Here, we are “scaling” our zoom with a fixed integer of 50\. This is needed to
    compensate for the difference between onscreen coordinates and scaling coordinates.
    It is common practice when dealing with 3D scenes and can be thought of as a sensitivity
    variable.


    ## The Leap Motion Controller


    The Leap Motion controller (see Figure [14-4](#A323804_3_En_14_Chapter.html#Fig4)),
    also known as the Leap , is a small device, 80×30×12 mm, that is connected to
    your computer through the USB port. It doesn’t require an external power source.


    ![A323804_3_En_14_Fig4_HTML.jpg](A323804_3_En_14_Fig4_HTML.jpg)


    Figure 14-4.


    Leap Motion device and its box


    The Leap software works in Windows, MacOS X, and Linux, and with an initial price
    of $79.99, was launched in July 2013 with an initial batch of 600,000 units sold
    around the world.


    The company has some introductory videos here: [`https://www.leapmotion.com/`](https://www.leapmotion.com/)
    . After you watch a few of them, you will be surprised by the apparently magic
    performance of the device.


    Basically, the Leap will scan your hands at a very fast rate and translate your
    movements and gestures to the computer in a very precise way, so any Leap-enabled
    application can be interfaced directly, without the need of using a mouse, keyboard,
    or any other physical device.


    As a new era of interaction with machines is beginning, many challenges are appearing
    at the same time. As users, we’ll need to learn how to interact in 3D environments,
    performing a whole new repertoire of gestures, while as developers, we will face
    the challenge of providing the software capable of translating accurately those
    gestures, so new applications will respond as we expect. With the hand tracking
    provided, Leap Motion is currently reaching into virtual and augmented reality
    to interact with new worlds, partnering with major VR manufacturers to embed Leap
    Motion technology into mobile VR/AR headsets.


    In this chapter, we focus on the desktop controller and start by describing the
    hardware and software provided by Leap Motion. Then we will talk about the API
    for developing JavaFX programs with the device and present a sample application
    to show what is possible to achieve once you have a Leap device in your hands.'
  trans: '

    ## 在 3D 场景中触摸、旋转和缩放


    在操作 3D 场景时，最重要的交互通常是旋转和缩放，这些操作主要涉及移动和改变物体或摄像头的朝向。将手势支持集成到你的 3D 应用程序中，是对传统鼠标和键盘操作的一种自然增强。JavaFX
    的 `Shape3D` 对象，无论是基本几何体还是自定义三角形网格，都默认支持所有手势事件，例如 `Rotate` 和 `Zoom`。


    为了演示在 JavaFX 3D 场景中使用手势事件，我们向一个 `TriangleMesh` 示例中添加了 `touchStationary`、`Rotate`
    和 `Zoom` 手势事件。


    基础的 `TriangleMesh` 示例创建了四个金字塔形的 `TriangleMesh` 对象，每个对象都被添加到一个 `MeshView` 容器中以便显示。每个
    `MeshView` 容器都被添加到一个 `Group` 节点中，然后该节点再被添加到 3D 场景图中。


    我们希望通过为每个金字塔添加一个 `Rotate` 手势事件来增强场景。用户应该能够触摸一个金字塔，然后使用旋转手势使其绕 z 轴旋转。如果你阅读过本章前面的示例，就会知道我们需要为
    `Rotate` 手势添加一个事件处理器，在本例中是 `OnRotate`。但是，你必须首先提供一种方法，通知你的应用程序哪个屏幕上的对象是打算旋转的，否则你应该旋转摄像头的视角。如果你遵循多点触控的范式，你首先需要为
    `OnTouchStationary` 添加一个事件处理器。`OnTouchStationary` 事件向应用程序指示发生了单次触摸，并且触摸点保持在相同的相对位置。这将其与
    `OnTouchPressed` 和 `OnTouchMoved` 事件区分开来，后两者在设备上发生任何触摸时都会立即触发，无论该触摸是否是移动手势的一部分。


    策略是选择一个屏幕上的对象作为活动节点，使其成为后续手势的焦点。`OnTouchStationary` 事件会在任何 `OnRotate` 或 `OnZoom`
    事件之前发生，因此 `activeNode` 将对后续的手势事件可用。你可以通过添加以下事件处理器来使用此事件选择活动节点：


    ```

    scene.setOnTouchStationary(event -> {

    Node picked = event.getTouchPoint().getPickResult().getIntersectedNode();

    if (null != picked) {

    activeNode = picked;

    } else {

    activeNode = camera;

    }

    event.consume();

    });

    ```


    你可以通过 `TouchPoint` 对象访问位置数据。`TouchPoint` 对象内置了拾取支持，可以自动让你访问到被相交的节点，也就是屏幕上的对象 `picked`。如果没有拾取到任何对象，即触摸点不在任何屏幕对象上，那么摄像头将被设置为
    `activeNode`。现在你可以添加 `OnRotate` 事件处理器：


    ```

    scene.setOnRotate(event -> {

    if (null == activeNode) {

    activeNode = camera;

    }

    activeNode.setRotationAxis(Rotate.Z_AXIS);

    activeNode.setRotate(activeNode.getRotate() + event.getAngle());

    event.consume();

    });

    ```


    使用 `event.getAngle()` 访问 `Rotate` 手势提供的旋转角度值，并将其添加到当前节点的先前旋转值上。这将使屏幕上的对象旋转。如果用户没有触摸任何对象，那么摄像头本身将被旋转，这将导致整个场景看起来在旋转。图
    14-2 展示了当你对场景中的几个对象（本例中是填充的对象）应用旋转手势时，场景的外观。


    ![A323804_3_En_14_Fig2_HTML.jpg](img/A323804_3_En_14_Fig2_HTML.jpg)


    图 14-2.


    使用手势旋转 3D 金字塔 注意


    从技术上讲，任何场景中的所有对象都是节点。然而，在拾取对象时，JavaFX 返回的是对 `MeshView` 对象的引用。任何 `Group` 容器都会被忽略，因为
    `Group` 容器会首先将其包含的节点对象提供给 `Picking` API，而 `Grabbing` API 只会将 `TouchPoint` 事件传递给屏幕上最顶层的
    `Node`（按 z 轴顺序）。


    现在，让我们遵循相同的模式，让用户能够缩放 `activeNode`。这将产生放大或缩小所选节点的效果。为此，我们利用 `OnZoom` 事件：


    ```

    scene.setOnZoom(event -> {

    if(null == activeNode) {

    activeNode = camera;

    }

    double zoomFactor = event.getZoomFactor();

    zoomFactor *= zoomFactor < 1.0 ? -1 : 1;

    activeNode.setScaleX(activeNode.getScaleX() + zoomFactor / 50);

    activeNode.setScaleY(activeNode.getScaleY() + zoomFactor / 50);

    activeNode.setScaleZ(activeNode.getScaleZ() + zoomFactor / 50);

    event.consume();

    });

    ```


    `Zoom` 事件提供了一个双精度浮点型的 `ZoomFactor`，它是一个从 0.0 开始的正值。返回值在 0.0 到 1.0 之间表示“捏合”缩放手势。返回值高于
    1.0 表示“张开”缩放手势。在这里，你可以使用“捏合”值来负向缩放对象，而“张开”值可以正向缩放对象。图 14-3 是当你对场景中的几个对象应用缩放手势时屏幕的一个示例。


    ![A323804_3_En_14_Fig3_HTML.jpg](img/A323804_3_En_14_Fig3_HTML.jpg)


    图 14-3.


    使用手势缩放 3D 金字塔


    这三个事件处理器——`OnTouchStationary`、`OnRotate` 和 `OnZoom`——已经为你的 3D 场景启用了多点触控手势支持。这些效果是叠加的，因为用户可以通过手指的“捏合”和“旋转”动作组合来同时进行旋转和缩放。这种交互方式不仅对人类来说非常自然，而且通常比使用鼠标和键盘的解决方案更简单。


    注意


    在这里，我们使用固定的整数 50 来“缩放”我们的缩放比例。这是为了补偿屏幕坐标和缩放坐标之间的差异。在处理 3D 场景时，这是一种常见做法，可以将其视为一个灵敏度变量。


    ## Leap Motion 控制器


    Leap Motion 控制器（见图 14-4），也称为 Leap，是一个小型设备，尺寸为 80×30×12 毫米，通过 USB 端口连接到你的计算机。它不需要外部电源。


    ![A323804_3_En_14_Fig4_HTML.jpg](img/A323804_3_En_14_Fig4_HTML.jpg)


    图 14-4.


    Leap Motion 设备及其包装盒


    Leap 软件可在 Windows、MacOS X 和 Linux 上运行，初始售价为 79.99 美元，于 2013 年 7 月推出，首批在全球销售了 60
    万台。


    该公司在此处有一些介绍视频：[`https://www.leapmotion.com/`](https://www.leapmotion.com/)。观看其中几个视频后，你会对该设备看似神奇的性能感到惊讶。


    基本上，Leap 会以非常快的速度扫描你的手，并以非常精确的方式将你的动作和手势传输到计算机，因此任何支持 Leap 的应用程序都可以直接进行交互，无需使用鼠标、键盘或任何其他物理设备。


    随着与机器交互的新时代开始，许多挑战也同时出现。作为用户，我们需要学习如何在 3D 环境中进行交互，执行一整套全新的手势；而作为开发者，我们将面临提供能够准确翻译这些手势的软件的挑战，以便新应用程序能按我们的预期做出响应。凭借提供的手部追踪功能，Leap
    Motion 目前正涉足虚拟现实和增强现实领域，以与全新世界进行交互，并与主要 VR 制造商合作，将 Leap Motion 技术嵌入到移动 VR/AR 头显中。


    在本章中，我们将重点介绍桌面控制器，首先描述 Leap Motion 提供的硬件和软件。然后，我们将讨论使用该设备开发 JavaFX 程序的 API，并提供一个示例应用程序，以展示一旦你拥有
    Leap 设备后可以实现的功能。

