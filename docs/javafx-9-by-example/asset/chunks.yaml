- fmt: '### The HTTP GET Request


    Because RESTful services are beyond the scope of this book, I will detail only
    the two common RESTful call requests—`GET` and `POST`. Listing [10-12](#A323804_3_En_10_Chapter.html#Par108)
    shows the familiar HTTP `GET` request that developers typically perform when retrieving
    JSON data. Keep in mind that in Listing [10-12](#A323804_3_En_10_Chapter.html#Par108),
    the method `sendAsync()` is used as an asynchronous call to the remote web server.
    This involves a background worker thread fetching the data and later being notified
    when it is complete.


    ```

    import static jdk.incubator.http.HttpClient.newHttpClient;

    import static jdk.incubator.http.HttpRequest.newBuilder;

    import static jdk.incubator.http.HttpResponse.BodyHandler;

    .

    .

    // ========================================================================

    // The sendAsync() and whenCompleteAsync() method returns a

    // CompletableFuture> instance.

    // ========================================================================

    String queryStr = "http://myplace/current-weather?q=Pasadena%20MD,US&format=json";

    HttpClient.newHttpClient()

    .sendAsync(newBuilder(URI.create(queryStr))

    .GET()

    .build(),

    BodyHandler.asString())

    .whenCompleteAsync( (httpResp, throwable) -> {

    if (throwable != null){

    System.err.println(throwable.getMessage());

    return;

    }

    String json  = httpResp.body();

    System.out.println(json);

    });

    Listing 10-12.

    A RESTful GET Request to Retrieve Weather Data

    ```


    In Listing [10-12](#A323804_3_En_10_Chapter.html#Par108), the code begins by creating
    an `HttpClient` instance via the `newHttpClient()` method. The `newHttpClient()`
    method is statically imported at the top. This makes the code more concise and
    more readable by not having to type the owning class. You’ll also notice other
    statically imported methods and classes, such as `newBuilder` and `BodyHandler`.


    After creating a new `HttpClient` object, the `sendAsync()` method is invoked
    with a `GET` request using the `newBuilder()` method. As a convenience, the `newBuilder()`
    method follows the builder pattern for a web request to be created. The second
    (last) parameter to be passed into the `sendAsync()` method is a `BodyHandler`
    type.


    Next, you learn about the body handler type and the `HttpResponse<T>` response
    objects when the web request is completed.


    #### Body Handlers


    For typical web requests, the body handler is simply a `String` type, but there
    are other body types that can be retrieved. When the body handler is passed in
    as the second parameter of the `send()` or `sendAsync()` method, the body handler
    type with respect to the `HttpResponse<T>` returned the type `T` will be the same.
    For instance, the method `whenCompleteAsync()` will receive an HTTP response having
    a body handler of type `String`.


    In Listing [10-12](#A323804_3_En_10_Chapter.html#Par108), the method `whenCompleteAsync()`
    is triggered upon completing the web request. After being triggered, the handler
    code will receive an `HttpResponse<String>` and a Java `Throwable`. Again, you
    will notice the handler code invoking the `httpResp.body()` returning a string.
    Because the data type from the `BodyHandler.asString()` passed in earlier is a
    string, the method `body()` returns a value of type `String`.


    Do you want to know what other types of body handlers are available?


    According to the Java 9 Javadoc documentation, here are some other body handler
    types that can be retrieved:


    - `asByteArray()`: Returns a `BodyHandler<byte[]>` that returns a `BodyProcessor<byte[]>`
    obtained from `BodyProcessor.asByteArray()`.

    - `asByteArrayConsumer(Consumer)`: Returns a `BodyHandler<Void>` that returns
    a `BodyProcessor<Void>` obtained from `BodyProcessor.asByteArrayConsumer(Consumer)`.

    - `asFileDownload(Path,OpenOption...)`: Returns a `BodyHandler<Path>` that returns
    a `BodyProcessor<Path>` where the download directory is specified, but the filename
    is obtained from the `Content-Disposition` response header. The `Content-Disposition`
    header must specify the attachment type and must also contain a filename parameter.
    If the filename specifies multiple path components, only the final component is
    used as the filename (with the given directory name). When the `HttpResponse`
    object is returned, the body has been completely written to the file and `HttpResponse.body()`
    returns a `Path` object for the file. The returned `Path` is the combination of
    the supplied directory name and the filename supplied by the server. If the destination
    directory does not exist or cannot be written to, then the response will fail
    with an `IOException`.

    - `discard(Object)`: Returns a response body handler, which discards the response
    body and uses the given value as a replacement for it. Used during a `POST` request.

    - `asString(Charset)`: Returns a `BodyHandler<String>` that returns a `BodyProcessor<String>`
    obtained from `BodyProcessor.asString(Charset)`. If a charset is provided, the
    body is decoded using it. If charset is `null`, then the processor tries to determine
    the character set from the `Content-encoding` header. If that charset is not supported,
    `UTF_8` is used.


    In this example, an asynchronous call `sendAsync()` method takes a valid `URI`
    consisting of a query string. Once the `URI` is created, the `newBuilder()` method
    invokes the `GET()` method to specify the HTTP method and finally invokes the
    `build()` method to return a populated object of type `HttpRequest`. Next, you
    see the common `POST` request when the client is sending larger payloads, such
    as a form submission.


    ### HTTP POST Request


    The code to make a RESTful `POST` request looks like the `GET` request in the
    previous example, except that the data submitted will not be specified as an appended
    query string such as "`?param1=1&param2=555`". Instead, to send name/value pairs
    as a `String` payload, Listing [10-13](#A323804_3_En_10_Chapter.html#Par123) shows
    an example of a fictitious bank using an HTTP RESTful `POST` service that creates
    a new customer bank account.


    ```

    HttpRequest request = HttpRequest.newBuilder(

    URI.create("https://acmebank/create-account"))

    .POST(fromString("id=" + newSeqId + ",firstName=John,lastName=Doe"))

    .build();

    HttpClient httpClient = newHttpClient();

    httpClient.sendAsync(request, BodyHandler.discard(null))

    .whenCompleteAsync( (httpResp, throwable) -> {

    if (throwable != null){

    System.err.println("Error Saving");

    return;

    }

    System.out.println("Saving complete.");

    });

    Listing 10-13.

    A RESTful POST Request

    ```


    In Listing [10-13](#A323804_3_En_10_Chapter.html#Par123) the code makes an asynchronous
    call to create a new customer bank account. In this scenario, the `id` was passed
    in the `POST` method using the variable `newSeqId` instead of being returned in
    the HTTP response. As a demonstration of the server not returning a created customer
    `id` or any string response, the `BodyHandler.discard(null)` method was specified
    to ignore body content from the server.


    Again, regarding the second parameter of the `sendAsync()` method as it relates
    to the data returned from the server, if your server code returns an `id` generated
    after a record has been created, you’ll want to replace the second parameter of
    the `sendAsync()` method with `BodyHandler.asString()`. Once the asynchronous
    call is completed, you can call the `httpResp.body()` function to return the message
    sent from the server.


    The new HTTP2 module not only can provide request/response behavior, but it can
    also offer full-duplex or WebSockets behavior. The next section covers WebSockets.


    ### WebSockets


    WebSockets is a protocol for a two-way (full-duplex) communication using a TCP
    connection. Java 9''s `http2` module supports the creation of client-side WebSockets.
    Like the previously mentioned APIs, the WebSockets API also provides a `WebSocket.Builder`
    class for easy creation of `WebSocket` instances.'
