- fmt: '### The `MediaView` Node


    ```

    private MediaView createMediaView(Pane root)

    ```


    In the `start()` method after adding the full-screen capability, the code invokes
    the private method `createMediaView()`, which returns a `MediaView` node that
    is responsible for displaying the video.


    To see what the `createMediaView()` method actually returns, let’s look at how
    it was implemented. Inside the `createMediaView()` method, it begins by instantiating
    a `MediaView` node with an ID of `media-view`. The code then sets the preserve
    ratio property to `true`, which preserves the aspect ratio of the video image
    dimension when it’s being resized. In other words, resizing the window won’t stretch
    the video picture. Listing [9-8](#A323804_3_En_9_Chapter.html#Par138) creates
    a new `MediaView` node that preserves the aspect ratio.


    ```

    MediaView mediaView = new MediaView();

    mediaView.setId("media-view");

    mediaView.setPreserveRatio(true);

    Listing 9-8.

    Creating a MediaView Node that Preserves the Aspect Ratio

    ```


    Do you remember when creating the application window by using CSS styling? The
    reason I ask is that you should notice the background has rounded corners with
    an inset padding and also has a rounded lined border. Because of these details,
    I designed it so the video (`MediaView`) would fit inside the rounded border region.
    As the dimensions of the viewing area could change, such as activating full-screen
    mode or resizing a window, the code will need to recalculate the width and height
    values of the view port of the `MediaView` node.


    In order to be accurate, I chose to create two custom properties that will dynamically
    adjust the media view display area. The first custom property is called `widthProperty`
    and it calculates the media view node’s width based on the available space. The
    available space for the media view’s width is calculated based on the root pane’s
    width, minus the left and the right inset values. Insets are the union of the
    padding and border widths of a pane (root pane).


    The second custom property is called `heightClipProperty` and it calculates the
    value of the `MediaView`''s clip region’s height. The height of the video that
    is being displayed could get larger than the height of the border at the bottom
    of the application, so a clipping region will be imposed to prevent this from
    happening. Listing [9-9](#A323804_3_En_9_Chapter.html#Par142) shows the two custom
    properties that compute the display’s width and height. If you aren’t familiar
    with custom properties, refer to Chapter [4](#A323804_3_En_4_Chapter.html) on
    lambdas and properties.


    ```

    // Calculate width of the MediaView (in AnchorPane)

    DoubleBinding widthProperty = new DoubleBinding(){

    @Override

    protected double computeValue() {

    return root.getWidth() - (root.getInsets()

    .getLeft() +

    root.getInsets()

    .getRight());

    }

    };

    // Calculate height of the clipping region.

    // This prevents video to display beyond bottom border area.

    DoubleBinding heightClipProperty = new DoubleBinding(){

    @Override

    protected double computeValue() {

    return root.getHeight() - (root.getInsets()

    .getTop() +

    root.getInsets()

    .getBottom());

    }

    };

    Listing 9-9.

    Custom Properties to Compute the Width and Height When Displaying the MediaView
    Node

    ```


    Continuing with the `createMediaView()` method, the code binds the `MediaView`
    node’s `fitWidthProperty` with the custom property `widthProperty`. After binding
    the `widthProperty`, the code adds invalidation listeners to the root node (`AnchorPane`).
    These listeners detect a change in the width and height properties of the root
    node. Once a change is detected, the custom properties `widthProperty` and `heightClipProperty`
    are marked invalid, which will cause the properties to be recalculated.


    ```

    // Bindings for the media view''s fitWidth

    mediaView.fitWidthProperty().bind(widthProperty);

    // Recalculate when the width changes

    root.widthProperty().addListener(observable1 ->

    widthProperty.invalidate());

    // Recalculate when the height changes

    root.heightProperty().addListener(observable1 ->

    heightClipProperty.invalidate());

    Listing 9-10.

    Bindings and Listeners to Recalculate Custom Properties When the Window Is Resized

    ```


    Next, the code creates a clip region that will create a view port with dimensions
    that are bound to the two custom properties—`widthProperty` and `heightClipProperty`.
    Listing [9-11](#A323804_3_En_9_Chapter.html#Par146) shows the creation of the
    clip region that is shaped like the inset rounded border area of the root node’s
    background.


    ```

    // Create a clip region to be a rounded rectangle

    // matching the root pane''s rounded border.

    // Bindings use the calculated size properties:

    // widthProperty and heightClipProperty

    Rectangle clipRegion = new Rectangle();

    clipRegion.setArcWidth(10);

    clipRegion.setArcHeight(10);

    clipRegion.widthProperty().bind(widthProperty);

    clipRegion.heightProperty().bind(heightClipProperty);

    mediaView.setClip(clipRegion);

    Listing 9-11.

    The Clip Region Applied to the MediaView Node

    ```


    One last listener will be attached to the root pane (`AnchorPane`) to respond
    whenever the `insets` property changes. Because the application isn’t yet shown
    the inset values are zero. In other words, the CSS styling hasn’t been applied
    and rendered yet at this point. Listing [9-12](#A323804_3_En_9_Chapter.html#Par148)
    shows an invalidation listener to update the clip region and media view properties.
    Once the CSS is applied and rendered onto the JavaFX scene, the `insets` property
    will change and call the listener code. If the insets or border widths change,
    the clip region and media view’s position and dimensions will be recalculated.


    ```

    // Update calculations on invalidation listener

    // to reposition media view and clip region

    root.insetsProperty().addListener(observable -> {

    widthProperty.invalidate();

    heightClipProperty.invalidate();

    Insets insets = root.getInsets();

    clipRegion.setX(insets.getRight());

    clipRegion.setY(insets.getTop());

    mediaView.setX(insets.getRight());

    mediaView.setY(insets.getTop());

    });

    Listing 9-12.

    An Invalidation Listener that Responds When the insets Property Changes

    ```


    Lastly, Listing [9-13](#A323804_3_En_9_Chapter.html#Par150) shows how the code
    simply adds handler code to the `OnError` property whenever an error event is
    raised in the media view node. The code simply prints a stack trace of the media
    error.


    ```

    // when errors occur

    mediaView.setOnError(mediaErrorEvent -> {

    mediaErrorEvent.getMediaError()

    .printStackTrace();

    });

    return mediaView;

    Listing 9-13.

    Adding Handler Code When the Media View Node Encounters an Error

    ```


    ## Simulating Closed Captioning: Marking a Position in a Video Media


    Have you ever wanted to implement closed captioning video? In the past, there
    have been discussions about JavaFX 8 possibly supporting the standard closed captioning
    specification for video media; however, the state of this feature is unclear as
    of this writing. Fortunately, there is hope; JavaFX supports media event markers
    to achieve the same behavior as closed captioning video.'
