- fmt: '# 1. Getting Started


    To get started using this book to learn JavaFX 9, you will want to set up your
    development environment to compile and run many of its examples. In this chapter
    you will learn how to install the required software, such as the Java development
    kit (JDK) and the NetBeans integrated development environment (IDE). After installing
    the required software, you will begin by creating a traditional JavaFX HelloWorld
    example. Once you are comfortable with the development environment, I will walk
    through the JavaFX HelloWorld source code. Finally, you will get a glimpse of
    how to package your application as a standalone application to be launched and
    distributed.


    I realize many developers are partial to their IDEs and editors, so I’ve also
    provided three ways to compile and run the HelloWorld example. In the first way
    to compile and run code you will be using the NetBeans IDE, in the second way
    you will learn how to use the command line (terminal window), and thirdly you
    will be using a build tool called Gradle to compile and launch JavaFX applications.
    The second and third strategies are for those who are not fond of fancy IDEs.
    If you are more comfortable with the Eclipse and IntelliJ IDE, you will be happy
    to know that Gradle can generate the respective project files that will allow
    your projects to be easily loaded into them.


    If you are already familiar with the installation of the Java Development Kit
    (JDK), Gradle, and the NetBeans IDE, you can skip to Chapter [2](#A323804_3_En_2_Chapter.html),
    which covers Java 9 Jigsaw. Let’s get started!


    ## Downloading Required Software


    When using this book, you’ll find that many examples may still be written using
    the Java 8 JDK; however Chapter [2](#A323804_3_En_2_Chapter.html) and a few other
    chapters will get into Java 9-specific concepts, making the Java 9 JDK a requirement.
    One of the primary changes to the Java platform is modularity (Jigsaw). Modularity
    will truly transform your client-side applications. You are probably wondering
    exactly, “how is it transformed?” Well, imagine building a Java application that
    occupies a smaller footprint in memory and on disk space. This means users will
    experience faster load times and a better user experience!


    Having said this, go ahead and download Java 9 Java Development Kit (JDK) or later.
    In this chapter, you will see the steps on installing the JDK on Windows, MacOS
    X, and Linux. You can download the Java 9 JDK from the following URL:


    [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)


    Another tool that we have not mentioned in prior editions is Gradle. Gradle has
    become an industry standard in building projects and artifacts in the real world.
    Later, I will walk you through how to install Gradle, but for now head over to
    `gradle.org` and look for the download link. At the download link you will be
    presented with two binary distributions. One is just a binary distribution and
    the other is a full distribution that includes the source code and documentation.
    The binary distribution is required to build applications, so you’ll want to download
    it. Go to the following URL to download Gradle’s Build tool:


    [`https://gradle.org/gradle-download`](https://gradle.org/gradle-download)


    Installing an integrated development environment (IDE) is optional for the book;
    however if you choose to use an IDE you will be able get all the benefits of code
    highlighting, code completion, incremental debugging, refactoring, and many modern
    developer conveniences. The top three IDEs used in the wild are NetBeans, IntelliJ,
    and Eclipse. Although this book walks you through installing the NetBeans IDE,
    it doesn’t mean we are partial to NetBeans or any other IDEs. I’ve chosen NetBeans
    because release schedules are usually on par with the major JDK releases and it’s
    quite mature, especially when it comes to tooling and JavaFX application development.
    NetBeans has numerous JavaFX demo projects (example templates) built-in and the
    Scene Builder tool. Scene Builder is a graphical tool used to build JavaFX UIs
    visually.


    Another pro tip is learning about Gradle tasks, which are capable of generating
    Java projects for either IntelliJ or Eclipse IDE with a single command. To learn
    more about Gradle tasks that can automatically set up IntelliJ and Eclipse projects,
    visit the following links:


    *   IntelliJ: [`https://docs.gradle.org/current/userguide/idea_plugin.html`](https://docs.gradle.org/current/userguide/idea_plugin.html)

    *   Eclipse: [`https://docs.gradle.org/current/userguide/eclipse_plugin.html`](https://docs.gradle.org/current/userguide/eclipse_plugin.html)


    The following are URLs to download your favorite IDE:


    *   NetBeans: [`https://netbeans.org/downloads`](https://netbeans.org/downloads)

    *   IntelliJ: [`https://www.jetbrains.com/idea/download`](https://www.jetbrains.com/idea/download)

    *   Eclipse: [`https://eclipse.org/downloads`](https://eclipse.org/downloads)


    Currently, JavaFX 9 from Oracle corp. runs on the following operating systems:


    *   Windows OS (Vista, 7, 8, 10) 32- and 64-bit

    *   MacOS X (64-bit)

    *   Ubuntu Linux 12.x - 13.x (32- and 64-bit)


    To see a detailed listing of all the supported operating systems, visit the following
    link:


    [`http://jdk.java.net/9/supported`](http://jdk.java.net/9/supported)


    While you may not see your supported operating system or hardware, you will be
    happy to know about the OpenJDK and OpenJFX projects, which allow you to build
    Java and JavaFX yourself! To learn more about OpenJDK or OpenJFX, visit the following
    URLs:


    *   OpenJDK: [`http://openjdk.java.net`](http://openjdk.java.net)

    *   OpenJFX: [`https://wiki.openjdk.java.net/display/OpenJFX/Main`](https://wiki.openjdk.java.net/display/OpenJFX/Main)


    After downloading the appropriate software versions for your operating system,
    you will install the Java 9 JDK, Gradle, and/or your chosen IDE.


    ## Installing the Java 9 Development Kit


    Once you have downloaded the correct version of Java for your particular operating
    system, follow the steps outlined in this section to install the Java 9 JDK. I
    assume you’ve downloaded Oracle’s Java 9 JDK, but if not, go to following location:


    [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)


    In the following sections, you will follow steps to install Java 9 on the three
    popular operating systems: Microsoft Windows, MacOS X, and Linux.'
