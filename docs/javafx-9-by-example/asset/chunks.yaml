- fmt: '# Java/JavaFX Books and Magazines


    The following links are newer book titles that relate to the new Java 8 and JavaFX
    8 platform.


    *   Pro JavaFX 8, Johan Vos, James Weaver, Weiqi Gao, Stephen Chin, Dean Iverson.
    Apress, 2014\. ISBN: 978-1-4302-6574-0: [`http://www.apress.com/9781430265740`](http://www.apress.com/9781430265740)

    *   Java 8 Recipes, Josh Juneau (Apress, 2014\. ISBN: 978-1-4302-6827-7): [`http://www.apress.com/9781430268277`](http://www.apress.com/9781430268277)

    *   JavaFX Rich Client Programming on the NetBeans Platform, Paul Anderson and
    Gail Anderson. Addison-Wesley Professional, 2014\. ISBN: 978-0321927712: [`https://blogs.oracle.com/geertjan/entry/new_book_javafx_rich_client`](https://blogs.oracle.com/geertjan/entry/new_book_javafx_rich_client)
    [`http://www.amazon.com/JavaFX-Client-Programming-NetBeans-Platform/dp/0321927710`](http://www.amazon.com/JavaFX-Client-Programming-NetBeans-Platform/dp/0321927710)

    *   Mastering JavaFX 8 Controls , Hendrik Ebbers. Oracle Press, 2014. ISBN: 9780071833776:
    [`http://mhprofessional.com/product.php?isbn=0071833773`](http://mhprofessional.com/product.php?isbn=0071833773)
    [`http://www.guigarage.com/javafx-book`](http://www.guigarage.com/javafx-book)

    *   Quick Start Guide to JavaFX, J.F. DiMarzio. Oracle Press, 2014\. ISBN: 978-0071808965:
    [`http://www.mhprofessional.com/product.php?isbn=0071808965`](http://www.mhprofessional.com/product.php?isbn=0071808965)

    *   Java SE 8 for the Really Impatient, Cay S. Horstmann. Addison-Wesley, 2014\.
    ISBN: 978-0321927767: [`https://www.pearson.com/us/higher-education/program/Horstmann-Java-SE-8-for-the-Really-Impatient-A-Short-Course-on-the-Basics/PGM214606.html`](https://www.pearson.com/us/higher-education/program/Horstmann-Java-SE-8-for-the-Really-Impatient-A-Short-Course-on-the-Basics/PGM214606.html)

    *   Mastering Lambdas, Maurice Naftalin. Oracle Press, 2014\. ISBN: 007-1829628:
    [`https://www.amazon.com/Mastering-Lambdas-Programming-Multicore-Oracle/dp/0071829628`](https://www.amazon.com/Mastering-Lambdas-Programming-Multicore-Oracle/dp/0071829628)

    *   Java Magazine from Oracle: [`http://www.oracle.com/technetwork/java/javamagazine/index.html`](http://www.oracle.com/technetwork/java/javamagazine/index.html)

    *   JavaFX Ref Card, Hendrik Ebbers and Michael Heinrichs: [`https://dzone.com/refcardz/javafx-8-1`](https://dzone.com/refcardz/javafx-8-1)

    *   Java Everywhere, Anton Epple. A book on the DukeScript platform: [`https://leanpub.com/dukescript`](https://leanpub.com/dukescript)
    Twitter: `@monacotoni`


    ## Author Blogs


    If you are having trouble with this book’s content or code examples, feel free
    to comment or mention issues at the book’s catalog page at `apress.com`, in the
    errata tab. If you are totally stumped, feel free to contact the book authors
    via Twitter or their blogs.


    The following are the book’s authors with their Twitter accounts and blog URLs:


    *   Carl Dea (`@carldea`): [`http://carlfx.wordpress.com`](http://carlfx.wordpress.com)

    *   Gerrit Grunwald (`@hansolo_)`: [`http://harmoniccode.blogspot.com`](http://harmoniccode.blogspot.com)

    *   Mark Heckler (`@MkHeck`): [`http://www.thehecklers.org/`](http://www.thehecklers.org/)

    *   José Pereda (`@JPeredaDnr`): [`http://jperedadnr.blogspot.com`](http://jperedadnr.blogspot.com)

    *   Sean Phillips (`@SeanMiPhillips`): [`http://birdasaur.tumblr.com`](http://birdasaur.tumblr.com)


    ## Tutorials, Courses, Consulting Firms, and Demos


    The following links are where you will meet experts and enthusiasts alike who
    provide many free online tutorials and offer courses. Some of the links are presentations
    from major consulting firms teaching and demoing real-world applications.


    *   FXDocs by the JavaFX community: The JavaFX Documentation Project aims to pull
    together useful information for JavaFX developers from all over the web. The project
    is open source and encourages community participation to ensure that the documentation
    is as highly polished and useful as possible: [`https://fxdocs.github.io/docs/index.html`](https://fxdocs.github.io/docs/index.html)

    *   AwesomeJavaFX, Hossein Rimaz: A curated list of awesome JavaFX libraries,
    books, frameworks, etc.: [`https://github.com/mhrimaz/AwesomeJavaFX`](https://github.com/mhrimaz/AwesomeJavaFX)
    Twitter: `@mhrimaz`

    *   Various algorithms using JavaFX, Hossein Rimaz: [`https://github.com/mhrimaz`](https://github.com/mhrimaz)
    Twitter: `@mhrimaz`

    *   JavaFX Training Courses with Paul and Gail Anderson, authors, teachers, and
    speakers: Twitter: `@Paul_ASGTeach` and `@gail_asgteach` [`http://asgteach.com/courses/java-and-javafx/javafx-programming-course/`](http://asgteach.com/courses/java-and-javafx/javafx-programming-course/)

    *   Bekwam Courses, Carl Walker. Tutorials and examples of building real-world
    JavaFX-based applications: [`https://www.bekwam.com`](https://www.bekwam.com)
    [`https://courses.bekwam.net/public_tutorials/index.html`](https://courses.bekwam.net/public_tutorials/index.html)
    Twitter: `@bekwaminc`

    *   Excellent JavaFX Tutorials, Jörn Hameister: [`http://www.hameister.org/JavaFX.html`](http://www.hameister.org/JavaFX.html)
    Twitter:`@Hameiste`

    *   JavaFX Demos such as FXCubes and FXFrostedPanel, Alessio Vinerbi. Amazing
    JavaFX demos that shows a mix of video and 3D effects: [`https://github.com/alexbodogit`](https://github.com/alexbodogit)
    Twitter: `@Alessio_Vinerbi`

    *   JavaFX tutorials, Jakob Jenkov: [`http://tutorials.jenkov.com/javafx/index.html`](http://tutorials.jenkov.com/javafx/index.html)
    Twitter:`@jjenkov`

    *   JavaFX tutorials, Dirk Lemmermann Consulting. Excellent tutorials: [`http://dlsc.com/blog/`](http://dlsc.com/blog/)
    Twitter: `@dlemmermann`

    *   JavaFX-based tutorials, William Antônio. Quick and easy tutorials from machine
    learning to IoT: [`https://fxapps.blogspot.com`](https://fxapps.blogspot.com)
    [`https://github.com/jesuino`](https://github.com/jesuino) Twitter:`@William_Antonio`

    *   JavaFX examples using the Ceylon language, Gavin King: [`https://github.com/ceylon/ceylon-examples-javafx`](https://github.com/ceylon/ceylon-examples-javafx)
    Twitter: `@1ovthafew`

    *   Building the MyDevoxx App with JavaFX and Gluon, Johan Vos and Eugene Ryzhikov:
    [`https://www.youtube.com/watch?v=1I38pmEnfVQ&list=PLy7t4z5SYNaRN2IDmjq_SSCrb9Sph4zAC&index=12`](https://www.youtube.com/watch%3Fv=1I38pmEnfVQ%26list=PLy7t4z5SYNaRN2IDmjq_SSCrb9Sph4zAC%26index=12)
    Johan Vos: `@johanvos` Eugene Ryzhikov: `@eryzhikov`

    *   The latest JavaFX Daily!, Michael Heinrichs. Newsfeed topics on none other
    than JavaFX!: [`http://paper.li/net0pyr/1312275601#/`](http://paper.li/net0pyr/1312275601#/)
    Twitter: `@net0pyr`


    ## Tools, Applications, and Libraries'
