- fmt: '### Charm Glisten


    The base class is `MobileApplication`, and it extends from `Application`. It does
    not require any specific methods to be implemented, but typically `init` can be
    overridden to register the different views, and `postInit` can access the scene
    and apply a style sheet, for instance.


    Glisten user interfaces are built using views. A view is a Glisten container that
    allows you to add nodes to its top, center, and bottom.


    Usually a `View` instance is created by providing a name for the view and the
    node for its content. This instance is added to a factory of views so the Glisten
    UI can load and unload them on demand.


    By default, the first view displayed when the stage is shown is called `Home View`.
    It has no predefined content, so this view has to be designed by the developer,
    but its name is already assigned: `MobileApplication.HOME_VIEW`. The short snippet
    in Listing [13-6](#A323804_3_En_13_Chapter.html#Par76) will create a very simple
    mobile application with a single view, as shown in Figure [13-3](#A323804_3_En_13_Chapter.html#Fig3).


    ![A323804_3_En_13_Fig3_HTML.jpg](A323804_3_En_13_Fig3_HTML.jpg)


    Figure 13-3. MyApp running on the desktop


    By default, `glisten.css` is the style sheet added to a Gluon Mobile application.
    It is based on Material Design from Google ([https://material.io](https://material.io)).


    See the documentation at [http://docs.gluonhq.com/charm/latest/#_charm_glisten](http://docs.gluonhq.com/charm/latest/#_charm_glisten)
    to find out more about the Glisten controls.


    ```

    import com.gluonhq.charm.glisten.application.MobileApplication;

    import com.gluonhq.charm.glisten.mvc.View;

    import com.gluonhq.charm.glisten.visual.Swatch;

    import javafx.scene.Scene;

    import javafx.scene.control.Button;

    public class MyApp extends MobileApplication {

    public static final String BASIC_VIEW = HOME_VIEW;

    @Override

    public void init() {

    addViewFactory(BASIC_VIEW, () -> new View(new Button("Hello Glisten!")));

    }

    @Override

    public void postInit(Scene scene) {

    Swatch.BLUE.assignTo(scene);

    }

    }

    Listing 13-6. Creating a Home View

    ```


    ### License


    While `JavaFXPorts`, `Charm Down`, or `Charm Connect` are fully open source projects,
    Gluon Mobile is a commercial project and requires a license. As you can see at
    [http://gluonhq.com/products/mobile/buy](http://gluonhq.com/products/mobile/buy),
    there is a free tier and the library can be used for testing with 100% of its
    features, without a license.


    ## Example: The BasketStats App


    This example shows you how to create, step by step, a full Java mobile app that
    you can deploy to your mobile devices. You can use it to keep track of the annotation
    during the basketball games of your kids, for instance.


    In this case, you’ll use NetBeans and the Gluon plug-in for NetBeans.


    ### Creating the Project


    Let’s create a new project using the Gluon plug-in. In NetBeans, choose File ➤
    New Project and select Gluon on the left. Select Gluon Mobile – Glisten -Afterburner
    Project from the list of available projects, as shown in Figure [13-4](#A323804_3_En_13_Chapter.html#Fig4).


    ![A323804_3_En_13_Fig4_HTML.jpg](A323804_3_En_13_Fig4_HTML.jpg)


    Figure 13-4. New project: Choose project


    Add a proper name to the application (`BasketStats`), find a proper location,
    add the package name, and change the main class name if required, as shown in
    Figure [13-5](#A323804_3_En_13_Chapter.html#Fig5).


    ![A323804_3_En_13_Fig5_HTML.jpg](A323804_3_En_13_Fig5_HTML.jpg)


    Figure 13-5. New project: Set name and location


    Click Next and set these names—`Main` for the primary view and `Board` for the
    secondary view—as shown in Figure [13-6](#A323804_3_En_13_Chapter.html#Fig6).
    Click Finish and the project will be created.


    ![A323804_3_En_13_Fig6_HTML.jpg](A323804_3_En_13_Fig6_HTML.jpg)


    Figure 13-6. New project: Set views names


    The full structure of the project can be seen in Figure [13-7](#A323804_3_En_13_Chapter.html#Fig7).
    Listing [13-7](#A323804_3_En_13_Chapter.html#Par84) contains the `build.gradle`
    file, showing the versions available at the time of this writing.


    ![A323804_3_En_13_Fig7_HTML.jpg](A323804_3_En_13_Fig7_HTML.jpg)


    Figure 13-7. Project created: The MobileApplication class


    ```

    buildscript {

    repositories {

    jcenter()

    }

    dependencies {

    classpath ''org.javafxports:jfxmobile-plugin:1.3.5''

    }

    }

    apply plugin: ''org.javafxports.jfxmobile''

    repositories {

    jcenter()

    maven {

    url ''http://nexus.gluonhq.com/nexus/content/repositories/releases''

    }

    }

    mainClassName = ''org.jfxbe.basketstats.BasketStats''

    dependencies {

    compile ''com.gluonhq:glisten-afterburner:1.2.0''

    compile ''com.gluonhq:charm-glisten:4.3.5''

    }

    jfxmobile {

    downConfig {

    version = ''3.3.0''

    plugins ''display'', ''lifecycle'', ''statusbar'', ''storage''

    }

    android {

    manifest = ''src/android/AndroidManifest.xml''

    }

    ios {

    infoPList = file(''src/ios/Default-Info.plist'')

    forceLinkClasses = [

    ''org.jfxbe.basketstats.**.*'',

    ''com.gluonhq.**.*'',

    ''javax.annotations.**.*'',

    ''javax.inject.**.*'',

    ''javax.json.**.*'',

    ''org.glassfish.json.**.*''

    ]

    }

    }

    Listing 13-7. Default build.gradle File

    ```


    In the application class, the `init` method is overridden to create and register
    the views. Listing [13-8](#A323804_3_En_13_Chapter.html#Par86) contains the `AppViewManager`
    class that takes care of adding the views to an `AppViewRegistry` instance. The
    views are created with FXML with the `AppView` class, using the Afterburner framework
    ([https://github.com/AdamBien/afterburner.fx](https://github.com/AdamBien/afterburner.fx)).
    A `NavigationDrawer` control is also created and registered. Figure [13-8](#A323804_3_En_13_Chapter.html#Fig8)
    shows this layer when you run the project.


    ![A323804_3_En_13_Fig8_HTML.jpg](A323804_3_En_13_Fig8_HTML.jpg)


    Figure 13-8. Running the project on desktop


    ```

    package org.jfxbe.basketstats.views;

    import com.gluonhq.charm.glisten.afterburner.AppView;

    import static com.gluonhq.charm.glisten.afterburner.AppView.Flag.HOME_VIEW;

    import static com.gluonhq.charm.glisten.afterburner.AppView.Flag.SHOW_IN_DRAWER;

    import static com.gluonhq.charm.glisten.afterburner.AppView.Flag.SKIP_VIEW_STACK;

    import com.gluonhq.charm.glisten.afterburner.AppViewRegistry;

    import com.gluonhq.charm.glisten.afterburner.GluonPresenter;

    import com.gluonhq.charm.glisten.afterburner.DefaultDrawerManager;

    import com.gluonhq.charm.glisten.application.MobileApplication;

    import com.gluonhq.charm.glisten.control.Avatar;

    import com.gluonhq.charm.glisten.control.NavigationDrawer;

    import com.gluonhq.charm.glisten.visual.MaterialDesignIcon;

    import javafx.scene.image.Image;

    import java.util.Locale;

    import org.jfxbe.basketstats.BasketStats;

    public class AppViewManager {

    public static final AppViewRegistry REGISTRY = new AppViewRegistry();

    public static final AppView MAIN_VIEW = view("Game Manager", MainPresenter.class,

    MaterialDesignIcon.GAMES, SHOW_IN_DRAWER, HOME_VIEW, SKIP_VIEW_STACK);

    public static final AppView BOARD_VIEW = view("Board", BoardPresenter.class,

    MaterialDesignIcon.DASHBOARD, SHOW_IN_DRAWER);

    private static AppView view(String title,

    Class> presenterClass,

    MaterialDesignIcon menuIcon, AppView.Flag... flags ) {

    return REGISTRY.createView(name(presenterClass), title, presenterClass,

    menuIcon, flags);

    }

    private static String name(Class> presenterClass) {

    return presenterClass.getSimpleName().toUpperCase(Locale.ROOT)

    .replace("PRESENTER", "");

    }

    public static void registerViewsAndDrawer(MobileApplication app) {

    for (AppView view : REGISTRY.getViews()) {

    view.registerView(app);

    }

    NavigationDrawer.Header header = new NavigationDrawer.Header("Gluon Mobile",

    "The BasketStats App",

    new Avatar(21,

    new Image(BasketStats.class.getResourceAsStream("/icon.png"))));

    DefaultDrawerManager drawerManager = new DefaultDrawerManager(app,

    header, REGISTRY.getViews());

    drawerManager.installDrawer();

    }

    }

    Listing 13-8. The AppViewManager Class

    ```'
