    The `WebView` node is the main area to display an HTML document. The zoom slider
    control will add handler code (`InvalidationListener`) to update the `WebView`
    node’s zoom property.


    When displaying the zoom value as a percentage, a JavaFX `Label` is updated whenever
    the slider value changes. Here, you will see how a string is converted to a double
    using a `StringConverter` class. The `StringConverter` class converts a double
    value from the slider control to a text value of a label control having a % percent
    symbol appended. Once the `StringConverter` object is created and assigned to
    the variable `sc`, the code will bind properties based on the label’s text property
    (`String`), zoom slider’s value (`Double`), and variable `sc`.


    The following code snippet binds the properties and variables mentioned.


    ```

    Bindings.bindBidirectional(zoomValueLabel.textProperty(),

    zoomSlider.valueProperty(), sc);

    ```


    The code continues to create the rest of the application by adding a JavaFX `TextField`
    for a URL address line similar to web browsers. The address line allows the user
    to enter a valid `URL` to request a specified web page. The text field has an
    `onAction` property to set handler code that will then call the web engine’s `load()`
    method. In other words, after the user enters the web address, she will then press
    the Enter key to trigger the loading of the web page.


    Next is the creation of the Print button (`printButton` variable) to print based
    on the selected print mode. The Print button will determine the print mode before
    sending data to the printer. When the user chooses Node Only, the code will pass
    the `WebView` node into the `printPage()` method of the `PrintJob` object. If
    the user chooses to print the whole document, the code obtains the web engine
    (`WebEngine`) and passes the print job to the `print()` method. The following
    snippet of code is from Listing [8-8](#A323804_3_En_8_Chapter.html#Par78) and
    it shows the two print modes again—Node Only and Whole Web document.


    ```

    // Node Only - print mode

    job.printPage(browserDisplay);

    // Whole Web Doc - print mode

    webEngine.print(job);

    ```


    Finishing up with Listing [8-8](#A323804_3_En_8_Chapter.html#Par78), the code
    creates a path outlined as a rectangle consisting of width and height values from
    the default printer’s layout. Lastly, the `printModeGroup` (`ToggleGroup`) variable’s
    `selectedToggleProperty` attaches handler code that toggles the red rectangle
    shape’s `visible` property. Also, when the Print button is clicked, the print
    mode is determined by calling the `printModeGroup` objects’ `getUserObject()`
    method to obtaining a string. This string represents one of the two string constants:
    `NODE_ONLY` or `WHOLE_WEB_DOC`.


    ## Summary


    In this chapter you began with a simple code snippet that launches a print dialog
    to configure your printer before printing a JavaFX node. Next, you got acquainted
    with the JavaFX print APIs by querying and displaying all of a printer’s supported
    features and attributes. After learning about print attributes, you were able
    to programmatically configure a print job using the `JobSettings` object obtained
    from a `PrinterJob` instance. While configuring a print job programmatically,
    you were warned about attributes not getting modified unless the printer supports
    a particular attribute such as printing double sided or black and white.


    After learning about how to query and configure printer attributes, you were able
    to learn about the convenient `print()` method from the `WebEngine` object. Also,
    you learned that the `print()` method can print web content that spans multiple
    pages, and you can automatically scale web content to fit each page. Lastly, you
    got a chance to look at an example application called `WebDocPrinter.java` that
    is capable of printing web content in two print modes: Node Only and Whole Web
    Document. The Node Only print mode prints a portion of the web document by sending
    the `WebView` node to the printer, while the Whole Web Document print mode prints
    the whole web page even if it spans multiple pages.


    # 9. Media and JavaFX


    JavaFX provides a media-rich API capable of playing audio and video. The Media
    API allows developers to incorporate audio and video into their Rich Internet
    Applications (RIAs) . One of the main benefits of the Media API is that it can
    distribute cross-platform media content via the Web. With a range of devices (tablet,
    music player, TV, and so on) that need to play multimedia content, the need for
    a cross-platform API is essential.


    Imagine a not-so-distant future where your TV or wall is capable of interacting
    with you in ways that you’ve never dreamed possible. For instance, while viewing
    a movie, you could select items of clothing used in the movie to be immediately
    purchased, all from the comfort of your home. With this future in mind, developers
    seek to enhance the interactive qualities of their media-based applications.


    In this chapter, you will learn how to play audio and video in an interactive
    way. Find your seats as audio and video take center stage.


    You will learn about the following JavaFX media APIs :


    *   `javafx.scene.media.Media`

    *   `javafx.scene.media.MediaPlayer`

    *   `javafx.scene.media.MediaStatus`

    *   `javafx.scene.media.MediaView`'
