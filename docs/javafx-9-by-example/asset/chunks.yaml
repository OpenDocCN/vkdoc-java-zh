- fmt: "# Theming\n\nYou have probably heard the terms skinning and look and feel\
    \ in the context of designing user interfaces. These terms are often used interchangeably,\
    \ and they both reflect the basic concept of theming or styling a UI. Theming\
    \ is the idea of transforming an entire application’s appearance without changing\
    \ its underlying functionality. An example of theming is when you change an application’s\
    \ UI layout and controls from a stylized business theme to a sports-like theme.\
    \ Usually, companies try to skin an application to resemble their logo. They also\
    \ use beautiful typefaces (typography) selected to personify their corporate culture\
    \ or target audience.\n\nIn JavaFX you have the ability to create, modify, or\
    \ use existing themes to skin your applications. Later, I discuss how to create\
    \ themes, but for now I show you how to apply existing themes (skins) in JavaFX\
    \ applications. To demonstrate applying themes to an application’s UI, I created\
    \ a JavaFX application depicted in Figure [15-1](#A323804_3_En_15_Chapter.html#Fig1),\
    \ which allows users to apply various UI look-and-feel themes.\n\n![A323804_3_En_15_Fig1_HTML.jpg](A323804_3_En_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1. Setting an application’s look and feel using JavaFX CSS styling.\
    \ Moving counterclockwise from the upper-left are the Caspian, Modena, Sky, and\
    \ Flat Red themes.\n\nAs you can see, there are four UI skins applied to the same\
    \ application. At the upper left is the familiar Caspian theme from Java FX 2.X.\
    \ Caspian has served well over the years and still has quite the professional\
    \ look. At the lower left you see an accordion UI control expanded to show progress\
    \ controls using JavaFX 8’s new default theme, Modena. The Modena theme seems\
    \ brighter, cleaner, and more modern.\n\nAt the lower right, the next theme, called\
    \ the Sky look and feel, was created by yours truly (Carl Dea). My intent was\
    \ to create a theme for touch displays so that the controls would be slightly\
    \ enlarged for adult-sized fingers. I wanted a friendly feel and so the cool blue\
    \ sky came to mind.\n\nLast, but not least, in the upper right is the Flat Red\
    \ look and feel, created by Gerrit Grunwald.\n\nThe Flat Red uses a custom font\
    \ (Roboto) to give text on controls a crisp and clean look. Another nice feature\
    \ of the Flat Red theme is that it uses CSS effects based on pseudo-class state\
    \ changes of UI controls, such as a mouse press on a slider control. Don’t worry\
    \ if you don’t know yet what pseudo-classes are, because later in this chapter,\
    \ you will learn about pseudo-class selectors in detail. Mr. Grunwald’s look and\
    \ feel is also an excellent candidate for touch displays.\n\n## Native Look and\
    \ Feels\n\nBefore jumping into example code, I want to give a shout-out to individuals\
    \ (pioneers) in the JavaFX community who have crafted beautiful skins and themes\
    \ that you will find most inspiring. For those interested in the OS X (Mac desktop)\
    \ native look and feel, Claudine Zillmann (`@etteClaudette`) created AquaFX (with\
    \ Elements). You can download AquaFX at [`http://aquafx-project.com`](http://aquafx-project.com).\
    \ AquaFX, shown in Figure [15-2](#A323804_3_En_15_Chapter.html#Fig2), is a library\
    \ that allows developers to style applications easily with the native OS X look,\
    \ but also to theme the UI with colors other than the usual aqua blue.\n\n![A323804_3_En_15_Fig2_HTML.jpg](A323804_3_En_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2. AquaFX is a JavaFX library that styles controls resembling the\
    \ OS X native look and feel\n\nFor those interested in Window’s Metro look and\
    \ feel, Pedro Duque Vieira (`@P_Duke`) created a project called JMetro. JMetro\
    \ has a light theme, shown in Figure [15-3](#A323804_3_En_15_Chapter.html#Fig3),\
    \ and a dark theme shown in Figure [15-4](#A323804_3_En_15_Chapter.html#Fig4).\n\
    \n![A323804_3_En_15_Fig4_HTML.jpg](A323804_3_En_15_Fig4_HTML.jpg)\n\nFigure 15-4.\
    \ The date picker control stylized using JMetro’s dark theme\n\n![A323804_3_En_15_Fig3_HTML.jpg](A323804_3_En_15_Fig3_HTML.jpg)\n\
    \nFigure 15-3. The date picker control stylized using JMetro’s light theme\n\n\
    To download the JMetro theme, go to JFXtras’ Style section at [`https://github.com/JFXtras/jfxtras-styles/tree/master/src`](https://github.com/JFXtras/jfxtras-styles/tree/master/src).\n\
    \nWhat about a look and feel that has a Roku-like or Apple TV-like interface;\
    \ it’s called Flatter, by Java Champion and book author Hendrik Ebbers (`@hendrikEbbers`).\
    \ Flatter was designed for a proof of concept project BoxFX. BoxFX is another\
    \ project Mr. Ebbers created by using a Raspberry Pi device running JavaFX 8 with\
    \ the Flatter look and feel, as shown in Figure [15-5](#A323804_3_En_15_Chapter.html#Fig5).\n\
    \n![A323804_3_En_15_Fig5_HTML.jpg](A323804_3_En_15_Fig5_HTML.jpg)\n\nFigure 15-5.\
    \ The Flatter style applied to a JavaFX application\n\nThe following are links\
    \ to the UI styles mentioned in this section:\n\n*   AquaFX (with Elements): [`http://aquafx-project.com/project.html`](http://aquafx-project.com/project.html)\n\
    *   Jmetro\n    *   [`http://pixelduke.wordpress.com/category/metro`](http://pixelduke.wordpress.com/category/metro)\n\
    \    *   [`https://github.com/JFXtras/jfxtras-styles`](https://github.com/JFXtras/jfxtras-styles)\n\
    *   Flatter: [`http://www.guigarage.com/2013/09/flatter`](http://www.guigarage.com/2013/09/flatter)\n\
    *   BoxFX: [`http://www.guigarage.com/2013/08/boxfx-javaone-preview-1`](http://www.guigarage.com/2013/08/boxfx-javaone-preview-1)\n\
    \nNow that you’ve seen native looking styles and media device styles, let’s look\
    \ at web and mobile UI styles.\n\n## Web and Mobile Look and Feels\n\nDepending\
    \ on the application, the users might prefer a more web or mobile look and feel.\
    \ Often the screen dimensions of a device can force a designer’s decision to have\
    \ a non-native UIs look. Non-native UIs make up the majority of popular web sites\
    \ and mobile apps. So what are the popular non-native UIs that I’m referring to?\n\
    \nAs a web developer, the most popular UI styles (look and feels) today are Google’s\
    \ Material Design and Twitter’s Bootstrap. For example, Figure [15-6](#A323804_3_En_15_Chapter.html#Fig6)\
    \ shows a JavaFX clock and `TreeTableView` controls skinned with the Material\
    \ Design style.\n\n![A323804_3_En_15_Fig6_HTML.jpg](A323804_3_En_15_Fig6_HTML.jpg)\n\
    \nFigure 15-6. The Material Design style applied to a JavaFX application\n\nFigure\
    \ [15-7](#A323804_3_En_15_Chapter.html#Fig7) shows buttons styled with the Twitter’s\
    \ Bootstrap look and feel.\n\n![A323804_3_En_15_Fig7_HTML.jpg](A323804_3_En_15_Fig7_HTML.jpg)\n\
    \nFigure 15-7. Twitter’s Bootstrap style applied to a button controls\n\nAs the\
    \ JavaFX community continues to grow and adapt to these new UI styles, there are\
    \ a growing number of developers who have ported these popular UI styles as libraries\
    \ to help you transform your JavaFX application to these popular UI styles.\n\n\
    New to the list of folks who have created popular web and mobile device themes\
    \ are the following:\n\n*   (Google) Material Design\n    *   GluonHQ\n      \
    \  *   Site: [`http://gluonhq.com/products/mobile/`](http://gluonhq.com/products/mobile/)\n\
    \    *   JFoenix\n        *   Site: [`http://www.jfoenix.com`](http://www.jfoenix.com)\n\
    \        *   Author(s): [`http://www.jfoenix.com/team.html`](http://www.jfoenix.com/team.html)\n\
    \    *   MaterialFX\n        *   Site: [`http://www.agix.pt/single-post/2015/09/02/MaterialFX-Material-Design-CSS-for-JavaFX`](http://www.agix.pt/single-post/2015/09/02/MaterialFX-Material-Design-CSS-for-JavaFX)\n\
    *   (Twitter) Bootstrap\n    *   JBootx\n        *   Site: [`https://github.com/dicolar/jbootx`](https://github.com/dicolar/jbootx)\n\
    \        *   Author(s): [`https://github.com/dicolar/jbootx/graphs/contributors`](https://github.com/dicolar/jbootx/graphs/contributors)\n\
    \    *   BootstrapFX\n        *   Site: [`https://github.com/aalmiray/bootstrapfx`](https://github.com/aalmiray/bootstrapfx)\n\
    \        *   Author: Andres Almiray"
