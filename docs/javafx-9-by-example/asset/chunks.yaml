    ### A Code Walkthrough


    By using the Scene Builder tool to create the contact form, you saved the UI into
    an FXML formatted file. FXML is an XML markup language that represents JavaFX
    UIs. As the FXML is loaded to be displayed, the XML element tag associated with
    a JavaFX node is instantiated into Java code dynamically. The main idea of building
    UIs using FXML is to separate your UI code from your control logic (actions).
    After graphically laying out your UI elements and saving the file as `ContactForm.fxml`,
    you created a Controller class file named `ContactFormController.java`. The `ContactFormController`
    class contains `@FXML` annotations that reference UI elements inside the `ContactForm.fxml`
    file. The following code snippets are instance variables having the the `@FXML`
    annotation.


    ```

    @FXML private TextField firstNameField;

    @FXML private TextField lastNameField;

    ```


    The `@FXML` annotation is a Java runtime type annotation that tells the `FXMLLoader`
    utility class which UI elements to inject into the Controller class dynamically.
    This is JavaFX’s dependency injection mechanism that allows controller code to
    gain access to UI elements. Also, you’ll notice `@FXML` annotation can be applied
    to methods based on UI events such as the `OnAction` property. Listing [5-11](#A323804_3_En_5_Chapter.html#Par111)
    shows the `saveContactAction()` method you saw earlier within the Controller class.
    Also, recall from Figure [5-27](#A323804_3_En_5_Chapter.html#Fig27) (Step 17)
    that the method name is entered into the `OnAction` property field in the Scene
    Builder tool. This method is invoked when the Save button is pressed.


    ```

    @FXML

    protected void saveContactAction(ActionEvent event) {

    System.out.println("Saving the following information: ");

    System.out.println("First Name: " + firstNameField.getText());

    System.out.println(" Last Name: " + lastNameField.getText());

    }

    Listing 5-11.

    The Handler Code Bound to the Save Button in the UI

    ```


    Lastly, the JavaFX application code loads the FXML file to be displayed. This
    example treats the FXML file as a resource that will be loaded. Basically, a standard
    Java application or Java project will typically have a `resources` directory containing
    things like property files or images. In this example, we want to put FXML files
    at the root level. You’ll notice the `/` prefix on the file to denote the file
    must be located at the root classpath.


    The `FXMLLoader.load()` method is given the resource at the root classpath. If
    you compile your classes into a directory and begin to run the application, you
    must make sure the FXML file is copied to the root `classes` directory. See Step
    20 to compile and run the application from the command prompt. You set the classpath
    using `-cp .` and the `.` (dot) denotes the current directory is the root path,
    thus the `getResource()` method can see the `ContactForm.fxml` file to be loaded.


