- fmt: '### Copy Resources


    Since this `HelloWorld` application does not have any resources such as `fxml`
    files, images, or sound files, you can skip this step. But if you have resources
    to be copied over to the module directory, use the following commands. Change
    the following command to your satisfaction. Here are the commands to recursively
    copy files containing the suffix `*.fxml` to the `mods/com.jfxbe.helloworld/com/jfxbe/helloworld`
    directory.


    On the Linux/MacOS X platform, do the following:


    ```

    $ cp -r src/*.fxml mods/com.jfxbe.helloworld/com/jfxbe/helloworld

    ```


    On the Windows platform, do the following:


    ```

    C:\helloworld> xcopy C:\helloworld\src\*.fxml C:\helloworld\mods\com.jfxbe.helloworld
    /S /Y

    ```


    These commands copy files that end in `.fxml` recursively and place them in the
    `module` directory. This is important when your code tries to invoke the `getResource()`
    method.


    ### Run Application


    Here is how you run the application by specifying the module and class with a
    main application:


    ```

    $ java --module-path mods -m com.jfxbe.helloworld/com.jfxbe.helloworld.HelloWorld

    ```


    Figure [2-6](#A323804_3_En_2_Chapter.html#Fig6) shows the output of running the
    `HelloWorld` JavaFX module application.


    ![A323804_3_En_2_Fig6_HTML.jpg](A323804_3_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    Output of the HelloWorld JavaFX modularized application


    ### Package Application as JAR


    The previous module was compiled as classes that were put into the `mods/com.jfxbe.helloworld`
    directory. Wouldn’t it be nice to create a JAR file executable? Well, let’s begin
    by creating a `mlib` directory. This can be named anything, but, as a convention,
    the `mlib` stands for module libraries. The `mlib` directory will contain the
    JAR module application. The following explains how to package a Java 9 modular
    application.


    On the Linux/MacOS X platform, do the following:


    ```

    $ mkdir mlib

    $ jar --create --file=mlib/com.jfxbe.helloworld.jar \

    --main-class=com.jfxbe.helloworld.HelloWorld -C mods/com.jfxbe.helloworld/.

    ```


    On the Windows platform, do the following:


    ```

    C:\helloworld> md mlib

    C:\helloworld> jar --create --file=C:\helloworld\mlib\com.jfxbe.helloworld.jar
    --main-class=com.jfxbe.helloworld.HelloWorld -C C:\helloworld\mods\com.jfxbe.helloworld.

    ```


    The switches are described as follows:


    *   `--create`: Creates a JAR file

    *   `--file`: The JAR file to be created

    *   `--main-class`: The main class as a JavaFX application

    *   `-C`: This switch helps change directories and code to turn into


    ### Run Application as JAR


    Another way to run the JavaFX application is to run it as a JAR file. Since the
    JAR was created with a main class specified, the following commands don’t include
    the class name to run the application. This will cut down on the typing.


    ```

    java --module-path mlib -m com.jfxbe.helloworld

    ```


    Since the JAR module definition points to the Java’s main class, you will notice
    that `-m` does not need to specify the package name/class type. This is just a
    shortcut instead of the more robust way of Java.


    ### Display Module Description


    Now that you know how to package your application as a JAR file, you may want
    to peek into or display the module info with its dependencies. The following command
    will read and display a module’s `module-info` file.


    ```

    jar --describe-module --file=mlib/com.jfxbe.helloworld.jar

    ```


    The following output shows the use of the `--describe-module` switch.


    ```

    module com.jfxbe.helloworld (module-info.class)

    requires mandated java.base

    requires javafx.base

    requires javafx.controls

    requires javafx.graphics

    exports com.jfxbe.helloworld

    main-class com.jfxbe.helloworld.HelloWorld

    ```


    ## Summary


    In this chapter, you learned about Java 9’s project Jigsaw to modularize Java
    code. You got a chance to look at the benefits and drawbacks of modularizing.
    You ran the `jdeps` tool to assist you in your migration path from JDK 8 to JDK
    9. After that, you heard about the term of JAR hell, which basically means Java
    classes will conflict when different versions are loaded from the classpath. You
    also learned a little about OSGi containers and how to easily create module bundles.
    OSGi contains a plethora of attributes as bundle definitions.


    Along with modules, you got a glimpse of Maven/Gradle build tools on managing
    dependencies. These build tools also have repositories that enable developers
    to store and retrieve artifacts.


    Next, you learned how to define a module definition in a `module-info.java` file.
    After defining a module, you learned about four module types. The following module
    types are: Platform, Unnamed, Automatic, and Application. You learned about more
    details regarding the JavaFX platform modules by seeing the entire module graph.


    Last but not least, you got a chance to create a JavaFX `HelloWorld` application
    as a Java 9 module. You were able to learn how to compile and create a Java 9
    JAR module.


    Well, there you have it—Java 9 modules.


    # 3. JavaFX Fundamentals


    There is nothing more frustrating than receiving complicated advice as a solution
    to a problem. Because of this, I have always made it a point to focus on the fundamentals.
    In the case of JavaFX, you will learn about fundamental drawing primitives that
    will be used on the drawing surface (JavaFX scene). In order to render graphics
    on the JavaFX scene, you need basic shapes and colors. Expanding on your knowledge
    of the JavaFX scene graph, which you visited toward the end of Chapter [1](#A323804_3_En_1_Chapter.html),
    you will learn in this chapter how to draw and manipulate 2D shapes on the JavaFX
    scene graph.


    Even more fundamental than a shape object is JavaFX’s `javafx.scene.Node` class.
    The `Node` class is a fundamental base class for all JavaFX scene graph nodes.
    The `Node` class provides the ability to transform, translate, and apply effects
    to any node. Many examples in this chapter involve the `javafx.scene.shape.Shape`
    class, which is a descendant of the `Node` class. Therefore, the `Shape` class
    will inherit all of the `Node` class’s capabilities. In this chapter, you will
    explore many derived classes that inherit from `Shape`. You will begin this chapter
    by examining JavaFX’s most basic shape, the `Line` node.'
