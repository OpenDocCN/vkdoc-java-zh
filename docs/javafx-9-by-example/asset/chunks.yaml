    -fx-border-width: 1.5;

    -fx-border-color: white;

    }

    .left-arrow {

    -fx-fill: -arrow-fill;

    }

    .left-arrow:hover {

    -fx-fill: -arrow-fill-hover;

    -fx-effect: -blur-effect-hover;

    }

    .right-arrow {

    -fx-fill: -arrow-fill;

    }

    .right-arrow:hover {

    -fx-fill: -arrow-fill-hover;

    -fx-effect: -blur-effect-hover;

    }

    Listing 7-23.

    The photo-viewer.css File Contains the JavaFX CSS Selectors and Styling Definitions
    for the Various UI Elements

    ```


    The remainder of Listing [7-23](#A323804_3_En_7_Chapter.html#Par132) shows CSS
    selectors employing pseudo-classes that handle mouse hover (`:hover`) states when
    the mouse cursor enters or exits a node. When the mouse hovers over the previous
    and next arrow buttons, a blue glow effect is applied to the button. In Chapter
    [15](#A323804_3_En_15_Chapter.html), you will get a chance to hear more about
    class selectors and pseudo-class states.


    Well, there you have it, a nice Photo Viewer application capable of scaling, rotating,
    and changing color settings in an image. Now for even more fun on the topic of
    graphics, the next section looks at JavaFX animation APIs.


    ## Animation


    An animation is an illusion of motion when images change over time. Quite similar
    to a cartoon flipbook, each page represents a frame or picture that will be displayed
    on a timeline for a period of time (duration). In JavaFX, you will be working
    with the animation API (`javafx.animation.*`). In this section, you learn about
    key values, keyframes, timelines, and transitions. Finally, to demonstrate the
    animation APIs, you will explore a slightly modified Photo Viewer application
    with additional enhancements.


    ### What Are Key Values ?


    The JavaFX animation API allows you to assemble timed events that can interpolate
    over property-based values in order to produce animated effects. For example,
    to produce a fade-out effect, you target a node’s opacity property to interpolate
    its value starting from 1 (fully opaque) to 0 (transparent) over a period of time.
    Listing [7-24](#A323804_3_En_7_Chapter.html#Par138) defines a `KeyValue` instance
    that targets a rectangle node’s opacity property starting at 1 and ending with
    the value 0. By default, a `KeyValue` object will have a linear interpolator.


    ```

    Rectangle Rectangle rectangle = new Rectangle(0, 0, 50, 50);

    KeyValue keyValue = new KeyValue(rectangle.opacityProperty(), 0);

    Listing 7-24.

    A KeyValue Object to Fade Out by Interpolating the Opacity Property From 1 to
    0

    ```


    The `KeyValue` object doesn’t actually interpolate the value, but simply defines
    the start and end values of a property to interpolate between. Also, the `KeyValue`
    can be defined with different types of interpolators, such as linear, ease in,
    or ease out. For example, Listing [7-25](#A323804_3_En_7_Chapter.html#Par140)
    defines a key value that will animate a rectangle by moving it from left to right
    by 100 pixels having an `Interpolator.EASE_OUT` interpolator. Easing out will
    slow down the movement before the end key value.


    ```

    Rectangle rectangle = new Rectangle(0, 0, 50, 50);

    KeyValue keyValue = new KeyValue(rectangle.xProperty(), 100, Interpolator.EASE_OUT);

    Listing 7-25.

    A KeyValue Object to Move a Rectangle from Left to Right 100 Pixels with an Interpolator
    that Starts to Slow Down When it Reaches the End Value

    ```


    Visit the Javadocs documentation for available interpolators (`javafx.animation.Interpolator`).
    By default, `KeyValue` constructors that don’t specify an interpolator will use
    a linear interpolation (`Interpolator.LINEAR`), which evenly distributes the values
    over a period of time.


    ### What Are Keyframes ?


    When an animation (`javafx.animation.Timeline`) occurs, each timed event, called
    a keyframe (a `KeyFrame` object), is responsible for interpolating key values
    (`KeyValue` objects) over a period of time (`javafx.util.Duration`). When creating
    a `KeyFrame` object, the constructor requires a timed duration to interpolate
    over key values. `KeyFrame` constructors all accept one or more key values by
    using a variable containing an argument list or a collection of `KeyValue` objects.


    To demonstrate moving a rectangle in a diagonal direction from upper left to lower
    right, Listing [7-26](#A323804_3_En_7_Chapter.html#Par144) defines a keyframe
    that has a duration of 1000 milliseconds and two key values that represent the
    rectangle’s x and y properties.


    ```

    Rectangle rectangle = new Rectangle(0, 0, 50, 50);

    KeyValue xValue = new KeyValue(rectangle.xProperty(), 100);

    KeyValue yValue = new KeyValue(rectangle.yProperty(), 100);

    KeyFrame keyFrame = new KeyFrame(Duration.millis(1000), xValue, yValue);

    Listing 7-26.

    Keyframe Defined for a Rectangle to Move Diagonally from Upper Left to Lower Right
    Spanning a One-Second Duration

    ```


    This example defines a keyframe to move a rectangle’s upper-left corner (0, 0)
    to point (100, 100) in one second or 1000 milliseconds. Now that you know how
    to define keyframes, you need to execute the animation by using a `Timeline` instance.'
