    #### MediaView 节点


    ```

    private MediaView createMediaView(Pane root)

    ```


    在 `start()` 方法中添加全屏功能后，代码调用了私有方法 `createMediaView()`，该方法返回一个负责显示视频的 `MediaView`
    节点。


    为了了解 `createMediaView()` 方法实际返回的内容，我们来看看它的实现方式。在 `createMediaView()` 方法内部，首先实例化一个
    ID 为 `media-view` 的 `MediaView` 节点。然后，代码将保持比例属性设置为 `true`，这样在调整视频图像大小时，其宽高比将保持不变。换句话说，调整窗口大小不会拉伸视频画面。清单
    9-8 创建了一个保持宽高比的新 `MediaView` 节点。


    ```

    MediaView mediaView = new MediaView();

    mediaView.setId("media-view");

    mediaView.setPreserveRatio(true);

    清单 9-8.

    创建保持宽高比的 MediaView 节点

    ```


    你还记得使用 CSS 样式创建应用程序窗口时的情形吗？我之所以这么问，是因为你应该注意到背景具有带内嵌填充的圆角，并且还有圆角线框边框。基于这些细节，我设计让视频（`MediaView`）能够适配在圆角边框区域内。由于观看区域的尺寸可能会发生变化，例如激活全屏模式或调整窗口大小，代码需要重新计算
    `MediaView` 节点视口的宽度和高度值。


    为了精确起见，我选择创建两个自定义属性来动态调整媒体视图的显示区域。第一个自定义属性名为 `widthProperty`，它根据可用空间计算媒体视图节点的宽度。媒体视图宽度的可用空间是根据根面板的宽度减去左右内嵌值计算得出的。内嵌值是面板（根面板）内边距和边框宽度的并集。


    第二个自定义属性名为 `heightClipProperty`，它计算 `MediaView` 裁剪区域的高度值。正在显示的视频高度可能会超过应用程序底部边框的高度，因此将施加一个裁剪区域来防止这种情况发生。清单
    9-9 展示了计算显示宽度和高度的两个自定义属性。如果你不熟悉自定义属性，请参考第 4 章关于 lambda 表达式和属性的内容。


    ```

    // 计算 MediaView 的宽度（在 AnchorPane 中）

    DoubleBinding widthProperty = new DoubleBinding(){

    @Override

    protected double computeValue() {

    return root.getWidth() - (root.getInsets()

    .getLeft() +

    root.getInsets()

    .getRight());

    }

    };

    // 计算裁剪区域的高度。

    // 这可以防止视频显示超出底部边框区域。

    DoubleBinding heightClipProperty = new DoubleBinding(){

    @Override

    protected double computeValue() {

    return root.getHeight() - (root.getInsets()

    .getTop() +

    root.getInsets()

    .getBottom());

    }

    };

    清单 9-9.

    用于计算显示 MediaView 节点时宽度和高度的自定义属性

    ```


    继续 `createMediaView()` 方法，代码将 `MediaView` 节点的 `fitWidthProperty` 与自定义属性 `widthProperty`
    进行绑定。绑定 `widthProperty` 后，代码会向根节点（`AnchorPane`）添加失效监听器。这些监听器会检测根节点宽度和高度属性的变化。一旦检测到变化，自定义属性
    `widthProperty` 和 `heightClipProperty` 就会被标记为失效，这将导致这些属性被重新计算。


    ```

    // MediaView 的 fitWidth 绑定

    mediaView.fitWidthProperty().bind(widthProperty);

    // 当宽度变化时重新计算

    root.widthProperty().addListener(observable1 ->

    widthProperty.invalidate());

    // 当高度变化时重新计算

    root.heightProperty().addListener(observable1 ->

    heightClipProperty.invalidate());

    清单 9-10.

    窗口大小调整时重新计算自定义属性的绑定和监听器

    ```


    接下来，代码创建一个裁剪区域，该区域将创建一个视口，其尺寸绑定到两个自定义属性——`widthProperty` 和 `heightClipProperty`。清单
    9-11 展示了裁剪区域的创建，其形状类似于根节点背景的内嵌圆角边框区域。


    ```

    // 创建一个与根面板圆角边框匹配的圆角矩形裁剪区域。

    // 绑定使用计算出的尺寸属性：

    // widthProperty 和 heightClipProperty

    Rectangle clipRegion = new Rectangle();

    clipRegion.setArcWidth(10);

    clipRegion.setArcHeight(10);

    clipRegion.widthProperty().bind(widthProperty);

    clipRegion.heightProperty().bind(heightClipProperty);

    mediaView.setClip(clipRegion);

    清单 9-11.

    应用于 MediaView 节点的裁剪区域

    ```


    最后一个监听器将附加到根面板（`AnchorPane`）上，以便在 `insets` 属性发生变化时做出响应。由于应用程序尚未显示，内嵌值此时为零。换句话说，此时
    CSS 样式尚未应用和渲染。清单 9-12 展示了一个用于更新裁剪区域和媒体视图属性的失效监听器。一旦 CSS 被应用并渲染到 JavaFX 场景中，`insets`
    属性将发生变化并调用监听器代码。如果内嵌值或边框宽度发生变化，裁剪区域以及媒体视图的位置和尺寸将被重新计算。


    ```

    // 在失效监听器上更新计算

    // 以重新定位媒体视图和裁剪区域

    root.insetsProperty().addListener(observable -> {

    widthProperty.invalidate();

    heightClipProperty.invalidate();

    Insets insets = root.getInsets();

    clipRegion.setX(insets.getRight());

    clipRegion.setY(insets.getTop());

    mediaView.setX(insets.getRight());

    mediaView.setY(insets.getTop());

    });

    清单 9-12.

    当 insets 属性变化时响应的失效监听器

    ```


    最后，清单 9-13 展示了代码如何简单地将处理程序代码添加到 `OnError` 属性中，以便在媒体视图节点中引发错误事件时进行处理。该代码仅打印媒体错误的堆栈跟踪信息。


    ```

    // 当发生错误时

    mediaView.setOnError(mediaErrorEvent -> {

    mediaErrorEvent.getMediaError()

    .printStackTrace();

    });

    return mediaView;

    清单 9-13.

    为 MediaView 节点遇到错误时添加处理程序代码

    ```


    ## 模拟隐藏式字幕：在视频媒体中标记位置


    你是否曾想实现隐藏式字幕视频？过去，曾有关于 JavaFX 8 可能支持视频媒体标准隐藏式字幕规范的讨论；然而，截至撰写本文时，该功能的状态尚不明确。幸运的是，仍有希望；JavaFX
    支持媒体事件标记，以实现与隐藏式字幕视频相同的行为。

    '
- fmt: "### Closed Captioning Video Example\n\nTo demonstrate a closed captioning\
    \ video example, I created a project called `ClosedCaptionVideo`. For the sake\
    \ of space, I will show only the code parts that are relevant to media event markers\
    \ (see Listing [9-14](#A323804_3_En_9_Chapter.html#Par156)). To see the full source\
    \ code, visit the book’s web site and download the code for this chapter.\n\n\
    When you read about the video media file formats earlier, you learned that an\
    \ `.flv` file could be found at the following URL: [`http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html`](http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html).\n\
    \nI use the file `20051210-w50s.flv` for the closed captioning video example.\
    \ Figure [9-8](#A323804_3_En_9_Chapter.html#Fig8) depicts the closed captioning\
    \ (`Label`) being displayed at certain points in the video at the bottom of the\
    \ screen. The node to display the text is a JavaFX label positioned at the bottom.\
    \ To change the text font and size, look at the `playing-video.css` file.\n\n\
    ![A323804_3_En_9_Fig8_HTML.jpg](A323804_3_En_9_Fig8_HTML.jpg)\n\nFigure 9-8. Closed\
    \ captioning video\n\nListing [9-14](#A323804_3_En_9_Chapter.html#Par156) shows\
    \ the code at end of the `playMedia()` method setting up the closed captioning\
    \ code. Notice that the media object was obtained after the user dragged and dropped\
    \ a video file over the surface of the application. Next, the code does a lookup\
    \ to obtain the closed captioning label node to later be updated based on the\
    \ `OnMarker` event.\n\n```\n// obtain media object\nMedia media = ...\n// lookup\
    \ closed caption label\nLabel closedCaption =\n(Label) root.lookup(\"#closed-caption-text\"\
    );\n// Rewind back to the beginning\nmediaPlayer.setOnEndOfMedia( ()-> {\nupdatePlayAndPauseButtons(true,\
    \ root);\n// change buttons to the play button\nmediaPlayer.stop();\nplayAndPauseToggle.set(false);\n\
    // clear closed caption\nclosedCaption.setText(\"\");\n});\nmedia.getMarkers().put(\"\
    Starting race\",\nDuration.millis(1959));\nmedia.getMarkers().put(\"He is beginning\
    \ to get ahead of her.\",\nDuration.millis(3395));\nmedia.getMarkers().put(\"\
    They are turning the corner\",\nDuration.millis(6060));\nmedia.getMarkers().put(\"\
    The crowds are cheering !!!\",\nDuration.millis(9064));\nmedia.getMarkers().put(\"\
    The gentleman makes it to the finish line.\",\nDuration.millis(11546));\n// display\
    \ closed caption\nmediaPlayer.setOnMarker((MediaMarkerEvent event) ->\nclosedCaption.setText(event.getMarker().getKey())\n\
    );\nListing 9-14. Media Marker Events\n```\n\n### How It Works\n\nListing [9-14](#A323804_3_En_9_Chapter.html#Par156)\
    \ shows a newly created `Media` object based on a valid URL string. The code begins\
    \ by looking up the closed captioning `Label` node.\n\nAssuming the `start()`\
    \ method has called the private method `createClosedCaptionArea()`, the root node\
    \ will contain a `Label` node with an ID `close-caption-text`. After obtaining\
    \ the closed captioning node, the code implements handler code when the `OnEndOfMedia`\
    \ event is raised. The handler code updates the display of the Play and Pause\
    \ buttons, but also clears the closed captioning `Label` node.\n\nNext, the code\
    \ adds key/value pairs as markers in media. Each marker pair consists of a key\
    \ of type `String` and a value of type `Duration` (in milliseconds). The duration\
    \ is the time at which an `OnMarker` event is triggered.\n\nYou’ll immediately\
    \ notice that the `setOnMarker()` method is set with a lambda expression with\
    \ a parameter of type `MediaMarkerEvent`. The `MediaMarkerEvent` closure code\
    \ is invoked when the `OnMarker` event is raised. The closure code simply sets\
    \ the `closedCaption` (`javafx.scene.control.Label`) node with the key’s value\
    \ as the closed captioning text.\n\n## Summary\n\nIn this chapter, you discovered\
    \ the world of JavaFX media. You began by learning about media events and event-based\
    \ programming when dealing with the JavaFX Media APIs. Next, you saw how easy\
    \ it is to create a media file as a URL string to be loaded and played. After\
    \ learning about the `MediaPlayer` API, you got a chance to look at an MP3 audio\
    \ player example that demonstrated features such as Seek, Stop, Pause, and Play.\
    \ You also learned how to implement a cool visualization using the `AudioSpectrumListener`\
    \ interface.\n\nAfter you learned about audio media, you learned about video.\
    \ You learned about currently supported media formats such as MPEG-4 and FLV.\
    \ Then you saw an example of a basic JavaFX video player application. Here, you\
    \ discovered that playing video is the same as playing audio, except for the use\
    \ of the `MediaView` node, which is capable of displaying the video. Finally,\
    \ you were exposed to a short example of media marker events (`MediaMarkerEvent`)\
    \ to simulate a closed captioning video.\n\n# 10. JavaFX on the Web\n\nJavaFX\
    \ provides capabilities to interoperate with HTML5 content. The underlying web\
    \ page rendering engine in JavaFX is the popular open source C++ API called WebKit.\
    \ This API is used in Apple’s Safari browsers, Amazon’s Kindle devices, and was\
    \ used in Google’s Chrome browser prior to version 27 (the WebKit fork is called\
    \ Blink). HTML5 is the de facto standard markup language for rendering content\
    \ in web browsers. HTML5 content consists of JavaScript, CSS, Scalable Vector\
    \ Graphics (SVG), Canvas API, Media, XML, and new HTML element tags. In short,\
    \ you can create JavaFX applications embedded with web browser-like functionality.\n\
    \nThe relationship between JavaFX and HTML5 is an important combination because\
    \ they complement one another by drawing from each of their individual strengths.\
    \ For instance, JavaFX’s rich client APIs coupled with HTML5’s rich web content\
    \ create a user experience resembling a web application with the characteristics\
    \ of native desktop software. This new breed of application is called the Rich\
    \ Internet Application (RIA).\n\nBefore delving into the example applications,\
    \ the chapter discusses the following core Java/JavaFX web-based APIs:\n\n- Java\
    \ 9 Module `javafx.web`, Package namespace: `javafx.scene.web`\n  - `WebEngine`\n\
    \  - `WebView`\n  - `WebEvent`\n- Java 9 Module: `jdk.jsobject`, Package namespace:\
    \ `netscape.javascript`\n  - `JSObject`\n- Java 9 Module: `jdk.incubator.httpclient`,\
    \ Package namespace: `jdk.incubator.http`. The module `jdk.incubator.httpclient`\
    \ is currently experimental in Java 9. According to some reports, the module will\
    \ be finalized in Java 10 and named `java.httpclient`.\n  - `HttpClient`\n  -\
    \ `HttpRequest`\n  - `HttpResponse`\n\nIn this chapter, you examine example applications\
    \ that do the following:\n\n- Display HTML5 content into a `WebView` node (an\
    \ SVG-based Analog Clock)\n- Communication between Java and JavaScript (`WeatherWidget`)"
