  trans: '

    ## 本书学习内容


    本书将通过实践示例，带你学习 JavaFX 9 的各项功能。这些示例将逐步为你提供创建丰富客户端应用程序所需的知识。秉承 Java“一次编写，随处运行”的理念，JavaFX
    也延续了这一精神。由于 JavaFX 9 完全使用 Java 语言编写，你将感到得心应手。


    大多数示例可以在 Java 8 下编译和运行。不过，其中一些示例旨在利用 Java 9 的语言增强特性。在通过本书学习 JavaFX 8 和 9 的过程中，你会发现
    JavaFX API 和语言增强功能将帮助你成为一名更高效的开发者。话虽如此，我们仍鼓励你探索 Java 8 的所有新特性。


    本书涵盖 JavaFX 8 和 9 的基础知识、模块、Lambda 表达式、属性、布局、UI 控件、打印机、动画、自定义 UI、图表、媒体、Web、3D、Arduino、触摸事件和手势。


    ## 本书读者对象


    如果你是一名 Java 开发者，希望将客户端应用程序提升到新高度，那么本书将成为你的指南，帮助你开始创建可用且美观的用户界面。此外，如果你是一名经验丰富的
    Java Swing、Flash/Flex、SWT 或 Web 开发者，想要学习如何创建高性能的丰富客户端应用程序，那么本书也适合你。


    ## 本书结构


    本书按照从入门到中级再到高级概念的自然递进顺序编排。对于 Java 开发者而言，本书中提到的任何概念都不应过于难以理解。本书完全基于示例，并在演示应用程序之前讨论主要概念。对于每个项目，在展示代码执行输出后，我们将提供详细的解释，逐步讲解代码。每个示例都可以轻松调整，以满足你在开发游戏、媒体播放器或常规企业应用程序时的自身需求。你作为
    Java UI 开发者的经验越丰富，就越能自由地跳转到本书的不同章节和示例。然而，任何 Java 开发者都可以通读本书，并学习增强日常 GUI 应用程序所需的技能。


    致谢


    我要感谢我出色的妻子 Tracey 和我的女儿 Caitlin 与 Gillian，感谢她们充满爱意的支持和牺牲。特别感谢我的女儿 Caitlin，她在第一版中帮助我绘制插图并构思有趣的示例。衷心感谢
    Jim Weaver，他是一位出色的导师和朋友。我还要感谢 Josh Juneau 在整个过程中给予的建议和指导。非常感谢 Brian Molt，他提供了出色的反馈，最重要的是，他测试了我的代码示例。还要感谢
    David Coffin 对第二版进行技术审阅。向我的合著者 Gerrit Grunwald、José Pereda、Sean Phillips 和 Mark
    Heckler 致敬，他们才华横溢。我的合著者们是真正的超级英雄，他们挺身而出，使本书得以问世。


    向 Apress 的优秀员工们致以崇高的敬意，感谢他们的专业精神和支持。特别感谢 Jonathan Gennick 对我的信任，并一次次地鞭策我。感谢 Jill
    Balzano 让我们保持正轨并最终完成。


    感谢所有在 Twitter 上关注我的人，尤其是与 JavaFX、UI/UX 和 IoT 相关的话题（标签）。同时，感谢《Pro JavaFX》一书的作者们（Jim
    Weaver、Weiqi Gao、Stephen Chin、Dean Iverson 和 Johan Vos）允许我在第一版中担任技术审阅章节。还要感谢 Stephen
    Chin 和 Keith Combs 领导出色的 JavaFX 用户组。我还要感谢 Rajmahendra Hegde 在 eWidgetFX 开源框架方面给予的帮助。感谢
    Hendrik Ebbers 在过去的 JavaOne 大会上总是希望与我合作进行演讲和有趣的项目。最重要的是，感谢所有过去 JavaFX 1.x 书籍的作者们，他们激励了我。


    衷心感谢整个 JavaFX 社区，其中成员众多，无法一一列举。最后，我要向在 JavaFX 2.x、8 和 9 发布期间直接或间接帮助过我的 Oracle
    员工和前员工们致以崇高的敬意和感谢：Nandini Ramani、Jonathan Giles、Jasper Potts、Richard Bair、Angela
    Caicedo、Stuart Marks、John Yoon、David Grieve、Michael Heinrichs、David DeHaven、Nicolas
    Lorain、Kevin Rushforth、Sheila Cepero、Gail Chappell、Cindy Castillo、Scott Hommel、Joni
    Gordon、Alexander Kouznetsov、Irina Fedortsova、Dmitry Kostovarov、Alla Redko、Nancy
    Hildebrandt，以及所有参与其中的 Java、JavaFX 和 NetBeans 团队。


    所以，你们或吃或喝，无论做什么，都要为荣耀神而行（哥林多前书 10:31，NASB）。


    > ——卡尔·迪亚

