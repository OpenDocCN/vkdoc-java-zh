    ## Videos and Presentations on JavaFX'
  trans: '

    *   TilesFX，作者 Gerrit Grunwald。一个包含仪表盘磁贴的 JavaFX 库：[`https://bintray.com/hansolo/tilesfx/tilesfx/1.4.5`](https://bintray.com/hansolo/tilesfx/tilesfx/1.4.5)
    Twitter：`@hansolo_`

    *   AnchorFX，作者 Alessio Vinerbi。JavaFX 平台的停靠框架：[`https://github.com/alexbodogit/AnchorFX`](https://github.com/alexbodogit/AnchorFX)
    Twitter：`@Alessio_Vinerbi`

    *   JFXGL，作者 Jeff Martin。JFXGL 是一个跨平台解决方案，用于在 JVM 8 应用程序中将现代风格的 OpenGL 渲染（v3.2+）与
    JavaFX UI 集成。该项目面向桌面使用，支持所有三大主流平台：Linux、OS X 和 Windows：[`https://bitbucket.org/cuchaz/jfxgl`](https://bitbucket.org/cuchaz/jfxgl)
    Twitter：`@cuchaz`

    *   OpenJFX 8 每日构建版和稳定版（8u60）构建，作者 Chris Newland。适用于 Linux amd64（桌面）、OS X、x86egl（Monocle）和
    armv6hf（Raspberry Pi）的 OpenJFX 8 构建：[`https://chriswhocodes.com`](https://chriswhocodes.com)
    Twitter：`@chriswhocodes`

    *   FontAwesomeFX，作者 Jens Deter。一个包含流行字体包的库，用于应用于 JavaFX 按钮和标签：[`https://bitbucket.org/Jerady/fontawesomefx`](https://bitbucket.org/Jerady/fontawesomefx)
    Twitter：`@FontAwesomeFX`

    *   FlexGanttFX 和 CalendarFX，作者 Dirk Lemmermann。用于甘特图和计划日历的专业级自定义控件。用于商业应用程序：[`http://dlsc.com`](http://dlsc.com)
    Twitter：`@dlemmermann`

    *   FXEventBus，作者 Almas Baimagambetov：基于 JavaFX 事件分发机制的简单事件总线实现。GitHub：[`https://github.com/AlmasB/FXEventBus`](https://github.com/AlmasB/FXEventBus)
    Twitter：`@AlmasBaim`

    *   FXGL，作者 Almas Baimagambetov：JavaFX 游戏开发框架：GitHub：[`https://github.com/AlmasB/FXGL`](https://github.com/AlmasB/FXGL)
    视频：[`https://www.youtube.com/almasb0/videos`](https://www.youtube.com/almasb0/videos)
    Twitter：`@AlmasBaim`

    *   JStackFX，作者 Thierry Wasylczenko：一个用于分析线程转储的工具：[`https://github.com/twasyl/jstackfx`](https://github.com/twasyl/jstackfx)
    Twitter：`@twasyl`

    *   SlideshowFX，作者 Thierry Wasylczenko：为演示文稿创建交互式幻灯片：[`http://slideshowfx.github.io`](http://slideshowfx.github.io)
    Twitter：`@SlideshowFX`，`@twasyl`

    *   Orson Charts，作者 David Gilbert：一个用于 Java 应用程序（JavaFX、Swing 或服务器端）的 3D 图表库：[`https://github.com/jfree/orson-charts`](https://github.com/jfree/orson-charts)

    *   JavaFX Maven Docker 镜像，作者 Jeff Miller：[`http://www.mymiller.name/wordpress/app/devops/javafx-maven-docker-image-openjfx/`](http://www.mymiller.name/wordpress/app/devops/javafx-maven-docker-image-openjfx/)

    *   UL Viewer，作者 Yasumasa Suenaga。UL Viewer 是用于 JEP 158：统一 JVM 日志记录和 JEP 271：统一
    GC 日志记录的日志解析器：GitHub：[`https://github.com/YaSuenag/ulviewer/releases/tag/v0.1.0`](https://github.com/YaSuenag/ulviewer/releases/tag/v0.1.0)
    Twitter：`@YaSuenag`

    *   HeapStats，作者 Yasumasa Suenaga。JVMTI 代理和 JavaFX 分析器，用于收集 JVM 运行时信息以进行事后分析：GitHub：[`https://github.com/HeapStats/heapstats`](https://github.com/HeapStats/heapstats)
    Twitter：`@YaSuenag`

    *   JVx，作者 SIB Visions。一个 MDI（多文档界面）库：[`https://blog.sibvisions.com/2015/06/22/jvx-javafxui-1-0/`](https://blog.sibvisions.com/2015/06/22/jvx-javafxui-1-0/)
    Twitter：`@sibvisions`

    *   JCSG-PathExtensions，作者 Michael Hoffer。一个用于处理简单路径（线性化 SVG 路径、挤出和扩展）的 JCSG 扩展库：GitHub：[`https://github.com/miho/JCSG-PathExtensions`](https://github.com/miho/JCSG-PathExtensions)
    [`https://bintray.com/miho/JCSG/JCSG-PathExtensions/0.1`](https://bintray.com/miho/JCSG/JCSG-PathExtensions/0.1)
    Twitter：`@mihosoft`

    *   VRL.Studio，作者 Michael Hoffer。创新、直观且功能强大的可视化 IDE，适用于快速原型设计、学习、教学和实验：[`http://vrl-studio.mihosoft.eu`](http://vrl-studio.mihosoft.eu)
    Twitter：`@mihosoft`

    *   VWorkflows，作者 Michael Hoffer。用于构建特定领域可视化编程环境的交互式流程/图形可视化库：[`https://bintray.com/miho/VWorkflows`](https://bintray.com/miho/VWorkflows)
    Twitter：`@mihosoft`

    *   Erlyberly，作者 Andy Till。一个使用 erlang 追踪功能的 erlang、elixir 和 LFE 调试器。可能是开始调试节点最简单快捷的方法：[`https://github.com/andytill/erlyberly`](https://github.com/andytill/erlyberly)
    Twitter：`@andy_till`

    *   mapjfx 1.13.1（使用 OpenLayers 4.2.0），作者 Peter-Josef Meisch。使用 OpenLayers 和 JavaFX8
    实现地图的 JavaFX 实现：[`https://www.sothawo.com/projects/mapjfx/`](https://www.sothawo.com/projects/mapjfx/)
    Twitter：`@sothawo`


