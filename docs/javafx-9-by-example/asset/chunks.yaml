    *   在 JavaFX 3D 中建模、纹理化和光照网格几何体，作者：Oracle 的 John Yoon：[`http://www.parleys.com/share.html#play/5252e81de4b0c4f11ec576b0`](http://www.parleys.com/share.html#play/5252e81de4b0c4f11ec576b0)

