    ### 天气小部件示例


    本节演示的示例是一个天气小部件，它结合了目前所提及的所有基于 Web 的概念。该示例是一个 JavaFX 应用程序，它从 Open Weather Map
    API（[`http://openweathermap.org`](http://openweathermap.org)）加载 JSON 格式的天气信息。图
    10-2 展示了显示美国俄亥俄州哥伦布市当前天气状况的天气小部件示例。


    ![A323804_3_En_10_Fig2_HTML.jpg](img/A323804_3_En_10_Fig2_HTML.jpg)


    图 10-2.


    一个显示当前天气状况的天气小部件。当你以“城市 州,国家”的格式输入城市、州代码和国家代码后，点击“搜索”按钮即可获取 JSON 数据。


    要下载代码，请访问本书网站或 [`https://github.com/carldea/jfx9be`](https://github.com/carldea/jfx9be)
    获取有关如何编译和运行代码的说明。由于 `http2` 模块属于孵化器领域，我想提醒你注意，在编译和运行包含该模块时会出现警告。清单 10-20 展示了如何在
    DOS 命令提示符（终端）下编译代码、复制资源并运行天气小部件应用程序的语句。


    ```

    // MacOSX 和 Linux

    // 编译

    $ javac -d mods/com.jfxbe.weatherwidget $(find src/com.jfxbe.weatherwidget -name
    "*.java")

    // 复制资源

    $ cp src/com.jfxbe.weatherwidget/com/jfxbe/weatherwidget/weather_template.html
    \

    mods/com.jfxbe.weatherwidget/com/jfxbe/weatherwidget

    // 运行应用程序

    $ java --add-modules jdk.incubator.httpclient --module-path mods -m com.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget

    // Windows 操作系统

    // 编译

    c:\jfxbe\chap10> javac -d mods\com.jfxbe.weatherwidget src\com.jfxbe.weatherwidget\module-info.java
    src\com.jfxbe.weatherwidget\com\jfxbe\weatherwidget\WeatherWidget.java

    // 复制资源

    c:\jfxbe\chap10> copy src\com.jfxbe.weatherwidget\com\jfxbe\weatherwidget\weather_template.html

    mods\com.jfxbe.weatherwidget\com\jfxbe\weatherwidget

    // 运行应用程序

    c:\jfxbe\chap10> java --add-modules jdk.incubator.httpclient --module-path mods
    -m com.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget

    清单 10-20.

    编译、复制资源并运行天气小部件应用程序示例的语句

    ```


    编译语句会将编译后的类放入 `mods/com.jfxbe.weatherwidget` 目录。编译时，你应该会在控制台上看到以下警告：


    ```

    warning: using incubating module(s): jdk.incubator.httpclient

    1 warning

    ```


    你可以忽略该警告并继续执行其他步骤。该警告基本上表明它被视为实验性功能，不属于核心部分。


    编译完代码后，你需要将资源复制到编译后的区域。复制资源将使文件在运行时可用。通常，你喜欢的 IDE 会自动复制资源。最后一条语句通过 `--add-modules`
    添加 `jdk.incubator.httpclient` 模块，并使用 `--module-path` 将新编译的模块指向 `mods` 目录来运行应用程序。注意
    `-m` 开关，它告诉 Java 运行时运行哪个模块以及哪个类包含 `main` 应用程序。在本例中，模块名称和主类名称指定如下：


    ```

    com.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget.

    ```


    成功运行应用程序后，图 10-2 显示了天气小部件应用程序窗口。


    在我深入讲解源代码之前，我想指出，为了让天气小部件应用程序成功检索数据，必须从 Open Weather Map 的人员那里获取一个有效的 API 密钥。要注册并获取
    API 密钥，请访问 [`http://openweathermap.org`](http://openweathermap.org) 。如果你是第一次运行该应用程序，系统会弹出一个对话框，要求你输入
    API 密钥，如图 10-3 所示。


    ![A323804_3_En_10_Fig3_HTML.jpg](img/A323804_3_En_10_Fig3_HTML.jpg)


    图 10-3.


    一个用于输入来自 Open Weather Map 的 API 密钥的对话框


    一旦 API 密钥被输入并接受，它将被本地存储在一个名为：


    ```

    {user.home}/.openweathermap-api-key

    ```


    的文件中。其中 `{user.home}` 是你需要替换为你的主目录的位置。文件保存后，当你再次启动应用程序时，将加载该 API 密钥文件，而不会提示用户输入
    API 密钥。


    在 Java 的系统属性中，`user.home` 是用户的主目录，具体取决于操作系统。请参阅以下位置的 Javadoc 文档和教程：


    ```

    https://docs.oracle.com/javase/tutorial/essential/environment/sysprop.html

    ```


    注意


    本示例中的 Web 服务由 Open Weather Map（[`http://openweathermap.org`](http://openweathermap.org)）的人员提供支持。我鼓励你支持他们，因为他们继续为应用程序和移动开发者提供有关全球地图和天气数据的宝贵服务。


    ### 一行代码：将输入流读取为字符串


    作为天气小部件示例加载 API 密钥文件的一个非常巧妙的小技巧，我创建了一个简单的静态工具方法 `streamToString()`。这个方便的工具方法允许你读取文件内容或连接的输入流，并将其转换为字符串。


    当你查看天气小部件示例的源代码时，该方法将尝试读取一个本地文件，该文件包含从网站 [`http://openweathermap.org`](http://openweathermap.org)
    颁发的 API 密钥字符串。


    清单 10-21 展示了如何将输入流转换为 `String` 对象。


    ```

    private static String streamToString(InputStream inputStream) {

    String text = new Scanner(inputStream, "UTF-8")

    .useDelimiter("\\Z")

    .next();

    return text;

    }

    清单 10-21.

    一个将文本文件读取为字符串对象返回给调用者的静态方法

    ```


    你会很快注意到那个“神奇地”将输入流转换为 `String` 对象的奇怪的一行语句。`streamToString()` 方法使用了方便的 `Scanner`
    API。这个 API 非常适合读取具有分隔文本行的文本文件，例如逗号分隔值（CSV）。Scanner 对象默认将其分隔符设置为行尾字符（`\n`）。


    通过将文件结束符（EOF）标记（`\\Z`）设置为分隔符，`next()` 方法将返回结束前的文本流，从而将整个文本作为一个字段创建。当然，还有其他检索文本数据的方法，可能也更高效；但是，你可以看到，使用这种策略可以处理中小型数据请求（最多约
    3MB）的常见情况。大小可能是一个问题，因为数据被转换为 `String` 对象，并且根据没有垃圾回收的请求数量，内存资源很容易被消耗——可能会使应用程序不堪重负。由于它只是一个由哈希组成的
    API 密钥，所以应该完全没问题。


    天气小部件允许用户在搜索字段中输入城市或区域来确定天气状况。获取 JSON 天气数据后，屏幕将显示以下信息：城市、国家、星期几、时间（上次更新）、天气状况、天气描述、图标、温度、湿度、风速。代码将执行
    JavaScript 代码来填充显示内容。


    好了，关于应用程序的先决条件和描述就介绍到这里——现在让我们来看看天气小部件的源代码。'
- fmt: '### Source Code


    The Weather Widget project consists of three source files:


    *   `module-info.java`: Module definition requires `jdk.incubator.httpclient`
    etc.

