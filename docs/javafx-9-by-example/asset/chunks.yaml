    -fx-background-color: rgba(0, 0, 0, .75);

    -arrow-fill: rgba(255, 255, 255, .90);

    -arrow-fill-hover: rgba(71, 241, 255, .90);

    -blur-effect-hover: dropshadow(gaussian, rgba(255, 255, 255, .90), 10, .3, 0,
    0 );

    }

    .button-pane {

    -fx-min-width: 60;

    -fx-max-width: 60;

    -fx-pref-width: 60;

    -fx-min-height: 30;

    -fx-max-height: 30;

    -fx-pref-height: 30;

    -fx-border-radius: 7.5;

