  trans: "\n### 模块定义\n\n简而言之，模块定义是一个列出模块依赖关系和包导出的配置文件。Java 9 模块引入的新关键字是 `requires`\
    \ 和 `exports`。`requires` 关键字用于定义你需要（依赖）哪些模块。`exports` 关键字则允许其他模块读取其包。清单 2-6 展示了定义包含在\
    \ `module-info.java` 文件中的基本模块的代码。\n\n```\nmodule  {\nrequires [public] ;\nexports\
    \ ;\n}\n清单 2-6.\n一个具有一个依赖项和一个导出包的基本模块定义\n```\n\n关于清单 2-6 中的语法，需要提醒的是：尖括号和方括号并非语法的一部分，而是为了让读者了解哪些是必需的，哪些是可选的。在清单\
    \ 2-6 中，尖括号 `<>` 表示该项是必需的，方括号表示该项是可选的。例如，模块名称是必需的，而 `requires` 右侧的 `public` 关键字是可选的。接下来，我们将逐一分解并解释定义模块所需的每个项目。\n\
    \n#### 模块命名\n\n从清单 2-6 开始，首先是 `<module name>`。你可能想知道如何命名一个模块。我知道，特别是对于如何命名模块，我曾感到困惑。实际上，根据\
    \ Jigsaw 项目关于模块命名的规范文档，这非常简单。文档中说明如下：\n\n> 模块名称与包名称一样，不得冲突。推荐的模块命名方式是使用长期以来推荐用于命名包的反向域名模式。因此，模块名称通常是其导出包名称的前缀，但这种关系并非强制性的。—《模块系统现状》，Mark\
    \ Reinhold，2016 年 3 月 3 日\n\n```\nhttp://openjdk.java.net/projects/jigsaw/spec/sotms/\n\
    ```\n\n一个使用反向域名模式命名的模块示例如下：\n\n*   你公司的假设域名：[`http://www.mycompany.com`](http://www.mycompany.com)\n\
    *   模块名称应为：`com.mycompany.mymodule`\n\n#### Requires\n\n继续讨论清单 2-6 中所示的基本模块定义，关键字“`requires`”引用了模块依赖关系。关键字“`requires`”表示当前模块依赖于另一个已命名的模块。需要认识到的一个重要点是，所有模块都隐式依赖于（`requires`）基础平台模块\
    \ `java.base`。此外，如果你在模块中使用 JavaFX，你将隐式加载 `javafx.base` 模块。\n\n#### Requires Public（隐式可读性）\n\
    \n在清单 2-6 中，`requires` 模块依赖关系的可选 `[public]` 修饰符允许派生模块隐式获得读取权限，这通常被称为隐式可读性。一个例子是：`module-A`\
    \ 依赖于带有 `public` 修饰符的模块 `java.logging`，那么另一个模块，比如 `module-B`，依赖于 `module-A`。\n\
    \n由于日志模块在 `module-A` 中被声明为 public，`module-B` 将自动能够从 `java.logging` 模块获得可读性。这很好，因为\
    \ `module-B` 的模块定义中不必添加像 `requires java.logging` 这样的语句。`module-B` 将隐式免费获得 `java.logging`\
    \ 模块。\n\n#### Exports\n\n当你在模块定义中使用 `exports` 时，你是在公开带有公共类的包命名空间。\n\n尽管还有其他关键字定义了其他可读性关系选项，但我不会深入讨论它们，因为它们超出了本书的范围。可以说，大多数时候你都会使用清单\
    \ 2-6 中所示的基本模块定义。既然你已经知道如何运行和定义模块，你还需要了解模块类型。了解模块类型将帮助你理解遗留代码和 Java 9 模块是如何加载的。\n\
    \n### 模块类型\n\nJava 运行时会将类加载到四种类型的模块中。模块类型基于类或 JAR 是位于类路径还是模块路径上。当模块和类被加载到 JVM（类加载器）中时，它们会成为四种模块类型之一。每种模块类型对某些包和类具有可读性访问权限。例如，在定义应用程序模块时，实现者希望使用关键字\
    \ `export` 来公开 API，以允许其他模块和类读取包。图 2-2 显示了一个典型的依赖关系图。该依赖关系图显示了一个应用程序模块，它分别依赖于两个平台模块、一个未命名模块和两个自动模块。\n\
    \n![A323804_3_En_2_Fig2_HTML.jpg](img/A323804_3_En_2_Fig2_HTML.jpg)\n\n图 2-2.\n\
    一个应用程序模块（com.mycompany.modulea）的依赖关系图，该模块依赖于两个平台模块、一个未命名模块和两个自动模块\n\n为了理解它们之间的可读性关系，让我们更详细地了解这四种模块类型。\n\
    \n以下是四种模块类型及其可读性访问权限的描述：\n\n*   **应用程序模块**：创建的命名模块，可以读取以下模块类型：\n    *   平台模块\n\
    \    *   应用程序模块\n    *   自动模块\n*   **平台模块**：来自 Java 运行时的核心模块，不能读取其他模块类型。只要核心模块被定义为\
    \ `public`（例如 `java.logging` 或 `java.base`），它们就可以公开访问其他核心模块。\n*   **自动模块**：自动转换为应用程序模块类型的\
    \ JAR 库，可以读取以下模块类型：\n    *   平台模块\n    *   应用程序模块\n    *   自动模块\n    *   未命名模块\n\
    *   **未命名模块**：加载到类路径上的任何类或 JAR 库都将被加载到未命名模块中。未命名模块类型可以读取以下模块类型：\n    *   平台模块\n\
    \    *   应用程序模块\n    *   自动模块\n\n未命名模块不能读取另一个未命名模块，因为（每个类加载器）只有一个未命名模块。从类路径加载的\
    \ JAR 和类会被加载到未命名模块中。所有公共类类型和包都被导出，以允许未命名模块中的类访问其他类。\n\n#### 应用程序模块（显式模块）\n\n应用程序模块是你作为库或应用程序创建的模块。提醒一下模块的命名约定，你应该使用反向域名模式，如下所示：\n\
    \n```\nmodule com.mycompany.modulea {\n// 其余声明\n}\n```\n\n运行你的模块应用程序时，你需要在模块路径上指定它，如下所示。\n\
    \n```\n$ java --module-path mods/com.mycompany.modulea ...\n```\n\n你会看到 `mods`\
    \ 目录，该目录用于存放编译后的模块。\n\n#### 平台模块（隐式）\n\n平台模块被认为是隐式模块，它们是应用程序模块中使用的核心 Java 和 JavaFX\
    \ 平台模块。稍后你将使用平台模块创建一个 `HelloWorld` 应用程序。\n\n以下是常见的 Java 和 JavaFX 平台模块列表：\n\n```\n\
    java.base\njava.logging\njavafx.base\njavafx.controls\njavafx.fxml\njavafx.graphics\n\
    javafx.media\njavafx.swing\njavafx.web\n```\n"
- fmt: "### JavaFX Platform Module Graph\n\nNot much has changed between JavaFX 8\
    \ and JavaFX 9; however, JavaFX 9 is newly modularized. In other words, JavaFX\
    \ classes has been broken out into platform modules as opposed to all JavaFX classes\
    \ put into the `jfxrt.jar` file. When creating modules, you will want to know\
    \ which JavaFX modules you’ll want to depend on (`requires`).\n\nTo show JavaFX\
    \ 9’s dependency graph, I recall slides describing the readability relationship\
