  trans: '

    ## 复合过渡


    如果你想让多个动画按顺序或并行运行，该怎么办？JavaFX 动画 API 提供了 `SequentialTransition` 和 `ParallelTransition`
    类。顾名思义，`SequentialTransition` 允许你按顺序运行多个类型为 (`javafx.animation.Transition`) 的动画，而
    `ParallelTransition` 类则可以并行运行多个动画。以下代码片段使用两个 `FadeTransition` 对象按顺序运行。


    ```

    SequentialTransition seqTransition = new SequentialTransition(fadeOut, fadeIn);

    seqTransition.playFromStart();

    ```


    要创建并行过渡，以下代码片段将同时对形状执行平移和旋转。


    ```

    ParallelTransition parallelTransition = new ParallelTransition(translateRight,
    rotateRight);

    parallelTransition.playFromStart();

    ```


    本章最后通过一个示例来结束，该示例使用由两个 `FadeTransition` 动画组成的顺序过渡，对照片查看器应用程序进行了轻微增强。


    ## PhotoViewer2 示例


    为了演示复合过渡，我增强了本章前面提到的照片查看器示例，以便在用户查看上一张或下一张图像时创建淡出和淡入效果。要查看完整源代码，请查看本书网站上的 `PhotoViewer2.java`
    文件。


    代码非常简单，因为 `PhotoViewer2` 类只是继承了 `PhotoViewer` 类并重写了 `loadAndDisplayImage()` 方法。重写后的方法改变了旧的行为，在图像加载完成时添加了淡入淡出效果，如清单
    7-29 所示。一旦图像成功加载，就会调用私有方法 `transitionByFading()` 来返回一个 `SequentialTransition`
    动画。返回 `SequentialTransition` 后，动画即被调用。


    ```

    protected void loadAndDisplayImage(ProgressIndicator progressIndicator) {

    if (buttonPanel.getCurrentIndex()  loadImage = createWorker(imageInfo.getUrl());

    // after loading has succeeded apply image info

    loadImage.setOnSucceeded(workerStateEvent -> {

    try {

    Image nextImage = loadImage.get();

    SequentialTransition fadeIntoNext = transitionByFading(nextImage, imageInfo);

    fadeIntoNext.playFromStart();

    } catch (InterruptedException e) {

    e.printStackTrace();

    } catch (ExecutionException e) {

    e.printStackTrace();

    } finally {

    // hide progress indicator

    progressIndicator.setVisible(false);

    }

    });

    // any failure turn off spinner

    loadImage.setOnFailed(workerStateEvent ->

    progressIndicator.setVisible(false));

    executorService.submit(loadImage);

    }

    清单 7-29.

    方法 loadAndDisplayImage() 将创建一个工作线程任务来加载要显示的下一个图像

    ```


    这段代码创建了一个工作线程任务，用于在后台线程上加载图像。一旦图像成功加载，调用私有方法 `transitionByFading()` 将创建一个包含两个过渡的顺序过渡。如清单
    7-30 所示，方法 `transitionByFading()` 将返回一个要执行的 `SequentialTransition` 实例。


    ```

    private SequentialTransition transitionByFading(Image nextImage,

    ImageInfo imageInfo) {

    // fade out image view node

    FadeTransition fadeOut =

    new FadeTransition(Duration.millis(500), currentViewImage);

    fadeOut.setFromValue(1.0);

    fadeOut.setToValue(0.0);

    fadeOut.setOnFinished(actionEvent -> {

    currentViewImage.setImage(nextImage);

    // Rotate image view

    rotateImageView(imageInfo.getDegrees());

    // Apply color adjust

    colorAdjust = imageInfo.getColorAdjust();

    currentViewImage.setEffect(colorAdjust);

    // update the menu items containing slider controls

    updateSliders();

    });

    // fade in image view node

    FadeTransition fadeIn =

    new FadeTransition(Duration.millis(500), currentViewImage);

    fadeIn.setFromValue(0.0);

    fadeIn.setToValue(1.0);

    // fade out image view, swap image and fade in image view

    SequentialTransition seqTransition =

    new SequentialTransition(fadeOut, fadeIn);

    return seqTransition;

    }

    清单 7-30.

    transitionByFading() 是一个私有工厂方法，它创建一个由两个 FadeTransition 动画组成的 SequentialTransition，负责淡出当前显示的图像并淡入要显示的下一个图像

    ```


    清单 7-30 实现了顺序过渡中的步骤。当执行顺序过渡时，第一个过渡 (`fadeOut`) 将淡出包含当前图像的 `currentViewImage` (`ImageView`)
    节点。`fadeOut` 过渡将获取处理程序代码，以响应 `OnFinished` 事件被触发时的情况。换句话说，当淡出过渡完成时，代码块将依次设置下一个图像、旋转图像视图、调整颜色以及更新滑块控件。在第一个过渡运行之后，第二个过渡开始运行，执行淡入效果以显示新的（下一个）图像。


    假设你已经读到这里，现在应该对 JavaFX 图形编程有了基本的了解。


    ## 总结


    在本章中，你学习了如何使用 `javafx.scene.image.Image` 类的构造函数加载图像，该构造函数接受位于本地、类路径或远程 Web 服务器上的文件的标准
    URL 规范格式。然后，你有机会实现了一个具有拖放功能的照片查看器应用程序，用于加载和显示图像。你还了解了可以对图像视图节点进行的旋转和颜色调整。


    接下来，你了解了 JavaFX 动画 API 的基础知识，以创建关键值、关键帧和时间线。在学习了使用时间线对任何节点进行动画的基本概念之后，你了解了称为过渡的便捷动画类。通过使用常见的过渡，你看到了一个简单的点击游戏示例，该示例演示了以下过渡：路径、旋转、缩放、平移和淡入淡出。最后，你通过使用
    `SequentialTransition` 动画增强照片查看器来结束本章，从而在用户查看下一张或上一张图像时创建复合淡入淡出效果。


    # 8. JavaFX 打印


    许多桌面应用程序（如文字处理器和电子表格）允许用户通过打印机或复印机打印文档。在本章中，你将学习如何将 HTML 文档和 JavaFX 节点发送到打印机。JavaFX
    打印 API (`javafx.print`) 自 JavaFX 8 以来就已存在，它们允许应用程序开发者查询可用的打印机、设置打印机以及生成打印作业。在本章中，你将探索
    JavaFX 的打印 API，并以一个类似 Web 浏览器的应用程序结束本章，该应用程序用于缩放和打印 Web 内容。


    在本章中，你将了解以下内容：


    *   查询可用的打印机

    *   发现打印机的属性和功能

    *   以编程方式打印（使用打印机对话框）

    *   显示打印机对话框以配置打印作业

    *   缩放和打印 JavaFX 节点

    *   打印跨多页的 HTML 网页

