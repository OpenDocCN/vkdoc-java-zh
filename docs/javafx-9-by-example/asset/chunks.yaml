- fmt: '### Example: Working with Third-Party Font Packs as Icons


    In web development you probably have noticed many professional icons used as a
    graphic applied to labels, buttons, etc., but did you also notice how nicely they
    are able to be scaled (no pixelation)? This new technique actually takes custom
    fonts to be represented as vector images. This ingenious idea allows code to retrieve
    a vector image as if it were an ordinary lettered font to be colorized and resized.
    If you aren’t familiar with the concept, visit the following links:


    *   FontAwesome: [`http://fontawesome.io`](http://fontawesome.io)

    *   Weather Icons: [`https://erikflowers.github.io/weather-icons`](https://erikflowers.github.io/weather-icons)

    *   Material Design Icons: [`http://zavoloklom.github.io/material-design-iconic-font`](http://zavoloklom.github.io/material-design-iconic-font)

    *   Glyph Icons: [`http://getbootstrap.com/components/#glyphicons`](http://getbootstrap.com/components/#glyphicons)


    Next, you will see a code example of an application that allows you to search
    or view icons from these various icon packs. When creating this example, I came
    across a JavaFX based library called `FontAwesomeFX`, written by Jens Deter, where
    he takes many of these popular icons to be used in JavaFX applications. By the
    time you read this chapter, Jens Deter will have likely created things to be modularized
    for Java 9 (Java 9 modules).


    For example, the current implementation of Jens’ library has the various icon
    packs together in one JAR. Here the use of Java 9 modules would allow the library
    to be broken into different modules, thus allowing applications to only include
    modules it needs making application packaging much smaller. To get the latest
    news and updates, visit the `FontAwesomeFX` project, found at the following link:


    [`https://bitbucket.org/Jerady/fontawesomefx`](https://bitbucket.org/Jerady/fontawesomefx)


    #### An Example: LabelAwesome a Font Pack Icon Browser App


    The `LabelAwesome` example application allows users to search and browse various
    font packs from FontAwesome, WeatherIcons, Material Design Icons, and Glyph Icons.
    The application allows users to type text contained in the name of the icon to
    be searched. The user can also choose four ways to position the font icon when
    displaying the labels. The positions to choose from are Top, Bottom, Left, and
    Right. In Figure [6-5](#A323804_3_En_6_Chapter.html#Fig5), the `LabelAwesome`
    application allows users to search and browse icons from various font packs.


    ![A323804_3_En_6_Fig5_HTML.jpg](A323804_3_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    The `LabelAwesome` application allows users to search and browse icons from various
    font packs. The application also allows the users to choose where to position
    the font icon in relation to the text on labels.


    #### Getting Started


    The `LabelAwesome` application code resides in the Java file called `LabelAwesome.java`,
    which is shown in Listing [6-6](#A323804_3_En_6_Chapter.html#Par37). But, before
    we talk about Listing [6-6](#A323804_3_En_6_Chapter.html#Par37), let’s make sure
    we include the correct library dependencies. The `fontawesomefx.jar` library must
    be included on the classpath in order to be successfully compiled and executed.


    If you downloaded the book’s source code from Apress publishing, then the `FontAwesomeFX`
    library is already included. If you have access to Maven or Gradle, you can download
    it from Maven Central or the Bintray. Maven Central and the Bintray are repositories
    that host build artifacts such as JAR libraries. For those familiar with Maven,
    use the dependency’s coordinates in Listing [6-4](#A323804_3_En_6_Chapter.html#Par30).


    ```

    de.jensd

    fontawesomefx

    8.9

    Listing 6-4.

    The Maven Coordinates for Building the Example LabelAwesome.java

    ```


    For those who are familiar with Gradle, use Listing [6-5](#A323804_3_En_6_Chapter.html#Par32)
    as a compile-time dependency in project’s `build.gradle` file.


    ```

    compile group: ''de.jensd'', name: ''fontawesomefx'', version: ''8.9''

    Listing 6-5.

    The Gradle Dependency for Building the Example LabelAwesome.java

    ```


    The following are locations to get the latest versions of `FontAwesomeFX`. As
    of this writing, version 8.9 of the `FontAwesomeFX` library was used.


    *   Maven: [`http://search.maven.org`](http://search.maven.org) (Search for `fontawesomefx`)

    *   Bintray: [`https://bintray.com/jerady/maven/FontAwesomeFX`](https://bintray.com/jerady/maven/FontAwesomeFX)


    Now you should be ready to enter Listing [6-6](#A323804_3_En_6_Chapter.html#Par37)
    into a file called `LabelAwesome.java` to be compiled and executed. The `FontAwesomeFX`
    application can help you find the right icon within the various packs such as
    FontAwesome, Weather Icons, Material Design Icons, and Glyph Icons.'
  raw: '### Example: Working with Third-Party Font Packs as Icons


    In web development you probably have noticed many professional icons used as a
    graphic applied to labels, buttons, etc., but did you also notice how nicely they
    are able to be scaled (no pixelation)? This new technique actually takes custom
    fonts to be represented as vector images. This ingenious idea allows code to retrieve
    a vector image as if it were an ordinary lettered font to be colorized and resized.
    If you aren’t familiar with the concept, visit the following links:


    *   FontAwesome: [`http://fontawesome.io`](http://fontawesome.io)

    *   Weather Icons: [`https://erikflowers.github.io/weather-icons`](https://erikflowers.github.io/weather-icons)

    *   Material Design Icons: [`http://zavoloklom.github.io/material-design-iconic-font`](http://zavoloklom.github.io/material-design-iconic-font)

    *   Glyph Icons: [`http://getbootstrap.com/components/#glyphicons`](http://getbootstrap.com/components/#glyphicons)


    Next, you will see a code example of an application that allows you to search
    or view icons from these various icon packs. When creating this example, I came
    across a JavaFX based library called FontAwesomeFX, written by Jens Deter, where
    he takes many of these popular icons to be used in JavaFX applications. By the
    time you read this chapter, Jens Deter will have likely created things to be modularized
    for Java 9 (Java 9 modules).


    For example, the current implementation of Jens’ library has the various icon
    packs together in one JAR. Here the use of Java 9 modules would allow the library
    to be broken into different modules, thus allowing applications to only include
    modules it needs making application packaging much smaller. To get the latest
    news and updates, visit the `FontAwesomeFX` project, found at the following link:


    [`https://bitbucket.org/Jerady/fontawesomefx`](https://bitbucket.org/Jerady/fontawesomefx)


    #### An Example: LabelAwesome a Font Pack Icon Browser App


    The `LabelAwesome` example application allows users to search and browse various
    font packs from FontAwesome, WeatherIcons, Material Design Icons, and Glyph Icons.
    The application allows users to type text contained in the name of the icon to
    be searched. The user can also choose four ways to position the font icon when
    displaying the labels. The positions to choose from are Top, Bottom, Left, and
    Right. In Figure [6-5](#A323804_3_En_6_Chapter.html#Fig5), the `LabelAwesome`
    application allows users to search and browse icons from various font packs.


    ![A323804_3_En_6_Fig5_HTML.jpg](A323804_3_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    The LabelAwesome application allows users to search and browse icons from various
    font packs. The application also allows the users to choose where to position
    the font icon in relation to the text on labels.


    #### Getting Started


    The `LabelAwesome` application code resides in the Java file called `LabelAwesome.java`,
    which is shown in Listing [6-6](#A323804_3_En_6_Chapter.html#Par37). But, before
    we talk about Listing [6-6](#A323804_3_En_6_Chapter.html#Par37), let’s make sure
    we include the correct library dependencies. The `fontawesomefx.jar` library must
    be included on the classpath in order to be successfully compiled and executed.


    If you downloaded the book’s source code from Apress publishing, then the `FontAwesomeFX`
    library is already included. If you have access to Maven or Gradle, you can download
    it from Maven Central or the Bintray. Maven Central and the Bintray are repositories
    that host build artifacts such as JAR libraries. For those familiar with Maven,
    use the dependency’s coordinates in Listing [6-4](#A323804_3_En_6_Chapter.html#Par30).


    ```

    de.jensd

    fontawesomefx

    8.9

    Listing 6-4.

    The Maven Coordinates for Building the Example LabelAwesome.java

    ```


    For those who are familiar with Gradle, use Listing [6-5](#A323804_3_En_6_Chapter.html#Par32)
    as a compile-time dependency in project’s `build.gradle` file.


    ```

    compile group: ''de.jensd'', name: ''fontawesomefx'', version: ''8.9''

    Listing 6-5.

    The Gradle Dependency for Building the Example LabelAwesome.java

    ```


    The following are locations to get the latest versions of `FontAwesomeFX`. As
    of this writing, version 8.9 of the `FontAwesomeFX` library was used.


    *   Maven: [`http://search.maven.org`](http://search.maven.org) (Search for `fontawesomefx`)

    *   Bintray: [`https://bintray.com/jerady/maven/FontAwesomeFX`](https://bintray.com/jerady/maven/FontAwesomeFX)


    Now you should be ready to enter Listing [6-6](#A323804_3_En_6_Chapter.html#Par37)
    into a file called `LabelAwesome.java` to be compiled and executed. The `FontAwesomeFX`
    application can help you find the right icon within the various packs such as
    FontAwesome, Weather Icons, Material Design Icons, and Glyph Icons.'
  trans: '

    ### 示例：使用第三方字体包作为图标


    在 Web 开发中，你可能已经注意到许多专业图标被用作标签、按钮等元素的图形，但你是否也注意到它们能够很好地缩放（没有像素化）？这种新技术实际上是将自定义字体表示为矢量图像。这个巧妙的想法允许代码像获取普通字母字体一样获取矢量图像，并对其进行着色和调整大小。如果你不熟悉这个概念，请访问以下链接：


    *   FontAwesome：[`http://fontawesome.io`](http://fontawesome.io)

    *   Weather Icons：[`https://erikflowers.github.io/weather-icons`](https://erikflowers.github.io/weather-icons)

    *   Material Design Icons：[`http://zavoloklom.github.io/material-design-iconic-font`](http://zavoloklom.github.io/material-design-iconic-font)

    *   Glyph Icons：[`http://getbootstrap.com/components/#glyphicons`](http://getbootstrap.com/components/#glyphicons)


    接下来，你将看到一个应用程序的代码示例，该应用程序允许你搜索或查看来自这些不同图标包的图标。在创建这个示例时，我遇到了一个名为 FontAwesomeFX
    的基于 JavaFX 的库，由 Jens Deter 编写，他将许多流行的图标引入到 JavaFX 应用程序中。当你读到本章时，Jens Deter 很可能已经创建了针对
    Java 9 进行模块化的内容（Java 9 模块）。


    例如，Jens 库的当前实现将各种图标包放在一个 JAR 文件中。这里，使用 Java 9 模块可以将库拆分为不同的模块，从而允许应用程序只包含它需要的模块，使应用程序打包更小。要获取最新消息和更新，请访问
    `FontAwesomeFX` 项目，链接如下：


    [`https://bitbucket.org/Jerady/fontawesomefx`](https://bitbucket.org/Jerady/fontawesomefx)


    #### 示例：LabelAwesome——一个字体包图标浏览器应用


    `LabelAwesome` 示例应用程序允许用户搜索和浏览来自 FontAwesome、WeatherIcons、Material Design Icons
    和 Glyph Icons 的各种字体包。该应用程序允许用户输入图标名称中包含的文本进行搜索。用户还可以选择四种方式在显示标签时定位字体图标。可供选择的位置是顶部、底部、左侧和右侧。在图
    6-5 中，`LabelAwesome` 应用程序允许用户搜索和浏览来自各种字体包的图标。


    ![A323804_3_En_6_Fig5_HTML.jpg](img/A323804_3_En_6_Fig5_HTML.jpg)


    图 6-5.


    LabelAwesome 应用程序允许用户搜索和浏览来自各种字体包的图标。该应用程序还允许用户选择相对于标签文本放置字体图标的位置。


    #### 入门指南


    `LabelAwesome` 应用程序代码位于名为 `LabelAwesome.java` 的 Java 文件中，如清单 6-6 所示。但是，在讨论清单 6-6
    之前，让我们确保包含了正确的库依赖项。必须将 `fontawesomefx.jar` 库包含在类路径中，才能成功编译和执行。


    如果你从 Apress 出版社下载了本书的源代码，那么 `FontAwesomeFX` 库已经包含在内。如果你可以访问 Maven 或 Gradle，你可以从
    Maven Central 或 Bintray 下载它。Maven Central 和 Bintray 是托管构建工件（如 JAR 库）的仓库。对于熟悉 Maven
    的用户，请使用清单 6-4 中的依赖坐标。


    ```

    de.jensd

    fontawesomefx

    8.9

    清单 6-4.

    构建示例 LabelAwesome.java 的 Maven 坐标

    ```


    对于熟悉 Gradle 的用户，请在项目的 `build.gradle` 文件中使用清单 6-5 作为编译时依赖项。


    ```

    compile group: ''de.jensd'', name: ''fontawesomefx'', version: ''8.9''

    清单 6-5.

    构建示例 LabelAwesome.java 的 Gradle 依赖项

    ```


    以下是获取 `FontAwesomeFX` 最新版本的地址。在撰写本文时，使用的是 `FontAwesomeFX` 库的 8.9 版本。


    *   Maven：[`http://search.maven.org`](http://search.maven.org)（搜索 `fontawesomefx`）

    *   Bintray：[`https://bintray.com/jerady/maven/FontAwesomeFX`](https://bintray.com/jerady/maven/FontAwesomeFX)


    现在，你应该准备好将清单 6-6 输入到名为 `LabelAwesome.java` 的文件中，以便编译和执行。`FontAwesomeFX` 应用程序可以帮助你在
    FontAwesome、Weather Icons、Material Design Icons 和 Glyph Icons 等各种包中找到合适的图标。

