- fmt: '`DrawingLines.java` 首先使用 `setTitle()` 方法设置 `Stage` 窗口的标题。然后，它为 `Scene` 对象创建一个根节点（`javafx.scene.Group`）。如果你还记得第
    1 章中讨论的 `HelloWorld` 示例，第一个添加到 JavaFX Scene Graph 的节点被称为根节点。根节点始终是一个 JavaFX 容器类型节点，例如
    `Group` 或 `BorderPane`。所有容器类型节点（即那些继承自 `javafx.scene.Parent` 的节点）都有一个名为 `getChildren().add()`
    的方法，该方法允许将任何 JavaFX 节点添加到场景图中。默认情况下，`Scene` 对象会填充白色背景；然而，由于我们的一条线是白色的，代码会将场景背景色设置为灰色（`Color.GRAY`）。这将提供一些对比度，以便看到白色的线。在本书的平装版中，图片是灰度显示的，但如果你使用
    PDF 版本，代码会分别创建红色、白色和蓝色三条线。


    在第一行中，代码设置了 `Line` 节点的通用属性。这些通用属性包括描边颜色、描边宽度和描边线帽。如前所述，线条内部没有形状，因此线条的填充颜色属性被设置为
    `null`（无颜色），而描边颜色默认为黑色。要设置描边颜色，你可以使用 `javafx.scene.paint.Color` 类中的内置 JavaFX 颜色。例如，对于红色，你可以使用
    `Color.RED`。指定颜色的方法有很多，例如使用 RGB、HSB 或 Web 十六进制值。这三种方法也都支持指定 alpha 值（透明度）。稍后，你将看到更多为形状着色的方法。请参考
    Javadoc 以了解更多关于颜色（`javafx.scene.paint.Color`）的信息。设置好描边轮廓颜色后，你可以使用 `setStrokeWidth()`
    方法设置线条的描边宽度（粗细）。形状还具有描边线帽属性。此属性指定线条端点的样式。例如，将描边线帽指定为 `BUTT`（`StrokeLineCap.BUTT`）将产生一个平坦的方形端点，而
    `ROUND`（`StrokeLineCap.ROUND`）样式则会呈现圆角端点。以下代码片段设置了线条节点的通用形状属性：


    ```

    // setting common properties

    redLine.setStroke(Color.RED);

    redLine.setStrokeWidth(10);

    redLine.setStrokeLineCap(StrokeLineCap.BUTT);

    ```


    在红色 `Line` 节点上设置通用属性后，示例代码创建了一个虚线图案。要形成虚线图案，你只需将 `double` 值添加到 `getStrokeDashArray().add()`
    方法中。每个值代表一个虚线段的像素数。要设置虚线段数组，第一个值（`10d`）是一个宽度为 10 像素的可见虚线段。接下来是一个 5 像素的空白段（不可见）。之后是一个宽度为
    15 像素的可见虚线段，依此类推。由于数组有奇数个值，你可以看到图案在重复自身时，第一个值（`10d`）会变成一个 10 像素的空白段（不可见）。以下是创建
    `Line` 节点虚线图案的代码：


    ```

    // creating a dashed pattern

    redLine.getStrokeDashArray().addAll(10d, 5d, 15d, 5d, 20d);

    redLine.setStrokeDashOffset(0);

    ```


    默认情况下，虚线偏移属性值为 `0`。要查看偏移属性更改时会发生什么，用户可以向右拖动滑块拇指以增加偏移量。描边虚线偏移量是指从当前图案的哪个位置开始绘制线条。


    由于另外两条线在修改通用属性的方式上基本相同，我将不再进一步解释。我相信你现在已经理解了创建线条的基本原理。关于这个示例，最后要提的一点是 `Slider`
    控件以及它通过绑定进行连接的方式。


    请注意，在清单 3-1 中，在刚刚讨论的三条线之后，滑块控件具有处理程序代码，该代码动态更新 `Text` 节点以显示虚线偏移值。还要注意对 `addListener()`
    方法的调用，其中包含作为更改监听器添加的简洁代码。这可能看起来有些奇怪；然而，它反映了一个新的 Java 8 特性，称为 lambda 表达式，你将在第 4
    章中了解更多。以下代码片段使用 lambda 表达式而不是匿名内部类（`ChangeListener`）创建了一个更改监听器。


    ```

    // display stroke dash offset value

    slider.valueProperty()

    .addListener( (ov, oldVal, newVal) ->

    offsetText.setText("Stroke Dash Offset: " + newVal));

    ```


    学习如何绘制线条将帮助你将这些知识应用于 JavaFX 中的任何 `Shape` 节点。这些重要的概念将允许你创建任何你认为合适的样式。说到形状，接下来将讨论它们。'
  raw: '`DrawingLines.java` begins by setting the title of the `Stage` window using
    the `setTitle()` method. Then it creates a root node ( [`javafx.scene.Group`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Group.html)
    ) for the `Scene` object. If you remember back in Chapter [1](#A323804_3_En_1_Chapter.html),
    which discussed the `HelloWorld` example, the first node added to the JavaFX Scene
    graph is called the root node. The root node is always a JavaFX container type
    node such as a `Group` or `BorderPane`. All container type nodes (those extending
    [`javafx.scene.Parent`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Parent.html)
    ) have a method called [`getChildren`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Parent.html#getChildren--)
    `().add()` that allows any JavaFX node to be added to the scene graph. By default,
    the `Scene` object will be filled with a white background; however, because one
    of our lines is white, the code will set the scene to have a color of gray (`Color.GRAY`).
    This will allow some contrast in order to see the white line. In the paperback
    edition of the book images are in grayscale color, but if you use the PDF version
    of the book, the code creates three lines in red, white, and blue, respectively.


    In the first line, the code sets the common properties of a `Line` node. The common
    properties are stroke color, stroke width, and stroke line cap. As noted earlier,
    lines do not have a shape internally, so a line’s fill color property is set to
    `null` (no color) and the stroke color defaults to black. To set the stroke color,
    you can use built-in JavaFX colors by using the [`javafx.scene.paint.Color`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/paint/Color.html)
    class. For instance, for the color red you use [`Color.RED`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/paint/Color.html#RED)
    . There are many ways to specify color, such as using the RGB, HSB, or Web hex
    values. All three methods also have the ability to specify alpha value (transparency).
    Later, you will see additional methods for coloring shapes. Refer to the Javadoc
    to learn more about color (`javafx.scene.paint.Color)`. After setting the stroke’s
    outline color, you can set the line’s stroke width (thickness) by using the [`setStrokeWidth`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Shape.html#setStrokeWidth-double-)
    `()` method . Shapes also have a stroke line cap property. This property specifies
    the style of the ends of the line. For instance, specifying the stroke line cap
    as butt ( [`StrokeLineCap`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html)
    `.` [`BUTT`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html#BUTT)
    ) will make a flat square end, while a round ( [`StrokeLineCap.ROUND`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html#ROUND)
    ) style will appear with a rounded end. The following code snippet sets a line
    node’s common shape properties:


    ```

    // setting common properties

    redLine.setStroke(Color.RED);

    redLine.setStrokeWidth(10);

    redLine.setStrokeLineCap(StrokeLineCap.BUTT);

    ```


    After setting the common properties on the red `Line` node, the example code creates
    a dashed pattern. To form a dashed pattern, you would simply add `double` values
    to the `getStrokeDashArray().add()` method. Each value represents the number of
    pixels for a dash segment. To set the dash segment array, the first value (10d)
    is a visible dash segment that’s 10 pixels wide. Next is a five-pixel empty segment
    (not visible). Following that is a visible dash segment 15 pixels wide, and so
    on. Because the array has an odd number of values, you can see that as the pattern
    repeats itself. The first value (10d) becomes a 10-pixel empty segment (it’s not
    visible). Following is the code to create a dashed pattern for a `Line` node:


    ```

    // creating a dashed pattern

    redLine.getStrokeDashArray().addAll(10d, 5d, 15d, 5d, 20d);

    redLine.setStrokeDashOffset(0);

    ```


    By default, the dash offset property value is `0`. To see what happens when the
    offset property changes, the user can drag the slider thumb to the right to increase
    the offset. The stroke dash offset is the distance into the current pattern to
    begin the line drawing.


    Because the other two lines are pretty much the same in the way they modify common
    properties, I will not explain them any further. I trust you now understand the
    fundamentals of creating lines. One last thing to mention about this example is
    the Slider control and the way it is wired up using binding.


    Notice in Listing [3-1](#A323804_3_En_3_Chapter.html#Par22) that after the three
    lines just discussed, the slider control has handler code that updates a `Text`
    node dynamically to display the dash offset value. Also notice the invocation
    to the `addListener()` method, which contains concise code added as a change listener.
    This may look odd to you; however, it reflects a new Java 8 feature called lambda
    expressions , which you will learn more about in Chapter [4](#A323804_3_En_4_Chapter.html).
    The following code snippet creates a change listener using lambdas instead of
    an anonymous inner class (`ChangeListener`).


    ```

    // display stroke dash offset value

    slider.valueProperty()

    .addListener( (ov, oldVal, newVal) ->

    offsetText.setText("Stroke Dash Offset: " + newVal));

    ```


    Learning how to draw lines will help you apply the same knowledge to any `Shape`
    node in JavaFX. These important concepts will allow you to create any kind of
    shape styled the way you see fit. Speaking of shapes, they are discussed next.'
