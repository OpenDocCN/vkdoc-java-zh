    ## 聚合操作


    Java 8 中 lambda 表达式的另一个强大用途是处理集合。Java 8 引入了新的 Stream API（`java.util.stream.*`），它允许你处理来自给定源的元素。源可以是对数据结构（如集合或
    IO 通道）的引用。根据 Oracle 关于 Stream API 的 Java 8 文档（Javadoc）所述，“流并非存储元素的数据结构；相反，它们通过计算操作的管道，从源（可以是数据结构、生成器、IO
    通道等）携带值。”


    管道是一系列操作（lambda 表达式/函数式接口），可以处理或查询流中的每个元素。此类操作允许你执行聚合任务。聚合操作类似于电子表格可以对一系列单元格执行某些计算的方式，例如格式化、求平均值或求和。要开始在集合上使用聚合操作，你首先需要在
    `java.util.Collection` 接口上调用 `default stream()` 方法。稍后你将了解更多关于默认方法的内容，但现在所有集合（`Collection`）都有一个
    `stream()` 方法，该方法返回一个 `java.util.stream.Stream` 实例。清单 4-9 是一段代码片段，它从源集合（`List<Integer>`）中获取元素流。


    ```

    List values = Arrays.asList(23, 84, 74, 85, 54, 60);

    Stream stream = values.stream();

    清单 4-9.

    通过从集合调用 stream() 方法获取的流

    ```


    常见的内置聚合操作有 `filter`、`map` 和 `forEach`。`filter` 允许你传入一个表达式来过滤元素，并返回一个包含所选项目的新 `Stream`。`map`
    操作将每个元素转换（或映射）为另一种类型，并返回一个包含映射后类型项目的新 `Stream`。例如，你可能希望将流中的 `Integer` 值映射为 `String`
    值。`forEach` 操作允许你传入一个 lambda 表达式来处理流中的每个元素。


    一个运用这三种常见聚合操作的典型用例是：给定一个整数集合，过滤出大于某个阈值（一个非局部变量）的值，将过滤后的项目转换为十六进制值，并打印每个十六进制值。清单
    4-10 实现了该用例，它运用了各种聚合操作。


    ```

    // 创建一个值列表

    List values = Arrays.asList(23, 84, 74, 85, 54, 60);

    System.out.println("values: " + values.toString());

    // 用于 lambda 表达式的非局部变量。

    int threshold = 54;

    System.out.println("大于 " + threshold + " 的值转换为十六进制：");

    Stream stream = values.stream();

    // 使用聚合函数 filter() 和 forEach()

    stream

    .filter(val -> val > threshold) /* 谓词函数式接口 */

    .sorted()

    .map(dec -> Integer.toHexString(dec).toUpperCase() ) /* 消费者函数式接口 */

    .forEach(val -> System.out.println(val)); /* 每个输出值。 */

    清单 4-10.

    在整数集合上使用聚合操作

    ```


    以下是清单 4-10 的输出：


    ```

    values: [23, 84, 74, 85, 54, 60]

    大于 54 的值转换为十六进制：

    3C

    4A

    55

    ```


    注意


    此输出是一个按升序排序的整数列表，显示十六进制值。对应的十进制值如下：3C=60，4A=74，54=84，55=85。


    在清单 4-10 中，代码首先创建一个整数列表作为集合。接着，输出原始元素列表（未修改）。然后，代码声明一个用于 lambda 表达式的非局部变量，名为 `threshold`，将在过滤表达式中使用。接下来，你从
    `values` 集合中获取一个流（通过 `stream()` 方法）来执行聚合操作。


    第一个操作是一个过滤器，它接收一个 lambda 表达式来过滤大于 54 的元素（`val > threshold`）。下一个操作是 `sorted()`
    方法，它对从过滤器方法流返回的元素进行排序。继续方法链，注意 map 操作。`map()` 方法操作可以将流中的每个元素从一种数据类型映射到另一种数据类型。


    在此场景中，流元素是 `Integer` 对象，它们被映射为 `String` 对象。`map()` 方法返回另一个流，其中包含类型为 `Stream<String>`
    的元素。在此示例中，字符串元素是十六进制值。最后，`forEach()` 操作遍历字符串（十六进制）元素流中的每个元素并打印。请记住，`forEach()`
    方法用于流的非并行处理。


    你会注意到，每次调用聚合函数时，返回类型都是 `Stream` 对象，这允许你以非常类似于构建器模式的方式进行方法链式操作。澄清一下，方法链式操作的概念实际上源于
    API 设计的流畅接口模式。


    虽然我只触及了 `Stream` API 的主要特性，但我没有提到并行性这个重要主题。并行性是将工作并发分发给 CPU 核心的能力，从而减少总体计算时间。现代台式机、智能手机、平板电脑和计算机通常具有多核。为了利用真正的并行处理，Java
    8 平台现在支持并行流。要并行执行操作，你可以简单地在集合上调用 `parallelStream()` 方法。由于项目可以并发操作，建议使用线程安全的集合。在清单
    4-11 中，整数列表将使用 `Collections.synchronizedList()` 方法进行包装。


    ```

    /**

    * 聚合操作。

    * @author cdea

    */

    public class AggregateOperations {

    /**

    * @param args 命令行参数

    */

    public static void main(String[] args) {

    // 创建一个值列表

    List values = Collections.synchronizedList(

    Arrays.asList(23, 84, 74, 85, 54, 60));

    System.out.println("values: " + values.toString());

    // 用于 lambda 表达式的非局部变量。

    int threshold = 54;

    System.out.println("大于 " + threshold + " 的值转换为十六进制：");

    java.util.stream.Stream stream = values.parallelStream();

    // 使用聚合函数 filter() 和 forEach()

    stream

    .filter(val -> val > threshold) /* 谓词函数式接口 */

    .sorted()

    .map(dec -> Integer.toHexString(dec).toUpperCase() ) /* 消费者函数式接口 */

    .forEachOrdered(System.out::println);

    }

    }

    清单 4-11.

    编写为支持并行流的聚合操作示例

    ```


    使集合同步后，代码通过调用 `parallelStream()` 方法将 `Stream` 引用作为并行流获取。在对并行流执行即时或聚合函数之后，调用的最后一个终端函数是
    `forEachOrdered()` 方法。你会注意到，与 `forEach()` 方法不同，`forEachOrdered()` 方法将在并行处理完成时按顺序遍历每个项目。如果你使用
    `forEach()` 方法，项目将无序。


    注意


    当使用并行流进行排序时，请使用终端函数 `forEachOrdered()` 而不是 `forEach()`。根据 Javadoc，它指出“如果流定义了遭遇顺序，则按流的遭遇顺序对该流的每个元素执行一个操作。”

