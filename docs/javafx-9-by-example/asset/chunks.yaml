- fmt: '# How Does It Work?


    The `jfxmobile` plug-in adds a number of tasks to your Java application that allow
    you to create packages that can be uploaded to the Apple App Store and the Android
    Play Store.


    The `jfxmobile` plug-in downloads and installs the required JavaFX SDKs:


    - Dalvik SDK for Android: The plug-in currently depends on `org.javafxports:dalvik-sdk:8.60.9`
    and `org.javafxports:jfxdvk:8.60.9`.

    - Retrolambda plug-in: Transforms the code to Java 6 compatible bytecode and currently
    depends on `net.orfjackal.retrolambda:retrolambda:2.5.1`.

    - iOS SDK: The plug-in currently depends on `org.javafxports:ios-sdk:8.60.9`.

    - MobiDevelop: The fork of RoboVM 1.8.0 that’s used to compile the code to iOS
    compatible bytecode. Currently depends on `com.mobidevelop.robovm:robovm-dist:tar.gz:nocompiler:2.3.0`.


    The source code for the mentioned SDKs is available here: [`http://bitbucket.org/javafxports/8u-dev-rt`](http://bitbucket.org/javafxports/8u-dev-rt).


    On Android, the plug-in will then execute a number of commands that will lead
    to the creation of an Android package (APK) in the directory `build/javafxports/android`.
    The package will be deployed and installed in the device. Listing [13-3](#A323804_3_En_13_Chapter.html#Par49)
    shows the output of a successful deploy in Android, where all the involved tasks
    are listed.


    > **Note:** When running Gradle tasks, use `--info`, `--debug`, or `--stracktrace`
    to get a more verbose output that may help you ping pointing errors and issues,
    such as `gradle --info androidInstall`.


    ```

    $ gradle androidInstall

    :validateManifest

    :collectMultiDexComponents

    :compileJava

    :processResources UP-TO-DATE

    :classes

    :compileAndroidJava UP-TO-DATE

    :copyClassesForRetrolambda

    :applyRetrolambda

    Retrolambda 2.5.1

    :mergeClassesIntoJar

    :shrinkMultiDexComponents

    :createMainDexList

    :writeInputListFile

    :dex

    :mergeAndroidAssets

    :mergeAndroidResources

    :processAndroidResources UP-TO-DATE

    :processAndroidResourcesDebug

    :validateSigningDebug

    :apkDebug

    :zipalignDebug

    :androidInstall

    Installed on device.

    BUILD SUCCESSFUL

    Total time: 41.168 secs

    Listing 13-3. Output When Running androidInstall

    ```


    On iOS, the situation is internally different, but the Gradle commands are similar.
    The plug-in will download and install the RoboVM compiler, and it will use RoboVM
    compiler commands to create an iOS application in `build/javafxports/ios`.


    > **Note:** When running the app on your mobile device, the standard output can
    be accessed on Android devices by running `<path.to.android skd>/platform-tools/adb
    logcat`. On the Mac, open Xcode ➤ Windows ➤ Devices on iOS to access the output.


    Finally, Gradle uses convention over configuration, and the default configuration
    applied to the plug-in makes the `build.gradle` file extremely simple. You can
    modify this configuration when required. Check the documentation at [`http://docs.gluonhq.com/javafxports/#anchor-3`](http://docs.gluonhq.com/javafxports/#anchor-3)
    for a full list of modifiable properties for Android and iOS.


    ## Submitting the App to the Stores


    When you have finished testing the app on your mobile devices, you can proceed
    to upload it to the Apple App Store and the Android Play Store. To do so, the
    plug-in already includes the required tasks.


    On Android, you need to provide valid icon images (under `/src/android/res`) and
    you have to disable the debugging options in the `AndroidManifest` file: Under
    the `application` tag, add `android:debuggable="false"`. And finally you have
    to sign the app, as explained at [`https://developer.android.com/studio/publish/app-signing.html`](https://developer.android.com/studio/publish/app-signing.html).
    You can add the signing configuration to your `build.gradle` file, as shown in
    Listing [13-4](#A323804_3_En_13_Chapter.html#Par55).


    ```

    jfxmobile {

    android {

    signingConfig {

    storeFile file("path/to/my-release-key.keystore")

    storePassword ''STORE_PASSWORD''

    keyAlias ''KEY_ALIAS''

    keyPassword ''KEY_PASSWORD''

    }

    manifest = ''lib/android/AndroidManifest.xml''

    }

    }

    Listing 13-4. Signing Configuration on Android

    ```


    If everything is set, run `gradle androidRelease` to generate the APK under `/build/javafxports/android`.
    To upload it to the store, you’ll have to enroll with Google Play Developers ([`https://play.google.com/apps/publish/signup/`](https://play.google.com/apps/publish/signup/))
    and fill in the required forms.


    On iOS, provide the icons for the app, and once you have enrolled to the Apple
    Developer program, you need to sign the app with a provisioning profile for production,
    as shown in Listing [13-5](#A323804_3_En_13_Chapter.html#Par58). Run `gradle createIpa`
    and submit the app at `/build/javafxports/ios` through Xcode ➤ Open Developer
    Tool ➤ Application Loader. Fixing the initial requirements that the tool reveals
    as missing can be done by adding the proper keys to the `plist` file under `/src/ios/Default-Info.plist`.
    When this is done, go to iTunes Connect ([`https://itunesconnect.apple.com`](https://itunesconnect.apple.com))
    to prepare the app for release. As with any other regular iOS app, it usually
    takes a few iterations to get the app approved for submission, until you fulfill
    all the requirements from the reviewers.


    ```

    jfxmobile {

    ios {

    arch = "arm64"

    infoPList = file(''src/ios/Default-Info.plist'')

    forceLinkClasses = [''your.package.**.*'',...]

    iosProvisioningProfile = ''MyApp''

    iosSignIdentity = ''iPhone Distribution: ******''

    }

    }

    Listing 13-5. Signing Configuration on iOS

    ```


    # Gluon Mobile


    The Gluon Mobile library is designed to help developers create high performance,
    great looking, and cloud connected mobile apps from a single Java codebase, for
    iOS and Android. It improves time-to-market for applications, by providing APIs
    for modern material design user interfaces, accessing mobile device features,
    connecting to web services, and synchronizing state across many devices.


    Gluon Mobile is the client-side library and development tool that:


    - Provides UI controls for the client application, using Glisten, the UI component
    that provides a native look and feel, with JavaFX controls and specific layouts.

    - Handles communication with the server-side Gluon CloudLink, using Connect, an
    open source project that allows communications with the Gluon CloudLink itself
    and other web services. Find out more at [`http://gluonhq.com/products/mobile/connect/`](http://gluonhq.com/products/mobile/connect/).

    - Abstracts (parts of) the platform-specific APIs by using Charm Down, an open
    source project that offers a collection of services like filesystem, local or
    push notifications, GPS, sensors, camera,… More details can be found at [`http://gluonhq.com/products/mobile/charm-down/`](http://gluonhq.com/products/mobile/charm-down/).


    To get started using Gluon Mobile, you can create a Gradle project from the scratch,
    modify any an existing samples ([`http://gluonhq.com/support/samples/`](http://gluonhq.com/support/samples/)),
    or install and use the Gluon plug-in for your IDE.


    ## The Gluon IDE Plug-Ins


    The Gluon plug-in for your IDE aids in creating a Gluon application project inside
    your IDE: there are plug-ins for:


    - NetBeans. See instructions: [`http://docs.gluonhq.com/charm/latest/#netbeans-plugin`](http://docs.gluonhq.com/charm/latest/#netbeans-plugin).

    - IntelliJ IDEA. Follow: [`http://docs.gluonhq.com/charm/latest/#intellij-plugin`](http://docs.gluonhq.com/charm/latest/#intellij-plugin).

    - Eclipse. See: [`http://docs.gluonhq.com/charm/latest/#eclipse-plugin`](http://docs.gluonhq.com/charm/latest/#eclipse-plugin).


    Once you have installed the plug-in, select New Project, go to the Gluon category,
    and pick one of the different templates available (see Figure [13-2](#A323804_3_En_13_Chapter.html#Fig2)).
    You create a project that you can easily modify and adapt to create your own app.


    ![A323804_3_En_13_Fig2_HTML.jpg](A323804_3_En_13_Fig2_HTML.jpg)


    Figure 13-2. Gluon plug-in for IntelliJ and available templates'
