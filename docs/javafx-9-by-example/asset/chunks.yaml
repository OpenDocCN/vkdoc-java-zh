  trans: '

    #### 创建自定义按钮面板


    继续介绍 `start()` 方法，代码通过调用私有方法 `createButtonPanel()` 创建了一个自定义按钮面板。调用 `createButtonPanel()`
    方法创建自定义按钮面板后，代码会将控件定位到右下角。以下代码片段将按钮面板设置为右下角，并带有 3.0 像素的内边距。


    ```

    AnchorPane.setRightAnchor(buttonPanel, 3.0);

    AnchorPane.setBottomAnchor(buttonPanel, 3.0);

    ```


    深入探究 `createButtonPanel()` 方法，它首先使用 JavaFX 形状来表示 MP3 音频播放器的停止、播放和暂停按钮。在创建形状或自定义节点时，你可以向节点添加事件处理器来响应鼠标事件。尽管在
    JavaFX 中有更高级的方法来构建自定义控件，但我选择使用简单的矩形、弧线、圆形和线条来构建自己的按钮图标。要了解创建自定义控件的更高级方法，请参阅关于自定义
    UI 的第 15 章。


    要为鼠标按下事件附加事件处理器，只需调用 `setOnMouseClick()` 方法，并传入一个 `EventHandler<MouseEvent>` 实例。以下代码块添加了一个
    lambda 表达式，用于响应 `stopButton` 节点的鼠标点击事件。代码清单 9-3 展示了来自代码清单 9-1 中私有方法 `createButtonPanel()`
    的停止按钮代码。停止按钮会将暂停按钮切换为播放按钮，并将播放器定位到文件开头。鼠标点击事件的事件处理器已附加到停止按钮上。


    ```

    // 停止按钮控件

    Node stopButton = new Rectangle(10, 10);

    stopButton.setId("stop-button");

    stopButton.setOnMouseClicked(mouseEvent -> {

    if (mediaPlayer != null) {

    updatePlayAndPauseButtons(true, root);

    if (mediaPlayer.getStatus() == Status.PLAYING ||

    mediaPlayer.getStatus() == Status.PAUSED) {

    mediaPlayer.stop();

    }

    playAndPauseToggle.set(false);

    }

    });

    代码清单 9-3.

    来自私有方法 createButtonPanel() 的停止按钮代码

    ```


    在代码清单 9-3 中，一个方形节点（`Rectangle`）被定义为停止按钮，并设置了 ID 为 `stop-button`。该 ID 将唯一标识一个节点，用于代码清单
    9-2 中的 CSS 样式设置。接下来，代码为 `OnMouseClicked` 事件设置了一个事件处理器，用于停止媒体播放器的播放。你会注意到调用了 `updatePlayAndPauseButtons(true,
    root)` 方法，该方法会切换显示播放按钮并隐藏暂停按钮。否则，传入布尔值 `false`，则会显示暂停按钮并隐藏播放按钮。最后一个参数是用于查找播放和暂停按钮的根节点。


    仍在 `createButtonPanel()` 方法中，其余代码创建了一个 `StackPane` 来包含暂停和播放按钮的形状。接下来，你会看到播放按钮是使用
    `Arc` 形状创建的。在为暂停和播放控件创建类似切换按钮时，代码使用 `StackPane` 作为容器来同时容纳暂停和播放形状。由于我想将 `StackPane`
    视为一个按钮，因此必须忽略暂停和播放形状上的鼠标事件。播放和暂停节点都通过调用 `setMouseTransparent(true)` 方法来忽略鼠标事件。这样，`OnMouseClicked`
    事件的处理代码就附加到了 `StackPane` 上，用于切换显示哪个按钮形状，并更新布尔属性 `playAndPauseToggle`。


    布尔属性变量 `playAndPauseToggle` 被设置为 `false`。`playAndPauseToggle` 属性负责实际暂停和播放媒体播放器。在
    `createButtonPanel()` 方法接近末尾处，一个更改监听器被附加到 `playAndPauseToggle` 属性上，该监听器会在值发生变化时做出响应。此处显示的代码来自代码清单
    9-2，但在代码清单 9-4 中重新展示，以指出该属性用于实际控制媒体播放器的暂停和播放。当布尔属性为 `true` 时，显示暂停按钮，媒体开始播放。否则，显示播放按钮，媒体暂停。


    ```

    // 用于切换播放和暂停的布尔属性

    // 媒体播放器

    playAndPauseToggle.addListener((observable, oldValue, newValue) -> {

    if (newValue) {

    // 播放

    if (mediaPlayer != null) {

    updatePlayAndPauseButtons(false, root);

    mediaPlayer.play();

    }

    } else {

    // 暂停

    if (mediaPlayer!=null) {

    updatePlayAndPauseButtons(true, root);

    if (mediaPlayer.getStatus() == Status.PLAYING) {

    mediaPlayer.pause();

    }

    }

    }

    });

    代码清单 9-4.

    添加到布尔属性 playAndPauseToggle 的更改监听器

    ```


    媒体播放器对象是一个状态机，在内部进行状态转换。某些方法使用不在 JavaFX 应用程序线程上的其他线程。因此，在调用 `pause()` 或 `stop()`
    等方法之前，查询媒体播放器的状态通常是一种良好的实践。对于暂停按钮，你已经看到代码在调用媒体播放器对象的 `pause()` 方法之前检查了 `Status.PLAYING`。


    由于所有按钮都使用类似于代码清单 9-3 和前面代码片段（`EventHandler`）的代码，我将仅列出每个按钮最终将在媒体播放器上执行的方法调用。以下操作负责停止、暂停、播放和退出
    MP3 播放器应用程序：


    ```

    停止 - mediaPlayer.stop();

    暂停 - mediaPlayer.pause();

    播放 - mediaPlayer.play();

    关闭 - Platform.exit();

    ```


    最后，在返回按钮面板之前，代码添加了一个事件过滤器，以防止其父节点接收任何鼠标事件。由于父节点（根节点）包含监听鼠标拖拽事件的代码，你不希望它在用户尝试点击按钮面板内的按钮时产生干扰。换句话说，当鼠标指针位于按钮面板区域时，你无法在屏幕上拖拽应用程序。以下语句过滤了所有传播到父节点的鼠标事件。


    ```

    // 过滤掉，以防止根节点

    // 接收鼠标事件来拖拽窗口。

    buttonPanel.addEventHandler(MouseEvent.ANY, mouseEventConsumer);

    ```


    #### 播放进度、快退和快进


    在 `start()` 方法中创建自定义按钮面板后，代码调用了私有方法 `createSlider()`，该方法返回一个 JavaFX `Slider` UI
    控件。滑块控件表示一个进度位置滑块，它会根据媒体播放时的位置移动。当媒体暂停时，用户也可以拖拽滑块控件的“滑块头”来在音频或视频媒体中向前或向后移动时间。

