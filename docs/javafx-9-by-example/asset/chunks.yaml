- fmt: "### Module Definition\n\nIn short, a module definition is a configuration\
    \ file listing module dependencies and package exports. New keywords introduced\
    \ to Java 9 modules are `requires` and `exports`. The `requires` keyword is used\
    \ to define which modules you’ll be needing (dependent on). The `exports` keyword\
    \ allows other modules to read its packages. Listing [2-6](#A323804_3_En_2_Chapter.html#Par100)\
    \ shows the code for defining a basic module contained in a `module-info.java`\
    \ file.\n\n```\nmodule <module name> {\n    requires [public] <module name>;\n\
    \    exports <package name>;\n}\nListing 2-6.\nA Basic Module Definition Having\
    \ One Dependency and One Package Exported\n```\n\nAs a heads-up regarding the\
    \ syntax in Listing [2-6](#A323804_3_En_2_Chapter.html#Par100), the angle brackets\
    \ and square brackets are not part of the syntax, but a way to let the reader\
    \ know what is required and what is optional. In Listing [2-6](#A323804_3_En_2_Chapter.html#Par100),\
    \ the angle brackets `<>` denote that it’s required and the square brackets mean\
    \ it’s optional. For example, the module name is required and the `public` keyword\
    \ to the right of `requires` is optional. Let’s break things down and explain\
    \ each item in order to define a module.\n\n#### Module Naming\n\nBeginning with\
    \ Listing [2-6](#A323804_3_En_2_Chapter.html#Par100) is the `<module name>`. You’re\
    \ probably wondering how to name a module. I know, in particular, I struggled\
    \ with what to name a module. Actually, it’s pretty simple, according to the Jigsaw\
    \ project specification document on naming module names. It states the following:\n\
    \n> Module names, like package names, must not conflict. The recommended way to\
    \ name a module is to use the reverse-domain-name pattern that has long been recommended\
    \ for naming packages. The name of a module will, therefore, often be a prefix\
    \ of the names of its exported packages, but this relationship is not mandatory.\
    \ The State of the Module System, Mark Reinhold March 3, 2016\n\n```\nhttp://openjdk.java.net/projects/jigsaw/spec/sotms/\n\
    ```\n\nAn example of a module using the reverse-domain-name pattern would be the\
    \ following:\n\n*   A hypothetical domain name of your company: [`http://www.mycompany.com`](http://www.mycompany.com)\n\
    *   The module name should read: `com.mycompany.mymodule`\n\n#### Requires\n\n\
    Continuing with the basic module definition shown in Listing [2-6](#A323804_3_En_2_Chapter.html#Par100),\
    \ the keyword `requires` references module dependencies. The keyword `requires`\
    \ indicates that the current module depends on the other named module. One important\
    \ point to acknowledge is that all modules implicitly depend on (`requires`) the\
    \ base platform module `java.base`. Also, if you are using JavaFX in your modules,\
    \ you will implicitly get the module `javafx.base` loaded.\n\n#### Requires Public\
    \ (Implied Readability)\n\nIn Listing [2-6](#A323804_3_En_2_Chapter.html#Par100),\
    \ the optional `[public]` modifier for a `requires` module dependency allows derived\
    \ modules to have read access implicitly, better known as implied readability.\
    \ An example would be `module-A` depends on the module `java.logging` having the\
    \ `public` modifier, so another module, let’s say `module-B`, depends on `module-A`.\n\
    \nKnowing that the logging module is declared public in `module-A`, `module-B`\
    \ will automatically be able to have readability from the module `java.logging`.\
    \ This is nice because `module-B`’s module definition wouldn’t have to add a statement\
    \ like `requires java.logging`. `module-B` will implicitly get `java.logging`\
    \ module for free.\n\n#### Exports\n\nWhen using the `exports` in your module\
    \ definition, you are exposing package namespaces with public classes.\n\nAlthough\
    \ there are other keywords that define other readability relationship options,\
    \ I won’t go into those because they are beyond the scope of this book. Suffice\
    \ it to say, most of the time you will be using the basic module definition shown\
    \ in Listing [2-6](#A323804_3_En_2_Chapter.html#Par100). Now that you know how\
    \ to run and define modules, you will want to understand module types. Understanding\
    \ module types will help you know how legacy code and Java 9 modules are loaded.\n\
    \n### Module Types\n\nThere are four types of modules that the Java runtime will\
    \ load classes into. Module types are based on whether classes or JARs are used\
    \ on the classpath or the module path. As modules and classes get loaded into\
    \ the JVM (class loader), they become one of the four module types. Each module\
    \ type will have readability access to certain packages and classes. For example,\
    \ when defining an application module, the implementer will want to expose APIs\
    \ by using the keyword `export` to allow packages to be read by other modules\
    \ and classes. Figure [2-2](#A323804_3_En_2_Chapter.html#Fig2) shows a typical\
    \ dependency graph. This dependency graph shows an application module that depends\
    \ on two platform modules—the unnamed module and two automatic modules, respectively.\n\
    \n![A323804_3_En_2_Fig2_HTML.jpg](A323804_3_En_2_Fig2_HTML.jpg)\n\nFigure 2-2.\
    \ A dependency graph of an application module (`com.mycompany.modulea`) that depends\
    \ on two platform modules—the unnamed module and two automatic modules\n\nLet’s\
    \ look at the four module types in more detail in order to understand the readability\
    \ relationships between them.\n\nThe following are the descriptions of four module\
    \ types with their readability access:\n\n*   **Application module**: Created\
    \ named modules that can read the following module types:\n    *   Platform\n\
    \    *   Application\n    *   Automatic\n*   **Platform module**: Core modules\
    \ from the Java runtime cannot read other module types. The core modules can have\
    \ public access to read other core modules as long as they are defined as `public`,\
    \ such as `java.logging` or `java.base`.\n*   **Automatic module**: JAR libraries\
    \ that get automatically converted to application module types can read the following\
    \ module types:\n    *   Platform\n    *   Application\n    *   Automatic\n  \
    \  *   Unnamed\n*   **Unnamed module**: Any classes or JAR libraries loaded on\
    \ the classpath will be loaded into the unnamed module. The unnamed module type\
    \ can read from the following module types:\n    *   Platform\n    *   Application\n\
    \    *   Automatic\n\nThe unnamed module can’t read another unnamed module because\
    \ there is only one (per classloader). JARs and classes loaded from the classpath\
    \ get loaded into the unnamed module. All the public class types and packages\
    \ are exported to allow classes with the unnamed module to access other classes.\n\
    \n#### Application Module (Explicit Modules)\n\nApplication modules are the modules\
    \ you create as libraries or applications. As a reminder on a naming convention\
    \ for modules, you’ll want to use the reverse-domain-name pattern such as the\
    \ following:\n\n```\nmodule com.mycompany.modulea {\n    // rest of the declaration\n\
    }\n```\n\nWhen running your module application, you will need to specify it on\
    \ the module path, as shown here.\n\n```\n$ java --module-path mods/com.mycompany.modulea\
    \ ...\n```\n\nYou’ll see the `mods` directory, which is created to hold the compiled\
    \ modules.\n\n#### Platform Modules (Implicit)\n\nPlatform modules are considered\
    \ implicit modules that are core Java and JavaFX platform modules used in application\
    \ modules. Later you will be creating a `HelloWorld` application using platform\
    \ modules.\n\nHere is a list of common Java and JavaFX platform modules:\n\n```\n\
    java.base\njava.logging\njavafx.base\njavafx.controls\njavafx.fxml\njavafx.graphics\n\
    javafx.media\njavafx.swing\njavafx.web\n```"
