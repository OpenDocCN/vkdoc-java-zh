    ## 总结


    在本章中，你学习了用于检索 Web HTML5 内容的 `WebEngine` API。首先，你了解了加载 Web 内容的两种方式——使用 `WebEngine`
    的 `load()` 和 `loadContent()` 方法。在学习了如何加载 Web 内容后，你了解了如何获取原始内容，例如 DOM XML 或 XML。接着，你学习了强大的
    JavaScript 桥接，它允许 Java 和 JavaScript 之间进行双向通信。通过熟悉 Web 开发概念，你还了解了 JavaFX 的 `WebEngine`
    API 在发起 Web 请求方面的一些限制。


    在这些关于发起 RESTful Web 服务调用的限制中，你有机会了解了 Java 9 新的实验性 `httpclient` 模块。通过使用 `httpclient`
    模块，你可以使用构建器类发起 RESTful 的 `GET` 和 `POST` 请求，从而简化了 Web 请求的创建。


    你还学习了流行的 WebSockets 协议。在这里，你有机会创建客户端 Web 套接字来与回声服务器通信。在学习了检索数据和操作 HTML 的多种方法之后，你看到了一个如何通过运行基于
    SVG 的模拟时钟动画来渲染 HTML5 内容的示例。


    最后，你看到了所有概念如何整合到一个使用 JavaFX 的 `WebView` 节点的天气小部件应用程序的最终示例中。该天气小部件调用 `openweathermap.org`
    来检索 JSON 数据，然后将其显示在 `WebView` 节点内的 HTML5 页面上。此示例的核心重点是学习 Java 代码如何与 `WebEngine`
    的 JavaScript 桥接进行通信。


    现在你已经对 JavaFX 和 Web 有了初步了解，让我们继续探讨一些高级主题。在下一章中，你将探索 JavaFX 3D 的世界！


    # 11. JavaFX 3D


    JavaFX 9 强力支持真正的 3D 场景，将可调节的灯光、相机和模型作为该语言的一等公民。借助 JavaFX 9，可以将这些功能直接与本书中提到的更为人所知的
    2D GUI 组件混合使用，无论是在视觉上还是在源代码中。专用 GPU 硬件的出现降低了特定语言支持 3D 渲染的门槛，使得 JavaFX 的性能与先前版本
    Java 的第三方实现不相上下。


    一本小书可能都难以详尽介绍 JavaFX 9 中 3D 图形工具的所有功能。为了满足初学者或中级学习者的需求，本章重点介绍如何快速建立具有简单对象真实三维可视化的场景。然后，通过描述在更复杂场景中常见的典型自定义设置来扩展这些概念。


    在本章中，你将了解以下内容：


    *   几何图元

    *   相机和灯光

    *   自定义 TriangleMesh 模型

    *   事件处理以及与 3D 场景的交互


    ## JavaFX 中的基本 3D 场景


    在本章关于 3D 的这一半内容中，你将使用一个逐步扩展的示例模型。它将带你经历几个步骤，从建立一个基本的空 3D 场景，到一个包含可以从不同距离和角度查看的对象的场景。


    ### 一个非常基础的 3D 场景示例


    新的 JavaFX 3D 支持最棒的一点是，它是 Java 语言的一等公民。在设计 3D 包时非常用心，使得其与 2D 对应物相比，范式变化非常小。建立基本
    3D 场景的区别仅在于相机。清单 11-1 演示了这一点。


    ```

    /* 来自 SimpleScene3D.java */

    Group sceneRoot = new Group();

    Scene scene = new Scene(sceneRoot, sceneWidth, sceneHeight);

    scene.setFill(Color.WHITE);

    PerspectiveCamera camera = new PerspectiveCamera(true);

    camera.setNearClip(0.1);

    camera.setFarClip(10000.0);

    camera.setTranslateZ(-1000);

    scene.setCamera(camera);

    primaryStage.setTitle("SimpleScene3D");

    primaryStage.setScene(scene);

    primaryStage.show();

    清单 11-1.

    使用相机初始化 3D 场景

    ```


    将此代码片段添加到一个原本为空的 JavaFX 应用程序中，你将得到一个完整的 3D 场景。运行该应用程序，你应该会看到如图 11-1 所示的视图。


    ![A323804_3_En_11_Fig1_HTML.jpg](img/A323804_3_En_11_Fig1_HTML.jpg)


    图 11-1.


    一个基本的空 JavaFX 3D 场景


    作为一个空场景，它并不令人兴奋；不过，你很快就会添加一些对象。该示例表明，任何 3D 场景与 2D 布局的区别仅在于两行代码：


    ```

    PerspectiveCamera camera = new PerspectiveCamera(true);

    scene.setCamera(camera);

    ```


    创建一个 3D 相机节点（例如 `PerspectiveCamera`）会创建一个独立的场景图节点，其方式与你创建 BorderPane 或 Button
    非常相似。从这个意义上说，它必须像任何其他节点一样添加到场景中。然而，相机节点是特殊的，因为它通过 `scene.setCamera()` 方法添加。`PerspectiveCamera`
    构造函数的布尔参数决定了 3D 原点的位置。将此参数设置为 `true` 将从原点 (0,0,0) 建立所有 3D 布局，以便所有轴在屏幕中心交叉。这对于你期望使用
    JavaFX 构建的大多数 3D 场景来说是典型的。将此参数设置为 `false` 会在左上角建立 3D 原点，类似于 2D 组件布局。对于大多数场景，`PerspectiveCamera(true)`
    是理想的选择。某些场景，尤其是科学数据显示，使用左上角原点更为自然。


    注意


    选择相机类型的一个好的经验法则是，如果你打算在场景中大量平移和旋转相机，则应使用 `PerspectiveCamera(true)`。


    ## 图元


    与大多数 3D 图形库一样，JavaFX 9 提供了几种开箱即用的几何形状，可以添加到场景中。这些形状通常被称为图元，并且可以像添加任何传统节点类型一样添加到场景中。


    ## 添加图元示例


    本节扩展了之前非常简单的场景示例，以便你能看到一些内容。为此，你需要创建一个 `Cylinder` 对象，为其赋予一种彩色材质，并将其添加到场景中。清单 11-2
    展示了演示此操作的代码。


    ```

    /* SimpleScene3D.java */

    //步骤 1b：添加一个图元

    final Cylinder cylinder = new Cylinder(50, 100);

    final PhongMaterial blueMaterial = new PhongMaterial();

    blueMaterial.setDiffuseColor(Color.DEEPSKYBLUE);

    blueMaterial.setSpecularColor(Color.BLUE);

    cylinder.setMaterial(blueMaterial);

    sceneRoot.getChildren().add(cylinder);

    //结束步骤 1b

    清单 11-2.

    向 JavaFX 3D 场景添加圆柱体图元

    ```


    将此代码添加到前面的示例中，将添加圆柱体并为其着色。重新编译并运行应用程序，你应该会看到如图 11-2 所示的视图。


    ![A323804_3_En_11_Fig2_HTML.jpg](img/A323804_3_En_11_Fig2_HTML.jpg)


    图 11-2.


    带有 PhongMaterial 和 DrawMode.FILL 的圆柱体


    这比空屏幕要好。这里使用的 `Cylinder` 构造函数：


    ```

    final Cylinder cylinder = new Cylinder(50, 100);

    ```


    指定了形状的直径和高度。为了实现那种带有华丽镜面高光的深蓝色，它使用了：


    ```

    final PhongMaterial blueMaterial = new PhongMaterial();

    ```


    `PhongMaterial` 是 `javafx.paint` 层次结构的扩展，允许在 3D 表面上进行丰富的平滑插值。`PhongMaterial` 对象可以在图元和其他
    3D 节点之间重用，如下文所述。如果你不想使用 `PhongMaterial`，图元或任何 `Shape3D` 对象的默认渲染是线框视图。这将在后面的示例中演示。一旦你的形状构建并着色完毕，你可以使用以下代码将其添加到场景中：


    ```

    sceneRoot.getChildren().add(cylinder);

    ```


    在这行代码中，`Cylinder` 图元被当作你可能使用或创建的任何其他图形 `Node` 来处理。`Cylinder` 图元默认添加到场景的原点，即 `(0,0,0)`。

    '
- fmt: '### Simple Translate and Rotate Example


    Now that you have something to look at, you can utilize the third dimension by
    transforming it. JavaFX 3D supports all the standard 3D transformations you would
    expect with easy-to-use classes. The following transformations, subclassed from
    the `Transform` class, all support 3D nodes and groups:


    *   `Affine`

    *   `Rotate`

    *   `Scale`

    *   `Shear`

    *   `Translate`


    Typically in any 3D scene you would be most interested in `Rotate` and `Translate`,
    which are most concerned with moving and changing the orientation of objects,
    lights, and the camera. JavaFX `Shape3D` objects such as the `Cylinder` class
    provide setter methods to easily apply a simple rotation or translation. Listing
    [11-3](#A323804_3_En_11_Chapter.html#Par34) demonstrates how to apply this to
    the `Cylinder` in this scene.


    ```

    /* SimpleScene3D.java */

    //Step 1c:  Translate and Rotate primitive into position

    cylinder.setRotationAxis(Rotate.X_AXIS);

    cylinder.setRotate(45);

    cylinder.setTranslateZ(-200);

    //End Step 1c

    Listing 11-3.

    Translate and Rotate Primitive into Position

    ```


    Adding the code snippet from Listing [11-3](#A323804_3_En_11_Chapter.html#Par34)
    to the current 3D scene application will generate a view where the cylinder has
    been rotated and translated toward the camera. This should be similar to Figure
    [11-3](#A323804_3_En_11_Chapter.html#Fig3).


    ![A323804_3_En_11_Fig3_HTML.jpg](A323804_3_En_11_Fig3_HTML.jpg)


    Figure 11-3.


    A cylinder rotated 45 degrees on the x-axis


    For the first time in this running example, you can see the third dimension using
    a Rotation on the X-axis and a Translation in the Z-axis. Rotations are set in
    degrees with a range of 0 to 360 degrees. It is important to first set the current
    rotation axis using `setRotationAxis()`. If you need multiple rotations in multiple
    axes, you need to call the `setRotationAxis()` method each time the axis changes.
    Each call to `setRotationAxis()` affects only the current `Shape3D` object. Translations
    are set in pixels along the given axis of the set command and are handled in the
    same way that traditional 2D components are translated.


    > **Note:** The coordinate system for a JavaFX 3D scene uses a “Y Pointing Down”
    which is the Y-axis is positive down. As with most 3D systems, the Z-axis is positive
    toward the screen and the X-axis is positive to the right.


    ### Multiple Primitive Transformation Example


    This example expands on the current setup by adding and transforming the `Cube`
    and `Sphere` primitives in the same scene as `Cylinder`. The example code is provided
    in Listing [11-4](#A323804_3_En_11_Chapter.html#Par39).


    ```

    /* SimpleScene3D.java */

    //Step 1d: Add and Transform more primitives

    final PhongMaterial greenMaterial = new PhongMaterial();

    greenMaterial.setDiffuseColor(Color.DARKGREEN);

    greenMaterial.setSpecularColor(Color.GREEN);

    final Box cube = new Box(50, 50, 50);

    cube.setMaterial(greenMaterial);

    final PhongMaterial redMaterial = new PhongMaterial();

    redMaterial.setDiffuseColor(Color.DARKRED);

    redMaterial.setSpecularColor(Color.RED);

    final Sphere sphere = new Sphere(50);

    sphere.setMaterial(redMaterial);

    cube.setRotationAxis(Rotate.Y_AXIS);

    cube.setRotate(45);

    cube.setTranslateX(-150);

    cube.setTranslateY(-150);

    cube.setTranslateZ(150);

    sphere.setTranslateX(150);

    sphere.setTranslateY(150);

    sphere.setTranslateZ(-150);

    sceneRoot.getChildren().addAll(cylinder,cube,sphere);

    //End Step 1d

    Listing 11-4.

    Adding and Transforming Box and Sphere Primitives

    ```


    This code snippet shows multiple materials and colors being applied to multiple
    primitives. Each primitive is translated and rotated to different depths and axes
    of the 3D scene.


    Having multiple `Shape3D` objects in the same scene demonstrates a great visual
    depth. However, as you added multiple nodes or groups to your 3D scene, you must
    change your `add()` to an `addAll()`, as in the following line from Listing [11-4](#A323804_3_En_11_Chapter.html#Par42):


    ```

    sceneRoot.getChildren().addAll(cylinder,cube,sphere);

    ```


    In that sense there is no difference between adding 2D GUI components as scene
    children and here in 3D. Adding the prior code snippet to the example and making
    the change to `addAll()` should provide a view similar to Figure [11-4](#A323804_3_En_11_Chapter.html#Fig4).


    ![A323804_3_En_11_Fig4_HTML.jpg](A323804_3_En_11_Fig4_HTML.jpg)


    Figure 11-4.


    A Cube, Cylinder, and Sphere primitive


    ### All Together Now: Grouped Primitives


    As your scenes become more complicated, it will become cumbersome to add each
    3D object to your scene. Primitives and other `Shape3D` nodes are often used in
    conjunction to form more complex objects. These composite objects are typically
    transformed as one, although each component is often visualized independently.
    This is simply done using a group, as demonstrated in Listing [11-5](#A323804_3_En_11_Chapter.html#Par45).


    ```

    /* SimpleScene3D.java */

    //Step 1e: All Together Now: Grouped Primitives

    Group primitiveGroup = new Group(cylinder,cube,sphere);

    primitiveGroup.setRotationAxis(Rotate.Z_AXIS);

    primitiveGroup.setRotate(180); //Rotate the Group as a whole

    sceneRoot.getChildren().addAll(primitiveGroup);

    //End Step 1e

    Listing 11-5.

    Grouping and Transforming Primitives

    ```


    Each primitive is added to the `Group` object using the following line:


    ```

    Group primitiveGroup = new Group(cylinder,cube,sphere)

    ```


    Many bulk operations can then be simplified. Listing [11-5](#A323804_3_En_11_Chapter.html#Par45)
    demonstrates a rotation about the Z-axis of 180 degrees, which effectively rotates
    the entire scene as one homogenous unit. Adding the previous code snippet to the
    running primitives example should provide a view like Figure [11-5](#A323804_3_En_11_Chapter.html#Fig5).


    ![A323804_3_En_11_Fig5_HTML.jpg](A323804_3_En_11_Fig5_HTML.jpg)


    Figure 11-5.


    Grouped primitives rotated uniformly


    Be sure to add the new `Group` object to your scene instead of your individual
    primitives, as noted in Listing [11-5](#A323804_3_En_11_Chapter.html#Par45). Individual
    primitive objects can still be accessed, rotated, and translated independently
    via the `Group` object’s `getChildren()` method or by direct reference.


    > **Note:** Remember when adding primitives, groups, and other `Shape3D` node
    objects to a 3D scene, the default is the origin. Most primitives are centered
    on the origin by a calculated center of mass.


    ## Interacting with Your Scene


    Rendering objects into 3D scenes is typically only useful if you can interact
    with that scene. At a minimum the user should have the ability to move through
    the scene and do a little sight seeing. This section of the chapter will walk
    through an example of a simple first person perspective set of controls. The primitive
    example from the previous section is used as a platform to build from.'
