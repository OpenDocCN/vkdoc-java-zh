    `ExpansionPanelContainer` 控件，其中包含三个 `ExpansionPanel` 控件：


    *   在第一个面板中，其 `ExpandedPanel` 将包含一个 `GridPane`，用于显示当前注释和节次，以及为每队注释一分、两分或三分的按钮。`CollapsedPanel`
    将包含一个显示当前节次和比分的标签。

    *   第二个面板的展开面板中将包含一个 `CharmListView` 控件，用于显示游戏事件：节次开始、某队得分以及具体分数。`CollapsedPanel`
    将包含一个标签。

    *   第三个面板的展开面板中将包含一个 `LinearChart` 控件，用于显示游戏进程。`CollapsedPanel` 将包含一个标签。


    图 13-11 显示了在 Scene Builder 中修改后的视图。请注意，展示器中所需的每个控件都必须定义一个 `fx:id` 标签。编辑后的 FXML
    文件可在本书的代码仓库中找到。


