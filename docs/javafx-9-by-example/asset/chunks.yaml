  trans: "\n### 在 Microsoft Windows 上安装 JDK\n\n以下步骤使用适用于 Windows 10 操作系统的 Java 9 JDK\
    \ 64 位版本。如果你的 Windows 操作系统不同，请参考以下链接了解更多详情。\n\n[`http://www.oracle.com/technetwork/java/javase/overview/index.html`](http://www.oracle.com/technetwork/java/javase/overview/index.html)\n\
    \n以下是在 Windows 操作系统上安装 Java 9 JDK 的步骤：\n\n1.  右键单击安装程序的可执行文件（`jdk-9-windows-x64.exe`），选择以管理员身份运行，以安装\
    \ Java 9 JDK。通常，其他操作系统也会弹出类似的警告对话框，提醒你安装或运行二进制文件的风险。点击“运行”按钮继续。\n2.  点击“下一步”按钮开始安装过程，如图\
    \ 1-1 所示。\n\n    ![A323804_3_En_1_Fig1_HTML.jpg](img/A323804_3_En_1_Fig1_HTML.jpg)\n\
    \n    图 1-1.\n\n    Java SE Development Kit 9 安装过程\n3.  接下来，你将看到“自定义安装”窗口，允许你选择可选功能，如图\
    \ 1-2 所示。在此处，你只需接受默认选择，然后点击“下一步”按钮继续。\n\n    ![A323804_3_En_1_Fig2_HTML.jpg](img/A323804_3_En_1_Fig2_HTML.jpg)\n\
    \n    图 1-2.\n\n    Java SE Development Kit 9 可选功能\n4.  之后，安装过程将显示一个进度条，如图 1-3\
    \ 所示。\n\n    ![A323804_3_En_1_Fig3_HTML.jpg](img/A323804_3_En_1_Fig3_HTML.jpg)\n\
    \n    图 1-3.\n\n    Java SE Development Kit 9 安装进行中\n5.  接下来，会弹出一个对话框询问你是否要更改\
    \ Java 运行时的安装目录。只需点击“下一步”按钮并接受默认目录，如图 1-4 所示。\n\n    ![A323804_3_En_1_Fig4_HTML.jpg](img/A323804_3_En_1_Fig4_HTML.jpg)\n\
    \n    图 1-4.\n\n    Java 9 运行时目标目录\n6.  要完成 Java 9 SE Development Kit 的安装，请点击“关闭”按钮退出，如图\
    \ 1-5 所示。\n\n    ![A323804_3_En_1_Fig5_HTML.jpg](img/A323804_3_En_1_Fig5_HTML.jpg)\n\
    \n    图 1-5.\n\n    安装的最后部分提示 Java SE Development Kit 9 已成功安装\n\n### 在 MacOS X\
    \ 上安装 JDK\n\n以下步骤使用适用于 MacOS X (El Capitan) 操作系统的 Java 9 JDK 64 位版本。它假设你已经下载了\
    \ JDK，并且文件名类似于以下内容：\n\n```\njdk-9-ea-bin-b88-macosx-x86_64-21_oct_2015.dmg\n```\n\
    \n使用以下步骤在 MacOS X 操作系统上安装 Java 9 JDK：\n\n1.  启动 `dmg` 文件后，你将看到如图 1-6 所示的对话框。接下来，双击图标开始安装过程。\n\
    \n    ![A323804_3_En_1_Fig6_HTML.jpg](img/A323804_3_En_1_Fig6_HTML.jpg)\n\n  \
    \  图 1-6.\n\n    MacOS X 操作系统上的 Java 9 JDK 安装程序\n2.  接下来，要开始如图 1-7 所示的安装过程，请点击“继续”。在剩余的安装过程中，接受默认设置。\n\
    \n    ![A323804_3_En_1_Fig7_HTML.jpg](img/A323804_3_En_1_Fig7_HTML.jpg)\n\n  \
    \  图 1-7.\n\n    MacOS X 操作系统的 Java 9 JDK 安装程序介绍\n3.  点击“继续”按钮后，对话框将提示 JDK 在你的计算机上占用的磁盘空间大小，如图\
    \ 1-8 所示。点击“安装”按钮继续。\n\n    ![A323804_3_En_1_Fig8_HTML.jpg](img/A323804_3_En_1_Fig8_HTML.jpg)\n\
    \n    图 1-8.\n\n    提示 JDK 将使用多少空间的提示\n4.  出于安全目的，你的 MacOS X 会提示你输入密码以允许安装程序继续，如图\
    \ 1-9 所示。这假设你拥有安装软件的管理员权限。输入密码后，点击“安装软件”按钮启动该过程。\n\n    ![A323804_3_En_1_Fig9_HTML.jpg](img/A323804_3_En_1_Fig9_HTML.jpg)\n\
    \n    图 1-9.\n\n    权限窗口提示输入用户名和密码，以允许 JDK 软件安装在本地机器上\n5.  安装过程将需要几秒钟，如图 1-10\
    \ 所示。\n\n    ![A323804_3_En_1_Fig10_HTML.jpg](img/A323804_3_En_1_Fig10_HTML.jpg)\n\
    \n    图 1-10.\n\n    JDK 安装进行中\n6.  最后，你将点击“关闭”按钮，如图 1-11 所示。这完成了在 MacOS 操作系统上的\
    \ JDK 安装。\n\n    ![A323804_3_En_1_Fig11_HTML.jpg](img/A323804_3_En_1_Fig11_HTML.jpg)\n\
    \n    图 1-11.\n\n    JDK 安装完成\n\n完成 JDK 安装后，你将在本章后面学习如何设置环境变量。接下来是在基于 Linux 的操作系统上安装\
    \ JDK 9 的说明。\n\n### 在 Linux 上安装 JDK\n\n首先，你应该通过在终端中输入以下命令来确定你的 Linux 系统是 32 位还是\
    \ 64 位架构：\n\n```\n$ uname -m\n```\n\n在 64 位 Linux 机器上的输出如下：\n\n```\nx86_64\n```\n\
    \n在 32 位 Linux 机器上的输出如下：\n\n```\ni686\n```\n\n假设你已从以下位置下载了 Java JDK：\n\n[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
    \n对于 Linux 世界的用户，你需要下载一个类似以下名称的文件：\n\n*   `jdk-9-bin-b88-linux-i586-21_oct_2015.tar.gz`\n\
    *   `jdk-9-bin-b88-linux-i586-21_oct_2015.rpm`。\n\n找到下载的文件（`*.gz` 或 `*.rpm`），然后转到你的终端窗口开始安装过程。安装过程的说明在下一节中。\n\
    \n注意\n\n在撰写本书时，使用的 Java 9 JDK 是 EA（早期版本）版本，因此 `JAVA_HOME` 目录名称可能会发生变化。请访问 Java\
    \ 9 JDK 的安装说明以获取更多详细信息：[`https://docs.oracle.com/javase/9/install/installation-jdk-and-jre-linux-platforms.htm`](https://docs.oracle.com/javase/9/install/installation-jdk-and-jre-linux-platforms.htm)。\n\
    \n#### Fedora、CentOS、Oracle Linux 或 Red Hat Enterprise Linux 操作系统\n\n下载 `gz` 文件后，你需要对其进行解压缩。在\
    \ Fedora、CentOS、Oracle Linux 或 Red Hat Enterprise Linux 操作系统上，输入以下命令来安装 JDK。\n\
    \n如果用户未在 `sudoers` 文件中注册，则需要 `su` 为 `root` 用户来执行以下命令。\n\n```\n$ mv ∼/Downloads/jdk-9-linux-x64.tar.gz\
    \ /tmp\n$ cd /tmp\n$ tar zxvf /tmp/jdk-9-linux-x64.tar.gz\n$ sudo mkdir /opt/jdk/\n\
    $ sudo mv jdk-9 /opt/jdk\n```\n\n如果你下载了 Java 9 JDK 的 `rpm` 版本，请使用以下命令：\n\n```\n\
    $ sudo rpm -ivh jdk-9-linux-x64.rpm\n```\n"
- fmt: '### Red Hat Alternatives


    After installing JDK 9 on your system, you will likely encounter other versions
    of Java previously installed. Red Hat/CentOS-based operating systems have a way
    to switch between JDKs and JREs. Since you have installed the JDK 9 in the `/opt/jdk`
    directory, you will want `alternatives` to register the new JDK 9 as the default
    Java.


    To begin, let’s register the newly installed Java executable in `alternatives`.
    You will want to enter the following commands. These commands will update any
    indexes, register Java with a priority `100`, and display all registered Java
    runtimes that are installed.


    ```

    $ sudo update

    $ sudo alternatives --install /usr/bin/java java /opt/jdk/jdk-9/bin/java 100

    ```


    Next, you need to set the default Java version that you just added.


    ```

    $ sudo alternatives --config java

    There are 3 programs which provide ''java''.

    Selection    Command


    * 1          /opt/jdk/jdk1.8.0_51/bin/java

    + 2          /opt/jdk/jdk1.8.0_66/bin/java

    3          /opt/jdk/jdk-9/bin/java

    Enter to keep the current selection[+], or type selection number: 3

    ```


    To test if `alternatives` is pointing to the correct version, just type the following
    in your terminal window:


    ```

    $ java -version

    ```


    The following is the output:


    ```

    java version "1.9.0-ea"

    Java(TM) SE Runtime Environment (build 1.9.0-ea-b90)

    Java HotSpot(TM) 64-Bit Server VM (build 1.9.0-ea-b90, mixed mode)

    ```


    You’ll also want to configure alternatives for your `javac` compiler by performing
    similar steps as before.


    ```

    $ sudo alternatives --install /usr/bin/javac javac /opt/jdk/jdk-9/bin/javac 100

    $ sudo alternatives --config javac

    There are 3 programs which provide ''javac''.

    Selection    Command


    * 1          /opt/jdk/jdk1.8.0_51/bin/javac

    + 2          /opt/jdk/jdk1.8.0_66/bin/javac

    3          /opt/jdk/jdk-9/bin/javac

    ```


    To test if `alternatives` is pointing to the correct Java compiler version, just
    type the following:


    ```

    $ javac -version

    javac 1.9.0-ea

    ```


    ### Ubuntu/Debian


    When using Ubuntu or Debian Linux, you can obtain Oracle’s Java JDK in two ways.
    The first way is to use the `apt-get` command and the second way is to download
    the JDK from the official site mentioned earlier.


    With Ubuntu or Debian, you can use the `apt-get` command to download and install
    Oracle’s official JDK 9:


    ```

    $ sudo apt-get update

    $ sudo apt-get install oracle-java9-installer

    ```


    After downloading Linux from Oracle’s download site, you can manually decompress
    the `gz` file. For Ubuntu/Debian Linux distributions, pull up your terminal and
    type the following commands:


    ```

    $ mv ∼/Downloads/jdk-9-linux-x64.tar.gz /tmp

    $ cd /tmp

    $ tar zxvf jdk-9-linux-x64.tar.gz

    $ sudo mv jdk-9 /usr/lib/jvm/

    ```


    After installing JDK 9 on your Ubuntu/Debian system, you will likely encounter
    other versions of Java previously installed. Ubuntu/Debian-based operating systems
    have a way to switch between JDKs and JREs by using a tool called `update-alternatives`.
    Assuming you have installed the JDK 9 using `apt-get`, it usually puts the JDK
    in the `/usr/lib/jvm` directory. Now, you will want `alternatives` to register
    the new JDK 9 (`java` and `javac`).


    #### Default Java


    Type the following to register the new JDK in `alternatives`:


    ```

    $ sudo update

    $ sudo update-alternatives --install /usr/bin/java java /usr/lib/jvm/jdk-9-linux-x64/bin/java
    100

    ```


    Next, you’ll want to set the newly registered `java` as the default version to
    use. Type in the following commands:


    ```

    $ sudo update-alternatives --config java

    There are 2 choices for the alternative java (providing /usr/bin/java).

    Selection    Path                                      Priority   Status


    * 0            /usr/lib/jvm/java-8-openjdk/jre/bin/java  1061       auto mode

    1            /usr/lib/jvm/java-9-oracle/bin/java       100        manual mode

    Press enter to keep the current choice[*], or type selection number: 1

    $ sudo update-alternatives --display java

    Selection    Path                                       Priority   Status


    0            /usr/lib/jvm/java-8-openjdk/jre/bin/java   1061       auto mode

    * 1            /usr/lib/jvm/java-9-oracle/bin/java        100        manual mode

    ```


    #### Default Javac


    You’ll also want to switch the `javac` compiler too. To set the Java compiler,
    type the following commands to register the new `javac`:


    ```

    $ sudo update-alternatives --install /usr/bin/javac javac /usr/lib/jvm/jdk-9-linux-x64/bin/javac
    100

    $ sudo update-alternatives --config javac

    There are 2 choices for the alternative javac (providing /usr/bin/javac).

    Selection    Path                                    Priority   Status


    * 0            /usr/lib/jvm/java-8-openjdk/bin/javac   1061       auto mode

    1            /usr/lib/jvm/java-9-oracle/bin/javac    100        manual mode

    Press enter to keep the current choice[*], or type selection number: 1

    $ sudo update-alternatives --config javac

    There are 2 choices for the alternative javac (providing /usr/bin/javac).

    Selection    Path                                    Priority   Status


    0            /usr/lib/jvm/java-8-openjdk/bin/javac   1061       auto mode

    * 1            /usr/lib/jvm/java-9-oracle/bin/javac    100        manual mode

    ```'
