  raw: '## Labels


    Labels are read-only controls capable of displaying text and graphics having a
    background. Labels, unlike the `Text` node, extend from `Control`, as opposed
    to extending from `Shape`. Labels have a background for text and can append an
    ellipsis (...) whenever the width of the label (bounding rectangle) is being resized
    smaller than the text string being displayed to the user. This lets the user know
    there is more text content to show. Figure [6-1](#A323804_3_En_6_Chapter.html#Fig1)
    shows a label that has a very long text string fully displayed (without the ellipses);
    however, when minimizing the window, the label’s width will get reduced, thus
    showing the truncated text with the ellipses appended on the end, as shown in
    Figure [6-2](#A323804_3_En_6_Chapter.html#Fig2).


    ![A323804_3_En_6_Fig2_HTML.jpg](A323804_3_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    A label with a long text string having a reduced width that appends the ellipses
    denoting there is more text


    ![A323804_3_En_6_Fig1_HTML.jpg](A323804_3_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    A label with a long text string having the full available width


    Labels can also contain a graphic node to be positioned relative to the text.
    This means that you can add any type of JavaFX node as an image icon. Listing
    [6-1](#A323804_3_En_6_Chapter.html#Par7) shows three possible ways to create JavaFX
    labels. The first way is to create a label using the empty constructor and subsequently
    using the `setText()` method. The second way to create a label is using the constructor
    that accepts a string parameter for the text to be displayed on the label. The
    last way to create a label is using a constructor that takes two parameters that
    accept text (String) and a node (Node) for a graphic (icon).


    ```

    // Empty text label

    Label label1 = new Label();

    label1.setText("JavaFX 9 by Example");

    // String text label

    Label label2 = new Label("JavaFX Rocks!!!!");

    // String and Icon label

    Node duke = new ImageView(new Image(getClass().getResourceAsStream("/duke.png")));

    Label label3 = new Label("JavaFX Rocks!!!", duke);

    label3.setContentDisplay(ContentDisplay.TOP);

    Listing 6-1.

    Three Ways to Create Labels

    ```


    As you can see, the first two methods of creating labels are pretty straightforward;
    however, the third example gets a little more involved. The third example creates
    an image node to be used as a graphic (Duke mascot) that is placed above (`ContentDisplay.TOP`)
    the label’s text. Figure [6-3](#A323804_3_En_6_Chapter.html#Fig3) shows that the
    label has text and an image that is positioned above the text content of the label.


    ![A323804_3_En_6_Fig3_HTML.jpg](A323804_3_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    A label containing a graphic (image) positioned above (using ContentDisplay.TOP)
    the text. The image of the 3D Duke mascot was created by Joe Palrang (creative
    commons license).


    You will notice from Listing [6-1](#A323804_3_En_6_Chapter.html#Par7) the `label3`
    variable uses the `setContentDisplay()` method that accepts one of the `ContentDisplay
    enum` values. This method is responsible for how content in the label will be
    displayed, such as where the graphic is to be positioned, or to show the text
    content only, etc. Table [6-1](#A323804_3_En_6_Chapter.html#Tab1) lists all the
    different ways to display a label’s content using the `ContentDisplay enum` constants.


    Table 6-1.


    ContentDisplay Enum Constants to Specify How Content Can Be Displayed on a Label


    | `BOTTOM` | Content will be placed at the bottom of the label. |

    | `CENTER` | Content will be placed in the center of the label. |

    | `GRAPHIC_ONLY` | Only the content will be displayed. |

    | `LEFT` | Content will be placed to the left of the label. |

    | `RIGHT` | Content will be placed to the right of the label. |

    | `TEXT_ONLY` | Only the label''s text will be displayed. |

    | `TOP` | Content will be placed at the top of the label. |


    Tip


    `ContentDisplay` constants used to position content on labels can also be used
    on JavaFX buttons, check boxes, and menus.


    ### Custom Fonts


    Fonts basically style and size text in labels, menus, buttons, and many other
    controls containing text. Chapter [3](#A323804_3_En_3_Chapter.html) discussed
    how to apply existing font styles onto `Text` nodes, but how do you use custom
    fonts? In JavaFX, you can load standard font file formats such as TrueType fonts
    (ttf) or OpenType fonts (otf).


    Loading a custom font is super easy. First, find the path to the font file you
    want to load. Second, you will want to initially load the font from the JavaFX
    application thread. As shown in Listing [6-2](#A323804_3_En_6_Chapter.html#Par14),
    the code loads a TrueType font as a resource from the classpath. You will also
    notice the overridden JavaFX Application’s `init()` method being used to load
    the custom font. The `init()` method will work off of the JavaFX Application thread
    before the `start()` method is invoked. The code in Listing [6-2](#A323804_3_En_6_Chapter.html#Par14)
    uses a custom font downloaded from the Google fonts web site at [`https://fonts.google.com`](https://fonts.google.com)
    . There you can find many free type fonts designed and created by many people
    from all around the world. The following link is where you can download the Kanit
    font by Cadson Demak.


    [`https://fonts.google.com/specimen/Kanit?query=kanit&selection.family=Kanit`](https://fonts.google.com/specimen/Kanit%3Fquery=kanit%26selection.family=Kanit)


    ```

    @Override

    public void init() throws Exception {

    // load custom font

    Font.loadFont(CustomFonts.class.getResource("/Kanit-MediumItalic.ttf")

    .openStream(), 12.0);

    }

    Listing 6-2.

    Overriding the init() Method from the JavaFX Application Class to Load a TrueType
    Font as a Resource from the Classpath

    ```


    Inside the Application’s `start()` method (on the JavaFX application thread),
    the code can use the previously loaded custom font from the `init()` method. Listing
    [6-3](#A323804_3_En_6_Chapter.html#Par16) shows a label’s text that uses the custom
    font called Kanit with a MEDIUM weight having a 60-point font.


    ```

    // Use the custom font

    Label labelText = new Label("JavaFX 9 by Example ");

    labelText.setFont(Font.font("Kanit", FontWeight.MEDIUM, 60));

    Listing 6-3.

    Assuming the Font Was Previously Loaded, the Code Sets the Custom Font Kanit to
    Style Text on a Label

    ```


    The output of Listing [6-3](#A323804_3_En_6_Chapter.html#Par16) is shown in Figure
    [6-4](#A323804_3_En_6_Chapter.html#Fig4).


    ![A323804_3_En_6_Fig4_HTML.jpg](A323804_3_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    The output of a label using the custom font Kanit


    ### Fonts as Icons


    In the next section, you learn how to load custom fonts that are designed to be
    used as icon images instead of characters. These custom fonts with an image as
    icons have become common practice for many web sites today. These font packs are
    scalable vector images used for labels, buttons, and menus or anything needing
    an image icon. A single Unicode character is basically mapped to an icon image
    instead of a letter from a Latin alphabet.'
  trans: '

    ## 标签


    标签是只读控件，能够显示带有背景的文本和图形。与 `Text` 节点不同，标签继承自 `Control`，而非 `Shape`。标签为文本提供背景，并且当标签宽度（边界矩形）被调整得比显示给用户的文本字符串更小时，可以附加省略号（...）。这让用户知道还有更多文本内容需要显示。图
    6-1 显示了一个完整显示长文本字符串（无省略号）的标签；然而，当窗口最小化时，标签的宽度会减小，从而显示截断的文本并在末尾附加省略号，如图 6-2 所示。


    ![A323804_3_En_6_Fig2_HTML.jpg](img/A323804_3_En_6_Fig2_HTML.jpg)


    图 6-2.


    一个宽度减小、附加省略号表示还有更多文本的长文本字符串标签


    ![A323804_3_En_6_Fig1_HTML.jpg](img/A323804_3_En_6_Fig1_HTML.jpg)


    图 6-1.


    一个具有完整可用宽度的长文本字符串标签


    标签还可以包含一个相对于文本定位的图形节点。这意味着你可以添加任何类型的 JavaFX 节点作为图像图标。清单 6-1 展示了创建 JavaFX 标签的三种可能方式。第一种方式是使用空构造函数创建标签，然后使用
    `setText()` 方法。第二种方式是使用接受字符串参数的构造函数，该参数用于在标签上显示的文本。最后一种方式是使用接受两个参数的构造函数，这两个参数分别接受文本（String）和用于图形（图标）的节点（Node）。


    ```

    // 空文本标签

    Label label1 = new Label();

    label1.setText("JavaFX 9 by Example");

    // 字符串文本标签

    Label label2 = new Label("JavaFX Rocks!!!!");

    // 字符串和图标标签

    Node duke = new ImageView(new Image(getClass().getResourceAsStream("/duke.png")));

    Label label3 = new Label("JavaFX Rocks!!!", duke);

    label3.setContentDisplay(ContentDisplay.TOP);

    清单 6-1.

    创建标签的三种方式

    ```


    如你所见，前两种创建标签的方法相当直接；然而，第三个例子稍微复杂一些。第三个例子创建了一个用作图形（Duke 吉祥物）的图像节点，该节点放置在标签文本的上方（`ContentDisplay.TOP`）。图
    6-3 显示了一个标签，其中包含文本和一个位于标签文本内容上方的图像。


    ![A323804_3_En_6_Fig3_HTML.jpg](img/A323804_3_En_6_Fig3_HTML.jpg)


    图 6-3.


    一个包含图形（图像）并位于文本上方（使用 `ContentDisplay.TOP`）的标签。3D Duke 吉祥物的图像由 Joe Palrang 创作（知识共享许可协议）。


    你会注意到，在清单 6-1 中，`label3` 变量使用了 `setContentDisplay()` 方法，该方法接受一个 `ContentDisplay`
    枚举值。此方法负责决定标签中内容的显示方式，例如图形的位置，或者仅显示文本内容等。表 6-1 列出了使用 `ContentDisplay` 枚举常量显示标签内容的所有不同方式。


    表 6-1.


    用于指定内容如何在标签上显示的 ContentDisplay 枚举常量


    | `BOTTOM` | 内容将放置在标签底部。 |

    | `CENTER` | 内容将放置在标签中央。 |

    | `GRAPHIC_ONLY` | 仅显示图形内容。 |

    | `LEFT` | 内容将放置在标签左侧。 |

    | `RIGHT` | 内容将放置在标签右侧。 |

    | `TEXT_ONLY` | 仅显示标签的文本。 |

    | `TOP` | 内容将放置在标签顶部。 |


    提示


    用于在标签上定位内容的 `ContentDisplay` 常量也可用于 JavaFX 按钮、复选框和菜单。


    ### 自定义字体


    字体基本上可以设置标签、菜单、按钮以及许多其他包含文本的控件中文本的样式和大小。第 3 章讨论了如何将现有字体样式应用于 `Text` 节点，但如何使用自定义字体呢？在
    JavaFX 中，你可以加载标准字体文件格式，例如 TrueType 字体（ttf）或 OpenType 字体（otf）。


    加载自定义字体非常简单。首先，找到要加载的字体文件的路径。其次，你需要从 JavaFX 应用程序线程中初始加载该字体。如清单 6-2 所示，代码从类路径中加载一个
    TrueType 字体作为资源。你还会注意到，使用了重写的 JavaFX 应用程序的 `init()` 方法来加载自定义字体。`init()` 方法将在调用
    `start()` 方法之前，在 JavaFX 应用程序线程上执行。清单 6-2 中的代码使用了从 Google 字体网站 [`https://fonts.google.com`](https://fonts.google.com)
    下载的自定义字体。在那里，你可以找到许多由世界各地的人们设计和创建的免费字体。以下链接是你可以下载由 Cadson Demak 设计的 Kanit 字体的地方。


    [`https://fonts.google.com/specimen/Kanit?query=kanit&selection.family=Kanit`](https://fonts.google.com/specimen/Kanit%3Fquery=kanit%26selection.family=Kanit)


    ```

    @Override

    public void init() throws Exception {

    // 加载自定义字体

    Font.loadFont(CustomFonts.class.getResource("/Kanit-MediumItalic.ttf")

    .openStream(), 12.0);

    }

    清单 6-2.

    重写 JavaFX 应用程序类中的 init() 方法，以从类路径加载 TrueType 字体作为资源

    ```


    在应用程序的 `start()` 方法内部（在 JavaFX 应用程序线程上），代码可以使用之前从 `init()` 方法加载的自定义字体。清单 6-3 显示了一个标签文本，该文本使用了名为
    Kanit 的自定义字体，字体粗细为 MEDIUM，字号为 60 磅。


    ```

    // 使用自定义字体

    Label labelText = new Label("JavaFX 9 by Example ");

    labelText.setFont(Font.font("Kanit", FontWeight.MEDIUM, 60));

    清单 6-3.

    假设字体已预先加载，代码设置自定义字体 Kanit 来为标签上的文本设置样式

    ```


    清单 6-3 的输出如图 6-4 所示。


    ![A323804_3_En_6_Fig4_HTML.jpg](img/A323804_3_En_6_Fig4_HTML.jpg)


    图 6-4.


    使用自定义字体 Kanit 的标签输出


    ### 字体作为图标


    在下一节中，你将学习如何加载被设计用作图标图像而非字符的自定义字体。这些将图像作为图标的自定义字体如今已成为许多网站的常见做法。这些字体包是用于标签、按钮、菜单或任何需要图像图标的地方的可缩放矢量图像。单个
    Unicode 字符基本上被映射到一个图标图像，而不是拉丁字母表中的字母。

