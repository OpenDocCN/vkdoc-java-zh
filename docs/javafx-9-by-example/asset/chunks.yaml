  trans: '

    #### 工作原理


    “外观选择器”应用程序首先通过重载方法 `init()` 进行初始化，该方法会加载“扁平红”外观主题所需的字体。执行 `init()` 方法后，JavaFX
    应用程序生命周期将调用 `start()` 方法。


    在 `start()` 方法中，代码首先创建一个边框窗格布局，然后加载一个 FXML 文件，并将其放置为中央内容区域。FXML 是一种基于 XML 的语言，用于描述
    JavaFX 用户界面。这提供了一种将表示层与应用程序逻辑层分离的方法。通常，FXML 由 GUI 构建工具生成，允许设计人员拖放控件并以图形方式创建 UI。以下代码行使用
    `FXMLLoader.load()` 方法对中央内容进行解组（反序列化）。中央内容窗格是一个 `AnchorPane` 布局，其中包含一个持有其他 UI
    控件的 Accordion 控件。


    ```

    Parent content = FXMLLoader.load(getClass().getResource("lnf_demo.fxml"));

    ```


    要了解有关 Scene Builder 工具的更多信息，请参阅第 5 章。


    继续看示例代码，你会注意到通常使用根节点创建场景。接下来，代码构建了一个包含菜单项的菜单栏。第一个菜单是“文件”菜单，允许用户退出应用程序。请注意，为了使用键盘快捷键快速退出，`KeyCodeCombination`
    实例允许用户按下 Ctrl+X 组合键。要了解菜单和键盘快捷键，请参阅第 4 章。


    “外观”菜单上的第二个菜单选项允许用户选择预定义的外观 CSS 样式表文件。菜单项被设置为调用基于 `onAction` 事件触发的处理程序代码（lambda
    表达式）。以下代码片段是一个菜单项，负责使用 Caspian CSS 样式切换应用程序的外观：


    ```

    MenuItem caspianMenuItem = new MenuItem("Caspian");

    caspianMenuItem.setOnAction(ae -> {

    scene.getStylesheets().clear();

    setUserAgentStylesheet(STYLESHEET_CASPIAN);

    });

    ```


    在 JavaFX API 之上，`STYLESHEET_CASPIAN` 和 `STYLESHEET_MODENA` 值是表示基于其在类路径上位置的 CSS
    文件的字符串。


    由于其余代码非常相似，我将快进到最后一个外观菜单选项，该选项切换到“扁平红”外观。其他菜单项基本相同，并调用相同的方法来清除先前加载的 CSS 样式表文件。但是，对于“扁平红”外观，我使用了
    `getStylesheets().add()` 方法仅对当前场景级别的节点进行样式设置。


    “扁平红”外观对一部分 UI 控件进行样式设置，包括滑块、滚动条、按钮和进度控件。接下来显示的代码片段设置了一个可选的菜单项，该菜单项将使用“扁平红”外观为应用程序设置皮肤。`onAction`
    代码清除场景的样式表，然后将 `UserAgentStylesheet` 设置为 `null`。最后，加载 `flatred.css` 文件来为给定场景设置样式。


    ```

    MenuItem flatRedMenuItem = new MenuItem("FlatRed");

    flatRedMenuItem.setOnAction(ae -> {

    scene.getStylesheets().clear();

    setUserAgentStylesheet(null);

    scene.getStylesheets()

    .add(getClass().getResource("flatred.css")

    .toExternalForm());

    });

    ```


    ## JavaFX CSS 样式设置


    既然你已经知道如何加载 CSS 样式表文件，那么我们来讨论一下 JavaFX CSS 选择器和样式属性（规则）。与 HTML5 使用 CSS 样式表的方式类似，存在与场景图上的
    Node 对象关联的选择器或样式类。所有 JavaFX 场景图节点都有 `setId()`、`getStyleClass().add()` 和 `setStyle()`
    方法，用于应用可能更改节点背景颜色、边框、描边等的样式属性。


    在学习选择器之前，我想让你参考以下位置的 JavaFX CSS 参考指南：


    [`http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html`](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)


    这份宝贵的参考指南在本书及以后的内容中都会非常有用。


    ### 什么是选择器？


    与用于设置 HTML 元素样式的 W3C CSS（万维网联盟）标准类似，JavaFX CSS 也有选择器的概念。选择器基本上是用于定位场景图上 JavaFX
    节点的标签，以便使用 CSS 样式定义进行样式设置。两种选择器类型是 `id` 和 `class`。`id` 选择器是在场景节点上设置的唯一字符串名称。


    `class` 选择器也是一个字符串名称，可以作为标签添加到任何 JavaFX 节点。我还应该指出，类选择器与 C++ 或 Java 类的概念无关。类选择器允许任意数量的节点包含相同的类字符串名称，从而能够使用一个
    CSS 样式定义来设置多个节点的样式。在接下来的部分中，你将进一步了解如何定义 CSS 选择器类型，然后我会给出一个示例。


    #### CSS id 类型选择器


    `id` 类型选择器是分配给节点的唯一字符串名称。这意味着没有其他节点的 ID 可以相同。使用 `id` 类型选择器时，你需要在 JavaFX 节点对象上调用
    `setId(String ID)` 方法。例如，要定位一个 ID 为 `my-button` 的 `Button` 实例，你需要调用 `setId("my-button")`
    方法。要为 ID 为 `my-button` 的按钮设置样式，你需要创建一个 CSS 样式定义块，并使用 ID 选择器 `#my-button` 声明，如下所示：


    ```

    #my-button {

    -fx-text-fill: rgba(17, 145, 213, .90);

    -fx-border-color: rgba(255, 255, 255, .80);

    -fx-border-radius: 8;

    -fx-padding: 6 6 6 6;

    -fx-font: bold italic 20pt "LucidaBrightDemiBold";

    }

    ```


    此 CSS 样式块将应用于具有唯一 ID `my-button` 的按钮。因此，不允许其他节点包含 ID `my-button`。你还会注意到，在样式块中使用
    ID 选择器时，CSS 选择器名称以 `#` 符号为前缀，而在 Java 代码中设置 `id` 时，不使用 `#` 符号。


    #### CSS class 类型选择器


    使用类类型选择器时，你将调用 `getStyleClass().add(String styleClass)` 方法向节点添加选择器。该方法允许你拥有多个样式类来设置节点的样式。由于
    `getStyleClass()` 方法返回一个 `ObservableList`，你可以临时添加和删除样式类，以动态更新它们的外观。例如，让我们通过 `getStyleClass().add("num-button")`
    方法定位两个按钮，其样式类（`ObservableList`）包含一个名为 `num-button` 的类。以下是一个 CSS 样式定义块，使用类选择器 `.num-button`
    声明：


    ```

    .num-button {

    -fx-background-color: white, rgb(189,218,230), white;

    -fx-background-radius: 50%;

    -fx-background-insets: 0, 1, 2;

    -fx-font-family: "Helvetica";

    -fx-text-fill: black;

    -fx-font-size: 20px;

    }

    ```


    此 CSS 样式块将应用于具有样式类 `num-button` 的按钮。你将会注意到，使用类选择器时，CSS 选择器名称以点号（`.`）为前缀，而在 Java
    代码中添加选择器时，不使用（`.`）符号。


    #### 选择器模式


    到目前为止，你只看到了简单的选择器；然而，选择器可以具有遍历场景图节点层次结构（从根节点到子节点）的模式。对选择器模式的全面讨论超出了本书的范围，但我将简要提及常见的选择器模式并介绍伪类。

