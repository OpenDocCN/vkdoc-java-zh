  trans: '

    ##### 通用选择器模式


    通常，你会希望基于通用选择器模式来设置多个节点的样式。一种典型的选择器模式是：为父节点属于特定类型的子节点设置样式。例如，你可能希望为所有父节点是 `HBox`
    的按钮设置样式。


    另一种模式是为两种不同类型的节点设置一个共同的属性。以下示例展示了这两种用例的选择器模式：


    ```

    /* 为所有父节点是 HBox 的按钮设置样式 */

    .hbox > .button {

    -fx-text-fill: black;

    }

    /* 为所有标签和文本节点设置样式 */

    .label, .text {

    -fx-font-size: 20px;

    }

    ```


    如你所见，选择器模式 (`.hbox > .button`) 为 `HBox` 的后代 `Button` 节点设置样式。这非常直观。两个选择器之间的大于号让系统知道哪些节点需要被设置样式。


    此外，正如 JavaFX CSS 参考指南中所述，UI 控件的选择器有一套命名约定。它们全部使用小写字母，如果控件名称包含多个单词，则用连字符分隔。例如，`GridPane`
    的类选择器将是 `.grid-pane`。请记住，并非所有节点默认都有命名的类选择器，因此请参考 JavaFX CSS 参考指南。


    第二个用例中的选择器模式 (`.label, .text`) 涉及为不同类型的节点设置一个共同的属性。这个示例是一个选择器模式，它为所有 `Label` 节点和
    `Text` 节点设置相同的文本字体大小。逗号表示一个需要设置样式的选择器列表。换句话说，在此场景中，字体大小将被设置为 20 磅。


    ##### 伪类选择器


    伪类选择器用于为具有不同状态的节点设置样式。一个例子是 `Button` 节点的悬停状态。一个按钮控件具有以下状态：`armed`、`disabled`、`focused`、`hover`、`pressed`
    和 `show-mnemonic`。要指定带有伪类的选择器，你必须在主选择器名称后附加一个冒号和状态（类型）。以下代码片段展示了一个具有类选择器 `num-button`
    的按钮的两种选择器模式：


    ```

    .num-button {

    -fx-background-color: white, bluish-gray, white;

    -fx-background-radius: 50%;

    -fx-background-insets: 0, 1, 2;

    -fx-font-family: "Helvetica";

    -fx-text-fill: black;

    }

    .num-button:hover {

    -fx-background-color: black, white, black;

    -fx-text-fill: white;

    }

    ```


    在这段 CSS 代码中，第一个选择器 (`.num-button`) 仅仅为按钮的正常状态设置样式。然而，第二个带有附加冒号和状态（hover）的选择器将更改一部分属性，对它们进行细微调整。在此场景中，当鼠标光标移动到（悬停）具有样式类
    `num-button:hover` 的按钮上时，按钮的颜色和文本的填充颜色将会反转。图 15-11 展示了当鼠标悬停在数字键盘的按钮 3 上时，伪选择器生效的情况。


    ![A323804_3_En_15_Fig11_HTML.jpg](img/A323804_3_En_15_Fig11_HTML.jpg)


    图 15-11.


    当鼠标光标位于任何数字键盘按钮上方时，会使用带有 hover 伪类的选择器


    #### 一个选择器样式设置示例


    为了演示使用 `id` 和 `class` 类型选择器，我创建了一个类似智能手机数字键盘的应用程序，如图 15-12 所示。


    ![A323804_3_En_15_Fig12_HTML.jpg](img/A323804_3_En_15_Fig12_HTML.jpg)


    图 15-12.


    一个模仿智能手机数字键盘的应用程序。


    在图 15-12 中，注意数字键盘的 4 × 3 网格圆形按钮及其下方用于拨打电话的绿色矩形按钮。清单 15-3 是包含源代码的主要 `start()` 方法。清单
    15-4 则展示了 CSS 文件 `mobile_buttons.css` 的内容。


    ```

    @Override

    public void start(Stage primaryStage) {

    BorderPane root = new BorderPane();

    Scene scene = new Scene(root, 180, 250);

    scene.getStylesheets()

    .add(getClass().getResource("mobile_buttons.css")

    .toExternalForm());

    String[] keys = {"1", "2", "3",

    "4", "5", "6",

    "7", "8", "9",

    "*", "0", "#"};

    GridPane numPad = new GridPane();

    numPad.getStyleClass().add("num-pad");

    for (int i=0; i < 12; i++) {

    Button button = new Button(keys[i]);

    button.getStyleClass().add("num-button");

    numPad.add(button, i % 3, (int) Math.ceil(i/3) );

    }

    // 呼叫按钮

    Button call = new Button("Call");

    call.setId("call-button");

    call.setMaxSize(Double.MAX_VALUE, Double.MAX_VALUE);

    numPad.add(call, 0, 4);

    GridPane.setColumnSpan(call, 3);

    GridPane.setHgrow(call, Priority.ALWAYS);

    root.setCenter(numPad);

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    清单 15-3.

    数字键盘应用程序的 JavaFX 源代码

    ```


    清单 15-3 中的代码将加载 `mobile_button.css` 文件，该文件会应用于场景图。CSS 文件的内容如清单 15-4 所示。


    ```

    .root {

    -fx-background-color: white;

    -fx-font-size: 20px;

    bright-green: rgb(59,223, 86);

    bluish-gray: rgb(189,218,230);

    }

    .num-pad {

    -fx-padding: 15px, 15px, 15px, 15px;

    -fx-hgap: 10px;

    -fx-vgap: 8px;

    }

    .num-button {

    -fx-background-color: white, bluish-gray, white;

    -fx-background-radius: 50%;

    -fx-background-insets: 0, 1, 2;

    -fx-font-family: "Helvetica";

    -fx-text-fill: black;

    }

    .num-button:hover {

    -fx-background-color: black, white, black;

    -fx-text-fill: white;

    }

    #call-button {

    -fx-background-color: white, bright-green;

    -fx-background-radius: 2;

    -fx-background-insets: 0, 1;

    -fx-font-family: "Helvetica";

    -fx-text-fill: white;

    }

    #call-button:hover {

    -fx-background-color: bright-green, white;

    -fx-background-radius: 2;

    -fx-background-insets: 0, 1;

    -fx-font-family: "Helvetica";

    -fx-text-fill: bright-green;

    }

    清单 15-4.

    mobile_buttons.css CSS 文件的内容

    ```


    #### 工作原理


    代码首先创建一个场景，该场景以 `BorderPane` 作为根节点。创建场景后，代码加载 CSS 样式表文件 `mobile_buttons.css` 来为当前场景的节点设置样式。接下来，代码简单地使用
    `GridPane` 类创建一个网格，并生成 12 个按钮放置在每个单元格中。注意在 `for` 循环中，每个按钮都通过 `getStyleClass().add()`
    方法设置了名为 `num-button` 的样式类。


    最后，绿色的呼叫按钮将被添加到网格面板的最后一行。由于呼叫按钮是唯一的，其 `id` 选择器被设置为 `call-button`，并使用 `id` 选择器设置样式，这意味着
    CSS 文件中命名的选择器将以 `#` 符号为前缀。要查看一些令人惊叹的按钮样式，请访问 `FXExperience.com` 上关于使用 CSS 设置按钮样式的博客文章，链接如下：


    [`http://fxexperience.com/2011/12/styling-fx-buttons-with-css`](http://fxexperience.com/2011/12/styling-fx-buttons-with-css)


    在 FXExperience 上，这篇关于使用 CSS 设置 FX 按钮样式的博客文章由 Jasper Potts（Oracle 客户端 Java 开发体验架构师）撰写。


    ### 如何定义基于 -fx- 的样式属性（规则）


    我相信到现在你已经注意到样式定义块中许多以 `-fx-` 为前缀的名称-值对（属性）。这些通常被称为规则的属性，可以被定义为其值能够设置区域边框宽度、背景填充颜色等。在本节中，你将学习如何使用选择器样式块来设置
    JavaFX 节点的样式，以及如何通过内联样式来覆盖属性。

