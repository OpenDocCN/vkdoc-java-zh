  raw: '### First Person Camera Movement Using the Mouse


    The previous keyboard handler example provided half of a first-person perspective
    where you “fly through” your 3D scene. The keyboard is used to slide along the
    X- and Z-axes. What is happening is the `PerspecitveCamera` node is translating
    along those axes. However, the previous example limits these translations to a
    single plane. To simulate looking around, the “head on a swivel” effect, you need
    to use the mouse.


    To add mouse control of the camera swivel for a 3D scene, you must simply add
    a JavaFX `MouseMoved` event handler. The code in Listing [11-8](#A323804_3_En_11_Chapter.html#Par71)
    is a rudimentary example of an `OnMouseMoved` event handler and some basic trigonometry
    that swivels the camera node. The movement produced by this handler rotates the
    Camera node itself on the Y- and X-axes.


    ```

    /* SimpleScene3D.java */

    //Step 3:  Add a Camera Control Mouse Event handler

    scene.setOnMouseMoved(event -> {

    //acquire the new Mouse coordinates from the recent event

    double mouseYnew = event.getSceneY();

    double mouseXnew = event.getSceneX();

    //Find the deltas for our Trig formula

    double atan2Y = mouseYnew - mouseYold;

    double atan2X = mouseXnew - mouseXold;

    //Build the new Rotate objects

    Rotate xRotate = new Rotate();

    Rotate yRotate = new Rotate();

    //Only compute when there is a change

    if(mouseYnew != mouseYold) {

    //When looking up or down we should rotate on the X-AXIS

    camera.setRotationAxis(Rotate.X_AXIS);

    //calculate the rotational change of the camera pitch

    double pitchRotate = camera.getRotate() + (Math.atan2(atan2Y,atan2X) / rotateModifier);

    //set min/max camera pitch to prevent camera flipping

    pitchRotate = pitchRotate > cameraYlimit ? cameraYlimit : pitchRotate;

    pitchRotate = pitchRotate < -cameraYlimit ? -cameraYlimit : pitchRotate;

    //replace the old camera pitch rotation with the new one.

    //camera.setRotate(pitchRotate);  //This doesn''t work when a second rotation
    call is made

    xRotate = new Rotate(pitchRotate,Rotate.X_AXIS);

    }

    if(mouseXnew != mouseXold) {

    //When looking left or right we should rotate on the Y-AXIS

    camera.setRotationAxis(Rotate.Y_AXIS);

    //calculate the rotational change of the camera yaw

    double yawRotate = camera.getRotate() + (Math.atan2(atan2X,atan2Y) / rotateModifier);

    //camera.setRotate(yawRotate);  //this would replace the previous X-AXIS rotation

    yRotate = new Rotate(yawRotate, Rotate.Y_AXIS);

    }

    //Apply the combined rotations

    camera.getTransforms().addAll(xRotate,yRotate);

    mouseXold = mouseXnew;

    mouseYold = mouseYnew;

    });

    //End Step 3

