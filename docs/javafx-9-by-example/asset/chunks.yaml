- fmt: '### Creating a Custom Button Panel


    Continuing with the `start()` method, the code creates a custom button panel by
    invoking the private method `createButtonPanel()`. After invoking the `createButtonPanel()`
    method to create a custom button panel, the code will position the control to
    the bottom-right corner. The following code snippet sets the button panel to the
    bottom-right corner with a 3.0 pixel padding.


    ```

    AnchorPane.setRightAnchor(buttonPanel, 3.0);

    AnchorPane.setBottomAnchor(buttonPanel, 3.0);

    ```


    Looking deeper into the `createButtonPanel()` method, it begins by using JavaFX
    shapes that will represent the Stop, Play, and Pause buttons for the MP3 audio
    player. When creating shapes or custom nodes, you can add event handlers to nodes
    in order to respond to mouse events. Although there are advanced ways to build
    custom controls in JavaFX, I chose to build my own button icons from simple rectangles,
    arcs, circles, and lines. To see more advanced ways to create custom controls,
    refer to Chapter [15](#A323804_3_En_15_Chapter.html) on custom UIs.


    To attach event handlers to a mouse press, simply call the `setOnMouseClick()`
    method by passing in an `EventHandler<MouseEvent>` instance. The following code
    block adds a lambda expression that responds to a mouse click for the `stopButton`
    node. Listing [9-3](#A323804_3_En_9_Chapter.html#Par57) shows the code for the
    Stop button from the private method `createButtonPanel()` from Listing [9-1](#A323804_3_En_9_Chapter.html#Par29).
    The Stop button will toggle the Pause button to a Play button and position the
    player to the beginning of the file. The event handler for a mouse clicked event
    is attached to the Stop button.


    ```

    // stop button control

    Node stopButton = new Rectangle(10, 10);

    stopButton.setId("stop-button");

    stopButton.setOnMouseClicked(mouseEvent -> {

    if (mediaPlayer != null) {

    updatePlayAndPauseButtons(true, root);

    if (mediaPlayer.getStatus() == Status.PLAYING ||

    mediaPlayer.getStatus() == Status.PAUSED) {

    mediaPlayer.stop();

    }

    playAndPauseToggle.set(false);

    }

    });

    Listing 9-3.

    Code for the Stop Button from the Private Method createButtonPanel()

    ```


    In Listing [9-3](#A323804_3_En_9_Chapter.html#Par57), a square node (`Rectangle`)
    is defined as the Stop button, set with an ID of `stop-button`. The ID will uniquely
    identify a node for the CSS styling in Listing [9-2](#A323804_3_En_9_Chapter.html#Par31).
    Next, the code sets an event handler for the `OnMouseClicked` event to stop the
    media player from playing. You’ll notice the method call to `updatePlayAndPauseButtons(true,
    root)`, which toggles the display of the Play button and hides the Pause button.
    Otherwise, you pass in a Boolean value of `false`, so the Pause button will be
    displayed and the Play button will be hidden. The last parameter is the root node
    to be used to look up the Play and Pause buttons.


    Still within the `createButtonPanel()` method, the rest of the code creates a
    `StackPane` to contain the Pause and Play button shapes. Next, you see that the
    Play button is created using an `Arc` shape. When creating a toggle-like button
    for the Pause and Play controls, the code uses a `StackPane` as a container to
    hold both Pause and Play shapes. Since I wanted to treat the `StackPane` as one
    button, I had to ignore the mouse events on the Pause and Play shapes. Both Play
    and Pause nodes ignore mouse events by invoking the `setMouseTransparent(true)`
    method. That way, the `OnMouseClicked` event’s handler code is attached to the
    `StackPane` to toggle which button shape to display and to update the Boolean
    `playAndPauseToggle` property.


    The Boolean property variable `playAndPauseToggle` is set to `false`. The `playAndPauseToggle`
    property is responsible for actually pausing and playing the media player. Near
    the end of the `createButtonPanel()` method, a change listener is attached to
    the `playAndPauseToggle` property, which responds when the value changes. The
    code shown here is from Listing [9-2](#A323804_3_En_9_Chapter.html#Par31), but
    it’s reshown in Listing [9-4](#A323804_3_En_9_Chapter.html#Par61) to point out
    that the property is used to actually control the pausing and playing the media
    player. When the Boolean property is `true` the Pause button is shown and the
    media gets played. Otherwise, the Play button is shown and the media is paused.


    ```

    // Boolean property toggling the playing and pausing

    // the media player

    playAndPauseToggle.addListener((observable, oldValue, newValue) -> {

    if (newValue) {

    // Play

    if (mediaPlayer != null) {

    updatePlayAndPauseButtons(false, root);

    mediaPlayer.play();

    }

    } else {

    // Pause

    if (mediaPlayer!=null) {

    updatePlayAndPauseButtons(true, root);

    if (mediaPlayer.getStatus() == Status.PLAYING) {

    mediaPlayer.pause();

    }

    }

    }

    });

    Listing 9-4.

    Change Listener Added to the Boolean Property playAndPauseToggle

    ```


    The media player object is a state machine that transitions between states internally.
    Some methods use other threads that aren’t on the JavaFX application thread. So
    it is typically good practice to query the state of the media player before invoking
    methods such as the `pause()` or `stop()` method. In the case of the Pause button,
    you’ve seen that the code checks for the `Status.PLAYING` before invoking the
    `pause()` method on the media player object.


    Because all the buttons use code similar to Listing [9-3](#A323804_3_En_9_Chapter.html#Par57)
    and the preceding code snippet (`EventHandler`), I will list only the method calls
    that each button will ultimately perform on the media player. The following actions
    are responsible for stopping, pausing, playing, and exiting the MP3 player application:


    ```

    Stop - mediaPlayer.stop();

    Pause - mediaPlayer.pause();

    Play - mediaPlayer.play();

    Close - Platform.exit();

    ```


    Lastly, before returning the button panel, the code adds an event filter to prevent
    any mouse events to be received on its parent node. Because the parent node (root)
    has code that listens for mouse drag events, you don’t want it to interfere when
    the user is trying to click on buttons inside the button panel. In other words,
    you can’t drag the application around the screen when your mouse pointer is over
    the button panel region. The following statement filters any mouse events that
    are propagated to the parent node.


    ```

    // Filter out to prevent the root node to

    // receive mouse events to drag the window around.

    buttonPanel.addEventHandler(MouseEvent.ANY, mouseEventConsumer);

    ```


    ### Play Progress, Rewind, and Fast Forward


    After creating the custom button panel in the `start()` method, the code invokes
    the private method `createSlider()`, which returns a JavaFX `Slider` UI control.
    The slider control represents a progress position slider that moves based on the
    position of the media as it is being played. When the media is paused, the user
    may also drag the slider control’s “thumb” to go backward and forward in time
    through the audio or video media.'
