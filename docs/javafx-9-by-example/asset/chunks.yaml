    ### The Application Class


    Finally, `HandsTracking`, which is shown in Listing [14-11](#A323804_3_En_14_Chapter.html#Par82),
    is the JavaFX Application that will create a new `Controller` instance that will
    start listening to frames based on a `LeapListener` instance.


    For every frame, `listener.doneListProperty()` will change to `true` when the
    frame is processed, so at this point you’ll process the lists of (Leap) bones,
    pairs, and arms to create and render the (JavaFX 3D) phalanges, joints, and forearms.
    Note that a `Group` holding the collection of these 3D shapes is filled using
    `Platform.runLater()`. This means that if the frame rate is too high, not all
    the frames will be processed, but there won’t be concurrent modification exceptions
    when the lists change from one frame to the other, as you are getting copies of
    the list being modified.


    ```

    public class HandsTracking extends Application {

    private LeapListener listener = null;

    private Controller controller = null;

    @Override

    public void start(Stage primaryStage) throws Exception {

    listener = new LeapListener();

    controller = new Controller();

    controller.addListener(listener);

    final PerspectiveCamera camera = new PerspectiveCamera();

    camera.setFieldOfView(60);

    camera.getTransforms().addAll(new Translate(-400, -500, 200));

    final PointLight pointLight = new PointLight(Color.ANTIQUEWHITE);

    pointLight.setTranslateX(0);

    pointLight.setTranslateY(-1000);

    pointLight.setTranslateZ(-800);

    final Group root = new Group(pointLight);

    final Group root3D = new Group(camera, root);

    final SubScene subScene = new SubScene(root3D, 800, 600, true, SceneAntialiasing.BALANCED);

    subScene.setCamera(camera);

    Scene scene = new Scene(new AnchorPane(subScene), 800, 600, Color.WHITESMOKE);

    listener.doneListProperty().addListener((obs, ov, nv) -> {

    if (nv) {

    List bones = listener.getBones();

    List arms = listener.getArms();

    List joints = listener.getJoints();

    Platform.runLater(() -> {

    root.getChildren().setAll(pointLight);

    root.getChildren().addAll(bones.stream()

    .filter(bone -> bone.isValid() && bone.length() > 0)

    .map(Phalanx::new)

    .map(Phalanx::getPhalanx)

    .collect(Collectors.toList()));

    root.getChildren().addAll(joints.stream()

    .map(Joint::new)

    .map(Joint::getJoint)

    .collect(Collectors.toList()));

    root.getChildren().addAll(arms.stream()

    .filter(Arm::isValid)

    .map(Forearm::new)

    .map(Forearm::getForearm)

    .collect(Collectors.toList()));

    });

    }

    });

    primaryStage.setTitle("Hand Tracking with Leap Motion");

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    @Override

    public void stop(){

    controller.removeListener(listener);

    }

    }

