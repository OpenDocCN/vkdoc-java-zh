  trans: '

    ##### 在媒体中向前或向后搜索


    在私有方法 `createSlider()` 中，以下代码实现了一个滑块控件，用于表示 MP3 音频播放器应用程序的进度（搜索）位置滑块：


    ```

    Slider slider = new Slider(0, 100, 1);

    slider.setId("seek-position-slider");

    slider.valueProperty()

    .addListener((observable) -> {

    if (slider.isValueChanging()) {

    // 搜索前必须检查媒体是否已暂停

    if (mediaPlayer != null &&

    mediaPlayer.getStatus() == MediaPlayer.Status.PAUSED) {

    // 将秒转换为毫秒

    double dur = slider.getValue() * 1000;

    mediaPlayer.seek(Duration.millis(dur));

    }

    }

    });

    ```


    请注意滑块控件的 `valueProperty()` 方法以及对 `addListener()` 方法的调用，该方法包含一个 `InvalidationListener`（lambda
    表达式），用于检测用户是否移动了滑块控件，从而更改了值属性。`InvalidationListener`（函数式接口）的 lambda 参数是一个 `javafx.beans.Observable`
    类型的对象，它引用滑块的 `value` 属性。


    代码首先通过使用 `isValueChanging()` 方法检查滑块的值是否已更改。出于性能效率的考虑，在调用 `seek()` 方法之前执行此检查非常重要。使用
    `InvalidationListener`，滑块的值仅在需要时才会更改（这是惰性求值的一个示例）。如果使用 `ChangeListener`（急切求值），值会过于频繁地更改，可能会使媒体播放器不堪重负。提醒一下，`InvalidationListener`
    是一个只有一个 `Observable` 类型参数的 lambda，而 `ChangeListener` 是一个包含三个参数（一个 `ObservableValue`、一个旧值和一个新值）的
    lambda 表达式。


    ##### 使用滑块控件显示播放进度


    仍在 `start()` 方法中，代码将变量 `progressListener` 分配给一个 `ChangeListener`（lambda）实例，如下面的代码片段所示：


    ```

    // 随着音频/视频播放（播放中）更新滑块

    progressListener = (observable, oldValue, newValue) ->

    progressSlider.setValue(newValue.toSeconds());

    ```


    `progressListener` 负责在媒体播放器播放音频或视频媒体时更新滑块的“滑块按钮”。该监听器在 `playMedia()` 方法中被添加到媒体播放器对象的
    `currentTimeProperty()` 中。在私有方法 `playMedia()` 中，代码首先通过移除绑定到旧媒体播放器对象的单例 `progressListener`
    实例来进行清理，然后将 `progressListener` 添加到一个新创建的媒体播放器对象上。通过移除对进度监听器的旧引用，可以让 Java 运行时执行其垃圾回收过程，从而防止内存泄漏。目前，无法通过
    setter 方法替换 `MediaPlayer` 实例中的媒体对象。为了加载新媒体，必须创建一个新的 `MediaPlayer` 实例。你会在展示使用构造函数
    `MediaPlayer(media)` 加载媒体的代码中注意到，它接受一个 `Media` 实例。


    #### 为音频文件设置拖放支持


    继续看 `start()` 方法，注意对私有方法 `initFileDragNDrop()` 的调用。我创建了这个方法来支持拖放功能，该功能负责从本地文件系统或浏览器
    URL 地址字段加载音频文件。由于实现与第 5 章的“照片查看器”示例几乎相同，我将不讨论代码细节，只提及对私有方法 `playMedia()` 的调用。文件被拖放后，URL
    字符串会被传递给 `playMedia()` 方法。该方法将方便地进行清理并创建一个新的媒体播放器，然后立即播放媒体文件。


    #### 音频文件拖放


    ```

    /**

    * 初始化媒体文件的拖放功能。

    * @param root - 场景图的根面板。

    */

    private void initFileDragNDrop(Pane root)

    ```


    在 `initFileDragNDrop()` 方法内部是 `OnDragDropped` 事件处理代码，它从 `DragEvent` 的拖放板中获取文件。在这里，URL
    路径被提取出来并传递给私有方法 `playMedia()`。`playMedia()` 方法首先检查是否存在先前创建的 `mediaPlayer` 对象。如果存在先前的媒体播放器实例，代码将停止该媒体播放器并清理所有对事件、监听器和属性的旧引用。


    #### 媒体元数据


    接下来，代码使用一个有效的 `URL` 字符串创建一个 `Media` 类实例。创建 `Media` 实例后，代码通过 `getMetadata()` 方法遍历媒体的元数据，将键作为输出显示到控制台。有时
    MP3 音乐文件会包含关于艺术家、曲目或歌曲标题的信息。通过查询媒体对象的元数据，你可以将这些信息显示给用户。


    列出媒体元数据后，代码使用一个新的 `Media` 对象实例化一个新的 `MediaPlayer` 实例，并将 `progressListener` 添加到媒体播放器的
    `currentTimeProperty()` 方法中。如前文关于进度位置滑块控件所述，随着媒体的播放，“滑块按钮”将向前移动。


    #### 播放媒体


    ```

    private void playMedia(String url, Pane root)

    ```


    文件被拖放到播放表面后，代码将 URL 和根 `Pane` 传递给私有方法 `playMedia()`。如果存在先前的媒体播放器，代码会通过暂停并清除所有附加的事件处理程序或监听器来进行一些清理工作。


    接下来，代码将加载并`验证`媒体是否受支持。使用 `Media` 类构造函数加载媒体文件时，可能会遇到 `MediaException`，这很可能是媒体不受支持的问题。代码将向用户显示一个
    JavaFX 警告窗口。清单 9-5 展示了如何验证媒体文件是否受支持。如果不支持，将向用户显示一个 JavaFX 警告对话框。


    ```

    // 创建一个新的媒体播放器

    Media validMedia = null;

    try {

    validMedia = new Media(url);

    } catch (Exception e) {

    new Alert(Alert.AlertType.ERROR,

    e.getMessage(),

    ButtonType.OK)

    .showAndWait()

    .filter(response -> response == ButtonType.OK)

    .ifPresent(response -> e.printStackTrace());

    return;

    }

    final Media media = validMedia;

    清单 9-5.

    判断媒体文件是否受支持的代码。

    ```


    继续 `playMedia()` 方法，代码使用新媒体实例化一个新的 `MediaPlayer`。接下来，`mediaPlayer` 会将之前定义的 `progressListener`
    附加到其 `currentTimeProperty()` 方法上。


    mediaPlayer.setOnReady()


    设置好媒体播放器对象后，代码就可以播放文件了。代码传入一个创建的 `Runnable`（lambda 表达式）实例来响应媒体播放器对象上的 `OnReady`
    事件。代码首先通过调用 `updatePlayAndPauseButtons()` 方法重置自定义按钮面板上的“播放”和“暂停”按钮。传入 `true` 会显示“播放”按钮并隐藏“暂停”按钮；否则，会显示“暂停”按钮并隐藏“播放”按钮。


    接下来，代码根据媒体的总时长初始化滑块控件。最后，代码调用媒体播放器对象的 `play()` 方法开始播放音乐媒体。


    #### 倒带（OnEndOfMedia 事件）


    继续在 `playMedia()` 方法内部，设置好媒体播放器的 `OnReady` 事件后，代码会设置 `OnEndOfMedia` 事件。当媒体播放器的播放位置到达末尾时，会触发此事件。代码会切换“播放”和“暂停”按钮的外观，并将媒体倒带到文件的起始位置，同时将其置于
    `Ready` 状态。

