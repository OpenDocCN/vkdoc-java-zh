    ```java

    private boolean isValidImageFile(String url) {

    List imgTypes = Arrays.asList(".jpg", ".jpeg",

    ".png", ".gif", ".bmp");

    return imgTypes.stream()

    .anyMatch(t -> url.toLowerCase().endsWith(t));

