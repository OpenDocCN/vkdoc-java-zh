- fmt: '# JavaFX Printing


    Before we get started with the JavaFX print APIs, I want to whet your appetite
    by showing you how easy it is to print something with very few lines of code.
    JavaFX printing at its simplest form allows you to print any visible JavaFX node,
    as shown in Listing [8-1](#A323804_3_En_8_Chapter.html#Par10).


    ```

    PrinterJob job = PrinterJob.createPrinterJob();

    job.showPrintDialog(primaryStage);

    boolean success = job.printPage(circle);

    if (success) {

    job.endJob();

    }

    Listing 8-1.

    Printing a JavaFX Node Using the PrinterJob Class

    ```


    The goal in Listing [8-1](#A323804_3_En_8_Chapter.html#Par10) is to print a JavaFX
    `Circle` node to the printer. Listing [8-1](#A323804_3_En_8_Chapter.html#Par10)
    shows the creation of a print job (`PrinterJob`) followed by a call to the `showPrintDialog()`
    method, which launches a dialog window allowing you to configure the current print
    job, as shown in Figure [8-1](#A323804_3_En_8_Chapter.html#Fig1).


    ![A323804_3_En_8_Fig1_HTML.jpg](A323804_3_En_8_Fig1_HTML.jpg)


    Figure 8-1.


    A Print dialog window to configure the current print job


    After configuring the printer settings, you click on the Print button to begin
    the printing process. The code will invoke the print job’s `printPage()` method
    to send the job to the printer. After the call to the `printPage()` method a Boolean
    value is returned to signify whether the print job was successful or not. If the
    printing is successful (`true`), the code finishes the print job by calling the
    `endJob()` method on the printer job object.


    The output from Listing [8-1](#A323804_3_En_8_Chapter.html#Par10) should print
    out a JavaFX `circle` node onto a printer. Assuming the circle is positioned within
    the printer’s printable width, you should see a single printed page with a circle
    shape. Later, you learn to use the APIs to query the printer for its printable
    width and height.


    The output of Listing [8-1](#A323804_3_En_8_Chapter.html#Par10) looks quite simple
    to implement; however, there is more than meets the eye. You are probably wondering,
    “How do you print a node with content that spans multiple pages?”


    Since the code simply prints onto a single page, you’ll also find out that if
    a node is larger (outside) than the printable width and height of the printer’s
    layout, those areas won’t be printed onto the physical page (`Paper`). Having
    said this, you will need to implement a strategy to either resize the node’s content
    or cut up the node’s content into multiple nodes to be printed onto each page.


    In this chapter, you will primarily learn how to configure a print job and print
    a single node such as an image or a shape node. However, if you are ambitious
    enough and willing to create an actual word processor or a greeting card application,
    you will inevitably want to print content that spans over multiple pages. Because
    of this, you will likely have to do the math yourself. Basically, this math would
    involve calculating lines of text or determining the width and height of content
    regions.


    Although creating a word processor capable of printing multiple pages is rather
    ambitious for a chapter, I will at least provide skeleton code to get you started.
    As shown in Listing [8-2](#A323804_3_En_8_Chapter.html#Par18), the skeleton code
    is stubbed out so that you can provide helper code (the `MyPrinterHelper.createPages()`
    method), which will do the math, so to speak, and return a list of nodes that
    will eventually get queued up for printing.


    ```

    Printer printer = Printer.getDefaultPrinter();

    PageLayout layout = printer.getDefaultPageLayout();

    double printWidth = layout.getPrintableWidth();

    double printHeight = layout.getPrintableHeight();

    PrinterJob job = PrinterJob.createPrinterJob(printer);

    // Assuming you have a Node that is larger than your printable area.

    TableView myLargeJFXNode = ... // large node spanning multiple pages.

    // Create a helper function to return a list of

    // nodes representing a page to be printed.

    List pages = MyPrinterHelper.createPages(myLargeJFXNode, printWidth, printHeight);

    pages.forEach(job::printPage);

    job.endJob();

    Listing 8-2.

    Skeleton Code Stubbed Out to Print a Node That Spans Multiple Pages

    ```


    In Listing [8-2](#A323804_3_En_8_Chapter.html#Par18), the code begins by obtaining
    layout information to determine the printable width and height. After obtaining
    the printable width and height, the code will call the `MyPrinterHelper.createPages()`
    method to return a list of nodes to print. The `createPages()` method is responsible
    for calculating how to divide the target node into a list of nodes that will fit
    the printable print layout. The code statement calling the method `MyPrinterHelper.createPages()`
    receives the following parameters: `targetNode`, `printWidth`, and `printHeight`.


    Once each page is prepared as a node, you can queue them up for printing. Depending
    on the kind of content to be printed, you will have to decide how you want to
    break sections into nodes to be queued up for printing. Since it depends on the
    kind of content to be printed, it is really up to you to decide how you want to
    design individual nodes. One example is to print a sheet of mailing labels based
    on a `ListView` node’s items (`getItems()`).


    If you feel that creating your own function to break apart content into printable
    nodes is too difficult, have no fear, JavaFX web engine is here. Later, you will
    see an example application that will load an HTML web page to be printed as multiple
    pages. Without jumping ahead, the `javafx.scene.web.WebEngine` node has a convenience
    method `print()` that will send a web page to the printer. What’s nice about the
    `WebEngine`’s print ability is that it can print without displaying the `WebView`
    node on the JavaFX Scene graph. This allows you to create a JavaFX application
    window (`Stage`) that can send HTML documents to the printer in the background.
    It is important to note that the JavaFX print APIs do not support a true headless
    print service as a background process without having to launch a JavaFX application
    window. In order to print using JavaFX print APIs, a JavaFX application thread
    must be running.


    Now that you have a taste for how simple JavaFX printing can be, next up you will
    take a look at JavaFX’s print APIs in more detail to programmatically configure
    printer attributes and print jobs.'
