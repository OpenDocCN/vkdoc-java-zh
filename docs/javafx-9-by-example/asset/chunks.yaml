- fmt: '### The `LeapListener` Class


    The `LeapListener` subclass will take care of tracking your hands, using the Leap
    Motion API, and for every frame it will return a list of valid bones, arms, and
    pair of joints. A `BooleanProperty` is used to mark the init and end of the hands
    processing, instead of having observable lists.


    In Listing [14-5](#A323804_3_En_14_Chapter.html#Par70), the main method `onFrame`
    is called every few milliseconds if a valid controller is available (i.e., when
    you have the Leap Motion controller plugged in to your computer). On every frame,
    the API provides a list of fingers, and for each `Finger`, a list of `Bones` of
    a certain type.


    Check the Leap tracking documentation for a detailed explanation of their API
    here: [`https://developer.leapmotion.com/documentation/java/devguide/Leap_Overview.html`](https://developer.leapmotion.com/documentation/java/devguide/Leap_Overview.html).


    `Pair` is an utility class that you use to track the joints and create a fake
    union between the metacarpophalangeal joints and the carpometacarpal joints, as
    show in Listing [14-6](#A323804_3_En_14_Chapter.html#Par71).


    ```

    /**

    * @author Jose Pereda

    */

    public class LeapListener extends Listener {

    private final BooleanProperty doneList= new SimpleBooleanProperty(false);

    private final List bones=new ArrayList();

    private final List arms=new ArrayList();

    private final List joints=new ArrayList();

    @Override

    public void onFrame(Controller controller) {

    Frame frame = controller.frame();

    doneList.set(false);

    bones.clear();

    arms.clear();

    joints.clear();

    if (!frame.hands().isEmpty()) {

    Screen screen = controller.locatedScreens().get(0);

    if (screen != null && screen.isValid()) {

    for (Finger finger : frame.fingers()) {

    if (finger.isValid()) {

    for (Type b : Type.values()) {

    if ((!finger.type().equals(Finger.Type.TYPE_RING) &&

    !finger.type().equals(Finger.Type.TYPE_MIDDLE)) ||

    !b.equals(Type.TYPE_METACARPAL)) {

    bones.add(finger.bone(b));

    }

    }

    }

    }

    for (Hand h : frame.hands()) {

    if (h.isValid()) {

    // arm

    arms.add(h.arm());

    FingerList fingers = h.fingers();

    Finger index = null, middle = null, ring = null, pinky = null;

    for (Finger f : fingers) {

    if (f.isFinger() && f.isValid()) {

    switch (f.type()) {

    case TYPE_INDEX: index = f; break;

    case TYPE_MIDDLE: middle = f; break;

    case TYPE_RING: ring = f; break;

    case TYPE_PINKY: pinky = f; break;

    }

    }

    }

    // joints

    if (index != null && middle != null) {

    Pair p = new Pair(index.bone(Type.TYPE_METACARPAL).nextJoint(),

    middle.bone(Type.TYPE_METACARPAL).nextJoint(),

    bones.get(0).width() / 2d);

    joints.add(p);

    }

    if (middle != null && ring != null) {

    Pair p = new Pair(middle.bone(Type.TYPE_METACARPAL).nextJoint(),

    ring.bone(Type.TYPE_METACARPAL).nextJoint(),

    bones.get(0).width() / 2d);

    joints.add(p);

    }

    if (ring != null && pinky != null) {

    Pair p = new Pair(ring.bone(Type.TYPE_METACARPAL).nextJoint(),

    pinky.bone(Type.TYPE_METACARPAL).nextJoint(),

    bones.get(0).width() / 2d);

    joints.add(p);

    }

    if (index != null && pinky != null) {

    Pair p = new Pair(index.bone(Type.TYPE_METACARPAL).prevJoint(),

    pinky.bone(Type.TYPE_METACARPAL).prevJoint(),

    bones.get(0).width() / 2d);

    joints.add(p);

    }

    }

    }

    }

    }

    doneList.set(!bones.isEmpty() || !arms.isEmpty());

    }

    public List getBones() {

    return bones.stream().collect(Collectors.toList());

    }

    public List getArms() {

    return arms.stream().collect(Collectors.toList());

    }

    public List getJoints() {

    return joints.stream().collect(Collectors.toList());

    }

    public BooleanProperty doneListProperty() {

    return doneList ;

    }

    }

    Listing 14-5.

    The LeapListener Class

    ```


    ```

    public class Pair {

    /*

    Creates a pair of joints (in terms of Vectors) to join the proximal end of two
    bones

    */

    private final Vector v0;

    private final Vector v1;

    private final double width;

    public Pair(Vector v0, Vector v1, double width){

    this.v0 = v0;

    this.v1 = v1;

    this.width = width;

    }

    public Vector getCenter(){

    return new Vector((v1.getX() + v0.getX()) / 2f,

    (v1.getY() + v0.getY()) / 2f,

    (v1.getZ() + v0.getZ()) / 2f);

    }

    public Vector getDirection(){

    return new Vector(v1.getX() - v0.getX(),

    v1.getY() - v0.getY(),

    v1.getZ() - v0.getZ()).normalized();

    }

    // getters

    }

    Listing 14-6.

    The Pair Class

    ```


    ### The 3D Model Classes


    The hand model will use JavaFX 3D `Cylinder` and `Sphere` controls to simulate
    its bones and joints. In order to render them in the proper location and orientation,
    you’ll need to transform the directions you get from the Leap vectors into the
    JavaFX coordinate system. For that, you use the `Utils` class, shown in Listing
    [14-7](#A323804_3_En_14_Chapter.html#Par73).


    ```

    public class Utils {

    public static List getTransforms(Vector dir, Vector pos, double yOffset) {

    final double ang = Math.acos(dir.getY() / dir.magnitude());

    return Arrays.asList(

    new Translate(pos.getX(), -pos.getY() + yOffset, -pos.getZ()),

    new Rotate(- Math.toDegrees(ang), 0, -yOffset, 0,

    new Point3D(-dir.getZ(), 0, -dir.getX())));

    }

    }

    Listing 14-7.

    The Utils Class

    ```


    `getTransforms` returns a list of transforms based on a direction and a position.
    It takes as input the vectors from the Leap Motion coordinate system and transforms
    them into a translation and a rotation over the JavaFX coordinate system.


    A vertical cylinder is taken as a reference for the transformations, located at
    the given position. The translation is given by the item position in the JavaFX
    system `(pos.getX(), -pos.getY(), -pos.getZ())`. The pivot point for the rotation
    is given by the cross product of the item direction in the JavaFX system `(dir.getX(),
    -dir.getY(),-dir.getZ())` and the cylinder direction `(0, -1, 0)` in the same
    system. The angle of rotation is given by the angle between both referred vectors.
    An offset can be applied if required, from the center of the cylinder.


    Listings [14-8](#A323804_3_En_14_Chapter.html#Par77), [14-9](#A323804_3_En_14_Chapter.html#Par78),
    and [14-10](#A323804_3_En_14_Chapter.html#Par79) show the 3D model for phalanx,
    joints, and forearm.


    ```

    public class Phalanx {

    private final Bone bone;

    private final Cylinder phalanx;

    private final Sphere joint;

    private final Sphere carpoMetaCarpalJoint ;

    public Phalanx(Bone bone) {

    this.bone = bone;

    PhongMaterial materialPhalanx = new PhongMaterial();

    materialPhalanx.setSpecularColor(Color.rgb(50, 50, 50));

    PhongMaterial materialJoint = new PhongMaterial(Color.BLUE);

    materialJoint.setSpecularColor(Color.rgb(50, 50, 50));

    phalanx = new Cylinder(0.8 * bone.width() / 2d, bone.length());

    phalanx.setMaterial(materialPhalanx);

    phalanx.getTransforms().addAll(

    Utils.getTransforms(bone.direction(), bone.center(), 0));

    joint = new Sphere(bone.width() / 2d);

    joint.setMaterial(materialJoint);

    joint.getTransforms().addAll(

    Utils.getTransforms(bone.direction(), bone.center(), bone.length() / 2d));

    carpoMetaCarpalJoint = new Sphere(bone.width() / 2d);

    carpoMetaCarpalJoint.setMaterial(materialJoint);

    carpoMetaCarpalJoint.getTransforms().addAll(

    Utils.getTransforms(bone.direction(), bone.center(), - bone.length() / 2d));

    }

    public Group getPhalanx() {

    if (bone.type().equals(Type.TYPE_METACARPAL)) {

    return new Group(phalanx, carpoMetaCarpalJoint);

    } else if (bone.type().equals(Type.TYPE_PROXIMAL)) {

    return new Group(phalanx, joint, carpoMetaCarpalJoint);

    }

    return new Group(phalanx, joint);

    }

    }

    Listing 14-8.

    The Phalanx Class

    ```


    ```

    public class Joint{

    private final Cylinder cylinder;

    public Joint(Pair pair) {

    PhongMaterial material = new PhongMaterial();

    material.setSpecularColor(Color.rgb(30, 30, 30));

    cylinder = new Cylinder(pair.getWidth() / 2d, pair.getV0().distanceTo(pair.getV1()));

    cylinder.setMaterial(material);

    cylinder.getTransforms().addAll(

    Utils.getTransforms(pair.getDirection(), pair.getCenter(), 0));

    }

    public Shape3D getJoint() {

    return cylinder ;

    }

    }

    Listing 14-9.

    The Joint Class

    ```'
