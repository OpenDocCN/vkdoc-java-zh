    /* -- Step 2 --\n* Up call to Java invoking the\n* WeatherWidget.queryWeatherByLocationAndUnit()\
    \ method.\n*/\nfunction findWeatherByLocation() {\nvar cityInfo = encodeURIComponent(document.getElementById('search-field').value);\n\
    setInnerText(\"error-msg\", \"\");\nWeatherWidget.queryWeatherByLocationAndUnit(cityInfo,\
    \ \"c\");\n}\n/* -- Step 5 --\n* Populate UI with weather data.\n* This function\
    \ is called from Java code.\n*/\nfunction populateWeatherData(json, unitType)\
    \ {\nvar jsonWeather = json;\nif (jsonWeather.cod) {\nif (jsonWeather.cod != 200\
    \ ) {\ndocument.getElementById('error-msg').innerHTML = jsonWeather.message;\n\
    alert(jsonWeather.message);\nreturn;\n}\n}\nsetInnerText('city', jsonWeather.name);\n\
    setInnerText('country', jsonWeather.sys.country);\nvar weatherTime = new Date(jsonWeather.dt\
    \ * 1000);\nvar timeStr = timeFormat(jsonWeather.dt * 1000);\nsetInnerText('weather-day-time',\
    \ weekday[weatherTime.getDay()] + \" \" + timeStr) + \" (Last Update)\";\nsetInnerText('weather-current',\
    \ jsonWeather.weather[0].main);\nsetInnerText('weather-current-desc', jsonWeather.weather[0].description);\n\
    document.getElementById('weather-icon').src = \"http://openweathermap.org/img/w/\"\
    \ + jsonWeather.weather[0].icon + \".png\";\nsetInnerText('weather-temp', jsonWeather.main.temp);\n\
    setInnerText('weather-humidity', \"Humidity: \" + jsonWeather.main.humidity +\
    \ \"%\");\nvar windSpeed = (unitType === 'f') ? 'mph' : 'km/h';\nsetInnerText('weather-wind-speed',\
    \ \"Wind: \" + jsonWeather.wind.speed + \" \" +windSpeed);\n}\nfunction setInnerText(id,\
    \ text) {\ndocument.getElementById(id).innerText = text;\n}\nfunction timeFormat(\
    \ millis ) {\nvar weatherTime = new Date(millis);\nvar hours = weatherTime.getHours();\n\
    var minutes = weatherTime.getMinutes();\nvar meridian = hours >= 12 ? 'PM' : 'AM';\n\
    hours = hours % 12;\nhours = hours ? hours : 12; // hour '0' means '12'\nminutes\
    \ = minutes\n\n&deg;C\n\nListing 10-24.\nAn HTML Template File Populated with\
    \ Weather Data\n```\n\n### How It Works\n\nThe code is divided into two parts—the\
    \ Java code shown in Listing [10-23](#A323804_3_En_10_Chapter.html#Par221) and\
    \ HTML/JavaScript code shown in Listing [10-24](#A323804_3_En_10_Chapter.html#Par223).\
    \ The purpose of this example is to demonstrate the bidirectional communication\
    \ between Java and JavaScript while providing RESTful HTTP `GET` requests of JSON\
    \ data. Because all of its aspects have already been discussed, from retrieving\
    \ data to manipulating HTML, I will basically discuss the high-level steps of\
    \ the `start()` method of the JavaFX `WeatherWidget` code from Listing [10-23](#A323804_3_En_10_Chapter.html#Par221).\n\
    \nThe following code steps were taken within the `start()` method from the source\
    \ code in Listing 20-23.\n\n1.  Set up the scene and stage window with a `WebView`\
    \ as the root.  \n2.  Read the API key file. If the API key doesn’t exist, show\
    \ the prompt dialog window.  \n3.  Create a `WebView` node to display HTML content.\n\
    \    1.  Create handler code that responds when the `WebView`’s content is finished\
    \ loading. The page `weather_template.html` is only loaded once as a single page\
    \ application.  \n    2.  Once loaded, the code passes the application instance\
    \ (`this`) into the web engine to allow up calls from JavaScript code. To allow\
    \ JavaScript code to access Java objects, the code invokes the `setMember()` method\
    \ by passing in the `name` and object, as shown:\n\n```\n        // Let JavaScript\
    \ make upcalls to this (Java) class\n        JSObject jsobj = (JSObject) webView.getEngine().executeScript(\"\
    window\");\n        jsobj.setMember(\"WeatherWidget\", this);\n        ```\n\n\
    3.  Default to the weather forecast of Miami, Florida, by fetching JSON weather\
    \ data to be populated into the HTML page. The lowercase “c” is for the unit type,\
    \ degrees Celsius. By calling the following Java method, it will fetch JSON data\
    \ and call into JavaScript code to populate the HTML DOM with the weather data.\n\
    \n```\n        queryWeatherByLocationAndUnit(\"Miami%20FL,US\", \"c\");\n    \
    \    ```\n\n4.  Create handler code for the `OnAlert` property on the `WebView`’s\
    \ web engine. The handler code responds to HTML’s JavaScript `alert()` function\
    \ for `WebEvent`. If there are errors returned from the web server, the web event\
    \ data will be passed to my private `showErrorDialog()` method. This method will\
    \ display a dialog window with the error message.\n\n```\n    webView.getEngine().setOnAlert(\
    \ (WebEvent t) -> {\n    System.out.println(\"Alert Event - Message: \" + t.getData());\n\
    \    showErrorDialog(t.getData());\n    });\n    ```\n\n5.  Load the HTML file\
    \ `weather_template.html` from the classpath to be displayed onto the `WebView`.\n\
    \n```\n    // Load HTML template to display weather\n    webView.getEngine()\n\
    \    .load(getClass().getResource(WEATHER_DISPLAY_TEMPLATE_FILE)\n    .toExternalForm());\n\
    \    ```\n\nIn Listing [10-23](#A323804_3_En_10_Chapter.html#Par221), you’ll notice\
    \ the comment section regarding Steps 1 through 5; these show the application\
    \ flow starting from the user searching for weather based on a city, state, and\
    \ country, to displaying the data in the HTML page. The following are the steps\
    \ from 1 to 5:\n\n*   Step 1: The button click invokes the JavaScript function\
    \ `findWeatherByLocation()`:\n*   Step 2: The upcall to the actual Java code method\
    \ `queryWeatherByLocationAndUnit()`:\n\n```\n    function findWeatherByLocation()\
    \ {...}\n    ```\n\n*   Step 3: The Java method that uses the new `http2` module\
    \ to make an asynchronous RESTful `GET` to fetch weather data:\n\n```\n    public\
    \ void queryWeatherByLocationAndUnit(String cityRegion, String unitType)\n   \
    \ ```\n\n*   Step 4: After the JSON data is fetched (on the Java side), a call\
    \ to the `executeScript()` method passes the JSON object into the JavaScript function\
    \ `populateWeatherData()`:\n\n```\n    private void populateWeatherData(String\
    \ json, String unitType) {\n    Platform.runLater(() -> {\n    // On the JavaFX\
    \ Application Thread....\n    webView.getEngine()\n    .executeScript(\"populateWeatherData(eval(\"\
    \ + json + \"), \" +\n    \"'\" + unitType + \"' );\");\n    });\n    }\n    ```\n\
    \n*   Step 5: The HTML page is populated with the JSON data representing the weather:\n\
    \n```\n    function populateWeatherData(json, unitType) {...}\n    ```\n\n###\
    \ Enhancements\n\nAs an exercise, you may want the Weather Widget application\
    \ to fetch new weather data periodically. According to the Open Weather Map, their\
    \ weather forecast updates are typically every three hours.\n\nAs a hint on how\
    \ might you might call the `setInterval()` function, check out this code snippet:\n\
    \n```\n// Every period query and populate the forecast using cached URL\nsetInterval(function(){\n\
    WeatherWidget.queryWeatherByLocationAndUnit(null, \"c\");\n},\n(1000 * 60 * 60\
    \ * 3) // every 3 hours\n); // set interval\n```"
  trans: "\n最后，清单 10-24 包含文件资源 `weather_template.html` 中的 HTML 和 JavaScript 代码。该文件被加载到\
    \ JavaFX WebView 节点中。\n\n```\n\nWeather Widget\n\nbody { background-color:#ffffff;\
