    ### 工作原理


    在开始之前，我想描述一下本书这一版本与上一版相比所做的一些改动。我基本上（再次）重构了上一版书籍中与媒体相关的源代码。由于这次重构，我会频繁提及私有作用域的方法。这些私有方法用于将代码分解成更易于管理的部分，以便您能更好地专注于媒体播放器应用程序的每个功能。


    假设您已经构建并运行了清单 9-1 中的代码，您将首先拖放一个音频文件到示例 MP3 播放器中，就像您在第 7 章的照片查看器应用程序中所做的那样，在那里您学习了如何使用拖放桌面隐喻将文件加载到
    JavaFX 应用程序中。不过，这次加载的是音频文件，而不是图像文件。要加载音频文件，JavaFX 目前支持以下文件格式：`.mp3`、`.wav`、`.aiff`
    和 `.m3u8`。要查看支持的编码类型，请参考 `javafx.scene.media` 包摘要的 Javadocs 文档。


    回顾图 9-2，您可能会注意到按钮面板控件的外观和感觉与第 7 章图 7-1 中的照片查看器应用程序相似。在此示例中，我修改了按钮控件，使其看起来像按钮，类似于许多媒体播放器应用程序。


    作为额外功能，MP3 播放器将显示为一个不规则形状的半透明窗口，没有标题栏或边框。应用程序窗口也可以使用鼠标在桌面上拖动。现在您已经知道如何操作音乐播放器，让我们来浏览一下代码。


    #### 音频播放器应用程序的实例变量


    首先，代码在类的顶部包含了实例变量，这些变量将在应用程序的整个生命周期内维护状态信息。表 9-2 描述了 MP3 音频播放器应用程序中使用的所有实例变量。


    表 9-2.


    MP3 播放器应用程序实例变量


    | 变量 | 数据类型 | 示例 | 描述 |

    | --- | --- | --- | --- |

    | `mediaPlayer` | `MediaPlayer` | - | 一个播放音频和视频的媒体播放器引用。 |

    | `anchorPt` | `Point2D` | (100,100) | 用户开始拖动舞台窗口时的屏幕坐标。 |

    | `previousLocation` | `Point2D` | (0, 0) | 舞台先前坐标的左上角；辅助拖动舞台窗口。 |

    | `progressListener` | `ChangeListener<Duration>` | 5 (秒) | 绑定到媒体播放器的 `currentTimeProperty()`
    方法。更新 UI 滑块控件。 |

    | `playAndPauseToggle` | `BooleanProperty` | true | 一个布尔属性，带有一个更改监听器，用于暂停和播放音频文件。当显示暂停按钮时，该属性为
    true；否则为 false。 |

    | `mouseEventConsumer` | `EventHandler<MouseEvent>` | - | 事件过滤器，用于阻止鼠标事件发送到父节点。
    |


    在表 9-2 中，第一个变量是对媒体播放器 (`MediaPlayer`) 对象的引用，该对象将与包含音频文件的 `Media` 对象一起创建。接下来，您可以看到两个名为
    `anchorPt` 和 `previousLocation` 的变量。当用户在屏幕上拖动应用程序窗口时，这些变量用于维护舞台窗口在桌面上的位置。


    `anchorPt` 变量用于在用户开始拖动窗口时保存鼠标按下的起始坐标。在鼠标拖动操作期间计算应用程序窗口的左上边界时，`previousLocation`
    变量将包含上一个窗口的屏幕 x 和 y 坐标。


    在描述了跟踪窗口位置的变量之后，您将看到 `progressListener` 变量。这里的 `progressListener` 负责在播放音频文件时调整滑块指示器（拇指）。


    变量 `playAndPauseToggle` 负责确定用户何时点击了暂停和播放按钮控件。正如您稍后将看到的，该属性将附加一个更改监听器，用于在 `StackPane`
    内显示和隐藏播放和暂停按钮（参见 `updatePlayAndPauseButtons()`）。


    最后，变量 `mouseEventConsumer` 是一个事件过滤器，应用于按钮面板和关闭按钮。事件过滤器将阻止鼠标事件传播到父节点 (`AnchorPane`)。在这种情况下，父节点是场景图的根节点。这可以防止当鼠标光标点击按钮面板和关闭按钮时拖动窗口。


    虽然应用程序本可以有更多的状态变量来引用场景图上的节点等对象，但实际上您可以通过 ID 来查找它们。这当然假设 JavaFX 节点的唯一 ID 是使用 `setId()`
    方法设置的。例如，如果场景图包含一个 ID 为 `stop-button` 的节点 (`node.setId("stop-button")`)，您可以稍后调用
    `scene.lookup("#stop-button")` 方法从场景图中检索停止按钮节点。请记住在 ID 前加上 `#` 符号。

