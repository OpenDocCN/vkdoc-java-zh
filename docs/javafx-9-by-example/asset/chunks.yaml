    #### 代码演练


    执行清单 5-4 后，您将看到图 5-7 中的输出，该图展示了一个简单的表单应用程序，允许用户输入名字和姓氏作为联系信息。调整窗口大小时，请注意输入文本字段控件会根据列约束而增长或缩小。此外，您还会注意到“保存”按钮在水平方向上右对齐（`HPos.RIGHT`），正好位于“姓氏”文本字段下方。


    ![A323804_3_En_5_Fig7_HTML.jpg](img/A323804_3_En_5_Fig7_HTML.jpg)


    图 5-7.


    GridPaneForm.java 文件的输出


    清单 5-4 首先创建一个 `BorderPane` 对象实例作为场景的根节点。通过使用 `BorderPane` 作为根节点，然后将 `GridPane`
    节点对象放置到中心区域，父节点（`BorderPane`）能够将所有的水平和垂直空间分配给 `GridPane`，从而调整其大小。创建 `BorderPane`
    实例作为根节点后，代码实例化了一个带有内边距以及水平和垂直间距的 `GridPane` 布局。然后，清单 5-5 创建了一个 `GridPane` 布局，其内边距、水平间距和垂直间距均设置为
    `5`（像素）。


    ```

    GridPane gridpane = new GridPane();

    gridpane.setPadding(new Insets(5));

    gridpane.setHgap(5); gridpane.setVgap(5);

    清单 5-5.

    为每个单元格设置 UI 控件之间的内边距、水平间距和垂直间距

    ```


    在进一步讲解之前，我想指出 `GridPane` 对象上一个名为 `setGridLinesVisible()` 的便捷方法。这允许您调试网格布局的单元格约束。调用
    `setGridLinesVisible(true)` 方法后，网格线将出现在其单元格和间距周围。


    提示


    在图 5-8 中，网格窗格的网格线 `visible` 属性设置为 `true`，可以帮助您调试单元格约束。要打开网格线，请在网格窗格实例上调用 `setGridLinesVisible()`
    方法。


    ![A323804_3_En_5_Fig8_HTML.jpg](img/A323804_3_En_5_Fig8_HTML.jpg)


    图 5-8.


    网格窗格的网格线可见属性设置为 true。该可见属性通常用于调试目的。要打开网格线，请调用 setGridLinesVisible(true) 方法。


    图 5-8 显示了网格线可见的网格窗格。


    继续清单 5-4 中的代码演练，代码为第一列和第二列实现了列约束。要设置列的约束，请使用 `ColumnConstraints` 构造函数，它允许开发者为
    `GridPane` 节点上的列指定最小宽度、首选宽度和最大宽度。这非常棒；这意味着当父容器节点（`BorderPane`）调整大小时，`GridPane`
    将根据其行或列约束使其子节点在水平方向上增长或缩小。清单 5-6 演示了将第一列约束为 100 像素宽（用于只读标签），并将第二列的最小宽度设置为 50、首选宽度为
    150、最大宽度为 300 的能力。


    ```

    ColumnConstraints column1 = new ColumnConstraints(100); // 固定用于标签

    ColumnConstraints column2 = new ColumnConstraints(50, 150, 300); // 最小,首选,最大

    column2.setHgrow(Priority.ALWAYS);

    gridpane.getColumnConstraints().addAll(column1, column2);

    清单 5-6.

    为 JavaFX 应用程序设置列约束

    ```


    为第二列创建列约束后，代码通过传入枚举值 `Priority.ALWAYS` 调用了 `setHgrow()` 方法，这允许 UI 控件在窗口变宽时占据单元格内可用的水平空间。我将第二列的最大宽度设置为
    300，以便您可以看到子 `TextField` 不会增长超过最大宽度（`300`）。换句话说，当窗口调整到超过 300 像素宽时，网格窗格列中的文本字段将停止拉伸。


    下一步是将每个 UI 控件放置到其各自的单元格位置。所有单元格都相对于零；要将节点放置在第一列第一行的单元格中，您需要指定单元格为 (0, 0)。因此，以下代码片段将“保存”按钮添加到
    `GridPane` 布局的第二列第三行，即单元格 (1, 2)：


    ```

    gridpane.add(saveButton, 1, 2);

    ```


    该布局还允许您在单元格内水平或垂直对齐控件。以下语句将“保存”按钮右对齐：


    ```

    GridPane.setHalignment(saveButton, HPos.RIGHT);

    ```


    完成 `GridPane` 设置后，代码实现了前面图 5-7 中所示的输入表单顶部横幅区域。为了创建标题横幅，我使用了一个背景颜色为浅蓝色的流式布局、一个
    SVG 节点图标（显示为人物）和一个包含文本“Contacts”的文本节点。我从 JavaScript 库 RaphaelJS 的创始人兼作者 Dmitry
    Baranovskiy 那里获得了基于 SVG 的图标。托管原始 SVG 图标的网站已不再活跃。该图标采用 SVG 表示法（矢量绘图命令）的字符串形式。我只需通过调用
    `setContent()` 方法将 SVG 字符串传递给一个 `javafx.scene.shape.SVGPath` 实例。以下代码片段展示了如何创建一个
    `SVGPath` 节点实例。


    ```

    SVGPath svgIcon = new SVGPath();

    svgIcon.setContent("M21.066,...");

    ```


    与显示横幅的 `FlowPane` 布局相关的重要代码包含首选高度和 JavaFX CSS 样式的设置。因为横幅（`FlowPane`）被放置在 `BorderPane`
    布局的顶部区域，所以 `40` 像素的首选高度将被保留，并且宽度将随着窗口调整大小（变宽）而占据可用的水平空间。


    了解到 `FlowPane` 会占据可用的水平空间后，您会注意到该区域被浅蓝色背景填充。通过使用 JavaFX CSS 样式，代码设置了一种浅蓝色，以及使用字符串（backgroundStyle）指定的圆角半径和内边距。清单
    5-7 是设置放置在 `BorderPane` 布局顶部区域的横幅（`FlowPane`）样式的代码部分。如果 JavaFX CSS 样式现在看起来不太明白，请不要担心；关于自定义
    UI 的更详细讨论将在第 15 章中进行。


    ```

    FlowPane topBanner = new FlowPane();

    topBanner.setPrefHeight(40);

    String backgroundStyle = "-fx-background-color: lightblue;"

    + "-fx-background-radius: 30%;"

    + "-fx-background-inset: 5px;";

    topBanner.setStyle(backgroundStyle);

    清单 5-7.

    占据顶部横幅区域且背景为浅蓝色的 FlowPane 布局的样式代码

    ```


    我们仅仅触及了 `GridPane` 布局的皮毛。还有其他方法可以提供子节点的约束和对齐，因此我相信您会深入研究 `GridPane` 布局的 API。更多详细信息请参阅
    Javadocs 文档。接下来，您将学习如何使用名为 Scene Builder 的图形编辑器创建 UI。

