    ## 场景构建器


    到目前为止，你已经学会了如何以编程方式编写和设计 UI 元素的样式。你可能在想，是否有更好的方法来构建用户界面。我很高兴地告诉你，Oracle 的 JavaFX
    团队开发了一个名为 **Scene Builder** 的免费工具，它允许你以图形化方式构建 UI，这类工具通常被称为所见即所得编辑器。（WYSIWYG 代表“所见即所得”。）一段时间后，Oracle
    宣布他们将不再提供 Scene Builder 工具的可下载二进制文件。


    由于 Scene Builder 工具已开源，构建和托管可下载二进制文件的任务随后立即由 GluonHQ 公司接手（参见 [`http://gluonhq.com/`](http://gluonhq.com/)
    ）。通过这一举措以及其他许多大胆的行动，GluonHQ 凭借其他产品和服务不断前进，为 Java 开发者赋能。GluonHQ 的主要产品是提供一个 UI 和云开发平台，使公司能够使用单一代码库（Java）开发应用，并能够部署到移动端、桌面端和嵌入式设备等多个平台。典型的平台包括
    iOS、Android、Windows、MacOS X 和 Raspbian（树莓派）。


    在本节中，你将学习如何构建一个简单的 UI，并在 JavaFX 应用程序中使用序列化的 UI 格式化文件（FXML）。首先，前往 GluonHQ（ [`http://gluonhq.com`](http://gluonhq.com)
    ）在以下位置下载 Scene Builder 工具：


    [`http://gluonhq.com/open-source/scene-builder/`](http://gluonhq.com/open-source/scene-builder/)


    ### 下载并安装 Scene Builder


    在撰写本书时，尚不存在适用于 JDK 9 的 Scene Builder 工具版本。但是，你可以简单地将你的 `JAVA_HOME` 环境变量指向最新的 Java
    8 SDK，以运行已下载的 Scene Builder 8 版本。可能当你读到此处时，已经有一个适用于 Java 9 的版本了。假设你已经为你的操作系统下载了
    Scene Builder 工具，要启动该工具，我建议下载 JAR 版本并使用命令提示符启动它。在我看来，使用命令提示符更好，因为它会将任何错误和异常信息输出到控制台，从而帮助你进行调试。以下命令将从命令行启动
    Scene Builder 工具。


    ```

    $ java -jar SceneBuilder-8.0.0.jar

    ```


    ### 启动 Scene Builder


    下载并安装 Scene Builder 后，你可以启动它。图 5-9 展示了 Scene Builder 工具。


    ![A323804_3_En_5_Fig9_HTML.jpg](img/A323804_3_En_5_Fig9_HTML.jpg)


    图 5-9.


    首次启动 Scene Builder 工具


    我首先从左侧开始描述各个选项卡及其子部分。在名为 **Library** 的主选项卡下，注意搜索栏。还有名为 **Containers**、**Controls**、**Menu**、**Miscellaneous**、**Shapes**、**Charts**
    和 **3D** 的子部分。这些子部分包含各种类型的 JavaFX 节点，可以拖放到中央画布区域（将库项目拖放到此处……）。当然，第一个 JavaFX 节点必须是布局容器类型的节点，这样才能将控件等子类型节点拖放到容器类型的节点上。


    在左侧 UI 元素下方是 **Document** 部分。Document 部分有两个子部分，名为 **Hierarchy** 和 **Controller**。**Hierarchy**
    面板允许你以树状层次结构查看 UI 元素的 DOM（文档对象模型）。最后，在 Hierarchy 下方是 **Controller** 选项卡。**Controller**
    部分允许你将控制逻辑（Controller Java 类）引用到此 UI 视图（FXML）。被引用的 Controller 类将允许处理程序代码与之前拖放到画布区域的
    UI 元素进行交互。例如，点击一个“保存”按钮会调用关联 Controller 类上的一个方法。稍后，你将创建一个 Controller 类，并在 FXML
    文件中引用它。


    在 Scene Builder 的右侧是 **Inspector** 搜索栏，如图 5-9 所示。该搜索栏允许你非常轻松地查找 UI 元素的属性。在 Inspector
    搜索栏下方，你会看到三个子部分——**Properties**、**Layout** 和 **Code**。**Properties** 面板部分允许你使用
    JavaFX CSS 属性来设计 UI 元素的样式。在第 15 章中，你将了解更多关于 CSS 样式的内容，但现在你不会在工具中对 UI 元素使用 JavaFX
    CSS 样式。**Layout** 面板允许你指定节点属性的尺寸、变换和内边距。最后是 **Code** 面板，它允许你将事件方法映射到 UI 元素，例如
    `OnMousePressed` 属性。


    现在你已经了解了 Scene Builder 的功能，让我们来构建一个用户界面（UI）。但在构建 UI 之前，你需要明确想要构建什么样的 UI。为了简单起见，你将构建之前你在
    `GridLayout` 部分创建的熟悉的联系人表单。你将使用 Scene Builder 工具来开发 UI，而不是以编程方式编写代码。按照以下步骤以图形化方式构建你的表单。


    1.  将一个 `BorderPane` 容器拖放到右侧的画布上。图 5-10 展示了将 `BorderPane` 容器拖放到画布区域的过程。


    ![A323804_3_En_5_Fig10_HTML.jpg](img/A323804_3_En_5_Fig10_HTML.jpg)


    图 5-10.


    将 BorderPane 拖放到显示“将库项目拖放到此处……”的画布区域。将 `BorderPane` 容器拖放到画布表面后，你应该会在左下角的 Document
    选项卡下的 Hierarchy 部分看到显示 BorderPane 的区域——`TOP`、`LEFT`、`CENTER`、`RIGHT` 和 `BOTTOM`。图
    5-11 展示了画布区域当前 UI 元素的文档层次结构（DOM）。你也可以将 UI 元素拖放到文档层次结构窗口中。有时将 UI 元素拖放到层次结构中更容易，有时则拖放到画布区域更容易。这完全取决于当存在嵌套容器时，画布上的区域有多小。


    ![A323804_3_En_5_Fig11_HTML.jpg](img/A323804_3_En_5_Fig11_HTML.jpg)


    图 5-11.

    '
- fmt: '# Document’s hierarchy displaying the `BorderPane`’s regions


    2. Drag a `GridPane` container into the `BorderPane`’s center region, as shown
    in Figure [5-12](#A323804_3_En_5_Chapter.html#Fig12). Figure [5-13](#A323804_3_En_5_Chapter.html#Fig13)
    shows the `GridPane` node after the drag-and-drop operation onto the `BorderPane`
    node’s center region. Notice the numbered columns and rows as zero relative cells
    allowing you to drag elements into them. Since the `BorderPane`’s center area
    takes up all the available width and height, when placing a `GridPane` onto the
    center region, the width and height of the `GridPane` will stretch.


    ![A323804_3_En_5_Fig13_HTML.jpg](A323804_3_En_5_Fig13_HTML.jpg)


    Figure 5-13. A `GridPane` positioned on the center region of a `BorderPane`


    ![A323804_3_En_5_Fig12_HTML.jpg](A323804_3_En_5_Fig12_HTML.jpg)


    Figure 5-12. Dragging a `GridPane` node onto the center region of the `BorderPane`
    node


    3. Before configuring the `GridPane`, you will want to reconfigure the `BorderPane`’s
    Preferred and maximum width to allow the `GridPane` to take up the available horizontal
    space. Select the `BorderPane` node by selecting it within the Hierarchy tab on
    the lower-left side beside the canvas area. Next, on the right side of the canvas
    area is the Layout tab (under Properties), you will be changing the Pref and Max
    Width properties of the `BorderPane`. Shown in Figure [5-14](#A323804_3_En_5_Chapter.html#Fig14)
    are the preferred and maximum widths settings for the `BorderPane` node. Make
    sure the preferred width is `USE_COMPUTED_SIZE` and the maximum width is set to
    `MAX_VALUE`. This allows the `GridPane` node and its child nodes the opportunity
    to grow horizontally (stretch) when the JavaFX Stage window is being resized.


    ![A323804_3_En_5_Fig14_HTML.jpg](A323804_3_En_5_Fig14_HTML.jpg)


    Figure 5-14. The `BorderPane`’s Pref Width and Max Width properties settings allow
    the `GridPane` to stretch horizontally


    4. Set the `GridPane` layout’s horizontal and vertical gap to five pixels and
    set the padding to five pixels. The padding and gap settings are on the right
    side of the canvas area, under the Layout tab section (see Figure [5-15](#A323804_3_En_5_Chapter.html#Fig15)).
    Next, you will configure the constraints for the first and second columns of the
    `GridPane` node. If you remember, the first column will contain labels and the
    second column will contain text fields for our form.


    ![A323804_3_En_5_Fig15_HTML.jpg](A323804_3_En_5_Fig15_HTML.jpg)


    Figure 5-15. A `GridPane` layout’s properties configured with five pixels for
    padding, `Hgap`, and `Vgap`


    5. Configure the `GridPane`’s column constraints. To configure a column constraint,
    you will first select the column header zero (0) shown in Figure [5-16](#A323804_3_En_5_Chapter.html#Fig16).
    You then configure the width under the `Layout: ColumnConstraints` property sheet.
    For the min and max widths, use the `USE_PREF_SIZE` option in the dropdown. In
    the pref width, enter 100. This means the column will not stretch because its
    minimum and maximum width will be set to the preferred width.


    ![A323804_3_En_5_Fig16_HTML.jpg](A323804_3_En_5_Fig16_HTML.jpg)


    Figure 5-16. Setting the `GridPane`’s first column (zero relative) constraint
    to a preferred width of 100


    6. Configure the second `GridPane`’s column constraints. To configure a column
    constraint, you select the column header one (1) shown in Figure [5-17](#A323804_3_En_5_Chapter.html#Fig17).
    After selection, you configure the width under the `Layout: ColumnConstraints`
    property sheet.


    ![A323804_3_En_5_Fig17_HTML.jpg](A323804_3_En_5_Fig17_HTML.jpg)


    Figure 5-17. The `GridPane`’s second column’s constraint being configured


    Set the min, pref, and max width to 50, 150, and 300, respectively. You should
    also set the `Hgrow` property to always.


    7. Configure the row constraints of the `GridPane`. Similar to selecting a column
    header, you will select a row header zero (left), as shown in Figure [5-18](#A323804_3_En_5_Chapter.html#Fig18).
    Instead of selecting one row, hold down the Shift key and mouse click the row
    headers 0, 1, and 2, as shown in Figure [5-18](#A323804_3_En_5_Chapter.html#Fig18).
    The objective is to set all three row constraints in one shot. You will be setting
    the three rows with a preferred height that will honor the UI element placed into
    it. For instance, when a label is placed into the row cell, the height of the
    label will be used as the height of the cell row. Select `USE_PREF_SIZE` for both
    min and max height properties. Enter 30 for the preferred height property.


    ![A323804_3_En_5_Fig18_HTML.jpg](A323804_3_En_5_Fig18_HTML.jpg)


    Figure 5-18. Setting the three rows of the `GridPane`’s row height constraints.
    The min and max height properties are set to `USE_PREF_SIZE`. The pref height
    property is set to 30.


    8. Create the first name label in the cell occupying the first column and first
    row. Drag a label from the Controls section under Library into the first column
    and the first row cell of the grid pane. This label will be the First Name. Figure
    [5-19](#A323804_3_En_5_Chapter.html#Fig19) shows the text property set to First
    Name in the Properties tab subsection.


    ![A323804_3_En_5_Fig19_HTML.jpg](A323804_3_En_5_Fig19_HTML.jpg)


    Figure 5-19. The first name label being added to the first column and first row
    cell. You’ll notice under the Properties tab you will enter the text for the label.


    9. Set the label’s horizontal alignment (`Halignment`) to be right-aligned. In
    Figure [5-20](#A323804_3_En_5_Chapter.html#Fig20), the label’s horizontal alignment
    is set by going to the Property sheet under the Layout tab subsection.


    ![A323804_3_En_5_Fig20_HTML.jpg](A323804_3_En_5_Fig20_HTML.jpg)


    Figure 5-20. Setting a label in a `GridPane` cell’s horizontal alignment to be
    right-aligned. Under the `Layout: Label (Grid Pane Constraints)`, the `Halignment`
    is set to `RIGHT`.


    10. Repeat Steps 8-9 to set up the Last Name label for the second row, first column.
    In the menu options, select Preview ➤ Show Preview in Window. Figure [5-21](#A323804_3_En_5_Chapter.html#Fig21)
    shows the current UI elements previewed in a window.


    ![A323804_3_En_5_Fig21_HTML.jpg](A323804_3_En_5_Fig21_HTML.jpg)


    Figure 5-21. A preview window showing the progress thus far—two labels, right
    horizontally aligned on the first column


    11. Drag and drop the text field UI elements into the cell 1,0 and cell 1,1, which
    represent the first name and last name text fields, respectively. You’ll also
    be dragging a JavaFX `Button` node to the second column, third row cell. When
    you preview your work, the UI should look like Figure [5-22](#A323804_3_En_5_Chapter.html#Fig22).


    ![A323804_3_En_5_Fig22_HTML.jpg](A323804_3_En_5_Fig22_HTML.jpg)


    Figure 5-22.'
