    you had to calculate all these values every time the size of the control changed.
    So all these calculations will be done automatically by JavaFX. That reduces the
    resizing code a lot, as you will see.


    #### Resizing the LED Control


    In JavaFX, the size of the layout container determines the size of its children,
    so you have to ensure that your control is resized by its layout container. That
    means if you put your LED control in a `StackPane` (which resizes its children
    relative to its own size), the LED will be sized the same as the `StackPane`.
    Therefore, you must hook up listeners to the `widthProperty()` and `heightProperty()`
    of the control in the `registerListeners()` method.


    ```

    private void registerListeners() {

    widthProperty().addListener(observable -> resize());

    heightProperty().addListener(observable -> resize());

    frameVisibleProperty().addListener(observable ->

    frame.setOpacity(isFrameVisible() ? 1 : 0));

    onProperty().addListener(observable -> led.setEffect(isOn() ? glow : innerShadow));

    ledColorProperty().addListener(observable -> {

    led.setStyle("-led-color: " + (getLedColor()).toString().replace("0x", "#") +
    ";");

    resize();

    });

    }

    ```


    This method hooks up listeners to all properties that might have an effect on
    either visualization or size of the LED control. When the listeners for the width
    and height are triggered, they will call the `resize()` method, and that will
    take care of sizing all nodes in the control.


    ```

    private void resize() {

    size = getWidth()  0) {

    if (getWidth() > getHeight()) {

    setTranslateX(0.5 * (getWidth() - size));

    } else if (getHeight() > getWidth()) {

    setTranslateY(0.5 * (getHeight() - size));

    }

    innerShadow.setRadius(0.07 * size);

    glow.setRadius(0.36 * size);

    glow.setColor(getLedColor());

    frame.setPrefSize(size, size);

    led.setPrefSize(0.72 * size, 0.72 * size);

    led.relocate(0.14 * size, 0.14 * size);

    led.setEffect(isOn() ? glow : innerShadow);

    highlight.setPrefSize(0.58 * size, 0.58 * size);

    highlight.relocate(0.21 * size, 0.21 * size);

    }

    }

    }

    ```


    As you can see, in the `resize()` method, the only thing you have to do for each
    node is calculate its size and relocate the node. So first you calculate the minimum
    dimension of the LED (because it’s square, you take the width if it’s less than
    the height or vice versa). In addition, you must make sure that the resizing will
    be done only if the current size is larger than 0.


    #### How It Works


    Now that you have all things in place, you can simply use the control like any
    other control, as shown here:


    ```

    @Override public void start(Stage stage) {

    Led control = new Led();

    StackPane pane = new StackPane();

    pane.getChildren().add(control);

    Scene scene = new Scene(pane);

    stage.setTitle("JavaFX Led Control");

    stage.setScene(scene);

    stage.show();

    control.setBlinking(true);

    }

    ```


    Figure [15-17](#A323804_3_En_15_Chapter.html#Fig17) shows the result.


    ![A323804_3_En_15_Fig17_HTML.jpg](A323804_3_En_15_Fig17_HTML.jpg)


    Figure 15-17.


    The region-based custom LED control


    ### Other Ways to Create a Custom Control


    As mentioned earlier, there are different ways to create a custom control in JavaFX.
    The “extend `Region`” approach that was shown here is the most common one. The
    drawback that comes with this approach is that you mixed up the model/controller
    with the view, which is acceptable for small controls like this LED, but might
    be a bad solution for a bigger control that relies on a data model or controls
    that are part of a controls library.


    For those more complex controls, you should use a custom `Control.class` class
    in combination with a custom `Skin.class` and your CSS file. The main difference
    here is that the properties with their `get`, `set`, and `property` methods will
    be placed in the `Control.class` and the visualization code will be placed in
    the `Skin.class`. This approach provides proper separation between the controller
    logic and the view logic.


    The last approach to creating a custom control that I want to mention is using
    the `Canvas` node. The `Canvas` node represents a single node that in principle
    behaves like an image that you can draw on. The API that is used to draw on the
    `Canvas` node is taken from the HTML5 `Canvas`, which means you won’t have JavaFX
    nodes but you will simply draw on the `Canvas` node. (That is, you’ll be working
    in immediate mode rather than retained mode.) You have to take care of clearing
    and redrawing the `Canvas` node surface. This approach might be useful for controls
    that contain very complex drawings to calculate and draw, as you would only need
    to do so once.


    ## Summary


    In this chapter, you learned how to style your application with custom CSS files
    by using the following methods:


    *   `Application.setUserAgentStylesheet(String URL)`

    *   `Scene: getStylesheets().add(String URL)`


    Then you saw how CSS is used in JavaFX by using the default CSS selectors or creating
    your own. You learned about the `id` type selectors, `class` type selectors, and
    CSS pseudo-classes. In addition, you learned how to use the selectors in different
    selector patterns. By using selector patterns, you could apply styling to a group
    of nodes and their siblings.


    Finally, you learned how to create an LED custom control in JavaFX. In this section,
    you got a chance to employ different strategies in creating custom controls. You
    learned how to use the `Control` and `Skin` classes to adhere to the standard
    way to create custom controls. You also learned about other interesting strategies,
    such as extending from `Region` or using the `Canvas` class to render primitives
    in immediate mode.


    ## Java 9 SDK


    JavaFX 9 is built into Oracle’s Java 9 SDK, which means that you only need to
    download the Java 9 SDK. The Java 9 software development kit and related information
    can be downloaded from the following locations.


    *   Java 9 at Oracle Technology Network: [`https://docs.oracle.com/javase/9/`](https://docs.oracle.com/javase/9/)

    *   Where to download the Java development kit: [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)'
  trans: '

    #### LED 控制器的 CSS 文件


    在 `initGraphics()` 方法中创建的每个节点都有其专属的 CSS 样式类，这些类定义在 `led.css` 文件中。文件内容如下：


    ```

    /* 主 LED 样式类，其中定义了 -led-color 变量 */

    .led {

    -led-color  : red;

    -frame-color: linear-gradient(from 14% 14% to 84% 84%,

    rgba(20, 20, 20, 0.64706) 0%,

    rgba(20, 20, 20, 0.64706) 15%,

    rgba(41, 41, 41, 0.64706) 26%,

    rgba(200, 200, 200, 0.40631) 85%,

    rgba(200, 200, 200, 0.3451) 100%);

    }

    /* .frame 子类，定义金属插座的填充 */

    .led .frame {

    -fx-background-color : -frame-color;

    -fx-background-radius: 1024;

    }

    /* .main 子类，定义 LED 塑料外壳在关闭状态下的填充 */

    .led .main {

    -fx-background-color : linear-gradient(from 15% 15% to 83% 83%,

    derive(-led-color, -80%) 0%,

    derive(-led-color, -87%) 49%,

    derive(-led-color, -80) 100%);

    -fx-background-radius: 1024;

    }

    /* .main 子类与 :on 伪类结合，定义 LED 塑料外壳在开启状态下的填充 */

    .led:on .main {

    -fx-background-color: linear-gradient(from 15% 15% to 83% 83%,

    derive(-led-color, -23%) 0%,

    derive(-led-color, -50%) 49%,

    -led-color 100%);

    }

    /* .highlight 子类，定义高光效果的填充 */

    .led .highlight {

    -fx-background-color : radial-gradient(center 15% 15%, radius 50%,

    white 0%,

    -fx-background-radius: 1024;

    }

    ```


    由于在 CSS 中可以使用百分比来定义渐变中的位置，因此无需担心控件的实际尺寸来计算渐变的起始和结束位置。与 Java Swing 相比，这是一个巨大的优势，因为在
    Swing 中，每次控件尺寸变化时都必须重新计算所有这些值。而在 JavaFX 中，所有这些计算都将自动完成。正如你将看到的，这大大减少了调整尺寸的代码量。


    #### 调整 LED 控制器的大小


    在 JavaFX 中，布局容器的大小决定了其子项的大小，因此必须确保控件由其布局容器调整大小。这意味着，如果将 LED 控件放入 `StackPane`（它会根据自身大小调整子项大小），LED
    的大小将与 `StackPane` 相同。因此，必须在 `registerListeners()` 方法中为控件的 `widthProperty()` 和
    `heightProperty()` 挂接监听器。


    ```

    private void registerListeners() {

    widthProperty().addListener(observable -> resize());

    heightProperty().addListener(observable -> resize());

    frameVisibleProperty().addListener(observable ->

    frame.setOpacity(isFrameVisible() ? 1 : 0));

    onProperty().addListener(observable -> led.setEffect(isOn() ? glow : innerShadow));

    ledColorProperty().addListener(observable -> {

    led.setStyle("-led-color: " + (getLedColor()).toString().replace("0x", "#") +
    ";");

    resize();

    });

    }

    ```


    此方法为所有可能影响 LED 控件可视化效果或大小的属性挂接了监听器。当宽度和高度的监听器被触发时，它们将调用 `resize()` 方法，该方法将负责调整控件中所有节点的大小。


    ```

    private void resize() {

    size = getWidth()  0) {

    if (getWidth() > getHeight()) {

    setTranslateX(0.5 * (getWidth() - size));

    } else if (getHeight() > getWidth()) {

    setTranslateY(0.5 * (getHeight() - size));

    }

    innerShadow.setRadius(0.07 * size);

    glow.setRadius(0.36 * size);

    glow.setColor(getLedColor());

    frame.setPrefSize(size, size);

    led.setPrefSize(0.72 * size, 0.72 * size);

    led.relocate(0.14 * size, 0.14 * size);

    led.setEffect(isOn() ? glow : innerShadow);

    highlight.setPrefSize(0.58 * size, 0.58 * size);

    highlight.relocate(0.21 * size, 0.21 * size);

    }

    }

    }

    ```


    如你所见，在 `resize()` 方法中，你只需要为每个节点计算其大小并重新定位。因此，首先计算 LED 的最小尺寸（因为它是正方形，如果宽度小于高度则取宽度，反之亦然）。此外，必须确保仅在当前尺寸大于
    0 时才执行调整大小操作。


    #### 工作原理


    现在所有部分都已就绪，你可以像使用其他任何控件一样简单地使用这个控件，如下所示：


    ```

    @Override public void start(Stage stage) {

    Led control = new Led();

    StackPane pane = new StackPane();

    pane.getChildren().add(control);

    Scene scene = new Scene(pane);

    stage.setTitle("JavaFX Led Control");

    stage.setScene(scene);

    stage.show();

    control.setBlinking(true);

    }

    ```


    图 15-17 显示了结果。


    ![A323804_3_En_15_Fig17_HTML.jpg](img/A323804_3_En_15_Fig17_HTML.jpg)


    图 15-17.


    基于区域的定制 LED 控件


    ### 创建自定义控件的其他方法


    如前所述，在 JavaFX 中有多种创建自定义控件的方法。这里展示的“扩展 `Region`”方法是最常见的一种。这种方法带来的缺点是，你将模型/控制器与视图混合在一起，对于像这个
    LED 这样的小控件是可以接受的，但对于依赖数据模型或作为控件库一部分的较大控件来说，这可能是一个糟糕的解决方案。


    对于这些更复杂的控件，你应该将自定义的 `Control.class` 类与自定义的 `Skin.class` 以及你的 CSS 文件结合使用。主要区别在于，包含
    `get`、`set` 和 `property` 方法的属性将放在 `Control.class` 中，而可视化代码将放在 `Skin.class` 中。这种方法在控制器逻辑和视图逻辑之间提供了适当的分离。


    我想介绍的创建自定义控件的最后一种方法是使用 `Canvas` 节点。`Canvas` 节点代表一个单一的节点，其行为原理类似于一个可以绘制的图像。用于在
    `Canvas` 节点上绘制的 API 取自 HTML5 的 `Canvas`，这意味着你不会使用 JavaFX 节点，而是直接在 `Canvas` 节点上绘制。（也就是说，你将在即时模式下工作，而不是保留模式。）你必须负责清除和重绘
    `Canvas` 节点的表面。对于包含非常复杂的图形需要计算和绘制的控件，这种方法可能很有用，因为你只需要绘制一次。


    ## 总结


    在本章中，你学习了如何使用以下方法通过自定义 CSS 文件来设置应用程序的样式：


    *   `Application.setUserAgentStylesheet(String URL)`

    *   `Scene: getStylesheets().add(String URL)`


    然后，你了解了如何通过使用默认的 CSS 选择器或创建自己的选择器来在 JavaFX 中使用 CSS。你学习了 `id` 类型选择器、`class` 类型选择器和
    CSS 伪类。此外，你还学习了如何在不同选择器模式中使用这些选择器。通过使用选择器模式，你可以将样式应用于一组节点及其兄弟节点。


    最后，你学习了如何在 JavaFX 中创建一个 LED 自定义控件。在本节中，你有机会运用不同的策略来创建自定义控件。你学习了如何使用 `Control`
    和 `Skin` 类来遵循创建自定义控件的标准方式。你还了解了其他有趣的策略，例如扩展 `Region` 或使用 `Canvas` 类在即时模式下渲染图元。


    ## Java 9 SDK


    JavaFX 9 已内置于 Oracle 的 Java 9 SDK 中，这意味着你只需下载 Java 9 SDK 即可。Java 9 软件开发工具包及相关信息可从以下位置下载。


    *   Oracle 技术网络上的 Java 9：[`https://docs.oracle.com/javase/9/`](https://docs.oracle.com/javase/9/)

    *   Java 开发工具包下载地址：[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)

