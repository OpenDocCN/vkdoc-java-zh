    ### 复制资源


    由于此 `HelloWorld` 应用程序不包含任何诸如 `fxml` 文件、图片或声音文件之类的资源，因此可以跳过此步骤。但如果你有需要复制到模块目录的资源，请使用以下命令。请根据你的需求修改以下命令。以下是递归复制包含
    `*.fxml` 后缀的文件到 `mods/com.jfxbe.helloworld/com/jfxbe/helloworld` 目录的命令。


    在 Linux/MacOS X 平台上，执行以下操作：


    ```

    $ cp -r src/*.fxml mods/com.jfxbe.helloworld/com/jfxbe/helloworld

    ```


    在 Windows 平台上，执行以下操作：


    ```

    C:\helloworld> xcopy C:\helloworld\src\*.fxml C:\helloworld\mods\com.jfxbe.helloworld
    /S /Y

    ```


    这些命令会递归复制以 `.fxml` 结尾的文件，并将它们放置在 `module` 目录中。当你的代码尝试调用 `getResource()` 方法时，这一点非常重要。


    ### 运行应用程序


    以下是通过指定模块和包含主应用程序的类来运行应用程序的方法：


    ```

    $ java --module-path mods -m com.jfxbe.helloworld/com.jfxbe.helloworld.HelloWorld

    ```


    图 2-6 展示了运行 `HelloWorld` JavaFX 模块应用程序的输出结果。


    ![A323804_3_En_2_Fig6_HTML.jpg](img/A323804_3_En_2_Fig6_HTML.jpg)


    图 2-6.


    HelloWorld JavaFX 模块化应用程序的输出结果


    ### 将应用程序打包为 JAR


    之前的模块是编译成类并放入 `mods/com.jfxbe.helloworld` 目录中的。如果能创建一个可执行的 JAR 文件，岂不是很好？那么，我们首先创建一个
    `mlib` 目录。这个目录可以任意命名，但按照惯例，`mlib` 代表模块库。`mlib` 目录将包含 JAR 模块应用程序。以下内容说明了如何打包一个
    Java 9 模块化应用程序。


    在 Linux/MacOS X 平台上，执行以下操作：


    ```

    $ mkdir mlib

    $ jar --create --file=mlib/com.jfxbe.helloworld.jar \

    --main-class=com.jfxbe.helloworld.HelloWorld -C mods/com.jfxbe.helloworld/.

    ```


    在 Windows 平台上，执行以下操作：


    ```

    C:\helloworld> md mlib

    C:\helloworld> jar --create --file=C:\helloworld\mlib\com.jfxbe.helloworld.jar
    --main-class=com.jfxbe.helloworld.HelloWorld -C C:\helloworld\mods\com.jfxbe.helloworld.

    ```


    这些选项说明如下：


    *   `--create`：创建一个 JAR 文件

    *   `--file`：要创建的 JAR 文件

    *   `--main-class`：作为 JavaFX 应用程序的主类

    *   `-C`：此选项用于切换目录并处理要转换的代码


    ### 以 JAR 形式运行应用程序


    运行 JavaFX 应用程序的另一种方式是将其作为 JAR 文件运行。由于创建 JAR 时已指定了主类，因此以下命令无需包含类名即可运行应用程序。这样可以减少输入量。


    ```

    java --module-path mlib -m com.jfxbe.helloworld

    ```


    由于 JAR 模块定义指向了 Java 的主类，你会注意到 `-m` 不需要指定包名/类类型。这只是相对于 Java 更严谨方式的一种快捷方式。


    ### 显示模块描述


    既然你已经知道如何将应用程序打包为 JAR 文件，你可能想查看或显示模块信息及其依赖关系。以下命令将读取并显示模块的 `module-info` 文件。


    ```

    jar --describe-module --file=mlib/com.jfxbe.helloworld.jar

    ```


    以下输出展示了 `--describe-module` 选项的使用情况。


    ```

    module com.jfxbe.helloworld (module-info.class)

    requires mandated java.base

    requires javafx.base

    requires javafx.controls

    requires javafx.graphics

    exports com.jfxbe.helloworld

    main-class com.jfxbe.helloworld.HelloWorld

    ```


    ## 总结


    在本章中，你学习了如何使用 Java 9 的 Project Jigsaw 来模块化 Java 代码。你了解了模块化的优缺点。你运行了 `jdeps` 工具来协助你从
    JDK 8 迁移到 JDK 9。之后，你了解了 JAR 地狱这个术语，它基本上是指当从类路径加载不同版本的 Java 类时会发生冲突。你还学习了一些关于 OSGi
    容器的知识，以及如何轻松创建模块包。OSGi 包含大量作为包定义的属性。


    除了模块，你还初步了解了 Maven/Gradle 构建工具在管理依赖关系方面的作用。这些构建工具也拥有仓库，使开发者能够存储和检索构件。


    接下来，你学习了如何在 `module-info.java` 文件中定义模块定义。在定义模块之后，你了解了四种模块类型。这四种模块类型是：平台模块、未命名模块、自动模块和应用程序模块。通过查看完整的模块图，你了解了关于
    JavaFX 平台模块的更多细节。


    最后但同样重要的是，你创建了一个作为 Java 9 模块的 JavaFX `HelloWorld` 应用程序。你学会了如何编译和创建一个 Java 9 JAR
    模块。


    好了，这就是 Java 9 模块。


    # 3. JavaFX 基础


    没有什么比收到复杂难懂的建议作为问题的解决方案更令人沮丧的了。正因如此，我一直坚持专注于基础知识。就 JavaFX 而言，你将学习将在绘图表面（JavaFX
    场景）上使用的基本绘图原语。为了在 JavaFX 场景上渲染图形，你需要基本的形状和颜色。基于你对 JavaFX 场景图的知识（你在第 1 章末尾已经接触过），你将在本章学习如何在
    JavaFX 场景图上绘制和操作 2D 形状。


    比形状对象更基础的是 JavaFX 的 [`javafx.scene.Node`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Node.html)
    类。`Node` 类是所有 JavaFX 场景图节点的基本基类。`Node` 类提供了对任何节点进行变换、平移和应用效果的能力。本章中的许多示例都涉及 [`javafx.scene.shape.Shape`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Shape.html)
    类，它是 `Node` 类的子类。因此，`Shape` 类将继承 `Node` 类的所有功能。在本章中，你将探索许多继承自 `Shape` 的派生类。你将通过研究
    JavaFX 最基本的形状——`Line` 节点来开始本章。

