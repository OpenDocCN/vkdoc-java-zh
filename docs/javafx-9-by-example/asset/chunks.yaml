- fmt: '### Creating Menus and Menu Items


    Before exploring how to invoke code triggered by selecting menu options, let’s
    look at how to create menus. For starters, you must create a menu bar (`javafx.scene.control.MenuBar`)
    object to hold one-to-many `javafx.scene.control.Menu` objects. Each `Menu` object
    is similar to a tree hierarchal structure, where `Menu` objects can contain `Menu`
    and `MenuItem` (`javafx.scene.control.MenuItem`) objects. Thus, a menu may contain
    other menus as submenus or menus within menus. Figure [6-12](#A323804_3_En_6_Chapter.html#Fig12)
    depicts a File menu having a Save menu item.


    ![A323804_3_En_6_Fig12_HTML.jpg](A323804_3_En_6_Fig12_HTML.jpg)


    Figure 6-12. A menu bar with a simple File menu that contains a Save menu item


    Menu items are child options within a `Menu` object. You can think of Menu items
    as leaf nodes (containing no children) in a tree structure. Listing [6-15](#A323804_3_En_6_Chapter.html#Par128)
    is the code to create a menu bar with a File menu that has a Save option as a
    menu item, as shown in Figure [6-12](#A323804_3_En_6_Chapter.html#Fig12).


    ```

    MenuBar menuBar = new MenuBar();

    Menu fileMenu = new Menu("File");

    fileMenu.getItems().add(new MenuItem("Save"));

    menuBar.getMenus().add(fileMenu);

    Listing 6-15.

    Creating a MenuBar Having a File Menu with a Save Menu Item

    ```


    Although you can create simple menu items like the ones in Figure [6-12](#A323804_3_En_6_Chapter.html#Fig12),
    you may want more advanced options such as checked options or radio buttons. Based
    on the inheritance hierarchy, the following are subclasses of the `MenuItem` class.
    The following listing shows the available `MenuItem` subclasses to use as menu
    options. A brief description of each subclass will follow.


    - `CheckMenuItem`

    - `RadioMenuItem`

    - `CustomMenuItem`

    - `SeparatorMenuItem`

    - `Menu`


    A `CheckMenuItem` menu item is similar to a check box UI control, allowing the
    user to select items optionally. The `RadioMenuItem` menu item is similar to the
    radio button UI control, allowing the user to select only one item from an item
    group. In the same manner that you learned about in the prior section on buttons,
    creating check and radio menus is similar.


    Next, the custom menu item, which is a `CustomMenuItem` class, allows developers
    to create their own specialized menu items. For instance, you may want to have
    a menu option that behaves like a toggle button.


    After that you will see a `SeparatorMenuItem`, which is really a derived class
    of type `CustomMenuItem`. A `SeparatorMenuItem` is a menu item that displays a
    visual line to separate menu items.


    The last in the bulleted list is the `Menu` class. Since a `Menu` class is a subclass
    of `MenuItem`, it has a `getItems().add()` method that’s capable of adding children,
    such as other `Menu` and `MenuItem` object instances.


    ### Invoking a Selected MenuItem


    Now that you know how to construct menus and menu items, let’s see how to invoke
    code that is attached to each menu item. You’ll be happy to know that wiring up
    handler code to a menu item is done exactly the same way as you wire up JavaFX
    buttons, which means that menu items also have a `setOnAction()` method. The `setOnAction()`
    method receives a functional interface of type `EventHandler<ActionEvent>`, which
    is the handler code that is invoked when the menu item is selected.


    Listing [6-16](#A323804_3_En_6_Chapter.html#Par141) shows two equivalent implementations
    of action code to be invoked when the Exit menu item is triggered. The first implementation
    uses an anonymous inner class, and the second uses Java 8’s lambda expressions.
    A more succinct way to attach an event handler code is to use a lambda functional
    interface.


    ```

    // Implementation that uses an anonymous inner class

    exitMenuItem.setOnAction(new EventHandler() {

    @Override

    public void handle(ActionEvent t) {

    Platform.exit();

    }

    });

    // Implementation that uses lambda / functional interface.

    exitMenuItem.setOnAction(ae -> Platform.exit());

    Listing 6-16.

    Implementing Event Handler Code When an Action is Invoked

    ```


    ### Example: Working with Menus


    To demonstrate various menu selection scenarios, the next code example mimics
    a security alarm application. As illustrated in Figure [6-13](#A323804_3_En_6_Chapter.html#Fig13),
    the menu bar displays three main menus—File, Cameras, and Alarm. When the File
    menu is selected, it displays three options—New, Save, and Exit—as child menu
    items.


    ![A323804_3_En_6_Fig13_HTML.jpg](A323804_3_En_6_Fig13_HTML.jpg)


    Figure 6-13. Menu example application simulating a security alarm system


    Listing [6-17](#A323804_3_En_6_Chapter.html#Par145) is from the file `MenuExample.java`
    and shows the relevant code that demonstrates menu selections. Before executing
    the code, you may want to know how to use this fictional security alarm application.


    Selecting the Cameras menu displays two `CheckMenuItem` menu items, which you
    can use for the optional selection of Show Camera 1 or Show Camera 2. Lastly,
    the Alarm menu displays two `RadioMenuItem` options and a submenu Contingent Plans.
