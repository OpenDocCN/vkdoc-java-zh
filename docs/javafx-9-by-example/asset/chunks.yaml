    让我们使用 Gluon 插件创建一个新项目。在 NetBeans 中，选择文件 ➤ 新建项目，然后在左侧选择 Gluon。从可用项目列表中选择 Gluon
    Mobile – Glisten -Afterburner 项目，如图 13-4 所示。


