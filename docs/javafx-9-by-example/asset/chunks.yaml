    Common Layer in the JIDE components for Swing: [`https://github.com/jidesoft/jidefx-oss`](https://github.com/jidesoft/jidefx-oss)

    *   DateAxis supporting JSR-310 by Pedro Duque Vieira: JavaFX Charts using XYBarChart
