    \ [6-3](#A323804_3_En_6_Chapter.html#Par16) is shown in Figure [6-4](#A323804_3_En_6_Chapter.html#Fig4).\n\
    \n![A323804_3_En_6_Fig4_HTML.jpg](A323804_3_En_6_Fig4_HTML.jpg)\n\nFigure 6-4.\
