- fmt: '# JavaFX Lines


    Rendering lines in JavaFX is conceptually similar to Euclidean geometry in that
    two `(x, y)` coordinate points connect to draw a segment into space. When drawn
    on the JavaFX scene graph, lines are rendered using the screen coordinate space
    (system). In geometry, a line is defined as a segment connected by two points
    in space, although it lacks a width (thickness) and color value. You may be asking
    the question, “Does this mean that lines are invisible?”. In the computer world,
    physical devices plot pixels and shapes that occupy real surfaces. So, lines drawn
    on these surfaces will have what is known as a pixel or stroke width. Monitors
    and printers are examples of such surfaces. Because of this method of production,
    modern graphics programming has adopted the standard screen coordinate system.
    In this system, lines that are drawn are visible and have attributes of width
    and color.


    If you remember in grade school in Algebra class, a Cartesian graph is drawn with
    an X and Y axis where the origin point `(0, 0)` is where both axes converge at
    the center. On a computer screen, the coordinate system has the origin `(0, 0)`
    at the upper-left corner; this differs from the Cartesian coordinate system, where
    `(0, 0)` is placed at the center of the graphing area. In Figure [3-1](#A323804_3_En_3_Chapter.html#Fig1),
    it depicts the two coordinate systems as a comparison. The Cartesian coordinate
    system shown on the left has all four quadrants as visible plotting areas. Shown
    on the right side in Figure [3-1](#A323804_3_En_3_Chapter.html#Fig1) is the Screen
    coordinate system that has the bottom-right quadrant (gray region) as the screen’s
    visible plotting area.


    ![A323804_3_En_3_Fig1_HTML.jpg](A323804_3_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    Cartesian versus screen coordinate system. In a Cartesian coordinate system, the
    origin point `(0, 0)` is in the center, while a screen coordinate system’s origin
    point `(0, 0)` is at the upper-left of a screen or monitor.


    Taking a closer look at Figure [3-1](#A323804_3_En_3_Chapter.html#Fig1), you’ll
    see both coordinate systems. The `x` coordinate has the same effect when moving
    a point along the `x` axis. However, when using the screen coordinate system to
    move along the `y` axis, the effect is opposite that of the Cartesian system.
    In other words, the `y` coordinate’s value increases when moving a point in a
    downward direction (top to bottom). Figure [3-2](#A323804_3_En_3_Chapter.html#Fig2)
    illustrates shapes drawn using the screen coordinate system. Also note that using
    negative values will plot objects off the screen, such as the star shape partially
    shown in the viewable area.


    ![A323804_3_En_3_Fig2_HTML.jpg](A323804_3_En_3_Fig2_HTML.jpg)


    Figure 3-2.


    The screen coordinate system


    As you learn more about JavaFX, you will discover many scene graph objects, such
    as lines, circles, and rectangles. These objects are derived classes of the `Shape`
    class. All shape objects can perform geometric operations between two shaped areas,
    such as subtract, intersect, and union. By mastering the [`Shape`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Shape.html)
    API, you will begin to see endless possibilities. Now let’s discuss how to create
    lines.


    To draw lines in JavaFX, you will use the [`javafx.scene.shape.Line`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Line.html)
    class. When creating a `Line` instance, you need to specify a start `(x, y)` coordinate
    and an end `(x, y)` coordinate to draw a line. There are two ways to specify the
    start and end points when creating `Line` nodes. The first way is to use a `Line`’s
    constructor with the parameters `startX`, `startY`, `endX`, and `endY`. The second
    way is to instantiate the `Line` class with the empty constructor and subsequently
    use its setter methods. Although these two methods of creating a `Line` node sound
    pretty basic, I want to point out that there used to be a third method of constructing
    lines using deprecated builder classes. You will see later in this chapter why
    the JavaFX team decided to deprecate those classes. The data types of all the
    parameters of a `Line` class are `double` type values, which provide floating-point
    decimal precision. The following code snippet shows the two methods of creating
    a `Line` shape node.


    ```

    Line method1 = new Line(startX, startY, endX, endY);

    Line method2 = Line();

    method.setStartX(startX);

    method.setStartY(startY);

    method.setEndX(endX);

    method.setEndY(endY);

    ```


    Relating to decimal precision values used as screen coordinates, keep in mind
    that container classes that extend the `Region` class have a [`snapToPixelProperty()`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Region.html#snapToPixelProperty--)
    method property with a default value of `true`. Being `true`, the children nodes
    will use integer precision as values for screen coordinates. The Javadoc documentation
    of the `Node` class describes how pixels are rendered by stating: “At the device
    pixel level, integer coordinates map onto the corners and cracks between the pixels
    and the centers of the pixels appear at the midpoints between integer pixel locations.”


    Using integer values (whole numbers) by drawing a line or shape with a stroke
    width of 1 will tend to look fuzzy. Based on the Javadoc documentation, the coordinate
    maps to the upper-left corner (crack) to draw the pixel occupying two pixels.
    For example, if you’re drawing a horizontal line having a starting point at `(1,
    1)` and an ending point at `(8, 1)`, the JavaFX coordinates will draw pixels on
    both sides of the crack, as shown in Figure [3-3](#A323804_3_En_3_Chapter.html#Fig3).
    The cracks are shown as grid lines. Each grid block (square) is denoted as a pixel.
    The algorithm also uses varied color intensities.


    ![A323804_3_En_3_Fig3_HTML.jpg](A323804_3_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    A line drawn using integer values will appear thick and fuzzy (blurry). In JavaFX
    lines using integer values will occupy two pixels. Also, the color of the pixel
    could change based on the fractional values of the coordinate or the width of
    the stroke.


    To explore JavaFX’s further, I created a simple example of various lines drawn
    on the scene graph, as shown in Figure [3-4](#A323804_3_En_3_Chapter.html#Fig4).
    These lines are mostly identical; however, when using integer values for coordinates,
    lines will tend to look thick or fuzzy. When coordinates have floating point values
    that have a remainder of less than or equal to `.5`, the line will appear thin
    (occupying one pixel). Notice the Thin 2 line as a light gray, making it appear
    even thinner, yet still occupying one pixel.


    ![A323804_3_En_3_Fig4_HTML.jpg](A323804_3_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Drawn are five lines—Default, Fat, Fuzzy, Thin 1, and Thin 2'
  raw: '## JavaFX Lines


    Rendering lines in JavaFX is conceptually similar to Euclidean geometry in that
