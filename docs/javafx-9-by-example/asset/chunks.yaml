    # 2. JavaFX 与 Jigsaw


    在软件架构的早期，许多设计者和实践者常常强调模块化代码的理念。显然，将软件服务或 API 拆分成模块是合理的；然而，根据你与谁交谈，“模块”这个词对不同的人有不同的含义。例如，使用
    Apache Maven 构建工具的开发者通常会将 `jar` 制品视为模块，而有些人则认为制品内的包也是模块。那么，在 Java 世界中，“模块”一词究竟意味着什么？


    在本章中，你将探索模块化对于新的 Java 9 平台意味着什么。你还将学习在 JavaFX 应用程序的上下文中如何使用 Java 平台模块系统（JPMS）。本章是对
    Java 9 模块系统的温和介绍，涵盖了常见的使用场景，例如将模块用作库依赖项。


    话虽如此，我不会深入详细地介绍每一个模块化用例（相信我，它们相当多）。即使在撰写本文时，关于其他用例的讨论仍在进行中，可能超出了预期的范围。例如，关于自动模块的概念以及模块应如何[命名](http://download.java.net/java/jigsaw/docs/api/java/lang/module/ModuleFinder.html#of-java.nio.file.Path%E2%80%A6-)的讨论仍在继续。尽管专家小组和行业领袖在缺失功能与范围需求之间反复争论，但我相信
    Java 社区将就一个强大的模块系统达成（善意的）共识，以满足实际中的大多数用例。要了解更多关于 Java 9 Jigsaw 主题的信息，我在本书的附录中列出了相关的
    JSR、书籍和链接。


    作为一个通用声明，特别是针对新的 Java 9 平台模块系统，我将提醒你注意以下内容。


    声明


    当你阅读本书时，Java 9 的模块系统已经发布。由于 Java 9 的模块系统是全新的，语言规范、API、术语和概念可能会发生变化。本章是基于 Java
    9 的早期访问版本编写的。


    以下是阅读本章关于 Java 9 模块系统时应遵循的章节列表。如果你已经了解 Java 9 模块系统的背景及其历史，可以直接跳到“入门”部分。


    *   什么是 Project Jigsaw？

    *   历史（Java 9 之前）

    *   入门

    *   结论


    ## 什么是 Project Jigsaw？


    Java 模块化，也称为“Project Jigsaw”，是一项旨在让开发者能够在 Java 平台上以更易于管理的方式划分和封装代码的努力。通过将代码划分为模块，应用程序代码将更加松散耦合，而不是一个单一的应用程序。通过良好的封装，可以定义模块以安全地向其他模块暴露（导出）API。Java
    的新模块系统还将向后兼容 Java 9 之前的代码和库（非模块化代码）。划分和封装代码不仅是很好的原则，还有其他额外的好处，你将在后面看到。


    根据 Mark Reinhold 对 JSR 376（Project Jigsaw）的总结：


    > 该 JSR 的总体目标是为 Java 平台定义一个易于理解且可扩展的模块系统。它将是易于理解的，即易于学习和使用，以便开发者能够使用它来构建和维护适用于
    Java SE 和 Java EE 平台的库和大型应用程序。它将是可扩展的，以便能够用于将 Java SE 平台本身及其实现模块化。——Mark Reinhold，Oracle
    Java 平台组首席架构师，2015 年 4 月 1 日


    ### 优势


    根据 Project Jigsaw 官方网站（[`http://openjdk.java.net/projects/jigsaw`](http://openjdk.java.net/projects/jigsaw)）的说法，以下是
    Java 平台上模块系统的主要目标和优势：


    > 为了实现这些目标，我们提议为 Java SE 平台设计和实现一个标准的模块系统，并将该系统应用于平台本身以及 JDK。该模块系统应足够强大，能够将 JDK
    和其他大型遗留代码库模块化，同时仍然对所有开发者易于理解。——Project Jigsaw 网站，2016 年 12 月 21 日


    *   使 Java SE 平台和 JDK 更容易向下扩展到小型计算设备

    *   提高 Java SE 平台实现（尤其是 JDK）的整体安全性和可维护性

    *   实现改进的应用程序性能

    *   使开发者更容易为 Java SE 和 EE 平台构建和维护库及大型应用程序


    正如前面提到的关于应用程序划分的内容，这些优势还可以导致应用程序缩小规模，以适应更小的计算设备，例如基于 ARM 的计算机。随着微服务成为在云和基于容器的应用程序环境中开发的标准，模块化代码还将有助于
    Java SE 和 Java EE 平台的维护和安全性。


    由于模块为可靠的配置构建铺平了道路，应用程序将占用更小的空间，从而提高内存和加载时间方面的性能。一个例子是模块化的 JavaFX 应用程序由于加载的模块集更小，启动速度得以提升。在
    Java 9 之前，应用程序是使用整个 Java 运行时开发和打包的。这些应用程序必须加载许多未使用的库，例如 `corba` 或 `sql` 包。


    将 Java 代码（Java 9）模块化时的其他优势被列为 Java 增强提案：


    *   模块化运行时映像（JEP 220，位于 [`http://openjdk.java.net/jeps/220`](http://openjdk.java.net/jeps/220)）

    *   Java 模块链接器（JEP 282，位于 [`http://openjdk.java.net/jeps/282`](http://openjdk.java.net/jeps/282)）

    *   提前编译（JEP 295，位于 [`http://openjdk.java.net/jeps/295`](http://openjdk.java.net/jeps/295)）


    JEP 220 是关于 Java SE 平台模块化运行时映像的增强提案。架构师们重构了整个 Java 运行时平台，例如其目录和核心库。重构运行时平台将有助于提高安全性、性能和可管理性。例如，像
    `rt.jar`、`tools.jar` 和 `jfxrt.jar` 这样的库将不再可访问，而是全部被分解到模块中。


    Java 9 中的新功能是 jlink，即 Java 链接器（JEP 282）。jlink 是一个通过将模块及其依赖项链接到自定义运行时映像中来组装和构建应用程序的工具。为了创建自定义运行时映像，Java
    链接器与运行时的结构方式（JEP 220）结合使用。换句话说，这两个 JEP 本质上是步调一致的。


    提到的三个 JEP 中的最后一个是 JEP 295，即提前编译。它更广为人知的名字是 AOT 编译。尽管它被认为是实验性的，但 AOT 编译器能够将 Java
    代码转换为 Linux 操作系统上的原生代码。这在环境没有安装 Java 运行时的情况下具有很好的优势。另一个优势是速度。由于代码是静态编译的，因此无需进行
    JIT（即时）编译或预热。此功能将用于小型设备或高效服务器（网络设备）。当你阅读本文时，AOT 编译将支持主流操作系统。


    通过这三个重要的 Java 增强提案协同工作，你将开始看到构建得更简单、更轻量、更快速且原生的基于 Java 的应用程序。

    '
- fmt: '### Drawbacks


    Although there are many benefits to designing modular code, there are some drawbacks.
    Some drawbacks are the following:


    - Additional complexity when defining modules and dependencies.

    - No standard project structure for multiple modules, as it relates to various
    build tools and IDEs.

    - When mixing legacy non-modular code with modular code, the classpath and module
    path are in play. Debugging code and resolving dependencies may be more difficult.

    - Legacy dependencies may never undergo a rewrite to become a Java 9 module, which
    could risk backward or forward compatibility.


    ### Java 9 Migration Path


    Now that you’ve read about the benefits and drawbacks of the new Java platform
    module system, you might still be on the fence, because of unknown risks. Perhaps
    you believe it’s still too new. To ease any potential anxiety, Oracle has created
    an excellent guide to help you migrate legacy Java applications to Java 9. Go
    for it!


    The migration guide is located here: [`https://docs.oracle.com/javase/9/migrate`](https://docs.oracle.com/javase/9/migrate).
    Also, you should look at important changes in JDK 9 here: [`https://docs.oracle.com/javase/9/whatsnew/toc.htm`](https://docs.oracle.com/javase/9/whatsnew/toc.htm).


    The guide is a very detailed explanation of what changed in Java 9 and how to
    use platform modules and third-party libraries. The migration guide also talks
    about an analysis tool called `jdeps`.


    #### The `jdeps` Analysis Tool


    When running `jdeps` against your application code, the tool will inspect code
    to determine if it relies on deprecated dependencies or JDK internal APIs. For
    instance, the analysis tool will suggest APIs that should be replaced. Some suggestions
    offer a replacement for code using packages starting with `com.sun.*`, `sun.misc.*`,
    etc. For example, if you created a Java application unmodularized while referencing
    a non-public package such as `com.sun.*`, the `jdeps` tool can offer an alternative
    module to use.


    Here is the output after invoking the `jdeps` tool against a Java 8 compiled class
    file.


    ```

    $ jdeps -cp . com/jfxbe/helloworld/HelloWorld.class

    HelloWorld.class -> java.base

    HelloWorld.class -> javafx.base

    HelloWorld.class -> javafx.controls

    HelloWorld.class -> javafx.graphics

    HelloWorld.class -> jdk.httpserver

    com.jfxbe.helloworld -> com.sun.net.httpserver  jdk.httpserver

    com.jfxbe.helloworld -> java.lang               java.base

    com.jfxbe.helloworld -> javafx.application      javafx.graphics

    com.jfxbe.helloworld -> javafx.collections      javafx.base

    com.jfxbe.helloworld -> javafx.event            javafx.base

    com.jfxbe.helloworld -> javafx.scene            javafx.graphics

    com.jfxbe.helloworld -> javafx.scene.control    javafx.controls

    com.jfxbe.helloworld -> javafx.stage            javafx.graphics

    ```


    The output of the analysis shows the summary and details of platform modules used
    by the `HelloWorld.class` file. There you will notice the `com.sun.net.httpserver`
    can be found in the `jdk.httpserver` module. Assuming your application depends
    on the class `com.sun.net.httpserver.HttpServer`, the suggestion to migrate toward
    Java modules means you would need to create a `module-info.java` file to require
    the `jdk.httpserver` module as a dependency.


    Let’s take a look at another example of using the `jdeps` tool against a Java
    9 modularized application JAR file.


    The following is an example of analyzing a modularized JAR application by displaying
    its dependency information.


    - `-summary` or `-s` Prints the dependency summary.

    - `-verbose` or `-v` Prints all classes-level dependencies.


    ```

    $ jdeps -v helloworld.jar

    ```


    Here’s the output after running `jdeps`:


    ```

    $ jdeps -v mlib/com.jfxbe.helloworld.jar

    com.jfxbe.helloworld

    [file:///Users/cpdea/JavaFX9byExample/Code/jfx9be/chap02/helloworld/mlib/com.jfxbe.helloworld.jar]

    requires mandated java.base (@9-ea)

    requires javafx.base (@9-ea)

    requires javafx.controls (@9-ea)

    requires javafx.graphics (@9-ea)

    requires jdk.httpserver (@9-ea)

    com.jfxbe.helloworld -> java.base

    com.jfxbe.helloworld -> javafx.base

    com.jfxbe.helloworld -> javafx.controls

    com.jfxbe.helloworld -> javafx.graphics

    com.jfxbe.helloworld -> jdk.httpserver

    com.jfxbe.helloworld.HelloWorld   -> com.jfxbe.helloworld.HelloWorld$1 com.jfxbe.helloworld

    com.jfxbe.helloworld.HelloWorld   -> com.sun.net.httpserver.HttpServer jdk.httpserver

    com.jfxbe.helloworld.HelloWorld   -> java.lang.Object                  java.base

    com.jfxbe.helloworld.HelloWorld   -> java.lang.String                  java.base

    com.jfxbe.helloworld.HelloWorld   -> java.lang.Throwable               java.base

    com.jfxbe.helloworld.HelloWorld   -> javafx.application.Application    javafx.graphics

    com.jfxbe.helloworld.HelloWorld   -> javafx.collections.ObservableList javafx.base

    com.jfxbe.helloworld.HelloWorld   -> javafx.event.EventHandler         javafx.base

    com.jfxbe.helloworld.HelloWorld   -> javafx.scene.Group                javafx.graphics

    com.jfxbe.helloworld.HelloWorld   -> javafx.scene.Parent               javafx.graphics

    com.jfxbe.helloworld.HelloWorld   -> javafx.scene.Scene                javafx.graphics

    com.jfxbe.helloworld.HelloWorld   -> javafx.scene.control.Button       javafx.controls

    com.jfxbe.helloworld.HelloWorld   -> javafx.stage.Stage                javafx.graphics

    com.jfxbe.helloworld.HelloWorld$1 -> com.jfxbe.helloworld.HelloWorld   com.jfxbe.helloworld

    com.jfxbe.helloworld.HelloWorld$1 -> java.io.PrintStream               java.base

    com.jfxbe.helloworld.HelloWorld$1 -> java.lang.Object                  java.base

    com.jfxbe.helloworld.HelloWorld$1 -> java.lang.String                  java.base

    com.jfxbe.helloworld.HelloWorld$1 -> java.lang.System                  java.base

    com.jfxbe.helloworld.HelloWorld$1 -> javafx.event.ActionEvent          javafx.base

    com.jfxbe.helloworld.HelloWorld$1 -> javafx.event.Event                javafx.base

    com.jfxbe.helloworld.HelloWorld$1 -> javafx.event.EventHandler         javafx.base

    com.jfxbe.helloworld.HelloWorld$1 -> javafx.stage.Stage                javafx.graphics

    ```


    After running `jdeps` against your code, the tool will inform you of internal
    APIs if any. As you can see in the output, the class `HelloWorld` depends on the
    following internal API:


    ```

    com.sun.net.httpserver.HttpServer.

    ```


    Another thing to note regarding the source code in this book is that you’ll find
    some of the source code is in Java 8 or Java 9. Having said this, you will be
    happy to know that the new Java 9 compiler is able to compile Java 8 source code
    as is (unmodularized). The module path classes loaded on the classpath are placed
    into an unnamed module with all public packages exported (read accessible).


    **Note**


    Some chapters use Java 8 source code from the prior edition of the book, while
    some chapters use Java 9 source code (modules). There is no need to panic, as
    source code prior to Java 9 JDK will simply compile and run. In other words, if
    you encounter Java 8 source code, just treat it as a regular (legacy) Java code
    or unmodularized code.'
