    ### 三次曲线


    在代码清单 3-2 中，第一个图形（绘制为正弦波）实际上是 `javafx.scene.shape.CubicCurve` 类。要创建三次曲线，只需找到合适的构造函数进行实例化。三次曲线的主要参数包括
    `startX`、`startY`、`controlX1`（控制点 1 的 X 坐标）、`controlY1`（控制点 1 的 Y 坐标）、`controlX2`（控制点
    2 的 X 坐标）、`controlY2`（控制点 2 的 Y 坐标）、`endX` 和 `endY`。图 3-9 展示了一条受控制点影响的三次曲线。


    ![A323804_3_En_3_Fig9_HTML.jpg](img/A323804_3_En_3_Fig9_HTML.jpg)


    图 3-9.


    三次曲线


    `startX`、`startY`、`endX` 和 `endY` 参数是曲线的起点和终点，而 `controlX1`、`controlY1`、`controlX2`
    和 `controlY2` 是控制点。控制点 (`controlX1`, `controlY1`) 是屏幕空间中的一个点，它会影响起点 (`startX`,
    `startY`) 到曲线中点之间的线段。点 (`controlX2`, `controlY2`) 是另一个控制点，它会影响曲线中点到终点 (`endX`,
    `endY`) 之间的线段。控制点会将曲线拉向自身方向。控制点的定义是：曲线上某点处垂直于切线的直线。本示例中，控制点 1 位于曲线上方，将曲线向上拉形成山丘；控制点
    2 位于曲线下方，将曲线向下拉形成山谷。


    注意


    所有较旧的 JavaFX 2.x Builder 类在 JavaFX 8 中已被弃用。请注意，本书上一版使用了 Builder 类。在指定属性时，应优先使用构造函数和
    setter 方法，以替代已弃用的 builder 类。


    在此，我想提一下，从 JavaFX 8 开始，Oracle 的 JavaFX 团队决定弃用 JavaFX 中的许多 Builder 类。弃用 builder
    类的主要原因是 Java 6 和 7 中发现了两个错误，这些错误在 Java 8 中已修复。这些错误修复后来会导致二进制兼容性问题，从而破坏 builder
    类。要了解完整情况，请参阅附录 A 中关于 JavaFX 8 特性的部分，其中引用了关于 builder 类问题的讨论链接。了解这一点将有助于你识别较旧的
    JavaFX 2.x 代码，从而轻松进行重构。本书第一版频繁使用了 Builder 类，它们是创建 JavaFX 对象的一种优雅方式。尽管 Builder
    类已被弃用，但这并不妨碍你使用构建器模式创建 API。要创建没有关联 builder 类的对象，只需找到合适的构造函数进行实例化，或使用 setter 方法来设置对象的属性。


    ### 冰淇淋蛋筒


    冰淇淋蛋筒形状是使用 [`javafx.scene.shape.Path`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Path.html)
    类创建的。每个路径元素都被创建并添加到 `Path` 对象中。此外，每个元素都不被视为图形节点（`javafx.scene.Node`）。这意味着路径元素并非继承自
    `javafx.scene.shape.Shape` 类，因此它们不能作为场景图中的子节点。图 3-10 展示了一个冰淇淋蛋筒形状。


    ![A323804_3_En_3_Fig10_HTML.jpg](img/A323804_3_En_3_Fig10_HTML.jpg)


    图 3-10.


    使用 JavaFX 的 Path 节点绘制的冰淇淋蛋筒


    路径元素实际上继承自 `javafx.scene.shape.PathElement` 类，该类仅在 `Path` 对象的上下文中使用。因此，你无法实例化一个
    `LineTo` 类并将其放入场景图中。只需记住，后缀为 `To` 的类是路径元素，而不是 `Shape` 节点。


    例如，`MoveTo` 和 `LineTo` 对象实例是添加到 `Path` 对象中的 `Path` 元素，而不是可以添加到场景中的形状。路径元素添加的顺序就是绘制顺序。以下代码片段是将
    `Path` 元素添加到 `Path` 对象中以绘制冰淇淋蛋筒：


    ```

    // 冰淇淋

    Path path = new Path();

    MoveTo moveTo = new MoveTo();

    moveTo.setX(50);

    moveTo.setY(150);

    ...// 创建其他路径元素

    LineTo lineTo1 = new LineTo();

    lineTo1.setX(50);

    lineTo1.setY(150);

    ...// 创建其他路径元素

    path.getElements().addAll(moveTo, quadCurveTo, lineTo1, lineTo2, lineTo3);

    ```


    此代码片段摘自代码清单 3-2，为简洁起见省略了部分代码。图 3-11 描绘了冰淇淋蛋筒绘制路径元素的有序步骤。


    ![A323804_3_En_3_Fig11_HTML.jpg](img/A323804_3_En_3_Fig11_HTML.jpg)


    图 3-11.


    冰淇淋蛋筒的绘制顺序（步骤 1-5）


    *   步骤 1：`moveTo`

    *   步骤 2：`quadCurveTo`

    *   步骤 3：`lineTo1`

    *   步骤 4：`lineTo2`

    *   步骤 5：`lineTo3`


    ### 笑脸


    为了绘制笑脸形状，代码使用了 `javafx.scene.shape.QuadCurve` 类。这与前面第一个图形中描述的三次曲线示例类似。不同之处在于，这里只有一个控制点，而不是两个。同样，控制点通过将中点拉向自身来影响线条。图
    3-12 展示了一个 `QuadCurve` 形状，其控制点位于起点和终点下方，从而形成笑脸。


    ![A323804_3_En_3_Fig12_HTML.jpg](img/A323804_3_En_3_Fig12_HTML.jpg)


    图 3-12.


    二次曲线


    以下代码绘制了一条二次曲线，其描边宽度为三个像素，填充颜色为白色：


    ```

    // 一个笑脸

    QuadCurve quad = new QuadCurve(

    50, // 起点 x 坐标

    50, // 起点 y 坐标

    125,// 控制点 x 坐标

    150,// 控制点 y 坐标

    150,// 终点 x 坐标

    50);// 终点 y 坐标

    quad.setStrokeWidth(3);

    quad.setStroke(Color.BLACK);

    quad.setFill(Color.WHITE);

    ```

