  trans: "\n### LED 自定义控件\n\n发光二极管（LED）是许多电子设备中用于指示状态（如开或关）的常见元件。那么，为何不将 LED 作为代码中的自定义控件，用作视觉指示器呢？通常，一个\
    \ LED 包含两根导线和一个由透明塑料制成的本体，如图 15-14 所示。\n\n![A323804_3_En_15_Fig14_HTML.jpg](img/A323804_3_En_15_Fig14_HTML.jpg)\n\
    \n图 15-14.\n一个典型的发光二极管（LED）\n\nLED 通常安装在插座上。要创建一个模拟物理对象的自定义 JavaFX 控件，首先需要确定要描绘哪些材料和组件。\n\
    \n对于 LED 自定义 JavaFX 控件，我们可以近似模拟以下外观：\n\n*   金属插座\n*   塑料本体\n*   由于曲面而在塑料本体顶部产生的光效\n\
    \nJava 开发者通常不喜欢的一件事，但对于设计自定义控件却非常有帮助，那就是使用绘图程序。准确地说，是矢量绘图程序。当控件的外观很重要时，使用一个擅长可视化事物的工具——比如用于创建图\
    \ 15-15 的绘图程序——是很有意义的。因此，你应该做的第一件事就是为你计划创建的控件绘制一个矢量图。\n\n![A323804_3_En_15_Fig15_HTML.jpg](img/A323804_3_En_15_Fig15_HTML.jpg)\n\
    \n图 15-15.\nLED 控件的矢量图\n\n你可以看到红色塑料本体周围的金属插座和白色高光。红色本体包含内阴影和外阴影，以营造更逼真的外观。如果你查看矢量图的各个部分，会发现三个填充了渐变的圆形，如图\
    \ 15-16 所示。\n\n![A323804_3_En_15_Fig16_HTML.jpg](img/A323804_3_En_15_Fig16_HTML.jpg)\n\
    \n图 15-16.\n矢量 LED 的三个组成部分\n\n你从绘图程序开始编码，因为在这里你可以定义控件的大小、颜色、渐变和位置。使用绘图程序的一大优势是，通过更改颜色、大小和位置等参数，可以获得直接的视觉反馈。\n\
    \n在 JavaFX 中，创建自定义控件的方法不止一种，而是有很多种。以下是几种有效的方法：\n\n*   自定义现有控件的 CSS\n*   扩展现有控件\n\
    *   扩展 `Region` 节点\n*   创建控件、皮肤和 CSS 文件\n*   使用 Canvas 节点\n\n本章重点介绍扩展 `Region`\
    \ 节点并使用 CSS 的方法。要了解如何通过使用 `Canvas` 节点或使用单独的 `Control` 类、`Skin` 类和 CSS 文件来创建相同的\
    \ LED 控件，请查看 GitHub 仓库 [`http://github.com/HanSolo/JFX8CustomControls`](http://github.com/HanSolo/JFX8CustomControls)。对于本书，你可以从本书网站或以下地址获取源代码：\n\
    \n[`https://github.com/carldea/jfx9be/blob/master/chap15/JFX9CustomControls/src/jfx9controls/ledregion`](https://github.com/carldea/jfx9be/blob/master/chap15/JFX9CustomControls/src/jfx9controls/ledregion)\n\
    \n### LED 自定义控件示例代码的结构\n\n我通常按以下方式组织控件中的代码：\n\n*   构造函数\n*   初始化：\n    *   一个\
    \ `init()` 方法定义初始大小。\n    *   一个 `initGraphics()` 方法设置控件的场景图。\n    *   一个 `registerListeners()`\
    \ 方法将监听器挂接到属性上。\n*   一个 `Methods` 块包含 `get`、`set` 和 `property` 方法。\n*   一个 `Resizing`\
    \ 块包含调整控件大小和重绘控件的方法（如果需要）。\n\n### LED 控件的属性\n\nLED 控件将包含控件的逻辑（其属性）和可视化代码。由于 LED\
    \ 是一个非常简单的控件，你不需要很多属性。本示例使用了五个属性：\n\n*   `On`（当前状态的布尔属性）\n*   `Blinking`（用于开关闪烁的布尔属性）\n\
    *   `Interval`（用于定义闪烁间隔的长整型属性）\n*   `FrameVisible`（用于开关金属插座可见性的布尔属性）\n*   `LedColor`（类型为\
    \ `Color` 的对象属性，用于定义 LED 的颜色）\n\n清单 15-5 展示了这些属性的 `get`、`set` 和 `property` 方法。\n"
