  raw: '#### JavaFX Platform Module Graph


    Not much has changed between JavaFX 8 and JavaFX 9; however, JavaFX 9 is newly
    modularized. In other words, JavaFX classes has been broken out into platform
    modules as opposed to all JavaFX classes put into the `jfxrt.jar` file. When creating
    modules, you will want to know which JavaFX modules you’ll want to depend on (`requires`).


    To show JavaFX 9’s dependency graph, I recall slides describing the readability
    relationship from Jonathan Giles’ talk on JavaFX 9 – New & Noteworthy at JavaOne
    2015\. Jonathan is a JavaOne Rockstar speaker and JavaFX technical lead at Oracle
    Corp. To depict the entire JavaFX module graph, Figure [2-3](#A323804_3_En_2_Chapter.html#Fig3)
    shows all modules that depend on the `javafx.base` module .


    ![A323804_3_En_2_Fig3_HTML.jpg](A323804_3_En_2_Fig3_HTML.jpg)


    Figure 2-3.


    The entire JavaFX module graph. All derived modules depend on javafx.base


    As described, JavaFX platform modules depend on `javafx.base`. Actually, they
    all do not depend on `javafx.base`, but depend on `javafx.graphics`. The `javafx.graphics`
    module’s definition will have the `public` modifier next to the `javafx.base`,
    thus making the module `javafx.base` read accessible to derived modules of the
    `javafx.graphics` module, as shown here:


    ```

    module javafx.graphics {

    requires public javafx.base;

    }

    ```


    Also, shown in Figure [2-4](#A323804_3_En_2_Chapter.html#Fig4) are the other JavaFX
    platform modules that require the module `javafx.graphics` while having read access
    implicitly to the `javafx.base` module.


    ![A323804_3_En_2_Fig4_HTML.jpg](A323804_3_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    javafx.graphics depends on javafx.base


    Figure [2-5](#A323804_3_En_2_Chapter.html#Fig5) is the module `javafx.controls`
    depending on the module `javafx.graphics`, which ultimately depends on the j`avafx.base`
    module. Assuming you know about implicit readability, creating a module that depends
    on the `javafx.controls` means you won’t need to add a requires `javafx.graphics`
    or `javafx.base` to your module definition.


    ![A323804_3_En_2_Fig5_HTML.jpg](A323804_3_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    All JavaFX modules depend on the javafx.graphic module


    Now that you know about platform modules, let’s look at the rest of the module
    types, such as the unnamed module.


    #### Unnamed Module (Classes and Non-Jigsaw Modules on the Classpath)


    Any classes or JAR libraries loaded on the classpath will go into an unnamed module.
    Since it is a single module with no module name other application modules cannot
    reference it using the `requires` in their module definitions, hence the name
    unnamed or no name module. This unnamed module’s main purpose is to export any
    public classes to JVM. For example, if a JAR library was loaded into the unnamed
    module, all public classes can be used.


    #### Automatic Modules (JAR Files Loaded as Named Modules)


    Any legacy JAR file (non-modularized) can be converted to a named module. Instead
    of legacy JAR files used on the classpath, JARs can be put on the module path
    to be automatically converted to a named module. The current naming algorithm
    is in the Javadoc documentation on the `ModuleFinder` class of the `java.base`
    module.


    ```

    http://download.java.net/java/jigsaw/docs/api/java/lang/module/ModuleFinder.html#of-java.nio.file.Path...-

    ```


    Now that you know about all the different types of modules and how they are loaded,
    I will show you how to create a JavaFX `HelloWorld` example application using
    Java 9 modules.


    ## An Example HelloWorld JavaFX 9 Modular Application


    In this example, you will be creating a `HelloWorld` JavaFX 9 modular application.
    To build a Java 9 project, use the following steps.


    ### Create Project Structure


    Create a project directory with the following command-line statements:


    ```

    # Windows

    C:\>md \helloworld\src\

    # Mac/Linux

    $ mkdir -p helloworld/src

    ```


    Create the main module’s source directory:


    ```

    # Windows

    C:\> cd helloworld

    C:\helloworld> md \src\com.jfxbe.helloworld

    # Mac/Linux

    $ cd helloworld

    $ mkdir src/com.jfxbe.helloworld

    ```


    Create the Java package directory structure to hold your source code files.


    ```

    # Windows

    C:\helloworld> md \src\com.jfxbe.helloworld\com\jfxbe\helloworld

    # Mac/Linux

    $ mkdir -p src/com.jfxbe.helloworld/com/jfxbe/helloworld

    ```


    The following directory structure is created for the module application `helloworld`
    :


    ```

    |---- helloworld/

    |---- src/

    |---- com.jfxbe.helloworld/

    |---- com/

    |---- jfxbe/

    |---- helloworld/

    ```


    ### Create a Module Definition


    Create a file named m`odule-info.java` in the `helloworld/src/com.jfxbe.helloworld`
    directory. Define a `module-info.java` file for the `HelloWorld` module.


    ```

    module com.jfxbe.helloworld {

    requires javafx.controls;

    exports com.jfxbe.helloworld;

    }

    ```


    The following is how the directory structure should look:


    ```

    |---- helloworld/

    |---- src/

    |---- com.jfxbe.helloworld/

    |----module-info.java

    |---- com/

    |---- jfxbe/

    |---- helloworld/

    ```


    Next, you will create the JavaFX `HelloWorld` example code in the `helloworld`
    directory .


    ### Create Main Application Code


    Create the `HelloWorld.java` file to be placed in the `src/com.jfxbe.helloworld/com/jfxbe/helloworld`
    directory. Just enter the source code from Listing [2-7](#A323804_3_En_2_Chapter.html#Par166)
    into a text edit and save it. As a reminder, the package name is `com.jfxbe.helloworld`.


    ```

    package com.jfxbe.helloworld;

    import javafx.application.Application;

    import javafx.event.ActionEvent;

    import javafx.event.EventHandler;

    import javafx.scene.Group;

    import javafx.scene.Scene;

    import javafx.scene.control.Button;

    import javafx.stage.Stage;

    /**

    * A JavaFX Hello World

    * @author carldea

    */

    public class HelloWorld extends Application {

    /**

    * @param args the command line arguments

    */

    public static void main(String[] args) {

    Application.launch(args);

    }

    @Override

    public void start(Stage stage) {

    stage.setTitle("Hello World");

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250);

    Button btn = new Button();

    btn.setLayoutX(100);

    btn.setLayoutY(80);

    btn.setText("Hello World");

    btn.setOnAction(new EventHandler() {

    public void handle(ActionEvent event) {

    System.out.println("Hello World");

    }

    });

    root.getChildren().add(btn);

    stage.setScene(scene);

    stage.show();

    }

    }

    Listing 2-7.

    The Main HelloWorld Application

    ```


    ### Compile Code (Module)


    Assume you are at the directory above the `src` directory (`helloworld`) before
    compiling the source code. Next, you must compile the application as a module.


    On the Linux/MacOS X platform, do the following:


    ```

    $ javac -d mods/com.jfxbe.helloworld src/com.jfxbe.helloworld/module-info.java
    \

    src/com.jfxbe.helloworld/com/jfxbe/helloworld/HelloWorld.java

    ```


    On the Windows platform, do the following:


    ```

    C:\helloworld>javac -d mods\com.jfxbe.helloworld src\com.jfxbe.helloworld\module-info.java
    src\com.jfxbe.helloworld\com\jfxbe\helloworld\HelloWorld.java

    ```


    If you are going to use third-party modules, you will have to compile your code
    with the `--modules-path` switch to let the compiler know what additional modules
    need to be put on the module path. For example, if your `HelloWorld` module needed
    to use the class `com.xyzcompany.ServiceA` from a third-party Java 9 module named
    `com.xyzcompany.coolmodule`, you will need to add the entry into the `module-info.java`
    file and then compile the code like so:


    On the Linux/MacOS X platform, do the following:


    ```

    $ javac --modules-path mlibs -d mods/com.jfxbe.helloworld $(find src -name "*.java")

    ```


    On the Windows platform, do the following :


    ```

    C:\helloworld> javac --modules-path mlibs -d mods\com.jfxbe.helloworld src\com.jfxbe.helloworld\module-info.java
    src\com.jfxbe.helloworld\com\jfxbe\helloworld\HelloWorld.java

    ```


    The third-party module used in this example resides in the `mlibs` directory as
    a JAR file.'
  trans: '

    #### JavaFX 平台模块图


    JavaFX 8 和 JavaFX 9 之间变化不大；然而，JavaFX 9 是全新模块化的。换句话说，JavaFX 类已被分解到各个平台模块中，而不是将所有
    JavaFX 类都放入 `jfxrt.jar` 文件中。在创建模块时，您需要知道要依赖（`requires`）哪些 JavaFX 模块。


    为了展示 JavaFX 9 的依赖关系图，我回想起 Jonathan Giles 在 JavaOne 2015 上关于 JavaFX 9 – 新特性与亮点
    的演讲中描述可读性关系的幻灯片。Jonathan 是 JavaOne Rockstar 演讲者，也是 Oracle 公司的 JavaFX 技术负责人。为了描绘整个
    JavaFX 模块图，图 2-3 展示了所有依赖于 `javafx.base` 模块的模块。


    ![A323804_3_En_2_Fig3_HTML.jpg](img/A323804_3_En_2_Fig3_HTML.jpg)


    图 2-3.


    整个 JavaFX 模块图。所有派生模块都依赖于 javafx.base


    如前所述，JavaFX 平台模块依赖于 `javafx.base`。实际上，它们并非都直接依赖于 `javafx.base`，而是依赖于 `javafx.graphics`。`javafx.graphics`
    模块的定义会在 `javafx.base` 旁边使用 `public` 修饰符，从而使 `javafx.base` 模块对 `javafx.graphics`
    模块的派生模块具有读取访问权限，如下所示：


    ```

    module javafx.graphics {

    requires public javafx.base;

    }

    ```


    此外，图 2-4 展示了其他需要 `javafx.graphics` 模块的 JavaFX 平台模块，同时隐式地拥有对 `javafx.base` 模块的读取访问权限。


    ![A323804_3_En_2_Fig4_HTML.jpg](img/A323804_3_En_2_Fig4_HTML.jpg)


    图 2-4.


    javafx.graphics 依赖于 javafx.base


    图 2-5 展示了模块 `javafx.controls` 依赖于模块 `javafx.graphics`，而后者最终依赖于 `javafx.base` 模块。假设您了解隐式可读性，那么创建一个依赖于
    `javafx.controls` 的模块意味着您无需在模块定义中添加 `requires javafx.graphics` 或 `requires javafx.base`。


    ![A323804_3_En_2_Fig5_HTML.jpg](img/A323804_3_En_2_Fig5_HTML.jpg)


    图 2-5.


    所有 JavaFX 模块都依赖于 javafx.graphic 模块


    现在您已经了解了平台模块，让我们看看其他类型的模块，例如未命名模块。


    #### 未命名模块（类路径上的类和非 Jigsaw 模块）


    加载到类路径上的任何类或 JAR 库都将进入未命名模块。由于它是一个没有模块名称的单一模块，其他应用程序模块无法在其模块定义中使用 `requires` 来引用它，因此得名未命名模块或无名称模块。这个未命名模块的主要目的是将所有公共类导出到
    JVM。例如，如果一个 JAR 库被加载到未命名模块中，那么它的所有公共类都可以被使用。


    #### 自动模块（作为命名模块加载的 JAR 文件）


    任何遗留的 JAR 文件（非模块化）都可以转换为命名模块。与在类路径上使用遗留 JAR 文件不同，JAR 文件可以放在模块路径上，以自动转换为命名模块。当前的命名算法在
    `java.base` 模块的 `ModuleFinder` 类的 Javadoc 文档中。


    ```

    http://download.java.net/java/jigsaw/docs/api/java/lang/module/ModuleFinder.html#of-java.nio.file.Path...-

    ```


    现在您已经了解了所有不同类型的模块以及它们的加载方式，我将向您展示如何使用 Java 9 模块创建一个 JavaFX `HelloWorld` 示例应用程序。


    ## 一个 HelloWorld JavaFX 9 模块化应用程序示例


    在此示例中，您将创建一个 `HelloWorld` JavaFX 9 模块化应用程序。要构建一个 Java 9 项目，请遵循以下步骤。


    ### 创建项目结构


    使用以下命令行语句创建一个项目目录：


    ```

    # Windows

    C:\>md \helloworld\src\

    # Mac/Linux

    $ mkdir -p helloworld/src

    ```


    创建主模块的源目录：


    ```

    # Windows

    C:\> cd helloworld

    C:\helloworld> md \src\com.jfxbe.helloworld

    # Mac/Linux

    $ cd helloworld

    $ mkdir src/com.jfxbe.helloworld

    ```


    创建用于存放源代码文件的 Java 包目录结构。


    ```

    # Windows

    C:\helloworld> md \src\com.jfxbe.helloworld\com\jfxbe\helloworld

    # Mac/Linux

    $ mkdir -p src/com.jfxbe.helloworld/com/jfxbe/helloworld

    ```


    为模块应用程序 `helloworld` 创建了以下目录结构：


    ```

    |---- helloworld/

    |---- src/

    |---- com.jfxbe.helloworld/

    |---- com/

    |---- jfxbe/

    |---- helloworld/

    ```


    ### 创建模块定义


    在 `helloworld/src/com.jfxbe.helloworld` 目录下创建一个名为 `module-info.java` 的文件。为 `HelloWorld`
    模块定义一个 `module-info.java` 文件。


    ```

    module com.jfxbe.helloworld {

    requires javafx.controls;

    exports com.jfxbe.helloworld;

    }

    ```


    目录结构应如下所示：


    ```

    |---- helloworld/

    |---- src/

    |---- com.jfxbe.helloworld/

    |----module-info.java

    |---- com/

    |---- jfxbe/

    |---- helloworld/

    ```


    接下来，您将在 `helloworld` 目录中创建 JavaFX `HelloWorld` 示例代码。


    ### 创建主应用程序代码


    创建 `HelloWorld.java` 文件，并将其放置在 `src/com.jfxbe.helloworld/com/jfxbe/helloworld`
    目录中。只需将清单 2-7 中的源代码输入到文本编辑器中并保存即可。提醒一下，包名是 `com.jfxbe.helloworld`。


    ```

    package com.jfxbe.helloworld;

    import javafx.application.Application;

    import javafx.event.ActionEvent;

    import javafx.event.EventHandler;

    import javafx.scene.Group;

    import javafx.scene.Scene;

    import javafx.scene.control.Button;

    import javafx.stage.Stage;

    /**

    * A JavaFX Hello World

    * @author carldea

    */

    public class HelloWorld extends Application {

    /**

    * @param args the command line arguments

    */

    public static void main(String[] args) {

    Application.launch(args);

    }

    @Override

    public void start(Stage stage) {

    stage.setTitle("Hello World");

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250);

    Button btn = new Button();

    btn.setLayoutX(100);

    btn.setLayoutY(80);

    btn.setText("Hello World");

    btn.setOnAction(new EventHandler() {

    public void handle(ActionEvent event) {

    System.out.println("Hello World");

    }

    });

    root.getChildren().add(btn);

    stage.setScene(scene);

    stage.show();

    }

    }

    清单 2-7.

    主 HelloWorld 应用程序

    ```


    ### 编译代码（模块）


    假设在编译源代码之前，您位于 `src` 目录（`helloworld`）的上一级目录。接下来，您必须将应用程序作为模块进行编译。


    在 Linux/MacOS X 平台上，执行以下操作：


    ```

    $ javac -d mods/com.jfxbe.helloworld src/com.jfxbe.helloworld/module-info.java
    \

    src/com.jfxbe.helloworld/com/jfxbe/helloworld/HelloWorld.java

    ```


    在 Windows 平台上，执行以下操作：


    ```

    C:\helloworld>javac -d mods\com.jfxbe.helloworld src\com.jfxbe.helloworld\module-info.java
    src\com.jfxbe.helloworld\com\jfxbe\helloworld\HelloWorld.java

    ```


    如果您要使用第三方模块，则必须使用 `--modules-path` 开关编译代码，以告知编译器需要将哪些额外的模块添加到模块路径上。例如，如果您的 `HelloWorld`
    模块需要使用来自名为 `com.xyzcompany.coolmodule` 的第三方 Java 9 模块中的类 `com.xyzcompany.ServiceA`，您需要将条目添加到
    `module-info.java` 文件中，然后像这样编译代码：


    在 Linux/MacOS X 平台上，执行以下操作：


    ```

    $ javac --modules-path mlibs -d mods/com.jfxbe.helloworld $(find src -name "*.java")

    ```


    在 Windows 平台上，执行以下操作：


    ```

    C:\helloworld> javac --modules-path mlibs -d mods\com.jfxbe.helloworld src\com.jfxbe.helloworld\module-info.java
    src\com.jfxbe.helloworld\com\jfxbe\helloworld\HelloWorld.java

    ```


    此示例中使用的第三方模块以 JAR 文件形式存在于 `mlibs` 目录中。

