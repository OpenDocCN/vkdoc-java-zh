    body is decoded using it. If charset is `null,` then the processor tries to determine
    the character set from the `Content-encoding` header. If that charset is not supported,
    `UTF_8` is used.


    In this example, an asynchronous call `sendAsync()` method takes a valid `URI`
    consisting of a query string. Once the `URI` is created, the `newBuilder()` method
    invokes the `GET()` method to specify the HTTP method and finally invokes the
    `build()` method to return a populated object of type `HttpRequest`. Next, you
    see the common `POST` request when the client is sending larger payloads, such
    as a form submission.


    ### HTTP POST Request


    The code to make a RESTful `POST` request looks like the `GET` request in the
    previous example, except that the data submitted will not be specified as an appended
    query string such as “`?param1=1&param2=555`”. Instead, to send name/value pairs
    as a `String` payload, Listing [10-13](#A323804_3_En_10_Chapter.html#Par123) shows
    an example of a fictitious bank using an HTTP RESTful `POST` service that creates
    a new customer bank account.


    ```

    HttpRequest request = HttpRequest.newBuilder(

    URI.create("https://acmebank/create-account"))

    .POST(fromString("id=" + newSeqId + ",firstName=John,lastName=Doe"))

    .build();

    HttpClient httpClient = newHttpClient();

    httpClient.sendAsync(request, BodyHandler.discard(null))

    .whenCompleteAsync( (httpResp, throwable) -> {

    if (throwable != null){

    System.err.println("Error Saving");

    return;

    }

    System.out.println("Saving complete.");

    });

    Listing 10-13.

    A RESTful POST Request

    ```


    In Listing [10-13](#A323804_3_En_10_Chapter.html#Par123) the code makes an asynchronous
    call to create a new customer bank account. In this scenario, the `id` was passed
    in the `POST` method using the variable `newSeqId` instead of being returned in
    the HTTP response. As a demonstration of the server not returning a created customer
    `id` or any string response, the `BodyHandler.discard(null)` method was specified
    to ignore body content from the server.


    Again, regarding the second parameter of the `sendAsync()` method as it relates
    to the data returned from the server, if your server code returns an `id` generated
    after a record has been created, you’ll want to replace the second parameter of
    the `sendAsync()` method with `BodyHandler.asString()`. Once the asynchronous
    call is completed, you can call the `httpResp.body()` function to return the message
    sent from the server.


    The new HTTP2 module not only can provide request/response behavior, but it can
    also offer full-duplex or WebSockets behavior. The next section covers WebSockets.


    ### WebSockets


    WebSockets is a protocol for a two-way (full-duplex) communication using a TCP
    connection. Java 9’s `http2` module supports the creation of client-side WebSockets.
    Like the previously mentioned APIs, the WebSockets API also provides a `WebSocket.Builder`
    class for easy creation of `WebSocket` instances.'
  trans: '

    ### HTTP GET 请求


    由于 RESTful 服务超出了本书的讨论范围，我将仅详细介绍两种常见的 RESTful 调用请求——`GET` 和 `POST`。清单 10-12 展示了开发者在检索
    JSON 数据时通常执行的常见 HTTP `GET` 请求。请注意，在清单 10-12 中，`sendAsync()` 方法被用作对远程 Web 服务器的异步调用。这涉及一个后台工作线程获取数据，并在完成后收到通知。


    ```

    import static jdk.incubator.http.HttpClient.newHttpClient;

    import static jdk.incubator.http.HttpRequest.newBuilder;

    import static jdk.incubator.http.HttpResponse.BodyHandler;

    .

    .

    // ========================================================================

    // sendAsync() 和 whenCompleteAsync() 方法返回一个

    // CompletableFuture> 实例。

    // ========================================================================

    String queryStr = "http://myplace/current-weather?q=Pasadena%20MD,US&format=json";

    HttpClient.newHttpClient()

    .sendAsync(newBuilder(URI.create(queryStr))

    .GET()

    .build(),

    BodyHandler.asString())

    .whenCompleteAsync( (httpResp, throwable) -> {

    if (throwable != null){

    System.err.println(throwable.getMessage());

    return;

    }

    String json  = httpResp.body();

    System.out.println(json);

    });

    清单 10-12.

    用于检索天气数据的 RESTful GET 请求

    ```


    在清单 10-12 中，代码首先通过 `newHttpClient()` 方法创建一个 `HttpClient` 实例。`newHttpClient()`
    方法在顶部被静态导入。这使得代码更简洁、更易读，无需输入所属类名。你还会注意到其他静态导入的方法和类，例如 `newBuilder` 和 `BodyHandler`。


    创建新的 `HttpClient` 对象后，使用 `newBuilder()` 方法通过 `GET` 请求调用 `sendAsync()` 方法。为方便起见，`newBuilder()`
    方法遵循构建器模式来创建 Web 请求。传递给 `sendAsync()` 方法的第二个（最后一个）参数是 `BodyHandler` 类型。


    接下来，你将了解 Web 请求完成时的正文处理器类型和 `HttpResponse<T>` 响应对象。


    #### 正文处理器


    对于典型的 Web 请求，正文处理器只是一个 `String` 类型，但也可以检索其他正文类型。当正文处理器作为 `send()` 或 `sendAsync()`
    方法的第二个参数传入时，与返回的 `HttpResponse<T>` 相关的正文处理器类型 `T` 将是相同的。例如，`whenCompleteAsync()`
    方法将接收一个具有 `String` 类型正文处理器的 HTTP 响应。


    在清单 10-12 中，`whenCompleteAsync()` 方法在 Web 请求完成时被触发。触发后，处理器代码将接收一个 `HttpResponse<String>`
    和一个 Java `Throwable`。同样，你会注意到处理器代码调用 `httpResp.body()` 返回一个字符串。因为之前传入的 `BodyHandler.asString()`
    的数据类型是字符串，所以 `body()` 方法返回一个 `String` 类型的值。


    想知道还有哪些其他类型的正文处理器可用吗？


    根据 Java 9 Javadoc 文档，以下是一些可以检索的其他正文处理器类型：


    *   `asByteArray()`：返回一个 `BodyHandler<byte[]>`，它返回一个从 `BodyProcessor.asByteArray()`
    获取的 `BodyProcessor<byte[]>`。

    *   `asByteArrayConsumer(Consumer)`：返回一个 `BodyHandler<Void>`，它返回一个从 `BodyProcessor.asByteArrayConsumer(Consumer)`
    获取的 `BodyProcessor<Void>`。

    *   `asFileDownload(Path,OpenOption...)`：返回一个 `BodyHandler<Path>`，它返回一个 `BodyProcessor<Path>`，其中指定了下载目录，但文件名从
    `Content-Disposition` 响应头中获取。`Content-Disposition` 头必须指定附件类型，并且还必须包含一个文件名参数。如果文件名指定了多个路径组件，则仅使用最后一个组件作为文件名（使用给定的目录名）。当返回
    `HttpResponse` 对象时，正文已完全写入文件，并且 `HttpResponse.body()` 返回该文件的 `Path` 对象。返回的 `Path`
    是提供的目录名和服务器提供的文件名的组合。如果目标目录不存在或无法写入，则响应将失败并抛出 `IOException`。

    *   `discard(Object)`：返回一个响应正文处理器，它会丢弃响应正文并使用给定的值作为其替代。在 `POST` 请求期间使用。

    *   `asString(Charset)`：返回一个 `BodyHandler<String>`，它返回一个从 `BodyProcessor.asString(Charset)`
    获取的 `BodyProcessor<String>`。如果提供了字符集，则使用它对正文进行解码。如果字符集为 `null`，则处理器尝试从 `Content-encoding`
    头确定字符集。如果不支持该字符集，则使用 `UTF_8`。


    在此示例中，异步调用 `sendAsync()` 方法接受一个由查询字符串组成的有效 `URI`。创建 `URI` 后，`newBuilder()` 方法调用
    `GET()` 方法来指定 HTTP 方法，最后调用 `build()` 方法返回一个填充了 `HttpRequest` 类型的对象。接下来，你将看到客户端发送较大负载（例如表单提交）时的常见
    `POST` 请求。


    ### HTTP POST 请求


    进行 RESTful `POST` 请求的代码看起来与上一个示例中的 `GET` 请求类似，不同之处在于提交的数据不会指定为附加的查询字符串，例如“`?param1=1&param2=555`”。相反，为了将名称/值对作为
    `String` 负载发送，清单 10-13 展示了一个虚构银行使用 HTTP RESTful `POST` 服务创建新客户银行账户的示例。


    ```

    HttpRequest request = HttpRequest.newBuilder(

    URI.create("https://acmebank/create-account"))

    .POST(fromString("id=" + newSeqId + ",firstName=John,lastName=Doe"))

    .build();

    HttpClient httpClient = newHttpClient();

    httpClient.sendAsync(request, BodyHandler.discard(null))

    .whenCompleteAsync( (httpResp, throwable) -> {

    if (throwable != null){

    System.err.println("Error Saving");

    return;

    }

    System.out.println("Saving complete.");

    });

    清单 10-13.

    一个 RESTful POST 请求

    ```


    在清单 10-13 中，代码进行异步调用以创建新的客户银行账户。在此场景中，`id` 通过变量 `newSeqId` 在 `POST` 方法中传递，而不是在
    HTTP 响应中返回。为了演示服务器不返回创建的客户 `id` 或任何字符串响应，指定了 `BodyHandler.discard(null)` 方法来忽略来自服务器的正文内容。


    再次强调，关于 `sendAsync()` 方法的第二个参数与服务器返回的数据的关系，如果你的服务器代码在记录创建后返回一个生成的 `id`，则需要将 `sendAsync()`
    方法的第二个参数替换为 `BodyHandler.asString()`。异步调用完成后，你可以调用 `httpResp.body()` 函数来返回服务器发送的消息。


    新的 HTTP2 模块不仅可以提供请求/响应行为，还可以提供全双工或 WebSockets 行为。下一节将介绍 WebSockets。


    ### WebSockets


    WebSockets 是一种使用 TCP 连接进行双向（全双工）通信的协议。Java 9 的 `http2` 模块支持创建客户端 WebSockets。与前面提到的
    API 类似，WebSockets API 也提供了一个 `WebSocket.Builder` 类，用于轻松创建 `WebSocket` 实例。

    '
- fmt: "### Server-Side Sockets\n\nThis section doesn’t show you example code for\
    \ the server side relating to WebSockets. Since there are literally tons of server-side\
    \ solutions out in the wild, I suggest you search on the web and pick one. I will\
    \ basically present client-side code using Java 9’s `http2` module to talk to\
    \ a WebSocket that essentially is an echo server.\n\nFor a WebSocket-based server-side\
    \ solution, here are some solutions that I found on the Internet:\n\n- Netty:\
    \ [`https://netty.io`](https://netty.io)\n- Vert.x: [`http://vertx.io`](http://vertx.io)\n\
    - Spark: [`http://sparkjava.com`](http://sparkjava.com)\n- JEE 7 vendors:\n  \
    \  - Spring WebSocket: [`https://docs.spring.io/spring/docs/current/spring-framework-reference/html/websocket.html`](https://docs.spring.io/spring/docs/current/spring-framework-reference/html/websocket.html)\n\
    \    - Jetty: [`http://www.eclipse.org/jetty`](http://www.eclipse.org/jetty)\n\
    \nTo test my client-side code, I’ve used Spark Java the embedded web server at\
    \ [`http://sparkjava.com`](http://sparkjava.com). They have great examples to\
    \ create REST APIs and server-side WebSockets. Their documentation shows you how\
    \ to create a simple echo server that returns what the client sends. To see their\
    \ implementation of an echo server, visit Spark Java’s topic on WebSockets at\
    \ [`http://sparkjava.com/documentation`](http://sparkjava.com/documentation) `-\
    \ embedded-web-server`.\n\nTo obtain the Spark library, here are the Maven and\
    \ Gradle coordinates.\n\nMaven coordinates for Spark Java:\n\n```\ncom.sparkjava\n\
    spark-core\n2.6.0\n```\n\nGradle coordinate notation for Spark Java:\n\n```\n\
    compile \"com.sparkjava:spark-core:2.6.0\"\n```\n\n### Client-Side Sockets\n\n\
    On the client side, you will be creating a WebSocket to connect to the server.\
    \ To create a WebSocket from an `HttpClient` class, you can invoke the static\
    \ `newWebSocketBuilder()` method. The method takes two parameters—a `URI` and\
    \ a `WebSocket.Listener` object. Listing [10-14](#A323804_3_En_10_Chapter.html#Par143)\
    \ creates a WebSocket connection to an echo server with a URL of `ws://localhost:4567/echo`.\
    \ By default, Spark uses port 4567.\n\n```\nHttpClient client = HttpClient.newHttpClient();\n\
    WebSocket clientWebSocket = client.newWebSocketBuilder(\nURI.create(\"ws://localhost:4567/echo\"\
    ),\nnew ClientSocketListener())\n.buildAsync().join();\n// Send the server two\
    \ messages\nclientWebSocket.sendText(\"Hello World 1\" + new Date());\nclientWebSocket.sendText(\"\
    Hello World 2\" + new Date());\nListing 10-14.\nCreating a Client WebSocket to\
    \ Send Text Over TCP/IP. The Server Will Return the Sent Message Back to the Client\n\
    ```\n\nListing [10-14](#A323804_3_En_10_Chapter.html#Par143) creates an `HttpClient`\
    \ instance first and then calls the `newWebSocketBuilder()` to create a `WebSocket.Builder`\
    \ instance. After passing in the `URI` the second parameter is a new `ClientSocketListener`\
    \ instance. To finish the builder, a call to `buildAsync()` will return a `CompletableFuture<WebSocket>`.\
    \ After calling `buildAsync()` a call to the `join()` method will cause it to\
    \ block and wait to return the `WebSocket` instance. After creating the WebSocket,\
    \ the `sendText()` method is invoked to send text to the server.\n\nThe `ClientSocketListener`\
    \ class shown in Listing [10-15](#A323804_3_En_10_Chapter.html#Par146) is responsible\
    \ for handler code when communicating to the server. The only one that is really\
    \ implemented is the `onText()` method.\n\n```\nclass ClientSocketListener implements\
    \ WebSocket.Listener {\n@Override\npublic void onOpen(WebSocket webSocket) {\n\
    System.out.println(\"onOpen\");\n}\n@Override\npublic CompletionStage onBinary(WebSocket\
    \ webSocket, ByteBuffer message, WebSocket.MessagePart part) {\nSystem.out.println(\"\
    onBinary\");\nreturn null;\n}\n@Override\npublic CompletionStage onPing(WebSocket\
    \ webSocket, ByteBuffer message) {\nSystem.out.println(\"onPing\");\nreturn null;\n\
    }\n@Override\npublic CompletionStage onPong(WebSocket webSocket, ByteBuffer message)\
    \ {\nSystem.out.println(\"onPong\");\nreturn null;\n}\n@Override\npublic CompletionStage\
    \ onClose(WebSocket webSocket, int statusCode, String reason) {\nSystem.out.println(\"\
    onClose\");\nreturn null;\n}\n@Override\npublic void onError(WebSocket webSocket,\
    \ Throwable error) {\nSystem.out.println(\"onError\");\n}\n@Override\npublic CompletionStage\
    \ onText(WebSocket webSocket,\nCharSequence message,\nWebSocket.MessagePart part)\
    \ {\nSystem.out.println(\"onText\");\n// request for one message\nwebSocket.request(1);\n\
    // Receive message from server.\nreturn CompletableFuture.completedFuture(message)\n\
    .thenAccept(System.out::println);\n}\n}\nListing 10-15.\nAn Client Socket Listener\
    \ Class to Respond to the Echo Server\n```\n\nIn Listing [10-15](#A323804_3_En_10_Chapter.html#Par146),\
    \ the methods are basically all the events and callbacks when messages are received\
    \ from the server. You will notice that the `onText()` method will return an instance\
    \ of:\n\n```\nCompletableFuture\n```\n\nBecause the messages are asynchronous,\
    \ the `thenAccept()` method is triggered when the message is complete. Once complete,\
    \ the message of type `CharSequence` will be printed to the console.\n\nWell there\
    \ you have it, a brief code example on WebSockets. I’m sure you are excited about\
    \ fetching and posting data; however, maintain that enthusiasm as you’ll now see\
    \ how to display data using JavaFX!\n\n### Viewing HTML5 Content (WebView)\n\n\
    Now that you’ve seen various strategies for fetching web-based content, you will\
    \ finally get a chance to display HTML5 web content using the powerful JavaFX\
    \ `WebView` node.\n\nJavaFX provides a GUI `WebView` (`javafx.scene.web.WebView`)\
    \ node that can render HTML5 content onto the Scene graph. A `WebView` node is\
    \ basically a mini-browser UI component that can respond to web events and allows\
    \ a developer to interact with the HTML5 content. Because of the close relationship\
    \ between loading web content and the ability to display web content, the `WebView`\
    \ node object also contains a `WebEngine` instance.\n\nTo whet your appetite in\
    \ this section, I’ve created an example that uses the `WebView` API to render\
    \ HTML5 content. The example is a JavaFX application that displays an SVG-based\
    \ analog clock. To obtain the full source code, visit the book’s web site and\
    \ download the `DisplayingHtml5Content` project."
