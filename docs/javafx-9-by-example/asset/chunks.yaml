- fmt: '### `WebEngine`’s `loadContent()` Method


    One additional way to load HTML5 content is by using the web engine’s `loadContent(String
    htmlText)` method and accepting a string. What’s nice about the `loadContent()`
    method is that HTML content represented as a string can be pre-generated without
    having to fetch web pages from a remote server. The following code snippet loads
    a string representing HTML content:


    ```

    webEngine.loadContent("JavaFX Rocks!");

    ```


    Now that you know two strategies to load HTML content, you will see how to obtain
    and manipulate the raw content, along with common types of data formats that may
    be obtained from the web engine object after the web content is loaded.


    ## HTML DOM Content


    The web engine can load the current page’s document object model (DOM) as XML
    content following the W3C standards-based APIs for Java. Typically, developers
    who are familiar with an XML Document Object Model (DOM) can easily interrogate
    `org.w3c.dom.Document` objects. This section shows you how to obtain a W3C XML
    `Document` object and the raw XML as a `String` object.


    ### Obtaining an `org.w3c.dom.Document` (DOM) Object


    After a web engine instance successfully loads HTML content, an XML DOM can be
    obtained by invoking the `WebEngine` object’s `getDocument()` method.


    The following code snippet obtains a document (`org.w3c.dom.Document`) instance,
    assuming the web engine is finished loading the HTML or XML content.


    ```

    webEngine.getLoadWorker()

    .stateProperty()

    .addListener( (obs, oldValue, newValue) -> {

    if (newValue == SUCCEEDED) {

    org.w3c.dom.Document xmlDom = webEngine.getDocument();

    // Do something here with xmlDom

    }

    });

    webEngine.load("http://myserver.com/my_cool_xml:data.xml");

    ```


    ### Using Raw XML Content as a String


    Depending on the situation, sometimes it is necessary to obtain the raw XML data
    as a string of text. Developers often use libraries such as `JDOM` or `dom4j`
    to convert easily between the two data format types. Listing [10-2](#A323804_3_En_10_Chapter.html#Par50)
    shows how to convert from an `org.w3c.dom.Document` object to a `String` object
    without the need of using the previous mentioned XML parsing libraries.


    ```

    TransformerFactory transformerFactory = TransformerFactory.newInstance();

    Transformer transformer = transformerFactory.newTransformer();

    StringWriter stringWriter = new StringWriter();

    transformer.transform(new DOMSource(webEngine.getDocument()),

    new StreamResult(stringWriter));

    String xml = stringWriter.getBuffer().toString();

    System.out.println(xml);

    Listing 10-2.

    Converting an XML DOM into a String

    ```


    The output of Listing [10-2](#A323804_3_En_10_Chapter.html#Par50) is shown here:


    ```

    Tracey

    Dea


    Carl

    Dea

    ```


    ### The JavaScript Bridge


    Early in this chapter, I discussed how the underlying web engine uses WebKit to
    load and interact with HTML5 content. What does it mean to interact with HTML5
    content? JavaFX’s `WebEngine` API has a JavaScript bridge that allows Java code
    to invoke JavaScript functions or script code inside HTML5 content. So, another
    question would be how then does one obtain the raw HTML5 content as a string?


    Some common use cases out in the field are the following: obtaining raw HTML content
    for web crawling (used in search engines), caching web pages, screen scraping,
    data mining, and data analysis. To obtain the raw HTML5, you will need to interact
    with the JavaScript engine in WebKit to access the web content’s DOM using the
    `WebEngine`’s `executeScript()` method. The following code statement accesses
    the HTML document (DOM) to obtain the raw content from the `documentElement.outerHTML`
    (the top-most element):


    ```

    String html = (String) webEngine.executeScript("document.documentElement.outerHTML");

    ```


    ### Communicating from Java to JavaScript


    Another example of using the method `executeScript()` is shown in Listing [10-3](#A323804_3_En_10_Chapter.html#Par57),
    where the code calls into a JavaScript function `sayHello()` to add text into
    an existing HTML `DIV` element with an `id` of `my_message`. The HTML file containing
    the function `sayHello()` is shown in Listing [10-4](#A323804_3_En_10_Chapter.html#Par59).


    ```

    // From Java Code

    webEngine.executeScript("sayHello(''Hi there'');");

    Listing 10-3.

    Java Calling a JavaScript Function

    ```


    The Java code in Listing [10-3](#A323804_3_En_10_Chapter.html#Par57) calls the
    JavaScript function `sayHello()` to update the `DIV` element with an `id` of `my_message`.
    Listing [10-4](#A323804_3_En_10_Chapter.html#Par59) shows the HTML file containing
    the `sayHello()` function and the `DIV` element. Notice the code will retrieve
    the DIV element using the DOM’s function `document.getElementById()`. To see more
    about JavaScript and how to manipulate the DOM, visit:


    `https://developer.mozilla.org/en-US/docs/Web/API/Document`


    ```

    function sayHello( msg ) {

    document.getElementById(''my_message'').innerHTML = msg;

    }


    .

    .


    Listing 10-4.

    An HTML File Containing the sayHello() Function

    ```


    Being able to call JavaScript is a powerful facility that allows Java code to
    use the `WebEngine` object’s JavaScript engine to manipulate the DOM. But what
    about JavaScript code talking back to Java code?'
  raw: '### WebEngine’s loadContent( ) Method


    One additional way to load HTML5 content is by using the web engine’s `loadContent(String
    htmlText)` method and accepting a string. What’s nice about the `loadContent()`
    method is that HTML content represented as a string can be pre-generated without
    having to fetch web pages from a remote server. The following code snippet loads
    a string representing HTML content:


    ```

    webEngine.loadContent("JavaFX Rocks!");

    ```


    Now that you know two strategies to load HTML content, you will see how to obtain
    and manipulate the raw content, along with common types of data formats that may
    be obtained from the web engine object after the web content is loaded.


    ## HTML DOM Content


    The web engine can load the current page’s document object model (DOM) as XML
    content following the W3C standards-based APIs for Java. Typically, developers
    who are familiar with an XML Document Object Model (DOM) can easily interrogate
    `org.w3c.dom.Document` objects. This section shows you how to obtain a W3C XML
    `Document` object and the raw XML as a `String` object.


    ### Obtaining an org.w3c.dom.Document (DOM) Object


    After a web engine instance successfully loads HTML content, an XML DOM can be
    obtained by invoking the `WebEngine` object’s `getDocument()` method.


    The following code snippet obtains a document (`org.w3c.dom.Document`) instance,
    assuming the web engine is finished loading the HTML or XML content.


    ```

    webEngine.getLoadWorker()

    .stateProperty()

    .addListener( (obs, oldValue, newValue) -> {

    if (newValue == SUCCEEDED) {

    org.w3c.dom.Document xmlDom = webEngine.getDocument();

    // Do something here with xmlDom

    }

    });

    webEngine.load("http://myserver.com/my_cool_xml:data.xml");

    ```


    ### Using Raw XML Content as a String


    Depending on the situation, sometimes it is necessary to obtain the raw XML data
    as a string of text. Developers often use libraries such as JDOM or dom4j to convert
    easily between the two data format types. Listing [10-2](#A323804_3_En_10_Chapter.html#Par50)
    shows how to convert from an `org.w3c.dom.Document` object to a `String` object
    without the need of using the previous mentioned XML parsing libraries.


    ```

    TransformerFactory transformerFactory = TransformerFactory.newInstance();

    Transformer transformer = transformerFactory.newTransformer();

    StringWriter stringWriter = new StringWriter();

    transformer.transform(new DOMSource(webEngine.getDocument()),

    new StreamResult(stringWriter));

    String xml = stringWriter.getBuffer().toString();

    System.out.println(xml);

    Listing 10-2.

    Converting an XML DOM into a String

    ```


    The output of Listing [10-2](#A323804_3_En_10_Chapter.html#Par50) is shown here:


    ```


    Tracey

    Dea


    Carl

    Dea


    ```


    ### The JavaScript Bridge


    Early in this chapter, I discussed how the underlying web engine uses WebKit to
    load and interact with HTML5 content. What does it mean to interact with HTML5
    content? JavaFX’s `WebEngine` API has a JavaScript bridge that allows Java code
    to invoke JavaScript functions or script code inside HTML5 content. So, another
    question would be how then does one obtain the raw HTML5 content as a string?


    Some common use cases out in the field are the following: obtaining raw HTML content
    for web crawling (used in search engines), caching web pages, screen scraping,
    data mining, and data analysis. To obtain the raw HTML5, you will need to interact
    with the JavaScript engine in WebKit to access the web content’s DOM using the
    WebEngine’s `executeScript()` method. The following code statement accesses the
    HTML document (DOM) to obtain the raw content from the `documentElement.outerHTML`
    (the top-most element):


    ```

    String html = (String) webEngine.executeScript("document.documentElement.outerHTML");

    ```


    ### Communicating from Java to JavaScript


    Another example of using the method `executeScript()` is shown in Listing [10-3](#A323804_3_En_10_Chapter.html#Par57),
    where the code calls into a JavaScript function `sayHello()` to add text into
    an existing HTML `DIV` element with an `id` of `my_message`. The HTML file containing
    the function `sayHello()` is shown in Listing [10-4](#A323804_3_En_10_Chapter.html#Par59).


    ```

    // From Java Code

    webEngine.executeScript("sayHello(''Hi there'');");

    Listing 10-3.

    Java Calling a JavaScript Function

    ```


    The Java code in Listing [10-3](#A323804_3_En_10_Chapter.html#Par57) calls the
    JavaScript function `sayHello()` to update the `DIV` element with an `id` of `my_message`.
    Listing [10-4](#A323804_3_En_10_Chapter.html#Par59) shows the HTML file containing
    the `sayHello()` function and the `DIV` element. Notice the code will retrieve
    the DIV element using the DOM’s function `document.getElementById()`. To see more
    about JavaScript and how to manipulate the DOM, visit:


    `https://developer.mozilla.org/en-US/docs/Web/API/Document`


    ```

    function sayHello( msg ) {

    document.getElementById(''my_message'').innerHTML = msg;

    }


    .

    .


    Listing 10-4.

    An HTML File Containing the sayHello() Function

    ```


    Being able to call JavaScript is a powerful facility that allows Java code to
    use the `WebEngine` object’s JavaScript engine to manipulate the DOM. But what
    about JavaScript code talking back to Java code?'
  trans: '

    ### WebEngine 的 loadContent() 方法


    加载 HTML5 内容的另一种方式是使用 Web 引擎的 `loadContent(String htmlText)` 方法并接受一个字符串。`loadContent()`
    方法的优点在于，可以预先生成表示为字符串的 HTML 内容，而无需从远程服务器获取网页。以下代码片段加载了一个表示 HTML 内容的字符串：


    ```

    webEngine.loadContent("JavaFX Rocks!");

    ```


    现在你已经了解了加载 HTML 内容的两种策略，接下来将看到如何获取和操作原始内容，以及 Web 内容加载后可能从 Web 引擎对象获取的常见数据类型。


    ## HTML DOM 内容


    Web 引擎可以按照基于 W3C 标准的 Java API，将当前页面的文档对象模型（DOM）作为 XML 内容加载。通常，熟悉 XML 文档对象模型（DOM）的开发者可以轻松查询
    `org.w3c.dom.Document` 对象。本节将展示如何获取 W3C XML `Document` 对象以及作为 `String` 对象的原始 XML。


    ### 获取 org.w3c.dom.Document（DOM）对象


    在 Web 引擎实例成功加载 HTML 内容后，可以通过调用 `WebEngine` 对象的 `getDocument()` 方法来获取 XML DOM。


    以下代码片段获取了一个文档（`org.w3c.dom.Document`）实例，前提是 Web 引擎已完成 HTML 或 XML 内容的加载。


    ```

    webEngine.getLoadWorker()

    .stateProperty()

    .addListener( (obs, oldValue, newValue) -> {

    if (newValue == SUCCEEDED) {

    org.w3c.dom.Document xmlDom = webEngine.getDocument();

    // 在此处对 xmlDom 进行操作

    }

    });

    webEngine.load("http://myserver.com/my_cool_xml:data.xml");

    ```


    ### 将原始 XML 内容作为字符串使用


    根据具体情况，有时需要将原始 XML 数据作为文本字符串获取。开发者通常使用 JDOM 或 dom4j 等库来轻松地在两种数据类型之间进行转换。清单 10-2
    展示了如何将 `org.w3c.dom.Document` 对象转换为 `String` 对象，而无需使用前面提到的 XML 解析库。


    ```

    TransformerFactory transformerFactory = TransformerFactory.newInstance();

    Transformer transformer = transformerFactory.newTransformer();

    StringWriter stringWriter = new StringWriter();

    transformer.transform(new DOMSource(webEngine.getDocument()),

    new StreamResult(stringWriter));

    String xml = stringWriter.getBuffer().toString();

    System.out.println(xml);

    清单 10-2.

    将 XML DOM 转换为字符串

    ```


    清单 10-2 的输出如下所示：


    ```


    Tracey

    Dea


    Carl

    Dea


    ```


    ### JavaScript 桥接


    在本章开头，我讨论了底层 Web 引擎如何使用 WebKit 加载 HTML5 内容并与之交互。与 HTML5 内容交互意味着什么？JavaFX 的 `WebEngine`
    API 有一个 JavaScript 桥接，允许 Java 代码调用 HTML5 内容中的 JavaScript 函数或脚本代码。那么，另一个问题是如何将原始
    HTML5 内容作为字符串获取？


    实际应用中一些常见的用例包括：获取原始 HTML 内容用于网络爬虫（用于搜索引擎）、缓存网页、屏幕抓取、数据挖掘和数据分析。要获取原始 HTML5，你需要与
    WebKit 中的 JavaScript 引擎交互，使用 WebEngine 的 `executeScript()` 方法访问 Web 内容的 DOM。以下代码语句访问
    HTML 文档（DOM），从 `documentElement.outerHTML`（最顶层元素）获取原始内容：


    ```

    String html = (String) webEngine.executeScript("document.documentElement.outerHTML");

    ```


    ### 从 Java 到 JavaScript 的通信


    使用 `executeScript()` 方法的另一个示例见清单 10-3，其中代码调用了一个 JavaScript 函数 `sayHello()`，将文本添加到现有的、`id`
    为 `my_message` 的 HTML `DIV` 元素中。包含 `sayHello()` 函数的 HTML 文件如清单 10-4 所示。


    ```

    // 来自 Java 代码

    webEngine.executeScript("sayHello(''Hi there'');");

    清单 10-3.

    Java 调用 JavaScript 函数

    ```


    清单 10-3 中的 Java 代码调用了 JavaScript 函数 `sayHello()`，以更新 `id` 为 `my_message` 的 `DIV`
    元素。清单 10-4 展示了包含 `sayHello()` 函数和 `DIV` 元素的 HTML 文件。请注意，代码将使用 DOM 的 `document.getElementById()`
    函数来获取 DIV 元素。要了解更多关于 JavaScript 以及如何操作 DOM 的信息，请访问：


    `https://developer.mozilla.org/en-US/docs/Web/API/Document`


    ```

    function sayHello( msg ) {

    document.getElementById(''my_message'').innerHTML = msg;

    }


    .

    .


    清单 10-4.

    包含 sayHello() 函数的 HTML 文件

    ```


    能够调用 JavaScript 是一项强大的功能，它允许 Java 代码使用 `WebEngine` 对象的 JavaScript 引擎来操作 DOM。但是，JavaScript
    代码如何与 Java 代码进行通信呢？

    '
- fmt: '### Communicating from JavaScript to Java


    Java 8 allows JavaScript code to make calls into Java code. Allowing JavaScript
    to call Java code means that web developers can now take advantage of many Java
    APIs. In this section, we briefly discuss how to allow JavaScript code to communicate
    with Java code.


    Enabling JavaScript to talk to Java is easy. The first step is obtaining the `WebEngine`
    object’s `JSObject` object via a call to the method `executeScript("window")`.
    The `JSObject` is a wrapper object to allow the bridge between the two languages.


    After obtaining the `JSObject`, any object can be passed into the JavaScript engine’s
    context simply by invoking the `setMember()` method. To invoke the `setMember()`
    method, you pass in a string name and the corresponding object. Assuming the member
    object has public instance methods, the JavaScript code can access them. Listing
    [10-5](#A323804_3_En_10_Chapter.html#Par65) shows how to set up the `JSObject`
    for the JavaScript engine to talk to Java.


    ```

    // The web view''s web engine

    webView.getEngine()

    .getLoadWorker()

    .stateProperty()

    .addListener( (obs, oldValue, newValue) -> {

    if (newValue == Worker.State.SUCCEEDED) {

    // Let JavaScript make upcalls to this (Java) class

    JSObject jsobj = (JSObject) webView.getEngine()

    .executeScript("window");

    jsobj.setMember("ABCD", new HelloWorld() );

    } });

    Listing 10-5.

    Allowing JavaScript Code to Make Upcalls to Java Code

    ```


    You can see in Listing [10-5](#A323804_3_En_10_Chapter.html#Par65) that the `HelloWorld`
    class instance is set as a member in the (`JSObject`) object. Listing [10-6](#A323804_3_En_10_Chapter.html#Par67)
    shows the simple `HelloWorld` class with a `sayGoodbye()` method.


    ```

    public class HelloWorld () {

    public String sayGoodbye(String name) {

    return "Hasta la vista " + name;

    }

    }

    Listing 10-6.

    Java Class with the Public Method sayGoodbye()

    ```


    After you’ve set a `HelloWorld` instance as a `JSObject` member named `ABCD`,
    the JavaScript function `sayGoodbye()` shown in Listing [10-7](#A323804_3_En_10_Chapter.html#Par69)
    can now invoke the Java method `ABCD.sayGoodbye()`.


    ```

    .

    .


    function sayGoodbye(name) {

    var message = ABCD.sayGoodbye(name);

    document.getElementById(''my_message'').innerHTML = message;

    }


    .

    .


    Listing 10-7.

    JavaScript Code Calling Java Code

    ```


    As a warning, be careful exposing methods that can allow client code to gain access
    and, thus, potentially harm or view private data.


    **Caution**


    Because JavaScript code has the capability to make calls into Java, it is very
    important to make sure you aren’t exposing APIs that could potentially harm systems
    or view private data.


    As mentioned earlier in the chapter, the `WebEngine` object is a non-GUI component
    capable of loading web content, so you might be wondering if it is possible to
    make web service calls capable of retrieving serialized data that has different
    data formats such as the popular JSON format. To answer this question, you will
    want to know the `WebEngine` API’s responsibilities and limitations.


    When using JavaFX’s `WebEngine` API to request web content such as HTML, JSON,
    and XML data, you will encounter some limitations; some of these involve the ability
    to fetch (`GET`) data from or submit (`POST`) data to a web server asynchronously.
    These types of web requests are called RESTful services.


    Of course, there are a handful of interesting ways (hacks) to get JSON data using
    the `WebEngine` object by calling into the HTML DOM to obtain text content. Listing
    [10-8](#A323804_3_En_10_Chapter.html#Par75) is an example of how to obtain the
    JSON text content inside of its HTML DOM.


    ```

    webEngine.load("http://myserver.org/current-weather?format=json");

    .

    .

    .

    // handler code to obtain JSON data.

    String json = (String) webEngine.getDocument()

    .getElementsByTagName("body")

    .item(0)

    .getTextContent();

    Listing 10-8.

    Obtaining the JSON Text Inside the DOM

    ```


    The handler code traverses the HTML’s DOM to obtain text content retrieved from
    the web engine object. Even though it looks easy to implement to get JSON data
    as a string, I do not recommend using this approach because it is rather fragile
    and nonstandard. From a code-maintenance standpoint, the code could be taken out
    of context and a potential bug could surface in the future. I’m sure you’ve heard
    the phrase “Just because you can do something doesn’t mean you should.”


    You will quickly find that the `WebEngine` API’s responsibility is basically for
    loading HTML5 and interacting with its content (HTML/JavaScript). The `WebEngine`
    API is not responsible for making web service calls or serializing data with different
    transport protocols.


    So, is there a better way to make web requests (RESTful)? Of course there is.
    While there are many libraries you could choose from that simplify web service
    calls, the next section shows you how to do things using Java 9’s new experimental
    module called `jdk.incubator.httpclient`.'
