- fmt: "```java\npackage com.jfxbe.weatherwidget;\n// Other imports omitted...\nimport\
    \ static jdk.incubator.http.HttpClient.newHttpClient;\nimport static jdk.incubator.http.HttpRequest.newBuilder;\n\
    import static jdk.incubator.http.HttpResponse.BodyHandler;\n/**\n* The WeatherWidget\
    \ application demonstrates the\n* use of the following interactions:\n* \n*  1)\
    \ Communications from Java to JavaScript\n*  2) Communications from JavaScript\
    \ to Java\n*  3) RESTful GET Web service end point\n*  4) Manipulate JSON Objects\n\
    *  5) Handle HTML/JavaScript WebEvents\n*  6) Debugging using Firebug lite\n*\
    \ \n*\n* \n*     The following are the steps to help\n*     demonstrate the above\
    \ interactions:\n*\n* Step 1: The user enters a city state and country into the\n\
    *         search text field. (See weather_template.html)\n* Step 2: After search\
    \ button is pressed the JavaScript function\n*         findWeatherByLocation()\
    \ is called. (See weather_template.html)\n* Step 3: An up call from JavaScript\
    \ to Java is made to the method\n*         WeatherWidget.queryWeatherByLocationAndUnit().\
    \ (See this class)\n* Step 4: After querying the weather data the JSON data is\
    \ passed to\n*         the Java method populateWeatherData(). This method will\
    \ call\n*         the JavaScript function populateWeatherData(). (See this class)\n\
    * Step 5: Populates the HTML page with the JavaScript function\n*         populateWeatherDate()\
    \ (See weather_template.html)\n*\n* \n*\n* It is required to obtain a valid API\
    \ key to query weather data.\n* To obtain an API key head over to Open Weather\
    \ Map at\n* http://openweathermap.org\n*\n* @author cdea\n*/\npublic class WeatherWidget\
    \ extends Application {\n/** The main URL of the current weather REST end point.\
    \ */\npublic static final String WEATHER_URL = \"http://api.openweathermap.org/data/2.5/weather\"\
    ;\n/** A local file containing a valid API key. */\npublic static final String\
    \ API_KEY_FILE = \".openweathermap-api-key\";\n/** The API key to access weather\
    \ and map data. */\nprivate static String API_KEY = null;\n/** The Weather display\
    \ HTML page */\npublic static final String WEATHER_DISPLAY_TEMPLATE_FILE = \"\
    weather_template.html\";\n/** A WebView node to display HTML5 content */\nprivate\
    \ WebView webView;\n/** A singleton http client to make http requests */\nprivate\
    \ static HttpClient HTTP_CLIENT;\n@Override\npublic void start(Stage stage) {\n\
    stage.setTitle(\"Weather Widget\");\nwebView = new WebView();\nScene scene = new\
    \ Scene(webView, 300, 300);\nstage.setScene(scene);\n// obtain API key\nloadAPIKey();\n\
    // Turns on Firebug lite for debugging\n// html,css, javascript\n// enableFirebug(webView);\n\
    // The web view's web engine\nwebView.getEngine()\n.getLoadWorker()\n.stateProperty()\n\
    .addListener( (obs, oldValue, newValue) -> {\nif (newValue == Worker.State.SUCCEEDED)\
    \ {\n// Let JavaScript make up calls to this (Java) class\nJSObject jsobj = (JSObject)\n\
    webView.getEngine()\n.executeScript(\"window\");\njsobj.setMember(\"WeatherWidget\"\
    , this);\n// default city's weather (a sunny place)\nqueryWeatherByLocationAndUnit(\"\
    Miami,FL\", \"c\");\n}\n});\n// Display a JavaFX dialog window explaining the\
    \ error\nwebView.getEngine().setOnAlert((WebEvent t) -> {\nSystem.out.println(\"\
    Alert Event - Message: \" + t.getData());\nshowErrorDialog(t.getData());\n});\n\
    // Load HTML template to display weather\nwebView.getEngine()\n.load(getClass()\n\
    .getResource(WEATHER_DISPLAY_TEMPLATE_FILE)\n.toExternalForm());\nstage.show();\n\
    }\n/**\n* If an API key file doesn't exist prompt the user to enter their key.\n\
    * Once a valid key is saved into a file named .openweathermap-api-key\n* The application\
    \ will use it to fetch weather data.\n*/\nprivate void loadAPIKey() {\n// Load\
    \ API key from local file\nFile keyFile = new File(System.getProperty(\"user.home\"\
    ) + \"/\" + API_KEY_FILE);\n// Check for file's existence and read/write privileges.\n\
    if (keyFile.exists() && keyFile.canRead() && keyFile.canWrite()) {\ntry (FileInputStream\
    \ fis = new FileInputStream(keyFile)){\nOptional apiKey = Optional.ofNullable(streamToString(fis));\n\
    apiKey.ifPresent(apiKeyStr -> API_KEY = apiKeyStr);\n} catch (Exception e) {\n\
    Platform.exit();\nreturn;\n}\n} else {\n// If the API key does not exist display\
    \ dialog box.\nTextInputDialog dialog = new TextInputDialog(\"\");\ndialog.setTitle(\"\
    Enter API Key\");\ndialog.setHeaderText(\"Don't have a key? Go to: Open Weather\
    \ Map http://openweathermap.org\");\ndialog.setContentText(\"Please enter API\
    \ Key:\");\nOptional result = dialog.showAndWait();\nresult.ifPresent(key -> {\n\
    // write to disk\ntry (FileOutputStream fos = new FileOutputStream(keyFile)) {\n\
    String apiKey = result.get();\nfos.write(apiKey.getBytes());\nfos.flush();\nAPI_KEY\
    \ = apiKey;\n} catch (Exception e) {\ne.printStackTrace();\nPlatform.exit();\n\
    return;\n}\n});\n}\n}\n/**\n* Display error dialog window.\n* @param errorMessage\n\
    */\nprivate void showErrorDialog(String errorMessage) {\nAlert dialog = new Alert(Alert.AlertType.ERROR,\
    \  errorMessage);\ndialog.setTitle(\"Error Retrieving Weather Data\");\ndialog.show();\n\
    }\n@Override\npublic void stop() throws Exception {\n// clean up resources here...\n\
    }\n/**\n* Quick one liner that delimits on the end of file character and\n* returning\
    \ the whole input stream as a String.\n* @param inputStream byte input stream.\n\
    * @return String A string from an input stream.\n*/\npublic String streamToString(InputStream\
    \ inputStream) {\nString text = new Scanner(inputStream, \"UTF-8\")\n.useDelimiter(\"\
    \\\\Z\")\n.next();\nreturn text;\n}\n/**\n* Returns a string containing the URL\
    \ with parameters.\n* @param cityRegion The city state and country. State and\n\
    *                   country is separated by a comma.\n* @param unitType Specify\
    \ c for celsius and f for fahrenheit.\n* @return String A query string representing\
    \ the web request.\n*/\nprivate  String generateQueryString(String cityRegion,\
    \ String unitType) {\nString units = \"f\".equalsIgnoreCase(unitType) ? \"imperial\"\
    : \"metric\";\nString queryString = WEATHER_URL +\n\"?q=\" + cityRegion +\n\"\
    &\" + \"units=\" + units +\n\"&\" + \"mode=json\" +\n\"&\" + \"appid=\" + API_KEY;\n\
    return queryString;\n}\n/**\n* This method is called from the JavaScript function\n\
    * findWeatherByLocation(). Refer to the weather_template.html\n* file.\n* \n*\
    \ -- Step 3 --\n* \n*\n* @param cityRegion The city, state and country.\n* @param\
    \ unitType The temperature in celsius or fahrenheit.\n*/\npublic void queryWeatherByLocationAndUnit(String\
    \ cityRegion,\nString unitType) {\n// build a weather request\nString queryStr\
    \  = generateQueryString(cityRegion, unitType);\nSystem.out.println(\"Request\
    \  (http2): \" + queryStr);\n// Make a GET request to fetch weather data asynchronously\n\
    // The sendAsync() method returns a CompletableFuture>\nHTTP_CLIENT.sendAsync(\
    \ newBuilder(URI.create(queryStr))\n.GET()\n.build(),\nBodyHandler.asString())\n\
    .whenCompleteAsync( (httpResp, throwable) -> {\nif (throwable != null){\nshowErrorDialog(throwable.getMessage());\n\
    return;\n}\nString json  = httpResp.body();\npopulateWeatherData(json, unitType);\n\
    System.out.println(\"Response (http2): \" + json);\n});\n}\n/**\n* Invokes to\
    \ the JavaScript function populateWeatherData() using the web engine.\n* \n* \
    \    -- Step 4 --\n*     From Java a call to invoke a JavaScript function is made\
    \ by\n*     calling populateWeatherData().\n* \n*\n* @param json The JSON string\
    \ to be evaluated (converted to a real JavaScript object).\n* @param unitType\
    \ The symbol and unit for the temperature.\n*/\nprivate void populateWeatherData(String\
    \ json, String unitType) {\nPlatform.runLater(() -> {\n// On the JavaFX Application\
    \ Thread....\nwebView.getEngine()\n.executeScript(\"populateWeatherData(eval(\"\
    \ + json + \"), \" +\n\"'\" + unitType + \"' );\");\n});\n}\npublic static void\
    \ main(String[] args){\nHTTP_CLIENT = newHttpClient();\nApplication.launch(args);\n\
    }\n}\n```\n**Listing 10-23.** Source Code of the Weather Widget (`WeatherWidget.java`)"
