- fmt: '### Creating a Background Task


    The JavaFX API can execute work on threads in the background, called tasks (`javafx.concurrent.Task`).
    These tasks are one-time use that are executed on a thread. The `Task` class is
    a subclass of Java concurrency’s `Runnable` and `Future` interfaces.


    What’s nice about Java futures is the ability to provide asynchronous behavior
    when executing code. In other words, when you execute the task, it doesn’t block.
    When using an `ExecutorService`’s `submit()` method, a future object is returned
    to the caller. The future object can be checked periodically to determine if the
    task is finished or if an error has occurred. Listing [6-30](#A323804_3_En_6_Chapter.html#Par224)
    shows a simple thread pool created to execute a task.


    ```

    Task worker = new Task() {

    @Override

    protected Boolean call() throws Exception {

    for (int i=0; i<100; i++) {

    // some heavy work (not on the UI thread)

    updateMessage("progress text");

    updateProgress(i, 100);

    }

    return true;

    }

    };

    ExecutorService threadPool = threadPool = Executors.newFixedThreadPool(2);

    Future future = threadPool.submit(worker);

    Listing 6-30.

    A Thread Pool Created to Execute a Worker Task

    ```


    Did you notice the `call()` method in Listing [6-30](#A323804_3_En_6_Chapter.html#Par224)
    containing two methods—`updateMessage()` and `updateProgress()`? These methods
    assist by updating the status or progress information for the currently running
    task. Next, you will see an example application that will simulate a dialog window
    showing progress of files being copied.


    ### Example: File Copy Progress Dialog (BackgroundProcesses)


    To demonstrate a GUI application generating a background process while also providing
    feedback to the user, I’ve created an example application that simulates a dialog
    window visualizing the progress of many files being copied. Figure [6-20](#A323804_3_En_6_Chapter.html#Fig20)
    depicts, from left to right, a progress bar and a progress indicator (pie chart).
    The progress indicator shows a percentage below the indicator icon. While the
    process is still being performed, the user can click on the Cancel button to cancel
    or terminate the task.


    ![A323804_3_En_6_Fig20_HTML.jpg](A323804_3_En_6_Fig20_HTML.jpg)


    Figure 6-20. A window simulating files being copied using a progress bar and a
    progress indicator providing user feedback


    The following are the main classes used in this example:


    *   `javafx.scene.control.ProgressBar`

    *   `javafx.scene.control.ProgressIndicator`

    *   `javafx.concurrent.Task`


    Listing [6-31](#A323804_3_En_6_Chapter.html#Par232) shows a code example that
    uses JavaFX’s progress bar and indicator UI controls to provide feedback to the
    user as files are being copied.


    ```

    public class BackgroundProcesses extends Application {

    static Task copyWorker;

    final int numFiles = 30;

    private ExecutorService threadPool;

    /**

    * @param args the command line arguments

    */

    public static void main(String[] args) {

    Application.launch(args);

    }

    @Override

    public void init() throws Exception {

    super.init();

    threadPool = Executors.newFixedThreadPool(1);

    }

    @Override

    public void stop() throws Exception {

    super.stop();

    threadPool.shutdown();

    }

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("BackgroundProcesses: Background Processes");

    Group root = new Group();

    Scene scene = new Scene(root, 330, 120, Color.WHITE);

    BorderPane mainPane = new BorderPane();

    mainPane.layoutXProperty()

    .bind(scene.widthProperty()

    .subtract(mainPane.widthProperty())

    .divide(2));

    root.getChildren().add(mainPane);

    Label label = new Label("Files Transfer:");

    ProgressBar progressBar = new ProgressBar(0);

    ProgressIndicator progressIndicator = new ProgressIndicator(0);

    HBox hb = new HBox();

    hb.setSpacing(5);

    hb.setAlignment(Pos.CENTER);

    hb.getChildren().addAll(label, progressBar, progressIndicator);

    mainPane.setTop(hb);

    Button startButton = new Button("Start");

    Button cancelButton = new Button("Cancel");

    TextArea textArea = new TextArea();

    textArea.setEditable(false);

    textArea.setPrefSize(200, 70);

    HBox hb2 = new HBox();

    hb2.setSpacing(5);

    hb2.setAlignment(Pos.CENTER);

    hb2.getChildren().addAll(startButton, cancelButton, textArea);

    mainPane.setBottom(hb2);

    // wire up start button

    startButton.setOnAction((ActionEvent event) -> {

    startButton.setDisable(true);

    progressBar.setProgress(0);

    progressIndicator.setProgress(0);

    textArea.setText("");

    cancelButton.setDisable(false);

    copyWorker = createWorker(numFiles);

    // wire up progress bar

    progressBar.progressProperty().unbind();

    progressBar.progressProperty().bind(copyWorker.progressProperty());

    progressIndicator.progressProperty().unbind();

    progressIndicator.progressProperty().bind(copyWorker.progressProperty());

    // append to text area box

    copyWorker.messageProperty()

    .addListener((observable, oldValue, newValue) ->

    textArea.appendText(newValue + "\n")

    );

    threadPool.submit(copyWorker);

    });

    // cancel button will kill worker and reset.

    cancelButton.setOnAction((ActionEvent event) -> {

    startButton.setDisable(false);

    cancelButton.setDisable(true);

    copyWorker.cancel(true);

    // reset

    progressBar.progressProperty().unbind();

    progressBar.setProgress(0);

    progressIndicator.progressProperty().unbind();

    progressIndicator.setProgress(0);

    textArea.appendText("File transfer was cancelled.");

    });

    cancelButton.setDisable(true);

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    private Task createWorker(final int numFiles) {

    return new Task() {

    @Override

    protected Boolean call() throws Exception {

    for (int i = 0; i < numFiles; i++) {

    long elapsedTime = System.currentTimeMillis();

    copyFile("some file", "some dest file");

    elapsedTime = System.currentTimeMillis() - elapsedTime;

    String status = elapsedTime + " milliseconds";

    // queue up status

    updateMessage(status);

    updateProgress(i + 1, numFiles); // (progress, max)

    }

    return true;

    }

    };

    }

    private void copyFile(String src, String dest) throws InterruptedException {

    // simulate a long time

    Random rnd = new Random(System.currentTimeMillis());

    long millis = rnd.nextInt(1000);

    Thread.sleep(millis);

    }

    }

    Listing 6-31.

    An Example Application That Demonstrates Background Processes

    ```'
