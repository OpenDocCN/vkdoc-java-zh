  raw: "## Binding\n\nSimply put, binding has the idea of at least two values (properties)\
    \ being synchronized. This means that when a dependent variable changes, the other\
    \ variable changes. JavaFX provides many binding options that enable the developer\
    \ to synchronize between properties in domain objects and GUI controls. In this\
    \ section, you learn about three binding strategies when binding property objects.\n\
    \nThis section focuses on the following JavaFX API packages:\n\n*   `javafx.beans.binding.*`\n\
    *   `javafx.beans.property.*`\n\nBinding properties is quite easy to do. The only\
    \ requirement is that the property invoking the bind must be a read/writeable\
    \ property. To bind a property to another property, you will invoke the `bind()`\
    \ method. This method will bind in one direction (unidirectional). For instance,\
    \ when property A binds to property B, the change in property B will update property\
    \ A, but not the other way. If A is bound to B you can’t update A, as you’ll get\
    \ `RuntimeException: A bound value cannot be set`.\n\nThe following are three\
    \ additional binding strategies to consider using in JavaFX’s Properties API:\n\
    \n*   Bidirectional binding on a Java Bean\n*   High-level binding using the Fluent\
    \ API\n*   Low-level binding using `javafx.beans.binding.*` binding objects\n\n\
    ### Bidirectional Binding\n\nBidirectional binding allows you to bind properties\
    \ with the same type allowing changes on either end while keeping a value synchronized.\
    \ When binding bi-directionally, it’s required that both properties must be read/writable.\
    \ It’s pretty easy to bind two properties bidirectionally through the use of the\
    \ `bindBidirectional()` method. To demonstrate, I’ve created a simple example.\n\
    \nListing [4-31](#A323804_3_En_4_Chapter.html#Par152) is a `Contact` bean having\
    \ a property `firstName` that is bound bidirectionally to a local variable `fname`\
    \ of type `StringProperty`.\n\n```\nContact contact = new Contact(\"John\", \"\
    Doe\");\nStringProperty fname = new SimpleStringProperty();\nfname.bindBidirectional(contact.firstNameProperty());\n\
    contact.firstNameProperty().set(\"Play\");\nfname.set(\"Jane\");\nSystem.out.println(\"\
    contact.firstNameProperty = \" + contact.firstNameProperty().get() );\nSystem.out.println(\"\
    fname = \" + fname.get() );\nListing 4-31.\nBidirectional Binding Between the\
    \ firstName Property and a Regular String Property Variable\n```\n\nThe output\
    \ of this code snippet is as follows:\n\n```\ncontact.firstNameProperty = Jane\n\
    fname = Jane\n```\n\n### High-Level Binding\n\nIntroduced in JavaFX 2.0 is a fluent\
    \ interface API to bind properties. The fluent APIs are methods that allow you\
    \ to perform operations on properties using English-like method names. For example,\
    \ if you have a numeric property, there are methods like `multiply()`, `divide()`,`subtract()`,and\
    \ so on. Another example would be a string property having methods like `isEqualTo()`,\
    \ `isNotEqualTo()`, `concat()`, and similar. As an example, Listing [4-32](#A323804_3_En_4_Chapter.html#Par156)\
    \ shows how to create a property that represents the formula for the area of a\
    \ rectangle.\n\n```\n// Area = width * height\nIntegerProperty width = new SimpleIntegerProperty(10);\n\
    IntegerProperty height = new SimpleIntegerProperty(10);\nNumberBinding area =\
    \ width.multiply(height);\nListing 4-32.\nCreating a Property (area) Using the\
    \ High-Level Binding Strategy for Calculating the Area of a Rectangle\n```\n\n\
    This code demonstrates high-level binding by using the fluent API from the `javafx.beans.binding.\
    \ IntegerExpression` parent interface. This example binds by using the `multiply()`\
    \ method, which returns a `NumberBinding` containing the computed value. What’s\
    \ nice is that the binding is lazy-evaluated, which means the computation (multiplying)\
    \ doesn’t occur unless you invoke the property’s (area) value via the `get()`\
    \ (or `getValue()`) method. For all available fluent interfaces, see the Javadoc\
    \ for `javafx.beans.binding.*` packages.\n\n### Low-Level Binding\n\nWhen using\
    \ low-level binding, you would use a derived `NumberBinding` class, such as a\
    \ `DoubleBinding` class for values of type `Double`. With a `DoubleBinding` class,\
    \ you will override its `computeValue()` method so that you can use the familiar\
    \ operators such as `*` and `-` to formulate complex math equations. The difference\
    \ between high-and low-level binding is that high-level uses methods such as `multiply()`\
    \ and `subtract()` instead of the operators `*` and `-`. Listing [4-33](#A323804_3_En_4_Chapter.html#Par159)\
    \ shows how to create a low-level binding for the formula for the volume of a\
    \ sphere.\n\n```\nDoubleProperty radius = new SimpleDoubleProperty(2);\nDoubleBinding\
    \ volumeOfSphere = new DoubleBinding() {\n{\nsuper.bind(radius); // initial bind\n\
    }\n@Override\nprotected double computeValue() {\n// Math.pow() (power) cubes the\
    \ radius\nreturn (4 / 3 * Math.PI * Math.pow(radius.get(), 3));\n}\n};\nListing\
    \ 4-33.\nA Property Binding (volumnOfSphere) Using the Low-Level Binding Strategy\n\
    ```\n\nIf you’ve gotten this far, you are definitely ready to begin building GUIs.\
    \ So far you’ve had a chance to learn about lambda expressions, properties, and\
    \ bindings. Next, I want to close out this chapter with an example showing how\
    \ to build a snazzy-looking logon dialog that uses shapes, lambda expressions,\
    \ properties, and bindings (with a hint of UI controls).\n\n## A Logon Dialog\
    \ Example\n\nLogon dialogs are typical of any application when authenticating\
    \ users. In this example, I created a simple form application that will involve\
    \ all of the skills you’ve learned from Chapter [3](#A323804_3_En_3_Chapter.html)\
    \ and in this chapter thus far. Before getting deep into the code, which you’ll\
    \ see in Listing [4-34](#A323804_3_En_4_Chapter.html#Par167), let’s look at the\
    \ logon dialog window. Figure [4-3](#A323804_3_En_4_Chapter.html#Fig3) shows the\
    \ initial display of the logon dialog window that the code will create.\n\n![A323804_3_En_4_Fig3_HTML.jpg](A323804_3_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3.\n\nInitial display of the logon dialog window\n\nThe following are\
    \ the instructions for interacting with the application.\n\n1.  The user will\
    \ have three attempts to enter the correct password. Figure [4-4](#A323804_3_En_4_Chapter.html#Fig4)\
    \ shows the user making the first attempt to log on. (Note: The password is `password1`.)\n\
    \n    ![A323804_3_En_4_Fig4_HTML.jpg](A323804_3_En_4_Fig4_HTML.jpg)\n\n    Figure\
    \ 4-4.\n\n    The user is entering the password into the logon dialog window  \n\
    2.  As users enter the password, they have an opportunity to press the Enter key.\
    \ If the password is incorrect, a red X appears to the right of the password text\
    \ field. Figure [4-5](#A323804_3_En_4_Chapter.html#Fig5) shows an invalid logon.\n\
    \n    ![A323804_3_En_4_Fig5_HTML.jpg](A323804_3_En_4_Fig5_HTML.jpg)\n\n    Figure\
    \ 4-5.\n\n    The user has pressed Enter with an invalid password  \n3.  If the\
    \ user types the correct password in real-time, a green check appears. After the\
    \ green check appears, the user may press the Enter key to be granted access.\
    \ Figure [4-6](#A323804_3_En_4_Chapter.html#Fig6) shows the user entering a valid\
    \ password.\n\n    ![A323804_3_En_4_Fig6_HTML.jpg](A323804_3_En_4_Fig6_HTML.jpg)\n\
    \n    Figure 4-6.\n\n    The user has entered a valid password\n\n### Login Dialog\
    \ Source Code\n\nListing [4-34](#A323804_3_En_4_Chapter.html#Par167) shows the\
    \ source code for the JavaFX example logon dialog application. Listing [4-35](#A323804_3_En_4_Chapter.html#Par168)\
    \ lists the `style.css` file to style this JavaFX example logon dialog application."
  trans: "\n## 绑定\n\n简单来说，绑定的核心思想是至少两个值（属性）保持同步。这意味着当一个依赖变量发生变化时，另一个变量也会随之改变。JavaFX\
    \ 提供了多种绑定选项，使开发者能够同步领域对象和 GUI 控件中的属性。在本节中，你将学习绑定属性对象时的三种绑定策略。\n\n本节重点介绍以下 JavaFX\
    \ API 包：\n\n*   `javafx.beans.binding.*`\n*   `javafx.beans.property.*`\n\n绑定属性相当容易。唯一的要求是调用绑定的属性必须是可读/写的属性。要将一个属性绑定到另一个属性，你需要调用\
    \ `bind()` 方法。此方法将进行单向绑定。例如，当属性 A 绑定到属性 B 时，属性 B 的变化会更新属性 A，但反之则不然。如果 A 绑定到 B，则无法更新\
    \ A，否则会抛出 `RuntimeException: A bound value cannot be set`。\n\n以下是 JavaFX 属性 API\
    \ 中可考虑使用的另外三种绑定策略：\n\n*   Java Bean 上的双向绑定\n*   使用 Fluent API 的高级绑定\n*   使用 `javafx.beans.binding.*`\
    \ 绑定对象的低级绑定\n\n### 双向绑定\n\n双向绑定允许你绑定相同类型的属性，允许任一端发生更改，同时保持值同步。进行双向绑定时，要求两个属性都必须是可读/写的。通过使用\
    \ `bindBidirectional()` 方法，双向绑定两个属性非常容易。为了演示，我创建了一个简单的示例。\n\n清单 4-31 是一个 `Contact`\
    \ Bean，它有一个 `firstName` 属性，该属性与一个类型为 `StringProperty` 的局部变量 `fname` 进行了双向绑定。\n\
    \n```\nContact contact = new Contact(\"John\", \"Doe\");\nStringProperty fname\
    \ = new SimpleStringProperty();\nfname.bindBidirectional(contact.firstNameProperty());\n\
    contact.firstNameProperty().set(\"Play\");\nfname.set(\"Jane\");\nSystem.out.println(\"\
    contact.firstNameProperty = \" + contact.firstNameProperty().get() );\nSystem.out.println(\"\
    fname = \" + fname.get() );\n清单 4-31.\nfirstName 属性与常规字符串属性变量之间的双向绑定\n```\n\n\
    此代码片段的输出如下：\n\n```\ncontact.firstNameProperty = Jane\nfname = Jane\n```\n\n###\
    \ 高级绑定\n\nJavaFX 2.0 引入了一个流畅接口 API 来绑定属性。流畅 API 是允许你使用类似英文的方法名对属性执行操作的方法。例如，如果你有一个数值属性，则有\
    \ `multiply()`、`divide()`、`subtract()` 等方法。另一个例子是字符串属性，它具有 `isEqualTo()`、`isNotEqualTo()`、`concat()`\
    \ 等方法。例如，清单 4-32 展示了如何创建一个表示矩形面积公式的属性。\n\n```\n// Area = width * height\nIntegerProperty\
    \ width = new SimpleIntegerProperty(10);\nIntegerProperty height = new SimpleIntegerProperty(10);\n\
    NumberBinding area = width.multiply(height);\n清单 4-32.\n使用高级绑定策略创建用于计算矩形面积的属性\
    \ (area)\n```\n\n此代码通过使用来自 `javafx.beans.binding.IntegerExpression` 父接口的流畅 API\
    \ 演示了高级绑定。此示例通过使用 `multiply()` 方法进行绑定，该方法返回一个包含计算值的 `NumberBinding`。好处在于绑定是惰性求值的，这意味着除非你通过\
    \ `get()`（或 `getValue()`）方法调用属性（area）的值，否则不会进行计算（乘法）。有关所有可用的流畅接口，请参阅 `javafx.beans.binding.*`\
    \ 包的 Javadoc。\n\n### 低级绑定\n\n使用低级绑定时，你将使用派生的 `NumberBinding` 类，例如用于 `Double` 类型值的\
    \ `DoubleBinding` 类。使用 `DoubleBinding` 类，你将重写其 `computeValue()` 方法，以便可以使用熟悉的运算符（如\
    \ `*` 和 `-`）来制定复杂的数学方程。高级绑定和低级绑定之间的区别在于，高级绑定使用 `multiply()` 和 `subtract()` 等方法，而不是运算符\
    \ `*` 和 `-`。清单 4-33 展示了如何为球体体积公式创建低级绑定。\n\n```\nDoubleProperty radius = new SimpleDoubleProperty(2);\n\
    DoubleBinding volumeOfSphere = new DoubleBinding() {\n{\nsuper.bind(radius); //\
    \ 初始绑定\n}\n@Override\nprotected double computeValue() {\n// Math.pow() (幂) 对半径进行立方运算\n\
    return (4 / 3 * Math.PI * Math.pow(radius.get(), 3));\n}\n};\n清单 4-33.\n使用低级绑定策略的属性绑定\
    \ (volumnOfSphere)\n```\n\n如果你已经读到这里，那么你肯定已经准备好开始构建 GUI 了。到目前为止，你已经有机会学习了 lambda\
    \ 表达式、属性和绑定。接下来，我想用一个示例来结束本章，该示例展示了如何构建一个外观时髦的登录对话框，其中使用了形状、lambda 表达式、属性和绑定（并附带一些\
    \ UI 控件）。\n\n## 登录对话框示例\n\n在验证用户身份时，登录对话框是任何应用程序的典型功能。在此示例中，我创建了一个简单的表单应用程序，它将涉及你在第\
    \ 3 章和本章中学到的所有技能。在深入分析你将在清单 4-34 中看到的代码之前，让我们先看一下登录对话框窗口。图 4-3 显示了代码将创建的登录对话框窗口的初始显示。\n\
    \n![A323804_3_En_4_Fig3_HTML.jpg](img/A323804_3_En_4_Fig3_HTML.jpg)\n\n图 4-3.\n\
    \n登录对话框窗口的初始显示\n\n以下是与应用程序交互的说明。\n\n1.  用户将有三次机会输入正确的密码。图 4-4 显示了用户第一次尝试登录。（注意：密码是\
    \ `password1`。）\n\n    ![A323804_3_En_4_Fig4_HTML.jpg](img/A323804_3_En_4_Fig4_HTML.jpg)\n\
    \n    图 4-4.\n\n    用户正在登录对话框窗口中输入密码  \n2.  当用户输入密码时，他们有机会按 Enter 键。如果密码不正确，密码文本字段的右侧会出现一个红色的\
    \ X。图 4-5 显示了无效登录。\n\n    ![A323804_3_En_4_Fig5_HTML.jpg](img/A323804_3_En_4_Fig5_HTML.jpg)\n\
    \n    图 4-5.\n\n    用户输入了无效密码并按下了 Enter 键  \n3.  如果用户实时输入了正确的密码，则会显示一个绿色的勾号。出现绿色勾号后，用户可以按\
    \ Enter 键获得访问权限。图 4-6 显示了用户输入有效密码。\n\n    ![A323804_3_En_4_Fig6_HTML.jpg](img/A323804_3_En_4_Fig6_HTML.jpg)\n\
    \n    图 4-6.\n\n    用户输入了有效密码\n\n### 登录对话框源代码\n\n清单 4-34 显示了 JavaFX 示例登录对话框应用程序的源代码。清单\
    \ 4-35 列出了用于设置此 JavaFX 示例登录对话框应用程序样式的 `style.css` 文件。\n"
