    ### How It Works


    Before beginning, I want to describe some changes that I made in this version
    of the book from the earlier edition. I basically refactored (yet again) the source
    code from the prior book’s edition relating to media. Because of this refactoring,
    I mention privately scoped methods quite often. These private methods are used
    to break up the code into more manageable pieces, so that you can better focus
    on each feature of the media player application.


    Assuming you’ve built and ran Listing [9-1](#A323804_3_En_9_Chapter.html#Par29),
    you will begin by dragging and dropping an audio file onto the example MP3 player,
    as you did in Chapter [7](#A323804_3_En_7_Chapter.html)’s Photo Viewer application,
    where you learned how to use the drag-and-drop desktop metaphor to load files
    into a JavaFX application. Instead of image files, however, you load audio files.
    To load audio files, JavaFX currently supports the following file formats: .`mp3`,
    .`wav`, .`aiff`, and .`m3u8`. To see the supported encoding types, refer to the
    Javadocs documentation of the package summary of `javafx.scene.media`.


    Looking back at Figure [9-2](#A323804_3_En_9_Chapter.html#Fig2), you might notice
    that the button panel control has a look and feel like the Photo Viewer application
    in Figure [7-1](#A323804_3_En_7_Chapter.html#Fig1) of Chapter [7](#A323804_3_En_7_Chapter.html).
    In this example, I’ve modified the button controls to resemble buttons, similar
    to many media player applications.


    As an bonus, the MP3 player will appear as an irregularly shaped, semitransparent
    window without a title bar or borders. The application window can also be dragged
    around the desktop using the mouse. Now that you know how to operate the music
    player, let’s walk through the code.


