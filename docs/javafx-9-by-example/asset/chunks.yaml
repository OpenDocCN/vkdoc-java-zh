- fmt: "### How It Works\n\nBasically, the main hardware of the device consists of\
    \ three infrared LEDs combined with two monochromatic infrared (IR) cameras. While\
    \ the LEDs generate a 3D pattern of dots of IR light, the cameras scan the reflected\
    \ data at nearly 300fps. Everything within a radius of 50cm will be scanned and\
    \ processed. With a resolution of 0.01mm, data will be analyzed in the host computer\
    \ by the Leap Motion software, using a proprietary motion detection algorithm.\n\
    \nDepending on your CPU capabilities and the data analyzed, the range of processing\
    \ latency goes from 2ms to 33ms.\n\nThe best way to find out about the Leap magic\
    \ is just plugging it on the USB port and installing the software from [`https://www.leapmotion.com/setup`](https://www.leapmotion.com/setup).\
    \ A small Leap icon should appear on the taskbar notification area (Windows) or\
    \ menu bar (Mac), and it should be green, like the lateral LED on the device (which\
    \ should be facing you). Click on it and select the Visualizer for an incredible\
    \ visualization of your fingers and hands.\n\nWhen you see a grey grid, move your\
    \ hands and click H to see the menu, N to visualize the hand, T the fingers, O\
    \ to draw the gestures, or L to see the latency. You’ll see something like Figure\
    \ [14-5](#A323804_3_En_14_Chapter.html#Fig5).\n\n![A323804_3_En_14_Fig5_HTML.jpg](A323804_3_En_14_Fig5_HTML.jpg)\n\
    \nFigure 14-5. Leap Motion Diagnostic Visualizer application\n\nAs you can see,\
    \ the device detects hands, fingers, and sharp tools within a 60cm range and a\
    \ 120-150 view angle. For these objects, 3D vectors provide position, direction,\
    \ and velocity, all referred to a right-handed Cartesian coordinate system, whose\
    \ origin is at the center of the device, as shown in Figure [14-6](#A323804_3_En_14_Chapter.html#Fig6).\
    \ Every time the device scans and processes the available data, a `Frame` object\
    \ is generated, containing lists with the tracked data in that instant (hands,\
    \ fingers, and tools), as well as a set of basic motion gestures found in the\
    \ analysis of the last frames (swipe, tap, and circles).\n\n![A323804_3_En_14_Fig6_HTML.jpg](A323804_3_En_14_Fig6_HTML.jpg)\n\
    \nFigure 14-6. Coordinate system centered in the device\n\nAs you may have noticed,\
    \ the y-axis positive direction is the opposite of the downward orientation in\
    \ most computer graphics systems, including JavaFX. But the fact that the data\
    \ is referred to the device position, and not to the screen as you are accustomed\
    \ to with mouse and touch events, changes dramatically the way you need to think.\
    \ Fortunately, the API provides several useful methods to find where your hands\
    \ and fingers are pointing at any time.\n\nMore complex tasks require an understanding\
    \ of spatial geometry, including knowledge of terms like vectors, vector-cross-products,\
    \ and matrix operations.\n\n### Getting Started with the Leap SDK\n\nIn order\
    \ to integrate the Leap device events and interact with software applications,\
    \ Leap Motion provides an SDK for many programming languages, including Java,\
    \ in their developer section. Make sure you select the V2 tracking version, intended\
    \ for desktop only: [`https://developer.leapmotion.com/sdk/v2`](https://developer.leapmotion.com/sdk/v2).\
    \ Their new Orion beta version is only for Windows and it’s mainly oriented to\
    \ VR.\n\nDownload the SDK for your operating system, and you’ll get the necessary\
    \ libraries to get started. These consist of mainly the `LeapJava.jar` and a bunch\
    \ of native libraries. The SDK also includes a `HelloWorld.java` example.\n\n\
    One easy way to integrate these files on your system is by adding the JAR to `<JAVA_HOME>/jre/lib/ext`\
    \ on Linux or Windows (or `/Library/Java/Extensions` on Mac). Then copy the native\
    \ libraries (`LeapJava.dll`, `Leap.dll` and `Leapd.dll` for Windows, `libLeapJava.dylib`\
    \ and `libLeap.dylib` for Mac, `libLeapJava.so` and `libLeap.so` for Linux) to\
    \ the `<JAVA_HOME>/bin` folder.\n\nOr you can just add the JAR to every project\
    \ as a dependency and load the native libraries as a VM argument: `-Djava.library.path=<native\
    \ library path>`. This is what we’ll do in the example, so you can see how this\
    \ works with the modular system in Java 9.\n\nBefore going any further, look at\
    \ the documentation at [`https://developer.leapmotion.com/documentation/java/index.html`](https://developer.leapmotion.com/documentation/java/index.html)\
    \ and try the `HelloWorld.java` example. You’ll notice the following:\n\n- You\
    \ need a `Controller` object that allows the connection between the Leap device\
    \ and the application.\n- You need a `Listener` subclass to handle events from\
    \ the controller.\n- Gesture tracking is enabled in the `onConnect()` method.\n\
    - The main method in this class is `onFrame()`, which is a callback method dispatched\
    \ when a new `Frame` with motion tracking data is available. Here, you can get\
    \ lists of hands, fingers, or tools, as well as several vectors with their position,\
    \ orientation, and velocity.\n- If gestures are enabled, you’ll also get a list\
    \ of the gestures found, based on the analysis of the last frames. You will know\
    \ as well the status of the gesture: whether it has just begun, is progressing,\
    \ or has ended.\n\n### Adding the Leap SDK to a JavaFX Project\n\nOne thing you\
    \ may have discovered throughout this book is the care you must put in mixing\
    \ the so-called JavaFX thread with other non-JavaFX threads. At this point, it\
    \ will be evident for you that the Leap `Listener` subclass runs in a non-JavaFX\
    \ thread, handling events at a very high rate.\n\nIn order to bring these events\
    \ to a JavaFX thread, you will use a JavaFX `ObjectProperty<T>` in the `Listener`\
    \ subclass to store the desired values on every frame. Then in the JavaFX class,\
    \ you’ll implement a `ChangeListener<T>` to listen to any change and by using\
    \ `Platform.runLater()`, you will put the task of rendering these changes on the\
    \ JavaFX scene graph on a JavaFX thread.\n\n### The Hands Tracking Example\n\n\
    The following example uses the features of the Leap Motion v2 version and its\
    \ skeletal tracking model to create a JavaFX 3D “live” version of the hand’s bones\
    \ and arms.\n\nBefore getting started with the code, let’s set first the `module-info`\
    \ class. Listing [14-4](#A323804_3_En_14_Chapter.html#Par64) shows the usual `requires`\
    \ clause for JavaFX and the new one you add to include `LeapJava`.\n\n```\nmodule\
    \ com.jfxbe.handstracking {\n    requires javafx.controls;\n    requires LeapJava;\n\
    \    exports com.jfxbe.handstracking;\n}\n```\n\nListing 14-4. HandsTracking Module\n\
    \nYou must copy `LeapJava.jar` from the Leap SDK installation subfolder `LeapSDK/lib`\
    \ to a `libs` folder within the project, and in the IDE, add this JAR to the libraries,\
    \ in order to use its API, as shown in Figure [14-7](#A323804_3_En_14_Chapter.html#Fig7).\n\
    \n![A323804_3_En_14_Fig7_HTML.jpg](A323804_3_En_14_Fig7_HTML.jpg)\n\nFigure 14-7.\
    \ Adding the `LeapJava.jar` to the project libraries in NetBeans"
  raw: '### How It Works


    Basically, the main hardware of the device consists of three infrared LEDs combined
    with two monochromatic infrared (IR) cameras. While the LEDs generate a 3D pattern
    of dots of IR light, the cameras scan the reflected data at nearly 300fps. Everything
    within a radius of 50cm will be scanned and processed. With a resolution of 0.01mm,
    data will be analyzed in the host computer by the Leap Motion software, using
    a proprietary motion detection algorithm.


    Depending on your CPU capabilities and the data analyzed, the range of processing
    latency goes from 2ms to 33ms.


    The best way to find out about the Leap magic is just plugging it on the USB port
    and installing the software from [`https://www.leapmotion.com/setup`](https://www.leapmotion.com/setup)
    . A small Leap icon should appear on the taskbar notification area (Windows) or
    menu bar (Mac), and it should be green, like the lateral LED on the device (which
    should be facing you). Click on it and select the Visualizer for an incredible
    visualization of your fingers and hands.


    When you see a grey grid, move your hands and click H to see the menu, N to visualize
    the hand, T the fingers, O to draw the gestures, or L to see the latency. You’ll
    see something like Figure [14-5](#A323804_3_En_14_Chapter.html#Fig5).


    ![A323804_3_En_14_Fig5_HTML.jpg](A323804_3_En_14_Fig5_HTML.jpg)


    Figure 14-5.


    Leap Motion Diagnostic Visualizer application


    As you can see, the device detects hands, fingers, and sharp tools within a 60cm
    range and a 120-150 view angle. For these objects, 3D vectors provide position,
    direction, and velocity, all referred to a right-handed Cartesian coordinate system
    , whose origin is at the center of the device, as shown in Figure [14-6](#A323804_3_En_14_Chapter.html#Fig6).
    Every time the device scans and processes the available data, a `Frame` object
    is generated, containing lists with the tracked data in that instant (hands, fingers,
    and tools), as well as a set of basic motion gestures found in the analysis of
    the last frames (swipe, tap, and circles).


    ![A323804_3_En_14_Fig6_HTML.jpg](A323804_3_En_14_Fig6_HTML.jpg)


    Figure 14-6.


    Coordinate system centered in the device


    As you may have noticed, the y-axis positive direction is the opposite of the
    downward orientation in most computer graphics systems, including JavaFX. But
    the fact that the data is referred to the device position, and not to the screen
    as you are accustomed to with mouse and touch events, changes dramatically the
    way you need to think. Fortunately, the API provides several useful methods to
    find where your hands and fingers are pointing at any time.


    More complex tasks require an understanding of spatial geometry, including knowledge
    of terms like vectors, vector-cross-products, and matrix operations.


    ### Getting Started with the Leap SDK


    In order to integrate the Leap device events and interact with software applications,
    Leap Motion provides an SDK for many programming languages, including Java, in
    their developer section. Make sure you select the V2 tracking version, intended
    for desktop only: [`https://developer.leapmotion.com/sdk/v2`](https://developer.leapmotion.com/sdk/v2)
    . Their new Orion beta version is only for Windows and it’s mainly oriented to
    VR.


    Download the SDK for your operating system, and you’ll get the necessary libraries
    to get started. These consist of mainly the `LeapJava.jar` and a bunch of native
    libraries. The SDK also includes a `HelloWorld.java` example.


    One easy way to integrate these files on your system is by adding the JAR to `<JAVA_HOME>/jre/lib/ext`
    on Linux or Windows (or `/Library/Java/Extensions` on Mac). Then copy the native
    libraries (`LeapJava.dll`, `Leap.dll and Leapd.dll` for Windows, `libLeapJava.dylib`
    and `libLeap.dylib` for Mac, `libLeapJava.so` and `libLeap.so` for Linux) to the
    `<JAVA_HOME>/bin` folder.


    Or you can just add the JAR to every project as a dependency and load the native
    libraries as a VM argument: `-Djava.library.path=<native library path>`. This
    is what we’ll do in the example, so you can see how this works with the modular
    system in Java 9.


    Before going any further, look at the documentation at [`https://developer.leapmotion.com/documentation/java/index.html`](https://developer.leapmotion.com/documentation/java/index.html)
    and try the `HelloWorld.java` example. You’ll notice the following:


    *   You need a Controller object that allows the connection between the Leap device
    and the application.

    *   You need a Listener subclass to handle events from the controller.

    *   Gesture tracking is enabled in the `onConnect()` method .

    *   The main method in this class is `onFrame()`, which is a callback method dispatched
    when a new `Frame` with motion tracking data is available. Here, you can get lists
    of hands, fingers, or tools, as well as several vectors with their position, orientation,
    and velocity.

    *   If gestures are enabled, you’ll also get a list of the gestures found, based
    on the analysis of the last frames. You will know as well the status of the gesture:
    whether it has just begun, is progressing, or has ended.


    ### Adding the Leap SDK to a JavaFX Project


    One thing you may have discovered throughout this book is the care you must put
    in mixing the so-called JavaFX thread with other non-JavaFX threads . At this
    point, it will be evident for you that the Leap Listener subclass runs in a non-JavaFX
    thread, handling events at a very high rate.


    In order to bring these events to a JavaFX thread, you will use a JavaFX `ObjectProperty<T>`
    in the `Listener` subclass to store the desired values on every frame. Then in
    the JavaFX class, you’ll implement a `ChangeListener<T>` to listen to any change
    and by using `Platform.runLater()`, you will put the task of rendering these changes
    on the JavaFX scene graph on a JavaFX thread.


    ### The Hands Tracking Example


    The following example uses the features of the Leap Motion v2 version and its
    skeletal tracking model to create a JavaFX 3D “live” version of the hand’s bones
    and arms.


    Before getting started with the code, let’s set first the `module-info` class.
    Listing [14-4](#A323804_3_En_14_Chapter.html#Par64) shows the usual `requires`
    clause for JavaFX and the new one you add to include `LeapJava`.


    ```

    module com.jfxbe.handstracking {

    requires javafx.controls;

    requires LeapJava

    exports com.jfxbe.handstracking;

    }

    Listing 14-4.

    HandsTracking Module

    ```


    You must copy `LeapJava.jar` from the Leap SDK installation subfolder `LeapSDK/lib`
    to a `libs` folder within the project, and in the IDE, add this JAR to the libraries,
    in order to use its API, as shown in Figure [14-7](#A323804_3_En_14_Chapter.html#Fig7).


    ![A323804_3_En_14_Fig7_HTML.jpg](A323804_3_En_14_Fig7_HTML.jpg)


    Figure 14-7.


    Adding the LeapJava.jar to the project libraries in NetBeans'
  trans: '

    ### 工作原理


    该设备的主要硬件由三个红外 LED 灯和两个单色红外（IR）摄像头组成。LED 灯投射出由红外光点构成的 3D 图案，而摄像头则以近 300fps 的速率扫描反射数据。半径
    50 厘米范围内的所有物体都会被扫描和处理。数据以 0.01 毫米的分辨率在主机上由 Leap Motion 软件通过专有运动检测算法进行分析。


    根据 CPU 性能和分析的数据量，处理延迟范围在 2 毫秒到 33 毫秒之间。


    体验 Leap 神奇效果的最佳方式就是将其插入 USB 端口，并从[`https://www.leapmotion.com/setup`](https://www.leapmotion.com/setup)安装软件。任务栏通知区域（Windows）或菜单栏（Mac）上会出现一个小的
    Leap 图标，该图标应为绿色，与设备侧面的 LED 灯（应朝向您）颜色一致。点击该图标并选择“可视化工具”，即可看到您手指和手掌的惊人可视化效果。


    当您看到灰色网格时，移动您的手，按 H 键查看菜单，按 N 键可视化手掌，按 T 键显示手指，按 O 键绘制手势，或按 L 键查看延迟。您将看到类似图 14-5
    的画面。


    ![A323804_3_En_14_Fig5_HTML.jpg](img/A323804_3_En_14_Fig5_HTML.jpg)


    图 14-5.


    Leap Motion 诊断可视化工具应用


    如您所见，该设备可在 60 厘米范围内和 120-150 度视角内检测到手、手指和尖锐工具。对于这些物体，3D 向量提供了位置、方向和速度信息，所有这些都参照一个右手笛卡尔坐标系，其原点位于设备中心，如图
    14-6 所示。每次设备扫描并处理可用数据时，都会生成一个`Frame`对象，其中包含该时刻跟踪到的数据列表（手、手指和工具），以及通过对最近几帧分析发现的一组基本运动手势（滑动、点击和画圈）。


    ![A323804_3_En_14_Fig6_HTML.jpg](img/A323804_3_En_14_Fig6_HTML.jpg)


    图 14-6.


    以设备为中心的坐标系


    您可能已经注意到，y 轴正方向与大多数计算机图形系统（包括 JavaFX）中的向下方向相反。但数据是参照设备位置，而非像您习惯的鼠标和触摸事件那样参照屏幕，这一事实极大地改变了您的思考方式。幸运的是，API
    提供了几个有用的方法，可以随时找到您的手和手指指向的位置。


    更复杂的任务需要理解空间几何，包括向量、向量叉积和矩阵运算等术语的知识。


    ### Leap SDK 入门


    为了集成 Leap 设备事件并与软件应用交互，Leap Motion 在其开发者专区为多种编程语言（包括 Java）提供了 SDK。请确保选择仅适用于桌面的
    V2 跟踪版本：[`https://developer.leapmotion.com/sdk/v2`](https://developer.leapmotion.com/sdk/v2)。他们新的
    Orion 测试版仅适用于 Windows，且主要面向 VR。


    下载适用于您操作系统的 SDK，您将获得入门所需的库。这些库主要包括`LeapJava.jar`和一系列原生库。SDK 还包含一个`HelloWorld.java`示例。


    将这些文件集成到系统中的一种简单方法是在 Linux 或 Windows 上将 JAR 添加到`<JAVA_HOME>/jre/lib/ext`（在 Mac
    上为`/Library/Java/Extensions`）。然后将原生库（Windows 的`LeapJava.dll`、`Leap.dll`和`Leapd.dll`，Mac
    的`libLeapJava.dylib`和`libLeap.dylib`，Linux 的`libLeapJava.so`和`libLeap.so`）复制到`<JAVA_HOME>/bin`文件夹。


    或者，您也可以将 JAR 作为依赖项添加到每个项目中，并将原生库作为 VM 参数加载：`-Djava.library.path=<原生库路径>`。这就是我们在示例中将要做的，这样您就能看到它在
    Java 9 模块系统中的工作方式。


    在进一步操作之前，请查阅[`https://developer.leapmotion.com/documentation/java/index.html`](https://developer.leapmotion.com/documentation/java/index.html)上的文档，并尝试运行`HelloWorld.java`示例。您会注意到以下几点：


    *   需要一个`Controller`对象来建立 Leap 设备与应用之间的连接。

    *   需要一个`Listener`子类来处理来自控制器的事件。

    *   在`onConnect()`方法中启用手势跟踪。

    *   该类中的主要方法是`onFrame()`，这是一个回调方法，当包含运动跟踪数据的新`Frame`可用时被调度。在这里，您可以获取手、手指或工具的列表，以及多个包含其位置、方向和速度的向量。

    *   如果启用了手势，您还将根据对最近几帧的分析获得检测到的手势列表。您还将了解手势的状态：是刚刚开始、正在进行还是已经结束。


    ### 将 Leap SDK 添加到 JavaFX 项目


    您在本书中可能已经发现的一件事是，必须小心处理所谓的 JavaFX 线程与其他非 JavaFX 线程的混合。此时，您会清楚地看到，Leap Listener
    子类在非 JavaFX 线程中运行，以非常高的速率处理事件。


    为了将这些事件引入 JavaFX 线程，您将在`Listener`子类中使用 JavaFX 的`ObjectProperty<T>`来存储每一帧上的所需值。然后在
    JavaFX 类中，您将实现一个`ChangeListener<T>`来监听任何变化，并通过使用`Platform.runLater()`，将渲染这些变化到
    JavaFX 场景图上的任务放到 JavaFX 线程上执行。


    ### 手部跟踪示例


    以下示例利用 Leap Motion v2 版本及其骨骼跟踪模型的功能，创建了一个手部骨骼和手臂的 JavaFX 3D“实时”版本。


    在开始编写代码之前，我们先设置`module-info`类。清单 14-4 显示了 JavaFX 常用的`requires`子句，以及您为包含`LeapJava`而添加的新子句。


    ```

    module com.jfxbe.handstracking {

    requires javafx.controls;

    requires LeapJava

    exports com.jfxbe.handstracking;

    }

    清单 14-4.

    HandsTracking 模块

    ```


    您必须将 Leap SDK 安装子文件夹`LeapSDK/lib`中的`LeapJava.jar`复制到项目内的`libs`文件夹中，并在 IDE 中将此
    JAR 添加到库中，以便使用其 API，如图 14-7 所示。


    ![A323804_3_En_14_Fig7_HTML.jpg](img/A323804_3_En_14_Fig7_HTML.jpg)


    图 14-7.


    在 NetBeans 中将 LeapJava.jar 添加到项目库中

