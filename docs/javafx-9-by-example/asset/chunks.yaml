    The `photo-viewer.css` file is a JavaFX CSS styling that is applied to the various
    UI elements in the Photo Viewer application. Primarily, the CSS file has CSS selectors
    to colorize buttons and shapes. This file resides in the project’s resources directory.


    ### Source Code


    In previous editions of this book, the source code example of the Photo Viewer
    application consisted of only one Java class file. As a single file the only advantage
    is the code is in one place. However, being one Java class file, there are many
    disadvantages. One disadvantage that comes to mind is readability, so now the
    one large file is broken out in three separate Java files and one JavaFX CSS file.


    Another notable disadvantage of having things in one Java file is how inflexible
    the code actually is, especially when adding new features to the application.
    In fact, at the end of this chapter, you will learn about a new feature of the
    Photo Viewer application by simply extending the existing application and overriding
    a method. This chapter consists of multiple code listings that are broken out
    in code sections. Each Java class file shows multiple code listings to help describe
    things in more detail.


