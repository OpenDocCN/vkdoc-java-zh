- fmt: '### Check Box


    A check box button control is a toggle type button that contains three states—`checked`,
    `unchecked`, and `undefined`. When a check box indicates a checked state, the
    control will visibly show a checkmark inside of a box; otherwise, it’s unchecked
    and shows an empty box. The check and unchecked states are controlled by the `selected`
    property.


    When the state is undefined, the control will display a hyphen mark inside the
    box. The undefined state is set using the method called `setIndeterminate(true)`.
    When the indeterminate property is set to `true`, the `selected` property is ignored.
    If you want the check box to allow the users to cycle through the three states,
    set the `allowIndeterminate` property to `true` using the `setAllowIndeterminate(true)`
    method. In Figure [6-7](#A323804_3_En_6_Chapter.html#Fig7), the three check box
    states are shown.


    ![A323804_3_En_6_Fig7_HTML.jpg](A323804_3_En_6_Fig7_HTML.jpg)


    Figure 6-7. The three states a check box control can have


    Some use cases involve a tree table view control with a parent node having a check
    box with an indeterminate box (hyphen mark) with two or more child nodes with
    at least one of its child nodes being unchecked (`selected` equaling `false`)
    and at least one child node checked.


    **Note:** The check box can allow the users to cycle through the three states
    by setting the `allowIndeterminate` property to `true`, using the `setAllowIndeterminate(true)`
    method. In other words, when a user sees an empty check box (`selected=false`),
    he/she can mouse click to check the check box (`selected=true`), and then click
    it again to be undefined displayed as a hyphen mark (`indeterminate=true`).


    When using check boxes, the most common scenarios usually involve two states:
    `checked` and `unchecked`. For example, when turning the lights on or off. Listing
    [6-11](#A323804_3_En_6_Chapter.html#Par83) shows the code simulating controls
    to a hypothetical lights control API that turns kitchen lights on or off.


    ```

    CheckBox kitchenLights = new CheckBox("Kitchen Lights");

    lightControlManager.kitchenLights()

    .switchProperty()

    .bind(kitchenLights.selectedProperty());

    ```


    ### Hyperlink


    The `Hyperlink` control is synonymous to the way web pages have text links used
    for navigating URLs or showing popups. `Hyperlink` controls usually display an
    underlined text as your mouse pointer hovers over the control. Also, foreground
    colors can change based on whether the link has already been clicked on. This
    has the idea of a link that has already been visited (the `visited` property).
    Listing [6-11](#A323804_3_En_6_Chapter.html#Par83) sets up a hyperlink with action
    code to respond when clicked. The action code will display the link’s text or
    URL as a web page that will be rendered inside a JavaFX `WebView` node.


    ```

    Hyperlink searchLink = new Hyperlink("www.google.com");

    WebView browser = new WebView();

    searchLink.setOnAction( actionEvent ->

    browser.getEngine()

    .load("https://" + searchLink.getText()));

    ```


    Listing 6-11. A Hyperlink with Action Code that Loads a Web Page into a WebView
    Control


    ### Radio Button


    Radio buttons are typically used in applications asking the users for one choice
    among available (two or more) choices. Figure [6-8](#A323804_3_En_6_Chapter.html#Fig8)
    shows radio buttons used to allow the users to select a payment type.


    ![A323804_3_En_6_Fig8_HTML.jpg](A323804_3_En_6_Fig8_HTML.jpg)


    Figure 6-8. A hypothetical payment selection screen. Radio buttons are used to
    allow the users to select a method of payment.


    To create radio buttons as shown in Figure [6-8](#A323804_3_En_6_Chapter.html#Fig8),
    look at the code found in Listing [6-12](#A323804_3_En_6_Chapter.html#Par88).
    It begins by creating a `ToggleGroup` that will hold the chosen value. The toggle
    group allows only one radio button to be selected at a time. The `ToggleGroup`
    has a listener responsible for displaying the payment method to the console when
    a check box is selected.


    ```

    Label questionLabel = new Label("What is your method of payment?");

    ToggleGroup group = new ToggleGroup();

    RadioButton visaButton = new RadioButton("Visa");

    visaButton.setUserData("Visa");

    visaButton.setSelected(true);

    RadioButton payPalButton = new RadioButton("PayPal");

    payPalButton.setUserData("PayPal");

    RadioButton masterCardButton = new RadioButton("Master Card");

    masterCardButton.setUserData("Master Card");

    RadioButton bitCoinButton = new RadioButton("BitCoin");

    bitCoinButton.setUserData("BitCoin");

    RadioButton cashButton = new RadioButton("Cash");

    cashButton.setUserData("Cash");

    visaButton.setToggleGroup(group);

    payPalButton.setToggleGroup(group);

    masterCardButton.setToggleGroup(group);

    bitCoinButton.setToggleGroup(group);

    cashButton.setToggleGroup(group);

    group.selectedToggleProperty().addListener( listener -> {

    System.out.println("Payment type: " + group.getSelectedToggle().getUserData());

    });

    ```


    Listing 6-12. Code That Asks Users to Select One Payment Method


    **Tip:** You can use a JavaFX node’s `set/getUserData()` method to put any object
    into it. In this scenario, the `RadioButton` controls are set with a `String`
    value to uniquely identify each selected item.


