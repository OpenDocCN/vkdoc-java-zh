- fmt: '# Updating the Visualization Using the `AudioSpectrumListener` Interface


    Do you remember the earlier discussion about the MP3 audio player’s visualization
    of a spectrum area chart dancing about as the music plays? Still within the `playMedia()`
    method, let’s look at how to implement this mesmerizing effect.


    Continuing with the `playMedia()` method, the code will obtain the `Path` node
    having the ID `chart-area` that was created earlier. The following line retrieves
    the `Path` node using the root node’s `lookup()` method:


    ```

    // Obtain chart path area

    Path chartArea = (Path) root.lookup("#chart-area");

    ```


    Next, the code sets the media player’s audio spectrum listener with an `AudioSpectrumListener`
    (lambda expression) instance. The listener is notified periodically with updates
    of the audio spectrum. The following code is shown again from Listing [9-1](#A323804_3_En_9_Chapter.html#Par29).
    It shows the code that updates the `Path` node (`chart-area`) with a linear gradient
    color based on the magnitude array. Listing [9-6](#A323804_3_En_9_Chapter.html#Par93)
    shows the area chart plotted using the audio spectrum data. Every interval the
    audio spectrum data will plot an area chart. Based on the root pane’s size and
    defined chart padding, the code will use the magnitude array data to draw a closed
    path to be filled with a linear gradient.


    ```

    int chartPadding = 5;

    // The frequency domain is the X Axis.

    // The freqAxisY is the Y coordinate of the freq axis.

    double freqAxisY = root.getHeight() - 45;

    // The chart''s height

    double chartHeight = freqAxisY - chartPadding;

    // In the CSS file the padding is set with the following:

    //   -fx-border-insets: 6 6 6 6; (top, right, bottom, left)

    //   -fx-border-width: 1.5;

    // Below the padding will equal 7.5 which is the union of

    // the inset 6 (left) and border width of 1.5)

    double padding = root.getBorder().getInsets().getLeft();

    double chartWidth = root.getWidth() - ((2 * padding) + (2 * chartPadding));

    // Audio sound is in decibels and the magnitude is from 0 to -60

    // Squaring the magnitudes stretches the plot. Also dividing into

    // the chart height will normalize or keep the y coordinate within the

    // chart bounds.

    double scaleY = chartHeight / (60 * 60);

    double space = 5; // between each data point. Helps stretch the chart width-wise.

    mediaPlayer.setAudioSpectrumListener(

    (double timestamp,

    double duration,

    float[] magnitudes,

    float[] phases) -> {

    if (mediaPlayer.getStatus() == Status.PAUSED || mediaPlayer.getStatus() == Status.STOPPED)
    {

    return;

    }

    // The freqBarX is the x coordinate to plot

    double freqBarX = padding + chartPadding;

    // The scaleX is one unit. This keeps the plotting within the chart width area.

    double scaleX = chartWidth / (magnitudes.length * space);

    // Checks if the data array is created.

    // If not create the number of path components to be

    // added to the chartArea path. The check of the size minus 3 is excluding

    // the first MoveTo element, and the last two elements LineTo, and ClosePath

    // respectively.

    if ((chartArea.getElements().size() - 3) != magnitudes.length) {

    // Move to bottom left of chart.

    chartArea.getElements().clear();

    chartArea.getElements().add(new MoveTo(freqBarX, freqAxisY));

    // Update all LineTo elements to draw the line chart

    for(float magnitude:magnitudes) {

    double dB = magnitude * magnitude;

    dB = chartHeight - dB * scaleY;

    chartArea.getElements().add(new LineTo(freqBarX, freqAxisY - dB));

    freqBarX+=(scaleX * space);

    }

    // Close the path by adding LineTo to the bottom right

    // of the chart and close path to form an shape.

    chartArea.getElements().add(new LineTo(freqBarX, freqAxisY));

    chartArea.getElements().add(new ClosePath());

    } else {

    // If elements already created

    // go through and update path elements

    int idx = 0;

    for(float magnitude:magnitudes) {

    double dB = magnitude * magnitude;

    dB = chartHeight - dB * scaleY;

    // skip first MoveTo element in path.

    idx++;

    // update elements with a x and y

    LineTo dataPoint = (LineTo) chartArea.getElements().get(idx);

    dataPoint.setX(freqBarX);

    dataPoint.setY(freqAxisY - dB);

    freqBarX += (scaleX * space);

    }

    }

    });

    ```


    Listing 9-6. Area Chart Plotted Using the Audio Spectrum Data


    Listing [9-6](#A323804_3_En_9_Chapter.html#Par93) creates an area chart based
    on `Path` elements to denote the magnitude at a particular frequency. Beginning
    with the setup of the chart, the code defines padding of five pixels after the
    left inset of the root pane. Next, the `freqAxisY` variable is declared to contain
    the y-coordinate to draw the frequency axis (x-axis). Next, the `chartHeight`
    and `chartWidth` variables are defined and calculated. Because known insets and
    border widths are defined in CSS, the code will invoke the root pane’s `getBorder().getInsets().getLeft()`
    to obtain the left padding calculation. Padding is the union of the inset and
    border widths.


    In Figure [9-6](#A323804_3_En_9_Chapter.html#Fig6), the `freqAxisY` variable is
    the y-screen coordinate (fixed value) of the bottom of the area chart representing
    the frequency domain on the x-axis. The dB is a calculated value representing
    the decibels at a particular frequency for plotting the y-coordinate of each magnitude
    (data point).


    ![A323804_3_En_9_Fig6_HTML.jpg](A323804_3_En_9_Fig6_HTML.jpg)


    Figure 9-6. The area chart’s x-axis (`freqAxisY`) and y-axis (dB)'
