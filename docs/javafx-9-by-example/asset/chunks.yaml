    ```


    The Arduino group adds an affine to its list of transforms. You add this group
    to a `SubScene` inside another group. The sub-scene allows you to use a camera
    without affecting the rest of the scene:


    ```

    affine = new Affine();

    arduino.getTransforms().add(affine);

