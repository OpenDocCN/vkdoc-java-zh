  trans: '

    #### 语法


    指定 Lambda 表达式有两种方式。以下简单示例说明了其通用形式：


    ```

    (param1, param2, ...) -> expression;

    (param1, param2, ...) -> {  /* code statements */ };

    ```


    Lambda 表达式以括号包围的参数列表开头，后跟箭头符号 `->`（一个连字符和一个大于号）以及表达式体。与 Java 方法类似，括号用于传入表达式中的参数。仅当只定义一个参数时，外围括号才是可选的。当表达式不接受参数（即空参数列表）时，括号仍然是必需的。


    箭头符号用于分隔参数列表和表达式体。表达式体或代码块可以用花括号包围，也可以不用。当表达式体没有外围花括号时，它必须只包含一条语句。当表达式为单行语句时，它会被求值并隐式返回给调用者。只需记住，如果方法需要返回类型，并且你的代码块使用了花括号，则必须包含
    `return` 语句。清单 4-3 展示了两个等价的 Lambda 表达式，一个带花括号，一个不带。


    ```

    // 显式返回结果

    Function func = x -> { return x * x; }

    // 求值并隐式返回结果

    Function func = x -> x * x;

    double y = func(2.0); // x = 4.0

    清单 4-3.

    一条语句显式返回，另一条隐式返回

    ```


    另需注意的一点是，参数可以选择性地指定类型。编译器会根据上下文推断参数的类型。在清单 4-3 中，有一个类型为 `java.util.function.Function<T,
    U>` 的函数式接口，其中 `T` 类型被转换为 `U` 类型。你会注意到参数 `x` 没有指定 `Double` 类型。这是因为 Java 8 编译器会根据函数式接口的定义来推断类型。


    让我们看一个将 Lambda 表达式传递给方法的示例。一个简单的例子是使用 `setOnAction()` 方法设置 JavaFX 按钮。如前所述，编译器可以通过匹配方法的参数类型（其签名）和返回类型来推断
    Lambda 参数。有时为了可读性，你可以选择性地指定每个参数的类型。如果指定了类型，则必须用括号将参数列表括起来。以下代码行为 JavaFX 按钮的 `setOnAction()`
    方法中的 Lambda 表达式指定了参数类型（`ActionEvent`）。


    ```

    btn.setOnAction( (ActionEvent event) -> System.out.println("Hello World") );

    ```


    你还会注意到，对于方法内部（例如 `setOnAction()` 方法）的单行语句，省略分号也是可以的。最后一点语法糖是，如果 Lambda 只传入一个参数，则可以省略括号。以下是一个带有一个参数（`event`）且没有括号的
    Lambda 表达式。


    ```

    btn.setOnAction( event -> System.out.println("Hello World") );

    ```


    作为对刚刚讨论的语法变体的总结，清单 4-4 中的语句都是等价的 Lambda 表达式。


    ```

    btn.setOnAction( (ActionEvent event) -> {System.out.println(event); } );

    btn.setOnAction( (event) -> System.out.println(event) );

    btn.setOnAction( event -> System.out.println(event) );

    清单 4-4.

    为 JavaFX 按钮设置操作代码的三个语法等价的 Lambda 表达式

    ```


    #### 方法引用


    清单 4-4 展示了为 JavaFX 按钮的 `ActionEvent` 表达 Lambda 表达式的三种方式，但你知道还有第四种方式吗？


    在使用 Lambda 时，经常会有方法接受单个参数作为输入，或返回单个值。这非常冗余，因此 Java 8 引入了方法引用的概念。方法引用本质上是一种语法糖，它允许你以更简洁的方式调用方法，从而使代码更易于阅读。例如，以下是一个使用方法引用的
    Lambda 表达式：


    ```

    btn.setOnAction(System.out::println);

    ```


    这段代码设置了按钮的操作，你会注意到它是一个简洁的版本，其行为与清单 4-4 相同。区别在于，Lambda 中没有 `ActionEvent` 的输入参数，并且在
    `System.out` 和 `println` 方法之间有一个不寻常的双冒号。双冒号被称为作用域运算符，它通过名称引用方法。你还会注意到 `println`
    方法的括号被省略了。如果你还记得，每当 Lambda 表达式接受单个参数作为输入时，该参数会隐式传递给接受单个输入的 `println` 方法。当然，两者的类型必须相同。示例中的事件对象会隐式调用
    `toString()` 来向 `println` 方法传递一个 `String`。


    本书范围之外还有其他方法引用类型。请参阅 Javadoc 文档了解其他用例场景。查看以下关于方法引用的教程：


    [`https://docs.oracle.com/javase/tutorial/java/javaOO/methodreferences.html`](https://docs.oracle.com/javase/tutorial/java/javaOO/methodreferences.html)

