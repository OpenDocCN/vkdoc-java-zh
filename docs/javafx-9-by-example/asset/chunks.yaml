    javac -d mods/com.jfxbe.touchevents $(find src/com.jfxbe.touchevents -name "*.java")

    java --module-path build/modules -m com.jfxbe.touchevents/com.jfxbe.touchevents.TouchEvents

    清单 14-3.

    运行触摸事件项目

    ```


    ### 工作原理是什么？


    这个 `circle` 对象使用 `PathTransition` 沿着 `onePath` 路径进行动画，过渡时间为 4000 毫秒。`onePath`
    的点元素列表由 `LineTo` 对象定义，这些对象是根据从简单鼠标事件处理程序捕获的 x 和 y 坐标构建的。在这种情况下，捕获由 `OnMousePressed`
    事件启动，由 `OnMouseDragged` 事件收集，并使用 `OnMouseReleased` 事件完成。


    然而，如前所述，描绘是一种非常自然的人类交互方式，并且适合用手来完成。如果您在支持触摸的屏幕设备上运行此程序，您可以轻松使用 JavaFX 触摸事件支持来增强您的描绘应用程序。触摸事件，如同所有手势事件一样，在
    JavaFX 9 中拥有一流的事件处理能力。如果某个 GUI 组件支持 `Mouse` 事件，那么它也将支持手势事件。最棒的是，`Mouse` 事件和手势事件可以在单个应用程序中很好地共存。您无需替换现有的
    `Mouse` 事件处理程序，而是可以将每个 `Mouse` 事件处理程序与其对应的 `Touch` 事件处理程序匹配起来。这就是为什么在清单 14-1 中添加了
    `MousePressed`、`TouchPressed`、`MouseDragged`、`TouchMoved`、`MouseReleased` 和 `TouchReleased`
    事件。


    如您所见，我们非常谨慎地确保手势事件处理能够像使用传统的 `Mouse` 事件处理一样无缝且自然。

