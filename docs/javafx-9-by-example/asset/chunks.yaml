- fmt: '# JavaFX Tools


    You’ll find helpful tools from building GUIs to debugging applications in the
    following links:


    - Scene Builder: A tool to build JavaFX-based UIs using the FMXL markup language:
    [`http://www.oracle.com/technetwork/java/javafx/tools/index.html`](http://www.oracle.com/technetwork/java/javafx/tools/index.html)

    - Scenic View tool: A Tool to Visually Debug JavaFX UIs during Runtime: [`http://fxexperience.com/scenic-view`](http://fxexperience.com/scenic-view)

    - Caspian Styler, Animation Spline Editor and Derived Color Calculator: [`http://fxexperience.com/2012/03/announcing-fx-experience-tools`](http://fxexperience.com/2012/03/announcing-fx-experience-tools)

    - JavaFX Tooling and Runtime for Eclipse and OSGi (founder Tom Schindl): [`http://www.eclipse.org/efxclipse/index.html`](http://www.eclipse.org/efxclipse/index.html)
    [`http://tomsondev.bestsolution.at`](http://tomsondev.bestsolution.at)

    - Firebug Lite: A Browser-Based Debugger Tool for JavaFX WebView Node: [`http://stackoverflow.com/questions/17387981/javafx-webview-webengine-firebuglite-or-some-other-debugger`](http://stackoverflow.com/questions/17387981/javafx-webview-webengine-firebuglite-or-some-other-debugger)

    - JavaFX 3D Viewer and Importer: [`http://www.interactivemesh.org/models/jfx3dimporter.html`](http://www.interactivemesh.org/models/jfx3dimporter.html)

    - IDR Solutions Showcasing a PDF Viewer for JavaFX: [`http://blog.idrsolutions.com/2014/03/sneak-preview-new-javafx-pdf-viewer`](http://blog.idrsolutions.com/2014/03/sneak-preview-new-javafx-pdf-viewer)

    - TestFX: Easy-to-Use Library for Testing JavaFX: [`https://github.com/TestFX/TestFX`](https://github.com/TestFX/TestFX)

    - Introducing MarvinFx, Hendrik Ebbers: Easily Tests JavaFX Controls and Scenes
    with a Special Attention to Properties: [`http://www.guigarage.com/2013/03/introducing-marvinfx`](http://www.guigarage.com/2013/03/introducing-marvinfx)

    - JemmyFX: Provides an API for Testing JavaFX User Interface in Your Application:
    [`https://jemmy.java.net/JemmyFXGuide/jemmy-guide.html`](https://jemmy.java.net/JemmyFXGuide/jemmy-guide.html)

    - ReactiveX/RxJavaFX by Thomas Nield: JavaFX bindings for RxJava. RxJavaFX is
    a lightweight library to convert JavaFX events into RxJava Observables/Flowables
    and vice versa. It also has a Scheduler to safely move emissions to the JavaFX
    Event Dispatch Thread: [`https://github.com/ReactiveX/RxJavaFX`](https://github.com/ReactiveX/RxJavaFX)
    Twitter: `@thomasnield9727`


    # Enterprise GUI Frameworks


    GUI frameworks enable developers to develop enterprise applications rapidly. From
    binding to MVC framework patterns, the following will help you become productive
    when developing JavaFX applications.


    - Gluon Mobile : Gluon provides an end-to-end enterprise mobile solution for developing
    cross-platform mobile apps that easily connect to enterprise backends and cloud
    services, all while being centrally managed: [`http://gluonhq.com`](http://gluonhq.com)

    - Griffon (project lead Andres Almiray, `@aalmiray`): Griffon is an application
    framework for developing desktop applications in the JVM: [`http://griffon-framework.org`](http://griffon-framework.org)

    - jpro : A new technology that brings Java back into the browser without a Java
    plugin. To achieve that, jpro runs JavaFX on the server and maps its scene graph
    directly into the browser. The client-side rendering is highly optimized with
    browser side approximations to get a smooth user experience free of lags: [`https://www.jpro.io`](https://www.jpro.io)
    Twitter: [`https://twitter.com/jpro_io`](https://twitter.com/jpro_io) Co-founder
    Tobias Bley, `@tobibley`

    - DukeScript : A new technology for creating cross-platform mobile, desktop, and
    web applications. DukeScript applications are plain Java applications that internally
    use HTML5 technologies and JavaScript for rendering. This way, developers only
    need to write clean Java code and can still leverage the latest developments in
    modern UI technology: [`https://dukescript.com`](https://dukescript.com) Twitter:
    `@DukeScript`

    - TornadoFX by Edvin Syse: Lightweight JavaFX Framework for the Kotlin language
    : GitHub: [`https://github.com/edvin/tornadofx`](https://github.com/edvin/tornadofx)
    Twitter: `@edvinsyse`

    - Open Dolphin: A JavaFX MVC Framework (founded by Dierk Koenig (`@mittie`) of
    Canoo Engineering): [`http://open-dolphin.org/dolphin_website/Home.html`](http://open-dolphin.org/dolphin_website/Home.html)

    - JavaFX MVP framework based on convention over configuration and dependency injection.
    Founded by Adam Bien (`@AdamBien`): [`http://afterburner.adam-bien.com`](http://afterburner.adam-bien.com)

    - ReduxFX 0.2 by Michael Heinrichs: [`https://netopyr.com/2017/02/27/new-features-reduxfx-0-2/`](https://netopyr.com/2017/02/27/new-features-reduxfx-0-2/)
    [`https://netopyr.com`](https://netopyr.com) Twitter: `@net0pyr`

    - NetBeansIDE-AfterburnerFX-Plugin by Peter Rogge: The NetBeansIDE-AfterburnerFX-Plugin
    is a NetBeans IDE plugin that supports the file generation in convention with
    the library `afterburner.fx` in a JavaFX project: [`https://github.com/Naoghuman/NetBeansIDE-AfterburnerFX-Plugin`](https://github.com/Naoghuman/NetBeansIDE-AfterburnerFX-Plugin)
    Twitter: `@naoghuman`

    - FXForm2 : A library providing automatic JavaFX 2.0 form generation: [`http://dooapp.github.io/FXForm2`](http://dooapp.github.io/FXForm2)

    - Integrating Spring Boot with JavaFX by MVP Java: [`https://youtu.be/hjeSOxi3uPg`](https://youtu.be/hjeSOxi3uPg)

    - JavaFX Multiple Controllers by MVP Java: [`https://www.youtube.com/watch?v=osIRfgHTfyg`](https://www.youtube.com/watch?v=osIRfgHTfyg)


    # Domain-Specific Languages


    A domain-specific language for graphics can help eliminate a lot of boilerplate
    code, while keeping code easier to read and manage. The following are DSLs for
    JavaFX in various computer languages that run on top of the Java runtime environment.


    - TornadoFX: A Kotlin-based domain-specific language to create JavaFX applications:
    [`https://github.com/edvin/tornadofx`](https://github.com/edvin/tornadofx)

    - GroovyFX: A Groovy-based domain-specific language to create JavaFX applications:
    [`http://groovyfx.org`](http://groovyfx.org)

    - ScalaFX: A Scala-based domain-specific language to create JavaFX applications:
    [`https://code.google.com/p/scalafx`](https://code.google.com/p/scalafx)

    - RubyFX: A Ruby-based domain-specific language to create JavaFX applications:
    [`https://github.com/jruby/jrubyfx`](https://github.com/jruby/jrubyfx)

    - Visage: A JavaFX-based domain-specific language to create JavaFX applications:
    [`https://code.google.com/p/visage`](https://code.google.com/p/visage)


    # Custom UIs


    You can customize a user interface such as styling using CSS or using custom controls.
    The following links are reference guides and blogs.'
