    `DrawingLines.java` 首先使用 `setTitle()` 方法设置 `Stage` 窗口的标题。然后，它为 `Scene` 对象创建一个根节点（[`javafx.scene.Group`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Group.html)）。如果你还记得第
    1 章中讨论的 `HelloWorld` 示例，添加到 JavaFX Scene 图中的第一个节点被称为根节点。根节点始终是 JavaFX 容器类型的节点，例如
    `Group` 或 `BorderPane`。所有容器类型的节点（即那些继承自 [`javafx.scene.Parent`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Parent.html)
    的节点）都有一个名为 [`getChildren`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Parent.html#getChildren--)
    `().add()` 的方法，该方法允许将任何 JavaFX 节点添加到场景图中。默认情况下，`Scene` 对象会填充白色背景；然而，由于我们的一条线是白色的，代码会将场景背景色设置为灰色（`Color.GRAY`）。这样能形成一些对比，以便看到白色的线条。在本书的平装版中，图片是灰度显示的，但如果你使用
    PDF 版本，代码会分别创建红色、白色和蓝色三条线。


    在第一行中，代码设置了 `Line` 节点的通用属性。这些通用属性包括描边颜色、描边宽度和描边线帽。如前所述，线条内部没有形状，因此线条的填充颜色属性被设置为
    `null`（无颜色），而描边颜色默认为黑色。要设置描边颜色，你可以使用 [`javafx.scene.paint.Color`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/paint/Color.html)
    类中内置的 JavaFX 颜色。例如，对于红色，你可以使用 [`Color.RED`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/paint/Color.html#RED)。指定颜色的方法有很多种，例如使用
    RGB、HSB 或 Web 十六进制值。这三种方法也都支持指定 alpha 值（透明度）。稍后，你还会看到其他为形状着色的方法。请参考 Javadoc 以了解更多关于颜色（`javafx.scene.paint.Color`）的信息。设置好描边轮廓颜色后，你可以使用
    [`setStrokeWidth`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Shape.html#setStrokeWidth-double-)
    `()` 方法来设置线条的描边宽度（粗细）。形状还有一个描边线帽属性。该属性指定了线条端点的样式。例如，将描边线帽指定为平头（[`StrokeLineCap`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html)`.`[`BUTT`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html#BUTT)）会形成平坦的方形端点，而圆头（[`StrokeLineCap.ROUND`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html#ROUND)）样式则会呈现圆形端点。以下代码片段设置了线条节点的通用形状属性：


    ```

    // 设置通用属性

    redLine.setStroke(Color.RED);

    redLine.setStrokeWidth(10);

    redLine.setStrokeLineCap(StrokeLineCap.BUTT);

    ```


    在红色 `Line` 节点上设置好通用属性后，示例代码创建了一个虚线模式。要形成虚线模式，你只需向 `getStrokeDashArray().add()`
    方法添加 `double` 值即可。每个值代表一个虚线段的像素数。在设置虚线段数组时，第一个值（10d）是一个可见的、宽度为 10 像素的虚线段。接下来是一个
    5 像素的空白段（不可见）。随后是一个宽度为 15 像素的可见虚线段，以此类推。由于数组包含奇数个值，你可以看到模式在重复自身时，第一个值（10d）会变成一个
    10 像素的空白段（不可见）。以下是创建 `Line` 节点虚线模式的代码：


    ```

    // 创建虚线模式

    redLine.getStrokeDashArray().addAll(10d, 5d, 15d, 5d, 20d);

    redLine.setStrokeDashOffset(0);

    ```


    默认情况下，虚线偏移属性值为 `0`。要查看偏移属性变化时会发生什么，用户可以向右拖动滑块拇指以增加偏移量。描边虚线偏移是指从当前模式的哪个位置开始绘制线条。


    由于另外两条线在修改通用属性的方式上基本相同，我就不再进一步解释了。我相信你现在已经理解了创建线条的基本原理。关于这个示例，最后要提的一点是 Slider
    控件以及它通过绑定进行连接的方式。


    请注意，在清单 3-1 中，在刚刚讨论的三条线之后，滑块控件有一个处理程序代码，它会动态更新一个 `Text` 节点以显示虚线偏移值。同时请注意对 `addListener()`
    方法的调用，其中包含作为更改监听器添加的简洁代码。这在你看来可能有些奇怪；然而，它反映了一个新的 Java 8 特性，称为 lambda 表达式，你将在第
    4 章中了解更多。以下代码片段使用 lambda 而不是匿名内部类（`ChangeListener`）创建了一个更改监听器。


    ```

    // 显示描边虚线偏移值

    slider.valueProperty()

    .addListener( (ov, oldVal, newVal) ->

    offsetText.setText("Stroke Dash Offset: " + newVal));

    ```


    学习如何绘制线条将帮助你将这些知识应用到 JavaFX 中的任何 `Shape` 节点上。这些重要的概念将允许你创建任何你认为合适的、具有特定样式的形状。说到形状，接下来就要讨论它们了。

