  trans: '

    #### 类成员变量


    首先，我来描述一下类变量。变量 `MY_PASS` 包含一个硬编码的密码字符串“`password1`”。接下来，声明了 `GRANTED_ACCESS`
    变量，其类型为 `SimpleBooleanProperty` 类，默认值为 `false`。该变量稍后将绑定到绿色对勾图标（`grantedIcon`）节点的
    `visible` 属性上。基本上，当用户输入正确的密码按键时，`GRANTED_ACCESS` 将变为 `true`，从而触发绿色对勾图标节点的可见属性设置为
    `true`，进而在场景图中显示该图标。当密码错误时，`visible` 属性变为 `false`，从而隐藏绿色对勾节点（`Region`）。常量变量 `MAX_ATTEMPTS`
    是用户允许的最大登录尝试次数。最后，类型为 `IntegerProperty` 的 `ATTEMPTS` 变量保存了用户当前已进行的登录尝试次数。


    #### start( ) 方法


    `start()` 方法是 JavaFX 应用程序线程生命周期的起点，负责设置舞台、场景以及要显示的子节点。在 `start()` 方法中，创建了一个 `User`
    对象，用作与 GUI 表单同步的领域对象。要查看 `User` 类的代码，请参考代码清单 4-26。接下来，通过调用 `Stage.initStyle(StageStyle.TRANSPARENT)`
    方法将舞台设置为透明。这将允许你创建半透明且形状不规则的窗口，而无需原生操作系统标题栏和主内容周围边框的装饰。你还会注意到 `setAlwaysOnTop(true)`
    语句，它会使 `Stage`（对话框窗口）始终位于桌面上所有其他应用程序窗口之上。为了方便起见，以下代码重复展示了如何让你的 Stage 窗口透明并显示在所有其他应用程序窗口之上。


    ```

    primaryStage.initStyle(StageStyle.TRANSPARENT);

    primaryStage.setAlwaysOnTop(true);

    ```


    在代码初始化舞台之后，创建了一个 [`Scene`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Scene.html)
    对象，其根节点类型为 [`Group`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Group.html)，允许添加子节点。JavaFX
    的 `Group` 节点是一个简单的固定大小的父容器。在本书后续部分，你将学习其他能够动态调整大小的布局父容器。目前，对于这个子节点很少的简单示例，我们使用了
    `Group` 节点。


    回到根节点，尽管根节点是透明的，但仍需要创建一个矩形背景作为放置控件的表面。矩形背景的大小需要与定义的 `Scene`（登录屏幕）对象相同。以下代码片段创建了一个
    `Scene` 对象，其根节点为 `Group` 节点，背景填充颜色为 null，从而使窗口透明。


    ```

    Scene scene = new Scene(root, 320, 112, null);

    ```


    登录屏幕的矩形背景实际上是一个圆角矩形（[`Rectangle`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Rectangle.html)），其弧高和弧宽均为
    15 像素，填充颜色为黑色，不透明度为 55%。所有样式信息都位于 `style.css` 文件中，如代码清单 4-35 所示。要应用 JavaFX CSS，代码将加载位于应用程序
    `resources` 目录下的 CSS 文件。以下代码片段演示了如何加载样式表定义并将其应用到场景中。


    ```

    // 加载 style.css 以设置 JavaFX 节点的样式

    scene.getStylesheets()

    .add(getClass()

    .getResource("/style.css")

    .toExternalForm());

    ```


    为了保持外观一致，代码声明了一个 `common-foreground-color` CSS 变量，其颜色为白色，不透明度为 90%。要查看完整的 style.css
    文件中的 CSS 样式定义，请查看前面提到的代码清单 4-35 中的源代码。


    继续看代码清单 4-34，在 `start()` 方法中，设置好初始矩形背景表面后，代码创建了一个 [`Label`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/control/Label.html)
    节点，用于表示用户的用户名，该字段为只读（根据 `User` 类）。为了获取用户的真实用户名，代码调用了 Java 的 `System.getProperty("user.name")`
    方法。该标签节点设置为 30 磅的 Helvetica 字体，填充颜色为 `common-foreground-color`（白色）属性。标签节点的 `text`
    属性通过 `bind()` 方法绑定到 `User` 对象的只读 `userName` 属性。使用 JavaFX 的 `Label` 节点来表示用户的用户名字段。由于文本字符串可能较长，该字段的宽度可能会超过父容器的最大宽度。因此，当
    JavaFX 标签的文本长度超过允许的宽度时，标签上的文本将被缩短，并以省略号结尾。


    接下来，代码创建了一个 `HBox` 布局面板节点，用于容纳 `Label` 节点（`username`）。`HBox`（`userNameCell`）将通过使用
    JavaFX 属性的流畅 API 来绑定其最大宽度和首选宽度属性，以确保它不会占用所有水平空间，并为挂锁图标留出放置的空间。图 4-3 显示了登录对话框窗口右上角的挂锁图标。以下代码片段展示了一个包含代码清单
    4-34 中 `TextNode`（`username`）的 `HBox`。


    ```

    // 包装文本节点

    HBox userNameCell = new HBox();

    userNameCell.getChildren().add(userName);

    userNameCell.prefWidthProperty()

    .bind(primaryStage.widthProperty()

    .subtract(45));

    ```


    我在这里对 [`HBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/HBox.html)
    布局控件提及甚少，因为它将在第 5 章中进一步讨论，该章涵盖布局和 Scene Builder 工具。在本书的上一版中，我使用 JavaFX 的 `SVGPath`
    节点创建了挂锁图标；然而，为了将节点与其样式定义分离，你必须使用 `Region` 节点而不是 `SVGPath` 节点。当使用 `SVGPath` 节点并指定其
    SVG 路径表示法文本时，你会发现只能通过编程方式（Java 代码）使用 `setContent()` 方法来实现。为了模拟 `SVGPath` 节点，但将
    SVG 路径表示法代码放在 CSS 样式文件中，你将不得不使用 `Region` 节点。


    `Region` 节点是一个非常通用的节点，通常用作 JavaFX 布局节点中许多可调整大小的父容器节点的基类。[`Region`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Region.html)
    节点拥有大量的 CSS 样式属性，不仅允许你设置边框和背景的样式，有趣的是，还可以指定 SVG 路径表示法来创建自定义形状。查看代码清单 4-34，你将看到用于绘制各种形状图标的
    SVG 路径表示法。当指定 SVG 路径表示法作为值时，你会注意到使用了 `-fx-shape` 属性。

    '
- fmt: '# 排版后的内容


    回顾第[3](#A323804_3_En_3_Chapter.html)章，我们学习了如何使用路径元素生成复杂形状来创建冰淇淋蛋筒，如图[3-10](#A323804_3_En_3_Chapter.html#Fig10)所示。话虽如此，`Region`类与`Path`节点非常相似，不同之处在于子路径元素以W3C
    SVG路径表示法的字符串形式表达。要渲染路径，表示路径表示法的字符串定义在`style.css`文件中。要了解如何使用`SVG`路径，请访问[`http://www.w3.org/Graphics/SVG`](http://www.w3.org/Graphics/SVG)。为了创建挂锁图标，我最初访问了Dmitry
    Baranovskiy开发的名为Raphaël的JavaScript库的网站；然而，该网站已不再可用。当时，我能够获取到非常好的SVG图标用于此示例。接下来，代码创建了一个`HBox`作为第一行（`row1`）的容器，用于容纳`userNameCell`和`padLock`节点。


    创建第一行后，代码继续创建`PasswordField` UI控件。与`Label`节点一样，`PasswordField` UI控件的字体可以通过编程方式或使用JavaFX
    CSS进行设置。提示文本显示在图[4-3](#A323804_3_En_4_Chapter.html#Fig3)的初始登录对话框中，提示文本为“Password”。


    为了对密码字段进行一些最终样式设置，代码继续使用JavaFX CSS样式，您将在后续章节中看到。应用于密码字段的CSS样式是白色背景，不透明度为80%。仍在处理密码字段时，代码使用了流畅接口`subtract()`方法来绑定首选宽度，该宽度减去了55像素。这为包含授权和拒绝图标的`StackPane`留出了空间。最后，用户对象的`passwordProperty`被绑定到`PasswordField`的`textProperty`。这是一个单向绑定，这意味着当用户在UI密码字段中输入文本时，`User`对象的密码属性会发生变化，反之则不然。


    接下来，代码使用`Region`节点创建了两个图标，分别表示“X”和勾选标记，表示拒绝（`deniedIcon`）和授权（`grantedIcon`）访问图标。这些图标将放置在`StackPane`布局节点中。`StackPane`布局允许子节点堆叠，因此得名。在此场景中，`deniedIcon`和`grantedIcon`节点彼此堆叠在一起。这种技巧允许您使用`setVisible()`方法在图标之间切换。作为一个整体（堆栈面板）节点，它将被定位在密码字段的右侧。当用户在密码字段中键入时，布尔属性`GRANTED_ACCESS`会被更新，从而更新`grantedIcon`的可见属性。以下代码语句显示了绑定到`GRANTED_ACCESS`属性的可见属性。


    ```

    grantedIcon.visibleProperty().bind(GRANTED_ACCESS);

    ```


    完成第二行后，代码创建了另一个与第一行类似的`HBox`，这次容纳了密码字段和包含图标（拒绝和授权图标）的`StackPane`节点。接下来，代码继续连接UI控件，并向各种属性添加属性更改监听器（`ChangeListeners`）。代码继续处理`passwordField`，为方法`setOnAction()`添加一个作为函数式接口的操作，以响应用户按下Enter键。当用户按下Enter键时，以下处理程序代码设置在密码字段上。


    ```

    passwordField.setOnAction(actionEvent -> {

    if (GRANTED_ACCESS.get()) {

    System.out.printf("User %s is granted access.\n",

    user.getUserName());

    System.out.printf("User %s entered the password: %s\n",

    user.getUserName(), user.getPassword());

    Platform.exit();

    } else {

    deniedIcon.setVisible(true);

    ATTEMPTS.set(ATTEMPTS.add(1).get());

    }

    });

    ```


    本质上，如果密码匹配并且用户按下Enter，程序将退出并输出以下内容：


    ```

    Attempts: 1

    User cdea is granted access.

    User cdea entered the password: password1

    ```


    您还会注意到，代码通过调用流畅接口方法`add()`来递增`ATTEMPTS`属性。


    仍在处理密码字段时，代码添加了一个更改监听器来监听用户的按键。当用户在密码字段中键入时，密码会与存储的（硬编码的）密码进行比较。如果密码有效，代码将`GRANTED_ACCESS`属性设置为`true`，并通过`setVisible(false)`方法隐藏`deniedIcon`图标。


    最后，我添加了当用户失败尝试次数过多时的最后一部分连接。我基本上在`ATTEMPTS`属性上添加了一个更改监听器。该更改监听器将比较`MAX_ATTEMPTS`和`ATTEMPTS`，看它们是否相等。如果相等，它将调用JavaFX的`Platform.exit()`方法以优雅地退出应用程序。其余部分是将行组装到`VBox`布局中，并将其添加到场景的根节点以进行显示。


    ## 总结


    本章涵盖了属性和绑定的许多内容，特别是与Java 8新语言特性相关的内容。您了解了Java 8中的新特性，例如lambda表达式、流API和默认方法。从Java
    lambda开始，您学习了语法并使用了函数式接口。接下来，您使用了流API和常见的聚合函数。在使用了流API来操作集合中的元素的示例之后，您学习了如何使用默认方法扩展Java接口上的行为。然后，您探索了UI模式、Properties
    API以及更改支持的概念。在扎实理解属性使用的基础上，您学习了各种绑定策略。为了结束本章，您看到了一个如何创建登录对话框窗口的示例，该示例运用了您迄今为止学到的所有概念。接下来，在第[5](#A323804_3_En_5_Chapter.html)章中，您将探索JavaFX
    UI布局和UI控件。


    # 5. 布局与Scene Builder


    随着越来越多的图形丰富应用程序（如桌面、智能手机和平板电脑设备）进入我们的生活，设计能够跨不同外形因素提供更好可用性的GUI应用程序变得非常重要。随着不同屏幕尺寸数量的增加，UI开发人员需要学习如何创建具有UI布局管理意识的应用程序。UI布局管理是在JavaFX场景图上定位或调整子节点大小的能力。本章讨论了许多GUI应用程序中最常见的JavaFX布局。


    本章还介绍了Scene Builder工具，这是一个图形化（所见即所得）编辑器，允许您以图形方式开发UI，而无需手动编码（以编程方式）UI元素。在本节中，您将学习如何下载和安装UI编辑器工具。安装Scene
    Builder后，您将学习如何构建一个典型的UI表单，该表单由常见的UI节点（如文本字段和按钮）组成。稍后，您将创建一个利用UI表单序列化文件格式（FXML）的应用程序。使用FXML，您将有机会通过JavaFX的机制将UI元素连接到控制器代码，从而了解流行的MVC（模型/视图/控制器）UI模式的各个方面。'
