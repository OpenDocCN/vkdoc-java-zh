- fmt: '#### Run Example Application


    After compiling Listing [6-6](#A323804_3_En_6_Chapter.html#Par37), you will want
    to run the example application from the command line. To run the example, you
    need to include the `FontAwesomeFX` library on the classpath, including the compiled
    code in the `classpath` directory. You’ll notice that on UNIX/MacOS/Linux systems,
    the `:` was used as a separator to append multiple paths for the classpath. On
    a Windows system, you need to use the `;` as a separator. The following command
    will run the example application.


    ```

    java -cp classpath:lib/fontawesomefx-8.9.jar com.jfxbe.LabelAwesome

    ```


    After running the example, Figure [6-6](#A323804_3_En_6_Chapter.html#Fig6) shows
    the output of the `LabelAwesome` application. The `FontAwesomeFX` library supports
    the following font icon packs: FontAwesome, Material Design, Material Icon set,
    Oct Icon set, and Weather Icon set. To see the latest updates, visit Jens Deter’s
    site at [`http://www.jensd.de/wordpress/?tag=fontawesome`](http://www.jensd.de/wordpress/?tag=fontawesome).


    ![A323804_3_En_6_Fig6_HTML.jpg](A323804_3_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    The output of Listing [6-2](#A323804_3_En_6_Chapter.html#Par14) depicts a sampler
    application to showcase Jens Deter’s FontAwesomeFX library


    ### How It Works


    In Listing [6-6](#A323804_3_En_6_Chapter.html#Par37), the code begins by declaring
    a static `Map` to hold entries of a String name of the icon pack and a list of
    `de.jensd.fx.glyphs.GlyphIcons` objects. The following code snippet is the icon
    packs map declaration.


    ```

    Map> ICON_PACKS_MAP = new HashMap();

    ```


    `GlyphIcons` is an interface for implementation classes that map to individual
    Unicode characters to a vector icon. For instance, the `FontAwesomeIcon` class
    is an implementation of the `GlyphIcons` interface, which contains all of the
    FontAwesome’s icon mappings from the TrueType font file `fontawesome-webfont.ttf`.
    To see the full source code, visit Jens Deter’s `FontAwesomeFX` projects source
    code at:


    [`https://bitbucket.org/Jerady/fontawesomefx`](https://bitbucket.org/Jerady/fontawesomefx)


    #### The `init()` Method


    Next, the overridden `init()` method (from the `Application` class) implements
    the loading process of all the supported icon font files based on the path of
    the font file. The JavaFX `javafx.scene.text.Font` class can load font files from
    an input stream as a resource on the classpath using the `openStream()` method.
    In this example, the fonts are loaded using the `loadFont()` method with a given
    input stream. The font file that is loaded is a TrueType font (TTF) type file
    that is inside of the `FontAwesomeFX`’s JAR file. The following code loads a font
    file from the variable (`FontAwesomeIconView.TTF_PATH`), which is a string containing
    the path of the font at `/de/jensd/fx/glyphs/fontawesome/fontawesome-webfont.ttf`:


    ```

    Font.loadFont(GlyphsDude.class.getResource(FontAwesomeIconView.TTF_PATH).openStream(),
    10.0);

    ICON_PACKS_MAP.put("FontAwesomeIcon", Arrays.asList(FontAwesomeIcon.values()));

    ```


    #### The `start()` Method


    After the initial setup of the fonts, the `start()` method sets up the application’s
    interface. It begins by creating the title of the application titled `LabelAwesome`.


    ##### Using a `TextFlow` Control


    In Figure [6-5](#A323804_3_En_6_Chapter.html#Fig5), you’ll notice the title’s
    text. `Label` and `Awesome` have different styles but are displayed together.
    Here the code uses a `javafx.scene.text.TextFlow` node to contain mixed `Text`
    objects. In this example, the beginning word Label is just solid black and the
    word Awesome has an inner shadow effect. The following code snippet adds Label
    and Awesome `Text` nodes into the `TextFlow` object.


    ```

    TextFlow title = new TextFlow(labelText, awesomeText);

    ```


    After setting up the title banner, the main display area (border pane’s center)
    is created to contain the display icon area. Here, each label is created with
    a text description and an icon font (image) to be added to a `VBox` pane to form
    a row. If you are not familiar to layouts such as `BorderPane` or `VBox`, read
    Chapter [5](#A323804_3_En_5_Chapter.html), which covers layouts and Scene Builder.


    ##### Using a `ComboBox` Control


    Next, you create a combo box selection control containing a string representing
    the name of a particular font pack. Listing [6-7](#A323804_3_En_6_Chapter.html#Par55)
    is a reshowing of the code section in the `start()` method that creates a combo
    box control to allow the users to select the supported font packs from the `FontAwesomeFX`
    library. In Listing [6-7](#A323804_3_En_6_Chapter.html#Par55), you’ll notice the
    code setting the `onAction` property using the `setOnAction()` method. This method
    is where the attached handler (`EventHandler`) gets invoked whenever an icon pack
    is chosen from the user in a drop-down list. Once the `onAction` event is triggered,
    the `showIconList()` method is invoked. The `showIconList()` method will be explained
    in more detail later.


    ```

    List iconPackList = new ArrayList();

    iconPackList.add("FontAwesomeIcon");

    iconPackList.add("MaterialDesignIcon");

    iconPackList.add("MaterialIcon");

    iconPackList.add("OctIcon");

    iconPackList.add("WeatherIcon");

    ObservableList obsIconPackList = FXCollections.observableList(iconPackList);

    ComboBox iconPacks = new ComboBox(obsIconPackList);

    iconPacks.setValue(iconPackList.get(0));

    .

    // code ommitted (Other controls declared and created)

    .

    .

    // Attaching an action to the combo box control to redisplay the labels.

    // When Combo box chooses an Icon pack.

    iconPacks.setOnAction(actionEvent ->

    showIconList(inputField.getText(),

    labelDisplayPanel,

    iconPacks.getValue(),

    position.getSelectedToggle()

    .getUserData()));

    Listing 6-7.

    Setting Up a Combo Box Control to Allow the User to Select the Font Pack

    ```


    After creating the combo box control for selecting a font pack, the code creates
    an auto search text field that allows the users to search through icons within
    font packs.'
