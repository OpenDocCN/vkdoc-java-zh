- fmt: "### Arduino Web Editor\n\n`Arduino Web Editor`（需要一次性安装插件）允许你通过 USB 线或网络从浏览器将草图上传到开发板。设置此插件只需几个简单步骤：\n\
    \n1.  访问 `Arduino Create` 门户网站 [`https://create.arduino.cc/getting-started`](https://create.arduino.cc/getting-started)，并点击\
    \ `Setup the Arduino Editor Plugin` 链接，如图 [12-5](#A323804_3_En_12_Chapter.html#Fig5)\
    \ 所示。\n\n    ![A323804_3_En_12_Fig5_HTML.jpg](A323804_3_En_12_Fig5_HTML.jpg)\n\
    \n    图 12-5. Arduino Editor 插件设置\n\n2.  点击 `Next`，并根据你的平台将插件下载到计算机上：[`http://create.arduino.cc/getting-started/plugin?page=2`](http://create.arduino.cc/getting-started/plugin?page=2)。参见图\
    \ [12-6](#A323804_3_En_12_Chapter.html#Fig6)。\n\n    ![A323804_3_En_12_Fig6_HTML.jpg](A323804_3_En_12_Fig6_HTML.jpg)\n\
    \n    图 12-6. 下载 Arduino 插件\n\n3.  下载完成后，双击安装程序以启动安装流程，并按照安装程序中的步骤操作。\n4.  在流程结束时，你应该会在托盘图标（Windows）或\
    \ Mac 的菜单栏上看到 `Arduino` 插件图标。点击托盘图标可链接到 `Arduino Web Editor`，或者如果你想暂停插件，如图 [12-7](#A323804_3_En_12_Chapter.html#Fig7)\
    \ 所示。\n\n    ![A323804_3_En_12_Fig7_HTML.jpg](A323804_3_En_12_Fig7_HTML.jpg)\n\
    \n    图 12-7. Mac 上的托盘图标\n\n5.  `Arduino Web Editor` 将在你的默认浏览器中打开，如图 [12-8](#A323804_3_En_12_Chapter.html#Fig8)\
    \ 所示。你需要注册并创建一个账户，以便跟踪你创建的不同草图，并访问其他在线功能。\n\n    ![A323804_3_En_12_Fig8_HTML.jpg](A323804_3_En_12_Fig8_HTML.jpg)\n\
    \n    图 12-8. Arduino Web Editor\n\n### Arduino IDE\n\n你也可以使用经典的桌面 IDE 对微控制器进行编程。为此，你需要先安装驱动程序和相应的软件。请访问\
    \ [`http://arduino.cc/en/Main/Software`](http://arduino.cc/en/Main/Software) 的\
    \ `Downloads` 部分，选择你的操作系统，并下载最新版本（在撰写本文时为 1.8.2）。请注意，对于 `Arduino/Genuino 101`\
    \ 开发板，你至少需要 1.6.7 版本。\n\n### Windows\n\n下载 `Windows` 安装程序，然后双击它并按照图 [12-9](#A323804_3_En_12_Chapter.html#Fig9)\
    \ 所示的两个步骤进行操作。\n\n![A323804_3_En_12_Fig9a_HTML.jpg](A323804_3_En_12_Fig9a_HTML.jpg)![A323804_3_En_12_Fig9b_HTML.jpg](A323804_3_En_12_Fig9b_HTML.jpg)\n\
    \n图 12-9. 在 Windows 上安装 Arduino IDE\n\n在流程结束时，系统会要求你安装驱动程序。此时，将 `Arduino` 连接到计算机的\
    \ `USB` 端口，将建立一个 `COM` 连接。驱动程序应自动为其安装。检查 `Windows` 设备管理器，确认在 `Ports` 下看到你的 `Arduino`\
    \ 开发板已连接——展开 `Ports (COM & LPT)`——你应该会看到一个 `COM` 端口，那就是你的 `Arduino`，如图 [12-10](#A323804_3_En_12_Chapter.html#Fig10)\
    \ 所示（本例中为 `COM3`）。\n\n![A323804_3_En_12_Fig10_HTML.jpg](A323804_3_En_12_Fig10_HTML.jpg)\n\
    \n图 12-10. Windows 中的 Arduino 串行端口\n\n如果在 `Other Devices` 下的 `Arduino` 上发现一个黄色三角形，则需要手动安装驱动程序。右键单击\
    \ `Arduino` 并选择 `Update Driver Software`。选择 `Browse My Computer for Driver Software`，找到\
    \ `Arduino` 安装文件夹下名为 `Drivers` 的文件夹。点击 `Next`。\n\n系统会提示一个安全窗口；选择 `Install`。几秒钟后，一个成功窗口将通知你驱动程序已安装。\n\
    \n### MacOS X 或 Linux\n\n在 `MacOS X` 上，下载文件并将其复制到你的 `Applications` 文件夹。无需驱动程序。当你连接\
    \ `Arduino` 开发板时，你应该会看到它列在 `/dev/tty.usbmodemXXXX` 或 `/dev/tty.usbserialXXXX`\
    \ 下。\n\n在 `Debian` 发行版（例如 `Raspberry Pi`）上，你可以直接在终端中安装它：\n\n```\n$ sudo apt-get\
    \ install arduino\n```\n\n对于其他发行版，你可以下载 32 位或 64 位的文件，解压它，并安装所需的依赖项。\n\n当你连接 `Arduino`\
    \ 开发板时，你应该会看到它列在 `/dev/ttyACMX` 或 `/dev/ttyUSBX` 下。\n\n### 运行 IDE\n\n假设你的安装成功结束，启动应用程序；你将看到一个类似图\
    \ [12-11](#A323804_3_En_12_Chapter.html#Fig11) 的屏幕。\n\n![A323804_3_En_12_Fig11_HTML.jpg](A323804_3_En_12_Fig11_HTML.jpg)\n\
    \n图 12-11. Arduino IDE\n\n首先要做的是选择 `Tools` ➤ `Board`，并从列表中选择正确的开发板。`Arduino/Genuino\
    \ Uno` 指的是经典的 `Arduino Uno` 开发板。如果你第一次插入 `Arduino/Genuino 101`，`Arduino IDE` 会要求你安装一些包才能使用该开发板，如图\
    \ [12-12](#A323804_3_En_12_Chapter.html#Fig12) 所示。\n\n![A323804_3_En_12_Fig12_HTML.jpg](A323804_3_En_12_Fig12_HTML.jpg)\n\
    \n图 12-12. 101 开发板所需的库\n\n点击链接，`Boards Manager` 将显示出来。在 `Intel Curie Boards by\
    \ Intel` 下，点击 `More Info` 并按下 `Install` 按钮，如图 [12-13](#A323804_3_En_12_Chapter.html#Fig13)\
    \ 所示。几分钟后，该包将被安装。然后确保你从 `Tools` ➤ `Boards` ➤ `Arduino/Genuino 101` 中选择了正确的开发板。\n\
    \n![A323804_3_En_12_Fig13_HTML.jpg](A323804_3_En_12_Fig13_HTML.jpg)\n\n图 12-13.\
    \ 安装 Intel Curie Boards 包\n\n在 `Serial Port` 下，选择开发板所连接的端口（例如 `COM3 (Arduino/Genuino\
    \ 101)`）。当有多个选项时，找出正确端口的一个简单方法是拔掉开发板，查找消失的端口，然后重新插入，并选择该串行端口。\n\n### Blink 示例\n\
    \n即使没有传感器（仪器或模拟/数字信号设备），你能做的最快测试是打开 `Blink` 示例（选择 `File` ➤ `Examples` ➤ `01.Basics`\
    \ ➤ `Blink`），如图 [12-14](#A323804_3_En_12_Chapter.html#Fig14) 所示。`Arduino` 代码文件（称为草图）以扩展名\
    \ `.ino` 保存在 `Arduino/examples` 文件夹下的多个类别中。\n\n![A323804_3_En_12_Fig14_HTML.jpg](A323804_3_En_12_Fig14_HTML.jpg)\n\
    \n图 12-14. Blink 草图（IDE 版本）\n\n点击 `Upload` 按钮（工具栏上左起第二个），等待状态栏上出现 `\"Done uploading\"\
    ` 消息。然后你应该会看到开发板上标有 `L` 的 `LED` 在闪烁。\n\n如果你使用的是 `Web Editor` 版本，请从左侧菜单中选择 `Blink`\
    \ 示例（`Examples` ➤ `01.Basics` ➤ `Blink`），如图 [12-15](#A323804_3_En_12_Chapter.html#Fig15)\
    \ 所示。确保你的开发板列在右上角的下拉列表中，然后点击 `Upload` 按钮（右箭头）。\n\n![A323804_3_En_12_Fig15_HTML.jpg](A323804_3_En_12_Fig15_HTML.jpg)\n\
    \n图 12-15. Blink 草图（Web Editor 版本）\n\n一个开始使用 `Arduino` 开发板的非常好的示例代码来源是 `Arduino\
    \ Playground`：[`http://playground.arduino.cc/`](http://playground.arduino.cc/)。你也可以访问\
    \ `Project hub` 网站 [`https://create.arduino.cc/projecthub/`](https://create.arduino.cc/projecthub/)，那里有来自社区的大量项目集合。\n\
    \n要尝试大多数初级教程或你自己的实验，你需要一套基本的传感器和一小套电子元件。建议你购买捆绑了电子元件的 `Arduino` 开发板作为入门套件。除了开发板，你还需要一根\
    \ `USB` 线、一块面包板、跳线、几种颜色的 `LED`、电阻、一个温度传感器、一个电位器、按钮开关等。"
  raw: "### Arduino Web Editor\n\nThe Arduino Web Editor, which requires a one-time\
    \ installation plug-in, allows you to upload sketches from the browser onto your\
    \ boards via an USB cable or the network. It requires a few simple steps to set\
    \ up this plug-in:\n\n1.  Access the Arduino Create portal at [`https://create.arduino.cc/getting-started`](https://create.arduino.cc/getting-started)\
    \ and click the `Setup the Arduino Editor Plugin` link, as shown in Figure [12-5](#A323804_3_En_12_Chapter.html#Fig5).\n\
    \n    ![A323804_3_En_12_Fig5_HTML.jpg](A323804_3_En_12_Fig5_HTML.jpg)\n\n    Figure\
    \ 12-5.\n\n    Arduino Editor plug-in setup  \n2.  Click Next and download the\
    \ plug-in on your computer, depending on your platform: [`http://create.arduino.cc/getting-started/plugin?page=2`](http://create.arduino.cc/getting-started/plugin?page=2)\
    \ . See Figure [12-6](#A323804_3_En_12_Chapter.html#Fig6).\n\n    ![A323804_3_En_12_Fig6_HTML.jpg](A323804_3_En_12_Fig6_HTML.jpg)\n\
    \n    Figure 12-6.\n\n    Download the Arduino plug-in  \n3.  Once it’s downloaded,\
    \ double-click on the installer to start the installation flow and follow the\
    \ steps in the installer flow.  \n4.  At the end of the process , you should see\
    \ the Arduino plug-in icon on the tray icon (Windows) or on the menu bar of your\
    \ Mac. Click on the tray icon for a link to the Arduino Web Editor, or if you\
    \ want to pause the plug-in, as shown in Figure [12-7](#A323804_3_En_12_Chapter.html#Fig7).\n\
    \n    ![A323804_3_En_12_Fig7_HTML.jpg](A323804_3_En_12_Fig7_HTML.jpg)\n\n    Figure\
    \ 12-7.\n\n    Tray icon on the Mac  \n5.  The Arduino Web Editor will open in\
    \ your default browser, as shown in Figure [12-8](#A323804_3_En_12_Chapter.html#Fig8).\
    \ It is required that you sign up and create an account, so you can keep track\
    \ of the different sketches you create, as well as to access other online features.\n\
    \n    ![A323804_3_En_12_Fig8_HTML.jpg](A323804_3_En_12_Fig8_HTML.jpg)\n\n    Figure\
    \ 12-8.\n\n    Arduino Web Editor\n\n### Arduino IDE\n\nYou can program the micro\
    \ using the classic desktop IDE as well. For that, you need to install the drivers\
    \ and the proper software first. Go to the Downloads section at [`http://arduino.cc/en/Main/Software`](http://arduino.cc/en/Main/Software)\
    \ , select your OS, and download the latest release, which is 1.8.2 at the moment\
    \ of this writing. Note that for the Arduino/Genuino 101 board, you’ll need at\
    \ least version 1.6.7.\n\n### Windows\n\nDownload the Windows installer, then\
    \ double-click on it and proceed with the two steps shown in Figure [12-9](#A323804_3_En_12_Chapter.html#Fig9).\n\
    \n![A323804_3_En_12_Fig9a_HTML.jpg](A323804_3_En_12_Fig9a_HTML.jpg)![A323804_3_En_12_Fig9b_HTML.jpg](A323804_3_En_12_Fig9b_HTML.jpg)\n\
    \nFigure 12-9.\n\nInstalling Arduino IDE on Windows\n\nAt the end of the process,\
    \ you’ll be asked to install the driver. At this point, connect the Arduino to\
    \ your computer USB port, and a COM connection will be established. A driver should\
    \ automatically be installed for it. Check the Windows Device Manager to confirm\
    \ that under Ports you see your Arduino board connected—Expand Ports (COM & LPT)—and\
    \ you should see a COM port, which will be your Arduino, as shown in Figure [12-10](#A323804_3_En_12_Chapter.html#Fig10)\
    \ (in this case, COM3).\n\n![A323804_3_En_12_Fig10_HTML.jpg](A323804_3_En_12_Fig10_HTML.jpg)\n\
    \nFigure 12-10.\n\nArduino serial port in Windows\n\nIf you find a yellow triangle\
    \ over Arduino under Other Devices, you will need to install the driver manually.\
    \ Right-click under Arduino and select Update Driver Software. Select Browse My\
    \ Computer for Driver Software and find the folder called `Drivers` under the\
    \ Arduino installation folder. Click Next.\n\nYou will be prompted with a security\
    \ window; select Install. After a few seconds, a success window will inform you\
    \ the driver has been installed.\n\n### MacOS X or Linux\n\nOn MacOS X , download\
    \ the file and copy it to your Applications folder. No drivers are required. When\
    \ you connect the Arduino board, you should see it listed under `/dev/tty.usbmodemXXXX`\
    \ or `/dev/tty.usbserialXXXX`.\n\nOn Debian distributions (for example, Raspberry\
    \ Pi), you can simply install it on the terminal:\n\n```\n$ sudo apt-get install\
    \ arduino\n```\n\nFor others distributions, you can download the file for either\
    \ 32 or 64 bits, unpack it, and install the required dependencies.\n\nWhen you\
    \ connect the Arduino board, you should see it listed under `/dev/ttyACMX` or\
    \ `/dev/ttyUSBX`.\n\n### Running the IDE\n\nAssuming your installation ends successfully\
    \ , launch the application; you’ll see a screen like Figure [12-11](#A323804_3_En_12_Chapter.html#Fig11).\n\
    \n![A323804_3_En_12_Fig11_HTML.jpg](A323804_3_En_12_Fig11_HTML.jpg)\n\nFigure\
    \ 12-11.\n\nThe Arduino IDE\n\nThe first thing to do is choose Tools ➤ Board and\
    \ select the right board from the list. Arduino/Genuino Uno is referred to as\
    \ the classic Arduino Uno board. If you plug your Arduino/Genuino 101 in for the\
    \ first time, the Arduino IDE will ask you to install some package to be able\
    \ to use the board, as shown in Figure [12-12](#A323804_3_En_12_Chapter.html#Fig12).\n\
    \n![A323804_3_En_12_Fig12_HTML.jpg](A323804_3_En_12_Fig12_HTML.jpg)\n\nFigure\
    \ 12-12.\n\nLibrary required for 101 board\n\nClick on the link and the Boards\
    \ Manager will show up. Under Intel Curie Boards by Intel, click on More Info\
    \ and press the Install button, as shown in Figure [12-13](#A323804_3_En_12_Chapter.html#Fig13).\
    \ After a few minutes, the package will be installed. Then make sure you select\
    \ the proper board from Tools ➤ Boards ➤ Arduino/Genuino 101.\n\n![A323804_3_En_12_Fig13_HTML.jpg](A323804_3_En_12_Fig13_HTML.jpg)\n\
    \nFigure 12-13.\n\nInstalling the Intel Curie Boards package\n\nUnder Serial Port,\
    \ select the port where the board is connected (i.e., COM3 (Arduino/Genuino 101)).\
    \ When there are several options, an easy way to find out which port is the right\
    \ one is to unplug the board, look for the missing port, plug it in again, and\
    \ select that serial port.\n\n### The Blink Example\n\nThe quickest test you can\
    \ do, even without sensors (instrumentation or analog/digital signaling devices),\
    \ is to open the Blink sample (choose File ➤ Examples ➤ 01.Basics ➤ Blink), as\
    \ shown in Figure [12-14](#A323804_3_En_12_Chapter.html#Fig14). The Arduino code\
    \ files, called sketches, are saved with the extension `.ino`, under the `Arduino/examples`\
    \ folders in several categories.\n\n![A323804_3_En_12_Fig14_HTML.jpg](A323804_3_En_12_Fig14_HTML.jpg)\n\
    \nFigure 12-14.\n\nThe Blink sketch (IDE version)\n\nClick the Upload button (second\
    \ from the left on the toolbar) and wait for the `“Done uploading”` message on\
    \ the status bar. Then you should see the LED labeled with an L blinking on the\
    \ board.\n\nIf you are running the Web Editor version, select the Blink sample\
    \ from the left menu (Examples ➤ 01.Basics ➤ Blink), as shown in Figure [12-15](#A323804_3_En_12_Chapter.html#Fig15).\
    \ Make sure your board is listed on the top-right drop-down list and click the\
    \ Upload button (the right arrow).\n\n![A323804_3_En_12_Fig15_HTML.jpg](A323804_3_En_12_Fig15_HTML.jpg)\n\
    \nFigure 12-15.\n\nThe Blink sketch (Web Editor version)\n\nA really good source\
    \ for example code to start playing with your Arduino board is at the Arduino\
    \ Playground: [`http://playground.arduino.cc/`](http://playground.arduino.cc/)\
    \ . You can also visit the Project hub site at [`https://create.arduino.cc/projecthub/`](https://create.arduino.cc/projecthub/)\
    \ for a big collection of projects from the community.\n\nTo try most of the preliminary\
    \ tutorials or your own experiments, you’ll need a basic set of sensors and a\
    \ small set of electronic components. It is a good idea to acquire your Arduino\
    \ board bundled with electronic components as a starter kit. In addition to the\
    \ board, you will want a USB cable, a breadboard, jumper wires, LEDs of several\
    \ colors, resistors, a temperature sensor, a potentiometer, push buttons, and\
    \ the like."
  trans: "\n### Arduino Web 编辑器\n\nArduino Web 编辑器需要一次性安装插件，它允许你通过 USB 线缆或网络，将草图从浏览器上传到开发板上。设置此插件只需几个简单步骤：\n\
    \n1.  访问 Arduino Create 门户网站 [`https://create.arduino.cc/getting-started`](https://create.arduino.cc/getting-started)，然后点击\
    \ `Setup the Arduino Editor Plugin` 链接，如图 12-5 所示。\n\n    ![A323804_3_En_12_Fig5_HTML.jpg](img/A323804_3_En_12_Fig5_HTML.jpg)\n\
    \n    图 12-5.\n\n    Arduino 编辑器插件设置  \n2.  点击“下一步”，根据你的平台，将插件下载到你的计算机上：[`http://create.arduino.cc/getting-started/plugin?page=2`](http://create.arduino.cc/getting-started/plugin?page=2)\
    \ 。参见图 12-6。\n\n    ![A323804_3_En_12_Fig6_HTML.jpg](img/A323804_3_En_12_Fig6_HTML.jpg)\n\
    \n    图 12-6.\n\n    下载 Arduino 插件  \n3.  下载完成后，双击安装程序以启动安装流程，并按照安装程序中的步骤操作。  \n\
    4.  在流程结束时，你应该会在系统托盘图标（Windows）或 Mac 的菜单栏上看到 Arduino 插件图标。点击该托盘图标可链接到 Arduino\
    \ Web 编辑器，或者如果你想暂停插件，也可点击，如图 12-7 所示。\n\n    ![A323804_3_En_12_Fig7_HTML.jpg](img/A323804_3_En_12_Fig7_HTML.jpg)\n\
    \n    图 12-7.\n\n    Mac 上的托盘图标  \n5.  Arduino Web 编辑器将在你的默认浏览器中打开，如图 12-8 所示。你需要注册并创建一个账户，以便跟踪你创建的不同草图，并访问其他在线功能。\n\
    \n    ![A323804_3_En_12_Fig8_HTML.jpg](img/A323804_3_En_12_Fig8_HTML.jpg)\n\n\
    \    图 12-8.\n\n    Arduino Web 编辑器\n\n### Arduino IDE\n\n你也可以使用经典的桌面 IDE 对微控制器进行编程。为此，你需要先安装驱动程序和相应的软件。请访问\
    \ [`http://arduino.cc/en/Main/Software`](http://arduino.cc/en/Main/Software) 的“下载”部分，选择你的操作系统，并下载最新版本（在撰写本文时为\
    \ 1.8.2）。请注意，对于 Arduino/Genuino 101 开发板，你至少需要 1.6.7 版本。\n\n### Windows\n\n下载 Windows\
    \ 安装程序，然后双击它，按照图 12-9 所示的两个步骤进行操作。\n\n![A323804_3_En_12_Fig9a_HTML.jpg](img/A323804_3_En_12_Fig9a_HTML.jpg)![A323804_3_En_12_Fig9b_HTML.jpg](img/A323804_3_En_12_Fig9b_HTML.jpg)\n\
    \n图 12-9.\n\n在 Windows 上安装 Arduino IDE\n\n在流程结束时，系统会要求你安装驱动程序。此时，将 Arduino 连接到计算机的\
    \ USB 端口，将建立一个 COM 连接。驱动程序应会自动安装。检查 Windows 设备管理器，确认在“端口”下能看到你的 Arduino 开发板已连接——展开“端口\
    \ (COM 和 LPT)”——你应该会看到一个 COM 端口，那就是你的 Arduino，如图 12-10 所示（本例中为 COM3）。\n\n![A323804_3_En_12_Fig10_HTML.jpg](img/A323804_3_En_12_Fig10_HTML.jpg)\n\
    \n图 12-10.\n\nWindows 中的 Arduino 串行端口\n\n如果你在“其他设备”下的 Arduino 上发现一个黄色三角形，则需要手动安装驱动程序。右键单击\
    \ Arduino 并选择“更新驱动程序软件”。选择“浏览我的计算机以查找驱动程序软件”，然后找到 Arduino 安装文件夹下的 `Drivers` 文件夹。点击“下一步”。\n\
    \n系统会弹出一个安全窗口；选择“安装”。几秒钟后，一个成功窗口会通知你驱动程序已安装。\n\n### MacOS X 或 Linux\n\n在 MacOS\
    \ X 上，下载文件并将其复制到你的“应用程序”文件夹。无需驱动程序。当你连接 Arduino 开发板时，你应该会看到它列在 `/dev/tty.usbmodemXXXX`\
    \ 或 `/dev/tty.usbserialXXXX` 下。\n\n在 Debian 发行版（例如，Raspberry Pi）上，你可以直接在终端中安装它：\n\
    \n```\n$ sudo apt-get install arduino\n```\n\n对于其他发行版，你可以下载 32 位或 64 位的文件，解压，并安装所需的依赖项。\n\
    \n当你连接 Arduino 开发板时，你应该会看到它列在 `/dev/ttyACMX` 或 `/dev/ttyUSBX` 下。\n\n### 运行 IDE\n\
    \n假设你的安装成功结束，启动应用程序；你将看到一个如图 12-11 所示的界面。\n\n![A323804_3_En_12_Fig11_HTML.jpg](img/A323804_3_En_12_Fig11_HTML.jpg)\n\
    \n图 12-11.\n\nArduino IDE\n\n首先要做的是选择“工具” ➤ “开发板”，然后从列表中选择正确的开发板。Arduino/Genuino\
    \ Uno 指的是经典的 Arduino Uno 开发板。如果你第一次插入 Arduino/Genuino 101 开发板，Arduino IDE 会要求你安装一些软件包才能使用该开发板，如图\
    \ 12-12 所示。\n\n![A323804_3_En_12_Fig12_HTML.jpg](img/A323804_3_En_12_Fig12_HTML.jpg)\n\
    \n图 12-12.\n\n101 开发板所需的库\n\n点击该链接，“开发板管理器”将会出现。在“Intel Curie Boards by Intel”下，点击“更多信息”，然后按下“安装”按钮，如图\
    \ 12-13 所示。几分钟后，软件包将安装完成。然后确保你从“工具” ➤ “开发板” ➤ “Arduino/Genuino 101”中选择了正确的开发板。\n\
    \n![A323804_3_En_12_Fig13_HTML.jpg](img/A323804_3_En_12_Fig13_HTML.jpg)\n\n图 12-13.\n\
    \n安装 Intel Curie Boards 软件包\n\n在“串行端口”下，选择开发板所连接的端口（例如，COM3 (Arduino/Genuino 101)）。当有多个选项时，找出正确端口的一个简单方法是拔掉开发板，查找消失的端口，然后重新插上，并选择该串行端口。\n\
    \n### Blink 示例\n\n即使没有传感器（仪器或模拟/数字信号设备），你能做的最快测试是打开 Blink 示例（选择“文件” ➤ “示例” ➤ “01.Basics”\
    \ ➤ “Blink”），如图 12-14 所示。Arduino 代码文件（称为草图）以扩展名 `.ino` 保存，位于按类别划分的 `Arduino/examples`\
    \ 文件夹下。\n\n![A323804_3_En_12_Fig14_HTML.jpg](img/A323804_3_En_12_Fig14_HTML.jpg)\n\
    \n图 12-14.\n\nBlink 草图（IDE 版本）\n\n点击“上传”按钮（工具栏上左起第二个），等待状态栏上出现 `“Done uploading”`\
    \ 消息。然后你应该会看到开发板上标有 L 的 LED 在闪烁。\n\n如果你使用的是 Web 编辑器版本，请从左侧菜单中选择 Blink 示例（“示例”\
    \ ➤ “01.Basics” ➤ “Blink”），如图 12-15 所示。确保你的开发板出现在右上角的下拉列表中，然后点击“上传”按钮（右箭头）。\n\n\
    ![A323804_3_En_12_Fig15_HTML.jpg](img/A323804_3_En_12_Fig15_HTML.jpg)\n\n图 12-15.\n\
    \nBlink 草图（Web 编辑器版本）\n\n开始使用 Arduino 开发板的示例代码的一个非常好的来源是 Arduino Playground：[`http://playground.arduino.cc/`](http://playground.arduino.cc/)\
    \ 。你也可以访问项目中心网站 [`https://create.arduino.cc/projecthub/`](https://create.arduino.cc/projecthub/)\
    \ ，那里有来自社区的大量项目集合。\n\n要尝试大多数初级教程或你自己的实验，你需要一套基本的传感器和一小套电子元件。建议你购买 Arduino 开发板与电子元件捆绑在一起的入门套件。除了开发板，你还需要一根\
    \ USB 线缆、一块面包板、杜邦线、几种颜色的 LED、电阻、一个温度传感器、一个电位器、按钮开关等。\n"
- fmt: "# Orientation Visualizer Example\n\nThis example demonstrates how to use Genuino\
    \ 101's on-board six-axis accelerometer/gyro to read the X, Y, and Z values of\
    \ both the accelerometer and the gyroscope. The accelerometer values are used\
    \ to determine the orientation of the board, while the gyroscope measures the\
    \ angular velocity of the board. The example is based on this link: [`https://www.arduino.cc/en/Tutorial/Genuino101CurieIMUOrientationVisualiser`](https://www.arduino.cc/en/Tutorial/Genuino101CurieIMUOrientationVisualiser).\n\
    \nThe only hardware required is the Arduino/Genuino 101 board.\n\nThe software\
    \ required for the example is the Madgwick library, available from the Library\
    \ Manager. Using the Arduino IDE, go to Sketch ➤ Include Library ➤ Manage Libraries.\
    \ There you can search for \"Madgwick\" and install the latest version of the\
    \ library directly from there, as shown in Figure [12-16](#A323804_3_En_12_Chapter.html#Fig16).\
    \ The source code of the library can be found at [`https://github.com/arduino-libraries/MadgwickAHRS`](https://github.com/arduino-libraries/MadgwickAHRS).\n\
    \n![A323804_3_En_12_Fig16_HTML.jpg](A323804_3_En_12_Fig16_HTML.jpg)\n\nFigure\
    \ 12-16. Installing the Madgwick library\n\nNow open the `Visualize101.ino` sample\
    \ from the library folder that you will find under `<User>/Documents/Arduino/Libraries/Madgwick/examples/Visualize101`.\
    \ You need to modify it, in order to add an initial calibration. Listing [12-1](#A323804_3_En_12_Chapter.html#Par45)\
    \ includes the modified source code.\n\n```\n#include \n#include \nMadgwick filter;\n\
    unsigned long microsPerReading, microsPrevious;\nfloat accelScale, gyroScale;\n\
    void setup() {\nSerial.begin(9600);\nwhile (!Serial);  // wait for the serial\
    \ port to open\n// start the IMU and filter\nCurieIMU.begin();\nCurieIMU.setGyroRate(25);\n\
    CurieIMU.setAccelerometerRate(25);\nfilter.begin(25);\n// Set the accelerometer\
    \ range to 2G\nCurieIMU.setAccelerometerRange(2);\n// Set the gyroscope range\
    \ to 250 degrees/second\nCurieIMU.setGyroRange(250);\n// Starting Gyroscope calibration\n\
    CurieIMU.autoCalibrateGyroOffset();\n//  Starting Acceleration calibration...\"\
    );\nCurieIMU.autoCalibrateXAccelOffset(0);\nCurieIMU.autoCalibrateYAccelOffset(0);\n\
    CurieIMU.autoCalibrateZAccelOffset(1);\n// Enabling Gyroscope/Acceleration offset\
    \ compensation\nCurieIMU.setGyroOffsetEnabled(true);\nCurieIMU.setAccelOffsetEnabled(true);\n\
    // initialize variables to pace updates to correct rate\nmicrosPerReading = 1000000\
    \ / 25;\nmicrosPrevious = micros();\n}\nvoid loop() {\nint aix, aiy, aiz;\nint\
    \ gix, giy, giz;\nfloat ax, ay, az;\nfloat gx, gy, gz;\nfloat roll, pitch, heading;\n\
    unsigned long microsNow;\n// check if it's time to read data and update the filter\n\
    microsNow = micros();\nif (microsNow - microsPrevious >= microsPerReading) {\n\
    // read raw data from CurieIMU\nCurieIMU.readMotionSensor(aix, aiy, aiz, gix,\
    \ giy, giz);\n// convert from raw data to gravity and degrees/second units\nax\
    \ = convertRawAcceleration(aix);\nay = convertRawAcceleration(aiy);\naz = convertRawAcceleration(aiz);\n\
    gx = convertRawGyro(gix);\ngy = convertRawGyro(giy);\ngz = convertRawGyro(giz);\n\
    // update the filter, which computes orientation\nfilter.updateIMU(gx, gy, gz,\
    \ ax, ay, az);\n// print the heading, pitch and roll\nroll = filter.getRoll();\n\
    pitch = filter.getPitch();\nheading = filter.getYaw();\n// Serial.print(\"Orientation:\
    \ \");\nSerial.print(heading);\nSerial.print(\" \");\nSerial.print(pitch);\nSerial.print(\"\
    \ \");\nSerial.println(roll);\n// increment previous time, so we keep proper pace\n\
    microsPrevious = microsPrevious + microsPerReading;\n}\n}\nfloat convertRawAcceleration(int\
    \ aRaw) {\n// since we are using 2G range\n// -2g maps to a raw value of -32768\n\
    // +2g maps to a raw value of 32767\nfloat a = (aRaw * 2.0) / 32768.0;\nreturn\
    \ a;\n}\nfloat convertRawGyro(int gRaw) {\n// since we are using 250 degrees/seconds\
    \ range\n// -250 maps to a raw value of -32768\n// +250 maps to a raw value of\
    \ 32767\nfloat g = (gRaw * 250.0) / 32768.0;\nreturn g;\n}\n```\n\nListing 12-1.\
    \ Visualize101 Source Code with Calibration\n\nRunning the Web Editor, open the\
    \ `Visualize101` project from Examples ➤ From Libraries ➤ Madgwick, and include\
    \ the calibration, as shown in Figure [12-17](#A323804_3_En_12_Chapter.html#Fig17).\n\
    \n![A323804_3_En_12_Fig17_HTML.jpg](A323804_3_En_12_Fig17_HTML.jpg)\n\nFigure\
    \ 12-17. Visualize101 in the Web Editor\n\nMake sure you have your board connected\
    \ and select the right port. Click upload, and after a few seconds the project\
    \ is compiled and uploaded to the board.\n\nYou can open the Serial Monitor to\
    \ visualize the values of heading (yaw), pitch, and roll (in degrees) printed\
    \ out, while you hold the board with your hand and wave it, as shown in Figure\
    \ [12-18](#A323804_3_En_12_Chapter.html#Fig18).\n\n![A323804_3_En_12_Fig18_HTML.jpg](A323804_3_En_12_Fig18_HTML.jpg)\n\
    \nFigure 12-18. Running Visualize101\n\n### How It Works\n\nThe sketch uses functions\
    \ inside the `CurieIMU` library to get the data from the accelerometer/gyroscope.\
    \ It has two primary methods: `setup()` and `loop()`.\n\nIn the `setup()` method,\
    \ you configure the serial port speed and the `CurieIMU` library, by setting the\
    \ sample rate of the accelerometer, gyro, and filter to 25Hz, and the accelerometer\
    \ range to 2g and the gyro range to 250 °/s. Both gyroscope and accelerometer\
    \ are calibrated initially. For this, it is recommended you keep the Arduino board\
    \ steady and in a flat position.\n\nIn the `loop()` method, every 25ms you get\
    \ accelerometer and gyroscope data using the functions from the `CurieIMU` library\
    \ and convert the raw data to acceleration (g) and angular velocity (°/s). Using\
    \ the `Madgwick` library, those values are converted to the roll, pitch, and yaw\
    \ angles, which are finally sent to the serial port. These angles are used in\
    \ many areas, like navigation, to define the spatial orientation of a body.\n\n\
    If everything is working, it's time to start thinking about how you are going\
    \ to read the serial port to get these measures and how you are going to display\
    \ those readings in your JavaFX application.\n\n## Serial Reading\n\nAlthough\
    \ you can find third-party applications for serial reading — like the old HyperTerminal\
    \ for Windows, Minicom for Linux, and Terminal for Mac — you need to have these\
    \ readings in your application, and for that, you need a Java API that performs\
    \ that task.\n\nNote here that serial reading is a highly hardware-specific task,\
    \ and it breaks the Java multiplatform approach as you need native support for\
    \ accessing the ports. Besides the old `JavaComm` API from Sun, there is no official\
    \ API for communications bundled with the Java SE distribution, so you'll need\
    \ a third-party library.\n\nFor several years, the preferred Java library for\
    \ serial communication was `RXTX`. Originally from Trent Jarvi, and distributed\
    \ under LGPL v 2.1+Linking Over Controlled Interface license, the last version\
    \ (2.2pre2 from 2010) was accessible at [`http://rxtx.qbang.org/`](http://rxtx.qbang.org/).\n\
    \nBut this library was discontinued, and even the Arduino IDE replaced it with\
    \ a new one — the Java Simple Serial Connector (jSSC) — since it was heavily used\
    \ for communications between the IDE and the board."
  raw: "## Orientation Visualizer Example\n\nThis example demonstrates how to use\
    \ Genuino 101's on-board six-axis accelerometer/gyro to read the X, Y, and Z values\
    \ of both the accelerometer and the gyroscope. The accelerometer values are used\
    \ to determine the orientation of the board, while the gyroscope measures the\
    \ angular velocity of the board. The example is based on this link: [`https://www.arduino.cc/en/Tutorial/Genuino101CurieIMUOrientationVisualiser`](https://www.arduino.cc/en/Tutorial/Genuino101CurieIMUOrientationVisualiser)\
    \ .\n\nThe only hardware required is the Arduino/Genuino 101 board.\n\nThe software\
    \ required for the example is the Madgwick library, available from the Library\
    \ Manager. Using the the Arduino IDE, go to Sketch ➤ Include Library ➤ Manage\
    \ Libraries. There you can search for “Madgwick” and install the latest version\
    \ of the library directly from there, as shown in Figure [12-16](#A323804_3_En_12_Chapter.html#Fig16).\
    \ The source code of the library can be found at [`https://github.com/arduino-libraries/MadgwickAHRS`](https://github.com/arduino-libraries/MadgwickAHRS)\
    \ .\n\n![A323804_3_En_12_Fig16_HTML.jpg](A323804_3_En_12_Fig16_HTML.jpg)\n\nFigure\
    \ 12-16.\n\nInstalling the Madgwick library\n\nNow open the `Visualize101.ino`\
    \ sample from the library folder that you will find under `<User>/Documents/Arduino/Libraries/Madgwick/examples/Visualize101`.\
    \ You need to modify it, in order to add an initial calibration. Listing [12-1](#A323804_3_En_12_Chapter.html#Par45)\
    \ includes the modified source code.\n\n```\n#include \n#include \nMadgwick filter;\n\
    unsigned long microsPerReading, microsPrevious;\nfloat accelScale, gyroScale;\n\
    void setup() {\nSerial.begin(9600);\nwhile (!Serial);  // wait for the serial\
    \ port to open\n// start the IMU and filter\nCurieIMU.begin();\nCurieIMU.setGyroRate(25);\n\
    CurieIMU.setAccelerometerRate(25);\nfilter.begin(25);\n// Set the accelerometer\
    \ range to 2G\nCurieIMU.setAccelerometerRange(2);\n// Set the gyroscope range\
    \ to 250 degrees/second\nCurieIMU.setGyroRange(250);\n// Starting Gyroscope calibration\n\
    CurieIMU.autoCalibrateGyroOffset();\n//  Starting Acceleration calibration...\"\
    );\nCurieIMU.autoCalibrateXAccelOffset(0);\nCurieIMU.autoCalibrateYAccelOffset(0);\n\
    CurieIMU.autoCalibrateZAccelOffset(1);\n// Enabling Gyroscope/Acceleration offset\
    \ compensation\nCurieIMU.setGyroOffsetEnabled(true);\nCurieIMU.setAccelOffsetEnabled(true);\n\
    // initialize variables to pace updates to correct rate\nmicrosPerReading = 1000000\
    \ / 25;\nmicrosPrevious = micros();\n}\nvoid loop() {\nint aix, aiy, aiz;\nint\
    \ gix, giy, giz;\nfloat ax, ay, az;\nfloat gx, gy, gz;\nfloat roll, pitch, heading;\n\
    unsigned long microsNow;\n// check if it's time to read data and update the filter\n\
    microsNow = micros();\nif (microsNow - microsPrevious >= microsPerReading) {\n\
    // read raw data from CurieIMU\nCurieIMU.readMotionSensor(aix, aiy, aiz, gix,\
    \ giy, giz);\n// convert from raw data to gravity and degrees/second units\nax\
    \ = convertRawAcceleration(aix);\nay = convertRawAcceleration(aiy);\naz = convertRawAcceleration(aiz);\n\
    gx = convertRawGyro(gix);\ngy = convertRawGyro(giy);\ngz = convertRawGyro(giz);\n\
    // update the filter, which computes orientation\nfilter.updateIMU(gx, gy, gz,\
    \ ax, ay, az);\n// print the heading, pitch and roll\nroll = filter.getRoll();\n\
    pitch = filter.getPitch();\nheading = filter.getYaw();\n// Serial.print(\"Orientation:\
    \ \");\nSerial.print(heading);\nSerial.print(\" \");\nSerial.print(pitch);\nSerial.print(\"\
    \ \");\nSerial.println(roll);\n// increment previous time, so we keep proper pace\n\
    microsPrevious = microsPrevious + microsPerReading;\n}\n}\nfloat convertRawAcceleration(int\
    \ aRaw) {\n// since we are using 2G range\n// -2g maps to a raw value of -32768\n\
    // +2g maps to a raw value of 32767\nfloat a = (aRaw * 2.0) / 32768.0;\nreturn\
    \ a;\n}\nfloat convertRawGyro(int gRaw) {\n// since we are using 250 degrees/seconds\
    \ range\n// -250 maps to a raw value of -32768\n// +250 maps to a raw value of\
    \ 32767\nfloat g = (gRaw * 250.0) / 32768.0;\nreturn g;\n}\nListing 12-1.\nVisualize101\
    \ Source Code with Calibration\n```\n\nRunning the Web Editor , open the Visualize101\
    \ project from Examples ➤ From Libraries ➤ Madgwick, and include the calibration,\
    \ as shown in Figure [12-17](#A323804_3_En_12_Chapter.html#Fig17).\n\n![A323804_3_En_12_Fig17_HTML.jpg](A323804_3_En_12_Fig17_HTML.jpg)\n\
    \nFigure 12-17.\n\nVisualize101 in the Web Editor\n\nMake sure you have your board\
    \ connected and select the right port. Click upload, and after a few seconds the\
    \ project is compiled and uploaded to the board.\n\nYou can open the Serial Monitor\
    \ to visualize the values of heading (yaw), pitch, and roll (in degrees) printed\
    \ out, while you hold the board with your hand and wave it, as shown in Figure\
    \ [12-18](#A323804_3_En_12_Chapter.html#Fig18).\n\n![A323804_3_En_12_Fig18_HTML.jpg](A323804_3_En_12_Fig18_HTML.jpg)\n\
    \nFigure 12-18.\n\nRunning Visualize101\n\n### How It Works\n\nThe sketch uses\
    \ functions inside the CurieIMU library to get the data from the accelerometer/gyroscope.\
    \ It has two primary methods: `setup()` and `loop()`.\n\nIn the `setup()` method,\
    \ you configure the serial port speed and the CurieIMU library, by setting the\
    \ sample rate of the accelerometer, gyro, and filter to 25Hz, and the accelerometer\
    \ range to 2g and the gyro range to 250 °/s. Both gyroscope and accelerometer\
    \ are calibrated initially. For this, it is recommended you keep the Arduino board\
    \ steady and in a flat position.\n\nIn the `loop()` method, every 25ms you get\
    \ accelerometer and gyroscope data using the functions from the CurieIMU library\
    \ and convert the raw data to acceleration (g) and angular velocity (°/s). Using\
    \ the Madgwick library, those values are converted to the roll, pitch, and yaw\
    \ angles, which are finally sent to the serial port. These angles are used in\
    \ many areas, like navigation, to define the spatial orientation of a body.\n\n\
    If everything is working, it’s time to start thinking about how you are going\
    \ to read the serial port to get these measures and how you are going to display\
    \ those readings in your JavaFX application.\n\n## Serial Reading\n\nAlthough\
    \ you can find third-party applications for serial reading —like the old HyperTerminal\
    \ for Windows, Minicom for Linux, and Terminal for Mac—you need to have these\
    \ readings in your application, and for that, you need a Java API that performs\
    \ that task.\n\nNote here that serial reading is a highly hardware-specific task,\
    \ and it breaks the Java multiplatform approach as you need native support for\
    \ accessing the ports. Besides the old JavaComm API from Sun, there is no official\
    \ API for communications bundled with the Java SE distribution, so you’ll need\
    \ a third-party library.\n\nFor several years, the preferred Java library for\
    \ serial communication was RXTX. Originally from Trent Jarvi, and distributed\
    \ under LGPL v 2.1+Linking Over Controlled Interface license, the last version\
    \ (2.2pre2 from 2010) was accessible at [`http://rxtx.qbang.org/`](http://rxtx.qbang.org/)\
    \ .\n\nBut this library was discontinued, and even the Arduino IDE replaced it\
    \ with a new one—the Java Simple Serial Connector (jSSC)—since it was heavily\
    \ used for communications between the IDE and the board."
  trans: "\n## 方向可视化器示例\n\n本示例演示如何使用 Genuino 101 板载的六轴加速度计/陀螺仪读取加速度计和陀螺仪的 X、Y、Z 值。加速度计的值用于确定板子的方向，而陀螺仪则用于测量板子的角速度。该示例基于此链接：[`https://www.arduino.cc/en/Tutorial/Genuino101CurieIMUOrientationVisualiser`](https://www.arduino.cc/en/Tutorial/Genuino101CurieIMUOrientationVisualiser)。\n\
    \n所需的唯一硬件是 Arduino/Genuino 101 板。\n\n该示例所需的软件是 Madgwick 库，可从库管理器中获取。使用 Arduino\
    \ IDE，转到 项目 ➤ 加载库 ➤ 管理库。在那里，您可以搜索“Madgwick”并直接安装最新版本的库，如图 12-16 所示。该库的源代码可在 [`https://github.com/arduino-libraries/MadgwickAHRS`](https://github.com/arduino-libraries/MadgwickAHRS)\
    \ 找到。\n\n![A323804_3_En_12_Fig16_HTML.jpg](img/A323804_3_En_12_Fig16_HTML.jpg)\n\
    \n图 12-16.\n\n安装 Madgwick 库\n\n现在，从库文件夹中打开 `Visualize101.ino` 示例，该文件夹位于 `<用户>/Documents/Arduino/Libraries/Madgwick/examples/Visualize101`。您需要修改它，以便添加初始校准。清单\
    \ 12-1 包含了修改后的源代码。\n\n```\n#include \n#include \nMadgwick filter;\nunsigned long\
    \ microsPerReading, microsPrevious;\nfloat accelScale, gyroScale;\nvoid setup()\
    \ {\nSerial.begin(9600);\nwhile (!Serial);  // 等待串口打开\n// 启动 IMU 和滤波器\nCurieIMU.begin();\n\
    CurieIMU.setGyroRate(25);\nCurieIMU.setAccelerometerRate(25);\nfilter.begin(25);\n\
    // 将加速度计量程设置为 2G\nCurieIMU.setAccelerometerRange(2);\n// 将陀螺仪量程设置为 250 度/秒\nCurieIMU.setGyroRange(250);\n\
    // 开始陀螺仪校准\nCurieIMU.autoCalibrateGyroOffset();\n//  开始加速度校准...\");\nCurieIMU.autoCalibrateXAccelOffset(0);\n\
    CurieIMU.autoCalibrateYAccelOffset(0);\nCurieIMU.autoCalibrateZAccelOffset(1);\n\
    // 启用陀螺仪/加速度偏移补偿\nCurieIMU.setGyroOffsetEnabled(true);\nCurieIMU.setAccelOffsetEnabled(true);\n\
    // 初始化变量以按正确速率更新\nmicrosPerReading = 1000000 / 25;\nmicrosPrevious = micros();\n\
    }\nvoid loop() {\nint aix, aiy, aiz;\nint gix, giy, giz;\nfloat ax, ay, az;\n\
    float gx, gy, gz;\nfloat roll, pitch, heading;\nunsigned long microsNow;\n// 检查是否到了读取数据和更新滤波器的时间\n\
    microsNow = micros();\nif (microsNow - microsPrevious >= microsPerReading) {\n\
    // 从 CurieIMU 读取原始数据\nCurieIMU.readMotionSensor(aix, aiy, aiz, gix, giy, giz);\n\
    // 将原始数据转换为重力单位和度/秒单位\nax = convertRawAcceleration(aix);\nay = convertRawAcceleration(aiy);\n\
    az = convertRawAcceleration(aiz);\ngx = convertRawGyro(gix);\ngy = convertRawGyro(giy);\n\
    gz = convertRawGyro(giz);\n// 更新滤波器，计算方向\nfilter.updateIMU(gx, gy, gz, ax, ay,\
    \ az);\n// 打印航向角、俯仰角和横滚角\nroll = filter.getRoll();\npitch = filter.getPitch();\n\
    heading = filter.getYaw();\n// Serial.print(\"方向: \");\nSerial.print(heading);\n\
    Serial.print(\" \");\nSerial.print(pitch);\nSerial.print(\" \");\nSerial.println(roll);\n\
    // 增加先前时间，以保持适当节奏\nmicrosPrevious = microsPrevious + microsPerReading;\n}\n}\n\
    float convertRawAcceleration(int aRaw) {\n// 因为我们使用的是 2G 量程\n// -2g 映射到原始值 -32768\n\
    // +2g 映射到原始值 32767\nfloat a = (aRaw * 2.0) / 32768.0;\nreturn a;\n}\nfloat convertRawGyro(int\
    \ gRaw) {\n// 因为我们使用的是 250 度/秒量程\n// -250 映射到原始值 -32768\n// +250 映射到原始值 32767\n\
    float g = (gRaw * 250.0) / 32768.0;\nreturn g;\n}\n清单 12-1.\n包含校准的 Visualize101\
    \ 源代码\n```\n\n运行 Web 编辑器，从 示例 ➤ 来自库 ➤ Madgwick 打开 Visualize101 项目，并包含校准，如图 12-17\
    \ 所示。\n\n![A323804_3_En_12_Fig17_HTML.jpg](img/A323804_3_En_12_Fig17_HTML.jpg)\n\
    \n图 12-17.\n\nWeb 编辑器中的 Visualize101\n\n确保您的板子已连接并选择了正确的端口。点击上传，几秒钟后项目将被编译并上传到板子。\n\
    \n您可以打开串口监视器，在手持板子并挥动时，查看打印出的航向角（偏航角）、俯仰角和横滚角（以度为单位）的值，如图 12-18 所示。\n\n![A323804_3_En_12_Fig18_HTML.jpg](img/A323804_3_En_12_Fig18_HTML.jpg)\n\
    \n图 12-18.\n\n运行 Visualize101\n\n### 工作原理\n\n该程序使用 CurieIMU 库中的函数从加速度计/陀螺仪获取数据。它有两个主要方法：`setup()`\
    \ 和 `loop()`。\n\n在 `setup()` 方法中，您通过将加速度计、陀螺仪和滤波器的采样率设置为 25Hz，加速度计量程设置为 2g，陀螺仪量程设置为\
    \ 250 °/s，来配置串口速度和 CurieIMU 库。陀螺仪和加速度计最初都进行了校准。为此，建议您将 Arduino 板保持平稳并处于水平位置。\n\
    \n在 `loop()` 方法中，每 25 毫秒，您使用 CurieIMU 库中的函数获取加速度计和陀螺仪数据，并将原始数据转换为加速度（g）和角速度（°/s）。使用\
    \ Madgwick 库，这些值被转换为横滚角、俯仰角和偏航角，最终发送到串口。这些角度用于许多领域，例如导航，以定义物体的空间方向。\n\n如果一切正常，是时候开始思考如何读取串口以获取这些测量值，以及如何在您的\
    \ JavaFX 应用程序中显示这些读数了。\n\n## 串口读取\n\n尽管您可以找到用于串口读取的第三方应用程序——例如 Windows 上的旧版 HyperTerminal、Linux\
    \ 上的 Minicom 和 Mac 上的 Terminal——但您需要在您的应用程序中获取这些读数，为此，您需要一个执行该任务的 Java API。\n\n\
    请注意，串口读取是一项高度硬件相关的任务，它打破了 Java 跨平台的方法，因为您需要原生支持来访问端口。除了 Sun 的旧版 JavaComm API 之外，Java\
    \ SE 发行版中没有捆绑用于通信的官方 API，因此您需要一个第三方库。\n\n多年来，首选的串行通信 Java 库是 RXTX。它最初由 Trent Jarvi\
    \ 开发，并在 LGPL v 2.1+链接覆盖控制接口许可下分发，其最后一个版本（2010 年的 2.2pre2）可在 [`http://rxtx.qbang.org/`](http://rxtx.qbang.org/)\
    \ 获取。\n\n但这个库已停止维护，甚至 Arduino IDE 也将其替换为一个新的库——Java Simple Serial Connector (jSSC)——因为它被大量用于\
    \ IDE 和板子之间的通信。\n"
- fmt: "### Java Simple Serial Connector\n\nJava Simple Serial Connector (jSSC), from\
    \ Alexey Sokolov, is licensed under GNU Lesser GPL. The latest version as of this\
    \ writing (`jSSC-2.8.0`), released January 2014, was the library chosen to replace\
    \ RXTX in the Arduino IDE (starting from version 1.5.6).\n\n`jSSC` is available\
    \ for all platforms and operating systems. You’ll notice it is faster than RXTX,\
    \ and several bugs have been fixed. `jSSC` comes in a simple JAR file, with all\
    \ the native required files included, so you don’t need to deal with local installations,\
    \ as it takes care of adding them to the classpath at runtime.\n\nA JAR with latest\
    \ available version can be downloaded from [`https://github.com/scream3r/java-simple-serial-connector/releases`](https://github.com/scream3r/java-simple-serial-connector/releases).\
    \ If you add it as a library in NetBeans or open it, you will see its classes\
    \ (the `jssc` package) and the native content (the `libs` package).\n\n## JavaFX,\
    \ the Charting API, and Orientation\n\nIn the example that follows, you will learn\
    \ how to design a simple JavaFX application that takes the orientation readings\
    \ from the Arduino board and displays them in a chart. For the sake of clarity,\
    \ the example uses two classes—one for the serial readings in Listing [12-2](#A323804_3_En_12_Chapter.html#Par66)\
    \ and one for the chart and the JavaFX stage in Listing [12-3](#A323804_3_En_12_Chapter.html#Par68).\n\
    \nYou’ll bind these classes (`Serial` and `OrientationFX`) by using a `StringProperty`,\
    \ containing the last line read from the serial port. By listening to changes\
    \ in this property in the JavaFX thread, you’ll know when there’s a new reading\
    \ to add to the chart.\n\n### Creating the Module Project\n\nLet’s start by creating\
    \ a module project in NetBeans, as shown in Figure [12-19](#A323804_3_En_12_Chapter.html#Fig19).\
    \ Make sure you select the JDK 9 platform, as in Figure [12-20](#A323804_3_En_12_Chapter.html#Fig20),\
    \ when setting the project name, `OrientationFX`.\n\n![A323804_3_En_12_Fig20_HTML.jpg](A323804_3_En_12_Fig20_HTML.jpg)\n\
    \nFigure 12-20. Project name and location\n\n![A323804_3_En_12_Fig19_HTML.jpg](A323804_3_En_12_Fig19_HTML.jpg)\n\
    \nFigure 12-19. Adding a module project in NetBeans\n\nClick Finish, and the new\
    \ empty project will be created. Right-click on it, select New ➤ Module, and name\
    \ it `com.jfxbe.orientationfx`, as shown in Figure [12-21](#A323804_3_En_12_Chapter.html#Fig21).\
    \ Click Finish. The empty class called `module-info.java` will be created.\n\n\
    ![A323804_3_En_12_Fig21_HTML.jpg](A323804_3_En_12_Fig21_HTML.jpg)\n\nFigure 12-21.\
    \ Module name\n\nFor convenience, place the `jssc.jar` under a `libs` folder in\
    \ the project, and then add it as a library (choose Libraries ➤ Add JAR/Folder).\n\
    \nNow you can add to the module descriptor the `requires` clause for `javafx.controls`,\
    \ to include the JavaFX `controls` and `base` modules, and the clause for `jssc`\
    \ as well, as shown in Listing [12-2](#A323804_3_En_12_Chapter.html#Par66).\n\n\
    ```\nmodule com.jfxbe.orientationfx {\n    requires javafx.controls;\n    requires\
    \ jssc;\n}\n```\n\nListing 12-2. Module-info Class\n\nYou can add now a new package\
    \ to the `com.jfxbe.orientationfx` module and a new class to it, called `OrientationFX`.\
    \ The class will extend `Application`. Notice that the class will be available\
    \ to be imported, thanks to the `requires` clause in the module descriptor. You\
    \ simply add a `Scene` and show the stage, as shown in Listing [12-3](#A323804_3_En_12_Chapter.html#Par68).\n\
    \n```\npublic class OrientationFX extends Application {\n    @Override\n    public\
    \ void start(Stage primaryStage) throws Exception {\n        Scene scene = new\
    \ Scene(new StackPane(), 1000, 600);\n        primaryStage.setScene(scene);\n\
    \        primaryStage.show();\n    }\n}\n```\n\nListing 12-3. Defining the OrientationFX\
    \ Class\n\nFinally, you can add this package to the module with the `exports`\
