  trans: '

    #### 变量捕获


    在函数式编程语言中，通常可以通过闭包（lambda 表达式）来使用闭包作用域之外的变量。这些变量通常被称为非局部变量或捕获变量，因为它们并非 lambda
    表达式或方法的局部作用域变量。当这些非局部变量在 lambda 表达式中使用时，它们必须是不可变的。这是函数式编程领域的一个关键原则。Java 8 编译器新增了一项能力，即可以引用匿名内部类或
    lambda 表达式作用域之外的变量。


    使用 lambda 表达式时，你可以选择引用闭包函数作用域之外的变量。通常，在 Java 8 之前，这些非局部变量必须是 `final`（不可变）的。这种不可变状态使编译器能够更好地预测程序行为，从而优化代码。在
    Java Swing 开发中，当需要在匿名内部类方法（局部变量作用域）内部使用外部作用域的变量时，这种情况经常发生。为了遵守编译器规则，你必须将变量声明为
    `final`。


    Java 8 编译器具备一项新能力，可以推断传递给匿名内部类方法和 lambda 表达式的非局部变量的意图，并将其转换为 `final`（不可变）。要了解旧式
    Java Swing 开发者（Java 8 之前）是如何遇到编译时错误的，请看代码清单 4-5。场景是一个按钮，在按下按钮后会修改 Swing `JLabel`
    组件的文本。在 Java 8 之前，这段代码无法正确编译，因为 `label` 变量需要被声明为 `final`。


    ```

    // Java 8 之前

    // label 变量是 actionPerformed() 的非局部变量

    JLabel label = new JLabel("Press Me");

    btn.addActionListener(new ActionListener() {

    public void actionPerformed(ActionEvent e) {

    label.setText("Pressed"); /* !编译错误！变量 label 必须是 final 的。 */

    } });

    代码清单 4-5.

    在 JDK 8 之前会产生编译器错误的代码

    ```


    Java 8 新增了将非局部变量转换为 final 的能力。在代码清单 4-6 中，你会注意到除了注释之外，代码是完全相同的。从 Java 8 开始，你现在可以在匿名内部类和
    lambda 表达式中使用变量捕获功能。


    ```

    // Java 8 新增

    // label 变量是 actionPerformed() 的非局部变量

    JLabel label = new JLabel("Press Me");

    // 编译器隐式地将 label 转换为 final（不可变）变量

    btn.addActionListener(new ActionListener() {

    public void actionPerformed(ActionEvent e) {

    label.setText("Pressed"); /* 合法。变量 label 已被转换为 final */

    } });

    代码清单 4-6.

    在 JDK 8 中成功编译的代码

    ```


    代码清单 4-6 中展示的两个代码示例是相同的。区别在于使用 JDK 8 或更高版本的编译器时。当使用 Java 8 编译器时，捕获变量将隐式地变为 final（不可变引用），并且这不会触发任何编译错误。


    ## 函数式接口


    云计算的出现帮助许多函数式编程语言重新焕发了活力。很明显，在处理极其庞大的数据集时，解决问题的方式发生了范式转变。应用函数式编程技术的一个典型用例是，能够以分布式方式遍历数据集并执行计算，从而将负载分摊到多个节点或
    CPU 核心上。相比之下，命令式编程语言则是先收集数据，然后将其传递到一个紧凑的 `for` 循环中进行处理。由于数据和代码的耦合方式，这给单个线程（核心）处理如此大量的数据带来了很大负担。问题需要被分解，以允许其他线程（核心）参与计算，从而实现分布式处理。


    函数式编程的优势之一在于能够以语法简洁的方式表达功能，但更重要的是能够将功能（lambda 表达式）传递给方法。能够将 lambda 表达式传递给方法通常促进了惰性求值这一概念。这种行为与函数回调行为（异步消息传递）相同，即调用被推迟（因此是“惰性的”）到稍后的时间点执行。与惰性求值相对的是急切求值。使用惰性求值通常可以通过避免不必要的计算来提高性能。


    另一个需要讨论的重要主题是函数式接口如何在 Java 语言中用作闭包。Java 语言的设计者/架构师并没有将函数实现为 Java 中的一等类型，而是巧妙地定义了函数式接口作为闭包的概念。简单来说，函数式接口基本上就是一个单一抽象方法（SAM）。函数式接口的概念已经存在了很长时间。例如，那些使用过
    Java 线程的人会记得 `Runnable` 接口，它有一个返回类型为 `void` 的单一 `run()` 方法。单一抽象方法模式是 Java 8 lambda
    表达式的一个组成部分。作为函数式接口的一个例子，我创建了一个名为 `MyEquation` 的接口，其中包含一个单一的抽象 `compute()` 方法。一旦创建，你就可以使用
    lambda 表达式来声明和赋值变量。代码清单 4-7 是一个具有单一抽象 `compute()` 方法的函数式接口。


    ```

    // 函数式接口

    interface MyEquation {

    double compute(double val1, double val2);

    }

    代码清单 4-7.

    一个声明的函数式接口，包含一个单一抽象方法 compute()

    ```


    创建函数式接口后，你可以声明一个变量，并用 lambda 表达式为其赋值。代码清单 4-8 演示了将 lambda 表达式赋值给函数式接口变量。


    ```

    MyEquation area = (height, width) -> height * width;

    MyEquation perimeter = (height, width) -> 2*height + 2*width;

    System.out.println("Area = " + area.compute(3, 4));

    System.out.println("Perimeter = " + perimeter.compute(3, 4));

    代码清单 4-8.

    函数式接口的两个变量，使用 lambda 表达式赋值

    ```


    以下是代码清单 4-8 的输出：


    ```

    Area = 12.0

    Perimeter = 14.0

    ```

