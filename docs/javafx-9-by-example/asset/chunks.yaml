    We have come so far with this custom Pyramid example, yet the 3D geometries still
    look a little cartoonish. This is because of the lighting, specifically the scene
    lighting. To truly show off the 3D surfaces, you must add a point light to your
    scene. Listing [11-15](#A323804_3_En_11_Chapter.html#Par122) adds a simple point
