  trans: '

    #### 设置舞台窗口


    既然你已经了解了实例（状态）变量，现在让我们进入 `start()` 方法代码块。在之前关于 GUI 的章节中，你看到 GUI 应用程序通常包含一个标题栏和围绕场景的窗口边框。在这里，我想演示创建不规则形状半透明窗口的能力。代码调用舞台（`primaryStage`）对象的
    `initStyle()` 方法，并传入 `StageStyle.TRANSPARENT` 值；结果，舞台窗口没有标题栏（即无装饰）并且是透明的。


    初始化舞台样式后，代码创建了一个根节点，类型为 `AnchorPane`。我使用 `AnchorPane` 是因为它便于将控件相对于应用程序窗口的边缘进行定位。你会注意到调用了
    `setId()` 方法，并传入 `app-surface` 作为其唯一 ID。如果你不熟悉 JavaFX CSS，请花些时间阅读关于自定义 UI 主题的第
    15 章。我们将采用清单 9-2 中所示的样式定义。为了重申 CSS 样式代码的部分内容，清单 9-2 中的根节点如下所示：


    ```

    .root {

    -white-ish: rgba(255, 255, 255, .90);

    -black-ish: rgba(0, 0, 0, .80);

    }

    #app-surface {

    /* 应用程序表面 */

    -fx-snap-to-pixel: false;

    /* 背景  */

    -fx-background-color:  -black-ish;

    -fx-background-radius: 7;

    -fx-background-insets: 2 2 2 2;

    /* 边框 */

    -fx-border-color:  -white-ish;

    -fx-border-style:  solid;

    -fx-border-insets: 6 6 6 6;

    -fx-border-width:  1.5;

    -fx-border-radius: 5;

    }

    //... 代码省略

    ```


    将 CSS 样式应用于根节点后，如图 9-5 所示，你会看到一个半透明的圆角背景，其外边缘略微向内嵌入了白色边框。


    ![A323804_3_En_9_Fig5_HTML.jpg](img/A323804_3_En_9_Fig5_HTML.jpg)


    图 9-5.


    JavaFX CSS 样式化音频播放器应用程序的根节点。CSS 选择器 `app-surface` 将创建一个半透明的圆角背景，其外边缘略微向内嵌入了白色边框。


    接下来，代码执行常规步骤，通过应用 JavaFX 样式表文件 `playing-audio.css` 来设置场景。清单 9-2 展示了 `playing-audio.css`
    文件的内容。注意，`root` 类选择器有两个全局颜色属性，分别命名为 `-white-ish` 和 `-black-ish`。我创建这些属性是为了在其他样式定义块中重用。如果你不熟悉
    JavaFX CSS 样式，请参考关于自定义 UI 的第 15 章。


    回到清单 9-1 的 `start()` 方法中，在应用 CSS 样式表之后，代码调用了私有方法 `initMovablePlayer()`，该方法负责使舞台窗口可拖动。由于没有原生标题栏，你会发现能够拖动应用程序表面的任何部分会很方便。`initMovablePlayer()`
    方法使用了前面提到的实例变量 `anchorPt` 和 `previousLocation`，以便在触发鼠标事件（如按下、拖动或释放）时，根据相对屏幕坐标计算点。


    #### 频谱区域图可视化（Scene.lookup( ) 方法）


    在创建了一个可使用鼠标拖动的场景和舞台之后，代码创建了一个 ID 为 `chart-area` 的 `Path` 实例。此路径将包含 `Path` 元素，这些元素会在播放音频媒体时绘制一个频谱图作为可视化效果。正如你稍后在代码中会看到的，`MediaPlayer`
    实例将附加一个音频频谱监听器，用于更新路径元素，这些元素将绘制一个填充了线性渐变的区域图。


    虽然具有唯一 ID 的 JavaFX 节点可以使用 CSS 选择器进行样式化，但该 ID 也可以用于通过 `lookup(id)` 方法在父节点或场景中回溯或查找。请注意，在节点上设置的
    ID 应该是唯一的。根据 Javadocs 文档：“如果有多个节点匹配指定的选择器，此函数将返回第一个匹配的节点。如果没有找到具有此 ID 的节点，则返回
    null。”


    注意


    要在场景图或父节点中查找节点，请使用 `lookup()` 方法，并传入子节点的 ID。务必在字符串 ID 前加上符号 `#`。例如，`Node myButton
    = scene.lookup("#my-button");`。


    使用场景的 `lookup()` 方法是一种便捷的方式，可以以随机访问的方式从场景图中检索节点，而无需创建全局定义的实例变量。

