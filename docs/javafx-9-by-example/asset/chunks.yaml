- fmt: '### Setting Up the Stage Window


    Now that you know about the instance (state) variables, let’s jump into the `start()`
    method code block. In previous chapters relating to GUIs, you saw that GUI applications
    normally contain a title bar and windowed borders surrounding the scene. Here,
    I want to demonstrate the ability to create irregularly shaped semi-transparent
    windows. The code invokes the stage (`primaryStage`) object’s `initStyle()` method
    with a `StageStyle.TRANSPARENT` value; as a result, the stage window has no title
    bar (is undecorated) and is transparent.


    After initializing the stage’s style, the code creates a root node as an `AnchorPane`.
    I use an `AnchorPane` because it is easy to position the controls relative to
    the edges of the application window. You’ll notice the `setId()` method called
    with `app-surface` as its unique ID. If you are not familiar with JavaFX CSS,
    spend some time looking at Chapter [15](#A323804_3_En_15_Chapter.html) on topic
    of custom UIs. We will employ the styling definitions shown in Listing [9-2](#A323804_3_En_9_Chapter.html#Par31).
    To reiterate the portion of CSS styling code, the root node from Listing [9-2](#A323804_3_En_9_Chapter.html#Par31)
    is shown here:


    ```

    .root {

    -white-ish: rgba(255, 255, 255, .90);

    -black-ish: rgba(0, 0, 0, .80);

    }

    #app-surface {

    /* Application surface */

    -fx-snap-to-pixel: false;

    /* Background  */

    -fx-background-color:  -black-ish;

    -fx-background-radius: 7;

    -fx-background-insets: 2 2 2 2;

    /* Border */

    -fx-border-color:  -white-ish;

    -fx-border-style:  solid;

    -fx-border-insets: 6 6 6 6;

    -fx-border-width:  1.5;

    -fx-border-radius: 5;

    }

    //... Code omitted

    ```


    After applying the CSS styling to the root node, as shown in Figure [9-5](#A323804_3_En_9_Chapter.html#Fig5),
    you’ll notice a translucent rounded background with a white border inset slightly
    from the outer edges.


    ![A323804_3_En_9_Fig5_HTML.jpg](A323804_3_En_9_Fig5_HTML.jpg)


    **Figure 9-5.** JavaFX CSS styling the root node of the Audio Player application.
    The CSS selector `app-surface` will create a translucent rounded background with
    a white border inset slightly from the outer edges.


    Next, the code takes the usual step of setting up the scene by applying a JavaFX
    style sheet file `playing-audio.css`. Listing [9-2](#A323804_3_En_9_Chapter.html#Par31)
    shows the contents of the `playing-audio.css` file. Notice that the `root` class
    selector has two global color attributes, named `-white-ish` and `-black-ish`.
    I created these to be reused in other styling definition blocks. If you are not
    familiar with JavaFX CSS styling, refer to Chapter [15](#A323804_3_En_15_Chapter.html)
    on custom UIs.


    Back in the `start()` method from Listing [9-1](#A323804_3_En_9_Chapter.html#Par29),
    after applying the CSS style sheet, the code invokes the private `initMovablePlayer()`
    method, which is responsible for making the stage window dragable. Because you
    don’t have a native title bar, you will find it convenient to be able to drag
    any part of the application’s surface. The `initMovablePlayer()` method uses the
    instance variables `anchorPt` and `previousLocation` mentioned earlier to calculate
    points based on relative screen coordinates when mouse events (such as press,
    drag, or release) are triggered.


    ### The Spectrum Area Chart Visualization (the `Scene.lookup()` Method)


    After creating a scene and stage capable of being dragged using the mouse, the
    code creates a `Path` instance with an ID of `chart-area`. This path will contain
    `Path` elements that will draw a spectrum chart as a visualization as the audio
    media is being played. As you will see later in the code, the `MediaPlayer` instance
    will attach an audio spectrum listener to update path elements that will draw
    an area chart filled with a linear gradient.


    While a JavaFX node having a unique ID can be styled using CSS selectors, the
    ID can also be used to be recalled or looked up within a parent node or a scene
    by using the `lookup(id)` method. Be aware that an ID set on a node should be
    unique. According to the Javadocs documentation, “If more than one node matches
    the specified selector, this function returns the first of them. If no nodes are
    found with this ID, then null is returned.”


    > **Note:** To look up a node in a Scene graph or a parent node, use the `lookup()`
    method by passing in the child’s ID. Be sure to prefix the string ID with the
    symbol `#`. For example, `Node myButton = scene.lookup("#my-button");`.


    Using the scene’s `lookup()` method is a convenient way to retrieve nodes from
    the Scene graph in a random-access way without having to create globally defined
    instance variables.'
  raw: '#### Setting Up the Stage Window


    Now that you know about the instance (state) variables, let’s jump into the `start()`
    method code block. In previous chapters relating to GUIs, you saw that GUI applications
    normally contain a title bar and windowed borders surrounding the scene. Here,
    I want to demonstrate the ability to create irregularly shaped semi-transparent
    windows. The code invokes the stage (`primaryStage`) object’s `initStyle()` method
    with a `StageStyle.TRANSPARENT` value; as a result, the stage window has no title
    bar (is undecorated) and is transparent.


    After initializing the stage’s style, the code creates a root node as an `AnchorPane`.
    I use an `AnchorPane` because it is easy to position the controls relative to
    the edges of the application window. You’ll notice the `setId()` method called
    with `app-surface` as its unique ID. If you are not familiar with JavaFX CSS,
    spend some time looking at Chapter [15](#A323804_3_En_15_Chapter.html) on topic
    of custom UIs. We will employ the styling definitions shown in Listing [9-2](#A323804_3_En_9_Chapter.html#Par31).
    To reiterate the portion of CSS styling code, the root node from Listing [9-2](#A323804_3_En_9_Chapter.html#Par31)
    is shown here:


    ```

    .root {

    -white-ish: rgba(255, 255, 255, .90);

    -black-ish: rgba(0, 0, 0, .80);

    }

    #app-surface {

    /* Application surface */

    -fx-snap-to-pixel: false;

    /* Background  */

    -fx-background-color:  -black-ish;

    -fx-background-radius: 7;

    -fx-background-insets: 2 2 2 2;

