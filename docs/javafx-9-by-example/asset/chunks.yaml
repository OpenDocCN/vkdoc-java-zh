  trans: '

    ### Maven/Gradle


    另一个我尚未提及的重要事项是构建应用程序时的依赖管理。换句话说，当你构建一个 Java 应用程序时，你需要获取正确版本的 JAR 库依赖，以便编译、部署和运行你的应用程序。当一个
    JAR 依赖于另一个 JAR，并以此类推，从而形成一个依赖图（树）时，这被称为传递性依赖。当需要追踪和调试代码时，极其庞大的传递性依赖常常让开发者感到沮丧。正如你稍后将在
    Java 9 的 Jigsaw 模块定义中学到的，你将能够相当轻松地指定如何映射依赖关系。本节将简要介绍流行的构建工具 Maven。


    #### 仓库


    为了避免更多的 JAR 地狱并妥善管理依赖，Apache 组织于 2004 年发布了构建自动化工具 Maven。该构建工具为 Java 项目确立了约定。其中一个核心约定是
    Java 项目的结构方式。这些项目结构也催生了构建 Java 工件（模块）的更标准方法。虽然 Maven 不仅仅是一个构建工具，但它也在某种程度上成为了在仓库中托管
    JAR 的事实标准。这些仓库保存了当今使用的所有流行开源 JAR 库。虽然你可以拥有私有仓库，但 Maven Central 是互联网上的官方公共仓库。我还想特别感谢
    JFrog 公司（[`https://www.jfrog.com/`](https://www.jfrog.com/)）的各位。JFrog 是一家专注于构建和仓库基础设施服务的公司。JFrog
    的 Bintray 服务允许你在其仓库中托管二进制文件和可执行文件，地址为 [`https://www.jfrog.com/bintray`](https://www.jfrog.com/bintray)。


    #### Maven 坐标


    创建 Apache Maven 的人还提出了 Maven 坐标的概念，其中模块（工件）使用组 ID、工件 ID 和版本进行唯一命名。例如，代码清单 2-3
    包含了一个指向用于网络编程的流行 Netty 库的 Maven 坐标。一个 Maven `pom.xml` 文件通常包含一个用于编译的依赖列表。


    ```

    io.netty

    netty-all

    4.0.46.Final


    代码清单 2-3.

    包含指向 JAR 依赖的 Maven 坐标的 pom.xml 文件片段

    ```


    要搜索和定位库依赖，请访问 [`https://search.maven.org`](https://search.maven.org)。在那里你可以找到流行的开源库。关于依赖和构建工具，最后要提一下的是位于
    [`https://gradle.org`](https://gradle.org) 的 Gradle 构建工具。代码清单 2-4 展示了 Gradle 使用
    Maven 坐标来管理依赖的方式。


    ```

    dependencies {

    compile ''io.netty:netty-all:4.0.46.Final''

    testCompile ''junit:junit:4.12''

    }

    代码清单 2-4.

    一个使用 Maven 坐标声明依赖的 Gradle 脚本。组 ID、工件 ID 和版本由冒号分隔。

    ```


    再次提醒，当你阅读本章时，诸如 Maven 和 Gradle 之类的构建工具应该已经能够针对 Java 9 模块代码项目进行构建（工作）。


    现在你已经对 Java 模块的过去和当前历史有了初步了解，让我们开始使用 Java 9 模块吧！


    ## 入门


    在开始实现模块之前，本节将讨论 Java 9 的模块路径。假设你已经了解 Java 类路径，那么 Java 9 的新特性是模块路径（`--module-path`）。了解模块路径和类路径将帮助你理解
    JAR 文件和类是如何被加载的。例如，当你使用 Java 9 编译器编译和运行 Java 9 之前的代码时，你需要了解 Java 9 模块和传统 JAR 文件如何共存。


    ### 什么是模块路径？


    新的 Java 9 模块路径能够向应用程序代码或其他模块暴露模块和包，同时隐藏你不想暴露的包。相比之下，类路径无法将 JAR 封装为模块及其类类型。类路径的主要问题是当两个不同的
    JAR 文件中存在同名的公共类类型时。要了解更多关于这个问题的信息，请查看前面关于历史（JAR 地狱）的部分。那么，这就引出了一个问题：如何指定模块路径？


    稍后你将学习如何创建模块，但现在我们将以稍微反向的顺序来学习。我的意思是，你将首先学习如何运行（执行）一个模块，然后再学习如何创建模块。


    模块路径是一个元素列表，其中每个元素要么是一个模块 JAR 文件，要么是一个模块目录。与类路径类似，每个元素由路径分隔符分隔，例如在类 Unix 操作系统和
    Windows 操作系统中分别使用 `:` 或 `;`。以下是运行模块应用程序时模块路径的用法：


    *   `--module-path` 或 `-p`：一个模块列表，可以是 JAR 文件或包含模块的目录。

    *   `--module` 或 `-m`：你想要执行的模块名称和主类，用正斜杠分隔。


    ```

    $ java --module-path <模块路径> --module <模块名>/<主类>

    ```


    由于你稍后将学习如何创建和构建模块化 JAR 文件，这里假设文件系统上已经存在一个模块。例如，以下是指定模块路径以运行应用程序的方式：


    ```

    $ java --module-path com.jfxbe.physicsengine.jar:mods -m com.jfxbe.game/com.carlfx.game.Main

    ```


    在这个例子中，`--module-path` 上指定的第一个元素是一个名为 `com.jfxbe.physicsengine.jar` 的模块化 JAR 文件。这里，该
    JAR 文件位于当前路径下。模块路径上指定的第二个元素是一个名为 `mods` 的目录。`mods` 目录可以任意命名，但按照惯例，它是“modules”（模块）的缩写。`mods`
    目录是编译后的模块代码存放的地方。`mods` 目录可以包含一个或多个模块目录。这些模块目录包含类似于类路径的编译代码。代码清单 2-5 展示了 `com.jfxbe.game`
    模块中编译代码的目录结构。


    ```

    mods/

    |---- com.jfxbe.game/

    |---- module-info.class

    |---- com/

    |     |---- jfxbe/

    |     |     |---- game/

    |     |           |---- Main.class

    |---- images/

    |     |---- player1.png

    |     |---- player2.png

    |     |---- enemy.png

    |---- soundfx/

    |---- snore.au

    代码清单 2-5.

    com.jfxbe.game 模块中编译代码的目录结构

    ```


    `mods` 目录包含一个名为 `com.jfxbe.game` 的模块或目录，其中包含编译后的代码和资源。你还会注意到 `com.jfxbe.game`
    目录中的 `module-info.class` 文件以粗体显示。这个类文件是在编译 `module-info.java` 源文件后创建的。`module-info.java`
    源文件被称为模块定义。让我们来看看 Java 9 的模块定义语法。

