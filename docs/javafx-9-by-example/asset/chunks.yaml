- fmt: '#### A VBox Example


    To demonstrate the use of a `VBox`, the example in Listing [5-2](#A323804_3_En_5_Chapter.html#Par29)
    contains the same four rectangles from the previous example, with the same layout
    constraints. In the same manner as the `HBox` example, the code will use a one-pixel
    stroke width to draw a dashed border (colored in blue) with an inset padding of
    one pixel.


    ```

    VBox vbox = new VBox(5);        // spacing between child nodes only.

    vbox.setPadding(new Insets(1)); // space between vbox border and child nodes column

    // The border is blue, dashed, 0% radius for all corners,

    // a width of 1 pixel

    BorderStroke [] borderStrokes = new BorderStroke[] {

    new BorderStroke(Color.BLUE,

    BorderStrokeStyle.DASHED,

    new CornerRadii(0.0, true),

    new BorderWidths(1.0))

    };

    vbox.setBorder(new Border(borderStrokes));

    Rectangle r1 = new Rectangle(10, 10); // little square

    Rectangle r2 = new Rectangle(20, 20); // big square

    Rectangle r3 = new Rectangle(5, 20);  // vertical rectangle

    Rectangle r4 = new Rectangle(20, 5);  // horizontal rectangle

    VBox.setMargin(r1, new Insets(2,2,2,2)); // margin around r1

    vbox.getChildren().addAll(r1, r2, r3, r4);

    root.getChildren().add(vbox);

    primaryStage.setOnShown((WindowEvent we) -> {

    System.out.println("vbox width  " + vbox.getBoundsInParent().getWidth());

    System.out.println("vbox height " + vbox.getBoundsInParent().getHeight());

    });

    Listing 5-2.

    The VBoxExample.java File Demonstrating VBox Layout

    ```


    Figure [5-3](#A323804_3_En_5_Chapter.html#Fig3) shows the output of the `VBoxExample.java`
    application from Listing [5-2](#A323804_3_En_5_Chapter.html#Par29), demonstrating
    the `VBox` layout with rectangle shapes as child nodes. The `VBox` has a one-pixel
    width dashed border and a one-pixel padding inset. The one-pixel padding inset
    is between the border and the rectangles. The `VBox`, like a vertical bookshelf
    each shelf represents the spacing between the rectangles (horizontal white area).
    The spacing between the rectangles is defined by the `VBox`’s constructor or by
    using the `setSpacing()` method.


    ![A323804_3_En_5_Fig3_HTML.jpg](A323804_3_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    The output of `VBoxExample.java` depicting four rectangles added to a `VBox`


    #### Code Walkthrough


    In Listing [5-2](#A323804_3_En_5_Chapter.html#Par29), the code begins by instantiating
    a `VBox` with a five-pixel wide space between child nodes. Figure [5-4](#A323804_3_En_5_Chapter.html#Fig4)
    depicts horizontal gray bars that represent the spacing between child nodes (`r1`
    to `r4`). After constructing the `VBox`, the code sets the padding via the `setPadding()`
    method. Setting the padding by using an `Insets` object allows you to create padding
    between the border and the row. In Figure [5-4](#A323804_3_En_5_Chapter.html#Fig4),
    the `VBox` has a one-pixel wide dashed border with a padding of one pixel surrounding
    the child nodes.


    ![A323804_3_En_5_Fig4_HTML.jpg](A323804_3_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    `VBox` having a one-pixel dashed border, a one-pixel padding, and four rectangle
    shaped nodes separated by five-pixel spacing


    Once the four rectangles are created, the code sets the margin on the rectangle
    `r1`. To set the margin, we use the static method `VBox.setMargin(Node, Insets)`.
    The code then creates an `Insets` object with a margin of two pixels for the top,
    right, bottom, and left of rectangle 1 (`r1`). Rectangle 1 (`r1`) has a two-pixel
    margin shown in blue in Figure [5-4](#A323804_3_En_5_Chapter.html#Fig4). To find
    the total size of a `VBox` instance, you simply add the spacing, margin, padding,
    and child nodes’ dimensions (local bounds). Having a `Group` as a parent, the
    `VBox` node’s calculated width would total to 24 pixels, and the height would
    total to 78 pixels.


    Table 5-3.


    The `VBox`’s Total Width in Pixels. All Border, Spacing, Padding, and Largest
    Preferred Child Widths Are Added


    | Notes | Pixels |

    | --- | --- |

    | Left side `VBox`’s border stroke width | 1 |

    | Left side padding inset | 1 |

    | The width of the widest child node (Rectangle 2) | 20 |

    | Right side padding inset between rectangle and border | 1 |

    | Right side `VBox`’s border stroke width | 1 |

    | Total width in pixels: | 24 |


    The total height in pixels of the `VBox` instance is shown in Table [5-4](#A323804_3_En_5_Chapter.html#Tab4).


    Table 5-4.


    The `VBox`’s Total Height in Pixels. All Border, Spacing, Padding, and Preferred
    Child Widths Are Added


    | Notes | Pixels |

    | --- | --- |

    | Top of `VBox`’s border stroke width | 1 |

    | Padding inset (top) between border and child node | 1 |

    | Rectangle1’s margin (top) width | 2 |

    | Width of rectangle 1 | 10 |

    | Rectangle 1’s margin (bottom) width | 2 |

    | Spacing between Rectangle 1 and 2 | 5 |

    | Height of rectangle 2 | 20 |

    | Spacing between Rectangle 2 and 3 | 5 |

    | Height of rectangle 3 | 5 |

    | Spacing between rectangle 3 and 4 | 5 |

    | Height of rectangle 4 | 20 |

    | `VBox`’s padding inset between child node and border | 1 |

    | `VBox`’s border stroke (bottom) width | 1 |

    | Total width in pixels : | 78 |


    ### FlowPane


    The `FlowPane` layout node allows child nodes in a row to flow based on the available
    horizontal spacing and wraps nodes to the next line when horizontal space is less
    than the total of all the nodes’ widths. Figure [5-5](#A323804_3_En_5_Chapter.html#Fig5)
    shows four child nodes flowing from left to right and then wrapping.


    ![A323804_3_En_5_Fig5_HTML.jpg](A323804_3_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    A `FlowPane` layout with nodes flowing left to right with the ability to wrap
    nodes based on horizontal space. The Hello text node is wrapped to the next line
    because the available horizontal space, denoted by the dashed line, is too small.


    By default, a `FlowPane` layout flows child nodes from left to right (`Pos.TOP_LEFT`).
    To change the flow alignment, you can simply invoke the `setAlignment()` method
    by passing in an enumerated value of type `Pos`. Listing [5-3](#A323804_3_En_5_Chapter.html#Par36)
    creates a `FlowPane` layout to flow child nodes from right to left (`Pos.TOP_RIGHT`).


    ```

    FlowPane flowPane = new FlowPane();

    flowPane.setAlignment(Pos.TOP_RIGHT);

    flowPane.getChildren().addAll(...); // child nodes to add.

    Listing 5-3.

    The Creation of a FlowPane Layout to Flow from Right to Left

    ```


    ### BorderPane


    The `BorderPane` layout node allows child nodes to be placed in a top, bottom,
    left, right, or center regions. Because each region can only have one node, developers
    typically nest layouts. An example would be to create an `HBox` with children
    to then be set as the top region via the `setTop()` method. Figure [5-6](#A323804_3_En_5_Chapter.html#Fig6)
    shows the `BorderPane`’s regions.


    ![A323804_3_En_5_Fig6_HTML.jpg](A323804_3_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    The `BorderPane` layout


    This layout is similar to many web sites you see every day, where navigational
    links are placed in the top, bottom, left, or right regions of a page, while the
    main content is in the center area. A `BorderPane`’s region of top and bottom
    borders allows a resizable node to take up all of the available width. The left
    and right border regions take up the available vertical space between the top
    and bottom borders. All of the bordering regions honor the children’s sizes (preferred
    width and height) by default. According to the Javadocs, the default alignment
    of nodes, when placed in the top, bottom, left, right, and center regions, is
    as follows:


    *   Top: `Pos.TOP_LEFT`

    *   Bottom: `Pos.BOTTOM_LEFT`

    *   Left: `Pos.TOP_LEFT`

    *   Right: `Pos.TOP_RIGHT`

    *   Center: `Pos.CENTER`


    Next, you will be learning about the `GridPane` layout in combination with the
    `BorderPane` to create a simple UI similar to a `Contacts` form-like application.
    By using the `BorderPane` and its center region as the root node, the available
    horizontal and vertical space will be given to the child nodes. This will allow
    text fields to stretch when the window is being resized.'
