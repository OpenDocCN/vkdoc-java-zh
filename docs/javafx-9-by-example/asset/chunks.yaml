    PhotoViewer 类的 start()、stop() 和 main() 方法实现

    ```


    当 JavaFX 应用程序线程准备就绪时，`init()` 方法会在 `start()` 方法之前被调用。`init()` 方法在 Application
    创建之后被调用。可以重写 `init()` 方法来初始化任何资源（不在 JavaFX 应用程序线程上运行）。在清单 7-4 中，我没有实现 `init()`
    方法，但我想指出应用程序生命周期中方法调用的顺序。当 JavaFX 应用程序通过使用 `Platform.exit()` 方法退出时，应用程序的 `stop()`
    方法最后被调用。`stop()` 方法为应用程序提供了清理任何资源的机会。在清单 7-4 中，`stop()` 方法调用了 `executorService`（`java.util.concurrent.ExecutorService`）变量的
    `shutdown()` 方法，以优雅地关闭线程执行器服务。如果不调用执行器服务进行关闭，您的应用程序将无法正常关闭。在 `stop()` 执行之后，代码执行返回到
    `main()` 方法中的主线程，该位置位于清单 7-4 中调用 `launch()` 的代码行语句之后（最后一行代码）。

