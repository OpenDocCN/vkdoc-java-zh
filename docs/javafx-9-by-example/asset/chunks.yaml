  trans: "\n### 在命令行提示符中使用 Gradle\n\n开发 JavaFX 应用的第三种方式是使用 Gradle 构建工具。与之前类似，你仍将使用普通的文本编辑器，但创建和编译代码的步骤将不再手动执行，而是依赖\
    \ Gradle 构建工具。如果你尚未配置 Gradle，请参考本章前面“安装 Gradle”一节的内容。请按照以下步骤创建一个基于 Gradle 的项目。\n\
    \n1.  创建另一个名为 `helloworld_gradle` 的项目和目录。假设你当前位于 `~/projects` 目录下，你将在此创建一个基于 Gradle\
    \ 的项目。在类 Unix 操作系统上，输入以下命令：\n\n```\n    $ mkdir -p projects/helloworld_gradle\n\
    \    ```\n\n在 Windows 上，输入以下命令：\n\n```\n    C:\\Users\\myusername>mkdir projects\\\
    helloworld_gradle\n    ```\n\n2.  将目录切换到 `helloworld_gradle`。在类 Unix 操作系统上，输入以下命令：\n\
    \n```\n    $ cd helloworld_gradle\n    ```\n\n在 Windows 上，输入以下命令：\n\n```\n   \
    \ C:\\Users\\myusername>cd projects\\helloworld_gradle\n    ```\n\n3.  构建一个具有标准目录结构（Maven\
    \ 和 Gradle 约定）的 Java 骨架项目。你会看到创建了类似 `src/main/java` 和 `src/test/java` 的目录。由于此操作会初始化项目文件和目录，因此只需执行一次。以下命令用于创建一个\
    \ Java 库项目：\n\n```\n    $ gradle init --type java-library\n    ```\n\n执行 Gradle\
    \ `init` 任务后的输出如下：\n\n```\n    :wrapper\n    :init\n    BUILD SUCCESSFUL\n   \
    \ Total time: 1.897 secs\n    ```\n\n4.  由于你创建的是 JavaFX 应用而非 Java 库，你需要分别删除 `src/main/java`\
    \ 和 `src/test/java` 目录下的 `Library.java` 和 `LibraryTest.java` 文件。这些文件只是为你创建 Java\
    \ 库时提供的存根文件。在当前场景中，你创建的是一个 JavaFX 应用。  \n5.  接下来，在 `src/main/java` 目录下创建一个名为 `org/acme/helloworld`\
    \ 的目录，并将清单 1-1 中的 `HelloWorld.java` 文件复制到 `src/main/java/org/acme/helloworld`\
    \ 目录中。结果如图 1-31 所示。\n\n![A323804_3_En_1_Fig31_HTML.jpg](img/A323804_3_En_1_Fig31_HTML.jpg)\n\
    \n图 1-31.\n\nGradle Java 应用项目结构。请注意源代码目录结构遵循标准约定，布局为 `src/main/java` 和 `src/test/java`。诸如\
    \ Maven 和 Gradle 等构建工具均遵循此约定。  \n6.  由于你创建的是 JavaFX 应用，你需要编辑 `build.gradle` 文件，添加一个插件，以便将\
    \ Java 项目构建为可启动的应用。你还需要添加一个条目，告知 Gradle 主应用应运行哪个类。使用你的文本编辑器，将以下条目添加到 `build.gradle`\
    \ 文件中：\n\n```\n    apply plugin: 'application'\n    mainClassName = \"org.acme.helloworld.HelloWorld\"\
    \n    ```\n\n7.  保存并退出文件后，你需要使用 `gradle assemble` 命令构建项目。这将创建一个可运行的 `jar` 可执行文件。输入以下命令来编译并构建一个可执行的\
    \ HelloWorld `jar` 文件。\n\n```\n    $ gradle assemble\n    ```\n\n执行 Gradle assemble\
    \ 任务后的输出如下：\n\n```\n    :compileJava\n    Download https://jcenter.bintray.com/org/slf4j/slf4j-api/1.7.12/slf4j-api-1.7.12.pom\n\
    \    Download https://jcenter.bintray.com/org/slf4j/slf4j-parent/1.7.12/slf4j-parent-1.7.12.pom\n\
    \    Download https://jcenter.bintray.com/org/slf4j/slf4j-api/1.7.12/slf4j-api-1.7.12.jar\n\
    \    :processResources UP-TO-DATE\n    :classes\n    :jar\n    :assemble\n   \
    \ BUILD SUCCESSFUL\n    Total time: 4.458 secs\n    ```\n\n8.  现在，使用以下命令（运行任务）来启动\
    \ HelloWorld 应用。\n\n```\n    $ gradle run\n    ```\n\n9.  当你添加了插件条目 `apply plugin:\
    \ 'application'` 后，Gradle 的 run 任务便被添加进来。Gradle 插件提供了便捷的方式来构建不同类型的 Java 项目和产物。你应该会看到\
    \ Java HelloWorld 应用启动，如图 1-30 所示。\n\n使用 Gradle 还可以做很多更强大的事情，但这超出了本书的范围；不过，我将列出一些你可能感兴趣使用的常用命令。\n\
    \n*   `gradle tasks`：列出所有可用的任务\n*   `gradle clean`：从 `build` 目录中移除目录和文件\n*   `gradle\
    \ eclipseProject`：为 Eclipse IDE 创建项目文件。当你将以下语句添加到 `build.gradle` 文件中时，此任务将可用：\n\
    \n```\n    apply plugin: 'eclipse'\n    ```\n\n*   `gradle intellijProject`：为\
    \ IntelliJ IDE 创建项目文件。当你将以下语句添加到 `build.gradle` 文件中时，此任务将可用：\n\n```\n    apply\
    \ plugin: 'idea'\n    ```\n\n*   `gradle -help`：显示可用的选项和命令说明\n"
- fmt: '# Walking Through the HelloWorld Source Code


    You’ll notice in the source code that JavaFX-based applications extend (inherit)
    from the `javafx.application.Application` class. The `Application` class provides
    application lifecycle functions such as initializing, launching, starting, and
    stopping during runtime. This provides a mechanism for Java applications to launch
    JavaFX GUI components separate from the main thread. The code in Listing [1-2](#A323804_3_En_1_Chapter.html#Par234)
    is a skeleton of the JavaFX HelloWorld application, having a `main()` method and
    an overridden `start()` method.


    ```

    public class HelloWorld extends Application {

    /**

    * @param args the command line arguments

    */

    public static void main(String[] args) {

    // On the main thread

    Application.launch(args);

    }

    @Override

    public void start(Stage stage) {

    // On the JavaFX application thread

    // JavaFX code goes here...

    }

    }

    Listing 1-2.

    A Skeleton Version of the HelloWorld.java File

    ```


    Here, in the `main()` method’s entry point, you launch the JavaFX application
    by simply passing in the command-line arguments to the `Application.launch()`
    method. To access any arguments passed into the `launch()` method, you can invoke
    the `getParameters()` method of the `Application` class. See the Javadoc documentation
    for details on various ways to access named and raw arguments. The following link
    is the Javadoc documentation for the `getParameters()` method:


    [`https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html#getParameters--`](https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html%23getParameters%2D%2D)


    After the `Application.launch()` method has executed, the application will enter
    a ready state, and the framework internals will invoke the `start()` method to
    begin. At this point, the program execution occurs on the JavaFX application thread
    and not on the main thread. When the `start()` method is invoked, a JavaFX `javafx.stage.Stage`
    object is available for the developer to use and manipulate. Following is the
    overridden Application `start()` method:


    ```

    @Override

    public void start(Stage stage) {...}

    ```


    When the program begins in the `start()` method, a separate thread of execution
    occurs, called the JavaFX application thread. Keep in mind that running on the
    JavaFX application thread is synonymous in concept with running on Java Swing’s
    event dispatch thread. Just be advised the difference between the Java main thread
    and the UI thread when it relates to UI applications. Later in this book, you
    will learn how to create background processes to avoid blocking the JavaFX application
    thread. When you know how to build applications to avoid blocking the GUI, the
    user will notice that your application is much more responsive (snappy) under
    heavy usage. Mastering responsiveness in GUI applications is an important concept
    in enhancing usability and the overall user experience. To see the Java Application
    API, visit the Javadoc here:


    [`https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html)


    [`https://docs.oracle.com/javase/9/`](https://docs.oracle.com/javase/9/)


    ## JavaFX Scene Graph


    You’ll notice that some classes and objects are oddly named, such as `Stage` and
    `Scene`. There isn’t a coincidence—the designers of the API have modeled things
    after the idea of a theater or a play in which actors perform in front of an audience.
    In this analogy, a play consists of one-to-many scenes in which actors perform.
    And, of course, all scenes are performed on a stage one at a time. In JavaFX,
    the `Stage` is equivalent to an application window similar to Java Swing API `JFrame`
    or `JDialog` on the desktop. Depending on the device, such as a Raspberry Pi (Raspbian),
    there may be only one stage. You can think of a `Scene` object as a content pane,
    similar to Java Swing’s `JPanel`, capable of holding zero-to-many `Node` objects
    (children).


    Proceeding with the example, in the `start()` method, you see that for a JavaFX
    desktop window (stage) you can set the title bar using the `setTitle()` method.
    Next, you create a root node (`Group`), which is added to the `Scene` object as
    the top-level surface for the application window. The following code snippet shows
    you how to set the title and create the scene:


    ```

    stage.setTitle("Hello World");

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250);

    ```


    ## JavaFX Node


    A JavaFX node is a fundamental base class for all scene graph nodes to be rendered.
    The following graphics capabilities can be applied to nodes: scaling, transforms,
    translations, and effects.


    Some of the most commonly used nodes are UI controls and `Shape` objects. Similar
    to a tree data structure, a scene graph will contain children nodes by using a
    container class such as the `Group` or `Pane` class. You’ll learn more about the
    `Group` class later when you look at the `ObservableList` class, but for now you
    can think of them as Java `List` or `Collection` classes that are capable of holding
    child node objects. In the following code, a button (`Button`) node is created
    to be positioned on the scene and set with an event handler (`EventHandler<ActionEvent>`),
    which responds when the user presses the button. The handler code will output
    the text `"Hello World"` on the console. For now the code shown here uses an anonymous
    inner class; however you will learn later in Chapter [3](#A323804_3_En_3_Chapter.html)
    to use lambda expressions introduced in Java 8.


    ```

    Button btn = new Button();

    btn.setLayoutX(100);

    btn.setLayoutY(80);

    btn.setText("Hello World");

    btn.setOnAction(new EventHandler() {

    public void handle(ActionEvent event) {

    System.out.println("Hello World");

    }

    });

    root.getChildren().add(btn);

    ```


    Once the child nodes have been added to the root `Group` via the `getChildren().add()`
    method, you set the `stage`’s scene and call the `show()` method on the `Stage`
    object to display a JavaFX application window. By default, the window will allow
    users to minimize, maximize, and close (exit) the application. The following code
    sets the scene and displays the JavaFX application window (the `Stage`):


    ```

    stage.setScene(scene);

    stage.show();

    ```'
