- fmt: '### Using a `TextField` Control


    Listing [6-8](#A323804_3_En_6_Chapter.html#Par58) creates a `TextField` node with
    a preferred width of 200 pixels and a prompt text property as `Search Icon Name`.
    When the text field is blank, the prompt text appears in the input text field.


    ```

    // Input Field (TextField)

    TextField inputField = new TextField();

    inputField.setPrefWidth(200);

    inputField.setPromptText("Search Icon Name");

    .

    .

    .

    // As the user types the text is searched.

    inputField.textProperty().addListener((o, oldVal, newVal) ->

    showIconList(newVal,

    labelDisplayPanel,

    iconPacks.getValue(),

    position.getSelectedToggle()

    .getUserData()));

    Listing 6-8.

    Creating an Auto Search Text Field for Searching Icon Names Within a Font Pack

    ```


    In Listing [6-8](#A323804_3_En_6_Chapter.html#Par58), the `textProperty()` of
    the `inputField` will contain a `ChangeListener` lambda to invoke the private
    method called `showIconList()` whenever the text changes. The text property changes
    when the user types text into the text field. The method parameters for the `showIconList()`
    methods are `textInput`, `labelDisplayPanel`, `iconPack`, and `position`. The
    following is the `showIconList()` method’s signature.


    ```

    private void showIconList(String textInput,

    VBox labelDisplayPanel,

    String iconPack,

    Object position)

    ```


    The `showIconList()` method’s first parameter is `textInput`, which is what is
    entered into the `TextField` control. The `labelDisplayPanel` parameter is a `VBox`
    container to hold rows of `Label` objects. The next parameter is the `iconPack`
    parameter of type `String` of the icon pack’s name, which is also the key into
    the `ICON_PACKS_MAP` map object. Lastly, the parameter `position` of type `Object`
    will be casted into a `ContentDisplay enum` constant to position the icon in relation
    to the label text.


    Continuing with the `start()` method, the code creates radio buttons that allow
    the users to select where to position the icon relative to the text inside the
    label. Reshown in Listing [6-9](#A323804_3_En_6_Chapter.html#Par63) is the creation
    of the radio buttons for positioning icons. A `ChangeListener` is attached to
    the `ToggleGroup` variable `position`. Again, the `ChangeListener` lambda code
    will invoke the `showIconList()` method given the position.


    ```

    ToggleGroup position = new ToggleGroup();

    .

    .

    // When the radio button select Position to place the Icon

    position.selectedToggleProperty().addListener((o, oldVal, newVal) ->

    showIconList(inputField.getText(),

    labelDisplayPanel,

    iconPacks.getValue(),

    position.getSelectedToggle()

    .getUserData())

    );

    Listing 6-9.

    Radio Buttons to Choose the Positioning of the Font Icon When Displaying Labels

    ```


    You’ll notice a common theme with all the event handlers and listeners that ultimately
    make calls to the private method `showIconList()`. This method simply updates
    the row of labels on the right side of the display.


    ### The Private `showIconDisplay()` Method


    Listing [6-10](#A323804_3_En_6_Chapter.html#Par66) is a reshowing of the method
    `showIconDisplay()` from the full listing from Listing [6-6](#A323804_3_En_6_Chapter.html#Par37).
    This method is responsible for refreshing the list of labels displayed on the
    right side of the screen.


    ```

    // Clear the right display

    labelDisplayPanel.getChildren().clear();

    // Obtain the icon pack''s list of names.

    List iconPackIcons = ICON_PACKS_MAP.get(iconPack);

    iconPackIcons.stream()

    .filter(iconEnum -> iconEnum.toString().toUpperCase()

    .indexOf(textInput.toUpperCase()) > -1)

    .forEach(iconEnum -> {

    // create a text node using the vector font.

    Text iconShape = new Text(iconEnum.characterToString());

    iconShape.getStyleClass().add("glyph-icon");

    iconShape.setStyle(

    String.format("-fx-font-family: %s; -fx-font-size: %s;",

    iconEnum.getFontFamily(), 20));

    Label label = new Label(iconEnum.toString(), iconShape);

    label.setContentDisplay((ContentDisplay) position);

    labelDisplayPanel.getChildren().add(label);

    });

    Listing 6-10.

    The showIconDisplay() Method Iterates Over the List of Icons to Be Positioned
    and Displayed

    ```


    The code begins by clearing the label display area (`VBox`) container. The code
    then obtains the list of `GlyphIcons` based on the selected icon pack. Next, the
    code will filter the `iconPackIcons` list by finding any parts of the search text
    string contained within any of the icon names. Once filtered, the list of icons
    will be applied to labels displayed in the `VBox` container as rows.


    Labels and custom fonts are fun, but because of their read-only nature, let’s
    look at buttons.


    ## Buttons


    If the JavaFX label is the most basic UI control, the next most basic UI control
    is the button control. Buttons respond to a mouse press or pressing the spacebar
    when a button has focus. In JavaFX there are other controls that act like buttons.
    In fact, all concrete button-like controls extend from the parent `javafx.scene.control.ButtonBase`
    class. The following is a list of JavaFX button controls:


    *   `Button`

    *   `CheckBox`

    *   `Hyperlink`

    *   `Radio button`

    *   `Toggle button`

    *   `Menu`/`MenuItem`


    ### `Button`


    The standard button control can contain text or a graphic (node) similar to the
    label control explained earlier. Buttons can take on default behaviors such as
    when a user presses the Enter or Escape key. In scenarios when creating form applications,
    an OK button can be the default button and can enable users to press the Enter
    key or click a Cancel button to accept the Escape key. Dialog windows often follow
    this pattern. The following code snippet creates three buttons—OK, Cancel, and
    Easy. The OK and Cancel buttons will be configured to accept the Enter and Escape
    key presses, respectively. The Easy button is set up to invoke the method called
    `doSomethingCool()` when pressed.


    ```

    Button okButton = new Button("OK");

    okButton.setDefaultButton(true);

    Button cancelButton = new Button("Cancel");

    cancelButton.setCancelButton(true);

    Button easyButton = new Button("Easy");

    easyButton.setOnAction( actionEvent -> doSomethingCool() );

    ```'
