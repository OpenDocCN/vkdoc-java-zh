    [`https://netopyr.com`](https://netopyr.com) Twitter: `@net0pyr`

    *   NetBeansIDE-AfterburnerFX-Plugin by Peter Rogge: The NetBeansIDE-AfterburnerFX-Plugin
    is a NetBeans IDE plugin that supports the file generation in convention with
    the library `afterburner.fx` in a JavaFX project: [`https://github.com/Naoghuman/NetBeansIDE-AfterburnerFX-Plugin`](https://github.com/Naoghuman/NetBeansIDE-AfterburnerFX-Plugin)
    Twitter: `@naoghuman`

    *   FXForm2 : A library providing automatic JavaFX 2.0 form generation: [`http://dooapp.github.io/FXForm2`](http://dooapp.github.io/FXForm2)

    *   Integrating Spring Boot with JavaFX by MVP Java: [`https://youtu.be/hjeSOxi3uPg`](https://youtu.be/hjeSOxi3uPg)

    *   JavaFX Multiple Controllers by MVP Java: [`https://www.youtube.com/watch?v=osIRfgHTfyg`](https://www.youtube.com/watch%3Fv=osIRfgHTfyg)


    ## Domain-Specific Languages


    A domain-specific language for graphics can help eliminate a lot of boilerplate
    code, while keeping code easier to read and manage. The following are DSLs for
    JavaFX in various computer languages that run on top of the Java runtime environment.


    *   TornadoFX: A Kotlin-based domain-specific language to create JavaFX applications:
    [`https://github.com/edvin/tornadofx`](https://github.com/edvin/tornadofx)

    *   GroovyFX: A Groovy-based domain-specific language to create JavaFX applications:
    [`http://groovyfx.org`](http://groovyfx.org)

    *   ScalaFX: A Scala-based domain-specific language to create JavaFX applications:
    [`https://code.google.com/p/scalafx`](https://code.google.com/p/scalafx)

    *   RubyFX: A Ruby-based domain-specific language to create JavaFX applications:
    [`https://github.com/jruby/jrubyfx`](https://github.com/jruby/jrubyfx)

    *   Visage: A JavaFX-based domain-specific language to create JavaFX applications:
    [`https://code.google.com/p/visage`](https://code.google.com/p/visage)


    ## Custom UIs


    You can customize a user interface such as styling using CSS or using custom controls.
    The following links are reference guides and blogs.'
  trans: '

    ## JavaFX 工具


    您可以通过以下链接找到从构建图形用户界面到调试应用程序的有用工具：


    *   Scene Builder：一种使用 FMXL 标记语言构建基于 JavaFX 的用户界面的工具：[`http://www.oracle.com/technetwork/java/javafx/tools/index.html`](http://www.oracle.com/technetwork/java/javafx/tools/index.html)

    *   Scenic View 工具：一种在运行时可视化调试 JavaFX 用户界面的工具：[`http://fxexperience.com/scenic-view`](http://fxexperience.com/scenic-view)

    *   Caspian Styler、动画样条线编辑器和派生颜色计算器：[`http://fxexperience.com/2012/03/announcing-fx-experience-tools`](http://fxexperience.com/2012/03/announcing-fx-experience-tools)

    *   用于 Eclipse 和 OSGi 的 JavaFX 工具和运行时（创始人 Tom Schindl）：[`http://www.eclipse.org/efxclipse/index.html`](http://www.eclipse.org/efxclipse/index.html)
    [`http://tomsondev.bestsolution.at`](http://tomsondev.bestsolution.at)

    *   Firebug Lite：一种基于浏览器的 JavaFX WebView 节点调试工具：[`http://stackoverflow.com/questions/17387981/javafx-webview-webengine-firebuglite-or-some-other-debugger`](http://stackoverflow.com/questions/17387981/javafx-webview-webengine-firebuglite-or-some-other-debugger)

    *   JavaFX 3D 查看器和导入器：[`http://www.interactivemesh.org/models/jfx3dimporter.html`](http://www.interactivemesh.org/models/jfx3dimporter.html)

    *   IDR Solutions 展示用于 JavaFX 的 PDF 查看器：[`http://blog.idrsolutions.com/2014/03/sneak-preview-new-javafx-pdf-viewer`](http://blog.idrsolutions.com/2014/03/sneak-preview-new-javafx-pdf-viewer)

    *   TestFX：用于测试 JavaFX 的易用库：[`https://github.com/TestFX/TestFX`](https://github.com/TestFX/TestFX)

    *   介绍 MarvinFx，作者 Hendrik Ebbers：轻松测试 JavaFX 控件和场景，特别关注属性：[`http://www.guigarage.com/2013/03/introducing-marvinfx`](http://www.guigarage.com/2013/03/introducing-marvinfx)

    *   JemmyFX：提供用于在应用程序中测试 JavaFX 用户界面的 API：[`https://jemmy.java.net/JemmyFXGuide/jemmy-guide.html`](https://jemmy.java.net/JemmyFXGuide/jemmy-guide.html)

    *   ReactiveX/RxJavaFX，作者 Thomas Nield：RxJava 的 JavaFX 绑定。RxJavaFX 是一个轻量级库，用于将
    JavaFX 事件转换为 RxJava Observables/Flowables，反之亦然。它还提供了一个调度器，可以安全地将发射移动到 JavaFX 事件调度线程：[`https://github.com/ReactiveX/RxJavaFX`](https://github.com/ReactiveX/RxJavaFX)
    Twitter：`@thomasnield9727`


    ## 企业级 GUI 框架


    GUI 框架使开发人员能够快速开发企业级应用程序。从绑定到 MVC 框架模式，以下内容将帮助您在开发 JavaFX 应用程序时提高效率。


    *   Gluon Mobile：Gluon 提供了一种端到端的企业移动解决方案，用于开发跨平台移动应用程序，这些应用程序可以轻松连接到企业后端和云服务，同时实现集中管理：[`http://gluonhq.com`](http://gluonhq.com)

    *   Griffon（项目负责人 Andres Almiray，`@aalmiray`）：Griffon 是一个用于在 JVM 上开发桌面应用程序的应用程序框架：[`http://griffon-framework.org`](http://griffon-framework.org)

    *   jpro：一种无需 Java 插件即可将 Java 带回浏览器的新技术。为此，jpro 在服务器上运行 JavaFX，并将其场景图直接映射到浏览器中。客户端渲染通过浏览器端近似进行了高度优化，以获得流畅、无延迟的用户体验：[`https://www.jpro.io`](https://www.jpro.io)
    Twitter：[`https://twitter.com/jpro_io`](https://twitter.com/jpro_io) 联合创始人 Tobias
    Bley，`@tobibley`

    *   DukeScript：一种用于创建跨平台移动、桌面和 Web 应用程序的新技术。DukeScript 应用程序是普通的 Java 应用程序，内部使用
    HTML5 技术和 JavaScript 进行渲染。这样，开发人员只需编写干净的 Java 代码，同时仍能利用现代 UI 技术的最新发展：[`https://dukescript.com`](https://dukescript.com)
    Twitter：`@DukeScript`

    *   TornadoFX，作者 Edvin Syse：用于 Kotlin 语言的轻量级 JavaFX 框架：GitHub：[`https://github.com/edvin/tornadofx`](https://github.com/edvin/tornadofx)
    Twitter：`@edvinsyse`

    *   Open Dolphin：一个 JavaFX MVC 框架（由 Canoo Engineering 的 Dierk Koenig（`@mittie`）创立）：[`http://open-dolphin.org/dolphin_website/Home.html`](http://open-dolphin.org/dolphin_website/Home.html)

    *   基于约定优于配置和依赖注入的 JavaFX MVP 框架。由 Adam Bien（`@AdamBien`）创立：[`http://afterburner.adam-bien.com`](http://afterburner.adam-bien.com)

    *   ReduxFX 0.2，作者 Michael Heinrichs：[`https://netopyr.com/2017/02/27/new-features-reduxfx-0-2/`](https://netopyr.com/2017/02/27/new-features-reduxfx-0-2/)
    [`https://netopyr.com`](https://netopyr.com) Twitter：`@net0pyr`

    *   NetBeansIDE-AfterburnerFX-Plugin，作者 Peter Rogge：NetBeansIDE-AfterburnerFX-Plugin
    是一个 NetBeans IDE 插件，支持在 JavaFX 项目中按照库 `afterburner.fx` 的约定生成文件：[`https://github.com/Naoghuman/NetBeansIDE-AfterburnerFX-Plugin`](https://github.com/Naoghuman/NetBeansIDE-AfterburnerFX-Plugin)
    Twitter：`@naoghuman`

    *   FXForm2：一个提供自动 JavaFX 2.0 表单生成的库：[`http://dooapp.github.io/FXForm2`](http://dooapp.github.io/FXForm2)

    *   通过 MVP Java 将 Spring Boot 与 JavaFX 集成：[`https://youtu.be/hjeSOxi3uPg`](https://youtu.be/hjeSOxi3uPg)

    *   通过 MVP Java 实现 JavaFX 多控制器：[`https://www.youtube.com/watch?v=osIRfgHTfyg`](https://www.youtube.com/watch?v=osIRfgHTfyg)


    ## 领域特定语言


    用于图形的领域特定语言有助于消除大量样板代码，同时使代码更易于阅读和管理。以下是在 Java 运行时环境之上运行的各种计算机语言的 JavaFX 领域特定语言。


    *   TornadoFX：一种基于 Kotlin 的领域特定语言，用于创建 JavaFX 应用程序：[`https://github.com/edvin/tornadofx`](https://github.com/edvin/tornadofx)

    *   GroovyFX：一种基于 Groovy 的领域特定语言，用于创建 JavaFX 应用程序：[`http://groovyfx.org`](http://groovyfx.org)

    *   ScalaFX：一种基于 Scala 的领域特定语言，用于创建 JavaFX 应用程序：[`https://code.google.com/p/scalafx`](https://code.google.com/p/scalafx)

    *   RubyFX：一种基于 Ruby 的领域特定语言，用于创建 JavaFX 应用程序：[`https://github.com/jruby/jrubyfx`](https://github.com/jruby/jrubyfx)

    *   Visage：一种基于 JavaFX 的领域特定语言，用于创建 JavaFX 应用程序：[`https://code.google.com/p/visage`](https://code.google.com/p/visage)


    ## 自定义用户界面


    您可以自定义用户界面，例如使用 CSS 进行样式设置或使用自定义控件。以下链接是参考指南和博客。

