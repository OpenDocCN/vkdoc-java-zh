    The HBox’s Total Width in Pixels . All Border, Spacing, Padding, and Preferred
    Child Widths Are Added


    | Notes | Pixels |

    | --- | --- |

    | Left side HBox’s border stroke width | 1 |

    | Left side padding inset | 1 |

    | Left side of rectangle1’s margin width | 2 |

    | Width of rectangle 1 | 10 |

    | Right side of rectangle 1’s margin width | 2 |

    | Spacing between Rectangle 1 and 2 | 5 |

    | Width of rectangle 2 | 20 |

    | Spacing between Rectangle 2 and 3 | 5 |

    | Width of rectangle 3 | 5 |

    | Spacing between rectangle 3 and 4 | 5 |

    | Width of rectangle 4 | 20 |

    | Right side of HBox’s padding inset | 1 |

    | Right side of HBox’s border stroke width | 1 |

    | Total width in pixels : | 78 |


    The total height in pixels of the `HBox` instance consists of the following in
    Table [5-2](#A323804_3_En_5_Chapter.html#Tab2).


    Note


    When using a parent that is resizable , such as a `Border` pane with the `HBox`
    instance in the center, the `HBox` node’s width and height will stretch. In this
    scenario, with non-resizable children, the only parts that get stretched are the
    border and padding around the `HBox` , which is the inset of the `BorderPane`
    parent . The dashed border essentially looks like it is surrounding the border
    pane center region taking up the available width and height.


    ### VBox


    The [`VBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/VBox.html)
    layout is similar to an `HBox`, except that it places child nodes stacked in a
    vertical column. As children are added, each is placed beneath the previous child
    node. By default, the `VBox` honors the children’s preferred width and height.
    When the parent node is not resizable (for example, a `Group` node), the maximum
    column’s width is based on the child node with the greatest preferred width. The
    same goes for the `VBox`’s overall height, which is based on the border, padding,
    spacing, margins, and child node’s height all added up.


    Also, by default, each child node aligns to the top-left (`Pos.TOP_LEFT`) position.
    To change the default alignment, use the `setAlignment(Pos value)` method. Refer
    to the Javadoc documentation at [`https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html)
    to see all possible positions to align child nodes within a cell. `VBox` layouts
    can be configured to have resizing ranges to allow the parent node to manage and
    calculate space available upon layout requests. Remember, to resize the `VBox`
    and its children, the `VBox`’s parent must also be resizable such as the `BorderPane`
    instance’s center region.'
  trans: '

    #### 代码详解


    清单 5-1 首先使用单参数构造函数实例化了一个 `HBox`。该构造函数接受一个 `double` 类型的值，用于指定子节点之间的水平间距（以像素为单位）。这等同于在
    `HBox` 实例上调用 `setSpacing()` 方法。在创建了一个间距为五像素的 `HBox` 实例后，代码创建了一个蓝色虚线边框，其四个角的圆角半径为零，描边宽度为一像素。以下代码片段创建了一个包含单个
    `BorderStroke` 实例的数组，该实例将绘制在 `HBox` 布局面板节点周围。


    ```

    // 边框为蓝色、虚线、所有角半径均为 0%、宽度为 1 像素

    BorderStroke[] borderStrokes = new BorderStroke[] {

    new BorderStroke(Color.BLUE,

    BorderStrokeStyle.DASHED,

    new CornerRadii(0.0, true),

    new BorderWidths(1.0))

    };

    hbox.setBorder(new Border(borderStrokes));

    ```


    在创建边框时，您会记得在第三章 3 中，您使用了与创建描边相同的概念来创建形状。边框的描边可以使用多种样式和颜色创建。所有 JavaFX 布局面板都有一个
    `setBorder()` 方法，允许您创建边框。要创建边框，您必须创建一个包含至少一个 `BorderStroke` 对象的数组。此代码创建了一个 `BorderStroke`
    实例，其颜色为蓝色，`BorderStrokeStyle.DASHED` 值为虚线。其他描边样式包括 `DOTTED`（点线）、`SOLID`（实线）和 `NONE`（无）。接下来，使用构造函数
    `CornerRadii(percent, isPercentage)` 设置圆角半径参数。当使用 0.0 值时，角具有零半径，从而形成方角。通过改变半径，矩形可以具有圆角，看起来像药丸形状。最后，描边宽度参数接受一个
    `BorderWidths` 类（双精度）的实例。


    设置边框后，`HBox`（`hbox`）实例的 `setPadding()` 方法被调用，并传入一个 `Insets(1)` 参数，这将设置四个边，使边框和子节点之间使用一像素的间距。正如您之前在
    图 5-1 中看到的，边框和内边距间距显示了周围的边界。


    由于间距、内边距、外边距和边框像素宽度常常令人困惑，我在 图 5-1 中绘制了一个 `HBox` 示意图。该图显示了三个灰色矩形区域，每个宽度为五像素，代表子节点（`r1`
    到 `r4`）之间的间距。设置间距使用了一个 `Insets` 对象，它允许您在 `HBox` 的子节点之间创建空间。间距通过 `HBox` 的构造函数或
    `setSpacing()` 方法创建。图 5-1 中显示的间距是四个矩形之间的空间（图中显示为矩形形状之间的灰色部分）。为了不与内边距混淆，您会注意到 `HBox`
    内部位于边框和子节点之间的部分是内边距（以黄色着色），它占据了一像素的宽度，环绕着这一行。


    创建完所有四个矩形后，代码在矩形 `r1` 上设置了外边距。要设置外边距，您会注意到使用的是静态方法 `HBox.setMargin(Node, Insets)`，而不是
    `HBox` 实例上的方法。代码创建了一个 `Insets` 对象，其顶部、右侧、底部和左侧的外边距均为两像素。如 图 5-1 所示，这是矩形 `r1`（蓝色）周围的环绕空间。要计算
    `HBox` 的尺寸大小，您基本上需要将边框宽度、内边距、间距、外边距和子节点的边界（`ParentInBounds`）相加。当 `HBox` 的父节点是
    `Group` 节点（不可调整大小）且子节点也不可调整大小时，`HBox` 的尺寸总计为宽 78 像素，高 24 像素。表 5-1 和 5-2 显示了 `HBox`
    实例宽度和高度的明细。


    表 5-2.


    HBox 的总高度（像素）由边框、间距、内边距和首选子节点宽度相加得出


    | 说明 | 像素 |

    | --- | --- |

    | HBox 顶部边框描边宽度 | 1 |

    | HBox 顶部内边距（边框与矩形之间） | 1 |

    | 最大矩形（r2）的首选高度 | 20 |

    | HBox 底部内边距 | 1 |

    | 底部边框描边宽度 | 1 |

    | HBox 总高度（像素）： | 24 |


    表 5-1.


    HBox 的总宽度（像素）。所有边框、间距、内边距和首选子节点宽度均相加


    | 说明 | 像素 |

    | --- | --- |

    | HBox 左侧边框描边宽度 | 1 |

    | 左侧内边距 | 1 |

    | 矩形 1 左侧外边距宽度 | 2 |

    | 矩形 1 的宽度 | 10 |

    | 矩形 1 右侧外边距宽度 | 2 |

    | 矩形 1 与矩形 2 之间的间距 | 5 |

    | 矩形 2 的宽度 | 20 |

    | 矩形 2 与矩形 3 之间的间距 | 5 |

    | 矩形 3 的宽度 | 5 |

    | 矩形 3 与矩形 4 之间的间距 | 5 |

    | 矩形 4 的宽度 | 20 |

    | HBox 右侧内边距 | 1 |

    | HBox 右侧边框描边宽度 | 1 |

    | 总宽度（像素）： | 78 |


    `HBox` 实例的总高度（像素）由表 5-2 中的各项组成。


    注意


    当使用可调整大小的父节点时，例如将 `HBox` 实例放在 `BorderPane` 的中心，`HBox` 节点的宽度和高度将会拉伸。在这种情况下，对于不可调整大小的子节点，唯一被拉伸的部分是
    `HBox` 周围的边框和内边距，即 `BorderPane` 父节点的内边距区域。虚线边框看起来就像是环绕着边框面板的中心区域，占据了可用的宽度和高度。


    ### VBox


    [`VBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/VBox.html)
    布局与 `HBox` 类似，不同之处在于它将子节点垂直堆叠在一列中。随着子节点的添加，每个子节点都放置在前一个子节点的下方。默认情况下，`VBox` 尊重子节点的首选宽度和高度。当父节点不可调整大小时（例如，`Group`
    节点），列的最大宽度基于具有最大首选宽度的子节点。`VBox` 的整体高度也是如此，它基于边框、内边距、间距、外边距和子节点高度的总和。


    此外，默认情况下，每个子节点都对齐到左上角（`Pos.TOP_LEFT`）位置。要更改默认对齐方式，请使用 `setAlignment(Pos value)`
    方法。请参考 [`https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html)
    上的 Javadoc 文档，查看所有可能的子节点在单元格内的对齐位置。`VBox` 布局可以配置调整大小范围，以允许父节点在布局请求时管理和计算可用空间。请记住，要调整
    `VBox` 及其子节点的大小，`VBox` 的父节点也必须可调整大小，例如 `BorderPane` 实例的中心区域。

