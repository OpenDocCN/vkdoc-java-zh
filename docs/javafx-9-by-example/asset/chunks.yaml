  trans: '

    #### HttpRequest API


    构建好 HTTP 客户端后，你需要使用 `HttpRequest.newBuilder()` 方法创建一个 HTTP 请求，从而生成一个 `HttpRequest.Builder`
    实例。在此处，你可以指定属性来构建一个 Web 请求。还记得我之前提到旧版 `HttpURLConnection` API 的局限性吗？其中一个局限就是该
    API 难以使用。为了对比，我们来看看发起同步 HTTP `GET` Web 请求的旧方式与改进方式。清单 10-10 展示了发起 HTTP GET Web
    请求的旧方式。


    ```

    URL url = new URL(urlQueryString);

    HttpURLConnection connection = (HttpURLConnection) url.openConnection(); connection.setDoOutput(true);

    connection.setInstanceFollowRedirects(false);

    connection.setRequestMethod("GET");

    connection.setRequestProperty("Content-Type", "application/json"); connection.setRequestProperty("charset",
    "utf-8");

    connection.connect();

    InputStream inStream = connection.getInputStream();

    output(inStream);

    清单 10-10.

    发起 HTTP GET Web 请求的旧方式

    ```


    如你所见，清单 10-10 中的旧代码非常冗长。此外，HTTP 客户端和请求 API 似乎是结合在一起的。要查看使用新的 `http2` 模块改进后的代码，请参考清单
    10-11（`HttpRequest`）。


    ```

    HttpRequest request = HttpRequest.newBuilder(URI.create(queryStr))

    .GET()

    .build();

    HttpResponse response = HttpClient.newHttpClient().send(request,

    BodyHandler.asString());

    System.out.println(response.statusCode());

    System.out.println(response.body());

    清单 10-11.

    发起 HTTP GET Web 请求的改进方式

    ```


    清单 10-11 的输出应类似于以下内容：


    ```


    hello world

    ```


    你会在清单 10-11 中注意到，HTTP `GET` 是一个方法，而不是旧方法 `setRequestMethod("GET")` 中指定的字符串。新的
    `HttpRequest.Builder` API 还允许你通过 `method(String, BodyProcessor)` 方法来指定字符串形式的方法。`method()`
    方法通常用于不太常见的 HTTP 方法，例如 `OPTION` 或 `HEAD`。由于 HTTP 协议是标准协议，HTTP 请求构建器也支持其他常用方法，例如
    `PUT`、`POST` 和 `DELETE`。


    在清单 10-11 中，你会注意到 `send()` 方法被用作与清单 10-10 等效的阻塞行为。在第二种场景中，`send()` 方法同样会对远程 Web
    服务器进行阻塞调用。稍后，你将学习如何对远程 Web 服务器进行非阻塞调用。


    通过使用 `HttpRequest.Builder` 对象，有多种方法可以创建 `HttpRequest` 实例。首先，你必须调用 `HttpRequest.newBuilder()`
    方法。你可以在 `HttpRequest.Builder` 对象上指定的所有可用属性方法都列在表 10-3 中。请记住，当你在 `HttpRequest.Builder`
    实例上完成属性方法的指定后，需要调用 `build()` 方法来返回一个 `HttpRequest` 对象。


    表 10-3.


    使用 HttpRequest.Builder 类时的 HttpRequest.Builder 请求属性方法


    | 请求属性 | 描述 |

    | --- | --- |

    | `body(HttpRequest.BodyProcessor reqproc)` | 为此构建器设置请求体。 |

    | `copy()` | 基于当前状态返回此构建器的精确副本。 |

    | `expectContinue(boolean enable)` | 在发送请求体之前，请求服务器确认请求。 |

    | `followRedirects(HttpClient.Redirect policy)` | 指定此请求是否会自动遵循服务器发出的重定向。 |

    | `GET()` | 从此构建器构建并返回一个 `GET HttpRequest`。 |

    | `header(String name, String value)` | 将给定的名称/值对添加到此请求的标头集合中。 |

    | `headers(String... headers)` | 将给定的名称/值对添加到此请求的标头集合中。 |

    | `method(String method)` | 使用给定的方法 `String` 从此构建器构建并返回一个 `HttpRequest`。 |

    | `POST()` | 从此构建器构建并返回一个 `POST HttpRequest`。 |

    | `proxy(ProxySelector proxy)` | 为此请求覆盖请求客户端上设置的 `ProxySelector`。 |

    | `PUT()` | 从此构建器构建并返回一个 `PUT HttpRequest`。 |

    | `setHeader(String name, String value)` | 将给定的名称/值对设置为此请求的标头集合。 |

    | `timeout(TimeUnit unit, long timeval)` | 为此请求设置超时时间。 |

    | `uri(URI uri)` | 设置此 `HttpRequest` 的请求 URI。 |

    | `version(HttpClient.Version version)` | 为此请求覆盖 `HttpClient.version()` 设置。 |


    现在你已经了解了如何使用 `send()` 轻松发起同步（阻塞）Web 请求，接下来让我们看看如何异步（非阻塞）发起 RESTful 请求。接下来你将看到更多关于如何使用
    Java 9 的实验性模块 `jdk.incubator.httpclient` 发起 RESTful 请求的示例。


    ### 发起 RESTful 请求


    在企业级 Web 开发领域，你不可避免地会遇到 RESTful Web 服务的概念。基于表述性状态转移（REST）的概念，RESTful Web 服务是轻量级的
    HTTP 请求，通常涉及 XML 或 JSON 格式的数据。要发起 RESTful 调用，Web 请求将包含一个请求方法，用于告知 Web 服务器 HTTP
    数据流事务的类型。


    与数据库事务类似，RESTful 约定遵循 CRUD（创建、读取、更新和删除）的概念，其中创建阶段对应 `POST` 请求，读取对应 `GET`，更新对应
    `PUT`，删除对应 `DELETE`。虽然 `GET` 和 `DELETE` 操作仅需一个查询字符串即可发起请求，但 `POST` 和 `PUT` 通常需要在请求中包含较大的数据负载。

