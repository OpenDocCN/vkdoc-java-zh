    default of 0.75 inch margin on all sides. This default is considered to be a common
    margin by all known printers. However, this may be adjusted if the paper is too
    small, to ensure that the margins are not more than 50% of the smaller dimension.
    Applications that do expect to deal with such small media should specify the required
    margins explicitly. In the unlikely event that the hardware margin is larger than
    0.75", it will be adjusted to that same hardware minimum on all sides .


    The output of Listing [8-5](#A323804_3_En_8_Chapter.html#Par45) is shown here.
    Since this is my printer at home, I noticed some print attributes did not get
    modified appropriately such as the sides, print color, and print quality. My printer
    should have been set with double sided, monochrome, and low quality. You are probably
    wondering what is going on.


    ```

    >>> JobSettings:

    Collation = UNCOLLATED

    Copies = 1

    Sides = ONE_SIDED

    JobName = JavaFX Print Job

    Page ranges = null

    Print color = COLOR

    Print quality = NORMAL

    Print resolution = Feed res=300dpi. Cross Feed res=300dpi.

    Paper source = Paper source : Automatic

    Page layout = Paper=Paper: Letter size=8.5x11.0 INCH Orient=LANDSCAPE leftMargin=54.0
    rightMargin=54.0 topMargin=54.0 bottomMargin=54.0

    ```


    Not to be alarmed, but in Listing [8-5](#A323804_3_En_8_Chapter.html#Par45) while
    making job settings changes, I noticed some of the settings didn’t get modified.
    Basically this is due to the underlying printer’s lack of supported attributes
    that get mapped to JavaFX printer `enum`s and print attribute classes. By printing
    the job settings object, you can compare your attributes against the supported
    attributes. I provided code in Listing [8-6](#A323804_3_En_8_Chapter.html#Par56)
    to check for supported attributes based on the earlier print scenario. If the
    print attributes you are looking for are not supported, the code in Listing [8-6](#A323804_3_En_8_Chapter.html#Par56)
    will launch the printer dialog. This will allow the native print dialog window
    to let the user modify attributes before printing .


    ```

    Printer printer = job.getPrinter();

    PrinterAttributes attr = printer.getPrinterAttributes();

    boolean supported = attr.getSupportedPrintColors()

    .contains(PrintColor.MONOCHROME) &&

    attr.getSupportedPrintSides()

    .contains(PrintSides.DUPLEX) &&

    attr.getSupportedPrintQuality()

    .contains(PrintQuality.LOW) &&

    attr.getSupportedPapers()

    .contains(Paper.NA_LETTER) &&

    attr.getSupportedPageOrientations()

    .contains(PageOrientation.LANDSCAPE);

    if (!supported) {

    job.showPrintDialog(primaryStage);

    }

    // Rest of the print code.

    Listing 8-6.

    Determining if a Printer’s Print Attributes Are Supported Before Sending Job for
    Printing

    ```


    Now that you know how to configure job settings and create documents to be sent
    to the printer, let’s look at how to print HTML5-based content.


    ## Printing a Web Page


    As mentioned earlier, it’s not exactly easy to print content spanning multiple
    pages. However, the JavaFX APIs do provide a convenient method called `print()`
    on the `WebEngine` object. It allows you to print HTML5 content. The `WebEngine`
    object is a non-visual JavaFX object capable of loading HTML documents from remote
    web servers. Listing [8-7](#A323804_3_En_8_Chapter.html#Par59) shows a minimum
    amount of code that will load and print a web page to the default printer. If
    the document spans multiple pages, the printer will continue to print all of the
    remaining pages.


    ```

    WebEngine webEngine = new WebEngine();

    webEngine.getLoadWorker()

    .stateProperty()

    .addListener( (ov, oldState, newState) -> {

    if (newState == State.SUCCEEDED) {

    PrinterJob job = PrinterJob.createPrinterJob();

    if (job != null) {

    webEngine.print(job);

    job.endJob();

    }

    }

    });

    webEngine.load("https://en.wikipedia.org/wiki/Tachyon");

    Listing 8-7.

    Printing Web Content Using JavaFX’s WebEngine Object

    ```


    This code will provide a callback to listen to state changes of the load process
    of the web engine. Upon success (`State.SUCCEEDED`), a print job is created and
    is passed into the `WebEngine` object’s `print()` method.


    Hopefully, you can see how amazingly simple it is to send HTML content to the
    printer. Now let’s look at an example application.'
  trans: '

    ### 配置打印任务


    现在你已经知道如何查询打印机的属性，接下来你可能希望以不同于默认设置的方式配置打印机。假设有一个假想的用例：你正试图节省彩色墨水和纸张。换句话说，你希望使用更少的黑色墨水、双面打印，并采用横向页面方向进行打印。


    基于 JavaFX 打印 API，一个打印任务将按如下方式配置：


    *   使用单色（`PrintColor.MONOCHROME`）

    *   双面打印（`PrintSides.DUPLEX`）

    *   使用较低的打印质量（`PrintQuality.LOW`）

    *   采用横向页面方向打印（`PageOrientation.LANDSCAPE`）


    为了实现这个用例场景，你首先需要从 `PrinterJob` 类中调用 `createPrinterJob()` 方法。该方法返回一个 `PrinterJob`
    对象，使你能够通过 `getJobSettings()` 方法获取并更改打印任务设置。清单 8-5 展示了创建 `PrinterJob` 对象，然后获取 `JobSettings`
    对象以设置各种属性的代码。要查看清单 8-5 的完整源代码，请参考本书的源代码以及名为 `SaveInkAndTrees.java` 的 Java 文件。


    ```

    PrinterJob job = PrinterJob.createPrinterJob();

    JobSettings jobSettings = job.getJobSettings();

    jobSettings.setPrintColor(PrintColor.MONOCHROME);

    jobSettings.setPrintSides(PrintSides.DUPLEX);

    jobSettings.setPrintQuality(PrintQuality.LOW);

    PageLayout pageLayout = printer.createPageLayout(Paper.NA_LETTER, PageOrientation.LANDSCAPE,
    Printer.MarginType.DEFAULT);

    jobSettings.setPageLayout(pageLayout);

    System.out.println(">>> jobSettings :\n" + jobSettings);

    清单 8-5.

    配置打印任务的颜色、双面、质量和页面布局

    ```


    警告


    由于底层打印机可能不支持映射到 JavaFX 相关打印 `enum` 值（例如 `PrinterColor.MONOCHROME`）的属性，`JobSettings`
    对象可能无法按你预期的方式被修改。在以编程方式修改 `JobSettings` 之前，你应该先查询打印机支持的属性。


    在清单 8-5 中，获取任务设置对象后，代码开始调用 `color`、`sides` 和 `quality` 方法的设置器。任务设置属性只有在受支持的属性列表中时才能被修改。有关
    `PrinterColor`、`PrintSides` 和 `PrintQuality` 类所有可用的枚举值，请参考 Javadoc 文档。此外，在设置属性之前查询受支持的属性非常重要，因为如果你尝试设置一个不受支持的属性，系统将采用该属性的默认值。


    接下来，代码通过 `createPageLayout()` 方法创建页面布局。该方法接收以下参数：


    *   `Paper.NA_LETTER`

    *   `PageOrientation.LANDSCAPE`

    *   `Printer.MarginType.DEFAULT`


    根据 Javadoc 文档，`Printer.MarginType.DEFAULT` 是所有边距均为 0.75 英寸的默认值。这个默认值被认为是所有已知打印机的通用边距。但是，如果纸张太小，可能会调整此值，以确保边距不超过较小尺寸的
    50%。期望处理此类小尺寸介质的应用程序应明确指定所需的边距。在极少数情况下，如果硬件边距大于 0.75 英寸，则所有边距都将调整为该硬件最小值。


    清单 8-5 的输出如下所示。由于这是我家里的打印机，我注意到一些打印属性没有正确修改，例如双面、打印颜色和打印质量。我的打印机本应设置为双面、单色和低质量。你可能想知道发生了什么。


    ```

    >>> JobSettings:

    Collation = UNCOLLATED

    Copies = 1

    Sides = ONE_SIDED

    JobName = JavaFX Print Job

    Page ranges = null

    Print color = COLOR

    Print quality = NORMAL

    Print resolution = Feed res=300dpi. Cross Feed res=300dpi.

    Paper source = Paper source : Automatic

    Page layout = Paper=Paper: Letter size=8.5x11.0 INCH Orient=LANDSCAPE leftMargin=54.0
    rightMargin=54.0 topMargin=54.0 bottomMargin=54.0

    ```


    不必惊慌，但在清单 8-5 中进行任务设置更改时，我注意到一些设置并未被修改。这基本上是由于底层打印机缺乏映射到 JavaFX 打印机 `enum` 和打印属性类的受支持属性。通过打印任务设置对象，你可以将自己的属性与受支持的属性进行比较。我在清单
    8-6 中提供了代码，用于根据先前的打印场景检查受支持的属性。如果你要查找的打印属性不受支持，清单 8-6 中的代码将启动打印机对话框。这将允许原生打印对话框窗口让用户在打印前修改属性。


    ```

    Printer printer = job.getPrinter();

    PrinterAttributes attr = printer.getPrinterAttributes();

    boolean supported = attr.getSupportedPrintColors()

    .contains(PrintColor.MONOCHROME) &&

    attr.getSupportedPrintSides()

    .contains(PrintSides.DUPLEX) &&

    attr.getSupportedPrintQuality()

    .contains(PrintQuality.LOW) &&

    attr.getSupportedPapers()

    .contains(Paper.NA_LETTER) &&

    attr.getSupportedPageOrientations()

    .contains(PageOrientation.LANDSCAPE);

    if (!supported) {

    job.showPrintDialog(primaryStage);

    }

    // Rest of the print code.

    清单 8-6.

    在将任务发送打印前确定打印机的打印属性是否受支持

    ```


    现在你已经知道如何配置任务设置并创建要发送到打印机的文档，让我们看看如何打印基于 HTML5 的内容。


    ## 打印网页


    如前所述，打印跨越多页的内容并不容易。然而，JavaFX API 确实在 `WebEngine` 对象上提供了一个便捷的方法，称为 `print()`。它允许你打印
    HTML5 内容。`WebEngine` 对象是一个非可视化的 JavaFX 对象，能够从远程 Web 服务器加载 HTML 文档。清单 8-7 展示了最少的代码量，即可将网页加载并打印到默认打印机。如果文档跨越多页，打印机将继续打印所有剩余页面。


    ```

    WebEngine webEngine = new WebEngine();

    webEngine.getLoadWorker()

    .stateProperty()

    .addListener( (ov, oldState, newState) -> {

    if (newState == State.SUCCEEDED) {

    PrinterJob job = PrinterJob.createPrinterJob();

    if (job != null) {

    webEngine.print(job);

    job.endJob();

    }

    }

    });

    webEngine.load("https://en.wikipedia.org/wiki/Tachyon");

    清单 8-7.

    使用 JavaFX 的 WebEngine 对象打印 Web 内容

    ```


    这段代码将提供一个回调函数来监听 Web 引擎加载过程的状态变化。加载成功后（`State.SUCCEEDED`），会创建一个打印任务并将其传递给 `WebEngine`
    对象的 `print()` 方法。


    希望你能看到将 HTML 内容发送到打印机是多么简单。现在让我们看一个示例应用程序。

    '
- fmt: '# Example WebDocPrinter Application


    Have you ever needed to quickly print an airline ticket or an invoice after an
    online purchase? Well, here is an example application that I’ve created resembling
    a browser by allowing users to load and display a web site based on a valid URL.
    This browser-like application is called `WebDocPrinter`, as shown in Figure [8-3](#A323804_3_En_8_Chapter.html#Fig3).
    It supports two print modes: Node Only and Whole Web Document. By default, the
    Node Only is set to allow the user to print the `WebView` node only. Node Only
    will only print content within the red bounding box. The Whole Web Document print
    mode will print the entire HTML document, even if it spans multiple pages. The
    Whole Web Document print mode scales the content to fit the printable area.


    ![A323804_3_En_8_Fig3_HTML.jpg](A323804_3_En_8_Fig3_HTML.jpg)


    Figure 8-3. The `WebDocPrinter` application supports two print modes: Node Only
    and Whole Web Document


    The application has the following UI elements:


    * `Menus`: Two print modes called Node Only and Whole Web Document

    * `TextField`: An address bar to enter a valid URL

    * `Button`: A print button

    * `Slider`: A slider control that adjusts the zoom level when displaying the `WebView`
    node

    * `Label`: Display label to display the zoom level as a percentage

    * `WebView`: The displaying of the HTML document

    * `Path`: A rectangle path with a red stroke outlining the printable region


    The `WebDocPrinter` application supports two print modes: Node Only and Whole
    Web Document. The `WebDocPrinter` application demonstrates the printing of a single
    node or the printing of an entire web page having multiple pages. Using the Whole
    Web Document print automatically scales the content to fit the printable area.


    After entering the URL on the address line (`TextField`), the user will press
    the Enter key, thereby triggering the application to fetch the web page to be
    displayed onto the `WebView` node. By default, the menu bar’s print mode, as shown
    in Figure [8-4](#A323804_3_En_8_Chapter.html#Fig4), is set to Node Only print
    mode, which means the application will only print the `WebView` node on one page.


    ![A323804_3_En_8_Fig4_HTML.jpg](A323804_3_En_8_Fig4_HTML.jpg)


    Figure 8-4. The two print modes are Node Only and Whole Web Document


    When printing a JavaFX `WebView` node, the printer will only print to one page
    by default. By using the Node Only mode, a red box outline will appear over the
    display area to denote the printer’s printable layout region onto the physical
    paper, as shown in Figure [8-3](#A323804_3_En_8_Chapter.html#Fig3). Using the
    Node Only print mode, anything outside the red bounding box will not be printed,
    as discussed earlier.


    The second print mode is Whole Web Document, which will print the entire HTML
    web page using the convenient method `print()` from the `WebEngine` object. Again,
    if the document spans multiple pages, they’ll be sent to the printer.


    Finally, the last feature of the `WebDocPrinter` application is a slider control
    that allows users to scale or zoom in/out to resize the web page’s content, as
    shown in Figure [8-5](#A323804_3_En_8_Chapter.html#Fig5).


    ![A323804_3_En_8_Fig5_HTML.jpg](A323804_3_En_8_Fig5_HTML.jpg)


    Figure 8-5. The URL address line allows the user to fetch a web page. The print
    button sends the displayed page to the printer. The slider control zooms in or
    out to scale the web page to fit into the print width.


    The zoom feature used during the Node Only print mode will assist the user to
    make the content fit within the printable region (red bounding box) before being
    sent to the printer, as shown in Figure [8-3](#A323804_3_En_8_Chapter.html#Fig3).
    The zoom’s minimum value is 5% and the maximum is 300%. Again, I want to point
    out that any content displayed outside of the red bounding box region will not
    get printed when using the Node Only print mode.


    ## Source Code


    Now that you know what `WebDocPrinter` application is capable of, let’s see the
    source code. Because the actual print code is quite small, I kept all the code
    in one file, called `WebDocPrinter.java`, as shown in Listing [8-8](#A323804_3_En_8_Chapter.html#Par78).'
