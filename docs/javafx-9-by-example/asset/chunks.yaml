- fmt: '## Scene Builder


    Up to this point, you’ve learned how to code and style UI elements programmatically.
    You are probably wondering if there is a better way to build UIs. Well, I am happy
    to inform you that the JavaFX team at Oracle built a free tool called Scene Builder,
    which allows you to build UIs graphically, often called WYSIWYG editors. (WYSIWYG
    stands for What You See Is What You Get.) After some time, Oracle announced that
    they would no longer provide downloadable binaries of the Scene Builder tool.


    Since the Scene Builder tool has been open sourced, the task of building and hosting
    downloadable binaries has since been immediately picked up by the company GluonHQ
    (see [`http://gluonhq.com/`](http://gluonhq.com/)). In this and many other bold
    moves, GluonHQ forged ahead with other products and services that would empower
    Java developers. GluonHQ’s main offering is to provide a UI and cloud development
    platform for companies to develop apps with a single codebase (Java) and the capability
    to deploy onto many platforms such as mobile, desktop, and embedded devices. Typical
    platforms are iOS, Android, Windows, MacOS X, and Raspbian (Raspberry Pi).


    In this section, you will learn how to build a simple UI and use the serialized
    UI formatted file (FXML) in a JavaFX application. To get started, head over to
    GluonHQ ([`http://gluonhq.com`](http://gluonhq.com)) to download the Scene Builder
    tool at the following location:


    [`http://gluonhq.com/open-source/scene-builder/`](http://gluonhq.com/open-source/scene-builder/)


    ### Download and Installing Scene Builder


    As of the writing of this book, a version of the Scene Builder tool for JDK 9
    didn’t exist. However, you can simply point your `JAVA_HOME` environment variable
    to the latest Java 8 SDK to run a downloaded Scene Builder version 8. Probably
    by the time you read this there will already be a version available for Java 9.
    Assuming you’ve already downloaded the Scene Builder tool for your appropriate
    OS, to launch the tool, I recommend downloading the JAR version and launching
    it using the command prompt. In my opinion, using the command prompt is better
    because it will assist you by dumping out any errors and exceptions to the console.
    The following command will launch the Scene Builder tool from the command line.


    ```

    $ java -jar SceneBuilder-8.0.0.jar

    ```


    ### Launching Scene Builder


    After downloading and installing Scene Builder, you can launch it. Figure [5-9](#A323804_3_En_5_Chapter.html#Fig9)
    shows the Scene Builder tool.


    ![A323804_3_En_5_Fig9_HTML.jpg](A323804_3_En_5_Fig9_HTML.jpg)


    Figure 5-9. Launching the Scene Builder tool for the first time


    I begin by describing the various tabs and their subsections starting with the
    left side. Under the main tab titled Library, note the search bar. There are also
    subsections called Containers, Controls, Menu, Miscellaneous, Shapes, Charts,
    and 3D. These subsections are various kinds of JavaFX nodes that can be dragged
    onto the center canvas area (Drag Library items here…). Of course, the first type
    of JavaFX node must be a layout container type node, which will allow children
    type nodes such as controls to be dragged onto container type nodes.


    On the left beneath the UI elements is the Document section. The Document section
    has two subsections, called Hierarchy and Controller. The Hierarchy panel allows
    you to view the DOM (document object model) of the UI elements in a tree-like
    hierarchy. Lastly, below the Hierarchy is the Controller tab. The Controller section
    lets you reference control logic (Controller Java class) to this UI view (FXML).
    The Controller class that is referenced will allow handler code to interact with
    UI elements that were previously dragged onto the canvas area. An example would
    be a Save button that is clicked would invoke a method on an associated Controller
    class. Later, you will be creating a Controller class to be referenced in the
    FXML file.


    On the right side of the Scene Builder is the Inspector search bar, as shown in
    Figure [5-9](#A323804_3_En_5_Chapter.html#Fig9). The search bar allows you to
    find properties on UI elements quite easily. Underneath the Inspector search bar,
    you’ll see three subsections—Properties, Layout, and Code. The Properties panel
    section allows you to style UI elements using JavaFX CSS properties. In Chapter
    [15](#A323804_3_En_15_Chapter.html) you will learn more about CSS styling, but
    for now you will not be using JavaFX CSS styling on UI elements in the tool. The
    Layout panel allows you to specify dimensions, transforms, and padding of a node’s
    properties. Lastly is the Code panel, which allows you to map event methods to
    UI elements such as the `OnMousePressed` property.


    Now that you know what Scene Builder can do, let’s build a user interface (UI).
    But, before building a UI, you will want to know what kind of UI you are wanting
    to build. To keep things simple, you will build the familiar Contacts form you
    created earlier in the section on `GridLayout`. Instead of programmatically coding
    the UI, you are going to develop it using the Scene Builder tool. Follow the steps
    below to graphically build your form.


    1.  Drag a `BorderPane` container onto the canvas to the right. Figure [5-10](#A323804_3_En_5_Chapter.html#Fig10)
    shows dragging the `BorderPane` container onto the canvas area.


    ![A323804_3_En_5_Fig10_HTML.jpg](A323804_3_En_5_Fig10_HTML.jpg)


    Figure 5-10. Dragging a BorderPane onto the canvas area that reads “Drag Library
    items here…” After dragging the `BorderPane` container onto the canvas surface,
    you should see in the lower-left the Document tab under the Hierarchy section
    displaying the BorderPane’s regions—`TOP`, `LEFT`, `CENTER`, `RIGHT`, and `BOTTOM`.
    Figure [5-11](#A323804_3_En_5_Chapter.html#Fig11) shows the document hierarchy
    (DOM) of the current UI elements on the canvas area. You can also drag UI elements
    into the document hierarchy window. Sometimes it’s easier to drag UI elements
    into the hierarchy and sometimes it’s easier to drag UI elements onto the canvas
    area. It all depends on how small the regions are on the canvas when there are
    nested containers.


    ![A323804_3_En_5_Fig11_HTML.jpg](A323804_3_En_5_Fig11_HTML.jpg)


    Figure 5-11.'
