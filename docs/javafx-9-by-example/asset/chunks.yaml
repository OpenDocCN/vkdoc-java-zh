    `updateItem()` 方法。`updateItem()` 方法的任务是获取每个人的信息，然后更新一个 `Label` 控件（`leadLbl`）。该标签会显示在
    `ListView` 控件的每个单元格行中。`updateItem()` 方法最后做的一件事是为每个单元格行添加一个工具提示弹出框（`Tooltip`）。当光标悬停在
    `ListView` 中的单元格（老板）上时，工具提示会弹出。更新单元格后，返回 `cell` 变量。


