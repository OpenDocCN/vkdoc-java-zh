    ### 属性


    在 JavaFX 属性 API 出现之前，Java Swing 开发者遵循 JavaBean 约定（规范），该规范规定对象应包含私有作用域的实例变量，并配有相应的
    getter（访问器）和 setter（修改器）方法。例如，一个 `User` 类可能有一个 `String` 类型的私有实例变量 `password`。对应的
    getter 和 setter 方法分别是 `getPassword()` 和 `setPassword()`。清单 4-24 展示了一个遵循旧版 JavaBean
    约定的 `User` 类。


    ```

    public class User {

    private String password;

    public String getPassword() {

    return password;

    }

    public void setPassword(String password) {

    this.password = password;

    }

    }

    清单 4-24.

    一个包含 Getter 和 Setter 方法的简单 JavaBean 类

    ```


    作为遵循 JavaBean 约定的开发者，你会很快发现属性的命名约定是基于 getter 和 setter 方法名，而非私有变量名。换句话说，如果 getter
    方法名为 `getPwd()`，那么属性名就是 `pwd`，与名为 `password` 的属性无关。


    JavaBeans 规范还提供了一个包含属性变更支持（`java.beans.PropertyChangeSupport`）概念的 API，允许开发者在属性发生变化时添加处理（监听）代码。在当时，这仅解决了属性变更支持的部分问题。当涉及到变量绑定和与
    Collections API 配合使用时，JavaBeans API 开始显露出其局限性。尽管 JavaBeans API 已成为构建领域对象的标准方式，但它仍然缺乏在
    GUI 应用程序中同步领域模型和视图的稳健方法，如前所述。


    多年来，JavaBean 规范和 API 催生了许多第三方工具和框架，以改善开发者体验。然而，使用单向或双向绑定将 GUI 组件连接到 JavaBeans
    仍然相当复杂。有时，开发者会因资源未正确释放而导致对象泄漏。开发者很快意识到，他们需要一种更好的方式来绑定和解绑 GUI 控件，使其与属性连接。


    ### JavaFX 属性的类型


    让我们快进到 JavaFX 的属性 API，看看它是如何处理常见问题的。我将首先讨论基于 JavaFX 的属性的不同类型。需要关注的有两种类型：


    *   可读写

    *   只读


    简而言之，JavaFX 的属性是包装对象，它们持有实际值，同时提供变更支持、失效支持和绑定能力。我稍后会讨论绑定，但现在先来看看常用的属性类。


    属性是包装对象，能够使值以可读写或只读的方式访问。所有包装属性类都位于 `javafx.beans.property.*` 包命名空间中。下面列出的是常用的属性类。要查看所有属性类，请参考
    Javadoc 文档。


    *   `javafx.beans.property.SimpleBooleanProperty`

    *   `javafx.beans.property.ReadOnlyBooleanWrapper`

    *   `javafx.beans.property.SimpleIntegerProperty`

    *   `javafx.beans.property.ReadOnlyIntegerWrapper`

    *   `javafx.beans.property.SimpleDoubleProperty`

    *   `javafx.beans.property.ReadOnlyDoubleWrapper`

    *   `javafx.beans.property.SimpleStringProperty`

    *   `javafx.beans.property.ReadOnlyStringWrapper`


    前缀为 `Simple`、后缀为 `Property` 的属性是可读写属性类，而前缀为 `ReadOnly`、后缀为 `Wrapper` 的类是只读属性。稍后，你将看到如何使用这些常用属性创建
    JavaFX bean，但现在我们先来了解可读写属性。


    #### 可读写属性


    顾名思义，可读写属性是指既可以读取也可以修改的属性值。例如，我们来看一下 JavaFX 字符串属性。要创建一个既能读取又能写入包装值的字符串属性，你需要使用
    `javafx.beans.property.SimpleStringProperty` 类。清单 4-25 是一个代码片段，演示了 `SimpleStringProperty`
    类的实例，并通过 `set()` 方法修改属性。


    ```

    StringProperty password = new SimpleStringProperty("password1");

    password.set("1234");

    System.out.println("修改后的 StringProperty " + password.get() ); // 1234

    清单 4-25.

    创建一个 StringProperty 实例

    ```


    这里，一个声明为 `StringProperty` 类型的变量 `password` 被赋值为 `SimpleStringProperty` 类的实例。在面向对象语言中，声明变量时尽量使用抽象类型总是一个好习惯。因此，引用
    `StringProperty` 会暴露更少的实现类（`SimpleStringProperty`）的方法。同时请注意，实际值是字符串“`password1`”，它被传递给了
    `SimpleStringProperty` 类的构造函数。稍后你将发现，在处理 JavaBeans 和属性对象时，还有其他方便的构造函数方法。


    在读取值时，你需要调用 `get()` 方法（或 `getValue()`），该方法将实际的包装值（`String`）返回给调用者。要修改值，只需调用 `set()`
    方法（或 `setValue()`）并传入一个字符串即可。


    #### 只读属性


    要使属性变为只读，你需要使用 `javafx.beans.property.*` 包中前缀为 `ReadOnly` 的包装类。要创建一个只读属性，需要两个步骤。首先，实例化一个只读包装类，并调用
    `getReadOnlyProperty()` 方法返回一个真正的只读属性对象。清单 4-26 创建了一个只读字符串属性。


    ```

    ReadOnlyStringWrapper userName = new ReadOnlyStringWrapper("jamestkirk");

    ReadOnlyStringProperty readOnlyUserName = userName.getReadOnlyProperty();

    清单 4-26.

    创建一个只读字符串属性

    ```


    这段代码实际上需要两个步骤来获取一个只读字符串属性。你会注意到调用了 `getReadOnlyProperty()`，它返回该属性的一个只读副本（同步的）。根据
    Javadoc API 的描述，`ReadOnlyStringWrapper` 类“创建了两个同步的属性。一个属性是只读的，可以传递给外部用户。另一个属性是可读写的，应仅在内部使用。”知道另一个属性可读可写，可能会让恶意开发者将对象强制转换为
    `StringProperty` 类型，从而随意修改。从安全角度来看，你应该了解创建真正只读属性的正确步骤。

    '
- fmt: '### JavaFX JavaBean


    Now that you’ve seen the JavaBean specification’s approach to creating domain
    objects, I will rewrite the earlier JavaBean `User` class to use JavaFX properties
    instead. In the process of rewriting the bean, I also wanted to add a read-only
    property called `userName` to demonstrate the read-only property behavior. Listing
    [4-27](#A323804_3_En_4_Chapter.html#Par127) shows the `User` class rewritten to
    use JavaFX properties.


    ```

    import javafx.beans.property.*;

    public class User {

    private final static String USERNAME_PROP_NAME = "userName";

    private final ReadOnlyStringWrapper userName;

    private final static String PASSWORD_PROP_NAME = "password";

    private final StringProperty password;

    public User() {

    userName = new ReadOnlyStringWrapper(this,

    USERNAME_PROP_NAME, System.getProperty("user.name"));

    password = new SimpleStringProperty(this, PASSWORD_PROP_NAME, "");

    }

    public final String getUserName() {

    return userName.get();

    }

    public ReadOnlyStringProperty userNameProperty() {

    return userName.getReadOnlyProperty();

    }

    public final String getPassword() {

    return password.get();

    }

    public final void setPassword(String password) {

    this.password.set(password);

    }

    public StringProperty passwordProperty() {

    return password;

    }

    }

    Listing 4-27.

    The File User.java Rewritten as a JavaFX Bean

    ```


    You may notice some obvious differences in the way I instantiated the `ReadOnlyStringWrapper`
    and `SimpleStringProperty` classes. Similar to the JavaBean property change support,
    JavaFX properties have constructors that will allow you to specify the bean itself,
    its property name, and its value. As a simple example, Listing [4-28](#A323804_3_En_4_Chapter.html#Par129)
    shows the instantiations of a read-only and a read-writable property using the
    JavaFX property change support-based constructors. The `userName` variable is
    assigned a read-only property, and the `password` variable is assigned a read/writable
    property.


    ```

    userName = new ReadOnlyStringWrapper(this, USERNAME_PROP_NAME, System.getProperty("user.name"));

    password = new SimpleStringProperty(this, PASSWORD_PROP_NAME, "");

    Listing 4-28.

    Instantiating a Read-Only and a Read-Writable Property

    ```


    It is good practice to use the property change support-based constructors for
    many reasons, such as third-party tooling and testing. But most of all, when dealing
    with property change support, you need access to the bean and its other properties.


    One last thing to mention is that, in Listing [4-26](#A323804_3_En_4_Chapter.html#Par124),
    notice that the getter and setter methods are final. Making the getter and setter
    final prevents any derived classes from overriding and possibly changing the underlying
    property.


    ### Property Change Support


    Property change support is the ability to add handler code that will respond when
    a property changes. JavaFX property objects contain an `addListener()` method.
    This method will accept two types of functional interfaces, `ChangeListener` and
    `InvalidationListener`. Recall that functional interfaces are single abstract
    methods that are expressed using the Java lambda syntax. All JavaFX properties
    are descendants of the `ObservableValue` and `Observable` interfaces (method overloading),
    which provide the `addListener()` methods for `ChangeListener` and `InvalidationListener`,
    respectively. Finally, remember that it is important to clean up listeners by
    removing them. The purpose of cleaning up listeners is to reclaim memory. To remove
    them, you will invoke the `removeListener()` method by passing into it a referenced
    (named) listener as opposed to an anonymous inner class or anonymous lambda expression.


    Listing [4-29](#A323804_3_En_4_Chapter.html#Par134) shows how to create a `ChangeListener`
    to be registered with a property. As the property’s value changes, the `change()`
    method will be invoked. I provided the implementations for both the anonymous
    inner class and lambda expression-style syntax for you to compare.


    ```

    SimpleIntegerProperty xProperty = new SimpleIntegerProperty(0);

    // Adding a change listener (anonymous inner class)

    xProperty.addListener(new ChangeListener(){

    @Override

    public void changed(ObservableValue ov,

    Number oldVal, Number newVal) {

    // code goes here

    }

    });

    // Adding a change listener (lambda expression)

    xProperty.addListener((ObservableValue ov,

    Number oldVal, Number newVal) -> {

    // code goes here

    });

    Listing 4-29.

    Adding a ChangeListener Instance to Respond When the Property Value Changes

    ```


    Listing [4-30](#A323804_3_En_4_Chapter.html#Par136) shows how to create an `InvalidationListener`
    to be registered with a property. As the property’s value changes, the `invalidated()`
    method will be invoked. I’ve provided the implementations for both the anonymous
    inner class and lambda expression-style syntax for you to compare.


    ```

    // Adding a invalidation listener (anonymous inner class)

    xProperty.addListener(new InvalidationListener() {

    @Override

    public void invalidated(Observable o) {

    // code goes here

    }

    });

    // Adding a invalidation listener (lambda expression)

    xProperty.addListener((Observable o) -> {

    // code goes here

    });

    Listing 4-30.

    Adding an InvalidationListener Instance to Respond When the Property Value Changes

    ```


    Often developers become confused about the difference between a `ChangeListener`
    and an `InvalidationListener`. In Listing [4-30](#A323804_3_En_4_Chapter.html#Par136),
    you’ll notice that using a `ChangeListener` you will get the `Observable` (`ObservableValue`),
    the old value, and the new value, while using the `InvalidationListener` only
    gets the `Observable` object (property).


    In the Javadoc documentation, the difference between a `ChangeListener` and `InvalidationListener`
    is described as follows:


    *   “A change event indicates that the value has changed. An invalidation event
    is generated, if the current value is not valid anymore. This distinction becomes
    important, if the `ObservableValue` supports lazy evaluation, because for a lazily
    evaluated value one does not know if an invalid value really has changed until
    it is recomputed. For this reason, generating change events requires eager evaluation
    while invalidation events can be generated for eager and lazy implementations.”


    The `InvalidationListener` provides a way to mark values as invalid but does not
    recompute the value until it is needed. This is often used in UI layouts or custom
    controls, where you can avoid unnecessary computations when nodes don’t need to
    be redrawn/repositioned during a layout request or draw cycle. When using the
    `ChangeListener`, you normally want eager evaluation such as the validation of
    properties on a form-type application. That doesn’t mean you can’t use `InvalidationListener`s
    for validation of properties; it just depends on your performance requirements
    and exactly when you need the new value to be recomputed (evaluated). When you
    access the observable value, it causes the `InvalidationListener` to be eager.'
