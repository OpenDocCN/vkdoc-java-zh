    starting with the color red, which interpolates a range between 0% and 15%, then
    the color orange is a gradient between 15% to 30%. Next is a range from 30% to
    45% using the color yellow and so on. Now that you know how to specify the range
    offset between stop colors, you will learn about the gradient axis, which helps
    linear gradients. The gradient axis is based on a line represented as start and
    end points, which assist in distributing the color across a shape .


