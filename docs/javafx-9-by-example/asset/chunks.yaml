  trans: "```java\npackage com.jfxbe.weatherwidget;\n// 其他导入已省略...\nimport static\
    \ jdk.incubator.http.HttpClient.newHttpClient;\nimport static jdk.incubator.http.HttpRequest.newBuilder;\n\
    import static jdk.incubator.http.HttpResponse.BodyHandler;\n/**\n* WeatherWidget\
    \ 应用程序演示了\n* 以下交互的使用：\n* \n*  1) 从 Java 到 JavaScript 的通信\n*  2) 从 JavaScript 到\
    \ Java 的通信\n*  3) RESTful GET Web 服务端点\n*  4) 操作 JSON 对象\n*  5) 处理 HTML/JavaScript\
    \ WebEvents\n*  6) 使用 Firebug lite 进行调试\n* \n*\n* \n*     以下是帮助演示上述交互的步骤：\n*\n\
    * 步骤 1：用户在搜索文本字段中输入城市、州和国家。\n*         （参见 weather_template.html）\n* 步骤 2：按下搜索按钮后，调用\
    \ JavaScript 函数\n*         findWeatherByLocation()。（参见 weather_template.html）\n\
    * 步骤 3：从 JavaScript 向上调用 Java 方法\n*         WeatherWidget.queryWeatherByLocationAndUnit()。（参见此类）\n\
    * 步骤 4：查询天气数据后，JSON 数据被传递给\n*         Java 方法 populateWeatherData()。此方法将调用\n*\
    \         JavaScript 函数 populateWeatherData()。（参见此类）\n* 步骤 5：使用 JavaScript 函数\
    \ populateWeatherDate() 填充 HTML 页面\n*         （参见 weather_template.html）\n*\n\
    * \n*\n* 需要获取有效的 API 密钥才能查询天气数据。\n* 要获取 API 密钥，请访问 Open Weather Map：\n* http://openweathermap.org\n\
    *\n* @author cdea\n*/\npublic class WeatherWidget extends Application {\n/** 当前天气\
    \ REST 端点的主 URL。 */\npublic static final String WEATHER_URL = \"http://api.openweathermap.org/data/2.5/weather\"\
    ;\n/** 包含有效 API 密钥的本地文件。 */\npublic static final String API_KEY_FILE = \".openweathermap-api-key\"\
    ;\n/** 用于访问天气和地图数据的 API 密钥。 */\nprivate static String API_KEY = null;\n/** 天气显示\
    \ HTML 页面 */\npublic static final String WEATHER_DISPLAY_TEMPLATE_FILE = \"weather_template.html\"\
    ;\n/** 用于显示 HTML5 内容的 WebView 节点 */\nprivate WebView webView;\n/** 用于发出 HTTP 请求的单例\
    \ HTTP 客户端 */\nprivate static HttpClient HTTP_CLIENT;\n@Override\npublic void\
    \ start(Stage stage) {\nstage.setTitle(\"天气小部件\");\nwebView = new WebView();\n\
    Scene scene = new Scene(webView, 300, 300);\nstage.setScene(scene);\n// 获取 API\
    \ 密钥\nloadAPIKey();\n// 开启 Firebug lite 用于调试\n// html、css、javascript\n// enableFirebug(webView);\n\
    // Web 视图的 Web 引擎\nwebView.getEngine()\n.getLoadWorker()\n.stateProperty()\n.addListener(\
    \ (obs, oldValue, newValue) -> {\nif (newValue == Worker.State.SUCCEEDED) {\n\
    // 让 JavaScript 向上调用此（Java）类\nJSObject jsobj = (JSObject)\nwebView.getEngine()\n\
    .executeScript(\"window\");\njsobj.setMember(\"WeatherWidget\", this);\n// 默认城市的天气（一个阳光明媚的地方）\n\
    queryWeatherByLocationAndUnit(\"Miami,FL\", \"c\");\n}\n});\n// 显示解释错误的 JavaFX\
    \ 对话框窗口\nwebView.getEngine().setOnAlert((WebEvent t) -> {\nSystem.out.println(\"\
    警报事件 - 消息：\" + t.getData());\nshowErrorDialog(t.getData());\n});\n// 加载 HTML 模板以显示天气\n\
    webView.getEngine()\n.load(getClass()\n.getResource(WEATHER_DISPLAY_TEMPLATE_FILE)\n\
    .toExternalForm());\nstage.show();\n}\n/**\n* 如果 API 密钥文件不存在，提示用户输入其密钥。\n* 一旦有效密钥保存到名为\
    \ .openweathermap-api-key 的文件中，\n* 应用程序将使用它来获取天气数据。\n*/\nprivate void loadAPIKey()\
    \ {\n// 从本地文件加载 API 密钥\nFile keyFile = new File(System.getProperty(\"user.home\"\
    ) + \"/\" + API_KEY_FILE);\n// 检查文件是否存在以及读写权限。\nif (keyFile.exists() && keyFile.canRead()\
    \ && keyFile.canWrite()) {\ntry (FileInputStream fis = new FileInputStream(keyFile)){\n\
    Optional apiKey = Optional.ofNullable(streamToString(fis));\napiKey.ifPresent(apiKeyStr\
    \ -> API_KEY = apiKeyStr);\n} catch (Exception e) {\nPlatform.exit();\nreturn;\n\
    }\n} else {\n// 如果 API 密钥不存在，显示对话框。\nTextInputDialog dialog = new TextInputDialog(\"\
    \");\ndialog.setTitle(\"输入 API 密钥\");\ndialog.setHeaderText(\"没有密钥？请访问：Open Weather\
    \ Map http://openweathermap.org\");\ndialog.setContentText(\"请输入 API 密钥：\");\n\
    Optional result = dialog.showAndWait();\nresult.ifPresent(key -> {\n// 写入磁盘\n\
    try (FileOutputStream fos = new FileOutputStream(keyFile)) {\nString apiKey =\
    \ result.get();\nfos.write(apiKey.getBytes());\nfos.flush();\nAPI_KEY = apiKey;\n\
    } catch (Exception e) {\ne.printStackTrace();\nPlatform.exit();\nreturn;\n}\n\
    });\n}\n}\n/**\n* 显示错误对话框窗口。\n* @param errorMessage\n*/\nprivate void showErrorDialog(String\
    \ errorMessage) {\nAlert dialog = new Alert(Alert.AlertType.ERROR,  errorMessage);\n\
    dialog.setTitle(\"检索天气数据时出错\");\ndialog.show();\n}\n@Override\npublic void stop()\
    \ throws Exception {\n// 在此处清理资源...\n}\n/**\n* 快速单行方法，以文件结束符为分隔符，\n* 并将整个输入流作为字符串返回。\n\
    * @param inputStream 字节输入流。\n* @return String 来自输入流的字符串。\n*/\npublic String streamToString(InputStream\
    \ inputStream) {\nString text = new Scanner(inputStream, \"UTF-8\")\n.useDelimiter(\"\
    \\\\Z\")\n.next();\nreturn text;\n}\n/**\n* 返回包含参数的 URL 字符串。\n* @param cityRegion\
    \ 城市、州和国家。州和国家\n*                   用逗号分隔。\n* @param unitType 指定 c 表示摄氏度，f 表示华氏度。\n\
    * @return String 表示 Web 请求的查询字符串。\n*/\nprivate  String generateQueryString(String\
    \ cityRegion, String unitType) {\nString units = \"f\".equalsIgnoreCase(unitType)\
    \ ? \"imperial\": \"metric\";\nString queryString = WEATHER_URL +\n\"?q=\" + cityRegion\
    \ +\n\"&\" + \"units=\" + units +\n\"&\" + \"mode=json\" +\n\"&\" + \"appid=\"\
    \ + API_KEY;\nreturn queryString;\n}\n/**\n* 此方法由 JavaScript 函数\n* findWeatherByLocation()\
    \ 调用。请参阅 weather_template.html\n* 文件。\n* \n* -- 步骤 3 --\n* \n*\n* @param cityRegion\
    \ 城市、州和国家。\n* @param unitType 温度单位：摄氏度或华氏度。\n*/\npublic void queryWeatherByLocationAndUnit(String\
    \ cityRegion,\nString unitType) {\n// 构建天气请求\nString queryStr  = generateQueryString(cityRegion,\
    \ unitType);\nSystem.out.println(\"请求 (http2): \" + queryStr);\n// 异步发出 GET 请求以获取天气数据\n\
    // sendAsync() 方法返回一个 CompletableFuture>\nHTTP_CLIENT.sendAsync( newBuilder(URI.create(queryStr))\n\
    .GET()\n.build(),\nBodyHandler.asString())\n.whenCompleteAsync( (httpResp, throwable)\
    \ -> {\nif (throwable != null){\nshowErrorDialog(throwable.getMessage());\nreturn;\n\
    }\nString json  = httpResp.body();\npopulateWeatherData(json, unitType);\nSystem.out.println(\"\
    响应 (http2): \" + json);\n});\n}\n/**\n* 使用 Web 引擎调用 JavaScript 函数 populateWeatherData()。\n\
    * \n*     -- 步骤 4 --\n*     从 Java 调用 JavaScript 函数 populateWeatherData()。\n*\
    \ \n*\n* @param json 要评估的 JSON 字符串（转换为真正的 JavaScript 对象）。\n* @param unitType 温度的单位符号和单位。\n\
    */\nprivate void populateWeatherData(String json, String unitType) {\nPlatform.runLater(()\
    \ -> {\n// 在 JavaFX 应用程序线程上...\nwebView.getEngine()\n.executeScript(\"populateWeatherData(eval(\"\
    \ + json + \"), \" +\n\"'\" + unitType + \"' );\");\n});\n}\npublic static void\
    \ main(String[] args){\nHTTP_CLIENT = newHttpClient();\nApplication.launch(args);\n\
    }\n}\n清单 10-23.\n天气小部件的源代码 (WeatherWidget.java)\n```"
- fmt: "最后，清单[10-24](#A323804_3_En_10_Chapter.html#Par223)包含一个文件资源`weather_template.html`中的HTML和JavaScript代码。该文件被加载到JavaFX\
    \ `WebView`节点中。\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n<style>\nbody { background-color:#ffffff;\
    \ }\n.tileTextDisplay {\nfont-family: arial,sans-serif;\nfont-weight: lighter\
    \ !important;\ncolor: #878787 !important;\n}\n.largerFont {\nfont-size: x-large\
    \ !important;\n}\n.mediumFont {\nfont-size: medium !important;\n}\n#weather-temp\
    \ {\nfont-family: 'Arial', sans-serif;\nfont-size: 64px;\ncolor: #212121 !important;\n\
    }\n#unitType {\nfont-family: 'Arial', sans-serif;\nfont-size: 20px;\ncolor: #000000\
    \ !important;\n}\n</style>\n</head>\n<body>\n<script>\nvar weekday=new Array(7);\n\
    weekday[0]=\"Sunday\";\nweekday[1]=\"Monday\";\nweekday[2]=\"Tuesday\";\nweekday[3]=\"\
    Wednesday\";\nweekday[4]=\"Thursday\";\nweekday[5]=\"Friday\";\nweekday[6]=\"\
    Saturday\";\n/* -- Step 2 --\n* Up call to Java invoking the\n* WeatherWidget.queryWeatherByLocationAndUnit()\
    \ method.\n*/\nfunction findWeatherByLocation() {\nvar cityInfo = encodeURIComponent(document.getElementById('search-field').value);\n\
    setInnerText(\"error-msg\", \"\");\nWeatherWidget.queryWeatherByLocationAndUnit(cityInfo,\
    \ \"c\");\n}\n/* -- Step 5 --\n* Populate UI with weather data.\n* This function\
    \ is called from Java code.\n*/\nfunction populateWeatherData(json, unitType)\
    \ {\nvar jsonWeather = json;\nif (jsonWeather.cod) {\nif (jsonWeather.cod != 200\
    \ ) {\ndocument.getElementById('error-msg').innerHTML = jsonWeather.message;\n\
    alert(jsonWeather.message);\nreturn;\n}\n}\nsetInnerText('city', jsonWeather.name);\n\
    setInnerText('country', jsonWeather.sys.country);\nvar weatherTime = new Date(jsonWeather.dt\
    \ * 1000);\nvar timeStr = timeFormat(jsonWeather.dt * 1000);\nsetInnerText('weather-day-time',\
    \ weekday[weatherTime.getDay()] + \" \" + timeStr) + \" (Last Update)\";\nsetInnerText('weather-current',\
    \ jsonWeather.weather[0].main);\nsetInnerText('weather-current-desc', jsonWeather.weather[0].description);\n\
    document.getElementById('weather-icon').src = \"http://openweathermap.org/img/w/\"\
    \ + jsonWeather.weather[0].icon + \".png\";\nsetInnerText('weather-temp', jsonWeather.main.temp);\n\
    setInnerText('weather-humidity', \"Humidity: \" + jsonWeather.main.humidity +\
    \ \"%\");\nvar windSpeed = (unitType === 'f') ? 'mph' : 'km/h';\nsetInnerText('weather-wind-speed',\
    \ \"Wind: \" + jsonWeather.wind.speed + \" \" +windSpeed);\n}\nfunction setInnerText(id,\
    \ text) {\ndocument.getElementById(id).innerText = text;\n}\nfunction timeFormat(\
    \ millis ) {\nvar weatherTime = new Date(millis);\nvar hours = weatherTime.getHours();\n\
    var minutes = weatherTime.getMinutes();\nvar meridian = hours >= 12 ? 'PM' : 'AM';\n\
    hours = hours % 12;\nhours = hours ? hours : 12; // hour '0' means '12'\nminutes\
    \ = minutes < 10 ? '0'+minutes : minutes;\nreturn hours + ':' + minutes + ' '\
    \ + meridian;\n}\n</script>\n</body>\n</html>\n```\n\n**Listing 10-24.** An HTML\
    \ Template File Populated with Weather Data\n\n### How It Works\n\n代码分为两部分——清单[10-23](#A323804_3_En_10_Chapter.html#Par221)中显示的Java代码和清单[10-24](#A323804_3_En_10_Chapter.html#Par223)中显示的HTML/JavaScript代码。此示例的目的是演示Java与JavaScript之间的双向通信，同时提供对JSON数据的RESTful\
    \ HTTP `GET`请求。由于从数据检索到HTML操作的所有方面都已讨论过，我将主要讨论清单[10-23](#A323804_3_En_10_Chapter.html#Par221)中JavaFX\
    \ `WeatherWidget`代码的`start()`方法的高级步骤。\n\n以下代码步骤取自清单20-23中`start()`方法内的源代码。\n\n\
    1.  使用`WebView`作为根节点设置场景和舞台窗口。\n2.  读取API密钥文件。如果API密钥不存在，则显示提示对话框窗口。\n3.  创建一个`WebView`节点来显示HTML内容。\n\
    \    1.  创建响应`WebView`内容加载完成时的处理代码。页面`weather_template.html`作为单页应用程序仅加载一次。\n \
    \   2.  加载完成后，代码将应用程序实例（`this`）传递到Web引擎中，以允许从JavaScript代码进行上行调用。为了允许JavaScript代码访问Java对象，代码通过传入`name`和对象来调用`setMember()`方法，如下所示：\n\
    \n```java\n        // Let JavaScript make upcalls to this (Java) class\n     \
    \   JSObject jsobj = (JSObject) webView.getEngine().executeScript(\"window\");\n\
    \        jsobj.setMember(\"WeatherWidget\", this);\n```\n\n3.  默认显示佛罗里达州迈阿密的天气预报，通过获取JSON天气数据填充到HTML页面中。小写的“c”表示单位类型为摄氏度。通过调用以下Java方法，它将获取JSON数据并调用JavaScript代码，用天气数据填充HTML\
    \ DOM。\n\n```java\n        queryWeatherByLocationAndUnit(\"Miami%20FL,US\", \"\
    c\");\n```\n\n4.  为`WebView`的Web引擎上的`OnAlert`属性创建处理代码。该处理代码响应HTML的JavaScript `alert()`函数以处理`WebEvent`。如果Web服务器返回错误，Web事件数据将传递给我的私有`showErrorDialog()`方法。此方法将显示一个包含错误消息的对话框窗口。\n\
    \n```java\n    webView.getEngine().setOnAlert( (WebEvent t) -> {\n    System.out.println(\"\
    Alert Event - Message: \" + t.getData());\n    showErrorDialog(t.getData());\n\
    \    });\n```\n\n5.  从类路径加载HTML文件`weather_template.html`，以显示在`WebView`上。\n\n```java\n\
    \    // Load HTML template to display weather\n    webView.getEngine()\n    .load(getClass().getResource(WEATHER_DISPLAY_TEMPLATE_FILE)\n\
    \    .toExternalForm());\n```\n\n在清单[10-23](#A323804_3_En_10_Chapter.html#Par221)中，你会注意到关于步骤1到5的注释部分；这些显示了从用户根据城市、州和国家搜索天气，到在HTML页面中显示数据的应用程序流程。以下是步骤1到5：\n\
    \n*   步骤1：按钮点击调用JavaScript函数`findWeatherByLocation()`：\n*   步骤2：上行调用实际的Java代码方法`queryWeatherByLocationAndUnit()`：\n\
    \n```javascript\n    function findWeatherByLocation() {...}\n```\n\n*   步骤3：使用新的`http2`模块进行异步RESTful\
    \ `GET`请求以获取天气数据的Java方法：\n\n```java\n    public void queryWeatherByLocationAndUnit(String\
    \ cityRegion, String unitType)\n```\n\n*   步骤4：在（Java端）获取JSON数据后，调用`executeScript()`方法将JSON对象传递给JavaScript函数`populateWeatherData()`：\n\
    \n```java\n    private void populateWeatherData(String json, String unitType)\
    \ {\n    Platform.runLater(() -> {\n    // On the JavaFX Application Thread....\n\
    \    webView.getEngine()\n    .executeScript(\"populateWeatherData(eval(\" + json\
    \ + \"), \" +\n    \"'\" + unitType + \"' );\");\n    });\n    }\n```\n\n*   步骤5：HTML页面填充了表示天气的JSON数据：\n\
    \n```javascript\n    function populateWeatherData(json, unitType) {...}\n```\n\
    \n### Enhancements\n\n作为练习，你可能希望天气小部件应用程序定期获取新的天气数据。根据Open Weather Map的说法，他们的天气预报更新通常每三小时一次。\n\
    \n关于如何调用`setInterval()`函数的提示，请查看以下代码片段：\n\n```javascript\n// Every period query\
    \ and populate the forecast using cached URL\nsetInterval(function(){\nWeatherWidget.queryWeatherByLocationAndUnit(null,\
    \ \"c\");\n},\n(1000 * 60 * 60 * 3) // every 3 hours\n); // set interval\n```"
