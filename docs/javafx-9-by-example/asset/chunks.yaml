    likely want your lines sharp and thin. To have a line stroke be thin, just add
    .5 to your coordinate value, which maps to the inner part of the stroke pixel
    of the screen coordinate point. When using a fractional coordinate value, JavaFX
    will render the line as one pixel, thus making it look thin. Looking at a line
    a pixel wide is rather difficult, so Figure [3-5](#A323804_3_En_3_Chapter.html#Fig5)
    shows the five lines zoomed in.


