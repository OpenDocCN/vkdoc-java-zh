    ## JavaFX 游戏开发


    您可能认为 JavaFX 只适用于商业应用。那么，请看看以下链接，了解一些有趣好玩的游戏。


    *   JavaFX 游戏开发框架：[`https://github.com/AlmasB/FXGL`](https://github.com/AlmasB/FXGL)
    Twitter：`@AlmasB`

    *   使用 Scala 的 JavaFX 游戏和 OpenCV 应用示例，作者：Robert Ladstätter：[`https://github.com/rladstaetter`](https://github.com/rladstaetter)
    Twitter：`@rladstaetter`

    *   GameComposer，作者：Mirko Sertic：一个面向桌面和移动设备的游戏创作工具和游戏运行时环境：GitHub：[`https://github.com/mirkosertic/GameComposer`](https://github.com/mirkosertic/GameComposer)
    Twitter：`@mirkosertic`

    *   在 JavaFX 中编写瓦片引擎，作者：Toni Epple：[`http://www.javacodegeeks.com/2013/01/writing-a-tile-engine-in-javafx.html`](http://www.javacodegeeks.com/2013/01/writing-a-tile-engine-in-javafx.html)

    *   SokubanFX，作者：Peter Rogge：一款基于 JavaFX 的推箱子类运输解谜游戏，玩家在仓库中推动箱子或板条箱，试图将它们推到存储位置。该谜题通常以电子游戏形式实现：[`https://github.com/Naoghuman/SokubanFX`](https://github.com/Naoghuman/SokubanFX)
    Twitter：`@naoghuman`

    *   RolandC 制作的塔防类游戏：[`http://wecode4fun.blogspot.co.at/2015/05/simple-game-engine-tower-defense.html`](http://wecode4fun.blogspot.co.at/2015/05/simple-game-engine-tower-defense.html)

    *   Angry Duke：基于物理的 JavaFX 游戏，作者：Toni Epple：[`https://www.youtube.com/watch?v=jcSp2E0MTyE`](https://www.youtube.com/watch%3Fv=jcSp2E0MTyE)

    *   JavaOne 2013 国际象棋机器人，作者：Jasper Potts：在 JavaOne 2013 技术主题演讲中，Java 团队演示了一个由
