  raw: '### Java 9 Module jdk.incubator.httpclient


    In the prior edition of this book related to web requests, we used legacy APIs
    such as the `HttpURLConnection` class; however, in this chapter we replace it
    in favor of the new experimental Java 9 module HTTP2 (JSR 110). For many years,
    Java developers relied heavily on third-party libraries to make web requests in
    a convenient way. In the previous edition of this book, I provided a pure Java
    solution by using the `legacy HttpURLConnection` API; however, it had limitations.
    Here is a brief rundown of the limitations of the `HttpURLConnection` API:


    *   It supported older protocols that are now obsolete such as gopher, ftp, etc.
    It does not support WebSockets.

    *   The APIs are very difficult to use. The APIs don’t use a fluent interface
    API pattern or lambdas expressions for preparing requests and handling error conditions.

    *   Request calls are in a blocking mode only. The APIs don’t use Java 8 new `CompletableFuture`
    APIs.


    The experimental Java 9 module `jdk.incubator.httpclient` contains new APIs to
    allow users to make HTTP web requests that use Java 8’s lambdas and concurrency
    API `CompletableFuture`. The `CompletableFuture` APIs allow you to make an asynchronous
    call to later complete. Once the call is complete, the handler code can then be
    triggered to process the `HttpResponse`. Later in this chapter, we will use these
    new APIs with an example Weather Widget application capable of making RESTful
    calls returning JSON data.


    In the beginning, the Java architects were going to add the new HTTP2 modules
    to Java 9; however, as deadlines got tighter for project Jigsaw, it was decided
    to be pushed out to Java 10\. The good news about the new HTTP2 module is that
    the engineers created an incubator project under the module name `jdk.incubator.httpclient`
    within JDK 9\. The incubator area is for experimentation and will eventually end
    up as official core APIs. To see the HTTP2 JDK enhancement proposal, visit [`http://openjdk.java.net/jeps/110`](http://openjdk.java.net/jeps/110)
    .


    Although the new HTTP2 module in Java 9 is experimental, it is fully functional,
    as far as I know. The official HTTP2 module implementation in Java 10 will likely
    be named `java.httpclient`. In fact, once the module moves to Java 10 your code
    that relies on Java 9’s HTTP client module (`jdk.incubator.httpclient`) will likely
    break and need to point to the new module name. As a quick recap, if you remember
    from Chapter [2](#A323804_3_En_2_Chapter.html) on modularity, your module definition
    might look like the following:


    ```

    module com.jfxbe.myclientmodule {

    requires jdk.incubator.httpclient;

    exports com.jfxbe.myclientmodule;

    }

    ```


    Assuming you have your `JAVA_HOME` and `PATH` environment variables set, you may
    not need to add the `jdk.incubator.httpclient` module when executing your application
    module; however, the `--add-modules` switch is available for adding third-party
    or platform modules to your module path. To be on the safe side, be sure to add
    (`--add-modules`) the `httpclient` module when running code, as shown here:


    ```

    $ java --add-modules jdk.incubator.httpclient --module-path mods com.jfxbe.myclientmodule

    ```


    If you aren’t familiar with Java 9 modules, refer to Chapter [2](#A323804_3_En_2_Chapter.html)
    about JavaFX and Jigsaw for more details. Assuming you know about the necessary
    items, let’s continue the discussion of the HTTP2 module.


    The new HTTP2 module is mainly divided into two parts—the `HttpClient` and the
    `HttpRequest` APIs. The `HttpClient` APIs are all about the connections and the
    `HttpRequest` APIs are about web requests. Both use the builder pattern with a
    static method `HttpClient.newBuilder()` and `HttpRequest.newBuilder()`, respectively.
    When following the builder pattern, most methods related to properties allow you
    to specify values in an ad hoc way. Each method returns the initially created
    builder instance.


    After an invocation of `newBuilder()` on `HttpClient` and `HttpRequest` an instance
    of a `HttpClient.Builder` and `HttpRequest.Builder` is returned. Once you have
    finished specifying values on property methods, you will invoke the `build()`
    method to return the actual instance of the object. In the case with an `HttpClient.Builder`
    instance and a call to the `build()` method, an `HttpClient` instance is returned
    to the caller.


    #### HttpClient API


    The Java 9 HTTP2 module’s `HttpClient` API provides numerous connection settings.
    According to the Javadoc documentation, an `HttpClient.Builder` supports the following
    connection settings shown in Table [10-2](#A323804_3_En_10_Chapter.html#Tab2).


    Table 10-2.


    Connection Settings When Using the HttpClient.Builder Class


    | Connection Property | Description |

    | --- | --- |

    | `authenticator(Authenticator a)` | Sets an authenticator to use for HTTP authentication.
    |

    | `cookieManager(CookieManager cookieManager)` | Sets a cookie manager. |

    | `executor(Executor executor)` | Sets the `ExecutorService` to be used for sending
    and receiving asynchronous requests. |

    | `followRedirects(HttpClient.Redirect policy)` | Specifies whether requests will
    automatically follow redirects issued by the server. |

    | `pipelining(boolean enable)` | Enables pipelining mode for HTTP/1.1 requests
    sent through this client. |

    | `priority(int priority)` | Sets the default priority for any HTTP/2 requests
    sent from this client. |

    | `proxy(ProxySelector selector)` | Sets a `ProxySelector` for this client. |

    | `sslContext(SSLContext sslContext)` | Sets an `SSLContext`. |

    | `sslParameters(SSLParameters sslParameters)` | Sets an `SSLParameters`. |

    | `version(HttpClient.Version version)` | Requests a specific HTTP protocol version
    where possible. |


    A typical web site that uses basic authentication will specify an instance of
    a `java.net.Authenticator`. Listing [10-9](#A323804_3_En_10_Chapter.html#Par94)
    shows an `HttpClient` created with a basic authentication.


    ```

    HttpClient client = HttpClient.newBuilder()

    .authenticator(new Authenticator() {

    @Override

    protected PasswordAuthentication getPasswordAuthentication() {

    return new PasswordAuthentication("username", "pa$$w0rd1".toCharArray());

    }})

    .build();

    Listing 10-9.

    Basic Authentication Specified on an HttpClient Instance

    ```'
  trans: '

    ### Java 9 模块 jdk.incubator.httpclient


    在本书前一版关于网络请求的章节中，我们使用了诸如 `HttpURLConnection` 类这样的传统 API；然而，在本章中，我们将改用新的实验性 Java
    9 模块 HTTP2（JSR 110）。多年来，Java 开发者严重依赖第三方库来便捷地发起网络请求。在本书前一版中，我通过使用 `legacy HttpURLConnection`
    API 提供了一个纯 Java 解决方案；但它存在局限性。以下是 `HttpURLConnection` API 局限性的简要概述：


    *   它支持现已过时的旧协议，例如 gopher、ftp 等。它不支持 WebSocket。

    *   这些 API 非常难以使用。它们在准备请求和处理错误条件时，既没有使用流畅接口 API 模式，也没有使用 lambda 表达式。

    *   请求调用仅支持阻塞模式。这些 API 没有使用 Java 8 新的 `CompletableFuture` API。


    实验性的 Java 9 模块 `jdk.incubator.httpclient` 包含了新的 API，允许用户发起使用 Java 8 的 lambda 和并发
    API `CompletableFuture` 的 HTTP 网络请求。`CompletableFuture` API 允许你发起一个异步调用，稍后再完成它。一旦调用完成，就可以触发处理程序代码来处理
    `HttpResponse`。在本章后面，我们将通过一个示例天气小部件应用程序来使用这些新 API，该应用程序能够发起返回 JSON 数据的 RESTful
    调用。


    最初，Java 架构师计划将新的 HTTP2 模块添加到 Java 9 中；然而，随着项目 Jigsaw 的截止日期越来越紧，决定将其推迟到 Java 10。关于新
    HTTP2 模块的好消息是，工程师们在 JDK 9 中创建了一个名为 `jdk.incubator.httpclient` 的孵化器项目。孵化器区域用于实验，最终将成为官方的核心
    API。要查看 HTTP2 JDK 增强提案，请访问 [`http://openjdk.java.net/jeps/110`](http://openjdk.java.net/jeps/110)。


    尽管 Java 9 中的新 HTTP2 模块是实验性的，但据我所知，它功能完备。Java 10 中官方的 HTTP2 模块实现可能会命名为 `java.httpclient`。事实上，一旦该模块迁移到
    Java 10，你依赖 Java 9 HTTP 客户端模块（`jdk.incubator.httpclient`）的代码很可能会失效，需要指向新的模块名称。快速回顾一下，如果你还记得第
    2 章关于模块化的内容，你的模块定义可能如下所示：


    ```

    module com.jfxbe.myclientmodule {

    requires jdk.incubator.httpclient;

    exports com.jfxbe.myclientmodule;

    }

    ```


    假设你已经设置了 `JAVA_HOME` 和 `PATH` 环境变量，在执行应用程序模块时可能不需要添加 `jdk.incubator.httpclient`
    模块；但是，`--add-modules` 选项可用于将第三方或平台模块添加到你的模块路径中。为了安全起见，在运行代码时请务必添加（`--add-modules`）`httpclient`
    模块，如下所示：


    ```

    $ java --add-modules jdk.incubator.httpclient --module-path mods com.jfxbe.myclientmodule

    ```


    如果你不熟悉 Java 9 模块，请参阅第 2 章关于 JavaFX 和 Jigsaw 的内容以了解更多细节。假设你了解了必要的项目，让我们继续讨论 HTTP2
    模块。


    新的 HTTP2 模块主要分为两部分——`HttpClient` API 和 `HttpRequest` API。`HttpClient` API 全部关于连接，而
    `HttpRequest` API 则关于网络请求。两者都使用构建器模式，分别通过静态方法 `HttpClient.newBuilder()` 和 `HttpRequest.newBuilder()`
    实现。当遵循构建器模式时，大多数与属性相关的方法允许你以临时方式指定值。每个方法都返回最初创建的构建器实例。


    在 `HttpClient` 和 `HttpRequest` 上调用 `newBuilder()` 后，会返回一个 `HttpClient.Builder`
    和 `HttpRequest.Builder` 的实例。一旦你完成了对属性方法的值指定，你将调用 `build()` 方法来返回对象的实际实例。对于 `HttpClient.Builder`
    实例，在调用 `build()` 方法后，会向调用者返回一个 `HttpClient` 实例。


    #### HttpClient API


    Java 9 HTTP2 模块的 `HttpClient` API 提供了多种连接设置。根据 Javadoc 文档，`HttpClient.Builder`
    支持表 10-2 中所示的以下连接设置。


    表 10-2. 使用 HttpClient.Builder 类时的连接设置


    | 连接属性 | 描述 |

    | --- | --- |

    | `authenticator(Authenticator a)` | 设置用于 HTTP 身份验证的验证器。 |

    | `cookieManager(CookieManager cookieManager)` | 设置一个 cookie 管理器。 |

    | `executor(Executor executor)` | 设置用于发送和接收异步请求的 `ExecutorService`。 |

    | `followRedirects(HttpClient.Redirect policy)` | 指定请求是否会自动跟随服务器发出的重定向。 |

    | `pipelining(boolean enable)` | 为此客户端发送的 HTTP/1.1 请求启用流水线模式。 |

    | `priority(int priority)` | 设置从此客户端发送的任何 HTTP/2 请求的默认优先级。 |

    | `proxy(ProxySelector selector)` | 为此客户端设置一个 `ProxySelector`。 |

    | `sslContext(SSLContext sslContext)` | 设置一个 `SSLContext`。 |

    | `sslParameters(SSLParameters sslParameters)` | 设置 `SSLParameters`。 |

    | `version(HttpClient.Version version)` | 在可能的情况下请求特定的 HTTP 协议版本。 |


    一个使用基本身份验证的典型网站会指定一个 `java.net.Authenticator` 实例。清单 10-9 展示了一个使用基本身份验证创建的 `HttpClient`。


    ```

    HttpClient client = HttpClient.newBuilder()

    .authenticator(new Authenticator() {

    @Override

    protected PasswordAuthentication getPasswordAuthentication() {

    return new PasswordAuthentication("username", "pa$$w0rd1".toCharArray());

    }})

    .build();

    清单 10-9. 在 HttpClient 实例上指定的基本身份验证

    ```

    '
- fmt: '### `HttpRequest` API


    After building your HTTP client, you need to create an HTTP request using the
    `HttpRequest.newBuilder()` method to create an `HttpRequest.Builder` instance.
    This is where you specify properties to build up a web request. Remember how I
    mentioned the older `HttpURLConnection` APIs limitations? One of the limitations
    was that the API was difficult to use. To compare and contrast, let’s look at
    the legacy and improved ways to make a synchronous HTTP `GET` web request. Listing
    [10-10](#A323804_3_En_10_Chapter.html#Par96) shows the legacy way to make an HTTP
    GET web request.


    ```

    URL url = new URL(urlQueryString);

    HttpURLConnection connection = (HttpURLConnection) url.openConnection(); connection.setDoOutput(true);

    connection.setInstanceFollowRedirects(false);

    connection.setRequestMethod("GET");

    connection.setRequestProperty("Content-Type", "application/json"); connection.setRequestProperty("charset",
    "utf-8");

    connection.connect();

    InputStream inStream = connection.getInputStream();

    output(inStream);

    Listing 10-10.

    The Legacy Way to Make an HTTP GET Web Request

    ```


    As you can see, the legacy code in Listing [10-10](#A323804_3_En_10_Chapter.html#Par96)
    is verbose. Also, it appears that the http client and request APIs are combined.
    To see the new and improved code using the new `http2` module, look at Listing
    [10-11](#A323804_3_En_10_Chapter.html#Par98) (`HttpRequest`).


    ```

    HttpRequest request = HttpRequest.newBuilder(URI.create(queryStr))

    .GET()

    .build();

    HttpResponse response = HttpClient.newHttpClient().send(request,

    BodyHandler.asString());

    System.out.println(response.statusCode());

    System.out.println(response.body());

    Listing 10-11.

    The Improved Way to Make an HTTP GET Web Request

    ```


    The output of Listing [10-11](#A323804_3_En_10_Chapter.html#Par98) should look
    something like the following:


    ```

    hello world

    ```


    You will notice in Listing [10-11](#A323804_3_En_10_Chapter.html#Par98) that the
    HTTP `GET` is a method instead of a string specified on the legacy method `setRequestMethod("GET")`.
    The new `HttpRequest.Builder` API also allows you to specify a string method by
    using the `method(String, BodyProcessor)` method. The `method()` method is usually
    used on the less common HTTP methods such as `OPTION` or `HEAD`. Since the HTTP
    protocol is a standard, the HTTP request builder supports the other commonly used
    methods, such as `PUT`, `POST`, and `DELETE`.


    In Listing [10-11](#A323804_3_En_10_Chapter.html#Par98) you’ll notice the method
    `send()` being used as an equivalent blocking behavior to Listing [10-10](#A323804_3_En_10_Chapter.html#Par96).
    In the second scenario, the `send()` method is also making a blocking call to
    a remote web server. Later, you will learn how to make non-blocking calls to the
    remote web server.


    There are many ways to create `HttpRequest` instances by using an `HttpRequest.Builder`
    object. To begin, you first must call the `HttpRequest.newBuilder()` method. All
    the available property methods you can specify on an `HttpRequest.Builder` object
    are listed in Table [10-3](#A323804_3_En_10_Chapter.html#Tab3). Remember when
    you are done specifying property methods on your `HttpRequest.Builder` instance,
    you will call the `build()` method to return an `HttpRequest` object.


    **Table 10-3.** The `HttpRequest.Builder` Request Property Methods When Using
    the `HttpRequest.Builder` Class


    | Request Property | Description |

    | --- | --- |

    | `body(HttpRequest.BodyProcessor reqproc)` | Sets a request body for this builder.
    |

    | `copy()` | Returns an exact duplicate copy of this builder based on current
    state. |

    | `expectContinue(boolean enable)` | Requests server to acknowledge request before
    sending request body. |

    | `followRedirects(HttpClient.Redirect policy)` | Specifies whether this request
    will automatically follow redirects issued by the server. |

    | `GET()` | Builds and returns a `GET HttpRequest` from this builder. |

    | `header(String name, String value)` | Adds the given name/value pair to the
    set of headers for this request. |

    | `headers(String... headers)` | Adds the given name/value pairs to the set of
    headers for this request |

    | `method(String method)` | Builds and returns an `HttpRequest` from this builder
    using the given method `String`. |

    | `POST()` | Builds and returns a `POST HttpRequest` from this builder. |

    | `proxy(ProxySelector proxy)` | Overrides the `ProxySelector` set on the request''s
    client for this request. |

    | `PUT()` | Builds and returns a `PUT HttpRequest` from this builder. |

    | `setHeader(String name, String value)` | Sets the given name/value pair to the
    set of headers for this request. |

    | `timeout(TimeUnit unit, long timeval)` | Sets a timeout for this request. |

    | `uri(URI uri)` | Sets this `HttpRequest`’s request URI. |

    | `version(HttpClient.Version version)` | Overrides the `HttpClient.version()`
    setting for this request. |


    Now that you’ve seen how easily you can make synchronous (blocking) web requests
    using `send()`, let’s see how to make RESTful requests asynchronously (non-blocking).
    Next you will see more examples of how to make RESTful requests using Java 9’s
    experimental module `jdk.incubator.httpclient`.


    ### Making RESTful Requests


    In the Enterprise Web development world, you will inevitably encounter the concept
    of RESTful web services. Based on the concept of representational state transfer
    (REST), RESTful web services are lightweight HTTP requests that typically involve
    XML or JSON-formatted data. To make RESTful calls, the web request will contain
    a request method that tells the web server the type of HTTP data flow transaction.


    Like database transactions, RESTful conventions follow the concept of CRUD (Create,
    Read, Update, and Delete), where the create stage is a `POST` request, read is
    a `GET`, update is a `PUT`, and delete is a `DELETE`. While the actions `GET`
    and `DELETE` only involve a query string to make a request, `POST` and `PUT` often
    involve a payload of larger amounts of data as part of the request.'
  raw: '#### HttpRequest API


    After building your HTTP client, you need to create an HTTP request using the
    `HttpRequest.newBuilder()` method to create an `HttpRequest.Builder` instance.
    This is where you specify properties to build up a web request. Remember how I
    mentioned the older `HttpURLConnection` APIs limitations? One of the limitations
    was that the API was difficult to use. To compare and contrast, let’s look at
    the legacy and improved ways to make a synchronous HTTP `GET` web request. Listing
    [10-10](#A323804_3_En_10_Chapter.html#Par96) shows the legacy way to make an HTTP
    GET web request.


    ```

    URL url = new URL(urlQueryString);

    HttpURLConnection connection = (HttpURLConnection) url.openConnection(); connection.setDoOutput(true);

    connection.setInstanceFollowRedirects(false);

    connection.setRequestMethod("GET");

    connection.setRequestProperty("Content-Type", "application/json"); connection.setRequestProperty("charset",
    "utf-8");

    connection.connect();

    InputStream inStream = connection.getInputStream();

    output(inStream);

    Listing 10-10.

    The Legacy Way to Make an HTTP GET Web Request

    ```


    As you can see, the legacy code in Listing [10-10](#A323804_3_En_10_Chapter.html#Par96)
    is verbose. Also, it appears that the http client and request APIs are combined.
    To see the new and improved code using the new `http2` module, look at Listing
    [10-11](#A323804_3_En_10_Chapter.html#Par98) (`HttpRequest`).


    ```

    HttpRequest request = HttpRequest.newBuilder(URI.create(queryStr))

    .GET()

    .build();

    HttpResponse response = HttpClient.newHttpClient().send(request,

    BodyHandler.asString());

    System.out.println(response.statusCode());

    System.out.println(response.body());

    Listing 10-11.

    The Improved Way to Make an HTTP GET Web Request

    ```


    The output of Listing [10-11](#A323804_3_En_10_Chapter.html#Par98) should look
    something like the following:


    ```


    hello world

    ```


    You will notice in Listing [10-11](#A323804_3_En_10_Chapter.html#Par98) that the
    HTTP `GET` is a method instead of a string specified on the legacy method `setRequestMethod("GET")`.
    The new `HttpRequest.Builder` API also allows you to specify a string method by
    using the `method(String, BodyProcessor)` method. The `method()` method is usually
    used on the less common HTTP methods such as `OPTION` or `HEAD`. Since the HTTP
    protocol is a standard, the HTTP request builder supports the other commonly used
    methods, such as `PUT`, `POST`, and `DELETE`.


    In Listing [10-11](#A323804_3_En_10_Chapter.html#Par98) you’ll notice the method
    `send()` being used as an equivalent blocking behavior to Listing [10-10](#A323804_3_En_10_Chapter.html#Par96).
    In the second scenario, the `send()` method is also making a blocking call to
    a remote web server. Later, you will learn how to make non-blocking calls to the
    remote web server.


    There are many ways to create `HttpRequest` instances by using an `HttpRequest.Builder`
    object. To begin, you first must call the `HttpRequest.newBuilder()` method. All
    the available property methods you can specify on an `HttpRequest.Builder` object
    are listed in Table [10-3](#A323804_3_En_10_Chapter.html#Tab3). Remember when
    you are done specifying property methods on your `HttpRequest.Builder` instance,
    you will call the `build()` method to return an `HttpRequest` object.


    Table 10-3.


    The HttpRequest.Builder Request Property Methods When Using the HttpRequest.Builder
    Class


    | Request Property | Description |

    | --- | --- |

    | `body(HttpRequest.BodyProcessor reqproc)` | Sets a request body for this builder.
    |

    | `copy()` | Returns an exact duplicate copy of this builder based on current
    state. |

    | `expectContinue(boolean enable)` | Requests server to acknowledge request before
    sending request body. |

    | `followRedirects(HttpClient.Redirect policy)` | Specifies whether this request
    will automatically follow redirects issued by the server. |

    | `GET()` | Builds and returns a `GET HttpRequest` from this builder. |

    | `header(String name, String value)` | Adds the given name/value pair to the
    set of headers for this request. |

    | `headers(String... headers)` | Adds the given name/value pairs to the set of
    headers for this request |

    | `method(String method)` | Builds and returns an `HttpRequest` from this builder
    using the given method `String`. |

    | `POST()` | Builds and returns a `POST HttpRequest` from this builder. |

    | `proxy(ProxySelector proxy)` | Overrides the `ProxySelector` set on the request''s
    client for this request. |

    | `PUT()` | Builds and returns a `PUT HttpRequest` from this builder. |

    | `setHeader(String name, String value)` | Sets the given name/value pair to the
    set of headers for this request. |

    | `timeout(TimeUnit unit, long timeval)` | Sets a timeout for this request. |

    | `uri(URI uri)` | Sets this `HttpRequest`’s request URI. |

    | `version(HttpClient.Version version)` | Overrides the `HttpClient.version()`
    setting for this request. |


