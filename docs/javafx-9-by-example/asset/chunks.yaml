    #### photo-viewer.css


    Photo Viewer 应用程序的 JavaFX CSS 样式文件是 `photo-viewer.css`，如代码清单 7-23 所示。如果你不熟悉 JavaFX
    CSS 样式，可以快进到关于自定义用户界面的第 15 章。简而言之，代码清单 7-23 包含了代码清单 7-21 中自定义控件（`ImageViewButtons`）的
    JavaFX CSS 样式。通常，你可以通过调用节点的 `getStyleClass().add(...)` 方法，将类选择器添加到任何 JavaFX 节点。


    例如，这里我将自定义按钮的区域节点设置为使用类选择器 `"button-pane"`：


    ```

    buttonStackPane.getStyleClass().add("button-pane")

    ```


