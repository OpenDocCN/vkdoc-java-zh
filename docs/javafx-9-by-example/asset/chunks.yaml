    动画，其变量为 `flightPath`。为了模拟飞机从场景左侧飞到右侧，路径过渡动画会创建 JavaFX 路径元素。这些路径元素由一个 `MoveTo`
    实例和一个 `QuadCurveTo` 实例组成。路径元素 `QuadCurveTo` 会使飞机看起来像是在爬升高度，先抬起机头，随后在降低高度时放下机头。使用
    `PathTransition` 时，有不同的路径方向。此示例使用 `OrientationType.ORTHOGONAL_TO_TANGENT` 来保持节点（`SVGPath`）对象垂直于曲线上的路径切点。


    接下来，代码创建了一个针对风车转子叶片的 `RotateTransition`，以产生旋转动画。该旋转平移动画被设置为无限循环运行。


