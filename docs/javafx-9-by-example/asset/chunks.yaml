    ![A323804_3_En_9_Fig4_HTML.jpg](img/A323804_3_En_9_Fig4_HTML.jpg)


    图 9-4.


    位于右上角的关闭按钮允许用户停止媒体播放器并退出应用程序


    ### MP3 音频播放器源代码


    清单 9-1 展示了一个基于 JavaFX 的 MP3 音频播放器的源代码。本书先前版本中的源代码经过了进一步重构，将内容拆分为多个方法，而不是一个庞大的
    `start()` 方法。除了重构之外，我还移除了使用编程方式为 JavaFX 节点设置样式的代码。我没有使用 `setter()` 方法来为 JavaFX
    节点设置样式，而是简单地创建了一个 CSS 样式表（声明式样式）。清单 9-2 中显示的样式表包含了 CSS 选择器定义。

