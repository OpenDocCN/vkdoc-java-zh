  trans: '

    ## 解读 HelloWorld 源代码


    你会注意到，在源代码中，基于 JavaFX 的应用程序继承自 `javafx.application.Application` 类。`Application`
    类提供了应用程序生命周期函数，例如在运行时进行初始化、启动、开始和停止。这为 Java 应用程序提供了一种机制，使其能够从主线程中分离出来，启动 JavaFX
    GUI 组件。清单 1-2 中的代码是 JavaFX HelloWorld 应用程序的骨架，包含一个 `main()` 方法和一个重写的 `start()`
    方法。


    ```

    public class HelloWorld extends Application {

    /**

    * @param args the command line arguments

    */

    public static void main(String[] args) {

    // 在主线程上

    Application.launch(args);

    }

    @Override

    public void start(Stage stage) {

    // 在 JavaFX 应用程序线程上

    // JavaFX 代码写在这里...

    }

    }

    清单 1-2.

    HelloWorld.java 文件的骨架版本

    ```


    在这里，在 `main()` 方法的入口点，你只需将命令行参数传递给 `Application.launch()` 方法即可启动 JavaFX 应用程序。要访问传递给
    `launch()` 方法的任何参数，你可以调用 `Application` 类的 `getParameters()` 方法。有关访问命名参数和原始参数的各种方式的详细信息，请参阅
    Javadoc 文档。以下是 `getParameters()` 方法的 Javadoc 文档链接：


    [`https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html#getParameters--`](https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html%23getParameters%2D%2D)


    在 `Application.launch()` 方法执行后，应用程序将进入就绪状态，框架内部将调用 `start()` 方法来启动。此时，程序执行发生在
    JavaFX 应用程序线程上，而不是主线程上。当调用 `start()` 方法时，一个 JavaFX `javafx.stage.Stage` 对象可供开发者使用和操作。以下是重写的
    Application `start()` 方法：


    ```

    @Override

    public void start(Stage stage) {...}

    ```


    当程序在 `start()` 方法中开始时，会有一个独立的执行线程，称为 JavaFX 应用程序线程。请记住，在 JavaFX 应用程序线程上运行，在概念上等同于在
    Java Swing 的事件调度线程上运行。请注意 Java 主线程与 UI 线程在涉及 UI 应用程序时的区别。在本书的后续部分，你将学习如何创建后台进程以避免阻塞
    JavaFX 应用程序线程。当你学会如何构建应用程序以避免阻塞 GUI 时，用户会注意到你的应用程序在高负载下响应更迅速（更灵敏）。掌握 GUI 应用程序的响应性是增强可用性和整体用户体验的重要概念。要查看
    Java Application API，请访问此处的 Javadoc：


    [`https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html)


    [`https://docs.oracle.com/javase/9/`](https://docs.oracle.com/javase/9/)


    ### JavaFX 场景图


    你会注意到一些类和对象的命名有些奇特，例如 `Stage` 和 `Scene`。这并非巧合——API 的设计者借鉴了剧院或戏剧的概念，即演员在观众面前表演。在这个类比中，一部戏剧由一幕或多幕场景组成，演员在其中表演。当然，所有场景都在一个舞台上依次进行。在
    JavaFX 中，`Stage` 相当于一个应用程序窗口，类似于桌面上的 Java Swing API `JFrame` 或 `JDialog`。根据设备的不同（例如
    Raspberry Pi (Raspbian)），可能只有一个舞台。你可以将 `Scene` 对象视为一个内容面板，类似于 Java Swing 的 `JPanel`，能够容纳零到多个
    `Node` 对象（子节点）。


    继续这个例子，在 `start()` 方法中，你会看到对于 JavaFX 桌面窗口（舞台），你可以使用 `setTitle()` 方法设置标题栏。接下来，你创建一个根节点（`Group`），将其作为应用程序窗口的顶层表面添加到
    `Scene` 对象中。以下代码片段展示了如何设置标题并创建场景：


    ```

    stage.setTitle("Hello World");

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250);

    ```


    ### JavaFX 节点


    JavaFX 节点是所有待渲染场景图节点的基本基类。以下图形功能可以应用于节点：缩放、变换、平移和效果。


    一些最常用的节点是 UI 控件和 `Shape` 对象。与树数据结构类似，场景图通过使用容器类（例如 `Group` 或 `Pane` 类）来包含子节点。稍后当你学习
    `ObservableList` 类时，你将了解更多关于 `Group` 类的信息，但现在你可以将它们视为能够容纳子节点对象的 Java `List` 或
    `Collection` 类。在以下代码中，创建了一个按钮（`Button`）节点，将其定位在场景上，并设置了一个事件处理器（`EventHandler<ActionEvent>`），当用户按下按钮时，该处理器会做出响应。处理器代码将在控制台输出文本
    `"Hello World"`。目前，此处显示的代码使用了匿名内部类；不过，你将在第 3 章中学习使用 Java 8 引入的 lambda 表达式。


    ```

    Button btn = new Button();

    btn.setLayoutX(100);

    btn.setLayoutY(80);

    btn.setText("Hello World");

    btn.setOnAction(new EventHandler() {

    public void handle(ActionEvent event) {

    System.out.println("Hello World");

    }

    });

    root.getChildren().add(btn);

    ```


    一旦通过 `getChildren().add()` 方法将子节点添加到根 `Group` 中，你就可以设置 `stage` 的场景，并调用 `Stage`
    对象上的 `show()` 方法来显示 JavaFX 应用程序窗口。默认情况下，该窗口允许用户最小化、最大化和关闭（退出）应用程序。以下代码设置了场景并显示了
    JavaFX 应用程序窗口（`Stage`）：


    ```

    stage.setScene(scene);

    stage.show();

    ```

    '
- fmt: '# Packaging a JavaFX Application


    At some point you will want to distribute or deploy your JavaFX application. To
    handle the numerous application packaging and deployment strategies, Oracle’s
    Java team has created a Java Packager tool to assist developers in building, packaging,
    and deploying their applications. To learn more about how to use Java Packager
    tool, see Oracle’s “Deploying JavaFX Applications” at the following URL:


    [`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/javapackager.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/javapackager.html)


    To give you a taste of the Java Packager tool''s capabilities, I will show you
    how to package the `HelloWorld` classes into a single executable file for the
    many supported platforms. This will allow users to double-click to launch or install
    the application on the native operating system. The following commands will automatically
    compile and generate executables, launchers, and installers located in `~/projects/helloworld/dist/bundles`
    directory. Type the following to create deployable Java applications.


    ```

    $ cd ~/projects/helloworld

    $ javapackager -makeall -appclass org.acme.helloworld.HelloWorld -name hellothere

    ```


    Table [1-3](#A323804_3_En_1_Chapter.html#Tab3) describes the common options and
    switches that are used in building distributable JavaFX executable application
    bundles.


    **Table 1-3.** Common JavaPackager Options to Build an Executable `jar`


    | Option/Switch | Example | Description |

    | --- | --- | --- |

    | `-createjar` | `--` | Creates a JavaFX `jar` executable application. |

    | `-appclass` | `org.acme.helloworld.HelloWorld` | Specifies the fully qualified
    name of the class containing the `main()` method. |

    | `-srcdir` | `.` | The top-level location of the parent directory holding the
    compiled classes (current directory). |

    | `-outdir` | `out` | The destination where the packaged `jar` file will be created.
    |

    | `-outfile` | `helloworld.jar` | Specifies the name of the executable `jar` file.
    |

    | `-v` | `--` | Allows verbose displays logging information when executing `javapackager`.
    |

    | `-native` | `dmg` | JavaPackager can create installer, `image`, `exe`, `msi`,
    `dmg`, `rpm`, and `deb` file extensions as deployable executables on the native
    OS platform. |

    | `-makeall` | | Based on the OS the packager tool will build installers and executables.
    For example, for the MacOS X platform, the `dist/bundle` directory will contain
    executables with file extensions of the following: `jnlp`, `dmg`, `app`, `pkg`,
    and `jar`. |


    To run the `jar` executable on the command line, you simply type the following
    and press Enter:


    ```

    $ java -jar dist/bundles/dist.jar

    ```


    To launch `HelloWorld` as a standalone application on the MacOS X operating system,
    just double-click on the `hellothere`-1.0.dmg or `hellothere`-1.0.pkg application
    file in the `bundles` directory, as shown in Figure [1-32](#A323804_3_En_1_Chapter.html#Fig32).


    ![A323804_3_En_1_Fig32_HTML.jpg](A323804_3_En_1_Fig32_HTML.jpg)


    **Figure 1-32.** Java Packager creates executables and installers of the `HelloWorld`
    application named `hellothere`. Other application bundles exist, such as `hellothere-1.0.dmg`,
    to install the application correctly on the MacOS X desktop.


    There are many ways to package and deploy JavaFX applications. To learn more,
    see Oracle’s “Java Packager Guide” at the following URL:


    [`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/javapackager.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/javapackager.html)


    Also see the following, related articles:


    *   “Lesson: Deploying Self-Contained Applications” [`http://docs.oracle.com/javase/tutorial/deployment/selfContainedApps/index.html`](http://docs.oracle.com/javase/tutorial/deployment/selfContainedApps/index.html)

    *   “Self-Contained Application Packaging” [`https://docs.oracle.com/javase/8/docs/technotes/guides/deploy/self-contained-packaging.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/deploy/self-contained-packaging.html)

    *   “Java Web Start Application” [`https://docs.oracle.com/javase/tutorial/deployment/webstart/index.html`](https://docs.oracle.com/javase/tutorial/deployment/webstart/index.html)


    ## Downloading the Book’s Source Code


    To get the source code for the book’s examples, you can go to two places:


    *   Apress book’s site at [`http://www.apress.com/us/services/source-code`](http://www.apress.com/us/services/source-code)

    *   GitHub at [`https://github.com/carldea/jfx9be`](https://github.com/carldea/jfx9be)


    ## Summary


    So far you have managed to download and install Java 9 JDK, Gradle, and NetBeans
    IDE. After successfully installing the prerequisite software, you created a JavaFX
    `HelloWorld` GUI application through the NetBeans IDE. Then you were able to use
    a text editor to enter your source code and eventually compile and run the binary
    class via a command-line prompt (the terminal window). Another method you learned
    was the use of the Gradle Build tool to compile and launch the JavaFX application
    using tasks.


    After learning three methods for compiling, building, and running a JavaFX application,
    you went through a quick code walkthrough of the `HelloWorld.java` source file.
    You also learned to package a JavaFX application as a standalone `jar`, `dmg`,
    `pkg`, and `jnlp` executable using the JavaFX Packager tool. Lastly, you learned
    that you have two places to obtain the source code for the book.


    Next, in Chapter [2](#A323804_3_En_2_Chapter.html), you learn what’s new in JDK
    9 regarding project Jigsaw. If you understand JDK 9’s modularity and are impatient,
    you can go to Chapter [3](#A323804_3_En_3_Chapter.html) to learn the fundamentals
    of JavaFX 9, such as drawing and coloring shapes as well as drawing text and changing
    text fonts.'
