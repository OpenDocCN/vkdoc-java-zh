    ### Java 简易串行连接器


    Java 简易串行连接器（jSSC）由 Alexey Sokolov 开发，采用 GNU Lesser GPL 许可证。截至撰写本文时，最新版本（jSSC-2.8.0）于
    2014 年 1 月发布，该库被选为 Arduino IDE（从 1.5.6 版本开始）中替代 RXTX 的库。


    jSSC 适用于所有平台和操作系统。你会注意到它比 RXTX 更快，并且修复了多个错误。jSSC 以一个简单的 JAR 文件形式提供，其中包含了所有必要的本地文件，因此你无需处理本地安装，它会在运行时自动将这些文件添加到类路径中。


    包含最新版本的 JAR 文件可从 [`https://github.com/scream3r/java-simple-serial-connector/releases`](https://github.com/scream3r/java-simple-serial-connector/releases)
    下载。如果你在 NetBeans 中将其添加为库或打开它，你将看到它的类（`jssc` 包）和本地内容（`libs` 包）。


    ## JavaFX、图表 API 和方向


    在接下来的示例中，你将学习如何设计一个简单的 JavaFX 应用程序，该程序从 Arduino 板获取方向读数并将其显示在图表中。为清晰起见，该示例使用了两个类——一个用于串行读数（如清单
    12-2 所示），另一个用于图表和 JavaFX 舞台（如清单 12-3 所示）。


    你将通过使用一个 `StringProperty` 来绑定这些类（`Serial` 和 `OrientationFX`），该属性包含从串行端口读取的最后一行。通过监听
    JavaFX 线程中此属性的变化，你将知道何时有新的读数需要添加到图表中。


    ### 创建模块项目


    让我们从在 NetBeans 中创建一个模块项目开始，如图 12-19 所示。设置项目名称 `OrientationFX` 时，请确保选择 JDK 9 平台，如图
