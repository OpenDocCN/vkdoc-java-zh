    ### 代码解释


    清单 4-34 中的 JavaFX 应用程序模拟了一个登录对话框窗口，允许用户输入有效密码。该代码主要通过重用之前清单 4-27 中展示的 `User` 类，演示了如何将
    JavaFX JavaBeans 属性与 UI 控件进行绑定。


    在开始代码讲解之前，我想提一下清单 4-34 与本书第二版第 3 章之间的区别。与旧版代码示例的主要区别在于，旧版完全使用 Java 代码实现，而新版则结合了
    Java 代码和 JavaFX CSS 样式。在本章中，你会看到这个示例被分成了两个文件——一个在清单 4-34（Java 代码）中，另一个在清单 4-35（JavaFX
    CSS 文件）中。我特意这样做，是为了让你能够专注于与本章主题（如 Lambda 表达式、属性等）相关的代码。如果你不理解应用于 UI 控件的 [JavaFX
    CSS](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)
    样式，请不要担心，我将在第 15 章“自定义用户界面”中详细解释。


    那么，让我们开始讲解这个登录对话框示例，首先描述类成员变量，然后查看代码的主体部分。

    '
- fmt: '### Class Member Variables


    I’ll begin by describing the class variables. The variable `MY_PASS` contains
    a hardcoded string of the password of “`password1`”. Next, the `GRANTED_ACCESS`
    variable is declared of type `SimpleBooleanProperty` class, which by default has
    a value of `false`. This variable will be later bound to the green checkmark (`grantedIcon`)
    icon node’s `visible` property. Basically, as the user enters the correct keystrokes
    for the password, the `GRANTED_ACCESS` will become `true`, which will trigger
    the setting of the green checkmark icon node’s `visible` property to `true`, thus
    displaying the icon in the scene graph. When the password is incorrect, the `visible`
    property becomes `false`, which hides the green checkmark node (`Region`). The
    constant variable `MAX_ATTEMPTS` is the maximum number of login attempts the users
    can try. Lastly, the `ATTEMPTS` variable of type `IntegerProperty` holds the current
    number of login attempts the user has made.


    ### The `start()` Method


    The `start()` method is where the JavaFX application thread’s lifecycle begins
    setting up the stage, scene, and children nodes to be displayed. In the `start()`
    method, a `User` object is created to be used as the domain object to be synchronized
    with the GUI form. To see the code for the `User` class, refer to Listing [4-26](#A323804_3_En_4_Chapter.html#Par124).
    Next, the stage is set to be transparent by invoking the `Stage.initStyle(StageStyle.TRANSPARENT)`
    method. This will allow you to create translucent and irregularly shaped windows
    without the decoration of the native OS title bar and borders surrounding the
    main content. You’ll also notice the statement `setAlwaysOnTop(true)`, which will
    cause the `Stage` (dialog window) to be on top of all other application windows
    on the desktop. For convenience, the following code is repeated, showing you how
    to enable your `Stage` window to be transparent and to appear on top of all other
    application windows.


    ```

    primaryStage.initStyle(StageStyle.TRANSPARENT);

    primaryStage.setAlwaysOnTop(true);

    ```


    After the code initializes the stage, a [`Scene`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Scene.html)
    object is created with a root node of type [`Group`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Group.html)
    that will allow children nodes to be added. A JavaFX `Group` node is a simple
    fixed size parent container. Later in the book, you will learn about other layout
    parent containers that are capable of resizing dynamically. For now, the `Group`
    node is used for this simple example that has very few children nodes.


    Back to the root node, even though the root node is transparent, a rectangular
    background will need to be created to act as the surface to put the controls on
    top of. The rectangular background will need to be the same size as the defined
    `Scene` (logon screen) object. The following code snippet is the creation of a
    `Scene` object having a `Group` node as its root node with a background fill color
    of `null`, thus making the window transparent.


    ```

    Scene scene = new Scene(root, 320, 112, null);

    ```


    The rectangular background of the logon screen is actually a rounded rectangle
    ([`Rectangle`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Rectangle.html))
    having an arc height and width of 15 pixels with a fill color of black with an
    opacity level of 55%. All styling information is located in the file `style.css`
    shown in Listing [4-35](#A323804_3_En_4_Chapter.html#Par168). To apply JavaFX
    CSS, the code will load a CSS file located in your application’s `resources` directory.
    The following code snippet demonstrates loading and applying the stylesheet definitions
    to the scene.


    ```

    // load style.css to style JavaFX nodes

    scene.getStylesheets()

    .add(getClass()

    .getResource("/style.css")

    .toExternalForm());

    ```


    To give things a consistent look, the code declares a `common-foreground-color`
    CSS variable, containing a color of white with an opacity of 90% percent. To see
    the full `style.css` file’s CSS styling definitions, check out the earlier mentioned
    source code from Listing [4-35](#A323804_3_En_4_Chapter.html#Par168).


    Continuing with Listing [4-34](#A323804_3_En_4_Chapter.html#Par159), inside the
    `start()` method after setting up the initial rectangular background surface,
    the code creates a [`Label`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/control/Label.html)
    node that will represent the user’s username as a read-only field (per the `User`
    class). To obtain the user’s real username, the code calls Java’s `System.getProperty("user.name")`
    method. The label node is set up with a 30 point Helvetica font having a fill
    color of the `common-foreground-color` (white) attribute. The label node’s `text`
    property is bound to the `User` object’s read-only `userName` property using the
    `bind()` method. A JavaFX `Label` node was used to represent the user’s username
    field. The field can tend to be wider than the width of the parent container’s
    maximum width due to a long text string. Because of this, when a JavaFX `Label`’s
    text length exceeds the allowed width, the text on the label will be shortened
    and end with an ellipsis.


    Next, the code creates an `HBox` layout pane node that will hold the `Label` node
    (`username`). The `HBox` (`userNameCell`) will be binding its max and preferred
    width property by using the JavaFX properties fluent API to ensure that it doesn’t
    hog up all the horizontal space and allow the padlock icon to have room to be
    placed beside it. Figure [4-3](#A323804_3_En_4_Chapter.html#Fig3) shows the padlock
    icon in the upper-right corner of the logon dialog window. The following code
    snippet shows an `HBox` containing the `TextNode` (`username`) from Listing [4-34](#A323804_3_En_4_Chapter.html#Par167).


    ```

    // wrap text node

    HBox userNameCell = new HBox();

    userNameCell.getChildren().add(userName);

    userNameCell.prefWidthProperty()

    .bind(primaryStage.widthProperty()

    .subtract(45));

    ```


    I’ve mentioned very little about the [`HBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/HBox.html)
    layout control here, because it will be discussed further in Chapter [5](#A323804_3_En_5_Chapter.html),
    which covers layouts and the Scene Builder tool. In the prior edition of this
    book, I created the padlock icon using a JavaFX `SVGPath` node; however, to separate
    nodes from their styling definitions, you have to use a `Region` node instead
    of the `SVGPath` node. When using an `SVGPath` node and specifying its SVG path
    notation text, you will find out that it can only be done programmatically (Java
    code) by using the `setContent()` method. In order to mimic an `SVGPath` node,
    but have the SVG path notation code reside in the CSS styling file, you will have
    to employ the `Region` node.


    A `Region` node is a very versatile node that is typically used as a base class
    for many resizable parent container nodes used in JavaFX layout nodes. The [`Region`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Region.html)
    node has a plethora of CSS styling attributes that enable you to not only style
    borders and backgrounds, but interestingly enough also specify an SVG path notation
    to create custom shapes. Looking at Listing [4-34](#A323804_3_En_4_Chapter.html#Par167)
    you will see the SVG path notation specified to draw the various shaped icons.
    When specifying the SVG path notation as a value, you will notice the `-fx-shape`
    attribute being used.'
