  trans: "\n显示 BorderPane 区域层次的文档结构  \n2.  将一个 `GridPane` 容器拖入 BorderPane 的中心区域，如图\
    \ 5-12 所示。图 5-13 展示了将 `GridPane` 节点拖放至 `BorderPane` 节点中心区域后的效果。请注意，编号的列和行是零相对单元格，允许您将元素拖入其中。由于\
    \ `BorderPane` 的中心区域会占据所有可用的宽度和高度，因此当将 `GridPane` 放置到中心区域时，`GridPane` 的宽度和高度将会拉伸。\n\
    \n![A323804_3_En_5_Fig13_HTML.jpg](img/A323804_3_En_5_Fig13_HTML.jpg)\n\n图 5-13.\n\
    \n位于 BorderPane 中心区域的 GridPane\n\n![A323804_3_En_5_Fig12_HTML.jpg](img/A323804_3_En_5_Fig12_HTML.jpg)\n\
    \n图 5-12.\n\n将 GridPane 节点拖放到 BorderPane 节点的中心区域  \n3.  在配置 `GridPane` 之前，您需要重新配置\
    \ `BorderPane` 的首选宽度和最大宽度，以允许 `GridPane` 占据可用的水平空间。通过在画布区域左下角的“层次结构”选项卡中选择 `BorderPane`\
    \ 节点。接下来，在画布区域的右侧是“布局”选项卡（位于“属性”下），您将更改 `BorderPane` 的“首选宽度”和“最大宽度”属性。图 5-14 显示了\
    \ `BorderPane` 节点的首选宽度和最大宽度设置。确保首选宽度为 `USE_COMPUTED_SIZE`，最大宽度设置为 `MAX_VALUE`。这允许\
    \ `GridPane` 节点及其子节点在调整 JavaFX 舞台窗口大小时有机会水平增长（拉伸）。\n\n![A323804_3_En_5_Fig14_HTML.jpg](img/A323804_3_En_5_Fig14_HTML.jpg)\n\
    \n图 5-14.\n\nBorderPane 的首选宽度和最大宽度属性设置允许 GridPane 水平拉伸  \n4.  将 GridPane 布局的水平间距和垂直间距设置为\
    \ 5 像素，并将内边距设置为 5 像素。内边距和间距设置位于画布区域右侧的“布局”选项卡部分（见图 5-15）。接下来，您将配置 GridPane 节点第一列和第二列的约束。如果您还记得，第一列将包含标签，第二列将包含我们表单的文本字段。\n\
    \n![A323804_3_En_5_Fig15_HTML.jpg](img/A323804_3_En_5_Fig15_HTML.jpg)\n\n图 5-15.\n\
    \nGridPane 布局的属性配置，内边距、Hgap 和 Vgap 均设置为 5 像素  \n5.  配置 `GridPane` 的列约束。要配置列约束，您首先选择图\
    \ 5-16 中所示的列标题零 (0)。然后在 `Layout: ColumnConstraints` 属性表下配置宽度。对于最小宽度和最大宽度，使用下拉菜单中的\
    \ `USE_PREF_SIZE` 选项。在首选宽度中，输入 100。这意味着该列不会拉伸，因为其最小和最大宽度将设置为首选宽度。\n\n![A323804_3_En_5_Fig16_HTML.jpg](img/A323804_3_En_5_Fig16_HTML.jpg)\n\
    \n图 5-16.\n\n将 GridPane 的第一列（零相对）约束设置为首选宽度 100  \n6.  配置第二个 `GridPane` 的列约束。要配置列约束，您选择图\
    \ 5-17 中所示的列标题一 (1)。选择后，在 `Layout: ColumnConstraints` 属性表下配置宽度。\n\n![A323804_3_En_5_Fig17_HTML.jpg](img/A323804_3_En_5_Fig17_HTML.jpg)\n\
    \n图 5-17.\n\n正在配置 GridPane 第二列的约束 将最小宽度、首选宽度和最大宽度分别设置为 50、150 和 300。您还应该将 `Hgrow`\
    \ 属性设置为 always。  \n7.  配置 `GridPane` 的行约束。与选择列标题类似，您将选择行标题零（左侧），如图 5-18 所示。不要只选择一行，请按住\
    \ Shift 键并鼠标单击行标题 0、1 和 2，如图 5-18 所示。目标是一次性设置所有三个行约束。您将设置这三行的首选高度，该高度将尊重放置其中的\
    \ UI 元素。例如，当标签被放置到行单元格中时，标签的高度将用作该单元格行的高度。为最小高度和最大高度属性选择 `USE_PREF_SIZE`。为首选高度属性输入\
    \ 30。\n\n![A323804_3_En_5_Fig18_HTML.jpg](img/A323804_3_En_5_Fig18_HTML.jpg)\n\
    \n图 5-18.\n\n设置 GridPane 三行的行高约束。最小高度和最大高度属性设置为 USE_PREF_SIZE。首选高度属性设置为 30。  \n\
    8.  在占据第一列和第一行的单元格中创建“名字”标签。从“库”下的“控件”部分将一个标签拖到网格窗格的第一列和第一行单元格中。此标签将是“名字”。图 5-19\
    \ 显示了在“属性”选项卡子部分中将文本属性设置为“名字”。\n\n![A323804_3_En_5_Fig19_HTML.jpg](img/A323804_3_En_5_Fig19_HTML.jpg)\n\
    \n图 5-19.\n\n正在将“名字”标签添加到第一列和第一行单元格。您会注意到在“属性”选项卡下，您将为标签输入文本。  \n9.  将标签的水平对齐方式\
    \ (Halignment) 设置为右对齐。在图 5-20 中，通过转到“布局”选项卡子部分下的“属性表”来设置标签的水平对齐方式。\n\n![A323804_3_En_5_Fig20_HTML.jpg](img/A323804_3_En_5_Fig20_HTML.jpg)\n\
    \n图 5-20.\n\n将 GridPane 单元格中标签的水平对齐方式设置为右对齐。在“布局：标签（网格窗格约束）”下，Halignment 设置为 RIGHT。\
    \  \n10. 重复步骤 8-9，为第二行第一列设置“姓氏”标签。在菜单选项中，选择“预览” ➤ “在窗口中显示预览”。图 5-21 显示了当前 UI 元素在窗口中的预览效果。\n\
    \n![A323804_3_En_5_Fig21_HTML.jpg](img/A323804_3_En_5_Fig21_HTML.jpg)\n\n图 5-21.\n\
    \n预览窗口显示到目前为止的进度——两个标签，在第一列水平右对齐  \n11. 将文本字段 UI 元素拖放到单元格 1,0 和单元格 1,1 中，这两个单元格分别代表名字和姓氏文本字段。您还需要将一个\
    \ JavaFX `Button` 节点拖到第二列第三行单元格。当您预览工作时，UI 应如图 5-22 所示。\n\n![A323804_3_En_5_Fig22_HTML.jpg](img/A323804_3_En_5_Fig22_HTML.jpg)\n\
    \n图 5-22.\n"
- fmt: "The preview window of the UI elements laid out onto the `GridPane`.\n\n12.\
    \ Save the UI into an FXML file. In the File menu, select Save As and save it\
    \ into a Java project’s resource directory or into the `src` directory. Scene\
    \ Builder allows you to save the UI into a file format called FXML having the\
    \ file extension of `.fxml`. Save the file as `ContactForm.fxml`. Later, you will\
    \ create code that will load the FXML file to be displayed and perform actions\
    \ on UI elements. This file should be placed in a Java projects resources directory—such\
    \ as `src/main/resources/ContactForm.xml`. (You can create one folder to hold\
    \ all three files for the project if you aren’t using build tools such as Gradle\
    \ or Maven. If you compile on the command line, make sure the FXML file is copied\
    \ to the root classpath.) At this point, the current file (`ContactForm.fxml`)\
    \ does not reference a Controller class or UI elements with the `fx:id` attributes.\
    \ In a later step when you’ve created a Controller class, you will update the\
    \ UI through Scene Builder and save the FXML file again.\n\n![A323804_3_En_5_Fig23_HTML.jpg](A323804_3_En_5_Fig23_HTML.jpg)\n\
    \nFigure 5-23. The Save As window to save FXML file\n\n```\nListing 5-8.\n   \
    \ The ContactForm.fxml File Representing the Contact Form UI View Created Using\
    \ Scene Builder\n```\n\n13. Create a Controller class that provides handler code\
    \ for UI elements. Create a class called `ContactFormController.java` in the same\
    \ directory as your main application code `FXMLContactForm.java` (see step 19).\
    \ Enter the code from Listing [5-9](#A323804_3_En_5_Chapter.html#Par95) into a\
    \ file called `ContactFormController.java`. In the code you’ll notice `@FXML`\
    \ annotations used in the code that are prefixed on properties and methods. These\
    \ annotations allow the JavaFX platform to bind FXML UI elements to controller\
    \ properties such as `TextField`s and `Button`s. Methods in controllers can also\
    \ be prefixed with a `@FXML` annotation to indicate handler code capable of being\
    \ bound to an action (event) such as a mouse press. This binding facility is a\
    \ mechanism called dependency injection. The FXML loader will resolve the references\
    \ during runtime, essentially wiring up UI elements to the handler code in the\
    \ Controller class. Later on, you will use Scene Builder to associate the Save\
    \ button with the controller. There you will notice that the Save button’s `OnAction`\
    \ property will invoke the `saveContactAction()` method shown in listing [5-9](#A323804_3_En_5_Chapter.html#Par95).\n\
    \n```\n    package com.jfxbe;\n    import javafx.event.ActionEvent;\n    import\
    \ javafx.fxml.FXML;\n    import javafx.scene.control.TextField;\n    /**\n   \
    \ *\n    */\n    public class ContactFormController {\n    @FXML private TextField\
    \ firstNameField;\n    @FXML private TextField lastNameField;\n    @FXML\n   \
    \ protected void saveContactAction(ActionEvent event) {\n    System.out.println(\"\
    Saving the following information: \");\n    System.out.println(\"First Name: \"\
    \ + firstNameField.getText());\n    System.out.println(\" Last Name: \" + lastNameField.getText());\n\
    \    }\n    }\n    Listing 5-9.\n    The ContactFormController Class Uses the\
    \ Annotation to Reference UI Elements Within the FXML File\n```\n\n14. Assign\
    \ a Controller class to the `ContactForm.fxml` through the Scene Builder tool.\
    \ Assuming you’ve loaded the previously created UI, navigate to the Controller\
    \ class field located under the Controller tab, which is under the Document tab\
    \ on the left side. Enter the fully qualified class name as `com.jfxbe.ContactFormController`\
    \ (assuming you have a package namespace). Figure [5-24](#A323804_3_En_5_Chapter.html#Fig24)\
    \ shows the field to reference the Controller class. Notice just below the Controller\
    \ class field there is a table called `Assigned fx:id` that consists of `assigned\
    \ fx:id` entries. The table is currently blank, but in the next step you will\
    \ be assigning a `fx:id` name for components, such as the first name and last\
    \ name text field controls (UI elements).\n\n![A323804_3_En_5_Fig24_HTML.jpg](A323804_3_En_5_Fig24_HTML.jpg)\n\
    \nFigure 5-24. Setting the Controller class that references the Contact Form UI\
    \ (`ContactForm.fxml`)\n\n15. Add `fx:id` name to each UI element in Scene Builder.\
    \ Assuming you’ve already referenced the recently created Controller class as\
    \ `com.jfxbe.ContactFormController`, update the UI element’s `fx:id` by selecting\
    \ the UI control on the canvas or the Hierarchy section. After selecting the control,\
    \ go to the right side of the Scene Builder tool under the subsection code and\
    \ enter `firstNameField` into the `fx:id` field property, as shown in Figure [5-25](#A323804_3_En_5_Chapter.html#Fig25).\n\
    \n![A323804_3_En_5_Fig25_HTML.jpg](A323804_3_En_5_Fig25_HTML.jpg)\n\nFigure 5-25.\
    \ Setting the `fx:id` name referencing the first name text field. This will allow\
    \ the Controller class to access the text field.\n\n16. Repeat Step 15 for the\
    \ last name field. The last name field’s `fx:id` is called `lastNameField`.\n\n\
    17. Bind the action code to the Save button, as seen in Figure [5-26](#A323804_3_En_5_Chapter.html#Fig26).\
    \ Similar to Steps 15 and 16, select the Save button’s UI element and navigate\
    \ to its Code subsection to enter an `fx:id` name as `saveButton`. Next, you will\
    \ set the `OnAction` property to `saveContactAction`. Don’t forget to save the\
    \ UI (FXML). If you recall from Listing [5-9](#A323804_3_En_5_Chapter.html#Par95)\
    \ in Step 13, the `ContactFormController.java` file contains the `saveContactAction()`\
    \ method.\n\n![A323804_3_En_5_Fig26_HTML.jpg](A323804_3_En_5_Fig26_HTML.jpg)\n\
    \nFigure 5-26. Setting the `OnAction` property to invoke the `saveContactAction`\
    \ function for the Save button\n\n18. Preview the contact form one last time.\
    \ Figure [5-27](#A323804_3_En_5_Chapter.html#Fig27) shows a display of the preview\
    \ window of the `ContactForm.fxml` file.\n\n![A323804_3_En_5_Fig27_HTML.jpg](A323804_3_En_5_Fig27_HTML.jpg)\n\
    \nFigure 5-27. Previewing the contact form from the Scene Builder tool\n\n19.\
    \ Create a main JavaFX application class that will load the FXML to be displayed\
    \ onto the scene. Listing [5-10](#A323804_3_En_5_Chapter.html#Par102) shows the\
    \ `FXMLContactForm.java` file. If you are coding from scratch, co-locate all three\
    \ files in the same directory (FXML file, Controller class, and application class).\n\
    \n```\n    package com.jfxbe;\n    import javafx.application.Application;\n  \
    \  import javafx.fxml.FXMLLoader;\n    import javafx.scene.Parent;\n    import\
    \ javafx.scene.Scene;\n    import javafx.scene.paint.Color;\n    import javafx.stage.Stage;\n\
    \    import java.io.IOException ;\n    /**\n    * The FXMLContactForm application\
    \ that loads an FXML view\n    * to be displayed.\n    */\n    public class FXMLContactForm\
    \ extends Application {\n    /**\n    * @param args the command line arguments\n\
    \    */\n    public static void main(String[] args) {\n    Application.launch(args);\n\
    \    }\n    @Override\n    public void start(Stage stage) {\n    stage.setTitle(\"\
    FXMLContactForm \");\n    Parent root = null;\n    try {\n    root = FXMLLoader.load(getClass().getResource(\"\
    /ContactForm.fxml\"));\n    } catch (IOException e) {\n    e.printStackTrace();\n\
    \    }\n    Scene scene = new Scene(root, 380, 150, Color.WHITE);\n    stage.setScene(scene);\n\
    \    stage.show();\n    }\n    }\n    Listing 5-10.\n    The Main JavaFX FXMLContactForm\
    \ Application\n```\n\n20. Build and run the application. Assuming all three files\
    \ are in the same directory location, navigate or change directory to the files’\
    \ directory location and then compile and run the code using these commands:\n\
    \n```\n    $ javac -d . *.java\n    $ java -cp . com.jfxbe.FXMLContactForm\n```\n\
    \n21. The UI should look like similar to Figure [5-28](#A323804_3_En_5_Chapter.html#Fig28).\
    \ To test the application, enter a first and last name into the text fields and\
    \ click on the Save button, then observe the console output.\n\n![A323804_3_En_5_Fig28_HTML.jpg](A323804_3_En_5_Fig28_HTML.jpg)\n\
    \nFigure 5-28. The JavaFX FXMLContactForm application\n\nThe following is output\
    \ to the console when the Save button is pressed."
