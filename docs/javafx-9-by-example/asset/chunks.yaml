    #### 运行示例应用程序


    编译完清单 6-6 后，您将需要从命令行运行示例应用程序。要运行该示例，您需要在类路径中包含 `FontAwesomeFX` 库，并将编译后的代码放入 `classpath`
    目录中。您会注意到，在 UNIX/MacOS/Linux 系统上，使用 `:` 作为分隔符来追加类路径的多个路径。在 Windows 系统上，则需要使用 `;`
    作为分隔符。以下命令将运行示例应用程序。


    ```

    java -cp classpath:lib/fontawesomefx-8.9.jar com.jfxbe.LabelAwesome

    ```


    运行示例后，图 6-6 显示了 `LabelAwesome` 应用程序的输出。`FontAwesomeFX` 库支持以下字体图标包：FontAwesome、Material
    Design、Material Icon 集、Oct Icon 集和 Weather Icon 集。要查看最新更新，请访问 Jens Deter 的网站：[`http://www.jensd.de/wordpress/?tag=fontawesome`](http://www.jensd.de/wordpress/?tag=fontawesome)。


