    }

    ```


    作为给性急读者的快速参考，表 10-1 包含了这些模块及其类的描述。我还在描述列中提供了一个简短的代码片段，说明如何使用与 JavaFX Web 和 HTTP2
    API 相关的各种 API。要查看与每个类相关的更详细讨论，您可以跳过表 10-1。


    表 10-1.


    Java 模块中包含的类描述


    | 模块名称 | 类名 | 描述 |

    | --- | --- | --- |

