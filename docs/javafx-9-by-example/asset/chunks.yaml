  raw: '### How It Works


    When the application starts, it creates an instance of `ArduinoChart`.


    ```

    @Override

    public void start(Stage primaryStage) throws Exception {

    arduinoChart = new ArduinoChart();

    ```


    Inside the `arduinoChart` class is a `LineChart`, with three series that take
    pairs of numbers to be plotted against each axis, which are `NumberAxis` instances.
    Several limits are defined for these series: the maximum number of points in each
    of them will be 300:


    ```

    private static final int SIZE_MAX = 300;

    private LineChart chart;

    private Series rollSeries, pitchSeries, yawSeries;

    private NumberAxis xAxis, yAxis;

    ```


    Then you create the chart, starting by creating both axes. For the `xAxis` to
    show formatted data, this example overrides the `toString()` method, so every
    long value in milliseconds will be written in `HH:mm:ss` format:


    ```

    public VBox createArduinoChart() {

    xAxis = new NumberAxis();

    xAxis.setLabel("Time");

    xAxis.setAutoRanging(true);

    xAxis.setForceZeroInRange(false);

    xAxis.setTickLabelFormatter(new StringConverter() {

    @Override

    public String toString(Number t) {

    return new SimpleDateFormat("HH:mm:ss")

    .format(new Date(t.longValue()));

    }

    @Override

    public Number fromString(String string) {

    throw new UnsupportedOperationException("Not supported yet.");

    }

    });

    yAxis = new NumberAxis();

    yAxis.setLabel("Angle (º)");

    ```


    Then it creates the chart by specifying its axes. It sets a few properties: `setCreateSymbols(true)`
    will plot a big white circle on every point of the series. You can adjust the
    default size and color with CSS. `setAnimated(false)` avoids the animation of
    the chart after adding any new point. Because you are plotting points at a high
    frequency, it’s better this way. For lower frequencies, on the other hand, you
    will set it to `true` to create a smooth transition effect. `setLegendVisible(true)`
    shows the legend with the series names:


    ```

    chart = new LineChart(xAxis, yAxis);

    chart.setCreateSymbols(true);

    chart.setAnimated(false);

    chart.setLegendVisible(true);

    chart.setTitle("Roll/Pitch/Yaw");

    ```


    You then create the three series, set the names for them (which will be displayed
    in the legend box), and add them to the `Data` chart, which is an `ObservableList`
    of `Series`:


    ```

    rollSeries = new Series();

    rollSeries.setName("Roll (º)");

    pitchSeries = new Series();

    pitchSeries.setName("Pitch (º)");

    yawSeries = new Series();

    yawSeries.setName("Yaw (º)");

    chart.getData().addAll(rollSeries, pitchSeries, yawSeries);

    ```


    Finally, the chart is added to a `VBox`, along with an `HBox` with the labels
    for the instant values:


    ```

    labelRoll = new Label();

    labelPitch = new Label();

    labelYaw = new Label();

    final HBox hBox = new HBox(new Label("Values: "), labelRoll, labelPitch, labelYaw);

    hBox.getStyleClass().add("box");

    final VBox vBox = new VBox(chart, hBox);

    vBox.getStyleClass().add("box");

    return vBox;

    }

    ```


    Back to the application class, a `listener` will be created to bind the presence
    of any new line on the serial port (corresponding to a reading of the orientation
    angles coming from the Arduino 101) with the action of adding these values as
    new pairs to the series. For that, you set the x coordinate value as the time
    when you add the reading in milliseconds (on the chart it will be formatted to
    `HH:mm:ss`) and the y coordinate value is a double measurement of any of the angles
    reported by the Arduino in the `String nv`. You parse the strings to double. For
    the yaw angle, you allow adding an offset value with a `TextField`, given that,
    after calibration, this angle is not always reset to 0°. Also, notice the minus
    sign for pitch and roll: It is due to the change of the coordinate system between
    Arduino and JavaFX.


    ```

    private final ChangeListener listener = (obs, ov, nv) -> {

    String[] split = nv.split("\\s");

    long time = Long.parseLong(split[0]);

    double offset = OFFSET_YAW;

    if (!textYaw.getText().isEmpty()) {

    try {

    offset = Double.parseDouble(textYaw.getText());

    } catch (NumberFormatException nfe) { }

    }

    double yaw = Double.parseDouble(split[1]) + offset;

    double pitch = - Double.parseDouble(split[2]);

    double roll = - Double.parseDouble(split[3]);

    ```


    By using `Platform.runlater()`, you can pass the values to `ArduinoChart`, to
    render them in the chart. This is mandatory, as the `Serial` task is running outside
    the JavaFX thread. With `Platform.runlater()`, not only do you place the task
    of filling the series with the incoming data in the JavaFX thread, but also you
    give to the Scene graph the required time to render the chart. Some of the angles
    might not be processed if the rate is too high.


    ```

    Platform.runLater(() -> {

    arduinoChart.processEvent(time, roll, pitch, yaw);

    });

    };

    ```


    As the series data could grow indefinitely, to avoid memory issues, you set a
    `SIZE_MAX` value of 300 points and remove the first values of the series if you
    exceed that limit.


    ```

    public void processEvent(long time, double roll, double pitch, double yaw) {

    rollSeries.getData().add(new Data(time, roll));

    labelRoll.setText("Roll: " + String.format("%3.2f º", roll));

    if (rollSeries.getData().size() > SIZE_MAX) {

    rollSeries.getData().remove(0);

    }

    pitchSeries.getData().add(new Data(time, pitch));

    labelPitch.setText("Pitch: " + String.format("%3.2f º", pitch));

    if (pitchSeries.getData().size() > SIZE_MAX) {

    pitchSeries.getData().remove(0);

    }

    yawSeries.getData().add(new Data(time, yaw));

    labelYaw.setText("Yaw: " + String.format("%3.2f º", yaw));

    if (yawSeries.getData().size() > SIZE_MAX) {

    yawSeries.getData().remove(0);

    }

    }

    ```


    Once you have the chart ready, you create the scene, add it to the stage, and
    finally display it. The example creates a `BorderPane`, so in the center you add
    the chart , and on the bottom you add a Label to show the connection status including
    the port name. Note the styling done to the root pane.


    ```

    BorderPane root = new BorderPane();

    final VBox chartBox = arduinoChart.createArduinoChart();

    chartBox.setPrefWidth(500);

    HBox center = new HBox(chartBox); //, arduino3D.createArduino3D());

    center.getStyleClass().add("box");

    center.setPrefHeight(500);

    root.setCenter(center);

    Scene scene = new Scene(root, 600, 600);

    scene.getStylesheets().add(OrientationFX

    .class.getResource("arduino.css").toExternalForm());

    primaryStage.setTitle("OrientationFX");

    primaryStage.setScene(scene);

    primaryStage.show();

    ```


    Finally, you add two buttons to start and stop the serial task, and the `textfield`
    to modify the yaw offset:


    ```

    Button buttonStart = new Button();

    buttonStart.setText("Start");

    buttonStart.setOnAction(e -> startSerial());

    Button buttonStop = new Button();

    buttonStop.setText("Stop");

    buttonStop.setOnAction(e -> stopSerial());

    textYaw = new TextField("" + OFFSET_YAW);

    HBox top = new HBox(buttonStart, buttonStop, new Label("Yaw Offset (º): "), textYaw);

    top.getStyleClass().add("box");

    root.setTop(top);

    ```


    In the `startSerial` method, you can try to open the serial port and start reading
    from it. The listener will be added to `serial.getLine()` and `connection` will
    be set to `true` in that case:


    ```

    private void startSerial(){

    if (serial == null) {

    serial = new Serial();

    }

    serial.getLine().addListener(listener);

    serial.connect();

    connection.set(!serial.getPortName().isEmpty());

    }

    ```


    Whenever the application is closed, you must remove the `listener` and call the
    `serial.disconnect()` method, to shut down the serial connection properly (see
    Listing [12-5](#A323804_3_En_12_Chapter.html#Par72)).


    ```

    private void stopSerial(){

    if (serial != null) {

    serial.disconnect();

    serial.getLine().removeListener(listener);

    connection.set(false);

    serial = null;

    }

    }

    ```'
