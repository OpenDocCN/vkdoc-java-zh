    ### 复选框


    复选框按钮控件是一种包含三种状态的开关型按钮——`checked`（已选中）、`unchecked`（未选中）和 `undefined`（未定义）。当复选框处于已选中状态时，控件会在方框内显示一个勾选标记；否则，它处于未选中状态，显示一个空方框。已选中和未选中状态由
    `selected` 属性控制。


    当状态为未定义时，控件会在方框内显示一个连字符标记。未定义状态通过名为 `setIndeterminate(true)` 的方法设置。当 indeterminate
    属性设置为 `true` 时，`selected` 属性将被忽略。如果你希望复选框允许用户循环切换这三种状态，可以使用 `setAllowIndeterminate(true)`
    方法将 `allowIndeterminate` 属性设置为 `true`。在图 6-7 中，展示了复选框的三种状态。


    ![A323804_3_En_6_Fig7_HTML.jpg](img/A323804_3_En_6_Fig7_HTML.jpg)


    图 6-7.


    复选框控件可以具有的三种状态


    某些用例涉及树形表格视图控件，其中父节点带有一个处于未定义状态（显示连字符）的复选框，并且有两个或更多子节点，其中至少有一个子节点处于未选中状态（selected
    等于 false），同时至少有一个子节点处于选中状态。


    注意


    通过使用 `setAllowIndeterminate(true)` 方法将 `allowIndeterminate` 属性设置为 `true`，复选框可以允许用户循环切换这三种状态。换句话说，当用户看到一个空的复选框（`selected=false`）时，他/她可以点击鼠标来选中该复选框（`selected=true`），然后再次点击使其变为未定义状态，显示为连字符（`indeterminate=true`）。


    在使用复选框时，最常见的场景通常涉及两种状态：`checked`（已选中）和 `unchecked`（未选中）。例如，打开或关闭灯光。清单 6-11 展示了模拟控制一个假设的灯光控制
    API 的代码，该 API 用于打开或关闭厨房灯光。


    ```

    CheckBox kitchenLights = new CheckBox("厨房灯光");

    lightControlManager.kitchenLights()

    .switchProperty()

    .bind(kitchenLights.selectedProperty());

    ```


