    ### 示例：使用表格管理老板与员工


    上一个示例在`ListView`中使用了字符串对象列表，而本节我们将使用通常称为 POJO（普通 Java 对象）的领域对象。请记住，在`ListView`和`TableView`控件中使用自定义领域对象时，需要为每一行或单元格定制对象字段的显示方式。


    作为`TableView`控件的示例，我创建了一个名为“老板与员工”的应用程序，如图 6-18 所示。该示例应用程序演示了如何填充一个`TableView`，其中包含一个基于从`ListView`控件（左侧）选择老板的可观察员工列表（`Person`类）。在图
    6-18 中，您还会注意到悬停在列表视图单元格（行）上时显示的工具提示。


    ![A323804_3_En_6_Fig18_HTML.jpg](img/A323804_3_En_6_Fig18_HTML.jpg)


    图 6-18.


    “老板与员工”应用程序的输出，演示了 JavaFX 的`ListView`和`TableView`控件。可观察列表将包含`Person`类的领域对象。


    #### 领域对象


    在深入探讨主 GUI 代码之前，我们先研究一下代表一个人（`Person`）的领域对象，在本例中即老板或员工。清单 6-27 展示了一个 JavaFX bean（`Person`类）的实现，它代表将在`ListView`和`TableView`控件中显示的老板或员工。一个`Person`实例将包含以下属性：`aliasName`、`firstName`、`lastName`和`mood`。一个人还拥有一个员工列表，用于保存下属员工（手下）。处理列表视图选择以及填充表格视图功能的
    GUI 代码见清单 6-28。


    ```

    public class Person {

    public enum MOOD_TYPES {

    Happy,

    Sad,

    Angry,

    Positive

    }

    private StringProperty aliasName;

    private StringProperty firstName;

    private StringProperty lastName;

    private ObjectProperty mood;

    private ObservableList employees = FXCollections.observableArrayList();

    public Person(String alias, String firstName, String lastName, MOOD_TYPES mood)
    {

    setAliasName(alias);

    setFirstName(firstName);

    setLastName(lastName);

    setMood(mood);

    }

    public final void setAliasName(String value) {

    aliasNameProperty().set(value);

    }

    public final String getAliasName() {

    return aliasNameProperty().get();

    }

    public StringProperty aliasNameProperty() {

    if (aliasName == null) {

    aliasName = new SimpleStringProperty();

    }

    return aliasName;

    }

    public final void setFirstName(String value) {

    firstNameProperty().set(value);

    }

    public final String getFirstName() {

    return firstNameProperty().get();

    }

    public StringProperty firstNameProperty() {

    if (firstName == null) {

    firstName = new SimpleStringProperty();

    }

    return firstName;

    }

    public final void setLastName(String value) {

    lastNameProperty().set(value);

    }

    public final String getLastName() {

    return lastNameProperty().get();

    }

    public StringProperty lastNameProperty() {

    if (lastName == null) {

    lastName = new SimpleStringProperty();

    }

    return lastName;

    }

    public final void setMood(MOOD_TYPES value) {

    moodProperty().set(value);

    }

    public final MOOD_TYPES getMood() {

    return moodProperty().get();

    }

    public ObjectProperty moodProperty() {

    if (mood == null) {

    mood = new SimpleObjectProperty(MOOD_TYPES.Happy);

    }

    return mood;

    }

    public ObservableList employeesProperty() {

    return employees;

    }

    }

    清单 6-27.

    在可观察列表中用作 JavaFX Bean 的 Person 类

    ```


    #### GUI 代码


    现在您已经了解了领域对象（`Person`）的参与，让我们来看看填充和显示数据的 GUI 代码。清单 6-28 展示了`BossesAndEmployees.java`文件，其中包含填充代表老板的`ListView`控件的主要
    GUI 代码。其余代码还负责在用户选择某个老板时，填充右侧的`TableView`控件。


    在清单 6-28 中，GUI 代码以编程方式布局控件，而非通过 Scene Builder 工具使用 FXML。本章的代码示例主要采用编程方式，这通常被认为是不良实践，因为
    GUI 代码与控制器代码耦合在一起。然而，我认为依赖工具构建 GUI 代码往往会隐藏内部机制，从而阻碍您学习底层实际工作原理。要了解如何使用 FXML 视图和控制器类，请参阅关于布局和
    Scene Builder 的第 5 章。

