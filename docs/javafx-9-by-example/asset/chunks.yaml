    代码清单 7-23.

    photo-viewer.css 文件包含各种 UI 元素的 JavaFX CSS 选择器和样式定义

    ```


    代码清单 7-23 的其余部分展示了使用伪类来处理鼠标悬停（`:hover`）状态的 CSS 选择器，当鼠标光标进入或离开节点时触发。当鼠标悬停在上一张和下一张箭头按钮上时，按钮会应用蓝色发光效果。在第
    15 章中，你将有机会了解更多关于类选择器和伪类状态的内容。


    好了，这就是一个功能完善的 Photo Viewer 应用程序，能够对图像进行缩放、旋转和更改颜色设置。为了在图形主题上获得更多乐趣，下一节将介绍 JavaFX
    动画 API。


    ## 动画


    动画是图像随时间变化时产生运动错觉的效果。类似于卡通翻页书，每一页代表一个帧或图片，它们会在时间线上显示一段时间（持续时间）。在 JavaFX 中，你将使用动画
    API（[`javafx.animation`](https://docs.oracle.com/javase/8/javafx/api/javafx/animation/Animation.html)
    `.*`）。在本节中，你将学习关键值、关键帧、时间线和过渡。最后，为了演示动画 API，你将探索一个经过略微修改并增加了增强功能的 Photo Viewer
    应用程序。


    ### 什么是关键值？


    JavaFX 动画 API 允许你组装定时事件，这些事件可以在基于属性的值之间进行插值，从而产生动画效果。例如，要产生淡出效果，你可以针对节点的透明度属性，使其值在一段时间内从
    1（完全不透明）插值到 0（透明）。代码清单 7-24 定义了一个 `KeyValue` 实例，它针对矩形节点的透明度属性，从 1 开始，以值 0 结束。默认情况下，`KeyValue`
    对象将使用线性插值器。


    ```

    Rectangle Rectangle rectangle = new Rectangle(0, 0, 50, 50);

    KeyValue keyValue = new KeyValue(rectangle.opacityProperty(), 0);

    代码清单 7-24.

    一个 KeyValue 对象，通过将透明度属性从 1 插值到 0 来实现淡出效果

    ```


    `KeyValue` 对象实际上并不进行插值，它只是定义了要进行插值的属性的起始值和结束值。此外，`KeyValue` 可以使用不同类型的插值器来定义，例如线性、缓入或缓出。例如，代码清单
    7-25 定义了一个关键值，它将使用 `Interpolator.EASE_OUT` 插值器，将一个矩形从左向右移动 100 像素。缓出会在到达结束关键值之前减慢移动速度。


    ```

    Rectangle rectangle = new Rectangle(0, 0, 50, 50);

    KeyValue keyValue = new KeyValue(rectangle.xProperty(), 100, Interpolator.EASE_OUT);

    代码清单 7-25.

    一个 KeyValue 对象，使用插值器将矩形从左向右移动 100 像素，该插值器在接近结束值时开始减速

    ```


    请访问 Javadocs 文档以了解可用的插值器（[`javafx.animation.Interpolator`](https://docs.oracle.com/javase/8/javafx/api/javafx/animation/Interpolator.html)）。默认情况下，未指定插值器的
    `KeyValue` 构造函数将使用线性插值（`Interpolator.LINEAR`），它会在一段时间内均匀分布这些值。


    ### 什么是关键帧？


    当动画（[`javafx.animation.Timeline`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)）发生时，每个称为关键帧（一个
    `KeyFrame` 对象）的定时事件负责在一段时间（[`javafx.util.Duration`](https://docs.oracle.com/javase/8/javafx/api/javafx/util/Duration.html)）内对关键值（`KeyValue`
    对象）进行插值。创建 `KeyFrame` 对象时，构造函数需要一个定时持续时间来对关键值进行插值。`KeyFrame` 构造函数都通过使用包含参数列表的变量或
    `KeyValue` 对象的集合来接受一个或多个关键值。


    为了演示将矩形沿对角线方向从左上角移动到右下角，代码清单 7-26 定义了一个关键帧，其持续时间为 1000 毫秒，并包含两个表示矩形 x 和 y 属性的关键值。


    ```

    Rectangle rectangle = new Rectangle(0, 0, 50, 50);

    KeyValue xValue = new KeyValue(rectangle.xProperty(), 100);

    KeyValue yValue = new KeyValue(rectangle.yProperty(), 100);

    KeyFrame keyFrame = new KeyFrame(Duration.millis(1000), xValue, yValue);

    代码清单 7-26.

    为矩形定义的关键帧，使其在一秒内沿对角线从左上角移动到右下角

    ```


    此示例定义了一个关键帧，用于在一秒或 1000 毫秒内将矩形的左上角 (0, 0) 移动到点 (100, 100)。既然你已经知道如何定义关键帧，那么你需要使用
    `Timeline` 实例来执行动画。

    '
- fmt: '### What Is a Timeline?


    A timeline is one animation sequence consisting of many `KeyFrame` objects. Each
    `KeyFrame` object is run sequentially. Because a timeline is a subclass of the
    abstract `javafx.animation.Animation` class, it has standard attributes, such
    as its cycle count and auto-reverse, that you can set. The cycle count is the
    number of times you want the timeline to play the animation. If you want the cycle
    count to play the animation indefinitely, use the value `Timeline.INDEFINITE`.
    The auto-reverse property is a Boolean flag to indicate that the animation can
    play the timeline backward (the keyframes in reverse order). By default, the cycle
    count is set to 1 and auto-reverse is set to `false`.


    To add keyframes to a `Timeline` object, use the `getKeyFrames().addAll()` method.
    Listing [7-27](#A323804_3_En_7_Chapter.html#Par148) demonstrates a timeline playing
    indefinitely (looping) with auto-reverse set to `true` to enable the animation
    sequence to go backward. A `Timeline` instance is created with a cycle count set
    to run indefinitely and auto-reverse set to `true` to allow the animation sequence
    to go backward.


    ```

    Timeline timeline = new Timeline();

    timeline.setCycleCount(Timeline.INDEFINITE);

    timeline.setAutoReverse(true);

    timeline.getKeyFrames().addAll(keyFrame1, keyFrame2);

    timeline.play();

    Listing 7-27.

    A Timeline Instance Repeating an Animation Indefinitely

    ```


    With this knowledge of timelines, you can now animate any scene graph node in
    JavaFX. Although you have the ability to create timelines in a low-level way,
    this technique can become very cumbersome for simple animations. You are probably
    wondering whether there are easier ways to express common animation effects such
    as fading, scaling, and translating. Good news! JavaFX has stock (built-in) transition
    animations (extending the `Transition` class), which are convenience classes to
    perform common animated effects.


    ### JavaFX Transition Classes


    The JavaFX API supports common animations called transition classes. Transition
    classes inherit the `javafx.animation.Animation` class similar to a `Timeline`
    discussed earlier. Transition classes are simpler ways to create common animations
    that get applied to JavaFX `Node` objects.


    Here are some of the most common transition animation classes, followed by a brief
    description of each:


    *   `javafx.animation.FadeTransition`

    *   `javafx.animation.PathTransition`

    *   `javafx.animation.ScaleTransition`

    *   `javafx.animation.TranslateTransition`


    The fade transition (`FadeTransition`) targets the node’s opacity property for
    a fading animation effect. The path transition (`PathTransition`) enables a node
    to follow a generated path (`javafx.scene.shape.Path`). A `ScaleTransition` transition
    targets a node’s `scaleX`, `scaleY`, and `scaleZ` properties to resize a node.
    Translate transition (`TranslateTransition`) targets a node’s `translateX`, `translateY`,
    and `translateZ` properties to move a node across the screen. I’ve only listed
    a few common transitions—there are many more transitions I haven’t discussed,
    so I encourage you to look at the Javadocs documentation for subclasses of the
    `javafx.animation.Transition` class.


    ## Point-and-Click Game Example


    To demonstrate the most common JavaFX animation transitions you learned about
    in this chapter, I created a simple point-and-click game. To give you some background
    about point-and-click games, in the 90s there were many popular puzzle type games
    that allowed players to explore and embark on quests by simply using the mouse
    to point-and-click. One of these famous point-and-click games was called Myst
    (see [`http://cyan.com/games/myst`](http://cyan.com/games/myst)). The game Myst
    begins by throwing the player into a mystical island world to explore and solve
    various puzzles by examining objects and finding trap doors.


    In the point-and-click game shown in Figure [7-8](#A323804_3_En_7_Chapter.html#Fig8),
    the player will see animations that demonstrate most of the common JavaFX animation
    transitions. In the point-and-click example game, the player will be able to click
    on items to unlock additional animations.


    ![A323804_3_En_7_Fig8_HTML.jpg](A323804_3_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    A simple point-and-click type game using JavaFX Transition APIs. Depicted in the
    game are SVGPath shapes representing an airplane, a cloud, and a windmill. The
    rotor blades of the windmill are on a separate SVGPath that will demonstrate a
    RotationTranslate animation.


    ### Source Code


    The `ClickAndPointGame.java` file is the source code to the point-and-click game
    shown in Listing [7-28](#A323804_3_En_7_Chapter.html#Par160). The game begins
    by loading SVG paths as JavaFX nodes (`SVGPath`). These SVG nodes are created
    using drawings downloaded from the web site Wikimedia Commons at [`https://commons.wikimedia.org`](https://commons.wikimedia.org).
    There, I found a nice looking airplane from the author named Kaboldly. The cloud
    was from an author by the name of Thorpe and the windmill was by an author named
    Spedona. All of these images are under the creative commons license at ([`https://creativecommons.org/licenses/by-sa/3.0/deed.en`](https://creativecommons.org/licenses/by-sa/3.0/deed.en)).'
