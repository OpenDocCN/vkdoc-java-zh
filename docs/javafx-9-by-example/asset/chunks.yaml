- fmt: '### Adding the Service


    This app will store the games locally, using a file for each game. Now you need
    to define a `Service` class to manage this. While you could use any regular file
    read/file write approach, you’ll use Gluon CloudLink Client to persist the games
    you create in the local storage of the device. While its main purpose is to allow
    communications with the cloud, you can use it locally as well.


    For this, you need a dependency, as shown in Listing [13-11](#A323804_3_En_13_Chapter.html#Par93).


    ```

    dependencies {

    compile ''com.gluonhq:glisten-afterburner:1.2.0''

    compile ''com.gluonhq:charm-glisten:4.3.5''

    compile ''com.gluonhq:charm-cloudlink-client:4.3.5''

    }

    Listing 13-11.

    Required Dependencies

    ```


    As seen in Listing [13-12](#A323804_3_En_13_Chapter.html#Par99), the service will
    create `Game` and `DataClient` instances upon initialization. The latter will
    use `OperationMode.LOCAL_ONLY` to indicate only local operations.


    The `DataClient` instance calls the `createListDataReader()` method with the following
    arguments—an identifier (the unique name of the game), the object class to be
    read (`GameEvent.class`), and the synchronization flags:


    *   `SyncFlag.LIST_WRITE_THROUGH`, so changes in the list of game events are automatically
    stored locally.

    *   `SyncFlag.OBJECT_WRITE_THROUGH`, so changes in the properties of any game
    event in the list are also stored locally.


    It returns a `ListDataReader` object. Use the static method `DataProvider.retrieveList`
    with that data reader to obtain a `GluonObservableList<GameEvents>`, which is
    an observable list of game events that can be used in the different views to get
    or add new `gameEvents`. These events are immediately added to the local file.


    ```

    package org.jfxbe.basketstats.service;

    import com.gluonhq.cloudlink.client.data.DataClient;

    import com.gluonhq.cloudlink.client.data.DataClientBuilder;

    import com.gluonhq.cloudlink.client.data.OperationMode;

    import com.gluonhq.cloudlink.client.data.SyncFlag;

    import com.gluonhq.connect.GluonObservableList;

    import com.gluonhq.connect.provider.DataProvider;

    import javafx.beans.property.ListProperty;

    import javax.annotation.PostConstruct;

    import org.jfxbe.basketstats.model.Game;

    import org.jfxbe.basketstats.model.GameEvent;

    public class Service {

    private DataClient dataClient;

    private Game game;

    @PostConstruct

    public void postConstruct() {

    dataClient = DataClientBuilder.create()

    .operationMode(OperationMode.LOCAL_ONLY)

    .build();

    game = new Game();

    }

    public GluonObservableList retrieveGame(String nameGame) {

    game.setGameEvents(null);

    return DataProvider.retrieveList(dataClient.createListDataReader(nameGame,

    GameEvent.class,

    SyncFlag.LIST_WRITE_THROUGH, SyncFlag.OBJECT_WRITE_THROUGH));

    }

    public void addGameEvent(GameEvent gameEvent) {

    updateScore(gameEvent);

    gameEvent.setPartialScore("" + game.getScoreA() + " :: " + game.getScoreB());

    game.getGameEvents().add(gameEvent);

    }

    public Game getGame() {

    return game;

    }

    public final ListProperty gameEventsProperty() {

    return game.gameEventsProperty();

    }

    public void updateScore(GameEvent event) {

    switch (event.getTeam()) {

    case 0:

    if (event.getPeriod() == 1) {

    game.setScoreA(0);

    game.setScoreB(0);

    }

    break;

    case 1:

    game.setScoreA(game.getScoreA() + event.getScore());

    break;

    case 2:

    game.setScoreB(game.getScoreB() + event.getScore());

    break;

    }

    }

    }

    Listing 13-12.

    The Game Service.

    ```


    You can check the “Data Storage” section of the Gluon CloudLink documentation
    at [`http://docs.gluonhq.com/cloudlink/#_data_storage`](http://docs.gluonhq.com/cloudlink/#_data_storage)
    to learn about the `DataClient` and `GluonObservableList` concepts in more detail.


    ### Modifying the Main View


    It’s now time to modify the default views. Their FXML files can be edited with
    Scene Builder. Since version 8.3.0, which can be downloaded and installed from
    [`http://gluonhq.com/products/scene-builder/`](http://gluonhq.com/products/scene-builder/)
    , the required dependencies are included, and you can easily design Gluon Mobile
    views. See Figure [13-9](#A323804_3_En_13_Chapter.html#Fig9).


    ![A323804_3_En_13_Fig9_HTML.jpg](A323804_3_En_13_Fig9_HTML.jpg)


    Figure 13-9. Main view edited with Scene Builder


    First, open the main view (`main.fxml`). To preview the Gluon style, select Preview
    ➤ JavaFX Theme ➤ Gluon Mobile. Remove the default content and add a `BottomNavigation`
    control to the bottom of the view with two buttons: one to create a new game and
    one to retrieve an existing game.


    Now you add a `VBox` container that will hold a `GridPane` with two `TextField`
    controls from Gluon Mobile, so the user can set the name of the teams. It will
    be visible when the `New Game` button is selected. And a second `VBox` that will
    hold a `CharmListView` control, an enhanced list with headers, to show the different
    games available. It will be visible when the `Restore` button is selected. Note
    that for every control added, you assign an `fx:id` tag, so those can be referenced
    from the controller class. Figure [13-9](#A323804_3_En_13_Chapter.html#Fig9) shows
    the main view once the changes have been added.


    The edited FXML file, as the rest of the source code of this example, can be found
    in the repository of this book.


    Now add all the tagged controls to the presenter, as shown in Listing [13-13](#A323804_3_En_13_Chapter.html#Par106).'
