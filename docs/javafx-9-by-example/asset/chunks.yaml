- fmt: "### How It Works\n\nWhen the application starts, it creates an instance of\
    \ `ArduinoChart`.\n\n```java\n@Override\npublic void start(Stage primaryStage)\
    \ throws Exception {\n    arduinoChart = new ArduinoChart();\n}\n```\n\nInside\
    \ the `arduinoChart` class is a `LineChart`, with three series that take pairs\
    \ of numbers to be plotted against each axis, which are `NumberAxis` instances.\
    \ Several limits are defined for these series: the maximum number of points in\
    \ each of them will be 300:\n\n```java\nprivate static final int SIZE_MAX = 300;\n\
    private LineChart chart;\nprivate Series rollSeries, pitchSeries, yawSeries;\n\
    private NumberAxis xAxis, yAxis;\n```\n\nThen you create the chart, starting by\
    \ creating both axes. For the `xAxis` to show formatted data, this example overrides\
    \ the `toString()` method, so every long value in milliseconds will be written\
    \ in `HH:mm:ss` format:\n\n```java\npublic VBox createArduinoChart() {\n    xAxis\
    \ = new NumberAxis();\n    xAxis.setLabel(\"Time\");\n    xAxis.setAutoRanging(true);\n\
    \    xAxis.setForceZeroInRange(false);\n    xAxis.setTickLabelFormatter(new StringConverter()\
    \ {\n        @Override\n        public String toString(Number t) {\n         \
    \   return new SimpleDateFormat(\"HH:mm:ss\")\n                .format(new Date(t.longValue()));\n\
    \        }\n        @Override\n        public Number fromString(String string)\
    \ {\n            throw new UnsupportedOperationException(\"Not supported yet.\"\
    );\n        }\n    });\n    yAxis = new NumberAxis();\n    yAxis.setLabel(\"Angle\
    \ (º)\");\n}\n```\n\nThen it creates the chart by specifying its axes. It sets\
    \ a few properties: `setCreateSymbols(true)` will plot a big white circle on every\
    \ point of the series. You can adjust the default size and color with CSS. `setAnimated(false)`\
    \ avoids the animation of the chart after adding any new point. Because you are\
    \ plotting points at a high frequency, it’s better this way. For lower frequencies,\
    \ on the other hand, you will set it to `true` to create a smooth transition effect.\
    \ `setLegendVisible(true)` shows the legend with the series names:\n\n```java\n\
    chart = new LineChart(xAxis, yAxis);\nchart.setCreateSymbols(true);\nchart.setAnimated(false);\n\
    chart.setLegendVisible(true);\nchart.setTitle(\"Roll/Pitch/Yaw\");\n```\n\nYou\
    \ then create the three series, set the names for them (which will be displayed\
    \ in the legend box), and add them to the `Data` chart, which is an `ObservableList`\
    \ of `Series`:\n\n```java\nrollSeries = new Series();\nrollSeries.setName(\"Roll\
    \ (º)\");\npitchSeries = new Series();\npitchSeries.setName(\"Pitch (º)\");\n\
    yawSeries = new Series();\nyawSeries.setName(\"Yaw (º)\");\nchart.getData().addAll(rollSeries,\
    \ pitchSeries, yawSeries);\n```\n\nFinally, the chart is added to a `VBox`, along\
    \ with an `HBox` with the labels for the instant values:\n\n```java\nlabelRoll\
    \ = new Label();\nlabelPitch = new Label();\nlabelYaw = new Label();\nfinal HBox\
    \ hBox = new HBox(new Label(\"Values: \"), labelRoll, labelPitch, labelYaw);\n\
    hBox.getStyleClass().add(\"box\");\nfinal VBox vBox = new VBox(chart, hBox);\n\
    vBox.getStyleClass().add(\"box\");\nreturn vBox;\n```\n\nBack to the application\
    \ class, a `listener` will be created to bind the presence of any new line on\
    \ the serial port (corresponding to a reading of the orientation angles coming\
    \ from the Arduino 101) with the action of adding these values as new pairs to\
    \ the series. For that, you set the x coordinate value as the time when you add\
    \ the reading in milliseconds (on the chart it will be formatted to `HH:mm:ss`)\
    \ and the y coordinate value is a double measurement of any of the angles reported\
    \ by the Arduino in the `String nv`. You parse the strings to double. For the\
    \ yaw angle, you allow adding an offset value with a `TextField`, given that,\
    \ after calibration, this angle is not always reset to 0°. Also, notice the minus\
    \ sign for pitch and roll: It is due to the change of the coordinate system between\
    \ Arduino and JavaFX.\n\n```java\nprivate final ChangeListener listener = (obs,\
    \ ov, nv) -> {\n    String[] split = nv.split(\"\\\\s\");\n    long time = Long.parseLong(split[0]);\n\
    \    double offset = OFFSET_YAW;\n    if (!textYaw.getText().isEmpty()) {\n  \
    \      try {\n            offset = Double.parseDouble(textYaw.getText());\n  \
    \      } catch (NumberFormatException nfe) { }\n    }\n    double yaw = Double.parseDouble(split[1])\
    \ + offset;\n    double pitch = - Double.parseDouble(split[2]);\n    double roll\
    \ = - Double.parseDouble(split[3]);\n};\n```\n\nBy using `Platform.runlater()`,\
    \ you can pass the values to `ArduinoChart`, to render them in the chart. This\
    \ is mandatory, as the `Serial` task is running outside the JavaFX thread. With\
    \ `Platform.runlater()`, not only do you place the task of filling the series\
    \ with the incoming data in the JavaFX thread, but also you give to the Scene\
    \ graph the required time to render the chart. Some of the angles might not be\
    \ processed if the rate is too high.\n\n```java\nPlatform.runLater(() -> {\n \
    \   arduinoChart.processEvent(time, roll, pitch, yaw);\n});\n```\n\nAs the series\
    \ data could grow indefinitely, to avoid memory issues, you set a `SIZE_MAX` value\
    \ of 300 points and remove the first values of the series if you exceed that limit.\n\
    \n```java\npublic void processEvent(long time, double roll, double pitch, double\
