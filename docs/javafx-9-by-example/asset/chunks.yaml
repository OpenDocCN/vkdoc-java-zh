    \        root.getChildren().add(btn);\n        stage.setScene(scene);\n      \
    \  stage.show();\n    }\n}\n```\n\nListing 2-7. The Main HelloWorld Application\n\
    \n### Compile Code (Module)\n\nAssume you are at the directory above the `src`\
