    #### 终止开关


    在某些情况下，已迁移到 Java 9（模块化代码）的遗留代码可能会引发类型为 `IllegalAccessException` 的运行时异常。这是因为代码使用了反射
    API 和 Jigsaw 的强封装。


    Oracle 的工程师决定提供一个终止开关，允许在使用反射时绕过非法访问检查。其目的是给开发者更多时间将代码迁移到 Java 9 模块；然而，该终止开关将在
    Java 10 中被移除。以下是使用终止开关绕过所引发的运行时异常的示例。


    ```

    $ java --permit-illegal-access -jar xyz.jar

    ```


    你可以查看完整解释此内容的技术说明，网址为：


    ```

    http://mail.openjdk.java.net/pipermail/jigsaw-dev/2017-March/011763.html

    ```


    假设你已被说服，并准备踏上 Java Jigsaw 的列车，那么让我们继续讨论从过去到现在的模块。接下来，我将详细阐述用作模块的 Java JAR 文件的历史。如果你觉得
    Java 模块（Java 9 之前）的历史有点无聊，可以直接跳到“入门”部分。


    ## 历史


    那么，模块化应用和依赖管理并非新鲜事？对吧？！


    最初，Java 开发者创建了由类和资源文件压缩而成的单个 Java 归档文件，称为 JAR。每个 JAR 文件被视为 Java 应用程序中的一个模块。当每个
    JAR 文件从类路径加载时，包中的任何公共 API 都可以从该库中访问。虽然访问各种 API 很方便，但情况开始失控，由此产生了臭名昭著的术语“JAR 地狱”。（实际上，它最初源自术语“DLL
    地狱”，这是使用 C/C++ 开发微软操作系统的开发者创造的，因为存在动态链接库文件（`*.dll`），在解析共享库的依赖关系时遇到了类似的问题。）


    ### JAR 地狱


    术语“JAR 地狱”通常指 JVM 的类路径类型解析或依赖解析（在单个类加载器上）。例如，如果你有两个 JAR 文件，都包含一个 `Person` 类，但两者具有略有不同的方法或属性（两个不同版本），你可能会想知道在实例化
    `new Person()` 类时会使用哪一个？


    当然，这取决于类加载顺序，但默认情况下，JVM 会按照在类路径上指定的顺序加载类，例如命令行上的 `-cp` 开关。通常，第一个加载的类将被使用（遮蔽第二个）。一些
    Web 应用环境可以强制执行加载顺序，例如父优先或子优先。你可以看到，当你试图调试应用程序却不知道它正在使用哪个 `Person` 类时，这会多么令人困惑。


    由于这些已知问题，许多 Java 专家成立了 OSGi 联盟，旨在创建标准规范，作为在 Java 平台上开发模块化应用的第一步。下一节将简要介绍 Java
    OSGi 模块系统。


    ### OSGi


    随着 Java 应用程序变得越来越大，拥有众多依赖关系，管理起来很快就变成了一场噩梦。自 2000 年以来，为了解决 Java 模块化问题，OSGi 联盟成立，旨在为基于
    Java 的模块化和面向服务的系统创建开放标准规范。OSGi 的目标是提供一个规范，供供应商创建应用程序容器的实现。应用程序容器包含称为“捆绑包”的 JAR
    文件，这些文件可以在不重启 JVM 的情况下动态加载。


    简而言之，每个 JAR 捆绑包在 `META-INF/manifest.mf` 文件中包含描述其他捆绑包依赖关系的元数据。根据规范，还有许多其他方式可以导出包和封装捆绑包。由于每个捆绑包（模块）都在单独的类加载器中加载，同一
    JVM 上可以共存同一 Java 类的不同版本。例如，`模块 A` 依赖于模块 `com.foo.bar-1.0.jar`，而 `模块 B` 依赖于模块 `com.foo.bar-2.0.jar`，如图
    2-1 所示。两个 JAR 文件都是捆绑包，各自包含自己的模块定义（`manifest.mf`）。


    ![A323804_3_En_2_Fig1_HTML.jpg](img/A323804_3_En_2_Fig1_HTML.jpg)


    图 2-1.


    一个包含四个不同捆绑包的 OSGi 容器。这里，模块 A 依赖于模块 com.foo.bar 版本 1.0，模块 B 依赖于模块 com.foo.bar 版本
    2.0。


    假设容器已经包含了 `com.foo.bar` 的两个版本的 JAR 捆绑包，开发者将定义 `模块 A` 的清单，如清单 2-1 所示，以及 `模块 B`
    的清单，如清单 2-2 所示。


    ```

    Manifest-Version: 1.0

    Bundle-ManifestVersion: 2

    Bundle-Name: module-a

    Bundle-SymbolicName: com.carlfx.myservice1

    Bundle-Version: 1.0.0

    Bundle-Activator: com.carlfx.myservice1.Activator

    Import-Package:  com.foo.bar;version="1.0"

    Export-Package:  com.carlfx.myservice1.api;version="1.0.0"

    清单 2-1.

    模块 A 的 manifest.mf 文件，包含 OSGi 捆绑包定义。模块 A 依赖于来自 JAR 文件 com.foo.bar-1.0.jar 的包 com.foo.bar。

    ```


    假设应用程序运行在 OSGi 容器上，每个捆绑包将经历一个捆绑包加载生命周期。类似于操作系统，每个应用程序都有一个进程 ID（PID），OSGi 容器将为每个捆绑包分配一个唯一的捆绑包
    ID。这个唯一 ID 允许开发者动态地监控、停止和启动捆绑包。


    ```

    Manifest-Version: 1.0

    Bundle-ManifestVersion: 2

    Bundle-Name: module-b

    Bundle-SymbolicName: com.carlfx.myservice2

    Bundle-Version: 1.0.0

    Bundle-Activator: com.carlfx.myservice2.Activator

    Import-Package:  com.foo.bar;version="2.0"

    Export-Package:  com.carlfx.myservice2.api;version="1.0.0"

    清单 2-2.

    模块 B 的 manifest.mf 文件，包含 OSGi 捆绑包定义。模块 B 依赖于来自 JAR 文件 com.foo.bar-2.0.jar 的包 com.foo.bar。

    ```


    OSGi 规范详细说明了如何定义清单文件的所有属性和命名约定；然而，手动操作可能极其繁琐。为了轻松构建捆绑包，请查看 [`http://bndtools.org`](http://bndtools.org)
    上的 Bnd 工具。此外，还有用于使用 Bnd 工具组装捆绑包的 Maven 插件和 Gradle 插件。


    老实说，根据我使用 OSGi 的经验，我知道并相信它是一个健全的架构；然而，我感觉到其采用率较低，因为在开发、调试和部署基于 Java 的应用程序时，学习曲线陡峭。例如，在
    OSGi 容器上构建 `HelloWorld` 简直就是杀鸡用牛刀。但如果你有兴趣构建一个管理动态服务或子应用程序（类似于移动设备上的 Android 操作系统）的应用程序启动器，你可能会选择使用
    OSGi。简而言之，OSGi 容器允许你安装服务和应用程序（捆绑包），而无需重启主 Java 应用程序和 JVM。


    以下是可用的四大 OSGi 实现：


    *   Apache Felix：[`http://felix.apache.org`](http://felix.apache.org)

    *   Eclipse Equinox：[`http://www.eclipse.org/equinox`](http://www.eclipse.org/equinox)

    *   Eclipse Concierge：[`http://www.eclipse.org/concierge`](http://www.eclipse.org/concierge)

    *   ProSys：[`https://www.bosch-si.com/iot-platform/iot-platform/gateway/software.html`](https://www.bosch-si.com/iot-platform/iot-platform/gateway/software.html)

