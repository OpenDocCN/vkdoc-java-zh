    PointLight effects on various pyramid TriangleMesh objects


    ## Summary


    As mentioned at the beginning of this chapter, a separate book could be dedicated
    to discussing the JavaFX 9 3D support. There are many features that were alluded
    to but not discussed, as they would warrant whole chapters. Whole texts are dedicated
    to the math and abstract concepts of 3D software development and so these things
    were not discussed in detail.


    Hopefully, this chapter scratched the surface of what is possible and hopefully
    scratched your itch to learn about the new 3D support provided by JavaFX 9\. The
    chapter includes two separate running examples to discuss the usage of primitives,
    camera nodes, lights, and custom geometries and triangle meshes. Both examples
    featured event-driven interaction with different approaches to manipulating either
    the camera or the scene objects with the keyboard and mouse. You were introduced
    to a list of classes, some dedicated to 3D support, others versatile enough to
    be applied to either 3D or 2D scenes. Very useful and practical 3D tools can be
    developed from the building blocks provided in this chapter.


    # 12. JavaFX and Arduino


    Arduino, an open source electronics prototyping platform, started in 2003, so
    it has been here since the very beginning of the “Internet of Things” (IoT) concept
    as we understand it now. In fact, the advent of low-cost prototyping platforms
    like Arduino is one of the cornerstones that have allowed this emerging revolution
    to happen, supporting both the do-it-yourself concept and the maker movement.


    This chapter gives you a quick glance at how you can use JavaFX along with an
    Arduino board to develop desktop applications for monitoring data coming from
    the real world or controlling real devices.


    It starts by presenting briefly the available boards, followed by the software
    required to program the microcontroller and the procedure to connect it to a computer
    (without any WiFi or Ethernet shield solution); finally, you’ll examine the code
    to acquire the data stream and represent the data and control the devices on the
    JavaFX thread.


    ## The Arduino Board


    Arduino is an open source board with one microcontroller. The best-known version,
    the Arduino Uno rev 3, is based on the ATmega328 8-bit Atmel AVR microcontroller,
    while the new Arduino Due, based on the Atmel SAM3X8E ARM Cortex-M3 CPU, is the
    first Arduino board based on a 32-bit ARM core.


    Thanks to a preprogrammed boot loader, programs can be easily uploaded into the
    microcontroller memory, directly from a connected computer.


    The Uno provides 14 digital I/O pins and 6 analog inputs, as female headers, so
    plug-in shields can be mounted on top of them, or simple jumpers can be plugged
    to required pins. 32KB are available as flash memory, and the clock operates at
    16MHz. Further details can be checked here: [`http://arduino.cc/en/Main/ArduinoBoardUno`](http://arduino.cc/en/Main/ArduinoBoardUno)
    . Figure [12-1](#A323804_3_En_12_Chapter.html#Fig1) shows front and back views
    of the Uno board.


    ![A323804_3_En_12_Fig1a_HTML.jpg](A323804_3_En_12_Fig1a_HTML.jpg)![A323804_3_En_12_Fig1b_HTML.jpg](A323804_3_En_12_Fig1b_HTML.jpg)


    Figure 12-1.


    Arduino Uno (front and back)


    The Due, shown in Figure [12-2](#A323804_3_En_12_Chapter.html#Fig2), increases
    the capacity to 54 digital I/O pins and 14 analog pins (12 inputs, 2 outputs).
    Flash memory is now 512KB, while clock speed is 84MHz. Further details can be
    checked at [`http://arduino.cc/en/Main/ArduinoBoardDue`](http://arduino.cc/en/Main/ArduinoBoardDue)
    .


    ![A323804_3_En_12_Fig2_HTML.jpg](A323804_3_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    Arduino Due (front)


    There are other boards with different specifications or components. For any concrete
    application, you should acquire the one that suits your needs, carefully reading
    the specifications at [`http://arduino.cc/en/Main/Products`](http://arduino.cc/en/Main/Products)
    .


    But it is worth mentioning that a new interesting board is available since 2016:
    the Arduino 101 (USA)/Genuino 101 (outside the US). Shown in Figure [12-3](#A323804_3_En_12_Chapter.html#Fig3),
    it was designed in collaboration with Intel, and includes the Intel® Curie module,
    a low-power processor based on the Intel Quark SE system-on-a-chip that includes
    motion sensor, Bluetooth, and battery-charging features. While it keeps the same
    form factor, the same peripheral list of the Uno and the same entry level price,
    it comes with the significant addition of onboard Bluetooth LE capabilities and
    a six-axis accelerometer and gyroscope.


    ![A323804_3_En_12_Fig3_HTML.jpg](A323804_3_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    Arduino 101/Genuino 101 (front)


    Further details can be checked at [`https://www.arduino.cc/en/Main/ArduinoBoard101`](https://www.arduino.cc/en/Main/ArduinoBoard101)
    .


    For the example in this chapter, we’ll use a Genuino 101 board . If you don’t
    have one, there are plenty of sources where you may buy one online, as you can
    see at this link: [`https://store.arduino.cc`](https://store.arduino.cc) .


    Once you have the Arduino board and it’s using a standard USB cable (type A plug
    to type B plug), you can attach it to your computer, as shown in Figure [12-4](#A323804_3_En_12_Chapter.html#Fig4).
    This connection will provide 5V to power the board (check that the green power
    LED is illuminated) and a way to program the microcontroller from your computer.


    ![A323804_3_En_12_Fig4_HTML.jpg](A323804_3_En_12_Fig4_HTML.jpg)


    Figure 12-4.


    Arduino connected to the computer


    Later on, after you have programmed the microcontroller, you can use an external
    power supply, like a 9V battery or a 9-to-12V DC adapter, providing 250mA up to
    1000mA, depending on the devices connected, by plugging a 2.1mm plug center pin
    positive into the board’s power jack.


    ## Programming the Arduino


    Anyone who knows about Arduino should be familiar with its Arduino IDE, a desktop
    open source application used to write code and upload it to the board, which runs
    on every platform. The IDE, written in Java, is based on processing and other
    open source software.


    Recently, there is an online alternative: the new Arduino Web Editor is accessible
    from any browser, and you can code your sketches online, save them in the cloud,
    and always have the most up-to-date version of the IDE, including all the contributed
    libraries and support for new Arduino boards.'
  trans: '

    ### 点亮灯光


    在这个自定义金字塔示例中，我们已经走了很远，但 3D 几何图形看起来仍然有点卡通化。这是因为光照，特别是场景光照。要真正展示 3D 表面，你必须在场景中添加一个点光源。清单
    11-15 为示例场景添加了一个简单的点光源。


    ```

    /* 来自 TriangleMeshes.java */

    //步骤 4b：添加点光源以显示镜面高光

    PointLight light = new PointLight(Color.WHITE);

    sceneRoot.getChildren().add(light);

    light.setTranslateZ(-sceneWidth/2);

    light.setTranslateY(-sceneHeight/2);

    清单 11-15.

    向场景添加点光源

    ```


    清单 11-15 包含一些基本的平移操作，将光源移动到默认摄像机位置以外的位置，从而在每个填充的`Pyramid`的`PhongMaterials`上创建一些漂亮的镜面高光。将清单
    11-15 添加到示例中并旋转摄像机，可以提供如图 11-14 所示的良好视图。


    ![A323804_3_En_11_Fig14_HTML.jpg](img/A323804_3_En_11_Fig14_HTML.jpg)


    图 11-14.


    点光源对各种金字塔 TriangleMesh 对象的影响


    ## 总结


    正如本章开头所提到的，可以专门用一本书来讨论 JavaFX 9 的 3D 支持。有许多功能被提及但未讨论，因为它们需要整章的篇幅。整本书都致力于 3D 软件开发中的数学和抽象概念，因此这些内容没有详细讨论。


    希望本章能浅尝辄止地介绍可能实现的功能，并希望能激发你学习 JavaFX 9 提供的新 3D 支持的兴趣。本章包含两个独立的运行示例，讨论了图元、摄像机节点、光照以及自定义几何体和三角形网格的用法。两个示例都展示了事件驱动的交互，并采用了不同的方法来通过键盘和鼠标操作摄像机或场景对象。你了解了一系列类，其中一些专门用于
    3D 支持，另一些则足够通用，可以应用于 3D 或 2D 场景。利用本章提供的基础构件，可以开发出非常实用且高效的 3D 工具。


    # 12. JavaFX 与 Arduino


    Arduino，一个开源电子原型平台，始于 2003 年，因此它几乎与我们今天理解的“物联网”（IoT）概念同时出现。事实上，像 Arduino 这样的低成本原型平台的出现，是促成这场新兴革命得以发生的基石之一，它同时支持了
    DIY 理念和创客运动。


    本章将快速介绍如何将 JavaFX 与 Arduino 板结合使用，来开发用于监控来自现实世界的数据或控制真实设备的桌面应用程序。


    本章首先简要介绍可用的开发板，然后是微控制器编程所需的软件以及将其连接到计算机的步骤（无需任何 WiFi 或以太网扩展板解决方案）；最后，你将学习如何获取数据流、在
    JavaFX 线程上表示数据以及控制设备。


    ## Arduino 开发板


    Arduino 是一款带有微控制器的开源开发板。最知名的版本 Arduino Uno rev 3 基于 ATmega328 8 位 Atmel AVR 微控制器，而新的
    Arduino Due 基于 Atmel SAM3X8E ARM Cortex-M3 CPU，是首款基于 32 位 ARM 内核的 Arduino 开发板。


    得益于预编程的引导加载程序，程序可以直接从连接的计算机轻松上传到微控制器内存中。


    Uno 提供 14 个数字 I/O 引脚和 6 个模拟输入，采用排母形式，因此可以安装扩展板，或者将简单的跳线连接到所需引脚。闪存为 32KB，时钟频率为
    16MHz。更多详细信息可在此处查看：[`http://arduino.cc/en/Main/ArduinoBoardUno`](http://arduino.cc/en/Main/ArduinoBoardUno)。图
    12-1 显示了 Uno 开发板的正面和背面视图。


    ![A323804_3_En_12_Fig1a_HTML.jpg](img/A323804_3_En_12_Fig1a_HTML.jpg)![A323804_3_En_12_Fig1b_HTML.jpg](img/A323804_3_En_12_Fig1b_HTML.jpg)


    图 12-1.


    Arduino Uno（正面和背面）


    Due，如图 12-2 所示，将容量提升至 54 个数字 I/O 引脚和 14 个模拟引脚（12 个输入，2 个输出）。闪存现在为 512KB，时钟速度为
    84MHz。更多详细信息可在此处查看：[`http://arduino.cc/en/Main/ArduinoBoardDue`](http://arduino.cc/en/Main/ArduinoBoardDue)。


    ![A323804_3_En_12_Fig2_HTML.jpg](img/A323804_3_En_12_Fig2_HTML.jpg)


    图 12-2.


    Arduino Due（正面）


    还有其他具有不同规格或组件的开发板。对于任何具体的应用，你应该仔细阅读[`http://arduino.cc/en/Main/Products`](http://arduino.cc/en/Main/Products)上的规格说明，选择适合你需求的开发板。


    但值得一提的是，自 2016 年起，有一款有趣的新开发板问世：Arduino 101（美国）/ Genuino 101（美国以外地区）。如图 12-3 所示，它与英特尔合作设计，包含英特尔®
    Curie 模块，这是一个基于英特尔 Quark SE 系统级芯片的低功耗处理器，集成了运动传感器、蓝牙和电池充电功能。虽然它保持了与 Uno 相同的外形尺寸、相同的外设列表和相同的入门级价格，但它显著增加了板载低功耗蓝牙（Bluetooth
    LE）功能以及一个六轴加速度计和陀螺仪。


    ![A323804_3_En_12_Fig3_HTML.jpg](img/A323804_3_En_12_Fig3_HTML.jpg)


    图 12-3.


    Arduino 101 / Genuino 101（正面）


    更多详细信息可在此处查看：[`https://www.arduino.cc/en/Main/ArduinoBoard101`](https://www.arduino.cc/en/Main/ArduinoBoard101)。


    对于本章的示例，我们将使用 Genuino 101 开发板。如果你没有，有很多在线渠道可以购买，你可以通过此链接查看：[`https://store.arduino.cc`](https://store.arduino.cc)。


    一旦你拥有了 Arduino 开发板，并且使用标准 USB 线缆（A 型插头转 B 型插头），你就可以将其连接到计算机，如图 12-4 所示。此连接将提供
    5V 电压为开发板供电（检查绿色电源 LED 是否亮起），并提供一种从计算机对微控制器进行编程的方式。


    ![A323804_3_En_12_Fig4_HTML.jpg](img/A323804_3_En_12_Fig4_HTML.jpg)


    图 12-4.


    连接到计算机的 Arduino


    之后，在你对微控制器编程完成后，你可以使用外部电源，例如 9V 电池或 9 至 12V 直流适配器，根据所连接设备的不同，提供 250mA 至 1000mA
    的电流，只需将 2.1mm 插头（中心正极）插入开发板的电源插孔即可。


    ## 对 Arduino 进行编程


    任何了解 Arduino 的人都应该熟悉其 Arduino IDE，这是一个桌面开源应用程序，用于编写代码并将其上传到开发板，可在各个平台上运行。该 IDE
    用 Java 编写，基于 Processing 和其他开源软件。


    最近，出现了一个在线替代方案：新的 Arduino Web 编辑器可从任何浏览器访问，你可以在线编写草图，将其保存在云端，并始终拥有最新版本的 IDE，包括所有贡献的库和对新
    Arduino 开发板的支持。

