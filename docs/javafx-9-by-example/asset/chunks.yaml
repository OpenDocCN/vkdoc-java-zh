    *   基于 JavaFX 的游戏创作系统，作者：Mirko Sertic：[`http://www.mirkosertic.de/doku.php/javastuff/javafxgameauthoring`](http://www.mirkosertic.de/doku.php/javastuff/javafxgameauthoring)

