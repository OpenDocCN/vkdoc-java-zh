- fmt: "# Labels\n\nLabels are read-only controls capable of displaying text and graphics\
    \ having a background. Labels, unlike the `Text` node, extend from `Control`,\
    \ as opposed to extending from `Shape`. Labels have a background for text and\
    \ can append an ellipsis (`...`) whenever the width of the label (bounding rectangle)\
    \ is being resized smaller than the text string being displayed to the user. This\
    \ lets the user know there is more text content to show. Figure [6-1](#A323804_3_En_6_Chapter.html#Fig1)\
    \ shows a label that has a very long text string fully displayed (without the\
    \ ellipses); however, when minimizing the window, the label’s width will get reduced,\
    \ thus showing the truncated text with the ellipses appended on the end, as shown\
    \ in Figure [6-2](#A323804_3_En_6_Chapter.html#Fig2).\n\n![A323804_3_En_6_Fig2_HTML.jpg](A323804_3_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2. A label with a long text string having a reduced width that appends\
    \ the ellipses denoting there is more text\n\n![A323804_3_En_6_Fig1_HTML.jpg](A323804_3_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1. A label with a long text string having the full available width\n\
    \nLabels can also contain a graphic node to be positioned relative to the text.\
    \ This means that you can add any type of JavaFX node as an image icon. Listing\
    \ [6-1](#A323804_3_En_6_Chapter.html#Par7) shows three possible ways to create\
    \ JavaFX labels. The first way is to create a label using the empty constructor\
    \ and subsequently using the `setText()` method. The second way to create a label\
    \ is using the constructor that accepts a string parameter for the text to be\
    \ displayed on the label. The last way to create a label is using a constructor\
    \ that takes two parameters that accept text (`String`) and a node (`Node`) for\
    \ a graphic (icon).\n\n```\n// Empty text label\nLabel label1 = new Label();\n\
    label1.setText(\"JavaFX 9 by Example\");\n// String text label\nLabel label2 =\
    \ new Label(\"JavaFX Rocks!!!!\");\n// String and Icon label\nNode duke = new\
    \ ImageView(new Image(getClass().getResourceAsStream(\"/duke.png\")));\nLabel\
    \ label3 = new Label(\"JavaFX Rocks!!!\", duke);\nlabel3.setContentDisplay(ContentDisplay.TOP);\n\
    ```\n\nListing 6-1. Three Ways to Create Labels\n\nAs you can see, the first two\
    \ methods of creating labels are pretty straightforward; however, the third example\
    \ gets a little more involved. The third example creates an image node to be used\
    \ as a graphic (Duke mascot) that is placed above (`ContentDisplay.TOP`) the label’s\
    \ text. Figure [6-3](#A323804_3_En_6_Chapter.html#Fig3) shows that the label has\
    \ text and an image that is positioned above the text content of the label.\n\n\
    ![A323804_3_En_6_Fig3_HTML.jpg](A323804_3_En_6_Fig3_HTML.jpg)\n\nFigure 6-3. A\
    \ label containing a graphic (image) positioned above (using `ContentDisplay.TOP`)\
    \ the text. The image of the 3D Duke mascot was created by Joe Palrang (creative\
    \ commons license).\n\nYou will notice from Listing [6-1](#A323804_3_En_6_Chapter.html#Par7)\
    \ the `label3` variable uses the `setContentDisplay()` method that accepts one\
    \ of the `ContentDisplay enum` values. This method is responsible for how content\
    \ in the label will be displayed, such as where the graphic is to be positioned,\
    \ or to show the text content only, etc. Table [6-1](#A323804_3_En_6_Chapter.html#Tab1)\
    \ lists all the different ways to display a label’s content using the `ContentDisplay\
    \ enum` constants.\n\nTable 6-1. `ContentDisplay` Enum Constants to Specify How\
    \ Content Can Be Displayed on a Label\n\n| `BOTTOM` | Content will be placed at\
    \ the bottom of the label. |\n| `CENTER` | Content will be placed in the center\
    \ of the label. |\n| `GRAPHIC_ONLY` | Only the content will be displayed. |\n\
    | `LEFT` | Content will be placed to the left of the label. |\n| `RIGHT` | Content\
    \ will be placed to the right of the label. |\n| `TEXT_ONLY` | Only the label's\
    \ text will be displayed. |\n| `TOP` | Content will be placed at the top of the\
    \ label. |\n\n**Tip:** `ContentDisplay` constants used to position content on\
    \ labels can also be used on JavaFX buttons, check boxes, and menus.\n\n## Custom\
    \ Fonts\n\nFonts basically style and size text in labels, menus, buttons, and\
    \ many other controls containing text. Chapter [3](#A323804_3_En_3_Chapter.html)\
    \ discussed how to apply existing font styles onto `Text` nodes, but how do you\
    \ use custom fonts? In JavaFX, you can load standard font file formats such as\
    \ TrueType fonts (ttf) or OpenType fonts (otf).\n\nLoading a custom font is super\
    \ easy. First, find the path to the font file you want to load. Second, you will\
    \ want to initially load the font from the JavaFX application thread. As shown\
    \ in Listing [6-2](#A323804_3_En_6_Chapter.html#Par14), the code loads a TrueType\
    \ font as a resource from the classpath. You will also notice the overridden JavaFX\
    \ Application’s `init()` method being used to load the custom font. The `init()`\
    \ method will work off of the JavaFX Application thread before the `start()` method\
    \ is invoked. The code in Listing [6-2](#A323804_3_En_6_Chapter.html#Par14) uses\
    \ a custom font downloaded from the Google fonts web site at [`https://fonts.google.com`](https://fonts.google.com).\
    \ There you can find many free type fonts designed and created by many people\
    \ from all around the world. The following link is where you can download the\
    \ Kanit font by Cadson Demak.\n\n[`https://fonts.google.com/specimen/Kanit?query=kanit&selection.family=Kanit`](https://fonts.google.com/specimen/Kanit%3Fquery=kanit%26selection.family=Kanit)\n\
    \n```\n@Override\npublic void init() throws Exception {\n    // load custom font\n\
    \    Font.loadFont(CustomFonts.class.getResource(\"/Kanit-MediumItalic.ttf\")\n\
    \        .openStream(), 12.0);\n}\n```\n\nListing 6-2. Overriding the `init()`\
    \ Method from the JavaFX Application Class to Load a TrueType Font as a Resource\
    \ from the Classpath\n\nInside the Application’s `start()` method (on the JavaFX\
    \ application thread), the code can use the previously loaded custom font from\
