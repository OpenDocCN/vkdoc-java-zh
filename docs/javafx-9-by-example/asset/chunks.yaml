    ### 许可证


    虽然 `JavaFXPorts`、Charm Down 或 Charm Connect 是完全开源的项目，但 Gluon Mobile 是一个商业项目，需要许可证。正如你在
    [`http://gluonhq.com/products/mobile/buy`](http://gluonhq.com/products/mobile/buy)
    上看到的，有一个免费层级，该库可以在没有许可证的情况下用于测试，并具有 100% 的功能。


    ## 示例：BasketStats 应用


    此示例向你展示如何逐步创建一个完整的 Java 移动应用，你可以将其部署到你的移动设备上。例如，你可以用它来记录你孩子篮球比赛期间的得分情况。


    在本例中，你将使用 NetBeans 和 Gluon 插件。


