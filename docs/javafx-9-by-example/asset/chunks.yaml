- fmt: '### JavaFXPorts Under the Hood


    When we create and compile a Java application, the result is Java bytecode. To
    run it, you need the JRE, containing native libraries specific for each platform.
    Since there is no JRE for mobile devices, a different approach is required.


    On Android, the Google’s Android SDK contains tools for bundling applications,
    resources, and libraries into an Android package (APK). The `jfxmobile` plug-in
    will use these tools to create and install the Java mobile app, on top of the
    Android’s Dalvik/Art VMs, relatively similar to the Java VM.


    On iOS, the JRE needs to be packaged inside the app. The RoboVM ahead-of-time
    compiler is used to translate the Java code into native iOS code, linking the
    required runtime libraries with the application.


    Both the Android runtime and the iOS AOT compiler currently use the Apache Harmony
    implementation of the Java class libraries, which is only a partial implementation
    of Java 7, and the project is officially abandoned. Adding to this, the RoboVM
    project has been stopped after Microsoft acquired Xamarin, which acquired RoboVM
    in the first place.


    At this moment, this means that `JavaFXPorts` supports most of the Java 7 SE APIs,
    and a few Java 8 APIs are supported as well (like lambda expressions, but not
    streams).


    Because of these limitations, Gluon is working on `GluonVM`, a high-performance
    Java 8/9 VM that will leverage the OpenJDK class libraries and provide full Java
    9 functionality on mobile devices. It is expected to be available at the time
    Java 9 is released.


    **Note:** Until `GluonVM` is released and given the mentioned limitations, to
    run JavaFX on Mobile we can’t use Java 9 nor the modular system. That is why the
    examples in this chapter use the existing implementation (Java 7 and some features
    of Java 8).


    ### Getting Started with JavaFXPorts


    The documentation to get started creating Java mobile applications with `JavaFXPorts`
    can be found here: [`http://docs.gluonhq.com/javafxports/`](http://docs.gluonhq.com/javafxports/).


    The Gradle plug-in `jfxmobile-plugin` does almost all the required work. By including
    this plug-in in your regular JavaFX application, it will automatically create
    a number of tasks for you, and it will package your application as a native iOS
    or a native Android package.


    These are the prerequisites before starting a Java mobile project. On your machine:


    - Install the latest JDK 8 version for your development machine. Get it from here:
    [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html).

    - Install Gradle 2.2 or higher from [`https://gradle.org/install`](https://gradle.org/install).
    It is required to build applications with the `jfxmobile` plug-in.


    If you want to deploy on Android:


    - Install the Android SDK from [`https://developer.android.com/studio/index.html`](https://developer.android.com/studio/index.html).
    You can download Android Studio, which bundles the SDK and the required Android
    tools, or you can just download and install the SDK tools at the end of the link.

    - Run the Android SDK Manager (`Android Studio -> Tools -> Android -> SDK Manager`
    or the command line `<android sdk>/tools/android`) and then install at least version
    23.0.1 of Build-tools, the SDK Platform for APIs 21 up to 25, from Extras the
    Android Support Repository.

    - Create a properties file in `<Users>/<User>/.gradle/gradle.properties` and add
    the `ANDROID_HOME=<path.to.Android.sdk>` property.


    Before deploying to an Android device, you need to follow these steps on the device:


    - Go to `Settings -> About phone -> Build Number` and tap seven times on it to
    enable developer mode.

    - Go to `Settings -> Development Options -> USB Debugging` and select enable.

    - Go to `Settings -> Security -> Unknown sources` and enable installing apps from
    unknown sources.


    If you want to deploy on iOS:


    - You need a Mac with MacOS X 10.11.5 or higher

    - You need Xcode 8.x or higher, available from the Mac App Store


    Before deploying to an iOS device, you need to get a provisioning profile from
    the Apple Developer portal. See this link on how to get a free one to deploy to
    your own device: [`http://docs.gluonhq.com/javafxports/#_ios_3`](http://docs.gluonhq.com/javafxports/#_ios_3).


    ## Hello Mobile World Example


    With all the prerequisites in place, let’s create a Hello Mobile World example
    that you can run on desktop and mobile platforms.


    On your favorite IDE, you can create a new Gradle project. Give it a name (`HelloMobile`),
    a location, and a main class, such as `org.jfxbe.chap13.HelloMobile`.


    Edit the `build.gradle` file and add the content from Listing [13-1](#A323804_3_En_13_Chapter.html#Par35).
    It will apply the `jfxmobile` plug-in to the project. Save and reload the project
    to update the project. The first time this is done, the plug-in will download
    an install some internal dependencies, so it may take a while.


    ```

    buildscript {

    repositories {

    jcenter()

    }

    dependencies {

    classpath ''org.javafxports:jfxmobile-plugin:1.3.5''

    }

    }

    apply plugin: ''org.javafxports.jfxmobile''

    repositories {

    jcenter()

    }

    mainClassName = ''org.jfxbe.chap13.HelloMobile''

    jfxmobile {

    android {

    }

    ios {

    forceLinkClasses = [ ''org.jfxbe.chap13.**.*'' ]

    }

    }

    ```


    *Listing 13-1. The `build.gradle` File*


    Note that the version of the plug-in at the time of this writing was 1.3.5. To
    keep it updated, check out [`https://bitbucket.org/javafxports/javafxmobile-plugin`](https://bitbucket.org/javafxports/javafxmobile-plugin).


    Now in the main class, extend `Application` and create a JavaFX `Scene` with some
    content, as shown in Listing [13-2](#A323804_3_En_13_Chapter.html#Par38).


    ```

    package org.jfxbe.chap13;

    import javafx.application.Application;

    import javafx.geometry.Rectangle2D;

    import javafx.scene.Scene;

    import javafx.scene.control.Button;

    import javafx.scene.layout.StackPane;

    import javafx.stage.Screen;

    import javafx.stage.Stage;

    public class HelloMobile extends Application {

    @Override

    public void start(Stage primaryStage) throws Exception {

    Rectangle2D bounds = Screen.getPrimary().getVisualBounds();

    final Button button = new Button("Hello Mobile World!");

    button.setStyle("-fx-font-size: 20pt;");

    button.setOnAction(e -> button.setRotate(button.getRotate() - 30));

    final StackPane stackPane = new StackPane(button);

    Scene scene = new Scene(stackPane, bounds.getWidth(), bounds.getHeight());

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    ```


    *Listing 13-2. Hello Mobile Main Class*


    Finally, you can build the application and run it on your platforms. To run a
    Gradle build, just type `gradle` followed by the desired task name, e.g. `gradle
    build` will build the project. Run `gradle run` to run it on your developer machine,
    `gradle androidInstall` to deploy it on an Android device, or `gradle launchIOSDevice`
    to an iOS device. Figure [13-1](#A323804_3_En_13_Chapter.html#Fig1) shows a screenshot
    of the app running on Android.


    ![A323804_3_En_13_Fig1_HTML.jpg](A323804_3_En_13_Fig1_HTML.jpg)


    *Figure 13-1. Hello Mobile World deployed on Android*'
