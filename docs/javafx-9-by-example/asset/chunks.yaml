- fmt: '### How It Works


    Created in this example is a GUI application that allows users to choose their
    favorite heroes. This is quite similar to system administration applications that
    manage user roles by adding or removing items from list box components. In JavaFX
    the code example uses two `ListView` controls to hold `String` objects. For the
    sake of brevity, we will not discuss the use of the layouts, but jump right into
    the relevant code relating to the button actions and `ListView` controls.


    Based on Listing [6-23](#A323804_3_En_6_Chapter.html#Par174), right before creating
    an instance of a `ListView`, the code creates an `ObservableList` containing the
    candidates. Here you’ll notice the use of a factory class called `FXCollections`,
    into which you can pass common collection types to be wrapped and returned to
    the caller as an `ObservableList`. In the example, an array of strings is passed
    into the `FXCollections.observableArrayList()` method instead of an `ArrayList`.
    Using the `ObservableList` allows you to update the list of items in the array
    and in the display on the screen concurrently with a single method call.


    Hopefully you get the idea about how to use the `FXCollections` class. The following
    code line calls the `FXCollections.observableArrayList()` method class to return
    an observable list (`ObservableList`):


    ```

    ObservableList candidates = FXCollections.observableArrayList(...);

    ```


    After the code creates an `ObservableList`, a `ListView` class is instantiated
    using a constructor that receives the observable list. The following code creates
    and populates a `ListView` object:


    ```

    ListView candidatesListView = new ListView(candidates);

    ```


    The last item of business is where the code manipulates `ObservableList`s as if
    they were `java.util.ArrayList`s. As they are manipulated, the `ListView` is notified
    and automatically updated to reflect the changes of the `ObservableList`. Listing
    [6-24](#A323804_3_En_6_Chapter.html#Par183) implements the action event code when
    the user presses the Send right (`>`) button.


    ```

    // select heroes

    Button sendRightButton = new Button(">");

    sendRightButton.setOnAction( actionEvent -> {

    String potential = candidatesListView.getSelectionModel().getSelectedItem();

    if (potential != null) {

    candidatesListView.getSelectionModel().clearSelection();

    candidates.remove(potential);

    heroes.add(potential);

    }

    });

    Listing 6-24.

    Action Code to Process Selected Items

    ```


    To set action code for the button, the code uses a lambda expression with an `actionEvent`
    (`ActionEvent`) as a parameter, which is invoked when the button is clicked. When
    a button-press event arrives, the code determines which item in the `ListView`
    was selected via the `getSelectionModel()` method on the `ListView`. Once the
    item is determined, the code clears the selection, removes the item, and adds
    the item to the `Heroes ObservableList`. If you do not clear the selection, the
    item after the removed item will be selected.


    When working with `ObservableList`, having items removed or added will notify
    the control. What’s great about this is that there is no need to refresh the `ListView`
    UI control when the `ObservableList` changes, because the `ListView` will automatically
    be updated.


    ## Working with TableViews


    You can also use `ObservableList`s in another list-like UI controls, like the
    `TableView`. JavaFX’s `javafx.scene.control.TableView` control is analogous to
    Swing’s `JTable` component, which contains rows, columns, and cells very similar
    to spreadsheet applications. The following code snippet creates a `TableView`
    control with one column targeting the `firstName` property of a domain object.


    ```

    TableView employeeTableView = new TableView();

    TableColumn firstNameCol = new TableColumn("First Name");

    firstNameCol.setCellValueFactory(new PropertyValueFactory("firstName"));

    ```


    ### What Is a Cell Factory?


    Cell factories provide a way to customize how to display content in cells such
    as row of a `ListView` or a cell in a column of a `TableView` control. Listing
    [6-25](#A323804_3_En_6_Chapter.html#Par189) shows how to create a cell factory
    to display the first and last name of `Person` object within a `ListView`’s cell
    row.


    ```

    // display first and last name

    personListView.setCellFactory(new Callback, ListCell>() {

    @Override

    public ListCell call(ListView param) {

    Label leadLbl = new Label();

    ListCell cell = new ListCell() {

    @Override

    public void updateItem(Person item, boolean empty) {

    super.updateItem(item, empty);

    if (item != null) {

    leadLbl.setText(item.getAliasName());

    setText(item.getFirstName() + " " + item.getLastName());

    }

    }

    }; // ListCell

    return cell;

    }

    }); // setCellFactory

    Listing 6-25.

    Setting a Cell Factory (Callback) for a List View Control

    ```


    Of course, this code looks some what verbose, so Listing [6-26](#A323804_3_En_6_Chapter.html#Par191)
    shows converted the code that uses the more concise lambda based syntax.


    ```

    // display first and last name with tooltip using alias

    personListView.setCellFactory(listView -> {

    Label leadLbl = new Label();

    ListCell cell = new ListCell() {

    @Override

    public void updateItem(Person item, boolean empty) {

    super.updateItem(item, empty);

    if (item != null) {

    leadLbl.setText(item.getAliasName());

    setText(item.getFirstName() + " " + item.getLastName());

    }

    }

    }; // ListCell

    return cell;

    }); // setCellFactory

    Listing 6-26.

    A Cell Factory Set Using the Lambda-Based Syntax to Cut Down on the Boilerplate
    Code

    ```


    ### Making Table Cells Editable


    Did you ever want to be able to modify a cell? JavaFX `TableView` controls and
    their cells can be edited. When designing `TableViews`, the JavaFX engineers had
    already thought of this and made convenient functions that provide editable cells.


    #### Edit a Table Cell as a TextField


    An obvious editable cell would allow the users to edit the information tied to
    that cell with a `TextField` control. The following code snippet sets up a column
    to be an editable text field.


    ```

    TableColumn aliasNameCol = new TableColumn("Alias");

    aliasNameCol.setCellValueFactory(new PropertyValueFactory("aliasName"));

    aliasNameCol.setCellFactory(TextFieldTableCell.forTableColumn());

    ```


    Figure [6-16](#A323804_3_En_6_Chapter.html#Fig16) shows an editable cell in the
    Alias column on a `TableView` control containing employees.


    ![A323804_3_En_6_Fig16_HTML.jpg](A323804_3_En_6_Fig16_HTML.jpg)


    Figure 6-16.


    An editable cell using a text field to modify employee information. The alias
    column is set up with a cell factory using the `TextFieldTableCell.forTableColumn()`
    convenience function.


    #### Edit a Table Cell as a ComboBox


    Another control common to editing cells is the combo box. A combo box allows users
    to select enumerations as a drop-down list selection. The following code snippet
    sets up a cell column to be a combo box. Figure [6-17](#A323804_3_En_6_Chapter.html#Fig17)
    shows the combo box within a cell of the Mood column.


    ![A323804_3_En_6_Fig17_HTML.jpg](A323804_3_En_6_Fig17_HTML.jpg)


    Figure 6-17.


    An editable cell using a combo box to modify an employee’s mood property. The
    mood column is set up with a cell factory with the convenience function `ComboBoxTableCell.forTableColumn()`
    method.


    ```

    import static com.jfxbe.Person.MOOD_TYPES;

    ObservableList moods = FXCollections.observableArrayList(MOOD_TYPES.values());

    TableColumn moodCol = new TableColumn("Mood");

    moodCol.setCellValueFactory(new PropertyValueFactory("mood"));

    moodColumn.setCellFactory(ComboBoxTableCell.forTableColumn(moods));

    ```'
