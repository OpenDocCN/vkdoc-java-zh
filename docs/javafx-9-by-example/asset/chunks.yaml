- fmt: '# Drawing Text


    Another basic JavaFX node is the `Text` node, which enables you to display a string
    of characters on the scene graph. To create `Text` nodes on the JavaFX scene graph,
    you use the `javafx.scene.text.Text` class. Because all JavaFX scene nodes extend
    from `javafx.scene.Node`, they will inherit many capabilities such as the ability
    to be scaled, translated, or rotated.


    Based on the Java inheritance hierarchy, the `Text` node’s direct parent is a
    `javafx.scene.shape.Shape` class that provides even more capabilities than the
    `Node` class. Because a `Text` node is both a `Node` and a `Shape` object, it
    can perform geometric operations between two shape areas such as subtract, intersect,
    or union. You can also clip viewport areas with a shape similar to stenciled letters.


    To demonstrate drawing text, in this section you will look at a basic example
    of how to draw text nodes on the scene graph. This example touches on the following
    three capabilities:


    - Positioning `Text` nodes using (x, y) coordinates

    - Setting a `Text` node’s stroke color

    - Rotating a `Text` node about its pivot point


    To make things a little interesting, you will create 100 `Text` nodes and produce
    random values for the three capabilities just mentioned. Figure [3-16](#A323804_3_En_3_Chapter.html#Fig16)
    shows the drawing text example in action.


    ![A323804_3_En_3_Fig16_HTML.jpg](A323804_3_En_3_Fig16_HTML.jpg)


    Figure 3-16. Drawing text


    The `DrawingText.java` code shown in Listing [3-4](#A323804_3_En_3_Chapter.html#Par126)
    creates 100 `Text` nodes with randomly generated values for the following attributes:


    - x, y coordinates

    - RGB fill color

    - Angle of rotation (degrees)


    The code first creates a loop to generate random (x, y) coordinates to position
    `Text` nodes. In the loop, it creates random RGB color components between 0 and
    255 to be applied to the `Text` nodes. Setting all components to 0 produces black.
    Setting all three RGB values to 255 produces the color white.


    ```

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("Drawing Text");

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250, Color.WHITE);

    Random rand = new Random(System.currentTimeMillis());

    for (int i = 0; i < 100; i++) {

    int x = rand.nextInt((int) scene.getWidth());

    int y = rand.nextInt((int) scene.getHeight());

    int red = rand.nextInt(255);

    int green = rand.nextInt(255);

    int blue = rand.nextInt(255);

    Text text = new Text(x, y, "JavaFX 9");

    int rot = rand.nextInt(360);

    text.setFill(Color.rgb(red, green, blue, .99));

    text.setRotate(rot);

    root.getChildren().add(text);

    }

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    Listing 3-4. DrawingText.java

    ```


    The rotation angle (in degrees) is a randomly generated value from 0–360 degrees,
    which causes the baseline of the text to be tilted. According to the API documentation,
    the `setRotate()` method will rotate about the pivot point, which is the center
    of the untransformed `layoutBounds` property. Basically, the pivot point is the
    center of a node that has no transforms (scaling, translating, shearing, rotating,
    and so on) applied.


    Note


    If you need to use a combination of transforms, such as rotate, scale, and translate,
    take a look at the `getTransforms().add(...)` method. For more details on the
    difference between bounds in local, bounds in parent, and layout bounds, see the
    Javadoc documentation. Also, check out Chapter [5](#A323804_3_En_5_Chapter.html)
    on layouts and the Scene Builder.


    The following code is used in `DrawingText.java` to create random values for a
    `Text` node’s x and y position (baseline), color, and rotation:


    ```

    int x = rand.nextInt((int) scene.getWidth());

    int y = rand.nextInt((int) scene.getHeight());

    int red = rand.nextInt(255);

    int green = rand.nextInt(255);

    int blue = rand.nextInt(255);

    int rot = rand.nextInt(360);

    ```


    Once the random values are generated, they are applied to the `Text` nodes, which
    will be drawn onto the scene graph. Each `Text` node maintains a text origin property
    that contains the starting point of its baseline. In Latin-based alphabets, the
    baseline is an imaginary line underneath letters, similar to books on a bookshelf.
    However, some letters, such as the lowercase j, extend below the baseline. When
    specifying the x and y coordinate of the `Text` node you will be positioning the
    start of the baseline. In Figure [3-17](#A323804_3_En_3_Chapter.html#Fig17), the
    x and y coordinates are located left of the lowercase j on the baseline in the
    text node `javafx 9`.


    ![A323804_3_En_3_Fig17_HTML.jpg](A323804_3_En_3_Fig17_HTML.jpg)


    Figure 3-17. Text node’s baseline (x, y) coordinate position


    The following code snippet applies (x, y) coordinates, color (RGB) with an opacity
    .99, and a rotation (angle in degrees) to the `Text` node:


    ```

    Text text = new Text(x, y, "JavaFX 9");

    text.setFill(Color.rgb(red, green, blue, .99));

    text.setRotate(rot);

    root.getChildren().add(text);

    ```


    You should be starting to see the power of the scene graph API in its ease of
    use, especially when working with `Text` nodes. Here, you were able to position,
    colorize, and rotate text. To spruce things up a bit, you will next see how to
    change a text’s font and apply effects.'
  raw: '## Drawing Text


    Another basic JavaFX node is the `Text` node, which enables you to display a string
    of characters on the scene graph. To create `Text` nodes on the JavaFX scene graph,
    you use the `javafx.scene.text.Text` class. Because all JavaFX scene nodes extend
    from `javafx.scene.Node`, they will inherit many capabilities such as the ability
    to be scaled, translated, or rotated.


    Based on the Java inheritance hierarchy, the `Text` node’s direct parent is a
    `javafx.scene.shape.Shape` class that provides even more capabilities than the
    `Node` class. Because a `Text` node is both a `Node` and a `Shape` object, it
    can perform geometric operations between two shape areas such as subtract, intersect,
    or union. You can also clip viewport areas with a shape similar to stenciled letters.


    To demonstrate drawing text, in this section you will look at a basic example
    of how to draw text nodes on the scene graph. This example touches on the following
    three capabilities:


    *   Positioning `Text` nodes using (x, y) coordinates

    *   Setting a `Text` node’s stroke color

    *   Rotating a `Text` node about its pivot point


    To make things a little interesting, you will create 100 `Text` nodes and produce
    random values for the three capabilities just mentioned. Figure [3-16](#A323804_3_En_3_Chapter.html#Fig16)
    shows the drawing text example in action.


    ![A323804_3_En_3_Fig16_HTML.jpg](A323804_3_En_3_Fig16_HTML.jpg)


    Figure 3-16.


    Drawing text


    The `DrawingText.java` code shown in Listing [3-4](#A323804_3_En_3_Chapter.html#Par126)
    creates 100 `Text` nodes with randomly generated values for the following attributes:


    *   x, y coordinates

    *   RGB fill color

    *   Angle of rotation (degrees)


    The code first creates a loop to generate random (x, y) coordinates to position
    `Text` nodes. In the loop, it creates random RGB color components between 0 and
    255 to be applied to the `Text` nodes. Setting all components to 0 produces black.
    Setting all three RGB values to 255 produces the color white.


    ```

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("Drawing Text");

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250, Color.WHITE);

    Random rand = new Random(System.currentTimeMillis());

    for (int i = 0; i < 100; i++) {

    int x = rand.nextInt((int) scene.getWidth());

    int y = rand.nextInt((int) scene.getHeight());

    int red = rand.nextInt(255);

    int green = rand.nextInt(255);

    int blue = rand.nextInt(255);

    Text text = new Text(x, y, "JavaFX 9");

    int rot = rand.nextInt(360);

    text.setFill(Color.rgb(red, green, blue, .99));

    text.setRotate(rot);

    root.getChildren().add(text);

    }

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    Listing 3-4.

    DrawingText.java

    ```


    The rotation angle (in degrees) is a randomly generated value from 0–360 degrees,
    which causes the baseline of the text to be tilted. According to the API documentation,
    the `setRotate()` method will rotate about the pivot point, which is the center
    of the untransformed [layout bounds](http://docs.oracle.com/javafx/2/api/javafx/scene/Node.html#layoutBoundsProperty())
    (`layoutBounds`) property. Basically, the pivot point is the center of a node
    that has no transforms (scaling, translating, shearing, rotating, and so on) applied.


    Note


    If you need to use a combination of transforms, such as rotate, scale, and translate,
    take a look at the `getTransforms().add(...)` method. For more details on the
    difference between bounds in local, bounds in parent, and layout bounds, see the
    Javadoc documentation. Also, check out Chapter [5](#A323804_3_En_5_Chapter.html)
    on layouts and the Scene Builder.


    The following code is used in `DrawingText.java` to create random values for a
    `Text` node’s x and y position (baseline), color, and rotation:


    ```

    int x = rand.nextInt((int) scene.getWidth());

    int y = rand.nextInt((int) scene.getHeight());

    int red = rand.nextInt(255);

    int green = rand.nextInt(255);

    int blue = rand.nextInt(255);

    int rot = rand.nextInt(360);

    ```


    Once the random values are generated, they are applied to the `Text` nodes, which
    will be drawn onto the scene graph. Each `Text` node maintains a text origin property
    that contains the starting point of its baseline. In Latin-based alphabets, the
    baseline is an imaginary line underneath letters, similar to books on a bookshelf.
    However, some letters, such as the lowercase j, extend below the baseline. When
    specifying the x and y coordinate of the `Text` node you will be positioning the
    start of the baseline. In Figure [3-17](#A323804_3_En_3_Chapter.html#Fig17), the
    x and y coordinates are located left of the lowercase j on the baseline in the
    text node `javafx 9`.


    ![A323804_3_En_3_Fig17_HTML.jpg](A323804_3_En_3_Fig17_HTML.jpg)


    Figure 3-17.


    Text node’s baseline (x, y) coordinate position


    The following code snippet applies (x, y) coordinates, color (RGB) with an opacity
    .99, and a rotation (angle in degrees) to the `Text` node:


    ```

    Text text = new Text(x, y, "JavaFX 9");

    text.setFill(Color.rgb(red, green, blue, .99));

    text.setRotate(rot);

    root.getChildren().add(text);

    ```


    You should be starting to see the power of the scene graph API in its ease of
    use, especially when working with `Text` nodes. Here, you were able to position,
    colorize, and rotate text. To spruce things up a bit, you will next see how to
    change a text’s font and apply effects.'
  trans: '

    ## 绘制文本


    另一个基本的 JavaFX 节点是 `Text` 节点，它允许你在场景图上显示一串字符。要在 JavaFX 场景图上创建 `Text` 节点，你需要使用 `javafx.scene.text.Text`
    类。由于所有 JavaFX 场景节点都继承自 `javafx.scene.Node`，因此它们会继承许多功能，例如缩放、平移或旋转的能力。


    基于 Java 的继承层次结构，`Text` 节点的直接父类是 `javafx.scene.shape.Shape` 类，它提供了比 `Node` 类更多的功能。由于
    `Text` 节点既是 `Node` 对象又是 `Shape` 对象，因此它可以在两个形状区域之间执行几何运算，例如相减、相交或并集。你还可以使用类似于镂空字母的形状来裁剪视口区域。


    为了演示绘制文本，在本节中，你将看到一个关于如何在场景图上绘制文本节点的基本示例。此示例涉及以下三个功能：


    *   使用 (x, y) 坐标定位 `Text` 节点

    *   设置 `Text` 节点的描边颜色

    *   围绕其枢轴点旋转 `Text` 节点


    为了让事情变得有趣一些，你将创建 100 个 `Text` 节点，并为刚才提到的三个功能生成随机值。图 3-16 展示了绘制文本示例的运行效果。


    ![A323804_3_En_3_Fig16_HTML.jpg](img/A323804_3_En_3_Fig16_HTML.jpg)


    图 3-16.


    绘制文本


    清单 3-4 中所示的 `DrawingText.java` 代码创建了 100 个 `Text` 节点，并为以下属性生成了随机值：


    *   x, y 坐标

    *   RGB 填充颜色

    *   旋转角度（度）


    代码首先创建一个循环来生成随机的 (x, y) 坐标以定位 `Text` 节点。在循环中，它创建介于 0 到 255 之间的随机 RGB 颜色分量，并将其应用于
    `Text` 节点。将所有分量设置为 0 会产生黑色。将所有三个 RGB 值设置为 255 会产生白色。


    ```

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("Drawing Text");

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250, Color.WHITE);

    Random rand = new Random(System.currentTimeMillis());

    for (int i = 0; i < 100; i++) {

    int x = rand.nextInt((int) scene.getWidth());

    int y = rand.nextInt((int) scene.getHeight());

    int red = rand.nextInt(255);

    int green = rand.nextInt(255);

    int blue = rand.nextInt(255);

    Text text = new Text(x, y, "JavaFX 9");

    int rot = rand.nextInt(360);

    text.setFill(Color.rgb(red, green, blue, .99));

    text.setRotate(rot);

    root.getChildren().add(text);

    }

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    清单 3-4.

    DrawingText.java

    ```


    旋转角度（以度为单位）是一个从 0 到 360 度随机生成的值，这会导致文本的基线倾斜。根据 API 文档，`setRotate()` 方法将围绕枢轴点旋转，该枢轴点是未变换的[布局边界](http://docs.oracle.com/javafx/2/api/javafx/scene/Node.html#layoutBoundsProperty())（`layoutBounds`）属性的中心。基本上，枢轴点是没有应用任何变换（缩放、平移、剪切、旋转等）的节点的中心。


    注意


    如果你需要使用变换的组合，例如旋转、缩放和平移，请查看 `getTransforms().add(...)` 方法。有关局部边界、父边界和布局边界之间差异的更多详细信息，请参阅
    Javadoc 文档。另外，请查看关于布局和 Scene Builder 的第 5 章。


    以下代码用于 `DrawingText.java` 中，为 `Text` 节点的 x 和 y 位置（基线）、颜色和旋转创建随机值：


    ```

    int x = rand.nextInt((int) scene.getWidth());

    int y = rand.nextInt((int) scene.getHeight());

    int red = rand.nextInt(255);

    int green = rand.nextInt(255);

    int blue = rand.nextInt(255);

    int rot = rand.nextInt(360);

    ```


    生成随机值后，它们会被应用于 `Text` 节点，这些节点将被绘制到场景图上。每个 `Text` 节点都维护一个文本原点属性，该属性包含其基线的起始点。在基于拉丁字母的字母表中，基线是字母下方的一条假想线，类似于书架上的书。但是，某些字母（例如小写字母
    j）会延伸到基线以下。在指定 `Text` 节点的 x 和 y 坐标时，你实际上是在定位基线的起点。在图 3-17 中，x 和 y 坐标位于文本节点 `javafx
    9` 中基线左侧的小写字母 j 下方。


    ![A323804_3_En_3_Fig17_HTML.jpg](img/A323804_3_En_3_Fig17_HTML.jpg)


    图 3-17.


    文本节点的基线 (x, y) 坐标位置


    以下代码片段将 (x, y) 坐标、颜色（RGB，不透明度为 .99）和旋转（角度，以度为单位）应用于 `Text` 节点：


    ```

    Text text = new Text(x, y, "JavaFX 9");

    text.setFill(Color.rgb(red, green, blue, .99));

    text.setRotate(rot);

    root.getChildren().add(text);

    ```


    你应该开始看到场景图 API 的易用性所带来的强大功能，尤其是在处理 `Text` 节点时。在这里，你能够定位、着色和旋转文本。为了稍微美化一下，接下来你将看到如何更改文本的字体并应用效果。

    '
- fmt: '### Changing Text Fonts


    JavaFX 的 `Font` API 使您能够像文字处理应用程序一样更改字体样式和字体大小。为了演示这一点，我创建了一个 JavaFX 应用程序，该应用程序显示四个文本节点，其字符串值为
    `"JavaFX 9 by Example"`，每个节点具有不同的字体样式。除了字体样式之外，我还添加了诸如投影（`DropShadow`）和反射（`Reflection`）之类的效果。


    图 [3-18](#A323804_3_En_3_Chapter.html#Fig18) 显示了示例的输出，清单 [3-5](#A323804_3_En_3_Chapter.html#Par137)
    显示了 `ChangingTextFonts.java` 源代码。


    ![A323804_3_En_3_Fig18_HTML.jpg](A323804_3_En_3_Fig18_HTML.jpg)


    图 3-18. 更改文本字体


    ```

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("Changing Text Fonts");

    System.out.println("Font families: ");

    Font.getFamilies()

    .stream()

    .forEach( i -> System.out.println(i));

    System.out.println("Font names: ");

    Font.getFontNames()

    .stream()

    .forEach( i -> System.out.println(i));

    Group root = new Group();

    Scene scene = new Scene(root, 580, 250, Color.WHITE);

    // Serif with drop shadow

    Text text2 = new Text(50, 50, "JavaFX 9 by Example");

    Font serif = Font.font("Serif", 30);

    text2.setFont(serif);

    text2.setFill(Color.RED);

    DropShadow dropShadow = new DropShadow();

    dropShadow.setOffsetX(2.0f);

    dropShadow.setOffsetY(2.0f);

    dropShadow.setColor(Color.rgb(50, 50, 50, .588));

    text2.setEffect(dropShadow);

    root.getChildren().add(text2);

    // SanSerif

    Text text3 = new Text(50, 100, "JavaFX 9 by Example");

    Font sanSerif = Font.font("SanSerif", 30);

    text3.setFont(sanSerif);

    text3.setFill(Color.BLUE);

    root.getChildren().add(text3);

    // Dialog

    Text text4 = new Text(50, 150, "JavaFX 9 by Example");

    Font dialogFont = Font.font("Dialog", 30);

    text4.setFont(dialogFont);

    text4.setFill(Color.rgb(0, 255, 0));

    root.getChildren().add(text4);

    // Monospaced

    Text text5 = new Text(50, 200, "JavaFX 9 by Example");

    Font monoFont = Font.font("Monospaced", 30);

    text5.setFont(monoFont);

    text5.setFill(Color.BLACK);

    root.getChildren().add(text5);

    // Reflection

    Reflection refl = new Reflection();

    refl.setFraction(0.8f);

    refl.setTopOffset(5);

    text5.setEffect(refl);

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    清单 3-5. ChangingTextFonts.java

    ```


    **注意**


    清单 [3-5](#A323804_3_En_3_Chapter.html#Par137) `ChangingTextFonts.java` 仅展示了 `start()`
    方法，这是示例应用程序的核心。要查看完整的代码清单，请从 `Apress.com` 下载本书的完整示例代码。


    对于 `Text` 节点，JavaFX 采用保留模式方法，其中节点使用基于矢量的图形渲染，而不是立即模式渲染。立即模式使用位图图形渲染策略。通过使用基于矢量的图形，您将拥有比位图图形更显著的优势。主要优势在于，它们允许您缩放形状并应用不同的效果而不会出现像素化（锯齿）。例如，在立即模式渲染中，图像在放大时会变得颗粒化。然而，在保留模式下，您将获得平滑（抗锯齿）的形状。能够看到所有不同尺寸下都平滑的漂亮字体（排版）真是太好了。


    `ChangingTextFonts.java` 重点介绍了以下要应用于 `Text` 节点的 JavaFX 类。该代码使用了 Serif、SanSerif、Dialog
    和 Monospaced 字体以及投影和反射效果。


    *   `javafx.scene.text.Font`

    *   `javafx.scene.effect.DropShadow`

    *   `javafx.scene.effect.Reflection`


    代码首先在舞台上设置标题。接下来，您会注意到新的 Java 8 语言 lambda 特性在起作用，代码列出了当前系统可用的字体族和字体名称。如果您不熟悉 lambda，在第
    [4](#A323804_3_En_4_Chapter.html) 章中，您将更深入地了解这个概念，但现在您可以将其视为一种优雅的迭代集合的方式。字体族和字体名称列表将打印在控制台输出中。这对于您稍后尝试不同的字体样式非常方便。以下行使用
    Java 8 的 lambda 语法列出了当前系统上可用的字体：


    ```

    System.out.println("Font families: ");

    Font.getFamilies()

    .stream()

    .forEach( i -> System.out.println(i));

    System.out.println("Font names: ");

    Font.getFontNames()

    .stream()

    .forEach( i -> System.out.println(i));

    ```


    **注意**


    如果所选字体未安装在您的系统上，`Text` 节点将使用默认系统字体。有许多网站提供可供下载和安装的字体。请查看 Google Fonts：[`https://www.google.com/fonts`](https://www.google.com/fonts)。


    列出可用字体后，代码会为其场景创建一个带有背景颜色的根节点。在绘制第一个 `Text` 节点之前，让我们快速讨论一下如何获取字体。为了获取字体，代码调用了
    `Font` 类的静态方法 `font()`。在调用 `font()` 方法时，您可以指定字体名称和磅值，以向调用者返回合适的字体。字体名称是一个字符串值，表示系统支持的字体类型。请参阅
    Javadoc 文档以了解获取系统字体的其他方法。以下几行展示了创建 `Text` 节点实例并获取 30 磅 Serif 字体的过程。获取字体后，使用 `Text`
    节点的 `setFont()` 方法来应用该字体。


    ```

    Text text = new Text(50, 50, "JavaFX 9 by Example");

    Font serif = Font.font("Serif", 30);

    text.setFont(serif);

    ```


    **注意**


    尽管清单 [2-5](#A323804_3_En_2_Chapter.html#Par97) 使用了文本节点的绝对定位，但有时您可能希望显示文本节点，并能够在同一布局中换行多个文本节点，同时保持它们自己的字体格式。要实现此行为，请参考
    JavaFX 8 的新 `TextFlow` API。请参阅以下位置的 Javadoc 文档：[`https://docs.oracle.com/javase/8/javafx/api/javafx/scene/text/TextFlow.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/text/TextFlow.html)'
  raw: '### Changing Text Fonts


    JavaFX’s `Font` API enables you to change font styles and font sizes in the same
    way as word processing applications. To demonstrate this, I created a JavaFX application
    that displays four text nodes with the string value of `"JavaFX 9 by Example"`,
    each having a different font style. In addition to the font styles, I also added
    effects such as a drop shadow (`DropShadow`) and reflection (`Reflection`).


    Figure [3-18](#A323804_3_En_3_Chapter.html#Fig18) shows the example’s output,
    and Listing [3-5](#A323804_3_En_3_Chapter.html#Par137) shows the `ChangingTextFonts.java`
    source code.


    ![A323804_3_En_3_Fig18_HTML.jpg](A323804_3_En_3_Fig18_HTML.jpg)


    Figure 3-18.


    Changing text fonts


    ```

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("Changing Text Fonts");

    System.out.println("Font families: ");

    Font.getFamilies()

    .stream()

    .forEach( i -> System.out.println(i));

    System.out.println("Font names: ");

    Font.getFontNames()

    .stream()

    .forEach( i -> System.out.println(i));

    Group root = new Group();

    Scene scene = new Scene(root, 580, 250, Color.WHITE);

    // Serif with drop shadow

    Text text2 = new Text(50, 50, "JavaFX 9 by Example");

    Font serif = Font.font("Serif", 30);

    text2.setFont(serif);

    text2.setFill(Color.RED);

    DropShadow dropShadow = new DropShadow();

    dropShadow.setOffsetX(2.0f);

    dropShadow.setOffsetY(2.0f);

    dropShadow.setColor(Color.rgb(50, 50, 50, .588));

    text2.setEffect(dropShadow);

    root.getChildren().add(text2);

    // SanSerif

    Text text3 = new Text(50, 100, "JavaFX 9 by Example");

    Font sanSerif = Font.font("SanSerif", 30);

    text3.setFont(sanSerif);

    text3.setFill(Color.BLUE);

    root.getChildren().add(text3);

    // Dialog

    Text text4 = new Text(50, 150, "JavaFX 9 by Example");

    Font dialogFont = Font.font("Dialog", 30);

    text4.setFont(dialogFont);

    text4.setFill(Color.rgb(0, 255, 0));

    root.getChildren().add(text4);

    // Monospaced

    Text text5 = new Text(50, 200, "JavaFX 9 by Example");

    Font monoFont = Font.font("Monospaced", 30);

    text5.setFont(monoFont);

    text5.setFill(Color.BLACK);

    root.getChildren().add(text5);

    // Reflection

    Reflection refl = new Reflection();

    refl.setFraction(0.8f);

    refl.setTopOffset(5);

    text5.setEffect(refl);

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    Listing 3-5.

    ChangingTextFonts.java

    ```


    Note


    Listing [3-5](#A323804_3_En_3_Chapter.html#Par137), `ChangingTextFonts.java`,
    presents only the `start()` method, which is the heart of the example application.
    To see the full code listing, download the book’s full example code from `Apress.`
    `com` .


    With `Text` nodes, JavaFX takes a retained-mode approach , in which nodes are
    using vector-based graphics rendering instead of an immediate mode rendering.
    The immediate mode uses bitmap graphic rendering strategies. By using vector-based
    graphics you will have nifty advantages over bitmap graphics. The major advantage
    is that they allow you to scale shapes and apply different effects without pixilation
    (the jaggies). For example, in an immediate mode rendering the image becomes grainy
    when scaled larger. However, in retained mode, you will have smooth (anti-aliased)
    shapes. It’s nice to be able to see beautiful type fonts (typography) that are
    smooth at all different sizes.


    `ChangingTextFonts.java` focuses on the following JavaFX classes to be applied
    to the `Text` node. The code uses the Serif, SanSerif, Dialog, and Monospaced
    fonts along with the drop shadow and reflection effects.


    *   `javafx.scene.text.Font`

    *   `javafx.scene.effect.DropShadow`

    *   `javafx.scene.effect.Reflection`


    The code begins by setting the title on the stage. Next, you will notice the new
    Java 8 language lambdas feature at work, where the code lists the current system’s
    available font families and font names . If you are new to lambdas, in Chapter
    [4](#A323804_3_En_4_Chapter.html) you will take a closer look at the concept,
    but for right now you can think of it as an elegant way to iterate over collections.
    The font family and font name list will be printed on the console output. This
    is very convenient for you to later experiment with different font styles. The
    following lines list the available fonts on the current system using Java 8’s
    lambda syntax:


    ```

    System.out.println("Font families: ");

    Font.getFamilies()

    .stream()

    .forEach( i -> System.out.println(i));

    System.out.println("Font names: ");

    Font.getFontNames()

    .stream()

    .forEach( i -> System.out.println(i));

    ```


    Note


    In case the selected font is not installed on your system, `Text` nodes will use
    a default system font. There are many sites that offer fonts that you can download
    and install. Check out Google Fonts at [`https://www.google.com/fonts`](https://www.google.com/fonts)
    .


    After listing the available fonts, the code creates a root node with a background
    color for its scene. Before drawing the first `Text` node, let’s quickly discuss
    how to obtain a font. To obtain a font, the code invokes the static method `font()`
    from the `Font` class. When calling the `font()` method, you can specify the font
    name and the point size to return a suitable font to the caller. A font name is
    a string value that represents a system’s supported font types. Refer to the Javadoc
    documentation to see the other ways to obtain system fonts. The following lines
    show the creation of a `Text` node instance and obtaining a 30 point Serif font.
    Once the font is obtained, the `Text` node `setFont()` method is used to apply
    the font.


    ```

    Text text = new Text(50, 50, "JavaFX 9 by Example");

    Font serif = Font.font("Serif", 30);

    text.setFont(serif);

    ```


    Note


    Although Listing [2-5](#A323804_3_En_2_Chapter.html#Par97) uses absolute positioning
    of text nodes , at some point you may want to display text nodes with the ability
    to wrap several text nodes while keeping their own font formatting in the same
    layout. To achieve this behavior , refer to JavaFX 8’s new `TextFlow` API. Refer
    to the Javadoc documentation at: [`https://docs.oracle.com/javase/8/javafx/api/javafx/scene/text/TextFlow.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/text/TextFlow.html)'
  trans: '

    ### 更改文本字体


    JavaFX 的 `Font` API 使您能够像文字处理应用程序一样更改字体样式和字号。为了演示这一点，我创建了一个 JavaFX 应用程序，它显示四个文本节点，其字符串值为
    `"JavaFX 9 by Example"`，每个节点具有不同的字体样式。除了字体样式之外，我还添加了诸如投影（`DropShadow`）和反射（`Reflection`）之类的效果。


    图 3-18 显示了示例的输出，清单 3-5 显示了 `ChangingTextFonts.java` 源代码。


    ![A323804_3_En_3_Fig18_HTML.jpg](img/A323804_3_En_3_Fig18_HTML.jpg)


    图 3-18.


    更改文本字体


    ```

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("Changing Text Fonts");

    System.out.println("Font families: ");

    Font.getFamilies()

    .stream()

    .forEach( i -> System.out.println(i));

    System.out.println("Font names: ");

    Font.getFontNames()

    .stream()

    .forEach( i -> System.out.println(i));

    Group root = new Group();

    Scene scene = new Scene(root, 580, 250, Color.WHITE);

    // Serif with drop shadow

    Text text2 = new Text(50, 50, "JavaFX 9 by Example");

    Font serif = Font.font("Serif", 30);

    text2.setFont(serif);

    text2.setFill(Color.RED);

    DropShadow dropShadow = new DropShadow();

    dropShadow.setOffsetX(2.0f);

    dropShadow.setOffsetY(2.0f);

    dropShadow.setColor(Color.rgb(50, 50, 50, .588));

    text2.setEffect(dropShadow);

    root.getChildren().add(text2);

    // SanSerif

    Text text3 = new Text(50, 100, "JavaFX 9 by Example");

    Font sanSerif = Font.font("SanSerif", 30);

    text3.setFont(sanSerif);

    text3.setFill(Color.BLUE);

    root.getChildren().add(text3);

    // Dialog

    Text text4 = new Text(50, 150, "JavaFX 9 by Example");

    Font dialogFont = Font.font("Dialog", 30);

    text4.setFont(dialogFont);

    text4.setFill(Color.rgb(0, 255, 0));

    root.getChildren().add(text4);

    // Monospaced

    Text text5 = new Text(50, 200, "JavaFX 9 by Example");

    Font monoFont = Font.font("Monospaced", 30);

    text5.setFont(monoFont);

    text5.setFill(Color.BLACK);

    root.getChildren().add(text5);

    // Reflection

    Reflection refl = new Reflection();

    refl.setFraction(0.8f);

    refl.setTopOffset(5);

    text5.setEffect(refl);

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    清单 3-5.

    ChangingTextFonts.java

    ```


    注意


    清单 3-5 `ChangingTextFonts.java` 仅展示了 `start()` 方法，这是示例应用程序的核心。要查看完整的代码清单，请从 `Apress.com`
    下载本书的完整示例代码。


    对于 `Text` 节点，JavaFX 采用保留模式方法，其中节点使用基于矢量的图形渲染，而不是立即模式渲染。立即模式使用位图图形渲染策略。通过使用基于矢量的图形，您将拥有比位图图形更显著的优势。主要优势在于，它们允许您缩放形状并应用不同的效果，而不会出现像素化（锯齿状边缘）。例如，在立即模式渲染中，图像在放大时会变得颗粒化。然而，在保留模式下，您将获得平滑（抗锯齿）的形状。能够看到所有不同尺寸下都平滑美观的字体（排版）真是太好了。


    `ChangingTextFonts.java` 重点介绍了以下要应用于 `Text` 节点的 JavaFX 类。该代码使用了 Serif、SanSerif、Dialog
    和 Monospaced 字体，以及投影和反射效果。


    *   `javafx.scene.text.Font`

    *   `javafx.scene.effect.DropShadow`

    *   `javafx.scene.effect.Reflection`


    代码首先在舞台上设置标题。接下来，您会注意到新的 Java 8 语言 lambda 特性正在发挥作用，代码列出了当前系统可用的字体族和字体名称。如果您不熟悉
    lambda，在第 4 章中您将更深入地了解这个概念，但现在您可以将其视为一种优雅的迭代集合的方式。字体族和字体名称列表将打印在控制台输出中。这对于您稍后尝试不同的字体样式非常方便。以下几行使用
    Java 8 的 lambda 语法列出了当前系统上可用的字体：


    ```

    System.out.println("Font families: ");

    Font.getFamilies()

    .stream()

    .forEach( i -> System.out.println(i));

    System.out.println("Font names: ");

    Font.getFontNames()

    .stream()

    .forEach( i -> System.out.println(i));

    ```


    注意


    如果所选字体未安装在您的系统上，`Text` 节点将使用默认的系统字体。有许多网站提供可供您下载和安装的字体。请查看 Google Fonts：[`https://www.google.com/fonts`](https://www.google.com/fonts)。


    列出可用字体后，代码会创建一个根节点，并为其场景设置背景颜色。在绘制第一个 `Text` 节点之前，让我们快速讨论一下如何获取字体。为了获取字体，代码调用了
    `Font` 类中的静态方法 `font()`。调用 `font()` 方法时，您可以指定字体名称和磅值，以向调用者返回合适的字体。字体名称是一个字符串值，表示系统支持的字体类型。请参阅
    Javadoc 文档以了解获取系统字体的其他方法。以下几行展示了创建 `Text` 节点实例并获取 30 磅 Serif 字体的过程。获取字体后，使用 `Text`
    节点的 `setFont()` 方法来应用该字体。


    ```

    Text text = new Text(50, 50, "JavaFX 9 by Example");

    Font serif = Font.font("Serif", 30);

    text.setFont(serif);

    ```


    注意


    尽管清单 2-5 使用了文本节点的绝对定位，但有时您可能希望显示文本节点，并能够在同一布局中换行显示多个文本节点，同时保持它们各自的字体格式。要实现此行为，请参考
    JavaFX 8 的新 `TextFlow` API。请参阅以下网址的 Javadoc 文档：[`https://docs.oracle.com/javase/8/javafx/api/javafx/scene/text/TextFlow.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/text/TextFlow.html)

