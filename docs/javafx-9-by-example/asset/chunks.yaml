    \ shows the statements for how to compile the code, copy resources and run the\
    \ Weather Widget application on the DOS command prompt (terminal).\n\n```\n//\
    \ MacOSX and Linux\n// Compile\n$ javac -d mods/com.jfxbe.weatherwidget $(find\
    \ src/com.jfxbe.weatherwidget -name \"*.java\")\n// Copy resource\n$ cp src/com.jfxbe.weatherwidget/com/jfxbe/weatherwidget/weather_template.html\
    \ \\\nmods/com.jfxbe.weatherwidget/com/jfxbe/weatherwidget\n// Run Application\n\
    $ java --add-modules jdk.incubator.httpclient --module-path mods -m com.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget\n\
    \n// Windows OS\n// Compile\nc:\\jfxbe\\chap10> javac -d mods\\com.jfxbe.weatherwidget\
    \ src\\com.jfxbe.weatherwidget\\module-info.java src\\com.jfxbe.weatherwidget\\\
    com\\jfxbe.weatherwidget\\WeatherWidget.java\n// Copy resource\nc:\\jfxbe\\chap10>\
    \ copy src\\com.jfxbe.weatherwidget\\com\\jfxbe.weatherwidget\\weather_template.html\n\
    mods\\com.jfxbe.weatherwidget\\com\\jfxbe.weatherwidget\n// Run Application\n\
    c:\\jfxbe\\chap10> java --add-modules jdk.incubator.httpclient --module-path mods\
    \ -m com.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget\n```\n\n**Listing\
    \ 10-20.** The Statements to Compile, Copy Resources, and Run the Weather Widget\
    \ Application Example\n\nThe compile statement will place the compiled classes\
    \ into the `mods/com.jfxbe.weatherwidget` directory. When compiling, you should\
    \ see the following warning on the console:\n\n```\nwarning: using incubating\
    \ module(s): jdk.incubator.httpclient\n1 warning\n```\n\nYou can ignore the warning\
    \ and proceed with the other steps. The warning basically indicates that it is\
    \ considered experimental and not part of the core.\n\nOnce you have compiled\
    \ the code, you need to copy resources into the compiled area. Copying the resources\
    \ will make files available during runtime. Usually your favorite IDE will copy\
    \ resources automatically. The last statement runs the application by adding the\
    \ `jdk.incubator.httpclient` module via `--add-modules` and using the `--module-path`\
    \ to point the newly compiled module to the `mods` directory. Note the `-m` switch,\
    \ which tells the Java runtime which module to run and which class contains the\
    \ `main` application. In this case, the module name and main class name are specified\
    \ like so:\n\n```\ncom.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget.\n\
    ```\n\nAfter successfully running the application, Figure [10-2](#A323804_3_En_10_Chapter.html#Fig2)\
    \ shows the Weather Widget application window.\n\nBefore I get too far ahead relating\
    \ to the source code, I want to point out that for the Weather Widget application\
    \ to successfully retrieve data, a valid API key must be obtained from the folks\
    \ at Open Weather Map. To register and get an API key, go to [`http://openweathermap.org`](http://openweathermap.org).\
    \ If this is the first time you’ve run the application, you will be prompted with\
    \ a dialog window asking you to enter in the API key, as shown in Figure [10-3](#A323804_3_En_10_Chapter.html#Fig3).\n\
    \n![A323804_3_En_10_Fig3_HTML.jpg](A323804_3_En_10_Fig3_HTML.jpg)\n\n**Figure\
    \ 10-3.** A dialog to enter the API key from the Open Weather Map\n\nOnce the\
    \ API key is entered and accepted, it will be stored locally in a file named:\n\
    \n```\n{user.home}/.openweathermap-api-key\n```\n\nWhere `{user.home}` is where\
    \ you substitute your home directory. Once the file is saved, when you launch\
    \ the application again, the API key file will be loaded instead of prompting\
    \ the user for the API key.\n\nIn Java’s system properties, `user.home` is the\
    \ user’s home directory depending on the operating system. See the Javadoc documentation\
    \ and tutorial at the following:\n\n```\nhttps://docs.oracle.com/javase/tutorial/essential/environment/sysprop.html\n\
    ```\n\n**Note:** The web service in this example is powered by the people of Open\
    \ Weather Map ([`http://openweathermap.org`](http://openweathermap.org)). I encourage\
    \ you to support them as they continue to provide a valuable service with maps\
    \ and weather data around the world for application and mobile developers.\n\n\
    ### One-Liner: Reading an Input Stream into a String\n\nAs a really nice trick\
    \ for how the Weather Widget example loads the API key file, I created a simple\
    \ static utility method `streamToString()`. This handy utility method allows you\
    \ to read a file’s content or a connection’s input stream and convert it into\
    \ a string.\n\nWhen you look at the Weather Widget example’s source code, the\
    \ method will attempt to read a local file as a string containing an API key issued\
    \ from the web site [`http://openweathermap.org`](http://openweathermap.org).\n\
    \nListing [10-21](#A323804_3_En_10_Chapter.html#Par209) shows how to convert an\
    \ input stream into a `String` object.\n\n```\nprivate static String streamToString(InputStream\
    \ inputStream) {\n    String text = new Scanner(inputStream, \"UTF-8\")\n    \
    \    .useDelimiter(\"\\\\Z\")\n        .next();\n    return text;\n}\n```\n\n\
    **Listing 10-21.** A Static Method that Reads a Text File Returned as a String\
    \ Object to the Caller\n\nYou will quickly notice the strange one-line statement\
    \ that “magically” converts an input stream into a `String` object. The `streamToString()`\
    \ method uses the convenient `Scanner` API. This API is excellent for reading\
    \ text files that have delimited text lines, such as comma-separated values (CSV).\
    \ `Scanner` objects default their delimiter as an end-of-line character (`\\n`).\n\
    \nBy setting the end-of-file (EOF) marker (`\\\\Z`) as the delimiter, the `next()`\
    \ method will return the text stream before the end, creating the entire text\
    \ as one field. Of course, there are other ways to retrieve text data, and probably\
    \ more efficient ways, too; however, you can see that using this strategy can\
    \ handle common situations with small- to medium-sized data requests (up to ∼3MB).\
    \ The size can be an issue because the data is converted to a `String` object\
    \ and, depending on the number of requests without garbage collection, memory\
    \ resources can be easily consumed—possibly overwhelming the application. Since\
    \ it is only an API key consisting of a hash, it should be perfectly fine.\n\n\
    The Weather Widget allows users to enter a city or region into the search field\
    \ to determine the weather condition. After fetching the JSON weather data, the\
    \ screen will display the following information: City, Country, Day of Week, Time\
    \ (Last update), Weather Condition, Weather Description, Icon, Temperature, Humidity,\
    \ and Wind Speed. The code will execute the JavaScript code to populate the display.\n\
    \nOkay, enough with the pre-requisites and description of the application—let’s\
    \ now look at the Weather Widget’s source code."
  raw: '### Weather Widget Example


    The example demonstrated in this section is a Weather Widget that combines all
    the web-based concepts mentioned so far. The example is a JavaFX application that
    loads JSON weather information from the Open Weather Map API at [`http://openweathermap.org`](http://openweathermap.org)
    . Figure [10-2](#A323804_3_En_10_Chapter.html#Fig2) shows the Weather Widget example
    with the current weather conditions in Columbus Ohio, USA.


    ![A323804_3_En_10_Fig2_HTML.jpg](A323804_3_En_10_Fig2_HTML.jpg)


    Figure 10-2.


    A Weather Widget displaying the current weather condition. Once you’ve entered
    the city, state code, and country code in the format of “CITY STATE,COUNTRY,”
    you click the Search button to fetch the JSON data.


    To download the code, go to the book’s web site or to [`https://github.com/carldea/jfx9be`](https://github.com/carldea/jfx9be)
    for instructions on how to compile and run the code. Because the `http2` module
    is part of the incubator area, I want to bring it to your attention when you include
    the module when compiling and running a warning. Listing [10-20](#A323804_3_En_10_Chapter.html#Par192)
    shows the statements for how to compile the code, copy resources and run the Weather
    Widget application on the DOS command prompt (terminal).


    ```

    // MacOSX and Linux

    // Compile

    $ javac -d mods/com.jfxbe.weatherwidget $(find src/com.jfxbe.weatherwidget -name
    "*.java")

    // Copy resource

    $ cp src/com.jfxbe.weatherwidget/com/jfxbe/weatherwidget/weather_template.html
    \

    mods/com.jfxbe.weatherwidget/com/jfxbe/weatherwidget

    // Run Application

    $ java --add-modules jdk.incubator.httpclient --module-path mods -m com.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget

    // Windows OS

    // Compile

    c:\jfxbe\chap10> javac -d mods\com.jfxbe.weatherwidget src\com.jfxbe.weatherwidget\module-info.java
    src\com.jfxbe.weatherwidget\com.jfxbe.weatherwidget\WeatherWidget.java

    // Copy resource

    c:\jfxbe\chap10> copy src\com.jfxbe.weatherwidget\com\jfxbe\weatherwidget\weather_template.html

    mods\com.jfxbe.weatherwidget\com\jfxbe\weatherwidget

    // Run Application

    c:\jfxbe\chap10> java --add-modules jdk.incubator.httpclient --module-path mods
    -m com.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget

    Listing 10-20.

    The Statements to Compile, Copy Resources, and Run the Weather Widget Application
    Example

    ```


    The compile statement will place the compiled classes into the `mods/com.jfxbe.weatherwidget`
    directory. When compiling, you should see the following warning on the console:


    ```

    warning: using incubating module(s): jdk.incubator.httpclient

    1 warning

    ```


    You can ignore the warning and proceed with the other steps. The warning basically
    indicates that it is considered experimental and not part of the core.


    Once you have compiled the code, you need to copy resources into the compiled
    area. Copying the resources will make files available during runtime. Usually
    your favorite IDE will copy resources automatically. The last statement runs the
    application by adding the `jdk.incubator.httpclient` module via `--add-modules`
    and using the `--module-path` to point the newly compiled module to the `mods`
    directory. Note the `-m` switch, which tells the Java runtime which module to
    run and which class contains the `main` application. In this case, the module
    name and main class name are specified like so:


    ```

    com.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget.

    ```


    After successfully running the application , Figure [10-2](#A323804_3_En_10_Chapter.html#Fig2)
    shows the Weather Widget application window.


    Before I get too far ahead relating to the source code, I want to point out that
    for the Weather Widget application to successfully retrieve data, a valid API
    key must be obtained from the folks at Open Weather Map. To register and get an
    API key, go to [`http://openweathermap.org`](http://openweathermap.org) . If this
    is the first time you’ve run the application, you will be prompted with a dialog
    window asking you to enter in the API key, as shown in Figure [10-3](#A323804_3_En_10_Chapter.html#Fig3).


    ![A323804_3_En_10_Fig3_HTML.jpg](A323804_3_En_10_Fig3_HTML.jpg)


    Figure 10-3.


    A dialog to enter the API key from the Open Weather Map


    Once the API key is entered and accepted, it will be stored locally in a file
    named:


    ```

    {user.home}/.openweathermap-api-key

    ```


    Where `{user.home}` is where you substitute your home directory. Once the file
    is saved, when you launch the application again, the API key file will be loaded
    instead of prompting the user for the API key.


    In Java’s system properties, `user.home` is the user’s home directory depending
    on the operating system. See the Javadoc documentation and tutorial at the following:


    ```

    https://docs.oracle.com/javase/tutorial/essential/environment/sysprop.html

    ```


    Note


    The web service in this example is powered by the people of Open Weather Map (
    [`http://openweathermap.org`](http://openweathermap.org) ). I encourage you to
    support them as they continue to provide a valuable service with maps and weather
    data around the world for application and mobile developers.


    ### One-Liner: Reading an Input Stream into a String


    As a really nice trick for how the Weather Widget example loads the API key file,
    I created a simple static utility method `streamToString()` . This handy utility
    method allows you to read a file’s content or a connection’s input stream and
    convert it into a string.


    When you look at the Weather Widget example’s source code, the method will attempt
    to read a local file as a string containing an API key issued from the web site
    [`http://openweathermap.org`](http://openweathermap.org) .


    Listing [10-21](#A323804_3_En_10_Chapter.html#Par209) shows how to convert an
    input stream into a `String` object.


    ```

    private static String streamToString(InputStream inputStream) {

    String text = new Scanner(inputStream, "UTF-8")

    .useDelimiter("\\Z")

    .next();

    return text;

    }

    Listing 10-21.

    A Static Method that Reads a Text File Returned as a String Object to the Caller

    ```


    You will quickly notice the strange one-line statement that “magically” converts
    an input stream into a `String` object. The `streamToString()` method uses the
    convenient `Scanner` API. This API is excellent for reading text files that have
    delimited text lines, such as comma-separated values (CSV). Scanner objects default
    their delimiter as an end-of-line character (`\n`).


    By setting the end-of-file (EOF) marker (`\\Z`) as the delimiter, the `next()`
    method will return the text stream before the end, creating the entire text as
    one field. Of course, there are other ways to retrieve text data, and probably
    more efficient ways, too; however, you can see that using this strategy can handle
    common situations with small- to medium-sized data requests (up to ∼3MB). The
    size can be an issue because the data is converted to a `String` object and, depending
    on the number of requests without garbage collection, memory resources can be
    easily consumed—possibly overwhelming the application. Since it is only an API
    key consisting of a hash, it should be perfectly fine.


    The Weather Widget allows users to enter a city or region into the search field
    to determine the weather condition. After fetching the JSON weather data, the
    screen will display the following information: City, Country, Day of Week, Time
    (Last update), Weather Condition, Weather Description, Icon, Temperature, Humidity,
    and Wind Speed. The code will execute the JavaScript code to populate the display.


    Okay, enough with the pre-requisites and description of the application—let’s
    now look at the Weather Widget’s source code.'
