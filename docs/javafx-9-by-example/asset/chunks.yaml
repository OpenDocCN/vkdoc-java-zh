  trans: "\n#### 服务端套接字\n\n本节不会展示与 WebSocket 相关的服务端示例代码。由于市面上有大量服务端解决方案，我建议你在网上搜索并挑选一个。我将主要展示使用\
    \ Java 9 的 `http2` 模块与一个本质上作为回显服务器的 WebSocket 进行通信的客户端代码。\n\n对于基于 WebSocket 的服务端解决方案，以下是我在互联网上找到的一些方案：\n\
    \n*   Netty：[`https://netty.io`](https://netty.io)\n*   Vert.x：[`http://vertx.io`](http://vertx.io)\n\
    *   Spark：[`http://sparkjava.com`](http://sparkjava.com)\n*   JEE 7 供应商：\n   \
    \ *   Spring WebSocket：[`https://docs.spring.io/spring/docs/current/spring-framework-reference/html/websocket.html`](https://docs.spring.io/spring/docs/current/spring-framework-reference/html/websocket.html)\n\
    \    *   Jetty：[`http://www.eclipse.org/jetty`](http://www.eclipse.org/jetty)\n\
    \n为了测试我的客户端代码，我使用了 Spark Java 的内嵌 Web 服务器，地址为 [`http://sparkjava.com`](http://sparkjava.com)。它们提供了创建\
    \ REST API 和服务端 WebSocket 的优秀示例。其文档展示了如何创建一个简单的回显服务器，该服务器会返回客户端发送的内容。要查看它们的回显服务器实现，请访问\
    \ Spark Java 关于 WebSocket 的主题页面：[`http://sparkjava.com/documentation`](http://sparkjava.com/documentation)\
    \ `- embedded-web-server`。\n\n要获取 Spark 库，以下是 Maven 和 Gradle 的坐标。\n\nSpark Java\
    \ 的 Maven 坐标：\n\n```\ncom.sparkjava\nspark-core\n2.6.0\n\n```\n\nSpark Java 的\
    \ Gradle 坐标表示法：\n\n```\ncompile \"com.sparkjava:spark-core:2.6.0\"\n```\n\n####\
    \ 客户端套接字\n\n在客户端，你将创建一个 WebSocket 来连接服务器。要从 `HttpClient` 类创建 WebSocket，可以调用静态的\
    \ `newWebSocketBuilder()` 方法。该方法接受两个参数——一个 `URI` 和一个 `WebSocket.Listener` 对象。清单\
    \ 10-14 创建了一个到 URL 为 `ws://localhost:4567/echo` 的回显服务器的 WebSocket 连接。默认情况下，Spark\
    \ 使用端口 4567。\n\n```\nHttpClient client = HttpClient.newHttpClient();\nWebSocket\
    \ clientWebSocket = client.newWebSocketBuilder(\nURI.create(\"ws://localhost:4567/echo\"\
    ),\nnew ClientSocketListener())\n.buildAsync().join();\n// 向服务器发送两条消息\nclientWebSocket.sendText(\"\
    Hello World 1\" + new Date());\nclientWebSocket.sendText(\"Hello World 2\" + new\
    \ Date());\n清单 10-14.\n创建一个客户端 WebSocket 以通过 TCP/IP 发送文本。服务器会将发送的消息返回给客户端。\n```\n\
    \n清单 10-14 首先创建了一个 `HttpClient` 实例，然后调用 `newWebSocketBuilder()` 来创建一个 `WebSocket.Builder`\
    \ 实例。在传入 `URI` 之后，第二个参数是一个新的 `ClientSocketListener` 实例。要完成构建器，调用 `buildAsync()`\
    \ 将返回一个 `CompletableFuture<WebSocket>`。调用 `buildAsync()` 之后，再调用 `join()` 方法将使其阻塞并等待返回\
    \ `WebSocket` 实例。创建 WebSocket 后，调用 `sendText()` 方法向服务器发送文本。\n\n清单 10-15 中展示的 `ClientSocketListener`\
    \ 类负责与服务器通信时的处理代码。其中唯一真正实现的方法是 `onText()`。\n\n```\nclass ClientSocketListener\
    \ implements WebSocket.Listener {\n@Override\npublic void onOpen(WebSocket webSocket)\
    \ {\nSystem.out.println(\"onOpen\");\n}\n@Override\npublic CompletionStage onBinary(WebSocket\
    \ webSocket, ByteBuffer message, WebSocket.MessagePart part) {\nSystem.out.println(\"\
    onBinary\");\nreturn null;\n}\n@Override\npublic CompletionStage onPing(WebSocket\
    \ webSocket, ByteBuffer message) {\nSystem.out.println(\"onPing\");\nreturn null;\n\
    }\n@Override\npublic CompletionStage onPong(WebSocket webSocket, ByteBuffer message)\
    \ {\nSystem.out.println(\"onPong\");\nreturn null;\n}\n@Override\npublic CompletionStage\
    \ onClose(WebSocket webSocket, int statusCode, String reason) {\nSystem.out.println(\"\
    onClose\");\nreturn null;\n}\n@Override\npublic void onError(WebSocket webSocket,\
    \ Throwable error) {\nSystem.out.println(\"onError\");\n}\n@Override\npublic CompletionStage\
    \ onText(WebSocket webSocket,\nCharSequence message,\nWebSocket.MessagePart part)\
    \ {\nSystem.out.println(\"onText\");\n// 请求一条消息\nwebSocket.request(1);\n// 从服务器接收消息。\n\
    return CompletableFuture.completedFuture(message)\n.thenAccept(System.out::println);\n\
    }\n}\n清单 10-15.\n一个用于响应回显服务器的客户端套接字监听器类\n```\n\n在清单 10-15 中，这些方法基本上都是当从服务器接收到消息时的所有事件和回调。你会注意到\
    \ `onText()` 方法返回一个实例：\n\n```\nCompletableFuture\n```\n\n由于消息是异步的，当消息完成时会触发 `thenAccept()`\
    \ 方法。完成后，类型为 `CharSequence` 的消息将被打印到控制台。\n\n好了，这就是一个关于 WebSocket 的简短代码示例。我相信你对获取和发布数据感到兴奋；不过，请保持这份热情，因为你接下来将看到如何使用\
    \ JavaFX 显示数据！\n\n### 查看 HTML5 内容（WebView）\n\n现在你已经了解了获取网络内容的各种策略，你终于有机会使用强大的\
    \ JavaFX `WebView` 节点来显示 HTML5 网络内容了。\n\nJavaFX 提供了一个 GUI WebView（`javafx.scene.web.WebView`）节点，它可以将\
    \ HTML5 内容渲染到场景图上。`WebView` 节点本质上是一个迷你浏览器 UI 组件，可以响应 Web 事件，并允许开发者与 HTML5 内容进行交互。由于加载网络内容与显示网络内容的能力密切相关，`WebView`\
    \ 节点对象还包含一个 `WebEngine` 实例。\n\n为了吊起你的胃口，我创建了一个使用 `WebView` API 渲染 HTML5 内容的示例。该示例是一个显示基于\
    \ SVG 的模拟时钟的 JavaFX 应用程序。要获取完整源代码，请访问本书网站并下载 `DisplayingHtml5Content` 项目。\n"
