  trans: "\n布局在 GridPane 上的 UI 元素的预览窗口  \n12. 将 UI 保存为 FXML 文件。在“文件”菜单中，选择“另存为”，并将其保存到\
    \ Java 项目的资源目录或 src 目录中。Scene Builder 允许你将 UI 保存为名为 FXML 的文件格式，其文件扩展名为 .fxml。将文件保存为\
    \ `ContactForm.fxml`。稍后，你将创建代码来加载要显示的 FXML 文件，并对 UI 元素执行操作。此文件应放置在 Java 项目的资源目录中，例如\
    \ `src/main/resources/ContactForm.xml`。（如果你不使用 Gradle 或 Maven 等构建工具，可以创建一个文件夹来存放项目的所有三个文件。如果你在命令行上编译，请确保\
    \ FXML 文件已复制到根类路径。）此时，当前文件（`ContactForm.fxml`）没有引用控制器类或带有 `fx:id` 属性的 UI 元素。在后续步骤中，当你创建了控制器类后，你将通过\
    \ Scene Builder 更新 UI，并再次保存 FXML 文件。\n\n![A323804_3_En_5_Fig23_HTML.jpg](img/A323804_3_En_5_Fig23_HTML.jpg)\n\
    \n图 5-23.\n\n用于保存 FXML 文件的“另存为”窗口\n\n```\n\n清单 5-8.\n    表示使用 Scene Builder 创建的联系人表单\
    \ UI 视图的 ContactForm.fxml 文件\n    ```\n\n13. 创建一个为 UI 元素提供处理代码的控制器类。在与主应用程序代码\
    \ `FXMLContactForm.java`（参见步骤 19）相同的目录中，创建一个名为 `ContactFormController.java` 的类。将清单\
    \ 5-9 中的代码输入到名为 `ContactFormController.java` 的文件中。在代码中，你会注意到在属性和方法上使用了 `@FXML`\
    \ 注解。这些注解允许 JavaFX 平台将 FXML UI 元素绑定到控制器属性，例如 TextField 和 Button。控制器中的方法也可以加上 FXML\
    \ 注解前缀，以指示能够绑定到操作（事件）（例如鼠标按下）的处理代码。这种绑定机制是一种称为依赖注入的机制。FXML 加载器将在运行时解析这些引用，本质上是将\
    \ UI 元素连接到控制器类中的处理代码。稍后，你将使用 Scene Builder 将“保存”按钮与控制器关联起来。在那里你会注意到，“保存”按钮的 `OnAction`\
    \ 属性将调用清单 5-9 中所示的 `saveContactAction()` 方法。\n\n```\n    package com.jfxbe;\n\
    \    import javafx.event.ActionEvent;\n    import javafx.fxml.FXML;\n    import\
    \ javafx.scene.control.TextField;\n    /**\n    *\n    */\n    public class ContactFormController\
    \ {\n    @FXML private TextField firstNameField;\n    @FXML private TextField\
    \ lastNameField;\n    @FXML\n    protected void saveContactAction(ActionEvent\
    \ event) {\n    System.out.println(\"Saving the following information: \");\n\
    \    System.out.println(\"First Name: \" + firstNameField.getText());\n    System.out.println(\"\
    \ Last Name: \" + lastNameField.getText());\n    }\n    }\n    清单 5-9.\n    ContactFormController\
    \ 类使用注解来引用 FXML 文件中的 UI 元素\n    ```\n\n14. 通过 Scene Builder 工具为 `ContactForm.fxml`\
    \ 分配一个控制器类。假设你已经加载了之前创建的 UI，导航到位于左侧“文档”选项卡下的“控制器”选项卡中的“控制器类”字段。输入完全限定的类名 `com.jfxbe.ContactFormController`（假设你有一个包命名空间）。图\
    \ 5-24 显示了引用控制器类的字段。请注意，在“控制器类”字段下方有一个名为“已分配的 fx:id”的表格，其中包含已分配的 `fx:id` 条目。该表格当前为空，但在下一步中，你将为一个组件（例如名字和姓氏文本字段控件（UI\
    \ 元素））分配一个 `fx:` `id` 名称。\n\n![A323804_3_En_5_Fig24_HTML.jpg](img/A323804_3_En_5_Fig24_HTML.jpg)\n\
    \n图 5-24.\n\n设置引用联系人表单 UI (ContactForm.fxml) 的控制器类  \n15. 在 Scene Builder 中为每个\
    \ UI 元素添加 `fx:id` 名称。假设你已经将最近创建的控制器类引用为 `com.jfxbe.ContactFormController`，通过选择画布或“层次结构”部分中的\
    \ UI 控件来更新 UI 元素的 `fx:id`。选择控件后，转到 Scene Builder 工具右侧的“代码”子部分，并在 `fx:id` 字段属性中输入\
    \ `firstNameField`，如图 5-25 所示。\n\n![A323804_3_En_5_Fig25_HTML.jpg](img/A323804_3_En_5_Fig25_HTML.jpg)\n\
    \n图 5-25.\n\n设置引用名字文本字段的 fx:id 名称。这将允许控制器类访问该文本字段。  \n16. 对姓氏字段重复步骤 15。姓氏字段的 `fx:id`\
    \ 称为 `lastNameField`。  \n17. 将操作代码绑定到“保存”按钮，如图 5-26 所示。与步骤 15 和 16 类似，选择“保存”按钮的\
    \ UI 元素，导航到其“代码”子部分，输入 `fx:id` 名称为 `saveButton`。接下来，将 `OnAction` 属性设置为 `saveContactAction`。不要忘记保存\
    \ UI (FXML)。如果你还记得步骤 13 中的清单 5-9，`ContactFormController.java` 文件包含 `saveContactAction()`\
    \ 方法。\n\n![A323804_3_En_5_Fig26_HTML.jpg](img/A323804_3_En_5_Fig26_HTML.jpg)\n\
    \n图 5-26.\n\n设置 `OnAction` 属性以调用“保存”按钮的 `saveContactAction` 函数  \n18. 最后一次预览联系人表单。图\
