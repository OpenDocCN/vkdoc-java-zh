  trans: '

    # 1. 入门指南


    要开始使用本书学习 JavaFX 9，你需要搭建开发环境，以便编译和运行书中的众多示例。本章将介绍如何安装所需软件，例如 Java 开发工具包（JDK）和
    NetBeans 集成开发环境（IDE）。安装完所需软件后，你将开始创建一个传统的 JavaFX HelloWorld 示例。当你熟悉开发环境后，我将带你逐步解析
    JavaFX HelloWorld 的源代码。最后，你将了解如何将应用程序打包为独立的应用程序，以便启动和分发。


    我知道许多开发者对自己偏好的 IDE 和编辑器情有独钟，因此我也提供了三种编译和运行 HelloWorld 示例的方法。第一种方法使用 NetBeans IDE
    编译和运行代码，第二种方法教你如何使用命令行（终端窗口），第三种方法则使用名为 Gradle 的构建工具来编译和启动 JavaFX 应用程序。第二种和第三种方法适用于不喜欢复杂
    IDE 的开发者。如果你更习惯使用 Eclipse 和 IntelliJ IDE，那么你会很高兴地知道，Gradle 可以生成相应的项目文件，让你的项目能够轻松加载到这些
    IDE 中。


    如果你已经熟悉 Java 开发工具包（JDK）、Gradle 和 NetBeans IDE 的安装，可以直接跳到第 2 章，该章介绍 Java 9 Jigsaw。让我们开始吧！


    ## 下载所需软件


    在使用本书时，你会发现许多示例可能仍使用 Java 8 JDK 编写；但第 2 章和其他一些章节将涉及 Java 9 特有的概念，因此需要 Java 9 JDK。Java
    平台的主要变化之一是模块化（Jigsaw）。模块化将真正改变你的客户端应用程序。你可能很想知道，“它到底是如何改变的？” 想象一下，构建一个在内存和磁盘空间上占用更小空间的
    Java 应用程序。这意味着用户将体验到更快的加载速度和更好的用户体验！


    话虽如此，请继续下载 Java 9 Java 开发工具包（JDK）或更高版本。在本章中，你将看到在 Windows、MacOS X 和 Linux 上安装
    JDK 的步骤。你可以从以下网址下载 Java 9 JDK：


    [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)


    另一个在先前版本中未提及的工具是 Gradle。Gradle 已成为现实世界中构建项目和产物的行业标准。稍后，我将带你了解如何安装 Gradle，但现在请前往
    `gradle.org` 查找下载链接。在下载链接处，你将看到两个二进制发行版。一个是纯二进制发行版，另一个是包含源代码和文档的完整发行版。构建应用程序需要二进制发行版，因此你需要下载它。请前往以下网址下载
    Gradle 的构建工具：


    [`https://gradle.org/gradle-download`](https://gradle.org/gradle-download)


    对于本书而言，安装集成开发环境（IDE）是可选的；但如果你选择使用 IDE，你将获得代码高亮、代码补全、增量调试、重构以及许多现代开发者便利功能的所有好处。业界最常用的三大
    IDE 是 NetBeans、IntelliJ 和 Eclipse。尽管本书会带你安装 NetBeans IDE，但这并不意味着我们偏爱 NetBeans
    或任何其他 IDE。我选择 NetBeans 是因为它的发布计划通常与主要 JDK 版本同步，并且它相当成熟，尤其是在工具支持和 JavaFX 应用程序开发方面。NetBeans
    内置了许多 JavaFX 演示项目（示例模板）和 Scene Builder 工具。Scene Builder 是一个用于可视化构建 JavaFX 用户界面的图形化工具。


    另一个专业提示是学习 Gradle 任务，这些任务能够通过单个命令为 IntelliJ 或 Eclipse IDE 生成 Java 项目。要了解更多关于可以自动设置
    IntelliJ 和 Eclipse 项目的 Gradle 任务，请访问以下链接：


    *   IntelliJ：[`https://docs.gradle.org/current/userguide/idea_plugin.html`](https://docs.gradle.org/current/userguide/idea_plugin.html)

    *   Eclipse：[`https://docs.gradle.org/current/userguide/eclipse_plugin.html`](https://docs.gradle.org/current/userguide/eclipse_plugin.html)


    以下是下载你喜爱的 IDE 的网址：


    *   NetBeans：[`https://netbeans.org/downloads`](https://netbeans.org/downloads)

    *   IntelliJ：[`https://www.jetbrains.com/idea/download`](https://www.jetbrains.com/idea/download)

    *   Eclipse：[`https://eclipse.org/downloads`](https://eclipse.org/downloads)


    目前，来自 Oracle 公司的 JavaFX 9 支持以下操作系统：


    *   Windows 操作系统（Vista、7、8、10）32 位和 64 位

    *   MacOS X（64 位）

    *   Ubuntu Linux 12.x - 13.x（32 位和 64 位）


    要查看所有受支持操作系统的详细列表，请访问以下链接：


    [`http://jdk.java.net/9/supported`](http://jdk.java.net/9/supported)


    虽然你可能看不到你支持的操作系统或硬件，但你会很高兴地了解到 OpenJDK 和 OpenJFX 项目，它们允许你自己构建 Java 和 JavaFX！要了解更多关于
    OpenJDK 或 OpenJFX 的信息，请访问以下网址：


    *   OpenJDK：[`http://openjdk.java.net`](http://openjdk.java.net)

    *   OpenJFX：[`https://wiki.openjdk.java.net/display/OpenJFX/Main`](https://wiki.openjdk.java.net/display/OpenJFX/Main)


    为你的操作系统下载合适的软件版本后，你将安装 Java 9 JDK、Gradle 和/或你选择的 IDE。


    ## 安装 Java 9 开发工具包


    下载完适用于你特定操作系统的正确 Java 版本后，请按照本节概述的步骤安装 Java 9 JDK。我假设你已经下载了 Oracle 的 Java 9 JDK，但如果没有，请前往以下位置：


    [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)


    在接下来的几节中，你将按照步骤在三种流行的操作系统上安装 Java 9：Microsoft Windows、MacOS X 和 Linux。

    '
- fmt: "### Installing the JDK on Microsoft Windows\n\nThe following steps use the\
    \ Java 9 JDK 64-bit version for the Windows 10 operating system. If your Windows\
    \ operating system is different, refer to the following link for further details.\n\
    \n[`http://www.oracle.com/technetwork/java/javase/overview/index.html`](http://www.oracle.com/technetwork/java/javase/overview/index.html)\n\
    \nThe following are steps to install the Java 9 JDK on the Windows OS:\n\n1. \
    \ Install the Java 9 JDK by right-clicking the installer’s executable (`jdk-9-windows-x64.exe`)\
    \ to run as an administrator. Typically, other operating systems will pop up a\
    \ similar warning dialog box to alert you of the risks of installing or running\
    \ binary files. Click the Run button to proceed.\n2.  Begin the installation process\
    \ by clicking on the Next button, as shown in Figure [1-1](#A323804_3_En_1_Chapter.html#Fig1).\n\
    \n    ![A323804_3_En_1_Fig1_HTML.jpg](A323804_3_En_1_Fig1_HTML.jpg)\n\n    Figure\
    \ 1-1. Java SE Development Kit 9 installation process\n3.  Next, you’ll be presented\
    \ with the Custom Setup window allowing you to select optional features shown\
    \ in Figure [1-2](#A323804_3_En_1_Chapter.html#Fig2). Here, you’ll just accept\
    \ the default selections and click the Next button to continue.\n\n    ![A323804_3_En_1_Fig2_HTML.jpg](A323804_3_En_1_Fig2_HTML.jpg)\n\
    \n    Figure 1-2. Java SE Development Kit 9 optional features\n4.  Afterward,\
    \ the installation process will display a progress bar, as shown in Figure [1-3](#A323804_3_En_1_Chapter.html#Fig3).\n\
    \n    ![A323804_3_En_1_Fig3_HTML.jpg](A323804_3_En_1_Fig3_HTML.jpg)\n\n    Figure\
    \ 1-3. Java SE Development Kit 9 installation in progress\n5.  Next, a popup dialog\
    \ window will ask if you want to change the installation directory of the Java\
    \ runtime. Just click the Next button and accept the default directory, as shown\
    \ in Figure [1-4](#A323804_3_En_1_Chapter.html#Fig4).\n\n    ![A323804_3_En_1_Fig4_HTML.jpg](A323804_3_En_1_Fig4_HTML.jpg)\n\
    \n    Figure 1-4. The Java 9 runtime destination directory\n6.  To complete the\
    \ installation of the Java 9 SE Development Kit, click the Close button to exit,\
    \ as shown in Figure [1-5](#A323804_3_En_1_Chapter.html#Fig5).\n\n    ![A323804_3_En_1_Fig5_HTML.jpg](A323804_3_En_1_Fig5_HTML.jpg)\n\
    \n    Figure 1-5. The last part of the installation prompting that the Java SE\
    \ Development Kit 9 was successfully installed\n\n### Installing the JDK on MacOS\
    \ X\n\nThe following steps use the Java 9 JDK 64-bit version for the MacOS X (El\
    \ Capitan) operating system. It assumes you’ve already downloaded the JDK and\
    \ it’s called something similar to the following:\n\n```\njdk-9-ea-bin-b88-macosx-x86_64-21_oct_2015.dmg\n\
    ```\n\nUse the following steps to install the Java 9 JDK on the MacOS X operating\
    \ system:\n\n1.  After launching the `dmg` file, you’ll be presented the following\
    \ dialog box as shown in Figure [1-6](#A323804_3_En_1_Chapter.html#Fig6). Next,\
    \ double-click on the icon to begin the install process.\n\n    ![A323804_3_En_1_Fig6_HTML.jpg](A323804_3_En_1_Fig6_HTML.jpg)\n\
    \n    Figure 1-6. The Java 9 JDK installer on the MacOS X operating system\n2.\
    \  Next, to begin the install process shown in Figure [1-7](#A323804_3_En_1_Chapter.html#Fig7),\
    \ click on Continue. For the rest of the installation process, accept the defaults.\n\
    \n    ![A323804_3_En_1_Fig7_HTML.jpg](A323804_3_En_1_Fig7_HTML.jpg)\n\n    Figure\
    \ 1-7. The Java 9 JDK installer introduction for the MacOS X operating system\n\
    3.  After clicking on the Continue button, the dialog will mention the amount\
    \ of disk space the JDK will take up on your computer, as shown in Figure [1-8](#A323804_3_En_1_Chapter.html#Fig8).\
    \ Click on the Install button to proceed.\n\n    ![A323804_3_En_1_Fig8_HTML.jpg](A323804_3_En_1_Fig8_HTML.jpg)\n\
    \n    Figure 1-8. The prompt showing how much space the JDK will use\n4.  For\
    \ security purposes, your MacOS X will prompt you with a password to allow the\
    \ installer to continue, as shown in Figure [1-9](#A323804_3_En_1_Chapter.html#Fig9).\
    \ This assumes you have admin privileges to install software. After entering your\
    \ password, click the Install Software button to kick off the process.\n\n   \
    \ ![A323804_3_En_1_Fig9_HTML.jpg](A323804_3_En_1_Fig9_HTML.jpg)\n\n    Figure\
    \ 1-9. The permission window prompting for the username and password that will\
    \ allow the JDK software to be install on the local machine\n5.  The installation\
    \ process will take a few seconds, as shown in Figure [1-10](#A323804_3_En_1_Chapter.html#Fig10).\n\
    \n    ![A323804_3_En_1_Fig10_HTML.jpg](A323804_3_En_1_Fig10_HTML.jpg)\n\n    Figure\
    \ 1-10. The installation of the JDK in progress\n6.  Lastly, you will click on\
    \ the Close button, as shown in Figure [1-11](#A323804_3_En_1_Chapter.html#Fig11).\
    \ This completes the JDK installation on the MacOS operating system.\n\n    ![A323804_3_En_1_Fig11_HTML.jpg](A323804_3_En_1_Fig11_HTML.jpg)\n\
    \n    Figure 1-11. The installation of the JDK is complete\n\nAfter finishing\
    \ the installation of the JDK, you’ll learn later in this chapter how to set up\
    \ your environment variables. Next are instructions for installing JDK 9 on Linux-based\
    \ operating systems.\n\n### Installing the JDK on Linux\n\nTo begin, you should\
    \ determine if your Linux system is a 32-bit or 64-bit architecture by typing\
    \ in the following in a terminal:\n\n```\n$ uname -m\n```\n\nThe output on a 64\
    \ bit Linux machine is as follows:\n\n```\nx86_64\n```\n\nThe output on a 32 bit\
    \ Linux machine is as follows:\n\n```\ni686\n```\n\nAssuming you’ve downloaded\
    \ the Java JDK at the following:\n\n[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
    \nFor users in the Linux world, you will need to download a file named something\
    \ like:\n\n*   `jdk-9-bin-b88-linux-i586-21_oct_2015.tar.gz`\n*   `jdk-9-bin-b88-linux-i586-21_oct_2015.rpm`\n\
    \nLocate the downloaded file (`*.gz` or `*.rpm`) and then go to your terminal\
    \ window to begin the installation process. The instructions for the installation\
    \ process are in the next section.\n\n**Note**\n\nAs of the writing of this book,\
    \ the Java 9 JDK used was an EA (early edition) release and therefore, the `JAVA_HOME`\
    \ directory name is subject to change. Visit Java 9 JDK’s installation instructions\
    \ for further details here: [`https://docs.oracle.com/javase/9/install/installation-jdk-and-jre-linux-platforms.htm`](https://docs.oracle.com/javase/9/install/installation-jdk-and-jre-linux-platforms.htm).\n\
    \n#### Fedora, CentOS, Oracle Linux, or Red Hat Enterprise Linux OSes\n\nAfter\
    \ downloading the `gz` file, you will need to decompress it. On Fedora, CentOS,\
    \ Oracle Linux, or Red Hat Enterprise Linux OSes, type the following commands\
    \ to install the JDK.\n\nIf a user isn’t registered in the `sudoers` file, you\
    \ will need to `su` as `root` to perform the following commands.\n\n```\n$ mv\
    \ ∼/Downloads/jdk-9-linux-x64.tar.gz /tmp\n$ cd /tmp\n$ tar zxvf /tmp/jdk-9-linux-x64.tar.gz\n\
    $ sudo mkdir /opt/jdk/\n$ sudo mv jdk-9 /opt/jdk\n```\n\nUse the following command\
    \ if you downloaded the `rpm` version of the Java 9 JDK:\n\n```\n$ sudo rpm -ivh\
    \ jdk-9-linux-x64.rpm\n```"
