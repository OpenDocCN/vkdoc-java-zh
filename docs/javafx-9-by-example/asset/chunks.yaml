  trans: '

    ## WebDocPrinter 示例应用


    您是否曾需要快速打印网购后的机票或发票？这里有一个我创建的示例应用，它类似于浏览器，允许用户根据有效的 URL 加载并显示网站。这个类似浏览器的应用名为 `WebDocPrinter`，如图
    8-3 所示。它支持两种打印模式：仅节点和整个 Web 文档。默认设置为“仅节点”模式，允许用户仅打印 WebView 节点。“仅节点”模式只会打印红色边框内的内容。“整个
    Web 文档”打印模式则会打印整个 HTML 文档，即使它跨越多页。“整个 Web 文档”打印模式会自动缩放内容以适应可打印区域。


    ![A323804_3_En_8_Fig3_HTML.jpg](img/A323804_3_En_8_Fig3_HTML.jpg)


    图 8-3.


    WebDocPrinter 应用支持两种打印模式：仅节点和整个 Web 文档


    该应用包含以下 UI 元素：


    *   `Menus`：两种打印模式，称为“仅节点”和“整个 Web 文档”

    *   `TextField`：用于输入有效 URL 的地址栏

    *   `Button`：一个打印按钮

    *   `Slider`：一个滑块控件，用于在显示 `WebView` 节点时调整缩放级别

    *   `Label`：用于以百分比形式显示缩放级别的标签

    *   `WebView`：用于显示 HTML 文档

    *   `Path`：一个带有红色描边的矩形路径，用于勾勒可打印区域


    `WebDocPrinter` 应用支持两种打印模式：仅节点和整个 Web 文档。`WebDocPrinter` 应用演示了如何打印单个节点或打印包含多页的整个网页。使用“整个
    Web 文档”打印模式会自动缩放内容以适应可打印区域。


    用户在地址行（`TextField`）输入 URL 后，按下回车键，从而触发应用获取网页并将其显示在 `WebView` 节点上。默认情况下，菜单栏的打印模式（如图
    8-4 所示）设置为“仅节点”打印模式，这意味着应用只会将 `WebView` 节点打印在一页上。


    ![A323804_3_En_8_Fig4_HTML.jpg](img/A323804_3_En_8_Fig4_HTML.jpg)


    图 8-4.


    两种打印模式是“仅节点”和“整个 Web 文档”


    当打印 JavaFX `WebView` 节点时，默认情况下打印机只会打印一页。通过使用“仅节点”模式，显示区域上会出现一个红色框轮廓，用于表示打印机在物理纸张上的可打印布局区域，如图
    8-3 所示。如前所述，使用“仅节点”打印模式时，红色边框外的任何内容都不会被打印。


    第二种打印模式是“整个 Web 文档”，它将使用 `WebEngine` 对象提供的便捷方法 `print()` 来打印整个 HTML 网页。同样，如果文档跨越多页，这些页面都将被发送到打印机。


    最后，`WebDocPrinter` 应用的最后一个功能是一个滑块控件，允许用户缩放或放大/缩小以调整网页内容的大小，如图 8-5 所示。


    ![A323804_3_En_8_Fig5_HTML.jpg](img/A323804_3_En_8_Fig5_HTML.jpg)


    图 8-5.


    URL 地址行允许用户获取网页。打印按钮将显示的页面发送到打印机。滑块控件可放大或缩小以缩放网页，使其适应打印宽度。


    在“仅节点”打印模式下使用的缩放功能，将帮助用户在将内容发送到打印机之前，使其适应可打印区域（红色边框），如图 8-3 所示。缩放的最小值为 5%，最大值为
    300%。再次强调，我想指出的是，当使用“仅节点”打印模式时，任何显示在红色边框区域之外的内容都不会被打印。


    ### 源代码


