- fmt: '# 2. JavaFX and Jigsaw


    In the early days of software architectures, many designers and practitioners
    often stressed the idea of modular code. Clearly, it makes sense to break up software
    services or APIs into modules; however, depending on who you talk to, the word
    module has different meanings to different people. For example, developers using
    Apache Maven build tools will often view `jar` artifacts as modules, while some
    would argue that packages within artifacts are also modules. So what does the
    word “module” mean in the Java world?


    In this chapter, you’ll get to explore what modularity means for the new Java
    9 platform. You’ll also learn the Java platform module system (JPMS) in the context
    of JavaFX applications. This chapter is a gentle introduction to Java 9’s module
    system with common use case scenarios such as using a module as a library dependency.


    Having said this, I will not be going into great detail covering every modularity
    use case (believe me, there are quite a few of them). Even as of this writing,
    there are ongoing discussions regarding other use cases, possibly out of the intended
    scope. For example, there are still ongoing discussions on the concept of automatic
    modules and how modules should be [named](http://download.java.net/java/jigsaw/docs/api/java/lang/module/ModuleFinder.html#of-java.nio.file.Path%E2%80%A6-).
    Despite the back and forth from expert groups and industry leaders relating to
    missing features versus scoped requirements, I trust the Java community will come
    to a (well-intended) consensus on a robust modular system that will satisfy most
    use cases out in the wild. To find out more on the topic of Java 9 Jigsaw, I have
    listed JSRs, books, and links in the appendix of this book.


    As a general disclaimer, especially relating to the new Java 9’s platform module
    system, I will caution you with the following.


    **Disclaimer**


    By the time you read this book, Java 9’s module system will be released. Since
    Java 9’s module system is new, the language specifications, APIs, terminologies,
    and concepts are subject to change. This chapter was written using Java 9’s early
    access edition.


    Here is a list of sections to follow when reading this chapter on Java 9’s module
    system. If you already know the background about Java 9’s module system and its
    history, you can skip right to the section called “Getting Started.”


    - What is Project Jigsaw?

    - History (pre-Java 9)

    - Getting Started

    - Conclusion


    ## What Is Project Jigsaw?


    Java modularity, aka “Project Jigsaw,” was an effort to enable developers to partition
    and encapsulate code in a more manageable manner on the Java platform. By way
    of partitioning code into modules, application code will be more loosely coupled
    instead one monolithic application. With good encapsulation, modules can be defined
    to expose (export) APIs to other modules safely. Java’s new module system will
    also be backward compatible to code and libraries prior to Java 9 (non-modular
    code). Not only are partitioning and encapsulating code very good principles,
    there are other additional benefits, as you will see later.


    According to Mark Reinhold, he summarizes JSR 376 (Project Jigsaw):


    > The overall goal of this JSR is to define an approachable yet scalable module
    system for the Java Platform. It will be approachable, i.e., easy to learn and
    easy to use, so that developers can use it to construct and maintain libraries
    and large applications for both the Java SE and Java EE Platforms. It will be
    scalable so that it can be used to modularize the Java SE Platform itself, and
    its implementations. — Mark Reinhold, Chief Architect of the Java Platform Group
    at Oracle, April 1, 2015


    ### Benefits


    According to the official web site of project Jigsaw ([`http://openjdk.java.net/projects/jigsaw`](http://openjdk.java.net/projects/jigsaw)),
    the following are the primary goals and benefits of a modular system on the Java
    platform:


    > To achieve these goals, we propose to design and implement a standard module
    system for the Java SE platform and to apply that system to the platform itself,
    and to the JDK. The module system should be powerful enough to modularize the
    JDK and other large legacy code bases, yet still be approachable by all developers.
    — Project Jigsaw site, December 21, 2016


    - Make the Java SE platform, and the JDK, more easily scalable down to small computing
    devices

    - Improve the security and maintainability of Java SE platform implementations
    in general, and the JDK in particular

    - Enable improved application performance

    - Make it easier for developers to construct and maintain libraries and large
    applications, for both the Java SE and EE platforms


    As mentioned relating to partitioning applications, these benefits can also lead
    to scaling down applications to fit into smaller computing devices such as ARM
    based computers. Having modular code will also help the maintenance and security
    on the Java SE and Java EE platforms as microservices becomes the norm when developing
    on cloud and container-based application environments.


    Since modules make way for reliable configuration building, applications would
    occupy smaller footprints, thus increasing the performance in areas relating to
    memory and load times. An example of this is a modular JavaFX application’s start-up
    speed boost due to a smaller set of modules loaded. Prior to Java 9, applications
    were developed and packaged with the entire Java runtime. These apps had to load
    many unused libraries such as `corba` or `sql` packages.


    Additional benefits when modularizing Java code (Java 9) are listed as Java Enhancement
    Proposals:


    - Modular runtime Images (JEP 220 at [`http://openjdk.java.net/jeps/220`](http://openjdk.java.net/jeps/220))

    - A Java linker for modules (JEP 282 at [`http://openjdk.java.net/jeps/282`](http://openjdk.java.net/jeps/282))

    - Ahead of time compilation (JEP 295 at [`http://openjdk.java.net/jeps/295`](http://openjdk.java.net/jeps/295))


    The JEP 220 is the enhancement proposal for modular runtime images for the Java
    SE platform. The architects had restructured the entire Java runtime platform
    such as its directories and core libraries. Restructuring the runtime platform
    will help improve security, performance, and manageability. For example, libraries
    such as `rt.jar`, `tools.jar`, and `jfxrt.jar` will no longer be accessible, but
    are all broken out in modules.


    New in Java 9 is `jlink`, the Java linker (JEP 282). `jlink` is a tool to assemble
    and build applications by linking modules and their dependencies into a custom
    runtime image. To create custom runtime images, the Java linker is used in conjunction
    with how the runtime is structured (JEP 220). In other words, the two JEPs are
    essentially in lock step with each other.


    Last of the 3 JEPs mentioned is JEP 295, ahead of time compilation. It’s better
    known as AOT compilation. Although it is considered experimental, the AOT compiler
    is able to convert Java code into native code on the Linux operating system. This
    has a nice advantage when environments don’t have a Java runtime installed. Another
    advantage is speed. Since code is statically compiled, there is no need to have
    JIT (just in time) compilation or warmups. This capability will be used in small
    devices or highly efficient servers (network devices). By the time you read this,
    AOT compilation will be supported on popular operating systems.


    With these three important Java enhancement proposals working together, you’ll
    begin to see Java-based applications built to be simpler, thinner, faster, and
    native.'
