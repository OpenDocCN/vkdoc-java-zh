    \nAs a web developer, the most popular UI styles (look and feels) today are Google’s\
    \ Material Design and Twitter’s Bootstrap. For example, Figure [15-6](#A323804_3_En_15_Chapter.html#Fig6)\
    \ shows a JavaFX clock and `TreeTableView` controls skinned with the Material\
    \ Design style.\n\n![A323804_3_En_15_Fig6_HTML.jpg](A323804_3_En_15_Fig6_HTML.jpg)\n\
    \nFigure 15-6.\n\nThe Material Design style applied to a JavaFX application\n\n\
    Figure [15-7](#A323804_3_En_15_Chapter.html#Fig7) shows buttons styled with the\
    \ Twitter’s Bootstrap look and feel.\n\n![A323804_3_En_15_Fig7_HTML.jpg](A323804_3_En_15_Fig7_HTML.jpg)\n\
    \nFigure 15-7.\n\nTwitter’s Bootstrap style applied to a button controls\n\nAs\
    \ the JavaFX community continues to grow and adapt to these new UI styles, there\
    \ are a growing number of developers who have ported these popular UI styles as\
    \ libraries to help you transform your JavaFX application to these popular UI\
    \ styles.\n\nNew to the list of folks who have created popular web and mobile\
    \ device themes are the following:\n\n*   (Google) Material Design\n    *   GluonHQ\n\
    \        *   Site: [`http://gluonhq.com/products/mobile/`](http://gluonhq.com/products/mobile/)\n\
    \    *   JFoenix\n        *   Site: [`http://www.jfoenix.com`](http://www.jfoenix.com)\n\
    \        *   Author(s): [`http://www.jfoenix.com/team.html`](http://www.jfoenix.com/team.html)\n\
    \    *   MaterialFX\n        *   Site: [`http://www.agix.pt/single-post/2015/09/02/MaterialFX-Material-Design-CSS-for-JavaFX`](http://www.agix.pt/single-post/2015/09/02/MaterialFX-Material-Design-CSS-for-JavaFX)\n\
    *   (Twitter) Bootstrap\n    *   JBootx\n        *   Site: [`https://github.com/dicolar/jbootx`](https://github.com/dicolar/jbootx)\n\
    \        *   Author(s): [`https://github.com/dicolar/jbootx/graphs/contributors`](https://github.com/dicolar/jbootx/graphs/contributors)\n\
    \    *   BootstrapFX\n        *   Site: [`https://github.com/aalmiray/bootstrapfx`](https://github.com/aalmiray/bootstrapfx)\n\
    \        *   Author: Andres Almiray"
  trans: "\n## 主题化\n\n在设计用户界面时，你可能听说过“皮肤化”和“外观与感觉”这些术语。这些术语经常互换使用，它们都反映了主题化或 UI 样式设计的基本概念。主题化是指在不改变应用程序底层功能的前提下，改变其整体外观。例如，当你将应用程序的\
    \ UI 布局和控件从风格化的商务主题切换为运动主题时，这就是主题化的应用。通常，公司会尝试为应用程序“换肤”，使其外观与公司标志相似。他们还会使用精心挑选的漂亮字体（排版学）来体现其企业文化或目标受众。\n\
    \n在 JavaFX 中，你可以创建、修改或使用现有主题来为应用程序“换肤”。稍后，我将讨论如何创建主题，但现在，我将向你展示如何在 JavaFX 应用程序中应用现有主题（皮肤）。为了演示如何将主题应用于应用程序的\
    \ UI，我创建了一个 JavaFX 应用程序，如图 15-1 所示，该应用程序允许用户应用各种 UI 外观主题。\n\n![A323804_3_En_15_Fig1_HTML.jpg](img/A323804_3_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1.\n\n使用 JavaFX CSS 样式设置应用程序的外观。从左上角开始逆时针方向依次是 Caspian、Modena、Sky 和 Flat\
    \ Red 主题。\n\n如你所见，同一个应用程序应用了四种 UI 皮肤。左上角是 Java FX 2.X 中熟悉的 Caspian 主题。多年来，Caspian\
    \ 一直表现出色，至今仍具有相当专业的外观。左下角是一个展开的手风琴 UI 控件，展示了使用 JavaFX 8 的新默认主题 Modena 的进度控件。Modena\
    \ 主题看起来更明亮、更简洁、更现代。\n\n右下角是下一个主题，名为 Sky 外观，由本人（Carl Dea）创建。我的意图是为触摸屏创建一个主题，使控件略微放大，以适应成年人的手指。我想要一种友好的感觉，于是想到了凉爽的蓝色天空。\n\
    \n最后但同样重要的是，右上角是 Flat Red 外观，由 Gerrit Grunwald 创建。\n\nFlat Red 使用自定义字体（Roboto），使控件上的文本看起来清晰整洁。Flat\
    \ Red 主题的另一个优点是，它基于 UI 控件的伪类状态变化（例如，在滑块控件上按下鼠标）来使用 CSS 效果。如果你还不了解什么是伪类，请不要担心，本章后面你将详细了解伪类选择器。Grunwald\
    \ 先生的外观也是触摸屏应用的绝佳选择。\n\n### 原生外观\n\n在进入示例代码之前，我想向 JavaFX 社区中那些制作了精美皮肤和主题的个人（先驱者）致敬，你会发现他们极具启发性。对于那些对\
    \ OS X（Mac 桌面）原生外观感兴趣的人，Claudine Zillmann（`@etteClaudette`）创建了 AquaFX（包含 Elements）。你可以从[`http://aquafx-project.com`](http://aquafx-project.com)下载\
    \ AquaFX。如图 15-2 所示，AquaFX 是一个库，允许开发者轻松地使用原生 OS X 外观来设计应用程序样式，并且还可以使用除通常的浅蓝色之外的其他颜色来对\
    \ UI 进行主题化。\n\n![A323804_3_En_15_Fig2_HTML.jpg](img/A323804_3_En_15_Fig2_HTML.jpg)\n\
    \n图 15-2.\n\nAquaFX 是一个 JavaFX 库，用于设计类似于 OS X 原生外观的控件样式\n\n对于那些对 Windows Metro\
    \ 外观感兴趣的人，Pedro Duque Vieira（`@P_Duke`）创建了一个名为 JMetro 的项目。JMetro 有一个浅色主题，如图 15-3\
    \ 所示，以及一个深色主题，如图 15-4 所示。\n\n![A323804_3_En_15_Fig4_HTML.jpg](img/A323804_3_En_15_Fig4_HTML.jpg)\n\
    \n图 15-4.\n\n使用 JMetro 深色主题样式化的日期选择器控件\n\n![A323804_3_En_15_Fig3_HTML.jpg](img/A323804_3_En_15_Fig3_HTML.jpg)\n\
    \n图 15-3.\n\n使用 JMetro 浅色主题样式化的日期选择器控件\n\n要下载 JMetro 主题，请访问 JFXtras 的样式部分，网址为[`https://github.com/JFXtras/jfxtras-styles/tree/master/src`](https://github.com/JFXtras/jfxtras-styles/tree/master/src)。\n\
    \n那么，有没有一种类似 Roku 或 Apple TV 界面的外观呢？它叫做 Flatter，由 Java Champion 兼书籍作者 Hendrik\
    \ Ebbers（`@hendrikEbbers`）创建。Flatter 是为一个概念验证项目 BoxFX 设计的。BoxFX 是 Ebbers 先生创建的另一个项目，它使用运行\
    \ JavaFX 8 并应用 Flatter 外观的 Raspberry Pi 设备，如图 15-5 所示。\n\n![A323804_3_En_15_Fig5_HTML.jpg](img/A323804_3_En_15_Fig5_HTML.jpg)\n\
    \n图 15-5.\n\n应用于 JavaFX 应用程序的 Flatter 样式\n\n以下是本节提到的 UI 样式的链接：\n\n*   AquaFX（包含\
    \ Elements）：[`http://aquafx-project.com/project.html`](http://aquafx-project.com/project.html)\n\
    *   Jmetro\n    *   [`http://pixelduke.wordpress.com/category/metro`](http://pixelduke.wordpress.com/category/metro)\n\
    \    *   [`https://github.com/JFXtras/jfxtras-styles`](https://github.com/JFXtras/jfxtras-styles)\n\
    *   Flatter：[`http://www.guigarage.com/2013/09/flatter`](http://www.guigarage.com/2013/09/flatter)\n\
    *   BoxFX：[`http://www.guigarage.com/2013/08/boxfx-javaone-preview-1`](http://www.guigarage.com/2013/08/boxfx-javaone-preview-1)\n\
    \n现在你已经了解了原生样式和媒体设备样式，让我们来看看 Web 和移动 UI 样式。\n\n### Web 和移动外观\n\n根据应用程序的不同，用户可能更喜欢更偏向\
    \ Web 或移动端的外观。通常，设备的屏幕尺寸会迫使设计者决定采用非原生 UI 外观。非原生 UI 构成了大多数流行网站和移动应用的主体。那么，我指的是哪些流行的非原生\
    \ UI 呢？\n\n作为一名 Web 开发者，当今最流行的 UI 样式（外观）是谷歌的 Material Design 和推特的 Bootstrap。例如，图\
    \ 15-6 展示了一个应用了 Material Design 样式的 JavaFX 时钟和`TreeTableView`控件。\n\n![A323804_3_En_15_Fig6_HTML.jpg](img/A323804_3_En_15_Fig6_HTML.jpg)\n\
    \n图 15-6.\n\n应用于 JavaFX 应用程序的 Material Design 样式\n\n图 15-7 展示了应用了推特 Bootstrap\
    \ 外观的按钮。\n\n![A323804_3_En_15_Fig7_HTML.jpg](img/A323804_3_En_15_Fig7_HTML.jpg)\n\
    \n图 15-7.\n\n应用于按钮控件的推特 Bootstrap 样式\n\n随着 JavaFX 社区不断发展和适应这些新的 UI 样式，越来越多的开发者将这些流行的\
    \ UI 样式移植为库，以帮助你轻松地将 JavaFX 应用程序转换为这些流行的 UI 样式。\n\n新加入创建流行 Web 和移动设备主题行列的开发者如下：\n\
    \n*   （谷歌）Material Design\n    *   GluonHQ\n        *   网站：[`http://gluonhq.com/products/mobile/`](http://gluonhq.com/products/mobile/)\n\
    \    *   JFoenix\n        *   网站：[`http://www.jfoenix.com`](http://www.jfoenix.com)\n\
    \        *   作者：[`http://www.jfoenix.com/team.html`](http://www.jfoenix.com/team.html)\n\
    \    *   MaterialFX\n        *   网站：[`http://www.agix.pt/single-post/2015/09/02/MaterialFX-Material-Design-CSS-for-JavaFX`](http://www.agix.pt/single-post/2015/09/02/MaterialFX-Material-Design-CSS-for-JavaFX)\n\
    *   （推特）Bootstrap\n    *   JBootx\n        *   网站：[`https://github.com/dicolar/jbootx`](https://github.com/dicolar/jbootx)\n\
    \        *   作者：[`https://github.com/dicolar/jbootx/graphs/contributors`](https://github.com/dicolar/jbootx/graphs/contributors)\n\
    \    *   BootstrapFX\n        *   网站：[`https://github.com/aalmiray/bootstrapfx`](https://github.com/aalmiray/bootstrapfx)\n\
    \        *   作者：Andres Almiray\n"
- fmt: '### Applying the JavaFX CSS Theme


    Now that you have seen a glimpse of some great-looking skins and UI styles, let’s
    see how to apply JavaFX CSS-based styles. JavaFX has the capability to apply cascading
    style sheets to the Scene graph and its nodes in very much the way web developers
    use CSS style sheets with HTML5 elements. These CSS style sheets are external
    files containing attributes and values to style JavaFX nodes. An example JavaFX
    CSS file looks something like Listing [15-1](#A323804_3_En_15_Chapter.html#Par47).


    ```css

    /* sample.css */

    .button {

    -fx-text-fill: brighter-sky-blue;

    -fx-border-color: rgba(255, 255, 255, .80);

    -fx-border-radius: 8;

    -fx-padding: 6 6 6 6;

    -fx-font: bold italic 20pt "LucidaBrightDemiBold";

    }

    /* ...more styling */

    Listing 15-1.

    A JavaFX CSS File Containing Styling Attributes

    ```


    This code contains a CSS class style definition for JavaFX button controls. Button
    UI controls by default have a class style `button`, which maps to `-fx-` prefixed
    properties. You will learn about JavaFX CSS styling later in this chapter, but
    for now let’s discuss how to swap between the CSS style sheets that will dynamically
    skin an application.


    In this section, you learn the two ways to apply CSS style sheets as look-and-feel
    themes onto JavaFX applications. The following are the two ways to apply JavaFX
    CSS files to Scene graph nodes.


    *   `javafx.application.Application: setUserAgentStylesheet()`

    *   `javafx.scene.Scene: getStylesheets().add()`


    #### Using the `setUserAgentStylesheet(String URL)` Method


    The first way to apply CSS style sheets is by invoking the static `setUserAgentStylesheet()`
    method on the JavaFX Application (`javafx.application.Application`) class. This
    static method styles every scene and all child nodes in a JavaFX application as
    shown here.


    ```java

    Application.setUserAgentStylesheet(url);

    ```


    The `setUserAgentStylesheet(String URL)` method accepts a valid URL string representing
    the JavaFX CSS file. Typically, CSS files are bundled inside a JAR application;
    however they can reside on the local filesystem or a remote web server. When the
    CSS file is in the classpath, the call to the following method will find the CSS
    file and produce an URL string for accessing the file:


    ```java

    getClass().getResource("path/some_file.css").toExternalForm()

    ```


    This assumes the resource is copied and collocated where the compiled classes
    are.


    The following code snippet loads the `sample.css` file as the current look and
    feel for the JavaFX Application. The `sample.css` file in the code snippet is
    co-located where the current class is located. In other words, your Java class
    and your CSS file are in the same directory, so there is no need for a path in
    front of the filename.


    ```java

    Application.setUserAgentStylesheet(getClass().getResource("sample.css")

    .toExternalForm());

    ```


    The `setUserAgentStylesheet()` method applies styling globally to all scenes owned
    by an application, such as context menus and child popup windows. JavaFX 8 currently
    contains two style sheets—Caspian and Modena—which serve as default cross-platform
    look and feel skins. Because the two style sheets are predefined, you can easily
    switch between them using the `setUserAgentStylesheet()` method. The following
    code shows how to switch between the Caspian and Modena look and feel style sheets.


    ```java

    // Switch to JavaFX 2.x''s CASPIAN Look and Feel.

    Application.setUserAgentStylesheet(STYLESHEET_CASPIAN);

    // Switch to JavaFX 8''s Modena Look and Feel.

    Application.setUserAgentStylesheet(STYLESHEET_MODENA);

    ```


    A great way to learn how the pros do it (creating skins) is to look at good examples.
    You can extract the CSS files (`caspian.css` and `modena.css`) from the `jfxrt.jar`
    file or view the JavaFX source code, located at [`http://openjdk.java.net`](http://openjdk.java.net).
    To obtain `jfxrt.jar`, you must be on the JDK prior to Java 9.


    Since Java 9 no longer makes the `jfxrt.jar` available on the runtime or JDKs,
    you need to look for the `jmods` directory under `JAVA_HOME`. Part of project
    Jigsaw was also restructuring the runtime as modules. In the `jmods` directory
    you should find the module called `javafx.controls.jmod`. In order to get into
    the module file, you have to copy the module to some other temporary directory.
    Next, you should rename the copied module and end it with a `.jar` extension to
    be extracted. Lastly, you invoke `jar xvf` on the renamed module. Use your file
    explorer or Finder to locate the following file:


    ```

    classes/com/sun/javafx/scene/control/skin/modena/modena.css

    ```


    The `modena.css` file contains all the JavaFX CSS styling for the default look
    and feel. This file is where you can learn from the experts as to how they style
    every control on the JavaFX platform.


    **Note**


    When you invoke the `setUserAgentStylesheet(null)` method by passing in a `null`
    value, the default style sheet (Modena) will be automatically loaded and set as
    the current look and feel. However, if you are using JavaFX 2.x, the default style
    sheet will be Caspian.


    #### Using Scene’s `getStylesheets().add(String URL)` Method


    The second way of applying a look and feel is by invoking a Scene object’s `getStylesheets().add()`
    method. Unlike the first method of applying a look and feel, the `getStylesheets().add()`
    method is used to style a single scene and its child nodes.


    By calling the `getStylesheets().add()` method, you can style a single scene and
    its child nodes as shown:


    ```java

    Scene scene = ...

    scene.getStylesheets().add(getClass().getResource("sample.css")

    .toExternalForm());

    ```


    As in the previous call to `setUserAgentStylesheet()`, you pass in an URL string
    that represents a JavaFX CSS file. Later, you will see an example application
    that switches between different styles by using either the `setUserAgentStylesheet()`
    or the `getStylesheets().add()` method. If you decide to create an entire CSS
    to style an entire app, you maybe hesitant to start from scratch.


    Creating an entire look and feel requires hundreds if not thousands of lines of
    code in order to style every UI control in JavaFX. So, it’s a good idea to start
    off with the default look and feel and then override styles using the `getStylesheets().add()`
    method.


    I basically created very small look-and-feel style sheet files to demonstrate
    the ability to swap themes. The simple example CSS files have just a handful of
    CSS styles for a small amount of UI controls that would be styled. In other words,
    the example’s small CSS files are loaded via the `getStylesheets().add()` method,
    which styles only some of the nodes and not every node in the application.


    Because the default style sheet (`Modena.css`) is loaded from the prior call via
    the `setUserAgentStylesheet(null)` method, the smaller custom CSS styling file
    can then “piggyback” onto the default style sheet. What’s nice is that you don’t
    have to start from scratch to create a new look and feel. The following snippet
    of code initially invokes the `setUserAgentStylesheet()` method with a `null`
    value, which loads Modena as the default look and feel. It then sets the scene’s
    additional styling by invoking the `getStylesheets().add()` method.


    ```java

    Application.setUserAgentStylesheet(null); // defaults to Modena

    // apply custom look and feel to the scene.

    scene.getStylesheets()

    .add(getClass().getResource("my_cool_skin.css")

    .toExternalForm());

    ```'
