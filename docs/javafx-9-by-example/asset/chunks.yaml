  raw: '## Compound Transitions


    What if you wanted to have multiple animations run in sequence or in parallel?
    The JavaFX Animation API provides the `SequentialTransition` and `ParallelTransition`
    classes. A `SequentialTransition`, as its name suggests, allows you to run many
    animations of type (`javafx.animation.Transition`) in sequence while the `ParallelTransition`
    class can run many animations in parallel. The following code snippet takes two
    `FadeTransition` objects to be run in sequence.


    ```

    SequentialTransition seqTransition = new SequentialTransition(fadeOut, fadeIn);

    seqTransition.playFromStart();

    ```


    To create a parallel transitions, the following code snippet will perform a translate
    and rotate on a shape concurrently.


    ```

    ParallelTransition parallelTransition = new ParallelTransition(translateRight,
    rotateRight);

    parallelTransition.playFromStart();

    ```


    This chapter ends with an example of enhancing the Photo Viewer application slightly
    by using a sequential transition comprised of two `FadeTransition` animations.


    ## PhotoViewer2 Example


    To demonstrate a compound transition, I’ve enhanced the Photo Viewer example mentioned
    earlier in the chapter to create a fade-out and fade-in effect when the user views
    the previous or next image. To view the full source code, take a look at the `PhotoViewer2.java`
    file at the book’s website.


    The code is quite simple because the `PhotoViewer2` class simply extends from
    the `PhotoViewer` class and overrides the `loadAndDisplayImage()` method . The
    overridden method changes the old behavior by adding the fading effect when the
    image is finished loading, as shown in Listing [7-29](#A323804_3_En_7_Chapter.html#Par176).
    Once the image is successfully loaded, there is a call to a private `transitionByFading()`
    method to return a `SequentialTransition` animation. After the return of a `SequentialTransition`,
    the animation is invoked.


    ```

    protected void loadAndDisplayImage(ProgressIndicator progressIndicator) {

    if (buttonPanel.getCurrentIndex()  loadImage = createWorker(imageInfo.getUrl());

    // after loading has succeeded apply image info

    loadImage.setOnSucceeded(workerStateEvent -> {

    try {

    Image nextImage = loadImage.get();

    SequentialTransition fadeIntoNext = transitionByFading(nextImage, imageInfo);

    fadeIntoNext.playFromStart();

    } catch (InterruptedException e) {

    e.printStackTrace();

    } catch (ExecutionException e) {

    e.printStackTrace();

    } finally {

    // hide progress indicator

    progressIndicator.setVisible(false);

    }

    });

    // any failure turn off spinner

    loadImage.setOnFailed(workerStateEvent ->

    progressIndicator.setVisible(false));

    executorService.submit(loadImage);

    }

    Listing 7-29.

    The Method loadAndDisplayImage() Will Create a Worker Task to Load the Next Image
    to be Displayed

    ```


    This code creates a worker task to load the image on a background thread. Once
    the image is loaded successfully, a call to the private method `transitionByFading()`
    will create a sequential transition that will contains two transitions. As shown
    in Listing [7-30](#A323804_3_En_7_Chapter.html#Par178), the method `transitionByFading()`
    will return a `SequentialTransition` instance to be executed.


    ```

    private SequentialTransition transitionByFading(Image nextImage,

    ImageInfo imageInfo) {

    // fade out image view node

    FadeTransition fadeOut =

    new FadeTransition(Duration.millis(500), currentViewImage);

    fadeOut.setFromValue(1.0);

    fadeOut.setToValue(0.0);

    fadeOut.setOnFinished(actionEvent -> {

    currentViewImage.setImage(nextImage);

    // Rotate image view

    rotateImageView(imageInfo.getDegrees());

    // Apply color adjust

    colorAdjust = imageInfo.getColorAdjust();

    currentViewImage.setEffect(colorAdjust);

    // update the menu items containing slider controls

    updateSliders();

    });

    // fade in image view node

    FadeTransition fadeIn =

    new FadeTransition(Duration.millis(500), currentViewImage);

    fadeIn.setFromValue(0.0);

    fadeIn.setToValue(1.0);

    // fade out image view, swap image and fade in image view

    SequentialTransition seqTransition =

    new SequentialTransition(fadeOut, fadeIn);

    return seqTransition;

    }

    Listing 7-30.

    The transitionByFading() is a private Factory Method That Creates a SequentialTransition
    Consisting of Two FadeTransition Animations Responsible for Fading Out the Currently
    Displayed Image and Fading In the Next Image to be Displayed

    ```


    Listing [7-30](#A323804_3_En_7_Chapter.html#Par178) implements the steps into
    the sequential transition. When the sequential transition is executed, the first
    transition (`fadeOut`) will fade out the `currentViewImage` (`ImageView`) node
    containing the current image. The `fadeOut` transition will get handler code to
    respond when an `OnFinished` event is raised. In other words, when the fade out
    transition is finished, the code block will set the next image, rotate the image
    view, adjust the colors, and update the slider controls respectively. After the
    first transition is run, the second transition gets run to perform the fade-in
    effect to display the new (next) image.


    Assuming you’ve got this far, you should now have a basic understanding of JavaFX
    graphics programming.


    ## Summary


    In this chapter, you learned how to load images using the `javafx.scene.image.Image`
    class’ constructor, which accepts the standard URL specification format of files
    located locally, on the classpath, or on a remote web server. Then you got a chance
    to implement a Photo Viewer application with drag-and-drop capability to load
    and display images. You also learned about rotation and color adjustments you
    can make to an image view node.


    Next, you looked at the fundamentals of JavaFX’s animation API to create key values,
    keyframes, and timelines. After learning about the fundamental concepts of animating
    any node using timelines, you looked at convenient animation classes called transitions.
    Using common transitions, you saw a simple point-and-click game example that demonstrated
    the following transitions: path, rotate, scale, translate, and fade. Finally,
    you ended the chapter by enhancing the Photo Viewer with a `SequentialTransition`
    animation to create a compound fade effect as the user views the next or previous
    image.


