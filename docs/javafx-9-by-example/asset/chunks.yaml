    ## JavaFX 3D


    备受期待的 JavaFX 3D API 终于面世，它是 Java 8 版本的一部分。以下链接指向的视频和教程将丰富您的 JavaFX 3D 技能：


    *   JavaFX 3D Oracle 教程：[`http://docs.oracle.com/javafx/8/3d_graphics/jfxpub-3d_graphics.htm`](http://docs.oracle.com/javafx/8/3d_graphics/jfxpub-3d_graphics.htm)
    [`http://docs.oracle.com/javase/8/javafx/graphics-tutorial/javafx-3d-graphics.htm`](http://docs.oracle.com/javase/8/javafx/graphics-tutorial/javafx-3d-graphics.htm)

