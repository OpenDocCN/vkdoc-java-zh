  trans: '

    ### 从 JavaScript 与 Java 通信


    Java 8 允许 JavaScript 代码调用 Java 代码。允许 JavaScript 调用 Java 代码意味着 Web 开发者现在可以利用许多
    Java API。在本节中，我们将简要讨论如何让 JavaScript 代码与 Java 代码进行通信。


    让 JavaScript 与 Java 通信非常简单。第一步是通过调用 `executeScript("window")` 方法获取 `WebEngine`
    对象的 `JSObject` 对象。`JSObject` 是一个包装对象，用于在两种语言之间建立桥梁。


    获取 `JSObject` 后，只需调用 `setMember()` 方法，即可将任何对象传入 JavaScript 引擎的上下文。调用 `setMember()`
    方法时，需要传入一个字符串名称和对应的对象。假设该成员对象具有公开的实例方法，JavaScript 代码就可以访问它们。清单 10-5 展示了如何设置 `JSObject`，以便
    JavaScript 引擎与 Java 通信。


    ```

    // The web view''s web engine

    webView.getEngine()

    .getLoadWorker()

    .stateProperty()

    .addListener( (obs, oldValue, newValue) -> {

    if (newValue == Worker.State.SUCCEEDED) {

    // Let JavaScript make upcalls to this (Java) class

    JSObject jsobj = (JSObject) webView.getEngine()

    .executeScript("window");

    jsobj.setMember("ABCD", new HelloWorld() );

    } });

    清单 10-5.

    允许 JavaScript 代码向上调用 Java 代码

    ```


    在清单 10-5 中可以看到，`HelloWorld` 类实例被设置为 (`JSObject`) 对象中的一个成员。清单 10-6 展示了包含 `sayGoodbye()`
    方法的简单 `HelloWorld` 类。


    ```

    public class HelloWorld () {

    public String sayGoodbye(String name) {

    return "Hasta la vista " + name;

    }

    }

    清单 10-6.

    包含公共方法 sayGoodbye() 的 Java 类

    ```


    将 `HelloWorld` 实例设置为名为 `ABCD` 的 `JSObject` 成员后，清单 10-7 中所示的 JavaScript 函数 `sayGoodbye()`
    现在就可以调用 Java 方法 `ABCD.sayGoodbye()`。


    ```

    .

    .


    function sayGoodbye(name) {

    var message = ABCD.sayGoodbye(name);

    document.getElementById(''my_message'').innerHTML = message;

    }


    .

    .


    清单 10-7.

    调用 Java 代码的 JavaScript 代码

    ```


    需要警告的是，请谨慎暴露那些可能让客户端代码获得访问权限，从而可能危害系统或查看私有数据的方法。


    注意


    由于 JavaScript 代码能够调用 Java，因此确保不暴露可能危害系统或查看私有数据的 API 至关重要。


    正如本章前面提到的，`WebEngine` 对象是一个能够加载 Web 内容的非 GUI 组件，因此您可能会想，是否有可能进行 Web 服务调用，以检索具有不同数据格式（如流行的
    JSON 格式）的序列化数据。要回答这个问题，您需要了解 `WebEngine` API 的职责和限制。


    当使用 JavaFX 的 `WebEngine` API 请求 HTML、JSON 和 XML 数据等 Web 内容时，您会遇到一些限制；其中一些涉及异步从
    Web 服务器获取（`GET`）数据或向 Web 服务器提交（`POST`）数据的能力。这类 Web 请求被称为 RESTful 服务。


    当然，有几种有趣的方法（技巧）可以通过调用 HTML DOM 来获取文本内容，从而使用 `WebEngine` 对象获取 JSON 数据。清单 10-8 是一个如何在其
    HTML DOM 中获取 JSON 文本内容的示例。


    ```

    webEngine.load("http://myserver.org/current-weather?format=json");

    .

    .

    .

    // handler code to obtain JSON data.

    String json = (String) webEngine.getDocument()

    .getElementsByTagName("body")

    .item(0)

    .getTextContent();

    清单 10-8.

    获取 DOM 中的 JSON 文本

    ```


    处理代码遍历 HTML 的 DOM，以获取从 Web 引擎对象检索到的文本内容。尽管实现起来看起来很容易将 JSON 数据作为字符串获取，但我不建议使用这种方法，因为它相当脆弱且非标准。从代码维护的角度来看，该代码可能会脱离上下文，未来可能出现潜在的
    bug。我相信您听过这样一句话：“能做某事并不意味着你应该去做。”


    您很快就会发现，`WebEngine` API 的职责基本上就是加载 HTML5 并与其内容（HTML/JavaScript）进行交互。`WebEngine`
    API 不负责进行 Web 服务调用或使用不同的传输协议序列化数据。


    那么，有没有更好的方法来发起 Web 请求（RESTful）呢？当然有。虽然有许多库可以简化 Web 服务调用，但下一节将向您展示如何使用 Java 9 中名为
    `jdk.incubator.httpclient` 的新实验模块来完成这些操作。

    '
