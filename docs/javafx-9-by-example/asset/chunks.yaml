- fmt: '在计算面积图的位置、宽度和高度后，需要一个`scaleY`变量来帮助归一化或将绘图点保持在应用程序窗口边界内。Y轴代表分贝，某些幅度值可能会绘制到显示表面之外（图表外）。定义的最后一个变量是`space`变量，它将用于表示每个要绘制的数据点之间的像素数。


    接下来是有趣的部分——创建频谱面积图可视化。媒体播放器可以定期接收音频频谱数据的通知。默认情况下，更新每0.1秒（100毫秒）发出一次。当然，您可以通过调用媒体播放器的`setAudioSpectrumInterval(double)`方法来更改间隔。为了响应音频频谱通知更新，代码调用媒体播放器的`setAudioSpectrumListener()`。方法签名如下所示：


    ```

    mediaPlayer.setAudioSpectrumListener(

    (double timestamp,

    double duration,

    float[] magnitudes,

    float[] phases)

    ```


    根据Javadocs，该监听器是一个观察者，接收音频频谱的定期更新。通俗地说，它就是音频媒体的声音数据，如音量、节奏等。要创建`AudioSpectrumListener`的实例，您将创建一个lambda表达式，其参数为接口方法`spectrumDataUpdate()`的参数。表[9-3](#A323804_3_En_9_Chapter.html#Tab3)列出了音频频谱监听器方法的所有入参。有关更多详细信息，请参阅`javafx.scene.media.AudioSpectrumListener`的Javadocs文档。


    表9-3. `AudioSpectrumListener`的方法`spectrumDataUpdate()`的入参


    | 参数 | 数据类型 | 示例 | 描述 |

    | --- | --- | --- | --- |

    | `timestamp` | `Double` | `2.4261` | 事件发生的时间，以秒为单位。 |

    | `duration` | `Double` | `0.1` | 计算频谱的时间段（以秒为单位）。 |

    | `magnitudes` | `float[]` | `-50.474` | 一个浮点值数组，表示每个频段的频谱幅度（以分贝为单位，非正浮点值）。 |

    | `phases` | `float[]` | `1.22` | 一个浮点值数组，表示每个频段的相位。每个值的范围在`-Math.PI`和`+Math.PI`之间。
    |


    监听器的代码首先检查媒体播放器的当前状态是否为`Paused`或`Stopped`。如果是，则立即返回。如果状态既不是`Paused`也不是`Stopped`，那么就该绘制频谱面积图了。代码首先声明并预计算变量，以包含数据点的起始X坐标值。`scaleX`变量用于缩放点，确保它们在图表宽度范围内。接下来是图表`Path`节点对象的初始化。图表的`Path`节点将使用`Path`元素进行初始化，以根据传入的`magnitudes`数组形成一个闭合路径。


    在创建面积图的形状时，第一个`Path`元素将是`MoveTo`。最后两个`Path`元素将是`LineTo`和`ClosePath`元素。最后两个`Path`元素从最后一个数据点绘制到图表的右下角（可见的X轴），然后使用`ClosePath`元素闭合路径。位于第一个和最后一个元素之间的`Path`元素将在每个更新间隔内更新。由于所有幅度值都是介于0和-60之间的负数，因此使用值的平方来表示数据点的振幅或峰值。由于图表实际上是一个形状，因此可以用颜色填充。在此示例中，代码将使用基于色谱（ROYGBIV）的线性渐变来填充图表。以下代码片段是JavaFX的`fill`属性，为面积图形状分配了一个线性渐变。


    ```

    -fx-fill: linear-gradient(from 5 5 to 5 225,

    rgba(255, 0, 0, .70) 0%,    /* Red    */

    rgba(255, 165, 0, .70) 40%, /* Orange */

    rgba(255, 255, 0, .70) 70%, /* Yellow */

    rgba(0, 255, 0, .70) 80%,   /* Green  */

    rgba(0, 0, 255, .70) 90%,   /* Blue   */

    rgba(75,0,128,.70) 95%,     /* Indigo */

    rgba(238,130,238,.70) 100%) /* Violet */

    ```


    #### 退出（关闭按钮）


    ```

    private Node createCloseButton()

    ```


    最后，在`start()`方法中，通过调用私有方法`createCloseButton()`创建一个关闭按钮来提供退出应用程序的能力，该方法返回一个包含退出应用程序处理程序代码的自定义节点。创建关闭按钮时，我创建了一个包含圆形和`SVGNode`的堆栈面板。圆形和`SVGNode`使用列表[9-2](#A323804_3_En_9_Chapter.html#Par31)中的CSS进行样式设置。除了当鼠标光标位于关闭按钮上方时用于高亮按钮的伪类`hover`之外，样式设置没有什么特别之处。以下代码片段在鼠标悬停在关闭按钮（圆形）上时更改了描边颜色的不透明度级别。


    ```

    #close-circle:hover {

    -fx-stroke: derive(red, 90%);

    }

    ```


    `createCloseButton`方法的主要工作是通过调用`stop()`和`Platform.exit()`来停止媒体播放器并退出应用程序。


    ## 播放视频


    在JavaFX中播放视频非常简单。您使用与音频相同的API将媒体加载到JavaFX媒体播放器对象中。唯一的区别是您需要一个`MediaView`节点来在场景上显示视频。由于`MediaView`是一个JavaFX节点，您可以对其进行变换、缩放、平移和应用效果。在本节中，您将了解跨平台视频媒体文件格式，稍后您将看到一个JavaFX视频播放器的示例。


    截至本书撰写时，JavaFX媒体播放器API支持视频格式MPEG-4 H.264/AVC（`.mp4`）和使用`.flv`容器格式的VP6。


    ### MPEG-4


    MPEG-4是一种包含H.264/AVC视频的多媒体容器格式。目前，MPEG-4是一种广泛用于在互联网上观看视频的压缩视频格式。您会发现一些高清录像机可以自动将原始视频转换为MPEG-4，生成扩展名为`.mp4`的文件。对于不能生成`mp4`文件的设备，您目前需要购买能够将原始视频转换为MP4格式的电影或视频编辑软件。


    以下软件程序（以及其他程序）可以将原始视频转换为便携式MPEG4格式：


    *   Adobe Premiere

    *   Apple Final Cut Pro

    *   Apple iMovie

    *   Apple Quick Time Pro

    *   Sony Vegas Movie Studio

    *   Sony Vegas Pro

    *   FFmpeg'
  raw: 'After the area chart’s position, the width and height are calculated as a
    `scaleY` variable is needed to help normalize or to keep the plotting points in
    the application window bounds. The y-axis represents the decibels where some magnitude
    values can be plotted off (the chart) of the display surface. The last variable
    defined is the space variable, and it will be used to represent the number of
    pixels between each data point to be plotted.


    Now for the fun part—creating the spectrum area chart visualization. The media
    player can get notifications of audio spectrum data on regular intervals. By default,
    the updates are emitted every 0.1 seconds (100ms). Of course you can change the
    interval by calling the media player’s `setAudioSpectrumInterval(double)` method.
    To respond to audio spectrum notification updates, the code invokes the media
    player’s `setAudioSpectrumListener()`. The method signature is shown here:


    ```

    mediaPlayer.setAudioSpectrumListener(

    (double timestamp,

    double duration,

    float[] magnitudes,

    float[] phases)

    ```


    According to the Javadocs, the listener is an observer receiving periodic updates
    of the audio spectrum. In layman’s terms, it is the audio media’s sound data such
    as volume, tempo, and so on. To create an instance of an `AudioSpectrumListener`,
    you will create a lambda expression with parameters of the interface’s method
    `spectrumDataUpdate()`. Table [9-3](#A323804_3_En_9_Chapter.html#Tab3) lists all
    the inbound parameters for the audio spectrum listener’s method. For more details,
    refer to the Javadocs documentation of `javafx.scene.media.AudioSpectrumListener`.


    Table 9-3.


    The AudioSpectrumListener’s Method spectrumDataUpdate() Inbound Parameters


    | Parameters | Data Type | Example | Description |

    | --- | --- | --- | --- |

    | `timestamp` | `Double` | `2.4261` | When the event occurred, in seconds. |

    | `duration` | `Double` | `0.1` | The duration of time (in seconds) the spectrum
    was computed. |

    | `magnitudes` | `float[]` | `-50.474` | An array of float values representing
    each band’s spectrum magnitude in decibels (non-positive float value). |

    | `phases` | `float[]` | `1.22` | An array of float values representing each band’s
    phase. Each value range is between `-Math.PI` and `+Math.PI`. |


    The code for the listener begins by checking if the media player’s current state
    is Paused or Stopped. If so, it returns immediately. If the state is neither Paused
    nor Stopped, it’s time to draw the spectrum area chart. The code starts off declaring
    and pre-computing variables to contain the data points’ beginning x-coordinate
    value. The `scaleX` variable is used to scale points to ensure that they are kept
    within the chart bounds width-wise. Next is the initialization of the chart’s
    `Path` node object. The chart’s `Path` node will get initialized with `Path` elements
    to form a closed path based on the array of magnitudes passed in.


    When creating the shape of the area chart, the first `Path` element will be a
    `MoveTo`. The last two `Path` elements will be a `LineTo` and a `ClosePath` element.
    The last two `Path` elements are drawn from the last data point to the bottom-right
    of the chart (visible x-axis), then closing the path using the `ClosePath` element.
    The `Path` elements that are between the first and last elements will be updated
    every update interval. Because all magnitude values are negative numbers between
    0 and -60, the squares of the values for the amplitude or peak of a data point.
    Since the chart is really a shape, it can be filled with a color. In this example,
    the code will fill the chart with a linear shape based on the color spectrum (ROYGBIV).
    The following code snippet is a JavaFX `fill` attribute assigned a linear gradient
    for the area chart shape.


    ```

    -fx-fill: linear-gradient(from 5 5 to 5 225,

    rgba(255, 0, 0, .70) 0%,    /* Red    */

    rgba(255, 165, 0, .70) 40%, /* Orange */

    rgba(255, 255, 0, .70) 70%, /* Yellow */

    rgba(0, 255, 0, .70) 80%,   /* Green  */

    rgba(0, 0, 255, .70) 90%,   /* Blue   */

    rgba(75,0,128,.70) 95%,     /* Indigo */

    rgba(238,130,238,.70) 100%) /* Violet */

    ```


    #### Quitting (the Close Button )


    ```

    private Node createCloseButton()

    ```


    Lastly is the ability to quit the application in the `start()` method by creating
    a Close button by invoking the private method `createCloseButton()`, which returns
    a custom node that has handler code to exit the application. When creating the
    Close button, I created a stack pane containing a circle and an `SVGNode`. The
    circle and `SVGNode` is styled using CSS from Listing [9-2](#A323804_3_En_9_Chapter.html#Par31).
    There is nothing unusual about the styling except for the pseudo-class called
    `hover` when the mouse cursor is on top of the Close button to highlight the button.
    The following code snippet changes the opacity level of the stroke color when
    the mouse is hovering over the Close button (circle shape).


    ```

    #close-circle:hover {

    -fx-stroke: derive(red, 90%);

    }

    ```


    The `create close` button method’s main job is to stop the media player and exit
    the application by calling `stop()` and `Platform.exit()`.


    ## Playing Video


    Playing videos in JavaFX is quite simple. You use the same APIs as with audio
    to load media into a JavaFX media player object. The only difference is that you
    need a `MediaView` node to display the video on the scene. Because `MediaView`
    is a JavaFX node, you can transform, scale, translate, and apply effects. In this
    section, you learn about cross-platform video media file formats, and later you
    see an example of a JavaFX video player.


    As of the writing of this book, the JavaFX media player API supports the video
    formats MPEG-4 H.264/AVC (`.mp4`) and VP6 using an `.flv` container format.


    ### MPEG-4


    MPEG-4 is a multimedia container format containing H.264/AVC video. Currently
    MPEG-4 is a compressed video format that is widely used to view video on the Internet.
    You’ll find that some high-definition video recorders can automatically convert
    raw video to MPEG-4 to produce files with the extension `.mp4`. For the devices
    that do not produce `mp4` files, you currently need to purchase movie or video
    editing software capable of converting raw videos into MP4-formatted files.


    The following software programs, among others, can convert raw video into the
    portable MPEG4 format:


    *   Adobe Premiere

    *   Apple Final Cut Pro

    *   Apples iMovie

    *   Apple Quick Time Pro

    *   Sony Vegas Movie Studio

    *   Sony Vegas Pro

    *   FFmpeg'
