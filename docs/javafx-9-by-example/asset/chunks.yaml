    The left image in Figure [9-2](#A323804_3_En_9_Chapter.html#Fig2) shows the Stop
    (square) and Play (triangle wedge) buttons. When the `Stop` button is clicked,
    the media start time is repositioned to the beginning of the file. When the `Pause`
    button is clicked, the media will maintain its current position within the media
    playback. Also, as the media is paused, the `Play` button will appear, so that
    the user can resume the music. The right image in Figure [9-2](#A323804_3_En_9_Chapter.html#Fig2)
    shows the button panel containing a `Stop` and a `Pause` button (circle with two
    vertical lines). While the music is currently playing, the user can click the
    `Pause` button to pause the music.


    ![A323804_3_En_9_Fig2_HTML.jpg](A323804_3_En_9_Fig2_HTML.jpg)


    Figure 9-2. Custom button panel control with Stop (rectangle), Play (triangle),
    and Pause (circle) buttons


    #### The Progress and Seek Position Slider Control


    Next, you’ll notice the progress and seek position slider control in the lower-left
    corner of the application window, as shown in Figure [9-3](#A323804_3_En_9_Chapter.html#Fig3).
