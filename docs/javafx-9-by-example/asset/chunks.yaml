    ### Charm Glisten


    基类是 `MobileApplication`，它继承自 `Application`。它不需要实现任何特定方法，但通常可以重写 `init` 来注册不同的视图，而
    `postInit` 则可以访问场景并应用样式表，例如。


    Glisten 用户界面是使用视图构建的。视图是一个 Glisten 容器，允许你将节点添加到其顶部、中心和底部。


    通常，通过为视图提供一个名称及其内容的节点来创建 `View` 实例。该实例被添加到一个视图工厂中，以便 Glisten UI 可以按需加载和卸载它们。


    默认情况下，舞台显示时第一个显示的视图称为 `Home View`。它没有预定义的内容，因此该视图必须由开发者设计，但其名称已经分配好了：`MobileApplication.HOME_VIEW`。清单
    13-6 中的简短代码片段将创建一个非常简单的移动应用程序，其中包含单个视图，如图 13-3 所示。


    ![A323804_3_En_13_Fig3_HTML.jpg](img/A323804_3_En_13_Fig3_HTML.jpg)


    图 13-3.


    在桌面上运行的 MyApp


    默认情况下，`glisten.css` 是添加到 Gluon Mobile 应用程序中的样式表。它基于 Google 的 Material Design（
    [`https://material.io`](https://material.io) ）。


    请参阅 [`http://docs.gluonhq.com/charm/latest/#_charm_glisten`](http://docs.gluonhq.com/charm/latest/#_charm_glisten)
    上的文档，以了解有关 Glisten 控件的更多信息。


    ```

    import com.gluonhq.charm.glisten.application.MobileApplication;

    import com.gluonhq.charm.glisten.mvc.View;

    import com.gluonhq.charm.glisten.visual.Swatch;

    import javafx.scene.Scene;

    import javafx.scene.control.Button;

    public class MyApp extends MobileApplication {

    public static final String BASIC_VIEW = HOME_VIEW;

    @Override

    public void init() {

    addViewFactory(BASIC_VIEW, () -> new View(new Button("Hello Glisten!")));

    }

    @Override

    public void postInit(Scene scene) {

    Swatch.BLUE.assignTo(scene);

    }

    }

