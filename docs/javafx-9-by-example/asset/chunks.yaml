  trans: '

    ### 加载图像


    你可能已经了解互联网上许多标准的图像文件格式，例如 `.jpg`、`.png`、`.gif` 和 `.bmp`。为了加载这些标准图像文件格式，JavaFX
    提供了 `javafx.scene.image.Image` API。`Image` 类拥有许多便捷的构造方法，便于实现不同的加载策略，如下表所示：


    *   `Image(java.io.InputStream inputStream)`

    *   `Image(java.io.InputStream is, double requestedWidth, double requestedHeight,
    boolean preserveRatio, boolean smooth)`

    *   `Image(java.lang.String url)`

    *   `Image(java.lang.String url, boolean backgroundLoading)`

    *   `Image(java.lang.String url, double requestedWidth, double requestedHeight,
    boolean preserveRatio, boolean smooth)`

    *   `Image(java.lang.String url, double requestedWidth, double requestedHeight,
    boolean preserveRatio, boolean smooth, boolean backgroundLoading)`


    如你所见，所有构造方法中只有少数几个通用参数，它们以不同的组合方式用于不同的加载场景。表 7-1 简要描述了每个参数。


    表 7-1.


    加载 `javafx.scene.image.Image` 类图像时的通用参数


    | 参数 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `inputStream` | `java.io.InputStream` | 输入流，例如来自文件或网络。 |

    | `url` | `String` | 图像的 URL 位置，例如本地文件系统上的文件或托管图像文件的 Web 服务器。 |

    | `backgroundLoading` | `boolean` | 在后台加载图像（脱离 JavaFX 应用程序线程）。 |

    | `requestedWidth` | `double` | 指定图像的边界框宽度。 |

    | `requestedHeight` | `double` | 指定图像的边界框高度。 |

    | `preserveRatio` | `boolean` | 保持图像在边界框内的宽高比。 |

    | `smooth` | `boolean` | 值为 `true` 表示使用更好的算法来平滑图像，但速度可能较慢；否则将使用较低质量的算法，渲染像素更快。
    |


    为了演示如何加载图像，清单 7-1 展示了三种加载图像的方式。该代码清单演示了从本地文件系统、类路径以及远程主机系统（如 Web 服务器）加载图像。


    ```

    try {

    // 当前线程上下文不应是 GUI 线程。

    // 从 Windows 文件系统加载图像

    File file = new File("C:\\Users\\jdoe\\Pictures\\myphoto.jpg");

    String localUrl = file.toURI().toURL().toString();

    // 不在后台加载（阻塞）

    Image localImage = new Image(localUrl, false);

    // 从 jar 文件中的类路径加载图像

    String urlStr = this.getClass()

    .getClassLoader()

    .getResource("images/myphoto.jpg")

    .toExternalForm();

    // 在后台加载（非阻塞）

    Image cpUrl = new Image(urlStr, true);

    // 从 Web 服务器加载图像

    String remoteUrl = "http://mycompany.com/myphoto.jpg";

    // 在后台加载（非阻塞）

    Image remoteImage = new Image(remoteUrl, true);

    System.out.println(localUrl);  // file:/C:/Users/jdoe/Pictures/myphoto.jpg

    System.out.println(cpUrl);     // jar:file:/myApp.jar!/images/myphoto.jpg

    System.out.println(remoteUrl); // http://mycompany.com/myphoto.jpg

    // ... 其余代码

    } catch (MalformedURLException ex) {

    ex.printStackTrace();

    }

    清单 7-1.

    从文件系统、类路径和远程 Web 服务器加载图像

    ```


    此清单演示了如何使用接收图像 `URL` 路径和一个 `boolean` 参数的构造方法，来决定是否在后台线程中加载图像。由于构造方法必须接受一个 `URL`
    对象，因此文件路径必须转换为 URL 对象（URL 规范）。


    清单 7-1 首先使用一个基于包含图像路径位置的字符串的 `File` 对象，从本地文件系统加载图像。在此场景中，我指定了一个基于 Microsoft Windows
    的绝对文件路径。在这里你会注意到，表示 Windows 操作系统上文件路径的字符串中使用了双反斜杠。第一个反斜杠用于在 Java 字符串中转义反斜杠字符。`toURL()`
    方法会将文件系统路径转换为标准的 `URL` 格式字符串。好处在于，该方法调用会将绝对文件路径转换为标准统一资源定位符规范的格式。该字符串将包含表示协议和路径信息的前缀
    `file:`。


    与本地文件系统类似，从 Java 类路径或资源目录加载图像文件也是如此。假设应用程序被构建为可执行的 JAR，清单 7-1 中的示例将协议显示为 `jar:file:`，表示
    JAR 归档文件内的文件。请特别注意使用 `getClassLoader()` 方法的代码。某些环境（如 OSGi 平台）会在其自身的上下文（也称为 bundle）中使用独立的类加载器。通过使用
    `getClassLoader()` 方法，代码可以安全地从正确的类加载器上下文中获取资源。例如，如果项目有一个包含图像文件的资源目录，你可以像下面这样基于类路径加载资源：


    ```

    src/

    +--main/

    +----java/

    +-------com/

    +---------mycompany/

    +-----------MyClass.java

    +----resources/

    +-------com/

    +---------mycompany/

    +-----------my_image.jpg

    String urlStr = MyClass.class

    .getClassLoader()

    .getResource("com/mycompany/my_image.jpg")

    .toExternalForm();

    ```


    在这个例子中，你会注意到资源字符串 `com/mycompany/my_image.jpg` 的开头包含了路径信息。有时项目会将所有图像图标放在一个名为 `images`
    的目录中，或者放在包命名空间内。


    回到清单 7-1 中的代码，最后一种策略是一个示例，展示了加载托管在远程 Web 服务器上的图像的能力。你可以看到，代码还使用了 `http:` 作为 `URL`
    路径的前缀协议，以演示在远程主机 Web 服务器上加载图像。


    务必牢记，清单 7-1 中关于使用布尔值 `false` 进行阻塞调用的语句，不应在 JavaFX 应用程序线程上使用。这是因为可能会阻塞 UI 线程，从而导致应用程序看起来像冻结了一样。根据图像文件的大小或网络延迟，UI
    开发者（也就是你！）的目标是通过在后台线程加载图像来避免阻塞 UI 线程（JavaFX 应用程序线程）。加载图像后，该图像便可以在 JavaFX 应用程序线程（`ImageView`
    节点）上渲染。如果你传入布尔值 `true`，`ImageView` 节点将显示为空白，直到后台线程完成加载 `Image` 对象。


    现在你已经了解了如何加载图像，接下来你将学习如何使用 JavaFX `ImageView` 节点来显示它们。

    '
- fmt: "### Displaying Images\n\nAfter an image object is loaded, it needs to be passed\
    \ to an `ImageView` object to be displayed on the JavaFX scene graph. A `javafx.scene.image.ImageView`\
    \ node is simply a wrapper object that references an `Image` object, which was\
    \ discussed earlier. Because the `ImageView` object is a JavaFX `Node` object,\
    \ you will be able to apply effects and perform transforms.\n\nWhen an `ImageView`\
    \ node is used to apply special effects such as blurring, the image’s pixel data\
    \ is not actually manipulated, but copied, to be calculated and displayed onto\
    \ the `ImageView` node for display. This is quite a powerful technique when there\
    \ are many `ImageView` objects that all point to a single `Image` object. Listing\
    \ [7-2](#A323804_3_En_7_Chapter.html#Par36) loads an image asynchronously (background\
    \ loading) to be passed into an `ImageView` constructor.\n\n```\nImage remoteImage\
    \ = new Image(remoteUrl, true);\nImageView imageView = new ImageView(remoteImage);\n\
    root.getChildren().add(imageView);\nListing 7-2.\nLoading an Image in the Background\
    \ and Displaying It in an ImageView Node\n```\n\nBy default, the `width` and `height`\
    \ will be the actual dimensions in pixels of the image.\n\nNow that you know how\
    \ to load and display images programmatically onto the JavaFX Scene graph, let’s\
    \ look at a Photo Viewer example application. In the next section, you see how\
    \ to implement a Photo Viewer application, which allows images to be loaded, viewed,\
    \ scaled, and rotated.\n\n## A Photo Viewer Example\n\nA practical way to display\
    \ images in JavaFX is an example of a Photo Viewer application. This application\
    \ will allow you to drag and drop image files or load from the menu to then be\
    \ viewed onto the scene graph. Figure [7-1](#A323804_3_En_7_Chapter.html#Fig1)\
    \ illustrates the JavaFX Photo Viewer application displaying an image. Figure\
    \ [7-1](#A323804_3_En_7_Chapter.html#Fig1) also shows the feature to allow users\
    \ to modify the current image’s color settings.\n\n![A323804_3_En_7_Fig1_HTML.jpg](A323804_3_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1.\n\nThe Photo Viewer application displaying the current image. The\
    \ image on the left is the original photo and the image on the right has color\
    \ adjustments.\n\nIn this section, you will get exposed to the Photo Viewer’s\
    \ features along with instructions on how to use the application. Once you have\
    \ learned the features and instructions, the section discusses a UML class diagram\
    \ and a brief description of the source code files. Lastly, you’ll get a detailed\
    \ walkthrough of the Photo Viewer application’s source code. The code walkthrough\
    \ will consist of the application’s GUI code, application logic, and CSS styling.\n\
    \nBefore looking at the source code of the JavaFX Photo Viewer application, the\
    \ following section briefly explains the features along with the instructions\
    \ on how to use it.\n\n### Features/Instructions\n\nA Photo Viewer application’s\
    \ features are the following:\n\n*   **Loads images**: Loads images having the\
    \ following file formats: `.jpg`, `.gif`, `.png`, and `.bmp`. A user can load\
    \ images by using the Open menu option or by dragging and dropping images from\
    \ the filesystem into the application area. Figure [7-2](#A323804_3_En_7_Chapter.html#Fig2)\
    \ shows the Open menu item to bring up a file chooser.\n\n    ![A323804_3_En_7_Fig2_HTML.jpg](A323804_3_En_7_Fig2_HTML.jpg)\n\
    \n    Figure 7-2.\n\n    Open file menu to present a file chooser to load an image\
    \ from the filesystem\n\n*   **Progress Indicator**: Displays a progress indicator\
    \ when loading of an image. Figure [7-3](#A323804_3_En_7_Chapter.html#Fig3) shows\
    \ a progress indicator when the application is loading images.\n\n    ![A323804_3_En_7_Fig3_HTML.jpg](A323804_3_En_7_Fig3_HTML.jpg)\n\
    \n    Figure 7-3.\n\n    Progress indicator is displayed to show the application\
    \ is currently loading a file\n\n*   **Rotate image**: Rotate the image by 90\
    \ degrees clockwise or counter-clockwise. Figure [7-4](#A323804_3_En_7_Chapter.html#Fig4)\
    \ depicts the menu options to rotate the image by 90 degrees. There are also keyboard\
    \ shortcuts to rotate the image (the ➤ left/right arrow keys on MacOS and Ctrl\
    \ left/right arrow keys on Windows and Linux OS).\n\n    ![A323804_3_En_7_Fig4_HTML.jpg](A323804_3_En_7_Fig4_HTML.jpg)\n\
    \n    Figure 7-4.\n\n    Menu options to rotate the image by 90 degrees in clockwise\
    \ or counter-clockwise direction\n\n*   **Resize image**: Resizes the image while\
    \ preserving the aspect ratio. To resize the current image, use the mouse pointer\
    \ to expand the application window’s height or width.\n\n*   **Previous/Next Image\
    \ buttons**: Ability to page through images using custom button controls. This\
    \ allows you to see the previous and next image in the list, as shown in Figure\
    \ [7-5](#A323804_3_En_7_Chapter.html#Fig5). Also, there are keyboard equivalents\
    \ by using the arrow keys (left and right) to see the previous and next image,\
    \ respectively.\n\n    ![A323804_3_En_7_Fig5_HTML.jpg](A323804_3_En_7_Fig5_HTML.jpg)\n\
    \n    Figure 7-5.\n\n    The custom UI control `ImageViewButtons` is responsible\
    \ for viewing the previous and next image in the Photo Viewer application. The\
    \ custom control source code is the `ImageViewButtons.java` file.\n\n*   **Adjust\
    \ color attributes**: The ability to adjust colors of the currently viewed image\
    \ by changing the hue, saturation, brightness, and contrast. You use the menu\
    \ options under Color Adjust, as shown in Figure [7-6](#A323804_3_En_7_Chapter.html#Fig6).\
    \ Also, you can restore the image to the original color settings.\n\n    ![A323804_3_En_7_Fig6_HTML.jpg](A323804_3_En_7_Fig6_HTML.jpg)\n\
    \n    Figure 7-6.\n\n    The Color Adjust menu options allow you to change the\
    \ currently displayed image’s color attributes. The last option that enables you\
    \ to restore the image to the original color settings.\n\n*   **Save As**: The\
    \ Save As image menu option allows you to save the currently displayed image with\
    \ a different filename or overwrite the image it was loaded. The Save As option\
    \ is on the File menu. The image will be written as bitmap graphics file with\
    \ the PNG format.\n\n### UML: Class Diagram\n\nAs a design and class structure,\
    \ the Photo Viewer application consists of three classes shown in the UML class\
    \ diagram in Figure [7-7](#A323804_3_En_7_Chapter.html#Fig7). The three UML classes\
    \ are `PhotoViewer`, `ImageViewButtons`, and `ImageInfo`. The main JavaFX application\
    \ class `PhotoViewer` has a one-to-one relationship to an `ImageViewButtons` instance.\
    \ The `ImageViewButtons` class is a simple custom control that manages zero-to-many\
    \ `ImageInfo` objects. Basically, the `ImageViewButtons` instance is a UI control\
    \ that has buttons to view the previous and next image. Each image loaded with\
    \ effects applied to the current image view will have an associated `ImageInfo`\
    \ object.\n\n![A323804_3_En_7_Fig7_HTML.jpg](A323804_3_En_7_Fig7_HTML.jpg)\n\n\
    Figure 7-7.\n\nClass diagram of the Photo Viewer application. A `PhotoViewerImage`\
    \ has an `ImageViewButtons` instance. An `ImageViewButtons` instance has zero-to-many\
    \ `ImageInfo` objects."
  raw: "### Displaying Images\n\nAfter an image object is loaded, it needs to be passed\
    \ to an `ImageView` object to be displayed on the JavaFX scene graph. A `javafx.scene.image.ImageView`\
    \ node is simply a wrapper object that references an `Image` object, which was\
    \ discussed earlier. Because the `ImageView` object is a JavaFX `Node` object,\
    \ you will be able to apply effects and perform transforms.\n\nWhen an `ImageView`\
    \ node is used to apply special effects such as blurring, the image’s pixel data\
    \ is not actually manipulated, but copied, to be calculated and displayed onto\
    \ the `ImageView` node for display. This is quite a powerful technique when there\
    \ are many `ImageView` objects that all point to a single `Image` object. Listing\
    \ [7-2](#A323804_3_En_7_Chapter.html#Par36) loads an image asynchronously (background\
    \ loading) to be passed into an `ImageView` constructor.\n\n```\nImage remoteImage\
    \ = new Image(remoteUrl, true);\nImageView imageView = new ImageView(remoteImage);\n\
    root.getChildren().add(imageView);\nListing 7-2.\nLoading an Image in the Background\
    \ and Displaying It in an ImageView Node\n```\n\nBy default, the `width` and `height`\
    \ will be the actual dimensions in pixels of the image.\n\nNow that you know how\
    \ to load and display images programmatically onto the JavaFX Scene graph, let’s\
    \ look at a Photo Viewer example application. In the next section, you see how\
    \ to implement a Photo Viewer application, which allows images to be loaded, viewed,\
    \ scaled, and rotated.\n\n## A Photo Viewer Example\n\nA practical way to display\
    \ images in JavaFX is an example of a Photo Viewer application. This application\
    \ will allow you to drag and drop image files or load from the menu to then be\
    \ viewed onto the scene graph. Figure [7-1](#A323804_3_En_7_Chapter.html#Fig1)\
    \ illustrates the JavaFX Photo Viewer application displaying an image. Figure\
    \ [7-1](#A323804_3_En_7_Chapter.html#Fig1) also shows the feature to allow users\
    \ to modify the current image’s color settings.\n\n![A323804_3_En_7_Fig1_HTML.jpg](A323804_3_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1.\n\nThe Photo Viewer application displaying the current image. The\
    \ image on the left is the original photo and the image on the right has color\
    \ adjustments.\n\nIn this section, you will get exposed to the Photo Viewer’s\
    \ features along with instructions on how to use the application. Once you have\
    \ learned the features and instructions, the section discusses a UML class diagram\
    \ and a brief description of the source code files. Lastly, you’ll get a detailed\
    \ walkthrough of the Photo Viewer application’s source code. The code walkthrough\
    \ will consist of the application’s GUI code, application logic, and CSS styling.\n\
    \nBefore looking at the source code of the JavaFX Photo Viewer application, the\
    \ following section briefly explains the features along with the instructions\
    \ on how to use it.\n\n### Features/Instructions\n\nA Photo Viewer application’s\
    \ features are the following:\n\n*   Loads images: Loads images having the following\
    \ file formats: `.jpg`, `.gif`, `.png`, and `.bmp`. A user can load images by\
    \ using the Open menu option or by dragging and dropping images from the filesystem\
    \ into the application area. Figure [7-2](#A323804_3_En_7_Chapter.html#Fig2) shows\
    \ the Open menu item to bring up a file chooser.\n\n    ![A323804_3_En_7_Fig2_HTML.jpg](A323804_3_En_7_Fig2_HTML.jpg)\n\
    \n    Figure 7-2.\n\n    Open file menu to present a file chooser to load an image\
    \ from the filesystem\n*   Progress Indicator: Displays a progress indicator when\
    \ loading of an image. Figure [7-3](#A323804_3_En_7_Chapter.html#Fig3) shows a\
    \ progress indicator when the application is loading images.\n\n    ![A323804_3_En_7_Fig3_HTML.jpg](A323804_3_En_7_Fig3_HTML.jpg)\n\
    \n    Figure 7-3.\n\n    Progress indicator is displayed to show the application\
    \ is currently loading a file\n*   Rotate image : Rotate the image by 90 degrees\
    \ clockwise or counter-clockwise. Figure [7-4](#A323804_3_En_7_Chapter.html#Fig4)\
    \ depicts the menu options to rotate the image by 90 degrees. There are also keyboard\
    \ shortcuts to rotate the image (the ➤ left/right arrow keys on MacOS and Ctrl\
    \ left/right arrow keys on Windows and Linux OS).\n\n    ![A323804_3_En_7_Fig4_HTML.jpg](A323804_3_En_7_Fig4_HTML.jpg)\n\
    \n    Figure 7-4.\n\n    Menu options to rotate the image by 90 degrees in clockwise\
    \ or counter-clockwise direction\n*   Resize image: Resizes the image while preserving\
    \ the aspect ratio. To resize the current image, use the mouse pointer to expand\
    \ the application window’s height or width.\n*   Previous/Next Image buttons :\
    \ Ability to page through images using custom button controls. This allows you\
    \ to see the previous and next image in the list, as shown in Figure [7-5](#A323804_3_En_7_Chapter.html#Fig5).\
    \ Also, there are keyboard equivalents by using the arrow keys (left and right)\
    \ to see the previous and next image, respectively.\n\n    ![A323804_3_En_7_Fig5_HTML.jpg](A323804_3_En_7_Fig5_HTML.jpg)\n\
    \n    Figure 7-5.\n\n    The custom UI control ImageViewButtons is responsible\
    \ for viewing the previous and next image in the Photo Viewer application. The\
    \ custom control source code is the ImageViewButtons.java file.\n*   Adjust color\
    \ attributes: The ability to adjust colors of the currently viewed image by changing\
    \ the hue, saturation, brightness, and contrast. You use the menu options under\
    \ Color Adjust, as shown in Figure [7-6](#A323804_3_En_7_Chapter.html#Fig6). Also,\
    \ you can restore the image to the original color settings.\n\n    ![A323804_3_En_7_Fig6_HTML.jpg](A323804_3_En_7_Fig6_HTML.jpg)\n\
    \n    Figure 7-6.\n\n    The Color Adjust menu options allow you to change the\
    \ currently displayed image’s color attributes. The last option that enables you\
    \ to restore the image to the original color settings.\n*   Save As: The Save\
    \ As image menu option allows you to save the currently displayed image with a\
    \ different filename or overwrite the image it was loaded. The Save As option\
    \ is on the File menu. The image will be written as bitmap graphics file with\
    \ the PNG format.\n\n### UML: Class Diagram\n\nAs a design and class structure,\
    \ the Photo Viewer application consists of three classes shown in the UML class\
    \ diagram in Figure [7-7](#A323804_3_En_7_Chapter.html#Fig7). The three UML classes\
    \ are `PhotoViewer`, `ImageViewButtons`, and `ImageInfo`. The main JavaFX application\
    \ class `PhotoViewer` has a one-to-one relationship to an `ImageViewButtons` instance.\
    \ The `ImageViewButtons` class is a simple custom control that manages zero-to-many\
    \ `ImageInfo` objects. Basically, the `ImageViewButtons` instance is a UI control\
    \ that has buttons to view the previous and next image. Each image loaded with\
    \ effects applied to the current image view will have an associated `ImageInfo`\
    \ object.\n\n![A323804_3_En_7_Fig7_HTML.jpg](A323804_3_En_7_Fig7_HTML.jpg)\n\n\
    Figure 7-7.\n\nClass diagram of the Photo Viewer application. A PhotoViewerImage\
    \ has an ImageViewButtons instance. An ImageViewButtons instance has zero-to-many\
    \ ImageInfo objects ."
  trans: "\n### 显示图像\n\n图像对象加载完成后，需要将其传递给 `ImageView` 对象才能在 JavaFX 场景图中显示。`javafx.scene.image.ImageView`\
    \ 节点本质上是一个包装对象，它引用了一个之前讨论过的 `Image` 对象。由于 `ImageView` 对象是一个 JavaFX `Node` 对象，因此你可以对其应用特效和执行变换。\n\
    \n当使用 `ImageView` 节点应用诸如模糊等特殊效果时，图像的像素数据实际上并未被操作，而是被复制，以便在 `ImageView` 节点上进行计算和显示。当存在多个\
    \ `ImageView` 对象都指向同一个 `Image` 对象时，这是一种非常强大的技术。清单 7-2 演示了如何异步加载图像（后台加载）并将其传递给\
    \ `ImageView` 构造函数。\n\n```\nImage remoteImage = new Image(remoteUrl, true);\n\
    ImageView imageView = new ImageView(remoteImage);\nroot.getChildren().add(imageView);\n\
    清单 7-2.\n在后台加载图像并在 ImageView 节点中显示\n```\n\n默认情况下，`width` 和 `height` 将是图像的实际像素尺寸。\n\
    \n现在你已经了解了如何以编程方式将图像加载并显示到 JavaFX 场景图中，让我们来看一个照片查看器示例应用程序。在下一节中，你将了解如何实现一个照片查看器应用程序，该应用程序允许加载、查看、缩放和旋转图像。\n\
    \n## 照片查看器示例\n\n在 JavaFX 中显示图像的一个实用示例是照片查看器应用程序。此应用程序允许你拖放图像文件或从菜单中加载图像，以便在场景图中查看。图\
    \ 7-1 展示了显示图像的 JavaFX 照片查看器应用程序。图 7-1 还显示了允许用户修改当前图像颜色设置的功能。\n\n![A323804_3_En_7_Fig1_HTML.jpg](img/A323804_3_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1.\n\n显示当前图像的照片查看器应用程序。左侧图像是原始照片，右侧图像进行了颜色调整。\n\n在本节中，你将了解照片查看器的功能以及如何使用该应用程序的说明。一旦你了解了功能和说明，本节将讨论\
    \ UML 类图并对源代码文件进行简要描述。最后，你将获得照片查看器应用程序源代码的详细演练。代码演练将包括应用程序的 GUI 代码、应用程序逻辑和 CSS\
    \ 样式。\n\n在查看 JavaFX 照片查看器应用程序的源代码之前，下一节将简要说明其功能以及如何使用它的说明。\n\n### 功能/说明\n\n照片查看器应用程序的功能如下：\n\
    \n*   **加载图像**：加载具有以下文件格式的图像：`.jpg`、`.gif`、`.png` 和 `.bmp`。用户可以通过“打开”菜单选项加载图像，或者通过将图像从文件系统拖放到应用程序区域来加载。图\
    \ 7-2 显示了用于调出文件选择器的“打开”菜单项。\n\n    ![A323804_3_En_7_Fig2_HTML.jpg](img/A323804_3_En_7_Fig2_HTML.jpg)\n\
    \n    图 7-2.\n\n    打开文件菜单以显示文件选择器，从文件系统加载图像\n*   **进度指示器**：在加载图像时显示进度指示器。图 7-3\
    \ 显示了应用程序加载图像时的进度指示器。\n\n    ![A323804_3_En_7_Fig3_HTML.jpg](img/A323804_3_En_7_Fig3_HTML.jpg)\n\
    \n    图 7-3.\n\n    显示进度指示器，表明应用程序正在加载文件\n*   **旋转图像**：将图像顺时针或逆时针旋转 90 度。图 7-4\
    \ 描绘了将图像旋转 90 度的菜单选项。还有用于旋转图像的键盘快捷键（在 macOS 上是 ➤ 左/右箭头键，在 Windows 和 Linux 操作系统上是\
    \ Ctrl + 左/右箭头键）。\n\n    ![A323804_3_En_7_Fig4_HTML.jpg](img/A323804_3_En_7_Fig4_HTML.jpg)\n\
    \n    图 7-4.\n\n    菜单选项，用于将图像顺时针或逆时针旋转 90 度\n*   **调整图像大小**：在保持宽高比的同时调整图像大小。要调整当前图像的大小，请使用鼠标指针展开应用程序窗口的高度或宽度。\n\
    *   **上一张/下一张图像按钮**：能够使用自定义按钮控件翻阅图像。这允许你查看列表中的上一张和下一张图像，如图 7-5 所示。此外，还可以使用箭头键（左和右）分别查看上一张和下一张图像，作为键盘等效操作。\n\
    \n    ![A323804_3_En_7_Fig5_HTML.jpg](img/A323804_3_En_7_Fig5_HTML.jpg)\n\n  \
    \  图 7-5.\n\n    自定义 UI 控件 `ImageViewButtons` 负责在照片查看器应用程序中查看上一张和下一张图像。自定义控件的源代码文件是\
    \ `ImageViewButtons.java`。\n*   **调整颜色属性**：能够通过更改色相、饱和度、亮度和对比度来调整当前查看图像的颜色。你可以使用“颜色调整”下的菜单选项，如图\
    \ 7-6 所示。此外，你还可以将图像恢复为原始颜色设置。\n\n    ![A323804_3_En_7_Fig6_HTML.jpg](img/A323804_3_En_7_Fig6_HTML.jpg)\n\
    \n    图 7-6.\n\n    “颜色调整”菜单选项允许你更改当前显示图像的颜色属性。最后一个选项允许你将图像恢复为原始颜色设置。\n*   **另存为**：“另存为图像”菜单选项允许你使用不同的文件名保存当前显示的图像，或覆盖其加载时的原始图像。“另存为”选项位于“文件”菜单中。图像将以\
    \ PNG 格式的位图图形文件写入。\n\n### UML：类图\n\n作为设计和类结构，照片查看器应用程序由三个类组成，如图 7-7 中的 UML 类图所示。这三个\
    \ UML 类是 `PhotoViewer`、`ImageViewButtons` 和 `ImageInfo`。主要的 JavaFX 应用程序类 `PhotoViewer`\
    \ 与 `ImageViewButtons` 实例具有一对一的关系。`ImageViewButtons` 类是一个简单的自定义控件，用于管理零到多个 `ImageInfo`\
    \ 对象。基本上，`ImageViewButtons` 实例是一个 UI 控件，具有用于查看上一张和下一张图像的按钮。每个加载到当前图像视图并应用了效果的图像都将有一个关联的\
    \ `ImageInfo` 对象。\n\n![A323804_3_En_7_Fig7_HTML.jpg](img/A323804_3_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7.\n\n照片查看器应用程序的类图。一个 `PhotoViewer` 拥有一个 `ImageViewButtons` 实例。一个 `ImageViewButtons`\
    \ 实例拥有零到多个 `ImageInfo` 对象。\n"
- fmt: '### File Descriptions


    Before going through a detailed walkthrough of the source code, the next section
    briefly describes the four source code files that comprise the Photo Viewer example
    application. The source code of the Photo Viewer example application consists
    of the following three Java class files and one [JavaFX CSS](https://creativecommons.org/licenses/by-sa/3.0/deed.en)
    styling file:


    *   `PhotoViewer.java`

    *   `ImageViewButtons.java`

    *   `ImageInfo.java`

    *   `photo-viewer.css`


    `PhotoViewer.java` is the main JavaFX application that gets launched. Like all
    examples in this book, you will see a `start()` method that receives a stage (`java.stage.Stage`)
    instance from the JavaFX application’s lifecycle. This is where the code begins
    to create UI elements that are placed into the JavaFX scene graph.


    `ImageViewButtons.java` is a simple custom control that manages a list of string
    URLs mapped to image files. An instance of `ImageViewButtons` is a custom UI control,
    as shown earlier in Figure [7-5](#A323804_3_En_7_Chapter.html#Fig5), depicting
    the left and right arrow buttons that allows the users to see the previous image
    and next image.


    `ImageInfo.java` is a plain old Java object (POJO) containing an image’s URL location,
    color adjustments, and rotation information. As each image is loaded it will have
    an associated `ImageInfo` instance. Since the application has only one `ImageView`
    node that is responsible for displaying a single image at a time, each image has
    a referenced instance of an `ImageInfo` that stores settings such as the current
    color adjustments and rotation information. As each image is loaded with the appropriate
    `ImageInfo` object, that then gets applied to the `ImageView` node.


    The `photo-viewer.css` file is a JavaFX CSS styling that is applied to the various
    UI elements in the Photo Viewer application. Primarily, the CSS file has CSS selectors
    to colorize buttons and shapes. This file resides in the project’s resources directory.


    ### Source Code


    In previous editions of this book, the source code example of the Photo Viewer
    application consisted of only one Java class file. As a single file the only advantage
    is the code is in one place. However, being one Java class file, there are many
    disadvantages. One disadvantage that comes to mind is readability, so now the
    one large file is broken out in three separate Java files and one JavaFX CSS file.


    Another notable disadvantage of having things in one Java file is how inflexible
    the code actually is, especially when adding new features to the application.
    In fact, at the end of this chapter, you will learn about a new feature of the
    Photo Viewer application by simply extending the existing application and overriding
    a method. This chapter consists of multiple code listings that are broken out
    in code sections. Each Java class file shows multiple code listings to help describe
    things in more detail.


    #### PhotoViewer.java


    Let’s begin with source code by looking at Listing [7-3](#A323804_3_En_7_Chapter.html#Par64)
    of the Photo Viewer application. It contains the state variables and constants.
    Essentially, this is the top portion of the class and file called `PhotoViewer.java`.


    These variables being used globally will help cut down on the number of parameters
    being passed into private methods. Since the `PhotoViewer` class is the focus
    of the example, it’ll be easier to follow by knowing what are global variables
    versus what are local ones when looking at the code sections.


    ```

    /** Standard Logger. */

    private final static Logger LOGGER = Logger

    .getLogger(PhotoViewer.class.getName());

    /** Current image view display */

    protected ImageView currentViewImage;

    /** Rotation of the image view */

    protected Rotate rotate = new Rotate();

    /** Color adjustment */

    protected ColorAdjust colorAdjust = new ColorAdjust();

    /** A mapping of color adjustment type to a bound slider */

    protected Map sliderLookupMap = new HashMap();

    /** Custom Button panel to view previous and next images */

    protected ImageViewButtons buttonPanel;

    /** Single threaded service for loading an image */

    protected ExecutorService executorService =

    Executors.newSingleThreadScheduledExecutor();

    ... // The rest of PhotoViewer.java

    Listing 7-3.

    The PhotoViewer Class’ State Variables and Constants Declared

    ```


    Listing [7-2](#A323804_3_En_7_Chapter.html#Par36) begins by creating a variable
    named `LOGGER`. It’s a standard logger to assist in outputting debug statements
    into the console. Similar to popular loggers such as Apache log4j, the standard
    Java logger has various log levels also. To provide an equivalent debug log level
    like that of log4j, you use the `Level.FINE` as a log level. To see the other
    log levels, see the Javadoc documentation for details.


    Next is a variable named `currentImageView` (`javafx.scene.image.ImageView`) that
    will represent the main display area of the application to view images. As images
    are loaded, they will be displayed in the `ImageView` node. The `currentImageView`
    variable will be created in the `start()` method. Later, you will see how action
    logic will get attached to the UI elements—but for now we continue discussing
    the other instance variables.


    After declaring the `currentImageView` variable, the `rotate` (`javafx.scene.transform.Rotate`)
    variable is declared and created. It will be used as a rotate transform for the
    `ImageView` node. In other words, the `rotate` variable is responsible for rotating
    the current image in view. As mentioned earlier, each image loaded will have an
    associated `ImageInfo` object containing its rotation angle and that is applied
    to the `rotate` variable. Once the current image’s degrees are applied, the current
    image view node will get rotated automatically.


    Next, the `colorAdjust` variable is created as a `javafx.scene.effect.ColorAdjust`
    instance to allow the users to change the image’s color attributes of the currently
    displayed image. Whenever an image is loaded, an `ImageInfo` instance is created
    with an instance of a `ColorAdjust` object (via `getColorAdjust()` method). Later,
    you will see the code for the method `updateSliders()`, which is responsible for
    updating the menu items that contain sliders and their values. These values bound
    to each slider will represent the hue, saturation, brightness, and contrast levels
    from the `ImageInfo` object’s color adjust property.'
