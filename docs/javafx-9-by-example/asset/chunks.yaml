  trans: '

    ### 图元的拾取


    当您直接与 3D 场景中的单个对象交互时（通常使用鼠标），需要检测鼠标类型事件以及这些事件是否与场景中的某个对象相关。好消息是，3D 场景中的事件处理遵循与传统
    2D GUI 相同的模式。清单 11-6 演示了添加`MouseClicked`事件处理器的代码。


    ```

    /* SimpleScene3D.java */

    //步骤 2a：图元的拾取

    scene.setOnMouseClicked(event-> {

    Node picked = event.getPickResult().getIntersectedNode();

    if(null != picked) {

    double scalar = 2;

    if(picked.getScaleX() > 1)

    scalar = 1;

    picked.setScaleX(scalar);

    picked.setScaleY(scalar);

    picked.setScaleZ(scalar);

    }

    });

    //步骤 2a 结束

    清单 11-6.

    通过鼠标事件平移图元

    ```


    将这一事件处理器添加到运行示例的场景中，会创建一种交互：点击某个 3D 对象会使其尺寸加倍，或将其恢复为正常大小。在每个图元上点击一次，应能看到类似于图 11-6
    的视图。


    ![A323804_3_En_11_Fig6_HTML.jpg](img/A323804_3_En_11_Fig6_HTML.jpg)


    图 11-6.


    在三个轴上均被放大的 3D 对象


    这里的技巧在于判断`MouseEvent`是否与场景中的某个 3D 对象同时发生。关键代码行是：


    ```

    Node picked = event.getPickResult().getIntersectedNode();

    ```


    其中`MouseEvent`返回一个`PickResult`。用 3D 术语来说，`PickResult`是对 X、Y 屏幕坐标与 X、Y、Z 3D 场景坐标进行相交测试的结果。虽然`PickResults`在
    JavaFX 2 中就已可用于 2D GUI 组件，但在 JavaFX 9 中，它们不仅在 3D 空间中有效，而且可以作为各种事件中易于访问的对象。与所有`MouseEvent`类型一样，可以查询事件以获取`PickResult`。如果发生了`PickResult`，那么`getIntersectedNode()`将返回被“拾取”的场景对象的
    Node 对象表示。如果没有对象被“拾取”，则`getIntersectedNode()`返回`null`。


    注意


    不要忘记在三个轴上均匀缩放对象，如清单 11-6 所示。否则，您的对象会很快以奇怪的方式被拉伸。


    ### 使用键盘进行第一人称移动


    在 3D 场景中导航的一种便捷方式是通过第一人称视角“飞行穿越”。这通常通过鼠标和键盘的组合来实现：键盘控制 X 轴和 Z 轴移动，鼠标控制摄像机旋转。这是此类游戏以及模拟和战术显示中的典型设置。


    要为 3D 场景添加键盘导航，只需添加标准的 JavaFX 按键事件处理器即可。清单 11-7 中的代码是一个简单的`OnKeyPressed`事件处理器示例，它提供了前面描述的
    X 轴和 Z 轴导航。该处理器产生的移动会通过 3D 场景平移摄像机节点本身。


    ```

    /* SimpleScene3D.java */

    //步骤 2b：添加移动键盘处理器

    scene.setOnKeyPressed(event -> {

    double change = cameraQuantity;

    //添加 Shift 修饰键以模拟“奔跑速度”

    if(event.isShiftDown()) {

    change = cameraModifier;

    }

    //用户按下了哪个键？

    KeyCode keycode = event.getCode();

    //步骤 2c：添加缩放控制

    if(keycode == KeyCode.W) {

    camera.setTranslateZ(camera.getTranslateZ() + change);

    }

    if(keycode == KeyCode.S) {

    camera.setTranslateZ(camera.getTranslateZ() - change);

    }

    //步骤 2d：添加平移控制

    if(keycode == KeyCode.A) {

    camera.setTranslateX(camera.getTranslateX() - change);

    }

    if(keycode == KeyCode.D) {

    camera.setTranslateX(camera.getTranslateX() + change);

    }

    });

    //步骤 2b-d 结束

    清单 11-7.

    一个简单的第一人称移动键盘事件处理器

    ```


    分析这段代码片段，您会发现 JavaFX 使其变得非常简单直接。将事件处理器添加到场景中，与将事件处理器添加到任何传统 2D GUI 组件的方式相同，如`scene.setOnKeyPressed(event
    -> {`所示。


    添加复合事件处理（例如，按住 Shift 键的同时按下另一个键）通过事件对象本身即可轻松实现。在清单 11-7 中，这是通过`event.isShiftDown()`完成的，它返回一个简单的布尔值来表示真伪。这些额外的元键无论实际发生什么事件，其值都为
    true 或 false，并且无论事件是键盘、鼠标甚至触摸事件，都可以使用。


    在决定摄像机移动方向时，只需从事件中获取`KeyCode`：


    ```

    KeyCode keycode = event.getCode();

    ```


    并通过简单的相等性检查来分支逻辑：


    ```

    if(keycode == KeyCode.W) {

    camera.setTranslateZ(camera.getTranslateZ() + change);

    }

    ```


    `KeyCode.W`是`KeyCode enum`的一部分，该枚举通过`Comparable`接口提供了每一个可能的按键。这对于为任何应用程序构建复杂的界面来说非常方便。

    '
- fmt: '### First Person Camera Movement Using the Mouse


    The previous keyboard handler example provided half of a first-person perspective
    where you “fly through” your 3D scene. The keyboard is used to slide along the
    X- and Z-axes. What is happening is the `PerspecitveCamera` node is translating
    along those axes. However, the previous example limits these translations to a
    single plane. To simulate looking around, the “head on a swivel” effect, you need
    to use the mouse.


    To add mouse control of the camera swivel for a 3D scene, you must simply add
    a JavaFX `MouseMoved` event handler. The code in Listing [11-8](#A323804_3_En_11_Chapter.html#Par71)
    is a rudimentary example of an `OnMouseMoved` event handler and some basic trigonometry
    that swivels the camera node. The movement produced by this handler rotates the
    Camera node itself on the Y- and X-axes.


    ```

    /* SimpleScene3D.java */

    //Step 3:  Add a Camera Control Mouse Event handler

    scene.setOnMouseMoved(event -> {

    //acquire the new Mouse coordinates from the recent event

    double mouseYnew = event.getSceneY();

    double mouseXnew = event.getSceneX();

    //Find the deltas for our Trig formula

    double atan2Y = mouseYnew - mouseYold;

    double atan2X = mouseXnew - mouseXold;

    //Build the new Rotate objects

    Rotate xRotate = new Rotate();

    Rotate yRotate = new Rotate();

    //Only compute when there is a change

    if(mouseYnew != mouseYold) {

    //When looking up or down we should rotate on the X-AXIS

    camera.setRotationAxis(Rotate.X_AXIS);

    //calculate the rotational change of the camera pitch

    double pitchRotate = camera.getRotate() + (Math.atan2(atan2Y,atan2X) / rotateModifier);

    //set min/max camera pitch to prevent camera flipping

    pitchRotate = pitchRotate > cameraYlimit ? cameraYlimit : pitchRotate;

    pitchRotate = pitchRotate < -cameraYlimit ? -cameraYlimit : pitchRotate;

    //replace the old camera pitch rotation with the new one.

    //camera.setRotate(pitchRotate);  //This doesn''t work when a second rotation
    call is made

    xRotate = new Rotate(pitchRotate,Rotate.X_AXIS);

    }

    if(mouseXnew != mouseXold) {

    //When looking left or right we should rotate on the Y-AXIS

    camera.setRotationAxis(Rotate.Y_AXIS);

    //calculate the rotational change of the camera yaw

    double yawRotate = camera.getRotate() + (Math.atan2(atan2X,atan2Y) / rotateModifier);

    //camera.setRotate(yawRotate);  //this would replace the previous X-AXIS rotation

    yRotate = new Rotate(yawRotate, Rotate.Y_AXIS);

    }

    //Apply the combined rotations

    camera.getTransforms().addAll(xRotate,yRotate);

    mouseXold = mouseXnew;

    mouseYold = mouseYnew;

    });

    //End Step 3

    Listing 11-8.

    A Simple First-Person Camera Rotate Control MouseEvent Handler

    ```


    This code snippet is by far the single largest addition made so far to the running
    example; however, most of it is needed to facilitate a smooth swivel feel for
    the camera node. You will see that some trigonometric functions are used to calculate
    rotations and this can get tricky quick.


    These rotations are applied in an alternative manner than previously in this running
    example. Before covering the details of how to rotate the camera, let’s examine
    the mouse event handling itself:


    ```

    scene.setOnMouseMoved(event -> {

    ```


    JavaFX 3D makes adding a `MouseEvent` handler to the scene very simple and straightforward.
    Like all input events, we can acquire the X and Y coordinates from the `MouseEvent`.
    The goal here is to convert the change of mouse position to a rotation for the
    camera. You can accomplish this with a little trigonometry:


    ```

    double atan2Y = mouseYnew - mouseYold;

    double pitchRotate = camera.getRotate() + (Math.atan2(atan2Y,atan2X) / rotateModifier);

    ```


    This is a very rudimentary method for doing this. Most high-performance first-person
    games and interactive environments use more exotic calculations and include the
    many corner cases that tend to occur from use. One of these corner cases is vertical
    rotation beyond 180 degrees. Left alone, the camera would spin without limit vertically
    sometimes referred to as “somersaults” or “camera whip.” Found in Listing [11-8](#A323804_3_En_11_Chapter.html#Par71)
    are the following lines of code that will effectively limit camera rotation on
    the X-axis, which visually appears to be the Y-axis:


    ```

    pitchRotate = pitchRotate > cameraYlimit ? cameraYlimit : pitchRotate;

    pitchRotate = pitchRotate < -cameraYlimit ? -cameraYlimit : pitchRotate;

    ```


    **Note**


    Remember dealing with what a camera “sees” is opposite from how the camera is
    positioned within the scene. For example “looking up” along the Y-axis is actually
    a rotation on the X-axis.


    Finally, when dealing with multiple repeated transformations, especially rotations,
    a better way to apply these transformation to an object is using the object’s
    `getTransforms().addAll()` method like so:


    ```

    camera.getTransforms().addAll(xRotate,yRotate);

    ```


    This will guarantee that all your rotate, translate, and scale transformations
    are applied as a composite transformation. If you were to call `setRotate` or
    `setTranslate` multiple times for each rotation, each subsequent `setRotate` call
    would replace the previous one. The end result would be a rotation or translation
    that is equal only to the last transformation called in sequence.


