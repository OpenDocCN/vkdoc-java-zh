    ### 代码解释


    图 4-2（前面已展示）描绘了一个猫领域模型的 UML 类图。在顶层，你会注意到接口`Roarable`、`Cat`、`Purrable`和`Meowler`。这些接口为任何想要挑选和组合（mixin）公共行为的派生类提供了行为。


    具体的实现类是`Lion`、`Tiger`、`Cheetah`和`HouseCat`。你会注意到主接口`Cat`包含了抽象方法`getCatKind()`和`getFurDescription()`，以及默认方法`walk()`、`eat()`和`sleep()`。像往常一样，Java
    编译器会强制实现`Cat`接口的类实现抽象方法`getCatKind()`和`getFurDescription()`。


    `Cat`接口上的默认方法具有实现代码，这些代码作为所有猫的功能。这些默认方法将为`Cat`接口提供行为，同时集中所有派生类的功能（实现）。我创建了空的（标记）接口`Roarable`、`Purrable`和`Meowler`，它们分别包含默认方法`roar()`、`purr()`和`meow()`。这些接口类似于
