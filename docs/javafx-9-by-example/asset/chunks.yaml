    ### 创建后台任务


    JavaFX API 可以在后台线程上执行工作，这些工作被称为任务（`javafx.concurrent.Task`）。这些任务是一次性的，会在某个线程上执行。`Task`
    类是 Java 并发库中 `Runnable` 和 `Future` 接口的子类。


    Java Future 的优点是能够在执行代码时提供异步行为。换句话说，当你执行任务时，它不会阻塞。当使用 `ExecutorService` 的 `submit()`
    方法时，会向调用者返回一个 future 对象。可以定期检查该 future 对象，以确定任务是否完成或是否发生错误。清单 6-30 展示了一个为执行任务而创建的简单线程池。


    ```

    Task worker = new Task() {

    @Override

    protected Boolean call() throws Exception {

    for (int i=0; i<100; i++) {

    // 一些繁重的工作（不在 UI 线程上）

    updateMessage("进度文本");

    updateProgress(i, 100);

    }

    return true;

    }

    };

    ExecutorService threadPool = threadPool = Executors.newFixedThreadPool(2);

    Future future = threadPool.submit(worker);

    清单 6-30.

    为执行工作线程任务而创建的线程池

    ```


    你注意到清单 6-30 中的 `call()` 方法包含两个方法——`updateMessage()` 和 `updateProgress()` 了吗？这些方法通过更新当前运行任务的状态或进度信息来提供帮助。接下来，你将看到一个示例应用程序，它将模拟一个显示文件复制进度的对话框窗口。


    ### 示例：文件复制进度对话框（后台进程）


    为了演示一个生成后台进程同时向用户提供反馈的 GUI 应用程序，我创建了一个示例应用程序，它模拟了一个可视化显示多个文件复制进度的对话框窗口。图 6-20
    从左到右描绘了一个进度条和一个进度指示器（饼图）。进度指示器在指示图标下方显示一个百分比。当进程仍在执行时，用户可以单击“取消”按钮来取消或终止任务。


    ![A323804_3_En_6_Fig20_HTML.jpg](img/A323804_3_En_6_Fig20_HTML.jpg)


    图 6-20.


    一个模拟文件复制过程的窗口，使用进度条和进度指示器向用户提供反馈


    以下是此示例中使用的主要类：


    *   `javafx.scene.control.ProgressBar`

    *   `javafx.scene.control.ProgressIndicator`

    *   `javafx.concurrent.Task`


    清单 6-31 展示了一个代码示例，该示例使用 JavaFX 的进度条和进度指示器 UI 控件，在复制文件时向用户提供反馈。


    ```

    public class BackgroundProcesses extends Application {

    static Task copyWorker;

    final int numFiles = 30;

    private ExecutorService threadPool;

    /**

    * @param args the command line arguments

    */

    public static void main(String[] args) {

    Application.launch(args);

    }

    @Override

    public void init() throws Exception {

    super.init();

    threadPool = Executors.newFixedThreadPool(1);

    }

    @Override

    public void stop() throws Exception {

    super.stop();

    threadPool.shutdown();

    }

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("BackgroundProcesses: 后台进程");

    Group root = new Group();

    Scene scene = new Scene(root, 330, 120, Color.WHITE);

    BorderPane mainPane = new BorderPane();

    mainPane.layoutXProperty()

    .bind(scene.widthProperty()

    .subtract(mainPane.widthProperty())

    .divide(2));

    root.getChildren().add(mainPane);

    Label label = new Label("文件传输:");

    ProgressBar progressBar = new ProgressBar(0);

    ProgressIndicator progressIndicator = new ProgressIndicator(0);

    HBox hb = new HBox();

    hb.setSpacing(5);

    hb.setAlignment(Pos.CENTER);

    hb.getChildren().addAll(label, progressBar, progressIndicator);

    mainPane.setTop(hb);

    Button startButton = new Button("开始");

    Button cancelButton = new Button("取消");

    TextArea textArea = new TextArea();

    textArea.setEditable(false);

    textArea.setPrefSize(200, 70);

    HBox hb2 = new HBox();

    hb2.setSpacing(5);

    hb2.setAlignment(Pos.CENTER);

    hb2.getChildren().addAll(startButton, cancelButton, textArea);

    mainPane.setBottom(hb2);

    // 连接开始按钮

    startButton.setOnAction((ActionEvent event) -> {

    startButton.setDisable(true);

    progressBar.setProgress(0);

    progressIndicator.setProgress(0);

    textArea.setText("");

    cancelButton.setDisable(false);

    copyWorker = createWorker(numFiles);

    // 连接进度条

    progressBar.progressProperty().unbind();

    progressBar.progressProperty().bind(copyWorker.progressProperty());

    progressIndicator.progressProperty().unbind();

    progressIndicator.progressProperty().bind(copyWorker.progressProperty());

    // 追加到文本框

    copyWorker.messageProperty()

    .addListener((observable, oldValue, newValue) ->

    textArea.appendText(newValue + "\n")

    );

    threadPool.submit(copyWorker);

    });

    // 取消按钮将终止工作线程并重置。

    cancelButton.setOnAction((ActionEvent event) -> {

    startButton.setDisable(false);

    cancelButton.setDisable(true);

    copyWorker.cancel(true);

    // 重置

    progressBar.progressProperty().unbind();

    progressBar.setProgress(0);

    progressIndicator.progressProperty().unbind();

    progressIndicator.setProgress(0);

    textArea.appendText("文件传输已被取消。");

    });

    cancelButton.setDisable(true);

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    private Task createWorker(final int numFiles) {

    return new Task() {

    @Override

    protected Boolean call() throws Exception {

    for (int i = 0; i < numFiles; i++) {

    long elapsedTime = System.currentTimeMillis();

    copyFile("某个文件", "某个目标文件");

    elapsedTime = System.currentTimeMillis() - elapsedTime;

    String status = elapsedTime + " 毫秒";

    // 排队更新状态

    updateMessage(status);

    updateProgress(i + 1, numFiles); // (进度, 最大值)

    }

    return true;

    }

    };

    }

    private void copyFile(String src, String dest) throws InterruptedException {

    // 模拟长时间操作

    Random rnd = new Random(System.currentTimeMillis());

    long millis = rnd.nextInt(1000);

    Thread.sleep(millis);

    }

    }

    清单 6-31.

    一个演示后台进程的示例应用程序

    ```

    '
- fmt: '### How It Works


    The code in Listing [6-31](#A323804_3_En_6_Chapter.html#Par232) begins by creating
    not one but two progress controls to show the user the work being done. Next,
    the code creates a worker thread via the private `createWorker()` method. The
    `createWorker()` convenience method instantiates and returns a `javafx.concurrent.Task`
    object, which is similar to the Java Swing’s `SwingWorker` class. Unlike the `SwingWorker`
    class, the `Task` object is greatly simplified and easier to use, thanks to its
    event-driven design. An example is a `Task` object’s ability to update progress
    asynchronously.


    When creating an instance of a `Task` object, the code implements the `call()`
    method to do work in the background. As the work is being done, you will often
    want to queue up intermediate results such as progress or text information to
    provide feedback to the user. To queue information, the API allows you to call
    the `updateProgress()` or `updateMessage()` methods. These methods update information
    in a thread-safe way so that the observer of the progress properties can update
    the GUI safely without blocking the GUI thread. Listing [6-32](#A323804_3_En_6_Chapter.html#Par235)
    queues up messages and shows the progress.


    ```

    // queue up status

    updateMessage(status);

    updateProgress(i + 1, numFiles); // (progress, max progress)

    Listing 6-32.

    The Text Messages and Progress Updated Without Blocking the Progress UI Controls

    ```


    After creating a worker task, the code unbinds any old tasks bound to the progress
    controls. Once the progress controls are unbound, the code then binds the progress
    controls to a newly created `Task` object named `copyWorker`. Listing [6-33](#A323804_3_En_6_Chapter.html#Par237)
    rebinds a new `Task` object to the progress UI controls.


    ```

    // wire up progress bar

    progressBar.progressProperty().unbind();

    progressBar.progressProperty().bind(copyWorker.progressProperty());

    progressIndicator.progressProperty().unbind();

    progressIndicator.progressProperty().bind(copyWorker.progressProperty());

    Listing 6-33.

    After a Task Is Used, the Progress Controls Will Need to Rebind to a New Task

    ```


    Moving on, notice that the code implementing a `ChangeListener` to append the
    queued results into the `TextArea` control. Another remarkable thing about JavaFX
    properties is that you can attach many listeners similar to Java Swing components.
    Finally, the worker and controls are all wired up to spawn a thread to go off
    in the background. The following code line shows the launching of a `Task` worker.


    ```

    new Thread(copyWorker).start();

    ```


    This code finishes by wiring up the Cancel button. This button simply calls the
    `Task` object’s `cancel()` method to kill the process. Once the task is cancelled,
    the progress controls are reset. Once a worker task is cancelled, it cannot be
    reused. That is why the Start button re-creates a new task. If you want a more
    robust reusable solution, look at the `javafx.concurrent.Service` class.


    ## Summary


    You began this chapter with learning about labels and custom fonts, such as the
    use of the third-party library `FontAwesomeFX`. After learning about labels, you
    got a chance to delve deep into various button controls with a fun example that
    animates game sprites.


    After learning common button controls, you learned how to create standard menus
    and menu bars. By creating menus, you were able to learn to create handler code
    to respond to the selection of menu items. You were then able to map key combinations
    or keyboard shortcuts to menu options. You learned how to create context menus
    invoked by right-clicking on the Scene graph. With the many ways to create menus
    and menu items, you got a chance to run an example program that simulated a security
    alarm application.


    Finally, you were exposed to `ObservableList` collections, which support the display
    of UI controls such as the `ListView` and `TableView` nodes. By learning about
    the UI controls `ListView` and `TableView`, you got a chance to use domain objects
    to populate list cells and table column cells. You also learned how to make a
    table view cell column editable using a text field and a combo box.


    Lastly, you learned about JavaFX’s `Task` API, which enables you to execute code
    asynchronously while updating the status of the task. You also learned to bind
    a task to progress type controls `ProgressBar` and `ProgressIndicator`. With `ProgressBar`s
    and `ProgressIndicator`s, you were able to run an example that simulates background
    worker threads copying files and updating the progress.


    # 7. Graphics


    Have you ever heard someone say, “When two worlds collide”? This expression is
    used when a person from a different background or culture is put in a situation
    where they are at odds and must face very hard decisions. When building GUI applications
    needing graphics or animations, we are often on a collision course between business
    and gaming worlds. In other words, when developing applications, it’s nice to
    strike a good balance of having UI aspects from business applications and video
    game-like effects.


    In the ever-changing world of rich Internet applications (RIA), you probably have
    noticed an increased use of animations such as pulsing buttons, transitions, moving
    backgrounds, and so on. GUI applications can use animations to provide visual
    cues to let the user know what to do next. With JavaFX, you will be able to have
    the best of both worlds, creating appealing graphics as well as form-based applications
    handling business transactions.


    In this chapter, you will learn about the basics of JavaFX graphics such as displaying
    and manipulating images. Also, in this chapter you will learn high-level animation
    APIs. Fasten your seatbelts; you’ll discover solutions to integrate cool game-like
    interfaces into everyday applications.


    In this chapter, you’ll learn about the following:


    - Loading and displaying images

    - Background tasks

    - Progress indicators

    - Altering color settings on images

    - Writing bitmapped images to disk

    - Dragging and dropping image files

    - Animation using key values, keyframes, and timelines

    - Animation transition classes

    - Sequential and parallel transitions


    ## Working with Images


    Yet another powerful capability in JavaFX is the ability to display standard image
    file formats on the scene graph. In this section, you learn how to load, display,
    scale, and rotate images. As a bonus, you’ll also learn how to easily alter an
    image’s color attributes such as its hue, saturation, brightness, and contrast.


    After learning about the basics of the JavaFX `Image` and `ImageView` APIs, you
    will get to explore an example of a Photo Viewer application. This fun application
    allows you to scale, rotate, and manipulate images.'
