  trans: '

    #### Red Hat 替代方案


    在系统上安装 JDK 9 后，你可能会遇到之前安装的其他 Java 版本。基于 Red Hat/CentOS 的操作系统提供了一种在 JDK 和 JRE 之间切换的方法。由于你已将
    JDK 9 安装在 `/opt/jdk` 目录中，你需要使用 `alternatives` 将新的 JDK 9 注册为默认 Java。


    首先，让我们在 `alternatives` 中注册新安装的 Java 可执行文件。你需要输入以下命令。这些命令将更新所有索引，以优先级 `100` 注册
    Java，并显示所有已安装的已注册 Java 运行时。


    ```

    $ sudo update

    $ sudo alternatives --install /usr/bin/java java /opt/jdk/jdk-9/bin/java 100

    ```


    接下来，你需要设置刚刚添加的默认 Java 版本。


    ```

    $ sudo alternatives --config java

    There are 3 programs which provide ''java''.

    Selection    Command


    * 1          /opt/jdk/jdk1.8.0_51/bin/java

    + 2          /opt/jdk/jdk1.8.0_66/bin/java

    3          /opt/jdk/jdk-9/bin/java

    Enter to keep the current selection[+], or type selection number: 3

    ```


    要测试 `alternatives` 是否指向了正确的版本，只需在终端窗口中输入以下内容：


    ```

    $ java -version

    ```


    输出如下：


    ```

    java version "1.9.0-ea"

    Java(TM) SE Runtime Environment (build 1.9.0-ea-b90)

    Java HotSpot(TM) 64-Bit Server VM (build 1.9.0-ea-b90, mixed mode)

    ```


    你还需要为 `javac` 编译器配置替代方案，执行与之前类似的步骤。


    ```

    $ sudo alternatives --install /usr/bin/javac javac /opt/jdk/jdk-9/bin/javac 100

    $ sudo alternatives --config javac

    There are 3 programs which provide ''javac''.

    Selection    Command


    * 1          /opt/jdk/jdk1.8.0_51/bin/javac

    + 2          /opt/jdk/jdk1.8.0_66/bin/javac

    3          /opt/jdk/jdk-9/bin/javac

    ```


    要测试 `alternatives` 是否指向了正确的 Java 编译器版本，只需输入以下内容：


    ```

    $ javac -version

    javac 1.9.0-ea

    ```


    #### Ubuntu/Debian


    当使用 Ubuntu 或 Debian Linux 时，你可以通过两种方式获取 Oracle 的 Java JDK。第一种方式是使用 `apt-get` 命令，第二种方式是从前面提到的官方网站下载
    JDK。


    使用 Ubuntu 或 Debian，你可以使用 `apt-get` 命令下载并安装 Oracle 的官方 JDK 9：


    ```

    $ sudo apt-get update

    $ sudo apt-get install oracle-java9-installer

    ```


    从 Oracle 下载站点下载 Linux 版本后，你可以手动解压 `gz` 文件。对于 Ubuntu/Debian Linux 发行版，打开终端并输入以下命令：


    ```

    $ mv ∼/Downloads/jdk-9-linux-x64.tar.gz /tmp

    $ cd /tmp

    $ tar zxvf jdk-9-linux-x64.tar.gz

    $ sudo mv jdk-9 /usr/lib/jvm/

    ```


    在 Ubuntu/Debian 系统上安装 JDK 9 后，你可能会遇到之前安装的其他 Java 版本。基于 Ubuntu/Debian 的操作系统提供了一种通过名为
    `update-alternatives` 的工具在 JDK 和 JRE 之间切换的方法。假设你已使用 `apt-get` 安装了 JDK 9，它通常会将
    JDK 放在 `/usr/lib/jvm` 目录中。现在，你需要使用 `alternatives` 来注册新的 JDK 9（`java` 和 `javac`）。


    ##### 默认 Java


    输入以下命令在 `alternatives` 中注册新的 JDK：


    ```

    $ sudo update

    $ sudo update-alternatives --install /usr/bin/java java /usr/lib/jvm/jdk-9-linux-x64/bin/java
    100

    ```


    接下来，你需要将新注册的 `java` 设置为默认版本。输入以下命令：


    ```

    $ sudo update-alternatives --config java

    There are 2 choices for the alternative java (providing /usr/bin/java).

    Selection    Path                                      Priority   Status


    * 0            /usr/lib/jvm/java-8-openjdk/jre/bin/java  1061       auto mode

    1            /usr/lib/jvm/java-9-oracle/bin/java       100        manual mode

    Press enter to keep the current choice[*], or type selection number: 1

    $ sudo update-alternatives --display java

    Selection    Path                                       Priority   Status


    0            /usr/lib/jvm/java-8-openjdk/jre/bin/java   1061       auto mode

    * 1            /usr/lib/jvm/java-9-oracle/bin/java        100        manual mode

    ```


    ##### 默认 Javac


    你还需要切换 `javac` 编译器。要设置 Java 编译器，输入以下命令来注册新的 `javac`：


    ```

    $ sudo update-alternatives --install /usr/bin/javac javac /usr/lib/jvm/jdk-9-linux-x64/bin/javac
    100

    $ sudo update-alternatives --config javac

    There are 2 choices for the alternative javac (providing /usr/bin/javac).

    Selection    Path                                    Priority   Status


    * 0            /usr/lib/jvm/java-8-openjdk/bin/javac   1061       auto mode

    1            /usr/lib/jvm/java-9-oracle/bin/javac    100        manual mode

    Press enter to keep the current choice[*], or type selection number: 1

    $ sudo update-alternatives --config javac

    There are 2 choices for the alternative javac (providing /usr/bin/javac).

    Selection    Path                                    Priority   Status


    0            /usr/lib/jvm/java-8-openjdk/bin/javac   1061       auto mode

    * 1            /usr/lib/jvm/java-9-oracle/bin/javac    100        manual mode

    ```

    '
- fmt: "# Setting Environment Variables\n\nIf you aren’t using the conveniences of\
    \ `aternatives` to point to your default Java binaries, you can do it the old\
    \ fashioned way, by setting up Java environment variables. There are other strategies\
    \ to easily switch Java versions that I’ve not mentioned in this chapter, but\
    \ understanding Java’s environmental variables will allow you to install and develop\
    \ Java applications on any operating system.\n\nTo get started you need to set\
    \ and update a couple of important environment variables. How you set them and\
    \ the values they should be set to vary depending on your choice of operating\
    \ system. The two variables to set are the following:\n\n- `JAVA_HOME`: Tells\
    \ your operating system where the Java installation directory lives.\n- `PATH`:\
    \ Specifies where the Java executable directory resides. This environment variable\
    \ lets the system search paths or directories containing executable files. Java\
    \ executables reside in the `bin` directory under the `JAVA_HOME` home directory.\n\
    \nThe following are the environment variables to set in the 32-bit Windows operating\
    \ system:\n\n```\nset JAVA_HOME=\"C:\\Program Files (x86)\\Java\\jdk-9\"\nset\
    \ PATH=%JAVA_HOME%\\bin;%PATH%\n```\n\nSet the same variables in 64-bit Windows,\
    \ but the values are slightly different:\n\n```\nset JAVA_HOME=\"C:\\Program Files\\\
    Java\\jdk-9\"\nset PATH=%JAVA_HOME%\\bin;%PATH%\n```\n\n**Note:** Depending on\
    \ the version of the JDK the `JAVA_HOME` path, the name will change according\
    \ to the version that was installed. For example, if the next version is named\
    \ JDK 9.0.1, the path would likely appear as `JAVA_HOME=\"C:\\Program Files\\\
    Java\\jdk-9.0.1\"`. To see Java 9’s JDK and JRE version naming scheme, go to the\
    \ following links:\n\n[`http://openjdk.java.net/jeps/223`](http://openjdk.java.net/jeps/223)\
    \ and  \n[`https://blogs.oracle.com/java-platform-group/a-new-jdk-9-version-string-scheme`](https://blogs.oracle.com/java-platform-group/a-new-jdk-9-version-string-scheme).\n\
    \nOn Unix-like platforms such as MacOS X and Linux, your settings and how you\
    \ make them depend on which shell you are using. The following examples show you\
    \ how to set the needed variables for Bash, Bourne, and CSH shells, respectively.\n\
    \n```\n# Mac OS X /bin/bash\nexport JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-9.jdk/Contents/Home\n\
    export PATH=$PATH:$JAVA_HOME/bin\n# Linux bash, bourne shell environments /bin/bash\n\
    export JAVA_HOME=/usr/java/jdk-9 export PATH=$PATH:$JAVA_HOME/bin\n#csh environments\
    \ /bin/csh\nsetenv JAVA_HOME /usr/java/jdk-9\nsetenv PATH ${JAVA_HOME}/bin:${PATH}\n\
    ```\n\nThese statements will set environment variables temporarily for the current\
    \ terminal window session. To make `JAVA_HOME` and `PATH` more permanent, you\
    \ will want to add them to your system upon logon such that they are always made\
    \ available whenever you boot or log in. Depending on your operating system, you\
    \ will need to be able to edit environment variable names and values.\n\n## Setup\
    \ Windows Environment Variables\n\nIn the Windows environment you can use the\
    \ keyboard shortcut Windows logo key+Pause/Break key, and then click the Advanced\
    \ system settings (link on the left side) to display the Systems Properties window,\
    \ as shown in Figure 1-12.\n\n![A323804_3_En_1_Fig12_HTML.jpg](A323804_3_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12. The System Properties window\n\nNext, click the Environment Variables\
    \ button. At this point you can add, edit, and delete environment variables. You\
    \ will add or edit the `JAVA_HOME` environment variable by using the installed\
    \ home directory as the value. The Environment Variables window on the Windows\
    \ operating system is shown in Figure 1-13.\n\n![A323804_3_En_1_Fig13_HTML.jpg](A323804_3_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13. Windows Environment Variables window\n\nTo add the `JAVA_HOME`\
    \ environment variable, click on the New button shown in Figure 1-13.\n\nAfter\
    \ you click the New button, the window in Figure 1-14 appears and allows you to\
    \ enter the environment variable name and value. When you’re done, click on the\
    \ OK button.\n\n![A323804_3_En_1_Fig14_HTML.jpg](A323804_3_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14. The Add/Edit window to enter the JAVA_HOME environment variable\n\
    \nAfter you’ve clicked on OK to add `JAVA_HOME`, you will need to update the `Path`\
    \ environment variable, as shown in Figure 1-15. Select the `Path` environment\
    \ variable in the System Variables area. Next, click on the Edit button.\n\n![A323804_3_En_1_Fig15_HTML.jpg](A323804_3_En_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15. Editing the Path environment variable\n\nIn Windows 10, you need\
    \ to edit the `Path` environment variable by adding a new entry, as shown in Figure\
    \ 1-16. Here you will add an entry such as `%JAVA_HOME%\\bin`. To add the entry,\
