    ( [`https://github.com/AdamBien/afterburner.fx`](https://github.com/AdamBien/afterburner.fx)
    ). A `NavigationDrawer` control is also created and registered. Figure [13-8](#A323804_3_En_13_Chapter.html#Fig8)
    shows this layer when you run the project.


