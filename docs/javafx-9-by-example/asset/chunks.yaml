    *   Oracle 关于 JavaFX 的论坛：[`https://community.oracle.com/community/developer/english/java/javafx/javafx_2.0_and_later`](https://community.oracle.com/community/developer/english/java/javafx/javafx_2.0_and_later)


    ## 应用程序


    以下许多链接都是使用 JavaFX 平台编写的丰富 GUI 应用程序。


    *   20 个 JavaFX 真实世界应用程序，Dirk Lemmermann 和 Alexander Casall：[`https://jaxenter.com/20-javafx-real-world-applications-123653.html`](https://jaxenter.com/20-javafx-real-world-applications-123653.html)
    Dirk Lemmermann：`@dlemmermann` Alexander Casall：`@sialcasa`

    *   FXDesktopSearch，Mirko Sertic：一个基于 Java 和 JavaFX 的桌面搜索应用程序。它会爬取配置好的目录集，并允许你使用不同的语言支持进行全文搜索：[`https://github.com/mirkosertic/FXDesktopSearch`](https://github.com/mirkosertic/FXDesktopSearch)
    Twitter：`@mirkosertic`

    *   Picmodo（由 Jens Deter 创立）：一个基于 JavaFX 的图片数据库应用程序：[`http://www.jensd.de/wordpress/?page_id=22`](http://www.jensd.de/wordpress/?page_id=22)
    Twitter：`@Jerady`

    *   Michael Hoffer 的 VWorkflows：一个科学可视化工具：[`https://github.com/miho/VWorkflows`](https://github.com/miho/VWorkflows)
    `:` [`http://mihosoft.eu`](http://mihosoft.eu) Twitter：`@mihosoft`

    *   eteoBoard：交互式数字任务板。一个基于触摸和手势的团队协作应用工具：[`http://www.eteoboard.de`](http://www.eteoboard.de)
    [`http://www.saxsys.de`](http://www.saxsys.de)

    *   PiDome 客户端，John Sirach：PiDome 是一个为 Raspberry Pi 开发的开源家庭自动化平台，将其打造成一个完整的家庭自动化解决方案。[`https://pidome.org`](https://pidome.org)
    Twitter：`@Pi_Dome`

    *   FlexGanttFX：飞机/航班调度应用程序，作者 Dirk Lemmermann，`@dlemmermann`：[`http://www.dlsc.com`](http://www.dlsc.com)
    [`https://www.youtube.com/channel/UCFyRQ_euxxPDwlqyhff-x0Q`](https://www.youtube.com/channel/UCFyRQ_euxxPDwlqyhff-x0Q)

    *   BaufiFX，Thomas Bolz：一个家庭财务计算器：[`http://www.baufifx.de`](http://www.baufifx.de)

    *   SnapCode 是一个用于教育、娱乐和企业的 IDE 和 RAD 工具。Report Mill Software：[`http://www.reportmill.com/snap`](http://www.reportmill.com/snap)

    *   Modellus 是一个免费应用程序，使学生和教师（高中和大学）能够使用数学来交互式地创建或探索模型。Modellus 由 Vitor Duarte
    Teodoro、João Paulo Duque Vieira 和 Pedro Duque Vieira 开发：[`http://modellus.co/index.php/en`](http://modellus.co/index.php/en)

    *   Christoph Nahr 的 MIME Browser 是一个紧凑的 JavaFX 桌面应用程序，用于浏览本地存储在标准 EML 文件中的 MIME
    消息：[`http://kynosarges.org/MimeBrowser.html`](http://kynosarges.org/MimeBrowser.html)

    *   Adam Carroll 的 Vocab Hunter：VocabHunter 是一个帮助外语学习者的系统：GitHub：[`https://vocabhunter.github.io`](https://vocabhunter.github.io)
    Twitter：`@vocabhunterapp`

    *   Carl Antaki 的 Bloom Uploader。Bloom 是一个桌面应用程序，让你可以轻松高效地将照片和视频上传到 Facebook、下载相册、查看你的照片以及部分好友的照片：视频：[`http://bloomuploader.com`](http://bloomuploader.com)
    Twitter：`@carcour`

    *   Rahman USTA 的 AsciidocFX：Asciidoc FX 是一个书籍/文档编辑器，用于构建 PDF、Epub、Mobi 和 HTML
    书籍、文档和幻灯片。AsciidocFX 也是 2015 年 Duke''s Choice Award 的获奖者：[`https://github.com/asciidocfx/AsciidocFX`](https://github.com/asciidocfx/AsciidocFX)
    Twitter：`@ustarahman`

    *   Chris Newland 的 JITWatch 代码缓存可视化。可视化 HotSpot JVM 代码缓存如何随着 JIT 编译器从你的字节码生成优化的本地代码而填满：[`https://github.com/AdoptOpenJDK/jitwatch`](https://github.com/AdoptOpenJDK/jitwatch)

    *   MuseuID，Angelica Leite。该软件协助 Santana do Cariri 的古生物学博物馆。它管理化石收藏和博物馆活动：视频：[`http://t.co/3MuofK4eZF`](http://t.co/3MuofK4eZF)
    GitHub：[`https://github.com/angelicalleite/museuid`](https://github.com/angelicalleite/museuid)
    Twitter：`@angelicalleite`

    *   AZoi Capital Atlas Trader 软件 JavaFX，Rob Terpilowski：视频：[`https://youtu.be/tm05AIkvJAs`](https://youtu.be/tm05AIkvJAs)
