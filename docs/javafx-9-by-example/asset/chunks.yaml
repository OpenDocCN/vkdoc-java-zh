    ### 工作原理


    代码首先创建一个 `MenuBar` 控件，它可以包含一个到多个菜单（`MenuItem`）对象。创建 `MenuBar` 后，它被设置为 `BorderPane`
    布局的顶部区域。由于顶部区域允许可调整大小的节点占据可用的水平空间，因此 `MenuBar` 控件将拉伸至 `BorderPane`（根场景）的宽度。清单
    6-18 将 `BorderPane` 的顶部区域设置为容纳一个菜单栏。


    ```

    MenuBar menuBar = new MenuBar();

    BorderPane root = new BorderPane();

    root.setTop(menuBar);

    清单 6-18.

    菜单栏被设置为根 BorderPane 的顶部区域节点

    ```


    接下来，代码实例化包含一个或多个菜单项（`MenuItem`）对象以及其他 `Menu` 对象的 `Menu` 对象，从而创建子菜单。


    创建“文件”菜单后，代码创建“摄像机”菜单。此菜单将包含 `CheckMenuItem` 对象。这些菜单项允许用户选择或取消选择“显示摄像机 1”和“显示摄像机
    2”作为菜单项。


    最后是“警报”菜单的实现，它包含两个单选菜单项（`RadioMenuItem`）、一个分隔符（`SeparatorMenuItem`）和一个子菜单（`Menu`）。为了创建“警报”菜单的单选菜单项，代码本身创建了一个
    `ToggleGroup` 类的实例。`ToggleGroup` 类也用于常规单选按钮（`RadioButtons`），以仅允许选择一个选项。清单 6-19
    创建了要添加到 `alarmMenu Menu` 对象中的单选菜单项（`RadioMenuItems`）。


    ```

    // 警报菜单

    Menu alarmMenu = new Menu("Alarm");

    // 发出警报声或关闭警报

    ToggleGroup tGroup = new ToggleGroup();

    RadioMenuItem soundAlarmItem = new RadioMenuItem("Sound Alarm");

    soundAlarmItem.setToggleGroup(tGroup);

    RadioMenuItem stopAlarmItem = new RadioMenuItem("Alarm Off");

    stopAlarmItem.setToggleGroup(tGroup);

    stopAlarmItem.setSelected(true);

    alarmMenu.getItems().addAll(soundAlarmItem, stopAlarmItem, new SeparatorMenuItem());

    清单 6-19.

    创建包含单选和分隔符菜单项的菜单项

    ```


    代码还通过实例化一个 `SeparatorMenuItem` 类来添加视觉分隔符，该类通过 `getItems().addAll()` 方法添加到菜单中。`getItems()`
    方法返回一个 `MenuItem` 对象的可观察列表（`ObservableList<MenuItem>`）。稍后你将了解 `ObservableList`
    集合，简单来说，它们是能够在添加或移除项目时通知并更新 UI 控件的集合。有关完整描述，请参阅本章后面的“ObservableList 集合类”一节。


    添加到“警报”菜单的最后一个子菜单项是一个名为“应急计划”的子菜单。为了增添一些趣味，我创建了一些幽默的菜单选项，用于在发生紧急情况时的应急计划。


    ### 选择菜单和菜单项的其他方式


    在前面的示例中，你学习了如何使用鼠标创建和调用菜单项，但你是否知道还有其他调用菜单项的方法？在本节中，你将学习另外三种调用菜单项的方法：通过构建键盘助记符、组合键和上下文菜单。


    #### 键盘助记符


    标准菜单通常具有键盘助记符，以便在不使用鼠标的情况下选择菜单项。通常，使用菜单的应用程序允许用户按下 Alt 键，这会在菜单文本标签的某个字母下方显示下划线
    (_)。用户按下该字母后，菜单将下拉显示其子菜单项，并且用户可以使用箭头键进行导航。请记住，此行为仅在 Windows 平台上有效。


    要在代码中实现此行为，你可以像之前一样通过调用接收 `String` 值的构造函数来实例化一个菜单，但这次你需要在菜单或菜单项文本中所选字母前放置一个下划线字符。此外，为了让系统识别助记符，你只需将
    `true` 传递给 `setMnemonicParsing(true)` 方法。清单 6-20 创建了一个使用字母“F”作为助记符的“文件”菜单。


    ```

    Menu fileMenu = new Menu("_File");

    fileMenu.setMnemonicParsing(true);

    清单 6-20.

    创建一个文件菜单，其助记符为字母“F”

    ```


    #### 组合键


    组合键是选择菜单选项的按键组合。例如，Windows 平台上的大多数应用程序使用组合键 Ctrl+S 来保存文件。在 MacOS 平台上，组合键是 Command
    (⌘)+S。诸如 Ctrl、Command、Alt、Shift 和 Meta 等键被称为修饰键。通常这些修饰键与单个字母组合按下。有时组合键也被称为键盘快捷键（映射到菜单项）。


    要创建组合键，你需要一个 `KeyCodeCombination` 对象的实例，该对象将包含按键和修饰键。清单 6-21 提供了一个 (Ctrl 或 Meta)+S
    的键码组合。你会注意到代码使用了 `KeyCombination.SHORTCUT_DOWN` 值作为键修饰符，而不是 `CONTROL_DOWN` 或 `META_DOWN`。原因很简单；`SHORTCUT_DOWN`
    的值将使应用程序能够跨平台运行。`CONTROL_DOWN` 和 `META_DOWN` 值分别依赖于 Windows 和 MacOS 平台，但 `SHORTCUT_DOWN`
    适用于所有平台。


    ```

    MenuItem saveItem = new MenuItem("_Save");

    saveItem.setMnemonicParsing(true);

    saveItem.setAccelerator(new KeyCodeCombination(KeyCode.S, KeyCombination.SHORTCUT_DOWN));

    清单 6-21.

    一个映射到键盘快捷键 Ctrl+S（Windows）或 Command+S（Mac）的菜单项

    ```


    #### 上下文菜单


    上下文菜单是当用户在 JavaFX UI 控件或舞台表面右键单击鼠标时显示的弹出菜单。要创建上下文菜单，你需要实例化一个 `ContextMenu` 类。与常规菜单完全一样，`ContextMenu`
    菜单有一个 `getItems().add()` 方法来添加菜单项。以下代码片段显示了一个实例化并带有一个菜单项（`exitItem`）的上下文菜单：


    ```

    ContextMenu contextFileMenu = new ContextMenu(exitItem);

    ```


    为了响应应用程序中场景上的鼠标右键单击，你可以添加一个事件处理程序来监听右键单击事件。一旦检测到，就会调用上下文菜单的 `show()` 方法。清单 6-22
    中的代码设置了一个事件处理程序，分别根据鼠标右键或左键单击来显示和隐藏上下文菜单。注意由主鼠标按钮单击（左键单击）调用的 `hide()` 方法，用于移除上下文菜单。


    ```

    primaryStage.addEventHandler(MouseEvent.MOUSE_CLICKED,

    (MouseEvent me) -> {

    if (me.getButton() == MouseButton.SECONDARY || me.isControlDown()) {

    contextFileMenu.show(root, me.getScreenX(), me.getScreenY());

    } else {

    contextFileMenu.hide();

    }

    });

    清单 6-22.

    附加一个事件处理程序，该处理程序在 JavaFX 舞台上遇到鼠标右键单击事件时显示弹出菜单

    ```


    要查看展示这些调用菜单的附加策略的完整代码清单，请访问本书网站下载名为 `KeyCombinationsAndContextMenus.java` 的项目。

