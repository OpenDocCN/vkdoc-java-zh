    ### 代码走查


    通过使用 Scene Builder 工具创建联系人表单，你将 UI 保存为 FXML 格式的文件。FXML 是一种用于表示 JavaFX UI 的 XML
    标记语言。当加载 FXML 进行显示时，与 JavaFX 节点关联的 XML 元素标签会被动态实例化为 Java 代码。使用 FXML 构建 UI 的主要思想是将
    UI 代码与控制逻辑（操作）分离。在图形化布局 UI 元素并将文件保存为 `ContactForm.fxml` 后，你创建了一个名为 `ContactFormController.java`
    的控制器类文件。`ContactFormController` 类包含引用 `ContactForm.fxml` 文件中 UI 元素的 `@FXML` 注解。以下代码片段是带有
    `@FXML` 注解的实例变量。


    ```

    @FXML private TextField firstNameField;

    @FXML private TextField lastNameField;

    ```


    `@FXML` 注解是一种 Java 运行时类型注解，它告诉 `FXMLLoader` 工具类哪些 UI 元素需要动态注入到控制器类中。这是 JavaFX
    的依赖注入机制，允许控制器代码访问 UI 元素。此外，你会注意到 `@FXML` 注解也可以应用于基于 UI 事件（如 `OnAction` 属性）的方法。清单
    5-11 展示了之前你在控制器类中看到的 `saveContactAction()` 方法。同时，回顾图 5-27（步骤 17），该方法名称被输入到 Scene
    Builder 工具的 `OnAction` 属性字段中。当按下“保存”按钮时，该方法被调用。


    ```

    @FXML

    protected void saveContactAction(ActionEvent event) {

    System.out.println("保存以下信息：");

    System.out.println("名字：" + firstNameField.getText());

    System.out.println("姓氏：" + lastNameField.getText());

    }

    清单 5-11.

    绑定到 UI 中“保存”按钮的处理程序代码

    ```


    最后，JavaFX 应用程序代码加载要显示的 FXML 文件。此示例将 FXML 文件视为将要加载的资源。通常，标准 Java 应用程序或 Java 项目会有一个包含属性文件或图片等资源的
    `resources` 目录。在此示例中，我们希望将 FXML 文件放在根级别。你会注意到文件上的 `/` 前缀表示该文件必须位于根类路径下。


    `FXMLLoader.load()` 方法接收根类路径下的资源。如果你将类编译到目录中并开始运行应用程序，必须确保 FXML 文件被复制到根 `classes`
    目录下。请参阅步骤 20，从命令提示符编译并运行应用程序。你使用 `-cp .` 设置类路径，其中 `.`（点）表示当前目录为根路径，因此 `getResource()`
    方法能够看到要加载的 `ContactForm.fxml` 文件。


    ```

    root = FXMLLoader.load(getClass().getResource("/ContactForm.fxml"));

    ```


    ## 总结


    在本章中，你学习了用于创建用户界面的常见布局。本章的第一部分，你简要了解了常见布局，如 `HBox`、`VBox`、`FlowPane`、`BorderPane`
    和 `GridPane`。通过使用一些常见的布局面板（如 `HBox` 和 `VBox`），你看到了详细的代码示例和放大后的示意图，这些图描述了布局节点中常令人困惑的属性。这些属性包括间距、内边距、外边距和边框宽度。其目的是确定布局面板及其子元素实际占用的空间（区域）。接下来，你学习了如何使用
    `BorderPane` 和 `GridPane` 节点创建类似表单的 UI 应用程序。`GridPane` 提供了列级、行级和单元格级的约束。在类似表单的
    UI 中，你还学习了如何控制子 UI 元素的位置和宽度。一个例子是，其中一个被控制的 UI 元素是文本字段，它会根据用户调整窗口大小而收缩或拉伸。


    在学习了如何使用常见布局面板后，你学习了如何使用从 GluonHQ 下载的强大 Scene Builder 工具。本章还讨论了该工具的各种功能以及如何导航使用。熟悉该工具后，你有机会设计了一个与
    `GridPane` 示例类似的表单 UI。这个练习的目的是以图形化方式而非编程方式创建 UI 界面。创建 UI 界面后，你将其保存为 JavaFX FXML
    文件。通过了解如何将 UI 与控制逻辑分离，你学习了如何使用 JavaFX 的依赖注入机制，使控制器代码能够与 UI 元素交互。为了全面理解 Scene Builder
    工具，你学习了如何创建一个应用程序，该程序能够加载 UI（FXML 文件）并通过 `FXMLLoader` 工具类自动连接控制器代码。


    # 6. 用户界面控件


    在上一章中，你学习了如何使用 Scene Builder 工具布局控件。在本章中，你将学习如何与 UI 控件进行交互。由于篇幅限制，本章并未提供 Java
    8 和 9 平台中每个 UI 控件的代码示例。不过，我确实为业务类应用程序中最常见的 UI 控件创建了示例。


    在第 3 章讨论 JavaFX 场景图渲染基本形状节点的能力时，你了解到形状继承自基类 Node（`javafx.scene.Node`）。本章将探讨同样继承自基类
    `Node` 但更为高级的用户界面（UI）控件。主要区别在于，UI 控件是提供用户交互的节点，例如按钮、菜单、文本字段、滑块和表格视图。


    与使用 HTML5 的 Web 开发不同，JavaFX 允许 UI 控件节点、形状节点和画布节点在场景图（绘制表面）上共存。相比之下，HTML5 中的文本输入字段、SVG
    元素和画布元素并不像 JavaFX 场景图上的节点那样继承共同的行为。例如，在使用 HTML 和 JavaScript 时，你无法轻松地使用通用 API 旋转
    HTML 按钮和 SVG 矩形。而使用 JavaFX API 时，你可以像对待任何其他 JavaFX 节点一样对待 UI 控件；例如，你可以应用动画、变换、样式和效果。


    JavaFX UI 控件是基类 `javafx.scene.control.Control` 的派生类，并实现了另外两个接口——`javafx.scene.control.Skinnable`
    和 `javafx.event.EventTarget`。要深入了解如何创建自定义控件，请参阅第 15 章关于自定义用户界面的内容。现在，本章将探讨如何使用
    UI 控件的示例。

