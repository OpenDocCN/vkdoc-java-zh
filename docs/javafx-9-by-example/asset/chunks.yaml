  trans: '

    ### 应用文本效果


    在 `ChangingTextFonts.java` 示例的第一个 `Text` 节点中，代码添加了投影效果。添加投影的一种常见图形技巧是创建至少两层图像，底层图像颜色较深并带有轻微偏移。这种颜色较深且略微偏移的图像会模拟出阴影效果。在
    JavaFX 中，投影是一个实际的效果（`DropShadow`）对象，它被应用于单个 `Text` 节点实例，无需多层图像叠加。`DropShadow`
    对象的位置基于相对于 `Text` 节点的 x、y 偏移量来设置。你还可以设置阴影的颜色；此处，代码将阴影颜色设置为灰色，不透明度为 0.588。不透明度的取值范围是
    0 到 1（`double` 类型），其中 0 表示完全透明，1 表示完全不透明。以下是一个为 `Text` 节点的效果属性设置投影效果（`DropShadow`）的示例：


    ```

    DropShadow dropShadow = new DropShadow();

    dropShadow.setOffsetX(2.0f);

    dropShadow.setOffsetY(2.0f);

    dropShadow.setColor(Color.rgb(50, 50, 50, .588));

    text2.setEffect(dropShadow);

    ```


    虽然这个示例是关于设置文本字体的，但它也演示了如何将投影效果应用于 `Text` 节点。`ChangingTextFonts.java` 示例还包含了另一种效果（算是锦上添花）。在使用等宽字体创建最后一个
    `Text` 节点时，我应用了流行的倒影效果。调用 `setFraction()` 方法并传入 `0.8f`，本质上是指定要显示 80% 的倒影。倒影的数值范围从零（0%）到一（100%）。除了要显示的比例，还可以设置倒影的间隙或顶部偏移量。换句话说，不透明节点部分与倒影部分之间的间距是通过
    `setTopOffset()` 方法调整的。顶部偏移量默认为零。以下代码片段实现了一个比例为 80%（浮点值 0.8f）、顶部偏移量为五个像素的倒影效果：


    ```

    Reflection refl = new Reflection();

    refl.setFraction(0.8f);

    refl.setTopOffset(5);

    text5.setEffect(refl);

    ```


    ## 总结


    在本章中，你学习了在 JavaFX 场景图上绘制 2D 形状的基础知识。你深入了解了笛卡尔坐标系与屏幕坐标系之间的差异。这进一步加深了你对如何在 JavaFX
    场景图上绘制形状节点的理解。第一个示例是使用 JavaFX `Line` 类绘制的基本形状——线条。在此，你深入探讨了父类（`Shape`）的常见属性。讨论的一些常见属性包括设置形状的描边宽度、描边颜色和虚线模式。接下来，你通过绘制有趣的卡通风格图像，探索了简单、复杂和自定义形状。创建形状后，你学习了如何使用颜色为它们着色。你不仅使用了标准的
    RGB 颜色，还使用了各种内置技术，例如线性渐变（`LinearGradient`）和径向渐变（`RadialGradient`）着色。最后，你使用了 JavaFX
    的 `Text` 节点。通过使用 `Text` 节点，你能够获取可用的系统字体，并应用诸如投影（[`DropShadow`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/effect/DropShadow.html)）和倒影（`Reflection`）之类的效果。


    在最后一个详细说明更改文本字体的示例中，你学习了如何使用 Java 8 新的流 API 和 lambda 表达式来遍历系统字体列表。在第 4 章中，你将了解
    Java 8 的 lambda、流和属性。


    # 4. Lambda 与属性


    在本章中，你将了解 Java 8 中引入的新语言特性，称为 lambda 表达式，或简称为 lambda。本章还涵盖了 JavaFX 属性和绑定 API。本章的目标是演示如何在
    JavaFX GUI 应用程序的上下文中使用 lambda 和属性。话虽如此，我主要集中讨论本书大多数示例中使用的常见特性，而不会详细说明每一个 lambda
    和属性特性。


    为了更好地了解 Java 的 lambda 路线图，请参阅 Oracle Java 语言架构师 Brian Goetz 撰写的以下文章：


    [`http://cr.openjdk.java.net/~briangoetz/lambda/lambda-state-final.html`](http://cr.openjdk.java.net/%7Ebriangoetz/lambda/lambda-state-final.html)


    lambda 这个术语源于数学中所谓的 lambda 演算。该领域的一般概念被用来推导出已添加到 Java 中的特定行为，这些行为将在本章中描述。图 4-1
    显示了希腊字母 lambda，你有时会看到它与该主题相关联。


    ![A323804_3_En_4_Fig1_HTML.jpg](img/A323804_3_En_4_Fig1_HTML.jpg)


    图 4-1.


    lambda 的希腊符号


    ## Lambda


    Java Lambda 基于 JSR（Java 规范请求）335，即“Java™ 编程语言的 Lambda 表达式”。该特性恰如其分地以 lambda 演算命名，lambda
    演算是数学逻辑和计算机科学中用于表达计算的形式系统。JSR 335，更广为人知的名称为 Project Lambda，包含了许多特性，例如在流上表达并行计算（Stream
    API）。


    lambda 的一个主要目标是帮助解决 Java 语言中缺乏良好方式来表达函数式编程概念的问题。支持函数式编程概念的语言能够创建匿名（未命名）函数，类似于在
    Java 中创建对象而非方法。这些函数对象通常被称为闭包。一些支持闭包或 lambda 的常见语言包括 Common Lisp、Clojure、Erlang、Haskell、Scheme、Scala、Groovy、Python、Ruby
    和 JavaScript。


    主要思想是，支持函数式编程的语言会使用类似闭包的语法。在 Java 8 中，你可以将匿名函数作为一等公民来创建。换句话说，函数或闭包可以像对象一样被对待，因此它们可以被赋值给变量并传递给其他函数。为了在之前的
    Java 世界（Java 1.1 到 Java 7）中模拟闭包，你通常会使用匿名内部类来将函数（行为）封装为对象。清单 4-1 展示了一个匿名内部类的示例，该示例为
    JavaFX 按钮按下时定义了处理程序代码（在 Java 8 之前）。


    ```

    Button btn = new Button();

    btn.setOnAction(new EventHandler() {

    public void handle(ActionEvent event) {

    System.out.println("Hello World");

    } });

    清单 4-1.

    使用匿名内部类设置按钮的 OnAction

    ```


    你会注意到，仅仅为了连接一个按钮，这段代码看起来非常冗长。在匿名内部类的深处，只有一行输出文本的代码。能够用包含所需行为的代码块来表达，而无需这么多样板代码，岂不是很好？不用再找了。Java
    8 通过使用 lambda 表达式（闭包）解决了这个问题。为了了解它在 Java 8 lambda 表达式中的样子，让我们重写按钮处理程序代码。清单 4-2
    是将按钮的 `EventHandler` 代码重写为 Java 8 lambda 表达式。


    ```

    btn.setOnAction(event -> System.out.println("Hello World") );

    清单 4-2.

    使用 Lambda 表达式设置按钮的 OnAction

    ```


    使用 lambda 表达式不仅使代码简洁易读，而且代码的性能也可能更好。实际上，在底层，编译器能够优化代码，并且很可能能够减少其占用空间。


    ### Lambda 表达式


    如前所述，lambda 表达式是 Java 8 版本的闭包。与其他语言在语法上创建闭包的方式相同，你也将能够引用它们并将它们传递给其他方法。为了实现这种能力，你稍后将学习函数式接口。但现在，让我们先看看
    lambda 表达式的基本语法。

