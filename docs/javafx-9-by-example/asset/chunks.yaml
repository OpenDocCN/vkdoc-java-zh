    ### VP6 .flv 格式


    JavaFX 2.x 及更高版本支持一种名为 VP6 的跨平台视频格式，其文件扩展名为 `.flv`（代表流行的 Adobe Flash 视频格式）。用于创建
    VP6 和 `.flv` 文件的实际编码器和解码器（编解码器）由一家名为 On2 的公司授权。2010 年，On2 被谷歌收购，用于构建 VP7 和 VP8，使其成为开放且免费的技术，以推动
    HTML5 的发展。


    有关要使用的格式的更多详细信息，请参阅 Javadoc。给聪明人的忠告：警惕那些声称可以免费转换视频的网站。截至撰写本文时，唯一能够合法地将视频编码为 VP6
    的编码器是 Adobe 的商业转换器。


    您可能想知道，在没有编码软件的情况下如何获取 `.flv` 文件。如果您手头没有 `.flv` 文件，可以从我最喜欢的网站之一 Media College（[`http://www.mediacollege.com`](http://www.mediacollege.com)）获取。从摄影到电影，Media
    College 提供论坛、教程和资源，帮助引导您进入媒体世界。


    在那里，您可以获取一个特定的媒体文件，用于本章中与隐藏式字幕相关的某个示例。要获取 `.flv` 文件，请导航至以下 URL：


    [`http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html`](http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html)
    `.`


