    the printable width and height, the code will call the `MyPrinterHelper.createPages()`
    method to return a list of nodes to print. The `createPages()` method is responsible
    for calculating how to divide the target node into a list of nodes that will fit
    the printable print layout. The code statement calling the method `MyPrinterHelper.createPages()`
    receives the following parameters: `targetNode`, `printWidth`, and `printHeight`.


    Once each page is prepared as a node, you can queue them up for printing. Depending
    on the kind of content to be printed, you will have to decide how you want to
    break sections into nodes to be queued up for printing. Since it depends on the
    kind of content to be printed, it is really up to you to decide how you want to
    design individual nodes. One example is to print a sheet of mailing labels based
    on a `ListView` node’s items (`getItems()`).


    If you feel that creating your own function to break apart content into printable
    nodes is too difficult, have no fear, JavaFX web engine is here. Later, you will
    see an example application that will load an HTML web page to be printed as multiple
    pages. Without jumping ahead, the `javafx.scene.web.WebEngine` node has a convenience
    method `print()` that will send a web page to the printer. What’s nice about the
    `WebEngine`’s print ability is that it can print without displaying the `WebView`
    node on the JavaFX Scene graph. This allows you to create a JavaFX application
    window (`Stage`) that can send HTML documents to the printer in the background.
    It is important to note that the JavaFX print APIs do not support a true headless
    print service as a background process without having to launch a JavaFX application
    window. In order to print using JavaFX print APIs, a JavaFX application thread
    must be running.


    Now that you have a taste for how simple JavaFX printing can be, next up you will
    take a look at JavaFX’s print APIs in more detail to programmatically configure
    printer attributes and print jobs.'
  trans: '

    ## JavaFX 打印


    在开始介绍 JavaFX 打印 API 之前，我想先吊吊你的胃口，让你看看用很少的代码就能轻松打印东西。JavaFX 最简单的打印形式允许你打印任何可见的
    JavaFX 节点，如清单 8-1 所示。


    ```

    PrinterJob job = PrinterJob.createPrinterJob();

    job.showPrintDialog(primaryStage);

    boolean success = job.printPage(circle);

    if (success) {

    job.endJob();

    }

    清单 8-1.

    使用 PrinterJob 类打印 JavaFX 节点

    ```


    清单 8-1 的目标是将一个 JavaFX `Circle` 节点打印到打印机。清单 8-1 展示了创建一个打印任务 (`PrinterJob`)，然后调用
    `showPrintDialog()` 方法，该方法会启动一个对话框窗口，允许你配置当前的打印任务，如图 8-1 所示。


    ![A323804_3_En_8_Fig1_HTML.jpg](img/A323804_3_En_8_Fig1_HTML.jpg)


    图 8-1.


    用于配置当前打印任务的打印对话框窗口


    配置好打印机设置后，点击“打印”按钮开始打印过程。代码将调用打印任务的 `printPage()` 方法，将任务发送给打印机。调用 `printPage()`
    方法后，会返回一个布尔值，表示打印任务是否成功。如果打印成功（`true`），代码会通过调用打印任务对象上的 `endJob()` 方法来结束打印任务。


    清单 8-1 的输出应该会将一个 JavaFX `circle` 节点打印到打印机上。假设圆形位于打印机的可打印宽度内，你应该会看到一张打印出来的纸上有一个圆形。稍后，你将学习如何使用
    API 查询打印机的可打印宽度和高度。


    清单 8-1 的输出看起来实现起来很简单；然而，事情并非表面看起来那么简单。你可能在想，“如何打印一个内容跨越多页的节点？”


    由于代码只是打印到单页上，你还会发现，如果一个节点大于（超出）打印机版面的可打印宽度和高度，这些区域将不会被打印到物理纸张（`Paper`）上。话虽如此，你需要实现一种策略，要么调整节点内容的大小，要么将节点内容分割成多个节点，以便打印到每一页上。


    在本章中，你将主要学习如何配置打印任务以及打印单个节点，例如图像或形状节点。但是，如果你足够有雄心，并且愿意创建一个真正的文字处理器或贺卡应用程序，你不可避免地会想要打印跨越多页的内容。因此，你可能需要自己进行计算。基本上，这种计算涉及计算文本行数或确定内容区域的宽度和高度。


    虽然在一个章节中创建一个能够打印多页的文字处理器相当有挑战性，但我至少会提供一些框架代码来帮助你入门。如清单 8-2 所示，框架代码已经搭建好，以便你可以提供辅助代码（`MyPrinterHelper.createPages()`
    方法），该方法将进行计算，并返回一个节点列表，这些节点最终将被排队等待打印。


    ```

    Printer printer = Printer.getDefaultPrinter();

    PageLayout layout = printer.getDefaultPageLayout();

    double printWidth = layout.getPrintableWidth();

    double printHeight = layout.getPrintableHeight();

    PrinterJob job = PrinterJob.createPrinterJob(printer);

    // 假设你有一个大于可打印区域的节点。

    TableView myLargeJFXNode = ... // 跨越多页的大型节点。

    // 创建一个辅助函数，返回一个

    // 代表要打印页面的节点列表。

    List pages = MyPrinterHelper.createPages(myLargeJFXNode, printWidth, printHeight);

    pages.forEach(job::printPage);

    job.endJob();

    清单 8-2.

    用于打印跨越多页节点的框架代码

    ```


    在清单 8-2 中，代码首先获取布局信息，以确定可打印的宽度和高度。获取可打印宽度和高度后，代码将调用 `MyPrinterHelper.createPages()`
    方法，返回一个要打印的节点列表。`createPages()` 方法负责计算如何将目标节点分割成一个适合可打印版面的节点列表。调用 `MyPrinterHelper.createPages()`
    方法的代码语句接收以下参数：`targetNode`、`printWidth` 和 `printHeight`。


    一旦每个页面被准备为一个节点，你就可以将它们排队等待打印。根据要打印的内容类型，你需要决定如何将各部分分割成节点，以便排队打印。由于这取决于要打印的内容类型，因此如何设计单个节点完全取决于你。一个例子是基于
    `ListView` 节点的项（`getItems()`）打印一张邮寄标签纸。


    如果你觉得创建自己的函数来将内容分割成可打印节点太难了，别担心，JavaFX Web 引擎来了。稍后，你将看到一个示例应用程序，它会加载一个 HTML 网页并将其打印为多页。先不剧透，`javafx.scene.web.WebEngine`
    节点有一个便捷方法 `print()`，可以将网页发送到打印机。`WebEngine` 打印能力的优点在于，它可以在不将 `WebView` 节点显示在 JavaFX
    场景图上的情况下进行打印。这允许你创建一个 JavaFX 应用程序窗口（`Stage`），在后台将 HTML 文档发送到打印机。需要注意的是，JavaFX
    打印 API 不支持在没有启动 JavaFX 应用程序窗口的情况下，作为后台进程进行真正的无头打印服务。要使用 JavaFX 打印 API 进行打印，必须有一个
    JavaFX 应用程序线程在运行。


    现在你已经初步了解了 JavaFX 打印的简单性，接下来你将更详细地了解 JavaFX 的打印 API，以便以编程方式配置打印机属性和打印任务。

    '
- fmt: '# JavaFX Print APIs


    Let’s take a look at the main classes that comprise the JavaFX print APIs. Table
    [8-1](#A323804_3_En_8_Chapter.html#Tab1) lists the main print classes and includes
    a brief description according to the Java 8 Javadoc documentation (`javafx.print`).


    Table 8-1. The JavaFX Printing API Classes and Their Descriptions


    | Class/Enum | Description |

    | --- | --- |

    | `JobSettings` | The `JobSettings` class encapsulates most of the configuration
    of a print job. |

    | `PageLayout` | A `PageLayout` encapsulates the information needed to lay out
    content. |

    | `PageRange` | A `PageRange` is used to select or constrain the job print stream
    pages to print. |

    | `Paper` | A class that encapsulates the size of paper media as used by printers.
    |

    | `PaperSource` | A `PaperSource` is the input tray to be used for the Paper.
    |

    | `Printer` | A `Printer` instance represents the destination for a print job.
    |

    | `PrinterAttributes` | This class encapsulates the attributes of a printer that
    relate to its job printing capabilities and other attributes. |

    | `PrinterJob` | `PrinterJob` is the starting place for JavaFX `scenegraph` printing.
    |

    | `PrintResolution` | Class to represent a supported device resolution of a printer
    in the feed and crossfeed directions in dots-per-inch (DPI). |

    | `Collation` | The `enum` class `Collation` specifies whether or not media sheets
    of each copy of a printed document in a job are to be in sequence. |

    | `PageOrientation` | An `enum` class that specifies the orientation of the media
    sheet for printed pages. |

    | `PrintColor` | An `enum` class that describes whether printing should be monochrome
    or color. |

    | `Printer.MarginType` | The `MarginType` (`enum` class) is used to determine
    the printable area of a `PageLayout`. |

    | `PrinterJob.JobStatus` | An `enum` class used in reporting status of a print
    job. |

    | `PrintQuality` | An `enum` class to describe printing quality setting. |

    | `PrintSides` | An `enum` class to enumerate the possible duplex (two-sided)
    printing modes. |


    ## Printer and PrinterJob


    You might feel overwhelmed by the numerous classes shown in Table [8-1](#A323804_3_En_8_Chapter.html#Tab1);
    however, all you have to do is remember the `Printer` and `PrinterJob` classes.
    Figure [8-2](#A323804_3_En_8_Chapter.html#Fig2) depicts a high-level diagram showing
    the relationships between the important JavaFX print API classes.


    ![A323804_3_En_8_Fig2_HTML.jpg](A323804_3_En_8_Fig2_HTML.jpg)


    Figure 8-2. A UML diagram of the main JavaFX print classes


    For sake of space, the UML diagram shown in Figure [8-2](#A323804_3_En_8_Chapter.html#Fig2)
    is showing just a few of the printer attributes of the `PrinterAttributes` object,
    instead of all of them. You’ll notice the diagram displays just a few printer
    attributes having one-to-many `Paper`, `PaperSource`, and `PrintResolution` objects.
    However, later you will see example code that outputs all of your printer’s supported
    attribute. For now, let’s look at methods to query printers.


    To easily get started on querying information, you can focus your attention on
    the `Printer` and `PrinterJob` classes. Both `Printer` and `PrinterJob` classes
    contain static methods to query printer information and create print jobs, respectively.


    To list the available printers, you can invoke the `static` method `Printer.getAllPrinter()`,
    as shown in Listing [8-3](#A323804_3_En_8_Chapter.html#Par28).


    ```

    Printer.getAllPrinters()

    .forEach(System.out::println);

    Listing 8-3.

    Listing the Available Printers from the Printer Class

    ```


    The following is the output from Listing [8-3](#A323804_3_En_8_Chapter.html#Par28).
    It shows a list of printers that are available on my Apple Macbook Pro. Depending
    on your OS environment and connected printers, you will likely see different results.


    ```

    Printer EPSON XP-430 Series

    Printer S300-S400 Series

    ```


    Another convenient static method on the `Printer` class is `getDefaultPrinter()`
    to obtain your system’s default printer. Depending on your desktop operating system,
    the user can go to Printer/Scanner settings to set up the default printer if one
    has not been already set. On the Windows operating system, you would navigate
    to your control panel’s Settings ➤ Devices ➤ `<printer>`. On a MacOS system, navigate
    to System Preferences ➤ Printers and Scanners. On both OSes, you will right-click
    the selected `<printer>` to set it as the default printer.


    After obtaining a `Printer` object, you can invoke the `getPrinterAttributes()`
    method that returns a `PrinterAttributes` object to retrieve a printer’s supported
    features. The `PrinterAttributes` object will contain various methods to determine
    supported orientations, paper types, paper sources, or print resolutions.'
