    ```


    代码首先清除标签显示区域（`VBox` 容器）。然后，根据选定的图标包获取 `GlyphIcons` 列表。接着，代码会过滤 `iconPackIcons`
    列表，查找任何图标名称中包含搜索文本字符串的部分。过滤完成后，图标列表将应用于 `VBox` 容器中以行形式显示的标签。


    标签和自定义字体很有趣，但由于它们本质上是只读的，接下来我们来看看按钮。


    ## 按钮


    如果说 JavaFX 标签是最基本的 UI 控件，那么下一个最基本的 UI 控件就是按钮控件。按钮响应鼠标点击或当按钮获得焦点时按下空格键的操作。在 JavaFX
    中，还有其他控件的行为类似于按钮。事实上，所有具体的类按钮控件都继承自父类 `javafx.scene.control.ButtonBase`。以下是 JavaFX
    按钮控件的列表：


    *   Button

    *   CheckBox

    *   Hyperlink

    *   Radio button

    *   Toggle button

    *   Menu/MenuItem


    ### Button


    标准的按钮控件可以包含文本或图形（节点），类似于前面介绍的标签控件。按钮可以具有默认行为，例如当用户按下 Enter 或 Escape 键时。在创建表单应用程序的场景中，OK
    按钮可以作为默认按钮，允许用户按下 Enter 键；或者点击 Cancel 按钮来响应 Escape 键。对话框窗口通常遵循这种模式。以下代码片段创建了三个按钮——OK、Cancel
    和 Easy。OK 和 Cancel 按钮将被配置为分别接受 Enter 和 Escape 键的按下。Easy 按钮被设置为在按下时调用名为 `doSomethingCool()`
    的方法。


    ```

    Button okButton = new Button("OK");

    okButton.setDefaultButton(true);

    Button cancelButton = new Button("Cancel");

    cancelButton.setCancelButton(true);

    Button easyButton = new Button("Easy");

    easyButton.setOnAction( actionEvent -> doSomethingCool() );

    ```

