    *   When to Use a ChangeListener or an InvalidationListener, Michael Heinrichs:
    [`http://blog.netopyr.com/2012/02/08/when-to-use-a-changelistener-or-an-invalidationlistener`](http://blog.netopyr.com/2012/02/08/when-to-use-a-changelistener-or-an-invalidationlistener)

    *   The Unknown JavaBean, Richard Bair: [`https://community.oracle.com/blogs/rbair/2006/05/31/unknown-javabean`](https://community.oracle.com/blogs/rbair/2006/05/31/unknown-javabean)

    *   Using JavaFX Properties and Binding, Scott Hommel: [`http://docs.oracle.com/javafx/2/binding/jfxpub-binding.htm`](http://docs.oracle.com/javafx/2/binding/jfxpub-binding.htm)

    *   Creating JavaFX Properties, Michael Heinrichs: [`http://blog.netopyr.com/2011/05/19/creating-javafx-properties`](http://blog.netopyr.com/2011/05/19/creating-javafx-properties)

    *   Pro JavaFX 8, (Chapter [4](#A323804_3_En_4_Chapter.html), “Properties and
    Bindings”), Johan Vos, James Weaver, Weiqi Gao, Stephen Chin, and Dean Iverson,
    Apress, 2014: [`http://www.apress.com/9781430265740`](http://www.apress.com/9781430265740)

    *   mvvm(fx): An application framework that provides the necessary components
    to implement the MVVM pattern with JavaFX: [`https://github.com/sialcasa/mvvmFX`](https://github.com/sialcasa/mvvmFX)

    *   Open Dolphin: A JavaFX MVC Framework (founded by Dierk Koenig of Canoo Engineering):
    [`http://open-dolphin.org/dolphin_website/Home.html`](http://open-dolphin.org/dolphin_website/Home.html)

    *   JavaFX MVP Framework Based on Convention over Configuration and Dependency
    Injection (founded by Adam Bien): [`http://afterburner.adam-bien.com`](http://afterburner.adam-bien.com)


    ## Layouts


    Building UIs can be a challenge when it comes to layout. The following references
    tutorials and libraries discuss how to use JavaFX nodes.


    *   Laying Out a User Interface with JavaFX 2.0, Jim Weaver (Oracle): [`http://www.oracle.com/technetwork/articles/java/layoutfx-1536156.html`](http://www.oracle.com/technetwork/articles/java/layoutfx-1536156.html)

    *   Working With Layouts in JavaFX, Joni Gordon: [`http://docs.oracle.com/javafx/2/layout/jfxpub-layout.htm`](http://docs.oracle.com/javafx/2/layout/jfxpub-layout.htm)

    *   Pro JavaFX 2, Chapter [4](#A323804_3_En_4_Chapter.html), “Building Dynamic
    UI Layouts in JavaFX” (Apress, 2012): [`http://www.apress.com/9781430268727`](http://www.apress.com/9781430268727)

    *   In-Depth Layout and Styling with the JavaFX Scene Builder: [`http://www.youtube.com/watch?v=7Nu3_5doZK4`](http://www.youtube.com/watch?v=7Nu3_5doZK4)

    *   Miglayout, Mikael Grev: [`http://www.miglayout.com`](http://www.miglayout.com)

    *   JavaFX 2.0 EA and MigLayout, Tom Eugelink: [`http://tbeernot.wordpress.com/2011/03/11/javafx-2-0-ea-and-miglayout`](http://tbeernot.wordpress.com/2011/03/11/javafx-2-0-ea-and-miglayout)

    *   Flex Box FX: Responsive Design for JavaFX. JavaFX Port of CSS3 FlexBox Layout
    Manager: [`http://flexboxfx.io`](http://flexboxfx.io)

    *   JFoenix: A Material Design Framework for JavaFX: [`http://www.jfoenix.com`](http://www.jfoenix.com)

    *   BootstrapFX: Bootstrap Port for JavaFX: [`https://github.com/aalmiray/bootstrapfx`](https://github.com/aalmiray/bootstrapfx)

    *   Jbootx: Bootstrap Look for JavaFX: [`https://github.com/dicolar/jbootx`](https://github.com/dicolar/jbootx)'
