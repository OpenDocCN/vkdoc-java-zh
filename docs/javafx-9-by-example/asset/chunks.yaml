  raw: '### Example: An HTML5 Analog Clock


    As an example of using HTML5 content to be rendered onto a `WebView` node, let’s
    look at an analog clock that was created using an SVG file, based on the W3C’s
    scalable vector graphics (SVG) markup language. Figure [10-1](#A323804_3_En_10_Chapter.html#Fig1)
    depicts an SVG-based analog clock that was rendered in a JavaFX `WebView` node.


    ![A323804_3_En_10_Fig1_HTML.jpg](A323804_3_En_10_Fig1_HTML.jpg)


    Figure 10-1.


    SVG-based analog clock (WebView node)


    You can see that the analog clock face has hour, minute, and second hands. The
    clock hands will be initialized and positioned with the current time. Of course,
    as time goes by, the hands will move in a clockwise rotation.


    To download the code, go to the book’s web site or to [`https://github.com/carldea/jfx9be`](https://github.com/carldea/jfx9be)
    for instructions on how to compile and run the code. Listing [10-16](#A323804_3_En_10_Chapter.html#Par157)
    shows statements on how to compile the code, copy resources, and run the displaying
    HTML5 content application on the DOS command prompt (terminal).


    ```

    // Compile

    $ javac -d mods/com.jfxbe.html5content $(find src/com.jfxbe.html5content -name
    "*.java")

    // Copy resource

    $ cp src/com.jfxbe.html5content/com/jfxbe/html5content/clock.svg \

    mods/com.jfxbe.html5content/com/jfxbe/html5content

    // Run Application

    $ java --module-path mods -m \

    com.jfxbe.html5content/com.jfxbe.html5content.DisplayingHtml5Content

    Listing 10-16.

    The Statements to Compile, Copy Resources, and Run the Displaying HTML5 Content
    Application Example

    ```


    The compile statement will place the compiled classes into the `mods/com.jfxbe.html5content`
    directory.


    Once you have compiled the code, the next statement will copy the resources into
    the compiled area. Copying the resources will make files such as the `clock.svg`
    available during runtime. Usually, your favorite IDE will copy resources automatically.
    The last statement runs the application by using `--module-path` to point to the
    newly compiled module (`com.jfxbe.html5content`). Also note the `-m` switch. It
    tells the Java runtime which module to run and which class contains the application
    `main()` method.


    After successfully running the application, Figure [10-1](#A323804_3_En_10_Chapter.html#Fig1)
    shows the `DisplayingHtml5Content` application containing an SVG clock rendered
    in a `WebView` node. Next, let’s look at the source code to see how it was implemented
    (i.e., what makes it tick?).


    ### Analog Clock Source Code


    The source code begins with the module definition shown in Listing [10-17](#A323804_3_En_10_Chapter.html#Par162).
    If you aren’t familiar with Java 9’s module definitions, refer to Chapter [2](#A323804_3_En_2_Chapter.html)
    on JavaFX and Jigsaw. If you want to ignore modules and treat the code as Java
    8 code, just skip the module definition and look at the main source code shown
    in Listing [10-18](#A323804_3_En_10_Chapter.html#Par165).


    ```

    module com.jfxbe.html5content {

    requires javafx.web;

    requires jdk.jsobject;

    exports com.jfxbe.html5content;

    }

    Listing 10-17.

    The Contents of the module-info.java Definition for the com.jfxbe.html5content
    Module

    ```


    The module definition begins with a name such as `com.jfxbe.html5content`. This
    of course is just a convention and doesn’t have to be a namespace and dot separated.
    As of the writing of this book during compilation I received a warning because
    my module name has a numeral `5` in `html5content`. At this time, there have been
    e-mails circulating in regards to naming conventions, overall reduction in the
    amount of typing when specifyling what module names to include, and the simplification
    of running applications on the command line.


    The main analog clock source code is shown in Listing [10-18](#A323804_3_En_10_Chapter.html#Par165).
    The analog clock is based on an SVG file loaded into a JavaFX application’s Scene
    graph. Listing [10-19](#A323804_3_En_10_Chapter.html#Par167) shows the SVG file
    containing the majority of the functional code that displays the clock face and
    the JavaScript code that animates the hour, minute, and second hands.


    ```

    package com.jfxbe.html5content;

    import javafx.application.Application;

    import javafx.scene.Scene;

    import javafx.scene.paint.Color;

    import javafx.scene.web.WebView;

    import javafx.stage.Stage;

    import java.net.MalformedURLException;

    import java.net.URL;

    /**

    * An SVG analog clock rendered using the WebView node.

    * @author cdea

    */

    public class DisplayingHtml5Content extends Application {

    @Override

    public void start(Stage primaryStage) throws MalformedURLException {

    primaryStage.setTitle("Displaying Html5 Content");

    WebView browser = new WebView();

    Scene scene = new Scene(browser,320,250, Color.rgb(0, 0, 0, .80));

    primaryStage.setScene(scene);

    URL url = getClass().getResource("clock.svg");

    browser.getEngine().load(url.toExternalForm());

    primaryStage.show();

    }

    public static void main(String[] args) {

    launch(args);

    }

    }

    Listing 10-18.

    Analog Clock Source Code (DisplayingHtml5Content.java)

    ```


    Listing [10-19](#A323804_3_En_10_Chapter.html#Par167) shows the `clock.svg` SVG
    file that was created using the Inkscape tool. SVG specification is similar to
    HTML markup, where you can embed JavaScript code to interrogate element tags in
    the DOM.


    ```


    12) {

    hr = hr - 12; }

    var min = parseInt(date.getMinutes());

    var sec = parseInt(date.getSeconds());

    var pi=180;

    var secondAngle = sec * 6 + pi;

    var minuteAngle = ( min + sec / 60 ) * 6 + pi;

    var hourAngle   = (hr + min / 60 + sec /3600) * 30 + pi;

    moveHands(secondAngle, minuteAngle, hourAngle);

    }

    function moveHands(secondAngle, minuteAngle, hourAngle) {

    var secondHand = document.getElementById("secondHand"); var minuteHand = document.getElementById("minuteHand");
    var hourHand = document.getElementById("hourHand");

    secondHand.setAttribute("transform","rotate("+ secondAngle + ")");

    minuteHand.setAttribute("transform","rotate("+ minuteAngle +")");

    hourHand.setAttribute("transform","rotate("+ hourAngle + ")");

    } ]]>


    ... // beginning of SVG code

    ... // Main clock code


    ... // The rest of the Clock code: shiney glare, black button cover (center)


    Listing 10-19.

    The clock.svg File Containing an SVG Representation of an Analog Clock

    ```'
