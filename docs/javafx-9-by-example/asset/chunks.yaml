    \ File Contains JavaFX CSS Styling Attribute to Style the Button Fun Application\
    \ Screen\n```\n\n### How It Works\n\n*   Overriding the `init()` method from the\
    \ JavaFX Application class to load an array of `Car` objects. Each `Car` instance\
    \ has an image for the car going forward, an image of the car going backward,\
    \ and a string description of the vehicle.\n*   In the `start()` method, the code\
    \ begins setting up the scene by loading the `button-fun.css` file from Listing\
    \ [6-14](#A323804_3_En_6_Chapter.html#Par111).\n*   Next, the code creates a toggle\
    \ group and radio buttons to support the selection of a vehicle.\n*   After creating\
    \ radio buttons, the code creates a hyperlink to allow the users to display a\
    \ popup displaying the selected car’s description. The code makes a call to a\
    \ private method that I created with the following signature:\n\n    ```\n   \
    \ private Hyperlink createHyperLink(ToggleGroup chosenCarToggle)\n    ```\n\n\
    *   By passing in the `chosenCarToggle` parameter, a popup can determine which\
    \ vehicle type was selected to display the correct description.\n*   Inside of\
    \ the `createHyperLink()` method, when creating a popup, the code will create\
    \ a custom shape created by a union of two shapes (an arc and a rectangle). Figures\
    \ [6-10](#A323804_3_En_6_Chapter.html#Fig10) depicts both shapes prior to the\
    \ union. In Figure [6-11](#A323804_3_En_6_Chapter.html#Fig11), two shapes form\
    \ the message popup box.\n\n    ![A323804_3_En_6_Fig11_HTML.jpg](A323804_3_En_6_Fig11_HTML.jpg)\n\
    \n    Figure 6-11.\n\n    An arc and a rectangle shape positioned after the union\
    \ operation\n\n    ![A323804_3_En_6_Fig10_HTML.jpg](A323804_3_En_6_Fig10_HTML.jpg)\n\
    \n    Figure 6-10.\n\n    An arc and a rectangle shape positioned before the union\
    \ operation\n\n    ```\n    Arc pointer = new Arc(0, 0, 20, 20, -20, 40);\n  \
    \  pointer.setType(ArcType.ROUND);\n    Rectangle msgRect = new Rectangle( 18,\
    \ -20, 200.5, 150);\n    Shape msgBubble = Shape.union(pointer, msgRect);\n  \
    \  ```\n\n*   The popup displayed will be positioned just to the right of the\
    \ hyperlink itself. The following code snippet obtains the bounding box location\
    \ and converts them to screen coordinates. A popup is displayed in another window\
    \ (`Stage`).\n\n    ```\n    carInfoLink.setOnAction(actionEvent -> {\n    Bounds\
    \ linkBounds = carInfoLink.localToScreen(carInfoLink.getBoundsInLocal());\n  \
    \  carInfoPopup.show(carInfoLink, linkBounds.getMaxX(), linkBounds.getMinY() -10);\n\
    \    });\n    ```\n\n*   After creating the hyperlink to display the car information,\
    \ we return to the `start()` method. The code creates a check box control to toggle\
    \ the headlights of the car. This code creates an arc with a color fill of a translucent\
    \ yellow.\n*   Lastly, the `start()` method code creates two buttons that animate\
    \ the selected car to drive forward or backward. A `TranslateTransition` animation\
    \ is used to animate the car image. You will learn about animation in Chapter\
    \ [7](#A323804_3_En_7_Chapter.html), which covers JavaFX graphics.\n\n## Menus\n\
    \nMenus are a standard way for windowed desktop applications to allow users to\
    \ select options. For example, applications typically have a File menu offering\
    \ options (menu items) to save or open a file. In a windowed environment the users\
    \ use their mouse to navigate and select menu items. Menus and menu items typically\
    \ also have the functionality of key combinations to select options, also known\
    \ as keyboard shortcuts. In other words, key combinations allow quick menu selections\
    \ without the need of a mouse."
