    The JavaFX CSS styling for the Photo Viewer application is the `photo-viewer.css`
    file, shown in Listing [7-23](#A323804_3_En_7_Chapter.html#Par132). If you aren’t
    familiar with JavaFX CSS styling, you can fast-forward to Chapter [15](#A323804_3_En_15_Chapter.html)
    on custom user interfaces. In short, in Listing [7-23](#A323804_3_En_7_Chapter.html#Par132)
    contains JavaFX CSS styling for the custom control (`ImageViewButtons`) from Listing
    [7-21](#A323804_3_En_7_Chapter.html#Par125). Typically, you can add class selectors
    to any JavaFX node by invoking the node’s `getStyleClass().add(...)` method.


    For example, here I’ve set the custom button’s area node to use the class selector
    `"button-pane"`:


    ```

