    ### 文件说明


    在详细讲解源代码之前，下一节将简要介绍构成照片查看器示例应用程序的四个源代码文件。该示例应用程序的源代码由以下三个 Java 类文件和一个 [JavaFX
    CSS](https://creativecommons.org/licenses/by-sa/3.0/deed.en) 样式文件组成：


    *   `PhotoViewer.java`

    *   `ImageViewButtons.java`

    *   `ImageInfo.java`

    *   `photo-viewer.css`


    `PhotoViewer.java` 是启动的主 JavaFX 应用程序。与本书中的所有示例一样，你会看到一个 `start()` 方法，它从 JavaFX
    应用程序的生命周期中接收一个舞台（`java.stage.Stage`）实例。代码从这里开始创建 UI 元素，并将其放入 JavaFX 场景图中。


    `ImageViewButtons.java` 是一个简单的自定义控件，用于管理映射到图像文件的字符串 URL 列表。`ImageViewButtons`
    的一个实例是一个自定义 UI 控件，如前文图 7-5 所示，它描绘了允许用户查看上一张和下一张图像的左右箭头按钮。


    `ImageInfo.java` 是一个普通的 Java 对象（POJO），包含图像的 URL 位置、颜色调整和旋转信息。每加载一张图像，它都会有一个关联的
    `ImageInfo` 实例。由于应用程序只有一个负责一次显示一张图像的 `ImageView` 节点，因此每张图像都有一个 `ImageInfo` 的引用实例，用于存储当前颜色调整和旋转信息等设置。当每张图像加载了相应的
    `ImageInfo` 对象后，该对象就会被应用到 `ImageView` 节点上。


    `photo-viewer.css` 文件是一个 JavaFX CSS 样式文件，应用于照片查看器应用程序中的各种 UI 元素。该 CSS 文件主要包含用于为按钮和形状着色的
    CSS 选择器。此文件位于项目的资源目录中。


    ### 源代码


    在本书的先前版本中，照片查看器应用程序的源代码示例仅包含一个 Java 类文件。作为单个文件，其唯一的优点是代码集中在一处。然而，作为一个 Java 类文件，存在许多缺点。其中一个想到的缺点是可读性差，因此现在将这个大文件拆分为三个独立的
    Java 文件和一个 JavaFX CSS 文件。


    将所有内容放在一个 Java 文件中的另一个显著缺点是代码实际上缺乏灵活性，尤其是在向应用程序添加新功能时。事实上，在本章末尾，你将通过简单地扩展现有应用程序并重写一个方法来了解照片查看器应用程序的一个新功能。本章包含多个代码清单，这些清单被拆分为多个代码部分。每个
    Java 类文件都展示了多个代码清单，以帮助更详细地描述相关内容。


