  trans: '

    ### 工作原理


    清单 6-31 中的代码首先创建了两个进度控件（而非一个），用于向用户展示正在进行的工作。接着，代码通过私有的 `createWorker()` 方法创建了一个工作线程。`createWorker()`
    便捷方法实例化并返回一个 `javafx.concurrent.Task` 对象，该对象类似于 Java Swing 中的 `SwingWorker` 类。与
    `SwingWorker` 类不同，`Task` 对象因其事件驱动设计而大大简化且更易于使用。例如，`Task` 对象能够异步更新进度。


    在创建 `Task` 对象的实例时，代码实现了 `call()` 方法以在后台执行工作。在工作进行过程中，你通常希望将中间结果（如进度或文本信息）加入队列，以便向用户提供反馈。为了将信息加入队列，API
    允许你调用 `updateProgress()` 或 `updateMessage()` 方法。这些方法以线程安全的方式更新信息，使得进度属性的观察者能够安全地更新
    GUI，而不会阻塞 GUI 线程。清单 6-32 将消息加入队列并显示进度。


    ```

    // 将状态加入队列

    updateMessage(status);

    updateProgress(i + 1, numFiles); // (进度, 最大进度)

    清单 6-32.

    在不阻塞进度 UI 控件的情况下更新文本消息和进度

    ```


    创建工作任务后，代码会解除绑定之前绑定到进度控件的所有旧任务。一旦进度控件解除绑定，代码便将进度控件绑定到新创建的名为 `copyWorker` 的 `Task`
    对象。清单 6-33 将新的 `Task` 对象重新绑定到进度 UI 控件。


    ```

    // 连接进度条

    progressBar.progressProperty().unbind();

    progressBar.progressProperty().bind(copyWorker.progressProperty());

    progressIndicator.progressProperty().unbind();

    progressIndicator.progressProperty().bind(copyWorker.progressProperty());

    清单 6-33.

    任务使用后，进度控件需要重新绑定到新任务

    ```


    接下来，请注意代码实现了一个 `ChangeListener`，用于将队列中的结果追加到 `TextArea` 控件中。JavaFX 属性的另一个显著特点是，你可以像
    Java Swing 组件一样附加多个监听器。最后，工作线程和控件全部连接完毕，以生成一个在后台运行的线程。以下代码行展示了如何启动一个 `Task` 工作线程。


    ```

    new Thread(copyWorker).start();

    ```


    这段代码最后连接了“取消”按钮。该按钮仅调用 `Task` 对象的 `cancel()` 方法来终止进程。任务取消后，进度控件会被重置。一旦工作任务被取消，它便无法重复使用。这就是“开始”按钮需要重新创建新任务的原因。如果你需要一个更健壮的可重用解决方案，请查看
    `javafx.concurrent.Service` 类。


    ## 总结


    本章从学习标签和自定义字体开始，例如使用第三方库 `FontAwesomeFX`。在学习标签之后，你通过一个有趣的动画游戏精灵示例，深入了解了各种按钮控件。


    学习常用按钮控件后，你了解了如何创建标准菜单和菜单栏。通过创建菜单，你学会了编写处理代码来响应菜单项的选择。然后，你能够将组合键或键盘快捷键映射到菜单选项。你还学习了如何创建通过右键单击场景图来调用的上下文菜单。通过多种创建菜单和菜单项的方式，你运行了一个模拟安全警报应用程序的示例程序。


    最后，你接触到了 `ObservableList` 集合，它支持显示诸如 `ListView` 和 `TableView` 节点等 UI 控件。通过学习 UI
    控件 `ListView` 和 `TableView`，你得以使用领域对象来填充列表单元格和表格列单元格。你还学习了如何使用文本字段和组合框使表格视图的列单元格可编辑。


    最后，你学习了 JavaFX 的 `Task` API，它使你能够在更新任务状态的同时异步执行代码。你还学习了如何将任务绑定到进度类型的控件 `ProgressBar`
    和 `ProgressIndicator`。借助 `ProgressBar` 和 `ProgressIndicator`，你运行了一个模拟后台工作线程复制文件并更新进度的示例。


    # 7. 图形


    你是否曾听人说过“当两个世界碰撞”？这个表达通常用于描述来自不同背景或文化的人陷入冲突，必须面对艰难抉择的情况。在构建需要图形或动画的 GUI 应用程序时，我们常常会处于商业世界与游戏世界的碰撞航线上。换句话说，在开发应用程序时，能够很好地平衡商业应用的
    UI 方面和类似电子游戏的效果是件好事。


    在不断变化的富互联网应用（RIA）世界中，你可能已经注意到动画的使用越来越多，例如脉冲按钮、过渡效果、移动背景等。GUI 应用程序可以使用动画来提供视觉提示，让用户知道下一步该做什么。借助
    JavaFX，你将能够两全其美，既能创建吸引人的图形，也能处理处理业务交易的表单式应用程序。


    在本章中，你将学习 JavaFX 图形的基础知识，例如显示和操作图像。此外，在本章中你还将学习高级动画 API。系好安全带；你将发现将酷炫的游戏式界面集成到日常应用程序中的解决方案。


    在本章中，你将了解以下内容：


    *   加载和显示图像

    *   后台任务

    *   进度指示器

    *   更改图像的颜色设置

    *   将位图图像写入磁盘

    *   拖放图像文件

    *   使用关键值、关键帧和时间线进行动画制作

    *   动画过渡类

    *   顺序和并行过渡


    ## 使用图像


    JavaFX 的另一个强大功能是能够在场景图上显示标准图像文件格式。在本节中，你将学习如何加载、显示、缩放和旋转图像。额外福利是，你还将学习如何轻松更改图像的色彩属性，例如色调、饱和度、亮度和对比度。


    在学习 JavaFX `Image` 和 `ImageView` API 的基础知识后，你将探索一个照片查看器应用程序的示例。这个有趣的应用程序允许你缩放、旋转和操作图像。

    '
- fmt: '### Loading Images


    You are probably aware of the many standard image file formats on the Internet,
    such as `.jpg`, `.png`, `.gif`, and `.bmp`. To load standard image file formats,
    JavaFX provides the `javafx.scene.image.Image` API. The `Image` class has many
    convenient constructors that facilitate different loading strategies, as shown
    in the following list:


    *   `Image(java.io.InputStream inputStream)`

    *   `Image(java.io.InputStream is, double requestedWidth, double requestedHeight,
    boolean preserveRatio, boolean smooth)`

    *   `Image(java.lang.String url)`

    *   `Image(java.lang.String url, boolean backgroundLoading)`

    *   `Image(java.lang.String url, double requestedWidth, double requestedHeight,
    boolean preserveRatio, boolean smooth)`

    *   `Image(java.lang.String url, double requestedWidth, double requestedHeight,
    boolean preserveRatio, boolean smooth, boolean backgroundLoading)`


    As you can see, there are only a handful of parameters common to all of the constructors
    that are used in various combinations for different loading scenarios. Table [7-1](#A323804_3_En_7_Chapter.html#Tab1)
    briefly describes each parameter.


    **Table 7-1.** Common Parameters When Loading Images of the Class `javafx.scene.image.Image`


    | Parameter | Data Type | Description |

    | --- | --- | --- |

    | `inputStream` | `java.io.InputStream` | An input stream such as a file or network.
    |

    | `url` | `String` | An image’s URL location such as a file on the local filesystem
    or a web server hosting an image file. |

    | `backgroundLoading` | `boolean` | Loads the image in the background (off the
    JavaFX application thread). |

    | `requestedWidth` | `double` | Specifies an image’s bounding box width. |

    | `requestedHeight` | `double` | Specifies an image’s bounding box height. |

    | `preserveRatio` | `boolean` | To keep an image’s aspect ratio within the bounding
    box. |

    | `smooth` | `boolean` | A `true` indicates the use of a better algorithm to smooth
    the image, which can be slower; otherwise it will use the lower quality, which
    will render pixels faster. |


    To demonstrate loading an image, Listing [7-1](#A323804_3_En_7_Chapter.html#Par25)
    shows three ways of loading images. The code listing demonstrates loading an image
    from the local filesystem, classpath, and a remote host system such as a web server.


    ```

    try {

    // The current thread context should not be on the GUI thread.

    // loading an image from a Windows file system

    File file = new File("C:\\Users\\jdoe\\Pictures\\myphoto.jpg");

    String localUrl = file.toURI().toURL().toString();

    // don''t load in the background (block)

    Image localImage = new Image(localUrl, false);

    // loading an image from the classpath in a jar file

    String urlStr = this.getClass()

    .getClassLoader()

    .getResource("images/myphoto.jpg")

    .toExternalForm();

    // load in the background (non-blocking)

    Image cpUrl = new Image(urlStr, true);

    // loading an image from a webserver

    String remoteUrl = "http://mycompany.com/myphoto.jpg";

    // load in the background (non-blocking)

    Image remoteImage = new Image(remoteUrl, true);

    System.out.println(localUrl);  // file:/C:/Users/jdoe/Pictures/myphoto.jpg

    System.out.println(cpUrl);     // jar:file:/myApp.jar!/images/myphoto.jpg

    System.out.println(remoteUrl); // http://mycompany.com/myphoto.jpg

    // ... rest of the code

    } catch (MalformedURLException ex) {

    ex.printStackTrace();

    }

    ```


    **Listing 7-1.** Loading Images from the Filesystem, the Classpath, and a Remote
    Web Server


    This listing demonstrates the use of the constructors receiving a `URL` path to
    an image and a `boolean` parameter to perform the loading of the image in a background
    thread or not. Since the constructor must accept a `URL` object, the file’s path
    must be converted to the URL object (URL specification).


    Listing [7-1](#A323804_3_En_7_Chapter.html#Par25) begins by loading an image from
    the local filesystem using a `File` object based on a string with the path location
    to the image. In this scenario I’ve specified a Microsoft Windows–based absolute
    file path for an image. Here you will notice the double backslash in the string
    representing the file path on the Windows OS. The first backslash is to escape
    the backslash character in Java Strings. The `toURL()` method will convert a filesystem
    path into a standard `URL` formatted string. What’s nice is that the method call
    converts absolute file paths into the standard Uniform Resource Locator specification’s
    format. The string will contain the prefix `file:` representing the protocol and
    the path information.


    Similar to the local filesystem is loading an image file on the Java classpath
    or resources directory. Assuming an application was built as an executable JAR,
    the example in Listing [7-1](#A323804_3_En_7_Chapter.html#Par25) shows the protocol
    as `jar:file:` denoting a file inside a JAR archive file. Pay special attention
    to the code that uses the `getClassLoader()` method. Some environments such as
    OSGi platforms will employ separate class loaders in their own contexts (aka bundle).
    By using the `getClassLoader()` method, the code can safely obtain resources from
    the correct class loader context. For example, if a project has a resources directory
    containing an image file, you can load a resource based on the classpath as shown:


    ```

    src/

    +--main/

    +----java/

    +-------com/

    +---------mycompany/

    +-----------MyClass.java

    +----resources/

    +-------com/

    +---------mycompany/

    +-----------my_image.jpg

    String urlStr = MyClass.class

    .getClassLoader()

    .getResource("com/mycompany/my_image.jpg")

    .toExternalForm();

    ```


    In this example, you’ll notice the resource string `com/mycompany/my_image.jpg`
    having the path information at the beginning. Sometimes projects will place all
    image icons inside a directory called `images` or collocated in the package namespace.


    Back to the code in Listing [7-1](#A323804_3_En_7_Chapter.html#Par25), the last
    strategy is an example showing the ability to load an image hosted on a remote
    web server. You can see that the code also uses `http:` as a protocol prefixed
    to the `URL` path to demonstrate loading images on a remote host web server.


    It’s important to keep in mind that the code for Listing [7-1](#A323804_3_En_7_Chapter.html#Par25)
    regarding the statement that makes the blocking call with the boolean value `false`
    should not be used on the JavaFX application thread. This is due to the possibility
    of blocking the UI thread, thus making the application appear to freeze up. Depending
    on size of the image files or network latency, the objective of the UI developer
    (that’s you!) is to not block the UI thread (JavaFX application thread) by loading
    images on a background thread. After loading an image, the image can now be rendered
    on the JavaFX application thread (`ImageView` node). If you pass in the Boolean
    value of `true`, the `ImageView` node will appear blank until the background thread
    has completed loading the `Image` object.


    Now that you know how to load images, you will learn how to display them using
    the JavaFX `ImageView` node.'
