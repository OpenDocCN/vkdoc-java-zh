    时，它将知道如何提取属性以放置到表格的每个单元格列中。基于 JavaBean 约定，使用 bean 属性名称（`firstName`）创建一个新的 `PropertyValueFactory`
    实例。


    设置好列之后，代码将为 `TableView` 列设置单元格工厂，以允许用户编辑单元格，这也会更新下属（`Person`）的字段。代码将使“别名”列成为可编辑的文本字段，使“心情”列成为可编辑的组合框。


    最后是 `ListView` 上选择监听器的实现。在代码中，您会注意到 `getSelectionModel().selectedItemProperty()`
    方法（显示在清单 6-28 末尾），它允许添加一个监听器。代码简单地创建并添加一个 `ChangeListener` 来处理选择事件。当用户选择一位老板时，`TableView`
    会被清空，并填充所选老板的下属。实际上，这是 `ObservableList` 的魔力，它通知 `TableView` 发生了变化。清空并填充 `TableView`
    的代码摘自清单 6-28，如下所示：


    ```

    teamMembers.clear();

    teamMembers.addAll(observable.getValue().employeesProperty());

    ```


    ## 生成后台进程


    通常，在具有长时间运行进程的桌面应用程序中，视觉反馈应指示正在发生某些事情，或建议用户耐心等待。GUI 开发的主要陷阱之一是难以知道何时以及如何将工作委托给工作线程。为了避免这些陷阱，GUI
    开发人员不断被提醒线程安全问题，尤其是在高负载期间阻塞 UI 线程时。JavaFX 提供了 UI 控件，通过将工作卸载到不同的线程（`Task`）来帮助解决此问题，同时提供正在执行的工作的反馈或进度指示器。

