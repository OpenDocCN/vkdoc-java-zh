    \nWhen creating JavaFX applications, you’ll be learning three ways to develop,\
    \ compile, and run applications.\n\n*   NetBeans IDE\n*   Editor and terminal\
    \ (the command-line prompt)\n*   Editor and the Gradle Build tool\n\n### Using\
    \ the NetBeans IDE\n\nTo quickly get started with creating, coding, compiling,\
    \ and running a simple JavaFX HelloWorld application using the NetBeans IDE, follow\
    \ the steps outlined in this section. You’ll want to go deeper in the next section\
    \ to get an understanding of what the IDE is doing behind the scenes on your behalf.\
    \ For now, though, let’s just get some code written and running.\n\n1.  Launch\
    \ NetBeans IDE.  \n2.  On the File menu, select File ➤ New Project.  \n3.  Under\
    \ Choose Project and Categories , select the JavaFX folder.  \n4.  Under Projects,\
    \ select Java FX Application, and click Next.  \n5.  Specify `HelloWorld` for\
    \ your project name.  \n6.  Change or accept the defaults for the Project Location\
    \ and Project Folder fields . Figure [1-24](#A323804_3_En_1_Chapter.html#Fig24)\
    \ shows the New JavaFX Application wizard used to create a simple HelloWorld application.\n\
    \n![A323804_3_En_1_Fig24_HTML.jpg](A323804_3_En_1_Fig24_HTML.jpg)\n\nFigure 1-24.\n\
    \nNew JavaFX Application wizard  \n7.  On this screen (Figure [1-24](#A323804_3_En_1_Chapter.html#Fig24)),\
    \ click the Manage Platforms button to make sure the Platform Name field contains\
    \ JDK 1.9 or greater as the default. Click Finish to auto-create the JavaFX HelloWorld\
    \ application.  \n8.  In a few seconds, NetBeans will generate all the necessary\
    \ files for the HelloWorld project. After NetBeans finishes, the project will\
    \ show up on the left Projects tab. Figure [1-25](#A323804_3_En_1_Chapter.html#Fig25)\
    \ shows a newly created HelloWorld project .\n\n![A323804_3_En_1_Fig25_HTML.jpg](A323804_3_En_1_Fig25_HTML.jpg)\n\
    \nFigure 1-25.\n\nA newly created HelloWorld project  \n9.  In the NetBeans IDE\
    \ on the Projects tab (left), select the newly created project. Open the Project\
    \ Properties dialog box from the File menu option Project Properties. Here you\
    \ will verify that the Source/Binary format setting is using JDK 9, as shown in\
    \ Figure [1-26](#A323804_3_En_1_Chapter.html#Fig26). Click Sources under Categories.\n\
    \n![A323804_3_En_1_Fig26_HTML.jpg](A323804_3_En_1_Fig26_HTML.jpg)\n\nFigure 1-26.\n\
    \nProject properties  \n10.  To run and test your JavaFX HelloWorld application,\
    \ ensure the project folder is selected (the left Projects tab), then click on\
    \ the green Run button or press the F6 key to execute the HelloWorld project.\
    \ Figure [1-27](#A323804_3_En_1_Chapter.html#Fig27) shows the Run Project option\
    \ used to launch the JavaFX application.\n\n![A323804_3_En_1_Fig27_HTML.jpg](A323804_3_En_1_Fig27_HTML.jpg)\n\
    \nFigure 1-27.\n\nRunning the HelloWorld project  \n11.  After you choose the\
    \ Run option, the output should look like Figure [1-28](#A323804_3_En_1_Chapter.html#Fig28).\n\
    \n![A323804_3_En_1_Fig28_HTML.jpg](A323804_3_En_1_Fig28_HTML.jpg)\n\nFigure 1-28.\n\
    \nJavaFX HelloWorld launched from the NetBeans IDE\n\nYou shouldn’t encounter\
    \ any difficulty when following Steps 1 through 8. However, steps 9 ensures that\
    \ your project’s source/binary format is using JDK 9\\. Because of the new additions\
    \ to the Java language in Java 9, such as modules, some of the source code in\
    \ this book will rely on the new syntax and therefore will not be backward-compatible\
    \ with prior versions of Java 9\\. Typically, developers have prior versions of\
    \ the Java development kit such as JDK 8\\. NetBeans allows you to switch between\
    \ different JDKs when projects require older versions. An important thing to note\
    \ is that in early releases of JavaFX 2.0, the software was packaged separately\
    \ from the Java SDK, which caused some software versioning confusion. Thank goodness\
    \ it is now just one download (JDK 9)! If you are still using Java 7 SDK, the\
    \ latest download will also contain JavaFX in one bundle since JavaFX 2.1.\n\n\
    Note\n\nDid you know that Java 7 is at the end of its life? This means that Oracle\
    \ will no longer post any updates or releases for the public. Unless you still\
    \ have a commercial license and a support contract with Oracle, it is advised\
    \ you migrate applications to Java 8 or later. Having no updates to Java 7’s runtime\
    \ may be a security concern. So, you’ve been warned. The official Java 7 end of\
    \ life and FAQ site is here: [`https://www.java.com/en/download/faq/java_7.xml`](https://www.java.com/en/download/faq/java_7.xml)\
    \ ."
  trans: "\n## 安装 NetBeans IDE\n\n在开发 JavaFX 应用程序时，您可能会想使用 NetBeans IDE。请务必下载包含 JavaFX\
    \ 的正确 NetBeans 版本。如果您尚未下载 NetBeans IDE，请访问以下位置：\n\n[`https://netbeans.org/downloads/index.html`](https://netbeans.org/downloads/index.html)\n\
    \n要安装 NetBeans IDE，请按照以下步骤操作：\n\n1.  安装 NetBeans 8.2 或更高版本。启动二进制可执行文件。在 Windows\
    \ 平台上，您会收到一条安全警告，告知用户正在安装软件。\n2.  点击“下一步”按钮开始 NetBeans IDE 安装过程。图 1-17 提示用户开始安装过程。\n\
    \n    ![A323804_3_En_1_Fig17_HTML.jpg](img/A323804_3_En_1_Fig17_HTML.jpg)\n\n\
    \    图 1-17.\n\n    NetBeans IDE 安装程序\n3.  阅读并接受 NetBeans 许可协议。阅读并同意条款后，勾选“我接受许可协议中的条款”复选框，然后点击“下一步”继续，如图\
    \ 1-18 所示。\n\n    ![A323804_3_En_1_Fig18_HTML.jpg](img/A323804_3_En_1_Fig18_HTML.jpg)\n\
    \n    图 1-18.\n\n    NetBeans 许可协议\n4.  接下来，您可以选择安装 NetBeans 的目标目录，并选择之前安装的 Java\
    \ 9 SE 开发工具包。通常，保持安装 NetBeans IDE 和 JDK 9 的目标目录为默认设置，如图 1-19 所示。\n\n    ![A323804_3_En_1_Fig19_HTML.jpg](img/A323804_3_En_1_Fig19_HTML.jpg)\n\
    \n    图 1-19.\n\n    NetBeans IDE 安装\n5.  在“摘要”屏幕上，“检查更新”选项允许安装程序检索当前 NetBeans\
    \ 版本以及任何其他插件依赖项的更新或补丁。接受默认设置并点击“安装”按钮，如图 1-20 所示。\n\n    ![A323804_3_En_1_Fig20_HTML.jpg](img/A323804_3_En_1_Fig20_HTML.jpg)\n\
    \n    图 1-20.\n\n    检查更新 图 1-21 显示了安装进度条。\n\n    ![A323804_3_En_1_Fig21_HTML.jpg](img/A323804_3_En_1_Fig21_HTML.jpg)\n\
    \n    图 1-21.\n\n    安装进度\n6.  要完成设置，在图 1-22 中，系统会提示您选择一个可选复选框，以向 NetBeans 团队贡献匿名使用数据，帮助诊断问题并改进产品。决定是否贡献后，点击“完成”按钮完成安装。\n\
    \n    ![A323804_3_En_1_Fig22_HTML.jpg](img/A323804_3_En_1_Fig22_HTML.jpg)\n\n\
    \    图 1-22.\n\n    设置完成\n7.  启动 NetBeans IDE 以查看起始页，如图 1-23 所示。\n\n    ![A323804_3_En_1_Fig23_HTML.jpg](img/A323804_3_En_1_Fig23_HTML.jpg)\n\
    \n    图 1-23.\n\n    NetBeans 起始页\n\n现在，您可以继续前进，创建出色的 JavaFX 应用程序了！\n\n## 创建 JavaFX\
    \ HelloWorld 应用程序\n\n在创建 JavaFX 应用程序时，您将学习三种开发、编译和运行应用程序的方法。\n\n*   NetBeans IDE\n\
    *   编辑器和终端（命令行提示符）\n*   编辑器和 Gradle 构建工具\n\n### 使用 NetBeans IDE\n\n要快速开始使用 NetBeans\
    \ IDE 创建、编码、编译和运行一个简单的 JavaFX HelloWorld 应用程序，请按照本节概述的步骤操作。您可能希望在下一节中更深入地了解 IDE\
    \ 在后台为您做了什么。不过现在，让我们先编写并运行一些代码。\n\n1.  启动 NetBeans IDE。\n2.  在“文件”菜单上，选择“文件” ➤\
    \ “新建项目”。\n3.  在“选择项目和类别”下，选择“JavaFX”文件夹。\n4.  在“项目”下，选择“Java FX 应用程序”，然后点击“下一步”。\n\
    5.  将项目名称指定为 `HelloWorld`。\n6.  更改或接受“项目位置”和“项目文件夹”字段的默认值。图 1-24 显示了用于创建简单 HelloWorld\
    \ 应用程序的“新建 JavaFX 应用程序”向导。\n\n![A323804_3_En_1_Fig24_HTML.jpg](img/A323804_3_En_1_Fig24_HTML.jpg)\n\
    \n图 1-24.\n\n新建 JavaFX 应用程序向导\n7.  在此屏幕（图 1-24）上，点击“管理平台”按钮，确保“平台名称”字段默认包含 JDK\
    \ 1.9 或更高版本。点击“完成”以自动创建 JavaFX HelloWorld 应用程序。\n8.  几秒钟后，NetBeans 将生成 HelloWorld\
    \ 项目所需的所有文件。NetBeans 完成后，该项目将显示在左侧的“项目”选项卡中。图 1-25 显示了一个新创建的 HelloWorld 项目。\n\n\
    ![A323804_3_En_1_Fig25_HTML.jpg](img/A323804_3_En_1_Fig25_HTML.jpg)\n\n图 1-25.\n\
    \n新创建的 HelloWorld 项目\n9.  在 NetBeans IDE 的“项目”选项卡（左侧）中，选择新创建的项目。从“文件”菜单选项“项目属性”中打开“项目属性”对话框。在此处，您将验证“源/二进制格式”设置是否使用了\
    \ JDK 9，如图 1-26 所示。在“类别”下点击“源”。\n\n![A323804_3_En_1_Fig26_HTML.jpg](img/A323804_3_En_1_Fig26_HTML.jpg)\n\
    \n图 1-26.\n\n项目属性\n10. 要运行和测试您的 JavaFX HelloWorld 应用程序，请确保选中项目文件夹（左侧的“项目”选项卡），然后点击绿色的“运行”按钮或按\
    \ F6 键执行 HelloWorld 项目。图 1-27 显示了用于启动 JavaFX 应用程序的“运行项目”选项。\n\n![A323804_3_En_1_Fig27_HTML.jpg](img/A323804_3_En_1_Fig27_HTML.jpg)\n\
    \n图 1-27.\n\n运行 HelloWorld 项目\n11. 选择“运行”选项后，输出应如图 1-28 所示。\n\n![A323804_3_En_1_Fig28_HTML.jpg](img/A323804_3_En_1_Fig28_HTML.jpg)\n\
    \n图 1-28.\n\n从 NetBeans IDE 启动的 JavaFX HelloWorld\n\n按照步骤 1 到 8 操作时，您应该不会遇到任何困难。但是，步骤\
    \ 9 确保您的项目的源/二进制格式使用了 JDK 9。由于 Java 9 中新增了模块等语言特性，本书中的某些源代码将依赖新语法，因此无法向后兼容 Java\
    \ 9 之前的版本。通常，开发人员会拥有较早版本的 Java 开发工具包，例如 JDK 8。当项目需要旧版本时，NetBeans 允许您在不同的 JDK 之间切换。需要注意的一点是，在\
    \ JavaFX 2.0 的早期版本中，该软件与 Java SDK 是分开打包的，这导致了一些软件版本混乱。谢天谢地，现在只需一次下载（JDK 9）即可！如果您仍在使用\
    \ Java 7 SDK，自 JavaFX 2.1 起，最新的下载也将在一个捆绑包中包含 JavaFX。\n\n注意\n\n您知道 Java 7 已经寿终正寝了吗？这意味着\
    \ Oracle 将不再发布任何面向公众的更新或版本。除非您仍拥有商业许可并与 Oracle 签订了支持合同，否则建议您将应用程序迁移到 Java 8 或更高版本。Java\
    \ 7 运行时没有更新可能会带来安全隐患。所以，您已经得到了警告。官方 Java 7 生命周期终止和常见问题解答网站在此： [`https://www.java.com/en/download/faq/java_7.xml`](https://www.java.com/en/download/faq/java_7.xml)\
    \ 。\n"
- fmt: "### Using an Editor and the Terminal (the Command-Line Prompt)\n\nThe second\
    \ way of developing JavaFX 9 applications is to use a common text editor and the\
    \ command-line prompt (terminal). By learning how to compile and execute applications\
    \ on the command-line prompt, you will learn about the classpath and where the\
    \ executable files reside. Being exposed to this will sharpen your skills when\
    \ you are in environments where fancy IDEs and/or editors aren’t easily available.\n\
    \nWorking from the command line, you will basically use a text editor such as\
    \ `nano`, `vi`, `Emacs`, or `Notepad` to code your JavaFX HelloWorld source. The\
    \ example shown in Listing [1-1](#A323804_3_En_1_Chapter.html#Par178) is of a\
    \ HelloWorld Java application.\n\n```\npackage org.acme.helloworld;\nimport javafx.application.Application;\n\
    import javafx.event.ActionEvent;\nimport javafx.event.EventHandler;\nimport javafx.scene.Group;\n\
    import javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.stage.Stage;\n\
    /**\n* A JavaFX Hello World Application\n*/\npublic class HelloWorld extends Application\
    \ {\n/**\n* @param args the command line arguments\n*/\npublic static void main(String[]\
    \ args) {\nApplication.launch(args);\n}\n@Override\npublic void start(Stage stage)\
    \ {\nstage.setTitle(\"Hello World\");\nGroup root = new Group();\nScene scene\
    \ = new Scene(root, 300, 250);\nButton btn = new Button();\nbtn.setLayoutX(100);\n\
    btn.setLayoutY(80);\nbtn.setText(\"Hello World\");\nbtn.setOnAction(new EventHandler()\
    \ {\npublic void handle(ActionEvent event) {\nSystem.out.println(\"Hello World\"\
    );\n}\n});\nroot.getChildren().add(btn);\nstage.setScene(scene);\nstage.show();\n\
    }\n}\nListing 1-1.\nA JavaFX HelloWorld Application from HelloWorld.java\n```\n\
    \nOnce the Java file is created you will use the command-line prompt or terminal\
    \ window to compile and run your JavaFX application. The following are steps to\
    \ create a JavaFX HelloWorld application to be compiled and run on the command-line\
    \ prompt (terminal).\n\n1.  In your user home directory, make a `projects` directory\
    \ and underneath it you will create a `helloworld` directory. On a MacOS or Linux\
    \ operating system, use the following command to make a `projects` directory:\n\
    \n```\n    $ mkdir -p ∼/projects/helloworld/src\n    $ mkdir ∼/projects/helloworld/classes\n\
    \    $ cd ∼/projects/helloworld/\n    $ nano src/HelloWorld.java\n```\n\nOn a\
    \ Windows operating system, use the following command to change directories:\n\
    \n```\n    C:\\Users\\myusername>mkdir projects\n    C:\\Users\\myusername>mkdir\
    \ projects\\helloworld\n    C:\\Users\\myusername>mkdir projects\\helloworld\\\
    src\n    C:\\Users\\myusername>mkdir projects\\helloworld\\classes\n    C:\\Users\\\
    myusername>cd projects\\helloworld\n    C:\\Users\\myusername\\projects\\helloworld>notepad\
    \ src\\HelloWorld.java\n```\n\n2.  Copy and paste the code from Listing [1-1](#A323804_3_En_1_Chapter.html#Par178)\
    \ into a text editor and save the file as `HelloWorld.java`. The file should reside\
    \ inside the `src` directory. Note When entering the code for the `HelloWorld.java`\
    \ file from Listing [1-1](#A323804_3_En_1_Chapter.html#Par178), be sure to include\
    \ the `package org.acme.helloworld;` statement at the top. By doing so, the package\
    \ namespace directories are created when the code is compiled. For example, the\
    \ compiled `HelloWorld.class` file will reside in the `classes/org/acme/helloworld`\
    \ directory.  \n3.  Compile the source code file called `HelloWorld.java` using\
    \ the Java compiler `javac` with the `-d` switch and the `classes` directory.\
    \ The `classes` directory is where the compiled code goes. Also, you need to specify\
    \ the source code files to compile, which is `src/*.java`. The commands you need\
    \ to enter depend on your operating system. On a MacOS X or Linux operating system,\
    \ type the following on the command-line prompt:\n\n```\n    $ javac -d classes\
    \ src/*.java\n```\n\nOn a Windows command line, type the following:\n\n```\n \
    \   C:\\Users\\myusername\\projects\\helloworld> javac -d classes src\\*.java\n\
    ```\n\nNotice the `-d classes` before the filename. The `-d` option (destination\
    \ directory) lets the Java compiler know where to put the compiled class files\
    \ based on their package namespace. In this scenario, the `HelloWorld` package\
    \ statement (namespace) is `org.acme.helloworld`, which will create subdirectories\
    \ under the `classes` directory, assuming you are in the `∼/projects/helloworld`\
    \ project directory. When you’re finished compiling, your directory structure\
    \ should resemble Figure [1-29](#A323804_3_En_1_Chapter.html#Fig29).\n\n![A323804_3_En_1_Fig29_HTML.jpg](A323804_3_En_1_Fig29_HTML.jpg)\n\
    \nFigure 1-29.\n\nThe compiled HelloWorld example creates directories based on\
    \ the package namespace under the classes directory. You will notice the subdirectories\
    \ are created as `org/acme/helloworld` under the `classes` directory you created\
    \ earlier.  \n4.  Run and test your JavaFX HelloWorld application. Assuming you\
    \ are in the `∼/projects/helloworld` directory, type the following command to\
    \ run your JavaFX HelloWorld application from the command-line prompt:\n\n```\n\
    \    $ java -cp classes org.acme.helloworld.HelloWorld\n```\n\nOn Windows OS:\n\
    \n```\nC:\\Users\\myusername\\projects\\helloworld> java -cp classes org.acme.helloworld.HelloWorld\n\
    ```\n\nBy using the `-cp`, classes will let Java know where the classpath directory\
    \ is located. Figure [1-30](#A323804_3_En_1_Chapter.html#Fig30) shows the output\
    \ of a simple JavaFX HelloWorld application launched from the command-line prompt.\n\
    \n![A323804_3_En_1_Fig30_HTML.jpg](A323804_3_En_1_Fig30_HTML.jpg)\n\nFigure 1-30.\n\
    \nJavaFX HelloWorld launched from the MacOS X command-line prompt"
