    ### 工作原理


    本示例创建了一个图形用户界面应用程序，允许用户选择他们最喜欢的英雄。这与通过从列表框组件中添加或删除项目来管理用户角色的系统管理应用程序非常相似。在 JavaFX
    中，代码示例使用了两个 `ListView` 控件来保存 `String` 对象。为简洁起见，我们不讨论布局的使用，而是直接跳转到与按钮操作和 `ListView`
    控件相关的代码。


    基于清单 6-23，在创建 `ListView` 实例之前，代码会创建一个包含候选列表的 `ObservableList`。这里你会注意到使用了一个名为 `FXCollections`
    的工厂类，你可以将常见的集合类型传入其中，这些集合类型会被包装并以 `ObservableList` 的形式返回给调用者。在该示例中，一个字符串数组被传入
    `FXCollections.observableArrayList()` 方法，而不是一个 `ArrayList`。使用 `ObservableList`
    允许你通过一次方法调用同时更新数组中的项目列表和屏幕上的显示内容。


    希望你已了解如何使用 `FXCollections` 类。下面的代码行调用了 `FXCollections.observableArrayList()` 方法类，以返回一个可观察列表（`ObservableList`）：


    ```

    ObservableList candidates = FXCollections.observableArrayList(...);

    ```


    代码创建 `ObservableList` 后，会使用一个接收该可观察列表的构造函数来实例化 `ListView` 类。以下代码创建并填充了一个 `ListView`
    对象：


    ```

    ListView candidatesListView = new ListView(candidates);

    ```


    最后一项任务是代码像操作 `java.util.ArrayList` 一样操作 `ObservableList`。当它们被操作时，`ListView` 会收到通知并自动更新以反映
    `ObservableList` 的变化。清单 6-24 实现了当用户按下向右发送（>）按钮时的动作事件代码。


    ```

    // 选择英雄

    Button sendRightButton = new Button(">");

    sendRightButton.setOnAction( actionEvent -> {

    String potential = candidatesListView.getSelectionModel().getSelectedItem();

    if (potential != null) {

    candidatesListView.getSelectionModel().clearSelection();

    candidates.remove(potential);

    heroes.add(potential);

    }

    });

    清单 6-24.

    处理选定项目的动作代码

    ```


    为了设置按钮的动作代码，代码使用了一个以 `actionEvent`（`ActionEvent`）为参数的 lambda 表达式，该表达式在按钮被点击时调用。当按钮按下事件发生时，代码通过
    `ListView` 上的 `getSelectionModel()` 方法确定 `ListView` 中哪个项目被选中。一旦确定了项目，代码会清除选择、移除该项目，并将该项目添加到
    `Heroes ObserverableList` 中。如果你不清除选择，被移除项目之后的下一个项目将会被选中。


    当使用 `ObserverableList` 时，移除或添加项目会通知控件。其妙处在于，当 `ObserverableList` 发生变化时，无需刷新 `ListView`
    UI 控件，因为 `ListView` 会自动更新。


    ## 使用 TableView


    你还可以在其他类似列表的 UI 控件（如 `TableView`）中使用 `ObservableList`。JavaFX 的 `javafx.scene.control.TableView`
    控件类似于 Swing 的 `JTable` 组件，它包含行、列和单元格，与电子表格应用程序非常相似。以下代码片段创建了一个 `TableView` 控件，其中包含一个针对领域对象
    `firstName` 属性的列。


    ```

    TableView employeeTableView = new TableView();

    TableColumn firstNameCol = new TableColumn("First Name");

    firstNameCol.setCellValueFactory(new PropertyValueFactory("firstName"));

    ```


    ### 什么是单元格工厂？


    单元格工厂提供了一种自定义如何在单元格中显示内容的方法，例如 `ListView` 的一行或 `TableView` 控件中一列的单元格。清单 6-25 展示了如何创建一个单元格工厂，以在
    `ListView` 的单元格行中显示 `Person` 对象的姓和名。


    ```

    // 显示姓和名

    personListView.setCellFactory(new Callback, ListCell>() {

    @Override

    public ListCell call(ListView param) {

    Label leadLbl = new Label();

    ListCell cell = new ListCell() {

    @Override

    public void updateItem(Person item, boolean empty) {

    super.updateItem(item, empty);

    if (item != null) {

    leadLbl.setText(item.getAliasName());

    setText(item.getFirstName() + " " + item.getLastName());

    }

    }

    }; // ListCell

    return cell;

    }

    }); // setCellFactory

    清单 6-25.

    为列表视图控件设置单元格工厂（回调）

    ```


    当然，这段代码看起来有些冗长，因此清单 6-26 展示了使用更简洁的基于 lambda 语法的转换代码。


    ```

    // 使用别名显示姓和名并带工具提示

    personListView.setCellFactory(listView -> {

    Label leadLbl = new Label();

    ListCell cell = new ListCell() {

    @Override

    public void updateItem(Person item, boolean empty) {

    super.updateItem(item, empty);

    if (item != null) {

    leadLbl.setText(item.getAliasName());

    setText(item.getFirstName() + " " + item.getLastName());

    }

    }

    }; // ListCell

    return cell;

    }); // setCellFactory

    清单 6-26.

    使用基于 Lambda 的语法设置单元格工厂以减少样板代码

    ```


    ### 使表格单元格可编辑


    你是否曾希望能够修改单元格？JavaFX 的 `TableView` 控件及其单元格是可以编辑的。在设计 `TableView` 时，JavaFX 工程师已经考虑到了这一点，并提供了便捷的函数来实现可编辑单元格。


    #### 将表格单元格编辑为文本字段


    一种显而易见的可编辑单元格是允许用户使用 `textfield` 控件编辑与该单元格关联的信息。以下代码片段将一个列设置为可编辑的文本字段。


    ```

    TableColumn aliasNameCol = new TableColumn("Alias");

    aliasNameCol.setCellValueFactory(new PropertyValueFactory("aliasName"));

    aliasNameCol.setCellFactory(TextFieldTableCell.forTableColumn());

    ```


    图 6-16 显示了一个包含员工的 `TableView` 控件上“别名”列中的可编辑单元格。


    ![A323804_3_En_6_Fig16_HTML.jpg](img/A323804_3_En_6_Fig16_HTML.jpg)


    图 6-16.


    使用文本字段修改员工信息的可编辑单元格。别名列使用 `TextFieldTableCell.forTableColumn()` 便捷函数设置了单元格工厂。


    #### 将表格单元格编辑为组合框


    另一种常见的编辑单元格控件是组合框。组合框允许用户以下拉列表选择的方式选择枚举值。以下代码片段将一个单元格列设置为组合框。图 6-17 显示了“心情”列单元格内的组合框。


    ![A323804_3_En_6_Fig17_HTML.jpg](img/A323804_3_En_6_Fig17_HTML.jpg)


    图 6-17.


    使用组合框修改员工心情属性的可编辑单元格。心情列使用 `ComboBoxTableCell.forTableColumn()` 便捷函数设置了单元格工厂。


    ```

    import static com.jfxbe.Person.MOOD_TYPES;

    ObservableList moods = FXCollections.observableArrayList(MOOD_TYPES.values());

    TableColumn moodCol = new TableColumn("Mood");

    moodCol.setCellValueFactory(new PropertyValueFactory("mood"));

    moodColumn.setCellFactory(ComboBoxTableCell.forTableColumn(moods));

    ```

