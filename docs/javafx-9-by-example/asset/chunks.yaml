- fmt: '### Maven/Gradle


    Another important thing I’ve not yet mentioned is dependency management when building
    applications. In other words, when you build a Java application, you will need
    to obtain the correctly versioned JAR library dependencies in order to compile,
    deploy, and run your application. Whenever you have one JAR depending on another
    JAR and so on, thus creating a dependency graph (tree), this is called transitive
    dependencies. Having extremely large transitive dependencies often frustrates
    developers when it comes time to trace and debug code. As you will learn later
    with Java 9’s Jigsaw regarding module definitions, you will be able to specify
    how to map dependencies quite easily. This section briefly mentions the popular
    build tool Maven.


    #### Repositories


    To avoid more JAR hell and manage dependencies properly, the Apache group released
    Maven, a build automation tool, in 2004. The build tool established conventions
    for Java projects. One core convention is how a Java project is structured. These
    project structures also led to more standard ways to build Java artifacts (modules).
    While Maven is more than just a build tool, it has also become somewhat of a de
    facto standard for hosting JARs in repositories. These repositories hold all of
    the popular open source JAR libraries used today. Although you can have a private
    repository, the Maven Central is the official public repo on the Internet. I also
    want to give a shout out to the folks from JFrog ( [`https://www.jfrog.com/`](https://www.jfrog.com/)
    ). JFrog is a company who specializes in build and repository infrastructure services.
    JFrog’s Bintray service allows you to host binaries and executables at their repositories
    at [`https://www.jfrog.com/bintray`](https://www.jfrog.com/bintray) .


    #### Maven Coordinates


    The folks who created Apache Maven also created the concept called Maven coordinates,
    where modules (artifacts) are uniquely named using a group ID, an artifact ID,
    and a version. For example, Listing [2-3](#A323804_3_En_2_Chapter.html#Par82)
    includes a Maven coordinate to the popular Netty library for network programming.
    A Maven `pom.xml` file usually will contain a list of dependencies for compilation.


    ```

    io.netty

    netty-all

    4.0.46.Final


    Listing 2-3.

    An Excerpt of a pom.xml Containing a Maven Coordinate to a JAR Dependency

    ```


    To search and locate library dependencies, head over to [`https://search.maven.org`](https://search.maven.org)
    . There you will find popular open source libraries. One last mention regarding
    dependencies and build tools is the Gradle build tool at [`https://gradle.org`](https://gradle.org)
    . Listing [2-4](#A323804_3_En_2_Chapter.html#Par84) shows Gradle’s way of using
    Maven coordinates to use dependencies.


    ```

    dependencies {

    compile ''io.netty:netty-all:4.0.46.Final''

    testCompile ''junit:junit:4.12''

    }

    Listing 2-4.

    A Gradle Script with a Dependency Using Maven Coordinates. The Group ID, Artifact
    ID, and Version Are Separated by Colons.

    ```


    Again, I want to remind you that by the time you read this chapter, the build
    tools such as Maven and Gradle will be able to build (work) against Java 9 module
    code projects.


    Now that you’ve had a glimpse of the past and current history of Java modules,
    let’s get started using Java 9 modules!


    ## Getting Started


    Before you get started implementing modules, this section talks about Java 9’s
    module path. Assuming you already know about the Java classpath, what is new to
    Java 9 is the module path (`--module-path`). Knowing the module path and classpath
    will help you learn how JAR files and classes get loaded. For example, whenever
    you are compiling and running code prior to Java 9 with the Java 9 compiler, you’ll
    want to know how Java 9 modules and legacy JAR files co-exist.


    ### What Is the Module Path?


    The new Java 9 module path is capable of exposing modules and packages to application
    code or other modules while hiding packages you don’t want exposed. In contrast,
    the classpath has no ability to encapsulate JARs as modules and their class types.
    The main issue with the classpath is when you have a public class type from two
    different JAR files. To see more on the issue, look at the earlier section on
    history (JAR hell). So, this begs the question, how do you specify the module
    path?


    You’ll be shown how to create modules later, but for now you’ll learn things a
    little bit backward. What I mean by this is you’ll be shown how to run (execute)
    a module first and then learn how to create a module.


    The module path is a list of elements where each element is either a module JAR
    file or a module directory. Similar to the classpath, each element is separated
    by a path separator such as a `:` or `;` for Unix-like OSes and Windows OS, respectively.
    Here is the usage of the module path when running a module application:


    *   `--module-path` or `-p`: A list of modules as JAR files or directories containing
    modules.

    *   `--module` or `-m`: The name of the module you want to execute and the main
    class separated by a forward slash.


    ```

    $ java --module-path <module path> --module <module>/<main class>

    ```


    Since you will learn how to create and build a modular JAR file later, you’ll
    assume a module already exists on the filesystem. For example, this is how you
    would specify the module path in order to run an application:


    ```

    $ java --module-path com.jfxbe.physicsengine.jar:mods -m com.jfxbe.game/com.carlfx.game.Main

    ```


    In the example, the first element specified on the `--module-path` is a modularized
    JAR file named `com.jfxbe.physicsengine.jar`. Here, the JAR file is located local
    to the current path. The second element specified on the module path is some directory
    named `mods`. The directory `mods` can be named anything, but as a convention
    it’s short for “modules”. The `mods` directory is where the compiled module code
    goes. The `mods` directory can contain one-to-many module directories. These module
    directories contain compiled code similar to the classpath. Listing [2-5](#A323804_3_En_2_Chapter.html#Par97)
    is a directory structure of the compiled code in the `com.jfxbe.game` module.


    ```

    mods/

    |---- com.jfxbe.game/

    |---- module-info.class

    |---- com/

    |     |---- jfxbe/

    |     |     |---- game/

    |     |           |---- Main.class

    |---- images/

    |     |---- player1.png

    |     |---- player2.png

    |     |---- enemy.png

    |---- soundfx/

    |---- snore.au

    Listing 2-5.

    A Directory Structure of the Compiled Code in the com.jfxbe.game Module

    ```


    The `mods` directory contains a module or directory named `com.jfxbe.game` that
    contains the compiled code and resources. You’ll also notice the `module-info.class`
    file is shown in bold in the `com.jfxbe.game` directory. A class file is created
    after compiling a `module-info.java` source file. The `module-info.java` source
    file is called a module definition. Let’s take a look at Java 9’s module definition
    syntax.'
