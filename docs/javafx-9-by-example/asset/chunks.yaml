- fmt: '### “Winding” and Wuthering


    For this custom object, we will build and render something that is geometrically
    simple like a Square Pyramid. A square pyramid has five faces: four equilateral
    vertical triangle faces and a square base. This will allow you to focus on the
    `TriangleMesh` interface rather than the complex math. The goal of a `TriangleMesh`
    is to define process by which a series of triangles are rendered to give the illusion
    of a continuous 3D surface. Each triangle is connected and defined by a set of
    vertices in the 3D scene. The method is called “winding” because when defining
    the vertices of each triangle, the order that the vertices are declared indicates
    to the camera when and how to render the face of that triangle. To explain the
    process of constructing and viewing a `TriangleMesh` object, we will break down
    a method that uses parameters to construct a square pyramid. The complete method
    is shown in Listing [11-10](#A323804_3_En_11_Chapter.html#Par87).


    ```

    /* From TriangleMeshes.java */

    //Step 2a:  Create a general Pyramid TriangleMesh building method with height
    and hypotenuse

    private Group buildPyramid(float height, float hypotenuse,

    Color color,

    boolean ambient,

    boolean fill) {

    final TriangleMesh mesh = new TriangleMesh();

    //End Step 2a

    //Step 2b: Add 5 points, later we will build our faces from these

    mesh.getPoints().addAll(

    0,0,0,                   //Point 0: Top of Pyramid

    0,height,-hypotenuse/2,  //Point 1: closest base point to camera

    -hypotenuse/2,height,0,  //Point 2: left most base point to camera

    hypotenuse/2,height,0,   //Point 3: farthest base point to camera

    0,height,hypotenuse/2    //Point 4: right most base point to camera

    );//End Step 2b

    //Step 2c:

    //for now we''ll just make an empty texCoordinate group

    mesh.getTexCoords().addAll(0,0);

    //End Step 2c

    //Step 2d: Add the faces "winding" the points generally counter clock wise

    mesh.getFaces().addAll( //use dummy texCoords

    0,0,2,0,1,0,  // Vertical Faces "wind" counter clockwise

    0,0,1,0,3,0,  // Vertical Faces "wind" counter clockwise

    0,0,3,0,4,0,  // Vertical Faces "wind" counter clockwise

    0,0,4,0,2,0,  // Vertical Faces "wind" counter clockwise

    4,0,1,0,2,0,  // Base Triangle 1 "wind" clockwise because camera has rotated

    4,0,3,0,1,0   // Base Triangle 2 "wind" clockwise because camera has rotated

    ); //End Step 2d

    //Step 2e: Create a viewable MeshView to be added to the scene

    //To add a TriangleMesh to a 3D scene you need a MeshView container object

    MeshView meshView = new MeshView(mesh);

    //The MeshView allows you to control how the TriangleMesh is rendered

    meshView.setDrawMode(DrawMode.LINE); //show lines only by default

    meshView.setCullFace(CullFace.BACK); //Removing culling to show back lines

    //End Step 2e

    //Step 2f:  Add it to a group, this will be useful later

    Group pyramidGroup = new Group();

    pyramidGroup.getChildren().add(meshView);

    //End Step 2f

    //Step 2g: Customizing your Pyramid

    if(null != color) {

    PhongMaterial material = new PhongMaterial(color);

    meshView.setMaterial(material);

    }

    if(ambient) {

    AmbientLight light = new AmbientLight(Color.WHITE);

    light.getScope().add(meshView);

    pyramidGroup.getChildren().add(light);

    }

    if(fill) {

    meshView.setDrawMode(DrawMode.FILL);

    }

    //End Step 2g

    return pyramidGroup ;

    }

    Listing 11-10.

    A Reusable Method for Building a Custom Pyramid TriangleMesh

    ```


    The new method called `buildPyramid()` converts a height, representing the distance
    from the base to the pyramid apex, and hypotenuse, the distance of the diagonal
    of the base, to vertices. It also builds a `TriangleMesh` object. The remaining
    parameters will allow for customizing how the pyramid is rendered and will be
    explained later in the chapter. The first step is to declare a new `TriangleMesh`
    object. If you already had your points, faces, and texture coordinates defined
    from another process (or model file), you could pass this into an alternative
    `TriangleMesh` constructor. For this example, define the points using:


    ```

    mesh.getPoints().addAll(float x, float y, float z)

    ```


    The `addAll()` method adds float triplets, which represent a point in the scene
    coordinate system. The order by which these points are added matters as their
    indices are used to “wind” the triangle faces later. Before winding the triangles,
    you must first define the 2D texture coordinates that will be associated with
    each triangle face. This can get complicated to explain and likely warrants a
    separate example. Fortunately, the texture coordinates are only needed if you
    intend to wrap your 3D `TriangleMesh` with an image texture file. This example
    creates a single placeholder coordinate, which will be used to fill out the faces
    using:


    ```

    mesh.getTexCoords().addAll(float x, float y);

    ```


    Finally, create your triangles by winding the points defined earlier. Taken from
    Listing [11-10](#A323804_3_En_11_Chapter.html#Par87):


    ```

    mesh.getFaces().addAll( //use dummy texCoords

    0,0,2,0,1,0,  // Vertical Faces "wind" counter clockwise

    0,0,1,0,3,0,  // Vertical Faces "wind" counter clockwise

    0,0,3,0,4,0,  // Vertical Faces "wind" counter clockwise

    0,0,4,0,2,0,  // Vertical Faces "wind" counter clockwise

    4,0,1,0,2,0,  // Base Triangle 1 "wind" clockwise because camera has rotated

    4,0,3,0,1,0   // Base Triangle 2 "wind" clockwise because camera has rotated

    ); //End Step 2d

    ```


    The `getFaces().addAll()` accepts integers that represent a composite of predefined
    points and texture coordinates. Figure [11-7](#A323804_3_En_11_Chapter.html#Fig7)
    breaks down the first face from the example, demonstrating the winding of the
    points in a counter-clockwise fashion.


    ![A323804_3_En_11_Fig7_HTML.jpg](A323804_3_En_11_Fig7_HTML.jpg)


    Figure 11-7.


    Triangle winding using predefined pyramid points


    The counter-clockwise winding order tells the camera system that the “front” of
    the face is facing up, or in this case, facing out from the pyramid object. To
    build the square base, you again use triangles, using two, but the winding is
    done clockwise. This is because the upward faces of these triangles are actually
    facing inward toward the pyramid. By winding clockwise, it tells the camera to
    effectively render the faces in a flipped fashion. This will give the illusion
    of a solid geometric object.'
  raw: '### “Winding” and Wuthering


    For this custom object, we will build and render something that is geometrically
    simple like a Square Pyramid. A square pyramid has five faces: four equilateral
    vertical triangle faces and a square base. This will allow you to focus on the
    `TriangleMesh` interface rather than the complex math. The goal of a `TriangleMesh`
    is to define process by which a series of triangles are rendered to give the illusion
    of a continuous 3D surface. Each triangle is connected and defined by a set of
    vertices in the 3D scene. The method is called “winding” because when defining
    the vertices of each triangle, the order that the vertices are declared indicates
    to the camera when and how to render the face of that triangle. To explain the
    process of constructing and viewing a `TriangleMesh` object , we will break down
    a method that uses parameters to construct a square pyramid. The complete method
    is shown in Listing [11-10](#A323804_3_En_11_Chapter.html#Par87).


    ```

    /* From TriangleMeshes.java */

    //Step 2a:  Create a general Pyramid TriangleMesh building method with height
    and hypotenuse

    private Group buildPyramid(float height, float hypotenuse,

    Color color,

    boolean ambient,

    boolean fill) {

    final TriangleMesh mesh = new TriangleMesh();

    //End Step 2a

    //Step 2b: Add 5 points, later we will build our faces from these

    mesh.getPoints().addAll(

    0,0,0,                   //Point 0: Top of Pyramid

    0,height,-hypotenuse/2,  //Point 1: closest base point to camera

    -hypotenuse/2,height,0,  //Point 2: left most base point to camera

    hypotenuse/2,height,0,   //Point 3: farthest base point to camera

    0,height,hypotenuse/2    //Point 4: right most base point to camera

    );//End Step 2b

    //Step 2c:

    //for now we''ll just make an empty texCoordinate group

    mesh.getTexCoords().addAll(0,0);

    //End Step 2c

    //Step 2d: Add the faces "winding" the points generally counter clock wise

    mesh.getFaces().addAll( //use dummy texCoords

    0,0,2,0,1,0,  // Vertical Faces "wind" counter clockwise

    0,0,1,0,3,0,  // Vertical Faces "wind" counter clockwise

    0,0,3,0,4,0,  // Vertical Faces "wind" counter clockwise

    0,0,4,0,2,0,  // Vertical Faces "wind" counter clockwise

    4,0,1,0,2,0,  // Base Triangle 1 "wind" clockwise because camera has rotated

    4,0,3,0,1,0   // Base Triangle 2 "wind" clockwise because camera has rotated

    ); //End Step 2d

    //Step 2e: Create a viewable MeshView to be added to the scene

    //To add a TriangleMesh to a 3D scene you need a MeshView container object

    MeshView meshView = new MeshView(mesh);

    //The MeshView allows you to control how the TriangleMesh is rendered

    meshView.setDrawMode(DrawMode.LINE); //show lines only by default

    meshView.setCullFace(CullFace.BACK); //Removing culling to show back lines

    //End Step 2e

    //Step 2f:  Add it to a group, this will be useful later

    Group pyramidGroup = new Group();

    pyramidGroup.getChildren().add(meshView);

    //End Step 2f

    //Step 2g: Customizing your Pyramid

    if(null != color) {

    PhongMaterial material = new PhongMaterial(color);

    meshView.setMaterial(material);

    }

    if(ambient) {

    AmbientLight light = new AmbientLight(Color.WHITE);

    light.getScope().add(meshView);

    pyramidGroup.getChildren().add(light);

    }

    if(fill) {

    meshView.setDrawMode(DrawMode.FILL);

    }

    //End Step 2g

    return pyramidGroup ;

    }

    Listing 11-10.

    A Reusable Method for Building a Custom Pyramid TriangleMesh

    ```


    The new method called `buildPyramid()` converts a height, representing the distance
    from the base to the pyramid apex, and hypotenuse, the distance of the diagonal
    of the base, to vertices. It also builds a `TriangleMesh` object. The remaining
    parameters will allow for customizing how the pyramid is rendered and will be
    explained later in the chapter. The first step is to declare a new `TriangleMesh`
    object. If you already had your points, faces, and texture coordinates defined
    from another process (or model file), you could pass this into an alternative
    `TriangleMesh` constructor. For this example, define the points using:


    ```

    mesh.getPoints().addAll(float x, float y, float z)

    ```


    The `addAll()` method adds float triplets, which represent a point in the scene
    coordinate system. The order by which these points are added matters as their
    indices are used to “wind” the triangle faces later. Before winding the triangles,
    you must first define the 2D texture coordinates that will be associated with
    each triangle face. This can get complicated to explain and likely warrants a
    separate example. Fortunately, the texture coordinates are only needed if you
    intend to wrap your 3D `TriangleMesh` with an image texture file. This example
    creates a single placeholder coordinate, which will be used to fill out the faces
    using:


    ```

    mesh.getTexCoords().addAll(float x, float y);

    ```


    Finally, create your triangles by winding the points defined earlier. Taken from
    Listing [11-10](#A323804_3_En_11_Chapter.html#Par87):


    ```

    mesh.getFaces().addAll( //use dummy texCoords

    0,0,2,0,1,0,  // Vertical Faces "wind" counter clockwise

    0,0,1,0,3,0,  // Vertical Faces "wind" counter clockwise

    0,0,3,0,4,0,  // Vertical Faces "wind" counter clockwise

    0,0,4,0,2,0,  // Vertical Faces "wind" counter clockwise

    4,0,1,0,2,0,  // Base Triangle 1 "wind" clockwise because camera has rotated

    4,0,3,0,1,0   // Base Triangle 2 "wind" clockwise because camera has rotated

    ); //End Step 2d

    ```


    The `getFaces().addAll()` accepts integers that represent a composite of predefined
    points and texture coordinates. Figure [11-7](#A323804_3_En_11_Chapter.html#Fig7)
    breaks down the first face from the example, demonstrating the winding of the
    points in a counter-clockwise fashion.


    ![A323804_3_En_11_Fig7_HTML.jpg](A323804_3_En_11_Fig7_HTML.jpg)


    Figure 11-7.


    Triangle winding using predefined pyramid points


    The counter-clockwise winding order tells the camera system that the “front” of
    the face is facing up, or in this case, facing out from the pyramid object. To
    build the square base, you again use triangles, using two, but the winding is
    done clockwise. This is because the upward faces of these triangles are actually
    facing inward toward the pyramid. By winding clockwise, it tells the camera to
    effectively render the faces in a flipped fashion. This will give the illusion
    of a solid geometric object .'
  trans: '

    ### “绕序”与呼啸


    对于这个自定义对象，我们将构建并渲染一个几何形状简单的物体，例如一个四棱锥。四棱锥有五个面：四个等边三角形侧面和一个正方形底面。这将使您能够专注于 `TriangleMesh`
    接口，而不是复杂的数学计算。`TriangleMesh` 的目标是定义一系列三角形被渲染的过程，从而营造出连续 3D 表面的视觉效果。每个三角形都由 3D
    场景中的一组顶点连接并定义。这种方法被称为“绕序”，因为在定义每个三角形的顶点时，顶点声明的顺序会向摄像机指示何时以及如何渲染该三角形的面。为了解释构建和查看
    `TriangleMesh` 对象的过程，我们将分解一个使用参数构建四棱锥的方法。完整的方法如清单 11-10 所示。


    ```

    /* 来自 TriangleMeshes.java */

    //步骤 2a：创建一个通用的、带有高度和斜边参数的 Pyramid TriangleMesh 构建方法

    private Group buildPyramid(float height, float hypotenuse,

    Color color,

    boolean ambient,

    boolean fill) {

    final TriangleMesh mesh = new TriangleMesh();

    //步骤 2a 结束

    //步骤 2b：添加 5 个点，稍后我们将基于这些点构建面

    mesh.getPoints().addAll(

    0,0,0,                   //点 0：金字塔顶点

    0,height,-hypotenuse/2,  //点 1：距离摄像机最近的底边点

    -hypotenuse/2,height,0,  //点 2：距离摄像机最左侧的底边点

    hypotenuse/2,height,0,   //点 3：距离摄像机最远的底边点

    0,height,hypotenuse/2    //点 4：距离摄像机最右侧的底边点

    );//步骤 2b 结束

    //步骤 2c：

    //暂时我们只创建一个空的纹理坐标组

    mesh.getTexCoords().addAll(0,0);

    //步骤 2c 结束

    //步骤 2d：添加面，通常以逆时针方向“绕序”排列点

    mesh.getFaces().addAll( //使用虚拟纹理坐标

    0,0,2,0,1,0,  // 垂直面“绕序”为逆时针

    0,0,1,0,3,0,  // 垂直面“绕序”为逆时针

    0,0,3,0,4,0,  // 垂直面“绕序”为逆时针

    0,0,4,0,2,0,  // 垂直面“绕序”为逆时针

    4,0,1,0,2,0,  // 底面三角形 1 “绕序”为顺时针，因为摄像机已旋转

    4,0,3,0,1,0   // 底面三角形 2 “绕序”为顺时针，因为摄像机已旋转

    ); //步骤 2d 结束

    //步骤 2e：创建一个可查看的 MeshView 以添加到场景中

    //要将 TriangleMesh 添加到 3D 场景，需要一个 MeshView 容器对象

    MeshView meshView = new MeshView(mesh);

    //MeshView 允许您控制 TriangleMesh 的渲染方式

    meshView.setDrawMode(DrawMode.LINE); //默认仅显示线条

    meshView.setCullFace(CullFace.BACK); //移除背面剔除以显示背面线条

    //步骤 2e 结束

    //步骤 2f：将其添加到一个组中，这在后续会很有用

    Group pyramidGroup = new Group();

    pyramidGroup.getChildren().add(meshView);

    //步骤 2f 结束

    //步骤 2g：自定义您的金字塔

    if(null != color) {

    PhongMaterial material = new PhongMaterial(color);

    meshView.setMaterial(material);

    }

    if(ambient) {

    AmbientLight light = new AmbientLight(Color.WHITE);

    light.getScope().add(meshView);

    pyramidGroup.getChildren().add(light);

    }

    if(fill) {

    meshView.setDrawMode(DrawMode.FILL);

    }

    //步骤 2g 结束

    return pyramidGroup ;

    }

    清单 11-10.

    一个用于构建自定义金字塔 TriangleMesh 的可复用方法

    ```


    这个名为 `buildPyramid()` 的新方法将高度（表示从底面到金字塔顶点的距离）和斜边（底面正方形的对角线长度）转换为顶点。它还构建了一个 `TriangleMesh`
    对象。其余参数将允许自定义金字塔的渲染方式，并将在本章后面解释。第一步是声明一个新的 `TriangleMesh` 对象。如果您已经从其他过程（或模型文件）中定义了点、面和纹理坐标，则可以将它们传递给另一个
    `TriangleMesh` 构造函数。对于此示例，请使用以下方式定义点：


    ```

    mesh.getPoints().addAll(float x, float y, float z)

    ```


    `addAll()` 方法添加浮点数三元组，每个三元组代表场景坐标系中的一个点。这些点的添加顺序很重要，因为它们的索引稍后用于“绕序”三角形面。在绕序三角形之前，您必须首先定义与每个三角形面相关联的
    2D 纹理坐标。这解释起来可能比较复杂，可能需要单独举例说明。幸运的是，只有当您打算用图像纹理文件包裹您的 3D `TriangleMesh` 时，才需要纹理坐标。此示例创建了一个占位坐标，用于填充面，方法如下：


    ```

    mesh.getTexCoords().addAll(float x, float y);

    ```


    最后，通过绕序之前定义的点来创建您的三角形。摘自清单 11-10：


    ```

    mesh.getFaces().addAll( //使用虚拟纹理坐标

    0,0,2,0,1,0,  // 垂直面“绕序”为逆时针

    0,0,1,0,3,0,  // 垂直面“绕序”为逆时针

    0,0,3,0,4,0,  // 垂直面“绕序”为逆时针

    0,0,4,0,2,0,  // 垂直面“绕序”为逆时针

    4,0,1,0,2,0,  // 底面三角形 1 “绕序”为顺时针，因为摄像机已旋转

    4,0,3,0,1,0   // 底面三角形 2 “绕序”为顺时针，因为摄像机已旋转

    ); //步骤 2d 结束

    ```


    `getFaces().addAll()` 接受整数，这些整数表示预定义点和纹理坐标的组合。图 11-7 分解了示例中的第一个面，演示了以逆时针方式绕序点的过程。


    ![A323804_3_En_11_Fig7_HTML.jpg](img/A323804_3_En_11_Fig7_HTML.jpg)


    图 11-7.


    使用预定义金字塔点进行三角形绕序


    逆时针绕序顺序告诉摄像机系统，该面的“正面”朝上，或者在此例中，是从金字塔物体向外。为了构建正方形底面，我们再次使用三角形，使用两个三角形，但绕序是顺时针进行的。这是因为这些三角形的朝上面实际上朝向金字塔内部。通过顺时针绕序，它告诉摄像机以翻转的方式渲染这些面。这将营造出一个实心几何物体的视觉效果。

    '
- fmt: '### MeshViews and DrawMode


    `TriangleMesh` objects by themselves cannot be added and rendered by themselves,
    as their geometry must be added to a viewable `Scenegraph` node object. JavaFX
    8 provides this via the `MeshView` class. From Listing [11-10](#A323804_3_En_11_Chapter.html#Par87):


    ```

    MeshView meshView = new MeshView(mesh);

    ```


    The `MeshView` class not only displays the `TriangleMesh` added to it but allows
    you to customize lights, fill, materials, and other features. This is demonstrated
    in Listing [11-10](#A323804_3_En_11_Chapter.html#Par87). Let’s use the new `buildPyramid()`
    method to exercise the flexibility of the `MeshView` class. Listing [11-11](#A323804_3_En_11_Chapter.html#Par99)
    uses `buildPyramid()` to create a pyramid with a `GoldenRod` colored `PhongMaterial`
    and a `DrawMode` set to `LINE`.


    ```

    /* From TriangleMeshes.java */

    //Step 3a:  Create a Pyramid with a color and add to the Scene

    //Lets assume our height is 100 and our width (hypotenuse) at the base is 50.

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD,false,false);

    Group pyramidGroup = new Group(pyramid1);

    sceneRoot.getChildren().addAll(pyramidGroup);

    Listing 11-11.

    Creating a Single Pyramid

    ```


    This will render a pyramid similar to Figure [11-8](#A323804_3_En_11_Chapter.html#Fig8).
    Most of the `pyramid1` object is not viewable because the default scene lighting
    is positioned in a manner that doesn’t reflect much of the geometry.


    ![A323804_3_En_11_Fig8_HTML.jpg](A323804_3_En_11_Fig8_HTML.jpg)


    Figure 11-8. TriangleMesh with default light


    To see the entire geometry regardless of light system, turn on ambient lighting:


    ```

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD,true,false);

    ```


    Let’s also translate the entire geometry closer to the camera.


    ```

    pyramid1.setTranslateZ(-100);

    ```


    You will get a view similar to Figure [11-9](#A323804_3_En_11_Chapter.html#Fig9).
    The geometry you defined in your `TriangleMesh` is now clearly visible.


    ![A323804_3_En_11_Fig9_HTML.jpg](A323804_3_En_11_Fig9_HTML.jpg)


    Figure 11-9. TriangleMesh with ambient light


    Placing `TriangleMesh` objects within `MeshView` objects and `Group` containers
    makes basic transforms simple. A rotation used for a primitive:


    ```

    pyramid1.setRotationAxis(Rotate.Y_AXIS);

    pyramid1.setRotate(45);

    ```


    After the 45-degree rotation around the Y-axis, it should be similar to Figure
    [11-10](#A323804_3_En_11_Chapter.html#Fig10).


    ![A323804_3_En_11_Fig10_HTML.jpg](A323804_3_En_11_Fig10_HTML.jpg)


    Figure 11-10. TriangleMesh rotated


    To fill in the pyramid with colored sides, use the fill parameter in the `buildPyramid()`
    method:


    ```

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD, true, true);

    ```


    This will provide a view similar to Figure [11-11](#A323804_3_En_11_Chapter.html#Fig11).


    ![A323804_3_En_11_Fig11_HTML.jpg](A323804_3_En_11_Fig11_HTML.jpg)


    Figure 11-11. TriangleMesh with DrawMode.FILL


    Listing [11-12](#A323804_3_En_11_Chapter.html#Par113) exercises different combinations
    of transformations to show the utility of the new `buildPyramid()` method.


    ```

    /* From TriangleMeshes.java */

    //Step 3b:  Create and transform a Pyramid using DrawMode FILL

    Group pyramid2 = buildPyramid(100,200,Color.GOLDENROD,true,true);

    //Since the pyramid is a group it can be translated and rotated like a primitive

    pyramid2.setTranslateX(-100);

    pyramid2.setTranslateY(-100);

    pyramid2.setRotationAxis(Rotate.Z_AXIS);

    pyramid2.setRotate(180);

    Group pyramidGroup = new Group(pyramid1,pyramid2);

    sceneRoot.getChildren().addAll(pyramidGroup);

    Listing 11-12.

    Creating and Transforming a Pyramid Using DrawMode.FILL

    ```


    Listing [11-13](#A323804_3_En_11_Chapter.html#Par115) exercises the ability of
    the `buildPyramid()` method to alter the appearance of each pyramid by adding
    pyramids of different material colors.


    ```

    /* From TriangleMeshes.java */

    //Step 3c:  Add some more pyramids of a different color

    Group pyramid3 = buildPyramid(100,200,Color.LAWNGREEN,true,true);

    pyramid3.setTranslateX(100);

    Group pyramid4 = buildPyramid(100,200,Color.LAWNGREEN,true,false);

    pyramid4.setTranslateX(100);

    pyramid4.setTranslateY(-100);

    pyramid4.setRotationAxis(Rotate.Z_AXIS);

    pyramid4.setRotate(180);

    Group pyramidGroup = new Group(pyramid1,pyramid2,pyramid3,pyramid4);

    sceneRoot.getChildren().addAll(pyramidGroup);

    Listing 11-13.

    Creating and Transforming Pyramids of Different Colors.

    ```


    Listings [11-12](#A323804_3_En_11_Chapter.html#Par113) and [11-13](#A323804_3_En_11_Chapter.html#Par115)
    clearly demonstrate the flexibility of the `TriangleMesh` and `MeshView` classes
    within a 3D scene. Adding this code to the example will provide a view similar
    to Figure [11-12](#A323804_3_En_11_Chapter.html#Fig12).


    ![A323804_3_En_11_Fig12_HTML.jpg](A323804_3_En_11_Fig12_HTML.jpg)


    Figure 11-12. Multiple pyramids customized and transformed


    ### Roll Camera!


    The new pyramids still look a little flat. You need a way to roll the camera around
    the pyramids as if it were a satellite orbiting a point of origin. In fact, Listing
    [11-14](#A323804_3_En_11_Chapter.html#Par118) treats the `pyramidGroup` as an
    origin of sorts by adding a simple mouse handler and converting motion to a rotational
    transform of the `pyramidGroup` itself.


    ```

    /* From TriangleMeshes.java */

    //Step 4a: Add a Mouse Handler for Rotations

    Rotate xRotate = new Rotate(0, Rotate.X_AXIS);

    Rotate yRotate = new Rotate(0, Rotate.Y_AXIS);

    pyramidGroup.getTransforms().addAll(xRotate,yRotate);

    //Use Binding so your rotation doesn''t have to be recreated

    xRotate.angleProperty().bind(angleX);

    yRotate.angleProperty().bind(angleY);

    //Start Tracking mouse movements only when a button is pressed

    scene.setOnMousePressed(event -> {

    scenex = event.getSceneX();

    sceney = event.getSceneY();

    anchorAngleX = angleX.get();

    anchorAngleY = angleY.get();

    });

    //Angle calculation will only change when the button has been pressed

    scene.setOnMouseDragged(event -> {

    angleX.set(anchorAngleX - (scenex -  event.getSceneY()));

    angleY.set(anchorAngleY + sceney -  event.getSceneX());

    });

    Listing 11-14.

    Origin Fixed Camera Rotation Mouse Handler

    ```


    This camera control is different from the earlier example in that it does not
    actually move or rotate the camera node but the objects in the scene. This gives
    the illusion that the viewer and camera is rotating around the scene. This is
    an effective means for viewing scenes that are intending to be facing in. The
    trick is to use JavaFX binding to update an existing set of `Rotate` objects.
    This saves the event handler from having to repeatedly create and replace various
    transformation objects. By adding the handler to the example and giving it a spin,
    you can achieve viewing angles similar to Figure [11-13](#A323804_3_En_11_Chapter.html#Fig13).


    ![A323804_3_En_11_Fig13_HTML.jpg](A323804_3_En_11_Fig13_HTML.jpg)


    Figure 11-13. Rotating the camera around a fixed origin


    The view showing in Figure [11-13](#A323804_3_En_11_Chapter.html#Fig13) in particular
    is good because it shows the various pyramids in their different forms. Of particular
    note is the bottom of the base of the pyramid, which is made up of two triangles
    using clockwise winding so that their “down” faces are facing outward toward the
    camera.'
  raw: '### MeshViews and DrawMode


    `TriangleMesh` objects by themselves cannot be added and rendered by themselves,
    as their geometry must be added to a viewable `Scenegraph` node object. JavaFX
    8 provides this via the `MeshView` class. From Listing [11-10](#A323804_3_En_11_Chapter.html#Par87):


    ```

    MeshView meshView = new MeshView(mesh);

    ```


    The `MeshView` class not only displays the `TriangleMesh` added to it but allows
    you to customize lights, fill, materials, and other features. This is demonstrated
    in Listing [11-10](#A323804_3_En_11_Chapter.html#Par87). Let’s use the new `buildPyramid()`
    method to exercise the flexibility of the `MeshView` class. Listing [11-11](#A323804_3_En_11_Chapter.html#Par99)
    uses `buildPyramid()` to create a pyramid with a `GoldenRod` colored `PhongMaterial`
    and a `DrawMode` set to `LINE`.


    ```

    /* From TriangleMeshes.java */

    //Step 3a:  Create a Pyramid with a color and add to the Scene

    //Lets assume our height is 100 and our width (hypotenuse) at the base is 50.

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD,false,false);

    Group pyramidGroup = new Group(pyramid1);

    sceneRoot.getChildren().addAll(pyramidGroup);

    Listing 11-11.

    Creating a Single Pyramid

    ```


    This will render a pyramid similar to Figure [11-8](#A323804_3_En_11_Chapter.html#Fig8).
    Most of the `pyramid1` object is not viewable because the default scene lighting
    is positioned in a manner that doesn’t reflect much of the geometry.


    ![A323804_3_En_11_Fig8_HTML.jpg](A323804_3_En_11_Fig8_HTML.jpg)


    Figure 11-8.


    TriangleMesh with default light


    To see the entire geometry regardless of light system, turn on ambient lighting:


    ```

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD,true,false);

    ```


    Let’s also translate the entire geometry closer to the camera.


    ```

    pyramid1.setTranslateZ(-100);

    ```


    You will get a view similar to Figure [11-9](#A323804_3_En_11_Chapter.html#Fig9).
    The geometry you defined in your `TriangleMesh` is now clearly visible .


    ![A323804_3_En_11_Fig9_HTML.jpg](A323804_3_En_11_Fig9_HTML.jpg)


    Figure 11-9.


    TriangleMesh with ambient light


    Placing `TriangleMesh` objects within `MeshView` objects and `Group` containers
    makes basic transforms simple. A rotation used for a primitive:


    ```

    pyramid1.setRotationAxis(Rotate.Y_AXIS);

    pyramid1.setRotate(45);

    ```


    After the 45-degree rotation around the Y-axis, it should be similar to Figure
    [11-10](#A323804_3_En_11_Chapter.html#Fig10).


    ![A323804_3_En_11_Fig10_HTML.jpg](A323804_3_En_11_Fig10_HTML.jpg)


    Figure 11-10.


    TriangleMesh rotated


    To fill in the pyramid with colored sides, use the fill parameter in the `buildPyramid()`
    method:


    ```

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD, true, true);

    ```


    This will provide a view similar to Figure [11-11](#A323804_3_En_11_Chapter.html#Fig11).


    ![A323804_3_En_11_Fig11_HTML.jpg](A323804_3_En_11_Fig11_HTML.jpg)


    Figure 11-11.


    TriangleMesh with DrawMode.FILL


    Listing [11-12](#A323804_3_En_11_Chapter.html#Par113) exercises different combinations
    of transformations to show the utility of the new `buildPyramid()` method .


    ```

    /* From TriangleMeshes.java */

    //Step 3b:  Create and transform a Pyramid using DrawMode FILL

    Group pyramid2 = buildPyramid(100,200,Color.GOLDENROD,true,true);

    //Since the pyramid is a group it can be translated and rotated like a primitive

    pyramid2.setTranslateX(-100);

    pyramid2.setTranslateY(-100);

    pyramid2.setRotationAxis(Rotate.Z_AXIS);

    pyramid2.setRotate(180);

    Group pyramidGroup = new Group(pyramid1,pyramid2);

    sceneRoot.getChildren().addAll(pyramidGroup);

    Listing 11-12.

    Creating and Transforming a Pyramid Using DrawMode.FILL

    ```


    Listing [11-13](#A323804_3_En_11_Chapter.html#Par115) exercises the ability of
    the `buildPyramid()` method to alter the appearance of each pyramid by adding
    pyramids of different material colors.


    ```

    /* From TriangleMeshes.java */

    //Step 3c:  Add some more pyramids of a different color

    Group pyramid3 = buildPyramid(100,200,Color.LAWNGREEN,true,true);

    pyramid3.setTranslateX(100);

    Group pyramid4 = buildPyramid(100,200,Color.LAWNGREEN,true,false);

    pyramid4.setTranslateX(100);

    pyramid4.setTranslateY(-100);

    pyramid4.setRotationAxis(Rotate.Z_AXIS);

    pyramid4.setRotate(180);

    Group pyramidGroup = new Group(pyramid1,pyramid2,pyramid3,pyramid4);

    sceneRoot.getChildren().addAll(pyramidGroup);

    Listing 11-13.

    Creating and Transforming Pyramids of Different Colors.

    ```


    Listings [11-12](#A323804_3_En_11_Chapter.html#Par113) and [11-13](#A323804_3_En_11_Chapter.html#Par115)
    clearly demonstrate the flexibility of the `TriangleMesh` and `MeshView` classes
    within a 3D scene. Adding this code to the example will provide a view similar
    to Figure [11-12](#A323804_3_En_11_Chapter.html#Fig12).


    ![A323804_3_En_11_Fig12_HTML.jpg](A323804_3_En_11_Fig12_HTML.jpg)


    Figure 11-12.


    Multiple pyramids customized and transformed


    ### Roll Camera !


    The new pyramids still look a little flat. You need a way to roll the camera around
    the pyramids as if it were a satellite orbiting a point of origin. In fact, Listing
    [11-14](#A323804_3_En_11_Chapter.html#Par118) treats the `pyramidGroup` as an
    origin of sorts by adding a simple mouse handler and converting motion to a rotational
    transform of the `pyramidGroup` itself.


    ```

    /* From TriangleMeshes.java */

    //Step 4a: Add a Mouse Handler for Rotations

    Rotate xRotate = new Rotate(0, Rotate.X_AXIS);

    Rotate yRotate = new Rotate(0, Rotate.Y_AXIS);

    pyramidGroup.getTransforms().addAll(xRotate,yRotate);

    //Use Binding so your rotation doesn''t have to be recreated

    xRotate.angleProperty().bind(angleX);

    yRotate.angleProperty().bind(angleY);

    //Start Tracking mouse movements only when a button is pressed

    scene.setOnMousePressed(event -> {

    scenex = event.getSceneX();

    sceney = event.getSceneY();

    anchorAngleX = angleX.get();

    anchorAngleY = angleY.get();

    });

    //Angle calculation will only change when the button has been pressed

    scene.setOnMouseDragged(event -> {

    angleX.set(anchorAngleX - (scenex -  event.getSceneY()));

    angleY.set(anchorAngleY + sceney -  event.getSceneX());

    });

    Listing 11-14.

    Origin Fixed Camera Rotation Mouse Handler

    ```


    This camera control is different from the earlier example in that it does not
    actually move or rotate the camera node but the objects in the scene. This gives
    the illusion that the viewer and camera is rotating around the scene. This is
    an effective means for viewing scenes that are intending to be facing in. The
    trick is to use JavaFX binding to update an existing set of Rotate objects. This
    saves the event handler from having to repeatedly create and replace various transformation
    objects. By adding the handler to the example and giving it a spin, you can achieve
    viewing angles similar to Figure [11-13](#A323804_3_En_11_Chapter.html#Fig13).


    ![A323804_3_En_11_Fig13_HTML.jpg](A323804_3_En_11_Fig13_HTML.jpg)


    Figure 11-13.


    Rotating the camera around a fixed origin


    The view showing in Figure [11-13](#A323804_3_En_11_Chapter.html#Fig13) in particular
    is good because is shows the various pyramids in their different forms. Of particular
    note is the bottom of the base of the pyramid, which is made up of two triangles
    using clockwise winding so that their “down” faces are facing outward toward the
    camera.'
  trans: '

    ### MeshViews 与 DrawMode


    `TriangleMesh` 对象本身无法直接添加和渲染，因为其几何体必须添加到可显示的 `Scenegraph` 节点对象中。JavaFX 8 通过 `MeshView`
    类提供了这一功能。来自清单 11-10：


    ```

    MeshView meshView = new MeshView(mesh);

    ```


    `MeshView` 类不仅能够显示添加到其中的 `TriangleMesh`，还允许你自定义光照、填充、材质和其他特性。这在清单 11-10 中得到了演示。让我们使用新的
    `buildPyramid()` 方法来展示 `MeshView` 类的灵活性。清单 11-11 使用 `buildPyramid()` 创建了一个金字塔，其材质为
    `GoldenRod` 颜色的 `PhongMaterial`，并且 `DrawMode` 设置为 `LINE`。


    ```

    /* 来自 TriangleMeshes.java */

    //步骤 3a：创建一个带有颜色的金字塔并添加到场景中

    //假设高度为 100，底部宽度（斜边）为 50。

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD,false,false);

    Group pyramidGroup = new Group(pyramid1);

    sceneRoot.getChildren().addAll(pyramidGroup);

    清单 11-11.

    创建单个金字塔

    ```


    这将渲染出一个类似于图 11-8 的金字塔。`pyramid1` 对象的大部分内容不可见，因为默认的场景光照位置导致无法反射出大部分几何体。


    ![A323804_3_En_11_Fig8_HTML.jpg](img/A323804_3_En_11_Fig8_HTML.jpg)


    图 11-8.


    使用默认光照的 TriangleMesh


    为了在不受光照系统影响的情况下看到完整的几何体，请开启环境光照：


    ```

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD,true,false);

    ```


    同时，我们将整个几何体向摄像机方向平移。


    ```

    pyramid1.setTranslateZ(-100);

    ```


    你将获得类似于图 11-9 的视图。你在 `TriangleMesh` 中定义的几何体现在清晰可见。


    ![A323804_3_En_11_Fig9_HTML.jpg](img/A323804_3_En_11_Fig9_HTML.jpg)


    图 11-9.


    使用环境光照的 TriangleMesh


    将 `TriangleMesh` 对象放入 `MeshView` 对象和 `Group` 容器中，使得基本变换变得简单。对一个基本体进行旋转：


    ```

    pyramid1.setRotationAxis(Rotate.Y_AXIS);

    pyramid1.setRotate(45);

    ```


    绕 Y 轴旋转 45 度后，效果应类似于图 11-10。


    ![A323804_3_En_11_Fig10_HTML.jpg](img/A323804_3_En_11_Fig10_HTML.jpg)


    图 11-10.


    旋转后的 TriangleMesh


    要使用彩色侧面填充金字塔，请在 `buildPyramid()` 方法中使用 fill 参数：


    ```

    Group pyramid1 = buildPyramid(100,200,Color.GOLDENROD, true, true);

    ```


    这将提供类似于图 11-11 的视图。


    ![A323804_3_En_11_Fig11_HTML.jpg](img/A323804_3_En_11_Fig11_HTML.jpg)


    图 11-11.


    使用 DrawMode.FILL 的 TriangleMesh


    清单 11-12 展示了不同的变换组合，以体现新 `buildPyramid()` 方法的实用性。


    ```

    /* 来自 TriangleMeshes.java */

    //步骤 3b：使用 DrawMode FILL 创建并变换一个金字塔

    Group pyramid2 = buildPyramid(100,200,Color.GOLDENROD,true,true);

    //由于金字塔是一个组，它可以像基本体一样被平移和旋转

    pyramid2.setTranslateX(-100);

    pyramid2.setTranslateY(-100);

    pyramid2.setRotationAxis(Rotate.Z_AXIS);

    pyramid2.setRotate(180);

    Group pyramidGroup = new Group(pyramid1,pyramid2);

    sceneRoot.getChildren().addAll(pyramidGroup);

    清单 11-12.

    使用 DrawMode.FILL 创建并变换一个金字塔

    ```


    清单 11-13 展示了 `buildPyramid()` 方法通过添加不同材质颜色的金字塔来改变每个金字塔外观的能力。


    ```

    /* 来自 TriangleMeshes.java */

    //步骤 3c：添加一些其他颜色的金字塔

    Group pyramid3 = buildPyramid(100,200,Color.LAWNGREEN,true,true);

    pyramid3.setTranslateX(100);

    Group pyramid4 = buildPyramid(100,200,Color.LAWNGREEN,true,false);

    pyramid4.setTranslateX(100);

    pyramid4.setTranslateY(-100);

    pyramid4.setRotationAxis(Rotate.Z_AXIS);

    pyramid4.setRotate(180);

    Group pyramidGroup = new Group(pyramid1,pyramid2,pyramid3,pyramid4);

    sceneRoot.getChildren().addAll(pyramidGroup);

    清单 11-13.

    创建并变换不同颜色的金字塔

    ```


    清单 11-12 和 11-13 清晰地展示了 `TriangleMesh` 和 `MeshView` 类在 3D 场景中的灵活性。将此代码添加到示例中，将提供类似于图
    11-12 的视图。


    ![A323804_3_En_11_Fig12_HTML.jpg](img/A323804_3_En_11_Fig12_HTML.jpg)


    图 11-12.


    多个自定义并变换后的金字塔


    ### 旋转摄像机！


    新的金字塔看起来仍然有些扁平。你需要一种方法来让摄像机围绕金字塔旋转，就像卫星绕着一个原点旋转一样。事实上，清单 11-14 通过添加一个简单的鼠标处理器，并将鼠标移动转换为
    `pyramidGroup` 自身的旋转变换，将 `pyramidGroup` 视为某种原点。


    ```

    /* 来自 TriangleMeshes.java */

    //步骤 4a：为旋转添加鼠标处理器

    Rotate xRotate = new Rotate(0, Rotate.X_AXIS);

    Rotate yRotate = new Rotate(0, Rotate.Y_AXIS);

    pyramidGroup.getTransforms().addAll(xRotate,yRotate);

    //使用绑定，这样你的旋转就不必重新创建

    xRotate.angleProperty().bind(angleX);

    yRotate.angleProperty().bind(angleY);

    //仅在按下鼠标按钮时开始跟踪鼠标移动

    scene.setOnMousePressed(event -> {

    scenex = event.getSceneX();

    sceney = event.getSceneY();

    anchorAngleX = angleX.get();

    anchorAngleY = angleY.get();

    });

    //仅在按下鼠标按钮时计算角度变化

    scene.setOnMouseDragged(event -> {

    angleX.set(anchorAngleX - (scenex -  event.getSceneY()));

    angleY.set(anchorAngleY + sceney -  event.getSceneX());

    });

    清单 11-14.

    固定原点的摄像机旋转鼠标处理器

    ```


    这种摄像机控制与之前的示例不同，它实际上并不移动或旋转摄像机节点，而是移动场景中的对象。这给观察者和摄像机正在围绕场景旋转的错觉。这是一种用于查看面向内部场景的有效方法。诀窍是使用
    JavaFX 绑定来更新一组现有的 Rotate 对象。这避免了事件处理器反复创建和替换各种变换对象。通过将此处理器添加到示例中并旋转它，你可以获得类似于图
    11-13 的视角。


    ![A323804_3_En_11_Fig13_HTML.jpg](img/A323804_3_En_11_Fig13_HTML.jpg)


    图 11-13.


    围绕固定原点旋转摄像机


    图 11-13 中显示的视图尤其好，因为它展示了各种金字塔的不同形态。特别值得注意的是金字塔底部的底面，它由两个三角形组成，采用顺时针缠绕，使得它们的“下”面朝外指向摄像机。

