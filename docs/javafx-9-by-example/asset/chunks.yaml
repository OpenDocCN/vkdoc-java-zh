- fmt: '#### Kill Switch


    There are cases where legacy code that has been migrated to Java 9 (modularized
    code) could get a runtime exception raised of type `IllegalAccessException`. This
    is due to the fact that the code is using reflection APIs and Jigsaw’s strong
    encapsulation.


    The engineers at Oracle have decided to provide a kill switch to allow things
    to bypass the illegal access check when using reflection. The intent is to give
    developers more time to migrate code to Java 9 modules; however, the kill switch
    will be removed in Java 10. The following is an example of using the kill switch
    to by pass the runtime exception being raised.


    ```

    $ java --permit-illegal-access -jar xyz.jar

    ```


    You can see the tech note that fully explains this at:


    ```

    http://mail.openjdk.java.net/pipermail/jigsaw-dev/2017-March/011763.html

    ```


    Assuming you are convinced and are ready to jump on the Java Jigsaw train, let’s
    continue the discussion on modules from past to present. Next, I will elaborate
    on the history of Java JAR files used as modules. If you find the history of Java
    modules (prior to Java 9) a little boring, just skip past to the “Getting Started”
    section.


    ## History


    So, modular application and dependency management isn’t new? Right?!


    In the beginning, Java developers created libraries that consisted of class and
    resource files zipped into a single Java archive file called a JAR. Each JAR file
    was considered a module within a Java application. As each JAR file was loaded
    from the classpath, any public APIs within packages could be accessed from the
    library. Although it was convenient to have accesses to various APIs, things began
    to get out of hand, which coined the infamous term JAR hell. (Actually, it was
    originally derived from the term DLL hell, which developers from the Microsoft
    operating system developing with C/C++ coined because there existed dynamically
    linked library files (`*.dll`) that had a similar issue when resolving dependencies
    with shared libraries.)


    ### JAR Hell


    This term JAR hell is often referred to the JVM’s classpath type resolution or
    dependency resolution (on a single classloader). For example, if you had two JAR
    files both containing a `Person` class, but both having slightly different methods
    or attributes (two different versions), you may be wondering which one would be
    used when instantiating a `new Person()` class?


    Of course, this depends on the class loading order, but by default the JVM will
    load classes in the order it which they were specified on the classpath, such
    as the `-cp` switch on the command line. Typically, the first one loaded will
    be the one used (shadowing the second). Some web application environments can
    enforce load orders, such as parent first or child first. You can see how confusing
    this can be when you are trying to debug your application and you have no idea
    which `Person` class it’s using.


    Because of these known issues, many Java experts formed the OSGi Alliance to create
    a standard specification as a first step toward developing modular applications
    on the Java platform. The next section briefly introduces the Java OSGi module
    system.


    ### OSGi


    As Java applications became larger with apps having numerous dependencies, things
    quickly became a nightmare to manage. To solve Java modularity since 2000 the
    OSGi Alliance was formed to create an open standards specification for a Java-based
    modular and services oriented system. OSGi’s goal was to provide a specification
    for vendor’s to create implementations of an application container. An application
    container contains JAR files, called bundles, that can be dynamically loaded without
    restarting the JVM.


    In a nutshell, each JAR bundle contains metadata in a `META-INF/manifest.mf` file
    describing other bundle dependencies. Based on the specification, there are many
    other ways to export packages and encapsulate bundles. Since each bundle (module)
    is loaded in a separate class loader, different versions of the same Java class
    can co-exist on the same JVM. For example, `module A` depends on the module `com.foo.bar-1.0.jar`
    while `module B` depends on the module `com.foo.bar-2.0.jar`, as shown in Figure
    [2-1](#A323804_3_En_2_Chapter.html#Fig1). Both JAR files are bundles with each
    containing their own module definitions (`manifest.mf`).


    ![A323804_3_En_2_Fig1_HTML.jpg](A323804_3_En_2_Fig1_HTML.jpg)


    Figure 2-1. An OSGi container with four distinct bundles. Here, module A depends
    on module `com.foo.bar` version 1.0 and module B depends on module `com.foo.bar`
    version 2.0.


    Assuming the container already contains the two versions of `com.foo.bar`’s JAR
    bundles, a developer would define `module A`’s manifest, as shown in Listing [2-1](#A323804_3_En_2_Chapter.html#Par69),
    and `module B`’s manifest, as shown in Listing [2-2](#A323804_3_En_2_Chapter.html#Par71).


    ```

    Manifest-Version: 1.0

    Bundle-ManifestVersion: 2

    Bundle-Name: module-a

    Bundle-SymbolicName: com.carlfx.myservice1

    Bundle-Version: 1.0.0

    Bundle-Activator: com.carlfx.myservice1.Activator

    Import-Package:  com.foo.bar;version="1.0"

    Export-Package:  com.carlfx.myservice1.api;version="1.0.0"

    Listing 2-1.

    Module A’s manifest.mf File Containing an OSGi Bundle Definition. Module A Depends
    on a Package com.foo.bar from the JAR File com.foo.bar-1.0.jar.

    ```


    Assuming the application is running on an OSGi container, each bundle will undergo
    a bundle loading lifecycle. Similar to operating systems, where each application
    has a process ID (PID), an OSGi container will assign each bundle a unique bundle
    ID. This unique ID allows developers to monitor, stop, and start bundles dynamically.


    ```

    Manifest-Version: 1.0

    Bundle-ManifestVersion: 2

    Bundle-Name: module-b

    Bundle-SymbolicName: com.carlfx.myservice2

    Bundle-Version: 1.0.0

    Bundle-Activator: com.carlfx.myservice2.Activator

    Import-Package:  com.foo.bar;version="2.0"

    Export-Package:  com.carlfx.myservice2.api;version="1.0.0"

    Listing 2-2.

    Module B’s manifest.mf File Containing an OSGi Bundle Definition. Module B Depends
    on a Package com.foo.bar from the JAR File com.foo.bar-2.0.jar.

    ```


    The OSGi specification spells out all the attributes and naming conventions on
    how to define manifest files; however, this can be extremely tedious to do by
    hand. To easily build bundles, check out Bnd tools at [`http://bndtools.org`](http://bndtools.org).
    Also, there are Maven plugins and Gradle plugins for using Bnd tools to assemble
    bundles.


    To be honest, in my experiences with OSGi, I know and believe it is a sound architecture;
    however, I sense the rate of adoption is low due to its steep learning curve when
    developing, debugging, and deploying Java-based applications that run on top of
    it. For example, building `HelloWorld` on an OSGi container is just overkill.
    But if you were interested in building an application launcher that managed dynamic
    services or child apps similar to the Android OS on a mobile device, you may choose
    to use OSGi. In short, OSGi containers allow you to install services and apps
    (bundles) without having to reboot the main Java application and JVM.


    The following are the top four OSGi implementations available:


    *   Apache Felix: [`http://felix.apache.org`](http://felix.apache.org)

    *   Eclipse Equinox: [`http://www.eclipse.org/equinox`](http://www.eclipse.org/equinox)

    *   Eclipse Concierge: [`http://www.eclipse.org/concierge`](http://www.eclipse.org/concierge)

    *   ProSys: [`https://www.bosch-si.com/iot-platform/iot-platform/gateway/software.html`](https://www.bosch-si.com/iot-platform/iot-platform/gateway/software.html)'
