  trans: '

    ## JavaFX 打印 API


    让我们来看看构成 JavaFX 打印 API 的主要类。表 8-1 列出了主要的打印类，并根据 Java 8 Javadoc 文档（ [`javafx.print`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/package-summary.html)
    ）提供了简要说明。


    表 8-1.


    JavaFX 打印 API 类及其描述


    | 类/枚举 | 描述 |

    | --- | --- |

    | [`JobSettings`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/JobSettings.html)
    | `JobSettings` 类封装了打印作业的大部分配置。 |

    | [`PageLayout`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PageLayout.html)
    | `PageLayout` 封装了布局内容所需的信息。 |

    | [`PageRange`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PageRange.html)
    | `PageRange` 用于选择或限制要打印的作业打印流页面。 |

    | [`Paper`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/Paper.html)
    | 一个封装打印机所用纸张介质尺寸的类。 |

    | [`PaperSource`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PaperSource.html)
    | `PaperSource` 是用于纸张的进纸托盘。 |

    | [`Printer`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/Printer.html)
    | `Printer` 实例代表打印作业的目标设备。 |

    | [`PrinterAttributes`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PrinterAttributes.html)
    | 此类封装了打印机与其作业打印能力及其他属性相关的属性。 |

    | [`PrinterJob`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PrinterJob.html)
    | `PrinterJob` 是 JavaFX `scenegraph` 打印的起点。 |

    | [`PrintResolution`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PrintResolution.html)
    | 用于表示打印机在进纸方向和横向方向上以每英寸点数（DPI）为单位的支持设备分辨率的类。 |

    | [`Collation`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/Collation.html)
    | `enum` 类 `Collation` 指定作业中打印文档的每个副本的介质页是否按顺序排列。 |

    | [`PageOrientation`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PageOrientation.html)
    | 一个 `enum` 类，指定打印页面的介质页方向。 |

    | [`PrintColor`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PrintColor.html)
    | 一个 `enum` 类，描述打印应为黑白还是彩色。 |

    | [`Printer.MarginType`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/Printer.MarginType.html)
    | `MarginType`（`enum` 类）用于确定 `PageLayout` 的可打印区域。 |

    | [`PrinterJob.JobStatus`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PrinterJob.JobStatus.html)
    | 一个 `enum` 类，用于报告打印作业的状态。 |

    | [`PrintQuality`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PrintQuality.html)
    | 一个 `enum` 类，用于描述打印质量设置。 |

    | [`PrintSides`](https://docs.oracle.com/javase/8/javafx/api/javafx/print/PrintSides.html)
    | 一个 `enum` 类，用于枚举可能的双面打印模式。 |


    ## Printer 和 PrinterJob


    表 8-1 中展示的众多类可能会让你感到不知所措；然而，你只需要记住 `Printer` 和 `PrinterJob` 类。图 8-2 展示了一个高层级图，显示了重要的
    JavaFX 打印 API 类之间的关系。


    ![A323804_3_En_8_Fig2_HTML.jpg](img/A323804_3_En_8_Fig2_HTML.jpg)


    图 8-2.


    主要 JavaFX 打印类的 UML 图


    为了节省空间，图 8-2 中显示的 UML 图仅展示了 `PrinterAttributes` 对象的部分打印机属性，而非全部。你会注意到该图只显示了几个具有一对多关系的
    `Paper`、`PaperSource` 和 `PrintResolution` 对象的打印机属性。不过，稍后你将看到输出打印机所有支持属性的示例代码。现在，让我们先看看查询打印机的方法。


    为了轻松开始查询信息，你可以将注意力集中在 `Printer` 和 `PrinterJob` 类上。`Printer` 和 `PrinterJob` 类都包含静态方法，分别用于查询打印机信息和创建打印作业。


    要列出可用的打印机，你可以调用 `static` 方法 `Printer.getAllPrinter()`，如清单 8-3 所示。


    ```

    Printer.getAllPrinters()

    .forEach(System.out::println);

    清单 8-3.

    从 Printer 类列出可用打印机

    ```


    以下是清单 8-3 的输出结果。它显示了在我的 Apple Macbook Pro 上可用的打印机列表。根据你的操作系统环境和连接的打印机，你可能会看到不同的结果。


    ```

    Printer EPSON XP-430 Series

    Printer S300-S400 Series

    ```


    `Printer` 类上另一个方便的静态方法是 `getDefaultPrinter()`，用于获取系统的默认打印机。根据你的桌面操作系统，如果尚未设置默认打印机，用户可以前往打印机/扫描仪设置进行设置。在
    Windows 操作系统上，你需要导航到控制面板的“设置” ➤ “设备” ➤ “<打印机>”。在 MacOS 系统上，导航到“系统偏好设置” ➤ “打印机与扫描仪”。在这两种操作系统上，你都可以右键单击选定的“<打印机>”将其设置为默认打印机。


    获取 `Printer` 对象后，你可以调用 `getPrinterAttributes()` 方法，该方法返回一个 `PrinterAttributes`
    对象，用于检索打印机支持的功能。`PrinterAttributes` 对象将包含各种方法，用于确定支持的方向、纸张类型、纸张来源或打印分辨率。

