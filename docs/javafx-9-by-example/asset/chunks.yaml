    ### 工作原理


    我之前提到过，`PlayingVideo.java` 的源代码与音频播放器项目的代码基本相同，只做了少量修改。让我们从这些修改开始。在 `start()`
    方法中，根面板（`AnchorPane`）被创建，并使用 `play-video.css` 文件进行样式设置。JavaFX CSS 将为应用程序和控件设置样式。为确保应用程序样式正确，请务必从本书网站下载源代码。下载源代码后，请确保资源（如
    `play-video.css`）位于编译后的代码中。这样，在运行时就可以通过类路径加载这些资源。


