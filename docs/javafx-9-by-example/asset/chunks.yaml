  trans: '

    ### 工作原理是什么？


    `jfxmobile` 插件会为你的 Java 应用添加一系列任务，使你能够创建可上传至 Apple App Store 和 Android Play Store
    的软件包。


    `jfxmobile` 插件会下载并安装所需的 JavaFX SDK：


    *   **Android 的 Dalvik SDK**：该插件当前依赖于 `org.javafxports:dalvik-sdk:8.60.9` 和 `org.javafxports:jfxdvk:8.60.9`。

    *   **Retrolambda 插件**：将代码转换为兼容 Java 6 的字节码，当前依赖于 `net.orfjackal.retrolambda:retrolambda:2.5.1`。

    *   **iOS SDK**：该插件当前依赖于 `org.javafxports:ios-sdk:8.60.9`。

    *   **MobiDevelop**：RoboVM 1.8.0 的一个分支，用于将代码编译为兼容 iOS 的字节码。当前依赖于 `com.mobidevelop.robovm:robovm-dist:tar.gz:nocompiler:2.3.0`。


    上述 SDK 的源代码可在此处获取：[`http://bitbucket.org/javafxports/8u-dev-rt`](http://bitbucket.org/javafxports/8u-dev-rt)。


    在 Android 上，该插件随后会执行一系列命令，最终在 `build/javafxports/android` 目录下生成一个 Android 软件包（APK）。该软件包将被部署并安装到设备上。清单
    13-3 展示了在 Android 上成功部署的输出，其中列出了所有涉及的任务。


    注意


    运行 Gradle 任务时，请使用 `--info`、`--debug` 或 `--stracktrace` 来获取更详细的输出，这有助于你精确定位错误和问题，例如：`gradle
    --info androidInstall`。


    ```

    $ gradle androidInstall

    :validateManifest

    :collectMultiDexComponents

    :compileJava

    :processResources UP-TO-DATE

    :classes

    :compileAndroidJava UP-TO-DATE

    :copyClassesForRetrolambda

    :applyRetrolambda

    Retrolambda 2.5.1

    :mergeClassesIntoJar

    :shrinkMultiDexComponents

    :createMainDexList

    :writeInputListFile

    :dex

    :mergeAndroidAssets

    :mergeAndroidResources

    :processAndroidResources UP-TO-DATE

    :processAndroidResourcesDebug

    :validateSigningDebug

    :apkDebug

    :zipalignDebug

    :androidInstall

    Installed on device.

    BUILD SUCCESSFUL

    Total time: 41.168 secs

    清单 13-3.

    运行 androidInstall 时的输出

    ```


    在 iOS 上，内部情况有所不同，但 Gradle 命令是相似的。该插件会下载并安装 RoboVM 编译器，并使用 RoboVM 编译器命令在 `build/javafxports/ios`
    目录下创建一个 iOS 应用。


    注意


    在移动设备上运行应用时，可以通过在 Android 设备上运行 `<path.to.android skd>/platform-tools/adb logcat`
    来访问标准输出。在 Mac 上，打开 Xcode ➤ Windows ➤ Devices 并选择 iOS 设备来访问输出。


    最后，Gradle 遵循“约定优于配置”的原则，应用于该插件的默认配置使得 `build.gradle` 文件极其简单。你可以根据需要修改此配置。请查阅 [`http://docs.gluonhq.com/javafxports/#anchor-3`](http://docs.gluonhq.com/javafxports/#anchor-3)
    上的文档，以获取 Android 和 iOS 上所有可修改属性的完整列表。


    ### 将应用提交到商店


    当你在移动设备上完成应用测试后，可以继续将其上传到 Apple App Store 和 Android Play Store。为此，该插件已包含所需的任务。


    在 Android 上，你需要提供有效的图标图像（位于 `/src/android/res` 下），并且必须在 `AndroidManifest` 文件中禁用调试选项：在
    `application` 标签下，添加 `android:debuggable="false"`。最后，你需要对应用进行签名，具体方法如 [`https://developer.android.com/studio/publish/app-signing.html`](https://developer.android.com/studio/publish/app-signing.html)
    所述。你可以将签名配置添加到 `build.gradle` 文件中，如清单 13-4 所示。


    ```

    jfxmobile {

    android {

    signingConfig {

    storeFile file("path/to/my-release-key.keystore")

    storePassword ''STORE_PASSWORD''

    keyAlias ''KEY_ALIAS''

    keyPassword ''KEY_PASSWORD''

    }

    manifest = ''lib/android/AndroidManifest.xml''

    }

    }

    清单 13-4.

    Android 上的签名配置

    ```


    如果一切设置完毕，运行 `gradle androidRelease` 以在 `/build/javafxports/android` 下生成 APK。要将其上传到商店，你需要注册成为
    Google Play 开发者（ [`https://play.google.com/apps/publish/signup/`](https://play.google.com/apps/publish/signup/)
    `)` 并填写所需的表单。


    在 iOS 上，提供应用的图标，并且一旦你注册了 Apple Developer 计划，就需要使用生产环境的配置文件对应用进行签名，如清单 13-5 所示。运行
    `gradle createIpa`，然后通过 Xcode ➤ Open Developer Tool ➤ Application Loader 提交位于
    `/build/javafxports/ios` 的应用。可以通过在 `/src/ios/Default-Info.plist` 文件中的 `plist`
    里添加相应的键来修复该工具提示缺失的初始要求。完成后，前往 iTunes Connect ( [`https://itunesconnect.apple.com`](https://itunesconnect.apple.com)
    ) 准备发布应用。与任何其他常规 iOS 应用一样，通常需要经过几次迭代才能让应用获得提交批准，直到你满足审核者的所有要求。


    ```

    jfxmobile {

    ios {

    arch = "arm64"

    infoPList = file(''src/ios/Default-Info.plist'')

    forceLinkClasses = [''your.package.**.*'',...]

    iosProvisioningProfile = ''MyApp''

    iosSignIdentity = ''iPhone Distribution: ******''

    }

    }

    清单 13-5.

    iOS 上的签名配置

    ```


    ## Gluon Mobile


    Gluon Mobile 库旨在帮助开发者从单一的 Java 代码库出发，为 iOS 和 Android 创建高性能、外观精美且支持云连接的移动应用。它通过提供用于现代
    Material Design 用户界面的 API、访问移动设备功能、连接 Web 服务以及在多个设备间同步状态，从而缩短了应用上市时间。


    Gluon Mobile 是一个客户端库和开发工具，它能够：


    *   使用 Glisten（一个提供原生外观和感觉的 UI 组件，包含 JavaFX 控件和特定布局）为客户端应用提供 UI 控件。

    *   使用 Connect（一个开源项目，允许与 Gluon CloudLink 本身及其他 Web 服务进行通信）处理与服务器端 Gluon CloudLink
    的通信。更多信息请访问 [`http://gluonhq.com/products/mobile/connect/`](http://gluonhq.com/products/mobile/connect/)。

    *   通过使用 Charm Down（一个开源项目，提供一系列服务，如文件系统、本地或推送通知、GPS、传感器、相机等）来抽象（部分）平台特定的 API。更多详情请访问
    [`http://gluonhq.com/products/mobile/charm-down/`](http://gluonhq.com/products/mobile/charm-down/)。


    要开始使用 Gluon Mobile，你可以从头创建一个 Gradle 项目，修改任何现有的示例（ [`http://gluonhq.com/support/samples/`](http://gluonhq.com/support/samples/)
    ），或者安装并使用适用于你 IDE 的 Gluon 插件。


    ### Gluon IDE 插件


    适用于你 IDE 的 Gluon 插件有助于在你的 IDE 内部创建 Gluon 应用项目：以下 IDE 都有对应的插件：


    *   **NetBeans**。参见说明：[`http://docs.gluonhq.com/charm/latest/#netbeans-plugin`](http://docs.gluonhq.com/charm/latest/#netbeans-plugin)。

    *   **IntelliJ IDEA**。参见：[`http://docs.gluonhq.com/charm/latest/#intellij-plugin`](http://docs.gluonhq.com/charm/latest/#intellij-plugin)。

    *   **Eclipse**。参见：[`http://docs.gluonhq.com/charm/latest/#eclipse-plugin`](http://docs.gluonhq.com/charm/latest/#eclipse-plugin)。


    安装插件后，选择 New Project，进入 Gluon 类别，然后挑选一个可用的模板（见图 13-2）。你将创建一个项目，可以轻松修改和调整以创建自己的应用。


    ![A323804_3_En_13_Fig2_HTML.jpg](img/A323804_3_En_13_Fig2_HTML.jpg)


    图 13-2.


    IntelliJ 的 Gluon 插件及可用模板

