    ```


    你可以查阅 Gluon CloudLink 文档中的“数据存储”部分（[`http://docs.gluonhq.com/cloudlink/#_data_storage`](http://docs.gluonhq.com/cloudlink/#_data_storage)），以更详细地了解
    `DataClient` 和 `GluonObservableList` 的概念。


    ### 修改主视图


    现在是时候修改默认视图了。它们的 FXML 文件可以使用 Scene Builder 进行编辑。自 8.3.0 版本起（可从 [`http://gluonhq.com/products/scene-builder/`](http://gluonhq.com/products/scene-builder/)
    下载并安装），所需的依赖项已包含在内，你可以轻松设计 Gluon Mobile 视图。参见图 13-9。


    ![A323804_3_En_13_Fig9_HTML.jpg](img/A323804_3_En_13_Fig9_HTML.jpg)


    图 13-9.

    使用 Scene Builder 编辑的主视图


    首先，打开主视图（`main.fxml`）。要预览 Gluon 样式，请选择“预览” ➤ “JavaFX 主题” ➤ “Gluon Mobile”。删除默认内容，并在视图底部添加一个
    `BottomNavigation` 控件，其中包含两个按钮：一个用于创建新游戏，另一个用于恢复已有游戏。


    现在，添加一个 `VBox` 容器，该容器将包含一个 `GridPane`，其中放置两个来自 Gluon Mobile 的 `TextField` 控件，以便用户设置球队名称。当选中“新游戏”按钮时，该容器将可见。再添加第二个
    `VBox`，它将包含一个 `CharmListView` 控件（一个带有标题的增强型列表），用于显示可用的不同游戏。当选中“恢复”按钮时，该容器将可见。请注意，对于添加的每个控件，你都需要分配一个
    `fx:id` 标签，以便在控制器类中引用它们。图 13-9 显示了添加这些更改后的主视图。


    编辑后的 FXML 文件，以及本示例的其他源代码，都可以在本书的代码仓库中找到。


    现在，将所有带标签的控件添加到展示器中，如代码清单 13-13 所示。

    '
- fmt: '```java

    package org.jfxbe.basketstats.views;

    import static com.gluonhq.charm.glisten.afterburner.DefaultDrawerManager.DRAWER_LAYER;

    import com.gluonhq.charm.glisten.afterburner.GluonPresenter;

    import com.gluonhq.charm.glisten.control.*;

    import com.gluonhq.charm.glisten.mvc.View;

    import com.gluonhq.charm.glisten.visual.MaterialDesignIcon;

    import java.time.*;

    import java.util.ResourceBundle;

    import javafx.collections.FXCollections;

    import javafx.fxml.FXML;

    import javafx.scene.control.*;

    import javafx.scene.layout.*;

    import javax.inject.Inject;

    import org.jfxbe.basketstats.BasketStats;

    import org.jfxbe.basketstats.service.Service;

    import org.jfxbe.basketstats.utils.GameUtils;

    import org.jfxbe.basketstats.views.cells.*;

    public class MainPresenter extends GluonPresenter {

    @Inject private Service service;

    @FXML private View main;

    @FXML private GridPane gridNew;

    @FXML private TextField textNameA, textNameB;

    @FXML private Button buttonNew;

    @FXML private VBox restoreBox;

    @FXML private CharmListView gameList;

    @FXML private ToggleButton newToggle, restoreToggle;

    @FXML private ResourceBundle resources;

    public void initialize() {

    main.showingProperty().addListener((obs, oldValue, newValue) -> {

    if (newValue) {

    AppBar appBar = getApp().getAppBar();

    appBar.setNavIcon(MaterialDesignIcon.MENU.button(e ->

    getApp().showLayer(DRAWER_LAYER)));

    appBar.setTitleText(resources.getString("main.app.title"));

    }

    });

    buttonNew.disableProperty().bind(textNameA.textProperty().isEmpty()

    .or(textNameB.textProperty().isEmpty())

    .or(textNameA.textProperty().isEqualTo(textNameB.textProperty())));

    buttonNew.setOnAction(e -> {

    service.getGame().setTeamA(textNameA.getText());

    service.getGame().setTeamB(textNameB.getText());

    service.getGame().setLocalDateTime(LocalDateTime.now());

    GameUtils.restoreGame(service.getGame().getGameName());

    });

    restoreBox.managedProperty().bind(restoreBox.visibleProperty());

    gridNew.managedProperty().bind(gridNew.visibleProperty());

    gameList.setPlaceholder(new Label(resources.getString("main.listview.noitems")));

    gameList.setHeadersFunction(GameUtils::getLocalDateFromGame);

    gameList.setHeaderCellFactory(p -> new HeaderGameListCell());

    gameList.setHeaderComparator((l1, l2) -> l2.compareTo(l1));

    gameList.setCellFactory(p -> new GameListCell(resources));

    restoreToggle.selectedProperty().addListener((obs, ov, nv) -> {

    if (nv) {

    gridNew.setVisible(false);

    restoreBox.setVisible(true);

    gameList.setItems(FXCollections.observableArrayList(

    GameUtils.retrieveGames()));

    }

    });

    newToggle.selectedProperty().addListener((obs, ov, nv) -> {

    if (nv) {

    restoreBox.setVisible(false);

    gridNew.setVisible(true);

    }

    });

    newToggle.setSelected(true);

    }

    }

    ```


    **Listing 13-13.** The Main Presenter


    The presenter adds the required listeners to the controls and cell factories for
    the header and regular cells of the `CharmListView` control upon initialization
    (both cell factory classes can be found in the repository of this book). Using
    injection, the service instance is added to the presenter. To learn more about
    the Gluon Mobile controls, check out the documentation at [`http://docs.gluonhq.com/charm/javadoc/latest/`](http://docs.gluonhq.com/charm/javadoc/latest/).


    When the `New Game` toggle is clicked, the grid is visible and the list view is
    hidden, as shown in Figure [13-10a](#A323804_3_En_13_Chapter.html#Fig10). When
    the `Restore Game` toggle is selected, the grid will be hidden, and the list view
    will present all the existing games so far, as shown in Figure [13-10b](#A323804_3_En_13_Chapter.html#Fig10).
    Note that the stored games have a name and extension like `Game-Bears-Tigers-17328-70904.gam`,
    as defined in the `Game` class.


    ![A323804_3_En_13_Fig10a_HTML.jpg](A323804_3_En_13_Fig10a_HTML.jpg)![A323804_3_En_13_Fig10b_HTML.jpg](A323804_3_En_13_Fig10b_HTML.jpg)


