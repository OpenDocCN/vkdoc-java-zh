  raw: '## Layouts


    One of the greatest challenges in building user interfaces is laying out UI controls
    onto the display area. In GUI applications, it is ideal to allow the user to resize
    a viewable area (Window) while UI controls also resize in order to provide a pleasant
    user experience. Similar to Java’s Swing API, the JavaFX API has stock layouts
    that provide the most common ways to display UI controls onto the scene graph.
    The following are the JavaFX layouts discussed in this section:


    *   [`javafx.scene.layout.HBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/HBox.html)

    *   [`javafx.scene.layout.VBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/VBox.html)

    *   [`javafx.scene.layout.FlowPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/FlowPane.html)

    *   [`javafx.scene.layout.BorderPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/BorderPane.html)

    *   [`javafx.scene.layout.GridPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/GridPane.html)


    Note


    To see other stock layouts not discussed in this chapter, refer to the Javadoc
    documentation at [`https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Pane.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Pane.html)
    .


    ### HBox


    The `HBox` layout’s job is to place JavaFX child nodes in a horizontal row. As
    child nodes are added consecutively, each is appended to the end (right side).
    By default, the `HBox` layout honors the child’s preferred width and height. When
    the parent node is not resizable (a [`Group`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Group.html)
    node, for example), the row height of the `HBox` takes on the height of the child
    node with the greatest preferred height. Also, by default, each child node aligns
    to the top-left ( [`Pos`](https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html)
    `.TOP_LEFT`) position.


    The `HBox` can be configured to have resizing ranges to allow the parent to manage
    and calculate space available upon layout requests. There are many ways you can
    programmatically alter the `HBox`’s layout constraints, such as border, padding,
    margin, spacing, and alignment. Although in this chapter you will learn how to
    set constraints using a programmatic approach, there are also alternative strategies.
    One well known and preferred strategy is to style or set constraints using JavaFX
    CSS attributes; you will catch a glimpse of that approach later in this chapter,
    and more details in Chapter [15](#A323804_3_En_15_Chapter.html), on custom UIs.


    When dealing with nonresizable child nodes such as `Shape` nodes , the parent
    takes into account the `Shape`’s rectangular bounds (`ParentInBounds`), its width
    and height. In contrast, when using resizable nodes such as a `TextField` control,
    the parent (`HBox`) has the ability to manage and compute the available space
    for the `TextField` to grow horizontally. To grow UI controls horizontally within
    an `HBox`, use the static `HBox.setHgrow()` method. Also, assume the `HBox`’s
    parent is resizable and takes up the available space such as a `BorderPane`’s
    center region. The following code snippet sets a `TextField` control to grow horizontally
    when the parent `HBox`’s width is resized:


    ```

    TextField myTextField = new TextField()

    HBox.setHgrow(myTextField, Priority.ALWAYS);

    ```


    #### An HBox Example


    Before you look at the code example, let’s look at a picture of child nodes inside
    an `HBox` node and see how each are spaced appropriately. Figure [5-1](#A323804_3_En_5_Chapter.html#Fig1)
    shows an HBox containing four rectangles—`r1` through `r4`. The picture shows
    the widths of the border, padding, margin, and spacing for the child nodes.


    ![A323804_3_En_5_Fig1_HTML.jpg](A323804_3_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    An example of an HBox layout containing four rectangles


    An example of an `HBox` layout in action, the code shown in Listing [5-1](#A323804_3_En_5_Chapter.html#Par16)
    uses four rectangles as child nodes with varying `HBox` constraints. Nonresizable
    nodes such as rectangle shapes are used in the example to demonstrate the many
    spacing attributes for the `HBox` layout control. For brevity, only the relevant
    code is listed here. To see the full listing, visit the Source Code/Download tab
    of the book’s page at [`www.apress.com`](http://www.apress.com) to download the
    source code.


    ```

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250);

    // pixels space between child nodes

    HBox hbox = new HBox(5);

    // The border is blue, dashed ,

    // 0% radius for all corners,

    // a width of 1 pixel

    BorderStroke[] borderStrokes = new BorderStroke[] {

    new BorderStroke(Color.BLUE,

    BorderStrokeStyle.DASHED,

    new CornerRadii(0.0, true),

    new BorderWidths(1.0))

    };

    hbox.setBorder(new Border(borderStrokes));

    // padding between child nodes only

    hbox.setPadding(new Insets(1));

    // rectangles r1 to r4

    Rectangle r1 = new Rectangle(10, 10);

    Rectangle r2 = new Rectangle(20, 20);

    Rectangle r3 = new Rectangle(5, 20);

    Rectangle r4 = new Rectangle(20, 5);

    // margin of 2 pixels

    HBox.setMargin(r1, new Insets(2,2,2,2));

    hbox.getChildren().addAll(r1, r2, r3, r4);

    root.getChildren().add(hbox);

    // once shown display the dimensions all added up.

    primaryStage.setOnShown((WindowEvent we) -> {

    System.out.println("hbox width  " + hbox.getBoundsInParent().getWidth());

    System.out.println("hbox height " + hbox.getBoundsInParent().getHeight());

    });

    primaryStage.setTitle("HBox Example");

    primaryStage.setScene(scene);

    primaryStage.show();

    Listing 5-1.

    The HBoxExample.java file demonstrates using an HBox layout with shapes as child
    nodes

    ```


    After running the code from Listing [5-1](#A323804_3_En_5_Chapter.html#Par16),
    the following output is shown in Figure [5-2](#A323804_3_En_5_Chapter.html#Fig2).
    In Figure [5-2](#A323804_3_En_5_Chapter.html#Fig2), an `HBox` is shown surrounded
    with a blue dashed border. The HBox instance has four varying sized rectangles.


    ![A323804_3_En_5_Fig2_HTML.jpg](A323804_3_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    The output of the file HBoxExample.java, demonstrating the HBox layout'
  trans: '

    ## 布局


    构建用户界面时最大的挑战之一，就是将 UI 控件布局到显示区域上。在 GUI 应用程序中，理想的情况是允许用户调整可视区域（窗口）的大小，同时 UI 控件也能随之调整大小，以提供愉悦的用户体验。与
    Java 的 Swing API 类似，JavaFX API 也提供了内置布局，这些布局提供了将 UI 控件显示到场景图上的最常见方式。以下是本节讨论的 JavaFX
    布局：


    *   [`javafx.scene.layout.HBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/HBox.html)

    *   [`javafx.scene.layout.VBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/VBox.html)

    *   [`javafx.scene.layout.FlowPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/FlowPane.html)

    *   [`javafx.scene.layout.BorderPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/BorderPane.html)

    *   [`javafx.scene.layout.GridPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/GridPane.html)


    注意


    要查看本章未讨论的其他内置布局，请参阅位于 [`https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Pane.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Pane.html)
    的 Javadoc 文档。


    ### HBox


    `HBox` 布局的作用是将 JavaFX 子节点放置在水平行中。当子节点被连续添加时，每个节点都会被追加到末尾（右侧）。默认情况下，`HBox` 布局会尊重子节点的首选宽度和高度。当父节点不可调整大小时（例如，一个
    [`Group`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Group.html)
    节点），`HBox` 的行高将采用具有最大首选高度的子节点的高度。此外，默认情况下，每个子节点都对齐到左上角（[`Pos`](https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html)
    `.TOP_LEFT`）位置。


    可以配置 `HBox` 的调整大小范围，以允许父节点在布局请求时管理和计算可用空间。您可以通过编程方式更改 `HBox` 的布局约束，例如边框、内边距、外边距、间距和对齐方式。虽然在本章中您将学习如何使用编程方式设置约束，但也有其他替代策略。一种广为人知且首选的策略是使用
    JavaFX CSS 属性来设置样式或约束；您将在本章稍后部分了解该方法，更多细节将在关于自定义 UI 的第 15 章中介绍。


    当处理不可调整大小的子节点（例如 `Shape` 节点）时，父节点会考虑 `Shape` 的矩形边界（`ParentInBounds`）、其宽度和高度。相比之下，当使用可调整大小的节点（例如
    `TextField` 控件）时，父节点（`HBox`）能够管理和计算 `TextField` 水平增长所需的可用空间。要使 UI 控件在 `HBox` 内水平增长，请使用静态方法
    `HBox.setHgrow()`。同时，假设 `HBox` 的父节点是可调整大小的，并且会占用可用空间，例如 `BorderPane` 的中心区域。以下代码片段设置了一个
    `TextField` 控件，使其在父节点 `HBox` 的宽度调整时水平增长：


    ```

    TextField myTextField = new TextField()

    HBox.setHgrow(myTextField, Priority.ALWAYS);

    ```


    #### 一个 HBox 示例


    在查看代码示例之前，让我们先看一下 `HBox` 节点内子节点的图片，并了解它们是如何适当间隔的。图 5-1 展示了一个包含四个矩形（`r1` 到 `r4`）的
    HBox。该图显示了子节点的边框、内边距、外边距和间距的宽度。


    ![A323804_3_En_5_Fig1_HTML.jpg](img/A323804_3_En_5_Fig1_HTML.jpg)


    图 5-1.


    一个包含四个矩形的 HBox 布局示例


    一个实际运行的 `HBox` 布局示例，如清单 5-1 所示，该代码使用了四个矩形作为子节点，并设置了不同的 `HBox` 约束。示例中使用了不可调整大小的节点（如矩形形状），以演示
    `HBox` 布局控件的多种间距属性。为简洁起见，此处仅列出相关代码。要查看完整清单，请访问本书页面上的“源代码/下载”选项卡，网址为 [`www.apress.com`](http://www.apress.com)，以下载源代码。


    ```

    Group root = new Group();

    Scene scene = new Scene(root, 300, 250);

    // 子节点之间的像素间距

    HBox hbox = new HBox(5);

    // 边框为蓝色、虚线、

    // 所有角半径为 0%、

    // 宽度为 1 像素

    BorderStroke[] borderStrokes = new BorderStroke[] {

    new BorderStroke(Color.BLUE,

    BorderStrokeStyle.DASHED,

    new CornerRadii(0.0, true),

    new BorderWidths(1.0))

    };

    hbox.setBorder(new Border(borderStrokes));

    // 仅子节点之间的内边距

    hbox.setPadding(new Insets(1));

    // 矩形 r1 到 r4

    Rectangle r1 = new Rectangle(10, 10);

    Rectangle r2 = new Rectangle(20, 20);

    Rectangle r3 = new Rectangle(5, 20);

    Rectangle r4 = new Rectangle(20, 5);

    // 2 像素的外边距

    HBox.setMargin(r1, new Insets(2,2,2,2));

    hbox.getChildren().addAll(r1, r2, r3, r4);

    root.getChildren().add(hbox);

    // 显示后输出所有累加起来的尺寸

    primaryStage.setOnShown((WindowEvent we) -> {

    System.out.println("hbox width  " + hbox.getBoundsInParent().getWidth());

    System.out.println("hbox height " + hbox.getBoundsInParent().getHeight());

    });

    primaryStage.setTitle("HBox Example");

    primaryStage.setScene(scene);

    primaryStage.show();

    清单 5-1.

    HBoxExample.java 文件演示了使用 HBox 布局并将形状作为子节点

    ```


    运行清单 5-1 中的代码后，输出结果如图 5-2 所示。在图 5-2 中，显示了一个带有蓝色虚线边框的 `HBox`。该 HBox 实例包含四个大小不同的矩形。


    ![A323804_3_En_5_Fig2_HTML.jpg](img/A323804_3_En_5_Fig2_HTML.jpg)


    图 5-2.


    文件 HBoxExample.java 的输出，演示了 HBox 布局

    '
- fmt: '#### Code Walkthrough


    Listing [5-1](#A323804_3_En_5_Chapter.html#Par16) begins by instantiating an `HBox`
    using the single-argument constructor. This constructor takes a value of type
    `double`, which specifies the horizontal space (in pixels) between child nodes.
    This is also the equivalent of invoking the `setSpacing()` method on the `HBox`
    instance. After creating an instance of an `HBox` with five-pixel spacing, the
    code creates a blue colored dashed border with a zero radius for all four corners
    with a one-pixel stroke width. The following code snippet creates an array of
    one `BorderStroke` instance to be drawn around the `HBox` layout pane node.


    ```

    // The border is blue, dashed, 0% radius for all corners,

    // a width of 1 pixel

    BorderStroke[] borderStrokes = new BorderStroke[] {

    new BorderStroke(Color.BLUE,

    BorderStrokeStyle.DASHED,

    new CornerRadii(0.0, true),

    new BorderWidths(1.0))

    };

    hbox.setBorder(new Border(borderStrokes));

    ```


    When creating borders, you will remember from Chapter [3](#A323804_3_En_3_Chapter.html)
    that you used the same concepts to create shapes as when creating strokes. A border’s
    stroke can be created with various styles and colors. All JavaFX layout panes
    will have a `setBorder()` method allowing you to create borders. To create a border,
    you have to create an array of `BorderStroke` objects having at least one. This
    code creates a `BorderStroke` instance with the color blue with a `BorderStrokeStyle.DASHED`
    value. Other stroke styles are `DOTTED`, `SOLID`, and `NONE`. Next, the corner
    radii parameter is set with the constructor `CornerRadii(percent, isPercentage)`.
    When using a `0.0` value, the corners have a zero radius, which creates squared
    shaped corners. By varying the radius, the rectangle can have rounded corners
    appearing like a pill shape. Lastly, the stroke width parameter takes an instance
    of a `BorderWidths` class (double precision).


    After the border has been set, the `HBox` (`hbox`) instance’s `setPadding()` method
    is invoked with an `Insets(1)`, which will set all four sides to use a one-pixel
    space between the border and child nodes. As you’ve seen earlier in Figure [5-1](#A323804_3_En_5_Chapter.html#Fig1),
    the border and inset spacing show the surrounding perimeter.


    Because spacing, padding, margin, and the border pixel widths can often be confusing,
    I’ve illustrated an `HBox` in Figure [5-1](#A323804_3_En_5_Chapter.html#Fig1).
    The figure displays three gray rectangular areas, each five pixels wide, that
    represent the spacing between the child nodes (`r1` through `r4`). Setting the
    spacing uses an `Insets` object that allows you to create space between the `HBox`’s
    child nodes. Spacing is created from the `HBox`’s constructor or the `setSpacing()`
    method. The spacing shown in Figure [5-1](#A323804_3_En_5_Chapter.html#Fig1) is
    the space between the four rectangles (pictured as gray between the rectangle
    shapes). To not be confused with padding, you’ll notice that the inner part of
    the `HBox` between the border and the child nodes is the padding (colored in yellow)
    taking up a one-pixel width surrounding the row.


    After creating all four rectangles, the code sets the margin on rectangle `r1`.
    To set the margin, you’ll notice the static method `HBox.setMargin(Node, Insets)`
    instead of a method on the `HBox` instance. The code creates an `Insets` object
    with a margin of two pixels for the top, right, bottom, and left. As shown in
    Figure [5-1](#A323804_3_En_5_Chapter.html#Fig1), this is the surrounding space
    around rectangle `r1` (blue). To calculate the size of the `HBox`’s dimensions,
    you basically add the border width, padding, spacing, margin, and the child nodes’
    bounds (`ParentInBounds`). When the parent of the `HBox` is a `Group` node (not
    resizable) and the child nodes aren’t resizable, the `HBox`’s dimension will total
    78 pixels wide by 24 pixels high. Tables [5-1](#A323804_3_En_5_Chapter.html#Tab1)
    and [5-2](#A323804_3_En_5_Chapter.html#Tab2) show the breakdown of the width and
    height of the `HBox` instance.


    **Table 5-2.** The `HBox`’s Total Height in Pixels Is Represented by Adding the
    Border, Spacing, Padding, and Preferred Child Widths


    | Notes | Pixels |

    | --- | --- |

    | Top side `HBox`’s border stroke width | 1 |

    | Top padding inset `HBox` between border and rectangle | 1 |

    | Preferred Height of the largest rectangle (`r2`) | 20 |

    | Padding inset of the `HBox` (bottom) | 1 |

    | Border stroke width (bottom) | 1 |

    | Total height of `HBox` in pixels: | 24 |


    **Table 5-1.** The `HBox`’s Total Width in Pixels. All Border, Spacing, Padding,
    and Preferred Child Widths Are Added


    | Notes | Pixels |

    | --- | --- |

    | Left side `HBox`’s border stroke width | 1 |

    | Left side padding inset | 1 |

    | Left side of rectangle1’s margin width | 2 |

    | Width of rectangle 1 | 10 |

    | Right side of rectangle 1’s margin width | 2 |

    | Spacing between Rectangle 1 and 2 | 5 |

    | Width of rectangle 2 | 20 |

    | Spacing between Rectangle 2 and 3 | 5 |

    | Width of rectangle 3 | 5 |

    | Spacing between rectangle 3 and 4 | 5 |

    | Width of rectangle 4 | 20 |

    | Right side of `HBox`’s padding inset | 1 |

    | Right side of `HBox`’s border stroke width | 1 |

    | Total width in pixels: | 78 |


    The total height in pixels of the `HBox` instance consists of the following in
    Table [5-2](#A323804_3_En_5_Chapter.html#Tab2).


    **Note**


    When using a parent that is resizable, such as a `Border` pane with the `HBox`
    instance in the center, the `HBox` node’s width and height will stretch. In this
    scenario, with non-resizable children, the only parts that get stretched are the
    border and padding around the `HBox`, which is the inset of the `BorderPane` parent.
    The dashed border essentially looks like it is surrounding the border pane center
    region taking up the available width and height.


    ### VBox


    The `VBox` layout is similar to an `HBox`, except that it places child nodes stacked
    in a vertical column. As children are added, each is placed beneath the previous
    child node. By default, the `VBox` honors the children’s preferred width and height.
    When the parent node is not resizable (for example, a `Group` node), the maximum
    column’s width is based on the child node with the greatest preferred width. The
    same goes for the `VBox`’s overall height, which is based on the border, padding,
    spacing, margins, and child node’s height all added up.


    Also, by default, each child node aligns to the top-left (`Pos.TOP_LEFT`) position.
    To change the default alignment, use the `setAlignment(Pos value)` method. Refer
    to the Javadoc documentation at `https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html`
    to see all possible positions to align child nodes within a cell. `VBox` layouts
    can be configured to have resizing ranges to allow the parent node to manage and
    calculate space available upon layout requests. Remember, to resize the `VBox`
    and its children, the `VBox`’s parent must also be resizable such as the `BorderPane`
    instance’s center region.'
