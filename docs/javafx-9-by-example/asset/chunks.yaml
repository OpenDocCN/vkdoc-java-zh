  trans: '

    ### 工作原理


    HTML5 允许在浏览器中显示可缩放矢量图形（SVG）内容。SVG 类似于 JavaFX 的场景图（保留模式），其中的节点可以在不同尺寸下缩放，同时保留形状细节，不会产生像素化效果。在此示例中，代码清单
    10-18 代表 Java 源代码，而代码清单 10-19 代表加载到 `WebView` 节点中的 SVG 内容代码。


    在运行示例代码之前，请确保 `clock.svg` 文件位于构建路径中。在 NetBeans 中，你可能需要在运行应用程序之前执行清理和构建操作，这会将资源文件
    `clock.svg` 复制到构建路径中。


    让我们直接进入代码清单 10-18 的代码，从 `start()` 方法开始。该方法首先设置 `Stage` 窗口的标题栏。然后，在创建 Scene 对象时，代码实例化一个
    `WebView` 节点作为根节点。创建完成后，该场景被设置为 `Stage` 窗口的当前场景。


    在加载文件之前，代码基于 `getClass().getResources()` 方法获取文件位置的有效 URL 字符串。


    加载 URL 时，你会注意到调用了 `getEngine().load()`，其中 `getEngine()` 方法会返回一个 `javafx.scene.web.WebEngine`
    对象的实例。这基本上意味着所有实例化的 `WebView` 类都会隐式创建自己的 `javafx.scene.web.WebEngine` 实例。以下代码片段摘自代码清单
    10-18，展示了 JavaFX 的 `WebEngine` 对象加载 `clock.svg` 文件的过程：


    ```

    WebView browser = new WebView();

    URL url = getClass().getResource("clock.svg");

    browser.getEngine().load(url.toExternalForm());

    ```


    你可能想知道为什么 Java 源代码这么少。这是因为 `WebView`（`javafx.scene.web.WebView`）节点仅负责渲染 HTML5
    内容。大部分代码显示在代码清单 10-19 中，其中包含 `clock.svg` 文件。该文件不仅包含 SVG 标记语言，还包含 JavaScript 代码。SVG
    规范支持对元素应用动画。接下来，让我们看看 SVG 内容是如何创建的。


    ### Inkscape 与 SVG


    这个模拟时钟是使用流行的开源 SVG 绘图程序 Inkscape 创建的。由于 Inkscape 超出了本书的范围，我不会讨论该工具的细节。要了解更多关于
    Inkscape 的信息，请访问 [`http://www.inkscape.org/`](http://www.inkscape.org/) 查看教程和演示。要了解更多关于
    SVG 的信息，请访问 [`https://www.w3schools.com/graphics/svg_intro.asp`](https://www.w3schools.com/graphics/svg_intro.asp)
    。


    简而言之，Inkscape 允许设计人员创建形状、文本和效果来生成插图。由于 SVG 文件被视为 HTML5 内容，因此这些文件也可以在支持 HTML5 的浏览器（例如
    `WebView` 节点）中显示。


    运行名为 `DisplayingHtml5Content` 的示例项目时，你会看到时钟的指针通过顺时针旋转来移动或产生动画。你可能想知道时钟指针是如何旋转或定位的。简单来说，当操作
    SVG 元素或任何 HTML5 元素时，将使用 JavaScript 语言。事实上，在此示例中，时钟的时针、分针和秒针节点元素是通过使用代码清单 10-19
    中位于 `<script>` 标签元素之间的 JavaScript 代码来旋转的。


    在这些 `<script>` 标签之间是负责初始化和更新时钟指针的 JavaScript 代码语句。主代码使用 `updateTime()` 函数来计算每个秒针、分针和时针的位置。在时钟指针动画开始之前，代码通过整个
    SVG 文档（位于根 `svg` 元素上）的 `onload` 属性调用 JavaScript `updateTime()` 函数来设置时钟的初始位置。一旦时钟指针设置完毕，SVG
    代码就开始使用 `animateTransform` 元素来制作时钟指针的动画。以下是使秒针无限期动画化的 SVG 代码：


    最后，如果你想创建一个像本示例中描述的时钟，请访问 [`http://screencasters.heathenx.org/blog`](http://screencasters.heathenx.org/blog)
    了解有关 Inkscape 的所有信息。另一个令人印象深刻且美观的自定义控件展示，专注于时钟、仪表和刻度盘，是 Gerrit Grunwald 的 Medusa、Steel
    Series 和 Enzo 库。要感到完全惊叹，请访问他的博客 [`http://harmoniccode.blogspot.com`](http://harmoniccode.blogspot.com)
    。


    ### WebEvents


    如果你已经阅读过第 9 章关于 JavaFX 媒体以及 API 如何设计为事件驱动的讨论，那么你会很高兴地知道 JavaFX Web API 也遵循事件驱动的编程模型。Web
    事件反映了浏览器引发客户端事件（如警报、错误和状态）的方式。在本节中，你将简要了解如何响应基于 Web 的事件。


    如果你熟悉 JavaScript 客户端 Web 开发，你很可能知道如何弹出一个带有消息的警报对话框。如果你不知道如何显示警报框，以下 JavaScript
    代码片段将弹出一个警报对话框（假设你正在使用浏览器）：


    ```

    alert(''JavaFX is Awesome'');


    ```


    通常，老派的 Web 开发人员会使用警报框来调试网页。然而，现代 Web 开发人员更可能使用 JavaScript 函数 `console.log()` 将信息输出到
    Firebug 或 Chrome 浏览器开发者工具提供的控制台中。那么，你认为如果一个包含上述 `alert()` 代码的 HTML 网页被加载到 `WebView`
    节点中会发生什么？


    当代码在 JavaFX `WebView` 节点内执行时，不会弹出本机对话框窗口。但是 `OnAlert` 事件会作为 `javafx.scene.web.WebEvent`
    对象被触发。要设置处理程序，请使用 `setOnAlert()` 方法，其入参类型为 `WebEvent`。


    以下代码片段将接收包含字符串消息的 `WebEvent<String>` 对象，并将该消息输出到控制台：


    ```

    webView.getEngine().setOnAlert((WebEvent wEvent) -> {

    System.out.println("Alert Event - Message: " + wEvent.getData());

    // ... 显示一个 JavaFX Alert 对话框窗口

    });

    ```


    希望在触发警报消息时创建自己的对话框窗口的开发人员，只需响应 `WebEvents` 并使用 JavaFX 对话框 API（例如 `Alert` 实例）即可。表
    10-4 显示了所有 `WebEngine` 的 Web 事件。


    表 10-4.


    javafx.scene.web.WebEngine WebEvents 和属性


    | 设置方法 | 方法属性 | 描述 |

    | --- | --- | --- |

    | `setOnAlert()` | `onAlertProperty()` | JavaScript 警报处理程序 |

    | `setOnError()` | `onErrorProperty()` | WebEngine 错误处理程序 |

    | `setOnResized()` | `onResizedProperty()` | JavaScript 调整大小处理程序 |

    | `setOnStatusChanged()` | `onStatusChanged()` | JavaScript 状态处理程序 |

    | `setOnVisibilityChanged()` | `onVisibilityChangedProperty()` | JavaScript 窗口可见性处理程序
    |

    | `setConfirmHandler()` | `confirmHandlerProperty()` | JavaScript 确认窗口 |


    现在你已经了解了如何检索数据、操作 HTML 以及响应基于浏览器的 Web 事件，让我们看一个结合了你目前所学所有技术的示例。这个示例是一个天气小部件应用程序，它从
    RESTful 端点获取 JSON 数据。你还将看到使用 JavaScript 桥接对象 `netscape.javascript.JSObject` 在
    Java 和 JavaScript 之间进行双向通信。

