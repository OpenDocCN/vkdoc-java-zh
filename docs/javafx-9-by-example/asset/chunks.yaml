    or the `getStylesheets().add()` method. If you decide to create an entire CSS
    to style an entire app, you maybe hesitant to start from scratch.


    Creating an entire look and feel requires hundreds if not thousands of lines of
    code in order to style every UI control in JavaFX. So, it’s a good idea to start
    off with the default look and feel and then override styles using the `getStylesheets().add()`
    method.


    I basically created very small look-and-feel style sheet files to demonstrate
    the ability to swap themes. The simple example CSS files have just a handful of
    CSS styles for a small amount of UI controls that would be styled. In other words,
    the example’s small CSS files are loaded via the `getStylesheets().add()` method,
    which styles only some of the nodes and not every node in the application.


    Because the default style sheet (`Modena.css`) is loaded from the prior call via
    the `setUserAgentStylesheet(null)` method, the smaller custom CSS styling file
    can then “piggyback” onto the default style sheet. What’s nice is that you don’t
    have to start from scratch to create a new look and feel. The following snippet
    of code initially invokes the `setUserAgentStylesheet()` method with a `null`
    value, which loads Modena as the default look and feel. It then sets the scene’s
    additional styling by invoking the `getStylesheets().add()` method.


    ```

    Application.setUserAgentStylesheet(null); // defaults to Modena

    // apply custom look and feel to the scene.

    scene.getStylesheets()

    .add(getClass().getResource("my_cool_skin.css")

    .toExternalForm());

    ```'
  trans: '

    ### 应用 JavaFX CSS 主题


    在领略了一些精美的皮肤和 UI 样式之后，让我们来看看如何应用基于 JavaFX CSS 的样式。JavaFX 能够将层叠样式表应用于场景图及其节点，其方式与
    Web 开发者对 HTML5 元素使用 CSS 样式表非常相似。这些 CSS 样式表是包含属性和值的外部文件，用于为 JavaFX 节点设置样式。一个 JavaFX
    CSS 文件的示例如清单 15-1 所示。


    ```

    /* sample.css */

    .button {

    -fx-text-fill: brighter-sky-blue;

    -fx-border-color: rgba(255, 255, 255, .80);

    -fx-border-radius: 8;

    -fx-padding: 6 6 6 6;

    -fx-font: bold italic 20pt "LucidaBrightDemiBold";

    }

    /* ...更多样式 */

    清单 15-1.

    包含样式属性的 JavaFX CSS 文件

    ```


    这段代码包含一个针对 JavaFX 按钮控件的 CSS 类样式定义。按钮 UI 控件默认具有一个类样式 `button`，该样式映射到以 `-fx-` 为前缀的属性。你将在本章后面学习
    JavaFX CSS 样式设置，但现在我们先讨论如何在 CSS 样式表之间切换，从而动态地为应用程序换肤。


    在本节中，你将学习两种将 CSS 样式表作为外观主题应用于 JavaFX 应用程序的方法。以下是将 JavaFX CSS 文件应用于场景图节点的两种方式。


    *   `javafx.application.Application: setUserAgentStylesheet()`

    *   `javafx.scene.Scene: getStylesheets().add()`


    #### 使用 setUserAgentStylesheet(String URL) 方法


    应用 CSS 样式表的第一种方法是在 JavaFX Application（`javafx.application.Application`）类上调用静态方法
    `setUserAgentStylesheet()`。此静态方法会为 JavaFX 应用程序中的所有场景及其所有子节点设置样式，如下所示。


    ```

    Application.setUserAgentStylesheet(url);

    ```


    `setUserAgentStylesheet(String URL)` 方法接受一个表示 JavaFX CSS 文件的有效 URL 字符串。通常，CSS
    文件被打包在 JAR 应用程序中；但它们也可以位于本地文件系统或远程 Web 服务器上。当 CSS 文件在类路径中时，调用以下方法将找到该 CSS 文件并生成一个用于访问该文件的
    URL 字符串：


    ```

    getClass().getResource("path/some_file.css").toExternalForm()

    ```


    这假设该资源与编译后的类文件位于同一位置并被复制到一起。


    以下代码片段将 `sample.css` 文件加载为 JavaFX 应用程序的当前外观。代码片段中的 `sample.css` 文件与当前类位于同一位置。换句话说，你的
    Java 类和 CSS 文件在同一个目录中，因此文件名前不需要路径。


    ```

    Application.setUserAgentStylesheet(getClass().getResource("sample.css")

    .toExternalForm());

    ```


    `setUserAgentStylesheet()` 方法会将样式全局应用于应用程序拥有的所有场景，例如上下文菜单和子弹出窗口。JavaFX 8 目前包含两个样式表——Caspian
    和 Modena——它们作为默认的跨平台外观皮肤。由于这两个样式表是预定义的，你可以使用 `setUserAgentStylesheet()` 方法轻松地在它们之间切换。以下代码展示了如何在
    Caspian 和 Modena 外观样式表之间切换。


    ```

    // 切换到 JavaFX 2.x 的 CASPIAN 外观。

    Application.setUserAgentStylesheet(STYLESHEET_CASPIAN);

    // 切换到 JavaFX 8 的 Modena 外观。

    Application.setUserAgentStylesheet(STYLESHEET_MODENA);

    ```


    学习专业人士如何做到这一点（创建皮肤）的一个好方法是查看优秀的示例。你可以从 `jfxrt.jar` 文件中提取 CSS 文件（`caspian.css`
    和 `modena.css`），或者查看位于 [`http://openjdk.java.net`](http://openjdk.java.net) 的
    JavaFX 源代码。要获取 `jfxrt.jar`，你必须使用 Java 9 之前的 JDK。


    由于 Java 9 不再在运行时或 JDK 中提供 `jfxrt.jar`，你需要在 `JAVA_HOME` 下查找 `jmods` 目录。Project
    Jigsaw 的一部分工作也是将运行时重构为模块。在 `jmods` 目录中，你应该会找到名为 `javafx.controls.jmod` 的模块。为了进入模块文件，你必须将该模块复制到某个临时目录。接下来，你应该重命名复制的模块，并以
    `.jar` 扩展名结尾以便解压。最后，在重命名后的模块上调用 `jar xvf`。使用你的文件资源管理器或 Finder 定位以下文件：


    ```

    classes/com/sun/javafx/scene/control/skin/modena/modena.css

    ```


    `modena.css` 文件包含了默认外观的所有 JavaFX CSS 样式。你可以从这个文件中学习专家如何为 JavaFX 平台上的每个控件设置样式。


    注意


    当你通过传递 `null` 值调用 `setUserAgentStylesheet(null)` 方法时，默认样式表（Modena）将被自动加载并设置为当前外观。但是，如果你使用的是
    JavaFX 2.x，默认样式表将是 Caspian。


    #### 使用 Scene 的 getStylesheets().add(String URL) 方法


    应用外观的第二种方法是调用 Scene 对象的 `getStylesheets().add()` 方法。与第一种应用外观的方法不同，`getStylesheets().add()`
    方法用于为单个场景及其子节点设置样式。


    通过调用 `getStylesheets().add()` 方法，你可以为单个场景及其子节点设置样式，如下所示：


    ```

    Scene scene = ...

    scene.getStylesheets().add(getClass().getResource("sample.css")

    .toExternalForm());

    ```


    与之前调用 `setUserAgentStylesheet()` 类似，你需要传入一个表示 JavaFX CSS 文件的 URL 字符串。稍后，你将看到一个示例应用程序，它通过使用
    `setUserAgentStylesheet()` 或 `getStylesheets().add()` 方法在不同样式之间切换。如果你决定创建一个完整的
    CSS 来为整个应用程序设置样式，你可能会犹豫是否要从头开始。


    创建一个完整的外观需要数百甚至数千行代码，才能为 JavaFX 中的每个 UI 控件设置样式。因此，一个好的做法是从默认外观开始，然后使用 `getStylesheets().add()`
    方法覆盖样式。


    我基本上创建了非常小的外观样式表文件来演示切换主题的能力。这些简单的示例 CSS 文件只包含少量 CSS 样式，用于设置少量 UI 控件的样式。换句话说，示例中的小型
    CSS 文件是通过 `getStylesheets().add()` 方法加载的，该方法仅对部分节点进行样式设置，而不是应用程序中的每个节点。


    由于默认样式表（`Modena.css`）是通过先前调用 `setUserAgentStylesheet(null)` 方法加载的，因此较小的自定义 CSS
    样式文件可以“依附”在默认样式表之上。好处是你无需从头开始创建新的外观。以下代码片段首先使用 `null` 值调用 `setUserAgentStylesheet()`
    方法，该方法将 Modena 加载为默认外观。然后，它通过调用 `getStylesheets().add()` 方法来设置场景的附加样式。


    ```

    Application.setUserAgentStylesheet(null); // 默认为 Modena

    // 为场景应用自定义外观。

    scene.getStylesheets()

    .add(getClass().getResource("my_cool_skin.css")

    .toExternalForm());

    ```

    '
- fmt: '### An Example of Switching Themes


    To show you how to switch between various CSS style sheets (aka skins or themes),
    I’ve created an example application called the Look N Feel Chooser, which allows
    you to choose between different predefined themes. Figure [15-8](#A323804_3_En_15_Chapter.html#Fig8)
    shows the Look and Feel Chooser example application initially displaying an accordion
    UI control pane with common UI controls, beginning with the Modena look and feel.


    ![A323804_3_En_15_Fig8_HTML.jpg](A323804_3_En_15_Fig8_HTML.jpg)


    Figure 15-8. Predefined look and feel themes to choose from the Look N Feel menu


    In Figure [15-8](#A323804_3_En_15_Chapter.html#Fig8), you’ll notice the menu options
    to select a look and feel (skin). Once a look and feel has been selected, the
    application’s appearance will change dynamically. Figure [15-9](#A323804_3_En_15_Chapter.html#Fig9)
    shows the application switched to the Flat Red look and feel.


    ![A323804_3_En_15_Fig9_HTML.jpg](A323804_3_En_15_Fig9_HTML.jpg)


    Figure 15-9. The Look N Feel Chooser application using the Flat Red look and feel


    In Figure [15-9](#A323804_3_En_15_Chapter.html#Fig9), notice that the accordion
    UI control’s title bar says Scroll Bars & Sliders. It’s expanded with UI controls
    sporting the selected look and feel. This is a great way to show off different
    look and feel themes to your customers or users while their application continues
    to function as usual.


    The next section explains the main source code of the Look N Feel Chooser application
    in Listing [15-2](#A323804_3_En_15_Chapter.html#Par81). For the sake of space,
    you see the `start()` method and not the entire source code. To see the entire
    source code listing of the Look N Feel Chooser application, visit the book’s web
    site to download the project under Chapter [15](#A323804_3_En_15_Chapter.html)’s
    `LookAndFeelChooser`.


    ### The Look N Feel Chooser Example Application Code


    By loading the Look N Feel Chooser project into the NetBeans IDE, you can see
    that the source code consists of six files: `LookNFeelChooser.java`, `lnf_demo.fxml`,
    `controlStyle1.css`, `controlStyle2.css`, `flatred.css`, and `sky.css`. The `.ttf`
    files are TrueType fonts that are used in the Flat Red look and feel. Figure [15-10](#A323804_3_En_15_Chapter.html#Fig10)
    shows the project structure in the NetBeans IDE.


    ![A323804_3_En_15_Fig10_HTML.jpg](A323804_3_En_15_Fig10_HTML.jpg)


    Figure 15-10. The Look N Feel Chooser project structure in the NetBeans IDE


    Looking at the project structure, you’ll notice the `LookNFeelChooser.java` file
    as the main driver application class. The `lnf_demo.fxml` file is an FXML-formatted
    file representing the center content, which contains the accordion UI control
    with other UI control elements. The FXML file was created by the Scene Builder
    tool. The rest of the files are JavaFX CSS style sheets that represent different
    look-and-feel themes: `controlStyle1.css`, `controlStyle2.css`, `flatred.css`,
    and `sky.css`.


    Listing [15-2](#A323804_3_En_15_Chapter.html#Par81) shows the `init()` and `start()`
    methods of the `LookNFeelChooser.java Application` class. Remember that all JavaFX
    applications are first initialized via the `init()` method and then begin with
    the `start()` method. After you have examined Listing [15-2](#A323804_3_En_15_Chapter.html#Par81),
    you can read about how it all works.


    ```

    @Override public void init() {

    Font.loadFont(LookNFeelChooser.class

    .getResourceAsStream("Roboto-Thin.ttf"), 10)

    .getName();

    Font.loadFont(LookNFeelChooser.class

    .getResourceAsStream("Roboto-Light.ttf"), 10)

    .getName();

    }

    @Override public void start(Stage primaryStage) throws IOException {

    BorderPane root    = new BorderPane();

    Parent     content = FXMLLoader.load(getClass().getResource("lnf_demo.fxml"));

    Scene      scene   = new Scene(root, 650, 550, Color.WHITE);

    root.setCenter(content);

    // Menu bar

    MenuBar menuBar = new MenuBar();

    // File menu

    Menu     fileMenu = new Menu("_File");

    MenuItem exitItem = new MenuItem("Exit");

    exitItem.setAccelerator(new KeyCodeCombination(KeyCode.X, KeyCombination.SHORTCUT_DOWN));

    exitItem.setOnAction(ae -> Platform.exit());

    fileMenu.getItems().add(exitItem);

    menuBar.getMenus().add(fileMenu);

    // Look and feel menu

    Menu lookNFeelMenu = new Menu("_Look ''N'' Feel");

    lookNFeelMenu.setMnemonicParsing(true);

    menuBar.getMenus().add(lookNFeelMenu);

    root.setTop(menuBar);

    // Look and feel selection

    MenuItem caspianMenuItem = new MenuItem("Caspian");

    caspianMenuItem.setOnAction(ae -> {

    scene.getStylesheets().clear();

    setUserAgentStylesheet(null);

    setUserAgentStylesheet(STYLESHEET_CASPIAN);

    });

    MenuItem modenaMenuItem = new MenuItem("Modena");

    modenaMenuItem.setOnAction(ae -> {

    scene.getStylesheets().clear();

    setUserAgentStylesheet(null);

    setUserAgentStylesheet(STYLESHEET_MODENA);

    });

    MenuItem style1MenuItem = new MenuItem("Control Style 1");

    style1MenuItem.setOnAction(ae -> {

    scene.getStylesheets().clear();

    setUserAgentStylesheet(null);

    scene.getStylesheets()

    .add(getClass().getResource("controlStyle1.css")

    .toExternalForm());

    });

    MenuItem style2MenuItem = new MenuItem("Control Style 2");

    style2MenuItem.setOnAction(ae -> {

    scene.getStylesheets().clear();

    setUserAgentStylesheet(null);

    scene.getStylesheets()

    .add(getClass().getResource("controlStyle2.css")

    .toExternalForm());

    });

    MenuItem skyMenuItem = new MenuItem("Sky LnF");

    skyMenuItem.setOnAction(ae -> {

    scene.getStylesheets().clear();

    setUserAgentStylesheet(null);

    scene.getStylesheets()

    .add(getClass().getResource("sky.css")

    .toExternalForm());

    });

    MenuItem flatRedMenuItem = new MenuItem("FlatRed");

    flatRedMenuItem.setOnAction(ae -> {

    scene.getStylesheets().clear();

    setUserAgentStylesheet(null);

    scene.getStylesheets()

    .add(getClass().getResource("flatred.css")

    .toExternalForm());

    });

    lookNFeelMenu.getItems()

    .addAll(caspianMenuItem,

    modenaMenuItem,

    style1MenuItem,

    style2MenuItem,

    skyMenuItem,

    flatRedMenuItem);

    primaryStage.setTitle("Look N Feel Chooser");

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    ```


    Listing 15-2. The Look N Feel Chooser Project Source Code to Switch Between Look
    and Feel (JavaFX CSS) Style Sheets. (`LookNFeelChooser.java`)


    **Note:** To run this example, make sure the CSS and TTF (true type font) files
    are in the compiled class’s area. Resource files can be loaded easily when placed
    in the same directory (package) as the compiled class file that is loading them.
    The CSS files are initially co-located with this source code example file. In
    NetBeans, you can select Clean and Build Project or you can copy your files to
    your class’s build area.'
