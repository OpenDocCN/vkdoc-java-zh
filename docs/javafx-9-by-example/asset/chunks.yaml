    ## Summary


    In this chapter you learned about common layouts for creating user interfaces.
    The first part of the chapter, you briefly examined common layouts such as `HBox`,
    `VBox`, `FlowPane`, `BorderPane`, and `GridPane`. Using some of the common layout
    panes such as `HBox` and `Vbox`, you saw detailed code examples and a zoomed-in
    diagram that described often confusing properties layout nodes have. These properties
    are spacing, padding, margin, and border widths. The goal was to determine how
    much space (area) the layout pane along with its children actually occupies. Next,
    you learned how to create a form-like UI application using the `BorderPane` and
    `GridPane` nodes. The `GridPane` provided column-, row-, and cell-level constraints.
    In the form-like UI, you also learned how to control the position and width of
    child UI elements. An example is that one of the UI elements being controlled
    was a text field that would squeeze or stretch depending on the user resizing
    the window.


    After learning how to use common layout panes, you learned how to use the powerful
    Scene Builder tool downloaded from GluonHQ. The chapter also discussed the various
    features and how to navigate around the tool. After familiarizing with the tool,
    you got a chance to design a similar form-like UI as the `GridPane` example. The
    idea of this exercise was to create UI screens graphically instead of programmatically.
    Once the UI screen was created, you saved the work as a JavaFX FXML file. Learning
    about separating the UI from control logic, you learned how to use JavaFX’s dependency
    injection mechanism to allow controller code to interact with UI elements. In
    order to wrap up your understanding of the Scene Builder tool, you learned how
    to create an application that would load the UI (FXML file) and wire the controller
    code automatically through the use of the `FXMLLoader` utility class.


    # 6. User Interface Controls


    In the previous chapter, you learned about laying out controls using the Scene
    Builder tool. In this chapter, you learn how to interact with UI controls. Due
    to space limitations, there aren’t code examples for every UI control in the Java
    8 and 9 platforms. However, I did create examples with the most common UI controls
    that you’ll typically see in business-type applications.


    In Chapter [3](#A323804_3_En_3_Chapter.html)’s discussion on the JavaFX Scene
    graph’s ability to render basic shape nodes, you learned that shapes extend from
    the base class Node (`javafx.scene.Node`). This chapter explores user interface
    (UI) controls that also extend from the base class `Node`, but are much more advanced.
    The main difference is that UI controls are nodes that provide user interactions
    such as buttons, menus, text fields, sliders, and table views.


    Unlike web development using HTML5, JavaFX allows UI control nodes, shape nodes,
    and canvas nodes to coexist on the Scene graph (draw surface). In contrast, HTML5,
    text input fields, SVG elements, and canvas elements don’t inherit common behaviors
    like nodes on the JavaFX Scene graph. For example, when using HTML and JavaScript,
    you cannot easily rotate an HTML button and an SVG rectangle using a common API.
    When using JavaFX APIs, you can treat UI controls like any other JavaFX node;
    for example, you can apply animations, transformations, styling, and effects.


    JavaFX UI controls are derived classes of the base class `javafx.scene.control.Control`
    and implement two other interfaces—`javafx.scene.control.Skinnable` and `javafx.event.EventTarget`.
    To get an in-depth look at how to create custom controls, look at Chapter [15](#A323804_3_En_15_Chapter.html)
    on custom user interfaces. For now, this chapter explores examples on how to use
    UI controls.'
