    \ should resemble Figure [1-29](#A323804_3_En_1_Chapter.html#Fig29).\n\n![A323804_3_En_1_Fig29_HTML.jpg](A323804_3_En_1_Fig29_HTML.jpg)\n\
    \nFigure 1-29.\n\nThe compiled HelloWorld example creates directories based on\
    \ the package namespace under the classes directory. You will notice the subdirectories\
    \ are created as org/acme/helloworld under the classes directory you created earlier.\
    \  \n4.  Run and test your JavaFX HelloWorld application . Assuming you are in\
    \ the `∼/projects/helloworld` directory, type the following command to run your\
    \ JavaFX HelloWorld application from the command-line prompt:\n\n```\n    $ java\
    \ -cp classes org.acme.helloworld.HelloWorld\n    ```\n\nOn Windows OS:\n\n```\n\
    C:\\Users\\myusername\\projects\\helloworld> java -cp classes org.acme.helloworld.HelloWorld\n\
    ```\n\nBy using the `-cp`, classes will let Java know where the classpath directory\
    \ is located. Figure [1-30](#A323804_3_En_1_Chapter.html#Fig30) shows the output\
    \ of a simple JavaFX HelloWorld application launched from the command-line prompt\
    \ .\n\n![A323804_3_En_1_Fig30_HTML.jpg](A323804_3_En_1_Fig30_HTML.jpg)\n\nFigure\
    \ 1-30.\n\nJavaFX HelloWorld launched from the MacOS X command-line prompt"
  trans: "\n### 使用编辑器和终端（命令行提示符）\n\n开发 JavaFX 9 应用程序的第二种方式是使用普通文本编辑器和命令行提示符（终端）。通过学习如何在命令行提示符下编译和执行应用程序，你将了解类路径以及可执行文件所在的位置。当你在那些没有便捷的集成开发环境（IDE）和/或编辑器的环境中工作时，接触这些知识将提升你的技能。\n\
    \n在命令行下工作时，你基本上会使用 nano、vi、Emacs 或记事本等文本编辑器来编写 JavaFX HelloWorld 源代码。清单 1-1 中展示的是一个\
    \ HelloWorld Java 应用程序的示例。\n\n```\npackage org.acme.helloworld;\nimport javafx.application.Application;\n\
    import javafx.event.ActionEvent;\nimport javafx.event.EventHandler;\nimport javafx.scene.Group;\n\
    import javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.stage.Stage;\n\
    /**\n* A JavaFX Hello World Application\n*/\npublic class HelloWorld extends Application\
    \ {\n/**\n* @param args the command line arguments\n*/\npublic static void main(String[]\
    \ args) {\nApplication.launch(args);\n}\n@Override\npublic void start(Stage stage)\
    \ {\nstage.setTitle(\"Hello World\");\nGroup root = new Group();\nScene scene\
    \ = new Scene(root, 300, 250);\nButton btn = new Button();\nbtn.setLayoutX(100);\n\
    btn.setLayoutY(80);\nbtn.setText(\"Hello World\");\nbtn.setOnAction(new EventHandler()\
    \ {\npublic void handle(ActionEvent event) {\nSystem.out.println(\"Hello World\"\
    );\n}\n});\nroot.getChildren().add(btn);\nstage.setScene(scene);\nstage.show();\n\
    }\n}\n清单 1-1.\n来自 HelloWorld.java 的 JavaFX HelloWorld 应用程序\n```\n\n创建好 Java 文件后，你将使用命令行提示符或终端窗口来编译和运行你的\
    \ JavaFX 应用程序。以下是创建可在命令行提示符（终端）下编译和运行的 JavaFX HelloWorld 应用程序的步骤。\n\n1.  在你的用户主目录下，创建一个\
    \ `projects` 目录，并在其下创建一个 `helloworld` 目录。在 MacOS 或 Linux 操作系统上，使用以下命令创建 `projects`\
    \ 目录：\n\n```\n    $ mkdir -p ∼/projects/helloworld/src\n    $ mkdir ∼/projects/helloworld/classes\n\
    \    $ cd ∼/projects/helloworld/\n    $ nano src/HelloWorld.java\n    ```\n\n\
    在 Windows 操作系统上，使用以下命令切换目录：\n\n```\n    C:\\Users\\myusername>mkdir projects\n\
    \    C:\\Users\\myusername>mkdir projects\\helloworld\n    C:\\Users\\myusername>mkdir\
    \ projects\\helloworld\\src\n    C:\\Users\\myusername>mkdir projects\\helloworld\\\
    classes\n    C:\\Users\\myusername>cd projects\\helloworld\n    C:\\Users\\myusername\\\
    projects\\helloworld>notepad src\\HelloWorld.java\n    ```\n\n2.  将清单 1-1 中的代码复制并粘贴到文本编辑器中，并将文件保存为\
    \ `HelloWorld.java`。该文件应位于 `src` 目录内。注意：在输入清单 1-1 中 `HelloWorld.java` 文件的代码时，请确保在文件顶部包含\
    \ `package org.acme.helloworld;` 语句。这样做之后，在编译代码时就会创建包命名空间目录。例如，编译后的 `HelloWorld.class`\
    \ 文件将位于 `classes/org/acme/helloworld` 目录中。  \n3.  使用 Java 编译器 `javac`，配合 `-d`\
    \ 选项和 `classes` 目录，编译名为 `HelloWorld.java` 的源代码文件。`classes` 目录是存放编译后代码的位置。此外，你需要指定要编译的源代码文件，即\
    \ `src/*.java`。你需要输入的命令取决于你的操作系统。在 MacOS X 或 Linux 操作系统上，在命令行提示符下输入以下内容：\n\n```\n\
    \    $ javac -d classes src/*.java\n    ```\n\n在 Windows 命令行下，输入以下内容：\n\n```\n\
    \    C:\\Users\\myusername\\projects\\helloworld> javac -d classes src\\*.java\n\
    \    ```\n\n注意文件名前面的 `-d classes`。`-d` 选项（目标目录）让 Java 编译器知道根据包的命名空间将编译后的类文件放在哪里。在此场景中，`HelloWorld`\
    \ 的包语句（命名空间）是 `org.acme.helloworld`，这将在 `classes` 目录下创建子目录，假设你当前位于 `∼/projects/helloworld`\
    \ 项目目录中。编译完成后，你的目录结构应类似于图 1-29。\n\n![A323804_3_En_1_Fig29_HTML.jpg](img/A323804_3_En_1_Fig29_HTML.jpg)\n\
    \n图 1-29.\n\n编译后的 HelloWorld 示例根据包命名空间在 classes 目录下创建了目录。你会注意到，在你之前创建的 classes\
    \ 目录下，创建了 org/acme/helloworld 子目录。  \n4.  运行并测试你的 JavaFX HelloWorld 应用程序。假设你位于\
    \ `∼/projects/helloworld` 目录下，输入以下命令从命令行提示符运行你的 JavaFX HelloWorld 应用程序：\n\n```\n\
    \    $ java -cp classes org.acme.helloworld.HelloWorld\n    ```\n\n在 Windows 操作系统上：\n\
    \n```\nC:\\Users\\myusername\\projects\\helloworld> java -cp classes org.acme.helloworld.HelloWorld\n\
    ```\n\n通过使用 `-cp`，`classes` 将告诉 Java 类路径目录所在的位置。图 1-30 显示了从命令行提示符启动的一个简单 JavaFX\
    \ HelloWorld 应用程序的输出。\n\n![A323804_3_En_1_Fig30_HTML.jpg](img/A323804_3_En_1_Fig30_HTML.jpg)\n\
    \n图 1-30.\n\n从 MacOS X 命令行提示符启动的 JavaFX HelloWorld\n"
- fmt: '### Using Gradle on the Command-Line Prompt


    A third way of developing JavaFX applications is using the Gradle Build tool.
    Here you will be also using a common text editor like before, but instead of manual
    steps in creating and compiling code, you will be relying on the Gradle Build
    tool. If you have not set up Gradle, refer to the early part of this chapter in
    the section entitled “Installing Gradle.” Follow these steps to create a Gradle-based
    project.


    1.  Create another project and directory named `helloworld_gradle`. Assuming you
    are in the `∼/projects` directory, you will create a Gradle-based project. On
    a Unix-like OS, enter the following:


    ```

    $ mkdir -p projects/helloworld_gradle

    ```


    On Windows, enter the following:


    ```

    C:\Users\myusername>mkdir projects\helloworld_gradle

    ```


    2.  Change your directory to the `helloworld_gradle`. On a Unix-like OS, enter
    the following:


    ```

    $ cd helloworld_gradle

    ```


    On Windows, enter the following:


    ```

    C:\Users\myusername>cd projects\helloworld_gradle

    ```


    3.  Build a Java skeleton project having the conventional directory structure
    (Maven and Gradle convention). You will notice directories created that will look
    like `src/main/java` and `src/test/java`. Since this creates the project files
    and directories initially, it should only be done once. The following command
    creates a Java library project:


    ```

    $ gradle init --type java-library

    ```


    The following is the output when executing the Gradle `init` task:


    ```

    :wrapper

    :init

    BUILD SUCCESSFUL

    Total time: 1.897 secs

    ```


    4.  Since you are creating a JavaFX application and not a Java library, you will
    remove the `Library.java` and `LibraryTest.java` files under the `src/main/java`
    and `src/test/java` directories, respectively. These files are just stubbed out
    to get you started if you decide to create a Java library. In this scenario, you
    are creating a JavaFX application.

    5.  Next, you’ll create a directory called `org/acme/helloworld` under the `src/main/java`
    directory and copy the `HelloWorld.java` file from Listing [1-1](#A323804_3_En_1_Chapter.html#Par178)
    into the `src/main/java/org/acme/helloworld` directory. This will look like Figure
    [1-31](#A323804_3_En_1_Chapter.html#Fig31).


    ![A323804_3_En_1_Fig31_HTML.jpg](A323804_3_En_1_Fig31_HTML.jpg)


    Figure 1-31. Gradle Java application project structure. Notice the standard convention
    of source code directory structure laid out as `src/main/java` and `src/test/java`.
    Build tools such as Maven and Gradle follow this convention.


    6.  Since you are creating a JavaFX application, you will need to edit the `build.gradle`
    file by adding a plug-in that will build the Java project as a launchable application.
    You’ll also add one more entry to let Gradle know which class the main application
    should be run as. Using your text editor, add the following entries to the `build.gradle`
    file:


    ```

    apply plugin: ''application''

    mainClassName = "org.acme.helloworld.HelloWorld"

    ```


    7.  After you’ve saved and exited the file, you’ll want to build the project using
    the `gradle assemble` command. This will create an executable `jar` file that
    can be run. Type the following to compile and build a HelloWorld `jar` executable.


    ```

    $ gradle assemble

    ```


    The following is the output after executing the Gradle assemble task.


    ```

    :compileJava

    Download https://jcenter.bintray.com/org/slf4j/slf4j-api/1.7.12/slf4j-api-1.7.12.pom

    Download https://jcenter.bintray.com/org/slf4j/slf4j-parent/1.7.12/slf4j-parent-1.7.12.pom

    Download https://jcenter.bintray.com/org/slf4j/slf4j-api/1.7.12/slf4j-api-1.7.12.jar

    :processResources UP-TO-DATE

    :classes

    :jar

    :assemble

    BUILD SUCCESSFUL

    Total time: 4.458 secs

    ```


    8.  Now run the HelloWorld application by using the following command (run task).


    ```

    $ gradle run

    ```


    9.  The Gradle run task was added when you added the plug-in entry `apply plugin:
    ''application''`. Gradle plug-ins provide convenient ways to build different kinds
    of Java projects and artifacts. You should see the Java HelloWorld application
    launch just like in Figure [1-30](#A323804_3_En_1_Chapter.html#Fig30).


    There are many more powerful things you can do with Gradle that are beyond the
    scope of this book; however, I will list some common commands you might be interested
    in using.


    *   `gradle tasks`: Lists all the available tasks

    *   `gradle clean`: Removes directories and files from the `build` directory

    *   `gradle eclipseProject`: Creates project files for the Eclipse IDE. This task
    will be available when you add the following statement to the `build.gradle` file:


    ```

    apply plugin: ''eclipse''

    ```


    *   `gradle intellijProject`: Creates project files for the IntelliJ IDE. This
    task will be available when you add the following statement to the `build.gradle`
    file:


    ```

    apply plugin: ''idea''

    ```


    *   `gradle -help`: Shows the available options and descriptions of commands'
