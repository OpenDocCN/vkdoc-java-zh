    ## Web 引擎


    JavaFX 提供了一个能够加载 HTML5 内容的非 GUI 组件，称为 `WebEngine` API（`javafx.scene.web.WebEngine`）。该
    API 本质上是 `WebEngine` 类的一个对象实例，用于加载包含 HTML5 内容的文件。要加载的 HTML5 文件可以位于本地文件系统、Web 服务器或
    JAR 文件中。当您使用 Web 引擎对象加载文件时，会使用后台线程来加载 Web 内容，这样就不会阻塞 JavaFX 应用程序线程。在本节中，您将了解以下两种用于加载
    HTML5 内容的 `WebEngine` 方法：


    *   `load(String URL)`

    *   `loadContent(String HTML)`


    ### WebEngine 的 load() 方法


    `WebEngine` API 与许多使用后台线程的 API 一样，遵循基于事件的编程模型。基于事件通常意味着方法调用是异步的（回调）；例如，Web 引擎可以从远程
    Web 服务器异步加载 Web 内容，并在内容加载完成时通知处理程序代码。


    收到通知后，处理程序代码将在 JavaFX 应用程序线程上运行。清单 10-1 在后台工作线程中从远程 Web 服务器加载 HTML 内容。


    ```

    WebEngine webEngine = new WebEngine();

    webEngine.getLoadWorker()

    .stateProperty()

    .addListener( (obs, oldValue, newValue) -> {

    if (newValue == SUCCEEDED) {

    // 加载完成...

    // 处理内容...

    // 使用 webEngine.getDocument();

    }

    });

    webEngine.load("https://java.com");

    清单 10-1.

    一个带有 ChangeListener Lambda 表达式的 WebEngine，用于判断后台加载是否完成（成功）

    ```


    要监视或判断工作线程是否已完成，可以将一个 `javafx.beans.value.ChangeListener`（lambda 表达式）添加到状态属性中。如果您不熟悉如何创建
    lambda 表达式，请参阅关于 Lambda 表达式的第 4 章，以便能够使用诸如 `ChangeListener` 或 `InvalidationListener`
    对象之类的函数式接口。


    在清单 10-1 中，您会注意到一个作为 lambda 表达式的 `ChangeListener`，通过 `addListener()` 方法添加到状态属性中。状态属性包含
    Web 引擎后台工作线程的状态或生命周期。这些状态基于 `State` 枚举，该枚举由 `javafx.concurrent.Worker` 接口拥有。


    设置好监听器后，代码通过使用 Web 引擎的 `load()` 方法开始加载过程。还要注意，传递给 `load()` 方法的字符串是一个有效的 URL 字符串，表示
    Web 内容文件或 Web 服务器的位置。


    当将 `ChangeListener` lambda 表达式添加到状态属性时，参数如下：


    *   `obs` 的类型为 `ObservableValue<? extends Worker.State>`，它引用 Web 引擎对象上的状态属性。

    *   `oldValue` 的类型为 `Worker.State` 枚举，包含状态属性更改前的值。

    *   `newValue` 的类型为 `Worker.State` 枚举，包含新的状态属性。


    lambda 表达式（`ChangeListener`）每个参数的类型说明符被省略，以使参数签名更简洁。状态属性更改后，可以检查 `newValue` 参数以获取各种线程状态。在清单
    10-1 中，`newValue` 变量用于检查工作线程的状态，这是一个急切求值的示例。


    为了更全面，我列出了所有可能的工作线程状态：


    ```

    READY, SCHEDULED, RUNNING, SUCCEEDED, CANCELLED, FAILED

    ```


    正如您在清单 10-1 中看到的，代码通过将工作线程的状态与 `Worker.SUCCEEDED` 枚举值进行比较，来判断工作线程是否已完成加载 Web 内容。

