- fmt: "### Setting Up MacOS X/Linux Environment Variables\n\nTo make the environment\
    \ variables permanent on MacOS X or Linux, you can use common text editors such\
    \ as `nano` or `vim`. But before you go editing your user shell profile files,\
    \ you will want to make a backup copy just in case you make a mistake. Because\
    \ many Unix and Linux systems have different shells, I’ve detailed the typical\
    \ files to copy and edit.\n\nOn a Mac, type the following:\n\n```\n$ cp ∼/.bash_profile\
    \ ∼/.bash_profile.orig\n```\n\nOn a Linux OS, you’ll type the following to determine\
    \ the kind of shell you have, then you’ll know which file to copy and edit. Different\
    \ shells use different files to export environment variables when creating a console\
    \ session.\n\n```\n$ echo $0\n-bash\n```\n\nIf the output displays `-bash`, you’ll\
    \ want to back up and edit the `.bashrc` file from your home directory. If the\
    \ output displays `-csh`, you’ll want to back up and edit the `.cshrc` from your\
    \ home directory. Next, you copy the `.bashrc` file as a backup before editing\
    \ it.\n\n```\n$ cp ∼/.bashrc ∼/.bashrc.orig\n```\n\nIf you’re on a Linux OS using\
    \ the C shell, type the following:\n\n```\n$ cp ∼/.cshrc ∼/.cshrc.orig\n```\n\n\
    Now, you’ll want to edit the file that you just backed up by using `nano` or `vi`\
    \ text editor. To load a file, you type the following:\n\n```\n$ nano ∼/.bash_profile\n\
    ```\n\nOr\n\n```\n$ vi ∼/.bash_profile\n```\n\nNotice that I used the `∼/.bash_profile`\
    \ file located in the `home` directory on the MacOS X operating system. I trust\
    \ you will replace the file with the particular file depending on your Linux OS\
    \ and shell. After loading the file from the previous command you will want to\
    \ perform edits, saves, and exits from those editors. Tables [1-1](#A323804_3_En_1_Chapter.html#Tab1)\
    \ and [1-2](#A323804_3_En_1_Chapter.html#Tab2) are quick run-downs of the common\
    \ commands for `nano` and `vim`, respectively.\n\n- To set your `JAVA_HOME` for\
    \ the MacOS X platform, you need to launch a terminal window to edit your home\
    \ directory’s `.bash_profile` file (for example, `nano ∼/.bash_profile`) by adding\
    \ the `export` commands at the bottom of the file:\n\n```\n    # Mac OS X /bin/bash\n\
    \    export JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-9.jdk/Contents/Home\n\
    \    export PATH=$PATH:$JAVA_HOME/bin\n```\n\n- On Linux and other Unix operating\
    \ systems that use Bash shell environments, launch a terminal window and edit\
    \ either the `∼/.bashrc` or `∼/.profile` file to contain the `export` commands.\
    \ Add the `export` commands.\n\n```\n    # Linux bash, bourne shell environments\
    \ /bin/bash\n    export JAVA_HOME=/usr/java/jdk-9\n    export PATH=$PATH:$JAVA_HOME/bin\n\
    ```\n\n- On Linux and other Unix operating systems that use C shell (csh) environments,\
    \ launch a terminal window and edit either the `∼/.cshrc` or `∼/.login` file to\
    \ contain the `setenv` commands. Add the `export` commands.\n\n```\n    #csh environments\n\
    \    setenv JAVA_HOME /usr/java/jdk-9\n    setenv PATH ${JAVA_HOME}/bin:${PATH}\n\
    ```\n\n**Table 1-2.** The vi Editor’s Keyboard Commands After Editing a File\n\
    \n| Action | Command | Notes |\n| --- | --- | --- |\n| Navigate | Use arrow keys\
    \ up, down, right, and left | Arrow keys, Page Up/Down, and Home and End can also\
    \ be used to navigate cursor. |\n| Insert text | `i` | After a text file is loaded\
    \ you can modify the file, but before you can, you have to press `i` for insert.\
    \ To get back to command mode, press the ESC key. |\n| Add text | `a` | After\
    \ a text file is loaded you can modify the file, but before you can you have to\
    \ press `a` for add. To get back to command mode, press the ESC key. |\n| Command\
    \ mode | ESC | Exits editor mode, bringing you to command mode. |\n| Save file\
    \ | `:w` | Assuming you are in command mode (press ESC) before typing `:w` (colon\
    \ `w`). The file is saved. To save and exit, type `:wq`. |\n| Exit editor | `:q`\
    \ | Brings you back to the command-line prompt. |\n| Exit with no changes | `:q!`\
    \ | Modifications are ignored and exits editor. |\n| Save and Exit | `:wq` | File\
    \ is saved and exits immediately. |\n\n**Table 1-1.** The Nano Editor’s Keyboard\
    \ Commands After Editing a File\n\n| Action | Command | Notes |\n| --- | --- |\
    \ --- |\n| Navigate | Use arrow keys up, down, right, and left | Arrow keys, Page\
    \ Up/Down, and Home and End can also be used to navigate the cursor. |\n| Save\
    \ File | Ctrl/Control+O | Editor prompts the name of the file. Just press Enter\
    \ to accept the same name. |\n| Exit Editor | Ctrl/Control+X | Brings you back\
    \ to the command-line prompt. |\n\nOnce you’ve set up your path and `JAVA_HOME`\
    \ environment variables, you will want to verify them by launching a terminal\
    \ window and executing the following two commands from the command prompt:\n\n\
    ```\n$ java -version\n$ javac -version\n```\n\nThe output in each case should\
    \ display a message indicating the Java 9 version of the language and runtime.\
    \ Here is the display output of the version.\n\n```\njava -version\njava version\
    \ \"1.9.0-ea\"\nJava(TM) SE Runtime Environment (build 1.9.0-ea-b90)\nJava HotSpot(TM)\
    \ 64-Bit Server VM (build 1.9.0-ea-b90, mixed mode)\njavac -version\njavac 1.9.0\n\
    ```\n\n## Installing Gradle\n\nIf you have not downloaded Gradle yet, visit [`http://gradle.org/gradle-download`](http://gradle.org/gradle-download).\
    \ After downloading the binary distribution, you’ll want to install Gradle. To\
    \ install Gradle, follow these steps:\n\n1.  Unzip the Gradle software into a\
    \ directory.\n2.  Update the environment variable `GRADLE_HOME` to point to the\
    \ directory located where the `gradle` folder was created after the unzipped file.\n\
    3.  Update the environment variable `PATH` to include the `$GRADLE_HOME/bin`.\
    \ In Windows, it would be `%GRADLE_HOME%/bin`. To make these variables permanent,\
    \ follow the instructions mentioned earlier regarding `JAVA_HOME`.\n4.  To verify\
    \ that Gradle was installed properly at the command line (the terminal), type\
    \ the following command:\n\n    ```\n    gradle -version\n    ```\n\nThe version\
    \ information is shown here:\n\n```\nGradle 2.7\n\nBuild time:   2015-09-14 07:26:16\
    \ UTC\nBuild number: none\nRevision:     c41505168da69fb0650f4e31c9e01b50ffc97893\n\
    Groovy:       2.3.10\nAnt:          Apache Ant(TM) version 1.9.3 compiled on December\
    \ 23 2013\nJVM:          1.9.0-ea (Oracle Corporation 1.9.0-ea-b90)\nOS:     \
    \      Mac OS X 10.11.1 x86_64\n```\n\nNow that you have the JDK installed, you\
    \ can install the NetBeans IDE. Installing the NetBeans IDE is optional, so you\
    \ may skip the next section."
