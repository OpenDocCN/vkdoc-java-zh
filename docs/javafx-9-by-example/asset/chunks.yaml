    ## 更多示例


    有关将 JavaFX 与 Leap Motion 设备结合使用的更多示例，请参考以下在线资源：


    *   [`http://jperedadnr.blogspot.com.es/2013/06/leap-motion-controller-and-javafx-new.html`](http://jperedadnr.blogspot.com.es/2013/06/leap-motion-controller-and-javafx-new.html)

    *   [`http://jperedadnr.blogspot.com.es/2015/01/creating-and-texturing-javafx-3d-shapes.html#SkinningMeshes`](http://jperedadnr.blogspot.com.es/2015/01/creating-and-texturing-javafx-3d-shapes.html#SkinningMeshes)


    如需与其他编程语言交互，请访问 [`https://gallery.leapmotion.com`](https://gallery.leapmotion.com)
    。


    ## 总结


    在本章的第一部分，你了解了各种手势事件以及它们之间的细微差别。你学习的事件包括 `TouchPressed`、`TouchReleased`、`TouchStationary`、`Rotate`
    和 `Zoom`。你学习了如何为你的 JavaFX 应用程序添加手势事件处理，无论它是传统的 2D 场景还是 3D 场景。


    在本章的第二部分，你发现了令人印象深刻的 Leap Motion 设备，以及使用它增强 JavaFX 应用程序所产生的绝佳组合效果。你首先了解了该设备及其工作原理；接着，你简要了解了它的
    Java SDK 以及一个示例应用程序，在该示例中，你学习了如何在一个线程中监听和处理来自 Leap 设备的数据，同时在 JavaFX 线程中渲染追踪你双手的
    3D 形状。


    在下一章中，你将学习主题化以及如何自定义应用程序，了解 JavaFX CSS 样式的基础知识，以及如何创建自定义控件。


    # 15. 自定义用户界面


    如果你能在不改变应用程序功能的情况下改变其外观，那该多好啊？许多公司花费大量金钱和时间来设计用户界面（UI）。


    通常，公司在决定其 UI 的外观和行为之前，会先制作几个设计模型。根据范围的不同，许多公司还会构建支持不同屏幕尺寸的 UI。通常，平板电脑、智能手机、电视和台式机是
    UI 设计师面临的主要挑战。


    在本章中，你将学习主题化以及如何通过应用各种主题（外观和感觉）来自定义应用程序。接下来，你将学习 JavaFX CSS 样式的基础知识，这将使你能够更改任何场景图节点的属性，例如颜色、背景、边距等。在学习
    CSS 样式之后，你将学习如何创建自定义控件。在这里，你将学习如何构建不属于 JavaFX 8 内置控件的 UI 控件。一些可能想到的自定义控件包括 LED、数字键盘、仪表、时钟和未来感上下文菜单。


    在本章中，你将学习以下 API 和概念：


    *   主题化

    *   JavaFX CSS 样式

    *   自定义控件

