  trans: '

    ### 什么是时间线？


    时间线是由多个 `KeyFrame` 对象组成的动画序列。每个 `KeyFrame` 对象按顺序运行。由于时间线是抽象类 `javafx.animation.Animation`
    的子类，因此它具有标准属性，例如循环次数和自动反转，你可以对这些属性进行设置。循环次数是你希望时间线播放动画的次数。如果你希望循环次数无限播放动画，请使用值
    `Timeline.INDEFINITE`。自动反转属性是一个布尔标志，用于指示动画是否可以反向播放时间线（即按相反顺序播放关键帧）。默认情况下，循环次数设置为
    1，自动反转设置为 `false`。


    要向 `Timeline` 对象添加关键帧，请使用 `getKeyFrames().addAll()` 方法。清单 7-27 演示了一个无限播放（循环）的时间线，并将自动反转设置为
    `true`，以使动画序列能够反向播放。创建了一个 `Timeline` 实例，其循环次数设置为无限运行，自动反转设置为 `true`，以允许动画序列反向播放。


    ```

    Timeline timeline = new Timeline();

    timeline.setCycleCount(Timeline.INDEFINITE);

    timeline.setAutoReverse(true);

    timeline.getKeyFrames().addAll(keyFrame1, keyFrame2);

    timeline.play();

    清单 7-27.

    一个无限重复动画的时间线实例

    ```


    掌握了时间线的这些知识后，你现在可以在 JavaFX 中为任何场景图节点制作动画。尽管你可以通过底层方式创建时间线，但对于简单的动画来说，这种技术可能会变得非常繁琐。你可能想知道是否有更简单的方法来表达常见的动画效果，例如淡入淡出、缩放和平移。好消息是！JavaFX
    提供了内置的过渡动画（扩展了 `Transition` 类），这些是用于执行常见动画效果的便捷类。


    ### JavaFX 过渡类


    JavaFX API 支持称为过渡类的常见动画。过渡类继承自 `javafx.animation.Animation` 类，类似于前面讨论的 `Timeline`。过渡类是创建应用于
    JavaFX `Node` 对象的常见动画的更简单方法。


    以下是一些最常见的过渡动画类，以及每个类的简要说明：


    *   `javafx.animation.FadeTransition`

    *   `javafx.animation.PathTransition`

    *   `javafx.animation.ScaleTransition`

    *   `javafx.animation.TranslateTransition`


    淡入淡出过渡（`FadeTransition`）针对节点的透明度属性，以实现淡入淡出动画效果。路径过渡（`PathTransition`）使节点能够沿着生成的路径（`javafx.scene.shape.Path`）移动。`ScaleTransition`
    过渡针对节点的 `scaleX`、`scaleY` 和 `scaleZ` 属性来调整节点大小。平移过渡（`TranslateTransition`）针对节点的
    `translateX`、`translateY` 和 `translateZ` 属性，以在屏幕上移动节点。我只列出了几种常见的过渡——还有更多我没有讨论的过渡，因此我鼓励你查看
    `javafx.animation.Transition` 类子类的 Javadocs 文档。


    ## 点击式游戏示例


    为了演示你在本章中学到的最常见的 JavaFX 动画过渡，我创建了一个简单的点击式游戏。为了让你了解点击式游戏的背景，在 90 年代，有许多流行的益智类游戏，允许玩家仅通过使用鼠标点击来探索和开启任务。其中一个著名的点击式游戏叫做《神秘岛》（参见
    [`http://cyan.com/games/myst`](http://cyan.com/games/myst)）。游戏《神秘岛》一开始就将玩家抛入一个神秘的海岛世界，通过检查物体和寻找暗门来探索并解决各种谜题。


    在图 7-8 所示的点击式游戏中，玩家将看到演示大多数常见 JavaFX 动画过渡的动画。在这个点击式游戏示例中，玩家可以点击物品来解锁额外的动画。


    ![A323804_3_En_7_Fig8_HTML.jpg](img/A323804_3_En_7_Fig8_HTML.jpg)


    图 7-8.


    一个使用 JavaFX 过渡 API 的简单点击式游戏。游戏中描绘了代表飞机、云朵和风车的 SVGPath 形状。风车的转子叶片位于一个单独的 SVGPath
    上，该路径将演示旋转平移动画。


    ### 源代码


    `ClickAndPointGame.java` 文件是清单 7-28 中所示点击式游戏的源代码。游戏首先将 SVG 路径作为 JavaFX 节点（`SVGPath`）加载。这些
    SVG 节点是使用从网站 Wikimedia Commons 的 [`https://commons.wikimedia.org`](https://commons.wikimedia.org)
    下载的图形创建的。在那里，我找到了一个来自名为 Kaboldly 的作者的漂亮飞机图形。云朵来自一位名为 Thorpe 的作者，风车来自一位名为 Spedona
    的作者。所有这些图像均采用知识共享许可协议（参见 [`https://creativecommons.org/licenses/by-sa/3.0/deed.en`](https://creativecommons.org/licenses/by-sa/3.0/deed.en)）。

    '
