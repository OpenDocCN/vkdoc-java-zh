    # 14. JavaFX 与手势


    用户界面正日益摆脱以鼠标为中心的模式，转而支持多点触控甚至无触控输入。手势是人类与机器自然交流的方式之一，因为机器借助复杂的手势识别数学算法，开始理解人类的肢体语言。


    在本章中，你将了解两种新的手势识别方法：在本章的第一部分，你将学习如何使用支持触控的设备（如 Windows 8 Surface）开发多点触控 JavaFX
    应用。在本章的第二部分，你将发现一个很酷的小工具——Leap Motion 设备，它提供了一种无触控的方式来开发增强型 JavaFX 应用。


    本章中的以下示例演示了 JavaFX 的触摸事件 API 和 Leap Motion 手势 API。


    *   使用触摸事件沿路径为形状添加动画（Windows 8）

    *   JavaFX 3D 中的触摸、旋转和缩放（Windows 8）

    *   使用 Leap Motion 的骨骼追踪模型创建 3D 手部模型


    在进入示例之前，我们先来看看 JavaFX 的触摸事件。


    ## 在应用中识别手势


    支持触控的设备如今已成为我们文化的一部分。从智能手机到平板电脑，我们发现自己沉浸在各种软件中。在本节中，你将学习适用于触控设备的 JavaFX `TouchEvent`
    API。本节中的示例在 Windows 8 Surface 上执行。


    如果你熟悉手势和一般的手势编程，可以直接跳到表 14-1，该表列出了 JavaFX 9 当前支持的所有手势事件。如果你对手势编程不熟悉，那么首先让我们讨论一下
    `MouseEvent` 和 `GestureEvent` 之间的区别。


    表 14-1. 手势事件


    | 手势事件 | 描述 |

    | --- | --- |

    | `ROTATION_STARTED` | 识别到两个触摸点，其中一个触摸点开始进行圆周运动。 |

    | `ROTATE` | 识别到两个触摸点，其中一个或两个触摸点正在进行圆周运动。 |

    | `ROTATE_FINISHED` | 识别到两个触摸点，两个触摸点在完成圆周运动后停止。 |

    | `SCROLL_STARTED` | 一个或多个触摸点开始进行缓慢的水平或垂直滑动运动。 |

    | `SCROLL` | 一个或多个触摸点正在进行缓慢的水平或垂直滑动运动。 |

    | `SCROLL_FINISHED` | 一个或多个触摸点已停止进行缓慢的水平或垂直滑动运动。 |

    | `SWIPE_LEFT` | 一个或多个触摸点正在向屏幕左边缘快速滑动。 |

    | `SWIPE_DOWN` | 一个或多个触摸点正在向屏幕底部边缘快速滑动。 |

    | `SWIPE_RIGHT` | 一个或多个触摸点正在向屏幕右边缘快速滑动。 |

    | `SWIPE_UP` | 一个或多个触摸点正在向屏幕顶部边缘快速滑动。 |

    | `TOUCH_PRESSED` | 识别到单个触摸点。 |

    | `TOUCH_STATIONARY` | 单个触摸点保持在相同的相对屏幕位置，没有移动。 |

    | `TOUCH_MOVED` | 单个触摸点从先前识别的 `TOUCH_PRESSED` 或 `TOUCH_STATIONARY` 位置移动。 |

    | `TOUCH_RELEASED` | 单个触摸点已从屏幕抬起。 |

    | `ZOOM_STARTED` | 识别到两个触摸点，开始进行捏合或拉伸动作。 |

    | `ZOOM` | 识别到两个触摸点，正在进行捏合或拉伸动作。 |

    | `ZOOM_FINISHED` | 识别到两个触摸点，两个触摸点在完成捏合或拉伸动作后停止。 |


    传统的 `MouseEvent` 编程基于与屏幕像素对齐的简单二维坐标系。通常，鼠标事件处理面向的是事件发生时鼠标所在的位置。手势则略有不同，它们面向的是触摸点及其相对运动。触摸点是屏幕或设备上通过物理接触检测交互的位置。可以同时存在多个触摸点，每个触摸点实例包含
    X 和 Y 坐标、GUI 组件拾取以及相关触摸点的分组等信息。通常，触摸点的处理方式与鼠标点击类似。


    本章第一个示例的代码（由清单 14-1 提供）并排展示了鼠标和触摸点事件处理。该示例解释了各种鼠标事件（如 `MousePressed`、`MouseDragged`
    和 `MouseReleased`）对应的手势 `TouchPoint` 是什么。


    触摸点是更有用手势（如旋转、滚动、滑动和缩放）的基础。这些更复杂的手势涉及多个触摸点以及与触摸点相关的移动或惯性。例如，在触摸屏上触摸并拖动手指，只会以类似于
    `MouseEvent.MOUSE_DRAGGED` 的方式注册多个触摸点事件。然而，一个已注册的 `TouchPoint` 随后快速向设备边缘滑动，就会转化为一个滑动手势。这为开发者扩展了工具集，提供了标准鼠标和键盘
    GUI 中通常不存在的大量额外界面选项。


    手势事件以与所有事件处理相同的方式为你的应用启用：通过事件处理器。表 14-1 列出了可用的手势事件。

