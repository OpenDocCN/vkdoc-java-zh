  raw: '### Java Simple Serial Connector


    Java Simple Serial Connector (jSSC), from Alexey Sokolov, is licensed under GNU
    Lesser GPL. The latest version as of this writing (jSSC-2.8.0), released January
    2014, was the library chosen to replace RXTX in the Arduino IDE (starting from
    version 1.5.6).


    jSSC is available for all platforms and operating systems. You’ll notice it is
    faster than RXTX, and several bugs have been fixed. jSSC comes in a simple JAR
    file, with all the native required files included, so you don’t need to deal with
    local installations, as it takes care of adding them to the classpath at runtime.


    A JAR with latest available version can be downloaded from [`https://github.com/scream3r/java-simple-serial-connector/releases`](https://github.com/scream3r/java-simple-serial-connector/releases)
    . If you add it as a library in NetBeans or open it, you will see its classes
    (the `jssc` package) and the native content (the `libs` package).


    ## JavaFX, the Charting API, and Orientation


    In the example that follows, you will learn how to design a simple JavaFX application
    that takes the orientation readings from the Arduino board and displays them in
    a chart. For the sake of clarity, the example uses two classes—one for the serial
    readings in Listing [12-2](#A323804_3_En_12_Chapter.html#Par66) and one for the
    chart and the JavaFX stage in Listing [12-3](#A323804_3_En_12_Chapter.html#Par68).


    You’ll bind these classes (`Serial` and `OrientationFX`) by using a `StringProperty`,
    containing the last line read from the serial port. By listening to changes in
    this property in the JavaFX thread, you’ll know when there’s a new reading to
    add to the chart.


    ### Creating the Module Project


    Let’s start by creating a module project in NetBeans, as shown in Figure [12-19](#A323804_3_En_12_Chapter.html#Fig19).
    Make sure you select the JDK 9 platform, as in Figure [12-20](#A323804_3_En_12_Chapter.html#Fig20),
    when setting the project name, `OrientationFX`.


    ![A323804_3_En_12_Fig20_HTML.jpg](A323804_3_En_12_Fig20_HTML.jpg)


    Figure 12-20.


    Project name and location


    ![A323804_3_En_12_Fig19_HTML.jpg](A323804_3_En_12_Fig19_HTML.jpg)


    Figure 12-19.


    Adding a module project in NetBeans


    Click Finish, and the new empty project will be created. Right-click on it, select
    New ➤ Module, and name it `com.jfxbe.orientationfx`, as shown in Figure [12-21](#A323804_3_En_12_Chapter.html#Fig21).
    Click Finish. The empty class called `module-info.java` will be created.


    ![A323804_3_En_12_Fig21_HTML.jpg](A323804_3_En_12_Fig21_HTML.jpg)


    Figure 12-21.


    Module name


    For convenience, place the `jssc.jar` under a `libs` folder in the project, and
    then add it as a library (choose Libraries ➤ Add JAR/Folder).


    Now you can add to the module descriptor the `requires` clause for `javafx.controls`,
    to include the JavaFX `controls` and `base` modules, and the clause for `jssc`
    as well, as shown in Listing [12-2](#A323804_3_En_12_Chapter.html#Par66).


    ```

    module com.jfxbe.orientationfx {

    requires javafx.controls;

    requires jssc;

    }

    Listing 12-2.

    Module-info Class

    ```


    You can add now a new package to the `com.jfxbe.orientationfx` module and a new
    class to it, called `OrientationFX`. The class will extend `Application`. Notice
    that the class will be available to be imported, thanks to the `requires` clause
    in the module descriptor. You simply add a `Scene` and show the stage, as shown
    in Listing [12-3](#A323804_3_En_12_Chapter.html#Par68).


    ```

    public class OrientationFX extends Application {

    @Override

    public void start(Stage primaryStage) throws Exception {

    Scene scene = new Scene(new StackPane(), 1000, 600);

    primaryStage.setScene(scene);

    primaryStage.show();

    }

    }

    Listing 12-3.

    Defining the OrientationFX Class

    ```


    Finally, you can add this package to the module with the `exports` clause, as
    in Listing [12-4](#A323804_3_En_12_Chapter.html#Par70), and run the application
    to make sure the initial settings are correct. An empty stage should appear.


    ```

    module com.jfxbe.orientationfx {

    requires javafx.controls;

    requires jssc;

    exports com.jfxbe.orientationfx;

    }

    Listing 12-4.

    Final Module-info Class

    ```


    ### Serial Communications


    You can add `Serial` to the package as the class for serial communications . Listing
    [12-5](#A323804_3_En_12_Chapter.html#Par72) contains its source code.


    ```

    package com.jfxbe.orientationfx;

    import java.util.Arrays;

    import java.util.List;

    import javafx.beans.property.SimpleStringProperty;

    import javafx.beans.property.StringProperty;

    import jssc.SerialPort;

    import jssc.SerialPortException;

    import jssc.SerialPortList;

    public class Serial {

    /* List of usual serial ports. Add more or remove those you don''t need */

    private static final List USUAL_PORTS = Arrays.asList(

    "/dev/cu.usbmodem1411", "/dev/tty.usbmodem1421", // Mac OS X

    "/dev/usbdev","/dev/ttyUSB","/dev/ttyACM", "/dev/serial", // Linux

    "COM3","COM4","COM5","COM6" // Windows

    );

    private final String ardPort;

    private SerialPort serPort;

    public static final String SEPARATOR = " ";

    private static final String LINE_SEPARATOR = "\r\n";

    private StringBuilder sb = new StringBuilder();

    private final StringProperty line = new SimpleStringProperty("");

    public Serial() {

    this("");

    }

    public Serial(String port) {

    ardPort  =port;

    }

    /* connect() looks for a valid serial port with an Arduino board connected.

    * If it is found, it''s opened and a listener is added, so every time

    * a line is returned, the stringProperty is set with that line.

    * For that, a StringBuilder is used to store the chars and extract the line

    * content whenever ''\r\n'' is found.

    */

    public boolean connect(){

    Arrays.asList(SerialPortList.getPortNames())

    .stream()

    .filter(name ->

    ((!ardPort.isEmpty() && name.equals(ardPort)) ||

    (ardPort.isEmpty() &&

    USUAL_PORTS.stream()

    .anyMatch(p -> name.startsWith(p)))))

    .findFirst()

    .ifPresent(name -> {

    try {

    serPort = new SerialPort(name);

    System.out.println("Connecting to " + serPort.getPortName());

    if (serPort.openPort()) {

    serPort.setParams(SerialPort.BAUDRATE_9600,

    SerialPort.DATABITS_8,

    SerialPort.STOPBITS_1,

    SerialPort.PARITY_NONE);

    serPort.setEventsMask(SerialPort.MASK_RXCHAR);

    serPort.addEventListener(event -> {

    if (event.isRXCHAR()) {

    try {

    sb.append(serPort.readString(event.getEventValue()));

    String ch = sb.toString();

    if (ch.endsWith(LINE_SEPARATOR)) {

    // add timestamp

    line.set(Long.toString(System.currentTimeMillis())

    .concat(SEPARATOR)

    .concat(ch.substring(

    0, ch.indexOf(LINE_SEPARATOR))));

    sb = new StringBuilder();

    }

    } catch (SerialPortException e) {

    System.out.println("Serial error: " + e.toString());

    }

    }

    });

    }

    } catch (SerialPortException ex) {

    System.out.println("ERROR: Port ''" + name + "'': " + ex.toString());

    }

    });

    return serPort != null;

    }

    public void write(String text) {

    try {

    serPort.writeBytes(text.getBytes());

    } catch (SerialPortException ex) {

    System.out.println("ERROR: writing ''" + text + "'': " + ex.toString());

    }

    }

    public void disconnect() {

    if (serPort != null) {

    try {

    serPort.removeEventListener();

    if (serPort.isOpened()) {

    serPort.closePort();

    }

    } catch (SerialPortException ex) {

    System.out.println("ERROR closing port exception: " + ex.toString());

    }

    System.out.println("Disconnecting: comm port closed.");

    }

    }

    public StringProperty getLine() {

    return line;

    }

    public String getPortName() {

    return serPort != null ? serPort.getPortName() : "";

    }

    }

    Listing 12-5.

    The Serial Class Source Code

    ```'
