    *   Silicon valley JavaFX user’s group Live stream: [`http://www.ustream.tv/channel/silicon-valley-javafx-user-group`](http://www.ustream.tv/channel/silicon-valley-javafx-user-group)

    *   Oracle Forums on JavaFX: [`https://community.oracle.com/community/developer/english/java/javafx/javafx_2.0_and_later`](https://community.oracle.com/community/developer/english/java/javafx/javafx_2.0_and_later)


    ## Applications


    Many of the following links are rich GUI applications written using the JavaFX
    platform.


    *   20 JavaFX real-world applications, Dirk Lemmermann and Alexander Casall: [`https://jaxenter.com/20-javafx-real-world-applications-123653.html`](https://jaxenter.com/20-javafx-real-world-applications-123653.html)
    Dirk Lemmermann: `@dlemmermann` Alexander Casall: `@sialcasa`

    *   FXDesktopSearch , Mirko Sertic: A Java and JavaFX based desktop search application.
    It crawls a configured set of directories and allows you to do full-text searches
    with different language support: [`https://github.com/mirkosertic/FXDesktopSearch`](https://github.com/mirkosertic/FXDesktopSearch)
    Twitter: `@mirkosertic`

    *   Picmodo (founded by Jens Deter,): A JavaFX-based picture database application:
    [`http://www.jensd.de/wordpress/?page_id=22`](http://www.jensd.de/wordpress/?page_id=22)
    Twitter: `@Jerady`

    *   VWorkflows by Michael Hoffer: A Scientific Visualization Tool: [`https://github.com/miho/VWorkflows`](https://github.com/miho/VWorkflows)
    `:` [`http://mihosoft.eu`](http://mihosoft.eu) Twitter: `@mihosoft`

    *   eteoBoard: The interactive digital task board. A touch and gesture-based application
    tool for team collaboration: [`http://www.eteoboard.de`](http://www.eteoboard.de)
    [`http://www.saxsys.de`](http://www.saxsys.de)

    *   PiDome client , John Sirach: PiDome is an open source home automation platform
    developed for the Raspberry Pi leveraging it to a full home automation solution.
    [`https://pidome.org`](https://pidome.org) Twitter: `@Pi_Dome`

    *   FlexGanttFX: Aircraft/Flight Scheduling Application, by Dirk Lemmermann, `@dlemmermann`:
    [`http://www.dlsc.com`](http://www.dlsc.com) [`https://www.youtube.com/channel/UCFyRQ_euxxPDwlqyhff-x0Q`](https://www.youtube.com/channel/UCFyRQ_euxxPDwlqyhff-x0Q)

    *   BaufiFX, Thomas Bolz: A home finance calculator: [`http://www.baufifx.de`](http://www.baufifx.de)

    *   SnapCode is an IDE and RAD tool for education, entertainment, and the enterprise.
    Report Mill Software: [`http://www.reportmill.com/snap`](http://www.reportmill.com/snap)

    *   Modellus is a freely available application that enables students and teachers
    (high school and university) to use mathematics to create or explore models interactively.
    Modellus was developed by Vitor Duarte Teodoro, João Paulo Duque Vieira, and Pedro
    Duque Vieira: [`http://modellus.co/index.php/en`](http://modellus.co/index.php/en)

    *   MIME Browser by Christoph Nahr is a compact JavaFX desktop application for
    browsing MIME messages that are locally stored in standard EML files: [`http://kynosarges.org/MimeBrowser.html`](http://kynosarges.org/MimeBrowser.html)

    *   Vocab Hunter by Adam Carroll: VocabHunter is a system to help learners of
    foreign languages: GitHub: [`https://vocabhunter.github.io`](https://vocabhunter.github.io)
    Twitter: `@vocabhunterapp`

    *   Bloom Uploader by Carl Antaki. Bloom is a desktop app that lets you upload
    your photos and videos easily and efficiently to Facebook, download albums, view
    your photos and some of your friends’ photos: Video: [`http://bloomuploader.com`](http://bloomuploader.com)
    Twitter: `@carcour`

    *   AsciidocFX by Rahman USTA: Asciidoc FX is a book/document editor used to build
    PDF, Epub, Mobi, and HTML books, documents, and slides. AsciidocFX is also a winner
    of Duke’s Choice Award 2015: [`https://github.com/asciidocfx/AsciidocFX`](https://github.com/asciidocfx/AsciidocFX)
    Twitter: `@ustarahman`

    *   JITWatch Code Cache Visualization by Chris Newland. Visualize how the HotSpot
    JVM code cache fills up as the JIT compilers produce optimized native code from
    your bytecode: [`https://github.com/AdoptOpenJDK/jitwatch`](https://github.com/AdoptOpenJDK/jitwatch)

    *   MuseuID, Angelica Leite. The software assists the Museum of Paleontology in
    Santana do Cariri. It manages the collection of fossils and museum activities:
    Video: [`http://t.co/3MuofK4eZF`](http://t.co/3MuofK4eZF) GitHub: [`https://github.com/angelicalleite/museuid`](https://github.com/angelicalleite/museuid)
    Twitter: `@angelicalleite`

    *   AZoi Capital Atlas Trader Software JavaFX, Rob Terpilowski: Video: [`https://youtu.be/tm05AIkvJAs`](https://youtu.be/tm05AIkvJAs)
    Twitter: `@RobTerpilowski`

    *   Power Scene Viewer 2.0, Marlon Trujillo: SCADA software: [`https://www.youtube.com/watch?v=8DUAf9TrJuI`](https://www.youtube.com/watch%3Fv=8DUAf9TrJuI)
    [`https://www.youtube.com/watch?v=FHph2jrS0EU`](https://www.youtube.com/watch%3Fv=FHph2jrS0EU)
    Twitter: `@marlon__marlon`

    *   FXDesktopSearch: A Java and JavaFX-based desktop search application. It crawls
    a configured set of directories and allows you to do full-text searches with different
    language support: [`https://github.com/mirkosertic/FXDesktopSearch`](https://github.com/mirkosertic/FXDesktopSearch)'
