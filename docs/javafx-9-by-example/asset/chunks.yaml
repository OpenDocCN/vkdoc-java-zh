  trans: '

    ### JavaFX JavaBean


    了解了 JavaBean 规范创建领域对象的方法后，我将重写之前的 JavaBean `User` 类，改用 JavaFX 属性。在重写 bean 的过程中，我还想添加一个名为
    `userName` 的只读属性，以演示只读属性的行为。清单 4-27 展示了使用 JavaFX 属性重写后的 `User` 类。


    ```

    import javafx.beans.property.*;

    public class User {

    private final static String USERNAME_PROP_NAME = "userName";

    private final ReadOnlyStringWrapper userName;

    private final static String PASSWORD_PROP_NAME = "password";

    private final StringProperty password;

    public User() {

    userName = new ReadOnlyStringWrapper(this,

    USERNAME_PROP_NAME, System.getProperty("user.name"));

    password = new SimpleStringProperty(this, PASSWORD_PROP_NAME, "");

    }

    public final String getUserName() {

    return userName.get();

    }

    public ReadOnlyStringProperty userNameProperty() {

    return userName.getReadOnlyProperty();

    }

    public final String getPassword() {

    return password.get();

    }

    public final void setPassword(String password) {

    this.password.set(password);

    }

    public StringProperty passwordProperty() {

    return password;

    }

    }

    清单 4-27.

    作为 JavaFX Bean 重写的文件 User.java

    ```


    你可能注意到我在实例化 `ReadOnlyStringWrapper` 和 `SimpleStringProperty` 类时存在一些明显差异。与 JavaBean
    属性变更支持类似，JavaFX 属性的构造函数允许你指定 bean 本身、其属性名称及其值。作为一个简单示例，清单 4-28 展示了使用基于 JavaFX
    属性变更支持的构造函数来实例化只读属性和可读写属性。`userName` 变量被赋值为只读属性，而 `password` 变量被赋值为可读写属性。


    ```

    userName = new ReadOnlyStringWrapper(this, USERNAME_PROP_NAME, System.getProperty("user.name"));

    password = new SimpleStringProperty(this, PASSWORD_PROP_NAME, "");

    清单 4-28.

    实例化只读属性和可读写属性

    ```


    出于多种原因（例如第三方工具和测试），使用基于属性变更支持的构造函数是一种良好实践。但最重要的是，在处理属性变更支持时，你需要访问 bean 及其其他属性。


    最后要提的一点是，在清单 4-26 中，请注意 getter 和 setter 方法都是 final 的。将 getter 和 setter 设为 final
    可以防止任何派生类重写并可能更改底层属性。


    ### 属性变更支持


    属性变更支持是指添加处理程序代码的能力，该代码将在属性发生变化时做出响应。JavaFX 属性对象包含一个 `addListener()` 方法。该方法接受两种类型的函数式接口：`ChangeListener`
    和 `InvalidationListener`。回想一下，函数式接口是使用 Java lambda 语法表达的单一抽象方法。所有 JavaFX 属性都是
    `ObservableValue` 和 `Observable` 接口（方法重载）的后代，这两个接口分别提供了用于 `ChangeListener` 和 `InvalidationListener`
    的 `addListener()` 方法。最后，请记住，通过移除监听器来清理它们非常重要。清理监听器的目的是回收内存。要移除它们，你需要调用 `removeListener()`
    方法，并传入一个引用的（命名的）监听器，而不是匿名内部类或匿名 lambda 表达式。


    清单 4-29 展示了如何创建一个 `ChangeListener` 并将其注册到属性上。当属性值发生变化时，`change()` 方法将被调用。我提供了匿名内部类和
    lambda 表达式两种语法风格的实现，供你比较。


    ```

    SimpleIntegerProperty xProperty = new SimpleIntegerProperty(0);

    // 添加变更监听器（匿名内部类）

    xProperty.addListener(new ChangeListener(){

    @Override

    public void changed(ObservableValue ov,

    Number oldVal, Number newVal) {

    // 代码写在这里

    }

    });

    // 添加变更监听器（lambda 表达式）

    xProperty.addListener((ObservableValue ov,

    Number oldVal, Number newVal) -> {

    // 代码写在这里

    });

    清单 4-29.

    添加 ChangeListener 实例以在属性值变化时做出响应

    ```


    清单 4-30 展示了如何创建一个 `InvalidationListener` 并将其注册到属性上。当属性值发生变化时，`invalidated()` 方法将被调用。我提供了匿名内部类和
    lambda 表达式两种语法风格的实现，供你比较。


    ```

    // 添加失效监听器（匿名内部类）

    xProperty.addListener(new InvalidationListener() {

    @Override

    public void invalidated(Observable o) {

    // 代码写在这里

    }

    });

    // 添加失效监听器（lambda 表达式）

    xProperty.addListener((Observable o) -> {

    // 代码写在这里

    });

    清单 4-30.

    添加 InvalidationListener 实例以在属性值变化时做出响应

    ```


    开发人员常常对 `ChangeListener` 和 `InvalidationListener` 之间的区别感到困惑。在清单 4-30 中，你会注意到，使用
    `ChangeListener` 时，你将获得 `Observable`（`ObservableValue`）、旧值和新值；而使用 `InvalidationListener`
    时，你只能获得 `Observable` 对象（属性）。


    在 Javadoc 文档中，`ChangeListener` 和 `InvalidationListener` 之间的区别描述如下：


    *   “变更事件表示值已更改。如果当前值不再有效，则会生成失效事件。当 `ObservableValue` 支持惰性求值时，这种区别变得很重要，因为对于惰性求值的值，在重新计算之前，无法知道一个无效值是否真的发生了变化。因此，生成变更事件需要急切求值，而失效事件则可以为急切求值和惰性求值实现生成。”


    `InvalidationListener` 提供了一种将值标记为无效的方法，但直到需要时才重新计算该值。这通常用于 UI 布局或自定义控件中，当节点在布局请求或绘制周期中不需要重绘/重新定位时，你可以避免不必要的计算。使用
    `ChangeListener` 时，你通常希望进行急切求值，例如在表单类应用程序中对属性进行验证。这并不意味着你不能使用 `InvalidationListener`
    进行属性验证；这完全取决于你的性能要求以及你确切需要在何时重新计算（求值）新值。当你访问可观察值时，会导致 `InvalidationListener` 变为急切求值。

    '
- fmt: "# Binding\n\nSimply put, binding has the idea of at least two values (properties)\
    \ being synchronized. This means that when a dependent variable changes, the other\
    \ variable changes. JavaFX provides many binding options that enable the developer\
    \ to synchronize between properties in domain objects and GUI controls. In this\
    \ section, you learn about three binding strategies when binding property objects.\n\
    \nThis section focuses on the following JavaFX API packages:\n\n*   `javafx.beans.binding.*`\n\
    *   `javafx.beans.property.*`\n\nBinding properties is quite easy to do. The only\
    \ requirement is that the property invoking the `bind()` must be a read/writeable\
    \ property. To bind a property to another property, you will invoke the `bind()`\
    \ method. This method will bind in one direction (unidirectional). For instance,\
    \ when property A binds to property B, the change in property B will update property\
    \ A, but not the other way. If A is bound to B you can’t update A, as you’ll get\
    \ `RuntimeException: A bound value cannot be set`.\n\nThe following are three\
    \ additional binding strategies to consider using in JavaFX’s Properties API:\n\
    \n*   Bidirectional binding on a Java Bean\n*   High-level binding using the Fluent\
    \ API\n*   Low-level binding using `javafx.beans.binding.*` binding objects\n\n\
    ## Bidirectional Binding\n\nBidirectional binding allows you to bind properties\
    \ with the same type allowing changes on either end while keeping a value synchronized.\
    \ When binding bi-directionally, it’s required that both properties must be read/writable.\
    \ It’s pretty easy to bind two properties bidirectionally through the use of the\
    \ `bindBidirectional()` method. To demonstrate, I’ve created a simple example.\n\
    \nListing [4-31](#A323804_3_En_4_Chapter.html#Par152) is a `Contact` bean having\
    \ a property `firstName` that is bound bidirectionally to a local variable `fname`\
    \ of type `StringProperty`.\n\n```\nContact contact = new Contact(\"John\", \"\
    Doe\");\nStringProperty fname = new SimpleStringProperty();\nfname.bindBidirectional(contact.firstNameProperty());\n\
    contact.firstNameProperty().set(\"Play\");\nfname.set(\"Jane\");\nSystem.out.println(\"\
    contact.firstNameProperty = \" + contact.firstNameProperty().get() );\nSystem.out.println(\"\
    fname = \" + fname.get() );\nListing 4-31.\nBidirectional Binding Between the\
    \ firstName Property and a Regular String Property Variable\n```\n\nThe output\
    \ of this code snippet is as follows:\n\n```\ncontact.firstNameProperty = Jane\n\
    fname = Jane\n```\n\n## High-Level Binding\n\nIntroduced in JavaFX 2.0 is a fluent\
    \ interface API to bind properties. The fluent APIs are methods that allow you\
    \ to perform operations on properties using English-like method names. For example,\
    \ if you have a numeric property, there are methods like `multiply()`, `divide()`,\
    \ `subtract()`, and so on. Another example would be a string property having methods\
    \ like `isEqualTo()`, `isNotEqualTo()`, `concat()`, and similar. As an example,\
    \ Listing [4-32](#A323804_3_En_4_Chapter.html#Par156) shows how to create a property\
    \ that represents the formula for the area of a rectangle.\n\n```\n// Area = width\
    \ * height\nIntegerProperty width = new SimpleIntegerProperty(10);\nIntegerProperty\
    \ height = new SimpleIntegerProperty(10);\nNumberBinding area = width.multiply(height);\n\
    Listing 4-32.\nCreating a Property (area) Using the High-Level Binding Strategy\
    \ for Calculating the Area of a Rectangle\n```\n\nThis code demonstrates high-level\
    \ binding by using the fluent API from the `javafx.beans.binding.IntegerExpression`\
    \ parent interface. This example binds by using the `multiply()` method, which\
    \ returns a `NumberBinding` containing the computed value. What’s nice is that\
    \ the binding is lazy-evaluated, which means the computation (multiplying) doesn’t\
    \ occur unless you invoke the property’s (area) value via the `get()` (or `getValue()`)\
    \ method. For all available fluent interfaces, see the Javadoc for `javafx.beans.binding.*`\
    \ packages.\n\n## Low-Level Binding\n\nWhen using low-level binding, you would\
    \ use a derived `NumberBinding` class, such as a `DoubleBinding` class for values\
    \ of type `Double`. With a `DoubleBinding` class, you will override its `computeValue()`\
    \ method so that you can use the familiar operators such as `*` and `-` to formulate\
    \ complex math equations. The difference between high-and low-level binding is\
    \ that high-level uses methods such as `multiply()` and `subtract()` instead of\
    \ the operators `*` and `-`. Listing [4-33](#A323804_3_En_4_Chapter.html#Par159)\
    \ shows how to create a low-level binding for the formula for the volume of a\
    \ sphere.\n\n```\nDoubleProperty radius = new SimpleDoubleProperty(2);\nDoubleBinding\
    \ volumeOfSphere = new DoubleBinding() {\n{\nsuper.bind(radius); // initial bind\n\
    }\n@Override\nprotected double computeValue() {\n// Math.pow() (power) cubes the\
    \ radius\nreturn (4 / 3 * Math.PI * Math.pow(radius.get(), 3));\n}\n};\nListing\
    \ 4-33.\nA Property Binding (volumnOfSphere) Using the Low-Level Binding Strategy\n\
    ```\n\nIf you’ve gotten this far, you are definitely ready to begin building GUIs.\
    \ So far you’ve had a chance to learn about lambda expressions, properties, and\
    \ bindings. Next, I want to close out this chapter with an example showing how\
    \ to build a snazzy-looking logon dialog that uses shapes, lambda expressions,\
    \ properties, and bindings (with a hint of UI controls).\n\n# A Logon Dialog Example\n\
    \nLogon dialogs are typical of any application when authenticating users. In this\
