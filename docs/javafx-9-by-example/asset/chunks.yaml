    \ environments /bin/bash\n    export JAVA_HOME=/usr/java/jdk-9\n    export PATH=$PATH:$JAVA_HOME/bin\n\
    \    ```\n\n*   On Linux and other Unix operating systems that use C shell (csh)\
    \ environments, launch a terminal window and edit either the `∼/.cshrc` or `∼/.login`\
    \ file to contain the `setenv` commands. Add the `export` commands.\n\n```\n \
    \   #csh environments\n    setenv JAVA_HOME /usr/java/jdk-9\n    setenv PATH ${JAVA_HOME}/bin:${PATH}\n\
    \    ```\n\nTable 1-2.\n\nThe vi Editor’s Keyboard Commands After Editing a File\n\
    \n| Action | Command | Notes |\n| --- | --- | --- |\n| Navigate | Use arrow keys\
    \ up, down, right, and left | Arrow keys, Page Up/Down, and Home and End can also\
    \ be used to navigate cursor. |\n| Insert text | i | After a text file is loaded\
    \ you can modify the file, but before you can, you have to press ‘i’ for insert.\
    \ To get back to command mode, press the ESC key. |\n| Add text | a | After a\
    \ text file is loaded you can modify the file, but before you can you have to\
    \ press ‘a’ for add. To get back to command mode, press the ESC key. |\n| Command\
    \ mode | ESC | Exits editor mode, bringing you to command mode. |\n| Save file\
    \ | `:w` | Assuming you are in command mode (press ESC) before typing `:w` (colon\
    \ ‘w’). The file is saved. To save and exit, type `:wq`. |\n| Exit editor | `:q`\
    \ | Brings you back to the command-line prompt. |\n| Exit with no changes | `:q!`\
    \ | Modifications are ignored and exits editor . |\n| Save and Exit | `:wq` |\
    \ File is saved and exits immediately. |\n\nTable 1-1.\n\nThe Nano Editor’s Keyboard\
    \ Commands After Editing a File\n\n| Action | Command | Notes |\n| --- | --- |\
    \ --- |\n| Navigate | Use arrow keys up, down, right, and left | Arrow keys, Page\
    \ Up/Down, and Home and End can also be used to navigate the cursor. |\n| Save\
    \ File | Ctrl/Control+O | Editor prompts the name of the file. Just press Enter\
    \ to accept the same name. |\n| Exit Editor | Ctrl/Control+X | Brings you back\
    \ to the command-line prompt . |\n\nOnce you’ve set up your path and `JAVA_HOME`\
    \ environment variables , you will want to verify them by launching a terminal\
    \ window and executing the following two commands from the command prompt:\n\n\
    ```\n$ java -version\n$ javac -version\n```\n\nThe output in each case should\
    \ display a message indicating the Java 9 version of the language and runtime.\
    \ Here is the display output of the version.\n\n```\nJava -version\njava version\
    \ \"1.9.0-ea\"\nJava(TM) SE Runtime Environment (build 1.9.0-ea-b90)\nJava HotSpot(TM)\
    \ 64-Bit Server VM (build 1.9.0-ea-b90, mixed mode)\njavac -version\njavac 1.9.0\n\
    ```\n\n## Installing Gradle\n\nIf you have not downloaded Gradle yet, visit [`http://gradle.org/gradle-download`](http://gradle.org/gradle-download)\
    \ . After downloading the binary distribution, you’ll want to install Gradle.\
    \ To install Gradle, follow these steps:\n\n1.  Unzip the Gradle software into\
    \ a directory.  \n2.  Update the environment variable `GRADLE_HOME` to point to\
    \ the directory located where the `gradle` folder was created after the unzipped\
    \ file.  \n3.  Update the environment variable `PATH` to include the `$GRADLE_HOME/bin`.\
    \ In Windows, it would be `%GRADLE_HOME%/bin`. To make these variables permanent,\
    \ follow the instructions mentioned earlier regarding `JAVA_HOME`.  \n4.  To verify\
    \ that Gradle was installed properly at the command line (the terminal), type\
    \ the following command :\n\n    ```\n    gradle -version\n    ```\n\nThe version\
    \ information is shown here:\n\n```\n\nGradle 2.7\n\nBuild time:   2015-09-14\
    \ 07:26:16 UTC\nBuild number: none\nRevision:     c41505168da69fb0650f4e31c9e01b50ffc97893\n\
    Groovy:       2.3.10\nAnt:          Apache Ant(TM) version 1.9.3 compiled on December\
    \ 23 2013\nJVM:          1.9.0-ea (Oracle Corporation 1.9.0-ea-b90)\nOS:     \
    \      Mac OS X 10.11.1 x86_64\n```\n\nNow that you have the JDK installed, you\
    \ can install the NetBeans IDE. Installing the NetBeans IDE is optional, so you\
    \ may skip the next section."
  trans: "\n### 设置 MacOS X/Linux 环境变量\n\n若要在 MacOS X 或 Linux 上永久设置环境变量，你可以使用 nano\
    \ 或 vim 等常见文本编辑器。但在编辑用户 shell 配置文件之前，建议先备份一份，以防操作失误。由于许多 Unix 和 Linux 系统使用不同的\
    \ shell，我详细列出了需要复制和编辑的典型文件。\n\n在 Mac 上，输入以下命令：\n\n```\n$ cp ∼/.bash_profile ∼/.bash_profile.orig\n\
    ```\n\n在 Linux 操作系统上，你需要输入以下命令来确定当前使用的 shell 类型，然后才能知道要复制和编辑哪个文件。不同的 shell 在创建控制台会话时使用不同的文件来导出环境变量。\n\
    \n```\n$  echo $0\n-bash\n```\n\n如果输出显示 `-bash`，则需要备份并编辑主目录下的 `.bashrc` 文件。如果输出显示\
    \ `-csh`，则需要备份并编辑主目录下的 `.cshrc` 文件。接下来，在编辑前先复制 `.bashrc` 文件作为备份。\n\n```\n$ cp\
    \ ∼/.bashrc ∼/.bashrc.orig\n```\n\n如果你使用的是 Linux 操作系统且 shell 为 C shell，请输入以下命令：\n\
    \n```\n$ cp ∼/.cshrc ∼/.cshrc.orig\n```\n\n现在，你需要使用 nano 或 vi 文本编辑器编辑刚刚备份的文件。要加载文件，请输入以下命令：\n\
    \n```\n$ nano ∼/.bash_profile\n```\n\n或者\n\n```\n$ vi ∼/.bash_profile\n```\n\n\
    请注意，我使用的是 MacOS X 操作系统 `home` 目录下的 `∼/.bash_profile` 文件。相信你会根据你的 Linux 操作系统和 shell\
    \ 类型，将其替换为相应的文件。从上一个命令加载文件后，你需要执行编辑、保存和退出编辑器的操作。表格 1-1 和 1-2 分别快速列出了 nano 和 vim\
    \ 的常用命令。\n\n*   要为 MacOS X 平台设置 `JAVA_HOME`，你需要打开一个终端窗口，编辑主目录下的 `.bash_profile`\
    \ 文件（例如，`nano ∼/.bash_profile`），并在文件末尾添加 `export` 命令：\n\n```\n    # Mac OS X /bin/bash\n\
    \    export JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-9.jdk/Contents/Home\n\
    \    export PATH=$PATH:$JAVA_HOME/bin\n    ```\n\n*   在 Linux 和其他使用 Bash shell\
    \ 环境的 Unix 操作系统上，打开一个终端窗口，编辑 `∼/.bashrc` 或 `∼/.profile` 文件，使其包含 `export` 命令。添加\
    \ `export` 命令。\n\n```\n    # Linux bash, bourne shell environments /bin/bash\n\
    \    export JAVA_HOME=/usr/java/jdk-9\n    export PATH=$PATH:$JAVA_HOME/bin\n\
    \    ```\n\n*   在 Linux 和其他使用 C shell (csh) 环境的 Unix 操作系统上，打开一个终端窗口，编辑 `∼/.cshrc`\
    \ 或 `∼/.login` 文件，使其包含 `setenv` 命令。添加 `export` 命令。\n\n```\n    #csh environments\n\
    \    setenv JAVA_HOME /usr/java/jdk-9\n    setenv PATH ${JAVA_HOME}/bin:${PATH}\n\
    \    ```\n\n表 1-2.\n\nvi 编辑器编辑文件后的键盘命令\n\n| 操作 | 命令 | 说明 |\n| --- | --- | ---\
    \ |\n| 导航 | 使用上、下、右、左箭头键 | 箭头键、Page Up/Down 以及 Home 和 End 键也可用于移动光标。 |\n| 插入文本\
    \ | i | 文本文件加载后即可修改，但修改前需按 'i' 键进入插入模式。要返回命令模式，请按 ESC 键。 |\n| 追加文本 | a | 文本文件加载后即可修改，但修改前需按\
    \ 'a' 键进入追加模式。要返回命令模式，请按 ESC 键。 |\n| 命令模式 | ESC | 退出编辑器模式，进入命令模式。 |\n| 保存文件 |\
    \ `:w` | 假设你在输入 `:w`（冒号 'w'）之前已处于命令模式（按 ESC）。文件将被保存。要保存并退出，请输入 `:wq`。 |\n| 退出编辑器\
    \ | `:q` | 返回命令行提示符。 |\n| 不保存退出 | `:q!` | 忽略修改并退出编辑器。 |\n| 保存并退出 | `:wq` | 保存文件并立即退出。\
    \ |\n\n表 1-1.\n\nNano 编辑器编辑文件后的键盘命令\n\n| 操作 | 命令 | 说明 |\n| --- | --- | --- |\n\
    | 导航 | 使用上、下、右、左箭头键 | 箭头键、Page Up/Down 以及 Home 和 End 键也可用于移动光标。 |\n| 保存文件 | Ctrl/Control+O\
    \ | 编辑器会提示输入文件名。直接按 Enter 键接受相同文件名。 |\n| 退出编辑器 | Ctrl/Control+X | 返回命令行提示符。 |\n\
    \n设置好路径和 `JAVA_HOME` 环境变量后，你需要打开一个终端窗口，在命令提示符下执行以下两个命令来验证它们：\n\n```\n$ java -version\n\
    $ javac -version\n```\n\n每个命令的输出都应显示一条消息，指示 Java 9 版本的语言和运行时。以下是版本显示输出。\n\n```\n\
    Java -version\njava version \"1.9.0-ea\"\nJava(TM) SE Runtime Environment (build\
    \ 1.9.0-ea-b90)\nJava HotSpot(TM) 64-Bit Server VM (build 1.9.0-ea-b90, mixed\
    \ mode)\njavac -version\njavac 1.9.0\n```\n\n## 安装 Gradle\n\n如果你尚未下载 Gradle，请访问\
    \ [`http://gradle.org/gradle-download`](http://gradle.org/gradle-download)。下载二进制发行版后，你需要安装\
    \ Gradle。要安装 Gradle，请遵循以下步骤：\n\n1.  将 Gradle 软件解压到一个目录中。  \n2.  更新环境变量 `GRADLE_HOME`，使其指向解压后\
    \ `gradle` 文件夹所在的目录。  \n3.  更新环境变量 `PATH`，使其包含 `$GRADLE_HOME/bin`。在 Windows 中，则为\
    \ `%GRADLE_HOME%/bin`。要使这些变量永久生效，请遵循前面关于 `JAVA_HOME` 的说明。  \n4.  要在命令行（终端）验证 Gradle\
    \ 是否正确安装，请输入以下命令：\n\n    ```\n    gradle -version\n    ```\n\n版本信息如下所示：\n\n```\n\
    \nGradle 2.7\n\nBuild time:   2015-09-14 07:26:16 UTC\nBuild number: none\nRevision:\
    \     c41505168da69fb0650f4e31c9e01b50ffc97893\nGroovy:       2.3.10\nAnt:   \
    \       Apache Ant(TM) version 1.9.3 compiled on December 23 2013\nJVM:      \
    \    1.9.0-ea (Oracle Corporation 1.9.0-ea-b90)\nOS:           Mac OS X 10.11.1\
    \ x86_64\n```\n\n现在你已经安装了 JDK，可以安装 NetBeans IDE 了。安装 NetBeans IDE 是可选的，因此你可以跳过下一节。\n"
- fmt: "# Installing the NetBeans IDE\n\nWhen developing JavaFX applications, you\
    \ might want to use the NetBeans IDE. Be sure to download the correct NetBeans\
    \ version containing JavaFX. If you haven’t already downloaded the NetBeans IDE,\
    \ go to following location:\n\n[`https://netbeans.org/downloads/index.html`](https://netbeans.org/downloads/index.html)\n\
    \nTo install the NetBeans IDE, follow these steps:\n\n1. Install NetBeans 8.2\
    \ or later. Launch the binary executable. On the Windows platform, you will receive\
    \ a security warning to inform the user about installing software.\n2. Begin the\
    \ NetBeans IDE installation process by clicking the Next button. Figure [1-17](#A323804_3_En_1_Chapter.html#Fig17)\
    \ prompts the user to begin the installation process.\n\n   ![A323804_3_En_1_Fig17_HTML.jpg](A323804_3_En_1_Fig17_HTML.jpg)\n\
    \n   Figure 1-17. NetBeans IDE installer\n\n3. Read and accept the NetBeans license\
    \ agreement. After reading and agreeing to the terms, click the “I accept the\
    \ terms in the license agreement” check box and then click Next to proceed as\
    \ shown in Figure [1-18](#A323804_3_En_1_Chapter.html#Fig18).\n\n   ![A323804_3_En_1_Fig18_HTML.jpg](A323804_3_En_1_Fig18_HTML.jpg)\n\
    \n   Figure 1-18. NetBeans license agreement\n\n4. Next, you can choose the destination\
    \ directory to install NetBeans and select the Java 9 SE Development Kit previously\
    \ installed. As usual, keep the defaults for the destination to install the NetBeans\
    \ IDE and the JDK 9, as shown in Figure [1-19](#A323804_3_En_1_Chapter.html#Fig19).\n\
    \n   ![A323804_3_En_1_Fig19_HTML.jpg](A323804_3_En_1_Fig19_HTML.jpg)\n\n   Figure\
    \ 1-19. NetBeans IDE installation\n\n5. On the Summary screen, the Check for Updates\
    \ option allows the installer to retrieve any updates or patches to the current\
    \ NetBeans version and any other plug-in dependencies. Accept the defaults and\
    \ click the Install button, as shown in Figure [1-20](#A323804_3_En_1_Chapter.html#Fig20).\n\
    \n   ![A323804_3_En_1_Fig20_HTML.jpg](A323804_3_En_1_Fig20_HTML.jpg)\n\n   Figure\
    \ 1-20. Check for updates\n\n   Figure [1-21](#A323804_3_En_1_Chapter.html#Fig21)\
    \ shows the installation progress bar.\n\n   ![A323804_3_En_1_Fig21_HTML.jpg](A323804_3_En_1_Fig21_HTML.jpg)\n\
    \n   Figure 1-21. Installation progress\n\n6. To complete the setup, in Figure\
    \ [1-22](#A323804_3_En_1_Chapter.html#Fig22) you will be prompted for an optional\
    \ check box to Contribute to the NetBeans team to provide anonymous data usage\
    \ to help diagnose issues and enhance the product. Once you have decided whether\
    \ to contribute, click the Finish button to complete the installation.\n\n   ![A323804_3_En_1_Fig22_HTML.jpg](A323804_3_En_1_Fig22_HTML.jpg)\n\
    \n   Figure 1-22. Setup complete\n\n7. Launch the NetBeans IDE to see the opening\
    \ page, as shown in Figure [1-23](#A323804_3_En_1_Chapter.html#Fig23).\n\n   ![A323804_3_En_1_Fig23_HTML.jpg](A323804_3_En_1_Fig23_HTML.jpg)\n\
    \n   Figure 1-23. NetBeans start page\n\nNow you are ready to go forward and create\
    \ awesome JavaFX applications!\n\n# Creating a JavaFX HelloWorld Application\n\
    \nWhen creating JavaFX applications, you’ll be learning three ways to develop,\
    \ compile, and run applications.\n\n- NetBeans IDE\n- Editor and terminal (the\
    \ command-line prompt)\n- Editor and the Gradle Build tool\n\n## Using the NetBeans\
    \ IDE\n\nTo quickly get started with creating, coding, compiling, and running\
    \ a simple JavaFX HelloWorld application using the NetBeans IDE, follow the steps\
    \ outlined in this section. You’ll want to go deeper in the next section to get\
    \ an understanding of what the IDE is doing behind the scenes on your behalf.\
    \ For now, though, let’s just get some code written and running.\n\n1. Launch\
    \ NetBeans IDE.\n2. On the File menu, select File ➤ New Project.\n3. Under Choose\
    \ Project and Categories, select the JavaFX folder.\n4. Under Projects, select\
    \ Java FX Application, and click Next.\n5. Specify `HelloWorld` for your project\
    \ name.\n6. Change or accept the defaults for the Project Location and Project\
    \ Folder fields. Figure [1-24](#A323804_3_En_1_Chapter.html#Fig24) shows the New\
    \ JavaFX Application wizard used to create a simple HelloWorld application.\n\n\
    \   ![A323804_3_En_1_Fig24_HTML.jpg](A323804_3_En_1_Fig24_HTML.jpg)\n\n   Figure\
    \ 1-24. New JavaFX Application wizard\n\n7. On this screen (Figure [1-24](#A323804_3_En_1_Chapter.html#Fig24)),\
    \ click the Manage Platforms button to make sure the Platform Name field contains\
    \ JDK 1.9 or greater as the default. Click Finish to auto-create the JavaFX HelloWorld\
    \ application.\n8. In a few seconds, NetBeans will generate all the necessary\
    \ files for the HelloWorld project. After NetBeans finishes, the project will\
    \ show up on the left Projects tab. Figure [1-25](#A323804_3_En_1_Chapter.html#Fig25)\
    \ shows a newly created HelloWorld project.\n\n   ![A323804_3_En_1_Fig25_HTML.jpg](A323804_3_En_1_Fig25_HTML.jpg)\n\
    \n   Figure 1-25. A newly created HelloWorld project\n\n9. In the NetBeans IDE\
    \ on the Projects tab (left), select the newly created project. Open the Project\
    \ Properties dialog box from the File menu option Project Properties. Here you\
    \ will verify that the Source/Binary format setting is using JDK 9, as shown in\
    \ Figure [1-26](#A323804_3_En_1_Chapter.html#Fig26). Click Sources under Categories.\n\
    \n   ![A323804_3_En_1_Fig26_HTML.jpg](A323804_3_En_1_Fig26_HTML.jpg)\n\n   Figure\
    \ 1-26. Project properties\n\n10. To run and test your JavaFX HelloWorld application,\
    \ ensure the project folder is selected (the left Projects tab), then click on\
    \ the green Run button or press the F6 key to execute the HelloWorld project.\
    \ Figure [1-27](#A323804_3_En_1_Chapter.html#Fig27) shows the Run Project option\
    \ used to launch the JavaFX application.\n\n    ![A323804_3_En_1_Fig27_HTML.jpg](A323804_3_En_1_Fig27_HTML.jpg)\n\
    \n    Figure 1-27. Running the HelloWorld project\n\n11. After you choose the\
    \ Run option, the output should look like Figure [1-28](#A323804_3_En_1_Chapter.html#Fig28).\n\
    \n    ![A323804_3_En_1_Fig28_HTML.jpg](A323804_3_En_1_Fig28_HTML.jpg)\n\n    Figure\
    \ 1-28. JavaFX HelloWorld launched from the NetBeans IDE\n\nYou shouldn’t encounter\
    \ any difficulty when following Steps 1 through 8. However, step 9 ensures that\
    \ your project’s source/binary format is using JDK 9. Because of the new additions\
    \ to the Java language in Java 9, such as modules, some of the source code in\
    \ this book will rely on the new syntax and therefore will not be backward-compatible\
    \ with prior versions of Java 9. Typically, developers have prior versions of\
    \ the Java development kit such as JDK 8. NetBeans allows you to switch between\
    \ different JDKs when projects require older versions. An important thing to note\
    \ is that in early releases of JavaFX 2.0, the software was packaged separately\
    \ from the Java SDK, which caused some software versioning confusion. Thank goodness\
    \ it is now just one download (JDK 9)! If you are still using Java 7 SDK, the\
    \ latest download will also contain JavaFX in one bundle since JavaFX 2.1.\n\n\
    **Note**\n\nDid you know that Java 7 is at the end of its life? This means that\
    \ Oracle will no longer post any updates or releases for the public. Unless you\
    \ still have a commercial license and a support contract with Oracle, it is advised\
    \ you migrate applications to Java 8 or later. Having no updates to Java 7’s runtime\
    \ may be a security concern. So, you’ve been warned. The official Java 7 end of\
    \ life and FAQ site is here: [`https://www.java.com/en/download/faq/java_7.xml`](https://www.java.com/en/download/faq/java_7.xml)."
