    \ the HTML and JavaScript code in a file resource `weather_template.html`. This\
    \ file is loaded into the JavaFX WebView node.\n\n```\n\nWeather Widget\n\nbody\
    \ { background-color:#ffffff; }\n.tileTextDisplay {\nfont-family: arial,sans-serif;\n\
    font-weight: lighter !important;\ncolor: #878787 !important;\n}\n.largerFont {\n\
