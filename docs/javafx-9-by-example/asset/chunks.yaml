    图 6-6.


    清单 6-2 的输出展示了一个示例应用程序，用于演示 Jens Deter 的 FontAwesomeFX 库。


    ### 工作原理


    在清单 6-6 中，代码首先声明了一个静态 `Map`，用于存储图标包名称（字符串）和 `de.jensd.fx.glyphs.GlyphIcons` 对象列表的条目。以下代码片段是图标包映射的声明。


    ```

    Map> ICON_PACKS_MAP = new HashMap();

    ```


    `GlyphIcons` 是一个接口，供实现类将各个 Unicode 字符映射到矢量图标。例如，`FontAwesomeIcon` 类是 `GlyphIcons`
    接口的一个实现，它包含了来自 TrueType 字体文件 `fontawesome-webfont.ttf` 的所有 FontAwesome 图标映射。要查看完整源代码，请访问
    Jens Deter 的 `FontAwesomeFX` 项目源代码，网址为：


    [`https://bitbucket.org/Jerady/fontawesomefx`](https://bitbucket.org/Jerady/fontawesomefx)


    #### init() 方法


    接下来，重写的 `init()` 方法（来自 `Application` 类）实现了基于字体文件路径加载所有受支持的图标字体文件的过程。JavaFX 的 `javafx.scene.text.Font`
    类可以使用 `openStream()` 方法从输入流中加载字体文件，并将其作为类路径上的资源。在此示例中，字体通过 `loadFont()` 方法并传入给定的输入流进行加载。加载的字体文件是
    TrueType 字体 (TTF) 类型文件，位于 `FontAwesomeFX` 的 JAR 文件内部。以下代码从变量 (`FontAwesomeIconView.TTF_PATH`)
    加载字体文件，该变量是一个包含字体路径的字符串，路径为 `/de/jensd/fx/glyphs/fontawesome/fontawesome-webfont.ttf`：


    ```

    Font.loadFont(GlyphsDude.class.getResource(FontAwesomeIconView.TTF_PATH).openStream(),
    10.0);

    ICON_PACKS_MAP.put("FontAwesomeIcon", Arrays.asList(FontAwesomeIcon.values()));

    ```


    #### start() 方法


    在完成字体的初始设置后，`start()` 方法会设置应用程序的界面。它首先创建应用程序的标题，标题名为 `LabelAwesome`。


    ##### 使用 TextFlow 控件


    在图 6-5 中，您会注意到标题文本。`Label` 和 `Awesome` 具有不同的样式，但显示在一起。此处代码使用了一个 `javafx.scene.text.TextFlow`
    节点来包含混合的 `Text` 对象。在此示例中，开头的单词 Label 只是纯黑色，而单词 Awesome 则具有内阴影效果。以下代码片段将 Label
    和 Awesome 的 `Text` 节点添加到 `TextFlow` 对象中。


    ```

    TextFlow title = new TextFlow(labelText, awesomeText);

    ```


    设置好标题横幅后，创建主显示区域（边框面板的中心）以包含显示图标区域。此处，每个标签都附带文本描述和一个图标字体（图像），并添加到一个 `VBox` 面板中以形成一行。如果您不熟悉诸如
    `BorderPane` 或 `VBox` 之类的布局，请阅读第 5 章，其中涵盖了布局和 Scene Builder。


    ##### 使用 ComboBox 控件


    接下来，创建一个组合框选择控件，其中包含代表特定字体包名称的字符串。清单 6-7 重新展示了 `start()` 方法中创建组合框控件的代码部分，该控件允许用户从
    `FontAwesomeFX` 库中选择支持的字体包。在清单 6-7 中，您会注意到代码使用 `setOnAction()` 方法设置了 `onAction`
    属性。当用户从下拉列表中选择一个图标包时，附加的处理程序 (`EventHandler`) 就会在此方法中被调用。一旦触发了 `onAction` 事件，就会调用
    `showIconList()` 方法。稍后将更详细地解释 `showIconList()` 方法。


    ```

    List iconPackList = new ArrayList();

    iconPackList.add("FontAwesomeIcon");

    iconPackList.add("MaterialDesignIcon");

    iconPackList.add("MaterialIcon");

    iconPackList.add("OctIcon");

    iconPackList.add("WeatherIcon");

    ObservableList obsIconPackList = FXCollections.observableList(iconPackList);

    ComboBox iconPacks = new ComboBox(obsIconPackList);

    iconPacks.setValue(iconPackList.get(0));

    .

    // 代码省略（声明并创建了其他控件）

    .

    .

    // 为组合框控件附加一个操作，以重新显示标签。

    // 当组合框选择一个图标包时。

    iconPacks.setOnAction(actionEvent ->

    showIconList(inputField.getText(),

    labelDisplayPanel,

    iconPacks.getValue(),

    position.getSelectedToggle()

    .getUserData()));

    清单 6-7.

    设置组合框控件以允许用户选择字体包

    ```


    创建用于选择字体包的组合框控件后，代码创建了一个自动搜索文本字段，允许用户在字体包内搜索图标。

