  raw: 'The main bit of code is located in the `start()` method. The `start()` method
    begins by creating the root pane as a [`BorderPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/animation/PathTransition.html?javafx/scene/layout/BorderPane.html)
    to hold menu options at the top ( [`Pos.TOP`](https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html)
    ) of the scene and the main UI elements are placed in the center region (`Pos.CENTER`).
    The code goes on to create the center area with an `AnchorPane` layout to position
    UI elements relative to the the view area. By using a Javafx `Group,` any transforms
    (`Rotate`) applied to the image view outside of the center area of the `BorderPane`
    will be pushed down (beneath the menu bar) automatically. The code statements
    that follow basically call private factory type methods that create and initialize
    UI elements to be added to the scene graph.


    The code goes on to create the center area with an `ImageView` object created
    using the private method `createImageView()`. The code then creates a single instance
    of a custom control to manage images with the class `ImageViewButtons`. Next,
    the code creates the progress indicator via the method `createProgressIndicator()`
    to let the user know an image is being loaded (busy). Lastly, the code makes calls
    to create the various menus and menu items such as Open, Save As, etc.


    Later, you will see code that will dynamically position the progress indicator
    and the custom button control (`ImageViewButtons`). But for now, let’s take a
    detailed walkthrough of each of the factory methods that create UI elements.


    In Listing [7-5](#A323804_3_En_7_Chapter.html#Par79) is a factory function `createImageView()`that
    is called from the `start()` method responsible for creating an `ImageView` node
    to be assigned to the global variable `currentImageView`. The created image view
    node is set to preserve the aspect ratio when the image is being resized via the
    `setPreserveRatio(true)` method. You’ll also notice the rotate parameter is passed
    in as a transform, allowing other code in the application to rotate the image
    view object.


    ```

    private ImageView createImageView(Rotate rotate) {

    ImageView imageView = new ImageView();

    imageView.setPreserveRatio(true);

    imageView.setSmooth(true);

    imageView.getTransforms().addAll(rotate);

    return imageView;

    }

    Listing 7-5.

    A Factory Type Function Creating an ImageView Having a Rotate Transform

    ```


    In Listing [7-6](#A323804_3_En_7_Chapter.html#Par81) is a factory function createProgressIndicator()
    that is called from the `start()` method responsible for creating a JavaFX [`ProgressIndicator`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/effect/ColorAdjust.html)
    node to be assigned to the `progressIndicator` instance variable. The created
    `ProgressIndicator` node using the default constructor will be set to be indeterminate.
    By default, the code hides the progress indicator UI control via the `setVisible(false)`
    method. Lastly, the progress indicator’s max size is set to 100 by 100 pixels.
    Later, you’ll see the code that dynamically positions the progress indicator in
    the center of the application window whenever the scene area is resized.


    ```

    private ProgressIndicator createProgressIndicator() {

    ProgressIndicator progress = new ProgressIndicator();

    progress.setVisible(false);

    progress.setMaxSize(100d, 100d);

    return progress;

    }

    Listing 7-6.

    A Factory Function Creating a Progress Indicator

    ```


    In Listing [7-7](#A323804_3_En_7_Chapter.html#Par83), the `createFileMenu()` method
    gets called from the `start()` method to create the File menu and other menu items.
    The code first creates a [`Menu`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/control/Slider.html)
    object to contain child menu items such as Open, Save As, and Quit. When creating
    the Open menu option, you’ll notice the string `“_Open”` having a prefix of an
    underscore. In order for the menu system to recognize strings with letters prepended
    with an underscore, you must call the `setMnemonicParse(true)` method.


    ```

    private Menu createFileMenu(Stage stage,

    ProgressIndicator progressIndicator) {

    Menu fileMenu = new Menu("File");

    MenuItem loadImagesMenuItem = new MenuItem("_Open");

    loadImagesMenuItem.setMnemonicParsing(true);

    loadImagesMenuItem.setAccelerator(new KeyCodeCombination(KeyCode.O,

    KeyCombination.SHORTCUT_DOWN));

    // file chooser to open a file

    wireupLoadMenuItem(loadImagesMenuItem, stage, progressIndicator);

    MenuItem saveAsMenuItem = new MenuItem("Save _As");

    saveAsMenuItem.setMnemonicParsing(true);

    // file chooser to save image as file

    wireupSaveMenuItem(saveAsMenuItem, stage);

    // Quit application

    MenuItem exitMenuItem = new MenuItem("_Quit");

    exitMenuItem.setMnemonicParsing(true);

    exitMenuItem.setAccelerator(new KeyCodeCombination(KeyCode.Q,

    KeyCombination.SHORTCUT_DOWN));

    // exiting

    exitMenuItem.setOnAction(actionEvent -> Platform.exit());

    fileMenu.getItems().addAll(loadImagesMenuItem,

    saveAsMenuItem, exitMenuItem);

    return fileMenu;

    }

    Listing 7-7.

    A Factory Function That Creates and Returns a File Menu

    ```


    Continuing the discussion of Listing [7-7](#A323804_3_En_7_Chapter.html#Par83)
    regarding underscores prepended to menu text, the underscore before the letter
    O will allow the JavaFX menu system to provide windowed operating systems that
    use key modifiers such as the Alt key in combination with a letter to invoke actions.
    Typically, in a Windows environment when a user presses the Alt key the menus
    will place an underline beneath a letter of the menu text. In addition to using
    the modifier combination, the menu item can also be assigned a key accelerator
    such as ⌘ + O combination based on the Apple keyboard. On Windows- or Linux-based
    OS, the key accelerator (shortcut) is the Ctrl+O key combination.


    The rest of the code is the same in terms of the creation of menu items and wiring
    up handler code, so I won’t go on any further.


    Next up is code dealing with menu options to load images. During the creation
    of the file menu from Listing [7-7](#A323804_3_En_7_Chapter.html#Par83) the child
    menu item `loadImagesMenuItem` is created. At the creation of the `loadImagesMenuItem`
    menu item, it will get the handler code attached via the `wireupLoadMenuItem()`
    method, as shown in Listing [7-8](#A323804_3_En_7_Chapter.html#Par87).'
