    ### FlowPane


    `FlowPane` 布局节点允许一行中的子节点根据可用水平间距流动，并在水平空间小于所有节点宽度总和时将节点换行到下一行。图 5-5 显示了四个子节点从左到右流动然后换行。


    ![A323804_3_En_5_Fig5_HTML.jpg](img/A323804_3_En_5_Fig5_HTML.jpg)


    图 5-5.


    一个 FlowPane 布局，节点从左到右流动，能够根据水平空间换行。Hello 文本节点被换行到下一行，因为可用水平空间（由虚线表示）太小。


    默认情况下，`FlowPane` 布局使子节点从左到右流动（`Pos.TOP_LEFT`）。要更改流动对齐方式，只需调用 `setAlignment()`
    方法并传入 `Pos` 类型的枚举值。清单 5-3 创建了一个 `FlowPane` 布局，使子节点从右到左流动（`Pos.TOP_RIGHT`）。


    ```

    FlowPane flowPane = new FlowPane();

    flowPane.setAlignment(Pos.TOP_RIGHT);

    flowPane.getChildren().addAll(...); // 要添加的子节点。

    清单 5-3.

    创建一个从右到左流动的 FlowPane 布局

    ```


    ### BorderPane


    `BorderPane` 布局节点允许将子节点放置在顶部、底部、左侧、右侧或中心区域。由于每个区域只能有一个节点，开发人员通常会嵌套布局。一个例子是创建一个包含子节点的
    `HBox`，然后通过 `setTop()` 方法将其设置为顶部区域。图 5-6 显示了 `BorderPane` 的区域。


    ![A323804_3_En_5_Fig6_HTML.jpg](img/A323804_3_En_5_Fig6_HTML.jpg)


    图 5-6.


    BorderPane 布局


    这种布局类似于您每天看到的许多网站，其中导航链接放置在页面的顶部、底部、左侧或右侧区域，而主要内容位于中心区域。`BorderPane` 的顶部和底部边框区域允许可调整大小的节点占据所有可用宽度。左侧和右侧边框区域占据顶部和底部边框之间的可用垂直空间。默认情况下，所有边框区域都尊重子节点的大小（首选宽度和高度）。根据
    Javadocs，当节点放置在顶部、底部、左侧、右侧和中心区域时，默认对齐方式如下：


    *   顶部：`Pos.TOP_LEFT`

    *   底部：`Pos.BOTTOM_LEFT`

    *   左侧：`Pos.TOP_LEFT`

    *   右侧：`Pos.TOP_RIGHT`

    *   中心：`Pos.CENTER`


    接下来，您将学习如何将 `GridPane` 布局与 `BorderPane` 结合使用，以创建一个类似于 `Contacts` 表单应用的简单 UI。通过使用
    `BorderPane` 及其中心区域作为根节点，可用的水平和垂直空间将分配给子节点。这将允许文本字段在调整窗口大小时拉伸。

