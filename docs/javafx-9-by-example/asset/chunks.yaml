  trans: '

    ### 简单平移与旋转示例


    现在你有了可观察的对象，就可以通过变换来利用第三维度了。JavaFX 3D 支持所有你期望的标准 3D 变换，并提供了易于使用的类。以下这些继承自 `Transform`
    类的变换，都支持 3D 节点和组：


    *   `Affine`（仿射变换）

    *   `Rotate`（旋转变换）

    *   `Scale`（缩放变换）

    *   `Shear`（剪切变换）

    *   `Translate`（平移变换）


    通常在任何 3D 场景中，你最感兴趣的会是 `Rotate` 和 `Translate`，它们主要涉及移动和改变物体、灯光以及摄像机的朝向。诸如 `Cylinder`
    类这样的 JavaFX Shape3D 对象提供了 setter 方法，可以轻松地应用简单的旋转或平移。清单 11-3 演示了如何将此应用于场景中的 `Cylinder`。


    ```

    /* SimpleScene3D.java */

    //步骤 1c：将图元平移并旋转到指定位置

    cylinder.setRotationAxis(Rotate.X_AXIS);

    cylinder.setRotate(45);

    cylinder.setTranslateZ(-200);

    //步骤 1c 结束

    清单 11-3.

    将图元平移并旋转到指定位置

    ```


    将清单 11-3 中的代码片段添加到当前的 3D 场景应用程序中，将生成一个视图，其中圆柱体已被旋转并朝向摄像机平移。效果应类似于图 11-3。


    ![A323804_3_En_11_Fig3_HTML.jpg](img/A323804_3_En_11_Fig3_HTML.jpg)


    图 11-3.


    一个绕 X 轴旋转了 45 度的圆柱体


    在这个持续运行的示例中，你第一次可以通过绕 X 轴旋转和沿 Z 轴平移来看到第三维度。旋转角度以度为单位设置，范围是 0 到 360 度。首先使用 `setRotationAxis()`
    设置当前的旋转轴非常重要。如果你需要在多个轴上进行多次旋转，则每次轴改变时都需要调用 `setRotationAxis()` 方法。每次调用 `setRotationAxis()`
    仅影响当前的 Shape3D 对象。平移是沿着 set 命令的指定轴以像素为单位设置的，其处理方式与传统 2D 组件的平移相同。


    注意


    JavaFX 3D 场景的坐标系采用“Y 轴向下”，即 Y 轴正方向向下。与大多数 3D 系统一样，Z 轴正方向朝向屏幕内，X 轴正方向朝右。


    ### 多图元变换示例


    本示例在现有设置的基础上进行了扩展，在与 `Cylinder` 相同的场景中添加并变换了 `Cube` 和 `Sphere` 图元。示例代码见清单 11-4。


    ```

    /* SimpleScene3D.java */

    //步骤 1d：添加并变换更多图元

    final PhongMaterial greenMaterial = new PhongMaterial();

    greenMaterial.setDiffuseColor(Color.DARKGREEN);

    greenMaterial.setSpecularColor(Color.GREEN);

    final Box cube = new Box(50, 50, 50);

    cube.setMaterial(greenMaterial);

    final PhongMaterial redMaterial = new PhongMaterial();

    redMaterial.setDiffuseColor(Color.DARKRED);

    redMaterial.setSpecularColor(Color.RED);

    final Sphere sphere = new Sphere(50);

    sphere.setMaterial(redMaterial);

    cube.setRotationAxis(Rotate.Y_AXIS);

    cube.setRotate(45);

    cube.setTranslateX(-150);

    cube.setTranslateY(-150);

    cube.setTranslateZ(150);

    sphere.setTranslateX(150);

    sphere.setTranslateY(150);

    sphere.setTranslateZ(-150);

    sceneRoot.getChildren().addAll(cylinder,cube,sphere);

    //步骤 1d 结束

    清单 11-4.

    添加并变换 Box 和 Sphere 图元

    ```


    这段代码展示了将多种材质和颜色应用于多个图元。每个图元都被平移和旋转到 3D 场景中不同的深度和轴向上。


    在同一个场景中拥有多个 `Shape3D` 对象可以展示出极佳的视觉深度。然而，当你向 3D 场景中添加多个节点或组时，必须将 `add()` 方法改为 `addAll()`
    方法，如下面来自清单 11-4 的代码行所示：


    ```

    sceneRoot.getChildren().addAll(cylinder,cube,sphere);

    ```


    从这个意义上说，将 2D GUI 组件添加为场景子节点与在 3D 中添加没有区别。将前面的代码片段添加到示例中，并将 `add()` 改为 `addAll()`，应该会提供一个类似于图
    11-4 的视图。


    ![A323804_3_En_11_Fig4_HTML.jpg](img/A323804_3_En_11_Fig4_HTML.jpg)


    图 11-4.


    一个立方体、圆柱体和球体图元


    ### 整合在一起：分组图元


    随着场景变得越来越复杂，将每个 3D 对象都添加到场景中会变得很繁琐。图元和其他 Shape3D 节点经常被组合使用以形成更复杂的对象。这些复合对象通常作为一个整体进行变换，尽管每个组件通常可以独立可视化。使用组可以轻松实现这一点，如清单
    11-5 所示。


    ```

    /* SimpleScene3D.java */

    //步骤 1e：整合在一起：分组图元

    Group primitiveGroup = new Group(cylinder,cube,sphere);

    primitiveGroup.setRotationAxis(Rotate.Z_AXIS);

    primitiveGroup.setRotate(180); //将组作为一个整体旋转

    sceneRoot.getChildren().addAll(primitiveGroup);

    //步骤 1e 结束

    清单 11-5.

    分组并变换图元

    ```


    每个图元通过以下代码行添加到 `Group` 对象中：


    ```

    Group primitiveGroup = new Group(cylinder,cube,sphere)

    ```


    然后可以简化许多批量操作。清单 11-5 演示了绕 Z 轴旋转 180 度，这有效地将整个场景作为一个同质单元进行旋转。将前面的代码片段添加到正在运行的图元示例中，应该会提供一个类似于图
    11-5 的视图。


    ![A323804_3_En_11_Fig5_HTML.jpg](img/A323804_3_En_11_Fig5_HTML.jpg)


    图 11-5.


    均匀旋转的分组图元


    请确保将新的 `Group` 对象添加到场景中，而不是添加单个图元，如清单 11-5 所述。单个图元对象仍然可以通过 `Group` 对象的 `getChildren()`
    方法或直接引用来独立访问、旋转和平移。


    注意


    请记住，当将图元、组和其他 `Shape3D` 节点对象添加到 3D 场景时，默认位置是原点。大多数图元通过计算出的质心居中于原点。


    ## 与场景交互


    将对象渲染到 3D 场景中通常只有在你能与该场景交互时才有用。用户至少应该能够在场景中移动并进行一些观察。本章的这一部分将介绍一个简单的第一人称视角控制示例。上一节中的图元示例被用作构建平台。

