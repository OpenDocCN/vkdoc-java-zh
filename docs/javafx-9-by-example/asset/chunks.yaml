- fmt: '### Example: Bosses and Employees Working with Tables


    The previous example used a list of `String` objects for the items inside a `ListView`,
    and in this section we use a domain object often called POJOs (plain old Java
    objects). Keep in mind when using your own domain objects in `ListView` and `TableView`
    controls that you will want to customize the display of object’s fields for each
    row or cell.


    As an example of the `TableView` control, I’ve created an application called Bosses
    and Employees shown in Figure [6-18](#A323804_3_En_6_Chapter.html#Fig18). The
    example application demonstrates how to populate a `TableView` containing an observable
    list of employees (`Person` class) that is based on a selection of a boss from
    a `ListView` control (left side). In Figure [6-18](#A323804_3_En_6_Chapter.html#Fig18),
    you’ll also notice the tooltip when hovering over the list view cell (row).


    ![A323804_3_En_6_Fig18_HTML.jpg](A323804_3_En_6_Fig18_HTML.jpg)


    Figure 6-18.


    The output of the Bosses and Employees application, which demonstrates a JavaFX
    `ListView` and `TableView` control. Observable lists will contain domain objects
    of the `Person` class.


    #### Domain Objects


    Before delving into the main GUI code, we examine the use of a domain object that
    represents a person (`Person`) in this case a boss or an employee. Listing [6-27](#A323804_3_En_6_Chapter.html#Par201)
    shows an implementation of a JavaFX bean (`Person` class) that represents a boss
    or an employee that will be displayed in a `ListView` and `TableView` control.
    A `Person` instance will contain the following properties: `aliasName`, `firstName`,
    `lastName`, and `mood`. A person also has an employees list to hold subordinate
    employees (minions). The GUI code to handle a list view selection and the capability
    to populate the table view appears in Listing [6-28](#A323804_3_En_6_Chapter.html#Par204).


    ```

    public class Person {

    public enum MOOD_TYPES {

    Happy,

    Sad,

    Angry,

    Positive

    }

    private StringProperty aliasName;

    private StringProperty firstName;

    private StringProperty lastName;

    private ObjectProperty mood;

    private ObservableList employees = FXCollections.observableArrayList();

    public Person(String alias, String firstName, String lastName, MOOD_TYPES mood)
    {

    setAliasName(alias);

    setFirstName(firstName);

    setLastName(lastName);

    setMood(mood);

    }

    public final void setAliasName(String value) {

    aliasNameProperty().set(value);

    }

    public final String getAliasName() {

    return aliasNameProperty().get();

    }

    public StringProperty aliasNameProperty() {

    if (aliasName == null) {

    aliasName = new SimpleStringProperty();

    }

    return aliasName;

    }

    public final void setFirstName(String value) {

    firstNameProperty().set(value);

    }

    public final String getFirstName() {

    return firstNameProperty().get();

    }

    public StringProperty firstNameProperty() {

    if (firstName == null) {

    firstName = new SimpleStringProperty();

    }

    return firstName;

    }

    public final void setLastName(String value) {

    lastNameProperty().set(value);

    }

    public final String getLastName() {

    return lastNameProperty().get();

    }

    public StringProperty lastNameProperty() {

    if (lastName == null) {

    lastName = new SimpleStringProperty();

    }

    return lastName;

    }

    public final void setMood(MOOD_TYPES value) {

    moodProperty().set(value);

    }

    public final MOOD_TYPES getMood() {

    return moodProperty().get();

    }

    public ObjectProperty moodProperty() {

    if (mood == null) {

    mood = new SimpleObjectProperty(MOOD_TYPES.Happy);

    }

    return mood;

    }

    public ObservableList employeesProperty() {

    return employees;

    }

    }

    Listing 6-27.

    The Person Class as a JavaFX Bean Used in ObservableLists

    ```


    #### GUI Code


    Now that you learned that domain objects (`Person`) are involved, let’s look at
    the GUI code that will populate and display the data. Listing [6-28](#A323804_3_En_6_Chapter.html#Par204)
    shows the `BossesAndEmployees.java` file containing the main GUI code that will
    populate a `ListView` control representing the bosses. The rest of the code also
    populates the `TableView` control on the right side when the user selects a boss.


    In Listing [6-28](#A323804_3_En_6_Chapter.html#Par204), the GUI code lays out
    controls programmatically as opposed to FXML via Scene Builder tool. This chapter’s
    code examples primarily take on a programmatic approach, which is often considered
    bad practice due to the coupling of GUI code and controller code. However, I believe
    relying on tools to build GUI code will often hide internal mechanics that prevent
    you from learning how things actually work under the covers. To see how to use
    FXML views and controller classes, refer to Chapter [5](#A323804_3_En_5_Chapter.html)
    on layouts and Scene Builder.'
