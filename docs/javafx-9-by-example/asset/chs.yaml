  \ 浏览器 27 版本之前被使用（WebKit 的分支称为 Blink）。HTML5 是在网页浏览器中渲染内容的事实标准标记语言。HTML5 内容包括 JavaScript、CSS、可缩放矢量图形（SVG）、Canvas\
  \ API、媒体、XML 以及新的 HTML 元素标签。简而言之，您可以创建嵌入了类似网页浏览器功能的 JavaFX 应用程序。\n\nJavaFX 与 HTML5\
  \ 之间的关系是一种重要的结合，因为它们通过发挥各自的优势相互补充。例如，JavaFX 丰富的客户端 API 与 HTML5 丰富的网页内容相结合，创造了一种兼具原生桌面软件特性的网页应用用户体验。这种新型应用程序被称为富互联网应用程序（RIA）。\n\
  \n在深入探讨示例应用程序之前，本章将讨论以下核心 Java/JavaFX 基于 Web 的 API：\n\n*   Java 9 模块 `javafx.web`，包命名空间：`javafx.scene.web`\n\
  \    *   `WebEngine`\n    *   `WebView`\n    *   `WebEvent`\n*   Java 9 模块：`jdk.jsobject`，包命名空间：`netscape.javascript`\n\
  \    *   `JSObject`\n*   Java 9 模块：`jdk.incubator.httpclient`，包命名空间：`jdk.incubator.http`。模块\
  \ `jdk.incubator.httpclient` 目前在 Java 9 中仍处于实验阶段。根据一些报告，该模块将在 Java 10 中最终确定并命名为\
  \ `java.httpclient`。\n    *   `HttpClient`\n    *   `HttpRequest`\n    *   `HttpResponse`\n\
  \n在本章中，您将研究实现以下功能的示例应用程序：\n\n*   将 HTML5 内容显示到 `WebView` 节点中（基于 SVG 的模拟时钟）\n*  \
  \ Java 与 JavaScript 之间的通信（`WeatherWidget`）\n\n\n\n## JavaFX Web 与 HTTP2 API\n\n\
  在了解 JavaFX Web 和 HTTP2 API 之前，我想先说明，本章中的代码示例是作为 Java 9 模块（Jigsaw）开发的。鉴于此，我认为向您展示一个包含本章讨论的三个模块的模块定义是个好主意：\n\
  \n*   `javafx.web - WebEngine 和 WebView`\n*   `jdk.jsobject - JSObject`\n*   `jdk.incubator.httpclient\
  \ - HttpClient, HttpRequest, HttpResponse`\n\n下面展示的是一个依赖于这三个模块的典型应用程序模块：\n\n```\n\
  module com.jfxbe.myapplicationmodule {\nrequires javafx.web;\nrequires jdk.jsobject;\n\
  requires jdk.incubator.httpclient;\nexports com.jfxbe.myapplicationmodule;\n}\n\
  ```\n\n作为给性急读者的快速参考，表 10-1 包含了这些模块及其类的描述。我还在描述列中提供了一个简短的代码片段，说明如何使用与 JavaFX Web\
  \ 和 HTTP2 API 相关的各种 API。要查看与每个类相关的更详细讨论，您可以跳过表 10-1。\n\n表 10-1.\n\nJava 模块中包含的类描述\n\
  \n| 模块名称 | 类名 | 描述 |\n| --- | --- | --- |\n| `javafx.web` | `javafx.scene.web.WebEngine`\
  \ | 一个能够加载 Web 内容的非可视化 UI 组件。`WebEngine webEngine = new WebEngine(url);` |\n|  \
  \ | `javafx.scene.web.WebView` | 一个由 `WebEngine` 实例支持的 JavaFX 节点，能够渲染 HTML5 内容以供显示。`WebView\
  \ webView = new WebView();webView.getEngine().load(` [`www.oracle.com`](http://www.oracle.com)\
  \ `\");` |\n|   | `javafx.scene.web.WebEvent` | 常见基于 HTML 浏览器的 Web 事件的回调。这些 Web\
  \ 事件由 `WebEngine` 实例处理。`webView.getEngine()` `.setOnAlert((WebEvent<String> t) ->\
  \ {` `showErrorDialog(t.getData());` `});` |\n| `jdk.jsobject` | `netscape.javascript.JSObject`\
  \ | JavaScript 桥接对象允许 Java 与 JavaScript 引擎通信。当返回时，您可以使用 `setMember()` 方法设置 Java\
  \ 对象，以允许 JavaScript 代码调用 Java 方法。`JSObject jsobj = (JSObject) webView.getEngine()`\
  \ `.executeScript(\"window\");jsobj.setMember(\"WeatherWidget\", this);` |\n| `jdk.incubator.`\
  \ `httpclient` | `jdk.incubator.http.HttpClient` | 一种发起 HTTP 请求的新方式。附加功能包括 WebSocket、认证器、代理和\
  \ SSL。`String jsonText = HttpClient.newHttpClient()` `.send(HttpRequest.newBuilder(\
  \ URI.create(urlQueryString))` `.GET().build(),` `BodyHandler.asString()).body();`\
