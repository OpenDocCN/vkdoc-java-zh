  \ Java 中这些新的强大概念的情况下解决问题时。\n\n我只是浅尝辄止，所以我鼓励你更深入地研究 Java 8 的特性。既然你已经掌握了 lambda 表达式的新能力，让我们回到\
  \ JavaFX 的正题上。\n\n## 属性和绑定\n\n属性基本上是 JavaFX 对象属性（如 String 或 Integer）的包装器对象。属性允许开发者添加监听器代码，以便在包装值发生变化或被标记为无效时做出响应。此外，属性对象可以相互绑定。绑定行为允许属性根据另一个属性变化的值来更新或同步其值。\n\
  \n### UI 模式\n\n在讨论 JavaFX 的属性和绑定 API 之前，我想和你分享一些关于 UI 模式的知识。在开发 GUI 应用程序时，你不可避免地会遇到\
  \ UI 架构框架概念，例如模型-视图-控制器（[MVC](http://martinfowler.com/eaaCatalog/modelViewController.html)）、表示模型（[PM](http://martinfowler.com/eaaDev/PresentationModel.html)）、模型-视图-展示器（[MVP](http://martinfowler.com/eaaDev/ModelViewPresenter.html)）或模型-视图-视图模型（[MVVM](https://msdn.microsoft.com/en-us/library/hh848246.aspx)）。\n\
  \n根据你与谁交谈，你可能会得到不同的解释；然而，这些概念都涉及如何最好地处理模型和视图之间同步的问题。这意味着当用户与 UI（视图）交互（输入）时，底层的后端数据存储（模型）会自动更新，反之亦然。\n\
  \n在不试图过度简化这些概念的前提下，我建议你参考实际涉及的 UI 模式。主要涉及的 UI 模式包括监督控制器、表示模型和中介者。如果你有兴趣了解更多关于 UI\
  \ 模式的知识，请阅读 Martin Fowler 在[`http://martinfowler.com/eaaDev/uiArchs.html`](http://martinfowler.com/eaaDev/uiArchs.html)上发表的“GUI\
  \ 架构”一文。\n\n由于这些模式多年来一直被广泛讨论，JavaFX 团队设计并实现了 API，以克服这些 UI 场景中出现的问题。在本节中，你将学习如何使用\
  \ JavaFX 属性和绑定来同步你的 GUI 和数据对象。当然，我不可能涵盖所有涉及上述 UI 模式的用例场景，但我希望能为你提供基础知识，让你走上正确的道路。\n\
  \n\n\n### 属性\n\n在 JavaFX 属性 API 出现之前，Java Swing 开发者遵循 JavaBean 约定（规范），该规范规定对象应包含私有作用域的实例变量，并配有相应的\
  \ getter（访问器）和 setter（修改器）方法。例如，一个 `User` 类可能有一个 `String` 类型的私有实例变量 `password`。对应的\
  \ getter 和 setter 方法分别是 `getPassword()` 和 `setPassword()`。清单 4-24 展示了一个遵循旧版 JavaBean\
  \ 约定的 `User` 类。\n\n```\npublic class User {\nprivate String password;\npublic String\
  \ getPassword() {\nreturn password;\n}\npublic void setPassword(String password)\
  \ {\nthis.password = password;\n}\n}\n清单 4-24.\n一个包含 Getter 和 Setter 方法的简单 JavaBean\
  \ 类\n```\n\n作为遵循 JavaBean 约定的开发者，你会很快发现属性的命名约定是基于 getter 和 setter 方法名，而非私有变量名。换句话说，如果\
  \ getter 方法名为 `getPwd()`，那么属性名就是 `pwd`，与名为 `password` 的属性无关。\n\nJavaBeans 规范还提供了一个包含属性变更支持（`java.beans.PropertyChangeSupport`）概念的\
  \ API，允许开发者在属性发生变化时添加处理（监听）代码。在当时，这仅解决了属性变更支持的部分问题。当涉及到变量绑定和与 Collections API 配合使用时，JavaBeans\
  \ API 开始显露出其局限性。尽管 JavaBeans API 已成为构建领域对象的标准方式，但它仍然缺乏在 GUI 应用程序中同步领域模型和视图的稳健方法，如前所述。\n\
  \n多年来，JavaBean 规范和 API 催生了许多第三方工具和框架，以改善开发者体验。然而，使用单向或双向绑定将 GUI 组件连接到 JavaBeans\
  \ 仍然相当复杂。有时，开发者会因资源未正确释放而导致对象泄漏。开发者很快意识到，他们需要一种更好的方式来绑定和解绑 GUI 控件，使其与属性连接。\n\n###\
  \ JavaFX 属性的类型\n\n让我们快进到 JavaFX 的属性 API，看看它是如何处理常见问题的。我将首先讨论基于 JavaFX 的属性的不同类型。需要关注的有两种类型：\n\
  \n*   可读写\n*   只读\n\n简而言之，JavaFX 的属性是包装对象，它们持有实际值，同时提供变更支持、失效支持和绑定能力。我稍后会讨论绑定，但现在先来看看常用的属性类。\n\
  \n属性是包装对象，能够使值以可读写或只读的方式访问。所有包装属性类都位于 `javafx.beans.property.*` 包命名空间中。下面列出的是常用的属性类。要查看所有属性类，请参考\
  \ Javadoc 文档。\n\n*   `javafx.beans.property.SimpleBooleanProperty`\n*   `javafx.beans.property.ReadOnlyBooleanWrapper`\n\
  *   `javafx.beans.property.SimpleIntegerProperty`\n*   `javafx.beans.property.ReadOnlyIntegerWrapper`\n\
  *   `javafx.beans.property.SimpleDoubleProperty`\n*   `javafx.beans.property.ReadOnlyDoubleWrapper`\n\
  *   `javafx.beans.property.SimpleStringProperty`\n*   `javafx.beans.property.ReadOnlyStringWrapper`\n\
  \n前缀为 `Simple`、后缀为 `Property` 的属性是可读写属性类，而前缀为 `ReadOnly`、后缀为 `Wrapper` 的类是只读属性。稍后，你将看到如何使用这些常用属性创建\
  \ JavaFX bean，但现在我们先来了解可读写属性。\n\n#### 可读写属性\n\n顾名思义，可读写属性是指既可以读取也可以修改的属性值。例如，我们来看一下\
  \ JavaFX 字符串属性。要创建一个既能读取又能写入包装值的字符串属性，你需要使用 `javafx.beans.property.SimpleStringProperty`\
  \ 类。清单 4-25 是一个代码片段，演示了 `SimpleStringProperty` 类的实例，并通过 `set()` 方法修改属性。\n\n```\n\
  StringProperty password = new SimpleStringProperty(\"password1\");\npassword.set(\"\
  1234\");\nSystem.out.println(\"修改后的 StringProperty \" + password.get() ); // 1234\n\
  清单 4-25.\n创建一个 StringProperty 实例\n```\n\n这里，一个声明为 `StringProperty` 类型的变量 `password`\
  \ 被赋值为 `SimpleStringProperty` 类的实例。在面向对象语言中，声明变量时尽量使用抽象类型总是一个好习惯。因此，引用 `StringProperty`\
  \ 会暴露更少的实现类（`SimpleStringProperty`）的方法。同时请注意，实际值是字符串“`password1`”，它被传递给了 `SimpleStringProperty`\
  \ 类的构造函数。稍后你将发现，在处理 JavaBeans 和属性对象时，还有其他方便的构造函数方法。\n\n在读取值时，你需要调用 `get()` 方法（或\
  \ `getValue()`），该方法将实际的包装值（`String`）返回给调用者。要修改值，只需调用 `set()` 方法（或 `setValue()`）并传入一个字符串即可。\n\
  \n#### 只读属性\n\n要使属性变为只读，你需要使用 `javafx.beans.property.*` 包中前缀为 `ReadOnly` 的包装类。要创建一个只读属性，需要两个步骤。首先，实例化一个只读包装类，并调用\
  \ `getReadOnlyProperty()` 方法返回一个真正的只读属性对象。清单 4-26 创建了一个只读字符串属性。\n\n```\nReadOnlyStringWrapper\
  \ userName = new ReadOnlyStringWrapper(\"jamestkirk\");\nReadOnlyStringProperty\
  \ readOnlyUserName = userName.getReadOnlyProperty();\n清单 4-26.\n创建一个只读字符串属性\n```\n\
  \n这段代码实际上需要两个步骤来获取一个只读字符串属性。你会注意到调用了 `getReadOnlyProperty()`，它返回该属性的一个只读副本（同步的）。根据\
  \ Javadoc API 的描述，`ReadOnlyStringWrapper` 类“创建了两个同步的属性。一个属性是只读的，可以传递给外部用户。另一个属性是可读写的，应仅在内部使用。”知道另一个属性可读可写，可能会让恶意开发者将对象强制转换为\
  \ `StringProperty` 类型，从而随意修改。从安全角度来看，你应该了解创建真正只读属性的正确步骤。\n\n\n\n### JavaFX JavaBean\n\
  \n了解了 JavaBean 规范创建领域对象的方法后，我将重写之前的 JavaBean `User` 类，改用 JavaFX 属性。在重写 bean 的过程中，我还想添加一个名为\
  \ `userName` 的只读属性，以演示只读属性的行为。清单 4-27 展示了使用 JavaFX 属性重写后的 `User` 类。\n\n```\nimport\
  \ javafx.beans.property.*;\npublic class User {\nprivate final static String USERNAME_PROP_NAME\
  \ = \"userName\";\nprivate final ReadOnlyStringWrapper userName;\nprivate final\
  \ static String PASSWORD_PROP_NAME = \"password\";\nprivate final StringProperty\
  \ password;\npublic User() {\nuserName = new ReadOnlyStringWrapper(this,\nUSERNAME_PROP_NAME,\
  \ System.getProperty(\"user.name\"));\npassword = new SimpleStringProperty(this,\
  \ PASSWORD_PROP_NAME, \"\");\n}\npublic final String getUserName() {\nreturn userName.get();\n\
  }\npublic ReadOnlyStringProperty userNameProperty() {\nreturn userName.getReadOnlyProperty();\n\
  }\npublic final String getPassword() {\nreturn password.get();\n}\npublic final\
  \ void setPassword(String password) {\nthis.password.set(password);\n}\npublic StringProperty\
  \ passwordProperty() {\nreturn password;\n}\n}\n清单 4-27.\n作为 JavaFX Bean 重写的文件 User.java\n\
  ```\n\n你可能注意到我在实例化 `ReadOnlyStringWrapper` 和 `SimpleStringProperty` 类时存在一些明显差异。与\
  \ JavaBean 属性变更支持类似，JavaFX 属性的构造函数允许你指定 bean 本身、其属性名称及其值。作为一个简单示例，清单 4-28 展示了使用基于\
  \ JavaFX 属性变更支持的构造函数来实例化只读属性和可读写属性。`userName` 变量被赋值为只读属性，而 `password` 变量被赋值为可读写属性。\n\
  \n```\nuserName = new ReadOnlyStringWrapper(this, USERNAME_PROP_NAME, System.getProperty(\"\
  user.name\"));\npassword = new SimpleStringProperty(this, PASSWORD_PROP_NAME, \"\
  \");\n清单 4-28.\n实例化只读属性和可读写属性\n```\n\n出于多种原因（例如第三方工具和测试），使用基于属性变更支持的构造函数是一种良好实践。但最重要的是，在处理属性变更支持时，你需要访问\
  \ bean 及其其他属性。\n\n最后要提的一点是，在清单 4-26 中，请注意 getter 和 setter 方法都是 final 的。将 getter\
  \ 和 setter 设为 final 可以防止任何派生类重写并可能更改底层属性。\n\n### 属性变更支持\n\n属性变更支持是指添加处理程序代码的能力，该代码将在属性发生变化时做出响应。JavaFX\
  \ 属性对象包含一个 `addListener()` 方法。该方法接受两种类型的函数式接口：`ChangeListener` 和 `InvalidationListener`。回想一下，函数式接口是使用\
  \ Java lambda 语法表达的单一抽象方法。所有 JavaFX 属性都是 `ObservableValue` 和 `Observable` 接口（方法重载）的后代，这两个接口分别提供了用于\
  \ `ChangeListener` 和 `InvalidationListener` 的 `addListener()` 方法。最后，请记住，通过移除监听器来清理它们非常重要。清理监听器的目的是回收内存。要移除它们，你需要调用\
  \ `removeListener()` 方法，并传入一个引用的（命名的）监听器，而不是匿名内部类或匿名 lambda 表达式。\n\n清单 4-29 展示了如何创建一个\
  \ `ChangeListener` 并将其注册到属性上。当属性值发生变化时，`change()` 方法将被调用。我提供了匿名内部类和 lambda 表达式两种语法风格的实现，供你比较。\n\
  \n```\nSimpleIntegerProperty xProperty = new SimpleIntegerProperty(0);\n// 添加变更监听器（匿名内部类）\n\
  xProperty.addListener(new ChangeListener(){\n@Override\npublic void changed(ObservableValue\
  \ ov,\nNumber oldVal, Number newVal) {\n// 代码写在这里\n}\n});\n// 添加变更监听器（lambda 表达式）\n\
  xProperty.addListener((ObservableValue ov,\nNumber oldVal, Number newVal) -> {\n\
  // 代码写在这里\n});\n清单 4-29.\n添加 ChangeListener 实例以在属性值变化时做出响应\n```\n\n清单 4-30 展示了如何创建一个\
  \ `InvalidationListener` 并将其注册到属性上。当属性值发生变化时，`invalidated()` 方法将被调用。我提供了匿名内部类和 lambda\
  \ 表达式两种语法风格的实现，供你比较。\n\n```\n// 添加失效监听器（匿名内部类）\nxProperty.addListener(new InvalidationListener()\
  \ {\n@Override\npublic void invalidated(Observable o) {\n// 代码写在这里\n}\n});\n// 添加失效监听器（lambda\
  \ 表达式）\nxProperty.addListener((Observable o) -> {\n// 代码写在这里\n});\n清单 4-30.\n添加\
  \ InvalidationListener 实例以在属性值变化时做出响应\n```\n\n开发人员常常对 `ChangeListener` 和 `InvalidationListener`\
  \ 之间的区别感到困惑。在清单 4-30 中，你会注意到，使用 `ChangeListener` 时，你将获得 `Observable`（`ObservableValue`）、旧值和新值；而使用\
  \ `InvalidationListener` 时，你只能获得 `Observable` 对象（属性）。\n\n在 Javadoc 文档中，`ChangeListener`\
  \ 和 `InvalidationListener` 之间的区别描述如下：\n\n*   “变更事件表示值已更改。如果当前值不再有效，则会生成失效事件。当 `ObservableValue`\
  \ 支持惰性求值时，这种区别变得很重要，因为对于惰性求值的值，在重新计算之前，无法知道一个无效值是否真的发生了变化。因此，生成变更事件需要急切求值，而失效事件则可以为急切求值和惰性求值实现生成。”\n\
  \n`InvalidationListener` 提供了一种将值标记为无效的方法，但直到需要时才重新计算该值。这通常用于 UI 布局或自定义控件中，当节点在布局请求或绘制周期中不需要重绘/重新定位时，你可以避免不必要的计算。使用\
  \ `ChangeListener` 时，你通常希望进行急切求值，例如在表单类应用程序中对属性进行验证。这并不意味着你不能使用 `InvalidationListener`\
  \ 进行属性验证；这完全取决于你的性能要求以及你确切需要在何时重新计算（求值）新值。当你访问可观察值时，会导致 `InvalidationListener` 变为急切求值。\n\
  \n\n\n## 绑定\n\n简单来说，绑定的核心思想是至少两个值（属性）保持同步。这意味着当一个依赖变量发生变化时，另一个变量也会随之改变。JavaFX 提供了多种绑定选项，使开发者能够同步领域对象和\
  \ GUI 控件中的属性。在本节中，你将学习绑定属性对象时的三种绑定策略。\n\n本节重点介绍以下 JavaFX API 包：\n\n*   `javafx.beans.binding.*`\n\
  *   `javafx.beans.property.*`\n\n绑定属性相当容易。唯一的要求是调用绑定的属性必须是可读/写的属性。要将一个属性绑定到另一个属性，你需要调用\
  \ `bind()` 方法。此方法将进行单向绑定。例如，当属性 A 绑定到属性 B 时，属性 B 的变化会更新属性 A，但反之则不然。如果 A 绑定到 B，则无法更新\
  \ A，否则会抛出 `RuntimeException: A bound value cannot be set`。\n\n以下是 JavaFX 属性 API\
  \ 中可考虑使用的另外三种绑定策略：\n\n*   Java Bean 上的双向绑定\n*   使用 Fluent API 的高级绑定\n*   使用 `javafx.beans.binding.*`\
  \ 绑定对象的低级绑定\n\n### 双向绑定\n\n双向绑定允许你绑定相同类型的属性，允许任一端发生更改，同时保持值同步。进行双向绑定时，要求两个属性都必须是可读/写的。通过使用\
  \ `bindBidirectional()` 方法，双向绑定两个属性非常容易。为了演示，我创建了一个简单的示例。\n\n清单 4-31 是一个 `Contact`\
  \ Bean，它有一个 `firstName` 属性，该属性与一个类型为 `StringProperty` 的局部变量 `fname` 进行了双向绑定。\n\n\
  ```\nContact contact = new Contact(\"John\", \"Doe\");\nStringProperty fname = new\
  \ SimpleStringProperty();\nfname.bindBidirectional(contact.firstNameProperty());\n\
  contact.firstNameProperty().set(\"Play\");\nfname.set(\"Jane\");\nSystem.out.println(\"\
  contact.firstNameProperty = \" + contact.firstNameProperty().get() );\nSystem.out.println(\"\
  fname = \" + fname.get() );\n清单 4-31.\nfirstName 属性与常规字符串属性变量之间的双向绑定\n```\n\n此代码片段的输出如下：\n\
  \n```\ncontact.firstNameProperty = Jane\nfname = Jane\n```\n\n### 高级绑定\n\nJavaFX\
  \ 2.0 引入了一个流畅接口 API 来绑定属性。流畅 API 是允许你使用类似英文的方法名对属性执行操作的方法。例如，如果你有一个数值属性，则有 `multiply()`、`divide()`、`subtract()`\
  \ 等方法。另一个例子是字符串属性，它具有 `isEqualTo()`、`isNotEqualTo()`、`concat()` 等方法。例如，清单 4-32 展示了如何创建一个表示矩形面积公式的属性。\n\
  \n```\n// Area = width * height\nIntegerProperty width = new SimpleIntegerProperty(10);\n\
  IntegerProperty height = new SimpleIntegerProperty(10);\nNumberBinding area = width.multiply(height);\n\
  清单 4-32.\n使用高级绑定策略创建用于计算矩形面积的属性 (area)\n```\n\n此代码通过使用来自 `javafx.beans.binding.IntegerExpression`\
  \ 父接口的流畅 API 演示了高级绑定。此示例通过使用 `multiply()` 方法进行绑定，该方法返回一个包含计算值的 `NumberBinding`。好处在于绑定是惰性求值的，这意味着除非你通过\
  \ `get()`（或 `getValue()`）方法调用属性（area）的值，否则不会进行计算（乘法）。有关所有可用的流畅接口，请参阅 `javafx.beans.binding.*`\
  \ 包的 Javadoc。\n\n### 低级绑定\n\n使用低级绑定时，你将使用派生的 `NumberBinding` 类，例如用于 `Double` 类型值的\
  \ `DoubleBinding` 类。使用 `DoubleBinding` 类，你将重写其 `computeValue()` 方法，以便可以使用熟悉的运算符（如\
  \ `*` 和 `-`）来制定复杂的数学方程。高级绑定和低级绑定之间的区别在于，高级绑定使用 `multiply()` 和 `subtract()` 等方法，而不是运算符\
  \ `*` 和 `-`。清单 4-33 展示了如何为球体体积公式创建低级绑定。\n\n```\nDoubleProperty radius = new SimpleDoubleProperty(2);\n\
  DoubleBinding volumeOfSphere = new DoubleBinding() {\n{\nsuper.bind(radius); //\
  \ 初始绑定\n}\n@Override\nprotected double computeValue() {\n// Math.pow() (幂) 对半径进行立方运算\n\
  return (4 / 3 * Math.PI * Math.pow(radius.get(), 3));\n}\n};\n清单 4-33.\n使用低级绑定策略的属性绑定\
  \ (volumnOfSphere)\n```\n\n如果你已经读到这里，那么你肯定已经准备好开始构建 GUI 了。到目前为止，你已经有机会学习了 lambda\
  \ 表达式、属性和绑定。接下来，我想用一个示例来结束本章，该示例展示了如何构建一个外观时髦的登录对话框，其中使用了形状、lambda 表达式、属性和绑定（并附带一些\
  \ UI 控件）。\n\n## 登录对话框示例\n\n在验证用户身份时，登录对话框是任何应用程序的典型功能。在此示例中，我创建了一个简单的表单应用程序，它将涉及你在第\
  \ 3 章和本章中学到的所有技能。在深入分析你将在清单 4-34 中看到的代码之前，让我们先看一下登录对话框窗口。图 4-3 显示了代码将创建的登录对话框窗口的初始显示。\n\
  \n![A323804_3_En_4_Fig3_HTML.jpg](img/A323804_3_En_4_Fig3_HTML.jpg)\n\n图 4-3.\n\n\
  登录对话框窗口的初始显示\n\n以下是与应用程序交互的说明。\n\n1.  用户将有三次机会输入正确的密码。图 4-4 显示了用户第一次尝试登录。（注意：密码是\
  \ `password1`。）\n\n    ![A323804_3_En_4_Fig4_HTML.jpg](img/A323804_3_En_4_Fig4_HTML.jpg)\n\
  \n    图 4-4.\n\n    用户正在登录对话框窗口中输入密码  \n2.  当用户输入密码时，他们有机会按 Enter 键。如果密码不正确，密码文本字段的右侧会出现一个红色的\
  \ X。图 4-5 显示了无效登录。\n\n    ![A323804_3_En_4_Fig5_HTML.jpg](img/A323804_3_En_4_Fig5_HTML.jpg)\n\
  \n    图 4-5.\n\n    用户输入了无效密码并按下了 Enter 键  \n3.  如果用户实时输入了正确的密码，则会显示一个绿色的勾号。出现绿色勾号后，用户可以按\
  \ Enter 键获得访问权限。图 4-6 显示了用户输入有效密码。\n\n    ![A323804_3_En_4_Fig6_HTML.jpg](img/A323804_3_En_4_Fig6_HTML.jpg)\n\
  \n    图 4-6.\n\n    用户输入了有效密码\n\n### 登录对话框源代码\n\n清单 4-34 显示了 JavaFX 示例登录对话框应用程序的源代码。清单\
  \ 4-35 列出了用于设置此 JavaFX 示例登录对话框应用程序样式的 `style.css` 文件。\n\n\n\n```\n/**\n* 一个用于演示\
  \ Lambda 表达式、属性和绑定的登录表单。\n* @author cdea\n*/\npublic class FormValidation extends\
  \ Application {\nprivate final static String MY_PASS = \"password1\";\nprivate final\
  \ static BooleanProperty GRANTED_ACCESS = new SimpleBooleanProperty();\nprivate\
  \ final static int MAX_ATTEMPTS = 3;\nprivate final IntegerProperty ATTEMPTS = new\
  \ SimpleIntegerProperty();\n@Override\npublic void start(Stage primaryStage) {\n\
  // 创建一个代表用户的领域模型\nUser user = new User();\n// 创建一个透明舞台\nprimaryStage.initStyle(StageStyle.TRANSPARENT);\n\
  primaryStage.setAlwaysOnTop(true);\nGroup root = new Group();\nScene scene = new\
  \ Scene(root, 320, 112, null);\n// 加载 style.css 以设置 JavaFX 节点的样式\nscene.getStylesheets()\n\
  .add(getClass()\n.getResource(\"/style.css\")\n.toExternalForm());\nprimaryStage.setScene(scene);\n\
  // 圆角矩形背景\nRectangle background = new Rectangle();\nbackground.setId(\"background-rect\"\
  );\nbackground.widthProperty()\n.bind(scene.widthProperty()\n.subtract(5));\nbackground.heightProperty()\n\
  .bind(scene.heightProperty()\n.subtract(5));\n// 一个只读字段，用于保存用户名。\nLabel userName\
  \ = new Label();\nuserName.setId(\"username\");\nuserName.textProperty()\n.bind(user.userNameProperty());\n\
  HBox userNameCell = new HBox();\nuserNameCell.getChildren()\n.add(userName);\n//\
  \ 当标签文本宽度超过背景减去挂锁图标时。\nuserNameCell.maxWidthProperty()\n.bind(primaryStage.widthProperty()\n\
  .subtract(45));\nuserNameCell.prefWidthProperty()\n.bind(primaryStage.widthProperty()\n\
