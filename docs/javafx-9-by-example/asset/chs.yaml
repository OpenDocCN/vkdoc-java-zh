  ### 工作原理是什么？


  这个 `circle` 对象使用 `PathTransition` 沿着 `onePath` 路径进行动画，过渡时间为 4000 毫秒。`onePath` 的点元素列表由
  `LineTo` 对象定义，这些对象是根据从简单鼠标事件处理程序捕获的 x 和 y 坐标构建的。在这种情况下，捕获由 `OnMousePressed` 事件启动，由
  `OnMouseDragged` 事件收集，并使用 `OnMouseReleased` 事件完成。


  然而，如前所述，描绘是一种非常自然的人类交互方式，并且适合用手来完成。如果您在支持触摸的屏幕设备上运行此程序，您可以轻松使用 JavaFX 触摸事件支持来增强您的描绘应用程序。触摸事件，如同所有手势事件一样，在
  JavaFX 9 中拥有一流的事件处理能力。如果某个 GUI 组件支持 `Mouse` 事件，那么它也将支持手势事件。最棒的是，`Mouse` 事件和手势事件可以在单个应用程序中很好地共存。您无需替换现有的
  `Mouse` 事件处理程序，而是可以将每个 `Mouse` 事件处理程序与其对应的 `Touch` 事件处理程序匹配起来。这就是为什么在清单 14-1 中添加了
  `MousePressed`、`TouchPressed`、`MouseDragged`、`TouchMoved`、`MouseReleased` 和 `TouchReleased`
  事件。


  如您所见，我们非常谨慎地确保手势事件处理能够像使用传统的 `Mouse` 事件处理一样无缝且自然。




  ## 在 3D 场景中触摸、旋转和缩放


  在操作 3D 场景时，最重要的交互通常是旋转和缩放，这些操作主要涉及移动和改变物体或摄像头的朝向。将手势支持集成到你的 3D 应用程序中，是对传统鼠标和键盘操作的一种自然增强。JavaFX
  的 `Shape3D` 对象，无论是基本几何体还是自定义三角形网格，都默认支持所有手势事件，例如 `Rotate` 和 `Zoom`。


  为了演示在 JavaFX 3D 场景中使用手势事件，我们向一个 `TriangleMesh` 示例中添加了 `touchStationary`、`Rotate`
  和 `Zoom` 手势事件。


  基础的 `TriangleMesh` 示例创建了四个金字塔形的 `TriangleMesh` 对象，每个对象都被添加到一个 `MeshView` 容器中以便显示。每个
  `MeshView` 容器都被添加到一个 `Group` 节点中，然后该节点再被添加到 3D 场景图中。


  我们希望通过为每个金字塔添加一个 `Rotate` 手势事件来增强场景。用户应该能够触摸一个金字塔，然后使用旋转手势使其绕 z 轴旋转。如果你阅读过本章前面的示例，就会知道我们需要为
  `Rotate` 手势添加一个事件处理器，在本例中是 `OnRotate`。但是，你必须首先提供一种方法，通知你的应用程序哪个屏幕上的对象是打算旋转的，否则你应该旋转摄像头的视角。如果你遵循多点触控的范式，你首先需要为
  `OnTouchStationary` 添加一个事件处理器。`OnTouchStationary` 事件向应用程序指示发生了单次触摸，并且触摸点保持在相同的相对位置。这将其与
  `OnTouchPressed` 和 `OnTouchMoved` 事件区分开来，后两者在设备上发生任何触摸时都会立即触发，无论该触摸是否是移动手势的一部分。


  策略是选择一个屏幕上的对象作为活动节点，使其成为后续手势的焦点。`OnTouchStationary` 事件会在任何 `OnRotate` 或 `OnZoom`
  事件之前发生，因此 `activeNode` 将对后续的手势事件可用。你可以通过添加以下事件处理器来使用此事件选择活动节点：


  ```

  scene.setOnTouchStationary(event -> {

  Node picked = event.getTouchPoint().getPickResult().getIntersectedNode();

  if (null != picked) {

  activeNode = picked;

  } else {

  activeNode = camera;

  }

  event.consume();

  });

  ```


  你可以通过 `TouchPoint` 对象访问位置数据。`TouchPoint` 对象内置了拾取支持，可以自动让你访问到被相交的节点，也就是屏幕上的对象 `picked`。如果没有拾取到任何对象，即触摸点不在任何屏幕对象上，那么摄像头将被设置为
  `activeNode`。现在你可以添加 `OnRotate` 事件处理器：


  ```

  scene.setOnRotate(event -> {

  if (null == activeNode) {

  activeNode = camera;

  }

  activeNode.setRotationAxis(Rotate.Z_AXIS);

  activeNode.setRotate(activeNode.getRotate() + event.getAngle());

  event.consume();

  });

  ```


  使用 `event.getAngle()` 访问 `Rotate` 手势提供的旋转角度值，并将其添加到当前节点的先前旋转值上。这将使屏幕上的对象旋转。如果用户没有触摸任何对象，那么摄像头本身将被旋转，这将导致整个场景看起来在旋转。图
  14-2 展示了当你对场景中的几个对象（本例中是填充的对象）应用旋转手势时，场景的外观。


  ![A323804_3_En_14_Fig2_HTML.jpg](img/A323804_3_En_14_Fig2_HTML.jpg)


  图 14-2.


  使用手势旋转 3D 金字塔 注意


  从技术上讲，任何场景中的所有对象都是节点。然而，在拾取对象时，JavaFX 返回的是对 `MeshView` 对象的引用。任何 `Group` 容器都会被忽略，因为
  `Group` 容器会首先将其包含的节点对象提供给 `Picking` API，而 `Grabbing` API 只会将 `TouchPoint` 事件传递给屏幕上最顶层的
  `Node`（按 z 轴顺序）。


  现在，让我们遵循相同的模式，让用户能够缩放 `activeNode`。这将产生放大或缩小所选节点的效果。为此，我们利用 `OnZoom` 事件：


  ```

  scene.setOnZoom(event -> {

  if(null == activeNode) {

  activeNode = camera;

  }

  double zoomFactor = event.getZoomFactor();

  zoomFactor *= zoomFactor < 1.0 ? -1 : 1;

  activeNode.setScaleX(activeNode.getScaleX() + zoomFactor / 50);

  activeNode.setScaleY(activeNode.getScaleY() + zoomFactor / 50);

  activeNode.setScaleZ(activeNode.getScaleZ() + zoomFactor / 50);

  event.consume();

  });

  ```


  `Zoom` 事件提供了一个双精度浮点型的 `ZoomFactor`，它是一个从 0.0 开始的正值。返回值在 0.0 到 1.0 之间表示“捏合”缩放手势。返回值高于
  1.0 表示“张开”缩放手势。在这里，你可以使用“捏合”值来负向缩放对象，而“张开”值可以正向缩放对象。图 14-3 是当你对场景中的几个对象应用缩放手势时屏幕的一个示例。


  ![A323804_3_En_14_Fig3_HTML.jpg](img/A323804_3_En_14_Fig3_HTML.jpg)


  图 14-3.


  使用手势缩放 3D 金字塔


  这三个事件处理器——`OnTouchStationary`、`OnRotate` 和 `OnZoom`——已经为你的 3D 场景启用了多点触控手势支持。这些效果是叠加的，因为用户可以通过手指的“捏合”和“旋转”动作组合来同时进行旋转和缩放。这种交互方式不仅对人类来说非常自然，而且通常比使用鼠标和键盘的解决方案更简单。


  注意


  在这里，我们使用固定的整数 50 来“缩放”我们的缩放比例。这是为了补偿屏幕坐标和缩放坐标之间的差异。在处理 3D 场景时，这是一种常见做法，可以将其视为一个灵敏度变量。


  ## Leap Motion 控制器


  Leap Motion 控制器（见图 14-4），也称为 Leap，是一个小型设备，尺寸为 80×30×12 毫米，通过 USB 端口连接到你的计算机。它不需要外部电源。


  ![A323804_3_En_14_Fig4_HTML.jpg](img/A323804_3_En_14_Fig4_HTML.jpg)


  图 14-4.


  Leap Motion 设备及其包装盒


  Leap 软件可在 Windows、MacOS X 和 Linux 上运行，初始售价为 79.99 美元，于 2013 年 7 月推出，首批在全球销售了 60
  万台。


  该公司在此处有一些介绍视频：[`https://www.leapmotion.com/`](https://www.leapmotion.com/)。观看其中几个视频后，你会对该设备看似神奇的性能感到惊讶。


  基本上，Leap 会以非常快的速度扫描你的手，并以非常精确的方式将你的动作和手势传输到计算机，因此任何支持 Leap 的应用程序都可以直接进行交互，无需使用鼠标、键盘或任何其他物理设备。


  随着与机器交互的新时代开始，许多挑战也同时出现。作为用户，我们需要学习如何在 3D 环境中进行交互，执行一整套全新的手势；而作为开发者，我们将面临提供能够准确翻译这些手势的软件的挑战，以便新应用程序能按我们的预期做出响应。凭借提供的手部追踪功能，Leap
  Motion 目前正涉足虚拟现实和增强现实领域，以与全新世界进行交互，并与主要 VR 制造商合作，将 Leap Motion 技术嵌入到移动 VR/AR 头显中。


  在本章中，我们将重点介绍桌面控制器，首先描述 Leap Motion 提供的硬件和软件。然后，我们将讨论使用该设备开发 JavaFX 程序的 API，并提供一个示例应用程序，以展示一旦你拥有
  Leap 设备后可以实现的功能。




  ### 工作原理


  该设备的主要硬件由三个红外 LED 灯和两个单色红外（IR）摄像头组成。LED 灯投射出由红外光点构成的 3D 图案，而摄像头则以近 300fps 的速率扫描反射数据。半径
  50 厘米范围内的所有物体都会被扫描和处理。数据以 0.01 毫米的分辨率在主机上由 Leap Motion 软件通过专有运动检测算法进行分析。


  根据 CPU 性能和分析的数据量，处理延迟范围在 2 毫秒到 33 毫秒之间。


  体验 Leap 神奇效果的最佳方式就是将其插入 USB 端口，并从[`https://www.leapmotion.com/setup`](https://www.leapmotion.com/setup)安装软件。任务栏通知区域（Windows）或菜单栏（Mac）上会出现一个小的
  Leap 图标，该图标应为绿色，与设备侧面的 LED 灯（应朝向您）颜色一致。点击该图标并选择“可视化工具”，即可看到您手指和手掌的惊人可视化效果。


  当您看到灰色网格时，移动您的手，按 H 键查看菜单，按 N 键可视化手掌，按 T 键显示手指，按 O 键绘制手势，或按 L 键查看延迟。您将看到类似图 14-5
  的画面。


  ![A323804_3_En_14_Fig5_HTML.jpg](img/A323804_3_En_14_Fig5_HTML.jpg)


  图 14-5.


  Leap Motion 诊断可视化工具应用


  如您所见，该设备可在 60 厘米范围内和 120-150 度视角内检测到手、手指和尖锐工具。对于这些物体，3D 向量提供了位置、方向和速度信息，所有这些都参照一个右手笛卡尔坐标系，其原点位于设备中心，如图
  14-6 所示。每次设备扫描并处理可用数据时，都会生成一个`Frame`对象，其中包含该时刻跟踪到的数据列表（手、手指和工具），以及通过对最近几帧分析发现的一组基本运动手势（滑动、点击和画圈）。


  ![A323804_3_En_14_Fig6_HTML.jpg](img/A323804_3_En_14_Fig6_HTML.jpg)


  图 14-6.


  以设备为中心的坐标系


  您可能已经注意到，y 轴正方向与大多数计算机图形系统（包括 JavaFX）中的向下方向相反。但数据是参照设备位置，而非像您习惯的鼠标和触摸事件那样参照屏幕，这一事实极大地改变了您的思考方式。幸运的是，API
  提供了几个有用的方法，可以随时找到您的手和手指指向的位置。


  更复杂的任务需要理解空间几何，包括向量、向量叉积和矩阵运算等术语的知识。


  ### Leap SDK 入门


  为了集成 Leap 设备事件并与软件应用交互，Leap Motion 在其开发者专区为多种编程语言（包括 Java）提供了 SDK。请确保选择仅适用于桌面的 V2
  跟踪版本：[`https://developer.leapmotion.com/sdk/v2`](https://developer.leapmotion.com/sdk/v2)。他们新的
  Orion 测试版仅适用于 Windows，且主要面向 VR。


  下载适用于您操作系统的 SDK，您将获得入门所需的库。这些库主要包括`LeapJava.jar`和一系列原生库。SDK 还包含一个`HelloWorld.java`示例。


  将这些文件集成到系统中的一种简单方法是在 Linux 或 Windows 上将 JAR 添加到`<JAVA_HOME>/jre/lib/ext`（在 Mac 上为`/Library/Java/Extensions`）。然后将原生库（Windows
  的`LeapJava.dll`、`Leap.dll`和`Leapd.dll`，Mac 的`libLeapJava.dylib`和`libLeap.dylib`，Linux
  的`libLeapJava.so`和`libLeap.so`）复制到`<JAVA_HOME>/bin`文件夹。


  或者，您也可以将 JAR 作为依赖项添加到每个项目中，并将原生库作为 VM 参数加载：`-Djava.library.path=<原生库路径>`。这就是我们在示例中将要做的，这样您就能看到它在
  Java 9 模块系统中的工作方式。


  在进一步操作之前，请查阅[`https://developer.leapmotion.com/documentation/java/index.html`](https://developer.leapmotion.com/documentation/java/index.html)上的文档，并尝试运行`HelloWorld.java`示例。您会注意到以下几点：


  *   需要一个`Controller`对象来建立 Leap 设备与应用之间的连接。

  *   需要一个`Listener`子类来处理来自控制器的事件。

  *   在`onConnect()`方法中启用手势跟踪。

  *   该类中的主要方法是`onFrame()`，这是一个回调方法，当包含运动跟踪数据的新`Frame`可用时被调度。在这里，您可以获取手、手指或工具的列表，以及多个包含其位置、方向和速度的向量。

  *   如果启用了手势，您还将根据对最近几帧的分析获得检测到的手势列表。您还将了解手势的状态：是刚刚开始、正在进行还是已经结束。


  ### 将 Leap SDK 添加到 JavaFX 项目


  您在本书中可能已经发现的一件事是，必须小心处理所谓的 JavaFX 线程与其他非 JavaFX 线程的混合。此时，您会清楚地看到，Leap Listener 子类在非
  JavaFX 线程中运行，以非常高的速率处理事件。


  为了将这些事件引入 JavaFX 线程，您将在`Listener`子类中使用 JavaFX 的`ObjectProperty<T>`来存储每一帧上的所需值。然后在
  JavaFX 类中，您将实现一个`ChangeListener<T>`来监听任何变化，并通过使用`Platform.runLater()`，将渲染这些变化到 JavaFX
  场景图上的任务放到 JavaFX 线程上执行。


