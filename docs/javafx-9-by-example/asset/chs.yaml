  awesomeText.setEffect(innerShadow);\nawesomeText.setFill(Color.WHITE);\nawesomeText.setFont(Font.font(\"\
  Helvetica\", FontWeight.BOLD, 60));\nTextFlow title = new TextFlow(labelText, awesomeText);\n\
