  ... // PhotoViewer.java 的其余部分\n清单 7-3.\nPhotoViewer 类的状态变量和常量声明\n```\n\n清单 7-2 首先创建了一个名为\
  \ `LOGGER` 的变量。它是一个标准日志记录器，用于辅助将调试语句输出到控制台。与流行的日志记录器（如 Apache log4j）类似，标准 Java 日志记录器也具有各种日志级别。为了提供与\
  \ log4j 等效的调试日志级别，你可以使用 `Level.FINE` 作为日志级别。要查看其他日志级别，请参阅 Javadoc 文档了解详情。\n\n接下来是一个名为\
  \ `currentImageView`（[`javafx.scene.image.ImageView`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/image/ImageView.html)）的变量，它将代表应用程序查看图像的主显示区域。当图像被加载时，它们将显示在\
  \ `ImageView` 节点中。`currentImageView` 变量将在 `start()` 方法中创建。稍后，你将看到操作逻辑如何附加到 UI 元素上——但现在我们继续讨论其他实例变量。\n\
  \n在声明了 `currentImageView` 变量之后，声明并创建了 `rotate`（[`javafx.scene.transform.Rotate`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/transform/Rotate.html)）变量。它将用作\
  \ `ImageView` 节点的旋转变换。换句话说，`rotate` 变量负责旋转当前正在查看的图像。如前所述，每张加载的图像都会有一个关联的 `ImageInfo`\
  \ 对象，其中包含其旋转角度，该角度会被应用到 `rotate` 变量上。一旦应用了当前图像的度数，当前图像视图节点将自动旋转。\n\n接下来，`colorAdjust`\
  \ 变量被创建为一个 [`javafx.scene.effect.ColorAdjust`](http://www.w3.org/Addressing/URL/url-spec.txt)\
  \ 实例，以允许用户更改当前显示图像的色彩属性。每当加载图像时，都会创建一个 `ImageInfo` 实例，其中包含一个 `ColorAdjust` 对象（通过\
  \ `getColorAdjust()` 方法）。稍后，你将看到 `updateSliders()` 方法的代码，该方法负责更新包含滑块及其值的菜单项。这些绑定到每个滑块的值将代表来自\
  \ `ImageInfo` 对象颜色调整属性的色相、饱和度、亮度和对比度级别。\n\n\n\n如前所述，“颜色调整”菜单项包含用于调整图像颜色的滑块，每个滑块都需要绑定到一种颜色调整类型。颜色调整类型包括色相、饱和度、亮度和对比度。一个名为\
  \ `sliderLookupMap` 的全局变量，类型为 `Map<String, Slider>`，是一个键/值对，它将颜色调整类型（`String`）映射到\
  \ JavaFX 的 [`Slider`](https://commons.wikimedia.org) UI 控件。该查找映射稍后在代码中用于解绑和绑定当前\
  \ `colorAdjust` 值与每个滑块控件之间的颜色调整属性。\n\n声明的最后一个状态变量之一是 `buttonPanel`，其类型为 `ImageViewButtons`。`ImageViewButtons`\
  \ 对象的单个实例是我在名为 `ImageViewButtons.java` 的类文件中创建的自定义 UI 控件。这个自定义 UI 控件只是左右箭头按钮，允许用户查看上一张和下一张图像。稍后，您将看到代码清单，该清单会在调整窗口大小时，动态地将该自定义控件定位（布局）到应用程序屏幕的右下角。\n\
  \n最后，是类型为 [`java.util.concurrent.ExecutorService`](https://docs.oracle.com/javase/8/javafx/api/javafx/application/Platform.html)\
  \ 的 `executorService` 变量，它负责在后台线程中运行任务。应用程序的任务（[`javafx.concurrent.Task`](https://docs.oracle.com/javase/8/javafx/api/javafx/concurrent/Task.html)）是回调函数，负责加载图像（后台线程）并在加载成功后显示图像。当显示图像并应用\
  \ `ImageInfo` 属性时，修改 ImageView 的代码会在 JavaFX 应用程序线程上执行。\n\n在声明了 `PhotoViewer` 类的状态变量和常量之后，清单\
  \ 7-4 中显示的代码展示了实现的主要应用程序生命周期方法。清单 7-4 中实现的三个方法是 `start()`、`stop()` 和 `main()`。当应用程序启动时，`main()`\
  \ 方法在主应用程序线程上运行，该方法调用 `launch()` 方法来启动 JavaFX 应用程序生命周期（`launch()` 方法会阻塞）。\n\n```\n\
  @Override\npublic void start(Stage primaryStage) {\nprimaryStage.setTitle(\"Photo\
  \ Viewer\");\nBorderPane root = new BorderPane();\nScene scene = new Scene(root,\
  \ 551, 400, Color.BLACK);\nscene.getStylesheets()\n.add(getClass()\n.getClassLoader()\n\
  .getResource(\"photo-viewer.css\")\n.toExternalForm());\nprimaryStage.setScene(scene);\n\
