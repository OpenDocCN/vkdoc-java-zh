  \ --- |\n| HBox 左侧边框描边宽度 | 1 |\n| 左侧内边距 | 1 |\n| 矩形 1 左侧外边距宽度 | 2 |\n| 矩形 1 的宽度\
  \ | 10 |\n| 矩形 1 右侧外边距宽度 | 2 |\n| 矩形 1 与矩形 2 之间的间距 | 5 |\n| 矩形 2 的宽度 | 20 |\n| 矩形\
  \ 2 与矩形 3 之间的间距 | 5 |\n| 矩形 3 的宽度 | 5 |\n| 矩形 3 与矩形 4 之间的间距 | 5 |\n| 矩形 4 的宽度 |\
