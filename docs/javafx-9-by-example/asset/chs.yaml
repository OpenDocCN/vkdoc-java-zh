  \n    图 1-23.\n\n    NetBeans 起始页\n\n现在，您可以继续前进，创建出色的 JavaFX 应用程序了！\n\n## 创建 JavaFX\
  \ HelloWorld 应用程序\n\n在创建 JavaFX 应用程序时，您将学习三种开发、编译和运行应用程序的方法。\n\n*   NetBeans IDE\n\
  *   编辑器和终端（命令行提示符）\n*   编辑器和 Gradle 构建工具\n\n### 使用 NetBeans IDE\n\n要快速开始使用 NetBeans\
  \ IDE 创建、编码、编译和运行一个简单的 JavaFX HelloWorld 应用程序，请按照本节概述的步骤操作。您可能希望在下一节中更深入地了解 IDE\
  \ 在后台为您做了什么。不过现在，让我们先编写并运行一些代码。\n\n1.  启动 NetBeans IDE。\n2.  在“文件”菜单上，选择“文件” ➤ “新建项目”。\n\
  3.  在“选择项目和类别”下，选择“JavaFX”文件夹。\n4.  在“项目”下，选择“Java FX 应用程序”，然后点击“下一步”。\n5.  将项目名称指定为\
  \ `HelloWorld`。\n6.  更改或接受“项目位置”和“项目文件夹”字段的默认值。图 1-24 显示了用于创建简单 HelloWorld 应用程序的“新建\
  \ JavaFX 应用程序”向导。\n\n![A323804_3_En_1_Fig24_HTML.jpg](img/A323804_3_En_1_Fig24_HTML.jpg)\n\
  \n图 1-24.\n\n新建 JavaFX 应用程序向导\n7.  在此屏幕（图 1-24）上，点击“管理平台”按钮，确保“平台名称”字段默认包含 JDK 1.9\
  \ 或更高版本。点击“完成”以自动创建 JavaFX HelloWorld 应用程序。\n8.  几秒钟后，NetBeans 将生成 HelloWorld 项目所需的所有文件。NetBeans\
  \ 完成后，该项目将显示在左侧的“项目”选项卡中。图 1-25 显示了一个新创建的 HelloWorld 项目。\n\n![A323804_3_En_1_Fig25_HTML.jpg](img/A323804_3_En_1_Fig25_HTML.jpg)\n\
