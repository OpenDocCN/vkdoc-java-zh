  \ = new ImageViewButtons(IMAGE_FILES);\n// Create a progress indicator\nProgressIndicator\
  \ progressIndicator = createProgressIndicator();\n// layer items. Items that are\
  \ last are on top\nmainContentPane.getChildren().addAll(imageGroup,\nbuttonPanel,\
  \ progressIndicator);\n// Create menus File, Rotate, Color adjust menus\nMenu fileMenu\
  \ = createFileMenu(primaryStage, progressIndicator);\nMenu rotateMenu = createRotateMenu();\n\
  Menu colorAdjustMenu = createColorAdjustMenu();\nMenuBar menuBar = new MenuBar(\n\
  fileMenu, rotateMenu, colorAdjustMenu);\nroot.setTop(menuBar);\n// Create the center\
  \ content of the root pane (Border)\n// Make sure the center content is under the\
  \ menu bar\nBorderPane.setAlignment(mainContentPane, Pos.TOP_CENTER);\nroot.setCenter(mainContentPane);\n\
  // When nodes are visible they can be repositioned.\nprimaryStage.setOnShown( event\
  \ ->\nwireupUIBehavior(primaryStage, progressIndicator));\nprimaryStage.show();\n\
  }\n@Override\npublic void stop() throws Exception {\nsuper.stop();\n// Shutdown\
  \ thread service\nexecutorService.shutdown();\n}\npublic static void main(String[]\
  \ args) {\nlaunch(args);\n}\n清单 7-4.\nPhotoViewer 类的 start()、stop() 和 main() 方法实现\n\
  ```\n\n当 JavaFX 应用程序线程准备就绪时，`init()` 方法会在 `start()` 方法之前被调用。`init()` 方法在 Application\
  \ 创建之后被调用。可以重写 `init()` 方法来初始化任何资源（不在 JavaFX 应用程序线程上运行）。在清单 7-4 中，我没有实现 `init()`\
  \ 方法，但我想指出应用程序生命周期中方法调用的顺序。当 JavaFX 应用程序通过使用 `Platform.exit()` 方法退出时，应用程序的 `stop()`\
  \ 方法最后被调用。`stop()` 方法为应用程序提供了清理任何资源的机会。在清单 7-4 中，`stop()` 方法调用了 `executorService`（`java.util.concurrent.ExecutorService`）变量的\
  \ `shutdown()` 方法，以优雅地关闭线程执行器服务。如果不调用执行器服务进行关闭，您的应用程序将无法正常关闭。在 `stop()` 执行之后，代码执行返回到\
  \ `main()` 方法中的主线程，该位置位于清单 7-4 中调用 `launch()` 的代码行语句之后（最后一行代码）。\n\n\n\n主要代码位于 `start()`\
  \ 方法中。`start()` 方法首先创建根面板，将其作为 [`BorderPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/animation/PathTransition.html?javafx/scene/layout/BorderPane.html)，用于在场景顶部（[`Pos.TOP`](https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html)）放置菜单选项，而主要\
  \ UI 元素则放置在中心区域（`Pos.CENTER`）。接着，代码使用 `AnchorPane` 布局创建中心区域，以便将 UI 元素相对于视图区域进行定位。通过使用\
  \ JavaFX 的 `Group`，任何应用于 `BorderPane` 中心区域之外的图像视图的变换（`Rotate`）都会被自动向下推（位于菜单栏下方）。后续的代码语句主要调用私有的工厂类型方法，这些方法负责创建并初始化要添加到场景图中的\
