  \ FXML 文件已复制到根类路径。）此时，当前文件（`ContactForm.fxml`）没有引用控制器类或带有 `fx:id` 属性的 UI 元素。在后续步骤中，当你创建了控制器类后，你将通过\
  \ Scene Builder 更新 UI，并再次保存 FXML 文件。\n\n![A323804_3_En_5_Fig23_HTML.jpg](img/A323804_3_En_5_Fig23_HTML.jpg)\n\
  \n图 5-23.\n\n用于保存 FXML 文件的“另存为”窗口\n\n```\n\n清单 5-8.\n    表示使用 Scene Builder 创建的联系人表单\
  \ UI 视图的 ContactForm.fxml 文件\n    ```\n\n13. 创建一个为 UI 元素提供处理代码的控制器类。在与主应用程序代码 `FXMLContactForm.java`（参见步骤\
  \ 19）相同的目录中，创建一个名为 `ContactFormController.java` 的类。将清单 5-9 中的代码输入到名为 `ContactFormController.java`\
  \ 的文件中。在代码中，你会注意到在属性和方法上使用了 `@FXML` 注解。这些注解允许 JavaFX 平台将 FXML UI 元素绑定到控制器属性，例如 TextField\
  \ 和 Button。控制器中的方法也可以加上 FXML 注解前缀，以指示能够绑定到操作（事件）（例如鼠标按下）的处理代码。这种绑定机制是一种称为依赖注入的机制。FXML\
  \ 加载器将在运行时解析这些引用，本质上是将 UI 元素连接到控制器类中的处理代码。稍后，你将使用 Scene Builder 将“保存”按钮与控制器关联起来。在那里你会注意到，“保存”按钮的\
  \ `OnAction` 属性将调用清单 5-9 中所示的 `saveContactAction()` 方法。\n\n```\n    package com.jfxbe;\n\
  \    import javafx.event.ActionEvent;\n    import javafx.fxml.FXML;\n    import\
  \ javafx.scene.control.TextField;\n    /**\n    *\n    */\n    public class ContactFormController\
  \ {\n    @FXML private TextField firstNameField;\n    @FXML private TextField lastNameField;\n\
  \    @FXML\n    protected void saveContactAction(ActionEvent event) {\n    System.out.println(\"\
  Saving the following information: \");\n    System.out.println(\"First Name: \"\
  \ + firstNameField.getText());\n    System.out.println(\" Last Name: \" + lastNameField.getText());\n\
  \    }\n    }\n    清单 5-9.\n    ContactFormController 类使用注解来引用 FXML 文件中的 UI 元素\n\
  \    ```\n\n14. 通过 Scene Builder 工具为 `ContactForm.fxml` 分配一个控制器类。假设你已经加载了之前创建的 UI，导航到位于左侧“文档”选项卡下的“控制器”选项卡中的“控制器类”字段。输入完全限定的类名\
  \ `com.jfxbe.ContactFormController`（假设你有一个包命名空间）。图 5-24 显示了引用控制器类的字段。请注意，在“控制器类”字段下方有一个名为“已分配的\
  \ fx:id”的表格，其中包含已分配的 `fx:id` 条目。该表格当前为空，但在下一步中，你将为一个组件（例如名字和姓氏文本字段控件（UI 元素））分配一个\
  \ `fx:` `id` 名称。\n\n![A323804_3_En_5_Fig24_HTML.jpg](img/A323804_3_En_5_Fig24_HTML.jpg)\n\
  \n图 5-24.\n\n设置引用联系人表单 UI (ContactForm.fxml) 的控制器类  \n15. 在 Scene Builder 中为每个 UI\
  \ 元素添加 `fx:id` 名称。假设你已经将最近创建的控制器类引用为 `com.jfxbe.ContactFormController`，通过选择画布或“层次结构”部分中的\
  \ UI 控件来更新 UI 元素的 `fx:id`。选择控件后，转到 Scene Builder 工具右侧的“代码”子部分，并在 `fx:id` 字段属性中输入\
