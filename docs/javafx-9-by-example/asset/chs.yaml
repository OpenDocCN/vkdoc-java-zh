  你还记得使用 CSS 样式创建应用程序窗口时的情形吗？我之所以这么问，是因为你应该注意到背景具有带内嵌填充的圆角，并且还有圆角线框边框。基于这些细节，我设计让视频（`MediaView`）能够适配在圆角边框区域内。由于观看区域的尺寸可能会发生变化，例如激活全屏模式或调整窗口大小，代码需要重新计算
