  \  errorMessage);\ndialog.setTitle(\"检索天气数据时出错\");\ndialog.show();\n}\n@Override\n\
  public void stop() throws Exception {\n// 在此处清理资源...\n}\n/**\n* 快速单行方法，以文件结束符为分隔符，\n\
