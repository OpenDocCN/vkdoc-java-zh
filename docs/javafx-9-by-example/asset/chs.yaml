  ## 总结


  在本章的第一部分，你了解了各种手势事件以及它们之间的细微差别。你学习的事件包括 `TouchPressed`、`TouchReleased`、`TouchStationary`、`Rotate`
  和 `Zoom`。你学习了如何为你的 JavaFX 应用程序添加手势事件处理，无论它是传统的 2D 场景还是 3D 场景。


  在本章的第二部分，你发现了令人印象深刻的 Leap Motion 设备，以及使用它增强 JavaFX 应用程序所产生的绝佳组合效果。你首先了解了该设备及其工作原理；接着，你简要了解了它的
  Java SDK 以及一个示例应用程序，在该示例中，你学习了如何在一个线程中监听和处理来自 Leap 设备的数据，同时在 JavaFX 线程中渲染追踪你双手的
  3D 形状。


