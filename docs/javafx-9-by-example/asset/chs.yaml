  \n#### 代码演练\n\n执行清单 5-4 后，您将看到图 5-7 中的输出，该图展示了一个简单的表单应用程序，允许用户输入名字和姓氏作为联系信息。调整窗口大小时，请注意输入文本字段控件会根据列约束而增长或缩小。此外，您还会注意到“保存”按钮在水平方向上右对齐（`HPos.RIGHT`），正好位于“姓氏”文本字段下方。\n\
  \n![A323804_3_En_5_Fig7_HTML.jpg](img/A323804_3_En_5_Fig7_HTML.jpg)\n\n图 5-7.\n\n\
  GridPaneForm.java 文件的输出\n\n清单 5-4 首先创建一个 `BorderPane` 对象实例作为场景的根节点。通过使用 `BorderPane`\
  \ 作为根节点，然后将 `GridPane` 节点对象放置到中心区域，父节点（`BorderPane`）能够将所有的水平和垂直空间分配给 `GridPane`，从而调整其大小。创建\
  \ `BorderPane` 实例作为根节点后，代码实例化了一个带有内边距以及水平和垂直间距的 `GridPane` 布局。然后，清单 5-5 创建了一个 `GridPane`\
  \ 布局，其内边距、水平间距和垂直间距均设置为 `5`（像素）。\n\n```\nGridPane gridpane = new GridPane();\ngridpane.setPadding(new\
  \ Insets(5));\ngridpane.setHgap(5); gridpane.setVgap(5);\n清单 5-5.\n为每个单元格设置 UI 控件之间的内边距、水平间距和垂直间距\n\
  ```\n\n在进一步讲解之前，我想指出 `GridPane` 对象上一个名为 `setGridLinesVisible()` 的便捷方法。这允许您调试网格布局的单元格约束。调用\
  \ `setGridLinesVisible(true)` 方法后，网格线将出现在其单元格和间距周围。\n\n提示\n\n在图 5-8 中，网格窗格的网格线 `visible`\
  \ 属性设置为 `true`，可以帮助您调试单元格约束。要打开网格线，请在网格窗格实例上调用 `setGridLinesVisible()` 方法。\n\n![A323804_3_En_5_Fig8_HTML.jpg](img/A323804_3_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8.\n\n网格窗格的网格线可见属性设置为 true。该可见属性通常用于调试目的。要打开网格线，请调用 setGridLinesVisible(true)\
  \ 方法。\n\n图 5-8 显示了网格线可见的网格窗格。\n\n继续清单 5-4 中的代码演练，代码为第一列和第二列实现了列约束。要设置列的约束，请使用 `ColumnConstraints`\
  \ 构造函数，它允许开发者为 `GridPane` 节点上的列指定最小宽度、首选宽度和最大宽度。这非常棒；这意味着当父容器节点（`BorderPane`）调整大小时，`GridPane`\
  \ 将根据其行或列约束使其子节点在水平方向上增长或缩小。清单 5-6 演示了将第一列约束为 100 像素宽（用于只读标签），并将第二列的最小宽度设置为 50、首选宽度为\
  \ 150、最大宽度为 300 的能力。\n\n```\nColumnConstraints column1 = new ColumnConstraints(100);\
  \ // 固定用于标签\nColumnConstraints column2 = new ColumnConstraints(50, 150, 300); //\
  \ 最小,首选,最大\ncolumn2.setHgrow(Priority.ALWAYS);\ngridpane.getColumnConstraints().addAll(column1,\
  \ column2);\n清单 5-6.\n为 JavaFX 应用程序设置列约束\n```\n\n为第二列创建列约束后，代码通过传入枚举值 `Priority.ALWAYS`\
  \ 调用了 `setHgrow()` 方法，这允许 UI 控件在窗口变宽时占据单元格内可用的水平空间。我将第二列的最大宽度设置为 300，以便您可以看到子 `TextField`\
  \ 不会增长超过最大宽度（`300`）。换句话说，当窗口调整到超过 300 像素宽时，网格窗格列中的文本字段将停止拉伸。\n\n下一步是将每个 UI 控件放置到其各自的单元格位置。所有单元格都相对于零；要将节点放置在第一列第一行的单元格中，您需要指定单元格为\
  \ (0, 0)。因此，以下代码片段将“保存”按钮添加到 `GridPane` 布局的第二列第三行，即单元格 (1, 2)：\n\n```\ngridpane.add(saveButton,\
  \ 1, 2);\n```\n\n该布局还允许您在单元格内水平或垂直对齐控件。以下语句将“保存”按钮右对齐：\n\n```\nGridPane.setHalignment(saveButton,\
  \ HPos.RIGHT);\n```\n\n完成 `GridPane` 设置后，代码实现了前面图 5-7 中所示的输入表单顶部横幅区域。为了创建标题横幅，我使用了一个背景颜色为浅蓝色的流式布局、一个\
  \ SVG 节点图标（显示为人物）和一个包含文本“Contacts”的文本节点。我从 JavaScript 库 RaphaelJS 的创始人兼作者 Dmitry\
  \ Baranovskiy 那里获得了基于 SVG 的图标。托管原始 SVG 图标的网站已不再活跃。该图标采用 SVG 表示法（矢量绘图命令）的字符串形式。我只需通过调用\
  \ `setContent()` 方法将 SVG 字符串传递给一个 `javafx.scene.shape.SVGPath` 实例。以下代码片段展示了如何创建一个\
  \ `SVGPath` 节点实例。\n\n```\nSVGPath svgIcon = new SVGPath();\nsvgIcon.setContent(\"\
  M21.066,...\");\n```\n\n与显示横幅的 `FlowPane` 布局相关的重要代码包含首选高度和 JavaFX CSS 样式的设置。因为横幅（`FlowPane`）被放置在\
  \ `BorderPane` 布局的顶部区域，所以 `40` 像素的首选高度将被保留，并且宽度将随着窗口调整大小（变宽）而占据可用的水平空间。\n\n了解到 `FlowPane`\
  \ 会占据可用的水平空间后，您会注意到该区域被浅蓝色背景填充。通过使用 JavaFX CSS 样式，代码设置了一种浅蓝色，以及使用字符串（backgroundStyle）指定的圆角半径和内边距。清单\
  \ 5-7 是设置放置在 `BorderPane` 布局顶部区域的横幅（`FlowPane`）样式的代码部分。如果 JavaFX CSS 样式现在看起来不太明白，请不要担心；关于自定义\
  \ UI 的更详细讨论将在第 15 章中进行。\n\n```\nFlowPane topBanner = new FlowPane();\ntopBanner.setPrefHeight(40);\n\
  String backgroundStyle = \"-fx-background-color: lightblue;\"\n+ \"-fx-background-radius:\
  \ 30%;\"\n+ \"-fx-background-inset: 5px;\";\ntopBanner.setStyle(backgroundStyle);\n\
  清单 5-7.\n占据顶部横幅区域且背景为浅蓝色的 FlowPane 布局的样式代码\n```\n\n我们仅仅触及了 `GridPane` 布局的皮毛。还有其他方法可以提供子节点的约束和对齐，因此我相信您会深入研究\
  \ `GridPane` 布局的 API。更多详细信息请参阅 Javadocs 文档。接下来，您将学习如何使用名为 Scene Builder 的图形编辑器创建\
  \ UI。\n\n\n\n## 场景构建器\n\n到目前为止，你已经学会了如何以编程方式编写和设计 UI 元素的样式。你可能在想，是否有更好的方法来构建用户界面。我很高兴地告诉你，Oracle\
  \ 的 JavaFX 团队开发了一个名为 **Scene Builder** 的免费工具，它允许你以图形化方式构建 UI，这类工具通常被称为所见即所得编辑器。（WYSIWYG\
  \ 代表“所见即所得”。）一段时间后，Oracle 宣布他们将不再提供 Scene Builder 工具的可下载二进制文件。\n\n由于 Scene Builder\
  \ 工具已开源，构建和托管可下载二进制文件的任务随后立即由 GluonHQ 公司接手（参见 [`http://gluonhq.com/`](http://gluonhq.com/)\
  \ ）。通过这一举措以及其他许多大胆的行动，GluonHQ 凭借其他产品和服务不断前进，为 Java 开发者赋能。GluonHQ 的主要产品是提供一个 UI 和云开发平台，使公司能够使用单一代码库（Java）开发应用，并能够部署到移动端、桌面端和嵌入式设备等多个平台。典型的平台包括\
  \ iOS、Android、Windows、MacOS X 和 Raspbian（树莓派）。\n\n在本节中，你将学习如何构建一个简单的 UI，并在 JavaFX\
  \ 应用程序中使用序列化的 UI 格式化文件（FXML）。首先，前往 GluonHQ（ [`http://gluonhq.com`](http://gluonhq.com)\
  \ ）在以下位置下载 Scene Builder 工具：\n\n[`http://gluonhq.com/open-source/scene-builder/`](http://gluonhq.com/open-source/scene-builder/)\n\
  \n### 下载并安装 Scene Builder\n\n在撰写本书时，尚不存在适用于 JDK 9 的 Scene Builder 工具版本。但是，你可以简单地将你的\
  \ `JAVA_HOME` 环境变量指向最新的 Java 8 SDK，以运行已下载的 Scene Builder 8 版本。可能当你读到此处时，已经有一个适用于\
  \ Java 9 的版本了。假设你已经为你的操作系统下载了 Scene Builder 工具，要启动该工具，我建议下载 JAR 版本并使用命令提示符启动它。在我看来，使用命令提示符更好，因为它会将任何错误和异常信息输出到控制台，从而帮助你进行调试。以下命令将从命令行启动\
  \ Scene Builder 工具。\n\n```\n$ java -jar SceneBuilder-8.0.0.jar\n```\n\n### 启动 Scene\
  \ Builder\n\n下载并安装 Scene Builder 后，你可以启动它。图 5-9 展示了 Scene Builder 工具。\n\n![A323804_3_En_5_Fig9_HTML.jpg](img/A323804_3_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9.\n\n首次启动 Scene Builder 工具\n\n我首先从左侧开始描述各个选项卡及其子部分。在名为 **Library** 的主选项卡下，注意搜索栏。还有名为\
  \ **Containers**、**Controls**、**Menu**、**Miscellaneous**、**Shapes**、**Charts** 和\
  \ **3D** 的子部分。这些子部分包含各种类型的 JavaFX 节点，可以拖放到中央画布区域（将库项目拖放到此处……）。当然，第一个 JavaFX 节点必须是布局容器类型的节点，这样才能将控件等子类型节点拖放到容器类型的节点上。\n\
  \n在左侧 UI 元素下方是 **Document** 部分。Document 部分有两个子部分，名为 **Hierarchy** 和 **Controller**。**Hierarchy**\
  \ 面板允许你以树状层次结构查看 UI 元素的 DOM（文档对象模型）。最后，在 Hierarchy 下方是 **Controller** 选项卡。**Controller**\
  \ 部分允许你将控制逻辑（Controller Java 类）引用到此 UI 视图（FXML）。被引用的 Controller 类将允许处理程序代码与之前拖放到画布区域的\
  \ UI 元素进行交互。例如，点击一个“保存”按钮会调用关联 Controller 类上的一个方法。稍后，你将创建一个 Controller 类，并在 FXML\
  \ 文件中引用它。\n\n在 Scene Builder 的右侧是 **Inspector** 搜索栏，如图 5-9 所示。该搜索栏允许你非常轻松地查找 UI\
  \ 元素的属性。在 Inspector 搜索栏下方，你会看到三个子部分——**Properties**、**Layout** 和 **Code**。**Properties**\
  \ 面板部分允许你使用 JavaFX CSS 属性来设计 UI 元素的样式。在第 15 章中，你将了解更多关于 CSS 样式的内容，但现在你不会在工具中对 UI\
  \ 元素使用 JavaFX CSS 样式。**Layout** 面板允许你指定节点属性的尺寸、变换和内边距。最后是 **Code** 面板，它允许你将事件方法映射到\
  \ UI 元素，例如 `OnMousePressed` 属性。\n\n现在你已经了解了 Scene Builder 的功能，让我们来构建一个用户界面（UI）。但在构建\
  \ UI 之前，你需要明确想要构建什么样的 UI。为了简单起见，你将构建之前你在 `GridLayout` 部分创建的熟悉的联系人表单。你将使用 Scene Builder\
  \ 工具来开发 UI，而不是以编程方式编写代码。按照以下步骤以图形化方式构建你的表单。\n\n1.  将一个 `BorderPane` 容器拖放到右侧的画布上。图\
  \ 5-10 展示了将 `BorderPane` 容器拖放到画布区域的过程。\n\n![A323804_3_En_5_Fig10_HTML.jpg](img/A323804_3_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10.\n\n将 BorderPane 拖放到显示“将库项目拖放到此处……”的画布区域。将 `BorderPane` 容器拖放到画布表面后，你应该会在左下角的\
  \ Document 选项卡下的 Hierarchy 部分看到显示 BorderPane 的区域——`TOP`、`LEFT`、`CENTER`、`RIGHT`\
  \ 和 `BOTTOM`。图 5-11 展示了画布区域当前 UI 元素的文档层次结构（DOM）。你也可以将 UI 元素拖放到文档层次结构窗口中。有时将 UI 元素拖放到层次结构中更容易，有时则拖放到画布区域更容易。这完全取决于当存在嵌套容器时，画布上的区域有多小。\n\
  \n![A323804_3_En_5_Fig11_HTML.jpg](img/A323804_3_En_5_Fig11_HTML.jpg)\n\n图 5-11.\n\
  \n\n\n显示 BorderPane 区域层次的文档结构  \n2.  将一个 `GridPane` 容器拖入 BorderPane 的中心区域，如图 5-12\
  \ 所示。图 5-13 展示了将 `GridPane` 节点拖放至 `BorderPane` 节点中心区域后的效果。请注意，编号的列和行是零相对单元格，允许您将元素拖入其中。由于\
  \ `BorderPane` 的中心区域会占据所有可用的宽度和高度，因此当将 `GridPane` 放置到中心区域时，`GridPane` 的宽度和高度将会拉伸。\n\
  \n![A323804_3_En_5_Fig13_HTML.jpg](img/A323804_3_En_5_Fig13_HTML.jpg)\n\n图 5-13.\n\
  \n位于 BorderPane 中心区域的 GridPane\n\n![A323804_3_En_5_Fig12_HTML.jpg](img/A323804_3_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12.\n\n将 GridPane 节点拖放到 BorderPane 节点的中心区域  \n3.  在配置 `GridPane` 之前，您需要重新配置\
  \ `BorderPane` 的首选宽度和最大宽度，以允许 `GridPane` 占据可用的水平空间。通过在画布区域左下角的“层次结构”选项卡中选择 `BorderPane`\
  \ 节点。接下来，在画布区域的右侧是“布局”选项卡（位于“属性”下），您将更改 `BorderPane` 的“首选宽度”和“最大宽度”属性。图 5-14 显示了\
