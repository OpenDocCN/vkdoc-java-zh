- '# 8. JavaFX 打印


  许多桌面应用程序（如文字处理器和电子表格）允许用户通过打印机或复印机打印文档。在本章中，你将学习如何将 HTML 文档和 JavaFX 节点发送到打印机。JavaFX
  打印 API (`javafx.print`) 自 JavaFX 8 以来就已存在，它们允许应用程序开发者查询可用的打印机、设置打印机以及生成打印作业。在本章中，你将探索
  JavaFX 的打印 API，并以一个类似 Web 浏览器的应用程序结束本章，该应用程序用于缩放和打印 Web 内容。


  在本章中，你将了解以下内容：


  *   查询可用的打印机

  *   发现打印机的属性和功能

  *   以编程方式打印（使用打印机对话框）

  *   显示打印机对话框以配置打印作业

  *   缩放和打印 JavaFX 节点

  *   打印跨多页的 HTML 网页




  ## JavaFX 打印


  在开始介绍 JavaFX 打印 API 之前，我想先吊吊你的胃口，让你看看用很少的代码就能轻松打印东西。JavaFX 最简单的打印形式允许你打印任何可见的 JavaFX
  节点，如清单 8-1 所示。


  ```

  PrinterJob job = PrinterJob.createPrinterJob();

  job.showPrintDialog(primaryStage);

  boolean success = job.printPage(circle);

  if (success) {

  job.endJob();

  }

  清单 8-1.

  使用 PrinterJob 类打印 JavaFX 节点

  ```


  清单 8-1 的目标是将一个 JavaFX `Circle` 节点打印到打印机。清单 8-1 展示了创建一个打印任务 (`PrinterJob`)，然后调用 `showPrintDialog()`
  方法，该方法会启动一个对话框窗口，允许你配置当前的打印任务，如图 8-1 所示。


  ![A323804_3_En_8_Fig1_HTML.jpg](img/A323804_3_En_8_Fig1_HTML.jpg)


  图 8-1.


  用于配置当前打印任务的打印对话框窗口


  配置好打印机设置后，点击“打印”按钮开始打印过程。代码将调用打印任务的 `printPage()` 方法，将任务发送给打印机。调用 `printPage()`
  方法后，会返回一个布尔值，表示打印任务是否成功。如果打印成功（`true`），代码会通过调用打印任务对象上的 `endJob()` 方法来结束打印任务。


  清单 8-1 的输出应该会将一个 JavaFX `circle` 节点打印到打印机上。假设圆形位于打印机的可打印宽度内，你应该会看到一张打印出来的纸上有一个圆形。稍后，你将学习如何使用
  API 查询打印机的可打印宽度和高度。


  清单 8-1 的输出看起来实现起来很简单；然而，事情并非表面看起来那么简单。你可能在想，“如何打印一个内容跨越多页的节点？”


  由于代码只是打印到单页上，你还会发现，如果一个节点大于（超出）打印机版面的可打印宽度和高度，这些区域将不会被打印到物理纸张（`Paper`）上。话虽如此，你需要实现一种策略，要么调整节点内容的大小，要么将节点内容分割成多个节点，以便打印到每一页上。


  在本章中，你将主要学习如何配置打印任务以及打印单个节点，例如图像或形状节点。但是，如果你足够有雄心，并且愿意创建一个真正的文字处理器或贺卡应用程序，你不可避免地会想要打印跨越多页的内容。因此，你可能需要自己进行计算。基本上，这种计算涉及计算文本行数或确定内容区域的宽度和高度。


  虽然在一个章节中创建一个能够打印多页的文字处理器相当有挑战性，但我至少会提供一些框架代码来帮助你入门。如清单 8-2 所示，框架代码已经搭建好，以便你可以提供辅助代码（`MyPrinterHelper.createPages()`
  方法），该方法将进行计算，并返回一个节点列表，这些节点最终将被排队等待打印。


  ```

  Printer printer = Printer.getDefaultPrinter();

  PageLayout layout = printer.getDefaultPageLayout();

  double printWidth = layout.getPrintableWidth();

  double printHeight = layout.getPrintableHeight();

  PrinterJob job = PrinterJob.createPrinterJob(printer);

  // 假设你有一个大于可打印区域的节点。

  TableView myLargeJFXNode = ... // 跨越多页的大型节点。

  // 创建一个辅助函数，返回一个

  // 代表要打印页面的节点列表。

  List pages = MyPrinterHelper.createPages(myLargeJFXNode, printWidth, printHeight);

  pages.forEach(job::printPage);

  job.endJob();

  清单 8-2.

  用于打印跨越多页节点的框架代码

  ```


  在清单 8-2 中，代码首先获取布局信息，以确定可打印的宽度和高度。获取可打印宽度和高度后，代码将调用 `MyPrinterHelper.createPages()`
  方法，返回一个要打印的节点列表。`createPages()` 方法负责计算如何将目标节点分割成一个适合可打印版面的节点列表。调用 `MyPrinterHelper.createPages()`
  方法的代码语句接收以下参数：`targetNode`、`printWidth` 和 `printHeight`。


  一旦每个页面被准备为一个节点，你就可以将它们排队等待打印。根据要打印的内容类型，你需要决定如何将各部分分割成节点，以便排队打印。由于这取决于要打印的内容类型，因此如何设计单个节点完全取决于你。一个例子是基于
  `ListView` 节点的项（`getItems()`）打印一张邮寄标签纸。


  如果你觉得创建自己的函数来将内容分割成可打印节点太难了，别担心，JavaFX Web 引擎来了。稍后，你将看到一个示例应用程序，它会加载一个 HTML 网页并将其打印为多页。先不剧透，`javafx.scene.web.WebEngine`
  节点有一个便捷方法 `print()`，可以将网页发送到打印机。`WebEngine` 打印能力的优点在于，它可以在不将 `WebView` 节点显示在 JavaFX
  场景图上的情况下进行打印。这允许你创建一个 JavaFX 应用程序窗口（`Stage`），在后台将 HTML 文档发送到打印机。需要注意的是，JavaFX 打印
  API 不支持在没有启动 JavaFX 应用程序窗口的情况下，作为后台进程进行真正的无头打印服务。要使用 JavaFX 打印 API 进行打印，必须有一个 JavaFX
  应用程序线程在运行。


  现在你已经初步了解了 JavaFX 打印的简单性，接下来你将更详细地了解 JavaFX 的打印 API，以便以编程方式配置打印机属性和打印任务。




  ## JavaFX 打印 API


