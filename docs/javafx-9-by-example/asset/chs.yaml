  \n图 5-25.\n\n设置引用名字文本字段的 fx:id 名称。这将允许控制器类访问该文本字段。  \n16. 对姓氏字段重复步骤 15。姓氏字段的 `fx:id`\
  \ 称为 `lastNameField`。  \n17. 将操作代码绑定到“保存”按钮，如图 5-26 所示。与步骤 15 和 16 类似，选择“保存”按钮的\
