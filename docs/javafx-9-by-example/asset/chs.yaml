  } catch (ExecutionException e) {\ne.printStackTrace();\n} finally {\n// 隐藏进度指示器\n\
  progressIndicator.setVisible(false);\n}\n});\n// 任何失败都关闭旋转指示器\nloadImage.setOnFailed(workerStateEvent\
  \ ->\nprogressIndicator.setVisible(false));\nexecutorService.submit(loadImage);\n\
