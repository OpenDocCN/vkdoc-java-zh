  \ 方法遍历要定位和显示的图标列表\n```\n\n代码首先清除标签显示区域（`VBox` 容器）。然后，根据选定的图标包获取 `GlyphIcons` 列表。接着，代码会过滤\
  \ `iconPackIcons` 列表，查找任何图标名称中包含搜索文本字符串的部分。过滤完成后，图标列表将应用于 `VBox` 容器中以行形式显示的标签。\n\
  \n标签和自定义字体很有趣，但由于它们本质上是只读的，接下来我们来看看按钮。\n\n## 按钮\n\n如果说 JavaFX 标签是最基本的 UI 控件，那么下一个最基本的\
  \ UI 控件就是按钮控件。按钮响应鼠标点击或当按钮获得焦点时按下空格键的操作。在 JavaFX 中，还有其他控件的行为类似于按钮。事实上，所有具体的类按钮控件都继承自父类\
  \ `javafx.scene.control.ButtonBase`。以下是 JavaFX 按钮控件的列表：\n\n*   Button\n*   CheckBox\n\
  *   Hyperlink\n*   Radio button\n*   Toggle button\n*   Menu/MenuItem\n\n### Button\n\
  \n标准的按钮控件可以包含文本或图形（节点），类似于前面介绍的标签控件。按钮可以具有默认行为，例如当用户按下 Enter 或 Escape 键时。在创建表单应用程序的场景中，OK\
  \ 按钮可以作为默认按钮，允许用户按下 Enter 键；或者点击 Cancel 按钮来响应 Escape 键。对话框窗口通常遵循这种模式。以下代码片段创建了三个按钮——OK、Cancel\
  \ 和 Easy。OK 和 Cancel 按钮将被配置为分别接受 Enter 和 Escape 键的按下。Easy 按钮被设置为在按下时调用名为 `doSomethingCool()`\
  \ 的方法。\n\n```\nButton okButton = new Button(\"OK\");\nokButton.setDefaultButton(true);\n\
  Button cancelButton = new Button(\"Cancel\");\ncancelButton.setCancelButton(true);\n\
  Button easyButton = new Button(\"Easy\");\neasyButton.setOnAction( actionEvent ->\
  \ doSomethingCool() );\n```\n\n\n\n### 复选框\n\n复选框按钮控件是一种包含三种状态的开关型按钮——`checked`（已选中）、`unchecked`（未选中）和\
  \ `undefined`（未定义）。当复选框处于已选中状态时，控件会在方框内显示一个勾选标记；否则，它处于未选中状态，显示一个空方框。已选中和未选中状态由 `selected`\
  \ 属性控制。\n\n当状态为未定义时，控件会在方框内显示一个连字符标记。未定义状态通过名为 `setIndeterminate(true)` 的方法设置。当\
  \ indeterminate 属性设置为 `true` 时，`selected` 属性将被忽略。如果你希望复选框允许用户循环切换这三种状态，可以使用 `setAllowIndeterminate(true)`\
  \ 方法将 `allowIndeterminate` 属性设置为 `true`。在图 6-7 中，展示了复选框的三种状态。\n\n![A323804_3_En_6_Fig7_HTML.jpg](img/A323804_3_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7.\n\n复选框控件可以具有的三种状态\n\n某些用例涉及树形表格视图控件，其中父节点带有一个处于未定义状态（显示连字符）的复选框，并且有两个或更多子节点，其中至少有一个子节点处于未选中状态（selected\
  \ 等于 false），同时至少有一个子节点处于选中状态。\n\n注意\n\n通过使用 `setAllowIndeterminate(true)` 方法将 `allowIndeterminate`\
  \ 属性设置为 `true`，复选框可以允许用户循环切换这三种状态。换句话说，当用户看到一个空的复选框（`selected=false`）时，他/她可以点击鼠标来选中该复选框（`selected=true`），然后再次点击使其变为未定义状态，显示为连字符（`indeterminate=true`）。\n\
  \n在使用复选框时，最常见的场景通常涉及两种状态：`checked`（已选中）和 `unchecked`（未选中）。例如，打开或关闭灯光。清单 6-11 展示了模拟控制一个假设的灯光控制\
  \ API 的代码，该 API 用于打开或关闭厨房灯光。\n\n```\nCheckBox kitchenLights = new CheckBox(\"厨房灯光\"\
  );\nlightControlManager.kitchenLights()\n.switchProperty()\n.bind(kitchenLights.selectedProperty());\n\
  ```\n\n### 超链接\n\n超链接控件类似于网页中用于导航 URL 或显示弹出窗口的文本链接。当鼠标指针悬停在控件上时，超链接通常会显示带下划线的文本。此外，前景色可以根据链接是否已被点击而改变。这体现了“已访问”链接的概念（即\
  \ `visited` 属性）。清单 6-11 设置了一个带有动作代码的超链接，用于响应点击事件。该动作代码会将链接的文本或 URL 作为网页显示在 JavaFX\
  \ `WebView` 节点中。\n\n```\nHyperlink searchLink = new Hyperlink(\"www.google.com\"\
  );\nWebView browser = new WebView();\nsearchLink.setOnAction( actionEvent ->\nbrowser.getEngine()\n\
  .load(\"https://\" + searchLink.getText()));\n清单 6-11.\n一个带有动作代码的超链接，该代码将网页加载到 WebView\
  \ 控件中\n```\n\n### 单选按钮\n\n单选按钮通常用于应用程序中，要求用户在可用的（两个或更多）选项中选择一个。图 6-8 展示了使用单选按钮让用户选择支付类型。\n\
  \n![A323804_3_En_6_Fig8_HTML.jpg](img/A323804_3_En_6_Fig8_HTML.jpg)\n\n图 6-8.\n\n\
  一个假设的支付选择界面。使用单选按钮让用户选择一种支付方式。\n\n要创建如图 6-8 所示的单选按钮，请查看清单 6-12 中的代码。它首先创建一个 `ToggleGroup`（切换组）来保存选中的值。该切换组一次只允许选中一个单选按钮。`ToggleGroup`\
  \ 有一个监听器，负责在选中某个复选框时，将支付方式显示到控制台。\n\n```\nLabel questionLabel = new Label(\"您的支付方式是什么？\"\
