- "# 15. 自定义用户界面\n\n如果你能在不改变应用程序功能的情况下改变其外观，那该多好啊？许多公司花费大量金钱和时间来设计用户界面（UI）。\n\n通常，公司在决定其\
  \ UI 的外观和行为之前，会先制作几个设计模型。根据范围的不同，许多公司还会构建支持不同屏幕尺寸的 UI。通常，平板电脑、智能手机、电视和台式机是 UI 设计师面临的主要挑战。\n\
  \n在本章中，你将学习主题化以及如何通过应用各种主题（外观和感觉）来自定义应用程序。接下来，你将学习 JavaFX CSS 样式的基础知识，这将使你能够更改任何场景图节点的属性，例如颜色、背景、边距等。在学习\
  \ CSS 样式之后，你将学习如何创建自定义控件。在这里，你将学习如何构建不属于 JavaFX 8 内置控件的 UI 控件。一些可能想到的自定义控件包括 LED、数字键盘、仪表、时钟和未来感上下文菜单。\n\
