  \ ，那里有来自社区的大量项目集合。\n\n要尝试大多数初级教程或你自己的实验，你需要一套基本的传感器和一小套电子元件。建议你购买 Arduino 开发板与电子元件捆绑在一起的入门套件。除了开发板，你还需要一根\
  \ USB 线缆、一块面包板、杜邦线、几种颜色的 LED、电阻、一个温度传感器、一个电位器、按钮开关等。\n\n\n\n## 方向可视化器示例\n\n本示例演示如何使用\
  \ Genuino 101 板载的六轴加速度计/陀螺仪读取加速度计和陀螺仪的 X、Y、Z 值。加速度计的值用于确定板子的方向，而陀螺仪则用于测量板子的角速度。该示例基于此链接：[`https://www.arduino.cc/en/Tutorial/Genuino101CurieIMUOrientationVisualiser`](https://www.arduino.cc/en/Tutorial/Genuino101CurieIMUOrientationVisualiser)。\n\
  \n所需的唯一硬件是 Arduino/Genuino 101 板。\n\n该示例所需的软件是 Madgwick 库，可从库管理器中获取。使用 Arduino IDE，转到\
  \ 项目 ➤ 加载库 ➤ 管理库。在那里，您可以搜索“Madgwick”并直接安装最新版本的库，如图 12-16 所示。该库的源代码可在 [`https://github.com/arduino-libraries/MadgwickAHRS`](https://github.com/arduino-libraries/MadgwickAHRS)\
  \ 找到。\n\n![A323804_3_En_12_Fig16_HTML.jpg](img/A323804_3_En_12_Fig16_HTML.jpg)\n\
  \n图 12-16.\n\n安装 Madgwick 库\n\n现在，从库文件夹中打开 `Visualize101.ino` 示例，该文件夹位于 `<用户>/Documents/Arduino/Libraries/Madgwick/examples/Visualize101`。您需要修改它，以便添加初始校准。清单\
  \ 12-1 包含了修改后的源代码。\n\n```\n#include \n#include \nMadgwick filter;\nunsigned long\
  \ microsPerReading, microsPrevious;\nfloat accelScale, gyroScale;\nvoid setup()\
  \ {\nSerial.begin(9600);\nwhile (!Serial);  // 等待串口打开\n// 启动 IMU 和滤波器\nCurieIMU.begin();\n\
  CurieIMU.setGyroRate(25);\nCurieIMU.setAccelerometerRate(25);\nfilter.begin(25);\n\
  // 将加速度计量程设置为 2G\nCurieIMU.setAccelerometerRange(2);\n// 将陀螺仪量程设置为 250 度/秒\nCurieIMU.setGyroRange(250);\n\
  // 开始陀螺仪校准\nCurieIMU.autoCalibrateGyroOffset();\n//  开始加速度校准...\");\nCurieIMU.autoCalibrateXAccelOffset(0);\n\
  CurieIMU.autoCalibrateYAccelOffset(0);\nCurieIMU.autoCalibrateZAccelOffset(1);\n\
  // 启用陀螺仪/加速度偏移补偿\nCurieIMU.setGyroOffsetEnabled(true);\nCurieIMU.setAccelOffsetEnabled(true);\n\
  // 初始化变量以按正确速率更新\nmicrosPerReading = 1000000 / 25;\nmicrosPrevious = micros();\n\
  }\nvoid loop() {\nint aix, aiy, aiz;\nint gix, giy, giz;\nfloat ax, ay, az;\nfloat\
  \ gx, gy, gz;\nfloat roll, pitch, heading;\nunsigned long microsNow;\n// 检查是否到了读取数据和更新滤波器的时间\n\
  microsNow = micros();\nif (microsNow - microsPrevious >= microsPerReading) {\n//\
  \ 从 CurieIMU 读取原始数据\nCurieIMU.readMotionSensor(aix, aiy, aiz, gix, giy, giz);\n\
  // 将原始数据转换为重力单位和度/秒单位\nax = convertRawAcceleration(aix);\nay = convertRawAcceleration(aiy);\n\
  az = convertRawAcceleration(aiz);\ngx = convertRawGyro(gix);\ngy = convertRawGyro(giy);\n\
  gz = convertRawGyro(giz);\n// 更新滤波器，计算方向\nfilter.updateIMU(gx, gy, gz, ax, ay, az);\n\
  // 打印航向角、俯仰角和横滚角\nroll = filter.getRoll();\npitch = filter.getPitch();\nheading\
  \ = filter.getYaw();\n// Serial.print(\"方向: \");\nSerial.print(heading);\nSerial.print(\"\
  \ \");\nSerial.print(pitch);\nSerial.print(\" \");\nSerial.println(roll);\n// 增加先前时间，以保持适当节奏\n\
  microsPrevious = microsPrevious + microsPerReading;\n}\n}\nfloat convertRawAcceleration(int\
  \ aRaw) {\n// 因为我们使用的是 2G 量程\n// -2g 映射到原始值 -32768\n// +2g 映射到原始值 32767\nfloat a\
  \ = (aRaw * 2.0) / 32768.0;\nreturn a;\n}\nfloat convertRawGyro(int gRaw) {\n//\
  \ 因为我们使用的是 250 度/秒量程\n// -250 映射到原始值 -32768\n// +250 映射到原始值 32767\nfloat g = (gRaw\
  \ * 250.0) / 32768.0;\nreturn g;\n}\n清单 12-1.\n包含校准的 Visualize101 源代码\n```\n\n运行\
  \ Web 编辑器，从 示例 ➤ 来自库 ➤ Madgwick 打开 Visualize101 项目，并包含校准，如图 12-17 所示。\n\n![A323804_3_En_12_Fig17_HTML.jpg](img/A323804_3_En_12_Fig17_HTML.jpg)\n\
  \n图 12-17.\n\nWeb 编辑器中的 Visualize101\n\n确保您的板子已连接并选择了正确的端口。点击上传，几秒钟后项目将被编译并上传到板子。\n\
  \n您可以打开串口监视器，在手持板子并挥动时，查看打印出的航向角（偏航角）、俯仰角和横滚角（以度为单位）的值，如图 12-18 所示。\n\n![A323804_3_En_12_Fig18_HTML.jpg](img/A323804_3_En_12_Fig18_HTML.jpg)\n\
  \n图 12-18.\n\n运行 Visualize101\n\n### 工作原理\n\n该程序使用 CurieIMU 库中的函数从加速度计/陀螺仪获取数据。它有两个主要方法：`setup()`\
  \ 和 `loop()`。\n\n在 `setup()` 方法中，您通过将加速度计、陀螺仪和滤波器的采样率设置为 25Hz，加速度计量程设置为 2g，陀螺仪量程设置为\
  \ 250 °/s，来配置串口速度和 CurieIMU 库。陀螺仪和加速度计最初都进行了校准。为此，建议您将 Arduino 板保持平稳并处于水平位置。\n\n\
  在 `loop()` 方法中，每 25 毫秒，您使用 CurieIMU 库中的函数获取加速度计和陀螺仪数据，并将原始数据转换为加速度（g）和角速度（°/s）。使用\
  \ Madgwick 库，这些值被转换为横滚角、俯仰角和偏航角，最终发送到串口。这些角度用于许多领域，例如导航，以定义物体的空间方向。\n\n如果一切正常，是时候开始思考如何读取串口以获取这些测量值，以及如何在您的\
  \ JavaFX 应用程序中显示这些读数了。\n\n## 串口读取\n\n尽管您可以找到用于串口读取的第三方应用程序——例如 Windows 上的旧版 HyperTerminal、Linux\
  \ 上的 Minicom 和 Mac 上的 Terminal——但您需要在您的应用程序中获取这些读数，为此，您需要一个执行该任务的 Java API。\n\n\
  请注意，串口读取是一项高度硬件相关的任务，它打破了 Java 跨平台的方法，因为您需要原生支持来访问端口。除了 Sun 的旧版 JavaComm API 之外，Java\
  \ SE 发行版中没有捆绑用于通信的官方 API，因此您需要一个第三方库。\n\n多年来，首选的串行通信 Java 库是 RXTX。它最初由 Trent Jarvi\
  \ 开发，并在 LGPL v 2.1+链接覆盖控制接口许可下分发，其最后一个版本（2010 年的 2.2pre2）可在 [`http://rxtx.qbang.org/`](http://rxtx.qbang.org/)\
  \ 获取。\n\n但这个库已停止维护，甚至 Arduino IDE 也将其替换为一个新的库——Java Simple Serial Connector (jSSC)——因为它被大量用于\
  \ IDE 和板子之间的通信。\n\n\n\n### Java 简易串行连接器\n\nJava 简易串行连接器（jSSC）由 Alexey Sokolov 开发，采用\
  \ GNU Lesser GPL 许可证。截至撰写本文时，最新版本（jSSC-2.8.0）于 2014 年 1 月发布，该库被选为 Arduino IDE（从\
  \ 1.5.6 版本开始）中替代 RXTX 的库。\n\njSSC 适用于所有平台和操作系统。你会注意到它比 RXTX 更快，并且修复了多个错误。jSSC 以一个简单的\
  \ JAR 文件形式提供，其中包含了所有必要的本地文件，因此你无需处理本地安装，它会在运行时自动将这些文件添加到类路径中。\n\n包含最新版本的 JAR 文件可从\
  \ [`https://github.com/scream3r/java-simple-serial-connector/releases`](https://github.com/scream3r/java-simple-serial-connector/releases)\
  \ 下载。如果你在 NetBeans 中将其添加为库或打开它，你将看到它的类（`jssc` 包）和本地内容（`libs` 包）。\n\n## JavaFX、图表\
  \ API 和方向\n\n在接下来的示例中，你将学习如何设计一个简单的 JavaFX 应用程序，该程序从 Arduino 板获取方向读数并将其显示在图表中。为清晰起见，该示例使用了两个类——一个用于串行读数（如清单\
  \ 12-2 所示），另一个用于图表和 JavaFX 舞台（如清单 12-3 所示）。\n\n你将通过使用一个 `StringProperty` 来绑定这些类（`Serial`\
  \ 和 `OrientationFX`），该属性包含从串行端口读取的最后一行。通过监听 JavaFX 线程中此属性的变化，你将知道何时有新的读数需要添加到图表中。\n\
  \n### 创建模块项目\n\n让我们从在 NetBeans 中创建一个模块项目开始，如图 12-19 所示。设置项目名称 `OrientationFX` 时，请确保选择\
  \ JDK 9 平台，如图 12-20 所示。\n\n![A323804_3_En_12_Fig20_HTML.jpg](img/A323804_3_En_12_Fig20_HTML.jpg)\n\
  \n图 12-20.\n\n项目名称和位置\n\n![A323804_3_En_12_Fig19_HTML.jpg](img/A323804_3_En_12_Fig19_HTML.jpg)\n\
  \n图 12-19.\n\n在 NetBeans 中添加模块项目\n\n点击“完成”，将创建新的空项目。右键单击该项目，选择“新建” ➤ “模块”，并将其命名为\
  \ `com.jfxbe.orientationfx`，如图 12-21 所示。点击“完成”。将创建名为 `module-info.java` 的空类。\n\n\
  ![A323804_3_En_12_Fig21_HTML.jpg](img/A323804_3_En_12_Fig21_HTML.jpg)\n\n图 12-21.\n\
  \n模块名称\n\n为方便起见，将 `jssc.jar` 放置在项目下的 `libs` 文件夹中，然后将其添加为库（选择“库” ➤ “添加 JAR/文件夹”）。\n\
  \n现在，你可以在模块描述符中添加 `requires` 子句，用于 `javafx.controls`，以包含 JavaFX `controls` 和 `base`\
  \ 模块，以及用于 `jssc` 的子句，如清单 12-2 所示。\n\n```\nmodule com.jfxbe.orientationfx {\nrequires\
  \ javafx.controls;\nrequires jssc;\n}\n清单 12-2.\nModule-info 类\n```\n\n现在，你可以向 `com.jfxbe.orientationfx`\
  \ 模块添加一个新包，并向其中添加一个新类，名为 `OrientationFX`。该类将扩展 `Application`。请注意，由于模块描述符中的 `requires`\
  \ 子句，该类将可供导入。你只需添加一个 `Scene` 并显示舞台，如清单 12-3 所示。\n\n```\npublic class OrientationFX\
  \ extends Application {\n@Override\npublic void start(Stage primaryStage) throws\
  \ Exception {\nScene scene = new Scene(new StackPane(), 1000, 600);\nprimaryStage.setScene(scene);\n\
  primaryStage.show();\n}\n}\n清单 12-3.\n定义 OrientationFX 类\n```\n\n最后，你可以使用 `exports`\
  \ 子句将此包添加到模块中，如清单 12-4 所示，并运行应用程序以确保初始设置正确。应该会出现一个空舞台。\n\n```\nmodule com.jfxbe.orientationfx\
  \ {\nrequires javafx.controls;\nrequires jssc;\nexports com.jfxbe.orientationfx;\n\
  }\n清单 12-4.\n最终的 Module-info 类\n```\n\n### 串行通信\n\n你可以将 `Serial` 作为串行通信的类添加到包中。清单\
  \ 12-5 包含其源代码。\n\n```\npackage com.jfxbe.orientationfx;\nimport java.util.Arrays;\n\
  import java.util.List;\nimport javafx.beans.property.SimpleStringProperty;\nimport\
  \ javafx.beans.property.StringProperty;\nimport jssc.SerialPort;\nimport jssc.SerialPortException;\n\
  import jssc.SerialPortList;\npublic class Serial {\n/* 常用串行端口列表。根据需要添加更多或移除不需要的\
  \ */\nprivate static final List USUAL_PORTS = Arrays.asList(\n\"/dev/cu.usbmodem1411\"\
  , \"/dev/tty.usbmodem1421\", // Mac OS X\n\"/dev/usbdev\",\"/dev/ttyUSB\",\"/dev/ttyACM\"\
  , \"/dev/serial\", // Linux\n\"COM3\",\"COM4\",\"COM5\",\"COM6\" // Windows\n);\n\
  private final String ardPort;\nprivate SerialPort serPort;\npublic static final\
  \ String SEPARATOR = \" \";\nprivate static final String LINE_SEPARATOR = \"\\r\\\
  n\";\nprivate StringBuilder sb = new StringBuilder();\nprivate final StringProperty\
  \ line = new SimpleStringProperty(\"\");\npublic Serial() {\nthis(\"\");\n}\npublic\
  \ Serial(String port) {\nardPort  =port;\n}\n/* connect() 方法查找连接了 Arduino 板的有效串行端口。\n\
  * 如果找到，则打开该端口并添加一个监听器，这样每次\n* 返回一行时，stringProperty 都会被设置为该行。\n* 为此，使用 StringBuilder\
  \ 存储字符，并在找到 '\\r\\n' 时\n* 提取行内容。\n*/\npublic boolean connect(){\nArrays.asList(SerialPortList.getPortNames())\n\
  .stream()\n.filter(name ->\n((!ardPort.isEmpty() && name.equals(ardPort)) ||\n(ardPort.isEmpty()\
  \ &&\nUSUAL_PORTS.stream()\n.anyMatch(p -> name.startsWith(p)))))\n.findFirst()\n\
  .ifPresent(name -> {\ntry {\nserPort = new SerialPort(name);\nSystem.out.println(\"\
  正在连接到 \" + serPort.getPortName());\nif (serPort.openPort()) {\nserPort.setParams(SerialPort.BAUDRATE_9600,\n\
  SerialPort.DATABITS_8,\nSerialPort.STOPBITS_1,\nSerialPort.PARITY_NONE);\nserPort.setEventsMask(SerialPort.MASK_RXCHAR);\n\
  serPort.addEventListener(event -> {\nif (event.isRXCHAR()) {\ntry {\nsb.append(serPort.readString(event.getEventValue()));\n\
  String ch = sb.toString();\nif (ch.endsWith(LINE_SEPARATOR)) {\n// 添加时间戳\nline.set(Long.toString(System.currentTimeMillis())\n\
  .concat(SEPARATOR)\n.concat(ch.substring(\n0, ch.indexOf(LINE_SEPARATOR))));\nsb\
  \ = new StringBuilder();\n}\n} catch (SerialPortException e) {\nSystem.out.println(\"\
  串行错误: \" + e.toString());\n}\n}\n});\n}\n} catch (SerialPortException ex) {\nSystem.out.println(\"\
  错误: 端口 '\" + name + \"': \" + ex.toString());\n}\n});\nreturn serPort != null;\n\
  }\npublic void write(String text) {\ntry {\nserPort.writeBytes(text.getBytes());\n\
  } catch (SerialPortException ex) {\nSystem.out.println(\"错误: 写入 '\" + text + \"\
  ': \" + ex.toString());\n}\n}\npublic void disconnect() {\nif (serPort != null)\
  \ {\ntry {\nserPort.removeEventListener();\nif (serPort.isOpened()) {\nserPort.closePort();\n\
  }\n} catch (SerialPortException ex) {\nSystem.out.println(\"错误关闭端口异常: \" + ex.toString());\n\
  }\nSystem.out.println(\"断开连接: 通信端口已关闭。\");\n}\n}\npublic StringProperty getLine()\
  \ {\nreturn line;\n}\npublic String getPortName() {\nreturn serPort != null ? serPort.getPortName()\
  \ : \"\";\n}\n}\n清单 12-5.\nSerial 类源代码\n```\n\n\n\n### 工作原理\n\n首先请注意，如果你按照说明正确包含了\
  \ `jssc.jar`，那么 `jSSC` 的导入是可用的。接下来，你需要设置一个可能连接 Arduino 板的合适端口名称列表。这个列表可以扩展到你系统中的其他端口，也可以删除来自其他平台的端口。`ardPort`\
  \ 变量可以通过构造函数设置端口名称，此时列表将不会被使用。\n\n```\nprivate static final List USUAL_PORTS = Arrays.asList(\n\
  \"/dev/cu.usbmodem1411\", \"/dev/tty.usbmodem1421\", // Mac OS X\n\"/dev/usbdev\"\
  ,\"/dev/ttyUSB\",\"/dev/ttyACM\", \"/dev/serial\", // Linux\n\"COM3\",\"COM4\",\"\
  COM5\",\"COM6\" // Windows\n);\nprivate final String ardPort;\npublic Serial() {\n\
  this(\"\");\n}\npublic Serial(String port) {\nardPort  =port;\n}\n```\n\n在 `connect()`\
  \ 方法中，遍历系统中找到的有效串口列表。使用 lambda 表达式过滤这个集合，以便获取与 `ardPort` 值匹配的项（如果已设置），否则获取与 `USUAL_PORTS`\
  \ 列表中的某个端口匹配的项：\n\n```\npublic boolean connect(){\nArrays.asList(SerialPortList.getPortNames())\n\
  .stream()\n.filter(name ->\n((!ardPort.isEmpty() && name.equals(ardPort)) ||\n(ardPort.isEmpty()\
  \ &&\nUSUAL_PORTS.stream()\n.anyMatch(p -> name.startsWith(p)))))\n.findFirst()\n\
  ```\n\n如果找到了有效的串口，你可以尝试打开它，并为串口通信设置几个常用参数：\n\n```\n.ifPresent(name -> {\ntry {\n\
  serPort = new SerialPort(name);\nSystem.out.println(\"Connecting to \" + serPort.getPortName());\n\
  if (serPort.openPort()) {\nserPort.setParams(SerialPort.BAUDRATE_9600,\nSerialPort.DATABITS_8,\n\
  SerialPort.STOPBITS_1,\nSerialPort.PARITY_NONE);\nserPort.setEventsMask(SerialPort.MASK_RXCHAR);\n\
  ```\n\n由于你将监听串口，因此需要添加一个监听器，该监听器会对每个 `SerialPortEvent` 做出响应，它通过输入缓冲区中是否存在字节来检测事件。字节数由\
  \ `event.getEventValue()` 确定。当缓冲区中有字节时，`readString(int byteCount)` 方法会返回数据。你使用一个\
  \ `StringBuilder` 来存储所有读取的内容，并评估字符中是否存在回车和换行 `(\"\\r\\n\"`) 序列。如果找到，则提取该行文本并重置构建器。使用\
  \ `StringProperty` 来存储该行，以便 JavaFX 线程可以监听该可观察对象的变化（通过 `getLine()` 方法暴露；参见本章后面的清单\
  \ 12-6）。你会在字符串中添加一个时间戳，以记录读取的时刻。当测量值相同时，跟踪时间也有助于在图表上按顺序显示它们。\n\n```\nserPort.addEventListener(event\
  \ -> {\nif (event.isRXCHAR()) {\ntry {\nsb.append(serPort.readString(event.getEventValue()));\n\
  String ch = sb.toString();\nif (ch.endsWith(LINE_SEPARATOR)) {\n// 添加时间戳\nline.set(Long.toString(System.currentTimeMillis())\n\
  .concat(SEPARATOR)\n.concat(ch.substring(\n0, ch.indexOf(LINE_SEPARATOR))));\nsb\
  \ = new StringBuilder();\n}\n} catch (SerialPortException e) {\nSystem.out.println(\"\
  Serial error: \" + e.toString());\n}\n}\n});\n```\n\n请注意，如果你需要一次读取多个测量值，则必须在 Arduino\
  \ 草图中使用相同的分隔符，以便将它们正确拆分为单独的读数。\n\n最后，`disconnect()` 方法负责移除监听器并关闭端口：\n\n```\npublic\
  \ void disconnect() {\nif (serPort != null) {\ntry {\nserPort.removeEventListener();\n\
  if (serPort.isOpened()) {\nserPort.closePort();\n}\n} catch (SerialPortException\
  \ ex) {\nSystem.out.println(\"ERROR closing port exception: \" + ex.toString());\n\
  }\nSystem.out.println(\"Disconnecting: comm port closed.\");\n}\n}\n```\n\n### 测试串口通信\n\
  \n在进入图表 API 之前，让我们在 `Application` 类中添加一个快速测试，如清单 12-6 所示。在启动应用程序时打开串口，并在应用程序关闭时关闭它。\n\
  \n```\npublic class OrientationFX extends Application {\nprivate Serial serial;\n\
  @Override\npublic void start(Stage primaryStage) throws Exception {\nScene scene\
  \ = new Scene(new StackPane(), 800, 600);\nprimaryStage.setScene(scene);\nprimaryStage.show();\n\
  serial = new Serial();\nserial.getLine().addListener((obs, ov, nv) -> {\nString[]\
  \ split = nv.split(\"\\\\s\");\nSystem.out.println(\"Orientation \" + split[1] +\
  \ \" \" + split[2] + \" \" + split[3]);\n});\nserial.connect();\n}\n@Override\n\
  public void stop() throws Exception {\nif (serial != null) {\nserial.disconnect();\n\
  }\n}\n}\n清单 12-6.\n测试串口通信\n```\n\n运行测试，看看是否能在控制台中看到方向值。\n\n```\nConnecting to /dev/tty.usbmodem1421\n\
