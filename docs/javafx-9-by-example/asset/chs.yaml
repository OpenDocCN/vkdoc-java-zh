  \ 是用户允许的最大登录尝试次数。最后，类型为 `IntegerProperty` 的 `ATTEMPTS` 变量保存了用户当前已进行的登录尝试次数。\n\n\
  #### start( ) 方法\n\n`start()` 方法是 JavaFX 应用程序线程生命周期的起点，负责设置舞台、场景以及要显示的子节点。在 `start()`\
  \ 方法中，创建了一个 `User` 对象，用作与 GUI 表单同步的领域对象。要查看 `User` 类的代码，请参考代码清单 4-26。接下来，通过调用 `Stage.initStyle(StageStyle.TRANSPARENT)`\
  \ 方法将舞台设置为透明。这将允许你创建半透明且形状不规则的窗口，而无需原生操作系统标题栏和主内容周围边框的装饰。你还会注意到 `setAlwaysOnTop(true)`\
  \ 语句，它会使 `Stage`（对话框窗口）始终位于桌面上所有其他应用程序窗口之上。为了方便起见，以下代码重复展示了如何让你的 Stage 窗口透明并显示在所有其他应用程序窗口之上。\n\
  \n```\nprimaryStage.initStyle(StageStyle.TRANSPARENT);\nprimaryStage.setAlwaysOnTop(true);\n\
  ```\n\n在代码初始化舞台之后，创建了一个 [`Scene`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Scene.html)\
