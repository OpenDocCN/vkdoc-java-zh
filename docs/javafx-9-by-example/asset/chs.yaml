  \ `Group` 节点。\n\n回到根节点，尽管根节点是透明的，但仍需要创建一个矩形背景作为放置控件的表面。矩形背景的大小需要与定义的 `Scene`（登录屏幕）对象相同。以下代码片段创建了一个\
  \ `Scene` 对象，其根节点为 `Group` 节点，背景填充颜色为 null，从而使窗口透明。\n\n```\nScene scene = new Scene(root,\
