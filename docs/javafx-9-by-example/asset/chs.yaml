  ### 工作原理是什么？


  在清单 8-8 中，请注意 `start()` 方法首先创建了所有 JavaFX 应用程序典型的根面板和场景。接着，代码创建了两个菜单选项，允许用户选择打印模式。在后续代码中，当菜单项被选中时，会为其添加处理程序代码。菜单创建完成后，代码设置了
  `WebView` 节点和缩放滑块控件。


  `WebView` 节点是显示 HTML 文档的主要区域。缩放滑块控件将添加处理程序代码（`InvalidationListener`）来更新 `WebView`
  节点的缩放属性。


  当以百分比形式显示缩放值时，每当滑块值发生变化，JavaFX 的 `Label` 就会更新。在这里，你将看到如何使用 `StringConverter` 类将字符串转换为双精度浮点数。`StringConverter`
  类将滑块控件中的双精度值转换为标签控件的文本值，并附加一个百分号（%）。一旦创建了 `StringConverter` 对象并将其赋值给变量 `sc`，代码就会基于标签的文本属性（`String`）、缩放滑块的值（`Double`）以及变量
  `sc` 来绑定属性。


  以下代码片段绑定了上述提到的属性和变量。


  ```

  Bindings.bindBidirectional(zoomValueLabel.textProperty(),

  zoomSlider.valueProperty(), sc);

  ```


  代码继续创建应用程序的其余部分，添加了一个类似网络浏览器的 JavaFX `TextField` 用于输入 URL 地址行。地址行允许用户输入有效的 `URL`
  来请求指定的网页。该文本字段有一个 `onAction` 属性，用于设置处理程序代码，该代码随后会调用 Web 引擎的 `load()` 方法。换句话说，用户输入网址后，按下回车键即可触发网页的加载。


  接下来是创建打印按钮（`printButton` 变量），用于根据选定的打印模式进行打印。打印按钮会在将数据发送到打印机之前确定打印模式。当用户选择“仅节点”时，代码会将
  `WebView` 节点传递给 `PrintJob` 对象的 `printPage()` 方法。如果用户选择打印整个文档，代码会获取 Web 引擎（`WebEngine`）并将打印作业传递给
  `print()` 方法。以下代码片段来自清单 8-8，再次展示了两种打印模式——仅节点和整个 Web 文档。


  ```

  // 仅节点 - 打印模式

  job.printPage(browserDisplay);

  // 整个 Web 文档 - 打印模式

  webEngine.print(job);

  ```


  清单 8-8 的收尾部分，代码创建了一个路径，该路径被勾勒为一个矩形，其宽度和高度值来自默认打印机的布局。最后，`printModeGroup`（`ToggleGroup`）变量的
  `selectedToggleProperty` 附加了处理程序代码，用于切换红色矩形形状的 `visible` 属性。此外，当点击打印按钮时，通过调用 `printModeGroup`
  对象的 `getUserObject()` 方法获取一个字符串来确定打印模式。该字符串代表两个字符串常量之一：`NODE_ONLY` 或 `WHOLE_WEB_DOC`。


