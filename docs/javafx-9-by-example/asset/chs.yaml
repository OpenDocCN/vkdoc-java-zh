  在设计用户界面时，你可能听说过“皮肤化”和“外观与感觉”这些术语。这些术语经常互换使用，它们都反映了主题化或 UI 样式设计的基本概念。主题化是指在不改变应用程序底层功能的前提下，改变其整体外观。例如，当你将应用程序的\
  \ UI 布局和控件从风格化的商务主题切换为运动主题时，这就是主题化的应用。通常，公司会尝试为应用程序“换肤”，使其外观与公司标志相似。他们还会使用精心挑选的漂亮字体（排版学）来体现其企业文化或目标受众。\n\
  \n在 JavaFX 中，你可以创建、修改或使用现有主题来为应用程序“换肤”。稍后，我将讨论如何创建主题，但现在，我将向你展示如何在 JavaFX 应用程序中应用现有主题（皮肤）。为了演示如何将主题应用于应用程序的\
