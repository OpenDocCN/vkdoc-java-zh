  ## 绘制颜色


  我之前提到过，各种绘图程序都有自己的工具来绘制形状。绘图程序还提供了使用调色板绘制形状的能力。通常，绘图程序有一个油漆桶工具来填充画布上的区域。通常，照片编辑软件包能够使用渐变颜色填充或改变颜色的光照。在
  JavaFX 中，你也可以使用类似的技术将颜色（`Paint`）应用于对象。在本节中，你将看到一个 JavaFX 应用程序的示例，该示例展示了三个用颜色（`Paint`）填充的形状。


  ### 颜色示例


  为了演示常见的颜色填充，图 3-15 展示了一个显示三种具有不同颜色填充形状的应用程序。它描绘了以下三种形状——椭圆、矩形和圆角矩形。每个形状都有一个渐变填充。第一个形状，椭圆，填充了红色径向渐变。第二个是填充了黄色线性渐变的矩形。最后，圆角矩形具有绿色循环反射渐变填充。你还会注意到黄色矩形后面有一条粗黑线，用以说明颜色的
  alpha 级别（透明度）。


  ![A323804_3_En_3_Fig15_HTML.jpg](img/A323804_3_En_3_Fig15_HTML.jpg)


  图 3-15.


  彩色形状 注意


  接下来的示例涉及创建纯色、渐变颜色和半透明颜色的基本技术。还有一些高级策略，例如 [`ImagePattern`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/paint/ImagePattern.html)
  API 和 [`Blend`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/effect/Blend.html)
  API。如果你感兴趣，可以通过 Javadoc 查看 API 文档来了解这些内容。


  在 JavaFX 中，所有形状都可以用纯色和渐变颜色填充。提醒一下，根据 Javadoc，所有形状节点默认填充为黑色，但 `Line`、`Polyline` 和
  `Path` 类（`java.scene.shape.Shape` 的后代）除外。清单 3-3 使用了以下主要类来填充图 3-15 中所示的形状节点：


  *   `javafx.scene.paint.Color`

  *   `javafx.scene.paint.Stop`

  *   `javafx.scene.paint.RadialGradient`

  *   `javafx.scene.paint.LinearGradient`


  注意


  在图 3-15 中，`blackLine`、`rectangle` 和 `roundRectangle` 形状都是通过 `setTranslateY()` 方法相对于
  `ellipse` 形状以及彼此之间进行定位的。




  ```

  @Override

  public void start(Stage primaryStage) {

  primaryStage.setTitle("Painting Colors");

  Group root = new Group();

  Scene scene = new Scene(root, 350, 300, Color.WHITE);

  // 使用径向渐变颜色的红色椭圆

  Ellipse ellipse = new Ellipse(100, // 中心 X

  50 + 70/2, /* 中心 Y */

  50,        /* 半径 X */

  70/2);     /* 半径 Y */

  RadialGradient gradient1 = new RadialGradient(

  0,      /* 焦点角度 */

  .1,   /* 焦点距离 */

  80,   /* 中心 X */

  45,   /* 中心 Y */

  120,   /* 半径 */

  false,      /* 是否按比例 */

  CycleMethod.NO_CYCLE,  /* 循环方法 */

  new Stop(0, Color.RED), /* 色标 */

  new Stop(1, Color.BLACK)

  );

  ellipse.setFill(gradient1);

  root.getChildren().add(ellipse);

  double ellipseHeight = ellipse.getBoundsInParent()

  .getHeight();

  // 第二个形状后面的粗黑线

  Line blackLine = new Line();

  blackLine.setStartX(170);

  blackLine.setStartY(30);

  blackLine.setEndX(20);

  blackLine.setEndY(140);

  blackLine.setFill(Color.BLACK);

  blackLine.setStrokeWidth(10.0f);

  blackLine.setTranslateY(ellipseHeight + 10);

  root.getChildren().add(blackLine);

  // 一个使用半透明颜色线性渐变填充的矩形

  Rectangle rectangle = new Rectangle();

  rectangle.setX(50);

  rectangle.setY(50);

  rectangle.setWidth(100);

  rectangle.setHeight(70);

  rectangle.setTranslateY(ellipseHeight + 10);

  LinearGradient linearGrad = new LinearGradient(

  0,   /* 起始 X */

  0,   /* 起始 Y */

  0,   /* 结束 X */

  1,   /* 结束 Y */

  true, /* 是否按比例 */

  CycleMethod.NO_CYCLE, /* 循环颜色色标 */

  new Stop(0.1f, Color.rgb(255, 200, 0, .784)),

  new Stop(1.0f, Color.rgb(0, 0, 0, .784)));

  rectangle.setFill(linearGrad);

  root.getChildren().add(rectangle);

  // 一个使用反射循环线性渐变填充的圆角矩形

  Rectangle roundRect = new Rectangle();

  roundRect.setX(50);

  roundRect.setY(50);

  roundRect.setWidth(100);

  roundRect.setHeight(70);

  roundRect.setArcWidth(20);

  roundRect.setArcHeight(20);

  roundRect.setTranslateY(ellipseHeight + 10 +

  rectangle.getHeight() + 10);

  LinearGradient cycleGrad = new LinearGradient(

  50, /* 起始 X */

  50, /* 起始 Y */

  70, /* 结束 X */

  70, /* 结束 Y */

  false, /* 是否按比例 */

  CycleMethod.REFLECT,  /* 循环方法 */

  new Stop(0f, Color.rgb(0, 255, 0, .784)),

  new Stop(1.0f, Color.rgb(0, 0, 0, .784))

  );

  roundRect.setFill(cycleGrad);

  root.getChildren().add(roundRect);

  primaryStage.setScene(scene);

  primaryStage.show();

  }

