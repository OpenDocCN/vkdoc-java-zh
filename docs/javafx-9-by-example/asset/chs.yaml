  \n#### 领域对象\n\n在深入探讨主 GUI 代码之前，我们先研究一下代表一个人（`Person`）的领域对象，在本例中即老板或员工。清单 6-27 展示了一个\
  \ JavaFX bean（`Person`类）的实现，它代表将在`ListView`和`TableView`控件中显示的老板或员工。一个`Person`实例将包含以下属性：`aliasName`、`firstName`、`lastName`和`mood`。一个人还拥有一个员工列表，用于保存下属员工（手下）。处理列表视图选择以及填充表格视图功能的\
  \ GUI 代码见清单 6-28。\n\n```\npublic class Person {\npublic enum MOOD_TYPES {\nHappy,\n\
