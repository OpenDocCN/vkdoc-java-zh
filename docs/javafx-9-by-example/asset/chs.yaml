  \ UI (FXML)。如果你还记得步骤 13 中的清单 5-9，`ContactFormController.java` 文件包含 `saveContactAction()`\
  \ 方法。\n\n![A323804_3_En_5_Fig26_HTML.jpg](img/A323804_3_En_5_Fig26_HTML.jpg)\n\n\
  图 5-26.\n\n设置 `OnAction` 属性以调用“保存”按钮的 `saveContactAction` 函数  \n18. 最后一次预览联系人表单。图\
  \ 5-27 显示了 `ContactForm.fxml` 文件的预览窗口。\n\n![A323804_3_En_5_Fig27_HTML.jpg](img/A323804_3_En_5_Fig27_HTML.jpg)\n\
  \n图 5-27.\n\n从 Scene Builder 工具预览联系人表单  \n19. 创建一个主 JavaFX 应用程序类，该类将加载要显示到场景中的 FXML。清单\
  \ 5-10 显示了 `FXMLContactForm.java` 文件。如果你从头开始编码，请将所有三个文件放在同一目录中（FXML 文件、控制器类和应用程序类）。\n\
  \n```\n    package com.jfxbe;\n    import javafx.application.Application;\n    import\
  \ javafx.fxml.FXMLLoader;\n    import javafx.scene.Parent;\n    import javafx.scene.Scene;\n\
  \    import javafx.scene.paint.Color;\n    import javafx.stage.Stage;\n    import\
  \ java.io.IOException ;\n    /**\n    * 加载要显示的 FXML 视图的 FXMLContactForm 应用程序。\n\
  \    */\n    public class FXMLContactForm extends Application {\n    /**\n    *\
  \ @param args 命令行参数\n    */\n    public static void main(String[] args) {\n    Application.launch(args);\n\
  \    }\n    @Override\n    public void start(Stage stage) {\n    stage.setTitle(\"\
  FXMLContactForm \");\n    Parent root = null;\n    try {\n    root = FXMLLoader.load(getClass().getResource(\"\
  /ContactForm.fxml\"));\n    } catch (IOException e) {\n    e.printStackTrace();\n\
  \    }\n    Scene scene = new Scene(root, 380, 150, Color.WHITE);\n    stage.setScene(scene);\n\
  \    stage.show();\n    }\n    }\n    清单 5-10.\n    主 JavaFX FXMLContactForm 应用程序\n\
  \    ```\n\n20. 构建并运行应用程序。假设所有三个文件都在同一目录位置，导航或更改目录到文件所在目录，然后使用以下命令编译并运行代码：\n\n```\n\
  \    $ javac -d . *.java\n    $ java -cp . com.jfxbe.FXMLContactForm\n    ```\n\n\
  21. UI 应类似于图 5-28。要测试应用程序，请在文本字段中输入名字和姓氏，然后单击“保存”按钮，然后观察控制台输出。\n\n![A323804_3_En_5_Fig28_HTML.jpg](img/A323804_3_En_5_Fig28_HTML.jpg)\n\
  \n图 5-28.\n\nJavaFX FXMLContactForm 应用程序\n\n按下“保存”按钮时，控制台输出如下。\n\n\n\n```\n保存以下信息：\n\
  名字：唐纳德\n姓氏：克努特\n```\n\n### 代码走查\n\n通过使用 Scene Builder 工具创建联系人表单，你将 UI 保存为 FXML 格式的文件。FXML\
  \ 是一种用于表示 JavaFX UI 的 XML 标记语言。当加载 FXML 进行显示时，与 JavaFX 节点关联的 XML 元素标签会被动态实例化为 Java\
  \ 代码。使用 FXML 构建 UI 的主要思想是将 UI 代码与控制逻辑（操作）分离。在图形化布局 UI 元素并将文件保存为 `ContactForm.fxml`\
  \ 后，你创建了一个名为 `ContactFormController.java` 的控制器类文件。`ContactFormController` 类包含引用\
  \ `ContactForm.fxml` 文件中 UI 元素的 `@FXML` 注解。以下代码片段是带有 `@FXML` 注解的实例变量。\n\n```\n@FXML\
  \ private TextField firstNameField;\n@FXML private TextField lastNameField;\n```\n\
  \n`@FXML` 注解是一种 Java 运行时类型注解，它告诉 `FXMLLoader` 工具类哪些 UI 元素需要动态注入到控制器类中。这是 JavaFX\
  \ 的依赖注入机制，允许控制器代码访问 UI 元素。此外，你会注意到 `@FXML` 注解也可以应用于基于 UI 事件（如 `OnAction` 属性）的方法。清单\
  \ 5-11 展示了之前你在控制器类中看到的 `saveContactAction()` 方法。同时，回顾图 5-27（步骤 17），该方法名称被输入到 Scene\
  \ Builder 工具的 `OnAction` 属性字段中。当按下“保存”按钮时，该方法被调用。\n\n```\n@FXML\nprotected void\
  \ saveContactAction(ActionEvent event) {\nSystem.out.println(\"保存以下信息：\");\nSystem.out.println(\"\
  名字：\" + firstNameField.getText());\nSystem.out.println(\"姓氏：\" + lastNameField.getText());\n\
  }\n清单 5-11.\n绑定到 UI 中“保存”按钮的处理程序代码\n```\n\n最后，JavaFX 应用程序代码加载要显示的 FXML 文件。此示例将 FXML\
  \ 文件视为将要加载的资源。通常，标准 Java 应用程序或 Java 项目会有一个包含属性文件或图片等资源的 `resources` 目录。在此示例中，我们希望将\
  \ FXML 文件放在根级别。你会注意到文件上的 `/` 前缀表示该文件必须位于根类路径下。\n\n`FXMLLoader.load()` 方法接收根类路径下的资源。如果你将类编译到目录中并开始运行应用程序，必须确保\
  \ FXML 文件被复制到根 `classes` 目录下。请参阅步骤 20，从命令提示符编译并运行应用程序。你使用 `-cp .` 设置类路径，其中 `.`（点）表示当前目录为根路径，因此\
  \ `getResource()` 方法能够看到要加载的 `ContactForm.fxml` 文件。\n\n```\nroot = FXMLLoader.load(getClass().getResource(\"\
  /ContactForm.fxml\"));\n```\n\n## 总结\n\n在本章中，你学习了用于创建用户界面的常见布局。本章的第一部分，你简要了解了常见布局，如\
  \ `HBox`、`VBox`、`FlowPane`、`BorderPane` 和 `GridPane`。通过使用一些常见的布局面板（如 `HBox` 和 `VBox`），你看到了详细的代码示例和放大后的示意图，这些图描述了布局节点中常令人困惑的属性。这些属性包括间距、内边距、外边距和边框宽度。其目的是确定布局面板及其子元素实际占用的空间（区域）。接下来，你学习了如何使用\
  \ `BorderPane` 和 `GridPane` 节点创建类似表单的 UI 应用程序。`GridPane` 提供了列级、行级和单元格级的约束。在类似表单的\
  \ UI 中，你还学习了如何控制子 UI 元素的位置和宽度。一个例子是，其中一个被控制的 UI 元素是文本字段，它会根据用户调整窗口大小而收缩或拉伸。\n\n\
  在学习了如何使用常见布局面板后，你学习了如何使用从 GluonHQ 下载的强大 Scene Builder 工具。本章还讨论了该工具的各种功能以及如何导航使用。熟悉该工具后，你有机会设计了一个与\
  \ `GridPane` 示例类似的表单 UI。这个练习的目的是以图形化方式而非编程方式创建 UI 界面。创建 UI 界面后，你将其保存为 JavaFX FXML\
  \ 文件。通过了解如何将 UI 与控制逻辑分离，你学习了如何使用 JavaFX 的依赖注入机制，使控制器代码能够与 UI 元素交互。为了全面理解 Scene Builder\
  \ 工具，你学习了如何创建一个应用程序，该程序能够加载 UI（FXML 文件）并通过 `FXMLLoader` 工具类自动连接控制器代码。\n\n"
- "# 6. 用户界面控件\n\n在上一章中，你学习了如何使用 Scene Builder 工具布局控件。在本章中，你将学习如何与 UI 控件进行交互。由于篇幅限制，本章并未提供\
  \ Java 8 和 9 平台中每个 UI 控件的代码示例。不过，我确实为业务类应用程序中最常见的 UI 控件创建了示例。\n\n在第 3 章讨论 JavaFX\
  \ 场景图渲染基本形状节点的能力时，你了解到形状继承自基类 Node（`javafx.scene.Node`）。本章将探讨同样继承自基类 `Node` 但更为高级的用户界面（UI）控件。主要区别在于，UI\
  \ 控件是提供用户交互的节点，例如按钮、菜单、文本字段、滑块和表格视图。\n\n与使用 HTML5 的 Web 开发不同，JavaFX 允许 UI 控件节点、形状节点和画布节点在场景图（绘制表面）上共存。相比之下，HTML5\
  \ 中的文本输入字段、SVG 元素和画布元素并不像 JavaFX 场景图上的节点那样继承共同的行为。例如，在使用 HTML 和 JavaScript 时，你无法轻松地使用通用\
  \ API 旋转 HTML 按钮和 SVG 矩形。而使用 JavaFX API 时，你可以像对待任何其他 JavaFX 节点一样对待 UI 控件；例如，你可以应用动画、变换、样式和效果。\n\
  \nJavaFX UI 控件是基类 `javafx.scene.control.Control` 的派生类，并实现了另外两个接口——`javafx.scene.control.Skinnable`\
  \ 和 `javafx.event.EventTarget`。要深入了解如何创建自定义控件，请参阅第 15 章关于自定义用户界面的内容。现在，本章将探讨如何使用\
  \ UI 控件的示例。\n\n\n\n## 标签\n\n标签是只读控件，能够显示带有背景的文本和图形。与 `Text` 节点不同，标签继承自 `Control`，而非\
  \ `Shape`。标签为文本提供背景，并且当标签宽度（边界矩形）被调整得比显示给用户的文本字符串更小时，可以附加省略号（...）。这让用户知道还有更多文本内容需要显示。图\
  \ 6-1 显示了一个完整显示长文本字符串（无省略号）的标签；然而，当窗口最小化时，标签的宽度会减小，从而显示截断的文本并在末尾附加省略号，如图 6-2 所示。\n\
  \n![A323804_3_En_6_Fig2_HTML.jpg](img/A323804_3_En_6_Fig2_HTML.jpg)\n\n图 6-2.\n\n\
  一个宽度减小、附加省略号表示还有更多文本的长文本字符串标签\n\n![A323804_3_En_6_Fig1_HTML.jpg](img/A323804_3_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1.\n\n一个具有完整可用宽度的长文本字符串标签\n\n标签还可以包含一个相对于文本定位的图形节点。这意味着你可以添加任何类型的 JavaFX 节点作为图像图标。清单\
  \ 6-1 展示了创建 JavaFX 标签的三种可能方式。第一种方式是使用空构造函数创建标签，然后使用 `setText()` 方法。第二种方式是使用接受字符串参数的构造函数，该参数用于在标签上显示的文本。最后一种方式是使用接受两个参数的构造函数，这两个参数分别接受文本（String）和用于图形（图标）的节点（Node）。\n\
  \n```\n// 空文本标签\nLabel label1 = new Label();\nlabel1.setText(\"JavaFX 9 by Example\"\
  );\n// 字符串文本标签\nLabel label2 = new Label(\"JavaFX Rocks!!!!\");\n// 字符串和图标标签\nNode\
  \ duke = new ImageView(new Image(getClass().getResourceAsStream(\"/duke.png\")));\n\
  Label label3 = new Label(\"JavaFX Rocks!!!\", duke);\nlabel3.setContentDisplay(ContentDisplay.TOP);\n\
  清单 6-1.\n创建标签的三种方式\n```\n\n如你所见，前两种创建标签的方法相当直接；然而，第三个例子稍微复杂一些。第三个例子创建了一个用作图形（Duke\
  \ 吉祥物）的图像节点，该节点放置在标签文本的上方（`ContentDisplay.TOP`）。图 6-3 显示了一个标签，其中包含文本和一个位于标签文本内容上方的图像。\n\
  \n![A323804_3_En_6_Fig3_HTML.jpg](img/A323804_3_En_6_Fig3_HTML.jpg)\n\n图 6-3.\n\n\
  一个包含图形（图像）并位于文本上方（使用 `ContentDisplay.TOP`）的标签。3D Duke 吉祥物的图像由 Joe Palrang 创作（知识共享许可协议）。\n\
  \n你会注意到，在清单 6-1 中，`label3` 变量使用了 `setContentDisplay()` 方法，该方法接受一个 `ContentDisplay`\
  \ 枚举值。此方法负责决定标签中内容的显示方式，例如图形的位置，或者仅显示文本内容等。表 6-1 列出了使用 `ContentDisplay` 枚举常量显示标签内容的所有不同方式。\n\
  \n表 6-1.\n\n用于指定内容如何在标签上显示的 ContentDisplay 枚举常量\n\n| `BOTTOM` | 内容将放置在标签底部。 |\n\
  | `CENTER` | 内容将放置在标签中央。 |\n| `GRAPHIC_ONLY` | 仅显示图形内容。 |\n| `LEFT` | 内容将放置在标签左侧。\
  \ |\n| `RIGHT` | 内容将放置在标签右侧。 |\n| `TEXT_ONLY` | 仅显示标签的文本。 |\n| `TOP` | 内容将放置在标签顶部。\
  \ |\n\n提示\n\n用于在标签上定位内容的 `ContentDisplay` 常量也可用于 JavaFX 按钮、复选框和菜单。\n\n### 自定义字体\n\
  \n字体基本上可以设置标签、菜单、按钮以及许多其他包含文本的控件中文本的样式和大小。第 3 章讨论了如何将现有字体样式应用于 `Text` 节点，但如何使用自定义字体呢？在\
  \ JavaFX 中，你可以加载标准字体文件格式，例如 TrueType 字体（ttf）或 OpenType 字体（otf）。\n\n加载自定义字体非常简单。首先，找到要加载的字体文件的路径。其次，你需要从\
  \ JavaFX 应用程序线程中初始加载该字体。如清单 6-2 所示，代码从类路径中加载一个 TrueType 字体作为资源。你还会注意到，使用了重写的 JavaFX\
  \ 应用程序的 `init()` 方法来加载自定义字体。`init()` 方法将在调用 `start()` 方法之前，在 JavaFX 应用程序线程上执行。清单\
  \ 6-2 中的代码使用了从 Google 字体网站 [`https://fonts.google.com`](https://fonts.google.com)\
  \ 下载的自定义字体。在那里，你可以找到许多由世界各地的人们设计和创建的免费字体。以下链接是你可以下载由 Cadson Demak 设计的 Kanit 字体的地方。\n\
  \n[`https://fonts.google.com/specimen/Kanit?query=kanit&selection.family=Kanit`](https://fonts.google.com/specimen/Kanit%3Fquery=kanit%26selection.family=Kanit)\n\
  \n```\n@Override\npublic void init() throws Exception {\n// 加载自定义字体\nFont.loadFont(CustomFonts.class.getResource(\"\
  /Kanit-MediumItalic.ttf\")\n.openStream(), 12.0);\n}\n清单 6-2.\n重写 JavaFX 应用程序类中的\
  \ init() 方法，以从类路径加载 TrueType 字体作为资源\n```\n\n在应用程序的 `start()` 方法内部（在 JavaFX 应用程序线程上），代码可以使用之前从\
  \ `init()` 方法加载的自定义字体。清单 6-3 显示了一个标签文本，该文本使用了名为 Kanit 的自定义字体，字体粗细为 MEDIUM，字号为 60\
  \ 磅。\n\n```\n// 使用自定义字体\nLabel labelText = new Label(\"JavaFX 9 by Example \");\n\
  labelText.setFont(Font.font(\"Kanit\", FontWeight.MEDIUM, 60));\n清单 6-3.\n假设字体已预先加载，代码设置自定义字体\
  \ Kanit 来为标签上的文本设置样式\n```\n\n清单 6-3 的输出如图 6-4 所示。\n\n![A323804_3_En_6_Fig4_HTML.jpg](img/A323804_3_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4.\n\n使用自定义字体 Kanit 的标签输出\n\n### 字体作为图标\n\n在下一节中，你将学习如何加载被设计用作图标图像而非字符的自定义字体。这些将图像作为图标的自定义字体如今已成为许多网站的常见做法。这些字体包是用于标签、按钮、菜单或任何需要图像图标的地方的可缩放矢量图像。单个\
  \ Unicode 字符基本上被映射到一个图标图像，而不是拉丁字母表中的字母。\n\n\n\n### 示例：使用第三方字体包作为图标\n\n在 Web 开发中，你可能已经注意到许多专业图标被用作标签、按钮等元素的图形，但你是否也注意到它们能够很好地缩放（没有像素化）？这种新技术实际上是将自定义字体表示为矢量图像。这个巧妙的想法允许代码像获取普通字母字体一样获取矢量图像，并对其进行着色和调整大小。如果你不熟悉这个概念，请访问以下链接：\n\
  \n*   FontAwesome：[`http://fontawesome.io`](http://fontawesome.io)\n*   Weather\
  \ Icons：[`https://erikflowers.github.io/weather-icons`](https://erikflowers.github.io/weather-icons)\n\
  *   Material Design Icons：[`http://zavoloklom.github.io/material-design-iconic-font`](http://zavoloklom.github.io/material-design-iconic-font)\n\
  *   Glyph Icons：[`http://getbootstrap.com/components/#glyphicons`](http://getbootstrap.com/components/#glyphicons)\n\
  \n接下来，你将看到一个应用程序的代码示例，该应用程序允许你搜索或查看来自这些不同图标包的图标。在创建这个示例时，我遇到了一个名为 FontAwesomeFX\
  \ 的基于 JavaFX 的库，由 Jens Deter 编写，他将许多流行的图标引入到 JavaFX 应用程序中。当你读到本章时，Jens Deter 很可能已经创建了针对\
  \ Java 9 进行模块化的内容（Java 9 模块）。\n\n例如，Jens 库的当前实现将各种图标包放在一个 JAR 文件中。这里，使用 Java 9 模块可以将库拆分为不同的模块，从而允许应用程序只包含它需要的模块，使应用程序打包更小。要获取最新消息和更新，请访问\
  \ `FontAwesomeFX` 项目，链接如下：\n\n[`https://bitbucket.org/Jerady/fontawesomefx`](https://bitbucket.org/Jerady/fontawesomefx)\n\
  \n#### 示例：LabelAwesome——一个字体包图标浏览器应用\n\n`LabelAwesome` 示例应用程序允许用户搜索和浏览来自 FontAwesome、WeatherIcons、Material\
  \ Design Icons 和 Glyph Icons 的各种字体包。该应用程序允许用户输入图标名称中包含的文本进行搜索。用户还可以选择四种方式在显示标签时定位字体图标。可供选择的位置是顶部、底部、左侧和右侧。在图\
  \ 6-5 中，`LabelAwesome` 应用程序允许用户搜索和浏览来自各种字体包的图标。\n\n![A323804_3_En_6_Fig5_HTML.jpg](img/A323804_3_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5.\n\nLabelAwesome 应用程序允许用户搜索和浏览来自各种字体包的图标。该应用程序还允许用户选择相对于标签文本放置字体图标的位置。\n\
  \n#### 入门指南\n\n`LabelAwesome` 应用程序代码位于名为 `LabelAwesome.java` 的 Java 文件中，如清单 6-6\
  \ 所示。但是，在讨论清单 6-6 之前，让我们确保包含了正确的库依赖项。必须将 `fontawesomefx.jar` 库包含在类路径中，才能成功编译和执行。\n\
  \n如果你从 Apress 出版社下载了本书的源代码，那么 `FontAwesomeFX` 库已经包含在内。如果你可以访问 Maven 或 Gradle，你可以从\
  \ Maven Central 或 Bintray 下载它。Maven Central 和 Bintray 是托管构建工件（如 JAR 库）的仓库。对于熟悉 Maven\
  \ 的用户，请使用清单 6-4 中的依赖坐标。\n\n```\nde.jensd\nfontawesomefx\n8.9\n清单 6-4.\n构建示例 LabelAwesome.java\
  \ 的 Maven 坐标\n```\n\n对于熟悉 Gradle 的用户，请在项目的 `build.gradle` 文件中使用清单 6-5 作为编译时依赖项。\n\
