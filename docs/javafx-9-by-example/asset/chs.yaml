  ## 引言


  欢迎阅读《JavaFX 9 实战》。


  ### 什么是 JavaFX？


  JavaFX 是 Java 的下一代图形用户界面（GUI）工具包，允许开发者快速构建丰富的跨平台应用程序。JavaFX 从头开始构建，通过硬件加速图形利用现代
  GPU，同时提供设计精良的编程接口，使开发者能够结合图形、动画和 UI 控件。全新的 JavaFX 9 是一个纯 Java 语言应用程序编程接口（API）。JavaFX
  的目标是应用于多种设备类型，如嵌入式设备、智能手机、电视、平板电脑和台式机。


  前 Oracle 开发副总裁 Nandini Ramani 在《Introducing JavaFX》截屏视频中明确阐述了 JavaFX 作为平台的预期发展方向：


  > 行业正朝着配备 GPU 的多核/多线程平台发展。JavaFX 利用这些特性来提高执行效率和 UI 设计灵活性。我们的初始目标是为企业应用程序的架构师和开发者提供一套工具和
  API，帮助他们构建更好的数据驱动型业务应用程序。

  > ——Nandini Ramani，前 Oracle 公司 Java 客户端平台开发副总裁


  在 JavaFX 诞生之前，开发丰富的客户端应用程序需要整合许多独立的库和 API 才能实现功能强大的应用程序。这些独立的库包括媒体、UI 控件、Web、3D
  和 2D API。由于将这些 API 整合在一起相当困难，Oracle 的杰出工程师们创建了一套全新的 JavaFX 库，将所有相同功能整合在一个框架下。JavaFX
  堪称 GUI 工具包中的“瑞士军刀”（图 FM-1）。JavaFX 9 是一个纯 Java（语言）API，允许开发者利用现有的 Java 库和工具。


  ![A323804_3_En_BookFrontmatter_Fig1_HTML.jpg](img/A323804_3_En_BookFrontmatter_Fig1_HTML.jpg)


  图 FM-1.


  JavaFX


  根据你交谈的对象不同，你可能会遇到对“用户体验”（或在 UI 领域中的 UX）的不同定义。但有一个事实始终不变——用户总是要求 GUI 应用程序提供更好的内容和更高的可用性。鉴于这一事实，开发者和设计师经常合作打造应用程序以满足这一需求。JavaFX
  提供了一个工具包，帮助开发者和设计师（在某些情况下是同一个人）创建既实用又美观的应用程序。另外需要承认的是，在开发游戏、媒体播放器或常见的企业应用程序时，JavaFX
  不仅有助于开发更丰富的用户界面，你还会发现其 API 设计得极为出色，能大幅提升开发者的生产力（我们始终关注 API 使用者的视角）。


  尽管本书并未详尽研究 JavaFX 8 和 9 的所有功能，但你会找到有助于构建更丰富应用程序的常见用例。希望本书能通过提供实用的真实世界示例，为你指明正确的方向。


  ## 历史沿革


  2005 年，Sun Microsystems 收购了 SeeBeyond 公司，该公司有一位名叫 Chris Oliver 的软件工程师创建了一种图形丰富的脚本语言，称为
  F3（Form Follows Function）。F3 后来由 Sun Microsystems 在 2007 年 JavaOne 大会上以 JavaFX 的名义发布。2009
  年 4 月 20 日，Oracle 公司宣布收购 Sun Microsystems，使 Oracle 成为 JavaFX 的新管理者。


  在 2010 年 JavaOne 大会上，Oracle 宣布了 JavaFX 路线图，其中包括逐步淘汰 JavaFX 脚本语言，并重新为 Java 平台创建基于
  Java API 的 JavaFX 平台。根据 2010 年路线图的承诺，JavaFX 2.0 SDK 于 2011 年 10 月在 JavaOne 大会上发布。除了发布
  JavaFX 2.0，Oracle 还承诺将采取措施开源 JavaFX，从而让社区帮助推动平台发展。开源 JavaFX 将提高其采用率，加快错误修复的周转时间，并带来新的增强功能。


  在 JavaFX 2.1 和 2.2 之间，新功能的数量迅速增长。表 FM-1 显示了 2.1 和 2.2 版本之间包含的众多功能。JavaFX 2.1 是 MacOS
  上 Java SDK 的官方版本。JavaFX 2.2 是 Linux 操作系统上 Java SDK 的官方版本。


  Java 8 于 2014 年 3 月 18 日发布。Java 8 拥有许多新的 API 和语言增强功能，包括 lambda 表达式、Stream API、Nashorn
  JavaScript 引擎和 JavaFX API。关于 JavaFX 8，其功能包括 3D 图形、富文本支持和打印 API。


  Java 9 预计于 2017 年 9 月发布。Java 9 拥有众多功能，但最重要的功能是模块化，即广为人知的 Project Jigsaw。




  ## 本书学习内容


  本书将通过实践示例，带你学习 JavaFX 9 的各项功能。这些示例将逐步为你提供创建丰富客户端应用程序所需的知识。秉承 Java“一次编写，随处运行”的理念，JavaFX
  也延续了这一精神。由于 JavaFX 9 完全使用 Java 语言编写，你将感到得心应手。


  大多数示例可以在 Java 8 下编译和运行。不过，其中一些示例旨在利用 Java 9 的语言增强特性。在通过本书学习 JavaFX 8 和 9 的过程中，你会发现
  JavaFX API 和语言增强功能将帮助你成为一名更高效的开发者。话虽如此，我们仍鼓励你探索 Java 8 的所有新特性。


  本书涵盖 JavaFX 8 和 9 的基础知识、模块、Lambda 表达式、属性、布局、UI 控件、打印机、动画、自定义 UI、图表、媒体、Web、3D、Arduino、触摸事件和手势。


  ## 本书读者对象


  如果你是一名 Java 开发者，希望将客户端应用程序提升到新高度，那么本书将成为你的指南，帮助你开始创建可用且美观的用户界面。此外，如果你是一名经验丰富的 Java
  Swing、Flash/Flex、SWT 或 Web 开发者，想要学习如何创建高性能的丰富客户端应用程序，那么本书也适合你。


  ## 本书结构


  本书按照从入门到中级再到高级概念的自然递进顺序编排。对于 Java 开发者而言，本书中提到的任何概念都不应过于难以理解。本书完全基于示例，并在演示应用程序之前讨论主要概念。对于每个项目，在展示代码执行输出后，我们将提供详细的解释，逐步讲解代码。每个示例都可以轻松调整，以满足你在开发游戏、媒体播放器或常规企业应用程序时的自身需求。你作为
  Java UI 开发者的经验越丰富，就越能自由地跳转到本书的不同章节和示例。然而，任何 Java 开发者都可以通读本书，并学习增强日常 GUI 应用程序所需的技能。


