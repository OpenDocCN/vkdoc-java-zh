  \ 目录。编译时，你应该会在控制台上看到以下警告：\n\n```\nwarning: using incubating module(s): jdk.incubator.httpclient\n\
  1 warning\n```\n\n你可以忽略该警告并继续执行其他步骤。该警告基本上表明它被视为实验性功能，不属于核心部分。\n\n编译完代码后，你需要将资源复制到编译后的区域。复制资源将使文件在运行时可用。通常，你喜欢的\
  \ IDE 会自动复制资源。最后一条语句通过 `--add-modules` 添加 `jdk.incubator.httpclient` 模块，并使用 `--module-path`\
  \ 将新编译的模块指向 `mods` 目录来运行应用程序。注意 `-m` 开关，它告诉 Java 运行时运行哪个模块以及哪个类包含 `main` 应用程序。在本例中，模块名称和主类名称指定如下：\n\
  \n```\ncom.jfxbe.weatherwidget/com.jfxbe.weatherwidget.WeatherWidget.\n```\n\n成功运行应用程序后，图\
  \ 10-2 显示了天气小部件应用程序窗口。\n\n在我深入讲解源代码之前，我想指出，为了让天气小部件应用程序成功检索数据，必须从 Open Weather Map\
  \ 的人员那里获取一个有效的 API 密钥。要注册并获取 API 密钥，请访问 [`http://openweathermap.org`](http://openweathermap.org)\
  \ 。如果你是第一次运行该应用程序，系统会弹出一个对话框，要求你输入 API 密钥，如图 10-3 所示。\n\n![A323804_3_En_10_Fig3_HTML.jpg](img/A323804_3_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3.\n\n一个用于输入来自 Open Weather Map 的 API 密钥的对话框\n\n一旦 API 密钥被输入并接受，它将被本地存储在一个名为：\n\
  \n```\n{user.home}/.openweathermap-api-key\n```\n\n的文件中。其中 `{user.home}` 是你需要替换为你的主目录的位置。文件保存后，当你再次启动应用程序时，将加载该\
  \ API 密钥文件，而不会提示用户输入 API 密钥。\n\n在 Java 的系统属性中，`user.home` 是用户的主目录，具体取决于操作系统。请参阅以下位置的\
  \ Javadoc 文档和教程：\n\n```\nhttps://docs.oracle.com/javase/tutorial/essential/environment/sysprop.html\n\
  ```\n\n注意\n\n本示例中的 Web 服务由 Open Weather Map（[`http://openweathermap.org`](http://openweathermap.org)）的人员提供支持。我鼓励你支持他们，因为他们继续为应用程序和移动开发者提供有关全球地图和天气数据的宝贵服务。\n\
  \n### 一行代码：将输入流读取为字符串\n\n作为天气小部件示例加载 API 密钥文件的一个非常巧妙的小技巧，我创建了一个简单的静态工具方法 `streamToString()`。这个方便的工具方法允许你读取文件内容或连接的输入流，并将其转换为字符串。\n\
  \n当你查看天气小部件示例的源代码时，该方法将尝试读取一个本地文件，该文件包含从网站 [`http://openweathermap.org`](http://openweathermap.org)\
  \ 颁发的 API 密钥字符串。\n\n清单 10-21 展示了如何将输入流转换为 `String` 对象。\n\n```\nprivate static String\
  \ streamToString(InputStream inputStream) {\nString text = new Scanner(inputStream,\
  \ \"UTF-8\")\n.useDelimiter(\"\\\\Z\")\n.next();\nreturn text;\n}\n清单 10-21.\n一个将文本文件读取为字符串对象返回给调用者的静态方法\n\
  ```\n\n你会很快注意到那个“神奇地”将输入流转换为 `String` 对象的奇怪的一行语句。`streamToString()` 方法使用了方便的 `Scanner`\
  \ API。这个 API 非常适合读取具有分隔文本行的文本文件，例如逗号分隔值（CSV）。Scanner 对象默认将其分隔符设置为行尾字符（`\\n`）。\n\n\
  通过将文件结束符（EOF）标记（`\\\\Z`）设置为分隔符，`next()` 方法将返回结束前的文本流，从而将整个文本作为一个字段创建。当然，还有其他检索文本数据的方法，可能也更高效；但是，你可以看到，使用这种策略可以处理中小型数据请求（最多约\
  \ 3MB）的常见情况。大小可能是一个问题，因为数据被转换为 `String` 对象，并且根据没有垃圾回收的请求数量，内存资源很容易被消耗——可能会使应用程序不堪重负。由于它只是一个由哈希组成的\
  \ API 密钥，所以应该完全没问题。\n\n天气小部件允许用户在搜索字段中输入城市或区域来确定天气状况。获取 JSON 天气数据后，屏幕将显示以下信息：城市、国家、星期几、时间（上次更新）、天气状况、天气描述、图标、温度、湿度、风速。代码将执行\
  \ JavaScript 代码来填充显示内容。\n\n好了，关于应用程序的先决条件和描述就介绍到这里——现在让我们来看看天气小部件的源代码。\n\n\n###\
  \ 源代码\n\n天气小部件项目包含三个源文件：\n\n*   `module-info.java`：模块定义，需要 `jdk.incubator.httpclient`\
  \ 等。\n*   `WeatherWidget.java`：主应用程序代码\n*   `weather_template.html`：用作天气信息主要显示的\
  \ HTML 模板\n\n在清单 10-22 中，`module-info.java` 文件包含了模块定义。天气小部件模块依赖于以下模块：`javafx.web`、`jdk.jsobject`\
  \ 和 `jdk.incubator.httpclient`。最后一条语句是天气小部件模块自身的导出。导出模块是使该模块及其 API 对任何使用者公开的方式。例如，如果另一个模块添加了\
  \ `requires com.jfxbe.weatherwidget`，那么它们的代码就可以安全地导入 `com.jfxbe.weatherwidget` 所拥有的包。请记住，如果现有模块（例如\
  \ `java.base` 模块）已经引用了传递性依赖，则无需在模块定义中包含它们。\n\n```\nmodule com.jfxbe.weatherwidget\
  \ {\nrequires javafx.web;\nrequires jdk.jsobject;\nrequires jdk.incubator.httpclient;\n\
  exports com.jfxbe.weatherwidget;\n}\n清单 10-22.\ncom.jfxbe.weatherwidget 模块的 module-info.java\n\
  ```\n\n清单 10-23 是 `WeatherWidget.java` 文件中的天气小部件主应用程序代码。在源代码中，为了节省本章篇幅，我省略了一些导入语句，但包含了静态导入，以使后续代码更简洁。建议阅读类顶部的注释，以便更好地理解代码在\
  \ Java 和 JavaScript 之间来回通信时的数据流。\n\n\n```java\npackage com.jfxbe.weatherwidget;\n\
  // 其他导入已省略...\nimport static jdk.incubator.http.HttpClient.newHttpClient;\nimport\
