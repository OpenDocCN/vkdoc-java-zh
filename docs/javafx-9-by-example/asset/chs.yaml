  \n\n\n#### 类成员变量\n\n首先，我来描述一下类变量。变量 `MY_PASS` 包含一个硬编码的密码字符串“`password1`”。接下来，声明了\
  \ `GRANTED_ACCESS` 变量，其类型为 `SimpleBooleanProperty` 类，默认值为 `false`。该变量稍后将绑定到绿色对勾图标（`grantedIcon`）节点的\
  \ `visible` 属性上。基本上，当用户输入正确的密码按键时，`GRANTED_ACCESS` 将变为 `true`，从而触发绿色对勾图标节点的可见属性设置为\
