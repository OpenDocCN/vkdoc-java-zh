  #### 频谱区域图可视化（Scene.lookup( ) 方法）


  在创建了一个可使用鼠标拖动的场景和舞台之后，代码创建了一个 ID 为 `chart-area` 的 `Path` 实例。此路径将包含 `Path` 元素，这些元素会在播放音频媒体时绘制一个频谱图作为可视化效果。正如你稍后在代码中会看到的，`MediaPlayer`
  实例将附加一个音频频谱监听器，用于更新路径元素，这些元素将绘制一个填充了线性渐变的区域图。


  虽然具有唯一 ID 的 JavaFX 节点可以使用 CSS 选择器进行样式化，但该 ID 也可以用于通过 `lookup(id)` 方法在父节点或场景中回溯或查找。请注意，在节点上设置的
  ID 应该是唯一的。根据 Javadocs 文档：“如果有多个节点匹配指定的选择器，此函数将返回第一个匹配的节点。如果没有找到具有此 ID 的节点，则返回 null。”


  注意


  要在场景图或父节点中查找节点，请使用 `lookup()` 方法，并传入子节点的 ID。务必在字符串 ID 前加上符号 `#`。例如，`Node myButton
  = scene.lookup("#my-button");`。


  使用场景的 `lookup()` 方法是一种便捷的方式，可以以随机访问的方式从场景图中检索节点，而无需创建全局定义的实例变量。




  #### 创建自定义按钮面板


  继续介绍 `start()` 方法，代码通过调用私有方法 `createButtonPanel()` 创建了一个自定义按钮面板。调用 `createButtonPanel()`
  方法创建自定义按钮面板后，代码会将控件定位到右下角。以下代码片段将按钮面板设置为右下角，并带有 3.0 像素的内边距。


  ```

  AnchorPane.setRightAnchor(buttonPanel, 3.0);

  AnchorPane.setBottomAnchor(buttonPanel, 3.0);

