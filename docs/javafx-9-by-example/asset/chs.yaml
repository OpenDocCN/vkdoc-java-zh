  ### 甜甜圈


  最后是美味的甜甜圈形状，带有有趣的投影效果，如图 3-13 所示。这个自定义形状是通过几何运算（如减去、合并、相交等）创建的。使用任意两个形状，都可以执行几何运算，从而形成一个全新的形状对象。所有运算都可以在
  [`javafx.scene.shape.Path`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Path.html)
  类中找到。


  ![A323804_3_En_3_Fig13_HTML.jpg](img/A323804_3_En_3_Fig13_HTML.jpg)


  图 3-13.


  通过形状减法创建的甜甜圈形状


  要创建甜甜圈形状，首先创建两个圆形椭圆（[`javafx.scene.shape.Ellipse`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Ellipse.html)）实例。从较大的椭圆区域中减去较小的椭圆（甜甜圈孔），会创建一个新派生的
  `Shape` 对象，该对象通过静态的 `Path.subtract()` 方法返回。以下代码片段使用 `Path.subtract()` 方法创建了甜甜圈形状：


  ```

  // 外圈甜甜圈

  Ellipse bigCircle = ...//外部形状区域

  // 甜甜圈孔

  Ellipse smallCircle = ...// 内部形状区域

  // 制作甜甜圈

  Shape donut = Path.subtract(bigCircle, smallCircle);

  ```


  接下来是为甜甜圈形状应用投影效果。一种常见的技术是绘制填充为黑色的形状，同时将原始形状略微偏移地放置在其上方，以模拟阴影效果。然而，在 JavaFX 中，代码将只绘制一次甜甜圈形状，并使用
  `setEffect()` 方法应用一个 `DropShadow` 对象实例。要设置阴影偏移量，请调用 `setOffsetX()` 和 `setOffsetY()`
  方法。通常，如果光源来自左上方，则阴影会显示在形状的右下方。


  最后要指出的一点是，示例中的所有形状最初都被绘制为彼此上下堆叠。回顾一下清单 3-2，你会注意到，每创建一个形状，其 `translateY` 属性就会被设置，以重新定位或将该形状从其原始位置偏移。例如，如果一个形状的左上角边界框点创建在
  (100, 100) 处，而你希望将其移动到 (101, 101)，则 `translateX` 和 `translateY` 属性应设置为 1。


  在此示例中，由于每个形状都渲染在另一个形状的下方，你可以调用 `getBoundsInParent()` 方法来返回关于节点边界区域的信息，例如其宽度和高度。`getBoundsInParent()`
  对高度和宽度的计算包括了节点的实际尺寸（宽度和高度）以及任何效果、平移和变换。例如，一个应用了投影效果的形状，其宽度会因包含阴影而增加。


  图 3-14 是一个围绕父节点内 `Rectangle` 节点的红色虚线矩形，更广为人知的名称为父边界矩形（Bounds in Parent）。你会注意到，宽度和高度的计算包括了应用于形状的变换、平移和效果。在图
  3-14 中，变换操作是旋转，效果是投影。


