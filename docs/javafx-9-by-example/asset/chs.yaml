  ```


  在指定颜色值时，`PaintingColors.java` 代码使用了默认 RGB 颜色空间中的颜色。为了创建颜色，代码使用了 `Color.rgb()` 方法。该方法接受三个整数值，分别代表红色、绿色和蓝色分量。另一个重载方法接受三个整数值和一个数据类型为
  double 的第四个参数。这第四个参数是 alpha 通道，用于设置颜色的不透明度。该值介于 0 和 1 之间。0 表示完全透明，1 表示完全不透明。请记住，还有其他创建颜色的方式，例如
  HSB 和 Web。HSB 代表色相、饱和度和亮度。要使用 HSB 颜色空间创建颜色，可以调用 `Color.hsb()` 方法。另一种在 HTML 和 CSS
  的 Web 开发中常见的指定颜色值的方式是使用 RGB 十六进制字符串值。对于熟悉这种约定的开发者来说，他们会使用 `Color.web()` 方法。


  绘制椭圆形状后，代码使用径向渐变调用了 `setFill()` 方法，以呈现 3D 球体对象的外观。接着，它创建了一个用黄色半透明线性渐变填充的矩形。在黄色矩形后面添加了一条粗黑线，以展示半透明颜色。最后，代码实现了一个圆角矩形，使用绿色和黑色相间的反射线性渐变填充，呈现出对角线方向的
  3D 管状效果。每个形状及其相关的颜色填充将在后续章节中详细讨论。


  ### 渐变颜色


  在 JavaFX 中创建渐变颜色涉及五个要素：


  1.  第一个色标颜色的起始点（`javafx.scene.paint.Stop`）。

  2.  代表结束色标颜色的终点。

  3.  用于指定是使用标准屏幕坐标还是单位正方形坐标的 `proportional` 属性。

  4.  用于指定三种枚举值之一的 `Cycle` 方法：`NO_CYCLE`、`REFLECT` 或 `REPEAT`。

  5.  一个色标（`Stop`）颜色数组。每个包含颜色的色标将从绘制第一个色标颜色开始，然后插值到第二个色标颜色，依此类推。


  ### 色标颜色


  在使用渐变颜色时，必须至少有两个颜色列表用于插值。此外，在处理渐变时，可以在颜色之间指定的渐变范围称为范围偏移。要指定范围偏移以分布颜色，需要 `Stop` 类的实例。以下代码片段展示了七个色标颜色，其范围分别为
  0%、15%、30%、45%、60%、75% 和 100%。


  ```

  Stop rStop = new Stop(0.0, Color.RED);

  Stop oStop = new Stop(0.15, Color.ORANGE);

  Stop yStop new Stop(0.30, Color.YELLOW);

  Stop gStop new Stop(0.45, Color.GREEN);

  Stop bStop new Stop(0.60, Color.BLUE);

  Stop iStop new Stop(0.75, Color.INDIGO);

  Stop vStop new Stop(1, Color.VIOLET);

  ```


  示例代码是一个代表彩虹颜色（ROYGBIV）的渐变，从红色开始，在 0% 到 15% 的范围内插值，然后橙色在 15% 到 30% 之间渐变。接下来是 30%
  到 45% 的范围，使用黄色，依此类推。现在你已经了解了如何指定色标颜色之间的范围偏移，接下来你将学习有助于线性渐变的渐变轴。渐变轴基于一条由起点和终点表示的线，它有助于在形状上分布颜色。


  ### 线性渐变


  在处理线性或径向渐变颜色时，要特别注意 `proportional` 属性。通过将此属性设置为 `false`，你可以基于标准屏幕 (x, y) 坐标绘制一条具有起点（`start
  X`, `start Y`）和终点（`end X`, `end Y`）的线（渐变轴）。一个例子是使用起点 (0,0) 和终点 (100,0) 的线性渐变，这会创建一个水平渐变（从左到右）。如果一个矩形宽
  100 像素，并且有一个偏移量为 0.0 的黑色色标和一个偏移量为 1.0 的白色色标，那么使用 0 到 100 像素之间的屏幕坐标，颜色将从黑色到白色均匀分布。但如果出于某种原因你想改变矩形的宽度，渐变将无法正确缩放。渐变不会拉伸以适应矩形的宽度。


  为了允许渐变根据形状的大小进行拉伸，`proportional` 属性被设置为 `true`，并且渐变轴的起点和终点将表示为单位正方形坐标。这意味着起点和终点的
  x、y 坐标必须在 0.0 到 1.0（`double` 类型）之间。这种策略比场景图上的屏幕坐标更紧凑，也更容易定义。因此，例如，如果一个矩形宽 200 像素，并且具有与上述相同的两个色标颜色，你可以指定渐变轴线的起点为
  (0,0)，终点为 (1,0)，以使渐变从左到右拉伸（覆盖形状的宽度）。




  ### 径向渐变


  带有渐变的颜色其奇妙之处在于，它们常常能让形状呈现出三维效果。渐变绘制允许你在两种或多种颜色之间进行插值，从而为形状增添立体感。JavaFX 提供了两种类型的渐变：径向渐变（`RadialGradient`）和线性渐变（`LinearGradient`）。对于这个椭圆形状，你将使用径向渐变（`RadialGradient`）。这将使椭圆看起来像一个球体。


  表 3-2 展示了 JavaFX 8 中 `RadialGradient` 类的 Javadoc 定义。你可以在以下网址找到该文档：


  表 3-2.


  RadialGradient 属性


  | 属性 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `focusAngle` | `Double` | 从渐变中心到焦点（映射第一种颜色的点）的角度（以度为单位）。 |

  | `focusDistance` | `Double` | 从渐变中心到焦点（映射第一种颜色的点）的距离。 |

  | `centerX` | `Double` | 渐变圆中心点的 X 坐标。 |

  | `centerY` | `Double` | 渐变圆中心点的 Y 坐标。 |

  | `radius` | `Double` | 定义颜色渐变范围的圆的半径。 |

  | `proportional` | `boolean` | 坐标和大小是否与此渐变所填充的形状成比例。 |

  | `cycleMethod` | `CycleMethod` | 应用于渐变的循环方法。 |

  | `Stops` | `List<Stop>` | 渐变的颜色规格。 |


  [`http://download.java.net/jdk8/jfxdocs/javafx/scene/paint/RadialGradient.html`](http://download.java.net/jdk8/jfxdocs/javafx/scene/paint/RadialGradient.html)


  在此示例中，焦点角度设置为零，距离设置为 0.1，中心 X 和 Y 设置为 (80,45)，半径设置为 120 像素，`proportional` 设置为 `false`，循环方法设置为无循环（`CycleMethod.NO_CYCLE`），两个颜色停止值设置为红色（`Color.RED`）和黑色（`Color.BLACK`）。这些设置通过从中心位置为
  (80, 45)（椭圆的左上角）的红色开始，插值到距离为 120 像素（半径）的黑色，从而为椭圆提供径向渐变。由于径向渐变的中心位置设置为红色，渐变将插值到黑色，这看起来就像中心位置是一个头顶光源，而黑色则模拟了阴影（与光源相反）。


  ### 半透明渐变


  接下来，你将看到如何创建矩形，该矩形具有黄色的半透明线性渐变。对于黄色矩形，你将使用线性渐变（`LinearGradient`）绘制。


  表 3-3 展示了 JavaFX 8 中 `LinearGradient` 类的 Javadoc 定义。你也可以在以下网址找到这些定义：


  表 3-3.


  LinearGradient 属性


  | 属性 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `startX` | `Double` | 渐变轴起点的 X 坐标。 |

  | `startY` | `Double` | 渐变轴起点的 Y 坐标。 |

  | `endX` | `Double` | 渐变轴终点的 X 坐标。 |

  | `endY` | `Double` | 渐变轴终点的 Y 坐标。 |

  | `proportional` | `Boolean` | 坐标是否与此渐变所填充的形状成比例。当设置为 `true` 时，使用单位正方形坐标；否则，使用场景/屏幕坐标系。
  |

  | `cycleMethod` | `CycleMethod` | 应用于渐变的循环方法。 |

  | `stops` | `List<Stop>` | 渐变的颜色规格。 |


  [`http://download.java.net/jdk8/jfxdocs/index.html?javafx/scene/paint/LinearGradient.html`](http://download.java.net/jdk8/jfxdocs/index.html?javafx/scene/paint/LinearGradient.html)


  要创建线性渐变绘制，你需要为起点和终点指定 `startX`、`startY`、`endX` 和 `endY`。起点和终点的坐标表示渐变图案开始和结束的位置。


  要创建图 3-15 中的第二个形状，即黄色矩形，你将起点 X 和 Y 设置为 `(0.0, 0.0)`，终点 X 和 Y 设置为 (0.0, 1.0)，`proportional`
  设置为 `true`，循环方法设置为无循环（`CycleMethod.NO_CYCLE`），两个颜色停止值设置为黄色（`Color.YELLOW`）和黑色（`Color.BLACK`），透明度
  alpha 值为 0.784。这些设置使得矩形从上到下产生线性渐变，起点为 (0.0, 0.0)（单位正方形的左上角），插值到黑色，终点为 (0.0, 1.0)（单位正方形的左下角）。


  ### 反射循环渐变


  最后，在图 3-15 的底部，你会注意到一个圆角矩形，它使用绿色和黑色沿对角线方向重复渐变图案。这是一种简单的线性渐变绘制，与线性渐变绘制（`LinearGradient`）相同，只是起点
  X、Y 和终点 X、Y 的值设置在对角线位置，并且循环方法设置为反射（`CycleMethod.REFLECT`）。当你将循环方法指定为反射（`CycleMethod.REFLECT`）时，渐变图案将在停止颜色之间重复或循环。以下代码片段实现了具有反射循环方法（`CycleMethod.REFLECT`）的圆角矩形：


  ```

  LinearGradient cycleGrad = new LinearGradient(

  50, // 起点 X

  50, // 起点 Y

  70, // 终点 X

  70, // 终点 Y

  false, // proportional

  CycleMethod.REFLECT,  // cycleMethod

  new Stop(0f, Color.rgb(0, 255, 0, .784)),

  new Stop(1.0f, Color.rgb(0, 0, 0, .784))

  );

  ```




  ## 绘制文本


  另一个基本的 JavaFX 节点是 `Text` 节点，它允许你在场景图上显示一串字符。要在 JavaFX 场景图上创建 `Text` 节点，你需要使用 `javafx.scene.text.Text`
  类。由于所有 JavaFX 场景节点都继承自 `javafx.scene.Node`，因此它们会继承许多功能，例如缩放、平移或旋转的能力。


  基于 Java 的继承层次结构，`Text` 节点的直接父类是 `javafx.scene.shape.Shape` 类，它提供了比 `Node` 类更多的功能。由于
  `Text` 节点既是 `Node` 对象又是 `Shape` 对象，因此它可以在两个形状区域之间执行几何运算，例如相减、相交或并集。你还可以使用类似于镂空字母的形状来裁剪视口区域。


  为了演示绘制文本，在本节中，你将看到一个关于如何在场景图上绘制文本节点的基本示例。此示例涉及以下三个功能：


  *   使用 (x, y) 坐标定位 `Text` 节点

  *   设置 `Text` 节点的描边颜色

  *   围绕其枢轴点旋转 `Text` 节点


  为了让事情变得有趣一些，你将创建 100 个 `Text` 节点，并为刚才提到的三个功能生成随机值。图 3-16 展示了绘制文本示例的运行效果。


  ![A323804_3_En_3_Fig16_HTML.jpg](img/A323804_3_En_3_Fig16_HTML.jpg)


  图 3-16.


  绘制文本


  清单 3-4 中所示的 `DrawingText.java` 代码创建了 100 个 `Text` 节点，并为以下属性生成了随机值：


  *   x, y 坐标

  *   RGB 填充颜色

  *   旋转角度（度）


  代码首先创建一个循环来生成随机的 (x, y) 坐标以定位 `Text` 节点。在循环中，它创建介于 0 到 255 之间的随机 RGB 颜色分量，并将其应用于
  `Text` 节点。将所有分量设置为 0 会产生黑色。将所有三个 RGB 值设置为 255 会产生白色。


  ```

  @Override

  public void start(Stage primaryStage) {

  primaryStage.setTitle("Drawing Text");

  Group root = new Group();

  Scene scene = new Scene(root, 300, 250, Color.WHITE);

  Random rand = new Random(System.currentTimeMillis());

  for (int i = 0; i < 100; i++) {

  int x = rand.nextInt((int) scene.getWidth());

  int y = rand.nextInt((int) scene.getHeight());

  int red = rand.nextInt(255);

  int green = rand.nextInt(255);

  int blue = rand.nextInt(255);

  Text text = new Text(x, y, "JavaFX 9");

  int rot = rand.nextInt(360);

  text.setFill(Color.rgb(red, green, blue, .99));

  text.setRotate(rot);

  root.getChildren().add(text);

  }

  primaryStage.setScene(scene);

  primaryStage.show();

  }

  清单 3-4.

  DrawingText.java

  ```


  旋转角度（以度为单位）是一个从 0 到 360 度随机生成的值，这会导致文本的基线倾斜。根据 API 文档，`setRotate()` 方法将围绕枢轴点旋转，该枢轴点是未变换的[布局边界](http://docs.oracle.com/javafx/2/api/javafx/scene/Node.html#layoutBoundsProperty())（`layoutBounds`）属性的中心。基本上，枢轴点是没有应用任何变换（缩放、平移、剪切、旋转等）的节点的中心。


  注意


  如果你需要使用变换的组合，例如旋转、缩放和平移，请查看 `getTransforms().add(...)` 方法。有关局部边界、父边界和布局边界之间差异的更多详细信息，请参阅
  Javadoc 文档。另外，请查看关于布局和 Scene Builder 的第 5 章。


  以下代码用于 `DrawingText.java` 中，为 `Text` 节点的 x 和 y 位置（基线）、颜色和旋转创建随机值：


  ```

  int x = rand.nextInt((int) scene.getWidth());

  int y = rand.nextInt((int) scene.getHeight());

  int red = rand.nextInt(255);

  int green = rand.nextInt(255);

  int blue = rand.nextInt(255);

  int rot = rand.nextInt(360);

  ```


  生成随机值后，它们会被应用于 `Text` 节点，这些节点将被绘制到场景图上。每个 `Text` 节点都维护一个文本原点属性，该属性包含其基线的起始点。在基于拉丁字母的字母表中，基线是字母下方的一条假想线，类似于书架上的书。但是，某些字母（例如小写字母
  j）会延伸到基线以下。在指定 `Text` 节点的 x 和 y 坐标时，你实际上是在定位基线的起点。在图 3-17 中，x 和 y 坐标位于文本节点 `javafx
  9` 中基线左侧的小写字母 j 下方。


  ![A323804_3_En_3_Fig17_HTML.jpg](img/A323804_3_En_3_Fig17_HTML.jpg)


  图 3-17.


  文本节点的基线 (x, y) 坐标位置


  以下代码片段将 (x, y) 坐标、颜色（RGB，不透明度为 .99）和旋转（角度，以度为单位）应用于 `Text` 节点：


  ```

  Text text = new Text(x, y, "JavaFX 9");

  text.setFill(Color.rgb(red, green, blue, .99));

  text.setRotate(rot);

  root.getChildren().add(text);

  ```


  你应该开始看到场景图 API 的易用性所带来的强大功能，尤其是在处理 `Text` 节点时。在这里，你能够定位、着色和旋转文本。为了稍微美化一下，接下来你将看到如何更改文本的字体并应用效果。




  ### 更改文本字体


  JavaFX 的 `Font` API 使您能够像文字处理应用程序一样更改字体样式和字号。为了演示这一点，我创建了一个 JavaFX 应用程序，它显示四个文本节点，其字符串值为
  `"JavaFX 9 by Example"`，每个节点具有不同的字体样式。除了字体样式之外，我还添加了诸如投影（`DropShadow`）和反射（`Reflection`）之类的效果。


  图 3-18 显示了示例的输出，清单 3-5 显示了 `ChangingTextFonts.java` 源代码。


  ![A323804_3_En_3_Fig18_HTML.jpg](img/A323804_3_En_3_Fig18_HTML.jpg)


  图 3-18.


  更改文本字体


  ```

  @Override

  public void start(Stage primaryStage) {

  primaryStage.setTitle("Changing Text Fonts");

  System.out.println("Font families: ");

  Font.getFamilies()

  .stream()

  .forEach( i -> System.out.println(i));

  System.out.println("Font names: ");

  Font.getFontNames()

  .stream()

  .forEach( i -> System.out.println(i));

  Group root = new Group();

  Scene scene = new Scene(root, 580, 250, Color.WHITE);

  // Serif with drop shadow

  Text text2 = new Text(50, 50, "JavaFX 9 by Example");

  Font serif = Font.font("Serif", 30);

  text2.setFont(serif);

  text2.setFill(Color.RED);

  DropShadow dropShadow = new DropShadow();

  dropShadow.setOffsetX(2.0f);

  dropShadow.setOffsetY(2.0f);

  dropShadow.setColor(Color.rgb(50, 50, 50, .588));

  text2.setEffect(dropShadow);

  root.getChildren().add(text2);

  // SanSerif

  Text text3 = new Text(50, 100, "JavaFX 9 by Example");

  Font sanSerif = Font.font("SanSerif", 30);

  text3.setFont(sanSerif);

  text3.setFill(Color.BLUE);

  root.getChildren().add(text3);

  // Dialog

  Text text4 = new Text(50, 150, "JavaFX 9 by Example");

  Font dialogFont = Font.font("Dialog", 30);

  text4.setFont(dialogFont);

  text4.setFill(Color.rgb(0, 255, 0));

  root.getChildren().add(text4);

  // Monospaced

  Text text5 = new Text(50, 200, "JavaFX 9 by Example");

  Font monoFont = Font.font("Monospaced", 30);

  text5.setFont(monoFont);

  text5.setFill(Color.BLACK);

  root.getChildren().add(text5);

  // Reflection

  Reflection refl = new Reflection();

  refl.setFraction(0.8f);

  refl.setTopOffset(5);

  text5.setEffect(refl);

  primaryStage.setScene(scene);

  primaryStage.show();

  }

  清单 3-5.

  ChangingTextFonts.java

  ```


  注意


  清单 3-5 `ChangingTextFonts.java` 仅展示了 `start()` 方法，这是示例应用程序的核心。要查看完整的代码清单，请从 `Apress.com`
  下载本书的完整示例代码。


  对于 `Text` 节点，JavaFX 采用保留模式方法，其中节点使用基于矢量的图形渲染，而不是立即模式渲染。立即模式使用位图图形渲染策略。通过使用基于矢量的图形，您将拥有比位图图形更显著的优势。主要优势在于，它们允许您缩放形状并应用不同的效果，而不会出现像素化（锯齿状边缘）。例如，在立即模式渲染中，图像在放大时会变得颗粒化。然而，在保留模式下，您将获得平滑（抗锯齿）的形状。能够看到所有不同尺寸下都平滑美观的字体（排版）真是太好了。


  `ChangingTextFonts.java` 重点介绍了以下要应用于 `Text` 节点的 JavaFX 类。该代码使用了 Serif、SanSerif、Dialog
  和 Monospaced 字体，以及投影和反射效果。


  *   `javafx.scene.text.Font`

  *   `javafx.scene.effect.DropShadow`

  *   `javafx.scene.effect.Reflection`


  代码首先在舞台上设置标题。接下来，您会注意到新的 Java 8 语言 lambda 特性正在发挥作用，代码列出了当前系统可用的字体族和字体名称。如果您不熟悉 lambda，在第
  4 章中您将更深入地了解这个概念，但现在您可以将其视为一种优雅的迭代集合的方式。字体族和字体名称列表将打印在控制台输出中。这对于您稍后尝试不同的字体样式非常方便。以下几行使用
  Java 8 的 lambda 语法列出了当前系统上可用的字体：


  ```

  System.out.println("Font families: ");

  Font.getFamilies()

  .stream()

  .forEach( i -> System.out.println(i));

  System.out.println("Font names: ");

  Font.getFontNames()

  .stream()

  .forEach( i -> System.out.println(i));

  ```


  注意


  如果所选字体未安装在您的系统上，`Text` 节点将使用默认的系统字体。有许多网站提供可供您下载和安装的字体。请查看 Google Fonts：[`https://www.google.com/fonts`](https://www.google.com/fonts)。


  列出可用字体后，代码会创建一个根节点，并为其场景设置背景颜色。在绘制第一个 `Text` 节点之前，让我们快速讨论一下如何获取字体。为了获取字体，代码调用了 `Font`
  类中的静态方法 `font()`。调用 `font()` 方法时，您可以指定字体名称和磅值，以向调用者返回合适的字体。字体名称是一个字符串值，表示系统支持的字体类型。请参阅
  Javadoc 文档以了解获取系统字体的其他方法。以下几行展示了创建 `Text` 节点实例并获取 30 磅 Serif 字体的过程。获取字体后，使用 `Text`
  节点的 `setFont()` 方法来应用该字体。


  ```

  Text text = new Text(50, 50, "JavaFX 9 by Example");

  Font serif = Font.font("Serif", 30);

  text.setFont(serif);

  ```


  注意


  尽管清单 2-5 使用了文本节点的绝对定位，但有时您可能希望显示文本节点，并能够在同一布局中换行显示多个文本节点，同时保持它们各自的字体格式。要实现此行为，请参考
  JavaFX 8 的新 `TextFlow` API。请参阅以下网址的 Javadoc 文档：[`https://docs.oracle.com/javase/8/javafx/api/javafx/scene/text/TextFlow.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/text/TextFlow.html)




  ### 应用文本效果


  在 `ChangingTextFonts.java` 示例的第一个 `Text` 节点中，代码添加了投影效果。添加投影的一种常见图形技巧是创建至少两层图像，底层图像颜色较深并带有轻微偏移。这种颜色较深且略微偏移的图像会模拟出阴影效果。在
  JavaFX 中，投影是一个实际的效果（`DropShadow`）对象，它被应用于单个 `Text` 节点实例，无需多层图像叠加。`DropShadow` 对象的位置基于相对于
  `Text` 节点的 x、y 偏移量来设置。你还可以设置阴影的颜色；此处，代码将阴影颜色设置为灰色，不透明度为 0.588。不透明度的取值范围是 0 到 1（`double`
  类型），其中 0 表示完全透明，1 表示完全不透明。以下是一个为 `Text` 节点的效果属性设置投影效果（`DropShadow`）的示例：


  ```

  DropShadow dropShadow = new DropShadow();

  dropShadow.setOffsetX(2.0f);

  dropShadow.setOffsetY(2.0f);

  dropShadow.setColor(Color.rgb(50, 50, 50, .588));

  text2.setEffect(dropShadow);

  ```


  虽然这个示例是关于设置文本字体的，但它也演示了如何将投影效果应用于 `Text` 节点。`ChangingTextFonts.java` 示例还包含了另一种效果（算是锦上添花）。在使用等宽字体创建最后一个
  `Text` 节点时，我应用了流行的倒影效果。调用 `setFraction()` 方法并传入 `0.8f`，本质上是指定要显示 80% 的倒影。倒影的数值范围从零（0%）到一（100%）。除了要显示的比例，还可以设置倒影的间隙或顶部偏移量。换句话说，不透明节点部分与倒影部分之间的间距是通过
  `setTopOffset()` 方法调整的。顶部偏移量默认为零。以下代码片段实现了一个比例为 80%（浮点值 0.8f）、顶部偏移量为五个像素的倒影效果：


  ```

  Reflection refl = new Reflection();

  refl.setFraction(0.8f);

  refl.setTopOffset(5);

  text5.setEffect(refl);

  ```


  ## 总结


  在本章中，你学习了在 JavaFX 场景图上绘制 2D 形状的基础知识。你深入了解了笛卡尔坐标系与屏幕坐标系之间的差异。这进一步加深了你对如何在 JavaFX
  场景图上绘制形状节点的理解。第一个示例是使用 JavaFX `Line` 类绘制的基本形状——线条。在此，你深入探讨了父类（`Shape`）的常见属性。讨论的一些常见属性包括设置形状的描边宽度、描边颜色和虚线模式。接下来，你通过绘制有趣的卡通风格图像，探索了简单、复杂和自定义形状。创建形状后，你学习了如何使用颜色为它们着色。你不仅使用了标准的
  RGB 颜色，还使用了各种内置技术，例如线性渐变（`LinearGradient`）和径向渐变（`RadialGradient`）着色。最后，你使用了 JavaFX
  的 `Text` 节点。通过使用 `Text` 节点，你能够获取可用的系统字体，并应用诸如投影（[`DropShadow`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/effect/DropShadow.html)）和倒影（`Reflection`）之类的效果。


  在最后一个详细说明更改文本字体的示例中，你学习了如何使用 Java 8 新的流 API 和 lambda 表达式来遍历系统字体列表。在第 4 章中，你将了解 Java
  8 的 lambda、流和属性。


  '
- "# 4. Lambda 与属性\n\n在本章中，你将了解 Java 8 中引入的新语言特性，称为 lambda 表达式，或简称为 lambda。本章还涵盖了\
  \ JavaFX 属性和绑定 API。本章的目标是演示如何在 JavaFX GUI 应用程序的上下文中使用 lambda 和属性。话虽如此，我主要集中讨论本书大多数示例中使用的常见特性，而不会详细说明每一个\
  \ lambda 和属性特性。\n\n为了更好地了解 Java 的 lambda 路线图，请参阅 Oracle Java 语言架构师 Brian Goetz 撰写的以下文章：\n\
  \n[`http://cr.openjdk.java.net/~briangoetz/lambda/lambda-state-final.html`](http://cr.openjdk.java.net/%7Ebriangoetz/lambda/lambda-state-final.html)\n\
  \nlambda 这个术语源于数学中所谓的 lambda 演算。该领域的一般概念被用来推导出已添加到 Java 中的特定行为，这些行为将在本章中描述。图 4-1\
  \ 显示了希腊字母 lambda，你有时会看到它与该主题相关联。\n\n![A323804_3_En_4_Fig1_HTML.jpg](img/A323804_3_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1.\n\nlambda 的希腊符号\n\n## Lambda\n\nJava Lambda 基于 JSR（Java 规范请求）335，即“Java™\
  \ 编程语言的 Lambda 表达式”。该特性恰如其分地以 lambda 演算命名，lambda 演算是数学逻辑和计算机科学中用于表达计算的形式系统。JSR 335，更广为人知的名称为\
  \ Project Lambda，包含了许多特性，例如在流上表达并行计算（Stream API）。\n\nlambda 的一个主要目标是帮助解决 Java 语言中缺乏良好方式来表达函数式编程概念的问题。支持函数式编程概念的语言能够创建匿名（未命名）函数，类似于在\
  \ Java 中创建对象而非方法。这些函数对象通常被称为闭包。一些支持闭包或 lambda 的常见语言包括 Common Lisp、Clojure、Erlang、Haskell、Scheme、Scala、Groovy、Python、Ruby\
  \ 和 JavaScript。\n\n主要思想是，支持函数式编程的语言会使用类似闭包的语法。在 Java 8 中，你可以将匿名函数作为一等公民来创建。换句话说，函数或闭包可以像对象一样被对待，因此它们可以被赋值给变量并传递给其他函数。为了在之前的\
  \ Java 世界（Java 1.1 到 Java 7）中模拟闭包，你通常会使用匿名内部类来将函数（行为）封装为对象。清单 4-1 展示了一个匿名内部类的示例，该示例为\
  \ JavaFX 按钮按下时定义了处理程序代码（在 Java 8 之前）。\n\n```\nButton btn = new Button();\nbtn.setOnAction(new\
  \ EventHandler() {\npublic void handle(ActionEvent event) {\nSystem.out.println(\"\
  Hello World\");\n} });\n清单 4-1.\n使用匿名内部类设置按钮的 OnAction\n```\n\n你会注意到，仅仅为了连接一个按钮，这段代码看起来非常冗长。在匿名内部类的深处，只有一行输出文本的代码。能够用包含所需行为的代码块来表达，而无需这么多样板代码，岂不是很好？不用再找了。Java\
  \ 8 通过使用 lambda 表达式（闭包）解决了这个问题。为了了解它在 Java 8 lambda 表达式中的样子，让我们重写按钮处理程序代码。清单 4-2\
  \ 是将按钮的 `EventHandler` 代码重写为 Java 8 lambda 表达式。\n\n```\nbtn.setOnAction(event ->\
  \ System.out.println(\"Hello World\") );\n清单 4-2.\n使用 Lambda 表达式设置按钮的 OnAction\n\
  ```\n\n使用 lambda 表达式不仅使代码简洁易读，而且代码的性能也可能更好。实际上，在底层，编译器能够优化代码，并且很可能能够减少其占用空间。\n\n\
  ### Lambda 表达式\n\n如前所述，lambda 表达式是 Java 8 版本的闭包。与其他语言在语法上创建闭包的方式相同，你也将能够引用它们并将它们传递给其他方法。为了实现这种能力，你稍后将学习函数式接口。但现在，让我们先看看\
  \ lambda 表达式的基本语法。\n\n\n\n#### 语法\n\n指定 Lambda 表达式有两种方式。以下简单示例说明了其通用形式：\n\n```\n\
  (param1, param2, ...) -> expression;\n(param1, param2, ...) -> {  /* code statements\
  \ */ };\n```\n\nLambda 表达式以括号包围的参数列表开头，后跟箭头符号 `->`（一个连字符和一个大于号）以及表达式体。与 Java 方法类似，括号用于传入表达式中的参数。仅当只定义一个参数时，外围括号才是可选的。当表达式不接受参数（即空参数列表）时，括号仍然是必需的。\n\
  \n箭头符号用于分隔参数列表和表达式体。表达式体或代码块可以用花括号包围，也可以不用。当表达式体没有外围花括号时，它必须只包含一条语句。当表达式为单行语句时，它会被求值并隐式返回给调用者。只需记住，如果方法需要返回类型，并且你的代码块使用了花括号，则必须包含\
  \ `return` 语句。清单 4-3 展示了两个等价的 Lambda 表达式，一个带花括号，一个不带。\n\n```\n// 显式返回结果\nFunction\
  \ func = x -> { return x * x; }\n// 求值并隐式返回结果\nFunction func = x -> x * x;\ndouble\
  \ y = func(2.0); // x = 4.0\n清单 4-3.\n一条语句显式返回，另一条隐式返回\n```\n\n另需注意的一点是，参数可以选择性地指定类型。编译器会根据上下文推断参数的类型。在清单\
  \ 4-3 中，有一个类型为 `java.util.function.Function<T, U>` 的函数式接口，其中 `T` 类型被转换为 `U` 类型。你会注意到参数\
  \ `x` 没有指定 `Double` 类型。这是因为 Java 8 编译器会根据函数式接口的定义来推断类型。\n\n让我们看一个将 Lambda 表达式传递给方法的示例。一个简单的例子是使用\
  \ `setOnAction()` 方法设置 JavaFX 按钮。如前所述，编译器可以通过匹配方法的参数类型（其签名）和返回类型来推断 Lambda 参数。有时为了可读性，你可以选择性地指定每个参数的类型。如果指定了类型，则必须用括号将参数列表括起来。以下代码行为\
  \ JavaFX 按钮的 `setOnAction()` 方法中的 Lambda 表达式指定了参数类型（`ActionEvent`）。\n\n```\nbtn.setOnAction(\
  \ (ActionEvent event) -> System.out.println(\"Hello World\") );\n```\n\n你还会注意到，对于方法内部（例如\
  \ `setOnAction()` 方法）的单行语句，省略分号也是可以的。最后一点语法糖是，如果 Lambda 只传入一个参数，则可以省略括号。以下是一个带有一个参数（`event`）且没有括号的\
  \ Lambda 表达式。\n\n```\nbtn.setOnAction( event -> System.out.println(\"Hello World\"\
  ) );\n```\n\n作为对刚刚讨论的语法变体的总结，清单 4-4 中的语句都是等价的 Lambda 表达式。\n\n```\nbtn.setOnAction(\
  \ (ActionEvent event) -> {System.out.println(event); } );\nbtn.setOnAction( (event)\
  \ -> System.out.println(event) );\nbtn.setOnAction( event -> System.out.println(event)\
  \ );\n清单 4-4.\n为 JavaFX 按钮设置操作代码的三个语法等价的 Lambda 表达式\n```\n\n#### 方法引用\n\n清单 4-4\
  \ 展示了为 JavaFX 按钮的 `ActionEvent` 表达 Lambda 表达式的三种方式，但你知道还有第四种方式吗？\n\n在使用 Lambda 时，经常会有方法接受单个参数作为输入，或返回单个值。这非常冗余，因此\
  \ Java 8 引入了方法引用的概念。方法引用本质上是一种语法糖，它允许你以更简洁的方式调用方法，从而使代码更易于阅读。例如，以下是一个使用方法引用的 Lambda\
  \ 表达式：\n\n```\nbtn.setOnAction(System.out::println);\n```\n\n这段代码设置了按钮的操作，你会注意到它是一个简洁的版本，其行为与清单\
  \ 4-4 相同。区别在于，Lambda 中没有 `ActionEvent` 的输入参数，并且在 `System.out` 和 `println` 方法之间有一个不寻常的双冒号。双冒号被称为作用域运算符，它通过名称引用方法。你还会注意到\
  \ `println` 方法的括号被省略了。如果你还记得，每当 Lambda 表达式接受单个参数作为输入时，该参数会隐式传递给接受单个输入的 `println`\
  \ 方法。当然，两者的类型必须相同。示例中的事件对象会隐式调用 `toString()` 来向 `println` 方法传递一个 `String`。\n\n本书范围之外还有其他方法引用类型。请参阅\
  \ Javadoc 文档了解其他用例场景。查看以下关于方法引用的教程：\n\n[`https://docs.oracle.com/javase/tutorial/java/javaOO/methodreferences.html`](https://docs.oracle.com/javase/tutorial/java/javaOO/methodreferences.html)\n\
  \n\n\n#### 变量捕获\n\n在函数式编程语言中，通常可以通过闭包（lambda 表达式）来使用闭包作用域之外的变量。这些变量通常被称为非局部变量或捕获变量，因为它们并非\
  \ lambda 表达式或方法的局部作用域变量。当这些非局部变量在 lambda 表达式中使用时，它们必须是不可变的。这是函数式编程领域的一个关键原则。Java\
  \ 8 编译器新增了一项能力，即可以引用匿名内部类或 lambda 表达式作用域之外的变量。\n\n使用 lambda 表达式时，你可以选择引用闭包函数作用域之外的变量。通常，在\
  \ Java 8 之前，这些非局部变量必须是 `final`（不可变）的。这种不可变状态使编译器能够更好地预测程序行为，从而优化代码。在 Java Swing\
  \ 开发中，当需要在匿名内部类方法（局部变量作用域）内部使用外部作用域的变量时，这种情况经常发生。为了遵守编译器规则，你必须将变量声明为 `final`。\n\n\
  Java 8 编译器具备一项新能力，可以推断传递给匿名内部类方法和 lambda 表达式的非局部变量的意图，并将其转换为 `final`（不可变）。要了解旧式\
  \ Java Swing 开发者（Java 8 之前）是如何遇到编译时错误的，请看代码清单 4-5。场景是一个按钮，在按下按钮后会修改 Swing `JLabel`\
  \ 组件的文本。在 Java 8 之前，这段代码无法正确编译，因为 `label` 变量需要被声明为 `final`。\n\n```\n// Java 8 之前\n\
  // label 变量是 actionPerformed() 的非局部变量\nJLabel label = new JLabel(\"Press Me\");\n\
  btn.addActionListener(new ActionListener() {\npublic void actionPerformed(ActionEvent\
  \ e) {\nlabel.setText(\"Pressed\"); /* !编译错误！变量 label 必须是 final 的。 */\n} });\n代码清单\
  \ 4-5.\n在 JDK 8 之前会产生编译器错误的代码\n```\n\nJava 8 新增了将非局部变量转换为 final 的能力。在代码清单 4-6 中，你会注意到除了注释之外，代码是完全相同的。从\
  \ Java 8 开始，你现在可以在匿名内部类和 lambda 表达式中使用变量捕获功能。\n\n```\n// Java 8 新增\n// label 变量是\
  \ actionPerformed() 的非局部变量\nJLabel label = new JLabel(\"Press Me\");\n// 编译器隐式地将\
  \ label 转换为 final（不可变）变量\nbtn.addActionListener(new ActionListener() {\npublic void\
  \ actionPerformed(ActionEvent e) {\nlabel.setText(\"Pressed\"); /* 合法。变量 label 已被转换为\
  \ final */\n} });\n代码清单 4-6.\n在 JDK 8 中成功编译的代码\n```\n\n代码清单 4-6 中展示的两个代码示例是相同的。区别在于使用\
  \ JDK 8 或更高版本的编译器时。当使用 Java 8 编译器时，捕获变量将隐式地变为 final（不可变引用），并且这不会触发任何编译错误。\n\n##\
  \ 函数式接口\n\n云计算的出现帮助许多函数式编程语言重新焕发了活力。很明显，在处理极其庞大的数据集时，解决问题的方式发生了范式转变。应用函数式编程技术的一个典型用例是，能够以分布式方式遍历数据集并执行计算，从而将负载分摊到多个节点或\
  \ CPU 核心上。相比之下，命令式编程语言则是先收集数据，然后将其传递到一个紧凑的 `for` 循环中进行处理。由于数据和代码的耦合方式，这给单个线程（核心）处理如此大量的数据带来了很大负担。问题需要被分解，以允许其他线程（核心）参与计算，从而实现分布式处理。\n\
  \n函数式编程的优势之一在于能够以语法简洁的方式表达功能，但更重要的是能够将功能（lambda 表达式）传递给方法。能够将 lambda 表达式传递给方法通常促进了惰性求值这一概念。这种行为与函数回调行为（异步消息传递）相同，即调用被推迟（因此是“惰性的”）到稍后的时间点执行。与惰性求值相对的是急切求值。使用惰性求值通常可以通过避免不必要的计算来提高性能。\n\
  \n另一个需要讨论的重要主题是函数式接口如何在 Java 语言中用作闭包。Java 语言的设计者/架构师并没有将函数实现为 Java 中的一等类型，而是巧妙地定义了函数式接口作为闭包的概念。简单来说，函数式接口基本上就是一个单一抽象方法（SAM）。函数式接口的概念已经存在了很长时间。例如，那些使用过\
  \ Java 线程的人会记得 `Runnable` 接口，它有一个返回类型为 `void` 的单一 `run()` 方法。单一抽象方法模式是 Java 8 lambda\
  \ 表达式的一个组成部分。作为函数式接口的一个例子，我创建了一个名为 `MyEquation` 的接口，其中包含一个单一的抽象 `compute()` 方法。一旦创建，你就可以使用\
  \ lambda 表达式来声明和赋值变量。代码清单 4-7 是一个具有单一抽象 `compute()` 方法的函数式接口。\n\n```\n// 函数式接口\n\
  interface MyEquation {\ndouble compute(double val1, double val2);\n}\n代码清单 4-7.\n\
  一个声明的函数式接口，包含一个单一抽象方法 compute()\n```\n\n创建函数式接口后，你可以声明一个变量，并用 lambda 表达式为其赋值。代码清单\
  \ 4-8 演示了将 lambda 表达式赋值给函数式接口变量。\n\n```\nMyEquation area = (height, width) -> height\
  \ * width;\nMyEquation perimeter = (height, width) -> 2*height + 2*width;\nSystem.out.println(\"\
  Area = \" + area.compute(3, 4));\nSystem.out.println(\"Perimeter = \" + perimeter.compute(3,\
  \ 4));\n代码清单 4-8.\n函数式接口的两个变量，使用 lambda 表达式赋值\n```\n\n以下是代码清单 4-8 的输出：\n\n```\n\
  Area = 12.0\nPerimeter = 14.0\n```\n\n\n\n## 聚合操作\n\nJava 8 中 lambda 表达式的另一个强大用途是处理集合。Java\
  \ 8 引入了新的 Stream API（`java.util.stream.*`），它允许你处理来自给定源的元素。源可以是对数据结构（如集合或 IO 通道）的引用。根据\
  \ Oracle 关于 Stream API 的 Java 8 文档（Javadoc）所述，“流并非存储元素的数据结构；相反，它们通过计算操作的管道，从源（可以是数据结构、生成器、IO\
  \ 通道等）携带值。”\n\n管道是一系列操作（lambda 表达式/函数式接口），可以处理或查询流中的每个元素。此类操作允许你执行聚合任务。聚合操作类似于电子表格可以对一系列单元格执行某些计算的方式，例如格式化、求平均值或求和。要开始在集合上使用聚合操作，你首先需要在\
  \ `java.util.Collection` 接口上调用 `default stream()` 方法。稍后你将了解更多关于默认方法的内容，但现在所有集合（`Collection`）都有一个\
  \ `stream()` 方法，该方法返回一个 `java.util.stream.Stream` 实例。清单 4-9 是一段代码片段，它从源集合（`List<Integer>`）中获取元素流。\n\
  \n```\nList values = Arrays.asList(23, 84, 74, 85, 54, 60);\nStream stream = values.stream();\n\
  清单 4-9.\n通过从集合调用 stream() 方法获取的流\n```\n\n常见的内置聚合操作有 `filter`、`map` 和 `forEach`。`filter`\
  \ 允许你传入一个表达式来过滤元素，并返回一个包含所选项目的新 `Stream`。`map` 操作将每个元素转换（或映射）为另一种类型，并返回一个包含映射后类型项目的新\
  \ `Stream`。例如，你可能希望将流中的 `Integer` 值映射为 `String` 值。`forEach` 操作允许你传入一个 lambda 表达式来处理流中的每个元素。\n\
  \n一个运用这三种常见聚合操作的典型用例是：给定一个整数集合，过滤出大于某个阈值（一个非局部变量）的值，将过滤后的项目转换为十六进制值，并打印每个十六进制值。清单\
  \ 4-10 实现了该用例，它运用了各种聚合操作。\n\n```\n// 创建一个值列表\nList values = Arrays.asList(23, 84,\
  \ 74, 85, 54, 60);\nSystem.out.println(\"values: \" + values.toString());\n// 用于\
  \ lambda 表达式的非局部变量。\nint threshold = 54;\nSystem.out.println(\"大于 \" + threshold\
  \ + \" 的值转换为十六进制：\");\nStream stream = values.stream();\n// 使用聚合函数 filter() 和 forEach()\n\
  stream\n.filter(val -> val > threshold) /* 谓词函数式接口 */\n.sorted()\n.map(dec -> Integer.toHexString(dec).toUpperCase()\
  \ ) /* 消费者函数式接口 */\n.forEach(val -> System.out.println(val)); /* 每个输出值。 */\n清单 4-10.\n\
  在整数集合上使用聚合操作\n```\n\n以下是清单 4-10 的输出：\n\n```\nvalues: [23, 84, 74, 85, 54, 60]\n\
  大于 54 的值转换为十六进制：\n3C\n4A\n55\n```\n\n注意\n\n此输出是一个按升序排序的整数列表，显示十六进制值。对应的十进制值如下：3C=60，4A=74，54=84，55=85。\n\
  \n在清单 4-10 中，代码首先创建一个整数列表作为集合。接着，输出原始元素列表（未修改）。然后，代码声明一个用于 lambda 表达式的非局部变量，名为 `threshold`，将在过滤表达式中使用。接下来，你从\
  \ `values` 集合中获取一个流（通过 `stream()` 方法）来执行聚合操作。\n\n第一个操作是一个过滤器，它接收一个 lambda 表达式来过滤大于\
  \ 54 的元素（`val > threshold`）。下一个操作是 `sorted()` 方法，它对从过滤器方法流返回的元素进行排序。继续方法链，注意 map\
  \ 操作。`map()` 方法操作可以将流中的每个元素从一种数据类型映射到另一种数据类型。\n\n在此场景中，流元素是 `Integer` 对象，它们被映射为\
  \ `String` 对象。`map()` 方法返回另一个流，其中包含类型为 `Stream<String>` 的元素。在此示例中，字符串元素是十六进制值。最后，`forEach()`\
  \ 操作遍历字符串（十六进制）元素流中的每个元素并打印。请记住，`forEach()` 方法用于流的非并行处理。\n\n你会注意到，每次调用聚合函数时，返回类型都是\
  \ `Stream` 对象，这允许你以非常类似于构建器模式的方式进行方法链式操作。澄清一下，方法链式操作的概念实际上源于 API 设计的流畅接口模式。\n\n\
  虽然我只触及了 `Stream` API 的主要特性，但我没有提到并行性这个重要主题。并行性是将工作并发分发给 CPU 核心的能力，从而减少总体计算时间。现代台式机、智能手机、平板电脑和计算机通常具有多核。为了利用真正的并行处理，Java\
  \ 8 平台现在支持并行流。要并行执行操作，你可以简单地在集合上调用 `parallelStream()` 方法。由于项目可以并发操作，建议使用线程安全的集合。在清单\
  \ 4-11 中，整数列表将使用 `Collections.synchronizedList()` 方法进行包装。\n\n```\n/**\n* 聚合操作。\n\
  * @author cdea\n*/\npublic class AggregateOperations {\n/**\n* @param args 命令行参数\n\
  */\npublic static void main(String[] args) {\n// 创建一个值列表\nList values = Collections.synchronizedList(\n\
  Arrays.asList(23, 84, 74, 85, 54, 60));\nSystem.out.println(\"values: \" + values.toString());\n\
  // 用于 lambda 表达式的非局部变量。\nint threshold = 54;\nSystem.out.println(\"大于 \" + threshold\
  \ + \" 的值转换为十六进制：\");\njava.util.stream.Stream stream = values.parallelStream();\n\
  // 使用聚合函数 filter() 和 forEach()\nstream\n.filter(val -> val > threshold) /* 谓词函数式接口\
  \ */\n.sorted()\n.map(dec -> Integer.toHexString(dec).toUpperCase() ) /* 消费者函数式接口\
  \ */\n.forEachOrdered(System.out::println);\n}\n}\n清单 4-11.\n编写为支持并行流的聚合操作示例\n```\n\
  \n使集合同步后，代码通过调用 `parallelStream()` 方法将 `Stream` 引用作为并行流获取。在对并行流执行即时或聚合函数之后，调用的最后一个终端函数是\
  \ `forEachOrdered()` 方法。你会注意到，与 `forEach()` 方法不同，`forEachOrdered()` 方法将在并行处理完成时按顺序遍历每个项目。如果你使用\
  \ `forEach()` 方法，项目将无序。\n\n注意\n\n当使用并行流进行排序时，请使用终端函数 `forEachOrdered()` 而不是 `forEach()`。根据\
  \ Javadoc，它指出“如果流定义了遭遇顺序，则按流的遭遇顺序对该流的每个元素执行一个操作。”\n\n\n\n你是否知道，上述并行代码示例的运行速度可能比使用非并行流还要慢？这是因为示例中集合包含的元素太少。并行代码会为每个\
  \ CPU 核心创建新线程来处理计算任务。由于待处理元素数量极少，线程上下文切换和调度带来的开销，很可能比单线程循环遍历元素的方式更慢。\n\n现在，如果你拥有海量数据，并行流的性能将超越仅使用单核的单线程。根据经验法则，当数据集极其庞大时，应使用并行流；而当数据量非常小时，则应使用非并行流。通常，如果你有四个核心且数据项超过\
  \ 10 万条，就应使用并行流。\n\n## 默认方法\n\n默认方法是一种向 Java 接口添加默认实现方法的新方式。你可能会挠头并脱口而出：“Java 接口居然能有实现？！”是的，Java\
  \ 8 现在支持这一概念，称为虚拟扩展方法，更广为人知的名字是守护方法。默认方法的作用是在不破坏兼容性的前提下，向接口添加（扩展）新行为。默认方法并非抽象方法，而是包含实现（代码）的方法。\n\
  \n例如，向 Java 接口添加新的抽象方法会影响所有实现类。由于 Java 接口的严格契约，编译器会强制实现者实现抽象方法；但实现包含默认方法的接口的类，并不会强制开发者实现这些默认方法。相反，派生类将直接获得默认方法实现的行为。\n\
  \n### 示例：大小猫科动物\n\n可能不太明显，但之前用于聚合操作的`Collection`接口中的`stream()`方法并非抽象方法，而实际上是 Java\
  \ 8 的默认方法。清单 4-12 展示了 Java 8 源码中`java.util.Collection`接口的默认方法`stream()`。\n\n```\n\
  default Stream stream() {\nreturn StreamSupport.stream(spliterator, false);\n}\n\
  清单 4-12.\nJava 8 的 Collection 接口中的默认方法 stream()\n```\n\n在本例中，我创建了一个关于猫科动物（嗷呜，喵喵）的领域模型（包含类和接口）。猫的种类或物种可以轻松展示某些猫科动物具备而其他种类不具备的默认行为。例如，狮子、老虎和美洲豹等大型猫科动物能够咆哮；而小型猫科动物则会发出咕噜声。此外，家猫能够喵喵叫。为了进一步描述这些行为特征，请查看图\
  \ 4-2，这是一个展示猫科动物种类间默认行为的类图。\n\n![A323804_3_En_4_Fig2_HTML.jpg](img/A323804_3_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2.\n\n以 UML 类图表示的猫科动物领域模型\n\n观察`Tiger`和`Lion`类，你会发现它们都实现了`Roarable`和`Cat`接口。老虎和狮子通过`Roarable`接口中的`default\
  \ roar()`方法拥有相同的行为（能够咆哮）。请注意，`Roarable`接口没有任何抽象方法，只有一个默认方法`roar()`，`Lion`和`Tiger`无需实现即可获得该方法。\n\
  \n相比之下，如果`Roarable`接口将`roar()`设为抽象方法（纯虚函数），则必须在`Tiger`和`Lion`的具体类中分别实现`roar()`。由于两个地方具有相同的功能，日后可能会成为维护的噩梦。这就是为什么默认方法允许你在不修改派生类的情况下添加行为。\n\
