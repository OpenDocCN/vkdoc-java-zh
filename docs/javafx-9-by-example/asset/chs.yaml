  在学习了音频媒体之后，您又学习了视频。您了解了当前支持的媒体格式，如 MPEG-4 和 FLV。然后您看到了一个基本的 JavaFX 视频播放器应用程序示例。在此过程中，您发现播放视频与播放音频基本相同，区别仅在于使用了能够显示视频的
  `MediaView` 节点。最后，您接触了一个关于媒体标记事件（`MediaMarkerEvent`）的简短示例，用于模拟隐藏式字幕视频。


