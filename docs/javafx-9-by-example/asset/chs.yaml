  运行 OrientationFX 项目\n```\n\n如果一切就绪，并且你已经插入了 Arduino 101 开发板，那么你应该能够握住它并挥动它，得到类似图\
  \ 12-22 所示的效果。\n\n![A323804_3_En_12_Fig22_HTML.jpg](img/A323804_3_En_12_Fig22_HTML.jpg)\n\
  \n图 12-22.\n\n运行 OrientationFX 示例\n\n\n\n### 工作原理\n\n当应用程序启动时，它会创建一个 `ArduinoChart`\
  \ 实例。\n\n```\n@Override\npublic void start(Stage primaryStage) throws Exception\
  \ {\narduinoChart = new ArduinoChart();\n```\n\n在 `arduinoChart` 类内部包含一个 `LineChart`，它有三个序列，每个序列接收成对的数值以绘制到各个坐标轴上，这些坐标轴是\
  \ `NumberAxis` 实例。这些序列定义了若干限制：每个序列的最大数据点数为 300：\n\n```\nprivate static final int\
  \ SIZE_MAX = 300;\nprivate LineChart chart;\nprivate Series rollSeries, pitchSeries,\
  \ yawSeries;\nprivate NumberAxis xAxis, yAxis;\n```\n\n然后，通过创建两个坐标轴来构建图表。为了让 `xAxis`\
  \ 显示格式化后的数据，本示例重写了 `toString()` 方法，使得每个以毫秒为单位的长整型数值都会以 `HH:mm:ss` 格式显示：\n\n```\n\
  public VBox createArduinoChart() {\nxAxis = new NumberAxis();\nxAxis.setLabel(\"\
  时间\");\nxAxis.setAutoRanging(true);\nxAxis.setForceZeroInRange(false);\nxAxis.setTickLabelFormatter(new\
  \ StringConverter() {\n@Override\npublic String toString(Number t) {\nreturn new\
  \ SimpleDateFormat(\"HH:mm:ss\")\n.format(new Date(t.longValue()));\n}\n@Override\n\
  public Number fromString(String string) {\nthrow new UnsupportedOperationException(\"\
  暂不支持。\");\n}\n});\nyAxis = new NumberAxis();\nyAxis.setLabel(\"角度 (º)\");\n```\n\
  \n接着，通过指定坐标轴来创建图表。它设置了一些属性：`setCreateSymbols(true)` 会在序列的每个数据点上绘制一个大的白色圆圈。你可以通过\
  \ CSS 调整默认大小和颜色。`setAnimated(false)` 避免了在添加新数据点后图表的动画效果。由于你以高频率绘制数据点，这样设置效果更好。而对于较低频率，则应将其设置为\
  \ `true` 以创建平滑的过渡效果。`setLegendVisible(true)` 会显示带有序列名称的图例：\n\n```\nchart = new LineChart(xAxis,\
  \ yAxis);\nchart.setCreateSymbols(true);\nchart.setAnimated(false);\nchart.setLegendVisible(true);\n\
  chart.setTitle(\"横滚角/俯仰角/偏航角\");\n```\n\n然后，创建三个序列，为它们设置名称（这些名称将显示在图例框中），并将它们添加到\
  \ `Data` 图表中，该图表是一个 `Series` 的 `ObservableList`：\n\n```\nrollSeries = new Series();\n\
  rollSeries.setName(\"横滚角 (º)\");\npitchSeries = new Series();\npitchSeries.setName(\"\
  俯仰角 (º)\");\nyawSeries = new Series();\nyawSeries.setName(\"偏航角 (º)\");\nchart.getData().addAll(rollSeries,\
  \ pitchSeries, yawSeries);\n```\n\n最后，将图表添加到一个 `VBox` 中，同时还有一个包含即时数值标签的 `HBox`：\n\
  \n```\nlabelRoll = new Label();\nlabelPitch = new Label();\nlabelYaw = new Label();\n\
  final HBox hBox = new HBox(new Label(\"数值: \"), labelRoll, labelPitch, labelYaw);\n\
  hBox.getStyleClass().add(\"box\");\nfinal VBox vBox = new VBox(chart, hBox);\nvBox.getStyleClass().add(\"\
  box\");\nreturn vBox;\n}\n```\n\n回到应用程序类，将创建一个 `listener`，用于将串口上出现新行（对应来自 Arduino\
  \ 101 的方向角度读数）与将这些值作为新数据对添加到序列中的操作绑定起来。为此，你将 x 坐标值设置为添加读数时的时间（以毫秒为单位，在图表上会格式化为 `HH:mm:ss`），y\
  \ 坐标值则是 `String nv` 中 Arduino 报告的任一角度测量值的双精度浮点数。你需要将字符串解析为双精度浮点数。对于偏航角，你允许通过 `TextField`\
  \ 添加一个偏移值，因为校准后，该角度并不总是重置为 0°。另外，请注意俯仰角和横滚角前的负号：这是由于 Arduino 和 JavaFX 之间坐标系变化导致的。\n\
  \n```\nprivate final ChangeListener listener = (obs, ov, nv) -> {\nString[] split\
  \ = nv.split(\"\\\\s\");\nlong time = Long.parseLong(split[0]);\ndouble offset =\
  \ OFFSET_YAW;\nif (!textYaw.getText().isEmpty()) {\ntry {\noffset = Double.parseDouble(textYaw.getText());\n\
  } catch (NumberFormatException nfe) { }\n}\ndouble yaw = Double.parseDouble(split[1])\
  \ + offset;\ndouble pitch = - Double.parseDouble(split[2]);\ndouble roll = - Double.parseDouble(split[3]);\n\
  ```\n\n通过使用 `Platform.runlater()`，你可以将数值传递给 `ArduinoChart`，以便在图表中渲染它们。这是强制性的，因为\
  \ `Serial` 任务在 JavaFX 线程之外运行。使用 `Platform.runlater()` 不仅可以将用传入数据填充序列的任务放入 JavaFX\
  \ 线程，还能给场景图提供渲染图表所需的时间。如果速率过高，某些角度可能无法被处理。\n\n```\nPlatform.runLater(() -> {\narduinoChart.processEvent(time,\
  \ roll, pitch, yaw);\n});\n};\n```\n\n由于序列数据可能无限增长，为避免内存问题，你设置了 `SIZE_MAX` 值为 300\
  \ 个数据点，并在超出该限制时移除序列中的第一个数据点。\n\n```\npublic void processEvent(long time, double\
  \ roll, double pitch, double yaw) {\nrollSeries.getData().add(new Data(time, roll));\n\
  labelRoll.setText(\"横滚角: \" + String.format(\"%3.2f º\", roll));\nif (rollSeries.getData().size()\
  \ > SIZE_MAX) {\nrollSeries.getData().remove(0);\n}\npitchSeries.getData().add(new\
  \ Data(time, pitch));\nlabelPitch.setText(\"俯仰角: \" + String.format(\"%3.2f º\"\
  , pitch));\nif (pitchSeries.getData().size() > SIZE_MAX) {\npitchSeries.getData().remove(0);\n\
  }\nyawSeries.getData().add(new Data(time, yaw));\nlabelYaw.setText(\"偏航角: \" + String.format(\"\
  %3.2f º\", yaw));\nif (yawSeries.getData().size() > SIZE_MAX) {\nyawSeries.getData().remove(0);\n\
  }\n}\n```\n\n图表准备好后，你创建场景，将其添加到舞台，最后显示出来。该示例创建了一个 `BorderPane`，因此在中央区域添加图表，在底部添加一个标签以显示连接状态（包括端口名称）。注意对根面板的样式设置。\n\
  \n```\nBorderPane root = new BorderPane();\nfinal VBox chartBox = arduinoChart.createArduinoChart();\n\
  chartBox.setPrefWidth(500);\nHBox center = new HBox(chartBox); //, arduino3D.createArduino3D());\n\
  center.getStyleClass().add(\"box\");\ncenter.setPrefHeight(500);\nroot.setCenter(center);\n\
  Scene scene = new Scene(root, 600, 600);\nscene.getStylesheets().add(OrientationFX\n\
  .class.getResource(\"arduino.css\").toExternalForm());\nprimaryStage.setTitle(\"\
  OrientationFX\");\nprimaryStage.setScene(scene);\nprimaryStage.show();\n```\n\n\
  最后，添加两个按钮用于启动和停止串口任务，以及一个用于修改偏航角偏移量的 `textfield`：\n\n```\nButton buttonStart = new\
  \ Button();\nbuttonStart.setText(\"启动\");\nbuttonStart.setOnAction(e -> startSerial());\n\
  Button buttonStop = new Button();\nbuttonStop.setText(\"停止\");\nbuttonStop.setOnAction(e\
  \ -> stopSerial());\ntextYaw = new TextField(\"\" + OFFSET_YAW);\nHBox top = new\
  \ HBox(buttonStart, buttonStop, new Label(\"偏航角偏移 (º): \"), textYaw);\ntop.getStyleClass().add(\"\
  box\");\nroot.setTop(top);\n```\n\n在 `startSerial` 方法中，你可以尝试打开串口并开始读取数据。监听器将被添加到\
  \ `serial.getLine()`，并且在这种情况下 `connection` 将被设置为 `true`：\n\n```\nprivate void startSerial(){\n\
  if (serial == null) {\nserial = new Serial();\n}\nserial.getLine().addListener(listener);\n\
  serial.connect();\nconnection.set(!serial.getPortName().isEmpty());\n}\n```\n\n\
  每当应用程序关闭时，必须移除 `listener` 并调用 `serial.disconnect()` 方法，以正确关闭串口连接（参见清单 12-5）。\n\n\
  ```\nprivate void stopSerial(){\nif (serial != null) {\nserial.disconnect();\nserial.getLine().removeListener(listener);\n\
  connection.set(false);\nserial = null;\n}\n}\n```\n\n\n\n### 添加更多功能\n\n如果你已经走到这一步，并且示例运行正常，那么你可能会想通过一项新的额外功能来继续升级应用程序。如果能以某种方式渲染一个\
  \ JavaFX 3D Arduino 板，并根据来自真实 Arduino 的方向角度来旋转它，那就太好了。\n\n清单 12-11 包含了 `Arduino3D`\
  \ 类的源代码，该类使用几个 JavaFX 3D `Box` 节点模拟了一个非常简单的 3D 板。\n\n```\npublic class Arduino3D\
  \ {\nprivate static final int SIZE = 5;\nprivate Affine affine;\nprivate final List\
  \ averageRoll = new ArrayList();\nprivate final List averagePitch = new ArrayList();\n\
  private final List averageYaw = new ArrayList();\npublic VBox createArduino3D()\
  \ {\nBox board = new Box(300, 10, 200);\nboard.setMaterial(new PhongMaterial(Color.web(\"\
  #008282\")));\nBox longHeader = new Box(210, 40, 10);\nlongHeader.setMaterial(new\
  \ PhongMaterial(Color.web(\"#505050\")));\nlongHeader.getTransforms().add(new Translate(40,\
  \ -20, 90));\nBox shortHeader = new Box(170, 40, 10);\nshortHeader.setMaterial(new\
  \ PhongMaterial(Color.web(\"#505050\")));\nshortHeader.getTransforms().add(new Translate(60,\
  \ -20, -90));\nGroup arduino = new Group(board, longHeader, shortHeader);\naffine\
  \ = new Affine();\narduino.getTransforms().add(affine);\nSubScene subScene = new\
  \ SubScene(new Group(arduino), 400, 400,\ntrue, SceneAntialiasing.BALANCED);\nPerspectiveCamera\
  \ camera = new PerspectiveCamera();\ncamera.setTranslateX(-200);\ncamera.setTranslateY(-200);\n\
  camera.setTranslateZ(-50);\nsubScene.setCamera(camera);\nVBox vBox = new VBox(new\
  \ Label(\"3D Rendering\"), subScene);\nvBox.getStyleClass().add(\"box\");\nreturn\
  \ vBox;\n}\npublic void processEvent(double roll, double pitch, double yaw) {\n\
  double avYaw = average(averageYaw, Math.toRadians(yaw));\ndouble avPitch = average(averagePitch,\
  \ Math.toRadians(pitch));\ndouble avRoll = average(averageRoll, Math.toRadians(roll));\n\
  matrixRotateNode(avRoll, avPitch, avYaw);\n}\nprivate void matrixRotateNode(double\
  \ roll, double pitch, double yaw) {\ndouble mxx = Math.cos(pitch) * Math.cos(yaw);\n\
  double mxy = Math.cos(roll) * Math.sin(pitch) +\nMath.cos(pitch) * Math.sin(roll)\
  \ * Math.sin(yaw);\ndouble mxz = Math.sin(pitch) * Math.sin(roll) -\nMath.cos(pitch)\
  \ * Math.cos(roll) * Math.sin(yaw);\ndouble myx = -Math.cos(yaw) * Math.sin(pitch);\n\
  double myy = Math.cos(pitch) * Math.cos(roll) -\nMath.sin(pitch) * Math.sin(roll)\
  \ * Math.sin(yaw);\ndouble myz = Math.cos(pitch) * Math.sin(roll) +\nMath.cos(roll)\
  \ * Math.sin(pitch) * Math.sin(yaw);\ndouble mzx = Math.sin(yaw);\ndouble mzy =\
  \ -Math.cos(yaw) * Math.sin(roll);\ndouble mzz = Math.cos(roll) * Math.cos(yaw);\n\
  affine.setToTransform(mxx, mxy, mxz, 0,\nmyx, myy, myz, 0,\nmzx, mzy, mzz, 0);\n\
  }\nprivate double average(List list, double value) {\nwhile (list.size() > SIZE)\
  \ {\nlist.remove(0);\n}\nlist.add(value);\nreturn list.stream()\n.collect(Collectors.averagingDouble(d\
  \ -> d));\n}\n}\n清单 12-11.\nArduino3D 类\n```\n\n清单 12-12 包含了你需要对 `OrientationFX`\
  \ 类进行的修改，以包含一个 `Arduino3D` 类的实例并渲染子场景，同时从串行任务发送事件并旋转 3D 板。\n\n```\npublic class\
  \ OrientationFX extends Application {\nprivate Arduino3D arduino3D;\nprivate final\
  \ ChangeListener listener = (obs, ov, nv) -> {\nPlatform.runLater(() -> {\narduinoChart.processEvent(time,\
  \ roll, pitch, yaw);\narduino3D.processEvent(roll, pitch, yaw);\n});\n};\n@Override\n\
  public void start(Stage primaryStage) throws Exception {\narduinoChart = new ArduinoChart();\n\
  arduino3D = new Arduino3D();\nBorderPane root = new BorderPane();\nHBox center =\
  \ new HBox(chartBox, arduino3D.createArduino3D());\nroot.setCenter(center);\nScene\
  \ scene = new Scene(root, 600, 600);\nprimaryStage.setScene(scene);\nprimaryStage.show();\n\
  }\n}\n清单 12-12.\nOrientationFX 类片段\n```\n\n### 构建并运行项目\n\n要从 NetBeans 构建并运行项目，只需点击“运行项目”。要构建模块并从命令行使用\
  \ Java 9 运行项目，请执行清单 12-10 中提到的步骤。\n\n插入你的 Arduino 101，点击“开始”按钮，然后拿起并挥动 Arduino。你应该会得到类似图\
  \ 12-23 的结果，其中 3D 板的方向能够足够精确地模拟真实板的方向。\n\n![A323804_3_En_12_Fig23_HTML.jpg](img/A323804_3_En_12_Fig23_HTML.jpg)\n\
  \n图 12-23.\n\n运行高级 OrientationFX 示例\n\n请注意，0,0,0 位置对应于你手中板子的状态，使得你可以从左到右阅读 Genuino\
  \ 101 标志，并且电源插头保持在左侧。如果需要，可以调整偏航值。\n\n\n\n### 工作原理\n\n该示例通过向一个 `Group` 中添加三个立方体来创建\
  \ `Arduino3D` 的实例：\n\n```\npublic VBox createArduino3D() {\nBox board = new Box(300,\
  \ 10, 200);\nboard.setMaterial(new PhongMaterial(Color.web(\"#008282\")));\nBox\
  \ longHeader = new Box(210, 40, 10);\nlongHeader.setMaterial(new PhongMaterial(Color.web(\"\
  #505050\")));\nlongHeader.getTransforms().add(new Translate(40, -20, 90));\nBox\
  \ shortHeader = new Box(170, 40, 10);\nshortHeader.setMaterial(new PhongMaterial(Color.web(\"\
  #505050\")));\nshortHeader.getTransforms().add(new Translate(60, -20, -90));\nGroup\
  \ arduino = new Group(board, longHeader, shortHeader);\n```\n\n然后，它将这个组添加到另一个组内的\
  \ `SubScene` 中。子场景允许你使用摄像机而不影响场景的其余部分：\n\n```\nSubScene subScene = new SubScene(new\
  \ Group(arduino), 400, 400,\ntrue, SceneAntialiasing.BALANCED);\nPerspectiveCamera\
  \ camera = new PerspectiveCamera();\ncamera.setTranslateX(-200);\ncamera.setTranslateY(-200);\n\
  camera.setTranslateZ(-50);\nsubScene.setCamera(camera);\nVBox vBox = new VBox(new\
  \ Label(\"Rendering 3D\"), subScene);\nvBox.getStyleClass().add(\"box\");\nreturn\
  \ vBox;\n```\n\nArduino 组在其变换列表中添加了一个仿射变换。你将这个组添加到另一个组内的 `SubScene` 中。子场景允许你使用摄像机而不影响场景的其余部分：\n\
  \n```\naffine = new Affine();\narduino.getTransforms().add(affine);\n```\n\n因此，现在每当有串口事件并提供一组新的方向角时，你只需要更新仿射变换的系数即可。为此，你需要将三个旋转合并为一个旋转矩阵：\n\
  \n```\npublic void processEvent(double roll, double pitch, double yaw) {\nmatrixRotateNode(roll,\
  \ pitch, yaw);\n}\nprivate void matrixRotateNode(double roll, double pitch, double\
  \ yaw) {\ndouble mxx = Math.cos(pitch) * Math.cos(yaw);\ndouble mxy = Math.cos(roll)\
  \ * Math.sin(pitch) +\nMath.cos(pitch) * Math.sin(roll) * Math.sin(yaw);\ndouble\
  \ mxz = Math.sin(pitch) * Math.sin(roll) -\nMath.cos(pitch) * Math.cos(roll) * Math.sin(yaw);\n\
  double myx = -Math.cos(yaw) * Math.sin(pitch);\ndouble myy = Math.cos(pitch) * Math.cos(roll)\
  \ -\nMath.sin(pitch) * Math.sin(roll) * Math.sin(yaw);\ndouble myz = Math.cos(pitch)\
  \ * Math.sin(roll) +\nMath.cos(roll) * Math.sin(pitch) * Math.sin(yaw);\ndouble\
  \ mzx = Math.sin(yaw);\ndouble mzy = -Math.cos(yaw) * Math.sin(roll);\ndouble mzz\
  \ = Math.cos(roll) * Math.cos(yaw);\naffine.setToTransform(mxx, mxy, mxz, 0,\nmyx,\
  \ myy, myz, 0,\nmzx, mzy, mzz, 0);\n}\n```\n\n此过程中涉及的数学知识目前超出了范围，但可以在 [`https://en.wikipedia.org/wiki/Rotation_formalisms_in_three_dimensions`](https://en.wikipedia.org/wiki/Rotation_formalisms_in_three_dimensions)\
  \ 找到很好的参考资料。\n\n上述代码将为每组角度提供即时旋转，因此为了使其更稳定，使用每个角度的最后五个值的平均值会更方便。\n\n```\nprivate\
  \ static final int SIZE = 5;\nprivate final List averageRoll = new ArrayList();\n\
  private final List averagePitch = new ArrayList();\nprivate final List averageYaw\
  \ = new ArrayList();\npublic void processEvent(double roll, double pitch, double\
  \ yaw) {\ndouble avYaw = average(averageYaw, Math.toRadians(yaw));\ndouble avPitch\
  \ = average(averagePitch, Math.toRadians(pitch));\ndouble avRoll = average(averageRoll,\
  \ Math.toRadians(roll));\nmatrixRotateNode(avRoll, avPitch, avYaw);\n}\nprivate\
  \ double average(List list, double value) {\nwhile (list.size() > SIZE) {\nlist.remove(0);\n\
  }\nlist.add(value);\nreturn list.stream()\n.collect(Collectors.averagingDouble(d\
  \ -> d));\n}\n```\n\n## 更多示例\n\n网上有大量资源可以演示或利用 Arduino，你可以尽情尝试你想到的任何点子！Arduino 及其所需设备价格低廉且（大多数情况下）安全，它们能让你提升自己的动手能力。\n\
  \n寻找一个价格合适的项目，购买所需材料，动手搭建，先在 Arduino IDE 上进行测试，然后设计一个 JavaFX 应用程序来监控和控制你的设备。\n\n\
  分享你的开发成果，并在需要时寻求帮助；在 Arduino 开发和 JavaFX 领域，都有非常棒的社区，里面的人们乐于提供帮助。\n\n## 总结\n\n在本章中，你了解了结合\
  \ Arduino 和 JavaFX 所能实现的功能。你首先学习了 Arduino 及其不同开发板和主要规格。接着，你了解了如何通过 Arduino IDE 与其通信。在学习了如何在\
  \ IDE 中加载示例后，你亲自尝试了 Arduino 101，上传了一个草图并在串口监视器中读取了方向角。\n\n然后，你学习了从计算机读取串口的不同方法，并了解了\
  \ Java Simple Serial Connector 库。安装这个第三方组件后，你能够执行串口操作，如定位、打开、读取、写入和关闭。\n\n为了监控和显示\
  \ Arduino 的读数，你学习了如何使用 JavaFX Charts API。接着，你看到了一个示例，其中使用来自串口的一系列数据绘制了一个 JavaFX\
  \ 图表，该数据来自一个带有六轴加速度计和陀螺仪的 Arduino 开发板，以提供三个方向角。最后，你发现了如何通过添加真实开发板的 JavaFX 3D 模拟，并根据串口读数旋转它来增强应用程序。\n\
  \n"
- "# 13. JavaFX 在移动设备上的应用\n\n我们都多次听说过 WORA 口号（“一次编写，到处运行”），虽然 Java 确实可以在任何有 JVM 的地方运行，但在现代移动设备上情况并非如此。尽管最新趋势证实智能手机正在取代计算机，为什么我们仍然无法瞄准这个巨大的市场呢？幸运的是，开源项目\
  \ JavaFXPorts 应运而生，它允许所有 Java 开发者将他们的项目部署到移动设备（Android 和 iOS）上。\n\n在本章中，你将了解 JavaFXPorts\
  \ 项目，以及它如何催生了 Gluon Mobile，这是一个旨在增强 JavaFX 桌面设计的移动体验的库。\n\n作为一个完整的示例，在本章中，你将看到如何使用\
  \ Gluon Mobile 创建一个简单的 JavaFX 应用程序：`BasketStats`。这是一个用于在篮球比赛中记录得分的简单应用，你将把它部署到 Android\
  \ 和 iOS 上。\n\n在进入示例之前，让我们先了解一下 `JavaFXPorts` 和 Gluon Mobile。\n\n## JavaFXPorts：移植到移动设备\n\
  \n`JavaFXPorts` 是一个开源项目，它将 Java 和 JavaFX 带到了移动设备和嵌入式硬件上。这包括 iPhone、iPad、Android\
  \ 设备，甚至树莓派。实现这一奇迹的不同项目可以在这里找到：[`https://bitbucket.org/javafxports`](https://bitbucket.org/javafxports)\
  \ 。\n\n这一冒险始于 2013 年底，当时 Johan Vos 和他的团队基于 OpenJFX 项目开始了将 JavaFX 移植到 Android 的工作。与此同时，RoboVM\
  \ 作为一个类似的开源项目开始将 Java 移植到 iOS。2015 年 2 月，这些项目背后的公司 LodgOn 和 Trillian Mobile 宣布联合努力，将两个项目的精华结合到一个名为\
  \ jfxmobile-plugin 的单一插件中。这个唯一的 Gradle JavaFX 移动插件被创建出来，并通过 `JavaFXPorts` 仓库免费提供。\n\
  \n几周后，Gluon 公司（参见 [`http://gluonhq.com`](http://gluonhq.com) ）成立，旨在汇集围绕 JavaFXPorts\
  \ 项目的所有努力，并交付 Gluon Mobile，这是一个轻量级的应用程序框架和一套移动控件，用于增强移动体验。\n\n\n\n### JavaFXPorts\
  \ 底层原理\n\n当我们创建并编译 Java 应用程序时，得到的是 Java 字节码。要运行它，你需要 JRE，其中包含针对每个平台的原生库。由于移动设备没有\
  \ JRE，因此需要采用不同的方法。\n\n在 Android 上，Google 的 Android SDK 包含用于将应用程序、资源和库打包成 Android\
  \ 包（APK）的工具。`jfxmobile` 插件将使用这些工具，在 Android 的 Dalvik/Art 虚拟机（与 Java 虚拟机相对类似）之上创建并安装\
  \ Java 移动应用。\n\n在 iOS 上，JRE 需要打包在应用内部。RoboVM 提前编译器用于将 Java 代码转换为原生 iOS 代码，并将所需的运行时库与应用程序链接起来。\n\
  \n目前，Android 运行时和 iOS AOT 编译器都使用 Apache Harmony 对 Java 类库的实现，这仅是 Java 7 的部分实现，且该项目已正式废弃。此外，RoboVM\
  \ 项目在微软收购 Xamarin（而 Xamarin 最初收购了 RoboVM）后也已停止。\n\n目前，这意味着 `JavaFXPorts` 支持大部分 Java\
  \ 7 SE API，同时也支持少量 Java 8 API（例如 lambda 表达式，但不支持流）。\n\n由于这些限制，Gluon 正在开发 GluonVM，这是一个高性能的\
  \ Java 8/9 虚拟机，它将利用 OpenJDK 类库，并在移动设备上提供完整的 Java 9 功能。预计它将在 Java 9 发布时可用。\n\n注意\n\
  \n在 GluonVM 发布之前，鉴于上述限制，我们无法使用 Java 9 或模块系统在移动设备上运行 JavaFX。这就是本章示例使用现有实现（Java 7\
  \ 和部分 Java 8 特性）的原因。\n\n### JavaFXPorts 入门\n\n有关使用 `JavaFXPorts` 创建 Java 移动应用的入门文档，请参见：[`http://docs.gluonhq.com/javafxports/`](http://docs.gluonhq.com/javafxports/)\
  \ 。\n\nGradle 插件 `jfxmobile-plugin` 几乎完成了所有必要的工作。通过将此插件包含在常规的 JavaFX 应用程序中，它将自动为你创建一系列任务，并将你的应用程序打包为原生\
  \ iOS 或原生 Android 包。\n\n以下是开始 Java 移动项目前的先决条件。在你的机器上：\n\n*   为你的开发机器安装最新的 JDK 8\
  \ 版本。请从此处获取：[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\
  \ 。\n*   从 [`https://gradle.org/install`](https://gradle.org/install) 安装 Gradle\
  \ 2.2 或更高版本。使用 `jfxmobile` 插件构建应用程序需要它。\n\n如果你想部署到 Android：\n\n*   从 [`https://developer.android.com/studio/index.html`](https://developer.android.com/studio/index.html)\
  \ 安装 Android SDK。你可以下载 Android Studio，它捆绑了 SDK 和所需的 Android 工具，或者你也可以仅下载并安装该链接末尾的\
  \ SDK 工具。\n*   运行 Android SDK 管理器（`Android Studio -> Tools -> Android -> SDK Manager`\
  \ 或命令行 `<android sdk>/tools/android`），然后至少安装 Build-tools 版本 23.0.1、API 21 至 25 的\
  \ SDK Platform，以及 Extras 中的 Android Support Repository。\n*   在 `<Users>/<User>/.gradle/gradle.properties`\
  \ 中创建一个属性文件，并添加 `ANDROID_HOME=<path.to.Android.sdk>` 属性。\n\n在部署到 Android 设备之前，你需要在设备上执行以下步骤：\n\
  \n*   进入 `设置 -> 关于手机 -> 版本号`，连续点击七次以启用开发者模式。\n*   进入 `设置 -> 开发者选项 -> USB 调试`，选择启用。\n\
  *   进入 `设置 -> 安全 -> 未知来源`，启用从未知来源安装应用。\n\n如果你想部署到 iOS：\n\n*   你需要一台装有 MacOS X 10.11.5\
  \ 或更高版本的 Mac\n*   你需要 Xcode 8.x 或更高版本，可从 Mac App Store 获取\n\n在部署到 iOS 设备之前，你需要从\
  \ Apple 开发者门户获取配置文件。有关如何获取免费配置文件以部署到你自己的设备，请参见此链接：[`http://docs.gluonhq.com/javafxports/#_ios_3`](http://docs.gluonhq.com/javafxports/#_ios_3)\
  \ 。\n\n## Hello Mobile World 示例\n\n在满足所有先决条件后，让我们创建一个可以在桌面和移动平台上运行的 Hello Mobile\
  \ World 示例。\n\n在你喜欢的 IDE 中，可以创建一个新的 Gradle 项目。为其命名（`HelloMobile`），指定位置和主类，例如 `org.jfxbe.chap13.HelloMobile`。\n\
  \n编辑 `build.gradle` 文件并添加清单 13-1 中的内容。它将把 `jfxmobile` 插件应用到项目中。保存并重新加载项目以更新项目。首次执行此操作时，插件将下载并安装一些内部依赖项，因此可能需要一些时间。\n\
  \n```\nbuildscript {\nrepositories {\njcenter()\n}\ndependencies {\nclasspath 'org.javafxports:jfxmobile-plugin:1.3.5'\n\
  }\n}\napply plugin: 'org.javafxports.jfxmobile'\nrepositories {\njcenter()\n}\n\
  mainClassName = 'org.jfxbe.chap13.HelloMobile'\njfxmobile {\nandroid {\n}\nios {\n\
  forceLinkClasses = [ 'org.jfxbe.chap13.**.*' ]\n}\n}\n清单 13-1.\nbuild.gradle 文件\n\
  ```\n\n请注意，在撰写本文时，该插件的版本是 1.3.5。要获取最新版本，请查看 [`https://bitbucket.org/javafxports/javafxmobile-plugin`](https://bitbucket.org/javafxports/javafxmobile-plugin)\
  \ 。\n\n现在，在主类中，扩展 `Application` 并创建一个包含一些内容的 JavaFX `Scene`，如清单 13-2 所示。\n\n```\n\
  package org.jfxbe.chap13;\nimport javafx.application.Application;\nimport javafx.geometry.Rectangle2D;\n\
  import javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.layout.StackPane;\n\
  import javafx.stage.Screen;\nimport javafx.stage.Stage;\npublic class HelloMobile\
  \ extends Application {\n@Override\npublic void start(Stage primaryStage) throws\
  \ Exception {\nRectangle2D bounds = Screen.getPrimary().getVisualBounds();\nfinal\
  \ Button button = new Button(\"Hello Mobile World!\");\nbutton.setStyle(\"-fx-font-size:\
  \ 20pt;\");\nbutton.setOnAction(e -> button.setRotate(button.getRotate() - 30));\n\
  final StackPane stackPane = new StackPane(button);\nScene scene = new Scene(stackPane,\
  \ bounds.getWidth(), bounds.getHeight());\nprimaryStage.setScene(scene);\nprimaryStage.show();\n\
  }\npublic static void main(String[] args) {\nlaunch(args);\n}\n}\n清单 13-2.\nHello\
  \ Mobile 主类\n```\n\n最后，你可以构建应用程序并在你的平台上运行它。要运行 Gradle 构建，只需输入 `gradle` 后跟所需的任务名称，例如\
  \ `gradle build` 将构建项目。运行 `gradle run` 在你的开发机器上运行它，`gradle androidInstall` 将其部署到\
  \ Android 设备，或 `gradle launchIOSDevice` 部署到 iOS 设备。图 13-1 显示了该应用在 Android 上运行的截图。\n\
  \n![A323804_3_En_13_Fig1_HTML.jpg](img/A323804_3_En_13_Fig1_HTML.jpg)\n\n图 13-1.\n\
  \nHello Mobile World 部署在 Android 上\n\n\n\n### 工作原理是什么？\n\n`jfxmobile` 插件会为你的 Java\
  \ 应用添加一系列任务，使你能够创建可上传至 Apple App Store 和 Android Play Store 的软件包。\n\n`jfxmobile`\
  \ 插件会下载并安装所需的 JavaFX SDK：\n\n*   **Android 的 Dalvik SDK**：该插件当前依赖于 `org.javafxports:dalvik-sdk:8.60.9`\
  \ 和 `org.javafxports:jfxdvk:8.60.9`。\n*   **Retrolambda 插件**：将代码转换为兼容 Java 6 的字节码，当前依赖于\
  \ `net.orfjackal.retrolambda:retrolambda:2.5.1`。\n*   **iOS SDK**：该插件当前依赖于 `org.javafxports:ios-sdk:8.60.9`。\n\
  *   **MobiDevelop**：RoboVM 1.8.0 的一个分支，用于将代码编译为兼容 iOS 的字节码。当前依赖于 `com.mobidevelop.robovm:robovm-dist:tar.gz:nocompiler:2.3.0`。\n\
  \n上述 SDK 的源代码可在此处获取：[`http://bitbucket.org/javafxports/8u-dev-rt`](http://bitbucket.org/javafxports/8u-dev-rt)。\n\
  \n在 Android 上，该插件随后会执行一系列命令，最终在 `build/javafxports/android` 目录下生成一个 Android 软件包（APK）。该软件包将被部署并安装到设备上。清单\
  \ 13-3 展示了在 Android 上成功部署的输出，其中列出了所有涉及的任务。\n\n注意\n\n运行 Gradle 任务时，请使用 `--info`、`--debug`\
  \ 或 `--stracktrace` 来获取更详细的输出，这有助于你精确定位错误和问题，例如：`gradle --info androidInstall`。\n\
  \n```\n$ gradle androidInstall\n:validateManifest\n:collectMultiDexComponents\n\
  :compileJava\n:processResources UP-TO-DATE\n:classes\n:compileAndroidJava UP-TO-DATE\n\
  :copyClassesForRetrolambda\n:applyRetrolambda\nRetrolambda 2.5.1\n:mergeClassesIntoJar\n\
  :shrinkMultiDexComponents\n:createMainDexList\n:writeInputListFile\n:dex\n:mergeAndroidAssets\n\
  :mergeAndroidResources\n:processAndroidResources UP-TO-DATE\n:processAndroidResourcesDebug\n\
  :validateSigningDebug\n:apkDebug\n:zipalignDebug\n:androidInstall\nInstalled on\
  \ device.\nBUILD SUCCESSFUL\nTotal time: 41.168 secs\n清单 13-3.\n运行 androidInstall\
  \ 时的输出\n```\n\n在 iOS 上，内部情况有所不同，但 Gradle 命令是相似的。该插件会下载并安装 RoboVM 编译器，并使用 RoboVM\
  \ 编译器命令在 `build/javafxports/ios` 目录下创建一个 iOS 应用。\n\n注意\n\n在移动设备上运行应用时，可以通过在 Android\
  \ 设备上运行 `<path.to.android skd>/platform-tools/adb logcat` 来访问标准输出。在 Mac 上，打开 Xcode\
  \ ➤ Windows ➤ Devices 并选择 iOS 设备来访问输出。\n\n最后，Gradle 遵循“约定优于配置”的原则，应用于该插件的默认配置使得\
  \ `build.gradle` 文件极其简单。你可以根据需要修改此配置。请查阅 [`http://docs.gluonhq.com/javafxports/#anchor-3`](http://docs.gluonhq.com/javafxports/#anchor-3)\
  \ 上的文档，以获取 Android 和 iOS 上所有可修改属性的完整列表。\n\n### 将应用提交到商店\n\n当你在移动设备上完成应用测试后，可以继续将其上传到\
  \ Apple App Store 和 Android Play Store。为此，该插件已包含所需的任务。\n\n在 Android 上，你需要提供有效的图标图像（位于\
  \ `/src/android/res` 下），并且必须在 `AndroidManifest` 文件中禁用调试选项：在 `application` 标签下，添加\
  \ `android:debuggable=\"false\"`。最后，你需要对应用进行签名，具体方法如 [`https://developer.android.com/studio/publish/app-signing.html`](https://developer.android.com/studio/publish/app-signing.html)\
  \ 所述。你可以将签名配置添加到 `build.gradle` 文件中，如清单 13-4 所示。\n\n```\njfxmobile {\nandroid {\n\
  signingConfig {\nstoreFile file(\"path/to/my-release-key.keystore\")\nstorePassword\
  \ 'STORE_PASSWORD'\nkeyAlias 'KEY_ALIAS'\nkeyPassword 'KEY_PASSWORD'\n}\nmanifest\
  \ = 'lib/android/AndroidManifest.xml'\n}\n}\n清单 13-4.\nAndroid 上的签名配置\n```\n\n如果一切设置完毕，运行\
  \ `gradle androidRelease` 以在 `/build/javafxports/android` 下生成 APK。要将其上传到商店，你需要注册成为\
  \ Google Play 开发者（ [`https://play.google.com/apps/publish/signup/`](https://play.google.com/apps/publish/signup/)\
  \ `)` 并填写所需的表单。\n\n在 iOS 上，提供应用的图标，并且一旦你注册了 Apple Developer 计划，就需要使用生产环境的配置文件对应用进行签名，如清单\
  \ 13-5 所示。运行 `gradle createIpa`，然后通过 Xcode ➤ Open Developer Tool ➤ Application Loader\
  \ 提交位于 `/build/javafxports/ios` 的应用。可以通过在 `/src/ios/Default-Info.plist` 文件中的 `plist`\
  \ 里添加相应的键来修复该工具提示缺失的初始要求。完成后，前往 iTunes Connect ( [`https://itunesconnect.apple.com`](https://itunesconnect.apple.com)\
  \ ) 准备发布应用。与任何其他常规 iOS 应用一样，通常需要经过几次迭代才能让应用获得提交批准，直到你满足审核者的所有要求。\n\n```\njfxmobile\
  \ {\nios {\narch = \"arm64\"\ninfoPList = file('src/ios/Default-Info.plist')\nforceLinkClasses\
  \ = ['your.package.**.*',...]\niosProvisioningProfile = 'MyApp'\niosSignIdentity\
  \ = 'iPhone Distribution: ******'\n}\n}\n清单 13-5.\niOS 上的签名配置\n```\n\n## Gluon Mobile\n\
  \nGluon Mobile 库旨在帮助开发者从单一的 Java 代码库出发，为 iOS 和 Android 创建高性能、外观精美且支持云连接的移动应用。它通过提供用于现代\
  \ Material Design 用户界面的 API、访问移动设备功能、连接 Web 服务以及在多个设备间同步状态，从而缩短了应用上市时间。\n\nGluon\
  \ Mobile 是一个客户端库和开发工具，它能够：\n\n*   使用 Glisten（一个提供原生外观和感觉的 UI 组件，包含 JavaFX 控件和特定布局）为客户端应用提供\
  \ UI 控件。\n*   使用 Connect（一个开源项目，允许与 Gluon CloudLink 本身及其他 Web 服务进行通信）处理与服务器端 Gluon\
  \ CloudLink 的通信。更多信息请访问 [`http://gluonhq.com/products/mobile/connect/`](http://gluonhq.com/products/mobile/connect/)。\n\
  *   通过使用 Charm Down（一个开源项目，提供一系列服务，如文件系统、本地或推送通知、GPS、传感器、相机等）来抽象（部分）平台特定的 API。更多详情请访问\
  \ [`http://gluonhq.com/products/mobile/charm-down/`](http://gluonhq.com/products/mobile/charm-down/)。\n\
  \n要开始使用 Gluon Mobile，你可以从头创建一个 Gradle 项目，修改任何现有的示例（ [`http://gluonhq.com/support/samples/`](http://gluonhq.com/support/samples/)\
  \ ），或者安装并使用适用于你 IDE 的 Gluon 插件。\n\n### Gluon IDE 插件\n\n适用于你 IDE 的 Gluon 插件有助于在你的\
  \ IDE 内部创建 Gluon 应用项目：以下 IDE 都有对应的插件：\n\n*   **NetBeans**。参见说明：[`http://docs.gluonhq.com/charm/latest/#netbeans-plugin`](http://docs.gluonhq.com/charm/latest/#netbeans-plugin)。\n\
  *   **IntelliJ IDEA**。参见：[`http://docs.gluonhq.com/charm/latest/#intellij-plugin`](http://docs.gluonhq.com/charm/latest/#intellij-plugin)。\n\
  *   **Eclipse**。参见：[`http://docs.gluonhq.com/charm/latest/#eclipse-plugin`](http://docs.gluonhq.com/charm/latest/#eclipse-plugin)。\n\
  \n安装插件后，选择 New Project，进入 Gluon 类别，然后挑选一个可用的模板（见图 13-2）。你将创建一个项目，可以轻松修改和调整以创建自己的应用。\n\
  \n![A323804_3_En_13_Fig2_HTML.jpg](img/A323804_3_En_13_Fig2_HTML.jpg)\n\n图 13-2.\n\
  \nIntelliJ 的 Gluon 插件及可用模板\n\n\n\n### Charm Glisten\n\n基类是 `MobileApplication`，它继承自\
  \ `Application`。它不需要实现任何特定方法，但通常可以重写 `init` 来注册不同的视图，而 `postInit` 则可以访问场景并应用样式表，例如。\n\
  \nGlisten 用户界面是使用视图构建的。视图是一个 Glisten 容器，允许你将节点添加到其顶部、中心和底部。\n\n通常，通过为视图提供一个名称及其内容的节点来创建\
  \ `View` 实例。该实例被添加到一个视图工厂中，以便 Glisten UI 可以按需加载和卸载它们。\n\n默认情况下，舞台显示时第一个显示的视图称为 `Home\
  \ View`。它没有预定义的内容，因此该视图必须由开发者设计，但其名称已经分配好了：`MobileApplication.HOME_VIEW`。清单 13-6\
  \ 中的简短代码片段将创建一个非常简单的移动应用程序，其中包含单个视图，如图 13-3 所示。\n\n![A323804_3_En_13_Fig3_HTML.jpg](img/A323804_3_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3.\n\n在桌面上运行的 MyApp\n\n默认情况下，`glisten.css` 是添加到 Gluon Mobile 应用程序中的样式表。它基于\
  \ Google 的 Material Design（ [`https://material.io`](https://material.io) ）。\n\n\
  请参阅 [`http://docs.gluonhq.com/charm/latest/#_charm_glisten`](http://docs.gluonhq.com/charm/latest/#_charm_glisten)\
  \ 上的文档，以了解有关 Glisten 控件的更多信息。\n\n```\nimport com.gluonhq.charm.glisten.application.MobileApplication;\n\
  import com.gluonhq.charm.glisten.mvc.View;\nimport com.gluonhq.charm.glisten.visual.Swatch;\n\
  import javafx.scene.Scene;\nimport javafx.scene.control.Button;\npublic class MyApp\
  \ extends MobileApplication {\npublic static final String BASIC_VIEW = HOME_VIEW;\n\
  @Override\npublic void init() {\naddViewFactory(BASIC_VIEW, () -> new View(new Button(\"\
  Hello Glisten!\")));\n}\n@Override\npublic void postInit(Scene scene) {\nSwatch.BLUE.assignTo(scene);\n\
  }\n}\n清单 13-6.\n创建主视图\n```\n\n### 许可证\n\n虽然 `JavaFXPorts`、Charm Down 或 Charm Connect\
  \ 是完全开源的项目，但 Gluon Mobile 是一个商业项目，需要许可证。正如你在 [`http://gluonhq.com/products/mobile/buy`](http://gluonhq.com/products/mobile/buy)\
  \ 上看到的，有一个免费层级，该库可以在没有许可证的情况下用于测试，并具有 100% 的功能。\n\n## 示例：BasketStats 应用\n\n此示例向你展示如何逐步创建一个完整的\
  \ Java 移动应用，你可以将其部署到你的移动设备上。例如，你可以用它来记录你孩子篮球比赛期间的得分情况。\n\n在本例中，你将使用 NetBeans 和 Gluon\
  \ 插件。\n\n### 创建项目\n\n让我们使用 Gluon 插件创建一个新项目。在 NetBeans 中，选择文件 ➤ 新建项目，然后在左侧选择 Gluon。从可用项目列表中选择\
  \ Gluon Mobile – Glisten -Afterburner 项目，如图 13-4 所示。\n\n![A323804_3_En_13_Fig4_HTML.jpg](img/A323804_3_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4.\n\n新建项目：选择项目\n\n为应用程序添加一个合适的名称（`BasketStats`），找到一个合适的位置，添加包名，并根据需要更改主类名，如图\
  \ 13-5 所示。\n\n![A323804_3_En_13_Fig5_HTML.jpg](img/A323804_3_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5.\n\n新建项目：设置名称和位置\n\n单击下一步，并设置这些名称——主视图为 `Main`，次视图为 `Board`——如图 13-6 所示。单击完成，项目将被创建。\n\
  \n![A323804_3_En_13_Fig6_HTML.jpg](img/A323804_3_En_13_Fig6_HTML.jpg)\n\n图 13-6.\n\
  \n新建项目：设置视图名称\n\n项目的完整结构如图 13-7 所示。清单 13-7 包含了 `build.gradle` 文件，显示了撰写本文时可用的版本。\n\
  \n![A323804_3_En_13_Fig7_HTML.jpg](img/A323804_3_En_13_Fig7_HTML.jpg)\n\n图 13-7.\n\
  \n项目已创建：MobileApplication 类\n\n```\nbuildscript {\nrepositories {\njcenter()\n}\n\
  dependencies {\nclasspath 'org.javafxports:jfxmobile-plugin:1.3.5'\n}\n}\napply\
  \ plugin: 'org.javafxports.jfxmobile'\nrepositories {\njcenter()\nmaven {\nurl 'http://nexus.gluonhq.com/nexus/content/repositories/releases'\n\
  }\n}\nmainClassName = 'org.jfxbe.basketstats.BasketStats'\ndependencies {\ncompile\
  \ 'com.gluonhq:glisten-afterburner:1.2.0'\ncompile 'com.gluonhq:charm-glisten:4.3.5'\n\
  }\njfxmobile {\ndownConfig {\nversion = '3.3.0'\nplugins 'display', 'lifecycle',\
  \ 'statusbar', 'storage'\n}\nandroid {\nmanifest = 'src/android/AndroidManifest.xml'\n\
  }\nios {\ninfoPList = file('src/ios/Default-Info.plist')\nforceLinkClasses = [\n\
  'org.jfxbe.basketstats.**.*',\n'com.gluonhq.**.*',\n'javax.annotations.**.*',\n\
  'javax.inject.**.*',\n'javax.json.**.*',\n'org.glassfish.json.**.*'\n]\n}\n}\n清单\
  \ 13-7.\n默认的 build.gradle 文件\n```\n\n在应用程序类中，重写了 `init` 方法来创建和注册视图。清单 13-8 包含了 `AppViewManager`\
  \ 类，它负责将视图添加到 `AppViewRegistry` 实例中。视图是使用 `AppView` 类通过 FXML 创建的，并使用了 Afterburner\
  \ 框架（ [`https://github.com/AdamBien/afterburner.fx`](https://github.com/AdamBien/afterburner.fx)\
  \ ）。同时创建并注册了一个 `NavigationDrawer` 控件。图 13-8 显示了运行项目时的这一层。\n\n![A323804_3_En_13_Fig8_HTML.jpg](img/A323804_3_En_13_Fig8_HTML.jpg)\n\
  \n图 13-8.\n\n在桌面上运行项目\n\n```\npackage org.jfxbe.basketstats.views;\nimport com.gluonhq.charm.glisten.afterburner.AppView;\n\
  import static com.gluonhq.charm.glisten.afterburner.AppView.Flag.HOME_VIEW;\nimport\
  \ static com.gluonhq.charm.glisten.afterburner.AppView.Flag.SHOW_IN_DRAWER;\nimport\
  \ static com.gluonhq.charm.glisten.afterburner.AppView.Flag.SKIP_VIEW_STACK;\nimport\
  \ com.gluonhq.charm.glisten.afterburner.AppViewRegistry;\nimport com.gluonhq.charm.glisten.afterburner.GluonPresenter;\n\
  import com.gluonhq.charm.glisten.afterburner.DefaultDrawerManager;\nimport com.gluonhq.charm.glisten.application.MobileApplication;\n\
  import com.gluonhq.charm.glisten.control.Avatar;\nimport com.gluonhq.charm.glisten.control.NavigationDrawer;\n\
  import com.gluonhq.charm.glisten.visual.MaterialDesignIcon;\nimport javafx.scene.image.Image;\n\
  import java.util.Locale;\nimport org.jfxbe.basketstats.BasketStats;\npublic class\
  \ AppViewManager {\npublic static final AppViewRegistry REGISTRY = new AppViewRegistry();\n\
  public static final AppView MAIN_VIEW = view(\"Game Manager\", MainPresenter.class,\n\
  MaterialDesignIcon.GAMES, SHOW_IN_DRAWER, HOME_VIEW, SKIP_VIEW_STACK);\npublic static\
  \ final AppView BOARD_VIEW = view(\"Board\", BoardPresenter.class,\nMaterialDesignIcon.DASHBOARD,\
  \ SHOW_IN_DRAWER);\nprivate static AppView view(String title,\nClass> presenterClass,\n\
  MaterialDesignIcon menuIcon, AppView.Flag... flags ) {\nreturn REGISTRY.createView(name(presenterClass),\
  \ title, presenterClass,\nmenuIcon, flags);\n}\nprivate static String name(Class>\
  \ presenterClass) {\nreturn presenterClass.getSimpleName().toUpperCase(Locale.ROOT)\n\
  .replace(\"PRESENTER\", \"\");\n}\npublic static void registerViewsAndDrawer(MobileApplication\
  \ app) {\nfor (AppView view : REGISTRY.getViews()) {\nview.registerView(app);\n\
  }\nNavigationDrawer.Header header = new NavigationDrawer.Header(\"Gluon Mobile\"\
  ,\n\"The BasketStats App\",\nnew Avatar(21,\nnew Image(BasketStats.class.getResourceAsStream(\"\
  /icon.png\"))));\nDefaultDrawerManager drawerManager = new DefaultDrawerManager(app,\n\
  header, REGISTRY.getViews());\ndrawerManager.installDrawer();\n}\n}\n清单 13-8.\n\
  AppViewManager 类\n```\n\n\n\n### 添加模型\n\n现在我们来添加模型。首先，你需要定义一个 `GameEvent` 类，其中包含一些基本属性，例如记录的分数、事件发生的日期时间、节次编号以及球队编号。请参见代码清单\
  \ 13-9。\n\n```\npackage org.jfxbe.basketstats.model;\nimport java.time.LocalDateTime;\n\
  import java.time.ZoneOffset;\npublic class GameEvent {\nprivate int score;\nprivate\
  \ long dateTime;\nprivate int period;\nprivate int team;\nprivate String partialScore;\n\
  /**\n* 球队得分时的事件\n* @param score 0, 1, 2, 3。0 表示其他比赛事件\n* @param dateTime\n* @param\
  \ period 1 到 4，5 表示比赛结束\n* @param team 1 代表 A 队，2 代表 B 队，0 表示其他比赛事件\n*/\npublic\
  \ GameEvent(int score, long dateTime, int period, int team) {\nthis.score = score;\n\
  this.dateTime = dateTime;\nthis.period = period;\nthis.team = team;\n}\n/**\n* 比赛开始一节或结束时的事件\n\
  * @param dateTime\n* @param period\n*/\npublic GameEvent(LocalDateTime dateTime,\
  \ int period) {\nthis(0, dateTime.toInstant(ZoneOffset.UTC).getEpochSecond(), period,\
  \ 0);\n}\npublic GameEvent() {\nthis(0, 0, 0, 0);\n}\npublic int getScore() {\n\
  return score;\n}\npublic void setScore(int score) {\nthis.score = score;\n}\npublic\
  \ long getDateTime() {\nreturn dateTime;\n}\npublic LocalDateTime getLocalDateTime()\
  \ {\nreturn LocalDateTime.ofEpochSecond(dateTime, 0, ZoneOffset.UTC);\n}\npublic\
  \ void setDateTime(long dateTime) {\nthis.dateTime = dateTime;\n}\npublic int getPeriod()\
  \ {\nreturn period;\n}\npublic void setPeriod(int period) {\nthis.period = period;\n\
  }\npublic int getTeam() {\nreturn team;\n}\npublic void setTeam(int team) {\nthis.team\
  \ = team;\n}\npublic String getPartialScore() {\nreturn partialScore;\n}\npublic\
  \ void setPartialScore(String partialScore) {\nthis.partialScore = partialScore;\n\
  }\n}\n代码清单 13-9.\nGameEvent 类\n```\n\n接下来，你将创建一个 `Game` 类，其中包含一些 JavaFX 属性，例如球队名称和得分、比赛的本地日期和时间，以及一个比赛事件列表。请参见代码清单\
  \ 13-10。\n\n```\npackage org.jfxbe.basketstats.model;\nimport java.time.LocalDateTime;\n\
  import javafx.beans.property.IntegerProperty;\nimport javafx.beans.property.ListProperty;\n\
  import javafx.beans.property.ObjectProperty;\nimport javafx.beans.property.SimpleIntegerProperty;\n\
  import javafx.beans.property.SimpleListProperty;\nimport javafx.beans.property.SimpleObjectProperty;\n\
  import javafx.beans.property.SimpleStringProperty;\nimport javafx.beans.property.StringProperty;\n\
  import javafx.collections.FXCollections;\nimport javafx.collections.ObservableList;\n\
  public class Game {\nprivate final ListProperty gameEvents;\npublic Game() {\ngameEvents\
  \ = new SimpleListProperty(FXCollections.observableArrayList());\n}\nprivate final\
  \ IntegerProperty scoreA = new SimpleIntegerProperty(this, \"scoreA\", 0);\npublic\
  \ final IntegerProperty scoreAProperty() { return scoreA; }\npublic final int getScoreA()\
  \ { return scoreA.get(); }\npublic final void setScoreA(int value) { scoreA.set(value);\
  \ }\nprivate final IntegerProperty scoreB = new SimpleIntegerProperty(this, \"scoreB\"\
  , 0);\npublic final IntegerProperty scoreBProperty() { return scoreB; }\npublic\
  \ final int getScoreB() { return scoreB.get(); }\npublic final void setScoreB(int\
  \ value) { scoreB.set(value); }\nprivate final StringProperty teamA = new SimpleStringProperty(this,\
  \ \"teamA\", \"\");\npublic final StringProperty teamAProperty() { return teamA;\
  \ }\npublic final String getTeamA() { return teamA.get(); }\npublic final void setTeamA(String\
  \ teamA) { this.teamA.set(teamA); }\nprivate final StringProperty teamB = new SimpleStringProperty(this,\
  \ \"teamB\", \"\");\npublic final StringProperty teamBProperty() { return teamB;\
  \ }\npublic final String getTeamB() { return teamB.get(); }\npublic final void setTeamB(String\
  \ teamB) { this.teamB.set(teamB); }\nprivate final ObjectProperty localDateTime\
  \ =\nnew SimpleObjectProperty(this, \"localDate\", LocalDateTime.now());\npublic\
  \ final ObjectProperty localDateTimeProperty() {\nreturn localDateTime; }\npublic\
  \ final LocalDateTime getLocalDateTime() { return localDateTime.get(); }\npublic\
  \ final void setLocalDateTime(LocalDateTime localDateTime) {\nthis.localDateTime.set(localDateTime);\
  \ }\npublic ListProperty gameEventsProperty() { return gameEvents; }\npublic ObservableList\
  \ getGameEvents() { return gameEvents.get(); }\npublic void setGameEvents(ObservableList\
  \ gluonGame) {\ngameEvents.set(gluonGame); }\npublic final String getGameName()\
  \ {\nreturn \"Game-\" + teamA.get() + \"-\" + teamB.get() + \"-\" +\nlocalDateTime.get().toLocalDate().toEpochDay()\
  \ + \"-\" +\nlocalDateTime.get().toLocalTime().toSecondOfDay() + \".gam\";\n}\n\
  }\n代码清单 13-10.\nGame 类\n```\n\n\n\n### 添加服务\n\n此应用将使用每个游戏对应的文件，在本地存储游戏数据。现在你需要定义一个\
  \ `Service` 类来管理这些操作。虽然你可以使用任何常规的文件读写方法，但这里将采用 Gluon CloudLink Client 来将创建的游戏持久化到设备的本地存储中。尽管其主要用途是与云端通信，但你也可以将其用于本地操作。\n\
  \n为此，你需要添加一个依赖项，如代码清单 13-11 所示。\n\n```\ndependencies {\ncompile 'com.gluonhq:glisten-afterburner:1.2.0'\n\
  compile 'com.gluonhq:charm-glisten:4.3.5'\ncompile 'com.gluonhq:charm-cloudlink-client:4.3.5'\n\
  }\n代码清单 13-11.\n所需依赖项\n```\n\n如代码清单 13-12 所示，该服务在初始化时会创建 `Game` 和 `DataClient` 实例。后者将使用\
  \ `OperationMode.LOCAL_ONLY` 来指示仅进行本地操作。\n\n`DataClient` 实例调用 `createListDataReader()`\
  \ 方法，并传入以下参数：一个标识符（游戏的唯一名称）、要读取的对象类（`GameEvent.class`）以及同步标志：\n\n*   `SyncFlag.LIST_WRITE_THROUGH`，确保游戏事件列表的更改自动存储到本地。\n\
  *   `SyncFlag.OBJECT_WRITE_THROUGH`，确保列表中任何游戏事件属性的更改也自动存储到本地。\n\n该方法返回一个 `ListDataReader`\
  \ 对象。使用静态方法 `DataProvider.retrieveList` 并传入该数据读取器，即可获得一个 `GluonObservableList<GameEvents>`，这是一个可观察的游戏事件列表，可在不同视图中用于获取或添加新的\
  \ `gameEvents`。这些事件会立即被添加到本地文件中。\n\n```\npackage org.jfxbe.basketstats.service;\n\
  import com.gluonhq.cloudlink.client.data.DataClient;\nimport com.gluonhq.cloudlink.client.data.DataClientBuilder;\n\
  import com.gluonhq.cloudlink.client.data.OperationMode;\nimport com.gluonhq.cloudlink.client.data.SyncFlag;\n\
  import com.gluonhq.connect.GluonObservableList;\nimport com.gluonhq.connect.provider.DataProvider;\n\
  import javafx.beans.property.ListProperty;\nimport javax.annotation.PostConstruct;\n\
  import org.jfxbe.basketstats.model.Game;\nimport org.jfxbe.basketstats.model.GameEvent;\n\
  public class Service {\nprivate DataClient dataClient;\nprivate Game game;\n@PostConstruct\n\
  public void postConstruct() {\ndataClient = DataClientBuilder.create()\n.operationMode(OperationMode.LOCAL_ONLY)\n\
  .build();\ngame = new Game();\n}\npublic GluonObservableList retrieveGame(String\
  \ nameGame) {\ngame.setGameEvents(null);\nreturn DataProvider.retrieveList(dataClient.createListDataReader(nameGame,\n\
  GameEvent.class,\nSyncFlag.LIST_WRITE_THROUGH, SyncFlag.OBJECT_WRITE_THROUGH));\n\
  }\npublic void addGameEvent(GameEvent gameEvent) {\nupdateScore(gameEvent);\ngameEvent.setPartialScore(\"\
  \" + game.getScoreA() + \" :: \" + game.getScoreB());\ngame.getGameEvents().add(gameEvent);\n\
  }\npublic Game getGame() {\nreturn game;\n}\npublic final ListProperty gameEventsProperty()\
  \ {\nreturn game.gameEventsProperty();\n}\npublic void updateScore(GameEvent event)\
  \ {\nswitch (event.getTeam()) {\ncase 0:\nif (event.getPeriod() == 1) {\ngame.setScoreA(0);\n\
  game.setScoreB(0);\n}\nbreak;\ncase 1:\ngame.setScoreA(game.getScoreA() + event.getScore());\n\
  break;\ncase 2:\ngame.setScoreB(game.getScoreB() + event.getScore());\nbreak;\n\
  }\n}\n}\n代码清单 13-12.\n游戏服务\n```\n\n你可以查阅 Gluon CloudLink 文档中的“数据存储”部分（[`http://docs.gluonhq.com/cloudlink/#_data_storage`](http://docs.gluonhq.com/cloudlink/#_data_storage)），以更详细地了解\
