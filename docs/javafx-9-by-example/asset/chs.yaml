  清单 4-35.\n用于设置 JavaFX 示例登录对话框应用程序样式的 style.css 文件\n```\n\n### 代码解释\n\n清单 4-34 中的\
  \ JavaFX 应用程序模拟了一个登录对话框窗口，允许用户输入有效密码。该代码主要通过重用之前清单 4-27 中展示的 `User` 类，演示了如何将 JavaFX\
  \ JavaBeans 属性与 UI 控件进行绑定。\n\n在开始代码讲解之前，我想提一下清单 4-34 与本书第二版第 3 章之间的区别。与旧版代码示例的主要区别在于，旧版完全使用\
