  构建示例 LabelAwesome.java 的 Gradle 依赖项\n```\n\n以下是获取 `FontAwesomeFX` 最新版本的地址。在撰写本文时，使用的是\
  \ `FontAwesomeFX` 库的 8.9 版本。\n\n*   Maven：[`http://search.maven.org`](http://search.maven.org)（搜索\
  \ `fontawesomefx`）\n*   Bintray：[`https://bintray.com/jerady/maven/FontAwesomeFX`](https://bintray.com/jerady/maven/FontAwesomeFX)\n\
  \n现在，你应该准备好将清单 6-6 输入到名为 `LabelAwesome.java` 的文件中，以便编译和执行。`FontAwesomeFX` 应用程序可以帮助你在\
  \ FontAwesome、Weather Icons、Material Design Icons 和 Glyph Icons 等各种包中找到合适的图标。\n\n\
