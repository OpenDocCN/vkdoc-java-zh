  \ `TranslateTransition` 动画来驱动汽车图片的移动。你将在第 7 章中学习动画，该章涵盖了 JavaFX 图形。\n\n## 菜单\n\n\
  菜单是窗口化桌面应用程序允许用户选择选项的标准方式。例如，应用程序通常有一个“文件”菜单，提供保存或打开文件的选项（菜单项）。在窗口化环境中，用户使用鼠标导航并选择菜单项。菜单和菜单项通常还具有通过组合键选择选项的功能，也称为键盘快捷键。换句话说，组合键允许无需鼠标即可快速进行菜单选择。\n\
  \n\n\n### 创建菜单和菜单项\n\n在探讨如何调用由选择菜单选项触发的代码之前，我们先来看看如何创建菜单。首先，你必须创建一个菜单栏（`javafx.scene.control.MenuBar`）对象，用于容纳一个或多个`javafx.scene.control.Menu`对象。每个`Menu`对象类似于一个树形层次结构，其中\
  \ Menu 对象可以包含 Menu 和 MenuItem（`javafx.scene.control.MenuItem`）对象。因此，一个菜单可以包含其他菜单作为子菜单或嵌套菜单。图\
  \ 6-12 展示了一个包含“保存”菜单项的“文件”菜单。\n\n![A323804_3_En_6_Fig12_HTML.jpg](img/A323804_3_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12.\n\n一个包含简单“文件”菜单的菜单栏，该菜单含有一个“保存”菜单项\n\n菜单项是 Menu 对象中的子选项。你可以将菜单项视为树结构中的叶节点（不包含子节点）。清单\
  \ 6-15 是创建一个菜单栏的代码，该菜单栏包含一个“文件”菜单，其中有一个“保存”选项作为菜单项，如图 6-12 所示。\n\n```\nMenuBar menuBar\
  \ = new MenuBar();\nMenu fileMenu = new Menu(\"File\");\nfileMenu.getItems().add(new\
  \ MenuItem(\"Save\"));\nmenuBar.getMenus().add(fileMenu);\n清单 6-15.\n创建一个包含“文件”菜单（带有“保存”菜单项）的\
  \ MenuBar\n```\n\n虽然你可以创建像图 6-12 中那样的简单菜单项，但你可能需要更高级的选项，例如复选选项或单选按钮。基于继承层次结构，以下是`MenuItem`类的子类。下面的列表展示了可用的`MenuItem`子类，用作菜单选项。随后将对每个子类进行简要说明。\n\
  \n*   `CheckMenuItem`\n*   `RadioMenuItem`\n*   `CustomMenuItem`\n*   `SeparatorMenuItem`\n\
  *   `Menu`\n\n`CheckMenuItem`菜单项类似于复选框 UI 控件，允许用户可选地选择项目。`RadioMenuItem`菜单项类似于单选按钮\
  \ UI 控件，允许用户从一个项目组中仅选择一个项目。与你之前在按钮部分学到的相同，创建复选菜单和单选菜单的方式类似。\n\n接下来是自定义菜单项，即`CustomMenuItem`类，它允许开发者创建自己专用的菜单项。例如，你可能希望有一个行为类似于切换按钮的菜单选项。\n\
  \n之后你会看到`SeparatorMenuItem`，它实际上是`CustomMenuItem`类型的一个派生类。`SeparatorMenuItem`是一个菜单项，用于显示一条视觉分隔线来分隔菜单项。\n\
  \n列表中最后一个是 Menu 类。由于`Menu`类是`MenuItem`的子类，它拥有一个`getItems().add()`方法，能够添加子项，例如其他`Menu`和`MenuItem`对象实例。\n\
  \n### 调用选中的 MenuItem\n\n现在你已经知道如何构建菜单和菜单项，让我们看看如何调用附加到每个菜单项的代码。你会很高兴地知道，为菜单项连接处理程序代码的方式与连接\
  \ JavaFX 按钮完全相同，这意味着菜单项也有一个`setOnAction()`方法。`setOnAction()`方法接收一个类型为`EventHandler<ActionEvent>`的函数式接口，该接口是当菜单项被选中时调用的处理程序代码。\n\
  \n清单 6-16 展示了当“退出”菜单项被触发时，两种等效的动作代码实现。第一种实现使用了匿名内部类，第二种使用了 Java 8 的 lambda 表达式。一种更简洁的附加事件处理程序代码的方法是使用\
  \ lambda 函数式接口。\n\n```\n// 使用匿名内部类的实现\nexitMenuItem.setOnAction(new EventHandler()\
  \ {\n@Override\npublic void handle(ActionEvent t) {\nPlatform.exit();\n}\n});\n\
  // 使用 lambda / 函数式接口的实现\nexitMenuItem.setOnAction(ae -> Platform.exit());\n清单 6-16.\n\
  实现动作被调用时的事件处理程序代码\n```\n\n### 示例：使用菜单\n\n为了演示各种菜单选择场景，下一个代码示例模拟了一个安全警报应用程序。如图 6-13\
