  public String streamToString(InputStream inputStream) {\nString text = new Scanner(inputStream,\
  \ \"UTF-8\")\n.useDelimiter(\"\\\\Z\")\n.next();\nreturn text;\n}\n/**\n* 返回包含参数的\
