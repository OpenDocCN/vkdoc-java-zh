  \n图 1-28.\n\n从 NetBeans IDE 启动的 JavaFX HelloWorld\n\n按照步骤 1 到 8 操作时，您应该不会遇到任何困难。但是，步骤\
  \ 9 确保您的项目的源/二进制格式使用了 JDK 9。由于 Java 9 中新增了模块等语言特性，本书中的某些源代码将依赖新语法，因此无法向后兼容 Java\
  \ 9 之前的版本。通常，开发人员会拥有较早版本的 Java 开发工具包，例如 JDK 8。当项目需要旧版本时，NetBeans 允许您在不同的 JDK 之间切换。需要注意的一点是，在\
  \ JavaFX 2.0 的早期版本中，该软件与 Java SDK 是分开打包的，这导致了一些软件版本混乱。谢天谢地，现在只需一次下载（JDK 9）即可！如果您仍在使用\
  \ Java 7 SDK，自 JavaFX 2.1 起，最新的下载也将在一个捆绑包中包含 JavaFX。\n\n注意\n\n您知道 Java 7 已经寿终正寝了吗？这意味着\
  \ Oracle 将不再发布任何面向公众的更新或版本。除非您仍拥有商业许可并与 Oracle 签订了支持合同，否则建议您将应用程序迁移到 Java 8 或更高版本。Java\
  \ 7 运行时没有更新可能会带来安全隐患。所以，您已经得到了警告。官方 Java 7 生命周期终止和常见问题解答网站在此： [`https://www.java.com/en/download/faq/java_7.xml`](https://www.java.com/en/download/faq/java_7.xml)\
  \ 。\n\n\n\n### 使用编辑器和终端（命令行提示符）\n\n开发 JavaFX 9 应用程序的第二种方式是使用普通文本编辑器和命令行提示符（终端）。通过学习如何在命令行提示符下编译和执行应用程序，你将了解类路径以及可执行文件所在的位置。当你在那些没有便捷的集成开发环境（IDE）和/或编辑器的环境中工作时，接触这些知识将提升你的技能。\n\
  \n在命令行下工作时，你基本上会使用 nano、vi、Emacs 或记事本等文本编辑器来编写 JavaFX HelloWorld 源代码。清单 1-1 中展示的是一个\
  \ HelloWorld Java 应用程序的示例。\n\n```\npackage org.acme.helloworld;\nimport javafx.application.Application;\n\
  import javafx.event.ActionEvent;\nimport javafx.event.EventHandler;\nimport javafx.scene.Group;\n\
  import javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.stage.Stage;\n\
  /**\n* A JavaFX Hello World Application\n*/\npublic class HelloWorld extends Application\
  \ {\n/**\n* @param args the command line arguments\n*/\npublic static void main(String[]\
  \ args) {\nApplication.launch(args);\n}\n@Override\npublic void start(Stage stage)\
  \ {\nstage.setTitle(\"Hello World\");\nGroup root = new Group();\nScene scene =\
  \ new Scene(root, 300, 250);\nButton btn = new Button();\nbtn.setLayoutX(100);\n\
  btn.setLayoutY(80);\nbtn.setText(\"Hello World\");\nbtn.setOnAction(new EventHandler()\
  \ {\npublic void handle(ActionEvent event) {\nSystem.out.println(\"Hello World\"\
  );\n}\n});\nroot.getChildren().add(btn);\nstage.setScene(scene);\nstage.show();\n\
  }\n}\n清单 1-1.\n来自 HelloWorld.java 的 JavaFX HelloWorld 应用程序\n```\n\n创建好 Java 文件后，你将使用命令行提示符或终端窗口来编译和运行你的\
  \ JavaFX 应用程序。以下是创建可在命令行提示符（终端）下编译和运行的 JavaFX HelloWorld 应用程序的步骤。\n\n1.  在你的用户主目录下，创建一个\
  \ `projects` 目录，并在其下创建一个 `helloworld` 目录。在 MacOS 或 Linux 操作系统上，使用以下命令创建 `projects`\
  \ 目录：\n\n```\n    $ mkdir -p ∼/projects/helloworld/src\n    $ mkdir ∼/projects/helloworld/classes\n\
  \    $ cd ∼/projects/helloworld/\n    $ nano src/HelloWorld.java\n    ```\n\n在 Windows\
  \ 操作系统上，使用以下命令切换目录：\n\n```\n    C:\\Users\\myusername>mkdir projects\n    C:\\Users\\\
  myusername>mkdir projects\\helloworld\n    C:\\Users\\myusername>mkdir projects\\\
  helloworld\\src\n    C:\\Users\\myusername>mkdir projects\\helloworld\\classes\n\
  \    C:\\Users\\myusername>cd projects\\helloworld\n    C:\\Users\\myusername\\\
  projects\\helloworld>notepad src\\HelloWorld.java\n    ```\n\n2.  将清单 1-1 中的代码复制并粘贴到文本编辑器中，并将文件保存为\
  \ `HelloWorld.java`。该文件应位于 `src` 目录内。注意：在输入清单 1-1 中 `HelloWorld.java` 文件的代码时，请确保在文件顶部包含\
  \ `package org.acme.helloworld;` 语句。这样做之后，在编译代码时就会创建包命名空间目录。例如，编译后的 `HelloWorld.class`\
  \ 文件将位于 `classes/org/acme/helloworld` 目录中。  \n3.  使用 Java 编译器 `javac`，配合 `-d` 选项和\
  \ `classes` 目录，编译名为 `HelloWorld.java` 的源代码文件。`classes` 目录是存放编译后代码的位置。此外，你需要指定要编译的源代码文件，即\
  \ `src/*.java`。你需要输入的命令取决于你的操作系统。在 MacOS X 或 Linux 操作系统上，在命令行提示符下输入以下内容：\n\n```\n\
  \    $ javac -d classes src/*.java\n    ```\n\n在 Windows 命令行下，输入以下内容：\n\n```\n \
  \   C:\\Users\\myusername\\projects\\helloworld> javac -d classes src\\*.java\n\
  \    ```\n\n注意文件名前面的 `-d classes`。`-d` 选项（目标目录）让 Java 编译器知道根据包的命名空间将编译后的类文件放在哪里。在此场景中，`HelloWorld`\
  \ 的包语句（命名空间）是 `org.acme.helloworld`，这将在 `classes` 目录下创建子目录，假设你当前位于 `∼/projects/helloworld`\
  \ 项目目录中。编译完成后，你的目录结构应类似于图 1-29。\n\n![A323804_3_En_1_Fig29_HTML.jpg](img/A323804_3_En_1_Fig29_HTML.jpg)\n\
  \n图 1-29.\n\n编译后的 HelloWorld 示例根据包命名空间在 classes 目录下创建了目录。你会注意到，在你之前创建的 classes 目录下，创建了\
  \ org/acme/helloworld 子目录。  \n4.  运行并测试你的 JavaFX HelloWorld 应用程序。假设你位于 `∼/projects/helloworld`\
  \ 目录下，输入以下命令从命令行提示符运行你的 JavaFX HelloWorld 应用程序：\n\n```\n    $ java -cp classes org.acme.helloworld.HelloWorld\n\
  \    ```\n\n在 Windows 操作系统上：\n\n```\nC:\\Users\\myusername\\projects\\helloworld>\
  \ java -cp classes org.acme.helloworld.HelloWorld\n```\n\n通过使用 `-cp`，`classes` 将告诉\
  \ Java 类路径目录所在的位置。图 1-30 显示了从命令行提示符启动的一个简单 JavaFX HelloWorld 应用程序的输出。\n\n![A323804_3_En_1_Fig30_HTML.jpg](img/A323804_3_En_1_Fig30_HTML.jpg)\n\
  \n图 1-30.\n\n从 MacOS X 命令行提示符启动的 JavaFX HelloWorld\n\n\n\n### 在命令行提示符中使用 Gradle\n\
  \n开发 JavaFX 应用的第三种方式是使用 Gradle 构建工具。与之前类似，你仍将使用普通的文本编辑器，但创建和编译代码的步骤将不再手动执行，而是依赖\
  \ Gradle 构建工具。如果你尚未配置 Gradle，请参考本章前面“安装 Gradle”一节的内容。请按照以下步骤创建一个基于 Gradle 的项目。\n\
  \n1.  创建另一个名为 `helloworld_gradle` 的项目和目录。假设你当前位于 `~/projects` 目录下，你将在此创建一个基于 Gradle\
  \ 的项目。在类 Unix 操作系统上，输入以下命令：\n\n```\n    $ mkdir -p projects/helloworld_gradle\n\
  \    ```\n\n在 Windows 上，输入以下命令：\n\n```\n    C:\\Users\\myusername>mkdir projects\\\
  helloworld_gradle\n    ```\n\n2.  将目录切换到 `helloworld_gradle`。在类 Unix 操作系统上，输入以下命令：\n\
  \n```\n    $ cd helloworld_gradle\n    ```\n\n在 Windows 上，输入以下命令：\n\n```\n    C:\\\
  Users\\myusername>cd projects\\helloworld_gradle\n    ```\n\n3.  构建一个具有标准目录结构（Maven\
  \ 和 Gradle 约定）的 Java 骨架项目。你会看到创建了类似 `src/main/java` 和 `src/test/java` 的目录。由于此操作会初始化项目文件和目录，因此只需执行一次。以下命令用于创建一个\
  \ Java 库项目：\n\n```\n    $ gradle init --type java-library\n    ```\n\n执行 Gradle\
  \ `init` 任务后的输出如下：\n\n```\n    :wrapper\n    :init\n    BUILD SUCCESSFUL\n    Total\
  \ time: 1.897 secs\n    ```\n\n4.  由于你创建的是 JavaFX 应用而非 Java 库，你需要分别删除 `src/main/java`\
  \ 和 `src/test/java` 目录下的 `Library.java` 和 `LibraryTest.java` 文件。这些文件只是为你创建 Java\
  \ 库时提供的存根文件。在当前场景中，你创建的是一个 JavaFX 应用。  \n5.  接下来，在 `src/main/java` 目录下创建一个名为 `org/acme/helloworld`\
  \ 的目录，并将清单 1-1 中的 `HelloWorld.java` 文件复制到 `src/main/java/org/acme/helloworld` 目录中。结果如图\
  \ 1-31 所示。\n\n![A323804_3_En_1_Fig31_HTML.jpg](img/A323804_3_En_1_Fig31_HTML.jpg)\n\
  \n图 1-31.\n\nGradle Java 应用项目结构。请注意源代码目录结构遵循标准约定，布局为 `src/main/java` 和 `src/test/java`。诸如\
  \ Maven 和 Gradle 等构建工具均遵循此约定。  \n6.  由于你创建的是 JavaFX 应用，你需要编辑 `build.gradle` 文件，添加一个插件，以便将\
  \ Java 项目构建为可启动的应用。你还需要添加一个条目，告知 Gradle 主应用应运行哪个类。使用你的文本编辑器，将以下条目添加到 `build.gradle`\
  \ 文件中：\n\n```\n    apply plugin: 'application'\n    mainClassName = \"org.acme.helloworld.HelloWorld\"\
  \n    ```\n\n7.  保存并退出文件后，你需要使用 `gradle assemble` 命令构建项目。这将创建一个可运行的 `jar` 可执行文件。输入以下命令来编译并构建一个可执行的\
  \ HelloWorld `jar` 文件。\n\n```\n    $ gradle assemble\n    ```\n\n执行 Gradle assemble\
  \ 任务后的输出如下：\n\n```\n    :compileJava\n    Download https://jcenter.bintray.com/org/slf4j/slf4j-api/1.7.12/slf4j-api-1.7.12.pom\n\
  \    Download https://jcenter.bintray.com/org/slf4j/slf4j-parent/1.7.12/slf4j-parent-1.7.12.pom\n\
  \    Download https://jcenter.bintray.com/org/slf4j/slf4j-api/1.7.12/slf4j-api-1.7.12.jar\n\
  \    :processResources UP-TO-DATE\n    :classes\n    :jar\n    :assemble\n    BUILD\
  \ SUCCESSFUL\n    Total time: 4.458 secs\n    ```\n\n8.  现在，使用以下命令（运行任务）来启动 HelloWorld\
  \ 应用。\n\n```\n    $ gradle run\n    ```\n\n9.  当你添加了插件条目 `apply plugin: 'application'`\
  \ 后，Gradle 的 run 任务便被添加进来。Gradle 插件提供了便捷的方式来构建不同类型的 Java 项目和产物。你应该会看到 Java HelloWorld\
  \ 应用启动，如图 1-30 所示。\n\n使用 Gradle 还可以做很多更强大的事情，但这超出了本书的范围；不过，我将列出一些你可能感兴趣使用的常用命令。\n\
  \n*   `gradle tasks`：列出所有可用的任务\n*   `gradle clean`：从 `build` 目录中移除目录和文件\n*   `gradle\
  \ eclipseProject`：为 Eclipse IDE 创建项目文件。当你将以下语句添加到 `build.gradle` 文件中时，此任务将可用：\n\n\
  ```\n    apply plugin: 'eclipse'\n    ```\n\n*   `gradle intellijProject`：为 IntelliJ\
  \ IDE 创建项目文件。当你将以下语句添加到 `build.gradle` 文件中时，此任务将可用：\n\n```\n    apply plugin: 'idea'\n\
  \    ```\n\n*   `gradle -help`：显示可用的选项和命令说明\n\n\n\n## 解读 HelloWorld 源代码\n\n你会注意到，在源代码中，基于\
  \ JavaFX 的应用程序继承自 `javafx.application.Application` 类。`Application` 类提供了应用程序生命周期函数，例如在运行时进行初始化、启动、开始和停止。这为\
  \ Java 应用程序提供了一种机制，使其能够从主线程中分离出来，启动 JavaFX GUI 组件。清单 1-2 中的代码是 JavaFX HelloWorld\
  \ 应用程序的骨架，包含一个 `main()` 方法和一个重写的 `start()` 方法。\n\n```\npublic class HelloWorld extends\
  \ Application {\n/**\n* @param args the command line arguments\n*/\npublic static\
  \ void main(String[] args) {\n// 在主线程上\nApplication.launch(args);\n}\n@Override\n\
  public void start(Stage stage) {\n// 在 JavaFX 应用程序线程上\n// JavaFX 代码写在这里...\n}\n\
  }\n清单 1-2.\nHelloWorld.java 文件的骨架版本\n```\n\n在这里，在 `main()` 方法的入口点，你只需将命令行参数传递给 `Application.launch()`\
  \ 方法即可启动 JavaFX 应用程序。要访问传递给 `launch()` 方法的任何参数，你可以调用 `Application` 类的 `getParameters()`\
  \ 方法。有关访问命名参数和原始参数的各种方式的详细信息，请参阅 Javadoc 文档。以下是 `getParameters()` 方法的 Javadoc 文档链接：\n\
  \n[`https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html#getParameters--`](https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html%23getParameters%2D%2D)\n\
  \n在 `Application.launch()` 方法执行后，应用程序将进入就绪状态，框架内部将调用 `start()` 方法来启动。此时，程序执行发生在\
  \ JavaFX 应用程序线程上，而不是主线程上。当调用 `start()` 方法时，一个 JavaFX `javafx.stage.Stage` 对象可供开发者使用和操作。以下是重写的\
  \ Application `start()` 方法：\n\n```\n@Override\npublic void start(Stage stage) {...}\n\
  ```\n\n当程序在 `start()` 方法中开始时，会有一个独立的执行线程，称为 JavaFX 应用程序线程。请记住，在 JavaFX 应用程序线程上运行，在概念上等同于在\
  \ Java Swing 的事件调度线程上运行。请注意 Java 主线程与 UI 线程在涉及 UI 应用程序时的区别。在本书的后续部分，你将学习如何创建后台进程以避免阻塞\
  \ JavaFX 应用程序线程。当你学会如何构建应用程序以避免阻塞 GUI 时，用户会注意到你的应用程序在高负载下响应更迅速（更灵敏）。掌握 GUI 应用程序的响应性是增强可用性和整体用户体验的重要概念。要查看\
  \ Java Application API，请访问此处的 Javadoc：\n\n[`https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/application/Application.html)\n\
  \n[`https://docs.oracle.com/javase/9/`](https://docs.oracle.com/javase/9/)\n\n###\
  \ JavaFX 场景图\n\n你会注意到一些类和对象的命名有些奇特，例如 `Stage` 和 `Scene`。这并非巧合——API 的设计者借鉴了剧院或戏剧的概念，即演员在观众面前表演。在这个类比中，一部戏剧由一幕或多幕场景组成，演员在其中表演。当然，所有场景都在一个舞台上依次进行。在\
  \ JavaFX 中，`Stage` 相当于一个应用程序窗口，类似于桌面上的 Java Swing API `JFrame` 或 `JDialog`。根据设备的不同（例如\
  \ Raspberry Pi (Raspbian)），可能只有一个舞台。你可以将 `Scene` 对象视为一个内容面板，类似于 Java Swing 的 `JPanel`，能够容纳零到多个\
  \ `Node` 对象（子节点）。\n\n继续这个例子，在 `start()` 方法中，你会看到对于 JavaFX 桌面窗口（舞台），你可以使用 `setTitle()`\
  \ 方法设置标题栏。接下来，你创建一个根节点（`Group`），将其作为应用程序窗口的顶层表面添加到 `Scene` 对象中。以下代码片段展示了如何设置标题并创建场景：\n\
  \n```\nstage.setTitle(\"Hello World\");\nGroup root = new Group();\nScene scene\
  \ = new Scene(root, 300, 250);\n```\n\n### JavaFX 节点\n\nJavaFX 节点是所有待渲染场景图节点的基本基类。以下图形功能可以应用于节点：缩放、变换、平移和效果。\n\
  \n一些最常用的节点是 UI 控件和 `Shape` 对象。与树数据结构类似，场景图通过使用容器类（例如 `Group` 或 `Pane` 类）来包含子节点。稍后当你学习\
  \ `ObservableList` 类时，你将了解更多关于 `Group` 类的信息，但现在你可以将它们视为能够容纳子节点对象的 Java `List` 或\
  \ `Collection` 类。在以下代码中，创建了一个按钮（`Button`）节点，将其定位在场景上，并设置了一个事件处理器（`EventHandler<ActionEvent>`），当用户按下按钮时，该处理器会做出响应。处理器代码将在控制台输出文本\
  \ `\"Hello World\"`。目前，此处显示的代码使用了匿名内部类；不过，你将在第 3 章中学习使用 Java 8 引入的 lambda 表达式。\n\
  \n```\nButton btn = new Button();\nbtn.setLayoutX(100);\nbtn.setLayoutY(80);\nbtn.setText(\"\
  Hello World\");\nbtn.setOnAction(new EventHandler() {\npublic void handle(ActionEvent\
  \ event) {\nSystem.out.println(\"Hello World\");\n}\n});\nroot.getChildren().add(btn);\n\
  ```\n\n一旦通过 `getChildren().add()` 方法将子节点添加到根 `Group` 中，你就可以设置 `stage` 的场景，并调用 `Stage`\
  \ 对象上的 `show()` 方法来显示 JavaFX 应用程序窗口。默认情况下，该窗口允许用户最小化、最大化和关闭（退出）应用程序。以下代码设置了场景并显示了\
  \ JavaFX 应用程序窗口（`Stage`）：\n\n```\nstage.setScene(scene);\nstage.show();\n```\n\n\
  \n\n## 打包 JavaFX 应用程序\n\n在某个时候，您会想要分发或部署您的 JavaFX 应用程序。为了处理众多的应用程序打包和部署策略，Oracle\
  \ 的 Java 团队创建了一个 Java Packager 工具，以帮助开发者构建、打包和部署他们的应用程序。要了解更多关于如何使用 Java Packager\
  \ 工具的信息，请参阅 Oracle 在以下网址的“部署 JavaFX 应用程序”文档：\n\n[`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/javapackager.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/javapackager.html)\n\
  \n为了让您体验 Java Packager 工具的功能，我将向您展示如何将 HelloWorld 类打包成一个适用于多种支持平台的可执行文件。这将允许用户双击启动或在原生操作系统上安装该应用程序。以下命令将自动编译并生成位于\
  \ `∼/projects/helloworld/dist/bundles` 目录中的可执行文件、启动器和安装程序。输入以下命令来创建可部署的 Java 应用程序。\n\
  \n```\n$ cd ∼/projects/helloworld\n$ javapackager -makeall -appclass org.acme.helloworld.HelloWorld\
  \ -name hellothere\n```\n\n表 1-3 描述了用于构建可分发的 JavaFX 可执行应用程序包时常用的选项和开关。\n\n表 1-3.\n\
  \n构建可执行 `jar` 的常用 JavaPackager 选项\n\n| 选项/开关 | 示例 | 描述 |\n| --- | --- | --- |\n\
  | `-createjar` | `--` | 创建一个 JavaFX `jar` 可执行应用程序。 |\n| `-appclass` | `org.acme.helloworld.HelloWorld`\
  \ | 指定包含 `main()` 方法的类的完全限定名称。 |\n| `-srcdir` | `.` | 存放已编译类的父目录的顶层位置（当前目录）。 |\n\
  | `-outdir` | `out` | 打包后的 `jar` 文件将被创建的目标位置。 |\n| `-outfile` | `helloworld.jar`\
  \ | 指定可执行 `jar` 文件的名称。 |\n| `-v` | `--` | 允许在执行 `javapackager` 时显示详细的日志信息。 |\n|\
  \ `-native` | `dmg` | JavaPackager 可以创建 `installer`、`image`、`exe`、`msi`、`dmg`、`rpm`\
  \ 和 `deb` 文件扩展名，作为原生操作系统平台上的可部署可执行文件。 |\n| `-makeall` |   | 根据操作系统，打包工具将构建安装程序和可执行文件。例如，对于\
  \ MacOS X 平台，`dist/bundle` 目录将包含以下文件扩展名的可执行文件：`jnlp`、`dmg`、`app`、`pkg` 和 `jar`。\
  \ |\n\n要在命令行上运行 `jar` 可执行文件，您只需输入以下内容并按回车键：\n\n```\n$ java -jar dist/bundles/dist.jar\n\
  ```\n\n要在 MacOS X 操作系统上将 HelloWorld 作为独立应用程序启动，只需双击 `bundles` 目录中的 `hellothere`-1.0.dmg\
  \ 或 `hellothere`-1.0.pkg 应用程序文件，如图 1-32 所示。\n\n![A323804_3_En_1_Fig32_HTML.jpg](img/A323804_3_En_1_Fig32_HTML.jpg)\n\
  \n图 1-32.\n\nJava Packager 创建了名为 hellothere 的 HelloWorld 应用程序的可执行文件和安装程序。还存在其他应用程序包，例如\
  \ hellothere-1.0.dmg，用于在 MacOS X 桌面上正确安装该应用程序。\n\n打包和部署 JavaFX 应用程序的方法有很多种。要了解更多信息，请参阅\
  \ Oracle 在以下网址的“Java Packager 指南”：\n\n[`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/javapackager.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/javapackager.html)\n\
