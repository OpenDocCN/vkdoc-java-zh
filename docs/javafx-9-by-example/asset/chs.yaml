- "# 1. 入门指南\n\n要开始使用本书学习 JavaFX 9，你需要搭建开发环境，以便编译和运行书中的众多示例。本章将介绍如何安装所需软件，例如 Java\
  \ 开发工具包（JDK）和 NetBeans 集成开发环境（IDE）。安装完所需软件后，你将开始创建一个传统的 JavaFX HelloWorld 示例。当你熟悉开发环境后，我将带你逐步解析\
  \ JavaFX HelloWorld 的源代码。最后，你将了解如何将应用程序打包为独立的应用程序，以便启动和分发。\n\n我知道许多开发者对自己偏好的 IDE\
  \ 和编辑器情有独钟，因此我也提供了三种编译和运行 HelloWorld 示例的方法。第一种方法使用 NetBeans IDE 编译和运行代码，第二种方法教你如何使用命令行（终端窗口），第三种方法则使用名为\
  \ Gradle 的构建工具来编译和启动 JavaFX 应用程序。第二种和第三种方法适用于不喜欢复杂 IDE 的开发者。如果你更习惯使用 Eclipse 和 IntelliJ\
  \ IDE，那么你会很高兴地知道，Gradle 可以生成相应的项目文件，让你的项目能够轻松加载到这些 IDE 中。\n\n如果你已经熟悉 Java 开发工具包（JDK）、Gradle\
  \ 和 NetBeans IDE 的安装，可以直接跳到第 2 章，该章介绍 Java 9 Jigsaw。让我们开始吧！\n\n## 下载所需软件\n\n在使用本书时，你会发现许多示例可能仍使用\
  \ Java 8 JDK 编写；但第 2 章和其他一些章节将涉及 Java 9 特有的概念，因此需要 Java 9 JDK。Java 平台的主要变化之一是模块化（Jigsaw）。模块化将真正改变你的客户端应用程序。你可能很想知道，“它到底是如何改变的？”\
  \ 想象一下，构建一个在内存和磁盘空间上占用更小空间的 Java 应用程序。这意味着用户将体验到更快的加载速度和更好的用户体验！\n\n话虽如此，请继续下载 Java\
  \ 9 Java 开发工具包（JDK）或更高版本。在本章中，你将看到在 Windows、MacOS X 和 Linux 上安装 JDK 的步骤。你可以从以下网址下载\
  \ Java 9 JDK：\n\n[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
  \n另一个在先前版本中未提及的工具是 Gradle。Gradle 已成为现实世界中构建项目和产物的行业标准。稍后，我将带你了解如何安装 Gradle，但现在请前往\
  \ `gradle.org` 查找下载链接。在下载链接处，你将看到两个二进制发行版。一个是纯二进制发行版，另一个是包含源代码和文档的完整发行版。构建应用程序需要二进制发行版，因此你需要下载它。请前往以下网址下载\
  \ Gradle 的构建工具：\n\n[`https://gradle.org/gradle-download`](https://gradle.org/gradle-download)\n\
  \n对于本书而言，安装集成开发环境（IDE）是可选的；但如果你选择使用 IDE，你将获得代码高亮、代码补全、增量调试、重构以及许多现代开发者便利功能的所有好处。业界最常用的三大\
  \ IDE 是 NetBeans、IntelliJ 和 Eclipse。尽管本书会带你安装 NetBeans IDE，但这并不意味着我们偏爱 NetBeans\
  \ 或任何其他 IDE。我选择 NetBeans 是因为它的发布计划通常与主要 JDK 版本同步，并且它相当成熟，尤其是在工具支持和 JavaFX 应用程序开发方面。NetBeans\
  \ 内置了许多 JavaFX 演示项目（示例模板）和 Scene Builder 工具。Scene Builder 是一个用于可视化构建 JavaFX 用户界面的图形化工具。\n\
  \n另一个专业提示是学习 Gradle 任务，这些任务能够通过单个命令为 IntelliJ 或 Eclipse IDE 生成 Java 项目。要了解更多关于可以自动设置\
  \ IntelliJ 和 Eclipse 项目的 Gradle 任务，请访问以下链接：\n\n*   IntelliJ：[`https://docs.gradle.org/current/userguide/idea_plugin.html`](https://docs.gradle.org/current/userguide/idea_plugin.html)\n\
  *   Eclipse：[`https://docs.gradle.org/current/userguide/eclipse_plugin.html`](https://docs.gradle.org/current/userguide/eclipse_plugin.html)\n\
  \n以下是下载你喜爱的 IDE 的网址：\n\n*   NetBeans：[`https://netbeans.org/downloads`](https://netbeans.org/downloads)\n\
  *   IntelliJ：[`https://www.jetbrains.com/idea/download`](https://www.jetbrains.com/idea/download)\n\
  *   Eclipse：[`https://eclipse.org/downloads`](https://eclipse.org/downloads)\n\n\
  目前，来自 Oracle 公司的 JavaFX 9 支持以下操作系统：\n\n*   Windows 操作系统（Vista、7、8、10）32 位和 64 位\n\
  *   MacOS X（64 位）\n*   Ubuntu Linux 12.x - 13.x（32 位和 64 位）\n\n要查看所有受支持操作系统的详细列表，请访问以下链接：\n\
  \n[`http://jdk.java.net/9/supported`](http://jdk.java.net/9/supported)\n\n虽然你可能看不到你支持的操作系统或硬件，但你会很高兴地了解到\
  \ OpenJDK 和 OpenJFX 项目，它们允许你自己构建 Java 和 JavaFX！要了解更多关于 OpenJDK 或 OpenJFX 的信息，请访问以下网址：\n\
  \n*   OpenJDK：[`http://openjdk.java.net`](http://openjdk.java.net)\n*   OpenJFX：[`https://wiki.openjdk.java.net/display/OpenJFX/Main`](https://wiki.openjdk.java.net/display/OpenJFX/Main)\n\
  \n为你的操作系统下载合适的软件版本后，你将安装 Java 9 JDK、Gradle 和/或你选择的 IDE。\n\n## 安装 Java 9 开发工具包\n\n\
  下载完适用于你特定操作系统的正确 Java 版本后，请按照本节概述的步骤安装 Java 9 JDK。我假设你已经下载了 Oracle 的 Java 9 JDK，但如果没有，请前往以下位置：\n\
  \n[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
  \n在接下来的几节中，你将按照步骤在三种流行的操作系统上安装 Java 9：Microsoft Windows、MacOS X 和 Linux。\n\n\n\n\
  ### 在 Microsoft Windows 上安装 JDK\n\n以下步骤使用适用于 Windows 10 操作系统的 Java 9 JDK 64 位版本。如果你的\
  \ Windows 操作系统不同，请参考以下链接了解更多详情。\n\n[`http://www.oracle.com/technetwork/java/javase/overview/index.html`](http://www.oracle.com/technetwork/java/javase/overview/index.html)\n\
  \n以下是在 Windows 操作系统上安装 Java 9 JDK 的步骤：\n\n1.  右键单击安装程序的可执行文件（`jdk-9-windows-x64.exe`），选择以管理员身份运行，以安装\
  \ Java 9 JDK。通常，其他操作系统也会弹出类似的警告对话框，提醒你安装或运行二进制文件的风险。点击“运行”按钮继续。\n2.  点击“下一步”按钮开始安装过程，如图\
  \ 1-1 所示。\n\n    ![A323804_3_En_1_Fig1_HTML.jpg](img/A323804_3_En_1_Fig1_HTML.jpg)\n\
  \n    图 1-1.\n\n    Java SE Development Kit 9 安装过程\n3.  接下来，你将看到“自定义安装”窗口，允许你选择可选功能，如图\
  \ 1-2 所示。在此处，你只需接受默认选择，然后点击“下一步”按钮继续。\n\n    ![A323804_3_En_1_Fig2_HTML.jpg](img/A323804_3_En_1_Fig2_HTML.jpg)\n\
  \n    图 1-2.\n\n    Java SE Development Kit 9 可选功能\n4.  之后，安装过程将显示一个进度条，如图 1-3 所示。\n\
  \n    ![A323804_3_En_1_Fig3_HTML.jpg](img/A323804_3_En_1_Fig3_HTML.jpg)\n\n    图\
  \ 1-3.\n\n    Java SE Development Kit 9 安装进行中\n5.  接下来，会弹出一个对话框询问你是否要更改 Java 运行时的安装目录。只需点击“下一步”按钮并接受默认目录，如图\
  \ 1-4 所示。\n\n    ![A323804_3_En_1_Fig4_HTML.jpg](img/A323804_3_En_1_Fig4_HTML.jpg)\n\
  \n    图 1-4.\n\n    Java 9 运行时目标目录\n6.  要完成 Java 9 SE Development Kit 的安装，请点击“关闭”按钮退出，如图\
  \ 1-5 所示。\n\n    ![A323804_3_En_1_Fig5_HTML.jpg](img/A323804_3_En_1_Fig5_HTML.jpg)\n\
  \n    图 1-5.\n\n    安装的最后部分提示 Java SE Development Kit 9 已成功安装\n\n### 在 MacOS X 上安装\
  \ JDK\n\n以下步骤使用适用于 MacOS X (El Capitan) 操作系统的 Java 9 JDK 64 位版本。它假设你已经下载了 JDK，并且文件名类似于以下内容：\n\
  \n```\njdk-9-ea-bin-b88-macosx-x86_64-21_oct_2015.dmg\n```\n\n使用以下步骤在 MacOS X 操作系统上安装\
  \ Java 9 JDK：\n\n1.  启动 `dmg` 文件后，你将看到如图 1-6 所示的对话框。接下来，双击图标开始安装过程。\n\n    ![A323804_3_En_1_Fig6_HTML.jpg](img/A323804_3_En_1_Fig6_HTML.jpg)\n\
  \n    图 1-6.\n\n    MacOS X 操作系统上的 Java 9 JDK 安装程序\n2.  接下来，要开始如图 1-7 所示的安装过程，请点击“继续”。在剩余的安装过程中，接受默认设置。\n\
  \n    ![A323804_3_En_1_Fig7_HTML.jpg](img/A323804_3_En_1_Fig7_HTML.jpg)\n\n    图\
  \ 1-7.\n\n    MacOS X 操作系统的 Java 9 JDK 安装程序介绍\n3.  点击“继续”按钮后，对话框将提示 JDK 在你的计算机上占用的磁盘空间大小，如图\
  \ 1-8 所示。点击“安装”按钮继续。\n\n    ![A323804_3_En_1_Fig8_HTML.jpg](img/A323804_3_En_1_Fig8_HTML.jpg)\n\
  \n    图 1-8.\n\n    提示 JDK 将使用多少空间的提示\n4.  出于安全目的，你的 MacOS X 会提示你输入密码以允许安装程序继续，如图\
  \ 1-9 所示。这假设你拥有安装软件的管理员权限。输入密码后，点击“安装软件”按钮启动该过程。\n\n    ![A323804_3_En_1_Fig9_HTML.jpg](img/A323804_3_En_1_Fig9_HTML.jpg)\n\
  \n    图 1-9.\n\n    权限窗口提示输入用户名和密码，以允许 JDK 软件安装在本地机器上\n5.  安装过程将需要几秒钟，如图 1-10 所示。\n\
  \n    ![A323804_3_En_1_Fig10_HTML.jpg](img/A323804_3_En_1_Fig10_HTML.jpg)\n\n  \
  \  图 1-10.\n\n    JDK 安装进行中\n6.  最后，你将点击“关闭”按钮，如图 1-11 所示。这完成了在 MacOS 操作系统上的 JDK\
  \ 安装。\n\n    ![A323804_3_En_1_Fig11_HTML.jpg](img/A323804_3_En_1_Fig11_HTML.jpg)\n\
  \n    图 1-11.\n\n    JDK 安装完成\n\n完成 JDK 安装后，你将在本章后面学习如何设置环境变量。接下来是在基于 Linux 的操作系统上安装\
  \ JDK 9 的说明。\n\n### 在 Linux 上安装 JDK\n\n首先，你应该通过在终端中输入以下命令来确定你的 Linux 系统是 32 位还是\
  \ 64 位架构：\n\n```\n$ uname -m\n```\n\n在 64 位 Linux 机器上的输出如下：\n\n```\nx86_64\n```\n\
  \n在 32 位 Linux 机器上的输出如下：\n\n```\ni686\n```\n\n假设你已从以下位置下载了 Java JDK：\n\n[`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\n\
  \n对于 Linux 世界的用户，你需要下载一个类似以下名称的文件：\n\n*   `jdk-9-bin-b88-linux-i586-21_oct_2015.tar.gz`\n\
  *   `jdk-9-bin-b88-linux-i586-21_oct_2015.rpm`。\n\n找到下载的文件（`*.gz` 或 `*.rpm`），然后转到你的终端窗口开始安装过程。安装过程的说明在下一节中。\n\
  \n注意\n\n在撰写本书时，使用的 Java 9 JDK 是 EA（早期版本）版本，因此 `JAVA_HOME` 目录名称可能会发生变化。请访问 Java 9\
  \ JDK 的安装说明以获取更多详细信息：[`https://docs.oracle.com/javase/9/install/installation-jdk-and-jre-linux-platforms.htm`](https://docs.oracle.com/javase/9/install/installation-jdk-and-jre-linux-platforms.htm)。\n\
  \n#### Fedora、CentOS、Oracle Linux 或 Red Hat Enterprise Linux 操作系统\n\n下载 `gz` 文件后，你需要对其进行解压缩。在\
  \ Fedora、CentOS、Oracle Linux 或 Red Hat Enterprise Linux 操作系统上，输入以下命令来安装 JDK。\n\n\
  如果用户未在 `sudoers` 文件中注册，则需要 `su` 为 `root` 用户来执行以下命令。\n\n```\n$ mv ∼/Downloads/jdk-9-linux-x64.tar.gz\
  \ /tmp\n$ cd /tmp\n$ tar zxvf /tmp/jdk-9-linux-x64.tar.gz\n$ sudo mkdir /opt/jdk/\n\
  $ sudo mv jdk-9 /opt/jdk\n```\n\n如果你下载了 Java 9 JDK 的 `rpm` 版本，请使用以下命令：\n\n```\n\
  $ sudo rpm -ivh jdk-9-linux-x64.rpm\n```\n\n\n\n#### Red Hat 替代方案\n\n在系统上安装 JDK\
  \ 9 后，你可能会遇到之前安装的其他 Java 版本。基于 Red Hat/CentOS 的操作系统提供了一种在 JDK 和 JRE 之间切换的方法。由于你已将\
  \ JDK 9 安装在 `/opt/jdk` 目录中，你需要使用 `alternatives` 将新的 JDK 9 注册为默认 Java。\n\n首先，让我们在\
  \ `alternatives` 中注册新安装的 Java 可执行文件。你需要输入以下命令。这些命令将更新所有索引，以优先级 `100` 注册 Java，并显示所有已安装的已注册\
  \ Java 运行时。\n\n```\n$ sudo update\n$ sudo alternatives --install /usr/bin/java java\
  \ /opt/jdk/jdk-9/bin/java 100\n```\n\n接下来，你需要设置刚刚添加的默认 Java 版本。\n\n```\n$ sudo alternatives\
  \ --config java\nThere are 3 programs which provide 'java'.\nSelection    Command\n\
  \n* 1          /opt/jdk/jdk1.8.0_51/bin/java\n+ 2          /opt/jdk/jdk1.8.0_66/bin/java\n\
  3          /opt/jdk/jdk-9/bin/java\nEnter to keep the current selection[+], or type\
  \ selection number: 3\n```\n\n要测试 `alternatives` 是否指向了正确的版本，只需在终端窗口中输入以下内容：\n\n\
  ```\n$ java -version\n```\n\n输出如下：\n\n```\njava version \"1.9.0-ea\"\nJava(TM) SE\
  \ Runtime Environment (build 1.9.0-ea-b90)\nJava HotSpot(TM) 64-Bit Server VM (build\
  \ 1.9.0-ea-b90, mixed mode)\n```\n\n你还需要为 `javac` 编译器配置替代方案，执行与之前类似的步骤。\n\n```\n\
  $ sudo alternatives --install /usr/bin/javac javac /opt/jdk/jdk-9/bin/javac 100\n\
  $ sudo alternatives --config javac\nThere are 3 programs which provide 'javac'.\n\
  Selection    Command\n\n* 1          /opt/jdk/jdk1.8.0_51/bin/javac\n+ 2       \
  \   /opt/jdk/jdk1.8.0_66/bin/javac\n3          /opt/jdk/jdk-9/bin/javac\n```\n\n\
  要测试 `alternatives` 是否指向了正确的 Java 编译器版本，只需输入以下内容：\n\n```\n$ javac -version\njavac\
  \ 1.9.0-ea\n```\n\n#### Ubuntu/Debian\n\n当使用 Ubuntu 或 Debian Linux 时，你可以通过两种方式获取\
  \ Oracle 的 Java JDK。第一种方式是使用 `apt-get` 命令，第二种方式是从前面提到的官方网站下载 JDK。\n\n使用 Ubuntu 或\
  \ Debian，你可以使用 `apt-get` 命令下载并安装 Oracle 的官方 JDK 9：\n\n```\n$ sudo apt-get update\n\
  $ sudo apt-get install oracle-java9-installer\n```\n\n从 Oracle 下载站点下载 Linux 版本后，你可以手动解压\
  \ `gz` 文件。对于 Ubuntu/Debian Linux 发行版，打开终端并输入以下命令：\n\n```\n$ mv ∼/Downloads/jdk-9-linux-x64.tar.gz\
  \ /tmp\n$ cd /tmp\n$ tar zxvf jdk-9-linux-x64.tar.gz\n$ sudo mv jdk-9 /usr/lib/jvm/\n\
  ```\n\n在 Ubuntu/Debian 系统上安装 JDK 9 后，你可能会遇到之前安装的其他 Java 版本。基于 Ubuntu/Debian 的操作系统提供了一种通过名为\
  \ `update-alternatives` 的工具在 JDK 和 JRE 之间切换的方法。假设你已使用 `apt-get` 安装了 JDK 9，它通常会将\
  \ JDK 放在 `/usr/lib/jvm` 目录中。现在，你需要使用 `alternatives` 来注册新的 JDK 9（`java` 和 `javac`）。\n\
  \n##### 默认 Java\n\n输入以下命令在 `alternatives` 中注册新的 JDK：\n\n```\n$ sudo update\n$ sudo\
  \ update-alternatives --install /usr/bin/java java /usr/lib/jvm/jdk-9-linux-x64/bin/java\
  \ 100\n```\n\n接下来，你需要将新注册的 `java` 设置为默认版本。输入以下命令：\n\n```\n$ sudo update-alternatives\
  \ --config java\nThere are 2 choices for the alternative java (providing /usr/bin/java).\n\
  Selection    Path                                      Priority   Status\n\n* 0\
  \            /usr/lib/jvm/java-8-openjdk/jre/bin/java  1061       auto mode\n1 \
  \           /usr/lib/jvm/java-9-oracle/bin/java       100        manual mode\nPress\
  \ enter to keep the current choice[*], or type selection number: 1\n$ sudo update-alternatives\
  \ --display java\nSelection    Path                                       Priority\
  \   Status\n\n0            /usr/lib/jvm/java-8-openjdk/jre/bin/java   1061     \
  \  auto mode\n* 1            /usr/lib/jvm/java-9-oracle/bin/java        100    \
  \    manual mode\n```\n\n##### 默认 Javac\n\n你还需要切换 `javac` 编译器。要设置 Java 编译器，输入以下命令来注册新的\
  \ `javac`：\n\n```\n$ sudo update-alternatives --install /usr/bin/javac javac /usr/lib/jvm/jdk-9-linux-x64/bin/javac\
  \ 100\n$ sudo update-alternatives --config javac\nThere are 2 choices for the alternative\
  \ javac (providing /usr/bin/javac).\nSelection    Path                         \
  \           Priority   Status\n\n* 0            /usr/lib/jvm/java-8-openjdk/bin/javac\
  \   1061       auto mode\n1            /usr/lib/jvm/java-9-oracle/bin/javac    100\
  \        manual mode\nPress enter to keep the current choice[*], or type selection\
  \ number: 1\n$ sudo update-alternatives --config javac\nThere are 2 choices for\
  \ the alternative javac (providing /usr/bin/javac).\nSelection    Path         \
  \                           Priority   Status\n\n0            /usr/lib/jvm/java-8-openjdk/bin/javac\
  \   1061       auto mode\n* 1            /usr/lib/jvm/java-9-oracle/bin/javac  \
  \  100        manual mode\n```\n\n\n\n## 设置环境变量\n\n如果你没有使用 `aternatives` 的便捷功能来指向默认的\
  \ Java 二进制文件，你可以通过设置 Java 环境变量，采用传统方式来完成。本章未提及还有其他策略可以轻松切换 Java 版本，但理解 Java 的环境变量将使你能够在任何操作系统上安装和开发\
  \ Java 应用程序。\n\n首先，你需要设置并更新几个重要的环境变量。如何设置它们以及它们应被设置的值，取决于你所选择的操作系统。需要设置的两个变量如下：\n\
  \n*   `JAVA_HOME`：告知操作系统 Java 安装目录的位置。\n*   `PATH`：指定 Java 可执行文件目录的位置。此环境变量允许系统搜索包含可执行文件的路径或目录。Java\
  \ 可执行文件位于 `JAVA_HOME` 主目录下的 `bin` 目录中。\n\n以下是在 32 位 Windows 操作系统中需要设置的环境变量：\n\n\
  ```\nset JAVA_HOME=\"C:\\Program Files (x86)\\Java\\jdk-9\"\nset PATH=%JAVA_HOME%\\\
  bin;%PATH%\n```\n\n在 64 位 Windows 中设置相同的变量，但值略有不同：\n\n```\nset JAVA_HOME=\"C:\\\
  Program Files\\Java\\jdk-9\"\nset PATH=%JAVA_HOME%\\bin;%PATH%\n```\n\n注意\n\n根据\
  \ JDK 版本的不同，`JAVA_HOME` 路径的名称会根据安装的版本而变化。例如，如果下一个版本命名为 JDK 9.0.1，那么路径很可能显示为 `JAVA_HOME=\"\
  C:\\Program Files\\Java\\jdk-9.0.1\"`。要查看 Java 9 的 JDK 和 JRE 版本命名方案，请访问以下链接：\n\n\
  [`http://openjdk.java.net/jeps/223`](http://openjdk.java.net/jeps/223) 和\n\n[`https://blogs.oracle.com/java-platform-group/a-new-jdk-9-version-string-scheme`](https://blogs.oracle.com/java-platform-group/a-new-jdk-9-version-string-scheme)\
  \ 。\n\n在类 Unix 平台（如 MacOS X 和 Linux）上，你的设置以及设置方式取决于你使用的 shell。以下示例分别展示了如何为 Bash、Bourne\
  \ 和 CSH shell 设置所需的变量。\n\n```\n# Mac OS X /bin/bash\nexport JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-9.jdk/Contents/Home\n\
  export PATH=$PATH:$JAVA_HOME/bin\n# Linux bash, bourne shell environments /bin/bash\n\
  export JAVA_HOME=/usr/java/jdk-9 export PATH=$PATH:$JAVA_HOME/bin\n#csh environments\
  \ /bin/csh\nsetenv JAVA_HOME /usr/java/jdk-9\nsetenv PATH ${JAVA_HOME}/bin:${PATH}\n\
  ```\n\n这些语句将仅为当前终端窗口会话临时设置环境变量。为了使 `JAVA_HOME` 和 `PATH` 更持久，你需要将它们添加到系统中，以便在登录时始终可用，这样无论何时启动或登录，它们都会被加载。根据你的操作系统，你需要能够编辑环境变量名称和值。\n\
  \n### 设置 Windows 环境变量\n\n在 Windows 环境中，你可以使用键盘快捷键 Windows 徽标键+Pause/Break 键，然后点击“高级系统设置”（左侧链接）以显示“系统属性”窗口，如图\
  \ 1-12 所示。\n\n![A323804_3_En_1_Fig12_HTML.jpg](img/A323804_3_En_1_Fig12_HTML.jpg)\n\
  \n图 1-12.\n\n系统属性窗口\n\n接下来，点击“环境变量”按钮。此时，你可以添加、编辑和删除环境变量。你将使用已安装的主目录作为值来添加或编辑 `JAVA_HOME`\
  \ 环境变量。Windows 操作系统上的“环境变量”窗口如图 1-13 所示。\n\n![A323804_3_En_1_Fig13_HTML.jpg](img/A323804_3_En_1_Fig13_HTML.jpg)\n\
  \n图 1-13.\n\nWindows 环境变量窗口\n\n要添加 `JAVA_HOME` 环境变量，请点击图 1-13 中所示的“新建”按钮。\n\n点击“新建”按钮后，将出现图\
  \ 1-14 所示的窗口，允许你输入环境变量名称和值。完成后，点击“确定”按钮。\n\n![A323804_3_En_1_Fig14_HTML.jpg](img/A323804_3_En_1_Fig14_HTML.jpg)\n\
  \n图 1-14.\n\n用于输入 JAVA_HOME 环境变量的添加/编辑窗口\n\n点击“确定”添加 `JAVA_HOME` 后，你需要更新 `Path`\
  \ 环境变量，如图 1-15 所示。在“系统变量”区域中选择 `Path` 环境变量。然后，点击“编辑”按钮。\n\n![A323804_3_En_1_Fig15_HTML.jpg](img/A323804_3_En_1_Fig15_HTML.jpg)\n\
  \n图 1-15.\n\n编辑 Path 环境变量\n\n在 Windows 10 中，你需要通过添加一个新条目来编辑 `Path` 环境变量，如图 1-16\
  \ 所示。在此处，你将添加一个类似 `%JAVA_HOME%\\bin` 的条目。要添加条目，请点击“新建”按钮。如果条目已存在，请点击“编辑”按钮。这允许系统识别\
  \ `JAVA_HOME` 的 `bin` 目录中的所有二进制可执行文件。换句话说，当你在终端或命令行提示符下时，系统将能够识别诸如 Java 编译器的 `javac.exe`\
  \ 之类的文件。\n\n![A323804_3_En_1_Fig16_HTML.jpg](img/A323804_3_En_1_Fig16_HTML.jpg)\n\
  \n图 1-16.\n\n将 %JAVA_HOME%\\bin 添加到 Path 环境变量\n\n在图 1-16 中，`%JAVA_HOME%\\bin` 条目位于列表底部，但我通过点击“上移”按钮将其移到了顶部。\n\
  \n\n\n### 设置 MacOS X/Linux 环境变量\n\n若要在 MacOS X 或 Linux 上永久设置环境变量，你可以使用 nano 或 vim\
  \ 等常见文本编辑器。但在编辑用户 shell 配置文件之前，建议先备份一份，以防操作失误。由于许多 Unix 和 Linux 系统使用不同的 shell，我详细列出了需要复制和编辑的典型文件。\n\
  \n在 Mac 上，输入以下命令：\n\n```\n$ cp ∼/.bash_profile ∼/.bash_profile.orig\n```\n\n在 Linux\
  \ 操作系统上，你需要输入以下命令来确定当前使用的 shell 类型，然后才能知道要复制和编辑哪个文件。不同的 shell 在创建控制台会话时使用不同的文件来导出环境变量。\n\
  \n```\n$  echo $0\n-bash\n```\n\n如果输出显示 `-bash`，则需要备份并编辑主目录下的 `.bashrc` 文件。如果输出显示\
  \ `-csh`，则需要备份并编辑主目录下的 `.cshrc` 文件。接下来，在编辑前先复制 `.bashrc` 文件作为备份。\n\n```\n$ cp ∼/.bashrc\
  \ ∼/.bashrc.orig\n```\n\n如果你使用的是 Linux 操作系统且 shell 为 C shell，请输入以下命令：\n\n```\n$\
  \ cp ∼/.cshrc ∼/.cshrc.orig\n```\n\n现在，你需要使用 nano 或 vi 文本编辑器编辑刚刚备份的文件。要加载文件，请输入以下命令：\n\
  \n```\n$ nano ∼/.bash_profile\n```\n\n或者\n\n```\n$ vi ∼/.bash_profile\n```\n\n请注意，我使用的是\
  \ MacOS X 操作系统 `home` 目录下的 `∼/.bash_profile` 文件。相信你会根据你的 Linux 操作系统和 shell 类型，将其替换为相应的文件。从上一个命令加载文件后，你需要执行编辑、保存和退出编辑器的操作。表格\
  \ 1-1 和 1-2 分别快速列出了 nano 和 vim 的常用命令。\n\n*   要为 MacOS X 平台设置 `JAVA_HOME`，你需要打开一个终端窗口，编辑主目录下的\
  \ `.bash_profile` 文件（例如，`nano ∼/.bash_profile`），并在文件末尾添加 `export` 命令：\n\n```\n \
  \   # Mac OS X /bin/bash\n    export JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-9.jdk/Contents/Home\n\
  \    export PATH=$PATH:$JAVA_HOME/bin\n    ```\n\n*   在 Linux 和其他使用 Bash shell 环境的\
  \ Unix 操作系统上，打开一个终端窗口，编辑 `∼/.bashrc` 或 `∼/.profile` 文件，使其包含 `export` 命令。添加 `export`\
  \ 命令。\n\n```\n    # Linux bash, bourne shell environments /bin/bash\n    export\
  \ JAVA_HOME=/usr/java/jdk-9\n    export PATH=$PATH:$JAVA_HOME/bin\n    ```\n\n*\
  \   在 Linux 和其他使用 C shell (csh) 环境的 Unix 操作系统上，打开一个终端窗口，编辑 `∼/.cshrc` 或 `∼/.login`\
  \ 文件，使其包含 `setenv` 命令。添加 `export` 命令。\n\n```\n    #csh environments\n    setenv\
  \ JAVA_HOME /usr/java/jdk-9\n    setenv PATH ${JAVA_HOME}/bin:${PATH}\n    ```\n\
