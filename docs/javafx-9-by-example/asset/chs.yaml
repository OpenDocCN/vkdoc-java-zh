  /* 来自 TriangleMeshes.java */

  //步骤 3c：添加一些其他颜色的金字塔

  Group pyramid3 = buildPyramid(100,200,Color.LAWNGREEN,true,true);

  pyramid3.setTranslateX(100);

  Group pyramid4 = buildPyramid(100,200,Color.LAWNGREEN,true,false);

  pyramid4.setTranslateX(100);

  pyramid4.setTranslateY(-100);

  pyramid4.setRotationAxis(Rotate.Z_AXIS);

  pyramid4.setRotate(180);

  Group pyramidGroup = new Group(pyramid1,pyramid2,pyramid3,pyramid4);

  sceneRoot.getChildren().addAll(pyramidGroup);

  清单 11-13.

  创建并变换不同颜色的金字塔

  ```


  清单 11-12 和 11-13 清晰地展示了 `TriangleMesh` 和 `MeshView` 类在 3D 场景中的灵活性。将此代码添加到示例中，将提供类似于图
  11-12 的视图。


  ![A323804_3_En_11_Fig12_HTML.jpg](img/A323804_3_En_11_Fig12_HTML.jpg)


  图 11-12.


  多个自定义并变换后的金字塔


  ### 旋转摄像机！


  新的金字塔看起来仍然有些扁平。你需要一种方法来让摄像机围绕金字塔旋转，就像卫星绕着一个原点旋转一样。事实上，清单 11-14 通过添加一个简单的鼠标处理器，并将鼠标移动转换为
  `pyramidGroup` 自身的旋转变换，将 `pyramidGroup` 视为某种原点。


  ```

  /* 来自 TriangleMeshes.java */

  //步骤 4a：为旋转添加鼠标处理器

  Rotate xRotate = new Rotate(0, Rotate.X_AXIS);

  Rotate yRotate = new Rotate(0, Rotate.Y_AXIS);

  pyramidGroup.getTransforms().addAll(xRotate,yRotate);

  //使用绑定，这样你的旋转就不必重新创建

  xRotate.angleProperty().bind(angleX);

  yRotate.angleProperty().bind(angleY);

  //仅在按下鼠标按钮时开始跟踪鼠标移动

  scene.setOnMousePressed(event -> {

  scenex = event.getSceneX();

  sceney = event.getSceneY();

  anchorAngleX = angleX.get();

  anchorAngleY = angleY.get();

  });

  //仅在按下鼠标按钮时计算角度变化

  scene.setOnMouseDragged(event -> {

  angleX.set(anchorAngleX - (scenex -  event.getSceneY()));

  angleY.set(anchorAngleY + sceney -  event.getSceneX());

  });

  清单 11-14.

  固定原点的摄像机旋转鼠标处理器

  ```


  这种摄像机控制与之前的示例不同，它实际上并不移动或旋转摄像机节点，而是移动场景中的对象。这给观察者和摄像机正在围绕场景旋转的错觉。这是一种用于查看面向内部场景的有效方法。诀窍是使用
  JavaFX 绑定来更新一组现有的 Rotate 对象。这避免了事件处理器反复创建和替换各种变换对象。通过将此处理器添加到示例中并旋转它，你可以获得类似于图 11-13
  的视角。


  ![A323804_3_En_11_Fig13_HTML.jpg](img/A323804_3_En_11_Fig13_HTML.jpg)


  图 11-13.


  围绕固定原点旋转摄像机


  图 11-13 中显示的视图尤其好，因为它展示了各种金字塔的不同形态。特别值得注意的是金字塔底部的底面，它由两个三角形组成，采用顺时针缠绕，使得它们的“下”面朝外指向摄像机。




  ### 点亮灯光


  在这个自定义金字塔示例中，我们已经走了很远，但 3D 几何图形看起来仍然有点卡通化。这是因为光照，特别是场景光照。要真正展示 3D 表面，你必须在场景中添加一个点光源。清单
  11-15 为示例场景添加了一个简单的点光源。


  ```

  /* 来自 TriangleMeshes.java */

  //步骤 4b：添加点光源以显示镜面高光

  PointLight light = new PointLight(Color.WHITE);

  sceneRoot.getChildren().add(light);

  light.setTranslateZ(-sceneWidth/2);

  light.setTranslateY(-sceneHeight/2);

  清单 11-15.

  向场景添加点光源

  ```


  清单 11-15 包含一些基本的平移操作，将光源移动到默认摄像机位置以外的位置，从而在每个填充的`Pyramid`的`PhongMaterials`上创建一些漂亮的镜面高光。将清单
  11-15 添加到示例中并旋转摄像机，可以提供如图 11-14 所示的良好视图。


  ![A323804_3_En_11_Fig14_HTML.jpg](img/A323804_3_En_11_Fig14_HTML.jpg)


  图 11-14.


  点光源对各种金字塔 TriangleMesh 对象的影响


  ## 总结


  正如本章开头所提到的，可以专门用一本书来讨论 JavaFX 9 的 3D 支持。有许多功能被提及但未讨论，因为它们需要整章的篇幅。整本书都致力于 3D 软件开发中的数学和抽象概念，因此这些内容没有详细讨论。


  希望本章能浅尝辄止地介绍可能实现的功能，并希望能激发你学习 JavaFX 9 提供的新 3D 支持的兴趣。本章包含两个独立的运行示例，讨论了图元、摄像机节点、光照以及自定义几何体和三角形网格的用法。两个示例都展示了事件驱动的交互，并采用了不同的方法来通过键盘和鼠标操作摄像机或场景对象。你了解了一系列类，其中一些专门用于
  3D 支持，另一些则足够通用，可以应用于 3D 或 2D 场景。利用本章提供的基础构件，可以开发出非常实用且高效的 3D 工具。


