  \ `transitionByFading()` 将创建一个包含两个过渡的顺序过渡。如清单 7-30 所示，方法 `transitionByFading()`\
  \ 将返回一个要执行的 `SequentialTransition` 实例。\n\n```\nprivate SequentialTransition transitionByFading(Image\
  \ nextImage,\nImageInfo imageInfo) {\n// fade out image view node\nFadeTransition\
