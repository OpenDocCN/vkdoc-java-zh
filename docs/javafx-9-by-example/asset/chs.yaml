  事件的处理代码就附加到了 `StackPane` 上，用于切换显示哪个按钮形状，并更新布尔属性 `playAndPauseToggle`。


  布尔属性变量 `playAndPauseToggle` 被设置为 `false`。`playAndPauseToggle` 属性负责实际暂停和播放媒体播放器。在
  `createButtonPanel()` 方法接近末尾处，一个更改监听器被附加到 `playAndPauseToggle` 属性上，该监听器会在值发生变化时做出响应。此处显示的代码来自代码清单
