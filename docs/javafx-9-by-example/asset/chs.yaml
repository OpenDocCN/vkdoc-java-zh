- '# 9. 媒体与 JavaFX


  JavaFX 提供了一个功能丰富的媒体 API，能够播放音频和视频。Media API 允许开发者将音频和视频集成到他们的富互联网应用程序（RIA）中。Media
  API 的主要优势之一是它能够通过网络分发跨平台的媒体内容。鉴于一系列设备（平板电脑、音乐播放器、电视等）都需要播放多媒体内容，一个跨平台的 API 至关重要。


  想象一下不远的未来，你的电视或墙壁能够以你从未梦想过的方式与你互动。例如，在观看电影时，你可以选择电影中使用的服装并立即购买，而这一切都在舒适的家中完成。基于这样的未来展望，开发者们致力于增强其媒体应用程序的交互特性。


  在本章中，你将学习如何以交互方式播放音频和视频。请就座，音频和视频即将成为舞台的焦点。


  你将学习以下 JavaFX 媒体 API：


  *   `javafx.scene.media.Media`

  *   `javafx.scene.media.MediaPlayer`

  *   `javafx.scene.media.MediaStatus`

  *   `javafx.scene.media.MediaView`




  ## 媒体事件


  事件驱动架构（EDA）是一种重要的架构模式，用于建模异步传递消息的松散耦合组件和服务。JavaFX 团队将 Media API 设计为事件驱动。在本节中，您将学习如何与媒体事件进行交互。


  基于事件编程的思想，您在调用媒体功能时会发现非阻塞或回调行为。您无需通过 `EventHandler` 直接将代码绑定到按钮，而是实现响应媒体播放器 `OnXXXX`
  事件触发的代码，其中 `XXXX` 是事件名称。


  在响应媒体事件时，您将实现 `java.lang.Runnable` 函数式接口（lambda 表达式）。这些函数式接口是回调，它们会被延迟求值，或在稍后某个事件触发时被调用。例如，在播放媒体内容时，您会创建一个
  lambda 表达式并将其设置在 `OnReady` 事件上。有关基于事件驱动方法播放媒体的示例，请参见以下代码块：


  ```

  Media media = new Media(url);

  MediaPlayer mediaPlayer = new MediaPlayer(media);

  Runnable playMusic = () -> mediaPlayer.play();

  mediaPlayer.setOnReady(playMusic);

  ```


  如您所见，`playMusic` 变量被赋值为一个 lambda 表达式（`Runnable`），并传递给媒体播放器的 `setOnReady()` 方法。当
  `OnReady` 事件发生时，`playMusic Runnable` 闭包代码将被调用。虽然我尚未讨论如何设置 `Media` 和 `MediaPlayer`
  类实例，但我希望先让您熟悉这些核心概念，然后再继续深入，因为这些概念将在本章中贯穿使用。


  表 9-1 显示了所有可能触发的媒体事件，允许开发者附加 `Runnables`（或 `EventHandlers`）。除了 `OnMarker` 事件外，以下所有事件都是
  `Runnable` 函数式接口。


  表 9-1.


  Media 和 MediaPlayer 事件


  | 类 | 事件设置方法 | 事件属性方法 | 描述 |

  | --- | --- | --- | --- |

  | `Media` | `setOnError()` | `onErrorProperty()` | 当发生错误时 |

  | `MediaPlayer` | `setOnEndOfMedia()` | `onEndOfMediaProperty()` | 当媒体播放到达末尾时 |

  | `MediaPlayer` | `setOnError()` | `onErrorProperty()` | 当发生错误时；状态变为 [`MediaPlayer.Status`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/media/MediaPlayer.Status.html)
  `HALTED` |

  | `MediaPlayer` | `setOnHalted()` | `onHaltedProperty()` | 当媒体状态变为 `HALTED` 时 |

  | `MediaPlayer` | `setOnMarker()` | `onMarkerProperty()` | 当 `Marker` 事件被触发时 |

  | `MediaPlayer` | `setOnPaused()` | `onPausedProperty()` | 当状态为 [`MediaPlayer.Status.PAUSED`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/media/MediaPlayer.Status.html#PAUSED)
  时 |

  | `MediaPlayer` | `setOnPlaying()` | `onPlayingProperty()` | 当媒体正在播放时。当状态为 [`MediaPlayer.Status`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/media/MediaPlayer.Status.html)
  `PLAYING` 时 |

  | `MediaPlayer` | `setOnReady()` | `onReadyProperty()` | 当媒体播放器处于 `Ready` 状态时。当状态为
  [`MediaPlayer.Status`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/media/MediaPlayer.Status.html)
  `READY` 时 |

  | `MediaPlayer` | `setOnRepeat()` | `onRepeatProperty()` | 当播放器的 `currentTime` 达到
  `stopTime` 并即将重复时调用的事件处理器。此回调在回退到 `startTime` 之前执行 |

  | `MediaPlayer` | `setOnStalled()` | `onStalledProperty()` | 当媒体状态变为 `STALLED` 时
  |

  | `MediaPlayer` | `setOnStopped()` | `onStoppedProperty()` | 当状态 `stopped` 被触发时。
  [`MediaPlayer.Status.STOPPED`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/media/MediaPlayer.Status.html#STOPPED)
  |


  ## 播放音频


  JavaFX 的媒体 API 支持加载扩展名为 `.mp3`、`.wav` 和 `.aiff` 的音频文件。此外，JavaFX 8 新增了播放 HTTP 直播流格式（也称为
  HLS，文件扩展名 `.m3u8`）音频的功能。HLS 超出了本书的范围，本章将不进行介绍，但通过进一步研究，JavaFX 可用于构建实时广播应用程序。


  在 JavaFX 中播放音频文件非常简单。给定一个有效的文件 URL 位置，您可以实例化一个 `javafx.scene.media.Media` 类来加载资源。然后将
  `Media` 对象传递给 `javafx.scene.media.MediaPlayer` 对象构造函数的新实例，以创建媒体播放器控件。最后一步是在 `OnReady`
  事件触发时调用媒体播放器对象的 `play()` 方法，此时媒体文件将开始播放。要实现在加载后自动播放媒体文件，可以使用 `setAutoPlay()` 方法将媒体播放器的自动播放属性设置为
  true。以下代码加载并播放位于 Web 服务器上的 MP3 音频文件：


  ```

  Media media = new Media("http://some_host/eye_on_it.mp3");

  MediaPlayer  mediaPlayer = new MediaPlayer(media);

  mediaPlayer.setAutoPlay(true);

  ```


  注意


  加载媒体文件时，请确保文件位置是遵循标准 URL 规范的格式化字符串：[`https://www.w3.org/Addressing/URL/url-spec.txt`](https://www.w3.org/Addressing/URL/url-spec.txt)
  和 [`https://url.spec.whatwg.org`](https://url.spec.whatwg.org) 。


  只要文件名字符串的格式遵循标准 URL 规范，媒体文件可以位于 Web 服务器、JAR 文件或本地文件系统中。


  注意


  对于低延迟的音频文件播放，请使用 `javafx.scene.media.AudioClip` 类。一个典型的场景是连续多次播放给定的声音，例如游戏中使用的音效。


  ### MP3 播放器示例


  现在您已经知道如何加载和播放音频媒体，让我们看一个有趣的示例，该示例涉及播放音乐并显示彩色可视化效果。在本节中，您将学习如何创建一个 MP3 音频播放器。在探索清单
  9-1 中的示例代码之前，请先查看图 9-1 以预览音频播放器的用户界面。当音频文件正在播放时，频谱显示会以面积图的形式呈现。音频播放器的控件允许您查看正在播放的媒体的进度，并执行停止、暂停和播放操作。在图
  9-1 中，背景是白色的；然而，实际代码会以黑色背景显示。在打印纸上，最好避免大面积的深色区域。


  ![A323804_3_En_9_Fig1_HTML.jpg](img/A323804_3_En_9_Fig1_HTML.jpg)


  图 9-1.


  一个 JavaFX 音频播放器


  在此示例中，您将再次使用文件拖放隐喻，就像在第 7 章处理图像时一样。同样，用户导航到本地文件系统或浏览器 URL 地址栏，找到要拖放到应用程序界面上的媒体文件。对于
  MP3 播放器，您将找到文件格式和扩展名为 `.mp3`、`.wav` 或 `.aif` 的音频文件用于此示例。


  如图 9-1 所示，MP3 播放器根据媒体的音频频谱信息显示一个面积折线图。音频播放器在右下角有一个自定义按钮面板控件。按钮面板控件允许用户暂停、继续和停止播放音乐。您还会注意到左下角的搜索位置滑块（也称为进度和搜索位置滑块），它允许用户观看音乐播放的进度，也可以在媒体（音频或视频）中向前或向后搜索。当允许用户向前或向后搜索时，需要先暂停音频或视频。




  #### 停止、播放和暂停按钮


  图 9-2 左侧的图像显示了停止（方形）和播放（三角形楔形）按钮。当点击停止按钮时，媒体的起始时间将重新定位到文件的开头。当点击暂停按钮时，媒体将保持其在媒体播放中的当前位置。此外，当媒体暂停时，播放按钮会出现，以便用户可以恢复音乐。图
  9-2 右侧的图像显示了包含停止和暂停按钮（带有两条垂直线的圆形）的按钮面板。当音乐正在播放时，用户可以点击暂停按钮来暂停音乐。


  ![A323804_3_En_9_Fig2_HTML.jpg](img/A323804_3_En_9_Fig2_HTML.jpg)


  图 9-2.


  带有停止（矩形）、播放（三角形）和暂停（圆形）按钮的自定义按钮面板控件


  #### 进度和定位滑块控件


  接下来，您会注意到应用程序窗口左下角的进度和定位滑块控件，如图 9-3 所示。假设媒体处于暂停状态，定位滑块控件允许您在媒体的当前时间中向前或向后移动。此外，滑块的“拇指”（箭头）会随着媒体播放的进行从左向右移动。


  ![A323804_3_En_9_Fig3_HTML.jpg](img/A323804_3_En_9_Fig3_HTML.jpg)


  图 9-3.


  定位滑块控件允许用户在音频文件播放时监控进度


  #### 关闭按钮


  最后，请注意图 9-4 中所示的关闭按钮，它允许用户退出应用程序。


  ![A323804_3_En_9_Fig4_HTML.jpg](img/A323804_3_En_9_Fig4_HTML.jpg)


