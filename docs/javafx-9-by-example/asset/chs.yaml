  \ Arduino Due 基于 Atmel SAM3X8E ARM Cortex-M3 CPU，是首款基于 32 位 ARM 内核的 Arduino 开发板。\n\
  \n得益于预编程的引导加载程序，程序可以直接从连接的计算机轻松上传到微控制器内存中。\n\nUno 提供 14 个数字 I/O 引脚和 6 个模拟输入，采用排母形式，因此可以安装扩展板，或者将简单的跳线连接到所需引脚。闪存为\
  \ 32KB，时钟频率为 16MHz。更多详细信息可在此处查看：[`http://arduino.cc/en/Main/ArduinoBoardUno`](http://arduino.cc/en/Main/ArduinoBoardUno)。图\
