  一个基本的 JavaFX 视频播放器


  要创建视频播放器，您只需复用之前的 MP3 音频播放器示例，并进行非常小的调整。代码与 MP3 音频播放器示例几乎完全相同，只是将可视化组件（`Path`）替换为了
  `javafx.scene.media.MediaView` 节点，如图 9-7 所示。


  由于核心功能未变，您将体验到相同的功能，例如媒体文件的快进、停止、暂停和播放。视频播放器新增的另一个功能是，可以通过双击应用程序窗口区域将视频切换至全屏模式。要恢复舞台窗口，请再次双击或按
  Esc 键。


