  \ 的其余部分展示了使用伪类来处理鼠标悬停（`:hover`）状态的 CSS 选择器，当鼠标光标进入或离开节点时触发。当鼠标悬停在上一张和下一张箭头按钮上时，按钮会应用蓝色发光效果。在第\
  \ 15 章中，你将有机会了解更多关于类选择器和伪类状态的内容。\n\n好了，这就是一个功能完善的 Photo Viewer 应用程序，能够对图像进行缩放、旋转和更改颜色设置。为了在图形主题上获得更多乐趣，下一节将介绍\
  \ JavaFX 动画 API。\n\n## 动画\n\n动画是图像随时间变化时产生运动错觉的效果。类似于卡通翻页书，每一页代表一个帧或图片，它们会在时间线上显示一段时间（持续时间）。在\
  \ JavaFX 中，你将使用动画 API（[`javafx.animation`](https://docs.oracle.com/javase/8/javafx/api/javafx/animation/Animation.html)\
  \ `.*`）。在本节中，你将学习关键值、关键帧、时间线和过渡。最后，为了演示动画 API，你将探索一个经过略微修改并增加了增强功能的 Photo Viewer\
  \ 应用程序。\n\n### 什么是关键值？\n\nJavaFX 动画 API 允许你组装定时事件，这些事件可以在基于属性的值之间进行插值，从而产生动画效果。例如，要产生淡出效果，你可以针对节点的透明度属性，使其值在一段时间内从\
  \ 1（完全不透明）插值到 0（透明）。代码清单 7-24 定义了一个 `KeyValue` 实例，它针对矩形节点的透明度属性，从 1 开始，以值 0 结束。默认情况下，`KeyValue`\
  \ 对象将使用线性插值器。\n\n```\nRectangle Rectangle rectangle = new Rectangle(0, 0, 50, 50);\n\
  KeyValue keyValue = new KeyValue(rectangle.opacityProperty(), 0);\n代码清单 7-24.\n\
  一个 KeyValue 对象，通过将透明度属性从 1 插值到 0 来实现淡出效果\n```\n\n`KeyValue` 对象实际上并不进行插值，它只是定义了要进行插值的属性的起始值和结束值。此外，`KeyValue`\
  \ 可以使用不同类型的插值器来定义，例如线性、缓入或缓出。例如，代码清单 7-25 定义了一个关键值，它将使用 `Interpolator.EASE_OUT`\
  \ 插值器，将一个矩形从左向右移动 100 像素。缓出会在到达结束关键值之前减慢移动速度。\n\n```\nRectangle rectangle = new\
  \ Rectangle(0, 0, 50, 50);\nKeyValue keyValue = new KeyValue(rectangle.xProperty(),\
  \ 100, Interpolator.EASE_OUT);\n代码清单 7-25.\n一个 KeyValue 对象，使用插值器将矩形从左向右移动 100 像素，该插值器在接近结束值时开始减速\n\
  ```\n\n请访问 Javadocs 文档以了解可用的插值器（[`javafx.animation.Interpolator`](https://docs.oracle.com/javase/8/javafx/api/javafx/animation/Interpolator.html)）。默认情况下，未指定插值器的\
  \ `KeyValue` 构造函数将使用线性插值（`Interpolator.LINEAR`），它会在一段时间内均匀分布这些值。\n\n### 什么是关键帧？\n\
  \n当动画（[`javafx.animation.Timeline`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)）发生时，每个称为关键帧（一个\
  \ `KeyFrame` 对象）的定时事件负责在一段时间（[`javafx.util.Duration`](https://docs.oracle.com/javase/8/javafx/api/javafx/util/Duration.html)）内对关键值（`KeyValue`\
  \ 对象）进行插值。创建 `KeyFrame` 对象时，构造函数需要一个定时持续时间来对关键值进行插值。`KeyFrame` 构造函数都通过使用包含参数列表的变量或\
  \ `KeyValue` 对象的集合来接受一个或多个关键值。\n\n为了演示将矩形沿对角线方向从左上角移动到右下角，代码清单 7-26 定义了一个关键帧，其持续时间为\
  \ 1000 毫秒，并包含两个表示矩形 x 和 y 属性的关键值。\n\n```\nRectangle rectangle = new Rectangle(0,\
  \ 0, 50, 50);\nKeyValue xValue = new KeyValue(rectangle.xProperty(), 100);\nKeyValue\
  \ yValue = new KeyValue(rectangle.yProperty(), 100);\nKeyFrame keyFrame = new KeyFrame(Duration.millis(1000),\
  \ xValue, yValue);\n代码清单 7-26.\n为矩形定义的关键帧，使其在一秒内沿对角线从左上角移动到右下角\n```\n\n此示例定义了一个关键帧，用于在一秒或\
  \ 1000 毫秒内将矩形的左上角 (0, 0) 移动到点 (100, 100)。既然你已经知道如何定义关键帧，那么你需要使用 `Timeline` 实例来执行动画。\n\
  \n\n\n### 什么是时间线？\n\n时间线是由多个 `KeyFrame` 对象组成的动画序列。每个 `KeyFrame` 对象按顺序运行。由于时间线是抽象类\
  \ `javafx.animation.Animation` 的子类，因此它具有标准属性，例如循环次数和自动反转，你可以对这些属性进行设置。循环次数是你希望时间线播放动画的次数。如果你希望循环次数无限播放动画，请使用值\
  \ `Timeline.INDEFINITE`。自动反转属性是一个布尔标志，用于指示动画是否可以反向播放时间线（即按相反顺序播放关键帧）。默认情况下，循环次数设置为\
  \ 1，自动反转设置为 `false`。\n\n要向 `Timeline` 对象添加关键帧，请使用 `getKeyFrames().addAll()` 方法。清单\
  \ 7-27 演示了一个无限播放（循环）的时间线，并将自动反转设置为 `true`，以使动画序列能够反向播放。创建了一个 `Timeline` 实例，其循环次数设置为无限运行，自动反转设置为\
  \ `true`，以允许动画序列反向播放。\n\n```\nTimeline timeline = new Timeline();\ntimeline.setCycleCount(Timeline.INDEFINITE);\n\
  timeline.setAutoReverse(true);\ntimeline.getKeyFrames().addAll(keyFrame1, keyFrame2);\n\
  timeline.play();\n清单 7-27.\n一个无限重复动画的时间线实例\n```\n\n掌握了时间线的这些知识后，你现在可以在 JavaFX 中为任何场景图节点制作动画。尽管你可以通过底层方式创建时间线，但对于简单的动画来说，这种技术可能会变得非常繁琐。你可能想知道是否有更简单的方法来表达常见的动画效果，例如淡入淡出、缩放和平移。好消息是！JavaFX\
  \ 提供了内置的过渡动画（扩展了 `Transition` 类），这些是用于执行常见动画效果的便捷类。\n\n### JavaFX 过渡类\n\nJavaFX\
  \ API 支持称为过渡类的常见动画。过渡类继承自 `javafx.animation.Animation` 类，类似于前面讨论的 `Timeline`。过渡类是创建应用于\
  \ JavaFX `Node` 对象的常见动画的更简单方法。\n\n以下是一些最常见的过渡动画类，以及每个类的简要说明：\n\n*   `javafx.animation.FadeTransition`\n\
  *   `javafx.animation.PathTransition`\n*   `javafx.animation.ScaleTransition`\n\
  *   `javafx.animation.TranslateTransition`\n\n淡入淡出过渡（`FadeTransition`）针对节点的透明度属性，以实现淡入淡出动画效果。路径过渡（`PathTransition`）使节点能够沿着生成的路径（`javafx.scene.shape.Path`）移动。`ScaleTransition`\
  \ 过渡针对节点的 `scaleX`、`scaleY` 和 `scaleZ` 属性来调整节点大小。平移过渡（`TranslateTransition`）针对节点的\
  \ `translateX`、`translateY` 和 `translateZ` 属性，以在屏幕上移动节点。我只列出了几种常见的过渡——还有更多我没有讨论的过渡，因此我鼓励你查看\
  \ `javafx.animation.Transition` 类子类的 Javadocs 文档。\n\n## 点击式游戏示例\n\n为了演示你在本章中学到的最常见的\
  \ JavaFX 动画过渡，我创建了一个简单的点击式游戏。为了让你了解点击式游戏的背景，在 90 年代，有许多流行的益智类游戏，允许玩家仅通过使用鼠标点击来探索和开启任务。其中一个著名的点击式游戏叫做《神秘岛》（参见\
  \ [`http://cyan.com/games/myst`](http://cyan.com/games/myst)）。游戏《神秘岛》一开始就将玩家抛入一个神秘的海岛世界，通过检查物体和寻找暗门来探索并解决各种谜题。\n\
  \n在图 7-8 所示的点击式游戏中，玩家将看到演示大多数常见 JavaFX 动画过渡的动画。在这个点击式游戏示例中，玩家可以点击物品来解锁额外的动画。\n\n\
