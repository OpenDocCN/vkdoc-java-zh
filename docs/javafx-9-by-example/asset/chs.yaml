  #### 使用 AudioSpectrumListener 接口更新可视化效果


  还记得之前讨论过的 MP3 音频播放器在播放音乐时，频谱区域图表会像跳舞一样动态变化的效果吗？我们仍然在 `playMedia()` 方法中，来看看如何实现这种迷人的效果。


  继续 `playMedia()` 方法，代码将获取之前创建的、ID 为 `chart-area` 的 `Path` 节点。下面这行代码使用根节点的 `lookup()`
  方法检索该 `Path` 节点：


  ```

  // 获取图表路径区域

  Path chartArea = (Path) root.lookup("#chart-area");

  ```


  接下来，代码使用一个 `AudioSpectrumListener`（lambda 表达式）实例来设置媒体播放器的音频频谱监听器。该监听器会定期收到音频频谱的更新通知。以下代码再次来自清单
  9-1。它展示了如何根据幅度数组，使用线性渐变颜色更新 `Path` 节点（图表区域）。清单 9-6 展示了使用音频频谱数据绘制的面积图。每隔一个时间间隔，音频频谱数据就会绘制一个面积图。根据根面板的大小和定义的图表内边距，代码将使用幅度数组数据绘制一个闭合路径，并用线性渐变填充。


  ```

  int chartPadding = 5;

  // 频域为 X 轴。

  // freqAxisY 是频域轴的 Y 坐标。

  double freqAxisY = root.getHeight() - 45;

  // 图表的高度

  double chartHeight = freqAxisY - chartPadding;

  // 在 CSS 文件中，内边距设置如下：

  //   -fx-border-insets: 6 6 6 6; (上, 右, 下, 左)

  //   -fx-border-width: 1.5;

  // 下面的内边距将等于 7.5，这是内边距 6（左）和边框宽度 1.5 的合并值

  double padding = root.getBorder().getInsets().getLeft();

  double chartWidth = root.getWidth() - ((2 * padding) + (2 * chartPadding));

  // 音频声音以分贝为单位，幅度范围从 0 到 -60

  // 对幅度进行平方运算可以拉伸绘图。同时，除以图表高度可以归一化或将 y 坐标保持在图表边界内。

  double scaleY = chartHeight / (60 * 60);

  double space = 5; // 每个数据点之间的间距。有助于在宽度方向上拉伸图表。

  mediaPlayer.setAudioSpectrumListener(

  (double timestamp,

  double duration,

  float[] magnitudes,

  float[] phases) -> {

  if (mediaPlayer.getStatus() == Status.PAUSED || mediaPlayer.getStatus() == Status.STOPPED)
  {

  return;

  }

  // freqBarX 是要绘制的 x 坐标

  double freqBarX = padding + chartPadding;

  // scaleX 是一个单位。这确保绘图保持在图表宽度区域内。

  double scaleX = chartWidth / (magnitudes.length * space);

  // 检查数据数组是否已创建。

  // 如果未创建，则创建要添加到 chartArea 路径中的路径组件数量。

  // 检查大小减 3 是为了排除第一个 MoveTo 元素，以及最后两个元素 LineTo 和 ClosePath。

  if ((chartArea.getElements().size() - 3) != magnitudes.length) {

  // 移动到图表的左下角。

  chartArea.getElements().clear();

  chartArea.getElements().add(new MoveTo(freqBarX, freqAxisY));

  // 更新所有 LineTo 元素以绘制折线图

  for(float magnitude:magnitudes) {

  double dB = magnitude * magnitude;

  dB = chartHeight - dB * scaleY;

  chartArea.getElements().add(new LineTo(freqBarX, freqAxisY - dB));

  freqBarX+=(scaleX * space);

  }

  // 通过添加 LineTo 到图表的右下角来闭合路径，并闭合路径以形成一个形状。

  chartArea.getElements().add(new LineTo(freqBarX, freqAxisY));

  chartArea.getElements().add(new ClosePath());

  } else {

  // 如果元素已创建

  // 遍历并更新路径元素

  int idx = 0;

  for(float magnitude:magnitudes) {

  double dB = magnitude * magnitude;

  dB = chartHeight - dB * scaleY;

  // 跳过路径中的第一个 MoveTo 元素。

  idx++;

  // 使用 x 和 y 更新元素

  LineTo dataPoint = (LineTo) chartArea.getElements().get(idx);

  dataPoint.setX(freqBarX);

  dataPoint.setY(freqAxisY - dB);

  freqBarX += (scaleX * space);

  }

  }

  });

  清单 9-6.

  使用音频频谱数据绘制的面积图

  ```


  清单 9-6 基于 `Path` 元素创建了一个面积图，用于表示特定频率下的幅度。从图表的设置开始，代码在根面板的左侧内边距之后定义了五个像素的内边距。接着，声明了
  `freqAxisY` 变量，用于存储绘制频域轴（x 轴）的 y 坐标。然后，定义并计算了 `chartHeight` 和 `chartWidth` 变量。由于已知的内边距和边框宽度是在
  CSS 中定义的，代码将调用根面板的 `getBorder().getInsets().getLeft()` 方法来获取左侧内边距的计算值。内边距是内边距和边框宽度的合并值。


  在图 9-6 中，`freqAxisY` 变量是面积图底部的屏幕 y 坐标（固定值），代表 x 轴上的频域。dB 是一个计算值，表示特定频率下的分贝数，用于绘制每个幅度（数据点）的
  y 坐标。


  ![A323804_3_En_9_Fig6_HTML.jpg](img/A323804_3_En_9_Fig6_HTML.jpg)


  图 9-6.

  面积图的 x 轴（freqAxisY）和 y 轴（dB）




  在计算面积图的位置、宽度和高度后，需要一个 `scaleY` 变量来帮助归一化或将绘图点保持在应用程序窗口边界内。Y 轴代表分贝值，某些幅度值可能会绘制到显示表面之外（图表外）。最后定义的变量是间距变量，它将用于表示每个待绘制数据点之间的像素数。


  接下来是有趣的部分——创建频谱面积图可视化。媒体播放器可以定期接收音频频谱数据的通知。默认情况下，每 0.1 秒（100 毫秒）发出一次更新。当然，你可以通过调用媒体播放器的
  `setAudioSpectrumInterval(double)` 方法来更改间隔。为了响应音频频谱通知更新，代码调用了媒体播放器的 `setAudioSpectrumListener()`。该方法签名如下所示：


  ```

  mediaPlayer.setAudioSpectrumListener(

  (double timestamp,

  double duration,

  float[] magnitudes,

  float[] phases)

  ```


  根据 Javadoc 文档，该监听器是一个观察者，负责接收音频频谱的定期更新。通俗地说，它代表音频媒体的声音数据，例如音量、节奏等。要创建 `AudioSpectrumListener`
  的实例，你需要创建一个 lambda 表达式，其参数对应接口方法 `spectrumDataUpdate()` 的参数。表 9-3 列出了音频频谱监听器方法的所有入参。更多详细信息，请参考
  `javafx.scene.media.AudioSpectrumListener` 的 Javadoc 文档。


  表 9-3.


  AudioSpectrumListener 的 spectrumDataUpdate() 方法入参


  | 参数 | 数据类型 | 示例 | 描述 |

  | --- | --- | --- | --- |

  | `timestamp` | `Double` | `2.4261` | 事件发生的时间，以秒为单位。 |

  | `duration` | `Double` | `0.1` | 计算频谱所花费的时间（以秒为单位）。 |

  | `magnitudes` | `float[]` | `-50.474` | 一个浮点值数组，表示每个频段的频谱幅度（以分贝为单位，为非正浮点值）。 |

  | `phases` | `float[]` | `1.22` | 一个浮点值数组，表示每个频段的相位。每个值的范围在 `-Math.PI` 和 `+Math.PI`
  之间。 |


  监听器的代码首先检查媒体播放器的当前状态是否为“暂停”或“停止”。如果是，则立即返回。如果状态既不是“暂停”也不是“停止”，那么就开始绘制频谱面积图。代码首先声明并预先计算变量，以包含数据点的起始
  x 坐标值。`scaleX` 变量用于缩放点，确保它们在图表宽度范围内。接下来是初始化图表的 `Path` 节点对象。图表的 `Path` 节点将使用 `Path`
  元素进行初始化，以根据传入的幅度数组形成一个闭合路径。


  在创建面积图的形状时，第一个 `Path` 元素将是 `MoveTo`。最后两个 `Path` 元素将是 `LineTo` 和 `ClosePath` 元素。最后两个
  `Path` 元素从最后一个数据点绘制到图表的右下角（可见的 x 轴），然后使用 `ClosePath` 元素闭合路径。位于第一个和最后一个元素之间的 `Path`
  元素将在每个更新间隔内更新。由于所有幅度值都是介于 0 和 -60 之间的负数，因此使用这些值的平方来表示数据点的振幅或峰值。由于图表本质上是一个形状，因此可以用颜色填充。在本例中，代码将使用基于色谱（红橙黄绿蓝靛紫）的线性渐变来填充图表。以下代码片段是
  JavaFX 的 `fill` 属性，为面积图形状分配了线性渐变。


  ```

  -fx-fill: linear-gradient(from 5 5 to 5 225,

  rgba(255, 0, 0, .70) 0%,    /* 红色    */

  rgba(255, 165, 0, .70) 40%, /* 橙色 */

  rgba(255, 255, 0, .70) 70%, /* 黄色 */

  rgba(0, 255, 0, .70) 80%,   /* 绿色  */

  rgba(0, 0, 255, .70) 90%,   /* 蓝色   */

  rgba(75,0,128,.70) 95%,     /* 靛色 */

  rgba(238,130,238,.70) 100%) /* 紫色 */

  ```


