  \n## 总结\n\n到目前为止，您已经成功下载并安装了 Java 9 JDK、Gradle 和 NetBeans IDE。成功安装必备软件后，您通过 NetBeans\
  \ IDE 创建了一个 JavaFX HelloWorld GUI 应用程序。然后，您能够使用文本编辑器输入源代码，并最终通过命令行提示符（终端窗口）编译和运行二进制类。您学到的另一种方法是使用\
  \ Gradle 构建工具，通过任务来编译和启动 JavaFX 应用程序。\n\n在学习了编译、构建和运行 JavaFX 应用程序的三种方法之后，您快速浏览了\
  \ `HelloWorld.java` 源文件的代码。您还学习了如何使用 JavaFX Packager 工具将 JavaFX 应用程序打包为独立的 `jar`、`dmg`、`pkg`\
  \ 和 `jnlp` 可执行文件。最后，您了解到有两个地方可以获取本书的源代码。\n\n接下来，在第 2 章中，您将了解 JDK 9 中关于项目 Jigsaw\
  \ 的新特性。如果您了解 JDK 9 的模块化并且没有耐心，可以直接跳到第 3 章学习 JavaFX 9 的基础知识，例如绘制和着色形状以及绘制文本和更改文本字体。\n\
  \n\n\n"
- "# 2. JavaFX 与 Jigsaw\n\n在软件架构的早期，许多设计者和实践者常常强调模块化代码的理念。显然，将软件服务或 API 拆分成模块是合理的；然而，根据你与谁交谈，“模块”这个词对不同的人有不同的含义。例如，使用\
  \ Apache Maven 构建工具的开发者通常会将 `jar` 制品视为模块，而有些人则认为制品内的包也是模块。那么，在 Java 世界中，“模块”一词究竟意味着什么？\n\
  \n在本章中，你将探索模块化对于新的 Java 9 平台意味着什么。你还将学习在 JavaFX 应用程序的上下文中如何使用 Java 平台模块系统（JPMS）。本章是对\
  \ Java 9 模块系统的温和介绍，涵盖了常见的使用场景，例如将模块用作库依赖项。\n\n话虽如此，我不会深入详细地介绍每一个模块化用例（相信我，它们相当多）。即使在撰写本文时，关于其他用例的讨论仍在进行中，可能超出了预期的范围。例如，关于自动模块的概念以及模块应如何[命名](http://download.java.net/java/jigsaw/docs/api/java/lang/module/ModuleFinder.html#of-java.nio.file.Path%E2%80%A6-)的讨论仍在继续。尽管专家小组和行业领袖在缺失功能与范围需求之间反复争论，但我相信\
  \ Java 社区将就一个强大的模块系统达成（善意的）共识，以满足实际中的大多数用例。要了解更多关于 Java 9 Jigsaw 主题的信息，我在本书的附录中列出了相关的\
  \ JSR、书籍和链接。\n\n作为一个通用声明，特别是针对新的 Java 9 平台模块系统，我将提醒你注意以下内容。\n\n声明\n\n当你阅读本书时，Java\
  \ 9 的模块系统已经发布。由于 Java 9 的模块系统是全新的，语言规范、API、术语和概念可能会发生变化。本章是基于 Java 9 的早期访问版本编写的。\n\
  \n以下是阅读本章关于 Java 9 模块系统时应遵循的章节列表。如果你已经了解 Java 9 模块系统的背景及其历史，可以直接跳到“入门”部分。\n\n* \
  \  什么是 Project Jigsaw？\n*   历史（Java 9 之前）\n*   入门\n*   结论\n\n## 什么是 Project Jigsaw？\n\
  \nJava 模块化，也称为“Project Jigsaw”，是一项旨在让开发者能够在 Java 平台上以更易于管理的方式划分和封装代码的努力。通过将代码划分为模块，应用程序代码将更加松散耦合，而不是一个单一的应用程序。通过良好的封装，可以定义模块以安全地向其他模块暴露（导出）API。Java\
  \ 的新模块系统还将向后兼容 Java 9 之前的代码和库（非模块化代码）。划分和封装代码不仅是很好的原则，还有其他额外的好处，你将在后面看到。\n\n根据 Mark\
  \ Reinhold 对 JSR 376（Project Jigsaw）的总结：\n\n> 该 JSR 的总体目标是为 Java 平台定义一个易于理解且可扩展的模块系统。它将是易于理解的，即易于学习和使用，以便开发者能够使用它来构建和维护适用于\
  \ Java SE 和 Java EE 平台的库和大型应用程序。它将是可扩展的，以便能够用于将 Java SE 平台本身及其实现模块化。——Mark Reinhold，Oracle\
  \ Java 平台组首席架构师，2015 年 4 月 1 日\n\n### 优势\n\n根据 Project Jigsaw 官方网站（[`http://openjdk.java.net/projects/jigsaw`](http://openjdk.java.net/projects/jigsaw)）的说法，以下是\
  \ Java 平台上模块系统的主要目标和优势：\n\n> 为了实现这些目标，我们提议为 Java SE 平台设计和实现一个标准的模块系统，并将该系统应用于平台本身以及\
  \ JDK。该模块系统应足够强大，能够将 JDK 和其他大型遗留代码库模块化，同时仍然对所有开发者易于理解。——Project Jigsaw 网站，2016 年\
  \ 12 月 21 日\n\n*   使 Java SE 平台和 JDK 更容易向下扩展到小型计算设备\n*   提高 Java SE 平台实现（尤其是 JDK）的整体安全性和可维护性\n\
  *   实现改进的应用程序性能\n*   使开发者更容易为 Java SE 和 EE 平台构建和维护库及大型应用程序\n\n正如前面提到的关于应用程序划分的内容，这些优势还可以导致应用程序缩小规模，以适应更小的计算设备，例如基于\
  \ ARM 的计算机。随着微服务成为在云和基于容器的应用程序环境中开发的标准，模块化代码还将有助于 Java SE 和 Java EE 平台的维护和安全性。\n\
  \n由于模块为可靠的配置构建铺平了道路，应用程序将占用更小的空间，从而提高内存和加载时间方面的性能。一个例子是模块化的 JavaFX 应用程序由于加载的模块集更小，启动速度得以提升。在\
  \ Java 9 之前，应用程序是使用整个 Java 运行时开发和打包的。这些应用程序必须加载许多未使用的库，例如 `corba` 或 `sql` 包。\n\n\
  将 Java 代码（Java 9）模块化时的其他优势被列为 Java 增强提案：\n\n*   模块化运行时映像（JEP 220，位于 [`http://openjdk.java.net/jeps/220`](http://openjdk.java.net/jeps/220)）\n\
  *   Java 模块链接器（JEP 282，位于 [`http://openjdk.java.net/jeps/282`](http://openjdk.java.net/jeps/282)）\n\
  *   提前编译（JEP 295，位于 [`http://openjdk.java.net/jeps/295`](http://openjdk.java.net/jeps/295)）\n\
  \nJEP 220 是关于 Java SE 平台模块化运行时映像的增强提案。架构师们重构了整个 Java 运行时平台，例如其目录和核心库。重构运行时平台将有助于提高安全性、性能和可管理性。例如，像\
  \ `rt.jar`、`tools.jar` 和 `jfxrt.jar` 这样的库将不再可访问，而是全部被分解到模块中。\n\nJava 9 中的新功能是 jlink，即\
  \ Java 链接器（JEP 282）。jlink 是一个通过将模块及其依赖项链接到自定义运行时映像中来组装和构建应用程序的工具。为了创建自定义运行时映像，Java\
  \ 链接器与运行时的结构方式（JEP 220）结合使用。换句话说，这两个 JEP 本质上是步调一致的。\n\n提到的三个 JEP 中的最后一个是 JEP 295，即提前编译。它更广为人知的名字是\
  \ AOT 编译。尽管它被认为是实验性的，但 AOT 编译器能够将 Java 代码转换为 Linux 操作系统上的原生代码。这在环境没有安装 Java 运行时的情况下具有很好的优势。另一个优势是速度。由于代码是静态编译的，因此无需进行\
  \ JIT（即时）编译或预热。此功能将用于小型设备或高效服务器（网络设备）。当你阅读本文时，AOT 编译将支持主流操作系统。\n\n通过这三个重要的 Java\
  \ 增强提案协同工作，你将开始看到构建得更简单、更轻量、更快速且原生的基于 Java 的应用程序。\n\n\n\n### 缺点\n\n尽管设计模块化代码有许多好处，但也存在一些缺点。部分缺点如下：\n\
  \n*   定义模块和依赖关系时会增加额外的复杂性。\n*   由于涉及各种构建工具和集成开发环境（IDE），多个模块没有标准的项目结构。\n*   当将传统的非模块化代码与模块化代码混合使用时，类路径和模块路径会同时生效。调试代码和解决依赖关系可能会更加困难。\n\
  *   传统的依赖项可能永远不会被重写为 Java 9 模块，这可能会带来向后或向前兼容的风险。\n\n### Java 9 迁移路径\n\n既然你已经了解了新\
  \ Java 平台模块系统的优缺点，你可能仍然因为未知的风险而犹豫不决。也许你认为它还是太新了。为了缓解任何潜在的焦虑，Oracle 创建了一份优秀的指南，帮助你迁移传统的\
  \ Java 应用程序到 Java 9。大胆去做吧！\n\n迁移指南位于此处：[`https://docs.oracle.com/javase/9/migrate`](https://docs.oracle.com/javase/9/migrate)\
  \ 。此外，你应该在此处查看 JDK 9 中的重要变更：[`https://docs.oracle.com/javase/9/whatsnew/toc.htm`](https://docs.oracle.com/javase/9/whatsnew/toc.htm)\
  \ 。\n\n该指南非常详细地解释了 Java 9 中的变化，以及如何使用平台模块和第三方库。迁移指南还介绍了一个名为 `jdeps` 的分析工具。\n\n####\
  \ jdeps 分析工具\n\n当对你的应用程序代码运行 `jdeps` 时，该工具会检查代码，以确定它是否依赖于已弃用的依赖项或 JDK 内部 API。例如，该分析工具会建议应被替换的\
  \ API。一些建议会为使用以 `com.sun.*`、`sun.misc.*` 等开头的包的代码提供替代方案。例如，如果你创建了一个未模块化的 Java 应用程序，同时引用了像\
  \ `com.sun.*` 这样的非公共包，`jdeps` 工具可以提供一个可供使用的替代模块。\n\n以下是对一个 Java 8 编译的类文件调用 `jdeps`\
  \ 工具后的输出。\n\n```\n$ jdeps -cp . com/jfxbe/helloworld/HelloWorld.class\nHelloWorld.class\
  \ -> java.base\nHelloWorld.class -> javafx.base\nHelloWorld.class -> javafx.controls\n\
  HelloWorld.class -> javafx.graphics\nHelloWorld.class -> jdk.httpserver\ncom.jfxbe.helloworld\
  \ -> com.sun.net.httpserver  jdk.httpserver\ncom.jfxbe.helloworld -> java.lang \
  \              java.base\ncom.jfxbe.helloworld -> javafx.application      javafx.graphics\n\
  com.jfxbe.helloworld -> javafx.collections      javafx.base\ncom.jfxbe.helloworld\
  \ -> javafx.event            javafx.base\ncom.jfxbe.helloworld -> javafx.scene \
  \           javafx.graphics\ncom.jfxbe.helloworld -> javafx.scene.control    javafx.controls\n\
  com.jfxbe.helloworld -> javafx.stage            javafx.graphics\n```\n\n分析输出显示了\
  \ `HelloWorld.class` 文件所使用的平台模块的摘要和详细信息。你会注意到 `com.sun.net.httpserver` 可以在 `jdk.httpserver`\
  \ 模块中找到。假设你的应用程序依赖于 `com.sun.net.httpserver.HttpServer` 类，那么向 Java 模块迁移的建议意味着你需要创建一个\
  \ `module-info.java` 文件，将 `jdk.httpserver` 模块作为依赖项引入。\n\n让我们再看一个例子，对一个 Java 9 模块化应用程序的\
  \ JAR 文件使用 `jdeps` 工具。\n\n以下是通过显示依赖信息来分析一个模块化 JAR 应用程序的示例。\n\n*   `-summary` 或 `-s`\
  \ 打印依赖摘要。\n*   `-verbose` 或 `-v` 打印所有类级别的依赖。\n\n```\n$ jdeps -v helloworld.jar\n\
  ```\n\n以下是运行 `jdeps` 后的输出：\n\n```\n$ jdeps -v mlib/com.jfxbe.helloworld.jar\ncom.jfxbe.helloworld\n\
  [file:///Users/cpdea/JavaFX9byExample/Code/jfx9be/chap02/helloworld/mlib/com.jfxbe.helloworld.jar]\n\
  requires mandated java.base (@9-ea)\nrequires javafx.base (@9-ea)\nrequires javafx.controls\
  \ (@9-ea)\nrequires javafx.graphics (@9-ea)\nrequires jdk.httpserver (@9-ea)\ncom.jfxbe.helloworld\
  \ -> java.base\ncom.jfxbe.helloworld -> javafx.base\ncom.jfxbe.helloworld -> javafx.controls\n\
  com.jfxbe.helloworld -> javafx.graphics\ncom.jfxbe.helloworld -> jdk.httpserver\n\
  com.jfxbe.helloworld.HelloWorld   -> com.jfxbe.helloworld.HelloWorld$1 com.jfxbe.helloworld\n\
  com.jfxbe.helloworld.HelloWorld   -> com.sun.net.httpserver.HttpServer jdk.httpserver\n\
  com.jfxbe.helloworld.HelloWorld   -> java.lang.Object                  java.base\n\
  com.jfxbe.helloworld.HelloWorld   -> java.lang.String                  java.base\n\
  com.jfxbe.helloworld.HelloWorld   -> java.lang.Throwable               java.base\n\
  com.jfxbe.helloworld.HelloWorld   -> javafx.application.Application    javafx.graphics\n\
  com.jfxbe.helloworld.HelloWorld   -> javafx.collections.ObservableList javafx.base\n\
  com.jfxbe.helloworld.HelloWorld   -> javafx.event.EventHandler         javafx.base\n\
  com.jfxbe.helloworld.HelloWorld   -> javafx.scene.Group                javafx.graphics\n\
  com.jfxbe.helloworld.HelloWorld   -> javafx.scene.Parent               javafx.graphics\n\
  com.jfxbe.helloworld.HelloWorld   -> javafx.scene.Scene                javafx.graphics\n\
  com.jfxbe.helloworld.HelloWorld   -> javafx.scene.control.Button       javafx.controls\n\
  com.jfxbe.helloworld.HelloWorld   -> javafx.stage.Stage                javafx.graphics\n\
  com.jfxbe.helloworld.HelloWorld$1 -> com.jfxbe.helloworld.HelloWorld   com.jfxbe.helloworld\n\
  com.jfxbe.helloworld.HelloWorld$1 -> java.io.PrintStream               java.base\n\
  com.jfxbe.helloworld.HelloWorld$1 -> java.lang.Object                  java.base\n\
  com.jfxbe.helloworld.HelloWorld$1 -> java.lang.String                  java.base\n\
  com.jfxbe.helloworld.HelloWorld$1 -> java.lang.System                  java.base\n\
  com.jfxbe.helloworld.HelloWorld$1 -> javafx.event.ActionEvent          javafx.base\n\
  com.jfxbe.helloworld.HelloWorld$1 -> javafx.event.Event                javafx.base\n\
  com.jfxbe.helloworld.HelloWorld$1 -> javafx.event.EventHandler         javafx.base\n\
  com.jfxbe.helloworld.HelloWorld$1 -> javafx.stage.Stage                javafx.graphics\n\
  ```\n\n对你的代码运行 `jdeps` 后，该工具会告知你是否存在任何内部 API。正如你在输出中所见，`HelloWorld` 类依赖于以下内部 API：\n\
  \n```\ncom.sun.net.httpserver.HttpServer.\n```\n\n关于本书源代码的另一点需要注意的是，你会发现部分源代码是 Java\
  \ 8 或 Java 9 的。尽管如此，你会很高兴地知道，新的 Java 9 编译器能够按原样（未模块化）编译 Java 8 源代码。加载到类路径上的模块路径类会被放置到一个未命名模块中，并且所有公共包都是可导出的（可读取访问）。\n\
  \n注意\n\n某些章节使用了本书先前版本的 Java 8 源代码，而另一些章节则使用了 Java 9 源代码（模块）。无需惊慌，因为 Java 9 JDK 之前的源代码可以简单地编译和运行。换句话说，如果你遇到\
  \ Java 8 源代码，只需将其视为常规（传统）Java 代码或未模块化代码即可。\n\n\n\n#### 终止开关\n\n在某些情况下，已迁移到 Java\
  \ 9（模块化代码）的遗留代码可能会引发类型为 `IllegalAccessException` 的运行时异常。这是因为代码使用了反射 API 和 Jigsaw\
  \ 的强封装。\n\nOracle 的工程师决定提供一个终止开关，允许在使用反射时绕过非法访问检查。其目的是给开发者更多时间将代码迁移到 Java 9 模块；然而，该终止开关将在\
  \ Java 10 中被移除。以下是使用终止开关绕过所引发的运行时异常的示例。\n\n```\n$ java --permit-illegal-access -jar\
  \ xyz.jar\n```\n\n你可以查看完整解释此内容的技术说明，网址为：\n\n```\nhttp://mail.openjdk.java.net/pipermail/jigsaw-dev/2017-March/011763.html\n\
  ```\n\n假设你已被说服，并准备踏上 Java Jigsaw 的列车，那么让我们继续讨论从过去到现在的模块。接下来，我将详细阐述用作模块的 Java JAR\
  \ 文件的历史。如果你觉得 Java 模块（Java 9 之前）的历史有点无聊，可以直接跳到“入门”部分。\n\n## 历史\n\n那么，模块化应用和依赖管理并非新鲜事？对吧？！\n\
  \n最初，Java 开发者创建了由类和资源文件压缩而成的单个 Java 归档文件，称为 JAR。每个 JAR 文件被视为 Java 应用程序中的一个模块。当每个\
  \ JAR 文件从类路径加载时，包中的任何公共 API 都可以从该库中访问。虽然访问各种 API 很方便，但情况开始失控，由此产生了臭名昭著的术语“JAR 地狱”。（实际上，它最初源自术语“DLL\
  \ 地狱”，这是使用 C/C++ 开发微软操作系统的开发者创造的，因为存在动态链接库文件（`*.dll`），在解析共享库的依赖关系时遇到了类似的问题。）\n\n\
  ### JAR 地狱\n\n术语“JAR 地狱”通常指 JVM 的类路径类型解析或依赖解析（在单个类加载器上）。例如，如果你有两个 JAR 文件，都包含一个 `Person`\
  \ 类，但两者具有略有不同的方法或属性（两个不同版本），你可能会想知道在实例化 `new Person()` 类时会使用哪一个？\n\n当然，这取决于类加载顺序，但默认情况下，JVM\
  \ 会按照在类路径上指定的顺序加载类，例如命令行上的 `-cp` 开关。通常，第一个加载的类将被使用（遮蔽第二个）。一些 Web 应用环境可以强制执行加载顺序，例如父优先或子优先。你可以看到，当你试图调试应用程序却不知道它正在使用哪个\
  \ `Person` 类时，这会多么令人困惑。\n\n由于这些已知问题，许多 Java 专家成立了 OSGi 联盟，旨在创建标准规范，作为在 Java 平台上开发模块化应用的第一步。下一节将简要介绍\
  \ Java OSGi 模块系统。\n\n### OSGi\n\n随着 Java 应用程序变得越来越大，拥有众多依赖关系，管理起来很快就变成了一场噩梦。自 2000\
  \ 年以来，为了解决 Java 模块化问题，OSGi 联盟成立，旨在为基于 Java 的模块化和面向服务的系统创建开放标准规范。OSGi 的目标是提供一个规范，供供应商创建应用程序容器的实现。应用程序容器包含称为“捆绑包”的\
  \ JAR 文件，这些文件可以在不重启 JVM 的情况下动态加载。\n\n简而言之，每个 JAR 捆绑包在 `META-INF/manifest.mf` 文件中包含描述其他捆绑包依赖关系的元数据。根据规范，还有许多其他方式可以导出包和封装捆绑包。由于每个捆绑包（模块）都在单独的类加载器中加载，同一\
  \ JVM 上可以共存同一 Java 类的不同版本。例如，`模块 A` 依赖于模块 `com.foo.bar-1.0.jar`，而 `模块 B` 依赖于模块 `com.foo.bar-2.0.jar`，如图\
  \ 2-1 所示。两个 JAR 文件都是捆绑包，各自包含自己的模块定义（`manifest.mf`）。\n\n![A323804_3_En_2_Fig1_HTML.jpg](img/A323804_3_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1.\n\n一个包含四个不同捆绑包的 OSGi 容器。这里，模块 A 依赖于模块 com.foo.bar 版本 1.0，模块 B 依赖于模块 com.foo.bar\
  \ 版本 2.0。\n\n假设容器已经包含了 `com.foo.bar` 的两个版本的 JAR 捆绑包，开发者将定义 `模块 A` 的清单，如清单 2-1 所示，以及\
  \ `模块 B` 的清单，如清单 2-2 所示。\n\n```\nManifest-Version: 1.0\nBundle-ManifestVersion:\
  \ 2\nBundle-Name: module-a\nBundle-SymbolicName: com.carlfx.myservice1\nBundle-Version:\
  \ 1.0.0\nBundle-Activator: com.carlfx.myservice1.Activator\nImport-Package:  com.foo.bar;version=\"\
  1.0\"\nExport-Package:  com.carlfx.myservice1.api;version=\"1.0.0\"\n清单 2-1.\n模块\
  \ A 的 manifest.mf 文件，包含 OSGi 捆绑包定义。模块 A 依赖于来自 JAR 文件 com.foo.bar-1.0.jar 的包 com.foo.bar。\n\
  ```\n\n假设应用程序运行在 OSGi 容器上，每个捆绑包将经历一个捆绑包加载生命周期。类似于操作系统，每个应用程序都有一个进程 ID（PID），OSGi\
  \ 容器将为每个捆绑包分配一个唯一的捆绑包 ID。这个唯一 ID 允许开发者动态地监控、停止和启动捆绑包。\n\n```\nManifest-Version:\
  \ 1.0\nBundle-ManifestVersion: 2\nBundle-Name: module-b\nBundle-SymbolicName: com.carlfx.myservice2\n\
  Bundle-Version: 1.0.0\nBundle-Activator: com.carlfx.myservice2.Activator\nImport-Package:\
  \  com.foo.bar;version=\"2.0\"\nExport-Package:  com.carlfx.myservice2.api;version=\"\
  1.0.0\"\n清单 2-2.\n模块 B 的 manifest.mf 文件，包含 OSGi 捆绑包定义。模块 B 依赖于来自 JAR 文件 com.foo.bar-2.0.jar\
  \ 的包 com.foo.bar。\n```\n\nOSGi 规范详细说明了如何定义清单文件的所有属性和命名约定；然而，手动操作可能极其繁琐。为了轻松构建捆绑包，请查看\
  \ [`http://bndtools.org`](http://bndtools.org) 上的 Bnd 工具。此外，还有用于使用 Bnd 工具组装捆绑包的\
  \ Maven 插件和 Gradle 插件。\n\n老实说，根据我使用 OSGi 的经验，我知道并相信它是一个健全的架构；然而，我感觉到其采用率较低，因为在开发、调试和部署基于\
  \ Java 的应用程序时，学习曲线陡峭。例如，在 OSGi 容器上构建 `HelloWorld` 简直就是杀鸡用牛刀。但如果你有兴趣构建一个管理动态服务或子应用程序（类似于移动设备上的\
  \ Android 操作系统）的应用程序启动器，你可能会选择使用 OSGi。简而言之，OSGi 容器允许你安装服务和应用程序（捆绑包），而无需重启主 Java\
  \ 应用程序和 JVM。\n\n以下是可用的四大 OSGi 实现：\n\n*   Apache Felix：[`http://felix.apache.org`](http://felix.apache.org)\n\
  *   Eclipse Equinox：[`http://www.eclipse.org/equinox`](http://www.eclipse.org/equinox)\n\
  *   Eclipse Concierge：[`http://www.eclipse.org/concierge`](http://www.eclipse.org/concierge)\n\
  *   ProSys：[`https://www.bosch-si.com/iot-platform/iot-platform/gateway/software.html`](https://www.bosch-si.com/iot-platform/iot-platform/gateway/software.html)\n\
  \n\n\n### Maven/Gradle\n\n另一个我尚未提及的重要事项是构建应用程序时的依赖管理。换句话说，当你构建一个 Java 应用程序时，你需要获取正确版本的\
  \ JAR 库依赖，以便编译、部署和运行你的应用程序。当一个 JAR 依赖于另一个 JAR，并以此类推，从而形成一个依赖图（树）时，这被称为传递性依赖。当需要追踪和调试代码时，极其庞大的传递性依赖常常让开发者感到沮丧。正如你稍后将在\
  \ Java 9 的 Jigsaw 模块定义中学到的，你将能够相当轻松地指定如何映射依赖关系。本节将简要介绍流行的构建工具 Maven。\n\n#### 仓库\n\
  \n为了避免更多的 JAR 地狱并妥善管理依赖，Apache 组织于 2004 年发布了构建自动化工具 Maven。该构建工具为 Java 项目确立了约定。其中一个核心约定是\
  \ Java 项目的结构方式。这些项目结构也催生了构建 Java 工件（模块）的更标准方法。虽然 Maven 不仅仅是一个构建工具，但它也在某种程度上成为了在仓库中托管\
  \ JAR 的事实标准。这些仓库保存了当今使用的所有流行开源 JAR 库。虽然你可以拥有私有仓库，但 Maven Central 是互联网上的官方公共仓库。我还想特别感谢\
  \ JFrog 公司（[`https://www.jfrog.com/`](https://www.jfrog.com/)）的各位。JFrog 是一家专注于构建和仓库基础设施服务的公司。JFrog\
  \ 的 Bintray 服务允许你在其仓库中托管二进制文件和可执行文件，地址为 [`https://www.jfrog.com/bintray`](https://www.jfrog.com/bintray)。\n\
  \n#### Maven 坐标\n\n创建 Apache Maven 的人还提出了 Maven 坐标的概念，其中模块（工件）使用组 ID、工件 ID 和版本进行唯一命名。例如，代码清单\
  \ 2-3 包含了一个指向用于网络编程的流行 Netty 库的 Maven 坐标。一个 Maven `pom.xml` 文件通常包含一个用于编译的依赖列表。\n\
  \n```\nio.netty\nnetty-all\n4.0.46.Final\n\n代码清单 2-3.\n包含指向 JAR 依赖的 Maven 坐标的 pom.xml\
  \ 文件片段\n```\n\n要搜索和定位库依赖，请访问 [`https://search.maven.org`](https://search.maven.org)。在那里你可以找到流行的开源库。关于依赖和构建工具，最后要提一下的是位于\
  \ [`https://gradle.org`](https://gradle.org) 的 Gradle 构建工具。代码清单 2-4 展示了 Gradle 使用\
  \ Maven 坐标来管理依赖的方式。\n\n```\ndependencies {\ncompile 'io.netty:netty-all:4.0.46.Final'\n\
  testCompile 'junit:junit:4.12'\n}\n代码清单 2-4.\n一个使用 Maven 坐标声明依赖的 Gradle 脚本。组 ID、工件\
  \ ID 和版本由冒号分隔。\n```\n\n再次提醒，当你阅读本章时，诸如 Maven 和 Gradle 之类的构建工具应该已经能够针对 Java 9 模块代码项目进行构建（工作）。\n\
  \n现在你已经对 Java 模块的过去和当前历史有了初步了解，让我们开始使用 Java 9 模块吧！\n\n## 入门\n\n在开始实现模块之前，本节将讨论 Java\
  \ 9 的模块路径。假设你已经了解 Java 类路径，那么 Java 9 的新特性是模块路径（`--module-path`）。了解模块路径和类路径将帮助你理解\
  \ JAR 文件和类是如何被加载的。例如，当你使用 Java 9 编译器编译和运行 Java 9 之前的代码时，你需要了解 Java 9 模块和传统 JAR 文件如何共存。\n\
  \n### 什么是模块路径？\n\n新的 Java 9 模块路径能够向应用程序代码或其他模块暴露模块和包，同时隐藏你不想暴露的包。相比之下，类路径无法将 JAR\
  \ 封装为模块及其类类型。类路径的主要问题是当两个不同的 JAR 文件中存在同名的公共类类型时。要了解更多关于这个问题的信息，请查看前面关于历史（JAR 地狱）的部分。那么，这就引出了一个问题：如何指定模块路径？\n\
  \n稍后你将学习如何创建模块，但现在我们将以稍微反向的顺序来学习。我的意思是，你将首先学习如何运行（执行）一个模块，然后再学习如何创建模块。\n\n模块路径是一个元素列表，其中每个元素要么是一个模块\
  \ JAR 文件，要么是一个模块目录。与类路径类似，每个元素由路径分隔符分隔，例如在类 Unix 操作系统和 Windows 操作系统中分别使用 `:` 或 `;`。以下是运行模块应用程序时模块路径的用法：\n\
  \n*   `--module-path` 或 `-p`：一个模块列表，可以是 JAR 文件或包含模块的目录。\n*   `--module` 或 `-m`：你想要执行的模块名称和主类，用正斜杠分隔。\n\
  \n```\n$ java --module-path <模块路径> --module <模块名>/<主类>\n```\n\n由于你稍后将学习如何创建和构建模块化\
  \ JAR 文件，这里假设文件系统上已经存在一个模块。例如，以下是指定模块路径以运行应用程序的方式：\n\n```\n$ java --module-path\
  \ com.jfxbe.physicsengine.jar:mods -m com.jfxbe.game/com.carlfx.game.Main\n```\n\
  \n在这个例子中，`--module-path` 上指定的第一个元素是一个名为 `com.jfxbe.physicsengine.jar` 的模块化 JAR 文件。这里，该\
  \ JAR 文件位于当前路径下。模块路径上指定的第二个元素是一个名为 `mods` 的目录。`mods` 目录可以任意命名，但按照惯例，它是“modules”（模块）的缩写。`mods`\
  \ 目录是编译后的模块代码存放的地方。`mods` 目录可以包含一个或多个模块目录。这些模块目录包含类似于类路径的编译代码。代码清单 2-5 展示了 `com.jfxbe.game`\
  \ 模块中编译代码的目录结构。\n\n```\nmods/\n|---- com.jfxbe.game/\n|---- module-info.class\n\
  |---- com/\n|     |---- jfxbe/\n|     |     |---- game/\n|     |           |----\
  \ Main.class\n|---- images/\n|     |---- player1.png\n|     |---- player2.png\n\
  |     |---- enemy.png\n|---- soundfx/\n|---- snore.au\n代码清单 2-5.\ncom.jfxbe.game\
  \ 模块中编译代码的目录结构\n```\n\n`mods` 目录包含一个名为 `com.jfxbe.game` 的模块或目录，其中包含编译后的代码和资源。你还会注意到\
  \ `com.jfxbe.game` 目录中的 `module-info.class` 文件以粗体显示。这个类文件是在编译 `module-info.java`\
  \ 源文件后创建的。`module-info.java` 源文件被称为模块定义。让我们来看看 Java 9 的模块定义语法。\n\n\n\n### 模块定义\n\
  \n简而言之，模块定义是一个列出模块依赖关系和包导出的配置文件。Java 9 模块引入的新关键字是 `requires` 和 `exports`。`requires`\
  \ 关键字用于定义你需要（依赖）哪些模块。`exports` 关键字则允许其他模块读取其包。清单 2-6 展示了定义包含在 `module-info.java`\
  \ 文件中的基本模块的代码。\n\n```\nmodule  {\nrequires [public] ;\nexports ;\n}\n清单 2-6.\n一个具有一个依赖项和一个导出包的基本模块定义\n\
  ```\n\n关于清单 2-6 中的语法，需要提醒的是：尖括号和方括号并非语法的一部分，而是为了让读者了解哪些是必需的，哪些是可选的。在清单 2-6 中，尖括号\
  \ `<>` 表示该项是必需的，方括号表示该项是可选的。例如，模块名称是必需的，而 `requires` 右侧的 `public` 关键字是可选的。接下来，我们将逐一分解并解释定义模块所需的每个项目。\n\
  \n#### 模块命名\n\n从清单 2-6 开始，首先是 `<module name>`。你可能想知道如何命名一个模块。我知道，特别是对于如何命名模块，我曾感到困惑。实际上，根据\
  \ Jigsaw 项目关于模块命名的规范文档，这非常简单。文档中说明如下：\n\n> 模块名称与包名称一样，不得冲突。推荐的模块命名方式是使用长期以来推荐用于命名包的反向域名模式。因此，模块名称通常是其导出包名称的前缀，但这种关系并非强制性的。—《模块系统现状》，Mark\
  \ Reinhold，2016 年 3 月 3 日\n\n```\nhttp://openjdk.java.net/projects/jigsaw/spec/sotms/\n\
  ```\n\n一个使用反向域名模式命名的模块示例如下：\n\n*   你公司的假设域名：[`http://www.mycompany.com`](http://www.mycompany.com)\n\
  *   模块名称应为：`com.mycompany.mymodule`\n\n#### Requires\n\n继续讨论清单 2-6 中所示的基本模块定义，关键字“`requires`”引用了模块依赖关系。关键字“`requires`”表示当前模块依赖于另一个已命名的模块。需要认识到的一个重要点是，所有模块都隐式依赖于（`requires`）基础平台模块\
  \ `java.base`。此外，如果你在模块中使用 JavaFX，你将隐式加载 `javafx.base` 模块。\n\n#### Requires Public（隐式可读性）\n\
  \n在清单 2-6 中，`requires` 模块依赖关系的可选 `[public]` 修饰符允许派生模块隐式获得读取权限，这通常被称为隐式可读性。一个例子是：`module-A`\
  \ 依赖于带有 `public` 修饰符的模块 `java.logging`，那么另一个模块，比如 `module-B`，依赖于 `module-A`。\n\n\
  由于日志模块在 `module-A` 中被声明为 public，`module-B` 将自动能够从 `java.logging` 模块获得可读性。这很好，因为\
  \ `module-B` 的模块定义中不必添加像 `requires java.logging` 这样的语句。`module-B` 将隐式免费获得 `java.logging`\
  \ 模块。\n\n#### Exports\n\n当你在模块定义中使用 `exports` 时，你是在公开带有公共类的包命名空间。\n\n尽管还有其他关键字定义了其他可读性关系选项，但我不会深入讨论它们，因为它们超出了本书的范围。可以说，大多数时候你都会使用清单\
  \ 2-6 中所示的基本模块定义。既然你已经知道如何运行和定义模块，你还需要了解模块类型。了解模块类型将帮助你理解遗留代码和 Java 9 模块是如何加载的。\n\
  \n### 模块类型\n\nJava 运行时会将类加载到四种类型的模块中。模块类型基于类或 JAR 是位于类路径还是模块路径上。当模块和类被加载到 JVM（类加载器）中时，它们会成为四种模块类型之一。每种模块类型对某些包和类具有可读性访问权限。例如，在定义应用程序模块时，实现者希望使用关键字\
  \ `export` 来公开 API，以允许其他模块和类读取包。图 2-2 显示了一个典型的依赖关系图。该依赖关系图显示了一个应用程序模块，它分别依赖于两个平台模块、一个未命名模块和两个自动模块。\n\
  \n![A323804_3_En_2_Fig2_HTML.jpg](img/A323804_3_En_2_Fig2_HTML.jpg)\n\n图 2-2.\n\
  一个应用程序模块（com.mycompany.modulea）的依赖关系图，该模块依赖于两个平台模块、一个未命名模块和两个自动模块\n\n为了理解它们之间的可读性关系，让我们更详细地了解这四种模块类型。\n\
  \n以下是四种模块类型及其可读性访问权限的描述：\n\n*   **应用程序模块**：创建的命名模块，可以读取以下模块类型：\n    *   平台模块\n \
  \   *   应用程序模块\n    *   自动模块\n*   **平台模块**：来自 Java 运行时的核心模块，不能读取其他模块类型。只要核心模块被定义为\
  \ `public`（例如 `java.logging` 或 `java.base`），它们就可以公开访问其他核心模块。\n*   **自动模块**：自动转换为应用程序模块类型的\
  \ JAR 库，可以读取以下模块类型：\n    *   平台模块\n    *   应用程序模块\n    *   自动模块\n    *   未命名模块\n\
  *   **未命名模块**：加载到类路径上的任何类或 JAR 库都将被加载到未命名模块中。未命名模块类型可以读取以下模块类型：\n    *   平台模块\n\
  \    *   应用程序模块\n    *   自动模块\n\n未命名模块不能读取另一个未命名模块，因为（每个类加载器）只有一个未命名模块。从类路径加载的 JAR\
  \ 和类会被加载到未命名模块中。所有公共类类型和包都被导出，以允许未命名模块中的类访问其他类。\n\n#### 应用程序模块（显式模块）\n\n应用程序模块是你作为库或应用程序创建的模块。提醒一下模块的命名约定，你应该使用反向域名模式，如下所示：\n\
  \n```\nmodule com.mycompany.modulea {\n// 其余声明\n}\n```\n\n运行你的模块应用程序时，你需要在模块路径上指定它，如下所示。\n\
  \n```\n$ java --module-path mods/com.mycompany.modulea ...\n```\n\n你会看到 `mods` 目录，该目录用于存放编译后的模块。\n\
  \n#### 平台模块（隐式）\n\n平台模块被认为是隐式模块，它们是应用程序模块中使用的核心 Java 和 JavaFX 平台模块。稍后你将使用平台模块创建一个\
  \ `HelloWorld` 应用程序。\n\n以下是常见的 Java 和 JavaFX 平台模块列表：\n\n```\njava.base\njava.logging\n\
  javafx.base\njavafx.controls\njavafx.fxml\njavafx.graphics\njavafx.media\njavafx.swing\n\
  javafx.web\n```\n\n\n\n#### JavaFX 平台模块图\n\nJavaFX 8 和 JavaFX 9 之间变化不大；然而，JavaFX\
  \ 9 是全新模块化的。换句话说，JavaFX 类已被分解到各个平台模块中，而不是将所有 JavaFX 类都放入 `jfxrt.jar` 文件中。在创建模块时，您需要知道要依赖（`requires`）哪些\
  \ JavaFX 模块。\n\n为了展示 JavaFX 9 的依赖关系图，我回想起 Jonathan Giles 在 JavaOne 2015 上关于 JavaFX\
  \ 9 – 新特性与亮点 的演讲中描述可读性关系的幻灯片。Jonathan 是 JavaOne Rockstar 演讲者，也是 Oracle 公司的 JavaFX\
  \ 技术负责人。为了描绘整个 JavaFX 模块图，图 2-3 展示了所有依赖于 `javafx.base` 模块的模块。\n\n![A323804_3_En_2_Fig3_HTML.jpg](img/A323804_3_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3.\n\n整个 JavaFX 模块图。所有派生模块都依赖于 javafx.base\n\n如前所述，JavaFX 平台模块依赖于 `javafx.base`。实际上，它们并非都直接依赖于\
  \ `javafx.base`，而是依赖于 `javafx.graphics`。`javafx.graphics` 模块的定义会在 `javafx.base`\
  \ 旁边使用 `public` 修饰符，从而使 `javafx.base` 模块对 `javafx.graphics` 模块的派生模块具有读取访问权限，如下所示：\n\
  \n```\nmodule javafx.graphics {\nrequires public javafx.base;\n}\n```\n\n此外，图 2-4\
  \ 展示了其他需要 `javafx.graphics` 模块的 JavaFX 平台模块，同时隐式地拥有对 `javafx.base` 模块的读取访问权限。\n\n\
  ![A323804_3_En_2_Fig4_HTML.jpg](img/A323804_3_En_2_Fig4_HTML.jpg)\n\n图 2-4.\n\n\
  javafx.graphics 依赖于 javafx.base\n\n图 2-5 展示了模块 `javafx.controls` 依赖于模块 `javafx.graphics`，而后者最终依赖于\
  \ `javafx.base` 模块。假设您了解隐式可读性，那么创建一个依赖于 `javafx.controls` 的模块意味着您无需在模块定义中添加 `requires\
  \ javafx.graphics` 或 `requires javafx.base`。\n\n![A323804_3_En_2_Fig5_HTML.jpg](img/A323804_3_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5.\n\n所有 JavaFX 模块都依赖于 javafx.graphic 模块\n\n现在您已经了解了平台模块，让我们看看其他类型的模块，例如未命名模块。\n\
  \n#### 未命名模块（类路径上的类和非 Jigsaw 模块）\n\n加载到类路径上的任何类或 JAR 库都将进入未命名模块。由于它是一个没有模块名称的单一模块，其他应用程序模块无法在其模块定义中使用\
  \ `requires` 来引用它，因此得名未命名模块或无名称模块。这个未命名模块的主要目的是将所有公共类导出到 JVM。例如，如果一个 JAR 库被加载到未命名模块中，那么它的所有公共类都可以被使用。\n\
  \n#### 自动模块（作为命名模块加载的 JAR 文件）\n\n任何遗留的 JAR 文件（非模块化）都可以转换为命名模块。与在类路径上使用遗留 JAR 文件不同，JAR\
  \ 文件可以放在模块路径上，以自动转换为命名模块。当前的命名算法在 `java.base` 模块的 `ModuleFinder` 类的 Javadoc 文档中。\n\
  \n```\nhttp://download.java.net/java/jigsaw/docs/api/java/lang/module/ModuleFinder.html#of-java.nio.file.Path...-\n\
  ```\n\n现在您已经了解了所有不同类型的模块以及它们的加载方式，我将向您展示如何使用 Java 9 模块创建一个 JavaFX `HelloWorld` 示例应用程序。\n\
  \n## 一个 HelloWorld JavaFX 9 模块化应用程序示例\n\n在此示例中，您将创建一个 `HelloWorld` JavaFX 9 模块化应用程序。要构建一个\
  \ Java 9 项目，请遵循以下步骤。\n\n### 创建项目结构\n\n使用以下命令行语句创建一个项目目录：\n\n```\n# Windows\nC:\\\
  >md \\helloworld\\src\\\n# Mac/Linux\n$ mkdir -p helloworld/src\n```\n\n创建主模块的源目录：\n\
  \n```\n# Windows\nC:\\> cd helloworld\nC:\\helloworld> md \\src\\com.jfxbe.helloworld\n\
  # Mac/Linux\n$ cd helloworld\n$ mkdir src/com.jfxbe.helloworld\n```\n\n创建用于存放源代码文件的\
  \ Java 包目录结构。\n\n```\n# Windows\nC:\\helloworld> md \\src\\com.jfxbe.helloworld\\\
  com\\jfxbe\\helloworld\n# Mac/Linux\n$ mkdir -p src/com.jfxbe.helloworld/com/jfxbe/helloworld\n\
  ```\n\n为模块应用程序 `helloworld` 创建了以下目录结构：\n\n```\n|---- helloworld/\n|---- src/\n|----\
  \ com.jfxbe.helloworld/\n|---- com/\n|---- jfxbe/\n|---- helloworld/\n```\n\n###\
  \ 创建模块定义\n\n在 `helloworld/src/com.jfxbe.helloworld` 目录下创建一个名为 `module-info.java`\
  \ 的文件。为 `HelloWorld` 模块定义一个 `module-info.java` 文件。\n\n```\nmodule com.jfxbe.helloworld\
  \ {\nrequires javafx.controls;\nexports com.jfxbe.helloworld;\n}\n```\n\n目录结构应如下所示：\n\
  \n```\n|---- helloworld/\n|---- src/\n|---- com.jfxbe.helloworld/\n|----module-info.java\n\
  |---- com/\n|---- jfxbe/\n|---- helloworld/\n```\n\n接下来，您将在 `helloworld` 目录中创建 JavaFX\
  \ `HelloWorld` 示例代码。\n\n### 创建主应用程序代码\n\n创建 `HelloWorld.java` 文件，并将其放置在 `src/com.jfxbe.helloworld/com/jfxbe/helloworld`\
  \ 目录中。只需将清单 2-7 中的源代码输入到文本编辑器中并保存即可。提醒一下，包名是 `com.jfxbe.helloworld`。\n\n```\npackage\
  \ com.jfxbe.helloworld;\nimport javafx.application.Application;\nimport javafx.event.ActionEvent;\n\
  import javafx.event.EventHandler;\nimport javafx.scene.Group;\nimport javafx.scene.Scene;\n\
  import javafx.scene.control.Button;\nimport javafx.stage.Stage;\n/**\n* A JavaFX\
  \ Hello World\n* @author carldea\n*/\npublic class HelloWorld extends Application\
  \ {\n/**\n* @param args the command line arguments\n*/\npublic static void main(String[]\
  \ args) {\nApplication.launch(args);\n}\n@Override\npublic void start(Stage stage)\
  \ {\nstage.setTitle(\"Hello World\");\nGroup root = new Group();\nScene scene =\
  \ new Scene(root, 300, 250);\nButton btn = new Button();\nbtn.setLayoutX(100);\n\
  btn.setLayoutY(80);\nbtn.setText(\"Hello World\");\nbtn.setOnAction(new EventHandler()\
  \ {\npublic void handle(ActionEvent event) {\nSystem.out.println(\"Hello World\"\
  );\n}\n});\nroot.getChildren().add(btn);\nstage.setScene(scene);\nstage.show();\n\
  }\n}\n清单 2-7.\n主 HelloWorld 应用程序\n```\n\n### 编译代码（模块）\n\n假设在编译源代码之前，您位于 `src` 目录（`helloworld`）的上一级目录。接下来，您必须将应用程序作为模块进行编译。\n\
  \n在 Linux/MacOS X 平台上，执行以下操作：\n\n```\n$ javac -d mods/com.jfxbe.helloworld src/com.jfxbe.helloworld/module-info.java\
  \ \\\nsrc/com.jfxbe.helloworld/com/jfxbe/helloworld/HelloWorld.java\n```\n\n在 Windows\
  \ 平台上，执行以下操作：\n\n```\nC:\\helloworld>javac -d mods\\com.jfxbe.helloworld src\\com.jfxbe.helloworld\\\
  module-info.java src\\com.jfxbe.helloworld\\com\\jfxbe\\helloworld\\HelloWorld.java\n\
  ```\n\n如果您要使用第三方模块，则必须使用 `--modules-path` 开关编译代码，以告知编译器需要将哪些额外的模块添加到模块路径上。例如，如果您的\
  \ `HelloWorld` 模块需要使用来自名为 `com.xyzcompany.coolmodule` 的第三方 Java 9 模块中的类 `com.xyzcompany.ServiceA`，您需要将条目添加到\
  \ `module-info.java` 文件中，然后像这样编译代码：\n\n在 Linux/MacOS X 平台上，执行以下操作：\n\n```\n$ javac\
  \ --modules-path mlibs -d mods/com.jfxbe.helloworld $(find src -name \"*.java\"\
  )\n```\n\n在 Windows 平台上，执行以下操作：\n\n```\nC:\\helloworld> javac --modules-path mlibs\
  \ -d mods\\com.jfxbe.helloworld src\\com.jfxbe.helloworld\\module-info.java src\\\
  com.jfxbe.helloworld\\com\\jfxbe\\helloworld\\HelloWorld.java\n```\n\n此示例中使用的第三方模块以\
  \ JAR 文件形式存在于 `mlibs` 目录中。\n\n\n\n### 复制资源\n\n由于此 `HelloWorld` 应用程序不包含任何诸如 `fxml`\
  \ 文件、图片或声音文件之类的资源，因此可以跳过此步骤。但如果你有需要复制到模块目录的资源，请使用以下命令。请根据你的需求修改以下命令。以下是递归复制包含 `*.fxml`\
  \ 后缀的文件到 `mods/com.jfxbe.helloworld/com/jfxbe/helloworld` 目录的命令。\n\n在 Linux/MacOS\
  \ X 平台上，执行以下操作：\n\n```\n$ cp -r src/*.fxml mods/com.jfxbe.helloworld/com/jfxbe/helloworld\n\
  ```\n\n在 Windows 平台上，执行以下操作：\n\n```\nC:\\helloworld> xcopy C:\\helloworld\\src\\\
  *.fxml C:\\helloworld\\mods\\com.jfxbe.helloworld /S /Y\n```\n\n这些命令会递归复制以 `.fxml`\
  \ 结尾的文件，并将它们放置在 `module` 目录中。当你的代码尝试调用 `getResource()` 方法时，这一点非常重要。\n\n### 运行应用程序\n\
  \n以下是通过指定模块和包含主应用程序的类来运行应用程序的方法：\n\n```\n$ java --module-path mods -m com.jfxbe.helloworld/com.jfxbe.helloworld.HelloWorld\n\
  ```\n\n图 2-6 展示了运行 `HelloWorld` JavaFX 模块应用程序的输出结果。\n\n![A323804_3_En_2_Fig6_HTML.jpg](img/A323804_3_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6.\n\nHelloWorld JavaFX 模块化应用程序的输出结果\n\n### 将应用程序打包为 JAR\n\n之前的模块是编译成类并放入\
  \ `mods/com.jfxbe.helloworld` 目录中的。如果能创建一个可执行的 JAR 文件，岂不是很好？那么，我们首先创建一个 `mlib` 目录。这个目录可以任意命名，但按照惯例，`mlib`\
  \ 代表模块库。`mlib` 目录将包含 JAR 模块应用程序。以下内容说明了如何打包一个 Java 9 模块化应用程序。\n\n在 Linux/MacOS X\
  \ 平台上，执行以下操作：\n\n```\n$ mkdir mlib\n$ jar --create --file=mlib/com.jfxbe.helloworld.jar\
  \ \\\n--main-class=com.jfxbe.helloworld.HelloWorld -C mods/com.jfxbe.helloworld/.\n\
  ```\n\n在 Windows 平台上，执行以下操作：\n\n```\nC:\\helloworld> md mlib\nC:\\helloworld> jar\
  \ --create --file=C:\\helloworld\\mlib\\com.jfxbe.helloworld.jar --main-class=com.jfxbe.helloworld.HelloWorld\
  \ -C C:\\helloworld\\mods\\com.jfxbe.helloworld.\n```\n\n这些选项说明如下：\n\n*   `--create`：创建一个\
  \ JAR 文件\n*   `--file`：要创建的 JAR 文件\n*   `--main-class`：作为 JavaFX 应用程序的主类\n*   `-C`：此选项用于切换目录并处理要转换的代码\n\
  \n### 以 JAR 形式运行应用程序\n\n运行 JavaFX 应用程序的另一种方式是将其作为 JAR 文件运行。由于创建 JAR 时已指定了主类，因此以下命令无需包含类名即可运行应用程序。这样可以减少输入量。\n\
  \n```\njava --module-path mlib -m com.jfxbe.helloworld\n```\n\n由于 JAR 模块定义指向了 Java\
  \ 的主类，你会注意到 `-m` 不需要指定包名/类类型。这只是相对于 Java 更严谨方式的一种快捷方式。\n\n### 显示模块描述\n\n既然你已经知道如何将应用程序打包为\
  \ JAR 文件，你可能想查看或显示模块信息及其依赖关系。以下命令将读取并显示模块的 `module-info` 文件。\n\n```\njar --describe-module\
  \ --file=mlib/com.jfxbe.helloworld.jar\n```\n\n以下输出展示了 `--describe-module` 选项的使用情况。\n\
  \n```\nmodule com.jfxbe.helloworld (module-info.class)\nrequires mandated java.base\n\
  requires javafx.base\nrequires javafx.controls\nrequires javafx.graphics\nexports\
  \ com.jfxbe.helloworld\nmain-class com.jfxbe.helloworld.HelloWorld\n```\n\n## 总结\n\
  \n在本章中，你学习了如何使用 Java 9 的 Project Jigsaw 来模块化 Java 代码。你了解了模块化的优缺点。你运行了 `jdeps` 工具来协助你从\
  \ JDK 8 迁移到 JDK 9。之后，你了解了 JAR 地狱这个术语，它基本上是指当从类路径加载不同版本的 Java 类时会发生冲突。你还学习了一些关于 OSGi\
  \ 容器的知识，以及如何轻松创建模块包。OSGi 包含大量作为包定义的属性。\n\n除了模块，你还初步了解了 Maven/Gradle 构建工具在管理依赖关系方面的作用。这些构建工具也拥有仓库，使开发者能够存储和检索构件。\n\
  \n接下来，你学习了如何在 `module-info.java` 文件中定义模块定义。在定义模块之后，你了解了四种模块类型。这四种模块类型是：平台模块、未命名模块、自动模块和应用程序模块。通过查看完整的模块图，你了解了关于\
  \ JavaFX 平台模块的更多细节。\n\n最后但同样重要的是，你创建了一个作为 Java 9 模块的 JavaFX `HelloWorld` 应用程序。你学会了如何编译和创建一个\
  \ Java 9 JAR 模块。\n\n好了，这就是 Java 9 模块。\n\n"
- '# 3. JavaFX 基础


  没有什么比收到复杂难懂的建议作为问题的解决方案更令人沮丧的了。正因如此，我一直坚持专注于基础知识。就 JavaFX 而言，你将学习将在绘图表面（JavaFX 场景）上使用的基本绘图原语。为了在
  JavaFX 场景上渲染图形，你需要基本的形状和颜色。基于你对 JavaFX 场景图的知识（你在第 1 章末尾已经接触过），你将在本章学习如何在 JavaFX
  场景图上绘制和操作 2D 形状。


  比形状对象更基础的是 JavaFX 的 [`javafx.scene.Node`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Node.html)
  类。`Node` 类是所有 JavaFX 场景图节点的基本基类。`Node` 类提供了对任何节点进行变换、平移和应用效果的能力。本章中的许多示例都涉及 [`javafx.scene.shape.Shape`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Shape.html)
  类，它是 `Node` 类的子类。因此，`Shape` 类将继承 `Node` 类的所有功能。在本章中，你将探索许多继承自 `Shape` 的派生类。你将通过研究
  JavaFX 最基本的形状——`Line` 节点来开始本章。




  ## JavaFX 线条


  在 JavaFX 中渲染线条，概念上类似于欧几里得几何，即通过连接两个 (x, y) 坐标点，在空间中绘制出一条线段。当在 JavaFX 场景图上绘制时，线条是使用屏幕坐标空间（系统）进行渲染的。在几何学中，线条被定义为空间中由两个点连接而成的线段，尽管它没有宽度（粗细）和颜色值。你可能会问：“这是否意味着线条是不可见的？”在计算机世界中，物理设备会绘制占据实际表面的像素和形状。因此，在这些表面上绘制的线条将具有所谓的像素宽度或描边宽度。显示器和打印机就是此类表面的例子。由于这种生成方式，现代图形编程采用了标准的屏幕坐标系。在这个系统中，绘制的线条是可见的，并且具有宽度和颜色属性。


  如果你还记得小学代数课上的内容，笛卡尔坐标系是用 X 轴和 Y 轴绘制的，原点 (0, 0) 位于两条轴线的中心交汇处。在计算机屏幕上，坐标系的原点 (0, 0)
  位于左上角；这与笛卡尔坐标系不同，后者的 (0, 0) 位于绘图区域的中心。图 3-1 描绘了这两种坐标系作为对比。左侧显示的笛卡尔坐标系将所有四个象限都作为可见绘图区域。图
  3-1 右侧显示的是屏幕坐标系，它将右下象限（灰色区域）作为屏幕的可见绘图区域。


  ![A323804_3_En_3_Fig1_HTML.jpg](img/A323804_3_En_3_Fig1_HTML.jpg)


  图 3-1.


  笛卡尔坐标系与屏幕坐标系。在笛卡尔坐标系中，原点 (0, 0) 位于中心，而屏幕坐标系的原点 (0, 0) 位于屏幕或显示器的左上角。


  仔细观察图 3-1，你会看到这两种坐标系。当沿着 x 轴移动一个点时，x 坐标的效果是相同的。然而，当使用屏幕坐标系沿着 y 轴移动时，其效果与笛卡尔坐标系相反。换句话说，当向下（从上到下）移动一个点时，y
  坐标的值会增加。图 3-2 展示了使用屏幕坐标系绘制的形状。另请注意，使用负值会将对象绘制到屏幕之外，例如在可视区域中部分显示的星形。


  ![A323804_3_En_3_Fig2_HTML.jpg](img/A323804_3_En_3_Fig2_HTML.jpg)


  图 3-2.


  屏幕坐标系


  随着你对 JavaFX 的深入学习，你会发现许多场景图对象，例如线条、圆形和矩形。这些对象都是 `Shape` 类的派生类。所有形状对象都可以在两个形状区域之间执行几何运算，例如相减、相交和合并。通过掌握
  [`Shape`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Shape.html)
  API，你将开始看到无限的可能性。现在让我们讨论如何创建线条。


  要在 JavaFX 中绘制线条，你将使用 [`javafx.scene.shape.Line`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Line.html)
  类。创建 `Line` 实例时，你需要指定一个起点 (x, y) 坐标和一个终点 (x, y) 坐标来绘制线条。在创建 `Line` 节点时，有两种方法可以指定起点和终点。第一种方法是使用
  `Line` 的构造函数，参数为 `startX`、`startY`、`endX` 和 `endY`。第二种方法是使用空构造函数实例化 `Line` 类，然后使用其
  setter 方法。虽然这两种创建 `Line` 节点的方法听起来相当基础，但我想指出，曾经还有第三种使用已弃用的构建器类来构造线条的方法。你将在本章后面看到
  JavaFX 团队决定弃用这些类的原因。`Line` 类的所有参数的数据类型都是 `double` 类型值，这提供了浮点小数精度。以下代码片段展示了创建 `Line`
  形状节点的两种方法。


  ```

  Line method1 = new Line(startX, startY, endX, endY);

  Line method2 = Line();

  method.setStartX(startX);

  method.setStartY(startY);

  method.setEndX(endX);

  method.setEndY(endY);

  ```


  关于用作屏幕坐标的小数精度值，请记住，扩展了 `Region` 类的容器类具有一个 [`snapToPixelProperty`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Region.html#snapToPixelProperty--)
  `()` 方法属性，其默认值为 `true`。当为 `true` 时，子节点将使用整数精度作为屏幕坐标的值。`Node` 类的 Javadoc 文档通过以下陈述描述了像素的渲染方式：“在设备像素级别，整数坐标映射到像素之间的角落和缝隙，而像素的中心出现在整数像素位置之间的中点。”


  使用整数值（整数）绘制描边宽度为 1 的线条或形状往往会显得模糊。根据 Javadoc 文档，坐标映射到左上角（缝隙）来绘制像素，从而占据两个像素。例如，如果你绘制一条起点为
  (1, 1)、终点为 (8, 1) 的水平线，JavaFX 坐标将在缝隙的两侧绘制像素，如图 3-3 所示。缝隙显示为网格线。每个网格块（正方形）表示一个像素。该算法还使用了变化的颜色强度。


  ![A323804_3_En_3_Fig3_HTML.jpg](img/A323804_3_En_3_Fig3_HTML.jpg)


  图 3-3.


  使用整数值绘制的线条会显得粗且模糊。在 JavaFX 中，使用整数值的线条将占据两个像素。此外，像素的颜色可能会根据坐标的小数值或描边宽度而改变。


  为了进一步探索 JavaFX，我创建了一个简单的示例，展示了在场景图上绘制的各种线条，如图 3-4 所示。这些线条大多相同；然而，当对坐标使用整数值时，线条往往会显得粗或模糊。当坐标的浮点值余数小于或等于
  0.5 时，线条会显得细（占据一个像素）。注意“细线 2”为浅灰色，使其看起来更细，但仍然占据一个像素。


  ![A323804_3_En_3_Fig4_HTML.jpg](img/A323804_3_En_3_Fig4_HTML.jpg)


  图 3-4.


  绘制了五条线——默认线、粗线、模糊线、细线 1 和细线 2




  假设你的线条显示模糊（使用整数坐标值），你可能希望线条清晰且纤细。要让线条描边变细，只需在坐标值上加 0.5，这会将坐标映射到屏幕坐标点描边像素的内部。使用小数坐标值时，JavaFX
  会将线条渲染为一个像素，从而使其看起来更细。观察一个像素宽的线条相当困难，因此图 3-5 展示了放大后的五条线。


  ![A323804_3_En_3_Fig5_HTML.jpg](img/A323804_3_En_3_Fig5_HTML.jpg)


  图 3-5.


  图 3-4 的放大图，用于检查每条线绘制的像素。注意“细线 2”与“细线 1”一样只占用一个像素，但颜色是浅灰色。


  继续讨论线条的创建，下面这条线的起点为(100.0, 10.0)，终点为(10.0, 110.0)，并将通过构造函数创建。


  ```

  Line line = new Line(100.0, 10.0, 10.0, 110.0);

  ```


  创建线条节点的第二种方法是使用空的默认构造函数实例化`Line`类，然后通过相关的 setter 方法设置每个属性。以下代码片段展示了如何使用 setter 方法指定线条的起点和终点。


  ```

  Line line = new Line();

  line.setStartX(100);

  line.setStartY(10);

  line.setEndX(10);

  line.setEndY(110);

  ```


  绘制在场景图上的`Line`节点默认描边宽度为`1.0 (double)`，描边颜色为黑色（`Color.BLACK`）。根据 Javadoc，除`Line`、`Polyline`和`Path`节点外，所有形状（如
  Text、Rectangle 等）的描边颜色均为 null（无色）。


  现在你已经知道如何在场景图上绘制线条，可能想知道如何更有创意地使用线条。创建不同类型的线条很简单：基本上只需设置从父类（[`javafx.scene.shape.Shape`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Shape.html)）继承的属性。表
  3-1 显示了可以在线条（`Shape`）上设置的属性。要检索或修改每个属性，你将使用相应的 getter 和 setter 方法。该表列出了每个属性名称及其数据类型，并附有说明。更多详情请参考
  Javadoc 文档。


  表 3-1.


  javafx.scene.shape.Shape 类属性


  | 属性 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `Fill` | `javafx.scene.paint.Paint` | 填充形状内部的颜色。 |

  | `Smooth` | `Boolean` | True 开启抗锯齿，否则为 false。 |

  | `strokeDashOffset` | `Double` | 虚线图案的偏移量（距离）。 |

  | `strokeLineCap` | `javafx.scene.shape.StrokeLineCap` | 线条或路径末端的端点样式。有三种样式：`StrokeLineCap.BUTT`、`StrokeLineCap.ROUND`
  和 `StrokeLineCap.SQUARE`。 |

  | `strokeLineJoin` | `javafx.scene.shape.StrokeLineJoin` | 线条交汇处的装饰。有三种类型：`StrokeLineJoin.MITER`、`StrokeLineJoin.BEVEL`
  和 `StrokeLineJoin.ROUND`。 |

  | `strokeMiterLimit` | `Double` | 斜接接头的限制。与斜接接头装饰（`StrokeLineJoin.MITER`）一起使用。 |

  | `stroke` | `javafx.scene.paint.Paint` | 形状线条描边的颜色。 |

  | `strokeType` | `javafx.scene.shape.StrokeType` | 在`Shape`节点边界周围绘制描边的位置。有三种类型：`StrokeType.CENTERED`、`StrokeType.INSIDE`
  和 `StrokeType.OUTSIDE`。 |

  | `strokeWidth` | `Double` | 描边线条的宽度。 |


  JavaFX 提供了两种样式化场景图中节点的方法：通过编程方式或使用 CSS 样式。现在，你将学习如何使用 JavaFX API 以编程方式样式化节点。稍后在第
  15 章中，你将学习如何使用 JavaFX CSS 创建自定义控件以及如何为主题（皮肤）用户界面。接下来，你将通过一个示例继续学习 JavaFX 线条。


  ## 绘制线条


  为了更好地理解如何基于表 3-1 使用形状的属性，让我们看一个示例。图 3-6 是清单 3-1（`DrawingLines.java`源代码）的输出，演示了 JavaFX
  线条的绘制。该清单中的 JavaFX 应用程序绘制了三条具有不同修改属性的线条。本示例中使用的一些常见属性包括描边虚线偏移量、描边端点样式、描边宽度和描边颜色。


  ![A323804_3_En_3_Fig6_HTML.jpg](img/A323804_3_En_3_Fig6_HTML.jpg)


  图 3-6.


  绘制线条


  在图 3-6 中，你可以看到第一条线（顶部）是一条带有虚线描边图案的粗红线。第二条线是一条具有圆形端点的粗白线。最后一条是与其它线条厚度相同的普通蓝线。你还会注意到在图
  3-6 中，蓝线下方有两个控件——一个标签和一个滑块控件。这些控件允许用户动态更改红色（顶部）线条的描边虚线偏移量属性。当滑块控件移动时，标签控件会显示虚线偏移值。清单
  3-1 展示了`DrawingLines.java`的源代码。


  ```

  package jfxbe;

  import javafx.application.Application;

  import javafx.beans.value.ObservableValue;

  import javafx.scene.*;

  import javafx.scene.control.Slider;

  import javafx.scene.paint.Color;

  import javafx.scene.shape.*;

  import javafx.scene.text.Text;

  import javafx.stage.Stage ;

  /**

  * Drawing Lines

  * @author carldea

  */

  public class DrawingLines extends Application {

  @Override

  public void start(Stage primaryStage) {

  primaryStage.setTitle("Drawing Lines");

  Group root = new Group();

  Scene scene = new Scene(root, 300, 150, Color.GRAY);

  // Red line

  Line redLine = new Line(10, 10, 200, 10);

  // setting common properties

  redLine.setStroke(Color.RED);

  redLine.setStrokeWidth(10);

  redLine.setStrokeLineCap(StrokeLineCap.BUTT);

  // creating a dashed pattern

  redLine.getStrokeDashArray().addAll(10d, 5d, 15d, 5d, 20d);

  redLine.setStrokeDashOffset(0);

  root.getChildren().add(redLine);

  // White line

  Line whiteLine = new Line(10, 30, 200, 30);

  whiteLine.setStroke(Color.WHITE);

  whiteLine.setStrokeWidth(10);

  whiteLine.setStrokeLineCap(StrokeLineCap.ROUND);

  root.getChildren().add(whiteLine);

  // Blue line

  Line blueLine = new Line(10, 50, 200, 50);

  blueLine.setStroke(Color.BLUE);

  blueLine.setStrokeWidth(10);

  root.getChildren().add(blueLine);

  // slider min, max, and current value

  Slider slider = new Slider(0, 100, 0);

  slider.setLayoutX(10);

  slider.setLayoutY(95);

  // bind the stroke dash offset property

  redLine.strokeDashOffsetProperty()

  .bind(slider.valueProperty());

  root.getChildren()

  .add(slider);

  Text offsetText = new Text("Stroke Dash Offset: " + slider.getValue());

  offsetText.setX(10);

  offsetText.setY(80);

  offsetText.setStroke(Color.WHITE);

  // display stroke dash offset value

  slider.valueProperty()

  .addListener((ov, curVal, newVal) ->

  offsetText.setText("Stroke Dash Offset: " + newVal));

  root.getChildren().add(offsetText);

  primaryStage.setScene(scene);

  primaryStage.show();

  }

  /**

  * @param args the command line arguments

  */

  public static void main(String[] args) {

  launch(args);

  }

  }

  清单 3-1.

  DrawingLines.java

  ```




  `DrawingLines.java` 首先使用 `setTitle()` 方法设置 `Stage` 窗口的标题。然后，它为 `Scene` 对象创建一个根节点（[`javafx.scene.Group`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Group.html)）。如果你还记得第
  1 章中讨论的 `HelloWorld` 示例，添加到 JavaFX Scene 图中的第一个节点被称为根节点。根节点始终是 JavaFX 容器类型的节点，例如
  `Group` 或 `BorderPane`。所有容器类型的节点（即那些继承自 [`javafx.scene.Parent`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Parent.html)
  的节点）都有一个名为 [`getChildren`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Parent.html#getChildren--)
  `().add()` 的方法，该方法允许将任何 JavaFX 节点添加到场景图中。默认情况下，`Scene` 对象会填充白色背景；然而，由于我们的一条线是白色的，代码会将场景背景色设置为灰色（`Color.GRAY`）。这样能形成一些对比，以便看到白色的线条。在本书的平装版中，图片是灰度显示的，但如果你使用
  PDF 版本，代码会分别创建红色、白色和蓝色三条线。


  在第一行中，代码设置了 `Line` 节点的通用属性。这些通用属性包括描边颜色、描边宽度和描边线帽。如前所述，线条内部没有形状，因此线条的填充颜色属性被设置为
  `null`（无颜色），而描边颜色默认为黑色。要设置描边颜色，你可以使用 [`javafx.scene.paint.Color`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/paint/Color.html)
  类中内置的 JavaFX 颜色。例如，对于红色，你可以使用 [`Color.RED`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/paint/Color.html#RED)。指定颜色的方法有很多种，例如使用
  RGB、HSB 或 Web 十六进制值。这三种方法也都支持指定 alpha 值（透明度）。稍后，你还会看到其他为形状着色的方法。请参考 Javadoc 以了解更多关于颜色（`javafx.scene.paint.Color`）的信息。设置好描边轮廓颜色后，你可以使用
  [`setStrokeWidth`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/Shape.html#setStrokeWidth-double-)
  `()` 方法来设置线条的描边宽度（粗细）。形状还有一个描边线帽属性。该属性指定了线条端点的样式。例如，将描边线帽指定为平头（[`StrokeLineCap`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html)`.`[`BUTT`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html#BUTT)）会形成平坦的方形端点，而圆头（[`StrokeLineCap.ROUND`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/shape/StrokeLineCap.html#ROUND)）样式则会呈现圆形端点。以下代码片段设置了线条节点的通用形状属性：


  ```

  // 设置通用属性

  redLine.setStroke(Color.RED);

  redLine.setStrokeWidth(10);

  redLine.setStrokeLineCap(StrokeLineCap.BUTT);

  ```


  在红色 `Line` 节点上设置好通用属性后，示例代码创建了一个虚线模式。要形成虚线模式，你只需向 `getStrokeDashArray().add()` 方法添加
  `double` 值即可。每个值代表一个虚线段的像素数。在设置虚线段数组时，第一个值（10d）是一个可见的、宽度为 10 像素的虚线段。接下来是一个 5 像素的空白段（不可见）。随后是一个宽度为
  15 像素的可见虚线段，以此类推。由于数组包含奇数个值，你可以看到模式在重复自身时，第一个值（10d）会变成一个 10 像素的空白段（不可见）。以下是创建 `Line`
  节点虚线模式的代码：


  ```

  // 创建虚线模式

  redLine.getStrokeDashArray().addAll(10d, 5d, 15d, 5d, 20d);

  redLine.setStrokeDashOffset(0);

  ```


  默认情况下，虚线偏移属性值为 `0`。要查看偏移属性变化时会发生什么，用户可以向右拖动滑块拇指以增加偏移量。描边虚线偏移是指从当前模式的哪个位置开始绘制线条。


  由于另外两条线在修改通用属性的方式上基本相同，我就不再进一步解释了。我相信你现在已经理解了创建线条的基本原理。关于这个示例，最后要提的一点是 Slider 控件以及它通过绑定进行连接的方式。


  请注意，在清单 3-1 中，在刚刚讨论的三条线之后，滑块控件有一个处理程序代码，它会动态更新一个 `Text` 节点以显示虚线偏移值。同时请注意对 `addListener()`
  方法的调用，其中包含作为更改监听器添加的简洁代码。这在你看来可能有些奇怪；然而，它反映了一个新的 Java 8 特性，称为 lambda 表达式，你将在第 4
  章中了解更多。以下代码片段使用 lambda 而不是匿名内部类（`ChangeListener`）创建了一个更改监听器。


  ```

  // 显示描边虚线偏移值

  slider.valueProperty()

  .addListener( (ov, oldVal, newVal) ->

  offsetText.setText("Stroke Dash Offset: " + newVal));

  ```


  学习如何绘制线条将帮助你将这些知识应用到 JavaFX 中的任何 `Shape` 节点上。这些重要的概念将允许你创建任何你认为合适的、具有特定样式的形状。说到形状，接下来就要讨论它们了。




  ## 绘制形状


  如果你熟悉允许用户在画布上绘制形状的绘图程序，在使用 JavaFX 的 `Shape` API 时，你会发现许多相似之处。JavaFX 的 `Shape` API
  允许你创建许多常见形状，例如直线、矩形和圆形。一些更复杂的形状包括 `Arc`、`CubicCurve`、`Ellipse` 和 `QuadCurve`。当预定义的现成形状不符合要求时，JavaFX
  还允许你创建自定义形状。在本节中，你将探索基本形状、复杂形状和自定义形状。由于篇幅限制，我不会演示 JavaFX 中所有可用的形状。要查看所有可用形状，请参考
  Javadoc 了解详细信息。


  如前所述，JavaFX 具有常见的形状，例如直线、矩形和圆形。在“绘制直线”一节中，你学习了更改任何形状的描边颜色、描边宽度和许多其他属性的基本方法。掌握这些技能将在本章中非常有用。让我们从熟悉矩形形状开始。


  在场景图上绘制矩形相当容易。就像在几何课上一样，你指定宽度、高度和 (x, y) 位置（左上角）来将矩形定位在场景图上。要在 JavaFX 中绘制矩形，你可以使用
  `javafx.scene.shape.Rectangle` 类。除了常见属性外，`Rectangle` 类还实现了弧宽和弧高。此功能将在矩形上绘制圆角。图 3-7
  显示了一个圆角矩形，它同时具有弧宽和弧高。


  ![A323804_3_En_3_Fig7_HTML.jpg](img/A323804_3_En_3_Fig7_HTML.jpg)


  图 3-7.


  圆角矩形的弧宽和弧高


  以下是一个代码片段，它绘制了一个位于 (50, 50)、宽度为 100、高度为 130、弧宽为 10、弧高为 40 的矩形。


  ```

  Rectangle roundRect = new Rectangle();

  roundRect.setX(50);

  roundRect.setY(50);

  roundRect.setWidth(100);

  roundRect.setHeight(130);

  roundRect.setArcWidth(10);

  roundRect.setArcHeight(40);

  ```


  掌握了直线和矩形等简单形状的基本知识，你将能够操作具有等效属性的其他简单形状。有了这些简单形状的知识，让我们来看看如何创建更复杂的形状。


  ## 绘制复杂形状


  学习简单形状固然很好，但要创建更复杂的形状，你需要了解 JavaFX API 还提供了哪些其他内置形状。探索 Java 文档 (`javafx.scene.shape.*`)，你会发现许多可供选择的派生形状类。以下是当前支持的形状：


  *   Arc

  *   Circle

  *   CubicCurve

  *   Ellipse

  *   Line

  *   Path

  *   Polygon

  *   Polyline

  *   QuadCurve

  *   Rectangle

  *   SVGPath

  *   Text（被视为一种形状类型）


  ### 复杂形状示例


  为了演示绘制复杂形状，下一个代码示例绘制了四个有趣的卡通风格形状。通常卡通画有粗的描边宽度，类似于铅笔勾勒的轮廓。示例中的第一个形状是正弦波，第二个是冰淇淋蛋筒，第三个是微笑，最后一个是甜甜圈。在研究代码之前，你可能想先看看绘制在场景上的形状，这样在查看代码清单时，你可以直观地看到每个形状。图
  3-8 是清单 3-2 的输出，描绘了四个复杂形状。


  ![A323804_3_En_3_Fig8_HTML.jpg](img/A323804_3_En_3_Fig8_HTML.jpg)


  图 3-8.


  绘制复杂形状


