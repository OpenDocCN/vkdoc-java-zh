  \ unitType 指定 c 表示摄氏度，f 表示华氏度。\n* @return String 表示 Web 请求的查询字符串。\n*/\nprivate \
  \ String generateQueryString(String cityRegion, String unitType) {\nString units\
  \ = \"f\".equalsIgnoreCase(unitType) ? \"imperial\": \"metric\";\nString queryString\
  \ = WEATHER_URL +\n\"?q=\" + cityRegion +\n\"&\" + \"units=\" + units +\n\"&\" +\
  \ \"mode=json\" +\n\"&\" + \"appid=\" + API_KEY;\nreturn queryString;\n}\n/**\n\
  * 此方法由 JavaScript 函数\n* findWeatherByLocation() 调用。请参阅 weather_template.html\n*\
  \ 文件。\n* \n* -- 步骤 3 --\n* \n*\n* @param cityRegion 城市、州和国家。\n* @param unitType\
