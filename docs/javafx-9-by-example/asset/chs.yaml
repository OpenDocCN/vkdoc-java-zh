  transitionByFading() 是一个私有工厂方法，它创建一个由两个 FadeTransition 动画组成的 SequentialTransition，负责淡出当前显示的图像并淡入要显示的下一个图像\n\
  ```\n\n清单 7-30 实现了顺序过渡中的步骤。当执行顺序过渡时，第一个过渡 (`fadeOut`) 将淡出包含当前图像的 `currentViewImage`\
