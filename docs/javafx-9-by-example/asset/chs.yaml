  ## 播放视频


  在 JavaFX 中播放视频非常简单。你可以使用与音频相同的 API 将媒体加载到 JavaFX 媒体播放器对象中。唯一的区别是你需要一个 `MediaView`
  节点来在场景上显示视频。由于 `MediaView` 是一个 JavaFX 节点，你可以对其进行变换、缩放、平移和应用效果。在本节中，你将了解跨平台视频媒体文件格式，稍后你将看到一个
  JavaFX 视频播放器的示例。


  在撰写本书时，JavaFX 媒体播放器 API 支持 MPEG-4 H.264/AVC (`.mp4`) 和 VP6（使用 `.flv` 容器格式）视频格式。


  ### MPEG-4


  MPEG-4 是一种多媒体容器格式，包含 H.264/AVC 视频。目前，MPEG-4 是一种广泛用于在互联网上观看视频的压缩视频格式。你会发现一些高清录像机可以自动将原始视频转换为
  MPEG-4，生成扩展名为 `.mp4` 的文件。对于不能生成 `mp4` 文件的设备，你目前需要购买能够将原始视频转换为 MP4 格式文件的电影或视频编辑软件。


  以下软件程序（以及其他程序）可以将原始视频转换为便携式 MPEG4 格式：


  *   Adobe Premiere

  *   Apple Final Cut Pro

  *   Apple iMovie

  *   Apple Quick Time Pro

  *   Sony Vegas Movie Studio

  *   Sony Vegas Pro

  *   FFmpeg




  ### VP6 .flv 格式


  JavaFX 2.x 及更高版本支持一种名为 VP6 的跨平台视频格式，其文件扩展名为 `.flv`（代表流行的 Adobe Flash 视频格式）。用于创建
  VP6 和 `.flv` 文件的实际编码器和解码器（编解码器）由一家名为 On2 的公司授权。2010 年，On2 被谷歌收购，用于构建 VP7 和 VP8，使其成为开放且免费的技术，以推动
  HTML5 的发展。


  有关要使用的格式的更多详细信息，请参阅 Javadoc。给聪明人的忠告：警惕那些声称可以免费转换视频的网站。截至撰写本文时，唯一能够合法地将视频编码为 VP6
  的编码器是 Adobe 的商业转换器。


  您可能想知道，在没有编码软件的情况下如何获取 `.flv` 文件。如果您手头没有 `.flv` 文件，可以从我最喜欢的网站之一 Media College（[`http://www.mediacollege.com`](http://www.mediacollege.com)）获取。从摄影到电影，Media
  College 提供论坛、教程和资源，帮助引导您进入媒体世界。


  在那里，您可以获取一个特定的媒体文件，用于本章中与隐藏式字幕相关的某个示例。要获取 `.flv` 文件，请导航至以下 URL：


  [`http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html`](http://www.mediacollege.com/adobe/flash/video/tutorial/example-flv.html)
  `.`


  接下来，找到名为“Windy 50s Mobility Scooter Race”的链接，该链接指向 `.flv` 媒体文件（`20051210-w50s.flv`）。要下载所需文件的链接，请右键单击并选择“目标另存为”或“保存”。将文件本地保存到文件系统后，即可将其用于本章的示例。


  本章不要求您必须拥有 `.flv` 文件。您可以使用 MPEG-4（mp4）格式的文件来运行示例。


