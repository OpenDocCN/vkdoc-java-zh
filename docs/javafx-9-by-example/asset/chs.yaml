  \ 5-2 中的各项组成。\n\n注意\n\n当使用可调整大小的父节点时，例如将 `HBox` 实例放在 `BorderPane` 的中心，`HBox` 节点的宽度和高度将会拉伸。在这种情况下，对于不可调整大小的子节点，唯一被拉伸的部分是\
  \ `HBox` 周围的边框和内边距，即 `BorderPane` 父节点的内边距区域。虚线边框看起来就像是环绕着边框面板的中心区域，占据了可用的宽度和高度。\n\
  \n### VBox\n\n[`VBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/VBox.html)\
  \ 布局与 `HBox` 类似，不同之处在于它将子节点垂直堆叠在一列中。随着子节点的添加，每个子节点都放置在前一个子节点的下方。默认情况下，`VBox` 尊重子节点的首选宽度和高度。当父节点不可调整大小时（例如，`Group`\
  \ 节点），列的最大宽度基于具有最大首选宽度的子节点。`VBox` 的整体高度也是如此，它基于边框、内边距、间距、外边距和子节点高度的总和。\n\n此外，默认情况下，每个子节点都对齐到左上角（`Pos.TOP_LEFT`）位置。要更改默认对齐方式，请使用\
  \ `setAlignment(Pos value)` 方法。请参考 [`https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html)\
  \ 上的 Javadoc 文档，查看所有可能的子节点在单元格内的对齐位置。`VBox` 布局可以配置调整大小范围，以允许父节点在布局请求时管理和计算可用空间。请记住，要调整\
  \ `VBox` 及其子节点的大小，`VBox` 的父节点也必须可调整大小，例如 `BorderPane` 实例的中心区域。\n\n\n\n#### VBox\
  \ 示例\n\n为了演示 `VBox` 的用法，清单 5-2 中的示例包含了与前一个示例相同的四个矩形，并使用了相同的布局约束。与 `HBox` 示例类似，代码将使用一个像素的描边宽度来绘制虚线边框（蓝色），并设置一个像素的内边距。\n\
  \n```\nVBox vbox = new VBox(5);        // 仅子节点之间的间距\nvbox.setPadding(new Insets(1));\
  \ // vbox 边框与子节点列之间的空间\n// 边框为蓝色、虚线、所有角半径为 0%、\n// 宽度为 1 像素\nBorderStroke [] borderStrokes\
  \ = new BorderStroke[] {\nnew BorderStroke(Color.BLUE,\nBorderStrokeStyle.DASHED,\n\
  new CornerRadii(0.0, true),\nnew BorderWidths(1.0))\n};\nvbox.setBorder(new Border(borderStrokes));\n\
  Rectangle r1 = new Rectangle(10, 10); // 小正方形\nRectangle r2 = new Rectangle(20,\
  \ 20); // 大正方形\nRectangle r3 = new Rectangle(5, 20);  // 垂直矩形\nRectangle r4 = new\
  \ Rectangle(20, 5);  // 水平矩形\nVBox.setMargin(r1, new Insets(2,2,2,2)); // r1 的外边距\n\
  vbox.getChildren().addAll(r1, r2, r3, r4);\nroot.getChildren().add(vbox);\nprimaryStage.setOnShown((WindowEvent\
  \ we) -> {\nSystem.out.println(\"vbox width  \" + vbox.getBoundsInParent().getWidth());\n\
  System.out.println(\"vbox height \" + vbox.getBoundsInParent().getHeight());\n});\n\
