  \n### 选择菜单和菜单项的其他方式\n\n在前面的示例中，你学习了如何使用鼠标创建和调用菜单项，但你是否知道还有其他调用菜单项的方法？在本节中，你将学习另外三种调用菜单项的方法：通过构建键盘助记符、组合键和上下文菜单。\n\
  \n#### 键盘助记符\n\n标准菜单通常具有键盘助记符，以便在不使用鼠标的情况下选择菜单项。通常，使用菜单的应用程序允许用户按下 Alt 键，这会在菜单文本标签的某个字母下方显示下划线\
  \ (_)。用户按下该字母后，菜单将下拉显示其子菜单项，并且用户可以使用箭头键进行导航。请记住，此行为仅在 Windows 平台上有效。\n\n要在代码中实现此行为，你可以像之前一样通过调用接收\
  \ `String` 值的构造函数来实例化一个菜单，但这次你需要在菜单或菜单项文本中所选字母前放置一个下划线字符。此外，为了让系统识别助记符，你只需将 `true`\
  \ 传递给 `setMnemonicParsing(true)` 方法。清单 6-20 创建了一个使用字母“F”作为助记符的“文件”菜单。\n\n```\nMenu\
  \ fileMenu = new Menu(\"_File\");\nfileMenu.setMnemonicParsing(true);\n清单 6-20.\n\
  创建一个文件菜单，其助记符为字母“F”\n```\n\n#### 组合键\n\n组合键是选择菜单选项的按键组合。例如，Windows 平台上的大多数应用程序使用组合键\
  \ Ctrl+S 来保存文件。在 MacOS 平台上，组合键是 Command (⌘)+S。诸如 Ctrl、Command、Alt、Shift 和 Meta 等键被称为修饰键。通常这些修饰键与单个字母组合按下。有时组合键也被称为键盘快捷键（映射到菜单项）。\n\
  \n要创建组合键，你需要一个 `KeyCodeCombination` 对象的实例，该对象将包含按键和修饰键。清单 6-21 提供了一个 (Ctrl 或 Meta)+S\
  \ 的键码组合。你会注意到代码使用了 `KeyCombination.SHORTCUT_DOWN` 值作为键修饰符，而不是 `CONTROL_DOWN` 或 `META_DOWN`。原因很简单；`SHORTCUT_DOWN`\
  \ 的值将使应用程序能够跨平台运行。`CONTROL_DOWN` 和 `META_DOWN` 值分别依赖于 Windows 和 MacOS 平台，但 `SHORTCUT_DOWN`\
  \ 适用于所有平台。\n\n```\nMenuItem saveItem = new MenuItem(\"_Save\");\nsaveItem.setMnemonicParsing(true);\n\
  saveItem.setAccelerator(new KeyCodeCombination(KeyCode.S, KeyCombination.SHORTCUT_DOWN));\n\
  清单 6-21.\n一个映射到键盘快捷键 Ctrl+S（Windows）或 Command+S（Mac）的菜单项\n```\n\n#### 上下文菜单\n\n\
  上下文菜单是当用户在 JavaFX UI 控件或舞台表面右键单击鼠标时显示的弹出菜单。要创建上下文菜单，你需要实例化一个 `ContextMenu` 类。与常规菜单完全一样，`ContextMenu`\
  \ 菜单有一个 `getItems().add()` 方法来添加菜单项。以下代码片段显示了一个实例化并带有一个菜单项（`exitItem`）的上下文菜单：\n\n\
  ```\nContextMenu contextFileMenu = new ContextMenu(exitItem);\n```\n\n为了响应应用程序中场景上的鼠标右键单击，你可以添加一个事件处理程序来监听右键单击事件。一旦检测到，就会调用上下文菜单的\
  \ `show()` 方法。清单 6-22 中的代码设置了一个事件处理程序，分别根据鼠标右键或左键单击来显示和隐藏上下文菜单。注意由主鼠标按钮单击（左键单击）调用的\
  \ `hide()` 方法，用于移除上下文菜单。\n\n```\nprimaryStage.addEventHandler(MouseEvent.MOUSE_CLICKED,\n\
  (MouseEvent me) -> {\nif (me.getButton() == MouseButton.SECONDARY || me.isControlDown())\
  \ {\ncontextFileMenu.show(root, me.getScreenX(), me.getScreenY());\n} else {\ncontextFileMenu.hide();\n\
  }\n});\n清单 6-22.\n附加一个事件处理程序，该处理程序在 JavaFX 舞台上遇到鼠标右键单击事件时显示弹出菜单\n```\n\n要查看展示这些调用菜单的附加策略的完整代码清单，请访问本书网站下载名为\
  \ `KeyCombinationsAndContextMenus.java` 的项目。\n\n\n\n## ObservableList 集合类\n\n在使用\
  \ Java Collections API 时，你会注意到许多有用的容器类，它们代表了诸如集合、映射和列表等数据结构。其中一种常用的具体列表类是 `java.util.ArrayList`，它实现了\
  \ `List` 接口。长期以来，Java Swing 开发者使用 `ListModels` 和 `ArrayList` 来构建应用程序，以表示将在类似列表的\
  \ UI 控件中显示的对象列表。导致诸多困扰的问题在于同步列表模型和视图组件的能力。为了解决这个问题，你可以使用 JavaFX 的 `ObservableList`\
  \ 类。`ObservableList` 类是一种集合，当对象被添加、更新和移除时，它能够通知 UI 控件。\n\n以下是使用 `FXCollections.observableArrayList()`\
  \ 函数将现有集合包装成可观察列表的方法：\n\n```\nList doctors = ...// 查询数据库\nObservableList obsDoctors\
  \ = FXCollections.observableArrayList(doctors);\n```\n\nJavaFX 的 `ObservableList`\
  \ 通常用于列表 UI 控件，例如 `ListView` 和 `TableView`。让我们看两个将使用 `ObservableList` 集合类的示例。要了解其他可观察集合（如映射、集合和数组），请参阅\
  \ API `javafx.collections.FXCollections` 的 Javadoc 文档。\n\n## 使用 ListView\n\nJavaFX\
  \ 的 `ListView` 控件类似于 Java Swing 的 `JList` 组件。`ListView` 由一个可观察列表（`ObservableList`）支持。与\
  \ Java Swing 的 `ListModel` 类似，当修改可观察列表中的项目时，`ListView` 控件会自动更新其 UI 显示。以下代码创建了一个用于\
  \ `ListView` 控件的可观察列表。\n\n```\nObservableList javafxers = FXCollections.observableArrayList(\n\
  \"Carl Dea\",\n\"Gerrit Grunwald\",\n\"Mark Heckler\",\n\"José Pereda\",\n\"Sean\
  \ Phillips\");\nListView myListView = new ListView(javafxers);\n```\n\n这段代码展示了如何创建一个由\
  \ `String` 对象的可观察列表支持的 `ListView`。默认情况下，如果项目是字符串，`ListView` 会直接显示它们。但如果它们包含你创建的领域对象呢？答案是使用单元格工厂。你将在下一节关于\
  \ `TableView` 的内容中了解它们；现在，让我们看看如何操作可观察列表和 `ListView` 控件中的项目。\n\n### 示例：英雄选择器\n\n\
  英雄选择器示例应用程序将演示 `ObservableList` 的功能；它显示两个 JavaFX `ListView` UI 控件，并允许用户在两个 `ListView`\
  \ 控件之间传输项目。一个列表包含候选英雄，另一个列表包含已经成为英雄的人。如图 6-14 所示，此应用程序允许你选择一个候选人，将其转移到包含已选英雄的另一个\
  \ `ListView` 控件。\n\n![A323804_3_En_6_Fig14_HTML.jpg](img/A323804_3_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14.\n\n英雄选择器应用程序，用于选择候选人作为英雄，以演示 ListView 控件\n\n```\n/**\n* 英雄选择器应用程序演示可观察列表和列表视图。\n\
  * @author cdea\n*/\npublic class HeroPicker extends Application {\n@Override\npublic\
  \ void start(Stage primaryStage) {\nprimaryStage.setTitle(\"HeroPicker: 创建和使用 ObservableLists\"\
  );\nBorderPane root = new BorderPane();\nScene scene = new Scene(root, 500, 350,\
  \ Color.WHITE);\n// 创建一个网格面板\nGridPane gridpane = new GridPane();\ngridpane.setPadding(new\
  \ Insets(10));\ngridpane.setHgap(10);\ngridpane.setVgap(10);\ngridpane.setPrefHeight(Double.MAX_VALUE);\n\
  ColumnConstraints column1 = new ColumnConstraints(150, 150, Double.MAX_VALUE);\n\
  ColumnConstraints column2 = new ColumnConstraints(50);\nColumnConstraints column3\
  \ = new ColumnConstraints(150, 150, Double.MAX_VALUE);\ncolumn1.setHgrow(Priority.ALWAYS);\n\
  column3.setHgrow(Priority.ALWAYS);\ngridpane.getColumnConstraints().addAll(column1,\
  \ column2, column3);\n// 候选人标签\nLabel candidatesLbl = new Label(\"候选人\");\nGridPane.setHalignment(candidatesLbl,\
  \ HPos.CENTER);\ngridpane.add(candidatesLbl, 0, 0);\n// 英雄标签\nLabel heroesLbl =\
  \ new Label(\"英雄\");\ngridpane.add(heroesLbl, 2, 0);\nGridPane.setHalignment(heroesLbl,\
  \ HPos.CENTER);\n// 候选人\nObservableList candidates = FXCollections.observableArrayList(\"\
  超人\",\n\"蜘蛛侠\",\n\"金刚狼\",\n\"警察\",\n\"消防救援\",\n\"士兵\",\n\"爸爸妈妈\",\n\"医生\",\n\"政治家\"\
  ,\n\"牧师\",\n\"教师\");\nListView candidatesListView = new ListView(candidates);\n\
  gridpane.add(candidatesListView, 0, 1);\n// 英雄\nObservableList heroes = FXCollections.observableArrayList();\n\
  ListView heroListView = new ListView(heroes);\ngridpane.add(heroListView, 2, 1);\n\
  // 选择英雄\nButton sendRightButton = new Button(\" > \");\nsendRightButton.setOnAction((ActionEvent\
  \ event) -> {\nString potential = candidatesListView.getSelectionModel().getSelectedItem();\n\
  if (potential != null) {\ncandidatesListView.getSelectionModel().clearSelection();\n\
  candidates.remove(potential);\nheroes.add(potential);\n}\n});\n// 取消选择英雄\nButton\
  \ sendLeftButton = new Button(\"  {\nString notHero = heroListView.getSelectionModel().getSelectedItem();\n\
  if (notHero != null) {\nheroListView.getSelectionModel().clearSelection();\nheroes.remove(notHero);\n\
  candidates.add(notHero);\n}\n});\nVBox vbox = new VBox(5);\nvbox.getChildren().addAll(sendRightButton,sendLeftButton);\n\
  vbox.setAlignment(Pos.CENTER);\ngridpane.add(vbox, 1, 1);\nroot.setCenter(gridpane);\n\
  GridPane.setVgrow(root, Priority.ALWAYS);\nprimaryStage.setScene(scene);\nprimaryStage.show();\n\
  }\npublic static void main(String[] args) {\nlaunch(args);\n}\n}\n清单 6-23.\n英雄选择器应用程序演示\
  \ ObservableList 和 ListView 类\n```\n\n图 6-15 显示了清单 6-23（英雄选择器应用程序）的输出。\n\n![A323804_3_En_6_Fig15_HTML.jpg](img/A323804_3_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15.\n\n英雄选择器应用程序的输出，演示了 ObservableList 和 ListView 类的使用\n\n\n\n### 工作原理\n\n\
  本示例创建了一个图形用户界面应用程序，允许用户选择他们最喜欢的英雄。这与通过从列表框组件中添加或删除项目来管理用户角色的系统管理应用程序非常相似。在 JavaFX\
  \ 中，代码示例使用了两个 `ListView` 控件来保存 `String` 对象。为简洁起见，我们不讨论布局的使用，而是直接跳转到与按钮操作和 `ListView`\
  \ 控件相关的代码。\n\n基于清单 6-23，在创建 `ListView` 实例之前，代码会创建一个包含候选列表的 `ObservableList`。这里你会注意到使用了一个名为\
  \ `FXCollections` 的工厂类，你可以将常见的集合类型传入其中，这些集合类型会被包装并以 `ObservableList` 的形式返回给调用者。在该示例中，一个字符串数组被传入\
  \ `FXCollections.observableArrayList()` 方法，而不是一个 `ArrayList`。使用 `ObservableList`\
  \ 允许你通过一次方法调用同时更新数组中的项目列表和屏幕上的显示内容。\n\n希望你已了解如何使用 `FXCollections` 类。下面的代码行调用了 `FXCollections.observableArrayList()`\
  \ 方法类，以返回一个可观察列表（`ObservableList`）：\n\n```\nObservableList candidates = FXCollections.observableArrayList(...);\n\
  ```\n\n代码创建 `ObservableList` 后，会使用一个接收该可观察列表的构造函数来实例化 `ListView` 类。以下代码创建并填充了一个\
  \ `ListView` 对象：\n\n```\nListView candidatesListView = new ListView(candidates);\n\
  ```\n\n最后一项任务是代码像操作 `java.util.ArrayList` 一样操作 `ObservableList`。当它们被操作时，`ListView`\
  \ 会收到通知并自动更新以反映 `ObservableList` 的变化。清单 6-24 实现了当用户按下向右发送（>）按钮时的动作事件代码。\n\n```\n\
  // 选择英雄\nButton sendRightButton = new Button(\">\");\nsendRightButton.setOnAction(\
  \ actionEvent -> {\nString potential = candidatesListView.getSelectionModel().getSelectedItem();\n\
  if (potential != null) {\ncandidatesListView.getSelectionModel().clearSelection();\n\
  candidates.remove(potential);\nheroes.add(potential);\n}\n});\n清单 6-24.\n处理选定项目的动作代码\n\
  ```\n\n为了设置按钮的动作代码，代码使用了一个以 `actionEvent`（`ActionEvent`）为参数的 lambda 表达式，该表达式在按钮被点击时调用。当按钮按下事件发生时，代码通过\
  \ `ListView` 上的 `getSelectionModel()` 方法确定 `ListView` 中哪个项目被选中。一旦确定了项目，代码会清除选择、移除该项目，并将该项目添加到\
  \ `Heroes ObserverableList` 中。如果你不清除选择，被移除项目之后的下一个项目将会被选中。\n\n当使用 `ObserverableList`\
  \ 时，移除或添加项目会通知控件。其妙处在于，当 `ObserverableList` 发生变化时，无需刷新 `ListView` UI 控件，因为 `ListView`\
  \ 会自动更新。\n\n## 使用 TableView\n\n你还可以在其他类似列表的 UI 控件（如 `TableView`）中使用 `ObservableList`。JavaFX\
  \ 的 `javafx.scene.control.TableView` 控件类似于 Swing 的 `JTable` 组件，它包含行、列和单元格，与电子表格应用程序非常相似。以下代码片段创建了一个\
  \ `TableView` 控件，其中包含一个针对领域对象 `firstName` 属性的列。\n\n```\nTableView employeeTableView\
  \ = new TableView();\nTableColumn firstNameCol = new TableColumn(\"First Name\"\
  );\nfirstNameCol.setCellValueFactory(new PropertyValueFactory(\"firstName\"));\n\
  ```\n\n### 什么是单元格工厂？\n\n单元格工厂提供了一种自定义如何在单元格中显示内容的方法，例如 `ListView` 的一行或 `TableView`\
  \ 控件中一列的单元格。清单 6-25 展示了如何创建一个单元格工厂，以在 `ListView` 的单元格行中显示 `Person` 对象的姓和名。\n\n```\n\
  // 显示姓和名\npersonListView.setCellFactory(new Callback, ListCell>() {\n@Override\n\
  public ListCell call(ListView param) {\nLabel leadLbl = new Label();\nListCell cell\
  \ = new ListCell() {\n@Override\npublic void updateItem(Person item, boolean empty)\
  \ {\nsuper.updateItem(item, empty);\nif (item != null) {\nleadLbl.setText(item.getAliasName());\n\
  setText(item.getFirstName() + \" \" + item.getLastName());\n}\n}\n}; // ListCell\n\
  return cell;\n}\n}); // setCellFactory\n清单 6-25.\n为列表视图控件设置单元格工厂（回调）\n```\n\n当然，这段代码看起来有些冗长，因此清单\
  \ 6-26 展示了使用更简洁的基于 lambda 语法的转换代码。\n\n```\n// 使用别名显示姓和名并带工具提示\npersonListView.setCellFactory(listView\
  \ -> {\nLabel leadLbl = new Label();\nListCell cell = new ListCell() {\n@Override\n\
  public void updateItem(Person item, boolean empty) {\nsuper.updateItem(item, empty);\n\
  if (item != null) {\nleadLbl.setText(item.getAliasName());\nsetText(item.getFirstName()\
  \ + \" \" + item.getLastName());\n}\n}\n}; // ListCell\nreturn cell;\n}); // setCellFactory\n\
  清单 6-26.\n使用基于 Lambda 的语法设置单元格工厂以减少样板代码\n```\n\n### 使表格单元格可编辑\n\n你是否曾希望能够修改单元格？JavaFX\
  \ 的 `TableView` 控件及其单元格是可以编辑的。在设计 `TableView` 时，JavaFX 工程师已经考虑到了这一点，并提供了便捷的函数来实现可编辑单元格。\n\
  \n#### 将表格单元格编辑为文本字段\n\n一种显而易见的可编辑单元格是允许用户使用 `textfield` 控件编辑与该单元格关联的信息。以下代码片段将一个列设置为可编辑的文本字段。\n\
  \n```\nTableColumn aliasNameCol = new TableColumn(\"Alias\");\naliasNameCol.setCellValueFactory(new\
