  \ Red 主题。\n\n如你所见，同一个应用程序应用了四种 UI 皮肤。左上角是 Java FX 2.X 中熟悉的 Caspian 主题。多年来，Caspian\
  \ 一直表现出色，至今仍具有相当专业的外观。左下角是一个展开的手风琴 UI 控件，展示了使用 JavaFX 8 的新默认主题 Modena 的进度控件。Modena\
  \ 主题看起来更明亮、更简洁、更现代。\n\n右下角是下一个主题，名为 Sky 外观，由本人（Carl Dea）创建。我的意图是为触摸屏创建一个主题，使控件略微放大，以适应成年人的手指。我想要一种友好的感觉，于是想到了凉爽的蓝色天空。\n\
  \n最后但同样重要的是，右上角是 Flat Red 外观，由 Gerrit Grunwald 创建。\n\nFlat Red 使用自定义字体（Roboto），使控件上的文本看起来清晰整洁。Flat\
  \ Red 主题的另一个优点是，它基于 UI 控件的伪类状态变化（例如，在滑块控件上按下鼠标）来使用 CSS 效果。如果你还不了解什么是伪类，请不要担心，本章后面你将详细了解伪类选择器。Grunwald\
  \ 先生的外观也是触摸屏应用的绝佳选择。\n\n### 原生外观\n\n在进入示例代码之前，我想向 JavaFX 社区中那些制作了精美皮肤和主题的个人（先驱者）致敬，你会发现他们极具启发性。对于那些对\
  \ OS X（Mac 桌面）原生外观感兴趣的人，Claudine Zillmann（`@etteClaudette`）创建了 AquaFX（包含 Elements）。你可以从[`http://aquafx-project.com`](http://aquafx-project.com)下载\
  \ AquaFX。如图 15-2 所示，AquaFX 是一个库，允许开发者轻松地使用原生 OS X 外观来设计应用程序样式，并且还可以使用除通常的浅蓝色之外的其他颜色来对\
  \ UI 进行主题化。\n\n![A323804_3_En_15_Fig2_HTML.jpg](img/A323804_3_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2.\n\nAquaFX 是一个 JavaFX 库，用于设计类似于 OS X 原生外观的控件样式\n\n对于那些对 Windows Metro 外观感兴趣的人，Pedro\
  \ Duque Vieira（`@P_Duke`）创建了一个名为 JMetro 的项目。JMetro 有一个浅色主题，如图 15-3 所示，以及一个深色主题，如图\
  \ 15-4 所示。\n\n![A323804_3_En_15_Fig4_HTML.jpg](img/A323804_3_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4.\n\n使用 JMetro 深色主题样式化的日期选择器控件\n\n![A323804_3_En_15_Fig3_HTML.jpg](img/A323804_3_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3.\n\n使用 JMetro 浅色主题样式化的日期选择器控件\n\n要下载 JMetro 主题，请访问 JFXtras 的样式部分，网址为[`https://github.com/JFXtras/jfxtras-styles/tree/master/src`](https://github.com/JFXtras/jfxtras-styles/tree/master/src)。\n\
  \n那么，有没有一种类似 Roku 或 Apple TV 界面的外观呢？它叫做 Flatter，由 Java Champion 兼书籍作者 Hendrik Ebbers（`@hendrikEbbers`）创建。Flatter\
  \ 是为一个概念验证项目 BoxFX 设计的。BoxFX 是 Ebbers 先生创建的另一个项目，它使用运行 JavaFX 8 并应用 Flatter 外观的\
  \ Raspberry Pi 设备，如图 15-5 所示。\n\n![A323804_3_En_15_Fig5_HTML.jpg](img/A323804_3_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5.\n\n应用于 JavaFX 应用程序的 Flatter 样式\n\n以下是本节提到的 UI 样式的链接：\n\n*   AquaFX（包含\
  \ Elements）：[`http://aquafx-project.com/project.html`](http://aquafx-project.com/project.html)\n\
  *   Jmetro\n    *   [`http://pixelduke.wordpress.com/category/metro`](http://pixelduke.wordpress.com/category/metro)\n\
  \    *   [`https://github.com/JFXtras/jfxtras-styles`](https://github.com/JFXtras/jfxtras-styles)\n\
  *   Flatter：[`http://www.guigarage.com/2013/09/flatter`](http://www.guigarage.com/2013/09/flatter)\n\
  *   BoxFX：[`http://www.guigarage.com/2013/08/boxfx-javaone-preview-1`](http://www.guigarage.com/2013/08/boxfx-javaone-preview-1)\n\
  \n现在你已经了解了原生样式和媒体设备样式，让我们来看看 Web 和移动 UI 样式。\n\n### Web 和移动外观\n\n根据应用程序的不同，用户可能更喜欢更偏向\
  \ Web 或移动端的外观。通常，设备的屏幕尺寸会迫使设计者决定采用非原生 UI 外观。非原生 UI 构成了大多数流行网站和移动应用的主体。那么，我指的是哪些流行的非原生\
  \ UI 呢？\n\n作为一名 Web 开发者，当今最流行的 UI 样式（外观）是谷歌的 Material Design 和推特的 Bootstrap。例如，图\
  \ 15-6 展示了一个应用了 Material Design 样式的 JavaFX 时钟和`TreeTableView`控件。\n\n![A323804_3_En_15_Fig6_HTML.jpg](img/A323804_3_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6.\n\n应用于 JavaFX 应用程序的 Material Design 样式\n\n图 15-7 展示了应用了推特 Bootstrap 外观的按钮。\n\
  \n![A323804_3_En_15_Fig7_HTML.jpg](img/A323804_3_En_15_Fig7_HTML.jpg)\n\n图 15-7.\n\
  \n应用于按钮控件的推特 Bootstrap 样式\n\n随着 JavaFX 社区不断发展和适应这些新的 UI 样式，越来越多的开发者将这些流行的 UI 样式移植为库，以帮助你轻松地将\
  \ JavaFX 应用程序转换为这些流行的 UI 样式。\n\n新加入创建流行 Web 和移动设备主题行列的开发者如下：\n\n*   （谷歌）Material\
  \ Design\n    *   GluonHQ\n        *   网站：[`http://gluonhq.com/products/mobile/`](http://gluonhq.com/products/mobile/)\n\
  \    *   JFoenix\n        *   网站：[`http://www.jfoenix.com`](http://www.jfoenix.com)\n\
  \        *   作者：[`http://www.jfoenix.com/team.html`](http://www.jfoenix.com/team.html)\n\
  \    *   MaterialFX\n        *   网站：[`http://www.agix.pt/single-post/2015/09/02/MaterialFX-Material-Design-CSS-for-JavaFX`](http://www.agix.pt/single-post/2015/09/02/MaterialFX-Material-Design-CSS-for-JavaFX)\n\
  *   （推特）Bootstrap\n    *   JBootx\n        *   网站：[`https://github.com/dicolar/jbootx`](https://github.com/dicolar/jbootx)\n\
  \        *   作者：[`https://github.com/dicolar/jbootx/graphs/contributors`](https://github.com/dicolar/jbootx/graphs/contributors)\n\
  \    *   BootstrapFX\n        *   网站：[`https://github.com/aalmiray/bootstrapfx`](https://github.com/aalmiray/bootstrapfx)\n\
  \        *   作者：Andres Almiray\n\n\n\n### 应用 JavaFX CSS 主题\n\n在领略了一些精美的皮肤和 UI 样式之后，让我们来看看如何应用基于\
  \ JavaFX CSS 的样式。JavaFX 能够将层叠样式表应用于场景图及其节点，其方式与 Web 开发者对 HTML5 元素使用 CSS 样式表非常相似。这些\
  \ CSS 样式表是包含属性和值的外部文件，用于为 JavaFX 节点设置样式。一个 JavaFX CSS 文件的示例如清单 15-1 所示。\n\n```\n\
  /* sample.css */\n.button {\n-fx-text-fill: brighter-sky-blue;\n-fx-border-color:\
  \ rgba(255, 255, 255, .80);\n-fx-border-radius: 8;\n-fx-padding: 6 6 6 6;\n-fx-font:\
  \ bold italic 20pt \"LucidaBrightDemiBold\";\n}\n/* ...更多样式 */\n清单 15-1.\n包含样式属性的\
  \ JavaFX CSS 文件\n```\n\n这段代码包含一个针对 JavaFX 按钮控件的 CSS 类样式定义。按钮 UI 控件默认具有一个类样式 `button`，该样式映射到以\
  \ `-fx-` 为前缀的属性。你将在本章后面学习 JavaFX CSS 样式设置，但现在我们先讨论如何在 CSS 样式表之间切换，从而动态地为应用程序换肤。\n\
  \n在本节中，你将学习两种将 CSS 样式表作为外观主题应用于 JavaFX 应用程序的方法。以下是将 JavaFX CSS 文件应用于场景图节点的两种方式。\n\
  \n*   `javafx.application.Application: setUserAgentStylesheet()`\n*   `javafx.scene.Scene:\
  \ getStylesheets().add()`\n\n#### 使用 setUserAgentStylesheet(String URL) 方法\n\n应用\
  \ CSS 样式表的第一种方法是在 JavaFX Application（`javafx.application.Application`）类上调用静态方法 `setUserAgentStylesheet()`。此静态方法会为\
  \ JavaFX 应用程序中的所有场景及其所有子节点设置样式，如下所示。\n\n```\nApplication.setUserAgentStylesheet(url);\n\
  ```\n\n`setUserAgentStylesheet(String URL)` 方法接受一个表示 JavaFX CSS 文件的有效 URL 字符串。通常，CSS\
  \ 文件被打包在 JAR 应用程序中；但它们也可以位于本地文件系统或远程 Web 服务器上。当 CSS 文件在类路径中时，调用以下方法将找到该 CSS 文件并生成一个用于访问该文件的\
  \ URL 字符串：\n\n```\ngetClass().getResource(\"path/some_file.css\").toExternalForm()\n\
  ```\n\n这假设该资源与编译后的类文件位于同一位置并被复制到一起。\n\n以下代码片段将 `sample.css` 文件加载为 JavaFX 应用程序的当前外观。代码片段中的\
  \ `sample.css` 文件与当前类位于同一位置。换句话说，你的 Java 类和 CSS 文件在同一个目录中，因此文件名前不需要路径。\n\n```\n\
  Application.setUserAgentStylesheet(getClass().getResource(\"sample.css\")\n.toExternalForm());\n\
  ```\n\n`setUserAgentStylesheet()` 方法会将样式全局应用于应用程序拥有的所有场景，例如上下文菜单和子弹出窗口。JavaFX 8\
  \ 目前包含两个样式表——Caspian 和 Modena——它们作为默认的跨平台外观皮肤。由于这两个样式表是预定义的，你可以使用 `setUserAgentStylesheet()`\
  \ 方法轻松地在它们之间切换。以下代码展示了如何在 Caspian 和 Modena 外观样式表之间切换。\n\n```\n// 切换到 JavaFX 2.x\
  \ 的 CASPIAN 外观。\nApplication.setUserAgentStylesheet(STYLESHEET_CASPIAN);\n// 切换到\
  \ JavaFX 8 的 Modena 外观。\nApplication.setUserAgentStylesheet(STYLESHEET_MODENA);\n\
  ```\n\n学习专业人士如何做到这一点（创建皮肤）的一个好方法是查看优秀的示例。你可以从 `jfxrt.jar` 文件中提取 CSS 文件（`caspian.css`\
  \ 和 `modena.css`），或者查看位于 [`http://openjdk.java.net`](http://openjdk.java.net) 的\
  \ JavaFX 源代码。要获取 `jfxrt.jar`，你必须使用 Java 9 之前的 JDK。\n\n由于 Java 9 不再在运行时或 JDK 中提供\
  \ `jfxrt.jar`，你需要在 `JAVA_HOME` 下查找 `jmods` 目录。Project Jigsaw 的一部分工作也是将运行时重构为模块。在\
  \ `jmods` 目录中，你应该会找到名为 `javafx.controls.jmod` 的模块。为了进入模块文件，你必须将该模块复制到某个临时目录。接下来，你应该重命名复制的模块，并以\
  \ `.jar` 扩展名结尾以便解压。最后，在重命名后的模块上调用 `jar xvf`。使用你的文件资源管理器或 Finder 定位以下文件：\n\n```\n\
  classes/com/sun/javafx/scene/control/skin/modena/modena.css\n```\n\n`modena.css`\
  \ 文件包含了默认外观的所有 JavaFX CSS 样式。你可以从这个文件中学习专家如何为 JavaFX 平台上的每个控件设置样式。\n\n注意\n\n当你通过传递\
  \ `null` 值调用 `setUserAgentStylesheet(null)` 方法时，默认样式表（Modena）将被自动加载并设置为当前外观。但是，如果你使用的是\
  \ JavaFX 2.x，默认样式表将是 Caspian。\n\n#### 使用 Scene 的 getStylesheets().add(String URL)\
  \ 方法\n\n应用外观的第二种方法是调用 Scene 对象的 `getStylesheets().add()` 方法。与第一种应用外观的方法不同，`getStylesheets().add()`\
  \ 方法用于为单个场景及其子节点设置样式。\n\n通过调用 `getStylesheets().add()` 方法，你可以为单个场景及其子节点设置样式，如下所示：\n\
  \n```\nScene scene = ...\nscene.getStylesheets().add(getClass().getResource(\"sample.css\"\
  )\n.toExternalForm());\n```\n\n与之前调用 `setUserAgentStylesheet()` 类似，你需要传入一个表示 JavaFX\
  \ CSS 文件的 URL 字符串。稍后，你将看到一个示例应用程序，它通过使用 `setUserAgentStylesheet()` 或 `getStylesheets().add()`\
  \ 方法在不同样式之间切换。如果你决定创建一个完整的 CSS 来为整个应用程序设置样式，你可能会犹豫是否要从头开始。\n\n创建一个完整的外观需要数百甚至数千行代码，才能为\
  \ JavaFX 中的每个 UI 控件设置样式。因此，一个好的做法是从默认外观开始，然后使用 `getStylesheets().add()` 方法覆盖样式。\n\
  \n我基本上创建了非常小的外观样式表文件来演示切换主题的能力。这些简单的示例 CSS 文件只包含少量 CSS 样式，用于设置少量 UI 控件的样式。换句话说，示例中的小型\
  \ CSS 文件是通过 `getStylesheets().add()` 方法加载的，该方法仅对部分节点进行样式设置，而不是应用程序中的每个节点。\n\n由于默认样式表（`Modena.css`）是通过先前调用\
  \ `setUserAgentStylesheet(null)` 方法加载的，因此较小的自定义 CSS 样式文件可以“依附”在默认样式表之上。好处是你无需从头开始创建新的外观。以下代码片段首先使用\
  \ `null` 值调用 `setUserAgentStylesheet()` 方法，该方法将 Modena 加载为默认外观。然后，它通过调用 `getStylesheets().add()`\
  \ 方法来设置场景的附加样式。\n\n```\nApplication.setUserAgentStylesheet(null); // 默认为 Modena\n\
  // 为场景应用自定义外观。\nscene.getStylesheets()\n.add(getClass().getResource(\"my_cool_skin.css\"\
  )\n.toExternalForm());\n```\n\n\n\n### 主题切换示例\n\n为了演示如何在不同的 CSS 样式表（也称为皮肤或主题）之间切换，我创建了一个名为“外观选择器”的示例应用程序，它允许你在不同的预定义主题之间进行选择。图\
  \ 15-8 展示了“外观选择器”示例应用程序的初始界面，它显示了一个包含常用 UI 控件的手风琴式 UI 控制面板，默认使用的是 Modena 外观。\n\n\
  ![A323804_3_En_15_Fig8_HTML.jpg](img/A323804_3_En_15_Fig8_HTML.jpg)\n\n图 15-8.\n\
  \n可从“外观”菜单中选择的预定义外观主题\n\n在图 15-8 中，你会注意到用于选择外观（皮肤）的菜单选项。一旦选择了某个外观，应用程序的外观将动态变化。图\
  \ 15-9 展示了应用程序切换到 Flat Red 外观后的效果。\n\n![A323804_3_En_15_Fig9_HTML.jpg](img/A323804_3_En_15_Fig9_HTML.jpg)\n\
  \n图 15-9.\n\n使用 Flat Red 外观的“外观选择器”应用程序\n\n在图 15-9 中，请注意手风琴式 UI 控件的标题栏显示为“滚动条与滑块”。它已展开，并展示了应用了所选外观的\
  \ UI 控件。这是一种向客户或用户展示不同外观主题的绝佳方式，同时应用程序的其他功能仍可正常运行。\n\n下一节将解释清单 15-2 中“外观选择器”应用程序的主要源代码。为了节省篇幅，这里只展示\
  \ `start()` 方法，而非全部源代码。要查看“外观选择器”应用程序的完整源代码清单，请访问本书网站，下载第 15 章 `LookAndFeelChooser`\
  \ 项目。\n\n#### “外观选择器”示例应用程序代码\n\n将“外观选择器”项目加载到 NetBeans IDE 中，可以看到源代码由六个文件组成：`LookNFeelChooser.java`、`lnf_demo.fxml`、`controlStyle1.css`、`controlStyle2.css`、`flatred.css`\
  \ 和 `sky.css`。`.ttf` 文件是 Flat Red 外观中使用的 TrueType 字体。图 15-10 展示了 NetBeans IDE 中的项目结构。\n\
  \n![A323804_3_En_15_Fig10_HTML.jpg](img/A323804_3_En_15_Fig10_HTML.jpg)\n\n图 15-10.\n\
  \nNetBeans IDE 中的“外观选择器”项目结构\n\n查看项目结构，你会注意到 `LookNFeelChooser.java` 文件是主要的驱动程序应用程序类。`lnf_demo.fxml`\
  \ 文件是一个 FXML 格式的文件，代表中心内容，其中包含手风琴式 UI 控件及其他 UI 控件元素。该 FXML 文件由 Scene Builder 工具创建。其余文件是代表不同外观主题的\
  \ JavaFX CSS 样式表：`controlStyle1.css`、`controlStyle2.css`、`flatred.css` 和 `sky.css`。\n\
  \n清单 15-2 展示了 `LookNFeelChooser.java Application` 类的 `init()` 和 `start()` 方法。请记住，所有\
  \ JavaFX 应用程序首先通过 `init()` 方法进行初始化，然后从 `start()` 方法开始执行。在查看完清单 15-2 后，你可以阅读关于其工作原理的说明。\n\
  \n```\n@Override public void init() {\nFont.loadFont(LookNFeelChooser.class\n.getResourceAsStream(\"\
  Roboto-Thin.ttf\"), 10)\n.getName();\nFont.loadFont(LookNFeelChooser.class\n.getResourceAsStream(\"\
  Roboto-Light.ttf\"), 10)\n.getName();\n}\n@Override public void start(Stage primaryStage)\
  \ throws IOException {\nBorderPane root    = new BorderPane();\nParent     content\
  \ = FXMLLoader.load(getClass().getResource(\"lnf_demo.fxml\"));\nScene      scene\
  \   = new Scene(root, 650, 550, Color.WHITE);\nroot.setCenter(content);\n// 菜单栏\n\
  MenuBar menuBar = new MenuBar();\n// 文件菜单\nMenu     fileMenu = new Menu(\"_ 文件\"\
  );\nMenuItem exitItem = new MenuItem(\"退出\");\nexitItem.setAccelerator(new KeyCodeCombination(KeyCode.X,\
  \ KeyCombination.SHORTCUT_DOWN));\nexitItem.setOnAction(ae -> Platform.exit());\n\
  fileMenu.getItems().add(exitItem);\nmenuBar.getMenus().add(fileMenu);\n// 外观菜单\n\
  Menu lookNFeelMenu = new Menu(\"_ 外观\");\nlookNFeelMenu.setMnemonicParsing(true);\n\
  menuBar.getMenus().add(lookNFeelMenu);\nroot.setTop(menuBar);\n// 外观选择\nMenuItem\
  \ caspianMenuItem = new MenuItem(\"Caspian\");\ncaspianMenuItem.setOnAction(ae ->\
  \ {\nscene.getStylesheets().clear();\nsetUserAgentStylesheet(null);\nsetUserAgentStylesheet(STYLESHEET_CASPIAN);\n\
  });\nMenuItem modenaMenuItem = new MenuItem(\"Modena\");\nmodenaMenuItem.setOnAction(ae\
  \ -> {\nscene.getStylesheets().clear();\nsetUserAgentStylesheet(null);\nsetUserAgentStylesheet(STYLESHEET_MODENA);\n\
  });\nMenuItem style1MenuItem = new MenuItem(\"控件样式 1\");\nstyle1MenuItem.setOnAction(ae\
  \ -> {\nscene.getStylesheets().clear();\nsetUserAgentStylesheet(null);\nscene.getStylesheets()\n\
  .add(getClass().getResource(\"controlStyle1.css\")\n.toExternalForm());\n});\nMenuItem\
  \ style2MenuItem = new MenuItem(\"控件样式 2\");\nstyle2MenuItem.setOnAction(ae -> {\n\
  scene.getStylesheets().clear();\nsetUserAgentStylesheet(null);\nscene.getStylesheets()\n\
  .add(getClass().getResource(\"controlStyle2.css\")\n.toExternalForm());\n});\nMenuItem\
  \ skyMenuItem = new MenuItem(\"天空外观\");\nskyMenuItem.setOnAction(ae -> {\nscene.getStylesheets().clear();\n\
  setUserAgentStylesheet(null);\nscene.getStylesheets()\n.add(getClass().getResource(\"\
  sky.css\")\n.toExternalForm());\n});\nMenuItem flatRedMenuItem = new MenuItem(\"\
  FlatRed\");\nflatRedMenuItem.setOnAction(ae -> {\nscene.getStylesheets().clear();\n\
  setUserAgentStylesheet(null);\nscene.getStylesheets()\n.add(getClass().getResource(\"\
  flatred.css\")\n.toExternalForm());\n});\nlookNFeelMenu.getItems()\n.addAll(caspianMenuItem,\n\
  modenaMenuItem,\nstyle1MenuItem,\nstyle2MenuItem,\nskyMenuItem,\nflatRedMenuItem);\n\
  primaryStage.setTitle(\"外观选择器\");\nprimaryStage.setScene(scene);\nprimaryStage.show();\n\
  }\n清单 15-2.\n用于在外观（JavaFX CSS）样式表之间切换的“外观选择器”项目源代码。(LookNFeelChooser.java)\n```\n\
  \n注意\n\n要运行此示例，请确保 CSS 和 TTF（TrueType 字体）文件位于编译后的类目录中。将资源文件放在与加载它们的编译类文件相同的目录（包）中，可以轻松加载它们。CSS\
  \ 文件最初与此源代码示例文件位于同一位置。在 NetBeans 中，你可以选择“清理并构建项目”，或者将文件复制到类的构建目录中。\n\n\n\n#### 工作原理\n\
  \n“外观选择器”应用程序首先通过重载方法 `init()` 进行初始化，该方法会加载“扁平红”外观主题所需的字体。执行 `init()` 方法后，JavaFX\
  \ 应用程序生命周期将调用 `start()` 方法。\n\n在 `start()` 方法中，代码首先创建一个边框窗格布局，然后加载一个 FXML 文件，并将其放置为中央内容区域。FXML\
  \ 是一种基于 XML 的语言，用于描述 JavaFX 用户界面。这提供了一种将表示层与应用程序逻辑层分离的方法。通常，FXML 由 GUI 构建工具生成，允许设计人员拖放控件并以图形方式创建\
  \ UI。以下代码行使用 `FXMLLoader.load()` 方法对中央内容进行解组（反序列化）。中央内容窗格是一个 `AnchorPane` 布局，其中包含一个持有其他\
  \ UI 控件的 Accordion 控件。\n\n```\nParent content = FXMLLoader.load(getClass().getResource(\"\
  lnf_demo.fxml\"));\n```\n\n要了解有关 Scene Builder 工具的更多信息，请参阅第 5 章。\n\n继续看示例代码，你会注意到通常使用根节点创建场景。接下来，代码构建了一个包含菜单项的菜单栏。第一个菜单是“文件”菜单，允许用户退出应用程序。请注意，为了使用键盘快捷键快速退出，`KeyCodeCombination`\
  \ 实例允许用户按下 Ctrl+X 组合键。要了解菜单和键盘快捷键，请参阅第 4 章。\n\n“外观”菜单上的第二个菜单选项允许用户选择预定义的外观 CSS 样式表文件。菜单项被设置为调用基于\
  \ `onAction` 事件触发的处理程序代码（lambda 表达式）。以下代码片段是一个菜单项，负责使用 Caspian CSS 样式切换应用程序的外观：\n\
  \n```\nMenuItem caspianMenuItem = new MenuItem(\"Caspian\");\ncaspianMenuItem.setOnAction(ae\
  \ -> {\nscene.getStylesheets().clear();\nsetUserAgentStylesheet(STYLESHEET_CASPIAN);\n\
  });\n```\n\n在 JavaFX API 之上，`STYLESHEET_CASPIAN` 和 `STYLESHEET_MODENA` 值是表示基于其在类路径上位置的\
  \ CSS 文件的字符串。\n\n由于其余代码非常相似，我将快进到最后一个外观菜单选项，该选项切换到“扁平红”外观。其他菜单项基本相同，并调用相同的方法来清除先前加载的\
  \ CSS 样式表文件。但是，对于“扁平红”外观，我使用了 `getStylesheets().add()` 方法仅对当前场景级别的节点进行样式设置。\n\n\
  “扁平红”外观对一部分 UI 控件进行样式设置，包括滑块、滚动条、按钮和进度控件。接下来显示的代码片段设置了一个可选的菜单项，该菜单项将使用“扁平红”外观为应用程序设置皮肤。`onAction`\
  \ 代码清除场景的样式表，然后将 `UserAgentStylesheet` 设置为 `null`。最后，加载 `flatred.css` 文件来为给定场景设置样式。\n\
  \n```\nMenuItem flatRedMenuItem = new MenuItem(\"FlatRed\");\nflatRedMenuItem.setOnAction(ae\
  \ -> {\nscene.getStylesheets().clear();\nsetUserAgentStylesheet(null);\nscene.getStylesheets()\n\
  .add(getClass().getResource(\"flatred.css\")\n.toExternalForm());\n});\n```\n\n\
  ## JavaFX CSS 样式设置\n\n既然你已经知道如何加载 CSS 样式表文件，那么我们来讨论一下 JavaFX CSS 选择器和样式属性（规则）。与\
  \ HTML5 使用 CSS 样式表的方式类似，存在与场景图上的 Node 对象关联的选择器或样式类。所有 JavaFX 场景图节点都有 `setId()`、`getStyleClass().add()`\
  \ 和 `setStyle()` 方法，用于应用可能更改节点背景颜色、边框、描边等的样式属性。\n\n在学习选择器之前，我想让你参考以下位置的 JavaFX CSS\
  \ 参考指南：\n\n[`http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html`](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)\n\
  \n这份宝贵的参考指南在本书及以后的内容中都会非常有用。\n\n### 什么是选择器？\n\n与用于设置 HTML 元素样式的 W3C CSS（万维网联盟）标准类似，JavaFX\
  \ CSS 也有选择器的概念。选择器基本上是用于定位场景图上 JavaFX 节点的标签，以便使用 CSS 样式定义进行样式设置。两种选择器类型是 `id` 和\
  \ `class`。`id` 选择器是在场景节点上设置的唯一字符串名称。\n\n`class` 选择器也是一个字符串名称，可以作为标签添加到任何 JavaFX\
  \ 节点。我还应该指出，类选择器与 C++ 或 Java 类的概念无关。类选择器允许任意数量的节点包含相同的类字符串名称，从而能够使用一个 CSS 样式定义来设置多个节点的样式。在接下来的部分中，你将进一步了解如何定义\
  \ CSS 选择器类型，然后我会给出一个示例。\n\n#### CSS id 类型选择器\n\n`id` 类型选择器是分配给节点的唯一字符串名称。这意味着没有其他节点的\
  \ ID 可以相同。使用 `id` 类型选择器时，你需要在 JavaFX 节点对象上调用 `setId(String ID)` 方法。例如，要定位一个 ID 为\
  \ `my-button` 的 `Button` 实例，你需要调用 `setId(\"my-button\")` 方法。要为 ID 为 `my-button`\
  \ 的按钮设置样式，你需要创建一个 CSS 样式定义块，并使用 ID 选择器 `#my-button` 声明，如下所示：\n\n```\n#my-button\
  \ {\n-fx-text-fill: rgba(17, 145, 213, .90);\n-fx-border-color: rgba(255, 255, 255,\
  \ .80);\n-fx-border-radius: 8;\n-fx-padding: 6 6 6 6;\n-fx-font: bold italic 20pt\
  \ \"LucidaBrightDemiBold\";\n}\n```\n\n此 CSS 样式块将应用于具有唯一 ID `my-button` 的按钮。因此，不允许其他节点包含\
  \ ID `my-button`。你还会注意到，在样式块中使用 ID 选择器时，CSS 选择器名称以 `#` 符号为前缀，而在 Java 代码中设置 `id`\
  \ 时，不使用 `#` 符号。\n\n#### CSS class 类型选择器\n\n使用类类型选择器时，你将调用 `getStyleClass().add(String\
  \ styleClass)` 方法向节点添加选择器。该方法允许你拥有多个样式类来设置节点的样式。由于 `getStyleClass()` 方法返回一个 `ObservableList`，你可以临时添加和删除样式类，以动态更新它们的外观。例如，让我们通过\
  \ `getStyleClass().add(\"num-button\")` 方法定位两个按钮，其样式类（`ObservableList`）包含一个名为 `num-button`\
  \ 的类。以下是一个 CSS 样式定义块，使用类选择器 `.num-button` 声明：\n\n```\n.num-button {\n-fx-background-color:\
  \ white, rgb(189,218,230), white;\n-fx-background-radius: 50%;\n-fx-background-insets:\
  \ 0, 1, 2;\n-fx-font-family: \"Helvetica\";\n-fx-text-fill: black;\n-fx-font-size:\
  \ 20px;\n}\n```\n\n此 CSS 样式块将应用于具有样式类 `num-button` 的按钮。你将会注意到，使用类选择器时，CSS 选择器名称以点号（`.`）为前缀，而在\
  \ Java 代码中添加选择器时，不使用（`.`）符号。\n\n#### 选择器模式\n\n到目前为止，你只看到了简单的选择器；然而，选择器可以具有遍历场景图节点层次结构（从根节点到子节点）的模式。对选择器模式的全面讨论超出了本书的范围，但我将简要提及常见的选择器模式并介绍伪类。\n\
  \n\n\n##### 通用选择器模式\n\n通常，你会希望基于通用选择器模式来设置多个节点的样式。一种典型的选择器模式是：为父节点属于特定类型的子节点设置样式。例如，你可能希望为所有父节点是\
  \ `HBox` 的按钮设置样式。\n\n另一种模式是为两种不同类型的节点设置一个共同的属性。以下示例展示了这两种用例的选择器模式：\n\n```\n/* 为所有父节点是\
  \ HBox 的按钮设置样式 */\n.hbox > .button {\n-fx-text-fill: black;\n}\n/* 为所有标签和文本节点设置样式\
  \ */\n.label, .text {\n-fx-font-size: 20px;\n}\n```\n\n如你所见，选择器模式 (`.hbox > .button`)\
  \ 为 `HBox` 的后代 `Button` 节点设置样式。这非常直观。两个选择器之间的大于号让系统知道哪些节点需要被设置样式。\n\n此外，正如 JavaFX\
  \ CSS 参考指南中所述，UI 控件的选择器有一套命名约定。它们全部使用小写字母，如果控件名称包含多个单词，则用连字符分隔。例如，`GridPane` 的类选择器将是\
  \ `.grid-pane`。请记住，并非所有节点默认都有命名的类选择器，因此请参考 JavaFX CSS 参考指南。\n\n第二个用例中的选择器模式 (`.label,\
  \ .text`) 涉及为不同类型的节点设置一个共同的属性。这个示例是一个选择器模式，它为所有 `Label` 节点和 `Text` 节点设置相同的文本字体大小。逗号表示一个需要设置样式的选择器列表。换句话说，在此场景中，字体大小将被设置为\
  \ 20 磅。\n\n##### 伪类选择器\n\n伪类选择器用于为具有不同状态的节点设置样式。一个例子是 `Button` 节点的悬停状态。一个按钮控件具有以下状态：`armed`、`disabled`、`focused`、`hover`、`pressed`\
  \ 和 `show-mnemonic`。要指定带有伪类的选择器，你必须在主选择器名称后附加一个冒号和状态（类型）。以下代码片段展示了一个具有类选择器 `num-button`\
  \ 的按钮的两种选择器模式：\n\n```\n.num-button {\n-fx-background-color: white, bluish-gray,\
  \ white;\n-fx-background-radius: 50%;\n-fx-background-insets: 0, 1, 2;\n-fx-font-family:\
  \ \"Helvetica\";\n-fx-text-fill: black;\n}\n.num-button:hover {\n-fx-background-color:\
  \ black, white, black;\n-fx-text-fill: white;\n}\n```\n\n在这段 CSS 代码中，第一个选择器 (`.num-button`)\
  \ 仅仅为按钮的正常状态设置样式。然而，第二个带有附加冒号和状态（hover）的选择器将更改一部分属性，对它们进行细微调整。在此场景中，当鼠标光标移动到（悬停）具有样式类\
  \ `num-button:hover` 的按钮上时，按钮的颜色和文本的填充颜色将会反转。图 15-11 展示了当鼠标悬停在数字键盘的按钮 3 上时，伪选择器生效的情况。\n\
  \n![A323804_3_En_15_Fig11_HTML.jpg](img/A323804_3_En_15_Fig11_HTML.jpg)\n\n图 15-11.\n\
  \n当鼠标光标位于任何数字键盘按钮上方时，会使用带有 hover 伪类的选择器\n\n#### 一个选择器样式设置示例\n\n为了演示使用 `id` 和 `class`\
  \ 类型选择器，我创建了一个类似智能手机数字键盘的应用程序，如图 15-12 所示。\n\n![A323804_3_En_15_Fig12_HTML.jpg](img/A323804_3_En_15_Fig12_HTML.jpg)\n\
  \n图 15-12.\n\n一个模仿智能手机数字键盘的应用程序。\n\n在图 15-12 中，注意数字键盘的 4 × 3 网格圆形按钮及其下方用于拨打电话的绿色矩形按钮。清单\
  \ 15-3 是包含源代码的主要 `start()` 方法。清单 15-4 则展示了 CSS 文件 `mobile_buttons.css` 的内容。\n\n\
  ```\n@Override\npublic void start(Stage primaryStage) {\nBorderPane root = new BorderPane();\n\
  Scene scene = new Scene(root, 180, 250);\nscene.getStylesheets()\n.add(getClass().getResource(\"\
  mobile_buttons.css\")\n.toExternalForm());\nString[] keys = {\"1\", \"2\", \"3\"\
  ,\n\"4\", \"5\", \"6\",\n\"7\", \"8\", \"9\",\n\"*\", \"0\", \"#\"};\nGridPane numPad\
  \ = new GridPane();\nnumPad.getStyleClass().add(\"num-pad\");\nfor (int i=0; i <\
  \ 12; i++) {\nButton button = new Button(keys[i]);\nbutton.getStyleClass().add(\"\
  num-button\");\nnumPad.add(button, i % 3, (int) Math.ceil(i/3) );\n}\n// 呼叫按钮\n\
  Button call = new Button(\"Call\");\ncall.setId(\"call-button\");\ncall.setMaxSize(Double.MAX_VALUE,\
  \ Double.MAX_VALUE);\nnumPad.add(call, 0, 4);\nGridPane.setColumnSpan(call, 3);\n\
  GridPane.setHgrow(call, Priority.ALWAYS);\nroot.setCenter(numPad);\nprimaryStage.setScene(scene);\n\
  primaryStage.show();\n}\n清单 15-3.\n数字键盘应用程序的 JavaFX 源代码\n```\n\n清单 15-3 中的代码将加载\
  \ `mobile_button.css` 文件，该文件会应用于场景图。CSS 文件的内容如清单 15-4 所示。\n\n```\n.root {\n-fx-background-color:\
  \ white;\n-fx-font-size: 20px;\nbright-green: rgb(59,223, 86);\nbluish-gray: rgb(189,218,230);\n\
  }\n.num-pad {\n-fx-padding: 15px, 15px, 15px, 15px;\n-fx-hgap: 10px;\n-fx-vgap:\
  \ 8px;\n}\n.num-button {\n-fx-background-color: white, bluish-gray, white;\n-fx-background-radius:\
  \ 50%;\n-fx-background-insets: 0, 1, 2;\n-fx-font-family: \"Helvetica\";\n-fx-text-fill:\
  \ black;\n}\n.num-button:hover {\n-fx-background-color: black, white, black;\n-fx-text-fill:\
  \ white;\n}\n#call-button {\n-fx-background-color: white, bright-green;\n-fx-background-radius:\
  \ 2;\n-fx-background-insets: 0, 1;\n-fx-font-family: \"Helvetica\";\n-fx-text-fill:\
  \ white;\n}\n#call-button:hover {\n-fx-background-color: bright-green, white;\n\
  -fx-background-radius: 2;\n-fx-background-insets: 0, 1;\n-fx-font-family: \"Helvetica\"\
  ;\n-fx-text-fill: bright-green;\n}\n清单 15-4.\nmobile_buttons.css CSS 文件的内容\n```\n\
  \n#### 工作原理\n\n代码首先创建一个场景，该场景以 `BorderPane` 作为根节点。创建场景后，代码加载 CSS 样式表文件 `mobile_buttons.css`\
  \ 来为当前场景的节点设置样式。接下来，代码简单地使用 `GridPane` 类创建一个网格，并生成 12 个按钮放置在每个单元格中。注意在 `for` 循环中，每个按钮都通过\
  \ `getStyleClass().add()` 方法设置了名为 `num-button` 的样式类。\n\n最后，绿色的呼叫按钮将被添加到网格面板的最后一行。由于呼叫按钮是唯一的，其\
  \ `id` 选择器被设置为 `call-button`，并使用 `id` 选择器设置样式，这意味着 CSS 文件中命名的选择器将以 `#` 符号为前缀。要查看一些令人惊叹的按钮样式，请访问\
  \ `FXExperience.com` 上关于使用 CSS 设置按钮样式的博客文章，链接如下：\n\n[`http://fxexperience.com/2011/12/styling-fx-buttons-with-css`](http://fxexperience.com/2011/12/styling-fx-buttons-with-css)\n\
  \n在 FXExperience 上，这篇关于使用 CSS 设置 FX 按钮样式的博客文章由 Jasper Potts（Oracle 客户端 Java 开发体验架构师）撰写。\n\
  \n### 如何定义基于 -fx- 的样式属性（规则）\n\n我相信到现在你已经注意到样式定义块中许多以 `-fx-` 为前缀的名称-值对（属性）。这些通常被称为规则的属性，可以被定义为其值能够设置区域边框宽度、背景填充颜色等。在本节中，你将学习如何使用选择器样式块来设置\
  \ JavaFX 节点的样式，以及如何通过内联样式来覆盖属性。\n\n\n\n#### 使用选择器样式定义块为节点设置样式\n\n选择器样式定义块始终以选择器名称开头，该名称以\
  \ `.` 或 `#` 符号为前缀。如前所述，该符号决定了选择器的类型。选择器将以左花括号开始一个代码块，随后是属性或规则定义。每个 JavaFX 主题属性或规则都将以\
  \ `-fx-` 及其相应的属性名作为前缀。属性名和值之间用 `:` 符号分隔，并以分号结束该键值对。要完成样式块，只需用右花括号结束该块即可。选择器样式定义块的语法如下所示：\n\
  \n```\n. 或 # {\n-fx- : ;\n}\n```\n\n最后要提的一点是，可以为 CSS 样式定义添加注释。要添加注释，请使用开头的斜杠星号 `/*`\
  \ 和结尾的星号斜杠 `*/`（与在 C/C++ 和 Java 中添加注释的方式相同）。下面是一个在选择器样式块定义中使用注释的示例：\n\n```\n.num-button\
  \ {\n-fx-background-color: white, rgb(189,218,230), white;\n/* 这是一条注释。\n-fx-background-radius:\
  \ 50%;\n*/\n-fx-background-insets: 0, 1, 2;\n-fx-font-family: \"Helvetica\";\n-fx-text-fill:\
  \ black;\n-fx-font-size: 20px;\n}\n```\n\n#### 通过内联 JavaFX CSS 样式属性为节点设置样式\n\n虽然\
  \ CSS 选择器块是为 JavaFX 节点设置样式的推荐方式，但在某些情况下，您可能希望覆盖样式属性。例如，您可能希望在鼠标光标悬停（`OnMouseEntered`）在指定按钮上时，临时放大该按钮并更改其文本颜色。当鼠标光标不再悬停（`OnMouseExited`）时，按钮的内联样式将被移除，从而将样式恢复为父级\
  \ `class` 或 `id` 选择器样式块。要覆盖从其祖先（父级）`id` 或 `class` 选择器设置的节点样式属性，可以调用节点的 `setStyle()`\
  \ 方法。\n\n为了实现刚才提到的示例，以下代码片段实现了一个按钮，其中包含响应 `OnMouseEntered` 和 `OnMouseExited` 事件并切换按钮文本大小和颜色的处理程序代码。\n\
  \n```\nButton button = new Button(\"Press Me\");\nbutton.getStyleClass()\n.add(\"\
  my-default-style\");\nbutton.setOnMouseEntered(actionEvent ->\nbutton.setStyle(\"\
  -fx-font-size: 30px; -fx-text-fill: green;\"));\nbutton.setOnMouseExited(actionEvent\
  \ -> button.setStyle(\"\"));\n```\n\n#### 样式属性（规则）的限制\n\n由于所有图形节点都继承自 `Node` 类，派生类将能够从其祖先继承样式属性。了解节点类型的继承层次结构非常重要，因为节点类型将有助于确定您可以控制的样式属性类型。例如，`Rectangle`\
  \ 类继承自 `Shape`，而 `Shape` 又继承自 `Node`。话虽如此，您稍后会看到，一些您认为应该存在于节点上的属性实际上并不存在。那么，如何知道存在哪些属性呢？解决方案是参考\
  \ JavaFX CSS 参考指南。同样，基于节点类型，您可以设置的样式是有限制的。\n\n### 遵守 JavaFX CSS 规则\n\n您知道样式属性（规则）可以被覆盖吗？要覆盖属性，您必须了解规则定义时的优先级顺序。图\
  \ 15-13 描绘了一个典型的场景图，其中包含一个根（父级）节点和子节点。诸如 `BorderPane` 布局节点之类的根节点将包含一个名为 root 的类选择器，该选择器用于顶级属性。\n\
  \n![A323804_3_En_15_Fig13_HTML.jpg](img/A323804_3_En_15_Fig13_HTML.jpg)\n\n图 15-13.\n\
  \n一个包含根节点且子节点为按钮的场景\n\n这些基本上是许多节点共有的属性，例如文本的字体大小或背景颜色。这对于主题化来说是一个很棒的功能，因为共享某个属性的许多节点都将继承该更改。如前所述，某些节点将包含默认选择器；例如，JavaFX\
  \ `Button` 实例具有一个 `.button` 类选择器。\n\n在图 15-13 中，类选择器 root 可能具有一个与文本相关的、在许多节点中通用的属性：\n\
  \n```\n.root {\n-fx-font-size: 12px;\n}\n.button {\n-fx-font-size: 20px;\n}\n```\n\
  \n当您想要设置按钮文本字体大小的样式时，可以覆盖根节点的样式定义。为了覆盖 `-fx-font-size` 属性，按钮样式类定义块将用 20 磅字体覆盖父级的\
  \ 12 磅字体。\n\n信不信由你，除了刚才展示的方法之外，还有另一种方法可以覆盖类选择器 `.button` 的样式定义块。与 HTML5 CSS 类似，每个元素都有一个样式属性。JavaFX\
  \ 的图形节点也有一个样式属性（属性）。以下是一个如何在 Java 代码中以编程方式设置样式属性的示例：\n\n```\nButton button = new\
  \ Button(\"press it!\");\nbutton.setStyle(\"-fx-font-size: 30px;\");\n```\n\n此代码将覆盖任何\
  \ `root-`、`id`- 或 `class`- 级别的选择器样式定义块。基本上，调用 `setStyle()` 方法允许您添加任意数量的属性-值对，只要它们用分号分隔即可。\n\
  \n## 自定义控件\n\n> “原力与你同在，卢克。” ——欧比旺·克诺比\n\n凭借您新获得的所有能力，还有一个强大的 API 您将需要掌握。想象一下，客户的需求要求使用专门的\
  \ UI 控件，例如 LED、仪表、旋钮和指示灯。当然，您可以尝试使用现有的 UI 控件并为其设置样式，但这即使不是不可能，也是相当困难的。那么，年轻的学徒该怎么做呢？（现在，请说出那句名言。）欢迎来到\
  \ JavaFX 自定义控件的世界（控件 API）！\n\n作为创建自定义控件的一个示例，在本节中，您将学习如何创建一个发光二极管（LED）控件。本节首先描述\
  \ LED 控件。然后，当您查看创建自定义控件所涉及的类时，您将看到代码是如何组织的。之后，在您逐步了解代码细节之前，您将有机会查看代码。\n\n\n\n###\
  \ LED 自定义控件\n\n发光二极管（LED）是许多电子设备中用于指示状态（如开或关）的常见元件。那么，为何不将 LED 作为代码中的自定义控件，用作视觉指示器呢？通常，一个\
  \ LED 包含两根导线和一个由透明塑料制成的本体，如图 15-14 所示。\n\n![A323804_3_En_15_Fig14_HTML.jpg](img/A323804_3_En_15_Fig14_HTML.jpg)\n\
  \n图 15-14.\n一个典型的发光二极管（LED）\n\nLED 通常安装在插座上。要创建一个模拟物理对象的自定义 JavaFX 控件，首先需要确定要描绘哪些材料和组件。\n\
  \n对于 LED 自定义 JavaFX 控件，我们可以近似模拟以下外观：\n\n*   金属插座\n*   塑料本体\n*   由于曲面而在塑料本体顶部产生的光效\n\
  \nJava 开发者通常不喜欢的一件事，但对于设计自定义控件却非常有帮助，那就是使用绘图程序。准确地说，是矢量绘图程序。当控件的外观很重要时，使用一个擅长可视化事物的工具——比如用于创建图\
  \ 15-15 的绘图程序——是很有意义的。因此，你应该做的第一件事就是为你计划创建的控件绘制一个矢量图。\n\n![A323804_3_En_15_Fig15_HTML.jpg](img/A323804_3_En_15_Fig15_HTML.jpg)\n\
  \n图 15-15.\nLED 控件的矢量图\n\n你可以看到红色塑料本体周围的金属插座和白色高光。红色本体包含内阴影和外阴影，以营造更逼真的外观。如果你查看矢量图的各个部分，会发现三个填充了渐变的圆形，如图\
  \ 15-16 所示。\n\n![A323804_3_En_15_Fig16_HTML.jpg](img/A323804_3_En_15_Fig16_HTML.jpg)\n\
  \n图 15-16.\n矢量 LED 的三个组成部分\n\n你从绘图程序开始编码，因为在这里你可以定义控件的大小、颜色、渐变和位置。使用绘图程序的一大优势是，通过更改颜色、大小和位置等参数，可以获得直接的视觉反馈。\n\
  \n在 JavaFX 中，创建自定义控件的方法不止一种，而是有很多种。以下是几种有效的方法：\n\n*   自定义现有控件的 CSS\n*   扩展现有控件\n\
  *   扩展 `Region` 节点\n*   创建控件、皮肤和 CSS 文件\n*   使用 Canvas 节点\n\n本章重点介绍扩展 `Region` 节点并使用\
  \ CSS 的方法。要了解如何通过使用 `Canvas` 节点或使用单独的 `Control` 类、`Skin` 类和 CSS 文件来创建相同的 LED 控件，请查看\
  \ GitHub 仓库 [`http://github.com/HanSolo/JFX8CustomControls`](http://github.com/HanSolo/JFX8CustomControls)。对于本书，你可以从本书网站或以下地址获取源代码：\n\
  \n[`https://github.com/carldea/jfx9be/blob/master/chap15/JFX9CustomControls/src/jfx9controls/ledregion`](https://github.com/carldea/jfx9be/blob/master/chap15/JFX9CustomControls/src/jfx9controls/ledregion)\n\
  \n### LED 自定义控件示例代码的结构\n\n我通常按以下方式组织控件中的代码：\n\n*   构造函数\n*   初始化：\n    *   一个 `init()`\
  \ 方法定义初始大小。\n    *   一个 `initGraphics()` 方法设置控件的场景图。\n    *   一个 `registerListeners()`\
  \ 方法将监听器挂接到属性上。\n*   一个 `Methods` 块包含 `get`、`set` 和 `property` 方法。\n*   一个 `Resizing`\
  \ 块包含调整控件大小和重绘控件的方法（如果需要）。\n\n### LED 控件的属性\n\nLED 控件将包含控件的逻辑（其属性）和可视化代码。由于 LED\
  \ 是一个非常简单的控件，你不需要很多属性。本示例使用了五个属性：\n\n*   `On`（当前状态的布尔属性）\n*   `Blinking`（用于开关闪烁的布尔属性）\n\
  *   `Interval`（用于定义闪烁间隔的长整型属性）\n*   `FrameVisible`（用于开关金属插座可见性的布尔属性）\n*   `LedColor`（类型为\
  \ `Color` 的对象属性，用于定义 LED 的颜色）\n\n清单 15-5 展示了这些属性的 `get`、`set` 和 `property` 方法。\n\
  \n\n```java\npublic class Led extends Region {\nprivate static final double    \
  \  PREFERRED_SIZE    = 16;\nprivate static final double      MINIMUM_SIZE      =\
  \ 8;\nprivate static final double      MAXIMUM_SIZE      = 1024;\nprivate static\
  \ final PseudoClass ON_PSEUDO_CLASS   = PseudoClass.getPseudoClass(\"on\");\nprivate\
  \ static final long        SHORTEST_INTERVAL = 50_000_000l;\nprivate static final\
  \ long        LONGEST_INTERVAL  = 5_000_000_000l;\n// 模型/控制器相关\nprivate ObjectProperty\
  \    ledColor;\nprivate BooleanProperty          on;\nprivate boolean          \
  \        _blinking = false;\nprivate BooleanProperty          blinking;\nprivate\
  \ boolean                  _frameVisible = true;\nprivate BooleanProperty      \
  \    frameVisible;\nprivate long                     lastTimerCall;\nprivate long\
  \                     _interval = 500_000_000l;\nprivate LongProperty          \
  \   interval;\nprivate AnimationTimer           timer;\n// 视图相关\nprivate double\
  \                   size;\nprivate Region                   frame;\nprivate Region\
  \                   led;\nprivate Region                   highlight;\nprivate InnerShadow\
  \              innerShadow;\nprivate DropShadow               glow;\npublic final\
  \ boolean isOn() {\nreturn null == on ? false : on.get();\n}\npublic final void\
  \ setOn(final boolean ON) {\nonProperty().set(ON);\n}\npublic final BooleanProperty\
  \ onProperty() {\nif (null == on) {\non = new BooleanPropertyBase(false) {\n@Override\
  \ protected void invalidated() { pseudoClassStateChanged(ON_PSEUDO_CLASS, get());\
  \ }\n@Override public Object getBean() { return this; }\n@Override public String\
  \ getName() { return \"on\"; }\n};\n}\nreturn on;\n}\npublic final boolean isBlinking()\
  \ {\nreturn null == blinking ? _blinking : blinking.get();\n}\npublic final void\
  \ setBlinking(final boolean BLINKING) {\nif (null == blinking) {\n_blinking = BLINKING;\n\
  if (BLINKING) {\ntimer.start();\n} else {\ntimer.stop();\nsetOn(false);\n}\n} else\
  \ {\nblinking.set(BLINKING);\n}\n}\npublic final BooleanProperty blinkingProperty()\
  \ {\nif (null == blinking) {\nblinking = new BooleanPropertyBase() {\n@Override\
  \ public void set(final boolean BLINKING) {\nsuper.set(BLINKING);\nif (BLINKING)\
  \ {\ntimer.start();\n} else {\ntimer.stop();\nsetOn(false);\n}\n}\n@Override public\
  \ Object getBean() {\nreturn Led.this;\n}\n@Override public String getName() {\n\
  return \"blinking\";\n}\n};\n}\nreturn blinking;\n}\npublic final long getInterval()\
  \ {\nreturn null == interval ? _interval : interval.get();\n}\npublic final void\
  \ setInterval(final long INTERVAL) {\nif (null == interval) {\n_interval = clamp(SHORTEST_INTERVAL,\
  \ LONGEST_INTERVAL, INTERVAL);\n} else {\ninterval.set(INTERVAL);\n}\n}\npublic\
  \ final LongProperty intervalProperty() {\nif (null == interval) {\ninterval = new\
  \ LongPropertyBase() {\n@Override public void set(final long INTERVAL) {\nsuper.set(clamp(SHORTEST_INTERVAL,\
  \ LONGEST_INTERVAL, INTERVAL));\n}\n@Override public Object getBean() {\nreturn\
  \ Led.this;\n}\n@Override public String getName() {\nreturn \"interval\";\n}\n};\n\
  }\nreturn interval;\n}\npublic final boolean isFrameVisible() {\nreturn null ==\
  \ frameVisible ? _frameVisible : frameVisible.get();\n}\npublic final void setFrameVisible(final\
  \ boolean FRAME_VISIBLE) {\nif (null == frameVisible) {\n_frameVisible = FRAME_VISIBLE;\n\
  } else {\nframeVisible.set(FRAME_VISIBLE);\n}\n}\npublic final BooleanProperty frameVisibleProperty()\
  \ {\nif (null == frameVisible) {\nframeVisible = new SimpleBooleanProperty(this,\
  \ \"frameVisible\", _frameVisible);\n}\nreturn frameVisible;\n}\npublic final Color\
  \ getLedColor() {\nreturn null == ledColor ? Color.RED : ledColor.get();\n}\npublic\
  \ final void setLedColor(final Color LED_COLOR) {\nledColorProperty().set(LED_COLOR);\n\
  }\npublic final ObjectProperty ledColorProperty() {\nif (null == ledColor) {\nledColor\
  \ = new SimpleObjectProperty(this, \"ledColor\", Color.RED);\n}\nreturn ledColor;\n\
  }\n// ******************** 工具方法 ***********************************\npublic static\
  \ long clamp(final long MIN, final long MAX, final long VALUE) {\nif (VALUE < MIN)\
  \ return MIN;\nif (VALUE > MAX) return MAX;\nreturn VALUE;\n}\n清单 15-5.\n属性操作代码\
  \ (Led.java)\n```\n\n### LED 控件的初始化代码\n\n在 LED 控件的构造函数中，首先要做的是加载对应的 CSS 文件并添加主样式类，如下所示：\n\
  \n```\npublic Led() {\ngetStylesheets().add(getClass().getResource(\"led.css\").toExternalForm());\n\
  getStyleClass().add(\"led\");\n然后我们简单地初始化将用于使 LED 控件闪烁的 AnimationTimer：\nlastTimerCall\
  \ = System.nanoTime();\ntimer         = new AnimationTimer() {\n@Override public\
  \ void handle(final long NOW) {\nif (NOW > lastTimerCall + getInterval()) {\nsetOn(!isOn());\n\
  lastTimerCall = NOW;\n}\n} };\n```\n\n在构造函数中最后要做的是调用这些方法来初始化控件的大小、初始化场景图并注册一些监听器：\n\
  \n```\ninit();\ninitGraphics();\nregisterListeners();\n```\n\n为了确保 LED 控件在初始化期间能够正确调整大小，必须在\
  \ `init()` 方法中设置最小、首选和最大尺寸，该方法如下所示：\n\n```\nprivate void init() {\nif (Double.compare(getWidth(),\
  \ 0) <= 0 || Double.compare(getHeight(), 0) <= 0 ||\nDouble.compare(getPrefWidth(),\
  \ 0) <= 0 || Double.compare(getPrefHeight(), 0) <= 0) {\nsetPrefSize(PREFERRED_SIZE,\
  \ PREFERRED_SIZE);\n}\nif (Double.compare(getMinWidth(), 0) <= 0 || Double.compare(getMinHeight(),\
  \ 0) <= 0) {\nsetMinSize(MINIMUM_SIZE, MINIMUM_SIZE);\n}\nif (Double.compare(getMaxWidth(),\
  \ 0) <= 0 || Double.compare(getMaxHeight(), 0) <= 0) {\nsetMaxSize(MAXIMUM_SIZE,\
  \ MAXIMUM_SIZE);\n}\n}\n```\n\n#### 可视化代码\n\n`javafx.scene.layout.Region` 节点是一个轻量级的\
  \ JavaFX 容器，它可以包含其他节点并通过 CSS 设置样式。通过扩展 `Region` 节点，自定义控件将包含控件的逻辑以及可视化代码。在清单 15-6\
  \ 所示的 `initGraphics()` 方法中，代码通过创建所需的节点并为其应用适当的 CSS 样式来设置控件的场景图。\n\n```\nprivate\
  \ void initGraphics() {\n// 创建金属插座的节点\nframe = new Region();\nframe.getStyleClass().setAll(\"\
  frame\");\nframe.setOpacity(isFrameVisible() ? 1 : 0);\n// 创建主 LED 塑料主体的节点\nled\
  \ = new Region();\nled.getStyleClass().setAll(\"main\");\nled.setStyle(\"-led-color:\
  \ \" + (getLedColor()).toString().replace(\"0x\", \"#\") + \";\");\n// 为主 LED 主体创建内阴影效果\n\
  innerShadow = new InnerShadow(BlurType.TWO_PASS_BOX,\nColor.rgb(0, 0, 0, 0.65),\n\
  8, 0d, 0d, 0d);\n// 为主 LED 主体创建投影效果（发光效果）\nglow = new DropShadow(BlurType.TWO_PASS_BOX,\n\
  getLedColor(),\n20, 0d, 0d, 0d);\nglow.setInput(innerShadow);\n// 为主 LED 主体上的高光效果创建节点\n\
  highlight = new Region();\nhighlight.getStyleClass().setAll(\"highlight\");\n//\
  \ 将所有节点添加到此控件的场景图中\ngetChildren().addAll(frame, led, highlight);\n}\n清单 15-6.\n\
  设置 LED 控件场景图\n```\n\n到目前为止，该示例已经创建了 LED 控件所需的每个节点，并从 CSS 文件中应用了适当的样式。\n\n\n####\
  \ LED 控制器的 CSS 文件\n\n在 `initGraphics()` 方法中创建的每个节点都有其专属的 CSS 样式类，这些类定义在 `led.css`\
  \ 文件中。文件内容如下：\n\n```\n/* 主 LED 样式类，其中定义了 -led-color 变量 */\n.led {\n-led-color  :\
  \ red;\n-frame-color: linear-gradient(from 14% 14% to 84% 84%,\nrgba(20, 20, 20,\
  \ 0.64706) 0%,\nrgba(20, 20, 20, 0.64706) 15%,\nrgba(41, 41, 41, 0.64706) 26%,\n\
  rgba(200, 200, 200, 0.40631) 85%,\nrgba(200, 200, 200, 0.3451) 100%);\n}\n/* .frame\
  \ 子类，定义金属插座的填充 */\n.led .frame {\n-fx-background-color : -frame-color;\n-fx-background-radius:\
  \ 1024;\n}\n/* .main 子类，定义 LED 塑料外壳在关闭状态下的填充 */\n.led .main {\n-fx-background-color\
  \ : linear-gradient(from 15% 15% to 83% 83%,\nderive(-led-color, -80%) 0%,\nderive(-led-color,\
  \ -87%) 49%,\nderive(-led-color, -80) 100%);\n-fx-background-radius: 1024;\n}\n\
  /* .main 子类与 :on 伪类结合，定义 LED 塑料外壳在开启状态下的填充 */\n.led:on .main {\n-fx-background-color:\
  \ linear-gradient(from 15% 15% to 83% 83%,\nderive(-led-color, -23%) 0%,\nderive(-led-color,\
  \ -50%) 49%,\n-led-color 100%);\n}\n/* .highlight 子类，定义高光效果的填充 */\n.led .highlight\
  \ {\n-fx-background-color : radial-gradient(center 15% 15%, radius 50%,\nwhite 0%,\n\
  -fx-background-radius: 1024;\n}\n```\n\n由于在 CSS 中可以使用百分比来定义渐变中的位置，因此无需担心控件的实际尺寸来计算渐变的起始和结束位置。与\
  \ Java Swing 相比，这是一个巨大的优势，因为在 Swing 中，每次控件尺寸变化时都必须重新计算所有这些值。而在 JavaFX 中，所有这些计算都将自动完成。正如你将看到的，这大大减少了调整尺寸的代码量。\n\
  \n#### 调整 LED 控制器的大小\n\n在 JavaFX 中，布局容器的大小决定了其子项的大小，因此必须确保控件由其布局容器调整大小。这意味着，如果将\
  \ LED 控件放入 `StackPane`（它会根据自身大小调整子项大小），LED 的大小将与 `StackPane` 相同。因此，必须在 `registerListeners()`\
  \ 方法中为控件的 `widthProperty()` 和 `heightProperty()` 挂接监听器。\n\n```\nprivate void registerListeners()\
  \ {\nwidthProperty().addListener(observable -> resize());\nheightProperty().addListener(observable\
  \ -> resize());\nframeVisibleProperty().addListener(observable ->\nframe.setOpacity(isFrameVisible()\
  \ ? 1 : 0));\nonProperty().addListener(observable -> led.setEffect(isOn() ? glow\
  \ : innerShadow));\nledColorProperty().addListener(observable -> {\nled.setStyle(\"\
  -led-color: \" + (getLedColor()).toString().replace(\"0x\", \"#\") + \";\");\nresize();\n\
  });\n}\n```\n\n此方法为所有可能影响 LED 控件可视化效果或大小的属性挂接了监听器。当宽度和高度的监听器被触发时，它们将调用 `resize()`\
  \ 方法，该方法将负责调整控件中所有节点的大小。\n\n```\nprivate void resize() {\nsize = getWidth()  0)\
  \ {\nif (getWidth() > getHeight()) {\nsetTranslateX(0.5 * (getWidth() - size));\n\
  } else if (getHeight() > getWidth()) {\nsetTranslateY(0.5 * (getHeight() - size));\n\
  }\ninnerShadow.setRadius(0.07 * size);\nglow.setRadius(0.36 * size);\nglow.setColor(getLedColor());\n\
  frame.setPrefSize(size, size);\nled.setPrefSize(0.72 * size, 0.72 * size);\nled.relocate(0.14\
  \ * size, 0.14 * size);\nled.setEffect(isOn() ? glow : innerShadow);\nhighlight.setPrefSize(0.58\
  \ * size, 0.58 * size);\nhighlight.relocate(0.21 * size, 0.21 * size);\n}\n}\n}\n\
  ```\n\n如你所见，在 `resize()` 方法中，你只需要为每个节点计算其大小并重新定位。因此，首先计算 LED 的最小尺寸（因为它是正方形，如果宽度小于高度则取宽度，反之亦然）。此外，必须确保仅在当前尺寸大于\
  \ 0 时才执行调整大小操作。\n\n#### 工作原理\n\n现在所有部分都已就绪，你可以像使用其他任何控件一样简单地使用这个控件，如下所示：\n\n```\n\
  @Override public void start(Stage stage) {\nLed control = new Led();\nStackPane\
  \ pane = new StackPane();\npane.getChildren().add(control);\nScene scene = new Scene(pane);\n\
  stage.setTitle(\"JavaFX Led Control\");\nstage.setScene(scene);\nstage.show();\n\
  control.setBlinking(true);\n}\n```\n\n图 15-17 显示了结果。\n\n![A323804_3_En_15_Fig17_HTML.jpg](img/A323804_3_En_15_Fig17_HTML.jpg)\n\
  \n图 15-17.\n\n基于区域的定制 LED 控件\n\n### 创建自定义控件的其他方法\n\n如前所述，在 JavaFX 中有多种创建自定义控件的方法。这里展示的“扩展\
  \ `Region`”方法是最常见的一种。这种方法带来的缺点是，你将模型/控制器与视图混合在一起，对于像这个 LED 这样的小控件是可以接受的，但对于依赖数据模型或作为控件库一部分的较大控件来说，这可能是一个糟糕的解决方案。\n\
  \n对于这些更复杂的控件，你应该将自定义的 `Control.class` 类与自定义的 `Skin.class` 以及你的 CSS 文件结合使用。主要区别在于，包含\
  \ `get`、`set` 和 `property` 方法的属性将放在 `Control.class` 中，而可视化代码将放在 `Skin.class` 中。这种方法在控制器逻辑和视图逻辑之间提供了适当的分离。\n\
  \n我想介绍的创建自定义控件的最后一种方法是使用 `Canvas` 节点。`Canvas` 节点代表一个单一的节点，其行为原理类似于一个可以绘制的图像。用于在\
  \ `Canvas` 节点上绘制的 API 取自 HTML5 的 `Canvas`，这意味着你不会使用 JavaFX 节点，而是直接在 `Canvas` 节点上绘制。（也就是说，你将在即时模式下工作，而不是保留模式。）你必须负责清除和重绘\
  \ `Canvas` 节点的表面。对于包含非常复杂的图形需要计算和绘制的控件，这种方法可能很有用，因为你只需要绘制一次。\n\n## 总结\n\n在本章中，你学习了如何使用以下方法通过自定义\
  \ CSS 文件来设置应用程序的样式：\n\n*   `Application.setUserAgentStylesheet(String URL)`\n* \
  \  `Scene: getStylesheets().add(String URL)`\n\n然后，你了解了如何通过使用默认的 CSS 选择器或创建自己的选择器来在\
  \ JavaFX 中使用 CSS。你学习了 `id` 类型选择器、`class` 类型选择器和 CSS 伪类。此外，你还学习了如何在不同选择器模式中使用这些选择器。通过使用选择器模式，你可以将样式应用于一组节点及其兄弟节点。\n\
  \n最后，你学习了如何在 JavaFX 中创建一个 LED 自定义控件。在本节中，你有机会运用不同的策略来创建自定义控件。你学习了如何使用 `Control`\
  \ 和 `Skin` 类来遵循创建自定义控件的标准方式。你还了解了其他有趣的策略，例如扩展 `Region` 或使用 `Canvas` 类在即时模式下渲染图元。\n\
