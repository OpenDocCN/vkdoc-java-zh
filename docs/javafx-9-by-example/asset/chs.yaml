  \n## 总结\n\n本章涵盖了属性和绑定的大量内容，特别是与 Java 8 新语言特性相关的内容。你了解了 Java 8 中的新特性，例如 lambda 表达式、流\
  \ API 和默认方法。从 Java lambda 开始，你学习了语法并使用了函数式接口。接着，你能够使用流 API 和常见的聚合函数。在使用了流 API 操作集合中元素的示例之后，你学习了如何使用默认方法扩展\
  \ Java 接口的行为。然后你探索了 UI 模式、属性 API 以及变更支持的概念。在扎实理解属性使用的基础上，你学习了各种绑定策略。作为本章的收尾，你看到了一个如何创建登录对话框窗口的示例，该示例运用了你迄今为止学到的所有概念。接下来，在第\
  \ 5 章中，你将探索 JavaFX UI 布局和 UI 控件。\n\n"
- "# 5. 布局与 Scene Builder\n\n随着越来越多的图形丰富应用程序（如桌面、智能手机和平板电脑设备）进入我们的生活，设计能够跨不同形态因素提供更好可用性的\
  \ GUI 应用程序变得非常重要。随着不同屏幕尺寸数量的增加，UI 开发者需要学习如何创建考虑 UI 布局管理的应用程序。UI 布局管理是指在 JavaFX 场景图上定位或调整子节点大小的能力。本章讨论了许多\
  \ GUI 应用程序中最常用的 JavaFX 布局。\n\n本章还介绍了 Scene Builder 工具，这是一个图形化（所见即所得）编辑器，允许你以图形方式开发\
  \ UI，而无需手动编写（编程方式）UI 元素。在本节中，你将学习如何下载和安装该 UI 编辑器工具。安装 Scene Builder 后，你将学习如何构建一个典型的\
  \ UI 表单，其中包含常见的 UI 节点，如文本字段和按钮。之后，你将创建一个使用 UI 表单序列化文件格式（FXML）的应用程序。通过使用 FXML，你将有机会通过\
  \ JavaFX 的机制将 UI 元素连接到控制器代码，从而了解流行的 MVC（模型/视图/控制器）UI 模式的各个方面。\n\n\n\n## 布局\n\n构建用户界面时最大的挑战之一，就是将\
  \ UI 控件布局到显示区域上。在 GUI 应用程序中，理想的情况是允许用户调整可视区域（窗口）的大小，同时 UI 控件也能随之调整大小，以提供愉悦的用户体验。与\
  \ Java 的 Swing API 类似，JavaFX API 也提供了内置布局，这些布局提供了将 UI 控件显示到场景图上的最常见方式。以下是本节讨论的 JavaFX\
  \ 布局：\n\n*   [`javafx.scene.layout.HBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/HBox.html)\n\
  *   [`javafx.scene.layout.VBox`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/VBox.html)\n\
  *   [`javafx.scene.layout.FlowPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/FlowPane.html)\n\
  *   [`javafx.scene.layout.BorderPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/BorderPane.html)\n\
  *   [`javafx.scene.layout.GridPane`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/GridPane.html)\n\
  \n注意\n\n要查看本章未讨论的其他内置布局，请参阅位于 [`https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Pane.html`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/layout/Pane.html)\
  \ 的 Javadoc 文档。\n\n### HBox\n\n`HBox` 布局的作用是将 JavaFX 子节点放置在水平行中。当子节点被连续添加时，每个节点都会被追加到末尾（右侧）。默认情况下，`HBox`\
  \ 布局会尊重子节点的首选宽度和高度。当父节点不可调整大小时（例如，一个 [`Group`](https://docs.oracle.com/javase/8/javafx/api/javafx/scene/Group.html)\
  \ 节点），`HBox` 的行高将采用具有最大首选高度的子节点的高度。此外，默认情况下，每个子节点都对齐到左上角（[`Pos`](https://docs.oracle.com/javase/8/javafx/api/javafx/geometry/Pos.html)\
  \ `.TOP_LEFT`）位置。\n\n可以配置 `HBox` 的调整大小范围，以允许父节点在布局请求时管理和计算可用空间。您可以通过编程方式更改 `HBox`\
  \ 的布局约束，例如边框、内边距、外边距、间距和对齐方式。虽然在本章中您将学习如何使用编程方式设置约束，但也有其他替代策略。一种广为人知且首选的策略是使用 JavaFX\
  \ CSS 属性来设置样式或约束；您将在本章稍后部分了解该方法，更多细节将在关于自定义 UI 的第 15 章中介绍。\n\n当处理不可调整大小的子节点（例如 `Shape`\
  \ 节点）时，父节点会考虑 `Shape` 的矩形边界（`ParentInBounds`）、其宽度和高度。相比之下，当使用可调整大小的节点（例如 `TextField`\
  \ 控件）时，父节点（`HBox`）能够管理和计算 `TextField` 水平增长所需的可用空间。要使 UI 控件在 `HBox` 内水平增长，请使用静态方法\
  \ `HBox.setHgrow()`。同时，假设 `HBox` 的父节点是可调整大小的，并且会占用可用空间，例如 `BorderPane` 的中心区域。以下代码片段设置了一个\
  \ `TextField` 控件，使其在父节点 `HBox` 的宽度调整时水平增长：\n\n```\nTextField myTextField = new TextField()\n\
  HBox.setHgrow(myTextField, Priority.ALWAYS);\n```\n\n#### 一个 HBox 示例\n\n在查看代码示例之前，让我们先看一下\
  \ `HBox` 节点内子节点的图片，并了解它们是如何适当间隔的。图 5-1 展示了一个包含四个矩形（`r1` 到 `r4`）的 HBox。该图显示了子节点的边框、内边距、外边距和间距的宽度。\n\
  \n![A323804_3_En_5_Fig1_HTML.jpg](img/A323804_3_En_5_Fig1_HTML.jpg)\n\n图 5-1.\n\n\
  一个包含四个矩形的 HBox 布局示例\n\n一个实际运行的 `HBox` 布局示例，如清单 5-1 所示，该代码使用了四个矩形作为子节点，并设置了不同的 `HBox`\
  \ 约束。示例中使用了不可调整大小的节点（如矩形形状），以演示 `HBox` 布局控件的多种间距属性。为简洁起见，此处仅列出相关代码。要查看完整清单，请访问本书页面上的“源代码/下载”选项卡，网址为\
  \ [`www.apress.com`](http://www.apress.com)，以下载源代码。\n\n```\nGroup root = new Group();\n\
  Scene scene = new Scene(root, 300, 250);\n// 子节点之间的像素间距\nHBox hbox = new HBox(5);\n\
  // 边框为蓝色、虚线、\n// 所有角半径为 0%、\n// 宽度为 1 像素\nBorderStroke[] borderStrokes = new BorderStroke[]\
  \ {\nnew BorderStroke(Color.BLUE,\nBorderStrokeStyle.DASHED,\nnew CornerRadii(0.0,\
  \ true),\nnew BorderWidths(1.0))\n};\nhbox.setBorder(new Border(borderStrokes));\n\
  // 仅子节点之间的内边距\nhbox.setPadding(new Insets(1));\n// 矩形 r1 到 r4\nRectangle r1 = new\
  \ Rectangle(10, 10);\nRectangle r2 = new Rectangle(20, 20);\nRectangle r3 = new\
  \ Rectangle(5, 20);\nRectangle r4 = new Rectangle(20, 5);\n// 2 像素的外边距\nHBox.setMargin(r1,\
  \ new Insets(2,2,2,2));\nhbox.getChildren().addAll(r1, r2, r3, r4);\nroot.getChildren().add(hbox);\n\
  // 显示后输出所有累加起来的尺寸\nprimaryStage.setOnShown((WindowEvent we) -> {\nSystem.out.println(\"\
  hbox width  \" + hbox.getBoundsInParent().getWidth());\nSystem.out.println(\"hbox\
  \ height \" + hbox.getBoundsInParent().getHeight());\n});\nprimaryStage.setTitle(\"\
  HBox Example\");\nprimaryStage.setScene(scene);\nprimaryStage.show();\n清单 5-1.\n\
  HBoxExample.java 文件演示了使用 HBox 布局并将形状作为子节点\n```\n\n运行清单 5-1 中的代码后，输出结果如图 5-2 所示。在图\
  \ 5-2 中，显示了一个带有蓝色虚线边框的 `HBox`。该 HBox 实例包含四个大小不同的矩形。\n\n![A323804_3_En_5_Fig2_HTML.jpg](img/A323804_3_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2.\n\n文件 HBoxExample.java 的输出，演示了 HBox 布局\n\n\n\n#### 代码详解\n\n清单 5-1 首先使用单参数构造函数实例化了一个\
  \ `HBox`。该构造函数接受一个 `double` 类型的值，用于指定子节点之间的水平间距（以像素为单位）。这等同于在 `HBox` 实例上调用 `setSpacing()`\
  \ 方法。在创建了一个间距为五像素的 `HBox` 实例后，代码创建了一个蓝色虚线边框，其四个角的圆角半径为零，描边宽度为一像素。以下代码片段创建了一个包含单个\
  \ `BorderStroke` 实例的数组，该实例将绘制在 `HBox` 布局面板节点周围。\n\n```\n// 边框为蓝色、虚线、所有角半径均为 0%、宽度为\
  \ 1 像素\nBorderStroke[] borderStrokes = new BorderStroke[] {\nnew BorderStroke(Color.BLUE,\n\
  BorderStrokeStyle.DASHED,\nnew CornerRadii(0.0, true),\nnew BorderWidths(1.0))\n\
  };\nhbox.setBorder(new Border(borderStrokes));\n```\n\n在创建边框时，您会记得在第三章 3 中，您使用了与创建描边相同的概念来创建形状。边框的描边可以使用多种样式和颜色创建。所有\
  \ JavaFX 布局面板都有一个 `setBorder()` 方法，允许您创建边框。要创建边框，您必须创建一个包含至少一个 `BorderStroke` 对象的数组。此代码创建了一个\
  \ `BorderStroke` 实例，其颜色为蓝色，`BorderStrokeStyle.DASHED` 值为虚线。其他描边样式包括 `DOTTED`（点线）、`SOLID`（实线）和\
  \ `NONE`（无）。接下来，使用构造函数 `CornerRadii(percent, isPercentage)` 设置圆角半径参数。当使用 0.0 值时，角具有零半径，从而形成方角。通过改变半径，矩形可以具有圆角，看起来像药丸形状。最后，描边宽度参数接受一个\
  \ `BorderWidths` 类（双精度）的实例。\n\n设置边框后，`HBox`（`hbox`）实例的 `setPadding()` 方法被调用，并传入一个\
  \ `Insets(1)` 参数，这将设置四个边，使边框和子节点之间使用一像素的间距。正如您之前在 图 5-1 中看到的，边框和内边距间距显示了周围的边界。\n\
  \n由于间距、内边距、外边距和边框像素宽度常常令人困惑，我在 图 5-1 中绘制了一个 `HBox` 示意图。该图显示了三个灰色矩形区域，每个宽度为五像素，代表子节点（`r1`\
  \ 到 `r4`）之间的间距。设置间距使用了一个 `Insets` 对象，它允许您在 `HBox` 的子节点之间创建空间。间距通过 `HBox` 的构造函数或\
  \ `setSpacing()` 方法创建。图 5-1 中显示的间距是四个矩形之间的空间（图中显示为矩形形状之间的灰色部分）。为了不与内边距混淆，您会注意到 `HBox`\
  \ 内部位于边框和子节点之间的部分是内边距（以黄色着色），它占据了一像素的宽度，环绕着这一行。\n\n创建完所有四个矩形后，代码在矩形 `r1` 上设置了外边距。要设置外边距，您会注意到使用的是静态方法\
  \ `HBox.setMargin(Node, Insets)`，而不是 `HBox` 实例上的方法。代码创建了一个 `Insets` 对象，其顶部、右侧、底部和左侧的外边距均为两像素。如\
  \ 图 5-1 所示，这是矩形 `r1`（蓝色）周围的环绕空间。要计算 `HBox` 的尺寸大小，您基本上需要将边框宽度、内边距、间距、外边距和子节点的边界（`ParentInBounds`）相加。当\
  \ `HBox` 的父节点是 `Group` 节点（不可调整大小）且子节点也不可调整大小时，`HBox` 的尺寸总计为宽 78 像素，高 24 像素。表 5-1\
  \ 和 5-2 显示了 `HBox` 实例宽度和高度的明细。\n\n表 5-2.\n\nHBox 的总高度（像素）由边框、间距、内边距和首选子节点宽度相加得出\n\
