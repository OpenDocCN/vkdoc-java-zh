  \ bean 属性名称（对应领域对象），创建 `FirstName` 表格列。\n\n```\nTableColumn firstNameCol = new TableColumn(\"\
  First Name\");\nfirstNameCol.setCellValueFactory(new PropertyValueFactory(\"firstName\"\
  ));\n```\n\n创建列后，您会注意到 `setCellValueFactory()` 方法，它负责调用 `Person` bean 的属性。当下属列表被放入\
  \ `TableView` 时，它将知道如何提取属性以放置到表格的每个单元格列中。基于 JavaBean 约定，使用 bean 属性名称（`firstName`）创建一个新的\
  \ `PropertyValueFactory` 实例。\n\n设置好列之后，代码将为 `TableView` 列设置单元格工厂，以允许用户编辑单元格，这也会更新下属（`Person`）的字段。代码将使“别名”列成为可编辑的文本字段，使“心情”列成为可编辑的组合框。\n\
  \n最后是 `ListView` 上选择监听器的实现。在代码中，您会注意到 `getSelectionModel().selectedItemProperty()`\
  \ 方法（显示在清单 6-28 末尾），它允许添加一个监听器。代码简单地创建并添加一个 `ChangeListener` 来处理选择事件。当用户选择一位老板时，`TableView`\
  \ 会被清空，并填充所选老板的下属。实际上，这是 `ObservableList` 的魔力，它通知 `TableView` 发生了变化。清空并填充 `TableView`\
  \ 的代码摘自清单 6-28，如下所示：\n\n```\nteamMembers.clear();\nteamMembers.addAll(observable.getValue().employeesProperty());\n\
  ```\n\n## 生成后台进程\n\n通常，在具有长时间运行进程的桌面应用程序中，视觉反馈应指示正在发生某些事情，或建议用户耐心等待。GUI 开发的主要陷阱之一是难以知道何时以及如何将工作委托给工作线程。为了避免这些陷阱，GUI\
  \ 开发人员不断被提醒线程安全问题，尤其是在高负载期间阻塞 UI 线程时。JavaFX 提供了 UI 控件，通过将工作卸载到不同的线程（`Task`）来帮助解决此问题，同时提供正在执行的工作的反馈或进度指示器。\n\
  \n\n\n### 创建后台任务\n\nJavaFX API 可以在后台线程上执行工作，这些工作被称为任务（`javafx.concurrent.Task`）。这些任务是一次性的，会在某个线程上执行。`Task`\
  \ 类是 Java 并发库中 `Runnable` 和 `Future` 接口的子类。\n\nJava Future 的优点是能够在执行代码时提供异步行为。换句话说，当你执行任务时，它不会阻塞。当使用\
  \ `ExecutorService` 的 `submit()` 方法时，会向调用者返回一个 future 对象。可以定期检查该 future 对象，以确定任务是否完成或是否发生错误。清单\
  \ 6-30 展示了一个为执行任务而创建的简单线程池。\n\n```\nTask worker = new Task() {\n@Override\nprotected\
  \ Boolean call() throws Exception {\nfor (int i=0; i<100; i++) {\n// 一些繁重的工作（不在\
  \ UI 线程上）\nupdateMessage(\"进度文本\");\nupdateProgress(i, 100);\n}\nreturn true;\n\
  }\n};\nExecutorService threadPool = threadPool = Executors.newFixedThreadPool(2);\n\
  Future future = threadPool.submit(worker);\n清单 6-30.\n为执行工作线程任务而创建的线程池\n```\n\n\
  你注意到清单 6-30 中的 `call()` 方法包含两个方法——`updateMessage()` 和 `updateProgress()` 了吗？这些方法通过更新当前运行任务的状态或进度信息来提供帮助。接下来，你将看到一个示例应用程序，它将模拟一个显示文件复制进度的对话框窗口。\n\
  \n### 示例：文件复制进度对话框（后台进程）\n\n为了演示一个生成后台进程同时向用户提供反馈的 GUI 应用程序，我创建了一个示例应用程序，它模拟了一个可视化显示多个文件复制进度的对话框窗口。图\
  \ 6-20 从左到右描绘了一个进度条和一个进度指示器（饼图）。进度指示器在指示图标下方显示一个百分比。当进程仍在执行时，用户可以单击“取消”按钮来取消或终止任务。\n\
  \n![A323804_3_En_6_Fig20_HTML.jpg](img/A323804_3_En_6_Fig20_HTML.jpg)\n\n图 6-20.\n\
  \n一个模拟文件复制过程的窗口，使用进度条和进度指示器向用户提供反馈\n\n以下是此示例中使用的主要类：\n\n*   `javafx.scene.control.ProgressBar`\n\
  *   `javafx.scene.control.ProgressIndicator`\n*   `javafx.concurrent.Task`\n\n清单\
  \ 6-31 展示了一个代码示例，该示例使用 JavaFX 的进度条和进度指示器 UI 控件，在复制文件时向用户提供反馈。\n\n```\npublic class\
  \ BackgroundProcesses extends Application {\nstatic Task copyWorker;\nfinal int\
  \ numFiles = 30;\nprivate ExecutorService threadPool;\n/**\n* @param args the command\
  \ line arguments\n*/\npublic static void main(String[] args) {\nApplication.launch(args);\n\
  }\n@Override\npublic void init() throws Exception {\nsuper.init();\nthreadPool =\
  \ Executors.newFixedThreadPool(1);\n}\n@Override\npublic void stop() throws Exception\
  \ {\nsuper.stop();\nthreadPool.shutdown();\n}\n@Override\npublic void start(Stage\
  \ primaryStage) {\nprimaryStage.setTitle(\"BackgroundProcesses: 后台进程\");\nGroup\
  \ root = new Group();\nScene scene = new Scene(root, 330, 120, Color.WHITE);\nBorderPane\
  \ mainPane = new BorderPane();\nmainPane.layoutXProperty()\n.bind(scene.widthProperty()\n\
  .subtract(mainPane.widthProperty())\n.divide(2));\nroot.getChildren().add(mainPane);\n\
  Label label = new Label(\"文件传输:\");\nProgressBar progressBar = new ProgressBar(0);\n\
  ProgressIndicator progressIndicator = new ProgressIndicator(0);\nHBox hb = new HBox();\n\
  hb.setSpacing(5);\nhb.setAlignment(Pos.CENTER);\nhb.getChildren().addAll(label,\
  \ progressBar, progressIndicator);\nmainPane.setTop(hb);\nButton startButton = new\
  \ Button(\"开始\");\nButton cancelButton = new Button(\"取消\");\nTextArea textArea\
  \ = new TextArea();\ntextArea.setEditable(false);\ntextArea.setPrefSize(200, 70);\n\
  HBox hb2 = new HBox();\nhb2.setSpacing(5);\nhb2.setAlignment(Pos.CENTER);\nhb2.getChildren().addAll(startButton,\
  \ cancelButton, textArea);\nmainPane.setBottom(hb2);\n// 连接开始按钮\nstartButton.setOnAction((ActionEvent\
  \ event) -> {\nstartButton.setDisable(true);\nprogressBar.setProgress(0);\nprogressIndicator.setProgress(0);\n\
  textArea.setText(\"\");\ncancelButton.setDisable(false);\ncopyWorker = createWorker(numFiles);\n\
  // 连接进度条\nprogressBar.progressProperty().unbind();\nprogressBar.progressProperty().bind(copyWorker.progressProperty());\n\
  progressIndicator.progressProperty().unbind();\nprogressIndicator.progressProperty().bind(copyWorker.progressProperty());\n\
  // 追加到文本框\ncopyWorker.messageProperty()\n.addListener((observable, oldValue, newValue)\
  \ ->\ntextArea.appendText(newValue + \"\\n\")\n);\nthreadPool.submit(copyWorker);\n\
  });\n// 取消按钮将终止工作线程并重置。\ncancelButton.setOnAction((ActionEvent event) -> {\nstartButton.setDisable(false);\n\
  cancelButton.setDisable(true);\ncopyWorker.cancel(true);\n// 重置\nprogressBar.progressProperty().unbind();\n\
  progressBar.setProgress(0);\nprogressIndicator.progressProperty().unbind();\nprogressIndicator.setProgress(0);\n\
  textArea.appendText(\"文件传输已被取消。\");\n});\ncancelButton.setDisable(true);\nprimaryStage.setScene(scene);\n\
  primaryStage.show();\n}\nprivate Task createWorker(final int numFiles) {\nreturn\
  \ new Task() {\n@Override\nprotected Boolean call() throws Exception {\nfor (int\
  \ i = 0; i < numFiles; i++) {\nlong elapsedTime = System.currentTimeMillis();\n\
  copyFile(\"某个文件\", \"某个目标文件\");\nelapsedTime = System.currentTimeMillis() - elapsedTime;\n\
  String status = elapsedTime + \" 毫秒\";\n// 排队更新状态\nupdateMessage(status);\nupdateProgress(i\
  \ + 1, numFiles); // (进度, 最大值)\n}\nreturn true;\n}\n};\n}\nprivate void copyFile(String\
  \ src, String dest) throws InterruptedException {\n// 模拟长时间操作\nRandom rnd = new\
  \ Random(System.currentTimeMillis());\nlong millis = rnd.nextInt(1000);\nThread.sleep(millis);\n\
  }\n}\n清单 6-31.\n一个演示后台进程的示例应用程序\n```\n\n\n\n### 工作原理\n\n清单 6-31 中的代码首先创建了两个进度控件（而非一个），用于向用户展示正在进行的工作。接着，代码通过私有的\
  \ `createWorker()` 方法创建了一个工作线程。`createWorker()` 便捷方法实例化并返回一个 `javafx.concurrent.Task`\
  \ 对象，该对象类似于 Java Swing 中的 `SwingWorker` 类。与 `SwingWorker` 类不同，`Task` 对象因其事件驱动设计而大大简化且更易于使用。例如，`Task`\
  \ 对象能够异步更新进度。\n\n在创建 `Task` 对象的实例时，代码实现了 `call()` 方法以在后台执行工作。在工作进行过程中，你通常希望将中间结果（如进度或文本信息）加入队列，以便向用户提供反馈。为了将信息加入队列，API\
  \ 允许你调用 `updateProgress()` 或 `updateMessage()` 方法。这些方法以线程安全的方式更新信息，使得进度属性的观察者能够安全地更新\
  \ GUI，而不会阻塞 GUI 线程。清单 6-32 将消息加入队列并显示进度。\n\n```\n// 将状态加入队列\nupdateMessage(status);\n\
  updateProgress(i + 1, numFiles); // (进度, 最大进度)\n清单 6-32.\n在不阻塞进度 UI 控件的情况下更新文本消息和进度\n\
  ```\n\n创建工作任务后，代码会解除绑定之前绑定到进度控件的所有旧任务。一旦进度控件解除绑定，代码便将进度控件绑定到新创建的名为 `copyWorker`\
  \ 的 `Task` 对象。清单 6-33 将新的 `Task` 对象重新绑定到进度 UI 控件。\n\n```\n// 连接进度条\nprogressBar.progressProperty().unbind();\n\
  progressBar.progressProperty().bind(copyWorker.progressProperty());\nprogressIndicator.progressProperty().unbind();\n\
  progressIndicator.progressProperty().bind(copyWorker.progressProperty());\n清单 6-33.\n\
  任务使用后，进度控件需要重新绑定到新任务\n```\n\n接下来，请注意代码实现了一个 `ChangeListener`，用于将队列中的结果追加到 `TextArea`\
  \ 控件中。JavaFX 属性的另一个显著特点是，你可以像 Java Swing 组件一样附加多个监听器。最后，工作线程和控件全部连接完毕，以生成一个在后台运行的线程。以下代码行展示了如何启动一个\
  \ `Task` 工作线程。\n\n```\nnew Thread(copyWorker).start();\n```\n\n这段代码最后连接了“取消”按钮。该按钮仅调用\
  \ `Task` 对象的 `cancel()` 方法来终止进程。任务取消后，进度控件会被重置。一旦工作任务被取消，它便无法重复使用。这就是“开始”按钮需要重新创建新任务的原因。如果你需要一个更健壮的可重用解决方案，请查看\
  \ `javafx.concurrent.Service` 类。\n\n## 总结\n\n本章从学习标签和自定义字体开始，例如使用第三方库 `FontAwesomeFX`。在学习标签之后，你通过一个有趣的动画游戏精灵示例，深入了解了各种按钮控件。\n\
  \n学习常用按钮控件后，你了解了如何创建标准菜单和菜单栏。通过创建菜单，你学会了编写处理代码来响应菜单项的选择。然后，你能够将组合键或键盘快捷键映射到菜单选项。你还学习了如何创建通过右键单击场景图来调用的上下文菜单。通过多种创建菜单和菜单项的方式，你运行了一个模拟安全警报应用程序的示例程序。\n\
  \n最后，你接触到了 `ObservableList` 集合，它支持显示诸如 `ListView` 和 `TableView` 节点等 UI 控件。通过学习 UI\
  \ 控件 `ListView` 和 `TableView`，你得以使用领域对象来填充列表单元格和表格列单元格。你还学习了如何使用文本字段和组合框使表格视图的列单元格可编辑。\n\
  \n最后，你学习了 JavaFX 的 `Task` API，它使你能够在更新任务状态的同时异步执行代码。你还学习了如何将任务绑定到进度类型的控件 `ProgressBar`\
  \ 和 `ProgressIndicator`。借助 `ProgressBar` 和 `ProgressIndicator`，你运行了一个模拟后台工作线程复制文件并更新进度的示例。\n\
  \n"
- "# 7. 图形\n\n你是否曾听人说过“当两个世界碰撞”？这个表达通常用于描述来自不同背景或文化的人陷入冲突，必须面对艰难抉择的情况。在构建需要图形或动画的\
  \ GUI 应用程序时，我们常常会处于商业世界与游戏世界的碰撞航线上。换句话说，在开发应用程序时，能够很好地平衡商业应用的 UI 方面和类似电子游戏的效果是件好事。\n\
  \n在不断变化的富互联网应用（RIA）世界中，你可能已经注意到动画的使用越来越多，例如脉冲按钮、过渡效果、移动背景等。GUI 应用程序可以使用动画来提供视觉提示，让用户知道下一步该做什么。借助\
  \ JavaFX，你将能够两全其美，既能创建吸引人的图形，也能处理处理业务交易的表单式应用程序。\n\n在本章中，你将学习 JavaFX 图形的基础知识，例如显示和操作图像。此外，在本章中你还将学习高级动画\
  \ API。系好安全带；你将发现将酷炫的游戏式界面集成到日常应用程序中的解决方案。\n\n在本章中，你将了解以下内容：\n\n*   加载和显示图像\n*  \
  \ 后台任务\n*   进度指示器\n*   更改图像的颜色设置\n*   将位图图像写入磁盘\n*   拖放图像文件\n*   使用关键值、关键帧和时间线进行动画制作\n\
  *   动画过渡类\n*   顺序和并行过渡\n\n## 使用图像\n\nJavaFX 的另一个强大功能是能够在场景图上显示标准图像文件格式。在本节中，你将学习如何加载、显示、缩放和旋转图像。额外福利是，你还将学习如何轻松更改图像的色彩属性，例如色调、饱和度、亮度和对比度。\n\
  \n在学习 JavaFX `Image` 和 `ImageView` API 的基础知识后，你将探索一个照片查看器应用程序的示例。这个有趣的应用程序允许你缩放、旋转和操作图像。\n\
  \n\n\n### 加载图像\n\n你可能已经了解互联网上许多标准的图像文件格式，例如 `.jpg`、`.png`、`.gif` 和 `.bmp`。为了加载这些标准图像文件格式，JavaFX\
  \ 提供了 `javafx.scene.image.Image` API。`Image` 类拥有许多便捷的构造方法，便于实现不同的加载策略，如下表所示：\n\n\
  *   `Image(java.io.InputStream inputStream)`\n*   `Image(java.io.InputStream is,\
  \ double requestedWidth, double requestedHeight, boolean preserveRatio, boolean\
  \ smooth)`\n*   `Image(java.lang.String url)`\n*   `Image(java.lang.String url,\
  \ boolean backgroundLoading)`\n*   `Image(java.lang.String url, double requestedWidth,\
  \ double requestedHeight, boolean preserveRatio, boolean smooth)`\n*   `Image(java.lang.String\
  \ url, double requestedWidth, double requestedHeight, boolean preserveRatio, boolean\
  \ smooth, boolean backgroundLoading)`\n\n如你所见，所有构造方法中只有少数几个通用参数，它们以不同的组合方式用于不同的加载场景。表\
  \ 7-1 简要描述了每个参数。\n\n表 7-1.\n\n加载 `javafx.scene.image.Image` 类图像时的通用参数\n\n| 参数 |\
  \ 数据类型 | 描述 |\n| --- | --- | --- |\n| `inputStream` | `java.io.InputStream` | 输入流，例如来自文件或网络。\
  \ |\n| `url` | `String` | 图像的 URL 位置，例如本地文件系统上的文件或托管图像文件的 Web 服务器。 |\n| `backgroundLoading`\
  \ | `boolean` | 在后台加载图像（脱离 JavaFX 应用程序线程）。 |\n| `requestedWidth` | `double` | 指定图像的边界框宽度。\
  \ |\n| `requestedHeight` | `double` | 指定图像的边界框高度。 |\n| `preserveRatio` | `boolean`\
  \ | 保持图像在边界框内的宽高比。 |\n| `smooth` | `boolean` | 值为 `true` 表示使用更好的算法来平滑图像，但速度可能较慢；否则将使用较低质量的算法，渲染像素更快。\
  \ |\n\n为了演示如何加载图像，清单 7-1 展示了三种加载图像的方式。该代码清单演示了从本地文件系统、类路径以及远程主机系统（如 Web 服务器）加载图像。\n\
  \n```\ntry {\n// 当前线程上下文不应是 GUI 线程。\n// 从 Windows 文件系统加载图像\nFile file = new File(\"\
  C:\\\\Users\\\\jdoe\\\\Pictures\\\\myphoto.jpg\");\nString localUrl = file.toURI().toURL().toString();\n\
  // 不在后台加载（阻塞）\nImage localImage = new Image(localUrl, false);\n// 从 jar 文件中的类路径加载图像\n\
  String urlStr = this.getClass()\n.getClassLoader()\n.getResource(\"images/myphoto.jpg\"\
  )\n.toExternalForm();\n// 在后台加载（非阻塞）\nImage cpUrl = new Image(urlStr, true);\n//\
  \ 从 Web 服务器加载图像\nString remoteUrl = \"http://mycompany.com/myphoto.jpg\";\n// 在后台加载（非阻塞）\n\
  Image remoteImage = new Image(remoteUrl, true);\nSystem.out.println(localUrl); \
  \ // file:/C:/Users/jdoe/Pictures/myphoto.jpg\nSystem.out.println(cpUrl);     //\
  \ jar:file:/myApp.jar!/images/myphoto.jpg\nSystem.out.println(remoteUrl); // http://mycompany.com/myphoto.jpg\n\
  // ... 其余代码\n} catch (MalformedURLException ex) {\nex.printStackTrace();\n}\n清单\
  \ 7-1.\n从文件系统、类路径和远程 Web 服务器加载图像\n```\n\n此清单演示了如何使用接收图像 `URL` 路径和一个 `boolean` 参数的构造方法，来决定是否在后台线程中加载图像。由于构造方法必须接受一个\
  \ `URL` 对象，因此文件路径必须转换为 URL 对象（URL 规范）。\n\n清单 7-1 首先使用一个基于包含图像路径位置的字符串的 `File` 对象，从本地文件系统加载图像。在此场景中，我指定了一个基于\
  \ Microsoft Windows 的绝对文件路径。在这里你会注意到，表示 Windows 操作系统上文件路径的字符串中使用了双反斜杠。第一个反斜杠用于在\
  \ Java 字符串中转义反斜杠字符。`toURL()` 方法会将文件系统路径转换为标准的 `URL` 格式字符串。好处在于，该方法调用会将绝对文件路径转换为标准统一资源定位符规范的格式。该字符串将包含表示协议和路径信息的前缀\
  \ `file:`。\n\n与本地文件系统类似，从 Java 类路径或资源目录加载图像文件也是如此。假设应用程序被构建为可执行的 JAR，清单 7-1 中的示例将协议显示为\
  \ `jar:file:`，表示 JAR 归档文件内的文件。请特别注意使用 `getClassLoader()` 方法的代码。某些环境（如 OSGi 平台）会在其自身的上下文（也称为\
  \ bundle）中使用独立的类加载器。通过使用 `getClassLoader()` 方法，代码可以安全地从正确的类加载器上下文中获取资源。例如，如果项目有一个包含图像文件的资源目录，你可以像下面这样基于类路径加载资源：\n\
  \n```\nsrc/\n+--main/\n+----java/\n+-------com/\n+---------mycompany/\n+-----------MyClass.java\n\
  +----resources/\n+-------com/\n+---------mycompany/\n+-----------my_image.jpg\n\
  String urlStr = MyClass.class\n.getClassLoader()\n.getResource(\"com/mycompany/my_image.jpg\"\
  )\n.toExternalForm();\n```\n\n在这个例子中，你会注意到资源字符串 `com/mycompany/my_image.jpg` 的开头包含了路径信息。有时项目会将所有图像图标放在一个名为\
  \ `images` 的目录中，或者放在包命名空间内。\n\n回到清单 7-1 中的代码，最后一种策略是一个示例，展示了加载托管在远程 Web 服务器上的图像的能力。你可以看到，代码还使用了\
  \ `http:` 作为 `URL` 路径的前缀协议，以演示在远程主机 Web 服务器上加载图像。\n\n务必牢记，清单 7-1 中关于使用布尔值 `false`\
  \ 进行阻塞调用的语句，不应在 JavaFX 应用程序线程上使用。这是因为可能会阻塞 UI 线程，从而导致应用程序看起来像冻结了一样。根据图像文件的大小或网络延迟，UI\
  \ 开发者（也就是你！）的目标是通过在后台线程加载图像来避免阻塞 UI 线程（JavaFX 应用程序线程）。加载图像后，该图像便可以在 JavaFX 应用程序线程（`ImageView`\
  \ 节点）上渲染。如果你传入布尔值 `true`，`ImageView` 节点将显示为空白，直到后台线程完成加载 `Image` 对象。\n\n现在你已经了解了如何加载图像，接下来你将学习如何使用\
  \ JavaFX `ImageView` 节点来显示它们。\n\n\n\n### 显示图像\n\n图像对象加载完成后，需要将其传递给 `ImageView` 对象才能在\
  \ JavaFX 场景图中显示。`javafx.scene.image.ImageView` 节点本质上是一个包装对象，它引用了一个之前讨论过的 `Image`\
  \ 对象。由于 `ImageView` 对象是一个 JavaFX `Node` 对象，因此你可以对其应用特效和执行变换。\n\n当使用 `ImageView`\
  \ 节点应用诸如模糊等特殊效果时，图像的像素数据实际上并未被操作，而是被复制，以便在 `ImageView` 节点上进行计算和显示。当存在多个 `ImageView`\
  \ 对象都指向同一个 `Image` 对象时，这是一种非常强大的技术。清单 7-2 演示了如何异步加载图像（后台加载）并将其传递给 `ImageView` 构造函数。\n\
  \n```\nImage remoteImage = new Image(remoteUrl, true);\nImageView imageView = new\
  \ ImageView(remoteImage);\nroot.getChildren().add(imageView);\n清单 7-2.\n在后台加载图像并在\
  \ ImageView 节点中显示\n```\n\n默认情况下，`width` 和 `height` 将是图像的实际像素尺寸。\n\n现在你已经了解了如何以编程方式将图像加载并显示到\
  \ JavaFX 场景图中，让我们来看一个照片查看器示例应用程序。在下一节中，你将了解如何实现一个照片查看器应用程序，该应用程序允许加载、查看、缩放和旋转图像。\n\
  \n## 照片查看器示例\n\n在 JavaFX 中显示图像的一个实用示例是照片查看器应用程序。此应用程序允许你拖放图像文件或从菜单中加载图像，以便在场景图中查看。图\
  \ 7-1 展示了显示图像的 JavaFX 照片查看器应用程序。图 7-1 还显示了允许用户修改当前图像颜色设置的功能。\n\n![A323804_3_En_7_Fig1_HTML.jpg](img/A323804_3_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1.\n\n显示当前图像的照片查看器应用程序。左侧图像是原始照片，右侧图像进行了颜色调整。\n\n在本节中，你将了解照片查看器的功能以及如何使用该应用程序的说明。一旦你了解了功能和说明，本节将讨论\
  \ UML 类图并对源代码文件进行简要描述。最后，你将获得照片查看器应用程序源代码的详细演练。代码演练将包括应用程序的 GUI 代码、应用程序逻辑和 CSS 样式。\n\
  \n在查看 JavaFX 照片查看器应用程序的源代码之前，下一节将简要说明其功能以及如何使用它的说明。\n\n### 功能/说明\n\n照片查看器应用程序的功能如下：\n\
  \n*   **加载图像**：加载具有以下文件格式的图像：`.jpg`、`.gif`、`.png` 和 `.bmp`。用户可以通过“打开”菜单选项加载图像，或者通过将图像从文件系统拖放到应用程序区域来加载。图\
  \ 7-2 显示了用于调出文件选择器的“打开”菜单项。\n\n    ![A323804_3_En_7_Fig2_HTML.jpg](img/A323804_3_En_7_Fig2_HTML.jpg)\n\
  \n    图 7-2.\n\n    打开文件菜单以显示文件选择器，从文件系统加载图像\n*   **进度指示器**：在加载图像时显示进度指示器。图 7-3\
  \ 显示了应用程序加载图像时的进度指示器。\n\n    ![A323804_3_En_7_Fig3_HTML.jpg](img/A323804_3_En_7_Fig3_HTML.jpg)\n\
  \n    图 7-3.\n\n    显示进度指示器，表明应用程序正在加载文件\n*   **旋转图像**：将图像顺时针或逆时针旋转 90 度。图 7-4 描绘了将图像旋转\
  \ 90 度的菜单选项。还有用于旋转图像的键盘快捷键（在 macOS 上是 ➤ 左/右箭头键，在 Windows 和 Linux 操作系统上是 Ctrl + 左/右箭头键）。\n\
  \n    ![A323804_3_En_7_Fig4_HTML.jpg](img/A323804_3_En_7_Fig4_HTML.jpg)\n\n    图\
  \ 7-4.\n\n    菜单选项，用于将图像顺时针或逆时针旋转 90 度\n*   **调整图像大小**：在保持宽高比的同时调整图像大小。要调整当前图像的大小，请使用鼠标指针展开应用程序窗口的高度或宽度。\n\
  *   **上一张/下一张图像按钮**：能够使用自定义按钮控件翻阅图像。这允许你查看列表中的上一张和下一张图像，如图 7-5 所示。此外，还可以使用箭头键（左和右）分别查看上一张和下一张图像，作为键盘等效操作。\n\
  \n    ![A323804_3_En_7_Fig5_HTML.jpg](img/A323804_3_En_7_Fig5_HTML.jpg)\n\n    图\
  \ 7-5.\n\n    自定义 UI 控件 `ImageViewButtons` 负责在照片查看器应用程序中查看上一张和下一张图像。自定义控件的源代码文件是\
  \ `ImageViewButtons.java`。\n*   **调整颜色属性**：能够通过更改色相、饱和度、亮度和对比度来调整当前查看图像的颜色。你可以使用“颜色调整”下的菜单选项，如图\
  \ 7-6 所示。此外，你还可以将图像恢复为原始颜色设置。\n\n    ![A323804_3_En_7_Fig6_HTML.jpg](img/A323804_3_En_7_Fig6_HTML.jpg)\n\
  \n    图 7-6.\n\n    “颜色调整”菜单选项允许你更改当前显示图像的颜色属性。最后一个选项允许你将图像恢复为原始颜色设置。\n*   **另存为**：“另存为图像”菜单选项允许你使用不同的文件名保存当前显示的图像，或覆盖其加载时的原始图像。“另存为”选项位于“文件”菜单中。图像将以\
  \ PNG 格式的位图图形文件写入。\n\n### UML：类图\n\n作为设计和类结构，照片查看器应用程序由三个类组成，如图 7-7 中的 UML 类图所示。这三个\
  \ UML 类是 `PhotoViewer`、`ImageViewButtons` 和 `ImageInfo`。主要的 JavaFX 应用程序类 `PhotoViewer`\
  \ 与 `ImageViewButtons` 实例具有一对一的关系。`ImageViewButtons` 类是一个简单的自定义控件，用于管理零到多个 `ImageInfo`\
  \ 对象。基本上，`ImageViewButtons` 实例是一个 UI 控件，具有用于查看上一张和下一张图像的按钮。每个加载到当前图像视图并应用了效果的图像都将有一个关联的\
  \ `ImageInfo` 对象。\n\n![A323804_3_En_7_Fig7_HTML.jpg](img/A323804_3_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7.\n\n照片查看器应用程序的类图。一个 `PhotoViewer` 拥有一个 `ImageViewButtons` 实例。一个 `ImageViewButtons`\
  \ 实例拥有零到多个 `ImageInfo` 对象。\n\n\n\n### 文件说明\n\n在详细讲解源代码之前，下一节将简要介绍构成照片查看器示例应用程序的四个源代码文件。该示例应用程序的源代码由以下三个\
  \ Java 类文件和一个 [JavaFX CSS](https://creativecommons.org/licenses/by-sa/3.0/deed.en)\
  \ 样式文件组成：\n\n*   `PhotoViewer.java`\n*   `ImageViewButtons.java`\n*   `ImageInfo.java`\n\
  *   `photo-viewer.css`\n\n`PhotoViewer.java` 是启动的主 JavaFX 应用程序。与本书中的所有示例一样，你会看到一个\
  \ `start()` 方法，它从 JavaFX 应用程序的生命周期中接收一个舞台（`java.stage.Stage`）实例。代码从这里开始创建 UI 元素，并将其放入\
  \ JavaFX 场景图中。\n\n`ImageViewButtons.java` 是一个简单的自定义控件，用于管理映射到图像文件的字符串 URL 列表。`ImageViewButtons`\
  \ 的一个实例是一个自定义 UI 控件，如前文图 7-5 所示，它描绘了允许用户查看上一张和下一张图像的左右箭头按钮。\n\n`ImageInfo.java`\
  \ 是一个普通的 Java 对象（POJO），包含图像的 URL 位置、颜色调整和旋转信息。每加载一张图像，它都会有一个关联的 `ImageInfo` 实例。由于应用程序只有一个负责一次显示一张图像的\
  \ `ImageView` 节点，因此每张图像都有一个 `ImageInfo` 的引用实例，用于存储当前颜色调整和旋转信息等设置。当每张图像加载了相应的 `ImageInfo`\
  \ 对象后，该对象就会被应用到 `ImageView` 节点上。\n\n`photo-viewer.css` 文件是一个 JavaFX CSS 样式文件，应用于照片查看器应用程序中的各种\
  \ UI 元素。该 CSS 文件主要包含用于为按钮和形状着色的 CSS 选择器。此文件位于项目的资源目录中。\n\n### 源代码\n\n在本书的先前版本中，照片查看器应用程序的源代码示例仅包含一个\
  \ Java 类文件。作为单个文件，其唯一的优点是代码集中在一处。然而，作为一个 Java 类文件，存在许多缺点。其中一个想到的缺点是可读性差，因此现在将这个大文件拆分为三个独立的\
  \ Java 文件和一个 JavaFX CSS 文件。\n\n将所有内容放在一个 Java 文件中的另一个显著缺点是代码实际上缺乏灵活性，尤其是在向应用程序添加新功能时。事实上，在本章末尾，你将通过简单地扩展现有应用程序并重写一个方法来了解照片查看器应用程序的一个新功能。本章包含多个代码清单，这些清单被拆分为多个代码部分。每个\
  \ Java 类文件都展示了多个代码清单，以帮助更详细地描述相关内容。\n\n#### PhotoViewer.java\n\n让我们从查看照片查看器应用程序的清单\
  \ 7-3 开始学习源代码。它包含了状态变量和常量。本质上，这是名为 `PhotoViewer.java` 的类和文件的顶部部分。\n\n这些全局使用的变量将有助于减少传递给私有方法的参数数量。由于\
  \ `PhotoViewer` 类是示例的焦点，因此在查看代码部分时，通过了解哪些是全局变量、哪些是局部变量，将更容易理解。\n\n```\n/** 标准日志记录器。\
