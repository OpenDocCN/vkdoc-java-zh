  *   推特：`@denchaser`\n\n如图 6-9 所示的“按钮乐趣”是一个演示常见 JavaFX 按钮控件的应用程序。该应用程序允许用户查看和控制三种类型的车辆。\n\
  \n![A323804_3_En_6_Fig9_HTML.jpg](img/A323804_3_En_6_Fig9_HTML.jpg)\n\n图 6-9.\n\n\
  “按钮乐趣”是一个允许用户查看和控制三种车辆类型（工作用车、周末用车和旅行面包车）相关方面的应用程序。\n\n本示例演示了以下 UI 控件：\n\n*   超链接\n\
  *   复选框\n*   单选按钮\n*   按钮\n*   弹出窗口\n\n### 按钮乐趣操作说明\n\n以下是“按钮乐趣”应用程序的操作说明：\n\n*\
  \   车辆信息：点击超链接，弹出关于所选车辆的信息。\n*   打开或关闭前大灯：点击复选框控件。\n*   选择车辆类型：点击选择三种车辆类型单选控件之一——工作用车、周末用车和旅行面包车。\n\
  *   向前驾驶车辆：点击带有 < 箭头的按钮。\n*   向后驾驶车辆：点击带有 > 箭头的按钮。\n\n### ButtonFun.java 的源代码\n\n\
  在开始本示例之前，你需要准备一些资源，例如在运行时正确加载的图像文件。要获取这些资源，请访问 Apress 下载代码示例，或访问 [`https://github.com/carldea/jfx9be/tree/master/chap06`](https://github.com/carldea/jfx9be/tree/master/chap06)。源代码还将包含诸如\
  \ clean、compile 和 build 之类的脚本。构建脚本会将 `resources` 目录正确复制到编译后的目录（classes）中。\n\n清单\
  \ 6-13 将调用 `init()` 方法来加载应用程序中要使用的图像精灵。其余代码主要是布局所有控件，并连接逻辑或动作代码以响应各种按钮点击。UI 的 CSS\
  \ 样式位于清单 6-14 中，它将根据伪类（状态）为按钮着色并更改属性。\n\n\n\n```\n/**\n* Button Fun 是一款展示应用开发中典型按钮的应用程序。\n\
  * 汽车精灵图来自 http://opengameart.org/users/chasersgaming\n* @author carldea\n*/\npublic\
  \ class ButtonFun extends Application {\nprivate Car[] myCars;\n/**\n* @param args\
  \ 命令行参数\n*/\npublic static void main(String[] args) {\nApplication.launch(args);\n\
  }\n@Override\npublic void init() throws Exception {\nsuper.init();\nmyCars = new\
  \ Car[3];\nCar workCar = buildCar(\"/spr_bluecar_0_0.png\", \"/spr_bluecar_0_0-backwards.png\"\
  ,\n\"选择此车用于通勤。\");\nCar sportsCar = buildCar(\"/sportscar.png\", \"/sportscar-backwards.png\"\
  ,\n\"选择此车用于前往剧院。\");\nCar travelVan = buildCar(\"/travel_vehicle.png\", \"/travel_vehicle.png\"\
  ,\n\"选择此车用于度假。\");\nmyCars[0] = workCar;\nmyCars[1] = sportsCar;\nmyCars[2] = travelVan;\n\
  }\nprivate Car buildCar(String carForwardFile, String carBackwardFile, String description)\
  \ {\nImage carGoingForward = new Image(carForwardFile);\nImage carBackward = new\
