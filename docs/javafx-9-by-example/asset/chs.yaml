  媒体播放器对象是一个状态机，在内部进行状态转换。某些方法使用不在 JavaFX 应用程序线程上的其他线程。因此，在调用 `pause()` 或 `stop()`
  等方法之前，查询媒体播放器的状态通常是一种良好的实践。对于暂停按钮，你已经看到代码在调用媒体播放器对象的 `pause()` 方法之前检查了 `Status.PLAYING`。


  由于所有按钮都使用类似于代码清单 9-3 和前面代码片段（`EventHandler`）的代码，我将仅列出每个按钮最终将在媒体播放器上执行的方法调用。以下操作负责停止、暂停、播放和退出
  MP3 播放器应用程序：


  ```

  停止 - mediaPlayer.stop();

  暂停 - mediaPlayer.pause();

  播放 - mediaPlayer.play();

  关闭 - Platform.exit();

  ```


  最后，在返回按钮面板之前，代码添加了一个事件过滤器，以防止其父节点接收任何鼠标事件。由于父节点（根节点）包含监听鼠标拖拽事件的代码，你不希望它在用户尝试点击按钮面板内的按钮时产生干扰。换句话说，当鼠标指针位于按钮面板区域时，你无法在屏幕上拖拽应用程序。以下语句过滤了所有传播到父节点的鼠标事件。


  ```

  // 过滤掉，以防止根节点

  // 接收鼠标事件来拖拽窗口。

  buttonPanel.addEventHandler(MouseEvent.ANY, mouseEventConsumer);

  ```


  #### 播放进度、快退和快进


  在 `start()` 方法中创建自定义按钮面板后，代码调用了私有方法 `createSlider()`，该方法返回一个 JavaFX `Slider` UI
  控件。滑块控件表示一个进度位置滑块，它会根据媒体播放时的位置移动。当媒体暂停时，用户也可以拖拽滑块控件的“滑块头”来在音频或视频媒体中向前或向后移动时间。




  ##### 在媒体中向前或向后搜索


  在私有方法 `createSlider()` 中，以下代码实现了一个滑块控件，用于表示 MP3 音频播放器应用程序的进度（搜索）位置滑块：


  ```

  Slider slider = new Slider(0, 100, 1);

  slider.setId("seek-position-slider");

  slider.valueProperty()

  .addListener((observable) -> {

  if (slider.isValueChanging()) {

  // 搜索前必须检查媒体是否已暂停

  if (mediaPlayer != null &&

  mediaPlayer.getStatus() == MediaPlayer.Status.PAUSED) {

  // 将秒转换为毫秒

  double dur = slider.getValue() * 1000;

  mediaPlayer.seek(Duration.millis(dur));

  }

  }

  });

  ```


  请注意滑块控件的 `valueProperty()` 方法以及对 `addListener()` 方法的调用，该方法包含一个 `InvalidationListener`（lambda
  表达式），用于检测用户是否移动了滑块控件，从而更改了值属性。`InvalidationListener`（函数式接口）的 lambda 参数是一个 `javafx.beans.Observable`
  类型的对象，它引用滑块的 `value` 属性。


  代码首先通过使用 `isValueChanging()` 方法检查滑块的值是否已更改。出于性能效率的考虑，在调用 `seek()` 方法之前执行此检查非常重要。使用
  `InvalidationListener`，滑块的值仅在需要时才会更改（这是惰性求值的一个示例）。如果使用 `ChangeListener`（急切求值），值会过于频繁地更改，可能会使媒体播放器不堪重负。提醒一下，`InvalidationListener`
  是一个只有一个 `Observable` 类型参数的 lambda，而 `ChangeListener` 是一个包含三个参数（一个 `ObservableValue`、一个旧值和一个新值）的
  lambda 表达式。


  ##### 使用滑块控件显示播放进度


  仍在 `start()` 方法中，代码将变量 `progressListener` 分配给一个 `ChangeListener`（lambda）实例，如下面的代码片段所示：


  ```

  // 随着音频/视频播放（播放中）更新滑块

  progressListener = (observable, oldValue, newValue) ->

  progressSlider.setValue(newValue.toSeconds());

  ```


  `progressListener` 负责在媒体播放器播放音频或视频媒体时更新滑块的“滑块按钮”。该监听器在 `playMedia()` 方法中被添加到媒体播放器对象的
  `currentTimeProperty()` 中。在私有方法 `playMedia()` 中，代码首先通过移除绑定到旧媒体播放器对象的单例 `progressListener`
  实例来进行清理，然后将 `progressListener` 添加到一个新创建的媒体播放器对象上。通过移除对进度监听器的旧引用，可以让 Java 运行时执行其垃圾回收过程，从而防止内存泄漏。目前，无法通过
  setter 方法替换 `MediaPlayer` 实例中的媒体对象。为了加载新媒体，必须创建一个新的 `MediaPlayer` 实例。你会在展示使用构造函数
  `MediaPlayer(media)` 加载媒体的代码中注意到，它接受一个 `Media` 实例。


