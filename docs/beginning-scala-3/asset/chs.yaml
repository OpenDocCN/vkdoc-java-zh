  \ 9999\nListening for transport dt_socket at address: 9999\n```\n\n### 应用流程\n\n\
  现在，是时候了解 Play Framework 应用的流程是如何工作的了，从浏览器发起的请求到生成响应的工具（对于 REST API，响应可能是 HTML 或\
  \ JSON）。请查看图 12-6 以了解应用中的不同层级。\n\n![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig6_HTML.png](img/328789_3_En_12_Fig6_HTML.png)\n\
  \n图 12-6\n\nPlay Framework 中的 MVC\n\n图 12-6 所示的 MVC 架构中的请求流程如下：\n\n*   路由器中介 HTTP\
  \ 请求，并确定控制器中定义的处理此请求的动作。\n\n*   控制器监听 HTTP 请求，从请求中提取适当的数据，并对模型应用更改。此外，控制器还会渲染模板文件以生成视图。\n\
  \n*   动作方法的结果最终作为 HTTP 响应发送。\n\n#### 路由器\n\n路由器是 Web 应用的主要入口点，通过 `conf/routes` 文件定义应用所需的路由。每个路由包含一个\
  \ HTTP 方法和一个 URI 模式。对动作方法的调用与 URI 相关联。`Conf/routes` 是内置组件 Router 使用的配置文件，该组件将每个传入的\
  \ HTTP 请求转换为一个动作调用。\n\n注意\n\nHTTP 方法可以是 HTTP 支持的任何有效方法（GET、POST、PUT、DELETE 和 HEAD）。\n\
  \n路由器负责中介并将传入的 HTTP 请求转换为一个动作。Web 应用将 HTTP 请求视为一个事件，该事件由请求路径（包括查询字符串）和 HTTP 方法（例如\
  \ GET、POST 等）组成。路由在 `conf/routes` 文件中定义。该文件会被编译，如果存在任何错误，你可以直接在浏览器中看到它们，而无需重新编译代码或重启服务器。当路由文件被修改时，它会自动重新加载。此功能称为热重载。\n\
  \n如果你打开包含应用不同路由的文件，你将看到类似以下内容：\n\n```\n"
- '# 一个示例控制器，展示一个示例主页

  GET     /                           controllers.HomeController.index()

  '
- '# 将 /public 文件夹中的静态资源映射到 /assets URL 路径

  GET     /assets/*file               controllers.Assets.versioned(path="/public",
  file: Asset)

  ```


  如你所见，路由的声明很简单。你需要指明 HTTP 方法、路由以及哪个控制器接收请求以生成响应。


  现在，如果你编写一个在路由文件中未定义的 URL，你将在浏览器或用于消费 REST API 的工具（如 Postman^(⁷⁵) 或 Insomnia^(⁷⁶)）中看到如图
  12-7 所示的异常。


  ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig7_HTML.png](img/328789_3_En_12_Fig7_HTML.png)


  图 12-7


  显示 Play Framework 无法访问路由的异常


  #### 控制器


  控制器响应请求，处理它们，并调用对模型的更改。Play Framework 中的控制器是一个 Scala 对象，它扩展了 Controller 类型。此 Controller
  类型在 `play.api.mvc` 包中提供。Play Framework 中的控制器包含一个称为动作的函数，用于处理请求参数并生成要发送给客户端的结果。默认情况下，控制器在源根目录下的
  `controllers` 包中定义，即 `app` 文件夹。Java 中的 `Controller` 是一个类，包含一个称为动作的公共静态方法。


  注意


  控制器是一种类型，它扩展了 `play.api.mvc` 包中提供的 Controller。


  #### 模型


  模型是应用操作的信息（以数据结构和操作的形式）的领域特定表示。用于此类表示的最常用对象是 JavaBean。然而，JavaBean 会导致大量样板代码。Play
  Framework 通过字节码增强为你生成 getter 和 setter，从而减少了这些样板代码。模型对象可能包含持久化构件，例如如果需要将它们保存到持久化存储中，则可能包含
  JPA 注解。


  #### 视图


  在基于 Java EE 的 Web 应用中，视图通常使用 JSP 开发。也就是说，基于 JavaEE 的 Web 应用中的视图由 JSP 元素和模板文本组成。由于
  Play 并非以 Java EE 为中心，因此视图包含一个混合了 HTML 和 Scala 代码的模板。在 Play 1 中，模板基于 Groovy，但从 Play
  2 开始，模板基于 Scala。使用 Play 2，你可以开发基于 Java 和 Scala 的 Web 应用，并且模板完全相同。


  注意


  在 Play 1 中，模板基于 Groovy，但从 Play 2 开始，模板基于 Scala。


  如果你创建一个 REST API，则应用中不存在视图组件，因为控制器将以 JSON 格式生成响应。


  ### REST 应用


  你已经创建了一个包含默认路由和 HTML 的应用，但大多数微服务或应用将前端相关的事情委托给其他技术，如 React、Angular、Vue 和 NodeJS，因此在本章中，你将创建一个
  API。




  #### 定义端点


  要开始构建 API，你需要创建一个代表模型的对象。我们将创建一个经典的待办事项列表，其模型类如下所示：


  ```

  .

  case class TodoListItem(id: Long, description: String, isItDone: Boolean)

  ```


  接下来，你需要定义在不同端点中使用的模型。现在，是时候创建你的第一个端点了，该端点用于获取一个 `TodoListItem` 的信息。以下代码展示了你需要添加到路由文件中的新路由：


  ```

  GET   /todo/:id     controllers.TodoListController.getById(id: Long)

  ```


  现在，是时候创建一个控制器了，该控制器包含获取特定元素信息的方法。为此，请在 `controller` 文件夹中创建一个名为 `TodoListController`
  的类，代码如下：


  ```

  package controllers

  import javax.inject._

  import models.{TodoListItem}

  import play.api.libs.json._

  import play.api.mvc.{Action, AnyContent, BaseController, ControllerComponents}

  import scala.collection.mutable

  @Singleton

  class TodoListController @Inject()(val controllerComponents: ControllerComponents)
  extends BaseController {

  // 创建一个元素列表来模拟信息

  private val todoList = new mutable.ListBuffer[TodoListItem]()

  todoList += TodoListItem(1, "Beginning Scala", true)

  implicit val todoListJson = Json.format[TodoListItem]

  def getById(itemId: Long) = Action {

  val foundItem = todoList.find(_.id == itemId)

  foundItem match {

  case Some(item) => Ok(Json.toJson(item))

  case None => NotFound

  }

  }

  }

  ```


  现在你已经有了控制器和逻辑：如果元素存在，则返回其信息；如果不存在，则返回 HTTP 状态码 404。要检查一切是否正常，只需打开浏览器或你偏好的请求工具，输入
  http://localhost:9000/todo/1。


  ```

  {

  "id": 1,

  "description": "Beginning Scala",

  "isItDone": true

  }

  ```


  如果你输入一个不存在的元素，你将看到类似图 12-8 所示的内容。


  ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig8_HTML.png](img/328789_3_En_12_Fig8_HTML.png)


  图 12-8


  请求不存在元素的结果


  控制器中的操作可以返回多种类型的结果，每种结果对应一个 HTTP 状态码。表 12-3 简要总结了最常用的方法；你可以在 Play Framework 的官方网站上找到完整列表^(⁷⁷)。


  表 12-3


  常用结果


  | *结果* | *描述* |

  | --- | --- |

  | BadRequest | 生成 400 BAD_REQUEST 结果 |

  | InternalServerError | 生成 500 INTERNAL_SERVER_ERROR 结果 |

  | NotFound | 生成 404 NOT_FOUND 结果 |

  | Ok | 生成 200 OK 结果 |

  | Redirect | 生成一个简单的重定向结果 |


  #### 应用程序中的分层


  可以想象，将所有逻辑都放在控制器中并不是一个好做法，因为这样无法在不同的端点之间共享相同的逻辑。如果你在任何 Java 应用程序中使用过 Spring Boot，就会了解一些关于逻辑层分布的概念。


  定义层结构的方式取决于许多因素，并且没有定义所有层的标准方法。例如，图 12-9 展示了在 Spring Boot 应用程序中定义层的一种可能方法，其中大部分层也适用于你的
  Play Framework 应用程序。


  ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig9_HTML.png](img/328789_3_En_12_Fig9_HTML.png)


  图 12-9


  Spring Boot 应用程序中的层分布


  表 12-4 列出了关于每层所包含内容的一些信息。


  表 12-4


  Web 应用程序中各层的详细信息


  | *层* | *描述* | *包* | *示例* |

  | --- | --- | --- | --- |

  | 控制器 | 包含微服务的所有端点 | `*.controller` | UserController |

  | 资源 | 包含微服务的所有文档，例如端点定义和 Swagger | `*.controller.documentation` | UserResources
  |

  | 请求/响应 | 存放跨不同层使用的数据传输对象 (DTO) | `*.dto.request, *.dto.response` | UserRequest,
  UserResponse |

  | 服务 | 包含所有服务的定义及其实现 | `*.service,  *.service.impl` | `IUserService, UserService`
  |

  | 验证器 | 包含验证 DTO 请求的所有逻辑 | `*.validator` | `UserValidator` |

  | 仓库 | 包含使用接口的定义，在某些情况下包含执行特定查询的规范 | `*.repository, *.repository.impl` | `UserRepository`
  |

  | 连接器 | 包含与外部微服务或系统的所有通信 | `*.connector` | `UserConnector` |

  | 连接器配置 | 包含与外部服务连接器相关的所有配置 | `*.connector.configuration` | `UserConnectorConfiguration`
  |

  | 辅助类 | 所有在整个微服务中辅助处理不同事务的类 | `*.helper` | `UserHelper` |

  | 配置 | 配置微服务不同方面（例如，响应格式、端口）的所有逻辑 | `*.configuration` | `DatabaseConfiguration`
  |

  | 异常 | 包含每个微服务在请求执行期间可能抛出的所有异常 | `*.exception` | `ApiException` |

  | 模型 | 包含所有可访问数据库的实体 | `*.model` | User（无前缀/后缀） |

  | 枚举 | 跨不同层使用的所有枚举 | `*.enums` | 无前缀/后缀 |

  | 数据传输对象 (DTO) | 跨不同层使用的 DTO | `*.dto` | `UserDTO` |


  这只是一种可能的方法。还有其他方法，例如六边形架构^(⁷⁸)或洋葱架构^(⁷⁹)。你需要分析每种可能的方法，并考虑在微服务中实现每种方法的权衡。


  为了通过具体示例查看所有这些概念，让我们在 `service` 文件夹中创建一个 `TodoListService`，其中包含按 ID 获取单个项目的逻辑。以下代码包含这个新服务的所有逻辑。


  ```

  package service

  import javax.inject._

  import models.{TodoListItem}

  import scala.collection.mutable

  class TodoListService @Inject() () {

  private val todoList = new mutable.ListBuffer[TodoListItem]()

  todoList += TodoListItem(1, "Beginning Scala", true)

  def getById(itemId: Long) =

  todoList.find(_.id == itemId)

  }

  ```


  现在是时候修改旧的控制器来调用你的新服务了。以下代码包含了使用该服务对控制器的重新定义：


  ```

  package controllers

  import javax.inject._

  import models.{TodoListItem}

  import play.api.libs.json._

  import play.api.mvc.{Action, AnyContent, BaseController, ControllerComponents}

  import scala.collection.mutable

  import service.{TodoListService}

  @Singleton

  class TodoListController @Inject() (todoListService: TodoListService) (val controllerComponents:
  ControllerComponents) extends BaseController {

  def getById(itemId: Long) = Action {

  val foundItem = todoListService.getById(itemId)

  foundItem match {

  case Some(item) => Ok(Json.toJson(foundItem))

  case None => NotFound

  }

  }

  }

  ```




  #### 自定义错误处理器


  在开发应用程序时，异常或错误是流程的一部分。大多数异常看起来并不美观，也无法提供关于错误原因的详细信息。


  具体来说，框架可能因以下任一原因抛出异常：


  *   应用程序在代码的某个部分抛出了异常。

  *   请求中存在某些问题，例如请求无效或 URL 不正确。

  *   出于与业务相关的某种原因，显式返回了一个异常。


  Play Framework 提供了一个默认的错误处理器，用于显示异常，但这并不是在响应中接收 HTML 的最佳方式。为了减小响应的大小，并向 API 的使用者提供一些有用的信息，你可以创建一个自定义的错误处理器^(⁸⁰)，实现与客户端和服务器错误相关的方法。以下代码捕获所有
  HTTP 状态码 4xx 和 5xx 错误，并将错误转换为更详细的信息：


  ```

  package exceptions

  import play.api.http.HttpErrorHandler

  import play.api.mvc._

  import play.api.http.Status._

  import play.api.mvc.Results._

  import scala.concurrent._

  import javax.inject.Singleton

  import java.util.UUID

  import play.api.libs.json.Json

  import scala.util.control.NonFatal

  @Singleton

  class CustomErrorHandler extends HttpErrorHandler {

  // 4xx 响应

  override def onClientError(request: RequestHeader, statusCode: Int, message: String):
  Future[Result] = {

  val id = UUID.randomUUID

  Future.successful(Status(statusCode)(Json.obj(

  "error" -> Json.obj(

  "id" -> id,

  "statusCode" -> statusCode.toString

  )

  )))

  }

  // 5xx 响应

  override def onServerError(request: RequestHeader, exception: Throwable): Future[Result]
  = {

  exception match {

  case NonFatal(e) => {

  val id = UUID.randomUUID

  Future.successful(InternalServerError(Json.obj(

  "error" -> Json.obj(

  "id" -> id,

  "statusCode" -> INTERNAL_SERVER_ERROR.toString

  )

  )))

  }

  }

  }

  }

  ```


  定义自定义错误处理器后，除非在 `application.conf` 文件中启用它，否则不会生效。为此，你需要添加以下代码行：


  ```

  play.http.errorHandler = "exceptions.CustomErrorHandler"

  ```


  现在，向一个不存在的 URL 发送请求，例如 `http://localhost:9000/todolist`。如果一切正常，启用了错误处理器的 API 将返回如下
  JSON 响应：


  ```

  {

  "error": {

  "id": "f9e08428-2c53-4410-9e4c-d951185ab28e",

  "statusCode": "404"

  }

  }

  ```


  ## 总结


  在本章中，你学习了如何创建不同类型的应用程序：一种暴露 HTML，另一种暴露一组端点，后者是当今创建微服务的标准方式。你现在了解了用于创建每种应用程序的不同框架，以及它们的优缺点。


  框架有很多，但在本章中，你学习了如何使用 Play Framework，因为它是 Scala 开发者和部分 Java 开发者最常用的框架之一。


