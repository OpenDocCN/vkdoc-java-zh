  ## 类型参数化


  Scala 的参数化类型类似于 Java 中的泛型。如果你熟悉 Java 或 C#，你可能已经对参数化类型有了一些了解。Scala 的参数化类型提供了与 Java
  泛型相同的特性，但功能更强大。


  注意


  接受类型参数的类和特质称为泛型；它们生成的类型称为参数化类型。


  一个直接的语法差异是 Scala 使用方括号（[...]），而 Java 使用尖括号（<...>）。例如，字符串列表的声明如下所示：


  ```

  val list : List[String] = List("A", "B", "C")

  ```


  Scala 允许在方法名中使用尖括号。因此，为了避免歧义，Scala 对参数化类型使用方括号。


  Scala 中的类型用于定义类、抽象类、特质、对象和函数。类型参数化使它们变得通用。例如，`Sets` 可以按以下方式定义为泛型：`Set[T]`。然而，与允许原始类型的
  Java 不同，在 Scala 中你需要指定类型参数。也就是说，`Set[T]` 是一个特质，但不是类型，因为它接受一个类型参数。


  因此，你不能创建 `Set` 类型的变量。


  ```

  scala> def test(s: Set) ={}

  -- Error:

  1 |def test(s: Set) ={}

  |            ^^^

  |            Missing type parameter for Set

  ```


  相反，特质 `Set` 允许你指定参数化类型，例如 `Set[String]`、`Set[Int]` 或 `Set[AnyRef]`。


  ```

  scala> def test(s: Set[AnyRef]) = {}

  def test(s: Set[AnyRef]): Unit

  ```


  例如，特质 `Set` 定义了一个泛型集合，其中具体的集合是 `Set[Int]` 和 `Set[String]` 等等。因此，`Set` 是一个特质，而 `Set[String]`
  是一个类型。`Set` 是一个泛型特质。


  注意


  在 Scala 中，`List`、`Set` 等也可以被称为类型构造器，因为它们用于创建特定类型。你可以通过指定类型参数来构造一个类型。例如，`List` 是
  `List[String]` 的类型构造器，而 `List[String]` 是一个类型。虽然 Java 允许原始类型，但 Scala 要求你指定类型参数，并且不允许你在需要类型的地方仅使用
  `List`，因为它期望的是一个真正的类型——而不是类型构造器。


  考虑到继承，类型参数提出了一个重要问题：`Set[String]` 是否应被视为 `Set[AnyRef]` 的子类型？也就是说，如果 `S` 是类型 `T`
  的子类型，那么 `Set[S]` 是否应被视为 `Set[T]` 的子类型？接下来，你将学习一个定义继承关系并回答上述问题的泛型类型概念。




  ### 变型


  变型定义了参数化类型的继承关系，它揭示了例如 `Set[String]` 是否是 `Set[AnyRef]` 的子类型。像 `class Set[+A]` 这样的声明意味着
  `Set` 是由类型 `A` 参数化的。其中的 `+` 被称为变型注解。


  变型是一个重要且具有挑战性的概念。它定义了参数化类型可以作为参数传递的规则。在本章开头，我们展示了将 `String[]`（Java 表示法）传递给一个期望 `Object[]`
  的方法是如何引发问题的。Java 允许你将某个类型的数组传递给一个期望其超类数组的方法。这被称为协变。表面上看，这非常合理。如果你能将一个 `String` 传递给一个期望
  `Object` 的方法，为什么不能将一个 `Array[String]`（Scala 表示法）传递给一个期望 `Array[Object]` 的方法呢？因为
  `Array` 是可变的；它除了可读之外还可写，所以一个接受 `Array[Object]` 的方法可能会通过插入一些无法插入到 `Array[String]`
  中的内容来修改该 `Array`。


  为类型参数定义类型变型，可以让你控制参数化类型如何传递给方法。变型有三种形式：不变、协变和逆变。类型参数可以单独标记为协变或逆变，默认情况下是不变。在 Scala
  中，变型通过在类型参数前使用 `+` 和 `-` 符号来定义。


  #### 协变类型参数


  协变类型参数通过在类型参数前加上 `+` 来指定。协变类型对于只读容器非常有用。Scala 的 `List` 被定义为 `List[+T]`，这意味着它在类型
  `T` 上是协变的。`List` 是协变的，因为如果你将一个 `List[String]` 传递给一个期望 `List[Any]` 的方法，那么 `List`
  中的每个元素都满足它是 `Any` 的要求，并且你无法更改 `List` 的内容。图 8-2 非常清晰地展示了协变，例如，如果 `S` 继承自 `T`，那么 `Class[S]`
  继承自 `Class[T]`。


  ![../images/328789_3_En_8_Chapter/328789_3_En_8_Fig2_HTML.png](img/328789_3_En_8_Fig2_HTML.png)


