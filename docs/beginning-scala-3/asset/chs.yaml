  转换的输入是逆变的。用一个 `String` 去调用一个期望至少是 `AnyRef` 的东西是合法且有效的。但返回值可以是协变的，因为你期望得到一个数字，所以如果你得到一个
  `Integer`（`Numbers` 的子类），也是可以的。让我们看看它是如何工作的。你定义了一个 `DS`，它具有逆变类型 `In` 和协变类型 `Out`。


  ```

  scala> trait DS[-In, +Out]:

  |     def apply(i: In): Out

  |

  // defined trait DS

  ```


