  ### scala.collection.mutable 包


  顾名思义，该包包含可变的集合。`scala.collection.mutable` 包是这三个包中内容最丰富的。值得浏览一下 API，查看该包中的各种类型，并了解它们的使用方式。默认情况下，Scala
  总是选择不可变集合。例如，如果你直接写 `Set` 而不加任何前缀，或者没有从其他地方导入 `Set`，那么你会得到一个不可变的 `Set`；如果你写 `iterable`，你会得到一个不可变的迭代集合，因为这些都是从
  Scala 包中导入的默认绑定。要获得可变的默认版本，你需要显式地写 `collection.mutable.Set` 或 `collection.mutable.Iterable`。


  注意


  如果你想同时使用可变和不可变版本的集合，一个有用的约定是只导入 `package collection.mutable`。


  `import scala.collection.mutable`


  那么，像 `Set` 这样不带前缀的词仍然指代不可变集合，而 `mutable.Set` 则指代其可变版本。


  现在让我们看看可变的 `Seq`、`Set` 和 `Map`。值得注意的是，我们只会介绍部分实现。`scala.collection.mutable` 包内容非常丰富，值得查阅
  Scala 文档以获取详细说明。


