- "# 11. 简单构建工具\n\n在本书的不同章节中，你主要使用 REPL 来运行代码块并检查结果。命令行很棒，因为如果你想测试某些内容，无需打开 IDE 或创建项目。当你需要创建更复杂的内容时，REPL\
  \ 是最差的选择，因此还有其他工具可用于编译和运行你的应用程序。\n\n如你所知，软件开发包含许多活动，例如编译源代码、执行不同类型的测试^(⁵²)，以及将代码打包成可部署到开发或生产等不同环境的文件。想象一下手动编译所有类，然后创建包进行部署。这会花费太多时间，因此你需要一个工具来为你完成所有这些繁重的工作！\n\
  \n许多工具处理与一个应用程序生命周期相关的所有活动。图 11-1 以时间线的形式快速概述了流行的构建工具。Make^(⁵³) 在此列表中有些特殊，但它被包含在内是因为它开创了构建自动化。图\
  \ 11-1 中除 Make 之外的所有构建工具在 JVM 领域都很流行。\n\n![../images/328789_3_En_11_Chapter/328789_3_En_11_Fig1_HTML.png](img/328789_3_En_11_Fig1_HTML.png)\n\
  \n图 11-1\n\n构建工具时间线\n\n如前所述，Make 开创了构建自动化，并从一开始就支持依赖管理。Make 至今仍被广泛使用，尤其是在 Unix 系统中。\n\
  \nApache Ant^(⁵⁴) 与 Make 类似，但使用 Java 语言实现。与 Make 不同，它使用 XML 来描述构建过程及其依赖关系。它需要 Java\
  \ 平台，并且适合构建 Java 项目。与 Ant 相反，Maven^(⁵⁵) 通过为项目提供合理的默认行为，在构建过程中实现了约定优于配置。\n\n注意\n\n\
  约定优于配置 (CoC) 通常指的是一种以约定为中心的开发方法。它使开发人员只需指定和配置开发中非常规的方面。\n\nApache Ivy^(⁵⁶) 是一个依赖管理器。它是\
  \ Apache Ant 项目的一个子项目，有助于解决项目依赖关系。\n\n注意\n\nApache Ivy 在很大程度上与同样管理依赖关系的 Apache Maven\
  \ 存在竞争关系。然而，Maven 是一个完整的构建工具，而 Ivy 则纯粹专注于管理依赖关系。\n\nGradle^(⁵⁷) 建立在 Apache Ant 和\
  \ Apache Maven 之上，并使用基于 Groovy 的领域特定语言 (DSL) 来声明项目配置，而不是 XML。Gradle 是 Kotlin 和一些\
  \ Java 项目的标准构建工具。\n\n虽然你可以使用 Ant 和 Maven 来构建你的 Scala 项目，但 SBT^(⁵⁸) 是 Scala 应用程序的标准构建工具。与\
  \ Maven 一样，SBT 使用相同的目录结构和约定优于配置的方法，并使用 Apache Ivy 来处理依赖管理。\n\n本质上，构建自动化使用 Ant、Maven、Ivy、Gradle\
  \ 或 SBT 等构建工具自动执行构建过程中的所有步骤，最佳实践是持续运行构建。这个过程被称为持续集成。有几种工具提供持续集成，例如 Hudson^(⁵⁹) 和\
  \ Jenkins^(⁶⁰)。\n\n## SBT 入门\n\n在本节中，你将简要了解 SBT 以及你可以使用此工具完成的所有事情。\n\n### 为什么选择\
  \ SBT？\n\n正如你在上一节中读到的，有许多工具可以帮助你以不同方式构建项目，但其中之一 SBT 是 Scala 中的默认标准。也有其他选择，例如 Mill^(⁶¹)，但在撰写本文时，它在社区中并未被广泛使用。\n\
  \nSBT 有一些值得提及的有趣特性：\n\n*   根据项目大小，它不需要配置（或只需少量配置）。\n*   它支持组合或混合的 Scala/Java 项目。\n\
  *   它与最常见的 IDE（如 IntelliJ 和 VS Code）具有良好的集成。\n*   它支持 Coursier^(⁶²)，这是一个管理项目依赖关系的工具。\n\
  *   它支持多个子项目。\n*   它集成并支持 Scala 中最常见的测试库。\n*   你可以并行运行任务或以批处理模式运行。\n\n### 安装 SBT\n\
  \n第 1 章介绍了与 Scala 相关的不同工具的安装说明，其中之一就是 SBT。\n\n以下是取决于你的操作系统安装此工具的方法：\n\n*   对于 Mac\
  \ OS/Linux，你可以使用 [brew](https://brew.sh/)，这是一个用于安装/更新各种内容的工具。\n*   对于 Windows 平台，你可以从[官方页面](https://www.scala-sbt.org/download.html)（[`www.scala-sbt.org/download.html`](http://www.scala-sbt.org/download.html)）下载\
  \ MSI 安装程序。\n\n```\n➔  ~ brew install sbt\n```\n\n完成 SBT 安装后，检查所有内容是否已安装在你的系统中。为此，请运行以下命令：\n\
  \n```\n➔  ~ sbt --version\nsbt version in this project: 1.5.2\nsbt script version:\
  \ 1.5.2\n```\n\n请注意，SBT 1.5.0 版本引入了对 Scala 3.0.0 的支持，因此你需要安装或更新 SBT 至少到此版本。\n\n\
  ### 常用命令\n\nSBT 有许多用于执行不同类型操作的命令。要运行这些命令中的任何一个，你需要位于项目的根目录中。表 11-1 列出了 SBT 中一些最重要的命令。\n\
  \n表 11-1\n\nSBT 中的命令\n\n| *命令* | *描述* |\n| --- | --- |\n| `about` | 提供有关你机器上 SBT\
  \ 和 Scala 版本的一般信息 |\n| `clean` | 删除由 SBT 生成的文件 |\n| `compile` | 编译 `src/main/scala`\
