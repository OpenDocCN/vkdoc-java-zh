  引言


  当你学习像 C++、Java、Python 或 C#这样的常见编程语言时，你会注意到它们在定义变量、控制（`for`/`while`）和对象方面基本上具有相同的结构。语义会发生变化，因为你不能在所有语言中使用相同的词来定义类或变量，但概念不会改变，因此对于任何开发者来说，学习另一种语言都很容易。这几乎就像拥有一张思维导图，让你能够利用现有知识以不同的方式做事。Scala
  也不例外地遵循了这张思维导图和这些常见结构。这种语言的主要区别在于它同时支持函数式和面向对象编程范式。理解两者可以共存于同一种语言中，对一些开发者来说是最困难的部分。见图
  1。


  ![../images/328789_3_En_BookFrontmatter_Figf_HTML.png](img/328789_3_En_BookFrontmatter_Figf_HTML.png)


  图 1


  语法差异


  Scala 不仅仅是另一种试图以不同方式做同样事情的语言。这种语言的精神或哲学是保持代码的简洁和清晰。如果你一开始不理解，不要感到沮丧。大多数来自其他语言的开发者都需要时间来适应，因为它不像
  Java、Python 或 C#这样的流行语言。Scala 并非针对特定情况。特别是，你可以用它来创建不同的东西，比如库或应用程序（Web 或微服务），以及使用
  Akka 进行数据流处理。当你在 Scala 方面经验不多，但在其他语言开发应用程序方面有经验时，一个友好的方法是创建一个小型项目来与其他组件交互。通过这种方式，你可以逐步提升你的
  Scala 技能。见图 2。


  ![../images/328789_3_En_BookFrontmatter_Figg_HTML.jpg](img/328789_3_En_BookFrontmatter_Figg_HTML.jpg)


  图 2


  应用程序


  有一些用于解决系统特定问题的外部工具是用 Scala 开发的，但你可以在一些 Java 应用程序中使用它们。以下是其中一些工具：


  *   [Gatling](https://gatling.io/) 是一个用于进行负载测试的开源工具。该工具可作为 JMeter 的替代品，其优点之一是你可以创建可在流水线测试步骤中运行的测试。


  *   [Akka](https://akka.io/) 是一个简化并发和分布式应用程序构建的运行时工具包。


  ## 本书面向的读者


  本书面向具有任何语言编程背景、希望进一步了解函数式编程特别是 Scala 优势的读者。请考虑到，如果你有其他语言的经验，该语言与 Scala 之间的差异并非微不足道；你不能简单地将语法从一种语言翻译到另一种语言。你需要理解一些在
  Java、C#或 C++等语言中并不相同的概念。


  此外，本书还更新了一些 Scala 开发者从先前版本中获得的知识，因为 Scala 3 引入了许多来自 Scala 2 的额外特性和变更。


  ## 先决条件


  你的机器上应安装 Java JDK 11 或更高版本，以及 Scala 3.0.0 或更高版本。Scala 3.0.0 可与 Java JDK 8 配合使用，但未来版本可能不再支持（不过，没有具体的时间表）。Martin
  Odersky 在 2020 年 Scala Days 会议上表示，他建议使用最新的 LTS Java 版本，即 11。


  ## 本书结构


  本书分为四个部分：


  *   第一部分（第 1 章至第 3 章）为你提供 Scala 语法的基本理解。


  *   第二部分（第 4 章至第 8 章）简要介绍一些关键特性，如函数、模式匹配、集合和特质。


  *   第三部分（第 9 章至第 10 章）简要概述 Java 与 Scala 之间的互操作性。


  *   第四部分（第 11 章至第 14 章）演示如何使用像 SBT 这样的构建工具来创建应用程序（Web 或 REST）、最佳实践以及如何测试你的代码。


  ## 源代码


  你可以从 `github.com/apress/beginning-scala-3` 下载本书中使用的所有源代码。


