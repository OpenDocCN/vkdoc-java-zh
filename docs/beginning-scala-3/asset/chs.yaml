  \ 目录下的 `java` 目录中。此外，你还可以拥有包含 Scala 或 Java 测试的文件夹，以及包含项目资源的另一个文件夹，如下所示：\n\n```\n\
  ./\n├── build.sbt\n├── project\n│   ├── build.properties\n│   └── target\n├── src\n\
