  \ Scala 中，面向对象编程的概念体现在四种具体事物中：\n\n*   **类**：你可以将类视为一个蓝图，它包含方法和属性，但不引用任何内存位置，因此你不能用它来存储任何值或执行任何方法。使用它的唯一方法是创建每个类的实例，这个实例被称为对象。\n\
