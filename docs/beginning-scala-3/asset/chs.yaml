  `scala.collections` 包中的所有类型在 Scala 库中根据实现是不可变还是可变，以不同的方式实现。为了保持这些不同实现的分离，存在名为 `scala.collection.immutable`
  和 `scala.collection.mutable` 的包。


  #### 序列


  序列按特定顺序存储多个不同的值。由于元素是有序的，你可以询问第一个元素、第二个元素，依此类推。


  如图 6-1 所示，序列分为两个主要类别：索引序列和线性序列。默认情况下，`Seq` 创建一个 `List`，如下所示：


  ```

  scala> val x = Seq(1,2,3)

  val x: Seq[Int] = List(1, 2, 3)

  ```


  默认情况下，`IndexedSeq` 创建一个 `Vector`，如下所示：


  ```

  scala> val x = IndexedSeq(1,2,3)

  val x: IndexedSeq[Int] = Vector(1, 2, 3)

  ```


  此类集合包含表 6-3 中列出的默认方法。


  表 6-3


  序列的常用方法


  | 方法 | 描述 | 示例 |

  | --- | --- | --- |

  | `head` | 返回集合的第一个元素 | `scala> x.head                                                        val
  res48: Int = 1` |

  | `tail` | 返回一个包含除第一个元素外所有元素的可迭代对象 | `scala> x.tailval res50: Seq[Int] = List(2,
  3)` |

  | `isEmpty` | 返回一个布尔表达式，当 `Set` 为空时值为 true | `scala> x.isEmpty                                                         val
  res47: Boolean = false` |

  | `contains` | 返回一个布尔表达式，当元素存在于集合中时值为 true | `scala> x.contains(2)                                                           val
  res53: Boolean = true` |

  | `length` | 返回一个 `Int`，表示集合中包含的元素数量 | `scala> x.lengthval res52: Int = 3` |

  | `reverse` | 返回一个元素顺序相反的新集合 | `scala> x.reverseval res51: Seq[Int] = List(3, 2,
  1)` |


  #### 集合


  Scala 的 `Set` 是一个包含唯一元素的集合。常见的 `Set` 类如图 6-1 所示。默认情况下，`Set` 创建一个不可变的 `Set`，如下所示：


  ```

  scala> val x = Set(1,2,3)

  val x: Set[Int] = Set(1, 2, 3)

  ```


  注意


  虽然 `collection.immutable` 包在 Scala 中会自动添加到当前命名空间，但 `collection.mutable` 包不会。


