  \n另一种理解特质的方式是将其视为 Java 中 `interface` 的等价物：\n\n*   **枚举**：枚举是 Scala 3 中的一个新特性。它们帮助你定义/重用具有某些共同元素或值的常量，例如一个人的性别（男性、女性、其他）或航班类型（单程或往返）。当你希望类中包含某些信息，但又不想让任何人输入错误的值时，这种结构类型非常有用。枚举有助于减少可能出现的问题，并提供一种在代码不同部分重用常量的方法。\n\
  \n```\npublic interface AbstractLight {\nvoid turnOn();\n}\n```\n\n```\nscala> enum\
  \ LightType:\n|   case Big, Medium, Small\n// defined class LightType\n```\n\n这个主题将在第\
  \ 6 章中更详细地介绍，届时你将看到枚举的所有可能应用。\n\n*   **对象**：对象是一种创建静态结构的方式，你无需实例化特定类即可访问该结构。另一种理解这个概念的方式是将其视为单例，因为这种结构只允许一个实例。\n\
  \n```\nscala> object Logger:\n|    def info(message: String) = print(s\"INFO: $message\"\
  )\nscala> Logger.info(\"test\")\nINFO: test\n```\n\n\n\n## 类\n\n正如你在上一节所读到的，类是一种蓝图，你可以在其中将特定值存储在字段/属性中，并定义方法的特定行为。使用这种类型结构的唯一限制是，你需要定义一个在\
  \ JVM 内存位置中分配的实例，以便在应用程序的各个部分中引用它。\n\n要定义一个类，你需要使用关键字 `class` 后跟名称。一个好的实践是使用驼峰命名法，这意味着名称中的每个单词的首字母都需要大写。更多信息，请查看官方文档^(²³)。此外，不要在名称的任何部分使用下划线\
  \ (_)。（这些实践与 Java 相同。）表 3-1 列出了一些不佳的名称选项。\n\n**表 3-1**\n\n**不佳的类名示例**\n\n| 类名 |\
  \ 错误还是正确？ |\n| --- | --- |\n| `_light` | 错误 |\n| `Light` | 错误 |\n| `AbstractLight`\
  \ | 正确 |\n| `abstract_light` | 错误 |\n| `Abstractlight` | 错误 |\n\n现在是时候创建你的第一个类了。在这个例子中，创建一个没有任何内部逻辑的类。\n\
  \n```\nscala> class Book //定义一个只有构造函数的空类\n// defined class Book\n```\n\n查看创建类时发生的情况的一个好方法是反编译它。为此，创建一个名为\
  \ `Book.scala` 的文件，并将类的声明放入其中。之后，使用命令 `scalac Book.scala` 编译该类，编译器将创建文件 `Book.class`\
  \ ***，*** 你可以使用命令 `javap -c Book.class`*** 对其进行反编译。***\n\n```\n$ javap -c  Book.class\n\
  Compiled from \"Book.scala\"\npublic class Book {\npublic Book();\nCode:\n0: aload_0\n\
  1: invokespecial #9          // Method java/lang/Object.\"\":()V\n4: return\n```\n\
  \n如你所见，类内部没有构造函数、方法或变量，只有定义。现在你已经创建了第一个类，但你需要实例化它才能使用。有两种方法可以做到这一点，但在 Scala 3 中，第二种是最佳选择。\n\
  \n| Scala 2 | Scala 3 |\n| --- | --- |\n| `scala> val book = new Book()val book:\
  \ Book = Book@50a7c72b` | `scala> val book = Book()val book: Book = Book@50a7c72b`\
  \ |\n\n关于创建类实例的最后一点：如果你没有将新类赋值给任何变量，编译器会分配一个名称。\n\n```\nscala> Book()\nval res0:\
  \ Book = Book@bf2aa32\n```\n\n### 字段\n\n字段是一种变量类型，允许你存储与某个类实例相关的特定值。有效的类型是任何继承自\
  \ `Any` 的类型，因此你可以存储自定义对象的状态或像字符串这样的简单值。\n\n在 Scala 中声明字段的方法非常简单。你只需要指明变量类型并指定名称，同时添加变量是否可变（`var`\
  \ 或 `val`）。\n\n```\nscala> class Book():\n|   var quantity = 0\n// defined class\
  \ Book\n```\n\n在以这种方式声明变量之前，你需要考虑一些事情。如果你没有明确指示该变量具有受限访问权限，任何人都可以修改该值，你可能会失去控制。当然，很多情况下，变量可以被直接访问是合理的，但要注意还有其他选项。\n\
  \n延续前面的思路，三个访问控制修饰符为你提供了对字段的不同访问级别，如表 3-2 所示。\n\n**表 3-2**\n\n**访问控制修饰符**\n\n| *修饰符*\
  \ | *描述* | *示例* |\n| --- | --- | --- |\n| `private` | 使用此修饰符，只有类中的方法可以访问字段，但你可以创建一个自定义方法来返回值。\
  \ | `scala> class Book():   &#124;   private var quantity = 0// defined class Book`\
  \ |\n| `protected` | 使用此修饰符，只有类中的方法和继承自该类的类可以访问该值。 | `scala> class Book():   &#124;   protected\
  \ var quantity = 0// defined class Book` |\n| `public` | 任何人都可以访问和修改存储在字段中的值。 |\
  \ `scala> class Book():   &#124;   public var quantity = 0// defined class Book`\
  \ |\n| `无` | 在这种情况下，等同于 public。 | `scala> class Book():   &#124;   var quantity\
  \ = 0// defined class Book` |\n\n当你在类内部创建字段时，请使用能定义字段含义的名称，例如 *salary* 或 *quantity*。使用像\
  \ *a*、*b* 和 *aux* 这样的名称作为字段名并不是好的实践，因为其他开发者很难理解这些字段的含义，并且会降低代码的可维护性。\n\n### 构造函数\n\
  \n构造函数是一种在你实例化类的同时向类传递参数的方式。与 Java 等其他语言（构造函数出现在类体中）的主要区别在于，Scala 为你提供了在类定义中声明所有参数的优势，并且它们在内部成为构造函数。另一件需要考虑的事情是，如果类没有参数，Scala\
  \ 不会创建特定的构造函数；它会使用默认构造函数。\n\n构造函数组合了几件事，你需要理解它们的工作原理：它接受你定义的参数，在类中创建字段，用相同的名称赋值变量，并且你可以在内部添加一些逻辑。要创建一个构造函数，你需要逐个传递参数，用逗号分隔。\n\
  \n```\nscala> class Book(val name : String, val isbn : String)\n// defined class\
  \ Book\n```\n\n与上一节一样，你可以通过将这行代码保存到文件中，编译它，然后执行命令 `javap -c Book.class` * 来反编译代码。*\n\
  \n```\npublic class Book {\npublic Book(java.lang.String, java.lang.String);\nCode:\n\
  0: aload_0\n1: aload_1\n2: putfield      #12         // Field name:Ljava/lang/String;\n\
  5: aload_0\n6: aload_2\n7: putfield      #14         // Field isbn:Ljava/lang/String;\n\
  10: aload_0\n11: invokespecial #17         // Method java/lang/Object.\"\":()V\n\
  14: return\npublic java.lang.String name();\nCode:\n0: aload_0\n1: getfield    \
  \  #12                // Field name:Ljava/lang/String;\n4: areturn\npublic java.lang.String\
  \ isbn();\nCode:\n0: aload_0\n1: getfield      #14                // Field isbn:Ljava/lang/String;\n\
  4: areturn\n}\n```\n\n你可以看到，这比前几节的代码要多。这是因为 Scala 使用参数的修饰符来确定是否为每个属性创建 `set/get`\
  \ 方法。\n\n\n\n#### 字段的可见性\n\n在上一节中，你看到了在类定义中向构造函数传递参数的一个示例。Scala 使用字段修饰符来定义需要创建哪些方法。你可以在表\
  \ 3-3 中看到每个修饰符的含义。\n\n表 3-3\n\n不同的字段修饰符\n\n| 类型 | 描述 | 示例 |\n| --- | --- | --- |\n\
  | `val` | 这意味着你只能访问字段中的信息，因此 Scala 只创建 `get` 方法。 | `scala> class Book(val name :\
  \ String, val isbn : String)// defined class Book` |\n| `var` | 在这种情况下，Scala 假定任何人都可以访问和修改字段，因此它会创建\
  \ `set` 和 `get` 方法。 | `scala> class Book(var name : String, var isbn : String)//\
  \ defined class Book` |\n| `未定义` | 当你未指明字段类型时，Scala 假定没有人可以访问这些字段，只有类的方法可以访问。 |\
  \ `scala> class Book(name : String, isbn : String)// defined class Book` |\n\n这些概念和示例很棒，但你如何访问它们呢？这取决于你在构造函数中声明参数的方式。对于\
  \ `var/val` 的情况，你可以使用实例名称和参数来访问它们。\n\n```\nscala> class Book(var name : String,\
  \ var isbn : String)\nscala> val book = Book(\"ET\", \"S2323\")\nscala> print(book.name)\n\
  ET\n```\n\n唯一可以为参数赋新值的情况是当你将其声明为 `var` 时，这样 Scala 会创建一个 `set` 方法来修改存储的值。\n\n```\n\
  scala> class Book(var name : String, var isbn : String)\nscala> val book = Book(\"\
  ET\", \"S2323\")\nscala> print(book.name)\nET\nscala> book.name = \"ET II\"\nscala>\
  \ print(book.name)\nET II\n```\n\n#### 辅助构造函数\n\nScala 允许你创建额外的构造函数，在其中定义接收哪些参数，但在所有情况下，你都需要指明如何处理接收到的参数。解决这个问题的最佳方法是调用主构造函数，它接收所有参数，并为辅助构造函数未接收的参数设置默认值。\n\
  \n实现这一点的方法很简单。你需要创建一个名为 `def this` 的方法，并添加你想要的参数。\n\n```\nscala> class Book(var\
  \ name : String, var isbn : String):\n|     def this(name : String) =\n|       \
  \  this(name, \"default\")\n|\n|     def this() =\n|         this(\"\", \"default\"\
  )\n```\n\n使用辅助构造函数并不复杂。你需要创建一个类的实例，并只传递你想要的参数。Scala 会检查并调用正确的构造函数。\n\n```\nscala>\
  \ val bookOne = Book(\"ET\")\nscala> print(bookOne.isbn)\ndefault\n```\n\n#### 提供默认值\n\
  \n定义辅助构造函数是减少因未指明所有参数而可能出现问题的一种好方法，但还有一种替代方案。你可以在部分或全部参数中设置默认值，这样当有人未指定值时，Scala\
  \ 会使用默认值。这降低了出错的风险。\n\n实现起来很简单。在每个参数类型定义之后，添加 **=** 和值即可。\n\n```\nscala> class Light(val\
  \ bulb: Int = 75)\nscala> var light = Light()\nscala> print(light.bulb)\n\n```\n\
  \n#### 私有构造函数\n\n在应用程序代码中看到私有构造函数的情况非常罕见，但这是可能的。你可以将主构造函数设为私有，这样就没有人可以创建实例。这种方法有两种用途：创建一个只包含常量的类，或者与对象结合使用来创建该类的单例。实现方式很简单。只需在类名之后添加访问修饰符\
  \ `private` 即可。\n\n```\nscala> class Light private ()\nscala> val light = Light()//当你尝试实例化时会发生这种情况\n\
  1 |val light = Light()\n|            ^^^^^\n|            method apply cannot be\
  \ accessed as a member of Light.type from module class rs$line$6$.\n```\n\n### 方法\n\
  \n方法是赋予类行为的方式。当然，当你创建一个只存储值的类时，它会在幕后创建某些方法来访问信息，但这里要展示的是如何在类中创建显式方法。\n\n每个方法都以关键字\
  \ `def` 开头，后跟方法名、它接收的参数，以及可选的返回类型。\n\n```\nscala> class Light(val bulb: Int, val\
  \ status: Boolean):\n|   def isWorking() : Boolean = if bulb >0 then true else false\n\
  scala> val light = Light(75, true)\nscala> println(light.isWorking())\ntrue\n```\n\
  \n正如你在前面章节中看到的，你可以添加访问修饰符来限制访问某些方法的可能性。\n\n```\nscala> class Light(val bulb: Int,\
  \ val status: Boolean):\n|   private def isWorking() : Boolean = if bulb >0 then\
  \ true else false\nscala> val light = Light(75, true)\nscala> println(light.isWorking())\n\
  1 |println(light.isWorking())\n|        ^^^^^^^^^^^^^^^\n|        method isWorking\
  \ cannot be accessed as a member of (light : Light) from module class rs$line$15$.\n\
  ```\n\n#### 顺序\n\n关于方法和访问修饰符的顺序没有限制，但尽量将具有相同修饰符的所有方法分组到类的同一部分。这将帮助你理解哪些方法在类外部是可访问的。大多数\
  \ Java 开发者遵循的一种可行方法是：先放所有私有方法，然后是受保护的方法，最后是公有方法。\n\n#### 调用方法\n\n要在类内部调用方法，你需要使用关键字\
  \ `this`，后跟方法名和参数。这是可选的，并且在大多数情况下不是必需的，因为编译器会推断你正在调用哪个方法，但这是一个好习惯，因为它可以降低其他开发人员理解代码的复杂度。\n\
  \n```\nscala> class Light(val bulb: Int, val status: Boolean):\n|     private def\
  \ isWorking() : Boolean = if bulb >0 then true else false\n|     def turnOn() :\
  \ Unit = if this.isWorking() then print(\"Turn on the lights\") else print(\"It's\
  \ impossible to turn on the lights\")\nscala> var light = Light(75, true)\nscala>\
  \ light.turnOn()\nTurn on the lights\n```\n\n#### 重写默认方法\n\nScala 和 Java 一样，在每个类中提供了一组包含默认实现的默认方法，但在某些情况下，需要重写它们以获得特定的行为。\n\
  \n##### toString\n\n这个方法可以为你提供关于类中存在的值的一些信息，但默认情况下，大多数类只提供关于存储该类的内存位置的一些信息。\n\n\
  ```\nscala> class Light(val bulb: Int, val status: Boolean)\nscala> val light =\
  \ Light(75, true)\nval light: Light = Light@4196a44a\nscala> println(light)\nrs$line$24$Light@4196a44a\n\
  ```\n\n要获得一个能提供有价值信息的方法，你需要重写该方法。方法是添加关键字 `override` 和方法逻辑。\n\n```\nscala> class\
  \ Light(val bulb: Int, val status: Boolean):\n|   override def toString() : String\
  \ = s\"The bulb has a potency of $bulb and the status is $status\"\nscala> val light\
  \ = Light(75, true)\nscala> println(light)\nThe bulb has a potency of 75 and the\
  \ status is true\n```\n\n\n\n##### equals 方法\n\n该方法允许你比较两个不同的实例，并判断它们是否相同。该方法的默认行为是比较内存地址，因此在许多情况下这并不实用，你需要重写默认方法。你需要在方法的整个声明前加上关键字\
  \ `override`。\n\n请注意，`equal` 方法接收 `Any` 类型的参数，因此在进行正确类型的操作之前，你需要进行验证。一个很好的方法是使用\
  \ `match`。\n\n```\nscala> class Light(val bulb: Int, val status: Boolean):\n|  \
  \   override def equals(that: Any): Boolean =\n|         that match\n|         \
  \    case that: Light => that.isInstanceOf[Light] && this.bulb == that.bulb && this.status\
  \ == that.status\n|             case _ => false\n// defined class Light\n```\n\n\
  声明新的 `equals` 方法后，你可以创建该类的两个实例，并赋予相同的值，然后观察尝试比较它们时会发生什么。\n\n```\nscala> val lightOne\
  \ = Light(75, true)\nscala> val lightTwo = Light(75, true)\nscala> lightOne == lightTwo\n\
  val res0: Boolean = true\n```\n\n### 继承\n\n继承是一种常见的方式，指从另一个类或特质扩展功能。Scala 与 Java\
  \ 一样，不支持多重继承，但你可以从多个特质进行扩展。在 Java 中，你可以实现多个接口。\n\n从另一个类扩展的方式是使用关键字 `extends`，后跟类名。\n\
  \n```\nscala> class Light(val bulb: Int, val status: Boolean):\n|      protected\
  \ def isWorking() : Boolean = if bulb >0 then true else false\n|     def turnOn()\
  \ : Unit = if this.isWorking() then print(\"Turn on the back lights\") else print(\"\
  It's impossible to turn on the lights\")\nscala> class BackLight(bulb: Int, status:\
  \ Boolean) extends Light(bulb, status)\nscala> val backLight = BackLight(75, true)\n\
  scala> backLight.turnOn()\nTurn on the lights\n```\n\n正如你在前面章节中所见，你可以在子类中使用关键字 `override`\
  \ 来定义行为并重写。\n\n```\nscala> class BackLight(bulb: Int, status: Boolean) extends Light(bulb,\
  \ status):\n|     override def turnOn(): Unit = if this.isWorking() then print(\"\
  Turn on the back lights\") else print(\"It's impossible to turn on the back lights\"\
  )\nscala> val backLight = BackLight(75, true)\nscala> backLight.turnOn()\nTurn on\
  \ the back lights\n```\n\n在某些情况下，你可能想要重写整个逻辑。也许你想扩展主类的功能。在主类中调用逻辑的正确方式是使用关键字 `super`，后跟要调用的方法名。\n\
  \n```\nscala> class BackLight(bulb: Int, status: Boolean) extends Light(bulb, status):\n\
  |     override def turnOn(): Unit =\n|         super.turnOn()\n|         if this.isWorking()\
  \ then print(\"Turn on the back lights\") else print(\"It's impossible to turn on\
  \ the back lights\")\nscala> val backLight = BackLight(75, true)\nscala> backLight.turnOn()\n\
  Turn on the lights Turn on the back lights\n```\n\n### 内部类\n\nScala 和 Java 都允许你定义内部类（一个类内部的类）。与\
  \ Java 的主要区别在于，在 Scala 中，内部类可以从外部访问。类的每个实例都可以包含内部类的一个实例。例如，创建一个包含你想阅读的书籍播放列表的类。每个播放列表都有一个名称和一个书籍列表。\n\
  \n```\nscala> class Playlist(var name : String):\n|    var books : List[Book] =\
  \ Nil\n|    def addBook(book : Book) : Unit =\n|        books = book :: books\n\
  |    class Book(var name : String, var isbn : String)\nscala> val playlist = Playlist(\"\
  Horror\")\nscala> playlist.addBook(playlist.Book(\"ET\", \"sdsd\"))\nscala> print(playlist.books.size)\n\
  \n```\n\n请注意，你只能将使用同一个 `Playlist` 类实例创建的 `books` 传递给 `addBook` 方法**。** 如果你使用另一个实例，控制台上将会出现异常。\n\
  \n### 值类\n\nScala 提供了一种方法来减少当类、方法或对象接收多个参数时可能发生的问题，因为很容易在它们的顺序上犯错。你可以将值类视为一个包装器，它包含且仅包含一个参数，编译器会帮助你检查你的方法是否只接收此类型。如果你有一些\
  \ Java 经验，可以将这种类型视为 *Integer*，它是 *int* 的包装器，但增加了一些方法。\n\n以下是值类的一些示例：\n\n*   假设你有一个电话号码字符串，你需要这个字符串，但也需要能够将号码分解为国家代码、区号或号码本身。\n\
  *   假设你有一个带有前缀（“I-”）的书籍 ISBN，你需要移除这个特殊字符。\n\n让我们采用最后一个示例，并将其错误地放入 `Book` 类中，看看会发生什么。\n\
  \n```\nscala> class Book(val name : String, val isbn : String)\nscala> val book\
  \ = Book(\"ISBN\", \"NAME\")\n```\n\n如你所见，即使你犯了错误，也不会发生任何事情。现在是时候定义你的第一个值类了，它包含\
  \ ISBN 和一个移除前缀的方法。\n\n```\nscala> class ISBNumber(val isbn: String) extends AnyVal:\n\
  |     def shortNumber = isbn.replace(\"I-\", \"\")\nscala> print(ISBNumber(\"I-122345\"\
  ).shortNumber)\n\n```\n\n你有了一个值类，但还没有修改你的 `Book` 类，所以现在让我们引入修改，并尝试实例化该类并传递两个字符串。\n\
  \n```\nscala> class Book(val name : String, val isbn : ISBNumber)\nscala> val book\
  \ = Book(\"ISBN\", \"NAME\")\n1 |val book = Book(\"ISBN\", \"NAME\")\n|        \
  \                ^^^^^^\n|                        Found:    (\"NAME\" : String)\n\
  |                        Required: ISBNumber\n```\n\n当你尝试使用新定义创建类的新实例时，会出现异常，但如果你使用新类型创建它，一切正常，并且你可以访问内部方法。\n\
  \n```\nscala> val book = Book(\"NAME\", ISBNumber(\"I-TEST\"))\nscala> print(book.isbn.shortNumber)\n\
  TEST\n```\n\n创建值类时有一些限制：\n\n*   它们需要从 `AnyVal` 扩展。\n*   它们只能有一个参数，并且不能使用 `val` 声明。如果你使用\
  \ `var` 或不指定任何内容，Scala 会显示异常。\n*   你不能在内部定义内部类。\n*   你不能在类中定义变量。你只能定义可以包含变量的方法。\n\
  *   它们不能被其他类扩展。\n*   你不能定义名为 `hashcode` 或 `equals`***的方法。***\n\n\n\n## 包与导入\n\n\
  包用于将某一模块或特定类型逻辑（如数据库访问类）的所有代码集中存放。由于包名起到了区分作用，这能有效防止类名冲突。你可以这样理解这些概念：类名就像人的名字，因为可能有人与你同名；而包声明则像姓氏，因此两者的组合在每个类中都是独一无二的。\n\
  \n要实现这一点，你需要使用关键字 `package` 后跟包名。作为良好实践，不要使用下划线 (_) 或任何特殊字符。\n\n```\npackage com.behindcodeline.model\n\
  class Book(var name : String, var isbn : String)\n```\n\n你无法在 REPL 中使用此类特性，因为这是不可能的。唯一的方法是在你的\
  \ IDE 中创建一个类或文件，然后在控制台中编译它。在前面的章节中，你看到了 `@main` 注解的用法。这是测试此类特性的一个好方法。\n\n```\n@main\
  \ def main =\nval book = Book(\"ET\", \"test\")\nprintln(book.name)\n```\n\n现在，既然你可以定义包以便导入它们，就需要使用关键字\
  \ `import` 加上包的完整名称，例如 `com.behindcodeline.model.Book`***。*** 这对于你创建的类以及 Scala 或\
  \ Java 任何库中存在的类都是有效的。\n\n### 多重导入\n\n当你从同一个包中导入多个类时，有三种方式：\n\n*   导入包中的所有类。\n\n\
  ```\nimport java.util.*\n```\n\n不推荐这样做，因为其中许多类可能是不必要的。\n\n*   每行执行一个导入。\n\n```\n\
  import java.util.LinkedList\nimport java.util.Date\n```\n\n这种方法更有意义，因为你只导入需要的类，但如果同一个包中有多个类，代码看起来会不美观。\n\
  \n*   一次导入多个类。\n\n```\nimport java.util.{LinkedList, Date}\n```\n\n这是减少应用程序代码行数的最佳方式。许多开发者将这种方法称为\
  \ *导入选择子句*；它存在于一个名为 React 的 JavaScript 库中^(²⁴)。\n\n### 排除类\n\n一切看起来都很好，但假设你不想使用某个特定的类。Scala\
  \ 与 Java 不同，因为它提供了一种简单的方法来实现这一点。\n\n```\nimport java.util.{ArrayList => _}\n```\n\
  \n通过这个导入，当任何人实例化一个 `ArrayList` 类型的类时，都会收到一个错误。\n\n```\nscala> import java.util.{ArrayList\
  \ => _}\nscala> val list = ArrayList()\n1 |val list = ArrayList()\n|           ^^^^^^^^^\n\
  |           Not found: ArrayList\n```\n\n## 对象\n\n当你第一次听到“对象”这个词时，你可能认为它是类的一个实例。在\
  \ Java 或 C++ 等语言中确实如此，但在 Scala 中，它有不同的含义。你可以将对象视为类的一个实例，但它也意味着你可以创建一个带有静态方法的单例，无需创建实例即可访问这些方法。要创建一个唯一的实例，你需要使用关键字\
  \ `object`，后跟名称和内部逻辑，方式与类相同。\n\n大多数使用 Scala 2 的开发者在开始编程时使用的一个简单示例是 `main` 方法，它运行整个应用程序。\n\
  \n```\nobject MyApp extends App { //Only one instance of the application run\nprintln(\"\
  Main method\")\n}\n```\n\n### 定义单例\n\n在上一节中，你看到了一个简单的例子，但假设你想要一个包含需要在整个应用程序中使用的通用逻辑方法的对象。在\
  \ Java 中，你可以创建一个带有静态方法和私有构造函数的类，这样你就不能多次实例化，但在 Scala 中，这更简单。让我们创建一个对象，它在目录中创建一个新文件并打印一条消息。\n\
  \n```\nscala> object FileUtil:\n|     def create(directory : String, name : String)\
  \ : Unit =\n|         println(s\"File $name created in the directory $directory\"\
  )\n// defined object FileUtil\nscala> FileUtil.create(\"/test/\", \"test.txt\")\n\
  File test.txt created in the directory /test/\n```\n\n你可以看到，在定义对象后，你可以直接调用方法而无需创建实例。对象的另一个用途是创建自定义方法来解析字符串或验证字符串是否为空。\n\
  \n### 伴生对象\n\n在 Java 中，你可以拥有一个带有静态方法或属性（如常量）的类，并从类外部或内部使用它们，但在 Scala 中，不能以相同的方式实现。Scala\
  \ 提供了伴生对象作为替代方案。伴生对象是指你在同一个文件中创建一个对象和一个同名的类，并且你可以毫无问题地引用同一个名称，编译器不会报错。\n\n要了解此特性如何工作，首先创建一个名为\
  \ `Book.scala` 的文件，并输入以下代码：\n\n```\nclass Book(val name : String, val isbn : String)\n\
  object Book:\nval PREFFIX = \"I-\"\n```\n\n之后，你可以创建一个包含 `main` 方法的新文件，或者使用 REPL，但首先你需要在控制台中编译该文件，然后使用\
  \ `:load` 将其导入 REPL。\n\n```\nscala> :load Book.scala\n// defined class Book\n//\
  \ defined object Book\nscala> val book = Book(\"ET\", Book.PREFFIX + \"Test\")\n\
  scala> print(book.isbn)\nI-Test\n```\n\n关于伴生对象，重要的一点是，对象和类都可以直接访问私有字段或方法，没有任何限制，因为编译器将它们视为一个整体。然而，其他类或对象不能访问这些私有方法或字段。\n\
  \n### 静态工厂\n\n如果你希望将某个类的创建集中在一个地方，最好的方法是将构造函数设为 `private`，并在对象中创建一个特定的方法，该方法接收一些参数，调用私有构造函数，并返回该类的新实例。\n\
  \n此类特性的一种可能用途是在创建实例之前验证参数，如果出现问题则返回异常。\n\n```\nclass Book private (val name : String,\
  \ val isbn : String)\nobject Book:\nval PREFFIX = \"I-\"\ndef apply(name : String,\
  \ isbn : String) = new Book(name, isbn)\n```\n\n要使用这种实例化类的新方式，你需要执行以下操作：\n\n```\n\
  scala> :load Book.scala\n// defined class Book\n// defined object Book\nscala> val\
  \ book = Book.apply(\"name\", \"isbn\")\nval book: Book = Book@4fa5cc73\n```\n\n\
  \n\n## 不透明类型\n\nScala 3 提供了一项名为不透明类型的新特性。它允许你在没有任何额外开销的情况下创建某种类型的抽象。这意味着你可以创建一个从外部看起来像新类型的类型。你可以将此类型用作方法或\
  \ `if/else` 条件中的参数。\n\n此特性与值类类似。主要区别在于，你可以在内部使用不透明类型或真实类型。你可以在类或对象中创建不透明类型，但如果你在对象内部创建它，则可以在代码的任何部分使用或引用它，因为你可以利用该对象；而在类的情况下，只有在实例化该类时才能看到不透明类型。\n\
  \n要查看此特性的实际应用，请创建一个包含领域 ID 的对象，以及一个将通用类型转换为不透明类型的方法。\n\n```\nobject DomainIds:\n\
  opaque type BookId = Int\nobject BookId:\ndef apply(id: Int): BookId = id\n```\n\
  \n在这个例子中，`apply` 方法像类的“构造器”一样执行，因此你可以调用 `BookId` 并传入一个数字，然后返回一个包含该值的不透明类型。要使用此不透明类型，你可以创建一个\
  \ `main` 方法并导入所有领域 ID。\n\n```\n@main def main =\n//导入领域对象。\nimport DomainIds._\n\
  val bookId = BookId(1)\nprint(bookId)\n```\n\n一切看起来都很好，但如果你想提取这个 `BookId` 的值会发生什么？默认情况下，你没有任何方法，但你可以修改代码以包含一个扩展，该扩展接收一个\
  \ `BookId` 并返回 `Int`***。***\n\n```\nobject DomainIds:\nopaque type BookId = Int\n\
  object BookId:\ndef apply(id: Int): BookId = id\nextension (bookId: BookId)\ndef\
  \ value: Int = bookId\n```\n\n现在修改 `main` 方法来比较元素并打印结果。\n\n```\n@main def main =\n\
  //导入领域对象。\nimport DomainIds._\nval bookId = BookId(1)\nprint(bookId.value == 1)\n\
  ```\n\n你也可以在类内部定义它，并将其用作返回类型。这种特殊用法被称为不透明类型成员。以下示例展示了如何实现它：\n\n```\nclass Book (val\
  \ name : String, val isbn : String)\nclass BookService:\nopaque type BookId = Int\n\
  def getIdByName(name: String) : BookId = 1\n```\n\n要运行此示例，请使用命令 `load` 来访问这些出现在一个文件中的新类型。\n\
  \n```\nscala> :load MyApp.scala\nscala> val bookService = BookService()\nscala>\
  \ bookService.getIdByName(\"sad\")\nval res0: bookService.BookId = 1\n```\n\n以下是使用不透明类型的主要注意事项：\n\
  \n*   它们提供了一种定义新类型的简单方法。\n\n*   它们不支持模式匹配。\n\n*   它们没有实现默认方法，例如 `equals`、`hashcode`\
  \ 和 `toString`。\n\n## 导出子句\n\n导出子句出现在 Scala 3 中，它允许你将另一个类或对象内部的方法暴露为另一个类或对象的一部分。有时你有一个包含另一个类的类，例如类的组合，如果你想暴露一个方法或类，你需要创建一个特定的方法。通过这种方法，你可以为某些方法创建某种形式的继承。\n\
  \n在以下示例中，`BookService` 拥有一个仓库实例，用于获取图书信息。\n\n```\nclass Book (val name : String,\
  \ val isbn : String)\nclass BookRepository:\ndef getBook() = new Book(\"test\",\
  \ \"test\")\nclass BookService:\nprivate val bookRepository = new BookRepository()\n\
  export bookRepository.getBook //使用 export 来暴露方法\n```\n\n如你所见，如果你想暴露仓库的一个方法，你需要创建一个特定的方法。但是，你可以在服务中使用导出子句，这样对于外部世界来说，`getBook`\
  \ 方法就像是 `BookService` 的一部分。请注意，你并非在所有情况下都需要创建仓库的实例。还有其他机制可以安全地实例化，但对于这个示例来说，它运行良好。要检查一切是否正常，你可以创建一个\
  \ `main` 方法并调用 `getBook` 方法。\n\n```\n@main def main =\nval bookService = BookService()\n\
  val book = bookService.getBook()\nprint(book.name)\n```\n\n创建导出子句时需要考虑一些规则：\n\n\
  *   所有导出都是最终的，因此任何子类型都不能覆盖该逻辑。\n\n*   你不能暴露构造器。\n\n*   你可以排除某些方法，因此如果仓库有一个 `apply`\
  \ 方法并且你想要排除它，你需要将实际行改为 `export bookRepository.{*, apply => _}.`\n\n## 总结\n\n在本章中，你了解了\
  \ OOP 和 Scala 的不同方面如何降低代码复杂性或提高性能。这些概念中的大多数都以某种方式与下一章相关联，下一章将描述函数式编程的不同方面。以下是本章的重点：\n\
  \n*   在 OOP 中，你需要遵循四个原则：抽象、封装、继承和多态。\n\n*   OOP 有一个结构来表示其原则：类、枚举、特质和对象。\n\n*   类是表示问题真实解决方案模型的结构，并包含所有逻辑，包括方法和字段。\n\
  \n*   包以某种方式分隔或分组类、枚举和特质，这有助于防止名称冲突。\n\n*   不透明类型提供了一种简单创建新类型的方法，并降低了代码可能的复杂性。\n\
  \n*   导出子句允许你将存在于另一个类中的方法暴露为当前类的一部分。\n\n*   对象是某种只有单个实例（如单例）的表示。你可以使用对象来包含解析字符串或创建数据库连接的方法。\n\
  \n脚注 1   2\n\n"
- "# 4. 函数式编程\n\n在纪实作品《密西西比河上的旧时光》中，马克·吐温写道：“我 14 岁时，觉得父亲无知得令人难以忍受，简直不想让这个老家伙在身边。但当我\
  \ 21 岁时，我惊讶地发现，这个老家伙在七年里学到了多少东西。”函数式编程就像是这位老父亲，在编写健壮的并发软件时前来救场。函数式编程将计算视为数学函数的求值，并避免状态和可变数据。它是一种声明式编程范式，其中编程是通过表达式完成的。命令式编程风格强调一系列操作，其特点是使用循环进行迭代、就地修改数据以及带有副作用的方法，其中副作用的顺序对于产生正确效果至关重要。命令式语言（如\
  \ Java）中的基本构造是改变程序状态的命令式语句，如下所示：\n\n```\nx = x + 1\n```\n\n函数式编程风格强调结果，其特点是将函数值传递给循环方法、不可变数据以及无副作用的方法，其中操作发生的顺序无关紧要。在像\
  \ Scala 这样的函数式语言中，基本构造是声明式的，如下所示，并且没有副作用：\n\n```\nf(int x){return x + 1}\n```\n\n\
  在函数式语言中，计算主要通过求值表达式进行。作为一种支持函数式编程的语言，Scala 鼓励面向表达式的编程（EOP）模型。\n\nScala 的创造者 Martin\
  \ Odersky 说过，该语言的本质是在类型化环境中融合函数式编程和面向对象编程：用函数处理逻辑，用对象处理模块化。因此，你需要理解这两种范式才能充分利用这种语言的全部能力。\n\
  \n\n\n## 什么是函数式编程？\n\n当人们初次接触*函数式编程*这个术语时，可能会认为它是最近才出现的新事物，但事实上，一些语言在过去就已经实现了这一理念。如今，这些语言大多已不再流行。\n\
  \n早期函数式语言的一个例子是 Lisp，它诞生于 1958 年。另一个例子是 Haskell，出现于 1990 年。这些语言在学术领域非常流行，但大多数开发者在职业生涯中并未使用它们。这并不意味着这种范式不好或难以理解。有时，某些语言或范式会在不同的时代找到新的重要性。想象一下，如果有人在\
  \ 20 世纪 90 年代要求你使用 JavaScript 构建整个应用的后端，你可能会觉得那个人疯了，因为当时的 JavaScript 仅用于在 HTML 中执行某些验证或特效。而今天，JavaScript\
  \ 已被广泛应用于多个平台，借助 NodeJs^(²⁵) 和其他技术来创建微服务。\n\n为了回答本节标题提出的问题，关于这种范式有许多定义，但其中一种定义以简单的方式概括了整个理念：\n\
  \n> *函数式代码的特点只有一个：没有副作用。它不依赖当前函数外部的数据，也不会改变当前函数外部的数据。所有其他“函数式”的特性都可以从这个属性推导出来。请将其作为你学习过程中的指引。*\n\
  > \n> 玛丽·罗斯·库克\n\n另一位撰写过多本函数式编程书籍的作者说道：\n\n> *函数式编程是一种仅使用纯函数和不可变值来编写软件应用程序的方式。*\n\
  > \n> 阿尔文·亚历山大\n\n这两个定义有共同之处。它们都提到了不可变性的重要性，因为它消除了协调并发或共享访问某些变量所带来的所有问题。当然，你可以使用关键字\
  \ `var` 创建变量，但这种范式的本质或精神是在函数内部使用不可变值。当你向函数传递参数时，你不能改变其内部的值，这遵循了不可变性的原则。相反，你需要创建一个新变量并返回该值。\n\
  \n为了通过示例理解不可变性，让我们创建一个函数，用于移除字符串中的前缀。首先，尝试将操作的结果重新赋值给同一个变量，看看会发生什么。\n\n```\nscala>\
  \ def removePreffix(name : String) =\n|     name = name.replace('T', ' ')\n|\n2\
  \ |    name = name.replace('T', ' ')\n|    ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^\n|    Reassignment\
  \ to val name\n```\n\n遵循不可变性原则的正确方式如下：\n\n```\nscala> def removePreffix(name : String)\
  \ =\n|     name.replace('T', ' ')\ndef removePreffix(name: String): String\n```\n\
  \n这意味着该函数接收一个字符串，替换前缀，并返回一个新值，而不改变原始参数的值。\n\n### 纯函数\n\n在数学中，函数都是纯的，因为它们没有副作用。考虑经典的函数\
  \ `(x)`：\n\n```\ny = sin(x)\n```\n\n无论 `sin(x)` 被调用多少次，`sin(x)` 都不会修改变量的状态。这样的函数被称为纯函数，并且与上下文无关。\n\
  \n有时，你的函数不仅仅执行数学运算，因此以下是创建纯函数的规则：\n\n*   它们是不修改参数值的函数；相反，它们会返回一个包含结果的新值。\n*   它们是不修改应用程序上下文的函数。\n\
  *   它们仅依赖于函数接收的参数。它们不会访问外部资源，例如数据库、文件或通过网络访问的其他应用程序。\n\n### 副作用\n\n根据纯函数的定义，副作用指的是函数执行不会影响应用程序的其他部分或外部资源（如数据库）这一概念。想象一下，你有一个函数，根据它接收的参数，可能会抛出异常或调用另一个非纯函数。这些都是可能影响应用程序某些部分的副作用的例子。\n\
  \n### 引用透明性\n\n如果一个表达式可以用其结果值替换，而不改变程序的行为，无论该表达式在程序中的何处使用，那么这个表达式就是引用透明的。例如，你可以将两个不可变变量\
  \ `x` 和 `y` 的表达式赋值给第三个变量 `z`，如下所示：\n\n```\nval z = x + y\n```\n\n因此，在程序的给定作用域内，任何使用表达式\
  \ `x + y` 的地方，你都可以在该作用域内用 `z` 替换它，而不会影响程序的结果。如前所述，函数式编程为你思考并发问题提供了正确的基础。这个基础的三个基石是引用透明性、高阶函数和不可变值。理解这些关键要素对于理解函数式编程至关重要。在函数式编程中，一个具有一个或多个输入参数的纯函数不会改变输入参数，并且对于相同的输入总是返回相同的值。\n\
  \n注意\n\n纯函数是引用透明的，并且没有副作用。\n\n纯函数没有副作用。然而，一个从不引起副作用的函数将毫无用处。一个不允许副作用存在的语言也将毫无用处，因为输入和输出本质上就是副作用的产物。\n\
  \n我们已经介绍了足够的理论，让你可以开始探索 Scala 函数。在第 2 章中，你学习了 Scala 函数的基本语法，以及如何声明、定义和调用函数。在继续学习本章后续内容之前，我们建议你快速浏览一下第\
  \ 2 章中介绍的 Scala 函数。\n\n现在，我们将开始学习 Scala 中的一个基本函数式结构：函数字面量。\n\n\n\n## 面向表达式的编程\n\n\
  在面向表达式的编程中，每条语句都是一个表达式。要理解 EOP，你必须先理解语句和表达式之间的区别。语句会执行代码，但不返回任何值，例如：\n\n```\ncustomer.computeDiscount()\n\
  ```\n\n表达式会返回一个值。表达式是能够求值为一个值的代码块。\n\n```\nval discount = computeDiscount(customer)\n\
  ```\n\n注意\n\n面向表达式的编程语言是一种编程语言，其中每个结构都是表达式，因此都能求值为一个值。\n\n在 Scala 中，以下表达式会返回一个结果：\n\
  \n```\nscala> 2 + 2\nres0: Int = 4\n```\n\n面向表达式编程的优势在 `if/else` 表达式中更为明显，它在 Scala\
  \ 中也会返回一个值。\n\n```\nval test = if (3 > 2) \"true\" else \"false\"\n```\n\n这个 `if`\
  \ 子句检查一个条件表达式，并根据条件表达式的值返回一个或另一个表达式。Java 中的 `if` 块不会求值出一个值。与 Scala 相反，此处展示的代码在 Java\
  \ 中是非法的，因为 Java 中的 `if` 子句是一个语句，而不是一个表达式。\n\n```\nboolean test = if (3 > 2) \"true\"\
  \ else \"false\"\n```\n\n要实现在 Scala `if` 子句中展示的相同效果，你必须在 Java 中使用 `?:` 语法，如下所示：\n\
  \n```\nboolean test = 3 > 2 ? true : false ;\n```\n\n在 Java 中，`if` 和 `?:` 之间存在区别，`if`\
  \ 是一个语句，而 `?:` 是一个表达式。Scala 中的 `if` 子句更像 Java 中的 `?:`，而不是 Java 中的 `if` 子句。Scala\
  \ 将 `?:` 的概念与其 `if` 块统一了起来，因此 Scala 没有 `?:` 语法。\n\n注意\n\n如前所述，Scala 中的每个结构都是表达式，其中操作执行的顺序无关紧要，因此这些表达式可以按任意顺序执行。这个简单的概念对多核编程中的并发有着深远的影响，因为你可以并行执行表达式。\n\
  \n## 函数、Lambda 和闭包\n\n其中一些术语在 Scala 的早期版本中并不存在，或者在此版本中含义发生了变化，因此在深入探讨之前，你需要理解每个术语的基本概念。\n\
  \n*   **函数**：此操作可以有一个名称，其代码在被人调用之前不会被执行。此操作可能有变量，也可能没有。以下是一个计算面积的函数示例：\n\n*   **Lambda**：这是一个匿名函数，在定义中可能有变量，也可能没有。\n\
  \n```\nscala> def calculateArea(height: Int, width: Int) = height*width\ndef calculateArea(height:\
  \ Int, width: Int): Int\n```\n\n```\n(height: Int, width: Int) => height*width\n\
  ```\n\n像 Java 或 Python 这样的语言使用术语 *lambda 函数*，但在 Scala 中，大多数开发者使用术语 *匿名函数* 或 *函数字面量*\
  \ 来描述 lambda 的概念。\n\n*   **闭包**：这是一个函数，可以是匿名的或命名的，它使用一个或多个自由变量来返回一个新值。自由变量的概念是指变量存在于函数的作用域内，而不必作为参数传递给函数。\n\
  \n```\nscala> var count = 0\nscala> val incrementCount = (number:Int) => count +\
  \ number\nscala> incrementCount(1)\nval res1: Int = 1\n```\n\n### 函数字面量/匿名函数\n\n\
  字面量是表达式的最简单形式。字面量是在源代码中表示固定值的一种表示法。几乎所有编程语言都有表示原子值的表示法，例如整数、浮点数、字符串等。字面量通常用于初始化变量。在下面的例子中，1\
  \ 是一个整数字面量：\n\n```\nint x = 1;\n```\n\nScala 允许你将函数表示为字面量。函数字面量允许你以简短的形式编写函数类型的表达式，而无需为其声明名称。函数类型可以是以下之一：\n\
  \n*   可以分配函数的变量或参数的类型\n*   高阶函数的参数（你将在第 10 章中详细了解），该参数接受一个函数参数\n*   返回函数的高阶函数的结果类型\n\
  \n函数字面量的语法以括号括起来的、逗号分隔的参数列表开始，后跟一个箭头和函数体。函数字面量也称为*匿名函数*，即使用函数字面量语法指定的没有名称的函数。考虑一个\
  \ `add` 函数：\n\n```\nval add = (x: Int, y: Int) => x + y\n```\n\n使用函数字面量，你可以像这样定义\
  \ `add` 函数：\n\n```\n(x: Int, y: Int) => x + y\n```\n\n函数字面量被实例化为一个称为函数值的对象。函数值是一个函数对象，你可以像调用任何其他函数一样调用该函数对象。函数对象扩展了某个\
  \ FunctionN 特质，例如 Function0、Function1，一直到 Function22。根据函数中参数的数量，编译器会选择相应的 FunctionN\
  \ 特质。对于有两个参数的函数，编译器会选择 Function2 作为底层类型。对于有三个参数的函数，编译器会选择 Function3；对于有四个参数的函数，选择\
  \ Function4；依此类推。\n\n因为函数值是一个对象，它可以存储在变量中，并且可以在函数调用中使用括号来调用它，如下所示：\n\n```\nscala>\
  \ val add = (a: Int, b: Int) => a + b\nadd: (Int, Int) => Int = \nscala> add(1,\
  \ 2)\nres0: Int = 3\n```\n\n此函数的调用被转换为对分配给该变量的函数类实例的 apply 方法的调用。\n\n从这类函数字面量中，Scala\
  \ 编译器会生成一个混合了某个 FunctionN 特质的函数对象。因此，`=>` 的左侧成为参数列表，右侧成为 apply 方法的实现。你在 Scala 中定义的每个函数都成为一个实现了某个特定\
  \ FunctionN 特质（范围从 Function1 到 Function22）的实例。\n\n现在，为了更深入地了解 Function 特质，你首先编写一个计算矩形面积的函数，如下所示：\n\
  \n```\nval areaOfRectangle:(Int, Int) => Int = (width:Int, height:Int) => width*height\n\
  ```\n\n当你在 REPL 中运行此函数时，你会看到编译器为此函数选择并选定了 Function2 特质。为什么？因为这个函数有两个参数。\n\n```\n\
  scala> val areaOfRectangle:(Int, Int) => Int = (width:Int, height:Int) => width*height\n\
  areaOfRectangle: (Int, Int) => Int = = Lambda$1475/0x0000000801215040@712594f4\n\
  ```\n\n你可以像这样调用此函数：\n\n```\nscala> areaOfRectangle(5,3)\nres0: Int = 15\n```\n\n\
  现在，让我们看看 Scala 中的特质。Scala 包中的 Function2 看起来像这样：\n\n```\ntrait Function2[-T1, -T2,\
  \ +R] extends AnyRef {\n...\nabstract def apply( v1 :T1, v2 :T2 ) : R\n...\n}\n\
  ```\n\n这里只展示了 `apply` 方法。`apply` 方法中的两个类型参数 `T1` 和 `T2` 接受参数的类型，而类型参数 `R` 表示函数的返回类型。\n\
  \n\n\n对于你在 Scala 中定义的每个函数，编译器都会生成一个对应 Function 特质的实例，其类型参数会根据函数的参数类型和返回类型进行参数化。\n\
  \n在之前定义的 `areaOfRectangle` 函数中，`areaOfRectangle` 函数的类型是：\n\n```\n(Int, Int) => Int\n\
  ```\n\n这与下面展示的写法相同：\n\n```\nFunction2[Int,Int,Int]\n```\n\n因此，你也可以这样定义你的 add 函数：\n\
  \n```\nval areaOfRectangle: Function2[Int,Int,Int] = (width:Int, height:Int) =>\
  \ { width*height }\n```\n\n你可以在 REPL 中测试，如下所示：\n\n```\nscala> val areaOfRectangle:\
  \ Function2[Int,Int,Int] = (width:Int, height:Int) => { width*height }\nval areaOfRectangle:\
  \ (Int, Int) => Int = Lambda$1502/0x0000000801228040@61c0fb12\n```\n\n现在，你可以显式调用\
  \ `apply` 方法来作用于给定的函数，如下所示：\n\n```\nareaOfRectangle.apply(5,3)\n```\n\n你可以在 REPL\
  \ 中测试，如下所示：\n\n```\nscala> val area = areaOfRectangle.apply(5,3)\narea: Int = 15\n\
  ```\n\n你可以更进一步，通过实现一个合适的 Function 特质并定义其所需的 `apply` 方法来定义一个函数。让我们为 `areaOfRectangle`\
  \ 函数实现这一点：\n\n```\nval areaOfRectangle :(Int, Int) => Int = new Function2[Int, Int,\
  \ Int]{\ndef apply(width:Int, height:Int):Int = width*height\n}\n```\n\n你可以在 REPL\
  \ 中测试，如下所示：\n\n```\nscala> areaOfRectangle(5,3)\nres18: Int = 15\n```\n\n现在你已经学习了函数值和函数类型，接下来你将看到如何使用函数字面量将其传递给接受函数的方法或将其赋值给变量。我们将在下一节详细讨论这一点。\n\
  \n### 一等函数与高阶函数\n\nScala 能够将函数式范式与面向对象范式完美融合的关键因素之一，就是函数也是对象。在函数式编程中，函数是一等公民。一等函数可以：\n\
  \n1.  赋值给变量，\n2.  作为参数传递给其他函数，\n3.  作为值从其他函数返回。\n\n第 2 点中强调的接受函数作为参数的函数，以及第 3 点中强调的返回函数的函数，被称为**高阶函数**。在接下来的章节中，你将学习一等函数的全部三个方面。\n\
  \n注意\n\n在函数式编程中，函数是一等公民，这意味着函数可以赋值给变量，可以传递给其他函数，也可以作为值从其他函数返回。而这类接受函数作为参数或返回函数的函数，被称为高阶函数。\n\
  \n#### 函数作为变量\n\n就像在面向对象编程中传递字符串、整数和其他变量一样，你也可以像传递变量一样传递函数。你可以像上一节那样定义一个函数字面量，然后将其赋值给一个变量。以下代码定义了一个函数字面量，它接受一个\
  \ `Int` 参数，并返回该 `Int` 的两倍值：\n\n```\n(i: Int) => { i * 2 }\n```\n\n现在你可以将该函数字面量赋值给一个变量。\n\
  \n```\nscala> val doubler = (i: Int) => { i * 2 }\nval doubler: Int => Int = Lambda$1503/0x0000000801229040@689eab53\n\
  ```\n\n变量 `doubler` 是一个函数实例，被称为函数值。现在你可以像下面这样调用 `doubler`：\n\n```\nscala> doubler(2)\n\
  res25: Int = 4\n```\n\n在底层，`doubler` 是 Function1 特质的一个实例，该特质定义了一个接受一个参数的函数。在实现层面，`doubler`\
  \ 是使用关键字 `val` 创建并赋值给变量的函数。要将 `doubler` 定义为方法而非函数，你必须在类中定义 `doubler` 方法，并使用关键字 `def`\
  \ 来定义方法。\n\n除了调用 `doubler`，你还可以将其传递给任何接受函数参数的函数（或方法）。我们将在下一节讨论这一点。\n\n#### 函数作为参数\n\
  \n你可以创建一个接受函数作为参数的函数或方法。为此，首先定义一个接受函数作为参数的方法。\n\n```\nscala> def operation(functionparam:(Int,\
  \ Int) => Int) =  println(functionparam(4,4))\ndef operation(functionparam: (Int,\
  \ Int) => Int): Unit\n```\n\n`operation` 方法接受一个名为 `functionparam` 的参数，该参数是一个函数。`functionparam`\
  \ 函数接受两个 `Int` 并返回一个 `Int`。`operation` 方法返回 `Unit`，表示该方法不返回任何值。\n\n接下来，定义一个与预期签名匹配的函数。下面的\
  \ `add` 函数匹配该签名，因为它接受两个 `Int` 参数并返回一个 `Int`：\n\n```\nval add = (x: Int, y:Int) =>\
  \ { x + y }\n```\n\n现在你可以将 `add` 函数传递给 `operation` 方法。\n\n```\nscala> operation(add)\n\
  \n```\n\n任何匹配此签名的函数都可以传递给 `operation` 方法。让我们定义两个新函数，分别名为 `subtract` 和 `multiply`，它们接受两个\
  \ `Int` 并返回一个 `Int`。\n\n```\nval subtract = (x: Int, y:Int) => { x - y }\nval multiply\
  \ = (x: Int, y:Int) => { x*y }\n```\n\n现在你可以将这些函数传递给 `operation` 方法。\n\n```\nscala\
  \ > operation(subtract)\n\nscala> operation(multiply)\n\n```\n\n#### 返回函数\n\n你可以从一个函数或方法中返回一个函数。为此，首先定义一个匿名函数。以下代码声明了一个匿名函数，它接受一个\
  \ String 参数并返回一个 String：\n\n```\n(name: String) => { \"hello\" + \" \" + name }\n\
  ```\n\n现在定义一个方法，返回你刚刚定义的匿名函数。\n\n```\ndef greeting() = (name: String) => {\"hello\"\
  \ + \" \" + name}\n```\n\n在 `=` 符号的左侧，是一个普通的方法声明。\n\n```\ndef greeting()\n```\n\n\
  在 `=` 的右侧，是一个函数字面量（一个匿名函数）。\n\n```\nscala> def greeting() = (name: String) => {\"\
  hello\" + \" \" + name}\ngreeting: ()String => String\n```\n\n现在你可以将 `greeting()`\
  \ 赋值给一个变量。\n\n```\nscala>  val greet= greeting()\nval greet: String => String =\
  \ Lambda$1261/0x000000080114c840@769b0752\n```\n\n`greet` 函数现在等同于你的匿名函数 `(name:\
  \ String) => {\"hello\" + \" \" + name}`。由于匿名函数接受一个 String 参数 name，你可以向其传递一个名字。\n\
  \n```\nscala> greet(\"Reader\")\nres0: String = hello Reader\n```\n\n### 闭包\n\n\
  闭包是一个函数，其返回值依赖于在该函数外部声明的一个或多个变量的值。考虑以下 `multiplier` 函数：\n\n```\nval multiplier =\
  \ (x:Int) => x * 3\n```\n\n在 `multiplier` 函数中，`y` 是函数体中使用的变量。`x` 被定义为函数的参数。现在让我们像下面这样修改\
  \ `multiplier` 函数：\n\n```\nval multiplier = (x: Int) => x * y\n```\n\n由于 `x` 是函数的形式参数，每次调用\
  \ `multiplier` 时它都会被绑定到一个新值。然而，`y` 并不是形式参数。让我们进一步修改 `multiplier` 函数，如下所示：\n\n```\n\
  var y = 3\nval multiplier = (x: Int) => x * y\n```\n\n现在 `y` 引用了函数外部但在封闭作用域内的一个变量。\n\
  \n```\nscala> var y = 3\ny: Int = 3\nscala> val multiplier = (x: Int) => x * y\n\
  multiplier: Int => Int = \n```\n\n现在你可以像下面这样调用 `multiplier` 函数：\n\n```\nscala> multiplier(3)\n\
  res37: Int = 9\n```\n\n`multiplier` 函数引用了 `y`，并在每次调用时读取其当前值。Scala 编译器会创建一个闭包，将封闭作用域中的该变量包含进来。\n\
  \n\n\n## 部分应用函数\n\n在函数式编程语言中，当你调用一个带有参数的函数时，就称为将函数应用于这些参数。当所有参数都传递给函数时，你就将函数完全应用到了所有参数上。\n\
  \n一个简单的 `add` 函数：\n\n```\nscala> val add = (x: Int, y: Int) => x + y\nadd: (Int,\
  \ Int) => Int = \n```\n\n`<function2>` 表示这是一个有两个参数的函数。\n\n```\nscala> add(1,2)\n\
  res01: Int = 3\n```\n\n但是，当你只向函数提供一部分参数时，表达式的结果就是一个部分应用函数。\n\n```\nval partiallyAdd\
  \ = add(1, _:Int)\n```\n\n因为你没有为第二个参数提供值，所以变量 `partiallyAdd` 就是一个部分应用函数。你可以在 REPL\
  \ 中看到这一点。\n\n```\nscala> val partiallyAdd = add(1, _:Int)\npartiallyAdd: Int =>\
  \ Int = \n```\n\nREPL 的输出显示 `partiallyAdd` 是一个实现了 `Function1` 特质的函数。实现 `Function1`\
  \ 特质表明 `partiallyAdd` 函数接受一个参数。当你给 `partiallyAdd` 一个 `Int` 值 2 时，你会得到传入 `add` 和\
  \ `partiallyAdd` 函数的 `Int` 数值之和：\n\n```\nscala> partiallyAdd(2)\nres02: Int = 3\n\
  ```\n\n第一个参数 1 被传入了原始的 `add` 函数，并创建了一个名为 `partiallyAdd` 的新函数，这是一个部分应用函数。然后，第二个参数\
  \ 2 被传入了 `partiallyAdd`。当你提供所有参数时，原始函数就会被执行，从而产生结果。\n\n## 柯里化函数\n\n柯里化将一个具有多个参数的函数转换为一系列函数，每个函数只期望一个参数。\n\
  \n让我们看一个简单的 `add` 函数，它相加两个 `Int` 参数 `a` 和 `b`，如下所示：\n\n```\nscala> val add = (x:\
  \ Int, y: Int) => x + y\nadd: (Int, Int) => Int = \nscala> add(3,3)\nres38: Int\
  \ = 6\n```\n\n在 Scala 中，柯里化函数通过多个参数列表来定义，如下所示：\n\n```\ndef add(x: Int)(y: Int) =\
  \ x + y\n```\n\n你也可以使用以下语法来定义一个柯里化函数：\n\n```\ndef add(x: Int) = (y: Int) => x +\
  \ y\n```\n\n如你所见，不是使用一个包含两个 `Int` 参数的列表，而是将柯里化的 `add` 函数应用于两个各包含一个 `Int` 参数的列表。因此，柯里化的\
  \ `add` 函数看起来像这样：\n\n```\nscala> def curriedAdd(a: Int)(b: Int) = a + b\ncurriedAdd:\
  \ (a: Int)(b: Int)Int\nscala> curriedAdd(2)(2)\nres1: Int = 4\n```\n\n你可以在一个柯里化函数上定义超过两个参数。你的接受两个参数的\
  \ `add` 函数被转换成了它的柯里化等价形式。\n\n## 函数组合\n\n在函数式编程中，你可以从其他函数组合出函数，例如 `tan(x) = sin(x)/cos(x)`。可组合性的一个含义是函数可以被当作值来处理。到目前为止，你已经创建了简单的函数并操作了函数实例。然而，你也可以从其他函数构建函数。`functionalTo`\
  \ 组合为 Scala 中许多酷炫的功能提供了基础，包括解析器组合子，你将在第 8 章中探索它。但现在，让我们看看解释一系列命令与“编译”一个解释它们的函数之间的区别。首先，让我们定义语法。我们有表达式，可以是常量值或命名变量。表达式也可以是其他表达式的加法或乘法。以下是一组描述该语法的\
  \ case 类（回顾一下，我们在第 3 章中介绍了 case 类）：\n\n```\nsealed trait Expr\ncase class Add(left:\
  \ Expr, right: Expr) extends Expr\ncase class Mul(left: Expr, right: Expr) extends\
  \ Expr\ncase class Val(value: Int) extends Expr\ncase class Var(name: String) extends\
  \ Expr\n我们可以构建像 1 + 1, Add(Val(1), Val(1)), 3 * (1 + 1), Mul(Val(3),\nAdd(Val(1),\
  \ Val(1))), 以及 a * 11, Mul(Var(\"a\"), Val(11)) 这样的表达式。\n```\n\n你可以通过解释表达式来求值。\n\
  \n```\ndef calc(expr: Expr, vars: Map[String, Int]): Int = expr match {\ncase Add(left,\
  \ right) => calc(left, vars) + calc(right, vars)\ncase Mul(left, right) => calc(left,\
  \ vars) * calc(right, vars)\ncase Val(v) => v\ncase Var(name) => vars(name)\n}\n\
  ```\n\n让我们看看这个方法是如何工作的。`expr` 是要求值的表达式，`vars` 是一个包含变量的 Map。你使用模式匹配（你将在下一章中看到）来根据\
  \ case 类决定做什么。如果 `expr` 是 `Add`，你提取左右参数，它们本身也是 `Exprs`。你调用 `calc` 来计算左右参数的值并将结果相加。如果\
  \ `expr` 是 `Mul`，你执行相同的操作（只不过你是相乘而不是相加）。如果 `expr` 是 `Val`，你只需提取值并返回它。如果 `expr` 是\
  \ `Var`，你提取名称并在 `vars` Map 中查找该名称并返回。你可以将其从方法调用转换为函数。拥有一个函数允许你传递表达式所代表的逻辑。这也意味着你不必每次都解释\
  \ `Exprs` 树。让我们看看如何基于 `Expr` 组合一个函数。\n\n```\ndef buildCalc(expr: Expr): Map[String,\
  \ Int] => Int = expr match {\ncase Add(left, right) =>\nval lf = buildCalc(left)\n\
  val rf = buildCalc(right)\nm => lf(m) + rf(m)\ncase Mul(left, right) =>\nval lf\
  \ = buildCalc(left)\nval rf = buildCalc(right)\nm => lf(m) * rf(m)\ncase Val(v)\
  \ => m => v\ncase Var(name) => m => m(name)\n}\n```\n\n`buildCalc` 方法返回一个可以传递给其他函数的函数。此外，JVM\
  \ 可以优化组合后的函数，使其性能优于解释版本。组合函数的性能更好，因为与每个元素的模式匹配相关的开销不存在。该函数通过重复调用函数的 `apply` 方法来进行求值。因此，每个节点的成本是一次或两次方法分发，而不是模式匹配的成本。让我们转向函数可以帮助提高性能和可读性的其他方式。\n\
  \n\n\n## 函数错误处理\n\n当你编写遵循面向对象范式的代码时，可以使用一种机制来捕获异常并对错误进行处理。在函数式编程中，你不能返回异常，因为它遵循必须始终返回某些内容（纯函数）的理念。Scala\
  \ 提供了一些机制来解决这种情况：\n\n*   **Option/Some/None**：`Option` 与 Java 中的 `Optional` 概念相同，因此函数可以返回两种可能的值：一个整数（`Some`）或空值（`None`）。这种方法很棒，因为它减少了通过\
  \ null 进行检查的 if/else 代码块数量。\n\n以下示例接收一个字符串并尝试将其转换为 Int：\n\n```\nscala> def transformToInt(number:String)\
  \ : Option[Int] =\n|     try\n|        Some(Integer.parseInt(number))\n|     catch\n\
  |        case e: NumberFormatException => None\ndef transformToInt(number: String):\
  \ Option[Int]\n```\n\n现在看看当你向函数传递一个正确的值时会发生什么：\n\n```\nscala> transformToInt(\"\
  1\")\nval res1: Option[Int] = Some(1)\n```\n\n让我们看看如果你传入一个非数字的内容：\n\n*   **Try/Success/Failure**：这三个类与前面提到的具有相同的概念，但有一些特性，比如\
  \ `Failure` 包含导致错误的异常，而 `Try` 提供了一种简单的方法来捕获函数中所有可能的异常。\n\n```\nscala> transformToInt(\"\
  a\")\nval res0: Option[Int] = None\n```\n\n```\nscala> import scala.util.{Try, Success,\
  \ Failure}\nscala> def transformToInt(number: String): Try[Int] = Try(Integer.parseInt(number))\n\
  def makeInt(number: String): util.Try[Int]\n```\n\n现在看看当你向函数传递一个正确的值时会发生什么：\n\n\
  ```\nscala> transformToInt(\"1\")\nval res2: util.Try[Int] = Success(1)\n```\n\n\
  让我们看看如果你传入一个非数字的内容：\n\n```\nscala> transformToInt(\"s\")\nval res3: util.Try[Int]\
  \ = Failure(java.lang.NumberFormatException: For input string: \"s\")\n```\n\n##\
  \ 尾调用与尾调用优化\n\n递归函数可能会调用自身。递归在函数式编程中扮演着至关重要的角色，因为它提供了一种使用可变数据遍历数据结构的方法，因为每个函数调用都有自己的栈来存储函数参数。递归的一个经典示例可以在\
  \ `factorial` 的实现中看到，如下所示：\n\n```\nscala> def factorial(number:Int) : Int = {\n\
  |     if (number == 1)\n|        return 1\n|     number * factorial (number - 1)\n\
  | }\nfactorial: (number: Int)Int\n```\n\n你可以像这样调用这个函数：\n\n```\nscala> println(factorial(3))\n\
  \n```\n\n使用递归函数的一个相关问题是，调用递归函数次数过多会导致栈溢出错误。Scala 编译器可以使用尾递归来优化递归函数，这样递归调用就不会耗尽所有栈空间，因此不会遇到栈溢出错误。尾递归是一种特定类型的递归，当函数在其最终操作中调用自身时发生。对于经过尾递归优化的函数，递归调用不会创建新的栈，而是使用当前函数的栈。只有最后一条语句是递归调用的函数才能被\
  \ Scala 编译器优化为尾递归。\n\n接下来是使用尾调用递归计算的 `factorial` 实现。为了便于尾调用优化，Scala 提供了一个注解，用于标记一个函数以进行尾递归优化。如果一个函数被标记了尾递归函数注解，但无法进行尾递归优化，则在编译时会导致错误。要标记一个函数以进行尾递归优化，请在函数定义之前添加\
  \ `@annotation.tailrec`。\n\n现在，用 `@annotation.tailrec` 标记前面展示的 `factorial` 函数，以指示\
  \ Scala 编译器此函数必须进行尾递归优化，并且如果带注解的函数无法进行尾递归优化，编译器应将其视为错误。\n\n```\nscala> @annotation.tailrec\n\
  | def factorial(number:Int) : Int = {\n|     if (number == 1)\n|        return 1\n\
  |     number * factorial (number - 1)\n| }\n<console>:12: error: could not optimize\
  \ @tailrec annotated method factorial: it contains a recursive call not in tail\
  \ position\nnumber * factorial (number - 1)\n              ^\n```\n\n如你所见，Scala\
  \ 编译器抛出了一个错误。`factorial` 方法无法被优化，因为递归调用不是函数中的最后一条语句；factorial 调用自身，然后对结果执行乘法运算，所以实际上，乘法是函数中的最后一条语句，而不是递归调用。如果函数调用自身的结果用于除直接返回值之外的任何用途，则该函数无法进行尾递归优化。\n\
  \n标记了 `@annotation.tailrec` 的 `factorial` 方法只有在递归成为最终操作时才能成功编译。因此，你需要在调用 `factorial`\
  \ 方法之前执行乘法运算，为此你使用累加器参数来保存正在进行的计算。这个参数在递归调用之前通过乘法进行计算。这样，递归就成了最终操作。\n\n```\nscala>\
  \ @annotation.tailrec\n| def factorial(accumulator: Int, number: Int) : Int = {\n\
  |   if(number == 1)\n|     return accumulator\n|   factorial(number * accumulator,\
  \ number - 1)\n| }\nfactorial: (accumulator: Int, number: Int)Int\n```\n\n成功编译保证了该函数将使用尾递归进行优化，这样每次后续调用都不会添加新的栈帧。\n\
  \n```\nscala> println(factorial(1,3))\n\n```\n\n\n\n## 按名调用、按值调用与通用惰性求值\n\n在 Java\
  \ 程序中，当你调用一个带参数的方法时，参数的值会在方法被调用之前计算出来。因此，在\n\n```\nfoo(1 + 1, \"A String\".length());\n\
  ```\n\n中，表达式 `1 + 1` 和 `\"A String\".length()` 都会在调用 `foo` 之前被求值。这通常是你想要的行为。然而，在某些情况下，你可能希望参数被选择性地求值或重复求值。在这些情况下，Scala\
  \ 提供了按名调用机制。对于调用者来说，按名调用参数在语法上没有区别。\n\n按名调用的第一个用途是传递一个可能需要很长时间求值、但可能不会被求值的表达式。按名调用的第二个用途是，当你希望在目标方法中多次对表达式求值时，例如，你想要对一个表达式求值，直到满足某个条件为止。这个条件可以是直到表达式返回\
  \ `false`，或者直到表达式返回 `null`。\n\n按名调用的第一个例子是日志记录示例。如果消息不打算被记录，那么计算日志消息并将其丢弃的计算成本很高。这在\
  \ Java 代码中非常常见。\n\n```\nif (logger.level().intValue() >= INFO.intValue()) {\nlogger.log(INFO,\
  \ \"The value is \"+value);\n}\n```\n\n在这段代码中，你必须将对 `logger.log(INFO, \"The value\
  \ is \"+value);` 的求值决策推送到调用 `logger` 的地方。这意味着你需要将对 `logger` 的调用包装在一个 `if` 语句中。从编码的角度来看，如果只有在字符串将要被记录时才承担计算待记录字符串的成本，并且当前日志级别由\
  \ `logger` 内部的代码（而不是在调用 `logger` 的地方）知晓并测试，那会好得多。按名调用让你能够延迟对要记录的字符串的求值，仅当该字符串确实会被记录时才进行求值。\n\
  \n在 Scala 中，你可以定义一个 `log` 方法，将要记录的内容作为按名调用参数：\n\n```\ndef log(level: Level, msg:\
  \ => String) =\nif (logger.level.intValue >= level.intValue) logger.log(level, msg)\n\
  ```\n\n然后你这样调用这段代码：\n\n```\nlog(INFO, \"The value is \"+ value)\n```\n\nScala 版本将\
  \ `\"The value is \"+ value` 作为一个函数传递，该函数在 `log` 方法中每次被访问时都会求值。`log` 方法仅当日志消息将要被打印时才会访问它。你的代码更简洁，因为你不需要重复测试日志级别，但其性能与之前包含内联测试的\
  \ Java 代码一样好。要使某个参数成为按名调用，只需在类型前加上 `=>`。因此，`foo(s: String)` 是按值调用，而 `foo(s: => String)`\
  \ 是按名调用。\n\n你可能会好奇，如果创建了一个函数对象并将其传递给 `log` 方法，代码的性能如何能一样好。在 JVM 中，创建一个永远不会逃逸出当前线程且生命周期非常短的对象，其成本为零或接近于零。JVM\
  \ 也可能内联 `log` 方法，使得测试无需实际的方法调用即可执行。结果是，你的 Scala 代码运行速度将与包含重复日志级别测试的 Java 代码一样快。例如，你可以收集从一个表达式返回的所有字符串，直到遇到\
  \ `null`。\n\n```\ndef allStrings(expr: => String): List[String] = expr match {\n\
  case null => Nil\ncase s => s :: allStrings(expr)\n}\n```\n\n你可以测试这个方法。\n\n```\n\
  scala> import java.io._\nimport java.io._\nscala> val br = new BufferedReader(new\
  \ FileReader(\"foo.txt\"))\nbr: java.io.BufferedReader = jaferedReva.io.Bufader@2bfa91\n\
  scala> allStrings(br.readLine)\nres0: List[String] = List(import scala.xml._, ,\
  \ object Morg {,...)\n```\n\n每次访问按名调用参数 `expr` 时，它都会被应用。如果它被作为另一个也是按名调用的参数传递，它将被传递而不求值。在前面的代码中，你的模式匹配是针对\
  \ `expr` 的应用结果进行的。如果它是 `null`，则返回一个空列表，即 `Nil`。如果不是 `null`，则返回一个列表，该列表由当前字符串和 `allStrings(expr)`\
  \ 的结果组成。\n\n## 函数式结构\n\nScala 提供了用于解决特定问题的结构。其中一些结构也存在于其他语言中，如 Java 或 C++。本节是对每种结构含义的简要介绍，后续章节将提供更深入的讲解。\n\
  \n### 序列\n\nScala 中的序列是一个针对具有确定顺序的不同数据结构的非常通用的接口。你可以视为元素序列的一些例子包括列表、数组、向量或范围，它们包含某些方法，如\
  \ `apply`、`iterator` 和 `length`。\n\n```\nscala> val elements: Seq[Int] = Seq(1,2,3,4,5)\n\
  val elements: Seq[Int] = List(1, 2, 3, 4, 5)\n```\n\n以下是一些使用不同方法可以执行的操作示例：\n\n```\n\
  scala> println(elements.reverse) // 反转序列的顺序\nList(5, 4, 3, 2, 1)\nscala> println(elements(1))\
  \ // 获取第二个位置的值\n\nscala> println(elements.sorted) // 对所有元素进行排序\nList(1, 2, 3, 4,\
  \ 5)\n```\n\n当你使用这种类型的结构时，最坏情况下的时间复杂度是 O(N)，其中 N 是元素的数量。\n\n要向这种类型的结构添加元素，一种可能的方法是使用关键字\
  \ `var` 将变量创建为可变的。\n\n```\nvar elements: Seq[Int] = List(1, 2, 3, 4, 5)\nscala>\
  \ elements = elements.appended(6)\nelements: Seq[Int] = List(1, 2, 3, 4, 5, 6)\n\
  ```\n\n### 映射\n\n映射是用于使用键及其关联的值来保存信息的集合。你可以将键视为数据库中的索引或 ID，用于查找特定的行，而值则是与该键关联的信息。\n\
  \n```\nscala> val movies: Map[String, String] = Map()\nval movies: Map[String, String]\
  \ = Map()\n```\n\n有几种方法可以向映射添加信息：\n\n*   使用 `->` 来表示左侧是键，右侧是值。\n\n*   使用括号和逗号来分隔映射中的不同行。\n\
  \n```\nscala> val movies: Map[String, String] = Map(\"ET\" -> \"Science fiction\"\
  , \"Saw\" -> \"Horror\")\nval movies: Map[String, String] = Map(ET -> Science fiction,\
  \ Saw -> Horror)\n```\n\n*   使用 `+` 向现有映射添加新的键值对。\n\n```\nscala> val movies: Map[String,\
  \ String] = Map((\"ET\", \"Science fiction\"), (\"Saw\", \"Horror\"))\nval movies:\
  \ Map[String, String] = Map(ET -> Science fiction, Saw -> Horror)\n```\n\n```\n\
  scala> movies + (\"Rocky IV\" -> \"Action\")\nval res6: Map[String, String] = Map(ET\
  \ -> Science fiction, Saw -> Horror, Rocky IV -> Action)\n```\n\n这种方法的主要问题是，你创建了一个包含原始信息和新信息的新变量。这通常不是问题，因为在上一章中你了解到\
  \ Scala 的理念是大多数时候创建不可变变量，但想象一下，由于某种原因，你需要在同一个映射中添加一个元素。正确的方法是：\n\n```\nscala> var\
  \ movies: Map[String, String] = Map(\"ET\" -> \"Science fiction\", \"Saw\" -> \"\
  Horror\")\nvar movies: Map[String, String] = Map(ET -> Science fiction, Saw -> Horror)\n\
  scala> movies += (\"Rocky IV\" -> \"Drama\")\n```\n\n请注意，如果你在映射中添加同一个键两次但值不同，则只会存在一个键，其值为最后一个值。\n\
  \n```\nscala> val movies: Map[String, String] = Map(\"ET\" -> \"Science fiction\"\
  , \"Saw\" -> \"Horror\", \"Saw\" -> \"Drama\")\nval movies: Map[String, String]\
  \ = Map(ET -> Science fiction, Saw -> Drama)\n```\n\n最后一点：如果你需要从映射中移除一个元素，你可以使用\
  \ ***-*** 或 `removed` 方法以及键的名称。\n\n```\nscala> var movies: Map[String, String] =\
  \ Map(\"ET\" -> \"Science fiction\", \"Saw\" -> \"Horror\")\nvar movies: Map[String,\
  \ String] = Map(ET -> Science fiction, Saw -> Horror)\nscala> movies -= (\"ET\"\
  )\nscala> println(movies)\nMap(Saw -> Horror)\nscala> movies = movies.removed(\"\
  Saw\")\nmovies: Map[String, String] = Map()\n```\n\n\n\n### 集合\n\n集合是一种包含无序元素的结构，类似于列表。主要区别在于，这种结构只包含值，且没有重复项。\n\
  \n```\nscala> val countries: Set[String] = Set()\nval countries: Set[String] = Set()\n\
  ```\n\n向集合中添加信息有几种方式：\n\n*   在构造函数中，用逗号分隔。\n\n*   使用 **+** 向现有集合中添加新值。\n\n```\n\
  scala> val countries: Set[String] = Set(\"Italy\", \"Spain\", \"France\", \"Germany\"\
  )\nval countries: Set[String]\n```\n\n```\nscala> countries + (\"Russia\")\nval\
  \ res10: Set[String] = HashSet(Spain, Russia, Italy, France, Germany)\n```\n\n采用这种方法，与\
  \ Map 类似，每次使用 + 添加元素时，都会创建一个包含所有值的新集合实例。一种修改集合实际值的可行方法是将变量声明为可变，并使用 += 向现有集合添加新元素。\n\
  \n```\nscala> var countries: Set[String] = Set(\"Italy\", \"Spain\", \"France\"\
  , \"Germany\")\nvar countries: Set[String] = Set(Italy, Spain, France, Germany)\n\
  scala> countries += (\"Russia\")\nscala> print(countries)\nHashSet(Spain, Russia,\
  \ Italy, France, Germany)\n```\n\n当你更改集合包含的值时，Scala 会将结构类型更改为具体的类，例如 `HashSet`。\n\
  \n要移除集合中的现有值，可以使用 - 和要移除的值。如果该值不存在，则什么也不会发生。\n\n```\nscala> var countries: Set[String]\
  \ = Set(\"Italy\", \"Spain\", \"France\", \"Germany\")\nscala> countries -= (\"\
  Italy\")\nscala> print(countries)\nHashSet(Spain, France, Germany)\n```\n\n### 元组\n\
  \nScala 提供了一种名为元组的结构，用于保存不同类型的信息。你可以将元组视为一个自定义对象，但无需定义所有属性。\n\n例如，让我们创建一个包含某部电影特定信息的元组。\n\
  \n```\nscala> val moviesReproductions = Tuple2(\"ET\", 2)\nval moviesReproductions:\
  \ (String, Int) = (ET,2)\n```\n\n要访问某个位置的值，只需指明该位置即可。\n\n```\nscala> moviesReproductions._1\n\
  val res19: String = ET\n```\n\n如果你把值的顺序放错了，可以使用 `swap` 方法来交换它们。\n\n```\nscala> moviesReproductions.swap\n\
  val res20: (Int, String) = (2,ET)\n```\n\n元组可以支持多个元素，而不仅仅是两个。如果你输入 *tuple* 并按 Tab\
  \ 键，会出现许多选项。\n\n```\nscala> Tuple\nTuple     Tuple10   Tuple12   Tuple14   Tuple16\
  \   Tuple18   Tuple2    Tuple21   Tuple3    Tuple5    Tuple7    Tuple9\nTuple1 \
  \   Tuple11   Tuple13   Tuple15   Tuple17   Tuple19   Tuple20   Tuple22   Tuple4\
  \    Tuple6    Tuple8\n```\n\n### 选项\n\n正如你在“函数式错误处理”一节中读到的，选项帮助开发者减少检查某物是否为 null\
  \ 的条件判断。这是防止空指针异常（这种异常通常出现在检查变量是否为 null 时）的好方法。\n\n这种结构出现在 Scala 2.13.x 中，与 Java\
  \ 8 中出现的 `Optional` 类有许多共同之处。\n\n这种结构用于 `map`、`flatMap` 和 `filter` 等操作中，你将在下一节详细了解这些操作。有些结构（如\
  \ Maps）在某些方法（如 `get`）中会返回一个 Option。\n\n```\nscala> val movies = Map(\"ET\" -> \"\
  Science fiction\")\nval movies: Map[String, String] = Map(ET -> Science fiction)\n\
  ```\n\n以下是尝试获取 `Map` 中存在和不存在的值时的情况：\n\n```\nscala> movies.get(\"ET\")\nval res1:\
  \ Option[String] = Some(Science fiction)\nscala> movies.get(\"ET II\")\nval res2:\
  \ Option[String] = None\n```\n\n#### 实例化\n\n实例化 Option 类型有几种不同的方式：\n\n*   使用 Option\
  \ 并传入值。采用这种方法，编译器会检查该值是否为 null，并创建正确的类。\n\n*   使用 Some 或 None 定义结果。采用这种方法，你省去了一步，因为编译器会将你指定的类赋值给变量。\n\
  \n```\nscala> val instantiateOption : Option[Int] =  Option(1)\nval instantiateOption:\
  \ Option[Int] = Some(1)\n```\n\n```\nscala> val instantiateOption : Option[Int]\
  \ =  None\nval instantiateOption: Option[Int] = None\nscala> val instantiateOption\
  \ : Option[Int] =  Some(1)\nval instantiateOption: Option[Int] = Some(1)\n```\n\n\
  #### 链式方法\n\n假设你有一个返回 Option 且值为 None 的方法，但你的逻辑需要始终有一个值或执行某些操作。Option 提供了一个名为 `orElse`\
  \ 的方法，该方法仅在值为 `None` 时执行。\n\n```\nscala> def returnNoneFunction() : Option[String]\
  \ = None\ndef returnNoneFunction(): Option[String]\nscala> def returnSomeFunction()\
  \ : Option[String] = Some(\"Your logic works\")\ndef returnSomeFunction(): Option[String]\n\
  scala> val obtainInformation = returnNoneFunction() orElse returnSomeFunction()\n\
  val obtainInformation: Option[String] = Some(Your logic works)\n```\n\n## 函数式操作\n\
  \n与许多其他语言一样，Scala 允许你对集合使用一组操作。\n\n### 遍历\n\n遍历是集合元素中最常见的操作，因为你可以迭代集合中的所有元素来执行特定操作。\n\
  \n```\nscala> val countries: Set[String] = Set(\"Italy\", \"Spain\", \"France\"\
  , \"Germany\")\nscala> countries.foreach(println)\nItaly\nSpain\nFrance\nGermany\n\
  ```\n\n### 映射\n\n当你需要迭代每个元素并创建一个输出（输出类型可以与输入相同，也可以不同）时，Map 结构非常有用。\n\n假设你需要迭代一组国家并计算每个国家名称的长度。\n\
  \n```\nscala> val countries: Set[String] = Set(\"Italy\", \"Spain\", \"France\"\
  , \"Germany\")\nscala> val nameSize = countries.map(country => (country, country.length))\n\
  val nameSize: Set[(String, Int)] = Set((Italy,5), (Spain,5), (France,6), (Germany,7))\n\
  ```\n\n另一种可能性是在实际值后面连接一个后缀。\n\n```\nscala> println(countries.map(_ + \" - Europe\"\
  ))\nSet(Italy - Europe, Spain - Europe, France - Europe, Germany - Europe)\n```\n\
  \n### 过滤\n\n过滤是最重要的操作之一，因为它允许你迭代、过滤元素，并仅返回结果为 `true` 的元素组成的新结构。\n\n```\nscala> val\
  \ countries: Set[String] = Set(\"Italy\", \"Spain\", \"France\", \"Germany\")\n\
  scala> countries.filter(country=>country.startsWith(\"I\"))\nval res21: Set[String]\
  \ = Set(Italy)\n```\n\n你可以组合所有操作来降低代码的复杂性，例如过滤出以 I 开头的国家并打印结果。\n\n```\nscala> countries.filter(country=>country.startsWith(\"\
  I\")).foreach(println)\nItaly\n```\n\n本节只是对你所能执行的所有操作的一个概述。你将在后续章节中看到更多细节。\n\n##\
  \ 总结\n\n你在第 2 章中看到了 Scala 函数在声明、定义和调用时的实际应用。作为对第 2 章简要介绍的延续，本章详细介绍了 Scala 中的函数式编程，并引入了几个函数式结构。在下一章中，你将学习\
  \ Scala 的模式匹配。\n\n脚注 1\n\n\n\n"
- '# 5. 模式匹配


  到目前为止，你已经探索了 Scala 的一些基本函数式基石：不可变数据类型和将函数作为参数传递。函数式编程的第三个基石是模式匹配。模式匹配提供了一种强大的工具，能够以简洁且可维护的方式声明业务逻辑。Scala
  将传统的函数式编程模式匹配与面向对象的概念相结合，为编写程序提供了一种非常强大的机制。在本章中，你将学习模式匹配的基础知识。然后，你将看到 Scala 的样例类如何桥接面向对象的数据封装和函数分解。接下来，你将看到
  Scala 的模式匹配结构如何成为可以传递和组合的函数。让我们先看一个简单的例子。


  ## 基础模式匹配


  模式匹配允许你在多个条件之间进行程序化选择，例如，如果布尔值 x 为真，则打印一条“true”消息；如果 x 为假，则打印一条“false”消息。但是，不要被这个简单的例子迷惑，从而低估了
  Scala 模式匹配的真正威力。Scala 的模式匹配允许你的情况远比仅仅判断 x 是真还是假要复杂得多。在 Scala 中，你的情况可以包括类型、通配符、序列、正则表达式等等。


  ```

  scala> def printNum(int: Int) =

  int match

  case 0 => println("Zero")

  case 1 => println("One")

  case _ => println("more than one")

  def printNum(int: Int): Unit

  ```


  现在用不同的参数执行该对象，并查看结果。


  ```

  scala> printNum(0)

  Zero

  scala> printNum(1)

  One

  scala> printNum(2)

  more than one

  ```


  如你所见，前面的代码块中并没有什么高深的概念。它只是打印 *zero*、*one* 或 *more than one*。但是，请注意最后一个带有下划线（`_`）通配符的情况。它匹配任何在其上方情况中未定义的内容，因此它的作用与
  Java 和 C# 中 switch 语句的 default 关键字相同。如果你不熟悉 Java 或 C# 中的 switch 语句，也不必担心。它只是意味着，如果你试图在任何其他情况子句之前放置一个
  `case _`，编译器将在下一个子句上抛出一个不可达代码错误，如下例所示，因为没有任何内容能通过 `case _` 子句，所以 `case _` 充当了默认值。


  ```

  scala> def printNum(int: Int) =

  int match

  case _ => println("more than one")

  case 0 => println("Zero")

  case 1 => println("One")

  ```


  当你尝试创建该对象时，控制台中会出现一些错误。


  ```

  def printNum(int: Int): Unit

  4         case 0 => println("Zero")

  ^

  Unreachable case

  5         case 1 => println("One")

  ^

  Unreachable case

  ^

  ```


  现在看看当你的模式匹配没有默认值，并且你传递了一个没有对应情况的值时，会发生什么：


  ```

  scala> def printNum(int: Int) =

  int match

  case 0 => println("Zero")

  case 1 => println("One")

  scala> printNum(2)

  scala.MatchError: 2 (of class java.lang.Integer)

  at rs$line$9$.printNum(rs$line$9:4)

  ... 28 elided

  ```


  Scala 不仅提供 `_` 来定义模式匹配表达式中的默认行为，你还可以使用任何其他具有相同功能的词。请看下面使用 `default` 代替 `_` 的例子：


  ```

  scala> def printNum(int: Int) =

  int match

  case 0 => println("Zero")

  case 1 => println("One")

  case default => println("more than one")

  def printNum(int: Int): Unit

  scala> printNum(2)

  more than one

  ```


  模式匹配，其核心是一组复杂的 `if/else` 表达式，允许你从几个备选方案中进行选择。乍一看，如果我们毫不掩饰地假设你具有 Java 背景，那么模式匹配看起来很像
  Java 的 switch 语句，但即使是在 Java 最简单的例子中，你也会注意到几个关键区别。让我们通过分别使用 Scala 的模式匹配和 Java 的 switch
  语句编写一个例子来分析这一点。下面的代码块演示了一个计算斐波那契数列的例子：


  ```

  scala> def fibonacci(in: Int): Int =

  in match

  case 0 => 0

  case 1 => 1

  case n => fibonacci(n - 1) + fibonacci(n - 2)

  def fibonacci(in: Int): Int

  ```


  让我们用 Java 编写相同的代码：


  ```

  public int fibonacci(int in) {

  switch (in) {

  case 0:

  return 0;

  case 1:

  return 1;

  default:

  return fibonacci(in - 1) + fibonacci(in - 2);

  }

  }

  ```


  你会注意到这两个例子之间的以下区别：


  *   在 Scala 中，情况之间没有 break 语句，而在 Java 中，你需要在 case 末尾使用 break 或 return。


  *   Scala 中的最后一个情况将默认值赋给变量 `n`。Scala 中的模式匹配也是一个返回值的表达式。


  我们刚刚指出了使用 Scala 的模式匹配和 Java 的 switch 语句编写的斐波那契例子中的几个关键区别。请考虑到，最新版本的 Java 具有一些 Scala
  自 2.12.x 版本以来就提供的特性。


  现在，我们将通过修改上述代码来展示 Scala 的模式匹配如何变得更好。


  Scala 允许在模式中放置守卫，以测试那些无法在模式声明本身中测试的特定条件。因此，你可以编写你的斐波那契计算器，如果传入负数则返回 0，如下所示：


  ```

  def fib2(in: Int): Int =

  in match

  case n if n <= 0 => 0

  case 1 => 1

  case n => fib2(n - 1) + fib2(n - 2)

  ```


  `case n if n <= 0 => 0` 是模式中的第一个测试。该测试将值提取到变量 `n` 中，并测试 `n` 是否为 0 或负数，如果是则返回 0。随着逻辑复杂度的增加，守卫非常有用。请注意，case
  语句是按照它们在代码中出现的顺序进行求值的。因此，`case n if n <= 0 =>` 会在 `case n =>` 之前被测试。在底层，编译器可能会优化模式并最小化测试次数，缓存测试结果，甚至缓存守卫的结果。


  最后要考虑的一点是，你可以有多个值具有相同的行为，因此你不需要多次定义相同的代码块。相反，你可以使用 `|` 将所有逻辑合并到一个 case 中。请检查下面的代码块，它在接收到
  -1 或 -2 时具有特定的行为：


  ```

  scala> def printNum(int: Int) =

  int match

  case 0 => println("Zero")

  case 1 => println("One")

  case -1 | -2 => println("less than zero")

  case _ => println("more than one")

  scala> printNum(-2)

  less than zero

  ```


  ### 匹配任意类型


  让我们考虑一个包含任意类型元素的列表，其中包含一个 String、一个 Double、一个 Int 和一个 Char：


  ```

  val anyList = List(1, "A", 2, 2.5, ''a'')

  ```


  你决定使用以下代码让用户知道列表中的 Int、String 和 Double 类型：


  ```

  scala> for (m <- anyList) do

  m match

  case i: Int => println("Integer: " + i)

  case s: String => println("String: " + s)

  case f: Double => println("Double: " + f)

  case other => println("other: " + other)

  ```


  在 REPL 的控制台中会出现类似这样的内容：


  ```

  Integer: 1

  String: A

  Integer: 2

  Double: 2.5

  other: a

  ```


  这段代码具有深远的意义，你将在下一节中了解到。




  ### 测试数据类型


  让我们编写一个方法，用于测试传入的对象是字符串、整数还是其他类型。根据其类型不同，将执行不同的操作，如下例所示：


  ```

  def test2(in: Any) =

  in match

  case s: String => "String, length "+s.length

  case i: Int if i > 0 => "Natural Int"

  case i: Int => "Another Int"

  case a: AnyRef => a.getClass.getName

  case _ => "null"

  ```


  第一行测试是否为字符串。如果是字符串，参数会被转换为字符串并赋值给变量 `s`，然后返回 `=>` 右侧的表达式。请注意，如果参数为 null，它将不会匹配任何与类型比较的模式。在下一行，参数被测试是否为整数。如果是整数，参数会被转换为整数并赋值给
  `i`，然后测试守卫条件。如果该整数是自然数（大于零），则返回“Natural Int”。通过这种方式，Scala 的模式匹配取代了 Java 的测试/转换范式。现在，为了充分理解
  Scala 中模式匹配的强大之处，让我们看看前面代码块的 Java 等价实现：


  ```

  public String test2(Object in) {

  if (in == null) {

  return "null";

  }

  if (in instanceof String) {

  String s = (String) in;

  return "String, length " + s.length();

  }

  if (in instanceof Integer) {

  int i = ((Integer) in).intValue();

  if (i > 0) {

  return "Natural Int";

  }

  return "Another Int";

  }

  return in.getClass().getName();

  }

  ```


  在前面的 Java 等价代码中，类型测试和转换操作是分离的。当复制粘贴测试/转换代码块时，这常常会导致错误。编译器不会检查类型测试是否与转换匹配，在复制粘贴的
  Java 代码中，测试和转换不匹配的情况并不少见。而 Scala 中的相同代码更简短，并且没有显式转换。模式匹配是避免显式转换的强大方式。


  ### 列表中的模式匹配


  Scala 的模式匹配也可以应用于列表。Scala 的 `List` 集合实现为链表，其中列表的头部称为 cons 单元。


  注意


  cons 单元的命名源于 Lisp，源自构建列表的操作。通过将一个 cons 单元链接到列表的头部来构建列表。


  它包含一个指向其内容的引用，以及另一个指向列表尾部的引用，尾部可能是另一个 cons 单元或 `Nil` 对象。列表是不可变的，因此同一个尾部可以被多个不同的头部共享。在
  Scala 中，cons 单元由 `::` 样例类表示。也许你刚刚已经恍然大悟：“啊哈！”


  在 Scala 中创建列表非常简单：


  ```

  1 :: Nil

  ```


  `::` 既是方法的名称，也是样例类的名称。通过保持创建方法 `::` 和样例类名称相同，你可以以一种语法上令人愉悦的方式构建列表并进行模式匹配。正如你刚刚所见，样例类可以在模式匹配中用于比较或提取值。这也适用于列表，并带来一些非常优雅的语法。


  你可以这样构建一个列表：


  ```

  scala> val x = 1

  x: Int = 1

  scala> val rest = List(2,3,4)

  rest: List[Int] = List(2, 3, 4)

  scala> val list = x :: rest

  val list: List[Int] = List(1, 2, 3, 4)

  scala> def printNumbers(list : List[Int]) : Unit =

  list match

  case head :: tail => println(head); printNumbers(head)

  case Nil => println("")

  def printNumbers(list: List[Int]): Unit

  scala> printNumbers(list)


  ```


  然后你可以在模式匹配中提取列表的 `head (x)` 和 `tail (rest)`。


  ### 模式匹配与列表


  模式匹配和列表是相辅相成的。你可以从使用模式匹配对 `List[Int]` 中的所有奇数整数求和开始。


  ```

  def sumOdd(in: List[Int]): Int =

  in match

  case Nil => 0

  case x :: rest if x % 2 == 1 => x + sumOdd(rest)

  case _ :: rest => sumOdd(rest)

  ```


  如果列表为空（`Nil`），则返回 0。下一个 case 从列表中提取第一个元素，并测试它是否为奇数。如果是，则将其与列表中剩余奇数的和相加。默认 case 是忽略列表的第一个元素（使用
  `_` 通配符匹配），并返回列表中剩余奇数的和。


  提取列表的头部很有用，但在对列表进行模式匹配时，你可以匹配列表中的任意数量的元素。在下面的示例中，你将任意数量的连续相同项替换为该单项的一个实例：


  ```

  def noPairsT: List[T] =

  in match

  case Nil => Nil

  case a :: b :: rest if a == b => noPairs(a :: rest)

  // 列表中的前两个元素相同，因此我们将

  // 调用 noPairs，传入一个排除了重复元素的列表

  case a :: rest => a :: noPairs(rest)

  // 返回一个由第一个元素和 noPairs

  // 应用于列表剩余部分的结果组成的列表

  ```


  让我们运行代码，看看它是否按预期工作：


  ```

  scala> noPairs(List(1,2,3,3,3,4,1,1))

  res6: List[Int] = List(1, 2, 3, 4, 1)

  ```


  模式匹配既可以匹配常量，也可以提取信息。假设你有一个 `List[String]`，并且想要实现一条规则：丢弃“ignore”字符串前面的元素。在这种情况下，你同时使用模式匹配进行测试和提取：


  ```

  def ignore(in: List[String]): List[String] =

  in match

  case Nil => Nil

  case _ :: "ignore" :: rest => ignore(rest)

  // 如果列表中的第二个元素是 "ignore"，则返回

  // 对列表剩余部分应用 ignore 方法的结果

  case x :: rest => x :: ignore(rest)

  // 返回一个由列表的第一个元素加上

  // 对列表剩余部分应用 ignore 方法的结果组成的列表

  ```


  你已经了解了如何使用模式匹配和列表进行提取和相等性测试。你还可以使用类测试/转换机制来查找 `List[Any]` 中的所有字符串。


  ```

  def getStrings(in: List[Any]): List[String] =

  in match

  case Nil => Nil

  case (s: String) :: rest => s :: getStrings(rest)

  case _ :: rest => getStrings(rest)

  ```


  然而，将 `List[Any]` 过滤为特定类型列表的范式方法是使用模式作为函数。你将在“作为函数的模式匹配”一节中看到这一点。


  在本节中，你探索了如何进行模式匹配。你了解了列表的提取和模式匹配。列表在 Scala 中可能看起来是一种特殊的构造，但实际上 Scala 中的列表并没有什么特殊之处。


  ## 编译器优化


  从 Scala 2.x.x 开始，有一种方法可以使用注解 `@switch` 来优化模式匹配表达式。当存在该注解时，编译器会检查表达式是否有效，以便引入一些优化。在幕后，这个注解告诉编译器不要转换简单的条件表达式（`if/else`）。相反，编译器会尝试生成一个分支表，这比其他表达式更快。


  ```

  scala> import scala.annotation.switch //你需要导入这个注解

  scala> def printNum(int : Int) =

  (int: @switch) match //你指示 Scala 使用优化

  case 0 => println("Zero")

  case 1 => println("One")

  case _ => if int > 0 then println("More than one") else println("Less than zero")

  def printNum(int: Int): Unit

  scala> printNum(3)

  More than one

  ```


  使用这个新注解一切正常，但在幕后，这段代码会根据 case 的类型被转换为两种不同的结构。这些结构被称为 `tableswitch` 和 `lookupswitch`。^(²⁶)




  ### 表跳转（Tableswitch）


  当不同值之间连续或仅有微小间隙时，编译器通常会使用表跳转。这种方法的时间复杂度为 O(1)，因此你可以直接访问与特定键关联的代码块；这是因为该值被用作索引。


  ```

  import scala.annotation.switch

  def print(int : Int) =

  (int: @switch) match

  case 0 => println("Zero")

  case 1 => println("One")

  case 2 => println("Two")

  case 3 => println("Three")

  case 4 => println("Four")

  case _ => println("More than four")

  ```


  ### 查找跳转（Lookupswitch）


  当值不连续且结构中的不同值之间存在较大间隙时，会使用查找跳转。编译器会对所有键进行排序，当有人试图获取某个 case 的逻辑时，编译器会执行二分查找。因此，该算法的复杂度为
  O(log n)。


  ```

  import scala.annotation.switch

  def print(letter : Char) =

  (letter: @switch) match

  case ''A'' => println("Animal")

  case ''B'' => println("Bank")

  case ''D'' => println("Dance")

  case ''E'' => println("Elephant")

  case _ => println("Is not a letter")

  ```


  ### 注意事项


  在代码中包含此注解时，需要考虑以下几点：


  *   模式匹配需要包含两个以上的 case。如果不超过两个 case，代码可以编译，但不会带来性能提升。


  *   不同 case 的值必须是字面量，而非引用值，因为这是编译器判断需要使用哪种结构（表跳转或查找跳转）的唯一方式。


  *   不同 case 不应包含任何条件，如上文所示***。***


  ## 使用 Matchable 特质的模式匹配


  Scala 3 引入了 `Matchable` 特质。请记住，特质类似于其他语言中的接口，它控制着执行模式匹配的能力。在 Scala 3.0.x 版本中，这个新特质没有成员，但负责在
  Scala 中引入新功能的开发者们计划添加这一特定特性，该特性与 Java 最新版本中的功能大致相似。


  `AnyVal` 和 `AnyRef` 类现在分别继承自两个不同的东西：`Any` 和 `Matchable`。


  ```

  abstract class Any:

  def isInstanceOf

  def getClass

  //以及更多方法。

  trait Matchable extends Any

  class AnyVal extends Any, Matchable

  class AnyRef extends Any, Matchable

  ```


  现在设想你需要创建一个方法，该方法接收一个元素序列，并根据元素的类型执行特定操作。实现方式是，指明你的方法将接收一个 `Matchable` 类型的参数（`T`
  不表示特定类型）（使用 `<:` 表示该类型继承自 `Matchable`）。


  ```

  scala> val seq = Seq("one", 2, 3.5)

  val seq: Seq[Matchable] = List(one, 2, 3.5)

  scala> def check T  println(s"Int $i")

  case s: String => println(s"String $s")

  case f: Float => println(s"Float $f")

  case other => println(s"Other $other")

  }

  def check[T  check(seq)

  String one

  Int 2

  Other 3.5

  ```


  ## 模式匹配与 Case 类


  Case 类会自动获得 `toString`、`hashCode` 和 `equals` 方法。此外，它们还会获得属性和提取器^([²⁷)，你将在第 8 章中看到。Case
  类也具有属性，并且可以在不使用 `new` 关键字的情况下构造。


  让我们定义一个 `case` 类。


  ```

  case class Person(name: String, age: Int, valid: Boolean)

  ```


  让我们创建一个 `Person` 实例。


  ```

  scala> val p = Person("David", 45, true)

  p: Person = Person(David,45,true)

  ```


  你也可以使用 `new` 来创建一个 `Person`。


  ```

  scala> val m = new Person("Martin", 44, true)

  m: Person = Person(Martin,44,true)

  ```


  每个 `Person` 实例都具有与构造参数对应的属性。


  ```

  scala> p.name

  res0: String = David

  scala> p.age

  res1: Int = 45

  scala> p.valid

  res2: Boolean = true

  ```


  默认情况下，这些属性是只读的，并且 `case` 类是不可变的。


  ```

  scala> p.name = "Fred"

  :7: error: reassignment to val

  p.name = "Fred"

  ```


  你也可以使属性可变。


  ```

  scala> case class MPerson(var name: String, var age: Int)

  defined class MPerson

  scala> val mp = MPerson("Jorge", 24)

  mp: MPerson = MPerson(Jorge,24)

  scala> mp.age = 25

  scala> mp

  res3: MPerson = MPerson(Jorge,25)

  ```


  到目前为止，这只是一些语法糖。你可能会问，它如何与模式匹配配合使用呢？


  针对 `case` 类的模式匹配在语法上令人愉悦且非常强大。你可以针对你的 `Person` 类进行匹配，并且可以免费获得提取器。


  ```

  def older(p: Person): Option[String] =

  p match

  case Person(name, age, true) if age > 35 => Some(name)

  case _ => None

  ```


  你的方法会匹配 `Person` 的实例。如果 `valid` 字段为 true，则提取 `age` 并与守卫条件进行比较。如果守卫条件成功，则返回该人的名字；否则返回
  `None`。让我们试一下：


  ```

  scala> older(p)

  res4: Option[String] = Some(David)

  scala> older(Person("Fred", 73, false))

  res5: Option[String] = None

  scala> older(Person("Jorge", 24, true))

  res6: Option[String]

  ```


  ### Case 类中的嵌套模式匹配


  在 Scala 的早期版本中，你可以创建包含其他 `case` 类的 `case` 类，并可以使用模式匹配，但在最新版本的 Scala（2.13.1）中，此功能已被弃用并移除。以下代码展示了当你尝试创建一个继承自另一个
  `case` 类的 `case` 类时会发生什么：


  ```

  scala> case class MarriedPerson(override val name: String,

  override val age: Int,

  override val valid: Boolean,

  spouse: Person) extends Person(name, age, valid)

  1 |case class MarriedPerson(override val name: String,

  ^

  Cannot extend sealed class Person in a different source file

  4 |spouse: Person) extends Person(name, age, valid)

  ^^^^^^^^^^^^^^^^^^^^^^^^

  case class MarriedPerson has case ancestor class Person, but case-to-case inheritance
  is prohibited.

  To overcome this limitation, use extractors to pattern match on non-leaf nodes .

  ```




  ## 模式匹配作为函数


  Scala 模式是与 `match` 运算符一起使用时语言中的语法元素。不过，你也可以将模式匹配作为参数传递给其他方法。Scala 会将模式匹配编译成一个 `PartialFunction[A,B]`，它是
  `Function1[A,B]` 的一个子类。因此，模式可以传递给任何接受单参数函数的方法。这允许你将


  ```

  list.filter(a => a match {

  case s: String => true

  case _ => false

  })

  ```


  简化为


  ```

  list.filter {

  case s: String => true

  case _ => false

  }

  ```


  因为模式是函数，而函数是实例，所以模式也是实例。除了将它们作为参数传递外，它们还可以被存储起来供以后使用。


  除了 `Function1` 的 `apply` 方法外，`PartialFunction` 还有一个 `isDefinedAt` 方法，因此你可以测试某个模式是否匹配给定的值。如果你尝试应用一个未针对该值定义的
  `PartialFunction`，则会引发 `MatchError`。这有什么用呢？


  如果你正在构建一个 Web 应用程序，可能有一些特定的 URL 需要特殊处理，而其他 URL 则按默认方式处理。URL 可以表示为 `List[String]`。你可以执行以下操作：


  ```

  def handleRequest(req: List[String])(exceptions: PartialFunction[List[String], String]):
  String =

  if (exceptions.isDefinedAt(req)) then

  exceptions(req)

  else

  "Handling URL " + req + " in the normal way"

  ```


  因此，如果偏函数 exceptions（即模式）根据 `isDefinedAt` 方法匹配了请求 `req`，那么你就允许该请求由 `exceptions` 函数处理。否则，你将执行默认处理。你可以调用
  `handleRequest`，并通过一个单独的处理程序来处理任何 `"api"` 请求。


  ```

  handleRequest("foo" :: Nil) {

  case "api" :: call :: params => doApi(call, params)

  }

  def doApi(call: String, params: List[String]): String =

  "Doing API call "+ call

  ```


  偏函数可以使用 `orElse` 方法组合成一个函数。因此，你可以定义几个偏函数。


  ```

  val f1: PartialFunction[List[String], String] =

  case "stuff" :: Nil => "Got some stuff"

  val f2: PartialFunction[List[String], String] =

  case "other" :: params => "Other: " + params

  ```


  并且你可以组合它们。


  ```

  val f3 = f1 orElse f2

  ```


  然后你可以将它们传递给 `handleRequest` 方法。


  ```

  handleRequest("a" :: "b" :: Nil)(f3)

  ```


  通过这种方式，Scala 为你提供了一种非常优雅、声明式的方式来处理复杂的过滤任务。偏函数可以匹配数据，并且可以像 Scala 中的任何其他实例一样被传递。偏函数取代了
  Java 中的许多 XML 配置文件，因为模式匹配提供了与配置文件相同的声明式能力，但它们是类型安全的、高性能的，并且可以包含守卫条件，通常还能利用代码中的任何方法。以下是在
  ESME^(²⁸) 代码中使用模式匹配来分发 REST 请求的示例：^(²⁹)


  ```

  def dispatch: LiftRules.DispatchPF = {

  case Req("api" :: "status"   :: Nil, "", GetRequest) => status

  case Req("api" :: "messages" :: Nil, "", GetRequest) => getMsgs

  case Req("api" :: "messages" :: "long_poll" :: Nil, "", GetRequest) =>

  waitForMsgs

  case Req("api" :: "messages" :: Nil, "", PostRequest) =>

  () => sendMsg(User.currentUser.map(_.id.is), S)

  case Req("api" :: "follow"    :: Nil, _, GetRequest) =>

  following(calcUser)

  case Req("api" :: "followers" :: Nil, _, GetRequest) =>

  followers(calcUser)

  case Req("api" :: "follow"    :: Nil, _, PostRequest) =>

  performFollow(S.param("user"))

  }

  ```


  ## 正则表达式上的模式匹配


  你可以将模式匹配与正则表达式结合使用，以提取字符串或其他类型中包含的信息。假设你有一个序列，其中包含不同的多媒体元素及其信息，并且你需要将其打印出来。


  首先，定义包含你需要提取信息的元素序列。


  ```

  val multimedia = Seq(

  "Photography: author=Richard Avedon, place=New York",

  "Movie: name=Casablanca, director=Michael Curtiz",

  "Music: name=Fly on the moon, author=Fran Sinatra");

  ```


  现在创建两个提取器，一个用于获取照片的信息，另一个用于获取电影的信息。


  ```

  val PhotographyExtractorRE = """Photography: author=([^,]+),\s+place=(.+)""".r

  val MovieExtractorRE = """Movie: name=([^,]+),\s+director=(.+)""".r

  ```


  最后但同样重要的是，你需要定义条件，将序列中的每个元素映射到特定的 case。


  ```

  multimedia.map {

  case PhotographyExtractorRE(author, place) => println(s"Phography - Author: $author
  - Place: $place")

  case MovieExtractorRE(name, director) => println(s"Movie - Name: $name - Director:
  $director")

  case unknown => println(s"Unknown entry $unknown")

  }

  ```


  执行此代码后，你将获得的输出如下所示：


  ```

  Phography - Author: Richard Avedon - Place: New York

  Movie - Name: Casablanca - Director: Michael Curtiz

  Unknown entry Music: name=Fly on the moon, author=Fran Sinatra

  ```


  关于如何创建正则表达式的解释超出了本书的范围，但你可以找到像 RegExr 这样的网站来创建和测试每种可能的情况。^(³⁰)


  ## 面向对象与函数式的张力


  此时，硬核的面向对象设计者可能对 Scala `case` 类暴露大量内部信息感到有些不满。数据隐藏是 OOP 抽象的重要组成部分。但事实上，我们定义的大多数
  Java 类都有 getter 和 setter，因此在 OOP 中数据是暴露的。然而，在程序中暴露的内部状态量与隐藏的状态量之间存在一种张力。在本节中，你将探讨用于数据隐藏和暴露的
  OOP 与函数式编程（FP）模式。


  OOP 中的另一个张力是如何在类和接口层次结构中定义方法。方法定义属于哪里？当一个库已部署，但有必要为子类添加新功能时会发生什么？你如何改造那些已固化的库类来添加此功能？更具体地说，如果你有一个形状库（圆形、正方形和矩形），每个形状都有一个
  `area` 方法但隐藏了所有其他数据，你如何为这些形状添加一个 `perimeter` 方法？让我们探讨这种张力以及 Scala 和 FP 为解决这种张力所提供的工具。




  ### 形状抽象


  如果你有一组形状，它们都派生自包含 `area` 方法的公共特质 `OShape`，那么使用传统的面向对象编程（OOP）方法时，你的对象定义将如下所示：


  ```

  trait OShape:

  def area: Double

  class OCircle(radius: Double) extends OShape:

  def area = radius * radius * Math.PI

  class OSquare(length: Double) extends OShape:

  def area = length * length

  class ORectangle(h: Double, w: Double) extends OShape:

  def area = h * w

  ```


  让我们将其与模式匹配的实现进行比较：


  ```

  trait Shape

  case class Circle(radius: Double) extends Shape

  case class Square(length: Double) extends Shape

  case class Rectangle(h: Double, w: Double) extends Shape

  object Shape:

  def area(shape: Shape): Double =

  shape match

  case Circle(r) => r * r * Math.PI

  case Square(l) => l * l

  case Rectangle(h, w) => h * w

  ```


  在模式匹配的示例中，所有计算面积的逻辑都位于同一个方法中，但从 `Shape` 特质来看，该方法的存在并不明显。到目前为止，OOP 方法似乎是正确的答案，因为它清楚地表明了形状能做什么。


  然而，如果你有一个形状库，并且想要计算每个形状的周长，那么模式匹配就有其优势了。


  ```

  def perimeter(shape: Shape) =

  shape match

  case Circle(r) => 2 * Math.Pi  * r

  case Square(l) => 4 * l

  case Rectangle(h, w) => h * 2 + w * 2

  ```


  在这种情况下，开放数据使得实现 `perimeter` 方法成为可能。使用 OOP 实现，你必须暴露数据才能实现 `perimeter` 方法。因此，你的 OOP
  实现将如下所示：


  ```

  trait OShape:

  def area: Double

  class OCircle(radius: Double) extends OShape:

  def area = radius * radius * Math.PI

  def getRadius = radius

  class OSquare(length: Double) extends OShape:

  def area = length * length

  def getLength = length

  class ORectangle(h: Double, w: Double) extends OShape:

  def area      = h * w

  def getHeight = h

  def getWidth  = w

  ```


  从更广泛的意义上讲，对象层次结构的设计者很少会实现库使用者所需的所有方法。


  访问者模式是一种设计模式，它允许你在类层次结构已经定义之后，为其添加功能。让我们看一个典型的访问者模式实现。以下是定义访问者的接口。该代码包含循环类引用，无法在
  REPL 中运行。因此，先给出代码，然后对代码进行逐步讲解。


  ```

  trait OCarVisitor:

  def visit(wheel: OWheel): Unit

  def visit(engine: OEngine): Unit

  def visit(body: OBody): Unit

  def visit(car: OCar): Unit

  trait OCarElement:

  def accept(visitor: OCarVisitor): Unit

  class OWheel(val name: String) extends OCarElement:

  def accept(visitor: OCarVisitor) = visitor.visit(this)

  class OEngine extends OCarElement:

  def accept(visitor: OCarVisitor) = visitor.visit(this)

  class OBody extends OCarElement:

  def accept(visitor: OCarVisitor) = visitor.visit(this)

  class OCar extends OCarElement:

  val elements = List(new OEngine, new OBody, new OWheel("FR"),

  new OWheel("FL"), new OWheel("RR"), new OWheel("RL"))

  def accept(visitor: OCarVisitor) = (this :: elements).foreach(_.accept(visitor))

  ```


  库作者必须考虑可扩展性并实现访问者模式。还要注意，在访问者模式中，类层次结构是固定的，因为访问者必须实现一个接口，该接口定义了访问者可以处理的所有可能的类。


  ```

  trait OCarVisitor:

  def visit(wheel: OWheel): Unit

  def visit(engine: OEngine): Unit

  def visit(body: OBody): Unit

  def visit(car: OCar): Unit

  ```


  每个元素都派生自一个特质，该特质创建了一个契约，要求该类实现 `accept` 方法。


  ```

  trait OCarElement:

  def accept(visitor: OCarVisitor): Unit

  ```


  你实现每个子类并实现 `accept` 方法。


  ```

  class OWheel(val name: String) extends OCarElement:

  def accept(visitor: OCarVisitor) = visitor.visit(this)

  class OEngine extends OCarElement:

  def accept(visitor: OCarVisitor) = visitor.visit(this)

  class OBody extends OCarElement:

  def accept(visitor: OCarVisitor) = visitor.visit(this)

  class OCar extends OCarElement:

  val elements = List(new OEngine, new OBody, new OWheel("FR"),

  new OWheel("FL"), new OWheel("RR"), new OWheel("RL"))

  def accept(visitor: OCarVisitor) = (this :: elements).foreach(_.accept(visitor))

  ```


  这有大量的样板代码。^((31)) 此外，它违反了 OOP 的数据隐藏原则，因为访问者必须访问它所访问的每个元素中的某些数据。让我们比较一下模式匹配的版本：


  ```

  trait CarElement:

  case class Wheel(name: String) extends CarElement

  case class Engine() extends CarElement

  case class Body() extends CarElement

  case class Car(elements: List[CarElement]) extends CarElement

  ```


  代码更简洁，因为没有样板式的 `accept` 方法。让我们看看当你想遍历对象层次结构时该怎么做：


  ```

  def doSomething(in: CarElement): Unit =

  in match

  case Wheel(name) =>

  case Engine() =>

  case Body() =>

  case Car(e) => e.foreach(doSomething)

  ```


  请注意，所有与访问者模式解释相关的代码都需要在 REPL 中按相同顺序执行。如果你关闭并重新打开它，你将丢失所有声明，示例可能无法工作。如果你使用 Scastie
  或其他在线工具，你只需将所有代码添加到同一个编辑器中。


  ## 总结


  在本章中，你探索了模式匹配，并看到了模式匹配如何为表达复杂逻辑提供强大的声明式语法。模式匹配为 Java 的测试/转换范式提供了一种优秀且类型安全的替代方案。将模式匹配与
  case 类和提取器结合使用，提供了一种遍历对象层次结构的强大方法，并且是访问者模式的绝佳替代方案。而且，由于模式是函数和对象，它们可以作为参数传递，并用于任何使用函数的地方。


  在下一章中，你将探索集合。Scala 集合库是 Scala 生态系统中最重要的库。


