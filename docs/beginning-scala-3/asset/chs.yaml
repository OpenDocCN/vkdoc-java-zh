  提示


  协变：如果 `S` 继承自 `T`，那么 `Class[S]` 继承自 `Class[T]`。


  让我们定义一个不可变类 `Getable`。一旦创建了 `Getable` 的实例，它就不能改变，因此你可以将其类型 `T` 标记为协变。


  ```

  scala> class Getable+T

  defined class Getable

  ```


