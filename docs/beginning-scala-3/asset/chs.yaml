  # 14. Scala 最佳实践


  感谢你坚持阅读到这里。你已经涉猎了广泛的知识。你探索了 Scala 语言，并积累了一套使用 Scala 构建应用程序的惯用方法。你了解了不同团队成员如何以不同方式使用
  Scala。你也看到了 Scala 如何让你将细粒度的代码片段组合成协同工作的复杂系统。


  但没有任何技术是孤立存在的。无论 Scala 在理论上多么优秀，只有当它能帮助你的组织更快地生成更好、更易维护的代码时，它才有价值。好消息是，Scala 编译为
  JVM 字节码，并且能与现有的 Java 库很好地协同工作。如果你在 Java 环境下工作，在某些项目中使用 Scala 的成本极低。你可以使用现有的 Java
  测试工具来测试 Scala。你可以将编译后的 Scala 代码存储在 JAR 和 WAR 文件中，因此对于你组织中的其他人来说，它看起来和感觉上都像他们习惯的
  Java 字节码。Scala 代码在 Web 服务器上的运行特性与 Java 代码的运行特性难以区分。


  Scala 不仅仅是一种编程语言；它是一种关于编程的新的思考和推理方式。你需要时间来设计符合 Scala 范式的代码，并发现和设计你自己的范式。因此，先用 Scala
  编写 Java 风格的代码，然后应用这些惯用法，观察你的代码如何变化，以及你的思维模式如何浮现。第一步是识别函数式风格，以及命令式风格与函数式风格之间那些显而易见的区别。


  ## 通用最佳实践


  正如你在本书不同章节中所读到的，Scala 3.x.x 引入了大量修改，以降低语言的复杂性，并帮助开发者以简单的方式理解代码。


  以下是适用于新版本 Scala 的一些规则：


  *   **减少使用** **;**、**()** 和 **{}**。如你所知，在 Scala 3 中并没有强制要求使用它们，但如果团队中有人不包含它们，可能会造成混淆。


  *   **编写不返回异常的简单函数。** 不要返回异常，而是返回像 `Option`、`Try` 或 `Either` 这样的类型。


  *   **使用 `val` 声明不可变字段。** 这种做法降低了并发可能带来的问题风险。


  *   **不要在变量中允许 null 值。** 请使用 `Option`。


  *   **使用 ScalaTest^(⁸⁵) 在应用程序中创建大量单元测试。** 如果你更习惯编写测试的格式，也可以使用 Java^(⁸⁷) 中的其他框架，如
  Junit^(⁸⁶)。此外，添加一些工具来了解测试的覆盖率。SonarQube^(⁸⁸) 是一个不错的选择。


  *   **检查你想要在 SBT^(⁸⁹) 中添加的依赖项是否与最新版本的 Scala 2.13.x 或 Scala 3 兼容。**


  以下各节将更详细地解释这些最佳实践。


  ## 识别函数式风格


  Scala 同时支持函数式和命令式编程风格。如果你来自命令式背景，例如，如果你是一名 Java 程序员，Scala 也允许你以命令式风格编程，但它鼓励采用函数式方法。函数式编程风格使你能够编写简洁且不易出错的代码。然而，对于
  Java 程序员来说，以函数式风格编程可能是一项艰巨的任务。本节提供了一些关于函数式编程的要点。首要步骤是识别代码中命令式风格和函数式风格之间的区别。


  区分函数式和命令式风格的一个快速方法是：`var` 表示命令式风格，而使用 `val` 更接近于函数式方法。因此，从命令式风格过渡到函数式风格意味着你的程序应该没有
  `var`。


  ```

  val strArray = Array("Vishal Layka", "David Pollak")

  ```


  如果你想打印上面数组的内容，并且你在转向 Scala 之前是一名 Java 程序员，你可能会编写类似于下面所示的 `while` 循环：


  ```

  def print(strArray: Array[String]): Unit =

  var i = 0

  while (i < strArray.length) {

  println(strArray (i))

  i += 1

  }

  ```


  上面的代码使用了 `var`，因此属于命令式风格。当你在 REPL 中运行这段代码时，你会得到以下输出：


  ```

  scala> print(strArray)

  Vishal Layka

  David Pollak

  ```


  你可以通过首先去掉 `var` 来将这段代码转换为更函数式的风格，如下所示：


  ```

  def print(strArray: Array[String]): Unit = {

  strArray.foreach(println)

  }

  ```


  如你所见，重构后的函数式代码比上面原始的命令式代码更清晰、更简洁，也更不容易出错。最后一个例子更具函数式风格，但并非纯粹的函数式。




  ## 编写纯函数


  到目前为止，你已经将上面命令式风格的 `print` 方法重构为后续的函数式示例，但该示例并非纯函数式，因为它产生了副作用。例如，它将输出打印到输出流。函数式的等价写法将是一个更具定义性的方法，它操作传入的
  `args` 参数以用于打印。例如，它格式化字符串，但不打印，而是返回格式化后的字符串供打印，如下所示：


  ```

  def formatArgs(strArray: Array[String]) = strArray.mkString(":")

  ```


  注意


  如果函数的返回类型是 `Unit`，则该函数具有副作用。


  现在这个函数是纯函数式的；也就是说，它不会产生受 `var` 影响的副作用。`mkString` 方法定义在集合上，用于返回在每个元素上调用 `toString`
  后拼接而成的字符串。你可以在任何可迭代的集合上调用 `mkString`。


  重写的 `toString` 方法用于返回对象的字符串表示形式，如下所示：


  ```

  val x = List("x", "y", "z")

  println(x.mkString(" : "))

  ```


  你将得到以下输出：


  ```

  scala> val x = List("x", "y", "z")

  x: List[String] = List(x, y, z)

  scala> println(x.mkString(" : "))

  x : y : z

  ```


  没有副作用的函数不会打印任何内容，这与更函数式示例中的 `print` 方法不同。你可以将 `formatArgs` 的结果传递给 `println` 来打印输出，如下所示：


  ```

  println(formatArgs(strArray))

  ```


  你可以在 REPL 中运行此代码：


  ```

  scala> val strArray = Array("Vishal Layka", "David Pollak")

  strArray: Array[String] = Array(Vishal Layka, David Pollak)

  scala> def formatArgs(strArray: Array[String]) = strArray.mkString(":")

  formatArgs: (strArray: Array[String])String

  scala> println(formatArgs(strArray))

  Vishal Layka:David Pollak

  ```


  话虽如此，程序的基本有用特性就是产生副作用；否则，它就没有实际应用。创建不产生副作用的方法会鼓励你最小化可能引起副作用的代码，从而引导你设计出健壮的程序。


  一开始编写纯函数并不简单，因为这个概念并不流行，或者在使用 JVM 的其他语言中难以实现。一些建议：先编写纯函数以理解这个概念。之后，在你所能编写的所有函数中推广这个概念。


  ## 利用类型推断


  Scala 是一种静态类型语言。在静态类型语言中，值和变量都有类型。同时，Scala 是一种支持类型推断的语言，这意味着你无需编写样板代码，因为 Scala 会推断出这些样板代码。这种类型推断是动态类型语言的一个特性。通过这种方式，Scala
  融合了两类语言的最佳特性。


  注意


  在动态类型系统中，与静态类型不同，只有值有类型；变量没有类型。


  让我们创建一个 `Maps` 数组来说明类型推断是如何工作的。


  ```

  val books = Array(

  Map("title" -> "Beginning Scala", "publisher" -> "Apress"),

  Map("title" -> "Beginning Java", "publisher" -> "Apress")

  )

  ```


  如果你在 REPL 中运行这段 Scala 代码，你将看到以下输出：


  ```

  scala> val books = Array(

  |     Map("title" -> "Beginning Scala", "publisher" -> "Apress"),

  |     Map("title" -> "Beginning Java", "publisher" -> "Apress")

  | )

  val books: Array[Map[String, String]] = Array(Map(title -> Beginning Scala, publisher
  -> Apress), Map(title -> Beginning Java, publisher -> Apress))

  ```


  注意，只指定了数组和 `Maps`，而没有指定它们的类型。正如你在 REPL 的输出中所见，Scala 编译器推断出了数组和 `Map` 的类型。通过这种方式，你可以让类型推断器为你确定类型，这有助于你精简大量形式化的代码，从而保持代码简洁、精炼，并专注于业务逻辑。


  提示


  让类型推断器确定类型；这有助于你精简形式化的代码。


  如果你最近使用过 Kotlin 或 Java 14，这个概念并不陌生，因为它们提供了类似的功能。


  ## 思考表达式


  正如你在第 4 章所学到的，表达式会求值为一个值，因此不需要 `return` 语句。在 Java 中，`return` 语句很常见，如下所示：


  ```

  def phoneBanking(key: Int) : String = {

  var result : String = _

  key match {

  case 1 => result = "Banking service"

  case 2 => result = "Credit cards"

  case _ => result = "Speak to the customer executive"

  }

  return result

  }

  ```


  如你所见，最终结果存储在一个 `result` 变量中。代码在通过模式匹配流转时，会将字符串赋值给 `result` 变量。为了改进这段代码，你需要遵循面向表达式的方法，这在第
  4 章中有详细解释。可以通过以下方式实现：


  *   如前所述，采用函数式风格的首要方法是使用 `val` 而不是 `var`。你首先将 `result` 变量改为 `val`。


  *   不要通过 `case` 语句进行赋值，而是使用 `case` 语句的最后一个表达式来赋值。


  以下是重构为面向表达式模式匹配的代码：


  ```

  def phoneBanking (key: Int) : String =

  val result = key match

  case 1 => "Banking service"

  case 2 => "Credit cards"

  case 3 => "Speak to the customer executive"

  return result

  ```


  这段代码看起来简洁多了，但仍有改进空间。你可以完全从 `phoneBanking` 方法中移除中间的 `result` 变量。以下是纯粹的面向表达式风格：


  ```

  def phoneBanking (key: Int) : String = key match

  case 1 => "Banking service"

  case 2 => "Credit cards"

  case 3 => "Speak to the customer executive"

  ```


  它遵循了面向表达式的方法。你可以在 REPL 中运行代码，如下所示：


  ```

  scala> phoneBanking (3)

  res8: String = Speak to the customer executive

  ```


  注意


  使用表达式的关键在于认识到不需要 `return` 语句。


  尝试将这个概念不仅应用于 `match` 表达式。当发生异常时，你也可以在 `try/catch` 表达式中应用这个想法。尝试捕获异常以执行某些操作，比如记录错误，然后为方法提供一个可能的值（`None`/`Some`）。




  ## 聚焦不可变性


  在 Java 中，可变性是默认行为。除非变量被标记为 `final`，否则它们就是可变的。JavaBean 拥有 getter 和 setter 方法。Java
  中的数据结构被实例化、设置值，然后传递给其他方法。请尝试在你的 Scala 代码中改变这种范式。


  首先要做的是默认使用不可变集合类。如果你选择使用可变集合类，请在代码中添加注释说明选择它的原因。有些情况下使用可变集合是合理的。例如，在构建 `List` 的方法中，使用
  `ListBuffer` 效率更高，但不要返回 `ListBuffer`，而应返回 `List`。这就像在 Java 中使用 `StringBuilder` 但最终返回一个
  `String` 一样。因此，默认使用不可变集合，使用可变数据结构时需附上理由。


  默认使用 `val`，只有在有充分理由并通过注释说明的情况下才使用 `var`。在你的方法中，除非会造成显著的性能损失，否则应使用 `val`。在方法中使用 `val`
  通常会引导你进行递归思考。以下代码展示了一个从 `BufferedReader` 中读取所有行的可变实现方法：


  ```

  def read1(in: java.io.BufferedReader): List[String] =

  var ret: List[String] = Nil

  var line = in.readLine

  while(line!=null)

  ret ::= line

  line = in.readLine

  ret.reverse

  ```


  这段代码可读性不错，但使用了几个 `var`。让我们重写这段代码，不使用 `var`，看看如何利用尾递归来实现 `while` 循环：


  ```

  def read2(in: java.io.BufferedReader): List[String] =

  val ret: List[String] = Nil

  doRead(in, ret)

  def doRead(in: java.io.BufferedReader, acc: List[String]):List[String] =

  in.readLine match

  case null => acc

  case s => doRead(in, s :: acc)

  doRead(in, Nil).reverse

  ```


  看，没有 `var` 了。你定义了 `doRead` 方法，它读取一行输入。如果该行为 null，则返回累积的 `List`。如果该行非 null，则使用累积的
  `List` 调用 `doRead`。由于 `doRead` 位于 `read2` 的作用域内，它可以访问 `read2` 的所有变量。`doRead` 在最后一行调用自身，这是一个尾调用。Scala
  编译器会将尾调用优化为 `while` 循环，因此无论读取多少行，都只会创建一个栈帧。`read2` 的最后一行以 `Nil` 作为累加器的初始值调用 `doRead`。


  在代码中使用 `val` 会促使你思考替代性的、不可变的、函数式的代码。这个小例子表明，移除 `var` 会引发重构。重构会带来新的编码模式。新的编码模式会改变你的编码方式。这种编码方式的转变会产生更具变革性的代码，这些代码缺陷更少，更易于维护。


  ## 保持方法简短


  如果你保持方法简短，那么当你或其他人查看代码时，每个方法中的逻辑就会更加清晰。看看你是否能用一行代码实现方法。如果不行，再看看是否能用一条语句实现。让我们看看如何将之前的代码改写成单条语句。


  ```

  def readLines(in:java.io.BufferedReader, acc:List[String]): List[String] =

  in.readLine match

  case null => acc

  case s => readLines(in,s :: acc)

  def read3(in: java.io.BufferedReader): List[String] =

  readLines(in,Nil).reverse

  ```


  当你编写 Scala 代码时，尽量让方法体不包含花括号。如果你无法以这种方式编写代码，你就必须向自己证明为什么你的方法应该超过一条语句。保持方法简短可以让你将单一逻辑封装在一个方法中，并让方法之间相互构建。这也能让你轻松理解方法中的逻辑。


  ## 使用 Option 替代空值检查


  使用 `Option` 的第一个好处显而易见：避免空指针异常。你永远不应该从方法中返回 null：永远、永远、永远不要。如果你调用的 Java 库可能因为输入问题返回
  null 或抛出异常，请将它们转换为 `Option`。你在将字符串解析为整数时已经这样做过。模式很简单：不要使用 null。


  当你编写代码时，请从代码中禁止 null。对于未初始化的实例变量，要么分配一个非 null 的默认值，要么如果存在变量在初始化之前可能被使用的代码路径，则使用
  `Option`，并将默认值设为 `None`。如果对于合法的输入，方法无法返回任何逻辑值，那么返回类型应为 `Option`。永远不应该在 `Option`
  上调用 `get` 方法。相反，应该使用 `map/flatMap`、`for` 推导式或模式匹配来解包 `Option`。


  第二个好处则更为微妙。使用 `Option` 以及映射 `Option` 的转换特性，会带来一种不同的代码风格。这种风格更具转换性，更具函数式特性。反复使用不可变数据结构会让你的思维转向函数式编程。你应该熟悉
  Java 中的空指针异常。例如，考虑以下 Java 方法：


  ```

  public Integer computeArea() { ... }

  ```


  这个 `computeArea` 方法，正如你所料，返回 `Int` 类型的面积，但它可能返回 null，而且仅通过查看方法签名你无法判断它是否会返回 null。正因为如此，Java
  方法的调用者不得不在代码中添加空值检查，如果调用者运气好，该方法实际上从未返回 null，那么这些空值检查只会让调用者的代码变得臃肿。Scala 通过彻底消除
  null 来解决这个问题，并为可选值（即可能存在也可能不存在的值）提供了一种新类型，通过 `Option` 类来实现。以下是你如何在 Scala 中编写一个可能返回值也可能不返回值的
  `computeArea` 方法：


  ```

  def computeArea: Option[Int] = { ... }

  ```


  `computeArea` 方法的返回类型是 `Option[Int]`，仅通过查看这个返回类型，`computeArea` 方法的调用者就会知道它可能不会总是返回一个
  `Int`。为了完整说明，`computeArea` 方法使用 `Some` 和 `None` 类型来决定返回什么，例如，在 `computeArea` 方法的一个实现片段示例中：


  ```

  computeArea match

  case Some(area) => ...

  case None => ...

  ```


  以这种方式使用的 `Option`、`Some` 和 `None` 是 Scala 独特特性的一部分。这就是 Scala 成为一流语言的原因。这也意味着，当一个
  Scala 函数总是返回一个值时，其返回类型不是 `Option` 类型，而是该方法返回的对象的类型。如果 Scala 函数从不返回 null，那么 Scala
  中为什么会有 Null 类型呢？我们在此稍作停顿，让你思考一下答案。很好，回答正确。Scala 支持 Null 类型是为了与 Java 兼容。`None` 是
  `Some` 的对应物，在你使用 Scala 的 `Option` 类来帮助避免空引用时使用。


  正如你在前几章中读到的，`Option` 的概念存在于不同的语言中，只是名称不同。在 Java 中，相同的概念被称为 `Optional`，大多数开发者使用它来减少
  `NullPointerException`。




  ## 无情重构


  起初，你可以像编写 Java 代码一样编写 Scala 代码。这是一个很好的起点。然后，开始应用你在本章前几节学到的惯用法。先从命令式代码开始。


  ```

  def validByAge(in: List[Person]): List[String] =

  var valid: List[Person] = Nil

  for (p <- in)

  if (p.valid) valid = p :: valid

  def localSortFunction(a: Person, b: Person) = a.age < b.age

  val people = valid.sort(localSortFunction _)

  var ret: List[String] = Nil

  for (p <- people)

  ret = ret ::: List(p.first)

  return ret

  ```


  将你的 `var` 转换为 `val`，如下所示：


  ```

  def validByAge(in: List[Person]): List[String] =

  val valid:ListBuffer[Person] = new ListBuffer // 转移了可变性

  for(p<- in)

  if (p.valid) valid += p

  def localSortFunction(a: Person, b:Person) = a.age < b.age then 1 else 0

  val people = valid.toList.sort(localSortFunction)

  val ret:ListBuffer[String] = new ListBuffer

  for(p<- people)

  ret += p.first

  ret.toList

  ```


  将可变数据结构转换为不可变数据结构。


  ```

  def validByAge(in: List[Person]): List[String] =

  val valid = for (p<- in if p.valid) yield p

  def localSortFunction(a: Person,b:Person) = a.age < b.age

  val people = valid.sort(localSortFunction _)

  for(p<- people) yield p.first

  ```


  将你的方法变成单个语句。


  ```

  def validByAge(in: List[Person]): List[String] =

  in.filter(_.valid).sort(_.age < _.age).map(_.first)

  ```


  虽然你可以认为这过于简洁，但你也可以用另一种方式重构它。


  ```

  def filterValid(in: List[Person]) = in.filter(p=> p.valid)

  def sortPeopleByAge(in: List[Person]) = in.sort(_.age < _.age)

  def validByAge(in: List[Person]): List[String] = (filterValid_ andThen sortPeopleByAge_)(in).map(_.name)

  ```


  无论你选择何种重构方式，代码中的业务逻辑都会更加清晰。重构也促使你思考代码中的转换，而不是代码中的循环结构。


  ## 组合函数与类


  在前面的例子中，你将 `filterValid` 和 `sortPeopleByAge` 组合成了一个函数。这个函数等同于下面所示：


  ```

  (in: List[Person]) =>sortPeopleByAge(filterValid(in))

  ```


  然而，这两个函数的组合产生的代码读起来就像它实际做的事情。你首先将方法变成了单个语句。这使得测试更容易，代码也更易读。接着，你通过将两个函数链接在一起，组合了一个新函数。函数式组合是
  Scala 后期阶段的特性，但它自然地从将方法变成单个语句的过程中产生。


  在第 7 章中，你探索了 Scala 的特质如何被组合成强大、灵活的类，这些类比 Java 类具有更好的类型安全性。随着你 Scala 编码技能的提升，并开始重构类而非方法时，开始在你的接口和特质中寻找公共方法。将方法从具体类移到特质中。很快，你可能会发现你的许多类中除了特定于该类的逻辑以及评估该逻辑所需的
  `val` 之外，几乎没有什么内容。一旦你的编码达到这个水平，你可能会发现你的特质是多态的，你的特质代表了可以应用于包含类型的逻辑，然后你可以确信你的思维已经完全转变为
  Scala 的思考方式了。


  一旦你开始用 Scala 思考，或者认为自己正在用 Scala 思考，你可能想要采取下一步的高级步骤，朝着最佳实践的目标前进。


  ## 总结


  设计和构建复杂的计算机软件是一项严肃的工作。我们的生计，乃至整个社会，都越来越依赖于我们互联计算机系统的稳定性和灵活性。我们的汽车、银行、杂货店、医院和警察部门都因为计算机系统的互联而运作得更好。这些系统运行在我们编写的软件之上。


  如果你想了解更多关于这个有趣话题的信息，我们建议查看 Effective Scala^(⁹⁰) 或 Scala 风格指南^(⁹¹) 的网站。


  我们希望你喜欢这段旅程，并且已经在思考关于设计软件和编写代码的新方法。我们想通过谈论一点架构来结束这段旅程。


  架构在整体系统性能和团队性能中非常重要。Scala 拥有许多工具，可以让你做出更好的架构决策。这有点像《禅与摩托车维修艺术》中的道理：你使用你的语言及其库所提供的最容易的模式。Scala
  使得编码人员实现架构稳固的设计比 Java 或 Ruby^(⁹²) 更容易。




