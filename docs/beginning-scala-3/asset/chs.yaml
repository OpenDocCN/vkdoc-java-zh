  | `HashSet/HashMap` | 不可变 | eC | eC | eC | L |

  | `TreeSet/TreeMap` | 不可变 | Log | Log | Log | Log |

  | `BitSet` | 不可变 | C | L | L | eC |

  | `VectorMap` | 不可变 | eC | eC | aC | L |

  | `ListMap` | 不可变 | L | L | L | L |

  | `HashSet/HashMap` | 可变 | eC | eC | eC | L |

  | `WeakHashMap` | 可变 | eC | eC | eC | L |

  | `BitSet` | 可变 | C | aC | C | eC |

  | `TreeSet` | 可变 | Log | Log | Log | Log |


