  \ 网站上的官方文档^(⁶³)提供了关于所有命令的详细信息。\n\n\n\n### 创建 Hello World 项目\n\n现在你已经了解了一些常用命令，是时候创建你的第一个项目来实际体验\
  \ SBT 了。你可以使用简单的 SBT 命令创建项目，也可以使用 Giter8 上提供的项目骨架。Giter8 为最常见的应用程序（Spark、Akka、Play、Scala\
