    ### 继承


    继承是一种常见的方式，指从另一个类或特质扩展功能。Scala 与 Java 一样，不支持多重继承，但你可以从多个特质进行扩展。在 Java 中，你可以实现多个接口。


    从另一个类扩展的方式是使用关键字`extends`，后跟类名。


    ```

