    ## Summary


    This chapter showed how Scala is translated to Java, which is especially important
    if you call Scala code from Java. You learned that in most cases, Scala features
    are translated to Java features so that Scala can easily integrate with Java.
    You learned how to handle features that are available in Java but not in Scala,
    such as static members and checked exceptions, and how to use Scala features such
    as traits in Java code. You also learned how Scala annotations help in integration,
    such as by generating JavaBean-style `get` and `set`. Scala code is often used
    in tandem with large Java programs and frameworks.


    # 10. DSL and Parser Combinator


    A domain-specific language (DSL) is a special-purpose language designed to express
    solutions to problems that belong to a particular problem domain. DSLs have an
    advantage over a general-purpose language such as Scala and Java. Unfortunately,
    these general-purpose languages have drawbacks. For example, if you want to execute
    a task on a database, then it is necessary to write a computer program to execute
    this task using a general-purpose language. However, a DSL could be used to perform
    several such tasks on a database. And this is why some experts regard SQL as a
    DSL. The scope of this chapter is to introduce you to the world of DSLs and how
    they interact with Scala.


    Some well-known examples of DSLs include ErlangOTP^([^(35)](#fn35)), HTML, SQL,
    Verilog^([^(36)](#fn36)), Mathematica^([^(37)](#fn37)), YACC^([^(38)](#fn38)),
    Xpath^([^(39)](#fn39)), CSS^([^(40)](#fn40)), YAML^([^(41)](#fn41)), MATLAB^([^(42)](#fn42)),
    and ANT.'
