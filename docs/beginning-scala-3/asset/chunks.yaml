    #### 给定与导入


    正如你在上一节中所读到的，使用 `given` 语句的限制之一是需要处于同一作用域内。Scala 3 提供了一种导入并将其包含在同一作用域中的方法。


    ```

    object A:

    val name = "0"

    def hello(s: String) = s"$s, hello from $name"

    class A1

    class A2

    class A3

    given a1: A1 = A1()

    given a2: A2 = A2()

    given a3: A3 = A3()

    ```


    让我们看看导入 `given` 语句的一些可能方式：


    ```

    import A.{given _} // 仅导入 given 语句

    import A.{given a1} // 显式导入 a1

    import A.{given _, _} // 导入 A 中的所有内容

    import A._ // 导入除 given 语句外的所有内容

    import A.*       // 导入除 given 语句外的所有内容

    import A.given   // 仅导入 given 语句

    ```


    使用这种类型的导入，你可以显式地声明在你的类或对象中需要使用哪些内容。


    #### 使用子句


    在 Scala 中，并不需要显式地向方法传递参数。在 Scala 的早期版本中，此功能直接与 `implicit` 关联，但在 Scala 3.x.x 中，同样的功能有了一个名为
    `using` 的新关键字。


    为了很好地解释这个概念，让我们创建一些排序类型。


    ```

    trait Ord[T]:

    def compare(x: T, y: T): Int

    extension (x: T) def  (y: T) = compare(x, y) > 0

    given intOrd: Ord[Int] with

    def compare(x: Int, y: Int) =

    if x  y then +1 else 0

    given listOrdT: Ord[List[T]] with

    def compare(xs: List[T], ys: List[T]): Int = (xs, ys) match

    case (Nil, Nil) => 0

    case (Nil, _) => -1

    case (_, Nil) => +1

    case (x :: xs1, y :: ys1) =>

    val fst = ord.compare(x, y)

    if fst != 0 then fst else compare(xs1, ys1)

    ```


    现在创建一个接收数字并根据排序类型获取最大值的方法。


    ```

    def maxT(using ord: Ord[T]): T =

    if ord.compare(x, y) < 0 then y else x

    ```


    如你所见，你的方法接收两个相同类型的参数，并且没有使用特定的 `Ord` 类型，你可以在调用代码的其他部分时定义它。


    ```

    scala> max(1, 9)(using intOrd)

    val res8: Int = 9

    scala> max(List(2,5, 1), List(1,2,3))(using listOrd)

    val res11: List[Int] = List(2, 5, 1)

    ```


    ## 总结


    在本章中，你学习了 Scala 关于型变、类型边界以及 `given`/`using` 类的规则。


    # 9. Scala 与 Java 互操作性


    本章描述了 Scala 如何被翻译成 Java，以及 Java 注解在 Scala 框架中的使用。本章的目标是向你展示如何轻松地将 Scala 与 Java
    集成。你还将学习 Scala 注解如何帮助集成，例如在生成 JavaBean 风格的 getter 和 setter 时。


    ## Scala 概览


    Scala 的主要设计目标之一是在 JVM 上运行并提供与 Java 的互操作性。当你想要使用现有的 Java 库或框架时，就会产生对 Scala 和 Java
    互操作性的需求。Scala 代码通常与大型 Java 程序和框架一起使用。尽管在大多数情况下与 Java 集成很容易，但我们鼓励你尽可能多地使用纯 Scala。当你使用
    Java 库或框架时，首先尝试寻找 Scala 中的等价物。如果没有可用的等效 Scala 库，则使用 Java。


    Scala 被编译成 Java 字节码，你可以使用像 Java 类文件反汇编器 `javap` 这样的工具来反汇编 Scala 编译器生成的字节码。通过在
    JVM 上运行，你可以利用构建在其他 JVM 语言中的所有框架和工具。在大多数情况下，Scala 特性会被翻译成 Java 特性，以便 Scala 可以轻松地与
    Java 集成。然而，一些 Scala 特性并不能直接映射到 Java，在这种情况下，你必须学习如何处理 Java 中有但 Scala 中没有的特性。Java
    中有但 Scala 中没有的特性是静态成员和受检异常。Scala 中有但 Java 中没有的特性示例是特质。如果你从 Scala 中使用 Java，你必须处理
    Scala 世界中禁止的可变性、异常和空值。因为 Scala 可以与 Java 无缝协作，大多数时候你可以组合使用这两种语言而无需过多担心。


    请注意，在撰写本文时，Java 的长期支持（LTS）版本是 11，这意味着新版本的 Java 可能会出现新特性，这些特性在某种程度上与 Scala 兼容。


    ## 将 Java 类翻译成 Scala 类


    Scala 类和 Java 类之间的互操作性使得用 Scala 类替换或扩展现有的 Java 类变得简单直接。以下代码展示了 Java 中的 `class`
    声明。


    ```

    public class Book {}

    ```


    以下是 Scala 代码：


    ```

    class Book

    ```


    正如你在第 3 章中学到的，当没有内容时不需要花括号，并且在 Scala 中默认一切都是公开的。


    现在定义一个带有构造函数的 Java 类，该构造函数将实例变量与访问器绑定。


    ```

    public class Book {

    private final int isbn;

    private final String title;

    public Book(int isbn, String title) {

    this.isbn = isbn;

    this.title = title;

    }

    public int getIsbn() {

    return isbn;

    }

    public String getTitle() {

    return title;

    }

    }

    ```


    如你所见，构造函数将实例变量 `isbn` 和 `title` 与访问器 `getIsbn` 和 `getTitle` 绑定。让我们看看 Scala 中的等价写法。


    ```

    class Book(val isbn: Int, val title: String)

    ```


    在 Java 14 或更高版本中，记录（record）出现了，这大大减少了这段代码，使其与 Scala 中的代码相似。你唯一需要考虑的是，记录不能以任何方式被扩展。


    ```

    public record Book (int isbn, String title) {}

    ```


    正如你在上面的 Scala 代码中看到的，添加 `val` 会使构造函数参数绑定到同名字段。以下代码展示了带有调用父类构造函数的 Java 类 `NonFiction`：


    ```

    public class NonFiction extends Book {

    public NonFiction(int isbn, String title) {

    super(isbn, title);

    }

    }

    ```


    以下是 Scala 中的等价写法：


    ```

    class NonFiction (isbn: Int, title: String) extends Book(isbn, title)

    ```


    如你所见，主构造函数放在声明中。那么多个构造函数呢？你将在下一节中看到它们。让我们比较一下 Java 和 Scala 中的可变和不可变实例变量。这段代码展示了
    Java 中的可变实例变量：


    ```

    public class Book {

    private String title = "Beginning Scala";

    public String getTitle() {

    return title;

    }

    public void setTitle(String t) {

    title = t;

    }

    }

    ```


    这段代码展示了 Scala 中的等价写法：


    ```

    class Book:

    var  title = "Beginning Scala"

    ```


    如你所见，只需在类体中编写 `var` 就定义了一个可变字段。现在让我们看看 Java 和 Scala 中的不可变实例变量。这段代码展示了 Java 中的不可变实例变量：


    ```

    public class Book {

    private final int isbn = 999;

    public int getIsbn() {

    return isbn;

    }

    }

    ```


    这段代码展示了 Scala 中的等价写法：


    ```

    class Book:

    val isbn = 999

    ```


    你可能已经注意到，`isbn` 也是一个访问器方法的名称。


    ### 将 Java 导入翻译成 Scala 导入


    两种语言中的导入是相似的；它们只改变了一些语法部分。Scala 引入了一个特性，允许你使用花括号仅导入一个包中的特定类，就像 Kotlin 等其他流行语言一样。


    来自不同包的 Java 导入：


    ```

    import com.modA.ClassA;

    import com.modB.ClassB1;

    import com.modB.ClassB2;

    import com.modC.*;

    ```


    Scala 中的等价写法：


    ```

    import com.modA.ClassA;

    import com.modB.{ClassB1, ClassB2} // 你可以将来自同一包的多个导入堆叠在花括号中。

    import com.modC._ // Scala 导入中的下划线等同于 Java 导入中的星号。

    ```

