    ## Java 接口与 Scala 特质


    Java 类无法继承包含已实现方法的 Scala 特质（有关特质的更多细节，请参见第 7 章）。为了理解这个问题，我们先来看一个常规的 Java 接口。


    ```

    public interface Book {

    public boolean isBestSeller();

    }

    ```


    其 Scala 等价形式如下：


    ```

    trait Book:

    def isBestSeller: Boolean

    ```


    如你所见，`isBestSeller` 是一个抽象方法。在 Scala 中，方法使用 `def` 关键字声明。但 Scala 代码中的 `isBestSeller`
    是一个抽象方法。如何在 Scala 中表示抽象方法？在 Scala 中，如果没有 `=` 赋值，那么使用 `def` 关键字声明的方法或使用 `val` 关键字声明的函数都是抽象的。例如，我们来看一个返回某个值的
    Java 方法。


    ```

    public String someMethod(int arg1, boolean arg2) {

    return "voila";

    }

    ```


    其 Scala 等价形式如下所示。


    ```

    def someMethod(arg1: Int, arg2: Boolean): String = "voila"

    ```


    如你所见，`=` 表示方法的实现。


    现在让我们来看一个抽象的 Java 方法。


    ```

    abstract int doTheMath(int i);

    ```


    以下是抽象 Java 方法 `doStuff` 的 Scala 等价形式：


    ```

    def doTheMath(i: Int): Int

    ```


    注意


    如果没有使用 `=` 提供定义，那么该方法自动成为抽象方法。


    现在让我们回到最初的问题。Java 类无法继承包含已实现方法的 Scala 特质。因此，如果你试图从 Java 中使用一个包含已实现方法的 Scala 特质，就会遇到问题。为了演示这个问题，首先创建一个包含名为
    `add` 的简单已实现方法的特质。


    ```

    trait Computation:

    def add(a: Int, b: Int) = a + b

    ```


    你已经编写了一个包含已实现方法的 Scala 特质，并且需要能够从 Java 应用程序中使用 `add` 方法，如下所示：


    ```

    public class DoTheMath {

    public static void main(String[] args) {

    DoTheMath d = new DoTheMath();

    // 在这里进行数学运算

    }

    }

    ```


    `Computation` 类型不能成为 Java 类 `DoTheMath` 的超类，原因很简单：Java 中的超类必须是一个类；也就是说，Java 类
    `DoTheMath` 不能使用 `extend` 关键字来继承 `Computation`。此外，Java 类 `DoTheMath` 也不能实现特质 `Computation`，因为在
    Java 中你实现的是接口，而特质 `Computation` 包含已实现的行为，因此 `Computation` 不像一个常规的 Java 接口。为了能够从
    Java 类 `DoTheMath` 中使用 Scala 特质 `Computation` 的已实现方法 `add`，你必须将特质 `Computation`
    包装在一个 Scala 类中。以下代码展示了一个包装了特质 `Computation` 的 Scala 类：


    ```

    class JavaInteroperableComputation implements Computation

    ```


    现在，Java 类 `DoTheMath` 可以继承 Scala 类 `JavaInteroperableComputation` 并访问 `add` 方法。


    ```

    public class DoTheMath extends JavaInteroperableComputation {

    public static void main(String[] args) {

    DoTheMath d = new DoTheMath();

    d.add(3,1);

    }

    }

    ```


    注意


    为了 Java 调用者，请将包含已实现行为的 Scala 特质包装在 Scala 类中。


    ## Java 静态成员与 Scala 对象


    Java 代码经常使用 `static` 关键字来实现单例对象，如下所示：


    ```

    public class Book{

    private static Book book;

    private Book() {}

    public static synchronized Book getInstance() {

    if (book == null) {

    book = new Book();

    }

    return book;

    }

    }

    ```


    Scala 中没有 `static` 这种东西。在 Java 中，`static` 不属于对象，不能被继承，也不参与多态，因此 `static` 不是面向对象的。而
    Scala 是纯面向对象的。Scala 不支持 `static`，但提供了对象的概念来代替类声明。如果你需要将上述 Java 代码重构为 Scala，只需使用对象声明代替类声明，如下所示：


    ```

    object Book

    ```


    Scala 对象为你提供了一个额外优势：它们也可以扩展接口和特质。Scala 提供了一种特殊语法，让你无需声明单例所需的所有语法（参见上面的 Java 代码）即可免费获得一个单例。但是，如果你想混合使用静态成员和实例成员呢？在
    Java 中，你可以这样做：


    ```

    public class Book {

    public String getCategory() {

    return "Non-Fiction";

    }

    public static Book createBook() {

    return new Book();

    }

    }

    ```


    除了对象的概念，Scala 还提供了伴生对象的概念，它由一个与同名的类共存于同一包和文件中的对象组成。有关伴生对象的更多信息，请参见第 3 章。伴生对象可以存储静态方法，并且通过它，你可以完全访问类的成员，包括私有成员。Scala
    允许你声明同名的对象和类，将静态成员放在对象中，将实例成员放在类中。上面 Java 代码的 Scala 等价形式如下：


    ```

    class Book:

    def getCategory() = " Non-Fiction"

    object Book:

    def createBook() = Book()

    ```


    ## 处理异常


    你可以定义如下所示的 Scala 方法，而无需声明它会抛出异常：


    ```

    class SomeClass:

    def aScalaMethod() =

    throw new Exception("Exception")

    ```


    然后可以从 Java 中调用此方法，如下所示：


    ```

    public static void main(String[] args) {

    SomeClass s = new SomeClass();

    s.aScalaMethod();

    }

    ```


    然而，当 Java 开发者调用 `aScalaMethod` 时，未捕获的异常会导致 Java 方法失败：


    ```

    [error] (run-main) java.lang.Exception: Exception!

    java.lang.Exception: Exception!

    at SomeClass.aScalaMethod

    ```


    如果你没有使用 `@throws` 注解标记 `aScalaMethod` 方法，Java 开发者可以在其方法中不使用 `try/catch` 块，也不声明其方法会抛出异常的情况下调用它。


    对于 Scala 方法的 Java 调用者，请为你的 Scala 方法添加 `@throws` 注解，这样他们就能知道哪些方法可能抛出异常以及会抛出什么异常。例如，以下代码展示了如何添加
    `@throws` 注解，让调用者知道 `aScalaMethod` 方法可能会抛出异常。


    ```

    class SomeClass:

    @throws(classOf[Exception])

    def aScalaMethod() =

    throw new Exception("Exception")

    ```


    你添加了注解的 Scala 方法的工作方式与抛出异常的 Java 方法完全相同。如果你尝试从 Java 类中调用 `aScalaMethod`，而没有将其包装在
    `try/catch` 块中，或者没有声明你的 Java 方法会抛出异常，编译器（或你的 IDE）将会报错。


    在你的 Java 代码中，像往常一样编写一个 `try/catch` 块来处理异常。


    ```

    SomeClass = new SomeClass();

    try {

    s.aScalaMethod();

    } catch (Exception e) {

    System.err.println("捕获到异常。");

    e.printStackTrace();

    }

    ```

