- fmt: '# Focusing on Immutability


    In Java, mutability is the default. Variables are mutable unless they’re marked
    `final`. JavaBeans have getters and setters. Data structures in Java are instantiated,
    set, and passed along to other methods. Try changing the paradigm in your Scala
    code.


    The first thing to do is to use immutable collections classes by default. If you
    choose to use a mutable collections class, make a comment in your code as to why
    you chose it. There are times when mutable collections make sense. For example,
    in a method where you are building a `List`, using `ListBuffer` is more efficient,
    but don’t return the `ListBuffer`; return the `List`. This is like using a `StringBuilder`
    in Java but ultimately returning a `String`. So, use immutable collections by
    default, and use mutable data structures with a justification.


    Use `vals` by default, and only use `vars` if there is a good reason that is justified
    by a comment. In your method, use `val` unless there’s going to be a significant
    performance hit. Using `val` in methods often leads to thinking recursively. The
    following code shows a mutable implementation of a method that consumes all the
    lines from a `BufferedReader`:


    ```

    def read1(in: java.io.BufferedReader): List[String] =

    var ret: List[String] = Nil

    var line = in.readLine

    while(line!=null)

    ret ::= line

    line = in.readLine

    ret.reverse

    ```


    The code is readable but uses a couple of `vars`. Let’s rewrite the code without
    `vars` and see how you can use tail recursion to give you a `while` loop:


    ```

    def read2(in: java.io.BufferedReader): List[String] =

    val ret: List[String] = Nil

    doRead(in, ret)

    def doRead(in: java.io.BufferedReader, acc: List[String]):List[String] =

    in.readLine match

    case null => acc

    case s => doRead(in, s :: acc)

    doRead(in, Nil).reverse

    ```


    Look ma, no `vars`. You define the `doRead` method, which reads a line of input.
    If the line is null, you return the accumulated `List`. If the line is non-null,
    you call `doRead` with the accumulated `List`. Because `doRead` is in the scope
    of `read2`, it has access to all of `read2`’s variables. `doRead` calls itself
    on the last line, which is a tail call. The Scala compiler optimizes the tail
    call into a `while` loop, and there will only be one stack frame created no matter
    how many lines are read. The last line of `read2` calls `doRead` with `Nil` as
    the seed value for the accumulator.


    Using `vals` in your code makes you think about alternative, immutable, functional
    code. This small example demonstrates that removing `vars` leads to refactoring.
    The refactoring leads to new coding patterns. The new coding patterns lead to
    a shift in your approach to coding. This shift in approach yields transformative
    code that has fewer defects and is easier to maintain.


    # Keeping Methods Short


    If you keep methods short, then the logic in each method is more obvious when
    you or someone else looks at the code. See whether you can code methods in a single
    line. If not a single line, see whether you can code them in a single statement.
    Let’s see how the previous code can be made into single statements.


    ```

    def readLines(in:java.io.BufferedReader, acc:List[String]): List[String] =

    in.readLine match

    case null => acc

    case s => readLines(in,s :: acc)

    def read3(in: java.io.BufferedReader): List[String] =

    readLines(in,Nil).reverse

    ```


    When you code Scala, try not to have curly braces around the method body. If you
    can’t write your code this way, you have to justify to yourself why your method
    should exceed a single statement. Keeping methods short allows you to encapsulate
    a single piece of logic in a method and have methods that build upon each other.
    It also allows you to easily understand the logic in the method.


    # Using Options Instead of Null Testing


    The first benefit of using `Option` is the obvious avoidance of null pointer exceptions.
    You should never return null from a method: never, never, never. If you are calling
    Java libraries that may return null or throw an exception because of input problems,
    convert them to `Options`. You did this for parsing Strings to Ints. The pattern
    is basic: no nulls.


    When you write code, ban null from your code. In the case of uninitialized instance
    variables, either assign a default value that is not null or, if there’s a code
    path where the variable could be used prior to initialization, use `Option`, and
    the default value becomes `None`. If there’s no logical value that can be returned
    from a method given legal input, the return type should be `Option`. The `get`
    method should never be called on an `Option`. Instead, `Options` should be unpacked
    using `map`/`flatMap`, the `for` comprehension, or pattern matching.


    The second benefit is a little subtler. The use of `Option` and the transformative
    nature of mapping `Options` leads to a different style of code. The style is more
    transformative, more functional. The impact of repeatedly using immutable data
    structures will move your brain toward the functional side. You should be familiar
    with null pointer exceptions in Java. For example, consider the following Java
    method:


    ```

    public Integer computeArea() { ... }

    ```


    This `computeArea` method returns, as you might expect, the area of type `Int`,
    but it might return null, and you cannot tell just by looking at the method that
    it might return null. Because of this, the caller of the Java method is obliged
    to put null checks in their code and, if the caller is lucky and the method never
    actually returns null, the null checks merely clutter the caller’s code. Scala
    solves this problem by getting rid of null altogether and provides a new type
    for optional values, that is, values that may or may not be present by means of
    the `Option` class. Here’s how you can write a `computeArea` method in Scala that
    may or may not return a value:


    ```

    def computeArea: Option[Int] = { ... }

    ```


    The return type of the `computeArea` method is `Option[Int]` and merely by looking
    at this return type, the caller of the `computeArea` method will know that it
    may not always return an `Int`. And to complete the picture, the `computeArea`
    method uses `Some` and `None` types to determine what to return, for example,
    in one implementation fragment example of the `computeArea` method:


    ```

    computeArea match

    case Some(area) => ...

    case None => ...

    ```


    `Option`, `Some`, and `None` used in this way are part of the unique features
    of Scala. It’s how Scala is a state-of-the-art language. This also means that
    when a Scala function always returns a value, its return type is not an `Option`
    type but the type of the object that the method returns. If the Scala function
    never returns null, why is there a `Null` type in Scala? We take a brief pause
    here to let you envisage the answer. Good, that’s correct. Scala supports `Null`
    types for compatibility with Java. `None` is the counterpart to `Some`, used when
    you’re using Scala’s `Option` class to help avoid null references.


    As you read in previous chapters, the concept of `Option` exists in different
    languages but with another name. In Java, the same concept has the name of `Optional`
    and most developers use it to reduce `NullPointerExceptions`.'
