- fmt: '# Enumerations


    Enumerations (enums) are not a new feature in Scala 3. In fact, they exist in
    Scala 2 but they are not simple to use, so many developers do not use them a lot.
    This was one of the main reasons why Martin Odersky and Scala’s team decided to
    refactor the entire feature to give it a new face.


    So what is an enumeration? An enumeration is a way to group a set of contents
    that have the same relationship. An example of the use of enumeration is information
    that has certain defined values in a person like gender or marital status.


    ```

    enum Genre:

    case MALE, FEMALE, NO_BINARY

    enum MaritalStatus:

    case SINGLE, MARRIED, DIVORCED

    ```


    The way to define an enumeration is simple. You only need to use the keyword `enum`.
    To specify the possible values, you need to use the keyword `case`.


    Now is time to use this constant in a simple way. Let’s create a class named `Person`
    that has two parameters in the constructor.


    ```

    scala> val anna = Person(Genre.FEMALE, MaritalStatus.SINGLE) ass Person(genre:
    Genre, maritalStatus: MaritalStatus):

    override def toString() = s"Genre: $genre - Marital status: $maritalStatus"

    ```


    The next step is to create an instance of the class, passing the values, and to
    print the result.


    ```

    scala> val anna = Person(Genre.FEMALE, MaritalStatus.SINGLE)

    val anna: Person = Genre: FEMALE - Marital status: SINGLE

    scala> println(anna.toString())

    Genre: FEMALE - Marital status: SINGLE

    ```


    Having all possible values in one place is great but what happens if you don’t
    want to persist the entire String in the database? To solve this problem, enums
    let you pass variables that represent one value. Let’s change the `Gender` enum
    to show each possible value.


    ```

    enum Genre(val code: Int):

    case MALE extends Genre(1)

    case FEMALE extends Genre(2)

    case NO_BINARY extends Genre(3)

    ```


    If you want to know the code of one of the values of the enum, you only need to
    call the field `code`.


    ```

    scala> println(Genre.MALE.code)

    ```


    Enums give you by default a set of methods or operations to interact with the
    values. They are shown in Table 7-2.


    **Table 7-2** Enumeration Operations


    | Method | Description | Example |

    | --- | --- | --- |

    | `ordinal` | A unique integer associated with each possible value that appears
    | `scala> println(Genre.MALE.ordinal) 0` |

    | `values` | To obtain as an Array all possible values | `scala> Genre.values
    val res0: Array[Genre] = Array(MALE, FEMALE, NO_BINARY)` |

    | `fromOrdinal` | Obtains the value in the enum from an ordinal position | `scala>
    Genre.fromOrdinal(2) val res1: Genre = NO_BINARY` |

    | `valueOf` | Obtains the value in the enum from a string | `scala> Genre.valueOf("MALE")
    val res2: Genre = MALE` |


    Note that enums in Scala are not the same as in Java. It is the same situation
    that happens with collections, so to obtain great performance, try to not use
    it.


    The way to use an enum from Java is to extend and parametrize with the type.


    ```

    scala> enum Genre extends Enum[Genre]:

    |     case MALE, FEMALE, NO_BINARY

    // defined class Genre

    ```


    As you can see, enumerations can help reduce duplicate code or keep all possible
    values of something in one place. Try to use them only when you have a finite
    and small number of values.


    ## Algebraic Data Types in Enums


    ADT (algebraic data types) is a classification where you can define a set of values
    enumerating all the values that it contains. Enums support the use of ADTs and
    add specific methods. Let’s see this concept with a simple example.


    ```

    scala> enum Options[+T]:

    |   case Some(x: T)

    |   case None

    // defined class Options

    ```


    As you can see, `Options` is a parametrized enum with two simple cases. The way
    to use it is simple, as with any common enum.


    ```

    scala> Options.Some(1)

    val res6: Options[Int] = Some(1)

    scala> Options.None

    val res7: Options[Nothing] = None

    ```


    You can create a custom method to interact with the different values, as you do
    with a common enumeration.


    ```

    scala> enum Options[+T]:

    |     case Some(x: T)

    |     case None

    |

    |     def isDefined: Boolean = this match

    |       case None => false

    |       case _    => true

    |

    // defined class Options

    ```


    The way to invoke the method in the enumeration is simple. You just call the method
    of a particular value.


    ```

    scala> Options.None.isDefined

    val res8: Boolean = false

    ```


    ## Union and Intersection Types


    These are new features that appear in Scala 3 to combine different things.


    Union types let you receive, return, or interact in some way with different types.
    Let’s see this concept with a practical example. Create a method that returns
    two possible types depending on one parameter.


    ```

    scala> class Car

    | class Boat

    scala> def createVehicle(vehicleType: Int): Car | Boat =

    |     vehicleType match

    |         case 1 => Car()

    |         case _ => Boat()

    def createVehicle(vehicleType: Int): Car | Boat

    ```


    Note that the order of classes in the union type does not have a particular constraint.
    You can invert the order and the code will perform the same way.


    ```

    scala> def createVehicle(vehicleType: Int): Boat | Car =

    |     vehicleType match

    |         case 1 => Car()

    |         case _ => Boat()

    def createVehicle(vehicleType: Int): Boat | Car

    ```


    When you invoke the method and pass the parameters, you get the concrete instance
    of one particular class.


    ```

    scala> val vehicle = createVehicle(1)

    val vehicle: Car | Boat = Car@11ce721f

    ```


    Union types are ideal when you need to return or pass more than one type, but
    when more types are added to the code, the complexity grows.


    Intersection types are not so different from union types. The idea behind the
    intersection type is to combine the functionality of two or more different types.


    ```

    scala> trait Printable:

    |     def print() =

    |         println("print")

    |

    | trait Status:

    |     def isEnable() =

    |         println("isEnable")

    |

    | class Component extends Printable, Status

    |

    | def checkComponent(x: Printable & Status) =

    |     x.print()

    |     x.isEnable()

    // defined trait Printable

    // defined trait Status

    // defined class Component

    def checkComponent(x: Printable & Status): Unit

    ```


    In the example, `checkComponent` needs to receive something that contains both
    traits to use the methods inside. This approach is a good way to not directly
    specify one concrete class or another trait. It says, “Send me something that
    contains both traits.”


    Now let’s see what happens when you create an instance of the class `Component`.


    ```

    scala> val component = Component()

    scala> checkComponent(component)

    print

    isEnable

    ```


    As you can see, everything works well, but if you send something that does not
    cover both traits, an exception will appear.


    ```

    scala> class Button extends Printable

    scala> val button = Button()

    scala> checkComponent(button)

    1 |checkComponent(button)

    |               ^^^^^^

    |               Found:    (button : Button)

    |               Required: Printable & Status

    ```


    ## Summary


    This chapter shows how traits work and how to use them. You saw how a trait encapsulates
    method and field definitions, which can then be reused by mixing them into classes.
    You saw that traits are similar to multiple inheritances, but they avoid some
    of the difficulties of multiple inheritances.


    In this chapter, you explored the advantages of enumerations in Scala to reduce
    the complexity when you have several values connected in some way. Also, you learned
    different ways to combine methods or parameters in the code using union and intersection
    types.'
