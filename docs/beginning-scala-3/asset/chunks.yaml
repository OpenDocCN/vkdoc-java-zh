  trans: '

    ## 关键字


    每种语言都有一定数量的专属关键字，用于表示某种指令。其中大部分关键字不能用作变量或类的名称。表 2-8 中的列表为你概述了一些关键字。其中大部分会出现在本章及后续章节中。


    表 2-8


    Scala 中的重要关键字


    | 单词 | 描述 |

    | --- | --- |

    | `abstract` | 使方法或类成为抽象，这意味着你不能直接实例化；你需要使用一个具体的类。 |

    | `case` | 一个 `match` 块中每个可能的选项。也用于在拥有抽象类时声明一个具体的 case。 |

    | `catch` | 用于捕获 `try` 块中出现的异常并执行相应操作 |

    | `class` | 定义一个新类，该类可以包含方法和变量 |

    | `def` | 开始声明一个方法 |

    | `do` | 遍历集合或范围的另一种方式 |

    | `else` | 与关键字 `if` 配合使用。当条件为假时，执行此代码块。 |

    | `end` | 用于指示特定代码块的结束，例如在 `if/else` 中 |

    | `Enum` | 专门用于声明枚举 |

    | `extends` | 表示该类或特质（trait）有一个超类型 |

    | `false` | 布尔变量的可能值之一 |

    | `final` | 你可以使用此关键字表示一个类/方法/变量不能被重写。 |

    | `finally` | 此代码块与 `try/catch` 块关联，并且在 try/catch 操作的逻辑执行完毕后始终执行。 |

    | `for` | 声明一个迭代的开始 |

    | `given` | 声明一个可在其他部分使用的代码块。它与关键字 `using` 关联。 |

    | `if` | 开始声明一个条件块 |

    | `implicit` | 指代声明和使用关键字 `given` 和 `using` 的旧方式 |

    | `import` | 用于将一个或多个方法或类引入当前作用域 |

    | `lazy` | 用于延迟变量的求值 |

    | `match` | 表示一个包含多个备选分支的代码块，具体取决于某个值。你可以将其视为 Java 或 C++ 等其他语言中的 `switch`。 |

    | `new` | 创建一个类的新实例。在 Scala 3 中，此关键字的使用是可选的 |

    | `null` | 用于表示一个变量没有特定的值 |

    | `object` | 用于声明一个只有一个实例的类。你可以将其视为单例（Singleton）。 |

    | `override` | 你可以使用此关键字重写一个未被标记为 `final` 的方法。 |

    | `package` | 声明一个包的名称，该包包含一些类/枚举/文件 |

    | `private` | 限制声明的可见性。只有同一个类中的逻辑可以直接访问它。 |

    | `protected` | 限制声明的可见性。只有同一个类或子类中的逻辑可以直接访问它。 |

    | `return` | 用于指示方法的返回值 |

    | `super` | 指代超类中存在的方法或部分逻辑 |

    | `then` | 在 `if` 结构中，此关键字替代花括号 {}，并且仅在条件为真时执行。 |

    | `this` | 指代使用同一个类中声明的方法或变量 |

    | `throw` | 抛出异常 |

    | `trait` | 将声明指示为抽象类型。你可以将此关键字视为 Java 中*接口（interfaces）*的等价物。 |

    | `true` | 布尔变量的可能值之一 |

    | `try` | 声明一个在执行过程中可能产生异常的代码块的开始 |

    | `using` | 它是隐式（implicit）子句的替代方案。 |

    | `val` | 将变量声明为不可变的，并且是只读的。 |

    | `var` | 将变量声明为可变的，因此你可以读取或写入此变量。 |

    | `while` | 这是遍历集合或值范围的另一种方式。 |

    | `with` | 用于包含一个特定的*特质（trait）* |

    | `=` | 用于给变量赋值 |

    | `@` | 标记一个注解的开始 |


    ## 总结


    在本章中，你学习了如何定义和使用 Scala 的常见结构和变量。这些方面是理解本书其余内容的关键，因为它们中的大部分会出现在不同章节中，用于解释特定功能。以下是本章中一些最重要的要点：


    *   你可以使用关键字 `val` 创建只读变量。如果你需要创建内容可修改的变量，请使用 `var`。


    *   字符串是驻留在同一位置的多个字符。此类型为你提供了大量方法来以不同方式操作该值。


    *   使用 Java 提供的类，你可以使用不同的格式和不同的精度级别来操作日期。


    *   `Array` 和 `List` 是创建包含多个元素（所有元素类型相同）的结构的两种方式。


    *   `if/else` 表达式非常适合根据一个或多个条件在代码中创建分支。如果 `if/else` 表达式的数量变得复杂，请考虑使用 `match` 表达式。


    *   有多种遍历数组或集合的方法，例如 `for` 或 `while` 循环。对于 `while` 循环，用于验证循环的条件需要在某个时刻变为假。


    *   `Try/catch` 块非常适合缓解与代码中可能出现的任何异常相关的问题。


    *   注释是为复杂代码块提供更多细节的好方法。注释有两种类型：多行注释或单行注释。


    *   当你拥有复杂的代码块或整个应用程序时，你需要使用 `@main` 来执行代码。


    脚注 1


    # 3. 面向对象建模


    许多语言提供了不同的建模方式，使用结构来表示现实世界中特定问题的解决方案。使用 Scala，你可以使用两种建模方法：面向对象编程（OOP）和函数式编程（FP）。它们共享一些具有不同含义的结构，但其思想是定义属性和行为。正如你在前一章中读到的，像
    Java、JavaScript、Python、C++、C#、Ruby 和 PHP 这样的语言默认使用 OOP 作为建模选项或范式。

    '
- fmt: "# Concepts of OOP\n\nOOP can be summarized by four different aspects, which\
    \ differentiate from other paradigms:\n\n![../images/328789_3_En_3_Chapter/328789_3_En_3_Fig1_HTML.jpg](images/328789_3_En_3_Chapter/328789_3_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nBoth exporters have concrete logic but share common logic to create\
    \ a file\n\n- **Abstraction**: This concept represents the complexity of a problem\
    \ using objects, fields, and methods. You can have all the logic for solving a\
    \ situation in one structure without sharing the details of the implementation.\
    \ You can imagine these concepts as one part of your car. You know the expected\
    \ behavior when you turn on the lights, but you don’t know what happens inside.\
    \ Another example is the power button on a machine. You know that the button starts\
    \ the machine and connects with other pieces of your machine, but you don’t know\
    \ all the things that exist inside the button.\n\n```\n    scala> class Light():\n\
    \    |   def turnOn() = print(\"Turn on the lights\")\n    // defined class Light\n\
    ```\n\nWhen you invoke the method `turnOn`, you don’t know what happens inside\
    \ because you can only see the *signature* of the method.\n\n- **Encapsulation**:\
    \ This aspect lets you restrict access to the internal attributes/fields inside\
    \ an object and only access that information using specific methods. To do this,\
    \ Scala provides three modifiers (`public`, `private`, and `protected`), which\
    \ you will see in later sections of this chapter. This is important because you\
    \ don’t want someone to modify a variable that you are using in some of your methods.\n\
    \n```\n    scala> class Light:\n    |   private val bulb = 75 // private restrict\
    \ the access\n    |   def turnOn() = print(\"Turn on the lights of \" + bulb)\n\
    \    // defined class Light\n```\n\nIf you try to access the `bulb` attribute,\
    \ this will appear:\n\n```\n    scala> val light = Light()\n    scala> light.bulb\n\
    \    1 |light.bulb\n    |^^^^^^^^^^\n    |value bulb cannot be accessed as a member\
    \ of (light : Light) from module class rs$line$8$.\n```\n\n- **Inheritance**:\
    \ This aspect lets you reuse or extend some part of the logic that you previously\
    \ defined in another object that shares the same idea. Imagine that you have an\
    \ object that contains all the logic to create a file and save a piece of information,\
    \ but you need to define the format of data. A possible solution is to define\
    \ one object per format that you want to save, which extends the logic to create\
    \ and saves the information. Figure [3-1](#328789_3_En_3_Chapter.xhtml#Fig1) illustrates\
    \ an example.\n\nAnother example is in a car. The backlights have an extra behavior:\
    \ when you press the brakes, an extra light turns on.\n\n- **Polymorphism**: This\
    \ is the ability of an object to take on many forms. There are two types of polymorphism:\n\
    \  - **Static**: You see this type when you need a method with the same name but\
    \ with a different number of parameters or different types.\n\n```\n        scala>\
    \ class Light:\n        |     def turnOn() = print(\"Turn on the lights\")\n \
    \       |     def turnOn(message : String) = print(message)\n```\n\n  - **Dynamic**:\
    \ You see this type when one class inherits another and overrides some of the\
    \ methods, but to do this you need to declare it explicitly using the `override`\
    \ method.\n\n```\n        scala> class BackLight() extends Light:\n        | \
    \    override def turnOn() = print(\"Turn on the backlights\")\n        |    \
    \ def turnOnStop() = print(\"Stop lights\")\n        |\n        // defined class\
    \ BackLight\n```\n\n```\nscala> class Light():\n|   def turnOn() = print(\"Turn\
    \ on the lights\")\nscala> class BackLight() extends Light:\n|   def turnOnStop()\
    \ = print(\"Stop lights\")\n```\n\nThe following could happen if you try to override\
    \ a method without using the keyword `override`:\n\n```\nscala> class BackLight()\
    \ extends Light:\n|     def turnOn() = print(\"Turn on the backlights\")\n|  \
    \   def turnOnStop() = print(\"Stop lights\")\n|\n2 |    def turnOn() = print(\"\
    Turn on the backlights\")\n|        ^\n|        error overriding method turnOn\
    \ in class Light of type (): Unit;\n|          method turnOn of type (): Unit\
    \ needs `override` modifier\n```\n\n# From Concepts to Concrete Things\n\nThe\
    \ concepts in the previous section are great, but you need to see them implemented\
    \ in the real world. In Scala, the concepts of OOP come in four different things:\n\
    \n- **Classes**: You can think of a class as a blueprint that contains methods\
    \ and attributes but no reference to any position of memory, so you can’t use\
    \ it to store any value or execute any method. The only way to use it is to create\
    \ an instance of each class that knows it as an object.\n\n- **Traits**: Traits\
    \ are reusable components that have definitions of methods and attributes that\
    \ all classes need in order to implement some part of the logic. You can think\
    \ of them as a contract that all classes need to implement or follow and not change\
    \ the name/parameters or return.\n\n```\nscala> class Engine: //Define the structure\
    \ of the class\n|   def start() = print(\"Start the engine\")\nscala> val engine\
    \ = Engine() //Create an instance of the class\nval engine: Engine = Engine@432c0f1\n\
    scala> engine.start() //Invoke the method to start the engine\nStart the engine\n\
    ```\n\n```\nscala> trait AbstractLight:\n|   def turnOn() : Unit\nscala> class\
    \ Light extends AbstractLight:\n|   override def turnOn() = print(\"Turn on the\
    \ lights\")\n```\n\nThere are a lot of features related to traits, such as extending\
    \ the functionality of a trait in another trait and implementing multiple traits,\
    \ which you will see in the following chapters.\n\nAnother way to think of a trait\
    \ is as the equivalent of an `interface` in Java:\n\n- **Enums**: Enums are a\
    \ new feature in Scala 3. They help you define/reuse constants that have certain\
    \ elements or values in common, such as the gender of a person (male, female,\
    \ other) or type of flight (one way or round-trip). This type of structure is\
    \ helpful when you want to have certain information in your class but you don’t\
    \ want anyone to enter a wrong value. An enum helps reduce the possible problems\
    \ and provides a way to reuse the constant across different part of the code.\n\
    \n```\npublic interface AbstractLight {\nvoid turnOn();\n}\n```\n\n```\nscala>\
    \ enum LightType:\n|   case Big, Medium, Small\n// defined class LightType\n```\n\
    \nThis topic will appear in more detail in Chapter [6](#328789_3_En_6_Chapter.xhtml)\
    \ when you will see all the possible applications of the enum.\n\n- **Objects**:\
    \ An object is a way to create a static structure that you can access without\
    \ instantiating a particular class. Another way to see this concept is as a Singleton\
    \ because this structure only allows one instance.\n\n```\nscala> object Logger:\n\
    |    def info(message: String) = print(s\"INFO: $message\")\nscala> Logger.info(\"\
    test\")\nINFO: test\n```"
  raw: "## Concepts of OOP\n\nOOP can be summarized by four different aspects, which\
    \ differentiate from other paradigms:\n\n![../images/328789_3_En_3_Chapter/328789_3_En_3_Fig1_HTML.jpg](images/328789_3_En_3_Chapter/328789_3_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nBoth exporters have concrete logic but share common logic to create\
    \ a file\n\n*   **Abstraction**: This concept represents the complexity of a problem\
    \ using objects, fields, and methods. You can have all the logic for solving a\
    \ situation in one structure without sharing the details of the implementation.\
    \ You can imagine these concepts as one part of your car. You know the expected\
    \ behavior when you turn on the lights, but you don’t know what happens inside.\
    \ Another example is the power button on a machine. You know that the button starts\
    \ the machine and connects with other pieces of your machine, but you don’t know\
    \ all the things that exist inside the button.\n\n```\n    scala> class Light():\n\
    \    |   def turnOn() = print(\"Turn on the lights\")\n    // defined class Light\n\
    \    ```\n\nWhen you invoke the method `turnOn`, you don’t know what happens inside\
    \ because you can only see the *signature* of the method.\n\n*   **Encapsulation**\
    \ : This aspect lets you restrict access to the internal attributes/fields inside\
    \ an object and only access that information using specific methods. To do this,\
    \ Scala provides three modifiers (`public`, `private`, and `protected`), which\
    \ you will see in later sections of this chapter. This is important because you\
    \ don’t want someone to modify a variable that you are using in some of your methods.\n\
    \n```\n    scala> class Light:\n    |   private val bulb = 75 // private restrict\
    \ the access\n    |   def turnOn() = print(\"Turn on the lights of \" + bulb)\n\
    \    // defined class Light\n    ```\n\nIf you try to access the `bulb` attribute,\
    \ this will appear:\n\n```\n    scala> val light = Light()\n    scala> light.bulb\n\
    \    1 |light.bulb\n    |^^^^^^^^^^\n    |value bulb cannot be accessed as a member\
    \ of (light : Light) from module class rs$line$8$.\n    ```\n\n*   **Inheritance**\
    \ : This aspect lets you reuse or extend some part of the logic that you previously\
    \ defined in another object that shares the same idea. Imagine that you have an\
    \ object that contains all the logic to create a file and save a piece of information,\
    \ but you need to define the format of data. A possible solution is to define\
    \ one object per format that you want to save, which extends the logic to create\
    \ and saves the information. Figure [3-1](#328789_3_En_3_Chapter.xhtml#Fig1) illustrates\
    \ an example.\n\nAnother example is in a car. The backlights have an extra behavior:\
    \ when you press the brakes, an extra light turns on.\n\n*   **Polymorphism**:\
    \ This is the ability of an object to take on many forms. There are two types\
    \ of polymorphism :\n    *   **Static**: You see this type when you need a method\
    \ with the same name but with a different number of parameters or different types.\n\
    \n```\n        scala> class Light:\n        |     def turnOn() = print(\"Turn\
    \ on the lights\")\n        |     def turnOn(message : String) = print(message)\n\
    \        ```\n\n*   **Dynamic**: You see this type when one class inherits another\
    \ and overrides some of the methods, but to do this you need to declare it explicitly\
    \ using the `override` method.\n\n```\n        scala> class BackLight() extends\
    \ Light:\n        |     override def turnOn() = print(\"Turn on the backlights\"\
    )\n        |     def turnOnStop() = print(\"Stop lights\")\n        |\n      \
    \  // defined class BackLight\n        ```\n\n```\nscala> class Light():\n|  \
    \ def turnOn() = print(\"Turn on the lights\")\nscala> class BackLight() extends\
    \ Light:\n|   def turnOnStop() = print(\"Stop lights\")\n```\n\nThe following\
    \ could happen if you try to override a method without using the keyword `override`:\n\
    \n```\nscala> class BackLight() extends Light:\n|     def turnOn() = print(\"\
    Turn on the backlights\")\n|     def turnOnStop() = print(\"Stop lights\")\n|\n\
    2 |    def turnOn() = print(\"Turn on the backlights\")\n|        ^\n|       \
    \ error overriding method turnOn in class Light of type (): Unit;\n|         \
    \ method turnOn of type (): Unit needs `override` modifier\n```\n\n## From Concepts\
    \ to Concrete Things\n\nThe concepts in the previous section are great, but you\
    \ need to see them implemented in the real world. In Scala, the concepts of OOP\
    \ come in four different things:\n\n*   **Classes** : You can think of a class\
    \ as a blueprint that contains methods and attributes but no reference to any\
    \ position of memory, so you can’t use it to store any value or execute any method.\
    \ The only way to use it is to create an instance of each class that knows it\
    \ as an object.\n\n*   **Traits**: Traits are reusable components that have definitions\
    \ of methods and attributes that all classes need in order to implement some part\
    \ of the logic. You can think of them as a contract that all classes need to implement\
    \ or follow and not change the name/parameters or return.\n\n```\nscala> class\
    \ Engine: //Define the structure of the class\n|   def start() = print(\"Start\
    \ the engine\")\nscala> val engine = Engine() //Create an instance of the class\n\
    val engine: Engine = Engine@432c0f1\nscala> engine.start() //Invoke the method\
    \ to start the engine\nStart the engine\n```\n\n```\nscala> trait AbstractLight:\n\
    |   def turnOn() : Unit\nscala> class Light extends AbstractLight:\n|   override\
    \ def turnOn() = print(\"Turn on the lights\")\n```\n\nThere are a lot of features\
    \ related to traits, such as extending the functionality of a trait in another\
    \ trait and implementing multiple traits, which you will see in the following\
    \ chapters.\n\nAnother way to think of a trait is as the equivalent of an `interface`\
    \ in Java:\n\n*   **Enums**: Enums are a new feature in Scala 3\\. They help you\
    \ define/reuse constants that have certain elements or values in common, such\
    \ as the gender of a person (male, female, other) or type of flight (one way or\
    \ round-trip). This type of structure is helpful when you want to have certain\
    \ information in your class but you don’t want anyone to enter a wrong value.\
    \ An enum helps reduce the possible problems and provides a way to reuse the constant\
    \ across different part of the code.\n\n```\npublic interface AbstractLight {\n\
    void turnOn();\n}\n```\n\n```\nscala> enum LightType:\n|   case Big, Medium, Small\n\
    // defined class LightType\n```\n\nThis topic will appear in more detail in Chapter\
    \ [6](#328789_3_En_6_Chapter.xhtml) when you will see all the possible applications\
    \ of the enum.\n\n*   **Objects**: An object is a way to create a static structure\
    \ that you can access without instantiating a particular class. Another way to\
    \ see this concept is as a Singleton because this structure only allows one instance.\n\
    \n```\nscala> object Logger:\n|    def info(message: String) = print(s\"INFO:\
    \ $message\")\nscala> Logger.info(\"test\")\nINFO: test\n```"
  trans: "\n## 面向对象编程的概念\n\n面向对象编程可以通过四个不同的方面来概括，这些方面使其区别于其他编程范式：\n\n![../images/328789_3_En_3_Chapter/328789_3_En_3_Fig1_HTML.jpg](img/328789_3_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1\n\n两个导出器都有具体的逻辑，但共享创建文件的通用逻辑\n\n*   **抽象**：这个概念使用对象、字段和方法来表示问题的复杂性。你可以将所有解决某个情况的逻辑放在一个结构中，而无需公开实现的细节。你可以把这些概念想象成汽车的一个部件。你知道打开车灯时的预期行为，但不知道内部发生了什么。另一个例子是机器上的电源按钮。你知道按钮可以启动机器，并与机器的其他部件连接，但不知道按钮内部存在的所有东西。\n\
    \n```\n    scala> class Light():\n    |   def turnOn() = print(\"Turn on the lights\"\
    )\n    // defined class Light\n    ```\n\n当你调用 `turnOn` 方法时，你不知道内部发生了什么，因为你只能看到该方法的*签名*。\n\
    \n*   **封装**：这个方面允许你限制对对象内部属性/字段的访问，并且只能通过特定方法访问这些信息。为此，Scala 提供了三个修饰符（`public`、`private`\
    \ 和 `protected`），你将在本章后面的部分看到它们。这一点很重要，因为你不希望有人修改你在某些方法中使用的变量。\n\n```\n    scala>\
    \ class Light():\n    |   private val bulb = 75 // private 限制访问\n    |   def turnOn()\
    \ = print(\"Turn on the lights of \" + bulb)\n    // defined class Light\n   \
    \ ```\n\n如果你尝试访问 `bulb` 属性，将会出现以下情况：\n\n```\n    scala> val light = Light()\n\
    \    scala> light.bulb\n    1 |light.bulb\n    |^^^^^^^^^^\n    |value bulb cannot\
    \ be accessed as a member of (light : Light) from module class rs$line$8$.\n \
    \   ```\n\n*   **继承**：这个方面允许你重用或扩展先前在另一个共享相同概念的对象中定义的某些逻辑。想象一下，你有一个对象，它包含了创建文件并保存一段信息的所有逻辑，但你需要定义数据的格式。一个可能的解决方案是为你想要保存的每种格式定义一个对象，这些对象扩展了创建和保存信息的逻辑。图\
    \ 3-1 展示了一个例子。\n\n另一个例子是汽车。尾灯有一个额外的行为：当你踩刹车时，会有一个额外的灯亮起。\n\n*   **多态**：这是对象呈现多种形式的能力。多态有两种类型：\n\
    \    *   **静态多态**：当你需要一个同名但参数数量或类型不同的方法时，你会看到这种类型。\n\n```\n        scala> class\
    \ Light():\n        |     def turnOn() = print(\"Turn on the lights\")\n     \
    \   |     def turnOn(message : String) = print(message)\n        ```\n\n*   **动态多态**：当一个类继承另一个类并重写某些方法时，你会看到这种类型，但要做到这一点，你需要使用\
    \ `override` 方法显式声明。\n\n```\n        scala> class BackLight() extends Light:\n\
    \        |     override def turnOn() = print(\"Turn on the backlights\")\n   \
    \     |     def turnOnStop() = print(\"Stop lights\")\n        |\n        // defined\
    \ class BackLight\n        ```\n\n```\nscala> class Light():\n|   def turnOn()\
    \ = print(\"Turn on the lights\")\nscala> class BackLight() extends Light:\n|\
    \   def turnOnStop() = print(\"Stop lights\")\n```\n\n如果你尝试重写一个方法而不使用 `override`\
    \ 关键字，可能会发生以下情况：\n\n```\nscala> class BackLight() extends Light:\n|     def turnOn()\
    \ = print(\"Turn on the backlights\")\n|     def turnOnStop() = print(\"Stop lights\"\
    )\n|\n2 |    def turnOn() = print(\"Turn on the backlights\")\n|        ^\n| \
    \       error overriding method turnOn in class Light of type (): Unit;\n|   \
    \       method turnOn of type (): Unit needs `override` modifier\n```\n\n## 从概念到具体事物\n\
    \n上一节中的概念很棒，但你需要看到它们在现实世界中的实现。在 Scala 中，面向对象编程的概念体现在四种具体事物中：\n\n*   **类**：你可以将类视为一个蓝图，它包含方法和属性，但不引用任何内存位置，因此你不能用它来存储任何值或执行任何方法。使用它的唯一方法是创建每个类的实例，这个实例被称为对象。\n\
    \n*   **特质**：特质是可重用的组件，它们包含所有类为实现某些逻辑而需要实现的方法和属性的定义。你可以将它们视为所有类都需要实现或遵循的契约，并且不能更改名称、参数或返回类型。\n\
    \n```\nscala> class Engine: //定义类的结构\n|   def start() = print(\"Start the engine\"\
    )\nscala> val engine = Engine() //创建类的实例\nval engine: Engine = Engine@432c0f1\n\
    scala> engine.start() //调用启动引擎的方法\nStart the engine\n```\n\n```\nscala> trait\
    \ AbstractLight:\n|   def turnOn() : Unit\nscala> class Light extends AbstractLight:\n\
    |   override def turnOn() = print(\"Turn on the lights\")\n```\n\n特质有很多特性，例如在一个特质中扩展另一个特质的功能，以及实现多个特质，你将在接下来的章节中看到这些。\n\
    \n另一种理解特质的方式是将其视为 Java 中 `interface` 的等价物：\n\n*   **枚举**：枚举是 Scala 3 中的一个新特性。它们帮助你定义/重用具有某些共同元素或值的常量，例如一个人的性别（男性、女性、其他）或航班类型（单程或往返）。当你希望类中包含某些信息，但又不想让任何人输入错误的值时，这种结构类型非常有用。枚举有助于减少可能出现的问题，并提供一种在代码不同部分重用常量的方法。\n\
    \n```\npublic interface AbstractLight {\nvoid turnOn();\n}\n```\n\n```\nscala>\
    \ enum LightType:\n|   case Big, Medium, Small\n// defined class LightType\n```\n\
    \n这个主题将在第 6 章中更详细地介绍，届时你将看到枚举的所有可能应用。\n\n*   **对象**：对象是一种创建静态结构的方式，你无需实例化特定类即可访问该结构。另一种理解这个概念的方式是将其视为单例，因为这种结构只允许一个实例。\n\
    \n```\nscala> object Logger:\n|    def info(message: String) = print(s\"INFO:\
    \ $message\")\nscala> Logger.info(\"test\")\nINFO: test\n```\n"
- fmt: '# Classes


    As you read in the previous section, a class is a blueprint where you store certain
    values in fields/attributes and define certain behaviors of the methods. The only
    constraint with the use of this type of structure is that you need to define an
    instance that is assigned in the JVM position in the memory so you can reference
    it in parts of your application.


    To define a class, you need to use the keyword `class` followed by the name. A
    good practice is to use camel case for the names, which means that each word of
    the name needs to have the first letter in a capital case. For more information,
    you can check the official documentation^([^(23)](#fn23)). Also, don’t use an
    underscore (`_`) in any part of the name. (These practices are the same in Java.)
    Table [3-1](#328789_3_En_3_Chapter.xhtml#Tab1) lists bad options for a name.


    **Table 3-1** Examples of Poor Class Names


    | Class name | Wrong or correct? |

    | --- | --- |

    | `_light` | Wrong |

    | `Light` | Wrong |

    | `AbstractLight` | Correct |

    | `abstract_light` | Wrong |

    | `Abstractlight` | Wrong |


    Now it’s time to create your first class. For this example, create a class without
    any logic inside.


    ```

    scala> class Book //Define a empty class only with constructor

    // defined class Book

    ```


    A good way to see what happens when you create a class is to decompile it. To
    do this, create a file named `Book.scala` and put the declaration of the class
    in it. After that, compile the class using the command `scalac Book.scala` and
    the compiler will create the file `Book.class`, which you can decompile using
    the command `javap -c Book.class`.


    ```

    $ javap -c  Book.class

    Compiled from "Book.scala"

    public class Book {

    public Book();

    Code:

    0: aload_0

    1: invokespecial #9          // Method java/lang/Object."":()V

    4: return

    ```


    As you can see, there are no constructors, methods, or variables inside the class,
    just the definition. Now you’ve created your first class, but you need to instantiate
    it to use it. There two ways to do so, but the second is the best option in Scala
    3.


    | Scala 2 | Scala 3 |

    | --- | --- |

    | `scala> val book = new Book()val book: Book = Book@50a7c72b` | `scala> val book
    = Book()val book: Book = Book@50a7c72b` |


    One last thing with creating an instance of a class: If you don’t assign the new
    class in any variable, the compiler will assign a name.


    ```

    scala> Book()

    val res0: Book = Book@bf2aa32

    ```


    ## Fields


    Fields are a type of variable that let you store certain values related to one
    instance of a class. Valid types are anything that extends from `Any`, so you
    can store the status of custom objects or simple values like Strings.


    The way to declare a field in Scala is very simple. You only need to indicate
    the type of variable with a name and add if the variable is immutable or not (`var`
    or `val`).


    ```

    scala> class Book():

    |   var quantity = 0

    // defined class Book

    ```


    You need to consider something before declaring a variable in this way. If you
    don’t explicitly indicate that the variable has restricted access, anyone can
    modify the value and you can lose control. Of course, many cases justify that
    a variable can be accessed directly but be aware that there are other options.


    To continue with the previous idea, three access control modifiers give you a
    different level of access to the fields, as shown in Table [3-2](#328789_3_En_3_Chapter.xhtml#Tab2).


    **Table 3-2** Access Control Modifiers


    | Modifier | Description | Example |

    | --- | --- | --- |

    | `private` | With this the modifier, only the methods in the class can access
    the fields but you can create a custom method to return the value. | `scala> class
    Book():   &#124;   private var quantity = 0// defined class Book` |

    | `protected` | With this modifier, only the methods in the class and the class
    that extends from this one can access the value. | `scala> class Book():   &#124;   protected
    var quantity = 0// defined class Book` |

    | `public` | Anyone can access and modify the values stored in the fields. | `scala>
    class Book():   &#124;   public var quantity = 0// defined class Book` |

    | `Nothing` | In this case, it is the same as public. | `scala> class Book():   &#124;   var
    quantity = 0// defined class Book` |


    When you create fields inside a class, use a name that defines the meaning of
    the field, such as *salary* or *quantity*. It is not a good practice to have fields
    with names like *a*, *b*, and *aux* because it is difficult for other developers
    to understand the meaning of those fields and it decreases the maintainability
    of the code.


    ## Constructors


    A constructor is a way to send parameters to your class at the same moment that
    you instantiate them. The main difference from other languages like Java, where
    the constructor appears in the body of the class, is that Scala gives you the
    advantage of declaring all parameters in the same definition of the class and
    internally they become the constructors. Another thing to consider is that if
    the class does not have parameters, Scala does not create a specific constructor;
    it uses the default constructor.


    The constructor does a combination of things that you need to consider in order
    to understand how it works: it accepts the parameters that you define, creates
    fields in the class, assigns the values of the variables with the same name, and
    you can add some logic inside. To create a constructor, you need to pass the parameters
    one by one, separated by a comma.


    ```

    scala> class Book(val name : String, val isbn : String)

    // defined class Book

    ```


    As in the previous section, you can decompile the code by saving this line in
    a file, compiling it, and executing the command `javap -c Book.class`.


    ```

    public class Book {

    public Book(java.lang.String, java.lang.String);

    Code:

    0: aload_0

    1: aload_1

    2: putfield      #12         // Field name:Ljava/lang/String;

    5: aload_0

    6: aload_2

    7: putfield      #14         // Field isbn:Ljava/lang/String;

    10: aload_0

    11: invokespecial #17         // Method java/lang/Object."":()V

    14: return

    public java.lang.String name();

    Code:

    0: aload_0

    1: getfield      #12                // Field name:Ljava/lang/String;

    4: areturn

    public java.lang.String isbn();

    Code:

    0: aload_0

    1: getfield      #14                // Field isbn:Ljava/lang/String;

    4: areturn

    }

    ```


    You can see that this is more code than in the previous sections. This is because
    Scala uses the modifier of the parameters to determine if it is necessary to create
    `set`/`get` methods for each attribute.'
