- fmt: '# Pattern Matching as Functions


    Scala patterns are syntactic elements of the language when used with the `match`
    operator. However, you can also pass pattern matching as a parameter to other
    methods. Scala compiles a pattern match down to a `PartialFunction[A,B]`, which
    is a subclass of `Function1[A,B]`. So a pattern can be passed to any method that
    takes a single parameter function. This allows you to reduce


    ```

    list.filter(a => a match {

    case s: String => true

    case _ => false

    })

    ```


    to


    ```

    list.filter {

    case s: String => true

    case _ => false

    }

    ```


    Because patterns are functions and functions are instances, patterns are instances.
    In addition to passing them as parameters, they can also be stored for later use.


    In addition to `Function1`’s `apply` method, `PartialFunction` has an `isDefinedAt`
    method so you can test to see whether a pattern matches a given value. If you
    try to apply a `PartialFunction` that’s not defined for the value, a `MatchError`
    will be raised. How is this useful?


    If you’re building a web application, you might have particular URLs that need
    special handling while others get handled in the default manner. The URL can be
    expressed as a `List[String]`. You can do the following:


    ```

    def handleRequest(req: List[String])(exceptions: PartialFunction[List[String],
    String]): String =

    if (exceptions.isDefinedAt(req)) then

    exceptions(req)

    else

    "Handling URL " + req + " in the normal way"

    ```


    So, if the partial function `exceptions` (the pattern) matches the request `req`
    according to the `isDefinedAt` method, then you allow the request to be handled
    by the `exceptions` function. Otherwise, you do default handling. You can call
    `handleRequest` and handle any `"api"` requests by a separate handler.


    ```

    handleRequest("foo" :: Nil) {

    case "api" :: call :: params => doApi(call, params)

    }

    def doApi(call: String, params: List[String]): String =

    "Doing API call "+ call

    ```


    Partial functions can be composed into a single function using the `orElse` method.
    So, you can define a couple of partial functions.


    ```

    val f1: PartialFunction[List[String], String] =

    case "stuff" :: Nil => "Got some stuff"

    val f2: PartialFunction[List[String], String] =

    case "other" :: params => "Other: " + params

    ```


    And you can compose them.


    ```

    val f3 = f1 orElse f2

    ```


    And you can pass them into the `handleRequest` method.


    ```

    handleRequest("a" :: "b" :: Nil)(f3)

    ```


    In this way, Scala gives you a very nice, declarative way of handling complex
    filtering tasks. Partial functions can match on data and can be passed around
    like any other instance in Scala. Partial functions replace a lot of the XML configuration
    files in Java because pattern matching gives you the same declarative facilities
    as a configuration file, but they are type-safe, high performance, and they can
    have guards and generally take advantage of any method in your code. Here’s an
    example of using pattern matching to dispatch REST requests in the ESME^([^(28)](#fn28))
    code:^([^(29)](#fn29))


    ```

    def dispatch: LiftRules.DispatchPF = {

    case Req("api" :: "status"   :: Nil, "", GetRequest) => status

    case Req("api" :: "messages" :: Nil, "", GetRequest) => getMsgs

    case Req("api" :: "messages" :: "long_poll" :: Nil, "", GetRequest) =>

    waitForMsgs

    case Req("api" :: "messages" :: Nil, "", PostRequest) =>

    () => sendMsg(User.currentUser.map(_.id.is), S)

    case Req("api" :: "follow"    :: Nil, _, GetRequest) =>

    following(calcUser)

    case Req("api" :: "followers" :: Nil, _, GetRequest) =>

    followers(calcUser)

    case Req("api" :: "follow"    :: Nil, _, PostRequest) =>

    performFollow(S.param("user"))

    }

    ```


    # Pattern Matching on Regular Expressions


    You can combine pattern matching with regular expressions to extract information
    that a `String` or another type contains. Let’s imagine that you have a sequence
    that contains different multimedia elements with their information and you need
    to print it.


    First, define the sequence of elements with the information that you need to extract.


    ```

    val multimedia = Seq(

    "Photography: author=Richard Avedon, place=New York",

    "Movie: name=Casablanca, director=Michael Curtiz",

    "Music: name=Fly on the moon, author=Fran Sinatra");

    ```


    Now create two extractors, one to obtain the information of the photographs and
    another for the movies.


    ```

    val PhotographyExtractorRE = """Photography: author=([^,]+),\s+place=(.+)""".r

    val MovieExtractorRE = """Movie: name=([^,]+),\s+director=(.+)""".r

    ```


    Last but not least, you need to define the conditions to map each of the elements
    in the sequence to a specific case.


    ```

    multimedia.map {

    case PhotographyExtractorRE(author, place) => println(s"Phography - Author: $author
    - Place: $place")

    case MovieExtractorRE(name, director) => println(s"Movie - Name: $name - Director:
    $director")

    case unknown => println(s"Unknown entry $unknown")

    }

    ```


    The output that you will obtain after executing this code looks like this:


    ```

    Phography - Author: Richard Avedon - Place: New York

    Movie - Name: Casablanca - Director: Michael Curtiz

    Unknown entry Music: name=Fly on the moon, author=Fran Sinatra

    ```


    The explanation of how to create regular expressions is out of the scope of this
    book but you can find several pages like RegExr to create and test each possible
    case.^([^(30)](#fn30))


    # Object-Oriented and Functional Tensions


    At this point, the hard-core object-oriented designer folks may be somewhat unhappy
    about Scala `case` class’s exposure of lots of internal information. Data hiding
    is an important part of OOP’s abstraction. But in fact, most of the Java classes
    we define have getters and setters, so data is exposed in OOP. However, there
    is a tension between the amount of internal state that’s exposed in our program
    and the amount of state that’s hidden. In this section, you’ll explore OOP and
    functional programming (FP) patterns for data hiding and exposure.


    Another tension in OOP is how to define methods in class and interface hierarchies.
    Where does a method definition belong? What happens when a library is deployed
    but it’s necessary to add new functionality to subclasses? How do you retrofit
    the defined-in-stone library classes to add this functionality? Put more concretely,
    if you have a library of shapes (circle, square, and rectangle) that each have
    an `area` method but hide all other data, how do you add a `perimeter` method
    to the shapes? Let’s explore the tension and the tools Scala and FP offer to address
    the tension.'
  raw: '## Pattern Matching as Functions


    Scala patterns are syntactic elements of the language when used with the `match`
    operator. However, you can also pass pattern matching as a parameter to other
    methods. Scala compiles a pattern match down to a `PartialFunction[A,B]`, which
    is a subclass of `Function1[A,B]`. So a pattern can be passed to any method that
    takes a single parameter function. This allows you to reduce


    ```

    list.filter(a => a match {

    case s: String => true

    case _ => false

    })

    ```


    to


    ```

    list.filter {

    case s: String => true

    case _ => false

    }

    ```


    Because patterns are functions and functions are instances, patterns are instances.
    In addition to passing them as parameters, they can also be stored for later use.


    In addition to `Function1`’s `apply` method, `PartialFunction` has an `isDefinedAt`
    method so you can test to see whether a pattern matches a given value. If you
    try to apply a `PartialFunction` that’s not defined for the value, a `MatchError`
    will be raised. How is this useful?


    If you’re building a web application, you might have particular URLs that need
    special handling while others get handled in the default manner. The URL can be
    expressed as a `List[String]`. You can do the following:


    ```

    def handleRequest(req: List[String])(exceptions: PartialFunction[List[String],
    String]): String =

    if (exceptions.isDefinedAt(req)) then

    exceptions(req)

    else

    "Handling URL " + req + " in the normal way"

    ```


    So, if the partial function exceptions (the pattern) match the request `req` according
    to the `isDefinedAt` method, then you allow the request to be handled by the `exceptions`
    function. Otherwise, you do default handling. You can call `handleRequest` and
    handle any `"api"` requests by a separate handler.


    ```

    handleRequest("foo" :: Nil) {

    case "api" :: call :: params => doApi(call, params)

    }

    def doApi(call: String, params: List[String]): String =

    "Doing API call "+ call

    ```


    Partial functions can be composed into a single function using the `orElse` method.
    So, you can define a couple of partial functions.


    ```

    val f1: PartialFunction[List[String], String] =

    case "stuff" :: Nil => "Got some stuff"

    val f2: PartialFunction[List[String], String] =

    case "other" :: params => "Other: " + params

    ```


    And you can compose them.


    ```

    val f3 = f1 orElse f2

    ```


    And you can pass them into the `handleRequest` method.


    ```

    handleRequest("a" :: "b" :: Nil)(f3)

    ```


    In this way, Scala gives you a very nice, declarative way of handling complex
    filtering tasks. Partial functions can match on data and can be passed around
    like any other instance in Scala. Partial functions replace a lot of the XML configuration
    files in Java because pattern matching gives you the same declarative facilities
    as a configuration file, but they are type-safe, high performance, and they can
    have guards and generally take advantage of any method in your code. Here’s an
    example of using pattern matching to dispatch REST requests in the ESME^([^(28)](#fn28))
    code:^([^(29)](#fn29))


    ```

    def dispatch: LiftRules.DispatchPF = {

    case Req("api" :: "status"   :: Nil, "", GetRequest) => status

    case Req("api" :: "messages" :: Nil, "", GetRequest) => getMsgs

    case Req("api" :: "messages" :: "long_poll" :: Nil, "", GetRequest) =>

    waitForMsgs

    case Req("api" :: "messages" :: Nil, "", PostRequest) =>

    () => sendMsg(User.currentUser.map(_.id.is), S)

    case Req("api" :: "follow"    :: Nil, _, GetRequest) =>

    following(calcUser)

    case Req("api" :: "followers" :: Nil, _, GetRequest) =>

    followers(calcUser)

    case Req("api" :: "follow"    :: Nil, _, PostRequest) =>

    performFollow(S.param("user"))

    }

    ```


    ## Pattern Matching on Regular Expressions


    You can combine pattern matching with regular expressions to extract information
    that a String or another type contains. Let’s imagine that you have a sequence
    that contains different multimedia elements with their information and you need
    to print it.


    First, define the sequence of elements with the information that you need to extract.


    ```

    val multimedia = Seq(

    "Photography: author=Richard Avedon, place=New York",

    "Movie: name=Casablanca, director=Michael Curtiz",

    "Music: name=Fly on the moon, author=Fran Sinatra");

    ```


    Now create two extractors, one to obtain the information of the photographs and
    another for the movies.


    ```

    val PhotographyExtractorRE = """Photography: author=([^,]+),\s+place=(.+)""".r

    val MovieExtractorRE = """Movie: name=([^,]+),\s+director=(.+)""".r

    ```


    Last but not least, you need to define the conditions to map each of the elements
    in the sequence to a specific case.


    ```

    multimedia.map {

    case PhotographyExtractorRE(author, place) => println(s"Phography - Author: $author
    - Place: $place")

    case MovieExtractorRE(name, director) => println(s"Movie - Name: $name - Director:
    $director")

    case unknown => println(s"Unknown entry $unknown")

    }

    ```


    The output that you will obtain after executing this code looks like this:


    ```

    Phography - Author: Richard Avedon - Place: New York

    Movie - Name: Casablanca - Director: Michael Curtiz

    Unknown entry Music: name=Fly on the moon, author=Fran Sinatra

    ```


    The explanation of how to create regular expressions is out of the scope of this
    book but you can find several pages like RegExr to create and test each possible
    case.^([^(30)](#fn30))


    ## Object-Oriented and Functional Tensions


    At this point , the hard-core object-oriented designer folks may be somewhat unhappy
    about Scala `case` class’s exposure of lots of internal information. Data hiding
    is an important part of OOP’s abstraction. But in fact, most of the Java classes
    we define have getters and setters, so data is exposed in OOP. However, there
    is a tension between the amount of internal state that’s exposed in our program
    and the amount of state that’s hidden. In this section, you’ll explore OOP and
    functional programming (FP) patterns for data hiding and exposure.


    Another tension in OOP is how to define methods in class and interface hierarchies.
    Where does a method definition belong? What happens when a library is deployed
    but it’s necessary to add new functionality to subclasses? How do you retrofit
    the defined-in-stone library classes to add this functionality? Put more concretely,
    if you have a library of shapes (circle, square, and rectangle) that each have
    an `area` method but hide all other data, how do you add a `perimeter` method
    to the shapes? Let’s explore the tension and the tools Scala and FP offer to address
    the tension.'
  trans: '

    ## 模式匹配作为函数


    Scala 模式是与 `match` 运算符一起使用时语言中的语法元素。不过，你也可以将模式匹配作为参数传递给其他方法。Scala 会将模式匹配编译成一个
    `PartialFunction[A,B]`，它是 `Function1[A,B]` 的一个子类。因此，模式可以传递给任何接受单参数函数的方法。这允许你将


    ```

    list.filter(a => a match {

    case s: String => true

    case _ => false

    })

    ```


    简化为


    ```

    list.filter {

    case s: String => true

    case _ => false

    }

    ```


    因为模式是函数，而函数是实例，所以模式也是实例。除了将它们作为参数传递外，它们还可以被存储起来供以后使用。


    除了 `Function1` 的 `apply` 方法外，`PartialFunction` 还有一个 `isDefinedAt` 方法，因此你可以测试某个模式是否匹配给定的值。如果你尝试应用一个未针对该值定义的
    `PartialFunction`，则会引发 `MatchError`。这有什么用呢？


    如果你正在构建一个 Web 应用程序，可能有一些特定的 URL 需要特殊处理，而其他 URL 则按默认方式处理。URL 可以表示为 `List[String]`。你可以执行以下操作：


    ```

    def handleRequest(req: List[String])(exceptions: PartialFunction[List[String],
    String]): String =

    if (exceptions.isDefinedAt(req)) then

    exceptions(req)

    else

    "Handling URL " + req + " in the normal way"

    ```


    因此，如果偏函数 exceptions（即模式）根据 `isDefinedAt` 方法匹配了请求 `req`，那么你就允许该请求由 `exceptions`
    函数处理。否则，你将执行默认处理。你可以调用 `handleRequest`，并通过一个单独的处理程序来处理任何 `"api"` 请求。


    ```

    handleRequest("foo" :: Nil) {

    case "api" :: call :: params => doApi(call, params)

    }

    def doApi(call: String, params: List[String]): String =

    "Doing API call "+ call

    ```


    偏函数可以使用 `orElse` 方法组合成一个函数。因此，你可以定义几个偏函数。


    ```

    val f1: PartialFunction[List[String], String] =

    case "stuff" :: Nil => "Got some stuff"

    val f2: PartialFunction[List[String], String] =

    case "other" :: params => "Other: " + params

    ```


    并且你可以组合它们。


    ```

    val f3 = f1 orElse f2

    ```


    然后你可以将它们传递给 `handleRequest` 方法。


    ```

    handleRequest("a" :: "b" :: Nil)(f3)

    ```


    通过这种方式，Scala 为你提供了一种非常优雅、声明式的方式来处理复杂的过滤任务。偏函数可以匹配数据，并且可以像 Scala 中的任何其他实例一样被传递。偏函数取代了
    Java 中的许多 XML 配置文件，因为模式匹配提供了与配置文件相同的声明式能力，但它们是类型安全的、高性能的，并且可以包含守卫条件，通常还能利用代码中的任何方法。以下是在
    ESME^(²⁸) 代码中使用模式匹配来分发 REST 请求的示例：^(²⁹)


    ```

    def dispatch: LiftRules.DispatchPF = {

    case Req("api" :: "status"   :: Nil, "", GetRequest) => status

    case Req("api" :: "messages" :: Nil, "", GetRequest) => getMsgs

    case Req("api" :: "messages" :: "long_poll" :: Nil, "", GetRequest) =>

    waitForMsgs

    case Req("api" :: "messages" :: Nil, "", PostRequest) =>

    () => sendMsg(User.currentUser.map(_.id.is), S)

    case Req("api" :: "follow"    :: Nil, _, GetRequest) =>

    following(calcUser)

    case Req("api" :: "followers" :: Nil, _, GetRequest) =>

    followers(calcUser)

    case Req("api" :: "follow"    :: Nil, _, PostRequest) =>

    performFollow(S.param("user"))

    }

    ```


    ## 正则表达式上的模式匹配


    你可以将模式匹配与正则表达式结合使用，以提取字符串或其他类型中包含的信息。假设你有一个序列，其中包含不同的多媒体元素及其信息，并且你需要将其打印出来。


    首先，定义包含你需要提取信息的元素序列。


    ```

    val multimedia = Seq(

    "Photography: author=Richard Avedon, place=New York",

    "Movie: name=Casablanca, director=Michael Curtiz",

    "Music: name=Fly on the moon, author=Fran Sinatra");

    ```


    现在创建两个提取器，一个用于获取照片的信息，另一个用于获取电影的信息。


    ```

    val PhotographyExtractorRE = """Photography: author=([^,]+),\s+place=(.+)""".r

    val MovieExtractorRE = """Movie: name=([^,]+),\s+director=(.+)""".r

    ```


    最后但同样重要的是，你需要定义条件，将序列中的每个元素映射到特定的 case。


    ```

    multimedia.map {

    case PhotographyExtractorRE(author, place) => println(s"Phography - Author: $author
    - Place: $place")

    case MovieExtractorRE(name, director) => println(s"Movie - Name: $name - Director:
    $director")

    case unknown => println(s"Unknown entry $unknown")

    }

    ```


    执行此代码后，你将获得的输出如下所示：


    ```

    Phography - Author: Richard Avedon - Place: New York

    Movie - Name: Casablanca - Director: Michael Curtiz

    Unknown entry Music: name=Fly on the moon, author=Fran Sinatra

    ```


    关于如何创建正则表达式的解释超出了本书的范围，但你可以找到像 RegExr 这样的网站来创建和测试每种可能的情况。^(³⁰)


    ## 面向对象与函数式的张力


    此时，硬核的面向对象设计者可能对 Scala `case` 类暴露大量内部信息感到有些不满。数据隐藏是 OOP 抽象的重要组成部分。但事实上，我们定义的大多数
    Java 类都有 getter 和 setter，因此在 OOP 中数据是暴露的。然而，在程序中暴露的内部状态量与隐藏的状态量之间存在一种张力。在本节中，你将探讨用于数据隐藏和暴露的
    OOP 与函数式编程（FP）模式。


    OOP 中的另一个张力是如何在类和接口层次结构中定义方法。方法定义属于哪里？当一个库已部署，但有必要为子类添加新功能时会发生什么？你如何改造那些已固化的库类来添加此功能？更具体地说，如果你有一个形状库（圆形、正方形和矩形），每个形状都有一个
    `area` 方法但隐藏了所有其他数据，你如何为这些形状添加一个 `perimeter` 方法？让我们探讨这种张力以及 Scala 和 FP 为解决这种张力所提供的工具。

    '
- fmt: '### Shape Abstractions


    If you have a collection of shapes that derive from the common trait `OShape`
    that has an `area` method in it, your object definitions will look something like
    the following if you use a traditional OOP approach:


    ```

    trait OShape:

    def area: Double

    class OCircle(radius: Double) extends OShape:

    def area = radius * radius * Math.PI

    class OSquare(length: Double) extends OShape:

    def area = length * length

    class ORectangle(h: Double, w: Double) extends OShape:

    def area = h * w

    ```


    Let’s compare this with the pattern-matching implementation:


    ```

    trait Shape

    case class Circle(radius: Double) extends Shape

    case class Square(length: Double) extends Shape

    case class Rectangle(h: Double, w: Double) extends Shape

    object Shape:

    def area(shape: Shape): Double =

    shape match

    case Circle(r) => r * r * Math.PI

    case Square(l) => l * l

    case Rectangle(h, w) => h * w

    ```


    In the pattern-matching example, all the logic for calculating the area is located
    in the same method, but the fact that the method exists is not obvious from looking
    at the `Shape` trait. So far, the OOP methodology seems to be the right answer
    because it makes it obvious what shapes can do.


    However, if you have a shape library and you want to calculate the perimeter of
    each of the shapes, there’s a benefit to pattern matching.


    ```

    def perimeter(shape: Shape) =

    shape match

    case Circle(r) => 2 * Math.Pi  * r

    case Square(l) => 4 * l

    case Rectangle(h, w) => h * 2 + w * 2

    ```


    In this case, the open data makes implementing the `perimeter` method possible.
    With the OOP implementation, you would have to expose data to make the `perimeter`
    method possible to implement. So your OOP implementation would look like


    ```

    trait OShape:

    def area: Double

    class OCircle(radius: Double) extends OShape:

    def area = radius * radius * Math.PI

    def getRadius = radius

    class OSquare(length: Double) extends OShape:

    def area = length * length

    def getLength = length

    class ORectangle(h: Double, w: Double) extends OShape:

    def area      = h * w

    def getHeight = h

    def getWidth  = w

    ```


    In a broader sense, the designer of an object hierarchy rarely implements all
    the methods that a library consumer is going to need.


    The visitor pattern is a design pattern that allows you to add functionality to
    a class hierarchy after the hierarchy is already defined. Let’s look at a typical
    visitor pattern implementation. The following is the interface that defines the
    visitor. The code contains circular class references and will not work in the
    REPL. So, first the code, and then a walk-through of the code.


    ```

    trait OCarVisitor:

    def visit(wheel: OWheel): Unit

    def visit(engine: OEngine): Unit

    def visit(body: OBody): Unit

    def visit(car: OCar): Unit

    trait OCarElement:

    def accept(visitor: OCarVisitor): Unit

    class OWheel(val name: String) extends OCarElement:

    def accept(visitor: OCarVisitor) = visitor.visit(this)

    class OEngine extends OCarElement:

    def accept(visitor: OCarVisitor) = visitor.visit(this)

    class OBody extends OCarElement:

    def accept(visitor: OCarVisitor) = visitor.visit(this)

    class OCar extends OCarElement:

    val elements = List(new OEngine, new OBody, new OWheel("FR"),

    new OWheel("FL"), new OWheel("RR"), new OWheel("RL"))

    def accept(visitor: OCarVisitor) = (this :: elements).foreach(_.accept(visitor))

    ```


    The library author must think about extensibility and implementing the visitor
    pattern. Note also that the class hierarchy is fixed in the visitor because the
    visitor must implement an interface that defines all the possible classes that
    the visitor can handle.


    ```

    trait OCarVisitor:

    def visit(wheel: OWheel): Unit

    def visit(engine: OEngine): Unit

    def visit(body: OBody): Unit

    def visit(car: OCar): Unit

    ```


    Each element derives from a trait that creates a contract, which requires that
    the class implements the `accept` method .


    ```

    trait OCarElement:

    def accept(visitor: OCarVisitor): Unit

    ```


    You implement each subclass and implement the `accept` method.


    ```

    class OWheel(val name: String) extends OCarElement:

    def accept(visitor: OCarVisitor) = visitor.visit(this)

    class OEngine extends OCarElement:

    def accept(visitor: OCarVisitor) = visitor.visit(this)

    class OBody extends OCarElement:

    def accept(visitor: OCarVisitor) = visitor.visit(this)

    class OCar extends OCarElement:

    val elements = List(new OEngine, new OBody, new OWheel("FR"),

    new OWheel("FL"), new OWheel("RR"), new OWheel("RL"))

    def accept(visitor: OCarVisitor) = (this :: elements).foreach(_.accept(visitor))

    ```


    That’s a lot of boilerplate.^([^(31)](#fn31)) Additionally, it violates the data-hiding
    principles of OOP because the visitor has to access some of the data in each element
    that it visits. Let’s compare the pattern-matching version:


    ```

    trait CarElement:

    case class Wheel(name: String) extends CarElement

    case class Engine() extends CarElement

    case class Body() extends CarElement

    case class Car(elements: List[CarElement]) extends CarElement

    ```


    The code is cleaner because there’s no boilerplate `accept` method. Let’s see
    what you do when you want to traverse the object hierarchy:


    ```

    def doSomething(in: CarElement): Unit =

    in match

    case Wheel(name) =>

    case Engine() =>

    case Body() =>

    case Car(e) => e.foreach(doSomething)

    ```


    Take into consideration that all the code related to the explanation of the visitor
    patterns needs to be executed in the REPL in the same order. If you close and
    open it again, you will lose all the declarations and the example may not work.
    If you use Scastie or another online tool, you only need to add all the code in
    the same editor.


    ## Summary


    In this chapter, you explored pattern matching and saw how pattern matching provides
    a powerful declarative syntax for expressing complex logic. Pattern matching provides
    an excellent and type-safe alternative to Java’s test/cast paradigm. Pattern matching
    used with case classes and extraction provides a powerful way to traverse object
    hierarchies and is an excellent alternative to the visitor pattern. And because
    patterns are functions and objects, they can be passed as parameters and used
    wherever functions are used.


    In the next chapter, you’ll explore Collections. The Scala collections library
    is the most noteworthy library in the Scala ecosystem.


