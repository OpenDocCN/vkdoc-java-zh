- fmt: "### Running Little Blocks\n\nNow you can start typing different blocks of\
    \ code and see what happens. The REPL validates and compiles each block of code\
    \ that you write. For example, if you try to *print* the value of a variable that\
    \ does not exist, the REPL will show you an error:\n\n```\nscala> print(number)\n\
    1 |print(number)\n|      ^\n|      Not found: number\n```\n\nModify the previous\
    \ block of code by defining a variable with the name `number` and try to *print*\
    \ the value to see what happens now:\n\n```\nscala> val number = 10\nval number:\
    \ Int = 10\nscala> print(number)\n\n```\n\nNote that if you don’t assign the value\
    \ to a variable with a name, the REPL creates its variable with a name using the\
    \ prefix `resX` (X is a number that starts from 0) and you can use it as in the\
    \ previous example.\n\n```\nscala> \"Hello World\"\nval res0: String = Hello World\n\
    scala> print(res0)\nHello World\n```\n\nAs with any IDE, you can use the Tab key\
    \ to complete the sentence or find possible names of variables or keywords in\
    \ Scala.\n\n```\nscala> val number = 2\nval number: Int = 2\nscala> n\nnative\
    \     ne         nn         noinline   notify     notifyAll   number\n```\n\n\
    Another good feature of the REPL is you can import common packages to use it,\
    \ such as the util library to obtain the current date.\n\n```\nscala> import java.util._\n\
    scala> val date = Date()\nval date: java.util.Date = Sun May 30 18:19:06 ART 2021\n\
    ```\n\nFinally, when you finish with your test and want to close the REPL, you\
    \ have two alternatives:\n\n* Press Ctrl + any key.\n* Use the quit command.\n\
    \n```\nscala> :quit\n➜  ~\n```\n\nOne thing to consider after closing the REPL\
    \ is all the blocks of code that you define will be lost, so if you need to test\
    \ something, you will need to create it again to use it.\n\n### Compiling and\
    \ Running Files\n\nWhen blocks of code are too complex to write in the REPL, a\
    \ good option is to write a file with the extension `scala` for the compiler to\
    \ validate the correct format. After you create your file, you need to compile\
    \ it before running the code.\n\nTo represent these steps, create a file with\
    \ the name `Color.scala` and add the following code inside:\n\n```\nenum Color\
    \ extends Enum[Color]:\ncase RED, BLUE, GREEN;\n@main def main = {\nval color\
    \ = Color.valueOf(\"BLUE\")\nprint(color)\n}\n```\n\nAfter you have created your\
    \ file, you compile the content using the `scalac` command. You can compile a\
    \ list of files just by adding one space between each file.\n\n```\n➜ ~ scalac\
    \ Color.scala\n```\n\nIf you have any doubt about how to execute the `scalac`\
    \ command or the possible options that exist, use the `help` option.\n\n```\n\
    ➜ ~ scalac --help\nUsage: scalac  \nwhere possible standard options include:\n\
    -P                    Pass an option to a plugin, e.g. -P::\n-X              \
    \      Print a synopsis of advanced options.\n-Y                    Print a synopsis\
    \ of private options.\n-bootclasspath        Override location of bootstrap class\
    \ files.\n-classpath            Specify where to find user class files.\nDefault:\
    \ ..\n-color                Colored output\nDefault: always.\nChoices: always,\
    \ never.\n-d                    Destination for generated classfiles.\na long\
    \ list of options...\n```\n\nWhen the compilation process ends, you can run the\
    \ code using the command `scala` with the name of the file:\n\n```\n➜ ~ scala\
    \ Color.scala\nBLUE\n```\n\nCheck that your code works fine. It’s a good idea\
    \ to see what happens in the directory where your file exists. If you execute\
    \ the `ls` command, you will see a list of files that contain all the compiled\
    \ code:\n\n```\n➜ ~ ls\nColor$$anon$1.class  Color$package$.class\nColor$package.tasty\
    \  Color.scala\nmain.class           Color$.class         Color$package.class\
    \  Color.class          Color.tasty          main.tasty\n```\n\nSay you want to\
    \ know the final format of your code. In previous sections, you read that Scala\
    \ uses JVM to run the code. For that reason, you can use the command `javap` to\
    \ decompile and see the final format of your file.\n\n```\n➜  ~ javap Color\n\
    Compiled from \"Color.scala\"\npublic abstract class Color extends java.lang.Enum\
    \ implements scala.reflect.Enum {\npublic static final Color RED;\npublic static\
    \ final Color BLUE;\npublic static final Color GREEN;\npublic static Color fromOrdinal(int);\n\
    public static Color valueOf(java.lang.String);\npublic static Color[] values();\n\
    public Color(java.lang.String, int);\npublic scala.collection.Iterator productIterator();\n\
    public java.lang.String productPrefix();\npublic java.lang.String productElementName(int);\n\
    public scala.collection.Iterator productElementNames();\n}\n```\n\nAs you can\
    \ see, the only methods that appear in the console with this command are `public`.\
    \ If you want to see the `private` methods too, add the option `-private`.\n\n\
    ```\n➜  ~ javap -private Color\n```\n\nNote\n\nBehind the scenes, each IDE invokes\
    \ the compiler and does the same operation on all files. Obviously you don’t see\
    \ this kind of magic in the console or any place in your IDE, but it is a good\
    \ way to validate or see what is happening with a very strange case.\n\n### Online\
    \ Tools\n\nOther online tools offer the same functionality of running fragments\
    \ of code without having Scala on your machine. For example, [Scastie](https://scastie.scala-lang.org/)^([^(20)](#fn20))\
    \ lets you switch between multiple versions of Scala to test your code. Also,\
    \ Scastie lets you share your code with anyone or embed it in a webpage. See Figure\
    \ [1-4](#328789_3_En_1_Chapter.xhtml#Fig4).\n\n![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig4_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig4_HTML.png)\n\
    \nFigure 1-4\n\nThe Scastie web page, which has a simple interface\n\nAnother\
    \ option to run Scala code is [ScalaFiddle](https://scalafiddle.io/)^([^(21)](#fn21)),\
    \ which offers a lot of libraries. The main problem with this tool is that it\
    \ works with version 2.x.x. See Figure [1-5](#328789_3_En_1_Chapter.xhtml#Fig5).\n\
    \n![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig5_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig5_HTML.png)\n\
    \nFigure 1-5\n\nScalaFiddle offers several libraries\n\n## Summary\n\nThis chapter\
    \ offered a brief overview of some of the benefits of using Scala in your applications\
    \ and why it is important to migrate to the new version of this language. You\
    \ learned how to configure your environment to use Scala on your machine with\
    \ the recommended versions of the JDK and some possible alternatives of an IDE.\n\
    \nMost of the topics that appear in this chapter appear in the following chapters\
    \ with a lot of details and some good practices.\n\nFootnotes [1](#328789_3_En_1_Chapter.xhtml#Fn1_source)\
    \   [2](#328789_3_En_1_Chapter.xhtml#Fn2_source)   [3](#328789_3_En_1_Chapter.xhtml#Fn3_source)\
    \   [4](#328789_3_En_1_Chapter.xhtml#Fn4_source)   [5](#328789_3_En_1_Chapter.xhtml#Fn5_source)\
    \   [6](#328789_3_En_1_Chapter.xhtml#Fn6_source)   [7](#328789_3_En_1_Chapter.xhtml#Fn7_source)\
    \   [8](#328789_3_En_1_Chapter.xhtml#Fn8_source)   [9](#328789_3_En_1_Chapter.xhtml#Fn9_source)\
    \   [10](#328789_3_En_1_Chapter.xhtml#Fn10_source)   [11](#328789_3_En_1_Chapter.xhtml#Fn11_source)\
    \   [12](#328789_3_En_1_Chapter.xhtml#Fn12_source)   [13](#328789_3_En_1_Chapter.xhtml#Fn13_source)\
    \   [14](#328789_3_En_1_Chapter.xhtml#Fn14_source)   [15](#328789_3_En_1_Chapter.xhtml#Fn15_source)\
    \   [16](#328789_3_En_1_Chapter.xhtml#Fn16_source)   [17](#328789_3_En_1_Chapter.xhtml#Fn17_source)\
    \   [18](#328789_3_En_1_Chapter.xhtml#Fn18_source)   [19](#328789_3_En_1_Chapter.xhtml#Fn19_source)\
    \   [20](#328789_3_En_1_Chapter.xhtml#Fn20_source)   [21](#328789_3_En_1_Chapter.xhtml#Fn21_source)"
