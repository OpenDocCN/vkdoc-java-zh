    # 4. 函数式编程


    在纪实作品《密西西比河上的旧时光》中，马克·吐温写道：“我 14 岁时，觉得父亲无知得令人难以忍受，简直不想让这个老家伙在身边。但当我 21 岁时，我惊讶地发现，这个老家伙在七年里学到了多少东西。”函数式编程就像是这位老父亲，在编写健壮的并发软件时前来救场。函数式编程将计算视为数学函数的求值，并避免状态和可变数据。它是一种声明式编程范式，其中编程是通过表达式完成的。命令式编程风格强调一系列操作，其特点是使用循环进行迭代、就地修改数据以及带有副作用的方法，其中副作用的顺序对于产生正确效果至关重要。命令式语言（如
    Java）中的基本构造是改变程序状态的命令式语句，如下所示：


    ```

    x = x + 1

    ```


    函数式编程风格强调结果，其特点是将函数值传递给循环方法、不可变数据以及无副作用的方法，其中操作发生的顺序无关紧要。在像 Scala 这样的函数式语言中，基本构造是声明式的，如下所示，并且没有副作用：


    ```

    f(int x){return x + 1}

    ```


    在函数式语言中，计算主要通过求值表达式进行。作为一种支持函数式编程的语言，Scala 鼓励面向表达式的编程（EOP）模型。


    Scala 的创造者 Martin Odersky 说过，该语言的本质是在类型化环境中融合函数式编程和面向对象编程：用函数处理逻辑，用对象处理模块化。因此，你需要理解这两种范式才能充分利用这种语言的全部能力。

