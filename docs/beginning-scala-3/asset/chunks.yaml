- fmt: '### Using Traits as Mixins


    With single inheritance, a class can inherit methods and fields from only one
    class. Multiple inheritances enable the class to inherit methods and fields from
    more than one class. However, multiple inheritances can be problematic as the
    order of inheriting classes may affect the behavior of the subclass inadvertently.


    The mixin composition is a better approach for solving the problems of multiple
    inheritances, sidestepping the drawbacks of single inheritance. In Java, a class
    can implement any arbitrary number of interfaces toward multiple abstractions.
    Unlike Java, Scala provides a mechanism for defining and using reusable code in
    interfaces, which is valid for all classes implementing the interface. You have
    abstract classes for defining and using such reusable code, but a class can extend
    only one abstract class, eliminating the possibility of multiple inheritances.


    The term *mixin* is used for such reusable code that could be independently maintained.
    You can use traits in a way similar to the way in which Java interfaces are used.
    When you add implementation to traits, they become mixins. You can create a trait
    that inherits from a class, as well as a class that extends a trait. Once a trait
    is defined, it can be mixed into a class using the `extends` keyword. This code
    shows a class that mixes in the `Gliding` trait using `extends`:


    ```

    scala> class Glider extends Gliding:

    |     override def toString = "glider"

    // defined class Glider

    ```


    You can use the `extends` keyword to mix in a trait; in that case, you implicitly
    inherit the trait’s superclass. In the following code, the class `Glider` mixes
    in `Gliding`. You can use the methods inherited from a trait as follows:


    ```

    scala> val glider = Glider()

    val glider: Glider = glider

    scala> glider.gliding()

    gliding

    ```


    A trait also defines a type. Here’s an example in which `Gliding` is used as a
    type:


    ```

    scala> val g: Glider = glider

    g: Glider = glider

    scala> g.gliding()

    gliding

    ```


    In the example shown earlier, the type of `g` is a `Glider` trait, and so `g`
    could be initialized with any object whose class mixes in `Glider`.


    In the following code, class `Glider` inherits an implementation of `gliding`
    from trait `Glider`. The class `Glider` could override `gliding` as illustrated
    above.


    ```

    scala> class Glider extends Gliding:

    |     override def toString = "glider"

    |     override def gliding() = println("race for now " + toString)

    // defined class Glider

    ```


    Because `Glider` overrides `Gliding`’s implementation of `gliding`, you get a
    new behavior when you call it.


    ```

    scala> glider.gliding()

    race for now glider

    ```


    Fundamentally, traits are akin to Java interfaces. As with interfaces, you can
    just declare the methods in your trait that you want your extending classes to
    implement, as shown here:


    ```

    trait TraitA:

    def methodA(): Unit

    def methodAWithParam(param :String): Unit

    def methodWithReturnType: String

    ```


    This code shows a trait that declares methods that don’t take any argument. The
    methods without an argument can be declared with a `def` keyword followed by the
    method name, as illustrated in the first method, `def methodA`. If a method requires
    parameters, you can list them as usual.


    One trait can extend another trait, as shown here:


    ```

    trait TraitB extends TraitA:

    def methodB(): Unit

    ```


    When a class extends a trait, use the `extends` and `with` keywords based on whether
    the class extends one trait or several traits. When a class extends one trait,
    use the `extends` keyword.


    ```

    class ClassA extends TraitA:

    // code

    ```


    If a class extends more than one trait, use `extends` for the first trait and
    `with` to mix in the other traits.


    ```

    class ClassA extends TraitA with TraitB:

    // code

    ```


    If a class extends a class and a trait, always use `extends` before the class
    name, and use `with` before the trait’s name.


    ```

    class ClassA extends ClassB with TraitA with TraitB:

    // code

    ```


    A class extending the trait must implement all the abstract methods of the trait,
    unless the class extending the trait is itself abstract.


    ```

    class ClassA extends TraitA:

    def methodA(): Unit = print("methodA")

    def methodAWithParam(param :String): Unit = print(param)

    def methodWithReturnType: String = "something"

    ```


    Here `ClassA` is not declared abstract and therefore it implements all abstract
    methods of trait `TraitA`.


    Note


    A trait can be comprised of both abstract and concrete methods.


    However, if a class extends a trait but does not implement the abstract methods
    defined in the trait, the class extending the trait must be declared `abstract`.


    ```

    abstract class ClassA extends TraitA:

    def methodA(): Unit { // code... }

    def methodAWithParam(param :String): Unit{ // code... }

    ```


    Here `ClassA` does not implement the `methodWithReturnType` method of `TraitA`.
    The subclass of a trait can choose, if it prefers, to override the trait’s method.


    The following code illustrates a `Vehicle` trait that provides an implementation
    for the `drive` method:


    ```

    trait Vehicle:

    def drive() = println("Driving")

    def race(): String

    ```


    In the following code, `drive` is a concrete method and `race` is an abstract
    method. The `Car` class here does not override the `drive` method of `Vehicle`
    trait.


    ```

    class Car extends Vehicle:

    def race(): String = "Racing the car"

    ```


    The `Boat` class in the following code overrides the `drive` method of the `Vehicle`
    trait:


    ```

    class Boat extends Vehicle:

    override def drive() =  println("float")

    def race() =  "Racing boat."

    ```


    Note


    Although Scala has abstract classes, it’s recommended to use traits instead of
    abstract classes to implement base behavior because a class can extend only one
    abstract class, but it can implement multiple traits. If you want the base behavior
    to be inherited in Java code, use an abstract class.


    You can also use fields in your traits. The fields of a trait can be declared
    as either `var` or `val` and can be concrete by defining the field with an initial
    value or abstract by not assigning an initial value. The following code illustrates
    a trait named `CarTrait` with an abstract field `door` and a concrete field `seat`:


    ```

    trait CarTrait:

    var door: Int

    var seat = 4

    ```


    The next code illustrates a `Car` class that extends the `CarTrait`. As you can
    see, you don’t need to use the `override` keyword to override `var` fields `door`
    and `seat`.


    ```

    class Car extends CarTrait:

    var door = 4

    seat = 5

    ```


    However, you need to use the `override` keyword in a subclass of a trait to override
    a `val` field.


    ```

    trait CarTrait:

    val door: Int

    class Car extends CarTrait:

    override val door = 5

    ```


    In the class `Car` that extends the `CarTrait` trait, you need to define the values
    for the abstract fields. Otherwise, you need to define the class as abstract.


    As you can see, traits can declare fields and maintain state. The syntaxes of
    the class definition and the trait definition are exactly the same, except that
    a class definition can have the parameters passed to the primary constructor of
    a class but a trait definition cannot have such parameters.


    ```

    class Car(door: Int )

    trait Car (door: Int) // does not compile - Car is already defined as class Car

    ```


    In the next section, you will explore using traits for modeling complex class
    hierarchies that you cannot model in Java.'
