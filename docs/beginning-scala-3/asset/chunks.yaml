- fmt: "# Givens and Imports\n\nAs you read in the previous section, one of the restrictions\
    \ of the use of `given` sentences is the need to be in the same scope. Scala 3\
    \ offers a way to import and include in the same scope.\n\n```\nobject A:\n  val\
    \ name = \"0\"\n  def hello(s: String) = s\"$s, hello from $name\"\n  class A1\n\
    \  class A2\n  class A3\n  given a1: A1 = A1()\n  given a2: A2 = A2()\n  given\
    \ a3: A3 = A3()\n```\n\nLet’s see some possible ways to import the `given` sentences:\n\
    \n```\nimport A.{given _} // Imports ONLY the givens\nimport A.{given a1} // Imports\
    \ explicitly a1\nimport A.{given _, _} // Imports everything in A\nimport A._\
    \ // Imports everything EXCEPT the givens\nimport A.*       // Imports everything\
    \ EXCEPT the givens\nimport A.given   // Imports ONLY the givens\n```\n\nUsing\
    \ this type of import, you can declare in an explicit way which things you need\
    \ to use in your classes or objects.\n\n## Using Clauses\n\nIn Scala, it is not\
    \ necessary to explicitly pass parameters to a method. In previous version of\
    \ Scala, this functionality is connected directly with `implicit`, but in Scala\
    \ 3.x.x, the same functionality has a new keyword named `using`.\n\nTo explain\
    \ this concept well, let’s create some types of order.\n\n```\ntrait Ord[T]:\n\
    \  def compare(x: T, y: T): Int\n  extension (x: T) def < (y: T) = compare(x,\
    \ y) < 0\n  extension (x: T) def > (y: T) = compare(x, y) > 0\n  given intOrd:\
    \ Ord[Int] with\n    def compare(x: Int, y: Int) =\n      if x < y then -1\n \
    \     else if x > y then +1 else 0\n  given listOrd[T](using ord: Ord[T]): Ord[List[T]]\
    \ with\n    def compare(xs: List[T], ys: List[T]): Int = (xs, ys) match\n    \
    \  case (Nil, Nil) => 0\n      case (Nil, _) => -1\n      case (_, Nil) => +1\n\
    \      case (x :: xs1, y :: ys1) =>\n        val fst = ord.compare(x, y)\n   \
    \     if fst != 0 then fst else compare(xs1, ys1)\n```\n\nNow create a method\
    \ that receives numbers and, depending on the type of order, obtains the maximum\
    \ value.\n\n```\ndef max[T](x: T, y: T)(using ord: Ord[T]): T =\n  if ord.compare(x,\
    \ y) < 0 then y else x\n```\n\nAs you can see, your method receives two parameters\
    \ of the same type and does not use a specific type of `Ord`, which you can define\
    \ when you invoke another part of the code.\n\n```\nscala> max(1, 9)(using intOrd)\n\
    val res8: Int = 9\nscala> max(List(2,5, 1), List(1,2,3))(using listOrd)\nval res11:\
    \ List[Int] = List(2, 5, 1)\n```\n\n## Summary\n\nIn this chapter, you learned\
    \ Scala’s rules about variance, type bounds, and `given`/`using` classes.\n\n\
    # 9. Scala and Java Interoperability\n\nThis chapter describes how Scala is translated\
    \ to Java and the use of Java annotations in the Scala framework. The goal of\
    \ this chapter is to show you how easily you can integrate Scala with Java. You’ll\
    \ also learn how Scala annotations help in integration, such as when generating\
    \ JavaBean-style getters and setters.\n\n## Scala at a Glance\n\nOne of the main\
    \ design goals of Scala is to run on a JVM and provide interoperability with Java.\
    \ The need for Scala and Java interoperability arises when you want to use existing\
    \ Java libraries or frameworks. Scala code is often used in tandem with large\
    \ Java programs and frameworks. Even though integration with Java is easy for\
    \ the most part, we encourage you to use pure Scala as much as possible. When\
    \ you are working with a Java library or framework, first try to find something\
    \ equivalent in Scala. Use Java if there’s no equivalent Scala library available.\n\
    \nScala is compiled to Java bytecodes, and you can use tools like Java class file\
    \ disassembler `javap` to disassemble bytecodes generated by the Scala compiler.\
    \ By running on a JVM you can take advantage of all the frameworks and tools built\
    \ into other JVM languages. In most cases, Scala features are translated into\
    \ Java features so that Scala can easily integrate with Java. However, some Scala\
    \ features don’t directly map to Java, and in such a case, you have to learn how\
    \ to handle features that are available in Java but not in Scala. The features\
    \ that are available in Java but not in Scala are static members and checked exceptions.\
    \ An example of a Scala feature that is not available in Java is traits. If you\
    \ are using Java from Scala, you have to deal with mutability, exceptions, and\
    \ nulls that are interdicted in the Scala world. Because Scala works seamlessly\
    \ with Java, most of the time you can combine the languages without worrying too\
    \ much.\n\nNote that the Long Term Support (LTS) version of Java at the time of\
    \ writing is 11, which means new features could appear in new versions of Java\
    \ which are compatible in some way with Scala.\n\n## Translating Java Classes\
    \ to Scala Classes\n\nThe interoperability between Scala classes and Java classes\
    \ makes it straightforward to replace or extend an existing Java class with a\
