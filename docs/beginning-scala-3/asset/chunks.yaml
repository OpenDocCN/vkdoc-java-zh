    序列的常用方法


    | 方法 | 描述 | 示例 |

    | --- | --- | --- |

    | `head` | 返回集合的第一个元素 | `scala> x.head                                                        val
    res48: Int = 1` |

    | `tail` | 返回一个包含除第一个元素外所有元素的可迭代对象 | `scala> x.tailval res50: Seq[Int] = List(2,
    3)` |

    | `isEmpty` | 返回一个布尔表达式，当 `Set` 为空时值为 true | `scala> x.isEmpty                                                         val
    res47: Boolean = false` |

    | `contains` | 返回一个布尔表达式，当元素存在于集合中时值为 true | `scala> x.contains(2)                                                           val
    res53: Boolean = true` |

    | `length` | 返回一个 `Int`，表示集合中包含的元素数量 | `scala> x.lengthval res52: Int = 3` |

    | `reverse` | 返回一个元素顺序相反的新集合 | `scala> x.reverseval res51: Seq[Int] = List(3,
    2, 1)` |


