    \ applied function. Then the second argument, 2, was passed into `partiallyAdd`.\
    \ When you provide all the parameters, the original function is executed, yielding\
    \ the result.\n\n## Curried Functions\n\nCurrying converts a function with multiple\
    \ parameters, creating a chain of functions, each expecting a single parameter.\n\
    \nLet’s look at a simple `add` function that adds two `Int` parameters, `a` and\
    \ `b`, as illustrated here:\n\n```\nscala> val add = (x: Int, y: Int) => x + y\n\
    add: (Int, Int) => Int = \nscala> add(3,3)\nres38: Int = 6\n```\n\nIn Scala, curried\
    \ functions are defined with multiple parameter lists, as follows:\n\n```\ndef\
    \ add(x: Int)(y: Int) = x + y\n```\n\nYou can also use the following syntax to\
    \ define a curried function:\n\n```\ndef add(x: Int) = (y: Int) => x + y\n```\n\
    \nAs you can see, instead of one list of two `Int` parameters, you apply the curried\
    \ `add` function to two lists of one `Int` parameter. Thus, the curried `add`\
    \ function looks like this:\n\n```\nscala> def curriedAdd(a: Int)(b: Int) = a\
    \ + b\ncurriedAdd: (a: Int)(b: Int)Int\nscala> curriedAdd(2)(2)\nres1: Int = 4\n\
    ```\n\nYou could define more than two parameters on a curried function. Your `add`\
    \ function that takes two arguments is transformed into its curried equivalent.\n\
    \n## Function Compositions\n\nIn functional programming, you can compose functions\
    \ from other functions, such a `tan(x) = sin(x)/cos(x)`. An implication of composability\
    \ is that functions can be treated as values. So far, you’ve created simple functions\
    \ and manipulated the function instances. However, you can also build functions\
    \ from other functions. The `functionalTo` composition provides the basis for\
    \ a lot of cool things in Scala, including the parser combinator, which you will\
    \ explore in Chapter [8](#328789_3_En_8_Chapter.xhtml). But for now, let’s see\
    \ the difference between interpreting a series of commands and “compiling” a function\
    \ that interprets them. First, let’s define the grammar. We have expressions,\
    \ which can be constant values or named variables. Expressions can also be the\
    \ addition or multiplication of other expressions. Here’s a collection of case\
    \ classes that describes the grammar (recall that we covered case classes in Chapter\
    \ [3](#328789_3_En_3_Chapter.xhtml)):\n\n```\nsealed trait Expr\ncase class Add(left:\
    \ Expr, right: Expr) extends Expr\ncase class Mul(left: Expr, right: Expr) extends\
    \ Expr\ncase class Val(value: Int) extends Expr\ncase class Var(name: String)\
    \ extends Expr\nWe can build expressions like 1 + 1, Add(Val(1), Val(1)), 3 *\
    \ (1 + 1), Mul(Val(3),\nAdd(Val(1), Val(1)), and a * 11, Mul(Var(\"a\"), Val(11)).\n\
    ```\n\nYou can evaluate an expression by interpreting the expression.\n\n```\n\
    def calc(expr: Expr, vars: Map[String, Int]): Int = expr match {\ncase Add(left,\
    \ right) => calc(left, vars) + calc(right, vars)\ncase Mul(left, right) => calc(left,\
    \ vars) * calc(right, vars)\ncase Val(v) => v\ncase Var(name) => vars(name)\n\
    }\n```\n\nLet’s look at how this method works. `expr` is the expression to evaluate,\
    \ and `vars` is a Map that contains the variables. You use pattern matching, which\
    \ you will see in the next chapter, to determine what to do based on the case\
    \ class. If `expr` is an `Add`, you extract the left and right parameters, which\
    \ are themselves `Exprs`. You call `calc` to calculate the value of the left and\
    \ right parameters and add the results. If `expr` is `Mul`, you do the same thing\
    \ (except you multiply things rather than add them). If `expr` is `Val`, you simply\
    \ extract the value and return it. If `expr` is `Var`, you extract the name and\
    \ return the lookup of the name in the `vars` Map . You can turn this from a method\
    \ call into a function. Having a function allows you to pass around the logic\
    \ that the expression represents. It also means that you don’t have to interpret\
    \ the tree of `Exprs` each time. Let’s see how to compose a function based on\
    \ the `Expr`.\n\n```\ndef buildCalc(expr: Expr): Map[String, Int] => Int = expr\
    \ match {\ncase Add(left, right) =>\nval lf = buildCalc(left)\nval rf = buildCalc(right)\n\
    m => lf(m) + rf(m)\ncase Mul(left, right) =>\nval lf = buildCalc(left)\nval rf\
    \ = buildCalc(right)\nm => lf(m) * rf(m)\ncase Val(v) => m => v\ncase Var(name)\
    \ => m => m(name)\n}\n```\n\nThe `buildCalc` method returns a function that can\
    \ be passed to other functions. Also, the JVM can optimize the composed functions\
    \ so that they perform better than the interpreted version. The performance of\
    \ the composed function is better because there is no overhead associated with\
    \ pattern matching each element. The function is evaluated by repeatedly calling\
    \ the function’s `apply` method. Thus, the cost of each node is one or two method\
    \ dispatches rather than the cost of the pattern matching. Let’s turn to other\
    \ ways that functions can help improve performance and readability."
  trans: "\n## 部分应用函数\n\n在函数式编程语言中，当你调用一个带有参数的函数时，就称为将函数应用于这些参数。当所有参数都传递给函数时，你就将函数完全应用到了所有参数上。\n\
    \n一个简单的 `add` 函数：\n\n```\nscala> val add = (x: Int, y: Int) => x + y\nadd: (Int,\
    \ Int) => Int = \n```\n\n`<function2>` 表示这是一个有两个参数的函数。\n\n```\nscala> add(1,2)\n\
    res01: Int = 3\n```\n\n但是，当你只向函数提供一部分参数时，表达式的结果就是一个部分应用函数。\n\n```\nval partiallyAdd\
    \ = add(1, _:Int)\n```\n\n因为你没有为第二个参数提供值，所以变量 `partiallyAdd` 就是一个部分应用函数。你可以在 REPL\
    \ 中看到这一点。\n\n```\nscala> val partiallyAdd = add(1, _:Int)\npartiallyAdd: Int =>\
    \ Int = \n```\n\nREPL 的输出显示 `partiallyAdd` 是一个实现了 `Function1` 特质的函数。实现 `Function1`\
    \ 特质表明 `partiallyAdd` 函数接受一个参数。当你给 `partiallyAdd` 一个 `Int` 值 2 时，你会得到传入 `add`\
    \ 和 `partiallyAdd` 函数的 `Int` 数值之和：\n\n```\nscala> partiallyAdd(2)\nres02: Int\
    \ = 3\n```\n\n第一个参数 1 被传入了原始的 `add` 函数，并创建了一个名为 `partiallyAdd` 的新函数，这是一个部分应用函数。然后，第二个参数\
    \ 2 被传入了 `partiallyAdd`。当你提供所有参数时，原始函数就会被执行，从而产生结果。\n\n## 柯里化函数\n\n柯里化将一个具有多个参数的函数转换为一系列函数，每个函数只期望一个参数。\n\
    \n让我们看一个简单的 `add` 函数，它相加两个 `Int` 参数 `a` 和 `b`，如下所示：\n\n```\nscala> val add = (x:\
    \ Int, y: Int) => x + y\nadd: (Int, Int) => Int = \nscala> add(3,3)\nres38: Int\
    \ = 6\n```\n\n在 Scala 中，柯里化函数通过多个参数列表来定义，如下所示：\n\n```\ndef add(x: Int)(y: Int)\
    \ = x + y\n```\n\n你也可以使用以下语法来定义一个柯里化函数：\n\n```\ndef add(x: Int) = (y: Int) =>\
    \ x + y\n```\n\n如你所见，不是使用一个包含两个 `Int` 参数的列表，而是将柯里化的 `add` 函数应用于两个各包含一个 `Int` 参数的列表。因此，柯里化的\
    \ `add` 函数看起来像这样：\n\n```\nscala> def curriedAdd(a: Int)(b: Int) = a + b\ncurriedAdd:\
    \ (a: Int)(b: Int)Int\nscala> curriedAdd(2)(2)\nres1: Int = 4\n```\n\n你可以在一个柯里化函数上定义超过两个参数。你的接受两个参数的\
    \ `add` 函数被转换成了它的柯里化等价形式。\n\n## 函数组合\n\n在函数式编程中，你可以从其他函数组合出函数，例如 `tan(x) = sin(x)/cos(x)`。可组合性的一个含义是函数可以被当作值来处理。到目前为止，你已经创建了简单的函数并操作了函数实例。然而，你也可以从其他函数构建函数。`functionalTo`\
    \ 组合为 Scala 中许多酷炫的功能提供了基础，包括解析器组合子，你将在第 8 章中探索它。但现在，让我们看看解释一系列命令与“编译”一个解释它们的函数之间的区别。首先，让我们定义语法。我们有表达式，可以是常量值或命名变量。表达式也可以是其他表达式的加法或乘法。以下是一组描述该语法的\
    \ case 类（回顾一下，我们在第 3 章中介绍了 case 类）：\n\n```\nsealed trait Expr\ncase class Add(left:\
    \ Expr, right: Expr) extends Expr\ncase class Mul(left: Expr, right: Expr) extends\
    \ Expr\ncase class Val(value: Int) extends Expr\ncase class Var(name: String)\
    \ extends Expr\n我们可以构建像 1 + 1, Add(Val(1), Val(1)), 3 * (1 + 1), Mul(Val(3),\n\
    Add(Val(1), Val(1))), 以及 a * 11, Mul(Var(\"a\"), Val(11)) 这样的表达式。\n```\n\n你可以通过解释表达式来求值。\n\
    \n```\ndef calc(expr: Expr, vars: Map[String, Int]): Int = expr match {\ncase\
    \ Add(left, right) => calc(left, vars) + calc(right, vars)\ncase Mul(left, right)\
    \ => calc(left, vars) * calc(right, vars)\ncase Val(v) => v\ncase Var(name) =>\
    \ vars(name)\n}\n```\n\n让我们看看这个方法是如何工作的。`expr` 是要求值的表达式，`vars` 是一个包含变量的 Map。你使用模式匹配（你将在下一章中看到）来根据\
    \ case 类决定做什么。如果 `expr` 是 `Add`，你提取左右参数，它们本身也是 `Exprs`。你调用 `calc` 来计算左右参数的值并将结果相加。如果\
    \ `expr` 是 `Mul`，你执行相同的操作（只不过你是相乘而不是相加）。如果 `expr` 是 `Val`，你只需提取值并返回它。如果 `expr`\
    \ 是 `Var`，你提取名称并在 `vars` Map 中查找该名称并返回。你可以将其从方法调用转换为函数。拥有一个函数允许你传递表达式所代表的逻辑。这也意味着你不必每次都解释\
    \ `Exprs` 树。让我们看看如何基于 `Expr` 组合一个函数。\n\n```\ndef buildCalc(expr: Expr): Map[String,\
    \ Int] => Int = expr match {\ncase Add(left, right) =>\nval lf = buildCalc(left)\n\
    val rf = buildCalc(right)\nm => lf(m) + rf(m)\ncase Mul(left, right) =>\nval lf\
    \ = buildCalc(left)\nval rf = buildCalc(right)\nm => lf(m) * rf(m)\ncase Val(v)\
    \ => m => v\ncase Var(name) => m => m(name)\n}\n```\n\n`buildCalc` 方法返回一个可以传递给其他函数的函数。此外，JVM\
    \ 可以优化组合后的函数，使其性能优于解释版本。组合函数的性能更好，因为与每个元素的模式匹配相关的开销不存在。该函数通过重复调用函数的 `apply` 方法来进行求值。因此，每个节点的成本是一次或两次方法分发，而不是模式匹配的成本。让我们转向函数可以帮助提高性能和可读性的其他方式。\n"
- fmt: '# Function Error Handling


    When you write code that follows the OOP paradigm, you can use a mechanism to
    catch the exceptions and do something with the error. In functional programming,
    you can’t return an exception because it follows the idea that it always needs
    to return something (pure functions). Scala provides some mechanisms to solve
    this situation:


    * **Option/Some/None**: `Option` is the same idea as `Optional` in Java, so the
    function can return two possible values: an integer (`Some`) or nothing (`None`).
    This approach is great because you reduce the number of blocks if/else to check
    by null.


    The following example takes a `String` and tries to transform it into an `Int`:


    ```

    scala> def transformToInt(number:String) : Option[Int] =

    |     try

    |        Some(Integer.parseInt(number))

    |     catch

    |        case e: NumberFormatException => None

    def transformToInt(number: String): Option[Int]

    ```


    Now check what happens when you pass a correct value to the function:


    ```

    scala> transformToInt("1")

    val res1: Option[Int] = Some(1)

    ```


    Let’s see if you send something that is not a number:


    * **Try/Success/Failure**: This trio of classes has the same idea as the previous
    one but has some features like `Failure`, which contains which exception causes
    the error, and `Try`, which has an easy way to catch all possible exceptions in
    the function.


    ```

    scala> transformToInt("a")

    val res0: Option[Int] = None

    ```


    ```

    scala> import scala.util.{Try, Success, Failure}

    scala> def transformToInt(number: String): Try[Int] = Try(Integer.parseInt(number))

    def makeInt(number: String): util.Try[Int]

    ```


    Now check what happens when you pass to the function a correct value:


    ```

    scala> transformToInt("1")

    val res2: util.Try[Int] = Success(1)

    ```


    Let’s see if you send something that is not a number:


    ```

    scala> transformToInt("s")

    val res3: util.Try[Int] = Failure(java.lang.NumberFormatException: For input string:
    "s")

    ```


    ## Tail Calls and Tail Call Optimization


    A recursive function may invoke itself. Recursion plays a crucial role in functional
    programming because it offers a way to iterate over data structures using mutable
    data since each function call has its stack for storing function parameters. One
    classic example of recursion can be seen in the implementation of `factorial`
    as shown:


    ```

    scala> def factorial(number:Int) : Int = {

    |     if (number == 1)

    |        return 1

    |     number * factorial (number - 1)

    | }

    factorial: (number: Int)Int

    ```


    You can call this function as shown here:


    ```

    scala> println(factorial(3))

    ```


    One problem associated with using recursive functions is that invoking a recursive
    function too many times leads to a stack overflow error. The Scala compiler can
    optimize recursive functions with tail recursion so that recursive calls do not
    use all the stack space and therefore won’t run into a stack overflow error. Tail
    recursion is a specific kind of recursion that occurs when a function calls itself
    in its final operation. With tail recursion-optimized functions, recursive invocation
    doesn’t create a new stack but instead uses the current function’s stack. Only
    functions whose last statement is the recursive invocation can be optimized for
    tail recursion by the Scala compiler.


    Next is the implementation of `factorial`, calculated with tail-call recursion.
    To facilitate tail-call optimization, Scala provides an annotation available to
    mark a function to be optimized for tail recursion. A function marked with the
    tail recursion function annotation causes an error at compilation time if it cannot
    be optimized for tail recursion. To mark a function to be optimized for tail recursion,
    add `@annotation.tailrec` before the function definition.


    Now mark the `factorial` function shown earlier with `@annotation.tailrec` to
    instruct the Scala compiler that this function must be optimized for tail recursion
    and that if an annotated function cannot be optimized for tail recursion, the
    compiler should treat it as an error.


    ```

    scala> @annotation.tailrec

    | def factorial(number:Int) : Int = {

    |     if (number == 1)

    |        return 1

    |     number * factorial (number - 1)

    | }

    :12: error: could not optimize @tailrec annotated method factorial: it contains
    a recursive call not in tail positionnumber * factorial (number - 1)^

    ```


    As you can see, the Scala compiler throws an error. The `factorial` method can’t
    be optimized because the recursive call is not the last statement in the function;
    the factorial calls itself and then performs multiplication with the result, so
    actually, multiplication is the last statement in the function, not the recursive
    call. A function can’t be optimized for tail recursion if the result of invoking
    itself is used for anything but the direct return value.


    The `factorial` method marked with `@annotation.tailrec` will not compile successfully
    until recursion is the final operation. So you need to perform the multiplication
    operation before invoking the `factorial` method for which you use the accumulator
    argument to hold the computation in progress. This argument is computed with a
    multiplication before the recursive call. Thus, recursion is the final operation.


    ```

    scala> @annotation.tailrec

    | def factorial(accumulator: Int, number: Int) : Int = {

    |   if(number == 1)

    |     return accumulator

    |   factorial(number * accumulator, number - 1)

    | }

    factorial: (accumulator: Int, number: Int)Int

    ```


    A successful compile guarantees that the function will be optimized with tail
    recursion so that each successive call will not add new stack frames.


    ```

    scala> println(factorial(1,3))

    ```'
