- fmt: '### Conversion


    Scala has the ability to automatically convert numbers from one type to another
    following this particular order: `Byte` ➤ `Short` ➤ `Int` ➤ `Long` ➤ `Float` ➤
    `Double`. The following is an example of creating a `Byte` and assigning it to
    a `Short`. You explicitly declare the type in the REPL.


    ```

    scala> val byteNumber: Byte = 1

    val byteNumber: Byte = 1

    scala> val shortNumber: Short = byteNumber

    val shortNumber: Short = 1

    ```


    As an alternative to converting one type to another by assigning the value in
    a variable, you can use the methods that provide each type. This alternative is
    useful when you need to compare two variables that have different types, and it’s
    a safe way to convert any type to another, such as `Float` to `Short`. If you
    want to see the methods to convert from one type to another, you can type the
    name of the variable with `to` and press the Tab key.


    ```

    scala> byteNumber.to

    toByte   toChar   toDouble   toFloat   toInt   toLong   toShort   toString

    ```


    This great feature of converting one type into another does not work in the reverse
    order, so if you try to convert a `Float` into an `Int`, an exception will appear.


    ```

    scala> val otherByteNumer : Byte = shortNumber

    1 |val otherByteNumer : Byte = shortNumber

    |                            ^^^^^^^^^^^

    |                            Found:    (shortNumber : Short)

    |                            Required: Byte

    ```


    Scala offers the ability to declare big/complex numbers using underscores, and
    the compiler traduces this in the common format.


    ```

    scala> val longNumber : Long = 1_250_000

    val longNumber: Long = 1250000

    ```


    ### Format


    Converting into another format is a great feature but sometimes you only need
    to convert a numeric type as a `String` to save it in another place, add the currency
    symbol, or just print in the console/log.


    To do this, you need to import a particular class that contains all the logic
    to do this conversion. In the following example, you create a format to print
    a number with the currency symbol:


    ```

    scala> import java.text.NumberFormat

    scala> val formmater = NumberFormat.getCurrencyInstance

    scala> println(formmater.format(999.99))

    $999.99

    ```


    Not all of the types and formats that this class contains are solutions for your
    problems, so if you want to create a custom format outside those defined in the
    `NumberFormat` class, you can use `DecimalFormat`.


    ```

    scala> import java.text.DecimalFormat

    scala> val formatter = DecimalFormat("0.##")

    scala> println(formatter.format(99.1221))

    99.12

    ```


    ### Boolean


    The `Boolean` type is used to indicate variables that can only have two possible
    values, `true` or `false`, such as *the flight is international* or *the product
    is refurbished*.


    ```

    scala> val booleanType = true

    val booleanType: Boolean = true

    ```


    Also, you can negate a `Boolean` to obtain the opposite value, which is extremely
    useful in a block of control like `if`, `for`, or `while`.


    ```

    scala> val negateBooleanType = !booleanType

    val negateBooleanType: Boolean = false

    ```


    ### Char


    `Char` types are written with single quotes to indicate that the content is just
    one character (any character at all but just one). The main differences from the
    `String` type are that with a `String` type you can have multiple characters inside
    and you need to use the double quotes to declare or assign the content to a variable.


    ```

    scala> val charType = ''X''

    val charType: Char = X

    ```


    In this type, you can use methods to obtain certain information about the content
    of the variable. `isLetter` and `isLetterOrDigit` are two methods that you can
    use to verify the content.


    ```

    scala> charType.isLetter

    val res0: Boolean = true

    ```


    ### Unit


    The `Unit` type is used to represent the logic, method, or variable. It does not
    return anything. You can think of it as a `void` in Java or C++.


    ```

    scala> val empty = ()

    empty: Unit = ()

    ```


    ### Strings


    In any language, you will need to manipulate strings that contain certain information
    like an address or the full name of a person. The main difference from a `Char`
    type is that a `String` type can contain a certain number of characters and you
    need to use double quotes to declare the content.


    ```

    scala> val stringType = "This variable is a string"

    val stringType: String = This variable is a string

    ```


    Also, you can define a `String` over multiple lines. To use a double quote to
    declare the start or the finish of this type, you need to use `"""`.


    ```

    scala> val multiLine = """This string

    | contain multiples

    | lines"""

    val multiLine: String = This string

    contain multiples

    lines

    ```


    #### Interpolation


    Interpolation is a mechanism that allows you to combine strings and values defined
    in variables. To use this feature, start the declaration with `s` and follow with
    the string to use; it can be a variable or you can declare the string in the same
    place. The main thing is to import the variables to use. To do so, you need to
    declare the variables with the dollar symbol and round by `{}`.


    ```

    scala> val fullName = "John Q"

    val fullname: String = John Q

    scala> print(s"Hello ${fullname}")

    Hello John Q

    ```


    #### Compare


    In some languages, like Java, it is not recommended to use `==` to compare `String`s,
    but in Scala, it is permitted.


    ```

    scala> val nameOne = "Martin"

    scala> val nameTwo = "Martin"

    scala> print(nameOne == nameTwo)

    true

    ```


    There are some methods (`equalsIgnoreCase`) to compare `String`s and ignore lowercase
    and uppercase. This is a great alternative when you don’t care if the letters
    are in a certain case.


    ```

    scala> val nameOne = "Martin"

    scala> val nameTwo = "martin"

    scala> print(nameOne.equalsIgnoreCase(nameTwo))

    true

    ```


    #### Split


    Separating a `String` into an array is a common practice to iterate the content
    of a group or count the number of occurrences of some word. You can combine it
    with other methods, like replacing a part of the content.


    ```

    scala> val splitText = "This is a test to split the text"

    scala> splitText.split(" ")

    val res0: Array[String] = Array(This, is, a, test, to, split, the, text)

    ```


    #### Replace


    `String` provides a set of methods to replace part of the content with another
    value. If the value you want to find in the `String` does not exist, nothing will
    happen.


    ```

    scala> val replaceText = "This is a test to explit the test"

    scala> replaceText.replace("explit", "split")

    val res0: String = This is a test to split the test

    ```


    The method finds the first occurrence of this condition and replaces the content
    but does not look for more possible occurrences. If you want to replace all occurrences,
    you need to use the method `replaceAll`.


    #### Special Characters


    Inside the `String` type, you can use special characters to indicate tabulation,
    a new line, or a simple quote. Table [2-2](#328789_3_En_2_Chapter.xhtml#Tab2)
    lists some of the most common escape characters.


    **Table 2-2** Common Escape Characters


    | Character | Description | Example |

    | --- | --- | --- |

    | `\b` | Backspace | `scala> val commonString = "test\bspecial" val commonString:
    String = tesspecial` |

    | `\t` | Tabulation | `scala> val commonString = "test\tspecial" val commonString:
    String = test  special` |

    | `\n` | Newline | `scala> val commonString = "test\nspecial" val commonString:
    String = test special` |

    | `\''` | Single quote ('') | `scala> val commonString = "this test isn\''t special"
    val commonString: String = this test isn''t special` |'
