    ## 总结


    本章带你了解了 Scala 集合框架，并向你展示了该框架的三个主要包。本章深入探讨了如何使用 List。你看到了许多使用 List 的方法。你探索了诸如 head
    和 tail 等基本操作，像 `map` 这样的高阶操作，以及 List 对象中的实用方法。然而，List 只是 Scala 支持的集合类型之一。本章概述了
    Scala 集合库及其中的最重要的类和特质。有了这个基础，你应该能够有效地使用 Scala 集合，并且知道在需要更多信息时，在 Scaladoc 中查找何处。


