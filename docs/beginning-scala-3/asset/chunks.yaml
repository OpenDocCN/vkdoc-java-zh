    extra constructor with the Java code showing the `Book` class at the beginning
    of this section, you will see that you did not add the corresponding getters and
    setters. But you can still get and set `ISBN` and `title` because of the generated
    getters and setters that follow the Scala convention. When you compile the code
    with the extra constructor with `scalac` and then disassemble it with `javap`,
    you’ll see that no corresponding getter or setter methods are generated and the
    only getters and setters that are generated are the ones that follow the Scala
    convention as shown below:


    ```

    $ scalac Book.scala

    $ javap Book

    ```


    Here is code compiled from `Book.scala`:


    ```

    public class Book {

    public int isbn();

    public void isbn_$eq(int);

    public java.lang.String title();

    public void title_$eq(java.lang.String);

    public Book(int, java.lang.String);

    public Book(java.lang.String);

    }

    ```


    So the class definition generates getter and setters that follow Scala conventions
    but don’t follow Java conventions. Generating getters and setters that follow
    Java conventions becomes important when you need to interact with a Java class
    or a library that accepts only classes that conform to the JavaBean specification.
    You will see this in the next section.


    ## JavaBean Specification-Compliant Scala Classes


    To ensure compatibility with Java frameworks, you may need Java-style getters
    and setters on the fields of your class to interact with a Java class or library
    that accepts only classes that conform to the JavaBean specification. To have
    Java-style getters and setters is to annotate the field with the `scala.beans.BeanProperty`,
    as shown in the following lines of code:


    ```

    import scala.beans.BeanProperty

    class Book(@BeanProperty var isbn:Int, @BeanProperty var title:String)

    ```


    You can run this code in the REPL.


    ```

    scala> import scala.beans.BeanProperty

    import scala.beans.BeanProperty

    scala> class Book(@BeanProperty var isbn:Int, @BeanProperty var title:String)

    defined class Book

    ```


    You can see how the `@BeanProperty` annotation works by compiling the `Book` class
    and then disassembling it. First, it saves these contents to a file named `Book.scala`
    and then compiles the class.


    ```

    $ scalac Book.scala

    ```


    After it’s compiled, it’s disassembled with the `javap` command.


    ```

    $ javap Book

    ```


    This code shows the compiled `Book` class from `Book.scala`:


    ```

    public class Book {

    public Book(int, java.lang.String);

    public int getIsbn();

    public void setIsbn(int);

    public java.lang.String getTitle();

    public void setTitle(java.lang.String);

    public int isbn();

    public void isbn_$eq(int);

    public java.lang.String title();

    public void title_$eq(java.lang.String);

    }

    ```


    As you can see from the disassembled code, the methods `getTitle`, `setTitle`,
    `getIsbn`, and `setIsbn` have all been generated because of the `@BeanProperty`
    annotation. Note that without these methods, your class will not follow the JavaBean
    specification.


    Let’s see code compiled from `Book.scala` without the `@BeanProperty`.


    ```

    public class Book {

    public Book(int, java.lang.String);

    public int isbn();

    public void isbn_$eq(int);

    public java.lang.String title();

    public void title_$eq(java.lang.String);

    }

    ```


    **Note**: Use the `@BeanProperty` annotation on your fields, making sure you declare
    each field as a `var`. If you declare your fields as type `val`, the setter methods
    (`setTitle`, `setIsbn`) won’t be generated.


    You saw how to use the `@BeanProperty` annotation on class constructor parameters.
    In the same manner, you can also use the `@BeanProperty` annotation on fields
    in a Scala class.


    Next, you will learn to use a Scala feature not available in Java, such as traits.'
  raw: '### Translating Multiple Constructors


    Let’s now see how to translate multiple constructors while refactoring a Java
    class to a Scala class. For instance, take the `Book` Java class shown here:


    ```

    public class Book {

    private Integer isbn;

    private String title;

    public Book(Integer isbn) {

    this.isbn = isbn;

    }

    public Book(Integer isbn, String title) {

    this.isbn = isbn;

    this.title = title;

    }

    public Integer getIsbn() {

    return isbn;

    }

    public void setIsbn(Integer isbn) {

    this.isbn = isbn;

    }

    public String getTitle() {

    return title;

    }

    public void setTitle(String title) {

    this.title = title;

    }

    }

    ```


    As you can see, the `Book` Java class has two constructors, one that takes `ISBN`
    as the parameter and the other that takes `ISBN` and `title` as the parameters.
    The `Book` Java class also has getters and setters for `title` and `ISBN`. Now
    let’s refactor the `Book` Java class into a Scala class with `class` parameters
    and create an instance.


    ```

    class Book ( var isbn: Int, var title: String)

    ```


    You can try this code in the REPL:


    ```

    scala> class Book (var isbn: Int, var title: String)

    defined class Book

    scala> val book = new Book(999, "Beginning Scala") book: Book = Book@10ddb0e

    ```


    However, a constructor that takes only a single parameter, `title`, does not exist
    in the Scala definition. For example, if you create the `Book` instance with a
    constructor that takes a single `title` parameter, you will get an error in the
    REPL:


    ```

    scala> new Book("Beginning Java")

    1 |new Book("Beginning Java")

    |         ^^^^^^^^^^^^^^^^

    |         Found:    ("Beginning Java" : String)

    |         Required: Int

    ```


    To complete your refactoring of the Java class, you need an extra constructor.


    ```

    class Book (var isbn: Int, var title: String):

    def this(title: String) = this(0, title)

    ```


    Is this code comprehensible to you? As you may recall, any auxiliary constructor
    must immediately call another `this(...)` constructor and call the primary constructor
    to make sure all the parameters are initialized. You learned about auxiliary constructors
    in Chapter [3](#328789_3_En_3_Chapter.xhtml).


    Now you can try the code in the REPL.


    ```

    scala> class Book (var isbn: Int, var title: String):

    |    def this(title: String) = this(0, title)

    defined class Book

    scala> val book1 = new Book(999, "Beginning Scala")

    book1: Book = Book@132c5fd

    scala> val book2 = new Book("Beginning Java")

    book2: Book = Book@3e4e8a

    ```


    This time, you created an instance with the auxiliary constructor.


    Now access `title` and `ISBN` in the REPL.


    ```

    scala> book1.title

    res38: String = Beginning Scala

    scala> book2.title

    res39: String = Beginning Java

    scala> book1.isbn

    res40: Int = 9999

    ```


    You can also set `title` as following:


    ```

    scala> book2.title = "Beginning Groovy"

    book2.title: String = Beginning Groovy

    scala> book2.title

    res42: String = Beginning Groovy

    ```


    So you can get and set `title` and `ISBN`. But if you compare the code with the
    extra constructor with the Java code showing the `Book` class at the beginning
    of this section, you will see that you did not add the corresponding getters and
    setters. But you can still get and set `ISBN` and `title` because of the generated
    getters and setters that follow the Scala convention. When you compile the code
    with the extra constructor with `scalac` and then disassemble it with `javap`,
    you’ll see that no corresponding getter or setter methods are generated and the
    only getters and setters that are generated are the ones that follow the Scala
    convention as shown below:


    ```

    $ scalac Book.scala

    $ javap Book

    ```


    Here is code compiled from `Book.scala`:


    ```

    public class Book {

    public int isbn();

    public void isbn_$eq(int);

    public java.lang.String title();

    public void title_$eq(java.lang.String);

    public Book(int, java.lang.String);

    public Book(java.lang.String);

    }

    ```


    So the class definition generates getter and setters that follow Scala conventions
    but don’t follow Java conventions. Generating getters and setters that follow
    Java conventions becomes important when you need to interact with a Java class
    or a library that accepts only classes that conform to the JavaBean specification.
    You will see this in the next section.


    ## JavaBean Specification-Compliant Scala Classes


    To ensure compatibility with Java frameworks, you may need Java-style getters
    and setters on the fields of your class to interact with a Java class or library
    that accepts only classes that conform to the JavaBean specification. To have
    Java-style getters and setters is to annotate the field with the `scala.beans.BeanProperty`,
    as shown in the following lines of code:


    ```

    import scala.beans.BeanProperty

