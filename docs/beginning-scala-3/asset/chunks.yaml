    ### The scala.collection.immutable package


    The `scala.collection.immutable` package stores various types of collections that
    are all immutable. The main classes and traits in this package are shown in Figure
    [6-2](#328789_3_En_6_Chapter.xhtml#Fig2), Figure [6-3](#328789_3_En_6_Chapter.xhtml#Fig3),
    and Figure [6-4](#328789_3_En_6_Chapter.xhtml#Fig4) for `Seq`, `Set`, and `Map`,
    respectively. The top part of the hierarchy looks the same as that shown in Figure
    [6-1](#328789_3_En_6_Chapter.xhtml#Fig1) for the `scala.collection` package. It
    begins with `Traversable` and `Iterable`, and then has three main subtypes in
    the form of `Set`, `Seq`, and `Map`. The difference is that there are many more
    subtypes.


    ![../images/328789_3_En_6_Chapter/328789_3_En_6_Fig4_HTML.png](images/328789_3_En_6_Chapter/328789_3_En_6_Fig4_HTML.png)


    Figure 6-4


    Immutable Map


    ![../images/328789_3_En_6_Chapter/328789_3_En_6_Fig3_HTML.png](images/328789_3_En_6_Chapter/328789_3_En_6_Fig3_HTML.png)


    Figure 6-3


    Immutable Set


    ![../images/328789_3_En_6_Chapter/328789_3_En_6_Fig2_HTML.png](images/328789_3_En_6_Chapter/328789_3_En_6_Fig2_HTML.png)


    Figure 6-2


    Immutable Seq


    #### Immutable Sequence


    Figure [6-2](#328789_3_En_6_Chapter.xhtml#Fig2) illustrates the `Seq` in the `scala.collection.immutable`
    package. The top part of the hierarchy looks the same as that shown in Figure
    [6-1](#328789_3_En_6_Chapter.xhtml#Fig1) for the `scala.collection` package.


    If you want an immutable collection that has efficient indexing, your default
    choice would generally be `Vector`. An immutable `IndexedSeq` creates a `Vector`,
    as shown here:


    ```

    scala> val x = scala.collection.immutable.IndexedSeq(1,2,3)

    val x: IndexedSeq[Int] = Vector(1, 2, 3)

    ```


    An immutable `LinearSeq` creates a `List`, as shown here:


    ```

    scala> val x = scala.collection.immutable.LinearSeq(1,2,3)

    val x: scala.collection.immutable.LinearSeq[Int] = List(1, 2, 3)

    ```


    An immutable `Seq` creates a `List`, too, as shown here:


    ```

    scala> val x = scala.collection.immutable.Seq(1,2,3)

    val x: Seq[Int] = List(1, 2, 3)

    ```


    A collection in the package `scala.collection.immutable` is guaranteed to be immutable
    for everyone. Such a collection will never change after it is created. This means
    that accessing the same collection value at different points in time will always
    yield a collection with the same elements.


    #### Immutable Set


    Figure [6-3](#328789_3_En_6_Chapter.xhtml#Fig3) illustrates the `Set` in the `scala.collection.immutable`
    package. The top part of the hierarchy looks the same as that shown in Figure
    [6-1](#328789_3_En_6_Chapter.xhtml#Fig1) for the `scala.collection` package.


    The difference between root collections `(scala.collection)` and immutable collections
    `(scala.collection.immutable)` is that clients of an immutable collection have
    a guarantee that nobody can mutate the collection as illustrated in the following
    code snippets.


    Using an immutable set:


    ```

    scala> val m = scala.collection.immutable.Set(1,2,3)

    val m: Set[Int] = Set(1, 2, 3)

    ```


    An immutable `SortedSet` creates a `TreeSet`:


    ```

    scala> val m = scala.collection.immutable.SortedSet(1,2,3)

    val m: scala.collection.immutable.SortedSet[Int] = TreeSet(1, 2, 3)

    ```


    Using an immutable `BitSet`:


    ```

    scala> val m = scala.collection.immutable.BitSet(1,2,3)

    val m: scala.collection.immutable.BitSet = BitSet(1, 2, 3)

    ```


    #### Immutable Map


    Figure [6-4](#328789_3_En_6_Chapter.xhtml#Fig4) illustrates the `Map` in the `scala.collection.immutable`
    package. The top part of the hierarchy looks the same as that shown in Figure
    [6-1](#328789_3_En_6_Chapter.xhtml#Fig1) for the `scala.collection` package.


    There are base mutable and immutable `Map` classes. `Map` is the base map, with
    both mutable and immutable implementations. In the following code snippets, you
    will see different ways to declare a `Map` in an immutable way.


    Using an immutable `Map` without requiring an import:


    ```

    scala> val m = Map(1 -> "a", 2 -> "b") bval m: Map[Int,String] = Map(1 -> a, 2
    -> b)

    ```


    Using an immutable `Map` with the prefix:


    ```

    scala> val m = scala.collection.immutable.Map(1 -> "a", 2 -> "b")

    val m: Map[Int,String] = Map(1 -> a, 2 -> b)

    ```


    Using an immutable `SortedMap`:


    ```

    scala> val m = scala.collection.immutable.SortedMap(1 -> "a", 2 -> "b")

    val m: scala.collection.immutable.SortedMap[Int,String] = Map(1 -> a, 2 -> b)

    ```'
