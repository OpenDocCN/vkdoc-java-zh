    # 8. Scala 类型系统


    编程语言的两个基本设计考量是静态类型与动态类型，以及强类型与弱类型。编程语言中的类型在编译时进行检查，并且可以由编译器推断。Scala 是一种强类型、静态类型的语言，拥有统一的类型系统。


    在静态类型中，变量与特定类型绑定。在动态类型中，类型与值绑定，而非变量。Scala 和 Java 是静态类型语言，而 JavaScript、Python、Groovy
    和 Ruby 是动态类型语言。


    如果类型是静态且强类型的，每个变量必须具有明确的类型。如果类型是动态且强类型的，每个值必须具有明确的类型。然而，在弱类型的情况下，没有定义明确的类型。Scala、Java
    和 Ruby 主要是强类型语言。某些语言，如 C 和 Perl，是弱类型的。


    Scala 兼具两者的优点，由于类型推断，它用起来像动态类型语言，同时，在高级对象模型和高级类型系统方面，它又为你提供了静态类型的所有好处。


    本章探讨诸如哪些类型参数在子类型化下应是协变、逆变或不变，以及审慎使用 `implicit` 等概念。


    ## 统一类型系统


    Scala 拥有一个统一类型系统，由层次结构顶部的类型 `Any` 和底部的类型 `Nothing` 界定，如图 8-1 所示。所有 Scala 类型都继承自
    `Any`。`Any` 的子类型是 `AnyVal`（值类型，如 Int 和 Boolean）和 `AnyRef`（引用类型，如 Java 中所示）。如图
    8-1 所示，Java 的原始类型包含在 `AnyVal` 之下，并且与 Java 不同，你可以定义自己的 `AnyVal`。此外，与 Java 不同，Scala
    没有像 Integer 这样的包装类型需要与 int 这样的原始类型区分开来。


    ![../images/328789_3_En_8_Chapter/328789_3_En_8_Fig1_HTML.png](img/328789_3_En_8_Fig1_HTML.png)


    图 8-1


    统一对象模型


    如图 8-1 所示，`Any` 是 `AnyRef` 和 `AnyVal` 的超类型。`AnyRef` 对应于 `java.lang.Object`，是所有对象的超类型。另一方面，`AnyVal`
    表示值，例如 int 和其他 JVM 原始类型。由于这种层次结构，可以定义接受 `Any` 的方法，从而与 `scala.Int` 实例以及 `java.lang.String`
    兼容，如下所示：


    ```

    scala> import scala.collection.mutable.ListBuffer

    import scala.collection.mutable.ListBuffer

    scala> val list = ListBuffer[Any]()

    list: scala.collection.mutable.ListBuffer[Any] = ListBuffer()

    scala> val x= 2

    x: Int = 2

    scala> list += x

    res12: list.type = ListBuffer(2)

    scala> class Book

    defined class Book

    scala> list += new Book()

    res13: list.type = ListBuffer(2, Book@15e8485)

    ```


    你可以限制一个方法仅能处理值类型，如下所示：


    ```

    def test(int: AnyVal) = ()

    test(5)

    test(5.12)

    test(new Object)

    ```


    在这段代码中，`test(5)` 接受一个扩展了 `AnyVal` 的 `Int`，`test(5.12)` 接受一个也扩展了 `AnyVal` 的 `Double`。`Test(new
    Object)` 接受一个扩展了 `AnyRef` 的 `Object`。请参考图 8-1。`Test(new Object)` 编译失败。


    ```

    scala> def test(int: AnyVal) = ()

    test: (int: AnyVal)Unit

    scala> test(5)

    scala> test(5.12)

    scala> test(new Object)

    :9: error: type mismatch;

    -- Error:

    1 |test(new Object)

    |     ^^^^^^^^^^

    |the result of an implicit conversion must be more specific than AnyVal

    ```


    其思想是，此方法只接受值类，无论是 `Int` 还是你自己的值类型。这意味着 Java 代码不如 Scala 代码类型安全。你可能在想，“但 Java 是一种静态类型语言。它难道不能像
    Scala 一样给我所有安全性吗？”答案是否定的。看看下面的代码并找出问题：


    ```

    public class Bad {

    public static void main(String[] argv) {

    Object[] a = argv;

    a[0] = new Object();

    }

    }

    ```


    这是合法的 Java 代码，运行代码时会发生以下情况：


    ```

    > java Bad Hello

    Exception in thread "main" java.lang.ArrayStoreException: java.lang.Object

    at Bad.main(Bad.java:4)

    ```


    Java 允许你将 `String[]` 赋值给 `Object[]`，因为 `String` 是 `Object` 的子类，所以如果数组是只读的，这种赋值是有意义的。然而，数组是可以修改的。所示的修改演示了
    Java 的“类型不安全”特性之一。我们将在本章后面讨论为什么会发生这种情况，以及关于不变、协变和逆变类型的复杂主题。让我们开始看看 Scala 如何让架构师的工作更轻松，同时也让编码人员的工作更轻松。


    ## 类型参数化


    Scala 的参数化类型类似于 Java 中的泛型。如果你熟悉 Java 或 C#，你可能已经对参数化类型有了一些了解。Scala 的参数化类型提供了与 Java
    泛型相同的特性，但功能更强大。


    注意


    接受类型参数的类和特质称为泛型；它们生成的类型称为参数化类型。


    一个直接的语法差异是 Scala 使用方括号（[...]），而 Java 使用尖括号（<...>）。例如，字符串列表的声明如下所示：


    ```

    val list : List[String] = List("A", "B", "C")

    ```


    Scala 允许在方法名中使用尖括号。因此，为了避免歧义，Scala 对参数化类型使用方括号。


    Scala 中的类型用于定义类、抽象类、特质、对象和函数。类型参数化使它们变得通用。例如，`Sets` 可以按以下方式定义为泛型：`Set[T]`。然而，与允许原始类型的
    Java 不同，在 Scala 中你需要指定类型参数。也就是说，`Set[T]` 是一个特质，但不是类型，因为它接受一个类型参数。


    因此，你不能创建 `Set` 类型的变量。


    ```

    scala> def test(s: Set) ={}

    -- Error:

    1 |def test(s: Set) ={}

    |            ^^^

    |            Missing type parameter for Set

    ```


    相反，特质 `Set` 允许你指定参数化类型，例如 `Set[String]`、`Set[Int]` 或 `Set[AnyRef]`。


    ```

    scala> def test(s: Set[AnyRef]) = {}

    def test(s: Set[AnyRef]): Unit

    ```


    例如，特质 `Set` 定义了一个泛型集合，其中具体的集合是 `Set[Int]` 和 `Set[String]` 等等。因此，`Set` 是一个特质，而
    `Set[String]` 是一个类型。`Set` 是一个泛型特质。


    注意


    在 Scala 中，`List`、`Set` 等也可以被称为类型构造器，因为它们用于创建特定类型。你可以通过指定类型参数来构造一个类型。例如，`List`
    是 `List[String]` 的类型构造器，而 `List[String]` 是一个类型。虽然 Java 允许原始类型，但 Scala 要求你指定类型参数，并且不允许你在需要类型的地方仅使用
    `List`，因为它期望的是一个真正的类型——而不是类型构造器。


    考虑到继承，类型参数提出了一个重要问题：`Set[String]` 是否应被视为 `Set[AnyRef]` 的子类型？也就是说，如果 `S` 是类型 `T`
    的子类型，那么 `Set[S]` 是否应被视为 `Set[T]` 的子类型？接下来，你将学习一个定义继承关系并回答上述问题的泛型类型概念。

    '
- fmt: '### Variance


    Variance defines inheritance relationships of parameterized types, which brings
    to light whether a `Set[String]`, for example, is a subtype of `Set[AnyRef]`.
    A declaration like class `Set[+A]` means that `Set` is parameterized by a type
    `A`. The `+` is called a variance annotation.


    Variance is an important and challenging concept. It defines the rules by which
    parameterized types can be passed as parameters. In the beginning of the chapter,
    we showed how passing a `String[]` (Java notation) to a method expecting an `Object[]`
    can cause problems. Java allows you to pass an array of something to a method
    expecting an array of something’s superclass. This is called covariance. On the
    surface, this makes a lot of sense. If you can pass a `String` to a method expecting
    an `Object`, why can’t you pass an `Array[String]` (Scala notation) to a method
    expecting an `Array[Object]`? Because `Array` is mutable; it can be written to
    in addition to being read from, so a method that takes an `Array[Object]` may
    modify the `Array` by inserting something that cannot be inserted into an `Array[String]`.


    Defining the type variance for type parameters allows you to control how parameterized
    types can be passed to methods. The variance comes in three flavors: invariant,
    covariant, and contravariant. Type parameters can be individually marked as covariant
    or contravariant and are by default invariant. Variance in Scala is defined by
    using `+` and `-` signs in front of type parameters.


    #### Covariant Parameter Types


    Covariant parameter types are designated with a `+` before the type parameter.
    A covariant type is useful for read-only containers. Scala’s `List` is defined
    as `List[+T]`, which means that it’s covariant on type `T`. `List` is covariant
    because if you pass a `List[String]` to a method that expects a `List[Any]`, then
    every element of the `List` satisfies the requirement that is an `Any` and you
    cannot change the contents of the `List`. Figure [8-2](#328789_3_En_8_Chapter.xhtml#Fig2)
    gives a very clear picture of covariance, such as if `S` extends `T`, then `Class[S]`
    extends `Class[T]`.


    ![../images/328789_3_En_8_Chapter/328789_3_En_8_Fig2_HTML.png](images/328789_3_En_8_Chapter/328789_3_En_8_Fig2_HTML.png)


    Figure 8-2


    Covariance in Scala


    Tip


    Covariance: If `S` extends `T` then `Class[S]` extends `Class[T]`.


    Let’s define an immutable class, `Getable`. Once an instance of `Getable` is created,
    it cannot change, so you can mark its type, `T`, as covariant.


    ```

    scala> class Getable[+T](val data: T)

    defined class Getable

    ```


    Let’s define a method that takes a `Getable[Any]`.


    ```

    scala> def get(in: Getable[Any]) =

    |      println("It''s "+in.data)

    def get(in: Getable[Any]): Unit

    ```


    You define an instance of `Getable[String]` here:


    ```

    scala> val gs = Getable("String")

    gs: Getable[java.lang.String] = Getable@10a69f0

    ```


    You can call `get` with `gs`.


    ```

    scala> get(gs)

    It''s String

    ```


    Let’s try the same example but pass a `Getable[java.lang.Double]` into something
    that expects a `Getable[Number]`.


    ```

    scala> def getNum(in: Getable[Number]) = in.data.intValue

    getNum: (Getable[java.lang.Number])Int

    scala> def gd = Getable(java.lang.Double.valueOf(33.3))

    gd: Getable[java.lang.Double]

    scala> getNum(gd)

    res7: Int = 33

    ```


    Yes, the covariance works the way you expect it to. You can make read-only classes
    covariant. This means that contravariance is good for write-only classes.


    #### Contravariant Parameter Types


    So, if covariance allows you to pass `List[String]` to a method that expects `List[Any]`,
    what good is contravariance? Contravariance indicates if `S` extends `T`, then
    `Class[T]` extends `Class[S]`, as illustrated in Figure [8-3](#328789_3_En_8_Chapter.xhtml#Fig3).


    ![../images/328789_3_En_8_Chapter/328789_3_En_8_Fig3_HTML.png](images/328789_3_En_8_Chapter/328789_3_En_8_Fig3_HTML.png)


    Figure 8-3


    Contravariance in Scala


    Tip


    Contravariance: If `S` extends `T`, then `Class[T]` extends `Class[S]`.


    Let’s first look at a write-only class, `Putable`.


    ```

    scala> class Putable[-T]:

    |     def put(in: T) =

    |         println("Putting "+in)

    |

    // defined class Putable

    ```


    Next, let’s define a method that takes a `Putable[String]`.


    ```

    scala> def writeOnly(in: Putable[String])=

    |     in.put("Hello")

    def writeOnly(in: Putable[String]): Unit

    ```


    And let’s declare an instance of `Putable[AnyRef]`.


    ```

    scala> val p = Putable[AnyRef]

    val p: Putable[AnyRef] = Putable@fb79241

    ```


    And what happens if you try to call `writeOnly`?


    ```

    scala> writeOnly(p)

    Putting Hello

    ```


    Okay, so you can call a method that expects a `Putable[String]` with a `Putable[AnyRef]`
    because you are guaranteed to call the `put` method with a `String`, which is
    a subclass of `AnyRef`. Standing alone, this is not particularly valuable, but
    if you have a class that does something with input that results in output, the
    value of contravariance becomes obvious.


    The inputs to a transformation are contravariant. Calling something that expects
    at least any `AnyRef` with a `String` is legal and valid. But the return value
    can be covariant because you expect to get back a number, so if you get an `Integer`,
    a subclass of `Numbers`, you’re okay. Let’s see how it works. You define `DS`
    with a contravariant `In` type and a covariant `Out` type.


    ```

    scala> trait DS[-In, +Out]:

    |     def apply(i: In): Out

    |

    // defined trait DS

    ```


    Let’s create an instance that will convert `Any` into an `Int`.


    ```

    scala>  val t1 = new DS[Any, Int]{def apply(i: Any) = i.toString.toInt}

    val t1: DS[Any, Int] = anon$1@430aae8e

    ```


    After that, create a method that invoke apply method on the trait:


    ```

    scala> def check(in: DS[String, Any]) = in("333")

    def check(in: DS[String, Any]): Any

    ```


    And you call to check with `t1`.


    ```

    scala> check(t1)

    res14: Any = 333

    ```'
