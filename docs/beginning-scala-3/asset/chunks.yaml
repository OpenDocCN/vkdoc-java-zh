- fmt: '### Custom Error Handler


    When you develop an application, exceptions or errors are part of the process.
    Most exceptions do not look pretty or provide a lot of information about the cause
    of the error.


    To clarify, the framework could throw an exception for any of these reasons:


    - The application throws an exception in some part of the code.

    - Something in the request is not correct, such as the request is invalid or the
    URL is not correct.

    - It returns an exception explicitly for some motive related to the business.


    Play Framework provides a default error handler that shows you the exceptions,
    which is not the best approach for receiving HTML in the response. To reduce the
    size of the response and give some useful information to the consumers of the
    API, you can create a custom error handler that implements the methods related
    to the errors of the clients and the server. The following code captures all the
    HTTP Status 4xx and 5xx errors and transforms an error into something more verbose:


    ```scala

    package exceptions

    import play.api.http.HttpErrorHandler

    import play.api.mvc._

    import play.api.http.Status._

    import play.api.mvc.Results._

    import scala.concurrent._

    import javax.inject.Singleton

    import java.util.UUID

    import play.api.libs.json.Json

    import scala.util.control.NonFatal

    @Singleton

    class CustomErrorHandler extends HttpErrorHandler {

    // 4xx response

    override def onClientError(request: RequestHeader, statusCode: Int, message: String):
    Future[Result] = {

    val id = UUID.randomUUID

    Future.successful(Status(statusCode)(Json.obj(

    "error" -> Json.obj(

    "id" -> id,

    "statusCode" -> statusCode.toString

    )

    )))

    }

    // 5xx response

    override def onServerError(request: RequestHeader, exception: Throwable): Future[Result]
    = {

    exception match {

    case NonFatal(e) => {

    val id = UUID.randomUUID

    Future.successful(InternalServerError(Json.obj(

    "error" -> Json.obj(

    "id" -> id,

    "statusCode" -> INTERNAL_SERVER_ERROR.toString

    )

    )))

    }

    }

    }

    }

    ```


    After you define your custom error handler, nothing happens until you enable it
    in the `application.conf` file. To do this, you need to add the following line
    of code:


    ```

    play.http.errorHandler = "exceptions.CustomErrorHandler"

    ```


    Now do a request to a non-existent URL, such as `http://localhost:9000/todolist`.
    With the API with the error handler enabled, if everything works well, you will
    see a JSON response like this:


    ```json

    {

    "error": {

    "id": "f9e08428-2c53-4410-9e4c-d951185ab28e",

    "statusCode": "404"

    }

    }

    ```


    ## Summary


    In this chapter, you learned how to create different types of applications, one
    that exposes HTML and another that exposes a set of endpoints, which is the standard
    nowadays to create microservices. You now know the different frameworks that exist
    to create each type of application, plus the pros and cons.


    There are many frameworks, but in this chapter, you learned how to use Play Framework
    because it is one of the most used by Scala developers and some Java developers.


    # 13. Testing Your Code


    Testing your code before launching it in production is a way to fix any error
    that you introduced when you developed a new feature. As you know, testing is
    a topic that has an incredible number of articles, talks, and discussions around
    different ways to write tests with the idea of reducing the complexity and increasing
    the coverage of your code.


    Nowadays most developers spend a lot of time developing a new feature or solving
    a bug, plus writing different types of tests with the idea of reducing the risk
    of deploying in production a block of code with a problem. It is not the scope
    of this chapter to explain testing types, but Martin Fowler has several articles
    that explain each type of testing with a lot of details.


    Scala is no exception to these rules and for that reason there are many libraries
    that test the different blocks of code you saw in previous chapters. Two of these
    libraries which are connected in some way are ScalaTest and ScalaMock. You will
    see them in more detail in the following sections.


    ## Testing with ScalaTest


    This library helps you to test your code in Scala (Scala 2.x.x or up, Scala Native,
    Scala.js) but you can use it to test classes in Java. Also, this library has good
    integration with other tools like JUnit, EasyMock, Mockito, ScalaMock, and ScalaCheck.
    If you use Java, this library does more or less the same as JUnit with different
    assertions.


    This library offers different styles of writing tests, and you can include methods
    after and before the execution of each test or the entire set of tests in one
    suite or class.


    You can use this library in the REPL but the best way to use it is to import it
    in a project with SBT because the resolution of where the dependency needs to
    be downloaded and the inclusion in the project is simple. To do this, open the
    `build.sbt` file of your project and include the dependency.


    ```scala

    scalaVersion := "3.0.1"

    name := "hello world"

    organization := "ch.epfl.scala"

    version := "1.0"

    libraryDependencies += "org.scalatest" %% "scalatest" % "3.2.10" % "test"

    ```


    Some considerations when you include this new dependency:


    - Check for the latest version of the library because new versions appear many
    times a year to solve different bugs. You can check on MVNRepository.com for this
    information.

    - Include the dependency only in the scope of the test because if you do not indicate
    the correct scope of the dependency when SBT creates the package, it will include
    the dependency, which increments the final size. To include the dependency only
    in the scope of the test, you need to specify in the last part of the declaration
    `% "test"`, as in the code above.


    When you create your project using SBT, the folder for the different tests may
    not exist. If you don''t have the folder `src/test/scala`, create it.


    After you include the dependency, you can run the test using the command `sbt
    test`, but you will see nothing in the console because you don''t have any tests
    yet.


    ```

    $ sbt test

    [info] welcome to sbt 1.5.5 (Homebrew Java 11.0.12)

    [info] loading settings for project helloworld-build from assembly.sbt ...

    [info] loading project definition from /home/helloworld/project

    [info] loading settings for project helloworld from build.sbt ...

    [info] set current project to hello world (in build file:/home/helloworld/)

    [success] Total time: 2 s, completed Oct 3, 2021, 3:18:03 PM

    ```'
