    ```


    You can calculate the number of days by passing a `Long` to the method.


    ```

    scala> millisToDays(5949440999L)

    res3: Int = 68

    ```


    Let’s try to pass a `Date` to the method.


    ```

    scala> import java.util.Date

    import java.util.Date

    scala> millisToDays(Date().getTime())

    val res2: Int = 18931

    ```


    But sometimes it’s valuable to convert between one type and another. We are used
    to the conversion in some contexts: Int ➤ Long , Int ➤ Double, and so on. Let’s
    define a method that will automatically be called when you need the conversion.


    ```

    scala> import scala.language.implicitConversions

    scala> implicit def dateToLong(d: Date):Long = d.getTime

    def dateToLong(d: java.util.Date): Long

