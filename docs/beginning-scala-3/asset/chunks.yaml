    ```


    Removing `"a"` and adding `"d"` gives you a different collection, while the original
    collection of `immutableMap` remains the same.


    ```

    scala> println(newMap)

    Map(2 -> b, 3 -> c, 4 -> d)

    scala> println(immutableMap)

    Map(1 -> a, 2 -> b, 3 -> c)

    ```


    What you end up with is a completely new collection stored in `newMap`. The original
    collection, `immutableMap`, remains untouched.


    However, there are times when you do want mutable data, such as when creating
    a mutable data structure that is only used within a function.


    You can create mutable collections directly from immutable collections. The `List`,
    `Map`, and `Set` immutable collections can all be converted to the mutable `collection.mutable.Buffer`
    type with the `toBuffer` method . Here is an example of converting an immutable
    map to a mutable one and then changing it back:


    ```

    scala> val m = Map(1->"a", 2 -> "b")

    val m: Map[Int,String] = Map(1 -> a, 2 -> b)

    scala> val b = m.toBuffer

    val b: scala.collection.mutable.Buffer[(Int, String)] = ArrayBuffer((1,a), (2,b))

    ```


    The `map`, containing key-value pairs, is now a sequence of tuples. You can now
    add a new entry.


    ```

    scala> b += (3 ->"c")

    val res35: scala.collection.mutable.Buffer[(Int, String)] = ArrayBuffer((1,a),
    (2,b), (3,c))

    ```


    After adding a new entry, you can change the `buffer` to `map` again.


    ```

    scala> val newMap = b.toMap

    val newMap: Map[Int,String] = Map(1 -> a, 2 -> b, 3 -> c)

    ```


    The `buffer` methods `toList` and `toSet` can be used in addition to `toMap` to
    convert a buffer to an immutable collection. The most straightforward way to modify
    collections is with a mutable collection type. You will look at some mutable collection
    classes in the following sections.


    ### Mutable ArrayBuffer


    The `ArraryBuffer` is a collection that contains elements of the same type where
    you can change the size of the structure without changing the values.


    Creating an `ArrayBuffer`:


    ```

    scala> import scala.collection.mutable.ArrayBuffer

    scala> val ints = ArrayBuffer[Int]()

    val ints: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer()

    ```


    Adding elements to the `ArrayBuffer`:


    ```

    scala> ints ++= 1

    val res0: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(1)

    ```


    Adding multiple elements to the `ArrayBuffer` :


    ```

    scala> ints ++= List(2,3,4)

    val res1: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(1, 2, 3, 4)

    ```


    Removing elements to the `ArrayBuffer:`


    ```

    scala> ints -= 1

    val res0: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(2,3,4)

    ```


    ### Mutable Queue


    A queue is a first-in, first-out (FIFO) data structure. Scala offers both an immutable
    queue and mutable queue. You can create an empty, mutable queue of any data type.
    This code shows a mutable queue for int:


    ```

    scala> import scala.collection.mutable.Queue

    scala> var ints = Queue[Int]()

    var ints: scala.collection.mutable.Queue[Int] = Queue()

    ```


    Note


    While the `collection.immutable` package is automatically added to the current
    namespace in Scala, the `collection.mutable` package is not. When creating mutable
    collections, make sure to include the full package name for the type.


    Once you have a mutable queue, you can add elements to it using `+=`, `++=`, and
    `enqueue`, as shown in these examples.


    Adding elements to the queue:


    ```

    scala> ints ++= 1

    val res36: scala.collection.mutable.Queue[Int] = Queue(1)

    ```


    Adding multiple elements to the queue:


    ```

    scala> ints += (2, 3) //This is deprecated in Scala 2.13.0

    res47: scala.collection.mutable.Queue[Int] = Queue(1, 2, 3)

    ```


    Using `enqueue`:


    ```

    scala> ints.enqueue(4)

    val res49: scala.collection.mutable.Queue[Int] = Queue(1, 2, 3, 4)

    ```


    Because a queue is a FIFO, you typically remove elements from the head of the
    queue, one element at a time, using `dequeue` .


    ```

    scala> ints.dequeue

    res50: Int = 1

    scala> ints

    res51: scala.collection.mutable.Queue[Int] = Queue(2, 3, 4)

    ```


    A `Queue` is a collection class that extends from `Iterable` and `Traversable`,
    so it has all the usual collection methods, including `foreach`, `map`, and so
    on.


    ### Mutable Stack


    A stack is a last-in, first-out (LIFO) data structure. Scala has both immutable
    and mutable versions of a stack. The following examples demonstrate how to use
    the mutable `Stack` class.


    Creating an empty, mutable stack of the int data type:


    ```

    scala> import scala.collection.mutable.Stack

    scala> var ints = Stack[Int]()

    val ints: scala.collection.mutable.Stack[Int] = Stack()

    ```


    You can also populate a stack with initial elements when you create it.


    ```

    scala> val ints = Stack(1, 2, 3)

    val ints: scala.collection.mutable.Stack[Int] = Stack(1, 2, 3)

    ```


    You can now push elements onto the stack with `push.`


    ```

    scala> ints.push(4)

    val res41: ints.type = Stack(4, 1, 2, 3)

    ```


    Creating a stack:


    ```

    scala> ints.push(5, 6 ,7)

    val res42: ints.type = Stack(7, 6, 5, 4, 1, 2, 3)

    ```


    To take elements off the stack, pop them off the top of the stack.


    ```

    scala> val lastele = ints.pop

    val lastele: Int = 7

    ```


    With this, we complete the discussion of mutable collections and this chapter.
    The Scala collections framework is broad, rather than deep, and deserves a book
    of its own. Nevertheless, this chapter showed you how to use a variety of Scala’s
    collection types.'
  trans: '

    ## 可变集合


    我们熟悉的 `List`、`Set` 和 `Map` 等不可变集合在创建后无法更改。不过，它们可以被转换为新的集合。例如，你可以创建一个不可变映射，然后通过移除一个映射项并添加另一个映射项来对其进行转换。


    ```

    scala> val immutableMap = Map(1 -> "a", 2 -> "b", 3 -> "c")

    val immutableMap: Map[Int,String] = Map(1 -> a, 2 -> b, 3 -> c)

    scala> val newMap = immutableMap - 1 + (4 -> "d")

    val newMap: Map[Int,String] = Map(2 -> b, 3 -> c, 4 -> d)

    ```


    移除 `"a"` 并添加 `"d"` 会得到另一个不同的集合，而原始的 `immutableMap` 集合保持不变。


    ```

    scala> println(newMap)

    Map(2 -> b, 3 -> c, 4 -> d)

    scala> println(immutableMap)

    Map(1 -> a, 2 -> b, 3 -> c)

    ```


    最终得到的是一个存储在 `newMap` 中的全新集合。原始集合 `immutableMap` 保持不变。


    然而，有时你确实需要可变数据，例如在创建一个仅在函数内部使用的可变数据结构时。


    你可以直接从不可变集合创建可变集合。`List`、`Map` 和 `Set` 这些不可变集合都可以通过 `toBuffer` 方法转换为可变的 `collection.mutable.Buffer`
    类型。以下是将不可变映射转换为可变映射，然后再转换回来的示例：


    ```

    scala> val m = Map(1->"a", 2 -> "b")

    val m: Map[Int,String] = Map(1 -> a, 2 -> b)

    scala> val b = m.toBuffer

    val b: scala.collection.mutable.Buffer[(Int, String)] = ArrayBuffer((1,a), (2,b))

    ```


    包含键值对的 `map` 现在变成了一个元组序列。你现在可以添加一个新条目。


    ```

    scala> b += (3 ->"c")

    val res35: scala.collection.mutable.Buffer[(Int, String)] = ArrayBuffer((1,a),
    (2,b), (3,c))

    ```


    添加新条目后，你可以将 `buffer` 再次转换为 `map`。


    ```

    scala> val newMap = b.toMap

    val newMap: Map[Int,String] = Map(1 -> a, 2 -> b, 3 -> c)

    ```


    除了 `toMap` 之外，还可以使用 `buffer` 的 `toList` 和 `toSet` 方法将缓冲区转换为不可变集合。修改集合最直接的方法是使用可变集合类型。在接下来的章节中，你将了解一些可变集合类。


    ### 可变 ArrayBuffer


    `ArrayBuffer` 是一个包含相同类型元素的集合，你可以在不改变值的情况下更改结构的大小。


    创建一个 `ArrayBuffer`：


    ```

    scala> import scala.collection.mutable.ArrayBuffer

    scala> val ints = ArrayBuffer[Int]()

    val ints: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer()

    ```


    向 `ArrayBuffer` 添加元素：


    ```

    scala> ints ++= 1

    val res0: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(1)

    ```


    向 `ArrayBuffer` 添加多个元素：


    ```

    scala> ints ++= List(2,3,4)

    val res1: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(1, 2, 3, 4)

    ```


    从 `ArrayBuffer` 移除元素：


    ```

    scala> ints -= 1

    val res0: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(2,3,4)

    ```


    ### 可变 Queue


    队列是一种先进先出（FIFO）的数据结构。Scala 同时提供了不可变队列和可变队列。你可以创建任何数据类型的空可变队列。以下代码展示了一个用于整数的可变队列：


    ```

    scala> import scala.collection.mutable.Queue

    scala> var ints = Queue[Int]()

    var ints: scala.collection.mutable.Queue[Int] = Queue()

    ```


    注意


    虽然 `collection.immutable` 包在 Scala 中会自动添加到当前命名空间，但 `collection.mutable` 包不会。创建可变集合时，请确保包含该类型的完整包名。


    一旦你有了一个可变队列，就可以使用 `+=`、`++=` 和 `enqueue` 向其中添加元素，如下例所示。


    向队列添加元素：


    ```

    scala> ints ++= 1

    val res36: scala.collection.mutable.Queue[Int] = Queue(1)

    ```


    向队列添加多个元素：


    ```

    scala> ints += (2, 3) // 此方法在 Scala 2.13.0 中已弃用

    res47: scala.collection.mutable.Queue[Int] = Queue(1, 2, 3)

    ```


    使用 `enqueue`：


    ```

    scala> ints.enqueue(4)

    val res49: scala.collection.mutable.Queue[Int] = Queue(1, 2, 3, 4)

    ```


    由于队列是 FIFO 结构，你通常使用 `dequeue` 从队列头部一次移除一个元素。


    ```

    scala> ints.dequeue

    res50: Int = 1

    scala> ints

    res51: scala.collection.mutable.Queue[Int] = Queue(2, 3, 4)

    ```


    `Queue` 是一个继承自 `Iterable` 和 `Traversable` 的集合类，因此它拥有所有常用的集合方法，包括 `foreach`、`map`
    等。


    ### 可变 Stack


    栈是一种后进先出（LIFO）的数据结构。Scala 同时拥有不可变和可变的栈版本。以下示例演示了如何使用可变的 `Stack` 类。


    创建一个空的、用于整数数据类型的可变栈：


    ```

    scala> import scala.collection.mutable.Stack

    scala> var ints = Stack[Int]()

    val ints: scala.collection.mutable.Stack[Int] = Stack()

    ```


    你也可以在创建栈时用初始元素填充它。


    ```

    scala> val ints = Stack(1, 2, 3)

    val ints: scala.collection.mutable.Stack[Int] = Stack(1, 2, 3)

    ```


    现在你可以使用 `push` 将元素压入栈中。


    ```

    scala> ints.push(4)

    val res41: ints.type = Stack(4, 1, 2, 3)

    ```


    创建栈：


    ```

    scala> ints.push(5, 6 ,7)

    val res42: ints.type = Stack(7, 6, 5, 4, 1, 2, 3)

    ```


    要从栈中取出元素，可以从栈顶弹出它们。


    ```

    scala> val lastele = ints.pop

    val lastele: Int = 7

    ```


    至此，我们完成了对可变集合以及本章的讨论。Scala 集合框架广度有余而深度不足，值得用一本书来专门阐述。尽管如此，本章向你展示了如何使用 Scala 的各种集合类型。

    '
- fmt: "# Performance of the Collections\n\nNot all the types of collections have\
    \ the same performance in their different methods. You need to consider some aspects\
    \ before choosing one instead of another. The description of each entry exists\
    \ in Table [6-6](#328789_3_En_6_Chapter.xhtml#Tab6). Tables [6-7](#328789_3_En_6_Chapter.xhtml#Tab7)\
    \ and [6-8](#328789_3_En_6_Chapter.xhtml#Tab8) describe the performance of each\
    \ method.\n\nTable 6-8\n\nPerformance of Set and Map\n\n| *Collection* | *Type*\
    \ | *Lookup* | *Add* | *Remove* | *Min* |\n| --- | --- | --- | --- | --- | ---\
    \ |\n| `HashSet/HashMap` | Immutable | eC | eC | eC | L |\n| `TreeSet/TreeMap`\
    \ | Immutable | Log | Log | Log | Log |\n| `BitSet` | Immutable | C | L | L |\
    \ eC |\n| `VectorMap` | Immutable | eC | eC | aC | L |\n| `ListMap` | Immutable\
    \ | L | L | L | L |\n| `HashSet/HashMap` | Mutable | eC | eC | eC | L |\n| `WeakHashMap`\
    \ | Mutable | eC | eC | eC | L |\n| `BitSet` | Mutable | C | aC | C | eC |\n|\
    \ `TreeSet` | Mutable | Log | Log | Log | Log |\n\nTable 6-7\n\nPerformance of\
    \ the Sequence\n\n| ***Collection*** | ***Type*** | ***Head*** | ***Tail*** |\
    \ ***Apply*** | ***Update*** | ***Prepend*** | ***Append*** | ***Insert*** |\n\
    | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| `List` | Immutable\
    \ | C | C | L | L | C | L | - |\n| `LazyList` | Immutable | C | C | L | L | C\
    \ | L | - |\n| `ArraySeq` | Immutable | C | L | C | L | L | L | - |\n| `Vector`\
    \ | Immutable | eC | eC | eC | eC | eC | eC | - |\n| `Queue` | Immutable | aC\
    \ | aC | L | L | L | C | - |\n| `Range` | Immutable | C | C | C | - | - | - |\
    \ - |\n| `String` | Immutable | C | L | C | L | L | L | - |\n| `ArrayBuffer` |\
    \ Mutable | C | L | C | C | L | aC | L |\n| `ListBuffer` | Mutable | C | L | L\
    \ | L | C | C | L |\n| `StringBuilder` | Mutable | C | L | C | C | L | aC | L\
    \ |\n| `Queue` | Mutable | C | L | L | L | C | C | L |\n| `ArraySeq` | Mutable\
    \ | C | L | C | C | - | - | - |\n| `Stack` | Mutable | C | L | L | L | C | L |\
    \ L |\n| `Array` | Mutable | C | L | C | C | - | - | - |\n| `ArrayDeque` | Mutable\
    \ | C | L | C | C | aC | aC | L |\n\nTable 6-6\n\nNomenclature to Describe Performance\n\
    \n| *Entry* | *Explanation* |\n| --- | --- |\n| **C** | The operation takes (fast)\
    \ constant time. |\n| **eC** | The operation takes effectively constant time,\
    \ but this might depend on some assumptions such as maximum length of a vector\
    \ or distribution of hash keys. |\n| **aC** | The operation takes amortized constant\
    \ time. Some invocations of the operation might take longer, but if many operations\
    \ are performed on average, only a constant time per operation is taken. |\n|\
    \ **Log** | The operation takes time proportional to the logarithm of the collection\
    \ size. |\n| **L** | The operation is linear; that is, it takes time proportional\
    \ to the collection size. |\n| **-** | The operation is not supported. |\n\n##\
    \ Summary\n\nThis chapter gave you a tour of the Scala collections framework and\
    \ showed you three main packages of the framework. This chapter delved deeply\
    \ into how to use Lists. You saw many ways to work with Lists. You explored basic\
    \ operations like `head` and `tail`, the higher-order operations like `map`, and\
    \ the utility methods in the `List` object. Lists are just one kind of collection\
    \ that Scala supports, however. This chapter provided an overview of the Scala\
    \ collections library and the most important classes and traits in it. With this\
    \ foundation, you should be able to work effectively with Scala collections and\
    \ know where to look in Scaladoc when you need more information.\n\nTable [6-9](#328789_3_En_6_Chapter.xhtml#Tab9)\
    \ summarizes most of the common collections and the meaning of each of them.\n\
    \nTable 6-9\n\nWhich Collections Are Mutable or Immutable\n\n| ***Collection***\
    \ | ***Immutable*** | ***Mutable*** | ***Description*** |\n| --- | --- | --- |\
    \ --- |\n| `ArrayBuffer` |   | ✓ | An indexed sequence of mutable elements |\n\
    | `LazyList` | ✓ |   | An immutable `LinkedList` where the elements are computed\
    \ only if they’re needed |\n| `List` | ✓ |   | A sequence of immutable elements\
    \ |\n| `ListBuffer` |   | ✓ | An indexed sequence of elements in a List |\n| `Map`\
    \ | ✓ | ✓ | A collection that contains key/value pairs |\n| `Set` | ✓ | ✓ | A\
    \ collection that does not contain duplicates |\n| `Vector` | ✓ |   | A sequence\
    \ of immutable elements |\n\nYou’ll turn your attention to the internals of Scala\
    \ traits in the next chapter.\n\nFootnotes [1](#328789_3_En_6_Chapter.xhtml#Fn1_source)\
    \   [2](#328789_3_En_6_Chapter.xhtml#Fn2_source)\n\n# Traits and Enums\n\nIn this\
    \ chapter, you will learn two of the most useful features of Scala. These features\
    \ exist in other languages that use the JVM, like Java or Kotlin—not with the\
    \ same name but with the same concept behind the scenes.\n\nOne of them is traits.\
    \ Traits function as interfaces in the Java universe and help you construct reusable\
    \ parts of a program and deal with the tribulations of multiple inheritances,\
    \ sidestepping the disadvantages of single inheritance by means of mixing compositions.\n\
    \nThe second concept is enumerations (enums), which help you encapsulate in one\
    \ place all possible values of a specific type. For example, a level of logging\
    \ could have five possible values: `INFO`, `WARN`, `DEBUG`, `ERROR`, and `FATAL`.\
    \ Also, enums provide a way to create methods with the idea of interacting with\
    \ the values.\n\nOne thing to mention: These features are not entirely new in\
    \ the latest version of Scala. Both exist in the previous version with a lot of\
    \ differences. The most relevant case is enums, which is like a new way to do\
    \ things with the idea of simplifying the use for the developers.\n\n## Traits\n\
    \nA *trait* provides code reusability in Scala by encapsulating the method and\
    \ state, and then offering the possibility of mixing them into classes, thus allowing\
    \ code reuse. In this way, a class can be mixed in with a myriad of traits, unlike\
    \ inheritance where each class is allowed to inherit from just one superclass.\
    \ Moreover, other than using the keyword `trait`, a trait definition resembles\
    \ a class definition, as shown here:\n\n```\nscala> trait Gliding:\n    |    \
    \ def java () =\n    |         println(\"gliding\")\n// defined trait Gliding\n\
    ```\n\nThis trait named `Gliding` does not declare a superclass, so like a class,\
    \ it has the default superclass of `AnyRef`. The `Gliding` trait is a simple example\
    \ but adequate way to show how traits work.\n\nThe following are some of the things\
    \ you can do with a trait:\n\n*   Have concrete abstract fields or methods\n*\
    \   Create a constructor that receives certain parameters\n*   Combine or extend\
    \ different traits\n*   Restrict or limit which classes can use it\n\nYou can\
    \ think of a trait as similar to an interface in Java where you can define a certain\
    \ default behavior. In Java 8 or previous versions, this is not possible to do,\
    \ and one class can extend from multiple interfaces to have multiple inheritances.\n\
    \nTable [7-1](#328789_3_En_7_Chapter.xhtml#Tab1) shows the same block of code\
    \ in the different languages that use the JVM.\n\nTable 7-1\n\nDifferent Ways\
    \ to Express the Idea of a Trait\n\n| *Language* | *Example* |\n| --- | --- |\n\
    | Java | `interface Gliding {    default void gliding() {        System.out.println(\"\
    gliding\");    }}` |\n| Kotlin | `internal interface Gliding {   fun gliding()\
    \ {       println(\"gliding\")   }}` |\n| Scala | `trait Gliding:    def gliding\
    \ () =        println(\"gliding\")` |\n\nEverything looks fine but how can you\
    \ use this trait in a class and invoke one of the methods? This is how:\n\n```\n\
    scala> class ConcreteClass extends Gliding\n// defined class ConcreteClass\nscala>\
    \ val instance = ConcreteClass()\nval instance: ConcreteClass = ConcreteClass@78e043e4\n\
    scala> instance.gliding()\ngliding\n```"
  raw: '## Performance of the Collections


    Not all the types of collections have the same performance in their different
    methods. You need to consider some aspects before choosing one instead of another.
    The description of each entry exists in Table [6-6](#328789_3_En_6_Chapter.xhtml#Tab6).
    Tables [6-7](#328789_3_En_6_Chapter.xhtml#Tab7) and [6-8](#328789_3_En_6_Chapter.xhtml#Tab8)
    describe the performance of each method.


    Table 6-8


    Performance of Set and Map


    | *Collection* | *Type* | *Lookup* | *Add* | *Remove* | *Min* |

    | --- | --- | --- | --- | --- | --- |

    | `HashSet/HashMap` | Immutable | eC | eC | eC | L |

    | `TreeSet/TreeMap` | Immutable | Log | Log | Log | Log |

    | `BitSet` | Immutable | C | L | L | eC |

    | `VectorMap` | Immutable | eC | eC | aC | L |

    | `ListMap` | Immutable | L | L | L | L |

    | `HashSet/HashMap` | Mutable | eC | eC | eC | L |

    | `WeakHashMap` | Mutable | eC | eC | eC | L |

    | `BitSet` | Mutable | C | aC | C | eC |

    | `TreeSet` | Mutable | Log | Log | Log | Log |


    Table 6-7


    Performance of the Sequence


    | ***Collection*** | ***Type*** | ***Head*** | ***Tail*** | ***Apply*** | ***Update***
    | ***Prepend*** | ***Append*** | ***Insert*** |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | `List` | Immutable | C | C | L | L | C | L | - |

    | `LazyList` | Immutable | C | C | L | L | C | L | - |

    | `ArraySeq` | Immutable | C | L | C | L | L | L | - |

    | `Vector` | Immutable | eC | eC | eC | eC | eC | eC | - |

    | `Queue` | Immutable | aC | aC | L | L | L | C | - |

    | `Range` | Immutable | C | C | C | - | - | - | - |

    | `String` | Immutable | C | L | C | L | L | L | - |

    | `ArrayBuffer` | Mutable | C | L | C | C | L | aC | L |

    | ListBuffer | Mutable | C | L | L | L | C | C | L |

    | `StringBuilder` | Mutable | C | L | C | C | L | aC | L |

    | `Queue` | Mutable | C | L | L | L | C | C | L |

    | `ArraySeq` | Mutable | C | L | C | C | - | - | - |

    | `Stack` | Mutable | C | L | L | L | C | L | L |

    | `Array` | Mutable | C | L | C | C | - | - | - |

    | `ArrayDeque` | Mutable | C | L | C | C | aC | aC | L |


    Table 6-6


    Nomenclature to Describe Performance


    | *Entry* | *Explanation* |

    | --- | --- |

    | **C** | The operation takes (fast) constant time. |

    | **eC** | The operation takes effectively constant time, but this might depend
    on some assumptions such as maximum length of a vector or distribution of hash
    keys. |

    | **aC** | The operation takes amortized constant time. Some invocations of the
    operation might take longer, but if many operations are performed on average,
    only a constant time per operation is taken. |

    | **Log** | The operation takes time proportional to the logarithm of the collection
    size. |

    | **L** | The operation is linear; that is, it takes time proportional to the
    collection size. |

    | **-** | The operation is not supported. |


    ## Summary


    This chapter gave you a tour of the Scala collections framework and showed you
    three main packages of the framework. This chapter delved deeply into how to use
    Lists. You saw many ways to work with Lists. You explored basic operations like
    head and tail, the higher-order operations like `map`, and the utility methods
    in the List object. Lists are just one kind of collection that Scala supports,
    however. This chapter provided an overview of the Scala collections library and
    the most important classes and traits in it. With this foundation, you should
    be able to work effectively with Scala collections and know where to look in Scaladoc
    when you need more information.


    Table [6-9](#328789_3_En_6_Chapter.xhtml#Tab9) summarizes most of the common collections
    and the meaning of each of them.


    Table 6-9


    Which Collections Are Mutable or Immutable


    | ***Collection*** | ***Immutable*** | ***Mutable*** | ***Description*** |

    | --- | --- | --- | --- |

    | `ArrayBuffer` |   | ✓ | An indexed sequence of mutable elements |

    | `LazyList` | ✓ |   | An immutable `LinkedList` where the elements are computed
    only if they’re needed |

    | `List` | ✓ |   | A sequence of immutable elements |

    | `ListBuffer` |   | ✓ | An indexed sequence of elements in a List |

    | `Map` | ✓ | ✓ | A collection that contains key/value pairs |

    | `Set` | ✓ | ✓ | A collection that does not contain duplicates |

    | `Vector` | ✓ |   | A sequence of immutable elements |


    You’ll turn your attention to the internals of Scala traits in the next chapter.


