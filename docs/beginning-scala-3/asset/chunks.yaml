- fmt: '### Vector


    You saw earlier that, by default, specifying that you want an `IndexedSeq` creates
    a `Vector`.


    ```

    scala> val x = IndexedSeq(1,2,3)

    val x: IndexedSeq[Int] = Vector(1, 2, 3)

    ```


    Here’s how to access the vector using an index:


    ```

    scala> x(0)

    res53: Int = 1

    ```


    You can’t modify a vector, so you add elements to an existing vector as you assign
    the result to a new variable.


    ```

    scala> val a = Vector(1, 2, 3)

    val a: Vector[Int] = Vector(1, 2, 3)

    scala> val b = a ++ Vector(4, 5)

    val b: Vector[Int] = Vector(1, 2, 3, 4, 5)

    ```


    Use the `updated` method to replace one element in a vector while assigning the
    result to a new variable.


    ```

    scala> val c = b.updated(0, "x")

    val c: Vector[Matchable] = Vector(x, 2, 3, 4, 5)

    ```


    You can also use all the usual filtering methods to get just the elements you
    want out of a vector.


    ```

    scala> val a = Vector(1, 2, 3, 4, 5)

    val a: Vector[Int] = Vector(1, 2, 3, 4, 5)

    scala> val b = a.take(2)

    val b: Vector[Int] = Vector(1, 2)

    scala> val c = a.filter(_ > 2)

    val c: Vector[Int] = Vector(3, 4, 5)

    ```


    In these examples, you create each variable as a `val` and assign the output to
    a new variable just to be clear, but you can also declare your variable as a `var`
    and reassign the result back to the same variable.


    ```

    scala> var a = Vector(1, 2, 3)

    var a: Vector[Int] = Vector(1, 2, 3)

    scala> a = a ++ Vector(4, 5)

    var a: Vector[Int] = Vector(1, 2, 3, 4, 5)

    ```


    You may have seen that mixing a mutable variable (`var`) with an immutable collection
    causes surprising behavior. For instance, when you create an immutable `Vector`
    as a `var`, it appears you can somehow add new elements to it.


    ```

    scala> var int = Vector(1)

    var int: Vector[Int] = Vector(1)

    scala> int = int :+ 2

    var int: Vector[Int] = Vector(1, 2)

    scala> int = int :+ 3

    var int: Vector[Int] = Vector(1, 2, 3)

    scala> int.foreach(println)


    ```


    Although it looks like you’re mutating an immutable collection, what’s really
    happening is that the `int` variable points to a new collection each time you
    use the `:+`. The `int` variable (`var`) is mutable so it’s actually being reassigned
    to a new collection during each step. However, the elements in an immutable collection
    like `Vector` cannot be changed. If you want to change the elements in a mutable
    collection, use `ArrayBuffer`.


    ### List[T]


    Scala’s `List[T]` is a linked list of type `T`. That means it’s a sequential list
    of any type, including Java’s primitives (`Int`, `Float`, `Double`, `Boolean`,
    `Char`) because Scala takes care of boxing (turning primitives into objects) for
    you. You can build a list using the same syntax you used to build an array with
    initial values, as shown here:


    ```

    scala> List(1,2,3)

    val res0: List[Int] = List(1, 2, 3)

    ```


    Like the `Array` type, the `List` type is parametric and Scala will figure out
    the best type if you use this syntax. There is no syntax for making an uninitialized
    `List`. That is because lists are immutable. Once you have created a list, the
    values in it cannot be changed. Changing it would require making a new `List`.
    However, there is another way to put `List`s together when you do not initially
    know all the values that will be stored in them. You can efficiently build `List`s
    one element at a time if you add elements to the front of the `List`. To add elements
    to a `List`, you use the cons operator, `::`. Internally, a `List` is made up
    of a cons cell (the `scala.::` class [yes, that’s two colons]) with a tail that
    refers to another cons cell or the `Nil` object. It’s easy to create a `List`:


    ```

    scala> 1 :: 2 :: 3 :: Nil

    val res20: List[Int] = List(1, 2, 3)

    ```


    This code creates three cons cells, each with an `Int` in it. Anything that looks
    like an operator with a `:` (colon), like the first character, is evaluated right
    to left. Thus, the previous code is evaluated just like the following:


    ```

    scala> new ::(1, new ::(2, new ::(3, Nil)))

    val res21: ::[Int] = List(1, 2, 3)

    ```


    `::` takes a “head” which is a single element and a “tail” which is another `List`.
    The expression on the left of the `::` is the head, and the expression on the
    right is the tail. To create a `List` using `::`, you must always put a `List`
    on the right side. That means that the right-most element must be a `List`, and
    in this case, you’re using an empty `List`, `Nil`.


    You can also create a `List` using the `List` object’s `apply` method (which is
    defined as `def apply[T](param: T*): List[T]`, which translates to “the `apply`
    method of type `T` takes zero or more parameters of type `T` and returns a `List`
    of type `T`”).


    ```

    scala> List(1,2,3)

    val res22: List[Int] = List(1, 2, 3)

    ```


    The type inferencer is pretty good at figuring out the type of the `List`, but
    sometimes you need to help it along.


    ```

    scala> List(1, 44.5f, 8d)

    val res27: List[AnyVal] = List(1, 44.5, 8.0)

    scala> List[Number](1, 44.5, 8d)

    val res28: List[java.lang.Number] = List(1, 44.5, 8.0)

    ```


    If you want to prepend an item to the head of the `List`, you can use `::`, which
    actually creates a new cons cell with the old list as the tail.


    ```

    scala> val x = List(1,2,3)

    scala> 99 :: x

    val res0: List[Int] = List(99, 1, 2, 3)

    ```


    Note that the `List` referred to by the variable `x` is unchanged, but a new `List`
    is created with a new head and the old tail. This is a very fast, constant-time,
    O(1), operation.


    You can also merge two `List`s to form a new `List`. This operation is O(n) where
    n is the number of elements in the first `List`:


    ```

    scala> val x = List(1,2,3)

    scala> val y = List(99, 98, 97)

    scala> x ::: y

    val res3: List[Int] = List(1, 2, 3, 99, 98, 97)

    ```


    #### Getting Functional


    The power of `List` and other collections in Scala comes when you mix functions
    with the collection operators. Let’s say you want to find all the odd numbers
    in a `List`. It’s easy.


    ```

    scala> List(1,2,3).filter(x => x % 2 == 1)

    val res4: List[Int] = List(1, 3)

    ```


    The `filter` method iterates over the collection and applies the function (in
    this case, an anonymous function) to each of the elements. If the function returns
    `true`, the element is included in the resulting collection. If the function returns
    `false`, the element is not included in the resulting collection. The resulting
    collection is the same type of collection that `filter` was invoked on. If you
    invoke `filter` on a `List[Int]`, you get a `List[Int]`. If you invoke `filter`
    on an `Array[String]`, you get an `Array[String]` back. In this case, you’ve written
    a function that performs mod 2 on the parameter and tests to see whether the result
    is 1, which indicates that the parameter is odd.


    You can also write a method called `isOdd` and pass the `isOdd` method as a parameter
    (Scala will promote the method to a function).


    ```

    scala> def isOdd(x: Int) = x % 2 == 1

    isOdd: (Int)Boolean

    scala> List(1,2,3,4,5).filter(isOdd)

    val res6: List[Int] = List(1, 3, 5)

    ```


    `filter` works with any collections that contain any type, like so:


    ```

    scala> "99 Red Balloons".toList.filter(Character.isDigit)

    val res9: List[Char] = List(9, 9)

    ```


    In this case, you’re converting a `String` to a `List[Char]` using the `toList`
    method and filtering the numbers. The Scala compiler promotes the `isDigit` static
    method on `Character` to a function, thus demonstrating interoperability with
    Java and that Scala methods are not magic.


    Another useful method for picking the right elements out of a `List` is `takeWhile`,
    which returns all the elements until it encounters an element that causes the
    function to return `false`. For example, let’s get all the characters up to the
    first space in a `String`:


    ```

    scala> "Elwood eats mice".takeWhile(c => c != '' '')

    val res16: String = Elwood

    ```'
