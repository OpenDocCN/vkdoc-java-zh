    method. The `Car` class here does not override the `drive` method of `Vehicle`
    trait.


    ```

    class Car extends Vehicle:

    def race(): String = "Racing the car"

    ```


    The `Boat` class in the following code overrides the `drive` method of the `Vehicle`
    trait:


    ```

    class Boat extends Vehicle:

    override def drive() =  println("float")

    def race() =  "Racing boat."

    ```


    Note


    Although Scala has abstract classes, it’s recommended to use traits instead of
    abstract classes to implement base behavior because a class can extend only one
    abstract class, but it can implement multiple traits. If you want the base behavior
    to be inherited in Java code, use an abstract class.


    You can also use fields in your traits. The fields of a trait can be declared
    as either `var` or `val` and can be concrete by defining the field with an initial
    value or abstract by not assigning an initial value. The following code illustrates
    a trait named `CarTrait` with an abstract field `door` and a concrete field `seat`:


    ```

    trait CarTrait:

    var door: Int

    var seat = 4

    ```


    The next code illustrates a `Car` class that extends the `CarTrait`. As you can
    see, you don’t need to use the `override` keyword to override `var` fields `door`
    and `seat`.


    ```

    class Car extends CarTrait:

    var door = 4

    seat = 5

    ```


    However, you need to use the `override` keyword in a subclass of a trait to override
    a `val` field.


    ```

    trait CarTrait:

    val door: Int

    class Car extends CarTrait:

    override val door = 5

    ```


    In the class `Car` that extends the `CarTrait` trait, you need to define the values
    for the abstract fields. Otherwise, you need to define the class as abstract.


    As you can see, traits can declare fields and maintain state. The syntaxes of
    the class definition and the trait definition are exactly the same, except that
    a class definition can have the parameters passed to the primary constructor of
    a class but a trait definition cannot have such parameters.


    ```

    class Car(door: Int )

    trait Car (door: Int) // does not compile - Car is already defined as class Car

    ```


    In the next section, you will explore using traits for modeling complex class
    hierarchies that you cannot model in Java.'
