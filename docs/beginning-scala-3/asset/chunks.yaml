    as its web server |

    | Built-in web server | JBoss Netty web server out of the box, but Play web applications
    can also be packaged to be distributed to Java EE application servers |

    | Dependency management | SBT for dependency management |

    | Hot reloading | In development mode, the code is verified for updates upon new
    requests, and modified files are automatically recompiled. In case of an error,
    the error is displayed in the browser directly, unlike in classic web applications
    where the errors are displayed in the console of the application server. |

    | In-memory database | Support for embedded databases like H2 out of the box.
    |

    | Native Scala support | Support for Scala natively. Complete interoperability
    with Java |

    | ORM | Ebean^([^(74)](#fn74)) as the ORM replacement of JPA for accessing databases
    |

    | Stateless | Fully RESTful and without the Java EE session per connection |

    | Templating | Use of Scala for the template engine |

    | WebSocket | Out of the box WebSocket implementation to enable a bi-directional
    connection between a client and the server |


