- fmt: '### for Loops


    `for`循环用于迭代不同类型的元素，例如数组或任何元素集合（如`List`）。其结构很简单：你需要指定起始元素/位置以及循环结束的条件。以下是一个示例，它迭代一个数组中的元素，直到（但不包括）数组的末尾：


    ```

    scala> val names = Array("John", "Anna", "Isabel")

    scala> for i <- 0 until names.size do

    |     println(names(i))

    John

    Anna

    Isabel

    ```


    这个结构展示了 Scala 3 的改进。以下代码是用 Scala 2 编写的：


    ```

    scala> for(i <- 0 until names.size) {

    |     println(names(i))

    | }

    John

    Anna

    Isabel

    ```


    你可以将其视为迭代数组的一种方式。集合可能会产生错误，因为你需要记住使用`until`而不是`to`，并记住哪个字母访问特定的索引。还有另一种更清晰的迭代方式：


    ```

    scala> for(name <- names)

    |     println(name)

    John

    Anna

    Isabel

    ```


    迭代数组的另一种替代方法是使用`foreach`方法，该方法存在于集合和元素数组中。


    ```

    scala> names.foreach(name => println(name))

    John

    Anna

    Isabel

    ```


    假设你需要迭代一个数组/集合，并且所有满足条件的元素都需要保存到一个新数组中。Scala 提供了一种解决这个特定问题的方法。你需要添加条件，并使用关键字`yield`来指示每次满足条件的迭代都需要保存到类似缓冲区的东西中，当`for`循环结束时，它将返回包含这些元素的数组。


    ```

    scala> val shortNames = for name <- names if name.size <=4  yield name

    val shortNames: Array[String] = Array(John, Anna)

    ```


    ### while Loops


    还有另一种迭代数组/元素集合的方法，循环会一直持续直到条件变为假。始终使用一个在某个时刻会变为假的条件，因为迭代的常见问题之一就是条件从未改变。


    ```

    scala> val names = Array("John", "Anna", "Isabel")

    scala> var i = 0

    scala> while i < names.size do

    |     println(names(i))

    |     i += 1

    John

    Anna

    Isabel

    ```


    ### match Expressions


    `if`表达式在条件数量不多时是一个很好的解决方案，但当条件数量增加时会发生什么？在这种情况下，代码将遇到严重的可维护性问题，并且可能对一些开发者来说不易阅读。出于这些原因，`match`表达式应运而生，它类似于
    Java 中的`switch`。


    ```

    scala> val month = 3

    scala> month match

    |  case 1 => println("January")

    |  case 2 => println("February")

    |  case 3 => println("March")

    |  case _ => println("Invalid month") //This works as the default

    March

    ```


    在前面的例子中，所有`case`都打印不同的字符串，但想象一下，你必须为某些`case`执行相同逻辑的情况。你可以通过使用`|`连接`case`来解决这个问题。


    ```

    scala> val month = 2

    scala> month match

    |  case 1 | 2 => println("Winter")

    |  case 6 | 7 => println("Summer")

    |  case _ => println("Invalid month") //This works as the default

    Winter

    ```


    此外，你可以返回一个值并将其保存到特定的变量中。


    ```

    scala> val month = 2

    scala> val season = month match

    | case 1 | 2 => "Winter"

    | case 6 | 7 => "Summer"

    | case _ => ""

    var season: String = Winter

    ```


    优化此类表达式的一个好方法是在`match`条件中使用`@switch`注解。你将在第[5](#328789_3_En_5_Chapter.xhtml)章中了解更多关于此结构的信息。此外，此注解会提供一些与编译错误相关的信息。


    ```

    scala> import scala.annotation.switch

    scala> val month = 2

    scala> (month: @switch) match

    |  case 1 | 2 => println("Winter")

    |  case 6 | 7 => println("Summer")

    Winter

    ```


    在某些情况下，你可以有一个方法/函数接收不同的类型并返回一个特定的值。`match`表达式让你有机会不局限于某种特定类型来使用它。你可以组合多种类型，例如字符串、数字和布尔值。


    ```

    scala> val strange : Any = true

    scala> val option = strange match

    | case "test" => "String"

    | case true =>"Boolean"

    val option: String = Boolean

    ```


    ### try/catch/finally Blocks


    这种类型的块有助于解决代码块中与任何类型的异常相关的问题。使用此块的正确方法是将所有可能产生异常的逻辑声明在`try`部分中。处理异常的逻辑放在`catch`块中，而`finally`块中的逻辑总是会被执行（无论是否发生异常）。在`catch`块内部，你可以使用关键字`case`来为每个异常执行特定的操作。


    ```

    scala> val nullType = null

    scala> try

    |     println(nullType.toString)

    | catch

    |     case e: NullPointerException => println("Exception")

    | finally

    |     println("Execute the last part of the block")

    Exception

    Execute the last part of the block

    ```


    `finally`块的一个常见用途是关闭某些资源，例如文件或数据库连接。


    ## Comments


    Scala 中的注释与 Java 或 C++ 等其他语言非常相似。你有两种创建注释的方式：


    *   **多行注释：** 使用`/*`开始包含注释的块，使用`*/`结束该块。在此块内，你可以使用任意多行文本来解释某些内容。


    *   **单行注释：** 使用`//`开始注释。请注意，使用这种类型的注释，你只能在一行内放置描述。


    ```

    /*

    I decided to define this value with 1 because I want to test part of the logic
    of one method.

    */

    val number = 1

    ```


    ```

    val number = 1 // I define this value with one to test the logic

    ```


    在类/方法/变量的名称清晰明了的情况下，没有必要添加注释来解释该代码块的含义。相反，当逻辑非常复杂，或者你出于某些特定原因添加了硬编码的类/方法/变量时，请添加一个包含大量细节的注释，以便任何后续访问代码的开发者理解。


    ## Running Code Without the REPL


    当你使用 REPL 时，一切看起来都很好，但在某些情况下，这样做过于复杂。因此，另一种方法是创建一个扩展名为`.scala`的文件。你可以使用你最喜欢的 IDE
    来执行此操作。之后，你需要创建一个`@main`对象，它将运行你应用程序的所有逻辑。你可以将此概念视为 Java 中的`main`方法，大多数开发者将其作为第一步学习，或者使用像
    Spring Boot 这样的框架来运行应用程序。


    ```

    @main def main() =

    //Here you can put all your code

    print("Main method")

    ```


    这段代码与 Scala 的早期版本略有不同，在早期版本中，你需要定义一个继承自`App`的`object`。


    ```

    object MyApp extends App {

    println("Main method")

    }

    ```


    如果你想在控制台中运行文件中的代码，你需要先编译该文件，然后运行代码。


    ```

    ~ scalac MyApp.scala

    ~ scala MyApp.scala

    Main method

    ```


    如果你想传递一些参数来改变应用程序的行为，你需要修改你的`main`方法以接收参数，参数之间用逗号分隔。


    ```

    @main def main(message: String, second_message: String) =

    //Here you can put all your code

    print(message)

    print(second_message)

    ```


    要运行这段代码并传递参数，过程与前面的示例类似，但你需要添加参数的值，这些值之间用一个空格分隔，并且顺序与它们在`main`方法中出现的顺序相同。


    ```

    ~ scalac MyApp.scala

    ~ scala MyApp.scala "hello"

    Hello

    ```'
  raw: '### for Loops


    The `for` loops are used to iterate different types of elements like arrays or
    any collection of elements as a List. The structure is simple: you need to indicate
    the start element/position and the condition to finish the loop. The following
    is an example that iterates an array of elements until (not including) the size
    of the array:


    ```

    scala> val names = Array("John", "Anna", "Isabel")

    scala> for i <- 0 until names.size do

    |     println(names(i))

    John

    Anna

    Isabel

    ```


    This structure shows the improvement of Scala 3\. The following code is written
    in Scala 2:


    ```

    scala> for(i <- 0 until names.size) {

    |     println(names(i))

    | }

    John

    Anna

    Isabel

    ```


    You can think of this as a way to iterate an array. A collection could produce
    an error because you need to remember to use `until` instead of `to` and remember
    which letter accesses that particular index. There is another way to iterate,
    which is clearer:


    ```

    scala> for(name <- names)

    |     println(name)

    John

    Anna

    Isabel

    ```


    Another alternative to iterate an array is to use the method `foreach` which is
    present in the collections and the array of elements.


    ```

    scala> names.foreach(name => println(name))

    John

    Anna

    Isabel

    ```


    Say you need to iterate an array/collection and all the elements that satisfy
    a condition need to be saved in a new array. Scala offers a way to solve this
    particular problem. You need to add the condition and use the keyword `yield`
    to indicate that each iteration that satisfies the condition needs to be saved
    in something like a buffer, and when the `for` loop finishes, it will return the
    array with the elements.


    ```

    scala> val shortNames = for name <- names if name.size <=4  yield name

    val shortNames: Array[String] = Array(John, Anna)

    ```


    ### while Loops


    There is another way to iterate an array/collection of elements where the loop
    continues until the condition becomes false. Always use a condition that in some
    moment becomes false because some of the common problems of iterations are related
    to the condition never changing.


    ```

    scala> val names = Array("John", "Anna", "Isabel")

    scala> var i = 0

    scala> while i < names.size do

    |     println(names(i))

    |     i += 1

    John

    Anna

    Isabel

    ```


    ### match Expressions


    `If` expressions are a great solution when the number of conditions is not a big
    number, but what happens when this number increases? In this situation, the code
    will run into serious problems of maintainability and may not be easy to read
    for some developers. For these reasons, the expression `match` exists, which is
    similar to `switch` in Java.


    ```

    scala> val month = 3

    scala> month match

    |  case 1 => println("January")

    |  case 2 => println("February")

    |  case 3 => println("March")

    |  case _ => println("Invalid month") //This works as the default

    March

    ```


    In the previous example, all the cases print different strings, but imagine the
    case where you must execute the same logic for some cases. You can solve this
    problem by concatenating the cases using |.


    ```

    scala> val month = 2

    scala> month match

    |  case 1 | 2 => println("Winter")

    |  case 6 | 7 => println("Summer")

    |  case _ => println("Invalid month") //This works as the default

    Winter

    ```


    Also, you can return a value to save it inside a particular variable.


    ```

    scala> val month = 2

    scala> val season = month match

    | case 1 | 2 => "Winter"

    | case 6 | 7 => "Summer"

    | case _ => ""

    var season: String = Winter

    ```


    A good way to optimize this type of expression is to use the annotation `@switch`
    in the `match` condition. You will see more about this structure in Chapter [5](#328789_3_En_5_Chapter.xhtml).
    Also, this annotation gives you some information related to the compilation errors.


    ```

    scala> import scala.annotation.switch

    scala> val month = 2

    scala> (month: @switch) match

    |  case 1 | 2 => println("Winter")

    |  case 6 | 7 => println("Summer")

    Winter

    ```


    In some cases, you can have a method/function that receives different types and
    returns a specific value. The `match` expression gives you the chance to use it
    not with some specific type. You can combine multiple types like Strings, numbers,
    and Booleans.


    ```

    scala> val strange : Any = true

    scala> val option = strange match

    | case "test" => "String"

    | case true =>"Boolean"

    val option: String = Boolean

    ```


    ### try/catch/finally Blocks


    This type of block is helpful to solve problems related to any type of exceptions
    in a block of code. The correct way to use this block is to declare all of the
    logic that can produce an exception inside the `try` section. The logic to do
    something with the exception goes inside the `catch` block, and the `finally`
    block is logic that is always executed (occurs or not an exception). Inside the
    `catch` block you can use the keyword `case` to execute a specific action for
    each exception.


    ```

    scala> val nullType = null

    scala> try

    |     println(nullType.toString)

    | catch

    |     case e: NullPointerException => println("Exception")

    | finally

    |     println("Execute the last part of the block")

    Exception

    Execute the last part of the block

    ```


    A common use of the `finally` block is to close certain resources like files or
    a connection with a database.


    ## Comments


    Comments in Scala are very similar to those in other languages like Java or C++.
    You have two ways to create them:


    *   **Multiline:** Use `/*` to start the block that contains the comment and `*/`
    to finish the block. Inside this block, you can use as many lines of text that
    you consider necessary to explain something.


    *   **Single line:** Use `//` to start the comment. Note that with this type of
    comment you can put the description on only one line.


    ```

    /*

    I decided to define this value with 1 because I want to test part of the logic
    of one method.

    */

    val number = 1

    ```


    ```

    val number = 1 // I define this value with one to test the logic

    ```


    In cases where the name of the class/method/variable is clear, it is not necessary
    to add a comment to explain the idea of that block of code. Instead, when the
    logic is so complex or you add a hardcoded class/method/variable for some specific
    reason, add a comment with a lot of detail for any developer who will access the
    code later.


    ## Running Code Without the REPL


    Everything looks fine when you use the REPL, but there are some cases where it
    is too complex to do it. For that reason, an alternative is to create a file with
    the extension `.scala`. You can use your favorite IDE to do it. After that, you
    need to create a `@main` object, which runs all the logic of your application.
    You can think of this concept as the `main` method in Java, which most developers
    learn as the first step, or run the application using a framework like Spring
    Boot.


    ```

    @main def main() =

    //Here you can put all your code

    print("Main method")

    ```


    This code is a little different from the previous versions of Scala when you needed
    to define an `object` that extended from `App`***.***


    ```

    object MyApp extends App {

    println("Main method")

    }

    ```


    If you want to run the code in the file using the console, you need to compile
    the file and then run the code.


    ```

    ~ scalac MyApp.scala

    ~ scala MyApp.scala

    Main method

    ```


    If you want to pass some parameters to change the behavior of your application,
    you need to modify your `main` to receive the parameters, separated by comma.


    ```

    @main def main(message: String, second_message: String) =

    //Here you can put all your code

    print(message)

    print(second_message)

    ```


    To run this piece of code and pass the parameters, the process is similar to the
    previous example, but you need to add the values of the parameters separated by
    one space and in the same order that appear in the `main`.


    ```

    ~ scalac MyApp.scala

    ~ scala MyApp.scala "hello"

    Hello

    ```'
