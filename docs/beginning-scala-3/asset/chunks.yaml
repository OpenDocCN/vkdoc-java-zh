    So, you’ve defined a nice DSL for periods, and it converts itself to `Long` when
    necessary. You saw how Scala’s implicit conversions lead to very simple and concise
    DSLs. Choosing implicit conversions and designing domain-specific languages takes
    time, thought, and deliberation. Next is a brief introduction to external DSLs.


    ## External DSLs


    External DSLs build their language-processing infrastructure: the parsers, the
    lexers, and the processing logic. You need to define grammar (such as Backus–Naur
    Form^([^(49)](#fn49)) (BNF) ). That is, you define all the rules that apply to
    parse a meaning or script successfully. Internal DSLs get this infrastructure
    free from the underlying host language, but you need to build them from scratch
    for external DSLs. In Scala, parser combinators are a notion close to the definition
    of BNF grammars and can provide very concise and elegant code when writing external
    DSLs. This module of parser combinators is not part of the Scala standard library
    but it’s maintained for the community^([^(50)](#fn50)). An external DSL has a
    separate infrastructure for lexical analysis, parsing, interpretation, compilation,
    and code generation. When you write a parser for an external DSL, you can use
    a parser generator tool such as Antlr^([^(51)](#fn51)). Scala comes with a parser
    combinator library so you don’t have to implement your own language infrastructure.


    ## Summary


    Scala’s parser combinator library demonstrates the flexibility of Scala’s syntax,
    the usefulness of implicit conversions, and the power of functional composition.
    The parser combinator is an excellent example of a domain-specific language. The
    domain is parsing text, and the syntax is nearly one-for-one with BNF. This library
    also gives you some idea of the kind of domain-specific languages you can create
    using Scala. There’s nothing specific in the Scala compiler for the parser combinator
    library; it’s just that: a library. On a practical level, using a single language,
    Scala, for defining your parser rather than using a tool like ANTLR means that
    you and your team use a single language for describing your system. This means
    that your brain thinks Scala. This means that you edit code in a single language
    and take advantage of the type safety of the language.


